l_german: 
germanycoldwar.1.title:0 "Sturm auf den Reichstag"
germanycoldwar.1.desc:0 "Ehemalige Nazi-Kollaborateure unter dem Kommando von Otto Ernst Remer haben das Reichstagsgebäude gestürmt und geschworen, das Vaterland zurückzubringen. Die meisten deutschen Abgeordneten haben den Reichstag evakuiert, und die UNO hat den Ausnahmezustand ausgerufen. Es ist unklar, was mit Deutschland geschehen wird."
germanycoldwar.1.a:0 "Ist dies der Beginn von etwas Größerem?"
germanycoldwar.2.title:0 "UN-Notstandssitzung beginnt"
germanycoldwar.2.desc:0 "Angesichts des jüngsten Aufstiegs des Faschismus wurde der UN-Sicherheitsrat aufgefordert, über den Umgang mit dem deutschen Putsch abzustimmen. Ein Großteil Europas fürchtet einen Krieg. Wir müssen entscheiden, was zu tun ist."
germanycoldwar.2.a:0 "Für den Krieg stimmen"
germanycoldwar.2.b:0 "Für Sanktionen stimmen"
germanycoldwar.2.c:0 "Für nichts stimmen"
germanycoldwar.3.title:0 "Deutschland fordert die Wiedervereinigung!"
germanycoldwar.3.desc:0 "Unter Kriegsgefahr forderte Nazi-Deutschland die Wiedervereinigung Deutschlands. Es scheint, als stünde in Deutschland ein Stellvertreterkrieg bevor. Wir müssen uns auf einen Konflikt vorbereiten, denn wenn wir uns einmischen, könnte ein weiterer Weltkrieg ausbrechen."
germanycoldwar.3.a:0 "Wir werden ihren Forderungen nachgeben"
germanycoldwar.3.b:0 "Wir lassen die Spiele beginnen ..."
germanycoldwar.3.c:0 "Eine rote Morgendämmerung bricht über uns herein ..."
germanycoldwar.4.title:0 "Eine vergebliche Suche?"
germanycoldwar.4.desc:0 "Es gibt Gerüchte, dass Adolf Hitler nicht tot ist. Doch die meisten dieser Gerüchte sind nur Gerüchte. Unsere Führung hat beschlossen, im fernen Argentinien nach Hitler zu suchen. Ob dies nur ein Vorwand ist, um sich von der Arbeit freizunehmen, oder ein verrückter Versuch, werden wir nie erfahren."
germanycoldwar.4.a:0 "Wenigstens haben wir etwas Freizeit"
germanycoldwar.5.title:0 "Hitler gefunden!"
germanycoldwar.5.desc:0 "Agenten haben Adolf Hitler benommen in einer örtlichen Bar gefunden, unsere Agenten haben ihn schnell festgenommen und in ein Versteck gebracht. Wir werden uns darauf vorbereiten, Hitler herauszuholen, um ihn wieder in"
germanycoldwar.5.a:0 "Wunderbar!"
germanycoldwar.6.title:0 "Preußen oder Krieg"
germanycoldwar.6.desc:0 "Deutschland hat uns ein Ultimatum gestellt: Übergeben Sie Preußen oder stellen Sie sich der deutschen Bedrohung. Die Wahl liegt bei uns. Es ist ungewiss, ob die Sowjets uns helfen werden, aber wir müssen entscheiden, was das Beste für unser Land ist."
germanycoldwar.6.a:0 "Preußen!"
germanycoldwar.6.b:0 "Krieg!"
germanycoldwar.7.title:0 "Ein neuer Anführer für Deutschland"
germanycoldwar.7.desc:0 "Angesichts der traurigen Wahrheit, dass Hitler tot ist, müssen wir einen neuen Führer für diese großartige Nation wählen. Da viele verschiedene Führer um die Macht wetteifern, müssen wir bei der Wahl vorsichtig sein, denn eine falsche Wahl kann zu weiteren Konflikten führen. \n\n\nSEITE 1: Militärische Führer \n \n\nViele der Generäle, die im Zweiten Weltkrieg an unserer Seite kämpften, möchten der neue Führer Deutschlands werden. Wir müssen bei unserer Wahl vorsichtig sein, denn wenn es zu Kontroversen kommt, kann dies dem Zustand des Reiches schaden."
germanycoldwar.7.a:0 "Friedrich Wiese"
germanycoldwar.7.b:0 "Josef Grohe"
germanycoldwar.7.c:0 "Wolf-Gunther Trierenberg"
germanycoldwar.7.d:0 "Seite 2"
germanycoldwar.8.title:0 "Ein neuer Anführer für Deutschland"
germanycoldwar.8.desc:0 "Angesichts der traurigen Wahrheit, dass Hitler tot ist, müssen wir einen neuen Führer wählen, der diese große Nation führen soll. Da viele verschiedene Führer um die Macht wetteifern, müssen wir bei der Auswahl vorsichtig sein, denn eine falsche Wahl kann später zu weiteren Konflikten führen... \n\n\n \n\nSEITE 2: Politische Führer \n\n\n\n\nWir möchten vielleicht jemanden mit politischen Verbindungen zu Hitler wählen. Da die Nürnberger Prozesse jedoch bereits vorbei sind, ist ein Großteil der politischen Führung tot... Unter diesen politischen Führern befindet sich Maria Orsitsch, die behauptet, Hitlers heimliche Geliebte zu sein. Es ist derzeit nicht bekannt, ob diese Tatsachen wahr sind, aber wir müssen unseren Führer sorgfältig auswählen"
germanycoldwar.8.a:0 "Werner Kempf"
germanycoldwar.8.b:0 "Karl-Heinrich Brenner"
germanycoldwar.8.c:0 "Maria Orsitsch"
germanycoldwar.8.d:0 "Zurück"
germanycoldwar.9.title:0 "Wahlen!"
germanycoldwar.9.desc:0 "Wir wählen derzeit einen neuen Kanzler. Wir müssen den besten Kanzler für die Wahl auswählen, um sicherzustellen, dass wir ein stabiles und großartiges Deutschland haben!"
germanycoldwar.9.a:0 "Konrad Adenauer gewinnt Wiederwahl!"
germanycoldwar.9.b:0 "Kurt Schumacher von der SPD"
germanycoldwar.9.c:0 "Franz Blücher von der FDP"
germanycoldwar.10.title:0 "Umzug der Hauptstadt"
germanycoldwar.10.desc:0 "Um unsere Versorgungslinien zu verbessern, müssen wir unsere Hauptstadt verlegen. Mit der Gründung der Deutschen Demokratischen Republik und ihrer falschen Sowjetregierung werden wir ihre Tyrannei bekämpfen und das wahre Deutschland werden!"
germanycoldwar.10.a:0 "Wir verlegen die Hauptstadt!"
germanycoldwar.11.title:0 "Der endgültige Fall Deutschlands....."
germanycoldwar.11.desc:0 "Deutschland ist endgültig gefallen... Mit dem Ende des Dritten Weltkriegs ist bewiesen, dass die Wiedervereinigung für den deutschen Staat nicht funktionieren kann und die einzige Lösung darin besteht, die Idee eines gesamtdeutschen Staates zu beenden."
germanycoldwar.12.title:0 "Ein bitterer Frieden?"
germanycoldwar.12.desc:0 "Da Deutschland langsam in unsere Hände fällt und seine Hauptstadt in unserer Reichweite ist, gibt es Rufe nach Frieden. Wenn wir Europa gerecht unter den Mächten aufteilen, könnte die andere Seite zustimmen und wir könnten diesen sinnlosen Krieg beenden wollen. (Diese Veranstaltung wird jedes Jahr stattfinden, sofern wir nicht akzeptiert werden oder aufgefordert werden, sie stummzuschalten.)"
germanycoldwar.12.a:0 "Wir werden den Frieden akzeptieren"
germanycoldwar.12.b:0 "Wir machen vor nichts halt!"
germanycoldwar.12.c:0 "Stummschaltungsereignis"
germanycoldwar.13.title:0 "Wir sind zum Europäischen Verteidigungsausschuss eingeladen."
germanycoldwar.13.desc:0 "Wir wurden zu einem Verteidigungsbündnis mit Ostdeutschland eingeladen. Wenn wir beitreten, garantieren wir uns gegenseitig unsere Unabhängigkeit. Was sollen wir tun?"
germanycoldwar.13.a:0 "Treten Sie dem Komitee bei"
germanycoldwar.13.b:0 "Wir werden nicht beitreten"
germanycoldwar.14.title:0 "[Root.GetName] tritt dem EDC bei"
germanycoldwar.14.desc:0 "[Root.GetName] hat heute bekannt gegeben, dass sie einem Verteidigungsbündnis namens „Europäischer Verteidigungsrat“ beigetreten sind. Im Falle eines Angriffs durch eine andere Nation tritt der Europäische Verteidigungsrat in Kraft und die Nationen werden sich gegenseitig verteidigen."
germanycoldwar.14.a:0 "Großartig!"
germanycoldwar.15.title:0 "Der zweite Anschluss?"
germanycoldwar.15.desc:0 "Deutschland fordert sein ehemaliges Land zurück. Im Austausch für mehr Land würde Deutschland stärker werden und könnte ein starker Verbündeter werden."
germanycoldwar.15.a:0 "Wir akzeptieren"
germanycoldwar.15.b:0 "Wir werden ablehnen"
germanycoldwar.16.title:0 "Der zweite Anschluss?"
germanycoldwar.16.desc:0 "Deutschland fordert sein ehemaliges Land zurück. Im Austausch für mehr Land würde Deutschland stärker werden und könnte ein starker Verbündeter werden."
germanycoldwar.16.a:0 "Wir akzeptieren"
germanycoldwar.16.b:0 "Wir werden ablehnen"
germanycoldwar.17.title:0 "Der zweite Anschluss!"
germanycoldwar.17.desc:0 "Das böse kapitalistische Deutschland hat beschlossen, Österreich zu übernehmen! Wir müssen schnell handeln, um zu verhindern, dass sich der deutsche Einfluss ausweitet! Was sollten wir tun?"
germanycoldwar.17.a:0 "Belagerung Berlin"
germanycoldwar.17.b:0 "Zerstöre jegliche Unterstützung für Deutschland"
germanycoldwar.17.c:0 "Wir haben keine Zeit dafür"
germanycoldwar.18.title:0 "Der Dritte Weltkrieg"
germanycoldwar.18.desc:0 "Was als kleines Gefecht vor Berlin begann, hat sich zu einem offenen Krieg entwickelt! Sowjetische Panzer wurden mobilisiert und begannen mit der Invasion der Deutschen Republik. Ein totaler Krieg scheint unvermeidlich ... Was wird aus diesem Krieg werden?"
germanycoldwar.18.a:0 "Die Uhr schlägt Null"
germanycoldwar.19.title:0 "Totaler Krieg!"
germanycoldwar.19.desc:0 "Was als kleines Gefecht vor Berlin begann, hat sich zu einem offenen Krieg entwickelt! Sowjetische Panzer wurden mobilisiert und begannen mit der Invasion der Deutschen Republik. Ein totaler Krieg scheint unvermeidlich ... Wir werden die deutschen Arbeiter befreien und sie aus der Asche auferstehen lassen!"
germanycoldwar.19.a:0 "Vorwärts!"
germanycoldwar.20.title:0 "Deutschland fordert die Wiedervereinigung!"
germanycoldwar.20.desc:0 "Da sich Ostdeutschland mit uns verbündet, möchte es das einzig wahre Deutschland werden. Wir müssen entscheiden, welches Deutschland bei uns bleiben soll: Ostdeutschland oder Westdeutschland."
germanycoldwar.20.a:0 "Ostdeutschland"
germanycoldwar.20.b:0 "Westdeutschland"
germanycoldwar.21.title:0 "Rückkehr des Kaisers"
germanycoldwar.21.desc:0 "Mit der Befreiung Belgiens haben wir Kaiser Wilhelm in unsere Gewalt gebracht. Wir werden ihm nun seinen rechtmäßigen Thron zurückgeben. Unsere Ambitionen richten sich nun auf Frankreich und die Rückeroberung unserer verlorenen Gebiete!"
germanycoldwar.21.a:0 "Wunderbar"
germanycoldwar.22.title:0 "Deutsche Regierung gestürzt"
germanycoldwar.22.desc:0 "Die deutsche Regierung wurde von einem undemokratischen Führer gestürzt! Wir müssen handeln, um einen weiteren Weltkrieg zu verhindern, sonst müssen wir die Konsequenzen tragen!"
germanycoldwar.22.a:0 "Was sollen wir als nächstes tun?"
