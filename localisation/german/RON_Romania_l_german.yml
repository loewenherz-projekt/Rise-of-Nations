 ROM_vanatorii_de_munte:0 "Vanatorii de Munte"
 ROM_vanatorii_de_munte_unit_tt:0 "\nErhalten Sie eine §YBergsteiger§!-Einheit mit 9 Bataillonen.\n"
 ROM_vanatorii_de_munte_desc:0 "Die Vanatori De Munte – Gebirgsjäger – sind unsere Elite-Gebirgsjäger. Ihr Ruf eilt ihnen selbst im Ausland voraus, und wir täten gut daran, ihre Truppenstärke mit den Besten zu verstärken, die wir finden können."
 ROM_mountain_artillery2:0 "Gebirgsartillerie"
 ROM_mountain_artillery2_tech_tt:0 "Aktiviert §HMountain Gun§!\n§HArtillery\n Mountain§!: Bewegung: §G+15%§!\n§HAnti-Tank\n Mountain§!: Bewegung: §G+15%§!"
 ROM_mountain_artillery2_desc:0 "Unsere Gebirgsjäger müssen die ihnen gebührende Artillerieunterstützung erhalten, wenn wir ihre hervorragende Leistung bewahren wollen. Unsere Artillerie muss daher für den Einsatz im Gebirge angepasst werden."
 ROM_update_military_equipment:0 "Militärische Ausrüstung aktualisieren"
 ROM_update_military_equipment_desc:0 "Moderne Ausrüstung ist in der Kriegsführung von entscheidender Bedeutung und wir müssen uns bemühen, unsere Infanteriewaffen zu modernisieren."
 ROM_wartime_industry:0 "Kriegsindustrie"
 ROM_wartime_industry_desc:0 "Wir verfügen über eine starke Industrie, doch nicht alle sind optimal auf die Produktion von Kriegsmaterial ausgerichtet. Die Entwicklung effizienter Prozesse zur Förderung dieses Wandels wird für die Nutzung unserer Ressourcen entscheidend sein."
 ROM_resita_model_1943:0 "Resita Modell Anticar"
 ROM_resita_model_1943_desc:0 "Das Zeitalter der Panzer ist angebrochen und unsere Infanterie benötigt moderne Mittel, um sich gegen diese Stahlkolosse verteidigen zu können."
 ROM_maresal_tank_destroyer:0 "Maresal\nPanzerzerstörer"
 ROM_maresal_tank_destroyer_desc:0 "Unsere Ingenieure haben die Idee entwickelt, einen leicht herzustellenden leichten Panzer zu bauen, der über ausreichende Fähigkeiten verfügt, um die gegnerischen Panzerfahrzeuge auszuschalten."
 advanced_heavy_tank:0 "Maresal"
 rom_the_maresal_tt:0 "\nErmöglicht die Produktion von §HMaresal§!"
 advanced_light_td:0 "Maresal"
 ROM_rubber_processing:0 "Gummiverarbeitung"
 ROM_rubber_processing_desc:0 "Die Gummiverarbeitung ist von großer Bedeutung, falls wir jemals von einer Handelsblockade betroffen sein sollten."
 ROM_mountain_divisions:0 "Vanatorii de Munte"
 ROM_expand_the_program:0 "Erweitern Sie das Programm"
 ROM_expand_the_program_desc:0 "Wir können die Berge vielleicht nicht versetzen, aber wir werden die Männer haben, um sie zu besteigen."
 ROM_update_the_navy:0 "Aktualisieren Sie die Marine"
 ROM_update_the_navy_desc:0 "Unser Marine-Rückgrat muss an die heutigen Standards angepasst werden."
 ROM_new_warships:0 "Stolz des Schwarzen Meeres"
 ROM_new_warships_desc:0 "Ein Schlachtschiff in unserer Marine wird uns eindeutig dabei helfen, unsere Vorherrschaft im Schwarzen Meer zu sichern."
 ROM_navy_excersises:0 "Marineübungen"
 ROM_navy_excersises_desc:0 "Wenn wir das Schwarze Meer beherrschen wollen, sollten wir zunächst wissen, wie wir das richtig machen."
 ROM_oil_processing:0 "Ölverarbeitung"
 ROM_oil_processing_desc:0 "Große Ölreserven zu haben, wird gegenüber den Nationen des Kontinents einen strategischen Vorteil darstellen. Vielleicht können wir dies nutzen, um bessere Bedingungen auszuhandeln."
 ROM_oil_refining:0 "Ölraffination"
 ROM_oil_refining_desc:0 "Wir verfügen derzeit über die größten Ölreserven Europas. Wir sollten unsere Vormachtstellung bei der Ölförderung und der Kraftstoffproduktion durch den Ausbau unserer Ölraffinerien aufrechterhalten."
 ROM_new_warships_desc:0 "Wenn wir als Seemacht ernst genommen werden wollen, benötigen wir Großkampfschiffe an der Spitze unserer Schwarzmeerflotte."
