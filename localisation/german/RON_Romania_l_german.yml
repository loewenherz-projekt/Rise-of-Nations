 ROM_small_lobby_effort:1 "Kleine Lobbyarbeit"
 ROM_small_lobby_effort_desc:0 "Es lohnt sich, im Palast ein offenes Ohr zu haben und dafür zu sorgen, dass einige einflussreiche Leute wissen, was die Regierung plant."
 ROM_medium_lobby_effort:1 "Mittlerer Lobbying-Aufwand"
 ROM_medium_lobby_effort_desc:0 "Eine konzertierte Anstrengung, den Standpunkt der Regierung klarzumachen, wird sich auf lange Sicht zweifellos auszahlen."
 ROM_special_measures:1 "Sondermaßnahmen"
 ROM_special_measures_desc:0 "Manchmal benötigen Parlamentsabgeordnete einen direkteren, persönlichen Anreiz, um zu erkennen, dass das Beste für ihr Bankkonto auch das Beste für ihr Land ist."
 ROM_intervention_mandate:1 "Interventionsmandat"
 ROM_intervention_mandate_desc:0 "Auch wenn wir uns dazu entschlossen haben, uns stärker in das Weltgeschehen einzumischen, müssen wir dennoch mit dem Parlament zusammenarbeiten, um die Genehmigung für militärische Aktionen zu erhalten."
