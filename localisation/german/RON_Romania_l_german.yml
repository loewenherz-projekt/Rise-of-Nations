##Industry Line
 ROM_romanian_industrial_project:0 "Rumänisches Industrieprojekt"
 ROM_romanian_industrial_project_desc:0 "Konzentrieren Sie alle unsere politischen Anstrengungen darauf, die zivile Industrie mit einem großen Sprung nach vorne aufzubauen."
 ROM_investments_in_industrial_sector:0 "Investitionen im Industriesektor"
 ROM_investments_in_industrial_sector_desc:0 "Mit eisernem Willen und einer unermüdlichen Arbeitsmoral können wir die Menschen zu einer weiteren großen industriellen Anstrengung mobilisieren."
 ROM_cfr_extended_railway_project_i:0 "CFR Erweitertes Eisenbahnprojekt I"
 ROM_cfr_extended_railway_project_i_desc:0 "Ein Land ohne angemessene Infrastruktur kann keine fortschrittlichen Projekte oder Bauvorhaben durchführen. Caile Ferate Romane schlug uns vor, zunächst die Eisenbahnen in Moldawien und der Muntenia auszubauen."
 ROM_ardeal_mining_enterprises:0 "Ardeal Mining Enterprises"
 ROM_ardeal_mining_enterprises_desc:0 "Wir haben in den Südkarpaten ein großes Eisenerzvorkommen entdeckt. Wenn wir tiefer graben, können wir genug Eisenerz fördern, um unseren Bedarf vollständig zu decken."
 ROM_resita_steel_woorks:0 "Stahlwerk Resita"
 ROM_resita_steel_woorks_desc:0 "Durch die zusätzliche Finanzierung des Unternehmens können wir eine größere Menge Stahl pro Monat produzieren."
 ROM_develop_ploesti_oil_fields:0 "Erweitern Sie die Ölraffinerien in Ploiesti"
 ROM_develop_ploesti_oil_fields_desc:0 "Wir verfügen derzeit über die größten Ölreserven Europas. Wir sollten unsere Vormachtstellung bei der Ölförderung und der Kraftstoffproduktion durch den Ausbau unserer Ölraffinerien aufrechterhalten."
 ROM_found_synthetic_rubber_industry:0 "Synthetischer Kautschukhersteller"
 ROM_found_synthetic_rubber_industry_desc:0 "Mit einer enormen koordinierten Anstrengung können die Gummiunternehmen in Rumänien zusammenarbeiten, um bessere Möglichkeiten zur Herstellung von synthetischem Gummi zu finden und möglicherweise sogar den Bedarf an der Produktion für militärische Zwecke zu decken." 
 ROM_malaxa_factories_woorks:0 "Malaxa-Fabriken"
 ROM_malaxa_factories_woorks_desc:0 "Indem wir die rumänische Bevölkerung durch die Ausarbeitung neuer Gesetze im Wirtschaftsbereich dazu ermutigen, in die Entwicklung der nationalen Industrie zu investieren, können wir beachtliche Ergebnisse erzielen."
 ROM_additional_research_slot1:0 "Zusätzlicher Forschungsplatz I"
 ROM_additional_research_slot1_desc:0 "Nach dem Forschungsgründungsprogramm können wir die Zahl der Stellenangebote im Forschungsbereich erweitern."
 ROM_additional_research_slot2:0 "Zusätzlicher Forschungsplatz II"
 ROM_additional_research_slot2_desc:0 "Nach dem Forschungsgründungsprogramm können wir die Zahl der Stellenangebote im Forschungsbereich erweitern."
 ROM_romanian_research_institute:0 "Universität Bukarest"
 ROM_romanian_research_institute_desc:0 "Durch die Zusammenführung von Forschern aus dem ganzen Land können wir hervorragende Ergebnisse in der Wissenschaft und bei der Entwicklung neuer Maschinen erzielen."
 ROM_research_funding:0 "Forschungsförderung"
 ROM_research_funding_desc: " "Knowledge is power." By expanding the University of Bucharest research programs, we will experience a rapid growth."
 ROM_school_of_war:0 "Schule des Krieges"
 ROM_protectionism:0 "Protektionismus"
 ROM_protectionism_desc:0 "Indem wir die rumänische Bevölkerung durch die Ausarbeitung neuer Gesetze im Wirtschaftsbereich dazu ermutigen, in die Entwicklung der nationalen Industrie zu investieren, können wir beachtliche Ergebnisse erzielen." 
 rom_communsism_tt:0 "Kommunistische Anhänger aus dem ganzen Land versammeln sich zu Kundgebungen, um das derzeitige Regime zu stürzen und ihr eigenes zu errichten."
 rom_alegeri_tt:0 "\n\nDie Wahlen von 1937 sind entscheidend für unsere Zukunft. Es ist sehr wichtig, dass wir uns die Unterstützung des Volkes sichern.\n\nUm die nächsten Wahlen zu gewinnen, müssen wir „unser Regierungsprogramm abschließen“! und anfangen, in mindestens „zwei strategische Projekte“ für unser Land zu investieren."
 rom_liberals_tt:0 "\n\nDie Liberalen müssen den Haushalt für den §HIndustriezweig§ nicht ändern!"
 rom_traditionalists_tt:0 "\n\nTraditionalisten müssen den Haushalt für die §HArmy Endowment§! nicht ändern."
 rom_taranists_tt:0 "\n\nTaranisten werden mehr Möglichkeiten haben, durch politische Entscheidungen eine Mehrheit zu sichern, sie müssen den Haushalt für die §HResearch Branch§! nicht ändern."
 rom_legionaries_tt:0 "\n\nLegionäre können die Wahlen gewinnen, solange §Hkeine§! der demokratischen Parteien ihr Regierungsprogramm erfüllt oder in mindestens zwei strategische Projekte investiert.\nSie müssen bis zu den Wahlen von 1937 §Hmindestens 50 % Unterstützung für den Faschismus aufrechterhalten§!"
##Development Line

##Branch Series A
 ROM_political_reform:0 "Politische Reformen"
 ROM_political_reform_desc:0 "Um einen Wandel in der Welt herbeizuführen, müssen wir in der Lage sein, einen Wandel in unserem eigenen Land herbeizuführen. Die Stärkung unserer politischen Position sollte dabei an erster Stelle stehen."
 ROM_cfr_extended_railway_project_ii:0 "CFR Erweitertes Eisenbahnprojekt II"
 ROM_cfr_extended_railway_project_ii_desc:0 "Wir müssen unsere Infrastruktur ausbauen, um eine reibungslose Mobilität für Industrieunternehmen im ganzen Land zu gewährleisten. Caile Ferate Romane schlug im Rahmen des Projekts zum Ausbau der rumänischen Schieneninfrastruktur den Ausbau der Eisenbahn in Siebenbürgen vor."
 ROM_liberalism_desc:0 "Wir werden nicht vor Despoten und Diktatoren Halt machen. Wir werden nie vergessen, dass ein Staat seinem Volk dient und nicht umgekehrt."
 ROM_improve_relations_with_neighbours:0 "Verbessern Sie die Beziehungen zu Ihren Nachbarn"
 ROM_improve_relations_with_neighbours_desc:0 "Es ist klug, gute Beziehungen zu unseren Nachbarländern zu pflegen. Indem wir unsere Diplomaten in diese Länder entsenden, verbessern wir die Beziehungen zu ihnen mehr oder weniger."
 ROM_romania_first:0 "Rumänien zuerst"
 ROM_romania_first_desc:0 "Das Wohl der Nation muss Vorrang vor sogenannten „Wahrheiten“ haben. So wie wir unser eigenes Schicksal schmieden, müssen wir auch unsere eigenen Fakten schmieden."
 ##Branch Series B
 ROM_revive_economy:0 "Wirtschaft wiederbeleben"
 ROM_revive_economy_desc:0 "Manche Unternehmen müssen von hinten angestoßen werden, wenn wir möchten, dass sie unseren Gefallen erwidern."
 ROM_taranism:0 "Taranismus"
 ROM_taranism_desc:0 "Die Taranisten propagierten die Idee eines argarischen Staates und bekämpften die Tendenzen zum Europäismus. Sie waren der Ansicht, dass Rumänien ein Staat sein sollte, der die Interessen der Mehrheit (der Bauern) vertritt und die Entwicklung der Industrie mit den Interessen der Landwirtschaft in Einklang bringen sollte."
 ROM_deterrence:0 "Abschreckung"
 ROM_deterrence_desc:0 "Wenn wir allein dastehen, profitieren wir selten vom Krieg. Glücklicherweise wissen wir, dass die beste Verteidigung eine ist, die so bekannt ist, dass man sie nie anwenden muss."
 ROM_internationalism:0 "Internationalismus"
 ROM_internationalism_desc:0 "Es ist an der Zeit! Unsere nationale Industrie hat den erforderlichen Reifegrad erreicht, um unsere eigenen Waren über die Grenze zu exportieren."
 ROM_expand_the_navy:0 "Erweitern Sie die Marine"
 ROM_expand_the_navy_desc:0 "Wenn wir im Schwarzen Meer ein Wörtchen mitzureden haben wollen, ist es an der Zeit, neue Schiffe in die Flotte aufzunehmen."

 ## Others
 ROM_politica_portilor_deschise:0 "Politica Portilor Deschise"
 ROM_politica_portilor_deschise_desc:0 "Wir müssen unser Land industrialisieren, und zwar sofort! Es gibt keinen sichereren Weg, dies zu erreichen, als ausländische Investoren zu ermutigen, in unserem Land zu investieren."
 ROM_agrarian_reform:0 "Agrarreform"
 ROM_foreign_loans_desc:0 "Unser Agrarsektor bietet noch viel Raum für Verbesserungen. Durch die Rationalisierung und Verbesserung seiner Effizienz werden Arbeitskräfte frei, die in anderen Sektoren wie dem Baugewerbe und der Rüstungsproduktion eingesetzt werden können."
 ROM_agrarianism:0 "Agrarismus"
 ROM_agrarianism_desc:0 "Das Verdienst der Taranisten besteht darin, dass sie eine Doktrin eines Agrarrumäniens ausgearbeitet haben, das zwischen dem Kapitalismus des Westens und dem kommunistischen Kollektivismus des Ostens angesiedelt ist."
 ROM_romanian_village_values:0 "Rumänische Dorfwerte"
 ROM_romanian_village_values_desc:0 "„Der wichtigste Wert, den das rumänische Dorf vermittelt, ist das Gemeinschaftsgefühl.“ \n\n Tudor Salagean"
 ROM_ortodoxism:0 "Orthodoxie"
 ROM_ortodoxism_desc:0 "Das Schicksal des rumänischen Volkes besteht darin, „eine Kultur nach seinen Überzeugungen zu schaffen“, und dies setzt unsere Orientierung nach Osteuropa voraus."
 ROM_neutrality_focus:0 "Neutralitätsfokus"
 ROM_neutrality_focus_desc:0 "Während andere behaupten, dass es Mut und Weisheit erfordert, in einem globalen Konflikt Partei zu ergreifen, wissen wir, dass es mehr erfordert, sich zu weigern."
 ROM_strengthen_government:0 "Stärkung der Regierung"
 ROM_strengthen_government_desc:0 "Die Idee der „Stärkung der staatlichen Unterstützung“ hat ausgedient."
 ROM_europenism:0 "Europäismus"
 ROM_europenism_desc:0 "Die Europaanhänger sind der Ansicht, dass Rumäniens Platz in Europa sei und dass es keinen anderen Weg zur sozialen und wirtschaftlichen Entwicklung gebe, als das westliche Modell der Urbanisierung und Industrialisierung wiederaufzunehmen."
 ROM_traditionalism:0 "Traditionalismus"
 ROM_traditionalism_desc:0 "Die Traditionalisten sind der Ansicht, dass die Entwicklung unseres Landes auf seinem Agrarcharakter und auf der Authentizität der Werte des rumänischen Dorfes basieren sollte."
 ROM_prin_noi_insine:0 "Prin Noi Insine"
 ROM_prin_noi_insine_desc:0 "Es ist unsere Pflicht, unsere eigene Bevölkerung zu Investitionen in die nationale Industrie zu ermutigen und unser Kapital zu schützen."
 ROM_totalitarism:0 "Totalitarismus"
 ROM_totalitarism_desc:0 "Demokratie ist für schwierige Probleme keine gute Lösung. Wenn Macht mit Gewalt ausgeübt werden soll, muss sie von den Fesseln des Konsenses befreit werden."
 ROM_pe_aici_nu_se_trece:0 "Pe aici nu se trece!"
 ROM_pe_aici_nu_se_trece_desc:0 "Diese berühmten Worte wurden während der Schlachten von Marasti, Marasesti und Oituz im Ersten Weltkrieg gesprochen, als die rumänische Armee die vorrückenden Armeen der Mittelmächte stoppte. Es ist Zeit, das Volk erneut zu den Waffen zu rufen!"
 ROM_go_left:0 "Nach links gehen"
 ROM_go_left_desc:0 "Das Ziel ist klar: Gleichheit für alle. Wir wollen keine kapitalistischen Interessen in der rumänischen Politik. Es ist unerlässlich, optimale Bedingungen für die Entwicklung unserer kommunistischen Organisationen zu schaffen."
 ROM_found_cap:0 "CAP gefunden"
 ROM_found_cap_desc:0 "Landwirtschaftliche Genossenschaften sind der Stolz unseres fruchtbaren Bodens. Dank einer systematischen Produktion werden unsere Menschen nie erfahren, wie sich Nahrungsmittelknappheit anfühlt."
 ROM_fascist_propaganda_desc:0 "Wir müssen den Menschen die Bedeutung unseres Regimes bewusst machen."
 ROM_arrest_the_opposition:0 "Verhaftung der Opposition"
 ROM_arrest_the_opposition_desc:0 "Nachdem wir unsere Ideologie als wahrheitsgetreu etabliert haben, kann sie auch als Wahrheit gelehrt werden. Bildung und Medien müssen diese Lehre widerspiegeln."
 ROM_anti_fascist_diplomacy:0 "CAP gefunden"
 ROM_anti_fascist_diplomacy_desc:0 "Obwohl alle westlichen Regime repressiv und korrupt sind, gibt es keine schlimmeren als diejenigen, die vorgeben, fortschrittlich oder gar sozialistisch zu sein! Indem sie ein solches falsches Bewusstsein im Proletariat fördern, versuchen sie, die Revolution zu verzögern und die Arbeiter in ewiger Knechtschaft zu halten."
 ROM_join_the_new_order_cause:0 "Schließen Sie sich der Sache der Neuen Ordnung an"
 ROM_indoctrination:0 "Indoktrination"
 ROM_indoctrination_desc:0 "In unserem Land ist kein Platz für individuellen Ruhm. Unsere Propaganda sollte den Schwerpunkt auf kollektive Anstrengungen legen: übertroffene Produktionsziele, erfolgreiche Expeditionen und gewaltige Bauprojekte."
 ROM_german_millitary_mission:0 "Deutsche Militärmission"
 ROM_german_millitary_mission_desc: "To strengthen your army is a patriotic gesture ensuring national sovereignty and the new international order must be stated along ethnic, geographic and economic. The German army will help us in this sense."
 ROM_legionary_police:0 "Legionärspolizei"
 ROM_legionary_police_desc:0 "Militärische Prinzipien finden auch außerhalb des Militärs Anwendung. Mit der Entwicklung halbmilitarisierter Einheiten zur Ergänzung unserer Streitkräfte werden mehr Menschen eine militärische Ausbildung erhalten."
 ROM_prolecultism:0 "Prolekulismus"
 ROM_prolecultism_desc:0 "Der Sozialismus ist nicht nur ein Wirtschaftssystem und der Marxismus nicht nur eine Wissenschaft; wir müssen das Gefüge der sowjetischen Gesellschaft grundlegend verändern, um alle Überreste bürgerlicher Sitten und Traditionen auszumerzen."
 ROM_go_right:0 "Nach rechts gehen"
 ROM_go_right_desc:0 "Stärke ist die einzige Eigenschaft, die es wert ist, angestrebt zu werden. Unsere Nachbarn haben diese Wahrheit angenommen, und das müssen wir auch."
 ROM_colectivization:0 "Kollektivierung"
 ROM_colectivization_desc:0 "Die UdSSR will ebenso wenig Krieg wie wir. Vielleicht gibt es einen Weg, unsere Geschichte ohne Blutvergießen zu versöhnen."
 ROM_revolution_winds:0 "Revolution Winds"
 ROM_revolution_winds_desc:0 "Führen Sie einen Putsch gegen das derzeitige Regime durch und machen Sie den Schritt zur Gleichberechtigung aller."
 ROM_improve_relations_with_the_third_reich:0 "Verbesserung der Beziehungen zum Dritten Reich"
 ROM_improve_relations_with_the_third_reich_desc:0 "Deutschland ist eine Großmacht, und eine Freundschaft mit ihnen wird eines Tages sicherlich hilfreich sein."
 ROM_nationalism_focus:0 "Fokus auf Nationalismus"
 ROM_nationalism_focus_desc:0 "Unsere Nation ist einzigartig und unsere politischen Errungenschaften konnten nur hier erzielt werden. Dafür müssen wir um jeden Preis kämpfen."
 ROM_the_commitern:0 "Das Commitern"
 ROM_the_commitern_desc:0 "Die Verbesserung der Beziehungen zu den Kominternländern ist der erste Schritt zur Verbreitung des Kommunismus in der Welt."
 ROM_legionary_movement:0 "Legionärsbewegung"
 ROM_legionary_movement_desc:0 "Organisationen zur Förderung der Disziplin und politischen Bildung junger Menschen in unserem Land werden frühzeitig Loyalität und Selbstaufopferung fördern."
 ROM_teritorial_concessions:0 "Territoriale Konzessionen"
 ROM_romanian_bridgehead_doctrine:0 "Rumänische Brückenkopfdoktrin"
 ROM_romanian_bridgehead_doctrine_desc:0 "Sollten sich die Kämpfe gegen uns wenden, müssen wir gemeinsam mit unseren Freunden und Verbündeten Pläne für eine wirksame Umgruppierung und Vergeltung haben."
 ROM_regain_north_transylvania:0 "Erobern Sie Nord-Siebenbürgen zurück"
 ROM_regain_north_transylvania_desc:0 "Endlich ist die Zeit günstig, um unsere Ansprüche in Siebenbürgen geltend zu machen."
 ROM_reliable_ally:0 "Zuverlässiger Verbündeter"
 ROM_reliable_ally_desc:0 "Ion Antonescu verfolgt eine Politik der Wiedervereinigung. Wir müssen beweisen, dass wir ein würdiger Verbündeter des Dritten Reiches sind. Ihnen zum Sieg an der Ostfront zu verhelfen, könnte sich als äußerst wichtiger Faktor erweisen."
 ROM_copsa_mica_cugir_arms_factories:0 "Cugir Kleinwaffenfabrik"
 ROM_copsa_mica_cugir_arms_factories_desc:0 "Wird von der tschechischen Firma CMC gebaut, für den Lizenzbau stehen mehrere tschechische Designs zur Verfügung."
 ROM_voina_mortar_factories:0 "Voina Mörtelfabriken"
 ROM_voina_mortar_factories_desc:0 "Pirotechnia Armatei oder PA-Werk. Infanteriegeschütze, Mörser, Kleinwaffen (neue 7,62-mm-Waffen) usw."
 ROM_increase_naval_production:0 "Steigern Sie die Marineproduktion"
 ROM_increase_naval_production_desc:0 "Durch die Steigerung unserer Marineproduktion sollten wir in der Lage sein, die Seeherrschaft im Schwarzen Meer zu erlangen."
 ROM_FID_MR_Javert:0 "Gern geschehen!"
 ROM_protect_ploesti_oil_refineries:0 "Schützen Sie die Ölraffinerien in Ploiesti"
 ROM_protect_ploesti_oil_refineries_desc:0 "Die Ölraffinerien von Ploiesti stellen einen strategischen Punkt dar, den wir um jeden Preis schützen müssen."
 ROM_extend_cluj_airport:0 "IAR 80"
 ROM_extend_cluj_airport_desc:0 "Wir müssen unsere Luftinfrastruktur konsolidieren, bevor wir mit dem Luftmodernisierungsprojekt beginnen."
 ROM_modernization_of_equipment:0 "Modernisierung der Ausrüstung"
 ROM_modernization_of_equipment_desc:0 "Die Wiederbewaffnung Rumäniens war weitgehend auf die Tschechoslowakei zurückzuführen, deren Rüstungsindustrie etwa 70 % der importierten Waffen lieferte. Darüber hinaus handelte es sich um eine gezielte Assimilation der inländischen Produktion tschechoslowakischer Infanteriewaffen (Gewehre, Schrotflinten, Maschinengewehre und Maschinengewehre) und Divisionsartillerie. Eine Rolle bei dieser Aktion wurde den Fabriken Copsa Mica-Cugir (CMC) zugeschrieben."
 ROM_improve_naval_combat_tactics:0 "Verbessern Sie die Seekampftaktik"
 ROM_improve_naval_combat_tactics_desc:0 "Die Anpassung unserer Marinedoktrinen an große Schiffe und die Gewährleistung der Sicherheit unserer Handelskonvois wird uns viel darüber beibringen, welche Art von Schiffen wir benötigen."
 ROM_armor_inovations:0 "Rüstungsinnovationen"
 ROM_armor_inovations_desc:0 "Das zentrale Thema des Ausstattungsplans der rumänischen Armee war der Kauf von Panzerfahrzeugen, um die 76 leichten Panzer FT 17 mit geringem militärischen Wert aufzufüllen."
 ROM_development_of_own_fighter_planes:0 "Entwicklung inländischer Kampfflugzeuge"
 ROM_development_of_own_fighter_planes_desc:0 "Unsere Kampfflugzeuge können durch revolutionäre zivile Technik ihre Geschwindigkeit, Reichweite und maximale Flughöhe verbessern. Wir müssen uns darauf konzentrieren, wenn wir mit den Fortschritten anderer mithalten wollen."
 ROM_iar_brasov:0 "IAR Brasov"
 ROM_iar_brasov_desc: "Under the Endowment Plan, an important role was given to the development of Romanian Aviation Industry that began during this period the production of several types of aircraft, focusing on military training equipment, reconnaissance, fighters and bombers. The Romanian Aeronautical Industry (I.A.R.) were manufactured from 1934 until 1939, aircraft own conception: I.A.R. 14, 16, 37, 38, 39, 80, and 81."
 ROM_astra_anti_air_artillery_factory: "Astra Anti Air Artillery Factory"
 ROM_astra_anti_air_artillery_factory_desc: "The factory was mostly producing Rheinmetall cal. 37 mm AA guns as well as well for various pipes necessary to bring all guns to 75 mm, considered as the most convenient."
 ROM_air_modernization_project:0 "Luftkrieg"
 ROM_air_modernization_project_desc:0 "Moderne Kriegsführung verlagert den Kampf an die unerwartetsten Orte. Wir sollten uns auf das Unerwartete vorbereiten."
 ROM_concordia_artillery_factories:0 "Concordia Artilleriefabriken"
 ROM_concordia_artillery_factories_desc:0 "Das Werk befand sich in der Nähe von Ploiesti und baute in Lizenz das Schneider 47 mm AT-Gummimodell 1936 sowie andere Artilleriegeschütze."
 ROM_destroyer_effort:0 "Zerstörer-Anstrengung"
 ROM_destroyer_effort_desc:0 "Durch die Untersuchung der Konstruktion und des strategischen Einsatzes von U-Booten haben wir auch gelernt, wie wir diesen Strategien entgegenwirken können. Zerstörer werden dabei eine entscheidende Rolle spielen."
 ROM_purchase_equipment_licenses:0 "Gerätelizenzen erwerben"
 ROM_purchase_equipment_licenses_desc:0 "Die Wiederbewaffnung Rumäniens war weitgehend mit der Tschechoslowakei verbunden, deren Rüstungsindustrie etwa 70 % der importierten Waffen lieferte. Darüber hinaus handelte es sich um eine gezielte Assimilation der inländischen Produktion tschechoslowakischer Infanteriewaffen (Gewehre, Schrotflinten, Maschinengewehre und Maschinengewehre) und Divisionsartillerie. Eine Rolle bei dieser Aktion spielten die Werke Copsa Mica-Cugir (CMC)."
 ROM_army_endowment_plan:0 "Armee-Stiftung"
 ROM_army_endowment_plan_desc:0 "Die rumänische Armee wurde zu Beginn des Zweiten Weltkriegs im Großen und Ganzen dem allgemeinen Stiftungsplan entsprechend aufgebaut, der am 27. April 1935 vom Obersten Rat für Nationale Verteidigung genehmigt wurde."
 ROM_proletcultism:0 "Proletkultismus"
 ROM_proletcultism_desc:0 "Alle Kunstwerke unserer Volksrepublik müssen darauf abzielen, die Menschen über die Ziele und die Bedeutung des Kommunismus aufzuklären und das Proletariat in realistischen und typischen Szenen des Alltagslebens darzustellen. Sozialistische Künstler sind die Ingenieure der Seelen!"
 ROM_anti_capitalist_diplomacy_desc:0 "Die größten Hindernisse für eine globale Revolution sind zweifellos die fetten Banker der USA und die rücksichtslosen kolonialistischen Unterdrücker Großbritanniens. Unser oberstes Ziel muss es sein, ihnen auf die gierigen Hände zu klopfen und ihre liberale Propaganda zu untergraben."
 ROM_submarine_effort:0 "U-Boot-Anstrengungen"
 ROM_submarine_effort_desc:0 "Der U-Boot-Krieg ist die spannendste Entwicklung in der Marine seit der Erfindung des Torpedoboots. Wir tun gut daran, uns nicht nur vor U-Booten zu schützen, sondern sie auch gegen feindliche Schiffe einzusetzen."
 ROM_multirole_aircraft_concept:0 "IAR 81"
 ROM_multirole_aircraft_concept_desc:0 "Eine moderne Armee benötigt nicht nur am Boden, sondern auch in der Luft die Unterstützung durch Fahrzeuge."
 ROM_license_modern_engine:0 "Lizenz Modern Engine"
 ROM_license_modern_engine_desc:0 "Da der Krieg weitergeht, müssen wir unsere Ausrüstung kontinuierlich weiterentwickeln. Die Flugzeuge wurden zurückgelassen und wir suchen verzweifelt nach einer Engine, um den Kampf am Himmel wieder ins Gleichgewicht zu bringen."
 ROM_dniester_river_fortification:0 "Dnjestr-Flussbefestigung"
 ROM_dniester_river_fortification_desc: "Following our bridgehead tactics, we will fortify the Dniester River to defend the Border with the Soviet Union."
 ROM_prut_river_fortification:0 "Donaubefestigungen"
 ROM_prut_river_fortification_desc:0 "Gemäß unserer Brückenkopftaktik werden wir die Donau befestigen, um eine Katastrophe wie im Ersten Weltkrieg zu verhindern."
 ROM_battleship_effort:0 "Großkampfschiff-Anstrengung"
 ROM_battleship_effort_desc:0 "Eine Verbesserung des Designs unserer Schlachtschiffe würde zu großen taktischen Vorteilen führen. Ihre Reichweite und Leistung sind unübertroffen, und niemand wird ihren Geschützen entkommen können."
 ROM_renew_mountain_divisions_equipment:0 "Erneuerung der Ausrüstung der Gebirgsdivisionen"
 ROM_renew_mountain_divisions_equipment_desc:0 "Die Grenzen der Ausrüstung, die von Infanterie getragen werden kann, werden ständig erweitert. Wir werden uns darauf konzentrieren, unseren Truppen die beste verfügbare Ausrüstung zur Verfügung zu stellen."
 ROM_romanian_marine_corps:0 "Rumänisches Marinekorps"
 ROM_romanian_marine_corps_desc:0 "Landungen im feindlichen Gebiet erfordern Truppen, die speziell für solche Missionen ausgebildet sind."
 ROM_paratrooper_project:0 "Fallschirmjägerprojekt"
 ROM_paratrooper_project_desc:0 "Operationen hinter feindlichen Linien in unwirtlichem Gebiet werden Teil jedes globalen Konflikts sein. Die Bildung von Kommandoeinheiten, die diese Aufgaben erfüllen, ist für unsere zukünftige Kriegsführung von entscheidender Bedeutung."
 ROM_motorization_effort:0 "Motorisierungsbemühungen"
 ROM_motorization_effort_desc:0 "Eine stärkere Konzentration auf die Motorisierung wird die Geschwindigkeit erhöhen, mit der die Infanterie das Schlachtfeld erreichen kann, zumindest in Gebieten mit guten Straßen."
 ROM_mechanization_effort:0 "Mechanisierungsbemühungen"
 ROM_mechanization_effort_desc:0 "Indem wir die Möglichkeiten der motorisierten Infanterie überdenken, können wir die Grenzen der heute konstruierbaren Fahrzeuge erweitern."
 ROM_modernized_army:0 "Modernisierte Armee"
 ROM_modernized_army_desc:0 "Eine bessere Artillerie wird unsere Kampfkraft erheblich steigern, aber wir brauchen auch neue Taktiken und Doktrinen."
 ROM_radar_focus:0 "Verbessern Sie die Funkkommunikation"
 ROM_radar_focus_desc:0 "Die Fähigkeit, feindliche Bomber zu erkennen, wird für die Kriegsanstrengungen von entscheidender Bedeutung sein. Wir sollten keine Ressourcen scheuen, um die Radartechnologie weiterzuentwickeln und ein Netzwerk von Ortungsstationen entlang der Küsten aufzubauen."
 ROM_nuclear_effort:0 "Atomprojekt"
 ROM_nuclear_effort_desc:0 "Wir stehen am Rande einer weltverändernden Entdeckung und können nicht zulassen, dass andere das Feuer entfachen, das eines Tages die Erde verzehren könnte."
 ROM_a_man_a_dream_a_country:0 "Ein Mann, ein Traum, ein Land"
 ROM_a_man_a_dream_a_country_desc:0 "Unser Volk hat eine einzigartige Vision, einen einzigartigen Lebensstil, der sich so sehr von dem unterscheidet, was wir im Rest der Welt sehen. Hier in Rumänien schätzen wir das ländliche Leben, das die anderen zerstören wollen. Es ist unsere Pflicht, unsere Kultur zu schützen."
 ROM_rocket_effort:0 "Düsentriebwerksaufwand"
 ROM_rocket_effort_desc:0 "Es scheint nahezu sicher, dass das Düsentriebwerk die Propellermotoren in Flugzeugen ersetzen wird. Das Potenzial ist enorm, und wir dürfen nicht zulassen, dass Rumänien in diesem wichtigen Forschungsbereich zurückbleibt."
 ROM_secret_weapons:0 "Geheimwaffen"
 ROM_secret_weapons_desc:0 "Es ist verlockend, alle zusätzlichen Ressourcen in die Entwicklung von Panzern und Flugzeugen zu stecken, aber das Geheimnis, Kriege zu gewinnen, liegt in ganz neuen Wissenschaftsbereichen: Elektronik, Raketentechnik und Nuklearforschung."
 ROM_heroine:0 "Heldin Mutter"
 ROM_heroine_desc:0 "„Mutterheldin“ war in Rumänien ein Ehrentitel, der für die Geburt und Erziehung einer kinderreichen Familie verliehen wurde. Ziel des Staates war es nicht nur, solche Großfamilien zu ehren, sondern auch die finanzielle Unterstützung für schwangere Frauen, Mütter kinderreicher Familien und alleinerziehende Mütter zu erhöhen und die Gesundheit von Mutter und Kind zu verbessern."
 ROM_fanaticism: "Fanaticism"
 ROM_fanaticism_desc: "Fanaticism is a belief or behavior involving uncritical zeal or with an obsessive enthusiasm."
 DOD_romania.120.t:0 "Laden Sie ausländische Automobilunternehmen ein"
 DOD_romania.120.desc:0 "Mehrere ausländische Lkw-Hersteller haben Interesse an der Eröffnung eines Werks in Rumänien bekundet, um neue Lkw für den gewerblichen und militärischen Markt zu produzieren. Die Wahl eines solchen Werks gilt als Vorzeigeprojekt, dem der Erwerb weiterer Produktionslizenzen folgen könnte.\n\nAn wen sollten wir uns wenden?"
 DOD_romania.120.a:0 "Vauxhall, für schnellere Fahrzeuge."
 DOD_romania.120.b:0 "Opel, für zuverlässige deutsche Ingenieurskunst."
 DOD_romania.120.c:0 "Ford, für die Massenproduktion."
 ROM_ford_truck_factory:0 "Laden Sie ausländische Automobilunternehmen ein"
 ROM_ford_truck_factory_desc:0 "Anstatt Ressourcen für die Steigerung der Produktion unerprobter inländischer Automobildesigns aufzuwenden, würden wir mehr davon profitieren, bewährte ausländische Designs in Lizenz zu produzieren."
 ROM_economic_revolution:0 "Alles für das Land"
 ROM_economic_revolution_desc:0 "Durch die Zentralisierung von Fabriken fernab jeglicher Grenzen steigern wir unsere Produktion und schützen sie gleichzeitig vor potenziellen Eroberern."
 ROM_school_of_war_desc:0"Eine Armee ist ohne eine gute Führung nutzlos. Wenn wir unser Militär zu einer erstklassigen Streitmacht machen wollen, brauchen wir gut ausgebildete Offiziere, die es führen."
 ROM_elite_troops:0 "Elitetruppen"
 ROM_elite_troops_desc:0 "Angesichts der Tatsache, dass wir von Großmächten umgeben sind, ist es zwingend erforderlich, über eine spezialisierte Armee zu verfügen, die zum Eingreifen bereit ist."
 rom_pe_aici_nu_se_trce:0 "Pe aici nu se trece!"
 rom_ideological_fanatacism:0 "Ideologischer Fanatismus"
 rom_heroine_mother:0 "Heldin Mutter"
 ROM_arrest_the_oposition:0 "Verhaften Sie die Opposition"
 ROM_agrarian_reform:0 "Agrarreform"
 

 rom.30.t:0 "Parlamentswahlen"
 rom.30.desc:0 "Alle vier Jahre werden alle Sitze im Senat und in der Abgeordnetenkammer neu gewählt. Obwohl dies oft von Weltereignissen überschattet wird, kann die lokale Situation in jedem Wahlkreis manchmal den Unterschied ausmachen. \n\nNachdem alle Stimmen ausgezählt waren, war die Fraktion, die die Regierung unterstützte, [ROM.GetSenateElectionOutcome] im Senat und [ROM.GetHouseElectionOutcome] in der Kammer."
 rom.30.a:0 "Das Volk hat gesprochen."
 SenateElectionLost:0 "verlorene [?sen_loc] Sitze"
 SenateElectionGained:0 "[?sen_loc] Sitze gewonnen"
 HouseElectionLost:0 "verlorene [?ror_loc] Sitze"
 HouseElectionGained:0 "[?ror_loc] Sitze gewonnen"
 rom.31.t:0 "Eine Veränderung in der politischen Landschaft"
 rom.31.desc:0 "Mit einem neuen Regierungschef hat sich die ehemalige Opposition im Parlament weitgehend auf die Seite der neuen Regierung gestellt. [ROM.GetLeader] kann auf die Unterstützung der [?Senators_support] Senatoren und [?representatives_support] Abgeordneten zählen."
 rom.31.a:0 "Das Volk hat gesprochen."
 rom_congress_elections_tt_bad:0 "Bei den Parlamentswahlen wird die regierungstragende Fraktion auf stärkere Opposition stoßen.\n"
 rom_congress_elections_tt_good:0 "Die Dynamik des Wahlkampfes dürfte sich auf die Parlamentswahlen übertragen.\n"
 rom.32.t:0 "Regierungsfraktion erringt Mehrheit im Parlament"
 rom.32.desc:0 "Die von uns eingeführten Reformen des Wahlsystems scheinen äußerst erfolgreich gewesen zu sein, da bei der letzten Wahl eine große Zahl unserer Anhänger ins Parlament gewählt wurde. Mit einer soliden Mehrheit dürfte es uns nicht schwerfallen, unsere politische Agenda durchzusetzen."
 rom.32.a:0 "Ein klares Zeichen unserer Unterstützung in der Bevölkerung."
 rom.33.t:0 "Legionäre erringen Mehrheit im Parlament"
 rom.33.desc:0 "In unserer Geschichte gab es noch nie eine so starke Bewegung wie Garda de Fier. Die Legionäre gewannen in fair organisierten Wahlen die Mehrheit im Parlament. Solange wir die Menschen, den Willen und die Herzen zum Aufbau haben, kann uns nichts aufhalten."
 rom.33.a:0 "Machen Sie Rumänien wieder großartig!"
 rom.40.t:0 "Senator stimmt für Regierungsvorschlag"
 rom.40.desc:0 "Bei einer kürzlichen Abstimmung hat ein Senator überraschend die Seiten gewechselt und für einen Regierungsvorschlag gestimmt. Obwohl es sich um eine eher geringfügige Angelegenheit handelte, sorgte die öffentliche Unterstützung eines zuvor offenkundigen Kritikers von [ROM.GetLeader] in Bukarest für Aufsehen.\n\nEinige Analysten glauben, dass dieses Beispiel weitere Senatoren dazu bewegen wird, ihre Haltung zu überdenken."
 rom.40.a:0 "Ein nützlicher Verbündeter."
 rom.41.t:0 "Abgeordneter spricht sich leidenschaftlich für die Regierung aus"
 rom.41.desc:0 "Ein Abgeordneter wurde bei einem Spendendinner zu seiner Haltung zu verschiedenen politischen Themen befragt und unterstützte die Politik von [ROM.GetLeader]. Er behauptete weiter, viele seiner Abgeordnetenkollegen hätten ähnliche Ansichten, würden aber durch „idiotische Kurzsichtigkeit, die nicht über die nächsten Wahlen hinausgeht“, davon abgehalten, das Richtige für das rumänische Volk zu tun. \n\nSeine Äußerungen wurden in der Presse ausführlich aufgegriffen und brachten mehrere seiner Kollegen in Schwierigkeiten, da sie ihre Position zu diesen Themen darlegen mussten."
 rom.41.a:0 "Er hat recht, wissen Sie."
 rom.42.t:0 "Senator spricht sich gegen Regierungspolitik aus"
 rom.42.desc:0 "Ein Senator gab einer großen Zeitung ein Interview, in dem er erklärte, er könne die „törichte und gefährliche“ Politik von [ROM.GetLeader] nicht länger unterstützen. Er behauptete weiter, er kenne mehrere andere Senatoren, die ähnlich denken und das Staatsoberhaupt in Kürze im Stich lassen würden."
 rom.42.a:0 "Er wird schon bald zurückgerannt kommen."
 rom.43.t:0 "Stellvertreter kritisiert [ROM.GetLeader]"
 rom.43.desc:0 "Während einer kürzlichen Debatte zur Steuerreform hielt ein Abgeordneter eine langatmige Rede über die zahlreichen Versäumnisse der Regierung. Ihm zufolge könne kein vernünftiger Rumäne die Politik der Regierung unterstützen, unabhängig von seiner Parteizugehörigkeit. \n\nSeine harten Worte scheinen Wirkung gezeigt zu haben, denn eine Reihe von Abgeordneten, die zuvor fest hinter der Politik von [ROM.GetLeader] standen, äußerten ihre Unterstützung."
 rom.43.a:0 "Eine Schande."
 rom.44.t:0 "Opposition erleidet Niederlage im Senat"
 rom.44.desc:0 "Ein Misstrauensantrag gegen die Regierung von [ROM.GetLeader] ist im Senat gescheitert. Selbst die glühendsten Anhänger hatten wenig Hoffnung auf eine Verabschiedung, doch die hohe Zahl der Gegenstimmen schockierte selbst die pessimistischsten Beobachter. Offenbar genießt der Präsident im Senat weitaus mehr Unterstützung als die meisten glaubten, was ihm bei der Umsetzung seiner Gesetzgebungsvorhaben helfen dürfte."
 rom.44.a:0 "Großartig."
 rom.45.t:0 "Kammerausschuss unterstützt die Regierungspolitik"
 rom.45.desc:0 "Die jüngste Anhörungsrunde im Haushaltsausschuss der Kammer führte zu einem Bericht, der der Politik von [ROM.GetLeader] deutliche Verbesserungen in allen verfügbaren Wirtschaftsindikatoren zuschreibt. Zwar ist der Bericht kein uneingeschränktes Lob, aber dennoch ein Schlag für diejenigen, die die Regierung kritisierten und Reformen forderten.\n\nEine Reihe von Abgeordneten hat bereits öffentlich erklärt, dass sie zwar weiterhin Zweifel an der Agenda der Regierung hegen, diese aber nun unterstützen werden."
 rom.45.a:0 "Und das sollten sie auch."
 rom.46.t:0 "Senator geht in den Ruhestand"
 rom.46.desc:0 "Nach einem leichten Herzinfarkt gab ein hochrangiger Senator heute seinen Rücktritt aus gesundheitlichen Gründen bekannt. In über zwei Jahrzehnten im Parlament hat der Senator ein großes Unterstützernetzwerk aufgebaut und großen Einfluss. Obwohl er technisch gesehen nur eine Stimme hat, schätzten Insider in Bukarest ihn dennoch als mehrere Stimmen wert ein, da er der Schlüssel zu mehreren weiteren Stimmen war. Da der Sitz höchstwahrscheinlich an einen erklärten Kritiker von [ROM.GetLeader] geht, wird es für die Regierung deutlich schwieriger, die notwendigen Stimmen für die Verabschiedung von Gesetzen zu sichern."
 rom.46.a:0 "Er wird uns fehlen. Und seine Stimme auch."
 rom.47.t:0 "Anhörungen der Kammer zu Regierungsvergehen"
 rom.47.desc:0 "Ein kleiner Skandal im Siegespalast nimmt Fahrt auf. Nachdem Medien wochenlang angedeutet hatten, ein kleiner Verwaltungsbeamter habe Bestechungsgelder für lukrative Regierungsaufträge angenommen, hat der Haushaltsausschuss der Exekutive Anhörungen eingeleitet, um festzustellen, ob der Regierungschef davon wusste. Die meisten Beobachter gehen zwar nicht davon aus, dass dies zu größeren Problemen für [ROM.GetLeader] führen wird, doch viele seiner Anhänger werden sich wohl zunächst zurückhalten müssen."
 rom.47.a:0 "Eine Hexenjagd."
 rom.61.t:0 "Senator aus [ROM_congress_investment_state.GetName] bietet Unterstützung an"
 rom.61.desc:0 "Der ranghöchste Senator aus [ROM_congress_investment_state.GetName] hat der Regierung Unterstützung angeboten. Sein Bundesstaat leidet unter kritischer Unterinvestition, und ein von der Regierung initiiertes Konjunkturprogramm würde ihn sicherlich dazu bringen, seine Haltung zu bestimmten Regierungsvorschlägen zu überdenken. Der Senator sitzt in mehreren wichtigen Ausschüssen und ist bekannt für seine Fähigkeit, Kompromisse einzugehen, was seine Stimme in beiden Kammern um einiges wertvoller macht."
 rom.61.a:0 "Es ist eine sehr unterentwickelte Region."
 rom.61.b:0 "Das riecht nach Korruption."
 rom.62.desc:0 "Die Senatoren von [ROM_congress_investment_state.GetName] haben sich an die Regierung gewandt und dem Präsidenten ihre Unterstützung angeboten. Im Gegenzug erhält er die informelle Garantie, dass [ROM_congress_investment_state.GetName] als Standort für eine neue Munitionsfabrik der Armee dienen soll. Sie argumentieren, der Bau einer Fabrik in der Region würde viele Arbeitsplätze schaffen und der Armee die dringend benötigte Unterstützung in einer zunehmend gefährlichen Welt bieten. Die beiden Senatoren erwähnten zudem ihre ausgezeichnete Zusammenarbeit mit mehreren einflussreichen Parlamentsmitgliedern."
 rom.62.a:0 "Sie bringen viele gute Argumente vor."
 rom.62.b:0 "Solche Geschäfte liegen unter meinen Zuschreibungen."
 rom.63.t:0 "Abgeordnete aus [ROM_congress_investment_state.GetName] bieten Unterstützung an"
 rom.63.desc:0 "Die parlamentarische Delegation von [ROM_congress_investment_state.GetName] hat der Regierung mehrere Vorschläge zur Verbesserung der Infrastruktur des Staates unterbreitet. Staatliche Mittel sollten für den Ausbau von Straßen und Brücken bereitgestellt werden, um den Handel zwischen den Regionen zu fördern. Sie betonte außerdem, dass die Unterstützung der Regierung in diesem Bereich sie eher dazu veranlassen würde, die Regierung bei ihren Vorhaben direkter zu unterstützen."
 rom.63.a:0 "Eine lobenswerte Initiative."
 rom.63.b:0 "Lassen Sie sie versuchen, das selbst durchzusetzen."
 rom.64.t:0 "Senatsausschuss untersucht Schiffbau in [ROM_congress_investment_state.GetName]"
 rom.64.desc:0 "Auf Drängen des ranghöchsten Senators von [ROM_congress_investment_state.GetName] hat der Handelsausschuss des Senats Anhörungen zur Lage der lokalen Schiffbauindustrie eingeleitet. Experten zufolge hängt ein erheblicher Teil des rumänischen Handels vom Überseehandel ab, und es mangelt dem Land dringend an Schiffbaukapazitäten. [ROM_congress_investment_state.GetName] wurde als Region identifiziert, in der große Investitionen getätigt werden sollten, und mehrere Ausschussmitglieder äußerten die Erwartung, dass die Regierung von [ROM.GetLeader] hierfür Mittel bereitstellen wird."
 rom.64.a:0 "Eine entscheidende Schwäche."
 rom.64.b:0 "Wir haben größere Probleme."
 

 ROM_congress:1 "Parlament"
 ROM_congress_desc:1 "Die Legislative hat ihre eigenen Regeln und Vorstellungen. Wir müssen mit ihr zusammenarbeiten, um die Dinge in die Tat umzusetzen. Es gibt jedoch Möglichkeiten, sicherzustellen, dass uns ein wohlwollendes und unterstützendes Parlament zur Seite steht."
