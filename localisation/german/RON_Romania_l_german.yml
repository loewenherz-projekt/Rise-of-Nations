 ROM_dismiss_volunteers:0 "Entlassen Sie die Freiwilligen"
 ROM_dismiss_volunteers_desc:0 "Mit dem Ende des Krieges haben diese Freiwilligen ihren Zweck erfüllt und sich das Recht verdient, ins Zivilleben zurückzukehren."
 ROM_raise_the_free_corps_tt:0 "Stellt loyalistische Infanterieeinheiten in Gebieten auf, die weiterhin in Regierungsbesitz sind."
 ROM_return_majority_tt:1 "Sorgt für eine komfortable Mehrheit im Parlament. Diese Mehrheit wird bei künftigen Wahlen wiederhergestellt, sollte sie zwischenzeitlich verloren gehen.\n"
