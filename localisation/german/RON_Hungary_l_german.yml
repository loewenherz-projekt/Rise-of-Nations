 hungary_flavor_elections.2.c:0 "Wählen Sie Miklós Kállay (NEP)."
 hungary_flavor_elections.2.e:0 "Wählen Sie den Kandidaten der unabhängigen Kleinbauern."
 
 hungary_flavor_elections.3.t:0 "Wahl von 1947"
 hungary_flavor_elections.3.d:0 "Die Wahlen von 1947 sind angebrochen. Die Partei der Nationalen Einheit (NEP) hat zwei mögliche Kandidaten – László Bárdossy und Miklós Kállay –, aber wir könnten uns für den weniger populären Kandidaten der Unabhängigen Kleinbauern entscheiden."
