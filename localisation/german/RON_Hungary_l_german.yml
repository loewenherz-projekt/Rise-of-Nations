 hungary_flavor_territory.410.d:0 "Wir haben uns bereits für die Integration des Burgenlandes entschieden, doch eines seiner Bundesländer, das Burgenland, ist erst vor kurzem in unseren Besitz übergegangen. Wir können dieses Bundesland auf unbestimmte Zeit von der Integration ausschließen, wenn wir das wünschen. Andernfalls wird die Integration des Bundeslandes schleunigst beginnen."
 hungary_flavor_territory.410.a:0 "Starten Sie den Integrationsprozess."
 hungary_flavor_territory.410.b:0 "Der Staat ist in Ordnung, so wie er ist."
 
 hungary_flavor_territory.411.t:0 "Burgenland verloren"
 hungary_flavor_territory.411.d:0 "Wir waren zu sehr mit der Integration des Burgenlandes beschäftigt und haben seine Verteidigung vergessen! Es ist nun in feindliche Hände gefallen, und die Integration ist somit gestoppt. Sobald wir es zurückerobert haben, können wir die Integration wieder aufnehmen."
 hungary_flavor_territory.411.a:0 "Wir werden es irgendwann zurücknehmen."
 
 hungary_flavor_territory.412.t:0 "Burgenland integriert"
 hungary_flavor_territory.412.d:0 "Unsere Integration im Burgenland ist gelungen. Die Bevölkerung ist nun bereit, eingezogen zu werden, als wäre sie unsere eigene. Der Staat ist noch weit davon entfernt, vollständig [Root.GetAdjective] zu sein, aber mit der Zeit wird sie assimiliert."
 hungary_flavor_territory.412.a:0 "Exzellent."
 
 hungary_flavor_territory.413.t:0 "Aufstand im Burgenland"
 hungary_flavor_territory.413.d:0 "Einige aufstrebende Separatisten im Burgenland haben zu den Waffen gegriffen, um sich von [Root.GetName] abzuspalten. Wir müssen sofort reagieren, wenn wir den Aufstand eindämmen wollen. Um uns den Aufwand zu sparen, könnten wir ihnen einfach gewähren oder versuchen, mit ihren Anführern zu verhandeln. Sie scheinen an regionaler Autonomie interessiert zu sein, ohne dass ihnen die Gefahr einer Integration droht."
 hungary_flavor_territory.413.a:0 "Lass sie gehen."
 hungary_flavor_territory.413.b:0 "Bekämpfe die Rebellen."
 hungary_flavor_territory.413.c:0 "Verhandeln Sie mit ihnen."
 
 hungary_flavor_territory.501.t:0 "Integration der böhmischen Region"
 hungary_flavor_territory.501.d:0 "Wir haben kürzlich Gebiete in Böhmen erworben, die historisch zu unserem Land gehören. Ein erheblicher Teil der Bevölkerung ist jedoch nicht [Root.GetAdjective], sodass wir sie nicht ohne weiteres zum Militärdienst einziehen können. Wir könnten die Dinge so belassen, wie sie sind, und lediglich die Ressourcen und die industrielle Kapazität der Region nutzen oder mit der Integration beginnen, sodass sie schließlich ein vollwertiger Teil unseres Landes wird. Sollten wir uns für die Integration der Region entscheiden, müssten wir dafür zwar Ressourcen bereitstellen, und unsere Verwaltungskapazität würde darunter leiden, aber am Ende könnte sich das alles lohnen."
 hungary_flavor_territory.501.a:0 "Starten Sie den Integrationsprozess."
 hungary_flavor_territory.501.b:0 "Integrieren Sie die Region nicht."
 hungary_flavor_territory.501.c:0 "Entscheide dich später."
 
 hungary_flavor_territory.502.t:0 "Widerstand gegen die Integration in der böhmischen Region"
 hungary_flavor_territory.502.d:0 "Die Integration der böhmischen Region ist im Gange, doch einige Einheimische sind nicht bereit, mitzuarbeiten. Der Einsatz unserer Streitkräfte zur Gewährleistung der Zusammenarbeit würde das Problem lösen, könnte aber die Bevölkerung zu offenem Widerstand provozieren."
 hungary_flavor_territory.502.a:0 "Damit werden wir uns auseinandersetzen müssen."
 hungary_flavor_territory.502.b:0 "Lassen Sie es seinen Lauf nehmen."
 
