 hungary_flavor.213.d:0 "Leider war die Volksabstimmung über den Beitritt zur Initiative „Vereinigtes Land Ungarn“ in Kroatien nicht erfolgreich. Eine Mehrheit der Wähler äußerte den Wunsch, unabhängig von Ungarn zu bleiben, anstatt an der Zukunft der Karpatenbevölkerung teilzuhaben."
 hungary_flavor.213.a:0 "Vielleicht ist es für sie besser, indirekt regiert zu werden."
 hungary_flavor.213.b:0 "Das ist ein bedauerliches Ergebnis. Vielleicht werden sie mit der Zeit zur Vernunft kommen."
 
 hungary_flavor.214.t:0 "Burgenland stimmt bei Volksabstimmung mit Ja"
 hungary_flavor.214.d:0 "Das Projekt „Vereinigtes Land Ungarn“ hat heute einen Meilenstein erreicht: Die slowakische Volksabstimmung war erfolgreich. Die burgenländischen Länder werden von nun an ein integraler Bestandteil unseres Landes sein und ihre Bevölkerung wird als vollwertige Bürger der Nation angesehen."
 hungary_flavor.214.a:0 "Sehr gut. Ein Schritt näher an einem vereinten Vaterland."
 
 hungary_flavor.215.t:0 "Burgenland stimmt mit Nein zur Volksabstimmung"
 hungary_flavor.215.d:0 "Leider war die Volksabstimmung zum Beitritt zur Initiative „Vereinigtes Land Ungarn“ im Burgenland nicht erfolgreich. Eine Mehrheit der Wähler äußerte den Wunsch, unabhängig von Ungarn zu bleiben, anstatt an der Zukunft der Karpatenvölker teilzuhaben."
 hungary_flavor.215.a:0 "Vielleicht ist es für sie besser, indirekt regiert zu werden."
 hungary_flavor.215.b:0 "Das ist ein bedauerliches Ergebnis. Vielleicht werden sie mit der Zeit zur Vernunft kommen."
 
 hungary_flavor_territory.1.t:0 "Integration der Region Siebenbürgen"
 hungary_flavor_territory.1.d:0 "Wir haben kürzlich Gebiete in Siebenbürgen erworben, das historisch zu unserem Land gehört. Ein erheblicher Teil der Bevölkerung ist jedoch nicht [Root.GetAdjective], sodass wir sie nicht ohne weiteres zum Militärdienst einziehen können. Wir könnten die Dinge so belassen, wie sie sind, und lediglich die Ressourcen und die industrielle Kapazität der Region nutzen oder mit der Integration beginnen, sodass sie schließlich ein vollwertiger Teil unseres Landes wird. Sollten wir uns für die Integration der Region entscheiden, müssten wir dafür zwar Ressourcen bereitstellen, und unsere Verwaltungskapazität würde darunter leiden, aber am Ende könnte sich das alles lohnen."
 hungary_flavor_territory.1.a:0 "Starten Sie den Integrationsprozess."
 hungary_flavor_territory.1.b:0 "Integrieren Sie die Region nicht."
 hungary_flavor_territory.1.c:0 "Entscheide dich später."
 
 hungary_flavor_territory.2.t:0 "Widerstand gegen die Integration in Siebenbürgen"
 hungary_flavor_territory.2.d:0 "Die Integration der transsilvanischen Region ist im Gange, doch einige Einheimische sind nicht bereit, mitzuarbeiten. Der Einsatz unserer Streitkräfte zur Gewährleistung der Zusammenarbeit würde das Problem lösen, könnte aber zu offenem Widerstand der Bevölkerung führen."
 hungary_flavor_territory.2.a:0 "Damit werden wir uns auseinandersetzen müssen."
 hungary_flavor_territory.2.b:0 "Lassen Sie es seinen Lauf nehmen."
 
 hungary_flavor_territory.10.t:0 "Erwerb des Banats"
 hungary_flavor_territory.10.d:0 "Wir haben uns bereits für die Integration Siebenbürgens entschieden, doch einer seiner Staaten, das Banat, ist erst vor kurzem in unseren Besitz übergegangen. Wir können diesen Staat auf unbestimmte Zeit von der Integration ausschließen, wenn wir das wünschen. Andernfalls wird die Integration des Staates schleunigst beginnen."
 hungary_flavor_territory.10.a:0 "Starten Sie den Integrationsprozess."
 hungary_flavor_territory.10.b:0 "Der Staat ist in Ordnung, so wie er ist."
 
 hungary_flavor_territory.11.t:0 "Banat verlor"
 hungary_flavor_territory.11.d:0 "Wir waren zu sehr mit der Integration des Banats beschäftigt und haben seine Verteidigung vergessen! Es ist nun in feindliche Hände gefallen, und die Integration wurde somit gestoppt. Sobald wir es zurückerobert haben, können wir die Integration wieder aufnehmen."
 hungary_flavor_territory.11.a:0 "Wir werden es irgendwann zurücknehmen."
 
 hungary_flavor_territory.12.t:0 "Banat integriert"
 hungary_flavor_territory.12.d:0 "Unsere Integration im Banat war erfolgreich. Die Bevölkerung ist nun bereit, eingezogen zu werden, als wäre sie unsere eigene. Der Staat ist noch weit davon entfernt, vollständig [Root.GetAdjective] zu sein, aber mit der Zeit werden sie assimiliert."
 hungary_flavor_territory.12.a:0 "Exzellent."
 
 hungary_flavor_territory.13.t:0 "Aufstand im Banat"
 hungary_flavor_territory.13.d:0 "Einige aufstrebende Separatisten im Banat haben zu den Waffen gegriffen, um sich von [Root.GetName] abzuspalten. Wir müssen sofort reagieren, wenn wir den Aufstand eindämmen wollen. Um uns den Aufwand zu sparen, könnten wir ihnen einfach gewähren oder versuchen, mit ihren Anführern zu verhandeln. Sie scheinen an regionaler Autonomie interessiert zu sein, ohne dass ihnen die Gefahr einer Integration droht."
 hungary_flavor_territory.13.a:0 "Lass sie gehen."
 hungary_flavor_territory.13.b:0 "Bekämpfe die Rebellen."
 hungary_flavor_territory.13.c:0 "Verhandeln Sie mit ihnen."
 
