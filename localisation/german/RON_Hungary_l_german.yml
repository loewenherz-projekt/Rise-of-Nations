 horthy_inheritance.10.t:0 "István Horthy kommt bei Flugzeugabsturz ums Leben"
 horthy_inheritance.10.d:0 "Der Sohn unseres Regenten, István Horthy, ist bei einem Flugzeugabsturz tragisch ums Leben gekommen. Er befand sich auf seinem letzten Lufteinsatz an der Front, als sein Flugzeug eine Fehlfunktion hatte und vom Himmel stürzte. István hätte nach diesem Einsatz nach Hause zurückkehren sollen, was den Unfall verdächtig zufällig erscheinen lässt. Auf jeden Fall ist dies ein schwerer Verlust für unser Land und die Luftfahrt."
 horthy_inheritance.10.a:0 "Die Nation trauert mit der Familie Horthy."
 
 horthy_inheritance.11.t:0 "István Horthy überlebt Flugzeugabsturz"
 horthy_inheritance.11.d:0 "István Horthy, der Sohn des Regenten unseres Landes, hat einen Flugzeugabsturz an der Front überlebt. Er war zu Kriegsbeginn bei der Luftwaffe im Einsatz und sollte nach dem Absturz in die Heimat zurückkehren. Es gelang ihm, sich aus dem defekten Flugzeug zu katapultieren und mit dem Fallschirm in Sicherheit zu gelangen. Der Regent ist erleichtert, dass sein Sohn überlebt hat, drängt ihn aber, so schnell wie möglich nach Hause zurückzukehren."
 horthy_inheritance.11.a:0 "Bringen Sie ihn nach Hause, bevor noch Schlimmeres passiert."
 
 horthy_inheritance.12.t:0 "Die Frage nach Horthys Erbe"
 horthy_inheritance.12.d:0 "Der Tod von István Horthy ließ viele darüber nachdenken, was aus Horthys Position nach seinem Tod werden würde. Es ist kein Geheimnis, dass der alte Regent gelegentlich mit gesundheitlichen Problemen zu kämpfen hat und sich sein Zustand jederzeit verschlechtern könnte. Bisher ging man davon aus, dass sein Sohn die Regentschaft übernehmen würde, doch nun, da er tot ist, ist die Lage nicht mehr ganz klar."
 horthy_inheritance.12.a:0 "Ein Nachfolger wird gewählt."
 horthy_inheritance.12.b:0 "Darüber besteht noch kein Grund zur Sorge."
 
 horthy_inheritance.20.t:0 "Horthys Gesundheitszustand verschlechtert sich"
 horthy_inheritance.20.d:0 "Der Gesundheitszustand des Regenten war in letzter Zeit besorgniserregend, und er war kürzlich verdächtig lange krankgeschrieben. Viele spekulieren, dass er vielleicht kein weiteres Jahr durchhält, aber im Moment scheint es Horthy gut zu gehen."
 horthy_inheritance.20.a:0 "Wir müssen einen Nachfolger für ihn wählen."
 horthy_inheritance.20.b:0 "Ich bin sicher, es wird ihm gut gehen."
 horthy_inheritance.20.c:0 "Gut, dass die Nachfolge gesichert ist."
 
 horthy_inheritance.21.t:0 "Horthys Gesundheitszustand verschlechtert sich weiter"
 horthy_inheritance.21.d:0 "Mikós Horthy wurde diese Woche ins Krankenhaus eingeliefert und scheint sich seitdem noch nicht vollständig erholt zu haben. Er ist seitdem nicht mehr öffentlich aufgetreten, aber seine Berater sagten, er sehe nicht mehr so aus wie früher. Dem Regenten bleibt möglicherweise nicht mehr lange, bis er stirbt."
 horthy_inheritance.21.a:0 "Wir müssen einen Nachfolger für ihn wählen."
 horthy_inheritance.21.b:0 "Ich bin sicher, es wird ihm gut gehen."
 horthy_inheritance.21.c:0 "Gut, dass die Nachfolge gesichert ist."
 
 horthy_inheritance.22.t:0 "Horthy stirbt"
 horthy_inheritance.22.d:0 "Der Regent ist heute verstorben. Sein Herz gab schließlich auf, was jedoch nicht ganz unerwartet kam. Horthys Gesundheitszustand verschlechterte sich seit Jahren, es ist ehrlich gesagt eine Überraschung, dass er überhaupt so lange durchgehalten hat. Die Nation trauert um den Tod eines Führers, doch wir müssen in die Zukunft blicken und die Position des Nachfolgers sichern."
 horthy_inheritance.22.a:0 "Wir können diese Entscheidung nicht länger hinauszögern. Wir müssen einen Nachfolger wählen."
 horthy_inheritance.22.b:0 "Der Nachfolger soll seine ihm zustehende Position einnehmen."
 
 horthy_inheritance.23.t:0 "Horthy geht in den Ruhestand"
 horthy_inheritance.23.d:0 "Miklós Horthy, der seit dem Fall der Räterepublik als Regent des Königreichs Ungarn amtierte, hat aus gesundheitlichen Gründen seinen Rücktritt angekündigt. Sein Einfluss auf das Land ist unbestreitbar, und die Zeit wird zeigen, ob er zum Besseren war."
 horthy_inheritance.23.a:0 "Er hat dem Land gute Dienste geleistet. Es ist Zeit für seinen Nachfolger, die Macht zu übernehmen."
 
 horthy_inheritance.100.t:0 "Wahl von Horthys Nachfolger"
 horthy_inheritance.100.d:0 "Jüngste Ereignisse haben Zweifel an der Nachfolge von Miklós Horthy geweckt. Wir haben beschlossen, die Angelegenheit zu regeln und einen offiziellen Nachfolger für Horthys Position zu ernennen. Mehrere Kandidaten wurden in Betracht gezogen, darunter auch solche, die vom Regenten selbst vorgeschlagen wurden. Welchen sollen wir wählen?"
 horthy_inheritance.100.a:0 "Horthys Sohn, István Horthy."
 horthy_inheritance.100.b:0 "Horthys Enkel, István Horthy jr."
 horthy_inheritance.100.c:0 "Der italienische König Viktor Emanuel."
 horthy_inheritance.100.e:0 "Der deutsche Kronprinz Wilhelm."
 horthy_inheritance.100.f:0 "Das Oberhaupt der Habsburger-Dynastie, Otto."
 
 horthy_inheritance.101.t:0 "Wahl von Horthys Nachfolger"
 horthy_inheritance.101.d:0 "Der Regent ist tot, und nun ist es unausweichlich, dass wir uns auf einen Nachfolger einigen müssen. Die Entscheidung wurde lange genug hinausgezögert, als Horthy noch lebte. Es stehen mehrere Kandidaten zur Auswahl. Welchen werden wir wählen?"
 horthy_inheritance.101.a:0 "Horthys Sohn, István Horthy."
 horthy_inheritance.101.b:0 "Horthys Enkel, István Horthy jr."
 horthy_inheritance.101.c:0 "Der italienische König Viktor Emanuel."
 horthy_inheritance.101.e:0 "Der deutsche Kronprinz Wilhelm."
 horthy_inheritance.101.f:0 "Das Oberhaupt der Habsburger-Dynastie, Otto."
 
 horthy_inheritance.102.t:0 "Das neue Staatsoberhaupt"
 horthy_inheritance.102.d_istvan:0 "István Horthy hat offiziell die Regentschaft Ungarns übernommen und führt damit das Erbe seines Vaters fort. Das Volk begrüßte den Kriegshelden, nun ihr neuer Anführer, bei einer Parade in Budapest. Die Stimmung des neuen Regenten war bittersüß, da er noch immer den Tod seines Vaters betrauerte. Doch letztendlich müssen wir in die Zukunft blicken, nicht in die Vergangenheit."
 horthy_inheritance.102.d_istvan_jr:0 "Horthys junger Enkel István Horthy wurde heute zum neuen Staatsoberhaupt ernannt. Der Junge hat kaum eine Vorstellung davon, was mit ihm geschieht, doch ihm wurde die Herrschaft über ein ganzes Land übertragen. Ihm stehen zahlreiche Berater zur Seite, die ihn bis zu seiner Volljährigkeit vertreten werden. Manche im Land bezweifeln die Entscheidung des verstorbenen Regenten, ein Kind zu seinem Nachfolger zu ernennen, doch letztendlich war es sein Wunsch."
 horthy_inheritance.102.d_victor:0 "Der italienische König Viktor Emanuel wurde heute auch zum König von [Root.GetName] gekrönt. In Budapest fand eine große königliche Parade statt, an der die Nation feierte. Nach langen Jahren der Regentschaft hat das Land endlich wieder einen König."
 horthy_inheritance.102.d_wilhelm:0 "Der deutsche Kronprinz Wilhelm von Hohenzollern wurde heute zum König von [Root.GetName] gekrönt. Zur Feier des Tages fand in Budapest eine große königliche Parade statt. Nach langen Jahren der Regentschaft hat das Land endlich wieder einen König."
 horthy_inheritance.102.d_otto:0 "Das Oberhaupt der Habsburger-Dynastie, Otto von Habsburg, wurde heute zum König von [Root.GetName] gekrönt. Zur Feier des Tages fand in Budapest eine große königliche Parade statt. Nach langen Jahren der Regentschaft hat das Land endlich wieder einen König."
 horthy_inheritance.102.a:0 "Möge er lange regieren!"
 
 horthy_inheritance.110.t:0 "Viktor Emanuel nimmt die Krone entgegen"
 horthy_inheritance.110.d:0 "Der König von Italien, Viktor Emanuel, hat unser Angebot angenommen, Horthy nach dem Tod des Regenten als Staatsoberhaupt der Nation nachzufolgen."
 horthy_inheritance.110.a:0 "Wir werden die notwendigen Vorkehrungen treffen."
 
 horthy_inheritance.111.t:0 "Viktor Emanuel kann die ungarische Krone nicht annehmen"
 horthy_inheritance.111.d:0 "Die Antwort aus Italien ist eingetroffen. [ITA.GetLeader] hat unser Angebot im Namen von Viktor Emanuel höflich abgelehnt und erklärt, dass der König in Italien Pflichten habe, die er nicht zugunsten Ungarns aufgeben könne. Der König werde Horthy nicht nachfolgen können."
 horthy_inheritance.111.a:0 "Lassen Sie uns dann unsere Optionen prüfen."
 
 horthy_inheritance.112.t:0 "Viktor Emanuel ist nicht mehr für den ungarischen Thron qualifiziert"
 horthy_inheritance.112.d:0 "Da wir uns nun mit [ITA.GetName] im Krieg befinden, wurden unsere Pläne, Viktor Emanuel nach Horthys unvermeidlichem Tod auf den ungarischen Thron zu wählen, vereitelt."
 horthy_inheritance.112.a:0 "Wir werden dann jemand anderen wählen."
 
 horthy_inheritance.120.t:0 "Wilhelm von Hohenzollern nimmt die Krone entgegen"
 horthy_inheritance.120.d:0 "Der deutsche Kronprinz Wilhelm von Hohenzollern hat unser Angebot angenommen, Horthy nach dem Tod des Regenten als Staatsoberhaupt der Nation nachzufolgen."
 horthy_inheritance.120.a:0 "Wir werden die notwendigen Vorkehrungen treffen."
 
 horthy_inheritance.121.t:0 "Wilhelm von Hohenzollern konnte die ungarische Krone nicht annehmen"
 horthy_inheritance.121.d:0 "Aus Deutschland ist eine Antwort eingetroffen. Sie trägt nicht die Unterschrift des Kronprinzen, sondern die eines Staatsbeamten, der in seinem Namen schreibt. In dem Antwortschreiben heißt es, Wilhelm könne das Angebot nicht annehmen, da er in diesen Zeiten des Konflikts verpflichtet sei, zu bleiben und für sein Vaterland zu kämpfen."
 horthy_inheritance.121.a:0 "Lassen Sie uns dann unsere Optionen prüfen."
 
 horthy_inheritance.122.t:0 "Wilhelm von Hohenzollern hat keinen Anspruch mehr auf den ungarischen Thron"
 horthy_inheritance.122.d:0 "Da wir uns nun mit [GER.GetName] im Krieg befinden, wurden unsere Pläne, Wilhelm von Hohenzollern nach Horthys unvermeidlichem Tod auf den ungarischen Thron zu wählen, vereitelt."
 horthy_inheritance.122.a:0 "Wir werden dann jemand anderen auswählen."
 
