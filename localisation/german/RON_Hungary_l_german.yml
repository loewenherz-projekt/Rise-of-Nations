 hungary_flavor.210.a:0 "Sehr gut. Ein Schritt näher an einem vereinten Vaterland."
 
 hungary_flavor.211.t:0 "Siebenbürgen stimmt gegen Volksabstimmung"
 hungary_flavor.211.d:0 "Leider war die Volksabstimmung über den Beitritt zur Initiative „Vereinigtes Land Ungarn“ in Siebenbürgen nicht erfolgreich. Eine Mehrheit der Wähler äußerte den Wunsch, unabhängig von Ungarn zu bleiben, anstatt an der Zukunft der Karpatenbevölkerung teilzuhaben."
 hungary_flavor.211.a:0 "Vielleicht ist es für sie besser, indirekt regiert zu werden."
 hungary_flavor.211.b:0 "Das ist ein bedauerliches Ergebnis. Vielleicht werden sie mit der Zeit zur Vernunft kommen."
 
 hungary_flavor.212.t:0 "Kroatien stimmt für Volksabstimmung"
 hungary_flavor.212.d:0 "Das Projekt „Vereinigtes Ungarn“ hat heute einen Meilenstein erreicht: Die slowakische Volksabstimmung war erfolgreich. Die kroatischen Länder werden von nun an ein integraler Bestandteil unseres Landes sein und ihre Bevölkerung wird als vollwertige Bürger der Nation betrachtet."
 hungary_flavor.212.a:0 "Sehr gut. Ein Schritt näher an einem vereinten Vaterland."
 
