 #Leader descriptions
 POLITICS_OTTO_I_AHU_DESC:0 "Otto von Habsburg war nach der Auflösung des Kaiserreichs im Jahr 1918 nur noch dem Namen nach Kronprinz von Österreich-Ungarn. In diesen Zeiten politischer Unruhen forderten ihn die Menschen in Österreich und Ungarn auf, die beiden Länder wieder zu vereinen."
 POLITICS_OTTO_I_HUN_DESC:0 "Otto von Habsburg war nach der Auflösung des Kaiserreichs im Jahr 1918 nur noch dem Namen nach Kronprinz von Österreich-Ungarn. Als sein Vater Karl 1922 starb, wählte ihn das Königreich Ungarn zum König, als Bedarf an einem neuen Monarchen entstand."
 POLITICS_FERENC_SZALASI_DESC:0 "Ferenc Szálasi wurde von der deutschen Regierung eingesetzt, um die Loyalität und Zusammenarbeit der Ungarn während des Krieges sicherzustellen."
 POLITICS_MIKLOS_HORTHY_KING_DESC:0 "Miklós Horthy war Konteradmiral der österreichisch-ungarischen Marine. Nach dem Zerfall des Kaiserreichs und der Machtübernahme der Ungarischen Räterepublik war er jedoch einer der Organisatoren der konterrevolutionären Armee in Szeged. Er spielte eine wichtige Rolle bei der Wiederherstellung der ungarischen Monarchie und übernahm schließlich die Regentschaft. Heute regiert er als neu gewählter König Ungarns und beendet damit eine lange Periode ausländischer Monarchen auf dem ungarischen Thron."
 POLITICS_MATYAS_RAKOSI_DESC:0 "Rákosi war nach dem Ende des Zweiten Weltkriegs Generalsekretär der Ungarischen Kommunistischen Partei. Seine Herrschaft war geprägt von einem radikalen Kommunismus und einem Personenkult, ähnlich dem Stalins. Das inoffizielle Motto seines Systems lautete: „Wer nicht für uns ist, ist gegen uns.“ Im Gegensatz zum späteren System von János Kádár, das den freundlicheren Ansatz verfolgte: „Wer nicht gegen uns ist, ist für uns.“"
 POLITICS_ENDRE_BAJCSY_ZSILINSZKY_DESC:0 "Bajcsy Zsilinszky war ein rechtsgerichteter Demokrat im Vorkriegsungarn. Er war ein entschiedener Gegner der deutschen Expansionspolitik und verabscheute eine Allianz mit Hitlers Achsenmächten."
 POLITICS_JANOS_KADAR_DESC:0 "Historisch gesehen war Kádár der Nachfolger von Mátyás Rákosi und vertrat leicht andere Ansichten als sein Vorgänger. Während Rákosis System vom Hardliner-Kommunismus geprägt war, gilt Kádárs System als „Schaufensterkommunismus“, was bedeutet, dass es dem Westen den kommunistischen Wohlstand vor Augen führte. Seine Herrschaft wurde von vielen geschätzt, doch das System war aufgrund der enormen Kredite, die das Land aufnehmen musste, um es zu finanzieren, nicht nachhaltig."
 POLITICS_ISTVAN_HORTHY_DESC:0 "István Horthy ist der Sohn des ehemaligen Regenten Miklós Horthy. Seine politischen Ansichten sind gemäßigt, tendieren aber leicht nach Westen. Er diente in der ungarischen Luftwaffe als Kampfpilot und überlebte bei seinem letzten Einsatz einen gefährlichen Unfall."
 POLITICS_ISTVAN_HORTHY_JR_DESC:0 "Der Sohn des verstorbenen István Horthy und Enkel des ehemaligen Regenten Miklós Horthy ist noch ein Kind, dem die Regierung eines ganzen Landes übertragen wurde. Derzeit wird er von einem Rat geleitet, der bis zu seiner Volljährigkeit an seiner Stelle regiert."
 POLITICS_VICTOR_EMMANUEL_DESC:0 "Viktor Emanuel ist König von Italien und nun auch von Ungarn. Er wurde zum Nachfolger Horthys gewählt und hat dieses Amt nun inne. Seine politischen Ansichten sind eher liberal, doch in Italien konnte er sie nicht durchsetzen, da er dort hauptsächlich als Galionsfigur fungierte."
 POLITICS_WILHELM_HOHENZOLLERN_HUN_DESC:0 "Wilhelm von Hohenzollern war der Kronprinz des ehemaligen Deutschen Reiches und nun auch König von Ungarn. Er kämpfte im Ersten Weltkrieg und wurde nach der Niederlage des Reiches verbannt, kehrte aber nach Deutschland zurück. Er engagierte sich in gewissem Maße in der deutschen Politik, erlangte jedoch nie große Bekanntheit. Als König von Ungarn hat er nun die Fähigkeit, das Schicksal einer Nation zu lenken, wie sein Vater vor ihm."
 POLITICS_BELA_KUN_DESC:0 "Béla Kun war einer der prominentesten Politiker der Ungarischen Räterepublik, die nach dem Zusammenbruch der österreichisch-ungarischen Monarchie entstand. Da die vorherige Regierung angesichts der einfallenden Entente-Mächte die Armee auflöste, war die kommunistische Republik zum Scheitern verurteilt. Kun ist nun nach Ungarn zurückgekehrt, um erneut zu versuchen, seinen Traum von einem kommunistischen Land im Karpatenbecken zu verwirklichen."
 POLITICS_MIHALY_KAROLYI_DESC:0 "Mihály Károlyi war von 1918 bis 1919 Ministerpräsident und Präsident der Ungarischen Räterepublik. Nach dem Zusammenbruch des kurzlebigen kommunistischen Staates emigrierte er. Als scharfer Kritiker der Horthy-Regierung wurde er 1923 zum Staatsfeind erklärt. Nach der Wiederherstellung und erneuten Niederlage des kommunistischen Regimes in Ungarn halfen ihm seine Verbindungen im Ausland, einen Platz für eine Exilregierung auszuhandeln."

 #Bookmark descriptions
 HUN_GATHERING_STORM_DESC:0 "Ungarn erlangte im Ersten Weltkrieg nach langer Fremdherrschaft seine Unabhängigkeit und war damit wieder Herr seines eigenen Schicksals. Der Vertrag von Trianon bescherte dem Land ein Drittel seines früheren Territoriums und die Hälfte seiner früheren Bevölkerung. Viele würden die alten Grenzen gerne wieder herstellen, doch die umliegenden Nationen sind nicht kompromissbereit. Es gibt zwar noch Anhänger der alten Habsburgermonarchie, aber auch kommunistische und liberale Ideen haben sich im Land etabliert.\n\nDie nächsten Jahre könnten das Schicksal Ungarns für den Rest des Jahrhunderts entscheiden."
 HUN_BLITZKRIEG_DESC:0 "In den letzten Jahren wurden die Südslowakei und die Karpatenruthenien an das Königreich Ungarn zurückgegeben. Mit deutscher Unterstützung versucht die Regierung nun, eine Neuordnung der rumänischen Grenzen auszuhandeln, und es sieht so aus, als ob Rumänien unter deutscher Vermittlung zur Kooperation bereit wäre. Ungarn gerät langsam unter den Einfluss des Dritten Reichs und wird unweigerlich in den kommenden Konflikt hineingezogen. Nur die Zeit wird zeigen, ob Ungarn siegreich aus dem Krieg hervorgeht und verlorene Gebiete zurückgewinnt oder ob es besiegt wird und mehr verliert als je zuvor."
 
