 hungary_flavor_territory.1023.b:0 "Bekämpfe die Rebellen."
 hungary_flavor_territory.1023.c:0 "Verhandeln Sie mit ihnen."
 
 hungary_flavor_elections.1.t:0 "Wahl von 1939"
 hungary_flavor_elections.1.d:0 "Die Wahlen von 1939 sind angebrochen. Die Nationale Einheitspartei (NEP) hat zwei mögliche Kandidaten – Pál Teleki und István Bethlen –, aber wir könnten uns für den weniger populären Kandidaten der Unabhängigen Kleinbauern entscheiden."
 hungary_flavor_elections.1.a:0 "Behalten Sie den derzeitigen Premierminister."
 hungary_flavor_elections.1.b:0 "Wählen Sie Pál Teleki (NEP)."
 hungary_flavor_elections.1.c:0 "Wählen Sie István Bethlen (NEP)."
 hungary_flavor_elections.1.e:0 "Wählen Sie den Kandidaten der unabhängigen Kleinbauern."
 
 hungary_flavor_elections.2.t:0 "Wahl von 1943"
 hungary_flavor_elections.2.d:0 "Die Wahlen von 1943 sind angebrochen. Die Partei der Nationalen Einheit (NEP) hat zwei mögliche Kandidaten – László Bárdossy und Miklós Kállay –, aber wir könnten uns für den weniger populären Kandidaten der Unabhängigen Kleinbauern entscheiden."
 hungary_flavor_elections.2.a:0 "Behalten Sie den derzeitigen Premierminister."
