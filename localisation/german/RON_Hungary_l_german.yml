 hungary_flavor_territory.143.d:0 "Einige aufstrebende Separatisten in Sobrance haben zu den Waffen gegriffen, um sich von [Root.GetName] abzuspalten. Wir müssen sofort reagieren, wenn wir den Aufstand eindämmen wollen. Um uns den Aufwand zu sparen, könnten wir ihnen einfach gewähren oder versuchen, mit ihren Anführern zu verhandeln. Sie scheinen an regionaler Autonomie interessiert zu sein, ohne dass ihnen die Gefahr einer Integration droht."
 hungary_flavor_territory.143.a:0 "Lass sie gehen."
 hungary_flavor_territory.143.b:0 "Bekämpfe die Rebellen."
 hungary_flavor_territory.143.c:0 "Verhandeln Sie mit ihnen."
 
 hungary_flavor_territory.201.t:0 "Integration der kroatischen Region"
 hungary_flavor_territory.201.d:0 "Wir haben kürzlich Gebiete in der kroatischen Region erworben, die historisch zu unserem Land gehört. Ein erheblicher Teil der Bevölkerung ist jedoch nicht [Root.GetAdjective], sodass wir sie nicht ohne Weiteres zum Militärdienst einziehen können. Wir könnten die Dinge so belassen, wie sie sind, und lediglich die Ressourcen und die industrielle Kapazität der Region nutzen oder mit der Integration beginnen, sodass sie schließlich ein vollwertiger Teil unseres Landes wird. Sollten wir uns für die Integration der Region entscheiden, müssten wir dafür zwar Ressourcen bereitstellen, und unsere Verwaltungskapazität würde darunter leiden, aber am Ende könnte sich das alles lohnen."
 hungary_flavor_territory.201.a:0 "Starten Sie den Integrationsprozess."
 hungary_flavor_territory.201.b:0 "Integrieren Sie die Region nicht."
 hungary_flavor_territory.201.c:0 "Entscheide dich später."
 
 hungary_flavor_territory.202.t:0 "Widerstand gegen die Integration in der kroatischen Region"
 hungary_flavor_territory.202.d:0 "Die Integration der kroatischen Region ist im Gange, doch einige Einheimische sind nicht bereit, mitzuarbeiten. Der Einsatz unserer Streitkräfte zur Gewährleistung der Zusammenarbeit würde das Problem lösen, könnte aber die Bevölkerung zu offenem Widerstand provozieren."
 hungary_flavor_territory.202.a:0 "Damit werden wir uns auseinandersetzen müssen."
 hungary_flavor_territory.202.b:0 "Lassen Sie es seinen Lauf nehmen."
 
 hungary_flavor_territory.210.t:0 "Erwerb Slawoniens"
 hungary_flavor_territory.210.d:0 "Wir haben uns bereits für die Integration der kroatischen Region entschieden, doch einer ihrer Staaten, Slawonien, ist erst vor kurzem in unseren Besitz übergegangen. Wir können diesen Staat auf unbestimmte Zeit von der Integration ausschließen, wenn wir das wünschen. Andernfalls wird die Integration des Staates schleunigst beginnen."
 hungary_flavor_territory.210.a:0 "Starten Sie den Integrationsprozess."
 hungary_flavor_territory.210.b:0 "Der Staat ist in Ordnung, so wie er ist."
 
 hungary_flavor_territory.211.t:0 "Slawonien verlor"
 hungary_flavor_territory.211.d:0 "Wir waren zu sehr mit der Integration Slawoniens beschäftigt und haben seine Verteidigung vergessen! Es ist nun in feindliche Hände gefallen, und die Integration ist somit gestoppt. Sobald wir es zurückerobert haben, können wir die Integration wieder aufnehmen."
 hungary_flavor_territory.211.a:0 "Wir werden es irgendwann zurücknehmen."
 
 hungary_flavor_territory.212.t:0 "Slawonien integriert"
 hungary_flavor_territory.212.d:0 "Unsere Integration in Slawonien war erfolgreich. Die Bevölkerung ist nun bereit, eingezogen zu werden, als wäre sie unsere eigene. Der Staat ist noch weit davon entfernt, vollständig [Root.GetAdjective] zu sein, aber mit der Zeit werden sie assimiliert."
