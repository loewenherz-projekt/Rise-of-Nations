 hungary_flavor_territory.710.d:0 "Wir haben uns bereits für die Integration der slowenischen Region entschieden, doch einer ihrer Staaten, Slowenien, ist erst vor kurzem in unseren Besitz übergegangen. Wir können diesen Staat auf unbestimmte Zeit von der Integration ausschließen, wenn wir das wünschen. Andernfalls wird die Integration des Staates schleunigst beginnen."
 hungary_flavor_territory.710.a:0 "Starten Sie den Integrationsprozess."
 hungary_flavor_territory.710.b:0 "Der Staat ist in Ordnung, so wie er ist."
 
 hungary_flavor_territory.711.t:0 "Slowenien verlor"
 hungary_flavor_territory.711.d:0 "Wir waren zu sehr mit der Integration Sloweniens beschäftigt und haben vergessen, es zu verteidigen! Es ist nun in die Hände des Feindes gefallen, und die Integration wurde somit gestoppt. Sobald wir es zurückerobert haben, können wir die Integration wieder aufnehmen."
 hungary_flavor_territory.711.a:0 "Wir werden es irgendwann zurücknehmen."
 
 hungary_flavor_territory.712.t:0 "Slowenien integriert"
 hungary_flavor_territory.712.d:0 "Unsere Integration in Slowenien war erfolgreich. Die Bevölkerung ist nun bereit, eingezogen zu werden, als wäre sie unsere eigene. Der Staat ist noch weit davon entfernt, vollständig [Root.GetAdjective] zu sein, aber mit der Zeit werden sie assimiliert."
 hungary_flavor_territory.712.a:0 "Exzellent."
 
 hungary_flavor_territory.713.t:0 "Aufstand in Slowenien"
 hungary_flavor_territory.713.d:0 "Einige aufstrebende Separatisten in Slowenien haben zu den Waffen gegriffen, um sich von [Root.GetName] abzuspalten. Wir müssen sofort reagieren, wenn wir den Aufstand eindämmen wollen. Um uns den Aufwand zu sparen, könnten wir ihnen einfach gewähren oder versuchen, mit ihren Anführern zu verhandeln. Sie scheinen an regionaler Autonomie interessiert zu sein, ohne dass ihnen die Gefahr einer Integration droht."
 hungary_flavor_territory.713.a:0 "Lass sie gehen."
 hungary_flavor_territory.713.b:0 "Bekämpfe die Rebellen."
 hungary_flavor_territory.713.c:0 "Verhandeln Sie mit ihnen."
 
