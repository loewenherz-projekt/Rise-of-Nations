 hungary_flavor_territory.801.t:0 "Integration der Region Istrien &amp; Südtirol"
 hungary_flavor_territory.801.d:0 "Wir haben kürzlich Gebiete in Istrien und Südtirol erworben, die historisch zu unserem Land gehören. Ein erheblicher Teil der Bevölkerung ist jedoch nicht [Root.GetAdjective], sodass wir sie nicht einfach zum Militärdienst einziehen können. Wir könnten die Dinge so belassen, wie sie sind, und lediglich die Ressourcen und die industrielle Kapazität der Region nutzen oder den Integrationsprozess einleiten, sodass sie schließlich ein vollwertiger Teil unseres Landes werden. Wenn wir uns für die Integration der Region entscheiden, müssten wir dafür zwar Ressourcen bereitstellen, und unsere Verwaltungskapazität würde darunter leiden, aber am Ende könnte sich das alles lohnen."
 hungary_flavor_territory.801.a:0 "Starten Sie den Integrationsprozess."
 hungary_flavor_territory.801.b:0 "Integrieren Sie die Region nicht."
 hungary_flavor_territory.801.c:0 "Entscheide dich später."
 
 hungary_flavor_territory.802.t:0 "Widerstand gegen die Integration in der Region Istrien und Südtirol"
 hungary_flavor_territory.802.d:0 "Die Integration der Region Istrien und Südtirol ist im Gange, doch einige Einheimische sind nicht bereit, mitzuarbeiten. Der Einsatz unserer Streitkräfte zur Gewährleistung der Zusammenarbeit würde das Problem lösen, könnte aber die Bevölkerung zu offenem Widerstand provozieren."
 hungary_flavor_territory.802.a:0 "Damit werden wir uns auseinandersetzen müssen."
 hungary_flavor_territory.802.b:0 "Lassen Sie es seinen Lauf nehmen."
 
 hungary_flavor_territory.810.t:0 "Übernahme von Südtirol"
 hungary_flavor_territory.810.d:0 "Wir haben uns bereits für die Integration der Region Istrien und Südtirol entschieden, doch eines ihrer Bundesländer, Südtirol, ist erst vor Kurzem in unseren Besitz übergegangen. Wir können dieses Bundesland auf unbestimmte Zeit von der Integration ausschließen, wenn wir das wünschen. Andernfalls wird die Integration des Landes zügig beginnen."
 hungary_flavor_territory.810.a:0 "Starten Sie den Integrationsprozess."
 hungary_flavor_territory.810.b:0 "Der Staat ist in Ordnung, so wie er ist."
 
 hungary_flavor_territory.811.t:0 "Südtirol verloren"
 hungary_flavor_territory.811.d:0 "Wir waren zu sehr mit der Integration Südtirols beschäftigt und haben die Verteidigung vergessen! Südtirol ist nun in feindliche Hände gefallen, und die Integration ist somit gestoppt. Sobald wir Südtirol zurückerobert haben, können wir die Integration wieder aufnehmen."
