 #German decisions
 GER_give_ljubljana_to_italy:0 "Gib Ljubljana an Italien"
 GER_give_ljubljana_to_italy_desc:0 "Italien, unser Verbündeter, hat offiziell Anspruch auf Ljubljana erhoben, das uns gehört. Wenn wir unsere guten Beziehungen zu Italien bewahren wollen, sollten wir es vielleicht aufgeben."
 GER_return_vojvodina_to_hungary:0 "Rückgabe der Vojvodina an Ungarn"
 GER_return_vojvodina_to_hungary_desc:0 "Unsere ungarischen Verbündeten haben sich bereits Teile der Vojvodina gesichert, doch Torontal und Syrmien, die früher zu ihnen gehörten, kontrollieren wir noch immer. Sie wünschen sich sicherlich, dass wir ihnen auch diese Gebiete zurückgeben."
 GER_access_to_poland_through_hungary:0 "Zugang nach Polen über Ungarn"
 GER_access_to_poland_through_hungary_desc:0 "Der Untergang Polens steht unmittelbar bevor. Könnten wir Polen sowohl von Süden als auch von Westen angreifen, würde es innerhalb weniger Tage fallen. Ungarn würde unseren Truppen sicherlich den Durchzug nach Polen gestatten. Es liegt nicht in seinem Interesse, uns irgendwelche Gefälligkeiten zu verweigern."
 GER_request_danzig_and_posen:0 "Anfrage Danzig und Posen"
 GER_request_danzig_and_posen_desc:0 "Da wir nun mit Polen verbündet sind, werden sie uns sicherlich zustimmen, dass wir die jahrhundertealten Streitigkeiten um den Besitz von Danzig und Posen beilegen müssen."
 
 #Romanian decisions
 ROM_charles_line:0 "Bauen Sie die Charles-Linie"
 ROM_charles_line_desc:0 "Frankreich hat an der deutschen Grenze eine beeindruckende Befestigungslinie errichtet, die sogenannte Maginot-Linie. Wir sollten diesem Beispiel folgen und unsere Westgrenze gegen Ungarn sichern. Die Linie soll Siebenbürgen vor einem möglichen Angriff schützen und uns genügend Raum geben, die Ungarn zurückzudrängen, falls sie uns angreifen wollen."
 
 #Czechoslovakian decisions
 HUN_rename_the_country:0 "Benennen Sie das Land um"
 HUN_rename_the_country_desc:0 "Da uns kein Teil der Slowakei mehr gehört, wäre es angebracht, das Land diesen Änderungen entsprechend umzubenennen."
 
 #Generic decisions 
 HUN_back_out_from_enforcing_the_treaty_of_trianon:0 "Rückzug aus der Durchsetzung des Vertrags von Trianon"
 HUN_back_out_from_enforcing_the_treaty_of_trianon_desc:0 "Bisher waren wir die Hauptbefürworter des Vertrags von Trianon. Ziel des Vertrags war es, die Wiedererrichtung Österreich-Ungarns und den ungarischen Revisionismus zu verhindern. Seit seinem Inkrafttreten hat sich viel verändert, und es ist vielleicht an der Zeit, dass wir uns von seiner Durchsetzung zurückziehen."
 
