 HUN_gyori_program_category:0 "Gyôri-Programm"
 HUN_gyori_program_category_desc:0 "Das Gyôri-Programm ist ein von Béla Imrédy vorgeschlagenes Wirtschafts- und Militärreformprogramm. Ziel des Programms ist die Modernisierung der ungarischen Industrie, Verteidigung, Armee und Luftwaffe. Geplant ist eine Umsetzung in verschiedenen Phasen, wobei sich jedes Mal ein anderer Aspekt konzentriert."
