 HUN_trianon_treaty_enforcement_category:0 "Durchsetzung des Trianon-Vertrags"
 HUN_trianon_treaty_enforcement_category_desc:0 "[ROOT.TrianonEnforcementDescription]"
 HUN_TRIANON_ENFORCEMENT_ACTIVE:0 "Unsere revisionistischen Bemühungen bleiben nicht unbemerkt. Der Vertrag von Trianon schwebt noch immer über unseren Köpfen, und die Mächte, die ihn uns aufgezwungen haben, sind entschlossen, unsere Bemühungen einzudämmen."
 HUN_TRIANON_ENFORCEMENT_INACTIVE:0 "Obwohl der Vertrag von Trianon mittlerweile allgemein als ungültig angesehen wird, beobachten uns seine ursprünglichen Vollstrecker noch immer aufmerksam und versuchen, die Ausbreitung von [Root.GetName] einzuschränken."
 HUN_trianon_responsible:0 "[Root.GetNameDefCap] ist derzeit für die Durchsetzung des Vertrags von Trianon verantwortlich.\n"
 HUN_united_lands_hungaria_category:0 "Vereinigte Länder Ungarn"
 
 HUN_integrating_transylvania_region_category:0 "Integration Siebenbürgens"
 HUN_integrating_transylvania_region_category_desc:0 "Die Region Siebenbürgen war einst Teil unseres Landes, wurde uns jedoch inzwischen entrissen, und ihre Bewohner fühlen sich nicht mehr als unsere eigenen. Wenn wir die vollständige Kontrolle über die Gebiete Siebenbürgens zurückgewinnen wollen, müssen wir ernsthafte Maßnahmen zu ihrer Integration ergreifen."
 HUN_integrating_slovakia_region_category:0 "Integration der Slowakei"
 HUN_integrating_slovakia_region_category_desc:0 "Die Slowakei war einst Teil unseres Landes, wurde uns jedoch inzwischen entrissen, und ihre Bevölkerung fühlt sich nicht mehr als unsere eigene Nation. Wenn wir die Gebiete wieder vollständig unter unsere Kontrolle bringen wollen, müssen wir ernsthafte Maßnahmen zu ihrer Integration ergreifen."
 HUN_integrating_croatia_region_category:0 "Integration Kroatiens"
 HUN_integrating_croatia_region_category_desc:0 "Die Region Kroatien war einst Teil unseres Landes, wurde uns jedoch inzwischen entrissen, und die Menschen dort identifizieren sich nicht mehr als unsere eigenen. Wenn wir die volle Kontrolle über die kroatischen Gebiete zurückgewinnen wollen, müssen wir ernsthafte Maßnahmen zu ihrer Integration ergreifen."
 HUN_integrating_vojvodina_region_category:0 "Integration der Vojvodina"
 HUN_integrating_vojvodina_region_category_desc:0 "Die Region Vojvodina war einst Teil unseres Landes, wurde uns jedoch inzwischen entrissen, und ihre Bevölkerung identifiziert sich nicht mehr als eines der unseren. Wenn wir die vollständige Kontrolle über ihre Gebiete zurückgewinnen wollen, müssen wir ernsthafte Maßnahmen zu ihrer Integration ergreifen."
 HUN_integrating_burgenland_region_category:0 "Integration des Burgenlandes"
 HUN_integrating_burgenland_region_category_desc:0 "Das Burgenland war einst Teil unseres Landes, wurde uns jedoch inzwischen entrissen, und seine Bevölkerung fühlt sich nicht mehr als eines der unseren. Wenn wir die Gebiete wieder vollständig in unsere Hände nehmen wollen, müssen wir ernsthafte Maßnahmen zu seiner Integration ergreifen."
 HUN_integrating_bohemia_region_category:0 "Integration Böhmens"
 HUN_integrating_bohemia_region_category_desc:0 "Die Region Böhmen war einst Teil unserer Nation, wurde uns jedoch inzwischen entrissen, und ihre Bevölkerung fühlt sich nicht mehr als eine der unseren. Wenn wir die volle Kontrolle über ihre Gebiete zurückgewinnen wollen, müssen wir ernsthafte Maßnahmen zu ihrer Integration ergreifen."
 HUN_integrating_galicia_lodomeria_region_category:0 "Integration Galizien-Lodomeriens"
 HUN_integrating_galicia_lodomeria_region_category_desc:0 "Die Region Galizien-Lodomerien war einst Teil unseres Landes, wurde uns jedoch inzwischen entrissen, und ihre Bewohner identifizieren sich nicht mehr als unsere eigenen. Wenn wir die Kontrolle über ihre Gebiete zurückgewinnen wollen, müssen wir ernsthafte Maßnahmen zu ihrer Integration ergreifen."
 HUN_integrating_slovenia_region_category:0 "Integration Sloweniens"
 HUN_integrating_slovenia_region_category_desc:0 "Die Region Slowenien war einst Teil unseres Landes, wurde uns jedoch inzwischen entrissen, und die Menschen dort fühlen sich nicht mehr als unsere eigenen. Wenn wir die Gebiete wieder vollständig unter unsere Kontrolle bringen wollen, müssen wir ernsthafte Maßnahmen zu ihrer Integration ergreifen."
 HUN_integrating_istria_south_tirol_region_category:0 "Integration Istrien &amp; Südtirol"
 HUN_integrating_istria_south_tirol_region_category_desc:0 "Die Gebiete Istrien und Südtirol gehörten einst zu unserem Land, wurden uns jedoch inzwischen weggenommen, und die Menschen dort fühlen sich nicht mehr als unsere eigenen. Wenn wir diese Gebiete wieder vollständig unter unsere Kontrolle bringen wollen, müssen wir ernsthafte Maßnahmen zu ihrer Integration ergreifen."
 HUN_integrating_bosnia_region_category:0 "Integration Bosniens"
 HUN_integrating_bosnia_region_category_desc:0 "Die Region Bosnien war einst Teil unseres Landes, wurde uns jedoch inzwischen entrissen, und die Menschen dort fühlen sich nicht mehr als unsere eigenen. Wenn wir die volle Kontrolle über die Gebiete Bosniens zurückgewinnen wollen, müssen wir ernsthafte Maßnahmen zu ihrer Integration ergreifen."
 HUN_integrating_bucovina_region_category:0 "Integration der Bukowina"
 HUN_integrating_bucovina_region_category_desc:0 "Die Region Bukowina war einst Teil unseres Landes, wurde uns jedoch inzwischen entrissen, und ihre Bewohner identifizieren sich nicht mehr als unsere eigenen. Wenn wir die volle Kontrolle über ihre Gebiete zurückgewinnen wollen, müssen wir ernsthafte Maßnahmen zu ihrer Integration ergreifen."
 
 #Hungarian decisions
 HUN_slovakian_self_governance:0 "Slowakische Selbstverwaltung"
 HUN_slovakian_self_governance_desc:0 "Die in unserem Land lebende slowakische Bevölkerung ist mit der Zentralregierung nicht ganz zufrieden. Wir könnten dieses Problem möglicherweise lindern, indem wir ihnen ein gewisses Maß an Autonomie gewähren."
 HUN_carpatho_ukarinian_self_governance:0 "Karpato-ukarinische Selbstverwaltung"
 HUN_carpatho_ukarinian_self_governance_desc:0 "Die Karpatenruthenien wird überwiegend von Ruthenen oder Russinen bewohnt. Diese ethnische Gruppe lebte lange Zeit unter ungarischer Herrschaft und genoss nie große Autonomie. Nach dem Ersten Weltkrieg versuchten sie, eine eigene Regierung zu bilden, wurden aber schließlich von der Tschechoslowakei annektiert. Indem wir ihnen eine gewisse Autonomie gewährten, könnten wir vielleicht mehr von ihnen für unsere Sache gewinnen."
 HUN_transylvanian_self_governance:0 "Siebenbürgische Selbstverwaltung"
 HUN_transylvanian_self_governance_desc:0 "Siebenbürgen hat während des größten Teils seiner Geschichte eine gewisse Autonomie genossen, sogar innerhalb des Königreichs Ungarn. Die Bevölkerung wünscht sich eine eigene Regierung, auch wenn diese innerhalb der Grenzen unseres Landes liegt."
 HUN_grant_autonomy_to_the_szeklers:0 "Gewähren Sie den Szeklern Autonomie"
 HUN_grant_autonomy_to_the_szeklers_desc:0 "Die Szekler sind eine relativ große Gruppe ethnischer Ungarn in Siebenbürgen. Da sie von anderen Nationalitäten umgeben sind, haben sie natürlich ein Bedürfnis nach Selbstverwaltung entwickelt. Wir könnten ihren Wunsch erfüllen und dem Szeklerland Autonomie gewähren, damit sie eine Regierung haben, die ihre Interessen wahrt."
 HUN_join_slovakia_and_carpathian_ruthenia:0 "Schließen Sie sich der Slowakei und Karpatenruthenien an"
 HUN_join_slovakia_and_carpathian_ruthenia_desc:0 "Die autonomen Regierungen der Slowakei und der Karpatenruthenien können allein wenig ausrichten. Würden die beiden Staaten unter einer Regierung vereint (natürlich weiterhin unter unserem Schutz), könnten sie zu einem einflussreicheren Akteur auf der Weltbühne werden."
 HUN_create_slovakia_ruthenia:0 "Gründung der Slowakei-Russland"
 HUN_create_slovakia_ruthenia_desc:0 "Die im neu geschaffenen slowakischen Staat lebenden Ruthenen haben ihre neue Nation noch nicht angenommen. Um diesen Prozess zu beschleunigen, könnten wir künstlich einen Staat schaffen, in dem sie den Slowaken gleichgestellt sind. Der Staat würde ähnlich funktionieren wie die Tschechoslowakei, nur diesmal dauerhaft."
 HUN_settle_the_sobrance_dispute:0 "Den Sobrance-Streit beilegen"
 HUN_settle_the_sobrance_dispute_desc:0 "Sobrance, eine kleine Provinz an der Grenze zwischen Karpatenruthenien und der Slowakei, ist seit kurzem umstrittenes Gebiet. Beide Länder behaupten, dass es ihnen rechtmäßig zusteht, und da beide unseren Schutz genießen, ist es unsere Aufgabe, in dieser Angelegenheit zu vermitteln."
 HUN_slovenia_for_burgenland:0 "Slowenien für das Burgenland"
 HUN_slovenia_for_burgenland_desc:0 "Slowenien gehört schon lange zu Österreich und möchte es sicherlich zurückhaben. Genauso wie wir das Burgenland von Österreich zurückhaben möchten. Wir könnten vielleicht einen Deal mit der österreichischen Regierung aushandeln und allen ihr rechtmäßiges Land zurückgeben."
 HUN_give_zaolzie_to_poland:0 "Gib Zaolzie nach Polen"
 HUN_give_zaolzie_to_poland_desc:0 "Unsere polnischen Freunde würden sich sicherlich freuen, Zaolzie zu empfangen, da es dort eine bedeutende polnische Bevölkerung gibt."
 HUN_choose_a_successor_for_horthy:0 "Wählen Sie einen Nachfolger für Horthy"
 HUN_choose_a_successor_for_horthy_desc:0 "Der Regent wird alt und gebrechlich. Sein Gesundheitszustand könnte sich jeden Tag verschlechtern, und die Frage seines Titels nach seinem Tod ist noch lange nicht geklärt. Wir könnten einen Nachfolger für sein Amt wählen, damit alle (einschließlich Horthy) beruhigt sein können, da seine Nachfolge gesichert ist."
 HUN_renounce_claims_towards_croatia:0 "Verzicht auf Ansprüche gegenüber Kroatien"
 HUN_renounce_claims_towards_croatia_desc:0 "Kroatien gehörte lange Zeit zu Ungarn, war jedoch immer etwas abgetrennt. Jetzt, da Kroatien endlich einen eigenen Staat hat, ist es vielleicht an der Zeit, Kroatien sein Schicksal selbst bestimmen zu lassen und auf unsere Ansprüche auf sein Territorium zu verzichten."
 HUN_fight_for_transylvania:0 "Kampf um Siebenbürgen"
 HUN_fight_for_transylvania_desc:0 "Rumänien ist in einen Krieg mit den Alliierten verwickelt. Dies ist der perfekte Zeitpunkt für uns, in den Krieg einzutreten, unter der Bedingung, dass wir nach dem Krieg Siebenbürgen bekommen."
 HUN_backa_oil_surveys:0 "Backa Öluntersuchungen"
 HUN_slovakia_oil_surveys:0 "Öluntersuchungen in der Slowakei"
 HUN_gyori_program_phase_1_prepare:0 "Vorbereitung der Phase I des Gyôri-Programms"
 HUN_gyori_program_phase_1_activate:0 "Aktivieren Sie Phase I des Gyôri-Programms"
 HUN_gyori_program_phase_2_prepare:0 "Vorbereitung der Phase II des Gyôri-Programms"
 HUN_gyori_program_phase_2_activate:0 "Aktivieren Sie Phase II des Gyôri-Programms"
 HUN_gyori_program_phase_3_prepare:0 "Vorbereitung der Phase III des Gyôri-Programms"
 HUN_gyori_program_phase_3_activate:0 "Aktivieren Sie Phase III des Gyôri-Programms"
 HUN_gyori_program_phase_4_prepare:0 "Vorbereitung von Phase IV des Gyôri-Programms"
 HUN_gyori_program_phase_4_activate:0 "Aktivieren Sie Phase IV des Gyôri-Programms"
 HUN_apply_for_miedzymorze_membership:0 "Beantragen Sie eine Miedzymorze-Mitgliedschaft"
 HUN_apply_for_miedzymorze_membership_desc:0 "Unsere alten Freunde, die Polen, haben ein eigenes Bündnis zwischen den beiden Großmächten Europas gegründet. Wenn wir uns keiner dieser beiden Mächte anschließen wollen, sollten wir vielleicht am besten den Schutz und die Freundschaft Polens suchen und die Mitgliedschaft in diesem Bündnis beantragen."
 HUN_apply_for_membership_in_the_novus_imperium_romanum:0 "Beantragen Sie die Mitgliedschaft im Novus Imperium Romanum"
 HUN_apply_for_membership_in_the_novus_imperium_romanum_desc:0 "Mussolinis Italien möchte den Ruhm des Römischen Reiches wiederherstellen und sucht Verbündete, die ihm dabei helfen. Wir könnten versuchen, bei ihnen Schutz zu suchen und die Mitgliedschaft in ihrer neuen Fraktion zu beantragen."
 HUN_free_the_austrian_workers:0 "Befreit die österreichischen Arbeiter"
 HUN_free_the_austrian_workers_desc:0 "Die Kommunistische Partei Österreichs hat sich geweigert, unserer geplanten Föderation beizutreten. Das bedeutet, dass wir das österreichische Proletariat gewaltsam befreien müssen, da sich seine sogenannten Führer weigern, ihre Ketten zu sprengen."
 HUN_free_the_czechoslovakian_workers:0 "Befreit die tschechoslowakischen Arbeiter"
 HUN_free_the_czechoslovakian_workers_desc:0 "Die kommunistische Partei der Tschechoslowakei hat sich geweigert, unserer geplanten Föderation beizutreten. Das bedeutet, dass wir das tschechoslowakische Proletariat gewaltsam befreien müssen, da sich seine sogenannten Führer weigern, ihre Ketten zu sprengen."
 HUN_free_the_yugoslavian_workers:0 "Befreit die jugoslawischen Arbeiter"
 HUN_free_the_yugoslavian_workers_desc:0 "Die kommunistische Partei Jugoslawiens hat sich geweigert, unserer geplanten Föderation beizutreten. Das bedeutet, dass wir das jugoslawische Proletariat gewaltsam befreien müssen, da sich seine sogenannten Führer weigern, ihre Ketten zu sprengen."
 HUN_free_the_romanian_workers:0 "Befreit die rumänischen Arbeiter"
 HUN_free_the_romanian_workers_desc:0 "Die kommunistische Partei Rumäniens hat sich geweigert, unserer vorgeschlagenen Föderation beizutreten. Das bedeutet, dass wir das rumänische Proletariat gewaltsam befreien müssen, da sich seine sogenannten Führer weigern, ihre Ketten zu sprengen."
 HUN_offer_union_to_poland:0 "Angebot der Union an Polen"
 HUN_offer_union_to_poland:0 "Polen nähert sich immer mehr der Niederlage, und ohne den Krieg würden wir wahrscheinlich nicht lange überleben. Wir werden ihnen eine politische Union anbieten, um die polnischen Streitkräfte weiter kämpfen zu lassen. Unsere Nationen waren im Mittelalter mehrfach vereint, und die Freundschaft zwischen unseren Völkern ist seither stark. Wir müssen hoffen, dass sie bereit sind, diesen Schritt zu gehen, um zu überleben."
 HUN_ozd_ironworks:0 "Eisenhüttenwerk Ózd"
 HUN_godollo_tank_factory:0 "Panzerfabrik Gödöllô"
 HUN_ford_car_factory:0 "Ford-Autofabrik"
 HUN_bofors_artillery_factory:0 "Bofors Artilleriefabrik"
 HUN_danube_aircraft_factory:0 "Donau-Flugzeugwerk"
 HUN_crda_hungaria:0 "CRDA Ungarn"
 HUN_the_arpad_line:0 "Bau der Árpád-Linie"
 HUN_the_arpad_line_desc:0 "Irgendwann müssen wir mit der Möglichkeit eines sowjetischen Angriffs aus dem Osten rechnen. Die Rote Armee muss direkt vor unserer Haustür, den Karpaten, gestoppt werden, sonst wird sie schnell durch unser Land vorrücken. Das Gelände in der Karpaten-Russland eignet sich hervorragend für den Bau einer starken Verteidigungslinie, die nach dem Oberhaupt der ungarischen Stämme, Árpád, als „Árpáden-Linie“ bekannt sein soll."
 HUN_eastern_extension:0 "Östliche Verlängerung der Árpád-Linie"
 HUN_eastern_extension_desc:0 "Wir sind jetzt von Nordosten her gut verteidigt, aber das neu eroberte Siebenbürgen ist schutzlos. Die Árpád-Linie muss nach Südosten verlängert werden, durch die gesamten Ostkarpaten, wenn wir uns gegen die Rote Armee verteidigen wollen."
 HUN_southern_extension:0 "Südliche Verlängerung der Árpád-Linie"
 HUN_southern_extension_desc:0 "Die Árpáden-Linie ist von Süden her schwach und würde im Falle eines Angriffs aus der walachischen Tiefebene schnell fallen. Die Linie muss in Richtung der südlichen Grenzen Siebenbürgens verlängert werden."
 HUN_northern_extension:0 "Nördliche Verlängerung der Árpád-Linie"
 HUN_northern_extension_desc:0 "Bei einem Angriff aus dem Norden könnte die Árpád-Linie leicht umgangen und von hinten angegriffen werden. Um ein solches Unglück zu verhindern, sollten wir die Linie in den Nordkarpaten ausbauen."
 HUN_establish_the_kingdom_of_ukraine:0 "Gründung des Königreichs Ukraine"
 HUN_establish_the_kingdom_of_ukraine_desc:0 "Die Ukraine wurde zu lange unter russischer Herrschaft unterdrückt. Wir verfügen nun über die Mittel, sie von der Besatzung zu befreien, und Wilhelm Franz von Habsburg, ein Verwandter des letzten Habsburger Kaisers, steht der ukrainischen Sache weiterhin positiv gegenüber. Wir könnten ihm helfen, in unseren kürzlich erworbenen ukrainischen Gebieten eine neue Regierung zu bilden."
 HUN_propose_polish_axis_membership:0 "Vorschlag für eine Mitgliedschaft in der polnischen Achse"
 HUN_propose_polish_axis_membership_desc:0 "Polen läuft Gefahr, von den benachbarten Großmächten verschluckt zu werden. Wenn wir unsere deutschen Verbündeten davon überzeugen könnten, sie in unsere Fraktion aufzunehmen, anstatt den Konflikt mit ihnen zu suchen, könnten wir gemeinsamen Feinden gemeinsam die Stirn bieten, und nichts könnte die Achsenmächte aufhalten!"
 HUN_air_defense_of_hungary:0 "Luftverteidigung Ungarns"
 HUN_air_defense_of_slovakia:0 "Luftverteidigung der Slowakei"
 HUN_air_defense_of_transylvania:0 "Luftverteidigung Siebenbürgens"
 HUN_air_defense_of_croatia:0 "Luftverteidigung Kroatiens"
 HUN_air_defense_of_austria:0 "Luftverteidigung Österreichs"
 HUN_air_defense_of_bohemia:0 "Luftverteidigung Böhmens"
 HUN_air_defense_of_galicia_lodomeria:0 "Luftverteidigung von Galizien-Lodomerien"
 HUN_buy_back_the_sms_novara:0 "SMS Novara zurückkaufen"
 HUN_buy_back_the_sms_novara_desc:0 "Die SMS Novara ist ein alter österreichisch-ungarischer Kreuzer, der nach dem Ersten Weltkrieg in französische Hände fiel. Obwohl sie in ihrem derzeitigen Zustand nicht kriegstauglich ist, könnten wir sie dennoch von Frankreich kaufen und für unsere neue Marine aufrüsten."
 HUN_retire_horthy:0 "Horthy in den Ruhestand schicken"
 HUN_retire_horthy_desc:0 "Der alte Admiral hat seine Zeit abgesessen. Es ist Zeit für ihn, in den Ruhestand zu gehen und seinem Nachfolger Platz zu machen."
 liberate_danubian_workers_in_country:0 "Befreit die Donauarbeiter in [From.GetNameDef]"
 HUN_appoint_a_romanian_leader_in_transylvania:0 "Ernennung eines rumänischen Führers in Siebenbürgen"
 HUN_appoint_a_romanian_leader_in_transylvania_desc:0 "Obwohl Siebenbürgen nun indirekt unter unserer Kontrolle steht, besteht ein erheblicher Teil der Bevölkerung noch immer aus Rumänen. Vielleicht sollten wir die Einsetzung eines ihnen wohlgesinnteren Führers in Erwägung ziehen, in der Hoffnung auf eine bessere Zusammenarbeit mit dem rumänischen Volk dort."
 HUN_expand_the_ludovica_academy:0 "Erweiterung der Ludovica-Akademie"
 HUN_expand_the_ludovica_academy_desc:0 "Die Ludovica-Akademie, eines unserer ältesten Militärinstitute, ist die wichtigste Quelle unserer Offiziersanwärter. Sowohl das Gebäude als auch das Institut selbst könnten verbessert werden, um eine umfassendere und bessere Ausbildung der Führung unserer Armee zu ermöglichen."
 HUN_recolor_subjects_to_fit_our_color:0 "Färben Sie Motive neu ein, damit sie zu unserer Farbe passen"
 HUN_recolor_subjects_to_fit_our_color_desc:0 "Durch diese Entscheidung werden die autonomen Untertanen Ungarns neu eingefärbt, sodass ihre Kartenfarbe an die Ungarns angepasst wird."
 HUN_pride_of_the_fleet:0 "Stolz der Flotte"
 HUN_pride_of_the_fleet_desc:0 "Wir sind nun bereit, die ungarische Flotte wiederzubeleben und die Meere für uns zu beanspruchen. Dazu müssen wir zunächst ein Schlachtschiff bauen, das als Herzstück der neuen Marine dienen wird."
 HUN_emergency_industrial_measures:0 "Industrielle Notfallmaßnahmen"
 HUN_emergency_industrial_measures_desc:0 "Um uns auf eine mögliche sowjetische Invasion vorzubereiten, müssen wir das letzte bisschen Produktion aus unserer Industrie herausholen, um gegen den roten Riesen eine Chance zu haben."
 HUN_italian_armament_loan:0 "Italienischer Rüstungskredit"
 HUN_italian_armament_loan_desc:0 "Aufgrund der Beschränkungen des Vertrags von Trianon ist unser Militär auf einen Konflikt völlig unvorbereitet. Vielleicht ist das politische Klima jetzt günstig für eine Planänderung. Wir könnten Italien um einen Rüstungskredit bitten, um den Wiederaufbau unserer Armee anzukurbeln."
 HUN_requisition_civilian_automobiles:0 "Anforderung ziviler Automobile"
 HUN_requisition_civilian_automobiles_desc:0 "Die Armee benötigt dringend Transportfahrzeuge, und ein Teil unserer Bevölkerung besitzt Autos. Es liegt in unserer Macht, diese für militärische Operationen vorübergehend zu beschlagnahmen, obwohl eine solche Entscheidung sicherlich einige Leute verärgern wird."
 HUN_production_control:0 "Produktionskontrolle"
 HUN_production_control_desc:0 "Die industrielle Produktion ist das Rückgrat der Wirtschaft und des Militärs eines jeden Landes. Es ist von größter Bedeutung, dass wir eine Gesetzgebung schaffen, die die Produktion unseres Staates optimiert, damit wichtige Projekte niemals verzögert oder gestört werden."
 HUN_disciplinary_regiments:0 "Disziplinarregimente"
 HUN_disciplinary_regiments_desc:0 "Egal wie sehr wir uns bemühen, es wird immer rebellische Elemente in unserer Armee geben, die die Moral untergraben und Sabotageakte verüben. Diese Personen müssen jedoch nicht nutzlos bleiben, nachdem sie ausgerottet wurden. Wir werden sie in Disziplinarregimenten organisieren und sie werden bei militärischen Bauarbeiten wie dem Grabenbau oder dem Verlegen von Gleisen helfen."
 HUN_economic_partnership_with_italy:0 "Wirtschaftspartnerschaft mit Italien"
 HUN_economic_partnership_with_italy_desc:0 "Die italienische Regierung steht unserem Anliegen aufgeschlossen gegenüber. Wir könnten unsere Beziehungen zu ihr stärken, indem wir eine engere Wirtschafts- und Handelskooperation mit italienischen Unternehmen anstreben."
 HUN_modernize_the_navy:0 "Modernisierung der Marine"
 HUN_modernize_the_navy_desc:0 "Unser Land ist schon zu lange von Land umgeben, und unsere Schiffskonstruktionen sind deshalb ins Hintertreffen geraten. Wir müssen die Reform unserer Marine gezielt vorantreiben, und Forschung ist der erste Schritt dazu."
 HUN_home_defense_comittee:0 "Ausschuss für Heimatverteidigung"
 HUN_home_defense_comittee_desc:0 "Die Verteidigung unseres Landes gegen imperialistische Bedrohungen sollte eines unserer Hauptanliegen sein. Der große Führer Rákosi selbst wird einem Ausschuss vorsitzen, der Pläne für einen überarbeiteten Verteidigungshaushalt ausarbeiten wird."
 HUN_dual_profile_factories:0 "Fabriken mit zwei Profilen"
 HUN_dual_profile_factories_desc:0 "Um die begrenzte Zahl unserer Fabriken besser auszunutzen, sollten wir sie so ausstatten, dass sie sowohl Konsumgüter als auch militärische Ausrüstung produzieren können."
 HUN_foreign_investments:0 "Ausländische Investitionen"
 HUN_foreign_investments_desc:0 "Da unser Land nun einem stärker westlich geprägten Wirtschaftsmodell folgt, könnten wir Investoren aus befreundeten Mächten anziehen, um unser wirtschaftliches und industrielles Wachstum anzukurbeln."
 HUN_autarky_decision:0 "Autarkie"
 HUN_autarky_decision_desc:0 "Öl ist eine wichtige Ressource für unsere Industrie und unser Militär. Ungarn kann es sich nicht leisten, bei den meisten seiner Ölimporte von ausländischen Ländern abhängig zu sein. Der beste Weg, dies zu verhindern, besteht darin, eine solide Reserve aufzubauen und sich um die Produktion unseres eigenen Kraftstoffs zu bemühen."
 HUN_german_economic_connections:0 "Deutsche Wirtschaftsverbindungen"
 HUN_german_economic_connections_desc:0 "Da unsere politischen Interessen mit denen Deutschlands übereinstimmen, haben deutsche Unternehmen Kontakt zu Mitgliedern der ungarischen Industrie aufgenommen, um engere Wirtschaftsbeziehungen auszuhandeln. Indem wir uns stärker auf diese Abkommen stützen, können wir einen Teil unserer Ressourcen für andere Zwecke freisetzen."
 HUN_italian_hungarian_naval_academy:0 "Italienisch-Ungarische Marineakademie"
 HUN_italian_hungarian_naval_academy_desc:0 "Mit dem Erfolg der Adria-Initiative wuchs der Wunsch nach einer verstärkten Marinekooperation zwischen Ungarn und Italien. Wir werden das Projekt fortsetzen, indem wir eine gemeinsame Forschungs- und Ausbildungseinrichtung errichten, in der beide Länder Marinewissen austauschen können."
 HUN_state_visit_to_germany:0 "Staatsbesuch in Deutschland"
 HUN_state_visit_to_germany_desc:0 "Das deutsch-ungarische Bündnis ist stark, könnte aber noch verbessert werden. Ferenc Szálasi, unser großer Führer, hat einige Ideen, die er dem Führer vortragen möchte. Wir sollten einen offiziellen Besuch in Berlin organisieren, damit sie darüber diskutieren können."
 HUN_organize_anti_government_protests:0 "Organisieren Sie Proteste gegen die Regierung"
 HUN_organize_anti_government_protests:0 "Die Regierung verliert täglich an Macht. Wir müssen diesen Prozess beschleunigen, um einen Führungswechsel durchzusetzen. Es wird Proteste der Opposition geben, und die Stimme des Volkes wird gehört werden."
 HUN_call_for_a_snap_election:0 "Forderung nach Neuwahlen"
 HUN_call_for_a_snap_election:0 "Die Proteste haben Früchte getragen. Die Regierung hat sich bereit erklärt, Neuwahlen abzuhalten, um herauszufinden, ob die Bevölkerung wirklich eine andere Richtung für Ungarn will."
 HUN_renew_the_purge_of_communism:0 "Erneuern Sie die Säuberung des Kommunismus"
 HUN_renew_the_purge_of_communism:0 "Der Weiße Terror von 1919/20 hat die kommunistische Bedrohung in unserem Land größtenteils ausgelöscht. Sie haben erneut einen erheblichen Teil unserer Bevölkerung erfasst und sie mit den falschen Versprechungen des Marxismus geplagt. Es ist offensichtlich, dass unsere Arbeit noch nicht getan ist und die Bolschewiki erneut ausgerottet werden müssen."
 HUN_negotiate_with_soviets:0 "Verhandeln Sie mit den Sowjets"
 HUN_negotiate_with_soviets_desc:0 "Wir könnten einen Ausstiegsversuch unternehmen, indem wir die Seiten der Sowjets wechseln. Das wäre sicherlich ein riskantes Manöver, aber unser Land steht auf dem Spiel."
 HUN_negotiate_with_allies:0 "Verhandeln Sie mit den Alliierten"
 HUN_negotiate_with_allies_desc:0 "Wir könnten einen Ausstiegsversuch unternehmen, indem wir die Seiten der Alliierten wechseln. Das wäre sicherlich ein riskantes Manöver, aber unser Land steht auf dem Spiel."
 HUN_resume_the_partition_of_yugoslavia:0 "Wiederaufnahme der Teilung Jugoslawiens"
 HUN_resume_the_partition_of_yugoslavia_desc:0 "Nachdem wir uns nun um die aufsässige jugoslawische Regierung gekümmert haben, können wir unsere Teilungspläne wie ursprünglich geplant weiterverfolgen."
 HUN_expand_the_gamma_factory:0 "Erweitern Sie die Gamma-Fabrik"
 HUN_expand_the_gamma_factory_desc:0 "Die Gamma-Fabrik hat sich in der Vergangenheit bei der Produktion von Flugabwehrgeräten, die den Betrieb von Batterien unterstützen, als äußerst nützlich erwiesen. Eine Erweiterung der Fabrik würde es uns ermöglichen, diese Geräte in Massenproduktion herzustellen und an alle Flugabwehreinheiten der Armee zu verteilen."
 HUN_plebiscite_for_slovakia:0 "Volksabstimmung für die Slowakei"
 HUN_plebiscite_for_slovakia_desc:0 "Für die Slowaken ist es an der Zeit, zu entscheiden, ob sie Teil der neuen Karpaten-Heimat sein wollen. Es wird eine Volksabstimmung stattfinden, und wenn die Mehrheit zustimmt, werden sie ein vollwertiger Staat der Vereinigten Länder Ungarn."
 HUN_plebiscite_for_ruthenia:0 "Volksabstimmung für Ruthenien"
 HUN_plebiscite_for_ruthenia_desc:0 "Für die Ruthenen ist es an der Zeit zu entscheiden, ob sie Teil der neuen karpatischen Heimat sein wollen. Es wird eine Volksabstimmung abgehalten, und wenn die Mehrheit zustimmt, werden sie ein vollwertiger Staat der Vereinigten Länder Ungarn."
 HUN_plebiscite_for_transylvania:0 "Volksabstimmung für Siebenbürgen"
 HUN_plebiscite_for_transylvania_desc:0 "Für die Siebenbürger ist es an der Zeit, zu entscheiden, ob sie Teil der neuen Karpaten-Heimat sein wollen. Es wird eine Volksabstimmung abgehalten, und wenn die Mehrheit zustimmt, werden sie ein vollwertiger Staat der Vereinigten Länder Ungarn."
 HUN_plebiscite_for_croatia:0 "Volksabstimmung für Kroatien"
 HUN_plebiscite_for_croatia_desc:0 "Für die Kroaten ist es an der Zeit zu entscheiden, ob sie Teil der neuen Karpaten-Heimat sein wollen. Es wird eine Volksabstimmung abgehalten, und wenn die Mehrheit zustimmt, werden sie ein vollwertiger Staat der Vereinigten Länder Ungarn."
 HUN_plebiscite_for_burgenland:0 "Volksabstimmung für das Burgenland"
 HUN_plebiscite_for_burgenland_desc:0 "Für die Österreicher im Burgenland ist es an der Zeit, zu entscheiden, ob sie Teil der neuen karpatischen Heimat sein wollen. Es wird eine Volksabstimmung abgehalten, und wenn die Mehrheit zustimmt, werden sie ein vollwertiger Staat der Vereinigten Länder Ungarn."
 HUN_polonia_armor_production:0 "Polonia-Rüstungsproduktion"
 HUN_polonia_armor_production_desc:0 "Weder Ungarn noch Polen sind für ihre Panzertechnologie besonders bekannt. Wir könnten unsere Fähigkeiten durch eine gemeinsame Panzerproduktion gegenseitig stärken."
 HUN_polonia_artillery_research:0 "Polonia Artillerieforschung"
 HUN_polonia_artillery_research_desc:0 "Und noch etwas haben wir mit den Polen gemeinsam: Wir nutzen beide die schwedischen Bofors-Geschütze. Wir könnten gemeinsame Forschungs- und Ausbildungsprojekte initiieren, um unser Wissen zum Thema Artillerie zu teilen."
 HUN_italian_steel_investments:0 "Italienische Stahlinvestitionen"
 HUN_italian_steel_investments_desc:0 "Unsere neu erworbenen Ländereien in Kroatien eignen sich hervorragend für die Entwicklung der Stahlindustrie. Wir benötigen lediglich etwas Kapital von italienischen Investoren, um mit dem Projekt zu beginnen."
 HUN_raba_fiat:0 "RÁBA-Fiat"
 HUN_raba_fiat_desc:0 "Das RÁBA-Werk produzierte dank geringer Investitionen des italienischen Konzerns bereits in geringer Stückzahl Fiat-Fahrzeuge. Mit etwas Aufwand unsererseits könnten die Investitionen und die Produktionslizenzen erneuert werden."
 HUN_caproni_factory:0 "Caproni-Fabrik"
 HUN_caproni_factory_desc:0 "Wir haben uns in den letzten Jahren bei Flugzeugen auf italienische Hersteller verlassen. Wir könnten eines ihrer Unternehmen einladen, eine Fabrik in unserem Land zu eröffnen."
 HUN_italian_dockyard_investments:0 "Investitionen in italienische Werften"
 HUN_italian_dockyard_investments_desc:0 "Unsere Marine- und Schiffbaukapazitäten müssen ausgebaut werden, da unser Land seit Jahrzehnten keinen Zugang zum Meer hat. Die Italiener sind uns auf dem Gebiet der Seekriegsführung weit voraus, und ihre Investoren haben Interesse an der Entwicklung ungarischer Werften bekundet."
 
 #Austro-Hungarian decisions
 HUN_move_capital_to_vienna:0 "Hauptstadt nach Wien verlegen"
 HUN_move_capital_to_vienna_desc:0 "Wien war traditionell die Hauptstadt der österreichisch-ungarischen Monarchie. Auch wenn sich das Blatt inzwischen gewendet hat und die Ungarn nun den dualistischen Staat anführen, könnten wir uns aus Nostalgiegründen immer noch dazu entschließen, die Hauptstadt nach Wien zurückzubringen."
 HUN_reestablish_the_ostend_company:0 "Wiederherstellung der Ostend Company"
 HUN_reestablish_the_ostend_company_desc:0 "Obwohl Österreich-Ungarn keine Kolonialmacht war, besaß es dennoch einige kleinere Kolonien. Wir könnten versuchen, diese Kolonien zurückzuerobern und damit ein neues Zeitalter des österreichisch-ungarischen Kolonialismus einzuläuten."
 HUN_renounce_claims_towards_poland:0 "Verzicht auf Ansprüche gegenüber Polen"
 HUN_renounce_claims_towards_poland_desc:0 "Zu Zeiten des alten Kaiserreichs besaß unser Land große Teile Polens in Galizien. Wenn wir jedoch ein freundschaftliches Verhältnis zu den Polen pflegen wollen, sollten wir in Erwägung ziehen, auf unsere Ansprüche dort zu verzichten, damit unsere Länder in Frieden koexistieren können."
 HUN_reinstate_croatian_military_leaders:0 "Wiedereinsetzung kroatischer Militärführer"
 HUN_reinstate_croatian_military_leaders_desc:0 "Mit der Eingliederung Kroatiens in Österreich-Ungarn sind wir nun befugt, kroatische Offiziere in unsere Armee einzuberufen. Viele von ihnen verfügen über wertvolle Erfahrungen aus dem Ersten Weltkrieg und könnten sich auf dem Schlachtfeld als nützlich erweisen."
 HUN_integrate_czech_artillery_industry:0 "Integration der tschechischen Artillerieindustrie"
 HUN_integrate_czech_artillery_industry_desc:0 "Der tschechoslowakische Staat verfügte über einige Elemente seiner Artillerieindustrie, die wir in unsere eigene integrieren müssen, bevor wir sie voll ausnutzen können."
 HUN_integrate_czech_tank_industry:0 "Integration der tschechischen Panzerindustrie"
 HUN_integrate_czech_tank_industry_desc:0 "Der tschechoslowakische Staat verfügte über einige Elemente seiner Panzerindustrie, die wir in unsere eigene integrieren müssen, bevor wir sie voll ausnutzen können."
 HUN_integrate_czech_small_arms_industry:0 "Integration der tschechischen Kleinwaffenindustrie"
 HUN_integrate_czech_small_arms_industry_desc:0 "Der tschechoslowakische Staat verfügte über einige Elemente seiner Kleinwaffenindustrie, die wir in unsere eigene integrieren müssen, bevor wir sie voll ausnutzen können."
 HUN_integrate_czech_air_industry:0 "Integration der tschechischen Luftfahrtindustrie"
 HUN_integrate_czech_air_industry_desc:0 "Der tschechoslowakische Staat verfügte über einige Elemente seiner Luftfahrtindustrie, die wir in unsere eigene integrieren müssen, bevor wir sie voll ausnutzen können."
