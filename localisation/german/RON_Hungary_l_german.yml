 #CONCERNS
 
 #industrial
 maort:0 "MAORT"
 maort_desc:0 "Als Tochtergesellschaft der American Standard Oil Company ist die Magyar-Amerikai Olajipari Rt. im südlichen Teil des Komitat Zala tätig.\n"
 ganz_villamossagi_gyar:0 "Ganz Villamossági Gyár"
 ganz_villamossagi_gyar_desc:0 "Die Ganz és Társa-Danubius Villamossági-, Gép-, Waggon- és Hajógyár Rt. wurde 1878 von András Mechwart gegründet. versorgte das Land während des Krieges mit Verbrauchszählern und anderer Elektronik. Große Köpfe der damaligen Zeit wie Károly Zipernowsky und Miksa Déri arbeiteten während der Betriebsjahre in der Fabrik.\n"
 mw_metalworks:0 "MW Metallwerke"
 mw_metalworks_desc:0 "Das Stahl- und Metallwerk Manfréd Weiss wurde 1897 gegründet und war fast ein Jahrhundert lang einer der bedeutendsten Industriekonzerne in Budapest.\n"
 
 #materiel
 feg:0 "FÉG"
 feg_desc:0 "Die Waffen- und Maschinenfabrik (Fegyver- és Gépgyár) produzierte seit der Jahrhundertwende die meisten Kleinwaffen, die von der ungarischen Armee verwendet wurden.\n"
 digep:0 "DIGÉP"
 digep_desc:0 "Die Maschinenfabrik von Diósgyör (Diósgyöri Gépgyár) fungierte während und nach dem Ersten Weltkrieg als Artilleriefabrik.\n"
 csepel_muvek:0 "MW Automobiles"
 csepel_muvek_desc:0 "Die Abteilung des Stahl- und Metallwerks von Manfred Weiss (später bekannt als Csepel Müvek), die unter anderem Panzer und Lastwagen für die Armee herstellte.\n"
 CZE_skoda_artillery_HUN:0 "Skoda Artillerie"
 CZE_skoda_artillery_HUN_desc:0 "Der tschechoslowakische Konzern Skoda produzierte viele Arten von Ausrüstung, darunter auch Feldartillerie.\n"
 raba:0 "Rába"
 raba_desc:0 "Die RÁBA Automotive Group (Rába Magyar Vagon-és Gépgyár) war der führende Hersteller von Eisenbahnwaggons und Triebzügen in Ungarn.\n"
 
 #tank
 mavag:0 "MÁVAG"
 mavag_desc:0 "Die für die Produktion der Toldi-Panzer verantwortliche ungarische königliche Staatsfabrik für Eisen, Stahl und Maschinen (Magyar Királyi Állami Vas-, Acélés Gépgyárak) war einer der bedeutendsten Industriekonzerne der Zeit.\n"
 mw_armor:0 "MW-Rüstung"
 mw_armor_desc:0 "Abteilung der Manfred Weiss Metallwerke, die sich mit der Entwicklung und Herstellung von Tanks beschäftigt.\n"
 CZE_skoda_armor_HUN:0 "Skoda Armor"
 CZE_skoda_armor_HUN_desc:0 "Skoda war während des Krieges für die Herstellung vieler tschechoslowakischer Panzer verantwortlich.\n"
 
 #air
 mw_aircraft:0 "MW-Flugzeuge"
 mw_aircraft_desc:0 "Die Manfred-Weiss-Fabrik war eine der wenigen Fabriken in Ungarn, die über die für die Flugzeugproduktion erforderlichen Einrichtungen verfügte. Ihr wurde die Herstellung von Flugzeugmotoren des Typs DB-605 übertragen.\n"
 mavag_aircraft:0 "MÁVAG-Flugzeuge"
 mavag_aircraft_desc:0 "MÁVAG war, ebenso wie die Manfred-Weiss-Fabrik, während des Krieges ein bedeutender Hersteller von Flugzeugkomponenten. Von dort stammte die Produktion der meisten Flugzeuge der ungarischen Luftwaffe.\n"
 lloyd_aircraft:0 "Lloyd-Flugzeuge"
 lloyd_aircraft_desc:0 "Die Lloyd Flugzeug- und Motorenfabrik war in den Jahren der österreichisch-ungarischen Monarchie in Betrieb und wurde nach dem Krieg demontiert. Während des Ersten Weltkriegs produzierte die Fabrik hauptsächlich Flugzeuge.\n"
 caproni_hun:0 "Caproni"
 caproni_hun_desc:0 "Die ungarische Niederlassung des italienischen Flugzeugherstellers Caproni."
 
 #navy
 ganz_danubius:0 "Ganz Danubius"
 ganz_danubius_desc:0 "Die Schiffbaufabrik Ganz Danubius, heute Teil des gemeinsamen Ganz-Konzerns, war während des Ersten Weltkriegs für die Produktion vieler Schiffe der österreichisch-ungarischen Marine verantwortlich.\n"
 crda_hun:0 "CRDA Ungarn"
 crda_hun_desc:0 "Ein Teil des italienischen Schiffbaukonzerns CRDA, der im ungarischen Staat und unter dessen Aufsicht tätig ist.\n"
 
 #chief of navy
 horthy:0 "Miklós Horthy"
 horthy_desc:0 "Miklós Horthy, Konteradmiral der einst stolzen ungarischen Flotte und später Regent des Landes.\n"


 HUN_ideological_shift:0 "Ideologischer Wandel"
 HUN_ideological_shift_desc:0 "Es ist an der Zeit, die törichten Ideen des Nationalismus und Revisionismus aufzugeben. Anstatt einen giftigen Patriotismus zu pflegen, sollte sich Ungarn von der Rechten abwenden und andere Ideologien annehmen."
 HUN_home_defense_focus:0 "Heimverteidigung"
 HUN_home_defense_focus_desc:0 "Nachdem wir uns offiziell von den dummen Ideen des Revisionismus verabschiedet haben, ist es an der Zeit, uns auf das zu konzentrieren, was wir haben. Wir müssen unser Land verteidigen und unseren Bürgern zeigen, dass sie sich hier sicher fühlen können. Budapest ist nicht nur unsere Hauptstadt, sondern auch ein strategisch wichtiger Übergang über die Donau, der entsprechend verteidigt werden muss. Wir sollten dort mit der Befestigung des Landes beginnen."
 HUN_the_great_coalition:0 "Die Große Koalition"
 HUN_the_great_coalition_desc:0 "In diesen turbulenten Zeiten ist es am besten, neutral zu bleiben und das Land stabil zu halten. Dazu brauchen wir eine starke Regierung, die die notwendigen Reformen ohne Widerstand durchsetzen kann. Der Bethlen-Peyer-Pakt von 1921 legte den Grundstein für diese Zusammenarbeit, doch wir müssen ihn bis zu seinem Abschluss begleiten. NEP, SZDP und FKgP müssen eine Koalition bilden, um das Land zu stabilisieren."
 HUN_armed_neutrality:0 "Bewaffnete Neutralität"
 HUN_armed_neutrality_desc:0 "Wir wollen in den kommenden Konflikten möglichst neutral bleiben. Um Angreifer abzuschrecken, werden wir unsere Verteidigung verstärken und unsere Armee bestmöglich ausbauen."
 HUN_womens_suffrage:0 "Frauenwahlrecht"
 HUN_womens_suffrage_desc:0 "Obwohl Frauen in unserem Land bereits wählen dürfen, sind die für sie geltenden Beschränkungen strenger als für Männer. Wir müssen diese Ungleichheiten beseitigen und sicherstellen, dass der Großteil der erwachsenen Bevölkerung unseres Landes wählen darf."
 HUN_women_in_the_army:0 "Frauen in der Armee"
 HUN_women_in_the_army_desc:0 "Unser Land ist klein, und wenn wir es verteidigen wollen, brauchen wir alle verfügbaren Ressourcen. Indem wir die Wehrpflicht nur auf Männer beschränken, schränken wir nicht nur Frauen ein, sondern entgehen uns auch potenzielle Rekruten. Auch wenn diese Entscheidung einige konservativere Offiziere verärgern mag, müssen wir zum Wohle des Landes Frauen in der Armee zulassen."
 HUN_social_reconciliation:0 "Soziale Versöhnung"
 HUN_social_reconciliation_desc:0 "Die Koalitionsregierung ist die stärkste Führung, die wir in den letzten Jahrzehnten hatten. Wir müssen ihre Langlebigkeit und Stabilität sicherstellen und dürfen nicht zulassen, dass frühere Differenzen dem im Wege stehen. Wir werden frühere Parteizugehörigkeiten hinter uns lassen und die Macht der Regierung im Streben nach nationaler Einheit festigen."
 HUN_tax_reform:0 "Steuerreform"
 HUN_tax_reform_desc:0 "Der Krieg hat vielen Menschen in unserem Land großes Leid zugefügt. Doch es gibt auch Menschen, die während des Konflikts reich wurden und nach dem Krieg in der Gesellschaft aufstiegen. Dies hat zu größerer Ungleichheit im Land geführt. Wir könnten diese Ungleichheit beheben, indem wir die neureichen Klassen in eine andere Steuerklasse einteilen, sodass sie höhere Beiträge leisten müssen."
 HUN_education_reform:0 "Bildungsreform"
 HUN_education_reform_desc:0 "Eine der wichtigsten Triebkräfte für die wirtschaftlichen und militärischen Anstrengungen einer Nation ist die intellektuelle Basis ihrer Bevölkerung. Wir müssen unser Bestes tun, um das Bildungssystem Ungarns zu erhalten und zu verbessern, damit wir nicht hinter anderen zurückfallen."
 HUN_liberal_ideas:0 "Liberale Ideen"
 HUN_liberal_ideas_desc:0 "Es ist klar, dass es nicht die richtige Entscheidung war, sich auf die Seite der Deutschen zu stellen, wie der Erste Weltkrieg gezeigt hat. Um sicherzustellen, dass wir nie wieder auf der Verliererseite stehen, müssen wir die demokratischen Ideen der Sieger annehmen, in der Hoffnung, ihre Unterstützung und ihren Schutz zu gewinnen."
 HUN_secure_the_new_government:0 "Sichern Sie die neue Regierung"
 HUN_secure_the_new_government_desc:0 "Dank unserer Bemühungen, eine demokratische, liberale Führung im Land zu etablieren, hat die Regierung rasche Veränderungen durchgemacht. Das Land muss sich von diesen Veränderungen erholen, und es wird einige Zeit dauern, bis die Macht der neuen Regierung gefestigt ist."
 HUN_pass_the_preparation_act:0 "Verabschieden Sie das Vorbereitungsgesetz"
 HUN_pass_the_preparation_act_desc:0 "Ein Krieg in Europa scheint unvermeidlich. Wir können versuchen, uns herauszuhalten, müssen uns aber auf alle Eventualitäten vorbereiten, einschließlich einer Invasion Ungarns. Wir müssen alle Vorkehrungen treffen, um unseren Streitkräften die bestmöglichen Bedingungen für die Verteidigung unseres Heimatlandes zu bieten. Straßen, Gebäude, Hügel und Flüsse dienen im Ernstfall als Verteidigungspositionen."
 HUN_convertible_factories:0 "Wandelbare Fabriken"
 HUN_convertible_factories_desc:0 "Um uns auf einen möglichen Konflikt vorzubereiten, müssen wir unsere Fabriken leichter an die Waffenproduktion anpassen. Warum sollten Konservendosen nicht den gleichen Durchmesser haben wie Handgranaten?"
 HUN_emergency_measures:0 "Notfallmaßnahmen"
 HUN_emergency_measures_desc:0 "Der Krieg steht vor der Tür. Das bedeutet, dass unsere Wirtschaft und Industrie drastische Veränderungen durchlaufen müssen. Die Verbraucher müssen ihren Konsum zum Wohle der Nation einschränken, wenn wir eine wettbewerbsfähige Rüstungsindustrie aufrechterhalten wollen."
 HUN_strengthen_the_move:0 "Stärkung des MOVE"
 HUN_strengthen_the_move_desc:0 "MOVE ist eine paramilitärische Organisation, die unter anderem von Bajcsy-Zsilinszky gegründet wurde. Ihr Zweck war es, die durch die Beschränkungen von Trianon geschwächte Armee zu unterstützen. Die Gruppe geriet mit der Zeit in Vergessenheit, konnte aber wieder populär werden, um die nationale Moral zu stärken und die Bevölkerung bei Bedarf auf die Verteidigung des Landes vorzubereiten."
 HUN_land_reform:0 "Bodenreform"
 HUN_land_reform_desc:0 "In Ungarn herrscht seit der Schrumpfung des Landes und der Neuverteilung der Kronländereien noch immer Streit um den Besitz vieler landwirtschaftlicher Flächen. Eine umfassende Reform des Landbesitzrechts würde dafür sorgen, dass diese Ländereien in die richtigen Hände gelangen und einige Kleinbauern endlich ihre eigenen Unternehmen gründen können."
 HUN_espirit_de_corps:0 "Espirit De Corps"
 HUN_espirit_de_corps_desc:0 "Die Armee braucht dringend eine Umstrukturierung. Viele Offiziere und Generäle waren zuvor kommunistischen oder faschistischen Gruppen zugehörig. Diese Personen müssen durch Führungskräfte ersetzt werden, denen die Interessen Ungarns am Herzen liegen."
 HUN_leaning_westward:0 "Nach Westen geneigt"
 HUN_leaning_westward_desc:0 "Mit einer demokratischen Regierung sollten wir uns demokratische Freunde suchen, denn wir sind zu klein, um allein in der Welt erfolgreich zu sein. Die naheliegendste Wahl liegt im Westen, und dort werden wir beginnen."
 HUN_joining_the_right_cause:0 "Sich der richtigen Sache anschließen"
 HUN_joining_the_right_cause_desc:0 "Eine stabile, friedliche Welt baut auf dem soliden Fundament der Demokratie auf. Es gibt Menschen, die dieses Fundament zerstören und durch eine grausame Diktatur oder eine unvernünftige Ideologie ersetzen möchten. Wir müssen uns diesen Bedrohungen entgegenstellen, seien es Faschisten in Deutschland oder Kommunisten in der Sowjetunion. Die Zukunft Ungarns liegt in den Händen der Alliierten."
 HUN_uk_license_trade:0 "Lizenzhandel in Großbritannien"
 HUN_uk_license_trade_desc:0 "Die Engländer sind technologisch weiter als wir. Wenn wir ihnen helfen wollen, müssen wir sie davon überzeugen, uns einige ihrer Lizenzen zur Verfügung zu stellen, damit wir in dieser sich schnell entwickelnden Welt mithalten können."
 HUN_british_scientific_exchange:0 "Britischer Wissenschaftsaustausch"
 HUN_british_scientific_exchange_desc:0 "Unsere gemeinsamen Interessen erfordern, dass wir unser gesamtes Wissen mit unseren Verbündeten teilen. Die Briten haben sich bereit erklärt, einen wissenschaftlichen Austausch zu beginnen, damit wir von den technologischen Fortschritten der anderen lernen können."
 HUN_the_danubian_coalition:0 "Die Donaukoalition"
 HUN_the_danubian_coalition_desc:0 "Nachdem wir uns als Leuchtturm der Demokratie in der Region etabliert haben, sollten wir versuchen, andere für unsere Sache zu gewinnen. Wir werden eine Konferenz abhalten, zu der alle Anrainerstaaten eingeladen sind und auf der wir ein lokales Bündnis vorschlagen. Wenn sich die Nationen entlang der Donau und darüber hinaus diesem Anliegen anschließen, können wir gemeinsam allen Bedrohungen der Region die Stirn bieten."
 HUN_democratic_trade_focus:0 "Fokus auf demokratischen Handel"
 HUN_democratic_trade_focus_desc:0 "Wir können nicht einfach mit jedem Handel treiben. Wir müssen sicherstellen, dass unsere Handelspartner die guten Zwecke unterstützen und nicht mit dem Teufel und seinesgleichen paktieren. Bevor wir ein Handelsabkommen abschließen, prüft ein Ausschuss die Handelsgeschichte des Landes. Stellt sich heraus, dass undemokratische Ziele unterstützt wurden, wird das Abkommen geplatzt."
 HUN_scientific_spirit:0 "Wissenschaftlicher Geist"
 HUN_scientific_spirit_desc:0 "Wir sind zwar zahlenmäßig nicht so stark wie die Faschisten, aber technologisch können wir das vielleicht wettmachen. Durch die enge Zusammenarbeit unserer Wissenschaftler mit denen der Alliierten können wir früher Durchbrüche erzielen als allein und den Faschisten vielleicht sogar überlegen sein."
 HUN_ask_for_szekler_autonomy:0 "Fordern Sie die Autonomie der Szekler"
 HUN_ask_for_szekler_autonomy_desc:0 "Der Verlust Siebenbürgens hat dazu geführt, dass mehr als eine Million Ungarn außerhalb unserer Grenzen leben. Die größte davon betroffene Gemeinschaft sind die Szekler, die die Rumänen seit Trianon um ein Stück Autonomie anflehen. Wenn wir unseren Einfluss geltend machen, wäre Rumänien vielleicht bereit, ihnen ihren Wunsch zu erfüllen."
 HUN_peace_with_our_neighbors:0 "Frieden mit unseren Nachbarn"
 HUN_peace_with_our_neighbors_desc:0 "Wir können unsere Position als starkes demokratisches Land nicht sichern, wenn wir von alten Feinden umgeben sind. Es ist Zeit, uns mit unseren Nachbarn zu versöhnen und auf eine Zusammenarbeit in der Region hinzuarbeiten. Vielleicht werden unsere ehemaligen Feinde in den kommenden Konflikten unsere neuen Freunde."
 HUN_referendum_for_southern_slovakia:0 "Referendum für die Südslowakei"
 HUN_referendum_for_southern_slovakia_desc:0 "Wir haben die nationalistischen Ideen der Vergangenheit aufgegeben, dennoch leben immer noch große Teile unserer Bevölkerung im Ausland. Das ist eine Ungerechtigkeit, die wir nicht dulden können. Wir werden mit der Südslowakei beginnen, indem wir der Tschechoslowakei ein demokratisches Referendum vorschlagen, bei dem die Einheimischen entscheiden können, ob sie in der Tschechoslowakei bleiben oder sich stattdessen Ungarn anschließen wollen."
 HUN_settlement_with_yugoslavia:0 "Einigung mit Jugoslawien"
 HUN_settlement_with_yugoslavia_desc:0 "Als nächstes sind die Ungarn dran, die nach dem Vertrag von Trianon in Jugoslawien festsitzen. Wir werden ihnen finanzielle Reparationen im Austausch für einen Teil des umstrittenen Landes anbieten. Wenn alles gut geht, werden wir nach den Verhandlungen Eigentümer der Batschka und des Übermurgebiets sein."
 HUN_the_visegrad_group:0 "Die Visegrád-Gruppe"
 HUN_the_visegrad_group_desc:0 "Ungarn kann sich nicht auf den Schutz weit entfernter Mächte verlassen, wenn die Faschisten an die Tür klopfen. Wir müssen die Initiative ergreifen und ein lokales Bündnis bilden, das seine Mitglieder ohne ausländische Hilfe schützen kann. Einige Gleichgesinnte schlagen ein Dreiecksbündnis mit Polen und der Tschechoslowakei vor, und auch von deren Regierungen haben wir positive Rückmeldungen erhalten."
 HUN_invite_yugoslavia:0 "Jugoslawien einladen"
 HUN_invite_yugoslavia_desc:0 "Jugoslawien ist allein und von faschistischen Nachbarn umgeben, die ihm sein Territorium wegnehmen würden. Unsere Allianz könnte ihre Stärke und ihren Einfluss auf dem Balkan nutzen und ihnen gleichzeitig Schutz vor ausländischen Bedrohungen bieten."
 HUN_invite_austria:0 "Österreich einladen"
 HUN_invite_austria_desc:0 "Österreich befindet sich in einer prekären Lage, eingeklemmt zwischen Deutschland und Italien. Ohne angemessenen Schutz würde es schnell von einem dieser faschistischen Giganten verschluckt werden. Wir sollten Österreich einladen und ihm den Schutz der Visegrád-Gruppe anbieten."
 HUN_baltic_expansion:0 "Baltische Expansion"
 HUN_baltic_expansion_desc:0 "Wir haben erfolgreich den Grundstein für ein neues Bündnis gelegt, aber es fehlen noch weitere Mitglieder. Polen hat eine Erweiterung des Bündnisses nach Norden vorgeschlagen, die Litauen, Lettland und Estland einschließen soll. Sollten sie zustimmen, erhält unser Bündnis Zugang zur Nordsee, könnte aber die Aggression der Sowjetunion auf uns ziehen."
 HUN_economic_cooperation:0 "Wirtschaftliche Zusammenarbeit"
 HUN_economic_cooperation_desc:0 "Unser Bündnis ist, was es ist: ein Militärbündnis. Wenn wir es jedoch auch zu einer Wirtschaftsunion ausweiten könnten, könnten wir einen gemeinsamen Markt für alle Mitgliedsstaaten schaffen, der (unter Berücksichtigung der regionalen Fähigkeiten jedes Mitglieds) allen Beteiligten zugute käme."
 HUN_joint_military_council:0 "Gemeinsamer Militärrat"
 HUN_joint_military_council_desc:0 "Auch wenn einzelne Mitglieder unseres Bündnisses mächtig sein mögen, liegt das wahre Potenzial militärischer Allianzen in der Zusammenarbeit. Um unseren Armeen die Durchführung gemeinsamer Operationen zu erleichtern, werden wir einen Militärrat einrichten, der diese Bemühungen überwacht."
 HUN_visegrad_technology_circle:0 "Visegrád-Technologiekreis"
 HUN_visegrad_technology_circle_desc:0 "Wir teilen unsere Wirtschaft mit den Mitgliedern der Visegrád-Gruppe. Warum also nicht auch unser Wissen teilen? Von einem Forschungsaustausch würden alle profitieren, und womit könnten wir uns besser wappnen als mit dem gemeinsamen Wissen unserer Verbündeten?"
 HUN_communist_ideas:0 "Kommunistische Ideen"
 HUN_communist_ideas_desc:0 "Im Schatten des Deutschen Reichs und weit entfernt von den demokratischen Liberalen im Westen muss Ungarn anderswo Schutz suchen. Die bolschewistischen Ideale sind Ungarn durchaus vertraut, schließlich kam die kurzlebige Ungarische Räterepublik 1919 an die Macht. Eine erneute Übernahme der Revolution würde uns sicherlich den Schutz der Sowjetunion einbringen, und genau das müssen wir tun."
 HUN_the_rakosi_administration:0 "Die Rákosi-Regierung"
 HUN_the_rakosi_administration_desc:0 "Nachdem nun eine ordentliche Regierung gebildet wurde, ist es an der Zeit, das politische Spektrum von unliebsamen Personen zu säubern. Wer sich dem Kommunismus widersetzt, stellt sich gegen das Gemeinwohl des Volkes."
 HUN_the_yugoslavian_wall:0 "Die jugoslawische Mauer"
 HUN_the_yugoslavian_wall_desc:0 "Unser Land wäre einer Invasion Jugoslawiens schutzlos ausgeliefert. Sollten die Serben plötzlich mit dem Vertrag von Trianon unzufrieden sein, könnten sie die ungarische Tiefebene innerhalb weniger Tage überfluten. Um dies zu verhindern, wird an unserer Südgrenze ein Befestigungssystem errichtet."
 HUN_create_the_avo:0 "Erstellen Sie die ÁVO"
 HUN_create_the_avo_desc:0 "„Wer nicht für uns ist, ist gegen uns.“ Die Feinde des Systems müssen eliminiert werden, und wir brauchen eine Geheimpolizei, um diese unerwünschten Elemente zu finden und festzunehmen. Die Államvédelmi Osztály (ÁVO) wird als Spionageabwehreinheit und nationale Staatsschutzbehörde fungieren."
 HUN_connections_in_moscow:0 "Verbindungen in Moskau"
 HUN_connections_in_moscow_desc:0 "Wenn wir als kommunistische Nation erfolgreich sein wollen, müssen wir enge Verbindungen zu anderen Anhängern der Arbeiterbewegung knüpfen. Wir werden die Hand nach der Sowjetunion ausstrecken, um eine direkte Verbindung von Budapest nach Moskau zu schaffen, über die wir im Notfall kommunizieren können."
 HUN_collectivization:0 "Kollektivierung"
 HUN_collectivization_desc:0 "Wer könnte die Ländereien und Fabriken des Landes besser nutzen als die Kommunistische Partei? Wir werden den Anteil des Landes, der sich in Privatbesitz befindet, minimieren und die Angelegenheiten in die Hände des Staates legen."
 HUN_five_year_plan:0 "Fünfjahresplan"
 HUN_five_year_plan_desc:0 "Als Schritt in Richtung einer Planwirtschaft werden wir Fünfjahrespläne einführen, die kurzfristige Ziele für unser Land festlegen. Jeder muss sich an diesen Plan halten, und wenn wir hart genug arbeiten und das Endziel im Auge behalten, steht uns nichts mehr im Wege."
 HUN_the_iron_curtain:0 "Der Eiserne Vorhang"
 HUN_the_iron_curtain_desc:0 "Von den Kapitalisten und Faschisten im Westen geht nie etwas Gutes aus. Wir müssen uns bemühen, unsere Bevölkerung von den gefährlichen Ideen, die sie verbreiten, zu isolieren. Handel, Auswanderung und Einwanderung in nichtkommunistische Länder werden streng kontrolliert, und wir werden die diplomatischen Kontakte mit ihnen einschränken."
 HUN_the_kadar_administration:0 "Die Kádár-Verwaltung"
 HUN_the_kadar_administration_desc:0 "Das ultimative Ziel des Kommunismus ist das gemeinsame Wohl des Volkes. Wer unsere Bemühungen, dieses Ziel zu erreichen, nicht aktiv behindert, kann in Frieden leben, und wer uns unterstützt, wird reich belohnt."
 HUN_western_relations:0 "Westliche Beziehungen"
 HUN_western_relations_desc:0 "Auch wenn wir den Kommunismus der Demokratie vorgezogen haben, wäre es töricht, den Westen völlig aufzugeben und nur noch auf unsere sowjetischen Brüder zu vertrauen. Wir werden der kommunistischen Sache treu bleiben, aber gleichzeitig versuchen, den Handel und die diplomatischen Beziehungen mit westlichen Ländern zu intensivieren, um uns alle Optionen offen zu halten."
 HUN_goulash_communism:0 "Gulasch-Kommunismus"
 HUN_goulash_communism_desc:0 "„Wer nicht gegen uns ist, ist für uns.“ Diese Philosophie verfolgen wir gegenüber den Feinden des Systems. Die Bevölkerung wird in einem glückseligen Wohlstand leben, was sie kooperativer mit der Regierung machen wird. Die Preise für Konsumgüter werden vom Staat festgelegt und sie werden immer verfügbar sein. Das verursacht zwar zusätzliche Kosten, sorgt aber dafür, dass die Bevölkerung zufrieden und glücklich ist."
 HUN_modernize_the_railway_network:0 "Modernisierung des Eisenbahnnetzes"
 HUN_modernize_the_railway_network_desc:0 "Die ungarische Eisenbahn muss dringend modernisiert werden, da die Beschränkungen des Friedensvertrags von Trianon den Bau mehrgleisiger Strecken verbieten. Es wird ein umfassender Ausbauplan ausgearbeitet und umgesetzt, der die bestehenden Bahnstrecken modernisiert und Platz für neue Strecken schafft."
 HUN_facilitate_full_employment:0 "Vollbeschäftigung ermöglichen"
 HUN_facilitate_full_employment_desc:0 "Jeder muss zum Fortschritt unserer Nation und der kommunistischen Sache beitragen. Wir müssen dafür sorgen, dass alle Menschen einen Job und eine sinnvolle Tätigkeit haben. Das bedeutet, Arbeitsplätze zu schaffen. Gebiete mit hoher Arbeitslosigkeit werden industriell und kommerziell ausgebaut, damit jeder auf eine bessere Zukunft hinarbeiten kann."
 HUN_one_nation_one_party:0 "Eine Nation – Eine Partei"
 HUN_one_nation_one_party_desc:0 "Mit dem glorreichen Aufstieg des Kommunismus an die Macht im Land sind keine anderen Parteien mehr nötig, da sie die Wähler nur verwirren. Die einzig wahre KMP wird den Bedürfnissen Ungarns bestens gerecht."
 HUN_communist_international:0 "Kommunistische Internationale"
 HUN_communist_international_desc:0 "Jetzt, da sich in Ungarn eine Arbeiterkultur etabliert, ist es an der Zeit, sich unter den Fittichen der Dritten Internationale der internationalen Sache anzuschließen. Die Sowjetunion wird sicherlich zustimmen, dass das neu kommunistische Ungarn ein würdiges Mitglied der Komintern wäre."
 HUN_soviet_license_trade:0 "Sowjetischer Lizenzhandel"
 HUN_soviet_license_trade_desc:0 "Jetzt, da wir der glorreichen Sowjetunion beigetreten sind, könnten wir sie vielleicht davon überzeugen, einen Teil ihres Wissens mit uns zu teilen. Schließlich ist der Fortschritt unseres Landes der Fortschritt des Kommunismus im Allgemeinen."
 HUN_hungarian_research_cities:0 "Ungarische Forschungsstädte"
 HUN_hungarian_research_cities_desc:0 "Die Sowjets haben ganze Städte gebaut, in denen die Forschung und Entwicklung neuer Technologien im Vordergrund stand. Wir sollten versuchen, dasselbe zu tun und Kontakt zu ihren Forschungsgruppen aufzunehmen, um unser Wissen zu teilen."
 HUN_the_country_of_iron_and_steel:0 "Das Land aus Eisen und Stahl"
 HUN_the_country_of_iron_and_steel_desc:0 "Die Sowjetunion verfügt über reiche Bodenschätze, aber nur über geringe industrielle Kapazitäten zu deren Verarbeitung. Das von ihr entsandte Handelskomitee hat beschlossen, dass unser Land die Stahlindustrie unterstützen soll. Wir werden Eisen und Kohle erhalten und daraus Stahl für die UdSSR verarbeiten. Außerdem haben wir die Erlaubnis erhalten, einen Teil des Stahls für unsere eigenen Zwecke in lokalen Fabriken zu verwenden."
 HUN_worker_spirit:0 "Arbeitergeist"
 HUN_worker_spirit_desc:0 "Gemäß kommunistischen Idealen muss jeder Bürger des Landes seinen Teil der Arbeit leisten. Ein neu vorgeschlagenes Gesetz würde Arbeitslosigkeit praktisch verbieten und sicherstellen, dass jeder zumindest einen Teil des Nützlichen für das Land leistet."
 HUN_spreading_the_revolution:0 "Die Revolution verbreiten"
 HUN_spreading_the_revolution_desc:0 "Unser Land ist eine Bastion der Revolution, ein Licht in der Dunkelheit des Imperialismus. Wir müssen dieses Licht in andere Länder tragen und die Saat der Revolution säen oder sie unterstützen, wenn sie bereits vorhanden ist. Irgendwann wird sich die ganze Welt unserer Sache anschließen, und wir werden als die Paten des Kommunismus in Erinnerung bleiben."
 HUN_soviet_officer_training:0 "Sowjetische Offiziersausbildung"
 HUN_soviet_officer_training_desc:0 "Im Konfliktfall müssen wir unsere Armeen besser mit denen der Sowjets koordinieren. Einige unserer Offiziere könnten ohnehin etwas Training gebrauchen. Wir werden ein gemeinsames Ausbildungsprogramm einrichten und Generäle der sowjetischen Armee für die Ausbildung unserer Offiziere einsetzen."
 HUN_german_revolution:0 "Deutsche Revolution"
 HUN_german_revolution_desc:0 "Deutschland, unser größter Feind, ist bereit, uns an die Gurgel zu gehen. Ihm entgegenzutreten und ihn abzuwehren, wäre zwar eine Heldentat, aber wenn wir unsere Karten richtig ausspielen, könnten wir ihn auf unsere Seite ziehen. Eine kommunistische Revolution in Deutschland würde nicht nur unsere Sicherheit gewährleisten, sondern unsere Ideale in Europa insgesamt stärken, auch wenn es ein kostspieliges Unterfangen wäre."
 HUN_italian_revolution:0 "Italienische Revolution"
 HUN_italian_revolution_desc:0 "Nachdem die Faschisten in Deutschland besiegt wurden, muss nun auch Italien auf Linie gebracht werden. Wir werden die gleiche Taktik wie in Deutschland anwenden: Arbeiterstreiks, Unterstützung der italienischen Kommunistischen Partei und antifaschistische Propaganda."
 HUN_polish_communism:0 "Polnischer Kommunismus"
 HUN_polish_communism_desc:0 "Unsere polnischen Freunde haben den Kommunismus noch nicht angenommen. Sie brauchen einen Anstoß in die richtige Richtung, und mit der nötigen Unterstützung von uns könnte ihnen der richtige Weg gezeigt werden."
 HUN_the_warsaw_pact:0 "Der Warschauer Pakt"
 HUN_the_warsaw_pact_desc:0 "Wenn wir die Revolution in ganz Osteuropa ausbreiten wollen, müssen wir die Bedingungen unseres Bündnisses überdenken. Wir werden vorschlagen, die Komintern in einen offeneren Verband umzuwandeln, der alle befreundeten Staaten der Region willkommen heißt, angefangen mit Polen."
 HUN_armament_unificiation:0 "Rüstungsvereinigung"
 HUN_armament_unificiation_desc:0 "Der Warschauer Pakt muss mehr sein als eine formale Kooperation seiner Mitglieder. Wenn wir uns gegen den imperialistischen Westen verteidigen wollen, müssen wir unsere Armeen und unsere Waffen koordinieren. Wir werden eine Waffenvereinheitlichung vorschlagen, die unter anderem Waffengrößen und Munitionstypen für alle Mitgliedsländer standardisiert."
 HUN_rescue_bela_kun:0 "Rettung von Béla Kun"
 HUN_rescue_bela_kun_desc:0 "Béla Kun war 1919 einer der führenden Politiker der kurzlebigen Räterepublik Ungarn. Nachdem es ihm nicht gelang, den Kommunismus im Land zu etablieren, floh er aus Ungarn und landete in der Sowjetunion, wo er bis heute lebt. Er gerät jedoch zunehmend in Gefahr, da Stalins Paranoia ihn dazu treibt, Politiker in seinem Umfeld hinrichten zu lassen. Wir müssen seine Flucht organisieren, wenn er überleben soll."
 HUN_revolutionary_court:0 "Revolutionsgericht"
 HUN_revolutionary_court_desc:0 "Nach der Wiederherstellung der Räterepublik müssen wir sicherstellen, dass sie erhalten bleibt und nicht den fehlgeleiteten Bemühungen von Konterrevolutionären zum Opfer fällt. Das Revolutionsgericht wird als Instrument zur Unterdrückung unerwünschter Elemente und zur Unterdrückung jener dienen, die den Kommunismus in Ungarn stürzen wollen."
 HUN_red_guard:0 "Rotgardist"
 HUN_red_guard_desc:0 "Polizei, Gendarmerie und Grenzschutz werden durch eine gemeinsame Friedenstruppe ersetzt: die Rote Garde. Diese Organisation steht der Räterepublik treu zur Seite und trägt zur Aufrechterhaltung der Ordnung im Land bei."
 HUN_the_council_of_nations:0 "Der Rat der Nationen"
 HUN_the_council_of_nations_desc:0 "Die Zeit hat gezeigt, dass einsame kommunistische Republiken nicht stark genug sind, um an der Macht zu bleiben. Anstatt der immer größer werdenden Sowjetunion zu erliegen, müssen wir die Zusammenarbeit mit den umliegenden Nationalstaaten suchen. Wir werden die kommunistischen Parteien der Nachbarstaaten einladen und eine Föderation vorschlagen, die einen freien Zusammenschluss kommunistischer Staaten darstellt."
 HUN_the_danube_federation:0 "Der Donauverband"
 HUN_the_danube_federation_desc:0 "Es ist an der Zeit, unseren Worten Taten folgen zu lassen und die Donauföderation zu gründen. Die ersten Unterzeichner sind bereit, dem neuen Verband beizutreten, und die übrigen werden hoffentlich bald folgen."
 HUN_comittee_for_federal_security:0 "Ausschuss für Bundessicherheit"
 HUN_comittee_for_federal_security_desc:0 "Die Donauföderation war ein erfolgreiches Unterfangen, ist aber immer noch fragil. Wir müssen sie vor äußeren Bedrohungen schützen, seien sie militärischer oder ideologischer Natur. Ein Komitee wird eingerichtet, das den Informationsfluss innerhalb und außerhalb der Föderation überwacht und bei Bedarf eingreifen kann."
 HUN_concentrated_construction_effort:0 "Konzentrierter Bauaufwand"
 HUN_concentrated_construction_effort_desc:0 "Unsere Föderation mag klein sein, aber sie hat großes Potenzial. Wir müssen unsere Anstrengungen auf die Entwicklung der weniger entwickelten Regionen in jedem Land konzentrieren, um dieses Potenzial zu nutzen und die ärmeren Regionen des Bündnisses zu fördern. Wir werden diese Anstrengungen regelmäßig auf ein anderes Land verlagern, um die Vorteile gleichmäßig zu verteilen."
 HUN_federal_reserve_guard:0 "Federal Reserve Guard"
 HUN_federal_reserve_guard_desc:0 "Wir können von den Mitgliedern der Donauföderation nicht erwarten, dass sie einer Vereinheitlichung ihrer Armeen zustimmen. Das bedeutet aber nicht, dass es keinen Raum für militärische Zusammenarbeit gibt. Wir werden eine föderale Reserve einrichten, zu der jedes Land einen bestimmten Prozentsatz seiner Reserven beisteuern muss. Jedes Mitglied kann auf diese Reserven zurückgreifen, was bei der bedarfsgerechten Truppenverteilung hilfreich sein wird."
 HUN_danube_scientific_institute:0 "Donauwissenschaftliches Institut"
 HUN_danube_scientific_institute_desc:0 "Das Potenzial für wissenschaftliche Verbesserungen, das in der Donauföderation steckt, darf nicht ungenutzt bleiben. Zum Wohle unserer Allianz werden wir in Budapest eine gemeinsame Forschungseinrichtung gründen, an der Wissenschaftler aus allen Mitgliedsstaaten der Föderation teilnehmen werden."
 HUN_a_bastion_against_fascism:0 "Eine Bastion gegen den Faschismus"
 HUN_a_bastion_against_fascism_desc:0 "Wir müssen uns auf einen möglichen Krieg gegen den Faschismus vorbereiten. Unsere nördlichen und westlichen Grenzen müssen entsprechend befestigt werden, wenn wir überhaupt eine Chance haben wollen, seinen Vormarsch aufzuhalten."
 HUN_preparations_for_the_war:0 "Kriegsvorbereitungen"
 HUN_preparations_for_the_war_desc:0 "Wenn wir als Nation bestehen wollen, müssen wir auf den bevorstehenden Krieg vorbereitet sein. Das bedeutet strengere Gesetze zur Mobilisierung und Rekrutierung sowie eine klar definierte Außenpolitik."
 HUN_war_on_fascism:0 "Krieg gegen den Faschismus"
 HUN_war_on_fascism_desc:0 "Wir sind nun gut auf den großen Krieg vorbereitet, der vor uns liegt. Den Krieg, um den Faschismus von der Erde zu tilgen."
 HUN_territorial_policy:0 "Territorialpolitik"
 HUN_territorial_policy_desc:0 "Sobald wir das Land, das wir durch den Vertrag von Trianon verloren haben, zurückerlangt haben, müssen wir entscheiden, was wir damit tun. Wenn wir wollen, dass es vollständig zu unserem Land gehört, müssen wir Schritte zu seiner Integration unternehmen."
 HUN_integration_focus:0 "Integrationsfokus"
 HUN_integration_focus_desc:0 "Um die Bevölkerung in den neu erworbenen Gebieten zu assimilieren, müssen wir sie zur Kooperation bewegen, sonst werden sie sich nie zu uns gehören. Friedliche Integration ist der richtige Weg."
 HUN_minority_rights:0 "Minderheitenrechte"
 HUN_minority_rights_desc:0 "Wir können nicht erwarten, dass sich ausländische Ethnien innerhalb weniger Jahre assimilieren. Der einfachste Weg, sie zu integrieren, besteht darin, ihnen die gleichen (oder fast die gleichen) Rechte wie den übrigen Bürgern unseres Landes zu gewähren. Auf diese Weise fühlen sie sich in unserem Land nicht wie Ausländer."
 HUN_suppression_focus:0 "Unterdrückungsfokus"
 HUN_suppression_focus_desc:0 "Die uneingeschränkte Zusammenarbeit der einheimischen Bevölkerung in den neu erworbenen Gebieten ist notwendig, wenn wir sie für die Armee nutzen wollen. Deshalb müssen wir jeglichen Nationalstolz ausmerzen und sie so schnell wie möglich aggressiv assimilieren. Das mag zwar einige Verluste mit sich bringen, aber der Zweck heiligt die Mittel."
 HUN_hungarization:0 "Ungarisierung"
 HUN_hungarization_desc:0 "Es reicht nicht aus, dass die Bevölkerung der vereinten Gebiete nicht gegen uns ist. Wir müssen ihnen ungarische Ideale vermitteln und ihnen klarmachen, dass sie für dieses Land kämpfen müssen, wenn sie darin leben wollen. Durch Medien, Bildung und Gesetze werden wir jeden Bürger unseres Landes zu einem treuen Diener der Nation machen."
 HUN_revisionism:0 "Revisionismus"
 HUN_revisionism_desc:0 "Im Vertrag von Trianon wurde Ungarn von Österreich abgetrennt und der größte Teil seines Territoriums ungerechterweise entrissen. Unser Hauptaugenmerk muss darauf liegen, die ehemaligen Gebiete des Landes wiederherzustellen und das Unrecht wiedergutzumachen, das seinem Volk angetan wurde."
 HUN_celebrate_the_successful_revision:0 "Feiern Sie die erfolgreiche Überarbeitung"
 HUN_celebrate_the_successful_revision_desc:0 "Wir haben unser Ziel erreicht, das Gebiet zurückzugewinnen, das uns im Vertrag von Trianon entrissen wurde. Dies ist ein Grund zum Feiern, und zu Ehren dieses Ereignisses werden wir einen neuen Nationalfeiertag einführen, der dieses Datum für immer in Erinnerung behalten wird."
 HUN_hungary_first:0 "Ungarn zuerst"
 HUN_hungary_first_desc:0 "Wir sind allein in unserem Kampf um die Rückeroberung unseres verlorenen Territoriums. Die Zeit hat gezeigt, dass niemand an einer Revision des Vertrags von Trianon interessiert ist. Daher müssen wir die Sache selbst in die Hand nehmen und Verbündete gewinnen, oder wir müssen uns jedem Gegner allein stellen."
 HUN_conscription_reforms:0 "Wehrpflichtreformen"
 HUN_conscription_reforms_desc:0 "Eine völlige Ausweitung der Wehrpflicht könnte zwar öffentliche Empörung hervorrufen, doch wenn wir die Gesetze sorgfältig auslegen, könnten wir dennoch mehr Arbeitskräfte gewinnen. Wenn man hier ein bisschen nachgibt und dort ein bisschen wegnimmt, ist die ganze Sache schon so heikel, dass sie die meisten Menschen verwirrt."
 HUN_revisionist_education:0 "Revisionistische Bildung"
 HUN_revisionist_education_desc:0 "Unser Bildungssystem muss die Ideen des Revisionismus aufgreifen und ihren Geist an die jüngeren Generationen weitergeben. Der einstige Glanz Ungarns soll in den Schulen vermittelt werden und den Kindern Nationalstolz vermitteln. Bildungsminister Kuno von Klebelsberg hat einen detaillierten Plan zur Reform des Bildungssystems ausgearbeitet."
 HUN_budapest_research_group:0 "Budapester Forschungsgruppe"
 HUN_budapest_research_group_desc:0 "Das Rückgrat unserer Fraktion ist die Zusammenarbeit, da die meisten ihrer Mitglieder zu klein sind, um sich einzeln zu schützen. Das ist auch in der Forschung nicht anders. Wir müssen alles daran setzen, mit den Wissenschaftlern unserer Verbündeten zusammenzuarbeiten."
 HUN_polish_hungarian_intelligence_exchange:0 "Polnisch-ungarischer Geheimdienstaustausch"
 HUN_polish_hungarian_intelligence_exchange_desc:0 "Um unser Land bestmöglich zu schützen, müssen unsere Geheimdienste internationale Missionen durchführen und alle Informationen sammeln, die sie finden können. Polen, ein alter Freund Ungarns, wäre dabei ein wertvoller Partner, und solange die Vereinbarung auf Gegenseitigkeit beruht, wäre das Land bereit zu helfen."
 HUN_invite_poland:0 "Polen einladen"  
 HUN_invite_poland_desc:0 "Polen und Ungarn waren schon immer enge Freunde. Nachdem wir uns nun entschlossen haben, in den kommenden großen Konflikten allein zu bestehen, wäre es vielleicht ratsam, die Freundschaft zwischen unseren Völkern zu vertiefen und ein Bündnis mit Polen zu schließen."
 HUN_support_polish_claims:0 "Unterstützen Sie polnische Ansprüche"
 HUN_support_polish_claims_desc:0 "Nach dem Ersten Weltkrieg erhielt Polen über Danzig Zugang zum Meer, was die deutschen Grenzen verwundbar macht und ein furchtbares Bild abgibt. Es wäre viel sinnvoller, Polen ganz Ostpreußen zu überlassen, wodurch beide Länder über ein stärker gefestigtes Territorium verfügen würden. Wir werden unseren Einfluss nutzen, um Polens Ansprüche in der Region zu unterstützen."
 HUN_invite_bulgaria:0 "Bulgarien einladen"
 HUN_invite_bulgaria_desc:0 "Bulgarien hat unserer Sache im Ersten Weltkrieg eher aus Notwendigkeit als aus Freundschaft gedient. Vielleicht könnten sie dies erneut tun, wenn wir unsere Beziehungen zu ihnen etwas stärken würden. Wir könnten sie mit dem Versprechen territorialer Gewinne aus Jugoslawien und Rumänien in unsere neu gegründete Fraktion locken."
 HUN_burgas_industrial_development_project:0 "Industrieentwicklungsprojekt Burgas"
 HUN_burgas_industrial_development_project_desc:0 "Der militärische Charakter unseres Bündnisses mit Bulgarien mag uns von ihnen distanzieren, doch das wird uns nicht davon abhalten, eine echte Freundschaft zwischen unseren Ländern aufzubauen. Wir werden dazu beitragen, ihre Industrie in einer der weniger entwickelten Regionen ihres Landes zu entwickeln, was uns sicherlich ihre Dankbarkeit einbringen und sie auch zu einem stärkeren Verbündeten machen wird."
 HUN_secure_dobrudja:0 "Sichern Sie die südliche Dobrudscha"
 HUN_secure_dobrudja_desc:0 "Ein Problem Bulgariens seit jeher sind die vielen Bulgaren in der Dobrudscha, die unter der Herrschaft der niederträchtigen Rumänen leiden und ständig unterdrückt werden. Mit der Stärkung unseres Bündnisses wächst auch unser internationaler Einfluss. Wir könnten diesen Einfluss nutzen, um Rumänien dazu zu drängen, Teile (wenn nicht die gesamte) Dobrudscha an Bulgarien abzutreten."
 HUN_help_finland:0 "Helfen Sie Finnland"
 HUN_help_finland_desc:0 "Finnland wird von der Sowjetunion bedroht und benötigt dringend Hilfe. Indem wir ihnen unsere Hilfe anbieten, können wir die Bemühungen der Kommunisten indirekt behindern."
 HUN_invite_finland:0 "Finnland einladen"
 HUN_invite_finland_desc:0 "Nachdem wir den Finnen unsere guten Absichten bewiesen haben, werden sie unsere Einladung zur Mitgliedschaft in unserem Bündnis mit Sicherheit annehmen. Sie könnten ein wertvoller Verbündeter im Kampf gegen die Sowjets sein, gegen die wir letztendlich kämpfen müssen."
 HUN_turkish_alliance:0 "Türkische Allianz"
 HUN_turkish_alliance_desc:0 "Ungarn und die Türkei hatten in der Vergangenheit ihre Differenzen, aber wir sollten keinen jahrhundertealten Groll hegen, wenn die Freundschaft für beide Länder von Vorteil ist. So wie sie im Ersten Weltkrieg an unserer Seite gekämpft haben, können sie uns jetzt, da wir unser eigenes Bündnis geschlossen haben, unterstützen."
 HUN_turkish_troop_exchange:0 "Türkischer Truppenaustausch"
 HUN_turkish_troop_exchange_desc:0 "Bündnisse basieren auf gegenseitigem Vertrauen. Dieses Vertrauen könnten wir mit der Türkei sicherstellen, indem unsere Armeen Soldaten austauschen und beide Länder so die Kontrolle über eine kleine Gruppe der Soldaten des jeweils anderen Landes erhalten. Dies könnte langfristig weitere Vorteile bringen, da die Soldaten ihre Erfahrung einbringen und so beiden Ländern beim Aufbau ihrer Streitkräfte helfen könnten."
 HUN_turkish_troop_exchange_tt:0 "Wir werden einige Divisionen aus der Türkei erhalten und ihnen die gleiche Menge schicken.\n"
 HUN_reinforce_turkish_claims:0 "Türkische Ansprüche verstärken"
 HUN_reinforce_turkish_claims_desc:0 "Das einst stolze Osmanische Reich musste nach dem Ersten Weltkrieg die Kontrolle über den Großteil seiner Gebiete außerhalb Anatoliens aufgeben. Viele wünschen sich eine Rückgabe dieser Gebiete an die Türken, unsere Verbündeten. Ihre Stärkung würde wiederum unser Bündnis stärken. Wir werden ihre Ansprüche auf Syrien und das östliche Mittelmeer offiziell unterstützen."
 HUN_greek_alliance:0 "Griechische Allianz"
 HUN_greek_alliance_desc:0 "Die Türken haben unserem Land im 16. und 17. Jahrhundert großes Leid zugefügt. Die Griechen waren noch länger unter der Besatzung, und unsere Vergangenheit ist auch auf andere Weise mit uns verbunden. Die Stephanskrone wurde dem König von Ungarn von einem byzantinischen Kaiser geschenkt – eine Gefälligkeit, die wir nun erwidern möchten. Wir werden uns mit den Griechen verbünden und die türkischen Unholde vernichten!"
 HUN_megali_idea:0 "Unterstützen Sie die Megali-Idee"
 HUN_megali_idea_desc:0 "Seit der Unabhängigkeitserklärung der Griechen von den Osmanen träumen sie von der Vereinigung aller ethnisch und historisch griechischen Länder. Dieser Traum wurde als „Megali-Idee“ bekannt und umfasst große Gebiete, die noch immer unter türkischer Herrschaft stehen. Die meisten Griechen wurden im Zuge des Bevölkerungsaustauschs von 1923 aus Anatolien umgesiedelt, erheben aber weiterhin Ansprüche auf diese Gebiete."
 HUN_strike_turkey:0 "Streik Türkei"
 HUN_strike_turkey_desc:0 "Alles ist bereit für einen großen Rachekrieg gegen die Türkei. Mit der Unterstützung unserer griechischen Freunde werden wir die sterbende türkische Bestie in die Knie zwingen und ihnen eine Kostprobe dessen geben, was wir jahrhundertelang während der türkischen Besatzung erleiden mussten."
 HUN_befriend_austria:0 "Befriend Austria"
 HUN_befriend_austria_desc:0 "Die einst blühende österreichisch-ungarische Freundschaft ist nahezu zerbrochen. Wenn wir hoffen, Österreich als Verbündete zu gewinnen, müssen wir diese sterbende Beziehung zwischen den beiden Ländern wiederbeleben."
 HUN_war_with_austria:0 "Krieg mit Österreich" 
 HUN_war_with_austria_desc:0 "Österreich steht dem ungarischen Revisionismus im Weg. Der Welt muss gezeigt werden, was die neu gewonnene Stärke unserer Nation leisten kann, und unser westlicher Nachbar ist ein ideales Ziel für diese Demonstration."
 HUN_the_burgenland_referendum:0 "Die Burgenländische Volksabstimmung"
 HUN_the_burgenland_referendum_desc:0 "Das Burgenland, ein kleines Stück Land, das nach dem Ersten Weltkrieg von Ungarn abgelöst wurde, ist überwiegend von Ungarn bewohnt. Könnten wir Österreich davon überzeugen, den Burgenländern eine Volksabstimmung über den Anschluss an Ungarn zu ermöglichen, würden sie mit Sicherheit dafür stimmen."
 HUN_restore_the_austro_hungarian_monarchy:0 "Wiederherstellung der österreichisch-ungarischen Monarchie"
 HUN_restore_the_austro_hungarian_monarchy_desc:0 "Das Ende des Ersten Weltkriegs markierte den Untergang Österreich-Ungarns. Nun könnte endlich die Zeit gekommen sein, die einst stolze Monarchie wiederzuerwecken. Otto von Habsburg, der älteste Sohn Karls I., des letzten regierenden Monarchen Österreich-Ungarns, ist noch am Leben und wohlauf und wäre der perfekte König für diese neue Monarchie."
 HUN_croatian_trialism:0 "Kroatischer Trialismus"
 HUN_croatian_trialism_desc:0 "Während des Ersten Weltkriegs wurde die Idee des Trialismus – die Umwandlung der Doppelmonarchie in eine Dreistaatenmonarchie durch die Eingliederung Kroatiens – als Lösung für die wachsenden Spannungen zwischen den Nationalitäten des Reiches aufgeworfen. Wir könnten diese Idee wiederbeleben und unsere Nation auf der Zusammenarbeit von Deutschen, Ungarn und Slawen aufbauen."
 HUN_czech_trialism:0 "Tschechischer Trialismus"
 HUN_czech_trialism_desc:0 "Die Idee des Trialismus (Umwandlung der Doppelmonarchie in eine Dreistaatenmonarchie) existiert bereits seit der Zeit Österreich-Ungarns. Sie könnte tatsächlich die gewünschte Stabilität bringen, wenn mehr Nationalitäten direkt mit dem Land verbunden wären. Die logische Wahl wären die Tschechen, da ihr Land die industrielle treibende Kraft unseres Landes ist und es für uns von größter Bedeutung ist, ihre Loyalität zu gewinnen."
 HUN_compromise_with_the_nationalities:0 "Kompromiss mit den Nationalitäten"
 HUN_compromise_with_the_nationalities_desc:0 "Wenn wir das Reich mit seinen unzähligen Nationalitäten wirklich so erhalten wollen, wie es ist, müssen wir mit allen einen Kompromiss schließen. Wir werden nicht alle Minderheiten auf die Stufe der Ungarn, Österreicher oder Slawen stellen, aber wir müssen mit ihnen einen Konsens erzielen, wenn das Reich überleben soll."
 HUN_wilsons_10th_point:0 "Wilsons 10. Punkt"
 HUN_wilsons_10th_point_desc:0 "Präsident Woodrow Wilson hatte einen ganz anderen Plan für das Schicksal Österreich-Ungarns, als er tatsächlich umgesetzt wurde. Er wollte das Land in eine Föderation verwandeln, in der die Nationalitäten ein gewisses Maß an Selbstverwaltung hatten. Mit einer kleinen Abwandlung des Konzepts ließe sich eine föderale Monarchie schaffen, in der die oberste Autorität zwar beim Monarchen liegt, regionale Entscheidungen aber an die lokalen Parlamente delegiert werden."
 HUN_regional_elections:0 "Regionalwahlen"
 HUN_regional_elections_desc:0 "Die Föderation ist deutlich stabiler als die Monarchie, die ihr vorausging, doch die multinationale Bevölkerung ist mit der Vertretung ihrer Interessen noch immer nicht zufrieden. Anstelle von ernannten Vertretern könnten wir lokal gewählte Vertreter haben, die für vier Jahre im Amt bleiben. Dies würde bedeuten, einen Teil der Kontrolle über die Politik unseres Landes abzugeben und dafür mehr Stabilität zu erhalten."
 HUN_empires_of_old:0 "Alte Imperien"
 HUN_empires_of_old_desc:0 "In den 1920er Jahren gab es in Frankreich monarchistische Kreise, die die Schaffung einer mitteleuropäischen Vielvölkermonarchie befürworteten, doch ihr Einfluss reichte nicht aus. Vielleicht wären unsere Chancen auf eine Zusammenarbeit mit einer wiederhergestellten französischen Monarchie besser, und wir könnten sie sogar in unser Bündnis einladen."
 HUN_remind_the_germans_of_the_glory_days:0 "Erinnern Sie die Deutschen an die glorreichen Tage"
 HUN_remind_the_germans_of_the_glory_days_desc:0 "Die meisten ausländischen Mächte lehnten die Wiederherstellung Österreich-Ungarns ab und werden dessen Existenz wohl nicht mehr lange tolerieren. Unsere alten Verbündeten in Deutschland haben sich zwar vom traditionellen Imperialismus abgewandt, doch die Erinnerung an das glorreiche Deutsche Reich lebt in ihren Herzen weiter. Wir könnten versuchen, die Anhänger der alten Monarchie um den deutschen Kronprinzen Wilhelm zu scharen, der an der Front kämpft."
 HUN_the_kaisers_coup:0 "Der Putsch des Kaisers"
 HUN_the_kaisers_coup_desc:0 "Die Unterstützung des Kronprinzen ist groß genug geworden, um einen Putsch erfolgreich durchzuführen. Wenn wir einen solchen Putsch organisieren würden, könnten wir die Hohenzollern wieder an die Macht bringen und im Deutschen Reich einen neuen Verbündeten finden."
 HUN_develop_austrian_ironworking:0 "Entwicklung der österreichischen Eisenverarbeitung"
 HUN_develop_austrian_ironworking_desc:0 "In den österreichischen Bergen schlummern Tonnen ungenutzter Mineralien, die nur darauf warten, von uns abgebaut zu werden. Mit geringem Aufwand könnten wir die Stahlproduktion in der Region vervielfachen und genug für eine komplett neue Fabrik produzieren."
 HUN_renew_the_hindenburg_plan:0 "Erneuerung des Hindenburg-Plans"
 HUN_renew_the_hindenburg_plan_desc:0 "Der Hindenburg-Plan des Ersten Weltkriegs, der in Deutschland und Österreich-Ungarn umgesetzt wurde, war zwar nicht der erhoffte Erfolg, enthielt aber einige gute Ideen. Mit den Erkenntnissen aus den Rückschlägen könnten wir das Programm erneuern, in der Hoffnung, unsere Ressourcen und unsere industrielle Kapazität besser zu nutzen."
 HUN_skoda_steel_works:0 "Skoda-Stahlwerk"
 HUN_skoda_steel_works_desc:0 "Die Skoda-Werke sind einer der größten Industriekonzerne der tschechischen Wirtschaft. Wenn wir die lokalen Ressourcen voll ausschöpfen wollen, sollten wir ihnen staatliche Aufträge erteilen und ihnen die Nutzung der Rohstoffe der Region ermöglichen."
 HUN_revenge_for_trianon:0 "Rache für Trianon"
 HUN_revenge_for_trianon_desc:0 "Es ist an der Zeit, denen, die uns nach dem Ersten Weltkrieg Unrecht angetan haben, einen Schlag zu versetzen. Die Franzosen waren während des Vertrags von Trianon am grausamsten zu uns, deshalb werden wir uns zuerst an ihnen rächen."
 HUN_galicia_for_guarantees:0 "Galicien für Garantien"
 HUN_galicia_for_guarantees_desc:0 "Krakau und Galizien gehörten seit ihrer Gründung zur österreichisch-ungarischen Monarchie. Polen muss daran erinnert werden, wem diese Gebiete gehören. Im Gegenzug können wir ihnen Schutz garantieren. Sollten sie sich weigern, zu kooperieren, haben wir einen triftigen Grund, uns alles mit Gewalt zu nehmen."
 HUN_the_bucovina_question:0 "Die Bukowina-Frage"
 HUN_the_bucovina_question_desc:0 "Im Norden Rumäniens liegt ein kleines Stück Land namens Bukowina. Ein Teil der Bevölkerung dort ist ungarisch, was Grund genug wäre, den Staat zu fordern. Allerdings ist die Bukowina auch ein historischer Teil Österreich-Ungarns. Rumänien wird das Gebiet abtreten müssen, wenn es nicht einen Krieg mit der Macht unseres Landes riskieren will."
 HUN_imperialist_coup_in_czechoslovakia:0 "Imperialistischer Putsch in der Tschechoslowakei"
 HUN_imperialist_coup_in_czechoslovakia_desc:0 "Die Tschechoslowakei ist rechtmäßig Teil unseres Reiches. Wir können jedoch nicht einfach ihre Annexion fordern, da die derzeitige Regierung nicht kooperationsbereit ist. Sollten wir einen pro-österreichisch-ungarischen Putsch im Land durchführen, würde uns die neue Führung sicherlich mit Unterstützung unserer Bemühungen danken."
 HUN_merge_with_czechoslovakia:0 "Zusammenschluss mit der Tschechoslowakei"
 HUN_merge_with_czechoslovakia_desc:0 "Österreich und Ungarn sind zwar vereint, doch die Wiederherstellung des Kaiserreichs hat gerade erst begonnen. Die Tschechoslowakei kann nicht allein bestehen und sollte mit uns wiedervereinigt werden. Wir werden eine friedliche Integration ihres Territoriums vorschlagen und im Gegenzug Schutz und ein gewisses Maß an Autonomie bieten."
 HUN_demand_italian_provinces:0 "Nachfrage italienischer Provinzen"
 HUN_demand_italian_provinces_desc:0 "Italien ist eine stolze Nation und trotz seiner vergangenen Misserfolge eine ernstzunehmende Macht. Deshalb dürfte es schwierig sein, mit den Italienern eine Einigung zu erzielen und sie zur Rückgabe alter Provinzen der Monarchie zu bewegen. Wir werden unseren Einfluss auf dem Balkan geltend machen und ihre Expansion nach Griechenland unterstützen. Sie könnten Epirus und Kreta erhalten, wenn sie Südtirol und Istrien zurückgeben."
 HUN_draw_closer_to_germany:0 "Näher an Deutschland heranrücken"
 HUN_draw_closer_to_germany_desc:0 "Ungarn war nicht das einzige Land, das in den Friedensverträgen nach dem Ersten Weltkrieg zu Unrecht gedemütigt wurde. Deutschland könnte sich bereit erklären, uns bei unseren Bemühungen zu unterstützen, wenn wir uns an die Verträge halten."
 HUN_military_science_division:0 "Abteilung für Militärwissenschaft"
 HUN_military_science_division_desc:0 "Obwohl unser Land stark dasteht, gibt es offensichtlich einige Bereiche, die verbesserungswürdig sind. Die Deutschen haben in mehreren Technologiebereichen herausragende Fortschritte erzielt, und als gute Freunde bieten sie gerne ihre Hilfe an, wenn wir eine Gruppe von Wissenschaftlern entsenden, um ihre Innovationen zu untersuchen."
 HUN_synthetic_oil_effort:0 "Bemühungen um synthetisches Öl"
 HUN_synthetic_oil_effort_desc:0 "Auch in Deutschland gibt es, wie in uns, keine umfangreichen Ölreserven. Im Bereich der synthetischen Ölproduktion wurden dort bedeutende Fortschritte erzielt, die auch wir nutzen könnten."
 HUN_negotiations_with_italy:0 "Verhandlungen mit Italien"
 HUN_negotiations_with_italy_desc:0 "Italien liegt direkt vor unserer Haustür, doch die diplomatischen Beziehungen zwischen unseren Ländern sind sehr unsicher. Wir sollten versuchen, einen Vertrag mit Italien auszuhandeln, der unsere diplomatische Position stabilisiert und möglicherweise beiden Ländern Vorteile bringt."
 HUN_the_adriatic_initiative:0 "Die Adria-Initiative"
 HUN_the_adriatic_initiative_desc:0 "Wir müssen engere Beziehungen zu Italien aufbauen. Da wir nun Zugang zum Meer haben, haben wir ein gemeinsames Interesse mit Italien: die Verteidigung der Adria. Wir werden eine gemeinsame Initiative für Schiffbau und Marineforschung vorschlagen, die uns helfen wird, aufzuholen und Italien zu helfen, seine Küsten besser zu verteidigen."
 HUN_cooperation_with_italy:0 "Zusammenarbeit mit Italien"
 HUN_cooperation_with_italy_desc:0 "Wir haben jetzt gemeinsame Forschungsinitiativen mit Deutschland und Italien. Es ist an der Zeit, beide zusammenzubringen und auf die Weiterentwicklung unserer gesamten Allianz hinzuarbeiten, nicht nur der einzelnen Länder."
 HUN_axis_membership:0 "Treten Sie [ROOT.GetGermanFactionName] bei"
 HUN_axis_membership_desc:0 "Nachdem unsere Beziehungen zu Deutschland nun gestärkt sind, ist es an der Zeit, den letzten Schritt in Richtung echter Zusammenarbeit zu tun. Wir werden um die Aufnahme in die Fraktion bitten, was zu diesem Zeitpunkt nur noch eine Formalität sein sollte."
 HUN_GER_AXIS:0 "Die Achse"
 HUN_GER_CENTRAL_POWERS:0 "Die Mittelmächte"
 HUN_GER_GERMANYS_FACTION:0 "Deutschlands Fraktion"
 HUN_exit_attempt:0 "Beendigungsversuch"
 HUN_exit_attempt_desc:0 "Wir wurden von Deutschland in einen Krieg hineingezogen, und viele behaupten, dass wir diesen Krieg nicht gewinnen können. Sollte das tatsächlich der Fall sein, müssen wir uns umgehend aus dem Konflikt zurückziehen. Sollte sich eine Gelegenheit bieten, werden wir versuchen, die Seiten zu wechseln. Dieser Versuch muss geheim gehalten werden, sonst könnten die Deutschen aggressiv eingreifen."
 HUN_fall_of_the_ussr:0 "Untergang der UdSSR"
 HUN_fall_of_the_ussr_desc:0 "Die Bolschewiken stehen an unseren Grenzen und starren uns hungrig an. Wir sollten ihnen den Kampf ansagen, bevor sie beschließen, uns dasselbe anzutun. Mit unserem Freund und Verbündeten Deutschland im Rücken haben die Sowjets keine Chance."
 HUN_hungarian_german_research_effort:0 "Ungarisch-deutsche Forschungsanstrengungen"
 HUN_hungarian_german_research_effort_desc:0 "Deutschland ist führend in der Forschung, wenn es um militärische Anwendungen geht. Wir können viel von ihnen lernen, aber das gilt auch umgekehrt. Wir sollten eine gemeinsame Forschungsgruppe gründen, die zum Nutzen beider Länder arbeitet."
 HUN_assistance_from_the_general_staff:0 "Unterstützung durch den Generalstab"
 HUN_assistance_from_the_general_staff_desc:0 "Wir haben unsere Beziehungen zu Deutschland gestärkt und unsere Bereitschaft zur Unterstützung bewiesen. Um Deutschland auch in Zukunft zu helfen, müssen unsere militärischen Führer ihre Aktionen gut koordinieren. Wir werden darum bitten, einen Teil ihres Generalstabs nach Ungarn zu entsenden und mit unserem Oberkommando zusammenzuarbeiten."
 HUN_men_for_burgenland:0 "Männer fürs Burgenland"
 HUN_men_for_burgenland_desc:0 "Die deutsche Kriegslage ist verzweifelt. Sie benötigen dringend neue Rekruten, um ihre Kriegsmaschinerie weiter zu betreiben. Wir könnten ihnen einen Austausch vorschlagen, bei dem wir ihnen rekrutierbare Männer im Austausch gegen Burgenland geben."
 HUN_extensive_conscription:0 "Umfangreiche Wehrpflicht"
 HUN_extensive_conscription_desc:0 "Unser Land ist klein und kann keine ausreichend große Armee aufstellen, um mit den Großmächten Europas mithalten zu können. Wir müssen alles tun, um dem entgegenzuwirken, angefangen bei unseren Wehrpflichtgesetzen. Wir werden jeden wehrfähigen Mann in der Armee brauchen, um unsere Forderungen gegenüber unseren Nachbarn durchzusetzen."
 HUN_the_rongyos_garda:0 "Der Rongyos Gárda"
 HUN_the_rongyos_garda_desc:0 "Nach unserer Niederlage im Ersten Weltkrieg half die Rongyos Gárda – eine bunt zusammengewürfelte Truppe von Freiwilligen – dabei, die Westgrenzen unseres kleinen Landes zu sichern, einschließlich Sopron, das ohne sie wahrscheinlich eine österreichische Stadt wäre. Auch nach dem Ersten Wiener Schiedsspruch waren sie eine große Hilfe bei der Besetzung der Slowaken. Wir sollten sie mit staatlichen Mitteln und Unterstützung unterstützen."
 HUN_military_land_survey:0 "Militärische Landvermessung"
 HUN_military_land_survey_desc:0 "Das Land ist in letzter Zeit gewachsen, und wenn wir unsere neuen Gebiete behalten wollen, müssen wir sie verteidigen können. Unser Militär benötigt bessere und detailliertere Karten des Landes als die derzeit verfügbaren. Wir werden eine landesweite Vermessung durch die Armee in Auftrag geben, die uns im Bedarfsfall bessere Verteidigungsmöglichkeiten bietet."
 HUN_hungarist_ideas:0 "Ungaristische Ideen"
 HUN_hungarist_ideas_desc:0 "Das Land könnte von einer nationalsozialistischen Regierung profitieren, die die Bevölkerung davon überzeugen kann, alles zu tun, um dem Land zu helfen. Die Pfeilkreuzlerpartei erfreut sich immer größerer Beliebtheit und könnte mit ein wenig Hilfe bald die Regierungspartei werden."
 HUN_hungarian_ss:0 "Ungarische SS"
 HUN_hungarian_ss_desc:0 "Wir könnten mit Deutschland ein Abkommen schließen und Ungarn und Deutsche aus Ungarn in die Waffen-SS einziehen lassen. Im Gegenzug würden wir unsere Panzerproduktion subventionieren. Unsere Soldaten wären unter deutscher Führung sicher, und im Gegenzug bekämen wir die Technologie und die Mittel, um unsere eigenen Panzereinheiten zu produzieren."
 HUN_declare_state_of_emergency:0 "Notstand ausrufen"
 HUN_declare_state_of_emergency_desc:0 "In diesen Zeiten internationaler Spannungen und Konflikte dürfen wir nicht zulassen, dass unser Land gespalten und unentschlossen bleibt. Eine einzelne Instanz muss die Macht übernehmen, bis das Chaos sich gelegt hat, und das Land durch Not und Elend führen. Wir werden Ferenc Szálasi, dem Staatsoberhaupt, alle Macht anvertrauen, die er braucht, um uns durch diese unsicheren Zeiten zu führen."
 HUN_social_reforms:0 "Sozialreformen"
 HUN_social_reforms_desc:0 "Religiöse Angelegenheiten werden vom Staat streng kontrolliert, und Kirchen dürfen sich nicht politisch beteiligen. Gewerkschaften und Streiks werden verboten. Aus- und Einwanderung werden ebenfalls eingeschränkt, und im Ausland lebende Ungarn werden in ihre Heimat umgesiedelt. Die Reformen betreffen auch das Gesundheitssystem und Staatsbedienstete und beinhalten eine strenge Zensur von Medien und Literatur."
 HUN_national_socialist_industry:0 "Nationalsozialistische Industrie"
 HUN_national_socialist_industry_desc:0 "Im Geiste unserer neuen nationalen Ideale werden wir die Produktionsstätten und -mittel beschlagnahmen, damit der Staat sie im Dienste der Nation einsetzen kann. Materieller Reichtum ist nur Mittel zum Zweck, nicht Selbstzweck. Der Einzelne muss sich der Sache der Nation unterordnen, wenn es uns gelingen soll, den idealen ungarischen Staat zu schaffen."
 HUN_the_order_of_the_working_nation:0 "Der Orden der arbeitenden Nation"
 HUN_the_order_of_the_working_nation_desc:0 "Nachdem die überholten sozialen Institutionen abgebaut wurden, kann die neue Ordnung unserer Gesellschaft etabliert werden. Die Menschen werden in 14 Kasten eingeteilt, beispielsweise Bauern, Arbeiter oder Soldaten. Jede Kaste wird einen bestimmten Führer haben, der ihre Interessen vertritt und die Nation führt."
 HUN_united_lands_hungaria:0 "Vereinigte Länder Ungarn"
 HUN_united_lands_hungaria_desc:0 "Die Zukunft, die Szálasi für Ungarn vorsieht, betrifft alle Nationen des Karpatenbeckens. Wir können auf der internationalen Bühne nur dann relevant bleiben, wenn wir uns mit unseren Nachbarn auf ein gemeinsames Ziel vereinen. Dieses gemeinsame Ziel wird ein vereintes Ungarn sein. Die Bevölkerung der Karpaten kann in einer Volksabstimmung darüber abstimmen, ob sie an dieser Initiative teilnehmen möchte."
 HUN_industrial_and_work_reforms:0 "Industrie- und Arbeitsreformen"
 HUN_industrial_and_work_reforms_desc:0 "Einige Industriezweige wurden seit 1920 unnötig überentwickelt. Diese Entwicklung wird gestoppt und ein neues, auf der Landwirtschaft basierendes Industriesystem etabliert. Für diejenigen, die ungarisches Land und Unternehmen entwickeln wollen, werden zinslose Kredite eingeführt, und die Eigentumsverhältnisse werden in der Verfassung geregelt."
 HUN_domestic_focus:0 "Inländischer Fokus"
 HUN_domestic_focus_desc:0 "Steuergelder und Privatvermögen dürfen nur im Inland ausgegeben werden. Wer sein Geld ins Ausland schafft, wird des Landesverrats angeklagt. Der internationale Handel wird ausschließlich vom Staat abgewickelt. Die Armee wird umstrukturiert und modernisiert, und ihre Soldaten werden aus allen Nationalitäten rekrutiert."
 HUN_the_industrialized_agrarian_state:0 "Der industrialisierte Agrarstaat"
 HUN_the_industrialized_agrarian_state_desc:0 "Die Nation wird sich in eine moderne Agrargesellschaft verwandeln und die Sozialstruktur wird einer gründlichen Neuordnung unterzogen. Industrie- und Landwirtschaftsvorschriften werden in die Verfassung aufgenommen und Fabrikarbeiter werden gesetzlich verpflichtet, für eine bestimmte Zeit am selben Ort zu arbeiten."
 HUN_reinforce_the_gendarmerie:0 "Verstärke die Gendarmerie"
 HUN_reinforce_the_gendarmerie_desc:0 "Obwohl die Gendarmerie nach dem Ersten Weltkrieg aufgelöst wurde, wurde sie bald darauf wieder aufgebaut und hat unserem Land seitdem gute Dienste geleistet. Einige haben vorgeschlagen, die Rechte der Gendarmerie zu erweitern, um ihr zu helfen, die Ruhe und Ordnung in unserem Staat besser aufrechtzuerhalten."
 HUN_expand_the_levente_associations:0 "Erweitern Sie die Levente-Verbände"
 HUN_expand_the_levente_associations_desc:0 "Die Jugend unseres Landes erhält im Rahmen der Levente-Verbände eine patriotische Erziehung. Die Leventes erhalten auch eine vormilitärische Ausbildung, die ein gutes Sprungbrett für diejenigen darstellt, die der Armee beitreten möchten. Es ist an der Zeit, diese Institution auszubauen, um sicherzustellen, dass kein Kind ohne nationalistische Indoktrination bleibt."
 HUN_enact_home_defense_law:0 "Gesetz zur Selbstverteidigung im eigenen Land erlassen"
 HUN_enact_home_defense_law_desc:0 "Die politische Lage um uns herum wird immer gefährlicher. Es wäre ratsam, sich auf die Verteidigung vorzubereiten. Dafür benötigen wir die entsprechende gesetzgeberische Unterstützung. Das Heimatschutzgesetz ermöglicht es der Regierung, durch einen Ausschuss spezielle Kriegsmaßnahmen zu beschließen."
 HUN_maintain_conservative_government:0 "Konservative Regierung aufrechterhalten"
 HUN_maintain_conservative_government_desc:0 "Unsere derzeitige Regierung ist stark, aber wir müssen Maßnahmen ergreifen, um unsere Macht unangefochten zu halten. Wir werden die konservativen Ideen des derzeitigen Kabinetts unterstützen und sicherstellen, dass extremistische Bewegungen nicht zu stark an Boden gewinnen."
 HUN_ban_the_arrow_cross_party:0 "Verbot der Pfeilkreuzler-Party"
 HUN_ban_the_arrow_cross_party_desc:0 "Die ungarischen Ideen Szálasis haben unser Land lange genug geplagt. Er selbst wird verhaftet und inhaftiert, und seine politische Partei wird verboten, ebenso wie alle anderen Bewegungen und politischen Organisationen, die sich mit den Pfeilkreuzlern assoziieren."
 HUN_state_ammunition_factory:0 "Staatliche Munitionsfabrik"
 HUN_state_ammunition_factory_desc:0 "Wir könnten unsere Volkswirtschaft ankurbeln, indem wir staatliche Gelder direkt in die Rüstungsindustrie investieren. Munitionsfabriken würden diesem Zweck gut dienen und zusätzlich die Armee versorgen."
 HUN_introduce_foreign_service:0 "Einführung des Auswärtigen Dienstes"
 HUN_introduce_foreign_service_desc:0 "Felderfahrung ist für die Ausbildung unserer Truppen von unschätzbarem Wert. Auch wenn wir nicht immer in bewaffnete Konflikte verwickelt sind, finden wir weltweit sicherlich den einen oder anderen Krieg, den wir für ein sympathisierendes Land führen möchten. Durch die Einführung einer Auslandsdienstpflicht können wir indirekt Einfluss auf ausländische Konflikte nehmen und unseren Soldaten zusätzliche Ausbildung bieten."
 HUN_swing_politics:0 "Swing-Politik"
 HUN_swing_politics_desc:0 "Wir müssen unsere diplomatischen Optionen jederzeit offen halten, wenn wir nicht erneut auf der Verliererseite landen wollen. Indem wir zwischen den Verbündeten und der Achse hin- und herpendeln, können wir versuchen, möglichst lange unentschlossen zu bleiben und uns erst dann für eine Seite zu entscheiden, wenn wir sicher sind, die richtige Wahl zu treffen."
 HUN_expansionism:0 "Expansionspolitik"
 HUN_expansionism_desc:0 "Wir sind lange genug neutral geblieben. Wir müssen unser Schicksal selbst in die Hand nehmen und diejenigen bekämpfen, die unser Land zerstören wollen. Die Rückeroberung Ungarns erfolgt mit Gewalt, nicht durch Diplomatie."
 HUN_request_foreign_assistance:0 "Auslandshilfe beantragen"
 HUN_request_foreign_assistance_desc:0 "Ungarn ist zu klein, um seine alten Gebiete allein wiederherzustellen. Wenn wir mit unseren revisionistischen Bemühungen Erfolg haben wollen, müssen wir die Freundschaft und Hilfe ausländischer Mächte suchen."
 HUN_align_with_poland:0 "Mit Polen verbünden"
 HUN_align_with_poland_desc:0 "Die Polen sind seit Jahrhunderten mit Ungarn befreundet. Sie sind zwischen größeren Mächten eingeklemmt, haben sich aber keiner von ihnen gebeugt. Wir könnten ein Bündnis mit ihnen anstreben und uns gemeinsam gegen Ost und West verteidigen und dabei vielleicht sogar einige unserer alten Gebiete zurückgewinnen."
 HUN_renew_the_polonia_military_aid:0 "Erneuerung der Militärhilfe für Polonia"
 HUN_renew_the_polonia_military_aid_desc:0 "Während des polnisch-sowjetischen Krieges 1920 versorgte Ungarn die polnische Armee mit Kleinwaffen und Munition. Die geplante Militärhilfe hätte sich auch auf Freiwilligenkorps erstrecken sollen, kam jedoch nicht zustande. Das Abkommen könnte um zusätzliche Kooperationsmöglichkeiten, wie die gemeinsame Produktion von Kriegsmaterial oder Forschung, erweitert werden."
 HUN_strengthen_the_rome_protocols:0 "Stärkung der Römischen Protokolle"
 HUN_strengthen_the_rome_protocols_desc:0 "1934 vereinbarten Italien, Österreich und Ungarn eine geopolitische und wirtschaftliche Zusammenarbeit. Das Abkommen war kein bindendes Bündnis, doch konnten wir auf Grundlage der ursprünglichen Protokolle engere Beziehungen zu Italien anstreben."
 HUN_armament_agreement:0 "Rüstungsabkommen"
 HUN_armament_agreement_desc:0 "Italien ist uns militärisch in vielerlei Hinsicht voraus. Wenn wir verlorene Gebiete zurückgewinnen wollen, müssen wir unsere Aufrüstung beschleunigen, notfalls mit ausländischer Hilfe. Zu diesem Zweck sollten wir die Aufmerksamkeit italienischer Unternehmen und Investoren gewinnen und ihnen Möglichkeiten in Ungarn bieten."
 HUN_countryside_development:0 "Ländliche Entwicklung"
 HUN_countryside_development_desc:0 "Wir dürfen nicht zulassen, dass die Hauptstadt zu unserer einzigen Quelle industrieller Kapazität wird. Durch die Verteilung der Fabriken über das ganze Land werden wir immer über eine ausreichende Industriekapazität verfügen, die wir bei Bedarf nutzen können."
 HUN_elite_cavalry_division:0 "Elite-Kavalleriedivision"
 HUN_elite_cavalry_division_desc:0 "Die einst berühmte ungarische Kavallerie könnte modernisiert werden. Wir werden eine Elitedivision aus Kavallerie und Panzereinheiten rekrutieren, die das Erscheinungsbild der ungarischen Husaren beibehält und dennoch eine effektive Streitmacht auf dem Schlachtfeld darstellt."
 HUN_reassert_old_claims:0 "Alte Ansprüche erneut geltend machen"
 HUN_reassert_old_claims_desc:0 "Es ist schlimm genug, dass die Alliierten die berechtigte Forderung Albert Apponyis im Versailler Vertrag, die Gebietsverluste Ungarns zu begrenzen, ignoriert haben. Seitdem scheint die Welt vergessen zu haben, dass unser Land einst eines der größten der Region war. Das historische Territorium des Königreichs Ungarn muss wiederhergestellt werden, daher erheben wir offen Ansprüche auf die verlorenen Provinzen."
 HUN_claim_fiume:0 "Anspruch Fiume"
 HUN_claim_fiume_desc:0 "Der Hafen von Fiume war schon zu Zeiten der österreichisch-ungarischen Monarchie umkämpft, ist nun aber unter italienische Besatzung geraten. Er gehört uns rechtmäßig, doch die Italiener würden ihn niemals einfach so hergeben. Wir müssen mehr als nur diplomatischen Druck ausüben, wenn wir ihn uns sichern wollen."
 HUN_demand_slovakia:0 "Nachfrage Slowakei"
 HUN_demand_slovakia_desc:0 "Die Slowakei – oder die Tschechoslowakei – ist und war nie ein lebensfähiger Staat. Sie ist lediglich ein Konstrukt von Trianon und wird als solches von der neuen ungarischen Regierung nicht anerkannt. Die Tschechoslowakei wird alle betroffenen Gebiete abtreten, oder wir nehmen sie mit Gewalt ein. Die Drohung, das gesamte Land zu verlieren, könnte ausreichen, um die Hälfte davon aufzugeben."
 HUN_yugoslavian_pact_of_eternal_friendship:0 "Jugoslawischer Vertrag über ewige Freundschaft"
 HUN_yugoslavian_pact_of_eternal_friendship_desc:0 "Obwohl Jugoslawien Provinzen besitzt, die eigentlich uns gehören sollten, wäre es ein wichtiger Verbündeter, wenn wir uns Deutschland entgegenstellen würden. Jugoslawien pflegt gute Beziehungen zu seinen Verbündeten und wird dem deutschen Druck wahrscheinlich nicht nachgeben. Wir sollten die Beziehungen zwischen unseren Ländern regeln und einen Pakt der „Ewigen Freundschaft“ unterzeichnen, der den Weg für eine weitere Zusammenarbeit ebnen würde."
 HUN_partition_yugoslavia:0 "Teilung Jugoslawiens"
 HUN_partition_yugoslavia_desc:0 "Dieses Monstrum von Jugoslawien ist ein weiteres hässliches Produkt der Friedensverträge nach dem Ersten Weltkrieg. Wenn wir in der Region genügend Einfluss gewinnen oder einige Großmächte davon überzeugen können, uns zu unterstützen, könnten wir eine Neuaufteilung des jugoslawischen Territoriums vereinbaren."
 HUN_partition_romania_with_the_ussr:0 "Teilung Rumäniens mit der UdSSR"
 HUN_partition_romania_with_the_ussr_desc:0 "Es ist kein Geheimnis, dass die Sowjets Ambitionen haben, Bessarabien zu erobern, genau wie wir Siebenbürgen beanspruchen wollen. Durch sorgfältige Verhandlungen könnten wir mit ihnen einen Deal aushandeln, bei dem wir Rumänien von zwei Seiten angreifen und uns gegenseitig bei der Erreichung unserer Ziele unterstützen."
 HUN_demand_transylvania_focus:0 "Nachfrage Transsilvanien"
 HUN_demand_transylvania_focus_desc:0 "Siebenbürgen, einer der ältesten Kerne unseres Landes, wurde fälschlicherweise als rechtmäßig rumänisches Gebiet angesehen und soll unverzüglich an unser ruhmreiches Land abgetreten werden. Sollte die rumänische Regierung beschließen, daran festzuhalten, könnten wir es uns mit Gewalt nehmen und, wenn wir schon dabei sind, den Rest ihres Landes erobern."
 HUN_threaten_war_for_banat:0 "Drohen Sie mit Krieg um das Banat"
 HUN_threaten_war_for_banat_desc:0 "Obwohl das Banat nicht überwiegend von Ungarn bewohnt wird, wäre eine Übernahme strategisch vorteilhaft, da es unsere südlichen Grenzen übermäßig verlängert. Rumänien ist mittlerweile so schwach, dass es nahezu allen unseren Forderungen nachgeben könnte. Das sollten wir zu unserem Vorteil nutzen. Wir werden ihnen mit einer Kriegserklärung drohen, wenn sie ihre Truppen nicht aus dem Banat abziehen."
 HUN_croatian_ports:0 "Kroatische Häfen"
 HUN_croatian_ports_desc:0 "Da Kroatien jahrzehntelang von Binnenstaaten umgeben war, hat sich unsere Erfahrung im Marinebereich etwas verschlechtert. Um uns auf See wieder zu etablieren, müssen wir unsere Marinekapazitäten ausbauen. Die Adriahäfen Kroatiens bieten alle Verbesserungspotenzial und könnten mit wenig Aufwand zu tragfähigen Marinestützpunkten werden."
 HUN_metal_processing_in_vojvodina:0 "Metallverarbeitung in der Vojvodina"
 HUN_metal_processing_in_vojvodina_desc:0 "Die Provinz Batschka ist eine der Provinzen, die am wenigsten Angriffen ausgesetzt sind und spielt daher eine strategische Rolle bei der Entwicklung unserer Industrie. Die Metallindustrie war in der Region schon immer präsent, wenn auch in kleinerem Maßstab. Dennoch ist die Provinz ideal für einen militärisch-industriellen Komplex."
 HUN_croatian_smelting_industry:0 "Entwicklung der kroatischen Schmelzindustrie"
 HUN_croatian_smelting_industry_desc:0 "Kroatien verfügt über enorme Ressourcen, die nicht optimal genutzt werden. Der Ausbau der Hüttenindustrie in Kroatien und Slawonien würde es uns ermöglichen, das Bauxit und Eisen in der Region besser zu nutzen."
 HUN_coal_mines_in_nyitra:0 "Kohlengruben in Nyitra"
 HUN_coal_mines_in_nyitra_desc:0 "Da Nyitra nun wieder in unserer Hand ist, kann der Kohlebergbau ausgebaut und neue Fabriken mit den Ressourcen versorgt werden."
 HUN_mines_in_transylvania:0 "Bergwerke in Siebenbürgen"
 HUN_mines_in_transylvania_desc:0 "Die zahlreichen Berge Siebenbürgens sind reich an Rohstoffen wie Eisen, Gold, Kupfer und Salz. Der Ausbau des Bergbaunetzes in der Region wird die industrielle Kapazität unseres Landes stärken und unsere Bemühungen unterstützen."
 HUN_concentric_road_network:0 "Konzentrisches Straßennetz"
 HUN_concentric_road_network_desc:0 "Mit der Wiedervereinigung des gesamten Gebiets entstand der Bedarf an einem leistungsfähigen Verkehrsnetz. Die Einrichtung eines Kreises von Schnellstraßen in den neuen Provinzen kann dazu beitragen, die lokalen Straßen zu entlasten. Das bestehende Straßennetz, dessen Zentrum Budapest bildet, würde an wichtigen Knotenpunkten in dieses Kreissystem eingebunden."
 HUN_settle_the_matter_of_the_monarchy:0 "Klären Sie die Angelegenheit der Monarchie"
 HUN_settle_the_matter_of_the_monarchy_desc:0 "Unser Land ist seit dem Ende des Ersten Weltkriegs ohne König, und dennoch bezeichnen wir uns als Königreich. Wir müssen uns mit diesem Problem auseinandersetzen und es auf die eine oder andere Weise lösen."
 HUN_restore_the_constitutional_monarchy:0 "Wiederherstellung der konstitutionellen Monarchie"
 HUN_restore_the_constitutional_monarchy_desc:0 "Während der Doppelmonarchie mit Österreich hatte der König die letzte Entscheidungsgewalt in wichtigen Angelegenheiten, während das Parlament unabhängig von ihm agierte. Wir sollten das alte System wiederherstellen und einen König wählen, der das Land regiert."
 HUN_form_a_parliamentary_monarchy:0 "Bilden Sie eine parlamentarische Monarchie"
 HUN_form_a_parliamentary_monarchy_desc:0 "Die Zeiten der absoluten Monarchie sind vorbei. Wenn wir die Monarchie wiederherstellen wollen, sollte dies eine parlamentarische Monarchie sein, in der der Monarch keine Macht über das Parlament hat und nur die Aufgaben eines Staatsoberhauptes wahrnimmt."
 HUN_albrecht_franz_habsburg_of_teschen:0 "Albrecht Franz von Habsburg-Teschen"
 HUN_albrecht_franz_habsburg_of_teschen_desc:0 "Albrecht Franz ist ein entfernter Verwandter der letzten herrschenden Linie der Monarchie, hat aber enge Verbindungen zu Ungarn. Er wäre ein idealer König mit nationalistischen Motiven und potenzieller Unterstützung für ein rechtsgerichtetes Regime in Ungarn."
 HUN_otto_von_habsburg:0 "Otto von Habsburg"
 HUN_otto_von_habsburg_desc:0 "Die Monarchie ist nun stabil, und eine legitimistische Bewegung findet beachtliche Unterstützung. Otto von Habsburg ist der rechtmäßige Thronfolger Ungarns und soll als solcher wieder als König eingesetzt werden. Manche mögen über die Rückkehr eines Habsburgers besorgt sein, doch Otto ist nicht sein Großvater und wird unserem Land mit Sicherheit Frieden und Wohlstand bringen."
 HUN_edward_of_windsor:0 "Edward von Windsor"
 HUN_edward_of_windsor_desc:0 "Wir könnten die Wahl eines neuen Königs nutzen, um internationale Beziehungen aufzubauen. Die britische Herrscherdynastie verfügt über zahlreiche Verwandte, und wenn unsere Länder vom selben Haus regiert würden, würde das zweifellos die Beziehungen zwischen unseren Ländern verbessern. Eduard, Sohn von Georg V., wäre ein hervorragender König für Ungarn."
 HUN_carl_wilhelm_of_sweden:0 "Carl Wilhelm von Schweden"
 HUN_carl_wilhelm_of_sweden_desc:0 "Vielleicht würde die Wahl eines Monarchen aus einer einflussreichen Macht die Neutralität des Landes gefährden. Besser wäre es, den König eines bekanntermaßen neutralen Landes wie Schweden zu wählen. Der zweite Sohn des Königs, Carl Wilhelm, wäre ein hervorragender Kandidat, und gute Beziehungen zu Schweden könnten auch weitere Vorteile bringen."
 HUN_reinforce_the_regency:0 "Verstärken Sie die Regentschaft"
 HUN_reinforce_the_regency_desc:0 "Miklós Horthy verfügt über die meiste Macht im Land, doch das Parlament agiert weiterhin unabhängig vom Regenten. Wir müssen dem Staatsoberhaupt seine Autorität zurückgeben und seine Position als Führer unseres Landes stärken."
 HUN_enthrone_horthy:0 "Horthy inthronisieren"
 HUN_enthrone_horthy_desc:0 "Horthy regiert nun praktisch als König, nur nicht dem Namen nach. Viele Menschen unterstützen seine Krönung, und ein neuer König würde die Stimmung der Nation sicherlich heben."
 HUN_choose_a_successor_for_horthy:0 "Wählen Sie einen Nachfolger für Horthy"
 HUN_choose_a_successor_for_horthy_desc:0 "Horthy hat unserem Land als Regent gute Dienste geleistet, doch sein hohes Alter bereitet vielen Sorgen. Wir sollten noch zu seinen Lebzeiten einen Nachfolger für ihn wählen, damit die Regierung im Falle seines Todes nicht ins Chaos gerät."
 HUN_dismantle_the_monarchy:0 "Zerschlagt die Monarchie"
 HUN_dismantle_the_monarchy_desc:0 "Wir haben genug von der autoritären Herrschaft von Königen und Regenten. Die Monarchie ist überholt und obsolet. Wir werden uns für eine neue Regierungsform entscheiden, in der das Staatsoberhaupt weniger Autorität ausübt und die wahre Macht dem Volk überlassen wird."
 HUN_agricultural_modernisation:0 "Modernisierung der Landwirtschaft"
 HUN_agricultural_modernisation_desc:0 "Die Landwirtschaft ist und war schon immer der wichtigste Wirtschaftsmotor unseres Landes. Wir können diesen Wirtschaftszweig nicht verkümmern lassen, wenn wir auch in anderen Bereichen Fortschritte erzielen wollen."
 HUN_found_maort:0 "MAORT gefunden"
 HUN_found_maort_desc:0 "Amerikanische Geschäftsleute haben eine Ölexpedition in Ungarn finanziert und in der Nähe der Dörfer Lovászi und Hahót beträchtliche Ölvorkommen entdeckt. Sie schlugen die Gründung eines gemeinsamen Unternehmens unter dem Namen MAORT (Magyar-Amerikai Olajipari Rt.) vor, das in diesem Gebiet tätig sein sollte. Der Großteil des Öls würde in unsere Hände fallen, es gibt also wenig zu verlieren."
 HUN_oil_surveys:0 "Öluntersuchungen"
 HUN_oil_surveys_desc:0 "In der Slowakei und in der Batschka wurden Spuren von Ölfeldern gefunden. Wir müssen eine gründliche Untersuchung durchführen und alle ungenutzten Ölreserven in diesen Gebieten kartieren."
 HUN_expand_the_rubber_industry:0 "Ausbau der transdanubischen Kautschukindustrie"
 HUN_expand_the_rubber_industry_desc:0 "Die Kautschukindustrie ist in Ungarn schon seit einiger Zeit präsent. Obwohl sie vollständig auf Importe angewiesen ist, könnte ein Ausbau dieser Industrie von Vorteil sein. Dies würde uns mehr Industriekapazität und einen stetigeren Zufluss von Kautschuk sichern."
 HUN_fortification_effort:0 "Befestigungsbemühungen"
 HUN_fortification_effort_desc:0 "Die Grenzen unseres Landes müssen auf eine Invasion angemessen vorbereitet werden. Eine gut befestigte Linie kann mehr wert sein als ein Dutzend Divisionen."
 HUN_industrial_effort:0 "Industrielle Anstrengungen"
 HUN_industrial_effort_desc:0 "Wenn wir mit der industriellen Kapazität der Großmächte mithalten wollen, müssen wir uns darauf konzentrieren, unsere Industrie so stark wie möglich zu entwickeln. Mit einer ausreichend großen Industrie können wir uns eine Kriegsanstrengung leisten, die mit der jeder Weltmacht vergleichbar ist."
 HUN_gyor_arms_factory:0 "Waffenfabrik Györ"
 HUN_gyor_arms_factory_desc:0 "Györ liegt an einem strategisch wichtigen Punkt. Der Ausbau der Waffenindustrie in der Stadt würde eine schnelle und stetige Versorgung mit Waffen ermöglichen, die die Grenze rasch erreichen könnten."
 HUN_miskolc_arms_factory:0 "Waffenfabrik Miskolc"
 HUN_miskolc_arms_factory_desc:0 "Miskolc liegt an einer strategisch wichtigen Position nahe der Nordgrenze. Der Ausbau der Waffenindustrie in der Stadt würde eine schnelle und stetige Waffenversorgung ermöglichen, die die Front rasch erreichen könnte."
 HUN_artillery_factory_in_szeged:0 "Artilleriefabrik in Szeged"
 HUN_artillery_factory_in_szeged_desc:0 "Artillerie ist ein wesentlicher Bestandteil jeder Division. In unserem Land fehlt noch immer eine geeignete Produktionslinie für die Ausrüstung von Artillerieeinheiten, aber eine Kleinwaffenfabrik in Szeged könnte erweitert werden, um eine neue Produktionslinie speziell für Artillerie zu ermöglichen."
 HUN_artillery_factory_in_gyor:0 "Artilleriefabrik in Györ"
 HUN_artillery_factory_in_gyor_desc:0 "Vor dem Ende des Ersten Weltkriegs gab es in Györ eine Artilleriefabrik, die 1919 von den rumänischen Besatzern geplündert und weitgehend zerstört wurde. Aufgrund seiner strategischen Lage ist Györ noch immer ein idealer Standort für eine Fabrik, daher sollten wir uns intensiv um ihren Wiederaufbau bemühen."
 HUN_budapest_ferihegy_airport:0 "Flughafen Budapest Ferihegy"
 HUN_budapest_ferihegy_airport_desc:0 "In unserer Hauptstadt gibt es noch keinen richtigen Flughafen. Der Bau eines internationalen Flughafens von Weltklasse würde es uns ermöglichen, unsere Luftfahrtziele voranzutreiben und die notwendigen Einrichtungen für den Bau und die Reparatur von Flugzeugen zu schaffen."
 HUN_hungarian_lloyd_aircraft_factory:0 "Ungarische Lloyd-Flugzeugfabrik"
 HUN_hungarian_lloyd_aircraft_factory_desc:0 "Die ursprüngliche Lloyd-Flugzeugfabrik wurde nach dem Ersten Weltkrieg abgerissen, da Ungarn der Flugzeugbau verboten war. Dieses Verbot kann nun nicht mehr durchgesetzt werden, und wir können die Fabrik wieder aufbauen und die Produktion von Militärflugzeugen wieder aufnehmen."
 HUN_transdanubian_construction_grants:0 "Transdanubische Bauzuschüsse"
 HUN_transdanubian_construction_grants_desc:0 "Die transdanubische Industrie könnte etwas Entwicklung gebrauchen. Wir könnten indirekt Einfluss darauf nehmen, indem wir Industrieunternehmen, die sich in der Region ansiedeln möchten, Vergünstigungen gewähren."
 HUN_the_debrecen_industrial_concern:0 "Der Debrecener Industriekonzern"
 HUN_the_debrecen_industrial_concern_desc:0 "Die östlichen Regionen des Landes sind im Vergleich zum Westen unterentwickelt. Die Förderung der lokalen Industrie könnte den nötigen Schwung für die Wiederbelebung der Region bringen."
 HUN_budapest_industrial_district:0 "Budapester Industriegebiet"
 HUN_budapest_industrial_district_desc:0 "An den Grenzen Budapests gibt es riesige ungenutzte Flächen. Die Ausweisung einer dieser Flächen als Industriegebiet würde nicht nur Arbeitsplätze für die Einwohner der Stadt schaffen, sondern auch unsere Industriekapazität steigern."
 HUN_land_clearance:0 "Rodung"
 HUN_land_clearance_desc:0 "Einige Waldgebiete schränken die Expansion unserer Industrie und unseres Straßennetzes ein. Die Abholzung dieser Gebiete würde vorübergehend Arbeitsplätze schaffen und viel Platz für die Expansion unserer Industrie freimachen."
 HUN_hungarian_motorway_network:0 "Ungarisches Autobahnnetz"
 HUN_hungarian_motorway_network_desc:0 "Nach dem Anstieg der Industrietätigkeit im ganzen Land ist das bestehende Straßennetz überlastet. Es ist an der Zeit, die Grundlagen für ein landesweites Autobahnnetz zu schaffen, das alle größeren Städte und Industriezentren mit der Hauptstadt Budapest verbindet. Dieses Netz bietet auch zusätzlichen Raum für die industrielle Expansion, da die Straßen die wichtigsten Siedlungen miteinander verbinden."
 HUN_industrial_research_projects:0 "Industrielle Forschungsprojekte"
 HUN_industrial_research_projects_desc:0 "Durch den Ausbau der Industrie können wir die besten Ingenieure und Wissenschaftler unseres Landes mobilisieren, damit sie ihre Fähigkeiten besser einsetzen und unsere Forschungskapazitäten verbessern können."
 HUN_the_gyori_program:0 "Das Györi-Programm"
 HUN_the_gyori_program_desc:0 "Aufgrund der von den Alliierten des Ersten Weltkriegs in den Friedensverträgen festgelegten Beschränkungen ist unsere Armee heute in ganz Europa ein Gespött. Wir müssen uns auf ein intensives Aufrüstungs- und Entwicklungsprogramm vorbereiten."
 HUN_post_war_reorganisation:0 "Nachkriegsreorganisation"
 HUN_post_war_reorganisation_desc:0 "Nachdem wir nun schon einige Kämpfe hinter uns haben, sind einige Beförderungen sowohl für erfahrene als auch für neue Offiziere unserer Armee angebracht. Diejenigen, die sich auf dem Schlachtfeld hervorgetan haben, werden mit hohen Kommandoposten belohnt."
 HUN_invite_foreign_military_mission:0 "Ausländische Militärmission einladen"
 HUN_invite_foreign_military_mission_desc:0 "Wir sollten nicht nur versuchen, unsere militärische Führung von innen heraus zu verbessern, sondern auch nach Hilfe von außen suchen. Einige unserer Verbündeten verfügen über erfahrene Militärberater, die wir im Rahmen einer Militärmission zur Unterstützung einladen könnten."
 HUN_aviation_effort:0 "Luftfahrtbemühungen"
 HUN_aviation_effort_desc:0 "Unsere Luftwaffe ist in einem desolaten Zustand. Es gibt keine größeren Fabriken, die ausschließlich Flugzeuge bauen, und die Ausbildungsmethoden sind veraltet. In der Nähe von Budapest soll eine Flugzeugfabrik errichtet werden, und ein Expertenteam soll neue Taktiken und Trainingsübungen entwickeln."
 HUN_the_aerotechnics_institute:0 "Das Aerotechnics Institute"
 HUN_the_aerotechnics_institute_desc:0 "Das Aerotechnische Institut der Technischen Universität Budapest hat sich bisher bei der Entwicklung experimenteller Flugzeuge als nützlich erwiesen. Mit den nötigen Mitteln könnte das Institut zur wichtigsten Forschungseinrichtung unserer Luftwaffe ausgebaut werden."
 HUN_air_superiority_focus:0 "Fokus auf Luftüberlegenheit"
 HUN_air_superiority_focus_desc:0 "Für uns als kleines Land ist es lebenswichtig, unseren Luftraum bestmöglich zu verteidigen. Daher sollten Kampfflugzeuge und Unterstützung auf dem Gefechtsfeld unsere Priorität sein. Sollte es uns nicht gelingen, in der Luft die Oberhand zu gewinnen, werden unsere Bodentruppen mit Sicherheit scheitern."
 HUN_fighter_production_innovations:0 "Innovationen in der Kampfflugzeugproduktion"
 HUN_fighter_production_innovations_desc:0 "Vielleicht ist es nicht der klügste Weg, unsere gesamte Industrie auf die Produktion von Kampfflugzeugen zu konzentrieren, um die gewünschte große Luftwaffe aufzubauen. Wenn wir Fortschritte bei der Produktion erzielen könnten, könnten wir intelligenter statt härter bauen."
 HUN_targeted_destruction_focus:0 "Fokus auf gezielte Zerstörung"
 HUN_targeted_destruction_focus_desc:0 "Mit unserer derzeitigen industriellen Kapazität können wir nicht hoffen, die Luftstreitkräfte einer der Großmächte mit Kampfflugzeugen zu übertreffen. Wir könnten jedoch versuchen, so viel Schaden wie möglich anzurichten, indem wir uns auf strategisch wichtige Punkte konzentrieren und die Luftüberlegenheit nur so lange wie nötig erlangen."
 HUN_bomber_production_innovations:0 "Innovationen in der Bomberproduktion"
 HUN_bomber_production_innovations_desc:0 "Die Produktion von Bombern beansprucht einen viel zu großen Teil unserer Industriekapazitäten. Wenn wir ihre Produktion effizienter gestalten könnten, könnten wir Fabriken anderswo auslagern und trotzdem die gleiche Bomberproduktion aufrechterhalten."
 HUN_military_intelligence:0 "Militärischer Geheimdienst"
 HUN_military_intelligence_desc:0 "Ein unbekannter Feind ist ein gefährlicher Feind. Die Erkennung feindlicher Flugzeuge und die Entschlüsselung feindlicher Funksignale sind für unseren Erfolg im Feld von entscheidender Bedeutung. Weitere Investitionen in diese Technologien dürfen nicht verschwendet werden."
 HUN_the_bay_group:0 "Die Bay-Gruppe"
 HUN_the_bay_group_desc:0 "Eine Gruppe unter der Leitung von Zoltán Bay, einem in Ungarn bekannten Physiker, hat bemerkenswerte Fortschritte in der Funkortung erzielt. Mit ausreichender Finanzierung könnte sie den größten Teil des Landes mit einem hochmodernen Radarnetz abdecken, was unsere Luftverteidigung erheblich verbessern würde."
 HUN_jet_propulsion:0 "Strahlantrieb"
 HUN_jet_propulsion_desc:0 "Einige unserer Wissenschaftler haben bahnbrechende Fortschritte auf dem Weg zum ultimativen Fluginstrument erzielt: dem Düsentriebwerk. Mit weiteren Fördermitteln könnten unsere neuesten Flugzeuge mit Düsentriebwerken angetrieben werden und damit nie dagewesene Geschwindigkeiten erreichen."
 HUN_army_effort:0 "Armeeeinsatz"
 HUN_army_effort_desc:0 "Die Umstrukturierung des Militärs muss auf die nächste Stufe gehoben werden. Neue Beamte werden ernannt, und neue Rekruten werden vor ihrem Einsatz intensiviert ausgebildet. Die Abteilung für Militärforschung wurde zudem mit der Weiterentwicklung der Doktrinforschung beauftragt."
 HUN_advanced_infantry_divisions:0 "Vorgerückte Infanteriedivisionen"
 HUN_advanced_infantry_divisions_desc:0 "Die Infanterie ist das Rückgrat jeder Armee. Um in anderen Bereichen erfolgreich zu sein, müssen wir zunächst sicherstellen, dass unsere Infanterie angemessen ausgerüstet und unterstützt wird."
 HUN_specialised_training:0 "Spezialisiertes Training"
 HUN_specialised_training_desc:0 "Einfache Infanterie ist für die meisten Einsätze gut geeignet, doch manchmal können Spezialeinheiten wie Gebirgsjäger oder Marines den entscheidenden Vorteil gegenüber dem Feind verschaffen. Um den Anforderungen solcher Divisionen gerecht zu werden, könnte eine kleine Ausbildungsstätte eingerichtet werden."
 HUN_saint_ladislaus_paratrooper_division:0 "Fallschirmjägerdivision Saint Ladislaus"
 HUN_saint_ladislaus_paratrooper_division_desc:0 "Andere Länder setzen seit geraumer Zeit erfolgreich Fallschirmjägereinheiten ein, während wir in dieser Hinsicht hinterherhinken. Wir müssen uns intensiv um die Gründung einer eigenen Fallschirmjägerdivision bemühen, die nach unserem berühmten mittelalterlichen König St. Ladislaus benannt werden soll. Die Einheit wird mit der notwendigen Ausrüstung und den nötigen Mitteln ausgestattet, sodass die Ausbildung sofort beginnen kann."
 HUN_szekely_mountaineers:0 "Szekler Bergsteiger"
 HUN_szekely_mountaineers_desc:0 "Sobald wir Siebenbürgen erobert haben, können wir die Karpaten als leicht zu verteidigende Linie nutzen. Die lokale Szeklerbevölkerung kennt diese Berge gut, und einige von ihnen könnten in spezialisierte Hegyivadász-Divisionen eingezogen werden."
 HUN_motorization_effort:0 "Motorisierungsbemühungen"
 HUN_motorization_effort_desc:0 "Kavallerie stirbt in Armeen weltweit langsam aus. Sie mag zwar noch für friedenserhaltende Zwecke nützlich sein, doch die Zukunft der schnellen Kriegsführung liegt in motorisierten Divisionen. Wir müssen diesem Thema viel Zeit widmen, wenn wir mit dem Rest der Welt mithalten wollen."
 HUN_project_toldi:0 "Projekt Toldi"
 HUN_project_toldi_desc:0 "Unser Land ist möglicherweise nicht für die Massenproduktion schwer gepanzerter Fahrzeuge geeignet, könnte sich aber Investitionen in leichtere Varianten leisten. Ein geplantes Panzerfahrzeug namens „Toldi“, benannt nach dem mittelalterlichen Ritter Miklós Toldi, könnte unserer bestehenden Armee als unschätzbare Unterstützungseinheit dienen."
 HUN_advanced_doctrines:0 "Fortgeschrittene Lehren"
 HUN_advanced_doctrines_desc:0 "Bloße Gewalt allein reicht nicht aus, um einen Krieg zu gewinnen. Unsere Generäle müssen informiert und mit den modernsten Taktiken vertraut sein, wenn wir auf dem Schlachtfeld erfolgreich sein wollen."
 HUN_swedish_license_trade:0 "Schwedischer Lizenzhandel"
 HUN_swedish_license_trade_desc:0 "Obwohl die Schweden sich aus globalen Konflikten heraushalten wollen, beliefern sie andere gerne mit militärischen Entwürfen. Sie haben einige bemerkenswerte Fortschritte bei Artillerie und gepanzerten Fahrzeugen erzielt. Wir könnten versuchen, einige ihrer Lizenzen zu kaufen und eigene Entwicklungen zu entwickeln, ohne mehr in die Forschung investieren zu müssen."
 HUN_german_license_trade:0 "Deutscher Lizenzhandel"
 HUN_german_license_trade_desc:0 "Unsere Forschungsanstrengungen können nicht alle Bereiche der Kriegsführung effektiv abdecken, daher sind wir zumindest teilweise auf ausländische Technologie angewiesen. Deutschland hat kürzlich einige hervorragende Kampfflugzeuge und Leichtflugzeuge entwickelt, die wir durchaus in unserer eigenen Luftwaffe einsetzen könnten. Ein Geschäftsabschluss mit ihnen würde unsere Luftfahrtanstrengungen ohne nennenswerte Investitionen voranbringen."
 HUN_revive_the_navy:0 "Beleben Sie die Marine wieder"
 HUN_revive_the_navy_desc:0 "Die Binnenlage hat die maritimen Traditionen des Landes stark beeinträchtigt. Die Wiederbelebung der Marine muss mit dem Bau entsprechender Einrichtungen wie Werften und Häfen beginnen. Sobald wir eine solide Basis für unsere Marine geschaffen haben, können wir uns mit taktischen und praktischen Überlegungen befassen."
 HUN_reinstate_horthy:0 "Horthy wieder einsetzen"
 HUN_reinstate_horthy_desc:0 "Miklós Horthy war Konteradmiral der ungarischen Marine, als diese noch existierte. Da das Land keinen Zugang mehr zum Meer hatte, übernahm er die Position des Regenten. Manche würden sagen, sein politischer Hintergrund könnte seine Position in der Marine beeinträchtigen, doch seine Fähigkeiten als Admiral sind unbestritten."
 HUN_screen_effort:0 "Bildschirmaufwand"
 HUN_screen_effort_desc:0 "Das Fundament der Marine sind Zerstörer. Kein Schlachtschiff oder Kreuzer kann dem Angriff einer gut ausgerüsteten Flotte allein standhalten. Es benötigt die Unterstützung von Zerstörern und kleineren Kreuzern."
 HUN_heavy_ship_effort:0 "Schwerer Schiffseinsatz"
 HUN_heavy_ship_effort_desc:0 "Eine Flotte von Zerstörern ist gut. Eine Flotte von Zerstörern, die einige Schlachtschiffe und Kreuzer umgibt, ist sogar noch besser. Wir sollten uns auf die Diversifizierung unserer Flotte konzentrieren und Schiffe für alle Aufgaben und Einsatzzwecke produzieren."
 HUN_naval_defense:0 "Marineverteidigung"
 HUN_naval_defense_desc:0 "Da unser Land seit Jahrzehnten keine Küste mehr hat, mag es überraschen, dass es vom Meer aus angegriffen werden kann. Um solche Katastrophen zu vermeiden, sollten wir, wo immer möglich, Küstenschutzanlagen errichten."
 HUN_amphibious_operations:0 "Amphibische Operationen"
 HUN_amphibious_operations_desc:0 "Nachdem die Verteidigung gesichert ist, steht uns der Angriff als Option zur Verfügung. Es ist durchaus möglich, dass wir in eine Situation geraten, in der wir einen amphibischen Angriff durchführen müssen, und die Vorbereitung darauf ist keine leichte Aufgabe. Deshalb sollten wir uns diese Mühen ersparen und frühzeitig mit den Vorbereitungen beginnen."
 HUN_ubag:0 "UBAG"
 HUN_ubag_desc:0 "UBAG war während des Ersten Weltkriegs eine U-Boot-Fabrik in Fiume, die U-Boote für die österreichisch-ungarische Monarchie produzierte. Wenn wir die U-Boot-Produktion der neuen ungarischen Marine ankurbeln wollen, sollten wir diese Fabrik wiederbeleben und alle alten Pläne verwenden, die wir noch in die Hände bekommen können."
 HUN_naval_tactical_advancements:0 "Marinetaktische Fortschritte"
 HUN_naval_tactical_advancements_desc:0 "Admirale sind im Land nicht leicht zu finden. Dies bietet auch die Möglichkeit, junge, frisch ausgebildete Admirale nach unseren Bedürfnissen auszubilden und einer bestimmten Doktrin zu folgen."
 HUN_organize_military_research_branch:0 "Organisieren Sie eine Abteilung für militärische Forschung"
 HUN_organize_military_research_branch_desc:0 "Mit den Fortschritten im militärischen Bereich sind neue Ingenieure und Wissenschaftler aufgetaucht, die sich als wertvolle Ergänzung unserer Forschungsanstrengungen erwiesen haben. Wir können jetzt mehr Menschen als je zuvor für diese Sache einsetzen."
 HUN_nuclear_technology:0 "Nukleartechnik"
 HUN_nuclear_technology_desc:0 "Der ungarische Wissenschaftler Leó Szilárd hatte bereits 1933 die Idee der nuklearen Kettenreaktion. Jetzt ist die Zeit gekommen, seine Konzepte weiterzuentwickeln und die Technologie sinnvoll einzusetzen."
 HUN_secret_weapons:0 "Geheimwaffen"
 HUN_secret_weapons_desc:0 "Mit den Fortschritten in der Raketen- und Nukleartechnologie ist der Weg für die Kriegsführung der Zukunft frei. Atomwaffen und ferngesteuerte Geschosse können genauso effektiv sein (wenn nicht sogar effektiver) wie Bombenangriffe aus der Luft."
 HUN_secret_rearmament_focus:0 "Geheime Wiederbewaffnung"
 HUN_secret_rearmament_focus_desc:0 "Obwohl wir verpflichtet sind, die Beschränkungen des Vertrags von Trianon einzuhalten, dürfen wir die Verteidigung unseres Landes nicht vernachlässigen. Die Armee wird im Geheimen wieder aufgerüstet, bis wir unsere Bemühungen wieder offenlegen können."
 HUN_bled_agreement_focus:0 "Bled-Abkommen"
 HUN_bled_agreement_focus_desc:0 "Angesichts der zunehmenden Bedrohung des europäischen Friedens können wir die Fesseln des Trianon-Friedensvertrags nicht länger tatenlos hinnehmen. Die Mitglieder der Kleinen Entente werden sicherlich erkennen, dass Ungarn sich wieder aufrüsten muss, sonst droht es der Expansion nach außen und damit auch seinen Grenzen. Wir werden mit ihren Vertretern zusammentreffen, um über eine Lockerung der Beschränkungen zu diskutieren."
 HUN_local_intelligence_training:0 "Lokale Geheimdienstausbildung"
 HUN_local_intelligence_training_desc:0 "Unser Geheimdienst hinkt denen anderer europäischer Mächte weit hinterher. Wir müssen unsere eigenen Ausbildungsprogramme ausbauen, um bei unseren Spionageentwicklungen weniger auf ausländische Hilfe angewiesen zu sein. Die offene Nutzung unserer Ressourcen für Spionage wird zweifellos Misstrauen bei unseren Nachbarn und Feinden hervorrufen, aber wir können diplomatische Beziehungen nicht über die Integrität unseres Landes stellen."
 HUN_expand_vkf_2_non_communist:0 "Erweitern Sie den VKF-2"
 HUN_expand_vkf_2_non_communist_desc:0 "Die VKF-2-Agentur bildete bisher das Rückgrat unserer Geheimdienst- und Spionageabwehrbemühungen. Der Ausbau ihrer operativen Kapazitäten würde zusätzliche Mittel erfordern, was wiederum einige unserer anderen Projekte verlangsamen würde. Angesichts der Nachteile und der Sicherheit des Heimatlandes ist dieses Opfer sicherlich ein lohnendes Opfer."
 HUN_expand_the_avh_communist:0 "Erweitern Sie die ÁVH"
 HUN_expand_the_avh_communist_desc:0 "Die ÁVH-Agentur bildet seit ihrer Gründung das Rückgrat unserer Geheimdienst- und Spionageabwehrbemühungen. Der Ausbau ihrer operativen Kapazitäten würde zusätzliche Mittel erfordern, was wiederum einige unserer anderen Projekte verlangsamen würde. Dieses Opfer ist es sicherlich wert, gebracht zu werden, wenn wir die Nachteile gegen die Sicherheit des Sozialismus und des Vaterlandes abwägen."
 HUN_huba_order_of_battle:0 "Huba Schlachtordnung"
 HUN_huba_order_of_battle_desc:0 "Um unsere Ziele zu erreichen, müssen wir neben dem Gyôri-Programm auch eine umfassende Militärreform einleiten. Die Reform der Armee wird im Rahmen der Huba-Kriegsordnung durchgeführt."
 HUN_rapid_corps: "Rapid Corps"
 HUN_rapid_corps_desc:0 "Ein zentraler Bestandteil der Huba-Schlachtordnung ist die Motorisierung der Armee. Dies soll durch die Aufstellung des Schnellen Korps und den Ausbau der mechanisierten Einheiten der Armee erreicht werden."
 HUN_expand_the_rapid_corps:0 "Erweitern Sie das Rapid Corps"
 HUN_expand_the_rapid_corps_desc:0 "Um unsere mechanisierten Truppen richtig einsetzen zu können, müssen wir Panzereinheiten anpassen. Wir werden das erste Panzerkorps der Armee unter der Huba-Schlachtordnung aufstellen."
 HUN_improve_the_huba_order_of_battle:0 "Verbessern Sie die Huba-Schlachtordnung"
 HUN_improve_the_huba_order_of_battle_desc:0 "Unsere Schlachtordnungen müssen angepasst werden, um den seit ihrer Einführung entstandenen Anforderungen gerecht zu werden. In den ursprünglichen Plänen wurde die Rolle der Luftwaffe etwas vernachlässigt, obwohl sie in unseren Strategien eine größere Rolle spielen muss."
 HUN_danuvia_heavy_submachine_guns:0 "Schwere Maschinenpistolen von Danuvia"
 HUN_danuvia_heavy_submachine_guns_desc:0 "Ferenc Gaubber und Pál Király – der Konstrukteur der bekannten Maschinenpistole Danuvia 43M – haben einen Vorschlag zur Entwicklung und Herstellung eines schwereren Maschinengewehrs vorgelegt, das die Armee einsetzen könnte."
 HUN_alfold_oil_fields:0 "Alföld-Ölfelder"
 HUN_alfold_oil_fields_desc:0 "Die bestehende Ölproduktion in der Alföld-Ebene reicht für unseren Bedarf nicht aus. Mit einigen Investitionen könnten die Raffinerien sowohl für die synthetische Produktion als auch für die Raffination von Naturöl umgerüstet werden."
 HUN_occupation_troops:0 "Besatzungstruppen"
 HUN_occupation_troops_desc:0 "Um die Versorgung und Verteidigung der besetzten Gebiete sicherzustellen, müssen wir entsprechende Einheiten aufstellen und ausrüsten. Diese Einheiten werden in den neu besetzten Gebieten den Bau von Straßen, Brücken und Eisenbahnen durchführen."
 HUN_the_second_army:0 "Die Zweite Armee"
 HUN_the_second_army_desc:0 "Aufgrund der gestiegenen Anforderungen des Krieges gegen die Sowjetunion muss eine neue Armee aufgestellt und an die Front geschickt werden. Dazu müssen wir auf unsere Reserven zurückgreifen und den Großteil unserer Wehrpflichtigen mobilisieren."
 HUN_blitzkrieg_adoption:0 "Blitzkrieg-Adoption"
 HUN_blitzkrieg_adoption_desc:0 "Wir stehen vor dem Zeitalter der mobilen Kriegsführung. Wenn wir auf dem Schlachtfeld erfolgreich sein wollen, müssen wir die Blitzkrieg-Taktiken Deutschlands übernehmen."
 HUN_italian_pilot_training:0 "Italienische Pilotenausbildung"
 HUN_italian_pilot_training_desc:0 "Italien wird bei der Ausbildung von Piloten helfen, während unsere Luftfahrtführung die Möglichkeit haben wird, neue Taktiken zu erlernen."
 HUN_hungarian_german_aircraft_manufacturing:0 "Ungarisch-deutscher Flugzeugbau"
 HUN_hungarian_german_aircraft_manufacturing_desc:0 "Im Rahmen der deutschen Bemühungen, ihre Industrie zu zerstreuen, gewährten sie uns das Recht, die Lizenz für die Me-210 zu erwerben, und halfen uns, eine Produktionsanlage im Donau-Flugzeugwerk zu errichten."
 HUN_expand_the_danube_aircraft_factory:0 "Erweiterung der Donau-Flugzeugfabrik"
 HUN_expand_the_danube_aircraft_factory_desc:0 "Die Luftwaffe benötigt dringend moderne Flugzeuge, daher ist eine Produktionssteigerung in allen Fertigungsanlagen für den Ausbau unserer Luftwaffe von entscheidender Bedeutung."
 HUN_kossuth_order_of_battle:0 "Kossuth-Schlachtordnung"
 HUN_kossuth_order_of_battle_desc:0 "Auch wenn uns die Mannstärke der Sowjetunion fehlt, könnten unsere Armeen ihre Kampftechniken dennoch nutzen, um unsere Truppen effizient einzusetzen."
 HUN_tank_developments:0 "Panzerentwicklungen"
 HUN_tank_developments_desc:0 "Die Sowjetunion hat bei der Entwicklung und Herstellung von Panzern umfangreiche Erfahrungen gesammelt, die wir für die Weiterentwicklung unserer eigenen Forschungsanstrengungen nutzen können."
 HUN_assault_guns_focus:0 "Fokus auf Sturmgewehre" 
 HUN_assault_guns_focus_desc:0 " Die selbstfahrende Artillerie kann sich mit den Panzereinheiten mitbewegen und bei Bedarf Feuerunterstützung leisten. Durch die Standardisierung der Fertigungsprozesse kann die Produktion dieser Einheiten gesteigert werden." 
 HUN_pilis_order_of_battle:0 "Pilis Schlachtordnung"
 HUN_pilis_order_of_battle_desc:0 "Unsere Armeen sollten dem westlichen Muster folgen und wir werden unser Bestes tun, sie entsprechend auszurüsten."
 HUN_french_connection:0 "French Connection"
 HUN_french_connection_desc:0 "Frankreich bot die Möglichkeit, Offiziere in seinen eigenen Einrichtungen auszubilden. Unsere Piloten und Kavallerieoffiziere können in französischen Einrichtungen ausgebildet werden, um Zugang zu den neuesten Taktiken zu erhalten, die sie anbieten können."
 HUN_expand_the_raba:0 "Erweitern Sie die Raba"
 HUN_expand_the_raba_desc:0 "RÁBA ist ein wichtiger Hersteller von Militärausrüstung und -fahrzeugen. Um Truppen schneller ins Feld schicken zu können, müssen wir die Expansion dieses Unternehmens unterstützen."
 HUN_naval_tradition:0 "Marinetradition"
 HUN_naval_tradition_desc:0 "Die Marine der österreichisch-ungarischen Monarchie hat im letzten Krieg hervorragende Leistungen erbracht. Wenn wir die Errungenschaften der Vergangenheit bewahren wollen, müssen wir in die Weiterentwicklung unserer Marine investieren." 
 HUN_war_games_focus:0 "Kriegsspiele"
 HUN_war_games_focus_desc:0 "Um den Zusammenhalt unserer neuen Armee zu verbessern, müssen wir sie regelmäßig durch militärische Übungen schulen."
 HUN_the_kuk_army:0 "Die K.u.K.-Armee"
 HUN_the_kuk_army_desc:0 "Wenn wir die zurückgewonnenen Gebiete der Monarchie effizient verwalten wollen, müssen wir ein neues Wehrpflichtsystem einführen, das es uns ermöglicht, eine gesunde Personalreserve aufrechtzuerhalten."
 HUN_rebuild_the_navy:0 "Wiederaufbau der Marine"
 HUN_rebuild_the_navy_desc:0 "Um unsere Marineproduktion zu steigern, soll in Istrien eine neue Werft errichtet werden. Mit der zusätzlichen Produktion dürfte es uns leichter fallen, mit den Marinen der umliegenden Mächte mitzuhalten."
 HUN_infantry_tactics:0 "Infanterietaktiken"
 HUN_infantry_tactics_desc:0 "Unsere Studien in den verschiedenen Bereichen der Kriegsführung haben Früchte getragen. Wir verfügen nun über die Mittel, die bestmögliche Infanterietaktik zu entwickeln."
