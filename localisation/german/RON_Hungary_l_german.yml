 single_party_system_desc:0 "Die Kommunistische Partei wurde zur einzigen Partei des Landes erklärt."
 underground_communism:0 "Untergrundkommunismus"
 underground_communism_desc:0 "Kommunistische Ideen werden im Geheimen von Agenten eines fremden Landes verbreitet."
 spreading_the_revolution:0 "Die Revolution verbreiten"
 spreading_the_revolution_desc:0 "Unser Hauptinteresse gilt der Internationalisierung der kommunistischen Revolution. Unsere Agenten müssen in die Nachbarländer entsandt werden, um die Arbeiterbewegungen zu unterstützen."
 communist_revolution:0 "Kommunistische Revolution"
 communist_revolution_desc:0 "Eines der kommunistischen Nachbarländer unternimmt große Anstrengungen, um eine Arbeiterrevolution im Land zu ermöglichen."
 reformed_conscription:0 "Reformierte Wehrpflicht"
 reformed_conscription_desc:0 "Durch komplizierte Maßnahmen verlängerte die Regierung die Wehrpflicht, blieb dabei aber technisch gesehen immer noch im Rahmen der Wehrpflicht in Friedenszeiten."
 supporting_italy:0 "Unterstützung für Italien"
 supporting_italy_desc:0 "Wie im ungarisch-italienischen Vertrag vereinbart, ist Ungarn verpflichtet, Italien bei seinen Expansionsplänen mit allen Mitteln zu unterstützen."
 support_from_hungary:0 "Unterstützung aus Ungarn"
 support_from_hungary_desc:0 "Wie im ungarisch-italienischen Vertrag vereinbart, wird Ungarn unsere politischen Bemühungen nach Kräften unterstützen."
 fortification_effort:0 "Befestigungsbemühungen"
 fortification_effort_desc:0 "Das Land konzentriert sich auf die Verbesserung seiner Verteidigung, um sich auf eine Invasion vorzubereiten."
 industrial_effort:0 "Industrielle Anstrengungen"
 industrial_effort_desc:0 "Um seine Ziele zu erreichen, konzentriert sich das Land auf die Entwicklung der Branche."
 fortification_effort_realism:0 "Befestigungsbemühungen"
 fortification_effort_realism_desc:0 "Das Land konzentriert sich auf die Verbesserung seiner Verteidigung, um sich auf eine Invasion vorzubereiten."
 industrial_effort_realism:0 "Industrielle Anstrengungen"
 industrial_effort_realism_desc:0 "Um seine Ziele zu erreichen, konzentriert sich das Land auf die Entwicklung der Branche."
 naval_rearmament:0 "Wiederbewaffnung der Marine"
 naval_rearmament_desc:0 "Das Land verfügt endlich über eine Küstenprovinz und konzentriert sich auf die Entwicklung der Marineinfrastruktur."
 naval_defense:0 "Marineverteidigung"
 naval_defense_desc:0 "Da wir nun eine Küste zu schützen haben, sollten wir alles in unserer Macht Stehende tun, um sie auch tatsächlich zu erhalten."
 fighter_production_innovations:0 "Innovationen in der Kampfflugzeugproduktion"
 fighter_production_innovations_desc:0 "Es wurden Fortschritte bei der schnelleren und effizienteren Produktion von Kampfflugzeugen und CAS-Ausrüstung erzielt."
 bomber_production_innovations:0 "Innovationen in der Bomberproduktion"
 bomber_production_innovations_desc:0 "Es wurden Fortschritte in Richtung einer besseren, schnelleren und effizienteren Geräteproduktion erzielt."
 revisionist_education:0 "Revisionistische Bildung"
 revisionist_education_desc:0 "Die jungen Köpfe des Landes werden von politischen Agenden beeinflusst, und einige von ihnen sind fanatisch darauf bedacht, dem Land zum Erfolg zu verhelfen."
 worker_spirit:0 "Arbeitergeist"
 worker_spirit_desc:0 "Unter der Flagge der Revolution arbeiten die Arbeiter der Nation unermüdlich, um alles zu produzieren, was das Land braucht."
 scientific_spirit:0 "Wissenschaftlicher Geist"
 scientific_spirit_desc:0 "Wissenschaftler des Landes und der Alliierten arbeiten unermüdlich daran, der faschistischen Bedrohung in verschiedenen Technologiebereichen zuvorzukommen."
 war_preparation:0 "Kriegsvorbereitung"
 war_preparation_desc:0 "Die Nation bereitet sich auf einen Krieg in naher Zukunft vor. Rekrutierung und Mobilisierung werden beschleunigt und die Außenpolitik gewinnt immer mehr an Bedeutung."
 funding_the_gyori_program:0 "Finanzierung des Györi-Programms"
 funding_the_gyori_program_desc:0 "Die Regierungsanstrengungen zielen auf die Finanzierung und Weiterentwicklung des Györi-Programms ab, einer Rüstungsinitiative, die das Militär des Landes kampffähig machen soll."
 gyori_program_research:0 "Györi-Programm: Forschung"
 gyori_program_research_desc:0 "In der ersten Phase des Györi-Programms wird die Forschung stark subventioniert."
 gyori_program_industry:0 "Györi-Programm: Industrie"
 gyori_program_industry_desc:0 "Während der ersten Phase des Györi-Programms wird die industrielle Entwicklung gefördert."
 gyori_program_army_research:0 "Györi-Programm: Armee"
 gyori_program_army_research_desc:0 "In der zweiten Phase des Györi-Programms steht die Entwicklung der Armee im Mittelpunkt."
 gyori_program_defense:0 "Györi-Programm: Verteidigung"
 gyori_program_defense_desc:0 "In der zweiten Phase des Györi-Programms wird der Bau von Verteidigungsanlagen subventioniert."
 gyori_program_air_research:0 "Györi-Programm: Luftfahrt"
 gyori_program_air_research_desc:0 "In der dritten Phase des Györi-Programms stehen Forschung und Entwicklung von Flugzeugen im Vordergrund."
 gyori_program_air_production:0 "Györi-Programm: Flugzeugproduktion"
 gyori_program_air_production_desc:0 "Während der dritten Phase des Györi-Programms wird die Flugzeugproduktion subventioniert."
 gyori_program_navy_research:0 "Györi-Programm: Marine"
 gyori_program_navy_research_desc:0 "In der vierten Phase des Györi-Programms liegt der Schwerpunkt auf der Wiederbewaffnung der Marine."
 gyori_program_navy_production:0 "Györi-Programm: Marineproduktion"
 gyori_program_navy_production_desc:0 "In der vierten Phase des Györi-Programms wird der Schiffsbau gefördert."
 assistance_from_german_general_staff:0 "Unterstützung durch den deutschen Generalstab"
 assistance_from_german_general_staff_desc:0 "Zwischen Ungarn und Deutschland besteht eine enge militärische Zusammenarbeit, eine Delegation des Generalstabs berät das Oberkommando in Budapest."
 trianon_restrictions:0 "Trianon-Einschränkungen"
 trianon_restrictions_desc:0 "Obwohl es kein Komitee mehr gibt, das die Auflagen durchsetzt, leidet die ungarische Armee noch immer unter den militärischen Beschränkungen des Friedensvertrags von Trianon."
 trianon_restrictions_bled_agreement:0 "Trianon-Einschränkungen"
 trianon_restrictions_bled_agreement_desc:0 "Obwohl es kein Komitee mehr gibt, das die Auflagen durchsetzt, leidet die ungarische Armee noch immer unter den militärischen Beschränkungen des Friedensvertrags von Trianon."
 multinational_state:0 "Multinationaler Staat"
 multinational_state_desc:0 "Der Zerfall Österreich-Ungarns hatte einen Grund. Die vielen dort lebenden Nationalitäten forderten ein höheres Maß an Autonomie, was die Monarchie jedoch verweigerte. Wenn das Land länger als zuvor überleben soll, muss dieses Problem schnell angegangen werden."
 kadar_administration:0 "Kádár Stadtverwaltung"
 kadar_administration_desc:0 "Die Regierung konzentriert sich auf das Wohl der Bevölkerung, anstatt gegen die Opposition vorzugehen. Offene Gegner des Systems werden weiterhin zum Schweigen gebracht, doch weniger problematische Individuen können in Frieden leben."
 levente_movement:0 "Levente-Bewegung"
 levente_movement_desc:0 "Die Jugend der Nation wird teilweise in einer halbmilitaristischen, konservativen Institution ausgebildet und erzogen."
 levente_movement_2:0 "Levente-Bewegung"
 levente_movement_2_desc:0 "Die Jugend der Nation wird teilweise in einer halbmilitaristischen, konservativen Institution ausgebildet und erzogen."
 visegrad_military_council:0 "Visegrád-Militärrat"
 visegrad_military_council_desc:0 "Ein gemeinsamer Rat aller Länder der Visegrád-Gruppe koordiniert gemeinsame Militäroperationen und erleichtert so die Durchführung kooperativer Aktionen."
 spread_of_nationalism:0 "Verbreitung des Ungarntums"
 spread_of_nationalism_desc:0 "Nationalsozialistische und ungarische Ideologien gewinnen im Land zunehmend an Popularität."
 successful_revision:0 "Erfolgreiche Revision"
 successful_revision_desc:0 "Die Rückeroberung des gesamten verlorenen Territoriums hat den Geist der Nation enorm gestärkt. Das Vertrauen in die Regierung ist wiederhergestellt, und das Land ist bereit, sich allem zu stellen, was als Nächstes kommt."
 goulash_communism:0 "Gulasch-Kommunismus"
 goulash_communism_desc:0 "János Kádár verfolgte während seines kommunistischen Regimes in Ungarn eine einzigartige Politik. Sozialleistungen sorgten dafür, dass die Bevölkerung zufrieden war und kooperativer mit dem System wurde. Das kostete den Staat zwar etwas Geld, schien aber gegenüber dem traditionellen Kommunismus Vorteile zu haben."
 hungarian_five_year_plan:0 "Fünfjahresplan"
 hungarian_five_year_plan_desc:0 "Wie es in kommunistischen Ländern nach dem Vorbild der Sowjetunion üblich ist, ist Ungarn auf eine Planwirtschaft umgestiegen. Jeder und alles funktioniert nach einem Plan, und wenn die Ziele nicht erreicht werden, werden die Berichte in der Regel gefälscht, um ein schlechtes Licht auf das System zu vermeiden."
 united_hungarian_lands:0 "Vereinigte Ungarische Länder"
 united_hungarian_lands_desc:0 "Wie von Ferenc Szálasi vorgesehen, verfügt Ungarn nun endlich über alle ihm zustehenden Gebiete. So wie die alten Ländereien wiederhergestellt wurden, so wurde auch das Vertrauen der Bevölkerung in die Regierung wiederhergestellt."
 szalasi_social_reforms:0 "Sozialreformen von Szálasi"
 szalasi_social_reforms_desc:0 "Die Regierung hat verschiedene Reformen eingeführt, die Religion, Gesundheitsversorgung, Lohnprogramme, Literatur und Medien im Land regeln. Die Reformen sind nicht gerade bei der gesamten Bevölkerung beliebt, verleihen der Regierung aber sicherlich mehr Macht."
 domestic_focus:0 "Inländischer Fokus"
 domestic_focus_desc:0 "Neu eingeführte Gesetze verbieten Investitionen im Ausland und stellen die Verlagerung von Vermögen ins Ausland grundsätzlich unter Strafe. Die Regierung legt großen Wert auf die Entwicklung des Landes, und die Handelspolitik des Landes spiegelt diese Haltung wider."
 avo:0 "ÁVO"
 avo_desc:0 "Die Staatsschutzbehörde (Államvédelmi Osztály, ÁVO) ist die Geheimpolizei des kommunistischen Staates Ungarn. Sie stützt sich in hohem Maße auf ein Netzwerk von Informanten und ist für ihr brutales Vorgehen gegen mutmaßliche Staatsfeinde bekannt."
 king_horthy:0 "König Miklós I. Horthy"
 king_horthy_desc:0 "Nach der Auflösung der absoluten Monarchie und der Errichtung einer parlamentarischen Monarchie wurden Horthys Machtbefugnisse eingeschränkt, er wurde jedoch offiziell zum König von Ungarn gekrönt."
 democracy_gaining_ground:0 "Demokratie gewinnt an Boden"
 democracy_gaining_ground_desc:0 "Seit das Land die neue republikanische Regierungsform angenommen hat, erfreuen sich liberale und demokratische Ideen im Land zunehmender Beliebtheit."
 industrial_agrarian_state:0 "Industrialisierter Agrarstaat"
 industrial_agrarian_state_desc:0 "Im Rahmen seiner zahlreichen Reformen begann Szálasi mit der Umwandlung Ungarns in eine agrarisch geprägte und dennoch moderne Gesellschaft. Dazu gehörten eine gründliche Neuordnung der Sozialstruktur und eine Vielzahl von Gesetzen in Bezug auf Industrie und Landbesitz."
 arrow_cross_party_banned:0 "Pfeilkreuzler-Partei verboten"
 arrow_cross_party_banned_desc:0 "Die Pfeilkreuzlerpartei und alle mit ihr verbundenen Parteien oder Bewegungen sind in Ungarn verboten."
 german_subsidized_armor_production:0 "Deutsche subventionierte Rüstungsproduktion"
 german_subsidized_armor_production_desc:0 "Deutschland drängt die ungarische Industrie, mehr schwere Panzer zu produzieren. Ungarns Ressourcen sind für diese Aufgabe zwar nicht unbedingt geeignet, aber mit dieser Hilfe kann das Land sicherlich eine höhere Produktionsrate erreichen."
 conservative_ideas:0 "Konservative Ideen"
 conservative_ideas_desc:0 "Moderate konservative politische Ansichten gewinnen im Land immer mehr an Boden und die Regierung konzentriert sich auf die Ausrottung des Extremismus."
 hungarian_expansionism:0 "Ungarischer Expansionismus"
 hungarian_expansionism_desc:0 "Das Land ist entschlossen, sein altes Territorium mit konventionellen Mitteln zurückzuerobern. Ungarn wird entweder durch Krieg obsiegen oder im Konflikt untergehen."
 volunteers_for_finland:0 "Freiwillige für Finnland"
 volunteers_for_finland_desc:0 "Das Land bereitet die Entsendung engagierter Freiwilligentruppen nach Finnland vor, um dem Land im Kampf gegen die Sowjetunion zu helfen."
 foreign_service:0 "Auswärtiger Dienst"
 foreign_service_desc:0 "Der Einsatz in ausländischen Konflikten ist ein obligatorischer Teil des Militärdienstes."
 convertible_factories:0 "Wandelbare Fabriken"
 convertible_factories_desc:0 "Die Fabriken des Landes wurden umgestaltet, um eine einfachere Umwandlung in Rüstungsfabriken zu ermöglichen. Bei Bedarf könnte sich die Wirtschaft rasch an eine Kriegssituation anpassen."
 rongyos_garda:0 "Der Rongyos Gárda"
 rongyos_garda_desc:0 "Eine bunt zusammengewürfelte Gruppe von Freiwilligen, die Rongyos Gárda, hat dem Land in der Vergangenheit geholfen, indem sie feindliche Kräfte destabilisierte und sabotierte. Heute werden sie vom Staat finanziert und sind ein Symbol des Patriotismus der Nation."
 military_land_survey:0 "Militärische Landvermessung"
 military_land_survey_desc:0 "Das Land wurde vom Militär gründlich kartiert und die Führung erhielt detaillierte Karten, die die Operationen im Heimatland erleichtern."
 leaning_towards_germany_fascism:0 "Neigung zu Deutschland"
 leaning_towards_germany_fascism_desc:0 "Das Land rückt näher an die faschistische deutsche Regierung heran."
 leaning_towards_germany_democratic:0 "Neigung zu Deutschland"
 leaning_towards_germany_democratic_desc:0 "Das Land nähert sich der demokratischen deutschen Regierung an."
 leaning_towards_germany_communism:0 "Neigung zu Deutschland"
 leaning_towards_germany_communism_desc:0 "Das Land nähert sich der kommunistischen deutschen Regierung an."
 ubag_submarine_factory:0 "UBAG U-Boot-Fabrik"
 ubag_submarine_factory_desc:0 "Die alte UBAG-Fabrik in Fiume wurde wiederbelebt, um erneut U-Boote für Ungarn zu produzieren."
 dunai_repulogepgyar:0 "Donau-Flugzeuggesellschaft"
 dunai_repulogepgyar_desc:0 "Die Danubian Aircraft Company mit Sitz am Flughafen Tököli ist vor allem auf Flugzeuge zur Luftnahunterstützung spezialisiert."
 depleted_reserves:0 "Erschöpfte Reserven"
 depleted_reserves_desc:0 "Die Bildung der zweiten Heeresgruppe hat die Reserven des Landes stark beansprucht. Es wird einige Zeit dauern, bis der Zustrom neuer Rekruten wieder auf Normalniveau ist."
 kuk_army:0 "K.u.K. Armee"
 kuk_army_desc:0 "Die reformierte Wehrpflicht der neuen KuK-Armee ermöglicht einen effizienteren Einsatz der aus neu erworbenen Gebieten rekrutierten Regimenter."
 kingdom_without_a_king:0 "Ein Königreich ohne König"
 kingdom_without_a_king_desc:0 "Ungarn ist seit 1918 ohne König, doch dem Namen nach ist es ein Königreich. Bis zur Lösung dieser Situation wird die politische Lage des Landes instabil bleiben."
 the_iron_curtain:0 "Der Eiserne Vorhang"
 the_iron_curtain_desc:0 "Das Land hat die Kontakte mit nichtkommunistischen Ländern stark eingeschränkt. Dies wirkt sich auf alle Bereiche aus, von der Diplomatie über den Handel bis hin zur Auswanderung."
 move:0 "BEWEGEN"
 move_desc:0 "MOVE steht für Magyar Országos Véderô Egylet (Ungarischer Nationaler Verteidigungsverband) und ist eine paramilitärische Institution, die nach dem Ersten Weltkrieg gegründet wurde, um die durch den Vertrag von Trianon geschwächten Streitkräfte zu unterstützen. Die Gruppe verlor im Laufe der Jahre an Einfluss, doch Bajcsy-Zsilinszky – eine der Schlüsselfiguren bei der Gründung von MOVE – hat ihr kürzlich neue Popularität verliehen."
 land_reform:0 "Bodenreform"
 land_reform_desc:0 "Viele Ländereien des Landes wurden an Landwirte umverteilt, um ihnen die Möglichkeit zu geben, eigene Unternehmen zu gründen."
 espirit_de_corps:0 "Korpsgeist"
 espirit_de_corps_desc:0 "Die Armee wurde umstrukturiert und viele Offiziere, die zuvor entweder kommunistischen oder faschistischen Gruppen angehörten, wurden entlassen."
 soviet_officer_training:0 "Sowjetische Offiziersausbildung"
 soviet_officer_training_desc:0 "Ungarische Offiziere werden mit Unterstützung sowjetischer Generäle ausgebildet. Dies trägt dazu bei, die Erfahrung erfahrener Offiziere weiterzugeben und die Streitkräfte beider Länder einander näher zu bringen."
 aerotechnics_institute:0 "Aerotechnisches Institut"
 aerotechnics_institute_desc:0 "Das Aerotechnische Institut war ursprünglich Teil der Technischen Universität Budapest und ist heute ein eigenständiges Forschungsinstitut. Die Einrichtung ist in erster Linie für die Entwicklung und Erprobung neuer Flugzeuge zuständig."
 king_otto_von_habsburg:0 "König Otto II. von Habsburg"
 king_otto_von_habsburg_desc:0 "Otto von Habsburg, der rechtmäßige Erbe der Monarchie, ist endlich nach Ungarn zurückgekehrt und beansprucht den Thron, der seinem Vater gehörte."
 king_franz_albrecht_von_habsburg:0 "König Albrecht II. Franz von Habsburg-Teschen"
 king_franz_albrecht_von_habsburg_desc:0 "Abrecht Franz, ein Habsburger Prinz mit ungarischen Verbindungen, wurde von den von Szálasi angeführten Ungarn zum König gewählt."
 king_carl_wilhelm:0 "König Carl Wilhelm I."
 king_carl_wilhelm_desc:0 "Carl Wilhelm ist der Sohn des schwedischen Königs Gustav. Er wurde auf den ungarischen Thron gewählt, in der Hoffnung, das Land durch diese unsicheren Zeiten zu führen."
 king_edward_of_windsor:0 "König Edward I. von Windsor"
 king_edward_of_windsor_desc:0 "Um engere Beziehungen zum Vereinigten Königreich aufzubauen, hat Ungarn Edward zum König gewählt."
 imperial_nostalgia:0 "Kaiserliche Nostalgie"
 imperial_nostalgia_desc:0 "Der jüngste Krieg weckt bei manchen Deutschen nostalgische Gefühle – Erinnerungen an die Zeit, als Deutschland in Mitteleuropa eine unangefochtene Großmacht war. Im aktuellen Krieg kämpfen Angehörige des ehemaligen deutschen Königshauses für das Land und gewinnen damit die Sympathie vieler."
 stockpiling_equipment_25:0 "Lagerausrüstung"
 stockpiling_equipment_25_desc:0 "Die Nation legt einen Teil der produzierten Ausrüstung für nur ihr bekannte Zwecke beiseite."
 stockpiling_equipment_50:0 "Lagerausrüstung"
 stockpiling_equipment_50_desc:0 "Die Nation legt einen Teil der produzierten Ausrüstung für nur ihr bekannte Zwecke beiseite."
 german_empire_reborn:0 "Wiedergeburt des Deutschen Reiches"
 german_empire_reborn_desc:0 "Die deutsche Monarchie ist wiederhergestellt und schlummernde Träume vom alten Reich tauchen nun wieder auf."
 secret_agents_occupied:0 "Geheimagenten besetzt"
 secret_agents_occupied_desc:0 "Alle Geheimagenten des Landes werden entsandt, was Geheimdienstoperationen anderswo erschwert."
 infantry_tactics:0 "Infanterietaktiken"
 infantry_tactics_desc:0 "Dank Studien zu verschiedenen Formen der Kriegsführung haben wir fortschrittliche Infanterietaktiken entwickelt."
 armament_unification:0 "Rüstungsvereinigung"
 armament_unification_desc:0 "Die Länder des Warschauer Pakts haben die meisten ihrer Waffen standardisiert, einschließlich Kalibergrößen und Munitionstypen, was die Verwendung von Ausrüstung aus anderen Bündnisländern erleichtert."
 gendarmerie:0 "Gendarmerie"
 gendarmerie_desc:0 "Die ungarische Gendarmerie wurde 1919 neu gegründet und sorgt seither für die Ordnung im Land. Die Institution wurde kürzlich erweitert, um ihr noch mehr Macht zu verleihen."
 multinational_state_trialism:0 "Multinationaler Staat"
 multinational_state_trialism_desc:0 "Die Ungleichheiten zwischen den verschiedenen Nationalitäten des Landes stellen eine schwere Belastung für den Staat dar."
 multinational_state_trialism_compromise:0 "Multinationaler Staat"
 multinational_state_trialism_compromise_desc:0 "Die Ungleichheiten zwischen den verschiedenen Nationalitäten des Landes wurden zwar teilweise gemildert, aber es wird noch lange dauern, bis alle dieses Land ihr Eigen nennen können."
 multinational_state_federation:0 "Multinationaler Staat"
 multinational_state_federation_desc:0 "Die Ungleichheiten zwischen den verschiedenen Nationalitäten des Landes stellen eine schwere Belastung für den Staat dar."
 multinational_state_federation_elections:0 "Multinationaler Staat"
 multinational_state_federation_elections_desc:0 "Die Ungleichheiten zwischen den verschiedenen Nationalitäten des Landes wurden zwar teilweise gemildert, aber es wird noch lange dauern, bis alle dieses Land ihr Eigen nennen können."
 regional_elections:0 "Regionalwahlen"
 regional_elections_desc:0 "In den Bundesstaaten des Landes finden regelmäßig Regionalwahlen statt, bei denen Vertreter für ein gemeinsames Regierungsgremium gewählt werden."
 cooperative_nationalities:0 "Kooperative Nationalitäten"
 cooperative_nationalities_desc:0 "Die meisten Nationalitäten des Landes haben den Status Quo akzeptiert und der Kompromiss zwischen dem Staat und ihnen stellt die Langlebigkeit dieser Zusammenarbeit sicher."
 kun_administration:0 "Kun-Verwaltung"
 kun_administration_desc:0 "Die neue Regierung von Béla Kun setzt langsam die gleiche Politik um, die die gescheiterte Räterepublik 1919 verfolgte."
 kun_administration_2:0 "Kun-Verwaltung"
 kun_administration_2_desc:0 "Die neue Regierung von Béla Kun setzt langsam die gleiche Politik um, die die gescheiterte Räterepublik 1919 verfolgte."
 federal_reserve_guard:0 "Federal Reserve Guard"
 federal_reserve_guard_desc:0 "Die Reserven der Donauföderation können von jedem Mitgliedsstaat genutzt werden, was im Bedarfsfall einen schnelleren Einsatz der Streitkräfte der Föderation ermöglicht."
 federal_construction_effort:0 "Bundesbaubemühungen"
 federal_construction_effort_desc:0 "Die Länder des Donaubundes unterstützen regelmäßig die industrielle Entwicklung eines ihrer Mitglieder, indem sie ihre Bauanstrengungen auf deren Projekte konzentrieren."
 comittee_for_federal_security:0 "Ausschuss für Bundessicherheit"
 comittee_for_federal_security_desc:0 "Als gemeinsame Institution der Donauföderation ist der CFFS für die Wahrung der Integrität der Föderation und ihrer Bevölkerung verantwortlich."
 armed_neutrality:0 "Bewaffnete Neutralität"
 armed_neutrality_desc:0 "Das Land versucht, neutral zu bleiben, indem es seine Verteidigungs- und Streitkräfte ausbaut, in der Hoffnung, potenzielle Angreifer abzuschrecken."
 women_in_the_army:0 "Frauen in der Armee"
 women_in_the_army_desc:0 "Frauen dürfen nun in die Armee. Das missfällt gewissen konservativen Elementen im Militär, trägt aber zur Militarisierung des Landes bei."
 paying_reparations:0 "Reparationen zahlen"
 paying_reparations_desc:0 "Das Land zahlt Reparationen, wie in einem früheren Vertrag vereinbart."
 reparations_from_hungary:0 "Reparationen aus Ungarn"
 reparations_from_hungary_desc:0 "Das Land erhält von Ungarn Reparationszahlungen, wie in einem früheren Vertrag vereinbart."
 social_reconciliation:0 "Soziale Versöhnung"
 social_reconciliation_desc:0 "Der Regierung geht es vor allem um die nationale Einheit, und sie ist bereit, im Interesse der Machtkonsolidierung vergangenes Unrecht zu vergeben."
 tax_reform:0 "Steuerreform"
 tax_reform_desc:0 "Auf der Agenda der Sozialdemokraten, die derzeit Teil der Koalitionsregierung sind, steht die Einstufung der während des Krieges Reichen in eine andere Steuerklasse, was zu einer progressiven und gerechten Verteilung der Steuern führen soll."
 education_reform:0 "Bildungsreform"
 education_reform_desc:0 "Um das intellektuelle Wachstum des Landes zu gewährleisten, wird das Bildungssystem stark subventioniert und es wurden eine Reihe von Reformen zu seiner Modernisierung verabschiedet."
 sending_supplies_to_hungary:0 "Lieferungen nach Ungarn"
 sending_supplies_to_hungary_desc:0 "Die Regierung ist in erster Linie Ungarn gegenüber loyal, was bedeutet, dass ein Teil der Industriekapazitäten des Landes zur Unterstützung der ungarischen Bemühungen eingesetzt wird."
 receiving_supplies_from_slovakia:0 "Lieferungen aus der Slowakei"
 receiving_supplies_from_slovakia_desc:0 "Dank der loyalen Führung ihrer Regierung wird ein Teil der slowakischen Industriekapazitäten zur Unterstützung unserer Bemühungen eingesetzt."
 french_plane_components:0 "Französische Flugzeugkomponenten"
 french_plane_components_desc:0 "Wir haben den Kauf verschiedener Flugzeugkomponenten und Lizenzproduktionen aus Frankreich organisiert. Dazu gehören hauptsächlich Flugzeugmotoren."
 cooperative_romanian_population:0 "Genossenschaftliche rumänische Bevölkerung"
 cooperative_romanian_population_desc:0 "Aufgrund der Popularität des rumänischen Staatschefs sind die Rumänen eher bereit, mit der neuen Regierung zusammenzuarbeiten."
 ludovica_academy:0 "Ludovica-Akademie"
 ludovica_academy_desc:0 "Die Ludovica-Akademie bildet das Rückgrat unserer Offiziersausbildung und ihre jüngste Erweiterung hat die Führung unserer Armee verbessert."
 supporting_worker_revolt_abroad:0 "Unterstützung von Arbeiteraufständen im Ausland"
 supporting_worker_revolt_abroad_desc:0 "Unsere Unterstützung der Donauarbeiter im Ausland zehrt an unseren finanziellen Ressourcen."
 danubian_saboteurs:0 "Donau-Saboteure"
 danubian_saboteurs_desc:0 "Verärgerte Arbeiter aus der Donauregion sabotieren ständig unsere Versorgungslinien und Lager."
 emergency_industrial_measures:0 "Industrielle Notfallmaßnahmen"
 emergency_industrial_measures_desc:0 "Die Bedrohung durch eine sowjetische Invasion hat im Land zu einem industriellen Boom geführt."
 loan_payments_from_hungary:0 "Kreditzahlungen aus Ungarn"
 loan_payments_from_hungary_desc:0 "Ungarn zahlt den Rüstungskredit zurück, den wir ihm gewährt haben."
 italian_armament_loan:0 "Italienischer Rüstungskredit"
 italian_armament_loan_desc:0 "Wir verwenden derzeit Gelder aus Italien, um in unsere Rüstungsindustrie zu investieren."
 italian_hungarian_naval_academy:0 "Italienisch-Ungarische Marineakademie"
 italian_hungarian_naval_academy_desc:0 "Italienische und ungarische Admirale und Marineforscher arbeiten zusammen, um die Technologie- und Ausbildungsanstrengungen beider Länder voranzutreiben."
 home_defense_law:0 "Gesetz zur Verteidigung des eigenen Heims"
 home_defense_law_desc:0 "Die Regierung hat einen Sonderausschuss für die innere Verteidigung eingerichtet. Dieser kann Notstandsgesetze erlassen, wenn die Sicherheit des Heimatlandes bedroht ist."
 gyor_artillery:0 "Gyôr Artillerie"
 gyor_artillery_desc:0 "Die Artilleriefabrik in Gyôr wurde in den Dienst des Militärs gestellt und produzierte Tag und Nacht Artilleriegeschütze."
 hindenburg_plan:0 "Hindenburg-Plan"
 hindenburg_plan_desc:0 "Durch die Umsetzung einer modifizierten Version des ursprünglichen Hindenburg-Plans aus dem Ersten Weltkrieg versucht das Land, die Ressourceneffizienz und die Produktionseffizienz zu maximieren."
 production_control:0 "Produktionskontrolle"
 production_control_desc:0 "Die industrielle Produktion unterliegt in hohem Maße staatlicher Regulierung."
 production_distrubance:0 "Produktionsstörung"
 production_distrubance_desc:0 "Änderungen in der industriellen Produktionssteuerung haben zu leichten Störungen im industriellen Bereich geführt."
 foreign_military_mission:0 "Ausländische Militärmission"
 foreign_military_mission_desc:0 "Ein verbündeter Staat hat eine Militärmission im Land stationiert, die die Führung berät und militärische Operationen beobachtet."
 disciplinary_regiments:0 "Disziplinarregimente"
 disciplinary_regiments_desc:0 "Abtrünnige und ungehorsame Soldaten werden vom Militär als Schützengräben- und Bauarbeiter eingesetzt."
 home_defense_comittee:0 "Ausschuss für Heimatverteidigung"
 home_defense_comittee_desc:0 "Ein Ausschuss, dem auch Mátyás Rákosi angehört, ist für die Planung und Gestaltung der Ausgaben für die Landesverteidigung verantwortlich."
 dual_profile_factories:0 "Fabriken mit zwei Profilen"
 dual_profile_factories_desc:0 "Fabriken werden so ausgestattet, dass sie sowohl Konsumgüter als auch Ausrüstung für das Militär produzieren können."
 foreign_investments:0 "Ausländische Investitionen"
 foreign_investments_desc:0 "Ausländische Investoren investieren ihr Geld in den Aufbau der ungarischen Industrie und Infrastruktur."
 german_economic_connections:0 "Deutsche Wirtschaftsverbindungen"
 german_economic_connections_desc:0 "Zwischen Ungarn und Deutschland besteht eine enge wirtschaftliche Zusammenarbeit, wobei einige deutsche Unternehmen die ungarische Industrie stark subventionieren."
 military_cooperation_with_germany:0 "Militärische Zusammenarbeit mit Deutschland"
 military_cooperation_with_germany_desc:0 "Wie beim Berliner Treffen zwischen Szálasi und Hitler vereinbart, profitiert die ungarische Armee von einer verstärkten Zusammenarbeit mit dem deutschen Oberkommando."
 anti_government_protests_chi:0"Proteste gegen die Regierung"
 anti_government_protests_chi_desc:0"Die Menschen gehen auf die Straße, protestieren aktiv gegen die derzeitige Regierung und fordern Veränderungen."
 anti_government_protests:0 "Proteste gegen die Regierung"
 anti_government_protests_desc:0 "Die Menschen gehen auf die Straße, protestieren aktiv gegen die derzeitige Regierung und fordern Veränderungen."
 shaky_government:0 "Wackelige Regierung"
 shaky_government_desc:0 "Aufgrund der plötzlichen Wahl ist die neu gewählte Regierung nicht besonders gut vorbereitet."
 purge_of_communism:0 "Säuberung des Kommunismus"
 purge_of_communism_desc:0 "Kommunisten werden im Land in großem Umfang gejagt und hingerichtet. Jeder, der sich mit den Bolschewisten verbündet oder ihnen Zuflucht gewährt, wird als Verräter angesehen und gemeinsam mit ihnen strafrechtlich verfolgt."
 the_gamma_factory:0 "Die Gamma-Fabrik"
 the_gamma_factory_desc:0 "Die Gamma-Fabrik ist für die Produktion der sogenannten „Gamma-Juhász lôelemképzô“-Maschinen verantwortlich, die die Einstellungen einer Flugabwehrbatterie bestimmen können, um ein fliegendes Ziel sicher zu treffen. Die subventionierte Massenproduktion dieser Geräte hat unsere Luftverteidigungsfähigkeiten deutlich verbessert."
 polonia_armor_production_hun:0 "Polonia-Rüstungsproduktion"
 polonia_armor_production_hun_desc:0 "Im Rahmen der vereinbarten Polonia-Militärkooperation koordinieren Polen und Ungarn ihre Panzerproduktion und -forschung."
 polonia_armor_production_pol:0 "Polonia-Rüstungsproduktion"
 polonia_armor_production_pol_desc:0 "Im Rahmen der vereinbarten Polonia-Militärkooperation koordinieren Polen und Ungarn ihre Panzerproduktion und -forschung."
 preparation_act:0 "Vorbereitungsgesetz"
 preparation_act_desc:0 "Die Infrastruktur und die Bevölkerung des Landes sind auf einen bevorstehenden Krieg vorbereitet."
 intelligence_focus1:0 "Intelligenzfokus"
 intelligence_focus1_desc:0 "Um die Geheimdienstaktivitäten des Landes auszuweiten, werden aktiv Ressourcen aus anderen Projekten abgezogen."
 intelligence_focus2:0 "Intelligenzfokus"
 intelligence_focus2_desc:0 "Um die Geheimdienstaktivitäten des Landes auszuweiten, werden aktiv Ressourcen aus anderen Projekten abgezogen."
 
