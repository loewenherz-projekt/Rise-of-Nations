 hun_news.1.t:0 "Die Teilung Jugoslawiens"
 hun_news.1.d:0 "Ungarn hat auf dem Balkan genügend Einfluss gewonnen, um eine Neuaufteilung der Gebiete Jugoslawiens voranzutreiben. Das neue Gesicht des Balkans erscheint manchen vielversprechend, anderen hingegen erschreckend."
 hun_news.1.a:0 "Die neuen Ränder sehen gut aus."
 hun_news.1.b:0 "Der Frieden Europas ist in Gefahr!"
 hun_news.1.c:0 "Erstaunlich, wie schnell Länder entstehen und verschwinden."
 
 hun_news.2.t:0 "Die kleine Entente"
 hun_news.2.d:0 "Nach der Wiedererrichtung Österreich-Ungarns initiierte die Tschechoslowakei die Erneuerung der Kleinen Entente. Das Bündnis ist nun offiziell und zielt darauf ab, die territoriale Integrität seiner Mitglieder vor dem neugeborenen Reich zu verteidigen."
 hun_news.2.d_2:0 "Kurz nachdem Ungarn seine Ansprüche auf altes Territorium angemeldet hatte, rief die Tschechoslowakei zur Erneuerung der Kleinen Entente auf. Das neu gestärkte Bündnis soll die ungarische Expansion mit allen Mitteln eindämmen."
 hun_news.2.a:0 "Verdammt sollen sie alle sein."
 hun_news.2.b:0 "Hurra!"
 hun_news.2.c:0 "Dies wird sicherlich die Spannungen in der Region lindern."
 
 hun_news.3.t:0 "Ende der Kleinen Entente"
 hun_news.3.d:0 "Nach dem Wiedererwachen der österreichisch-ungarischen Monarchie versuchte die Tschechoslowakei, die Mitglieder der Kleinen Entente zu vereinen, doch das sterbende Licht der Allianz erlosch für immer, als weder Rumänien noch Jugoslawien auf den Ruf reagierten."
 hun_news.3.d_2:0 "Die Kleine Entente ist nun offiziell aufgelöst, da sich ihre Mitglieder nach dem Aufkommen revisionistischer Stimmungen in Ungarn weigerten, sich zusammenzuschließen. Die Tschechoslowakei, der einzige verbliebene Unterstützer der Allianz, versuchte, die Reste der Fraktion zu retten, indem sie Bitten an Bukarest und Belgrad sandte, doch die Bitten wurden nicht beachtet."
 hun_news.3.a:0 "Ihre schwache Koalition zerbricht."
 hun_news.3.b:0 "Untätigkeit wird unser Untergang sein."
 hun_news.3.c:0 "Es sieht so aus, als wäre diese Allianz nicht von Dauer gewesen."
 
 hun_news.4.t:0 "Die Visegrád-Gruppe"
 hun_news.4.d_both:0 "Das neu demokratisch gewordene Ungarn ist international nicht untätig geblieben. Nach einem langen Treffen der Staatschefs Ungarns, der Tschechoslowakei und Polens entstand der Dreibund Visegrád, und alle drei Mitglieder unterzeichneten Militärabkommen. Sollte es zu Konflikten zwischen ihnen kommen, könnte diese neue Fraktion zu einem ernstzunehmenden Akteur in Europa werden."
 hun_news.4.d_POL:0 "Ungarn hat unter seiner neuen demokratischen Führung mit der Unterzeichnung eines Bündnisses mit Polen begonnen, den Anschein eines Bündnisses zu erwecken. Ursprünglich war auch die Tschechoslowakei in das Bündnis einbezogen, doch die Verhandlungen endeten ohne sie. Dies könnte der Beginn eines größeren Bündnisses sein oder ein schwacher Versuch, eine Fraktion zwischen den europäischen Großmächten zu bilden."
 hun_news.4.d_CZE:0 "Ungarn hat unter seiner neuen demokratischen Führung mit der Tschechoslowakei einen Bündnisvertrag unterzeichnet und damit den Anschein eines Bündnisses erweckt. Ursprünglich war Polen in das Bündnis einbezogen, doch die Verhandlungen endeten ohne Polen. Dies könnte der Beginn eines größeren Bündnisses sein oder ein schwacher Versuch, eine Fraktion zwischen den europäischen Großmächten zu bilden."
 hun_news.4.a:0 "Hoffen wir auf eine dauerhafte Zusammenarbeit."
 hun_news.4.b:0 "Wir sind klug genug, uns da rauszuhalten."
 hun_news.4.c:0 "Das ist einigermaßen interessant."
 hun_news.4.c:0 "Vielleicht wird dies die Region stabilisieren."
 
 hun_news.5.t:0 "[From.GetAdjective] Dekret gegen [HUN.GetAdjective] Erweiterung"
 hun_news.5.d:0 "[From.GetName] hat eine offene Missbilligung der jüngsten [HUN.GetAdjective]-Aktionen abgegeben und deren ungerechtfertigte Ausweitung als kriegerische Handlung betrachtet. Sie haben außerdem erklärt, dass sie bereit sind, gegen [HUN.GetName] zu den Waffen zu greifen, um sie vom Weg des Revisionismus abzubringen."
 hun_news.5.a:0 "Lass sie es versuchen."
 hun_news.5.b:0 "Wir dürfen die Verletzung des Friedens in Europa nicht dulden."
 hun_news.5.c:0 "Wird das ausreichen, um sie aufzuhalten?"
 
 hun_news.6.t:0 "[From.Name] wird darum kämpfen, die [HUN.GetAdjective]-Erweiterung einzudämmen"
 hun_news.6.d:0 "[From.GetLeader] hat sein Versprechen eingelöst, sich der Aggressivität von [HUN.GetAdjective] entgegenzustellen. [From.GetName] befindet sich jetzt im Krieg mit [HUN.GetName]."
 hun_news.6.a:0 "Wir werden sie mit Maschinengewehren begrüßen."
 hun_news.6.b:0 "Zu den Waffen!"
 hun_news.6.c:0 "Dann ist es Krieg."
 
 hun_news.7.t:0 "Rückkehr der Habsburger"
 hun_news.7.d:0 "Die Habsburger sind in [HUN.GetName] an die Macht zurückgekehrt. Die Dynastie herrschte lange Zeit über Ungarn und hat nach Jahrzehnten der Interregnum-Ära ihre Macht wiederhergestellt. Der neue Habsburger Monarch marschierte durch die Straßen Budapests und wurde von der Menge begrüßt."
 hun_news.7.a:0 "Es lebe der neue Monarch!"
 hun_news.7.b:0 "Das klingt beunruhigend."
 hun_news.7.c:0 "Die Habsburger leben noch? Merkwürdig."
 
 hun_news.8.t:0 "Die Adria-Initiative"
 hun_news.8.d:0 "Ungarn und Italien haben ein Verteidigungsbündnis unterzeichnet. Die Marinen beider Länder werden eng zusammenarbeiten, um die Gewässer der Adria zu schützen. Das bedeutet, dass jeder, der in italienische Gewässer eindringen will, wahrscheinlich auch mit der ungarischen Marine konfrontiert wird."
 hun_news.8.a:0 "Hoffen wir auf eine langfristige Zusammenarbeit."
 hun_news.8.b:0 "Wo ist nochmal die Adria?"
 hun_news.8.c:0 "Das klingt beunruhigend."
 
 hun_news.9.t:0 "Der ungarisch-slowakische Kleinkrieg"
 hun_news.9.d_war:0 "Infolge der jüngsten territorialen Auseinandersetzungen und Veränderungen zwischen Ungarn und der Slowakei kam es zu einem kleinen militärischen Konflikt. Was zunächst als Scharmützel um die Region Sobrance begann, hat sich mittlerweile zu einem ausgewachsenen Krieg entlang der gesamten Nordgrenze Ungarns entwickelt."
 hun_news.9.d_peace:0 "Nach den jüngsten Territorialstreitigkeiten und Veränderungen zwischen Ungarn und der Slowakei kam es zu einem kleinen militärischen Konflikt. Ungarn scheint mit der Eroberung von Sobrance zufrieden zu sein, und die slowakischen Truppen haben keine größeren Vergeltungsschläge ausgeführt. Ein Krieg könnte vorerst vermieden werden, doch die Spannungen zwischen den beiden Ländern bleiben hoch."
 hun_news.9.a:0 "Wir werden triumphieren!"
 hun_news.9.b:0 "Die Konflikte in Osteuropa werden einfach nicht enden."
 
 hun_news.10.t:0 "Der Warschauer Pakt"
 hun_news.10.d:0 "Die Sowjetunion hat eine Initiative Ungarns und Polens angenommen und die Komintern um Polen erweitert. Das neue Bündnis heißt nun „Warschauer Pakt“, und es ist kein Geheimnis, dass die Sowjetunion plant, das Bündnis – notfalls mit Gewalt – auf weite Teile Osteuropas auszuweiten."
 hun_news.10.a:0 "Es lebe die neue Allianz!"
 hun_news.10.b:0 "Die verdammten Roten verschlingen weiterhin Europa."
 hun_news.10.c:0 "Beunruhigende Neuigkeiten."
 
 hun_news.11.t:0 "Wachsende Unterstützung für die Wiederherstellung der Monarchie in Deutschland"
 hun_news.11.d:0 "\nNach dem Krieg in Deutschland äußert sich die Unzufriedenheit der Bevölkerung in einer wachsenden Unterstützung für den Erben des alten Kaisers, Wilhelm. Diese Royalisten wollen die Monarchie in Deutschland wiederherstellen, mit dem jungen Kronprinzen an der Spitze."
 hun_news.11.a:0 "Bäh! Der Kaiser wird nie wiederkehren."
 hun_news.11.b:0 "Bald werden die Deutschen wieder einen Kaiser haben."
 hun_news.11.c:0 "Könnte dies der Anfang vom Ende Hitler-Deutschlands sein?"
 hun_news.11.e:0 "Könnte dies der Anfang vom Ende des demokratischen Deutschlands sein?"
 hun_news.11.f:0 "Könnte dies der Anfang vom Ende des kommunistischen Deutschlands sein?"
 
 hun_news.12.t:0 "Der Putsch des Kaisers"
 hun_news.12.d:0 "In Deutschland sind Rebellenkräfte aufgestanden, um den neu ernannten Kaiser Wilhelm III. von Hohenzollern zu unterstützen. Die Regierungstruppen sind in Aufruhr, und es ist höchst ungewiss, ob sie die Kontrolle über das Land behalten können."
 hun_news.12.a:0 "Das lässt uns schwach aussehen."
 hun_news.12.b:0 "Die Royalisten werden sich durchsetzen!"
 hun_news.12.c:0 "Dies muss mit Vorsicht angegangen werden."
 hun_news.12.e:0 "Was bedeutet das für ihren aktuellen Krieg?"
 
 hun_news.13.t:0 "Der Putsch des Kaisers gelingt"
 hun_news.13.d:0 "Die royalistischen Kräfte siegen in Deutschland. Die letzten Regierungstruppen haben ihre Waffen niedergelegt, und der Kaiser hat den Reichstag übernommen. Nur die Zeit wird zeigen, welche Ziele dieses neue Regime verfolgt und welche Folgen dies für die Zukunft Europas hat."
 hun_news.13.a:0 "Der Beginn einer neuen Ära."
 hun_news.13.b:0 "Nun, das ist eine Überraschung."
 
 hun_news.14.t:0 "Der Putsch des Kaisers scheitert"
 hun_news.14.d:0 "Die Regierung hat sich gegen die royalistischen Kräfte durchgesetzt. Der Kaiser wurde verhaftet, und der Aufstand ebbte bald darauf ab. Gegen alle, die am Putschversuch beteiligt waren, drohen massive Repressalien, doch in Deutschland scheint die Ordnung wiederhergestellt zu sein."
 hun_news.14.a:0 "Ehre sei uns!"
 hun_news.14.b:0 "Wir haben unser Bestes gegeben, um ihnen zum Erfolg zu verhelfen."
 hun_news.14.c:0 "Hat irgendjemand ernsthaft erwartet, dass sie gewinnen?"
 
 hun_news.15.t:0 "König Edward I."
 hun_news.15.d:0 "Heute ist das lange Interregnum endlich vorbei: König Edward I. aus dem Hause Windsor erhebt Anspruch auf den ungarischen Thron. Die Einladung eines Mitglieds des britischen Herrscherhauses ist ein Hinweis auf die außenpolitische Ausrichtung der aktuellen ungarischen Regierung."
 hun_news.15.a:0 "Es lebe der neue Monarch!"
 
 hun_news.16.t:0 "König Carl Wilhelm I."
 hun_news.16.d:0 "Carl Wilhelm von Schweden, oder wie er in Ungarn ab heute heißt: Carl Wilhelm I., ist der neue König von Ungarn. Der schwedische Prinz wurde auf den ungarischen Thron eingeladen, in der Hoffnung, den Geist der Nation in diesen schwierigen Zeiten zu stärken und das Land sicher durch diese Ära der Konflikte in Europa zu führen."
 hun_news.16.a:0 "Es lebe der neue Monarch!"
 
 hun_news.17.t:0 "König Miklós I. Horthy"
 hun_news.17.d:0 "Um seine Macht in Ungarn endgültig zu festigen, hat sich der ehemalige Regent Miklós Horthy selbst zum König gekrönt und damit die Interregnum-Periode im Land offiziell beendet."
 hun_news.17.a:0 "Es lebe der neue Monarch!"
 
 hun_news.18.t:0 "Béla Kun kehrt zurück"
 hun_news.18.d:0 "Béla Kun war nach dem Untergang der Räterepublik Ungarn in den letzten Jahrzehnten Gast in der Sowjetunion. In Abstimmung mit der KMP gelang es der Regierung, seine Rückkehr zu ermöglichen, angeblich durch eine geheime Operation. Die sowjetischen Behörden sind von dieser Aktion nicht begeistert, doch wichtig ist, dass Kun sicher nach Ungarn zurückgekehrt ist und bereits wieder Anhänger für seine Sache gewinnt."
 hun_news.18.a:0 "Hurra!"
 
 hun_news.19.t:0 "Der Untergrundkommunismus breitet sich aus"
 hun_news.19.d:0 "In letzter Zeit ist eine Zunahme der Aktivitäten kommunistischer Gruppen im Land zu beobachten. Die ungewöhnliche Lebhaftigkeit lässt sich auf Quellen außerhalb des Landes zurückführen, doch wir sind uns noch nicht sicher, welche ausländische Macht dahintersteckt. Wie dem auch sei, kommunistische Ideen verbreiten sich schneller als je zuvor, und wir können derzeit wenig dagegen tun."
 hun_news.19.a:0 "Die rote Bedrohung kennt keine Grenzen."
 
 hun_news.20.t:0 "[HUN.GetAdjective] Ambitionen"
 hun_news.20.d:0 "Unsere Diplomaten und Geheimdienstler haben berichtet, dass [HUN.GetNameDef] aktiv auf eine Konfrontation mit uns drängt. Was auch immer ihre Forderungen an uns sind, sie wollen sie durchsetzen. Wir müssen entscheiden, wie ernst wir diese Nachrichten nehmen, aber wir tun gut daran, uns vorzubereiten."
 hun_news.20.a:0 "Wir müssen uns darauf vorbereiten, ihnen die Stirn zu bieten."
 
 hun_news.21.t:0 "Die Charles-Linie"
 hun_news.21.d:0 "Der Bau der Karls-Linie ist endlich abgeschlossen. Die Linie ist in zwei Abschnitte unterteilt, die strategisch so platziert sind, dass sie wichtige Engpässe und Transportwege abdecken. 120 große Forts und zahlreiche kleinere Lager säumen die gesamte Region Partium, um jeden Vormarsch aus dem Westen zu stoppen. Die Linie umfasst außerdem eine zehn Kilometer lange technische Blockade, die den Durchzug mechanisierter Streitkräfte verhindern soll."
 hun_news.21.a:0 "Eine Leistung, auf die wir stolz sein können."
 
 hun_news.22.t:0 "100. Jahrestag der 48er Revolution"
 hun_news.22.d:0 "Heute jährt sich der ungarische Aufstand von 1848 zum 100. Mal. Vor einem Jahrhundert beschloss Ungarn, sich von der Unterdrückung der österreichischen Habsburger zu befreien und kämpfte tapfer, bis die Österreicher ihre russischen Verbündeten herbeiriefen, um den Aufstand zu beenden. Die Nation erinnert sich an diesen Tag als einen Tag der Freiheit und als wesentlichen Bestandteil der ungarischen Kultur. Die ganze Nation feiert das Gedenken an diesen Freiheitskampf."
 hun_news.22.a:0 "Wir haben die Ketten damals zerbrochen und dürfen sie nie wieder tragen!"
 
 hun_news.23.t:0 "[From.GetNameDef] tritt der Donauföderation bei"
 hun_news.23.d:0 "Wie erwartet, schließen sich weitere Länder freiwillig der Donauföderation an. [From.GetNameDef] ist das neueste Mitglied dieses freien Staatenbundes."
 hun_news.23.a:0 "Eine willkommene Ergänzung unserer Allianz."
 
 hun_news.24.t:0 "Der Donauverband"
 hun_news.24.d:0 "Mitteleuropa erlebt heute den Aufstieg einer neuen Macht. Unter der Führung Ungarns wurde die Donauföderation gegründet, mit dem Ziel, die kommunistischen Staaten der Region in einem Bündnis der freien Assoziation zu vereinen. Der Erfolg dieses Vorhabens ist noch ungewiss, doch seine Entwicklung verdient auf jeden Fall Aufmerksamkeit."
 hun_news.24.a:0 "Es lebe die Föderation!"
 hun_news.24.b:0 "Eine neue Macht auf dem Spielfeld."
 
 hun_news.25.t:0 "Das Königreich Ukraine"
 hun_news.25.d:0 "Nach den jüngsten territorialen Veränderungen in Osteuropa war unklar, was aus der Ukraine werden würde. Nach dem Ersten Weltkrieg versuchte das Land, eine eigene Regierung zu bilden, wurde jedoch schnell von der Sowjetunion einverleibt. Kurioserweise hat sich [HUN.GetNameDef] der Sache der Ukrainer angenommen und es geschafft, nach deren Eroberung eine neue Regierung zu bilden. Das „Königreich Ukraine“, wie es heute heißt, wird von Wilhelm Franz von Habsburg, einem Verwandten des letzten Habsburger Kaisers, regiert. Die Zeit wird zeigen, ob diese Inkarnation der Ukraine länger bestehen wird als die letzte."
 hun_news.25.a:0 "Möge es niemals fallen!"
 hun_news.25.b:0 "Ukraine? Ein Königreich? Wie absurd."
 
 hun_news.26.t:0 "Gyula Gömbös gestorben"
 hun_news.26.d:0 "Am sechsten Oktober ist der Ministerpräsident Ungarns verstorben. Gömbös trat sein Amt im Oktober 1932 an und hatte große Pläne für Ungarn. Seine Pläne drehten sich darum, das Land in einen autoritären Staat umzuwandeln, der Mussolinis Italien als Vorbild dienen sollte. Obwohl seine Bemühungen letztlich nicht die gewünschten Früchte trugen, gilt er bei vielen Ungarn noch immer als großer Führer unserer Zeit."
 hun_news.26.a:0 "Die Nation trauert."
 
 hun_news.27.t:0 "Die Slowakei ist an Ungarn zurückgegeben worden"
 hun_news.27.d:0 "Im Rahmen der Bemühungen, die im Vertrag von Trianon verlorenen Gebiete Ungarns zurückzufordern, hat [HUN.GetLeader] eine Forderung an die Tschechoslowakei gestellt, die die vollständige Rückgabe der Slowakei fordert. Die tschechoslowakische Regierung hat aus Angst vor Konflikten die Forderungen akzeptiert und die betreffenden Gebiete geräumt."
 hun_news.27.a:0 "Ein wichtiger Schritt zur Überarbeitung von Trianon."
 hun_news.27.b:0 "Wir hatten keine andere Wahl, als anzunehmen."
 hun_news.27.c:0 "Es ist doch nicht so, dass die gesamte Slowakei ungarisch ist?"
 
 hun_news.28.t:0 "Siebenbürgen kam an Ungarn zurück"
 hun_news.28.d:0 "Ein schwarzer Tag für Rumänien und ein Grund zum Feiern für [HUN.GetName]. Die ungarischen Forderungen nach der Rückgabe Siebenbürgens wurden von der rumänischen Regierung akzeptiert und die Gebietsübertragung ist mit diesem Tag abgeschlossen."
 hun_news.28.a:0 "Diese Überarbeitung war längst überfällig."
 hun_news.28.b:0 "Sicherlich ein vorübergehender Rückschlag."
 hun_news.28.c:0 "Vielleicht gehen sie damit etwas zu weit."
 
 hun_news.29.t:0 "Die Wiederherstellung Österreich-Ungarns"
 hun_news.29.d:0 "Das Kaiserreich Österreich-Ungarn wurde unter der Führung von Otto von Habsburg, dem ältesten Sohn des letzten regierenden Monarchen, wiedergeboren. Viele hatten diesen Moment befürchtet, doch nur wenige hätten geglaubt, dass er tatsächlich eintreten würde. Nur die Zeit wird zeigen, ob das Kaiserreich dieses Mal stark genug sein wird, um zu überleben."
 hun_news.29.a:0 "Es lebe das Imperium!"
 hun_news.29.b:0 "Hoffen wir, dass sie diesmal keinen Weltkrieg beginnen."
 hun_news.29.c:0 "Das Chaos bringt einen weiteren Geist aus der Vergangenheit hervor."
 
 hun_news.30.t:0 "Galizien an Österreich-Ungarn abgetreten"
 hun_news.30.d:0 "Das nächste Ziel der Forderungen von [HUN.GetLeader] war Galizien, ein Teil Polens, der vor über einem Jahrhundert bei der Teilung Polens an Österreich fiel. Die polnische Regierung gab nach, in der Hoffnung, einen bewaffneten Konflikt über die Forderungen zu verhindern. Im Gegenzug für den großen Teil des Landes garantierte Österreich-Ungarn die Freiheit des restlichen Polens."
 hun_news.30.a:0 "Es gehört alles dem Imperium!"
 hun_news.30.b:0 "Zumindest haben wir Blutvergießen vermieden."
 hun_news.30.c:0 "Wie viel mehr werden sie verlangen?"
 
 hun_news.31.t:0 "Istrien und Südtirol wurden an Österreich-Ungarn abgetreten"
 hun_news.31.d:0 "Angesichts der immer schnelleren Expansion Österreich-Ungarns war es nicht verwunderlich, dass dieses Anspruch auf seine ehemaligen italienischen Gebiete erhob. Die italienische Regierung wollte keinen Widerstand gegen das neu wiederhergestellte Kaiserreich riskieren und beschloss, Istrien und Südtirol aufzugeben."
 hun_news.31.a:0 "Italien war ohnehin nicht stark genug, um diese Länder zu halten."
 hun_news.31.b:0 "Das werden wir nicht vergessen."
 hun_news.31.c:0 "Die Spannungen in Europa nehmen immer weiter zu."
 
 hun_news.32.t:0 "Die Tschechoslowakei wurde wieder in das Reich eingegliedert"
 hun_news.32.d:0 "Seit dem jüngsten Putsch wuchs in der Tschechoslowakei die pro-kaiserliche Stimmung. Die enge Verbindung mit Österreich-Ungarn kündigte, wie alle erwartet hatten, den Wiederanschluss an das Kaiserreich an. Mit den tschechischen und slowakischen Gebieten konnte Österreich-Ungarn einen bedeutenden Teil seines ehemaligen Territoriums zurückgewinnen und kämpft nun um die Vorherrschaft in Mitteleuropa."
 hun_news.32.a:0 "Das Imperium erhebt sich wieder!"
 hun_news.32.b:0 "Werden sie es behalten können?"
 
 hun_news.33.t:0 "Bau der Árpád-Linie"
 hun_news.33.d:0 "Die Árpád-Linie ist endlich fertiggestellt. Die Verteidigungsanlagen in den nordöstlichen Karpaten wurden von István Réti geplant. Ihr Hauptziel war es, eine mögliche sowjetische Offensive zu stoppen oder zu verlangsamen. Die 600 Kilometer lange Linie nutzt die natürlichen Verteidigungsmöglichkeiten der Bergregion."
 hun_news.33.a:0 "Wir sollten jetzt in Sicherheit sein."
 
 hun_news.34.t:0 "Rumänien stellt die Karlslinie fertig"
 hun_news.34.d:0 "Die Karlslinie, auch „rumänische Maginot-Linie“ genannt, ist eine lose Verteidigungslinie des rumänischen Militärs, die die Hauptzugänge nach Siebenbürgen schützt. Der Plan wurde bereits Anfang der 30er Jahre konzipiert, aber erst kürzlich umgesetzt. Ihr Hauptzweck ist die Verteidigung gegen einen Angriff aus dem Westen, sei es durch Ungarn oder Deutschland."
 hun_news.34.a:0 "Die Zeit wird zeigen, ob es etwas wert ist."
 
 hun_news.35.t:0 "Stolz der Flotte"
 hun_news.35.d:0 "Seit dem Verlust der kroatischen Küste Ungarns sind die Reste unserer Marine gezwungen, auf der Donau zu operieren. Der Stapellauf eines neuen Schlachtschiffs markiert die Wiederbelebung der ungarischen Flotte und läutet eine neue Ära der ungarischen Seefahrtstradition ein. Das neue Schiff, größer und stärker als alles, was Österreich-Ungarn im Ersten Weltkrieg besaß, wird von seiner Besatzung bereits als „Stolz der Flotte“ bezeichnet."
 hun_news.35.a:0 "Wir werden die Meere beherrschen!"
 
 hun_news.36.t:0 "Die SMS Novara"
 hun_news.36.d:0 "Wir verhandeln seit einigen Wochen mit der französischen Marine. Nach dem Ersten Weltkrieg beschlagnahmte sie einen unserer Kreuzer, die SMS Novara, die inzwischen zu einem Wohnschiff degradiert wurde. Gegen eine kleine Summe gab sie ihn jedoch gerne ab und erlaubte uns, das Schiff für den Marineeinsatz umzurüsten. Der alte Zerstörer ist nicht in bestem Zustand, viele seiner Ausrüstungsgegenstände sind veraltet oder nicht mehr aktuell, aber er könnte unserer wachsenden Marine noch von Nutzen sein."
 hun_news.36.a:0 "Zumindest gehört es uns."
 
 hun_news.37.t:0 "Ankunft der italienischen Transferflotte"
 hun_news.37.d:0 "Die Adria-Initiative wurde auf Vorschlag unseres Außenministers unterzeichnet. Die Italiener haben sich bereit erklärt, unserer Marine dauerhaft ein U-Boot, einen leichten und einen schweren Kreuzer zu überlassen, im Gegenzug für die vereinbarte gegenseitige Verteidigung der Adria. Die kleine Flotte ist sicher in unseren Häfen angekommen und steht nun vollständig unter unserer Kontrolle."
 hun_news.37.a:0 "Unsere Marine wird von Tag zu Tag stärker."
 
 hun_news.38.t:0 "Italienisch-Ungarische Marineakademie"
 hun_news.38.d:0 "Um die Marineforschung und -ausbildung gemeinsam voranzutreiben, haben Ungarn und Italien die Italienisch-Ungarische Marineakademie gegründet. Neue und erfahrene Admirale beider Nationen wurden angeworben, um an der Institution Vorlesungen zu halten und so seefahrerisches Wissen auszutauschen."
 hun_news.38.a:0 "Der Weg nach vorn ist Zusammenarbeit."
 
 hun_news.39.t:0 "Die Große Koalition"
 hun_news.39.d:0 "Nach langen Verhandlungen und Unsicherheiten ist die neue Regierung nun präsent. Die neue Nationale Sammlungspartei ist ein Zusammenschluss der ehemaligen NEP, der FKgP und der SZDP und stellt damit praktisch das gesamte Parlament. Alle Parteien haben sich darauf geeinigt, Pál Teleki zum Vorsitzenden dieser neuen Koalition zu wählen. Diese Einheit läutet eine neue Ära für Ungarn ein – eine Ära nationaler Stabilität und Sicherheit."
 hun_news.39.a:0 "Eine starke Regierung, die uns durch schwierige Zeiten führt."
 
 hun_news.40.t:0 "Burgenland wählt Ungarn"
 hun_news.40.d:0 "Alle Stimmen sind ausgezählt, und die burgenländische Volksabstimmung ist nun offiziell beendet. Die Bevölkerung des Landes hat sich für einen Anschluss an Ungarn entschieden, anstatt in Österreich zu bleiben. Da beide Regierungen vereinbart haben, das Ergebnis der Volksabstimmung als rechtsverbindlich anzuerkennen, kommt es zu einer Grenzänderung."
 hun_news.40.a:0 "Tolle Neuigkeiten! Das Burgenland ist endlich wieder da, wo es hingehört."
 hun_news.40.b:0 "Vielleicht war diese Abstimmung ein Fehler."
 
 hun_news.41.t:0 "Burgenland wählt Ungarn"
 hun_news.41.d:0 "Alle Stimmen sind ausgezählt, die burgenländische Volksabstimmung ist damit offiziell beendet. Die Bevölkerung des Landes hat sich für den Verbleib bei Österreich entschieden, statt sich Ungarn anzuschließen. Die ungarische Regierung, die sich aktiv für das Referendum eingesetzt hatte, ist zwar von diesem Ergebnis enttäuscht, muss es aber dennoch akzeptieren."
 hun_news.41.a:0 "Ihre Loyalität ist beeindruckend."
 hun_news.41.b:0 "Ein enttäuschendes Ergebnis."
 
 hun_news.42.t:0 "[FROM.GetName] tritt vom Vertrag von Trianon zurück"
 hun_news.42.d:0 "Der Vertrag von Trianon hat uns jahrzehntelang im Würgegriff gehalten, doch sein Einfluss scheint nun zu schwinden. Bisher war [FROM.GetName] der Hauptverantwortliche für die Durchsetzung seiner Bedingungen, gab jedoch kürzlich bekannt, dass sie den ursprünglichen Vertrag nicht länger unterstützen wollen."
 hun_news.42.a:0 "Etwas, worüber wir uns einig sind."
 
 hun_news.43.t:0 "[FROM.GetName] bekräftigt den Vertrag von Trianon"
 hun_news.43.d:0 "\n\nGerade als wir dachten, wir wären frei von den Blicken ausländischer Mächte, die den Vertrag von Trianon durchsetzen, hat sich eine andere gegen unsere gerechte Wiedergutmachung gestellt. [FROM.GetName] ist nun „verantwortlich“ dafür, unsere Expansion einzudämmen."
 hun_news.43.a:0 "Sie können es versuchen."
 
 hun_news.44.t:0 "Ungarn fällt unter britische Herrschaft"
 hun_news.44.d:0 "Nach der Wahl des britischen Prinzen Edward von Windsor zum ungarischen Thron erforderte die politische Lage in Großbritannien, dass auch er den britischen Thron besteigt. Das ungarische Parlament beschloss, den neuen Monarchen nicht zu entthronen und sich stattdessen der Herrschaft Edwards zu unterwerfen, auch wenn dies bedeutete, sich auch dem Vereinigten Königreich zu unterwerfen."
 hun_news.44.a:0 "Möge diese neue Verbindung lange halten."
 hun_news.44.b:0 "Es scheint, dass Ungarn nicht für die Selbstverwaltung bestimmt ist."
 
 hungary_flavor_gen.1.t:0 "Wiederauferstehung Österreich-Ungarns"
 hungary_flavor_gen.1.d:0 "Nach einer langen Konferenz zwischen der österreichischen und der ungarischen Regierung wurde beschlossen, dass die beiden Nationen wieder von demselben Herrscher regiert werden, nämlich Otto von Habsburg, dem ältesten Sohn des letzten Habsburger Kaisers."
 hungary_flavor_gen.1.a:0 "Tatsächlich eine höchst interessante Entwicklung."
 
 hungary_flavor_gen.2.t:0 "Die Donaukoalition"
 hungary_flavor_gen.2.d:0 "Das neu demokratisch gewordene Ungarn hat alle bündnisfreien Staats- und Regierungschefs der Region zu einer Koalitionsverhandlung eingeladen. Diese soll unter der Schirmherrschaft Großbritanniens stehen, dessen Vertreter ebenfalls an der Konferenz teilnehmen werden. Der Beitritt zu diesem Bündnis könnte uns zwar vor externen Bedrohungen schützen, würde uns aber auch in außenpolitischen Fragen die Hände binden."
 hungary_flavor_gen.2.a:0 "Akzeptieren."
 hungary_flavor_gen.2.b:0 "Abfall."
 
 hungary_flavor_gen.3.t:0 "Imperialistischer Putsch in der Tschechoslowakei"
 hungary_flavor_gen.3.d:0 "In den letzten Tagen herrschte in Prag viel Bewegung. Anhänger der alten österreichisch-ungarischen Monarchie stürmten die Stadt, stießen auf wenig Widerstand und nahmen Hunderte Regierungsbeamte gefangen. Die Imperialisten haben eine neue Regierung eingesetzt, die offen den Anschluss an die wiedergeborene Monarchie anstrebt."
 hungary_flavor_gen.3.a:0 "Was für eine hervorragende Entwicklung."
 hungary_flavor_gen.3.b:0 "Eine unerwartete Wendung der Ereignisse."
 
 hungary_flavor_gen.4.t:0 "[From.GetAdjective]-Erweiterung"
 hungary_flavor_gen.4.d:0 "[From.GetName] hat in letzter Zeit eine aggressive Expansion betrieben und damit in ganz Europa für Aufsehen gesorgt. Wenn sie weiterhin ihre Forderungen und Gebietsansprüche geltend machen, könnte dies den prekären Frieden nach dem Ersten Weltkrieg zerstören. Die Alternative wäre jedoch eine militärische Intervention. Werden wir diesen Angriff auf den europäischen Frieden tolerieren?"
 hungary_flavor_gen.4.a:0 "Wir müssen eingreifen."
 hungary_flavor_gen.4.b:0 "Irgendwann werden sie aufhören."
 
 hungary_flavor_gen.5.t:0 "Die Visegrád-Gruppe"
 hungary_flavor_gen.5.d:0 "Ungarn plant eine neue Allianz, zu der auch [Root.GetName] gehört. Die Initiative heißt „Visegrád-Gruppe“. Ziel der Allianz ist es, den militärischen Schutz ihrer Mitglieder zu gewährleisten und eine gemeinsame Außenpolitik zu verfolgen, die die Interessen aller Mitgliedsstaaten widerspiegelt. Die Allianz könnte sich als vorteilhaft erweisen, und eine engere Zusammenarbeit mit den Nachbarmächten würde uns international stärken. Wie werden wir auf die Einladung reagieren?"
 hungary_flavor_gen.5.a:0 "Akzeptieren."
 hungary_flavor_gen.5.b:0 "Abfall."
 
 hungary_flavor_gen.6.t:0 "Der Visegrád-Wirtschaftskreis"
 hungary_flavor_gen.6.d:0 "Nach einer Reihe von Treffen zwischen den Mitgliedern der Visegrád-Gruppe hat der derzeitige Vorsitzende Ungarn angekündigt, dass die Visegrád-Gruppe nun auch eine Wirtschaftsunion sein werde, die einen gemeinsamen Markt zwischen ihren Mitgliedern schaffen und den freien Handelsfluss im Inland sicherstellen werde."
 hungary_flavor_gen.6.a:0 "Davon profitieren wir alle."
 
 hungary_flavor_gen.7.t:0 "Mitgliedschaft in der Visegrád-Gruppe"
 hungary_flavor_gen.7.d:0 "Wir sind nun offiziell der Visegrád-Gruppe beigetreten. Wir haben alle mit der Mitgliedschaft verbundenen Verträge unterzeichnet und profitieren nun in vollem Umfang von allen Vorteilen, die den Mitgliedern zustehen."
 hungary_flavor_gen.7.a:0 "Davon profitieren wir alle."
 
 hungary_flavor_gen.8.t:0 "Austritt aus der Visegrád-Gruppe"
 hungary_flavor_gen.8.d:0 "Nach dem Austritt aus der Visegrád-Gruppe müssen wir natürlich alle Verträge und Vereinbarungen, die mit der Mitgliedschaft verbunden waren, für ungültig erklären. Es wird lange dauern, aber wir werden endlich frei von den Grenzen der Union sein."
 hungary_flavor_gen.8.a:0 "Wir müssen das hinter uns lassen."
 
 hungary_flavor_gen.9.t:0 "[From.GetName] verlässt die Visegrád-Gruppe"
 hungary_flavor_gen.9.d:0 "[From.GetName] war erst seit kurzem Mitglied der Visegrád-Gruppe und hat sich bereits zum Austritt entschieden. Sicherlich hatte er seine Gründe, und wir sind traurig, ihn gehen zu sehen, aber angesichts dieser Ereignisse erfordern wichtige Angelegenheiten unsere Aufmerksamkeit, da wir gemäß der Politik der Visegrád-Gruppe unsere Verträge und Vereinbarungen mit ihnen annullieren müssen."
 hungary_flavor_gen.9.a:0 "Dies ist ein trauriger Tag für die Allianz."
 
 hungary_flavor_gen.10.t:0 "Der Visegrád-Technologiekreis"
 hungary_flavor_gen.10.d:0 "Im Rahmen des stetig wachsenden Vertragssystems der Visegrád-Gruppe treten die Mitgliedsstaaten nun einem verbindlichen Technologiezirkel bei, der den diskriminierungsfreien Austausch von Technologien garantiert. Mit gemeinsamen Anstrengungen werden die Nationen der Allianz zweifellos schneller vorankommen als allein."
 hungary_flavor_gen.10.a:0 "Gemeinsam für die Wissenschaft!"
 
 hungary_flavor_gen.11.t:0 "Der Visegrád-Militärrat"
 hungary_flavor_gen.11.d:0 "Die bereits enge Zusammenarbeit zwischen den Mitgliedern unseres Bündnisses wird nun durch einen gemeinsamen Militärrat erweitert. Der Visegrád-Militärrat wird die gemeinsamen Operationen überwachen und dabei eng mit den Oberkommandos der einzelnen Nationen zusammenarbeiten."
 hungary_flavor_gen.11.a:0 "Sicherheit liegt in unserem gemeinsamen Interesse."
 
 hungary_flavor_gen.12.t:0 "Zusammenarbeit mit dem Molotow-Ribbentrop-Pakt"
 hungary_flavor_gen.12.d:0 "Unsere deutschen Verbündeten haben beschlossen, einen zuvor unterzeichneten Geheimvertrag im Molotow-Ribbentrop-Pakt einzuhalten und Teile Polens an die Sowjetunion abzutreten. Die Frage ist nun, ob wir kooperieren oder die betroffenen Gebiete behalten wollen."
 hungary_flavor_gen.12.a:0 "Wir werden kooperieren und jedes Gebiet abtreten, das wir abtreten müssen."
 hungary_flavor_gen.12.b:0 "Wir haben für dieses Land gekämpft und wir verdienen jeden Zentimeter davon!"
 
 hungary_flavor_gen.13.t:0 "Gründung des Warschauer Pakts"
 hungary_flavor_gen.13.d:0 "Sowjetische und polnische kommunistische Führer trafen sich in Warschau und berieten über die Bildung eines neuen Bündnisses. Die Pläne für das Bündnis umfassen den Großteil Osteuropas, doch Polen ist vorerst das einzige neue Mitglied. Die Weltrevolution ist einen Schritt näher gerückt, doch es bleibt noch viel zu erreichen."
 hungary_flavor_gen.13.a:0 "Unsere Allianz wird stärker."
 
 hungary_flavor_gen.14.t:0 "Mitgliedschaft in der Budapest Research Group"
 hungary_flavor_gen.14.d:0 "Mit unserem Beitritt zu [ROOT.GetFactionName] wurde uns auch die Möglichkeit geboten, der Budapest Research Group beizutreten. Ziel dieser Vereinigung ist es, die technologischen Unterschiede zwischen ihren Mitgliedern zu verringern, sodass alle Beteiligten profitieren."
 hungary_flavor_gen.14.a:0 "Natürlich machen wir mit."
 hungary_flavor_gen.14.b:0 "Unseren Wissenschaftlern geht es dort, wo sie sind, gut."
 
 hungary_flavor_gen.15.t:0 "Beitritt zur Rüstungsvereinigung"
 hungary_flavor_gen.15.d:0 "Wir sind nun Teil der Fraktion [ROOT.GetFactionName] und haben die Rüstungsvereinheitlichung unserer Verbündeten endlich eingeholt. Wir werden unsere Waffen und Munition nun ausschließlich nach den von der Fraktionsführung festgelegten Standards herstellen."
 hungary_flavor_gen.15.a:0 "Sehr gut."
 
 hungary_flavor_gen.16.t:0 "Rüstungsvereinigung abgelaufen"
 hungary_flavor_gen.16.d:0 "Aufgrund der Veränderungen in unserer Fraktion können wir nicht mehr auf die Vorteile der Rüstungsvereinigung zurückgreifen."
 hungary_flavor_gen.16.a:0 "Nichts, wovon wir uns nicht erholen können."
 
 hungary_flavor_gen.17.t:0 "Ungarn annektiert Österreich"
 hungary_flavor_gen.17.d:0 "Der jüngste Krieg zwischen Ungarn und Österreich war eine Überraschung auf der geopolitischen Bühne, doch die meisten gingen davon aus, dass es sich lediglich um ein Grenzgefecht handelte und außer minimalen Grenzänderungen nichts mehr bewirken würde. Doch die Wahrheit ist: Nichts dergleichen. Nach der Kapitulation der österreichischen Streitkräfte forderte Ungarn die Annexion seines gesamten Territoriums – eine Entscheidung, die die europäischen Staats- und Regierungschefs schockierte. Wenn wir auf diese unerhörte Aktion reagieren wollen, müssen wir es jetzt tun, sonst wirkt es unaufrichtig."
 hungary_flavor_gen.17.a:0 "Wir werden diese Aktion verurteilen."
 hungary_flavor_gen.17.b:0 "Österreich liegt außerhalb unseres Interessenbereichs."
 
 hungary_flavor_gen.18.t:0 "Ungarn annektiert österreichisches Land"
 hungary_flavor_gen.18.d:0 "Der jüngste Krieg zwischen Ungarn und Österreich war eine Überraschung auf der geopolitischen Bühne, doch die meisten gingen davon aus, dass es sich lediglich um ein Grenzgefecht handelte und es außer minimalen Grenzänderungen zu nichts kommen würde. Tatsächlich eroberte Ungarn ein ziemlich großes Stück Land, und die umliegenden Länder fragen sich, ob sie als Nächstes an der Reihe sein werden. Wir müssen schnell auf diese eklatante Störung des europäischen Friedens reagieren, wenn wir etwas dagegen unternehmen wollen."
 hungary_flavor_gen.18.a:0 "Wir werden diese Aktion verurteilen."
 hungary_flavor_gen.18.b:0 "Österreich liegt außerhalb unseres Interessenbereichs."
 
 hungary_flavor_gen.19.t:0 "Gründung der Donauföderation"
 hungary_flavor_gen.19.d:0 "In Übereinstimmung mit den früheren Vereinbarungen unserer Partei mit Béla Kuns Ungarn haben wir die Vorbereitungen für den Zusammenschluss unserer Nationen zur Donauföderation getroffen. Wir hoffen, dass andere Länder bald unserem Beispiel folgen werden und die neue Föderation stark genug sein wird, um die Interessen des Proletariats in allen ihren Nationen zu schützen."
 hungary_flavor_gen.19.a:0 "Gemeinsam sind unsere Nationen stärker!"
 hungary_flavor_gen.19.b:0 "Wenn ich es mir recht überlege, wollen wir damit nichts zu tun haben."
 
 hungary_flavor_gen.20.t:0 "Beitritt zum Donauverband"
 hungary_flavor_gen.20.d:0 "In Übereinstimmung mit den früheren Vereinbarungen unserer Partei mit Béla Kuns Ungarn haben wir die Vorbereitungen für den Beitritt zur Donauföderation getroffen. Wir sind zuversichtlich, dass die Föderation stark genug sein wird, um die Interessen des Proletariats in allen ihren Nationen zu schützen."
 hungary_flavor_gen.20.a:0 "Gemeinsam sind unsere Nationen stärker!"
 hungary_flavor_gen.20.b:0 "Wenn ich es mir recht überlege, wollen wir damit nichts zu tun haben."
 
 hungary_flavor_gen.21.t:0 "Mitgliedschaft im Donauverband"
 hungary_flavor_gen.21.d:0 "Die Donauföderation ist mehr als ein Staatenbündnis. Sie will ihren Nationen einen starken Schutz bieten und gleichzeitig ihre Freiheit bewahren. Ihre Mitglieder sind vereint in der Verteidigung des Proletariats, doch frei von imperialistischer Hybris. Als Teil dieser Föderation werden auch wir von ihren Vorteilen profitieren und sie noch stärker machen."
 hungary_flavor_gen.21.a:0 "Gemeinsam sind unsere Nationen stärker!"
 
 hungary_flavor_gen.22.t:0 "Austritt aus dem Donaubund"
 hungary_flavor_gen.22.d:0 "Die diplomatische Situation hat sich so entwickelt, dass wir nicht mehr Teil der Donauföderation sind. Diese Völkerverbrüderung war schön, solange sie Bestand hatte, aber jetzt müssen wir unseren eigenen Weg finden."
 hungary_flavor_gen.22.a:0 "Alles muss ein Ende haben."
 
 hungary_flavor_gen.23.t:0 "Unser Beitrag zu den Baubemühungen des Bundes"
 hungary_flavor_gen.23.d_first:0 "Wir sind die ersten, die von den Vorteilen der bundesweiten Baumaßnahmen profitieren. Industrieunternehmen aus anderen Mitgliedsstaaten werden einen Teil ihrer Energie auf unsere Bauprojekte konzentrieren und so die Entwicklung unseres Landes beschleunigen."
 hungary_flavor_gen.23.d:0 "Die Baumaßnahmen des Bundes sind im ehemaligen Zielland des Donaubundes ausgelaufen, nun sind wir an der Reihe. Industrieunternehmen aus anderen Mitgliedsländern werden einen Teil ihrer Anstrengungen auf unsere Bauprojekte konzentrieren und so die Entwicklung in unserem Land beschleunigen."
 hungary_flavor_gen.23.a:0 "Wir werden das Beste daraus machen."
 
 hungary_flavor_gen.24.t:0 "Das Komitee für Bundessicherheit"
 hungary_flavor_gen.24.d:0 "Die Führung der Donauföderation hat die Schaffung eines gemeinsamen Geheimdienstes beschlossen, dessen Ziel es ist, die Integrität unserer Föderation zu wahren und sie vor unerwünschten Einflüssen von außen zu schützen. Dadurch wird sichergestellt, dass unsere Bevölkerung nicht durch gefährliche Ideen vergiftet wird und zu der Gesellschaft zurückkehrt, für deren Dekonstruktion wir so hart gekämpft haben."
 hungary_flavor_gen.24.a:0 "Wir fühlen uns bereits sicherer."
 
 hungary_flavor_gen.25.t:0 "Konzentrierter Bauaufwand"
 hungary_flavor_gen.25.d:0 "Um die Entwicklung in allen Mitgliedsstaaten der Donauföderation gleichmäßig zu gestalten, hat die Führung beschlossen, ein Rotationssystem konzentrierter Aufbaubemühungen einzuführen. Alle sechs Monate wird ein zufällig ausgewähltes Land der Föderation ausgewählt, und alle anderen Mitgliedsstaaten stellen einen Teil ihrer Industriekraft für dessen Entwicklung zur Verfügung. Nach Ablauf der sechs Monate wird ein anderes Land ausgewählt, und das vorherige wird von der Auswahl ausgenommen, bis alle anderen Länder an der Reihe waren."
 hungary_flavor_gen.25.a:0 "Dies wird uns allen helfen, weiter voranzukommen."
 
 hungary_flavor_gen.26.t:0 "Federal Reserve Guard"
 hungary_flavor_gen.26.d:0 "Obwohl die Donauföderation über keine gemeinsame Armee verfügt, hat die Führung beschlossen, eine föderale Reservearmee zu gründen, auf die jedes Land nach eigenem Ermessen zurückgreifen kann. Alle Mitgliedsstaaten müssen einen festen Prozentsatz ihrer stehenden Armeen in diese Reserve einbringen. Dies erhöht zwar nicht die Gesamtstärke der Föderation, trägt aber im Notfall zu einer besseren Verteilung der vorhandenen Streitkräfte bei."
 hungary_flavor_gen.26.a:0 "Hoffen wir, dass wir diese Reserven nicht brauchen werden."
 
 hungary_flavor_gen.27.t:0 "Donauwissenschaftliches Institut"
 hungary_flavor_gen.27.d:0 "„Der Donauverband muss nicht nur im Streben nach Arbeiterrevolution und Selbstbestimmung zusammenarbeiten, sondern auch im Streben nach Wissenschaft und Fortschritt“, sagte [HUN.GetLeader] auf der letzten Sitzung des Föderalen Rates. Die Führung des Verbandes einigte sich auf die Gründung eines gemeinsamen wissenschaftlichen Instituts mit Sitz in Budapest. Die Institution wird Forscher aus allen Mitgliedsstaaten umfassen und darauf abzielen, eine gemeinsame Wissensbasis zu entwickeln, die dem gesamten Verband zugutekommt."
 hungary_flavor_gen.27.a:0 "Wir werden unseren Anteil an Forschern für das Institut bereitstellen."
 
 hungary_flavor_gen.28.t:0 "Beitritt zu den neuen Mittelmächten"
 hungary_flavor_gen.28.d:0 "[Ger.GetLeader] hat heute das Abkommen zum Beitritt zu den Neuen Mittelmächten unterzeichnet. Dies markiert die historische Wiederbelebung eines alten Bündnisses. Wir werden diesem Bündnis mit dem Ziel beitreten, den vergangenen Ruhm unserer Nation wiederherzustellen."
 hungary_flavor_gen.28.a:0 "Die Mittelmächte werden wieder auferstehen."
 
 hungary_flavor_gen.29.t:0 "Ukrainische Länder"
 hungary_flavor_gen.29.d:0 "[HUN.GetNameDef] hat im Chaos Osteuropas das neu proklamierte Königreich Ukraine hervorgebracht. Dieser neue ukrainische Staat fordert nun alle seine Nachbarn, die ukrainisches Land besitzen, auf, seine Autorität über diese Gebiete anzuerkennen. Da wir selbst einige Gebiete besitzen, die als überwiegend ukrainisch gelten, müssen wir auch entscheiden, wie wir auf diese Aufforderung reagieren."
 hungary_flavor_gen.29.a:0 "Wir werden diesen neuen Staat offiziell anerkennen."
 hungary_flavor_gen.29.b:0 "Wir möchten ein solches Land nicht unterstützen."
 
 hungary_flavor_gen.30.t:0 "Donauarbeiter streiken"
 hungary_flavor_gen.30.d:0 "Seit der Gründung des Donaubundes sind die Arbeiter mit sozialistischer Gesinnung in unserem Land zunehmend unruhig geworden. Die Einladung des Bundes an alle Donaukulturen hat in den betroffenen Regionen zu zahlreichen Protesten und Streiks geführt. Wir müssen entscheiden, ob wir gegen diese Arbeiter vorgehen oder die Proteste im Sande verlaufen lassen und das Beste hoffen."
 hungary_flavor_gen.30.a:0 "Zerstreuen Sie die Menge."
 hungary_flavor_gen.30.b:0 "Lassen Sie sie protestieren."
 
 hungary_flavor_gen.31.t:0 "Aufstand der Donauarbeiter"
 hungary_flavor_gen.31.d:0 "Die Proteste der Donauarbeiter haben sich in den letzten Monaten immer mehr ausgeweitet, egal wie sehr wir versucht haben, ihre Ausbreitung zu verhindern. Einige von ihnen haben inzwischen ganze Städte besetzt und revoltieren offen gegen unsere Regierung. Sie fordern die Unabhängigkeit und den freien Beitritt zum Donaubund."
 hungary_flavor_gen.31.a:0 "Akzeptieren Sie ihre Forderungen."
 hungary_flavor_gen.31.b:0 "Versuchen Sie, den Aufstand niederzuschlagen."
 
 hungary_flavor_gen.32.t:0 "[HUN.GetNameDef] verteidigt die Donauarbeiter"
 hungary_flavor_gen.32.d:0 "Die Donauaufstände in unserem Land sind inzwischen einigermaßen eingedämmt, obwohl der Unmut in der Arbeiterklasse noch immer groß ist. [HUN.GetNameDef] hat sich jedoch entschieden, zugunsten der sozialistischen Rebellen einzugreifen und seine Absicht angekündigt, die unterdrückten Donaubewohner notfalls mit Gewalt zu befreien."
 hungary_flavor_gen.32.a:0 "Lass sie es versuchen."
 
 hungary_flavor_gen.33.t:0 "[HUN.GetNameDef] verlässt die Donauarbeiter"
 hungary_flavor_gen.33.d:0 "Die Donauaufstände in unseren Städten wurden niedergeschlagen. Ihr Hilferuf an den Donaubund blieb ungehört, so schien es zumindest, da [HUN.GetNameDef] sein Versprechen, ihnen zu helfen, nicht eingelöst hat."
 hungary_flavor_gen.33.a:0 "Wir werden dem ein Ende setzen."
 
 hungary_flavor_gen.34.t:0 "[FROM.GetName] tritt vom Vertrag von Trianon zurück"
 hungary_flavor_gen.34.d:0 "Als Unterzeichner des Vertrags von Trianon tragen wir eine Mitverantwortung für dessen Durchsetzung. [FROM.GetName] ist nun von dieser Position abgerückt und lässt die Welt fragen, ob [HUN.GetAdjective]s Expansion noch eingedämmt werden kann. Sollten wir die Verantwortung für die Eindämmung ihrer Aggression übernehmen?"
 hungary_flavor_gen.34.a:0 "Wir werden die Verantwortung übernehmen."
 hungary_flavor_gen.34.b:0 "Es liegt nicht in unserem Interesse, gegen [HUN.GetName] zu kämpfen."
 
 hungary_flavor_aus.1.t:0 "Ungarische Allianz"
 hungary_flavor_aus.1.d:0 "Ungarische Diplomaten haben im vergangenen Monat Tag und Nacht in unseren Botschaften daran gearbeitet, ein Bündnis zwischen den beiden Ländern zu schmieden. Es könnte für die beiden Nationen tatsächlich von Vorteil sein, sich nach drei langen Jahrzehnten wieder zu vereinen."
 hungary_flavor_aus.1.a:0 "Natürlich waren die Ungarn immer unsere Freunde."
 hungary_flavor_aus.1.b:0 "Wir werden ihren törichten nationalistischen Zielen nicht dienen."
 
 hungary_flavor_aus.2.t:0 "Ungarn drängt auf Volksabstimmung im Burgenland"
 hungary_flavor_aus.2.d:0 "Unser neuer und alter Verbündeter Ungarn hat nach dem Ersten Weltkrieg große Gebietsverluste erlitten, darunter auch einen unserer Staaten: das Burgenland. Ungarn hat ein Referendum für die Bevölkerung des Gebiets vorgeschlagen, bei dem sie – ähnlich wie die Stadt Sopron 1921 – über den Verbleib in Österreich oder den Wiederanschluss an Ungarn abstimmen könnte. Angesichts der ethnischen Struktur des Staates wird das Referendum wahrscheinlich zugunsten Ungarns ausfallen. Werden wir diese Abstimmung zulassen?"
 hungary_flavor_aus.2.a:0 "Erlauben Sie das Referendum."
 hungary_flavor_aus.2.b:0 "Niemals."
 
 hungary_flavor_aus.3.t:0 "Ungarn bietet Slowenien für das Burgenland an"
 hungary_flavor_aus.3.d_slovenia:0 "Obwohl wir nicht zur Konferenz zur Neuaufteilung Jugoslawiens eingeladen waren, unterbreitete uns die ungarische Führung ein mutiges Angebot bezüglich Slowenien. Sie möchte uns die nördliche Hälfte im Tausch gegen das Burgenland überlassen. Slowenien gehörte lange Zeit zu unserem Land, und das Burgenland ist historisch ungarisches Gebiet. Ein Tausch wäre daher durchaus sinnvoll. Was ist unsere Antwort?"
 hungary_flavor_aus.3.d_both:0 "Obwohl wir nicht zur Konferenz zur Neuaufteilung Jugoslawiens eingeladen waren, unterbreitete uns die ungarische Führung ein mutiges Angebot bezüglich Slowenien. Sie möchte ganz Slowenien an uns abgeben und dafür das Burgenland erhalten. Slowenien gehörte lange Zeit zu unserem Land, und das Burgenland ist historisch ungarisches Gebiet. Ein Tausch wäre daher durchaus sinnvoll. Wie reagieren wir darauf?"
 hungary_flavor_aus.3.a:0 "Akzeptieren."
 hungary_flavor_aus.3.b:0 "Abfall."
 
 hungary_flavor_aus.4.t:0 "Die Visegrád-Gruppe"
 hungary_flavor_aus.4.d:0 "Ungarn hat eine eigene Allianz zwischen den internationalen Giganten gegründet. Sie nennen sie die Visegrád-Gruppe, und einige ost- und mitteleuropäische Länder sind ihr bereits beigetreten, in der Hoffnung, dass dies ihnen Schutz bieten wird. Nun kommen sie mit der Einladung an uns heran, ihrer neu gegründeten Fraktion beizutreten. Was sollen wir antworten?"
 hungary_flavor_aus.4.a:0 "Klingt nach einem Deal."
 hungary_flavor_aus.4.b:0 "Daran werden wir nicht teilnehmen."
 
 hungary_flavor_aus.5.t:0 "Österreich gegen Deutschland unterstützen"
 hungary_flavor_aus.5.d:0 "Unser Verbündeter Österreich ist von einer deutschen Besatzung bedroht. Österreich drängt zunehmend auf den Anschluss, die Vereinigung Deutschlands und Österreichs. Es ruft uns um Hilfe bei der Verteidigung gegen die drohende deutsche Invasion an."
 hungary_flavor_aus.5.a:0 "Wir stehen an der Seite unserer Verbündeten."
 hungary_flavor_aus.5.b:0 "Leider können wir ihnen nicht helfen."
 
 hungary_flavor_aus.6.t:0 "Unsere Verbündeten schützen uns"
 hungary_flavor_aus.6.d:0 "Unsere Verbündeten stehen an unserer Seite! Wir werden der deutschen Invasion nicht allein gegenüberstehen. Nein zum Anschluss!"
 hungary_flavor_aus.6.a:0 "Wir müssen uns weiterhin auf unsere Verteidigung vorbereiten."
 
 hungary_flavor_aus.7.t:0 "Unsere Verbündeten verlassen uns"
 hungary_flavor_aus.7.d:0 "Unsere Fraktion hat das Bündnis, das wir geschlossen hatten, entehrt. Wir haben jedoch keine Zeit, uns mit dieser unehrenhaften Tat zu befassen, da wir entscheiden müssen, wie wir mit den deutschen Forderungen umgehen. Werden wir uns ihrem Willen beugen und unsere beiden Länder vereinen, oder werden wir versuchen, uns zu wehren und hoffen, dass wir durchhalten können, bis Deutschland an die umliegenden Großmächte fällt?"
 hungary_flavor_aus.7.a:0 "Wir haben keine andere Wahl, als uns zu unterwerfen."
 hungary_flavor_aus.7.b:0 "Wir werden standhalten und kämpfen, auch wenn wir allein sind!"
 
 hungary_flavor_pol.1.t:0 "Ungarisches Bündnis"
 hungary_flavor_pol.1.d:0 "Aus der Asche des Ersten Weltkriegs ist Ungarn endlich wieder auferstanden und hat eine eigene Fraktion gebildet. Sie haben sich nun an unsere Regierung gewandt, um uns zu diesem Bündnis einzuladen und sich gegen alles zu stellen, was die Souveränität bedrohen könnte."
 hungary_flavor_pol.1.a:0 "Wie könnten wir ablehnen?"
 hungary_flavor_pol.1.b:0 "Wir können nicht akzeptieren."
 
 hungary_flavor_pol.2.t:0 "Österreich-Ungarn bietet Garantien für Krakau und Galizien"
 hungary_flavor_pol.2.d:0 "Die meisten unserer südlichen Gebiete gehörten einst zu Österreich-Ungarn. Nach der Wiedergeburt des Kaiserreichs forderten sie uns auf, die Kontrolle über Krakau und Galizien aufzugeben, andernfalls würden wir mit Konsequenzen rechnen müssen. Im Gegenzug für das Land boten sie uns an, unsere Sicherheit vor ausländischen Angreifern zu garantieren."
 hungary_flavor_pol.2.a:0 "Geben Sie die betreffenden Gebiete ab."
 hungary_flavor_pol.2.b:0 "Lehnen Sie die Forderung ab."
 
 hungary_flavor_pol.3.t:0 "Polnisch-ungarischer Geheimdienstaustausch"
 hungary_flavor_pol.3.d:0 "Das ungarische diplomatische und nachrichtendienstliche Korps hat mit unserem ein gegenseitiges Abkommen unterzeichnet, das den nachrichtendienstlichen Austausch zwischen den beiden Ländern ausweitet und beiden zugutekommt."
 hungary_flavor_pol.3.a:0 "Zusammenarbeit ist immer der richtige Weg."
 
 hungary_flavor_pol.4.t:0 "[From.GetName] unterstützt unsere Ansprüche im Norden"
 hungary_flavor_pol.4.d:0 "Unser neues Bündnis könnte uns Möglichkeiten eröffnen, die wir allein nicht hätten nutzen können. [From.GetName] unterstützt offiziell unseren Anspruch auf Ostpreußen, was es uns im Krieg sehr leicht machen würde, die Insel einzunehmen, sollten wir Deutschland besiegen."
 hungary_flavor_pol.4.a:0 "[Root.GetFactionName] ist unsere Rettung."
 
 hungary_flavor_pol.5.t:0 "Der Warschauer Pakt"
 hungary_flavor_pol.5.d:0 "Unsere Genossen in Ungarn haben uns heute einen Vorschlag unterbreitet. Sie wollen die Sowjetunion dazu bewegen, ihre Fraktion zu erweitern und weitere osteuropäische Länder einzuladen, wobei wir an erster Stelle auf dieser Liste stehen. Sollten wir ihren Vorschlag annehmen, müsste die Sowjetunion noch zustimmen, damit dieses neue Bündnis zustande kommen kann."
 hungary_flavor_pol.5.a:0 "Wenden Sie sich an die sowjetische Führung, um Vereinbarungen zu treffen."
 hungary_flavor_pol.5.b:0 "Davon werden wir nichts dulden."
 
 hungary_flavor_pol.6.t:0 "Die Sowjets weigern sich, den Warschauer Pakt zu unterzeichnen"
 hungary_flavor_pol.6.d:0 "Unsere Rufe stoßen auf taube Ohren. Unsere sowjetischen Genossen weigern sich, ihr Bündnis auf uns auszudehnen, geschweige denn auf irgendein anderes osteuropäisches Land. Trotz der Bemühungen unserer ungarischen Freunde werden wir den Kampf gegen die Kapitalisten und Faschisten allein führen müssen."
 hungary_flavor_pol.6.a:0 "Der Vater der Revolution lässt uns im Stich?"
 
 hungary_flavor_pol.7.t:0 "[HUN.GetNameDef] möchte Miedzymorze beitreten"
 hungary_flavor_pol.7.d:0 "Unsere Fraktion hat die Aufmerksamkeit von [HUN.GetNameDef] erregt. Ihre Diplomaten sind an uns herangetreten, um ihren Beitritt zu unserer Allianz auszuhandeln. Wie sollen wir reagieren?"
 hungary_flavor_pol.7.a:0 "Sie sind herzlich willkommen."
 hungary_flavor_pol.7.b:0 "Sie sind überhaupt nicht willkommen."
 
 hungary_flavor_pol.8.t:0 "[HUN.GetNameDef] bietet eine Vereinigung"
 hungary_flavor_pol.8.d:0 "Unser Verbündeter [HUN.GetName] hat eine Alternative zur Kapitulation vor unseren Feinden angeboten. Er möchte eine Union zwischen unseren Nationen bilden und den Kampf gemeinsam fortsetzen. Das würde bedeuten, unsere Unabhängigkeit aufzugeben, aber es könnte die einzige Möglichkeit sein, uns zu retten."
 hungary_flavor_pol.8.a:0 "Uns bleibt keine andere Wahl."
 hungary_flavor_pol.8.b:0 "Wir können diesen Krieg noch gewinnen."
 
 hungary_flavor_pol.9.t:0 "Achsenmitgliedschaft"
 hungary_flavor_pol.9.d:0 "Diplomaten aus Berlin sind heute eingetroffen und haben um ein sofortiges Treffen mit dem Außenminister unserer Regierung gebeten. Sie möchten das Achsenbündnis um Polen erweitern, was sie als „großzügige Geste des Führers, die nicht abgelehnt werden kann“ bezeichnen. Uns wurde gesagt, dass Deutschlands Verbündeter [HUN.GetNameDef] hinter der Einladung steht, aber wir müssen dennoch mit den Deutschen verhandeln."
 hungary_flavor_pol.9.a:0 "Wir nehmen es selbstverständlich an."
 hungary_flavor_pol.9.b:0 "Kein Bündnis mit den Deutschen."
 
 hungary_flavor_pol.10.t:0 "Deutschland fordert Danzig und Posen"
 hungary_flavor_pol.10.d:0 "Unsere deutschen Verbündeten haben sich an uns gewandt, um einen alten Streit zwischen unseren Nationen beizulegen. Die Gebiete Danzig und Posen wurden uns nach dem Ersten Weltkrieg zugesprochen, doch die Deutschen beanspruchen weiterhin die Kontrolle über diese Staaten. Da wir nun Freunde sind, möchten sie die Angelegenheit friedlich regeln und wenden sich mit dieser Bitte an uns. Werden wir diese Gebiete an unsere neuen Verbündeten abtreten?"
 hungary_flavor_pol.10.a:0 "Wir stehen jetzt auf ihrer Seite und werden ihnen nicht im Weg stehen."
 hungary_flavor_pol.10.b:0 "Nein. Das ist nicht der Grund, warum wir ihre Freundschaft gesucht haben."
 
 hungary_flavor_pol.11.t:0 "Österreich-Ungarn verzichtet auf seine Ansprüche gegenüber uns"
 hungary_flavor_pol.11.d:0 "Einige der Gebiete, die wir nach unserer Unabhängigkeit 1918 erwarben, gehörten früher zur österreichisch-ungarischen Monarchie. Nach der jüngsten Wiedererstarkung dieser Ländereien kam die Angst vor einem erneuten Konflikt auf, doch nun können wir beruhigt sein. Die reformierte Monarchie hat ihre Ansprüche auf diese Gebiete offiziell zurückgezogen."
 hungary_flavor_pol.11.a:0 "Das ist eine Erleichterung."
 
 hungary_flavor_bul.1.t:0 "Ungarisches Bündnis"
 hungary_flavor_bul.1.d:0 "Ungarische Diplomaten haben sich kürzlich mit einem Bündnisvorschlag an unsere Regierung gewandt. Offenbar haben sie eine Fraktion namens „Die neuen Mittelmächte“ gegründet und würden uns gerne in ihre Reihen aufnehmen. Ein interessanter Vorschlag, da einige der Rivalen Ungarns mit unseren identisch sind."
 hungary_flavor_bul.1.a:0 "Wirklich interessant. Wir nehmen an!"
 hungary_flavor_bul.1.b:0 "Neue Mittelmächte? Unsinn."
 
 hungary_flavor_bul.2.t:0 "Industrieentwicklungsprojekt Burgas"
 hungary_flavor_bul.2.d:0 "[From.GetName] hat beschlossen, uns durch die Finanzierung des Fabrikbaus in Burgas zu unterstützen. Die Fabriken dienen in erster Linie militärischen Zwecken, stehen aber unter unserer vollen Kontrolle. Dieser Akt der Großzügigkeit ist ein Beweis für den guten Willen von [From.GetName]."
 hungary_flavor_bul.2.a:0 "Ich wusste, dass es die richtige Entscheidung war, auf ihrer Seite zu stehen."
 
 hungary_flavor_bul.3.t:0 "[HUN.GetName] setzt unsere Ansprüche auf Dobrudscha durch"
 hungary_flavor_bul.3.d:0 "[HUN.GetName] hat Verhandlungen mit der rumänischen Regierung aufgenommen und versucht, sie unter Druck zu setzen, uns das Gebiet der Dobrudscha zu überlassen. Das kann nur Gutes bringen!"
 hungary_flavor_bul.3.a:0 "Das sind großartige Neuigkeiten!"
 
 hungary_flavor_bul.4.t:0 "Rumänien tritt die südliche Dobrudscha ab"
 hungary_flavor_bul.4.d:0 "Rumänien ist einigen Forderungen von [HUN.GetName] nachgekommen und hat uns die Annexion der südlichen Dobrudscha gestattet. Wir hatten auf die gesamte Region gehofft, aber das muss genügen."
 hungary_flavor_bul.4.a:0 "Trotzdem ein Erfolg."
 
 hungary_flavor_bul.5.t:0 "Rumänien tritt die gesamte Dobrudscha ab"
 hungary_flavor_bul.5.d:0 "Rumänien hat den Forderungen von [HUN.GetName] nachgegeben und uns die Annexion der Dobrudscha gestattet. Das bulgarische Volk wird sicherlich bald vereint sein!"
 hungary_flavor_bul.5.a:0 "Ein großer Erfolg für unsere Nation!"
 
 hungary_flavor_bul.6.t:0 "Rumänien hält an der Dobrudscha fest"
 hungary_flavor_bul.6.d:0 "Die Verhandlungen blieben ergebnislos. [HUN.GetName] konnte die rumänische Regierung nicht zur Landvergabe drängen. Wir können die Dobrudscha nur mit Gewalt zurückgewinnen."
 hungary_flavor_bul.6.a:0 "Scham."
 
 hungary_flavor_ita.1.t:0 "Slowenien für Adriahäfen"
 hungary_flavor_ita.1.d_fiume:0 "[HUN.GetNameDef] hat eine Konferenz zur Neuaufteilung Jugoslawiens einberufen. Was Slowenien betrifft, so haben sie beschlossen, uns Teile davon im Austausch für die Hafenstadt Fiume anzubieten. Das mag ein lukrativer Deal sein, aber wir würden einen wertvollen Hafen am Mittelmeer verlieren. Was ist unsere Antwort?"
 hungary_flavor_ita.1.d_zara:0 "[HUN.GetNameDef] hat eine Konferenz zur Neuaufteilung Jugoslawiens einberufen. Was Slowenien betrifft, so haben sie beschlossen, uns Teile davon im Austausch für die Hafenstadt Zara anzubieten. Das mag ein lukrativer Deal sein, aber wir würden einen wertvollen Hafen am Mittelmeer verlieren. Was ist unsere Antwort?"
 hungary_flavor_ita.1.d_both:0 "[HUN.GetNameDef] hat eine Konferenz zur Neuaufteilung Jugoslawiens einberufen. Was Slowenien betrifft, so haben sie beschlossen, uns Teile davon im Austausch für die Hafenstädte Fiume und Zara anzubieten. Das mag ein lukrativer Deal sein, aber wir würden wertvolle Häfen am Mittelmeer verlieren. Was ist unsere Antwort?"
 hungary_flavor_ita.1.a:0 "Akzeptieren."
 hungary_flavor_ita.1.b:0 "Abfall."
 
 hungary_flavor_ita.2.t:0 "Verhandlungen mit [HUN.GetNameDef]"
 hungary_flavor_ita.2.d:0 "Nach der Annäherung Ungarns an Deutschland haben sich die ungarischen Diplomaten an uns gewandt, um unsere diplomatischen Beziehungen zu regeln.\n\n\n(Bewegen Sie den Mauszeiger über die Antwort, um die von Ungarn vorgeschlagenen Bedingungen anzuzeigen)."
 hungary_flavor_ita.2.a:0 "Akzeptieren."
 hungary_flavor_ita.2.b:0 "Abfall."
 
 hungary_flavor_ita.3.t:0 "Zara und Fiume im Austausch für militärische Unterstützung"
 hungary_flavor_ita.3.d:0 "[HUN.GetNameDef] hat den Wunsch geäußert, den Hafen von Zara zu erwerben, und hat folgenden Deal vorgeschlagen: Unsere Länder unterzeichnen einen Nichtangriffspakt und tauschen im Austausch für unsere Häfen in Kroatien eine beträchtliche Menge an Infanterieausrüstung mit uns. Was sollen wir ihren Diplomaten sagen?"
 hungary_flavor_ita.3.a:0 "Akzeptieren Sie den Deal."
 hungary_flavor_ita.3.b:0 "Lehnen Sie das Angebot ab."
 
 hungary_flavor_ita.4.t:0 "Zara, Fiume und Istrien für militärische und politische Unterstützung"
 hungary_flavor_ita.4.d:0 "Ungarische Diplomaten unterbreiteten uns einen kühnen Vorschlag. Sie wollten im Tausch gegen eine beträchtliche Menge Ausrüstung die Häfen Zara und Fiume sowie die Provinz Istrien erwerben und versprachen zudem, unsere politischen Ziele künftig nach Kräften zu unterstützen. Dies könnte uns einen wertvollen Verbündeten verschaffen, würde aber gleichzeitig dalmatinisches Land verlieren."
 hungary_flavor_ita.4.a:0 "Akzeptieren Sie den Deal."
 hungary_flavor_ita.4.b:0 "Lehnen Sie das Angebot ab."
 
 hungary_flavor_ita.5.t:0 "[HUN.GetNameDef] fordert ihre alten Gebiete"
 hungary_flavor_ita.5.d:0 "Die wiedererwachte Monarchie von [HUN.GetNameDef] hat deutlich gemacht, dass sie ihre alten Gebiete wiederherstellen möchte. Dazu gehören auch unsere Provinzen Istrien und Südtirol. Sie hat uns nun mit dem Vorschlag einer friedlichen Übertragung dieser Gebiete im Austausch gegen griechisches Territorium und dem Versprechen künftigen Friedens kontaktiert. Sind wir mit diesem Deal einverstanden?"
 hungary_flavor_ita.5.a:0 "Endlich eine Gelegenheit, nach Griechenland zu expandieren."
 hungary_flavor_ita.5.b:0 "Wir werden nicht zu Schoßhündchen der Monarchie."
 
 hungary_flavor_ita.6.t:0 "Früchte der jugoslawischen Teilung"
 hungary_flavor_ita.6.d:0 "Während der Konferenz, die die Neuaufteilung Jugoslawiens regelte, hat uns [From.GetName] einiges ersehntes Land zugesprochen. Einige Berater schlagen vor, dies sei der Beginn einer fruchtbaren Freundschaft zwischen unseren Ländern und wir sollten engere Beziehungen zu ihnen anstreben. Wir könnten darum bitten, ihrer Fraktion beizutreten, und vielleicht könnten wir am Ende sogar noch mehr Territorium gewinnen."
 hungary_flavor_ita.6.a:0 "Schlagen Sie eine Allianz vor."
 hungary_flavor_ita.6.b:0 "Wir werden den Abstand einhalten."
 
 hungary_flavor_ita.7.t:0 "Deutschland verliert gegen Ljubljana"
 hungary_flavor_ita.7.d:0 "Wir haben unsere Ansprüche allen bekannt gemacht, und Deutschland hat den Wink verstanden und uns das Eigentum an Ljubljana überlassen."
 hungary_flavor_ita.7.a:0 "Wie erwartet."
 
 hungary_flavor_ita.8.t:0 "Viktor Emanuel wird ungarischer Thronfolger"
 hungary_flavor_ita.8.d:0 "Der alte Regent von [HUN.GetNameDef] sucht einen Nachfolger für sein Amt, und unser Monarch Viktor Emanuel wird als Kandidat gehandelt. Wir könnten ihn davon abhalten, die Anfrage anzunehmen, aber ein Italiener an der Macht in Ungarn könnte sich später als vorteilhaft erweisen."
 hungary_flavor_ita.8.a:0 "Wir nehmen den Vorschlag an."
 hungary_flavor_ita.8.b:0 "Dies widerspricht unseren Interessen."
 
 hungary_flavor_ita.9.t:0 "Die Adria-Initiative"
 hungary_flavor_ita.9.d:0 "[HUN.GetNameDef] hat kürzlich Gebiete entlang der Adriaküste erworben und schlägt uns nach ihrer vorherigen diplomatischen Mission nun eine engere Zusammenarbeit vor. Sie möchten uns beim Schutz der Adria unterstützen, im Gegenzug teilen wir ihnen unser maritimes Know-how mit. Sie versprechen, jedem, der uns feindlich gesinnt ist und die Adria betritt, den Krieg zu erklären, wenn wir zustimmen."
 hungary_flavor_ita.9.a:0 "Eine vernünftige Vereinbarung."
 hungary_flavor_ita.9.b:0 "Wir brauchen ihre Hilfe bei unserer Seeverteidigung nicht."
 
 hungary_flavor_ita.10.t:0 "[HUN.GetNameDef] würdigt die Adria-Initiative"
 hungary_flavor_ita.10.d:0 "Während unsere Feinde sich den adriatischen Gewässern nähern, hat die ungarische Marine ihre Flotten mobilisiert und Verteidigungsformationen gegen die Invasoren gebildet. Ungarn hat Wort gehalten und die Bedingungen der Adria-Initiative eingehalten."
 hungary_flavor_ita.10.a:0 "So wie es sein sollte."
 
 hungary_flavor_ita.11.t:0 "[HUN.GetNameDef] entehrt die Adria-Initiative"
 hungary_flavor_ita.11.d:0 "Während unsere Feinde sich der Adria nähern, sitzt die ungarische Marine untätig in ihren Häfen und scheint sich ihrer Verpflichtungen aus der Adria-Initiative nicht bewusst zu sein. Als unsere Schiffe versuchten, mit einer ihrer Flotten zu kommunizieren, weigerten sie sich schlichtweg zu antworten. Man scheint den Ungarn nicht zu trauen, und ihr Wort zählt nichts."
 hungary_flavor_ita.11.a:0 "Wie können sie es wagen?"
 
 hungary_flavor_ita.12.t:0 "[HUN.GetNameDef] möchte dem Novus Imperium Romanum beitreten"
 hungary_flavor_ita.12.d:0 "[HUN.GetNameDef] ist derzeit keiner Allianz angeschlossen und möchte dies ändern, indem sie dem Novus Imperium Romanum beitreten. Mit ihnen an unserer Seite könnten wir nicht nur auf ihre Hilfe, sondern auch auf den Zorn ihrer Feinde zählen. Wie sollten wir reagieren?"
 hungary_flavor_ita.12.a:0 "Je mehr, desto besser."
 hungary_flavor_ita.12.b:0 "Wir brauchen sie nicht in unserer Fraktion."
 
 hungary_flavor_ita.13.t:0 "Ungarischer Rüstungskredit"
 hungary_flavor_ita.13.d:0 "[HUN.GetNameDef] war nach dem Ersten Weltkrieg praktisch entwaffnet. Sie möchten nun ihre militärische Stärke wieder aufbauen und möchten von uns einen Kredit erhalten, der sie bei diesem Vorhaben unterstützt."
 hungary_flavor_ita.13.a:0 "Wir können etwas Geld für den Kredit erübrigen."
 hungary_flavor_ita.13.b:0 "Wir würden gegen den Vertrag von Trianon verstoßen."
 
 germany.28.c:0 "Bitten Sie unsere Verbündeten um Hilfe."
 
 hungary_flavor_ger.1.t:0 "Ungarn strebt die Mitgliedschaft in unserer Fraktion an"
 hungary_flavor_ger.1.d:0 "Nach unzähligen diplomatischen Missionen an unsere Regierung hat sich Ungarn nun endlich mit einem Bündnisvorschlag an uns gewandt und um einen Beitritt zu unserem Bündnis gebeten. Ungarn könnte tatsächlich ein wertvoller Verbündeter sein, wenn wir es bei seiner territorialen Expansion unterstützen."
 hungary_flavor_ger.1.a:0 "Willkommen, unsere ungarischen Freunde."
 hungary_flavor_ger.1.b:0 "Ohne sie geht es uns besser."
 
 hungary_flavor_ger.2.t:0 "Der Kommunismus siegt"
 hungary_flavor_ger.2.d:0 "Jetzt, da die Arbeiterrevolution triumphiert hat, müssen wir entscheiden, wie es weitergehen soll. Wollen wir die internationale Zusammenarbeit mit anderen kommunistischen Ländern anstreben oder wollen wir unser Schicksal selbst in die Hand nehmen und ganz allein für die sozialistische Utopie kämpfen?"
 hungary_flavor_ger.2.a:0 "Internationalismus ist der richtige Weg."
 hungary_flavor_ger.2.b:0 "Wir müssen die Revolution alleine fortsetzen."
 
 hungary_flavor_ger.3.t:0 "Das kommunistische Deutschland strebt den Beitritt zu [Root.GetFactionName] an"
 hungary_flavor_ger.3.d:0 "Durch eine seltsame Laune des Schicksals ist Deutschland der jüngste kommunistische Staat geworden. Es strebt nun den Beitritt zu [Root.GetFactionName] an, und wir müssen entscheiden, ob wir diesem Antrag stattgeben oder nicht."
 hungary_flavor_ger.3.a:0 "Natürlich werden wir das."
 hungary_flavor_ger.3.b:0 "Sie müssen ihren eigenen Weg finden."
 
 hungary_flavor_ger.4.t:0 "[From.GetName] akzeptiert Fraktionsmitgliedschaft"
 hungary_flavor_ger.4.d:0 "The negotiations with [From.GetName] were, successful, and we have signed the alliance between the two countries. The fire of the revolution shall burn all the more brighter after this day.!
 hungary_flavor_ger.4.a:0 "Vorwärts, Kameraden!"
 
 hungary_flavor_ger.5.t:0 "[From.GetName] lehnt Fraktionsmitgliedschaft ab"
 hungary_flavor_ger.5.d:0 "Trotz unserer besten Bemühungen konnten wir die [From.GetAdjective]-Führung nicht davon überzeugen, uns in die [From.GetFactionName] einzuladen."
 hungary_flavor_ger.5.a:0 "Sie müssen ihre Gründe haben."
 
 hungary_flavor_ger.6.t:0 "Ungarn strebt die Wiederherstellung der österreichisch-ungarischen Monarchie an"
 hungary_flavor_ger.6.d:0 "Um die Verträge des Ersten Weltkriegs zu revidieren, hat Ungarn Verhandlungen mit Österreich aufgenommen, um die österreichisch-ungarische Monarchie wiederzubeleben. Da die territoriale Integrität Österreichs in unserem Interesse liegen könnte, könnte dieser Schritt unseren zukünftigen politischen Bemühungen schaden."
 hungary_flavor_ger.6.a:0 "Dies ist von geringer Bedeutung."
 hungary_flavor_ger.6.b:0 "Wir können nicht zulassen, dass sie in unseren Einflussbereich eingreifen."
 
 hungary_flavor_ger.7.t:0 "Ungarn weigert sich, nachzugeben"
 hungary_flavor_ger.7.d:0 "Ungarn hält hartnäckig an seinen imperialistischen Ambitionen fest und weigert sich, die Verhandlungen mit Österreich abzubrechen. Wir haben uns offen gegen das Vorgehen der beiden Länder ausgesprochen, was Grund genug für ein energisches Eingreifen ist. Werden wir sofort handeln oder die Situation einfach laufen lassen?"
 hungary_flavor_ger.7.a:0 "Ein Eingriff wird notwendig sein."
 hungary_flavor_ger.7.b:0 "Sie werden es bereuen, sich der Macht von [Root.GetName] widersetzt zu haben … Später."
 
 hungary_flavor_ger.8.t:0 "Sicherung der Loyalität Ungarns"
 hungary_flavor_ger.8.d:0 "Mit fortschreitendem Krieg beginnen einige unserer politischen Berater, die Motive Ungarns zu hinterfragen. Uns liegen Berichte vor, wonach sie mit dem Feind verhandeln und versuchen, [Root.GetName] zu untergraben. Wir könnten ihre Loyalität leicht sichern, indem wir ihr Land besetzen und einen Putsch inszenieren, um eine freundlichere Regierung einzusetzen. Ein Plan unter dem Namen „Margaretha“ wurde entwickelt, der diesem Zweck dienen soll."
 hungary_flavor_ger.8.a:0 "Beginnen Sie mit den Vorbereitungen für Operation Margaretha."
 hungary_flavor_ger.8.b:0 "Sie hegen sicherlich keine Gedanken an Verrat."
 hungary_flavor_ger.8.tt:0 "In Ungarn wird ein deutschfreundliches Regime installiert.\n"
 
 hungary_flavor_ger.9.t:0 "Unterstützung für Ungarn"
 hungary_flavor_ger.9.d:0 "Ungarn strebt eine enge Zusammenarbeit an und hat darum gebeten, einen Teil unseres Generalstabs zu entsenden, um das Land in militärischen Angelegenheiten zu beraten. Dadurch könnten wir unseren Einfluss in Ungarn stärken und die Entsendung einiger unserer Generäle könnte Ungarn in Zukunft sogar zu einem kompetenten Verbündeten machen. Wie reagieren wir auf diese Anfrage?"
 hungary_flavor_ger.9.a:0 "Wir können einige Generäle entbehren."
 hungary_flavor_ger.9.b:0 "Schicken Sie eine symbolische Mission militärischer Berater."
 hungary_flavor_ger.9.c:0 "Sie haben nicht unsere Unterstützung."
 
 hungary_flavor_ger.10.t:0 "Italienische Ansprüche auf Ljubljana"
 hungary_flavor_ger.10.d:0 "Der südliche Teil Sloweniens gehört uns, doch auch Italien erhebt Ansprüche darauf. Vielleicht sollten wir ihn als Zeichen des guten Willens vorerst an Italien abtreten. Dies könnte dazu beitragen, das Bündnis zwischen unseren Nationen zu festigen."
 hungary_flavor_ger.10.a:0 "Sie können es haben."
 hungary_flavor_ger.10.b:0 "Ljubljana gehört uns."
 
 hungary_flavor_ger.11.t:0 "Deutschland fordert Anschluss"
 hungary_flavor_ger.11.d:0 "Die Frage der deutschen Einheit schwebt schon lange in der Luft, und nun hat Deutschland den Schritt unternommen, der Angelegenheit ein Ende zu setzen. Sie fordern, dass [AUS.GetName] mit ihnen vereint wird, und da wir [AUS.GetName] derzeit schützen, werden wir entscheiden, was wir antworten."
 hungary_flavor_ger.11.a:0 "Lass sie es nehmen."
 hungary_flavor_ger.11.b:0 "Wir werden ihre Freiheit schützen."
 
 hungary_flavor_ger.12.t:0 "Deutschland will die Tschechoslowakei teilen"
 hungary_flavor_ger.12.d:0 "Die Tschechoslowakei steht unter unserem Schutz, doch Deutschland versucht, sie zu zerschlagen und nach Belieben aufzuteilen. Wir könnten uns entscheiden, sie zu schützen, aber das würde wahrscheinlich zu einem Krieg mit Deutschland führen. Wie werden wir darauf reagieren?"
 hungary_flavor_ger.12.a:0 "Wir können die Tschechoslowakei nicht schützen."
 hungary_flavor_ger.12.b:0 "Lassen Sie sie es versuchen. Wir werden sie zurückdrängen."
 
 hungary_flavor_ger.13.t:0 "Ehemalige ungarische Gebiete in Serbien"
 hungary_flavor_ger.13.d:0 "Ungarn möchte bekanntlich sein altes Königreich wiederherstellen, und wir besitzen nun einen Teil davon. Die Staaten in der Vojvodina (dem nördlichen Teil Serbiens) gehörten jahrhundertelang zum Königreich Ungarn, und ihr Erhalt hat keinen großen strategischen Wert. Werden wir sie Ungarn anbieten?"
 hungary_flavor_ger.13.a:0 "Wir werden ihnen ihr Land zurückgeben."
 hungary_flavor_ger.13.b:0 "Sie sollten mit dem zufrieden sein, was sie haben."
 
 hungary_flavor_ger.14.t:0 "Treffen mit Horthy"
 hungary_flavor_ger.14.d_nothing:0 "Wir haben Pläne zur Teilung der Tschechoslowakei ausgearbeitet, doch Ungarns Haltung dazu ist noch ungewiss. Bei einem Treffen mit seinem Regenten Miklós Horthy wurde die Angelegenheit besprochen, und Ungarn verhielt sich neutral. Horthy will keinen Teil der Tschechoslowakei und scheint uns zu verachten, weil wir sie zerstören wollen."
 hungary_flavor_ger.14.d_carpathian_ruthenia:0 "Wir haben Pläne zur Teilung der Tschechoslowakei ausgearbeitet, doch die Position Ungarns in dieser Angelegenheit ist noch ungewiss. Bei einem Treffen mit Ungarns Regenten Miklós Horthy wurde die Angelegenheit besprochen, und Horthy schien nicht bereit zu sein, eine entscheidende Rolle in den Plänen zu übernehmen. Er äußerte jedoch den Wunsch, Karpatenruthenien zu erwerben, was in unseren Plänen jedoch keine bedeutende Rolle spielt."
 hungary_flavor_ger.14.d_slovakia:0 "Wir haben Pläne zur Teilung der Tschechoslowakei ausgearbeitet, doch die Position Ungarns in dieser Angelegenheit ist noch immer ungewiss. Bei einem Treffen mit dem ungarischen Regenten Miklós Horthy wurde die Angelegenheit besprochen, und Horthy stimmte zu, Ungarn in dieser Angelegenheit zum Aggressor zu machen, wenn wir ihnen die gesamte Slowakei überließen."
 hungary_flavor_ger.14.a:0 "Wir können diesen Anfragen zustimmen."
 hungary_flavor_ger.14.b:0 "Wir können keine Versprechungen machen."
 hungary_flavor_ger.14.c:0 "Dann werden wir die Tschechoslowakei nach unseren eigenen Vorstellungen aufteilen."
 
 hungary_flavor_ger.16.t:0 "Die ungarische SS"
 hungary_flavor_ger.16.d:0 "Wir haben mit der ungarischen Regierung die Bildung zweier ungarischer SS-Divisionen vereinbart, für die sie den Großteil der Arbeitskräfte stellen wird. Im Gegenzug werden wir ihre Panzerproduktion subventionieren und einige unserer schweren Panzerentwürfe mit ihr teilen."
 hungary_flavor_ger.16.a:0 "Eine willkommene Ergänzung unserer Armee."
 
 hungary_flavor_ger.17.t:0 "Zugang nach Polen über Ungarn"
 hungary_flavor_ger.17.d:0 "Unser Krieg gegen Polen muss so schnell wie möglich beginnen, um die kämpfenden Divisionen freizumachen. Der Militärstab hat vorgeschlagen, eine weitere Front entlang der ungarisch-polnischen Grenze zu eröffnen. Die ungarische Regierung müsste dem allerdings zustimmen."
 hungary_flavor_ger.17.a:0 "Wir werden von ihnen militärischen Zugang anfordern."
 hungary_flavor_ger.17.b:0 "Wir brauchen keine weitere Front."
 
 hungary_flavor_ger.18.t:0 "Zugang über Ungarn gewährt"
 hungary_flavor_ger.18.d:0 "Die Ungarn stimmten zu. Wir haben nun militärischen Zugang durch ihr Gebiet und können Polen von Süden her angreifen!"
 hungary_flavor_ger.18.a:0 "Prächtig!"
 
 hungary_flavor_ger.19.t:0 "Zugang über Ungarn nicht gestattet"
 hungary_flavor_ger.19.d:0 "Ungarn hat unseren Vorschlag abgelehnt. Sie werden unseren Truppen nicht erlauben, durch ihr Land zu ziehen und von dort aus Polen anzugreifen."
 hungary_flavor_ger.19.a:0 "Diese verdammten Idioten sollten es besser wissen, als sich uns zu widersetzen!"
 
 hungary_flavor_ger.20.t:0 "Wilhelm von Hohenzollern soll den ungarischen Thron besteigen"
 hungary_flavor_ger.20.d:0 "Der alte Regent Ungarns sucht einen Nachfolger für sein Amt. Der Kronprinz des ehemaligen Deutschen Reiches, Wilhelm von Hohenzollern, wird als Kandidat gehandelt. Wir könnten ihn davon abhalten, die Anfrage anzunehmen, aber ein Deutscher an der Macht in Ungarn könnte sich später als vorteilhaft erweisen."
 hungary_flavor_ger.20.a:0 "Wir nehmen den Vorschlag an."
 hungary_flavor_ger.20.b:0 "Dies widerspricht unseren Interessen."
 
 hungary_flavor_ger.21.t:0 "Ungarn bietet rekrutierbare Arbeitskräfte für das Burgenland"
 hungary_flavor_ger.21.d:0 "Heute ist ein interessanter Vorschlag aus Ungarn eingetroffen. Sie möchten unsere Armee mit eigenen Soldaten unterstützen, im Gegenzug müssten wir ihnen das Burgenland überlassen. Das Burgenland ist historisch ungarisch, obwohl die meisten Einwohner Österreicher sind. Da unser Krieg nicht so reibungslos verläuft wie erwartet, könnten wir die zusätzlichen Truppen gut gebrauchen. Was sollen wir ihnen sagen?"
 hungary_flavor_ger.21.a:0 "Sie können diesen kleinen Landstreifen haben. Wir brauchen ihre Männer."
 hungary_flavor_ger.21.b:0 "[Root.GetName] ist nicht auf fremde Hilfe angewiesen!"
 
 hungary_flavor_ger.22.t:0 "Der Putsch des Kaisers"
 hungary_flavor_ger.22.d:0 "Aufstand! Die loyalen Kräfte des neu ernannten Kaisers Wilhelm III. von Hohenzollern haben sich offen gegen die Regierung erhoben. Dieser Aufstand muss sofort niedergeschlagen werden, sonst könnten wir den Krieg und das Land verlieren."
 hungary_flavor_ger.22.a:0 "Das Land wird diesem Aufstand standhaft entgegentreten."
 
 hungary_flavor_ger.23.t:0 "Der Putsch des Kaisers gelingt"
 hungary_flavor_ger.23.d:0 "Wir haben gewonnen! Die Streitkräfte der letzten Regierung wurden besiegt und Wilhelm hat seinen rechtmäßigen Platz als Kaiser von Deutschland eingenommen."
 hungary_flavor_ger.23.a:0 "Es lebe das neue Deutsche Reich!"
 
 hungary_flavor_ger.24.t:0 "Der Putsch des Kaisers scheitert"
 hungary_flavor_ger.24.d:0 "Die Rebellen sind besiegt. Der Kaiser ist gefangen und seine Truppen haben die Waffen niedergelegt. Endlich kann die Ordnung wiederhergestellt werden."
 hungary_flavor_ger.24.a:0 "Sie hatten nie eine Chance."
 
 hungary_flavor_ger.25.t:0 "Ungarn schlägt polnischer Achsenmitgliedschaft vor"
 hungary_flavor_ger.25.d:0 "Unsere ungarischen Verbündeten drängen in letzter Zeit auf einen ungewöhnlichen diplomatischen Schachzug. Sie möchten, dass wir Polen in die Achsenmächte einladen. Ungarn und Polen sind bekanntlich Freunde, und Polen hat kürzlich eine Regierung gebildet, die unserer näher steht. Eine solche Einladung könnte jedoch bedeuten, dass wir auf unsere bestehenden Gebietsansprüche verzichten müssen."
 hungary_flavor_ger.25.a:0 "Gute Idee. Erweitern Sie die Einladung."
 hungary_flavor_ger.25.b:0 "Die Polen sind nicht unsere Freunde."
 
 hungary_flavor_ger.26.t:0 "Polen lehnt Einladung ab"
 hungary_flavor_ger.26.d:0 "Wir haben unsere Diplomaten mit der Einladung nach Warschau geschickt, aber wir erwarteten, dass es sich nur um einen symbolischen Besuch handelte und dass Polen die Chance ergreifen würde, ein Bündnis einzugehen, das es andernfalls bedrohen würde. Stattdessen lehnten sie das Bündnis mit der Begründung ab, ihre Interessen stünden im Widerspruch zu denen der Achsenmächte. Das verheißt nichts Gutes für sie."
 hungary_flavor_ger.26.a:0 "Also müssen wir sie doch besiegen."
 
 hungary_flavor_ger.27.t:0 "Polen tritt Danzig und Posen ab"
 hungary_flavor_ger.27.d:0 "Unsere neuen Verbündeten, die Polen, haben auf unsere bescheidenen Bitten gut reagiert. Sie stimmten zu, dass sich unsere Interessen nun, da wir Freunde sind, nicht mehr überschneiden sollten. Wir haben nun die volle Kontrolle über Danzig und Posen."
 hungary_flavor_ger.27.a:0 "Sie haben bewiesen, dass sie uns treu sind."
 
 hungary_flavor_ger.28.t:0 "Polen weigert sich, Danzig und Posen abzutreten"
 hungary_flavor_ger.28.d:0 "Die Polen haben unsere Bitte, uns die Kontrolle über Danzig und Posen zu überlassen, eklatant abgelehnt. Sie scheinen nicht zu verstehen, dass ein Bündnis auf gegenseitigem Vertrauen und nicht auf Interessenkonflikten beruht."
 hungary_flavor_ger.28.a:0 "War diese Allianz ein Fehler?"
 
 hungary_flavor_ger.29.t:0 "Unterstützung aus Österreich-Ungarn"
 hungary_flavor_ger.29.d:0 "Österreich-Ungarn hat uns beim Sturz des Nazi-Regimes geholfen und uns seine anhaltende Unterstützung zugesichert. Mit Österreich-Ungarn an unserer Seite werden wir die deutsche Heimat mit Sicherheit in kürzester Zeit zurückerobern."
 hungary_flavor_ger.29.a:0 "Wir freuen uns über die Unterstützung."
 
 hungary_flavor_ger.30.t:0 "Ungarischer Staatsbesuch"
 hungary_flavor_ger.30.d:0 "Ungarns Staatschef Ferenc Szálasi hat um ein Treffen mit dem Führer gebeten. Dieses Treffen fand in Berlin statt und verlief recht erfreulich. Szálasi sagte seine volle Unterstützung für unsere Bemühungen zu und versprach, Ungarn den deutschen Bedürfnissen unterzuordnen."
 hungary_flavor_ger.30.a:0 "Ihr Gehorsam ist höchst willkommen."
 
 hungary_flavor_ger.31.t:0 "Ungarischer Staatsbesuch"
 hungary_flavor_ger.31.d:0 "Ungarns Staatschef Ferenc Szálasi hat um ein Treffen mit dem Führer gebeten. Dieses Treffen fand in Berlin statt und das Thema war ziemlich kontrovers. Szálasi forderte, dass der ungarischen Armee eine wichtigere Rolle bei unseren Frontoperationen zukommt und dass die Zusammenarbeit zwischen unseren Militärkommandos verbessert wird."
 hungary_flavor_ger.31.a:0 "Sicher. Die militärische Zusammenarbeit kommt uns beiden zugute."
 hungary_flavor_ger.31.b:0 "Diese Ungarn wissen nichts über die Führung eines Militärs."
 
 hungary_flavor_ger.32.t:0 "Ungarischer Staatsbesuch"
 hungary_flavor_ger.32.d:0 "Ungarns Staatschef Ferenc Szálasi hat um ein Treffen mit dem Führer gebeten. Dieses Treffen wurde in Berlin arrangiert, wobei sich die Hauptgesprächsthemen um ideologische Unterschiede drehten. Szálasi versuchte, die Ähnlichkeiten zwischen Hungarismus und Nationalsozialismus hervorzuheben, mit mehr oder weniger Erfolg. Der Führer ist sich über seine Argumente noch nicht im Klaren, doch seine Wahl wird darüber entscheiden, ob die beiden Länder ihre ideologischen Unterschiede überwinden können."
 hungary_flavor_ger.32.a:0 "Sie sagen, Ungarnismus?"
 hungary_flavor_ger.32.b:0 "Wir sind uns überhaupt nicht ähnlich."
 
 hungary_flavor_ger.33.t:0 "Operation Margaretha"
 hungary_flavor_ger.33.d:0 "Der absurde Austrittsversuch Ungarns wird mit angemessenen Mitteln beantwortet. Unsere Truppen haben Kontakt zur ungarischen Szálasi-Regierung aufgenommen, die in Ungarn rasch die Macht übernimmt. Die verbleibenden Überläufer und Abtrünnigen werden gejagt und vor Gericht gestellt."
 hungary_flavor_ger.33.a:0 "Ungarn wird bald wieder unter unserer Kontrolle sein."
 
 hungary_flavor_cze.1.t:0 "Ungarn fordert die Slowakei"
 hungary_flavor_cze.1.d:0 "Die revisionistische Regierung Ungarns hat beschlossen, sämtliches ehemaliges ungarisches Land für sich zu beanspruchen. Die Slowakei, eine ehemalige Provinz des Königreichs Ungarn, befindet sich in unserem Besitz. Daher fordert sie die sofortige Übertragung des Besitzes. Eine Weigerung könnte Aggression und möglicherweise Krieg provozieren."
 hungary_flavor_cze.1.a:0 "Geben Sie das Gebiet ab."
 hungary_flavor_cze.1.b:0 "Verweigern."
 
 hungary_flavor_cze.2.t:0 "Imperialistischer Putsch"
 hungary_flavor_cze.2.d:0 "Eine kleine Gruppe von Anhängern der österreichisch-ungarischen Monarchie stürmte Prag und übernahm die Kontrolle über die Regierung. Die militärische Führung des Landes wurde entweder bestochen oder war einfach schockiert und untätig, da der Putsch auf wenig Widerstand stieß. Die Imperialisten hatten zweifellos ausländische Unterstützung, und der Hauptverdächtige ist das benachbarte österreichisch-ungarische Reich. Wer hätte das gedacht?"
 hungary_flavor_cze.2.a:0 "Es lebe die Habsburger ... denke ich."
 
 hungary_flavor_cze.3.t:0 "Fusion mit Österreich-Ungarn"
 hungary_flavor_cze.3.d:0 "Nach der Wiedererstarkung Österreich-Ungarns wollen sie nun ihr altes Territorium zurückgewinnen. Unser Land war vollständig Teil des Kaiserreichs, und wie erwartet luden sie uns ein, uns wieder anzuschließen. Wir würden den Schutz eines viel größeren Landes genießen, wären aber erneut Untertanen anderer Nationen."
 hungary_flavor_cze.3.a:0 "Wir brauchen ihren Schutz."
 hungary_flavor_cze.3.a:0 "Was für ein absurder Vorschlag."
 
 hungary_flavor_cze.4.t:0 "Allianz Österreich-Ungarn"
 hungary_flavor_cze.4.d:0 "Wir haben den lang ersehnten Vertrag mit Österreich-Ungarn unterzeichnet und sind nun Teil ihrer Fraktion."
 hungary_flavor_cze.4.a:0 "Exzellent."
 
 hungary_flavor_cze.5.t:0 "Wiedererweckung der Kleinen Entente"
 hungary_flavor_cze.5.d:0 "Österreich-Ungarn ist wieder aufgetaucht und mit ihm die Bedrohung durch eine Unterwerfung. Obwohl sich unsere Beziehungen zu den anderen Mitgliedern der Kleinen Entente etwas verschlechtert haben, dürfen wir den Grund für unseren Zusammenschluss nicht vergessen. Die Wiedereinsetzung der Habsburger muss um jeden Preis verhindert werden. Deshalb sollten wir unsere Beziehungen zu Rumänien und Jugoslawien stärken, um uns zu verteidigen."
 hungary_flavor_cze.5.d_2:0 "Ungarn hat Anspruch auf alle verlorenen Gebiete erhoben, darunter auch auf den größten Teil unseres Landes. Obwohl sich unsere Beziehungen zu den anderen Mitgliedern der Kleinen Entente etwas verschlechtert haben, dürfen wir den Grund für unseren Zusammenschluss nicht vergessen. Die Expansion Ungarns muss um jeden Preis begrenzt werden. Deshalb sollten wir unsere Beziehungen zu Rumänien und Jugoslawien stärken, um uns zu verteidigen."
 hungary_flavor_cze.5.a:0 "Schicken Sie Abgesandte nach Rumänien und Jugoslawien."
 hungary_flavor_cze.5.b:0 "Die Kleine Entente ist nur ein längst vergessener Traum. Wir können nichts tun."
 
 hungary_flavor_cze.6.t:0 "Schicksal der Kleinen Entente"
 hungary_flavor_cze.6.d_both:0 "Wir können beruhigt sein, denn die gesamte Kleine Entente liegt nun hinter uns. Sowohl Rumänien als auch Jugoslawien haben sich bereit erklärt, unser Bündnis zu stärken und diese neue Bedrohung so weit wie möglich zu isolieren."
 hungary_flavor_cze.6.d_rom:0 "Rumänien ist unserem Ruf gefolgt und hat beschlossen, uns im Kampf gegen die Bedrohungen zur Seite zu stehen. Jugoslawien kann von dieser Bedrohung verschlungen werden, aber es wäre besser gewesen, wenn auch sie auf die Vernunft gehört hätten."
 hungary_flavor_cze.6.d_yug:0 "Jugoslawien hat unseren Ruf erhört und beschlossen, uns im Kampf gegen die Bedrohungen zur Seite zu stehen. Vielleicht reicht dies aus, um das kriegshungrige Biest zwischen unseren Grenzen aufzuhalten, doch unsere Bemühungen könnten zu gering und zu spät sein."
 hungary_flavor_cze.6.d_neither:0 "Unsere Forderungen verhallten ungehört. Rumänien und Jugoslawien haben entschieden, dass unser Bündnis ihnen nicht ausreicht, um gegen die bevorstehenden Bedrohungen vorzugehen. Doch wenn wir es nicht schaffen, wer dann?"
 hungary_flavor_cze.6.a:0 "Gemeinsam werden wir dieser Bedrohung Einhalt gebieten!"
 hungary_flavor_cze.6.b:0 "Zumindest steht Rumänien an unserer Seite."
 hungary_flavor_cze.6.b:0 "Zumindest stehen unsere Brüder im Süden an unserer Seite."
 hungary_flavor_cze.6.b:0 "Dies ist eine große Enttäuschung für unsere Nation."
 
 hungary_flavor_cze.7.t:0 "Slowakisch-ungarischer Kleinkrieg"
 hungary_flavor_cze.7.d:0 "In diesen schwierigen Zeiten sah sich unser Land einer weiteren Gefahr ausgesetzt. Die Ungarn griffen uns von Osten her an und versuchten, ihr neu gewonnenes Territorium zu erweitern. Obwohl der Angriff uns überraschte, gelang es uns schließlich, sie fast bis zu ihrem Ausgangspunkt zurückzudrängen. Die Feindseligkeiten hörten auf, und auf beiden Seiten starben nur wenige Dutzend Menschen, während wir dabei nur sehr geringe Landverluste erlitten. Die Ungarn wurden gestoppt und unser Land verteidigt!"
 hungary_flavor_cze.7.a:0 "Wir haben die ungarische Aggression erfolgreich gestoppt."
 hungary_flavor_cze.7.b:0 "Wir werden dieses Land zurückerobern und noch mehr!"
 
 hungary_flavor_cze.8.t:0 "Ungarn fordert Referendum in der Südslowakei"
 hungary_flavor_cze.8.d:0 "Obwohl Ungarn nun eine demokratische Führung hat, scheint es, als hätten sie den Versuch, altes Territorium zurückzuerobern, nicht aufgegeben. Sie fordern, dass wir in der Südslowakei ein Referendum abhalten und die Bevölkerung entscheiden lassen, ob sie in der Tschechoslowakei bleiben oder sich Ungarn anschließen will. Das Ergebnis würde wahrscheinlich zu ihren Gunsten ausfallen, doch ein Verbot des Referendums würde uns in den Augen mancher undemokratisch erscheinen lassen."
 hungary_flavor_cze.8.a:0 "Erlauben Sie das Referendum."
 hungary_flavor_cze.8.b:0 "Die Südslowakei gehört uns und wird es immer bleiben."
 
 hungary_flavor_cze.9.t:0 "Ungarn erzwingt Referendum in der Südslowakei"
 hungary_flavor_cze.9.d:0 "Obwohl wir uns weigerten, das Referendum in der Südslowakei abzuhalten, nutzte Ungarn seinen Einfluss in [Root.GetFactionName] und zwang uns zum Handeln. Dieser Skandal wird so schnell nicht vergessen werden. Vorerst müssen wir unseren Stolz herunterschlucken und den Wünschen unserer Verbündeten nachgeben."
 hungary_flavor_cze.9.a:0 "Wir werden uns daran erinnern."
 
 hungary_flavor_rom.1.t:0 "Ungarn fordert Siebenbürgen"
 hungary_flavor_rom.1.d:0 "Die revisionistische Regierung Ungarns hat beschlossen, alle ehemaligen ungarischen Gebiete zu beanspruchen. Siebenbürgen, eine ehemalige Provinz des Königreichs Ungarn, befindet sich in unserem Besitz, daher fordert sie die sofortige Abtretung des gesamten Gebiets. Eine Weigerung könnte Aggression und möglicherweise Krieg provozieren. Einige schlagen jedoch vor, eine Gegenforderung zu stellen und zu erklären, dass wir ihr gesamtes Gebiet östlich der Theiß beanspruchen. Was werden wir auf ihre Forderungen antworten?"
 hungary_flavor_rom.1.a:0 "Geben Sie das Gebiet ab."
 hungary_flavor_rom.1.b:0 "Verweigern."
 hungary_flavor_rom.1.c:0 "Wir werden Gegenforderung stellen!"
 hungary_flavor_rom.1.e:0 "Sie können die nördlichen Teile haben."
 
 hungary_flavor_rom.2.t:0 "Österreich-Ungarn fordert die Bukowina"
 hungary_flavor_rom.2.d:0 "Die Bukowina – eine kleine Provinz in den nördlichen Karpaten – gehörte einst zu Österreich-Ungarn. Nun, da sie aus den Trümmern des Ersten Weltkriegs wieder auferstanden ist, fordert sie die Rückgabe. Die Provinz gehört rechtmäßig uns, aber ist es das wert, unser ganzes Land dafür zu riskieren?"
 hungary_flavor_rom.2.a:0 "Bukowina abtreten."
 hungary_flavor_rom.2.b:0 "Verweigern."
 
 hungary_flavor_rom.3.t:0 "[From.GetName] droht mit Krieg für Banat"
 hungary_flavor_rom.3.d:0 "Nachdem Ungarn uns zur Übergabe Siebenbürgens gezwungen hatte, hat es nun ein Auge auf das Banat geworfen. Diese Provinz ist überwiegend rumänisch geprägt, daher haben sie keinen gültigen Anspruch darauf. Sie drohen mit Krieg, falls wir uns weigern, uns aus der Provinz zurückzuziehen."
 hungary_flavor_rom.3.a:0 "Ziehen Sie die Truppen aus dem Banat ab."
 hungary_flavor_rom.3.b:0 "Wir werden es verteidigen, wenn es sein muss."
 
 hungary_flavor_rom.4.t:0 "[From.GetName] gibt nach"
 hungary_flavor_rom.4.d:0 "Unser Mut wurde belohnt. Die Feiglinge in Ungarn machten einen Rückzieher, anstatt ihr Versprechen einzuhalten und dem Banat den Krieg zu erklären."
 hungary_flavor_rom.4.a:0 "Es war, wie erwartet, eine leere Drohung."
 
 hungary_flavor_rom.5.t:0 "Wiedererweckung der Kleinen Entente"
 hungary_flavor_rom.5.d:0 "Mit der Wiederauferstehung Österreich-Ungarns könnte unsere territoriale Integrität in Gefahr geraten. Auch die Tschechoslowakei hat dies erkannt und zur Erneuerung der Kleinen Entente aufgerufen. Vielleicht haben wir gemeinsam eine Chance gegen das neue österreichisch-ungarische Reich."
 hungary_flavor_rom.5.d_2:0 "Ungarn hat kürzlich Ansprüche auf sein gesamtes altes Territorium geltend gemacht. Obwohl sein Bemühen lächerlich schwach erscheint, dürfen wir die Macht der Dummheit nicht unterschätzen. Die Tschechoslowakei hat eine Erneuerung der Kleinen Entente gefordert, um die neu entdeckten Ambitionen Ungarns einzudämmen."
 hungary_flavor_rom.5.a:0 "Wir werden uns gemeinsam gegen diese Unverschämtheit stellen."
 hungary_flavor_rom.5.b:0 "Sagen Sie ihnen, sie sollen uns aus ihrer kleinlichen Allianz herauslassen."
 hungary_flavor_rom.5.tt:0 "Rumänien wird sich der Tschechoslowakei in der Kleinen Entente anschließen."
 
 hungary_flavor_rom.6.t:0 "[From.GetName] lehnt Forderungen ab"
 hungary_flavor_rom.6.d:0 "Obwohl nicht völlig unerwartet, ist die Ablehnung unserer Forderungen dennoch ein Affront gegen unser Land. [From.GetName] weigerte sich, seine Besitztümer östlich der Theiß abzutreten, und nun steht es uns frei, ihm den Krieg zu erklären."
 hungary_flavor_rom.6.a:0 "Wir werden dieses Land mit dem Blut ihrer Soldaten reinwaschen."
 
 hungary_flavor_rom.7.t:0 "[From.GetName] ergibt"
 hungary_flavor_rom.7.d:0 "Viele bezweifelten, dass die Forderungen das Urteil der [From.GetAdjective]-Regierung beeinflussen würden, doch irgendwie gaben sie nach und zogen sich aus der Transtisza-Region zurück. Noch nie war es so einfach, Territorium zu gewinnen."
 hungary_flavor_rom.7.a:0 "Ruhm für Rumänien!"
 
 hungary_flavor_rom.8.t:0 "[HUN.GetName] erhebt bulgarischen Anspruch auf Dobrudscha"
 hungary_flavor_rom.8.d:0 "Seit [HUN.GetName] und Bulgarien ihr Bündnis unterzeichnet haben, beobachten unsere Regierungsvertreter ihr Vorgehen mit Sorge und befürchten den Tag, an dem sie versuchen könnten, unser Land in Stücke zu reißen. Dieser Tag ist nun gekommen, denn [HUN.GetName] hat Forderungen an Rumänien gestellt und uns aufgefordert, die Dobrudscha freiwillig an Bulgarien zu übergeben."
 hungary_flavor_rom.8.a:0 "Sie können die südliche Dobrudscha haben."
 hungary_flavor_rom.8.b:0 "Wir sollten lieber einen Rückzieher machen."
 hungary_flavor_rom.8.c:0 "Wir werden keinen Zentimeter nachgeben."
 
 hungary_flavor_rom.9.t:0 "Ungarn fordert Autonomie der Szekler"
 hungary_flavor_rom.9.d:0 "Die ungarische Szeklergemeinschaft in Siebenbürgen strebt seit der Übernahme des Landes nach dem Ersten Weltkrieg nach Selbstverwaltung. Ungarn sieht dieses Anliegen offenbar als sein eigenes an und bedrängt uns nun damit. Wenn wir ihren Bedingungen zustimmen, werden sie sich hoffentlich mit der Autonomie innerhalb Rumäniens zufrieden geben und nicht die vollständige Unabhängigkeit anstreben. Wir könnten natürlich auch Nein sagen."
 hungary_flavor_rom.9.a:0 "Sie können ihre Autonomie behalten, aber das Land gehört immer noch uns!"
 hungary_flavor_rom.9.b:0 "Was kommt als Nächstes? Ganz Siebenbürgen? Ich glaube nicht."
 
 hungary_flavor_rom.10.t:0 "Szekler wechseln die Seiten"
 hungary_flavor_rom.10.d:0 "Der Krieg gegen [HUN.GetNameDef] wäre schon ein Problem genug gewesen, doch die Szekler, denen wir vor kurzem Autonomie gewährt haben, protestierten gegen den Krieg, wechselten nun offen die Seiten und erklärten uns den Krieg! Es war ein Fehler, ihnen eine autonome Regierung anzuvertrauen. Ein Fehler, den wir nie wieder machen werden."
 hungary_flavor_rom.10.a:0 "Wir werden sie beide vernichten!"
 
 hungary_flavor_sov.1.t:0 "Ungarn strebt die Mitgliedschaft in der Komintern an"
 hungary_flavor_sov.1.d:0 "Als die kommunistische Revolution in Ungarn Fuß fasste, wandten sich ihre Führer an uns, um die internationale kommunistische Organisation zu unterstützen und von ihr unterstützt zu werden. Werden wir sie in unsere Reihen aufnehmen?"
 hungary_flavor_sov.1.a:0 "Natürlich."
 hungary_flavor_sov.1.b:0 "Sie sind nichts weiter als der Abschaum des Imperialismus."
 
 hungary_flavor_sov.2.t:0 "Ungarn will die Seiten wechseln"
 hungary_flavor_sov.2.d:0 "Wie eine Ratte, die Giftgeruch wittert, versucht Ungarn, seine deutschen Verbündeten im Stich zu lassen und sich an uns zu wenden. Die Niederlage steht kurz bevor, daher kommt dieser Austrittsversuch nicht ganz unerwartet. Wie reagieren wir?"
 hungary_flavor_sov.2.a:0 "Wir werden ihre Versuche unterstützen."
 hungary_flavor_sov.2.b:0 "Sie werden mit Gewalt befreit."
 hungary_flavor_sov.2.tt:0 "In Ungarn wird ein kommunistisches Regime versuchen, die Macht zu übernehmen, das sich uns im Krieg gegen Deutschland gerne anschließen wird.\n"
 
 hungary_flavor_sov.3.t:0 "Der Warschauer Pakt"
 hungary_flavor_sov.3.d:0 "Der vorgeschlagene Warschauer Pakt, ein gemeinsames Projekt Polens und Ungarns, würde das Bündnis der heutigen Komintern um Polen und möglicherweise auch andere kommunistische Länder Osteuropas erweitern. Wenn wir diesem Abkommen zustimmen, könnten wir unseren Einflussbereich weiter ausdehnen – oder wir könnten es ignorieren."
 hungary_flavor_sov.3.a:0 "Dies ist der nächste Schritt zur Weltrevolution."
 hungary_flavor_sov.3.b:0 "Die Komintern begrüßt diesen Vorschlag nicht."
 
 hungary_flavor_sov.4.t:0 "Polnischer kommunistischer Staat"
 hungary_flavor_sov.4.d:0 "Genosse [HUN.GetLeader], der ungarische Staatschef, ist persönlich zu einem Treffen mit [ROOT.GetLeader] gekommen, um eine wichtige Angelegenheit zu besprechen. Er wünscht sich die Wiedergeburt Polens als kommunistische Republik unter unserer Führung. Ungarn und Polen sind seit jeher gute Freunde, daher kommt dieser Vorschlag nicht ganz unerwartet, würde aber unseren Einfluss auf Polen etwas schwächen. Sollten wir seinem Wunsch nachkommen und den polnischen Arbeitern eine gewisse Autonomie gewähren?"
 hungary_flavor_sov.4.a:0 "Sie können ihre eigene kleine Scheinregierung haben."
 hungary_flavor_sov.4.b:0 "Über das Schicksal Polens werden wir noch nicht entscheiden."
 
 hungary_flavor_sov.5.t:0 "[HUN.GetName] bietet an, Rumänien zu teilen"
 hungary_flavor_sov.5.d:0 "Geheimagenten von [HUN.GetName] sind mit einem Vorschlag in Moskau eingetroffen. Sie wollen eine Teilung rumänischen Territoriums und wünschen sich, dass wir sie gleichzeitig mit [HUN.GetName] angreifen. Dies könnte uns helfen, Bessarabien in die Hände zu bekommen, würde aber auch bedeuten, dass [HUN.GetName] seinen Einfluss in der Region deutlich ausweiten würde."
 hungary_flavor_sov.5.a:0 "Dieser Vorschlag entspricht unseren Bedürfnissen."
 hungary_flavor_sov.5.b:0 "[HUN.GetAdjective] Die Expansion liegt nicht in unserem Interesse."
 
 hungary_flavor_sov.6.t:0 "[HUN.GetName] greift Rumänien an"
 hungary_flavor_sov.6.d:0 "Die [HUN.GetAdjective]-Armee hat ihren Angriff auf die Rumänen an mehreren Orten begonnen. Gemäß der Vereinbarung mit [From.GetName] wird von uns erwartet, dass wir Rumänien den Krieg erklären."
 hungary_flavor_sov.6.a:0 "Beginnen Sie den Angriff. Wir werden Rumänien von zwei Seiten zerschlagen."
 
 hungary_flavor_sov.7.t:0 "Einhaltung der Partitionsvereinbarung mit [HUN.GetNameDef]"
 hungary_flavor_sov.7.d:0 "Rumänien ist zerschlagen, und es ist Zeit, die Beute aufzuteilen. Uns gehört ein Teil des Landes, das [HUN.GetNameDef] versprochen wurde. Werden wir die Vereinbarung einhalten und es übergeben oder werden wir daran festhalten?"
 hungary_flavor_sov.7.a:0 "Selbstverständlich werden wir die Vereinbarung einhalten."
 hungary_flavor_sov.7.b:0 "Wenn wir es uns noch einmal überlegen, werden wir behalten, was wir haben."
 
 hungary_flavor_sov.8.t:0 "[HUN.GetName] missachtet die Teilungsvereinbarung"
 hungary_flavor_sov.8.d:0 "[HUN.GetAdjective] Truppen weigern sich, die Gebiete zu verlassen, die uns im Teilungsabkommen versprochen wurden. Auf diese Weise vergelten sie uns unsere Hilfe bei der Niederlage der Rumänen."
 hungary_flavor_sov.8.a:0 "Ich hätte wissen müssen, dass wir ihnen nicht vertrauen können!"
 
 hungary_flavor_eng.1.t:0 "Ungarn strebt die Mitgliedschaft in den Bündnisstaaten an"
 hungary_flavor_eng.1.d:0 "Ungarn, mit einer neu gewählten demokratischen Regierung an der Spitze, hat sich mit der Bitte an uns gewandt, sich den Alliierten anzuschließen. Dies könnte uns zwar leicht in einen Krieg gegen die umliegenden faschistischen Länder hineinziehen, doch könnte sich Ungarn als wertvoller Verbündeter und vielleicht sogar als diplomatisches Bindeglied zu den Nachbarländern erweisen."
 hungary_flavor_eng.1.a:0 "Akzeptieren."
 hungary_flavor_eng.1.b:0 "Abfall."
 
 hungary_flavor_eng.2.t:0 "Donaukonferenz unter Schiedsgerichtsbarkeit Ungarns"
 hungary_flavor_eng.2.d:0 "Wir haben kürzlich in Ungarn einen unerwarteten, aber willkommenen Verbündeten gefunden. Dort wurden die Vorbereitungen für eine Konferenz getroffen, zu der die Staats- und Regierungschefs der jeweiligen Länder eingeladen wurden, um über eine Verteidigungskoalition innerhalb der Grenzen der Alliierten zu beraten. Jeder Unterzeichner dieser Koalition wird Teil unseres Bündnisses."
 hungary_flavor_eng.2.a:0 "Hoffen wir das Beste."
 
 hungary_flavor_eng.3.t:0 "Ungarn will die Seiten wechseln"
 hungary_flavor_eng.3.d:0 "Wie eine Ratte, die Giftgeruch wittert, versucht Ungarn, seine deutschen Verbündeten im Stich zu lassen und sich an uns zu wenden. Die Niederlage steht kurz bevor, daher kommt dieser Austrittsversuch nicht ganz unerwartet. Wie reagieren wir?"
 hungary_flavor_eng.3.a:0 "Wir werden ihre Versuche unterstützen."
 hungary_flavor_eng.3.b:0 "Sie werden mit Gewalt befreit."
 hungary_flavor_eng.3.tt:0 "In Ungarn wird ein demokratisches Regime versuchen, die Macht zu übernehmen, das sich uns gerne im Krieg gegen Deutschland anschließen wird.\n"
 
 hungary_flavor_eng.4.t:0 "[From.GetName] bittet um Frieden"
 hungary_flavor_eng.4.d:0 "Wir haben die Aktionen von [From.GetName] so sehr verurteilt, dass wir sogar zu den Waffen gegriffen haben, um sie zu stoppen. Nun haben sie ihr Ziel erreicht und wollen einen Friedensvertrag aushandeln. Sie würden das gesamte Land behalten, das ihnen im Vertrag von Trianon abgenommen wurde, und die Feindseligkeiten würden eingestellt. Was ist unsere Antwort?"
 hungary_flavor_eng.4.a:0 "Na gut. Wir haben andere Sorgen."
 hungary_flavor_eng.4.b:0 "Wir werden ihnen das nicht durchgehen lassen."
 
 hungary_flavor_eng.5.t:0 "[From.GetName] bietet ihre Hilfe gegen Rumänien an"
 hungary_flavor_eng.5.d:0 "Nach der Kriegserklärung Rumäniens haben [From.GetAdjective]-Diplomaten einen Vorschlag an uns gerichtet. [From.GetName] ist bereit, Rumänien den Krieg zu erklären, wenn wir versprechen, dass sie am Ende des Krieges Siebenbürgen zurückerhalten. Ein aktiver Verbündeter in der Region, der Rumänien beschäftigt, könnte sicherlich von Vorteil sein, würde aber [From.GetAdjective]-Revisionismus bedeuten."
 hungary_flavor_eng.5.a:0 "Wir können jede Hilfe gebrauchen, die wir bekommen können."
 hungary_flavor_eng.5.b:0 "Wir machen keine Pakte mit dem Teufel."
 
 yugoslavia.5.c:0 "Bitten Sie unsere Verbündeten um Hilfe."
 
 hungary_flavor_yug.1.t:0 "Ewige Freundschaft mit [From.GetName]"
 hungary_flavor_yug.1.d:0 "[From.GetName] erhebt zwar weiterhin Gebietsansprüche auf seine ehemaligen Ländereien in unserem Besitz, hat aber begonnen, Diplomaten und Botschafter zu entsenden, um die Beziehungen zwischen unseren Ländern zu regeln. Sie schlagen ein Abkommen der „Ewigen Freundschaft“ vor, das unsere Länder zwar nicht zu irgendetwas verpflichten würde, aber die feindseligen Beziehungen zwischen den beiden Nationen endgültig beenden würde. Dieses Abkommen könnte, sofern wir ihm zustimmen, zu weiteren Beziehungen mit [From.GetName] führen."
 hungary_flavor_yug.1.a:0 "Es ist Freundschaft."
 hungary_flavor_yug.1.b:0 "Niemals."
 
 hungary_flavor_yug.2.t:0 "Territoriale Verhandlungen mit [From.GetName]"
 hungary_flavor_yug.2.d:0 "Nachdem wir uns für eine Zusammenarbeit mit [From.GetName] entschieden haben, haben sie im Vertrag der ewigen Freundschaft eine Beilegung territorialer Streitigkeiten vorgeschlagen. Die Provinz Novi Sad ist größtenteils von Ungarn bewohnt, und sie wollen, dass wir sie ihnen im Gegenzug für zukünftige Gefälligkeiten überlassen. Davon könnten wir profitieren, da uns ein starker Verbündeter in einem möglichen Konflikt in naher Zukunft helfen könnte."
 hungary_flavor_yug.2.a:0 "Wir werden es als Zeichen der Freundschaft abtreten."
 hungary_flavor_yug.2.b:0 "Diese Grenze dürfen wir nicht überschreiten."
 
 hungary_flavor_yug.3.t:0 "Allianz mit [From.GetName]"
 hungary_flavor_yug.3.d:0 "Der Vertrag über ewige Freundschaft zwischen [From.GetName] und Jugoslawien ist zwar ein Beweis für gute Beziehungen, aber nichts weiter als ein leeres Abkommen. Um unsere Beziehungen weiter zu stärken, hat [From.GetName] ein richtiges Bündnis vorgeschlagen und uns in seine Fraktion eingeladen."
 hungary_flavor_yug.3.a:0 "Eine engere Zusammenarbeit liegt in unserem beiderseitigen Interesse."
 hungary_flavor_yug.3.b:0 "Wir werden Abstand halten."
 
 hungary_flavor_yug.4.t:0 "Wiedererweckung der Kleinen Entente"
 hungary_flavor_yug.4.d:0 "Mit der Wiederauferstehung Österreich-Ungarns könnte unsere territoriale Integrität in Gefahr geraten. Auch die Tschechoslowakei hat dies erkannt und zur Erneuerung der Kleinen Entente aufgerufen. Vielleicht haben wir gemeinsam eine Chance gegen das neue österreichisch-ungarische Reich."
 hungary_flavor_yug.4.d_2:0 "Ungarn hat kürzlich Ansprüche auf sein gesamtes altes Territorium geltend gemacht. Obwohl sein Bemühen lächerlich schwach erscheint, dürfen wir die Macht der Dummheit nicht unterschätzen. Die Tschechoslowakei hat eine Erneuerung der Kleinen Entente gefordert, um die neu entdeckten Ambitionen Ungarns einzudämmen."
 hungary_flavor_yug.4.a:0 "Wir werden uns gemeinsam gegen diese Unverschämtheit stellen."
 hungary_flavor_yug.4.b:0 "Sagen Sie ihnen, sie sollen uns aus ihrer kleinlichen Allianz herauslassen."
 hungary_flavor_yug.4.tt:0 "Jugoslawien wird sich der Tschechoslowakei in der Kleinen Entente anschließen."
 
 hungary_flavor_yug.5.t:0 "Die Visegrád-Gruppe"
 hungary_flavor_yug.5.d:0 "Ungarn hat kürzlich begonnen, eine eigene Fraktion unter den Großmächten Europas zu gründen, die sogenannte Visegrád-Gruppe. Sie hat noch nicht viele Mitglieder, und Ungarn möchte uns als eines der ersten Länder einladen. Ein regionales Bündnis könnte uns zwar nützen, reicht aber möglicherweise nicht aus, um uns gegen unsere faschistischen Nachbarn zu verteidigen. Was sollen wir den Ungarn sagen?"
 hungary_flavor_yug.5.a:0 "Klingt nach einem Deal."
 hungary_flavor_yug.5.b:0 "Daran werden wir nicht teilnehmen."
 
 hungary_flavor_yug.6.t:0 "Ungarn will Grenzstreit regeln"
 hungary_flavor_yug.6.d:0 "Unsere Beziehungen zu Ungarn werden seit einiger Zeit von den Grenzstreitigkeiten zwischen unseren Ländern überschattet. Nun wollen sie diese Fragen endgültig klären und haben ein Treffen einberufen, bei dem sie über den Kauf einiger umstrittener Gebiete diskutieren wollen. Die Hauptsorgen gelten der Batschka und dem Übermurgebiet, da diese Staaten einen hohen Anteil ungarischer Bevölkerung haben. Wie werden wir das bevorstehende Treffen angehen?"
 hungary_flavor_yug.6.a:0 "Sie haben einen Deal."
 hungary_flavor_yug.6.b:0 "Wir können einige Zugeständnisse machen."
 hungary_flavor_yug.6.c:0 "Die Grenzen stehen nicht zur Debatte."
 
 hungary_flavor_yug.7.t:0 "Jugoslawien gegen Deutschland unterstützen"
 hungary_flavor_yug.7.d:0 "Unser Verbündeter Österreich ist von einer deutschen Besatzung bedroht. Österreich fordert die Übergabe Sloweniens, da es jahrhundertelang unter österreichischer Verwaltung stand, und möchte es an das Deutsche Reich zurückgeben. Unsere jugoslawischen Verbündeten haben uns um Hilfe bei der Verteidigung gegen die drohende deutsche Invasion gebeten."
 hungary_flavor_yug.7.a:0 "Wir stehen an der Seite unserer Verbündeten."
 hungary_flavor_yug.7.b:0 "Leider können wir ihnen nicht helfen."
 
 hungary_flavor_yug.8.t:0 "[From.GetName] schützt uns"
 hungary_flavor_yug.8.d:0 "Unsere Verbündeten stehen uns bei! Wir werden der deutschen Invasion nicht allein gegenüberstehen. Slowenien gehört uns und wird es immer bleiben!"
 hungary_flavor_yug.8.a:0 "Wir müssen uns weiterhin auf unsere Verteidigung vorbereiten."
 
 hungary_flavor_yug.9.t:0 "[From.GetName] verlässt uns"
 hungary_flavor_yug.9.d:0 "Unsere Fraktion hat das Bündnis, das wir geschlossen hatten, gebrochen. Wir haben jedoch keine Zeit, uns mit dieser unehrenhaften Tat zu befassen, da wir entscheiden müssen, wie wir mit den deutschen Forderungen umgehen. Werden wir uns ihrem Willen beugen und Slowenien übergeben, oder werden wir versuchen, uns zu wehren und hoffen, dass wir durchhalten können, bis Deutschland an die umliegenden Großmächte fällt?"
 hungary_flavor_yug.9.a:0 "Wir haben keine andere Wahl, als uns zu unterwerfen."
 hungary_flavor_yug.9.b:0 "Wir werden standhalten und kämpfen, auch wenn wir allein sind!"
 
 hungary_flavor_yug.10.t:0 "Ungarische Forderungen"
 hungary_flavor_yug.10.d:0 "In den letzten Jahren hat unser nördlicher Nachbar massiv an militärischer und politischer Macht gewonnen. Diese Macht will er nun nutzen, um die Regionalmächte auf dem Balkan zu zwingen, die Grenzen unseres Landes neu zu ziehen. Dies würde zweifellos den Verlust eines Großteils, wenn nicht sogar unseres gesamten Landes zur Folge haben. Sollten wir uns jedoch ihrem Diktat widersetzen, könnte der Verlust an Menschenleben noch größer sein."
 hungary_flavor_yug.10.a:0 "Wir müssen uns unterwerfen und auf einen friedlichen Ausgang hoffen."
 hungary_flavor_yug.10.b:0 "Wir werden niemals nachgeben!"
 
 hungary_flavor_tur.1.t:0 "Allianz mit [From.GetName]"
 hungary_flavor_tur.1.d:0 "[From.GetName] schmiedet eine neue Allianz, um die Fehler der Friedensverträge des Ersten Weltkriegs zu korrigieren. Da wir damals Verbündete waren, könnte es sich als vorteilhaft erweisen, sich ihnen anzuschließen, da wir möglicherweise auch Land zurückgewinnen könnten."
 hungary_flavor_tur.1.a:0 "Zum Sieg mit [From.GetName]!"
 hungary_flavor_tur.1.b:0 "Wir werden nicht wieder auf der Verliererseite stehen."
 
 hungary_flavor_tur.2.t:0 "Truppenaustausch mit [From.GetName]"
 hungary_flavor_tur.2.d:0 "[From.GetName], unser neuer Verbündeter, hat vorgeschlagen, die Freundschaft zwischen unseren Ländern durch einen Truppenaustausch zu stärken. Wir würden eine kleine Anzahl ihrer Soldaten erhalten und ihnen im Gegenzug einige unserer eigenen schicken. Werden wir ihrem Vorschlag zustimmen oder ist es zu riskant, das Leben unserer Männer für die Freundschaft von [From.GetName] zu riskieren?"
 hungary_flavor_tur.2.a:0 "Ihre Brigaden werden eine willkommene Ergänzung unserer Armee sein."
 hungary_flavor_tur.2.b:0 "Wir können das Leben türkischer Bürger nicht für ihre Sache riskieren."
 hungary_flavor_tur.2.tt:0 "Wir erhalten 2 Infanteriedivisionen von [From.GetName].n"
 
 hungary_flavor_tur.3.t:0 "[From.GetName] unterstützt unsere alten Behauptungen"
 hungary_flavor_tur.3.d:0 "Obwohl die Tage des Osmanischen Reiches nach dem Ersten Weltkrieg gezählt schienen, scheinen unsere neuen Verbündeten entschlossen, die alte europäische Ordnung wiederherzustellen. [From.GetName] unterstützt offiziell unsere Ansprüche auf einige Mittelmeerinseln und Syrien. Dies wird unserer zukünftigen Expansion in diese Richtung sicherlich mehr Legitimität verleihen."
 hungary_flavor_tur.3.a:0 "Das macht uns mit Sicherheit stärker."
 
 hungary_flavor_alb.1.t:0 "[From.GetAdjective] Großzügigkeit"
 hungary_flavor_alb.1.d:0 "Im Zuge der jüngsten Verhandlungen zur Teilung Jugoslawiens haben wir Montenegro von [From.GetName] erhalten. Vielleicht sollten wir eine engere Zusammenarbeit mit ihnen in Betracht ziehen, um in Zukunft von solchen Vorteilen zu profitieren. Wir könnten eine Anfrage senden, um ihrer Fraktion beizutreten und sie bei ihren zukünftigen Bemühungen zu unterstützen."
 hungary_flavor_alb.1.a:0 "Ihre Sache ist gerecht, wir werden uns ihnen anschließen."
 hungary_flavor_alb.1.b:0 "Akzeptieren Sie das Land stillschweigend, aber schließen Sie sich ihm nicht an."
 
 hungary_flavor_fin.1.t:0 "[From.GetAdjective] Allianz"
 hungary_flavor_fin.1.d:0 "Diplomaten aus [From.GetName] haben sich mit einem Bündnisangebot an uns gewandt. Wir könnten ihre Hilfe im Kampf gegen die Sowjets sicherlich gebrauchen, aber ihre Streitkräfte reichen möglicherweise nicht aus, um sie aufzuhalten."
 hungary_flavor_fin.1.a:0 "Wir brauchen ihre Hilfe."
 hungary_flavor_fin.1.b:0 "Wir können uns gut behaupten."
 
 hungary_flavor_gre.1.t:0 "[From.GetAdjective] Allianz"
 hungary_flavor_gre.1.d:0 "Heute ist etwas höchst Seltsames passiert: Diplomaten haben uns ein Bündnisangebot unterbreitet. Sie wünschen sich sicherlich unsere Hilfe gegen die Türken, die sie aus historischen Gründen hassen. Egal aus welchem Grund, wir müssen ihnen eine Antwort geben."
 hungary_flavor_gre.1.a:0 "Akzeptieren."
 hungary_flavor_gre.1.b:0 "Abfall."
 
 hungary_flavor_gre.2.t:0 "[From.GetName] unterstützt unsere alten Behauptungen"
 hungary_flavor_gre.2.d:0 "Unser Verdacht war berechtigt. [From.GetName] unterstützt nun unsere Gebietsansprüche gegenüber der Türkei und behauptet, sie wolle die jahrhundertealte „Megali-Idee“ verwirklichen. Dies wird uns unweigerlich in einen offenen Konflikt mit der Türkei führen, aber wir können genauso gut kooperieren, wenn wir dadurch Gebietsgewinne erzielen."
 hungary_flavor_gre.2.a:0 "Das macht uns mit Sicherheit stärker."
 
 hungary_flavor_sze.1.t:0 "Krieg gegen [HUN.GetNameDef]?"
 hungary_flavor_sze.1.d:0 "Rumänien befindet sich im Krieg mit [HUN.GetNameDef] und hat uns mitgerissen. Obwohl wir unsere ungarischen Brüder offensichtlich nicht bekämpfen wollen, sind wir offiziell immer noch Teil Rumäniens. Einige schlagen vor, wir sollten stattdessen zu den Waffen greifen, während die Mehrheit nur passiven Widerstand leisten und nicht aktiv am Kampf teilnehmen will."
 hungary_flavor_sze.1.a:0 "Wir werden gemeinsam gegen die Rumänen kämpfen!"
 hungary_flavor_sze.1.b:0 "Legen Sie einen formellen Protest gegen die rumänische Entscheidung ein."
 hungary_flavor_sze.1.c:0 "Wir unterwerfen uns der Autorität Rumäniens."
 
 hungary_flavor_fra.1.t:0 "[HUN.GetNameDef] kauft die SMS Novara"
 hungary_flavor_fra.1.d:0 "Das alte österreichisch-ungarische Schiff, die SMS Novara (die wir passenderweise in Thionville umbenannt haben), steht seit unserem Triumph im Ersten Weltkrieg in unseren Diensten. Wir haben für das Schiff heute kaum noch Verwendung, da es derzeit als Kasernenschiff in Toulon dient. Da [HUN.GetName] an Küstenlinie gewonnen hat, möchte das Schiff seine Seemacht wiederherstellen und hat uns gebeten, die Novara zu kaufen."
 hungary_flavor_fra.1.a:0 "Überlassen Sie ihnen das alte Stück Schrott."
 
 hungary_flavor_fra.2.t:0 "[HUN.GetNameDef] bietet Allianz an"
 hungary_flavor_fra.2.d:0 "Die alten europäischen Imperien erleben ihre Renaissance, wie die Entstehung von [HUN.GetNameDef] und unsere monarchistische Restauration belegen. [HUN.GetLeader] hat uns seine Grüße übermittelt und schlägt eine Allianz unserer Länder vor. In den 1920er Jahren gab es tatsächlich Spekulationen über die vermeintlichen Vorteile der Wiederherstellung eines habsburgisch geführten mitteleuropäischen Blocks, und wir könnten diese Idee mit einem solchen Bündnis fördern. Wie sollen wir auf diese Bitte reagieren?"
 hungary_flavor_fra.2.a:0 "Akzeptieren."
 hungary_flavor_fra.2.b:0 "Abfall."
 
 hungary_flavor_cro.1.t:0 "Ungarn verzichtet auf seine Ansprüche uns gegenüber."
 hungary_flavor_cro.1.d:0 "Kroatien war lange Zeit ein Land, das von den ungarischen Königen regiert wurde. Mit dem Zerfall der österreichisch-ungarischen Monarchie haben wir uns jedoch von ihnen gelöst. Da wir nun nicht mehr Teil Jugoslawiens sind, hätten sie versuchen können, ihren Einfluss auf uns wieder auszuüben, doch stattdessen verzichteten sie auf ihre Ansprüche auf Kroatien."
 hungary_flavor_cro.1.a:0 "Das ist eine Erleichterung."
 
 hungary_flavor_partition.1.t:0 "Die Teilung Jugoslawiens"
 hungary_flavor_partition.1.d:0 "Die Konferenz zur Neuaufteilung Jugoslawiens hat begonnen, und der erste Punkt ist erledigt: Novi Sad und Prekmurje werden an [Root.GetName] zurückgegeben, da ihre Bevölkerung überwiegend ungarisch ist. Diese historischen Fragen wurden geklärt, und nun können wir uns kontroverseren Themen zuwenden."
 hungary_flavor_partition.1.a:0 "Lassen Sie uns sehen, was wir sonst noch tun können."
 
 hungary_flavor_partition.2.t:0 "Das Schicksal Slawoniens"
 hungary_flavor_partition.2.d:0 "Als nächstes steht das Binnenland Slawoniens auf der Liste. Niemand hat Ansprüche auf dieses Land erhoben, doch es war lange Zeit Teil des historischen Königreichs Ungarn. Wollen wir es unserem Land zurückgeben oder den Kroaten die Freiheit schenken?"
 hungary_flavor_partition.2.a:0 "Wir werden es zurückbekommen."
 hungary_flavor_partition.2.b:0 "Erstellen Sie eine kroatische Puppe."
 hungary_flavor_partition.2.c:0 "Befreit die Kroaten."
 
 hungary_flavor_partition.3.t:0 "Das Schicksal Kroatiens"
 hungary_flavor_partition.3.d:0 "Wir müssen über die Eigentumsverhältnisse der kroatischen Kerngebiete entscheiden. Historisch gehörten sie zu Ungarn, doch seit dem kroatisch-ungarischen Ausgleich von 1868 existierten sie als eigenständige Einheit, wenn auch innerhalb der Habsburgermonarchie. Was werden wir mit diesem Küstenabschnitt machen?"
 hungary_flavor_partition.3.a:0 "Annexieren Sie es, genau wie Slawonien."
 hungary_flavor_partition.3.b:0 "Geben Sie es Kroatien zurück."
 
 hungary_flavor_partition.4.t:0 "Das Schicksal von Pag"
 hungary_flavor_partition.4.d:0 "Pag ist die kleine Küstenregion Kroatiens, die Fiume und Zara verbindet. Italien hat Anspruch auf dieses Gebiet erhoben, aber wir haben das letzte Wort über das Schicksal des Landes."
 hungary_flavor_partition.4.a:0 "Annex it."
 hungary_flavor_partition.4.b:0 "Geben Sie es Kroatien zurück."
 hungary_flavor_partition.4.c:0 "Geben Sie es Italien."
 
 hungary_flavor_partition.6.t:0 "Das Schicksal Bosniens"
 hungary_flavor_partition.6.d:0 "Als nächstes steht Bosnien auf der Liste der Gebiete, mit denen wir uns befassen müssen. Die Region hat eine gemischte Bevölkerung aus Muslimen, Kroaten und Serben. Was werden wir damit machen?"
 hungary_flavor_partition.6.a:0 "Annex it."
 hungary_flavor_partition.6.b:0 "Geben Sie es Serbien."
 hungary_flavor_partition.6.c:0 "Geben Sie es Kroatien."
 hungary_flavor_partition.6.e:0 "Befreie Bosnien."
 
 hungary_flavor_partition.7.t:0 "Das Schicksal Dalmatiens"
 hungary_flavor_partition.7.d:0 "Die Küste Dalmatiens, dieser kleine Streifen Kroatiens, ist noch ungewiss. Wie an der restlichen Küste hat Italien seine Absicht bekundet, auch dieses Land zu beanspruchen. Was wird sein Schicksal sein?"
 hungary_flavor_partition.7.a:0 "Annex it."
 hungary_flavor_partition.7.b:0 "Geben Sie es Serbien."
 hungary_flavor_partition.7.c:0 "Geben Sie es Kroatien."
 hungary_flavor_partition.7.e:0 "Geben Sie es Italien."
 
 hungary_flavor_partition.5.t:0 "Das Schicksal Serbiens"
 hungary_flavor_partition.5.d:0 "Der Kern Jugoslawiens ist serbisch, und daher sollte sein Land bei der Entscheidung über die Aufteilung dieses künstlichen Staatenbundes Vorrang haben. Wir könnten ganz Serbien annektieren oder es als souveränen Staat freigeben. Über die Staaten Mazedonien und Montenegro wird später entschieden, da diese neben Serbien noch weitere Anspruchsberechtigte haben."
 hungary_flavor_partition.5.a:0 "Annex it."
 hungary_flavor_partition.5.b:0 "Schaffen Sie einen serbischen Marionettenstaat."
 hungary_flavor_partition.5.c:0 "Befreit Serbien."
 
 hungary_flavor_partition.8.t:0 "Das Schicksal von Torontal"
 hungary_flavor_partition.8.d:0 "Nachdem Serbien nun abgewickelt ist, sind die nördlich davon gelegenen Gebiete unbeansprucht. Torontal, die Region östlich der Theiß, grenzt an [Root.GetName], Rumänien und Serbien. Historisch gehörte dieses Stück Land dem Königreich Ungarn, doch die Rumänen beharren auf ihrem Anspruch auf jedes Stück Land östlich der Theiß (einschließlich ungarischen Territoriums)."
 hungary_flavor_partition.8.a:0 "Es gehört uns."
 hungary_flavor_partition.8.b:0 "Serbien kann es haben."
 hungary_flavor_partition.8.c:0 "Eigentlich sollte Rumänien es haben."
 
 hungary_flavor_partition.9.t:0 "Das Schicksal von Srem"
 hungary_flavor_partition.9.d:0 "Das andere Gebiet im Norden Serbiens, über das noch nicht entschieden ist, ist Syrmien. Die Bevölkerung ist überwiegend serbisch, es gibt aber auch kroatische und ungarische Minderheiten. Wie Torontal gehörte auch dieses Land früher zum Königreich Ungarn."
 hungary_flavor_partition.9.a:0 "Es gehört uns."
 hungary_flavor_partition.9.b:0 "Serbien kann es haben."
 hungary_flavor_partition.9.c:0 "Geben wir es Kroatien."
 
 hungary_flavor_partition.10.t:0 "Das Schicksal Mazedoniens"
 hungary_flavor_partition.10.d:0 "Mazedonien wurde im Ersten Balkankrieg von Serbien annektiert, obwohl Bulgarien Ansprüche darauf erhob. Nun liegt es an uns, zu entscheiden, wem diese Provinz gehört."
 hungary_flavor_partition.10.a:0 "[Root.GetName] natürlich."
 hungary_flavor_partition.10.b:0 "Es gehört zu Serbien."
 hungary_flavor_partition.10.c:0 "Geben Sie es Bulgarien."
 
 hungary_flavor_partition.11.t:0 "Das Schicksal von Tetovo"
 hungary_flavor_partition.11.d:0 "Tetovo ist ein schmaler Landstreifen zwischen Mazedonien und Albanien, dessen Bevölkerungsmehrheit von Albanern bewohnt wird. Was werden wir mit diesem winzigen Gebiet tun?"
 hungary_flavor_partition.11.a:0 "Annex it."
 hungary_flavor_partition.11.b:0 "Geben Sie es Albanien."
 hungary_flavor_partition.11.c:0 "Geben Sie es Italien."
 hungary_flavor_partition.11.e:0 "Geben Sie es Bulgarien."
 hungary_flavor_partition.11.f:0 "Geben Sie es Serbien."
 
 hungary_flavor_partition.12.t:0 "Das Schicksal von Prizren"
 hungary_flavor_partition.12.d:0 "Prizren gehörte ursprünglich zu Serbien, hat aber eine bedeutende albanische Bevölkerung. Was wird ihr Schicksal sein?"
 hungary_flavor_partition.12.a:0 "Annex it."
 hungary_flavor_partition.12.b:0 "Geben Sie es Albanien."
 hungary_flavor_partition.12.c:0 "Geben Sie es Italien."
 hungary_flavor_partition.12.e:0 "Geben Sie es Serbien."
 
 hungary_flavor_partition.13.t:0 "Das Schicksal Montenegros"
 hungary_flavor_partition.13.d:0 "Montenegro ist historisch gesehen serbisch, aber seine Bevölkerung ist sehr stolz und hat den Wunsch geäußert, sich selbst zu regieren. Wem soll das Land bei dieser Aufteilung zufallen?"
 hungary_flavor_partition.13.a:0 "Annex it."
 hungary_flavor_partition.13.b:0 "Es gehört zu Serbien."
 hungary_flavor_partition.13.c:0 "Geben Sie es Albanien."
 hungary_flavor_partition.13.e:0 "Gib es Italien"
 hungary_flavor_partition.13.f:0 "Befreie Montenegro" 
 
 hungary_flavor_partition.14.t:0 "Das Schicksal von Ulcinj"
 hungary_flavor_partition.14.d:0 "Ulcinj ist ein eher umstrittener Abschnitt der Adriaküste mit überwiegend albanischer Bevölkerung. Viele haben Anspruch darauf, und es liegt an uns, zu entscheiden, wem es gehört."
 hungary_flavor_partition.14.a:0 "Annex it."
 hungary_flavor_partition.14.b:0 "Geben Sie es Montenegro."
 hungary_flavor_partition.14.c:0 "Geben Sie es Albanien."
 hungary_flavor_partition.14.e:0 "Gib es Italien"
 hungary_flavor_partition.14.f:0 "Gib es Serbien" 
 
 hungary_flavor_partition.15.t:0 "Das Schicksal von Kotor"
 hungary_flavor_partition.15.d:0 "Kotor liegt zwischen Montenegro und Dalmatien. Die Bevölkerung besteht überwiegend aus Montenegrinen, aber auch einige Serben und Kroaten leben in der Gegend. Was sollen wir damit anfangen?"
 hungary_flavor_partition.15.a:0 "Annex it."
 hungary_flavor_partition.15.b:0 "Geben Sie es Montenegro."
 hungary_flavor_partition.15.c:0 "Geben Sie es Italien."
 hungary_flavor_partition.15.e:0 "Gib es Kroatien"
 hungary_flavor_partition.15.f:0 "Gib es Serbien"  
 
 hungary_flavor_partition.16.t:0 "Das Schicksal von Zara"
 hungary_flavor_partition.16.d:0 "Der Hafen von Zara fiel nach dem Ersten Weltkrieg an Italien. Seitdem wechselte er erneut den Besitzer, diesmal an Jugoslawien. Es liegt an uns, wer den Hafen nach der Teilung kontrollieren darf."
 hungary_flavor_partition.16.a:0 "Annex it."
 hungary_flavor_partition.16.b:0 "Geben Sie es Kroatien."
 hungary_flavor_partition.16.c:0 "Geben Sie es Serbien."
 hungary_flavor_partition.16.e:0 "Gib es Italien zurück"
 
 hungary_flavor_partition.17.t:0 "Das Schicksal von Fiume"
 hungary_flavor_partition.17.d:0 "Fiume war einst der wichtigste Adriahafen Ungarns, und Tausende Ungarn zogen dorthin. Nach unserer Niederlage im Ersten Weltkrieg wechselte der Hafen mehrmals den Besitzer, wurde aber schließlich Teil Jugoslawiens. Wir können nun über sein zukünftiges Schicksal entscheiden."
 hungary_flavor_partition.17.a:0 "Annex it."
 hungary_flavor_partition.17.b:0 "Geben Sie es Kroatien."
 hungary_flavor_partition.17.c:0 "Gib es Italien zurück"
 
 hungary_flavor_partition.18.t:0 "Das Schicksal Istriens"
 hungary_flavor_partition.18.d:0 "Die Halbinsel Istrien gehörte bis zum Ende des Ersten Weltkriegs zu Österreich-Ungarn und wurde dann von Italien annektiert. Jugoslawien hat sich seitdem das Gebiet unter dem Vorwand angeeignet, dass die Bevölkerung dort mehrheitlich kroatisch sei. Was sollen wir mit diesem Staat tun?"
 hungary_flavor_partition.18.a:0 "Annex it."
 hungary_flavor_partition.18.b:0 "Geben Sie es Kroatien."
 hungary_flavor_partition.18.c:0 "Gib es Italien zurück"
 
 hungary_flavor_partition.19.t:0 "Das Schicksal von Primorska"
 hungary_flavor_partition.19.d:0 "Primorska, ein kleiner Landstreifen zwischen Istrien und Slowenien, wurde nach dem Verlust an Italien jugoslawisches Territorium. Sein Schicksal liegt nun in unseren Händen."
 hungary_flavor_partition.19.a:0 "Annex it."
 hungary_flavor_partition.19.c:0 "Gib es Italien zurück"
 
 hungary_flavor_partition.20.t:0 "Das Schicksal Sloweniens"
 hungary_flavor_partition.20.d:0 "Slowenien könnte interessante Möglichkeiten bieten. Es gehörte einst zu Österreich, daher könnten wir es ihnen vielleicht anbieten, doch Italien erhebt auch eigene Ansprüche auf die Region. Wir könnten uns auch für eine Teilung Sloweniens entscheiden und den nördlichen und südlichen Teil getrennt behandeln."
 hungary_flavor_partition.20.a:0 "Annex it."
 hungary_flavor_partition.20.b:0 "Geben Sie es Österreich."
 hungary_flavor_partition.20.c:0 "Machen Sie einen Deal mit Österreich."
 hungary_flavor_partition.20.e:0 "Geben Sie es Deutschland."
 hungary_flavor_partition.20.f:0 "Geben Sie es Italien."
 hungary_flavor_partition.20.g:0 "Machen Sie einen Deal mit Italien."
 hungary_flavor_partition.20.h:0 "Befreie Slowenien."
 hungary_flavor_partition.20.i:0 "Entscheiden Sie sich für den nördlichen und südlichen Teil getrennt."
 hungary_flavor_partition.20.c.tt:0 "Wir werden Österreich Slowenien im Gegenzug für das Burgenland anbieten können."
 hungary_flavor_partition.20.g.tt:0 "Wir werden Italien Slowenien im Austausch für einige seiner Adriahäfen anbieten können."
 hungary_flavor_partition.20.i.tt:0 "Über das Schicksal Nordsloweniens und Ljubljanas werden wir getrennt entscheiden."
 
 hungary_flavor_partition.21.t:0 "Das Schicksal Nordsloweniens"
 hungary_flavor_partition.21.d:0 "Wir haben uns entschieden, die beiden Teile Sloweniens getrennt zu behandeln. Die nördliche Hälfte kommt zuerst. Was sollen wir damit machen?"
 hungary_flavor_partition.21.a:0 "Annex it."
 hungary_flavor_partition.21.b:0 "Geben Sie es Deutschland."
 hungary_flavor_partition.21.c:0 "Geben Sie es Österreich."
 hungary_flavor_partition.21.e:0 "Machen Sie einen Deal mit Österreich."
 hungary_flavor_partition.21.f:0 "Geben Sie es Italien."
 hungary_flavor_partition.21.g:0 "Machen Sie einen Deal mit Italien."
 hungary_flavor_partition.21.h:0 "Geben Sie es den Slowenen."
 hungary_flavor_partition.21.e.tt:0 "Wir werden Österreich Nordslowenien im Gegenzug für das Burgenland anbieten können."
 hungary_flavor_partition.21.g.tt:0 "Wir werden Italien Nordslowenien im Austausch für einige seiner Adriahäfen anbieten können."
 
 hungary_flavor_partition.22.t:0 "Das Schicksal von Ljubljana"
 hungary_flavor_partition.22.d:0 "Als nächstes folgt die südliche Hälfte Sloweniens. In dieser Provinz liegt die Hauptstadt der slowenischen Region, Ljubljana. Wer erhält dieses Land?"
 hungary_flavor_partition.22.a:0 "Annex it."
 hungary_flavor_partition.22.b:0 "Geben Sie es Österreich."
 hungary_flavor_partition.22.c:0 "Geben Sie es Deutschland."
 hungary_flavor_partition.22.e:0 "Geben Sie es Italien."
 hungary_flavor_partition.22.f:0 "Machen Sie einen Deal mit Italien."
 hungary_flavor_partition.22.g:0 "Geben Sie es den Slowenen."
 hungary_flavor_partition.22.f.tt:0 "Wir werden Italien Ljubljana im Austausch für einige seiner Adriahäfen anbieten können."
 
 hungary_flavor_partition.23.t:0 "Ein Abkommen mit Italien"
 hungary_flavor_partition.23.d:0 "Wir werden versuchen, mit Italien ein Abkommen zu schließen. Italien erhält nach der Teilung Jugoslawiens Teile Sloweniens, im Gegenzug können wir einige seiner Adriahäfen verlangen. Welche Art von Abkommen sollten wir anstreben?"
 hungary_flavor_partition.23.a:0 "Wir verlangen keine Gegenleistung."
 hungary_flavor_partition.23.b:0 "Wir wollen Fiume."
 hungary_flavor_partition.23.c:0 "Wir wollen Zara."
 hungary_flavor_partition.23.e:0 "Wir wollen Zara und Fiume."
 
 hungary_flavor_partition.24.t:0 "Ein Deal mit Österreich"
 hungary_flavor_partition.24.d:0 "Wir werden versuchen, mit Österreich eine Einigung zu erzielen. Österreich erhält nach der Teilung Jugoslawiens Teile Sloweniens, im Gegenzug können wir das Burgenland fordern. Welche Art von Abkommen sollten wir anstreben?"
 hungary_flavor_partition.24.a:0 "Wir verlangen keine Gegenleistung."
 hungary_flavor_partition.24.b:0 "Wir wollen das Burgenland."
 
 hungary_flavor_partition.25.t:0 "Italien akzeptiert"
 hungary_flavor_partition.25.d:0 "Italien hat sich bereit erklärt, im Gegenzug für Slowenien seine Adriahäfen zu übertragen."
 hungary_flavor_partition.25.a:0 "Prächtig."
 hungary_flavor_partition.25.b:0 "Eigentlich wollen wir nur Fiume."
 hungary_flavor_partition.25.c:0 "Sie können Fiume behalten, wir brauchen nur Zara."
 
 hungary_flavor_partition.26.t:0 "Italien lehnt ab"
 hungary_flavor_partition.26.d:0 "Italien hat das großzügige Angebot Sloweniens im Gegenzug für einige kleine Häfen abgelehnt."
 hungary_flavor_partition.26.a:0 "Seltsam."
 
 hungary_flavor_partition.27.t:0 "Das Schicksal Belgrads"
 hungary_flavor_partition.27.d:0 "Die Stadt Belgrad liegt am Zusammenfluss von Donau und Save und ist damit ein strategisch wichtiger Ort. Wer soll die ehemalige Hauptstadt Jugoslawiens bekommen?"
 hungary_flavor_partition.27.a:0 "Annex it."
 hungary_flavor_partition.27.b:0 "Gib es Serbien"
 
 hungary_flavor_fed_elections.1.t:0 "Regionalwahlen in [HUN.GetName]"
 hungary_flavor_fed_elections.1.d:0 "Da [ROOT.GetLeader] auf sein Recht verzichtet hat, die regionalen Vertreter von [ROOT.GetNameDef] zu ernennen, werden stattdessen Regionalwahlen abgehalten. In jedem Mitgliedsstaat der Föderation wird eine Wahl abgehalten, bei der die Volksabstimmung darüber entscheidet, wer die Vertreter des Staates im Bundesparlament sein werden."
 hungary_flavor_fed_elections.1.a:0 "Lassen Sie uns die Wahlzettel öffnen!"
 hungary_flavor_fed_elections.1.b:0 "Wir können uns in einer Zeit wie dieser keine Wahl leisten."
 
 hungary_flavor_fed_elections.2.t:0 "Ergebnisse der Regionalwahlen"
 hungary_flavor_fed_elections.2.d:0 "Die Abstimmung ist in allen Bundesländern abgeschlossen und die Ergebnisse wurden ausgewertet. Die Gewinnerparteien der einzelnen Bundesländer sind unten aufgeführt."
 hungary_flavor_fed_elections.2.a:0 "Das Volk hat gesprochen."
 
 hungary_flavor_fed_elections.3.t:0 "Sozialistische Mehrheit im Bundestag"
 hungary_flavor_fed_elections.3.d:0 "Bei den jüngsten Regionalwahlen haben die sozialistischen Parteien eine entscheidende Mehrheit im Bundesparlament erlangt. Mehrere umfassende Sozialreformen wurden vorgeschlagen und anschließend im Parlament abgestimmt. Sollten sie umgesetzt werden, würden sie die Föderation erheblich umgestalten. [ROOT.GetLeader] hat zwar weiterhin das Recht, diese Reformen zu blockieren, doch da sie von der Mehrheit im Parlament beschlossen wurden, wäre dies mit erheblichen Kosten verbunden."
 hungary_flavor_fed_elections.3.a:0 "Verabschieden Sie die vorgeschlagenen Sozialreformen."
 hungary_flavor_fed_elections.3.b:0 "Legen Sie Ihr Veto gegen die Reformen ein."
 
 hungary_flavor_fed_elections.4.t:0 "Liberale Mehrheit im Bundestag"
 hungary_flavor_fed_elections.4.d:0 "Bei den jüngsten Landtagswahlen haben liberale Parteien eine entscheidende Mehrheit im Bundesparlament erlangt. Mehrere übergreifende liberale Reformen wurden vorgeschlagen und anschließend im Parlament abgestimmt. Sollten sie umgesetzt werden, würden sie die Föderation erheblich verändern. [ROOT.GetLeader] hat zwar weiterhin die Befugnis, diese Reformen zu blockieren, doch da sie von der Mehrheit im Parlament beschlossen wurden, wäre dies mit erheblichen Kosten verbunden."
 hungary_flavor_fed_elections.4.a:0 "Verabschieden Sie die vorgeschlagenen liberalen Reformen."
 hungary_flavor_fed_elections.4.b:0 "Legen Sie Ihr Veto gegen die Reformen ein."
 
 hungary_flavor_fed_elections.5.t:0 "Unabhängigkeitsparteien dominieren das Bundesparlament"
 hungary_flavor_fed_elections.5.d:0 "Bei den jüngsten Regionalwahlen haben die Unabhängigkeitsparteien eine entscheidende Mehrheit im Bundesparlament erlangt. Obwohl diese Parteien selten die vollständige Unabhängigkeit ihrer jeweiligen Regionen anstreben, können sie mit ihrer gebündelten politischen Macht die Arbeit des Parlaments erheblich behindern. Sie fordern mehr Selbstverwaltung für ihre Regionen, und wenn wir nichts unternehmen, können sie dem Parlament ihren Willen aufzwingen."
 hungary_flavor_fed_elections.5.a:0 "Gewähren Sie den betreffenden Regionen Autonomie."
 hungary_flavor_fed_elections.5.b:0 "Lösen Sie die Unabhängigkeitsparteien auf."
 
 hungary_flavor_fed_elections.6.t:0 "Unabhängigkeitsreferendum in Österreich wird durchgezogen"
 hungary_flavor_fed_elections.6.d:0 "Der Sieg der Vaterländischen Front in Österreich bei den letzten Landtagswahlen kam überraschend, ist aber dennoch eingetreten. Im Wahlkampf versprach sie, im Falle eines Wahlsiegs ein Unabhängigkeitsreferendum abzuhalten. Sie hat ihr Versprechen gehalten, und das Ergebnis spricht eindeutig für die Unabhängigkeit. Wir könnten sie zwar mit mehr Autonomie besänftigen, aber das würde immer noch einen Einflussverlust in diesem Teil der Föderation bedeuten."
 hungary_flavor_fed_elections.6.a:0 "Gewähren Sie ihnen Autonomie."
 hungary_flavor_fed_elections.6.b:0 "Ignorieren Sie die Ergebnisse des Referendums."
 
 hungary_flavor_fed_elections.7.t:0 "Unabhängigkeitsreferendum in der Slowakei gelingt"
 hungary_flavor_fed_elections.7.d:0 "Der Sieg der Slowakischen Unabhängigkeitspartei bei den letzten Regionalwahlen in der Slowakei kam überraschend, ist aber dennoch eingetreten. Im Wahlkampf versprach sie, im Falle eines Wahlsiegs ein Unabhängigkeitsreferendum abzuhalten. Sie hat ihr Versprechen gehalten, und das Ergebnis spricht eindeutig für die Unabhängigkeit. Man könnte sie zwar mit mehr Autonomie beschwichtigen, aber das würde immer noch einen Einflussverlust in diesem Teil der Föderation bedeuten."
 hungary_flavor_fed_elections.7.a:0 "Gewähren Sie ihnen Autonomie."
 hungary_flavor_fed_elections.7.b:0 "Ignorieren Sie die Ergebnisse des Referendums."
 
 hungary_flavor_fed_elections.8.t:0 "Unabhängigkeitsreferendum in Böhmen gelingt"
 hungary_flavor_fed_elections.8.d:0 "Der Sieg der Tschechischen Unabhängigkeitspartei in Böhmen bei den letzten Regionalwahlen kam überraschend, ist aber dennoch eingetreten. Im Wahlkampf versprach sie, im Falle eines Sieges ein Unabhängigkeitsreferendum abzuhalten. Sie hat ihr Versprechen gehalten, und das Ergebnis spricht eindeutig für die Unabhängigkeit. Man könnte sie zwar mit mehr Autonomie besänftigen, aber das würde immer noch einen Einflussverlust in diesem Teil der Föderation bedeuten."
 hungary_flavor_fed_elections.8.a:0 "Gewähren Sie ihnen Autonomie."
 hungary_flavor_fed_elections.8.b:0 "Ignorieren Sie die Ergebnisse des Referendums."
 
 hungary_flavor_fed_elections.9.t:0 "Unabhängigkeitsreferendum in Galicien gelingt"
 hungary_flavor_fed_elections.9.d:0 "Der Sieg der Ukrainischen Separatistenpartei in Galizien bei den letzten Regionalwahlen kam überraschend, ist aber dennoch eingetreten. Im Wahlkampf versprach sie, im Falle eines Sieges ein Unabhängigkeitsreferendum abzuhalten. Sie hat ihr Versprechen gehalten, und das Ergebnis spricht eindeutig für die Unabhängigkeit. Man könnte sie zwar mit mehr Autonomie beschwichtigen, aber das würde immer noch einen Einflussverlust in diesem Teil der Föderation bedeuten."
 hungary_flavor_fed_elections.9.a:0 "Gewähren Sie ihnen Autonomie."
 hungary_flavor_fed_elections.9.b:0 "Ignorieren Sie die Ergebnisse des Referendums."
 
 hungary_flavor_fed_elections.10.t:0 "Unabhängigkeitsreferendum in Siebenbürgen gelingt"
 hungary_flavor_fed_elections.10.d:0 "Der Sieg der Partei Freies Siebenbürgen in Siebenbürgen bei den letzten Regionalwahlen kam überraschend, ist aber dennoch eingetreten. Im Wahlkampf versprach sie, im Falle eines Sieges ein Unabhängigkeitsreferendum abzuhalten. Sie hat ihr Versprechen gehalten, und das Ergebnis spricht eindeutig für die Unabhängigkeit. Wir könnten sie wahrscheinlich mit mehr Autonomie besänftigen, aber das würde immer noch einen Einflussverlust in diesem Teil der Föderation bedeuten."
 hungary_flavor_fed_elections.10.a:0 "Gewähren Sie ihnen Autonomie."
 hungary_flavor_fed_elections.10.b:0 "Ignorieren Sie die Ergebnisse des Referendums."
 
 hungary_flavor_fed_elections.11.t:0 "Unabhängigkeitsreferendum in Kroatien gelingt"
 hungary_flavor_fed_elections.11.d:0 "Der Sieg der Jugoslawischen Einheitspartei in Kroatien bei den letzten Regionalwahlen kam überraschend, ist aber dennoch eingetreten. Im Wahlkampf versprach sie, im Falle eines Sieges ein Unabhängigkeitsreferendum abzuhalten. Sie hat ihr Versprechen gehalten, und das Ergebnis spricht eindeutig für die Unabhängigkeit. Wir könnten sie zwar mit mehr Autonomie besänftigen, aber das würde immer noch einen Einflussverlust in diesem Teil der Föderation bedeuten."
 hungary_flavor_fed_elections.11.a:0 "Gewähren Sie ihnen Autonomie."
 hungary_flavor_fed_elections.11.b:0 "Ignorieren Sie die Ergebnisse des Referendums."
 
 hungary_flavor_fed_elections.13.t:0 "Unabhängigkeitsreferendum in Kärnten durchgezogen"
 hungary_flavor_fed_elections.13.d:0 "Der Sieg der Kärntner Freiheitlichen Partei in Kärnten bei den letzten Landtagswahlen kam überraschend, ist aber dennoch eingetreten. Im Wahlkampf versprach sie, im Falle eines Wahlsiegs ein Unabhängigkeitsreferendum abzuhalten. Sie hat ihr Versprechen gehalten, und das Ergebnis spricht eindeutig für die Unabhängigkeit. Man könnte sie zwar mit mehr Autonomie beschwichtigen, aber das würde immer noch einen Einflussverlust in diesem Teil des Bundes bedeuten."
 hungary_flavor_fed_elections.13.a:0 "Gewähren Sie ihnen Autonomie."
 hungary_flavor_fed_elections.13.b:0 "Ignorieren Sie die Ergebnisse des Referendums."
 
 hungary_flavor.1.t:0 "Willkommen beim Hungarian Flavor Mod"
 hungary_flavor.1.d:0 "Willkommen!\nDieser Mod soll das Spielen in Ungarn zu einem angenehmeren Erlebnis machen. Historisch gesehen waren die Möglichkeiten Ungarns in dieser Zeit jedoch sehr begrenzt, sodass eine realistische Darstellung des Landes nicht unbedingt jedem Spaß machen würde. Wenn Sie Ungarn in einem weniger anspruchsvollen Szenario spielen möchten, wählen Sie die „Nicht-realistische Version“. Wenn Sie ein realistischeres, anspruchsvolleres Erlebnis wünschen, wählen Sie die „Realistische Version“. Beachten Sie, dass die Wahl der nicht-realistischen Version hauptsächlich den Ausgang von Ereignissen (z. B. Gebietsansprüche) beeinflusst und nur sehr geringe Auswirkungen auf quantitative Spielelemente (wie die Anzahl der Fabriken oder Divisionen) hat."
 hungary_flavor.1.a:0 "Realistische Version"
 hungary_flavor.1.b:0 "Nicht realistische Version"
 hungary_flavor.1.realism:0 "Es wird schwieriger für Sie, Ihre Ziele zu erreichen und andere Nationen davon zu überzeugen, Ihren Forderungen nachzukommen. Dies gilt als die offizielle Standardversion des Mods.\n"
 hungary_flavor.1.no_realism:0 "Es wird Ihnen leichter fallen, Ihren Willen anderen Nationen aufzuzwingen und Ihre Ziele zu erreichen. Dies könnte leicht zu Szenarien führen, die aus historischer Sicht unglaubwürdig sind.\n"
 
 hungary_flavor.2.t:0 "Union mit Österreich"
 hungary_flavor.2.d:0 "Unsere Bemühungen um die Wiederherstellung der alten Monarchie waren erfolgreich. Die beiden Länder werden unter habsburgischer Herrschaft wieder vereint sein, und die Wiederherstellung der alten Gebiete kann beginnen. Es lebe Österreich-Ungarn!"
 hungary_flavor.2.a:0 "Es lebe Österreich-Ungarn!"
 hungary_flavor.2.tt:0 "Österreich und Ungarn werden eine Union unter dem Namen Österreich-Ungarn bilden, mit einem Habsburger als Monarchen.\n"
 
 hungary_flavor.3.t:0 "Autonome Vasallenfärbung"
 hungary_flavor.3.d:0 "Mit dem Mod „Ungarisch-Flavour“ hat Ungarn die Möglichkeit, autonome Vasallen wie Karpatenruthenien oder Siebenbürgen zu erstellen. Wenn Sie möchten, dass diese Untertanen die gleiche Kartenfarbe wie Ungarn haben, können Sie die Farbanpassung aktivieren. Wenn Sie die Farbanpassung deaktivieren, haben die Untertanen eine feste, vordefinierte Farbe."
 hungary_flavor.3.a:0 "Deaktivieren Sie die Farbanpassung."
 hungary_flavor.3.b:0 "Aktivieren Sie die Farbanpassung."
 
 hungary_flavor.4.t:0 "Österreich akzeptiert"
 hungary_flavor.4.d:0 "Österreich hat das vorgeschlagene Bündnis akzeptiert und sich nun unserer Sache angeschlossen."
 hungary_flavor.4.a:0 "Exzellent."
 
 hungary_flavor.5.t:0 "Österreich lehnt ab"
 hungary_flavor.5.d:0 "Die österreichische Regierung weigerte sich, dem von unseren Diplomaten vorgeschlagenen Pakt beizutreten und verurteilte die Ziele des ungarischen Revisionismus als sinnlosen Patriotismus."
 hungary_flavor.5.a:0 "Narren."
 
 hungary_flavor.7.t:0 "Polen akzeptiert"
 hungary_flavor.7.d:0 "Polen hat das von uns vorgeschlagene Bündnis klugerweise angenommen. Wir werden diesen großen Meilenstein in der Freundschaft zwischen Ungarn und Polen feiern."
 hungary_flavor.7.a:0 "Exzellent."
 
 hungary_flavor.8.t:0 "Polen lehnt ab"
 hungary_flavor.8.d:0 "Polen, der historische Freund unseres Landes, hat beschlossen, die guten Beziehungen zwischen unseren Völkern zu zerstören, indem es das vorgeschlagene Bündnis ablehnt."
 hungary_flavor.8.a:0 "Sie müssen wieder mit Wodka betrunken sein."
 
 hungary_flavor.10.t:0 "Bulgarien akzeptiert"
 hungary_flavor.10.d:0 "Bulgarien hat sich, wie von uns vorgeschlagen, unserer Fraktion angeschlossen. Es wird ein großartiger strategischer Verbündeter sein, und unsere beiden Länder werden davon profitieren."
 hungary_flavor.10.a:0 "Exzellent."
 
 hungary_flavor.11.t:0 "Bulgarien geht zurück"
 hungary_flavor.11.d:0 "Die dummen Bulgaren haben unsere großzügige Einladung abgelehnt. Sie können sich glücklich schätzen, wenn sie nach den kommenden Kriegen ein eigenes Land haben."
 hungary_flavor.11.a:0 "Empörung!"
 
 hungary_flavor.12.t:0 "Tschechoslowakei gibt nach"
 hungary_flavor.12.d:0 "Erfolg! Die tschechisch-slowakische Regierung hat zugestimmt, die Slowakei an uns abzutreten. Ein weiterer Schritt auf dem Weg zum ultimativen Ziel, [Root.GetName] zu seinem früheren Glanz zurückzubringen."
 hungary_flavor.12.a:0 "Exzellent."
 
 hungary_flavor.13.t:0 "Die Tschechoslowakei lehnt ab"
 hungary_flavor.13.d:0 "Die dummen Tschechoslowaken weigerten sich, die Slowakei aufzugeben. Das ist ungeheuerlich und darf nicht ungestraft bleiben. Sobald wir bereit sind, wird ihr kleines Land schnell von unserer großen Armee verschlungen."
 hungary_flavor.13.a:0 "Sie werden um Gnade betteln."
 
 hungary_flavor.19.t:0 "Rumänien ist bereit, Nordsiebenbürgen abzutreten"
 hungary_flavor.19.d:0 "Unsere Forderungen an Rumänien wurden ernsthaft geprüft, und nun hat das rumänische Kabinett einem Kompromiss zugestimmt. Wir erhalten die nördliche Hälfte Siebenbürgens, wo die meisten Siebenbürger Ungarn leben, Rumänien behält jedoch den südlichen Teil. Reicht das?"
 hungary_flavor.19.a:0 "Wir nehmen, was wir kriegen können."
 hungary_flavor.19.b:0 "Das ist nicht akzeptabel."
 
 hungary_flavor.20.t:0 "Rumänien stellt Gegenforderung!"
 hungary_flavor.20.d:0 "Das Unerwartete ist passiert: Anstatt unseren Forderungen nachzukommen, hat Rumänien eine eigene Forderung gestellt, und zwar zu nichts Geringerem als Alföld! Sie behaupten, ihr Land solle bis zur Theiß reichen und wir sollten ihnen dieses Land sofort überlassen."
 hungary_flavor.20.a:0 "Das bedeutet Krieg."
 hungary_flavor.20.b:0 "Was für eine absurde Idee."
 hungary_flavor.20.c:0 "Damit haben wir nicht gerechnet. Rückzug aus der Transtisza-Region."
 
 hungary_flavor.21.t:0 "Rumänien gibt nach"
 hungary_flavor.21.d:0 "Siebenbürgen gehört wieder uns! Rumänien hat sich bereit erklärt, seine Truppen abzuziehen und sein gesamtes Territorium abzutreten, um einen Krieg mit uns zu vermeiden. Ruhmreich soll [Root.GetName] sein!"
 hungary_flavor.21.a:0 "Wirklich herrlich."
 
 hungary_flavor.22.t:0 "Rumänien lehnt ab"
 hungary_flavor.22.d:0 "Ungeheuerlich! Rumänien hat unser großzügiges Angebot abgelehnt, sie in Ruhe zu lassen, wenn sie Siebenbürgen abtreten. Jetzt können wir unser Versprechen halten, in Rumänien einmarschieren und uns mit Gewalt alles nehmen, was wir wollen."
 hungary_flavor.22.a:0 "Verdammte Idioten."
 
 hungary_flavor.23.t:0 "Italienische Verhandlungen"
 hungary_flavor.23.d:0 "Wir haben den ersten Entwurf des Vorschlags ausgearbeitet, der Italien vorgelegt werden soll. Wir könnten uns mit einem einfachen Nichtangriffspakt zufrieden geben, aber wenn wir mehr anbieten würden, könnte Italien einigen territorialen Zugeständnissen zustimmen, darunter Fiume und Zara. Wir könnten wählen, welche Staaten wir als Gegenleistung für unsere Hilfe einfordern."
 hungary_flavor.23.a:0 "Ein einfacher Nichtangriffspakt wird ausreichen."
 hungary_flavor.23.b:0 "Bieten Sie zusätzlich zum Nichtangriffspakt militärische Unterstützung an."
 hungary_flavor.23.c:0 "Bieten Sie zusätzlich zum Nichtangriffspakt militärische und politische Unterstützung an."
 
 hungary_flavor.24.t:0 "Die Frage von Fiume"
 hungary_flavor.24.d:0 "Italien besitzt Fiume, das vor den Friedensverträgen von Trianon zu Ungarn gehörte. Wir könnten Italien bitten, es im Austausch für unsere Hilfe herauszugeben."
 hungary_flavor.24.a:0 "Wir werden Fiume in den Vorschlag aufnehmen."
 hungary_flavor.24.b:0 "Wir brauchen Fiume nicht."
 
 hungary_flavor.25.t:0 "Die Frage von Zara"
 hungary_flavor.25.d:0 "Italien besitzt Zara, eine Hafenstadt im Norden Dalmatiens. Wir könnten Italien bitten, uns die Stadt im Austausch für unsere Hilfe zu übergeben."
 hungary_flavor.25.a:0 "Wir werden Zara in den Vorschlag einbeziehen."
 hungary_flavor.25.b:0 "Wir brauchen Zara nicht."
 
 hungary_flavor.26.t:0 "Die Frage Istriens"
 hungary_flavor.26.d:0 "Italien besitzt Istrien, eine historisch kroatische Provinz. Wir könnten Italien bitten, es im Austausch für unsere Hilfe abzutreten."
 hungary_flavor.26.a:0 "Wir werden Istrien in den Vorschlag aufnehmen."
 hungary_flavor.26.b:0 "Wir brauchen Istrien nicht."
 
 hungary_flavor.27.t:0 "Italien akzeptiert Bedingungen"
 hungary_flavor.27.d:0 "Italien hat unseren Bedingungen zugestimmt. Der Pakt wurde unterzeichnet und beide Seiten schienen mit den Ergebnissen zufrieden zu sein."
 hungary_flavor.27.a:0 "Eine erfolgreiche Vereinbarung."
 
 hungary_flavor.28.t:0 "Italien weigert sich zu verhandeln"
 hungary_flavor.28.d:0 "Der italienische Außenminister hat unsere Botschafter mit der Begründung entlassen, dass sie unter den von uns vorgeschlagenen Bedingungen nicht verhandeln könnten."
 hungary_flavor.28.a:0 "Besorgniserregend."
 
 hungary_flavor.30.t:0 "Deutsches Bündnis"
 hungary_flavor.30.d:0 "Die Außenminister von [Root.GetName] und Deutschland haben den Vertrag offiziell unterzeichnet, der [Root.GetName] den Beitritt zur Achse ermöglicht."
 hungary_flavor.30.a:0 "Exzellent."
 
 hungary_flavor.31.t:0 "Deutschland lehnt Bündnis ab"
 hungary_flavor.31.d:0 "Deutschland hat unsere Bitte überraschend abgelehnt und uns den Beitritt zur Achse verweigert."
 hungary_flavor.31.a:0 "Was für eine Arroganz."
 
 hungary_flavor.32.t:0 "Sowjetisches Bündnis"
 hungary_flavor.32.d:0 "Die mächtige Sowjetunion hat unseren Antrag auf Mitgliedschaft in der Kommunistischen Internationale angenommen. Die Flagge der Revolution soll heute hoch wehen, denn wir sind Teil von etwas, das viel größer ist als wir selbst!"
 hungary_flavor.32.a:0 "Arbeiter, freut euch!"
 
 hungary_flavor.33.t:0 "Sowjetunion lehnt Bündnis ab"
 hungary_flavor.33.d:0 "Wir wurden vom Mutterland des Kommunismus vernachlässigt. Sie haben unser vorgeschlagenes Bündnis abgelehnt, und deshalb müssen wir die Revolution allein weiterführen."
 hungary_flavor.33.a:0 "Sie werden irgendwann zur Vernunft kommen."
 
 hungary_flavor.34.t:0 "Bündnis mit Großbritannien"
 hungary_flavor.34.d:0 "Nach einer kurzen Reihe von Verhandlungen hat die Regierung des Vereinigten Königreichs unseren Vorschlag angenommen und uns die Mitgliedschaft in ihrem Bündnis gewährt. Im Falle eines Angriffs durch einen Gegner genießen wir nun den Schutz der Alliierten."
 hungary_flavor.34.a:0 "Hervorragend."
 
 hungary_flavor.35.t:0 "Großbritannien lehnt Bündnis ab"
 hungary_flavor.35.d:0 "Unser Antrag, uns den Alliierten anzuschließen, wurde vom Vereinigten Königreich abgelehnt. Es scheint, als wären wir in unserem Kampf allein."
 hungary_flavor.35.a:0 "Was für eine Schande."
 
 hungary_flavor.36.t:0 "Die Donaukonferenz"
 hungary_flavor.36.d:0 "Budapest wird Gastgeber der Konferenz sein, auf der die Donaukoalition (hoffentlich) gegründet wird. Einladungen wurden an alle unsere blockfreien Nachbarn und einige Balkanländer verschickt. Je mehr Nationen wir davon überzeugen können, der Koalition beizutreten, desto stärker wird unser Bündnis sein."
 hungary_flavor.36.a:0 "Lasst die Veranstaltung beginnen."
 
 hungary_flavor.37.t:0 "Die Tschechoslowakei tritt wieder dem Kaiserreich bei"
 hungary_flavor.37.d:0 "Die Tschechoslowakei hat Einsicht gezeigt und unseren Vorschlag angenommen. Sie ist wieder dort, wo sie hingehört: unter den schützenden Fittichen Österreich-Ungarns."
 hungary_flavor.37.a:0 "Hervorragende Neuigkeiten."
 
 hungary_flavor.38.t:0 "Die Tschechoslowakei weigert sich, dem Reich beizutreten"
 hungary_flavor.38.d:0 "Die Tschechoslowakei scheint einen übermäßigen Nationalstolz zu hegen (als ob sie überhaupt eine richtige Nation wäre) und weigerte sich, dem Kaiserreich beizutreten."
 hungary_flavor.38.a:0 "Vielleicht sollten wir einen anderen Ansatz versuchen."
 
 hungary_flavor.39.t:0 "Polen gibt nach"
 hungary_flavor.39.d:0 "Polen kam unserer berechtigten Forderung nach und trat alle Gebiete unverzüglich ab. Krakau und Galizien gehören wieder uns. Als Gegenleistung für ihre großzügige Kooperation garantieren wir den Polen, dass ihrem Land kein weiterer Schaden zugefügt wird."
 hungary_flavor.39.a:0 "Hervorragende Neuigkeiten."
 
 hungary_flavor.40.t:0 "Polen lehnt ab"
 hungary_flavor.40.d:0 "Polen lehnte unseren großzügigen Vorschlag ab und riskierte stattdessen den Zorn des Imperiums. Es scheint, als würden sie nicht auf die Vernunft hören."
 hungary_flavor.40.a:0 "Sie werden auf Waffen hören."
 
 hungary_flavor.41.t:0 "Rumänien gibt nach"
 hungary_flavor.41.d:0 "Wie erwartet hat Rumänien den Forderungen nachgegeben und die Bukowina abgetreten. Es ist ein kleiner Gewinn, aber immerhin ein Gewinn"
 hungary_flavor.41.a:0 "Hervorragende Neuigkeiten."
 
 hungary_flavor.42.t:0 "Rumänien lehnt ab"
 hungary_flavor.42.d:0 "Rumänien muss denken, dass wir einen Scherz gemacht haben, als wir um die Bukowina baten. Sie lehnten den Vorschlag sofort ab und schickten unsere Diplomaten nach Hause."
 hungary_flavor.42.a:0 "Wollen sie wegen eines kleinen Stücks Land fallen?"
 
 hungary_flavor.43.t:0 "Verhandlungen mit der imperialistischen tschechoslowakischen Regierung"
 hungary_flavor.43.d:0 "Die neu eingesetzte imperialistische Regierung in der Tschechoslowakei hat Verhandlungen mit uns aufgenommen. Sie möchte unsere Bemühungen nach Kräften unterstützen und würde sich dazu gerne unserer Fraktion anschließen."
 hungary_flavor.43.a:0 "Heißen Sie sie in den neuen Mittelmächten willkommen"
 hungary_flavor.43.b:0 "Es besteht noch kein Bedarf für eine offene Zusammenarbeit."
 
 hungary_flavor.45.t:0 "Österreich erlaubt Burgenland-Volksabstimmung"
 hungary_flavor.45.d:0 "Unser neuer Freund Österreich hat die von uns vorgeschlagene Volksabstimmung im Burgenland zugelassen. Die dort lebenden Menschen können nun frei wählen, ob sie in Österreich bleiben oder sich Ungarn anschließen wollen. Wir müssen nur auf das beste Ergebnis hoffen."
 hungary_flavor.45.a:0 "Exzellent."
 
 hungary_flavor.46.t:0 "Österreich lehnt Volksabstimmung im Burgenland ab"
 hungary_flavor.46.d:0 "Die österreichische Regierung hat die geplante Volksabstimmung im Burgenland abgelehnt. Wäre sie nicht mit Ungarn verbündet, würde dies als Beleidigung gewertet und entsprechend bestraft werden. Das könnte unsere Fraktion spalten."
 hungary_flavor.46.a:0 "Enttäuschend."
 hungary_flavor.46.b:0 "Sehr gut. Wir werden es mit Gewalt einnehmen."
 
 hungary_flavor.47.t:0 "Slowenien für das Burgenland"
 hungary_flavor.47.d:0 "Wir haben in den letzten Jahren Slowenien erworben, und Österreich besitzt noch immer das alte ungarische Burgenland. Ein Austausch dieser Gebiete zwischen den beiden Ländern und die Wiederherstellung der historischen Grenzen wäre sinnvoll. Werden wir Österreich dieses Angebot machen?"
 hungary_flavor.47.a:0 "Natürlich."
 hungary_flavor.47.b:0 "Die Ränder sind gut, so wie sie sind."
 
 hungary_flavor.48.t:0 "Österreich akzeptiert slowenischen Handel"
 hungary_flavor.48.d:0 "Österreich traf die vernünftige Entscheidung, Slowenien im Austausch für das Burgenland zu akzeptieren. Beide Staaten wurden ihren historischen Eigentümern zurückgegeben."
 hungary_flavor.48.a:0 "Sehr gut."
 
 hungary_flavor.49.t:0 "Österreich lehnt slowenischen Handel ab"
 hungary_flavor.49.d:0 "Es mag überraschen, aber Österreich weigerte sich, das Burgenland im Austausch für Slowenien abzutreten. Die Gebietsgewinne hätten die Verluste sicherlich überwogen, und Österreich hätte eine Provinz zurückerhalten, die traditionell ihm gehört."
 hungary_flavor.49.a:0 "Seltsam."
 
 hungary_flavor.50.t:0 "Das „Györi-Programm“"
 hungary_flavor.50.d:0 "Da unsere Rüstungsbemühungen aufgrund der Friedensabkommen nach dem Ersten Weltkrieg lange Zeit begrenzt waren, muss die Armee dringend modernisiert werden. Ein von Béla Imrédy entwickelter Wiederaufrüstungsplan sieht eine gründliche Reform und Umstrukturierung nicht nur der Armee, sondern auch der Industrie des Landes vor. Die Gesamtkosten der Umsetzung belaufen sich auf eine Milliarde ungarische Pengös, wovon 400 Millionen für Verteidigung und Industrieentwicklung bestimmt sind, während 600 Millionen direkt an die Armee und Forschung gehen. Die Mittel sollen durch einmalige Steuern und kurzfristige Kredite aufgebracht werden."
 hungary_flavor.50.a:0 "Genehmigen Sie den Plan."
 hungary_flavor.50.b:0 "Das wäre zu teuer."
 
 hungary_flavor.51.t:0 "Györi-Programm: Phase I ist fertig"
 hungary_flavor.51.d:0 "Die erste Phase des Györi-Programms steht kurz vor der Umsetzung. Forschung und industrielle Entwicklung stehen im Mittelpunkt dieses Planteils. Zu diesem Zweck wurden zahlreiche Bauzuschüsse und Forschungsvereinbarungen ausgehandelt. Wir sollten diese Vereinbarungen nutzen, bevor sie auslaufen."
 hungary_flavor.51.a:0 "[Root.GetName] hat Vorrang."
 
 hungary_flavor.52.t:0 "Györi-Programm: Phase II ist fertig"
 hungary_flavor.52.d:0 "Die zweite Phase des Györi-Programms steht nun zur Umsetzung bereit. Der Schwerpunkt des Plans verlagert sich nun auf die Armee und die Verteidigungsanstrengungen. Eine Modernisierung der Armee und der Schutz unserer Grenzen sind notwendig, wenn wir einen militärischen Konflikt überleben wollen."
 hungary_flavor.52.a:0 "Unsere Armee soll die beste sein."
 
 hungary_flavor.53.t:0 "Györi-Programm: Phase III ist fertig"
 hungary_flavor.53.d:0 "Die dritte Phase des Györi-Programms steht vor der Umsetzung. Die nationale Luftfahrtentwicklung hinkt der der Nachbarländer deutlich hinterher und verdient daher besondere Aufmerksamkeit. Wir müssen alle Anstrengungen unternehmen, um neue Flugzeugmodelle zu entwickeln und in Produktion zu bringen."
 hungary_flavor.53.a:0 "Der Himmel wird die Macht von [Root.GetName] erkennen."
 
 hungary_flavor.54.t:0 "Györi-Programm: Phase IV ist fertig"
 hungary_flavor.54.d:0 "Die vierte und letzte Phase des Györi-Programms konzentriert sich auf die Marine. Ursprünglich war die Marine aufgrund fehlender Häfen im Land nicht im Plan enthalten. Zusätzliche Mittel ermöglichten es uns, in die Entwicklung und Produktion von Marineschiffen zu investieren."
 hungary_flavor.54.a:0 "Die Marine soll wieder groß sein."
 
 hungary_flavor.55.t:0 "[Root.GetAdjective]-Jugoslawische ewige Freundschaft"
 hungary_flavor.55.d:0 "Der Pakt der ewigen Freundschaft zwischen [Root.GetName] und Jugoslawien wurde unterzeichnet und besiegelt damit offiziell die guten Beziehungen und die Zusammenarbeit zwischen den beiden Ländern. Dies könnte der Beginn einer Allianz sein, die beiden Nationen helfen könnte, sich vor ausländischen Bedrohungen zu schützen."
 hungary_flavor.55.a:0 "Exzellent."
 
 hungary_flavor.56.t:0 "Jugoslawien lehnt die ewige Freundschaft ab"
 hungary_flavor.56.d:0 "Jugoslawien fühlt sich möglicherweise immer noch durch die Möglichkeit revisionistischer Behauptungen von [Root.GetName] bedroht und lehnt die Idee einer Zusammenarbeit zwischen unseren Ländern ab. Dies ist sicherlich nicht als feindseliger Akt gemeint, sondern lediglich als Zeichen der Vorsicht ihrerseits."
 hungary_flavor.56.a:0 "Schade."
 
 hungary_flavor.57.t:0 "Territoriale Regelung mit Jugoslawien"
 hungary_flavor.57.d:0 "Obwohl wir Jugoslawien unsere Freundschaft erklärt haben, bleibt die Frage unserer territorialen Streitigkeiten bestehen. Novi Sad gehört eindeutig zu uns, und Jugoslawien braucht unsere Hilfe, um in Zukunft erfolgreich zu sein. Wir versprechen ihnen künftige Hilfe, wenn sie uns die Vojvodina als Zeichen der Freundschaft überlassen."
 hungary_flavor.57.a:0 "Sie werden sicherlich zustimmen, dass Novi Sad ungarisch ist."
 hungary_flavor.57.b:0 "Wir können die guten Beziehungen zu ihnen nicht für Gebietsgewinne aufs Spiel setzen."
 
 hungary_flavor.58.t:0 "Erfolgreiche Verhandlungen mit Jugoslawien"
 hungary_flavor.58.d:0 "Jugoslawien hat unseren Vorschlag angenommen und die Kontrolle über Novi Sad übergeben. Sie nehmen unsere Freundschaft offensichtlich ernst, und das zu Recht. Wir werden unsere Versprechen einhalten und ihre politischen Bemühungen unterstützen."
 hungary_flavor.58.a:0 "Eine Frucht der Freundschaft zwischen unseren Ländern."
 
 hungary_flavor.59.t:0 "Erfolglose Verhandlungen mit Jugoslawien"
 hungary_flavor.59.d:0 "Jugoslawien hat sich verständlicherweise geweigert, Novi Sad abzutreten. Wir haben im Gegenzug wenig geboten, und die territoriale Integrität Jugoslawiens wird von den Alliierten unterstützt. Die Freundschaft zwischen unseren Ländern ist vielleicht noch nicht zu Ende, aber alle verließen den Verhandlungstisch mit einem bitteren Nachgeschmack."
 hungary_flavor.59.a:0 "Dies wird unseren Beziehungen zu ihnen zwangsläufig schaden."
 
 hungary_flavor.60.t:0 "Bündnis mit Jugoslawien"
 hungary_flavor.60.d:0 "Jugoslawien hat sich als kooperationsbereiter Partner erwiesen, und unsere politischen Ansichten stimmen mit ihren überein. Um unsere Freundschaft weiter zu stärken, sollten wir Jugoslawien in unsere Fraktion einladen und uns gegenseitige Unterstützung in künftigen Konflikten garantieren."
 hungary_flavor.60.a:0 "Natürlich werden wir sie einladen."
 hungary_flavor.60.b:0 "Wir müssen sie da nicht hineinziehen."
 
 hungary_flavor.61.t:0 "Jugoslawien akzeptiert Bündnis"
 hungary_flavor.61.d:0 "Der Vertrag über ewige Freundschaft zwischen [Root.GetName] und Jugoslawien wurde um ein Militärbündnis erweitert. Sie haben sich unserer Fraktion angeschlossen und genießen nun unseren Schutz, so wie wir ihre Hilfe genießen."
 hungary_flavor.61.a:0 "Ein Toast auf unsere Freundschaft!"
 
 hungary_flavor.62.t:0 "Jugoslawien lehnt Bündnis ab"
 hungary_flavor.62.d:0 "Die Verhandlungen über ein Bündnis mit Jugoslawien sind gescheitert. Sie lehnten den Vorschlag rundweg ab, da sie sich nicht in unsere politischen Auseinandersetzungen einmischen wollten. Offenbar legen sie zu viel Wert auf ihre Neutralität."
 hungary_flavor.62.a:0 "Sie wissen nicht, was sie verpassen."
 
 hungary_flavor.63.t:0 "Finanzierung des Györi-Programms"
 hungary_flavor.63.d:0 "Einige Investoren haben sich an die für die Durchführung des Györi-Programms zuständigen Regierungskoordinatoren gewandt. Sie bekundeten ihr Interesse am Erfolg der Rüstung, da sie Aktien verschiedener betroffener Industrieunternehmen besitzen. Diese Investoren sind bereit, das Programm in Form großzügiger, zinsgünstiger Kredite zu finanzieren."
 hungary_flavor.63.a:0 "Geld ist immer willkommen."
 
 hungary_flavor.64.t:0 "Italien akzeptiert Forderungen"
 hungary_flavor.64.d:0 "Italien traf die vernünftige Entscheidung, die griechischen Gebiete im Gegenzug für den Verzicht auf die österreichisch-ungarischen Gebiete zu akzeptieren. Vielleicht taten sie es nur, um den Frieden zu wahren, vielleicht schätzten sie den Wert der Provinzen falsch ein. Wie dem auch sei, der Deal ist besiegelt."
 hungary_flavor.64.a:0 "Überraschende, aber willkommene Neuigkeiten."
 
 hungary_flavor.65.t:0 "Italien lehnt Forderungen ab"
 hungary_flavor.65.d:0 "Es überrascht nicht, dass Italien sich weigert, die Kontrolle über unser ehemaliges Territorium aufzugeben. Das Versprechen griechischer Gebiete konnte sie nicht überzeugen, und sie erkennen die wahre Stärke unserer Nation nicht. Unsere ehemaligen Gebiete bleiben in italienischer Hand."
 hungary_flavor.65.a:0 "Es ist eine Schande, dass wir sie mit Gewalt nehmen müssen."
 
 hungary_flavor.66.t:0 "Deutschland lehnt österreichisch-ungarische Zusammenarbeit ab"
 hungary_flavor.66.d:0 "Unsere Bemühungen um die Wiederherstellung Österreich-Ungarns sind nicht unbemerkt geblieben, und Deutschland ist bereit, gegen sie vorzugehen. Sollten wir die Verhandlungen mit Österreich nicht einstellen, drohen sie notfalls mit einer militärischen Intervention."
 hungary_flavor.66.a:0 "Setzen Sie die Verhandlungen fort."
 hungary_flavor.66.b:0 "Zurück."
 
 hungary_flavor.67.t:0 "Die Hauptstadt Österreich-Ungarns"
 hungary_flavor.67.d:0 "Die Monarchie Österreich-Ungarns wurde wiederhergestellt, doch historisch gesehen war Wien die Hauptstadt. Obwohl die Union ursprünglich unter österreichischer Führung stand und heute unter ungarischer, könnte es dennoch strategisch vorteilhaft sein, die Hauptstadt nach Wien zu verlegen.\n\nDie Verlegung der Hauptstadt nach Wien würde die Kartenfarbe des Landes in Weiß ändern."
 hungary_flavor.67.a:0 "Wir bleiben bei Budapest."
 hungary_flavor.67.b:0 "Es ist Wien."
 
 hungary_flavor.78.t:0 "Möglicher Ausstiegsversuch"
 hungary_flavor.78.d:0 "Da sich der Krieg immer mehr zugunsten unseres Feindes entwickelt, ist es vielleicht an der Zeit, unseren Ausstieg aus dem Krieg zu planen. Wie Bismarck einst sagte: „Keine Nation sollte sich auf dem Altar eines Bündnisses opfern.“"
 hungary_flavor.78.a:0 "Wir werden unsere Optionen prüfen."
 hungary_flavor.78.c:0 "Wir werden der Achse für immer treu bleiben."
 
 hungary_flavor.79.t:0 "Sowjets unterstützen Austrittsversuch"
 hungary_flavor.79.d:0 "Die Verhandlungen waren erfolgreich. Die Sowjetunion erklärte sich bereit, unseren Austrittsversuch zu unterstützen und versprach, uns zu schützen, sobald wir Deutschland im Stich lassen."
 hungary_flavor.79.a:0 "Zumindest könnten wir noch immer auf der Gewinnerseite stehen."
 
 hungary_flavor.80.t:0 "Beitritt zur Sowjetunion"
 hungary_flavor.80.d:0 "Es wurden Vorkehrungen getroffen, um alle ungarischen Truppen aus der Gefahrenzone abzuziehen, und eine sowjetfreundliche Regierung wurde eingesetzt. Alles ist für unseren Abzugsversuch vorbereitet. Jetzt müssen wir auf das Beste hoffen und darauf vertrauen, dass unsere neuen Verbündeten uns gegen Deutschland verteidigen."
 hungary_flavor.80.a:0 "Wir haben unsere Wahl getroffen."
 
 hungary_flavor.81.t:0 "Sowjets weisen Abzugsversuch zurück"
 hungary_flavor.81.d:0 "Die Sowjetunion lehnte Verhandlungen über unseren Austritt mit der Begründung ab, sie werde nicht mit dem Feind verhandeln."
 hungary_flavor.81.a:0 "Dann bleiben uns die Deutschen nicht mehr aus."
 
 hungary_flavor.82.t:0 "Verbündete unterstützen Austrittsversuch"
 hungary_flavor.82.d:0 "Die Verhandlungen waren erfolgreich. Die Alliierten haben sich bereit erklärt, unseren Austrittsversuch zu unterstützen und versprochen, uns zu schützen, sobald wir Deutschland verlassen."
 hungary_flavor.82.a:0 "Zumindest könnten wir noch immer auf der Gewinnerseite stehen."
 
 hungary_flavor.83.t:0 "Beitritt zu den Alliierten"
 hungary_flavor.83.d:0 "Es wurden Vorkehrungen getroffen, um alle ungarischen Truppen aus der Gefahrenzone abzuziehen, und eine Übergangsregierung wurde eingesetzt. Alles ist für unseren Abzugsversuch vorbereitet. Jetzt müssen wir auf das Beste hoffen und darauf vertrauen, dass unsere neuen Verbündeten uns gegen Deutschland verteidigen."
 hungary_flavor.83.a:0 "Wir haben unsere Wahl getroffen."
 
 hungary_flavor.84.t:0 "Alliierte weisen Austrittsversuch zurück"
 hungary_flavor.84.d:0 "Das Vereinigte Königreich lehnte Verhandlungen über unseren Austritt mit der Begründung ab, dass es nicht mit dem Feind verhandeln werde."
 hungary_flavor.84.a:0 "Dann bleiben uns die Deutschen nicht mehr aus."
 
 hungary_flavor.85.t:0 "Die Pfeilkreuzler-Partei"
 hungary_flavor.85.d:0 "Eine unerwartete Wendung der Ereignisse hat im Land für große Aufregung gesorgt. Deutsche Truppen haben die Grenze überschritten und wichtige Einrichtungen, darunter auch Verwaltungsgebäude in der Hauptstadt, besetzt. Die bisherige Regierung wurde durch die faschistische Pfeilkreuzlerpartei unter Ferenc Szálasi ersetzt, die sofort die Kontrolle im Land übernahm. Damit wollen die Deutschen wohl zum Ausdruck bringen, dass sie uns nicht trauen, ihrem Beispiel zu folgen."
 hungary_flavor.85.a:0 "Wir können nichts tun."
 hungary_flavor.85.b:0 "Machen Sie sich bereit zum Kampf!"
 hungary_flavor.85.tt:0 "Die Pfeilkreuzlerpartei wird die Regierungspartei mit Ferenc Szálasi an der Spitze.\n"
 
 hungary_flavor.86.t:0 "Rumänien zieht sich aus dem Banat zurück"
 hungary_flavor.86.d:0 "Unsere Drohung erwies sich als ausreichend, um die Rumänen in Angst und Schrecken zu versetzen. Ihre gesamten Truppen wurden von der Grenze abgezogen, sodass das Banat für unsere Annexion frei blieb."
 hungary_flavor.86.a:0 "Die Feiglinge fliehen und die Mutigen siegen."
 
 hungary_flavor.87.t:0 "Rumänien weigert sich, sich aus dem Banat zurückzuziehen"
 hungary_flavor.87.d:0 "Die Drohung reichte nicht aus, um Rumänien zur Abtretung des Banats zu zwingen. Wir können nun entweder den Krieg um das Gebiet erklären oder einen Rückzieher machen. Eine Nichterklärung würde uns international schwach erscheinen lassen, da wir explizit das Gegenteil angedroht haben."
 hungary_flavor.87.a:0 "Sie werden es bereuen."
 hungary_flavor.87.b:0 "Für so ein kleines Stück Land werden wir weder Schweiß noch Blut verschwenden."
 
 hungary_flavor.88.t:0 "Türkei akzeptiert Bündnis"
 hungary_flavor.88.d:0 "Das Abkommen wurde unterzeichnet, die Türkei ist nun offiziell Mitglied von [Root.GetFactionName]. Im Falle eines Krieges werden die beiden Länder nun gemeinsam bestehen oder fallen."
 hungary_flavor.88.a:0 "Dies ist ein wichtiger Schritt in die richtige Richtung."
 
 hungary_flavor.89.t:0 "Türkei lehnt Bündnis ab"
 hungary_flavor.89.d:0 "Vielleicht hat der neue türkische Staat seinen ganzen Stolz oder seinen Wunsch nach Größe verloren, weil er sich dazu entschieden hat, sich aus unserer Fraktion herauszuhalten und sich damit all den Ruhm und die Belohnungen entgehen zu lassen, die damit verbunden gewesen wären."
 hungary_flavor.89.a:0 "Ohne sie geht es uns sowieso besser."
 
 hungary_flavor.90.t:0 "Unterstützung für demokratische Wahlen in Ungarn"
 hungary_flavor.90.d:0 "Liberale Ideen haben das Land erobert, und die Unterstützung für demokratische Wahlen wächst. Wir sollten uns besser auf einen Regierungswechsel vorbereiten."
 hungary_flavor.90.a:0 "Was für eine Zeit, um am Leben zu sein."
 
 hungary_flavor.91.t:0 "Unterstützung des Kommunismus in Ungarn"
 hungary_flavor.91.d:0 "Gewerkschaften organisieren landesweit Proteste und Streiks, während die Kommunistische Partei die Bildung einer neuen Regierung vorbereitet. Entweder durch Wahlen oder einen gewaltsamen Aufstand wird der Kommunismus in Ungarn irgendwann die Macht übernehmen."
 hungary_flavor.91.a:0 "Was für eine Zeit, um am Leben zu sein."
 
 hungary_flavor.92.t:0 "Miklós Horthy: Regent oder König"
 hungary_flavor.92.d:0 "Es ist kein Geheimnis, dass unser Regent Miklós Horthy seinen Sohn als Nachfolger wünscht und damit eine neue Herrscherdynastie in Ungarn begründet. Es gibt einige Befürworter, ihn zum König von Ungarn zu krönen, was die Regentschaft endgültig beenden würde, obwohl manche dies als undemokratischen Schritt ansehen. Werden wir seinen Anspruch auf den Thron unterstützen?"
 hungary_flavor.92.a:0 "Wir werden nicht dabei helfen, eine weitere Dynastie zu gründen."
 hungary_flavor.92.b:0 "Es lebe der König!"
 
 hungary_flavor.93.t:0 "Wiedereinstellung von Miklós Horthy"
 hungary_flavor.93.d:0 "Miklós Horthy wird wieder als Kommandant unserer neuen Marine eingesetzt. Die einzige Frage ist, welche Rolle er dabei spielen soll. Soll er wieder Admiral werden oder unsere Marinebemühungen lieber von hinten, als Chef der Marine, leiten?"
 hungary_flavor.93.a:0 "Horthy wird Chef der Marine."
 hungary_flavor.93.b:0 "Er wird als Admiral wieder eingesetzt."
 
 hungary_flavor.94.t:0 "Deutschland sagt Hilfe zu"
 hungary_flavor.94.d:0 "Deutschland hat sich nicht nur bereit erklärt, eine Delegation zu unserer Unterstützung zu entsenden, sondern auch zwei seiner Generäle als Anführer unserer Truppen abgestellt. Dies ist ein großer Erfolg und ein wichtiger Meilenstein in der Zusammenarbeit unserer Nationen."
 hungary_flavor.94.d_2:0 "Deutschland erklärte sich bereit, die von uns gewünschte Delegation zu entsenden. Ein Teil des Generalstabs wird nun die militärischen Bemühungen Ungarns leiten und unser Oberkommando unterstützen."
 hungary_flavor.94.a:0 "Wunderbare Neuigkeiten."
 hungary_flavor.94.b:0 "Wunderbare Neuigkeiten."
 hungary_flavor.94.tt:0 "Die Generäle Erwin von Witzleben und Wilhelm Ritter von Leeb werden sich zum Dienst melden."
 
 hungary_flavor.95.t:0 "Deutschland verweigert Hilfe"
 hungary_flavor.95.d:0 "Aus unerfindlichen Gründen lehnte Deutschland unsere Bitte um eine engere Zusammenarbeit ab. Wir werden uns bei der Koordination der Armee auf unseren eigenen Militärstab verlassen müssen."
 hungary_flavor.95.a:0 "Das ist, gelinde gesagt, enttäuschend."
 
 hungary_flavor.96.t:0 "Türkischer Truppenaustausch"
 hungary_flavor.96.d:0 "Die Türkei hat dem Truppenaustauschprogramm zugestimmt. Wir werden in Kürze die Brigaden begrüßen, die sie uns geschickt hat, und unsere Divisionen sind bereits auf dem Weg nach Istanbul."
 hungary_flavor.96.a:0 "Dies wird unsere Nationen einander noch näher bringen."
 hungary_flavor.96.tt:0 "Wir werden zwei Infanteriedivisionen aus der Türkei erhalten.\n"
 
 hungary_flavor.97.t:0 "Türkei lehnt Vorschlag zum Truppenaustausch ab"
 hungary_flavor.97.d:0 "Die türkische Regierung lehnte unser Angebot zum Truppenaustausch ab, wahrscheinlich aufgrund des Risikos, dem sie ihre Soldaten aussetzen würde. Vielleicht ist es das Beste, wenn wir beide bei unseren eigenen Armeen bleiben."
 hungary_flavor.97.a:0 "Sie haben sicherlich ihre Gründe."
 
 hungary_flavor.98.t:0 "Trianon-Beschränkungen aufgehoben"
 hungary_flavor.98.d:0 "Da wir nun Teil eines Bündnisses sind, kann niemand mehr die von den Alliierten nach dem Ersten Weltkrieg festgelegten Beschränkungen durchsetzen. Unsere Freunde werden unser Recht auf Bewaffnung schützen. Zwar könnten ausländische Mächte weiterhin versuchen, unsere Expansion zu behindern, doch zumindest gelten die technischen Beschränkungen des Vertrags nicht mehr."
 hungary_flavor.98.d_2:0 "Die militärischen Beschränkungen, die die Alliierten nach dem Ersten Weltkrieg erließen, sind längst vergessen, selbst von denen, die sie erließen. Im heutigen, sich ständig verändernden politischen Klima können solche Beschränkungen nicht mehr durchgesetzt werden. Zwar könnten ausländische Mächte weiterhin versuchen, unsere Expansion zu behindern, doch zumindest die technischen Beschränkungen des Vertrags gelten nicht mehr."
 hungary_flavor.98.a:0 "Gemeinsam sind wir stark."
 hungary_flavor.98.b:0 "Galten diese Einschränkungen noch? Mir ist das nicht aufgefallen."
 
 hungary_flavor.99.t:0 "Györi-Programm verstößt gegen Trianon-Beschränkungen"
 hungary_flavor.99.d:0 "Das von uns begonnene Rüstungsprogramm verstößt offen gegen die militärischen Beschränkungen, die die Alliierten in Trianon festgelegt haben. Wir dürfen weder Artillerie, Panzerfahrzeuge noch Flugzeuge erforschen oder herstellen. Wir könnten versuchen, diese Grenzen einzuhalten und das Programm trotzdem fortzusetzen, aber das würde unsere Bemühungen deutlich verlangsamen."
 hungary_flavor.99.a:0 "Wir werden die Beschränkungen offen missachten."
 hungary_flavor.99.b:0 "Führen Sie die eingeschränkte Forschung im Geheimen durch."
 hungary_flavor.99.c:0 "Wir geben unser Bestes, innerhalb der Grenzen zu bleiben."
 hungary_flavor.99.tt:0 "Der Fortschritt des Györi-Programms wird leicht behindert."
 
 hungary_flavor.100.t:0 "Die Visegrád-Gruppe"
 hungary_flavor.100.d_both:0 "Erfolg! Sowohl die Tschechoslowakei als auch Polen haben sich bereit erklärt, der Visegrád-Gruppe beizutreten. Dies ist der Beginn einer fruchtbaren Allianz."
 hungary_flavor.100.d_cze:0 "Nur die Tschechoslowakei erklärte sich bereit, unserem Bündnis beizutreten. Dennoch wird die Fraktion gebildet, wenn auch nur mit zwei Gründungsmitgliedern."
 hungary_flavor.100.d_pol:0 "Nur Polen hat sich bereit erklärt, unserem Bündnis beizutreten. Dennoch wird die Fraktion gebildet, wenn auch nur mit zwei Gründungsmitgliedern."
 hungary_flavor.100.d_neither:0 "Katastrophe! Weder die Tschechoslowakei noch Polen sind dem vorgeschlagenen Bündnis beigetreten. Wir sind in unserem Kampf allein."
 hungary_flavor.100.a:0 "Das Visegrád-Dreieck ist stark."
 hungary_flavor.100.b:0 "Wir werden ein starkes Bündnis mit der Tschechoslowakei aufbauen."
 hungary_flavor.100.c:0 "Zumindest unsere polnischen Freunde sind bereit, mitzumachen."
 hungary_flavor.100.e:0 "Es scheint, als sei diese Allianz gestorben, bevor sie entstehen konnte."
 
 hungary_flavor.101.t:0 "Baltische Expansion der Visegrád-Gruppe"
 hungary_flavor.101.d_all:0 "Die Erweiterung ist ein voller Erfolg! Alle drei Kandidaten haben die Einladung angenommen. Das ist ein Grund zum Feiern."
 hungary_flavor.101.d_some:0 "Die baltische Erweiterung war ein Teilerfolg. Wir konnten zwar nicht alle baltischen Staaten zum Beitritt bewegen, aber das Bündnis erweitert sich dennoch."
 hungary_flavor.101.d:0 "Die baltische Erweiterung war ein Teilerfolg. Wir konnten zwar nicht alle baltischen Staaten zum Beitritt bewegen, aber das Bündnis erweitert sich dennoch."
 hungary_flavor.101.d_none:0 "Die baltischen Staaten haben unsere Anfrage allesamt abgelehnt. Es scheint, dass wir uns anderswo umsehen müssen, wenn wir das Bündnis noch erweitern wollen."
 hungary_flavor.101.a:0 "Begrüßen wir die neuen Mitglieder."
 hungary_flavor.101.b:0 "Begrüßen wir die neuen Mitglieder."
 hungary_flavor.101.c:0 "Ein enttäuschendes Ergebnis."
 
 hungary_flavor.102.t:0 "Föderalisierung Österreich-Ungarns"
 hungary_flavor.102.d:0 "Die Entscheidung ist gefallen. Österreich-Ungarn wird in eine Föderation mit sechs Mitgliedsstaaten umgewandelt: Österreich, Ungarn, Böhmen, Galizien-Lodomerien, Siebenbürgen und Jugoslawien. Einige Staaten werden, wo ethnische Grenzen es erfordern, in Unterteilungen unterteilt, doch größtenteils werden dies die selbstverwalteten Regionen der Föderation sein. Alle Staaten werden ernannte Vertreter haben, die an einem Rat teilnehmen, der vom Monarchen beaufsichtigt wird."
 hungary_flavor.102.d_no_galicia:0 "Die Entscheidung ist gefallen. Österreich-Ungarn wird in eine Föderation mit fünf Mitgliedsstaaten umgewandelt: Österreich, Ungarn, Böhmen, Siebenbürgen und Jugoslawien. Einige Staaten werden, sofern ethnische Grenzen dies erfordern, in Unterteilungen unterteilt, doch größtenteils werden dies die autonomen Regionen der Föderation sein. Alle Staaten werden ernannte Vertreter haben, die in einem Rat vertreten sind, der vom Monarchen überwacht wird."
 hungary_flavor.102.a:0 "Der Name der Gemeinschaft lautet „Österreichisch-Ungarischer Bund“."
 hungary_flavor.102.b:0 "Der Name lautet Donaubund."
 hungary_flavor.102.c:0 "Nennen wir es die Vereinigten Staaten von Großungarn."
 
 hungary_flavor.103.t:0 "Albanien will unserer Fraktion beitreten"
 hungary_flavor.103.d:0 "Nach der erfolgreichen Teilung Jugoslawiens hat sich Albanien mit der Bitte an uns gewandt, unserer Fraktion beizutreten. Vielleicht missverstanden sie unsere Großzügigkeit gegenüber Montenegro als Zeichen der Freundschaft. Wir müssen uns jedenfalls mit ihrer Bitte auseinandersetzen. Wie lautet unsere Antwort?"
 hungary_flavor.103.a:0 "Wir werden ihre Anfrage annehmen."
 hungary_flavor.103.b:0 "Reicht es nicht, dass wir ihnen Montenegro gegeben haben?"
 
 hungary_flavor.104.t:0 "Deutschland bietet Karpatenruthenien an"
 hungary_flavor.104.d:0 "Deutschland hat Böhmen annektiert, und der tschechoslowakische Staat zerfällt. Für die Karpatenruthenien gibt es keine konkreten Pläne, sodass wir dort einfach einmarschieren könnten, ohne dass es zu ernsthaften Konsequenzen käme. Wir könnten das kleine Gebiet selbstverwalten, doch seine Einnahme wäre ein wichtiger Schritt zur Rückeroberung unseres alten Territoriums."
 hungary_flavor.104.a:0 "Annex Karpatenruthenien."
 hungary_flavor.104.b:0 "Grenzen sind uns egal."
 
 hungary_flavor.105.t:0 "Italienische Allianz"
 hungary_flavor.105.d:0 "Nach Abschluss der Jugoslawien-Konferenz wandten sich italienische Botschafter mit einem Vorschlag an unsere Delegation: Im Gegenzug für die Aufgabe ihrer Ansprüche in Jugoslawien seien sie bereit, unserem Bündnis beizutreten und ihre Kräfte mit uns zu bündeln."
 hungary_flavor.105.a:0 "Heißen Sie sie in unserer Fraktion willkommen."
 hungary_flavor.105.b:0 "Lehnen Sie ihre Initiative höflich ab."
 
 hungary_flavor.106.t:0 "Ungarisch-Slowakischer Kleinkrieg"
 hungary_flavor.106.d:0 "Unsere Grenzen zur Slowakei waren nach der Annexion Karpatenrutheniens nicht mehr klar definiert. Um das Ung-Tal zu sichern, starteten unsere Truppen eine Offensive gegen die Slowakei von Westen her und erlitten dabei nur minimale Verluste. Die Slowaken zogen sich aus der Region zurück, starteten aber kurz darauf einen Gegenangriff und eroberten einen Teil des verlorenen Gebiets zurück. Das gesamte Gefecht dauerte mehrere Tage und endete mit mehreren Dutzend Toten auf beiden Seiten. Dennoch können wir dies als Erfolg werten und in Propagandaartikeln positiv darstellen."
 hungary_flavor.106.a:0 "Ein großer Erfolg für unsere Nation."
 
 hungary_flavor.107.t:0 "Tschechoslowakei lässt Referendum zu"
 hungary_flavor.107.d:0 "Die Tschechoslowakei hat dem vorgeschlagenen Referendum zugestimmt. Die Menschen in der Südslowakei können endlich entscheiden, wohin sie gehören möchten."
 hungary_flavor.107.a:0 "Hoffen wir auf positive Ergebnisse."
 
 hungary_flavor.108.t:0 "Tschechoslowakei lehnt Referendum ab"
 hungary_flavor.108.d:0 "Die Tschechoslowakei lehnte es ab, das Referendum für die Südslowakei auszurichten. Die Beziehungen zwischen unseren Ländern haben sich nicht verschlechtert, doch dies wird in Zukunft zwangsläufig einen Keil zwischen uns treiben."
 hungary_flavor.108.a:0 "Sie können uns unser Recht darauf nicht für immer verweigern."
 hungary_flavor.108.b:0 "Nutzen Sie unseren Einfluss in der Fraktion, um das Referendum zu erzwingen."
 
 hungary_flavor.109.t:0 "Jugoslawien tritt der Visegrád-Gruppe bei"
 hungary_flavor.109.d:0 "Nach der Gründung der Visegrád-Gruppe war zunächst fraglich, ob das Bündnis stark genug wäre, sich selbst zu verteidigen, geschweige denn seinen Einfluss auszuweiten. Jugoslawien hat kürzlich seinen Beitritt zur Gruppe angekündigt und damit seinen Einfluss in der Region massiv gestärkt. Damit ist die Visegrád-Gruppe nicht länger nur ein kleiner Staatenpakt, sondern eine ernstzunehmende Kraft auf dem europäischen Spielfeld."
 hungary_flavor.109.a:0 "Ein durchschlagender Erfolg für die Allianz."
 
 hungary_flavor.110.t:0 "Jugoslawien lehnt Einladung ab"
 hungary_flavor.110.d:0 "Die Verhandlungen mit Jugoslawien scheiterten. Es ist uns nicht gelungen, das Land zu einem Beitritt zur Visegrád-Gruppe zu bewegen, und so bleibt unser Einfluss auf dem Balkan begrenzt."
 hungary_flavor.110.a:0 "Sie wissen nicht, was ihnen entgeht."
 
 hungary_flavor.111.t:0 "Jugoslawien stimmt Grenzänderungen zu"
 hungary_flavor.111.d:0 "Während der Verhandlungen mit Jugoslawien wurde vereinbart, dass das ungarische Volk auf ungarischem Boden bleiben müsse. Es gelang uns, zu klären, welche Gebiete Teil Jugoslawiens bleiben und welche wieder zu Ungarn gehören sollten. Wir haben wichtige Gebiete mit einem bedeutenden Anteil ungarischer Bevölkerung zurückgewonnen."
 hungary_flavor.111.a:0 "Und dennoch musste kein Blut vergossen werden."
 
 hungary_flavor.112.t:0 "Jugoslawien stimmt einer teilweisen Grenzänderung zu"
 hungary_flavor.112.d:0 "Die Verhandlungen waren für beide Seiten von zahlreichen Argumenten geprägt, und schließlich wurde ein Kompromiss erzielt. Ein Teil der ungarischen Bevölkerung sollte auf ungarischen Boden umgesiedelt werden, und das Gebiet von Prekmurje sollte Ungarn zufallen. Das ist zwar nicht ganz das, was wir uns erhofft hatten, aber zumindest war die Mühe nicht ganz umsonst."
 hungary_flavor.112.a:0 "Dennoch eine faire Vereinbarung."
 
 hungary_flavor.113.t:0 "Jugoslawien weigert sich, Grenzen zu ändern"
 hungary_flavor.113.d:0 "Die jugoslawische Regierung machte deutlich, dass eine Gebietsabtretung nicht in Frage käme. Sie werde keine Zugeständnisse machen und die Souveränität ihres Landes mit allen Mitteln verteidigen. Die Verhandlungen führten zu keinem Ergebnis."
 hungary_flavor.113.a:0 "Eine Verschwendung von Mühe."
 
 hungary_flavor.114.t:0 "Deutschland bietet den Rest der Vojvodina an"
 hungary_flavor.114.d:0 "Wir besitzen bereits die Batschka, die Region mit den meisten Ungarn in der Vojvodina, aber Deutschland hat uns als Zeichen des guten Willens den Rest angeboten. Werden wir ihr Angebot annehmen?"
 hungary_flavor.114.a:0 "Natürlich."
 hungary_flavor.114.b:0 "Wir brauchen diese Länder nicht."
 
 hungary_flavor.115.t:0 "Treffen in Berlin"
 hungary_flavor.115.d:0 "Hitler hat ein Treffen mit unserem Regenten Miklós Horthy in Berlin vereinbart, um eine wichtige Angelegenheit zu besprechen. Er möchte die Tschechoslowakei mit Ungarn teilen und möchte wissen, welche Rolle Ungarn dabei spielen würde. Sollten wir die Rolle des Aggressors spielen, könnte er uns sogar die gesamte Slowakei überlassen, aber wir könnten uns auch mit weniger zufrieden geben, wenn wir wollten."
 hungary_flavor.115.a:0 "Wir wollen damit nichts zu tun haben."
 hungary_flavor.115.b:0 "Wir werden uns mit der Karpaten-Russland-Region zufrieden geben."
 hungary_flavor.115.c:0 "Wir bieten volle Zusammenarbeit an, wenn sie uns die Slowakei geben."
 
 hungary_flavor.116.t:0 "Hitler kommt unserer Bitte nach"
 hungary_flavor.116.d:0 "Das Treffen ist beendet, und Horthy hat sich mit Hitler auf die Bedingungen unserer Beteiligung an der Teilung der Tschechoslowakei geeinigt. Wir sollten nun Vorbereitungen treffen, um unseren Teil der Abmachung zu erfüllen."
 hungary_flavor.116.a:0 "Ein erfolgreiches Meeting."
 
 hungary_flavor.117.t:0 "Ergebnisloses Treffen"
 hungary_flavor.117.d:0 "Nach langen Diskussionen konnte keine Einigung darüber erzielt werden, was Ungarn nach der Teilung erhalten würde. Hitler machte keine Versprechungen hinsichtlich unserer Gebietsgewinne."
 hungary_flavor.117.a:0 "Wir hoffen weiterhin auf das beste Ergebnis."
 
 hungary_flavor.118.t:0 "Finnland akzeptiert Bündnis"
 hungary_flavor.118.d:0 "Finnland hat das von uns vorgeschlagene Bündnis eilig unterzeichnet. Nun erwartet man von uns, dass wir der Sowjetunion unverzüglich den Krieg erklären und bei der Verteidigung des Landes helfen."
 hungary_flavor.118.a:0 "Gemeinsam werden wir die Kommunisten besiegen!"
 
 hungary_flavor.119.t:0 "Finnland lehnt Bündnis ab"
 hungary_flavor.119.d:0 "Überraschenderweise hat Finnland unseren Vorschlag abgelehnt und damit die Möglichkeit einer Hilfe durch unser Bündnis ausgeschlossen. Finnland ist nun dem Untergang geweiht, denn es kann die Sowjetunion nicht allein aufhalten."
 hungary_flavor.119.a:0 "Ohne uns werden sie zugrunde gehen."
 
 hungary_flavor.120.t:0 "Frieden mit Großbritannien"
 hungary_flavor.120.d:0 "Wir haben nun alles erreicht, was wir uns vorgenommen hatten: Unsere Grenzen wurden wiederhergestellt. Großbritannien glaubte, unsere Expansion durch eine Kriegserklärung eindämmen zu können, und ist damit offensichtlich gescheitert. Ein langwieriger Krieg könnte uns jedoch genauso schaden wie ihnen, daher könnte es für uns von Vorteil sein, Frieden mit ihnen zu suchen. Sie haben Wichtigeres zu tun, und wir sind zufrieden mit dem Erreichten."
 hungary_flavor.120.a:0 "Senden Sie das Friedensangebot."
 hungary_flavor.120.b:0 "Wir sind mit diesem Krieg noch nicht fertig."
 
 hungary_flavor.121.t:0 "Großbritannien akzeptiert"
 hungary_flavor.121.d:0 "Das Vereinigte Königreich hat unser Friedensangebot angenommen. Wir haben alle Gebiete zurückgegeben, die wir nicht beansprucht hatten, und mit dem Vereinigten Königreich und seinen Verbündeten einen Friedensvertrag unterzeichnet, der den Vertrag von Trianon offiziell für ungültig erklärt."
 hungary_flavor.121.a:0 "Endlich Frieden."
 
 hungary_flavor.122.t:0 "Der Krieg geht weiter"
 hungary_flavor.122.d:0 "Großbritannien hat unsere Friedensbedingungen abgelehnt, und so geht der Krieg weiter, als wäre nichts geschehen. Es scheint, als müssten wir konventionellere Mittel einsetzen, um sie zum Aufhören zu bewegen."
 hungary_flavor.122.a:0 "Sie werden es bereuen, den Frieden jetzt nicht unterzeichnet zu haben."
 
 hungary_flavor.123.t:0 "Slowakische Selbstverwaltung"
 hungary_flavor.123.d:0 "Wir haben nun alle slowakischen Ländereien erworben, und obwohl sie ursprünglich zu [Root.GetName] gehörten, gibt es Stimmen, die die Gründung einer slowakischen Regierung vorschlagen, die uns zwar weiterhin Rechenschaft schuldig wäre, aber ein gewisses Maß an Unabhängigkeit hätte. Wir könnten frei entscheiden, welche Ländereien diese neue Slowakei erhalten soll, sodass wir alle Ländereien behalten könnten, die überwiegend von Ungarn bewohnt werden."
 hungary_flavor.123.a:0 "Wir werden keine neue Regierung bilden."
 hungary_flavor.123.b:0 "Errichten Sie die gesamte Slowakei als Marionettenstaat."
 hungary_flavor.123.c:0 "Errichtung der Nordslowakei als Marionettenstaat."
 
 hungary_flavor.124.t:0 "Ansprüche an Jugoslawien"
 hungary_flavor.124.d:0 "Nachdem wir nun den Freundschaftspakt mit Jugoslawien unterzeichnet haben, ist es an der Zeit, unsere Gebietsansprüche gegenüber Jugoslawien zu prüfen. Wir könnten als Zeichen der Freundschaft auf alle Ansprüche verzichten oder an unseren Ansprüchen auf ungarisch bewohntes Land festhalten, in der Hoffnung auf eine künftige Einigung mit Jugoslawien."
 hungary_flavor.124.a:0 "Wir werden auf alle Ansprüche gegenüber Jugoslawien verzichten."
 hungary_flavor.124.b:0 "Wir wollen weiterhin die Gebiete, in denen eine ungarische Mehrheit lebt."
 hungary_flavor.124.c:0 "Auf Ansprüche verzichten wir nicht." 
 
 hungary_flavor.125.t:0 "Forderungen an Kroatien"
 hungary_flavor.125.d:0 "Kroatien ist nach der Abspaltung von Jugoslawien nun ein eigenständiger Staat. Zwar haben wir weiterhin Gebietsansprüche gegenüber dem Land, doch wäre es möglicherweise klug, diese Ansprüche aufzugeben und stattdessen eine Freundschaft mit Kroatien anzustreben."
 hungary_flavor.125.a:0 "Wir verzichten auf sämtliche Ansprüche gegenüber Kroatien."
 hungary_flavor.125.b:0 "Wir behalten alle Ansprüche gegenüber Kroatien bei."
 
 hungary_flavor.126.t:0 "Die Zweite Ungarische Republik"
 hungary_flavor.126.d:0 "Heute hat [ROOT.GetLeader] offiziell die Abschaffung der ungarischen Monarchie verkündet. Das Land war lange Zeit ohne König oder Königin, und die langen Jahre der Regentschaft haben die Nation geschwächt. Von diesem Tag an wird das ungarische Volk seine eigene Führung demokratisch wählen."
 hungary_flavor.126.a:0 "Es lebe die Republik!"
 
 hungary_flavor.127.t:0 "Kampf um Siebenbürgen"
 hungary_flavor.127.d:0 "Rumänien hat im aktuellen Konflikt Partei ergriffen und befindet sich nun im Krieg mit den Alliierten. Wenn wir wollten, könnten wir Rumänien unsere Hilfe anbieten, im Gegenzug für das Versprechen, dass wir am Ende des Krieges Siebenbürgen erhalten. Das ist ein riskanter Vorschlag, da die Engländer unsere territoriale Revision nicht gerade unterstützen. Sollten sie jedoch zustimmen, könnten wir am Ende ganz Siebenbürgen an unser Land zurückgeben."
 hungary_flavor.127.a:0 "Bieten Sie unsere Hilfe im Gegenzug für Transsilvanien an."
 hungary_flavor.127.b:0 "Versuchen Sie, so lange wie möglich neutral zu bleiben."
 
 hungary_flavor.128.t:0 "Großbritannien lehnt Hilfe ab"
 hungary_flavor.128.d:0 "Unser Vorschlag stieß auf Widerstand im Vereinigten Königreich. Sie wollen unsere Hilfe nicht, wenn wir dafür Transsilvanien bekommen."
 hungary_flavor.128.a:0 "Davon hätten wir beide profitieren können."
 
 hungary_flavor.129.t:0 "Österreich tritt der Visegrád-Gruppe bei"
 hungary_flavor.129.d:0 "Die Visegrád-Gruppe hat ein neues Mitglied: Österreich. Alle Verträge wurden unterzeichnet, und Österreich ist nun vollwertiges Mitglied der Fraktion."
 hungary_flavor.129.a:0 "Heißen wir sie willkommen."
 
 hungary_flavor.130.t:0 "Österreich lehnt Bündnisangebot ab"
 hungary_flavor.130.d:0 "Österreich hat unsere Hilfe abgelehnt. Es möchte nicht Teil der Visegrád-Gruppe sein. Es wird zweifellos bald im internationalen Chaos untergehen, wenn es sich nicht der einen oder anderen Fraktion anschließt."
 hungary_flavor.130.a:0 "Wirklich schade."
 
 hungary_flavor.131.t:0 "Rumänien stimmt der Abtretung der südlichen Dobrudscha zu"
 hungary_flavor.131.d:0 "Obwohl wir mehr erreichen wollten, gelang es uns in den Verhandlungen mit Rumänien nur, den südlichen Teil der Dobrudscha für Bulgarien zu sichern. Den Rest werden wir irgendwann bekommen, selbst wenn wir ihn Rumänien mit Krieg entreißen müssen."
 hungary_flavor.131.a:0 "Damit müssen wir uns vorerst zufrieden geben."
 
 hungary_flavor.132.t:0 "Rumänien erklärt sich bereit, die gesamte Dobrudscha abzutreten"
 hungary_flavor.132.d:0 "Rumänien hat endlich unseren Forderungen nachgegeben. Bulgarien ist nun Eigentümer der gesamten Dobrudscha, was die Zahl der in Rumänien lebenden ethnischen Bulgaren stark reduziert hat."
 hungary_flavor.132.a:0 "Und niemand musste verletzt werden."
 
 hungary_flavor.133.t:0 "Rumänien lehnt bulgarische Gebietsforderungen ab"
 hungary_flavor.133.d:0 "Rumänien verfügte über die Mittel, unsere Forderungen nach der Dobrudscha rundweg abzulehnen. Sie wollen Bulgarien keinen Zentimeter Boden überlassen. Wir werden sie zweifellos mit Waffengewalt vom Gegenteil überzeugen müssen."
 hungary_flavor.133.a:0 "Sie werden diese Entscheidung noch bereuen."
 
 hungary_flavor.134.t:0 "Griechenland akzeptiert Bündnisvorschlag"
 hungary_flavor.134.d:0 "Griechenland hat unser großzügiges Bündnisangebot angenommen. [ROOT.GetFactionName] ist nun um ein Mitglied stärker und die südlichen Ausläufer des Balkans stehen unter unserem Einfluss."
 hungary_flavor.134.a:0 "Wir werden stärker."
 
 hungary_flavor.135.t:0 "Griechenland lehnt Bündnisvorschlag ab"
 hungary_flavor.135.d:0 "Die schwache Nation Griechenland hat beschlossen, dem bevorstehenden Sturm allein zu trotzen. Sie hat unsere Einladung zu [ROOT.GetFactionName] abgelehnt."
 hungary_flavor.135.a:0 "Ohne uns werden sie bald zugrunde gehen."
 
 hungary_flavor.136.t:0 "Militärische Landvermessung"
 hungary_flavor.136.d:0 "Auf Befehl von [Root.GetLeader] hat das [Root.GetAdjective]-Militär eine landesweite Landvermessung durchgeführt und detaillierte Karten für die Militärführung erstellt. Die Karten enthalten detaillierte Informationen zu Straßen, Gebäuden, geografischen Merkmalen, Flüssen und Seen sowie allen anderen topografischen Merkmalen, die für das Militär von Bedeutung sind."
 hungary_flavor.136.a:0 "OK."
 
 hungary_flavor.137.t:0 "Deutschland strebt Zugang über ungarische Gebiete nach Polen an"
 hungary_flavor.137.d:0 "Deutschland befindet sich im Krieg mit Polen und möchte eine neue Front im Konflikt eröffnen, indem es Polen über unser Land angreift. Wir könnten uns weigern, aber vielleicht wäre es besser, sich auf die Seite der Sieger zu stellen und die deutschen Truppen einfach passieren zu lassen."
 hungary_flavor.137.a:0 "Lass sie durch."
 hungary_flavor.137.b:0 "Wir werden unsere polnischen Freunde nicht verraten."
 
 hungary_flavor.138.t:0 "Polnische Flüchtlinge"
 hungary_flavor.138.d:0 "Polen verliert täglich an Boden gegenüber den Deutschen, und der Krieg scheint bereits entschieden. Einige polnische Truppen können sich nicht mehr durch andere Staaten in neutrales Gebiet zurückziehen und baten daher darum, stattdessen unsere Grenzen zu passieren, um sich ihren Verbündeten anderswo anzuschließen. Ihnen die Durchreise zu gestatten, würde die Deutschen sicherlich verärgern, wäre aber eine ehrenhafte Geste, unseren polnischen Freunden zu helfen."
 hungary_flavor.138.a:0 "Lass sie rein."
 hungary_flavor.138.b:0 "Wir werden den Zorn der Deutschen nicht riskieren."
 
 hungary_flavor.139.t:0 "Die Zaolzie-Frage"
 hungary_flavor.139.d:0 "Einige unserer Berater haben vorgeschlagen, über die Übertragung von Zaolzie an Polen zu verhandeln. Da es sich um unsere Verbündeten handelt und das betreffende Gebiet unter unserem Einfluss steht, wäre dies sicherlich sinnvoll, da in der Region eine bedeutende polnische Minderheit lebt."
 hungary_flavor.139.a:0 "Zaolzie gehört zu Polen."
 hungary_flavor.139.b:0 "Die Dinge sind gut, so wie sie sind."
 
 hungary_flavor.140.t:0 "Deutschland stimmt dem Burgenland-Deal zu"
 hungary_flavor.140.d:0 "Unser Angebot wurde von der deutschen Regierung begrüßt. Wir werden ihr dringend benötigte Verstärkung schicken, im Gegenzug erhalten wir das Burgenland."
 hungary_flavor.140.a:0 "Tolle Neuigkeiten."
 
 hungary_flavor.141.t:0 "Deutschland lehnt Burgenland-Deal ab"
 hungary_flavor.141.d:0 "Die deutsche Regierung lehnte unseren Vorschlag ab. Es scheint, als würde sie lieber ihre unterbesetzte Armee leiden sehen, als ihren Stolz zu schlucken und uns das Burgenland zurückzugeben."
 hungary_flavor.141.a:0 "Ihr Stolz nützt ihnen jetzt wenig."
 
 hungary_flavor.142.t:0 "Österreich-Ungarn-Kroatien"
 hungary_flavor.142.d:0 "Die Trialistenverfassung wurde heute unterzeichnet und begründete damit offiziell die Gründung Österreich-Ungarn-Kroatiens. Der neue Staat hat drei Hauptstädte – Wien, Budapest und Zagreb – und wird von einem Monarchen regiert. Anhänger der Monarchie hoffen, dass dies das Land dauerhaft als funktionierenden Vielvölkerstaat festigen wird."
 hungary_flavor.142.a:0 "Es lebe der neue, trialistische Staat!"
 
 hungary_flavor.143.t:0 "[From.GetName] rächt sich!"
 hungary_flavor.143.d:0 "Die Gefechte in der Region Sobrance schienen beendet, doch heute haben die [From.GetAdjective] Streitkräfte entlang der gesamten Grenze Offensiven gestartet. Wenn es uns gelingt, diesen Krieg zu gewinnen, könnte uns die gesamte Slowakei gehören."
 hungary_flavor.143.a:0 "Zu den Waffen!"
 
 hungary_flavor.144.t:0 "Selbstverwaltung der Karpatenukraine"
 hungary_flavor.144.d:0 "Wir haben vor Kurzem die Region Karpatenukraine erworben. Dieses Land gehörte historisch zu [ROOT.GetName], seine Bevölkerung ist jedoch überwiegend ruthenisch. Lokale Vertreter haben den Wunsch nach Autonomie im Land geäußert, und eine Selbstverwaltung könnte zur Stabilität in der Region beitragen. Was sollen wir mit der Karpatenukraine tun?"
 hungary_flavor.144.a:0 "Wir werden keine neue Regierung bilden."
 hungary_flavor.144.b:0 "Errichten Sie die gesamte Karpatenukraine als Marionettenstaat."
 hungary_flavor.144.c:0 "Behalten Sie Berehovo, den Rest können sie haben."
 
 hungary_flavor.145.t:0 "Beitritt zur Slowakei und Karpatenruthenien"
 hungary_flavor.145.d:0 "Wir haben beschlossen, die Gebiete der Slowakei mit denen der Karpaten-Ruthenien zu vereinen. Es bleibt nur noch zu entscheiden, ob wir die gesamte Karpaten-Ruthenien oder nur die nördlichen Teile abtreten."
 hungary_flavor.145.a:0 "Die Slowakei erhält die gesamte Karpatenukraine."
 hungary_flavor.145.b:0 "Die Slowakei erhält die nördlichen Teile der Karpatenukraine."
 
 hungary_flavor.146.t:0 "Mögliche Union zwischen der Slowakei und der Karpatenukraine"
 hungary_flavor.146.d:0 "Unsere beiden Marionettenregierungen in den Nordkarpaten, der Slowakei und der Karpatenukraine haben viel gemeinsam. Einige haben vorgeschlagen, die beiden Staaten zu einem einzigen zu verschmelzen, um ihre Macht zu festigen."
 hungary_flavor.146.a:0 "Die beiden Staaten sollen getrennt bleiben."
 hungary_flavor.146.b:0 "Vereinigen Sie die Karpatenukraine mit der Slowakei."
 
 hungary_flavor.147.t:0 "Der Sobrance-Streit"
 hungary_flavor.147.d:0 "Die kleine Region Sobrance liegt zwischen der Slowakei und der Karpatenukraine. In jüngster Zeit kam es zwischen beiden Ländern zu Spannungen über die Frage, wem das Land gehören soll. Wir haben das letzte Wort, da beide Länder unter unserer Verwaltung stehen."
 hungary_flavor.147.a:0 "Sobrance bleibt in der Slowakei."
 hungary_flavor.147.b:0 "Wir werden es der Karpatenukraine geben."
 hungary_flavor.147.c:0 "Sobrance bleibt bei der Karpatenukraine."
 hungary_flavor.147.e:0 "We will give it to Slovakia.
 
 hungary_flavor.148.t:0 "Siebenbürgische Selbstverwaltung"
 hungary_flavor.148.d:0 "Wir haben nun die Kontrolle über ganz Siebenbürgen. Die Region ist historisch Teil von [ROOT.GetName], genoss aber immer eine gewisse Autonomie. Während der türkischen Herrschaft war die Region ein eigenständiges Land, das sich zeitweise mit Österreich verbündete und zeitweise den Osmanen diente. Die lokale Bevölkerung wäre auch heute noch froh über eine eigene Regierung."
 hungary_flavor.148.a:0 "Wir werden keine neue Regierung bilden."
 hungary_flavor.148.b:0 "Machen Sie Siebenbürgen zu einem Marionettenstaat."
 hungary_flavor.148.c:0 "Errichten Sie Siebenbürgen als Marionettenstaat, behalten Sie aber das Banat und das Partium."
 
 hungary_flavor.149.t:0 "Italien akzeptiert"
 hungary_flavor.149.d:0 "Italien hat sich bereit erklärt, die Adria-Initiative zu unterzeichnen. Wir haben nun Zugriff auf einen Teil der italienischen Marineausrüstung und -technologie, sind aber auch verpflichtet, Italien bei der Verteidigung der Adria zu unterstützen."
 hungary_flavor.149.a:0 "Exzellent."
 
 hungary_flavor.150.t:0 "Italien lehnt ab"
 hungary_flavor.150.d:0 "Italien weigerte sich, an der Adria-Initiative teilzunehmen. Offenbar wollen sie nicht, dass wir eine stärkere Marine bekommen, selbst wenn ihnen das die Adria sichern würde."
 hungary_flavor.150.a:0 "Schade."
 
 hungary_flavor.151.t:0 "Eingriff in die Adria"
 hungary_flavor.151.d:0 "Uns liegen Berichte vor, wonach italienische Schiffe in der Adria mit einem ihrer Feinde in Konflikt geraten. Dies bedeutet, dass wir gemäß der Adria-Initiative verpflichtet sind, uns ihnen im Kampf anzuschließen."
 hungary_flavor.151.a:0 "Wir werden den Vertrag einhalten."
 hungary_flavor.151.b:0 "Ich schätze, wir könnten diese Schiffe einfach ignorieren."
 
 hungary_flavor.152.t:0 "Polen weigert sich, den Warschauer Pakt zu unterzeichnen"
 hungary_flavor.152.d:0 "Polen hat sich überraschend geweigert, an einem Bündnis mit unseren guten sowjetischen Genossen teilzunehmen. Vielleicht planen sie, eine eigene Fraktion zu gründen? Jedenfalls haben wir unser Bestes getan, um unsere polnischen Freunde zu schützen. Jetzt sind sie auf sich allein gestellt."
 hungary_flavor.152.a:0 "Sie wollen allein gegen die Kapitalisten und Faschisten stehen?"
 
 hungary_flavor.153.t:0 "Die Sowjetunion weigert sich, den Warschauer Pakt zu unterzeichnen"
 hungary_flavor.153.d:0 "Obwohl Polen das neue Bündnis uneingeschränkt unterstützte, lehnten die Sowjets es mit der Begründung ab, die polnischen Arbeiter hätten die Revolution noch nicht wirklich angenommen. Mit der Zeit werden sie in die Gemeinschaft aufgenommen, aber nicht durch einen „Warschauer Pakt“. Trotz aller Bemühungen bleiben unsere polnischen Freunde in dieser Welt der Kapitalisten und Faschisten allein."
 hungary_flavor.153.a:0 "Wir haben alles versucht, um Genosse [SOV.GetLeader] zu überzeugen."
 
 hungary_flavor.154.t:0 "Die Sowjets stimmen der Unterstützung polnischer Kommunisten zu"
 hungary_flavor.154.d:0 "Die sowjetische Führung hat sich bereit erklärt, eine halbunabhängige, kommunistische polnische Regierung zu bilden. Dies könnte der erste Schritt zur Gründung einer neuen Allianz osteuropäischer Kommunisten sein."
 hungary_flavor.154.a:0 "Unsere polnischen Freunde werden das in sie gesetzte Vertrauen mit Sicherheit verdienen."
 
 hungary_flavor.155.t:0 "Die Sowjets verweigern den polnischen Kommunisten die Unterstützung"
 hungary_flavor.155.d:0 "Die Sowjets antworteten, sie hätten andere Pläne für Polen und würden keine autonome Regierung bilden. Es scheint, als sei die Zeit für unsere polnischen Freunde noch nicht gekommen, ihr Schicksal selbst in die Hand zu nehmen."
 hungary_flavor.155.a:0 "Dann müssen sie sich mit der sowjetischen Führung zufrieden geben."
 
 hungary_flavor.156.t:0 "Politische Unterstützung für die deutschen Royalisten"
 hungary_flavor.156.d:0 "Unsere Pläne für einen monarchistischen Putsch in Deutschland nehmen langsam Gestalt an. Wir sollten nun entscheiden, welche Rolle wir bei dem Aufstand spielen wollen. Werden wir ihre Sache auf internationaler Ebene unterstützen oder geheim halten? Wir könnten uns auch dazu entschließen, sie sich selbst zu überlassen und zu hoffen, dass sie aus eigener Kraft Erfolg haben."
 hungary_flavor.156.a:0 "Wir versuchen, uns nicht selbst zu belasten."
 hungary_flavor.156.b:0 "Lassen Sie sie heimlich wissen, dass wir sie unterstützen."
 hungary_flavor.156.c:0 "Unterstützen Sie sie offen."
 
 hungary_flavor.157.t:0 "Waffen für die deutschen Royalisten"
 hungary_flavor.157.d:0 "Der Putsch für den deutschen Kaiser schreitet gut voran, doch derzeit sind die Royalisten völlig unzureichend ausgerüstet. Wir könnten versuchen, Abhilfe zu schaffen, indem wir einige unserer Fabriken mit Ausrüstung für den Fall eines bewaffneten Konflikts zwischen den Royalisten und der Regierung lagern."
 hungary_flavor.157.a:0 "Wir verfügen nicht über die Überproduktion, um sie zu unterstützen."
 hungary_flavor.157.b:0 "Legen Sie einen Vorrat an Ausrüstung für sie an."
 hungary_flavor.157.c:0 "Dies hat für uns oberste Priorität. Wir werden ihnen alles geben, was wir können."
 
 hungary_flavor.158.t:0 "Unterstützung der deutschen Royalisten bei der Organisation des Aufstands"
 hungary_flavor.158.d:0 "Der Putsch des Kaisers ist fast bereit. Jetzt müssen nur noch die genauen Details des Aufstands geplant werden: Wo werden sich die royalistischen Kräfte in den ersten Tagen der Revolution konzentrieren, welche Schlüsselpositionen sollten zuerst gesichert werden usw. Wir können sie bei diesen Plänen kaum unterstützen, aber wir können dennoch einen Beitrag leisten. Es wäre einfacher für sie, Gebiete zu besetzen, wenn die lokale Bevölkerung keinen Widerstand leistete. Wir könnten ihnen dann bei der Verbreitung von Propaganda helfen. Wir könnten die Vorbereitungen auch direkt unterstützen, indem wir Geheimagenten entsenden, um Infrastruktureinrichtungen zu sabotieren, auf die die Regierung angewiesen ist, und die Rebellen mit Informationen versorgen."
 hungary_flavor.158.a:0 "Sie müssen dies selbst planen."
 hungary_flavor.158.b:0 "Helfen Sie ihnen, Propagandamaterial zu verbreiten."
 hungary_flavor.158.c:0 "Platzieren Sie verdeckte Ermittler im ganzen Land, um den Royalisten zu helfen."
 
 hungary_flavor.159.t:0 "Versprechen militärischer Hilfe für die deutschen Royalisten"
 hungary_flavor.159.d:0 "Die Pläne für den kaiserlichen Putsch sind fertig, die Rebellen warten nur noch auf den richtigen Zeitpunkt für den Aufstand. Wir müssen uns nur noch entscheiden, ob wir ihnen im bewaffneten Konflikt direkt helfen oder uns mit der Unterstützung zufrieden geben, die wir ihnen gewährt haben."
 hungary_flavor.159.a:0 "Wir können nichts versprechen."
 hungary_flavor.159.b:0 "Wir werden ihnen zur Seite stehen, wenn die Zeit gekommen ist."
 
 hungary_flavor.160.t:0 "Hilfe beim Putsch des Kaisers"
 hungary_flavor.160.d:0 "Der Putsch des Kaisers hat begonnen! Royalistische Deutsche im ganzen Land haben sich unter der Flagge des alten Deutschen Reiches versammelt, um für den Kaiser zu kämpfen. Und es ist an der Zeit, unser Versprechen einzulösen und uns dem Kampf anzuschließen."
 hungary_flavor.160.a:0 "Gemeinsam werden wir Deutschland seinen alten Glanz zurückgeben!"
 
 hungary_flavor.161.t:0 "Rüstungsvereinigung des Warschauer Pakts"
 hungary_flavor.161.d:0 "Die militärischen Führer der Warschauer-Pakt-Staaten haben sich heute darauf geeinigt, alle Arten von Waffen, Fahrzeugen und Munition zu standardisieren, um den Mitgliedern die Zusammenarbeit bei der Herstellung und Nutzung von Ausrüstung aus anderen Warschauer-Pakt-Staaten zu erleichtern."
 hungary_flavor.161.a:0 "Ein lohnender Aufwand."
 
 hungary_flavor.162.t:0 "[SOV.GetName] stimmt der Teilung Rumäniens zu"
 hungary_flavor.162.d:0 "Die [SOV.GetAdjective]-Führung hat unseren Vorschlag, Rumänien unter uns aufzuteilen, begrüßt. Die Demarkationslinie zwischen den besetzten Gebieten ist vereinbart, und die Angriffspläne sind koordiniert. Sobald wir bereit sind, können wir den Angriff starten, und sie werden dasselbe tun."
 hungary_flavor.162.a:0 "Exzellent."
 
 hungary_flavor.163.t:0 "[SOV.GetName] lehnt Angebot zur Teilung Rumäniens ab"
 hungary_flavor.163.d:0 "[SOV.GetNameDef] lehnte unseren Vorschlag ab, gleichzeitig Rumänien anzugreifen. Möglicherweise wollen sie nicht, dass wir so viel Territorium gewinnen, oder sie haben ganz andere Pläne für Rumänien."
 hungary_flavor.163.a:0 "Schade. Das hätte es für alle einfacher gemacht."
 
 hungary_flavor.164.t:0 "[SOV.GetName] greift Rumänien an"
 hungary_flavor.164.d:0 "Die [SOV.GetAdjective]-Truppen haben mit der Invasion Rumäniens begonnen. Wir müssen diesem Beispiel folgen, sonst könnte die Gelegenheit vertan sein."
 hungary_flavor.164.a:0 "Wir dürfen keine Zeit verlieren. Wir müssen angreifen, während sie abgelenkt sind."
 
 hungary_flavor.165.t:0 "Einhaltung der Partitionsvereinbarung mit [SOV.GetNameDef]"
 hungary_flavor.165.d:0 "Rumänien ist zerschlagen, und es ist Zeit, die Beute aufzuteilen. Uns gehört ein Teil des Landes, das [SOV.GetNameDef] versprochen wurde. Werden wir die Vereinbarung einhalten und es übergeben oder werden wir daran festhalten?"
 hungary_flavor.165.a:0 "Selbstverständlich werden wir die Vereinbarung einhalten."
 hungary_flavor.165.b:0 "Wenn wir es uns noch einmal überlegen, werden wir behalten, was wir haben."
 
 hungary_flavor.166.t:0 "[SOV.GetName] missachtet die Teilungsvereinbarung"
 hungary_flavor.166.d:0 "[SOV.GetAdjective] Truppen weigern sich, die Gebiete zu verlassen, die uns im Teilungsabkommen versprochen wurden. Auf diese Weise vergelten sie uns unsere Hilfe bei der Niederlage der Rumänen."
 hungary_flavor.166.a:0 "Ich hätte wissen müssen, dass wir ihnen nicht vertrauen können!"
 
 hungary_flavor.167.t:0 "Rumänien erkennt die Autonomie der Szekler an"
 hungary_flavor.167.d:0 "Unser Appell an die rumänische Regierung ist eingegangen und wurde bewilligt. Der Szeklergemeinde in Siebenbürgen wurde innerhalb von [ROM.GetNameDef] Autonomie gewährt. Obwohl sie nicht völlig unabhängig ist, verfügt sie nun über ein gewisses Maß an Selbstverwaltung."
 hungary_flavor.167.a:0 "Erfolg!"
 
 hungary_flavor.168.t:0 "Rumänien verweigert den Szeklern die Autonomie"
 hungary_flavor.168.d:0 "Es überrascht nicht, dass die rumänische Regierung unseren Antrag auf Autonomie der Szekler abgelehnt hat. Sie ist sich nicht darüber im Klaren, dass die Nationalitäten Siebenbürgens sich immer gegen die Assimilation wehren werden, die sie so energisch vorantreiben, wenn sie ihnen nicht die gleichen Rechte gewähren."
 hungary_flavor.168.a:0 "Vielleicht an einem anderen Tag."
 
 hungary_flavor.169.t:0 "Wiederbelebung der Räterepublik"
 hungary_flavor.169.d:0 "Nach der Rückkehr Béla Kuns stieg die Popularität der KMP sprunghaft an, und es war nur eine Frage der Zeit, bis sie die Macht übernahm. Der Staatsmann hatte seine Lehren aus der kurzzeitigen Räterepublik von 1919 gezogen und wollte Ungarn auf einen sichereren Weg zur kommunistischen Revolution führen."
 hungary_flavor.169.a:0 "Die Revolution ist da!"
 
 hungary_flavor.170.t:0 "Der Rat der Nationen"
 hungary_flavor.170.d:0 "Nach stundenlangen Debatten und Beratungen verließen die Vertreter der kommunistischen Parteien der umliegenden Länder zusammen mit [ROOT.GetLeader] den Konferenzraum. Die Vertreter verkündeten ihre Entscheidung, während die versammelte Journalistenmenge den Atem anhielt."
 hungary_flavor.170.a:0 "Wir werden umgehend mit der Unterstützung der Vertragsparteien beginnen."
 hungary_flavor.170.b:0 "Sie haben fehlgeleitete Visionen von der Zukunft der Revolution."
 
 hungary_flavor.171.t:0 "Szekler wechseln die Seiten"
 hungary_flavor.171.d:0 "Obwohl das Szeklerland ein autonomer Teil Rumäniens ist, hat es beschlossen, nicht gegen uns zu kämpfen, sondern an unserer Seite gegen die Rumänen zu kämpfen! Wir müssen schnell ihren Rücken und ihre Flanken sichern, damit sie nicht sofort von den rumänischen Armeen verschluckt werden."
 hungary_flavor.171.a:0 "Gute Nachrichten!"
 
 hungary_flavor.172.t:0 "Polen akzeptiert"
 hungary_flavor.172.d:0 "Polen hat unsere Bitte angenommen, seiner Fraktion beizutreten. Nicht umsonst heißt es: „Polen und Ungarn sind Brüder, gut im Kampf und gut in der Partei.“ Unser Volk ist nun wirklich Waffenbrüder."
 hungary_flavor.172.a:0 "Hervorragende Neuigkeiten!"
 
 hungary_flavor.173.t:0 "Polen lehnt ab"
 hungary_flavor.173.d:0 "Polen hat unserem Antrag auf Beitritt zu seiner Fraktion leider nicht stattgegeben."
 hungary_flavor.173.a:0 "Das ist traurig zu hören."
 
 hungary_flavor.174.t:0 "Italien akzeptiert"
 hungary_flavor.174.d:0 "Italien hat unsere Bitte angenommen, sich seiner Fraktion anzuschließen. Wir werden unser Bestes tun, um ihnen zu helfen, und im Gegenzug werden sie uns beschützen."
 hungary_flavor.174.a:0 "Hervorragende Neuigkeiten!"
 
 hungary_flavor.175.t:0 "Italien lehnt ab"
 hungary_flavor.175.d:0 "Italien hat unseren Antrag auf Beitritt zu seiner Fraktion leider nicht angenommen."
 hungary_flavor.175.a:0 "Das ist traurig zu hören."
 
 hungary_flavor.176.t:0 "Union mit Polen"
 hungary_flavor.176.d:0 "Polen hat unser Angebot angenommen, unsere Länder unter einer Flagge zu vereinen und den Kampf gemeinsam fortzusetzen. Dies ist ein letzter Ausweg, den wir nur für das Überleben des polnischen und ungarischen Volkes nutzen wollen."
 hungary_flavor.176.a:0 "Gemeinsam werden wir diesen Sturm überstehen."
 
 hungary_flavor.177.t:0 "Polen lehnt Union ab"
 hungary_flavor.177.d:0 "Unser Unionsangebot wurde von der polnischen Regierung abgelehnt. Es ist durchaus möglich, dass diese Entscheidung das Schicksal Polens besiegelt hat. Dennoch müssen wir weiterhin alle Anstrengungen unternehmen, um Polen im Krieg zu halten."
 hungary_flavor.177.a:0 "Vielleicht können sie noch gerettet werden."
 
 hungary_flavor.178.t:0 "[From.GetName] weigert sich, ukrainisches Land abzutreten"
 hungary_flavor.178.d:0 "Nach der Gründung des Königreichs Ukraine unter unserem Schutz wurden die Nachbarländer aufgefordert, die Souveränität dieses Staates anzuerkennen und ihm alle von ethnischen Ukrainern bewohnten Gebiete abzutreten. [From.GetNameDef] war eines dieser Länder und hat diese Aufforderung eklatant ignoriert."
 hungary_flavor.178.a:0 "Wie können sie leugnen, dass diese Länder ukrainisch sind?"
 
 hungary_flavor.179.t:0 "Deutschland lehnt Einladung Polens ab"
 hungary_flavor.179.d:0 "Wir haben Deutschland kürzlich vorgeschlagen, Polen in die Achsenmächte aufzunehmen, da die Denkweise seiner Regierung unserer ähnlicher ist. Deutschland antwortete, dass es derzeit kein Bündnis mit Polen anstrebe, da Polen in naher Zukunft Ziel seiner Ambitionen werden könnte. Es scheint, dass wir keine Freundschaft sowohl mit Deutschland als auch mit Polen aufrechterhalten können."
 hungary_flavor.179.a:0 "Sie sollten sich stattdessen auf unsere wahren Feinde konzentrieren."
 
 hungary_flavor.180.t:0 "Polen lehnt Einladung ab"
 hungary_flavor.180.d:0 "Obwohl es uns gelang, Deutschland von den Vorteilen einer Aufnahme Polens in die Achse zu überzeugen, lehnte die polnische Regierung die Einladung mit der Begründung ab, dass ihre Interessen nicht mit denen unserer Fraktion übereinstimmten."
 hungary_flavor.180.a:0 "Zumindest haben wir es versucht."
 
 hungary_flavor.181.t:0 "Polen nimmt Einladung an"
 hungary_flavor.181.d:0 "Unsere Bemühungen waren erfolgreich. Sowohl Deutschland als auch Polen stimmten der Ausweitung des Achsenbündnisses auf Polen zu. Nun können wir beruhigt sein, dass unsere polnischen Freunde nicht mehr von einer deutschen Invasion bedroht sind."
 hungary_flavor.181.a:0 "Ein großartiger Tag für unsere Allianz!"
 
 hungary_flavor.182.t:0 "Ein neuer Regierungschef für die Slowakei"
 hungary_flavor.182.d:0 "Die neue slowakische Regierung ist gebildet, wir müssen aber noch ihren Regierungschef bestimmen. Die Wahl eines slowakischen Staatsbürgers könnte den Geist des Landes stärken, da die Bevölkerung die Regierung als ihre eigene betrachtet. Die Wahl eines ungarischen Politikers hingegen würde die Regierung stärker im Griff haben und einen höheren Beitrag zu unserer Staatskasse leisten."
 hungary_flavor.182.a:0 "Wählen Sie Milan Hodza."
 hungary_flavor.182.b:0 "Wählen Sie Jozef Tiso."
 hungary_flavor.182.c:0 "Wählen Sie János Esterházy."
 
 hungary_flavor.183.t:0 "Donauarbeiter befreit"
 hungary_flavor.183.d:0 "Unsere Bemühungen, Arbeiterproteste und Streiks in [From.GetNameDef] zu provozieren, waren erfolgreich. Die dortige Regierung hat beschlossen, den Forderungen der Donauarbeiter nachzugeben und ihnen Unabhängigkeit und das Recht auf Beitritt zu unserer Föderation zu gewähren. Dies ist wahrlich ein großer Tag für die kommunistische Sache!"
 hungary_flavor.183.a:0 "Wir können nur unsere Fesseln verlieren!"
 
 hungary_flavor.184.t:0 "Donauarbeiter im Ausland im Aufstand"
 hungary_flavor.184.d_fighting_bonus:0 "Die Donaubevölkerung in [From.GetNameDef] befindet sich in offener Rebellion gegen die Regierung. [From.GetLeader] zeigt keinerlei Mitgefühl für ihre Sache und unterdrückt stattdessen die Aufständischen, um ihre Bemühungen zur Befreiung der Arbeiterklasse zu unterbinden. Diese Arbeiter haben uns um Hilfe gebeten, um sich von ihren Unterdrückern zu befreien und unserer Föderation beizutreten. Sollten wir helfen, würden sie versuchen, die [From.GetAdjective]-Armee zu sabotieren und unseren Truppen zu helfen."
 hungary_flavor.184.d_manpower:0 "Die Donaubevölkerung in [From.GetNameDef] befindet sich in offener Rebellion gegen die Regierung. [From.GetLeader] zeigt keinerlei Mitgefühl für ihre Sache und unterdrückt stattdessen die Aufständischen, um ihre Bemühungen zur Befreiung der Arbeiterklasse zu unterbinden. Diese Arbeiter haben uns um Hilfe gebeten, um sich von ihren Unterdrückern zu befreien und unserer Föderation beizutreten. Einige von ihnen sind vor Beginn der Repressalien in [From.GetNameDef] in unser Land geflohen und haben sich bereit erklärt, der Armee beizutreten, wenn wir ihnen bei der Befreiung ihrer Brüder helfen."
 hungary_flavor.184.a:0 "Wir müssen ihnen helfen, sich zu befreien!"
 hungary_flavor.184.b:0 "Sie sind auf sich allein gestellt."
 
 hungary_flavor.185.t:0 "Italien stimmt Rüstungskredit zu"
 hungary_flavor.185.d:0 "Der von uns bei Italien beantragte Rüstungskredit wurde bewilligt. Wir können dieses Geld nun frei für Investitionen in unser Militär und unsere Rüstungsproduktion verwenden. Das bedeutet aber auch, dass wir für eine gewisse Zeit durch regelmäßige Zahlungen an Italien belastet sein werden."
 hungary_flavor.185.a:0 "Ein kleiner Preis für unsere Sicherheit."
 
 hungary_flavor.186.t:0 "Italien lehnt Rüstungskredit ab"
 hungary_flavor.186.d:0 "Italien hat sich geweigert, uns den beantragten Rüstungskredit zu gewähren. Unter vagen Vorwänden, wie etwa einem Verstoß gegen den Vertrag von Trianon und dem knappen Budget der italienischen Regierung, könne man uns in dieser Angelegenheit leider nicht helfen."
 hungary_flavor.186.a:0 "Wir müssen das Geld woanders herbekommen."
 
 hungary_flavor.187.t:0 "Militärmission verlässt"
 hungary_flavor.187.d:0 "Die Militärmission unserer ehemaligen Verbündeten hat ihre Sachen gepackt und die Hauptstadt verlassen. Da ihr Aufenthalt durch die nun aufgelöste Allianz gerechtfertigt war, hielt sie hier nichts mehr fest."
 hungary_flavor.187.a:0 "Sie sind sowieso nicht willkommen."
 
 hungary_flavor.188.t:0 "Ausländische Investoren ziehen sich zurück"
 hungary_flavor.188.d:0 "Die meisten ausländischen Investoren, die wir gewinnen konnten, haben sich aus dem Land zurückgezogen. Als Gründe dafür nannten sie die veränderte politische Lage und den Druck ihrer Regierung."
 hungary_flavor.188.a:0 "Lassen Sie sie ihr verdammtes Geld woanders ausgeben."
 
 hungary_flavor.189.t:0 "Deutsche Wirtschaftsbeziehungen abgebrochen"
 hungary_flavor.189.d:0 "Mit der Verschlechterung unserer Beziehungen zu [GER.GetNameDef] begannen auch die verschiedenen Verträge und Kooperationen mit deutschen Unternehmen zu zerfallen. Mittlerweile wurde jegliche wirtschaftliche und industrielle Unterstützung, die wir von ihnen erhielten, eingestellt, sodass wir uns selbst überlassen sind."
 hungary_flavor.189.a:0 "Unsere Wirtschaft ist auch ohne sie stark genug."
 
 hungary_flavor.190.t:0 "Italienisch-Ungarische Marineakademie aufgelöst"
 hungary_flavor.190.d:0 "Mit dem Ausbruch der Feindseligkeiten zwischen [HUN.GetNameDef] und [ITA.GetNameDef] verlor die Italienisch-Ungarische Marineakademie rasch die Unterstützung beider Nationen. Dozenten und Studenten kehrten in ihre Heimat zurück, um sich auf den Konflikt vorzubereiten. Der Dekan der Institution gab bekannt, dass die Akademie auf unbestimmte Zeit geschlossen wird."
 hungary_flavor.190.a:0 "Das ist nur natürlich. Sie sind jetzt unsere Feinde."
 
 hungary_flavor.191.t:0 "Staatsbesuch in Deutschland"
 hungary_flavor.191.d:0 "Obwohl Deutschland und Ungarn seit langem freundschaftliche Beziehungen pflegen, hat der Führer unseren neuen Führer noch nicht getroffen. Wie gewünscht wurde das Treffen zwischen Ferenc Szálasi und Adolf Hitler in Berlin arrangiert. Was soll der große Führer unserer Nation auf seiner Agenda haben?"
 hungary_flavor.191.a:0 "Appellieren Sie an Hitler, indem Sie Zugeständnisse machen."
 hungary_flavor.191.b:0 "Fordern Sie mehr militärische Koordination."
 hungary_flavor.191.c:0 "Versuchen Sie, ideologische Unterschiede auszugleichen."
 
 hungary_flavor.192.t:0 "Hitler stimmt einer verstärkten militärischen Zusammenarbeit zu"
 hungary_flavor.192.d:0 "Die Gespräche verliefen erfolgreich. Szálasi und Hitler verlassen lächelnd und mit einem Händedruck den Konferenzraum. Sie haben sich auf eine verstärkte militärische Zusammenarbeit und mehr Transparenz zwischen den beiden Ländern geeinigt."
 hungary_flavor.192.a:0 "Wunderbare Neuigkeiten."
 
 hungary_flavor.193.t:0 "Hitler lehnt verstärkte militärische Zusammenarbeit ab"
 hungary_flavor.193.d:0 "Das Treffen in Berlin war erfolglos. Szálasi verließ den Verhandlungstisch mit einem bitteren Nachgeschmack und einer Handvoll Nichts. Hitler weigerte sich, irgendwelche Versprechungen bezüglich der verstärkten Beteiligung Ungarns an militärischen Operationen abzugeben."
 hungary_flavor.193.a:0 "Respektiert er nicht die unzähligen Ungarn, die an der Front kämpfen?"
 
 hungary_flavor.194.t:0 "Ideologische Differenzen beigelegt"
 hungary_flavor.194.d:0 "Szálasi und Hitler gelang es, die meisten ideologischen Differenzen zwischen dem deutschen Nationalsozialismus und dem ungarischen Hungarismus zu überwinden. Durch eine verstärkte Zusammenarbeit können die beiden Länder nun endlich ihre gemeinsamen Ziele erreichen."
 hungary_flavor.194.a:0 "Wir sind uns ähnlicher als wir verschieden sind."
 
 hungary_flavor.195.t:0 "Ideologische Differenzen bleiben bestehen"
 hungary_flavor.195.d:0 "Das Treffen in Berlin sollte die ideologische Feindschaft zwischen Deutschland und Ungarn beseitigen, verschärfte sie jedoch noch. Szálasi gelang es nicht, Hitler von den Ähnlichkeiten ihrer Systeme zu überzeugen und musste das Treffen verlassen, ohne die Freundschaft des Führers gewonnen zu haben."
 hungary_flavor.195.a:0 "Ein bedauerliches Missverständnis."
 
 hungary_flavor.196.t:0 "Proteste gegen die Regierung"
 hungary_flavor.196.d:0 "Mitglieder der Opposition haben große Proteste gegen die derzeitige Regierung organisiert. Sie fordern Neuwahlen und bezeichnen unsere Regierung als bloße Marionette Horthys. Die Proteste verliefen bislang relativ friedlich, doch die Lage könnte mit der Zeit eskalieren. Vielleicht sollten die Forderungen berücksichtigt und Neuwahlen abgehalten werden."
 hungary_flavor.196.a:0 "Die Dinge werden sich ändern."
 
 hungary_flavor.197.t:0 "Vorgezogene Wahlen"
 hungary_flavor.197.d:0 "Als Reaktion auf die wachsenden Proteste in den Straßen Budapests ist unser Regierungschef zurückgetreten und das Parlament hat Neuwahlen beschlossen. In Kürze wird eine neue Regierung gewählt, die hoffentlich die verärgerten Massen zufriedenstellen wird."
 hungary_flavor.197.a:0 "Es wurde Zeit."
 
 hungary_flavor.198.t:0 "Erneute kommunistische Säuberung"
 hungary_flavor.198.d:0 "Der Kommunismus hat erneut seinen hässlichen Fuß in Ungarn gesetzt. Die einzig logische und sichere Reaktion darauf ist ein erneuter Kreuzzug gegen die rote Bedrohung, diesmal staatlich sanktioniert und streng legal. Viele Kommunisten wurden während des sogenannten „Weißen Terrors“ von 1919 bis 1921 ausgerottet, doch ihre krebsartige Ideologie lässt sich offenbar nicht so leicht ausrotten. Wir werden das Land nach jedem absuchen, der mit marxistischen Ideen sympathisiert, und ihn vor Gericht stellen."
 hungary_flavor.198.a:0 "Lassen Sie sie vor Angst zusammenzucken."
 
 hungary_flavor.199.t:0 "Jugoslawien lehnt Teilungsforderungen ab"
 hungary_flavor.199.d:0 "Die jugoslawische Regierung widersetzt sich unseren Forderungen. Sie weigert sich, die Grenzen ihres lächerlichen Staates neu zu verhandeln, da sie dessen Scheitern nicht erkennt. Unsere einzige Option ist, sie zu einer Entscheidung zu zwingen, sobald unsere Armee durch ihr Land gefegt ist."
 hungary_flavor.199.a:0 "Sie brechen, wenn sie sich nicht biegen."
 
 hungary_flavor.200.t:0 "V3-Panzer überquert Donau"
 hungary_flavor.200.d:0 "Miklós Straussler entwickelt seit 1930 Prototypen gepanzerter Fahrzeuge für das britische und ungarische Militär. In diesem Jahr führte seine Arbeit zu einigen bahnbrechenden Ergebnissen. Der mit Pontons ausgestattete Prototyp Straussler V3 überquerte erfolgreich die Donau. Diese bahnbrechende Leistung ist die erste ihrer Art, da zuvor noch kein Panzer große Flüsse in Europa überquert hatte. Wir könnten diesen Durchbruch durchaus nutzen, um die amphibischen Panzerfähigkeiten unserer Streitkräfte zu verbessern."
 hungary_flavor.200.a:0 "Stellen Sie zusätzliche Mittel für das Projekt bereit."
 hungary_flavor.200.b:0 "Faszinierend, aber letztlich für uns wenig nützlich."
 
 hungary_flavor.201.t:0 "Der Prozess gegen László Rajk"
 hungary_flavor.201.d:0 "László Rajk, ein prominenter Minister der kommunistischen Regierung, ist bei Rákosi und der Parteiführung in Ungnade gefallen. Nachdem László in die Finanzierung der ÁVO verwickelt war, gelang es ihm, mehrere Parteimitglieder gegen sich aufzubringen, obwohl er in der Bevölkerung nach wie vor recht beliebt ist. Die Spannungen innerhalb der Partei haben einen Siedepunkt erreicht, nachdem der ÁVO-Vorsitzende Gábor Péter eine offizielle Anklage gegen László wegen partei- und systemfeindlichen Verhaltens erhoben hat. Sein Prozess wird von historischer Bedeutung sein, daher sollten wir unsere Haltung sorgfältig abwägen."
 hungary_flavor.201.a:0 "Lassen Sie den Prozess gemäß den Forderungen der Parteien weiterlaufen."
 hungary_flavor.201.b:0 "Entlasten Sie Rajk."
 
 hungary_flavor.202.t:0 "Edward VIII. wird König von [ENG.GetNameDef]"
 hungary_flavor.202.d:0 "Unsere Entscheidung, den englischen Prinzen Edward auf den ungarischen Thron zu wählen, erwies sich als problematisch. Die jüngsten politischen Entwicklungen im Vereinigten Königreich führten zu seiner Rückkehr auf den britischen Thron, was uns vor eine schwierige Entscheidung stellt. Das Schicksal der ungarischen Krone ist erneut ungewiss."
 hungary_flavor.202.a:0 "Wenden Sie sich dem schwedischen Königshaus zu."
 hungary_flavor.202.b:0 "Unterwerfen Sie sich der Herrschaft von Edward und den Engländern."
 hungary_flavor.202.c:0 "Schafft die Monarchie ab."
 
 hungary_flavor.203.t:0 "Österreich-Ungarn-Böhmen"
 hungary_flavor.203.d:0 "Die Trialistenverfassung wurde heute unterzeichnet und begründete damit offiziell die Gründung Österreich-Ungarn-Böhmens. Der neue Staat hat drei Hauptstädte – Wien, Budapest und Prag – und wird von einem Monarchen regiert. Anhänger der Monarchie hoffen, dass dies das Land dauerhaft als funktionierenden Vielvölkerstaat festigen wird."
 hungary_flavor.203.a:0 "Es lebe der neue, trialistische Staat!"
 
 hungary_flavor.204.t:0 "Frankreich akzeptiert Bündnis"
 hungary_flavor.204.d:0 "[FRA.GetLeader] hat unseren Bündnisvorschlag mit offenen Armen empfangen. Die Vorbereitungen für die offizielle Bündniserklärung zwischen [HUN.GetNameDef] und [FRA.GetNameDef] sind bereits getroffen. Dieser Moment wird sicherlich als wichtiger Wendepunkt des 20. Jahrhunderts in die Geschichte eingehen!"
 hungary_flavor.204.a:0 "Wir Monarchien müssen zusammenhalten."
 
 hungary_flavor.205.t:0 "Frankreich lehnt Bündnis ab"
 hungary_flavor.205.d:0 "[FRA.GetNameDef] reagierte kühl auf unsere herzliche Annäherung. Das vorgeschlagene Bündnis wurde ohne weitere Überlegung abgelehnt. Sie müssen erkennen, dass ihre neu wiederhergestellte Monarchie in großer Gefahr ist, wenn sie sich nicht die Freundschaft gleichgesinnter Länder sichert."
 hungary_flavor.205.a:0 "Hartnäckige Narren."
 
 hungary_flavor.206.t:0 "Slowakei stimmt für Volksabstimmung"
 hungary_flavor.206.d:0 "Das Projekt „Vereinigtes Land Ungarn“ hat heute einen Meilenstein erreicht: Die slowakische Volksabstimmung war erfolgreich. Die slowakischen Länder werden von nun an ein integraler Bestandteil unseres Landes sein und ihre Bevölkerung wird als vollwertige Bürger der Nation angesehen."
 hungary_flavor.206.a:0 "Sehr gut. Ein Schritt näher an einem vereinten Vaterland."
 
 hungary_flavor.207.t:0 "Slowakei stimmt mit Nein zum Plebiszit"
 hungary_flavor.207.d:0 "Leider war die Volksabstimmung über den Beitritt zur Initiative „Vereinigtes Land Ungarn“ in der Slowakei nicht erfolgreich. Die Mehrheit der Wähler äußerte den Wunsch, unabhängig von Ungarn zu bleiben, anstatt an der Zukunft der Karpatenvölker teilzuhaben."
 hungary_flavor.207.a:0 "Vielleicht ist es für sie besser, indirekt regiert zu werden."
 hungary_flavor.207.b:0 "Das ist ein bedauerliches Ergebnis. Vielleicht werden sie mit der Zeit zur Vernunft kommen."
 
 hungary_flavor.208.t:0 "Ruthenien stimmt für Volksabstimmung"
 hungary_flavor.208.d:0 "Das Projekt „Vereinigtes Ungarn“ hat heute einen Meilenstein erreicht: Die slowakische Volksabstimmung war erfolgreich. Die ruthenischen Gebiete werden von nun an ein integraler Bestandteil unseres Landes sein und ihre Bevölkerung wird als vollwertige Bürger der Nation angesehen."
 hungary_flavor.208.a:0 "Sehr gut. Ein Schritt näher an einem vereinten Vaterland."
 
 hungary_flavor.209.t:0 "Ruthenien stimmt mit Nein zum Plebiszit"
 hungary_flavor.209.d:0 "Leider war die Volksabstimmung über den Beitritt zur Initiative „Vereinigtes Land Ungarn“ in Karpaten nicht erfolgreich. Die Mehrheit der Wähler äußerte den Wunsch, unabhängig von Ungarn zu bleiben, anstatt an der Zukunft des Karpatenvolkes teilzuhaben."
 hungary_flavor.209.a:0 "Vielleicht ist es für sie besser, indirekt regiert zu werden."
 hungary_flavor.209.b:0 "Das ist ein bedauerliches Ergebnis. Vielleicht werden sie mit der Zeit zur Vernunft kommen."
 
