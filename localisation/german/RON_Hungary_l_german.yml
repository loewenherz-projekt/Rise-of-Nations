 #Ideologies
 hungarism:0 "Ungarnismus"
 hungarism_desc:0 "Der Hungarismus ist eine ungarische Ideologie, die Sozialismus und Nationalismus vereint. Charakteristisch für seine Ideen sind militaristische und konservative Ansichten, die manchmal auch fundamentalistische katholische Überzeugungen beinhalten. Der Ideologie zufolge sollten sich die Ungarn mit anderen Nationen des Karpatenbeckens vereinen und gemeinsam für das Gemeinwohl arbeiten. Diese Ideologie wird oft von Kommunisten und Sozialisten mit nationalistischen Gefühlen bevorzugt."

