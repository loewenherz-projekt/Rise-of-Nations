 SOV_war_communism:0 "Kriegskommunismus"
 SOV_war_communism_desc:0 "Kriegskommunismus bezeichnet die wirtschaftlichen und politischen Maßnahmen, die kommunistische Revolutionen zur Verteidigung des revolutionären Prozesses ergreifen, meist in Kriegszeiten. Er wird von der Partei durchgesetzt, um Kriegspolitiken wie Rationierung, Verstaatlichung, strenge Disziplin und die militärische Kontrolle bestimmter strategischer Bereiche durchzusetzen."
 


 

