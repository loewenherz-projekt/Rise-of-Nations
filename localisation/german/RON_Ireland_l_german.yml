l_german:
 constitution_of_ireland:0 "Verfassung Irlands"
 constitution_of_ireland_desc:0 "Seit der Anglo-Irische Vertrag 1921 am Ende des Unabhängigkeitskrieges unterzeichnet wurde, blieb die irische Nation ein Dominion unter dem Britischen Empire. Da Irland nun eine vollwertige Republik wird, muss die Verfassung entsprechend geändert werden."
 fianna_fail_majority_government:0 "Fianna-Fáil-Mehrheitsregierung"
 fianna_fail_majority_government_desc:0 "Angesichts der bevorstehenden Wahlen von 1937 wäre eine Mehrheitsregierung der Fianna Fáil die beste Option zur Aufrechterhaltung der Demokratie in Irland, da Fine Gael einige fragwürdige Verbindungen zur faschistischen Ideologie hat."
 coalition_government:0 "Koalitionsregierung"
 coalition_government_desc:0 "Da keine der beiden Parteien die Mehrheit im Dáil Éireann erlangt hat, sollte Fine Gael eine Koalitionsregierung mit Fianna Fáil anführen und sich so eine Basis für die Ausweitung ihres politischen Einflusses in Irland verschaffen."
 the_1937_elections:0 "Wahlen 1937"
 the_1937_elections_desc:0 "Die bevorstehenden Wahlen werden die irische politische Sphäre weiter öffnen, denn die irischen Wähler sind noch immer mit der „Bürgerkriegspolitik“ konfrontiert."
 offences_against_the_state_act:0 "Verstöße gegen das Staatsgesetz"
 offences_against_the_state_act_desc:0 "Auch nach der Gründung der An Gardaí Síochána bleibt Irland eine instabile Republik mit hoher Kriminalität und asozialem Verhalten. Dieses Gesetz soll dem Staat mehr Macht verleihen und so die Stabilität der Republik erhöhen."
 IRE_coalition_government_idea:0 "Rechtsextremismus"
 IRE_coalition_government_idea_desc:0 "Nach der Einsetzung der von Fine Gael geführten Koalitionsregierung kam es zu einem Anstieg rechtsextremer Bewegungen."
 IRE_offences_against_the_state_act_idea:0 "Erhöhte Gardaí-Präsenz"
 IRE_offences_against_the_state_act_idea_desc:0 "Durch die Ausweitung der Machtbefugnisse des Justizsystems nimmt die Präsenz der Gardaí im Land stetig zu."
 IRE_irish_volunteers_idea:0 "Irische Freiwillige"
 IRE_irish_volunteers_idea_desc:0 "Angesichts drohender Kriege muss Irland die Demokratie in ganz Europa und anderswo verteidigen."
 irish_volunteers:0 "Irische Freiwillige"
 irish_volunteers_desc:0 "Angesichts drohender Kriege muss Irland die Demokratie in ganz Europa und anderswo verteidigen."
 IRE_unstable_republic:0 "Instabile Republik"
 IRE_unstable_republic_desc:0 "Nach dem Wirtschaftscrash von 1929 war die ganze Welt, auch Irland, von Hyperinflation, Armut und einer weltweiten Depression betroffen."
 irish_neutrality:0 "Irische Neutralität"
 irish_neutrality_desc:0 "Während des Ersten Weltkriegs starben Tausende Iren. Das sollte nicht noch einmal passieren."
 lead_the_minor_democracies:0 "Führen Sie die kleinen Demokratien Europas"
 lead_the_minor_democracies_desc:0 "Angesichts der extremen Ideologien des Faschismus und Kommunismus sowie der imperialen Ambitionen des Vereinigten Königreichs muss Irland gemeinsam mit den anderen Kleinmächten Europas die Demokratie schützen."
 invite_the_benelux:0 "Laden Sie die Benelux-Länder ein"
 invite_the_benelux_desc:0 "Mit der Gründung unserer Allianz sollte unser erster Schritt darin bestehen, die Benelux-Staaten einzuladen."
 invite_the_scandinavian_countries:0 "Laden Sie die skandinavischen Länder ein"
 invite_the_scandinavian_countries_desc:0 "Mit den Benelux-Ländern in unserer Fraktion sollten wir uns nach Norden ausdehnen, um die skandinavischen Länder einzubeziehen."
 invite_switzerland:0 "Schweiz einladen"
 invite_switzerland_desc:0 "Die Schweiz ist von Feinden umzingelt und wird unsere Hilfe unbedingt brauchen."
 fortify_our_island:0 "Befestigen Sie die Insel"
 fortify_our_island_desc:0 "Angesichts der drohenden Gefahr einer Invasion zu Wasser, zu Land oder aus der Luft sollten wir unsere Küsten-, Grenz- und Luftverteidigung ausbauen."
 invite_british_investors:0 "Laden Sie britische Investoren ein"
 invite_british_investors_desc:0 "Da ein Krieg unvermeidlich ist, sollten wir britische Investoren einladen, unsere Zivilwirtschaft zu entwickeln, um unsere Kriegsanstrengungen zu unterstützen."
 plan_w:0 "Plan W"
 plan_w_desc:0 "Mit der geheimen Zusammenarbeit Großbritanniens kann Irland seine Verteidigung ausbauen, um jede Invasion von See oder aus der Luft abzuwehren."
 IRE_fortification_idea:0 "Befestigungsplan"
 IRE_fortification_idea_desc:0 "Die Verteidigungsanlagen der Insel sind äußerst mangelhaft und verfügen weder über Küsten- noch über Luftverteidigungssysteme. Daher sollten derartige Verteidigungsanlagen umgehend errichtet werden."
 plan_w_idea:0 "Plan W"
 plan_w_idea_desc:0 "Mit der geheimen Zusammenarbeit Großbritanniens kann Irland seine Verteidigung ausbauen, um jede Invasion von See oder aus der Luft abzuwehren."
 IRE_british_investors_idea:0 "Britische Investoren"
 IRE_british_investors_idea_desc:0 "With hopeful peace and neutrality on our island, we should focus on inviting British investors to develop our civilian economy and hopefully provide aid for the Allies.
 irish_schools_neutral:0 "Irische Schulen"
 irish_schools_neutral_desc:0 "Angesichts der Fortschritte in unserer Zivilwirtschaft sollte unser nächster Schritt der Ausbau unseres Bildungssystems sein."
 assume_control_of_northern_ireland:0 "Übernehmen Sie die Kontrolle über Nordirland"
 assume_control_of_northern_ireland_desc:0 "Angesichts des in Europa tobenden Krieges ist jetzt der perfekte Zeitpunkt, um die Kontrolle über den Norden friedlich zu übernehmen, nachdem sie uns durch den Anglo-Irischen Vertrag genommen wurde."
 german_war_goal:0 "Zerstöre die deutsche Bedrohung"
 german_war_goal_desc:0 "Die Deutschen bedrohen mit ihren Ambitionen die ganze Welt. Sie müssen sofort gestoppt werden."
 retake_northern_ireland:0 "Erobern Sie Nordirland zurück"
 retake_northern_ireland_desc:0 "Nordirland war und wird immer irisch sein. Unsere sechs Kerngrafschaften müssen sofort zurückerobert werden."
 empower_the_ira:0 "Ermächtigung der IRA"
 empower_the_ira_desc:0 "Seit dem Ende des Bürgerkriegs 1923 wurde die vertragsfeindliche IRA durch Verhaftungen und rigorose Maßnahmen der Regierung stark geschwächt. Wir sollten der IRA mehr Macht einräumen, um im Norden Gewalt zu schüren."
 maintain_status_quo:0 "Den Status Quo beibehalten"
 maintain_status_quo_desc:0 "Wir sollten jeglichen Konflikt im Spanischen Bürgerkrieg vermeiden und in unserem Heimatgebiet bleiben. Vielleicht gelingt es uns sogar, die Aufmerksamkeit der britischen Regierung zu gewinnen, damit sie uns die Rückkehr in den Norden ermöglicht."
 support_spanish_nationalists:0 "Unterstützen Sie die spanischen Nationalisten"
 support_spanish_nationalists_desc:0 "Wir sollten die spanischen Nationalisten auf jede erdenkliche Weise unterstützen, damit wir in Zukunft eine Verbesserung der Beziehungen anstreben können."
 a_new_ireland:0 "Ein neues Irland"
 a_new_ireland_desc:0 "Mit dem Aufstieg rechtsextremer Gruppen verändern sich die Grundwerte der irischen Bevölkerung rasant, und wir sollten die irische Regierung entsprechend ändern."
 national_corporate_party:0 "Nationale Unternehmenspartei"
 national_corporate_party_desc:0 "Da der Faschismus in Irland mittlerweile äußerst populär ist, ist es an der Zeit, dass wir die Vorgehensweise unserer Regierung ändern, um der zunehmenden Popularität des Faschismus Rechnung zu tragen."
 island_defences_fascism:0 "Inselverteidigung"
 island_defences_fascism_desc:0 "Da ein Krieg unvermeidlich ist, sollten wir die Verteidigung unserer Insel ausbauen."
 join_the_axis:0 "Treten Sie der Achse bei"
 join_the_axis_desc:0 "Wir sollten uns auf die Seite der Deutschen und Italiener stellen, um in weitere größere Konflikte verwickelt zu werden."
 german_investors:0 "Deutsche Investoren"
 german_investors_desc:0 "Wir sollten deutsche Investoren nach Irland einladen, um den Aufbau unserer Wirtschaft zu erleichtern."
 operation_kathleen:0 "Operation Kathleen"
 operation_kathleen_desc:0 "Dank umfassender deutscher Planung werden wir in der Lage sein, die Kontrolle über den Norden schnell und problemlos zurückzugewinnen."
 the_irish_way:0 "Der irische Weg"
 the_irish_way_desc:0 "Nur wir können entscheiden, was wir tun sollten, denn die Deutschen könnten uns in unnötige Schwierigkeiten bringen."
 unite_celtic_countries:0 "Vereinige die keltischen Länder"
 unite_celtic_countries_desc:0 "Jahrelang war das keltische Volk getrennt und unter tyrannischer Herrschaft. Es ist Zeit, dass wir uns zu einer Nation vereinen."
 unite_atlantic_islands:0 "Vereinen Sie die kleineren Atlantikinseln"
 unite_atlantic_islands_desc:0 "Die kleine Bevölkerung der vielen Inseln im Atlantik sollte unter einer Nation vereint werden. Irland wird diese Nation sein."
 integrate_atlantic_islands:0 "Integration der kleineren Atlantikinseln"
 integrate_atlantic_islands_desc:0 "Wir sollten die Völker dieser Inseln in unser Land integrieren, damit sie unter uns kämpfen können und wir als eine einzige, richtige Nation bestehen können."
 secure_foothold_middle_east:0 "Sichern Sie sich die Stellung im Nahen Osten"
 secure_foothold_middle_east_desc:0 "Es gibt viele kleine Länder im Nahen Osten, die wir erobern können, um an die riesigen Ölvorkommen der Region zu gelangen. Oman sollte ein guter Ausgangspunkt sein, bevor wir weitermachen."
 conquer_middle_east:0 "Erobern Sie den Nahen Osten"
 conquer_middle_east_desc:0 "Sobald Oman ausgeschaltet ist, sollten wir unsere Gebiete im Nahen Osten weiter ausbauen."
 colonial_power:0 "Kolonialmacht"
 colonial_power_desc:0 "Da Irland nun den Nahen Osten kolonisiert, sind wir in der Lage, als Kolonialmacht auf die Weltbühne zu treten."
 exploit_middle_eastern_oil:0 "Das Öl des Nahen Ostens ausbeuten"
 exploit_middle_eastern_oil_desc:0 "Diese Länder sind reich an riesigen Ölfeldern. Wir sollten diese Felder ausbeuten, um möglichst viel Öl zu produzieren und so unsere Wirtschaft und unsere Kriegsanstrengungen anzukurbeln."
 expand_public_works:0 "Erweitern Sie die öffentlichen Arbeiten"
 expand_public_works_desc:0 "Irlands Wirtschaft wurde durch den englisch-irischen Handelskrieg schwer beschädigt, daher müssen wir das öffentliche Bauprogramm des Landes ausweiten."
 national_roads:0 "Nationalstraßen"
 national_roads_desc:0 "Irlands Straßen sind ziemlich alt und in einem sehr schlechten Zustand und müssen daher entsprechend saniert werden."
 railways:0 "Iranród Éireann"
 railways_desc:0 "Die irische Eisenbahninfrastruktur muss modernisiert werden, um die modernen Züge bewältigen zu können, die schrittweise in Betrieb genommen werden."
 modernise_esb:0 "Modernisierung des ESB"
 modernise_esb_desc:0 "Das Electricity Supply Board wurde 1927 gegründet, um jeden irischen Haushalt mit Strom zu versorgen. Die meisten Haushalte sind jedoch noch immer nicht angeschlossen."
 dublin_steel_works:0 "Dubliner Stahlwerke"
 dublin_steel_works_desc:0 "Angesichts der steigenden Nachfrage im allgemeinen Bau- und Wohnungsbau muss Dublin seine Stahlproduktion ausweiten, um mit der aktuellen Nachfrage Schritt zu halten."
 dublin_military_factories:0 "Munitionsfabriken in Dublin"
 dublin_military_factories_desc:0 "Da ein Krieg unvermeidlich ist, muss Irland sein Militär dringend aufrüsten. Der erste Schritt besteht darin, Munitionsfabriken in der Hauptstadt zu errichten."
 coastal_oil_fields:0 "Küstenölfelder"
 coastal_oil_fields_desc:0 "Jüngste Expeditionen haben vor der Küste von Cork riesige Ölfelder entdeckt, und deshalb müssen wir sofort mit der Verarbeitung dieses Öls beginnen."
 sugar_industry:0 "Irische Zuckerindustrie"
 sugar_industry_desc:0 "Irland ist reich an natürlichen Ressourcen, darunter auch reichlich Zucker. Wir sollten diesen Industriezweig ausbauen, um die lokale Wirtschaft anzukurbeln."
 textile_industry:0 "Irische Textilindustrie"
 textile_industry_desc:0 "Connaught beherbergt viele Ressourcen, die Irland zu bieten hat. Besonders die Textilindustrie ist in dieser Region enorm und könnte in großen Mengen exportiert werden."
 clare_aluminium_plants:0 "Clare Aluminium Plants"
 clare_aluminium_plants_desc:0 "Die Grafschaft Clare ist bereits für ihre Aluminiumproduktion bekannt und sollte ausgebaut werden, um das Land auf den nächsten großen Krieg vorzubereiten."
 emergency_powers_act:0 "Gesetz über Notstandsbefugnisse"
 emergency_powers_act_desc:0 "Da sich Großbritannien derzeit im Krieg befindet, müssen wir das Notstandsgesetz unterzeichnen, um Irland auf die unvermeidliche Invasion vorzubereiten."
 fuel_rations:0 "Treibstoffrationen"
 fuel_rations_desc:0 "Da Großbritannien keinen Kraftstoff mehr nach Irland exportiert, müssen wir unseren Kraftstoffvorrat rationieren und zum Ausgleich die Produktion unseres eigenen Kraftstoffs steigern."
 emergency_arms_industry:0 "Notfall-Waffenindustrie"
 emergency_arms_industry_desc:0 "Irlands Wirtschaft ist nicht in der Lage, seine Armee mit den notwendigen Waffen und der nötigen Ausrüstung zu versorgen."
 industrial_modernisation:0 "Industrielle Modernisierung"
 industrial_modernisation_desc:0 "Da Irlands Industrie nun endlich wieder auf den Beinen ist, sollten wir an einer weiteren Modernisierung arbeiten, um sie auf internationale Standards zu bringen."
 irish_trade:0 "Irischer Handel"
 irish_trade_desc:0 "Wir sollten uns darauf konzentrieren, Irlands enorme Ressourcen ins Ausland zu exportieren und diesen lähmenden Handelskrieg, der seit 1932 andauert, hoffentlich endlich zu beenden."
 develop_the_north:0 "Nordirland entwickeln"
 develop_the_north_desc:0 "Da Nordirland nun endlich wieder unter unserer Kontrolle ist, können wir seine industriellen Kapazitäten ausbauen und es auf den nationalen Standard bringen."
 northern_shipbuilding_industry:0 "Schiffbauindustrie"
 northern_shipbuilding_industry_desc:0 "Nordirland ist für seine Schiffbauindustrie bekannt und daher sollten wir diese ausbauen, um unseren Marinedienst auszubauen."
 northern_linen_industry:0 "Leinenindustrie"
 northern_linen_industry_desc:0 "Nordirland ist außerdem für seine zahlreichen Flachsfelder bekannt, sodass wir durch erhöhte Leinenexporte die lokale Wirtschaft noch weiter ankurbeln können."
 modernise_irish_army:0 "Modernisierung der irischen Armee"
 modernise_irish_army_desc:0 "Die irische Armee ist stark veraltet und verfügt sogar noch über Fahrzeuge aus der Zeit vor dem Ersten Weltkrieg. Ein einfacher Fokus auf die technologische Modernisierung sollte unsere Armee wieder auf den neuesten Stand bringen."
 modernise_infantry_weapons:0 "Modernisierung der Infanteriewaffen"
 modernise_infantry_weapons_desc:0 "Die Modernisierung unserer Infanteriewaffen und -ausrüstung sollte unsere oberste Priorität sein."
 irish_artillery:0 "Irische Artillerie"
 irish_artillery_desc:0 "Artillerie ist eine notwendige Waffe in jeder Armee, auch in unserer."
 advanced_artillery:0 "Fortgeschrittene Artillerie"
 advanced_artillery_desc:0 "Durch modernere Artillerieformen kann sich unsere Armee deutlich von anderen abheben."
 lessons_of_great_war:0 "Lehren aus dem Ersten Weltkrieg"
 lessons_of_great_war_desc:0 "Tausende Iren starben im Ersten Weltkrieg unter britischem Kommando. Unsere Armeeführung muss kompetent sein, um eine Armee sicher in die Schlacht führen zu können."
 dublin_war_college:0 "Dublin War College"
 dublin_war_college_desc:0 "Die Einrichtung einer Kriegsakademie in der Hauptstadt sollte unsere oberste Priorität sein, bevor wir weiteres Armeepersonal einstellen."
 motorised_infantry:0 "Motorisierte Infanterie"
 irish_red_cross:0 "Irisches Rotes Kreuz"
 irish_red_cross_desc:0 "Da die Truppenstärke Irlands erheblich geringer ist als in anderen Ländern ähnlicher Größe in Europa, sollte die Heilung unserer verwundeten Männer auf dem Schlachtfeld unsere höchste Priorität sein."
 irish_tank_corps:0 "Irisches Panzerkorps"
 irish_tank_corps_desc:0 "Durch die Ergänzung unserer Armee um einfache Panzerfahrzeuge wird diese deutlich stärker und ermöglicht größere Durchbrüche an der Front."
 tank_modernisation:0 "Tankmodernisierung"
 tank_modernisation_desc:0 "Unsere Panzer sind stark veraltet und sollten daher modernisiert werden, um sie auf den Stand anderer moderner Armeen zu bringen."
 IRE_trade_war:0 "Anglo-irischer Handelskrieg"
 IRE_trade_war_desc:0 "Seit 1932 herrscht zwischen Irland und Großbritannien ein verheerender Handelskrieg. Dieser hatte und wird weiterhin schwerwiegende Auswirkungen auf unsere Wirtschaft haben, wenn wir die Situation nicht lösen."
 IRE_less_trade_war:0 "Anglo-irischer Handelskrieg"
 IRE_less_trade_war_desc:0 "Seit 1932 herrscht zwischen Irland und Großbritannien ein verheerender Handelskrieg. Dieser hatte und wird weiterhin schwerwiegende Auswirkungen auf unsere Wirtschaft haben, wenn wir die Situation nicht lösen."
 IRS:0 "Kaiserreich Irland"
 IRS_DEF:0 "Das Reich von Irland"
 reclaim_treaty_ports:0 "Vertragshäfen zurückfordern"
 reclaim_treaty_ports_desc:0 "Seit dem Anglo-Irischen Vertrag gehörten bestimmte Häfen Irlands den Briten. Es ist an der Zeit, diese Häfen zurückzufordern und sie unter die Kontrolle der irischen Regierung zu bringen."
 dublin_shipbuilding:0 "Irischer Marine- und Küstenüberwachungsdienst"
 dublin_shipbuilding_desc:0 "Irland ist einer von vielen Inselstaaten in Europa, verfügt jedoch nicht über eine ausreichend große Marine, um seine Küsten zu patrouillieren und seine Handelskonvois zu schützen. Unser erster Schritt zum Aufbau unserer Marine ist der Bau von Werften in der Hauptstadt."
 irish_destroyers:0 "Zerstörer"
 irish_destroyers_desc:0 "Zerstörer sind der erste Schiffstyp, der für unsere Überwasserflotte gebaut werden sollte. Wir sollten ausländische Entwürfe studieren, um unsere eigenen Zerstörer zu bauen."
 irish_cruisers:0 "Kreuzer"
 irish_cruisers_desc:0 "Kreuzer spielen eine Schlüsselrolle beim Schutz von Konvois oder als Abschirmschiff"
 capital_ships:0 "Schlachtschiffe"
 capital_ships_desc:0 "Obwohl ihr Bau lange dauert, verfügen Schlachtschiffe über extreme Feuerkraft und Seestärke."
 naval_bombers:0 "Marinebomber"
 naval_bombers_desc:0 "Da Irland ein Inselstaat ist, sind Marinebomber für die Überwachung unserer Küsten aus der Luft unerlässlich."
 carriers:0 "Flugzeugträger"
 carriers_desc:0 "Flugzeugträger haben die Seekriegsführung revolutioniert und sind für jede moderne Marine unverzichtbar."
 irish_submarines:0 "U-Boote"
 irish_submarines_desc:0 "U-Boote sind billig zu bauen und wären ein guter Schiffstyp für die Massenproduktion für die irische Wirtschaft"
 irish_radar:0 "Radar"
 irish_radar_desc:0 " "
 dockyard_expansion:0 "Erweiterung der Werft"
 dockyard_expansion_desc:0 "Unsere Marine benötigt dringend mehr Werften, um schneller Schiffe produzieren zu können."
 irish_air_corps:0 "Irisches Luftkorps"
 irish_air_corps_desc:0 "Wir müssen eine richtige Luftwaffe aufbauen, da es uns an Flugzeugen jeglicher Art mangelt."
 air_base_expansion:0 "Erweiterung des Luftwaffenstützpunkts"
 air_base_expansion_desc:0 "Da Irland derzeit seine Luftwaffe aufbaut, müssen wir unsere Luftwaffenstützpunkte erweitern, um diese Flugzeuge in Dienst stellen zu können."
 aviation_school:0 "Shannon Flugschule"
 aviation_school_desc:0 "Da wir nun über ein Luftkorps verfügen, müssen wir die richtige Führung ausbilden, um Standards und Doktrinen zu entwickeln."
 IRE_empower_IRA_idea:0 "Ermächtigte IRA"
 IRE_empower_IRA_idea_desc:0 "Nachdem die Regierung der Irisch-Republikanischen Armee die Macht übertragen hat, hat sie ihrerseits die Mitglieder ihrer Organisation ermutigt, der Irischen Armee beizutreten."
 IRE_island_defences_idea:0 "Inselverteidigung"
 IRE_german_investors_idea:0 "Deutsche Investoren"
 IRE_fuel_rations_idea:0 "Kraftstoffrationierung"
 IRE_emergency_powers_act:0 "Gesetz über Notstandsbefugnisse"
 IRE_emergency_powers_act_desc:0 "Da Großbritannien sich derzeit im Krieg befindet, müssen wir unsere Industrie verbessern, um die Verluste zu verkraften, die durch den fehlenden Handel mit Großbritannien entstehen."
 IRE_lessons_of_great_war_idea:0 "Lehren aus dem Ersten Weltkrieg"
 IRE_dublin_war_college_idea:0 "Dublin War College"
 IRE_destroyer_production_idea:0 "Zerstörerproduktion"
 IRE_cruiser_production_idea:0 "Kreuzerproduktion"
 IRE_carrier_production_idea:0 "Trägerproduktion"
 IRE_battleship_production_idea:0 "Schlachtschiffproduktion"
 IRE_submarine_production_idea:0 "U-Boot-Produktion"
 IRE_public_works_idea:0 "Öffentliche Arbeiten"
 IRE_spanish_volunteers_idea:0 "Freiwillige im nationalistischen Spanien"
 macdonald_proposal:0 "Der MacDonald-Vorschlag"
 macdonald_proposal_desc:0 "Vor kurzem wurden wir von einem britischen Beamten auf die mögliche Rückgabe Nordirlands an uns angesprochen, falls wir in den Krieg mit den Alliierten eintreten sollten."
 prepare_for_war:0 "Bereite dich auf den Krieg vor"
 prepare_for_war_desc:0 "Da wir nun geheime Verbindungen zu den Briten haben, können wir an der Bewaffnung unseres Landes arbeiten, um unseren Beitritt zu den Alliierten vorzubereiten."
 IRE_prepare_for_war:0 "Kriegsvorbereitungen"
 IRE_prepare_for_war_desc:0 "Da wir nun geheime Verbindungen zu den Briten haben, können wir an der Bewaffnung unseres Landes arbeiten, um unseren Beitritt zu den Alliierten vorzubereiten."
 peaceful_island:0 "Friedliche Insel"
 peaceful_island_desc:0 "Mit der Hoffnung auf Frieden und Wohlstand können wir es genießen, in diesem Krieg neutral zu bleiben."
 IRE_incompetent_army:0 "Inkompetente Armee"
 IRE_incompetent_army_desc:0 "Die irische Armee ist stark veraltet und es mangelt ihr an qualifizierten Offizieren, was die Gesamtleistungsfähigkeit der Armee beeinträchtigt."
 IRF:0 "Irland"
 IRF_DEF:0 "Irland"
 IRELAND_GATHERING_STORM_DESC:0 "Irland war über 800 Jahre lang Teil des Britischen Empire. Die Spannungen zwischen Briten und Iren nahmen heftig zu und führten zu zahlreichen Aufständen und Rebellionen. Der bekannteste Aufstand war der Osteraufstand von 1916, der zwar nur von kurzer Dauer war, aber zum Unabhängigkeitskrieg führte, der von 1919 bis 1921 tobte. Der Anglo-Irische Vertrag wurde 1921 unterzeichnet, wodurch Irland de facto ein Freistaat unter dem Britischen Empire wurde. Da Irland nun den Status einer Republik anstrebt, bleibt die Frage, wie Irland in diesen aufziehenden Sturm passen wird, nachdem im Ersten Weltkrieg Tausende Iren starben."
 ireland.1.t:0 "Die Wahlen von 1937"
 ireland.1.d:0 "Es ist Januar 1937, der Beginn einer neuen Legislaturperiode. Die irische Bevölkerung wird voraussichtlich an diesem Wochenende über die neue Regierung abstimmen. Fianna Fáil und Fine Gael sind nahezu gleich stark vertreten, denn Bürgerkriegspolitik ist in der irischen Politik noch immer ein wichtiges Thema."
 ireland.1.a:0 "Fianna Fáil!"
 ireland.1.b:0 "Feiner Gael!"
 expand_loyalist_influence:0 "Ausbau des Einflusses der irischen Unionisten"
 expand_loyalist_influence_desc:0 "Die irischen Katholiken haben die Protestanten im Land seit den Plantagen während der Herrschaft Heinrichs VIII. schlecht behandelt! Wir sollten den politischen Einfluss der Ulster Unionist Party in Irland ausweiten und das Land ein kleines Stück weit wieder in Richtung des Britischen Empires bewegen!"
 IRE_unionist_idea:0 "Unionistischer Einfluss"
 IRE_unionist_idea_desc:0 "Die Ulster Unionisten haben begonnen, ihren Einfluss auf die südliche Hälfte der Grenze auszuweiten. Während die Unionisten großen Zuspruch erhalten, sind die starken Republikaner zunehmend unzufrieden."
 seek_british_support:0 "Suchen Sie britische Unterstützung"
 seek_british_support_desc:0 "Wir müssen Kontakt mit der britischen Regierung aufnehmen, um die Freiwilligentruppe der Unionisten zu bewaffnen und uns auf einen möglichen Bürgerkrieg vorzubereiten."
 ireland.2.t:0 "Durchgreifen der Regierung"
 ireland.2.d:0 "Nach dem harten Vorgehen der Regierung gegen unsere unionistischen Ideale haben sich mehrere unionistische Gruppen mit protestantischer Mehrheit gegen die irischen Republikaner erhoben."
 ireland.2.a:0 "Für die Zukunft!"
 impending_government_crackdown:0 "Drohendes Durchgreifen der Regierung"
 government_crackdown:0 "Durchgreifen der Regierung"
 government_crackdown_desc:0 "Seitdem wir unseren unionistischen Einfluss in Irland ausgebaut haben, richtet sich das Augenmerk der irischen Regierung auf unsere Partei. Ein landesweites Verbot ist unvermeidlich und könnte zu Gewalt führen."
 IRE_secure_dublin_garrison_tt:0 "Leinster wird zu Beginn des „Bürgerkriegs“ unter der Kontrolle der „Unionisten“ stehen."
 IRU:0 "Irland"
 IRU_neutrality:0 "Irland"
 NUC:0 "Ödland"
 RI_optimisation:0 "Optimierung"
 recovery_from_civil_war_category:0 "Erholung vom Bürgerkrieg"
 stability_recovery:0 "Neue Gesetzgebung"
 purge_opposition:0 "Opposition säubern"
 purge_opposition_desc:0 "Wir sollten sowohl die Führung der Irish Republican Army als auch der Blueshirts-Organisation säubern."
 assassinate_de_valera:0 "Attentat auf de Valera"
 assassinate_de_valera_desc:0 "De Valera hat im ganzen Land politische Gewalt angezettelt, was zu überraschenden Hinterhalten und Angriffen auf unsere Ausrüstungsarsenale geführt hat. Er muss gehen."
 IRE_purge_opposition_idea:0 "Säuberungen der Opposition"
 IRE_stability_recovery_idea:0 "Neue Gesetzgebung"
 IRE_political_violence_idea:0 "Politische Gewalt"
 IRE_political_violence_idea_desc:0 "Nahezu alle Gegner stiften zu politischer Gewalt gegen die Unionist Party an, was zu Razzien und Attentaten führt."
 IRE_irish_civil_war_flag:0 "Der irische Bürgerkrieg dauert an"
 unionist_propaganda:0 "Unionistische Propaganda"
 unionist_propaganda_desc:0 "Wir müssen unionistische Propaganda verbreiten, um die Denkweise eines Teils der irischen Durchschnittsbevölkerung zu ändern. Von da an können wir unsere hochrangige Unterstützung in der irischen Armee ausbauen."
 secure_dublin_garrison:0 "Sichern Sie die Dubliner Garnison"
 secure_dublin_garrison_desc:0 "Wir können die Loyalität einiger Offiziere, die die Garnison in Dublin befehligen, gewinnen. Wenn wir die Kontrolle über diese Garnison erlangen, ist uns die vollständige Kontrolle über Leinster garantiert."
 recover_from_civil_war:0 "Erholung vom Bürgerkrieg"
 recover_from_civil_war_desc:0 "Nachdem wir die Gewalt endlich eingedämmt haben, können wir an der vollständigen Sicherung des Landes arbeiten. Obwohl dies ein langer und schwieriger Prozess sein wird, ist er notwendig."
 ireland.3.t:0 "Zweiter irischer Bürgerkrieg"
 ireland.3.d:0 "Nach dem harten Vorgehen der irischen Regierung gegen die Unionistische Partei haben sich mehrere unionistische Gruppen und Protestanten gegen die Regierung erhoben. Nach der Eskalation der Gewalt in Dublin kam es zu Schüssen zwischen irischen Republikanern und Unionisten, die einen landesweiten Bürgerkrieg auslösten. Sogar Unionisten aus Nordirland, das seit 1921 unter britischer Kontrolle steht, haben sich dem Kampf gegen die irischen Republikaner angeschlossen und scheinen dabei die Unterstützung der britischen Regierung zu genießen."
 ireland.3.a:0 "Interessant."
 invest_in_connaught:0 "Investieren Sie in Connaught"
 invest_in_connaught_desc:0 "Connaught ist eine der vielfältigsten und größten Provinzen Irlands, reich an Rohstoffen und Industriezweigen. Wir sollten in Connaught investieren und die Industrieproduktion der Region weiter steigern."
 coal_cattle_pact:0 "Kohle-Vieh-Pakt"
 coal_cattle_pact_desc:0 "Der anglo-irische Handelskrieg hat unsere Wirtschaft stark belastet und den Kauf von Kohle und Vieh zunehmend teurer gemacht. Intensivere Gespräche in London können zur Lösung dieser schwierigen Situation beitragen, da die Briten die Verabschiedung des Confirmation of Agreements Act vorgeschlagen haben."
 invest_in_munster:0 "Investieren in Münster"
 invest_in_munster_desc:0 "Münster ist die zweitgrößte Stadt Deutschlands und damit die Heimat eines großen Industriestandorts. Investitionen in die Industrie und die lokale Wirtschaft sollten für uns oberste Priorität haben, um unsere Volkswirtschaft aufzubauen."
 agricultural_subsidies:0 "Agrarsubventionen"
 agricultural_subsidies_desc:0 "Die Landwirtschaft macht den größten Teil der irischen Zivilwirtschaft aus. Wenn wir den Landwirten die notwendigen Finanzmittel und Subventionen zur Verfügung stellen, können wir die irische Landwirtschaft wirklich modernisieren und unsere Exporte deutlich steigern."
 negotiate_trade_deals:0 "Handelsabkommen aushandeln"
 negotiate_trade_deals_desc:0 "Es ist an der Zeit, diesen unerträglichen Handelskrieg zu beenden, der uns seit 1932 plagt. Ausführliche Gespräche mit der britischen Regierung können hoffentlich zu einer Lösung dieses Problems führen."
 military_research_institute:0 "Militärisches Forschungsinstitut"
 military_research_institute_desc:0 "Unserem Militär mangelt es gravierend an Forschungs- und Entwicklungseinrichtungen. Wir sollten in Dublin ein Institut errichten und es stark in die Munitionsproduktion einbinden."
 invest_in_leinster:0 "Investieren Sie in Leinster"
 invest_in_leinster_desc:0 "Leinster ist die Hauptstadt Irlands und die am stärksten industrialisierte der vier irischen Provinzen. Der Großteil unserer Mittel sollte in die Produktion der hier ansässigen Industrie fließen."
 motorways:0 "Autobahnen"
 motorways_desc:0 "Irlands Nationalstraßen müssen ausgebaut werden. Daher ist der Bau großer Schnellstraßen die beste Form der Straßeninfrastruktur, um große Städte miteinander zu verbinden."
 queens_university:0 "Queen&#39;s Universität"
 queens_university_desc:0 "Wir sollten die Forschungskapazitäten der Queen’s University in Belfast ausbauen, um ein modernes Militär und eine moderne nationale Industrie aufzubauen."
 shipbuilding_grants:0 "Schiffbauzuschüsse"
 shipbuilding_grants_desc:0 "Harland &amp; Wolff ist in Nordirland für seinen Schiffbau bekannt. Wir sollten ihnen Zuschüsse gewähren, damit sie unsere Schiffe entwerfen können."
 reinforce_the_middle_east:0 "Stärkung der Kolonien im Nahen Osten"
 reinforce_the_middle_east_desc:0 "Unsere Kolonien sind zahlreichen globalen Bedrohungen ausgesetzt – darunter Großbritannien, die Sowjetunion und viele andere mächtige Nationen wie Indien und China. Wir müssen dringend Verteidigungsanlagen an wichtigen strategischen Punkten errichten, bevor wir unsere Kolonien weiter ausbauen können."
 develop_iran:0 "Iran entwickeln"
 develop_iran_desc:0 "Der Iran verfügt über die reichsten Ländereien im Nahen Osten. Wir sollten seine Industriekapazitäten ausbauen, bevor wir weitere Fabriken bauen und seine zahlreichen Ressourcen ausbeuten."
 iran_car_industry:0 "Iranische Automobilindustrie"
 iran_car_industry_desc:0 "Der Iran ist die Heimat einer Automobilindustrie, die, wenn wir investieren, die lokale Wirtschaft in der Region erheblich ankurbeln kann."
 iran_construction_grants:0 "Bauzuschüsse"
 iran_construction_grants_desc:0 "Das Baugewerbe ist im Iran eine riesige Branche. Mit ausreichenden Zuschüssen und staatlichen Mitteln können wir diese Branche noch weiter fördern."
 invest_in_the_colonies:0 "Investieren Sie in die Kolonien"
 invest_in_the_colonies_desc:0 "Nachdem wir nun auf der ganzen Welt Kolonien gegründet haben, ist es an der Zeit, in die Entwicklung ihrer Industrie und Verteidigung zu investieren."
 iran_arms_industry:0 "Iranische Rüstungsindustrie"
 iran_arms_industry_desc:0 "Der Bau zusätzlicher Fabriken zur Herstellung militärischer Ausrüstung im Iran wird die Versorgung unserer Armee erheblich verbessern."
 iran_motorways:0 "Iranische Autobahnen"
 iran_motorways_desc:0 "Um mit der industriellen Entwicklung Schritt zu halten, ist eine ausreichende Infrastruktur erforderlich, um alle Lieferungen abzuwickeln, die über die beiden größten Städte des Irans kommen."
 ireland.4.t:0 "Das Kaiserreich Irland fordert unsere arabischen Besitztümer!"
 ireland.4.d:0 "Diplomaten des selbsternannten „Empire of Ireland“ haben gefordert, dass wir ihnen unsere arabischen Besitztümer übergeben, um Konflikte in der Region zu vermeiden. Zuvor hatten sie bereits die meisten unabhängigen Nationen in der Region unter ihre Kontrolle gebracht."
 ireland.4.a:0 "Übergeben Sie sie."
 ireland.4.b:0 "NEIN!"
 mine_persian_gulf:0 "Minen Sie den Persischen Golf"
 mine_persian_gulf_desc:0 "Im Kriegsfall können wir den Zugang zum Persischen Golf einschränken, indem wir die Gewässer in und um die Region verminen. Obwohl die Briten das nicht mögen, können wir dies nutzen, um ihre nahe gelegenen Kolonien einzufordern."
 demand_british_colonies:0 "Nachfrage britischer Kolonien"
 demand_british_colonies_desc:0 "Die kleinen britischen Kolonien in der Region sind vergessene Landstriche, die von den Briten jahrelang vernachlässigt wurden. Wenn wir sie erobern, können wir die Wirtschaft dieser Regionen stärken."
 develop_afghanistan:0 "Afghanistan entwickeln"
 develop_afghanistan_desc:0 "Afghanistan wurde historisch immer von westlichen Mächten ausgebeutet. Wir können den afghanischen Regierungen vor Ort beim Aufbau ihrer industriellen Kapazitäten helfen."
 afghan_tungsten:0 "Öffnen Sie die afghanischen Wolframminen"
 afghan_tungsten_desc:0 "Afghanistan ist reich an Wolfram, einem wertvollen Rohstoff. Wir sollten diese Ressourcen durch die Eröffnung von Minen in der Region erschließen."
 afghan_railways:0 "Transafghanische Eisenbahn"
 afghan_railways_desc:0 "Die Infrastruktur in Afghanistan ist sehr schlecht. Wir können die Logistik und Infrastruktur insgesamt verbessern, indem wir landesweit Eisenbahnlinien bauen."
 invite_oil_investors:0 "Laden Sie ausländische Ölinvestoren ein"
 invite_oil_investors_desc:0 "Der Nahe Osten ist für seine enormen Ölvorkommen bekannt. Die Anwerbung ausländischer Investoren sollte unser erster Schritt sein, bevor wir die Ölindustrie weiter ausbauen."
 iranian_oil:0 "Iranisches Öl ausbeuten"
 iranian_oil_desc:0 "Der Iran verfügt bereits über riesige Ölfelder, wir können diese Ölfelder jedoch ausbeuten, um möglichst viel Öl zu gewinnen."
 saudi_oil:0 "Ausbau der saudi-arabischen Ölproduktion"
 saudi_oil_desc:0 "Die Ölproduktion Saudi-Arabiens ist im Verhältnis zu den Ölreserven der Region recht gering. Der Ausbau der Industrieanlagen wird die Ölproduktion drastisch steigern."
 ireland.5.t:0 "Irland fordert die Übergabe von Ulster"
 ireland.5.d:0 "Irische Diplomaten sind in London eingetroffen und fordern die Rückgabe von Ulster an sie. Ulster war ein Teil Irlands, bis wir es ihnen durch den Anglo-Irischen Vertrag von 1921 abnahmen."
 ireland.5.a:0 "Es ist an der Zeit, dass sie Ulster zurückbekommen."
 ireland.5.b:0 "NEIN!"
 demand_the_north:0 "Nachfrage Nordirland"
 demand_the_north_desc:0 "Es ist an der Zeit, dass wir uns unser rechtmäßiges Land zurückholen, das uns seit 1921 entzogen wurde!"
 IRE_secure_dublin_garrison_tt:0 "Zu Beginn des Bürgerkriegs wird Leinster unter der Kontrolle der Unionisten stehen."
 IRE_shipbuilding_grants_tt:0 "Schaltet §C Harland &amp; Wolff §! als Schiffsdesigner frei"
