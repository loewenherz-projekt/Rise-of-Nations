l_german:
 bftb_greece.1.t:0 "Die Monarchisten gewinnen die Wahl!"
 bftb_greece.1.desc:1 "Die griechischen Massen waren wenig überrascht, als sie hörten, dass die konservativen Anhänger König Georgs II. die griechischen Wahlen von 1936 gewonnen hatten. Premierminister Konstantinos Demertzis wird voraussichtlich im Amt bleiben, und der König äußerte seine persönliche Überzeugung, dass Demertzis&#39; Amtszeit sehr lang und erfolgreich sein wird. Nur die Zeit wird zeigen, ob sich der König mit seiner Vermutung bewahrheitet ..."
 bftb_greece.1.a:0 "Ein großartiger Sieg für Griechenland …"
 bftb_greece.2.t:0 "Die Venezelisten gewinnen die Wahl!"
 bftb_greece.2.desc:1 "Die griechische Bevölkerung war heute in den Straßen Griechenlands und feierte die Entscheidung der Armee, die Monarchisten daran zu hindern, das Wahlergebnis zu beeinflussen. Die Venezolanischen Demokraten haben nach ihrer Rückkehr aus dem Ausland ein mächtiges Regierungsmandat erhalten. Doch ihnen steht ein harter Kampf bevor, um ein tief gespaltenes Land zu einen, das den verheerenden Krieg, in den die Venezolanischen Demokraten 1919 das ganze Land verwickelten, noch nicht vergessen hat. Es bleibt auch die Frage, was die Venezolanischen Demokraten mit dem gefangenen griechischen Monarchen machen werden – egal, was passiert, Griechenland stehen interessante Zeiten bevor …"
 bftb_greece.2.a:0 "Endlich sind wir zurück!"
 GRE_republican_victory_tt:1 "Die £faction_gre_monarchistischen §YMonarchisten§! werden §YGleichgültig§!. \nDie £faction_gre_communistischen §YKommunisten§! werden §YGleichgültig§!."
 bftb_greece.3.t:1 "Die anatolischen Faschisten mobilisieren"
 bftb_greece.3.desc:1 "Die selbsternannte faschistische Bewegung Griechenlands hat sich entsprechend unserer neuen politischen Realität neu orientiert. Verbitterte und verärgerte griechische Flüchtlinge aus der Türkei schließen sich der neuen radikalen politischen Bewegung von Georgios Kosmidis an, einem weiteren Griechen, der aus seiner Heimat verbannt wurde. \n\nKosmidis ist ein lautstarker Befürworter der Megali-Idee und der Rückgewinnung historischer Gebiete, die an [TUR.GetNameDef] verloren gingen, obwohl seine Ansichten weitaus radikaler sind als die aller anderen Mitglieder der venezolanischen Regierung. Einige Berichte deuten darauf hin, dass Kosmidis die Grenzen von [ROOT.GetNameDef] über die Ägäis hinaus ausdehnen möchte und dass er möglicherweise Pläne für ganz Anatolien hat. Solche Berichte sind jedoch mit Vorsicht zu genießen – was für ein Verrückter könnte Pläne für ganz [TUR.GetNameDef] schmieden?"
 bftb_greece.3.a:1 "Diesem Schläger wird niemand jemals folgen!"
 GRE_anatolian_fascists_in_play_tt:1 "Die £faction_gre_fascist §YFascists§! entstehen und beginnen als §Rhostile§!."
 GRE_republican_monarchist_alliance_tt:1 "Monarchistische Generäle und Minister stehen der venezianischen Regierung weiterhin zur Verfügung. \nDie £faction_gre_monarchistischen §YMonarchisten§! sind §Gfreundlich§! geworden. \nDie £faction_gre_kommunistischen §YKommunisten§! werden §Rfeindlich§!."
 bftb_greece.6.t:0 "Verhandlungen mit der EEE"
 bftb_greece.6.desc:0 "Die heimtückischen anatolischen Faschisten haben seit Beginn ihrer bösartigen Bewegung Chaos gestiftet und sich gleichzeitig unnahbar für die Regierung gemacht. Doch die Dinge scheinen sich zu ändern. Uns wurde das Angebot gemacht, den Deal des Jahrhunderts zu schließen – unsere Kräfte mit den anatolischen Faschisten zu bündeln, um unser gemeinsames Ziel einer Niederlage von [TUR.GetNameDef] zu erreichen. \n\nEs lässt sich nicht leugnen, dass viele unserer Verwaltungsangestellten diesen Deal mit den Teufeln unserer Nation eingehen würden, nur um sie dazu zu bringen, ihre regierungsfeindlichen Aktionen einzustellen. Es lässt sich auch nicht leugnen, dass es sogar unter unseren Beamten einige Schlangen gibt, die die Ziele der EEE akzeptabel oder sogar lobenswert finden. Glücklicherweise hat uns der Magnat Aristoteles Onassis eine Alternative präsentiert: Onassis, ebenfalls aus Anatolien, wird mit seinem Ruhm, seinem Geschäftssinn und seinem persönlichen Reichtum eine Gegenbewegung gründen und diese Bewegung nutzen, um die Unterstützungsbasis der EEE zu schwächen. Dieses Vorgehen garantiert keineswegs die Zerschlagung der EEE, aber wir haben mehr als genug Beweise dafür, dass Onassis den Coup durchaus durchziehen könnte, wenn wir ihn darum bitten."
 bftb_greece.6.a:1 "Die Geister der Vergangenheit werden nicht zurückkehren und uns erneut heimsuchen."
 bftb_greece.6.b:0 "Keine Geschäfte mit faschistischem Ungeziefer."
 GRE_ally_the_anatolian_fascists_tt:1 "Die §YFaschisten§! der £faction_gre_fascist werden §Gfreundlich§!! \nEine Allianz mit den §YEEE§! wird §RSeriöse Konsequenzen§! haben, wenn der §YKongress von Heraklion§! einberufen wird."
 GRE_ally_onassis_tt:1 "§YAristoteles Onassis§! wird als Minister zur Verfügung stehen. \nDie £faction_gre_fascist §YFaschisten§! bleiben §Yfeindlich§!."
 GRE_increased_influence_tt:0 "Dies wird unseren Einfluss auf die §Y[FROM.GetAdjective]§!-Regierung erhöhen."
 bftb_greece.7.t:0 "Die Heraklion-Konvention"
 bftb_greece.7.desc:0 "Endlich ist es an der Zeit, die Verträge von Sèvres und Lausanne mit den europäischen Großmächten erneut zu prüfen und auch das Thema der Megali-Idee wieder aufzugreifen. Über das Schicksal von [TUR.GetNameDef] können wir nicht allein entscheiden, daher müssen wir zunächst die Zustimmung von [ENG.GetNameDef], [FRA.GetNameDef] und dem verachtenswerten [ITA.GetNameDef] gewinnen und pflegen, wenn wir sie zu unserer Konferenz einladen möchten."
 bftb_greece.7.a:0 "Wir werden [FRA.GetAdjective] und [ENG.GetAdjective] Delegierte einladen."
 bftb_greece.7.b:0 "Wir werden die ursprünglichen Unterzeichner des Sèvres-Abkommens einladen."
 bftb_greece.8.t:0 "Eine Einladung zur Heraklion Convention"
 bftb_greece.8.desc:0 "Wir haben gerade einen interessanten Vorschlag von [FROM.GetNameDef] erhalten, der offensichtlich die Grenzen von [TUR.GetNameDef] neu ziehen möchte. [FROM.GetNameDef] möchte eine Diskussion zwischen den europäischen Siegermächten des Ersten Weltkriegs anstoßen, um die Verträge von Sèvres und Lausanne, die wir [TUR.GetNameDef] aufzwingen wollten, zu überarbeiten. \n\nBeamte von [FROM.GetNameDef] versichern unseren Beamten, dass wir von einem besiegten [TUR.GetNameDef] materiell profitieren würden und dass die Auslöschung von [TUR.GetNameDef] nicht der Wunsch der [FROM.GetAdjective]-Regierung sei. Stattdessen bestehen Figuren von [FROM.GetNameDef] darauf, diese Konvention als eine einfache Angelegenheit der Neuordnung der Grenzen und nicht als die Verwirklichung revanchistischer Träume zu bezeichnen."
 bftb_greece.8.a:0 "Erwarten Sie uns dort."
 bftb_greece.8.b:0 "Sie würden das Mittelmeer destabilisieren!"
 potential_war_with_turkey_tt:0 "§RInformieren wir uns zur Teilnahme, besteht eine erhebliche Chance, dass wir in naher Zukunft im Austausch gegen Territorium in einen Krieg mit [TUR.GetNameDef] hineingezogen werden§!."
 bftb_greece.9.t:0 "Nur [ENG.GetNameDef] nimmt an der Heraklion Convention teil"
 bftb_greece.9.desc:0 "Einladungen zu unserem Heraklion-Konvent zur Neuordnung der Grenzen von [TUR.GetNameDef] wurden an alle von uns gewünschten Mächte verschickt. Obwohl wir mit der Teilnahme aller eingeladenen Nationen gerechnet hatten, stellte sich heraus, dass nur [ENG.GetNameDef] an unserem Gipfel teilnehmen wird. Unsere Beziehungen zu [ENG.GetNameDef] waren schon immer eng, daher sind viele unserer Beamten weiterhin zuversichtlich, dass der Heraklion-Konvent zu einer Lösung führen kann, die beiden Nationen zugutekommt."
 bftb_greece.9.a:0 "Auf die [ENG.GetAdjective] war immer Verlass!"
 bftb_greece.10.t:0 "Nur [FRA.GetNameDef] nimmt an der Heraklion Convention teil"
 bftb_greece.10.desc:0 "Einladungen zu unserem Heraklion-Konvent zur Neuordnung der Grenzen von [TUR.GetNameDef] wurden an alle von uns gewünschten Mächte verschickt. Obwohl wir mit der Teilnahme aller eingeladenen Nationen gerechnet hatten, stellte sich heraus, dass nur [FRA.GetNameDef] an unserem Gipfel teilnehmen wird. Bestürzung trifft am besten die Gefühle der [ROOT.GetAdjective]-Beamten nach Bekanntwerden der Nachricht. Weder unsere politische Elite noch unsere Militärexperten sind davon überzeugt, dass der Heraklion-Konvent die Früchte tragen wird, die wir einst mit [FRA.GetAdjective] an unserer Seite erwartet hatten, aber wir bleiben unserem Kurs treu."
 bftb_greece.10.a:0 "Nur das [FRA.GetAdjective]? Wir sollten das einfach hinter uns bringen."
 bftb_greece.11.t:0 "Nur [ITA.GetNameDef] nimmt an der Heraklion Convention teil"
 bftb_greece.11.desc:0 "Unsere niedergeschlagenen Beamten haben die katastrophale Nachricht, dass nur [ITA.GetNameDef] Interesse an der Entscheidung über [TUR.GetNameDef]s Schicksal auf dem Kongress von Heraklion signalisiert hat, gründlich durchleuchtet und schließlich beschlossen, dass die einzige mögliche Lösung darin besteht, den Kongress von Heraklion vollständig abzusagen. Dieser Schritt ist nicht leichtfertig getroffen worden, da sich viele venezolanische Beamte nur allzu bewusst sind, dass sie die gesamte Legitimität ihrer Bewegung auf die Rache für 1922 gesetzt haben und sich die Situation nun so weit zugespitzt hat, dass die gesamte Operation in Gefahr ist. \n\nDie [ROOT.GetAdjective]-Leute sind aufgrund des Mangels an Nachrichten nach dem großen Hype um das Ereignis bereits unruhig geworden. Die EEE haben die lodernden Flammen der Unzufriedenheit mit Begeisterung ausgenutzt und unserer Regierung Schwäche und das Nichteinhalten unserer Versprechen vorgeworfen. Wie wird [ROOT.GetLeader] uns aus diesen trüben Gewässern herausführen?"
 bftb_greece.11.a:0 "Daraus kann nichts Gutes entstehen; der Kongress muss abgesagt werden."
 bftb_greece.12.t:0 "[ENG.GetNameDefCap] und [FRA.GetNameDef] nehmen an der Heraklion Convention teil"
 bftb_greece.12.desc:0 "Die in der Hauptstadt versammelten Beamten zeigten sich erfreut, als sie hörten, dass sowohl [ENG.GetNameDef] als auch [FRA.GetNameDef] Delegierte zu unserem Heraklion-Kongress entsenden würden. Die Vorbereitungen für den Gipfel sind bereits getroffen, und der Kongress wird in wenigen Tagen offiziell beginnen. \n\nGemeinsam werden unsere Delegierten Einflusssphären im Norden und Süden von [TUR.GetName] aufteilen, bevor sie schließlich entscheiden, ob uns unsere rechtmäßigen Gebiete entlang der Ägäis zugesprochen werden. Es wird Geschichte geschrieben, und [ROOT.GetNameDef] wird mittendrin sein."
 bftb_greece.12.a:0 "[ROOT.GetAdjective] Hände sollen die Welt formen."
 bftb_greece.13.t:0 "Alle Unterzeichner des Sèvres-Abkommens nehmen an der Heraklion-Konvention teil"
 bftb_greece.13.desc:0 "Die in der Hauptstadt versammelten Beamten zeigten sich erfreut, als sie hörten, dass sowohl [ENG.GetNameDef] als auch [FRA.GetNameDef] Delegierte zu unserem Kongress in Heraklion entsenden würden, doch die Aufregung über [ITA.GetNameDef]s Teilnahme trübte diese Begeisterung ein wenig. Viele unserer Politiker äußerten hinter vorgehaltener Hand ihre Besorgnis, dass [ITA.GetAdjective]-Intrigen die gesamte Veranstaltung sabotieren könnten, doch [ROOT.GetLeader] ist nach wie vor davon überzeugt, dass die Einladung von [ITA.GetNameDef] die richtige Entscheidung war. Die Vorbereitungen für den Gipfel sind bereits getroffen, und der Kongress wird in wenigen Tagen offiziell beginnen. \n\nGemeinsam werden unsere Delegierten Einflusssphären im Norden und Süden von [TUR.GetName] aufteilen, bevor sie letztendlich entscheiden, ob uns unsere rechtmäßigen Gebiete entlang der Ägäis zugesprochen werden. Es wird Geschichte geschrieben, und [ROOT.GetNameDef] wird mittendrin sein."
 bftb_greece.13.a:0 "Das dürfte interessant werden ..."
 bftb_greece.14.t:0 "Niemand nimmt an unserer Tagung teil!"
 bftb_greece.14.desc:0 "Unsere Regierung wurde durch die Nachricht, dass keines der eingeladenen Länder Delegierte zu unserem Kongress in Heraklion entsenden würde, völlig gedemütigt. Schlimmer noch: Unsere Führung wurde von den Großmächten öffentlich dafür kritisiert, die Spannungen in der Region zu schüren. Diese Ereignisse als weniger verheerend zu bezeichnen, wäre untertrieben, denn viele venezolanische Funktionäre sind sich nur allzu bewusst, dass sie die Legitimität ihrer Bewegung auf die Rache für 1922 gesetzt haben. Nun hat sich die Situation so weit zugespitzt, dass die gesamte Operation in Gefahr ist. \n\nDie [ROOT.GetAdjective]-Leute sind aufgrund der fehlenden Nachrichten nach dem großen Hype um das Ereignis bereits unruhig geworden. Die EEE haben die lodernde Unzufriedenheit mit Begeisterung ausgenutzt und unserer Regierung Schwäche und mangelnde Versprechen vorgeworfen. Wie wird [ROOT.GetLeader] uns aus diesen trüben Gewässern führen?"
 bftb_greece.14.a:0 "Unsere Hybris hat uns ins Verderben geführt."
 bftb_greece.15.t:0 "Die Heraklion-Konvention – ein [FRA.GetAdjective]-Mandat in Kurdistan?"
 bftb_greece.15.desc:0 "Das Thema der ersten Abstimmungsrunde ist, ob [FRA.GetNameDef] nach der Kapitulation von [TUR.GetNameDef] ein [FRA.GetAdjective]-Mandat in [TUR.GetAdjective] Kurdistan gewährt werden soll oder nicht. Viele anwesende [FRA.GetAdjective]-Funktionäre halten eine solche Regelung angesichts der Nähe von [FRA.GetNameDef] zu der Region und des bereits in [TUR.GetAdjective] Kurdistan vorhandenen, recht ausgeprägten Nationalismus für vollkommen logisch, obwohl eingeräumt wurde, dass es im eigenen Land angesichts der Überlastung des [FRA.GetAdjective]-Imperiums möglichen Widerstand gegen diese Idee geben könnte. \n\nSollte [FRA.GetAdjective] ihr Konzessionsrecht in [TUR.GetNameDef] gewährt werden, sind sie per Vertrag verpflichtet, [GRE.GetNameDef] zu Hilfe zu kommen, sobald ein Krieg mit [TUR.GetNameDef] beginnt. Wenn der Antrag abgelehnt wird, besteht für [FRA.GetNameDef] unabhängig vom Ausgang der Konvention von Heraklion zu Beginn des Krieges keinerlei Verpflichtung gegenüber [GRE.GetNameDef]."
 bftb_greece.15.a:0 "Wir stimmen mit Ja!"
 bftb_greece.15.b:0 "Wir stimmen mit Nein!"
 GRE_french_kurdistan_option_tt:1 "Wenn der Antrag angenommen wird und die Konvention von Heraklion letztlich erfolgreich ist, dann wird §Y[TUR.GetNameDefCap]§! nach der Kapitulation von §Y[FRA.GetNameDefCap]§! einen §Ykurdischen§! Marionettenstaat in allen von [TUR.GetAdjective] gehaltenen Staaten errichten, die Kerne von §YKurdistan§! sind."
 bftb_greece.16.t:0 "Die Heraklion-Konvention – die [FRA.GetAdjective] erhalten ihr Mandat!"
 bftb_greece.16.desc:0 "Die Mehrheit der anwesenden Delegierten hat dafür gestimmt, dass [FRA.GetNameDef] nach dem erfolgreichen Sturz des [TUR.GetAdjective]-Staates ein Mandat in Kurdistan erhalten soll. [FRA.GetAdjective]-Beamte haben die anwesenden Delegierten für ihre kluge Staatskunst gelobt und der Zentralregierung [FRA.GetAdjective] bereits Anweisungen übermittelt, mit der Planung für die Einrichtung einer Verwaltung in der Region zu beginnen."
 bftb_greece.16.a:0 "Die Mehrheit ist dafür!"
 bftb_greece.17.t:0 "Die Heraklion-Konvention – den [FRA.GetAdjective] wird ihr Mandat verweigert!"
 bftb_greece.17.desc:0 "Die Mehrheit der anwesenden Delegierten hat dafür gestimmt, dass [FRA.GetNameDef] nach der erfolgreichen Bezwingung des [TUR.GetAdjective]-Staates jegliches Territorium in Kurdistan verweigert werden sollte. [FRA.GetAdjective]-Funktionäre hätten beinahe beschlossen, die Versammlung ganz zu verlassen, da sie das Ereignis als Farce bezeichneten, kamen dann aber zu dem Schluss, dass sie lieber weiterhin Einfluss auf die weiteren Vorgänge nehmen möchten, auch wenn ihnen nichts versprochen wurde."
 bftb_greece.17.a:0 "Die Nein-Stimmen haben es geschafft!"
 bftb_greece.18.t:0 "Die Heraklion-Konvention – ein [ENG.GetAdjective] Protektorat in Armenien?"
 bftb_greece.18.desc:0 "Das Thema dieser Abstimmungsrunde ist, ob [ENG.GetNameDef] nach der Kapitulation von [TUR.GetNameDef] ein armenisches Protektorat in [TUR.GetAdjective] [354.GetName] gewährt werden soll oder nicht. Die Frage, ob innerhalb der Grenzen von [TUR.GetAdjective] ein armenischer Staat geschaffen werden soll, war angesichts der beunruhigenden jüngsten Ereignisse umstritten, aber die Delegierten von [ENG.GetAdjective] vertreten die Ansicht, dass die Gründung eines armenischen Staates an der Grenze von [SOV.GetAdjective] nicht nur moralisch richtig, sondern auch strategisch sehr sinnvoll sei. \n\nSollte [ENG.GetAdjective] ihr Konzessionsrecht in [TUR.GetNameDef] gewährt werden, sind sie vertraglich verpflichtet, [GRE.GetNameDef] zu Hilfe zu kommen, sobald ein Krieg mit [TUR.GetNameDef] beginnt. Wenn der Antrag abgelehnt wird, besteht für [ENG.GetNameDef] unabhängig vom Ausgang der Konvention von Heraklion zu Beginn des Krieges keinerlei Verpflichtung gegenüber [GRE.GetNameDef]."
 bftb_greece.18.a:0 "Wir stimmen mit Ja!"
 bftb_greece.18.b:0 "Wir stimmen mit Nein!"
 GRE_british_armenia_option_tt:1 "Wenn der Antrag angenommen wird und die Konvention von Heraklion letztlich erfolgreich ist, dann wird nach der Kapitulation von §Y[TUR.GetNameDefCap]§! ein §Yarmenischer§! Marionettenstaat in §Y[354.GetName]§! errichtet."
 bftb_greece.19.t:0 "Die Heraklion-Konvention – die [ENG.GetAdjective] bekommen ihr Protektorat!"
 bftb_greece.19.desc:0 "Die Mehrheit der anwesenden Delegierten hat dafür gestimmt, dass [ENG.GetNameDef] ein armenisches Protektorat gewährt werden soll, das aus der Hülle eines besiegten [TUR.GetName] herausgelöst werden soll. [ENG.GetAdjective]-Beamte haben die anwesenden Delegierten für ihre kluge Staatskunst gelobt und bereits Anweisungen an die Zentralregierung [ENG.GetAdjective] weitergeleitet, mit der Planung für die Einrichtung einer Verwaltung in der Region zu beginnen."
 bftb_greece.19.a:0 "Die Mehrheit ist dafür!"
 bftb_greece.20.t:0 "Die Heraklion-Konvention – den [ENG.GetAdjective] wird ihre Marionette verweigert!"
 bftb_greece.20.desc:0 "Die Mehrheit der anwesenden Delegierten hat dafür gestimmt, [ENG.GetNameDef] das Recht zu verweigern, im Norden [TUR.GetNameDef] einen armenischen Marionettenstaat zu gründen. [ENG.GetAdjective]-Funktionäre verurteilten die Entscheidung und bezeichneten die gesamte Versammlung als chaotisch, entschieden jedoch, dass sie lieber weiterhin Einfluss auf die weiteren Vorgänge nehmen möchten, auch wenn ihnen nichts garantiert wurde."
 bftb_greece.20.a:0 "Die Nein-Stimmen haben es geschafft!"
 bftb_greece.21.t:0 "Die Konvention von Heraklion – [ITA.GetAdjective] Kolonien in [342.GetName] und [345.GetName]"
 bftb_greece.21.desc:0 "Das Thema dieser Abstimmungsrunde ist, ob [ITA.GetNameDef] nach der Eroberung von [TUR.GetNameDef] Kolonialgebiete im Süden von [TUR.GetNameDef] zugesprochen werden sollen oder nicht. Alle Teilnehmer haben gewisse Vorbehalte gegen die freiwillige Übergabe von Gebieten im Mittelmeerraum an die [ITA.GetAdjective], aber die [ITA.GetAdjective]-Delegierten plappern die Worte von [ITA.GetLeader] nach, wenn sie nachdrücklich zum Ausdruck bringen, dass die Gewährung dieser Gebiete lediglich eine Wiedergutmachung einiger der Fehler der „Vittoria mutilata“ wäre. \n\nVor dem formellen Beginn des Abkommens von Heraklion entschieden die anderen anwesenden Mächte, dass eine Beteiligung von [ITA.GetAdjective] an einer Invasion von [TUR.GetNameDef] unerwünscht wäre. Anstatt direkt am Krieg teilzunehmen, wäre [ITA.GetNameDef], wenn ihm sein Zugeständnis gewährt würde, an einen Nichtangriffspakt mit [GRE.GetNameDef] und einen Nichteinmischungspakt hinsichtlich des hypothetischen Krieges mit [TUR.GetNameDef] gebunden. Sollte der Antrag abgelehnt werden, hätte [ITA.GetNameDef], unabhängig vom Ausgang der Konvention von Heraklion, zu Beginn seines Krieges keinerlei Verpflichtungen gegenüber [GRE.GetNameDef] und könnte sogar versuchen, einzugreifen."
 bftb_greece.21.a:0 "Wir stimmen mit Ja!"
 bftb_greece.21.b:0 "Wir stimmen mit Nein!"
 bftb_greece.22.t:0 "Die Konvention von Heraklion – die [ITA.GetAdjective]s bekommen ihre Gebiete!"
 bftb_greece.22.desc:0 "Die Mehrheit der anwesenden Delegierten hat dafür gestimmt, dass [ITA.GetNameDef] Kolonien zugesprochen werden sollten, die aus dem Kadaver eines besiegten [TUR.GetName] herausgelöst wurden. [ITA.GetAdjective]-Beamte haben den anwesenden Delegierten für ihre umsichtige Entscheidung in dieser Angelegenheit applaudiert, und viele Mitglieder der [ITA.GetAdjective]-Delegation sind bereits nach Hause geströmt, um [ITA.GetLeader] die Neuigkeit zu überbringen."
 bftb_greece.22.a:0 "Die Mehrheit ist dafür!"
 bftb_greece.23.t:0 "Die Heraklion-Konvention – den [ITA.GetAdjective]s werden ihre Territorien verweigert!"
 bftb_greece.23.desc:0 "Die Mehrheit der anwesenden Delegierten stimmte dafür, [ITA.GetNameDef] das Recht zu verweigern, Kolonien im südlichen [TUR.GetNameDef] zu gründen, und verurteilte den Antrag selbst als weiteren albernen [ITA.GetAdjective] Kriegstreiber. [ITA.GetAdjective] Beamte griffen die Entscheidung an und nutzten die gesamte Situation, um zu verdeutlichen, dass sie ein weiterer Beweis dafür sei, dass das [ITA.GetAdjective] Volk mit seinem Glauben an die „Vittoria mutilata“ Recht habe. Ungeachtet ihrer persönlichen Ansichten zu dieser Angelegenheit wurde den [ITA.GetAdjective] Delegierten befohlen, an den Verhandlungen des Konvents teilzunehmen – zweifellos in der Hoffnung, dass sie das Urteil über den letzten und wichtigsten Tagesordnungspunkt noch beeinflussen können.“"
 bftb_greece.23.a:0 "Die Nein-Stimmen haben es geschafft!"
 bftb_greece.24.t:0 "Die Heraklion Convention – Die Megali-Idee"
 bftb_greece.24.desc:0 "Das Thema dieser Abstimmungsrunde ist, ob die Megali-Idee, die seit langem gehegten revanchistischen Ideale eines Großgriechenlands, von den anwesenden Großmächten zugelassen werden sollten oder nicht. [GRE.GetAdjective] Staatschef [GRE.GetLeader] stattete dem Sitzungssaal des Heraklion-Konvents einen Überraschungsbesuch ab und hielt eine leidenschaftliche Rede darüber, dass die Megali-Idee mehr als nur eine zynische Landnahme darstelle und dass sie die Verwirklichung eines gemeinsamen, seit Jahrhunderten von [GRE.GetAdjective]n auf der ganzen Welt gehegten Traums sei. \n\nEs steht außer Frage: Sollte die Megali-Idee hier und jetzt abgelehnt werden, sind alle im Heraklion-Konvent gemachten Zugeständnisse und Versprechen hinfällig. Die Zukunft von [GRE.GetNameDef]s Demokratie und Integrität könnte durchaus von der Entscheidung der heute hier Anwesenden abhängen."
 bftb_greece.24.a:0 "Wir stimmen mit Ja!"
 bftb_greece.24.b:0 "Wir stimmen mit Nein!"
 GRE_megali_idea_option_tt:1 "Wird der Antrag angenommen, so werden nach der Kapitulation von §Y[TUR.GetNameDefCap]§! §Y[GRE.GetNameDefCap]§! §YIstanbul§! und die anderen §Y[TUR.GetAdjective]§!-Anrainerstaaten des §YAgäischen Meeres§! annektiert. §RIm Falle der Verweigerung der Megali-Idee durch Griechenland sind alle bisher angenommenen Anträge hinfällig!§!"
 bftb_greece.25.t:0 "Die Heraklion Convention – die Megali-Idee wird wiedergeboren!"
 bftb_greece.25.desc:0 "Die Mehrheit der anwesenden Delegierten hat dafür gestimmt, dass [GRE.GetNameDef] die Megali-Idee verwirklichen darf, sollte es [TUR.GetNameDef] in einem Krieg erfolgreich besiegen. Unsere Beamten sind begeistert, und [ROOT.GetLeader] hat bereits an die Nation gewandt, um den Erfolg der Heraklion-Konferenz zu bekunden. Natürlich weiß niemand außerhalb unseres engen Teilnehmerkreises, worum es bei der Heraklion-Konferenz wirklich ging, aber viele unserer Leute haben geschlussfolgert, dass es hauptsächlich um die Verwirklichung der Megali-Idee ging. \n\nWir haben die Heraklion-Konferenz mit allem, was wir uns gewünscht haben, verlassen, aber jetzt kommt der schwierige Teil ..."
 bftb_greece.25.a:0 "Gesegnet seien die Kriegstreiber!"
 bftb_greece.26.t:0 "Die Heraklion-Konvention – die Megali-Idee wird abgelehnt!"
 bftb_greece.26.desc:0 "Die Mehrheit der anwesenden Delegierten stimmte dafür, [GRE.GetNameDef] im Rahmen ihrer Bestrebungen zur Verwirklichung der Megali-Idee das Recht auf die Zugehörigkeit zu Großgriechenland zu entziehen. Unsere Beamten bestätigten den anwesenden Delegierten diese Entscheidung mit einer Mischung aus Schock und Entsetzen und schickten alle mit der Botschaft nach Hause, dass die Heraklion-Konvention gescheitert sei. [ROOT.GetLeader] musste nervös vor der Menge in der Hauptstadt sprechen und ihnen erklären, dass die gesamte Konvention ein Fehlschlag war. Die Reaktion der Menge war natürlich nicht freundlich. Wir erleben bereits Proteste im ganzen Land, und die Situation droht außer Kontrolle zu geraten."
 bftb_greece.26.a:0 "Was für eine Zeitverschwendung ..."
 ROOT_voted_aye_megali_effect:0 "Stimmen für Aye!"
 ROOT_voted_nay_megali_effect:0 "Stimmen für Nein!"
 bftb_greece.29.t:0 "Kommunisten übernehmen die Macht in Griechenland"
 bftb_greece.29.desc:0 "Jüngste Geheimdienstberichte scheinen das Schlimmste zu bestätigen: Die Kommunisten haben die Kontrolle über Athen übernommen und sich dem [FROM.GetAdjective]-Volk aufgezwungen. Wir müssen uns auf einen möglichen Konflikt vorbereiten. Wenn [SOV.GetNameDef] uns nicht für ihre Machenschaften empfänglich genug hält, werden sie zweifellos versuchen, [FROM.GetNameDef] in eine Verschwörung zu verwickeln, die uns schwächen oder gar zerstören soll. Das Kabinett ist entschlossen: Wir müssen die Meerengen nach [FROM.GetNameDef] und [SOV.GetNameDef] abriegeln, um einen Zangenangriff auf unser verwundbares Land zu verhindern. Das verschafft uns etwas Zeit, aber wir müssen uns auf einen möglichen Konflikt vorbereiten."
 bftb_greece.29.a:0 "Es braut sich mit Sicherheit ein Konflikt zusammen …"
 bftb_greece.31.t:0 "Das Bosporus-Glücksspiel"
 bftb_greece.31.desc:0 "Beamte des Politbüros von [SOV.GetNameDef] haben beschlossen, uns endlich in ihre geheimen Pläne für die Zukunft von [TUR.GetNameDef] einzuweihen, und uns kommt dabei eine absolut zentrale Rolle zu. Der Plan ist ziemlich einfach: Wir senden im Namen von [SOV.GetNameDef] und der internationalen Revolution ein inakzeptables Ultimatium an [TUR.GetNameDef] und nutzen die unvermeidliche [TUR.GetAdjective] Ablehnung als Casus Belli, um in der Ägäis einen Konflikt zu schüren. \n\nUnser Oberkommando empfiehlt, unsere besten Einheiten entlang der thrakischen Grenze zu [TUR.GetNameDef] zu stationieren und Soldaten auf Angriffe auf [TUR.GetAdjective]-Gebiet vor der Küste unserer Inseln in der Ägäis vorzubereiten. Viele in unserer Regierung und unseren Streitkräften bezweifeln, dass wir die Streitkräfte von [TUR.GetAdjective] in einem direkten Duell besiegen können, aber [SOV.GetNameDef] hat zugesagt, uns mit einem Einfall im Norden zu unterstützen, sollte unser erster Angriff auf Konstantinopel scheitern."
 bftb_greece.31.a:0 "Das Glück ist mit den Mutigen."
 GRE_border_war_possible_tt:0 "Wenn die Situation eskaliert, könnten wir gezwungen sein, uns mit §RGrenzkonflikten§! entlang unserer Grenzen zu §Y[TUR.GetNameDef]§! auseinanderzusetzen."
 bftb_greece.32.t:0 "Die Griechen senden ihr Ultimatium"
 bftb_greece.32.desc:1 "Unsere Beamten reagierten empört auf die völlig unrealistischen und unvernünftigen Forderungen der verantwortungslosen Marxisten von [FROM.GetNameDef]. Unter der Behauptung, im Namen von [SOV.GetNameDef] zu handeln, forderte [FROM.GetNameDef] von uns, jede einzelne Forderung des Vertrags von Lausanne wieder in Kraft zu setzen und die Präsenz von [SOV.GetAdjective]-Soldaten im ganzen Land zuzulassen, damit sie als „verlässliche und objektive dritte Partei“ unsere Einhaltung des Vertrags garantieren können. \n\nWas könnte [FROM.GetAdjective] sich von einer solch lächerlichen Forderung anderes erhoffen als Konflikte entlang unserer Grenzen? Wir haben bei jeder Gelegenheit versucht, den Frieden an der Heimatfront aufrechtzuerhalten, aber es ist klar, dass Frieden nie eine Option war. Wenn die [FROM.GetAdjective] wirklich im Namen von [SOV.GetNameDef] handeln, dann ist unsere einzige Hoffnung auf Rettung vielleicht die Kapitulation in der Hoffnung, dass wir [SOV.GetAdjective]-Soldaten davon abhalten können, mit Gewalt die Kontrolle über unser Land zu übernehmen. Obwohl wir uns noch nie zuvor vor einem gerechten Kampf gescheut haben – verdienen wir es wirklich zu herrschen, wenn wir nicht bereit sind, für unsere Werte zu kämpfen?"
 bftb_greece.32.a:0 "Wir müssen uns unterwerfen."
 bftb_greece.32.b:0 "Die [FROM.GetAdjective]s haben einen dunklen Weg eingeschlagen: Wir müssen ihn wieder in Ordnung bringen."
 bftb_greece.33.t:0 "[FROM.GetNameDef] Sendet!"
 bftb_greece.33.desc:0 "In einer für [GRE.GetAdjective] und [SOV.GetAdjective] Beobachter schockierenden Wendung der Ereignisse hat [FROM.GetNameDef] jeder einzelnen an ihn gerichteten Forderung zugestimmt. Die Zugangsberechtigungen für die türkischen Meerengen wurden auf den Status von vor 1936 zurückgesetzt und [SOV.GetAdjective] Truppen wurden auf [FROM.GetAdjective] Boden gebeten, um sicherzustellen, dass [FROM.GetNameDef] die Bedingungen der ihnen zuvor vorgelegten Forderungen einhält. \n\n[SOV.GetLeader] gratulierte [GRE.GetLeader] persönlich zu dem Mut, den sein Land bei der Durchführung dieses Streichs gezeigt hat, und hat bereits mit der Truppenaufstellung für ihre Stationierung in ganz [TUR.GetNameDef] begonnen. Nachdem [TUR.GetNameDef] als Bedrohung neutralisiert wurde, wurde [GRE.GetNameDef] aufgefordert, andere mögliche Kriegsschauplätze in der Region genauer zu beobachten."
 bftb_greece.33.a:0 "Sicherlich eine Überraschung, aber eine willkommene!"
 bftb_greece.34.t:0 "[SOV.GetNameDefCap] Errichten Sie eine neue Marionettenregierung im Norden!"
 bftb_greece.34.desc:0 "Verflucht seien wir Narren! [SOV.GetNameDef] haben ihre Bewegungsfreiheit innerhalb unserer Grenzen missbraucht, um eine rivalisierende kommunistische Regierung in der Nähe ihres eigenen Landes zu errichten und beabsichtigen offensichtlich, unser ganzes Land in seinem Namen zu erobern! Wir hätten von Anfang an wissen müssen, dass es so ausgehen würde; einige Mitglieder unserer eigenen Regierung sind sogar geflohen, um sich der rivalisierenden Regierung im Norden anzuschließen, da sie behaupten, unsere Lage sei hoffnungslos. Vielleicht würde eine einfache Kapitulation unserem Land in den kommenden Tagen weniger Todesopfer ersparen ..."
 bftb_greece.34.a:0 "Es ist klüger, zu dienen und zu leben."
 bftb_greece.34.b:0 "Wir haben 1919 nicht kapituliert und wir werden auch jetzt nicht kapitulieren!"
 bftb_greece.35.t:0 "Die Türken lehnen unser Ultimatium ab!"
 bftb_greece.35.desc:0 "Wie erwartet hat [FROM.GetNameDef] das Ultimatum abgelehnt. Mit unseren Soldaten vor Ort werden wir nun einen allmählich eskalierenden Konflikt provozieren, um einen totalen Krieg zwischen unseren Nationen zu entfachen. Ob Sieg oder Niederlage, solange [SOV.GetNameDef] an unserer Seite steht, können wir nicht scheitern."
 bftb_greece.35.a:0 "Jetzt wird es interessant!"
 bftb_greece.36.t:0 "Die Schlacht um den Bosporus beginnt!"
 bftb_greece.36.desc:0 "Entgegen den Erwartungen unseres Oberkommandos haben wir die [FROM.GetAdjective]-Streitkräfte an unseren Grenzen besiegt. Angetrieben von unserem enormen Erfolg haben unsere Streitkräfte bereits begonnen, tiefer in [FROM.GetAdjective]-Gebiet vorzudringen. Unser Oberkommando, ausgestattet mit den neuesten Fakten, geht davon aus, dass [FROM.GetNameDef] innerhalb weniger Tage fallen wird."
 bftb_greece.36.a:0 "Wir mussten nur die Tür eintreten, um die Fäulnis zu sehen!"
 bftb_greece.37.t:0 "Die [FROM.GetAdjective]-Streitkräfte wurden in die Flucht geschlagen!"
 bftb_greece.37.desc:0 "Die [FROM.GetAdjective]-Agitatoren wurden nach ihrem sinnlosen Angriff auf unsere Grenzen zurückgeschlagen, doch den Berichten unserer Beobachter zufolge ist die ganze Tortur noch nicht vorbei. [FROM.GetAdjective]-Truppen sammeln sich entlang der Ägäischen Inseln und bewegen Waffen erschreckend nahe an [339.GetName]. Es gibt noch schlimmere Nachrichten: Wir hören von einer dramatischen Zunahme der Bewegungen entlang der [SOV.GetAdjective]-Grenze, und abgefangene Nachrichten deuten darauf hin, dass jeden Tag ein Angriff auf den Norden stattfinden könnte. Wir müssen vorbereitet sein; wir müssen durchhalten."
 bftb_greece.37.a:0 "Stellen Sie die Kommunisten auf, und wir werden sie niedermähen."
 TUR_border_conflicts_in_trabzon_tt:0 "Es wäre klug, Truppen mit §Y[354.GetName]§! und §Y[187.GetName]§! entlang der Grenze zu stationieren, bevor die Lage unweigerlich wieder hässlich wird."
 bftb_greece.38.t:0 "Die Türken triumphieren über unsere Streitkräfte!"
 bftb_greece.38.desc:0 "Leider konnten unsere Truppen die [FROM.GetAdjective]-Verteidigung bei [341.GetName] offenbar nicht durchbrechen. Das Oberkommando ist natürlich enttäuscht über die Ergebnisse, aber nicht überrascht. Wenn die [FROM.GetAdjective]-Streitkräfte nicht zurückschlagen, müssen wir erneut eskalieren. Dieses Mal wird [SOV.GetNameDef] [FROM.GetAdjective]-Stellungen im Norden angreifen, während wir von [187.GetName] aus zwei Küstenangriffe auf [339.GetName] und [340.GetName] durchführen. Wie könnten wir dieses Mal scheitern?"
 bftb_greece.38.a:0 "Für [FROM.GetNameDef] war dieses Spiel von Anfang an manipuliert …"
 bftb_greece.39.t:0 "Die Schlacht um den Bosporus beginnt!"
 bftb_greece.39.desc:0 "Unsere Streitkräfte waren auf einen solch dreisten Angriff der [FROM.GetAdjective]-Streitkräfte nicht vorbereitet und wurden bei [341.GetName] zurückgeschlagen – ein schrecklicher Verlust für unser Land. Die [FROM.GetAdjective]-Streitkräfte haben ihren Vormarsch nicht gestoppt, und eine Kriegserklärung steht unmittelbar bevor. Obwohl unser Verlust enttäuschend war, war er nicht verheerend – dieser Krieg hat gerade erst begonnen, und unser Volk steht in diesem Krieg gegen unseren alten Rivalen fest an unserer Seite."
 bftb_greece.39.a:0 "Die [FROM.GetAdjective]s haben uns keine andere Wahl gelassen!"
 bftb_greece.40.t:0 "Die Schlacht um den Bosporus beginnt!"
 bftb_greece.40.desc:0 "Wie von unserem Oberkommando erwartet, haben wir die [FROM.GetAdjective]-Streitkräfte an unseren Grenzen besiegt und die Verteidigung von Izmir durchbrochen. Angetrieben von unserem enormen Erfolg haben unsere Streitkräfte bereits mit dem Angriff auf [FROM.GetAdjective]-Gebiet begonnen. Unser Oberkommando, ermutigt durch unseren Sieg, glaubt, dass [FROM.GetNameDef] in wenigen Wochen fallen wird."
 bftb_greece.40.a:0 "Durch Smyrna werden wir das ganze Land einnehmen!"
 bftb_greece.41.t:0 "Die Schlacht um den Bosporus beginnt!"
 bftb_greece.41.desc:0 "Der [FROM.GetAdjective]-Angriff auf [339.GetName] war für sie ein Fehlschlag und dennoch ist er für uns ein schrecklicher Verlust. [ROOT.GetLeader] kann nicht anders, als insgeheim Vergleiche mit 1919 zu ziehen, als die [FROM.GetAdjective]-Streitkräfte zuletzt in [339.GetName] eine rücksichtslose Offensive starteten. \n\nAuch wenn die Beamten in der Hauptstadt um die Opfer der kurzlebigen Belagerung von [339.GetName] trauern, ist die ganze Nation außer sich vor Empörung über diese dreisten Angriffe eines alten Feindes auf unsere Souveränität. Der Überraschungsangriff auf [341.GetName] war verachtenswert, doch die Verluste bei [339.GetName] sind unverzeihlich. Wenn die [FROM.GetAdjective]-Regierung zu feige ist, eine offene Kriegserklärung abzugeben, dann werden wir ihr eine geben."
 bftb_greece.41.a:0 "Wir werden die Gefallenen rächen!"
 bftb_greece.42.t:0 "Die Schlacht um den Bosporus beginnt!"
 bftb_greece.42.desc:0 "Unsere Pläne sind gescheitert; das Oberkommando hatte damit gerechnet, dass wir einmal von [FROM.GetAdjective]-Truppen zurückgeschlagen werden könnten, doch die Zurückweisung beider Überraschungsangriffe verheißt nichts Gutes für uns. [ROOT.GetLeader] hat alle weiteren geplanten Angriffe abgesagt, doch alle Versuche, die Situation zu retten, werden offenbar scheitern, da wir gerade eine Kriegserklärung von einem [FROM.GetAdjective]-Delegierten erhalten haben. Es scheint, als hätte sich die Lage weiterentwickelt, und zwar nicht unbedingt zu unserem Vorteil."
 bftb_greece.42.a:0 "Wir werden triumphieren! Für die Revolution!"
 bftb_greece.43.t:0 "Die Schlacht um den Bosporus beginnt!"
 bftb_greece.43.desc:0 "Der [FROM.GetAdjective]-Angriff auf [339.GetName] war ein Erfolg für sie und ein schrecklicher Verlust für uns. [ROOT.GetLeader] kann nicht anders, als insgeheim Vergleiche mit 1919 zu ziehen, als die [FROM.GetAdjective]-Truppen [339.GetName] zum letzten Mal einnahmen. \n\nObwohl die Stimmung in der Hauptstadt gedrückt ist, sträubt sich die ganze Nation vor Empörung über diese dreisten Angriffe auf unsere Souveränität durch einen alten Feind. Der Überraschungsangriff auf [341.GetName] war verachtenswert, aber die Verluste bei [339.GetName] sind unverzeihlich. Wenn die [FROM.GetAdjective]s wirklich einen weiteren Krieg wollen, dann werden wir ihnen einen aufbürden, den sie nie vergessen werden."
 bftb_greece.43.a:0 "Für [TUR.GetNameDef]!"
 bftb_greece.44.t:0 "Wir sind siegreich in [FROM.GetNameDef]!"
 bftb_greece.44.desc:0 "Wie erwartet hat die Rote Armee mit den erbärmlichen [FROM.GetAdjective] Garnisonen in [354.GetName] kurzen Prozess gemacht und den Weg für eine ermutigend routinemäßige Invasion geebnet. Während wir sie von Norden her angreifen, werden die [GRE.GetAdjective] sie von Westen her angreifen. Sie haben keine Chance."
 bftb_greece.44.a:0 "[FROM.GetAdjective] Die Teilnahme an der Komintern ist obligatorisch."
 bftb_greece.45.t:0 "Die [FROM.GetAdjective]s werden an der Grenze zurückgeschlagen!"
 bftb_greece.45.desc:0 "Die Behörden waren verblüfft, als sie hörten, dass unsere in [354.GetName] stationierten Truppen die vordringenden [FROM.GetAdjective] Invasoren erfolgreich zurückschlagen und ihre Positionen trotz überwältigender Übermacht halten konnten. Wir erhielten nicht nur ein dringendes Kommuniqué des [FROM.GetAdjective]-Botschafters, in dem er sich überschwänglich für den gesamten Vorfall entschuldigte, sondern auch Informationen, die das [GRE.GetAdjective]-Regime als Drahtzieher der gesamten Operation belasten. Uns wurde versichert, dass wir keine [FROM.GetAdjective] Vergeltungsmaßnahmen zu erwarten hätten, falls unser Kampf mit [GRE.GetNameDef] zu einem Krieg eskalieren sollte."
 bftb_greece.45.a:0 "Wir haben uns vor dem Vergessen gerettet."
 bftb_greece.46.t:0 "[FROM.GetAdjective] Streitkräfte schlagen unseren Angriff zurück!"
 bftb_greece.46.desc:0 "Es wurde bekannt, dass das Vergehen gegen [354.GetName] ein völliger Fehlschlag war und einen verheerenden Schlag für unser internationales Ansehen und das Ego unseres Oberkommandos darstellt. Wir haben der [FROM.GetAdjective]-Regierung unsere aufrichtigste Entschuldigung ausgesprochen und dem [GRE.GetAdjective]-Regime, das den [FROM.GetAdjective]-Staat im Westen immer noch provoziert, jegliche Unterstützung entzogen."
 bftb_greece.46.a:0 "Dafür wird jemand erschossen!"
 bftb_greece.47.t:0 "[FROM.GetNameDefCap] Bricht unsere Positionen in [354.GetName]!"
 bftb_greece.47.desc:1 "Nur wenige Berater sind überrascht, dass es den [FROM.GetAdjective]-Streitkräften gelungen ist, unsere eigenen Truppen im Norden zurückzuschlagen, doch das macht die Enttäuschung nicht weniger spürbar. [FROM.GetAdjective]-Streitkräfte haben ihre Einfälle an der Grenze von [354.GetName] nicht eingestellt: Wir erhalten Berichte über sporadische und unverkennbar massive Truppenbewegungen in der Nähe unserer Grenzen und sogar Berichte über [FROM.GetAdjective]-Soldaten, die die Demarkationslinie in [800.GetName] überschreiten. Das kann nur eine Invasion bedeuten. Wir müssen uns auf das Schlimmste vorbereiten."
 bftb_greece.47.a:0 "Könnte dies den Untergang des Vaterlandes bedeuten?"
 bftb_greece.48.t:0 "Die [FROM.GetAdjective]s stiften im Süden einen kommunistischen Aufstand an!"
 bftb_greece.48.desc:0 "Das niederträchtige marxistische Regime von [FROM.GetNameDef] hat den Terroristen Josip Broz Tito bewaffnet und ihn ermutigt, im Süden einen Aufstand anzuzetteln! Die Gefahr wäre vielleicht vernachlässigbar, wenn [FROM.GetAdjective] nicht aktiv mit dem aufstrebenden Regime im Süden kooperieren würde, um unsere Regierung zu stürzen. Es scheint, als ob uns keine andere Wahl bleibt, als die Rebellen niederzuschlagen und dann mit unseren Truppen in die [FROM.GetAdjective] Hauptstadt zu marschieren, um sie zur Räson zu bringen."
 bftb_greece.48.a:0 "Das hat Tito und diese verdammten [FROM.GetAdjective]s verflucht!"
 GRE_tito_backed_guerilla_war_tt:0 "Die „Kommunisten“ haben mit der vollen Unterstützung der „Griechen“ im Süden unseres Landes einen kleinen Bürgerkrieg begonnen."
 bftb_greece.50.t:0 "Der König löst das griechische Parlament auf!"
 bftb_greece.50.desc:0 "Seine Majestät König Georg II. hat mit seiner Proklamation, er werde direkt die Kontrolle über das Land übernehmen, um zu verhindern, dass es von streitenden politischen Gegnern zerrissen wird, Schockwellen durch die ganze Nation geschickt. Zu diesem Zweck bestand der erste Erlass des Königs darin, das griechische Parlament auf unbestimmte Zeit aufzulösen – eine Institution, die vom König als „Nest eigennütziger Vipern“ verurteilt worden war. \n\nDer Erlass des Königs wurde von einigen gefeiert, von anderen prominenten Teilen der Gesellschaft jedoch allgemein verurteilt. Die republikanischen Venezelisten und die bedauernswerten Kommunisten haben sich nach Jahrzehnten der Feindseligkeit zusammengeschlossen, da sie den „König der Hellenen“ vom Thron stoßen und für immer beseitigen wollen. Geheimdienstberichte deuten derzeit darauf hin, dass in den kommenden Wochen oder Monaten durchaus ein Bürgerkrieg ausbrechen könnte."
 bftb_greece.50.a:0 "Das Herrschaftsrecht des Königs ist heilig!"
 GRE_absolute_monarch_hostile_factions_tt:1 "Ein „Bürgerkrieg“ steht wahrscheinlich unmittelbar bevor …"
 bftb_greece.51.t:0 "Die Monarchisten in Griechenland bitten um unsere Hilfe!"
 bftb_greece.51.desc:0 "Die pro-[ROOT.GetAdjective]-Regierung in Athen hat uns um materielle Hilfe gebeten, nachdem eine landesweite politische Spaltung zu einem verheerenden Bürgerkrieg geführt hatte. Natürlich ist es ihr gutes Recht, diese Bitte an uns zu richten, aber die Frage, ob sie die von ihr geforderten Materialien überhaupt wert ist, können nur wir beantworten."
 bftb_greece.51.a:0 "Sie werden zweifellos Gewehre brauchen."
 bftb_greece.51.b:0 "Wir können einige Materialien für die Hilfe entbehren."
 bftb_greece.51.c:0 "Es wäre am besten, sich nicht in griechische Angelegenheiten einzumischen."
 bftb_greece.52.t:0 "[FROM.GetNameDefCap] Schickt uns Waffen und Freiwillige!"
 bftb_greece.52.desc:0 "Wir haben gerade die Waffen und Freiwilligen von [FROM.GetNameDef] von unseren Docks abgeladen. Die Unterstützung ist sehr willkommen und weit mehr, als wir erwartet hatten. Diese Hilfe wird uns in den kommenden Monaten von Nutzen sein."
 bftb_greece.52.a:0 "Wahre Verbündete des Königs!"
 bftb_greece.53.t:0 "[FROM.GetNameDefCap] Schickt uns Hilfe!"
 bftb_greece.53.desc:0 "Wir haben gerade die Lieferungen von [FROM.GetNameDef] von unseren Docks abgeladen. Die Unterstützung ist sehr willkommen und ein willkommener Beweis der Freundschaft in diesen schwierigen Zeiten. Diese Hilfe wird uns in den kommenden Monaten von Nutzen sein."
 bftb_greece.53.a:0 "Wahre Verbündete des Königs!"
 bftb_greece.54.t:0 "[FROM.GetNameDefCap] weigert sich, uns zu helfen"
 bftb_greece.54.desc:0 "Wir haben von einem [FROM.GetAdjective]-Diplomaten die Nachricht erhalten, dass unser Hilferuf auf taube Ohren gestoßen ist und wir von [FROM.GetNameDef] keine weitere Hilfe erwarten können. Die Situation ist bedauerlich, aber wir werden auch ohne die Hilfe ausländischer Mächte durchhalten."
 bftb_greece.54.a:0 "Enttäuschend."
 bftb_greece.55.t:0 "[GRE.GetNameDefCap] schlägt Enosis vor"
 bftb_greece.55.desc:0 "Ein Vertreter von [FROM.GetNameDef] hat vorgeschlagen, unsere beiden Nationen zu einer einzigen zu verschmelzen. Unter Berufung auf die gemeinsame Geschichte und das gemeinsame kulturelle Erbe hat der Vertreter von [FROM.GetAdjective] zum Ausdruck gebracht, dass es der Wille der [FROM.GetAdjective]-Regierung sei, das seit langem hochgelobte Konzept der „Enosis“ zu fördern: die Verschmelzung unserer Staaten zu einem größeren Ganzen."
 bftb_greece.55.a:0 "Eine geniale Idee!"
 bftb_greece.55.b:0 "Zypern wird seinen eigenen Weg gehen."
 end_of_cyprus_tt:0 "§RDies führt zu einem Game Over!§!"
 bftb_greece.56.t:0 "[CYP.GetNameDefCap] Commits zu Enosis"
 bftb_greece.56.desc:0 "Wir haben von [FROM.GetAdjective] die Nachricht erhalten, dass sie bereit sind, die lang erwartete Vereinigung unserer beiden Völker zu einem Staat unter unserer Kontrolle zu ermöglichen. Im ganzen Land brachen Feierlichkeiten aus, und [ROOT.GetLeader] reiste persönlich nach Nikosia und hielt anlässlich dieses historischen Tages eine Rede vor den Menschen dort."
 bftb_greece.56.a:0 "Endlich vereinte Verwandtschaft!"
 bftb_greece.57.t:0 "[CYP.GetNameDefCap] Lehnt Enosis ab!"
 bftb_greece.57.desc:0 "[FROM.GetAdjective]-Beamte haben uns mitgeteilt, dass sie nicht die Absicht haben, ihre [FROM.GetAdjective]-Souveränität aufzugeben, nachdem sie so lange darum kämpfen mussten, sie überhaupt zu erlangen. Es wurde erklärt, dass „Enosis“ kein Konzept ist, das die [FROM.GetAdjective]-Regierung zum jetzigen Zeitpunkt in Betracht ziehen möchte."
 bftb_greece.57.a:0 "Es war keine Bitte."
 bftb_greece.57.b:0 "Also gut, wenn das ihr Wunsch ist …"
 bftb_greece.58.t:0 "[FROM.GetNameDefCap] fordert Enosis mit Zypern an"
 bftb_greece.58.desc:0 "Ein [FROM.GetAdjective]-Delegierter hat sich an uns gewandt, um die Zukunft unserer zypriotischen Kronkolonie zu besprechen. Der [FROM.GetAdjective] erhob den Vorwurf, dass Versuche einer zypriotischen Nation-Building-Strategie zwangsläufig scheitern würden, da das zypriotische Volk de facto ein [FROM.GetAdjective] Volk sei. \n\nDer [FROM.GetAdjective] legte einen Brief von [FROM.GetAdjective] Premierminister [FROM.GetLeader] vor, in dem die Geschichte des Konzepts der „Enosis“ ziemlich detailliert dargelegt wird, bevor ein letzter nachdrücklicher Appell für die Vereinigung Zyperns und [FROM.GetNameDef] erfolgte. Der [FROM.GetAdjective]-Delegierte hat versucht, unseren Vertreter zu versichern, dass es sich hierbei nicht um plumpen Irredentismus von [FROM.GetAdjective]-Seite handele; Zypern und [FROM.GetNameDef] haben ein gemeinsames kulturelles Erbe, eine gemeinsame Geschichte, eine gemeinsame Sprache und aus [FROM.GetAdjective]-Sicht: ein gemeinsames Schicksal. \n\nUnsere Militärs haben die Bedeutung Zyperns als strategischer Militärstützpunkt im Mittelmeerraum betont, doch unsere außenpolitischen Berater betonen, dass ein ermächtigter [FROM.GetAdjective] Verbündeter weit mehr leisten könnte, als Zypern allein als Luft- und Marinestützpunkt leisten kann. Die Entscheidung liegt letztendlich beim [ROOT.GetAdjective]-Kabinett, doch wir sollten sicherstellen, dass der [FROM.GetAdjective]-Vertreter nicht zu lange auf unsere Antwort wartet."
 bftb_greece.58.a:0 "Wir akzeptieren Ihre Vorschläge im Austausch für eine formelle Allianz."
 bftb_greece.58.b:0 "Sollen sie es haben, Zypern ist für uns bedeutungslos."
 bftb_greece.58.c:0 "Die [FROM.GetAdjective]-Regierung muss die Macht mit den „zypriotischen“ Behörden teilen."
 bftb_greece.58.d:0 "Die gierigen Griechen gehen leer aus!"
 bftb_greece.59.t:0 "[FROM.GetNameDefCap] stimmt zu, Enosis zu ermöglichen!"
 bftb_greece.59.desc:0 "Die Stimmung in der Hauptstadt lässt sich am besten als „Jubel“ beschreiben, nachdem [ROOT.GetLeader] der Nation verkündete, dass nach all den Jahren die [ROOT.GetAdjective] Träume von Enosis mit Zypern endlich Wirklichkeit werden würden, und das alles dank unserer [FROM.GetAdjective] Freunde. Unsere Verwalter sind unverzüglich nach Zypern gereist, um einen möglichst reibungslosen Machtübergang zu gewährleisten. \n\nDies ist ein wahrhaft großer und historischer Tag für [ROOT.GetNameDef]. Zypern ist seit langem Teil des [ROOT.GetAdjective] kollektiven Bewusstseins und ist nun endlich im Schoß der Zivilisation, aus der es hervorgegangen ist, heimisch geworden."
 bftb_greece.59.a:0 "Endlich vereint!"
 bftb_greece.59.b:0 "Wir können unsere Autonomie nicht für Enosis opfern."
 bftb_greece.60.t:0 "[FROM.GetNameDefCap] Akzeptiert eine partielle Enosis"
 bftb_greece.60.desc:0 "Die [FROM.GetAdjective] haben uns einen merkwürdigen Kompromiss zu unserer ursprünglichen Bitte angeboten, Enosis zu ermöglichen: Sie sind bereit, unseren Forderungen nachzukommen, unter der Bedingung, dass wir mit einer zypriotischen Regierung zusammenarbeiten, die den gleichen Status wie ein [FROM.GetAdjective]-Dominion hat. Dies ist keine völlig unwillkommene Wendung der Ereignisse, nur ... unerwartet. \n\nDie zypriotische Regierung hat ihrerseits zugestimmt, dass sie einer vollständigen Enosis zwischen uns nicht abgeneigt wäre, wenn [ROOT.GetNameDef] genügend Engagement in Zypern zeigt und ihre junge Nation aufbaut. Bis dahin müssen wir uns jedoch mit einem neuen zypriotischen Verbündeten zufrieden geben, der uns unzertrennlich verbunden ist."
 bftb_greece.60.a:0 "Willkommen, Brüder!"
 bftb_greece.61.t:0 "[FROM.GetNameDefCap] Lehnt Enosis ab!"
 bftb_greece.61.desc:0 "Unser Vertrauen in unseren langjährigen Verbündeten scheint fehl am Platz gewesen zu sein; [FROM.GetNameDef] weigert sich, auch nur den Gedanken in Erwägung zu ziehen, die [ROOT.GetAdjective] Insel Zypern unter unsere Kontrolle zu stellen. Sie führen die strategische Bedeutung der Insel und Bedenken hinsichtlich [ROOT&gt;GetAdjective] Revanchismus als Gründe an, warum wir ihrer Meinung nach die Insel nicht verdient hätten. \n\nMan kann nicht sagen, dass wir völlig überrascht sind, aber das macht unsere kollektive Enttäuschung nicht weniger bitter. Wie viele Jahre haben wir darauf gewartet, dass Zypern unserem Vaterland zurückgegeben wird? Wie viele Jahre müssen wir aufgrund dieses Rückschlags noch warten? Es muss gesagt werden, dass unsere Begeisterung hinsichtlich unserer Beziehung zu [FROM.GetNameDef] durch diese Wendung der Ereignisse erheblich gedämpft wurde."
 bftb_greece.61.a:0 "Wir werden uns daran erinnern..."
 bftb_greece.62.t:0 "[FROM.GetNameDefCap] Schlägt gemeinsame Anträge für den Beitritt zur Achse vor!"
 bftb_greece.62.desc:0 "Als die Nachricht eintraf, dass das alte [FROM.GetAdjective]-Regime durch ein faschistisches abgelöst worden war, machte sich unter den Beratern in der Hauptstadt großes Grauen breit. Wir hatten das Gefühl, der Krieg sei so etwas wie eine Unvermeidlichkeit geworden, und durch unsere bisherigen Versuche, den Frieden in der Ägäisregion zu wahren, noch erbitterter. Offenbar hat uns das Schicksal das Gegenteil bewiesen. \n\nMan hat uns ein einzigartiges Angebot gemacht: Die faschistische Regierung von [FROM.GetNameDef] hält einen Krieg in unseren beiden Ländern für unvermeidlich. [FROM.GetLeader] teilt trotz seiner ideologischen Neigungen unsere Ansicht, dass es nicht klug wäre, jahrzehntelange diplomatische Bemühungen unsererseits für einen Krieg aufzugeben, der mit Sicherheit groß und schrecklich werden würde. Zu diesem Zweck hat die Regierung von [FROM.GetNameDef] empfohlen, dass wir uns gemeinsam an die Seite der aufstrebenden faschistischen Mächte Europas stellen. [FROM.GetLeader] glaubt, dass die faschistische Vorherrschaft auf dem Kontinent unvermeidlich ist und dass wir beide gemeinsam die Macht haben, das Gleichgewicht so zu verschieben, dass der Krieg schneller und entschiedener beendet werden kann. [FROM.GetLeader] nennt es „Gnade“. [ROOT.GetLeader] ist sich da nicht so sicher."
 bftb_greece.62.a:0 "Lasst uns im Namen des Friedens Krieg führen."
 bftb_greece.62.b:0 "Die [FROM.GetAdjective]s sind wirklich verrückt geworden …"
 bftb_greece.63.t:0 "[FROM.GetNameDefCap] Stimmt dem Hellenoturkism-Freundschaftspakt zu!"
 bftb_greece.63.desc:0 "Erfolg! Der [FROM.GetAdjective]-Botschafter hat die Zustimmung seiner Regierung zu unserem vorgeschlagenen Freundschaftspakt übermittelt. Wenn wir mit den faschistischen Mächten zusammenarbeiten und gleichzeitig aneinander gebunden sind, können wir auf keinen Fall verlieren."
 bftb_greece.63.a:0 "Zwei Fraktionsantragsformulare, bitte!"
 bftb_greece.63.b:0 "Oder vielleicht ... brauchen wir die Türken nicht?"
 GRE_no_turkey_needed:0 "Durch Fälschung und Betrug werden wir die Beziehungen der Türkei zu den faschistischen Mächten torpedieren."
 bftb_greece.64.t:0 "[FROM.GetNameDefCap] lehnt den hellenoturkischen Freundschaftspakt entschieden ab!"
 bftb_greece.64.desc:0 "Es scheint, als leide die [FROM.GetAdjective]-Regierung unter einem chronischen Mangel an Weitsicht. Sie wird sich nicht den unvermeidlichen Siegern an unserer Seite anschließen, denn sie sind entweder Feiglinge oder Narren. Es spielt keine Rolle, unser Weg ist vorgezeichnet, und was auch immer als Nächstes in Bezug auf [FROM.GetNameDef] passiert, wird zum Teil ihre eigene Schuld sein."
 bftb_greece.64.a:0 "Die Starken werden die Erde erben, die Sanftmütigen werden zugrunde gehen."
 bftb_greece.65.t:0 "[FROM.GetNameDefCap] und [TUR.GetNameDef] schlagen eine strategische Partnerschaft vor"
 bftb_greece.65.desc:0 "Wie Puzzleteile scheint sich alles zu fügen. Der Regimewechsel in Berlin kam unerwartet und warf viele Zweifel an der Zukunft unserer Nation auf. Diese Zukunft wurde durch einen Vorschlag aus Athen etwas deutlicher erkennbar. \n\nEs scheint, dass [FROM.GetNameDef] und [TUR.GetNameDef] eine dauerhafte strategische Allianz mit unserer Regierung eingehen möchten. Wir brauchen dringend Verbündete, und die Aufnahme dieser beiden in einen Mittelmeerpakt könnte sicherlich einen großen Beitrag zur Sicherung unserer regionalen Ambitionen leisten. Allerdings: Wer kann schon sagen, dass diese beiden nicht Gegenstand anderer Ambitionen unsererseits sind?"
 bftb_greece.65.a:0 "Gemeinsam werden wir Geschichte schreiben!"
 bftb_greece.65.b:0 "Unsere Pläne für dieses Paar lassen sicherlich keinen Raum für Allianzen."
 bftb_greece.66.t:0 "[FROM.GetNameDefCap] und [TUR.GetNameDef] beantragen die Mitgliedschaft bei [GER.GetFactionName]"
 bftb_greece.66.desc:0 "Wir haben uns mit Delegierten von [FROM.GetNameDef] und [TUR.GetNameDef] getroffen und waren ziemlich überrascht, als wir hörten, dass beide gemeinsame Anträge bei [ROOT.GetFactionName] einreichen. Es ist keine unwillkommene Überraschung, aber dennoch eine. Wir müssen herausfinden, ob ihre Aufnahme in unsere Allianz unsere Ziele fördert oder behindert."
 bftb_greece.66.a:0 "Sie sind in diesen turbulenten Zeiten willkommene Verbündete."
 bftb_greece.66.b:0 "Nein, wir brauchen sie nicht."
 bftb_greece.67.t:0 "[FROM.GetNameDefCap] schlägt eine strategische Partnerschaft vor!"
 bftb_greece.67.desc:0 "Wie Puzzleteile scheint sich alles zu fügen. Der Regimewechsel in Berlin kam unerwartet und warf viele Zweifel an der Zukunft unserer Nation auf. Diese Zukunft ist nun durch einen Vorschlag aus Athen etwas deutlicher erkennbar. \n\nEs scheint, dass [FROM.GetNameDef] den Wunsch hegt, eine dauerhafte strategische Allianz mit unserer Regierung zu bilden. Wir brauchen dringend Verbündete, und die Hilfe von [FROM.GetNameDef] könnte uns bei der Sicherung unserer regionalen Ambitionen sicherlich sehr helfen. Aber wer kann schon sagen, dass dies nicht nur ein jämmerlicher letzter Versuch ist, zu überleben? Vielleicht wollen sie gar nicht wirklich unsere Verbündeten sein; vielleicht erkennen sie die Zeichen der Zeit und wissen, dass es für sie unweigerlich enden wird, wenn sie sich uns widersetzen ... und vielleicht ist uns dieser Unterschied nicht so wichtig."
 bftb_greece.67.a:0 "Rom und Athen – endlich wieder vereint!"
 bftb_greece.67.b:0 "Der Räuber pflegt keine Verbrüderung mit seiner Beute."
 bftb_greece.68.t:0 "[FROM.GetNameDefCap] beantragt die [GER.GetFactionName]-Mitgliedschaft!"
 bftb_greece.68.desc:0 "Wir haben uns mit Delegierten von [FROM.GetNameDef] getroffen und waren erleichtert, als wir hörten, dass die [FROM.GetAdjective]-Administration den Wunsch geäußert hat, [FROM.GetNameDef] in [ROOT.GetFactionName] zu sehen. Das ist kaum überraschend: Die Position von [FROM.GetAdjective] war ohne uns unhaltbar. Wir müssen herausfinden, ob ihre Aufnahme in unsere Allianz unsere Ziele fördert oder behindert."
 bftb_greece.68.a:0 "Willkommen, Griechenland!"
 bftb_greece.68.b:0 "Nein, keine Chance!"
 bftb_greece.69.t:0 "[FROM.GetNameDefCap] lehnt unsere Allianzanfrage ab!"
 bftb_greece.69.desc:0 "Ein [FROM.GetAdjective]-Diplomat hat uns informiert, dass [FROM.GetLeader] es nicht für klug hält, uns in ihre enge Allianz aufzunehmen. Zu sagen, wir seien enttäuscht, wäre untertrieben. Unabhängig davon müssen wir nun ohne ein Bündnis mit [FROM.GetNameDef] unseren eigenen Weg durch diese Krisenzeit finden."
 bftb_greece.69.a:0 "Wir werden immer noch stehen, wenn das alles vorbei ist."
 bftb_greece.70.t:0 "Eleftherios Venizelos stirbt im Exil"
 bftb_greece.70.desc:0 "Eleftherios Venizelos, Anführer der Venezelisten und verehrter Titan der griechischen Politik, ist nach seiner Vertreibung durch das Militär im Jahr 1935 noch im Exil verstorben. Venizelos leistete einen leidenschaftlichen Beitrag zum griechischen Mehrparteiensystem und war eine Persönlichkeit, die das griechische Nationalbewusstsein wie kaum ein anderer beeinflusste. \n\nEleftherios Venizelos wird jedoch nicht für seine Erfolge in Erinnerung bleiben, sondern für seine vielen Versäumnisse. Es war Venizelos, der die zerstörerische Kraft des Republikanismus in diesem Land propagierte, und es war Venizelos&#39; sinnloser Revisionismus, der unsere Nation im Griechisch-Türkischen Krieg von 1919 beinahe vernichtet hätte. Jedes einzelne Problem, mit dem Griechenland heute konfrontiert ist, kann Venizelos als Hauptursache allen Leids unserer Nation zugeschrieben werden. \n\nEr war ein Revolutionär, ein Staatsmann und ein politischer Pionier; Er war ein Aufwiegler, ein Kriegstreiber und ein Versager. Was muss man über Eleftherios Venizelos noch sagen, außer dass wir froh sind, dass er nach all dem Leid, das er verursacht hat, nie wieder in Griechenland auftauchen wird."
 bftb_greece.70.a:0 "Auf Nimmerwiedersehen."
 bftb_greece.71.t:0 "Eleftherios Venizelos verstorben"
 bftb_greece.71.desc:0 "Ministerpräsident Eleftherios Venizelos, Anführer der Venezelisten und verehrter Titan der griechischen Politik, ist friedlich in seinem Haus verstorben. Venizelos leistete einen leidenschaftlichen Beitrag zum griechischen Mehrparteiensystem und war eine Persönlichkeit, die das griechische Nationalbewusstsein wie kaum ein anderer beeinflusste. \n\nWie können Worte allein dem Mann gerecht werden, der so viel von sich selbst für sein Land und seine Landsleute gegeben hat? Er ist der Architekt der Nation, der wir heute dienen dürfen, und das bleibende Erbe, das er hinterlässt, wird uns alle überdauern. Der einzige schwarze Fleck auf Venizelos‘ makelloser Akte sind die schrecklichen Verluste, die unsere Nation nach dem verheerenden Griechisch-Türkischen Krieg von 1919 erlitten hat. Es ist ein Makel auf einem ansonsten perfekten Erbe, für den wir uns unbedingt rächen wollen. \n\nEleftherios Venizelos war ein Revolutionär, ein Staatsmann und ein politischer Pionier. er war unser Ethnarch und wir werden ihn als das kompromisslose Löwenherz in Erinnerung behalten, das er war. Themistoklis Sofoulis hat das Amt des Premierministers und Führers von Fileleftheron übernommen und einen nationalen Trauertag für den kürzlich verstorbenen Vater des modernen Griechenlands ausgerufen."
 bftb_greece.71.a:0 "Griechenland schuldet Ihnen eine Schuld, die es niemals zurückzahlen kann …"
 bftb_greece.91.t:0 "Die EEE eröffnet ein Hilfszentrum für anatolische Flüchtlinge"
 bftb_greece.91.desc:0 "In einem zynischen Versuch, mehr Anhänger für seine Sache zu gewinnen, hat Georgios Kosmidis die Mittel seiner Bewegung genutzt, um ein Hilfszentrum für Mitflüchtlinge aus [TUR.GetNameDef] wie ihn selbst zu eröffnen. Es wäre lobenswert, wenn er diese Hilfszentren nicht als Rekrutierungszentren für seine psychotische Bewegung nutzen würde. \n\nWir befinden uns in einer schwierigen Lage: Es ist offensichtlich, dass Kosmidis beabsichtigt, diese Zentren weiterhin zu unterstützen, um entrechtete Flüchtlinge aus Anatolien zu rekrutieren. Sollen wir sie also schließen, um seinem Gift Einhalt zu gebieten? Oder sollen wir unseren Ruf wahren und diese Zentren weiterlaufen lassen? Manche mögen argumentieren, dass es besser sei, die verarmten Flüchtlinge in faschistischen Hilfszentren arbeiten zu lassen, als sie in den Slums leiden zu lassen."
 bftb_greece.91.a:0 "Eine Initiative, die es wert ist, unterstützt zu werden!"
 bftb_greece.91.b:0 "Schließen Sie es."
 bftb_greece.92.t:0 "Die EEE fordern höhere Löhne für [ROOT.GetAdjective]-Arbeiter"
 bftb_greece.92.desc:0 "Die EEE nutzten die nationale Aufmerksamkeit, um unseren ihrer Meinung nach schwachen Sozialstaatsansatz scharf anzugreifen. Die Vorstellung, dass diese scheinbar aus dem Nichts aufgetauchten Faschisten glauben, sie könnten uns in Steuer- und Sozialpolitik belehren, ist lächerlich, doch die Öffentlichkeit scheint sie sehr ernst zu nehmen."
 bftb_greece.92.a:0 "Vielleicht ... ein symbolischer Mindestlohn?"
 bftb_greece.92.b:0 "Wir beugen uns nicht der faschistischen Einschüchterung."
 bftb_greece.93.t:0 "EEE-Mitglieder beteiligen sich gemeinsam mit unserer Polizei an Straßengewalt!"
 bftb_greece.93.desc:0 "Im ganzen Land kam es zu Schlägereien zwischen EEE-Mitgliedern und unserer eigenen Polizei. Sie bilden das Bild einer Zeit politischer Gewalt, die wir eigentlich hinter uns lassen wollten. Den Berichten über Krankenhauseinweisungen und eskalierende Gewalt zufolge ist dies jedoch nicht der Fall. \n\nEinige Minister schlagen vor, gegenüber dieser Gewalt eine sehr harte Haltung einzunehmen, um dem Land zu zeigen, dass wir diese Art von Gewalt nicht tolerieren. Andere Minister warnen jedoch davor, dass wir den Kampf gegen die Faschisten nicht gewinnen können. Die Menschen sind wütend und unzufrieden, aber das sollte ihnen nicht das Recht geben, solche mutwilligen Gewalttaten zu begehen."
 bftb_greece.93.a:0 "Ihre Beschwerden sind berechtigt."
 bftb_greece.93.b:0 "Die Gewalt ist beklagenswert und der Pöbel muss auseinandergetrieben werden."
 bftb_greece.94.t:0 "EEE-Mitglieder plündern Fabrik in ausländischem Besitz und verteilen gestohlene Waren!"
 bftb_greece.94.desc:0 "In einem leider nur allzu bekannten Szenario sind Anhänger der EEE in Fabriken in ausländischem Besitz eingebrochen, um die dort hergestellten Waren an Arme und Entrechtete zu verteilen. Georgios Kosmidis und die Führung der EEE behaupten, nichts von diesen Aktivitäten zu wissen, haben die Männer und Frauen, die an dieser scheinbar altruistischen Plünderungsserie beteiligt waren, jedoch leidenschaftlich verteidigt. \n\nDieses Verhalten kann wirklich nicht toleriert werden: Wir erhalten bereits Beschwerden von ausländischen Magnaten aus Ländern wie [ENG.GetNameDef] und [FRA.GetNameDef]. Wenn wir jedoch im Namen der Industriellen eingreifen, werden wir wie Marionetten ausländischer Finanziers aussehen; wenn wir hingegen diese Anarchie ungehindert zulassen, erscheinen wir der internationalen Gemeinschaft als unfähige Regierung."
 bftb_greece.94.a:0 "Wir sollten sie nicht aufhalten."
 bftb_greece.94.b:0 "Diese Anarchie steht uns nicht zu!"
 bftb_greece.95.t:0 "Die EEE unterstützt unseren Kampf!"
 bftb_greece.95.desc:0 "Die EEE, die uns bisher so ein Dorn im Auge war, ist offenbar bereit, sich mit der Regierung gegen einen gemeinsamen Feind zu verbünden. Georgios Kosmidis war einer der lautstärksten Befürworter eines Krieges mit [TUR.GetNameDef], und jetzt, da dieser Krieg unsere Küsten erreicht hat, ist die EEE bereit, die Parteipolitik beiseite zu lassen, um unsere [TUR.GetAdjective] Feinde vor unseren Armeen zu demütigen."
 bftb_greece.95.a:0 "Gemeinsam sind wir nicht aufzuhalten!"
 bftb_greece.95.b:0 "Wir werden gewinnen, ohne uns mit dem Faschismus zu beschmutzen."
 bftb_greece.96.t:0 "Aristoteles Onassis kehrt zurück zu [ROOT.GetNameDef]"
 bftb_greece.96.desc:0 "Der reiche Magnat und international beliebte Prominente Aristoteles Onassis ist zum ersten Mal seit vielen Jahren nach [ROOT.GetNameDef] zurückgekehrt. Er stellte sich den Fragen der Medien nicht und war für unsere Beobachter schwer aufzuspüren. Berichten zufolge schmeichelt er sich jedoch bei der anatolischen Flüchtlingsbevölkerung ein und plant möglicherweise eine Kandidatur für das Amt."
 bftb_greece.96.a:0 "Was hat er vor?"
 bftb_greece.101.t:0 "Die Venezelisten und Kommunisten verbünden sich gegen die absolute Herrschaft des Königs"
 bftb_greece.101.desc:0 "Falls es jemals Zweifel an einem Bündnis zwischen Kommunisten und Venezelisten gab, können diese nun ausgeräumt sein. Uns liegen Berichte vor, wonach die Kommunisten Eleftherios Venizelos zurück ins Land geschmuggelt haben, in der Hoffnung, ihn nach dem Sturz der Monarchie als vorübergehenden Anführer einzusetzen. \n\nEin tollkühner Plan, selbst für einen Haufen roter Verräter. Wie konnten sie nur glauben, dass Venizelos ihnen die Macht überlassen würde, wenn er sie erst einmal hat? Das ist Wahnsinn. Andererseits waren weder die Kommunisten noch die Venezelisten jemals besonders vernünftig. Wir müssen uns auf einen mit Sicherheit heftigen Bürgerkrieg vorbereiten."
 bftb_greece.101.a:0 "Unsere Feinde kauern zusammen wie Ratten!"
 bftb_greece.102.t:0 "Kommunisten organisieren Razzia in Fabrik"
 bftb_greece.102.desc:0 "Die Polizei konnte einen kürzlichen kommunistischen Überfall auf eine unserer Fabriken, in der wir Gewehre für die Armee herstellen, nicht vorhersehen und verhindern. Die Marxisten raubten alles aus der Fabrikhalle und versuchten anschließend, die Fabrik selbst niederzubrennen, wobei sie glücklicherweise nur das Gebäude beschädigen konnten. \n\nEs besteht kein Grund zur Spekulation, warum diese Aufständischen diesen dreisten Überfall auf einen Waffenhersteller unternommen haben: Sie beabsichtigen zweifellos, unsere eigenen Gewehre gegen uns einzusetzen, sobald sie Rückgrat zeigen und aus dem Schatten treten. Dies könnte sich als einer der schlimmsten Bürgerkriege in [ROOT.GetNameDef] erweisen ..."
 bftb_greece.102.a:0 "Wir können nicht zulassen, dass diese Anarchisten uns so ungestraft angreifen."
 bftb_greece.103.t:0 "Venezolanische Generäle zurück nach Griechenland geschmuggelt!"
 bftb_greece.103.desc:0 "Dicht auf den Fersen ihres bedauernswerten Anführers erreichten uns die Nachrichten, dass zahlreiche ehemalige venezolanische Generäle zurück ins Land geschmuggelt wurden. Kommunistische und republikanische Schmuggler verschworen sich, um die in Ungnade gefallenen Militärführer zusammen mit verschifften Waren getarnt ins Land zu bringen und versteckten sie, bevor wir überhaupt realisieren konnten, was geschah. \n\nEine offene Schlacht gegen desorganisierte Aufständische ist eine Sache; ein umfassender Bürgerkrieg, unterstützt von einer kompetenten Militärführung, eine ganz andere. Viele Berater bezweifeln mittlerweile, ob es wirklich eine weise Entscheidung eines so unpopulären Monarchen war, sich öffentlich zum absoluten Monarchen zu erklären, doch [ROOT.GetLeader] ist weiterhin davon überzeugt, dass die Rebellen kurzen Prozess machen werden."
 bftb_greece.103.a:0 "Musste wirklich auch der Hafen in die Luft gesprengt werden?"
 bftb_greece.104.t:0 "Organisierter Widerstand eskaliert im Süden und Norden!"
 bftb_greece.104.desc:0 "Die Behörden haben die Regierung darüber informiert, dass wir praktisch die gesamte Kontrolle über den Norden und Süden des Landes verloren haben. Kommunistische und venezianische Sympathisanten verbreiten ungehindert auf den Straßen ihre Verleumdungen und Propaganda – ungehindert von den lokalen Behörden, die ihnen entweder ebenso wohlgesonnen oder völlig machtlos gegenüberstehen. \n\nDie Armee weiß um die Falle, die sie erwartet, und weigert sich, die Regionen zu sichern. Sie bleibt jedoch in höchster Alarmbereitschaft, und dem Kabinett des Königs wurde versichert, dass die Armee nicht zögern werde, die notwendigen Schritte zu unternehmen, um die Kontrolle über das Land zurückzugewinnen, sobald die Venezelisten und Kommunisten aus ihren Verstecken gekommen seien. Natürlich bleiben viele Politiker skeptisch, was die Aufrichtigkeit dieser Zusicherungen angeht, da es zahlreiche Berichte über Korruption und verräterische Loyalitäten innerhalb der Streitkräfte gibt."
 bftb_greece.104.a:0 "Die Situation gerät außer Kontrolle!"
 bftb_greece.105.t:0 "Bürgerkrieg!"
 bftb_greece.105.desc:0 "Der schicksalshafte Tag ist endlich gekommen: Der Anführer der Venezialisten ist endlich aus dem Schatten getreten, um den Erlass des Königs als illegitim und beispiellose Bedrohung für [FROM.GetNameDef]s Demokratie zu verurteilen. Ihrer Ansicht nach haben sie keine andere Wahl, als die Monarchie gewaltsam zu stürzen, um die bereits zweimal besiegte Hellenische Republik wiederherzustellen. \n\n[ROOT.GetLeader] hat alle Rebellen als Verräter verurteilt und versprochen, die Marxisten und Republikaner auszurotten, damit in [ROOT.GetNameDef] wieder einmal Ordnung eingekehrt werden kann. Es scheint, als hätte sich die politische Arena von [ROOT.GetNameDef] erneut in ein Gladiatoren-Kolosseum verwandelt, aus dem nur die Mächtigsten als Sieger hervorgehen."
 bftb_greece.105.a:0 "Versammelt euch zum König!"

 bftb_greece.166.t:0 "Unsere Politiker kehren von Investitionsverhandlungen in Athen zurück"
 bftb_greece.166.desc:0 "Als die [FROM.GetAdjective]s beschlossen, uns zu weiteren Gesprächen über die Vertiefung unserer Wirtschaftsbeziehungen einzuladen, konnten wir nicht ablehnen. Selbstverständlich lieferten sie überzeugende Argumente dafür, warum eine Stärkung der industriellen Stellung [FROM.GetAdjective]s ideal wäre. Ob wir in ihr Land investieren oder ihr industrielles Potenzial dem Schicksal überlassen, liegt bei uns."
 bftb_greece.166.a:0 "Ja, wir werden investieren!"
 bftb_greece.166.b:0 "Diesmal wird es keine Investition geben ..."
 bftb_greece.166.c:0 "Nein, wir werden niemals in ihr erbärmliches Land investieren!"
 bftb_greece.167.t:0 "Unsere Geschäftsleute kehren von der [FROM.GetAdjective] National Showcase zurück"
 bftb_greece.167.desc:0 "Die [FROM.GetAdjective]s haben uns eine ziemliche Show geboten! Ihr Angebot, unsere Investitionen anzuziehen, war zweifellos verlockend, aber wir haben natürlich unsere eigenen Prioritäten im Blick. Die Entscheidung, ob wir in das [FROM.GetAdjective]-Land investieren, liegt bei uns."
 bftb_greece.167.a:0 "Ja, wir werden investieren!"
 bftb_greece.167.b:0 "Diesmal wird es keine Investition geben ..."
 bftb_greece.167.c:0 "Nein, wir werden niemals in ihr erbärmliches Land investieren!"
 bftb_greece.168.t:0 "Die [FROM.GetAdjective]s erpressen uns mit dem Schachtplan!"
 bftb_greece.168.desc:0 "Die cleveren kleinen in [FROM.GetNameDef] haben einen Weg gefunden, unser eigenes Schneeballsystem gegen uns zu verwenden. Ein sicheres kleines Schlupfloch, das dazu gedacht war, die Fehler im Schachplan zu unserem Vorteil auszunutzen, wurde stattdessen gegen uns verwendet – was eigentlich nicht möglich sein sollte. Wir können entweder unser Gesicht wahren und den [FROM.GetAdjective]s diesen einen kleinen Sieg gönnen oder die Fassade des Regelverstoßes aufgeben und uns den Gesprächen mit den [FROM.GetAdjective]-Leuten entziehen."
 bftb_greece.168.a:0 "Um die Konsequenzen zu vermeiden, werden wir dieses Mal nachgeben ..."
 bftb_greece.168.b:0 "Drehen Sie den Spieß um, Schacht!"
 bftb_greece.168.c:0 "Wir werden uns niemals einer Erpressung beugen!"
 bftb_greece.168.d:0 "Sie haben zu viel riskiert und müssen die Konsequenzen tragen!"
 gott_bless_herr_schacht_tt:0 "Diese Option ist verfügbar, da Sie derzeit §YHjalmar Schacht§! als Minister haben."
 bftb_greece.169.t:0 "Die [FROM.GetAdjective]s investieren!"
 bftb_greece.169.desc:0 "Wir haben gerade die [FROM.GetAdjective]-Investoren nach ihrem letzten kurzen Besuch in unserem Land willkommen geheißen, und sie bringen gute Nachrichten über Investitionen und Chancen mit! Mit ihrer Hilfe werden wir eine wirklich moderne Wirtschaft aufbauen."
 bftb_greece.169.a:0 "Ein voller Erfolg!"
 bftb_greece.169.b:0 "Ein voller Erfolg!"
 bftb_greece.169.c:0 "Tolle Arbeit, alle zusammen!"
 bftb_greece.170.t:0 "Die [FROM.GetAdjective]s entscheiden sich, nicht zu investieren"
 bftb_greece.170.desc:0 "Leider haben wir die Nachricht erhalten, dass die [FROM.GetAdjective]s dieses Mal nicht in unsere Wirtschaft investieren werden. Das ist eine enttäuschende Wendung der Ereignisse, obwohl der [FROM.GetAdjective]-Delegierte zukünftige Investitionen nicht ausgeschlossen hat, was ein gutes Zeichen für uns ist."
 bftb_greece.170.a:0 "Vielleicht beim nächsten Mal."
 bftb_greece.171.t:0 "Die [FROM.GetAdjective]s entziehen sich dauerhaft den Investitionsgesprächen!"
 bftb_greece.171.desc:0 "Möglicherweise haben wir das Thema Investitionen zu sehr forciert: Die [FROM.GetAdjective]s haben entschieden, dass sie kein Interesse daran haben, in die aufstrebende Industrie unseres Landes zu investieren. Wenn sie uns nicht dabei helfen wollen, die Zukunft zu gestalten, müssen wir eben ohne sie auskommen."
 bftb_greece.171.a:0 "Vielleicht ... wären die [ITA.GetAdjective]s einem Deal gegenüber eher aufgeschlossen?"
 bftb_greece.172.t:0 "Hjalmar Schacht verblüfft uns!"
 bftb_greece.172.desc:0 "Wir waren solche Narren zu glauben, wir könnten die [FROM.GetAdjective]s mit dem Schachtplan erpressen, obwohl der Mann, der den Vertrag ursprünglich ausgearbeitet hatte, noch Kabinettsminister war! Und jetzt sind wir nicht mehr die Nation, die sie bezahlen muss! Was für eine Katastrophe!"
 bftb_greece.172.a:0 "Der Zauberer der Finanzen schlägt wieder zu!"
 bftb_greece.173.t:0 "Unsere Unternehmer kehren von Verhandlungen in Athen zurück!"
 bftb_greece.173.desc:0 "Als die [FROM.GetAdjective]s beschlossen, uns zu weiteren Gesprächen über die Vertiefung unserer Wirtschaftsbeziehungen einzuladen, konnten wir nicht ablehnen. Selbstverständlich lieferten sie überzeugende Argumente dafür, warum eine Stärkung der industriellen Stellung [FROM.GetAdjective]s ideal wäre. Ob wir in ihr Land investieren oder ihr industrielles Potenzial dem Schicksal überlassen, liegt bei uns."
 bftb_greece.173.a:0 "Wir werden ihnen eine Charta erteilen, damit sie investieren können."
 bftb_greece.173.b:0 "Es liegt derzeit nicht im Interesse Großbritanniens."
 bftb_greece.173.c:0 "Tut mir leid, alte Jungs, aber John Bull hat woanders Wichtigeres zu tun!"
 bftb_greece.174.t:0 "Unsere Politiker nehmen an der [FROM.GetAdjective] National Showcase teil "
 bftb_greece.174.desc:0 "Die [FROM.GetAdjective]s haben uns eine ziemliche Show geboten! Ihr Angebot, unsere Investitionen anzuziehen, war zweifellos verlockend, aber wir haben natürlich unsere eigenen Prioritäten im Blick. Die Entscheidung, ob wir in das [FROM.GetAdjective]-Land investieren, liegt bei uns."
 bftb_greece.174.a:0 "Sie können auf unsere Unterstützung zählen!"
 bftb_greece.174.b:0 "Diesmal liegt es nicht im Interesse Großbritanniens."
 bftb_greece.174.c:0 "Tut mir leid, alte Jungs, aber John Bull hat woanders Wichtigeres zu tun!"
 bftb_greece.175.t:0 "Das [FROM.GetAdjective] Angebot Schiffsteile im Austausch für Investitionen"
 bftb_greece.175.desc:0 "Ein interessanter Vorschlag der [FROM.GetAdjective]s: Sie möchten uns Teile anbieten, um den Bau unserer Schiffe zu erleichtern, im Austausch für höhere Investitionen in ihr Land. Es ist vielleicht etwas unorthodox für staatliche Akteure, auf so niedrigem Niveau zu tauschen, aber andererseits ist das Einzige, was an den [FROM.GetAdjective]s jemals wirklich orthodox war, ihre Religion."
 bftb_greece.175.a:0 "Ein fairer Handel! Fast."
 bftb_greece.175.b:0 "Wir haben derzeit keinen Bedarf an [FROM.GetAdjective]-Teilen."
 bftb_greece.175.c:0 "Entschuldigen Sie [FROM.GetNameDef], aber unser Geschäft mit Ihnen ist abgeschlossen. Für immer!"
 bftb_greece.176.t:0 "Die [FROM.GetAdjective] Entscheiden Sie sich für eine Investition!"
 bftb_greece.176.desc:0 "Wir haben gerade die [FROM.GetAdjective]-Investoren nach ihrem letzten kurzen Besuch in unserem Land willkommen geheißen, und sie bringen gute Nachrichten über Investitionen und Chancen mit! Mit ihrer Hilfe werden wir eine wirklich moderne Wirtschaft aufbauen."
 bftb_greece.176.a:0 "Ein voller Erfolg!"
 bftb_greece.176.b:0 "Ein voller Erfolg!"
 bftb_greece.176.c:0 "Auf das [FROM.GetAdjective] ist immer Verlass!"
 bftb_greece.177.t:0 "Die [FROM.GetAdjective] entscheiden sich, dieses Mal nicht zu investieren"
 bftb_greece.177.desc:0 "Leider haben wir die Nachricht erhalten, dass [FROM.GetAdjective] dieses Mal nicht in unsere Wirtschaft investieren wird. Das ist eine enttäuschende Wendung der Ereignisse, obwohl der [FROM.GetAdjective]-Delegierte zukünftige Investitionen nicht ausgeschlossen hat, was ein gutes Zeichen für uns ist."
 bftb_greece.177.a:0 "Na ja, vielleicht beim nächsten Mal."
 bftb_greece.178.t:0 "Die [FROM.GetAdjective] Verabschieden Sie Gesetze, die uns daran hindern, weitere Investitionen zu suchen!"
 bftb_greece.178.desc:0 "Möglicherweise haben wir das Thema Investitionen zu sehr forciert: Die [FROM.GetAdjective] haben entschieden, dass sie kein Interesse daran haben, in die aufstrebende Industrie unseres Landes zu investieren. Wenn sie uns nicht dabei helfen wollen, die Zukunft zu gestalten, müssen wir eben ohne sie auskommen."
 bftb_greece.178.a:0 "Wagen wir es, einen Deal mit den Russen auszuhandeln?"
 bftb_greece.179.t:0 "[FROM.GetAdjective] Beamte kommen in der Hauptstadt auf uns zu und bitten uns um Investitionen"
 bftb_greece.179.desc:0 "Als die [FROM.GetAdjective]s beschlossen, uns zu weiteren Gesprächen über die Vertiefung unserer Wirtschaftsbeziehungen einzuladen, konnten wir nicht ablehnen. Selbstverständlich lieferten sie überzeugende Argumente dafür, warum eine Stärkung der industriellen Stellung [FROM.GetAdjective]s ideal wäre. Ob wir in ihr Land investieren oder ihr industrielles Potenzial dem Schicksal überlassen, entscheiden wir selbst.“"
 bftb_greece.179.a:0 "Ja, wir können einen kleinen Betrag investieren."
 bftb_greece.179.b:0 "Diesmal nicht."
 bftb_greece.179.c:0 "Wir haben überhaupt kein Interesse an [FROM.GetAdjective]-Angelegenheiten!"
 bftb_greece.180.t:0 "Unsere Offiziellen nehmen an der nationalen Präsentation in [FROM.GetNameDef] teil"
 bftb_greece.180.desc:0 "Die [FROM.GetAdjective]s haben uns eine ziemliche Show geboten! Ihr Angebot, unsere Investitionen anzuziehen, war zweifellos verlockend, aber wir haben natürlich unsere eigenen Prioritäten, um die wir uns kümmern müssen. Die Entscheidung, ob wir in das [FROM.GetAdjective]-Land investieren, liegt bei uns."
 bftb_greece.180.a:0 "Ja, wir werden in [FROM.GetNameDef] investieren."
 bftb_greece.180.b:0 "Diesmal nicht."
 bftb_greece.180.c:0 "Wir haben überhaupt kein Interesse an [FROM.GetNameDef]-Angelegenheiten!"
 bftb_greece.181.t:0 "Die [FROM.GetAdjective]-Regierung besticht unsere Gewerkschaften!"
 bftb_greece.181.desc:0 "Diese hinterhältigen Schurken in [FROM.GetNameDef] haben sich verschworen, uns zu Investitionen in den Felshaufen zu zwingen, den sie ihr Zuhause nennen! Unsere Gewerkschaften demonstrieren vor uns und werfen uns vor, die Beschäftigungskrise bewusst zu verschärfen, indem wir die Angebote der ach so großzügigen [FROM.GetAdjective]-Leute bewusst ablehnen. Das ist Unsinn; ihre Korruption ist offensichtlich. Und doch haben sie alle Trümpfe in der Hand. Gehen wir den Weg des geringsten Widerstands und geben wir den Gewerkschaften und damit [FROM.GetNameDef], was sie wollen? Oder stehen wir für unsere Prinzipien ein, in einer Zeit, in der Prinzipien uns alle ins Verderben stürzen könnten?"
 bftb_greece.181.a:0 "Wir können uns die Streiks derzeit nicht leisten ..."
 bftb_greece.181.b:0 "Ihre Drohungen machen uns keine Angst, Sans-couilles!"
 bftb_greece.181.c:0 "Ah, Grèce – le roi des cons! Bleiben Sie uns fern!"
 bftb_greece.182.t:0 "Die [FROM.GetAdjective] Investieren!"
 bftb_greece.182.desc:0 "Wir haben gerade die [FROM.GetAdjective]-Investoren nach ihrem letzten kurzen Besuch in unserem Land willkommen geheißen, und sie bringen gute Nachrichten über Investitionen und Chancen mit! Mit ihrer Hilfe werden wir eine wirklich moderne Wirtschaft aufbauen."
 bftb_greece.182.a:0 "Ein voller Erfolg!"
 bftb_greece.182.b:0 "Ein voller Erfolg!"
 bftb_greece.182.c:0 "Unsere Freundschaft ist wirklich großartig!"
 bftb_greece.183.t:0 "Die [FROM.GetAdjective] entscheiden sich, dieses Mal nicht zu investieren"
 bftb_greece.183.desc:0 "Leider haben wir die Nachricht erhalten, dass [FROM.GetAdjective] dieses Mal nicht in unsere Wirtschaft investieren wird. Das ist eine enttäuschende Wendung der Ereignisse, obwohl der [FROM.GetAdjective]-Delegierte zukünftige Investitionen nicht ausgeschlossen hat, was ein gutes Zeichen für uns ist."
 bftb_greece.183.a:0 "Na ja, vielleicht beim nächsten Mal."
 bftb_greece.184.t:0 "Das [FROM.GetAdjective] Wir werfen unseren Delegierten raus und schließen eine Investition als Möglichkeit aus"
 bftb_greece.184.desc:0 "Möglicherweise haben wir das Thema Investitionen zu sehr forciert: Die [FROM.GetAdjective] haben entschieden, dass sie kein Interesse daran haben, in die aufstrebende Industrie unseres Landes zu investieren. Wenn sie uns nicht dabei helfen wollen, die Zukunft zu gestalten, müssen wir eben ohne sie auskommen."
 bftb_greece.184.a:0 "Wagen wir es, einen Deal mit den Russen auszuhandeln?"
 bftb_greece.185.t:0 "Die [FROM.GetAdjective]s wenden sich an uns, um Hilfe bei der Industrialisierung ihres Landes zu erhalten"
 bftb_greece.185.desc:0 "Als die [FROM.GetAdjective]s beschlossen, uns zu Gesprächen über die Vertiefung unserer Wirtschaftsbeziehungen einzuladen, konnten wir nicht ablehnen. Was könnte die [FROM.GetAdjective]s nur so verzweifelt machen, dass sie sich an uns mit der Bitte um finanzielle Unterstützung wenden? Selbstverständlich lieferten sie überzeugende Argumente dafür, warum eine Stärkung der industriellen Stellung [FROM.GetAdjective]s ideal wäre ... insbesondere, wenn sich dadurch auch unsere eigene verbessern könnte. Ob wir in ihr Land investieren oder ihr industrielles Potenzial dem Schicksal überlassen, entscheiden wir."
 bftb_greece.185.a:0 "Es gibt Alternativen zum Kämpfen!"
 bftb_greece.185.b:0 "Vielleicht zu einem späteren Zeitpunkt."
 bftb_greece.185.c:0 "Nach ihrer Eroberung besteht die Chance zur Industrialisierung!"
 bftb_greece.186.t:0 "[FROM.GetAdjective] Diplomaten hoffen, [ROOT.GetAdjective] Ambitionen im Mittelmeerraum zu dämpfen"
 bftb_greece.186.desc:0 "Wir haben einen Delegierten aus [FROM.GetNameDef] empfangen, der uns die Besorgnis seiner Regierung über die zunehmende [ROOT.GetAdjective] politische Einmischung in ihr Land mitgeteilt hat. Sie wurden ermächtigt, einen Handel abzuschließen: Sie sollen uns materielle Güter liefern, und wir sollen davon Abstand nehmen, die Kontrolle über alle Staatsapparate zu übernehmen. \n\nWir haben natürlich jegliche derartige Einmischung bestritten, obwohl wir alle wissen, dass sie wahr ist. Das Angebot ist großzügig; zweifellos ist [FROM.GetAdjective]s Wunsch, ihre Souveränität zu sichern, ehrlich. Wir könnten den Zustrom an Material gebrauchen, aber andererseits könnten wir auch [FROM.GetNameDef] gebrauchen, das völlig unter unserer Kontrolle steht..."
 bftb_greece.186.a:0 "Die Hilfe wäre willkommen."
 bftb_greece.186.b:0 "Vielleicht sind wir uns in Zukunft einig, aber jetzt nicht."
 bftb_greece.186.c:0 "Ach, der Vasallenschaft kann man nicht so leicht entkommen!"
 bftb_greece.187.t:0 "Die [FROM.GetAdjective] Investieren!"
 bftb_greece.187.desc:0 "Wir haben gerade die [FROM.GetAdjective]-Investoren nach ihrem letzten kurzen Besuch in unserem Land willkommen geheißen, und sie bringen gute Nachrichten über Investitionen und Chancen mit! Sie bringen aber auch ungebetene Beobachter mit, die wir schnell aus den Augen verloren haben, während sie ihrer eigentlichen Aufgabe nachgingen. Ungeachtet dessen werden wir mit [FROM.GetAdjective]-Hilfe eine wahrhaft moderne Wirtschaft aufbauen."
 bftb_greece.187.a:0 "Ein Pakt mit dem Teufel ist dem Tod vorzuziehen."
 bftb_greece.187.b:0 "Wir zahlen einen hohen Preis für unsere anhaltende Unabhängigkeit."
 bftb_greece.188.t:0 "Das [FROM.GetAdjective] Investieren Sie dieses Mal nicht"
 bftb_greece.188.desc:0 "Leider haben wir die Nachricht erhalten, dass [FROM.GetAdjective] dieses Mal nicht in unsere Wirtschaft investieren wird. Das ist eine enttäuschende Wendung der Ereignisse, auch wenn der [FROM.GetAdjective]-Delegierte zukünftige Investitionen nicht ausgeschlossen hat, was ein gutes Zeichen für uns ist."
 bftb_greece.188.a:0 "Vielleicht ist das ein Glück im Unglück …"
 bftb_greece.189.t:0 "Die [FROM.GetAdjective]s meiden unsere Delegierten und werfen unsere Diplomaten hinaus!"
 bftb_greece.189.desc:0 "Möglicherweise haben wir das Thema Investitionen zu sehr forciert: Die [FROM.GetAdjective] haben entschieden, dass sie kein Interesse daran haben, in die aufstrebende Industrie unseres Landes zu investieren. Wenn sie uns nicht dabei helfen wollen, die Zukunft zu gestalten, müssen wir eben ohne sie auskommen."
 bftb_greece.189.a:0 "Dies ist sicherlich ein Zeichen dafür, dass noch Schlimmeres bevorsteht."
 bftb_greece.190.t:0 "[FROM.GetAdjective] Beamte beenden ihren Besuch im Präsidium"
 bftb_greece.190.desc:0 "Wir hatten gerade das Vergnügen, Vertreter von [FROM.GetNameDef] zu Gast zu haben. Eine von ihnen hielt als Gast eine Rede vor dem Präsidium, in der sie die engen Beziehungen zwischen unseren Nationen betonte. Es war ein erfreulicher Moment, doch der eigentliche Zweck des [FROM.GetAdjective]-Besuchs bestand darin, über Investitionen in ihr krisengeschütteltes Land zu sprechen. Marxistische Theoreme besagten, dass Revolutionen nur in industrialisierten Gesellschaften stattfinden könnten, doch unsere eigene Geschichte und die Erfahrungen der [FROM.GetAdjective]s besagen etwas anderes. \n\nUnter den Vertretern herrscht die feste Überzeugung, dass wir die [FROM.GetAdjective]s unterstützen sollten, da wir über die nötigen Ressourcen verfügen. Allerdings benötigen wir auch unsere eigenen Ressourcen – das wird von keinem Vertreter bestritten. Was sollen wir tun?"
 bftb_greece.190.a:0 "[ROOT.GetNameDefCap] wird einige Ressourcen zur Verbesserung von [FROM.GetNameDef] delegieren."
 bftb_greece.190.b:0 "Nein, derzeit wird es keine Investitionen geben."
 bftb_greece.190.c:0 "Das [ROOT.GetAdjective] Volk wird nicht leiden, damit ein paar [FROM.GetAdjective] Bauern in einer Fabrik arbeiten können."
 bftb_greece.191.t:0 "[ROOT.GetAdjective] Bürokraten kehren von ihrer Untersuchung von [FROM.GetNameDef] zurück"
 bftb_greece.191.desc:0 "Als die [FROM.GetAdjective]s beschlossen, uns zu Gesprächen über die Vertiefung unserer Wirtschaftsbeziehungen einzuladen, konnten wir nicht ablehnen. Was könnte die [FROM.GetAdjective]s nur so verzweifelt machen, dass sie sich an uns mit der Bitte um finanzielle Unterstützung wenden? Selbstverständlich lieferten sie überzeugende Argumente dafür, warum eine Stärkung der industriellen Stellung [FROM.GetAdjective]s ideal wäre ... insbesondere, wenn sich dadurch auch unsere eigene verbessern könnte. Ob wir in ihr Land investieren oder ihr industrielles Potenzial dem Schicksal überlassen, entscheiden wir."
 bftb_greece.191.a:1 "Eine Ausweitung ihrer Rüstung im Namen der Bekämpfung von Reaktionären kann zugelassen werden."
 bftb_greece.191.b:0 "Nein, derzeit wird es keine Investitionen geben."
 bftb_greece.191.c:0 "Das [ROOT.GetAdjective] Volk wird nicht leiden, damit ein paar [FROM.GetAdjective] Bauern in einer Fabrik arbeiten können."
 bftb_greece.192.t:0 "[FROM.GetAdjective] Beamte schlagen Rückkaufprogramm vor, bei dem sie in unsere vernachlässigten sibirischen Regionen investieren"
 bftb_greece.192.desc:0 "Wir haben eine Delegierte aus [FROM.GetNameDef] empfangen, die uns die Besorgnis ihrer Regierung über die zunehmende [ROOT.GetAdjective] politische Einmischung in ihr Land mitgeteilt hat. Sie wurde ermächtigt, einen Handel abzuschließen: Sie soll in unsere verarmten Regionen investieren, und wir sollen die Kontrolle über sämtliche Staatsapparate aufgeben. \n\nWir haben natürlich jegliche Einmischung bestritten, obwohl wir alle wissen, dass sie wahr ist. Das Angebot ist großzügig; zweifellos ist [FROM.GetAdjective]s Wunsch, ihre Souveränität zu sichern, ehrlich. Wir könnten den Zustrom an Material gebrauchen, aber andererseits könnten wir auch [FROM.GetNameDef] gebrauchen, das völlig unter unserer Kontrolle steht..."
 bftb_greece.192.a:0 "Das [FROM.GetAdjective]-Programm hat die Zustimmung des Politbüros gefunden und wird umgesetzt."
 bftb_greece.192.b:0 "Die Stavka schlägt vor, dass die Soft Power, die wir über [FROM.GetNameDef] ausüben können, nützlicher ist."
 bftb_greece.192.c:0 "[ROOT.GetNameDefCap] hat die Geschäftsabwicklung mit [FROM.GetNameDef] beendet."
 bftb_greece.193.t:1 "Investitionen in [FROM.GetNameDef]!"
 bftb_greece.193.desc:1 "Unsere besten Köpfe sind nach ihrer letzten wunderbaren Reise zu unseren [FROM.GetAdjective] Freunden nach Hause zurückgekehrt und bringen großartige Neuigkeiten über für beide Seiten vorteilhafte Investitionen und Chancen mit! Gemeinsam werden unsere Bemühungen sowohl die [ROOT.GetAdjective]- als auch die [FROM.GetAdjective]-Bevölkerung voranbringen und eine Partnerschaft aufbauen, mit der man rechnen muss."
 bftb_greece.193.a:1 "Eine gute Tat könnte eine weitere nach sich ziehen."
 bftb_greece.194.t:0 "Die [FROM.GetAdjective]s investieren dieses Mal nicht"
 bftb_greece.194.desc:0 "Leider haben wir die Nachricht erhalten, dass [FROM.GetAdjective] dieses Mal nicht in unsere Wirtschaft investieren wird. Das ist eine enttäuschende Wendung der Ereignisse, auch wenn der [FROM.GetAdjective]-Delegierte zukünftige Investitionen nicht ausgeschlossen hat, was ein gutes Zeichen für uns ist."
 bftb_greece.194.a:0 "Vielleicht ist das ein Glück im Unglück …"
 bftb_greece.195.t:0 "Die [FROM.GetAdjective]s meiden unsere Delegierten und werfen unsere Diplomaten hinaus!"
 bftb_greece.195.desc:1 "Möglicherweise haben wir das Thema Investitionen zu sehr forciert: Die [FROM.GetAdjective] haben entschieden, dass sie kein Interesse daran haben, in die aufstrebende Industrie unseres Landes zu investieren. Wenn sie uns nicht dabei helfen wollen, die Zukunft zu gestalten, müssen wir eben ohne sie auskommen."
 bftb_greece.195.a:0 "Jetzt sind wir wirklich allein damit beschäftigt, unsere wirtschaftlichen Probleme zu lösen."
 bftb_greece.200.t:0 "Heraklion Convention findet statt – ein großer Erfolg!"
 bftb_greece.200.desc:0 "Der Heraklion-Konvent ist offiziell zu Ende gegangen – und er war ein voller Erfolg! Alle Teilnehmer verließen ihn mit der Zusage von Gebietsgewinnen, und es scheint, dass [GRE.GetNameDef] eine umfassende Erweiterung seiner Grenzen erleben wird. Gemeinsam werden wir den Vertrag von Sèvres an einem weitaus verdienteren [TUR.GetName] rächen."
 bftb_greece.200.a:0 "Dafür können wir uns alle auf die Schulter klopfen."
 bftb_greece.201.t:0 "Heraklion Convention tritt zusammen"
 bftb_greece.201.desc:0 "Der Heraklion-Konvent ist offiziell zu Ende gegangen – und er war ein voller Erfolg! Alle Teilnehmer, außer [ENG.GetNameDef], verließen den Kongress mit der Zusage von Gebietsgewinnen, und es scheint, dass [GRE.GetNameDef] eine umfassende Erweiterung seiner Grenzen erleben wird. Gemeinsam werden die Unterzeichner den Vertrag von Sèvres an einem weitaus verdienteren [TUR.GetName] rächen."
 bftb_greece.201.a:0 "Hurra!"
 bftb_greece.201.b:0 "Was für ein Blödsinn!"
 bftb_greece.202.t:0 "Heraklion Convention tritt zusammen"
 bftb_greece.202.desc:0 "Der Heraklion-Konvent ist offiziell zu Ende gegangen – und er war ein voller Erfolg! Alle Teilnehmer, mit Ausnahme von [FRA.GetNameDef], verließen den Kongress mit der Zusage von Gebietsgewinnen, und es scheint, dass [GRE.GetNameDef] eine umfassende Erweiterung seiner Grenzen erleben wird. Gemeinsam werden die Unterzeichner den Vertrag von Sèvres an einem weitaus verdienteren [TUR.GetName] rächen."
 bftb_greece.202.a:0 "Eine tolle Initiative!"
 bftb_greece.202.b:0 "Quels imbéciles..."
 bftb_greece.203.t:0 "Heraklion Convention tritt zusammen"
 bftb_greece.203.desc:0 "Der Heraklion-Konvent ist offiziell zu Ende gegangen – und er war ein voller Erfolg! Alle Teilnehmer, mit Ausnahme von [ITA.GetNameDef], verließen den Kongress mit der Zusage von Gebietsgewinnen, und es scheint, dass [GRE.GetNameDef] eine umfassende Ausweitung seiner Grenzen erleben wird. Gemeinsam werden die Unterzeichner den Vertrag von Sèvres an einem weitaus verdienteren [TUR.GetName] rächen."
 bftb_greece.203.a:0 "Ein hervorragendes Ergebnis!"
 bftb_greece.203.b:0 "Ricordiamo la Vittoria Mutilata..."
 bftb_greece.204.t:0 "Heraklion Convention tritt zusammen"
 bftb_greece.204.desc:0 "Der Heraklion-Konvent ist offiziell beendet und war ein ... akzeptabler Erfolg. Weder [ENG.GetNameDef] noch [FRA.GetNameDef] werden am kommenden Krieg teilnehmen, da keinem von beiden Gebiete aus einem zerbrochenen [TUR.GetNameDef] versprochen wurden. Es scheint, dass [GRE.GetNameDef] eine deutliche Ausweitung seiner Grenzen bevorsteht, vorausgesetzt, es ist stark genug, [TUR.GetNameDef] allein zu bezwingen ..."
 bftb_greece.204.a:0 "Dennoch ein Sieg."
 bftb_greece.204.b:0 "Was für eine Zeitverschwendung ..."
 bftb_greece.205.t:0 "Heraklion Convention tritt zusammen"
 bftb_greece.205.desc:0 "Der Heraklion-Konvent ist offiziell zu Ende gegangen – und er war ein voller Erfolg! Alle Teilnehmer, mit Ausnahme von [ENG.GetNameDef] und [ITA.GetNameDef], verließen den Kongress mit der Zusage von Gebietsgewinnen, und es scheint, dass [GRE.GetNameDef] eine umfassende Ausweitung seiner Grenzen bevorsteht. Gemeinsam werden die Unterzeichner den Vertrag von Sèvres an einem weitaus verdienteren [TUR.GetName] rächen."
 bftb_greece.205.a:0 "Mal gewinnt man, mal verliert man!"
 bftb_greece.205.b:0 "Was für eine Zeitverschwendung ..."
 bftb_greece.205.c:0 "Wir werden diesen zweiten Verrat nicht tolerieren!"
 bftb_greece.206.t:0 "Heraklion Convention tritt zusammen"
 bftb_greece.206.desc:0 "Der Heraklion-Konvent ist offiziell zu Ende gegangen – und er war ein voller Erfolg! Alle Teilnehmer, mit Ausnahme von [FRA.GetNameDef] und [ITA.GetNameDef], verließen den Kongress mit der Zusage von Gebietsgewinnen, und es scheint, dass [GRE.GetNameDef] eine umfassende Ausweitung seiner Grenzen bevorsteht. Gemeinsam werden die Unterzeichner den Vertrag von Sèvres an einem weitaus verdienteren [TUR.GetName] rächen."
 bftb_greece.206.a:0 "Dennoch ein Sieg."
 bftb_greece.206.b:0 "Was für eine Zeitverschwendung ..."
 bftb_greece.206.c:0 "Wir werden diesen zweiten Verrat nicht tolerieren!"
 bftb_greece.207.t:0 "Die EEE starten einen Putsch!"
 bftb_greece.207.desc:0 "Wir hätten wissen müssen, dass es so enden würde: Die Führung der EEE hat uns als schwach und ineffektiv verurteilt und uns zum unmittelbarsten Hindernis auf dem Weg zu [ROOT.GetAdjective] Größe erklärt. Die Grobiane veranstalteten ein riesiges Spektakel im griechischen Parlament, wo sie uns alle als Verräter geißelten und erklärten, sie würden alles in ihrer Macht Stehende tun, um uns zu stürzen. Und tatsächlich verließen sie den Saal auf dramatische Weise, kehrten Stunden später, gefolgt von einem Mob, zurück und forderten unseren sofortigen kollektiven Rücktritt. \n\nDie öffentliche Meinung ist nicht länger auf unserer Seite, und um ehrlich zu sein, haben viele Minister den Glauben daran verloren, dass diese Regierung das Zeug dazu hat, die Dinge bis zum Ende durchzuziehen, wie wir es der Nation versprochen haben. Es herrscht allgemein das Gefühl, dass wir, indem wir ohne ausländische oder öffentliche Unterstützung auf Konstantinopel marschieren, das ganze Land auf einen Todesmarsch schicken, von dem wir uns nie erholen werden."
 bftb_greece.207.a:0 "Wir müssen für unsere Fehler geradestehen."
 bftb_greece.207.b:0 "Athen wird niemals von faschistischen Hunden regiert werden!"
 byzantinist_coup_tt:0 "Die „byzantinischen Faschisten“ werden eine Regierung bilden!\n"
 byzantinist_civil_war_inevitable_tt:0 "Die §YByzantinisten§! werden bald wieder versuchen, uns gewaltsam aus der Regierung zu entfernen...\n"
 bftb_greece.209.t:0 "Wir haben unsere während der Heraklion-Konvention festgelegten Zusagen eingehalten!"
 bftb_greece.209.desc:0 "Wir haben den ehemaligen türkischen Staat zersplittert und die Beute unter den Siegern aufgeteilt. Wir haben unsere Verpflichtungen gegenüber unseren Verbündeten und unserem Volk erfüllt und [ROOT.GetNameDef] ist der Erlangung wahrer Größe so nahe wie seit Jahrhunderten nicht mehr."
 bftb_greece.209.a:0 "Dies ist wirklich unser herrlichster Moment."
 megali_idea_honoured_greece_tt:0 "Die unseren Verbündeten während der §YHeraklion-Konvention§! versprochenen Gebiete wurden bereits übertragen.\n"
 bftb_greece.210.t:0 "Die Griechen halten sich an die Garantien der Heraklion-Konvention!"
 bftb_greece.210.desc:0 "Wie versprochen wurden die uns zugesicherten Provinzen aus der Hülle der besiegten türkischen Nation herausgeschnitten und unter unsere Kontrolle gestellt. Imperialismus ist ein übles Geschäft, aber niemand macht es besser als wir."
 bftb_greece.210.a:0 "Wie am Schnürchen ausgeführt."
 megali_idea_honoured_tt:0 "Die uns im Rahmen der §YHeraklion-Konvention§! zugesagten Gebiete wurden bereits übertragen."
 bftb_greece.213.t:0 "Die [FROM.GetAdjective]s weigern sich, ihre Schulden bei uns zurückzuzahlen!"
 bftb_greece.213.desc:0 "Diese lüsternen [FROM.GetAdjective] Diebe haben beschlossen, mit dem Geld abzuhauen, das sie uns schulden! Wir haben diese Schulden jahrzehntelang sorgfältig gepflegt und wachsen lassen, und sie besitzen die Dreistigkeit, sie als unrechtmäßig zu bezeichnen? Wenn sie glauben, sie könnten uns ungestraft betrügen, dann liegen sie völlig falsch – das muss Konsequenzen haben! Allerdings lässt sich nicht leugnen, dass wir etwas übereifrig waren, als wir [FROM.GetNameDef] die Möglichkeit gaben, sich Schulden anzuhäufen, und sie dann für ihre angehäuften Schulden bestraften."
 bftb_greece.213.a:0 "Unterschlagende Parasiten!"
 bftb_greece.213.b:0 "Sie wurden zu sehr unter Druck gesetzt und das ist die Folge."
 bftb_greece.217.t:0 "Der große faschistische Boulē von Halikarnassos"
 bftb_greece.217.desc:0 "Der Faschismus war in [ROOT.GetNameDef] immer ein eher gemäßigtes Phänomen, aber unter der Führung von [ROOT.GetLeader] hat er einen solchen Aufschwung erlebt, dass sich alle großen faschistischen Geister des Landes treffen können, um über die Zukunft des Landes zu beraten. [ROOT.GetLeader] schlägt vor, seinen entschieden autoritären Regierungsstil zu übernehmen und direkt in eine faschistische Form zu übertragen, um Instabilität zu minimieren. George Mercouris, der vollendete Nationalsozialist des Landes, glaubt, der beste Weg nach vorn für [ROOT.GetNameDef] sei die Beseitigung des unpopulären Königs, um das Land in eine wahrhaft radikale Politik zu führen. \n\n[ROOT.GetLeader] sprach ausführlich über Visionen eines Großgriechenlands, das sich von Albanien bis Zypern erstreckt, aber nicht übertroffen werden soll. Mercouris glaubte, dass das [ROOT.GetAdjective]-Volk noch weiter zurückblicken müsse, um den Schlüssel zu seiner Größe zu finden. Metaxas glaubt, dass die Dritte Hellenische Zivilisation als neue, größere hellenische Nation in naher Zukunft vor uns liegt, Mercouris hingegen glaubt, dass die Inspiration für die Dritte Hellenische Zivilisation von der allerersten Hellenischen Zivilisation kommen wird. Zwei mächtige Persönlichkeiten, die zwei sehr unterschiedliche Meinungen vertreten: die faschistische Zukunft von [ROOT.GetNameDef] hier auf Samos."
 bftb_greece.217.a:0 "Metaxas muss unser faschistisches Königreich führen!"
 GRE_metaxist_monarchist_fascism_tt:1 "§YGeorg II.§! bleibt König und §YGroßgriechenland§! wird als formbare Nation verfügbar. \nDie §YMonarchisten§! werden loyal."
 bftb_greece.217.b:0 "Mercouris wird uns ein Imperium bescheren!"
 GRE_republican_national_socialism_tt:1 "§YGeorg II.§! wird vom Thron gestürzt und wir werden in der Lage sein, das §YErbe der Argeaden§! zu erfüllen. \nDie £faction_gre_monarchistischen §YMonarchisten§! werden belanglos."
 bftb_greece.218.t:0 "Der Aufstand der anatolischen Faschisten!"
 bftb_greece.218.desc:0 "Die Zeit ist gekommen; in unserer dunkelsten Stunde hat der verächtliche Georgios Kosmidis einen Ruf zu den Waffen erlassen und die Treuen der EEE und [ROOT.GetNameDef] aufgefordert, uns und die Besatzer in der Ägäis zu vernichten. Sicher ist nur, dass [ROOT.GetNameDef]s Zukunft sehr ungewiss ist."
 bftb_greece.218.a:0 "Faschisten dürfen nicht über das Schicksal von [ROOT.GetNameDef] entscheiden!"
 bftb_greece.218.b:0 "Vielleicht haben wir uns geirrt; vielleicht kann das EEE [ROOT.GetNameDef] doch retten."
 bftb_greece.220.t:0 "[FROM.GetNameDefCap] stimmt zu, Enosis zu ermöglichen!"
 bftb_greece.220.desc:0 "Die Stimmung in der Hauptstadt lässt sich am besten als „Jubel“ beschreiben, nachdem [ROOT.GetLeader] der Nation verkündete, dass nach all den Jahren die [ROOT.GetAdjective] Träume von Enosis mit Zypern endlich Wirklichkeit werden würden, und das alles dank unserer [FROM.GetAdjective] Freunde. Unsere Verwalter sind unverzüglich nach Zypern gereist, um einen möglichst reibungslosen Machtübergang zu gewährleisten. \n\nDies ist ein wahrhaft großer und historischer Tag für [ROOT.GetNameDef]. Zypern ist seit langem Teil des [ROOT.GetAdjective] kollektiven Bewusstseins und ist nun endlich im Schoß der Zivilisation, aus der es hervorgegangen ist, heimisch geworden."
 bftb_greece.220.a:0 "Endlich vereint!"
 bftb_greece.221.t:0 "Die Heraklion-Konvention – die [FRA.GetAdjective] erhalten ihr Mandat!"
 bftb_greece.221.desc:0 "Die Mehrheit der anwesenden Delegierten hat dafür gestimmt, dass [FRA.GetNameDef] nach dem erfolgreichen Sturz des [TUR.GetAdjective]-Staates ein Mandat in Kurdistan erhalten soll. [FRA.GetAdjective]-Beamte haben die anwesenden Delegierten für ihre kluge Staatskunst gelobt und der Zentralregierung [FRA.GetAdjective] bereits Anweisungen übermittelt, mit der Planung für die Einrichtung einer Verwaltung in der Region zu beginnen."
 bftb_greece.221.a:0 "Die Mehrheit ist dafür!"
 bftb_greece.222.t:0 "Die Heraklion-Konvention – den [FRA.GetAdjective] wird ihr Mandat verweigert!"
 bftb_greece.222.desc:0 "Die Mehrheit der anwesenden Delegierten hat dafür gestimmt, dass [FRA.GetNameDef] nach der erfolgreichen Bezwingung des [TUR.GetAdjective]-Staates jegliches Territorium in Kurdistan verweigert werden soll. [FRA.GetAdjective]-Funktionäre hätten beinahe beschlossen, die Versammlung ganz zu verlassen, da sie das Ereignis als Farce bezeichneten, kamen dann aber zu dem Schluss, dass sie lieber weiterhin Einfluss auf die weiteren Vorgänge nehmen möchten, auch wenn ihnen nichts versprochen wurde."
 bftb_greece.222.a:0 "Die Nein-Stimmen haben es geschafft!"
 bftb_greece.223.t:0 "Die Heraklion-Konvention – die [ENG.GetAdjective] bekommen ihr Protektorat!"
 bftb_greece.223.desc:0 "Die Mehrheit der anwesenden Delegierten hat dafür gestimmt, dass [ENG.GetNameDef] ein armenisches Protektorat gewährt werden soll, das aus der Hülle eines besiegten [TUR.GetName] herausgelöst werden soll. [ENG.GetAdjective]-Beamte haben die anwesenden Delegierten für ihre kluge Staatskunst gelobt und bereits Anweisungen an die Zentralregierung [ENG.GetAdjective] weitergeleitet, mit der Planung für die Einrichtung einer Verwaltung in der Region zu beginnen."
 bftb_greece.223.a:0 "Die Mehrheit ist dafür!"
 bftb_greece.224.t:0 "Die Heraklion-Konvention – den [ENG.GetAdjective] wird ihre Marionette verweigert!"
 bftb_greece.224.desc:0 "Die Mehrheit der anwesenden Delegierten hat dafür gestimmt, [ENG.GetNameDef] das Recht zu verweigern, im Norden [TUR.GetNameDef] einen armenischen Marionettenstaat zu gründen. [ENG.GetAdjective]-Funktionäre verurteilten die Entscheidung und bezeichneten die gesamte Versammlung als chaotisch, entschieden jedoch, dass sie lieber weiterhin Einfluss auf die weiteren Vorgänge nehmen möchten, auch wenn ihnen nichts garantiert wurde."
 bftb_greece.224.a:0 "Die Nein-Stimmen haben es geschafft!"
 bftb_greece.225.t:0 "Die Konvention von Heraklion – die [ITA.GetAdjective]s bekommen ihre Gebiete!"
 bftb_greece.225.desc:0 "Die Mehrheit der anwesenden Delegierten hat dafür gestimmt, dass [ITA.GetNameDef] Kolonien zugesprochen werden sollten, die aus dem Kadaver eines besiegten [TUR.GetName] herausgelöst wurden. [ITA.GetAdjective]-Beamte haben den anwesenden Delegierten für ihre umsichtige Entscheidung in dieser Angelegenheit applaudiert, und viele Mitglieder der [ITA.GetAdjective]-Delegation sind bereits nach Hause geströmt, um [ITA.GetLeader] die Neuigkeit zu überbringen."
 bftb_greece.225.a:0 "Die Mehrheit ist dafür!"
 bftb_greece.226.t:0 "Die Heraklion-Konvention – den [ITA.GetAdjective]s werden ihre Territorien verweigert!"
 bftb_greece.226.desc:0 "Die Mehrheit der anwesenden Delegierten stimmte dafür, [ITA.GetNameDef] das Recht zu verweigern, Kolonien im südlichen [TUR.GetNameDef] zu gründen, und verurteilte den Antrag selbst als weiteren albernen [ITA.GetAdjective] Kriegstreiber. [ITA.GetAdjective] Beamte griffen die Entscheidung an und nutzten die gesamte Situation, um zu verdeutlichen, dass sie ein weiterer Beweis dafür sei, dass das [ITA.GetAdjective] Volk mit seinem Glauben an die „Vittoria mutilata“ Recht habe. Ungeachtet ihrer persönlichen Ansichten zu dieser Angelegenheit wurden die [ITA.GetAdjective] Delegierten angewiesen, an den Sitzungen des Konvents teilzunehmen – zweifellos in der Hoffnung, dass sie das Urteil über den letzten und wichtigsten Tagesordnungspunkt noch beeinflussen können."
 bftb_greece.226.a:0 "Die Nein-Stimmen haben es geschafft!"
 bftb_greece.227.t:0 "Die [GRE.GetAdjective] Grenzscharmützel mit [TUR.GetNameDef] eskalieren"
 bftb_greece.227.desc:0 "Der [GRE.GetAdjective]-Angriff auf [341.GetName] scheiterte erwartungsgemäß, und da der Konflikt in der Ägäis eskaliert, bietet sich uns die perfekte Gelegenheit, im Namen von [GRE.GetNameDef] einzugreifen. Wir sollten unsere Truppen in den Kaukasus verlegen, um die [TUR.GetAdjective]-Grenze zu sichern. Wenn die [GRE.GetAdjective]s das Signal senden, werden wir die [TUR.GetAdjective]-Streitkräfte in die Zange nehmen und einen legitimen Krieg erzwingen."
 bftb_greece.227.a:0 "Wir werden bereit sein."
 bftb_greece.228.t:0 "Die [SOV.GetAdjective]s sind besiegt"
 bftb_greece.228.desc:0 "Erstaunliche Neuigkeiten haben unsere Hauptstadt erreicht: Den unbesiegbaren Armeen von [SOV.GetNameDef] ist es nicht gelungen, die [TUR.GetAdjective]-Linien zu durchbrechen. Sie werden uns bei der Invasion nicht unterstützen, haben alle ihre Pläne und Offensiven abgebrochen und den [TUR.GetAdjective] Straffreiheit gewährt, um über uns zu richten, wie sie es für richtig halten."
 bftb_greece.228.a:0 "Das verheißt nichts Gutes ..."
 bftb_greece.229.t:0 "[GRE.GetNameDefCap] fordert uns auf, unser Versprechen zu erfüllen"
 bftb_greece.229.desc:0 "[GRE.GetNameDefCap] hat seinen Krieg mit [TUR.GetNameDef] begonnen und uns wie versprochen um Unterstützung gebeten. Die versprochenen Gewinne sind beträchtlich, und es besteht jederzeit die Möglichkeit, mehr zu verlangen, aber möglicherweise sind wir nicht mehr in der Lage, unseren Verpflichtungen nachzukommen – selbst wenn das bedeutet, unsere Ansprüche aufzugeben."
 bftb_greece.229.a:0 "Auf in den Krieg!"
 bftb_greece.229.b:0 "Die Situation hat sich geändert."
 bftb_greece.230.t:0 "[FROM.GetNameDefCap] hält seine Verpflichtungen ein"
 bftb_greece.230.desc:0 "[FROM.GetNameDefCap] hat sich uns in unserem Krieg gegen [TUR.GetNameDef] angeschlossen, wie sie es versprochen haben. Gemeinsam werden wir den Staat [TUR.GetAdjective] zu Fall bringen."
 bftb_greece.230.a:0 "Wir dürfen nicht verlieren!"
 bftb_greece.231.t:0 "[FROM.GetNameDefCap] Geben Sie Ihre Verpflichtungen auf!"
 bftb_greece.231.desc:0 "[FROM.GetNameDefCap] hat sein Versprechen, uns zu helfen, gebrochen und seine Ansprüche in [TUR.GetNameDef] fallengelassen! Sie haben uns verraten und damit unseren gesamten Kampf entwertet. Wir müssen hoffen, dass wir die Kraft haben, ohne [FROM.GetAdjective] Hilfe durchzuhalten."
 bftb_greece.231.a:0 "Feiglinge!"
 bftb_greece.232.t:1 "Ein Basileus entsteht ..."
 bftb_greece.232.desc:1 "Ein Wunder wurde über unsere niedergeschlagene Nation gebracht: eine göttliche Intervention, die uns der Heilige Justinian vom Himmel selbst gewährte. Ein in zerlumpte Lumpen gekleideter Mann wurde bewusstlos an der Küste des Berges Athos gefunden und von den treuen Wächtern der heiligen Stätte vor dem sicheren Tod gerettet. Die Behörden hielten den Mann zunächst für einen völlig verrückten Mann, der den ganzen Weg von Deutschland nach [ROOT.GetNameDef] zu Fuß zurückgelegt hatte. Doch einer unserer eigenen EEE-Akademiker identifizierte ihn als einen lange verschollenen Nachkommen der Komnenen-Dynastie. \n\nLange quälte uns die Frage, wer unserem byzantinischen Staat vorstehen sollte, und es scheint, als hätte Gott selbst uns seine Lösung gegeben. Der byzantinische Erbe spricht kein Wort Griechisch, aber man kann es ihm sicherlich beibringen! Wahrlich, [ROOT.GetNameDef] ist von Gottes Vorsehung begünstigt."
 bftb_greece.232.a:1 "Es lebe Basileus Adolfos I.!"
 bftb_greece.232.b:0 "Äh, warte, was ist, wenn er einfach nur ein Verrückter ist?"
 bftb_greece.233.t:0 "Ioannis Metaxas ist verstorben"
 bftb_greece.233.desc:0 "Der Premierminister und Diktator von [ROOT.GetNameDef] ist nach längerer Krankheit verstorben. Er starb im Ausland, im Exil seines eroberten Landes. Obwohl er beim [ROOT.GetAdjective] Volk nicht besonders beliebt war, wurde er in Krisenzeiten zu einem Symbol nationaler Einheit und Widerstandskraft. Emmanouil Tsouderos, eine einigende Figur und Venizelist, hat Metaxas&#39; Platz als Premierminister von [ROOT.GetNameDef] eingenommen."
 bftb_greece.233.a:0 "Der Krieg geht weiter."
 bftb_greece.234.t:0 "Megali-Idee genehmigt"
 bftb_greece.234.desc:0 "Von der Heraklion-Konvention haben wir erfahren, dass die anwesenden Großmächte dem [GRE.GetAdjective]-Vorschlag der „Megali-Idee“ zugestimmt haben. Dies gefährdet nicht nur die Stabilität der Region, sondern birgt auch das Risiko eines offenen Kriegs zwischen [GRE.GetNameDef] und [TUR.GetNameDef] in nicht allzu ferner Zukunft.\n\nEs ist nicht auszuschließen, dass [GRE.GetNameDef] die militärische Unterstützung von [FRA.GetNameDef] oder [ENG.GetNameDef] erhält. Angesichts unserer derzeitigen militärischen Verpflichtungen gegenüber [TUR.GetNameDef] könnten wir uns durchaus auf der falschen Seite eines Krieges mit einer dieser Großmächte wiederfinden, wenn nicht sogar mit beiden. Unsere militärischen Führer fordern uns dringend auf, dies zu berücksichtigen und unser Engagement für die Verteidigung von [TUR.GetNameDef] zu überdenken."
 bftb_greece.234.a:0 "Die Türken werden alleine überleben müssen."
 bftb_greece.234.b:0 "Wir stehen zu unseren Garantien, egal was es kostet!"
 bftb_greece.235.t:0 "[ROM.GetName] widerruft Garantie"
 bftb_greece.235.desc:0 "Die Konvention von Heraklion hat unsere [ROM.GetAdjective] Garanten zutiefst erschüttert. Anstatt einen Krieg mit den europäischen Großmächten zu riskieren, haben sie beschlossen, ihre Versprechen, uns militärisch zu verteidigen, zurückzuziehen."
 bftb_greece.235.a:0 "Feiglinge!"

 bftb_turkey.1.t:0 "Das Montreux-Übereinkommen"
 bftb_turkey.1.desc:1 "Präsident [TUR.GetLeader] hat uns informiert, dass [TUR.GetNameDef] die Remilitarisierung der türkischen Meerengen vorbereitet. Die [TUR.GetAdjective]-Regierung möchte, dass wir ihre Ansprüche auf ihre Hoheitsgewässer unterstützen und den Vertrag von Lausanne ändern, um ihnen die Legitimität zu verleihen, diese Ansprüche aufrechtzuerhalten. \n\nDie Unterstützung der [TUR.GetAdjective]-Ansprüche auf die türkischen Meerengen wird sie uns sicherlich sympathisch machen und könnte [TUR.GetNameDef] die Möglichkeit eröffnen, [ITA.GetNameDef] im Mittelmeer herauszufordern. Sollten wir uns jedoch in dieser Krise verstricken, könnten wir auch auf entgegengesetzten Seiten von [SOV.GetNameDef] landen, was im schlimmsten Fall Krieg bedeuten könnte."
 bftb_turkey.1.a:0 "Wir werden die Türken in dieser Angelegenheit unterstützen."
 bftb_turkey.1.b:0 "Das Britische Empire kümmert sich nicht um die Türkei."
 TUR_britain_backs_turkey_tt:0 "\nWir werden §Y[TUR.GetNameDef]§! unterstützen, da sie die Befugnis haben sollten, die Durchfahrt durch die §YTürkischen Meerengen§! zu regeln. \n\n§RWeigen wir die Möglichkeit, unsere Unterstützung zurückzuziehen, sollte ein Krieg zwischen §Y[TUR.GetNameDef]§! und §Y[SOV.GetNameDef]§! plötzlich wahrscheinlich erscheinen.§!"
 TUR_britain_unentangles_itself_tt:0 "\nWir werden §Y[TUR.GetNameDef]§! der Willkür von §Y[SOV.GetNameDef]§! überlassen. Es ist wahrscheinlich, dass die §YTürkischen Meerengen§! für den uneingeschränkten Schiffsverkehr aus aller Welt geöffnet bleiben."
 bftb_turkey.2.t:0 "[ENG.GetName] bietet seine Unterstützung an"
 bftb_turkey.2.desc:0 "[ENG.GetLeader] hat eine Erklärung veröffentlicht, in der es heißt, dass [ENG.GetNameDef] uns bei unserem Ziel unterstützen wird, die Kontrolle über unsere eigene Situation zurückzugewinnen. Die Unterstützung von [ENG.GetNameDef] ist ein großer Sieg für uns und trägt wesentlich dazu bei, unsere Legitimität weltweit zu stärken."
 bftb_turkey.2.a:0 "Nun warten wir auf die Antwort von [SOV.GetNameDef]."
 bftb_turkey.3.t:0 "[ENG.GetName] verweigert uns Hilfe!"
 bftb_turkey.3.desc:0 "[ENG.GetLeader] schrieb einen langen Brief an [TUR.GetLeader], in dem er ausführlich erklärte, dass [ENG.GetNameDef] es sich zum jetzigen Zeitpunkt nicht leisten könne, in eine ausländische Krise verwickelt zu werden. Als Gründe dafür, warum [ENG.GetNameDef] sich nicht einmischen werde, nannte [ENG.GetNameDef] die mangelnde Unterstützung der Bevölkerung für einen Krieg in [ENG.GetNameDef] und seine eigene Skepsis gegenüber [TUR.GetAdjective] der Kriegsbereitschaft mit [SOV.GetNameDef]. \n\nDie [ENG.GetName] haben unsere Kontrolle über die türkischen Meerengen anerkannt, mehr werden sie aber nicht tun."
 bftb_turkey.3.a:0 "Nun warten wir auf die Antwort von [SOV.GetNameDef]."
 bftb_turkey.4.t:0 "[TUR.GetNameDef] übernimmt die Kontrolle über den Bosporus!"
 bftb_turkey.4.desc:0 "[TUR.GetLeader] hat erklärt, dass die türkischen Meerengen nun vollständig unter die Kontrolle von [TUR.GetNameDef] fallen und die [TUR.GetAdjective]-Regierung damit die Möglichkeit hat, die Meerengen nach eigenem Ermessen für uns zu sperren! Das ist absolut inakzeptabel: Es bedeutet, dass die [TUR.GetAdjective]-Regierung entschieden hat, dass sie das Recht hat, unsere eigenen Flotten im Schwarzen Meer festzuhalten, wann immer sie dies für politisch zweckmäßig hält."
 bftb_turkey.4.a:0 "Mobilisieren Sie sofort die Streitkräfte!"
 bftb_turkey.4.b:0 "Dieser absurde Zirkus interessiert uns wenig."
 TUR_soviets_oppose_turkey_tt:0 "\nDie §Y[TUR.GetAdjective]§!-Regierung wird uns entweder eine Kompromisslösung anbieten oder die Situation weiter eskalieren lassen. \n\n§RWerden wir die Möglichkeit haben, die Situation zu deeskalieren, sollte ein bewaffneter Konflikt wahrscheinlich werden.§!"
 TUR_soviets_allow_militarisation_tt:0 "Die §YTürkischen Meerengen§! werden remilitarisiert und §Y[TUR.GetNameDef]§! erhält die Macht, den gesamten Schiffsverkehr zu regulieren, der sie durchquert."
 bftb_turkey.5.t:0 "[SOV.GetName] ist gegen unsere Remilitarisierung der Meerengen!"
 bftb_turkey.5.desc:0 "Offizielle Vertreter von [SOV.GetNameDef] haben unmissverständlich erklärt, dass sie unsere einseitige Besetzung der türkischen Meerengen für rechtswidrig halten und extreme Maßnahmen ergreifen wollen, um unsere Entscheidung rückgängig zu machen. Trotz des Drucks unserer Diplomaten schlossen die [SOV.GetAdjective]-Beamten eine militärische Intervention in [TUR.GetNameDef] zur Durchsetzung ihres Willens nicht aus. \n\nDie Beibehaltung des aktuellen Status quo ist undenkbar, und selbst [SOV.GetNameDef] muss dies verstehen. Wenn wir eine Kompromisslösung anbieten, die allen Anrainerstaaten des Schwarzen Meeres freien Zugang gewährt, hat [SOV.GetNameDef] keine andere Wahl, als unser Angebot anzunehmen, es sei denn, sie wollen zum Paria der Welt werden."
 bftb_turkey.5.a:0 "Wir werden den Kompromiss anbieten."
 bftb_turkey.5.b:0 "Keine Vergleiche, keine Kompromisse – wir machen es richtig!"
 TUR_strait_compromise_tt:0 "§Y[SOV.GetNameDefCap]§! und alle anderen Nationen, die eine Küste am §YSchwarzen Meer§! teilen, behalten ihr Privileg des freien Zugangs durch die §YTürkischen Meerengen§!."
 TUR_remaining_defiant_tt:0 "\nWir werden weiterhin das Recht fordern, den gesamten Seeverkehr zu regulieren, der die §YTürkischen Meerengen§! passiert. \n\n§RDies könnte unsere letzte Chance zur Deeskalation sein: Wenn [SOV.GetNameDef] die Angelegenheit vorantreibt, wird es zum Krieg führen!§!"
 bftb_turkey.6.t:0 "[SOV.GetName] stimmt der Remilitarisierung der Meerengen zu!"
 bftb_turkey.6.desc:0 "Die [SOV.GetAdjective]-Regierung gab eine knappe Erklärung mit vagen Hinweisen auf Konsequenzen und Strafen für die Störung des Friedens ab, doch hinter vorgehaltener Hand wurde unseren Beamten versichert, dass von [SOV.GetNameDef] keine Vergeltungsmaßnahmen zu erwarten seien. \n\n[TUR.GetLeader] hielt in Istanbul eine leidenschaftliche Rede, die im ganzen Land über das Radio übertragen wurde und in der er diesen großen Sieg für [TUR.GetNameDef] verkündete. Die Regierung erhielt große Unterstützung und wir können mit landesweiten Feierlichkeiten für unseren entscheidenden Sieg in dieser Angelegenheit rechnen."
 bftb_turkey.6.a:0 "Auf den Frieden zu Hause und auf den Frieden in der Welt!"
 bftb_turkey.7.t:0 "[TUR.GetNameDefCap] Kompromisse bei der Remilitarisierung der Meerengen"
 bftb_turkey.7.desc:0 "Nach langen Verhandlungen hat die [TUR.GetAdjective]-Regierung beschlossen, die Kontrolle über die Meerenge zu übernehmen und allen Anrainerstaaten des Schwarzen Meeres weiterhin freien Zugang zu gewähren. Der hieb- und stichfeste Vorschlag von [TUR.GetNameDef] lässt wenig Raum für Proteste und wurde bereits von [BUL.GetNameDef] und [ROM.GetNameDef] hastig genehmigt, was uns in dieser Angelegenheit letztlich die Hände bindet."
 bftb_turkey.7.a:0 "Nun, diese Krise kann als beendet betrachtet werden."
 bftb_turkey.8.t:0 "Konflikt im Schwarzen Meer"
 bftb_turkey.8.desc:0 "[SOV.GetName] hat [TUR.GetNameDef]s Plan, die Kontrolle über ihre Meerengen zurückzuerlangen, angefochten, und dennoch bleibt [TUR.GetNameDef] angesichts der Drohungen von [SOV.GetAdjective] trotzig. Die Situation droht in einen bewaffneten Konflikt zu eskalieren, da [TUR.GetNameDef] darum kämpft, seine Souveränität zu behaupten, und [SOV.GetNameDef] versucht, seine Vorherrschaft in der Region zu etablieren. \n\nDas Kräfteverhältnis liegt in unseren Händen: Wir müssen entscheiden, ob wir unsere Unterstützung für [TUR.GetNameDef] mit einer Unabhängigkeitsgarantie legitimieren, um die Sowjetunion abzuschrecken, oder ob wir uns aus der Situation heraushalten und hoffen, dass die beiden Länder von ihrem engen Kollisionskurs, auf den sie sich beide begeben haben, abkommen."
 bftb_turkey.8.a:0 "Wir müssen [TUR.GetNameDef] gegen die bolschewistische Tyrannei unterstützen."
 bftb_turkey.8.b:0 "Die Beschwichtigung des Irredentismus ist ein geringer Preis für den Frieden!"
 TUR_britain_stands_up_for_turkey_tt:0 "\nWir werden §Y[TUR.GetNameDef]§! beistehen, selbst wenn es zum Krieg führt. §R[SOV.GetNameDefCap] wird eine letzte Gelegenheit bekommen, die Situation zu deeskalieren!§!"
 TUR_britain_abandons_turkey_tt:0 "\nWenn wir unsere Unterstützung für §Y[TUR.GetNameDef]§! widerrufen, erhält die §Y[TUR.GetAdjective]-Regierung§! eine letzte Gelegenheit, die Situation zu deeskalieren."
 bftb_turkey.9.t:0 "Die [ENG.GetAdjective] verlassen uns"
 bftb_turkey.9.desc:0 "Premierminister [ENG.GetLeader] hat öffentlich erklärt, dass [ENG.GetNameDef] angesichts der zunehmenden Spannungen zwischen uns und [SOV.GetNameDef] es sich nicht leisten kann, in einen sogenannten „regionalen Konflikt“ verwickelt zu werden. Unter Berufung auf [ENG.GetAdjective] Verluste im Ersten Weltkrieg verfolgt [ENG.GetLeader] eine Beschwichtigungspolitik gegenüber [SOV.GetNameDef]. \n\nDie Ankündigung wurde in Ankara mit Bestürzung aufgenommen, und [TUR.GetLeader] verurteilte die Feigheit von [ENG.GetNameDef]."
 bftb_turkey.9.a:0 "Alles ist verloren, wir müssen uns vollständig den Launen von [SOV.GetNameDef] beugen."
 bftb_turkey.9.b:0 "Es hat sich nichts geändert, wir müssen unseren Kurs beibehalten."
 TUR_straits_remain_demilitarised_tt:0 "\nDie §YTürkischen Meerengen§! bleiben entmilitarisiert und wir haben keine Kontrolle über den Schiffsverkehr, der die §YTürkischen Meerengen§! passiert, bis wir uns im Krieg befinden. \n\n§RDies ist unsere letzte Chance zur Deeskalation: Wenn [SOV.GetNameDef] die Angelegenheit weiter vorantreibt, wird es zum Krieg führen!§!"
 TUR_we_remain_committed_tt:0 "\n§R[SOV.GetNameDefCap] wird eine letzte Gelegenheit haben, die Situation zu deeskalieren, aber wenn sie sich dagegen entscheiden, wird es zum Krieg führen!§!"
 bftb_turkey.10.t:0 "Die [TUR.GetAdjective] bleiben trotzig"
 bftb_turkey.10.desc:0 "Selbst angesichts der überwältigenden Machtübermacht weigert sich [TUR.GetLeader], in der Frage der [TUR.GetAdjective] Rechte an den türkischen Meerengen nachzugeben. Die Spannungen haben sich dramatisch verschärft, und entlang der gesamten [TUR.GetAdjective]-[SOV.GetAdjective] Grenze werden Truppen stationiert. [TUR.GetLeader] bezeichnete die Krise als „Schicksalsmoment für [TUR.GetNameDef]“ und versprach, dass [TUR.GetNameDef] angesichts der [SOV.GetAdjective] Tyrannei niemals kapitulieren werde."
 bftb_turkey.10.a:0 "Die türkischen Meerengen sind keinen totalen Krieg wert."
 bftb_turkey.10.b:0 "[TUR.GetNameDefCap] werden sich uns auf Knien ergeben!"
 bftb_turkey.11.t:0 "[TUR.GetNameDefCap] kapituliert vor unseren Forderungen"
 bftb_turkey.11.desc:0 "[TUR.GetLeader] wurde in Moskau herzlich empfangen und unter bewaffneter Bewachung gezwungen, einen brandneuen Vertrag zu unterzeichnen, der ihm de facto alle [TUR.GetAdjective] Rechte zur Militarisierung oder Überwachung der türkischen Meerengen aufgibt. Der [TUR.GetAdjective] Präsident wurde mit einer Pfeife von [SOV.GetLeader] als Andenken an seinen Besuch in [SOV.GetNameDef] nach Hause geschickt. \n\nDie erfolgreiche Behauptung unserer Stärke in unseren Heimatgewässern ist ein großer Sieg für uns, und unseren Streitkräften an der [TUR.GetAdjective]-Grenze wurde eine obligatorische dreitägige Feier gestattet, bei der sie so laut wie möglich sein sollen."
 bftb_turkey.11.a:0 "Die Welt sollte die Macht von [SOV.GetNameDef] fürchten."
 bftb_turkey.12.t:0 "Der [SOV.GetName] macht einen Rückzieher"
 bftb_turkey.12.desc:0 "[SOV.GetLeader] hat [TUR.GetLeader] persönlich angerufen, wo er kühl zu einer Entspannung der Lage drängte und den [TUR.GetAdjective] Präsidenten für seinen Beitrag im Kampf gegen den Imperialismus lobte. [SOV.GetAdjective] Soldaten wurde befohlen, ihre Aktionen an der [SOV.GetAdjective] Grenze zu deeskalieren und [SOV.GetNameDef] hat seine Beschwerden über [TUR.GetName]s Besetzung der türkischen Meerengen zurückgezogen. \n\nDas [TUR.GetAdjective] Volk, das nach dem brutalen Unabhängigkeitskrieg von der Idee eines großen Krieges überhaupt nicht begeistert war, stieß einen kollektiven Seufzer aus, als [TUR.GetLeader] der Nation verkündete, dass der Frieden letztendlich gesiegt habe und dass [TUR.GetAdjective] die Souveränität dank des Mutes des [TUR.GetAdjective] Volkes in dieser Zeit der Krise für immer gesichert sei."
 bftb_turkey.12.a:0 "Wir haben gewonnen!"
 bftb_turkey.13.t:0 "Der [TUR.GetAdjective]-[SOV.GetAdjective]-Krieg beginnt"
 bftb_turkey.13.desc:0 "Vor sechs Stunden begannen [SOV.GetAdjective]-Truppen mit dem Beschuss von [TUR.GetAdjective] strategischen Stützpunkten in Trabzon und verkündeten, dass sie im Rahmen eines marxistischen Kreuzzugs in [TUR.GetNameDef] einmarschieren würden, um die [TUR.GetAdjective]-Arbeiter zu befreien. Der Verräter, Şefik Hüsnü, hat bereits die Gründung einer Türkischen Volksrepublik im Exil verkündet, die ohne Zweifel auf absehbare Zeit unter der Fuchtel von [SOV.GetNameDef] bleiben wird. \n\n[TUR.GetLeader] betrat in Istanbul eine Bühne und verkündete düster, dass der Krieg nach [TUR.GetNameDef] gekommen sei. Doch der traurige Ton hielt nicht lange an, bevor der türkische Präsident seine Rhetorik änderte: Er startete eine hitzige Rede darüber, wie das [TUR.GetAdjective]-Volk vom Schicksal erneut dazu berufen sei, für seine Freiheit und Unabhängigkeit zu kämpfen. Auch wenn die Narben des Unabhängigkeitskrieges noch frisch sind, ist das Volk von [TUR.GetAdjective] in Eifer versetzt worden und eilt den Streitkräften bei. \n\nAber wie lange kann diese Begeisterung anhalten?"
 bftb_turkey.13.a:0 "... und wie lange können wir durchhalten?"
 bftb_turkey.14.t:0 "Eine Oppositionsbewegung beginnt sich zu bilden"
 bftb_turkey.14.desc:0 "[TUR.GetAdjective] Politologen gingen davon aus, dass es Wochen dauern würde, bis sich nach der Aufhebung des Parteienverbots eine legitime Oppositionsbewegung bilden würde. Doch sie haben sich alle als falsch erwiesen. Adnan Menderes hat keine Zeit verloren und eine Gruppe gleichgesinnter Traditionalisten um sich geschart, die mit der Lage des religiösen Glaubens in [TUR.GetNameDef] unter den Kemalisten unzufrieden sind. Wenn in der Vergangenheit eine [TUR.GetAdjective] politische Bewegung von religiösen Fundamentalisten gekapert wurde, wurde der gesamte Prozess des Übergangs zur Demokratie zum Erliegen gebracht. Doch nicht dieses Mal: Dieses Mal ist [TUR.GetLeader] entschlossen, diese Bewegung von Fanatikern am Wahltag an der Wahlurne zu schlagen. \n\nMenderes und seine Kabale von Fundamentalisten haben sich in der sogenannten „Traditionellen Gruppe“ zusammengeschlossen, die von der CHP als Vorläufer einer populistischen islamistischen Bewegung identifiziert wurde, die auf einem konservativen und traditionalistischen Programm kandidieren will. Die Traditionelle Gruppe wird in den kommenden Wochen in den ländlichen Regionen der Türkei Wahlkampf betreiben, um eine Unterstützerbasis aufzubauen. Sobald sie genügend irregeführte Anhänger um sich geschart hat, wird sie zweifellos ihre unvermeidliche Oppositionspartei gründen."
 bftb_turkey.14.a:0 "Bei der bevorstehenden Wahl geht es um die Seele von [TUR.GetName]."
 bftb_turkey.16.t:0 "Traditionelle Gruppe mobilisiert Landbevölkerung, um Wahlbeteiligung zu erhöhen"
 bftb_turkey.16.desc:0 "Adnan Menderes&#39; Traditionalisten sind landesweit in Scharen auf die Straße gegangen, um religiöse Bürger, die sich von der säkularen Regierung unterdrückt fühlen, dazu zu bewegen, bei den bevorstehenden Wahlen ihre Partei zu wählen. Berichten zufolge sind viele dieser Wähler zwar weiterhin skeptisch, was ihre Chancen auf einen Sieg gegen die Kemalisten angeht, und stehen der Demokratie generell zynisch gegenüber. Die Mehrheit der Angesprochenen zeigt sich jedoch begeistert von Menderes und seiner Oppositionsbewegung."
 bftb_turkey.16.a:0 "Das ist verfassungswidrig! Schluss damit!"
 bftb_turkey.16.b:0 "Der demokratische Wille des Volkes soll bekannt sein."
 bftb_turkey.17.t:0 "Menderes‘ traditionelle Gruppe sucht Bündnis mit kurdischen Organisationen"
 bftb_turkey.17.desc:0 "Adnan Menderes&#39; Traditionalisten haben eine vielbeachtete Reise nach [TUR.GetAdjective] Kurdistan unternommen, wo sie Versöhnung und gemeinsame Interessen hinsichtlich der Glaubenslage in [TUR.GetNameDef] predigten. Unter Berufung auf religiöse Schriften traten kurdische Stammesführer gemeinsam mit Vertretern der traditionalistischen Oppositionsbewegung auf die Bühne und forderten die Kurden auf, am Wahltag für Menderes und seinesgleichen zu stimmen, um „[TUR.GetNameDef] zurück in die Arme des Allmächtigen zu bringen“."
 bftb_turkey.17.a:0 "Das grenzt an Landesverrat!"
 bftb_turkey.17.b:0 "Diese Zusammenarbeit könnte in Zukunft Früchte tragen!"
 bftb_turkey.18.t:0 "Verschwörung zum Wahlbetrug in ländlichen Regionen aufgedeckt"
 bftb_turkey.18.desc:0 "Es ist ein trauriger Tag für die junge Demokratie in [TUR.GetNameDef]: In einigen der landwirtschaftlichsten Provinzen von [TUR.GetNameDef] wurde ein Komplott aufgedeckt, das die Wahlergebnisse zugunsten der Oppositionsbewegung von Adnan Menderes manipulieren sollte. Das Komplott, an dem religiöse Führer, lokale Verwaltungsbeamte und sogar Staatsangestellte beteiligt waren, wurde vereitelt und die Verschwörer festgenommen. Unsere Ermittlungen haben keine Beweise für eine Beteiligung von Menderes oder seiner Oppositionsbewegung an dem Komplott ergeben, doch unsere Reaktion wird ihren Wahlkampf mit Sicherheit beeinflussen."
 bftb_turkey.18.a:0 "Stellen Sie sie alle öffentlich vor Gericht und verhängen Sie die härteste Strafe, die möglich ist."
 bftb_turkey.18.b:0 "Wir werden stillschweigend Amnestie anbieten und hoffen, dass dies vergessen wird."
 bftb_turkey.19.t:0 "Riesige Kundgebung zur Unterstützung der Menderes-Bewegung"
 bftb_turkey.19.desc:0 "Eine von Adnan Menderes im Hinterland abgehaltene Kundgebung zog ein vergleichbares Publikum an wie die Reden von Mustafa Kemal Atatürk im Herzen Istanbuls. [TUR.GetLeader] war bestürzt, als er den Bericht über die Kundgebung hörte, die reibungslos verlaufen war und bei der Menderes ankündigte, dass seine offizielle Oppositionspartei in Kürze der Nation vorgestellt werden würde. Eine Reihe von Rednern trat auf, von denen jeder die Bedeutung der Religion im Alltag und in der Politik predigte und jeder von ihnen im Allgemeinen eine Ideologie des traditionalistischen Konservatismus vertrat – einige Redner sprachen sogar in liebevollen Worten über das lange besiegte osmanische Sultanat und Kalifat! Menderes selbst betrat als Letzter die Bühne und sprach viel gemäßigter als einige der Redner, auf die er folgte. Menderes legte seinem Publikum fröhlich die Vorzüge des Laissez-faire-Liberalismus dar und überhäufte die Kemalisten mit Lob für alles, was sie für die Nation getan hätten, um dieses Lob dann mit viel Kritik zu untergraben. Die Teilnehmer verließen die Kundgebung begeistert und zuversichtlich, die Wahl zu gewinnen. \n\nDas überzeugte kemalistische Offizierskorps wandte sich an die Regierung und forderte die CHP unmissverständlich auf, mehr zu unternehmen, um den wachsenden Einfluss von Menderes und seiner konservativ-populistischen Bewegung einzudämmen. Ein Vertreter des Offizierskorps erklärte, die Offiziere des Landes würden niemals einer Menderes-Regierung dienen, und deutete an, selbst extreme Maßnahmen zu ergreifen, falls es nicht gelinge, die ihrer Ansicht nach grundlegende Bedrohung des kemalistischen Systems einzudämmen."
 bftb_turkey.19.a:0 "Dies ist ein schwarzer Tag für die Republik."
 bftb_turkey.20.t:0 "Die Demokratische Partei"
 bftb_turkey.20.desc:0 "Vor acht Stunden verkündete Adnan Menderes triumphierend das Debüt von [TUR.GetNameDef]s neuester und gefährlichster Oppositionspartei: der Demokrat Parti. Er verkündete, die Demokrat Parti wolle das Machtmonopol der CHP stürzen und das Land in eine völlig neue Richtung lenken, wie es sie noch nie gegeben habe. Die drei Säulen der Partei wurden einer jubelnden Menge vorgestellt, wobei Menderes versprach, seine Regierung werde sich – in dieser Reihenfolge – dem Glauben, dem Vaterland und der Freiheit verpflichtet fühlen. Überraschender war Menderes&#39; Ankündigung, eine von der DP geführte [TUR.GetName] werde deutlich interventionistischer agieren als jede andere [TUR.GetAdjective]-Regierung seit der Staatsgründung. \n\nDie Ankündigung löste in kemalistischen Kreisen Empörung aus, und [TUR.GetLeader] versicherte seinen Anhängern in Istanbul heute, dass die CHP auch bei einem härteren Wahlkampf als zunächst angenommen aus der bevorstehenden Wahl weiterhin die regierende Führung des Landes hervorgehen werde."
 bftb_turkey.20.a:0 "Möge die beste Party gewinnen!"
 bftb_turkey.21.t:0 "Wahltag"
 bftb_turkey.21.desc:0 "Der lang erwartete Wahltag ist endlich da. Männer und Frauen im ganzen Land ignorierten schlechtes Wetter und persönliche Krankheiten, um zu den Wahllokalen ihrer Provinz zu gehen und ihre Stimmzettel für ihre bevorzugte Partei abzugeben. Niemand hätte mit einer so enormen Wahlbeteiligung gerechnet, insbesondere angesichts der Tatsache, dass der Übergang zur Demokratie so schnell zu erfolgen schien. Der Wahlkampf war nicht gerade sauber, aber jeder Demokratiebefürworter wäre stolz, so viele [TUR.GetAdjective]-Bürger bei [TUR.GetName]s erster freier Wahl wählen zu sehen. \n\nDas Rennen war knapp, und es dauerte eine ganze Weile, alle Stimmen auszuzählen und das Endergebnis zu ermitteln. Die endgültigen Gewinner der ersten Wahl in [TUR.GetNameDef] sind..."
 bftb_turkey.21.a:0 "...die Republikaner!"
 bftb_turkey.21.b:0 "...die Demokratische Partei!"
 TUR_republican_victory_tt:0 "Die turkemalistische Fraktion „YCHP“ soll ein demokratisches Mandat zur Regierung des Landes erhalten."
 TUR_conservative_victory_tt:0 "Die traditionsbewusste Fraktion „YDP“ soll ein demokratisches Mandat zur Regierung des Landes erhalten."
 bftb_turkey.22.t:0 "Der [TUR.GetAdjective] Bürgerkrieg"
 bftb_turkey.22.desc:0 "Nach dem Wahlsieg der Demokratischen Partei war ein Konflikt innerhalb von [TUR.GetNameDef] nahezu unvermeidlich. Die Spannungen zwischen Regierung und Armee verschärften sich seit der Wahl täglich, und nun scheint sich alles zuzuspitzen. Die Offiziere haben bereits die Kontrolle über die wohlhabendsten Staaten im Westen übernommen und genießen vermutlich die Unterstützung der Bevölkerung dieser revoltierenden Staaten. \n\nIm Osten haben kurdische Milizen begonnen, sich für einen bewaffneten Kampf zur Sicherung ihrer Unabhängigkeit zu organisieren. Wir waren Narren zu glauben, unser Bündnis mit den Kurden würde lange halten, aber sie sind noch närrischer, weil sie glaubten, wir würden ihre erbärmlichen Versuche, eine Nation aus unserem souveränen Boden zu reißen, nicht vernichten. \n\nDer Kampf um [TUR.GetNameDef]s Seele hat begonnen, und wir können es uns nicht leisten zu verlieren."
 bftb_turkey.22.a:0 "Fi sabilillah, wir kämpfen!"
 bftb_turkey.23.t:0 "Der Saadabad-Pakt"
 bftb_turkey.23.desc:0 "[TUR.GetLeader] hat [ROOT.GetLeader] mit dem Vorschlag kontaktiert, einen gegenseitigen Nichtangriffspakt zu unterzeichnen und die Aussicht auf eine künftige Zusammenarbeit offen zu lassen. Die [TUR.GetAdjective]-Diplomaten haben sich intensiv mit ihrem Angebot auseinandergesetzt und detailliert die gemeinsame Geschichte und die Interessen unserer beiden Nationen dargelegt, gefolgt von einem ernsthaften Appell zum Frieden zwischen den Bruderstaaten. Die Verhandlungen verliefen angenehm, doch die Entscheidung, ob wir unterzeichnen oder nicht, liegt letztendlich bei uns."
 bftb_turkey.23.a:0 "Natürlich werden wir diesen Freundschaftspakt unterzeichnen!"
 bftb_turkey.23.b:0 "Wir sind nicht verwandt, [TUR.GetName]: wir kennen dich nicht."
 bftb_turkey.24.t:0 "Die Wahl von Atatürks Nachfolger"
 bftb_turkey.24.desc:1 "Kein Mann und keine Frau kann jemals an die mythischen Höhen von Mustafa Kemal Atatürks Führung heranreichen, doch der „Vater der Türken“ bleibt ein sterblicher Mensch. Wir wollen unseren Ghazi nicht ersetzen, denn niemand kann auch nur im Traum daran denken, dem messianischen Gründervater unserer Nation gerecht zu werden. Wir müssen einen Führer wählen, dem wir vertrauen können, dass er in Atatürks Fußstapfen tritt. Er muss kemalistische Werte verkörpern und Atatürks Beispiel als Führer von [TUR.GetNameDef] folgen."
 bftb_turkey.24.a:1 "Celâl Bayar ist der offensichtliche Kandidat."
 bftb_turkey.24.b:0 "Celâl Bayar ist der offensichtliche Kandidat."
 bftb_turkey.24.c:0 "İsmet İnönü ist Atatürks würdiger Nachfolger."
 bftb_turkey.24.d:0 "Fevzi Çakmak ist der Anführer, den [TUR.GetNameDef] braucht."
 bftb_turkey.24.e:0 "Fevzi Çakmak wird unser ganz persönlicher Francisco Franco sein."
 bftb_turkey.24.f:0 "Recep Peker ist der Mann, der Faschismus und Kemalismus synthetisieren kann."
 bftb_turkey.24.g:0 "Das Genie von Şevket Süreyya Aydemir wird uns durchstehen."
 bftb_turkey.24.h:0 "Nur İsmet İnönü kann einen einzigartigen [TUR.GetAdjective] Sozialismus einführen."
 bftb_turkey.24.i:1 "Kâzım Orbay wird eine Militärjunta anführen, bis wir unseren Weg gefunden haben."
 bftb_turkey.24.j:0 "Äh... ähm... der... Ex-Kalif?"
 bftb_turkey.25.t:0 "[TUR.GetName] drängt auf das Hatay-Problem"
 bftb_turkey.25.desc:0 "[TUR.GetLeader] hat einen scharf formulierten Brief verfasst, in dem er fordert, dass der türkischen Bevölkerung des syrischen Staates Hatay ihr demokratisches Recht auf ein Referendum zugestanden wird, damit die Menschen in Hatay entscheiden können, ob sie sich [TUR.GetNameDef] anschließen oder auf unbestimmte Zeit Teil Syriens bleiben wollen. Unsere Kolonialpolizei hat rechtswidrige Aktivitäten an der [TUR.GetAdjective]-Grenze aufgedeckt: [TUR.GetAdjective]-Bürger sind ins Land gekommen und haben in der Provinz Hatay für Aufruhr gesorgt. Es ist klar, dass [TUR.GetNameDef] plant, das Ergebnis des Referendums zu manipulieren, um einen Sieg von [TUR.GetAdjective] sicherzustellen, aber es wäre sicherlich besser, wenn [TUR.GetNameDef] uns sympathisch wäre, als die Alternative. Wer kann sagen, wie weit [TUR.GetLeader] gehen wird, um die Integration von Hatay in [TUR.GetNameDef] zu erreichen?"
 bftb_turkey.25.a:0 "Wir werden zulassen, dass Hatay in die Hände von [TUR.GetNameDef] gerät."
 bftb_turkey.25.b:0 "Hatay soll Teil Syriens bleiben, egal was die [TUR.GetAdjective] wünschen."
 bftb_turkey.26.t:0 "[FROM.GetNameDefCap] überträgt uns die Souveränität von Hatay"
 bftb_turkey.26.desc:0 "[TUR.GetLeader] hielt in Antakya eine kleine Rede, in der er die Bürger von Hatay in [TUR.GetNameDef] willkommen hieß, und dankte [FROM.GetLeader] von [FROM.GetNameDef] für die Achtung des demokratischen Willens der Bevölkerung von Hatay. Obwohl dieser Schritt bei syrischen Beamten auf Empörung stieß, herrschte in Hatay und [TUR.GetNameDef] insgesamt Zufriedenheit, und viele [TUR.GetAdjective] Menschen reisten von zu Hause nach Hatay, um [TUR.GetNameDef]s jüngste Provinz mit Feierlichkeiten und Geschenkaustausch einzuweihen."
 bftb_turkey.26.a:0 "Wir heißen Sie wieder in unserer Herde willkommen, Brüder und Schwestern."
 bftb_turkey.27.t:0 "[FROM.GetName] behält die feste Kontrolle über Hatay"
 bftb_turkey.27.desc:0 "[TUR.GetLeader] führte eine hitzige Kundgebung in Gaziantep an, bei der er die Unterdrückung der Auslandstürken durch [FROM.GetNameDef] verurteilte. Das [TUR.GetAdjective] Volk wurde in Aufruhr versetzt, und zwischen den Unterdrückern von Hatay und den Menschen von [FROM.GetNameDef] herrscht derzeit wenig Liebe. Hatay bleibt vorerst unerreichbar für uns – doch wir werden diesen abscheulichen Verrat immer in Erinnerung behalten."
 bftb_turkey.27.a:0 "Auf die eine oder andere Weise wird Hatay dorthin befreit, wo es hingehört."
 bftb_turkey.29.t:0 "Ehemalige Kriegsdienstverweigerer melden sich freiwillig zum Dienst"
 bftb_turkey.29.desc:0 "Unsere Entscheidung, den „Vaterland zuerst“-Ansatz zu verfolgen, scheint sich ausgezahlt zu haben! Wir erleben plötzlich einen großen Zustrom von Freiwilligen aus allen Ländern, die sich unseren Streitkräften anschließen möchten. Unser Oberkommando ist nahezu überfordert. Dieser schwindelerregende Effekt hat dazu geführt, dass sich Menschen unterschiedlichster religiöser und sprachlicher Herkunft angeschlossen haben, und die Belastung auf operativer Ebene ist fast zu groß. \n\nGlücklicherweise waren wir auf diese Entwicklung zumindest teilweise vorbereitet, und die Integration all dieser ehemaligen Wehrdienstverweigerer verlief mehr oder weniger reibungslos. Unsere Berater gehen davon aus, dass wir noch eine ganze Weile mit einem Zustrom von Freiwilligen rechnen können!"
 bftb_turkey.29.a:0 "Es ist ermutigend zu sehen, wie viele tapfere Männer und Frauen kommen, um ihr Land zu verteidigen."
 bftb_turkey.30.t:0 "Entschädigung für die Oniki-Inseln"
 bftb_turkey.30.desc:0 "Die Oniki-Inseln liegen in unseren Hoheitsgewässern und galten einst als integraler Bestandteil unseres Reiches. Die Dodekanes, wie die [ENG.GetAdjective] und [GRE.GetAdjective] sie lieber nennen, werden uns wieder gehören, sobald die [ITA.GetAdjective] sie ihren rechtmäßigen Besitzern übergeben. \n\nRegierungsbeamte haben eine Liste der Angebote zusammengestellt, die wir den [ITA.GetAdjective] im Austausch für die Inseln machen können. Wir können mit Sicherheit davon ausgehen, dass sie eine Entschädigung verlangen werden – falls sie überhaupt bereit sind, nachzugeben."
 bftb_turkey.30.a:0 "Wir werden ihnen Rechte an unserem Chrom anbieten."
 bftb_turkey.30.b:0 "Wir werden eine Industrieentschädigung anbieten."
 bftb_turkey.30.c:0 "Ein Freundschaftsangebot sollte genügen."
 bftb_turkey.31.t:0 "[FROM.GetNameDefCap] bietet uns exklusive Ressourcenrechte in [342.GetName]"
 bftb_turkey.31.desc:0 "Die [FROM.GetAdjective]-Regierung hat uns ein überraschendes Angebot unterbreitet. Sie möchte uns hundertprozentig die Produktion ihrer natürlichen Erze und Metalle im Staat [342.GetName] im Austausch für die Dodekanes-Inseln überlassen. \n\nUnsere Regierung hat sich normalerweise eher auf den Erwerb von Land konzentriert, als es aufzugeben, aber [TUR.GetNameDef] bietet uns eine eigene Quelle, aus der wir Ressourcen horten können, die für jede groß angelegte Kriegsanstrengung lebenswichtig sein könnten. Wir müssen auch bedenken, dass wir im Ernstfall möglicherweise keinen Zugriff mehr auf diese Ressourcen haben werden. Die Entscheidung, ob wir das Angebot der [FROM.GetAdjective] annehmen, liegt letztendlich bei uns."
 bftb_turkey.31.a:0 "Wir akzeptieren die Rechte an Ihren Ressourcen im Austausch für die Dodekanes-Inseln."
 bftb_turkey.31.b:0 "Wir werden keinen einzigen Zentimeter Land aufgeben! Nicht jetzt, niemals!"
 bftb_turkey.32.t:0 "[FROM.GetNameDefCap] bietet uns Industriehilfe im Austausch für die Dodekanes"
 bftb_turkey.32.desc:0 "Die [FROM.GetAdjective]-Regierung hat uns ein interessantes Angebot unterbreitet. Sie hat uns ein Portfolio vorgelegt, das die historische und strategische Bedeutung der Dodekanes für [FROM.GetNameDef] darlegt, und eine Liste von Grundstücken und Produktionsanlagen erstellt, die sie uns im Tausch gegen die Inseln verkaufen möchte. \n\nUnsere Regierung hat sich normalerweise eher mit dem Erwerb von Land als mit dessen Übergabe befasst, aber es lässt sich nicht leugnen, dass die zusätzliche Industrie für die [ROOT.GetAdjective]-Kriegsmaschinerie von großem Nutzen sein könnte. Letztendlich müssen wir entscheiden, ob der zusätzliche Aufschwung unserer Industrie für unser Land unmittelbarer wertvoller ist als die Dodekanes-Inseln."
 bftb_turkey.32.a:0 "Unterschreiben Sie den Vertrag. Sie können die Inseln bekommen, wenn sie bereit sind, dafür zu zahlen."
 bftb_turkey.32.b:0 "Wir werden keinen einzigen Zentimeter Land aufgeben! Nicht jetzt, niemals!"
 bftb_turkey.33.t:0 "[FROM.GetNameDefCap] Fordert die Übertragung der Dodekanes-Inseln an"
 bftb_turkey.33.desc:0 "Die [FROM.GetAdjective]-Regierung hat uns einen ausführlichen, von [FROM.GetLeader] unterzeichneten Brief zukommen lassen, in dem die Bedeutung der Bindung zwischen unseren beiden Nationen und die natürliche Zuneigung der [FROM.GetAdjective] zu unserem Land betont werden. Trotz all des Getöses haben die [FROM.GetAdjective] angeboten, mit uns einen „Machtpakt“ zu unterzeichnen – eine ziemlich bedeutungslose Vereinbarung, aber mit einer Bedingung verbunden. Dem Freundschaftsbrief ist ein Dossier mit Anweisungen beigefügt, wie der friedliche Machtaustausch zwischen unseren Regionalgouverneuren und den [FROM.GetAdjective]-Bürokraten, die darauf warten, die Verwaltung der Dodekanes-Inseln zu übernehmen, zu handhaben ist. \n\nUnsere Regierung hat sich normalerweise eher mit dem Erwerb von Land befasst, als es abzugeben, doch die [FROM.GetAdjective] wären in einem Konflikt im Mittelmeerraum sehr nützliche Verbündete. Falls es Anlass zur Sorge gibt: Die überwiegend griechische Bevölkerung der Dodekanes-Inseln hat ihre Bestürzung über die Vorstellung geäußert, dass [FROM.GetNameDef] ihre Inselkette als Teil der [FROM.GetAdjective]-Nation annektiert. Andererseits reagierten sie ganz ähnlich, als wir ihnen nach dem Ersten Weltkrieg ihre Heimat von den Überresten des Osmanischen Reiches abrissen."
 bftb_turkey.33.a:0 "Dies sollte hoffentlich später zu einem Militärbündnis führen …"
 bftb_turkey.33.b:0 "Wir haben keine Angst davor, als Heuchler bezeichnet zu werden. Die Inseln bleiben unser!"
 bftb_turkey.34.t:0 "[FROM.GetNameDefCap] nimmt unser Angebot an!"
 bftb_turkey.34.desc:0 "Die Oniki-Inseln wurden uns von den [FROM.GetAdjective]-Behörden im Austausch für die exklusiven Rechte an den Ressourcen in [342.GetName] zurückgegeben. Obwohl Beamte hinter vorgehaltener Hand ihre Bestürzung über die eklatante Zurschaustellung von einvernehmlichem Kolonialismus in [342.GetName] zum Ausdruck brachten, wurden viele dieser Bedenken von der allgemeinen Aufregung über die Annexion von [TUR.GetNameDef]s neuester Provinz übertönt. \n\n[TUR.GetLeader] stattete Rhodos einen persönlichen Besuch ab und versicherte den lange unterdrückten Bürgern persönlich, dass all ihre Anliegen von der [TUR.GetAdjective]-Regierung gehört und berücksichtigt würden, während gleichzeitig begonnen wurde, auf der gesamten Inselkette ein neuer Lehrplan umzusetzen, der die historischen und ethnischen Wurzeln der Inseln in [TUR.GetNameDef] reißerisch darstellt."
 bftb_turkey.34.a:0 "Ein großartiger Sieg!"
 bftb_turkey.35.t:0 "[FROM.GetNameDefCap] nimmt unser Angebot an!"
 bftb_turkey.35.desc:0 "Die Oniki-Inseln wurden uns von den [FROM.GetAdjective]-Behörden im Austausch für die Früchte eines Teils unserer sich entwickelnden Industrie zurückgegeben. Obwohl Beamte hinter vorgehaltener Hand ihre Bestürzung über die Vorstellung zum Ausdruck brachten, mit Stahl und Schweiß für etwas zu bezahlen, das uns jahrhundertelang gehörte, wurden viele dieser Überlegungen von der allgemeinen Aufregung über die Annexion von [TUR.GetNameDef]s neuester Provinz übertönt. \n\n[TUR.GetLeader] stattete Rhodos einen persönlichen Besuch ab und versicherte den lange unterdrückten Bürgern persönlich, dass all ihre Anliegen von der [TUR.GetAdjective]-Regierung gehört und berücksichtigt würden, während gleichzeitig begonnen wurde, auf der gesamten Inselkette ein neuer Lehrplan umzusetzen, der die historischen und ethnischen Wurzeln der Inseln in [TUR.GetNameDef] sensationell darstellt."
 bftb_turkey.35.a:0 "Ein großartiger Sieg!"
 TUR_three_factories_sacrificed:0 "Drei „Zivilfabriken“ wurden entfernt."
 bftb_turkey.36.t:0 "[FROM.GetNameDefCap] nimmt unser Angebot an!"
 bftb_turkey.36.desc:0 "Zur Überraschung vieler [TUR.GetAdjective]-Beamter haben uns die [FROM.GetAdjective]-Behörden die Oniki-Inseln zurückgegeben. Im Gegenzug unterzeichneten sie einen Vertrag, der letztlich keine der beiden Parteien dazu zwingt, die darin enthaltenen bedeutungslosen Verpflichtungen einzuhalten. [TUR.GetLeader] stattete [FROM.GetLeader] persönlich einen Staatsbesuch ab, um den sogenannten Machtpakt mit [FROM.GetLeader] zu unterzeichnen. Beide Staatschefs versprachen, die Beziehungen zwischen den beiden Seenachbarn angesichts dieses historischen Landtauschs weiterzuentwickeln. Die Begeisterung in ganz [TUR.GetNameDef] ist ansteckend, und die Annexion von [TUR.GetNameDef]s neuester Provinz wurde ausgiebig gefeiert. \n\n[TUR.GetLeader] stattete Rhodos einen persönlichen Besuch ab und versicherte den lange unterdrückten Bürgern persönlich, dass die [TUR.GetAdjective]-Regierung all ihre Anliegen hören und sich darum kümmern würde, und das, obwohl auf der gesamten Inselkette bereits ein neuer Lehrplan eingeführt wird, der die historischen und ethnischen Wurzeln der Inseln für [TUR.GetNameDef] dramatisiert. \n\nDie [GRE.GetAdjective]-Regierung hat den reibungslosen Gebietsaustausch verurteilt und andere Großmächte aufgefordert, die ihrer Meinung nach ungerechte und illegale Verletzung der Souveränität des [GRE.GetAdjective] Volkes der Oniki-Inseln zu verurteilen. Die internationale Gemeinschaft hat sich zu dem Gebietsaustausch weitgehend bedeckt gehalten, wahrscheinlich aus Angst, die [TUR.GetAdjective]-Regierung zu verärgern."
 bftb_turkey.36.a:0 "Besser hätte es nicht laufen können."
 bftb_turkey.37.t:0 "[FROM.GetNameDefCap] lehnt unser Angebot ab!"
 bftb_turkey.37.desc:0 "Die [FROM.GetAdjective]-Regierung hat öffentlich erklärt, dass die Dodekanes-Inseln trotz der Bemühungen von [TUR.GetAdjective]-Agitatoren und Revanchisten für immer integraler Bestandteil des [FROM.GetAdjective]-Staates bleiben werden. [FROM.GetLeader] erwähnte [TUR.GetLeader] in seiner Rede namentlich und spottete, dass [TUR.GetLeader] in [TUR.GetNameDef] zwar weitgehend respektiert werde, in [FROM.GetNameDef] jedoch von den [FROM.GetAdjective]-Bürgern allgemein als inkompetenter Anführer verspottet werde. [FROM.GetLeader] bezeichnete [TUR.GetNameDef] weiterhin als gescheiterten Staat und beschrieb ausführlich, wie die bloße Existenz unserer Nation eine unverzeihliche Beleidigung für die [FROM.GetAdjective]-Nation sei. In seiner langatmigen Rede berief sich [FROM.GetLeader] nicht weniger als 37 Mal auf die unerfüllten Versprechen des Vertrags von Sèvres. \n\n[TUR.GetLeader] bezeichnete die [FROM.GetAdjective]-Lage als „unglücklich“, hoffte jedoch, dass sich zu einem späteren Zeitpunkt eine Gelegenheit für einen weiteren diplomatischen Dialog ergeben könnte."
 bftb_turkey.37.a:0 "Nun, das hätte besser laufen können."
 bftb_turkey.38.t:0 "[FROM.GetNameDefCap] schlägt gemeinsame Anstrengungen zur Rohstoffgewinnung im Kaukasus vor"
 bftb_turkey.38.desc:0 "Die [FROM.GetAdjective]-Regierung hat zugegeben, Landvermesser und Prospektoren nach Georgien geschickt zu haben, um die Erzausbeute aus unserem Bergbau zu bewerten, und ist mit einem Portfolio an uns herangetreten, das einen Weg aufzeigt, wie unsere beiden Nationen besser von einer gemeinsamen Mineraliengewinnung profitieren können. Es ist ein vielleicht beispielloses Phänomen, dass ein staatlicher Akteur eine Form der Spionage zugibt und dann versucht, dieses Geständnis in einen Plan zur Förderung engerer Beziehungen zwischen unseren beiden Nationen umzumünzen, aber genau in dieser misslichen Lage befinden wir uns jetzt. Niemand kann leugnen, dass die [FROM.GetAdjective]-Regierung nicht bereit ist, Risiken einzugehen. \n\nDas [FROM.GetAdjective]-Portfolio ist umfassend und gründlich; die [FROM.GetAdjective] würde die gefundenen Erzadern freilegen und abbauen und uns den Großteil der Beute zur Verfügung stellen, während sie einen Teil der Funde für den eigenen Gebrauch nach [354.GetName] bringen würde. Wir werden wahrscheinlich noch viele Jahre lang nicht herausfinden, was die [FROM.GetAdjective] entdeckt haben, aber wir können die uns zugesandten Pläne nutzen, um unsere Förderprozesse in Georgien zu verbessern und so eine geringere Ausbeute zu erzielen, ohne [FROM.GetAdjective] Hilfe zu benötigen. Die Entscheidung, ob wir allein arbeiten oder das Hilfsangebot der [FROM.GetAdjective] Regierung annehmen, liegt bei uns."
 bftb_turkey.38.a:0 "Lassen Sie uns gemeinsam zum gegenseitigen Nutzen arbeiten."
 bftb_turkey.38.b:0 "Sie waren Narren, als sie dachten, wir würden ihre Einmischung in unsere Grenzen akzeptieren."
 bftb_turkey.39.t:0 "[FROM.GetNameDefCap] akzeptiert unseren Vorschlag"
 bftb_turkey.39.desc:0 "[TUR.GetAdjective]-Beamte loben ihre eigene gute Arbeit, da die [FROM.GetAdjective]-Regierung uns gerade mitgeteilt hat, dass sie die Pläne für eine gemeinsame Metallgewinnung in Georgien, wie in dem komplexen Manifest, das wir ihr vorgelegt haben, dargelegt, weiterverfolgen möchte. \n\nStaatliche Prozesse werden bereits in Gang gesetzt, damit das Erz, sobald es in Georgien gefunden wird, sofort für den Transport nach [354.GetName] vorbereitet werden kann, wo es für unseren eigenen Gebrauch raffiniert werden kann."
 bftb_turkey.39.a:0 "Ein diplomatischer Triumph!"
 bftb_turkey.40.t:0 "[FROM.GetNameDefCap] lehnt unseren Vorschlag ab!"
 bftb_turkey.40.desc:0 "[FROM.GetAdjective] Beamte reagierten Berichten zufolge ungläubig auf unseren Vorschlag, mit Genehmigung der [FROM.GetAdjective]-Regierung in Georgia Bergbau zu betreiben. Unser Antrag wurde mit einem Lächeln abgetan, und was vielleicht noch beleidigender ist: Die [FROM.GetAdjective]s verwenden einige der Pläne, die wir mit unserem Portfolio eingereicht haben, um die Erze, die wir gefunden haben, ohne uns abzubauen."
 bftb_turkey.40.a:0 "Diese Bastarde!"
 bftb_turkey.41.t:0 "[FROM.GetNameDefCap] lädt uns zu [FROM.GetFactionName] ein"
 bftb_turkey.41.desc:0 "Der Präsident von [FROM.GetNameDef] [FROM.GetLeader] hat eine Initiative zur formellen Reform des Balkanpakts in eine umfassendere strategische Allianz namens Balkan-Entente angeführt. Alle Mitglieder des Balkanpakts wurden eingeladen, [FROM.GetFactionName] beizutreten, auch wir. \n\nVertreter von [FROM.GetNameDef] haben sichergestellt, dass die Beziehungen zwischen den Nationen in [FROM.GetFactionName] weit über rein militärische Angelegenheiten hinausgehen, und haben bereits Zusammenfassungen von Plänen zur gemeinsamen Entwicklung unserer Währungssysteme, unserer Verteidigungsstrategien und mehr veröffentlicht."
 bftb_turkey.41.a:0 "Gemeinsam können wir den Balkan verteidigen."
 bftb_turkey.41.b:0 "Diese Initiative ist ein tollkühner Wahn, der aus [FROM.GetAdjective] Chauvinismus hervorgegangen ist."
 bftb_turkey.42.t:0 "[FROM.GetNameDefCap] tritt [ROOT.GetFactionName] bei!"
 bftb_turkey.42.desc:0 "[FROM.GetLeader] hat bekannt gegeben, dass [FROM.GetNameDef] beschlossen hat, [ROOT.GetFactionName] zu ratifizieren und beizutreten. Es gab viel Tamtam und zwei aufeinanderfolgende Staatsfeiern, um die Schicksalsverbindung unserer beiden Nationen zu feiern, als es unweigerlich zu Konflikten kam."
 bftb_turkey.42.a:0 "Gemeinsam werden wir den Balkan retten."
 bftb_turkey.43.t:0 "[FROM.GetNameDefCap] lehnt Antrag auf Beitritt zu [ROOT.GetFactionName] ab!"
 bftb_turkey.43.desc:0 "[FROM.GetLeader] hat uns mitgeteilt, dass [FROM.GetNameDef] [ROOT.GetFactionName] nicht beitreten wird. Die Enttäuschung unserer Diplomaten und Regierungsvertreter ist grenzenlos, und [FROM.GetNameDefCap]s Austritt aus dem Balkanpakt und die Ablehnung eines [ROOT.GetFactionName] haben das gesamte Projekt gefährdet."
 bftb_turkey.43.a:0 "Solidarität hätte uns retten können, stattdessen könnte unsere Uneinigkeit uns zerstören."
 bftb_turkey.44.t:0 "Der Petra-Vorschlag"
 bftb_turkey.44.desc:0 "Wir haben von [FROM.GetNameDef] einen Verteidigungsplan erhalten, der vorschlägt, dass die [FROM.GetAdjective]-Regierung die Verantwortung für den Schutz unserer Besitztümer im Levante übernimmt. [FROM.GetLeader] argumentiert, dass die geografische Nähe von [FROM.GetNameDef] die Verteidigung und Verwaltung dieser Gebiete vereinfacht und dass die Übergabe dieser Gebiete an [FROM.GetNameDef] unsere eigenen Ressourcen freisetzen würde, die wir anderswo einsetzen könnten. \n\nDer Vorschlag ist nicht ohne Berechtigung, bringt uns aber in eine ... interessante Lage. Wir haben dem besiegten Osmanischen Reich Palästina, Jordanien und den Sinai abgenommen: Sind wir bereit, sie den [FROM.GetAdjective]-Nachfolgern des Osmanischen Reiches zurückzugeben? Abgesehen von historischen Erwägungen sollten wir auch bedenken, wie die [FROM.GetAdjective]-Regierung reagieren könnte, wenn wir sie abweisen. Sie könnte unsere Ablehnung als Zeichen dafür interpretieren, dass wir ihr nicht vertrauen oder ihren Platz in diesem Bündnis nicht wertschätzen. [FROM.GetNameDefCap] hat sich in der Vergangenheit als unberechenbar erwiesen und wir können leider nicht darauf vertrauen, dass die [FROM.GetAdjective]-Behörden diese Angelegenheit nicht eskalieren lassen, wenn wir sie ablehnen."
 bftb_turkey.44.a:0 "Der Plan ist strategisch sinnvoll!"
 bftb_turkey.44.b:0 "Der Zusammenbruch des Osmanischen Reiches hatte einen Grund."
 bftb_turkey.45.t:0 "Die [FROM.GetAdjective] geben ihre Zustimmung zum Petra-Vorschlag"
 bftb_turkey.45.desc:0 "[FROM.GetAdjective] Kolonialoffiziere verlassen bereits ihre Posten und ziehen in angrenzende Protektorate, um unsere reibungslose Übernahme der ehemaligen [FROM.GetAdjective] Kolonien zu erleichtern. [FROM.GetLeader] schrieb einen Brief an unseren Präsidenten, in dem er erklärt, dass [ROOT.GetNameDef] [FROM.GetNameDef]s volles Vertrauen in unsere Fähigkeit genießt, die uns überlassenen Provinzen zu verteidigen und zu regieren. \n\nViele [ROOT.GetAdjective] Bürger betrachten die Landübertragung als großen Sieg und als Bestätigung dafür, dass [ROOT.GetNameDef] wieder eine starke Regionalmacht ist, die weltweit respektiert wird."
 bftb_turkey.45.a:0 "Wir spielen jetzt in der großen Liga."
 bftb_turkey.46.t:0 "Die [FROM.GetAdjective] lehnen den Petra-Vorschlag ab"
 bftb_turkey.46.desc:0 "Premierminister [FROM.GetLeader] von [FROM.GetNameDef] hat erklärt, die Übergabe von [FROM.GetAdjective] Gebieten im Levante an [ROOT.GetNameDef] wäre undenkbar und warnte, dass eine fortgesetzte [FROM.GetAdjective] Regierungsführung in der Region klug sei. [FROM.GetAdjective] Streitkräfte im Levante wurden sogar in Alarmbereitschaft versetzt, um sicherzustellen, dass jeder unerwartete [ROOT.GetAdjective] Einfall in die Region schnell vereitelt werden kann. \n\nViele unserer Regierungsvertreter haben privat ihre Enttäuschung über die [FROM.GetAdjective] Entscheidung zum Ausdruck gebracht und die Ablehnung unseres Vorschlags als Beweis dafür angeführt, dass die [FROM.GetAdjective] uns als Verbündeten nicht vertrauen. [ROOT.GetLeader] hat ebenfalls seine Missbilligung der [FROM.GetAdjective] Entscheidung zum Ausdruck gebracht und Berater gebeten, Optionen für eine Reaktion vorzulegen."
 bftb_turkey.46.a:0 "Wir haben es versucht und sind gescheitert. Wir können nichts anderes tun."
 bftb_turkey.46.b:0 "Wir werden die Angelegenheit eskalieren!"
 bftb_turkey.47.t:0 "[FROM.GetNameDefCap] gibt Anlass zur Sorge hinsichtlich der Verteidigung des Golfs"
 bftb_turkey.47.desc:0 "Der Präsident von [FROM.GetNameDef] [FROM.GetLeader] hat uns kontaktiert, da er Bedenken hinsichtlich der Sicherheit unserer Kolonien im Arabischen Golf hat. Der [FROM.GetAdjective]-Führer hat vorgeschlagen, dass [FROM.GetNameDef] aufgrund der Geschichte von [FROM.GetNameDef] und seiner Nähe zu dieser Region die Verantwortung für Verteidigung und Verwaltung der gesamten Region übernehmen sollte. \n\nEinige [ROOT.GetAdjective]-Beamte haben ihre Besorgnis über den Vorschlag zum Ausdruck gebracht, da [FROM.GetNameDef] erst kürzlich die Übernahme der Kontrolle über die Levante-Region beantragt hat. Analysten befürchten, dass diese diplomatischen Landnahmen von [FROM.GetNameDef] strategisch geplant wurden, um einen neuen Status quo für die Region zu etablieren, in der [FROM.GetNameDef] die unangefochtene Macht über den gesamten Subkontinent ist. Ungeachtet künftiger Bedenken bleibt [FROM.GetNameDef] unser Verbündeter, und wenn wir möchten, dass dies auch so bleibt, wäre es vielleicht klug, ihrer Forderung nach Kontrolle über unsere arabischen Kolonien nachzugeben."
 bftb_turkey.47.a:0 "Lassen Sie uns sehen, ob [FROM.GetNameDef] für die Verantwortung bereit ist."
 bftb_turkey.47.b:0 "Dieser Neokolonialismus kann und wird nicht toleriert werden."
 bftb_turkey.48.t:0 "Die [FROM.GetAdjective] Beauftragen Sie uns mit der Verteidigung des Golfs"
 bftb_turkey.48.desc:0 "Transporte für unsere Garnisonen und Verwalter werden bereits vorbereitet, damit sie umgehend in unsere neuen Gebiete an den beiden Arabischen Golfen verschifft werden können. Die [FROM.GetAdjective] haben ihre Autorität über die Region aufgegeben und uns die Souveränität dieser Länder zum Schutz und zur Verwaltung übertragen."
 bftb_turkey.48.a:0 "Wir sind jetzt wirklich eine Großmacht."
 bftb_turkey.49.t:0 "Die [FROM.GetAdjective] verweigern uns ihre arabischen Gebiete"
 bftb_turkey.49.desc:0 "Der [FROM.GetAdjective]-Botschafter bezeichnete die [ROOT.GetAdjective]-Pläne bezüglich der [FROM.GetAdjective]-Gebiete in Arabien als „inakzeptabel“ und forderte, die Angelegenheit unverzüglich fallen zu lassen. Unsere Verteidigungsexperten sind enttäuscht, dass uns nicht das Recht zur Verwaltung der [FROM.GetAdjective] arabischen Gebiete erteilt wurde, doch [FROM.GetAdjective]-Beamte beharren darauf, dass wir, solange [ROOT.GetNameDef] Teil von [FROM.GetFactionName] bleibt, die Andock- und Stationierungsrechte in den Gebieten behalten."
 bftb_turkey.49.a:0 "Schade."
 bftb_turkey.50.t:0 "[FROM.GetNameDefCap] Fordert leichte Panzer an"
 bftb_turkey.50.desc:0 "Vertreter von [FROM.GetNameDef] haben sich mit dem erklärten Wunsch an uns gewandt, leichte Panzer aus unserem Bestand zu kaufen. Sie drückten ihre Bewunderung für das aus, was sie als „[ROOT.GetAdjective] Genie“ und „herausragende Design“ bezeichneten, und teilten uns mit, dass [FROM.GetNameDef] zur Wahrung ihrer eigenen Souveränität einfach über [ROOT.GetAdjective] Panzerung verfügen müsse."
 bftb_turkey.50.a:0 "Wir werden einige unserer Besten schicken!"
 bftb_turkey.50.b:0 "Schicken Sie einige unserer eher standardmäßigen Panzerfahrzeuge."
 bftb_turkey.50.c:0 "Möglicherweise verfügen sie über einige unserer älteren Modelle."
 bftb_turkey.50.d:0 "[FROM.GetNameDefCap] bekommt absolut nichts von uns."
 bftb_turkey.51.t:0 "[FROM.GetNameDefCap] sendet verbesserte leichte Panzer!"
 bftb_turkey.51.desc:0 "Wir haben gerade eine Lieferung von [FROM.GetAdjective]-Panzern direkt aus ihren eigenen Lagerbeständen erhalten! Die Panzerung ist modern und erste Tests haben gezeigt, dass es sich um sehr vielseitige Fahrzeuge handelt. Sie werden unseren Streitkräften zweifellos gute Dienste leisten."
 bftb_turkey.51.a:0 "Was für eine unerwartete Überraschung!"
 bftb_turkey.52.t:0 "[FROM.GetNameDefCap] Sendet leichte Panzer"
 bftb_turkey.52.desc:0 "Wir haben gerade eine Lieferung [FROM.GetAdjective]-Panzer direkt aus ihren eigenen Lagerbeständen erhalten! Die leichte Panzerung ist zwar etwas veraltet, aber unseren Qualitätstests zufolge immer noch recht robust. Sie werden unseren Streitkräften zweifellos gute Dienste leisten."
 bftb_turkey.52.a:0 "Ein großer Segen."
 bftb_turkey.53.t:0 "[FROM.GetNameDefCap] Geschenk veraltete Rüstung"
 bftb_turkey.53.desc:0 "Wir haben gerade eine Lieferung von [FROM.GetAdjective]-Panzern direkt aus ihren eigenen Lagerbeständen erhalten! Die Panzerung ist zweifellos veraltet, und die [FROM.GetAdjective]s haben das Modell aufgrund seiner vielen Mängel wahrscheinlich ausgemustert. Trotzdem werden unsere Streitkräfte eine Verwendung dafür finden ... irgendwie."
 bftb_turkey.53.a:0 "Wenn es für 1922 gut genug war, ist es auch heute gut genug!"
 bftb_turkey.54.t:0 "[FROM.GetNameDefCap] Senden Sie uns nichts"
 bftb_turkey.54.desc:0 "Die [FROM.GetAdjective]s haben sich geweigert, uns auch nur ein Chassis ihres ältesten Modells zu schicken. Die [FROM.GetAdjective]-Panzerung ist offenbar nur für den [FROM.GetAdjective]-Gebrauch bestimmt, und prominente Persönlichkeiten in [FROM.GetNameDef] haben angeblich nationale Sicherheitsbedenken als Grund dafür angeführt, uns keine Panzerung zu liefern."
 bftb_turkey.54.a:0 "Die Tanks wären wahrscheinlich sowieso kaputt gegangen."
 bftb_turkey.55.t:0 "Die Chester-Konzession"
 bftb_turkey.55.desc:0 "1923 ratifizierte und verabschiedete die neu gegründete Republik Türkei ein Gesetz, das uns die Entwicklung von [FROM.GetNameDef]s Ölfeldern und Eisenbahnen erlaubte. Der Senat der Vereinigten Staaten entschied angesichts der Auswirkungen der Weltwirtschaftskrise auf die amerikanische Wirtschaft, den Vertrag nicht zu ratifizieren. [FROM.GetNameDef] hat seine Aufhebung des Vertrags rückgängig gemacht und uns erneut aufgefordert, die Bedingungen des ursprünglich von uns ausgearbeiteten Konzessionsvertrags zu erfüllen. \n\nEs lässt sich nicht leugnen, dass wir uns heute wirtschaftlich in einer viel sichereren Lage befinden als 1923, und es wäre ein großer Vorteil, wenn [FROM.GetNameDef] ideologisch und militärisch auf unserer Seite stünde. Allerdings droht weltweit Krieg, und selbst aus unserer Position der Stärke heraus müssen wir mit unseren Ressourcen sparsam umgehen. Die Verfügbarkeit von Öl in [FROM.GetNameDef] könnte in Zukunft als Druckmittel gegen [SOV.GetNameDef] von großem Nutzen sein. Kurzfristig müssen wir jedoch auch die Möglichkeit bedenken, dass das geförderte Erdöl in die Hände unserer Feinde fallen könnte. Es wäre möglicherweise klug, [FROM.GetAdjective] Bedarf an unserer Hilfe für unsere eigenen Ziele zu nutzen. [FROM.GetNameDef] enthält viel Chrom, unser Land leider nicht. Die Entscheidung liegt bei uns."
 bftb_turkey.55.a:0 "Wir werden allen Freunden der Demokratie helfen."
 bftb_turkey.55.b:0 "Wir werden ihnen helfen ... unter Bedingungen."
 bftb_turkey.56.t:0 "[FROM.GetNameDefCap] Gewährt bedingungslos die Konzession"
 bftb_turkey.56.desc:1 "[FROM.GetNameDefCap] hat sich bereit erklärt, die Verpflichtungen, die sie uns vor über einem Jahrzehnt zugesagt haben, ohne Entschädigung zu erfüllen. Sie haben ihre überlegene Technologie und umfangreichen industriellen Ressourcen genutzt, um in [350.GetName] Erdöl zu fördern, das wir zuvor nicht zuverlässig ausgraben konnten. Die [FROM.GetAdjective]s haben uns außerdem Teile der Industrieanlagen, die sie zur Ölförderung nutzten, zur Verfügung gestellt, um andere Aspekte der Konzession zu erfüllen und diese nach eigenem Ermessen umzuwidmen. \n\nAls zusätzliches Zeichen ihrer Freundschaft haben uns die [FROM.GetAdjective]s einige der Techniken und Geräte vermacht, die sie bei der Förderung verwendeten, damit wir die natürlichen Ressourcen unseres Landes besser nutzen können."
 bftb_turkey.56.a:0 "Die [FROM.GetAdjective]s sind einfach die Besten."
 bftb_turkey.57.t:0 "Die [FROM.GetAdjective] Bedingungen für die Konzession festlegen"
 bftb_turkey.57.desc:0 "[FROM.GetNameDefCap] hat sich bereit erklärt, die Verpflichtungen zu erfüllen, die sie uns vor über einem Jahrzehnt zugesagt haben, allerdings gegen eine Entschädigung. Sie sind bereit, ihre überlegene Technologie und umfangreichen industriellen Ressourcen zu nutzen, um in [350.GetName] Erdöl zu fördern, das wir bisher nicht zuverlässig ausgraben konnten, aber im Gegenzug verlangen die [FROM.GetAdjective] exklusive Rechte an den Rechten in [343.GetName]. Um das Geschäft attraktiver zu machen, haben die [FROM.GetAdjective] ihre Bereitschaft bekundet, uns einige ihrer fortschrittlichen Fördertechniken beizubringen und uns die Baupläne für einige ihrer komplizierteren Grabungswerkzeuge zu überlassen. \n\nDie Forderung nach der Konzession hätte Demütigung genug sein sollen, doch diese hier könnte sich als unerträglich erweisen. Unsere Nation soll die Früchte des Antiimperialismus und Antikolonialismus repräsentieren, und wenn wir den Forderungen von [FROM.GetAdjective] nachkommen, verraten wir unsere Werte. Können wir es uns dennoch leisten, die Vorteile abzulehnen, die [FROM.GetNameDef] uns bieten kann?"
 bftb_turkey.57.a:0 "Gut, geben Sie den imperialistischen Bastarden, was sie wollen."
 bftb_turkey.57.b:0 "Wir werden niemals unter der Fuchtel von [FROM.GetAdjective] leben!"
 bftb_turkey.58.t:0 "[FROM.GetNameDefCap] Erfülle unsere Forderungen"
 bftb_turkey.58.desc:0 "Die [FROM.GetAdjective]-Regierung hat im Gegenzug für unsere Hilfe jede einzelne unserer Forderungen erfüllt. Das Chrom gelangt bereits aus [343.GetName] in unsere Häfen, und noch besser: Wir haben bei unseren Bemühungen, im Osten von [FROM.GetName] Öl zu fördern, tatsächlich einiges gelernt."
 bftb_turkey.58.a:0 "Es ist toll, ein [FROM.GetAdjective] zu sein."
 bftb_turkey.59.t:0 "[FROM.GetNameDefCap] Lehnen Sie unsere Forderungen ab!"
 bftb_turkey.59.desc:0 "Die [FROM.GetAdjective]-Regierung hat unsere sehr fairen Bedingungen, die wir im Gegenzug für unsere Hilfe festgelegt haben, abgelehnt. Hätte die [FROM.GetAdjective]-Regierung nur ihren gerechten Anteil beigesteuert, hätten alle als Gewinner davonkommen können. Stattdessen müssen sie einfach noch ein paar Jahre warten, bis sie jemals auf das schwarze Gold stoßen."
 bftb_turkey.59.a:0 "Wir sind [ROOT.GetNameDef], wir gehen immer noch als Gewinner nach Hause."
 bftb_turkey.60.t:0 "[FROM.GetName] drängt auf das Hatay-Problem"
 bftb_turkey.60.desc:1 "[FROM.GetLeader] hat einen scharf formulierten Brief verfasst, in dem er fordert, dass der türkischen Bevölkerung des syrischen Staates Hatay ihr demokratisches Recht auf ein Referendum zugestanden wird, damit die Menschen in Hatay entscheiden können, ob sie sich [FROM.GetNameDef] anschließen oder auf unbestimmte Zeit Teil von [ROOT.GetNameDef] bleiben wollen. Unsere Streitkräfte haben rechtswidrige Aktivitäten an der Grenze zwischen [ROOT.GetAdjective] und [FROM.GetAdjective] festgestellt: Staatsangehörige von [FROM.GetAdjective] haben unsere Grenze überschritten und in der Provinz Hatay für Aufruhr gesorgt. Es ist klar, dass [FROM.GetNameDef] das Ergebnis des Referendums manipulieren will, um einen [FROM.GetAdjective] Sieg sicherzustellen, aber vielleicht ist es am klügsten, die Provinz Hatay einfach an [FROM.GetNameDef] abzutreten. Ein kriegerischer [FROM.GetNameDef] an unserer Grenze ist kein Idealszenario."
 bftb_turkey.60.a:0 "Welche Wahl haben wir?"
 bftb_turkey.60.b:0 "Wenn sie Hatay wollen, können sie kommen und es auf die harte Tour nehmen."
 bftb_turkey.61.t:0 "[FROM.GetNameDef] überträgt uns die Souveränität von Hatay"
 bftb_turkey.61.desc:0 "[ROOT.GetLeader] hielt in Antakya eine kleine Rede, in der er die Bürger von Hatay in [ROOT.GetNameDef] willkommen hieß, und dankte [FROM.GetLeader] von [FROM.GetNameDef] dafür, dass er den demokratischen Willen der Bevölkerung von Hatay respektiert. Obwohl dieser Schritt bei vielen syrischen Beamten aus dem gesamten politischen Spektrum auf Empörung stieß, war die allgemeine Stimmung in Hatay und [ROOT.GetNameDef] insgesamt von Zufriedenheit geprägt, und viele [ROOT.GetAdjective] Menschen reisten von zu Hause nach Hatay, um [ROOT.GetNameDef]s jüngste Provinz mit Feierlichkeiten und Geschenkaustausch einzuweihen. [FROM.GetLeader] hat sich zu diesem Thema nicht geäußert, aber Quellen aus dem Umfeld des [FROM.GetAdjective]-Führers sagen, dass [FROM.GetAdjective] glaubt, dass dies nur ein vorübergehender Zustand ist und dass Hatay in Zukunft auf die eine oder andere Weise wieder in ihre Hände fallen wird."
 bftb_turkey.61.a:0 "Wir heißen Sie wieder in unserer Herde willkommen, Brüder und Schwestern."
 bftb_turkey.62.t:0 "[FROM.GetName] behält die feste Kontrolle über Hatay"
 bftb_turkey.62.desc:0 "[ROOT.GetLeader] führte eine hitzige Kundgebung in Gaziantep an, bei der er die Unterdrückung der Türken im Ausland durch [FROM.GetNameDef] verurteilte. Das [ROOT.GetAdjective] Volk wurde in Aufruhr versetzt, und Berater berichten, dass in der [ROOT.GetAdjective] Bevölkerung eine gewisse Begeisterung dafür herrsche, Krieg als Mittel zur Beseitigung dieser ungerechten Zustände einzusetzen. Dass [FROM.GetNameDef] glaubte, sich unserem Willen widersetzen zu können, war blanker Unsinn – [ROOT.GetNameDef] wird sich niemals von niederen Mächten einschüchtern lassen."
 bftb_turkey.62.a:0 "[FROM.GetNameDef] muss untergehen."
 bftb_turkey.63.t:0 "[FROM.GetNameDefCap] lädt uns zu [FROM.GetFactionName] ein"
 bftb_turkey.63.desc:0 "[FROM.GetLeader] traf sich neulich mit [ROOT.GetLeader], um ein umfassendes panmediterranes Bündnis mit einer gemeinsamen Haltung in Krisen auszuhandeln, die ein militärisches Eingreifen erfordern. Es gibt das Argument, dass eine freiwillige Allianz mit [FROM.GetNameDef] unseren regionalen Zielen mehr Legitimität verleihen könnte, auch wenn wir dafür auf die Unterstützung größerer Mächte verzichten müssten. Wir sollten auch bedenken, dass [FROM.GetNameDef] im Gegensatz zu uns einen recht guten Ruf bei den Balkan- und Mittelmeerstaaten genießt. Sie könnten diesen guten Ruf nutzen, um auf diplomatischem Wege die Unterstützung von Nationen zu gewinnen, die sonst vielleicht nichts mit uns zu tun haben wollen. \n\nWir stehen an einem Scheideweg: Nutzen wir den Olivenzweig, den [FROM.GetNameDef] uns entgegenstreckt, und schärfen wir mit ihrer Feder unser Schwert gegen andere Großmächte, oder sollen wir den verachtenswerten Germanen die Hand reichen und all diese kleineren Mächte, die nach uns greifen, niedermähen wie Unkraut im Garten? Wir allein haben die Macht, über das Schicksal der Balkanstaaten zu entscheiden – wir können sie vor der Hegemonie von [GER.GetAdjective] und [SOV.GetAdjective] retten, oder wir können diesen Mächten beistehen und den Untergang unserer Nachbarn beschleunigen. Die Entscheidung liegt bei uns."
 bftb_turkey.63.a:0 "Wir können uns immer noch rehabilitieren, indem wir die anderen retten."
 bftb_turkey.63.b:0 "Diese Welt ist kalt und gnadenlos, und wir sind es auch."
 bftb_turkey.64.t:0 "[FROM.GetNameDefCap] tritt [ROOT.GetFactionName] bei"
 bftb_turkey.64.desc:0 "[FROM.GetLeader] verkündete seiner Nation in einer gewaltigen Zeremonie mit viel Tamtam, dass [FROM.GetNameDef]s Seele und Schicksal nun mit [ROOT.GetNameDef] geteilt würden. [ROOT.GetLeader] verkündete im Wesentlichen dasselbe, jedoch in weitaus gemäßigteren Worten. \n\nDie Beamten von [ROOT.GetAdjective] hoffen, dass durch die Annäherung von [FROM.GetNameDef] ihre expansionistischen Tendenzen eingedämmt werden können und ihr Status als Großmacht stattdessen dazu genutzt werden kann, die kleineren Nationen des Mittelmeerraums vor Hegemonien zu schützen, die versuchen würden, sie vollständig zu verschlingen."
 bftb_turkey.64.a:0 "Wir müssen uns beeilen, die anderen Nationen in diesen Pakt einzubeziehen."
 bftb_turkey.65.t:0 "[FROM.GetNameDefCap] lehnt die Mitgliedschaft in [ROOT.GetFactionName] ab"
 bftb_turkey.65.desc:0 "Wir haben die Nachricht erhalten, dass [FROM.GetNameDef] [ROOT.GetFactionName] nicht beitreten wird. [ROOT.GetAdjective]-Beamte sind enttäuscht und mehr als nur ein wenig besorgt darüber, was dies für die Zukunft des Mittelmeerraums bedeuten könnte. [ROOT.GetLeader] hat Regierungsvertreter privat aufgefordert, den Prozess der Aufnahme weiterer Mitglieder in die Allianz zu beschleunigen, damit ein gewaltiger Block gebildet werden kann, der einem möglichen [FROM.GetAdjective] Irredentismus entgegenwirken kann."
 bftb_turkey.65.a:0 "Wir müssen uns beeilen, die anderen Nationen in diesen Pakt einzubeziehen."
 bftb_turkey.66.t:0 "[FROM.GetNameDefCap] schlägt Plan zur Aufteilung von [GRE.GetNameDef] vor"
 bftb_turkey.66.desc:0 "[FROM.GetNameDefCap] hat vorgeschlagen, dass die Regionen [GRE.GetNameDef] aus Gründen der nationalen Sicherheit zerstört werden müssen, auch wenn dieses Vorgehen bedauerlich ist. Unsere Beamten haben sich der Meinung unserer [FROM.GetAdjective] Verbündeten begeistert und vorbehaltlos angeschlossen und sie daran erinnert, dass dies von Anfang an unsere offizielle Position gewesen sei. \n\n[FROM.GetNameDefCap] schlägt vor, [GRE.GetNameDef] nach geografischen Gesichtspunkten aufzuteilen: Uns würden [185.GetName], die [186.GetName] und [182.GetName] sichergestellt und so unsere Vorherrschaft über das östliche Mittelmeer und das Ionische Meer gesichert. [FROM.GetNameDefCap] würde die verbleibenden [GRE.GetAdjective] Staaten übernehmen, was die [FROM.GetAdjective] Kontrolle über die Ägäis garantieren würde, an die viele ihrer Staaten bereits grenzen. \n\nDas Abkommen ist größtenteils fair – zumindest fairer, als wir es bei einem Landraub nach dem Zufallsprinzip erwarten würden. Dennoch träumen wir schon lange davon, [47.Capital.GetName] als Kronjuwel unseres Imperiums hinzuzufügen, und dieser Plan würde diesem Wunsch auf absehbare Zeit ein Ende setzen. Sind wir bereit, den Preis von [47.Capital.GetName] für den Frieden im Mittelmeerraum aufzugeben?"
 bftb_turkey.66.a:0 "Eine faire und akzeptable Vereinbarung über die Zukunft von [GRE.GetNameDef]."
 bftb_turkey.66.b:0 "Wir müssen alles haben!"
 bftb_turkey.67.t:0 "Der Golden Square Coup"
 bftb_turkey.67.desc:0 "Schockierende Nachrichten aus [676.GetName]: Der ehemalige Premierminister Rashid Ali al-Gaylani hat versucht, einen Staatsstreich gegen die Regierung von [ROOT.GetLeader] zu initiieren. Al-Gaylani genießt die Unterstützung eines Großteils des Militärs und sogar einiger Bevölkerungsgruppen. \n\nEs wird stark angenommen, dass ausländische Einmischung eine entscheidende Rolle bei der Organisation und Waffenlieferung an die Verräter des Goldenen Quadrats gespielt hat. Von allen möglicherweise beteiligten staatlichen Akteuren wird angenommen, dass [FROM.GetNameDef] den faschistischen Putschversuch am stärksten unterstützt hat. \n\nDas Goldene Quadrat vertritt entschieden das Ziel, die [ENG.GetAdjective]-Imperialisten mit Gewalt zu stürzen, indem es die Hilfe von [GER.GetNameDef] in Anspruch nimmt, und viele unserer Leute halten dies für eine sehr lobenswerte Position in dieser Angelegenheit. Vielleicht ist ein freies Arabien nur durch Faschismus erreichbar..."
 bftb_turkey.67.a:0 "Mashallah, wir kämpfen für die Seele des Irak gegen den Faschismus!"
 bftb_turkey.67.b:0 "Nur durch den Faschismus ist unsere Befreiung möglich."
 bftb_turkey.67.c:0 "Vertreibt das faschistische Ungeziefer."
 bftb_turkey.68.t:0 "Der [IRQ.GetAdjective] Bürgerkrieg beginnt"
 bftb_turkey.68.desc:0 "Unsere Bemühungen, in [IRQ.GetNameDef] einen faschistischen Putsch anzuzetteln, scheinen sich gelohnt zu haben. Die [IRQ.GetAdjective]-Faschisten kämpfen nun mit der ehemaligen Regierung um die Kontrolle über das ganze Land, und ob wir nun gewinnen oder verlieren, werden wir in einer hervorragenden Position sein, um unsere feste Kontrolle über die Region zu etablieren."
 bftb_turkey.68.a:0 "Im Moment sitzen wir da und warten."
 bftb_turkey.69.t:0 "Die [IRQ.GetAdjective] Faschisten siegen"
 bftb_turkey.69.desc:0 "Die [IRQ.GetAdjective]-Faschisten haben die letzten [IRQ.GetAdjective]-Loyalisten-Gruppen wie erwartet vernichtend besiegt. Sie werden zu schwach sein, um uns Widerstand zu leisten, wenn wir einmarschieren und die Kontrolle über ihren Staatsapparat übernehmen."
 bftb_turkey.69.a:0 "Wie herrlich machiavellistisch!"
 bftb_turkey.70.t:0 "Die [IRQ.GetAdjective]-Faschisten scheitern"
 bftb_turkey.70.desc:0 "Den [IRQ.GetAdjective]-Faschisten ist es nicht gelungen, die [IRQ.GetAdjective]-Loyalisten zu vertreiben. Stattdessen wurden sie von der [IRQ.GetAdjective]-Armee vernichtend geschlagen. Das ist ein absoluter Skandal, doch wie geplant glauben unsere Strategen, dass [IRQ.GetNameDef] nun zu schwach sein wird, um uns Widerstand zu leisten, wenn unsere Streitkräfte einmarschieren und die Kontrolle über ihren Staatsapparat übernehmen."
 bftb_turkey.70.a:0 "Das Spiel war von Anfang an manipuliert."
 bftb_turkey.71.t:0 "Die [IRQ.GetAdjective]-Faschisten übernehmen die Kontrolle in [IRQ.GetNameDef]"
 bftb_turkey.71.desc:0 "Die [IRQ.GetAdjective] Faschisten haben die ehemalige Regierung erfolgreich gestürzt und die Kontrolle über das ganze Land übernommen. Die [IRQ.GetAdjective] Faschisten haben deutlich gemacht, dass eines ihrer Hauptziele darin besteht, Arabien um jeden Preis von [ENG.GetAdjective] Einfluss zu befreien, und sie glauben, dass eine [ROOT.GetAdjective] Intervention der beste Weg ist, dies zu erreichen."
 bftb_turkey.71.a:0 "[IRQ.GetName]? Das ist kaum unser Problem."
 bftb_turkey.71.b:0 "Sie erhalten unsere volle Unterstützung."
 bftb_turkey.71.c:0 "Sie haben bewiesen, dass sie [ROOT.GetFactionName]-würdig sind."
 bftb_turkey.72.t:0 "[FROM.GetNameDefCap] Unterstützt uns!"
 bftb_turkey.72.desc:0 "Die [FROM.GetAdjective]s haben beschlossen, ihre Unterstützung für unsere Regierung zu erklären. Solche Erklärungen sind unglaublich wichtig, um unsere Souveränität zu etablieren und unsere Rolle als eine Nation zu legitimieren, die den [ENG.GetAdjective] Imperialismus grundsätzlich ablehnt."
 bftb_turkey.72.a:0 "Ihr Mut ist lobenswert und wird geschätzt!"
 bftb_turkey.73.t:0 "Die [IRQ.GetAdjective]-Faschisten übernehmen die Kontrolle in [IRQ.GetNameDef]"
 bftb_turkey.73.desc:0 "Die [IRQ.GetAdjective] Faschisten haben die ehemalige Regierung erfolgreich gestürzt und die Kontrolle über das ganze Land übernommen. Die [IRQ.GetAdjective] Faschisten haben deutlich gemacht, dass eines ihrer Hauptziele darin besteht, Arabien um jeden Preis von [ENG.GetAdjective] Einfluss zu befreien, und sie glauben, dass eine [ROOT.GetAdjective] Intervention der beste Weg ist, dies zu erreichen."
 bftb_turkey.73.a:0 "[IRQ.GetName] ist unserer Aufmerksamkeit nicht würdig."
 bftb_turkey.73.b:0 "Nun ja, wir haben uns selbst zum Schwert des Islam erklärt."
 bftb_turkey.74.t:0 "[FROM.GetNameDefCap] Unterstützt uns!"
 bftb_turkey.74.desc:0 "Die [FROM.GetAdjective]s haben beschlossen, ihre Unterstützung für unsere Regierung zu erklären. Solche Erklärungen sind unglaublich wichtig, um unsere Souveränität zu etablieren und unsere Rolle als eine Nation zu legitimieren, die den [ENG.GetAdjective] Imperialismus grundsätzlich ablehnt."
 bftb_turkey.74.a:0 "Mit den [ITA.GetAdjective]s auf unserer Seite können wir nicht scheitern!"
 bftb_turkey.75.t:0 "Die [IRQ.GetAdjective] verstaatlichen ihr Öl!"
 bftb_turkey.75.desc:0 "Schockierende Neuigkeiten aus [IRQ.GetNameDef]: [ROOT.GetAdjective] Beamte, die die Ölreserven des Landes verwalten, wurden unter bewaffneter Bewachung an die [IRQ.GetAdjective] Grenzen eskortiert und vertrieben! Ebenso beunruhigend ist das Gerücht, dass die neue [IRQ.GetAdjective] Regierung plant, eine [GER.GetAdjective] Militärpräsenz auf ihr Territorium einzuladen. \n\nAls ob das nicht genug wäre, deuten Geheimdienstinformationen auch darauf hin, dass dies alles von [FROM.GetNameDef] mit dem Ziel geplant wurde, den [GER.GetFactionName] zu helfen! Wir müssen entscheiden, wie wir weiter vorgehen: Die [IRQ.GetAdjective] könnten eine neutralere Haltung einnehmen, wenn wir ihre Entscheidung respektieren, das Öl zu beschlagnahmen, aber andererseits müssen wir entscheiden, ob wir es uns leisten können, dass das Öl in die Hände von [GER.GetAdjective] gelangt."
 bftb_turkey.75.a:0 "Sie sind Mitwächter der heiligen Flamme."
 bftb_turkey.75.b:0 "Dieses Öl darf nicht in die Hände von Faschisten fallen!"
 bftb_turkey.75.c:0 "Das Gottesgnadentum der Könige muss geschützt werden."
 bftb_turkey.75.d:0 "Es hätte nie anders enden können."
 bftb_turkey.75.e:0 "Und das ist auch ihr Recht als souveräne Nation."
 bftb_turkey.76.t:0 "Das [ENG.GetAdjective] Ergebt euch uns!"
 bftb_turkey.76.desc:0 "Die [FROM.GetAdjective] haben uns die gesamte Kontrolle über unsere Ölfelder überlassen. Unsere Souveränität gehört uns: Wir haben die Imperialisten mit ihren eigenen Waffen geschlagen!"
 bftb_turkey.76.a:0 "Allahu Akbar, Ehre sei [ROOT.GetLeader]!"
 bftb_turkey.77.t:0 "Die Anglo-[GER.GetAdjective] Alliance"
 bftb_turkey.77.desc:0 "Wir sind einer schrecklichen und grausamen Wendung des Schicksals ausgesetzt: Die [ENG.GetAdjective] und die [GER.GetAdjective]s haben sich verbündet! Wir brauchten diese entscheidende [GER.GetFactionName]-Unterstützung, aber die perfiden [ENG.GetAdjective]-Hunde sind uns zuvorgekommen! \n\nDas ist wahrlich ein schwarzer Tag in der [ROOT.GetAdjective]-Geschichte. Wir stehen allein da, und niemand steht hinter uns außer den [TUR.GetAdjective] – die mit ziemlicher Sicherheit vor einem gemeinsamen [ENG.GetAdjective]-[GER.GetAdjective]-Angriff zurückschrecken werden. Können wir ihnen das überhaupt verdenken? Wer würde sich bei klarem Verstand einem so mächtigen Duo entgegenstellen? Sollten wir es überhaupt versuchen?"
 bftb_turkey.77.a:0 "Inschallah werden die Europäer vor dem Schwert fallen."
 bftb_turkey.77.b:0 "In was für einer verrückten Welt leben wir?"
 bftb_turkey.79.t:0 "[FROM.GetNameDefCap] fordert Erneuerung des Nichtangriffspakts"
 bftb_turkey.79.desc:0 "Wir pflegten historisch sehr freundschaftliche Beziehungen zu [FROM.GetNameDef], da wir uns als gleichgesinnte Antiimperialisten betrachteten. In den letzten Jahren sind die Beziehungen jedoch frostiger geworden. \n\nUm die Beziehungen zwischen unseren beiden Ländern wieder zu entspannen, hat [FROM.GetLeader] eine Erneuerung des brachliegenden Nichtangriffspakts vorgeschlagen, den wir vor so vielen Jahren unterzeichnet haben. Wir sollten dieses Friedensangebot als Zeichen dafür sehen, dass [FROM.GetNameDef] in naher Zukunft für eine engere Zusammenarbeit offen sein könnte. Allerdings hat [ROOT.GetLeader] auch keinen Hehl aus seinem Verlangen nach den türkischen Meerengen gemacht. Wir müssen entscheiden, was die bessere Option ist: ein williger [FROM.GetAdjective] Verbündeter oder ein [FROM.GetAdjective] Vasall."
 bftb_turkey.79.a:0 "Freundliche Beziehungen mit [FROM.GetNameDef] können nur positive Ergebnisse bringen."
 bftb_turkey.79.b:0 "Leider haben wir neue Pläne für sie."
 bftb_turkey.80.t:0 "Die [FROM.GetAdjective]s vereinbaren die Erneuerung des Nichtangriffspakts"
 bftb_turkey.80.desc:0 "Wir freuen uns, positive Nachrichten aus [FROM.GetNameDef] verkünden zu können. Wir haben erfahren, dass die [FROM.GetAdjective]-Reaktion auf unseren Vorschlag eines erneuerten Nichtangriffspakts sehr enthusiastisch ausgefallen ist. Unsere Beamten sind überzeugt, dass wir die letzten Details des Abkommens noch vor Ende der Woche klären können."
 bftb_turkey.80.a:0 "Ein großer Tag für den Frieden."
 bftb_turkey.81.t:0 "Die [FROM.GetAdjective]s lehnen den Plan zur Erneuerung des Nichtangriffspakts ab"
 bftb_turkey.81.desc:0 "Wir haben die Nachricht erhalten, dass [FROM.GetNameDef] nicht die Absicht hat, unseren alten Nichtangriffspakt zu erneuern. Im Gegenteil, [FROM.GetAdjective]-Beamte haben unseren vorherigen Vertrag bereits annulliert, was jegliche Illusion völlig zerstreut, dass die Beziehungen zwischen uns und [FROM.GetNameDef] in den kommenden Jahren alles andere als herzlich sein werden."
 bftb_turkey.81.a:0 "Das kann nur etwas Schreckliches bedeuten."
 bftb_turkey.82.t:0 "Das Verbot der türkischen kommunistischen Partei wird aufgehoben"
 bftb_turkey.82.desc:0 "Die im Exil lebenden Funktionäre der Türkischen Kommunistischen Partei wurden in ihrer Heimat [ROOT.GetNameDef] willkommen geheißen und von [ROOT.GetLeader] von allen gegen sie erhobenen Vorwürfen freigesprochen. Die TKP-Funktionäre wurden von einigen Regierungsmitgliedern herzlich willkommen geheißen, von den eher orthodoxen kemalistischen Regierungsmitgliedern jedoch gemieden. \n\nObwohl [ROOT.GetLeader] keinen der ehemaligen Exilfunktionäre persönlich willkommen hieß, wurde eine offene Einladung ausgesprochen, als Regierungsmitglieder mitzuarbeiten. Ob TKP-Funktionäre weiterhin im Kabinett der Regierung dienen, entscheidet letztendlich die Regierung selbst."
 bftb_turkey.82.a:0 "Es ist uns eigentlich egal, was sie tun."
 bftb_turkey.83.t:0 "Die Rückkehr der türkischen Kommunistischen Partei"
 bftb_turkey.83.desc:0 "Die im Exil lebenden Funktionäre der Türkischen Kommunistischen Partei wurden in ihrer Heimat [ROOT.GetNameDef] willkommen geheißen und [ROOT.GetLeader] erließ sämtliche gegen sie erhobenen Anklagen. Die Parteifunktionäre der TKP wurden von einigen Regierungsmitgliedern herzlich willkommen geheißen, von den eher orthodoxen kemalistischen Regierungsmitgliedern jedoch gemieden. \n\nBei einer offiziellen Willkommensfeier auf Einladung von [ROOT.GetLeader] kam es zum unerwarteten Putsch. Şefik Hüsnü betrat die Bühne und verkündete die Auflösung des bürgerlichen und revisionistischen kemalistischen Regimes zugunsten eines Regierungsstils, der eher dem in Moskau verwendeten System ähnelt. Innerhalb weniger Stunden wurden im ganzen Land kemalistische Funktionäre und Offiziere zusammengetrieben und verhaftet, und wenn man Berichten Glauben schenken darf, waren während des gesamten Vorgangs [SOV.GetAdjective] Täter involviert."
 bftb_turkey.83.a:0 "Warte eine Minute –"
 bftb_turkey.84.t:0 "[FROM.GetNameDefCap] fordert unsere Unterwürfigkeit"
 bftb_turkey.84.desc:0 "Die Höllenschlangen in [FROM.GetNameDef] haben uns einseitig aufgefordert, unsere Truppen zu entwaffnen und die Anwesenheit von [FROM.GetAdjective] Soldaten auf unserem Territorium zuzulassen, damit sie „die Sicherheit und die Rechte der [ROOT.GetAdjective] Arbeiter gewährleisten“ können. Das Motiv hinter diesen lächerlichen Forderungen ist klar: [FROM.GetNameDef] strebt die vollständige Kontrolle über unsere Angelegenheiten und unsere Souveränität an. \n\nWir sind keine mittelmäßige Macht ohne Bedeutung in der Weltpolitik, wir sind [ROOT.GetNameDef]! Wir können es nicht zulassen, dass uns eine offensichtlich böswillige Macht, die in uns nichts weiter als ein Opfer auf Abruf sieht, so herumschubst. Wir müssen uns nach Verbündeten umsehen; es muss doch mindestens ein Land geben, das uns gegen die [FROM.GetAdjective] Kriegstreiberei beisteht! Andererseits: Ist der mögliche Verlust an [ROOT.GetAdjective] Menschenleben das Risiko wirklich wert?"
 bftb_turkey.84.a:0 "[SOV.GetNameDefCap] wird diese Angelegenheit fair vermitteln."
 bftb_turkey.84.b:0 "Wir stimmen demokratisch ab ... um andere um Hilfe zu bitten!"
 bftb_turkey.84.c:0 "Sicherlich wird uns jemand vor diesem marxistischen Abschaum retten!"
 bftb_turkey.84.d:0 "Unsere Freunde sollen für unsere Sicherheit sorgen."
 bftb_turkey.84.e:0 "[ROOT.GetAdjective] Leben kommen vor allem anderen."
 bftb_turkey.85.t:0 "[FROM.GetNameDefCap] sucht Vermittlung gegen [TUR.GetNameDefCap]-Aggression"
 bftb_turkey.85.desc:0 "Beamte von [FROM.GetNameDefCap] haben sich an uns gewandt, in der Hoffnung, dass wir ihnen angesichts der [TUR.GetAdjective]-Aggression Schutz bieten. [FROM.GetAdjective] haben ein ziemlich ausführliches Portfolio vorgelegt, in dem sie erklären, warum der Verlust von [FROM.GetNameDef] an die Einflusssphäre von [TUR.GetAdjective] dem kontinentalen Gleichgewicht sehr schaden würde, und haben ihr Recht auf Selbstverwaltung leidenschaftlich verteidigt, in der Hoffnung, dass wir uns entscheiden, ihnen Hilfe anzubieten."
 bftb_turkey.85.a:0 "[TUR.GetNameDefCap] versucht, den Kommunismus zu monopolisieren!"
 bftb_turkey.85.b:0 "[TUR.GetNameDefCap] gefährdet das kontinentale Gleichgewicht!"
 bftb_turkey.85.c:0 "Man darf nicht zulassen, dass die Roten Amok laufen."
 bftb_turkey.85.d:0 "[FROM.GetAdjective] Konflikte sind nicht unser Anliegen."
 bftb_turkey.86.t:0 "[FROM.GetNameDefCap] garantiert unsere Unabhängigkeit"
 bftb_turkey.86.desc:0 "Wir haben die Nachricht erhalten, dass [FROM.GetNameDef] beabsichtigt, unsere Unabhängigkeit angesichts der Aggression von [TUR.GetAdjective] zu garantieren. Dies ist ein großer diplomatischer Sieg für uns und wird [TUR.GetNameDef] hoffentlich dazu bewegen, die ungeheuerlichen Forderungen, die sie an uns gestellt haben, zu überdenken."
 bftb_turkey.86.a:0 "Wahre Freunde von [ROOT.GetNameDef]."
 bftb_turkey.87.t:0 "[BUL.GetNameDefCap] erhält externe Unterstützung"
 bftb_turkey.87.desc:0 "Die heimtückischen [BUL.GetAdjective] haben andere gefunden, die sie in ihrem zum Scheitern verurteilten Streben nach Unabhängigkeit unterstützen! Diese Komplikation wollten wir unbedingt vermeiden. Wir müssen entscheiden, ob wir bereit sind, weiterzumachen und unsere Forderungen mit Gewalt durchzusetzen, oder ob es an der Zeit ist, zurückzutreten und einen größeren Krieg zu verhindern."
 bftb_turkey.87.a:0 "Wir machen trotzdem weiter."
 bftb_turkey.87.b:0 "Das ist ein schmerzlicher Rückschlag."
 bftb_turkey.88.t:0 "[FROM.GetNameDefCap] macht einen Rückzieher!"
 bftb_turkey.88.desc:0 "Jubel könnte man als Ausdruck der allgemeinen Stimmung in unserer Regierung bezeichnen, nachdem wir gerade erfahren haben, dass Regierung und Streitkräfte einen Rückzieher gemacht haben und nun zur Deeskalation drängen. Dies ist ein enormer Sieg sowohl für den Staat als auch für das Volk."
 bftb_turkey.88.a:0 "Wir sind siegreich!"
 bftb_turkey.89.t:0 "Wir erhalten von keiner Nation Unterstützung"
 bftb_turkey.89.desc:0 "[ROOT.GetLeader] ist untröstlich, nachdem er die schreckliche Nachricht gehört hat, dass kein einziges Land [ROOT.GetNameDef] gegen die [TUR.GetAdjective]-Aggression unterstützen wird. Die gleichgültige Haltung anderer Mächte stellt uns vor ein schreckliches Ultimatum: Stehenbleiben und kämpfen oder aufgeben und Leben retten."
 bftb_turkey.89.a:0 "Wir haben keine Wahl, wir müssen uns ergeben."
 bftb_turkey.89.b:0 "Wir werden nicht kampflos aufgeben!"
 bftb_turkey.90.t:0 "[BUL.GetNameDefCap] ergibt sich uns"
 bftb_turkey.90.desc:0 "Wir sind der weltweiten Revolution einen Schritt näher gekommen: Die [FROM.GetAdjective] Behörden sind zurückgetreten und haben die Macht einer neuen Kabale kommunistischer Minister übertragen, die von unseren eigenen Parteifunktionären persönlich ausgewählt wurden, um [FROM.GetNameDef] zu führen. Die Kontrolle über die [FROM.GetAdjective] Armeen und die Industrie verschafft uns eine noch größere Machtposition in der Region und in Europa."
 bftb_turkey.90.a:0 "Ihre Befreiung ist nun abgeschlossen."
 bftb_turkey.91.t:0 "[BUL.GetNameDefCap] bleibt trotzig"
 bftb_turkey.91.desc:0 "Wir haben die unerwartete Meldung erhalten, dass [FROM.GetNameDef] sich unseren durchaus berechtigten Forderungen widersetzt. Die [FROM.GetAdjective]-Regierung hätte den Weg des geringsten Widerstands wählen können, stattdessen hat sie sich für den Weg des Schmerzes entschieden."
 bftb_turkey.91.a:0 "Dann werden wir sie demütigen."
 bftb_turkey.92.t:0 "[FROM.GetName] unterzeichnet den Saadabad-Pakt"
 bftb_turkey.92.desc:0 "[FROM.GetLeader] war begeistert, als ihnen unsere Vorschläge für einen Freundschaftsvertrag und einen Nichtangriffspakt vorgelegt wurden, und meldete sich umgehend mit ihrer Unterschrift unter unseren Vertrag bei uns. Mit ihrer Zustimmung sind wir dem Frieden im Inland und dem Frieden in der Welt einen Schritt näher gekommen!"
 bftb_turkey.92.a:0 "Du wirst [ROOT.GetNameDef] immer ein lieber Freund sein."
 bftb_turkey.93.t:0 "[FROM.GetName] lehnt den Saadabad-Pakt ab!"
 bftb_turkey.93.desc:0 "[FROM.GetLeader] schrieb einen langatmigen Brief an [ROOT.GetLeader], in dem er diesen darüber informierte, dass das Angebot eines Freundschaftsvertrags und Nichtangriffspakts das Papier und die Tinte nicht wert sei, auf denen es verfasst wurde. [FROM.GetLeader] schrieb weiter, dass alles, was nicht zu einem formalisierten Bündnis zwischen [FROM.GetNameDef] und [ROOT.GetNameDef] gehöre, reine Zeitverschwendung sei und dass sie es vorziehen würden, von nun an von allen zukünftigen [ROOT.GetAdjective]-Intrigen verschont zu bleiben."
 bftb_turkey.93.a:0 "... Sie hätten einfach „Nein“ sagen können."
 bftb_turkey.94.t:0 "Die Wirtschaft bricht zusammen"
 bftb_turkey.94.desc:0 "[ROOT.GetAdjective] Ökonomen gerieten in Panik, als die Währung des Landes an Wert verlor und unser Land von den Symptomen einer Depression heimgesucht wurde. Es ist eine schreckliche Tragödie, dass unser Land, das die schlimmsten Auswirkungen der Großen Depression so geschickt abgewehrt hat, jetzt in solche wirtschaftliche Not gerät, während der Rest der Welt sich aus seinen wirtschaftlichen Nöten befreit. \n\nDas Vertrauen in öffentliche Institutionen ist auf einen historischen Tiefstand gefallen, und die Bevölkerung ist sich weitgehend bewusst, dass die derzeitige [ROOT.GetAdjective] Regierung für das Leid des Landes verantwortlich ist."
 bftb_turkey.94.a:0 "Die Nation blutet für unsere Habgier ..."
 bftb_turkey.95.t:0 "Osmanische Offiziere bieten Chance zur Wiederherstellung des Sultanats"
 bftb_turkey.95.desc:0 "Wir haben ein Angebot von einigen Gleichgesinnten erhalten, die uns hinsichtlich der Bedeutung der Religion in der Regierungsführung des [ROOT.GetAdjective]-Staates voll und ganz zustimmen, aber wir wissen mit Sicherheit, dass diese Anwälte nicht nur dem Allmächtigen treu sind. Ehemalige Offiziere und Generäle des Osmanischen Reiches haben uns mit einer Entscheidung kontaktiert, die weitreichende Konsequenzen für den Rest unserer Geschichte haben wird: Sie möchten den Sultan wieder auf den Thron setzen. \n\nDieses Angebot kommt nicht völlig überraschend, da viele unserer Minister und Wähler hinter vorgehaltener Hand ihre Enttäuschung über den Zusammenbruch des Osmanischen Sultanats ausgedrückt und stolz von ihrem freundlichen Briefwechsel mit im Ausland lebenden osmanischen Flüchtlingen gesprochen haben. Unsere Wähler werden unsere Entscheidung zweifellos so oder so unterstützen, aber unsere Führungsspitze ist hin- und hergerissen. Es herrscht großer Respekt vor der Republik und vor allem, was Mustafa Kemal Atatürk erreicht hat. Wenn wir diesen Pakt mit diesen osmanischen Geistern unterzeichnen, werden wir Atatürks Republik zweifellos einen Todesstoß versetzen."
 bftb_turkey.95.a:0 "Unser alter Ruhm wartet darauf, wiederhergestellt zu werden ..."
 bftb_turkey.95.b:0 "Unsere Treue gilt der Republik und der Demokratie!"
 bftb_turkey.97.t:0 "[FROM.GetNameDefCap] fordert unsere Unterwerfung"
 bftb_turkey.97.desc:0 "Man sagt, die Geschichte wiederhole sich in Zyklen, doch kein Politikwissenschaftler, der etwas auf sich hält, hätte jemals vorhersagen können, was derzeit geschieht. Viele in der Regierung haben ein Déjà-vu-Gefühl, da wir gerade einen Gesandten von [FROM.GetNameDef] empfangen haben und [FROM.GetLeader] offenbar unsere Unterwürfigkeit gefordert hat. \n\nDie ganze Situation ist einfach absurd! Wie um alles in der Welt konnte das passieren!? Wie konnte das türkische Volk das zulassen? Wie konnten wir uns nur in eine solche Lage bringen lassen!? Die Situation ist bizarr, doch die Bedrohung ist real. Wir müssen entscheiden, ob wir bereit sind, uns der Bedrohung durch [FROM.GetAdjective] erneut entgegenzustellen, wie wir es vor Jahrzehnten getan haben, oder ob sich die Zeiten so sehr geändert haben, dass wir es nicht wagen würden, uns ihren unverständlichen Motiven zu widersetzen und ihren Zorn zu riskieren."
 bftb_turkey.97.a:0 "Die niederträchtigen Osmanen überschätzen ihre Macht!"
 bftb_turkey.97.b:0 "1908 wird nicht umsonst gewesen sein!"
 bftb_turkey.97.c:0 "Es hat keinen Sinn, der osmanischen Bedrohung Widerstand zu leisten."
 bftb_turkey.98.t:0 "[FROM.GetNameDefCap] vertraut weiterhin auf den Schutz seiner Verbündeten"
 bftb_turkey.98.desc:0 "Die [FROM.GetAdjective] weigerten sich, unsere Autorität anzuerkennen oder die Legitimität unserer Forderungen anzuerkennen. Stattdessen suchten sie wie die Feiglinge, die sie sind, Zuflucht in den Armen von [FROM.GetFactionName]. Wir müssen entscheiden, ob wir bereit sind, einen Konflikt mit den Verbündeten von [FROM.GetNameDef] zu riskieren, oder ob unser triumphaler Aufstieg noch ein wenig aufgeschoben werden muss."
 bftb_turkey.98.a:0 "Es gibt niemanden, der unserer Macht widerstehen kann!"
 bftb_turkey.98.b:0 "Wir können uns eine Wiederholung von 1913 nicht erlauben ..."
 bftb_turkey.99.t:0 "[FROM.GetNameDefCap] gibt seine Forderungen auf!"
 bftb_turkey.99.desc:0 "Die nervtötenden und verkommenen [FROM.GetAdjective]s sind von ihren lächerlichen Forderungen abgerückt. Man könnte ihnen mit ihrer überarbeiteten Entscheidung zwar etwas Weisheit attestieren, aber das würde der [FROM.GetAdjective]-Regierung weit mehr Anerkennung zollen, als sie jemals verdient hat. Zwischen [ROOT.GetNameDef] und [FROM.GetNameDef] herrscht vorerst Frieden …"
 bftb_turkey.99.a:0 "Wir haben eine große Krise überstanden!"
 bftb_turkey.100.t:0 "[FROM.GetNameDefCap] Kniet vor unserer Macht nieder!"
 bftb_turkey.100.desc:0 "Wir sind der Wiedererlangung unseres früheren Ruhms einen Schritt näher gekommen, indem wir den skrupellosen [FROM.GetAdjective] Staat in die Knie zwingen und ihn mit unseren eigenen Werten in Einklang bringen. Im ganzen Land finden Feierlichkeiten zur Anerkennung unseres großen Sieges statt."
 bftb_turkey.100.a:0 "Der Große Krieg könnte noch gerächt werden ..."
 bftb_turkey.101.t:0 "[FROM.GetNameDefCap] bleibt trotzig"
 bftb_turkey.101.desc:0 "Die bösen [FROM.GetAdjective] haben sich geweigert, vor unserem allmächtigen und weisen Sultan das Knie zu beugen und haben sich stattdessen für den Krieg entschieden. Wenn die [FROM.GetAdjective] einen Krieg wollen, dann sollen sie ihn haben! 1913 wird sich nie wiederholen!"
 bftb_turkey.101.a:0 "Allah lenkt unser Schwert."
 bftb_turkey.102.t:0 "Das Damaskus-Diktat"
 bftb_turkey.102.desc:0 "Die herrischen Banditen, die [FROM.GetNameDef] regieren, haben unter Kriegsdrohung die sofortige Übergabe des syrischen Territoriums an sie gefordert. Wir sind von dieser Entscheidung der [FROM.GetAdjective]-Geier zwar nicht überrascht, aber das macht unsere Lage nicht weniger prekär. \n\nWir müssen entscheiden, ob wir bereit sind, unser Land den [FROM.GetAdjective]s in der Hoffnung auf Kriegsvermeidung zu überlassen, oder ob wir versuchen wollen, [FROM.GetNameDef] dauerhaft in die Annalen der Geschichte zurückzudrängen, wo sie eigentlich hätten bleiben sollen."
 bftb_turkey.102.a:0 "Es ist den Kampf nicht wert."
 bftb_turkey.102.b:0 "Es ist höchste Zeit, die osmanische Hegemonie endgültig zu zerschlagen."
 bftb_turkey.103.t:0 "[FROM.GetNameDefCap] Verweigert uns!"
 bftb_turkey.103.desc:0 "Die Narren in [FROM.GetNameDef] haben unsere völlig berechtigte Forderung abgelehnt, unser ehemaliges Territorium an seinen rechtmäßigen Besitzer zurückzugeben. Damit bleibt uns nur noch eine Möglichkeit: Krieg!"
 bftb_turkey.103.a:0 "Ihre Unverschämtheit wird mit unseren Krummsäbeln beantwortet."
 bftb_turkey.104.t:0 "Unsere Gebiete gehören uns!"
 bftb_turkey.104.desc:0 "Die Schwächlinge von [FROM.GetNameDef] haben mit ihrer Entscheidung, Syrien ohne Gewaltanwendung an uns zurückzugeben, eine ungewöhnliche Weisheit bewiesen. Wir arbeiten bereits hart daran, das Gebiet wieder in unsere imperiale Entscheidung zu integrieren und stehen nun an einem Scheideweg. \n\nSeltsamerweise erinnert man sich im Nahen Osten vor allem an uns als Imperialisten und Ausländer, die ungerechterweise über Gebiete herrschten, auf die wir kein Recht hatten. Das ist natürlich völliger Quatsch – aber diese falsche Meinung hält sich bis heute. Langfristig könnten wir mehr davon profitieren, ein autonomes imperiales Subjekt zu stützen, das wir zu einem späteren Zeitpunkt integrieren können, wenn die Situation es erfordert. Andererseits könnten wir das Gebiet auch einfach wieder unserem Sultanat einverleiben – es ist schließlich unser göttliches Recht."
 bftb_turkey.104.a:0 "Wir werden die Ösen von Damaskus und Aleppo zusammenlegen!"
 bftb_turkey.104.b:0 "Willkommen zurück im Imperium!"

 bftb_turkey.110.t:0 "Erfolgreiche Abwehr der Rebellen in [TUR_kurdish_state_event_target.GetName]"
 bftb_turkey.110.desc:0 "Unsere Streitkräfte haben einen langwierigen Kampf gegen Separatisten in [TUR_kurdish_state_event_target.GetName] gewonnen. Seitdem kam es in der Region zu zahlreichen Verhaftungen, und unser Militär hat hart daran gearbeitet, die Ordnung wiederherzustellen. \n\nDie Verluste auf beiden Seiten sind bedauerlich, doch herrscht allgemeines Verständnis dafür, dass kein Opfer zu groß ist, um die Einheit unserer Nation zu bewahren. Die Regierung hat daher zu einem landesweiten Trauertag zum Gedenken an die Gefallenen aufgerufen."
 bftb_turkey.110.a:0 "Eine Republik, unteilbar."
 bftb_turkey.111.t:0 "Rebellen besiegen unsere Streitkräfte in [TUR_kurdish_state_event_target.GetName]"
 bftb_turkey.111.desc:0 "In [TUR_kurdish_state_event_target.GetName] hat sich eine schreckliche Katastrophe ereignet. Unsere Streitkräfte zogen sich nach einem erschöpfenden Kampf gegen die dort aktiven separatistischen Rebellen aus dem Gebiet zurück. \n\nRegierungsvertreter und Beobachter des Oberkommandos sind schockiert und entsetzt über die überraschende Wendung der Ereignisse und fordern einen umfassenden Vergeltungsschlag gegen die Rebellen, die die Region heimsuchen. [ROOT.GetLeader] äußerte sich nicht öffentlich zu dem Vorfall, forderte Militärs jedoch privat auf, eine Gegenoperation vorzubereiten, um unsere Verluste aus der Schlacht zu rächen."
 bftb_turkey.111.a:0 "Sie haben uns noch nicht zum letzten Mal gesehen."
 bftb_turkey.113.t:0 "Fundamentalisten protestieren gegen die Produktion religiös verbotener Güter"
 bftb_turkey.113.desc:0 "Die Befriedigung des freien Marktes war schon immer ein Eckpfeiler kemalistischer Politik: Wo Nachfrage besteht, erwarten wir, dass jemand für Angebot sorgt. Bestimmte Teile der Bevölkerung – vor allem religiöse – sind mit [ROOT.GetNameDef]s relativ neuer Konsumkultur nicht allzu zufrieden. \n\nIn Teilen des Landes kam es zu Protesten gegen die Produktion bestimmter Produkte, die Mitglieder unserer Gesellschaft aufgrund ihrer Religion als verboten erachten. Sie haben unsere Träume von einem säkularen [FROM.GetName] nie respektiert und tun sich offensichtlich immer noch schwer damit, sich an das gesamte Konzept zu gewöhnen. Dennoch könnte es einfacher sein, den Mob zu beschwichtigen, als unnötig Konflikte zwischen unseren eigenen Leuten zu schüren."
 bftb_turkey.113.a:0 "Also gut, wir werden kapitulieren, um unseren Respekt vor ihren Bräuchen zu zeigen."
 bftb_turkey.113.b:0 "Unser Fortschritt ist nicht aufzuhalten."
 bftb_turkey.114.t:0 "Fundamentalisten protestieren friedlich gegen die Regierungspolitik"
 bftb_turkey.114.desc:0 "Ein neuer Tag, ein neuer Protest, der von den Religiösen unseres Landes ausgeht. Die jüngste Protestwelle ist in [TUR_fundamentalist_state.GetName] ausgebrochen und richtet sich gegen eine ihrer Ansicht nach überhebliche Regierung, die sich in Angelegenheiten einmischt, die sie nichts angehen. Das Ganze ist absurd; wir sind die Regierung, es ist unsere Aufgabe, uns in die Angelegenheiten unserer Bürger einzumischen. \n\nDie Proteste verliefen friedlich, und wir müssen auf ihre Provokationen nicht mit Gewalt reagieren. Regierungsberater haben sogar eine Liste bedeutungsloser Zugeständnisse erstellt, mit denen die Massen in [TUR_fundamentalist_state.GetName] beruhigt werden können. Wenn wir jedoch vor den Fundamentalisten in [TUR_fundamentalist_state.GetName] einknicken, könnten die Fundamentalisten im Rest des Landes denken, sie könnten mit demselben durchkommen. Vielleicht wäre es besser, die Armee zu schicken, um unser Bekenntnis zu unseren Grundwerten zu demonstrieren."
 bftb_turkey.114.a:0 "Einige leichte Zugeständnisse können gemacht werden."
 bftb_turkey.114.b:0 "Vertreibe die unveränderlichen Schädlinge."
 bftb_turkey.115.t:0 "Fundamentalisten fordern regionale Autonomie"
 bftb_turkey.115.desc:0 "Die Spannungen in [TUR_fundamentalist_state.GetName] zwischen religiösen Fundamentalisten und Regierungsbehörden haben ihren Höhepunkt erreicht. Die Fundamentalisten fordern regionale Autorität und die Macht, nach ihren eigenen Gesetzen zu regieren. Dies stellt eine enorme Eskalation eines Konflikts dar, der größtenteils aus friedlichen Protesten und zahnloser Rhetorik bestand. \n\nEs stimmt, dass die Situation in [TUR_fundamentalist_state.GetName] allmählich außer Kontrolle geraten ist. So schmerzhaft es auch ist, darüber nachzudenken: Wenn wir die von uns geforderte Autonomie gewähren würden, könnten wir zumindest den Pöbel von [TUR_fundamentalist_state.GetName] von unserer Liste aktueller Probleme streichen. Andererseits könnte schon die bloße Erwägung einer solchen Maßnahme als Hochverrat angesehen werden..."
 bftb_turkey.115.a:0 "Es ist ein notwendiges Opfer."
 bftb_turkey.115.b:0 "Sie sollen unsere Beamten fragen, was sie von diesen „Forderungen“ halten."
 bftb_turkey.116.t:0 "Guerilla-Angriff in [TUR_fundamentalist_state.GetName] gestartet"
 bftb_turkey.116.desc:0 "Wir haben die schreckliche Nachricht erhalten, dass eine unserer Garnisonen in [TUR_fundamentalist_state.GetName] Opfer eines kalkulierten und brutalen Guerillaangriffs religiöser Fundamentalisten aus der Region wurde. Die Verluste auf beiden Seiten waren erheblich, doch die Aufständischen drohen mit einer Wiederholung der Angriffe, wenn wir nicht zustimmen, unsere Streitkräfte aus der Region abzuziehen. \n\nEs ist wahrlich ein trauriger Tag, wenn ein Landsmann seinen Landsmann wegen so einer Kleinigkeit wie dem Glauben tötet, und doch befinden wir uns in genau dieser Situation. Unser Offizierskorps schlägt vor, mit der gesamten militärischen Macht gegen die Aufständischen zurückzuschlagen, um unsere Verluste zu rächen, doch einige Politiker drängen darauf, dass es vielleicht am sichersten wäre, unsere Truppen vorübergehend aus dem Gebiet abzuziehen, bis sich die Lage beruhigt hat. Diese Entscheidung sollte nicht leichtfertig getroffen werden."
 bftb_turkey.116.a:0 "Schlagen Sie zurück, doppelt so hart!"
 bftb_turkey.116.b:0 "Ziehen Sie unsere Soldaten ab."
 bftb_turkey.117.t:0 "Die Fundamentalisten verbreiten ihr Gift in [TUR_fundamentalist_state.GetName]"
 bftb_turkey.117.desc:0 "Berichte aus dem Feld deuten darauf hin, dass Zellen religiöser Fundamentalisten in [TUR_fundamentalist_state.GetName] eingedrungen sind, um die Bevölkerung dort zu einem traditionelleren Lebensstil zurückzuführen – einem Lebensstil, der zweifellos in krassem Widerspruch zu unseren säkularen Idealen steht. Charismatische Kleriker und schneidige Protestführer haben die Bevölkerung von [TUR_fundamentalist_state.GetName] angeführt, um sie von ihrer Denkweise zu überzeugen, und bisher sind Versuche, sie mit sanfter Macht zu vertreiben, gescheitert. \n\nWir stehen vor einem Dilemma: Wir versuchen, den Volkswillen zu unterstützen, doch wenn wir nicht direkter eingreifen, werden wir den Staat mit ziemlicher Sicherheit an die Fundamentalisten verlieren. Wir haben immer wieder versucht, die Bevölkerung unseres Landes aufzuklären, um Unterstützung für den Säkularismus zu gewinnen, und doch haben uns die Fanatiker bei jeder Gelegenheit mit Händen und Füßen bekämpft. Wir müssen uns entscheiden, ob wir bereit sind, den Willen des Volkes von [TUR_fundamentalist_state.GetName] zu akzeptieren, oder ob unsere Regierung direkte Maßnahmen ergreifen muss, um die Ziele der Fundamentalisten zu vereiteln."
 bftb_turkey.117.a:0 "Scheuen Sie keine Mühen, sie aufzuhalten."
 bftb_turkey.117.b:0 "Wir müssen dem Willen des Volkes nachgeben …"
 bftb_turkey.118.t:0 "Die Fundamentalisten übernehmen die vollständige Kontrolle über [TUR_fundamentalist_state.GetName]!"
 bftb_turkey.118.desc:0 "Katastrophe! Wir haben gerade erfahren, dass wir jegliche Kontrolle über [TUR_fundamentalist_state.GetName] verloren haben. Religiös-fundamentalistische Guerillas starteten einen koordinierten Angriff auf alle Regierungsgebäude und Militärstützpunkte des Staates, und zwar so, dass kaum Zeit für einen Gegenschlag blieb, bevor die gesamte Situation außer Kontrolle geriet. \n\nDies ist ein beispielloser Verlust für unser Land: Staatsfeinde haben es geschafft, die vollständige Kontrolle über [ROOT.GetAdjective] Hoheitsgebiet zu übernehmen. Die Rückeroberung von [TUR_fundamentalist_state.GetName] wird kostspielig sein, aber ebenso kostspielig, wenn wir zulassen, dass es uns entgleitet. Wir haben keine Zeit mehr und müssen eine Entscheidung treffen."
 bftb_turkey.118.a:0 "Schlagen Sie sie mit allem!"
 bftb_turkey.118.b:0 "Wir müssen die Menschen mit der Zeit zurückgewinnen."
 bftb_turkey.119.t:0 "Die Fundamentalisten in [TUR_fundamentalist_state.GetName] beugen sich der Regierung"
 bftb_turkey.119.desc:0 "Unsere Politik des transparenten Dialogs und der engagierten Öffentlichkeitsarbeit hat sich in [TUR_fundamentalist_state.GetName] ausgezahlt. Die Radikalen haben den Staat verlassen, nachdem sie von der lokalen Bevölkerung vertrieben worden waren – ein fantastischer Sieg für unsere Regierung. \n\nDie Menschen in [TUR_fundamentalist_state.GetName] bewahren ihren religiösen Charakter, aber im Dialog mit den Gemeindevorstehern haben wir festgestellt, dass unsere Bürger die Regierungsprinzipien nicht länger als grundsätzlich unvereinbar mit ihren Überzeugungen empfinden. In [TUR_fundamentalist_state.GetName] sehen wir, wie die Zukunft der [ROOT.GetAdjective] Einheit aussehen wird."
 bftb_turkey.119.a:0 "Wir danken Ihnen für Ihre Mitarbeit."

 bftb_turkey.126.t:0 "[FROM.GetNameDefCap] Liefern Sie ein Anlageportfolio"
 bftb_turkey.126.desc:0 "Vertreter von [FROM.GetNameDef] haben unser Land besucht und sich mit vielen unserer Politiker getroffen, in der Hoffnung, Unterstützung für ihr Investitionsprogramm zu gewinnen. Die Regierung von [FROM.GetNameDef] möchte, dass wir unsere Ressourcen zur Verbesserung ihrer eigenen industriellen Kapazitäten und Produktion nutzen. [FROM.GetAdjective]-Beamte haben geschlussfolgert, dass wir durch die Unterstützung ihres Landes in Zukunft selbst mit Hilfe in Form eines Militärbündnisses zwischen unseren Nationen rechnen können."
 bftb_turkey.126.a:0 "Wenn sie Hilfe brauchen, dann sollen sie diese Hilfe bekommen."
 bftb_turkey.126.b:0 "Wir werden ihren faustischen Pakt nicht unterzeichnen."
 bftb_turkey.127.t:0 "[FROM.GetNameDefCap] schließt Investition als Möglichkeit aus"
 bftb_turkey.127.desc:0 "Wir haben schlechte Nachrichten von [FROM.GetNameDef] erhalten: Obwohl [FROM.GetAdjective] uns nichts Böses will, wurde uns mitgeteilt, dass [FROM.GetNameDef] keine Mittel in unsere Industrie investieren wird. Die Beamten blieben in dieser Angelegenheit unnachgiebig und baten uns, das Thema in absehbarer Zukunft nicht mehr anzusprechen."
 bftb_turkey.127.a:0 "Bedauerlich, aber verständlich."
 bftb_turkey.128.t:0 "[FROM.GetNameDefCap] macht eine bescheidene Investition"
 bftb_turkey.128.desc:0 "Wir wurden kürzlich von [FROM.GetAdjective]-Behörden darüber informiert, dass das von ihnen finanzierte Projekt abgeschlossen wurde. Unsere eigenen Inspektoren besuchten die Baustelle, um sicherzustellen, dass alles unseren Erwartungen entsprach, und wurden nicht enttäuscht. \n\n[FROM.GetAdjective]-Beobachter bemerkten nach Abschluss des Projekts, dass [FROM.GetNameDef] nicht abgeneigt sei, in Zukunft ähnliche oder sogar noch ehrgeizigere Projekte in [ROOT.GetNameDef] zu fördern."
 bftb_turkey.128.a:0 "Sie haben uns einen großen Gefallen getan."
 bftb_turkey.129.t:0 "[FROM.GetNameDefCap] Investiert in unseren Leichtindustriesektor"
 bftb_turkey.129.desc:0 "Wir wurden kürzlich von [FROM.GetAdjective]-Beamten darüber informiert, dass das von [FROM.GetAdjective] vor einiger Zeit geförderte Industrieprojekt abgeschlossen ist. Unsere eigenen Inspektoren besuchten die Baustelle, um sicherzustellen, dass alles unseren Erwartungen entsprach, und wurden nicht enttäuscht. Die Produktion in der neuen Anlage soll umgehend beginnen. \n\n[FROM.GetAdjective]-Beobachter bemerkten nach Abschluss des Projekts, dass [FROM.GetNameDef] nicht abgeneigt sei, auch in Zukunft ähnliche oder noch ehrgeizigere Projekte geheimer Natur zu fördern."
 bftb_turkey.129.a:0 "Was für fantastische Neuigkeiten!"
 bftb_turkey.130.t:0 "[FROM.GetNameDefCap] Investiert in unsere Militärindustrie"
 bftb_turkey.130.desc:0 "Wir wurden kürzlich von [FROM.GetAdjective]-Beamten darüber informiert, dass das streng geheime Industrieprojekt, das [FROM.GetAdjective] vor einiger Zeit gesponsert hat, abgeschlossen ist. Unsere eigenen Inspektoren besuchten die Baustelle, um sicherzustellen, dass alles unseren Erwartungen entsprach, und wurden nicht enttäuscht. Die Produktion in der neuen Anlage soll umgehend beginnen. \n\n[FROM.GetAdjective]-Beobachter bemerkten nach Abschluss des Projekts, dass [FROM.GetNameDef] nicht abgeneigt sei, auch in Zukunft ähnliche Projekte zu sponsern."
 bftb_turkey.130.a:0 "Sie sind wahre Freunde des [ROOT.GetAdjective]."
 bftb_turkey.131.t:0 "[FROM.GetNameDefCap] stimmt der Aufteilung von [GRE.GetNameDef] zu"
 bftb_turkey.131.desc:0 "Wir haben uns mit [FROM.GetNameDef] über die Aufteilung von [GRE.GetNameDef] geeinigt. [FROM.GetNameDefCap] erhält die Anrainerstaaten des östlichen Mittelmeers und des Ionischen Meeres, wir die [GRE.GetAdjective] Kerngebiete, die mit uns die Ägäis teilen. Es ist bedauerlich, dass dies notwendig geworden ist, aber [GRE.GetNameDef] hat uns in dieser Angelegenheit keine andere Wahl gelassen."
 bftb_turkey.131.a:0 "Allmächtiger, vergib uns, aber [GRE.GetNameDef] muss vernichtet werden."
 bftb_turkey.132.t:0 "[FROM.GetNameDefCap] lehnt Plan zur Teilung von [GRE.GetNameDef] ab!"
 bftb_turkey.132.desc:0 "[FROM.GetNameDefCap] hat unseren vernünftigen Vorschlag zur Aufteilung von [GRE.GetNameDef] abgelehnt und stattdessen einen wilden Kampf um Land ohne Rücksicht auf die Bevölkerung dieser Gebiete angezettelt. Eine „nette“ Invasion gibt es nicht, aber man hätte zumindest geordnet und kontrolliert vorgehen können – stattdessen haben die [FROM.GetAdjective]s beschlossen, diese Invasion in einen chaotischen und ungeordneten Wettlauf um die Besetzung möglichst großer Gebiete zu verwandeln, bevor sie die [GRE.GetAdjective]s zur Unterwerfung zwingen. \n\nSo wollten wir es nicht machen; so war es nicht geplant! Unser Erbe ist für immer ruiniert!"
 bftb_turkey.132.a:0 "Das Rennen hat begonnen!"

 bftb_turkey.133.t:0 "Mustafa Kemal Atatürk wird krank"
 bftb_turkey.133.desc:0 "Gestern wurde Mustafa Kemal Atatürk in einem schlimmen Zustand ins Krankenhaus eingeliefert, nachdem er auf seiner Jacht bewusstlos zusammengebrochen war, als er alte Freunde zu Gast hatte. Dieser Vorfall ist der jüngste in einer Reihe sehr beunruhigender Anzeichen dafür, dass sich Atatürks Gesundheitszustand rapide verschlechtert. Berater äußerten hinter vorgehaltener Hand ihre Befürchtung, Atatürk arbeite zu hart, da sein Zustand zunehmend unberechenbarer werde. \n\nTrotz seiner Beteuerungen, alles sei in Ordnung, hat die Regierung es auf sich genommen, den Gesundheitszustand von Mustafa Kemal Atatürk zu überwachen und stellt eine Liste möglicher Maßnahmen zusammen. Wenn Atatürk sich nicht von seinen Pflichten zurückzieht, um sich um seine angeschlagene Konstitution zu kümmern, müssen wir möglicherweise in Erwägung ziehen, ihn zum Rücktritt zu zwingen, damit er seine letzten Monate mit seiner Familie verbringen kann."
 bftb_turkey.133.a:0 "Wir befinden uns in einem Wettlauf gegen die Zeit."
 bftb_turkey.134.t:0 "Der Tod von Mustafa Kemal Atatürk"
 bftb_turkey.134.desc:0 "\nDie Republik trauert. \n\nKriegsheld, Revolutionär, Präsident und Vater der Türken: Mustafa Kemal Atatürk ist friedlich im Schlaf gestorben. \n\nKein Mann und keine Frau könnte jemals hoffen, an die mythischen Höhen von Mustafa Kemal Atatürks Führung heranzukommen, doch der Vater der Türken würde nicht wollen, dass seine kostbare Republik wegen einer Führungskrise in Unordnung gerät. \n\nWir wollen unseren Ghazi nicht ersetzen, denn niemand könnte auch nur im Traum daran denken, dem messianischen Gründervater unserer Nation gerecht zu werden, aber wir müssen den Führer wählen, von dem wir glauben, dass er in Atatürks Fußstapfen tritt. Er muss kemalistische Werte verkörpern und Atatürks Beispiel als Führer von [TUR.GetNameDef] folgen."
 bftb_turkey.134.a:1 "Celâl Bayar ist der offensichtliche Kandidat."
 bftb_turkey.134.b:0 "Celâl Bayar ist der offensichtliche Kandidat."
 bftb_turkey.134.c:0 "İsmet İnönü ist Atatürks würdiger Nachfolger."
 bftb_turkey.134.d:0 "Fevzi Çakmak ist der Anführer, den [TUR.GetNameDef] braucht."
 bftb_turkey.134.e:0 "Fevzi Çakmak wird diesem Land etwas Sicherheit bringen."
 bftb_turkey.134.f:0 "Recep Peker ist der Mann, der Faschismus und Kemalismus synthetisieren kann."
 bftb_turkey.134.g:0 "Das Genie von Şevket Süreyya Aydemir wird uns durchstehen."
 bftb_turkey.134.h:0 "Nur İsmet İnönü kann einen einzigartigen [TUR.GetAdjective] Sozialismus einführen."
 bftb_turkey.134.i:0 "Kâzım Orbay wird eine Militärjunta anführen, bis wir unseren Weg gefunden haben."
 bftb_turkey.135.t:0 "Der Tod von Mustafa Kemal Atatürk"
 bftb_turkey.135.desc:0 "\nDie Republik trauert. \n\nKriegsheld, Revolutionär, Präsident und Vater der Türken: Mustafa Kemal Atatürk ist friedlich im Schlaf gestorben. \n\nBis zum Schluss blieb er seiner Pflicht gegenüber dem türkischen Volk und der von ihm gegründeten Republik treu. Tausende Trauernde erwiesen ihm in Istanbul die letzte Ehre, bevor sein Leichnam per Transportwagen, Schiff und Zug nach Ankara überführt wurde. Dort fand sein Staatsbegräbnis im Beisein des gesamten Parlaments und Würdenträgern aus aller Welt statt.\n\nNachdem der Vater der modernen türkischen Nation von uns gegangen ist, muss die Republik nach vorne schauen. [ROOT.GetLeader] war einer der vielen Redner bei Atatürks Beerdigung und versprach in seiner Rede, das Erbe des Mannes fortzuführen, der so wichtig für die Freiheit der Nation war."
 bftb_turkey.135.a:0 "Ruhe in Frieden, unser Ghazi. Wir werden dich nie vergessen."
 bftb_turkey.136.t:0 "Tragödie ereignet sich für die osmanische Königsfamilie!"
 bftb_turkey.136.desc:0 "Unser stolzes osmanisches Sultanat ist in Trauer, seit die Nachricht vom plötzlichen und unerwarteten Tod unseres Sultans unser Land erreicht hat. Der Sultan und seine Söhne besuchten die fruchtbaren Felder von Niksar und wanderten in den Canik-Bergen in Samsun, als ein Erdbeben die Provinz erschütterte. Drei Tage später wurden die Leichen der osmanischen Könige gefunden, was den Hof in Panik versetzte. \n\nMit der Änderung der osmanischen Gesetze zur Königsnachfolge scheint die älteste Tochter des Sultans die Thronfolgerin zu sein. Sie ist eine willensstarke und unglaublich begabte Frau, doch viele der konservativeren Elemente unserer religiösen Institutionen dürften dagegen protestieren, dass eine Frau den osmanischen Thron bestieg."
 bftb_turkey.136.a:0 "Es lebe die neue Sultana!"
 bftb_turkey.136.b:0 "Eine Frau!? Unakzeptabel! Wir brauchen einen Regenten!"
 bftb_turkey.137.t:0 "[FROM.GetNameDefCap] nimmt gefährliche außenpolitische Haltung ein"
 bftb_turkey.137.desc:0 "Die Regierung von [FROM.GetNameDef] hat sich für eine neue außenpolitische Richtung entschieden, die unseren außenpolitischen Plänen nicht förderlich ist. Delegierte von [FROM.GetNameDef] haben unsere eigenen Diplomaten darüber informiert, dass sie nicht die Absicht haben, ihren derzeitigen destruktiven Kurs umzukehren."
 bftb_turkey.137.a:0 "Sie sind genau das geworden, was sie zu zerstören geschworen haben."
 bftb_turkey.137.b:0 "Sie sind Verräter der Revolution!"
 bftb_turkey.137.c:0 "Vielleicht experimentieren sie mit dem Sozialismus in einem Land?"
 bftb_turkey.137.d:0 "Solange sie unsere Verbündeten in Ruhe lassen ..."
 bftb_turkey.137.e:0 "Man kann ihnen eindeutig nicht mehr trauen."
 TUR_keeping_turkey_under_observation:0 "Wir werden die Aktionen von §Y[TUR.GetNameDef]§! genau im Auge behalten und sie in Zukunft aus unserer Fraktion entfernen, falls dies erforderlich sein sollte."
 bftb_turkey.138.t:0 "[FROM.GetNameDefCap] Verletzt die Souveränität eines Fraktionsmitglieds!"
 bftb_turkey.138.desc:0 "Wie unsere Außenpolitikexperten vorausgesagt hatten, hat [FROM.GetNameDef] einen seiner eigenen Verbündeten ins Visier genommen. Wir haben den [FROM.GetAdjective]-Delegierten für die rücksichtslose Entscheidung seiner Regierung scharf kritisiert, doch sie scheint keinen Eindruck hinterlassen zu haben."
 bftb_turkey.138.a:0 "Sie bekommen eine letzte Chance. Eine."
 bftb_turkey.138.b:0 "Es kann nichts Gutes dabei herauskommen, diesem Schurkenstaat weiterhin Schutz zu gewähren."
 bftb_turkey.139.t:0 "[FROM.GetNameDefCap] Verletzt erneut die Souveränität eines Fraktionsmitglieds!"
 bftb_turkey.139.desc:0 "Die Banditen, die [FROM.GetNameDef] befehligen, haben unser Vertrauen erneut missbraucht. Diese Scharade kann nicht länger toleriert werden. Wir können nicht weiterhin den Respekt unserer Verbündeten genießen, während wir einem Land Schutz gewähren, das eindeutig unser Feind ist."
 bftb_turkey.139.a:0 "Sie wurden gewarnt!"
 bftb_turkey.140.t:0 "[FROM.GetNameDefCap] gibt eine Warnung aus"
 bftb_turkey.140.desc:0 "Die [FROM.GetAdjective]-Regierung hat uns davor gewarnt, die Souveränität eines Fraktionsmitglieds erneut zu verletzen. Dieses Mal sind sie bereit, unser Vorgehen zu entschuldigen, doch weitere Maßnahmen gegen unsere eigenen Verbündeten werden [FROM.GetNameDef] zum Handeln zwingen."
 bftb_turkey.140.a:0 "Wir tun, was uns gefällt."
 bftb_turkey.141.t:0 "[FROM.GetNameDefCap] entfernt uns von [FROM.GetFactionName]!"
 bftb_turkey.141.desc:0 "Unsere neue Außenpolitik konnte [FROM.GetNameDef] nicht gerecht werden, und sie haben entschieden, dass wir nicht länger als Verbündeter betrachtet werden können. Von diesem Tag an sind wir nicht länger Teil von [FROM.GetFactionName]."
 bftb_turkey.141.a:0 "So sei es."

 TUR_downgrade_fundamentalist_defiance_effect_tt:1 "Die £faction_tur_traditionalist §YTraditionalisten§! werden stärker mit der Regierung in §Y[TUR_fundamentalist_state.GetName]§! zusammenarbeiten."
 TUR_upgrade_fundamentalist_defiance_effect_tt:1 "Die £faction_tur_traditionalist §YTraditionalisten§! werden ihren Widerstand gegen die Regierung in §Y[TUR_fundamentalist_state.GetName]§! verstärken."
 TUR_placate_fundamentalist_state_effect_tt:1 "Die £faction_tur_traditionalist §YTraditionalists§! werden jegliche Rhetorik gegen die Regierung im §Y[TUR_fundamentalist_state.GetName]§! einstellen und nun zur aktiven Zusammenarbeit aufrufen."
 TUR_placate_fundamentalist_state_all_targets_effect_tt:0 "Die Traditionalisten der £faction_tur_traditionalist §YTraditionalisten§! sollen kollektiv ihren Widerstand gegen die Regierung einstellen."

 bftb_bulgaria_tsar_boris.1.t:0 "Zar Boris III. besucht [GetDestinationName]"
 bftb_bulgaria_tsar_boris.1.desc_success:1 "Heute hat Zar Boris seinen Besuch in [GetDestinationName] beendet, wo der Monarch die Euphorie der Einheimischen genoss, die sich versammelt hatten, um den königlichen Festzug anzufeuern, als dieser durch einige der berühmtesten Straßen der Stadt zog.\nAber dieser Besuch diente nicht nur dem Vergnügen der einfachen Leute; in den Tagen nach der Ankunft des Zaren fanden üppige Bankette, pompöse Empfänge und Treffen mit Mitgliedern der höchsten lokalen Elite statt.\n\nInsgesamt diente der Besuch seinem Zweck, die Beziehungen zu den wohlhabendsten Mitgliedern der Gemeinschaft zu stärken und den Zaren dem einfachen Volk als wohlwollenden Herrscher zu präsentieren, der seinen Untertanen nahe steht."
 bftb_bulgaria_tsar_boris.1.desc_extra_success:1 "Der königliche Besuch in [GetDestinationName] war ein voller Erfolg! Nach dem Abschluss des Festzugs zum Rathaus, um den Bürgermeister zu treffen, beschloss der Zar, einen Spaziergang durch eines der bescheidenen Viertel von [GetDestinationName] zu machen, um sich unter die Leute zu mischen.\nDie Bürger hätten Boris nicht herzlicher willkommen heißen können. Alle freuten sich, ihren Herrscher durch die Straßen schlendern zu sehen, und nicht wenige überreichten dem Zaren fröhlich bescheidene Geschenke, von Blumenkränzen und lokalen Produkten bis hin zu kleinen Holz- und Eisenhandwerken.\n\nOb dieser aufrichtige und bescheidene Empfang den Zaren berührte, ist unklar. Fest steht jedoch, dass der Zar zu diesem Anlass anstelle von privaten Empfängen und exklusiven Gartenpartys ein großes Volksfest für alle veranstaltete. Natürlich waren die Menschen in [GetDestinationName] von der Idee begeistert, und alle kehrten spät und sehr zufrieden nach dem Fest nach Hause zurück."
 bftb_bulgaria_tsar_boris.1.desc_failure:1 "Der königliche Besuch in [GetDestinationName] hat der Popularität des Zaren schwer geschadet. Schon zu Beginn des Besuchs war die geringe Freude unter den überwiegend armen Bürgern, die sich versammelt hatten, um den Festzug zu begrüßen, deutlich zu erkennen. Vereinzelte Buhrufe waren sogar aus der Menge zu hören.\n\nDie Situation verschärfte sich, als die Bürger einen Protest vor dem Rathaus organisierten, wo der Monarch und seine Familie in Begleitung der privilegiertesten Mitglieder der Gesellschaft einen pompösen Empfang und ein luxuriöses Bankett genossen. Die Menschen kritisierten die großzügigen Prunkveranstaltungen und machten die Oberschicht für alle wirtschaftlichen und sozialen Probleme verantwortlich, die das Land in den letzten Jahrzehnten heimgesucht hatten.\n\nAls Reaktion darauf wurde die Polizei beauftragt, die Demonstration sofort aufzulösen. Der Einsatz von Gewalt verschlimmerte die Situation jedoch nur, und die Demonstration eskalierte in Unruhen."
 bftb_bulgaria_tsar_boris.1.a:1 "Wann ist der nächste Besuch geplant?"
 bftb_bulgaria_tsar_boris.1.b:1 "Ein Abend, an den sie sich noch lange erinnern werden!"
 bftb_bulgaria_tsar_boris.1.c:1 "Dann gibt es für eine Weile kein Schlemmen mehr ..."
 bftb_bulgaria_tsar_boris.2.t:0 "Der Tod von Zar Boris III."
 bftb_bulgaria_tsar_boris.2.desc:0 "[GetBorisDeathContext]\n[GetSuspicionsAboutBorisDeath]"
 BUL_context_of_death_basic:2 "Nach einer Woche schwerer Krankheit ist Zar Boris III. heute, [?BUL.BUL_date_of_tsars_death.GetDateStringNoHourLong], in [BUL.Capital.GetName] offenbar an Herzversagen gestorben."
 BUL_context_of_death_assassinated:0 "Vor wenigen Stunden verließ Zar Boris III. nach der Teilnahme am Nationalen Kongress für Byzantinistik die Universität Sofia. Als sich eine Person schnell dem Zaren näherte, eine Waffe zog und mehrfach auf Boris schoss, bevor sie von Sicherheitskräften niedergeschossen wurde. Wenige Minuten später waren sowohl Zar Boris III. als auch sein Mörder tot."
 BUL_context_of_death_ger:1 "Kurz nach seiner Rückkehr nach [BUL.Capital.GetName] von einem unerwartet harten Treffen mit [GER.GetLeader] [GetBorisGermanMeetingLocation] starb Zar Boris III. offenbar an Herzversagen."
 BUL_boris_german_meeting_location_historical:0 "im ostpreußischen Militärhauptquartier Wolfsschanze bei Rastenburg"
 BUL_boris_german_meeting_location_capital:0 "in [GER.Capital.GetName]"
 BUL_context_of_death_sov:1 "Nach der Rückkehr des Zaren nach [BUL.Capital.GetName] von einem Treffen mit [SOV.GetLeader] in [SOV.Capital.GetName] starb Zar Boris III. offenbar an Herzversagen."
 BUL_context_of_death_eng:1 "Eine Woche nach seiner Rückkehr von seinem Treffen mit [ENG.GetLeader] in [ENG.Capital.GetName] nach [BUL.Capital.GetName] starb Zar Boris III. offenbar an Herzversagen."
 BUL_popular_suspicions_about_death_basic:0 "Die Todesursache ist jedoch noch immer unklar. Es wird spekuliert, dass Boris während seines letzten Treffens vergiftet wurde. Viele glauben, dass dies auf Befehl von [GER.GetLeader] geschah. Andere sind überzeugt, dass der NKWD den Zaren vergiftet hat. Jemand verwies auf [ENG.GetNameDef], und so beunruhigend es auch klingen mag, andere wagen sogar zu behaupten, dass die [BUL.GetAdjective]-Regierung selbst am Tod des Zaren beteiligt sei..."
 BUL_popular_suspicions_about_death_assassinated:0 "Der nationale Sicherheitsdienst hat Ermittlungen eingeleitet, um die Verantwortlichen für den Königsmord zu finden. Offiziellen Berichten zufolge war der Täter im Besitz bulgarischer, deutscher und englischer Dokumente, was die Ermittlungen erschwert und Spekulationen anheizt. Die meisten Bulgaren geben [GER.GetLeader], dem NKWD oder [ENG.GetAdjective] die Schuld, doch es gibt auch Stimmen, die behaupten, die Regierung selbst sei in den Mord am Zaren verwickelt..."
 bftb_bulgaria_tsar_boris.2.a:0 "Wirklich beunruhigend ..."
 bftb_bulgaria_tsar_boris.3.t:1 "Der Regentschaftsrat"
 bftb_bulgaria_tsar_boris.3.desc:1 "Es ist Zeit, die Mitglieder des Regentschaftsrates zu ernennen, der im Namen von Boris‘ Erben Simeon II. über [ROOT.GetNameDef] herrschen wird.\n\nWir müssen die geeignetsten Kandidaten aus dem Königshaus und den oberen politischen und militärischen Klassen auswählen, aber wir müssen weise wählen, denn jeder hat seine eigenen Loyalitäten, und unser Land hat in der Vergangenheit bereits Unglück und Ruin erlitten, die durch die Entscheidungen seiner Führer verursacht wurden …"
 bftb_bulgaria_tsar_boris.3.a:0 "Bilden Sie eine pro-Achsen-Regierung."
 bftb_bulgaria_tsar_boris.3.b:0 "Bilden Sie eine pro-alliierte Regierung."
 bftb_bulgaria_tsar_boris.3.c:0 "Bilden Sie eine unabhängige Regierung."
 bftb_bulgaria_factions.10.t:0 "Aufgedeckte Zveno-Handlung"
 bftb_bulgaria_factions.10.desc:1 "Aus verlässlichen Quellen wissen wir, dass einige Zveno-Mitglieder, die das Regime bereits bei anderen Gelegenheiten öffentlich kritisiert haben, kürzlich Kontakt zu mehreren Militäroffizieren aufgenommen haben. Obwohl wir den Zweck dieser Treffen nicht genau kennen und nicht wissen, wer die angesprochenen Offiziere waren, besteht kein Zweifel daran, dass diese verdächtige Aktion der Zveno Teil eines obskuren, größeren Komplotts ist."
 bftb_bulgaria_factions.10.a:0 "Untersuchen Sie weiter!"
 bftb_bulgaria_factions.10.b:0 "Warten wir, bis sie etwas unternehmen …"
 bftb_bulgaria_factions.11.t:0 "Zveno-Verschwörer entlarvt"
 bftb_bulgaria_factions.11.desc:1 "Nach einer gründlichen Untersuchung und der Kontaktaufnahme mit einigen regimetreuen Zveno-Mitgliedern haben wir ein militärisches Komplott zum Sturz der Regierung aufgedeckt. \nUnter den mit dieser Verschwörung in Verbindung stehenden Personen ist der Name eines unserer vertrauenswürdigsten Generäle aufgetaucht: [?BUL_zveno_conspirator.GetName].\n\nNun müssen wir entscheiden, was wir mit dieser offenbar illoyalen Person tun."
 bftb_bulgaria_factions.11.a:0 "Werdet ihn sofort los!"
 bftb_bulgaria_factions.11.b:0 "Wir sollten nicht voreilige Schlüsse ziehen."
 bftb_bulgaria_factions.12.t:1 "Vorbereitungen für den Putsch in Zveno"
 bftb_bulgaria_factions.12.desc:1 "Uns ist die Nachricht zugegangen, dass die Zveno es endlich gewagt haben, die letzten Vorbereitungen für den Militärputsch zu treffen, den sie schon seit langem sorgfältig vorbereiten.\nSie werden versuchen, die Regierung zu stürzen, wie sie es 1934 getan haben, aber dieses Mal werden wir ihren Erfolg verhindern und diese lästige Organisation ein für alle Mal auslöschen."
 bftb_bulgaria_factions.12.a:0 "Wir werden sie vernichten!"
 bftb_bulgaria_factions.17.t:0 "Zveno integriert"
 bftb_bulgaria_factions.17.desc:1 "Wir haben die Zveno endlich in die Regierung integriert und damit die bereits bestehende Zusammenarbeit zwischen Mitgliedern dieser ehemaligen Organisation und unserer Partei verbessert. Auf diese Weise können wir nun die Zusammenarbeit bei größeren Projekten fördern, bei denen einige der klügsten Köpfe unseres Landes zusammenarbeiten."
 bftb_bulgaria_factions.17.a:1 "Lassen Sie uns diese Köpfe sofort an die Arbeit bringen!"
 bftb_bulgaria_factions.19.t:0 "Zveno zerstört!"
 bftb_bulgaria_factions.19.desc:1 "In den letzten Wochen haben die Polizeikräfte die Überreste der Zveno ausgerottet, die aufgrund des Mangels an starker Führung nach den Verhaftungen, die wir vor dieser Operation vorgenommen haben, bereits stark geschwächt und desorganisiert waren.\nWir können nun mit Sicherheit sagen, dass die Zveno in [ROOT.GetNameDef] nicht mehr existieren, was dem Land und seiner Regierung nur nützen kann."
 bftb_bulgaria_factions.19.a:1 "Wunderbare Neuigkeiten!"

 bftb_bulgaria_factions.20.t:0 "Arbeiterstreiks"
 bftb_bulgaria_factions.20.desc:1 "Mitglieder der Fraktion der Breiten Sozialisten haben sich den Kommunisten angeschlossen, um landesweite Streiks unter den Industriearbeitern zu entfachen. Durch geheime Versammlungen und Treffen gelang es ihnen, große Unterstützung und Sympathie in der bulgarischen Arbeiterschaft zu gewinnen. Wir müssen bei der Durchsetzung der Ordnung in den Regionen, in denen diese Streikenden am beliebtesten sind, vorsichtig vorgehen, damit die Situation nicht zu etwas Ernsterem eskaliert als bloßen Streiks..."
 bftb_bulgaria_factions.20.a:1 "Der Hunger wird sie schließlich zurück zur Herde bringen"
 bftb_bulgaria_factions.20.b:1 "Wir müssen sie um jeden Preis vernichten!"
 bftb_bulgaria_factions.21.t:0 "Unruhen verursachen Kollateralschäden"
 bftb_bulgaria_factions.21.desc:0 "Nach dem Eingreifen unserer Streitkräfte gegen die Streikenden kam es in den Industriegebieten zu gewaltsamen Zusammenstößen und Unruhen. In [?BUL.BUL_damaged_civs_state.GetName] wurden bei den Unruhen mehrere zivile Fabriken beschädigt[GetMilitaryFactoriesDamaged].[GetInfrastructureDamaged]"
 bftb_bulgaria_factions.21.a:0 "Ein unglückliches Ergebnis ..."
 BUL_bs_strikes_no_military_factories_damaged:0 ""
 BUL_bs_strikes_military_factories_damaged_same_state:0 " während mehrere kommunistische Gruppen versuchten, unsere Waffenproduktion zu gefährden, indem sie die Militäreinrichtungen im Staat sabotierten"
 BUL_bs_strikes_military_factories_damaged_other_state:0 ". In [?BUL.BUL_damaged_mils_state.GetName] versuchten mehrere kommunistische Gruppen, unsere Waffenproduktion durch Sabotage militärischer Einrichtungen zu gefährden"
 BUL_bs_strikes_no_infrastructure_damaged:0 ""
 BUL_bs_strikes_infrastructure_damaged:0 " Die Unruhen führten auch zu Schäden und Blockaden an Straßen, Eisenbahnstrecken und Transportmitteln in [?BUL.BUL_damaged_infrastructure_state.GetName]."
 bftb_bulgaria_factions.27.t:0 "Breite Sozialisten integriert"
 bftb_bulgaria_factions.27.desc:1 "Wir haben die Sozialisten endlich in die Regierung integriert und die bereits bestehende Zusammenarbeit zwischen den Mitgliedern dieser ehemaligen Organisation und unserer Partei verbessert. Auf diese Weise können wir nun die Zusammenarbeit bei größeren Projekten fördern, bei denen einige der klügsten Köpfe unseres Landes zusammenarbeiten."
 bftb_bulgaria_factions.27.a:1 "Wir brauchen einander, um Großes zu erreichen!"
 bftb_bulgaria_factions.29.t:0 "Breite Sozialisten zerstört"
 bftb_bulgaria_factions.29.desc:1 "In den letzten Wochen haben die Polizeikräfte die Überreste der Broad Socialists ausgerottet, die aufgrund der fehlenden starken Führung nach den Verhaftungen, die wir vor dieser Operation vorgenommen haben, bereits stark geschwächt und desorganisiert waren.\nWir können nun mit Sicherheit sagen, dass die Broad Socialists in [ROOT.GetNameDef] nicht mehr existieren, was dem Land und seiner Regierung nur nützen kann."
 bftb_bulgaria_factions.29.a:1 "Es hat einige Zeit gedauert ..."

 bftb_bulgaria_factions.30.t:0 "Die Beliebtheit der Agrarier auf dem Land steigt"
 bftb_bulgaria_factions.30.desc:1 "Die Nationale Agrarunion führt in den ländlichen Gebieten des Landes illegal eine Propagandakampagne durch, bei der Tausende von Bauern manipuliert werden, um der Regierung zu misstrauen und sich ihnen anzuschließen.\nDie Agrarier kritisieren insbesondere die kriegerische Politik der Vergangenheit, die Bulgarien Ruin und Demütigung gebracht hat, und versuchen, leichte Ähnlichkeiten mit der Politik der gegenwärtigen Regierung zu finden, um Unzufriedenheit und Unsicherheit in der Bevölkerung zu schüren."
 bftb_bulgaria_factions.30.a:0 "Völlig inakzeptabel!"
 bftb_bulgaria_factions.31.t:0 "Spaltung innerhalb der Agrarischen Nationalen Union"
 bftb_bulgaria_factions.31.desc:1 "Obwohl Agrarier und Kommunisten in der Vergangenheit nicht besonders eng zusammengearbeitet haben, scheint es, als sei es ihnen gelungen, bestimmte Flügel der Nationalen Agrarunion und der Kommunistischen Partei durch das gemeinsame Ziel, die Regierung zu stürzen, zu vereinen. Einige Agrarier haben beschlossen, die Organisation zu verlassen und sich den Kommunisten anzuschließen, während andere, konservativere, ihrem Kampf gegen die Bourgeoisie und ihrer Ablehnung des Bolschewismus treu bleiben und versuchen, auf politischem Wege zu einer Einigung mit der Regierung zu gelangen."
 bftb_bulgaria_factions.31.a:1 "Lästige Ratten!"
 bftb_bulgaria_factions.37.t:0 "Agrarische Nationale Union Integrierte"
 bftb_bulgaria_factions.37.desc:1 "Wir haben die Agrarian National Union endlich in die Regierung integriert und damit die bereits bestehende Zusammenarbeit zwischen den Mitgliedern dieser ehemaligen Organisation und unserer Partei verbessert. Auf diese Weise können wir nun die Zusammenarbeit bei größeren Projekten fördern, bei denen einige der klügsten Köpfe unseres Landes zusammenarbeiten."
 bftb_bulgaria_factions.37.a:1 "Dies wird dem Land große Vorteile bringen."
 bftb_bulgaria_factions.39.t:0 "Zerstörung der Agrarnationalunion"
 bftb_bulgaria_factions.39.desc:1 "In den letzten Wochen haben die Polizeikräfte die Überreste der Agrarian National Union ausgerottet, die nach den Verhaftungen, die wir vor dieser Operation vorgenommen haben, aufgrund des Mangels an starker Führung bereits stark geschwächt und desorganisiert war.\nWir können nun mit Sicherheit sagen, dass die Agrarian National Union in [ROOT.GetNameDef] nicht mehr existiert, was dem Land und seiner Regierung nur nützen kann."
 bftb_bulgaria_factions.39.a:1 "Sie sind für immer weg!"
 
 bftb_bulgaria_factions.40.t:1 "Marsch am [GetMarchDestinationName]"
 bftb_bulgaria_factions.40.desc:1 "Die Nationale Sozialbewegung hat, um ihre Popularität zu steigern, die Methoden nachgeahmt, die die Union der Jungen Bulgarisch-Legionen vor Jahren angewandt hat, und einen Marsch von [Root.Capital.GetName] nach [GetMarchDestinationName] organisiert.\nDie Demonstranten marschieren im Fackelschein wie die Nazis und fordern drastischere Maßnahmen zur Unterdrückung und Ausrottung subversiver bolschewistischer Gruppen, die Gründung eines nationalen Arbeitersyndikats gegen den Klassenkampf und ein aktiveres Eingreifen des Staates in die bulgarische Wirtschaft und Gesellschaft.\nBisher scheint der Marsch unter der städtischen Jugend recht beliebt zu werden. Wenn wir diese Art von Demonstrationen also stoppen wollen, sollten wir das lieber früher als später tun."
 bftb_bulgaria_factions.40.a:1 "Das ist nicht einmal ein origineller Protest!"
 bftb_bulgaria_factions.40.b:0 "Wir müssen sie zum Schweigen bringen, bevor sie zu einer größeren Bedrohung werden"
 bftb_bulgaria_factions.47.t:0 "Nationale Sozialbewegung integriert"
 bftb_bulgaria_factions.47.desc:1 "Wir haben die Nationale Soziale Bewegung endlich in die Regierung integriert und die bereits bestehende Zusammenarbeit zwischen Mitgliedern dieser ehemaligen Organisation und unserer Partei verbessert. Auf diese Weise können wir nun die Zusammenarbeit bei größeren Projekten fördern, bei denen einige der klügsten Köpfe unseres Landes zusammenarbeiten."
 bftb_bulgaria_factions.47.a:1 "Wir sagen immer wieder, dass es besser ist ..."
 bftb_bulgaria_factions.49.t:0 "Zerschlagung der nationalsozialistischen Bewegung"
 bftb_bulgaria_factions.49.desc:1 "In den letzten Wochen haben die Polizeikräfte die Überreste der Nationalsozialbewegung ausgerottet, die aufgrund der Verhaftungen, die wir vor dieser Operation vorgenommen haben, aufgrund des Mangels an starker Führung bereits stark geschwächt und desorganisiert war.\nWir können nun mit Sicherheit sagen, dass die Nationalsozialbewegung in [ROOT.GetNameDef] nicht mehr existiert, was dem Land und seiner Regierung nur nützen kann."
 bftb_bulgaria_factions.49.a:1 "Niemand wird sie vermissen!"

 bftb_bulgaria_factions.50.t:1 "Unterdrückung von Zveno-Mitgliedern"
 bftb_bulgaria_factions.50.desc:1 "Wir sind erfolgreich gegen die Organisation Zveno vorgegangen und haben Mitglieder verhaftet, die sich Berichten zufolge öffentlich gegen [ROOT.GetLeader] ausgesprochen oder sogar einen Sturz der Regierung geplant haben."
 bftb_bulgaria_factions.50.a:1 "Sie haben bekommen, was sie verdient haben"
 bftb_bulgaria_factions.51.t:1 "Unterdrückung von Zveno-Mitgliedern"
 bftb_bulgaria_factions.51.desc:1 "Unsere Sicherheitskräfte haben eine massive Repressionsaktion gegen die Organisation Zveno durchgeführt. Der Leiter der Operation behauptet, es sei den Polizeibeamten gelungen, bei einem geheimen Treffen der Organisation zahlreiche Störenfriede festzunehmen, und bezeichnet den Ausgang der Operation als äußerst erfolgreich."
 bftb_bulgaria_factions.51.a:1 "Wunderbare Neuigkeiten!"
 bftb_bulgaria_factions.52.t:1 "Unterdrückung von Zveno-Mitgliedern"
 bftb_bulgaria_factions.52.desc:1 "Unser Versuch, gegen die Zveno-Organisation vorzugehen, ist leider gescheitert. Die Polizei brach in eine vermeintlich geheime Versammlung ein, bei der die Zveno-Organisation gegen die Regierung plante. Obwohl tatsächlich Mitglieder der Zveno anwesend waren, hatte das Treffen nichts mit ihrer Organisation oder gar mit Politik zu tun. \nEs versteht sich von selbst, dass diese Polizeiaktion in der bulgarischen Bevölkerung und noch weniger in der Zveno-Organisation auf wenig Gegenliebe stieß."
 bftb_bulgaria_factions.52.a:1 "Wie peinlich..."
 bftb_bulgaria_factions.53.t:1 "Operation zur Inhaftierung von Zveno-Anführern"
 bftb_bulgaria_factions.53.desc:1 "Die Operation zur Festnahme der Anführer von Zveno war erfolgreich. Mehrere wichtige Persönlichkeiten, darunter Kimon Georgiev selbst, wurden festgenommen, was der Organisation einen schweren Schlag versetzte."
 bftb_bulgaria_factions.53.a:1 "Sie werden keinen weiteren Ärger mehr machen können!"
 bftb_bulgaria_factions.54.t:1 "Operation zur Inhaftierung von Zveno-Anführern"
 bftb_bulgaria_factions.54.desc:1 "Die Operation zur Festnahme der Anführer von Zveno verlief nicht so erfolgreich wie erwartet. Obwohl die Polizei einige wichtige Personen festnahm, gelang dem Anführer der Organisation, Kimon Georgiev, die Flucht. Obwohl er sich nun versteckt hält, führt er die Organisation weiterhin an."
 bftb_bulgaria_factions.54.a:1 "Ein enttäuschendes Ergebnis..."
 bftb_bulgaria_factions.55.t:1 "Operation zur Inhaftierung von Zveno-Anführern"
 bftb_bulgaria_factions.55.desc:1 "Die Operation zur Verhaftung der Anführer von Zveno war ein völliger Fehlschlag. Polizeikräfte drangen in eine geheime Versammlung ein, doch den zahlenmäßig weit unterlegenen Agenten gelang es nicht, die Teilnehmer zu überwältigen. Diese flohen rasch, verfolgt von der Polizei. Es kam zu gewalttätigen Auseinandersetzungen in den Straßen der Stadt, bei denen viele unschuldige Bürger verletzt wurden. Angesichts dieser Brutalität der Polizei sympathisierten viele Zivilisten in der Region mit Zveno, halfen Mitgliedern der Organisation bei der Flucht und beteiligten sich sogar am Kampf gegen die staatlichen Streitkräfte."
 bftb_bulgaria_factions.55.a:1 "Jemand muss für dieses Versagen bezahlen!"
 bftb_bulgaria_factions.60.t:1 "Breite Sozialisten unterdrückt"
 bftb_bulgaria_factions.60.desc:1 "Wir sind erfolgreich gegen die „Broad Socialists“ vorgegangen und haben Mitglieder verhaftet, die Berichten zufolge versucht haben, Proteste anzuzetteln oder Unruhen in der Bevölkerung zu provozieren."
 bftb_bulgaria_factions.60.a:1 "Sie haben bekommen, was sie verdient haben"
 bftb_bulgaria_factions.61.t:1 "Breite Sozialisten unterdrückt"
 bftb_bulgaria_factions.61.desc:1 "Unsere Sicherheitskräfte haben massive Repressionen gegen die „Broad Socialists“ durchgeführt. Berichten zufolge gelang es Polizeibeamten, bei einem geheimen Treffen, bei dem sich mehrere Anführer der „Broad Socialists“ mit Mitgliedern der Arbeiterorganisationen und sogar der Kommunistischen Partei trafen, zahlreiche Störenfriede festzunehmen. Der Polizeichef bezeichnete die Operation als äußerst erfolgreich."
 bftb_bulgaria_factions.61.a:1 "Wunderbare Neuigkeiten!"
 bftb_bulgaria_factions.62.t:1 "Breite Sozialisten unterdrückt"
 bftb_bulgaria_factions.62.desc:1 "Unser Versuch, gegen die Sozialisten vorzugehen, ist leider gescheitert. Die Polizei drang gewaltsam in eine vermeintlich geheime Versammlung ein, bei der sich Sozialisten mit Mitgliedern der Arbeiterorganisationen und der Kommunistischen Partei trafen, um neue Streiks zu organisieren. Doch wie sich herausstellte, genossen die Sozialisten lediglich eine Vorlesung von Todor Pawlow über dialektischen Materialismus. Das beweist, dass die spektakuläre Polizeiaktion völlig nutzlos war. \nEs versteht sich von selbst, dass diese Polizeiaktion in der bulgarischen Bevölkerung und noch weniger bei den Sozialisten auf wenig Zustimmung stieß."
 bftb_bulgaria_factions.62.a:1 "Wie peinlich..."
 bftb_bulgaria_factions.63.t:1 "Operation zur Inhaftierung der Führer der breiten Sozialisten"
 bftb_bulgaria_factions.63.desc:1 "Die Operation zur Festnahme der Anführer der „Broad Socialists“ war erfolgreich. Die Polizei konnte die meisten wichtigen Persönlichkeiten der Organisation festnehmen und versetzte den „Broad Socialists“ damit einen schweren Schlag."
 bftb_bulgaria_factions.63.a:1 "Sie werden keinen weiteren Ärger mehr machen können!"
 bftb_bulgaria_factions.64.t:1 "Operation zur Inhaftierung der Führer der breiten Sozialisten"
 bftb_bulgaria_factions.64.desc:1 "Die Operation zur Festnahme der Anführer der „Broad Socialists“ verlief nicht so erfolgreich wie erwartet. Obwohl die Polizei einige wichtige Personen festnahm, gelang es mehreren Anführern der Organisation zu fliehen. Obwohl sie sich versteckt hielten, führen sie die „Broad Socialists“ weiterhin an."
 bftb_bulgaria_factions.64.a:1 "Ein enttäuschendes Ergebnis..."
 bftb_bulgaria_factions.65.t:1 "Operation zur Inhaftierung der Führer der breiten Sozialisten"
 bftb_bulgaria_factions.65.desc:1 "Die Operation zur Verhaftung der Anführer der „Broad Socialists“ war ein völliger Fehlschlag. Polizeikräfte drangen in eine geheime Versammlung ein, doch den zahlenmäßig weit unterlegenen Agenten gelang es nicht, die Teilnehmer zu überwältigen. Diese flohen rasch und suchten Unterstützung bei ihren Mitbürgern. Es kam zu gewalttätigen Auseinandersetzungen auf den Straßen der Stadt, bei denen viele unschuldige Bürger verletzt wurden. Angesichts dieser Brutalität der Polizei sympathisierten viele Zivilisten in der Umgebung mit den „Broad Socialists“, halfen Mitgliedern der Organisation bei der Flucht und beteiligten sich sogar am Kampf gegen die Staatsgewalt."
 bftb_bulgaria_factions.65.a:1 "Jemand muss für dieses Versagen bezahlen!"
 bftb_bulgaria_factions.70.t:1 "Unterdrückung von Mitgliedern der Agrargewerkschaft"
 bftb_bulgaria_factions.70.desc:1 "Wir sind erfolgreich gegen die Agrarian National Union vorgegangen und haben Mitglieder verhaftet, die sich Berichten zufolge öffentlich gegen die Regierung ausgesprochen oder versucht haben, Proteste in der Bevölkerung anzuzetteln."
 bftb_bulgaria_factions.70.a:1 "Sie haben bekommen, was sie verdient haben"
 bftb_bulgaria_factions.71.t:1 "Unterdrückung von Mitgliedern der Agrargewerkschaft"
 bftb_bulgaria_factions.71.desc:1 "Unsere Sicherheitskräfte haben massive Repressionen gegen die Nationale Agrarunion durchgeführt. Die Polizei stürmte mehrere Kundgebungen der Agrarunion, die gleichzeitig in verschiedenen Städten Bulgariens stattfanden und die Bevölkerung auf dem Lande aufregen sollten. Offiziellen Polizeiberichten zufolge war der Erfolg dieser Aktion äußerst groß."
 bftb_bulgaria_factions.71.a:1 "Wunderbare Neuigkeiten!"
 bftb_bulgaria_factions.72.t:1 "Unterdrückung von Mitgliedern der Agrargewerkschaft"
 bftb_bulgaria_factions.72.desc:2 "Unser Versuch, gegen die Nationale Agrarunion vorzugehen, ist leider gescheitert. Die Polizei brach in eine vermeintlich geheime Kundgebung auf dem Land ein, bei der die Anführer der Agrarunion Bauern zum Widerstand gegen die Regierung überredeten. Doch wie sich herausstellte, handelte es sich lediglich um einen Vortrag über Aleksandar Stamboliyskis Buch „Politische Parteien oder staatliche Organisationen“, was die Polizeiaktion völlig nutzlos machte. \nEs versteht sich von selbst, dass diese Polizeiaktion in der bulgarischen Bevölkerung und noch weniger in der Agrarunion auf wenig Zustimmung stieß."
 bftb_bulgaria_factions.72.a:1 "Wie peinlich..."
 bftb_bulgaria_factions.73.t:1 "Operation zur Inhaftierung von Gewerkschaftsführern der Landwirtschaft"
 bftb_bulgaria_factions.73.desc:1 "Die Operation zur Festnahme der Anführer der Nationalen Agrarunion war erfolgreich. Die Polizei nahm die meisten wichtigen Persönlichkeiten der Organisation fest, darunter auch Nikola Petkow selbst. Damit versetzte sie der Agrarunion einen schweren Schlag."
 bftb_bulgaria_factions.73.a:1 "Sie werden keinen weiteren Ärger mehr machen können!"
 bftb_bulgaria_factions.74.t:1 "Operation zur Inhaftierung von Gewerkschaftsführern der Landwirtschaft"
 bftb_bulgaria_factions.74.desc:1 "Die Operation zur Festnahme der Anführer der Agrarnationalunion verlief nicht so erfolgreich wie erwartet. Obwohl die Polizei einige wichtige Persönlichkeiten festnahm, gelang es Nikola Petkov zu fliehen. Trotz seines Versteckspiels führt er die Organisation weiterhin an."
 bftb_bulgaria_factions.74.a:1 "Ein enttäuschendes Ergebnis..."
 bftb_bulgaria_factions.75.t:1 "Operation zur Inhaftierung von Gewerkschaftsführern der Landwirtschaft"
 bftb_bulgaria_factions.75.desc:1 "Die Operation zur Verhaftung der Anführer der Agrarian National Union war ein völliger Fehlschlag. Polizeikräfte drangen in eine geheime Versammlung ein, doch den zahlenmäßig weit unterlegenen Agenten gelang es nicht, die Teilnehmer zu überwältigen. Diese flohen rasch und suchten in der Stadt Unterstützung. Es kam zu gewalttätigen Auseinandersetzungen auf den Straßen der Stadt, bei denen viele unschuldige Bürger verletzt wurden. Angesichts dieser Brutalität der Polizei sympathisierten viele Zivilisten in der Region mit der Agrarian Union, halfen Mitgliedern der Organisation bei der Flucht und beteiligten sich sogar am Kampf gegen die staatlichen Kräfte."
 bftb_bulgaria_factions.75.a:1 "Jemand muss für dieses Versagen bezahlen!"
 bftb_bulgaria_factions.80.t:1 "Unterdrückung von Mitgliedern der Nationalen Sozialbewegung"
 bftb_bulgaria_factions.80.desc:1 "Wir sind erfolgreich gegen die Nationale Sozialbewegung vorgegangen und haben Mitglieder verhaftet, die Berichten zufolge versucht haben, Unruhe zu stiften, indem sie öffentlich Hassreden gegen bestimmte Organisationen und sogar gegen [ROOT.GetLeader] selbst gehalten haben."
 bftb_bulgaria_factions.80.a:1 "Sie haben bekommen, was sie verdient haben"
 bftb_bulgaria_factions.81.t:1 "Unterdrückung von Mitgliedern der Nationalen Sozialbewegung"
 bftb_bulgaria_factions.81.desc:1 "Unsere Sicherheitskräfte haben eine massive Repressionsaktion gegen die Nationale Soziale Bewegung durchgeführt. Die Polizei stürmte eine Großkundgebung, bei der mehrere Anführer der Nationalen Sozialen Bewegung Hassreden gegen [ROOT.GetLeader] hielten und ihren nächsten Protestmarsch gegen die Regierung organisierten. Die meisten dieser Radikalen wurden festgenommen, und offiziellen Berichten zufolge war der Einsatz äußerst erfolgreich."
 bftb_bulgaria_factions.81.a:1 "Wunderbare Neuigkeiten!"
 bftb_bulgaria_factions.82.t:1 "Unterdrückung von Mitgliedern der Nationalen Sozialbewegung"
 bftb_bulgaria_factions.82.desc:2 "Unser Versuch, die Nationalsoziale Bewegung zu zerschlagen, ist leider gescheitert. Die Polizei brach in die Zentrale der Organisation ein, wo sie eine geheime Kundgebung zur Organisation des nächsten faschistischen Marsches vermutete. Doch die Veranstaltung entpuppte sich als bloße Konferenz über moderne Wirtschaftspolitik, abgehalten von Alexander Zankow persönlich, was die Polizeiaktion völlig nutzlos machte. \nEs versteht sich von selbst, dass diese Polizeiaktion in der bulgarischen Bevölkerung und noch weniger in der Nationalsozialen Bewegung auf wenig Zustimmung stieß."
 bftb_bulgaria_factions.82.a:1 "Wie peinlich..."
 bftb_bulgaria_factions.83.t:1 "Operation zur Inhaftierung von Anführern der Nationalen Sozialbewegung"
 bftb_bulgaria_factions.83.desc:2 "Die Operation zur Festnahme der Anführer der Nationalsozialen Bewegung war erfolgreich. Die Polizei nahm die meisten wichtigen Persönlichkeiten der Organisation fest, darunter auch Alexander Zankow selbst. Damit versetzte sie der Organisation einen schweren Schlag."
 bftb_bulgaria_factions.83.a:1 "Sie werden keinen weiteren Ärger mehr machen können!"
 bftb_bulgaria_factions.84.t:1 "Operation zur Inhaftierung von Anführern der Nationalen Sozialbewegung"
 bftb_bulgaria_factions.84.desc:2 "Die Operation zur Festnahme der Anführer der Nationalsozialen Bewegung verlief nicht so erfolgreich wie erwartet. Obwohl die Polizei einige wichtige Persönlichkeiten festnahm, gelang es Alexander Zankow zu fliehen. Trotz seines Versteckspiels führt er die Organisation weiterhin an."
 bftb_bulgaria_factions.84.a:1 "Ein enttäuschendes Ergebnis..."
 bftb_bulgaria_factions.85.t:1 "Operation zur Inhaftierung von Anführern der Nationalen Sozialbewegung"
 bftb_bulgaria_factions.85.desc:1 "Die Operation zur Verhaftung der Anführer der Nationalen Sozialen Bewegung war ein völliger Fehlschlag. Polizeikräfte drangen in eine geheime Versammlung ein, doch den zahlenmäßig weit unterlegenen Agenten gelang es nicht, die Teilnehmer zu überwältigen. Diese flohen, verfolgt von der Polizei, blitzschnell vom Ort. Es kam zu gewalttätigen Auseinandersetzungen in den Straßen der Stadt, bei denen viele unschuldige Bürger verletzt wurden. Angesichts dieser Brutalität der Polizei sympathisierten viele Zivilisten in der Umgebung mit der Nationalen Sozialen Bewegung, halfen Mitgliedern der Organisation bei der Flucht und beteiligten sich sogar am Kampf gegen die Staatsgewalt."
 bftb_bulgaria_factions.85.a:1 "Jemand muss für dieses Versagen bezahlen!"

 BUL_repress_imro_flag:0 "Hat IMRO unterdrückt"
 bftb_bulgaria_imro.1.t:0 "Die IMRO ist zurück!"
 bftb_bulgaria_imro.1.desc:0 "Aus zuverlässigen Quellen wissen wir, dass IMRO-Mitglieder mit bulgarischen Waffen bewaffnet die Grenze überquert haben und in mazedonischen Regionen eine Anti-[ROOT.GetAdjective]-Bewegung organisieren."
 bftb_bulgaria_imro.1.a:0 "Zurück in die frühen 1930er Jahre ..."
 bftb_bulgaria_imro.2.t:0 "Bulgarische Stimmung erwacht in Mazedonien"
 bftb_bulgaria_imro.2.desc:0 "IMRO-Aktivisten und andere probulgarische Mazedonier verbreiten derzeit bulgarische Gefühle in der mazedonischen Bevölkerung.\nInfolgedessen wird die Region von einer neuen Welle der Instabilität und Opposition gegen die [ROOT.GetAdjective]-Regierung heimgesucht."
 bftb_bulgaria_imro.2.a:0 "Es ist wieder einmal Zeit, sich mit der IMRO zu befassen …"

 bftb_bulgaria_fatherland_front.1.t:1 "Die Vaterländische Front"
 bftb_bulgaria_fatherland_front.1.desc_positive:1 "Wir können endlich die Früchte unserer großen Anstrengungen ernten, die wir unternommen haben, um die politisch und ideologisch sehr unterschiedlichen Gruppen an einer Front gegen die prodeutsche Militärdiktatur in Bulgarien zu vereinen.\nWir haben die Vaterländische Front gegründet, die nicht nur aus der Kommunistischen Partei besteht, sondern auch aus ehemaligen Mitgliedern der Zveno, der Breiten Sozialisten, der Agrarbewegung und anderer Formationen, die sich nun gemeinsam der Bourgeoisie widersetzen, die das Land beherrscht und nicht zögern wird, es auf der Suche nach ihrem eigenen Glück erneut zu ruinieren."
 bftb_bulgaria_fatherland_front.1.desc_negative:1 "Die Kommunisten haben zusammen mit Mitgliedern anderer Organisationen die Vaterländische Front gegründet, eine politische Widerstandsbewegung, die innerhalb des Proletariats gefährliche Popularität erlangt und in naher Zukunft sogar die Gefahr eines Sturzes der Regierung darstellen könnte."
 bftb_bulgaria_fatherland_front.1.a:1 "Gemeinsam sind wir stärker!"
 bftb_bulgaria_fatherland_front.1.b:1 "Ein weiterer zum Scheitern verurteilter kommunistischer Trick"
 bftb_bulgaria_fatherland_front.2.t:1 "Die Vaterländische Front schlägt zu!"
 bftb_bulgaria_fatherland_front.2.desc:0 "Heute haben lokale Organisationen der Vaterländischen Front und bewaffnete Partisanenformationen nach einem vorher festgelegten Plan Rathäuser und Bezirksverwaltungen im ganzen Land übernommen. \nDie Aufständischen sind entlang der Schwarzmeerküste von Burgas bis Varna auf geringen oder gar keinen Widerstand gestoßen[GetBsFfSupport][GetBznsFfSupport][GetZvenoFfSupport][GetPartisanFfSupport]."
 bftb_bulgaria_fatherland_front.2.desc_no_support:0 ""
 bftb_bulgaria_fatherland_front.2.desc_has_bs_support:0 ", und in Plovdiv ist die Arbeiterklasse massenhaft auf die Straße gegangen, um den Aufstand zu unterstützen, und es ist ihr gelungen, nach einigen Stunden Straßenkampf die Kontrolle über die Region zu erlangen."
 bftb_bulgaria_fatherland_front.2.desc_has_bzns_support:0 ". \nBerichten zufolge war die Unterstützung der Agrarier auch entscheidend für den Erfolg des Putsches in den ländlichen Gebieten von Moesia"
 bftb_bulgaria_fatherland_front.2.desc_has_zveno_support:0 ". \nIn Sofia haben ehemalige Zveno-Militäroffiziere Kommunikationseinrichtungen besetzt und sind in die Nationalversammlung gestürmt, wodurch sie unvorbereitete loyale Truppen zur Kapitulation gezwungen haben."
 bftb_bulgaria_fatherland_front.2.desc_has_partisan_support:0 ". \nZu guter Letzt haben sich Gruppen von [GetPartisanFfSupportNationalities]-Partisanen dem Putsch der Vaterländischen Front angeschlossen und fordern die Kontrolle über die besetzten Gebiete heraus"
 bftb_bulgaria_fatherland_front.2.desc_partisans_gre:0 "griechisch"
 bftb_bulgaria_fatherland_front.2.desc_partisans_yug:0 "jugoslawisch"
 bftb_bulgaria_fatherland_front.2.desc_partisans_both:0 "Griechisch und Jugoslawisch"
 bftb_bulgaria_fatherland_front.2.a:1 "Dann herrscht Bürgerkrieg!"


 BUL_zveno_dissidents_tt:0 "Wenn wir uns nicht rechtzeitig um die [GetZvenoName]-Fraktion kümmern, könnten Mitglieder dieser Organisation in Zukunft möglicherweise einen Militärputsch durchführen."
 BUL_exposed_zveno_conspirator_tt:0 "Dadurch wird ein etwaiger Putsch der [GetZvenoName]-Fraktion etwas verzögert."
 BUL_bs_strikes_no_violence_tt:0 "Dabei werden zahlreiche Fabriken beschädigt.\nEine hohe Unterstützung für den §YKommunismus§! und eine hohe Popularität von [GetBsName] können die Situation verschlimmern."

 bftb_bulgaria_rearmament.1.t:1 "[BUL.GetAdjective] Wiederaufrüstungsverhandlungen"
 bftb_bulgaria_rearmament.1.desc:1 "[BUL.GetAdjective] Die Regierung hat öffentlich die Friedenspolitik für [BUL.GetNameDef] auf dem Balkan festgelegt und drängt uns nun, über die Aufhebung der strengen militärischen Beschränkungen zu verhandeln, die dem Land nach seiner Niederlage im Ersten Weltkrieg auferlegt wurden. \nSie behauptet, sie müsse sofort mit der Wiederbewaffnung beginnen, wenn sie eine moderne Streitmacht aufbauen wolle, die in der Lage sei, die Souveränität und Selbstbestimmung des [BUL.GetAdjective] Volkes zu verteidigen."
 bftb_bulgaria_rearmament.1.a:1 "Sie machen nur leere Versprechungen."
 bftb_bulgaria_rearmament.1.b:1 "Wir werden einen offiziellen Vertrag zur Wahrung des Friedens fordern."
 bftb_bulgaria_rearmament.1.c:1 "Wir müssen ihren Beschränkungen ein Ende setzen!"
 bftb_bulgaria_rearmament.1_refuse_tt:0 "[BUL.GetNameDefCap] wird vorerst nicht in der Lage sein, mit der Wiederbewaffnung zu beginnen."
 bftb_bulgaria_rearmament.1_nap_tt:0 "[BUL.GetNameDefCap] können mit der Wiederbewaffnung beginnen, sobald sie einen Nichtangriffspakt mit [GRE.GetFlag][GRE.GetNameDefCap], [YUG.GetFlag][YUG.GetNameDefCap], [ROM.GetFlag][ROM.GetNameDefCap] oder [TUR.GetFlag][TUR.GetNameDefCap] abschließen."
 bftb_bulgaria_rearmament.2.t:1 "[ENG.GetNameDefCap] lehnt [ROOT.GetAdjective] Wiederbewaffnung ab"
 bftb_bulgaria_rearmament.2.desc:1 "Die [ENG.GetAdjective]-Regierung hat sich geweigert, jegliche Beschränkungen für unsere Streitkräfte aufzuheben. Sie scheint gleichgültig gegenüber den zunehmenden Spannungen in Europa und der Aussicht zu sein, dass sie im Falle einer Veränderung des fragilen Gleichgewichts auf dem Balkan hilflos einer aufstrebenden Macht erliegen könnte."
 bftb_bulgaria_rearmament.2.a:0 "Wir müssen andere Mittel der Überzeugung finden …"
 bftb_bulgaria_rearmament.3.t:1 "[ENG.GetAdjective] Forderungen nach Erlaubnis zur [ROOT.GetNameDef] Wiederbewaffnung"
 bftb_bulgaria_rearmament.3.desc:1 "Bevor jegliche Beschränkungen für unsere Streitkräfte aufgehoben werden, verlangt die [ENG.GetAdjective]-Regierung, dass [ROOT.GetNameDef] einen offiziellen Vertrag mit einem ihrer Nachbarn unterzeichnet, als Ausgangspunkt für die Entwicklung einer freundschaftlichen Diplomatie auf dem Balkan."
 bftb_bulgaria_rearmament.3.a:1 "Ein weiteres Hindernis, das es zu überwinden gilt ..."
 BUL_uk_demands_nap_with_balkan_nation_tt:1 "§YArmeebeschränkungen§! Der Nationalgeist wird nach der Unterzeichnung eines §YNatzverzichtspakts§! mit entweder [GRE.GetFlag][GRE.GetNameDefCap], [YUG.GetFlag][YUG.GetNameDefCap], [ROM.GetFlag][ROM.GetNameDefCap] oder [TUR.GetFlag][TUR.GetNameDefCap] entfernt."
 bftb_bulgaria_rearmament.4.t:0 "Armeebeschränkungen aufgehoben"
 bftb_bulgaria_rearmament.4.desc:1 "Nachdem [ENG.GetAdjective] den Forderungen nachgekommen ist und mit [GetNapTarget] ein Nichtangriffspakt geschlossen wurde, hat [ENG.GetNameDef] endlich die Beschränkungen für unser Militär aufgehoben und die Wiederbewaffnung der [ROOT.GetAdjective]-Armee kann endlich beginnen."
 bftb_bulgaria_rearmament.4.a:1 "Lasst uns an die Arbeit gehen!"
 BUL_nap_with_greece:0 "[GRE.GetNameDefCap]"
 BUL_nap_with_yugoslavia:0 "[YUG.GetNameDefCap]"
 BUL_nap_with_romania:0 "[ROM.GetNameDefCap]"
 BUL_nap_with_turkey:0 "[TUR.GetNameDefCap]"
 bftb_bulgaria_rearmament.5.t:1 "[BUL.GetAdjective] Armeebeschränkungen aufgehoben"
 bftb_bulgaria_rearmament.5.desc:1 "Nachdem den Forderungen von [ROOT.GetAdjective] nachgekommen wurde und mit [GetNapTarget] ein Nichtangriffspakt geschlossen wurde, ist eine [BUL.GetAdjective]-Delegation in London eingetroffen und bereit, den offiziellen Vertrag zu unterzeichnen, der es [BUL.GetNameDef] ermöglichen wird, mit der militärischen Wiederaufrüstung zu beginnen."
 bftb_bulgaria_rearmament.5.a:1 "Bringen wir es hinter uns."
 bftb_bulgaria_rearmament.6.t:0 "[ENG.GetNameDefCap] Hebt unsere Armeebeschränkungen auf"
 bftb_bulgaria_rearmament.6.desc:1 "Nach mühsamen Verhandlungen in Sofia mit einer Delegation von [ENG.GetNameDef] haben wir ein Abkommen unterzeichnet, wonach die [ENG.GetAdjective]-Regierung die Beschränkungen für unsere Armee aufgehoben hat und [ROOT.GetNameDef] endlich mit der militärischen Wiederaufrüstung beginnen kann."
 bftb_bulgaria_rearmament.6.a:1 "Es gibt keine Zeit zu verlieren, beginnen Sie mit der Wiederbewaffnung!"
 bftb_bulgaria_rearmament.7.t:0 "[BUL.GetNameDefCap] Druck zur Aufhebung der Armeebeschränkungen"
 bftb_bulgaria_rearmament.7.desc:1 "Eine [BUL.GetAdjective]-Delegation ist in London eingetroffen, um Druck auf die [ROOT.GetAdjective]-Regierung auszuüben, damit diese die militärischen Beschränkungen für [BUL.GetNameDef] aufhebt. \nAngesichts der drohenden Gefahr eines erneuten Krieges auf dem Balkan versichern sie, dass [BUL.GetNameDef] bald mit den Vorbereitungen zur Verteidigung seiner territorialen Integrität beginnen wird, auf die eine oder andere Weise."
 bftb_bulgaria_rearmament.7.a:1 "Wir geben den Drohungen nicht nach!"
 bftb_bulgaria_rearmament.7.b:1 "Es gibt keinen anderen Weg ... Heben Sie ihre Beschränkungen auf!"
 bftb_bulgaria_rearmament.8.t:1 "[ENG.GetNameDefCap] Wir werden unserem Druck nicht nachgeben"
 bftb_bulgaria_rearmament.8.desc:1 "Die [ROOT.GetAdjective]-Delegation, die nach London entsandt wurde, um Druck auf die [ENG.GetAdjective]-Regierung auszuüben, damit diese die Beschränkungen für unsere Armee aufhebt, ist mit schrecklichen Neuigkeiten zurückgekehrt: [ENG.GetNameDef] wird unseren Forderungen nicht nachgeben und [ROOT.GetNameDef] nicht erlauben, mit der Wiederbewaffnung zu beginnen."
 bftb_bulgaria_rearmament.8.a:1 "Sie lassen uns also keine Wahl …"
 bftb_bulgaria_rearmament.9.t:1 "[BUL.GetNameDefCap] Wird militärischen Beschränkungen nicht entsprechen"
 bftb_bulgaria_rearmament.9.desc:1 "Ein von [BUL.GetLeader] persönlich entsandter [BUL.GetAdjective] Diplomat ist in unserem Land eingetroffen, um uns mitzuteilen, dass [GetReasonForNotAbiding]."
 bftb_bulgaria_rearmament.9.a:0 "Wir werden uns später darum kümmern ..."
 bftb_bulgaria_rearmament.9.b:0 "Dafür müssen sie bezahlen!"
 bftb_bulgaria_rearmament.9.desc_reason_war:0 "Aufgrund des militärischen Konflikts, in den sie hineingezogen wurden, werden [BUL.GetNameDef] sofort mit der Wiederbewaffnung beginnen, um ihre nationale Unabhängigkeit und die Freiheit ihres Volkes zu bewahren."
 bftb_bulgaria_rearmament.9.desc_reason_faction:0 " jetzt, da sie von [BUL.GetFactionName] unterstützt werden, wird [BUL.GetNameDef] sich nicht länger an die Beschränkungen halten, die seinen Streitkräften auferlegt wurden"

 bftb_bulgaria_nationalization.1.t:0 "[FROM.GetNameDefCap] Beschlagnahmte unsere Tochtergesellschaften"
 bftb_bulgaria_nationalization.1.desc:0 "Mit Unterstützung seines [GetTsarLoyalistOrPartyName] hat [GetLeaderNameIfRegencyCouncil] von [BUL.GetNameDef] ein neues Gesetz verabschiedet, mit dem alle ausländischen Tochtergesellschaften im Land verstaatlicht wurden und fortan dem [BUL.GetAdjective] Staat gehören. \nDieser dreiste Angriff auf die [ROOT.GetAdjective] Interessen von [BUL.GetNameDef] wurde in den oberen Rängen als schwerer Schlag aufgefasst, insbesondere bei den Industriemagnaten, die große Summen in die Entwicklung der Infrastruktur und der Tochtergesellschaften von [BUL.GetNameDef] investiert haben, die dann schändlich enteignet wurden."
 bftb_bulgaria_nationalization.1.desc_tsar_loyalists:0 "loyale Minister"
 bftb_bulgaria_nationalization.1.desc_party_name:0 "Minister aus der [BUL.GetRulingPartyLong]"
 bftb_bulgaria_nationalization.1.desc_regency_council:0 "Bogdan Filov und der [BUL.GetLeader]"
 bftb_bulgaria_nationalization.1.desc_regular_leader:0 "[BUL.GetLeader]"
 bftb_bulgaria_nationalization.1.a:0 "Wir können jetzt nichts dagegen tun ..."
 bftb_bulgaria_nationalization.1.b:0 "Ein Handelsembargo wird ihnen etwas Respekt beibringen!"
 bftb_bulgaria_nationalization.1.c:0 "Wir werden eine diplomatische Delegation schicken ... angeführt von Panzern!"
 bftb_bulgaria_nationalization.1.d:0 "Weg mit diesen undankbaren Verrätern!"
 bftb_bulgaria_nationalization.2.t:0 "[FROM.GetAdjective] Handelsembargo gegen Bulgarien"
 bftb_bulgaria_nationalization.2.desc:1 "Als Reaktion auf die [ROOT.GetAdjective] Verstaatlichung ausländischer Tochtergesellschaften und Zweigstellen hat [FROM.GetNameDef] beschlossen, ein Embargo gegen unser Land zu verhängen[GetEmbargoAllies]. \nManche sagen, die Situation hätte noch viel schlimmer eskalieren können, aber die Wahrheit ist, dass bestimmte Sektoren, die sich auf den Import und Export von Waren konzentrieren, von diesem Embargo ernsthaft betroffen sind."
 bftb_bulgaria_nationalization.2.desc_no_allies:0 ""
 bftb_bulgaria_nationalization.2.desc_allies:0 ", ein Embargo, das auch von seinen Verbündeten unterstützt wurde"
 bftb_bulgaria_nationalization.2.a:0 "Wie dramatisch..."
 bftb_bulgaria_nationalization.3.t:0 "[FROM.GetNameDefCap] hat uns aus der [FROM.GetFactionName] ausgeschlossen"
 bftb_bulgaria_nationalization.3.desc:0 "Die [FROM.GetAdjective]-Regierung hat dem Druck von Investoren und Industriemagnaten nachgegeben, die als Reaktion auf die [BUL.GetAdjective] Verstaatlichung ausländischer Tochtergesellschaften forderten, dass [FROM.GetNameDef] nicht nur ein Handelsembargo gegen [BUL.GetNameDef] verhängt, sondern das Land auch aus der [FROM.GetFactionName] ausschließt.\nDas Embargo[GetEmbargoAndKickAllies] wird mehrere nationale Wirtschaftssektoren ernsthaft beeinträchtigen, aber noch schlimmer ist, dass unser Land nun den territorialen Ambitionen seiner Nachbarn ausgesetzt ist, die zweifellos bald aus der ziemlich schlimmen Lage von [BUL.GetNameDef] Vorteile ziehen werden."
 bftb_bulgaria_nationalization.3.desc_no_allies:0 ""
 bftb_bulgaria_nationalization.3.desc_allies:0 ", zusammen mit den Verbündeten von [FROM.GetNameDef],"
 bftb_bulgaria_nationalization.3.a:0 "Damit hätten wir rechnen müssen!"

 bftb_bulgaria_uranium_mining_concessions.1.t:0 "[FROM.GetNameDefCap] Uranbergbaukonzession"
 bftb_bulgaria_uranium_mining_concessions.1.desc:0 "Unsere guten Beziehungen zu unseren [FROM.GetAdjective] Verbündeten haben sich gerade ausgezahlt: Die [FROM.GetAdjective]-Regierung hat uns die Abbaurechte für ihre Uranvorkommen nahe der Stadt Buhovo gewährt. Sie behauptet, ihre Technologie sei noch weit davon entfernt, die Substanz sinnvoll nutzen zu können, und zieht es daher vor, einen Konzessionsvertrag zu unterzeichnen, der uns die Kontrolle über die Minen in Buhovo im Austausch für Grundstoffe für die bulgarische Industrie und Landwirtschaft zusichert.\nDieser vorteilhafte Vertrag wird uns nicht nur eine neue Uranquelle erschließen, sondern zweifellos auch die Beziehungen zwischen [GER.GetNameDef] und [BUL.GetNameDef] weiter verbessern."
 bftb_bulgaria_uranium_mining_concessions.1.a:0 "Wir werden es sinnvoll nutzen."

 bftb_bulgarian_claims.1.t:0 "Bulgarien hält seine Balkanansprüche für gerechtfertigt"
 bftb_bulgarian_claims.1.desc:1 "Eine Delegation von [BUL.GetNameDef] hat sich an unsere Regierung gewandt und um [ROOT.GetAdjective] Unterstützung für ihre Ansprüche auf dem Balkan gebeten. Sie möchte in naher Zukunft heimlich über eine [BUL.GetAdjective] territoriale Expansion in der Region verhandeln und diese sichern, im Austausch für die [BUL.GetAdjective] Annäherung an [ROOT.GetNameDef] und den Beitritt des Landes zur [ROOT.GetFactionName]."
 bftb_bulgarian_claims.1.a:1 "Bulgarische Ansprüche anerkennen."
 bftb_bulgarian_claims.1.b:1 "Eine etwaige Gebietserweiterung gestalten wir nach unserem Ermessen!"
 bftb_bulgarian_claims.1.a_tt:0 "Staaten mit §YPornierte bulgarische territoriale Expansion§! Der Modifikator wird auf [BUL.GetNameDef] übertragen, sobald ein Verbündeter der Fraktion den Staat kontrolliert und [BUL.GetNameDef] sich [ROOT.GetFactionName] angeschlossen hat."
 bftb_bulgarian_claims.2.t:0 "[GER.GetNameDefCap] erkennt unsere Ansprüche an"
 bftb_bulgarian_claims.2.desc:1 "Die [ROOT.GetAdjective]-Delegation, die nach [FROM.Capital.GetName] entsandt wurde, um unsere territoriale Expansion auf dem Balkan zu verhandeln, ist nach [ROOT.Capital.GetName] zurückgekehrt und hat uns mitgeteilt, dass die Mission ein voller Erfolg war. Sie haben mit den [FROM.GetAdjective]s ein geheimes Abkommen geschlossen, wonach [FROM.GetNameDef] unsere Ansprüche anerkennt und sich bereit erklärt, [ROOT.GetNameDef] die Kontrolle darüber zu gewähren, sobald wir uns offiziell den [FROM.GetFactionName] anschließen und die Rolle der Friedenshüter in den besetzten Balkanstaaten übernehmen."
 bftb_bulgarian_claims.2.a:1 "Ein Deal, der kaum besser sein könnte!"
 bftb_bulgarian_claims.3.t:0 "[GER.GetNameDefCap] lehnt unsere Ansprüche ab"
 bftb_bulgarian_claims.3.desc:1 "Die [ROOT.GetAdjective]-Delegation, die nach [FROM.Capital.GetName] entsandt wurde, um über die [FROM.GetAdjective] Anerkennung unserer Ansprüche auf dem Balkan zu verhandeln, ist nach [ROOT.Capital.GetName] zurückgekehrt, um uns mitzuteilen, dass ihre Mission, mit [FROM.GetNameDef] ein Abkommen zur Sicherung der [ROOT.GetAdjective] territorialen Expansion auf dem Balkan zu schließen, gescheitert ist."
 bftb_bulgarian_claims.3.a:1 "Dann müssen wir weniger subtile Expansionsmethoden verwenden …"
 bftb_bulgarian_claims.4.t:0 "[GER.GetNameDefCap] Gewährt bulgarischer Kontrolle"
 bftb_bulgarian_claims.4.desc:1 "Wie zuvor vereinbart, hat [GER.GetNameDef] die Übertragung der Kontrolle über die Gebiete angeordnet, die derzeit von den [GER.GetFactionName]-Mächten besetzt und von [ROOT.GetNameDef] beansprucht werden. Diese werden fortan von der [ROOT.GetAdjective]-Regierung verwaltet."
 bftb_bulgarian_claims.4.a:1 "Wir nehmen uns, was uns rechtmäßig zusteht!"
 bftb_bulgarian_claims.5.t:0 "Bulgarische Besatzung gewährt"
 bftb_bulgarian_claims.5.desc:1 "Wie zuvor vereinbart, haben wir die Übertragung der Kontrolle über die Gebiete angeordnet, die derzeit von den [GER.GetFactionName]-Mächten besetzt und von [ROOT.GetNameDef] beansprucht werden. Diese werden fortan von der [ROOT.GetAdjective]-Regierung verwaltet."
 bftb_bulgarian_claims.5.a:1 "Es war unser Teil der Abmachung"
 bftb_bulgarian_claims.6.t:1 "[GER.GetNameDefCap] Gewährt bulgarische Besatzung"
 bftb_bulgarian_claims.6.desc:1 "Wie zuvor zwischen den Regierungen von [GER.GetAdjective] und [BUL.GetAdjective] vereinbart, hat [GER.GetNameDef] die Übertragung der Kontrolle über die von [BUL.GetNameDef] beanspruchten und derzeit von uns besetzten Gebiete angeordnet, die fortan von der Regierung von [BUL.GetAdjective] verwaltet werden."
 bftb_bulgarian_claims.6.a:1 "Diese bulgarischen Emporkömmlinge!"
 bftb_bulgarian_claims.7.t:0 "[FROM.GetNameDefCap] fordert die Kontrolle über [FROM.FROM.GetName] an"
 bftb_bulgarian_claims.7.desc:0 "In Anbetracht ihrer friedenserhaltenden Rolle in den besetzten Balkangebieten haben die [FROM.GetAdjective]s vorgeschlagen, dass wir ihnen die administrative Kontrolle über [FROM.FROM.GetName] übertragen, um in den von den [ROOT.GetFactionName] eingenommenen Gebieten Ordnung und Stabilität aufrechtzuerhalten und die Garnisonen von [ROOT.GetAdjective] zu entlasten, damit unsere Truppen andere Fronten verstärken können."
 bftb_bulgarian_claims.7.a:0 "Einverstanden, wir brauchen unsere Truppen woanders!"
 bftb_bulgarian_claims.7.b:0 "Die bulgarischen territorialen Ambitionen sind grenzenlos!"
 bftb_bulgarian_claims.8.t:0 "[FROM.GetNameDefCap] überträgt die Kontrolle über [FROM.FROM.FROM.GetName]"
 bftb_bulgarian_claims.8.desc:0 "Die [FROM.GetAdjective]-Regierung hat zugestimmt, [ROOT.GetNameDef] die administrative Kontrolle über [FROM.FROM.FROM.GetName] zu übertragen. Wir werden nun unsere Rolle als Friedenshüter in der Region übernehmen und eine Garnison stationieren, die nicht nur in der Lage ist, Ordnung und Stabilität in der Region aufrechtzuerhalten, sondern sie auch gegen jede feindliche Offensive zu verteidigen."
 bftb_bulgarian_claims.8.a:0 "Mehr Territorium für Bulgarien!"
 bftb_bulgarian_claims.9.t:0 "[FROM.GetNameDefCap] verweigert [ROOT.GetAdjective] die Kontrolle über [FROM.FROM.FROM.GetName]"
 bftb_bulgarian_claims.9.desc:0 "Die [FROM.GetAdjective]-Regierung weigert sich, [ROOT.GetNameDef] die administrative Kontrolle über [FROM.FROM.FROM.GetName] zu gewähren. Sie behauptet, unser wahres Motiv für einen solchen Vorschlag sei lediglich die Ausweitung der [ROOT.GetAdjective]-Besatzungszone in der Hoffnung, nach dem Sieg des Krieges weitere Teile des Balkans zu bekommen, und sogar [FROM.GetLeader] selbst hat erklärt, dass unsere territorialen Ambitionen ihn langsam zu verärgern beginnen."
 bftb_bulgarian_claims.9.a:0 "Vielleicht später dann..."
 BUL_germany_recognizes_our_claim_tt:0 "[GER.GetNameDefCap] erkennt unseren Anspruch im Staat an."

 bftb_bulgaria_german_influence.1.t:0 "[GER.GetNameDefCap] bietet Flugzeugspende an"
 bftb_bulgaria_german_influence.1.desc:1 "[GetFirstDonation] Beziehungen zwischen unserem Land und [GER.GetNameDef] bietet uns Hermann Göring eine Spende von 12 [GER.GetAdjective] Kämpfern an, offensichtlich in dem Bestreben, [ROOT.GetNameDef] auf die Seite der [GER.GetFactionName] zu stellen und so einen mächtigen Verbündeten auf dem Balkan zu gewinnen, um [GER.GetAdjective] Interessen in der Region zu wahren."
 bftb_bulgaria_german_influence.1.desc_first_donation:0 "Um die [ROOT.GetAdjective] Luftkampftruppe wiederherzustellen und zu stärken"
 bftb_bulgaria_german_influence.1.desc_more_donations:0 "In order to continue strengthening the"
 bftb_bulgaria_german_influence.1.a:1 "Wir nehmen es gerne an!"
 bftb_bulgaria_german_influence.1.b:1 "Wir lehnen höflich ab."
 bftb_bulgaria_german_influence.2.t:0 "[BUL.GetNameDefCap] nimmt unsere Spende an"
 bftb_bulgaria_german_influence.2.desc:1 "Das Oberkommando von [BUL.GetAdjective] hat unseren Vorschlag gerne angenommen und [BUL.GetLeader] hat sich persönlich für die Spende unserer Flugzeuge bedankt und erklärt, dass die Beziehung zwischen [ROOT.GetNameDef] und [BUL.GetNameDef] stärker, erfolgreicher und für beide Seiten vorteilhafter wird."
 bftb_bulgaria_german_influence.2.a:1 "Gut!"
 bftb_bulgaria_german_influence.3.t:1 "[BUL.GetNameDefCap] lehnt unsere Spende ab"
 bftb_bulgaria_german_influence.3.desc:1 "Das [BUL.GetAdjective]-Oberkommando hat unseren Vorschlag, [ROOT.GetAdjective]-Flugzeuge zur Verstärkung der [BUL.GetAdjective]-Luftwaffe zu spenden, höflich abgelehnt, mit der Begründung, dass die Annahme dieser Spende eine Annäherung von [BUL.GetNameDef] an die Politik von [ROOT.GetAdjective] bedeutet hätte, was zum jetzigen Zeitpunkt nicht im Interesse der [BUL.GetAdjective]s liegt, die entschlossen sind, ihre Luftwaffe selbst wieder aufzubauen."
 bftb_bulgaria_german_influence.3.a:1 "Was ist los mit ihnen?"
 bftb_bulgaria_german_influence.4.t:1 "[GER.GetLeader] Fordert, dass wir Kyoseivanov ersetzen"
 bftb_bulgaria_german_influence.4.desc:1 "Heute haben wir einen Brief von [GER.GetLeader] selbst erhalten, in dem er erklärt, dass [ROOT.GetAdjective]-Premierminister Georgi Kyoseivanov aufgrund seiner Inkompetenz in den Augen der [GER.GetAdjective]s jegliches Ansehen verloren habe und dass er zum Rücktritt gezwungen werden sollte, um jemand anderen zu ersetzen, der für eine so wichtige Position besser geeignet sei. \nDie [GER.GetAdjective]s schlagen vor, Kyoseivanov durch Bogdan Filov zu ersetzen, einen Germanophilen mit wenig politischer Erfahrung, was bedeutet, dass er [GetLeaderToChallenge] nicht herausfordern würde."
 bftb_bulgaria_german_influence.4.desc_tsar:0 "der Zar"
 bftb_bulgaria_german_influence.4.desc_regency_council:0 "der [ROOT.GetAdjective] Regentschaftsrat"
 bftb_bulgaria_german_influence.4.desc_no_tsar:0 "[BUL.GetLeader]"
 bftb_bulgaria_german_influence.4.a:1 "Die Deutschen haben recht!"
 bftb_bulgaria_german_influence.4.b:1 "Wir werden den deutschen Launen nicht nachgeben!"
 bftb_bulgaria_german_influence.5.t:1 "[BUL.GetLeader] übernimmt die Nachfolge von Kyoseivanov"
 bftb_bulgaria_german_influence.5.desc:1 "Die Inkompetenz des ehemaligen [BUL.GetAdjective] Premierministers Georgi Kyoseivanov hat ihn in den Augen von [BUL.GetLeader] jegliches Vertrauen verloren. Dieser war sich des Risikos, das die Inkompetenz dieser Person darstellte, vollkommen bewusst und akzeptierte unseren Vorschlag, Kyoseivanov durch eine fähigere Person wie Bogdan Filov zu ersetzen, einen Germanophilen mit wenig politischer Erfahrung, was bedeutet, dass er die Interessen [GetLeaderToChallenge] oder [ROOT.GetAdjective] nicht in Frage stellen würde."
 bftb_bulgaria_german_influence.5.a:1 "[BUL.GetLeader] hat bewiesen, dass er weise genug ist."
 bftb_bulgaria_german_influence.6.t:1 "[BUL.GetLeader] weigert sich, Kyoseivanov zu ersetzen"
 bftb_bulgaria_german_influence.6.desc:1 "[BUL.GetLeader] hat sich geweigert, Georgi Kyoseivanov zu ersetzen, und behauptet, der einzige Grund, warum die [ROOT.GetAdjective]-Regierung seinen Rücktritt wünscht, sei, einen kompetenten, [BUL.GetNameDef] treuen Politiker loszuwerden und ihn gegen eine [ROOT.GetAdjective]-Marionette einzutauschen, die die Interessen von [GER.GetLeader] in [BUL.GetNameDef] wahrt."
 bftb_bulgaria_german_influence.6.a:1 "Die einzige Marionette hier ist Georgi Kyoseivanov!"
 bftb_bulgaria_german_influence.7.t:0 "[GER.GetNameDefCap] fordert militärischen Zugang"
 bftb_bulgaria_german_influence.7.desc:1 "Ein Diplomat aus [GER.GetNameDef] ist heute in [ROOT.Capital.GetName] eingetroffen, um von [ROOT.GetNameDef] militärischen Zugang zur [GER.GetAdjective] Armee zu fordern. \nDie bevorstehenden Militäroperationen auf dem Balkan erfordern, dass [GER.GetAdjective] Truppen durch [ROOT.GetNameDef] ziehen und entlang der Grenze zu unseren Nachbarn stationiert werden können, und [GER.GetLeader] wird nicht erfreut sein, wenn er erfährt, dass [ROOT.GetNameDef] die [GER.GetAdjective] Kriegsanstrengungen behindert..."
 bftb_bulgaria_german_influence.7.a:1 "Wir kooperieren gerne mit der Bundeswehr."
 bftb_bulgaria_german_influence.7.b:1 "[GER.GetLeader] muss einen anderen Weg finden"
 bftb_bulgaria_german_influence.8.t:0 "[BUL.GetNameDefCap] Gewährt uns militärischen Zugang"
 bftb_bulgaria_german_influence.8.desc:0 "Der Diplomat, den wir nach [BUL.Capital.GetName] geschickt haben, um die Nutzung des Gebiets von [BUL.GetAdjective] als Operationsbasis für unsere Truppen zu besprechen, hat uns mitgeteilt, dass die Verhandlungen erfolgreich waren und dass [BUL.GetLeader] bereits eine Vereinbarung unterzeichnet hat, durch die der Armee von [ROOT.GetAdjective] militärischer Zugang im gesamten Gebiet von [BUL.GetNameDef] gewährt wurde."
 bftb_bulgaria_german_influence.8.a:0 "Alles läuft nach Plan."
 bftb_bulgaria_german_influence.9.t:0 "[BUL.GetNameDefCap] lehnt unsere Anfrage zum Militärzugang ab"
 bftb_bulgaria_german_influence.9.desc:1 "Der Diplomat, den wir nach [BUL.Capital.GetName] entsandt haben, um über die Nutzung des [BUL.GetAdjective]-Gebiets als Operationsbasis für unsere Armee zu verhandeln, hat berichtet, dass [BUL.GetLeader] den [ROOT.GetAdjective]-Truppen den militärischen Zugang verweigert hat, was unsere Militäroperationen auf dem Balkan in naher Zukunft gefährlich behindern wird. Angeblich glaubt [BUL.GetLeader], dass die Erfüllung jeder unserer Forderungen [BUL.GetNameDef] in einen weiteren [ROOT.GetAdjective]-Satelliten verwandeln und das Land daran hindern würde, die unabhängige Großmacht auf dem Balkan zu werden, die es rechtmäßig sein sollte."
 bftb_bulgaria_german_influence.9.a:1 "[BUL.GetLeader] spielt mit dem Feuer …"
 bftb_bulgaria_italian_influence.1.t:0 "[BUL.GetAdjective] Vorschlag für eine Forschungsvereinbarung"
 bftb_bulgaria_italian_influence.1.desc:0 "Eine [BUL.GetAdjective]-Delegation ist heute in unserer Hauptstadt eingetroffen und möchte mit dem [ITA.GetAdjective]-Außenminister ein Treffen vereinbaren, um die Unterzeichnung eines Abkommens zwischen unseren Ländern vorzuschlagen. \nDer von den [BUL.GetAdjective]-Diplomaten vorgelegte Vertrag enthält unter anderem ein militärisches Kooperationsprogramm mit Schwerpunkt auf technologischer Forschung und der Umsetzung neuer Wirtschaftsvorschriften in [BUL.GetNameDef], die [ITA.GetAdjective]-Investoren erhebliche Vorteile bringen werden."
 bftb_bulgaria_italian_influence.1.a:0 "Dies ist eine vorteilhafte Vereinbarung für [ITA.GetNameDef]."
 bftb_bulgaria_italian_influence.1.b:0 "Wir werden unsere technologischen Fortschritte nicht mit den [BUL.GetAdjective]s teilen!"

 bftb_bulgaria_equipment_purchases.1.t:0 "Kaufen Sie [FROM.FROM.GetAdjective] Artillerie"
 bftb_bulgaria_equipment_purchases.1.desc:0 "Um eine Vereinbarung zum Kauf von [FROM.FROM.GetAdjective] Artilleriekanonen zu treffen, müssen wir zunächst entscheiden, welche Art von Artillerie wir erwerben möchten."
 bftb_bulgaria_equipment_purchases.1.a:0 "Kaufen Sie Artilleriegeschütze"
 bftb_bulgaria_equipment_purchases.1.a_tt:0 "Wir werden §Y[?BUL_quantity_purchased_artillery]§! Einheiten §YGeschleppte Artillerie§! kaufen."
 bftb_bulgaria_equipment_purchases.1.b:0 "Kaufen Sie Flugabwehrkanonen"
 bftb_bulgaria_equipment_purchases.1.b_tt:0 "Wir werden §Y[?BUL_quantity_purchased_artillery]§! Einheiten der §YGeschleppten Flugabwehr§! kaufen."
 bftb_bulgaria_equipment_purchases.1.c:0 "Kaufen Sie Panzerabwehrkanonen"
 bftb_bulgaria_equipment_purchases.1.c_tt:0 "Wir werden §Y[?BUL_quantity_purchased_artillery]§! Einheiten der §Ygeschleppten Panzerabwehr§! kaufen."
 bftb_bulgaria_equipment_purchases.2.t:0 "Kaufen Sie [FROM.FROM.GetAdjective] Militärfahrzeuge"
 bftb_bulgaria_equipment_purchases.2.desc:0 "Um eine Vereinbarung zum Kauf von [FROM.FROM.GetAdjective] Militärfahrzeugen zu treffen, müssen wir zunächst entscheiden, welche Art von Fahrzeugen wir erwerben möchten."
 bftb_bulgaria_equipment_purchases.2.a:0 "Kaufen Sie motorisierte Einheiten"
 bftb_bulgaria_equipment_purchases.2.a_tt:0 "Wir werden §Y[?BUL_quantity_purchased_motorized]§! Einheiten von §YMotorized§! kaufen."
 bftb_bulgaria_equipment_purchases.2.b:0 "Kaufen Sie mechanisierte Fahrzeuge"
 bftb_bulgaria_equipment_purchases.2.b_tt:0 "Wir werden §Y[?BUL_quantity_purchased_mechanized]§! Einheiten von §YMechanized§! kaufen."
 bftb_bulgaria_equipment_purchases.2.c:0 "Kaufen Sie gepanzerte Autos"
 bftb_bulgaria_equipment_purchases.2.c_tt:0 "Wir werden §Y[?BUL_quantity_purchased_armored_car]§! Einheiten von §YArmored Cars§ kaufen!"
 bftb_bulgaria_equipment_purchases.3.t:0 "[FROM.FROM.GetAdjective]-Rüstung kaufen"
 bftb_bulgaria_equipment_purchases.3.desc:0 "Um eine Vereinbarung zum Kauf einer [FROM.FROM.GetAdjective]-Rüstung zu treffen, müssen wir zunächst entscheiden, welche Art von Rüstung wir erwerben möchten."
 bftb_bulgaria_equipment_purchases.3.a:0 "Kaufe leichte Rüstung"
 bftb_bulgaria_equipment_purchases.3.a_tt:0 "Wir werden §Y[?BUL_quantity_purchased_light_armor]§! Einheiten von §YLight Tank§ kaufen!"
 bftb_bulgaria_equipment_purchases.3.b:0 "Kaufe mittlere Rüstung"
 bftb_bulgaria_equipment_purchases.3.b_tt:0 "Wir werden §Y[?BUL_quantity_purchased_medium_armor]§! Einheiten von §YMedium Tank§ kaufen!"
 bftb_bulgaria_equipment_purchases.3.c:0 "Kaufe schwere Rüstung"
 bftb_bulgaria_equipment_purchases.3.c_tt:0 "Wir werden §Y[?BUL_quantity_purchased_heavy_armor]§! Einheiten von §YHeavy Tank§ kaufen!"
 bftb_bulgaria_equipment_purchases.4.t:0 "Kaufen Sie [FROM.FROM.GetAdjective] Flugzeuge"
 bftb_bulgaria_equipment_purchases.4.desc:0 "Um eine Vereinbarung zum Kauf von [FROM.FROM.GetAdjective]-Flugzeugen zu treffen, müssen wir zunächst entscheiden, welchen Flugzeugtyp wir erwerben möchten."
 bftb_bulgaria_equipment_purchases.4.a:0 "Kämpfer kaufen"
 bftb_bulgaria_equipment_purchases.4.a_tt:0 "Wir werden §Y[?BUL_quantity_purchased_fighter]§! Einheiten von §YFighter§! kaufen."
 bftb_bulgaria_equipment_purchases.4.b:0 "Kaufen Sie Marinebomber"
 bftb_bulgaria_equipment_purchases.4.b_tt:0 "Wir werden §Y[?BUL_quantity_purchased_naval_bomber]§! Einheiten von §YNaval Bomber§ kaufen!"
 bftb_bulgaria_equipment_purchases.4.c:0 "Kaufen Sie taktische Bomber"
 bftb_bulgaria_equipment_purchases.4.c_tt:0 "Wir werden §Y[?BUL_quantity_purchased_tactical_bomber]§! Einheiten von §YTactical Bomber§! kaufen."
 bftb_bulgaria_equipment_purchases.5.t:0 "[BUL.GetNameDef] möchte [ROOT.GetAdjective] Schiffe kaufen"
 bftb_bulgaria_equipment_purchases.5.a_tt:0 "Wir erhalten §Y1§! Offmap §YCivilian Factory§! als Bezahlung während des Baus der [BUL.GetAdjective]-Schiffe."
 bftb_bulgaria_equipment_purchases.6.a_tt:0 "[FROM.GetNameDef] wird §Y3 U-Boote§! für die [ROOT.GetAdjective]-Marine bauen."
 bftb_bulgaria_equipment_purchases.6.b_tt:0 "[FROM.GetNameDef] wird §Y2-Zerstörer§! für die [ROOT.GetAdjective]-Marine bauen."
 bftb_bulgaria_equipment_purchases.6.c_tt:0 "[FROM.GetNameDef] wird §Ya Light Cruiser§! für die [ROOT.GetAdjective]-Marine bauen."
 bftb_bulgaria_equipment_purchases.8.t:0 "Schiffsbau abgeschlossen - U-Boote"
 bftb_bulgaria_equipment_purchases.8.desc:0 "Nach fast einem Jahr Bauzeit wurden die drei von uns bestellten [FROM.GetAdjective] U-Boote mehreren Probefahrten unterzogen und sind nun endlich bereit, offiziell in die Marine aufgenommen zu werden.\n Die Schiffe liegen im [Root.GetAdjective] Hafen vor Anker und ihre Besatzungen warten auf ihre Befehle."
 bftb_bulgaria_equipment_purchases.9.t:0 "Schiffsbau abgeschlossen – Zerstörer"
 bftb_bulgaria_equipment_purchases.9.desc:0 "Nach fast einem Jahr Bauzeit haben die beiden von uns bestellten [FROM.GetAdjective] Zerstörer mehrere Probefahrten absolviert und sind nun endlich bereit, offiziell in die Marine aufgenommen zu werden.\n Die Schiffe liegen im [Root.GetAdjective] Hafen vor Anker und ihre Besatzungen warten auf ihre Befehle."
 bftb_bulgaria_equipment_purchases.10.t:0 "Schiffsbau abgeschlossen – Leichter Kreuzer"
 bftb_bulgaria_equipment_purchases.10.desc:0 "Nach fast einem Jahr Bauzeit hat der von uns bestellte [FROM.GetAdjective] Leichte Kreuzer mehrere Probefahrten absolviert und ist nun endlich bereit, offiziell in die Marine aufgenommen zu werden.\n Das Schiff liegt im [Root.GetAdjective] Hafen vor Anker und seine Besatzung wartet auf Befehle."
 bftb_bulgaria_scw_volunteers.1.t:0 "[ROOT.GetAdjective] Freiwillige sind aus Spanien zurück"
 bftb_bulgaria_scw_volunteers.1.desc:0 "Die tapferen [ROOT.GetAdjective] Freiwilligen, die in den Internationalen Brigaden für die Freiheit des spanischen Volkes marschierten, kehren nach Hause zurück [GetVictoryOrDefeatRepublicans], die unerschrockenen [ROOT.GetAdjective] Krieger, die als Veteranen zurückkehren, sind der heute hochqualifizierte Militärpilot Zachari Zachariev, der für seine vielen Kriegsleistungen ausgezeichnet wurde und für eine Beförderung zum Chef der bulgarischen Luftwaffe wärmstens empfohlen wird." #FROM.FROM is SCW loser // #FROM is SCW winner
 bftb_bulgaria_scw_volunteers.1.desc_republicans_victorious:0 "jubelnd nach dem Sieg von [FROM.GetNameDef] im Bürgerkrieg, der dem spanischen Volk so viel Leid zugefügt hat. Unter"
 bftb_bulgaria_scw_volunteers.1.desc_republicans_defeated:0 "in Trauer über die schreckliche Niederlage von [FROM.GetNameDef], das schließlich der Tyrannei des Faschismus erlegen ist... \nAuf jeden Fall unter"
 bftb_bulgaria_scw_volunteers.1.a:0 "Sie kommen als Helden zurück!"
 bftb_bulgaria_scw_volunteers.1.b:0 "Sie taten, was sie konnten, um die Freiheit zu verteidigen ..."
 bftb_bulgaria_scw_volunteers.2.t:0 "Bulgarische Freiwillige kehren aus Spanien zurück"
 bftb_bulgaria_scw_volunteers.2.desc:0 "Die tapferen [ROOT.GetAdjective] Freiwilligen, die in Spanien in den Kampf gegen Bolschewismus und Anarchismus zogen, kehren nach Hause zurück [GetVictoryOrDefeatNationalists] Die Truppen haben wertvolle Kampferfahrung gesammelt und einer unserer Kommandeure wurde für seine bemerkenswerten Taten während des Krieges ausgezeichnet und befördert."
 bftb_bulgaria_scw_volunteers.1.desc_nationalists_victorious:0 "als stolze Sieger des spanischen Bürgerkriegs, in dem [FROM.GetLeader] selbst ihre Teilnahme an der Front gelobt hat. \nUnsere"
 bftb_bulgaria_scw_volunteers.1.desc_nationalists_defeated:0 "niedergeschlagen von der schrecklichen Niederlage, die [FROM.GetNameDef] erlitten hat, das nun völlig den Roten unterworfen ist... \nAuf jeden Fall, unsere"
 bftb_bulgaria_scw_volunteers.2.a:0 "Sie kehren als echte Kriegsveteranen zurück!"
 bftb_bulgaria_scw_volunteers.2.b:0 "Spanien war nur ein Testgelände …"

 bftb_bulgaria_soviet_influence.1.t:0 "[ROOT.GetAdjective]-[BUL.GetAdjective] Vertrag über gegenseitige Unterstützung"
 bftb_bulgaria_soviet_influence.1.desc:0 "[GetBulgarianLeaderToMeetStalin] traf sich heute mit [ROOT.GetLeader] in [ROOT.Capital.GetName], um den [BUL.GetAdjective] Vorschlag zur Unterzeichnung eines Beistandsvertrags zwischen unseren Ländern zu besprechen. Mit diesem Vertrag möchte die [BUL.GetAdjective]-Regierung die Beziehungen zu [ROOT.GetNameDef] stärken und gleichzeitig die Unterstützung gewinnen, die sie braucht, um in diesen turbulenten Zeiten ihre Integrität zu wahren und sich gegen ihre feindseligen Nachbarn auf dem Balkan durchzusetzen."
 bftb_bulgaria_soviet_influence.1.desc_leader:0 "[BUL.GetLeader]"
 bftb_bulgaria_soviet_influence.1.desc_diplomat:0 "[BUL.GetAdjective] Diplomaten"
 bftb_bulgaria_soviet_influence.1.a:0 "Die Unterzeichnung dieses Vertrags wird beiden Ländern zugute kommen!"
 bftb_bulgaria_soviet_influence.1.b:0 "Dieser Vertrag liegt nicht in unserem besten Interesse."
 bftb_bulgaria_soviet_influence.2.t:0 "[SOV.GetNameDefCap] unterzeichnet den Vertrag über gegenseitige Unterstützung"
 bftb_bulgaria_soviet_influence.2.desc:0 "[GetBulgarianLeaderToMeetStalin] kehrte heute von einem Treffen mit [SOV.GetLeader] nach [ROOT.Capital.GetName] zurück, bei dem es um die Unterzeichnung eines Vertrags über gegenseitigen Beistand zwischen [SOV.GetNameDef] und [ROOT.GetNameDef] ging. Nach einem langen Treffen, bei dem die Bedingungen des Vertrags sowie die von den jeweiligen Regierungen zu ergreifenden Maßnahmen zur Wahrung dieser Beziehungen festgelegt wurden, unterzeichneten Würdenträger beider Länder den Vertrag."
 bftb_bulgaria_soviet_influence.2.a:0 "Dies ist der Beginn einer fruchtbaren Beziehung!"
 bftb_bulgaria_soviet_influence.3.t:0 "[SOV.GetNameDefCap] tritt aus dem Vertrag über gegenseitige Unterstützung zurück"
 bftb_bulgaria_soviet_influence.3.desc:0 "[GetBulgarianLeaderToMeetStalin] kehrte heute von einem Treffen mit [SOV.GetLeader] nach [ROOT.Capital.GetName] zurück, bei dem es um die Unterzeichnung eines Beistandsvertrags zwischen [SOV.GetNameDef] und [ROOT.GetNameDef] ging. Nach einem langen Treffen zur Festlegung der Vertragsbedingungen schien es keine Möglichkeit zu geben, [SOV.GetLeader] von der Notwendigkeit dieses Vertrags zu überzeugen, und [SOV.GetLeader.GetSheHe] weigerte sich rundweg, ihn zu unterzeichnen. \nNach dem Scheitern des Vorschlags in [SOV.GetNameDef] scheint [ROOT.GetLeader] bereits andere mögliche Verbündete für [ROOT.GetNameDef] in Betracht zu ziehen."
 bftb_bulgaria_soviet_influence.3.a:0 "Zeit, neue Verbündete zu finden ..."
 bftb_bulgaria_soviet_influence.4.t:0 "[BUL.GetLeader] übt Druck auf [ROOT.GetLeader] aus, sich [BUL.GetFactionName] anzuschließen"
 bftb_bulgaria_soviet_influence.4.desc:0 "Die [BUL.GetAdjective]-Regierung fordert den Zusammenschluss der Balkanstaaten in einer Revolution gegen Faschismus, Imperialismus und Kapitalismus und drängt [ROOT.GetLeader], sich der [BUL.GetFactionName] anzuschließen und so einen mächtigen Widerstandsblock gegen die unterdrückerischen europäischen Nationen zu schaffen."
 bftb_bulgaria_soviet_influence.4.a:0 "Wir müssen uns unseren bulgarischen und sowjetischen Brüdern anschließen."
 bftb_bulgaria_soviet_influence.4.b:0 "Wir werden dem bulgarischen Druck nicht nachgeben!"
 bftb_bulgaria_soviet_influence.5.t:0 "[FROM.GetNameDefCap] gibt dem Druck von [ROOT.GetAdjective] nach"
 bftb_bulgaria_soviet_influence.5.desc:0 "Nach außerordentlich intensiven Treffen und heftigen Diskussionen mit Mitgliedern der [FROM.GetAdjective]-Regierung gab [FROM.GetLeader] schließlich unserem Druck nach und [FROM.GetNameDef] ist der [ROOT.GetFactionName] beigetreten und hat unseren Oppositionsblock gegen Faschismus, Imperialismus und Kapitalismus gestärkt."
 bftb_bulgaria_soviet_influence.5.a:0 "Sie haben das Richtige getan."
 bftb_bulgaria_soviet_influence.6.t:0 "[FROM.GetNameDefCap] lehnt [ROOT.GetAdjective]-Anforderungen ab"
 bftb_bulgaria_soviet_influence.6.desc:0 "[FROM.GetLeader] hat sich geweigert, mit unseren nach [FROM.GetNameDef] entsandten Diplomaten zusammenzutreffen, um mit ihnen über die Notwendigkeit zu sprechen, unsere Länder als Verbündete zu vereinen, anstatt unsere Kräfte zu spalten. Die [FROM.GetAdjective]-Regierung hat unseren Vorschlag, unserem Bündnis beizutreten, jedoch abgelehnt und damit deutlich gemacht, dass eine Zusammenarbeit zwischen [ROOT.GetNameDef] und [FROM.GetNameDef] nicht in Frage kommt und den [ROOT.GetFactionName]-Staaten kaum Alternativen im Umgang mit diesem Land bleiben."
 bftb_bulgaria_soviet_influence.6.a:0 "Eine Entscheidung, die [FROM.GetNameDef] nur Zerstörung bringen wird …"

 bftb_bulgaria_yugoslavian_influence.1.t:0 "Bulgarischer Vertrag über ewige Freundschaft"
 bftb_bulgaria_yugoslavian_influence.1.desc:0 "[GetBulgarianLeaderToMeetStalin] traf sich heute mit [ROOT.GetLeader] in [ROOT.Capital.GetName], um den [BUL.GetAdjective]-Vorschlag zur Unterzeichnung eines Vertrags über ewige Freundschaft zwischen unseren Ländern zu besprechen. Mit diesem Vertrag will die [BUL.GetAdjective]-Regierung vergangene Streitigkeiten beilegen und die Beziehungen zu [YUG.GetNameDef] stärken. Sie hofft, letztendlich ein Bündnis zwischen den beiden Ländern zu bilden, das Zusammenarbeit und gegenseitige Unterstützung ermöglicht, falls einer der Unterzeichner in einen Konflikt verwickelt wird."
 bftb_bulgaria_yugoslavian_influence.1.a:0 "Die Unterzeichnung dieses Vertrags wird beiden Ländern zugute kommen!"
 bftb_bulgaria_yugoslavian_influence.1.b:0 "Dieser Vertrag liegt nicht in unserem besten Interesse."
 bftb_bulgaria_yugoslavian_influence.2.t:0 "[FROM.GetNameDefCap] unterzeichnet Vertrag über ewige Freundschaft"
 bftb_bulgaria_yugoslavian_influence.2.desc:0 "[GetBulgarianLeaderToMeetStalin] kehrte heute von einem Treffen mit [YUG.GetLeader] in [YUG.Capital.GetName] nach [BUL.Capital.GetName] zurück, bei dem es um die Unterzeichnung des Vertrags über ewige Freundschaft zwischen [YUG.GetNameDef] und [ROOT.GetNameDef] ging. Am Ende des Treffens unterzeichneten Würdenträger beider Länder den Vertrag, ließen jedoch einige Klauseln für die Zukunft offen, da beide Seiten den Wunsch hatten, diese vorteilhaften Beziehungen nicht nur zu erhalten, sondern auch auszubauen."
 bftb_bulgaria_yugoslavian_influence.2.a:0 "Dies wird beide Nationen stärken!"
 bftb_bulgaria_yugoslavian_influence.3.t:0 "[FROM.GetNameDefCap] Lehnt unseren Vertrag der ewigen Freundschaft ab"
 bftb_bulgaria_yugoslavian_influence.3.desc:0 "[GetBulgarianLeaderToMeetStalin] kehrte heute von einem Treffen mit [YUG.GetLeader] in [YUG.Capital.GetName] nach [BUL.Capital.GetName] zurück, bei dem wir den Vorschlag zur Unterzeichnung des Vertrags über ewige Freundschaft zwischen [YUG.GetNameDef] und [ROOT.GetNameDef] besprochen hatten. Leider schien [YUG.GetLeader] von der Idee einer Freundschaft mit [ROOT.GetNameDef] nicht sehr begeistert zu sein und lehnte unseren Vorschlag letztendlich ab."
 bftb_bulgaria_yugoslavian_influence.3.a:0 "Was für eine Zeitverschwendung ..."

 bftb_bulgaria_balkan_federation.1.t:0 "Das Balkan Federation-Projekt"
 bftb_bulgaria_balkan_federation.1.desc:0 "Wir haben die Vorbereitungen für das Projekt zur Gründung einer Balkanföderation Sozialistischer Republiken abgeschlossen. Ziel ist es, es den Regierungen der Balkanstaaten vorzustellen und über den Beitritt jedes einzelnen von ihnen zu verhandeln, angefangen mit [YUG.GetNameDef]. \nDas Hauptziel der Föderation, die von [ROOT.GetNameDef] geführt wird, ist die Zusammenarbeit aller Völker des Balkans in einer supranationalen Union, die bereit ist, die vielen Feinde zu bekämpfen, die die Balkanländer unterwerfen wollen. \nAber [ROOT.GetLeader] träumt von mehr: einer Vereinigten Balkanföderation, deren Bürger nicht länger Bulgaren, Griechen, Jugoslawen ... sind, sondern freie Bürger des Balkans."
 bftb_bulgaria_balkan_federation.1.a:0 "Ein Traum, für den es sich zu kämpfen lohnt!"
 bftb_bulgaria_balkan_federation.2.t:0 "[BUL.GetAdjective] Projekt für eine Balkanföderation"
 bftb_bulgaria_balkan_federation.2.desc:0 "Die [BUL.GetAdjective]-Regierung hat uns ihr Projekt zur Gründung einer Balkanföderation Sozialistischer Republiken vorgestellt und [ROOT.GetNameDef] das Privileg versprochen, als erste Nation zum Beitritt eingeladen zu werden. \nDas Hauptziel der Föderation, die von [BUL.GetNameDef] geführt wird, ist die Zusammenarbeit aller Völker des Balkans in einer supranationalen Union, die bereit ist, gegen die zahlreichen Feinde zu kämpfen, die die Balkanländer unterwerfen wollen. \nDie sozialistische und kommunistische Presse hat die Neuigkeit bereits durchsickern lassen, und die Unterstützung für die Balkanföderation und [ROOT.GetNameDef]s Zugehörigkeit zu ihr beginnt sich in der [ROOT.GetAdjective]-Bevölkerung herumzusprechen."
 bftb_bulgaria_balkan_federation.2.a:0 "Ein ehrgeiziges Projekt..."
 bftb_bulgaria_balkan_federation.3.t:0 "Propaganda der Balkanföderation"
 bftb_bulgaria_balkan_federation.3.desc:0 "Die Bulgaren haben in [ROOT.GetNameDef] eine Propagandakampagne gestartet, um die [ROOT.GetAdjective] Bevölkerung von der Durchführbarkeit ihres trügerischen Projekts einer Balkanföderation Sozialistischer Republiken zu überzeugen. \nDie linke Presse hat die Nachricht verbreitet und viele Menschen, insbesondere Industriearbeiter in den Städten und Bauern auf dem Land, zeigen bereits ihre bedingungslose Unterstützung für den [BUL.GetAdjective]-Vorschlag."
 bftb_bulgaria_balkan_federation.3.a:0 "Ein gewagter Schritt Bulgariens ..."
 bftb_bulgaria_balkan_federation.4.t:0 "[BUL.GetNameDefCap] destabilisiert [ROOT.GetNameDef]"
 bftb_bulgaria_balkan_federation.4.desc:0 "[BUL.GetAdjective]-Aktivisten sind über die Grenze in unser Land eingedrungen, um Anhänger der Balkanföderation in [ROOT.GetNameDef] zu bewaffnen und im Land Unruhen zu stiften. \nPolizisten bemühen sich Tag und Nacht, diese subversiven Elemente zu fassen und einzusperren, doch bisher waren ihre Bemühungen nicht sehr erfolgreich, und viele [ROOT.GetAdjective]-Bürger, insbesondere aus der Arbeiterklasse, haben sich den Reihen der Unterstützer des [BUL.GetAdjective]-Projekts der Balkanföderation angeschlossen."
 bftb_bulgaria_balkan_federation.5.t:0 "Die Vereinigung des Balkans"
 bftb_bulgaria_balkan_federation.5.desc:0 "Die [BUL.GetAdjective]-Regierung hat uns einen Vorschlag zur Vereinigung des Balkans unter einer zentralisierten Regierung vorgelegt, um das Verständnis und die Zusammenarbeit zwischen den verschiedenen Völkern des Balkans zu verbessern. Laut [BUL.GetLeader] ist dies der letzte große Schritt der Balkanföderation, der es uns ermöglichen wird, die Konflikte der Vergangenheit hinter uns zu lassen und Einheit und Frieden zwischen unseren Nationen dauerhaft zu gewährleisten. \n[BUL.GetNameDef] erwartet die Antwort der [ROOT.GetAdjective]-Regierung, um mit der konsequenten Vereinigung unserer Nationen fortzufahren."
 bftb_bulgaria_balkan_federation.5.a:0 "Lasst uns unseren Balkanbrüdern beitreten!"
 bftb_bulgaria_balkan_federation.5.b:0 "Bitten Sie um Hilfe, bevor Sie der Vereinigung zustimmen."
 bftb_bulgaria_balkan_federation.5.c:0 "Fordern Sie eine begrenzte Selbstverwaltung."
 bftb_bulgaria_balkan_federation.5.d:0 "Wir werden [ROOT.GetAdjective] Unabhängigkeit und Identität nicht aufgeben!"
 bftb_bulgaria_balkan_federation.5.d_consequences_tt:0 "§RUnsere Weigerung könnte dazu führen, dass [FROM.GetNameDef] uns aus [FROM.GetFactionName] wirft oder sogar ein Kriegsziel gegen uns generiert!§!"
 bftb_bulgaria_balkan_federation.6.t:0 "[FROM.GetNameDefCap] integriert in [ROOT.GetNameDef]"
 bftb_bulgaria_balkan_federation.6.desc:0 "Die [FROM.GetAdjective]-Regierung hat unseren Vereinigungsvorschlag angenommen und ist der Vereinigten Balkanföderation beigetreten. Ehemalige [FROM.GetAdjective]-Bürger werden nun zu freien Balkanbürgern, die ihr Vertrauen in [ROOT.GetLeader]s Traum von einem vereinten Balkan gesetzt haben."
 bftb_bulgaria_balkan_federation.6.a:0 "Der Traum wird wahr!"
 bftb_bulgaria_balkan_federation.7.t:0 "[FROM.GetNameDefCap] Fordert Industriehilfe an"
 bftb_bulgaria_balkan_federation.7.desc:0 "Die [FROM.GetAdjective]-Regierung hat sich bereit erklärt, unserer Vereinigten Balkanföderation beizutreten. Bevor die Vereinigung jedoch voranschreiten kann, benötigt [FROM.GetNameDef] Unterstützung bei der Stärkung seiner schwachen nationalen Industrie. [FROM.GetLeader] hat versichert, dass [FROM.GetNameDef] der großen Vereinigten Balkanföderation gerne beitreten wird, sobald die industrielle Entwicklung des Landes angekurbelt ist."
 bftb_bulgaria_balkan_federation.7.a:0 "Wir müssen den [FROM.GetAdjective]s industrielle Hilfe zukommen lassen."
 bftb_bulgaria_balkan_federation.8.t:0 "[FROM.GetNameDefCap] fordert Wirtschaftshilfe an"
 bftb_bulgaria_balkan_federation.8.desc:0 "Die [FROM.GetAdjective]-Regierung hat sich bereit erklärt, unserer Vereinigten Balkanföderation beizutreten. Bevor sie jedoch mit der Vereinigung fortfahren kann, benötigt [FROM.GetNameDef] dringend finanzielle Hilfe, um den Zusammenbruch der angeschlagenen Wirtschaft zu verhindern. [FROM.GetLeader] hat versichert, dass [FROM.GetNameDef] der großen Vereinigten Balkanföderation gerne beitreten wird, sobald das Land einen wirtschaftlichen Aufschwung erlebt und sich die Lage verbessert."
 bftb_bulgaria_balkan_federation.8.a:0 "Wir müssen den [FROM.GetAdjective]s wirtschaftliche Hilfe zukommen lassen."
 bftb_bulgaria_balkan_federation.9.t:0 "[FROM.GetNameDefCap] fordert militärische Hilfe an"
 bftb_bulgaria_balkan_federation.9.desc:1 "Die [FROM.GetAdjective]-Regierung hat sich bereit erklärt, unserer Vereinigten Balkanföderation beizutreten. Bevor sie jedoch mit der Vereinigung fortfahren kann, benötigt [FROM.GetNameDef] militärische Unterstützung zur Stärkung ihrer unzuverlässigen Streitkräfte, bevor sie eine Operation zur Ausrottung mehrerer Dissidentenzellen in verschiedenen ländlichen Städten rund um [FROM.Capital.GetName] durchführen kann. [FROM.GetLeader] hat zugesichert, dass [FROM.GetNameDef] nach Abschluss der Operation gerne der großen Vereinigten Balkanföderation beitreten wird."
 bftb_bulgaria_balkan_federation.9.a:0 "Wir müssen den [FROM.GetAdjective]s militärische Hilfe leisten."
 bftb_bulgaria_balkan_federation.10.t:0 "[FROM.GetNameDefCap] Forderungen nach bestimmten Selbstbestimmungsrechten"
 bftb_bulgaria_balkan_federation.10.desc:0 "Eine [FROM.GetAdjective]-Delegation unter der Leitung von [FROM.GetLeader] ist heute in [ROOT.Capital.GetName] eingetroffen, um mit [ROOT.GetLeader] die Bedingungen für den Beitritt von [FROM.GetNameDef] zur Vereinigten Balkanföderation zu besprechen. Offenbar möchte die [FROM.GetAdjective]-Regierung innerhalb der Föderation einen gewissen Grad an Unabhängigkeit und Selbstverwaltungsrechten bewahren, ist aber bereit, ihr als assoziiertes Mitglied mit einem gewissen Grad an Autonomie beizutreten."
 bftb_bulgaria_balkan_federation.10.a:0 "Gewährt!"
 bftb_bulgaria_balkan_federation.11.t:0 "[FROM.GetNameDefCap] hat unseren Vorschlag abgelehnt"
 bftb_bulgaria_balkan_federation.11.desc:1 "Die [FROM.GetAdjective]-Regierung hat sich geweigert, unserer Vereinigten Balkanföderation beizutreten, obwohl sie entschlossen ist, das Bündnis zwischen unseren Nationen zu bewahren. \n[FROM.GetLeader] hat jedoch öffentlich erklärt, dass die Reaktion der bulgarischen Regierung auf die [FROM.GetAdjective]-Ablehnung zeigen wird, ob der wahre verborgene Zweck der Föderation darin bestand, die Grenzen Bulgariens über das Vorstellbare hinaus auszudehnen, oder ob Bulgarien wirklich eine Zusammenarbeit zwischen den Balkanländern anstrebt, unabhängig von den Bedingungen ihrer Mitgliedschaft in der Föderation. In jedem Fall werde [FROM.GetNameDef] jedoch niemals seine Unabhängigkeit oder seine kulturelle Identität aufgeben."
 bftb_bulgaria_balkan_federation.11.a:0 "Wir werden ihre Entscheidung respektieren."
 bftb_bulgaria_balkan_federation.11.b:0 "Wie können wir mit einer Regierung zusammenarbeiten, die uns nicht vertraut?"
 bftb_bulgaria_balkan_federation.11.c:0 "[FROM.GetLeader] ist mit seiner Rede zu weit gegangen!"
 bftb_bulgaria_balkan_federation.12.t:0 "[FROM.GetNameDefCap] fordert [ROOT.GetAdjective] Gebiete auf dem Balkan"
 bftb_bulgaria_balkan_federation.12.desc:0 "Die [BUL.GetAdjective]-Regierung hat eine diplomatische Mission entsandt, um die Abtretung der [ROOT.GetAdjective]-Gebiete auf dem Balkan an die Balkanstaaten zu fordern, zu denen sie nach Ansicht der [BUL.GetAdjective]s rechtmäßig gehören. Die Delegierten von [BUL.GetNameDef] haben im Allgemeinen einen freundlichen Ton angeschlagen, obwohl einige unserer Diplomaten behaupten, gewisse bedrohliche Untertöne wahrgenommen zu haben, insbesondere angesichts der anfänglichen Ablehnung der [ITA.GetAdjective]-Minister."
 bftb_bulgaria_balkan_federation.12.a:0 "Wir werden ihren Forderungen nachkommen, um den Frieden zu wahren …"
 bftb_bulgaria_balkan_federation.12.a_state_transfering_tt:0 "Der Staat wird an seinen rechtmäßigen Balkan-Eigentümer übertragen."
 bftb_bulgaria_balkan_federation.12.b:0 "[ROOT.GetNameDef] wird dem Druck von [BUL.GetAdjective] nicht nachgeben!"
 bftb_bulgaria_balkan_federation.12.b_tt:0 "Könnte zu folgenden Effekten führen:"
 bftb_bulgaria_balkan_federation.13.t:0 "[ITA.GetNameDefCap] gibt unseren Forderungen nach"
 bftb_bulgaria_balkan_federation.13.desc:0 "Nach einem langen und intensiven Treffen mit unserer diplomatischen Delegation, die entsandt wurde, um über die Abtretung ihrer Balkangebiete zu verhandeln, hat [ITA.GetAdjective] dem Druck nachgegeben und die Kontrolle über die Balkanstaaten offiziell an die Nationen übertragen, zu denen sie rechtmäßig gehören."
 bftb_bulgaria_balkan_federation.13.a:0 "Eine weise Entscheidung von [ITA.GetLeader]."
 bftb_bulgaria_balkan_federation.14.t:0 "[BUL.GetAdjective] Schiedsgerichtsbarkeit in den Balkangebieten"
 bftb_bulgaria_balkan_federation.14.desc:0 "Die [BUL.GetAdjective]-Regierung entsandte eine diplomatische Mission nach [ITA.GetNameDef], um die Abtretung der [ITA.GetAdjective]-Gebiete auf dem Balkan zu fordern. \nNach einem langen Treffen gab [ITA.GetLeader] dem Druck von [BUL.GetAdjective] nach und stimmte zu, die Kontrolle über die [ITA.GetAdjective]-Staaten auf dem Balkan an die Nationen zu übertragen, zu denen sie rechtmäßig gehören, was gewisse Gebietsgewinne für [ROOT.GetNameDef] mit sich bringt."
 bftb_bulgaria_balkan_federation.14.a:0 "Dafür müssen wir den Bulgaren danken!"
 bftb_bulgaria_balkan_federation.15.t:0 "[ITA.GetNameDefCap] Weigert sich, Balkangebiete aufzugeben"
 bftb_bulgaria_balkan_federation.15.desc:0 "Nach einem langen Treffen mit unserer Delegation, die entsandt wurde, um über die Abtretung von [ITA.GetAdjective] Gebieten auf dem Balkan an die Nationen zu verhandeln, denen sie rechtmäßig gehören, hat [ITA.GetLeader] sich schließlich geweigert, auf [ROOT.GetAdjective] Diplomaten zu hören, und erklärt, dass jedes Stück von [ITA.GetNameDef] besetztes Gebiet auf dem Balkan rechtmäßig dem [ITA.GetAdjective] Volk gehört."
 bftb_bulgaria_balkan_federation.15.a:0 "Dann werden wir diese Gebiete selbst einnehmen!"
 bftb_bulgaria_balkan_federation.15.b:0 "Mit den [ITA.GetAdjective]s werden wir uns später befassen …"
 bftb_bulgaria_balkan_federation.16.t:0 "[BUL.GetNameDefCap] Fordert alle [ROOT.GetAdjective] Gebiete auf dem Balkan"
 bftb_bulgaria_balkan_federation.16.desc:0 "Die [BUL.GetAdjective]-Regierung hat eine diplomatische Mission entsandt, um die Abtretung der [ROOT.GetAdjective]-Gebiete auf dem Balkan zu fordern, die den [BUL.GetAdjective]n zufolge rechtmäßig zu ihnen gehören. \nDie Delegierten von [BUL.GetNameDef] haben im Allgemeinen einen freundlichen Ton angeschlagen, obwohl einige unserer Diplomaten behaupten, gewisse bedrohliche Untertöne wahrgenommen zu haben, insbesondere angesichts der anfänglichen Ablehnung der [ROOT.GetAdjective]-Minister."
 bftb_bulgaria_balkan_federation.16.a:0 "Wir müssen den Ausbruch eines neuen Balkankrieges um jeden Preis verhindern …"
 bftb_bulgaria_balkan_federation.16.b:0 "[BUL.GetLeader] muss unter Wahnvorstellungen leiden!"
 bftb_bulgaria_balkan_federation.17.t:0 "[TUR.GetNameDefCap] Gibt Balkangebiete auf"
 bftb_bulgaria_balkan_federation.17.desc:0 "Nach einem außerordentlich angespannten Treffen mit unserer diplomatischen Delegation, die entsandt wurde, um über die [TUR.GetAdjective] Abtretung seiner Balkangebiete zu verhandeln, hat [TUR.GetLeader] dem [ROOT.GetAdjective] Druck nachgegeben und die Kontrolle über die [TUR.GetAdjective] Balkanstaaten offiziell an [ROOT.GetNameDef] übertragen."
 bftb_bulgaria_balkan_federation.17.a:0 "Wir werden feiern!"
 bftb_bulgaria_balkan_federation.18.t:0 "[TUR.GetNameDefCap] Weigert sich, Balkangebiete aufzugeben"
 bftb_bulgaria_balkan_federation.18.desc:0 "Nach einem außerordentlich angespannten Treffen mit unserer Delegation, die entsandt wurde, um über die Übertragung von [TUR.GetAdjective] Gebieten auf dem Balkan an [ROOT.GetNameDef] zu verhandeln, hat [TUR.GetLeader] sich schließlich geweigert, auf unsere Diplomaten zu hören, und erklärt, dass [TUR.GetNameDef] diese Gebiete seit Jahrhunderten kontrolliert und daher [TUR.GetNameDef] ihr rechtmäßiger Eigentümer ist."
 bftb_bulgaria_balkan_federation.18.a:0 "Dann müssen wir es auf die harte Tour durchstehen!"

 bftb_bulgaria_balkan_federation_project_ready_tt:0 "£GFX_trigger_yes Das Balkan Federation-Projekt ist bereit."
 bftb_bulgaria_balkan_federation.7_tt:0 "Auswirkungen nach Abschluss der Entscheidung:\n"
 BUL_italy_yields_states_to_root_tt:0 "[ITA.GetFlag]§Y[ITA.GetNameDefCap]§! überträgt die Kontrolle über die folgenden Zustände an §Y[ROOT.GetNameDef]§!: "
 BUL_italy_yields_states_to_others_tt:0 "[ITA.GetFlag]§Y[ITA.GetNameDefCap]§! überträgt die Kontrolle über die folgenden Staaten an §Andere Balkanländer§!: "
 bftb_bulgaria_balkan_federation_turkish_states_tt:0 "[BUL.GetFlag]§Y[BUL.GetNameDefCap]§! wird Eigentümer und Kontrolleur von: "

 bftb_bulgaria_fate_of_the_balkans.1.t:0 "[BUL.GetNameDefCap] fordert, dass wir uns der [BUL.GetFactionName] anschließen"
 bftb_bulgaria_fate_of_the_balkans.1.desc:0 "Ein Gesandter von [BUL.GetAdjective] traf heute in der Hauptstadt ein, um sich mit [ROOT.GetLeader] zu treffen und im Wesentlichen die Mitgliedschaft von [ROOT.GetNameDef] in der [BUL.GetFactionName] zu fordern. Laut [GetBulgarianLeader] wird [BUL.GetNameDef] Kooperationsprogramme in den Bereichen Forschung und Verteidigung entwickeln und die Sicherheit und Souveränität aller Mitgliedsstaaten des Bündnisses garantieren. Der Diplomat warnte jedoch, dass jedes Balkanland, das sich weigert, dem Bündnis beizutreten, als Feind betrachtet werde."
 BUL_leader_is_tsar:0 "Zar [BUL.GetLeader]"
 BUL_leader_is_regency_council:0 "der bulgarische Regentschaftsrat"
 BUL_leader_is_a_politician:0 "[BUL.GetLeader]"
 bftb_bulgaria_fate_of_the_balkans.1.a:0 "[ROOT.GetNameDefCap] soll sich [BUL.GetFactionName] anschließen."
 bftb_bulgaria_fate_of_the_balkans.1.b:0 "Wir werden leeren Drohungen nicht nachgeben!"
 bftb_bulgaria_fate_of_the_balkans.2.t:0 "[FROM.GetNameDefCap] Akzeptiert den Beitritt zu [BUL.GetFactionName]"
 bftb_bulgaria_fate_of_the_balkans.2.desc:0 "Der Abgesandte, der die Regierung von [FROM.GetName] davon überzeugen sollte, der [BUL.GetFactionName] beizutreten, ist heute mit guten Neuigkeiten aus der Hauptstadt von [FROM.GetAdjective] zurückgekehrt: [FROM.GetLeader] hat unseren Forderungen zugestimmt und das Land von [FROM.GetHerHis] ist endlich unserer Allianz beigetreten."
 bftb_bulgaria_fate_of_the_balkans.2.a:0 "Der [BUL.GetFactionName] wächst!"
 bftb_bulgaria_fate_of_the_balkans.3.t:0 "[FROM.GetNameDefCap] weigert sich, [BUL.GetFactionName] beizutreten"
 bftb_bulgaria_fate_of_the_balkans.3.desc:0 "Der Abgesandte, der geschickt wurde, um von [FROM.GetName] die Einhaltung der [BUL.GetFactionName] zu fordern, hat berichtet, dass [FROM.GetLeader] beschlossen hat, unserer Allianz nicht beizutreten, da er trotz der Warnungen unseres Diplomaten offenbar nicht erkannt hat, welches schicksalhafte Schicksal [FROM.GetNameDef] erwartet, wenn er sich den Befehlen von [BUL.GetAdjective] widersetzt."
 bftb_bulgaria_fate_of_the_balkans.3.a:0 "[FROM.GetLeader] hat sich als Narr erwiesen …"
 bftb_bulgaria_fate_of_the_balkans.4.t:0 "[BUL.GetNameDefCap] Anforderungen [FROM.FROM.GetName]"
 bftb_bulgaria_fate_of_the_balkans.4.desc:0 "Eine [BUL.GetAdjective] diplomatische Mission[GetBulgarianLeaderDiplomaticMission] ist in unserer Hauptstadt eingetroffen, um über die Übergabe von [FROM.FROM.GetName] an [BUL.GetNameDef] zu verhandeln, dem es ihrer Aussage nach rechtmäßig gehört."
 BUL_tsar_leads_diplomatic_mission:0 ", angeführt vom Zaren [BUL.GetLeader] selbst,"
 BUL_politician_leads_diplomatic_mission:0 ", angeführt von [BUL.GetLeader] selbst,"
 BUL_bulgarian_government:0 ""
 bftb_bulgaria_fate_of_the_balkans.4.a:0 "Wir sind nicht in der Lage, abzulehnen..."
 bftb_bulgaria_fate_of_the_balkans.4.b:0 "Das wird nicht passieren!"
 bftb_bulgaria_fate_of_the_balkans.5.t:0 "[FROM.GetNameDefCap] Akzeptiert [BUL.GetAdjective] Kontrolle über [FROM.FROM.FROM.GetName]"
 bftb_bulgaria_fate_of_the_balkans.5.desc:0 "Nach einer langen Diskussion mit der in die [FROM.GetAdjective] Hauptstadt entsandten diplomatischen Mission von [BUL.GetAdjective] hat [FROM.GetLeader] der Verlegung von [FROM.FROM.FROM.GetName] nach Bulgarien zugestimmt."
 bftb_bulgaria_fate_of_the_balkans.5.a:0 "[FROM.FROM.FROM.GetName] ist endlich wieder da, wo es hingehört"
 bftb_bulgaria_fate_of_the_balkans.6.t:0 "[FROM.GetNameDefCap] weigert sich, [FROM.FROM.FROM.GetName] an [BUL.GetNameDef] zu übertragen"
 bftb_bulgaria_fate_of_the_balkans.6.desc:0 "Nach mehreren Stunden hitziger Diskussion mit der in die [FROM.GetAdjective] Hauptstadt entsandten diplomatischen Mission von [BUL.GetAdjective] weigerte sich [FROM.GetLeader] hartnäckig, [FROM.FROM.FROM.GetName] nach [BUL.GetNameDef] zu verlegen."
 bftb_bulgaria_fate_of_the_balkans.6.a:0 "Eine dumme Entscheidung von [FROM.GetLeader] …"
 bftb_bulgaria_fate_of_the_balkans.7.t:0 "[BUL.GetNameDefCap] fordert [ROOT.GetAdjective] Unterwerfung"
 bftb_bulgaria_fate_of_the_balkans.7.desc:0 "Endlich hat die [BUL.GetAdjective]-Regierung ihre wahren Absichten gezeigt und eine Delegation entsandt, um die Anerkennung von [BUL.GetNameDef] als Oberherr von [ROOT.GetNameDef] zu fordern, was die bedingungslose Unterwerfung der [ROOT.GetAdjective]-Regierung unter die Herrschaft von [GetBulgarianLeader] bedeuten würde."
 bftb_bulgaria_fate_of_the_balkans.7.a:0 "Wir sind nicht in der Lage, abzulehnen..."
 bftb_bulgaria_fate_of_the_balkans.7.b:1 "[ROOT.GetNameDefCap] wird sich niemals ausländischen Mächten unterwerfen!"
 bftb_bulgaria_fate_of_the_balkans.8.t:0 "[FROM.GetNameDefCap] Übermittelt an [BUL.GetNameDef]"
 bftb_bulgaria_fate_of_the_balkans.8.desc:0 "Seit [FROM.GetNameDef]s Eintritt in die [BUL.GetFactionName] haben wir Lobbyarbeit bei der Regierung betrieben, damit diese sich [GetBulgarianLeader] unterwirft. Nach unserer jüngsten Bestechung und Nötigung mehrerer [FROM.GetAdjective]-Minister wurde [FROM.GetLeader] gezwungen, einen Vertrag zu unterzeichnen, in dem [BUL.GetNameDef] offiziell als sein Oberherr anerkannt wird und durch den das [FROM.GetAdjective]-Volk endgültig unterworfen wurde."
 bftb_bulgaria_fate_of_the_balkans.8.a:0 "Die [FROM.GetAdjective]s kennen ihren Platz."
 bftb_bulgaria_fate_of_the_balkans.9.t:0 "[FROM.GetNameDefCap] verweigert die Übermittlung an [BUL.GetNameDef]"
 bftb_bulgaria_fate_of_the_balkans.9.desc:0 "Unerwartet hat die [FROM.GetAdjective]-Regierung beschlossen, [GetBulgarianLeader] herauszufordern. [FROM.GetLeader] hat heute öffentlich erklärt, dass er sich der [BUL.GetAdjective]-Regierung nicht unterwerfen wird. Eine mutige Entscheidung, die von der Mehrheit des [FROM.GetAdjective]-Volkes unterstützt wird, aber dennoch leichtsinnig, da das Volk unseren Schutz braucht, wenn sein erbärmlicher Staat die kommenden Konflikte überstehen soll. Und danach überdenkt [GetBulgarianLeader] bereits die [FROM.GetAdjective]-Mitgliedschaft in der [BUL.GetFactionName]..."
 bftb_bulgaria_fate_of_the_balkans.9.a:0 "Wir müssen weiterhin Druck auf sie ausüben!"
 bftb_bulgaria_fate_of_the_balkans.9.a_cooldown_tt:0 "Die Entscheidung zur §YUnterwerfung von [FROM.GetName]§! wird in §R365 Tagen§! wieder verfügbar sein!"
 bftb_bulgaria_fate_of_the_balkans.9.b:0 "Ihr Widerstand wird nicht ungestraft bleiben!"
 bftb_bulgaria_fate_of_the_balkans.10.t:0 "[BUL.GetNameDefCap] hat [FROM.GetNameDef] gezwungen, sich [BUL.GetFactionName] anzuschließen"
 bftb_bulgaria_fate_of_the_balkans.10.desc:0 "Nachdem er von der [BUL.GetAdjective]-Regierung ein Ultimatum erhalten hatte, hat [FROM.GetLeader] von [FROM.GetNameDef], der offensichtlich durch Drohungen gegen sein Land, seine Minister und sogar sich selbst unter Druck gesetzt wurde, dem [BUL.GetAdjective]-Druck nachgegeben und angekündigt, dass [FROM.GetNameDef] die [ROOT.GetFactionName] sofort verlassen und der [BUL.GetFactionName] beitreten werde."
 bftb_bulgaria_fate_of_the_balkans.10.a:0 "[BUL.GetNameDef] soll dafür bezahlen!"
 bftb_bulgaria_fate_of_the_balkans.10.b:0 "Eine erbärmliche Entscheidung eines erbärmlichen Anführers …"
 BUL_transferred_bulgarian_state_autonomy_desc:0 "Hat von Bulgarien beanspruchte Staaten hervorgebracht."

 bftb_bulgaria_political_leaders.1.t:0 "Der Mord an Hristo Lukov"
 bftb_bulgaria_political_leaders.1.desc:0 "Gestern Abend wurde [GetLukovLeader] von zwei [GetLukovPartisans] überfallen, die ihm vom Royal Cinema zu seinem Haus in der Artillery Street 1 folgten. \nAls der politische Anführer sein Haus betreten wollte, schoss einer der [GetLukovCriminals] aus nächster Nähe auf ihn und traf ihn an der Schulter. Anschließend packte Lukov den Mann und drückte ihn gegen eine Wand, bevor er versuchte, sich in das Gebäude zurückzuziehen. [GetLukovSecondAssailant] schoss ihm jedoch in den Rücken, packte dann ihren [GetLukovAccomplice] und floh durch den Nachbarhof. Der tödlich verwundete Hristo Lukov blieb am Eingang seines Hauses zurück. \n[GetLukovConclusion]"
 bftb_bulgaria_political_leaders.1.a:0 "Ernennen Sie einen neuen Leiter aus den Reihen der UBNL."
 bftb_bulgaria_political_leaders.1.b:0 "Wir brauchen jemanden mit einer radikaleren Ideologie ... Ernennen Sie Aleksandar Tsankov!"
 bftb_bulgaria_political_leaders.1.c:0 "Die Welt ist besser ohne ihn!"
 bftb_bulgaria_political_leaders.1.d:0 "Tragisch..."
 BUL_hristo_lukov_death_leader_party:0 "Hristo Lukov, Führer der Union der Bulgarischen Nationallegionen,"
 BUL_hristo_lukov_death_leader_country:0 "[ROOT.GetAdjective] Anführer Hristo Lukov"
 BUL_hristo_lukov_death_partisans_communism:0 "Mitglieder der Kampfgruppen der Bulgarischen Kommunistischen Partei, die"
 BUL_hristo_lukov_death_partisans_other:0 "Partisanen, die angeblich"
 BUL_hristo_lukov_death_criminals_communism:0 "Partisanen, Ivan Burudjiev,"
 BUL_hristo_lukov_death_criminals_other:0 "Kriminelle"
 BUL_hristo_lukov_death_second_assailant_communism:0 "Violeta Yakova, die zweite Agentin, die vom Opfer noch immer unbemerkt blieb"
 BUL_hristo_lukov_death_second_assailant_other:0 "ein zweiter Angreifer, der vom Opfer unbemerkt blieb und laut Zeugenaussagen eine Frau war"
 BUL_hristo_lukov_death_accomplice_communism:0 "Genosse"
 BUL_hristo_lukov_death_accomplice_other:0 "Komplize"
 BUL_hristo_lukov_death_conclusion_communism:0 ""
 BUL_hristo_lukov_death_conclusion_other:0 "Unser nationaler Sicherheitsdienst sucht bereits nach den Mördern, aber wir müssen über die Zukunft der Nation wachen und eine neue Person ernennen, die Hristo Lukov als Anführer von [ROOT.GetNameDef] ersetzt."
 bftb_bulgaria_greek_influence.1.t:0 "[BUL.GetNameDefCap] nähert sich der [GRE.GetAdjective]-Regierung"
 bftb_bulgaria_greek_influence.1.desc:0 "Der [BUL.GetAdjective] Premierminister [BUL.GetLeader] hat sich mit [ROOT.GetLeader] getroffen, um die Formalisierung der freundschaftlichen Beziehungen zwischen [BUL.GetNameDef] und [ROOT.GetNameDef] durch ein Friedensabkommen vorzuschlagen. Der [BUL.GetAdjective]-Führer hat außerdem [ROOT.GetAdjective] Kapitalisten, die im Nachbarland Tochtergesellschaften gründen möchten, bestimmte Steuervorteile angeboten."
 bftb_bulgaria_greek_influence.1.a:0 "[GRE.GetNameDefCap] und [BUL.GetNameDef] werden von nun an zusammenarbeiten!"
 bftb_bulgaria_greek_influence.1.b:0 "Wir können den [BUL.GetAdjective]s nicht vertrauen!"
 bftb_bulgaria_greek_influence.2.t:0 "[FROM.GetNameDefCap] stimmt unserem Vorschlag zu"
 bftb_bulgaria_greek_influence.2.desc:0 "Der [FROM.GetAdjective]-Anführer [FROM.GetLeader] hat unseren Vorschlag angenommen und ist bereit, unsere freundschaftlichen Beziehungen durch eine Vereinbarung zu formalisieren, die den Frieden zwischen [BUL.GetNameDef] und [FROM.GetNameDef] sicherstellt."
 bftb_bulgaria_greek_influence.2.a:1 "[BUL.GetNameDefCap] und [GRE.GetNameDef] werden von nun an zusammenarbeiten!"
 bftb_bulgaria_greek_influence.3.t:0 "Die [FROM.GetAdjective]-Regierung lehnte unseren Vorschlag ab"
 bftb_bulgaria_greek_influence.3.desc:0 "Der [FROM.GetAdjective]-Führer [FROM.GetLeader] hat erklärt, dass er dieser neuen [BUL.GetAdjective] Friedenspolitik nicht traut und hat daher unseren Vorschlag abgelehnt, freundschaftliche Beziehungen zwischen [FROM.GetNameDef] und [BUL.GetNameDef] zu formalisieren."
 bftb_bulgaria_greek_influence.3.a:0 "Sie sind zu stolz, um die Notwendigkeit einer Zusammenarbeit zu erkennen!"
 bftb_bulgaria_british_influence.1.t:0 "Die [BUL.GetAdjective]-Regierung sucht unseren Schutz"
 bftb_bulgaria_british_influence.1.desc:0 "Der bulgarische Premierminister [BUL.GetLeader] ist in unser Land gekommen, um mit [ENG.GetNameDef] ein Abkommen auszuhandeln, mit dem die Verpflichtung unseres Landes zum Schutz des bulgarischen Territoriums formalisiert werden soll. \nLaut [BUL.GetLeader] möchte seine Partei die Beziehungen zur [ENG.GetAdjective]-Regierung stärken, fürchtet jedoch um die territoriale Integrität von [BUL.GetNameDef], falls diese andere Großmächte mit bedrohlichen Ambitionen auf dem Balkan, wie die [GER.GetAdjective]s, [ITA.GetAdjective]s und [SOV.GetAdjective]s, zurückweist."
 bftb_bulgaria_british_influence.1.a:0 "Wir werden [BUL.GetNameDef] unter den Schutz von [ENG.GetAdjective] stellen."
 bftb_bulgaria_british_influence.1.b:0 "Wir stimmen der Unterzeichnung eines Nichtangriffspakts zu."
 bftb_bulgaria_british_influence.1.c:0 "Wir haben Wichtigeres zu erledigen."
 bftb_bulgaria_british_influence.2.t:0 "[FROM.GetNameDefCap] erklärt sich bereit, [BUL.GetAdjective] Unabhängigkeit zu garantieren"
 bftb_bulgaria_british_influence.2.desc:0 "Die [FROM.GetAdjective]-Regierung hat sich bereit erklärt, den von [BUL.GetLeader] vorgeschlagenen Vertrag zu unterzeichnen, der die Unabhängigkeit unseres Landes garantiert und eine weitere Verbesserung unserer Beziehungen in der Zukunft anstrebt."
 bftb_bulgaria_british_influence.2.a:0 "Wir stehen jetzt unter [ENG.GetAdjective]-Schutz!"
 bftb_bulgaria_british_influence.3.t:0 "[FROM.GetNameDefCap] stimmt der Unterzeichnung eines Nichtangriffspakts zu"
 bftb_bulgaria_british_influence.3.desc:0 "Obwohl die [FROM.GetAdjective]-Regierung der Unterzeichnung eines Vertrags zwischen [BUL.GetNameDef] und [FROM.GetNameDef] zugestimmt hat, weigert sich [FROM.GetLeader], die Unabhängigkeit unseres Landes offiziell zu garantieren, mit der Begründung, dass ein solches Vorgehen verheerende diplomatische Konsequenzen haben könnte, die die Lage nicht nur auf dem Balkan, sondern in ganz Europa verschärfen würden. \nDer [FROM.GetAdjective]-Führer scheint jedoch an der Entwicklung freundschaftlicher Beziehungen und der Förderung der Zusammenarbeit zwischen unseren Ländern interessiert zu sein."
 bftb_bulgaria_british_influence.3.a:0 "Es ist ein Anfang!"
 bftb_bulgaria_british_influence.4.t:0 "[ENG.GetNameDefCap] hat unseren Vorschlag abgelehnt"
 bftb_bulgaria_british_influence.4.desc:0 "Die [FROM.GetAdjective]-Regierung hat gezeigt, dass sie kein Interesse an einer Stärkung der Beziehungen zu unserem Land hat und hat unseren Vorschlag, ein Abkommen zur Unterstützung der Unabhängigkeit von [BUL.GetNameDef] und zur Entwicklung der Zusammenarbeit zwischen unseren Ländern zu formalisieren, rundweg abgelehnt."
 bftb_bulgaria_british_influence.4.a:0 "Verdammt seien diese Briten und ihre Sturheit!"
 bftb_bulgaria_democratic_international_policies.1.t:0 "[BUL.GetNameDefCap] Garantiert [ROOT.GetAdjective] Unabhängigkeit"
 bftb_bulgaria_democratic_international_policies.1.desc:0 "Die [BUL.GetAdjective]-Regierung hat heute erklärt, dass es die Pflicht von [BUL.GetNameDef] sei, die territoriale Integrität befreundeter Balkanstaaten gegen die Ambitionen kriegstreiberischer ausländischer Mächte zu schützen. \nZu diesem Zweck hat Premierminister [BUL.GetLeader] die Verpflichtung von [BUL.GetNameDef] zum Schutz der [ROOT.GetAdjective]-Nation sowie die Umsetzung einer Reihe neuer Maßnahmen zur Vorbereitung der Verteidigung des Balkans verkündet."
 bftb_bulgaria_democratic_international_policies.1.a:0 "Sehr rücksichtsvoll von ihnen!"
 bftb_bulgaria_democratic_international_policies.2.t:0 "[BUL.GetAdjective] Industrielle Investitionen"
 bftb_bulgaria_democratic_international_policies.2.desc:0 "[BUL.GetAdjective]-Tycoons haben in unserem Land zahlreiche Investitionen getätigt und eine Reihe von Tochterunternehmen gegründet, die unsere nationale Industrie ankurbeln werden. \nZweifellos ist dies Teil eines größeren Plans der [BUL.GetAdjective]-Regierung, ihren Einfluss zu vergrößern und ihre kapitalistischen Ideen in unserem Land zu verbreiten, aber vorerst können wir von dieser kleinen industriellen Expansion profitieren."
 bftb_bulgaria_democratic_international_policies.2.a:0 "Glauben sie, sie könnten unsere Politik so leicht beeinflussen?"
 bftb_bulgaria_democratic_international_policies.3.t:0 "[BUL.GetAdjective] Kapitalspritze"
 bftb_bulgaria_democratic_international_policies.3.desc:0 "Die [BUL.GetAdjective]-Regierung hat angeschlagene [ROOT.GetAdjective]-Unternehmen finanziell unterstützt, um den Finanzsektor unseres Landes zu stabilisieren. \nKeiner unserer Minister ist jedoch so naiv, auch nur eine Sekunde lang zu glauben, dass diese Aktion aus Solidarität oder Mitgefühl motiviert sein könnte. Es ist klar, dass die [BUL.GetAdjective]-Regierung mit dieser Kapitalspritze lediglich versucht, ihre Kontrolle über unsere Wirtschaft zu verstärken."
 bftb_bulgaria_democratic_international_policies.3.a:0 "Wir müssen vorsichtig sein ..."
 bftb_bulgaria_democratic_international_policies.4.t:0 "[BUL.GetAdjective] Territoriale Integrität"
 bftb_bulgaria_democratic_international_policies.4.desc:0 "Eine Delegation aus [BUL.GetNameDef] ist in unserem Land eingetroffen, um [ROOT.GetLeader] aufzufordern, die Legitimität der [BUL.GetAdjective]-Regierung in den ehemaligen bulgarischen Gebieten anzuerkennen, die derzeit von alliierten Truppen besetzt sind, und folglich die administrative Kontrolle über die Region an [BUL.GetNameDef] zurückzugeben."
 bftb_bulgaria_democratic_international_policies.4.a:0 "Die [ROOT.GetAdjective]-Regierung erkennt die territoriale Integrität Bulgariens an!"
 bftb_bulgaria_democratic_international_policies.4_tt:0 "§Y[BUL.GetNameWithFlag]§! wird Eigentümer und Kontrolleur von:"
 bftb_bulgaria_democratic_international_policies.4.b:0 "Das ist nicht möglich."
 bftb_bulgaria_democratic_international_policies.5.t:0 "[ENG.GetNameDefCap] Erkennt die territoriale Integrität Bulgariens an"
 bftb_bulgaria_democratic_international_policies.5.desc:0 "Unsere nach [ENG.GetNameDef] entsandte Delegation ist zurückgekehrt, nachdem sie mit ihrer Petition an die [ENG.GetAdjective]-Regierung Erfolg hatte. Diese hat zugestimmt, die Verwaltungskontrolle über die von alliierten Truppen besetzten ehemaligen bulgarischen Gebiete an [BUL.GetNameDef] zurückzugeben."
 bftb_bulgaria_democratic_international_policies.5.a:0 "Unser Volk freut sich über die Neuigkeiten!"
 bftb_bulgaria_democratic_international_policies.6.t:0 "[ENG.GetNameDefCap] Weigert sich, die territoriale Integrität Bulgariens anzuerkennen"
 bftb_bulgaria_democratic_international_policies.6.desc:0 "Leider ist es unserer nach [ENG.GetNameDef] entsandten Delegation nicht gelungen, die [ENG.GetAdjective]-Regierung dazu zu bewegen, uns die Verwaltungskontrolle über die ehemaligen bulgarischen Gebiete zu gewähren, die derzeit von alliierten Truppen besetzt sind."
 bftb_bulgaria_democratic_international_policies.6.a:0 "Sie verletzen unsere territoriale Integrität!"
 bftb_bulgaria_democratic_international_policies.7.t:0 "Der [ENG.GetAdjective]-[BUL.GetAdjective]-Pakt"
 bftb_bulgaria_democratic_international_policies.7.desc:0 "Die [ENG.GetAdjective]-Regierung hat eine diplomatische Delegation entsandt, um uns mitzuteilen, dass sie zugestimmt hat, die administrative Kontrolle über die von unseren Truppen besetzten ehemaligen bulgarischen Gebiete mit sofortiger Wirkung an die Regierung von [BUL.GetNameDef] zurückzugeben. \nAngesichts dieser Ereignisse und nach dem Scheitern unseres Versuchs, diese Entscheidung mit den [ENG.GetAdjective] auszuhandeln, war unsere Regierung gezwungen, die Kontrolle über diese besetzten Gebiete aufzugeben, um ein freundschaftliches Verhältnis zu unseren Verbündeten aufrechtzuerhalten."
 bftb_bulgaria_democratic_international_policies.7.a:0 "Dies ist eine Beleidigung für [ROOT.GetNameDef]"

 bftb_news.1.t:0 "Die [BUL.GetAdjective]-Regierung verurteilt die IMRO"
 bftb_news.1.desc:0 "Der [BUL.GetAdjective]-Vorsitzende [BUL.GetLeader] hat heute eine offizielle Erklärung veröffentlicht, in der er seine Ablehnung der Internen Mazedonischen Revolutionären Organisation (IMRO) zum Ausdruck bringt und deren Aktivitäten öffentlich verurteilt. \nDer [BUL.GetAdjective]-Innenminister kündigte außerdem die Umsetzung eines Pakets außerordentlicher Maßnahmen an, die es der Regierung ermöglichen sollen, mehr Ressourcen für aktive Maßnahmen gegen die IMRO bereitzustellen und diese Terrororganisation ein für alle Mal auszurotten. \nMit dieser Ankündigung scheint die [BUL.GetAdjective]-Regierung endlich eine der größten Konflikt- und Spannungsquellen auf dem Balkan beenden zu wollen."
 bftb_news.1.a:0 "Es wurde auch Zeit!"
 bftb_news.1.b:0 "Es ist Zeit, die IMRO zu zerstören!"
 bftb_news.1.c:0 "Es scheint, als seien die Tage der IMRO gezählt …"
 bftb_news.2.t:0 "Die [BUL.GetAdjective]-Regierung unterstützt die IMRO"
 bftb_news.2.desc:0 "Heute gab der [BUL.GetAdjective]-Vorsitzende [BUL.GetLeader] öffentlich bekannt, dass die Regierung mit Ivan Mihaylov, einem der wichtigsten Führer der Inneren Mazedonischen Revolutionären Organisation, über eine Einstellung der Feindseligkeiten zwischen der IMRO und den [BUL.GetAdjective]-Behörden verhandeln werde. Laut dem Innenminister sei die Zusammenarbeit mit dieser Organisation notwendig, um die vielen [BUL.GetNameDef] Mazedonier in [YUG.GetNameDef] und [GRE.GetNameDef] zu befreien. Diese kühne Aussage wird den Balkankonflikt zweifellos neu entfachen und die Spannungen zwischen den Großmächten, die in der Region Interessen haben, verschärfen."
 bftb_news.2.a:0 "Die Bulgaren spielen mit dem Feuer!"
 bftb_news.2.b:0 "Wir tun das Beste für Bulgarien."
 bftb_news.2.c:0 "Es scheint, als würde der Balkankonflikt neu aufflammen …"
 bftb_news.3.t:0 "Der Tod des bulgarischen Zaren Boris III."
 bftb_news.3.desc:0 "[GetBorisDeathContext]\n[GetSuspicionsAboutBorisDeath]"
 bftb_news.3.a:0 "Jetzt ruht er in Frieden ... Im Gegensatz zu seinem Land!"
 bftb_news.4.t:0 "Die Rückkehr von Zar Ferdinand I."
 bftb_news.4.desc:0 "Nach dem Tod des Zaren von Bulgarien, Boris III., traf die bulgarische Regierung die unerwartete Entscheidung, sich mit Boris&#39; Vater und ehemaligen Zaren Ferdinand I. zu treffen, um ihn zu bitten, wieder die Herrschaft über das Land zu übernehmen. \nNach einer langen Konferenz mit [GetFormerLeaderBeforeFerdinand] stimmte Ferdinand I., der kriegstreiberische Herrscher, der nach verheerenden Niederlagen im Zweiten Balkankrieg und im Ersten Weltkrieg zugunsten seines Sohnes abdanken musste, zu, nach Sofia zurückzukehren, um erneut zum Zaren von Bulgarien gekrönt zu werden."
 bftb_news.4.a:0 "Er ist der Herrscher, den [BUL.GetNameDef] braucht!"
 bftb_news.4.b:0 "Ist dieser altersschwache alte Mann überhaupt in der Lage zu regieren?"
 bftb_news.4.c:0 "Eine unerwartete Wendung der Ereignisse ..."
 BUL_former_leader_before_ferdinand_kyoseivanov:0 "Premierminister Georgi Kyoseivanov"
 BUL_former_leader_before_ferdinand_filov:0 "Premierminister Bogdan Filov"
 BUL_former_leader_before_ferdinand_mushanov:0 "Premierminister Nikola Mushanov"
 BUL_former_leader_before_ferdinand_lukov:0 "Premierminister Hristo Lukov"
 BUL_former_leader_before_ferdinand_tsankov:0 "Premierminister Aleksandar Zankow"
 BUL_former_leader_before_ferdinand_generic:0 "der bulgarische Premierminister"
 bftb_news.5.t:1 "Bulgarische Reintegrationskampagne auf dem Balkan"
 bftb_news.5.desc:1 "Die [BUL.GetAdjective]-Regierung hat eine massive Reintegrationskampagne in den besetzten Balkangebieten gestartet. Sie fördert die bulgarische Ansiedlung, ändert die Namen von Städten und Orten in die traditionellen bulgarischen Namen und organisiert die lokale Verwaltung nach bulgarischem Vorbild neu. \nMit diesen Maßnahmen hofft [BUL.GetLeader], den bulgarischen Charakter dieser Regionen zu demonstrieren und ihre künftige Annexion durch [BUL.GetNameDef] zu legitimieren."
 bftb_news.5.a:0 "[BUL.GetAdjective] Die Souveränität über diese Gebiete kann nicht länger diskutiert werden!"
 bftb_news.5.b:1 "Wie können sie es wagen, [DIESE.GetAdjective] Kultur zu zerstören?!"
 bftb_news.5.c:0 "Ein mutiger Schritt der Bulgaren ..."
 bftb_news.6.t:0 "Die Wiederherstellung des bulgarischen Patriarchats"
 bftb_news.6.desc:0 "Mit Unterstützung der Regierung übte das Exarchat von Bulgarien Druck auf den Patriarchen von Konstantinopel aus, die Autokephalie der Bulgarisch-Orthodoxen Kirche anzuerkennen. \nAngesichts dieser Forderungen, unterstützt durch ein drohendes [BUL.GetLeader], war das Ökumenische Patriarchat von Konstantinopel gezwungen, dem Heiligen Synod die Verabschiedung eines neuen Statuts zu gestatten, mit dem dieser das Oberhaupt der bulgarischen Kirche wählen und so nach mehr als sieben Jahrhunderten das bulgarische Patriarchat wiederherstellen kann."
 bftb_news.6.a:0 "Diese Leistung bereitet allen Bulgaren Freude!"
 bftb_news.6.b:0 "Eine interessante Entwicklung..."
 bftb_news.7.t:0 "Das Dritte Bulgarische Reich"
 bftb_news.7.desc:0 "Gestern fand in Sofia eine von der bulgarischen Regierung organisierte politische Großkundgebung statt. \nWährend der Veranstaltung verkündete [BUL.GetLeader] zum Erstaunen der meisten Zuhörer die Gründung des Dritten Bulgarischen Reiches und den Beginn einer neuen Ära für die große bulgarische Nation. \nDieser Rede folgte eine majestätische, aber feierliche Krönungszeremonie für [BUL.GetLeader] zum Kaiser von Bulgarien, bei der politische und militärische Führer dem Reich und seinem Herrscher die Treue schworen."
 bftb_news.7.a:0 "Das stärkt die bulgarische Nation!"
 bftb_news.7.b:0 "Sieht aus, als ob [BUL.GetLeader] Größenwahn hat …"
 bftb_news.7.c:0 "War das wirklich notwendig?"
 bftb_news.8.t:0 "Die Vaterländische Front erobert Bulgarien"
 bftb_news.8.desc:0 "Die Vaterländische Front ist eine antifaschistische bulgarische politische Organisation, die sich radikal gegen das autoritäre Regime von [FROM.GetLeader] stellt. Sie besteht aus Mitgliedern zahlreicher politischer Gruppen, ist jedoch stark kommunistisch beeinflusst. Sie wurde gegründet, um dem in Bulgarien herrschenden diktatorischen System entgegenzutreten. \nNach einem von dieser Organisation orchestrierten Aufstand brach ein gewaltsamer Bürgerkrieg zwischen den der bulgarischen Regierung treu ergebenen Truppen und den Anhängern der Vaterländischen Front aus. \nSchließlich ging der Krieg zu Ende, die Kommunisten stürzten das Regime von [FROM.GetLeader] und riefen die Volksrepublik Bulgarien aus."
 bftb_news.8.a:0 "Ein großer Sieg für das bulgarische Volk!"
 bftb_news.8.b:0 "Besorgniserregend..."
 bftb_news.9.t:0 "Die Balkanföderation der Sozialistischen Republiken"
 bftb_news.9.desc:0 "[BUL.GetNameDefCap] hat die [BUL.GetFactionName] gegründet, eine überarbeitete Version eines in den 1920er Jahren vorgeschlagenen Projekts, das sich damals als nicht sehr erfolgreich erwies. \nLaut dem bulgarischen Premierminister [BUL.GetLeader] strebt die [BUL.GetAdjective]-Regierung die Bildung einer Einheitsfront auf dem Balkan an, um einfallenden ausländischen Nationen entgegenzutreten, die die Region mit ihren territorialen Ambitionen bedrohen. \nOb dieses neue Projekt erfolgreich ist, bleibt abzuwarten, aber die Unterstützung für die Balkanföderation wächst in der Bevölkerung der Nachbarstaaten deutlich."
 bftb_news.9.a:0 "Das ist der Weg zum Fortschritt!"
 bftb_news.9.b:0 "Interessant..."
 bftb_news.9.c:0 "Ein weiterer Versuch, den Balkan zu vereinen, der scheitern wird …"
 bftb_news.10.t:0 "Die Vereinigung des Balkans"
 bftb_news.10.desc:0 "Die ehemalige Regierung von [BUL.GetOldNameDef] hat die Gründung der [BUL.GetNameDef] verkündet, mit der sie die [BUL.GetFactionName] einen Schritt weiterbringen will, indem sie die Mitglieder der Allianz dazu aufruft, sich unter einer einzigen zentralisierten Regierung zu vereinen. \nIn Übereinstimmung mit [BUL.GetLeader] strebt [BUL.GetNameDef] eine umfassende Zusammenarbeit zwischen den Balkanstaaten an, um alle Konflikte der Vergangenheit hinter sich zu lassen und die Einheit der Völker des Balkans zu fördern."
 bftb_news.10.a:0 "Der Traum wird wahr!"
 bftb_news.10.b:1 "Ist es das, was [THIS.GetNameDef] wirklich braucht?" #THIS
 bftb_news.10.c:0 "Ist es das, was der Balkan wirklich braucht?"
 bftb_news.10.d:0 "Unsinn!"
 bftb_news.11.t:0 "[BUL.GetNameDefCap] Ansätze [GER.GetNameDef]"
 bftb_news.11.desc:0 "\nDie [BUL.GetAdjective]-Regierung hat mit mehreren [GER.GetAdjective]-Unternehmen ein Handelsabkommen unterzeichnet, um die Beziehungen zu [GER.GetNameDef] zu stärken und gleichzeitig ausländisches Kapital in das Land zu pumpen. \nIm Rahmen dieses Abkommens erhalten [GER.GetAdjective]-Investoren erhebliche rechtliche Vorteile und Steuerermäßigungen, wenn sie in [BUL.GetNameDef] tätig sind."
 bftb_news.11.a:0 "Dies wird unsere Beziehung zu [GER.GetNameDef] verbessern!"
 bftb_news.11.b:0 "Dies wird die [BUL.GetAdjective]s ermutigen, sich auf unsere Seite zu stellen!"
 bftb_news.11.c:1 "Wird [BUL.GetNameDef] dann [GER.GetFactionName] beitreten?"
 bftb_news.11.d:0 "Sie suchen nur den Schutz von [GER.GetLeader]!"
 bftb_news.12.t:0 "[ITA.GetAdjective]-[BUL.GetAdjective] Militärtechnologie-Austausch"
 bftb_news.12.desc:0 "\nNachdem [BUL.GetNameDef] Kontakt zur [GER.GetAdjective]-Regierung aufgenommen hat, möchte das Land nun seine Beziehungen zu [ITA.GetNameDef] stärken. \n[BUL.GetLeader] und [ITA.GetLeader] haben ein Forschungsabkommen unterzeichnet, das von Experten beider Länder ausgearbeitet wurde, um die Entwicklung moderner Militärausrüstung für ihre Streitkräfte zu fördern. \nNeben diesem Abkommen hat die [BUL.GetAdjective]-Regierung neue Wirtschaftsvorschriften erlassen, um Investitionen von [ITA.GetAdjective]-Kapital im Land zu fördern."
 bftb_news.12.a:0 "Das wird eine fruchtbare Beziehung!"
 bftb_news.12.b:0 "Die [BUL.GetAdjective]s müssen sich noch als gute Verbündete von [ITA.GetNameDef] beweisen."
 bftb_news.12.c:0 "Die Bulgaren scheinen verzweifelt auf der Suche nach neuen Freunden zu sein …"
 bftb_news.12.d:0 "Sie haben es mit dem Teufel zu tun ..."
 bftb_news.13.t:0 "[SOV.GetAdjective]-[BUL.GetAdjective] Vertrag über gegenseitige Unterstützung"
 bftb_news.13.desc:0 "\n Der [BUL.GetAdjective] Premierminister [BUL.GetLeader] und der [SOV.GetAdjective] Staatschef [SOV.GetLeader] haben ein Abkommen unterzeichnet, mit dem sie die Beziehungen zwischen beiden Ländern stärken und die Zusammenarbeit in militärischen und wirtschaftlichen Angelegenheiten fördern wollen. \nMit diesem Vertrag beabsichtigt die [BUL.GetAdjective] Regierung außerdem, den Handel mit [SOV.GetNameDef] anzukurbeln und [SOV.GetAdjective] Kapital für neue Industrieinvestitionen zu verwenden."
 bftb_news.13.a:0 "Dieser Vertrag ist außerordentlich vorteilhaft für [BUL.GetNameDef]!"
 bftb_news.13.b:0 "Der sowjetische Einfluss auf dem Balkan wächst!"
 bftb_news.13.c:1 "Wird [BUL.GetNameDef] dann [SOV.GetFactionName] beitreten?"
 bftb_news.13.d:0 "Sie suchen nur [SOV.GetAdjective] Schutz!"
 bftb_news.14.t:0 "Ein Vertrag ewiger Freundschaft auf dem Balkan"
 bftb_news.14.desc:0 "Als ersten Schritt zur Wiederherstellung der Beziehungen zwischen [BUL.GetNameDef] und seinen Balkannachbarn hat die [BUL.GetAdjective]-Regierung einen Freundschaftsvertrag mit [YUG.GetNameDef] unterzeichnet, in dem beide Länder ihre Verpflichtung zur Entwicklung freundschaftlicher Beziehungen und zur Förderung der wirtschaftlichen Zusammenarbeit formalisieren. \nManche behaupten, die wahren Absichten der [BUL.GetAdjective]-Regierung gingen über den Aufbau freundschaftlicher Beziehungen zu ihren Nachbarn hinaus und ihr eigentliches Ziel sei die Gründung einer Balkanföderation als Konfrontation mit den europäischen Großmächten. \nDoch im Moment sind diese Aussagen nichts weiter als reine Spekulationen ..."
 bftb_news.14.a:0 "Dies wird endlich etwas Stabilität auf den Balkan bringen!"
 bftb_news.14.b:0 "Ein verzweifelter Versuch, unseren Vormarsch im Krieg zu stoppen!"
 bftb_news.15.t:0 "Das Saloniki-Abkommen"
 bftb_news.15.desc:0 "[BUL.GetAdjective] Premierminister [BUL.GetLeader] hat sich mit [GRE.GetLeader] in der [GRE.GetAdjective] Hauptstadt getroffen, um die Unterzeichnung eines Vertrags zu besprechen, mit dem sich die Regierungen beider Länder offiziell dazu verpflichten, freundschaftliche Beziehungen zu pflegen und die wirtschaftliche Zusammenarbeit zwischen [BUL.GetNameDef] und [GRE.GetNameDef] zu fördern. \nLaut [BUL.GetLeader] ist dies nur der erste Schritt in dem Versuch, die Beziehungen zwischen [BUL.GetNameDef] und seinen Nachbarn wieder aufzubauen, ein Unterfangen, das sich in naher Zukunft als sehr fruchtbar erweisen könnte."
 bftb_news.16.t:0 "[BUL.GetNameDefCap] Ansätze [ENG.GetNameDef]"
 bftb_news.16.desc:0 "\nDie [BUL.GetAdjective]-Regierung suchte die Unterstützung einer Großmacht, die in der Lage wäre, die Unabhängigkeit und territoriale Integrität von [BUL.GetNameDef] zu garantieren, und entsandte eine diplomatische Delegation nach [ENG.GetNameDef], um mit der [ENG.GetAdjective]-Regierung über die Unterzeichnung eines Vertrags zu verhandeln. \nNeben den Klauseln zu militärischen Fragen enthält dieser Vertrag auch ein Wirtschaftsabkommen, das [ENG.GetAdjective]-Kapitalisten erhebliche Steuervorteile gewährt, wenn sie in [BUL.GetNameDef] tätig sind."
 bftb_news.16.a:0 "Dies wird unsere Beziehung zu [ENG.GetNameDef] verbessern!"
 bftb_news.16.b:0 "Dies wird die [BUL.GetAdjective]s ermutigen, sich auf unsere Seite zu stellen!"
 bftb_news.16.c:1 "Wird [BUL.GetNameDef] dann der [ENG.GetFactionName] beitreten?"
 bftb_news.16.d:0 "Sie suchen nur den Schutz von [ENG.GetLeader]!"

 bftb_news.201.t:0 "[TUR.GetNameDefCap] Remilitarisierung der türkischen Meerengen"
 bftb_news.201.desc:0 "[TUR.GetNameDefCap] und [SOV.GetNameDef] haben sich auf eine Revision des Vertrags von Lausanne geeinigt, der unterzeichnet und umgesetzt wurde, nachdem die junge Republik Türkei die Entente im [TUR.GetAdjective] Unabhängigkeitskrieg zurückgeschlagen hatte. Der Vertrag wurde lange als Angriff auf die [TUR.GetAdjective] Souveränität verurteilt, doch heute wurde er schließlich zugunsten der neu in Kraft getretenen Montreux-Konvention geändert. \n\n[TUR.GetNameDefCap] hat nun die vollständige Kontrolle über den Verkehr, der durch die türkischen Meerengen hinein- und hinausfließt, und die Anrainerstaaten der Meerenge wurden von [TUR.GetNameDef] remilitarisiert. [ENG.GetAdjective] Beobachter, die an dem Prozess beteiligt waren, sind lediglich zufrieden, dass ein Konflikt in der Region vermieden werden konnte."
 bftb_news.201.a:1 "So sei es."
 bftb_news.201.b:0 "Ein großer Tag für den Frieden."
 bftb_news.201.c:0 "Ein weiterer Vertrag des Ersten Weltkriegs wurde gebrochen."
 bftb_news.201.d:0 "Gut für [TUR.GetNameDef]."

 bftb_news.202.t:0 "Die türkischen Meerengen bleiben entmilitarisiert"
 bftb_news.202.desc:0 "[TUR.GetNameDefCap] und [SOV.GetNameDef] konnten sich nicht auf eine Revision des Vertrags von Lausanne einigen, der in Kraft trat, nachdem die junge Republik Türkei die Entente im [TUR.GetAdjective] Unabhängigkeitskrieg zurückgeschlagen hatte. Mit dem Vertrag von Lausanne wurden die türkischen Meerengen entmilitarisiert und sowohl die Dardanellen als auch der Bosporus für den uneingeschränkten zivilen und militärischen Verkehr geöffnet. Dies wird auf absehbare Zeit wohl auch so bleiben. \n\n[TUR.GetLeader] verurteilte die Entscheidung in einer im Rundfunk übertragenen Rede an die Nation, in der er anprangerte, dass [TUR.GetNameDef] weiterhin Zielscheibe des hartnäckigen Imperialismus sei. [ENG.GetAdjective]-Beobachter, die an dem Prozess beteiligt waren, sind lediglich zufrieden, dass ein Konflikt in der Region vermieden werden konnte."
 bftb_news.202.a:1 "Sie hatten Recht, unsere Macht zu fürchten."
 bftb_news.202.b:0 "Was hätten wir sonst tun können?"
 bftb_news.202.c:0 "Hätten wir mehr tun können?"
 bftb_news.202.d:0 "Zumindest wurde der Krieg abgewendet …"
 bftb_news.202.e:0 "Ein Zeichen der Schwäche von [TUR.GetNameDef] …"

 bftb_news.203.t:0 "Der [TUR.GetAdjective]-[SOV.GetAdjective]-Krieg"
 bftb_news.203.desc:0 "Was eine harmlose Neuverhandlung eines Jahrzehnte alten Vertrags hätte sein sollen, eskalierte stattdessen zu einem totalen Krieg zwischen [SOV.GetNameDef] und [TUR.GetNameDef] um die Genehmigungen für die türkischen Meerengen. \n\n[TUR.GetLeader] bezeichnete das Scheitern der Verhandlungen und den Ausbruch des Krieges als „bedauerlich“ und als etwas, das „völlig vermeidbar“ gewesen sei. [SOV.GetLeader] seinerseits sagte, die unbesiegbaren Armeen von [SOV.GetNameDef] würden vor absolut nichts zurückschrecken, um sicherzustellen, dass die alten Verträge des Ersten Weltkriegs in Kraft bleiben. [SOV.GetLeader] versprach außerdem, dass die Befreiung der [TUR.GetAdjective]-Arbeiter unmittelbar bevorstehe und dass die Vernichtung des gegenwärtigen [TUR.GetAdjective]-Regimes ein großer Sieg für die internationale kommunistische Sache sein werde."
 bftb_news.203.a:1 "Uraaaaah!"
 bftb_news.203.b:0 "Bring es an!"
 bftb_news.203.c:0 "Meine Güte, was für eine Katastrophe ..."
 bftb_news.203.d:0 "Was ist aus der guten alten Diplomatie geworden?"
 bftb_news.203.e:0 "Hm, wir sollten darüber nachdenken, die [TUR.GetAdjective] Kriegsanstrengungen zu unterstützen …"
 bftb_news.203.f:0 "Schrecklich."

 bftb_news.204.t:0 "Bürgerkrieg in [TUR.GetNameDef]!"
 bftb_news.204.desc:1 "In [TUR.GetNameDef] ist ein Bürgerkrieg zwischen der konservativen Regierung und den ehemals regierenden Kemalisten ausgebrochen. Die Kemalisten, die nach dem Zusammenbruch des Osmanischen Reiches für die Unabhängigkeit [TUR.GetNameDef]s kämpften und diese sicherten, nannten die zahlreichen eklatanten Verfassungsverletzungen der aktuellen Regierung als ausreichenden Grund, ihr Regime zu stürzen. Der Stargeneral und bekennende Kemalist Kâzım Orbay wurde zum Anführer einer Militärjunta gewählt, deren Ziel der Sturz der aktuellen islamistischen Regierung von [TUR.GetLeader] ist. \n\n[TUR.GetLeader] verurteilte das Vorgehen der Kemalisten als unpassend für ein wirklich funktionierendes demokratisches Land und gelobte, die Rechtsstaatlichkeit in seinem zersplitterten Land wiederherzustellen."
 bftb_news.204.a:1 "Wir müssen uns durchsetzen!"
 bftb_news.204.b:0 "Was für schreckliche Neuigkeiten ..."
 bftb_news.204.c:0 "Hier gibt es eine Chance ..."
 bftb_news.204.d:0 "Hey, darüber wissen wir das eine oder andere!"

 bftb_news.205.t:0 "Das osmanische Sultanat wird wiedergeboren"
 bftb_news.205.desc:1 "Zum Entsetzen der ganzen Welt wurde der osmanische Sultan nach einem besonders brutalen Bürgerkrieg zwischen den Konservativen und den säkularen Kemalisten des Landes wieder auf den Thron gesetzt. In einer extravaganten Zeremonie, die direkt aus dem Mittelalter zu stammen scheint, wurde der Sultan in seinen früheren Posten zurückversetzt und Mustafa Kemal Atatürks Republik für immer aufgelöst. \n\n[TUR.GetLeader] hielt eine Rede vor seinem neugeborenen Sultanat und drückte eine Mischung aus Überraschung und Demut über die Wiedereinsetzung in seinen alten Rang aus. Der neue Sultan ist ein sanftmütiger Mann, doch er ist von einem Hofstaat aus Kriegstreibern und Irredentisten umgeben. Experten, die eine Rückkehr des Sultans nie für möglich gehalten hatten, haben keine Ahnung, was die Zukunft bringen könnte."
 bftb_news.205.a:1 "Alhamdulillah!"
 bftb_news.205.b:0 "Oh nein, nicht schon wieder!"
 bftb_news.205.c:0 "Wie ist das passiert!?"
 bftb_news.205.d:0 "Huch, interessant..."
 bftb_news.205.e:0 "Bizarr."

 bftb_news.206.t:0 "Beginn des Mittelmeerpakts"
 bftb_news.206.desc:0 "[ITA.GetLeader] und [TUR.GetLeader] haben die Gründung eines neuen Bündnisblocks im Mittelmeerraum angekündigt, der unter dem Namen „[TUR.GetFactionName]“ bekannt ist. [ITA.GetLeader] versprach, dass ihr Pakt als führende Führer des europäischen Kontinents alle europäischen Angelegenheiten dominieren werde, während [TUR.GetLeader] sich gemäßigter äußerte und Diplomaten versicherte, dass das Bündnis rein strategischer Natur sei und die Sicherheit auf dem Balkan und in den Mittelmeerländern erhöhen solle. \n\n[ENG.GetAdjective]-Beamte bezeichneten die neue regionale Truppe als „nicht hilfreich und unwillkommen“, während [GER.GetAdjective]-Beobachter sich deutlich eindeutiger äußerten und vorhersagten, dass die Fraktion bis zum Ende des Jahrzehnts kaum mehr als eine Fußnote in der Geschichte sein werde."
 bftb_news.206.a:1 "Hurra!"
 bftb_news.206.b:0 "Was für Idioten!"
 bftb_news.206.c:0 "Schwächlinge!"
 bftb_news.206.d:0 "Ein weiterer Konkurrent mischt mit."
 bftb_news.206.e:0 "Was bedeutet das für Europa?"

 bftb_news.207.t:1 "[TUR.GetNameDefCap] Verpflichtet sich zur Sicherheit auf dem Balkan"
 bftb_news.207.desc:0 "[TUR.GetLeader] wandte sich heute an die Welt, als er erklärte, dass [TUR.GetNameDef] seine balkanzentrierte Außenpolitik ausbauen wolle, indem es die Unabhängigkeit aller kooperierenden Nationen dort garantiere. Internationalen Beobachtern scheint es, als habe [TUR.GetNameDef] eine entschiedenere Haltung eingenommen und sich dafür entschieden, die Beziehungen zu Großmächten zu minimieren, um sich auf die regionale Sicherheit zu konzentrieren. \n\nObwohl die Entscheidung von [TUR.GetAdjective] von einigen gelobt wurde, löst sie bei anderen erhebliche Bestürzung aus. Insbesondere [ITA.GetAdjective]-Beamte reagierten mit einiger Besorgnis und flehten die [TUR.GetAdjective]-Regierung an, ihre Position zu widerrufen, wenn sie das Risiko eines Konfliktausbruchs in der Region minimieren wolle. Die [TUR.GetAdjective]-Regierung bezeichnete [ITA.GetNameDef] daraufhin als „regionalen Antagonisten“."
 bftb_news.207.a:1 "Unser Schicksal erwartet uns."
 bftb_news.207.b:0 "Gott sei Dank."
 bftb_news.207.c:0 "Das wird problematisch."
 bftb_news.207.d:0 "Hmm."

 bftb_news.208.t:0 "[TUR.GetNameDefCap] fordert die Rückkehr der Grenzen von 1920"
 bftb_news.208.desc:1 "[TUR.GetNameDefCap] hat angekündigt, die Landesgrenzen wieder so ziehen zu wollen, wie sie vor der Ratifizierung des Nationaleids durch [TUR.GetNameDef] verliefen. Die [TUR.GetAdjective]-Regierung hat Ansprüche auf fast alle Nachbarstaaten erhoben und Aufforderungen, diese unberechtigten Ansprüche zurückzunehmen, zurückgewiesen. \n\nDie internationale Gemeinschaft hat die [TUR.GetAdjective]-Regierung für ihre Entscheidung scharf verurteilt und weltweit herrscht die Sorge, dass das rücksichtslose Vorgehen der [TUR.GetAdjective]-Führung die globale Verwüstung, die die Welt in den letzten Jahren erlebt hat, nur noch verschlimmern könnte. [TUR.GetNameDefCap] scheint seinem revanchistischen Kurs treu zu bleiben, aber nur die Zeit wird zeigen, was die Folgen ihres Regierungskurses sein werden."
 bftb_news.208.a:1 "Wir können uns nicht mit [TUR.GetAdjective]-Schemata befassen."
 bftb_news.208.b:0 "Ein Embargo erscheint angemessen."
 bftb_news.208.c:0 "Kriegstreiber!"
 bftb_news.208.d:0 "Wir wollen nur das, was uns rechtmäßig zusteht."
 bftb_news.208.e:0 "Sie machen die Dinge nur noch schlimmer!"

 bftb_news.209.t:0 "Die Ankunft von Turan"
 bftb_news.209.desc:1 "Die türkischen Eroberungen sind so weit fortgeschritten, dass die türkische Regierung es für gerechtfertigt hielt, sich selbst als [TUR.GetNameDef] zu proklamieren. Der Beginn dieses neuen Reiches löste weltweit Schock aus, da nur wenige Beobachter glaubten, dass sich die Türkei in den folgenden Jahrzehnten überhaupt vollständig von ihrem Unabhängigkeitskrieg erholen könnte – geschweige denn ein völlig neues, Kontinente umspannendes Reich errichten könnte. \n\nWenn man Berichten Glauben schenken darf, ist die rasante Expansion des neu gegründeten [TUR.GetAdjective] möglicherweise noch nicht abgeschlossen. [TUR.GetLeader] erklärte, dass es seine Eroberungen nicht einstellen werde, bis jeder Türke der Welt befreit sei. Die Welt kann nur mit angehaltenem Atem weiter zusehen."
 bftb_news.209.a:1 "Wir sind nicht aufzuhalten."
 bftb_news.209.b:0 "Wie...?"

 bftb_news.301.t:0 "Der [GRE.GetAdjective] Bürgerkrieg!"
 bftb_news.301.desc:1 "In [GRE.GetNameDef] ist ein Bürgerkrieg zwischen den Kräften des Königs, der das griechische Parlament aufgelöst hat, und den republikanischen und kommunistischen Kräften, die den demokratischen Prinzipien von [GRE.GetNameDef] treu sind, ausgebrochen. Trotz großer Feindseligkeit zwischen Republikanern und Kommunisten haben sie sich zusammengeschlossen, um einen unbeliebten ausländischen König zu stürzen, der sich als tyrannischer Despot über die gesamte [GRE.GetAdjective] Nation erhoben hat. \n\n[GRE.GetLeader] hat versprochen, dass weder er noch die ihm treuen monarchistischen Kräfte ihre Kämpfe einstellen werden, bis alle antimonarchistischen Kräfte aus der Nation vertrieben sind."
 bftb_news.301.a:1 "Versammelt euch zum König!"
 bftb_news.301.b:0 "Eine royalistische Regierung könnte uns gute Dienste leisten …"
 bftb_news.301.c:0 "Gut, gut – reißt euch in Stücke!"
 bftb_news.301.d:0 "Wird Griechenland jemals eine Pause machen?"

 bftb_news.302.t:0 "Die Gründung Großgriechenlands"
 bftb_news.302.desc:0 "Beobachter auf der ganzen Welt, die sich fragten, worum es bei der geheimen Konvention in Heraklion ging, an der zahlreiche Teilnehmer aus ganz Europa teilnahmen, müssen sich diese Fragen nicht mehr stellen, denn heute hat [GRE.GetLeader] erklärt, dass der [GRE.GetAdjective] Traum eines Großgriechenlands endlich Wirklichkeit geworden ist. \n\nExperten haben ihre Überraschung über die schnelle Expansion von [GRE.GetNameDef] zum Ausdruck gebracht und politische Unruhen und tief verwurzelte wirtschaftliche Probleme als Gründe dafür genannt, dass ein [GRE.GetAdjective] Umbruch unwahrscheinlich erschien, doch die jüngsten Ereignisse haben ihnen das Gegenteil bewiesen."
 bftb_news.302.a:1 "Unser Traum ist endlich erfüllt!"
 bftb_news.302.b:0 "Normalerweise würden wir ein solches Verhalten nicht dulden, aaaaber …"
 bftb_news.302.c:0 "Es wird ihnen nichts nützen!"
 bftb_news.302.d:0 "Wow."

