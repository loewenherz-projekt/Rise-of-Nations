### Focuses
SWE_modernizing_the_air_force:0 "Modernisierung der Luftwaffe"
SWE_modernizing_the_air_force_desc:0 "Die schwedische Luftwaffe ist selbst im Vergleich zum schwedischen Militär insgesamt klein und besteht, was noch schlimmer ist, aus einer kleinen, zufälligen Anzahl ausländischer Modelle. Wenn die schwedische Luftwaffe zu einer Bedrohung jeglicher Art werden soll, müssen wir ihre Mängel beheben."
SWE_contract_cvm:0 "Vertrags-CVM"
SWE_contract_cvm_desc:0 "Centrala Flygverkstaden Malmslätt hat einen entscheidenden Beitrag zur Reparatur und Wartung unserer Flugzeuge geleistet. Durch die Bereitstellung von Finanzmitteln könnte das Unternehmen seinen Tätigkeitsbereich von der Wartung und Reparatur auf die Entwicklung der Marinefliegerei ausweiten."
SWE_hire_junkers:0 "Junkers mieten"
SWE_hire_junkers_desc:0 "Dank der Unterstützung von Junkers konnten wir die Grundlage für unser Sturzkampfbomberprogramm schaffen. Wir sollten ihnen jedoch anbieten, hier in Schweden ein ständiges Büro einzurichten, damit wir ihr Wissen besser nutzen können."
SWE_torpedo_bombers:0 "Torpedobomber"
SWE_torpedo_bombers_desc:0 "Torpedobomber sind in der Ostsee eine gefürchtete Macht, da sie Großkampfschiffe zu einem Bruchteil der Kosten versenken können. Wenn wir unsere Forschung und Entwicklung auf diesen Bereich konzentrieren, können wir die Meere beherrschen!"
SWE_contract_ffvs:0 "Vertrag FFVS"
SWE_contract_ffvs_desc:0 "Der letzte Krieg hat gezeigt, wie wichtig die Luftüberlegenheit ist. Feindliche Flugzeuge könnten auf schwedischem Territorium unermesslichen Schaden anrichten. Daher sollte es oberste Priorität haben, sicherzustellen, dass wir über moderne Kampfflugzeuge verfügen, um sie fernzuhalten."
SWE_license_republic_aviation:0 "Lizenz Republic Aviation"
SWE_license_republic_aviation_desc:0 "Obwohl wir die P-35, die wir von Republic Aviation gekauft haben, noch nicht erhalten haben, könnten wir sie bitten, uns stattdessen die Produktion ihrer Entwürfe hier in Lizenz zu gestatten."
SWE_flygverkstaderna:0 "Flygverkstäderna"
SWE_flygverkstaderna_desc:0 ""
SWE_contract_saab:0 "Vertrag SAAB"
SWE_contract_saab_desc:0 "Seit der Gründung von SAAB hat sich das Unternehmen als kompetenter Flugzeughersteller erwiesen. Dies sollten wir nutzen und dabei helfen, das Unternehmen zu einem der besten Flugzeugkonstrukteure Europas zu machen."
SWE_work_with_hawker:0 "Arbeiten Sie mit Hawker"
SWE_work_with_hawker_desc:0 "Der Kauf von Hawker Hart-Flugzeugen hat sich für unsere junge Luftwaffe als fruchtbar erwiesen. Da die Forschung auf diesem Gebiet jedoch stetig voranschreitet, sollten wir versuchen, nicht ins Hintertreffen zu geraten. Die Zusammenarbeit mit Hawker bei der Entwicklung und Produktion von Flugzeugen wäre eine Möglichkeit, den Rückstand zu minimieren und gleichzeitig die lokalen Unternehmen auf andere Bereiche zu konzentrieren."
SWE_dual_engine_planes:0 "Zweimotorige Flugzeuge"
SWE_dual_engine_planes_desc:0 "Da unsere Kapazitäten zur Flugzeugproduktion begrenzt sind, sollten wir uns vielleicht mit der Entwicklung von Flugzeugen befassen, die eine größere Reichweite und eine stärkere Schlagkraft haben."
SWE_swedish_nine:0 "Schwedische Neun"
SWE_swedish_nine_desc:0 "Indem wir Sturzkampfbomber in drei Dreiergruppen gruppieren und uns auf ein einzelnes Ziel konzentrieren, während wir aus mehreren Richtungen angreifen, können wir unsere Chancen erhöhen, feindliche Konvois zu versenken und gleichzeitig die Verluste zu begrenzen."

### Ideas
SWE_swedish_nine_tactic:0 "Schwedische Neun-Taktik"
SWE_swedish_nine_tactic_desc:0 "Indem wir Sturzkampfbomber in drei Dreiergruppen gruppieren und uns auf ein einzelnes Ziel konzentrieren, während wir aus mehreren Richtungen angreifen, können wir unsere Chancen erhöhen, feindliche Konvois zu versenken und gleichzeitig die Verluste zu begrenzen."

