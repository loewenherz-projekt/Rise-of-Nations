SWE_industrial_ramp_up_decs:0 "Zwangsweise Überstunden der Arbeiter und erhöhte Quoten sind eine großartige Möglichkeit, die Produktionskapazitäten zu steigern, doch der Wille der Bevölkerung wird in diesen Zeiten schwächer."



