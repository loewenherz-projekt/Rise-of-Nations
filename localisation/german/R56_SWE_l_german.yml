SWE_folkhemmet_idea:0 "Folkhemmet"
SWE_saltsjobad:0 "Saltsjöbad"
SWE_the_winter_war_volunteers_idea:0 "Die Freiwilligen des Winterkriegs"
SWE_recruit_volunteers_for_the_finnish_army:0 "Rekrutieren Sie Freiwillige für die finnische Armee"
SWE_offer_concessions_to_soviets:0 "Machen Sie Zugeständnisse an [SOV.getAdjective]"
SWE_offer_concessions_to_soviets_desc:0 "Angesichts der drohenden Invasion werden wir eine Versöhnung mit unseren Feinden anstreben. Gotland wird zur wichtigsten Handelskarte für das Leben unserer Männer."
SWE_norwegian_danish_resistance_stage_0:0 "[ROOT.GetAdjective] Widerstandskämpfer"
