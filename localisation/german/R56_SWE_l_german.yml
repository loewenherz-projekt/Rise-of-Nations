### Tooltips
SWE_divide_germany_france_tt:0 "Stimmen Sie der Teilung „Deutschlands“ zu. „Frankreich“ erhält Ansprüche auf das Rheinland und „Schweden“ erhält Ansprüche auf die Küste „Deutschlands“."
SWE_second_brother_tt:0 "Nach Abschluss des Schwerpunkts „Der Skandinavische Rat“ erhalten wir Kerne zu „Norwegen“, sofern wir diesen Schwerpunkt zuvor abgeschlossen haben."
SWE_third_brother_tt:0 "Nach Abschluss des Schwerpunkts „Der Skandinavische Rat“ erhalten wir Kerne zu „Dänemark“, sofern wir diesen Schwerpunkt zuvor abgeschlossen haben."
SWE_fourth_brother_tt:0 "Nach Abschluss des Schwerpunkts „Der Skandinavische Rat“ erhalten wir Kerne zu „Finnland“, sofern wir diesen Schwerpunkt zuvor abgeschlossen haben."
SWE_unite_scandinavia_tt:0 "Die skandinavischen Mitglieder unserer Fraktion werden mit der Frage der Vereinigung konfrontiert. Sollten sie zustimmen, werden wir sie annektieren und in die folgenden Schwerpunkte integrieren."

sweden.66.t:0"Die Sowjets lehnen unser Angebot ab!"
sweden.66.d:0"Die Sowjets haben unser vorgeschlagenes Abkommen abgelehnt. Dies ist ein tragischer Schlag für die kommunistischen Interessen in Skandinavien."
sweden.66.a:0"Falsche Kommunisten!"

sweden.67.t:0"Die Sowjets nehmen unser Angebot an!"
sweden.67.d:0"Die weisen Führer der UdSSR haben unser Angebot angenommen und sind stolz, im Kampf gegen den Kapitalismus an unserer Seite zu stehen."
sweden.67.a:0"Tolle Neuigkeiten!"

sweden.70.t:0"Der König beruft die Regierung ein"
sweden.70.d:0"Gustaf V. hat ein Treffen mit mehreren hochrangigen Politikern Schwedens einberufen, insbesondere mit denen der NSAP. Er ist in letzter Zeit besorgt über die autoritären Ansichten der NSAP und sieht den Kommunismus zwar als Gegner, sieht ihn aber nicht als besonders große Bedrohung an, wie die NSAP. Könnte der König von der Bedrohung durch die Bolschewiken überzeugt werden, wäre dies ein großer Gewinn für die Popularität der NSAP in der Bevölkerung …"
sweden.70.a:0"Zeigen Sie ihm die Übel des Kommunismus."
sweden.70.b:0"Seine Meinung spielt keine Rolle."

sweden.72.t:0"Royalistische Zeitungen"
sweden.72.d:0"Es scheint, als hätte König Gustaf die Sache mit dem Exil nicht mit dem erhofften Humor aufgenommen. Er hat sich mit einer Gruppe von Dissidenten zusammengetan, um Verleumdungen über unsere Regierung zu verbreiten! Dieser alte Narr ist einfach nur neidisch, dass ER keinen Machtsitz mehr bekommt."
sweden.72.a:0"Beschlagnahmt und verbrennt die Publikationen!"
sweden.72.b:0"Der Aufwand lohnt sich nicht."

sweden.75.t:0"Vereint euch mit den Finnland-Schweden"
sweden.75.d:0"Einige unserer neu erworbenen Gebiete in Finnland sind mehrheitlich schwedisch und würden problemlos unter schwedischer Herrschaft statt als Teil Finnlands regiert werden. Natürlich würde dies einen schwächeren finnischen Marionettenstaat bedeuten, falls wir uns für die Schaffung eines solchen entscheiden sollten …"
sweden.75.a:0"Schweden unter Schweden."
sweden.75.b:0"Das ist das Risiko nicht wert."

sweden.90.t:0"Das königliche Kabinett"
sweden.90.d:0"Der König hat Per Albin Hanssons langjährige Politik, jegliches Bündnis mit dem Ausland zu vermeiden, durchkreuzt und einen Pakt mit Finnland geschlossen. Dies hat zu einer Kluft zwischen den beiden ehemals freundschaftlich verbündeten Herrschern geführt. Der König hat das volle Recht, ihn abzusetzen und zu ersetzen, doch dies würde den republikanischen Teilen unserer Bevölkerung sicherlich missfallen. Sollte Gustav V. diesen Plan ausführen?"
sweden.90.a:0"Der König soll seinen Rat bilden."
sweden.90.b:0"Nur wenn er die Wahl gewinnt."

sweden.100.t:0"Das Stockholmer Kommuniqué"
sweden.100.d:0"Der schwedische König Gustaf V. hat die Staats- und Regierungschefs Norwegens und Dänemarks zu einer Konferenz eingeladen, um unsere Beziehungen, die Zukunft Europas und die Position unserer Nationen im Kriegsfall zu diskutieren. Eine Teilnahme würde uns alle einander näherbringen, aber ist das wirklich das, was wir wollen?"
sweden.100.a:0"Nehmen Sie an der Konferenz teil"
sweden.100.b:0"Nein, das ist nicht in unserem Interesse"

sweden.105.t:0"Operation Stella Polaris"
sweden.105.d:0"Die Sowjets dominieren unser armes Land bislang, was uns einem hohen Risiko des Verlusts sensibler Informationen aussetzt – und wir würden einiges riskieren, wenn diese wichtigen Dokumente in die Hände von Papa Joe fielen. Unsere Agenten schlagen vor, die Operationen nach Schweden zu verlegen, einem sichereren Stützpunkt, der weitaus weiter von Konflikten entfernt ist. Allerdings würden wir dadurch an Effizienz einbüßen."
sweden.105.a:0"Schicken Sie sie nach Schweden"
sweden.105.b:0"Sie werden hier gebraucht!"

sweden.106.t:0"Operation Stella Polaris"
sweden.106.d:0"Ein unbekannter Mann im schwarzen Trenchcoat traf sich heute nach Einbruch der Dunkelheit mit unserem Regierungschef im finnischen Ministerium und erklärte mit tiefer, künstlich klingender Stimme, dass Finnlands schlechter Kriegsverlauf mit den Sowjets sensible Informationen gefährde. Sein Vorschlag wäre, die Informationen stattdessen hier in Schweden zu verwahren – als Gegenleistung für die Einsichtnahme in einige der Informationen und die Verbesserung der Beziehungen. Die Russen würden so etwas jedoch niemals gutheißen."
sweden.106.a:0"Ausführen der Operation"
sweden.106.b:0"Nein, das ist zu riskant"

finland.40.t:0"Um schwedische Hilfe bitten?"
finland.40.d:0"Da unser Land in einen Bürgerkrieg gegen eine Macht verstrickt ist, die offensichtlich von der Sowjetunion unterstützt wird, sind wir gezwungen, selbst nach Verbündeten zu suchen. Schweden ist ein naheliegender Sponsor – wenn wir uns dessen Unterstützung sichern können, wäre das ein großer Gewinn für uns. Natürlich ist der Status von Åland weiterhin ungeklärt, und obwohl dies bedauerlich ist, wurde es als faire Entschädigung angesehen …"
finland.40.a:0"Schweden zum Beitritt auffordern"
finland.40.b:0"Nein, das ist unser Krieg!"

finland.41.t:0"Finnland bittet um Hilfe"
finland.41.d:0"Die Weiße Garde Finnlands bittet uns um Hilfe im Kampf gegen die Kommunisten, die versuchen, die Kontrolle über ihr Land zu übernehmen. Als Gegenleistung für unsere Hilfe haben sie uns Åland versprochen – ein ziemlich wertvoller Tausch! Doch sind schwedische Leben es wert, in einem Krieg im Ausland verschwendet zu werden?"
finland.41.a:0"Nehmen Sie am Bürgerkrieg teil"
finland.41.b:0"Wir können nicht beitreten"

sweden.43.t:0"Åland erhebt sich!"
sweden.43.d:0"Patriotische Bürger Ålands haben sich dem Kampf gegen die kommunistische Bedrohung angeschlossen und marschieren nun eifrig an die Front ... als Teil der schwedischen Armee. Dennoch ist dies eine gute Alternative zur roten Herrschaft."
sweden.43.a:0"Glücklich!"

finland.45.t:0"Schweden weigert sich, beizutreten"
finland.45.d:0"Die Schweden haben nicht den nötigen Wunsch, sich unserem Krieg anzuschließen, das ist sehr bedauerlich!"
finland.45.a:0"Verrat!"

exileunits.2.t:0"Polistrupper rekrutiert und ausgebildet"
exileunits.2.d:0"Die Polistrupper aus Dänemark und Norwegen sind ausgebildet und bereit für den Kampf. Während sie sich darauf vorbereiten, eines Tages in ihre Heimatländer zurückzukehren, werden sie in der Zwischenzeit an der Seite unseres Militärs kämpfen."
exileunits.2.a:0"Eine schöne Ergänzung"

iceland.1.t:0"Isländischer Aufstand"
iceland.1.d:0"Es ist zu einer faschistischen Meuterei gekommen! Nach kurzen Inspektionen ist es ziemlich offensichtlich, dass sie beliefert werden. Welche Haltung nehmen wir ein, während das ganze Land in Aufruhr ist? Sollen wir die Unruhen zum Schweigen bringen oder nicht? Denn das Schweigen könnte dazu führen, dass der Lieferant selbst Maßnahmen ergreift. Die beiden wahrscheinlichsten Lieferanten sind derzeit Deutschland und Schweden."
iceland.1.a:0"Bringt den Aufstand zum Schweigen!"
iceland.1.b:0"Wir haben keine andere Wahl, als uns zu ergeben."

iceland.11.t:0"Island bringt den Aufstand zum Schweigen!"
iceland.11.d:0"Es scheint, als sei unser geplanter Aufstand in Island nicht ganz so verlaufen, wie wir es erwartet hatten. Die Regierung scheint ihn mit ihren begrenzten Ressourcen zum Schweigen bringen zu können. Die Frage ist: Was tun wir jetzt? Wir könnten selbst eine umfassende militärische Invasion starten, aber dann müssten wir uns auch mit Dänemark und höchstwahrscheinlich Grönland auseinandersetzen."
iceland.11.a:0"Es ist eine Invasion!"
iceland.11.b:0"Wir ziehen uns vorerst zurück."

iceland.2.t:0"Island erklärt seine Unabhängigkeit!"
iceland.2.d:0"In einer schockierenden Wendung der Ereignisse wurde die kleine dänische Militärpräsenz auf Island von einer kleinen, aber gut bewaffneten Gruppe Nationalisten vertrieben. Die dänische Herrschaft ist bedroht – wir müssen die Ordnung wiederherstellen! Es sei denn, wir können die nötigen Truppen nicht entbehren oder hätten moralische Einwände ..."
iceland.2.a:0"Geben Sie ihnen Souveränität"
iceland.2.b:0"Erklären Sie den Krieg und erobern Sie Island zurück!"

iceland.3.t:0"Dänemark erklärt uns den Krieg"
iceland.3.d:0"Die dänische Regierung hat unseren Unabhängigkeitsversuch für unrechtmäßig erklärt und schickt eine Invasionsarmee an unsere Küsten, um dem Spaß ein Ende zu setzen. Schweden hat uns Unterstützung zugesagt, doch ein Sieg im Alleingang wäre weitaus beeindruckender, wenn auch schwieriger …"
iceland.3.a:0"Kämpfe allein!"
iceland.3.b:0"Bitten Sie die Schweden um Hilfe"

iceland.4.t:0"Island bittet um Hilfe"
iceland.4.d:0"Wie vorhergesagt, hat Island uns um Unterstützung im Kampf gegen die Dänen gebeten – eine perfekte Gelegenheit, Dänemark zu besiegen! Wir könnten sie auch ihre Zeit mit einer Invasion Islands verschwenden lassen, aber es ist unwahrscheinlich, dass wir so bald noch einmal eine solche Gelegenheit bekommen werden …"
iceland.4.a:0"Sie sind auf sich allein gestellt"
iceland.4.b:0"Kämpfe für Island!"

iceland.5.t:0"Die Schweden greifen ein"
iceland.5.d:0"Die Schweden haben beschlossen, an unserer Seite zu kämpfen und hoffen, die Dänen für uns zu besiegen. Unsere Bemühungen waren nicht umsonst, sie haben sich gelohnt."
iceland.5.a:0"Ruhm und Souveränität sind nahe!"

iceland.7.t:0"Dänemark macht einen Rückzieher"
iceland.7.d:0"Dänemark hat Islands Unabhängigkeit akzeptiert und lediglich behauptet, dass die Dänen sie nicht daran hindern würden, wenn das isländische Volk dies wünsche. Fast alle Europäer spekulieren über den wahren Grund, doch was auch immer dieser sein mag, Island ist unabhängig, ohne dass es auch nur ein einziges Opfer gegeben hätte."
iceland.7.a:0"Unerwartet"

iceland.10.t:0"Bewaffnen Sie die Fjölnismenn"
iceland.10.d:0"Wir haben erfolgreich Waffen und Offiziere zu den isländischen Nationalisten transportiert. Die Fjölnismenn, wie sie sich selbst nennen, haben sich sehr über unsere Unterstützung gefreut und bereiten nun einen Aufstand vor. Sind wir bereit, ihn durchzuziehen?"
iceland.10.a:0"Oh, das werden wir!"


