#### Focuses
SWE_swedish_communism:0 "Schwedischer Kommunismus"
SWE_swedish_communism_desc:0 "Wenn wir sicherstellen wollen, dass unser Land das nächste Jahrhundert übersteht, müssen wir unsere derzeitige politische Ausrichtung ändern. Indem wir die Arbeiter in den Städten und die Bauern in den Dörfern beeinflussen, werden wir bald den politischen Einfluss erlangen, den wir brauchen."
SWE_unite_the_cells:0 "Vereinige die Zellen"
SWE_unite_the_cells_desc:0 "Während wir Kontakte zu den Bauern und Arbeitern knüpfen, müssen wir auch die verschiedenen Zellen, die über unser Land verteilt sind, miteinander verbinden. Ihre Vereinigung zu einer politischen Partei wird es uns ermöglichen, mit den bereits etablierten Parteien tatsächlich zu konkurrieren."
SWE_snap_election:0 "Vorgezogene Wahlen"
SWE_snap_election_desc:0 "Da die Mehrheit der Bevölkerung auf unserer Seite ist, können wir nun Neuwahlen erzwingen. Angesichts unserer politischen Landschaft ist uns ein Sieg sicher. Auch wenn der König vielleicht nicht damit einverstanden ist, haben wir Pläne für ihn."
SWE_swedish_marxism:0 "Schwedischer Marxismus"
SWE_swedish_marxism_desc:0 "Nachdem wir unsere neue Regierung gesichert haben, müssen wir sicherstellen, dass wir gute Beziehungen zu den Sowjets im Osten pflegen, um nicht ihren Zorn zu ertragen. Mit verbesserten Beziehungen zum Osten werden wir zweifellos von potenziellen Bedrohungen durch unsere unmittelbaren Nachbarn verschont bleiben."
SWE_scandinavian_socialism:0 "Skandinavischer Sozialismus"
SWE_scandinavian_socialism_desc:0 "Nachdem die Regierung gesichert ist und unsere Macht über das Land sich festigt, müssen wir dem Rest Europas versichern, dass wir nicht mit den expansionistischen und unterdrückerischen Sowjets im Osten vergleichbar sind. Wir müssen dafür sorgen, dass unsere Nachbarn wissen, dass unser politischer Wandel sowohl uns als auch ihnen Schutz bietet."
SWE_approach_soviets:0 "Nähern Sie sich den Sowjets"
SWE_approach_soviets_desc:0 "In den letzten Monaten haben wir zunehmend positive Beziehungen zu den Sowjets aufgebaut. Durch den Abschluss eines Nichteinmischungsvertrags mit ihnen werden wir als Nation sicherlich gedeihen und wachsen können."
SWE_apply_the_nkvd_model:0 "Wenden Sie das NKWD-Modell an"
SWE_apply_the_nkvd_model_desc:0 " "
SWE_establish_red_army:0 "Errichtung unserer Roten Armee"
SWE_establish_red_army_desc:0 "Es ist kein Geheimnis, dass unsere Armee in einem schlechten Zustand ist. Um bei der Wiederaufrüstung des restlichen Europas nicht zurückzufallen, müssen wir unsere eigene Rote Armee aufstellen. Durch eine Erhöhung der Wehrpflicht werden wir mehr Leute in die Armee aufnehmen können, auch wenn das bedeutet, dass sie nicht so effektiv kämpfen werden, aber das ist etwas, das geändert werden kann."
SWE_joint_research:0 "Gemeinsame Forschung"
SWE_joint_research_desc:0 "Obwohl wir versucht haben, unsere Forschung selbst voranzutreiben, ist es kein Geheimnis, dass die Sowjets uns um Längen voraus sind. Indem wir ihr Wissen in bestimmten Bereichen nutzen, können wir unsere Forschung vorantreiben. Das heißt aber nicht, dass wir den Sowjets nicht auch das eine oder andere beibringen können."
SWE_joint_tank_research:0 "Gemeinsames Panzerforschungsprogramm"
SWE_joint_tank_research_desc:0 "Nachdem der Erste Weltkrieg den Panzer als Kampfmaschine eingeführt hat, steht uns nun ein weiteres Feld zur Verfügung. Gemeinsam mit den Sowjets sollten wir in der Lage sein, zu den anderen Großmächten aufzuschließen und sicherzustellen, dass wir nicht zurückbleiben."
SWE_aviation_exercises:0 "Flugübungen"
SWE_aviation_exercises_desc:0 "Genau wie der Panzer ist auch das Kampfflugzeug ein neuer Flugzeugtyp, der im Ersten Weltkrieg zum Einsatz kam und sich als unverzichtbar erwies. Gemeinsame Übungen mit den Sowjets können für beide Nationen nur von Vorteil sein."
SWE_factories_of_revolution:0 "Fabriken der Revolution"
SWE_factories_of_revolution_desc:0 "Da ein Krieg am Horizont droht, müssen wir unsere Produktionskapazitäten erweitern. Durch die Errichtung zusätzlicher Waffenfabriken in Lappland können wir sie vor feindlichen Angriffen schützen und gleichzeitig die Werkzeuge produzieren, die für die Verbreitung der Revolution benötigt werden."
SWE_soviet_industrial_assistance:0 "[SOV.GetAdjective] Industrielle Unterstützung"
SWE_soviet_industrial_assistance_desc:0 "Im letzten Jahrzehnt ist es den Sowjets gelungen, die Industrialisierung in einem unglaublichen Tempo voranzutreiben, und davon könnten wir lernen."
SWE_socialist_industry:0 "Sozialistische Industrie"
SWE_socialist_industry_desc:0 "Mithilfe einiger sowjetischer Techniken sollten wir in der Lage sein, unsere industrielle Basis zu erweitern. Auch wenn es keine vollständige Industrialisierung ist, ist es ein guter Anfang."
SWE_war_infrastructure:0 "Kriegsinfrastruktur"
SWE_war_infrastructure_desc:0 "Wenn wir die Revolution ausweiten wollen, müssen wir sicherstellen, dass unsere Infrastruktur den Belastungen durch die Verlegung unserer Armeen standhält. Der Süden unseres Landes ist dazu bereits in der Lage, der Norden benötigt jedoch Unterstützung."
SWE_the_aland_situation:0 "Die Situation auf Åland"
SWE_the_aland_situation_desc:0 "Seit der Unterzeichnung der Åland-Konvention suchen wir nach Möglichkeiten, sie wieder in unsere Reihen zu integrieren. Doch auch die Sowjets haben es auf die Inseln abgesehen, und obwohl wir der Meinung sind, dass Åland zu uns gehören sollte, könnten wir Finnland als Verhandlungsmasse nutzen."
SWE_pressure_finland:0 "Druck Finnland"
SWE_pressure_finland_desc:0 "Mit unseren Forderungen in der Hand sind wir nun bereit, sie der finnischen Regierung vorzulegen. Sie sollte sich schnell der misslichen Lage bewusst werden, in der sie sich befindet, und obwohl wir nicht damit rechnen, dass wir in den Krieg ziehen müssen, sollten wir die Möglichkeit nicht ausschließen."
SWE_close_the_straits:0 "Schließt die Meerengen"
SWE_close_the_straits_desc:0 "Die dänischen Belte sind ein wichtiger Teil der Ostsee. Wer sie kontrolliert, kontrolliert das gesamte Meer. Wir müssen sicherstellen, dass wir die Kontrolle über sie behalten, damit wir uns keine Sorgen über ausländische Angriffsversuche machen müssen."
SWE_turn_the_baltic_red:0 "Machen Sie das Baltikum rot"
SWE_turn_the_baltic_red_desc:0 "Die baltischen Staaten sind Gebiete, die früher zum Russischen Reich gehörten. Zuvor hatten wir sie jedoch in unseren Händen. Die Sicherung der Ostseeküste würde es uns deutlich erleichtern, die Kontrolle über die Ostsee zu behalten."
SWE_improve_red_army:0 "Verbessern Sie die Rote Armee"
SWE_improve_red_army_desc:0 "Da unsere unmittelbaren Grenzen nun gesichert sind, sollten wir uns um die Verbesserung unserer Armee kümmern. Wir haben viel gelernt und sind heute zweifellos in einer besseren Position als in der Vergangenheit."
SWE_forced_abdication:0 "Erzwungene Abdankung"
SWE_forced_abdication_desc:0 "Mit unserer neuen Regierung erweist sich der König als ziemlich lästig, insbesondere da er unsere politischen Angelegenheiten aktiv schädigt. Er muss gehen."
SWE_finish_finland:0 "Finnland beenden"
SWE_finish_finland_desc:0 "Da sich Finnland nach unseren Forderungen in einem beklagenswerten Zustand befindet, müssen wir sicherstellen, dass die Arbeiter dort gut geschützt sind. Um Aggressionen des finnischen Militärs gegen die Zivilbevölkerung zu verhindern, werden wir von nun an eingreifen und die Bevölkerung anleiten."
SWE_nordic_collaboration:0 "Nordische Zusammenarbeit"
SWE_nordic_collaboration_desc:0 "Wir müssen unseren Nachbarn und zukünftigen Verbündeten beweisen, dass unser sozialistisches Modell nichts mit der abscheulichen Unterdrückung zu tun hat, die im Osten vorherrscht."
SWE_stockholm_internationale:0 "Die Stockholmer Internationale"
SWE_stockholm_internationale_desc:0 "Um der Welt zu beweisen, dass wir es ernst meinen mit dem Widerstand gegen [SOV.GetNameDef], werden wir unsere eigene Fraktion gründen."
SWE_strength_in_union:0 "Stärke in der Union"
SWE_strength_in_union_desc:0 "Um ein echtes Bollwerk gegen den Osten zu werden, müssen wir unsere Zusammenarbeit einen Schritt weiterführen. Indem wir unsere Länder zu einer glorreichen Union zusammenschließen, werden wir in der Lage sein, uns gegen die Russen und ihre Marionetten zu behaupten."
SWE_alliance_with_finland:0 "Bündnis mit Finnland"
SWE_alliance_with_finland_desc:0 "Einst herrschten wir über Finnland, doch dann wurde es Untertan der Russen und erlangte seine Unabhängigkeit. Wir müssen Finnland versichern, dass wir nicht erneut über es herrschen wollen, sondern seine Sicherheit gewährleisten wollen und dass wir seine Hilfe brauchen, um es vor den Folgen der Russischen Revolution zu schützen."
SWE_secure_baltic_sea:0 "Sicherung der Ostsee"
SWE_secure_baltic_sea_desc:0 "Durch die Nutzung neuer Entwicklungen in der Seekriegsführung können wir die Ostsee vor jedem schützen, der versucht, sie zu durchqueren. Die Finnen haben bereits mit der Forschung zum Thema Seeminen begonnen. Wir könnten von ihnen lernen."
SWE_influence_baltics:0 "Einfluss auf das Baltikum"
SWE_influence_baltics_desc:0 "Mit dem Untergang des Russischen Reiches erlangten die baltischen Staaten ihre Unabhängigkeit. Ihre Unabhängigkeit wird nun erneut vom russischen Bären bedroht. Mit ihrer Hilfe und ihrer genauen Kenntnis des russischen Terrains werden wir ein noch mächtigeres Bollwerk gegen die russische Bedrohung sein."
SWE_influence_our_neighbours:0 "Einfluss auf unsere Nachbarn nehmen"
SWE_influence_our_neighbours_desc:0 "Die skandinavischen Länder sind trotz unserer Kriege in der Vergangenheit seit langem enge Freunde. Manche halten sie für einen Kampf zwischen Geschwistern, aber jetzt müssen wir sie davon überzeugen, gemeinsam mit uns gegen jemanden zu kämpfen, der die skandinavische Familie bedroht."
SWE_joint_jaeger_training:0 "Gemeinsames Jägertraining"
SWE_joint_jaeger_training_desc:0 "Genau wie Schweden sind die baltischen Staaten von dichten Wäldern bedeckt. Gemeinsames Training mit ihnen sollte sowohl uns als auch ihnen helfen."
SWE_scandinavian_ranger_training:0 "Skandinavisches Ranger-Training"
SWE_scandinavian_ranger_training_desc:0 "Unsere Nationen sind von ausgedehnten Wäldern, hohen Bergen und zahlreichen Fjorden geprägt. Um gegen unsere zukünftigen Feinde bestehen zu können, müssen wir wissen, wie wir diese Gebiete richtig durchqueren und wie wir dort am besten kämpfen."
SWE_break_the_sickle:0 "Zerbrich die Sichel"
SWE_break_the_sickle_desc:0 "Nachdem alle Vorbereitungen abgeschlossen sind, sind wir bereit, den Kampf gegen die Russen aufzunehmen. Möge unser Sieg schnell sein und die Gerechtigkeit uns folgen."
SWE_tackle_fascism:0 "Den Faschismus bekämpfen"
SWE_tackle_fascism_desc:0 " "
SWE_invite_the_polish:0 "Laden Sie die Polen ein"
SWE_invite_the_polish_desc:0 " "
SWE_rallying_the_workers:0 "Die Arbeiter sammeln"
SWE_rallying_the_workers_desc:0 "Nachdem wir unsere Regierung gesichert haben, müssen wir das Land auf einen möglichen Krieg vorbereiten. Indem wir Propaganda verbreiten und die Arbeiter gegen unsere potenziellen Feinde aufhetzen, sollten wir die Bevölkerung auf das vorbereiten können, was kommen könnte, selbst wenn dies bedeutet, dass wir die Effizienz unserer Zeitarbeiter aufgeben müssen."
SWE_workers_war_economy:0 "Arbeiter Krieg Wirtschaft"
SWE_workers_war_economy_desc:0 "Es gibt ein Sprichwort: „Wenn du Frieden willst, musst du dich auf den Krieg vorbereiten.“ Wir stehen am Rande eines weiteren großen Krieges, also müssen wir uns darauf vorbereiten."
SWE_clip_the_wings:0 "Stutzen Sie die Flügel"
SWE_clip_the_wings_desc:0 "Nach Abschluss unserer Vorbereitungen sind wir nun bereit, den ersten Schlag zu führen. Wir werden dafür sorgen, dass Deutschland unsere Welt nicht ins Chaos stürzt und unermesslichen Schaden anrichtet. Auch wenn wir dabei einige Menschenleben opfern müssen, müssen die Wenigen für die Vielen Opfer bringen."
SWE_learn_from_the_baltics:0 "Vom Baltikum lernen"
SWE_learn_from_the_baltics_desc:0 "Obwohl die baltischen Staaten erst vor Kurzem ihre Unabhängigkeit erlangt haben, verfügen sie über ein enormes Wissen in verschiedenen Bereichen, das wir durchaus nutzen könnten. Durch eine Vereinbarung sollte es uns gestattet sein, ihr Wissen in ihren Spezialgebieten zu nutzen."
SWE_estonian_oil_industry:0 "Estnische Ölindustrie"
SWE_estonian_oil_industry_desc:0 "Wenn man an Länder denkt, die Öl produzieren, ist Estland normalerweise nicht dabei. Dennoch ist es ihnen gelungen, in Kohtla-Järve Ölvorkommen zu finden. Wir sollten ein Forscherteam dorthin schicken, um von den Esten zu lernen und zu sehen, was wir von ihrem Wissen lernen können."
SWE_latvian_bomber_sights:0 "Lettische Bombervisiere"
SWE_latvian_bomber_sights_desc:0 "Die Letten haben offenbar eine Methode entdeckt, Bombenvisiere so zu verbessern, dass sie sogar die britischen übertreffen könnten. Indem wir ihnen unsere Forschungsarbeit anbieten, können wir unsere eigenen Designs mithilfe ihrer Erkenntnisse verbessern."
SWE_lithuanian_agrarian_industry:0 "Litauische Agrarindustrie"
SWE_lithuanian_agrarian_industry_desc:0 "Während ihrer Zeit im Russischen Reich verfügten die Litauer über riesige Felder, die sie zur Versorgung Russlands mit Weizen nutzten. Die sogenannte Kornkammer Europas war schon immer die Ukraine, und auch auf diesem Gebiet verfügen die Litauer über beeindruckende Kenntnisse."
SWE_rally_worker_unions:0 "Versammeln Sie die Gewerkschaften"
SWE_rally_worker_unions_desc:0 "Manche Menschen halten sich zwar für Kommunisten, wünschen sich aber lieber einen friedlichen politischen Wandel, bei dem die derzeitige Regierung plötzlich ihre Macht verliert. Wir wissen jedoch: Wer Veränderungen will, muss sie vorantreiben. Wir werden die Arbeiter sammeln und sie auf den bevorstehenden Kampf vorbereiten!"
SWE_launch_red_coup:0 "Starten Sie den Roten Putsch"
SWE_launch_red_coup_desc:0 "Auch wenn nicht alle vorbereitet sind, müssen wir die Gelegenheit nutzen, solange sie sich uns bietet. Indem wir Stockholm erobern, können wir die Revolution von dort aus nach Süden und Norden ausbreiten! Die Revolution beginnt jetzt!"
SWE_fortification_studies:0 "Festungsstudien"
SWE_fortification_studies_desc:0 " "
SWE_norge_linjen:0 "Norgelinjen"
SWE_norge_linjen_desc:0 "Wenn wir die Souveränität unseres Landes sichern wollen, müssen wir unsere Grenzen vorbereiten. Nachdem wir uns um die Grenze im Osten gekümmert haben, muss nun die Grenze im Westen gesichert werden."
SWE_baltic_wall:0 "Baltischer Wall"
SWE_baltic_wall_desc:0 "Schweden verfügt über eine lange Küste, die wir nur schwer vollständig verteidigen können. Durch den Bau von Befestigungen an Schlüsselpositionen können wir die wichtigsten Städte schützen und von dort aus möglicherweise eigene Seeangriffe starten."
