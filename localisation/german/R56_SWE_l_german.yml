##### Events
r56.news_event.906.t:0"Schweden widerruft das Åland-Übereinkommen!"
r56.news_event.906.d:0"Die Åland-Konvention von 1921 besagte, dass die gleichnamigen Inseln rechtlich von Finnland verwaltet werden sollten. Als Gegenleistung sollte das Gebiet jedoch nicht nur Autonomie erhalten, sondern auch vollständig entmilitarisiert werden. Da Schweden dies nicht mehr für gut befindet, erhebt der größte nordische Staat erneut Anspruch auf die Inseln. Finnland reagierte darauf mit der Remilitarisierung des Archipels, und die diplomatischen Beziehungen zwischen den beiden Ländern verschlechtern sich zusehends."
r56.news_event.906.a:0"Und das alles auf ein paar Inseln."
r56.news_event.906.b:0"Endlich!"

sweden_german_trade.1.t:0 "Unser deutscher Handel"
sweden_german_trade.1.d:0 "Wir haben den schwedisch-deutschen Handelsvertrag vor einigen Jahren unterzeichnet. Angesichts der zunehmenden Spannungen in der Welt müssen wir den Vertrag jedoch noch einmal prüfen und entscheiden, was zu tun ist.\n\nSollen wir unseren derzeitigen Kurs beibehalten, uns auf die Eigenständigkeit konzentrieren oder unseren Handel mit den Deutschen ausbauen?"
sweden_german_trade.1.a:0 "Interessant..."

sweden_aland.1.t:0 "Schweden fordert Åland"
sweden_aland.1.d:0 "Gestern unternahm die schwedische Regierung, nachdem sie ihren Anspruch auf Åland bereits wiederhergestellt hatte, den nächsten logischen Schritt: Sie forderte ihn direkt ein. Vertreter Stockholms haben Recht, wenn sie sagen, die Inseln seien ohnehin mehrheitlich schwedisch, aber unsere Präsenz in der Ostsee würde dadurch deutlich eingeschränkt. Dennoch bedeutet dies, dass die Alternative Krieg ist – und können wir eine Invasion überleben?"
sweden_aland.1.a:0 "Akzeptieren Sie die Anforderungen."
sweden_aland.1.b:0 "Åland gehört rechtmäßig uns!"
sweden_aland.12.t:0 "Finnland akzeptiert Forderungen!"
sweden_aland.12.d:0 "Heute weht auf Åland erstmals seit 1809 wieder die schwedische Flagge anstelle der finnischen. Während die Bevölkerung weitgehend gleichgültig blieb, war die schwedische Regierung überglücklich, nachdem sie einen diplomatischen Sieg errungen und den wichtigsten Marinestützpunkt im Bottnischen Meerbusen erobert hatte. In Finnland hingegen war die Stimmung gedrückt, und es ist besonders bemerkenswert, dass Finnland trotz der Aufgabe der Inseln weiterhin Anspruch auf sie erhebt."
sweden_aland.12.a:0 "Endlich!"
sweden_aland.13.t:0 "Die Finnen weigern sich!"
sweden_aland.13.d:0 "Die Finnen haben die fragwürdige Entscheidung getroffen, dass eine kleine Inselkette es wert ist, das Leben ihres Volkes zu riskieren. Vielleicht haben sie den Wunsch, wieder Teil unserer Nation zu sein – was auch immer ihre Gedankengänge sein mögen, ein Krieg scheint unvermeidlich."
sweden_aland.13.a:0 "Empörend!"
sweden_aland.2.t:0 "Schweden bietet Garantien für Åland."
sweden_aland.2.d:0 "Schwedische Diplomaten kamen heute in [ROOT.Capital.GetCapitalVictoryPointName] an und machten einen Vorschlag: Wir geben ihnen die Åland-Inseln, im Austausch dafür garantieren sie uns zu Hilfe, falls wir von außen angegriffen werden."
sweden_aland.2.a:0 "Das klingt nach einem fairen Tausch. Dem stimmen wir zu."
sweden_aland.2.b:0 "Nein! Die Åland-Konvention bleibt bestehen."
sweden_aland.21.t:0 "Finnland transferiert Åland"
sweden_aland.21.d:0 "Heute sind die Åland-Inseln nach langer Zeit unter finnischer und russischer Herrschaft wieder unter schwedischer Herrschaft. Wir sind nun verpflichtet, Finnland im Falle eines Angriffs zu schützen."
sweden_aland.21.a:0 "Välkommna Hem!"
sweden_aland.22.t:0 "Finnland lehnt unser Hilfsangebot ab."
sweden_aland.22.d:0 "Mit der Begründung, dass die Åland-Konvention weiterhin in Kraft bleibe, hat die finnische Regierung unser Angebot abgelehnt, im Austausch für die Åland-Inseln in künftigen Konflikten Hilfe zu leisten."
sweden_aland.22.a:0 "Das ist bedauerlich..."

sweden_fascism.1.t:0 "Schweden fordert Unterwerfung"
sweden_fascism.1.d:0 "Gestern gab die schwedische Regierung eine öffentliche Erklärung ab, dass Dänemark sich der schwedischen Herrschaft unterwerfen solle, um zukünftigen Wohlstand zu sichern. Die Forderung umfasst die Unabhängigkeit Islands und die schwedische Herrschaft über Dänemark und unsere Außenpolitik."
sweden_fascism.1.a:0 "Akzeptieren Sie die Anforderungen."
sweden_fascism.1.b:0 "Dänemark bleibt dänisch!"
sweden_fascism.12.t:0 "Dänemark akzeptiert Forderungen!"
sweden_fascism.12.d:0 "Heute ist ein ruhmreicher Tag in unserer Geschichte: Die schwedische Flagge weht hoch über Kopenhagen, weil das Land die schwedische Herrschaft akzeptiert hat."
sweden_fascism.12.a:0 "Endlich!"
sweden_fascism.13.t:0 "Die Dänen weigern sich!"
sweden_fascism.13.d:0 "Die Dänen haben die fragwürdige Entscheidung getroffen, sich unserer Macht entgegenzustellen. Sie werden schnell unter unseren Stiefeln fallen."
sweden_fascism.13.a:0 "Empörend!"

sweden_auth.1.t:0 "Schweden fordert Annexion"
sweden_auth.1.d:0 "Heute forderte der schwedische Monarch die Wiederherstellung der schwedischen Herrschaft über unser Land. Fast hundert Jahre sind seit unserer Teilung vergangen. Zwar gibt es im Land einige, die diese gerne wiederherstellen würden, doch die Mehrheit strebt nach Unabhängigkeit. Seine Forderung enthält jedoch deutliche Hinweise auf Gewaltandrohungen."
sweden_auth.1.a:0 "Akzeptieren Sie die Anforderungen."
sweden_auth.1.b:0 "Nein! [FROM.GetNameDefCap] bleibt unabhängig!"
sweden_auth.12.t:0 "[FROM.GetName] akzeptiert Forderungen!"
sweden_auth.12.d:0 "Es scheint, als ob [FROM.GetNameDef] die besondere Situation erkannt hat, in der sie sich befanden. Letztendlich sind sie als Teil Schwedens sicherer, als wenn sie versuchen würden, sich allein gegen den Wandel der Zeit in Europa zu behaupten."
sweden_auth.12.a:0 "Endlich!"
sweden_auth.13.t:0 "[FROM.GetNameDefCap] Ablehnen!"
sweden_auth.13.d:0 "Obwohl es nicht überraschend war, hatten wir gehofft, dass die [FROM.GetAdjective] unsere ... Bitte vernünftig finden würden. Wir hatten jedoch auch mit einem Nein gerechnet. Es überrascht uns nicht, dass wir nun zu den Waffen greifen und uns zurückerobern müssen, was uns gehört."
sweden_auth.13.a:0 "Zu erwarten..."
sweden_auth.2.t:0 "[FROM.GetName] fordert ein Referendum"
sweden_auth.2.d:0 "Heute früh gab der schwedische Monarch Carl Gustaf VI. eine öffentliche Erklärung ab, in der er das dänische Volk aufforderte, für die Vereinigung mit Schweden zu stimmen. Er erinnerte dabei an die glorreichen Tage der Kalmarer Union. Als Zeichen seiner Freundlichkeit schlug er vor, dem dänischen Volk die Möglichkeit einer Volksabstimmung über einen erneuten Anschluss an Schweden zu geben."
sweden_auth.2.a:0 "Das Volk hat gesprochen, wir werden uns fügen."
sweden_auth.2.b:0 "Nein, wir sind lieber wir selbst."
sweden_auth.22.t:0 "[FROM.GetAdjective] für die Vereinigung stimmen."
sweden_auth.22.d:0 "In einer etwas schockierenden Wendung der Ereignisse stimmte das dänische Volk für die Vereinigung Schwedens. Es schien, als suchten die Menschen die Sicherheit, Teil einer größeren Nation gleichgesinnter Menschen zu sein."
sweden_auth.22.a:0 "Välkomna hem, bröder!"
sweden_auth.23.t:0 "[FROM.GetAdjective] das Referendum ablehnen."
sweden_auth.23.d:0 "Wenig überraschend haben die [FROM.GetAdjective] das Referendum abgelehnt und ihre Streitkräfte für den Fall unseres Angriffs vorbereitet. Nun wird sich zeigen, wie gut sie kämpfen."
sweden_auth.23.a:0 "Erwartet."

sweden_nap.1.t:0 "[SWE.GetName] schlägt einen Vertrag über gegenseitige Unterstützung vor"
sweden_nap.1.d:0 "Heute früh traf ein Gesandter aus Schweden in [ROOT.Capital.GetCapitalVictoryPointName] ein und brachte den Vorschlag eines Vertrags über gegenseitige Hilfe mit. Die Prämisse des Vertrags lautet, dass weder sie noch wir einen Konflikt miteinander anzetteln, sondern dass im Falle eines Angriffs der andere dem anderen zu Hilfe kommt."
sweden_nap.1.a:0 "Klingt für uns beide vorteilhaft, wir werden den Vertrag unterzeichnen."
sweden_nap.1.b:0 "Wir möchten lieber nicht durch Tinte auf Papier gebunden sein …"
sweden_nap.11.t:0 "[FROM.GetName] unterzeichnet den Vertrag"
sweden_nap.11.d:0 "Unsere Diplomaten sind mit der erfreulichen Nachricht aus [FROM.Capital.GetCapitalVictoryPointName] zurückgekehrt, dass [FROM.GetNameDef] unseren vorgeschlagenen Vertrag unterzeichnet haben."
sweden_nap.11.a:0 "Perfekt!"
sweden_nap.12.t:0 "Der [FROM.GetName] unterzeichnet den Vertrag nicht"
sweden_nap.12.d:0 "Unsere Diplomaten sind mit der unglücklichen Nachricht aus [FROM.Capital.GetCapitalVictoryPointName] zurückgekehrt, dass die [FROM.GetAdjective] beschlossen haben, unseren Vertrag nicht zu unterzeichnen. Vielleicht sollten wir uns in Zukunft vor ihnen in Acht nehmen."
sweden_nap.12.a:0 "Sehr bedauerlich..."
sweden_nap.2.t:0 "[SWE.GetName] schlägt einen Nichtangriffspakt vor"
sweden_nap.2.d:0 "Heute früh traf ein Gesandter aus Schweden in [ROOT.Capital.GetCapitalVictoryPointName] mit dem Vorschlag eines Nichtangriffspakts ein. Die Prämisse des Vertrags lautet, dass weder sie noch wir, solange der Vertrag in Kraft ist, Konflikte miteinander anzetteln werden."
sweden_nap.2.a:0 "Damit war unsere Nordfront gesichert."
sweden_nap.2.b:0 "Wir möchten lieber nicht durch Tinte auf Papier gebunden sein …"
sweden_nap.21.t:0 "[FROM.GetName] unterzeichnet den Vertrag"
sweden_nap.21.d:0 "Unsere Diplomaten sind mit der erfreulichen Nachricht aus [FROM.Capital.GetCapitalVictoryPointName] zurückgekehrt, dass die [FROM.GetAdjective] unseren vorgeschlagenen Vertrag unterzeichnet haben."
sweden_nap.21.a:0 "Perfekt!"
sweden_nap.22.t:0 "Der [FROM.GetName] unterzeichnet den Vertrag nicht"
sweden_nap.22.d:0 "Unsere Diplomaten sind mit der unglücklichen Nachricht aus [FROM.Capital.GetCapitalVictoryPointName] zurückgekehrt, dass die [FROM.GetAdjective] beschlossen haben, unseren Vertrag nicht zu unterzeichnen. Vielleicht sollten wir uns in Zukunft vor ihnen in Acht nehmen."
sweden_nap.22.a:0 "Sehr bedauerlich..."
sweden_nap.3.t:0 "[SWE.GetName] schlägt einen Nichtangriffspakt vor."
sweden_nap.3.d:0 "Heute früh traf ein Gesandter aus Schweden in [ROOT.Capital.GetCapitalVictoryPointName] mit dem Vorschlag eines Nichtangriffspakts ein. Die Prämisse des Vertrags lautet, dass weder sie noch wir, solange der Vertrag in Kraft ist, Konflikte miteinander anzetteln werden."
sweden_nap.3.a:0 "Freundliche Beziehungen zu [SWE.GetAdjective] wären von Vorteil."
sweden_nap.3.b:0 "Wir haben andere Pläne ..."
