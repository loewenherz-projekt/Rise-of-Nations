### Events
sweden_winter_war.1.t:0 "Schweden bietet Zugeständnisse an"
sweden_winter_war.1.d:0 "Schwedische Diplomaten haben uns über Deutschland eine Botschaft geschickt, in der sie Gotland im Austausch für ein Ende der Feindseligkeiten anbieten. Offenbar hatten sie nicht damit gerechnet, dass die Finnen ihr Territorium so schnell aufgeben würden, und wollen nun den friedlichen Zustand vor dem Krieg wiederherstellen."
sweden_winter_war.1.a:0 "Also gut, Gotland soll uns gehören."
sweden_winter_war.1.b:0 "Nein, sie haben diesen Krieg begonnen. Wir werden ihn beenden."
sweden_winter_war.2.t:0 "Die Sowjets lehnen unser Friedensangebot ab."
sweden_winter_war.2.d:0 "Die Sowjetunion verwies auf Schwedens aggressive Reaktion auf den finnisch-sowjetischen Krieg und lehnte unser Angebot ab, Gotland im Austausch für Frieden zu übernehmen. Wir müssen uns nun auf den bevorstehenden Ansturm des sowjetischen Zorns vorbereiten."
sweden_winter_war.2.a:0 "Was haben wir getan..."

SWE_agree_peace:0 "Schweden erklärt sich bereit, „Gotland“ im Austausch für Frieden abzutreten!"
