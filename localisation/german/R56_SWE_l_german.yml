### Focuses
SWE_royalist_return:0 "Royalistische Rückkehr"
SWE_royalist_return_desc:0 "Die schwedische Monarchie wurde 1917 von einer Kombination aus liberalen und sozialdemokratischen Ministern unter der Führung von Nils Edén ihrer Macht beraubt. Doch die Welt ist in letzter Zeit zunehmend instabil geworden, und das ständige Gezänk und Zögern der demokratischen Herrschaft gefährdet die Zukunft Schwedens."
SWE_king_gustafs_government:0 "König Gustafs Regierung"
SWE_king_gustafs_government_desc:0 "König Gustav V. regiert Schweden seit dem Tod seines Vaters Oskar II. im Jahr 1907. Als entschiedener Gegner des Kommunismus und prominenter Befürworter einer panskandinavischen Allianz beobachtete Gustav den Aufstieg von Männern wie Lenin und Stalin mit großer Sorge. Mit der kürzlich erfolgten Rückkehr der königlichen Macht sollte der König wieder allein regieren."
SWE_prince_gustafs_coup:0 "Prinz Gustafs Staatsstreich"
SWE_prince_gustafs_coup_desc:0 "Schweden hat zwar mit Gustav V. einen König, doch dieser ist alt und unfähig, entschlossen zu handeln, um Schweden vor den Verwüstungen des Kommunismus zu retten. Um zu überleben und zu gedeihen, braucht Schweden einen neuen, jüngeren und dynamischen König. Gustaf Adolf, der Sohn des Königsnachfolgers, muss den Thron besteigen – notfalls mit Gewalt."
SWE_return_to_sweden_norway:0 "Rückkehr nach Schweden-Norwegen"
SWE_return_to_sweden_norway_desc:0 "Die Trennung Schwedens und Norwegens, die fast hundert Jahre lang durch Vertrag und Blut verbunden waren, war in der Tat ein schwerwiegender Fehler. Ohne Norwegen sind wir an die Ostsee gebunden, und ohne Schweden kann Norwegen sich nicht schützen, sollte das Undenkbare passieren und Skandinavien vom Krieg erfasst werden. Wir müssen diesen Fehler korrigieren."
SWE_the_finnish_crown:0 "Die finnische Krone"
SWE_the_finnish_crown_desc:0 "Sechshundert Jahre lang, bis zum Finnischen Krieg, schützte Finnland Schwedens Ostflanke vor dem russischen Bären. Nun ist Finnland in den stürmischen Meeren der Weltpolitik hilflos, und der russische Bär rückt immer näher an die Grenze heran. Finnland muss vor den Russen gerettet und die Ostflanke wieder gesichert werden!"
SWE_expand_livgardet:0 "Erweitern Sie die Livgardet"
SWE_expand_livgardet_desc:0 "Die Livgarde (Lebensgarde) ist eine der ältesten noch aktiven Militäreinheiten und wurde während des Befreiungskrieges 1521 gegründet. Sie ist für die Verteidigung Stockholms und der königlichen Familie verantwortlich, bildet die Elite der schwedischen Armee und zählt zu unseren besten Truppen. Nach der Aufhebung der demokratischen Abrüstung sollten wir die Lebensgarde ausbauen und den Kern unserer Armee stärken."
SWE_modern_caroleans:0 "Moderne Caroleaner"
SWE_modern_caroleans_desc:0 "Die Karoliner Karls XII. jagten allen, die sich ihm widersetzten, Angst ein. Obwohl Carolus Rex nicht mehr unter uns weilt, lebt sein Erbe weiter – lasst uns den Karolinern ihren rechtmäßigen Platz zurückgeben und Schwedens Feinden erneut Angst einjagen!"
SWE_claim_the_danish_throne:0 "Beanspruchen Sie den dänischen Thron"
SWE_claim_the_danish_throne_desc:0 "Das Königreich Dänemark war einst während der Kalmarer Union unser Strippenzieher. Doch die Zeiten haben sich geändert. Heute ist Schweden das stärkere Land, während Dänemark unter der schwachen und ineffektiven Herrschaft streitender Politiker dahinsiecht, die die Gefahren an seinen Grenzen nicht erkennen. Als rechtmäßige Herrscher über ganz Skandinavien sollte der dänische Thron uns gehören!"
SWE_demand_danish_referendum:0 "Fordern Sie ein dänisches Referendum"
SWE_demand_danish_referendum_desc:0 "Wir bieten den Dänen eine Chance, unsere Meinungsverschiedenheit friedlich zu lösen. Sollten sie einer Volksabstimmung über ihre Zukunft zustimmen, werden wir unseren Anspruch auf den dänischen Thron nicht mit Gewalt durchsetzen. Es sei denn, sie sagen Nein."
SWE_march_across_the_belts:0 "Marsch über die Belts"
SWE_march_across_the_belts_desc:0 "Der dänische Thron gehört uns von Rechts wegen, und wir dulden keine Einmischung. Das dänische Militär ist durch jahrelange Vernachlässigung, Unterfinanzierung und pazifistische Politik geschwächt – es wird eine leichte Beute sein."
SWE_swedish_french_ties:0 "Schwedisch-Französische Krawatten"
SWE_swedish_french_ties_desc:0 "Schweden und Frankreich pflegen seit Beginn des 18. Jahrhunderts enge Beziehungen. Die französische Kultur und Sprache prägen Schweden seit jeher, und die heutige schwedische Königsfamilie stammt vom französischen General Jean Baptiste Jules Bernadotte ab, der in Schweden als Karl XIV. bekannt ist. Da Frankreich nun zur Monarchie zurückgekehrt ist, sollten wir unsere Beziehungen zu den Franzosen wieder vertiefen."
SWE_nordic_solidarity:0 "Nordische Solidarität"
SWE_nordic_solidarity_desc:0 "Seit den Napoleonischen Kriegen ist Schweden außenpolitisch nur noch ein Juniorpartner. Als in Wien die Neuordnung Europas stattfand, waren wir zwar dabei, galten aber als weniger wichtig. Das soll nun nicht mehr so sein. Mit der Gründung unseres eigenen Bündnisses zeigen wir der Welt, dass wir uns nicht länger herablassen wollen."
SWE_stockholm_paris_agreement:0 "Stockholm - Pariser Abkommen"
SWE_stockholm_paris_agreement_desc:0 "Die Deutschen sind für uns und die Franzosen ein gemeinsamer Feind – und beide haben in der Vergangenheit Land an die Deutschen verloren. Wir werden die französischen Ansprüche auf das linke Rheinufer unterstützen, im Austausch für die Anerkennung unserer Ansprüche auf Nordschleswig. Wir werden erneut Seite an Seite mit den Franzosen kämpfen, um das Verlorene zurückzuerobern."
SWE_retake_pomerania:0 "Pommern zurückerobern"
SWE_retake_pomerania_desc:0 "Pommern war einst schwedisches Territorium, bis es 1814 im Austausch gegen Norwegen an Dänemark abgetreten wurde. Doch wir haben unseren Anspruch auf Pommern nie vergessen, egal was die aufstrebenden Deutschen zu sagen haben. Das schwedische Reich wird vollständig zurückerobert, und wenn das Krieg mit Deutschland bedeutet? So sei es."
SWE_fortet_gotland:0 "Festung Gotland"
SWE_fortet_gotland_desc:0 "Gotland ist die größte Insel in der Ostsee, stellt aber eine entscheidende Schwachstelle für die Verteidigung des Königreichs dar – eine Invasionsmacht könnte dort problemlos ein Versorgungsgebiet errichten und es als Operationsbasis gegen das Festland nutzen! Wir müssen sicherstellen, dass dies nicht geschieht. Unsere Ingenieure haben begonnen, Pläne für Befestigungen und Flugabwehrbatterien rund um mutmaßliche Landegebiete zu entwerfen."
SWE_negotiate_with_norway:0 "Mit Norwegen verhandeln"
SWE_negotiate_with_norway_desc:0 "Die norwegische Küste ist lang und wird von Norwegen allein nur unzureichend verteidigt. Wenn wir und die Norweger unsere Kräfte bündeln würden, könnten wir die Verteidigung unserer beiden Nationen gegen künftige Invasionen aus der Ostsee oder dem Atlantik besser gewährleisten."
SWE_discussions_with_denmark:0 "Gespräche mit Dänemark"
SWE_discussions_with_denmark_desc:0 "Die dänische Grenze zu Deutschland bereitet den schwedischen Verteidigungsplanern Sorgen – insbesondere Jütland ist durch eine schnelle deutsche Invasion von Kiel aus gefährdet. Im Geiste der skandinavischen Einheit können wir die Dänen jedoch nicht schutzlos zurücklassen. Wir werden sie nach Kräften unterstützen – selbst wenn dies einen Krieg mit Deutschland bedeutet."
SWE_aland_for_guarantees:0 "Åland für Garantien"
SWE_aland_for_guarantees_desc:0 "Åland ist seit dem Ende des Ersten Weltkriegs ein Streitpunkt zwischen Finnland und Schweden. Obwohl die Finnen die Inseln weiterhin kontrollieren, ist die Unterstützung für eine Vereinigung mit Schweden unter den Åländern groß. Wir werden Finnland ein Abkommen anbieten. Sollte es uns Åland überlassen, unterstützen wir es in seinem Kampf um die Unabhängigkeit gegen die Russen."
SWE_the_northern_lights:0 "Das Nordlicht"
SWE_the_northern_lights_desc:0 "Nachdem die Grundlagen für ein Verteidigungsbündnis zwischen den skandinavischen Ländern gelegt sind, ist es nun an der Zeit, diese Garantien in einem formellen Bündnis zu verankern. Wer eine skandinavische Nation bedroht, muss mit der Macht ganz Skandinaviens rechnen."
SWE_secure_our_southern_border:0 "Sichern Sie unsere Südgrenze"
SWE_secure_our_southern_border_desc:0 "Trotz unserer Regierungsstreitigkeiten scheinen die Deutschen weiterhin ein relativ gutes Verhältnis zu uns zu haben, wenn sie im Gegenzug schwedisches Wolfram und Eisenerz erhalten. Wir werden ihnen einen Nichtangriffspakt zwischen unseren beiden Nationen anbieten – was uns zudem die Möglichkeit gibt, uns auf den Osten zu konzentrieren."
SWE_defend_the_baltics:0 "Verteidige das Baltikum"
SWE_defend_the_baltics_desc:0 "Die baltischen Staaten sind ebenso wie die Finnen einer zunehmenden Bedrohung durch einen wiedererstarkten russischen Staat ausgesetzt, der möglicherweise versuchen könnte, ihre Gebiete erneut zu besetzen, wie es die Zaren bis 1917 taten. Wir können dies nicht guten Gewissens zulassen. Es werden Delegationen nach Riga, Kaunas und Tallinn entsandt, um mit der Ausarbeitung von Plänen für die Aufnahme dieser Staaten in unser Bündnis zu beginnen."
SWE_ally_the_kaiserreich:0 "Verbündeter des Kaiserreichs"
SWE_ally_the_kaiserreich_desc:0 "Die Rückkehr des deutschen Kaisers – eines langjährigen Freundes der schwedischen Königsfamilie – auf den Thron bietet uns eine einmalige Gelegenheit, ein Bündnis der Monarchien gegen Russland zu bilden. Obwohl wir uns aus dem Ersten Weltkrieg herausgehalten haben, werden wir nicht zulassen, dass ein wiedererstarktes Russland uns oder das Kaiserreich bedroht. Wir müssen umgehend eine Delegation nach Berlin schicken."
SWE_joint_panzer_development:0 "Gemeinsame Panzerentwicklung"
SWE_joint_panzer_development_desc:0 "Die Deutschen gehören zu den führenden Panzerkonstrukteuren Europas. Um uns auf den großen Kampf gegen die Russen vorzubereiten, sollten wir ein Team technischer Mitarbeiter entsenden, das uns bei der Entwicklung neuer, gemeinsam entwickelter gepanzerter Kampffahrzeuge unterstützt."
SWE_baltic_foothold:0 "Baltischer Stützpunkt"
SWE_baltic_foothold_desc:0 "Die sogenannten „baltischen Staaten“ entstanden am Ende des Ersten Weltkriegs. Sie sind schwach und von räuberischen Nachbarn umgeben, die nur auf eine Gelegenheit warten, einen oder alle von ihnen wieder in ihre Gewalt zu bringen. Wir sollten die Initiative ergreifen und zum ersten Mal seit dem Großen Nordischen Krieg wieder eine schwedische Präsenz im Baltikum etablieren."
SWE_prepare_for_the_march_east:0 "Bereiten Sie sich auf den Marsch nach Osten vor"
SWE_prepare_for_the_march_east_desc:0 "Der Marsch nach Moskau wird lang und beschwerlich sein, und das russische Klima kann für Unvorbereitete äußerst gefährlich sein. Wir können und dürfen die Fehler unserer Vorgänger nicht wiederholen. Wir müssen uns auf einen langen und schwierigen Feldzug vorbereiten und sicherstellen, dass unsere Truppen unabhängig von der Entfernung von Stockholm stets ausreichend versorgt sind."
SWE_reclaim_the_imperial_east:0 "Erobern Sie den imperialen Osten zurück"
SWE_reclaim_the_imperial_east_desc:0 "Jetzt ist es soweit. Wir werden nicht länger zusehen, wie die Russen immer stärker werden. Schweden muss handeln, wenn wir unsere Zukunft sichern wollen – unsere imperiale Zukunft. Auf in den Krieg!"
SWE_prepare_for_soviet_aggression:0 "Bereiten Sie sich auf die sowjetische Aggression vor"
