sweden_nap.32.a:0 "Sehr bedauerlich..."

sweden_mill_access.1.t:0 "[SWE.GetNameDefCap] Bietet militärischen Zugang"
sweden_mill_access.1.d:0 "Heute früh ist ein Gesandter aus Schweden in [ROOT.Capital.GetCapitalVictoryPointName] eingetroffen und hat uns angeboten, Truppen durch ihr Gebiet zu verlegen, wenn wir im Gegenzug versprechen, keine Feindseligkeiten gegen sie zu führen. Wie sollten wir reagieren?"
sweden_mill_access.1.a:0 "Klingt vorteilhaft, wir werden den Vertrag unterzeichnen."
sweden_mill_access.1.b:0 "Wir haben andere Möglichkeiten, Zugang für unsere Truppen zu erhalten."
sweden_mill_access.11.t:0 "[FROM.GetNameDefCap] unterzeichnet den Vertrag"
sweden_mill_access.11.d:0 "Unsere Diplomaten sind mit der erfreulichen Nachricht aus [FROM.Capital.GetCapitalVictoryPointName] zurückgekehrt, dass [FROM.GetNameDef] unseren vorgeschlagenen Vertrag unterzeichnet haben."
sweden_mill_access.11.a:0 "Perfekt!"
sweden_mill_access.12.t:0 "[FROM.GetNameDefCap] unterzeichnet den Vertrag nicht"
sweden_mill_access.12.d:0 "Unsere Diplomaten sind mit der unglücklichen Nachricht aus [FROM.Capital.GetCapitalVictoryPointName] zurückgekehrt, dass die [FROM.GetAdjective] beschlossen haben, unseren Vertrag nicht zu unterzeichnen. Vielleicht sollten wir uns in Zukunft vor ihnen in Acht nehmen."
sweden_mill_access.12.a:0 "Sehr bedauerlich..."

sweden_soviet.1.t:0 "Schweden möchte [SOV.GetFactionName] beitreten"
sweden_soviet.1.d:0 "Seitdem die schwedischen Arbeiter die Kontrolle über ihre Zukunft übernommen haben, sind ihre Politiker uns gegenüber freundlicher gesinnt. Heute haben schwedische Beamte uns wegen eines Beitritts zur [SOV.GetFactionName] angesprochen. Es wäre vorteilhaft, einen Verbündeten zu haben, der die Ostsee möglicherweise abriegeln könnte, aber es hat auch seine Schattenseiten: Die Deutschen könnten denken, wir seien zu weit gegangen und sich bedroht fühlen. Was sollten wir darauf antworten?"
sweden_soviet.1.a:0 "Mit ihrer Hilfe wird die Revolution nicht ins Stocken geraten!"
sweden_soviet.1.b:0 "Sie sind nichts weiter als eine Belastung."
sweden_soviet.2.t:0 "Die Sowjets nehmen unsere Anfrage an."
sweden_soviet.2.d:0 "Nach einigen Stunden Diskussion hinter verschlossenen Türen in Moskau übermittelten unsere Diplomaten die gute Nachricht schließlich nach Stockholm. Sie begrüßen die Idee unseres Beitritts zu [SOV.GetFactionName], da dies unseren beiden Nationen bei der Verfolgung ihrer zukünftigen Interessen helfen wird."
sweden_soviet.2.a:0 "Es lebe die Revolution!"
sweden_soviet.3.t:0 "Moskau lehnt unsere Anfrage ab"
sweden_soviet.3.d:0 "Als unsere Gesandten Kontakt zu den Sowjets aufnahmen, hatten wir eine freundlichere Antwort erwartet, doch ihnen wurde mitgeteilt, dass die Sowjets nicht die Absicht hätten, „Möchtegern-Deutsche in die [SOV.GetFactionName] einzuladen“. Dies hat zu Hause einige Probleme verursacht, aber es ist nicht das erste Mal, dass uns ein Nein zu hören war."
sweden_soviet.3.a:0 "Wir müssen einfach abwarten ..."
sweden_soviet.4.t:0 "Schweden wirft die Åland-Frage auf"
sweden_soviet.4.d:0 " Heute früh traf in Moskau ein Telegramm aus Stockholm ein, das sich auf den autonomen Staat Åland bezog, der derzeit unter finnischer Kontrolle steht. Darin wurde dessen strategischer Wert erwähnt und es wurde betont, dass er unsere und ihre Position im Baltikum erheblich stärken würde. Wie reagieren wir auf dieses Telegramm?"
sweden_soviet.4.a:0 "Sie bringen einen guten Punkt vor."
sweden_soviet.4.b:0 "Für Åland haben wir andere Pläne."
sweden_soviet.5.t:0 "Die Sowjets akzeptieren"
sweden_soviet.5.d:0 "In einer Antwort auf unsere Botschaft an Moskau haben die Sowjets mit Interesse geantwortet und erklärt, dass sie am strategischen Wert Ålands interessiert seien."
sweden_soviet.5.a:0 "Unser Plan geht weiter."
sweden_soviet.6.t:0 "Der Niedergang der Sowjets"
sweden_soviet.6.d:0 "Gestern Abend erhielten wir eine Antwort aus Moskau zur Situation auf Åland. Darin hieß es, man habe kein Interesse an den kleinen Ostseeinseln, womit Åland de facto in unseren Einflussbereich falle."
sweden_soviet.6.a:0 "Schade, aber es gibt immer einen Silberstreif am Horizont."
sweden_soviet.7.t:0 "Schweden fordert Zugeständnisse"
sweden_soviet.7.d:0 "Heute früh traf ein Gesandter aus Stockholm in Helsinki ein, traf sich mit der Regierung und stellte ihr ein Ultimatum: Entweder wir akzeptieren die territoriale Neuordnung, oder wir müssen mit „ernsthaften Konsequenzen“ rechnen."
sweden_soviet.7.a:0 "Wir können uns ihnen nicht widersetzen ... noch nicht ..."
sweden_soviet.7.b:0 "Nein! Finnisches Territorium bleibt bei Finnland!"
sweden_soviet.7.c:0 "Zur Sicherheit unserer Leute ... akzeptieren wir."
sweden_soviet.8.t:0 "Sowjets fordern Gebiete"
sweden_soviet.8.d:0 "Im Anschluss an die Forderungen Stockholms hat Moskau nun Forderungen nach einer beträchtlichen Anzahl von Gebieten im Osten gestellt."
sweden_soviet.8.a:0 "Wir müssen uns einigen, sonst droht uns die Vernichtung …"
sweden_soviet.8.b:0 "Keine Zugeständnisse mehr! Sieg oder Tod!"
sweden_soviet.9.t:0 "Finnland transferiert Lappi"
sweden_soviet.9.d:0 "Heute hat Finnland einen Teil dessen, was einst zu uns gehörte, nämlich die Gebiete von Lappi, übertragen und damit einen größeren Teil der samischen Bevölkerung in unserem Land vereint und gleichzeitig eine Grenze zu unserem Verbündeten im Osten errichtet."
sweden_soviet.9.a:0 "Ah, Sieg!"
sweden_soviet.10.t:0 "Finnland weigert sich, Lappi zu transferieren"
sweden_soviet.10.d:0 "In einer heutigen Pressekonferenz verkündete der finnische Ministerpräsident, dass man niemals Gebiete an eine andere Nation abtreten werde und dass die Schweden diese Gebiete mit Gewalt einnehmen müssten, wenn sie sie einnehmen wollten."
sweden_soviet.10.a:0 "Wenn sie Krieg wollen ..."
sweden_soviet.11.t:0 "Finnland gibt Land auf"
sweden_soviet.11.d:0 "Da die Finnen erkannten, wie töricht es ist, an Gebieten festzuhalten, die die gegenwärtige Idee einer finnischen Nation für sich beansprucht, haben sie die Kontrolle über die gewünschten Staaten an uns zurückgegeben."
sweden_soviet.11.a:0 "Ausgezeichnet!"
sweden_soviet.12.t:0 "Die Finnen blockieren unsere Forderungen"
sweden_soviet.12.d:0 "Es scheint, als seien die Finnen zu stur, um ihre Lage zu begreifen. Sie weigern sich, die Kontrolle über die Staaten, die unsere Politiker ihnen angeboten haben, abzugeben und haben stattdessen ihre Streitkräfte an die Grenze mobilisiert. So oder so werden wir das Gebiet bekommen, das wir wollen."
sweden_soviet.12.a:0 "Zeit für ein paar Kriegsspiele ..."
sweden_soviet.13.t:0 "Schweden übernimmt die Kontrolle"
sweden_soviet.13.d:0 "Mit der Besetzung unserer Gebiete durch Schweden und die Sowjetunion haben die Schweden erklärt, dass Finnland nicht länger in der Lage sei, allein zu überleben. Stattdessen haben sie ihre Absicht deutlich gemacht, dafür zu sorgen, dass das finnische Volk die kommenden Kriege in Europa überlebt."
sweden_soviet.13.a:0 "Wir müssen uns verbeugen ..."
sweden_soviet.91.t:0 "Finnland kassiert Lappi"
sweden_soviet.91.d:0 "Wie von den Schweden erwartet, haben die Finnen aufgrund des Drucks und der Möglichkeit eines Zweifrontenkriegs Lappi abgetreten."
sweden_soviet.91.a:0 "Jetzt sind wir an der Reihe."
sweden_soviet.101.t:0 "Finnland lehnt schwedische Forderungen ab"
sweden_soviet.101.d:0 "In einer überraschenden, aber nicht völlig unmöglichen Wendung der Ereignisse haben die Finnen den Schweden ihr beanspruchtes Land verweigert. Nun werden wir sehen, wie stark unser neuer Verbündeter wirklich ist."
sweden_soviet.101.a:0 "Interessant..."
sweden_soviet.111.t:0 "Finnland gibt den Sowjets nach"
sweden_soviet.111.d:0 "Es war keine Überraschung, dass die Finnen, nachdem sie gezwungen waren, uns Lappi zu überlassen, beschlossen, ihr Land aufzugeben, da sie sonst eine Invasion riskierten. Aber bald wird Finnland ohnehin kein Grund zur Sorge mehr sein."
sweden_soviet.111.a:0 "Zu erwarten."
sweden_soviet.112.t:0 "Finnland bleibt trotzig"
sweden_soviet.112.d:0 "Es stellte sich heraus, dass die Finnen nicht so leicht zu besiegen waren, wie wir vielleicht erwartet hatten, aber dennoch müssen sie sich nun dem Zorn der Sowjets stellen. Es wäre ein Wunder, wenn Finnland länger als einen Monat überleben würde."
sweden_soviet.112.a:0 "Warum so viel Blut verschwenden, Finnland?"
sweden_soviet.30.t:0 "[SWE.GetName] schlägt Vereinigung vor"
sweden_soviet.30.d:0 "[SWE.GetName] hat uns ein diplomatisches Angebot gesandt, unsere Länder zu einem einzigen zu vereinen, um gemeinsam gegen die Sowjetunion zu bestehen."
sweden_soviet.30.a:0 "Gemeinsam sind wir stärker!"
sweden_soviet.30.b:0 "Wir möchten unsere Unabhängigkeit bewahren."
sweden_soviet.31.t:0 "[From.GetName] Tritt unserer Gewerkschaft bei!"
sweden_soviet.31.d:0 "[From.GetName] hat unser Angebot angenommen und wurde unter der Nordischen Union Sozialistischer Republiken vereint!"
sweden_soviet.31.a:0 "Willkommen, Genossen!"
sweden_soviet.32.t:0 "[From.GetName] lehnt die Einladung ab."
sweden_soviet.32.d:0 "[From.GetName] hat die Einladung, sich unserer glorreichen Union anzuschließen, abgelehnt. Wir können jedoch weiterhin Verbündete bleiben und gemeinsam den ausländischen Bedrohungen standhalten!"
sweden_soviet.32.a:0 "Das ist bedauerlich..."
sweden_soviet.33.t:0 "[SWE.GetName] lädt uns zum [SWE.GetFactionName] ein."
sweden_soviet.33.d:0 "Heute ist ein offizielles Kommuniqué aus Stockholm eingetroffen, in dem wir zur [SWE.GetFactionName] eingeladen werden. Im Kommuniqué wird erwähnt, dass wir uns gegen die Aggression aus dem Osten, nämlich die [SOV.GetName], wehren wollen. Was sollten wir antworten?"
sweden_soviet.33.a:0 "Ein Bollwerk gegen den Osten? Wir akzeptieren."
sweden_soviet.33.b:0 "Und den russischen Bären verärgern? Pass auf."
sweden_soviet.34.t:0 "[FROM.GetName] nimmt die Einladung an."
sweden_soviet.34.d:0 "[FROM.GetName] hat die Einladung angenommen, die wir ihnen ausgesprochen haben. Unser Bollwerk gegen die Bedrohung durch [SOV.GetName] wird stärker!"
sweden_soviet.34.a:0 "Willkommen!"
sweden_soviet.35.t:0 "[FROM.GetName] hat die Einladung abgelehnt."
sweden_soviet.35.d:0 "Leider haben unsere Freunde [FROM.GetName] die Einladung abgelehnt, Europa vor [SOV.GetName] zu schützen. Aber trotzdem werden wir sie vor der Bedrohung aus dem Osten schützen."
sweden_soviet.35.a:0 "Das ist bedauerlich."
sweden_soviet.40.t:0 "Arbeiter starten Putsch!"
sweden_soviet.40.d:0 "Nach monatelanger Vorbereitung sind unsere Arbeiter nun bereit, den Aufstand zu beginnen! Möge unser Sieg schnell sein und die revolutionäre Flamme niemals erlöschen!"
sweden_soviet.40.a:0 "Arbeiter, erhebt euch!"
sweden_soviet.60.t:0 "Schwedische Königsfamilie verschwunden"
sweden_soviet.60.d:0 "Nach dem politischen Wandel in Schweden äußerte sich der schwedische König zunehmend offen gegen den radikaleren Kurs des Landes. \n\n Seit seinem letzten Auftritt vor etwas mehr als einem Monat herrschte jedoch nahezu völliges Schweigen aus der königlichen Familie. Der neue schwedische Ministerpräsident gab öffentlich bekannt, dass das Verschwinden des Königs zutiefst beunruhigend sei. Die Haltung des neuen Regimes gegenüber dem Königshaus ist jedoch kein Geheimnis, und einige Experten befürchten das Schlimmste."
sweden_soviet.60.a:0 "Wie schrecklich!"

sweden_sca_unite.1.t:0 "[FROM.GetNameDefCap] schlägt skandinavische Vereinigung vor"
sweden_sca_unite.1.d:0 "In einem heutigen Meeting brachte [FROM.GetLeader] das Thema eines möglicherweise vereinten Skandinaviens zur Sprache. Er verwies darauf, dass die skandinavischen Länder kulturell und historisch schon immer eng miteinander verbunden waren und dass es angesichts eines bevorstehenden großen Krieges in Europa vorteilhaft sein könnte, sich zu einer politischen Einheit zusammenzuschließen, um potenzielle Bedrohungen leichter abwehren zu können."
sweden_sca_unite.1.a:0 "Sie bringen einen berechtigten Punkt vor."
sweden_sca_unite.1.b:0 "Wenn also einer fällt, fallen alle? "

sweden_sca_unite.2.t:0 "[FROM.GetNameDefCap] akzeptiert den Vorschlag"
sweden_sca_unite.2.d:0 "[FROM.GetLeader] hat dem Vorschlag zugestimmt und gesagt, dass [FROM.GetNameDef] sich anschließen wird, um den Skandinavischen Rat zu gründen"
sweden_sca_unite.2.a:0 "Wir wussten, dass sie die Vorteile erkennen würden"

sweden_sca_unite.3.t:0 "[FROM.GetNameDefCap] lehnt den Vorschlag ab"
sweden_sca_unite.3.d:0 "[FROM.GetLeader] hat erklärt, dass die Gründung eines Skandinavischen Rates als potenzieller Akt der Aggression anderer europäischer Mächte angesehen werden könnte und das Risiko berge, das Machtgleichgewicht zu stören. Daher haben sie die Einladung abgelehnt."
sweden_sca_unite.3.a:0 "Ohne sie sind wir schwächer ..."

sweden_sca_unite.4.t:0 "[FROM.GetNameDefCap] lädt [THIS.GetNameDefCap] zum Skandinavischen Rat ein"
sweden_sca_unite.4.d:0 "Heute telefonierte [THIS.GetLeader] mehrere Stunden mit [FROM.GetLeader] und wir diskutierten über verschiedene politische Themen. Dabei lud [FROM.GetLeader] uns ein, dem Skandinavischen Rat beizutreten. Obwohl wir nicht in Skandinavien leben, haben wir historische, kulturelle und wirtschaftliche Verbindungen zu dem Land, was uns zu einem Kandidaten für die Mitgliedschaft in diesem Rat macht."
sweden_sca_unite.4.a:0 "Für die Zukunft Skandinaviens!"
sweden_sca_unite.4.b:0 "Wir sollen unsere Unabhängigkeit wieder aufgeben, nachdem wir sie gerade erst erlangt haben?"

sweden_sca_unite.5.t:0 "[FROM.GetNameDefCap] nimmt die Einladung an"
sweden_sca_unite.5.d:0 "Heute kam die Nachricht, dass [FROM.GetNameDef] die Einladung in den Rat angenommen und mit den Vorbereitungen für die Vereinigung seiner Wirtschaft, Streitkräfte und zivilen Märkte mit unseren begonnen hat."
sweden_sca_unite.5.a:0 "Ausgezeichnet!"

sweden_sca_unite.6.t:0 "[FROM.GetNameDefCap] lehnt die Einladung ab"
sweden_sca_unite.6.d:0 "Leider teilte uns [FROM.GetNameDef] mit, dass sie kein wirkliches Interesse daran hätten, dem Rat beizutreten. Sie äußerten den Wunsch, ihre Unabhängigkeit nicht einfach aufgeben zu wollen, nachdem sie gerade erst ihre Unabhängigkeit erlangt hatten."
sweden_sca_unite.6.a:0 "Wie schade."

SWE_foreign_politics_events.1.t:0 "[SWE.GetAdjective] Druck auf die Regierung"
SWE_foreign_politics_events.1.desc:0 "Der [FROM.GetAdjective] Außenminister ist zu dringenden Konsultationen mit [THIS.GetLeader] in der Hauptstadt eingetroffen. Die [FROM.GetAdjective]-Delegation brachte eine lange Liste offener Fragen mit, von der Grenzsicherheit bis hin zu einigen unvorteilhaften Darstellungen von [FROM.GetLeader] in der lokalen Presse. In einer Pressemitteilung betonte der Außenminister die Bedeutung von Kooperation und friedlicher Zusammenarbeit, merkte jedoch an, dass [FROM.GetLeader] „es schwer finden würde, einen feindseligen oder unfreundlichen [THIS.GetNameDef] zu akzeptieren“."
SWE_foreign_politics_events.1.a:0 "Wir sind bereit, uns ihrer Fraktion anzuschließen, wenn wir unsere Verfassung behalten können."
SWE_foreign_politics_events.1.b:0 "Wir müssen unsere Regierung an ihrer ausrichten."
SWE_foreign_politics_events.1.c:0 "Wir werden keinen Zentimeter nachgeben."
SWE_foreign_politics_events.2.t:1 "[SWE.GetAdjective]-Sponsored Rallyes in der Hauptstadt"
SWE_foreign_politics_events.2.desc:0 "Mehrere politische Gruppen haben für diese Woche Kundgebungen in der Hauptstadt angekündigt. Sie scheinen keine konkreten Anliegen vorzubringen, abgesehen von der allgemeinen Ansicht, dass wir versuchen sollten, unsere Beziehungen zu [SWE.GetNameDef] zu verbessern und alle Politiker, die die [SWE.GetAdjective]-Regierung kritisieren, aus allen Machtpositionen zu entfernen.\n\nObwohl es möglich ist, dass diese Demonstrationen nur spontane Äußerungen der öffentlichen Meinung sind, ist es zumindest bemerkenswert, dass einige der wichtigsten Organisatoren kürzlich nach Stockholm gereist sind und nach ihrer Rückkehr offenbar begonnen haben, dafür zu werben."
SWE_foreign_politics_events.2.a:0 "Nun, das ist sicherlich ihr Recht."
SWE_foreign_politics_events.2.b:0 "Schicken Sie die Polizei, um ein paar Köpfe einzuschlagen!"
USA_stable_russia:0"Ein stabiles Amerika"
USA_the_silver_standard:0"Der Silberstandard"
USA_devalue_the_dollar:0"Den Dollar abwerten"
