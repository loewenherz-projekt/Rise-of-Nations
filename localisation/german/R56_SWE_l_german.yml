### Focuses
SWE_abandon_neutrality:0 "Neutralität aufgeben"
SWE_abandon_neutrality_desc:0 "Uns ist klar geworden, dass das 20. Jahrhundert kein ruhiges Jahrhundert sein wird. Wir müssen dafür sorgen, dass wir nicht wie leichte Beute dastehen und nur darauf warten, dass der Jäger den Schuss abfeuert. Nein, wenn Schweden überleben will, müssen wir zuerst handeln."
SWE_sven_olov_addresses_aland_convention:0 "Sven-Olov spricht auf der Åland-Konvention"
SWE_sven_olov_addresses_aland_convention_desc:0 "In einer heutigen Rede sprach Sven-Olov Lindholm über die Åland-Konvention von 1921. Darin wurde erklärt, dass die Åland-Inseln bei Finnland bleiben sollten, obwohl damals fast 90 % der Bevölkerung Schweden waren. Angesichts der heutigen Weltlage sollten wir die Konvention zum Schutz der auf Åland lebenden Schweden aufkündigen."
SWE_demand_aland:0"Nachfrage Åland"
SWE_demand_aland_desc:0 "Die Finnen befinden sich in einer Zwickmühle. Åland, ein Archipel mit schwedischer Mehrheit, gehört zu Finnland. Sie können es doch nicht gleichzeitig mit den Russen und uns um einen kleinen Archipel aufnehmen ..."
SWE_swedish_brownshirts:0 "Schwedische Braunhemden"
SWE_swedish_brownshirts_desc:0 "Unser jüngster Schritt in der Åland-Frage hat die NSAP ermutigt. Ihre Unterstützung in der Bevölkerung und (beunruhigenderweise) beim Militär wächst, und es scheint, als müsste die Regierungspartei sie in die Regierungskoalition aufnehmen, um die Kontrolle zu behalten."
SWE_stormtroopers:0 "Sturmtruppen"
SWE_stormtroopers_desc:0 "Wenn wir, nachdem wir die Fesseln der Demokratie abgeworfen haben, jemals etwas erreichen wollen, müssen wir unsere Armee ausbauen. Wir können viel mehr erreichen, indem wir eine paramilitärische Gruppe gründen, die mit der Armee zusammenarbeitet."
SWE_swedish_volunteers:0 "Schwedische Freiwillige"
SWE_swedish_volunteers_desc:0 "Überall auf der Welt greifen die Menschen zu den Waffen gegen die Bedrohung durch den Bolschewismus. Wir müssen bereit sein, diejenigen zu schicken, die bereit sind, sich ihrem Kampf gegen die Rote Gefahr anzuschließen."
SWE_improve_the_stormtroops:0 "Verbessere die Sturmtruppen"
SWE_improve_the_stormtroops_desc:0 "Da unsere Herrschaft nun gefestigt ist, müssen wir unsere paramilitärischen Kräfte verbessern und sie sogar in unsere offizielle Armee integrieren."
SWE_bring_finland_back:0 "Bring Finnland zurück"
SWE_bring_finland_back_desc:0 "Seit Schweden Finnland verloren hat, träumen wir davon, es von den Russen zurückzuerobern. Mit dem Untergang des Russischen Reiches erlebten wir die Geburt Finnlands als unabhängige Nation. Um dieses junge Land zu schützen, müssen wir jedoch eingreifen und Finnland zurück in unsere Hände nehmen."
SWE_return_to_european_scene:0 "Rückkehr auf die europäische Bühne"
SWE_return_to_european_scene_desc:0 "Nach fast zweihundert Jahren sind wir nun bereit, auf die europäische Bühne zurückzukehren. Wir werden nicht länger still aus dem Norden zusehen, sondern zu unserer glorreichen Geschichte zurückkehren."
SWE_approach_germany:0 "Anfahrt Deutschland"
SWE_approach_germany_desc:0 "Es ist kein Geheimnis, dass wir unseren eigenen Faschismus nach dem Vorbild der Deutschen gestaltet haben, und es dürfte niemanden überraschen, dass wir jetzt, da wir auf die Weltbühne zurückkehren, ein Bündnis mit den Deutschen anstreben."
SWE_press_aland_claim:0 "Drücken Sie den Åland-Anspruch"
SWE_press_aland_claim_desc:0 "Die Åland-Inseln gehören schon lange nicht mehr zu Schweden, doch die dort lebenden Menschen sprechen Schwedisch und identifizieren sich als Schweden. Finnland erhebt keinen tatsächlichen Anspruch auf die Inseln, außer in einigen Dokumenten."
SWE_divide_denmark:0 "Dänemark teilen"
SWE_divide_denmark_desc:0 "Dänemark war uns historisch ein Dorn im Auge, aber wir können nicht leugnen, dass es unsere nordischen Brüder sind. Doch die Zeiten ändern sich, und wir müssen in die Zukunft blicken. Indem wir Deutschland den Zugang zur See und die Rückgabe Schleswigs sichern, zwingen wir Dänemark zur Unterwerfung oder Annexion."
SWE_return_to_livonia:0 "Rückkehr nach Livland"
SWE_return_to_livonia_desc:0 "Livland war einst schwedisches Territorium und hat einen unglaublichen strategischen Wert, da es uns sowohl bei der Sicherung der Ostsee als auch bei einer Invasion im Osten hilft. Indem wir unsere alten Gebiete sichern, können wir tief in Russland vordringen."
SWE_march_alongside_the_british_blackshirts:0 "Marsch an der Seite der britischen Schwarzhemden"
SWE_march_alongside_the_british_blackshirts_desc:0 "In einer überraschenden Wendung der Ereignisse scheinen auch die Briten die Fesseln der Demokratie abgeworfen und eine neue Haltung in der Welt eingenommen zu haben. Wir sollten diese Gelegenheit nutzen, uns mit den Briten zu verbünden und dann nach Mitteleuropa zu blicken."
SWE_the_northern_front:0 "Die Nordfront"
SWE_the_northern_front_desc:0 "Da sich die Zeiten in Europa ändern, ist es Zeit für Schweden, die Führung zu übernehmen. Durch die Gründung einer eigenen Fraktion können wir diejenigen versammeln, die das gleiche Ziel verfolgen: den Kommunismus zu zerschlagen und die Ausbreitung des Kapitalismus zu stoppen."
SWE_legacy_of_great_northern_war:0 "Erbe des Großen Nordischen Krieges"
SWE_legacy_of_great_northern_war_desc:0 "Mit unseren neuen Verbündeten können wir nun das Erbe abschütteln, das unsere Nation heimsucht. Der Große Nordische Krieg markierte den ersten Niedergang unseres ehemaligen Reiches, aber jetzt können wir sicherstellen, dass wir als Sieger hervorgehen."
SWE_establish_new_protectorates:0 "Neue Protektorate errichten"
SWE_establish_new_protectorates_desc:0 "Da die junge Nation Deutschland nun besiegt ist, können wir uns mit einer erneuten Spaltung befassen und überschaubarere Teile des ehemaligen deutschen Adlers wieder unter unsere Kontrolle bringen."
SWE_proclaim_greater_sweden:0 "Großschweden ausrufen"
SWE_proclaim_greater_sweden_desc:0 " "
SWE_reclaim_ingermanland:0 "Ingermanland zurückerobern"
SWE_reclaim_ingermanland_desc:0 "Ingermanland besteht aus den Gebieten um Leningrad und war in der Vergangenheit ebenfalls schwedisch. Es wird wieder schwedisch werden."
SWE_secure_the_government:0 "Sichern Sie die Regierung"
SWE_secure_the_government_desc:0 "Wir können nicht tatenlos zusehen und abwarten, wie sich die Welt um uns herum verändert. Wenn Schweden gestärkt und nicht geschwächt aus dem kommenden Sturm hervorgehen will, müssen wir jetzt handeln. Zum Wohle Schwedens müssen wir die politischen Parteien niedertreten, die unser Land spalten und Schweden in den Ruin treiben."
SWE_sweden_first:0 "Schweden zuerst"
SWE_sweden_first_desc:0 "Viel zu lange haben wir untätig zugesehen, wie sich die Welt um uns herum verändert. Und da das Schicksal Europas auf dem Spiel steht, können wir nicht länger tatenlos zusehen. Wir müssen aufstehen und Europa daran erinnern, wozu Schweden fähig ist."
