### Focuses
SWE_stockholms_orlogsvarv:0 "Stockholms Örlogsvarv"
SWE_stockholms_orlogsvarv_desc:0 "Stockholms Örlogsvarv war für unsere Schiffsbauprogramme von entscheidender Bedeutung. Wenn wir eine Marine aufbauen wollen, die uns schützen kann, müssen wir unsere Trockendocks erweitern."
SWE_evaluate_naval_doctrine:0 "Marinedoktrin bewerten"
SWE_evaluate_naval_doctrine_desc:0 "Unsere Marinedoktrinen sind Jahrzehnte überholt und wir müssen die Vorgehensweisen der Vergangenheit überdenken und in die Zukunft blicken."
SWE_swedish_marines:0 "Schwedische Marine"
SWE_swedish_marines_desc:0 "Unser Land ist im Westen von den Bergen und im rechten Teil von der Ostsee eingezwängt. Wenn wir überhaupt eine Überquerung des Meeres in Erwägung ziehen wollen, müssen wir unsere Marines verstärken."
SWE_submarine_flotilla:0 "U-Boot-Flottille"
SWE_submarine_flotilla_desc:0 "Genau wie ein Angriff aus der Deckung ist auch ein Angriff auf ein Schiff unter Wasser eine tödliche Methode, unsere Feinde zu treffen. Wir sollten unsere U-Boote verbessern, damit sie für diejenigen, die es wagen, uns anzugreifen, eine noch größere Bedrohung darstellen."
SWE_swedish_hunterkillers:0 "Schwedische Jäger-Killer"
SWE_swedish_hunterkillers_desc:0 "Um unsere Küsten zu schützen, müssen wir sicherstellen, dass unsere Zerstörer auf dem neuesten Stand sind. Ausgehend von den Erfahrungen der Briten und Deutschen aus der Seekriegsführung sollten wir in der Lage sein, Schiffe zu konstruieren, die unsere Unabhängigkeit schützen können."
SWE_new_naval_estimates:0 "Neue Marineschätzungen"
SWE_new_naval_estimates_desc:0 "Neue Marineschätzungen"
SWE_bofors_naval_guns:0 "Bofors-Schiffsgeschütze"
SWE_bofors_naval_guns_desc:0 "Da Bofors an neuen Geschützen für den Einsatz an Land und auf See arbeitet, haben wir Zugang zu einem Hersteller von Schiffsgeschützen, der uns dabei helfen wird, den Anschluss an den Rest der Welt zu finden."
SWE_protect_merchant_sailors:0 "Schützen Sie die Handelsschiffe"
SWE_protect_merchant_sailors_desc:0 "Ein großer Teil unserer Wirtschaft ist auf den Export angewiesen. Wenn wir die Seeleute, die unsere Waren über das Meer transportieren, nicht schützen können, wird unsere Wirtschaft zusammenbrechen."
SWE_new_cruiser_designs:0 "Neue Cruiser-Designs"
SWE_new_cruiser_designs_desc:0 "Unsere Kreuzer sind stark veraltet und praktisch überholt. Mit etwas Geld sollten wir in der Lage sein, neuere Modelle auf die Meere zu bringen."
SWE_swedish_battlecruiser:0 "Schwedischer Schlachtkreuzer"
SWE_swedish_battlecruiser_desc:0 "Die Pansarskepp-Idee hat sich zwar als geeignet erwiesen, uns Sicherheit zu bieten, doch wenn wir uns außerhalb der Ostsee aufhalten wollen, sollten wir uns nach neuen Schiffstypen umsehen. Ein vollwertiges Schlachtschiff würde unser Budget wahrscheinlich übersteigen, der Schlachtkreuzer sollte jedoch passen."

