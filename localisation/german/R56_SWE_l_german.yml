SWE_swedish_disarmament_idea:0 "Schwedische Abrüstung"
SWE_swedish_disarmament_idea_desc:0 "Seit dem Ersten Weltkrieg kam es zu drastischen Kürzungen des Militärbudgets, da man ein großes stehendes Heer für unnötig hielt. Stattdessen wurden die Mittel für die Bekämpfung der Weltwirtschaftskrise und andere öffentliche Projekte verwendet. Angesichts des drohenden Krieges könnte es jedoch an der Zeit sein, den Militärhaushalt noch einmal zu überprüfen."
SWE_swedish_disarmament_1_idea:0 "Erste Wiederbewaffnung"
SWE_nationalist_military_garrisons:0 "Nationalistische Militärgarnisionen"
SWE_nationalist_military_garrisons_desc:0 "Obwohl die meisten Militärgarnisonen in Schweden aufgelöst wurden, ist der faschistische Einfluss in der Region noch immer spürbar. Große Teile des Militärs sehnen sich danach, dass der König die Kontrolle übernimmt oder jemand bereit ist, alles zu tun, um sich den Kommunisten entgegenzustellen."
