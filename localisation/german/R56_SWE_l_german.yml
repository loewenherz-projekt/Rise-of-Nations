### Focuses
SWE_swedish_internal_policy:0 "Schwedische Innenpolitik"
SWE_swedish_internal_policy_desc:0 "Im Vorfeld der bevorstehenden Wahlen sind die Spannungen in unserem Land und im Rest Europas gestiegen. Doch bevor wir den Blick nach außen richten können, müssen wir nach innen schauen."
SWE_hansson_iii_cabinet:0 "Hansson III Schrank"
SWE_hansson_iii_cabinet_desc:0 "Dies wird Hanssons drittes Kabinett sein; er hat sich als beliebter Premierminister erwiesen, der unsere Nation durch die harten Zeiten nach der Weltwirtschaftskrise geführt hat."
SWE_gosta_bagge_i_cabinet:0 "Gösta Bagge I Schrank"
SWE_gosta_bagge_i_cabinet_desc:0 "Gösta Bagge war ein beliebter Gegner von Per Albin Hansson und den Sozialdemokraten, und mit dieser Wahl wird es sein erstes Kabinett sein; möge er unsere Nation gut führen."
SWE_the_red_menace:0 "Die rote Bedrohung"
SWE_the_red_menace_desc:0 "Es ist kein Geheimnis, dass die Bedrohung durch den Kommunismus stetig wächst. Indem wir öffentlich unsere Ablehnung der revolutionären Methoden der Kommunisten bekunden, könnten wir als potenzieller Verbündeter im Kampf gegen die kommunistische Bedrohung angesehen werden."
SWE_not_a_european_abyssinia:0 "Kein europäisches Abessinien"
SWE_not_a_european_abyssinia_desc:0 "Die italienische Invasion Abessiniens ist ein Schicksal, das Schweden niemals widerfahren darf. Dies war einer der vielen Punkte, die zu Gösta Bagges Wahlsieg führten. Durch die Erhöhung des Militärbudgets kommen wir der Verhinderung eines europäischen Abessiniens einen Schritt näher."
SWE_swedish_foreign_policy:0 "Schwedische Außenpolitik"
SWE_swedish_foreign_policy_desc:0 "Nach dem Ersten Weltkrieg bekräftigten wir unsere Neutralität. Doch angesichts der veränderten Zeiten müssen wir unsere Außenpolitik überdenken und vielleicht auch unsere Vorstellung von Neutralität ändern."
SWE_scandinavian_collaboration:0 "Skandinavische Zusammenarbeit"
SWE_scandinavian_collaboration_desc:0 "Auch wenn wir nicht immer einer Meinung waren, herrschte zwischen den skandinavischen Ländern stets ein Gefühl der Verbundenheit. Indem wir auf unsere Nachbarn zugehen, stellen wir sicher, dass unsere Brüderlichkeit auch angesichts des drohenden Sturms am Horizont erhalten bleibt."
SWE_fight_unemployment:0 "Kampf gegen die Arbeitslosigkeit"
SWE_fight_unemployment_desc:0 "Obwohl die Große Depression uns nicht so stark traf wie den Rest der Welt, spürten wir ihre Auswirkungen. Nach der Großen Depression stieg die Arbeitslosigkeit an, doch durch kluge Investitionen und Subventionen sollten wir in der Lage sein, den Regionen zu helfen, die Schwierigkeiten haben, ihre Arbeiter zu bezahlen."
SWE_folkhemmet:0 "Folkhemmet"
SWE_folkhemmet_desc:0 "Folkhemmet, auch bekannt als „Gutes Zuhause“, ist die Idee einer Gesellschaft, in der es keine Privilegierten oder Unglücklichen, keine Favoriten oder Unerwünschten gibt, keine Ausbeutung der Bedürftigen, sondern eine Gesellschaft, in der Gleichheit, Freundlichkeit und Zusammenarbeit vorherrschen."
SWE_export_based_economy:0 "Exportbasierte Wirtschaft"
SWE_export_based_economy_desc:0 "Unsere Wirtschaft ist derzeit stark vom Export abhängig. Ob es nun um die Deutschen im Süden oder um andere Länder geht, die unser Eisenerz benötigen – wir liefern es. Diesen Vorteil sollten wir nutzen und sicherstellen, dass wir so viel wie möglich von diesem Export profitieren, solange es möglich ist."
SWE_skanelinjen:0 "Skånelinjen"
SWE_skanelinjen_desc:0 "Auch wenn die Dänen vielleicht nicht die größte Bedrohung für unsere Sicherheit darstellen, verfügen sie doch über eine der wenigen Möglichkeiten, Armeen aus Mitteleuropa nach Schweden zu verlegen, ohne Schiffe einsetzen zu müssen. Durch die Verbesserung der Skåne-Linie sollten wir hoffentlich in der Lage sein, alle Eindringlinge abzuwehren, die versuchen, von Dänemark nach Skåne vorzudringen."
SWE_the_saltsjobaden_agreement:0 "Das Saltsjöbaden-Abkommen"
SWE_the_saltsjobaden_agreement_desc:0 "Obwohl wir nach dem Geist des Folkhemmet streben, müssen wir akzeptieren, dass die Realität sich von dem Ideal unterscheidet, nach dem wir streben.\n\nDurch eine Einigung zwischen den Gewerkschaften und ihren Arbeitgebern sollten wir unserem Ziel jedoch einen Schritt näher kommen."
SWE_prepare_defensive_militias:0 "Bereiten Sie Verteidigungsmilizen vor"
SWE_prepare_defensive_militias_desc:0 "Obwohl wir offiziell neutral sind, müssen wir uns auf das Schlimmste vorbereiten. Eine Erhöhung der Wehrpflicht könnte jedoch von manchen als Zeichen der Aggression gewertet werden. Daher sollten wir stattdessen Milizen vorbereiten und sicherstellen, dass sie über die nötige Ausrüstung verfügen, um im Bedarfsfall für ihre Heimat zu kämpfen."
SWE_state_of_selective_neutrality:0 "Zustand der selektiven Neutralität"
SWE_state_of_selective_neutrality_desc:0 "Indem wir eine Art bewaffnete Neutralität erklären, signalisieren wir der Welt um uns herum, dass wir nicht bereit sind, für eine der beiden Seiten des Konflikts zu kämpfen, dass wir uns aber im Falle eines Angriffs mit allen Mitteln verteidigen werden. Hoffentlich ist das nicht nötig."
SWE_the_frivilligkaren_divisions:0 "Die Frivilligkåren-Divisionen"
SWE_the_frivilligkaren_divisions_desc:0 "Nach ihrer Kapitulation haben wir Kriegsflüchtlinge aufgenommen, die weiterhin kampfbereit und kampffähig sind. Mit ihrer Hilfe könnten wir möglicherweise Widerstandsbewegungen in den besetzten Gebieten ihrer Heimat unterstützen und gleichzeitig unseren offiziellen Neutralitätsstatus wahren."
SWE_military_access_for_ensured_safety:0 "Militärischer Zugang für garantierte Sicherheit"
SWE_military_access_for_ensured_safety_desc:0 "Da die Deutschen auf dem gesamten Kontinent Krieg führen, ist uns bewusst geworden, dass sie versuchen könnten, unsere Ressourcen mit allen Mitteln zu sichern. Wir dürfen auch nicht vergessen, dass wir eine strategische Position im Baltikum innehaben, die sie möglicherweise zu sichern versuchen. Indem wir ihnen die Möglichkeit bieten, Truppen durch unser Land zu bewegen, könnten wir ihre Vernichtung noch verhindern."
SWE_gmaskinen:0 "G-Maskinen"
SWE_gmaskinen_desc:0 "Angesichts des anhaltenden Krieges und unserer Neutralität befinden wir uns in einer Situation, in der die Deutschen unser Kommunikationsnetz zu ihrem eigenen Vorteil nutzen wollen. Natürlich wird dies verschlüsselt sein, aber Arne Beurling hat erwähnt, dass es möglich ist, das zu knacken, was auch immer die Deutschen zur Kommunikation verwenden, und dies könnte sich für die richtigen Leute als lebenswichtige Informationen erweisen."
SWE_operation_radda_danmark:0 "Operation Rädda Danmark"
SWE_operation_radda_danmark_desc:0 "Viel zu lange hat das dänische Volk unter der deutschen Besatzung gelitten. Wir können nicht länger tatenlos zusehen, wie unsere Brüder im Süden die grausame Not allein ertragen müssen. Und jetzt, da sich das Kriegsglück gegen die „Deutschen“ wendet, ist es unsere Pflicht, Dänemark zu Hilfe zu kommen."
SWE_the_finlands_sak_ar_var_recruitment_drive:0 "Die Rekrutierungskampagne „Finlands Sak är Vår“."
SWE_the_finlands_sak_ar_var_recruitment_drive_desc:0 "Was wir befürchtet haben, ist eingetreten: Die Sowjetunion hat Finnland angegriffen und bedroht nun dessen Unabhängigkeit. Immer mehr Menschen wollen für Finnland kämpfen, und der Slogan „Finlands sak är vår!“ erfreut sich unter den Kampfwilligen großer Beliebtheit. Wir werden sie nicht davon abhalten, für die Souveränität unserer finnischen Brüder zu kämpfen."
SWE_intervention_in_the_winter_war:0 "Intervention im Winterkrieg"
SWE_intervention_in_the_winter_war_desc:0 "Wir können nicht tatenlos zusehen, wie die Finnen gegen den russischen Bären bluten. Unsere Streitkräfte sind nun bereit, offiziell in den Kampf einzutreten.\n\n Finlands Sak är Vår!"
SWE_operation_stella_polaris:0 "Operation Stella Polaris"
SWE_operation_stella_polaris_desc:0 "Die Finnen haben Zugang zu äußerst hochwertigen Geheimdienstinformationen über die Russen. Indem sie ihren Codeknackern eine Anstellung hier in Schweden anbieten, können sie ihre Arbeit fortsetzen, ohne Angst haben zu müssen, von den Russen gefangen genommen zu werden."
SWE_neutral_no_more:0 "Nicht mehr neutral"
SWE_neutral_no_more_desc:0 "Schweden kann nicht länger tatenlos zusehen, wie autoritäre und diktatorische Mächte die Freiheiten der Menschen im In- und Ausland mit Füßen treten. Um Schwedens und der Zukunft der Menschheit willen werden wir unsere Neutralität aufgeben und gemeinsam mit den anderen demokratischen Nationen Europas dazu beitragen, den Faschismus zurückzudrängen."
SWE_denounce_fascist_aggression_europe:0 "Verurteilen Sie die faschistische Aggression in Europa"
SWE_denounce_fascist_aggression_europe_desc:0 "Viel zu lange hat sich der Krebs des Faschismus in Europa ausgebreitet. Es ist Zeit, dass wir Stellung beziehen und unsere Meinung der Welt mitteilen. Unsere Ressourcen dürfen nicht länger die Kriegsmaschinen des Faschismus antreiben!"
SWE_gunther_molotov_agreement:0 "Günther-Molotow-Abkommen"
SWE_gunther_molotov_agreement_desc:0 " "
SWE_baltic_sea_hegemony:0 "Hegemonie der Ostsee"
SWE_baltic_sea_hegemony_desc:0 " "

### Decisions + Categories
SWE_defensive_militias_category:0 "Bereiten Sie Verteidigungsmilizen vor"
SWE_defensive_militias_category_desc:0 "Da sich am Horizont ein Krieg abzeichnet, müssen wir Maßnahmen ergreifen, um sicherzustellen, dass wir auf die Verteidigung unseres Landes vorbereitet sind."
SWE_prepare_militias:0 "Milizen vorbereiten"
SWE_raise_militia:0 "Milizen aufstellen"
SWE_the_swedish_german_trade_situation_category:0 "Die schwedisch-deutsche Handelssituation"
SWE_the_swedish_german_trade_situation_category_desc:0 "Wir haben den schwedisch-deutschen Handelsvertrag vor einigen Jahren unterzeichnet. Angesichts der zunehmenden Spannungen in der Welt müssen wir den Vertrag jedoch noch einmal prüfen und entscheiden, was zu tun ist.\n\nSollen wir unseren derzeitigen Kurs beibehalten, uns auf die Eigenständigkeit konzentrieren oder unseren Handel mit den Deutschen ausbauen?"
SWE_find_other_trade_partners:0 "Handelspartner finden"
SWE_halt_german_trade:0 "Stoppen Sie den deutschen Handel"
SWE_expand_german_trade_influence:0 "Ausbau des deutschen Handelseinflusses"
SWE_rely_on_germany_for_trade:0 "Verlassen Sie sich im Handel auf Deutschland"
SWE_reestablish_trade_with_germany:0 "Wiederaufnahme des Handels mit Deutschland"
SWE_the_winter_war_category:0 "Der Winterkrieg"
SWE_the_winter_war_category_desc:0 "Die Sowjetunion ist in die Offensive gegangen und richtet ihren Blick auf unsere Brüder, die Finnen. Obwohl wir in den tobenden Kriegen, die in ganz Europa wüten, offiziell eine neutrale Haltung einnehmen, gibt es auch diejenigen, die für die Finnen kämpfen wollen.\n\nWir sollten denjenigen, die für Finnland kämpfen wollen, den Kampf nicht verbieten. Und obwohl wir nicht offiziell im Krieg sind, sollten wir versuchen, den Finnen Ausrüstung zukommen zu lassen, damit sie die Rote Gefahr abwehren können."
SWE_nationalist_military_garrisons_category:0 "Nationalistische Militärgarnisionen"
SWE_crackdown_on_nationalism_in_the_army:0 "Hartes Vorgehen gegen Nationalismus in der Armee"
SWE_empower_nationalist_garrisons:0 "Stärken Sie die nationalistischen Garnisonen"
SWE_aid_finland_in_their_fight:0 "Unterstützen Sie Finnland in seinem Kampf"
SWE_send_guns_to_finland:0 "Waffen nach Finnland schicken"
SWE_send_artillery_to_finland:0 "Artillerie nach Finnland schicken"
SWE_nordic_resistance_fighters_category:0 "Nordische Widerstandskämpfer"
SWE_fund_norwegian_resistance_fighters:0 "Fonds für norwegische Widerstandskämpfer"
SWE_fund_danish_resistance_fighters:0 "Fonds für dänische Widerstandskämpfer"
SWE_support_equipment_to_the_norwegian_resistance:0 "Unterstützungsausrüstung für den norwegischen Widerstand"
SWE_support_equipment_to_the_danish_resistance:0 "Unterstützungsausrüstung für den dänischen Widerstand"
SWE_heavy_guns_to_the_norwegian_resistance:0 "Schwere Geschütze für den norwegischen Widerstand"
SWE_heavy_guns_to_the_danish_resistance:0 "Schwere Geschütze für den dänischen Widerstand"
SWE_fighting_unemployment_category:0 "Kampf gegen die Arbeitslosigkeit"
SWE_fighting_unemployment_category_desc:0 "Im Zuge der Weltwirtschaftskrise ist die Arbeitslosigkeit in der Zivilbevölkerung gestiegen. Durch die Subventionierung bestimmter Arbeitnehmergruppen können wir sicherstellen, dass unsere Fabriken weiterhin die für unser Land benötigten Güter produzieren können."
SWE_factory_subsidies:0 "Fabriksubventionen"
SWE_dockyard_subsidies:0 "Werftsubventionen"
SWE_integrate_aland:0 "Åland integrieren"
SWE_find_an_alliance_category:0 "Finde eine Allianz"
SWE_find_an_alliance_category_desc:0 "Während die Welt in Aufruhr ist, gibt es Menschen, die an den wahren Werten der Demokratie festhalten. Wir sollten auf sie zugehen und ein Bündnis gründen, um gemeinsam die Werte der Freiheit zu verteidigen und eine geschlossene Front gegen den Faschismus zu bilden."
SWE_join_demo_from_factionname:0 "Treten Sie [FROM.getFactionName] bei"
SWE_join_demo_from_factionname_tt:0 "Schaltet §HEntscheidungen§! frei, um verschiedenen §Ydemokratischen§! Fraktionen in §YEuropa§! §Ybeizutreten§!"
SWE_reintegrate_the_empire_category:0 "Kategorie „Imperium wieder integrieren“"
SWE_reintegrate_state_into_empire:0 "[FROM.GetName] erneut integrieren."




