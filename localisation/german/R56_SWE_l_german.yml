### Focuses
SWE_swedish_defence_act:0 "Schwedisches Verteidigungsgesetz"
SWE_swedish_defence_act_desc:0 "Da sich die Zeiten ändern, müssen wir zu Hause bereit sein, unser Land zu verteidigen. Es ist die Pflicht jedes Mannes und jeder Frau, sicherzustellen, dass sie alles in ihrer Macht Stehende tun, um uns beim Schutz unseres Vaterlandes zu helfen."
SWE_the_coastal_artillery_program:0 "Das Küstenartillerieprogramm"
SWE_the_coastal_artillery_program_desc:0 "Wir verfügen über eine lange Küstenlinie. Durch den Bau von Befestigungen an Schlüsselpositionen sollten wir in der Lage sein, die meisten Angriffe von der See aus auf unsere Küsten abzuwehren."
SWE_rationing:0 "Rationierung"
SWE_rationing_desc:0 "Auch wenn die Vorstellung, Nahrungsmittel und Wasser rationieren zu müssen, nicht unbedingt aufregend ist, ist es wichtig, dass jeder weiß, wie man richtig rationiert, falls wir angegriffen werden und unser Zugang zum Handel mit der Außenwelt abgeschnitten ist."
SWE_air_defence_fortifications:0 "Luftverteidigungsanlagen"
SWE_air_defence_fortifications_desc:0 "Da die Luftwaffe in der Welt immer stärker vertreten ist, müssen wir Wege finden, um zu erkennen, wann ein Angriff aus der Luft bevorsteht, und wissen, wie wir ihn abwehren können, bevor er unserem Land tödlichen Schaden zufügen kann."
SWE_lottorna:0 "Lottorna"
SWE_lottorna_desc:0 "Während die Männer unseres Landes unsere Grenzen vor Eindringlingen schützen, müssen wir unsere Gesellschaft am Laufen halten. Indem wir Frauen in Arbeitsbereiche führen, die ihnen bisher verwehrt waren, können wir die Belastung unserer Kriegswirtschaft verringern."
SWE_recycling:0 "Recycling"
SWE_recycling_desc:0 "Durch Recycling können wir einige ältere Ressourcen wiederverwenden und entweder neue Verwendungsmöglichkeiten für sie finden oder sie zerlegen und daraus neue Dinge herstellen, wodurch die Menge an Abfall, die wir haben, reduziert wird."
SWE_hemvarnet:0 "Hemvärnet"
SWE_hemvarnet_desc:0 "Wir müssen die Idee der Nationalgarde (Hemvärnet) weiterentwickeln. Sollten wir angegriffen werden, müssen wir in der Lage sein, schnell eine größere Armee zu mobilisieren, um die Invasoren zurückzuschlagen."
SWE_the_swedish_defence_research_agency:0 "Die schwedische Verteidigungsforschungsagentur"
SWE_the_swedish_defence_research_agency_desc:0 "Mit der Gründung der schwedischen Verteidigungsforschungsagentur (Försvarets Forskningsanstalt) verfügen wir über ein Büro, das sich ausschließlich der Erforschung neuer Verteidigungsausrüstung widmet."
SWE_the_swedish_nuclear_program:0 "Das schwedische Atomprogramm"
SWE_the_swedish_nuclear_program_desc:0 "Die Vorstellung von Atomwaffen ist erschreckend. Doch um zu verstehen, wie wir uns davor schützen können, müssen wir verstehen, wie man sie baut."

