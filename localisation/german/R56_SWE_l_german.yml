SWE_armed_neutrality:0 "Bewaffnete Neutralität"
SWE_armed_neutrality_desc:0 "Indem wir uns für neutral erklären, sollten wir es hoffentlich auch bleiben. Es könnte jedoch sein, dass es Leute gibt, die versuchen, uns trotzdem anzugreifen. Deshalb müssen wir uns darauf einstellen.\n\n§RDieser Nationalgeist wird beim Beitritt zu einer Fraktion entfernt!§!"
