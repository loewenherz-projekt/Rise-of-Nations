### Focuses
SWE_swedish_army_staff:0 "Stab der schwedischen Armee"
SWE_swedish_army_staff_desc:0 "Um sicherzustellen, dass unsere Armee als geschlossene Einheit funktionieren kann, werden wir den Armeestab, auch Arméstaben genannt, einrichten. Dieser Stab wird für unsere Ausbildung, Taktik, Organisation und die Beschaffung der Ausrüstung zuständig sein."
SWE_begin_initial_rearmament:0 "Beginnen Sie mit der ersten Wiederbewaffnung"
SWE_begin_initial_rearmament_desc:0 "Beginnen Sie mit der ersten Wiederbewaffnung"
SWE_expand_the_military_budget:0 "Erhöhen Sie den Militärhaushalt"
SWE_expand_the_military_budget_desc:0 "Erhöhen Sie den Militärhaushalt"
SWE_fund_carl_gustafs_gevarsfaktori:0 "Fonds Carl Gustafs Gevärsfaktori"
SWE_fund_carl_gustafs_gevarsfaktori_desc:0 "Durch die Bereitstellung zusätzlicher Mittel für Gevärsfaktoriet können wir unser Arsenal deutlich schneller auf den neuesten Stand bringen. Die lokalen Fabriken können außerdem bei der Wiederbewaffnung unseres Landes helfen."
SWE_hire_scania_vabis:0 "Scania-Vabis mieten"
SWE_hire_scania_vabis_desc:0 "Scania-Vabis hat sich trotz seines jungen Alters als sehr erfolgreiches Unternehmen erwiesen. Wir sollten ihnen im Austausch für neue Fahrzeuge für unsere Armee finanzielle Unterstützung anbieten."
SWE_winter_equipment:0 "Winterausrüstung"
SWE_winter_equipment_desc:0 "Es ist kein Geheimnis, dass die Winter hier in Schweden lang, hart und unglaublich kalt sind. Wir müssen sicherstellen, dass unsere Soldaten besser für die kalten Winter gerüstet sind als die Feinde unserer Nation."
SWE_contract_landsverk:0 "Vertrag Landsverk"
SWE_contract_landsverk_desc:0 "Wir sind uns der geheimen Geschäfte zwischen dem deutschen Unternehmen GHH und AB Landsverk bewusst. Wir sollten das Wissen, das sie während ihrer Zusammenarbeit gewonnen haben, nutzen und sie bitten, eine Panzerung zu entwickeln, die mit der deutschen konkurrieren kann!"
SWE_contract_landsverk_strv_m38_tt:0 "Durch die Erforschung eines „Verbesserten Leichtpanzer-Chassis“ erhalten wir das Leichtpanzer-Design „Stridsvagn m/38“."
SWE_modern_command_structure:0 "Moderne Kommandostruktur"
SWE_modern_command_structure_desc:0 "Durch die Modernisierung unserer Kommandostruktur sollten wir widerstandsfähiger gegen Kommunikationsverluste sein. Wenn ein Zug sein Gesamtziel kennt, muss er nicht mehr daran erinnert werden und kann es nach eigenem Ermessen erreichen."
SWE_royal_military_academy:0 "Königliche Militärakademie"
SWE_royal_military_academy_desc:0 "Durch die Gründung einer Militärakademie können wir fähigere Offiziere und Anführer für unsere Truppen gewinnen. Es ist von entscheidender Bedeutung, dass unsere Armee von den Besten der Besten geführt wird!"
SWE_artilleriskjutskolan:0 "Artilleriskjutskolan"
SWE_artilleriskjutskolan_desc:0 "Was nützt Artillerie, wenn die Kanoniere nichts treffen? Im 15. Jahrhundert legte König Gustav Adolf den Grundstein für den Einsatz von Artillerie. Seitdem sind wir hinter unsere Zeitgenossen zurückgefallen und müssen aufholen und erneut beweisen, dass die schwedische Artillerie gefürchtet ist."
SWE_bofors_kanoner:0 "Bofors Kanoner"
SWE_bofors_kanoner_desc:0 "Bofors hat einige der besten Kanonen der Welt hergestellt. Wir sollten die Entwicklung besserer Waffen fördern, um uns einen Wettbewerbsvorteil zu verschaffen."
SWE_armens_jagarskola:0 "Arméns Jägarskola"
SWE_armens_jagarskola_desc:0 "Schweden ist von großen Wäldern bedeckt. Wir müssen unsere Streitkräfte ausbilden, damit sie wissen, wie sie sich möglichst effektiv bewegen und gleichzeitig wissen, wo und wie sie sich eingraben müssen. Wir sind eine kleine Nation. Wenn unsere Feinde in unserem Land Fuß fassen, müssen wir sie so schnell wie möglich zurückdrängen."
SWE_armens_jagarskola_tt:0 "Aktiviert §HSvenska Jägare§!\n§HJaegers\n Sanfter Angriff: §G+5%§!\n Verteidigung: §G+5%§!\n Wald:\n Verteidigung: §G+10%§!\n Bewegung: §G+5%§!§!"
SWE_state_of_disarmament:0 "Stand der Abrüstung"
SWE_state_of_disarmament_desc:0 "Seit dem schwedischen Verteidigungsgesetz von 1926 sind wir eine entwaffnete Nation – nicht durch einen Kriegsvertrag oder durch Einmischung von außen, sondern aus freien Stücken. Die aktuelle Weltlage lässt jedoch darauf schließen, dass sich die Zeiten ändern, und wir müssen darauf vorbereitet sein. Sollen wir an unserem entwaffneten Zustand festhalten und das Schicksal entscheiden lassen?"
SWE_the_budgetary_question:0 "Die Haushaltsfrage"
SWE_the_budgetary_question_desc:0 "Angesichts der Gefahr eines weiteren Krieges in Europa müssen wir unseren Haushalt erneut prüfen. Die Expansion in Städten wie Stockholm und Göteborg ist bereits geplant und im Gange, aber was dort gebaut werden soll, steht noch nicht fest."
SWE_jumpstart_the_arms_industry:0 "Starthilfe für die Rüstungsindustrie"
SWE_jumpstart_the_arms_industry_desc:0 "Zwar produzieren wir zwar eine kleine, aber konstante Waffenproduktion, doch die Anzahl unserer Fabriken reicht uns auf lange Sicht nicht aus. Wir müssen den Rüstungssektor ausbauen, damit er uns im Falle eines Krieges wirksam schützen kann."
SWE_expand_airfleet_capabilities:0 "Erweiterung der Luftflottenkapazitäten"
SWE_expand_airfleet_capabilities_desc:0 "Die derzeitigen Kapazitäten unserer Luftflotte reichen bei weitem nicht aus. Durch die Finanzierung des Baus und Ausbaus neuer Flugplätze schaffen wir eine solide Basis für unsere zukünftige Luftwaffe."
SWE_conclude_rearmament:0 "Wiederbewaffnung abschließen"
SWE_conclude_rearmament_desc:0 "Wir haben nun die Grenzen des Verteidigungsgesetzes von 1926 außer Kraft gesetzt. Sollte der Krieg auch unser Land erreichen, sind wir darauf vorbereitet."
SWE_fighter_designs:0 "Kämpferdesigns"
SWE_fighter_designs_desc:0 "Wenn man die rasante Entwicklung der Kampfflugzeuge seit dem Ersten Weltkrieg betrachtet, wird deutlich, dass wir uns selbst stärker auf diese mobilen Kampfflugzeuge konzentrieren müssen, damit wir nicht die Kontrolle über unseren eigenen Luftraum verlieren."
SWE_strike_craft_designs:0 "Strike Craft Designs"
SWE_strike_craft_designs_desc:0 "Mit unseren Kampfflugzeugen sollten wir in der Lage sein, schwerere Waffen zu montieren, die für Luftziele möglicherweise nicht geeignet sind, für Boden- und Seeziele jedoch sehr gut geeignet sein könnten."
SWE_medium_frame_craft:0 "Handwerk mit mittlerem Rahmen"
SWE_medium_frame_craft_desc:0 "Obwohl kleine und wendige Flugzeuge die Zukunft sein könnten, dürfen wir nicht außer Acht lassen, dass unsere Flugzeuge möglicherweise weiter vom sicheren schwedischen Boden entfernt sein werden. Durch den Bau größerer Flugzeugrümpfe können diese Flugzeuge weiter fliegen, wenn auch mit einem etwas weniger wendigen Rumpf."

