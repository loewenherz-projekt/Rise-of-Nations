sweden_nap.31.d:0 "Unsere Diplomaten sind mit der erfreulichen Nachricht aus [FROM.Capital.GetCapitalVictoryPointName] zurückgekehrt, dass die [FROM.GetAdjective] unseren vorgeschlagenen Vertrag unterzeichnet haben."
sweden_nap.31.a:0 "Perfekt!"
