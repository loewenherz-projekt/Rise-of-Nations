l_german:


PAR_findjobsforunemployedveterans:0 "Finden Sie Jobs für arbeitslose Veteranen"
PAR_findjobsforunemployedveterans_desc:0 "Seit dem Chaco-Krieg gibt es in Paraguay viele arbeitslose Veteranen. Die Schaffung von Arbeitsplätzen für sie wird unserer Wirtschaft helfen."
PAR_completeindustrializationprojects:0 "Komplette Industrialisierungsprojekte"
PAR_completeindustrializationprojects_desc:0 "Unsere Industrieprojekte im ganzen Land haben unsere Wirtschaft gestärkt. Es ist Zeit, das Projekt abzuschließen."
PAR_industrializethecountry:0 "Industrialisieren Sie das Land"
PAR_industrializethecountry_desc:0 "Paraguay weist im Allgemeinen einen Mangel an Fertigungskapazitäten auf, obwohl viele Fabriken ausschließlich für militärische Zwecke genutzt werden."
PAR_infrastructureinthechaco:0 "Infrastruktur im Chaco"
PAR_infrastructureinthechaco_desc:0 "Die nördliche Chaco-Region ist weit von einer Industrialisierung entfernt. Der Ausbau der lokalen Infrastruktur wird sowohl der Zivilbevölkerung als auch den Militärs zugutekommen."
PAR_theparaguayaneconomy:0 "Die paraguayische Wirtschaft"
PAR_theparaguayaneconomy_desc:0 "Die paraguayische Wirtschaft ist alles andere als stabil. Der Chaco-Krieg hat die Militärausgaben so stark ansteigen lassen wie nie zuvor, und obwohl Präsident Ayala versucht hat, seine Macht einzuschränken, gibt es immer noch eine große Zahl arbeitsloser Veteranen."
PAR_americanprussia:0 "Amerikanisches Preußen"
PAR_americanprussia_desc:0 "Paraguay ist zum Preußen Amerikas geworden. Es ist an der Zeit, diesen Titel Wirklichkeit werden zu lassen."
PAR_armyeffort:0 "Armeeeinsatz"
PAR_armyeffort_desc:0 "Eine große Armee ist ohne die nötige Technologie nutzlos, und da wir in den kommenden Kriegen höchstwahrscheinlich in der Unterzahl sein werden, sollten wir die Investitionen in die militärische Forschung erhöhen."
PAR_recommissionboliviantanks:0 "Paraguayisches Panzerkorps"
PAR_recommissionboliviantanks_desc:0 "Während des Chaco-Krieges haben wir die Macht der bolivianischen Panzer erlebt. Wir sollten ein Elite-Panzerkorps gründen, um alle Bedrohungen zu bekämpfen."
PAR_lopezproject:0 "Lopez-Projekt"
PAR_lopezproject_desc:0 "Wissenschaftler im ganzen Land entwickeln eine neue Waffe, die nach unserem alten Führer „Lopez-Bombe“ genannt wird. Ihre Auswirkungen sind verheerend und werden jeden Krieg gewinnen."
PAR_bombereffort:0 "Bomber-Anstrengung"
PAR_bombereffort_desc:0 "Bomber sind ein wichtiger Bestandteil jeder Luftwaffe. Wir sollten unsere Bombertechnologie ausbauen."
PAR_fightereffort:0 "Kämpfereinsatz"
PAR_fightereffort_desc:0 "Kampfflugzeuge sind ein notwendiger Bestandteil jeder Luftwaffe. Wir sollten unsere Kampfflugzeugkapazitäten ausbauen."
PAR_builddockyards:0 "Werften bauen"
PAR_builddockyards_desc:0 "Um mit den großen Marinenationen der Welt konkurrieren zu können, sind Schiffswerften erforderlich, da die Küstenlinie gesichert ist."
PAR_theparaguayanarmy:0 "Die paraguayische Armee"
PAR_theparaguayanarmy_desc:0 "Die Armee war schon immer die Stärke Paraguays. Das Überleben des Staates hängt von ihr ab."
PAR_theparaguayanairforce:0 "Die paraguayische Luftwaffe"
PAR_theparaguayanairforce_desc:0 "Es ist klar, dass die Zukunft der Kriegsführung in der Luft liegt. Der Aufbau einer Luftwaffe für unser Land wird in Zukunft von Vorteil sein."
PAR_increaseresearchfunding:0 "Erhöhung der Forschungsmittel"
PAR_increaseresearchfunding_desc:0 "Um mit anderen Ländern mithalten zu können, müssen wir unser Forschungsniveau noch weiter verbessern."
PAR_fortifysouthernparaguay:0 "Südparaguay stärken"
PAR_fortifysouthernparaguay_desc:0 "Wir müssen unser offenes Südgebiet für den Fall eines argentinischen Vormarsches befestigen"
PAR_defenceofthenation:0 "Verteidigung der Nation"
PAR_defenceofthenation_desc:0 "Egal, wer der Eindringling ist, Paraguay wird standhaft bleiben!"
PAR_paraguayanmilitaryeconomy:0 "Paraguayische Militärwirtschaft"
PAR_paraguayanmilitaryeconomy_desc:0 "Der paraguayische Militärsektor darf in dieser Zeit des wirtschaftlichen Aufschwungs nicht vergessen werden. Die Rüstungsproduktion muss gesteigert werden."
PAR_completemilitaryprojects:0 "Komplette Militärprojekte"
PAR_completemilitaryprojects_desc:0 ""
PAR_fullworkersupport:0 "Volle Mitarbeiterunterstützung"
PAR_fullworkersupport_desc:0 "Ein Land kann nur dann stark sein, wenn es die Unterstützung seiner Arbeitnehmer hat. In Paraguay wird es nicht anders sein."
PAR_chacooil:0 "Chaco-Öl"
PAR_chacooil_desc:0 "Die Chaco-Region ist reich an Öl! Wir sollten nach mehr Öl suchen, um das volle Potenzial auszuschöpfen."
PAR_topplecorruptargentinelandlords:0 "Sturz korrupter argentinischer Grundbesitzer"
PAR_topplecorruptargentinelandlords_desc:0 "Seit dem Großen Krieg wird unser Land faktisch von Argentiniern regiert. Sie müssen gestürzt werden, damit Paraguay wirklich paraguayisch wird."
PAR_eliminateunemployment:0 "Arbeitslosigkeit beseitigen"
PAR_eliminateunemployment_desc:0 "Arbeitslosigkeit wird der Vergangenheit angehören. Jeder Mensch wird ein Arbeiter sein!"
PAR_createtheconfederationofparaguayanworkers:0 "Gründung der Konföderation der paraguayischen Arbeiter"
PAR_createtheconfederationofparaguayanworkers_desc:0 "Wir werden einen Gewerkschaftsbund gründen, der unserem Land in Zeiten der Not hilft und seine Wirtschaft auf ein bisher unerreichbares Niveau ankurbelt."
PAR_adoptalabourcode:0 "Verabschiedung eines Arbeitsgesetzbuches"
PAR_adoptalabourcode_desc:0 "Wir sollten in Paraguay ein Arbeitsgesetzbuch einführen, um die Arbeit der Arbeiter zu standardisieren."
PAR_fortressasuncion:0 "Festung Asuncion"
PAR_fortressasuncion_desc:0 "Feinde, die versuchen, in unser Land einzudringen, sollten wissen, dass wir vorbereitet sind. Und dass sie vernichtet werden."
PAR_funduniversityofasuncion:0 "Fonds der Universität Asuncion"
PAR_funduniversityofasuncion_desc:0 "Wir müssen unsere Forschungsleistung im Land steigern."
PAR_useveteranstoimprovemilitarybases:0 "Veteranen zur Verbesserung von Militärstützpunkten einsetzen"
PAR_useveteranstoimprovemilitarybases_desc:0 "Wir sollten unsere große Anzahl an Veteranen nutzen, um unsere Militärstützpunkte im Chaco zu verbessern"
PAR_furtherindustrialization:0 "Weitere Industrialisierung"
PAR_furtherindustrialization_desc:0 "Um die Wirtschaft des Landes zu stärken, ist eine weitere Industrialisierung erforderlich."
PAR_infrastructureacrossthecountry:0 "Infrastruktur im ganzen Land"
PAR_infrastructureacrossthecountry_desc:0 "Damit das Land wirklich mit dem Westen mithalten kann, muss die Infrastruktur in ganz Paraguay verbessert werden."
PAR_agrarianreformlawof1936:0 "Agrarreformgesetz von 1936"
PAR_agrarianreformlawof1936_desc:0 "Um unsere Wirtschaft zu unterstützen, sollten wir das Land aller Bauern verstaatlichen. Jeder Arbeiter soll einen Platz in unserem Land haben."
PAR_armydoctrines:0 "Armeedoktrinen"
PAR_armydoctrines_desc:0 "Wir müssen die Taktik unserer Armeen verbessern, um jeden Feind jederzeit besiegen zu können."
PAR_peoplesarmy:0 "Volksarmee"
PAR_peoplesarmy_desc:0 "Unsere Armee ist für das Volk! Marschiert vorwärts und vernichtet die Feinde, die euch vernichten wollen!"
PAR_increasedmilitarism:0 "Zunehmender Militarismus"
PAR_increasedmilitarism_desc:0 "Um in einer angespannten Welt überleben zu können, muss die Armee militarisiert werden."
PAR_buildourowntanks:0 "Bauen Sie unsere eigenen Tanks"
PAR_buildourowntanks_desc:0 "Auch wenn wir über einige bolivianische Panzer verfügen, werden diese nicht ausreichen, um unsere Kriegsmaschinerie in Zukunft anzutreiben."
PAR_buyitalianplanes:0 "Kaufen Sie italienische Flugzeuge"
PAR_buyitalianplanes_desc:0 "Da unsere Luftstreitkräfte nicht über die erforderliche Stärke verfügen, könnten wir den Italienern einige Flugzeuge abkaufen."
PAR_airdoctrines:0 "Luftdoktrinen"
PAR_airdoctrines_desc:0 "Wir sollten bessere Strategien für den Luftkrieg entwickeln, denn ein Mangel an Ordnung wird mit Sicherheit unseren Untergang bedeuten."
PAR_paraguayanantiair:0 "Luftwaffenstützpunkte Asunción"
PAR_paraguayanantiair_desc:0 "Eine Luftwaffe ist ein zweischneidiges Schwert. Wir müssen unsere Fähigkeiten gegen jegliche feindliche Luftangriffe stärken."
PAR_theparaguayannavy:0 "Die paraguayische Marine"
PAR_theparaguayannavy_desc:0 "Obwohl das Land keinen Zugang zum Meer hat, verfügte Paraguay schon immer über eine Marine."
PAR_theparaguayanarmedforces:0 "Die paraguayischen Streitkräfte"
PAR_theparaguayanarmedforces_desc:0 "Die Streitkräfte haben in Paraguay schon immer eine wichtige Rolle gespielt, sei es bei der Verteidigung des Landes oder bei der Invasion anderer Länder."
PAR_bringupthenavy:0 "Erwähnen Sie die Marine"
PAR_bringupthenavy_desc:0 "Da wir eine Küste erworben haben, sollten wir unsere Marine nach westlichen Standards ausbauen."
PAR_ruletheskies:0 "Beherrsche den Himmel"
PAR_ruletheskies_desc:0 "Britannien mag die Meere beherrschen, aber Paraguay wird den Himmel beherrschen!"
PAR_iab:0 "Erhöhte Luftvorteile"
PAR_iab_desc:0 "Wir sollten die Vergünstigungen für den Eintritt in die Luftwaffe erhöhen, um sie ebenso attraktiv wie die Armee zu machen."
PAR_ast:0 "All-Situation-Training"
PAR_ast_desc:0 "Die Region Paraguay ist ein Land voller Geheimnisse und Unberechenbarkeit. Wir müssen auf jede Veränderung der Lage vorbereitet sein."
PAR_navydoctrines:0 "Marinedoktrinen"
PAR_navydoctrines_desc:0 "Wir sollten unsere Marinetaktiken für den Fall eines Seekriegs auf Flüssen oder im Meer ausbauen."
PAR_potn:0 "Stolz der Nation"
PAR_potn_desc:0 "Die Armee spielt in der paraguayischen Gesellschaft bereits eine wichtige Rolle. Warum sollte diese Rolle nicht noch weiter ausgebaut werden?"
PAR_industrial_effort:0 "Industrielle Anstrengungen"
PAR_industrial_effort_desc:0 "Wir sollten unsere Industrie so ausbauen, dass sie mit den größeren Staaten des Kontinents mithalten kann."
PAR_electronics_effort:0 "Elektronikaufwand"
PAR_electronics_effort_desc:0 "Wir sollten unsere elektronische Technologie so ausbauen, dass wir mit den größeren Staaten des Kontinents gleichziehen können."
PAR_bandemocraticparties:0 "Verbot demokratischer Parteien"
PAR_bandemocraticparties_desc:0 "Um einen Aufstand der Liberalen gegen unsere Herrschaft zu verhindern, sollten wir demokratische Parteien verbieten und Paraguay in einen Einparteienstaat umwandeln."
PAR_theparaguayangovernment:0 "Die paraguayische Regierung"
PAR_theparaguayangovernment_desc:0 "Die paraguayische Regierung ist alles andere als stabil. Es werden Anstrengungen unternommen, sie zu stabilisieren, um eine positive Zukunft zu ermöglichen."
PAR_exileayala:0 "Verbannen Sie Ayala"
PAR_exileayala_desc:0 "Wir sollten den ehemaligen Präsidenten Eusebio Ayala ins Exil schicken. Seine Anwesenheit im Land stellt eine Bedrohung für die Stabilität dar."
PAR_increasegovernmentefficency:0 "Steigerung der Regierungseffizienz"
PAR_increasegovernmentefficency_desc:0 "Wir müssen dafür sorgen, dass unsere Regierung effizienter, einheitlicher und weniger von internen Machtkämpfen geprägt ist."
PAR_astabledemocraticparaguay:0 "Ein stabiles demokratisches Paraguay"
PAR_astabledemocraticparaguay_desc:0 "Paraguay war noch nie so vereint und stabil. Möge unsere Regierung niemals stürzen!"
PAR_compromisewiththesocialists:0 "Kompromiss mit den Sozialisten"
PAR_compromisewiththesocialists_desc:0 ""
PAR_thenewliberals:0 "Die neuen Liberalen"
PAR_thenewliberals_desc:0 "Wir sollten uns als „neue Liberale“ neu positionieren, um uns von der problematischen ursprünglichen Partei abzugrenzen"
PAR_balancedbudget:0 "Ausgeglichener Haushalt"
PAR_balancedbudget_desc:0 "Wir sollten den Staatshaushalt zwischen verschiedenen Ausgaben ausgleichen"
PAR_installestigarribaaspresident:0 "Stärkung der Beziehungen zur Armee"
PAR_installestigarribaaspresident_desc:0 "Obwohl wir die Armee auf unsere Seite gebracht haben, ist der Staat alles andere als stabil. Die Loyalität der Armee muss sichergestellt werden."
PAR_compromisewiththearmy:0 "Kompromiss mit der Armee"
PAR_compromisewiththearmy_desc:0 "Die Armee war ein wichtiger Unterstützer Francos. Wir sollten versuchen, sie auf unsere Seite zu ziehen."
PAR_learningfromourmistakes:0 "Aus unseren Fehlern lernen"
PAR_learningfromourmistakes_desc:0 "Es besteht kein Zweifel, dass die Herrschaft der Liberalen im ganzen Land Chaos verursacht hat. Wir sollten daran arbeiten, die Nation wieder zu stabilisieren."
PAR_establishheroesday:0 "Heldentag etablieren"
PAR_establishheroesday_desc:0 "Wir sollten einen Tag einführen, an dem wir unsere Helden feiern, darunter Fulgencio Yegros und Carlos Antonio Lopez."
PAR_fundwarveteranpensions:0 "Fonds für Kriegsveteranenrenten"
PAR_fundwarveteranpensions_desc:0 "Die schwache liberale Regierung weigerte sich, den Chaco-Veteranen Kriegsrenten auszuzahlen. Wir sollten dies tun, um die Veteranen auf unsere Seite zu ziehen."
PAR_createtherevolutionarynationalunion:0 "Gründung der Revolutionären Nationalen Union"
PAR_createtherevolutionarynationalunion_desc:0 "Wir sollten eine Partei gründen, die eine repräsentative Demokratie und Arbeitnehmerrechte umfasst, um unsere Herrschaft und Produktion über die Nation zu steigern."
PAR_strengthentheliberalhold:0 "Stärkung des liberalen Einflusses"
PAR_strengthentheliberalhold_desc:0 "Der Putschversuch Rafael Francos zeigt, wie instabil das Land ist. Wir müssen daran arbeiten, unsere Herrschaft über Paraguay zu stärken."
PAR_increasestability:0 "Erhöhte Stabilität"
PAR_increasestability_desc:0 "Da Paraguay nach einer Ära der Putsche im Chaos versinkt, sollten wir uns auf die Stabilisierung des Landes konzentrieren."
PAR_strengthenourrule:0 "Stärken Sie unsere Herrschaft"
PAR_strengthenourrule_desc:0 "Wir sollten unsere Ära der Putsche und Kriege beenden und Paraguay endlich eine starke Regierung an die Spitze stellen."
PAR_strengthenfrancoshold:0 "Francos Einfluss stärken"
PAR_strengthenfrancoshold_desc:0 "Trotz der Unterstützung des Militärs steckt Rafael Franco als Präsident immer noch in einer schwierigen Lage. Wir sollten seine Herrschaft stärken."
PAR_astablesocialistparaguay:0 "Ein stabiles sozialistisches Paraguay"
PAR_astablesocialistparaguay_desc:0 "Es lebe die Februarrevolution! Möge unsere Regierung niemals fallen!"
PAR_openschoolsandcolleges:0 "Offene Schulen und Hochschulen"
PAR_openschoolsandcolleges_desc:0 "Um Paraguay in Zukunft zu einem gebildeteren Land zu machen, müssen wir jetzt beginnen. Hunderte von Schulen sollen im ganzen Land entstehen."
PAR_promotetheguarani:0 "Fördern Sie die Guarani"
PAR_promotetheguarani_desc:0 "Wir sollten den Guarani die Möglichkeit geben, gleichberechtigte Bürger aller Paraguayer zu werden, um ihnen eine bessere und strahlendere Zukunft zu ermöglichen."
PAR_eliminatetheguarani:0 "Eliminiert die Guarani"
PAR_eliminatetheguarani_desc:0 "Die Guarani zeigen die Schwäche unseres Landes. Sie müssen ausgelöscht werden, damit wir stark werden."
PAR_encourageintermarriage:0 "Fördern Sie Mischehen"
PAR_encourageintermarriage_desc:0 "Wir sollten auf die Zusammenführung unserer Guarani- und Hispanoamerikaner-Bevölkerung hinarbeiten, um eine paraguayische Identität zu schaffen."
PAR_thestatusoftheguarani:0 "Der Status der Guarani"
PAR_thestatusoftheguarani_desc:0 "Die indigene Minderheit der Guarani spielt in Paraguay eine große und wichtige Rolle. Was sollen wir mit ihnen tun?"
PAR_theriverfleet:0 "Die Flussflotte"
PAR_theriverfleet_desc:0 "Mit unserer neu gesicherten Küste können wir die bisherigen Erfahrungen unserer Marine auf den Flüssen Südamerikas nutzen und ihr Potenzial auf offener See ausschöpfen."
PAR_combinedindustrialprojects:0 "Kombinierte Industrieprojekte"
PAR_combinedindustrialprojects_desc:0 "Unsere Armee und die Zivilbevölkerung werden zusammenarbeiten, um die gesamte Industrie in Paraguay anzukurbeln."
PAR_codetalkers:0 "Guarani-Code-Sprecher"
PAR_codetalkers_desc:0 "Wir werden damit beginnen, unser Militär in der Guarani-Sprache zu unterrichten, um unsere Befehle vor unseren Feinden besser verbergen zu können."
PAR_identity:0 "Eine paraguayische Identität"
PAR_identity_desc:0 "Wir werden eine paraguayische Identität schaffen, statt Spaniern oder Ureinwohnern werden alle Paraguayer sein."
PAR_whitepar:0 "Spanische Republik"
PAR_whitepar_desc:0 "Wir werden einen Staat schaffen, in dem die Nachkommen der spanischen Kolonialisten uns durch die harten Zeiten führen, die wir erleben, und dabei jeden primitiven Einfluss der Guarani ausschalten."
PAR_influencethechurch:0 "Einfluss auf die Kirche"
PAR_influencethechurch_desc:0 "Die Kirche soll als Institution erhalten bleiben, solange sie sich allen Auflagen des Staates fügt."
PAR_statusquo:0 "Status Quo"
PAR_statusquo_desc:0 "Dem Militär geht es gut, so wie es ist! Da muss man nichts machen."
PAR_thestatusofthemilitary:0 "Der Status des Militärs"
PAR_thestatusofthemilitary_desc:0 "Das Militär hat im heutigen Paraguay eine große Rolle gespielt, aber vielleicht sollte sich seine Rolle ändern."
PAR_curbthepowerofthemilitary:0 "Die Macht des Militärs einschränken"
PAR_curbthepowerofthemilitary_desc:0 "Das Militär war in letzter Zeit möglicherweise zu mächtig. Eine etwas geringere Präsenz im Land dürfte zu einer besseren Zukunft beitragen."
PAR_changetheroleofthemilitary:0 "Die Rolle des Militärs ändern"
PAR_changetheroleofthemilitary_desc:0 "Wir sollten uns bemühen, unser Militär von einer einfachen „Kriegstruppe“ zu lösen und es besser in den Dienst der Bevölkerung zu stellen."
PAR_eliminatethechurch:0 "Beseitigen Sie die Kirche"
PAR_eliminatethechurch_desc:0 "Die Religion plagt Paraguay seit der Gründung des Jesuiten-Missionsstaates! Damit ist jetzt Schluss! Wir werden die Kirche vertreiben und eine moderne atheistische Gesellschaft schaffen!"
PAR_thestatusofthechurch:0 "Der Status der Kirche"
PAR_thestatusofthechurch_desc:0 "Auch die Kirche spielt in Paraguay eine große Rolle. Wir sollten über die Zukunft dieser Institution entscheiden."
PAR_religiousdoctrines:0 "Religiöse Lehren"
PAR_religiousdoctrines_desc:0 "Seit dem alten Jesuiten-Missionsstaat war Paraguay immer ein Hotspot für Religionen aller Art. Das zu ändern würde unsere Identität zerstören."
PAR_countercoup:0 "Gegenputsch in Paraguay"
PAR_countercoup_desc:0 "Nach einem militärischen Gegenputsch versuchen die neuen Machthaber, ihre Macht im Land zu festigen."
PAR_theoceanfleet:0 "Unsere Flotte auf See bringen"
PAR_theoceanfleet_desc:0 "Mit einer Küste können wir unsere Flussflotte endlich in die Weltmeere bringen."
PAR_revisingrights:0 "Überarbeitung unserer Nation"
PAR_revisingrights_desc:0 "Es ist klar, dass unsere Nation alles andere als perfekt ist. Wenn sie erst einmal stabil ist, können wir uns daran machen, den Status jeder einzelnen Gruppe darin zu ändern."
PAR_italplanes:0  "Kaufen Sie italienische Flugzeuge"
PAR_italplanes_desc:0 "Die Italiener in Europa sind bestrebt, einen Teil ihrer überschüssigen Luftwaffenausrüstung zu verkaufen. Wir können von diesem Verkauf profitieren und im südamerikanischen Luftwaffenwettrüsten die Oberhand gewinnen."
PAR_equipment:0 "Suche nach Ausrüstung"
PAR_equipment_desc:0 "Es liegt bestimmt noch etwas Ausrüstung herum, nach all den Kriegen, die es gegeben hat, kann man jede Menge davon finden."
PAR_lopezhouse:0 "Das Haus von Lopez"
PAR_lopezhouse_desc:0 "Wir sollten die Herrschaft über Paraguay an die Gruppe zurückgeben, die uns überhaupt erst unsere Unabhängigkeit ermöglicht hat: das Haus Lopez!"
PAR_fortresses:0 "Sich für einen neuen Krieg eingraben"
PAR_fortresses_desc:0 "Unsere Herrschaft über Paraguay wird wahrscheinlich angefochten werden. Wir sollten uns darauf vorbereiten, das Land gegen jede Bedrohung zu verteidigen, egal ob von innen oder außen."
PAR_lopezideolized:0 "Idolisieren Sie Lopez"
PAR_lopezideolized_desc:0 "Wir sollten Lopez zu einem nationalen Idol machen, um die nationale Moral und das Vertrauen in die Regierung zu stärken."
PAR_astablelopezstate:0 "Stabile Herrschaft unter Lopez"
PAR_astablelopezstate_desc:0 "Wir haben das Land unter dem Lopez-Regime stabilisiert. Wir können einer rosigen Zukunft für unseren Staat entgegensehen."
PAR_thestatusoflopez:0 "Der Status von Francisco Solano Lopez"
PAR_thestatusoflopez_desc:0 "Unser alter Anführer, Francisco Solano Lopez, wurde nach seiner letzten Niederlage in Cerro Cora zurückgelassen. Wir sollten etwas gegen ihn unternehmen."
PAR_burnhim:0 "Finde und töte Lopez"
PAR_burnhim_desc:0 "Wir sollten danach streben, Francisco Solano Lopez zu finden und zu töten, die loyalistische Fraktion zu schwächen und das Land endgültig von seiner Herrschaft zu befreien."
PAR_leavehimbe:0 "Lass Lopez in Ruhe"
PAR_leavehimbe_desc:0 "Wir sollten Francisco Solano Lopez an seinem Grab in Cerro Cora zurücklassen. Es wäre unverantwortlich, ihm das Land zu nehmen, auch wenn er ein Nationalheld ist."
PAR_takehimelswehere:0 "Lopez zurückholen"
PAR_takehimelswehere_desc:0 "Wir sollten Francisco Solano Lopez aus Cerro Cora holen und ihn nach Asuncion bringen, wo er als Nationalheld in Frieden ruhen soll."
PAR_mobilize:0 "Mobilisieren Sie die Nation"
PAR_mobilize_desc:0 "Unsere Nachbarn werden es vielleicht nicht so leicht haben, wenn Lopez unser Land regiert. Wir sollten die Nation für den Fall einer Bedrohung mobilisieren."
PAR_thomasthetankengine:0 "Vervollständige die Eisenbahn"
PAR_thomasthetankengine_desc:0 "Francisco Solano Lopez ordnete den Bau einer Eisenbahnlinie an, die ganz Paraguay durchqueren sollte. Der Bau wurde jedoch aufgrund des Krieges gestoppt. Unser Ziel sollte der Wiederaufbau und die Modernisierung sein."
PAR_grandarmy:0 "Paraguayische Grande Armee"
PAR_grandarmy_desc:0 "Francisco Solano Lopez modellierte die ursprüngliche paraguayische Armee nach dem Vorbild der napoleonischen Armee. Wir sollten dasselbe anstreben."
PAR_newplans:0 "Neue Rollen"
PAR_newplans_desc:0 "Wir sollten darauf abzielen, den Menschen unseres Landes neue Rollen zuzuweisen, da die derzeitigen Ideen offensichtlich nicht die beste Wirkung erzielen."
PAR_propanews:0 "Regulate News"
PAR_propanews_desc:0 "Wir sollten versuchen, die Nachrichten zu regulieren, die die Menschen in Paraguay erreichen. Wir werden vielleicht nie erfahren, wie sie diese gegen uns verwenden."
PAR_morysguard:0 "Errichte Morinigos Wache"
PAR_morysguard_desc:0 "Wir sollten eine kleine Elitetruppe in der Armee aufbauen, die der paraguayischen Sache treu ist und bereit ist, den Präsidenten und sein Land um jeden Preis zu verteidigen."
PAR_bolstermileconomy:0 "Stärkung der Militärindustrie"
PAR_bolstermileconomy_desc:0 "Wir sollten unsere militärisch-industrielle Leistungsfähigkeit verbessern, auch wenn dies bedeutet, dass wir einen Teil unseres zivilen Sektors opfern müssen."
PAR_askussupport:0 "Bitten Sie die USA um Unterstützung"
PAR_askussupport_desc:0 "Wir sollten versuchen, die USA in der bevorstehenden Krise um Unterstützung zu bitten. Der Präsident schlägt vor, sich im Falle einer Ablehnung den Achsenmächten anzuschließen."
PAR_moremilitarypower:0 "Dem Militär mehr Macht geben"
PAR_moremilitarypower_desc:0 "Das Militär Paraguays sollte verherrlicht und mit mehr Macht ausgestattet werden. Bürger und Armee sollten eins werden."
PAR_mip:0 "Das Militär an der Macht"
PAR_mip_desc:0 "Wir haben den Militärteil der Regierung an die Macht gebracht. Unsere Aufgabe besteht nun darin, dafür zu sorgen, dass er dort bleibt und die Bürger des Landes weiterhin unter seiner Kontrolle bleiben."
PAR_militaryhegemony:0 "Militärische Hegemonie"
PAR_militaryhegemony_desc:0 "Wir sollten den Status des Militärs in unserem Land weiter verbessern. Den höheren Militärs sollten zusätzliche Privilegien, Vergünstigungen und Rollen in der Regierung gewährt werden."
PAR_invitemustacheman:0 "Laden Sie Hitler ein"
PAR_invitemustacheman_desc:0 "Nach der Niederlage Deutschlands floh Adolf Hitler aus dem Land nach Südamerika. Wir sollten ihn in unser Land einladen."
PAR_jointheallies:0 "Schließen Sie sich den Verbündeten an"
PAR_jointheallies_desc:0 "Ein Beitritt zu den Alliierten läge im besten Interesse des Staates. Er würde das Überleben der Nation und ihren Schutz vor Bedrohungen aller Art gewährleisten."
