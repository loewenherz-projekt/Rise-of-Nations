PAR_jointheaxis_desc:0 ""
PAR_joincomintern:0 "Treten Sie der Komintern bei"
PAR_joincomintern_desc:0 ""
PAR_joininganalliance:0 "Einer Allianz beitreten"
PAR_joininganalliance_desc:0 ""
PAR_backstabchile:0 "Chile hintergehen"
PAR_backstabchile_desc:0 ""
PAR_greaterparaguay:0 "Großparaguay"
PAR_greaterparaguay_desc:0 "Nachdem unsere Gebiete gesichert sind, können wir über unseren neuen Ländern Großparaguay ausrufen."
PAR_avengelopez:0 "Räche Lopez"
PAR_avengelopez_desc:0 "Die Mission ist erfüllt. Das Erbe von Francisco Solano Lopez lebt in Paraguay weiter. Er wurde für das, was sie uns angetan haben, gerächt."
PAR_southbraziliansupport:0 "Unterstützung für Südbrasilien"
PAR_southbraziliansupport_desc:0 "Wir sollten versuchen, die Unterstützung der Bevölkerung Südbrasiliens zu gewinnen. Sie wünscht sich die Unabhängigkeit von Brasilien und wäre bereit, für uns zu kämpfen."
PAR_incitebrazilianunrest:0 "Unruhen in Brasilien anzetteln"
PAR_incitebrazilianunrest_desc:0 "Brasilien ist alles andere als stabil. Wir könnten versuchen, die Bevölkerung gegeneinander aufzuhetzen."
PAR_invadebrazil:0 "Invasion in Brasilien"
PAR_invadebrazil_desc:0 "Es ist Zeit, Brasilien den Gefallen zu erwidern! Alle Vorbereitungen sind getroffen, und ein schneller Schlag sollte das Land endgültig aus dem Krieg und vom Kontinent werfen!"
PAR_annexuruguay:0 "Anhang Uruguay"
PAR_annexuruguay_desc:0 "Mit Brasilien und Argentinien im Rücken wird Uruguay ein leichtes Opfer sein. Eine einfache Annexion genügt."
