 paraguay.1.t:0 "Die Februarrevolution"
 paraguay.1.d:0 "Truppen unter der Führung der Oberstleutnants Fredrico Wenman Smith und Camildo Reclade haben Asunción besetzt und setzen den im Exil lebenden Rafael Franco als Anführer Paraguays ein."
 paraguay.1.a:0 "Wer die Hauptstadt kontrolliert, kontrolliert das Land."
 paraguay.1.b:0 "Versammeln Sie die Armee und eliminieren Sie ihn!"
 par_bolivia.1.t:0 "Der paraguayische Bürgerkrieg"
 par_bolivia.1.d:0 "In Paraguay ist ein Bürgerkrieg ausgebrochen. Jetzt ist vielleicht der beste Zeitpunkt, unser verlorenes Chaco-Land zurückzuerobern."
 par_bolivia.1.a:0 "Nehmen Sie den nördlichen Chaco"
 par_bolivia.1.b:0 "Der gesamte Chaco gehört zu Bolivien!"
 par_bolivia.1.c:0 "Jetzt ist nicht die Zeit, in verlorenes Gebiet einzudringen."
 paraguay.2.t:0 "Verteidigung des Vaterlandes"
 paraguay.2.d:0 "Die abscheulichen Bolivianer sind erneut in unser Land eingedrungen! Erhebt euch und verteidigt euer Vaterland!"
 paraguay.2.a:0 "Für das Vaterland!"
 paraguay.4.t:0 "Bolivien annektiert den nördlichen Chaco"
 paraguay.4.d:0 "Die Bolivianer haben unser rechtmäßiges Chaco-Gebiet annektiert! Wie sollen wir reagieren?"
 paraguay.4.a:0 "Im Moment können wir nichts tun ..."
 paraguay.4.b:0 "Der Chaco ist und bleibt paraguayisch!"
 paraguay.5.t:0 "Chaco-Kriegsausrüstung"
 paraguay.5.d:0 "Da sich der Staat wieder im Krieg befindet, sollten wir einige alte Chaco-Kriegsgeräte wieder für unseren Gebrauch in Betrieb nehmen."
 paraguay.5.a:0 "Wurde auch Zeit."
 par_bolivia.2.t:0 "Die paraguayische Intervention ist gewonnen"
 par_bolivia.2.d:0 "Paraguay ist zusammengebrochen. Der Chaco gehört uns. Sollen wir eine Kapitulation Paraguays fordern?"
 par_bolivia.2.a:0 "Natürlich. Wir sind nur wegen des Chaco hier."
 par_bolivia.2.b:0 "Paraguay wird zu Bolivien!"
 paraguay.3.t:0 "Die Bolivianer wurden zurückgedrängt"
 paraguay.3.d:0 "Nach unserer jüngsten Gegenoffensive liegt der gesamte Chaco auf unserem Territorium. Bolivien hat die Kapitulation angeboten. Sollen wir den zweiten Chaco-Krieg beenden?"
 paraguay.3.a:0 "Natürlich. Wir nehmen einfach den Chaco."
 paraguay.3.b:0 "Ganz Bolivien wird Teil von Paraguay!"
 paraguay.6.t:0 "Die Franco-Verschwörung"
 paraguay.6.d:0 "Angesichts der bevorstehenden Wahlen hat Rafael Franco eine Kampagne gegen ein Bündnis aus Präsident Alaya und José Félix Estigarriba gestartet. Seine Pläne sind gefährlich und er muss abgesetzt werden."
 paraguay.6.a:0 "Verhaften Sie ihn und verbannen Sie ihn nach Argentinien."
 paraguay.7.t:0 "Eine Expedition für Francisco Solano Lopez"
 paraguay.7.d:0 "Unser ehemaliger Präsident Francisco Solano Lopez, der von den Liberalen für die Zerstörung Paraguays kritisiert wurde, wurde kürzlich von Rafael Franco angesprochen, der seinen Mut und seine Verteidigung des Landes lobte. Sie wollen ihn zum Nationalhelden machen und ihn nach Asunción bringen."
 paraguay.7.a:0 "Bringen Sie ihn nach Asunción!"
 paraguay.7.b:0 "Egal."
 paraguay.8.t:0 "Die Auferweckung von Francisco Solano Lopez"
 paraguay.8.d:0 "Da Lopez zum Nationalhelden ernannt wurde, muss eine Entscheidung darüber getroffen werden, ob er von seinem Grab in Cerro Cora in das Nationale Pantheon der Helden aufgenommen wird."
 paraguay.8.a:0 "Lopez muss in das Nationale Pantheon aufgenommen werden!"
 paraguay.8.b:0 "Eine Einrichtung in Cerro Cora ist besser für die Nation!"
 paraguay.9.t:0 "Ein Denkmal für Francisco Solano Lopez"
 paraguay.9.d:0 "Unserem Nationalhelden von Paraguay, Francisco Solano Lopez, wurde vor Kurzem auf dem höchsten Hügel von Asunción ein Denkmal errichtet."
 paraguay.9.a:0 "Heil unserem Präsidenten!"
 paraguay.10.t:0 "Gesetzesdekret Nr. 152"
 paraguay.10.d:0 "Rafael Franco erließ heute das umstrittene Gesetzesdekret Nr. 152 und versprach eine totalitäre Umgestaltung des Staates, ähnlich wie Mussolini in Italien. Seine Rede stieß auf große Ablehnung, und Paraguay könnte bald eine Krise erleiden."
 paraguay.10.a:0 "Oh nein..."
 par_argentina.1.t:0 "Der bolivianische Zusammenbruch"
 par_argentina.1.d:0 "Bolivien ist zusammengebrochen. Tarija ist reif für die Ernte. Sollen wir das Gebiet einnehmen?"
 par_argentina.1.a:0 "Natürlich. Tarija ist argentinisches Territorium."
 par_argentina.1.b:0 "Es hat keinen Sinn."
 paraguay.11.t:0 "Militärparade"
 paraguay.11.d:0 "Heute haben die Streitkräfte eine Parade organisiert, um die Aufmerksamkeit unserer Bevölkerung von den Problemen des Landes abzulenken."
 paraguay.11.a:0 "Hurra!"
 paraguay.12.t:0 "Generalstreik"
 paraguay.12.d:0 "Verschiedene Gruppen im ganzen Land haben den Streik organisiert. Die Probleme der Nation sind offensichtlich."
 paraguay.12.a:0 "Verdammtes Französisch ..."
 paraguay.13.t:0 "Immer bereit"
 paraguay.13.d:0 "Auch wenn der eigentliche Krieg vorbei ist, ist unsere Nation durch den Schock in eine defensive Haltung versetzt worden. Alle Bürger sind auf einen weiteren Konflikt vorbereitet."
 paraguay.13.a:0 "Für Paraguay!"
 par_bolivia.3.t:0 "Paraguay lehnt unser Friedensangebot ab"
 par_bolivia.3.d:0 "Wir haben eine Nachricht von der paraguayischen Regierung erhalten, sie haben unser Friedensangebot abgelehnt!"
 par_bolivia.3.a:0 "Zerstöre sie."
 paraguay.14.t:0 "Bolivien fordert unsere Kapitulation"
 paraguay.14.d:0 "Der Krieg ist verloren. Der Chaco liegt in den Händen der Bolivianer. Sie haben unserem Land die Kapitulation angeboten. Es könnte unsere letzte Chance sein."
 paraguay.14.a:0 "Gib ihnen den Chaco ..."
 paraguay.14.b:0 "Ich sterbe mit meinem Land!"
 paraguay.15.t:0 "Anti-Franco-Putsch"
 paraguay.15.d:0 "Rafael Franco, unser Führer, wird in unserem Volk immer unbeliebter. Sein jüngster Truppenabzug führte zu einem Militärputsch gegen ihn."
 paraguay.15.a:0 "Franco wird erneut verbannt!"
 paraguay.15.b:0 "Die Wachen besiegen die Rebellen!"
 paraguay.16.t:0 "Einen Anführer auswählen"
 paraguay.16.d:0 "Nach dem Sturz Rafael Francos muss die Putschkoalition einen neuen Staatschef wählen. Drei Kandidaten haben sich etabliert. Die Liberale Partei möchte ihre Macht wiederherstellen, doch das Militär unterstützt General Morinigo. Und schließlich gibt es immer mehr Stimmen für die Wiederherstellung der Macht Lópezics."
 paraguay.16.a:0 "Geben Sie die Herrschaft den Liberalen zurück"
 paraguay.16.b:0 "Um die Ordnung wiederherzustellen, ist die Militärherrschaft von Higinio Morinigo notwendig."
 paraguay.16.c:0 "Die Nachkommen von Francisco Solano Lopez werden uns durch diese schwierigen Zeiten führen!" 
 paraguay.17.t:0 "Rafael Franco kehrt nach Paraguay zurück!"
 paraguay.17.d:0 "Rafael Franco ist aus dem argentinischen Exil zurückgekehrt und scheint eine Armee zu mobilisieren, um die liberale Regierung zu stürzen."
 paraguay.17.a:0 "Oh, großartig."
 paraguay.18.t:0 "Rafael Franco flieht nach Norden!"
 paraguay.18.d:0 "Nach der Rückeroberung von Asunción ist Rafael Franco aus der Stadt geflohen und hat seine Streitkräfte gegen uns mobilisiert!"
 paraguay.18.a:0 "Verräter!"
 paraguay.19.t:0 "Estigarriba fordert persönliche Kontrolle über den Staat"
 paraguay.19.d:0 "Marschall José Félix Estigarriba wurde zusammen mit dem amtierenden Präsidenten Ayala gebeten, das Staatsoberhaupt zu werden, und begründete dies mit den schwierigen Zeiten, in denen sich unser Land befindet. Seine Herrschaft würde das Land mit Sicherheit aus der aktuellen Krise führen."
 paraguay.19.a:0 "Ohne seine Führung geht es dem Land derzeit besser."
 paraguay.19.b:0 "Gib ihm die Seile."
 paraguay.20.t:0 "Unsere Marine auf See bringen"
 paraguay.20.d:0 "Nachdem die Küste gesichert war, konnten wir unsere in den Flüssen Südamerikas gefangene Flotte zur besseren Nutzung aufs Meer hinausbringen."
 paraguay.20.a:0 "Paraguay beherrscht die Wellen!"
 paraguay.21.t:0 "Antidemokratischer Putsch"
 paraguay.21.d:0 "Kräfte, die den verschiedenen Parteien unseres Landes treu ergeben sind, haben die Regierung gestürzt und ihre Unfähigkeit, dem Staat zu helfen, als Grund angeführt. Wenn es so weitergeht, wird die liberale Regierung mit Sicherheit fallen. Was sollen wir tun?" 
 paraguay.21.a:0 "Vielleicht haben sie recht, unsere Vorgehensweisen sind rückständig …"
 paraguay.21.b:0 "Bah! Eliminiere sie."
 paraguay.22.t:0 "Einen Anführer auswählen"
 paraguay.22.d:0 "Nach dem Sturz des demokratischen Regimes muss die Koalition einen neuen Führer für die Nation wählen. Drei Kandidaten haben sich etabliert. Die Revolutionspartei möchte nach dem gescheiterten Putsch ihre Herrschaft behalten, doch das Militär unterstützt General Morinigo. Schließlich gibt es zunehmende Zustimmung zur Wiedereinsetzung Lópezics."
 paraguay.22.a:0 "Lasst die Revolutionäre herrschen"
 paraguay.22.b:0 "Um die Ordnung wiederherzustellen, ist die Militärherrschaft von Higinio Morinigo notwendig."
 paraguay.22.c:0 "Die Nachkommen von Francisco Solano Lopez werden uns durch diese schwierigen Zeiten führen!" 
 paraguay.23.t:0 "Ultimatum an Paraguay?"
 paraguay.23.d:0 "Mit einem López auf dem Thron wird Paraguay im Chaos versinken. Sollen wir ein Ultimatum stellen, um ihr rückständiges Verhalten zu stoppen?"
 paraguay.23.a:0 "Senden Sie es."
 paraguay.23.b:0 "Senden Sie es nicht."
 paraguay.24.t:0 "Brasilianisches Ultimatum"
 paraguay.24.d:0 "Dass López in Paraguay regiert, hat unsere brasilianischen Nachbarn verärgert. Sie fordern, ihn sofort zu vertreiben, sonst marschieren sie ein! Was sollen wir tun?"
 paraguay.24.a:0 "Lehnen Sie das Ultimatium ab."
 paraguay.24.b:0 "Wir haben keine Chance."
 paraguay.25.t:0 "Ultimatium abgelehnt"
 paraguay.25.d:0 "Die Paraguayer haben unser Ultimatum abgelehnt! Zu den Waffen!"
 paraguay.25.a:0 "Zerstöre sie!"
 paraguay.26.t:0 "Das Ende von Lopez."
 paraguay.26.d:0 "Das Ende von Francisco Solano Lopez, dem Mann, der Paraguay vor achtzig Jahren im Großen Krieg zerstörte, ist nun endlich gekommen. Endlich kann Paraguay von der Anwesenheit des Tyrannen befreit werden."
 paraguay.26.a:0 "Er starb mit seinem Land. Aber wir haben unser eigenes Land geboren."
 paraguay.27.t:0 "Ein zum Scheitern verurteilter Flug"
 paraguay.27.d:0 "Katastrophe! Präsident José Félix Estigarriba ist heute bei einem Flugzeugabsturz ums Leben gekommen. Er war auf einer Rundreise durch das Land, als die Maschine, die ihn und seine Frau an Bord hatte, in Agapuey abstürzte. Die Nation trauert um unseren Präsidenten und Helden."
 paraguay.27.a:0 "Er wird in Erinnerung bleiben."
 paraguay.28.t:0 "Paraguay fordert Ausrüstung an"
 paraguay.28.d:0 "Der südamerikanische Staat Paraguay wünscht sich Ausrüstung, sonst schließt er sich den Achsenmächten an! Was sollen wir tun?"
 paraguay.28.a:0 "Schicken Sie ihnen ihre Ausrüstung"
 paraguay.28.b:0 "Was kann ein Binnenstaat überhaupt tun?"
 paraguay.29.t:0 "Der Achse beitreten"
 paraguay.29.d:0 "Sollten wir angesichts der Ablehnung der US-Hilfe und unserer Drohungen, uns den Achsenmächten anzuschließen, den Forderungen nachkommen?"
 paraguay.29.a:0 "Komm nach Deutschland"
 paraguay.29.b:0 "Mischen wir uns nicht in einen europäischen Konflikt ein."
 paraguay.30.t:0 "USA akzeptiert"
 paraguay.30.d:0 "Die USA haben unser Hilfsangebot angenommen, im Austausch dafür, dass sie sich nicht der Achse anschließen."
 paraguay.30.a:0 "Hurra."
 paraguay.31.t:0 "Morinigos Wache"
 paraguay.31.d:0 "Wir haben beschlossen, Präsident Morinigo eine eigene Leibgarde zu geben. Die Rekrutierung hat bereits begonnen und die Einheit wird bald kampfbereit sein."
 paraguay.31.a:0 "Okay."
 paraguay.32.t:0 "Eine Anfrage aus Paraguay"
 paraguay.32.d:0 "Paraguay möchte, dass wir uns ihrer Fraktion anschließen"
 paraguay.32.a:0 "Treten Sie der Allianz bei"
 paraguay.32.b:0 "Lass uns das nicht tun."
 paraguay.33.t:0 "Wir wurden abgelehnt"
 paraguay.33.d:0 "Unsere jüngsten diplomatischen Annäherungsversuche sind gescheitert, da wir von unseren potenziellen Verbündeten ABGELEHNT wurden."
 paraguay.33.a:0 "Oh nein."
 paraguay.34.t:0 "La Plata-Konföderation"
 paraguay.34.d:0 "Paraguayische Diplomaten haben die Schaffung eines vereinten La Plata vorgeschlagen. Sollten wir uns ihnen anschließen und Südamerika zu seinem alten Glanz verhelfen?"
 paraguay.34.a:0 "Treten Sie der Konföderation bei"
 paraguay.34.b:0 "Nicht."
 paraguay.35.t:0 "Wir wurden abgelehnt"
 paraguay.35.d:0 "Unsere jüngsten diplomatischen Annäherungsversuche sind gescheitert, da wir von unseren potenziellen Territorien ABGELEHNT wurden."
 paraguay.35.a:0 "Oh nein."
 paraguay.36.t:0 "Paraguayisches Ultimatum"
 paraguay.36.d:0 "Paraguay hat uns ein Ultimatum gestellt: Entweder übergeben wir die gesamte Chaco-Region, oder wir werden vernichtet. Wir haben zehn Tage Zeit, um zu handeln."
 paraguay.36.a:0 "Akzeptiere das Ultimatum"
 paraguay.36.b:0 "Lehnen Sie das Ultimatum ab"
 paraguay.37.t:0 "Bolivien lehnt unser Ultimatum ab"
 paraguay.37.d:0 "Unser Ultimatum an Bolivien wurde abgelehnt. Sollen wir unsere Versprechen einhalten und dort einmarschieren?"
 paraguay.37.a:0 "Wir haben es einmal geschafft, wir werden es wieder tun!"
 paraguay.37.b:0 "Zurück."
 paraguay.38.t:0 "Brasilianische Rebellen"
 paraguay.38.d:0 "Unsere brasilianischen Freunde haben beschlossen, zu unserer Unterstützung zu rebellieren."
 paraguay.38.a:0 "Für den Rio Grande!"
 paraguay.39.t:0 "Paraguay drängt auf Annexion"
 paraguay.39.d:0 "Paraguay drängt uns zu einer Annexion. Alleine haben wir kaum eine Chance gegen sie, insbesondere da Argentinien und Brasilien besetzt sind. Was sollen wir tun?"
 paraguay.39.a:0 "Schließen Sie sich ihnen an."
 paraguay.39.b:0 "Ablehnen."
 paraguay.40.t:0 "Uruguay lehnt unsere Annexion ab."
 paraguay.40.d:0 "Das kleine Uruguay hat unser Angebot zur Eingliederung in unseren Staat abgelehnt. Deshalb sollten wir dort einmarschieren."
 paraguay.40.a:0 "Dringt in sie ein."
 paraguay.40.b:0 "Das können wir im Moment nicht."
 
 army_with_a_state:0 "Armeeabhängig"
 army_with_a_state_desc:1 "Paraguay ist seit dem Chaco-Krieg stark auf seine Armee angewiesen, um ausländische Angriffe von allen Seiten abzuwehren. Obwohl Präsident Ayala die Macht der Armee eingeschränkt hat, spielt sie im Alltagsleben immer noch eine wichtige Rolle. Sollte das Militär nicht zufrieden sein, könnte es einen Putsch starten."
 defence_of_the_motherland:0 "Verteidigung des Vaterlandes"
 defence_of_the_motherland_desc:1 "Die Zeit ist gekommen! Erneut dringen Eindringlinge in unser heiliges Land ein! Erhebt euch! Zeigt ihnen die Stärke Paraguays!"
 government_chaos:0 "Regierung im Chaos"
 government_chaos_desc:1 "Paraguay ist, gelinde gesagt, alles andere als stabil. Der Große Krieg und der Chaco-Krieg wirken sich noch immer auf die Republik aus und im Land kommt es immer wieder zu Staatsstreichen, Amtsenthebungsverfahren und Aufständen."
 legacy_of_lopez:0 "Vermächtnis von Francisco Solano Lopez"
 legacy_of_lopez_desc:1 "Unser großer Anführer Francisco Solano Lopez wurde zum Nationalhelden ernannt. Der Geist des großen Krieges liegt in unserem Volk."
 lopez_found:0 "Lopez im Nationalen Pantheon begraben"
 lopez_found_desc:1 "Der Leichnam von Francisco Solano Lopez wurde im Nationalen Pantheon der Helden von Asunción beigesetzt, wo er in Frieden ruhen soll."
 veteran_jobs:0 "Arbeitslosigkeit unter Veteranen drastisch gesenkt"
 veteran_jobs_desc:1 "Die Bekämpfung der Arbeitslosigkeit unter Veteranen ist für die Regierung zu einer Priorität geworden. Sie möchte sicherstellen, dass alle Menschen in Paraguay eine Rolle spielen."
 agrarian_reform:0 "Agrarreformgesetz von 1936"
 agrarian_reform_desc:1 "Unser Führer hat das Agrarreformgesetz von 1936 verabschiedet und damit 500.000 Morgen Land verschiedener Landwirte verstaatlicht."
 labour_code:0 "Arbeitsgesetzbuch"
 labout_code_desc:1 "In Paraguay wurde ein universelles Arbeitsgesetz eingeführt, mit einem Achtstundentag, bezahltem Urlaub und Wochenenden"
 PAR_unemployment:0 "Arbeitslosigkeit von Veteranen"
 PAR_unemployment_desc:1 "Ein großer Teil der Bevölkerung unseres Landes ist arbeitslos, was größtenteils auf die Massenentlassung von Chaco-Kriegsveteranen durch Präsident Ayala zurückzuführen ist."
 con_of_workers:0 "Konföderation der paraguayischen Arbeiter"
 con_of_workers_desc:1 "Zur Unterstützung der Industrie, des Militärs und der Wirtschaft des Landes wurde ein Gewerkschaftsbund gegründet."
 argentine_toppled:0 "Korrupte argentinische Großgrundbesitzer gestürzt"
 argentine_toppled_desc:1 "Seit dem Großen Krieg haben argentinische Großgrundbesitzer Paraguay effektiv regiert. Es ist Zeit für sie, zu gehen."
 rule_the_skies:0 "Beherrsche den Himmel"
 rule_the_skies_desc:1 "Die paraguayischen Kommandeure sind sich der Bedeutung der Luftüberlegenheit bewusst und werden alles tun, um sie zu behalten."
 militarism_PAR:0 "Ausgedehnter Militarismus"
 militarism_PAR_desc:1 "Da die paraguayische Bevölkerung weiß, dass jederzeit von jeder Seite ein Angriff erfolgen kann, ist sie stets bereit."
 people_army:0 "Volksarmee"
 people_army_desc:1 "Die Armee ist für das Volk da und soll sein Land gegen jeden verteidigen, der es zerstören will." 
 def_nation:0 "Verteidigung der Nation"
 def_nation_desc:1 "Das ganze Land ist bereit, so lange wie möglich gegen einen Feind zu kämpfen und ihn dabei unwiederbringlich zu zermürben."
 american_prussia:0 "Preußen Amerikas"
 american_prussia_desc:1 "Das Land galt als das Preußen Amerikas mit umfassenden Militärreformen und einer für seine Größe großen Armee."
 better_tanks:0 "Paraguayisches Panzerkorps"
 better_tanks_desc:1 "Das paraguayische Panzerkorps ist eine Eliteeinheit mit verschiedenen Panzerfahrzeugen, die bereit ist, Aufgaben wie Einkreisungen oder Blitzangriffe durchzuführen."
 increased_air_benefits:0 "Erhöhte Luftvorteile"
 increased_air_benefits_desc:1 "Die Luftwaffe ist für neue Rekruten deutlich attraktiver geworden. Wir sollten eine große Zahl neuer Rekruten für unsere Streitkräfte gewinnen."
 all_sit_training:0 "All-Situation-Training"
 all_sit_training_desc:1 "Unsere Luftwaffe ist auf jeden Krieg in jeder Situation vorbereitet."
 po_tn:0 "Stolz der Nation"
 po_tn_desc:1 "Die Armee ist der Stolz der Nation. Regelmäßig finden im ganzen Land Militärparaden statt und das Militär genießt höchsten Respekt."
 ayala_exiled:0 "Ayala verbannt"
 ayala_exiled_desc:1 "Eusebio Ayala has been exiled to Argentina, with him gone, many of his supporters should turn to us.
 gov_efficent:0 "Effiziente Regierung"
 gov_efficent_desc:1 "Die Regierung ist wesentlich effizienter geworden, sodass wir mehr Dinge schneller erledigen können."
 pensions_funded:0 "Veteranenrenten finanziert"
 pensions_funded_desc:1 "Veteranen des Chaco-Krieges haben ihre Renten ausgezahlt bekommen. Sie sollten bereitwilliger mit der Regierung kooperieren."
 revolutionary_national_union:0 "Revolutionäre Nationale Union"
 revolutionary_national_union_desc:1 "Die neue Revolutionäre Nationale Union wird uns dabei helfen, das Land besser zu regieren und die Unterstützung der Bevölkerung für die Regierung zu erhöhen."
 schools_colleges:0 "Mehr Schulen und Hochschulen"
 schools_colleges_desc:1 "Durch die Finanzierung weiterer Schulen und Hochschulen durch die Regierung dürfte die Bildungsleistung des Landes deutlich gesteigert werden."
 always_ready:0 "Immer bereit"
 always_ready_desc:1 "Auch wenn der Krieg vorbei sein mag, ist die Nation immer noch in einer defensiven Haltung"
 soc_compromise:0 "Sozialistischer Kompromiss"
 soc_compromise_desc:1 "Die Liberale Partei und die Revolutionäre Partei haben eine Koalitionsregierung gebildet, um eine bessere Zukunft für ganz Paraguay zu erreichen."
 int_mar:0 "Guarani-Hispanic-Mischheirat"
 int_mar_desc:1 "Die Regierung hat die Guarani- und Hispanoamerikaner unseres Landes dazu aufgefordert, untereinander zu heiraten und eine gemeinsame paraguayische Identität zu schaffen."
 equal_citz:0 "Guarani als gleichberechtigte Bürger"
 equal_citz_desc:1 "Die Regierung hat der Guarani-Bevölkerung die Staatsbürgerschaft und Chancen gewährt."
 elim_guarani:0 "Guarani unterdrückt"
 elim_guarani_desc:1 "Die Regierung hat die Ausrottung der Guarani-Bevölkerung angeordnet. Paraguay wird frei von rückständigen Ideen sein."
 gua_rani:0 "Die Guarani-Minderheit"
 gua_rani_desc:1 "Paraguays indigene Minderheit, die Guarani, lebt seit langer Zeit in unserem Land. Obwohl sie der Regierung treu ergeben sind, zeigen die indigenen Gruppen Anzeichen von Unabhängigkeit und Autonomie."
 river_navy:0 "Die Flussflotte"
 river_navy_desc:1 "Unser Wissen über die Marinetaktik auf Flüssen lässt sich sicherlich auch auf offene Gewässer übertragen. Unsere Marine wird auf lange Sicht davon profitieren."
 faster_industry:0 "Gemeinsame industrielle Anstrengungen"
 faster_industry_desc:1 "Unsere gesamte Bevölkerung arbeitet zusammen, um unsere Branche zu verbessern."
 gua_intermarriage:0 "Guarani-Mischheirat"
 gua_intermarriage_desc:1 "Die hispanische und die Guarani-Bevölkerung unserer Länder wurden ermutigt, untereinander zu heiraten und eine paraguayische Identität zu entwickeln."
 gua_promoted:0 "Guarani als gleichberechtigte Bürger"
 gua_promoted_desc:1 "Die Guarani wurden unserer hispanischen Bevölkerung zu gleichberechtigten Bürgern erklärt. Andere Nationen sind jedoch möglicherweise nicht glücklich über unseren zunehmenden Nativismus."
 gua_removed:0 "Guarani ausgeschieden"
 gua_removed_desc:1 "Die Guarani sind Primitive und ein Symbol der vergangenen Ära Paraguays. Sie müssen ausgerottet werden, damit die Nation rein wird."
 code_talkers:0 "Guarani-Code-Sprecher"
 code_talkers_desc:1 "Offizielle Militärbefehle werden in der Guarani-Sprache erteilt, um die Botschaften vor unseren Nachbarn zu verbergen."
 new_libs:0 "Die Neuen Liberalen"
 new_libs_desc:1 "Die Liberale Partei hat sich als „Neue Liberale“ neu aufgestellt. Dies unterscheidet uns von der problematischen Partei der Vergangenheit und ebnet den Weg für eine bessere Zukunft."
 para_identity:0 "Paraguayische Identität"
 para_identity_desc:1 "Wir haben eine paraguayische Identität geschaffen. Statt einer Trennung zwischen Weißen und Einheimischen werden alle unsere Bürger Paraguayer sein."
 mili_curbed:0 "Militärische Eindämmung"
 mili_curbed_desc:1 "Wir haben die Macht des Militärs eingeschränkt. Es ist nicht mehr in der Lage, dem Land seinen Willen aufzuzwingen."
 new_army:0 "Armeereform"
 new_army_desc:1 "Wir haben die Armee reformiert, und im Ergebnis hat sie sich in eine Streitmacht verwandelt, die die zivilen und militärischen Aspekte der Nation unterstützt."
 religious_purge:0 "Religiöse Säuberung"
 religious_purge_desc:1 "Im Rahmen unserer Bemühungen, den Staat in einen modernen, säkularen Staat umzuwandeln, wurde die Religion in Paraguay entmutigt. Nicht alle Menschen werden mit dieser Veränderung zufrieden sein."
 religion_doctrines:0 "Religiöse Lehre"
 religion_doctrines_desc:1 "Paraguay ist ein Staat, der auf Religion gegründet ist. Es hat keinen Sinn, sich von solchen Ideen abzuwenden. Wir sollten weiterhin den Willen Gottes verbreiten!"
 argentine_landlords:0 "Argentinische Vermieter"
 argentine_landlords_desc:1 "Seit dem Ersten Weltkrieg wird das Land von Argentiniern regiert. Ihre Loyalität gilt der argentinischen Regierung, und gegen sie muss etwas unternommen werden."
 lopez_idol:0 "Idolisierter Lopez"
 lopez_idol_desc:1 "Wir haben Francisco Solano Lopez zu einem nationalen Idol gemacht. Sein Bild ist überall im Land zu sehen, die Menschen verehren ihn und orientieren sich an ihm."
 grandarmy_PAR:0 "Paraguayische Grande Armee"
 grandarmy_PAR_desc:1 "Francisco Solano Lopez war ein ergebener Anhänger Napoleon Bonapartes. Es ist an der Zeit, sein Erbe der Nation zurückzugeben."
 fake_news:0 "Propagandazeitungen"
 fake_news_desc:1 "Wir haben ein System von Propagandazeitungen etabliert, das sicherstellt, dass nur das zu sehen ist, was die Bürger sehen müssen."
 PAR_peace:0 "Staat im Frieden"
 PAR_peace_desc:1 "Wenn der Staat Frieden hat, können wir einer besseren Zukunft entgegensehen. Paraguay wird in Zeiten wie diesen zu einem mächtigen Staat werden, nicht in Zeiten ständiger Kriege."
 laplata_bad:0 "Widerstand gegen die Konföderation"
 laplata_bad_desc:1 "Die neu wiederhergestellte Konföderation von La Plata ist nicht bei allen unseren Bürgern beliebt. Einige wollen das Land immer noch in seinen geschwächten Zustand zurückversetzen."
 argentine_tactics:0 "Argentinischer Kriegsplan"
 argentine_tactics_desc:1 "Argentinien hat eine um ein Vielfaches größere Bevölkerung als wir, daher ist ein gut geplanter Angriff nötig, um sie zu besiegen. Da Argentinien größtenteils offenes Gelände ist, wird Luftunterstützung im Feldzug von entscheidender Bedeutung sein."
 brazil_tactics:0 "Brasilianischer Kriegsplan"
 brazil_tactics_desc:1 "Brasilien hat eine viel größere Bevölkerung als wir und würde einen konventionellen Krieg leicht gewinnen. Unsere Generäle haben einen Plan ausgearbeitet, um ihre Einheiten einzukreisen und zu besiegen."
 arg_unrest:0 "Unruhen in der Armee"
 arg_unrest_desc:1 "In der Armee herrscht völlige Anarchie. Soldaten wenden sich gegeneinander, und am Ende ist die Nation reif für eine Invasion."
 lopez_avenged:0 "Lopez gerächt"
 lopez_avenged_desc:1 "Es ist endlich geschafft. Wir haben Marschall Francisco Solano Lopez gerächt und mit der Dreierallianz abgerechnet. Die Nation paradiert, während die Himmelsbewohner zusehen, wie wir unsere nächsten Schritte entscheiden."
 
