 MON_border_conflict_won_attacker.1.t:0 "Sieg in [their_state.GetName]"
 MON_border_conflict_won_attacker.1.desc:0 "Beim Zusammenstoß im Grenzgebiet zwischen [unserem_Staat.GetName] und [ihrem_Staat.GetName] errangen unsere Streitkräfte einen klaren Sieg über die Streitkräfte von [ihrem_Land.GetLeader]. Die Streitkräfte von [ihrem_Land.GetAdjective] haben sich zurückgezogen, um sich neu zu formieren, und unsere Streitkräfte haben die Kontrolle über das umstrittene Gebiet übernommen."
 MON_border_conflict_won_attacker.1.a:0 "Wir haben ihnen unsere Stärke gezeigt!"
 MON_border_conflict_won_defender.1.t:0 "Sieg in [their_state.GetName]"
 MON_border_conflict_won_defender.1.desc:0 "Beim Zusammenstoß im Grenzgebiet zwischen [unserem_Staat.GetName] und [ihrem_Staat.GetName] errangen unsere Streitkräfte einen klaren Sieg über die Streitkräfte von [ihrem_Land.GetLeader]. Die Streitkräfte von [ihrem_Land.GetAdjective] haben sich zurückgezogen, um sich neu zu formieren, und unsere Streitkräfte haben die Kontrolle über das umstrittene Gebiet übernommen."
 MON_border_conflict_won_defender.1.a:0 "Wir haben ihnen unsere Stärke gezeigt!"
 MON_border_conflict_lost_attacker.1.t:0 "Niederlage in [our_state.GetName]"
 MON_border_conflict_lost_attacker.1.desc:0 "Den Streitkräften unter dem Kommando von [their_country.GetLeader] ist es gelungen, uns aus dem umstrittenen Gebiet zwischen [our_state.GetName] und [their_state.GetName] zu vertreiben. Unsere Streitkräfte haben sich geordnet zurückgezogen und organisieren sich neu, falls wir die Schlacht in Zukunft wieder aufnehmen wollen."
 MON_border_conflict_lost_attacker.1.a:0 "Wir müssen so schnell wie möglich einen Gegenangriff starten!"
 MON_border_conflict_lost_defender.1.t:0 "Niederlage in [our_state.GetName]"
 MON_border_conflict_lost_defender.1.desc:0 "Den Streitkräften unter dem Kommando von [their_country.GetLeader] ist es gelungen, uns aus dem umstrittenen Gebiet zwischen [our_state.GetName] und [their_state.GetName] zu vertreiben. Unsere Streitkräfte haben sich geordnet zurückgezogen und organisieren sich neu, falls wir die Schlacht in Zukunft wieder aufnehmen wollen."
 MON_border_conflict_lost_defender.1.a:0 "Wir müssen so schnell wie möglich einen Gegenangriff starten!"
 MON_border_conflict_canceled_attacker.1.t:0 "Patt in [their_state.GetName]"
 MON_border_conflict_canceled_attacker.1.desc:0 "Die Kämpfe im Gebiet [unser_bundesstaat.GetName]-[ihr_bundesstaat.GetName] sind zum Stillstand gekommen, da es beiden Seiten nicht gelungen ist, die jeweils andere Seite zu verdrängen. Beide Seiten konnten nur geringe Gebietsgewinne verzeichnen. Späher berichten, dass sich die [ihr_bundesstaat.GetAdjective]-Soldaten der Gegenseite in Verteidigungsgebiet verschanzen. Offenbar wollen sie ihr Gebiet verteidigen, werden aber wahrscheinlich nicht gegen unsere Linien vorstoßen."
 MON_border_conflict_canceled_attacker.1.a:0 "Wir kommen wieder."
 MON_border_conflict_canceled_defender.1.t:0 "Patt in [their_state.GetName]"
 MON_border_conflict_canceled_defender.1.desc:0 "Die Kämpfe im Gebiet [unser_bundesstaat.GetName]-[ihr_bundesstaat.GetName] sind zum Stillstand gekommen, da es beiden Seiten nicht gelungen ist, die jeweils andere Seite zu verdrängen. Beide Seiten konnten nur geringe Gebietsgewinne verzeichnen. Späher berichten, dass sich die [ihr_bundesstaat.GetAdjective]-Soldaten der Gegenseite in Verteidigungsgebiet verschanzen. Offenbar wollen sie ihr Gebiet verteidigen, werden aber wahrscheinlich nicht gegen unsere Linien vorstoßen."
 MON_border_conflict_canceled_defender.1.a:0 "Wir kommen wieder."
 MON_border_incident_defender_warning.1.t:0 "[From.GetNameDefCap] bedroht unsere Grenze"
 MON_border_incident_defender_warning.1.desc:0 "Gestern wurden Soldaten von [their_country.GetAdjective] beim Überqueren der Grenze von [attacker_state.GetName] nach [defender_state.GetName] gesichtet. Im Laufe der Nacht sind weitere [their_country.GetAdjective]-Truppen in das Gebiet eingedrungen und haben Verteidigungsstellungen auf unserem Territorium errichtet. \n\nDavor kam es zu einer Reihe kleinerer Scharmützel und Grenzverletzungen durch Truppen unter dem Kommando von [their_country.GetLeader] entlang unserer gemeinsamen Grenze.\n\nDiesmal ist jedoch klar, dass die [their_country.GetAdjective]-Truppen hier bleiben werden. Wir müssen so schnell wie möglich Truppen in die Region schicken, um ihren Vormarsch aufzuhalten."
 MON_border_incident_defender_warning.1.a:0 "Mobilisieren Sie alle verfügbaren Kräfte!"
 MON_border_conflict_escalate_to_war.1.t:0 "[From.GetNameDefCap] mobilisiert für den Krieg"
 MON_border_conflict_escalate_to_war.1.desc:0 "Aufklärungsberichte deuten darauf hin, dass sich [From.GetAdjective]-Truppen in [their_state.GetName] für eine Großoperation sammeln, um tiefer in [our_state.GetName] vorzudringen. Angesichts der Menge an Ressourcen, die [From.GetLeader] für dieses Abenteuer aufwenden möchte, ist klar, dass es sich nicht länger nur um einen Streit über den genauen Verlauf einer Demarkationslinie handelt.\n\nEin umfassender Krieg steht bevor."
 MON_border_conflict_escalate_to_war.1.a:0 "Wir müssen bereit sein, ihnen zu begegnen!"
 TIB_annex:0 "Tibet einbeziehen"
 TIB_annex_desc:0 "Das alte Tibet ist Teil unseres chinesischen Landes, lasst uns gemeinsam voranschreiten."
 MON_annex:0 "Integrieren Sie Khalkha"
 MON_annex_desc:0 "Das alte Khalkha ist Teil unseres chinesischen Landes, lasst uns gemeinsam voranschreiten."
 
 
