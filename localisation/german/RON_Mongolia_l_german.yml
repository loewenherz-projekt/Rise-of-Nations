 yuan_dynasty_tooltip:0 "Die Große Yuan-Dynastie kehrt zurück. Alle Staaten Chinas werden zu Kernen der Mongolei."
 southeast_push_tooltip:0 "Die Staaten Französisch-Indochina und Thailand werden zu Kernen der Mongolei."
 java_invasion_tooltip:0 "Staaten aus Malaya, Borneo und Java sind heute Kernländer der Mongolei."
 amu_darya_tooltip:0 "Staaten aus Persien, Georgien, Armenien und Teilen der Türkei sind heute Kerne des Mongolischen Reiches"
 kamikaze_tooltip:0 "Staaten aus Japan sind heute Kerne des Mongolischen Reiches"
 golden_horde_tooltip:0 "Staaten aus Südwestrussland sind heute Kerne des Mongolischen Reiches"
 
 North_China_Buffer_State_Strategy_tooltip:0 "Fügen Sie den Kern zu Hebei, Chahar, Suiyuan, Shanxi und Shandong hinzu. "



 MON_republicanism:0 "Reorganisieren Sie die Republik"
 MON_republicanism_desc:0 "In den letzten Jahrzehnten litt unser Land unter äußeren Bedrohungen und inneren Unruhen. Jetzt müssen wir uns neu organisieren und unseren Weg in eine stabile Zukunft wählen."
 MON_SOV_focus:0 "Bleiben Sie bei der UdSSR"
 MON_SOV_focus_desc:0 "Wir dürfen die Ideale unserer glorreichen Volksrevolution nicht verraten! Wir müssen an der Wiege der Revolution festhalten – der UdSSR."
 MON_JAP_focus:0 "Bündnis mit Japan"
 MON_JAP_focus_desc:0 "Nachdem nun die Grundlage gegenseitigen Vertrauens und der Freundschaft gelegt ist, können wir unsere Beziehungen zu Japan formalisieren, indem wir die Bildung einer echten Allianz vorschlagen."
 MON_japanese_advisors:0 "Japanische Berater"
 MON_japanese_advisors_desc:0 "Unser Militär ist den meisten unserer Nachbarn unterlegen und besteht noch immer hauptsächlich aus Kavallerie. Um seine Qualität zu verbessern, können wir erfahrene Militärberater aus Japan einladen, das uns als potenzielle Verbündete gegen die Chinesen betrachtet. Darüber hinaus können uns erfahrene politische Berater auch dabei helfen, unsere Regierung zu stabilisieren."
 MON_ask_for_mengkukuo:0 "Fragen Sie nach Mengjiang"
 MON_ask_for_mengkukuo_desc:0 "Da die Japaner uns nun als verlässliche Verbündete betrachten, können wir sie auffordern, die Marionettenregierung Mengjiang aufzulösen und ihr Land direkt an uns zu übertragen, um einen echten panmongolischen Staat zu schaffen."
 MON_decollectivization:0 "Entkollektivierung"
 MON_decollectivization_desc:0 "Kurz nach der Revolution von 1921 führte die prosowjetische Regierung die Kollektivierung durch, die einen Großteil unserer Produktion und unseres Handels vernichtete. Wir können die Verwüstung unseres Landes nicht länger dulden – es ist Zeit, das Privateigentum vollständig wiederherzustellen."
 MON_elected_khural:0 "Khural-Wahlen"
 MON_elected_khural_desc:0 "Die sowjetische Demokratie ist nicht unsere Art. Um ein wirklich freies Land zu werden, müssen wir unserem Volk erlauben, seine Regierung zu wählen."
 MON_SOV_break:0 "Bruch mit der UdSSR"
 MON_SOV_break_desc:0 "Wir haben nichts mehr mit der UdSSR gemeinsam. Lasst uns alle sowjetischen Marionetten deportieren und unseren eigenen Weg in die Freiheit suchen, allein oder mit neuen Verbündeten."
 MON_repressions:0 "Repressionen"
 MON_repressions_desc:0 "Revolution erfordert Opfer. Um unser Land vor Konterrevolutionären und anderen Verrätern zu schützen, müssen wir sie gnadenlos ausmerzen."
 MON_claim_inner_mongolia:0 "Anspruch auf die Innere Mongolei"
 MON_claim_inner_mongolia_desc:0 "Nachdem wir nun unsere innere Stabilität und Diplomatie gestärkt haben, können wir mit der Rückeroberung unserer ethnischen Gebiete beginnen. Das erste Ziel ist die Innere Mongolei!"
 MON_develop_inner_mongolia:0 "Entwicklung der Inneren Mongolei"
 MON_develop_inner_mongolia_desc:0 "Nachdem die gesamte Innere Mongolei erobert ist, sollten wir uns darum bemühen, diese Region zu einem würdigen Teil unseres Landes zu machen."
 MON_claim_dzungaria:0 "Anspruch Dzungaria"
 MON_claim_dzungaria_desc:0 "Der westlichste Teil der Mongolei ist noch immer unter der Kontrolle chinesischer Militaristen. Wir müssen ihn uns auf die eine oder andere Weise sichern!"
 MON_develop_dzungaria:0 "Dzungaria entwickeln"
 MON_develop_dzungaria_desc:0 "Nachdem wir die Dschungaren-Gebiete wieder in unser Land integriert haben, müssen wir ihnen auch bei der Modernisierung helfen."
 MON_claim_buryatia:0 "Anspruch Burjatien"
 MON_claim_buryatia_desc:0 "Jetzt, da wir endlich von der UdSSR unabhängig sind, können wir die burjatischen Panmongolisten offen unterstützen und Anspruch auf nordmongolisches Land erheben."
 MON_develop_transsib:0 "Verbesserung der Transsibirischen Eisenbahn"
 MON_develop_transsib_desc:0 "Burjatien ist Teil einer großen Eisenbahnlinie, die Zentralrussland mit dem Fernen Osten verbindet. Jetzt können wir diese Basis nutzen, um den lokalen Verkehr zu unserem eigenen Vorteil zu verbessern."
 MON_develop_altai:0 "Verbesserung der Altai-Eisenbahn"
 MON_develop_altai_desc:0 "In der Region Uriankhai herrscht ein Mangel an Nahverkehrsmitteln. Wir müssen den Zustand des Schienennetzes in der Westmongolei verbessern."
 MON_transmongolian_railroad:0 "Bau der Transmongolischen Straße"
 MON_transmongolian_railroad_desc:0 "Dank unserer Erfahrung im Bau riesiger Eisenbahnnetze sind wir nun endlich in der Lage, die Infrastruktur in unserem Kernland zu modernisieren."
 MON_export_revolution:0 "Exportrevolution"
 MON_export_revolution_desc:0 "Wir stehen an der Spitze der Revolution im Osten und müssen sie weit und breit verbreiten!"
 MON_industry_effort:0 "Industrialisierung"
 MON_industry_effort_desc:0 "Um in einer sich schnell verändernden Welt zu überleben, müssen wir unsere wirtschaftliche Rückständigkeit überwinden. Lasst die Industrialisierung beginnen!"
 MON_resource_effort:0 "Ressourcenausgrabung"
 MON_resource_effort_desc:0 "Obwohl die meisten unserer Länder trockenes Ödland sind, sind sie reich an verschiedenen natürlichen Ressourcen. Wir müssen uns nur anstrengen, sie zu nutzen."
 MON_oil_effort:0 "Erdölindustrie"
 MON_oil_effort_desc:0 "Wir verfügen über bedeutende Ölvorkommen, verfügen jedoch nicht über ausreichende Förderanlagen. Wenn wir Zeit und Mühe in den Ausbau der Ölindustrie investieren, werden wir wirtschaftlich weniger abhängig sein."
 MON_oil_effort2:0 "Öl-Autarkie"
 MON_oil_effort2_desc:0 "Unsere Ölfelder mögen nützlich sein, aber wir müssen bei der Ölversorgung autark sein. Unsere Wissenschaftler sollen eine andere Methode zur Gewinnung des schwarzen Goldes finden."
 MON_metals_effort:0 "Erzabbau"
 MON_metals_effort_desc:0 "Wir verfügen über zahlreiche Metallvorkommen, können diese aber aufgrund unserer rückständigen Technologie nicht effizient abbauen. Mit ausreichenden Investitionen ist es möglich, die Metallproduktion deutlich zu steigern."
 MON_infrastructure_effort:0 "Transportaufwand"
 MON_infrastructure_effort_desc:0 "Derzeit wird viel Kohle und Metall produziert, aber aufgrund der Größe unserer Gebiete ist dies ohne geeignete Transportmittel oft wirkungslos. Wir müssen zuverlässige Eisenbahnstrecken von der Hauptstadt zu den entfernten Minen bauen."
 MON_electrification:0 "Elektrifizierung"
 MON_electrification_desc:0 "Die Industrialisierung ist ohne Elektrizität undenkbar, doch die meisten unserer Bevölkerungen haben noch immer keine Ahnung davon! Um weitere Fortschritte zu erzielen, müssen wir eine groß angelegte Aufklärungskampagne durchführen."
 MON_mechanization:0 "Mechanisierung"
 MON_mechanization_desc:0 "Der nächste Schritt zu einer erfolgreich wachsenden Wirtschaft ist die Mechanisierung von Landwirtschaft und Industrie. Lasst uns unsere Felder mit eisernen Pferden erobern!"
 MON_industry_effort2:0 "Schwerindustrie"
 MON_industry_effort2_desc:0 "Wir haben genug Fortschritte gemacht, um den nächsten Schritt zu machen: die Entwicklung einer ausreichenden Schwerindustrie, um mehr Produktionsmittel zu schaffen."
 MON_mil_industry:0 "Mongolischer Wolf"
 MON_mil_industry_desc:0 "Die jüngsten Fortschritte in der Industrie stimmen uns zuversichtlich. Unser Verteidigungsministerium schlägt vor, die Waffenproduktion zu steigern, um uns sowohl wirtschaftlich als auch militärisch zu stärken."
 MON_revolutions_experience:0 "Erfahrung von Revolutionen"
 MON_revolutions_experience_desc:0 "Wir haben die Revolutionen von 1911 und 1921 sowie den Khövsgöl-Aufstand von 1932 erlebt. Vielleicht sind sie nicht so massiv und kompliziert wie frühere Kriege, aber wir können aus unserer jüngsten Vergangenheit einige Lehren ziehen."
 MON_cavalry_modernization:0 "Kavallerie modernisieren"
 MON_cavalry_modernization_desc:0 "Die Kavallerie bildet das Rückgrat unserer Armee, doch in der modernen Welt ist diese Truppengattung schnell veraltet. Um die Effizienz unserer Streitkräfte zu erhalten, müssen wir die Kavallerie neu bewaffnen und moderne Taktiken für sie entwickeln."
 MON_motorization:0 "Motorisierung"
 MON_motorization_desc:0 "Die Kavallerie leistet in der Steppe gute Dienste, doch ein radikaler Wandel in der Fortbewegungsart ist unvermeidlich. Heute hat das Auto die Oberhand über das Pferd."
 MON_desert_tigers:0 "Wüstentiger"
 MON_desert_tigers_desc:0 "Panzer dominieren das Schlachtfeld und um eine weitere Unterlegenheit zu verhindern, werden wir angemessene Panzertruppen für unsere Armee aufbauen."
 MON_small_arms:0 "Wiederbewaffnung"
 MON_small_arms_desc:0 "Einfache Schützen bilden das Rückgrat jeder Armee und müssen unbedingt gut bewaffnet sein!"
 MON_artillery:0 "Artillerieeinsatz"
 MON_artillery_desc:0 "Selbst ein gut ausgerüsteter Soldat kann nur mit Artillerie im Rücken effizient kämpfen."
 MON_support:0 "Spezialeinheiten"
 MON_support_desc:0 "Man kann nicht einfach durch eurasische Steppen und Gebirge marschieren – wir müssen spezielle Truppen anschaffen, die in der Lage sind, schwierigste Kampfeinsätze zu bewältigen."
 MON_fortify_border:0 "Ostwand"
 MON_fortify_border_desc:0 "Unsere größte Bedrohung ist derzeit Japan und wir müssen unsere Grenze mit seinen Marionetten sichern, um für den Krieg gerüstet zu sein."
 MON_fortify_capital:0 "Hauptstadt stärken"
 MON_fortify_capital_desc:0 "Wir können die Richtung der nächsten Invasion nicht vorhersagen, aber die Sicherung unserer Hauptstadt wird richtig sein, egal ob die Japaner, Russen oder Chinesen angreifen."
 MON_quick_fort:0 "Intensive Anreicherung"
 MON_quick_fort_desc:0 "Der Krieg steht vor der Tür! Wir müssen uns so schnell wie möglich schützen."
 MON_exercises:0 "Militärübungen"
 MON_exercises_desc:0 "Erfahrung ist Macht – und wir können sie uns auf clevere Weise und ohne Blutvergießen aneignen."
 MON_desert_warfare:0 "Wüstenkrieg"
 MON_desert_warfare_desc:0 "Ein großer Teil unseres Landes besteht aus ausgedehnter Wüste, und viele unserer Soldaten stammen von Wüstennomaden ab. Davon können wir profitieren, indem wir ihre Bräuche auf die militärische Organisation übertragen."
 MON_peoples_war_focus:0 "Volkskrieg"
 MON_peoples_war_focus_desc:0 "Unser Volk ist loyal genug, um sie im Falle einer ausländischen Invasion zu Partisanenaktivitäten zu ermutigen."
 MON_likbez_focus:0 "Likez"
 MON_likbez_focus_desc:0 "Die Sowjetunion setzte erfolgreich eine Politik zur Ausrottung des Analphabetismus um, die sich als wirksam erwies. Wir können ihrem Beispiel folgen und versuchen, jedem einfachen Arat das Lesen und Schreiben beizubringen!"
 MON_national_education:0 "Nationales Bildungssystem"
 MON_national_education_desc:0 "Wenn unsere Bevölkerung zumindest eine Grundausbildung hat, können wir endlich ein stabiles und würdiges Bildungssystem aufbauen, das unabhängig von ausländischen Fachkräften ist."
 MON_academy:0 "Nationale Universität"
 MON_academy_desc:0 "Durch die Zusammenführung der talentiertesten und ausgebildetsten Spezialisten können wir eine zentrale Forschungs- und Bildungseinrichtung errichten – die Nationale Universität der Mongolei"
 MON_soviet_secrets:0 "Sowjetische Geheimnisse"
 MON_soviet_secrets_desc:0 "Durch Verhandlungen, die Nutzung formeller und informeller Verbindungen in der UdSSR und direkte Spionage können wir an einige nützliche Blaupausen gelangen, die von unseren Wissenschaftlern und Ingenieuren verwendet werden können."
 MON_v_weapons:0 "Geheimwaffen"
 MON_v_weapons_desc:0 "Unsere Ressourcen sind begrenzt, doch ein geschickter und intensiver Einsatz dieser Ressourcen kann uns entscheidende Vorteile verschaffen."
 MON_japanese_path:0 "Japanische Schule"
 MON_japanese_path_desc:0 "Nachdem wir unsere Ausbildung geordnet haben, müssen wir uns für eine wissenschaftliche Lehre entscheiden. Der japanische Weg scheint mit seiner Betonung auf Massenarmee und Luftüberlegenheit überlegen zu sein."
 MON_western_path:0 "Westliche Schule"
 MON_western_path_desc:0 "Nachdem wir unsere Ausbildung in Ordnung gebracht haben, müssen wir uns für eine wissenschaftliche Lehre entscheiden. Der westliche Weg scheint überlegen zu sein, da er sich auf intellektuelle Überlegenheit und indirekte Kriegsführung konzentriert."
 MON_russian_colony:0 "Russische Diaspora"
 MON_russian_colony_desc:0 "In der Hauptstadt gibt es eine bedeutende russische Kolonie, die für unsere Industrie und andere Bereiche wichtig ist. Wir können ihr bei ihrer weiteren Entwicklung helfen, aber das kann Unzufriedenheit unter den einheimischen Bürgern säen."
 MON_white_officers:0 "Weiße Offiziere"
 MON_white_officers_desc:0 "Mit dem Sturz des kommunistischen Regimes können wir zu einem neuen Zufluchtsort für die russische Opposition werden. Einige talentierte weiße Kriegsherren leben noch immer im Exil – wir können davon profitieren, sie als unsere Offiziere einzustellen und zu befördern."
 MON_russian_mongolia:0 "Weiße Mongolei"
 MON_russian_mongolia_desc:0 "Russische Offiziere dominieren unser Militär, russische Geschäftsleute dominieren die Wirtschaft und sogar unsere Politik wird von Weißrussen beeinflusst. Wenn wir uns nicht dagegen wehren können, können wir es zulassen – unter der Herrschaft erfahrener Kriegsherren kann unser Land stark und unabhängig werden."
 MON_civil_aviation:0 "Zivilluftfahrt"
 MON_civil_aviation_desc:0 "Auch ohne eine eigentliche Luftwaffe können wir eine unterstützende Infrastruktur zur Verbesserung der zivilen Luftfahrt aufbauen."
 MON_air_doctrine:0 "Lufttheorie"
 MON_air_doctrine_desc:0 "Mit der entsprechenden Industrie und Erfahrung im friedlichen Fliegen können unsere Piloten und Ingenieure mit dem Aufbau einer nationalen Luftwaffe beginnen."
 MON_light_fighters:0 "Leichte Luftfahrt"
 MON_light_fighters_desc:0 "Unsere Wahl liegt auf leichten und mobilen Flugzeugen."
 MON_heavy_fighters:0 "Schwere Luftfahrt"
 MON_heavy_fighters_desc:0 "Unsere Priorität liegt auf schweren Flugzeugen und Begleitflugzeugen."
 MON_strat_bombers:0 "Strategische Luftfahrt"
 MON_strat_bombers_desc:0 "Strategische Bomber sind ein wichtiger Teil der Großstrategie des Zermürbungskriegs."
 MON_cas_bombers:0 "CAS Aviation"
 MON_cas_bombers_desc:0 "Für jede größere Landoperation ist eine Luftnahunterstützung erforderlich."
 MON_military_academy:0 "Militärakademie"
 MON_military_academy_desc:0 "Wir sind noch immer stark von der russischen Militärausbildung abhängig, da die meisten unserer Offiziere an russischen Militärschulen ausgebildet wurden. Jetzt müssen wir eine nationale Militärausbildung aufbauen, und die Akademie wird ihr Herzstück sein."
 MON_standing_army_focus:0 "Stehendes Heer"
 MON_standing_army_focus_desc:0 "Unsere Armee besteht immer noch überwiegend aus Wehrpflichtigen und Reservisten, die nicht sehr zuverlässig sind. Darüber hinaus scheiterten mehrere Mobilisierungsversuche kläglich. Das Land braucht eine neue, leistungsfähige und stabile Armee."
 MON_monasteries:0 "Klöster wiederherstellen"
 MON_monasteries_desc:0 "Unser Land war einst ein bedeutendes Zentrum des buddhistischen Mönchtums, doch die kommunistische Revolutionsregierung verfolgte unsere Priester und Mönche brutal. Um die spirituelle Gesundheit unseres Volkes und die innere Stabilität zu bewahren, können wir Frieden mit den Lamas schließen und eine pro-religiösere Politik verfolgen."
 MON_religious_education:0 "Förderung der buddhistischen Bildung"
 MON_religious_education_desc:0 "Die buddhistischen Lehren sind ein wesentlicher Bestandteil des Nationalgeistes der Mongolei. Wenn wir religiöse Lehren in die umfassende Bildung integrieren, können wir in unserem Volk Ausdauer und Loyalität fördern."
 MON_restore_monarchy:0 "Wiederherstellung der Monarchie"
 MON_restore_monarchy_desc:0 "Die mongolische Freiheit wurde von patriotischen Noyons und Lamas erobert, nicht von wurzellosen kosmopolitischen Kommunisten. Unser Volk verdient eine bessere Herrschaft – die Herrschaft des heiligen Bogd Khan. Lasst uns seine Reinkarnation finden und ihn auf den Thron setzen."
 MON_tibet_friendship:0 "Bündnis mit Tibet"
 MON_tibet_friendship_desc:0 "Seit der Xinhai-Revolution waren die Mongolei und Tibet eng miteinander verbunden. Beide Länder wurden von buddhistischen Theokraten regiert, widersetzten sich ausländischen Mächten und wandten sich fast gleichzeitig von China ab. Wir können versuchen, den tibetisch-mongolischen Freundschaftsvertrag von 1913 zu erneuern und ein offizielles Bündnis zu bilden, um unsere Position in der Region zu stärken."
 MON_militant_buddhism:0 "Militanter Buddhismus"
 MON_militant_buddhism_desc:0 "Obwohl die buddhistischen Lehren im Allgemeinen friedlich sind, gibt es zahlreiche militante Lamas, die unser ohnehin schon kriegerisches Volk dazu ermutigen können, für unseren Glauben und gegen ausländische Barbaren zu kämpfen."
 MON_deterrence:0 "Unter Tyrannen"
 MON_deterrence_desc:0 "Wir sind von übermächtigen Diktatoren und Imperialisten umgeben und das Einzige, was wir tun können, ist, unser Volk so entschieden wie möglich zu schützen."
 MON_develop_agriculture:0 "Landwirtschaft entwickeln"
 MON_develop_agriculture_desc:0 "Die gesamte Mongolei besteht derzeit aus kargen, kaum besiedelten Weiden. Es könnte sinnvoll sein, fruchtbare Teile unseres Landes in landwirtschaftliche Gebiete umzuwandeln, um die Nahrungsmittelproduktion anzukurbeln."
 MON_chinese_migrants_focus:0 "Chinesische Migranten"
 MON_chinese_migrants_focus_desc:0 "China ist vom Krieg mit Japan schwer getroffen, und die Menschen, die ihre Heimat verloren haben, suchen nach einem sichereren Leben. Wir können ihnen Asyl bieten und so unsere Bevölkerung vergrößern, doch Migranten werden wahrscheinlich nicht wieder in den Krieg ziehen wollen, ganz zu schweigen von sinophoben Patrioten."
 MON_military_science:0 "Militärwissenschaft"
 MON_military_science_desc:0 "Unsere Armee muss nicht nur quantitativ, sondern auch qualitativ wachsen. Durch die enge Zusammenarbeit zwischen hochrangigen Militärs und Wissenschaftlern können wir unsere Armee mit den wichtigsten Innovationen versorgen."
 MON_indoctrination:0 "Schulpropaganda"
 MON_indoctrination_desc:0 "Massenbildung dient nicht nur wirtschaftlichen, sondern auch ideologischen Zwecken. Wir können unser neues Schulsystem nutzen, um die Menschen dazu zu bringen, so zu denken, wie wir es uns wünschen."
 MON_communism_focus:0 "Bleiben Sie beim Kommunismus"
 MON_communism_focus_desc:0 "Wir müssen unseren Kurs nicht ändern – gemeinsam mit unseren Genossen im Ausland können wir unseren Kampf für die Weltrevolution fortsetzen."
 MON_PRC_focus:0 "Gehen Sie mit PRC"
 MON_PRC_focus_desc:0 ""
 MON_ulanhu_expedition:0 "Ulanhu-Expedition"
 MON_ulanhu_expedition_desc:0 "Kleinliche Streitereien zwischen Parteiführern plagen unser Land seit der Revolution und scheinen kein Ende zu nehmen. Da wir das Problem nicht intern lösen können, können wir unsere südlichen Brüder um Hilfe bitten. Die mongolischen Ulanhu aus der VR China könnten eine Militärexpedition in unsere Hauptstadt organisieren, um korrupte Plünderer loszuwerden."
 MON_partition_warlords:0 "Teilungskriegsherren"
 MON_partition_warlords_desc:0 "Chinesische Kriegsherren sind noch immer ein Fluch für Ostasien und einer der Hauptfeinde der Revolution hier. Alleine konnten wir sie nicht bekämpfen, aber mit vereinten Kräften der Mongolei und der VR China können wir einige von ihnen zur Unterwerfung zwingen."
 MON_maoist_war_focus:0 "Maoistische Kriegsführung"
 MON_maoist_war_focus_desc:0 "Wir besetzen kein Land – wir verbreiten die Revolution. Wenn wir dies den einfachen Leuten klarmachen, indem wir in jedem kontrollierten Gebiet eine Neue Demokratische Revolution durchführen, wird es einfacher sein, diese Gebiete ohne Unterdrückung zu halten."
 MON_panmongolist_coup:0 "Panmongolischer Putsch"
 MON_panmongolist_coup_desc:0 "Die Sowjets hassen und fürchten uns und versuchen, jedes mongolische Volk auszulöschen. Zeigen wir ihnen, dass ihre Ängste berechtigt waren – Restaurationisten und projapanische Gruppen lauern an jeder Ecke! Unsere Zeit ist gekommen: Zu den Waffen, mongolisches Volk!"
 MON_new_culture:0 "Neue Kultur"
 MON_new_culture_desc:0 "Die alten Gewohnheiten sind zwar ein Grund zum Stolz, aber in der Praxis sind sie überholt und nutzlos. Um der Zukunft gewachsen zu sein, müssen wir eine brandneue, mutige Kultur schaffen!"
 MON_genghisid:0 "Inthronisieren Dschingis"
 MON_genghisid_desc:0 "Die Mongolei braucht einen Herrscher, doch die Bogd Khans waren immer nur Marionetten in den Händen des Klerus und der Mandschu. Nur wer das Blut der Borjigins trägt, ist würdig, den mongolischen Thron zu besteigen und den Ruhm des Dschingis-Reiches wiederherzustellen!"
 MON_continue_regency:0 "Ewige Regentschaft"
 MON_continue_regency_desc:0 "Es gibt niemanden mehr, der Dschingis würdig wäre, seinen Thron zu beerben. Und da es unwahrscheinlich erscheint, dass seine Reinkarnation bald erscheint, können wir unseren Regenten zum obersten Herrscher der Mongolei ohne Monarchen erklären."
 MON_soviet_aid:0 "Sowjetische Hilfe"
 MON_soviet_aid_desc:0 "Die ganze Welt war Zeuge der rasanten Industrialisierung der UdSSR. Wir können versuchen, die gleichen Methoden anzuwenden und sowjetische Spezialisten einzubeziehen, um unsere eigene Industrialisierung zu beschleunigen."
 MON_sovereign_democracy:0 "Souveräne Demokratie"
 MON_sovereign_democracy_desc:0 "Sowohl die Sowjetrepublik als auch die chinesische Republik sind in eine Diktatur abgeglitten. Wir müssen unsere Freiheit mit allen Mitteln schützen."
 KMT_ties:0 "Kuomintang-Krawatten"
 KMT_ties_desc:0 "Unser demokratisches Denken wird unweigerlich von den Ideen der Xinhai-Revolution und den aktuellen politischen Trends in China beeinflusst. Indem wir unsere Gemeinsamkeiten hervorheben, können wir einen Kompromiss mit der Kuomintang-Regierung erzielen und ihre Anerkennung und Freundschaft gewinnen."
 MON_joint_ventures:0 "Joint Ventures"
 MON_joint_ventures_desc:0 "Sowohl die chinesische als auch die mongolische Wirtschaft sind noch schwach, aber durch die Bündelung unserer Kräfte können wir mehr erreichen."
 MON_compromise_feudals:0 "Kompromiss mit Feudalherren"
 MON_compromise_feudals_desc:0 "Lamas und Adlige waren die Hauptunterstützer der jüngsten Konterrevolution. Während der Klerus bereits von unserem Führer beeinflusst wird, streben die verbleibenden Feudalherren weiterhin nach Autonomie. Durch einige Zugeständnisse können wir mit ihnen Kompromisse eingehen und sie in unsere Regierungsstrukturen integrieren."
 MON_resource_nationalism:0 "Ressourcennationalismus"
 MON_resource_nationalism_desc:0 "Unsere Ressourcen sind knapp, aber wertvoll. Wir werden entsprechende Gesetze erlassen, um sie vor der Ausbeutung durch ausländische Kapitalisten zu schützen."
 MON_xinjiang_coup:0 "Sinkiang-Putsch"
 MON_xinjiang_coup_desc:0 ""
 MON_white_movement:0 "Revitalisieren Sie die weiße Bewegung"
 MON_white_movement_desc:0 "Wenn die prosowjetischen Regime nach und nach fallen, können wir weltweit antibolschewistische Kräfte mobilisieren und einen neuen, letzten Krieg gegen die rote Bedrohung beginnen!"
 MON_lama_council:0 "Rat der Lamas"
 MON_lama_council_desc:0 "Bogd Khans waren"
 MON_centralized_bureaucracy:0 "Zentralisierung der Bürokratie"
 MON_centralized_bureaucracy_desc:0 "Unser Land wird noch immer von einer Ansammlung regionaler Räte regiert, die meist von lokalen geistlichen Autoritäten geleitet werden. Wir werden das ändern, indem wir sie zu offiziellen Gouverneuren befördern und unloyale durch Bürokraten aus dem Kapital ersetzen."
 MON_harmony:0 "Harmonische Diplomatie"
 MON_harmony_desc:0 "Die Mongolei ist einzigartig und muss in einer Welt voller potenzieller Feinde überleben. Anstatt uns bis an die Zähne aufzurüsten, müssen wir die Freundschaft mit möglichst vielen Nationen suchen, die es uns ermöglichen, ohne Angst vor internationaler Isolation zu handeln."
 MON_neutrality_focus:0 "Neutrale Diplomatie"
 MON_neutrality_focus_desc:0 "Es besteht kein Grund, sich um all diese globalen Ereignisse zu kümmern, solange sie uns nicht betreffen. Unter der Führung weiser Lamas kann die Mongolei alle ehrgeizigen Narren überleben."
 MON_claim_tuva:0 "Anspruch auf Tuva"
 MON_claim_tuva_desc:0 "Die Tuwiner standen der Mongolei kulturell und politisch immer nahe und versuchten sogar einmal, sich der Mongolei anzuschließen, wurden jedoch von den Russen daran gehindert. Das Gleiche passiert jetzt, aber wir haben jedes Recht, Gewalt anzuwenden, um die Ketten des tuwinischen Volkes zu sprengen!"
 MON_tuva_metal:0 "Tuvanische Metalle"
 MON_tuva_metal_desc:0 "In Tannu Tuva gibt es einige Metallvorkommen, doch die allgemeine Armut des Landes verhinderte deren Erschließung. Mit etwas Anstrengung könnte es zu einem der führenden Rohstoffproduzenten unseres Landes werden."
 MON_tuva_anschluss:0 "Volksabstimmung in Tuwa"
 MON_tuva_anschluss_desc:0 "Die Menschen in Tannu Tuva versuchten bereits, sich mit der Mongolei zu vereinigen, wurden jedoch von Ausländern daran gehindert. Nach dem Sturz korrupter kommunistischer Regime können wir nun auf einem neuen Referendum über den Anschluss an die Mongolei bestehen."
 MON_expansion:0 "Wiederaufbau der Nation"
 MON_expansion_desc:0 "Nur eine starke und stabile Nation kann auf Expansion und wahren Ruhm hoffen. Wir müssen unseren Staat festigen, bevor wir unser Land zurückerobern."
 MON_greater_mongolia:0 "Großer Yuan"
 MON_greater_mongolia_desc:0 "Wenn wir das gesamte mongolische Land unter unserer Kontrolle haben, können wir sogar noch weiter gehen und das Erbe des Großen Yuan zurückfordern!"
 MON_desovetization:0 "Entsowjetisierung"
 MON_desovetization_desc:0 "Die Beseitigung des sowjetischen Einflusses wird uns zu einer echten Unabhängigkeit führen."
 MON_develop_chahar:0 "Chahar entwickeln"
 MON_develop_chahar_desc:0 "Chahar ist die Heimat der Goldenen Familie, die letzte Heimat des mongolischen Khans."
 MON_deal_with_japanese_supporters:0 "Umgang mit Mitarbeitern"
 MON_deal_with_japanese_supporters_desc:0 "Die Innere Mongolei ist seit langem ein Land der Mongolen, auch wenn es mit dem Teufel zusammenarbeitet."
 MON_deal_with_chinese:0 "Deal mit Chinesen"
 MON_deal_with_chinese_desc:0 "Die Chinesen müssen unsere Forderung akzeptieren."
 MON_deal_with_tibet:0 "Khoshuts Vermächtnis"
 MON_deal_with_tibet_desc:0 "Das Khoshut-Khanat hat das gesamte Plateau kontrolliert, es ist an der Zeit, unser altes Erbe wiederzuerlangen."
 MON_develop_plateau:0 "Plateau entwickeln"
 MON_develop_plateau_desc:0 "Das Dach der Welt sollte modernisiert werden."
 MON_recover_burma:0 "Burma zurückgewinnen"
 MON_recover_burma_desc:0 "Burma war unser altes Thema, und es ist der Weg nach Indien, verstehen Sie?"
 MON_kamikaze:0 "Kein Kamikaze mehr"
 MON_kamikaze_desc:0 "Hunderte Jahre lang hat der göttliche Wind Nippon vor dem Angriff unserer Vorfahren bewahrt, doch dieses Mal wird uns das Glück nicht wieder hold sein."
 MON_southeast_push:0 "Südostoffensive"
 MON_southeast_push_desc:0 "Die Bevölkerung Indochinas wird durch ihre Besatzer geschwächt, was unsere Expansion nach Süden erleichtert und gleichzeitig einen guten Ausgangspunkt für einen Angriff auf das Königreich Siam bietet."
 MON_java_invasion:0 "Java-Invasion"
 MON_java_invasion_desc:0 "Wir werden die Fehler unserer Vorfahren nicht wiederholen, wir werden auf diese Invasion vorbereitet sein und diese strategische Region für unser Reich sichern."
 
 
 buddhist_faction:0 "Sangha"
 peoples_front_faction:0 "Volksfront"
 MON_united_front:0 "Zivilfront"
 
 
  MON.1.t:0 "Die Mongolei fordert Mengjiang"
 MON.1.d:0 "Die mongolische Regierung ist mutig genug, zu glauben, dass unsere Beziehungen gut genug sind, um ihnen unsere Marionette aus der Inneren Mongolei zu überlassen. Was sollen wir dagegen tun?"
 MON.1.a:0 "Sie können in Zukunft würdige Verbündete werden"
 MON.1.a:0 "Unsinn!"
 MON.1.c:0 "Versprechen Sie ihnen Mengjiang im Austausch für ein Bündnis."
 MON.2.t:0 "Japan weigert sich!"
 MON.2.d:0 "Japanische Beamte lehnten unseren Vorschlag zur Vereinigung der Mongolen unverschämt ab!"
 MON.2.a:0 "Schrecklich!"
 MON.3.t:0 "Mongolei schlägt Allianz vor"
 MON.3.d:0 "Die neue mongolische Regierung hat beschlossen, sich unserer Wohlstandssphäre anzuschließen. Im Grunde entspricht dies unserer Politik, den mongolischen Nationalismus zu fördern, um die Chinesen zu schwächen. Vielleicht ist es aber sicherer, nur bei Menjiang zu bleiben, das wir streng kontrollieren können."
 MON.3.a:0 "Sie sind vielversprechend genug, um ihnen zu vertrauen."
 MON.3.b:0 "Sie sind zu instabil, als dass wir ihnen vertrauen könnten."
 MON.4.t:0 "Japan weigert sich!"
 MON.4.d:0 "Die japanischen Behörden haben unseren Bündnisvorschlag unverschämt abgelehnt!"
 MON.4.a:0 "Wir werden es selbst schaffen"
 MON.5.t:0 "Borjigin für den Thron?"
 MON.5.d:0 "Da wir unsere schwache Regierung gestürzt haben, können wir nun unsere Führer frei wählen. Es gibt zwei Hauptkandidaten. Manche behaupten, wir sollten Prinz Demchugdongrub einladen – er ist ein überzeugter Panmongolist und Herrscher von Mengjiang, aber der japanischen Kontrolle überdrüssig. Der andere Kandidat ist Tserendondovyn Navaanneren, eine prominente Figur der Nationalen Revolution und ehemaliges Mitglied des Wissenschaftlichen Komitees. Wen sollen wir wählen?"
 MON.5.a:0 "Demchugdongrub wird uns helfen, uns mit der Inneren Mongolei zu vereinen"
 MON.5.b:0 "Navaanneren weiß besser, wie man unser Land regiert"
 MON.6.t:0 "Ein neuer Monarch?"
 MON.6.d:0 "Seit wir unsere Verbindungen zu den kommunistischen Unterdrückern abgebrochen haben, gab es Stimmen, die die Wiedereinsetzung Bogd Khans auf den Thron forderten. Wir können zwar die Errichtung eines weiteren autoritären Regimes nicht zulassen, können uns aber ein Beispiel an westlichen Ländern nehmen, in denen Monarchen zwar regieren, aber nicht herrschen."
 MON.6.a:0 "Wir werden unseren Traditionen folgen"
 MON.6.b:0 "Es gibt keine Würde im alten Aberglauben"
 MONCLN.1.t:0 "Vormarsch in der Mongolei"
 MONCLN.1.d:0 "Nun ist die gesamte Äußere Mongolei unter unserer Kontrolle. Sollen wir weiterhin den Panmongolismus unter unseren Marionetten fördern oder ist es besser, sie gespalten zu halten?"
 MONCLN.1.a:0 "Erklären Sie Demchugdongrub zum Herrscher der gesamten Mongolei!"
 MONCLN.1.b:0 "Es kann zu weit gehen ..."
 MON.7.t:0 "Anandyn Amar gesäubert!"
 MON.7.d:0 "Im Zuge massiver Säuberungen unter Beamten und Offizieren wurde bekannt, dass unser Premierminister in konterrevolutionäre Aktivitäten verwickelt war! Jetzt haben wir keine andere Wahl, als ihn vor Gericht zu stellen und zu bestrafen, während er durch jemanden ersetzt wird."
 MON.7.a:0 "Choibalsan scheint ein würdiger Kandidat zu sein ..."
 MON.8.t:0 "Die erste Sitzung des Lama-Rates"
 MON.8.d:0 "Jetzt, wo ein Kollektiv gewählter Priester die Nation regiert, werden Ähnlichkeiten mit republikanischen Systemen offensichtlich, wenn auch ungenau. Eine der Hauptfragen der ersten Sitzung ist die Frage, wie der Rat selbst organisiert werden soll – wird er vom Ratsvorsitzenden geleitet oder wird er wie in parlamentarischen Republiken völlig unabhängig sein?"
 MON.8.a:0 "Viele Köpfe sind besser als einer."
 MON.8.b:0 "Von einem lernen wir alles."
 MON.9.t:0 "Die Mongolei fordert Dsungarien"
 MON.9.d:0 "[From.GetName] erhebt den Anspruch, dass Dsungarien das ethnische Land der Oirat-Mongolen sei, und fordert dieses Gebiet von uns."
 MON.9.a:0 "Leg dich lieber nicht mit ihnen an"
 MON.9.b:0 "Auf keinen Fall"
 MON.10.t:0 "Forderung abgelehnt!"
 MON.10.d:0 "Die Regierung von [From.GetName] hat sich geweigert, unser Land zurückzugeben."
 MON.10.a:0 "Sie werden dafür bezahlen!"
 MON.11.t:0 "Zurückgegebene Gebiete"
 MON.11.d:0 "Die Regierung von [From.GetName] war klug genug, uns Gebiete zurückzugeben, die uns rechtmäßig zustehen."
 MON.11.a:0 "Großartig!"
 MON.12.t:0 "Die Mongolei fordert Burjatien"
 MON.12.d:0 "In Burjatien gab es seit dem Bürgerkrieg Sympathien für den Panmongolismus. Obwohl die meisten von ihnen vertrieben wurden, hält uns das konterrevolutionäre Regime der Mongolei für zu schwach oder unkonzentriert und erhebt daher Ansprüche auf Burjatien!"
 MON.12.a:0 "Leg dich lieber nicht mit ihnen an"
 MON.12.b:0 "Auf keinen Fall"
 MON.13.t:0 "Die Mongolei fordert die Innere Mongolei"
 MON.13.d:0 "[From.GetName] erhebt den Anspruch, dass die Innere Mongolei das ethnische Land der Südmongolen sei, und fordert dieses Gebiet von uns."
 MON.13.a:0 "Leg dich lieber nicht mit ihnen an"
 MON.13.b:0 "Auf keinen Fall"
 MON.14.t:0 "Fall des Kommunismus"
 MON.14.d:0 "Seit dem Sturz des kommunistischen Regimes in Russland gibt es in unserem Land keine Unterstützung mehr für dessen Ideen. Menschen, die den „großen Bruder“ nicht mehr fürchten, versammeln sich auf den Straßen und fordern lang ersehnte liberale Reformen."
 MON.14.a:0 "Vielleicht ist es Zeit für eine Veränderung?"
 MON.15.t:0 "Japanischer Vorschlag"
 MON.15.d:0 "Die japanische Regierung reagierte mit einem weiteren Vorschlag: Sie ist bereit, Mengjiang im Gegenzug für den Beitritt zu ihrer Allianz abzutreten. Sollen wir zustimmen?"
 MON.15.a:0 "Ja, Asien für die Asiaten!"
 MON.15.b:0 "Nein, es ist zu weit gegangen"
 MON.16.t:0 "Mongolei bietet Bündnis an"
 MON.16.d:0 "Nach der Wiederherstellung der theokratischen Regierung beschloss die Mongolei, den tibetisch-mongolischen Vertrag von 1913 zu erneuern und ein echtes Bündnis zweier unabhängiger buddhistischer Staaten zu bilden. Wäre dies unseren Interessen gedient?"
 MON.16.a:0 "Es lebe die tibetisch-mongolische Freundschaft"
 MON.16.b:0 "Es ist besser, also bleiben Sie neutral"
 MON.17.t:0 "Tibet stimmte zu"
 MON.17.d:0 "Unsere tibetischen Freunde nahmen unser Angebot an und erneuerten die Bündnisbeziehungen zwischen unseren Nationen."
 MON.17.a:0 "Ein toller Tag!"
 MON.18.t:0 "Tibet lehnte ab"
 MON.18.d:0 "Die tibetische Regierung hat beschlossen, unseren Freundschaftsvorschlag abzulehnen und ihre Isolation fortzusetzen."
 MON.18.a:0 "Lass sie sein"
 MON.19.t:0 "Die Mongolei schlägt ein Bündnis vor"
 MON.19.d:0 "Nach dem Niedergang der Ersten Einheitsfront und der Abspaltung der Mongolischen Volkspartei von der Komintern unterbreitete uns die mongolische Regierung einen Vorschlag: Sie will im Gegenzug für die Anerkennung ihrer Unabhängigkeit eine neue Volksfront gegen Nationalisten und Japaner gründen."
 MON.19.a:0 "Es ist besser, sie als Verbündete zu haben"
 MON.19.b:0 "Sie werden irgendwann Teil unserer Nation sein"
 MON.20.t:0 "Die VR China stimmte zu"
 MON.20.d:0 "Maos Regierung erkannte schließlich unsere Unabhängigkeit an und unterzeichnete einen offiziellen Freundschaftspakt."
 MON.20.a:0 "Tolle Neuigkeiten!"
 MON.21.t:0 "VR China lehnte ab"
 MON.21.d:0 "Maos Regierung weigerte sich, unsere Unabhängigkeit anzuerkennen und setzte ihre Isolation fort."
 MON.21.a:0 "Die Beute wird nicht mit ihnen geteilt"
 MON.22.t:0 "Mongolei schlägt Teilung der Warlords vor"
 MON.22.d:0 "Aufgrund der zunehmenden mongolischen Einmischung in die chinesische Politik schlug die mongolische Regierung eine Teilung der Shanxi- und Ma-Cliquen vor. Sie beanspruchte die Provinzen der Inneren Mongolei und überließ den Rest unserem Ermessen. Sollen wir diese Gebiete im Gegenzug für politische und militärische Unterstützung gegen die Kriegsherren opfern?"
 MON.22.a:0 "Diese kleinen Zuchtmeister werden sich uns beiden nicht widersetzen."
 MON.22.b:0 "Wir können sie selbst erledigen"
 MON.23.t:0 "VR China genehmigt"
 MON.23.d:0 "Maos Regierung hat sich bereit erklärt, an der Unterwerfung der Kriegsherren teilzunehmen"
 MON.23.a:0 "Kluge Entscheidung"
 MON.24.t:0 "Die VR China lehnt ab"
 MON.24.d:0 "Aus irgendeinem Grund weigerte sich Maos Regierung, gemeinsam gegen Cliquen zu kämpfen"
 MON.24.a:0 "Besorgniserregende Entwicklung"
 MON.25.t:0 "Forderungen der Kommunisten!"
 MON.25.d:0 "Die kommunistischen Regime der Mongolei und Chinas fordern unser Land und behaupten, sie seien die rechtmäßigen Eigentümer unseres Landes."
 MON.25.a:0 "Wir können nicht widerstehen"
 MON.25.b:0 "Es gibt keine Möglichkeit, uns zu unterwerfen"
 MON.26.t:0 "Forderungen der Kommunisten!"
 MON.26.d:0 "Die kommunistischen Regime der Mongolei und Chinas fordern unser Land und behaupten, sie seien die rechtmäßigen Eigentümer unseres Landes."
 MON.26.a:0 "Wir können nicht widerstehen"
 MON.26.b:0 "Es gibt keine Möglichkeit, uns zu unterwerfen"
 MON.27.t:0 "Kriegsherr bleibt stur"
 MON.27.d:0 "Die Clique von [From.GetName] hat unser Ultimatum abgelehnt"
 MON.28.t:0 "Warlord foldet"
 MON.28.d:0 "Die Clique von [From.GetName] hat sich unseren Forderungen ergeben"
 MON.28.a:0 "Ein toller Tag!"
 MON.27.a:0 "Dann ist es Krieg"
 MON.29.t:0 "Sesshaftwerdung?"
 MON.29.d:0 "Unser Landwirtschaftsprojekt verläuft fast planmäßig, doch viele Nomaden weigern sich noch immer, ihre alten Gewohnheiten aufzugeben und sesshaft zu werden. Wir können das einfach ignorieren, aber indem wir die verbleibenden Nomaden zur Sesshaftigkeit zwingen und Teile ihrer Weiden beschlagnahmen, können wir die Entwicklung der Landwirtschaft beschleunigen."
 MON.29.a:0 "Führen Sie eine Sesshaftigkeit durch!"
 MON.29.b:0 "Lass sie sein"
 MON.30.t:0 "Verlangsamung des Bergbauprogramms"
 MON.30.d:0 "Das Bergbauprogramm läuft, doch Arbeitskräftemangel und mangelnde Kommunikation bremsen die Entwicklung. Unsere Minister schlagen verschiedene Lösungsansätze vor."
 MON.30.a:0 "Wir können nicht mehr Geld dafür ausgeben"
 MON.30.b:0 "Einheimische zur Teilnahme zwingen"
 MON.30.c:0 "Chinesische Migranten zur Teilnahme zwingen"
 MON.30.dd:0 "Laden Sie private Investoren ein"
 MON.31.t:0 "Bergbauprogramm abgeschlossen"
 MON.31.d:0 "Nach viel Mühe haben wir unser Bergbauprogramm endlich abgeschlossen und können nun die Früchte unserer Arbeit genießen."
 MON.31.a:0 "Endlich!"
 MON.32.t:0 "Am RFP-Krieg teilnehmen?"
 MON.32.d:0 "Unsere Kameraden von der RFP haben die Unterstützung des Mandschu-Kaisers gewonnen und ihren Kreuzzug gegen die Bolschewiken begonnen! Sie mögen zu radikal sein, aber es könnte unsere einzige Chance sein, die Rote Pest zu besiegen."
 MON.32.a:0 "Zu den Waffen!"
 MON.32.b:0 "Es ist zu gefährlich ..."
 MON.33.t:0 "Chinesische Migranten bringen ihre Ideologie mit"
 MON.33.d:0 "Während die meisten chinesischen Migranten einfache Leute sind, gibt es auch einige politisch bewusste Anhänger der Demokratie, die ihre „Reformclubs“ gründen und ihre Ideen verbreiten."
 MON.33.a:0 "Lass sie in Ruhe"
 MON.33.b:0 "Säubern Sie sie!"
 MON.34.t:0 "Chinesische Migranten bringen ihre Ideologie mit"
 MON.34.d:0 "Während die meisten chinesischen Migranten einfache Leute sind, gibt es auch einige politisch bewusste Anhänger des Kommunismus, die ihre „Reformclubs“ gründen und ihre Ideen verbreiten."
 MON.34.a:0 "Lass sie in Ruhe"
 MON.34.b:0 "Säubern Sie sie!"
 MON.35.t:0 "Japanische Spione infiltrieren"
 MON.35.d:0 "Während die meisten chinesischen Migranten einfache Leute sind, haben sich vor kurzem einige japanische Propagandisten unter ihnen versteckt und bilden nun panmongolische Ringe, um ihre Ideen zu verbreiten."
 MON.35.a:0 "Lass sie in Ruhe"
 MON.35.b:0 "Säubern Sie sie!"
 MON.36.t:0 "Chinesische Unternehmer"
 MON.36.d:0 "Die meisten chinesischen Migranten in unserem Land sind Bauern und Handwerker, doch vor kurzem haben einige mittelständische Unternehmer aus China beschlossen, ihre Geschäfte an einen sichereren Ort zu verlagern und einige neue Niederlassungen in unserem Land zu gründen."
 MON.36.a:0 "Freier Markt ist Macht"
 MON.37.t:0 "Suiyuan-Offensive"
 MON.37.d:0 "Während China unter inneren Unruhen leidet, schlagen unsere japanischen Berater vor, dass es an der Zeit ist, zuzuschlagen und unsere Ziele durch die Einnahme der Provinz Suiyuan zu erreichen. Mit ihrer Hilfe scheint dieses Ziel durchaus erreichbar."
 MON.37.a:0 "Wir werden das mongolische Volk wieder vereinen!"
 MON.37.b:0 "Es ist besser, das zu bewahren, was wir haben"
 
 MON.40.t:0 "Provisorische Regierung!"
 MON.40.d:0 "Truppen von Adligen und Geistlichen sowie die unzufriedene Bevölkerung stürmten den Regierungspalast, während ihre Sympathisanten im Militär bei der Entwaffnung der Hauptstadtgarnison halfen. Während der neu gebildeten Staatsversammlung wurde der berühmte Lama, ehemalige Premierminister des Bogd-Khanats und kompromissbereite Persönlichkeit Sambadondogiin Tserendorj zum obersten Herrscher der Mongolei ernannt, bis die Frage des neuen Regierungssystems geklärt sei. Die nächsten Entscheidungen der provisorischen Regierung werden die Gestalt und das Schicksal unseres Landes für die kommenden Jahre prägen."
 MON.40.a:0 "Wir werden unsere Identität mit allen Mitteln verteidigen"
 MON.41.t:0 "Referendum!"
 MON.41.d:0 "Unter dem Druck der Mongolei muss unsere Regierung ein landesweites Referendum über den Beitritt zu ihrem Staat zulassen."
 MON.41.a:0 "Endlich werden die Brudervölker vereint sein!"
 MON.41.b:0 "Das Volk der Tuwiner hat sein eigenes Schicksal"
 MON.42.t:0 "Tuwinisches Referendum erfolgreich!"
 MON.42.d:0 "Die Tuwiner haben abgestimmt und beschlossen, sich uns endlich wieder anzuschließen!"
 MON.42.a:0 "Endlich!"
 MON.43.t:0 "Tuwinisches Referendum gescheitert!"
 MON.43.d:0 "Das tuwinische Volk stimmte ab und entschied sich für die Beibehaltung seiner Unabhängigkeit."
 MON.43.a:0 "Es ist ihre Entscheidung"
 MON.43.b:0 "Wir müssen die Stimmen neu auszählen... unter Aufsicht unserer Truppen"
 MON.44.t:0 "Ein Coup!"
 MON.44.d:0 "Weißrussische Kosaken, die jahrelang in unserer Armee dienten, haben gegen uns rebelliert! Die Palastwache hat sich ergeben, und [SIK.GetLeader] hat nun keine andere Wahl als abzudanken. Es mag wie ein weiterer Akt der Kriegsherrschaft aussehen, aber für uns ist klar, dass es von Semjonows Regime in der Mongolei inspiriert wurde."
 MON.44.a:0 "Verdammt!"
 MON.45.t:0 "Ein Putschversuch"
 MON.45.d:0 "Weißrussische Kosaken, die jahrelang in unserer Armee dienten, haben gegen uns rebelliert! Die Palastwache konnte den ersten Angriff auf die Residenz von [SIK.GetLeader] abwehren, und die verbleibenden Rebellen sind nun über das ganze Land verstreut. Es mag wie ein weiterer Akt der Kriegsherrschaft aussehen, aber für uns ist klar, dass der Angriff von Semjonows Regime in der Mongolei inspiriert wurde."
 MON.45.a:0 "Das war knapp"
 MON.46.t:0 "Bündnis mit der Mongolei?"
 MON.46.d:0 "Nach dem Niedergang der Vereinigten Front und den demokratischen Veränderungen in der Mongolei unterbreitete uns die Regierung einen Vorschlag: Sie will im Gegenzug für die Anerkennung ihrer Unabhängigkeit ein neues Bündnis gegen kommunistische Banditen und Japaner gründen."
 MON.46.a:0 "Es ist besser, sie als Verbündete zu haben"
 MON.46.a:0 "Nein, die Mongolei ist immer noch unser Land"
 MON.47.t:0 "China hat unseren Vorschlag angenommen"
 MON.47.d:0 "Die chinesische Regierung erkannte schließlich unsere Unabhängigkeit an und unterzeichnete einen offiziellen Freundschaftspakt."
 MON.47.a:0 "Schöner Tag!"
 MON.48.t:0 "China lehnte ab"
 MON.48.d:0 "Die chinesische Regierung weigerte sich, unsere Unabhängigkeit anzuerkennen und setzte ihre Isolation fort."
 MON.48.a:0 "Es ist ihre Entscheidung"
 MON.50.t:0 "Joint Ventures"
 MON.50.d:0 "Wir haben mehrere Verbindungen zu chinesischen Geschäftsleuten und öffentlichen Auftragnehmern aufgebaut und müssen nun entscheiden, welche Richtung unsere Priorität sein wird."
 MON.50.a:0 "Militärindustrie"
 MON.50.b:0 "Zivilindustrie"
 MON.51.t:0 "Bürgerkrieg!"
 MON.51.d:0 "Trotz all unserer Bemühungen ist es den konterrevolutionären Kräften gelungen, sich im Ausland neu zu formieren, und nun überqueren Banden von Aufständischen unsere Grenzen und entfachen immer mehr antisowjetische Aufstände."
 MON.51.a:0 "Zu den Waffen, Kameraden!"
 MON.52.t:0 "Wahlen von [GetYear]"
 MON.52.d:0 "Nach der Legalisierung der Oppositionsparteien und der Ausrufung allgemeiner Wahlen veränderte sich die politische Landschaft der Mongolei drastisch. Die derzeit regierende kommunistische Partei hat sich in zwei große Fraktionen gespalten: den liberaleren und prodemokratischeren Flügel unter der Führung des derzeitigen Staatschefs Anandyn Amar und den überzeugten stalinistischen Flügel unter Amars erbittertem Rivalen Chorloogiin Tschoibalsan, der die „bürgerlichen“ Wahlen boykottierte. Auf der anderen Seite gibt es die neu gegründete Ad-hoc-Koalition der Demokratischen Union unter Führung des ehemaligen Burnazkom-Vorsitzenden Jamsrangiin Tseveen, der auf einer sofortigen und vollständigen Demokratisierung nach westlichem Vorbild besteht. Beide Kandidaten versprechen zwar ein Ende der Einparteienherrschaft und der durch die bolschewistische Politik bedingten Isolation, doch ihre Programme unterscheiden sich etwas."
 MON.52.a:0 "Koalition erringt Mehrheit"
 MON.52.b:0 "Anandyn Amar bleibt als demokratisch gewählter Präsident an der Macht"
 MON.53.t:0 "Wahlen von [GetYear]"
 MON.53.d:0 "Jamsrangiin Tseveen führte das Land durch den gesamten Prozess der Demokratisierung und Entsowjetisierung, doch gegen Ende seiner Amtszeit wurde deutlich, dass die breite Koalition demokratischer Kräfte ihre Integrität nicht mehr bewahren konnte. Kurz nach Ende seiner Amtszeit trat Tseveen aus der Politik zurück, da er die Parteieinheit nicht wahren konnte und gesundheitliche Probleme auftraten, was schließlich zur Spaltung der DUC führte. Vor den Neuwahlen bildeten sich zwei neue Machtgruppen: die konservative Republikanische Partei und die nationalliberale Mutterlandspartei, beide angeführt von prominenten Schriftstellern und Kulturaktivisten, die bereits zu Leuchttürmen des neuen republikanischen Gedankenguts geworden sind."
 MON.53.a:0 "Byambyn Rinchen und Konservative werden unsere Identität bewahren"
 MON.53.b:0 "Dashdorjiin Natsagdorj und Liberale werden uns in die Zukunft führen"
 MON.53.c:0 "Khorloogiin Choibalsan und das Militär sind dem Marxismus treu geblieben und haben den Putsch durchgeführt!"
 MON.54.t:0 "Die Mongolei fordert Ginggan"
 MON.54.d:0 "[From.GetName] erhebt den Anspruch, dass Hinggan das ethnische Land der Mongolen sei, und fordert dieses Gebiet von uns."
 MON.54.a:0 "Wir glauben nicht an einen weiteren Krieg"
 MON.54.b:0 "Hinggan gehört uns!"
 MON.55.t:0 "[From.GetName] abgelehnt"
 MON.55.d:0 "Die Regierung von [From.GetName] hat sich geweigert, Hinggan an uns abzutreten."
 MON.55.a:0 "Dann ist es Krieg"
 MON.55.b:0 "Wir müssen es schlucken"
 MON.56.t:0 "Hinggan abgetreten"
 MON.56.d:0 "Die Regierung von [From.GetName] hat der Vereinigung von Hinggan mit einem richtigen mongolischen Staat zugestimmt."
 MON.56.a:0 "Ein großartiger Tag für die gesamte mongolische Nation"
 MON.57.t:0 "Mongolische Expansion"
 MON.57.d:0 "Unsere Revolutionsgenossen aus [From.GetName] haben die internen Unruhen endlich überwunden und beginnen mit der Planung ihrer Außenpolitik. Wir haben weiterhin erheblichen Einfluss auf sie und können daher über das Wichtigste entscheiden – ob sie ihre Interessen in der Inneren Mongolei verfolgen dürfen. Einerseits mag es nützlich sein, unseren Einfluss auf Teile des chinesischen Territoriums auszudehnen, andererseits bedeutet dies eine Billigung panmongolischer und nationalistischer Ideen."
 MON.57.a:0 "Wir müssen die Revolution exportieren"
 MON.57.b:0 "Es ist besser, die Ostflanke friedlich zu halten"
 MON.58.t:0 "Sowjetische Akzeptanz"
 MON.58.d:0 "[SOV.GetLeader] hat unseren Expansionsplänen zugestimmt und ihre zukünftige Umsetzung gestattet."
 MON.58.a:0 "Für die Volksrevolution!"
 MON.59.t:0 "Sowjetische Ablehnung"
 MON.59.d:0 "[SOV.GetLeader] hat unsere Expansionspläne als „kriminell nationalistisch“ kritisiert und jegliche Beteiligung an ihrer Umsetzung untersagt."
 MON.59.a:0 "Vielleicht ist es einfach noch nicht der richtige Zeitpunkt"
 MON.60.t:0 "Hauptstadt umbenennen?"
 MON.60.d:0 "Seit dem Ende des prosowjetischen Regimes ist einige Zeit vergangen, doch der Name unserer Hauptstadt trägt immer noch kommunistische Assoziationen und bedeutet „Roter Held“. Einige Parlamentsmitglieder haben vorgeschlagen, die Hauptstadt umzubenennen, um sie der neuen Realität besser anzupassen."
 MON.60.a:0 "Niĭslel Khüree – „Das Hauptstadtkloster“, passend zu unserer gesegneten Regierung"
 MON.60.b:0 "Urga – „Der Palast“ – neutraler und international bekannter Name "
 MON.60.c:0 "Baatar Khot – „Heldenstadt“ – ursprünglicher republikanischer Name"
 MON.60.dd:0 "Der Name bleibt"
 MON.61.t:0 "Wahlen von [GetYear]"
 MON.61.d:0 "Anandyn Amar hat es geschafft, sich trotz Pluralisierung und Spaltung der MAN nicht nur an der Macht zu halten, sondern auch ein hohes Maß an Stabilität und Zufriedenheit mit seiner Regierung zu bewahren. Er genießt noch immer genügend Unterstützung für seine letzte Amtszeit, doch die Koalition der Demokratischen Union unter Byambyn Rinchen, der nun Tseveen ablöst, fordert ihn erneut heraus. Sie behauptet, die von Amar vorgeschlagene „Übergangsphase“ sei damit beendet und mache Platz für neue demokratische Kräfte."
 MON.61.a:0 "Amar bleibt für eine weitere Amtszeit"
 MON.61.b:0 "Byambyn Rinchen führt DUC zum Sieg"
 MON.62.t:0 "Umbenennung der Hauptstadt von Khalkha?"
 MON.62.d:0 "Schließlich haben chinesische Truppen diese rebellierende Kleinregierung vernichtet, die gesamte Region Khalcha ist wieder unter chinesische Kontrolle gelangt. Wir müssen die schmutzige Spur dieser russischen Marionette beseitigen. Der erste Schritt ist die Benennung der Hauptstadt von Khalcha."
 MON.62.a:0 "Khuree – „Das Hauptkloster“, der alte Name dieser Stadt aus der Qing-Dynastie."
 MON.62.b:0 "Baatar Khot – „Heldenstadt“ – ursprünglicher Name im mongolischen Stil"
 MON.62.dd:0 "Der Name bleibt"
 MON_news.1.t:0 "Putsch in Sinkiang"
 MON_news.1.d:0 "Russische Emigranten, die in Sinkiangs Armee gedient hatten, rebellierten gegen ihn. Nach einigen Gefechten mit Loyalisten bildeten sie eine neue Regierung, die hauptsächlich aus ehemaligen Semiretschje-Kosaken bestand, und riefen den unabhängigen Staat Ostturkestan aus. Tatsächlich ist ihre Politik jedoch stark von der Mongolei beeinflusst, wo Ataman Semjonow auf ähnliche Weise an die Macht kam."
 MON_news.1.a:0 "Die weiße Bewegung gewinnt an Boden"
 MON_news.2.t:0 "Putschversuch in Sinkiang"
 MON_news.2.d:0 "Russische Emigranten, die in Sinkiangs Gouverneursarmee gedient hatten, rebellierten gegen ihn. Nach einigen Gefechten mit Loyalisten wurden sie zurückgeschlagen und anschließend vollständig vernichtend geschlagen. Einige Experten gehen davon aus, dass es sich nicht nur um einen ethnischen Aufstand oder einen Akt der Kriegsherrschaft handelte, sondern um ein geplantes Komplott, das von Agenten der russisch geführten Mongolei inspiriert wurde."
 MON_news.2.a:0 "Asien ist instabil"
 MON_news.3.t:0 "Suiyuan-Kampagne"
 MON_news.3.d:0 "Die Armee projapanischer mongolischer Kriegsherren hat kürzlich die Grenze nahe der Stadt Hongort in der Provinz Suiyuan überschritten. Japan bestreitet offiziell seine Beteiligung, doch es ist offensichtlich, dass der Angriff von Japan inspiriert und organisiert wurde. Seit 1931 lieferten sich japanische Streitkräfte zahlreiche Scharmützel mit Chinesen, doch dieser Konflikt könnte bei einer Eskalation einen groß angelegten Krieg auslösen."
 MON_news.3.a:0 "Der Krieg braut sich zusammen"
 MON_news.4.t:0 "Suiyuan-Offensive erfolgreich"
 MON_news.4.d:0 "Nach wochenlangen Kämpfen gelang es den Mengjiang-Truppen unter Demchugdongrub, die Shanxi-Miliz zurückzudrängen und die Kontrolle über Hongort und die umliegenden Gebiete zu erlangen. Beide Seiten beschlossen, den Konflikt nicht zu eskalieren und unterzeichneten einen von Japan überwachten Waffenstillstand, der die Provinz Suiyuan an Mengjiang abtrat."
 MON_news.4.a:0 "Eine weitere Niederlage Chinas"
 MON_news.5.t:0 "Suiyuan-Offensive scheitert"
 MON_news.5.d:0 "Nach wochenlangen Kämpfen wurden die Mengjiang-Truppen unter Demchugdongrub von der Shanxi-Miliz zurückgeschlagen. Beide Seiten beschlossen, den Konflikt nicht zu eskalieren und unterzeichneten einen von Japan überwachten Waffenstillstand, der den Status quo bekräftigte."
 MON_news.5.a:0 "Wird es Japan aufhalten?"

 MONCLN.2.t:0 "Schicksal von Tschoibalsan"
 MONCLN.2.d:0 "Wir haben die kommunistische Regierung gestürzt, aber das alte Militär ist immer noch da. Der bedrohlichste General ist Tschoibalsan, einer der Gründer der MAN und skrupelloser Verschwörer. Wir können ihn für seine Verbrechen während der Revolution als Staatsfeind vor Gericht stellen, aber seine militärische Expertise könnte immer noch wertvoll sein."
 MONCLN.2.a:0 "Säubert ihn!"
 MONCLN.2.b:0 "Wir brauchen qualifizierte Offiziere"
 MONCLN.3.t:0 "Schicksal von Bogd Khan"
 MONCLN.3.d:0 "Bevor unsere derzeitige Regierung an die Macht kam, gelang es Restaurationisten, die junge Reinkarnation Bogd Khans auf den Thron zu bringen. Jetzt müssen wir entscheiden, was wir mit ihm machen."
 MONCLN.3.a:0 "Machen Sie ihn zum normalen Bürger"
 MONCLN.3.b:0 "Beschränken Sie seine Macht und proklamieren Sie die konstitutionelle Monarchie"
 MONCLN.3.c:0 "Setzt ihn ab. [MON.GetLeader] ist der einzige oberste Führer der Mongolei!"
 MONCLN.3.dd:0 "Lass ihn als Symbol."
 MONCLN.4.t:0 "Qinghai integriert"
 MONCLN.4.d:0 "Ma Hongbin hat als Gouverneur gute Dienste geleistet, doch nun ist es an der Zeit, seine Provinz vollständig zu integrieren."
 MONCLN.4.a:0 "OK"
 MONCLN.5.t:0 "Mengjiang integriert"
 MONCLN.5.d:0 "Wir waren vorher nicht in der Lage, unsere Union mit der Inneren Mongolei zu formalisieren, aber jetzt, da der Krieg vorbei ist, können wir sie endlich integrieren."
 MONCLN.5.a:0 "Endlich"

 MONBW.1.t:0 "Mongolische Chance"
 MONBW.1.d:0 "Wieder einmal sind die mongolischen Separatisten schutzlos und verwundbar, nachdem sie von den Sowjets im Stich gelassen wurden. Während die Lage auf dem chinesischen Festland weiterhin unsicher ist, können wir diese Gelegenheit nutzen und die Äußere Mongolei zum Wohle der Integrität der Republik und unserer eigenen Macht zurückerobern."
 MONBW.1.a:0 "Senden Sie die Expedition"
 MONBW.1.b:0 "Lasst diese Hirten ihre Weiden behalten"
 
 
 
