 MONGOLIA_GATHERING_STORM_DESC:0 "In den folgenden Jahren wurde der sowjetische Einfluss durch gewaltsame Machtkämpfe immer stärker, und nach dem Tod des Bogda Khan wurde am 26. November 1924 die Mongolische Volksrepublik ausgerufen. Gemäß der Verfassung der Mongolischen Volksrepublik vom 26. November 1924 übernahm die Regierung nach dem Tod des Bogda Khans die Kontrolle über sein Land. Bedrohungen aus dem Osten und Süden bahnten sich an. Kann das neue Land alle Schwierigkeiten überwinden und einer besseren Zukunft entgegengehen?"
 MONGOLIA_BLITZKRIEG_DESC:0 "Nach dem Konflikt mit Japan an der Ostgrenze war das Schicksal der Mongolei eng mit dem der Sowjetunion verknüpft. Obwohl China im Süden vom erbitterten Krieg gegen Japan heimgesucht wurde, vergaß es seine Souveränität über Kalkha nicht, und das Rad des Schicksals begann sich erneut zu drehen."
