l_german:


 malaya_irredenta:0 "Malaya Irredenta"

  PHI_post_indenpence_stabilization:0 "Stabilisierung nach der Unabhängigkeit"
  PHI_post_indenpence_stabilization_desc:0 "Die politische Landschaft unseres Landes ist chaotisch geworden; faschistische, kommunistische und demokratische Parteien konkurrieren um die Macht. Es ist Zeit, dem ein Ende zu setzen und mit dem Aufbau eines neuen Philippinen zu beginnen."
  PHI_a_new_regime:0 "Ein neues Regime"
  PHI_a_new_regime_desc:0 "Wir haben uns entschieden, den autoritären Ideologien des Westens zu folgen."
  PHI_fighting_filipinos:0 "Kämpfende Filipinos"
  PHI_fighting_filipinos_desc:0 "Einige unserer Minister haben vorgeschlagen, eine neue militärische Propagandakampagne mit dem Titel „Die kämpfenden Filipinos“ zu starten. Wir sollten sie umgehend umsetzen."
  PHI_filipino_irrdentism:0 "Philippinischer Irrdentismus"
  PHI_filipino_irrdentism_desc:0 "Da die Unterstützung für unsere Ideologie und unser Militär stark zugenommen hat, sind die Menschen nun bereit, sich das, was uns gehört, zur rechten Zeit zurückzuholen."
  PHI_support_the_ganap_party:0 "Unterstützen Sie die Ganap-Party"
  PHI_support_the_ganap_party_desc:0 "Wenn wir die Ganap-Partei unterstützen, verspricht sie uns ein stärker vereintes Philippinen mit größerer Transparenz in der Regierung."
  PHI_huk_revolutionaries:0 "Huk-Revolutionäre"
  PHI_huk_revolutionaries_desc:0 "Derzeit terrorisieren kommunistische Revolutionäre unser Volk, aber wenn man ihnen mehr Autonomie und Macht im Kongress gäbe, könnte sich die Lage ändern."
  PHI_ideological_fanaticism2:0 "Ideologischer Fanatismus"
  PHI_ideological_fanaticism2_desc:0 "Wenn wir eine eifrige Bevölkerung haben, wird sie die Inseln bis zum letzten Mann verteidigen."
  PHI_japanese_trade_mission:0 "Japanische Handelsmission"
  PHI_japanese_trade_mission_desc:0 "Wir sollten die Unterstützung anderer faschistischer Nationen gewinnen; eine Handelsmission nach Japan würde die Beziehungen erheblich verbessern."
  PHI_soviet_trade_mission:0 "Sowjetische Handelsmission"
  PHI_soviet_trade_mission_desc:0 "Wir sind die einzigen in Südostasien, die die sozialistische Sache hochhalten. Um unsere neu gewonnene Unabhängigkeit zu sichern, müssen wir die Unterstützung der Sowjets gewinnen."
  PHI_militarized_police:0 "Philippinische Polizei"
  PHI_militarized_police_desc:0 "Die neu gegründete philippinische Polizei wird alle Unruhen und diejenigen unterdrücken, die sich gegen die Regierung aussprechen."
  PHI_may_2nd_uprising:0 "Der Aufstand vom 2. Mai"
  PHI_may_2nd_uprising_desc:0 "Die Zeit ist gekommen, Brüder! Heute wird der Sakdalista auferstehen!"
  PHI_hukbalap_rebellion:0 "Hukbalap-Rebellion"
  PHI_hukbalap_rebellion_desc:0 "Dank der der Hukbalahap gewährten Autonomie war es ihnen möglich, eine große kommunistische Armee aufzustellen, um die Regierung zu stürzen!"
  PHI_peace_keeping_youth:0 "Sangguniang Pangkabataan"
  PHI_peace_keeping_youth_desc:0 "Durch die Gründung des Sangguniang Pangkabataan (Jugendrat) geben wir der jüngeren Generation die Möglichkeit, an den demokratischen Prozessen unserer neuen Regierung teilzunehmen und ihre Rebellion zu verhindern."
  PHI_covert_NKVD_operations:0 "Verdeckte NKWD-Operationen"
  PHI_covert_NKVD_operations_desc:0 "Die Sowjets sind nur dann bereit, den NKWD zur Ausmerzung der gesamten politischen Opposition im Land einzusetzen, wenn wir es ihnen erlauben ..."
  PHI_greater_philippines_concept:0 "Das Konzept der Großphilippinen"
  PHI_greater_philippines_concept_desc:0 "Seit jeher besaßen unsere Sultane, Rajas und Häuptlinge alle Inseln nördlich des Äquators in dieser Region. Wir werden den Staat Sabah und die ehemaligen Generalkapitänsinseln der Philippinen für uns beanspruchen, um die historischen Fehler zu korrigieren, die unsere Kolonialherren uns angetan haben."
  PHI_demand_guam:0 "Guam-Referendum"
  PHI_demand_guam_desc:0 "Wir können unseren Geheimdienst und unsere Spezialeinheiten nutzen, um auf den Guam-Inseln ein Referendum zu veranstalten, um unsere Annexion rechtmäßig zu akzeptieren."
  PHI_demand_spanish_captaincy_general_islands:0 "Spanische Kapitänsbinde General Islands"
  PHI_demand_spanish_captaincy_general_islands_desc:0 "So wie die Spanier über diese Inseln herrschten, werden auch wir dies tun! Wir werden unsere Geheimoperationen auf diesen Inseln fortsetzen und intensivieren, bis sie uns gehören!"
  PHI_demand_sabah:0 "Besetzen Sie Sabah"
  PHI_demand_sabah_desc:0 "Während den Briten in Europa und Afrika die Hände auf den Rücken gebunden sind, können wir Sabah seinen rechtmäßigen Besitzern zurückgeben: dem Sultan von Sulu und dem philippinischen Volk."
  PHI_island_infrastrcture:0 "Inselinfrastruktur"
  PHI_island_infrastrcture_desc:0 "Die früheren Eigentümer unserer neuen Ländereien haben die Infrastruktur und die Menschen vernachlässigt. Um mit der Industrialisierung zu beginnen, müssen wir die Entwicklung in unseren Städten und auf dem Land vorantreiben."
  PHI_island_industry:0 "Inselindustrie"
  PHI_island_industry_desc:0 "Unsere einheimischen Industrien, die auf Landwirtschaft, Fischerei und Metallurgie basieren, werden das Rückgrat unserer Industrialisierung bilden."
  PHI_greater_philippines_established:0 "Die Großphilippinen sind wiederhergestellt"
  PHI_greater_philippines_established_desc:0 "Wir haben endlich zurückerobert, was uns genommen wurde! Wir können nun in ein Zeitalter des Friedens und des Wohlstands eintreten."
  PHI_follow_the_american_way:0 "Folgen Sie dem amerikanischen Weg"
  PHI_follow_the_american_way_desc:0 "Die Amerikaner haben uns Freiheit, Unabhängigkeit und Demokratie gelehrt. Wir müssen diesen Weg weiter beschreiten, um unsere neu gewonnene Unabhängigkeit zu sichern."
  PHI_elect_new_congressmen:0 "Wählen Sie neue Kongressabgeordnete"
  PHI_elect_new_congressmen_desc:0 "Wir werden Neuwahlen ausrufen, um die Kongressabgeordneten der vorherigen Kolonialregierung durch neue Führer zu ersetzen, die nur dem philippinischen Volk gegenüber verantwortlich sind."
  PHI_european_intervention:0 "Europäische Intervention"
  PHI_european_intervention_desc:0 "Als erste Demokratie in Asien ist es unsere Pflicht, die Bestrebungen aller zu unterstützen und zu verteidigen, die sich von allen Formen der Knechtschaft unabhängig machen wollen, selbst wenn es sich dabei um unsere ehemaligen Peiniger handelt."
  PHI_ally_funded_development:0 "Alliierte Investitionen"
  PHI_ally_funded_development_desc:0 "Aufgrund unserer Bemühungen in Europa senden uns die Alliierten nun Spenden und Hilfe, um die Entwicklung unseres Heimatlandes zu unterstützen."
  PHI_the_filipino_corridor:0 "Der philippinische Korridor"
  PHI_the_filipino_corridor_desc:0 "Die Alliierten brauchen einen Ausgangspunkt für die Invasion Japans. Die Philippinen sind der perfekte Ort."
  PHI_worldwide_intervention:0 "Weltweite Intervention"
  PHI_worldwide_intervention_desc:0 "Der Krieg breitet sich weltweit aus und immer mehr freie Nationen benötigen unsere Hilfe. Die erste Demokratie Asiens wird mehr denn je benötigt, um die Ideale von Freiheit und Unabhängigkeit zu verteidigen."
  PHI_fascist_defense:0 "Faschistische Verteidigung"
  PHI_fascist_defense_desc:0 "Die Inseln sind einer japanischen Invasion ausgesetzt. Wir müssen Land- und Seebefestigungen errichten, um diese Bedrohung zu neutralisieren."
  PHI_accept_refugees:0 "Flüchtlinge aufnehmen"
  PHI_accept_refugees_desc:0 "Aufgrund der bewaffneten Konflikte in Asien suchen viele Menschen einen sicheren Ort, verfügen aber nicht über die nötigen Transportmittel. Wir werden diese Flüchtlinge auf unseren Inseln willkommen heißen und ihnen einen sicheren Zugang ermöglichen."
  PHI_refugee_voluteers:0 "Freiwillige Flüchtlinge"
  PHI_refugee_voluteers_desc:0 "Viele Flüchtlinge möchten sich bei uns dafür revanchieren, dass wir ihnen den Aufenthalt in unserem Land ermöglichen. Wir werden weitere Freiwilligeneinheiten bilden und ihren bewaffneten Kampf unterstützen."
  PHI_bring_democracy_to_japan:0 "Bringen Sie Demokratie nach Japan"
  PHI_bring_democracy_to_japan_desc:0 "Es ist an der Zeit, dass wir gegen die imperialistische Bedrohung Japan in die Offensive gehen."
  PHI_the_industrialized_islands_plan:0 "Industrialisierter Inselplan"
  PHI_the_industrialized_islands_plan_desc:0 "Unsere einheimischen Industrien konnten uns nur bis hierher bringen. Wenn wir als Nation vorankommen wollen, müssen wir unsere industrielle Entwicklung intensivieren."
  PHI_urbanize_the_islands:0 "Urbanisieren Sie die Inseln"
  PHI_urbanize_the_islands_desc:0 "Die geografische Lage unseres Archipels erlaubt es nicht, große Landstriche als landwirtschaftliche, industrielle oder gewerbliche Flächen zu nutzen. Um massive Industriesektoren aufzubauen, werden wir die Philippinen in ein kompaktes Industrieutopie verwandeln."
  PHI_manila_central_railway:0 "Hauptbahnhof Manila"
  PHI_manila_central_railway_desc:0 "Nachdem wir die Philippine National Railways wieder aufgebaut haben, ist es an der Zeit, alle Städte mit einem Hauptbahnhof zu verbinden."
  PHI_fund_armscor:0 "Fonds Armscor"
  PHI_fund_armscor_desc:0 "Ein gewisser Don Celso Tuason kaufte vor der Unabhängigkeit einen amerikanischen Waffenlieferanten und wandelte ihn in einen philippinischen Waffenhersteller um. Wir werden ihn finanziell unterstützen und ihn zu unserem Partner für die Versorgung unserer Streitkräfte mit Munition und Ausrüstung machen. Außerdem soll er unser wichtigstes Waffenentwicklungsbüro werden."
  PHI_seize_illegal_weapons_manufacturer:0 "Beschlagnahmung illegaler Waffenfabriken"
  PHI_seize_illegal_weapons_manufacturer_desc:0 "Die Guerillas haben für sich illegale Waffenfabriken errichtet, aber wir können sie übernehmen und für uns nutzen."
  PHI_national_defence_fund:0 "Nationaler Verteidigungsfonds"
  PHI_national_defence_fund_desc:0 "Wenn wir Geld für einen Nationalen Verteidigungsfonds zurücklegen, können wir damit neue Fabriken und Ausrüstung kaufen."
  PHI_expanded_chromium_mining:0 "Erweiterter Chromabbau"
  PHI_expanded_chromium_mining_desc:0 "Auf den Inseln wird seit jeher Chrom in geringen Mengen abgebaut, doch Geologen entdeckten kürzlich auf der Insel Mindanao ein großes Chromvorkommen. Es ist an der Zeit, dass wir unsere Bergbauindustrie ausbauen und diese Chance zu unserem eigenen Vorteil nutzen."
  PHI_develop_palawan:0 "Palawan entwickeln"
  PHI_develop_palawan_desc:0 "Die dünn besiedelte Insel Palawan verfügt über große Flächen unbebauten Landes, die bebaut werden können, und eine gute Küstenlinie für den Bau von Häfen. Die Insel hat großes Potenzial, sich zu einem befestigten Industriezentrum zu entwickeln."
  PHI_develop_mindano:0 "Mindanao entwickeln"
  PHI_develop_mindano_desc:0 "Das Land der Verheißung ist reich an ungenutzten landwirtschaftlichen, industriellen und menschlichen Ressourcen und bietet reichlich Platz für weitere Industrie. Wir haben hier bereits mehrere Großstädte gegründet, aber diese Insel muss noch weiter ausgebaut werden, um den Bedarf des gesamten Landes decken zu können."
  PHI_additional_research_slot1:0 "Zusätzlicher Forschungsplatz 1"
  PHI_additional_research_slot1_desc:0 "Um technologisch voranzukommen, müssen wir unsere Forschungsprogramme ausbauen, indem wir in mehr Universitäten und Forschungszentren investieren."
  PHI_american_computer_imports:0 "Importieren Sie amerikanische Computer"
  PHI_american_computer_imports_desc:0 "Wir müssen vorhandene Computer untersuchen, um ihr Design durch Reverse Engineering zu verstehen. Nur dann können wir unseren eigenen Computer erstellen."
  PHI_synth_oil:0 "Malampaya Öl- und Gasreserven"
  PHI_synth_oil_desc:0 "Unsere Geologen haben im Malampaya-Schelf vor der Küste Palawans ein riesiges Öl- und Gasvorkommen entdeckt. Wir müssen dieses Vorkommen ausbeuten, wenn wir vom Weltölmarkt unabhängig werden wollen."
  PHI_study_enemy_ciphers:0 "Studieren Sie feindliche Chiffren"
  PHI_study_enemy_ciphers_desc:0 "Fortschritte in der Kryptographie und Kryptoanalyse haben unsere Entschlüsselungsmaschinen überholt. Wir sollten sie untersuchen und neue Maschinen entwickeln."
  PHI_research_new_enegry_options:0 "Philippinisches Atomenergieprogramm"
  PHI_research_new_enegry_options_desc:0 "Die Atomenergie hat sich als die Energie der Zukunft erwiesen. Unsere Wissenschaftler möchten auf diesem Gebiet Pionierarbeit leisten und bitten uns um unsere Unterstützung bei diesem großen wissenschaftlichen Unterfangen."
  PHI_additional_research_slot2:0 "Universität der Philippinen"
  PHI_additional_research_slot2_desc:0 "Wir werden eine Forschungsuniversität gründen, die Wissenschaftler, Arbeiter und Führungskräfte hervorbringt, die unser Land durch wissenschaftliche Forschung und Entwicklung mit einem Gefühl des Nationalstolzes und der Verpflichtung, dem philippinischen Volk zu dienen, verbessern werden."
  PHI_teachings_of_the_usaffe:0 "Lehren der USAFFE"
  PHI_teachings_of_the_usaffe_desc:0 "Die USAFFE (United States Army Forces in the Far East) hatte unsere Armee vor unserer Unabhängigkeit ausgebildet, und daher orientieren sich unsere bestehenden Streitkräfte stark an der amerikanischen Militärstruktur. Wir sollten diese Befehlskette beibehalten und unsere in Amerika ausgebildeten Generäle unsere Militärdoktrin verbessern lassen."
  PHI_defense_of_manila:0 "Die Verteidigung Manilas"
  PHI_defense_of_manila_desc:0 "Wir sind von allen Seiten von Feinden umgeben, sowohl auf unseren Inseln als auch vor unseren Küsten. Schlimmer noch: Unsere Inselgruppe macht eine umfassende Verteidigung nahezu unmöglich. Wir müssen unsere Hauptstadt befestigen, damit unsere Streitkräfte sie um jeden Preis verteidigen können."
  PHI_island_hopping_strategy:0 "Inselhüpfstrategie"
  PHI_island_hopping_strategy_desc:0 "Wenn wir in die Offensive gehen wollen, sollten wir die Inselhopping-Taktiken der Amerikaner und Japaner studieren."
  PHI_american_doctrines:0 "Amerikanische Lehren"
  PHI_american_doctrines_desc:0 "Unsere Armee ist der Nachfolger der USAFFE, daher liegt es in unserem besten Interesse, militärische Übungen und Operationen mit den Amerikanern durchzuführen und die amerikanische Militärtradition aufrechtzuerhalten, die wir bisher praktiziert haben."
  PHI_japanese_doctrines:0 "Japanische Lehren"
  PHI_japanese_doctrines_desc:0 "Die Japaner glaubten an die Vorherrschaft zu Lande und zur See, und diese Doktrin erwies sich als besser als das, was wir bereits haben. Wir sollten dem Pfad der aufgehenden Sonne folgen und den Weg des Kriegers beschreiten."
  PHI_american_imports:0 "Amerikanische Waffenimporte"
  PHI_american_imports_desc:0 "Der Großteil unserer Waffen stammt aus der amerikanischen Vergangenheit. Es liegt in unserem Interesse, unsere Importprogramme auszuweiten und die Amerikaner um bessere und modernere Militärausrüstung zu bitten."
  PHI_lighting_warfare:0 "Lichtkrieg"
  PHI_lighting_warfare_desc:0 "Wir sollten eine echte philippinische Kampfdoktrin entwickeln, die sich optimal zur Verteidigung unseres Landes eignet und sich an den deutschen Blitzkriegen und Inselhopping-Taktiken orientiert. Der Schwerpunkt sollte auf schnellen amphibischen Operationen und der Vorherrschaft zur See liegen."
  PHI_study_european_tanks:0 "Studieren Sie europäische Panzer"
  PHI_study_european_tanks_desc:0 "Der Krieg in Europa war ein großartiges Testfeld für die Panzerfahrzeugtechnologie. Wir sollten unsere eigene Technologie auf der Grundlage der Erfahrungen entwickeln, die wir in diesem Zusammenhang gesammelt haben."
  PHI_create_main_battle_tanks:0 "Priorisieren Sie die Forschung zu mobilen Panzern"
  PHI_create_main_battle_tanks_desc:0 "Das Panzerdesign muss mit der Zeit Schritt halten. Es ist äußerst wichtig, dass wir unsere Panzerfahrzeuge für die Schlachten der Zukunft weiterentwickeln."
  PHI_import_new_howitzers:0 "Neue Haubitzen importieren"
  PHI_import_new_howitzers_desc:0 "Unsere veraltete Artillerie reicht nicht mehr aus. Wir müssen neue Haubitzen importieren."
  PHI_anti_tank_guns:0 "Panzerabwehrkanonen"
  PHI_anti_tank_guns_desc:0 "Um den neuen schweren Panzern entgegentreten zu können, müssen wir unsere eigenen Panzerabwehrkanonen entwickeln."
  PHI_army_modernisation:0 "Modernisierung der Armee"
  PHI_army_modernisation_desc:0 "Krieg und Kampf haben sich seit der Zeit der Katipuneros drastisch verändert. Es ist zwingend erforderlich, dass wir die Streitkräfte der Philippinen modernisieren und auf die Konflikte der Zukunft vorbereiten, sei es hier oder im Ausland."
  PHI_air_base_expansion:0 "Erweiterung des Luftwaffenstützpunkts"
  PHI_air_base_expansion_desc:0 "Wenn wir den Himmel beherrschen wollen, sollten wir zivile und militärische Luftwaffenstützpunkte ausbauen."
  PHI_fighter_modernisation:0 "Modernisierung von Kampfflugzeugen"
  PHI_fighter_modernisation_desc:0 "Unsere alten Kampfflugzeuge aus der Zwischenkriegszeit sind den Kampfflugzeugen von morgen unterlegen."
  PHI_air_innovations:0 "Luftinnovationen"
  PHI_air_innovations_desc:0 "Der Generalstabschef hat dem Kabinett neue Taktiken und Formationen vorgeschlagen. Wir müssen diese neuen Ideen umsetzen, um mit anderen Nationen mithalten zu können."
  PHI_heavy_fighter_concept:0 "Konzept eines schweren Jägers"
  PHI_heavy_fighter_concept_desc:0 "Sollten wir gezwungen sein, in die Offensive zu gehen, brauchen wir einen neuen Typ von Kämpfer, der lange Zeit innerhalb feindlicher Grenzen operieren kann."
  PHI_naval_bomber_experiments:0 "Marinebomber-Experimente"
  PHI_naval_bomber_experiments_desc:0 "Die Lufthoheit ist auf See ebenso wichtig wie über Land. Spezialflugzeuge, die für die Seekriegsführung entwickelt wurden, sind ein Mittel, dieses Ziel zu erreichen."
  PHI_medium_bomber_focus:0 "Fokus auf mittleren Bomber"
  PHI_medium_bomber_focus_desc:0 "Eine Erweiterung der Präzisionsbombenphilosophie, angepasst für eine größere Reichweite zur Verwendung in unterstützenden Rollen."
  PHI_light_bomber_focus:0 "Fokus auf leichten Bomber"
  PHI_light_bomber_focus_desc:0 "Der Wert des Einsatzes von Sturzkampfbombern zur Luftnahunterstützung sollte nicht unterschätzt werden."
  PHI_air_modernisations_program:0 "Luftmodernisierungsprogramm"
  PHI_air_modernisations_program_desc:0 "Die Flugtheorie ist ebenso wichtig wie die Technologie. Es warten immer noch neue Strategien für unsere Piloten darauf, entdeckt zu werden."
  PHI_rocket_development:0 "Raketenentwicklung"
  PHI_rocket_development_desc:0 "Geschwindigkeit ist die Eigenschaft, auf der alle anderen Eigenschaften der Luftfahrt beruhen. Raketen- und Düsentriebwerke könnten es uns theoretisch ermöglichen, alle bisherigen Grenzen zu überschreiten."
  PHI_shipyard_expansion:0 "Erweiterung der Werft"
  PHI_shipyard_expansion_desc:0 "Als Inselstaat brauchen wir eine starke Schiffsbauindustrie, um unseren Platz im Meer zu sichern."
  PHI_license_foreign_ships:0 "Lizenz für ausländische Schiffe"
  PHI_license_foreign_ships_desc:0 "Unsere Nachbarn entwickeln ständig neue Schiffstypen. Wir müssen diese lizenzieren und untersuchen, um dann neuere Schiffe zu entwickeln, die auf unsere strategischen und taktischen Marineanforderungen zugeschnitten sind."
  PHI_anti_sub_defense_force:0 "Ein Kreuzer der Marine"
  PHI_anti_sub_defense_force_desc:0 "Um unsere Pläne für eine Präsenz auf See in die Tat umzusetzen, werden immer größere Schiffe benötigt."
  PHI_import_submarine_techology:0 "U-Boot-Technologie importieren"
  PHI_import_submarine_techology_desc:0 "Eine Lücke im U-Boot-Bereich ist inakzeptabel. Wir werden die Technologie haben, auch wenn wir sie kaufen müssen."
  PHI_commerce_attack:0 "Handelsangriffstaktiken"
  PHI_commerce_attack_desc:0 "Indem wir dem Feind mit U-Booten und leichten Zerstörern seine Ressourcen entziehen, können wir trotz unserer relativ kleinen Flotte die Vorherrschaft auf See sichern."
  PHI_study_allied_and_axis_naval_tactics:0 "Studieren Sie die Marinetaktiken der Alliierten und der Achsenmächte"
  PHI_study_allied_and_axis_naval_tactics_desc:0 "Indem wir uns auf die Gegentaktiken konzentrieren, die wir brauchen, um unseren wahrscheinlichsten Feinden entgegenzutreten, behalten wir im Seekampf die Oberhand."
  PHI_island_defense:0 "Inselverteidigung"
  PHI_island_defense_desc:0 "Eine mobile Marineverteidigungsstreitmacht mit kurzer Reichweite könnte möglicherweise die Arbeit stationärer Befestigungen übernehmen, die um ein Vielfaches stärker sind."
  PHI_strike_force:0 "Einsatztruppe"
  PHI_strike_force_desc:0 "Falls uns die Zahl der Kriegsschiffe fehlt, benötigen wir eine schnell einsetzbare Streitmacht, um den Feind angreifen zu können, wenn und wo er am schwächsten ist."
  PHI_pacific_navy:0 "Pazifikmarine"
  PHI_pacific_navy_desc:0 "Wenn wir unsere Schiffe im Pazifik einsetzen wollen, ist eine gründliche Neugestaltung unserer Marinestrategie von großer Bedeutung."
  PHI_mayla_irredenta:0 "Form Malaya Irredenta"
  PHI_mayla_irredenta_desc:0 "Die Vorfahren des philippinischen Volkes sind Indonesier und Malaien. Lange Zeit träumten wir davon, alle Malaien in einem Nationalstaat zu vereinen, trotz der unterschiedlichen Wege, die unsere Länder einschlugen. Heute wird dieser Traum Wirklichkeit."
  PHI_invite_indonesia:0 "Indonesien einladen"
  PHI_invite_indonesia_desc:0 "Die Vereinigung der Nusantara- und unserer Inseln ist der erste Schritt zur Vereinigung Malayas."
  PHI_invite_malaysia:0 "Malaysia einladen"
  PHI_invite_malaysia_desc:0 "Die Malaysische Föderation braucht die Unterstützung ihrer Vorfahren, wenn sie überleben will. Deshalb werden wir sie in unsere Fraktion einladen und schließlich alle malaiischen Männer, Frauen und Kinder zu einem „Balangay“ vereinen."

 PHI_american_way:0 "Der amerikanische Weg"
 PHI_american_way_desc:0 "Unser politisches System wurde von unserer alten Marionettenregierung [USA.GetName] beeinflusst."
 PHI_greater_philipines:0 "Die Großphilippinen"
 PHI_greater_philipines_desc:0 "Zum Ruhm unseres Volkes haben wir uns zurückgeholt, was uns rechtmäßig gehört! Sei es durch nationalistischen Eifer oder den Wind der Revolution. "
 PHI_stablized_state:0 "Stabilisierter Zustand"
 PHI_stablized_state_desc:0 "Wir haben die ersten unsicheren Jahre unserer Unabhängigkeit überstanden und werden dies auch noch viele weitere Jahre tun."
 PHI_fighting_filipinos_focus:0 "Die kämpfenden Filipinos"
 PHI_fighting_filipinos_focus_desc:0 "Unsere neue Kriegspropagandakampagne „The Fighting Filipinos“ hat die Unterstützung für die Armee und unsere Ideologie gefestigt."
 PHI_filipino_irredentism:0 "Philippinischer Irredentismus"
 PHI_filipino_irredentism_desc:0 "Mit Unterstützung für die Armee und einem kleinen nationalistischen Sediment ist es an der Zeit, in diesen unsicheren Zeiten fest und standhaft zu bleiben."
 PHI_industrial:0 "Industrialisierte Inseln"
 PHI_industrial_desc:0 "Unser neuer Plan zur schnellen Industrialisierung kommt bei unserer Bevölkerung gut an."
 PHI_japanese_advisors_idea:0 "[JAP.GetAdjective] Berater"
 PHI_japanese_advisors_idea_desc:0 "Die [JAP.GetAdjective]-Berater beeinflussen unsere Marine mit Ideen für große Flotten."
 PHI_american_advisors:0 "Amerikanische Berater"
 PHI_american_advisors_desc:0 "Die amerikanischen Berater haben unsere Taktik vollständig geändert, um eine Überlegenheit der Infanterie zu ermöglichen."
 PHI_island_hopping:0 "Taktiken für das Inselhüpfen"
 PHI_island_hopping_desc:0 "Nachdem wir die Taktiken des Inselhüpfens studiert haben, haben wir herausgefunden, wie man diese Taktik am effizientesten einsetzt."
 PHI_teachings_usa:0 "USAFFE-Lehren"
 PHI_teachings_usa_desc:0 "Geben Sie mir zehntausend philippinische Soldaten und ich werde die Welt erobern – Douglas MacArthur."
 PHI_ideological_rebels:0 "Ideologische Revolutionäre"
 PHI_unstable_state:0 "Instabiler Zustand"
 PHI_unstable_state_desc:0 "Als wir unsere Unabhängigkeit erlangten, kämpften viele Gruppen um die Macht. Es sind nur noch drei übrig, aber sie kämpfen erbittert um das Haus."
 PHI_refugee_volunteers:0 "Freiwillige Flüchtlinge"


  phil.1.t:0 "Philippinisch-sowjetische Handelsmission"
  phil.1.d:0 "Die Filipinos haben einen Botschafter geschickt, der ein gemeinsames militärisches Forschungsprojekt vorschlägt. Sollen wir es annehmen?"
  phil.1.a:0 "Wir heißen unsere neuen kommunistischen Freunde willkommen!"
  phil.1.b:0 "Warum sollten wir einen Vertrag mit einer so kleinen Nation akzeptieren?"
  phil.2.t:0 "Philippinisch-sowjetische Handelsmission angenommen"
  phil.2.d:0 "Die Sowjets haben unseren Handelsvorschlag akzeptiert."
  phil.2.a:0 "Dies ist ein bedeutsamer Anlass!"
  phil.3.t:0 "Philippinisch-sowjetische Handelsmission abgelehnt"
  phil.3.d:0 "Die Sowjets haben unseren Handelsvorschlag abgelehnt."
  phil.3.a:0 "Dies ist ein schwarzer Tag für die philippinisch-sowjetischen Beziehungen."
  phil.4.t:0 "Philippinisch-japanische Handelsmission"
  phil.4.d:0 "Die Filipinos haben einen Botschafter geschickt, der ein gemeinsames militärisches Forschungsprojekt vorschlägt. Sollen wir es annehmen?"
  phil.4.a:0 "Wir heißen sie im Handel mit der Wohlstandssphäre Großostasien willkommen."
  phil.4.b:0 "Eines Tages werden sie sich dem Imperium anschließen."
  phil.6.t:0 "Philippinisch-japanische Handelsmission angenommen"
  phil.6.d:0 "Die Japaner haben unseren Handelsvorschlag akzeptiert."
  phil.6.a:0 "Dies ist ein bedeutsamer Anlass!"
  phil.7.t:0 "Philippinisch-japanische Handelsmission abgelehnt"
  phil.7.d:0 "Die Japaner haben unseren Handelsvorschlag abgelehnt."
  phil.7.a:0 "Sie werden diese Entscheidung bereuen."
  phil.8.t:0 "Das Guam-Referendum"
  phil.8.d:0 "Die Bevölkerung von Guam hat dafür gestimmt, die Vereinigten Staaten zu verlassen und sich den Großphilippinen anzuschließen. Sollten wir dieser Bitte nachkommen?"
  phil.8.a:0 "Das ist es, was die Leute wollen."
  phil.8.b:0 "Wir werden unser Land nicht an unterdrückerische Regime übergeben!"
  phil.9.t:0 "Die Vereinigten Staaten haben das Referendum aufgehoben"
  phil.9.d:0 "Die Vereinigten Staaten haben den Menschen auf Guam das verweigert, was sie wirklich wollten."
  phil.9.a:0 "Wir müssen Guam befreien!"
  phil.10.t:0 "Die Vereinigten Staaten haben das Referendum angenommen"
  phil.10.d:0 "Die Vereinigten Staaten haben der Bevölkerung von Guam erlaubt, sich den Großphilippinen anzuschließen."
  phil.10.a:0 "Wir heißen unser wiedervereintes Volk willkommen!"
  phil.11.t:0 "Die Besetzung von Sabah"
  phil.11.d:0 "Die Großphilippinen haben den Staat Sabah besetzt, während wir in Europa abgelenkt waren. Was sollen wir tun?"
  phil.11.a:0 "Dies ist ein akzeptabler Verlust, wenn dadurch weitere Konflikte vermieden werden."
  phil.11.b:0 "Wir bleiben standhaft!"
  phil.12.t:0 "Die Briten kommen"
  phil.12.d:0 "Die Briten haben unsere Ansprüche auf Sabah zurückgewiesen und uns zum Rückzug aufgefordert."
  phil.12.a:0 "Wir nehmen uns, was uns gehört!"
  phil.13.t:0 "Die Briten haben Sabah verlassen"
  phil.13.d:0 "Die Briten haben uns Sabah überlassen."
  phil.13.a:0 "Ein weiterer Schritt zu Paz Filipinas"
  phil.14.t:0 "Die Filipinos fordern die alten Generalkapitänsländer"
  phil.14.d:0 "Die Großphilippinen haben einen Teil unserer Pazifikinseln beansprucht, die einst zum Generalkapitän der Philippinen gehörten. Was sollen wir tun?"
  phil.14.a:0 "Wir dürfen nicht in einen weiteren Inselhüpfkrieg hineingezogen werden. Das ist ein akzeptabler Verlust"
  phil.14.b:0 "Wir werden kein einziges unserer Ländereien hergeben! Für den Ruhm des Imperiums!"
  phil.15.t:0 "Die Japaner lehnten unser Ultimatum ab"
  phil.15.d:0 "Die Japaner haben unser Ultimatum abgelehnt."
  phil.15.a:0 "Wir werden uns mit Gewalt nehmen, was wir wollen!"
  phil.16.t:0 "Die Japaner akzeptierten unser Ultimatum"
  phil.16.d:0 "Die Japaner haben unser Ultimatum akzeptiert."
  phil.16.a:0 "Unser Einflussbereich erweitert sich"
  ocean.1.t:0 "Malaya Irredenta-Einladung; Indonesien"
  ocean.1.d:0 "Die Philippinen haben uns zu ihrer Fraktion Malaya Irredenta eingeladen."
  ocean.1.a:0 "In diesen unsicheren Zeiten brauchen wir Verbündete"
  ocean.1.b:0 "Wir weigern uns, mit unseren ideologischen Feinden zusammenzuarbeiten!"
  ocean.2.t:0 "Indonesien akzeptiert"
  ocean.2.d:0 "Indonesien hat unsere Einladung angenommen."
  ocean.2.a:0 "Malaya wird vereint sein!"
  ocean.3.t:0 "Indonesien abgelehnt"
  ocean.3.d:0 "Indonesien hat unsere Einladung abgelehnt."
  ocean.3.a:0 "Sie haben bereits vergessen, wer ihre wahren Brüder sind …"
  ocean.4.t:0 "Malaya Irredenta-Einladung; Malaysia"
  ocean.4.d:0 "Die Philippinen haben uns zu ihrer Fraktion Malaya Irredenta eingeladen."
  ocean.4.a:0 "In diesen unsicheren Zeiten brauchen wir Verbündete."
  ocean.4.b:0 "Wir weigern uns, mit unseren ideologischen Feinden zusammenzuarbeiten!"
  ocean.5.t:0 "Malaysia akzeptiert"
  ocean.5.d:0 "Malaysia hat unsere Einladung angenommen."
  ocean.5.a:0 "Wir haben die Vereinigung erreicht!"
  ocean.6.t:0 "Malaysia lehnte ab"
  ocean.6.d:0 "Malaysia hat unsere Einladung abgelehnt."
  ocean.6.a:0 "Das ist inakzeptabel!"
