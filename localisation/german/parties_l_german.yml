authsocialism:0 "Autoritärer Sozialismus"
authsocialism_desc:0 "Der autoritäre Sozialismus strebt nach Gleichheit und einem sozialistischen Staat mit Gewalt. Er zielt darauf ab, Ungleichheit um jeden Preis zu reduzieren und greift dabei manchmal in die Wirtschaft des Landes ein. Im Gegensatz zum Marxismus strebt der autoritäre Sozialismus jedoch weder Kollektivierung noch die Abschaffung des Staates an."

monarchism:0 "Monarchismus"
monarchism_desc:0 "Monarchie ist eine Regierungsform, bei der eine Person auf Lebenszeit oder bis zur Abdankung Staatsoberhaupt ist. In den meisten Fällen ist die Thronfolge in Monarchien erblich."

orthodox_fascism:0 "Orthodoxer Faschismus"
orthodox_fascism_desc:0 "Eine autoritäre Ideologie mit faschistischen und konservativistischen Zügen. Der orthodoxe Faschismus legt Wert auf die nationale und orthodoxe Identität."

theocracy:0 "Theokratie"
theocracy_desc:0 "Theokratie ist eine Regierungsform, in der eine Gottheit oder eine religiöse Doktrin irgendeiner Art als höchste herrschende Autorität anerkannt wird und menschlichen Vermittlern, die die alltäglichen Angelegenheiten der Regierung regeln, göttliche Führung erteilt."

#theocracy2:0 "Theocracy"
#theocracy2_desc:0 "Theocracy is a form of government in which a deity or religious doctrine of some type is recognized as the supreme ruling authority, giving divine guidance to human intermediaries that manage the day-to-day affairs of the government."

left_nationalism:0 "Nationalpopulismus"
left_nationalism_desc:0 "Nationalpopulismus, auch bekannt als Linksnationalismus, ist eine Form des Nationalismus, die auf sozialer Gerechtigkeit, Volkssouveränität und nationaler Selbstbestimmung (sowohl politisch als auch wirtschaftlich) basiert. Ziel ist die Verstaatlichung der Wirtschaft sowie die Bewahrung nationaler Werte, Traditionen und des Patriotismus."

cooperativism_ideology:0 "Genossenschaftswesen"
cooperativism_ideology_desc:0 "Der Genossenschaftsstaat wird als praktikable Alternative zu Kapitalismus, Staatssozialismus und Faschismus präsentiert. Er ist ein Wirtschaftssystem, das auf Genossenschaften basiert. Dabei handelt es sich um autonome Zusammenschlüsse von Personen, die sich freiwillig zusammenschließen, um ihre gemeinsamen wirtschaftlichen, sozialen und kulturellen Bedürfnisse und Ziele durch ein gemeinsames Unternehmen zu erfüllen. Genossenschaften folgen in der Regel auch christlichen Werten und investieren einen Teil ihrer Handelsgewinne in ihre Gemeinden, um soziale Ziele zu erreichen."

CHL_GATHERING_STORM_DESC:0 "Die Lage Chiles hat einen beklagenswerten Punkt erreicht. Das Land konnte seine Wirtschaft nach der Weltwirtschaftskrise nicht wieder in Ordnung bringen. Vier Staatsstreiche fanden 1932 statt, und mit der kürzlich erfolgten Gründung der Partido Nacional Socialista scheint Chile, einst eines der fortschrittlichsten und stabilsten Länder der Region, in ein dunkles Zeitalter einzutauchen. Ob sich die Demokratie in Chile durchsetzen oder durch Faschismus, Kommunismus oder Despotismus besiegt werden wird, bleibt abzuwarten."
ARG_GATHERING_STORM_DESC:0 "1930 stürzte die Septemberrevolution unter José Félix Uriburu die autoritäre Regierung von Hipólito Yrigoyen und ersetzte sie durch ein noch autoritäreres Regime. Politische Parteien wurden verboten, die Verfassung außer Kraft gesetzt, und ohne Uriburu&#39;s Tod 1932 hätte der Faschismus in Argentinien geherrscht. \n\nSein Tod brachte jedoch keine Stabilität zurück. Wahlbetrug und wirtschaftliche Instabilität plagen das Land, und da die Condordancia nicht in der Lage ist, die Situation zu verbessern, ist es möglich, dass der Radikalismus die Macht übernimmt, genau wie in Europa."
PAR_GATHERING_STORM_DESC:0 "Der Chaco-Krieg endete 1935. Zehntausende unserer tapferen Soldaten wurden verwundet und kehrten ohne jegliche Belohnung, nur mit Schulden, verlorenen Kameraden und humpelnd nach Hause zurück. Viele unserer tapferen Männer starben nur für trockenes Weideland. Dies führte zu großer Unzufriedenheit in der Bevölkerung und unter den Soldaten sowie zu einem Vertrauensverlust in die Demokratie. \n\nDies, der militärische Einfluss im Land und die wirtschaftlichen Probleme lassen die Welt glauben, dass die Demokratie in Paraguay nicht lange Bestand haben wird."
MON_GATHERING_STORM_DESC:0 "Nach der „Befreiung“ von Roman von Ungern-Sternberg durch sowjetische Truppen im Jahr 1921 wurde die Mongolei zu einer Marionette der Sowjetregierung. Ihre Armee ist völlig von der russischen abhängig, und der NKWD ermordet jeden Anführer, der sich für mongolische Autonomie einsetzt. \n\nNun haben die Japaner Mengkukuo eingenommen und beginnen, innerhalb der Grenzen der Mongolei Scharmützel zu starten, wodurch die Zukunft der Nation düsterer denn je erscheint. Doch vielleicht ist die Instabilität in Asien eine gute Gelegenheit, sich von Moskau zu lösen."
PHI_GATHERING_STORM_DESC:0 "Die Unabhängigkeit der Philippinen wurde 1898 von Emilio Aguinaldo ratifiziert, doch der Traum von einer freien Nation wurde durch die amerikanische Invasion im darauffolgenden Jahr zerstört. 1935, nach 34 Jahren amerikanischer Besatzung, wurde der Commonwealth der Philippinen gegründet. Die USA versprachen ihm Autonomie und schließlich Unabhängigkeit. Es gibt jedoch keine Garantie dafür, dass die Versprechen auch eingehalten werden. \n\nHeute bedrohen zahlreiche islamistische, kommunistische und nationalistische Guerillas die Stabilität des Landes, und da die Japaner nun über einen Angriff auf Südostasien diskutieren, sieht die Zukunft der Nation düster aus."
AUS_GATHERING_STORM_DESC:0 "Genau wie Deutschland mit Versailles wurde Österreich durch die Unterzeichnung des Vertrags von Saint-Germain-en-Laye schwer bestraft. Die österreichische Industrie ging an Böhmen, die Landwirtschaft an Ungarn, was die junge Nation in einen wirtschaftlichen Zusammenbruch stürzte. \n\nDie Jahre vergingen, und die Christlich-Soziale Partei übernahm die Macht. Die Dinge schienen recht gut zu laufen, doch mit der Ermordung des Diktators Dollfuß im Jahr 1934 nach einem gescheiterten Nazi-Putsch änderte sich alles. Die Deutschen machten deutlich, dass sie einen Anschluss wollten und nicht zu Verhandlungen bereit waren."
BOL_GATHERING_STORM_DESC:0 "Der Chaco-Krieg endete 1935 mit dem Tod Zehntausender tapferer Soldaten, die alle von einer wirtschaftlichen Katastrophe heimgesucht wurden. Dies führte zu immenser Unzufriedenheit unter Zivilisten und Militärs sowie zu einem Vertrauensverlust in die Politiker. \n\nDies, zusammen mit dem Hass auf die mächtigen Oligarchien und der zunehmenden Popularität totalitärer Ideologien, lässt die Welt glauben, dass der letzte Funke Demokratie in Bolivien kurz vor der Auslöschung steht."
BOL_GATHERING_STORM_DESC:0 "Der Chaco-Krieg endete 1935 mit dem Tod Zehntausender tapferer Soldaten, die alle von einer wirtschaftlichen Katastrophe heimgesucht wurden. Dies führte zu immenser Unzufriedenheit unter Zivilisten und Militärs sowie zu einem Vertrauensverlust in die Politiker. \n\nDies, zusammen mit dem Hass auf die mächtigen Oligarchien und der zunehmenden Popularität totalitärer Ideologien, lässt die Welt glauben, dass der letzte Funke Demokratie in Bolivien kurz vor der Auslöschung steht."
BRA_GATHERING_STORM_DESC:0 "Eine Revolution und Wirtschaftskrise im Jahr 1930, ein Bürgerkrieg im Jahr 1932 und ein kommunistischer Putschversuch im Jahr 1935 stürzten Brasilien in eine Phase großer Instabilität. Getúlio Vargas, der 1930 zum Interimspräsidenten ernannt und 1934 demokratisch gewählt wurde, verbesserte die Lage des Landes. Doch alles ging bergab, als die zunehmende Unterstützung der kommunistischen ANL den Putschversuch von 1935 durchführte und Vargas und die Armee dazu bewegte, den Belagerungszustand über Brasilien zu verhängen. Dies, die Popularität der totalitären AIB und die wirtschaftliche Lage des Landes zeichnen ein düsteres Bild für die Zukunft Brasiliens."

explanation_about_siberia:0 "Obwohl sie dies behaupten, haben die Nazis in Sibirien kaum Macht. Die Region wird derzeit entweder von Kriegsherren oder im Exil lebenden Politikern kontrolliert, doch keiner von ihnen scheint die Absicht zu haben, seine alte Heimat zurückzuerobern. Derzeit herrscht in Sibirien praktisch Anarchie."
stasi_propaganda:0 "§Eine friedliche Nation verteidigt ihre Brüder durch Krieg.\n\nEin freier Arbeiter folgt dem Staat, der ihn befreit hat.\n\nEin starker Soldat ist immer bereit, Befehle zu befolgen.\n\nVorwärts Arbeiter!§!"
