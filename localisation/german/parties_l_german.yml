 #### ISLAMIC SUBIDEOLOGIES
 islamic_republican:0 "Fundamentalistischer Republikanismus"
 islamic_republican_desc:0 "Fundamentalistische Republikaner glauben sowohl an die Herrschaft des Volkes (muslimischen Glaubens) als auch an den alten Gesetzeskodex der Scharia und versuchen, diesen ganz oder teilweise in die Tat umzusetzen."
 islamic_authoritarian:0 "Fundamentalistische Diktatur"
 islamic_authoritarian_desc:0 "Fundamentalistische autoritäre Parteien ignorieren den Willen des Volkes, wenn sie die Macht und das Wort des Koran und seines Gesetzeswerks, der Scharia, anerkennen. Diese Autokraten streben nach totaler Kontrolle und einer Theokratie."
 emiratism:0 "Emirat"
 emiratism_desc:0 "Ein Emirat ist ein politisches Gebiet, das von einem dynastischen arabischen oder fundamentalistischen Monarchen regiert wird."
 jihadism:0 "Dschihadismus"
 jihadism_desc:0 "Dschihad ist ein arabisches Wort, das wörtlich „Streben“ oder „Kampf“ bedeutet, insbesondere mit einem lobenswerten Ziel. Im islamischen Kontext wird es meist mit Krieg in Verbindung gebracht."
 
 ### DEMOCRATIC SUBIDEOLOGIES
 
 conservatism:0 "Konservatismus"
 conservatism_desc:0 "Da der Konservatismus schnelle gesellschaftliche Veränderungen als potenziell schädlich betrachtet, bekennt er sich zur Tradition und zu gemäßigten Reformen und plädiert manchmal für eine Rückkehr zu alten moralischen Werten."
 liberalism:0 "Liberalismus"
 liberalism_desc:0 "Der Liberalismus, der auf eine lange philosophische Tradition der Wertschätzung persönlicher Freiheit zurückblickt, betrachtet die Wahrung dieser Rechte als die Hauptaufgabe des Staates."
 socialism:0 "Sozialdemokratie"
 socialism_desc:0 "Die Sozialdemokratie unterstützt wirtschaftliche und soziale Interventionen zur Förderung sozialer Gerechtigkeit im Rahmen einer kapitalistischen Wirtschaft sowie das Bekenntnis zur repräsentativen Demokratie, zu Maßnahmen der Einkommensumverteilung und zur Regulierung der Wirtschaft im Interesse der Allgemeinheit und zu wohlfahrtsstaatlichen Maßnahmen."
 democratic_socialism:0 "Demokratischer Sozialismus"
 democratic_socialism_desc:0 "Demokratischer Sozialismus ist eine politische Philosophie, die politische Demokratie und eine gesellschaftliche Wirtschaft befürwortet. Der Schwerpunkt liegt auf der Selbstverwaltung der Arbeiter und der demokratischen Kontrolle der Wirtschaftsinstitutionen innerhalb eines Marktes oder einer Form einer dezentralisierten sozialistischen Planwirtschaft. Demokratische Sozialisten argumentieren, dass der Kapitalismus grundsätzlich unvereinbar mit den Werten von Freiheit, Gleichheit und Solidarität sei und dass diese Ideale nur durch die Verwirklichung einer sozialistischen Gesellschaft erreicht werden könnten. Demokratischer Sozialismus kann entweder revolutionäre oder reformistische Politik als Mittel zur Etablierung des Sozialismus unterstützen."
 christian_democracy:0 "Christdemokratie"
 christian_democracy_desc:0 "Die christdemokratische politische Ideologie befürwortet die Prinzipien der sozialen Marktwirtschaft und einen qualifizierten Interventionismus. Sie ist als eine Kombination aus modernen demokratischen Ideen und traditionellen christlichen Werten konzipiert und berücksichtigt die Soziallehren der katholischen, lutherischen, reformierten und pfingstkirchlichen Traditionen in verschiedenen Teilen der Welt."
 democratic_nationalism:0 "Demokratischer Nationalismus"
 democratic_nationalism_desc:0 "Der Demokratische Nationalismus ist eine politische Ideologie, die rechtsgerichtete Politik mit populistischer Rhetorik und Themen verbindet. Die Rhetorik besteht oft aus anti-elitären Ansichten, Opposition gegen das vermeintliche Establishment und der Ansprache des „einfachen Volkes“."
 progressivism:0 "Progressivismus"
 progressivism_desc:0 "Progressive Menschen streben einen Weg der demokratischen Technokratie an, bei dem der schnellste Weg in die Zukunft darin besteht, dass die Regierung das Wachstum des Landes und aller seiner Bürger so weit wie möglich unterstützt."
 libertarianism:0 "Libertarismus"
 libertarianism_desc:0 "Der Libertarismus ist eine Sammlung politischer Philosophien und Bewegungen, die die Freiheit als Kernprinzip hochhalten. Libertäre streben nach größtmöglicher politischer Freiheit und Autonomie und legen dabei Wert auf Entscheidungsfreiheit, freiwillige Vereinigung und individuelles Urteil."
 market_liberalism:0 "Marktliberalismus"
 market_liberalism_desc:0 "In Europa und anderswo wird der Begriff Marktliberalismus oft als Synonym zum Wirtschaftsliberalismus verwendet und beschreibt eine Politik, die die wirtschaftlichen Aspekte des Liberalismus unterstützt, ohne notwendigerweise die politischen Aspekte des Liberalismus einzubeziehen."
 constitutional_monarchism:0 "Konstitutionelle Monarchie"
 constitutional_monarchism_desc:0 "In einer konstitutionellen Monarchie wird die Art und Weise der Regierung des Herrschers durch die Verfassung festgelegt."
 swiss_federalism:0 "Schweizer Föderalismus"
 swiss_federalism_desc:0 "Die Schweiz ist eine halbdirektdemokratische Bundesrepublik. Die gesetzgebende Gewalt liegt bei den beiden Kammern der Bundesversammlung, dem Nationalrat und dem Ständerat. Der Bundesrat hat die Exekutive inne und besteht aus sieben von der Bundesversammlung gewählten Bundesräten. Die Judikative wird vom Bundesgericht geleitet, dessen Richter von der Bundesversammlung gewählt werden."
 gaullism:0 "Gaullismus"
 gaullism_desc:0 "Der Gaullismus ist eine französische politische Haltung, die auf dem Denken und Handeln des französischen Widerstandsführers General Charles de Gaulle aus dem Zweiten Weltkrieg basiert, der später zum Gründungspräsidenten der Fünften Französischen Republik wurde."
 pancasila:0 "Pancasila"
 pancasila_desc:0 "Pancasila ist die offizielle, grundlegende philosophische Theorie Indonesiens. Pancasila besteht aus zwei altjavanischen Wörtern, die ursprünglich aus dem Sanskrit stammen: panca (fünf) und sila (Prinzipien). Pancasila besteht somit aus fünf Prinzipien und behauptet, dass diese untrennbar und miteinander verbunden sind."
 democratic_militarism:0 "Pro-westliche Militärdiktatur"
 democratic_militarism_desc:0 "Eine Militärdiktatur ist eine Regierungsform, die sich aus mehreren Gründen von einer zivilen Diktatur unterscheidet: die Motivationen für die Machtergreifung, die Institutionen, über die sie ihre Herrschaft organisiert, und die Art und Weise, wie sie die Macht abgibt. Militärdiktaturen sehen sich oft als Retter der Nation vor korrupten oder kurzsichtigen zivilen Politikern und rechtfertigen ihre Position als „neutraler“ Schiedsrichter mit ihrer Mitgliedschaft in den Streitkräften."
 democratic_populism:0 "Populismus"
 democratic_populism_desc:0 "Populismus bezeichnet eine Reihe politischer Positionen, die das Volk in den Vordergrund stellen und es oft der Elite gegenüberstellen. Der Begriff entwickelte sich im 19. Jahrhundert und wurde seitdem auf verschiedene Politiker, Parteien und Bewegungen angewendet, obwohl er selten als Selbstbeschreibung gewählt wurde. In der Politikwissenschaft und anderen Sozialwissenschaften gibt es verschiedene Definitionen von Populismus, wobei einige Wissenschaftler vorschlagen, den Begriff gänzlich abzulehnen."
 trumpism:0 "Trumpismus"
 trumpism_desc:0 "Unter Trumpismus versteht man die von Donald Trump vertretene Politik, insbesondere jene, die eine Ablehnung des gegenwärtigen politischen Establishments und die energische Verfolgung der nationalen Interessen Amerikas beinhaltet."
 federalism:0 "Föderalismus"
 federalism_desc:0 "Föderalismus ist eine gemischte Regierungsform, die eine allgemeine Regierung (die Zentralregierung oder „Bundesregierung“) mit regionalen Regierungen (Provinzen, Bundesstaaten, Kantonen, Territorien oder anderen Untereinheiten) in einem einzigen politischen System vereint. Sein besonderes Merkmal, das sich im Gründungsbeispiel des modernen Föderalismus in den Vereinigten Staaten mit der Verfassung von 1787 widerspiegelt, ist die paritätische Beziehung zwischen den beiden Regierungsebenen. Föderalismus kann somit als Regierungsform definiert werden, in der die Macht zwischen zwei gleichberechtigten Regierungsebenen aufgeteilt ist."
 democratic_colonialism:0 "Kolonialverwaltung"
 democratic_colonialism_desc:0 "Eine Kolonie ist ein Gebiet, das unter der unmittelbaren und vollständigen politischen Kontrolle eines Staates steht und von Siedlern bewohnt wird und sich vom Heimatgebiet des Souveräns unterscheidet."
 democratic_republicanism:0 "Republikanismus"
 democratic_republicanism_desc:0 "Republikanismus ist eine repräsentative Regierungsform. Es handelt sich um eine politische Ideologie, die sich auf die Staatsbürgerschaft in einem republikanischen Staat konzentriert. Historisch gesehen reicht die Bandbreite von der Herrschaft einer repräsentativen Minderheit oder Oligarchie bis hin zur Volkssouveränität. Republikanismus hat unterschiedliche Definitionen und Interpretationen, die je nach historischem Kontext und methodischem Ansatz stark variieren."
 democratic_independent:0 "Unabhängig"
 democratic_independent_desc:0 "Ein unabhängiger Politiker ist ein einzelner Politiker, der keiner politischen Partei angehört."
 democratic_aprism:0 "Aprism"
 democratic_aprism_desc:0 "Aprismus ist die sozialistische politische Ideologie, die auf den Ideen von Víctor Raúl Haya de la Torre (1895–1979), einem peruanischen Führer und politischen Denker, beruht."
 reformism:0 "Reformismus"
 reformism_desc:0 "Reformismus ist eine politische Doktrin, die die Reform eines bestehenden Systems oder einer bestehenden Institution anstelle seiner Abschaffung und Ersetzung befürwortet."
 big_tent:0 "Großes Zelt"
 big_tent_desc:0 "Der Begriff „Big Tent“ oder „Catch-All“-Partei bezeichnet die Politik einer politischen Partei, ein breites Spektrum an Ansichten unter ihren Mitgliedern zuzulassen oder zu fördern. Dies steht im Gegensatz zu anderen Parteien, die eine bestimmte Ideologie vertreten und Wähler suchen, die dieser Ideologie anhängen und die Menschen davon überzeugen."
 
 ### LEFT WING SUBIDEOLOGIES
 
 marxism:0 "Marxismus"
 marxism_desc:0 "Die marxistische Politik umfasst ein breites Spektrum ökonomischer und historischer Ansichten und versucht, die Theorien von Karl Marx in die politische Praxis umzusetzen. Klassenkampf und die Notwendigkeit des Übergangs zu einer Gesellschaft, die auf dem gemeinsamen Eigentum an den Produktionsmitteln basiert, sind charakteristisch für diese Ideologien."
 leninism:0 "Marxismus-Leninismus"
 leninism_desc:0 "Der Leninismus ist eine politische Ideologie, die auf marxistischem Gedankengut basiert. Ziel ist die Errichtung eines sozialistischen Staates durch eine Avantgardepartei, die eine Revolution anführt und die kapitalistische Gesellschaft stürzt. Sobald die Partei an der Macht ist, regiert sie durch ein System, in dem politische Maßnahmen intern diskutiert werden, bis eine Entscheidung getroffen ist."
 stalinism:0 "Stalinismus"
 stalinism_desc:0 "Der Stalinismus versteht sich als eine Regierungsform, die marxistisch-leninistische Politiken anwendet und weiterentwickelt. Er betont die schnelle Industrialisierung und Kollektivierung sowie die Notwendigkeit eines starken, autoritären sozialistischen Staates, um alle konterrevolutionären Elemente auszuschalten."
 anti_revisionism:0 "Antirevisionismus"
 anti_revisionism_desc:0 "Als Reaktion auf die vielen Ideologien, die behaupten, Nachfolger des Marxismus zu sein, plädiert der Antirevisionismus für die Beibehaltung zentraler Elemente der ursprünglichen Revolutionstheorie. Er wendet sich vor allem gegen die Eingliederung kapitalistischer Wirtschaftselemente in sozialistische Staaten und definiert sich sowohl darüber, was sie nicht ist, als auch darüber, was sie ist."
 anarchist_communism:0 "Anarchistischer Kommunismus"
 anarchist_communism_desc:0 "Der anarchistische Kommunismus ist eine Ideologie, die die Idee des Kommunismus als staatenlose Gesellschaft vertritt. Er lehnt die Idee eines sozialistischen Übergangsstaates ab und bevorzugt eine Gesellschaft, die auf freiwilligen Vereinigungen und gegenseitiger Hilfe basiert."
 maoism:0 "Maoismus"
 maoism_desc:0 "Der Maoismus ist eine politische Theorie, die auf den Lehren des chinesischen Staatschefs Mao Zedong (1893–1976) basiert. Er entwickelte sich von den 1950er Jahren bis zu den Reformen Deng Xiaopings in den 1970er Jahren und wurde weithin als politische und militärische Leitideologie der Kommunistischen Partei Chinas (KPCh) und als Leittheorie revolutionärer Bewegungen weltweit angewandt."
 trotskyism:0 "Trotzkismus"
 trotskyism_desc:0 "Trotzki bezeichnete sich selbst als orthodoxen Marxisten und Bolschewisten-Leninisten und unterstützte die Gründung einer Avantgardepartei des Proletariats, den proletarischen Internationalismus und eine Diktatur des Proletariats auf der Grundlage der Selbstbefreiung der Arbeiterklasse und der Massendemokratie. Trotzkisten stehen dem Stalinismus kritisch gegenüber, da sie Stalins Theorie des Sozialismus in einem Land ablehnen und stattdessen Trotzkis Theorie der permanenten Revolution bevorzugen."
 left_communism:0 "Linker Kommunismus"
 left_communism_desc:0 "Der Linkskommunismus sieht sich selbst als eine der getreuesten Repräsentanten des Marxismus und der Marxschen Sichtweise insgesamt und kritisiert sowohl Marxisten-Leninisten als auch Sozialdemokraten. Auch wenn es innerhalb der Bewegung eine große Bandbreite politischer Abweichungen gibt, ist ihr Ziel klar: die Arbeitermacht über allen opportunistischen und bürokratischen Tendenzen."
 titoism:0 "Titoismus"
 titoism_desc:0 "Der Titoismus zeichnet sich durch eine Politik und Praxis aus, die auf dem Prinzip beruht, dass in jedem Land die Mittel zur Erreichung der endgültigen kommunistischen Ziele von den Bedingungen des jeweiligen Landes und nicht von einem in einem anderen Land festgelegten Muster bestimmt werden müssen. Er unterscheidet sich von Josef Stalins Theorie des Sozialismus in einem Land, da Tito die Zusammenarbeit zwischen den Nationen durch die Bewegung der Blockfreien Staaten befürwortete."
 national_bolshevism:0 "Nationalbolschewismus"
 national_bolshevism_desc:0 "Der Nationalbolschewismus als politische Bewegung vereint Elemente des radikalen Nationalismus (insbesondere des russischen Nationalismus) und des Bolschewismus."
 juche:0 "Juche"
 juche_desc:0 "Juche ist die offizielle Staatsideologie Nordkoreas und wird von der Regierung als „Kim Il-sungs origineller, brillanter und revolutionärer Beitrag zum nationalen und internationalen Denken“ bezeichnet. Sie besagt, dass „der Mensch Herr seines Schicksals ist“, dass die koreanischen Massen als „Herren der Revolution und des Aufbaus“ agieren und dass eine Nation durch Selbständigkeit und Stärke wahren Sozialismus erreichen kann."
 syndicalism:0 "Syndikalismus"
 syndicalism_desc:0 "Der Syndikalismus ist ein System wirtschaftlicher Organisation, in dem die Industriebetriebe im Besitz der Arbeiter sind und von ihnen verwaltet werden."
 revolutionary_socialism:0 "Revolutionärer Sozialismus"
 revolutionary_socialism_desc:0 "Revolutionärer Sozialismus ist die sozialistische Lehre, dass eine soziale Revolution notwendig ist, um strukturelle Veränderungen in der Gesellschaft herbeizuführen. Genauer gesagt ist es die Ansicht, dass eine Revolution eine notwendige Voraussetzung für den Übergang vom Kapitalismus zum Sozialismus ist. Revolution wird nicht unbedingt als gewaltsamer Aufstand definiert; sie ist als Machtergreifung durch Massenbewegungen der Arbeiterklasse definiert, sodass der Staat direkt von der Arbeiterklasse kontrolliert oder abgeschafft wird – im Gegensatz zur Kapitalistenklasse und ihren Interessen."
 bolivarianism:0 "Bolivarismus"
 bolivarianism_desc:0 "Der Bolivarismus ist eine Mischung panamerikanischer, sozialistischer und nationalpatriotischer Ideale, die sich gegen die Ungerechtigkeiten des Imperialismus, Ungleichheit und Korruption richten. Benannt ist er nach Simón Bolívar, dem venezolanischen General und Befreier der damals ruhenden spanischen Monarchie im 19. Jahrhundert, der den Unabhängigkeitskampf in weiten Teilen Südamerikas anführte."
 castroism:0 "Castroismus"
 castroism_desc:0 "Der Castroismus basiert auf den Ideen und marxistischen Theorien von Che Guevara, Raúl Castro und Fidel Castro, den Führern der kubanischen Revolution. Wie alle Leninisten glauben auch Castroisten, dass der bürgerlich-kapitalistische Staat gestürzt werden muss, um eine sozialistische Alternative zu schaffen."
 gonzalo_thought:0 "Gonzalo-Gedanke"
 gonzalo_thought_desc:0 "Die Bewegung förderte die Schriften von Guzmán, genannt Gonzalo-Denken, ein neues theoretisches Verständnis, das auf Marxismus, Leninismus und Maoismus aufbaute, wobei er den Maoismus als dritte und höhere Stufe des Marxismus erklärte und Maoismus als Volkskrieg definierte."
 hoxhaism:0 "Hoxhaismus"
 hoxhaism_desc:0 "Der Hoxhaismus ist eine Variante des antirevisionistischen Marxismus-Leninismus, die sich in den späten 1970er Jahren aufgrund einer Spaltung der maoistischen Bewegung entwickelte und nach dem ideologischen Streit zwischen der Kommunistischen Partei Chinas und der Partei der Arbeit Albaniens im Jahr 1978 aufkam. Die Ideologie ist nach Enver Hoxha benannt, einem bekannten albanischen kommunistischen Führer."
 kadarism:0 "Kadarismus"
 kadarism_desc:0 "Der Gulaschkommunismus, auch Kadarismus oder Tauwetter genannt, bezeichnet die Form des Kommunismus in Ungarn nach der Ungarischen Revolution von 1956. János Kádár und die Ungarische Volksrepublik führten politische Maßnahmen durch, die darauf abzielten, der ungarischen Bevölkerung einen hohen Lebensstandard zu bieten und gleichzeitig Wirtschaftsreformen durchzuführen. Diese Reformen förderten Wohlstand und relative kulturelle Freiheit in Ungarn, das in den 1960er- und 1970er-Jahren als die glücklichste Stadt des Ostblocks galt. Mit Elementen einer regulierten Marktwirtschaft und einer verbesserten Menschenrechtslage stellte dieser Reformismus eine stille Reform und Abkehr von den stalinistischen Prinzipien dar, die im vorangegangenen Jahrzehnt in Ungarn gegolten hatten."
 marhaenism:0 "Marhäenismus"
 marhaenism_desc:0 "Der Marhänismus ist eine sozialistische politische Ideologie mit Ursprung in Indonesien. Anhänger des Marhänismus werden als Marhänisten bezeichnet. Er wurde vom ersten indonesischen Präsidenten Sukarno entwickelt. Einige Wissenschaftler betrachten den Marhänismus als eine Variante des Marxismus. Er betont nationale Einheit, Kultur und kollektivistische Wirtschaftssysteme. Er wurde als antikapitalistische und antiimperialistische Ideologie etabliert. Er fördert demokratische Rechte im Gegensatz zum Autoritarismus und verurteilt Liberalismus und Individualismus. Er verbindet westliche und östliche Prinzipien."
 african_socialism:0 "Afrikanischer Sozialismus"
 african_socialism_desc:0 "Afrikanischer Sozialismus ist der Glaube an die gemeinsame Nutzung wirtschaftlicher Ressourcen auf traditionelle afrikanische Weise, im Unterschied zum klassischen Sozialismus. Viele afrikanische Politiker der 1950er und 1960er Jahre bekannten sich zum afrikanischen Sozialismus, obwohl Definitionen und Interpretationen dieses Begriffs sehr unterschiedlich waren."
 labor_zionism:0 "Arbeiterzionismus"
 labor_zionism_desc:0 "Der Arbeiterzionismus oder sozialistische Zionismus ist der linke Flügel der zionistischen Bewegung. Viele Jahre lang war er die bedeutendste Strömung unter Zionisten und zionistischen Organisationen. Er verstand sich als zionistischer Teil der historischen jüdischen Arbeiterbewegungen Ost- und Mitteleuropas und entwickelte schließlich in den meisten Ländern mit einer beträchtlichen jüdischen Bevölkerung lokale Einheiten."
 islam_nationalism:0 "Islamischer Nationalismus"
 islam_nationalism_desc:0 "Islamistische Nationalisten kämpfen für einen souveränen Staat auf der Grundlage islamischer Prinzipien und nutzen dafür den demokratischen Weg. Daher haben die islamischen Nationalisten großen Einfluss im Nahen Osten und Zentralasien sowie in Nordafrika."
 third_international_theory:0 "Dritte Internationale Theorie"
 third_international_theory_desc:0 "Die Dritte Internationale Theorie, auch bekannt als Dritte Universaltheorie, war der Regierungsstil, den Oberst Muammar Gaddafi Anfang der 1970er Jahre vorschlug und auf dem seine Regierung, die Große Sozialistische Libysch-Arabische Volksdschamahirija, offiziell basierte. Sie war teilweise vom islamischen Sozialismus, arabischen und afrikanischen Nationalismus inspiriert und teilweise von den Prinzipien der direkten Demokratie."
 aprism:0 "Aprism"
 aprism_desc:0 "Aprismus ist die sozialistische politische Ideologie, die auf den Ideen von Víctor Raúl Haya de la Torre (1895–1979), einem peruanischen Führer und politischen Denker, beruht."
 burmese_socialism:0 "Burmesischer Sozialismus"
 burmese_socialism_desc:0 "Der burmesische Weg zum Sozialismus bezieht sich auf die Ideologie der sozialistischen Regierung in Burma von 1962 bis 1988, als der Staatsstreich von 1962 von Ne Win und dem Militär angeführt wurde, um U Nu von der Macht zu entfernen. Genauer gesagt handelt es sich bei dem burmesischen Weg zum Sozialismus um eine wirtschaftswissenschaftliche Abhandlung, die im April 1962, kurz nach dem Putsch, vom Revolutionsrat verfasst wurde. Sie sollte als Blaupause für die wirtschaftliche Entwicklung dienen, den ausländischen Einfluss in Burma verringern und die Rolle des Militärs stärken."
 velasquism:0 "Velasquismus"
 velasquism_desc:0 "Velasquismus bezieht sich auf die Politik von Juan Velasco Alvarado, einem peruanischen General und Politiker, der von 1968 bis 1975 Präsident der Republik Peru war."
 lw_socialism:0 "Sozialismus"
 lw_socialism_desc:0 "Sozialismus umfasst verschiedene Wirtschafts- und Gesellschaftssysteme, die durch gesellschaftliches Eigentum an den Produktionsmitteln und die Selbstverwaltung der Arbeiter gekennzeichnet sind, sowie die damit verbundenen politischen Theorien und Bewegungen. Gesellschaftliches Eigentum kann öffentliches, kollektives oder kooperatives Eigentum oder Bürgereigentum an Kapital sein. Es gibt viele Spielarten des Sozialismus, und es gibt keine einheitliche Definition, die alle umfasst. Das gemeinsame Element aller Formen ist das gesellschaftliche Eigentum."
 lw_nationalism:0 "Nationalismus"
 lw_nationalism_desc:0 "Nationalismus ist eine Ideologie und Bewegung, die sich für die Interessen einer bestimmten Nation einsetzt, insbesondere mit dem Ziel, die Souveränität (Selbstverwaltung) der Nation über ihr Heimatland zu erlangen und zu erhalten. Der Nationalismus vertritt die Ansicht, dass jede Nation sich selbst regieren sollte, frei von äußeren Einflüssen (Selbstbestimmung), dass eine Nation die natürliche und ideale Grundlage für ein Gemeinwesen darstellt und dass die Nation die einzig rechtmäßige Quelle politischer Macht ist (Volkssouveränität)." 
 lw_populism:0 "Populismus"
 lw_populism_desc:0 "Populismus bezeichnet eine Reihe politischer Positionen, die das Volk in den Vordergrund stellen und es oft der Elite gegenüberstellen. Der Begriff entwickelte sich im 19. Jahrhundert und wurde seitdem auf verschiedene Politiker, Parteien und Bewegungen angewendet, obwohl er selten als Selbstbeschreibung gewählt wurde. In der Politikwissenschaft und anderen Sozialwissenschaften gibt es verschiedene Definitionen von Populismus, wobei einige Wissenschaftler vorschlagen, den Begriff gänzlich abzulehnen."
 lw_militarism:0 "Militärdiktatur"
 lw_militarism_desc:0 "Eine Militärdiktatur ist eine Regierungsform, die sich aus mehreren Gründen von einer zivilen Diktatur unterscheidet: die Motivationen für die Machtergreifung, die Institutionen, über die sie ihre Herrschaft organisiert, und die Art und Weise, wie sie die Macht abgibt. Militärdiktaturen sehen sich oft als Retter der Nation vor korrupten oder kurzsichtigen zivilen Politikern und rechtfertigen ihre Position als „neutraler“ Schiedsrichter mit ihrer Mitgliedschaft in den Streitkräften."
 sandinism:0 "Sandinismus"
 sandinism_desc:0 "Der Sandinismus ist eine Reihe politischer und wirtschaftlicher Philosophien, die von der nicaraguanischen Sandinistischen Nationalen Befreiungsfront im späten 20. Jahrhundert vertreten und eingeführt wurden. Die Ideologie und Bewegung erhielten ihren Namen, ihr Image und vor allem ihren militärischen Stil von Augusto César Sandino, einem nicaraguanischen Revolutionsführer, der Anfang des 20. Jahrhunderts einen Guerillakrieg gegen die US-Marines und die konservative Somoza-Nationalgarde führte. Trotz der Verwendung des Namens Sandino wurden die Grundsätze der modernen sandinistischen Ideologie hauptsächlich von Carlos Fonseca entwickelt, der, ähnlich wie die Führer der kubanischen Revolution der 1950er Jahre, versuchte, unter Nicaraguas Bauernbevölkerung sozialistischen Populismus zu wecken. Eine dieser Hauptphilosophien beinhaltete die Einführung eines Bildungssystems, das die Bevölkerung von den vermeintlichen historischen Irrtümern der herrschenden Somoza-Familie „befreien“ sollte. Durch die Erweckung des politischen Denkens in der Bevölkerung, so glaubten die Anhänger der sandinistischen Ideologie, würden die menschlichen Ressourcen nicht nur für einen Guerillakrieg gegen das Somoza-Regime, sondern auch für den Aufbau einer Gesellschaft frei, die wirtschaftlichen und militärischen Interventionen ausländischer Mächte standhalten könnte."
 kirchnerism:0 "Kirchnerismus"
 kirchnerism_desc:0 "Der Kirchnerismus ist eine argentinische politische Bewegung, die von Anhängern des verstorbenen Néstor Kirchner und seiner Frau Cristina Fernández de Kirchner gegründet wurde. Obwohl die Kirchners Mitglieder der Justicialist Party (der ursprünglichen, offiziellen und größten peronistischen Partei, die 1947 von Juan Perón gegründet wurde) sind, ist der Peronismus selbst eine breite Bewegung und wird von vielen Peronisten abgelehnt. Der Kirchnerismus wird allgemein dem Linkspopulismus zugeordnet."
 guevarism:0 "Guevarismus"
 guevarism_desc:0 "Der Guevarismus ist eine Theorie der kommunistischen Revolution und eine militärische Strategie des Guerillakriegs, die mit dem kommunistischen Revolutionär Ernesto „Che“ Guevara in Verbindung gebracht wird, einer führenden Persönlichkeit der kubanischen Revolution, die an die Ideen des Marxismus-Leninismus glaubte und sich dessen Prinzipien zu eigen machte."
 lw_strasserism:0 "Strasserismus"
 lw_strasserism_desc:0 "Der Strasserismus bezeichnet eine politische Bewegung, die aus der NSDAP hervorging und ihren Namen von den Brüdern Strasser erhielt. Die Bewegung war sozialistischer als einige der älteren konservativen, militärischen und aristokratischen Elemente in der Regierung, wobei Adolf Hitler irgendwo zwischen beiden Lagern angesiedelt war. Sie propagierten Konzepte wie den Klassenkampf und eine freundlichere Haltung gegenüber der Sowjetunion."
 revisionism:0 "Revisionismus"
 revisionism_desc:0 "Der Revisionismus basiert auf der Revision marxistischer Prinzipien, sei es aus privaten oder besonderen Interessen. Die revisionistischen Vorschläge werden von anderen orthodoxen Marxisten scharf als konterrevolutionär kritisiert."
 
 ### RIGHT WING SUBIDEOLOGIES
 
 nazism:0 "Nazismus"
 nazism_desc:0 "Der Nationalsozialismus wurzelt in einem extremen Nationalismus und wird von der Idee germanischer Überlegenheit angetrieben. Er propagiert einen aggressiven Expansionismus und einen totalitären Staat, in dem das Volk unter einem Führer mit absoluter Macht vereint ist, dem „Führer“."
 gen_nazism:0 "Nazismus"
 gen_nazism_desc:0 "Der Nationalsozialismus wurzelt in einem extremen Nationalismus und wird von der Idee der Rassenüberlegenheit angetrieben. Er propagiert einen aggressiven Expansionismus und einen totalitären Staat, in dem das Volk unter einem Führer mit absoluter Macht vereint ist."
 fascism_ideology:0 "Faschismus"
 fascism_ideology_desc:0 "Der Faschismus umfasst eine Vielzahl ultranationalistischer Bewegungen und verehrt typischerweise die Hingabe an den Staat und die Vereinigung des Volkes unter einem starken Führer."
 falangism:0 "Falangismus"
 falangism_desc:0 "Der Falangismus ist eine autoritäre Ideologie mit faschistischen und konservativistischen Zügen und legt Wert auf die nationale und katholische Identität."
 rexism:0 "Rexismus"
 rexism_desc:0 "Der Rexismus ist eine entschieden konservative nationalistische Bewegung, die sowohl liberale als auch kommunistische Ideale scharf ablehnt und eine korporatistische Wirtschaftspolitik vertritt. Mit zunehmend populistischer und autoritärer Rhetorik nähern sich ihre Ideale anderen faschistischen Bewegungen an."
 third_positionism:0 "Dritter Platz"
 third_positionism_desc:0 "Die Dritte Position ist eine politische Ideologie, die sich nach dem Zweiten Weltkrieg in Westeuropa entwickelte. Sie entstand im Kontext des Kalten Krieges und erhielt ihren Namen durch die Behauptung, sie stelle eine dritte Position zwischen dem Kapitalismus des Westblocks und dem Staatssozialismus des Ostblocks dar."
 ultranationalism:0 "Ultranationalismus"
 ultranationalism_desc:0 "Ultranationalismus ist ein „extremer Nationalismus, der die Interessen eines Staates oder Volkes über alle anderen stellt“ oder einfach „extreme Hingabe an die eigene Nation“."
 strasserism:0 "Strasserismus"
 strasserism_desc:0 "Der Strasserismus bezeichnet eine politische Bewegung, die aus der NSDAP hervorging und ihren Namen von den Brüdern Strasser erhielt. Die Bewegung war sozialistischer als einige der älteren konservativen, militärischen und aristokratischen Elemente in der Regierung, wobei Adolf Hitler irgendwo zwischen beiden Lagern angesiedelt war. Sie propagierten Konzepte wie den Klassenkampf und eine freundlichere Haltung gegenüber der Sowjetunion."
 legionnairism:0 "Legionärismus"
 legionnairism_desc:0 "Die Legion unterschied sich von den meisten anderen faschistischen Bewegungen Europas jener Zeit, insbesondere in ihrem Verständnis von Nationalismus, der ihrer Ansicht nach niemals von dem Glauben getrennt werden dürfe, in den die Menschen hineingeboren wurden. Die Legion integrierte bereitwillig starke Elemente des orthodoxen Christentums in ihre politische Ideologie, so dass sie zu einer der seltenen modernen europäischen politischen Bewegungen mit einer religiös-ideologischen Struktur wurde."
 french_fascism:0 "Französischer Faschismus"
 french_fascism_desc:0 "Der französische Faschismus verurteilte den Parlamentarismus und versuchte, die französische Demokratie einzuschränken und die französische Gesellschaft nach seinen eigenen autoritären Vorstellungen umzugestalten. Er war ein vehementer Gegner des Marxismus und des Liberalismus und wollte Frankreich von der Freimaurerei befreien, die ihm große Sorgen bereitete."
 japanese_fascism:0 "Japanischer Faschismus"
 japanese_fascism_desc:0 "Der Etatismus im Shōwa-Japan war ein politischer Synkretismus japanischer rechtsgerichteter politischer Ideologien, der sich über einen Zeitraum seit der Meiji-Restauration entwickelte. Er wird manchmal auch als Shōwa-Nationalismus oder japanischer Faschismus bezeichnet. Diese etatistische Bewegung dominierte die japanische Politik während der ersten Hälfte der Shōwa-Zeit (Herrschaft Hirohitos). Es handelte sich um eine Mischung aus Ideen wie japanischem Nationalismus, Militarismus und Staatskapitalismus, die von zahlreichen zeitgenössischen politischen Philosophen und Denkern in Japan vertreten wurden."
 british_fascism:0 "Britische Union der Faschisten"
 british_fascism_desc:0 "„Wäre unsere Krise eine der ersten und nicht eine der letzten gewesen, wäre der Faschismus eine britische Erfindung gewesen. Unsere Aufgabe besteht jedoch nicht darin, den Faschismus zu erfinden, sondern in Großbritannien seine höchste Ausdrucksform und Entwicklung zu finden.“"
 esoteric_nazism:0 "Esoterischer Nationalsozialismus"
 esoteric_nazism_desc:0 "Der esoterische Nationalsozialismus ist eine von mehreren mystischen Interpretationen und Adaptionen des Nationalsozialismus in der Nachkriegszeit. Nach 1945 wurden esoterische Elemente des Dritten Reichs in neue völkische Religionen des weißen Nationalismus und Neonazismus eingearbeitet."
 fascist_monarchism:0 "Faschistische Monarchie"
 fascist_monarchism_desc:0 "Eine faschistische Monarchie ist eine Form der Monarchie, in der der Herrscher von einer faschistischen Bewegung unterstützt wird."
 nationalist_monarchism:0 "Nationalistische Monarchie"
 nationalist_monarchism_desc:0 "Eine nationalistische Monarchie ist eine Form der Monarchie, in der der Herrscher von einer nationalistischen Bewegung unterstützt wird."
 italian_fascism:0 "Italienischer Faschismus"
 italian_fascism_desc:0 "Der italienische Faschismus, auch bekannt als klassischer Faschismus oder einfach Faschismus, ist die ursprüngliche faschistische Ideologie, wie sie in Italien entwickelt wurde."
 white_nationalism:0 "Weißer Nationalismus"
 white_nationalism_desc:0 "Der weiße Nationalismus ist eine Art von Nationalismus oder Pannationalismus, der den Glauben vertritt, dass die Weißen eine Rasse sind, und versucht, eine weiße rassische und nationale Identität zu entwickeln und zu bewahren."
 neo_nazism:0 "Neonazismus"
 neo_nazism_desc:0 "Der Neonazismus umfasst militante soziale oder politische Bewegungen nach dem Zweiten Weltkrieg, die die Ideologie des Nationalsozialismus wiederbeleben wollen. Er übernimmt Elemente der Nazi-Doktrin, darunter Ultranationalismus, Rassismus bis hin zu Fremdenfeindlichkeit, Behindertenfeindlichkeit, Homophobie, Anti-Romaismus, Antisemitismus, Antikommunismus und die Gründung des Vierten Reichs. Holocaustleugnung ist ein häufiges Merkmal, ebenso wie die Verwendung von Nazi-Symbolen und die Bewunderung für Adolf Hitler."
 peronism:0 "Peronismus"
 peronism_desc:0 "Der Peronismus ist eine argentinische politische Bewegung, die auf den Ideen und dem Erbe des argentinischen Präsidenten Juan Perón basiert. Er wird als eine vage Mischung aus Nationalismus und Labourismus, Populismus, Faschismus oder Rechtssozialismus beschrieben."
 salazarism:0 "Salazarismus"
 salazarism_desc:0 "Der Salazarismus bezieht sich auf die Politik von António de Oliveira Salazar, einem portugiesischen Professor und Politiker, der von 1932 bis 1968 als portugiesischer Premierminister fungierte."
 hutu_power:0 "Hutu-Macht"
 hutu_power_desc:0 "Hutu Power ist eine rassistische und ethnische Vorherrschaftsideologie, die von Hutu-Extremisten in Ruanda vertreten wird. Sie führte 1994 zum Völkermord an den Tutsi in Ruanda."
 proto_fascism:0 "Protofaschismus"
 proto_fascism_desc:0 "Unter Protofaschismus versteht man die direkten Vorgängerideologien und kulturellen Bewegungen, die den Faschismus beeinflussten und seine Grundlage bildeten."
 neo_fascism:0 "Neofaschismus"
 neo_fascism_desc:0 "Neofaschismus ist eine Ideologie der Nachkriegszeit, die wesentliche Elemente des Faschismus enthält. Neofaschismus umfasst in der Regel Ultranationalismus, Rassenüberlegenheit, Populismus, Autoritarismus, Nativismus, Fremdenfeindlichkeit und Einwanderungsgegnerschaft sowie Opposition gegen liberale Demokratie, Parlamentarismus, Marxismus, Kommunismus und Sozialismus."
 hindu_nationalism:0 "Hindu-Nationalismus"
 hindu_nationalism_desc:0 "Der Hindu-Nationalismus wird allgemein als Ausdruck sozialen und politischen Denkens bezeichnet, das auf den ursprünglichen spirituellen und kulturellen Traditionen des indischen Subkontinents basiert."
 russian_fascism:0 "Russischer Faschismus"
 russian_fascism_desc:0 "Der russische Faschismus verband die europäische faschistische Theorie mit Vorstellungen über das russische Erbe, die Politik der letzten Jahre des Zarenreichs und Lehren aus der damaligen Sowjetunion."
 duvalierism:0 "Duvalierismus"
 duvalierism_desc:0 "Der Begriff Duvalierismus bezeichnet die Praktiken, die Politik und die Ideologie der Diktatur von François Duvalier, der Haiti von 1957 bis 1971 regierte, und seines Sohnes Jean-Claude Duvalier, der ihm nachfolgte."
 neo_ottomanism:0 "Neo-Osmanismus"
 neo_ottomanism_desc:0 "Der Neoosmanismus ist eine türkische politische Ideologie, die im weitesten Sinne ein stärkeres politisches Engagement der Republik Türkei in den Regionen fördert, die früher unter der Herrschaft des Osmanischen Reiches standen, jenes Vorgängerstaates, der unter anderem auch das Gebiet der modernen Türkei umfasste."
 ottomanism:0 "Osmanismus"
 ottomanism_desc:0 "Der Osmanismus war eine Form des Nationalismus, wahrscheinlich inspiriert und geformt als Reaktion auf europäische Vorstellungen von Nationalismus und das wachsende westliche Engagement im Osmanischen Reich. Nach den 1839 begonnenen Tanzimat-Reformen entwickelte sich der Osmanismus aus dem Bedürfnis heraus, das Reich zu einen. Die Osmanen fürchteten die wachsende Bedrohung durch die Europäer, insbesondere nach Ereignissen wie dem Vertrag von Balta Liman von 1838, der britischen Kaufleuten im Reich die gleiche Besteuerung wie den Einheimischen ermöglichte, und der wachsenden Besorgnis der Großmächte über die Behandlung der Christen im Reich. Die Osmanen dachten, dass sie stärker wären, wenn sie das Reich vollständig unter einer staatlichen Einheit vereinen könnten, und dass es den Europäern schwerer fallen würde, in osmanisches Territorium und unter die osmanische Bevölkerung vorzudringen. Zuvor war das Reich stark in viele kleine Gemeinschaften aufgeteilt, die sich größtenteils selbst regierten. Der Sultan beaufsichtigte diese Gemeinschaften, aber die meisten Gebiete hielten sich an ihre eigenen Gesetze und Glaubenssätze. Dies trug teilweise zum Erfolg des Osmanischen Reiches bei; Der Sultan zwang die Bevölkerung bei seiner Eroberung nicht zu größeren Veränderungen. Aufgrund des Nationalismus begann sich in Europa jedoch das Konzept von Nationalstaaten mit gemeinsamen Identitäten durchzusetzen, vor allem mit dem griechischen Unabhängigkeitskrieg von 1821–1830, der auch die anderen Völker des Osmanischen Reiches zu beeinflussen begann. Aus diesen Ereignissen entwickelte sich der Osmanismus als soziale und politische Reaktion, in der Hoffnung, das Reich vor dem Untergang zu bewahren."
 black_nationalism:0 "Schwarzer Nationalismus"
 black_nationalism_desc:0 "Schwarzer Nationalismus ist eine politische Denkweise, die darauf abzielt, eine schwarze Rassenidentität für Menschen schwarzer Abstammung zu fördern, zu entwickeln und aufrechtzuerhalten. Der schwarznationalistische Aktivismus dreht sich um die soziale, politische und wirtschaftliche Stärkung schwarzer Gemeinschaften und Menschen, insbesondere um der Assimilation in die weiße Kultur (durch Integration oder auf andere Weise) zu widerstehen und eine ausgeprägte schwarze Identität zu bewahren."
 trujillism:0 "Trujillismus"
 trujillism_desc:0 "Trujillismus bezieht sich auf die Politik von Rafael Trujillo Molina, einem dominikanischen General und Politiker, der von 1930 bis 1938 und von 1942 bis 1952 Präsident der Dominikanischen Republik war."
 stroessnerism:0 "Stroessnerismus"
 stroessnerism_desc:0 "Der Stroessnerismus bezieht sich auf die Politik von Alfredo Stroessner Matiauda, einem paraguayischen General und Politiker, der von 1954 bis 1989 Präsident von Paraguay war."
 rw_nationalism:0 "Nationalismus"
 rw_nationalism_desc:0 "Nationalismus ist eine Ideologie und Bewegung, die sich für die Interessen einer bestimmten Nation einsetzt, insbesondere mit dem Ziel, die Souveränität (Selbstverwaltung) der Nation über ihr Heimatland zu erlangen und zu erhalten. Der Nationalismus vertritt die Ansicht, dass jede Nation sich selbst regieren sollte, frei von äußeren Einflüssen (Selbstbestimmung), dass eine Nation die natürliche und ideale Grundlage für ein Gemeinwesen darstellt und dass die Nation die einzig rechtmäßige Quelle politischer Macht ist (Volkssouveränität)." 
 rw_populism:0 "Populismus"
 rw_populism_desc:0 "Populismus bezeichnet eine Reihe politischer Positionen, die das Volk in den Vordergrund stellen und es oft der Elite gegenüberstellen. Der Begriff entwickelte sich im 19. Jahrhundert und wurde seitdem auf verschiedene Politiker, Parteien und Bewegungen angewendet, obwohl er selten als Selbstbeschreibung gewählt wurde. In der Politikwissenschaft und anderen Sozialwissenschaften gibt es verschiedene Definitionen von Populismus, wobei einige Wissenschaftler vorschlagen, den Begriff gänzlich abzulehnen."
 rw_militarism:0 "Militärdiktatur"
 rw_militarism_desc:0 "Eine Militärdiktatur ist eine Regierungsform, die sich aus mehreren Gründen von einer zivilen Diktatur unterscheidet: die Motivationen für die Machtergreifung, die Institutionen, über die sie ihre Herrschaft organisiert, und die Art und Weise, wie sie die Macht abgibt. Militärdiktaturen sehen sich oft als Retter der Nation vor korrupten oder kurzsichtigen zivilen Politikern und rechtfertigen ihre Position als „neutraler“ Schiedsrichter mit ihrer Mitgliedschaft in den Streitkräften."
 ethnocacerism:0 "Ethnokazerismus"
 ethnocacerism_desc:0 "Der Ethnocacerismus ist eine peruanische ethnisch-nationalistische Bewegung, die die Errichtung einer proletarischen Diktatur unter Führung der indigenen Gemeinschaften des Landes und ihrer Nachkommen anstrebt. Sie verbindet linksextreme Wirtschaftsansichten mit rechtsextremen Ansichten in rassischen, sozialen und militärischen Fragen."
 brazilian_integralism:0 "Brasilianischer Integralismus"
 brazilian_integralism_desc:0 "Der brasilianische Integralismus war eine faschistische und nationalistische politische Bewegung in Brasilien, die im Oktober 1932 gegründet wurde. Gegründet und angeführt von Plínio Salgado, einem Literaten, der durch seine Teilnahme an der Modern Art Week 1922 einigermaßen berühmt wurde, übernahm die Bewegung einige Merkmale europäischer Massenbewegungen jener Zeit, insbesondere des italienischen Faschismus, distanzierte sich jedoch vom Nationalsozialismus, da Salgado selbst Rassismus nicht unterstützte. Trotz des Slogans der Bewegung „Union aller Rassen und Völker“ vertraten einige Aktivisten antisemitische Ansichten. Der Name der zur Unterstützung ihrer Doktrin gegründeten Partei lautete Brasilianische Integralistische Aktion. Der Bezug zum Integralismus spiegelte eine traditionalistische Bewegung in Portugal wider, den Lusitanischen Integralismus. Als Symbol verwendete die AIB eine Flagge mit einer weißen Scheibe auf königsblauem Hintergrund, in deren Mitte ein großes Sigma (Σ) stand."
 rw_colonialism:0 "Kolonialverwaltung"
 rw_colonialism_desc:0 "Eine Kolonie ist ein Gebiet, das unter der unmittelbaren und vollständigen politischen Kontrolle eines Staates steht und von Siedlern bewohnt wird und sich vom Heimatgebiet des Souveräns unterscheidet."
 syncretism:0 "Synkretismus"
 syncretism_desc:0 "Synkretistische Politik oder spektral-synkretistische Politik kombiniert Elemente aus dem gesamten konventionellen politischen Links-Rechts-Spektrum. Die Idee der synkretistischen Politik wurde vom Synkretismus und der synkretistischen Religion beeinflusst. Die Grundidee der synkretistischen Politik besteht darin, durch die Kombination von Elementen der Linken und Rechten durch die Einnahme politischer Neutralität ein Ziel der Versöhnung zu erreichen."
 christian_fascism:0 "Christlicher Faschismus"
 christian_fascism_desc:0 "Der christliche Faschismus bezeichnet die Schnittstelle zwischen Faschismus und Christentum und umfasst auch die faschistischen, totalitären und imperialistischen Aspekte der christlichen Kirche. Er wird manchmal als „Christofaschismus“ bezeichnet, ein Neologismus, der 1970 von der Befreiungstheologin Dorothee Sölle geprägt wurde."
 
 
 ### AUTHORITARIAN SUBIDEOLOGIES
 green:0 "Grüne Politik"
 green_desc:0 "Grüne Parteien engagieren sich für die Umwelt und setzen auf erneuerbare Energien. Sie sind sozial und wirtschaftlich liberal."
 nonaligned_conservatism:0 "Konservatismus"
 nonaligned_conservatism_desc:0 "Da der Konservatismus schnelle gesellschaftliche Veränderungen als potenziell schädlich betrachtet, bekennt er sich zur Tradition und zu gemäßigten Reformen und plädiert manchmal für eine Rückkehr zu alten moralischen Werten."
 nonaligned_liberalism:0 "Liberalismus"
 nonaligned_liberalism_desc:0 "Der Liberalismus, der auf eine lange philosophische Tradition der Wertschätzung persönlicher Freiheit zurückblickt, betrachtet die Wahrung dieser Rechte als die Hauptaufgabe des Staates."
 nonaligned_socialdemocracy:0 "Sozialdemokratie"
 nonaligned_socialdemocracy_desc:0 "Die Sozialdemokratie unterstützt wirtschaftliche und soziale Maßnahmen zur Förderung sozialer Gerechtigkeit im Rahmen einer kapitalistischen Wirtschaft sowie das Bekenntnis zur repräsentativen Demokratie, zu Maßnahmen der Einkommensumverteilung und zur Regulierung der Wirtschaft im Interesse der Allgemeinheit und zu wohlfahrtsstaatlichen Maßnahmen."
 nonaligned_socialism:0 "Sozialismus"
 nonaligned_socialism_desc:0 "Sozialismus umfasst verschiedene Wirtschafts- und Gesellschaftssysteme, die sich durch gesellschaftliches Eigentum an den Produktionsmitteln und die Selbstverwaltung der Arbeiter auszeichnen, sowie die damit verbundenen politischen Theorien und Bewegungen. Gesellschaftliches Eigentum kann öffentliches, kollektives oder kooperatives Eigentum oder Bürgereigentum an Kapital sein. Es gibt viele Spielarten des Sozialismus, und es gibt keine einheitliche Definition, die alle umfasst. Das gemeinsame Element aller Formen ist das gesellschaftliche Eigentum."
 despotism:0 "Absolute Monarchie"
 despotism_desc:0 "Absolutismus ist eine Form der Monarchie, bei der der Herrscher die absolute Macht besitzt."
 oligarchism:0 "Oligarchie"
 oligarchism_desc:0 "Oligarchie ist eine Regierungsform, in der eine Gruppe von Menschen mit absoluter Macht herrscht."
 moderatism:1"Moderatismus"
 moderatism_desc:1"Moderatismus ist eine Regierungsform, die die Extreme von links und rechts vermeidet, indem sie eine gemäßigte Position oder Vorgehensweise einnimmt."
 centrism:1"Zentrismus"
 centrism_desc:1"Der Zentrismus ist eine Regierungsform, die auf der Suche nach vernünftigen Lösungen ist, die den aktuellen und zukünftigen Bedürfnissen angemessen Rechnung tragen, das öffentliche Vertrauen stärken und dem Gemeinwohl dienen, wobei Risiken und Kapazitäten im Kontext dieser Bedürfnisse berücksichtigt werden."
 authoritarian_democracy:0 "Autoritäre Demokratie"
 authoritarian_democracy_desc:0 "Autoritäre Demokratien verbinden eine starke Exekutive mit einem repräsentativen Parlament und einem partiell demokratischen politischen System. Autoritäre demokratische Regime vertreten oft eine konservative Haltung in sozialen Fragen und fördern liberal-kapitalistische Wirtschaftssysteme mit begrenzten staatlichen Eingriffen. Ziel dieser Regime ist die Wahrung der nationalen Stabilität und die Bereitstellung einer populären und verantwortungsvollen Regierung für die Bevölkerung."
 reactionary:0 "Reaktionär"
 reactionary_desc:0 "Ein Reaktionär ist eine Person, deren politische Ansichten eine Rückkehr zum Status quo ante befürworten, dem früheren politischen Zustand der Gesellschaft. Dieser Zustand besaß ihrer Meinung nach Eigenschaften (Disziplin, Respekt vor Autorität usw.), die im heutigen Status quo einer Gesellschaft negativ fehlen. Als Adjektiv beschreibt das Wort „reaktionär“ Standpunkte und politische Maßnahmen, die den Status quo ante wiederherstellen sollen."
 pseudo_fascism:0 "Autoritarismus mit faschistischen Elementen"
 pseudo_fascism_desc:0 "Eine konservative, autoritäre und entschieden antikommunistische Regierung. Ihre Rhetorik ist vom faschistischen Italien inspiriert, es handelt sich jedoch nicht um eine vollwertige faschistische Diktatur."
 military_clique:0 "Militärclique"
 military_clique_desc:0 "Wenn eine Nation zerfällt, herrscht das Gesetz des Stärkeren. Auf diese Weise werden Militärgruppen gebildet, die im Allgemeinen aus denjenigen bestehen, die bereits über die entsprechende militärische Kompetenz verfügen. Diese agieren entsprechend ihrer Einflussgebiete und verteidigen ihre eigenen Interessen."
 theocratic_monarchism:0 "Theokratischer Monarchismus"
 theocratic_monarchism_desc:0 "Der theokratische Monarchismus ist eine Ideologie, die durch eine auf dem Gottesgnadentum beruhende Monarchie gekennzeichnet ist."
 pan_arabism:0 "Panarabismus"
 pan_arabism_desc:0 "Der Panarabismus ist eine Ideologie, die die Vereinigung der Länder Nordafrikas und Westasiens vom Atlantik bis zum Arabischen Meer, der sogenannten arabischen Welt, befürwortet. Er ist eng mit dem arabischen Nationalismus verbunden, der die Araber als eine einzige Nation betrachtet. Seine Popularität erreichte in den 1950er und 1960er Jahren ihren Höhepunkt. Befürworter des Panarabismus vertraten oft sozialistische Prinzipien und lehnten ein politisches Engagement des Westens in der arabischen Welt entschieden ab."
 christianity:0 "Christliche Theokratie"
 christianity_desc:0 "Das Christentum ist eine abrahamitische monotheistische Religion, die auf dem Leben und den Lehren Jesu von Nazareth basiert. Seine Anhänger, die sogenannten Christen, glauben, dass Jesus Christus ist, dessen Kommen als Messias in der hebräischen Bibel, dem Alten Testament des Christentums, prophezeit und im Neuen Testament aufgezeichnet wurde."
 judaism:0 "Jüdische Theokratie"
 judaism_desc:0 "Das Judentum ist die ethnische Religion des jüdischen Volkes."
 buddhism:0 "Buddhistische Theokratie"
 buddhism_desc:0 "Der Buddhismus ist die viertgrößte Religion der Welt mit über 520 Millionen Anhängern oder über 7 % der Weltbevölkerung, die als Buddhisten bekannt sind."
 hinduism:0 "Hinduistische Theokratie"
 hinduism_desc:0 "Der Hinduismus ist nach Ansicht vieler Gelehrter die älteste Religion der Welt, deren Wurzeln und Bräuche mehr als 4.000 Jahre zurückreichen."
 nationalism:0 "Nationalismus"
 nationalism_desc:0 "Nationalismus ist eine Ideologie und Bewegung, die sich für die Interessen einer bestimmten Nation einsetzt, insbesondere mit dem Ziel, die Souveränität (Selbstverwaltung) der Nation über ihr Heimatland zu erlangen und zu erhalten. Der Nationalismus vertritt die Ansicht, dass jede Nation sich selbst regieren sollte, frei von äußeren Einflüssen (Selbstbestimmung), dass eine Nation die natürliche und ideale Grundlage für ein Gemeinwesen darstellt und dass die Nation die einzig rechtmäßige Quelle politischer Macht ist (Volkssouveränität)." 
 populism:0 "Populismus"
 populism_desc:0 "Populismus bezeichnet eine Reihe politischer Positionen, die das Volk in den Vordergrund stellen und es oft der Elite gegenüberstellen. Der Begriff entwickelte sich im 19. Jahrhundert und wurde seitdem auf verschiedene Politiker, Parteien und Bewegungen angewendet, obwohl er selten als Selbstbeschreibung gewählt wurde. In der Politikwissenschaft und anderen Sozialwissenschaften gibt es verschiedene Definitionen von Populismus, wobei einige Wissenschaftler vorschlagen, den Begriff gänzlich abzulehnen."
 militarism:0 "Militärdiktatur"
 militarism_desc:0 "Eine Militärdiktatur ist eine Regierungsform, die sich aus mehreren Gründen von einer zivilen Diktatur unterscheidet: die Motivationen für die Machtergreifung, die Institutionen, über die sie ihre Herrschaft organisiert, und die Art und Weise, wie sie die Macht abgibt. Militärdiktaturen sehen sich oft als Retter der Nation vor korrupten oder kurzsichtigen zivilen Politikern und rechtfertigen ihre Position als „neutraler“ Schiedsrichter mit ihrer Mitgliedschaft in den Streitkräften."
 chinese_nationalism:0 "Chinesischer Nationalismus"
 chinese_nationalism_desc:0 "Der chinesische Nationalismus ist die Form des Nationalismus in China, die behauptet, dass das chinesische Volk eine Nation ist, und die kulturelle und nationale Einheit der Chinesen fördert."
 pan_africanism:0 "Panafrikanismus"
 pan_africanism_desc:0 "Der Panafrikanismus ist eine weltweite Bewegung, die die Solidarität zwischen Menschen afrikanischer Abstammung fördern und stärken will. Die Bewegung basiert auf einem gemeinsamen Schicksal, das auf den atlantischen Sklavenhandel zurückgeht. Sie erstreckt sich über Kontinentalafrika hinaus und genießt große Unterstützung in der afrikanischen Diaspora in der Karibik, Lateinamerika und den USA."
 african_nationalism:0 "Afrikanischer Nationalismus"
 african_nationalism_desc:0 "Afrikanischer Nationalismus ist ein Oberbegriff für eine Gruppe politischer Ideologien, vorwiegend in Subsahara-Afrika, die auf der Idee nationaler Selbstbestimmung und der Schaffung von Nationalstaaten basieren. Die Ideologie entstand unter der europäischen Kolonialherrschaft im 19. und 20. Jahrhundert und war lose von nationalistischen Ideen aus Europa inspiriert. Ursprünglich basierte der afrikanische Nationalismus auf Forderungen nach Selbstbestimmung und spielte eine wichtige Rolle bei der forcierten Dekolonisierung Afrikas (ca. 1957–1966). Der Begriff bezieht sich jedoch auf ein breites Spektrum unterschiedlicher ideologischer und politischer Bewegungen und sollte nicht mit dem Panafrikanismus verwechselt werden, der die Föderation mehrerer oder aller Nationalstaaten Afrikas anstrebt."
 metaxism:0 "Metaxismus"
 metaxism_desc:0 "Der Metaxismus ist eine totalitäre nationalistische Ideologie, die mit dem griechischen Diktator Ioannis Metaxas in Verbindung gebracht wird. Sie forderte die Erneuerung der griechischen Nation und die Errichtung eines modernen, kulturell homogenen Griechenlands. Der Metaxismus verachtete den Liberalismus und betrachtete individuelle Interessen als denen der Nation untergeordnet. Er versuchte, das griechische Volk als disziplinierte Masse für die Schaffung eines neuen Griechenlands zu mobilisieren."
 austrofascim_ideology:0 "Austrofaschismus"
 austrofascism_desc:0 "Der Austrofaschismus war das autoritäre System, das mit der Maiverfassung von 1934 in Österreich eingeführt wurde und mit dem Anschluss des neu gegründeten Bundeslandes Österreich an Nazi-Deutschland 1938 endete. Es basierte auf einer Regierungspartei, der Vaterländischen Front, und der paramilitärischen Miliz Heimwehr. Anführer waren Engelbert Dollfuß und, nach dessen Ermordung, Kurt Schuschnigg, die zuvor Politiker der Christlichsozialen Partei waren, die schnell in die neue Bewegung integriert wurde."
 kemalism:0 "Kemalismus"
 kemalism_desc:0 "Der Kemalismus ist eine Ideologie, die Ähnlichkeiten mit Nationalismus und Sozialismus aufweist. Die wichtigsten Grundlagen der Ideologie sind Republikanismus, Populismus, Nationalismus, Säkularismus, Etatismus und Reformismus. Begründet wurde sie von Mustafa Kemal Atatürk, dem ersten Präsidenten der Türkei."
 putinism:0 "Putinismus"
 putinism_desc:0 "Der Putinismus ist das politische System Russlands, das während der Herrschaft von Wladimir Putin entstand. Charakteristisch ist die Konzentration politischer und finanzieller Macht in den Händen von Silowiks – aktiven und ehemaligen Leuten mit Schulterklappen aus insgesamt 22 staatlichen Sicherheitsorganen, vor allem dem FSB, der Polizei, der Armee und der Nationalgarde der Russischen Föderation."
 fujimorism:0 "Fujimorismus"
 fujimorism_desc:0 "Der Begriff Fujimorismus bezeichnet die Politik und die politische Ideologie des ehemaligen peruanischen Präsidenten Alberto Fujimori sowie den Personenkult um ihn, seine Politik und seine Familie. Die Ideologie zeichnet sich durch ihre Unterstützung des sozialen Konservatismus und der neoliberalen Wirtschaftspolitik sowie ihre Opposition gegen die extreme Linke und die extreme Rechte aus."
 pinochetism:0 "Pinochetismus"
 pinochetism_desc:0 "Pinochetismus ist die konservative Ideologie, die mit der Pinochet-Regierung in Verbindung gebracht wird."
 republicanism:0 "Republikanismus"
 republicanism_desc:0 "Republikanismus ist eine repräsentative Regierungsform. Es handelt sich um eine politische Ideologie, die sich auf die Staatsbürgerschaft in einem republikanischen Staat konzentriert. Historisch gesehen reicht die Bandbreite von der Herrschaft einer repräsentativen Minderheit oder Oligarchie bis hin zur Volkssouveränität. Republikanismus hat unterschiedliche Definitionen und Interpretationen, die je nach historischem Kontext und methodischem Ansatz stark variieren."
 agrarianism:0 "Agrarismus"
 agrarianism_desc:0 "Der Agrarismus ist eine Sozialphilosophie oder politische Philosophie, die die ländliche Gesellschaft der städtischen Gesellschaft und den unabhängigen Landwirt dem bezahlten Arbeiter überlegen sieht und die Landwirtschaft als eine Lebensweise betrachtet, die ideale soziale Werte prägen kann. Sie betont die Überlegenheit eines einfacheren Landlebens gegenüber der Komplexität des Stadtlebens."
 erdoganism:0 "Erdoganismus"
 erdoganism_desc:0 "Der Erdoganismus bezieht sich auf die politischen Ideale und die Agenda des türkischen Präsidenten und ehemaligen Premierministers Recep Tayyip Erdoğan, der 2003 Premierminister wurde und dieses Amt bis zu seiner Wahl zum Präsidenten im Jahr 2014 innehatte."
 nasserism:0 "Nasserismus"
 nasserism_desc:0 "Der Nasserismus ist eine sozialistische, arabisch-nationalistische politische Ideologie, die auf den Ideen Gamal Abdel Nassers basiert, einem der beiden Hauptführer der Julibewegung von 1952 und dem zweiten Präsidenten Ägyptens. Er umfasst nationale und internationale Aspekte und vereint Elemente des arabischen Sozialismus, des Republikanismus, des Nationalismus, des Antiimperialismus, der Solidarität mit den Entwicklungsländern und der internationalen Blockfreiheit."
 baathism:0 "Baathismus"
 baathism_desc:0 "Der Baathismus ist eine arabisch-nationalistische Ideologie, die die Entwicklung und Schaffung eines einheitlichen arabischen Staates durch die Führung einer Avantgarde-Partei gegenüber einer fortschrittlichen revolutionären Regierung fördert. Die Ideologie basiert offiziell auf den Theorien der syrischen Intellektuellen Michel Aflaq, Zaki al-Arsuzi und Salah al-Din al-Bitar."
 independent:0 "Unabhängig"
 independent_desc:0 "Ein unabhängiger Politiker ist ein einzelner Politiker, der keiner politischen Partei angehört."
 colonialism:0 "Kolonialverwaltung"
 colonialism_desc:0 "Eine Kolonie ist ein Gebiet, das unter der unmittelbaren und vollständigen politischen Kontrolle eines Staates steht und von Siedlern bewohnt wird und sich vom Heimatgebiet des Souveräns unterscheidet."
 paternal_autocrat:0 "Väterlicher Autokrat"
 paternal_autocrat_desc:0 "Paternale Autokratie ist keine politische Ideologie im herkömmlichen Sinne, sondern ein allgemeiner Begriff für die Haltung dieser Regierungen gegenüber ihren Bürgern. Die Bevölkerung ist dem Herrscher, sei es König oder Diktator, untertan. Seine Aufgabe und Pflicht ist es, Staat und Gesellschaft auf den rechten und besten Weg zu führen und die Bevölkerung unter seinem wohlwollenden Schutz zu vereinen. Diese Länder zeichnen sich in der Regel durch eine sehr autoritäre Regierung, konservative Gesellschaftsansichten und eine staatlich gelenkte Wirtschaft aus."
