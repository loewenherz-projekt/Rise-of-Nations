 ENG_destroyer_1918_desc:0 "Zu diesen Zerstörern gehörten die Admirality- und Thornycroft-Klassen V und W. Sie wurden im Rahmen des War Emergency Program gebaut. Sie stellten die ultimative Weiterentwicklung des britischen Zerstörerdesigns während des Ersten Weltkriegs dar und verkörperten die Verbesserungen ihrer Vorgänger sowie neue technologische Fortschritte. In der Spätphase des Ersten Weltkriegs wurden diese Schiffe in großer Zahl gebaut und bildeten danach das Rückgrat der Zerstörerflottillen der Royal Navy. Ab den 1930er Jahren wurden sie in Reserveflotten eingesetzt und schließlich nur noch zur Konvoibegleitung eingesetzt. Es handelte sich um ausreichend bewaffnete, schnelle Schiffe mit guter Reichweite."
