 SOV_CW_Beria_Agenda:0"Berias Agenda"
SOV_CW_Beria_Agenda_desc:0"Lawrentij Beria, Chef des NKWD, hat ein ehrgeiziges Programm gestartet, um seine Macht zu festigen und seine Kontrolle über die Sowjetunion zu verstärken. Ziel dieser Maßnahmen ist es, die Macht zu zentralisieren, die Opposition auszuschalten und die Loyalität wichtiger Funktionäre zu sichern."

SOV_CW_consolidate_power:0"Konsolidieren Sie Ihre Macht"
SOV_CW_consolidate_power_desc:0"Berija platziert seine Anhänger strategisch in Schlüsselpositionen in Regierung und Militär. Auf diese Weise will er sicherstellen, dass alle Aspekte der sowjetischen Regierung unter seiner Kontrolle stehen und den Einfluss potenzieller Rivalen verringern."

SOV_CW_secret_police:0"Stärkung der Geheimpolizei"
SOV_CW_secret_police_desc:0"Beria erweitert die Möglichkeiten des NKWD und macht ihn zu einem noch mächtigeren Überwachungs- und Unterdrückungsinstrument. Ziel ist es, abweichende Meinungen auszumerzen und Berias Vorherrschaft durch Angst und sorgfältige Überwachung der Bevölkerung zu sichern."

SOV_CW_meeting_officials:0"Treffen mit wichtigen Beamten"
SOV_CW_meeting_officials_desc:0"Beria hat eine Reihe strategischer Treffen mit einflussreichen Politikern anberaumt, darunter prominente Militärs und regionale Parteichefs. Diese Treffen sind entscheidend, um ihre Loyalität zu sichern und sicherzustellen, dass sie seine Agenda unterstützen."

SOV_CW_purge_opposition:0"Säubern Sie die Opposition"
SOV_CW_purge_opposition_desc:0"Berijas Säuberungsaktion zielt auf hochrangige Persönlichkeiten wie Georgi Schukow und Nikolai Bulganin, die eine potenzielle Bedrohung für seine Macht darstellen. Ziel dieser rücksichtslosen Kampagne ist es, jeglichen Widerstand innerhalb der Partei und des Militärs zu eliminieren."

SOV_CW_military_loyalty:0"Sichern Sie sich die militärische Loyalität"
SOV_CW_military_loyalty_desc:0"Um Militärputsche zu verhindern, konzentriert sich Beria darauf, die Loyalität wichtiger Militärs zu sichern. Indem er Loyalisten belohnt und Andersdenkende ausschaltet, will er die uneingeschränkte Unterstützung der Roten Armee für sein Regime sicherstellen."

SOV_CW_biological_research:0"Biologische Forschung ausbauen"
SOV_CW_biological_research_desc:0"Beria investiert Ressourcen in die biologische Forschung und strebt nach Fortschritten, die die sowjetischen Fähigkeiten stärken könnten. Dieser Fokus auf Wissenschaft und Technologie soll der UdSSR einen strategischen Vorteil verschaffen."

SOV_CW_expand_secret_police:0"Ausbau der Geheimpolizei"
SOV_CW_expand_secret_police_desc:0"Beria stärkt nicht nur den NKWD, sondern erweitert auch dessen Einflussbereich. Überall in der Sowjetunion werden neue Zweigstellen gegründet, um eine umfassende Überwachung und Kontrolle aller Regionen zu gewährleisten."

SOV_CW_remilitarize_border:0"Remilitarisierung der Westgrenze"
SOV_CW_remilitarize_border_desc:0"Als Reaktion auf äußere Bedrohungen und innere Instabilität ordnete Berija die Remilitarisierung der Westgrenzen an. Ziel dieses Schritts ist es, die sowjetische Verteidigung zu stärken und sowohl im In- als auch im Ausland Stärke zu demonstrieren."
 