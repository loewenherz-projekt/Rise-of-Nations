 FRA_battleship_1906:0 "Danton-Klasse"
 FRA_battleship_1906_desc:0 "Die Condorcet, die Danton, die Diderot, die Mirabeau, die Vergniaud und die Voltaire waren sechs Halbdreadnought-Schlachtschiffe der Danton-Klasse, die Anfang des 20. Jahrhunderts für die französische Marine gebaut wurden."
 FRA_battleship_1910:0 "Courbet-Klasse"
 FRA_battleship_1910_desc:0 "Die Schlachtschiffe der Courbet-Klasse waren die ersten Super-Dreadnoughts, die vor und während des Ersten Weltkriegs für die französische Marine gebaut wurden. Sie waren im Ersten Weltkrieg nur eingeschränkt im Einsatz, im Zweiten Weltkrieg jedoch aktiv. Obwohl sie über eine stärkere Panzerung und stärkere Geschütze als die vorherigen Schlachtschiffe der Dante-Klasse verfügten, waren sie den zeitgenössischen Schlachtschiffen der US Navy und Royal Navy immer noch unterlegen. Sie verdrängten etwas mehr als 22.000 Tonnen und wurden vor dem Zweiten Weltkrieg lediglich durch eine verbesserte Flugabwehr und verbesserte Kessel modernisiert."
 FRA_battleship_1914:0 "Bretagne-Klasse"
 FRA_battleship_1914_desc:0 "Die Schlachtschiffe der Bretagne-Klasse waren die ersten „Super-Dreadnoughts“, die während des Ersten Weltkriegs für die französische Marine gebaut wurden. Die Klasse bestand aus drei Schiffen: der Bretagne, dem Typschiff, der Provence und der Lorraine. Sie waren eine Verbesserung der vorherigen Courbet-Klasse."
 FRA_battleship_1918:0 "Normandie-Klasse"
 FRA_battleship_1918_desc:0 "Die Normandie-Klasse bestand aus fünf Dreadnought-Schlachtschiffen, die zwischen 1912 und 1913 für die französische Marine bestellt wurden. Aufgrund veränderter Produktionsanforderungen und eines Arbeitskräftemangels nach Beginn des Ersten Weltkriegs wurden die Schiffe nie fertiggestellt."

 FRA_battle_cruiser_1914:0 "Gilles Design"
 FRA_battle_cruiser_1914:0 "1911 reiste Gille nach Großbritannien, um den Bau der neuen Schlachtschiffe der Orion-Klasse und der Schlachtkreuzer der Lion-Klasse zu beobachten. Letztere Schiffe veranlassten Gille zu der Entscheidung, dass auch die französische Marine Schlachtkreuzer bauen sollte, da Großbritannien und Deutschland bereits mit der Anschaffung solcher Schiffe begonnen hatten."

 FRA_battle_cruiser_1918:0 "Durand-Viels Entwurf A"
 FRA_battle_cruiser_1918_desc:0 "Der Durand-Viel-Schlachtkreuzerentwurf war ein Vorschlag aus einer Reihe von Studien aus dem Ersten Weltkrieg. Es handelte sich im Wesentlichen um Schlachtkreuzerversionen der Schlachtschiffklassen Normandie und Lyon mit denselben vierfachen Türmen und Geschützen, wenn auch in reduzierter Anzahl. Wie zeitgenössische Schlachtkreuzer anderer Marinen sollten sie schneller, aber schwächer gepanzert als ein Schlachtschiff sein. Ihr Bau wurde vor Ausbruch des Ersten Weltkriegs eingestellt."

