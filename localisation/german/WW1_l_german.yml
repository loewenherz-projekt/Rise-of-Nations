ww1_oil1:0 "Ölförderung"
ww1_oil1_desc:0 "Öl und seine Verwendungsmöglichkeiten sind seit dem späten 19. Jahrhundert bekannt, und leider sind die meisten unserer Möglichkeiten zur Ölförderung noch immer nicht so weit fortgeschritten. Durch die Modernisierung unserer Ölquellen werden wir unsere Ausbeute an dieser wertvollen Substanz deutlich steigern können."
ww1_oil2:0 "Verbesserte Ölbohrungen"
ww1_oil2_desc:0 "Öl ist schwer zu finden – es versteckt sich unter der Erde, wo niemand es sehen kann. Deshalb ist es unerlässlich, effizientere Methoden zu entwickeln, um es zu finden. Durch die Verbesserung unserer Ölbohrkapazitäten können wir mehr Öl in der Umgebung bestehender Reserven finden und fördern."
ww1_oil3:0 "Ausbildung zum Ölarbeiter"
ww1_oil3_desc:0 "Angesichts der jüngsten Fortschritte bei der Ölsuche und -förderung dürfen wir nicht zulassen, dass unsere Arbeiter der Grund für unsere Bemühungen sind. Durch die Festlegung von Ausbildungsstandards für Ölfeldarbeiter im privaten und öffentlichen Sektor können wir dafür sorgen, dass weniger Öl verschwendet wird und unsere neu entdeckten Reserven an schwarzem Gold weiter gestärkt werden."

ww1_bergiusprocess:0 "Bergius-Prozess"
ww1_bergiusprocess_desc:0 "Das Bergius-Verfahren ist ein Verfahren zur Herstellung flüssiger Kohlenwasserstoffe zur Verwendung als synthetischer Kraftstoff durch Hydrierung von hochflüchtiger bituminöser Kohle bei hoher Temperatur und hohem Druck."
 
 
