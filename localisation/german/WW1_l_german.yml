ww1_total_dictatorship:0 "Verkünden Sie die totale Diktatur im Ersten Weltkrieg"
ww1_diplomatic_effort:0 "Diplomatische Bemühungen im Ersten Weltkrieg"
ww1_diplomatic_effort_desc:0 "Irgendwann in naher Zukunft müssen wir unsere diplomatischen Kanäle für das Ausland öffnen, um unser Überleben in der sich ständig verändernden Welt zu sichern."
ww1_take_position:0 "Wähle eine Seite im Ersten Weltkrieg"
ww1_take_position_desc:0 "Entente oder Mittelmächte, unsere Nation muss eine von ihnen unterstützen, welche wird es sein?"
ww1_support_central_powers:0 "Unterstützen Sie die Mittelmächte im Ersten Weltkrieg"
ww1_support_central_powers_desc:0 "Die naheliegende Wahl sind natürlich die Mittelmächte. Ihre Politik entspricht unseren eigenen Zielen, wir müssen ihnen im Kampf gegen unsere Feinde helfen."
ww1_support_germany:0 "Unterstützen Sie Deutschland im Ersten Weltkrieg"
ww1_support_germany_desc:0 "Das Deutsche Reich kann seine Feinde nicht allein bekämpfen, wir müssen ihm jede erdenkliche Unterstützung zukommen lassen."
ww1_support_german_politics:0 "Unterstützen Sie die Außenpolitik des Kaisers im Ersten Weltkrieg"
ww1_support_german_politics_desc:0 "Damit der Kaiser uns noch sympathischer macht, müssen wir seine Außenpolitik unterstützen."
ww1_anti_french_propaganda:0 "Sanktionen gegen Frankreich im Ersten Weltkrieg"
ww1_anti_french_propaganda_desc:0 "Die widerliche französische Politik ist seit langem eine Plage für Europa. Es ist an der Zeit, dass wir uns lautstark dagegen wehren und Wirtschaftssanktionen verhängen."
ww1_kaiser_state_visit:0 "Der Kaiser besucht [From.Capital.GetName] WWI"
ww1_kaiser_state_visit_desc:0 "Um unsere Bindungen zum Deutschen Reich zu stärken, müssen wir den Kaiser persönlich in unsere Hauptstadt einladen. Lasst die Feier so laut wie möglich sein!"
ww1_support_austria_hungary:0 "Unterstützen Sie Österreich-Ungarn im Ersten Weltkrieg"
ww1_support_austria_hungary_desc:0 "Das Österreichisch-Ungarische Reich ist von sich aus stark, doch die wahre Stärke kommt von den Verbündeten, die man hat, denn man kann nicht die ganze Welt allein bekämpfen. Wir sind verpflichtet, ihnen auf jede erdenkliche Weise zu helfen."
ww1_oppose_pan_slavs:0 "Gegen den Panslawismus im Ersten Weltkrieg"
ww1_oppose_pan_slavs_desc:0 "Die Russen machen uns schon seit einiger Zeit zu schaffen. Wir müssen es ihnen mit Hilfe unserer neu gewonnenen Freunde heimzahlen und der russischen Bedrohung endlich ein Ende setzen."
ww1_anti_russian_propaganda:0 "Sanktionen gegen Russland im Ersten Weltkrieg"
ww1_anti_russian_propaganda_desc:0 "Um dem russischen Imperium weiteren Schaden zuzufügen und die schmutzige Ausbreitung des russischen Imperiums zu stoppen, werden wir Sanktionen gegen das russische Imperium verhängen."
ww1_kuk_state_visit:0 "Die KuK besucht [From.Capital.GetName] WWI"
ww1_join_central_powers:0 "Schließen Sie sich den Mittelmächten im Ersten Weltkrieg an"
ww1_join_central_powers_desc:0 "Nachdem wir nun mit den großen Ländern der Mittelmächte Freundschaft geschlossen haben, können wir sie um ihren Segen bitten, uns ihrer Fraktion anzuschließen."
ww1_support_entente:0 "Unterstützen Sie die Entente im Ersten Weltkrieg"
ww1_support_entente_desc:0 "Die offensichtliche Wahl ist hier die Entente. Wir müssen die Freiheit der Welt vor autoritären Kriegstreibern mit jedem Tropfen unseres Blutes schützen."
ww1_support_france:0 "Unterstützen Sie Frankreich im Ersten Weltkrieg"
ww1_support_france_desc:0 "Frankreich grenzt direkt an das Deutsche Reich und im Falle eines Krieges würde dies für eine Seite nicht gut ausgehen. Wir müssen der französischen Regierung auf jede erdenkliche Weise helfen, damit sie im Ernstfall auf der Gewinnerseite steht."
ww1_support_french_politics:0 "Unterstützen Sie den französischen Revanchismus im Ersten Weltkrieg"
ww1_support_french_politics_desc:0 "Wenn wir wollen, dass Frankreich erfolgreich ist, müssen wir seine Entscheidungen unterstützen, ganz gleich, wie diese ausfallen."
ww1_anti_german_propaganda:0 "Sanktionen gegen Deutschland im Ersten Weltkrieg"
ww1_anti_german_propaganda_desc:0 "Deutschland ist als Kriegstreiber bekannt. Um zu zeigen, dass andere seine Politik nicht gutheißen, müssen wir Sanktionen verhängen."
ww1_french_official_language:0 "Bringen Sie französische Diplomaten dazu, mit uns über die Probleme der Welt zu sprechen"
ww1_french_official_language_desc:0 "Um unsere Beziehungen zu Frankreich zu stärken, müssen wir aktuelle Probleme in der Welt diskutieren und ein gegenseitiges Verständnis erreichen."
ww1_support_russia:0 "Unterstützen Sie Russland im Ersten Weltkrieg"
ww1_support_russia_desc:0 "Russland hat seine eigenen Probleme, aber jetzt müssen wir unsere Differenzen beilegen und die Regierung dabei unterstützen, den gemeinsamen Feind zu besiegen."
ww1_support_pan_slavs:0 "Unterstützung panslawischer Ideale im Ersten Weltkrieg"
ww1_support_pan_slavs_desc:0 "Um Russland bei der Vorbereitung auf einen möglichen Krieg zu helfen, müssen wir seine Ideen unterstützen, ganz gleich, um welche Ideen es sich handelt."
ww1_denounce_austria_hungary:0 "Sanktionieren Sie den Vielvölkerstaat im Ersten Weltkrieg"
ww1_denounce_austria_hungary_desc:0 "Österreich ist wie Deutschland eine sehr feindselige Nation. Wir müssen zeigen, dass wir keine Angst vor ihnen haben."
ww1_tsar_state_visit:0 "Der Zar besucht [From.Capital.GetName] WWI"
ww1_tsar_state_visit_desc:0 "Um unsere Beziehungen zu Russland zu stärken, werden wir den Zaren in unsere Hauptstadt einladen. Wir müssen ihm zeigen, dass wir ein würdiger Verbündeter sind."
ww1_join_entente:0 "Treten Sie der Entente im Ersten Weltkrieg bei"
ww1_join_entente_desc:0 "Nachdem wir unsere Position in der Entente gestärkt haben, werden wir sie bitten, sich uns anzuschließen und den gemeinsamen Feind zu besiegen."
ww1_foreign_officers:0 "Einladung ausländischer Offiziere im Ersten Weltkrieg"
ww1_foreign_officers_desc:0 "Um unseren Horizont in Bezug auf die Kriegsführung zu erweitern, müssen wir die Meinung ausländischer Offiziere einholen. Denn sie verfügen möglicherweise über mehr Erfahrung als wir. Was haben wir zu verlieren?"
ww1_weapon_exports:0 "Waffenexport 1. Weltkrieg"
ww1_weapon_exports_desc:0 "Waffenexporte sind der beste Weg, Geld und Freunde zu gewinnen. Warum sollten wir es nicht tun?"
ww1_volountaries:0 "Gründung eines Freiwilligenkorps im Ersten Weltkrieg"
ww1_volountaries_desc:0 "Manchmal, wenn wir nicht an einem direkten Krieg interessiert sind, sind Freiwilligentruppen die bessere Möglichkeit, unsere Sache in der Welt zu unterstützen. Wir sollten in die Schaffung besser zugänglicher Freiwilligenbataillone investieren."
ww1_joint_development:0 "Gemeinsame industrielle Entwicklung im Ersten Weltkrieg"
ww1_joint_development_desc:0 "Um sicherzustellen, dass wir und unsere Verbündeten in der Fertigung führend sind, müssen wir ein gemeinsames Industrieentwicklungsprogramm einrichten, das den Austausch von Industriewissen und -plänen ermöglicht. Auf diese Weise können wir ausländische Designs mit unseren vergleichen und gegebenenfalls Korrekturen vornehmen."
ww1_foreign_attache:0 "Ein Auslandsattaché im Ersten Weltkrieg"
ww1_foreign_attache_desc:0 "Wir müssen unsere Kommandozentralen weiter ausbauen, um mehr Kommandomacht zu erlangen. Wir werden ein Auslandsattachézentrum einrichten, um Erfahrungen mit verbündeten Nationen auszutauschen."
ww1_joint_research:0 "Gemeinsame Abteilung für technologische Forschung und Entwicklung im Ersten Weltkrieg"
ww1_joint_research_desc:0 "Um an der Spitze des technologischen Fortschritts zu bleiben, müssen wir Kanäle für den Technologieaustausch mit unseren Verbündeten öffnen. Auf diese Weise können wir noch stärker werden."
