 ranger_infantry:0 "Army Rangers"
 ranger_infantry_desc:0 "Elite-Luftlande-Kampfformation der leichten Infanterie innerhalb des United States Army Special Operations Command (USASOC)."
 1ssf_infantry:0 "1. Spezialeinheit"
 1ssf_infantry_desc:0 "Elite-Kommandoeinheit aus Amerika und Kanada im Zweiten Weltkrieg unter dem Kommando der Fünften Armee der Vereinigten Staaten."
 marine_raiders:0 "Marine Raiders"
 marine_raiders_desc:0 "Eliteeinheiten, die während des Zweiten Weltkriegs vom United States Marine Corps zur Durchführung spezieller amphibischer leichter Infanteriekriege aufgestellt wurden."
 meryls_marauders:0 "Meryls Rumtreiber"
 meryls_marauders_desc:0 "Eine Spezialeinheit der US-Armee für Langstreckeneinsätze im Dschungel, die im südostasiatischen Kriegsschauplatz des Zweiten Weltkriegs (auch bekannt als China-Burma-Indien-Kriegsschauplatz) kämpfte. Die Einheit wurde für ihre Tiefdurchdringungsmissionen hinter den japanischen Linien bekannt, bei denen sie oft auf zahlenmäßig überlegene japanische Streitkräfte traf."
 usa_paramarines:0 "US-Paramarines"
 usa_paramarines_desc:0 "Spezialisierte Kampfeinheit des United States Marine Corps, die darauf trainiert ist, mit dem Fallschirm aus Flugzeugen abgeworfen zu werden."
 ssf_infantry:0 "1. Spezialeinheit"
 ssf_infantry_desc:0 "Elite-Kommandoeinheit aus Amerika und Kanada im Zweiten Weltkrieg unter dem Kommando der Fünften Armee der Vereinigten Staaten."
 
 
 arabian_infantry:0 "Legion Freies Arabien"
 arabian_infantry_desc:0 "Freie Arabische Legion (deutsch: Legion Freies Arabien) war der Sammelbegriff mehrerer nationalsozialistischer deutscher Einheiten, die während des Zweiten Weltkriegs aus arabischen Freiwilligen aus dem Nahen Osten und Nordafrika gebildet wurden."
 french_infantry:0 "Légion des volontaires français"
 french_infantry_desc:0 "Die Legion französischer Freiwilliger gegen den Bolschewismus (französisch: Légion des volontaires français contre le bolchévisme, LVF) war eine kollaborative Miliz von Vichy Frankreich, die am 8. Juli 1941 gegründet wurde."
 spanish_infantry:0 "Division Española de Voluntarios"
 spanish_infantry_desc:0 "Die Blaue Division (spanisch: División Azul, deutsch: Blaue Division), von der spanischen Armee offiziell als División Española de Voluntarios bezeichnet und 250. Infanterie-Division in der deutschen Armee, war eine Einheit spanischer Freiwilliger und Wehrpflichtiger, die im Zweiten Weltkrieg in der deutschen Armee an der Ostfront dienten."
 croatian_infantry:0 "Kroatische Infanterie"
 indian_infantry:0 "Legion Freies Indien"
 indian_infantry_desc:0 "Die Freie Indische Legion (deutsch: Legion Freies Indien) war eine Militäreinheit, die während des Zweiten Weltkriegs im nationalsozialistischen Deutschland aufgestellt wurde. Sie sollte als Befreiungstruppe für das britisch beherrschte Indien dienen und bestand aus indischen Kriegsgefangenen und in Europa ausgewanderten indischen Auswanderern."
 cossack_cavalry:0 "Kosaken Kavallerie"
 cossack_cavalry_desc:0 "Die 1. Kosaken-Kavallerie-Division (deutsch: 1. Kosaken-Kavallerie-Division) war eine russische Kosakendivision der deutschen Armee, die im Zweiten Weltkrieg diente. Sie wurde an der Ostfront hauptsächlich aus Donkosaken aufgestellt, die bereits in der Wehrmacht dienten, oder aus jenen, die vor der vorrückenden Roten Armee und sowjetischen Kriegsgefangenen geflohen waren."
 
 russian_infantry:0 "Russische Befreiungsarmee"
 russian_infantry_desc:0 "Die Russische Befreiungsarmee (ROA) war eine Kollaborationsformation, die hauptsächlich aus Russen bestand und im Zweiten Weltkrieg unter deutschem Kommando kämpfte. Angeführt wurde die Armee von Andrej Wlassow, einem desertierten General der Roten Armee. Die Mitglieder der Armee werden oft als Wlassowzy bezeichnet. 1944 wurde die Armee in die Streitkräfte des Komitees zur Befreiung der Völker Russlands umbenannt."
 
 ukranian_infantry:0 "Ukrainische Befreiungsarmee"
 ukranian_infantry_desc:0 "Die Ukrainische Befreiungsarmee (UVV) war eine 1943 gegründete Dachorganisation, die allen ukrainischen Einheiten, die im Zweiten Weltkrieg in der deutschen Armee dienten, einen Sammelnamen gab."
 
 brandenburgers:0 "Brandenburger Kommando"
 brandenburgers_desc:0 "Die Brandenburger waren im Zweiten Weltkrieg Angehörige der brandenburgischen Spezialeinheit."
 
 sas_infantry:0 "SAS-Kommando"
 sas_infantry_desc:0 "Der Special Air Service (SAS) ist eine Spezialeinheit der britischen Armee. Der SAS wurde 1941 als Regiment gegründet und 1950 als Korps neu aufgestellt."
 
 sbs_infantry:0 "SBS-Kommando"
 sbs_infantry_desc:0 "Der Special Boat Service (SBS) ist eine Eliteeinheit der britischen Royal Navy. Seine Ursprünge reichen bis in den Zweiten Weltkrieg zurück, als 1940 die Army Special Boat Section gegründet wurde."
 
 british_commandos:0 "Britisches Armeekommando"
 british_commandos_desc:0 "Die Kommandos, auch bekannt als britische Kommandos, wurden während des Zweiten Weltkriegs im Juni 1940 auf Ersuchen des britischen Premierministers Winston Churchill gegründet. Er forderte eine Truppe, die Angriffe gegen das deutsch besetzte Europa durchführen konnte. Ursprünglich wurden die Kommandos aus Soldaten der britischen Armee rekrutiert, die sich freiwillig für die Special Service Brigade gemeldet hatten. Später wurden die Reihen der Kommandos jedoch von Angehörigen aller Zweige der britischen Streitkräfte und einer Reihe ausländischer Freiwilliger aus den deutsch besetzten Ländern besetzt."
 
 british_marines_commandos:0 "Royal Marine Commando"
 british_marines_commandos_desc:0 "Die 3. Kommandobrigade ist eine Kommandoformation der britischen Streitkräfte und die wichtigste Manöverformation der Royal Marines. Ihr Personal besteht überwiegend aus Royal Marines, unterstützt von Einheiten der Royal Engineers, der Royal Artillery und der Fleet Air Arm sowie weiteren qualifizierten Matrosen, Soldaten und Fliegern."
 
 british_navy_commandos:0 "Königliches Marinekommando"
 british_navy_commandos_desc:0 "Die Royal Naval Commandos waren eine Kommandoformation der Royal Navy, die während des Zweiten Weltkriegs diente."
 
 british_airforce_commandos:0 "Kommando der Royal Air Force"
 british_airforce_commandos_desc:0 "Die Royal Air Force Commandos wurden während des Zweiten Weltkriegs aus Einheiten der Royal Air Force (RAF) gebildet. Sie wurden 1942 gegründet und dienten in den europäischen und fernöstlichen Kriegsschauplätzen, bevor sie 1946 aufgelöst wurden."
 
 smoking_snakes:0 "Força Expedicionária Brasileira"
 smoking_snakes_desc:0 "Das brasilianische Expeditionskorps oder FEB (portugiesisch Força Expedicionária Brasileira; FEB) bestand aus etwa 25.700 Mann, die von der Armee und der Luftwaffe aufgestellt wurden, um an der Seite der alliierten Streitkräfte im Mittelmeerraum des Zweiten Weltkriegs zu kämpfen."
 

 
 
