   #### Events
 ww2_finland.1.t:0 "König Friedrich Kaarle ist gestorben!"
 ww2_finland.1.d:0 "Heute ist ein trauriger Tag für das finnische Volk, da ihr König Friedrich Kaarle gestorben ist."
 ww2_finland.1.a:0 "F"
   
   finland.10.t:0 "Finnische Forderungen an Schweden"
   finland.10.d:0 "Finnland hat von uns die Kontrolle über Lappland gefordert, da die finnischen Minderheiten in der Region von Finnen regiert werden sollten. Sollten wir diese Forderung ablehnen, könnte die finnische Regierung dies als Vorwand für eine Invasion nutzen."
   finland.10.a:0 "Alles für den anhaltenden Frieden"
   finland.10.b:0 "lächerliche Forderungen"
   finland.11.t:0 "Schweden überlässt uns Lappland"
   finland.11.d:0 "Nach sorgfältiger Prüfung durch alle Fraktionen der schwedischen Regierung haben sie beschlossen, unserer Bitte nachzukommen und uns die Region Schwedisch-Lappland abzutreten."
   finland.11.a:0 "Willkommen zu Hause, unsere Brüder"
   finland.12.t:0 "Schweden lehnt ab"
   finland.12.d:0 "Schweden hat unser großzügiges Angebot abgelehnt und zahlreiche hochrangige Politiker haben uns dafür sogar verspottet. Es ist Zeit, ihnen die Stärke unserer Nation zu zeigen."
   finland.12.a:0 "Zeit für den Schüler, zum Meister zu werden"
  
   finland.13.t:0 "Finnische Forderungen an Norwegen"
   finland.13.d:0 "Finnland legt uns seit einiger Zeit neue Pläne vor, die große Teile unseres nördlichen Territoriums an Finnland abtreten würden, da es befürchtet, dass wir oder jemand anderes durch diese Gebiete vordringen könnte. Obwohl die Forderungen lächerlich sind, besteht die Möglichkeit, dass Finnland, wenn wir nicht nachgeben, versuchen könnte, diese Gebiete mit Gewalt einzunehmen. "
   finland.13.a:0 "Wir können uns keinen Krieg leisten, wir werden die Forderungen akzeptieren"
   finland.13.b:0 "Wenn sie es wollen, müssen sie es nehmen"
   finland.131.t:0 "Norwegen akzeptiert unsere Anfrage"
   finland.131.d:0 "Norwegen hat unsere Argumentation verstanden und sich bereit erklärt, uns den nördlichen Teil seines Landes abzutreten. Dies sollte uns mehr Sicherheit im Norden ermöglichen."
   finland.131.a:0 "Für ein stärkeres Finnland"
   finland.14.t:0 "Norwegen lehnt ab"
   finland.14.d:0 "Norwegen hat alle unsere Bitten um die Sicherung unserer nördlichen Gebiete abgelehnt, und dafür mag es einen Grund gegeben haben. Schon jetzt beobachten wir starke norwegische Truppenbewegungen in diesen Regionen, und es ist klar, dass es nur eine Frage der Zeit ist, bis sie uns angreifen."
   finland.14.a:0 "Lasst uns sie angreifen, bevor sie uns angreifen"
   
   finland.15.t:0 "Finnische Forderungen an die Sowjetunion"
   finland.15.d:0 "Unsere finnischen Diplomaten haben uns ein ziemlich eigenartiges Paket geschickt. Es enthielt Geschenke und einen einzigen Brief. Offenbar wünschen sie sich, dass wir ihnen den Großteil unserer finnischen Grenzgebiete überlassen. Wie sollen wir darauf reagieren?"
   finland.15.a:0 "*Hick* Ja. Und mach ihnen ein Kompliment für die gute Wodka-Auswahl. Das haben sie sich verdient. *Hick*"
   finland.15.b:0 "Es scheint, als hätten unsere Nachbarn den Verstand verloren."
   finland.16.t:0 "Die Sowjetunion akzeptiert unsere Anfrage"
   finland.16.d:0 "Entgegen aller Erwartungen hat die Sowjetunion beschlossen, uns große Gebiete abzutreten. Was sie dazu bewegt haben könnte, dies überhaupt in Erwägung zu ziehen, ist uns ein Rätsel, aber man sollte Wunder nicht in Frage stellen."
   finland.16.a:0 "Wahrlich, sogar sie fürchten unsere Macht"
   finland.17.t:0 "Die Sowjetunion lehnt unsere Forderungen ab"
   finland.17.d:0 "Wie erwartet hat die Sowjetunion unsere Bitte abgelehnt. Wir hatten ohnehin nicht erwartet, dass sie unsere Notlage durch Worte verstehen würden. Nun liegt es an unseren Streitkräften, sie von der sowjetischen Bedrohung zu befreien."
   finland.17.a:0 "Die Roten kennen nur eine Sprache. Zu den Waffen."
   
   finland.18.t:0 "Finnisches Angebot an Estland"
   finland.18.d:0 "Estland, eine Nation von Finnen, die jenseits des Meeres leben. Umgeben von Menschen, die sie am liebsten vernichtet sehen würden. Es liegt an uns, sie zu verteidigen, wie wir es mit anderen Finnen um uns herum getan haben."
   finland.18.a:0 "Sie werden eine großartige Ergänzung für die finnische Nation sein"
   finland.18.b:0 "Sie werden unter unserem Schutz gedeihen"
   finland.19.t:0 "Finnland fordert die Annexion Estlands"
   finland.19.d:0 "Finnland hat uns die Annexion unseres Landes zu unserem eigenen Schutz „angeboten“. Mit der Begründung, wir könnten unsere Grenzen nicht vor unseren Nachbarn verteidigen. Obwohl undenkbar, ist dies vielleicht einem Krieg vorzuziehen, der letztlich auf unsere Ablehnung folgen würde."
   finland.19.a:0 "Wir werden ihr Angebot annehmen."
   finland.19.b:0 "Wir werden unsere Häuser gegen ALLE Eindringlinge verteidigen"
   finland.20.t:0 "Estland hat unserem Angebot zugestimmt"
   finland.20.d:0 "Nach heftigen Debatten in der estnischen Öffentlichkeit und im Parlament wurde der Beitritt Estlands zu Finnland beschlossen. Dies ist ein großer Tag für unser Land."
   finland.20.a:0 "Wir werden dies die ganze Nacht hindurch feiern"
   finland.21.t:0 "Estland lehnt ab"
   finland.21.d:0 "Estland hat unser Angebot, sich uns als Nation anzuschließen, abgelehnt. Es ist klar, dass der kommunistische Abschaum die estnische Regierung infiltriert hat, sodass uns kaum eine andere Wahl bleibt, als sie von ihren Fesseln zu befreien."
   finland.21.a:0 "Bereiten Sie das Landungsboot vor"
   finland.22.t:0 "Finnland bietet Schutz"
   finland.22.d:0 "Finnland hat uns Schutz im Austausch für die Kontrolle unserer Innen- und Außenpolitik angeboten. Schutz vor unseren Nachbarn wäre dringend notwendig, aber ist er den Preis wert?"
   finland.22.a:0 "Nur so können wir unsere Zukunft sichern"
   finland.22.b:0 "Der Preis ist zu hoch. Wir lehnen ab."
   finland.23.t:0 "Estland akzeptiert Schutz"
   finland.23.d:0 "Das estnische Parlament hat unseren Bedingungen zugestimmt, um den umfassenden Schutz der Bevölkerung vor allen Formen feindseliger Handlungen zu gewährleisten, die gegen sie verübt werden könnten."
   finland.23.a:0 "Gemeinsam sind wir stärker als je zuvor"
   finland.24.t:0 "Estland verweigert unseren Schutz"
   finland.24.d:0 "Estland hat uns signalisiert, dass es unser großzügiges Angebot ablehnen wird. Wir sollten unabhängig von den Aussagen Estlands über die Umsetzung des Schutzes diskutieren."
   finland.24.a:0 "Wir WERDEN sie beschützen"   
   
   finland.25.t:0 "Sue Frieden"
   finland.25.d:0 "Nach einer Reihe verlustreicher Schlachten ist es uns gelungen, die Kontrolle über Leningrad zu erlangen. Obwohl dies ein großer Sieg ist, ist es ungewiss, ob wir diesen Schwung beibehalten und den Rest der Sowjetunion einnehmen können. Unsere Generäle haben angekündigt, dass wir der Sowjetunion einen Friedensvertrag vorschlagen werden, der uns beide zu unseren Vorkriegsgrenzen zurückführen würde."
   finland.25.a:0 "Wir können nicht gewinnen. Das Mindeste, was wir tun können, ist zu überleben"
   finland.25.b:0 "Zum Sieg oder zum Tod"
   finland.26.t:0 "Finnland bietet Frieden an"
   finland.26.d:0 "Unsere Armeen wurden erneut von den Finnen gedemütigt. Es reicht nicht, dass wir ihren winzigen kleinen Staat nicht einnehmen konnten, sondern auch Leningrad, die Heimat der Revolution, an diese Bourgeoisie verloren haben. Nun bietet Finnland einen weißen Frieden an, um den Krieg und die Demütigung zu beenden."
   finland.26.a:0 "Lasst uns diese Demütigung beenden"
   finland.26.b:0 "Sie werden es bereuen. An alle Soldaten! Angriff!"
   finland.27.t:0 "Die Sowjets lehnten unser Angebot ab"
   finland.27.d:0 "Die Sowjetunion muss uns wirklich hassen, wenn man bedenkt, wie viele Ressourcen sie uns ständig zur Verfügung stellt. Selbst jetzt würden sie lieber Leningrad in unsere Hände fallen sehen, als Frieden zu erleben."
   finland.27.a:0 "Entschlossener Haufen, nicht wahr?"
   
   finland.40.t:0 "Finnland bietet Kapitulation an"
   finland.40.d:0 "Die Feiglinge aus Helsinki haben uns ein Kapitulationsangebot geschickt. Indem sie uns ihre nördlichen Häfen, Inseln in der Ostsee und Reparationen überlassen, hoffen sie, unsere Rachsucht zu befriedigen."
   finland.40.a:0 "Wenn sie es beenden wollen, dann wollen wir das auch"
   finland.40.b:0 "Um Gnade zu betteln wird ihnen nichts nützen"
   finland.41.t:0 "Ende des Fortsetzungskrieges"
   finland.41.d:0 "Die Sowjetunion hat unser Angebot angenommen, den Krieg zu beenden. In wenigen Monaten wäre Finnland möglicherweise nicht mehr übrig."
   finland.41.a:0 "Ich frage mich, was die Deutschen jetzt tun werden"
   finland.42.t:0 "Kein Ende des Krieges"
   finland.42.d:0 "Die Sowjetunion hat alle unsere Angebote abgelehnt und wird nichts anderes als eine bedingungslose Kapitulation akzeptieren. Trotzdem hat sich der Aufwand gelohnt."
   finland.42.a:0 "Lassen Sie sie für jeden Meter Land bezahlen, den sie nehmen"   
   finland.43.t:0 "Finnland verlässt den Krieg"
   finland.43.d:0 "Finnland hat kürzlich einen Friedensvertrag mit der Sowjetunion unterzeichnet. Das ist nicht nur eine Beleidigung, sondern auch Verrat. Wir müssen die Finnen dafür bezahlen lassen."
   finland.43.a:0 "Wir werden Finnland niederbrennen"
   finland.43.b:0 "Wir kümmern uns ein anderes Mal darum"   
   finland.43.c:0 "Glückliche Bastarde"   
   finland.44.t:0 "Der Lapplandkrieg"
   finland.44.d:0 "Das Deutsche Reich war mit unserer Entscheidung, aus dem Krieg auszusteigen, nicht zufrieden und beschloss stattdessen, uns den Krieg zu erklären."
   finland.44.a:0 "So viel zum Thema Frieden"   
   finland.45.t:0 "Deutsche Antwort"
   finland.45.d:0 "Deutschland hat seinen Hass auf uns deutlich zum Ausdruck gebracht und nach einer Flut hasserfüllter Botschaften die meisten diplomatischen Beziehungen zu uns abgebrochen. Trotzdem haben sie uns weder den Krieg erklärt noch den Handel eingestellt. Es scheint, als wären sie noch verzweifelter, als wir dachten."
   finland.45.a:0 "Schlussworte der deutschen Verrückten"      
   finland.46.t:0 "Beginn der Operation Barbarossa"
   finland.46.d:0 "Wie geplant hat Deutschland der Sowjetunion den Krieg erklärt und bereits mit dem Angriff auf sowjetische Stellungen an der Ostfront begonnen. Nun ist es an der Zeit, unsere Vereinbarung mit der Sowjetunion einzuhalten und uns ihr anzuschließen."
   finland.46.a:0 "Zum Sieg" 
   
   finland.50.t:0 "Wir haben unseren Weg verloren"
   finland.50.d:0 "Trotz der Versprechen unserer Politiker und der Forderungen unseres Volkes haben wir uns mit ausländischen Mächten verbündet, und schon bald wird finnisches Blut zu deren Belustigung vergossen werden. Um unsere neuen Aufgaben effektiv bewältigen zu können, sind in unserem Land viele Veränderungen erforderlich."
   finland.50.a:0 "Ein Opfer zur Sicherung unserer Zukunft"

   finland.60.t:0 "Schicksal Finnlands und Russlands"
   finland.60.d:0 "Russland wurde zurückerobert, und nun ist es an der Zeit zu entscheiden, wie Finnland und Russland weiterbestehen werden. Unsere Entscheidung wird in die Geschichte eingehen, und wir müssen sorgfältig entscheiden."
   finland.60.a:0 "Finnland bleibt Finnland"
   finland.60.b:0 "Wir werden uns in ein russisches Reich verwandeln"
   
   finland.61.t:0 "Uneinigkeit über die Hauptstadt"
   finland.61.d:0 "Im ganzen Reich hat eine heftige Debatte über den Standort unserer Hauptstadt begonnen. Die Russen behaupten, Helsinki sei keine geeignete Stadt für die Führung des neuen finnisch-russischen Reiches, während die Finnen darauf bestehen, dass Moskau nicht die Hauptstadt sein soll."
   finland.61.a:0 "Helsinki bleibt unsere Hauptstadt"
   finland.61.b:0 "Leningrad ist ein guter Kompromiss, aber vielleicht braucht es einen neuen Namen"
   finland.61.c:0 "Moskau wird die neue Hauptstadt"
   
   finland.62.t:0 "Umbenennung Leningrads"
   finland.62.d:0 "Bevor wir Leningrad zu unserer Hauptstadt machen, wäre es vielleicht ratsam, seinen Namen in einen weniger kontroversen zu ändern. Während wir natürlich die Möglichkeit hätten, den alten Namen Sankt Petersburg wiederherzustellen, haben die Finnen ihre eigene Option eingebracht. Offenbar gab es eine finnische Stadt, aus der die Stadt entstand, nachdem Peter der Große sie erobert und für sich beansprucht hatte."
   finland.62.a:0 "Leningrad ist ein toller Name"
   finland.62.b:0 "Sankt Petersburg wird wieder existieren."
   finland.62.c:0 "Newa. Eine antike Stadt und eine moderne Hauptstadt." 

   finland.65.t:0 "Umbenennung Leningrads"
   finland.65.d:0 "Es wäre vielleicht ratsam, den Namen in einen weniger kontroversen zu ändern. Obwohl wir uns offensichtlich dafür entscheiden könnten, den alten Namen der Stadt, Sankt Petersburg, wiederherzustellen, haben wir auch andere Möglichkeiten. Bevor Peter der Große die Stadt eroberte und umbenannte, gab es dort eine finnische Stadt, aus der die Stadt hervorging."
   finland.65.a:0 "Der aktuelle Name ist in Ordnung."
   finland.65.b:0 "Sankt Petersburg wird wieder existieren."
   finland.65.c:0 "Newa. Gefällt mir." 

   finland.66.t:0 "Umbenennung von Olonez"
   finland.66.d:0 "Da wir die Region nun fest unter Kontrolle haben, sollten wir erwägen, die Integration durch die Umbenennung der Provinz und aller darin liegenden Städte abzuschließen."
   finland.66.b:0 "Benennen wir es nach der Stadt Aunus."

   finland.67.t:0 "Umbenennung von Onega"
   finland.67.d:0 "Da wir die Region nun fest unter Kontrolle haben, sollten wir erwägen, die Integration durch die Umbenennung der Provinz und aller darin liegenden Städte abzuschließen."
   finland.67.b:0 "Diese Region ist Teil von Karjala und sollte daher als Ost-Karjala bezeichnet werden."
   finland.67.c:0 "Um Verwirrung zu vermeiden, nennen wir es stattdessen Karelien."
   
   finland.68.t:0 "Umbenennung von Murmansk"
   finland.68.d:0 "Da wir die Region nun fest unter Kontrolle haben, sollten wir erwägen, die Integration durch die Umbenennung der Provinz und aller darin liegenden Städte abzuschließen."
   finland.68.b:0 "Diese Region wird als Kuola bekannt sein, benannt nach der Halbinsel, auf der sie liegt."
   
   finland.69.t:0 "Umbenennung von Nord-Norge"
   finland.69.d:0 "Da wir die Region nun fest unter Kontrolle haben, sollten wir erwägen, die Integration durch die Umbenennung der Provinz und aller darin liegenden Städte abzuschließen."
   finland.69.b:0 "Wir haben in unserem Land keine Region namens „Nordnorwegen“. Nennen wir sie Finnmark."
   
   finland.70.t:0 "Umbenennung Lapplands"
   finland.70.d:0 "Da wir die Region nun fest unter Kontrolle haben, sollten wir erwägen, die Integration durch die Umbenennung der Provinz und aller darin liegenden Städte abzuschließen."
   finland.70.b:0 "In der Vergangenheit geteilt, aber wieder vereint. Meänmaa wiedergeboren."
   
   finland.71.t:0 "Umbenennung von Luga"
   finland.71.d:0 "Da wir die Region nun fest unter Kontrolle haben, sollten wir erwägen, die Integration durch die Umbenennung der Provinz und aller darin liegenden Städte abzuschließen."
   finland.71.b:0 "Laukaa ist ein toller Name."
   
   finland.72.t:0 "Umbenennung von Tichwin"
   finland.72.d:0 "Da wir die Region nun fest unter Kontrolle haben, sollten wir erwägen, die Integration durch die Umbenennung der Provinz und aller darin liegenden Städte abzuschließen."
   finland.72.b:0 "Tihvinä ist ein toller Name."
   
   finland.73.t:0 "Umbenennung von Wolchow"
   finland.73.d:0 "Da wir die Region nun fest unter Kontrolle haben, sollten wir erwägen, die Integration durch die Umbenennung der Provinz und aller darin liegenden Städte abzuschließen."
   finland.73.b:0 "Olhava wird erneut umbenannt."
   
   finland.81.t:0 "Friedensvertrag unterzeichnet"
   finland.81.d:0 "Nach dem Ende des Winterkriegs ist es Zeit, den offiziellen Friedensvertrag zu unterzeichnen. Obwohl wir kaum eine andere Wahl hatten, als diesen Vertrag anzunehmen, ist er dennoch beliebt. Es ist zu erwarten, dass radikale Parteien auf beiden Seiten ihn als Sprungbrett für den Machterhalt nutzen werden. Hoffentlich ist dies das letzte Mal, dass uns ausländische Mächte in einen Krieg zwingen. "
   finland.81.a:0 "Und zum Schluss noch Ihre Unterschrift hier"
   
   finland.101.t:0 "Svinhufvud verliert Wiederwahl"
   finland.101.d:0 "Die Präsidentschaftswahl erschüttert Finnland: Kyösti Kallio gewinnt mit deutlichem Vorsprung. Obwohl dies eine innenpolitische Wende darstellt, dürfte es im Großen und Ganzen keinen großen Unterschied machen. "
   finland.101.a:0 "Neues Gesicht für ein neues Zeitalter"
    
   finland.103.t:0 "Tanner tritt zurück"
   finland.103.d:0 "Präsident Väinö Tanner trat von seinem Amt als finnischer Präsident zurück. Nach einer Sonderabstimmung im Parlament wurde General Mannerheim zum amtierenden Präsidenten Finnlands ernannt. Als eine seiner ersten Amtshandlungen annullierte Mannerheim alle Verträge, die Tanner mit dem Deutschen Reich geschlossen hatte und die nicht vom Parlament oder Senat unterzeichnet worden waren, sondern von Tanner. Damit entband er Finnland von allen Verpflichtungen gegenüber den Achsenmächten."
   finland.103.a:0 "Es gibt immer eine Lücke"

   finland.102.t:0 "Ryti tritt zurück"
   finland.102.d:0 "Präsident Risto Ryti ist von seinem Amt als finnischer Präsident zurückgetreten. Nach einer Sonderabstimmung im Parlament wurde General Mannerheim zum amtierenden Präsidenten Finnlands ernannt. Als eine seiner ersten Amtshandlungen annullierte Mannerheim alle Verträge, die Ryti mit dem Deutschen Reich geschlossen hatte und die nicht vom Parlament oder Senat unterzeichnet worden waren. Damit entband er Finnland von allen Verpflichtungen gegenüber den Achsenmächten."
   finland.102.a:0 "Es gibt immer eine Lücke"

   finland.104.t:0 "Kallio stirbt"
   finland.104.d:0 "Präsident Kallio erlitt nach seiner Abschiedsfeier einen Herzinfarkt, als er auf den Zug wartete, der ihn nach Hause bringen sollte. Kurz darauf wurde er für tot erklärt. Dies geschah nur wenige Stunden vor seinem Rücktritt. Damit war er der erste finnische Präsident, der während seiner Amtszeit starb. Risto Ryti wurde zu Kallios Nachfolger als Präsident Finnlands gewählt. Er ist vor allem für seine erfolgreichen Wirtschaftsreformen während der Weltwirtschaftskrise bekannt."
   finland.104.a:0 "Er wollte nur auf seine Farm zurückkehren"
   
   finland.105.t:0 "Kallio bereitet Rücktritt vor"
   finland.105.d:0 "Präsident Kyösti Kallio hat heute seinen Rücktritt aus gesundheitlichen Gründen angekündigt. Dies war vielen hochrangigen finnischen Politikern bekannt, und so wurden bereits Pläne in die Wege geleitet, um angesichts der sich verschlechternden Weltlage einen neuen Präsidenten vom Parlament ohne öffentliche Wahlen wählen zu lassen. Das Parlament wird seinen Rücktritt in den nächsten Monaten bestätigen."
   finland.105.a:0 "Hoffentlich erholt er sich"
   
  ### news events
   finland.1001.t:0 "Sowjetunion tritt Territorium ab"
   finland.1001.d:0 "In einem unerwarteten Schritt hat die Sowjetunion angekündigt, Teile ihrer nordwestlichen Gebiete an Finnland abzutreten. Obwohl Finnland diese Gebiete schon länger forderte, hatte niemand geglaubt, dass die Sowjetunion ihren Forderungen tatsächlich nachkommen würde. Noch mysteriöser ist, dass die Sowjetunion sich weigerte, zu erklären, warum sie die finnischen Forderungen akzeptierte."
   finland.1001.a:0 "Wie seltsam"
   finland.1001.b:0 "Die Welt steckt voller Überraschungen"
   
   finland.1002.t:0 "Weißer Frieden im Winterkrieg"
   finland.1002.d:0 "Nach einer Reihe katastrophaler militärischer Verluste gegen Finnland, darunter der Verlust einer ihrer größten Städte, haben sich sowjetische und finnische Diplomaten darauf geeinigt, die Feindseligkeiten zwischen den beiden Ländern zu beenden und beide Streitkräfte werden an ihre Grenzen vor dem Krieg zurückkehren."
   finland.1002.a:0 "Ein moderner David und Goliath"
   finland.1002.b:0 "Lasst uns nie wieder darüber sprechen"
   finland.1002.c:0 "Ein weiterer kommunistischer Misserfolg für die Geschichtsbücher"

   finland.1003.t:0 "Finnland unterzeichnet Frieden mit der Sowjetunion"
   finland.1003.d:0 "Nach einer Reihe militärischer Siege an der Ostfront hat die Sowjetunion angekündigt, alle Feindseligkeiten gegenüber Finnland einzustellen, das sich wiederum dazu entschlossen hat, die Achsenmächte aufzugeben und gleichzeitig hohe Reparationszahlungen an die Sowjetunion zu leisten."
   finland.1003.a:0 "Interessante Entwicklung"
   finland.1003.b:0 "Mehr Truppen frei, um die faschistische Bedrohung zu bekämpfen"
   finland.1003.c:0 "Es ist Zeit, das Verlorene wieder aufzubauen"
   
   finland.1004.t:0 "Deutschland erklärt Finnland den Krieg"
   finland.1004.d:0 "Als Reaktion auf die Unterzeichnung eines Friedensvertrags zwischen Finnland und der Sowjetunion hat das Deutsche Reich beschlossen, Finnland den Krieg zu erklären. Obwohl Deutschland wahrscheinlich nicht viele Ressourcen für den Kampf gegen Finnland einsetzen wird, werden die noch auf finnischem Gebiet befindlichen deutschen Truppen vor ihrem Abzug großen Schaden anrichten. Diese Erklärung erfolgt zwei Tage vor Inkrafttreten des formellen Friedensvertrags zwischen Finnland, der Sowjetunion und den Alliierten. Damit befindet sich Finnland für die nächsten 48 Stunden formal im Krieg mit den Achsenmächten, den Alliierten und der Komintern."
   finland.1004.a:0 "Schlechte Verlierer"
   finland.1004.b:0 "Wir wollten nur Frieden"   
   finland.1004.c:0 "Das dürfte interessant werden"   
   
   finland.1005.t:0 "Romanow erobert den russischen Thron zurück"
   finland.1005.d:0 "Wladimir Kirillovitš Romanow hat heute offiziell die Wiederherstellung der Zarenherrschaft über Russland verkündet. Während einige noch Zweifel hegen, scheinen ihn die meisten als Befreier und Held Russlands zu begrüßen. Die Welt wird bald sehen, wie der neue Zar Russland wiederaufbaut und wie er Finnland und seine Bürger dafür belohnt, dass sie diesen Sieg ermöglicht haben. "
   finland.1005.a:0 "Wie unerwartet"
   finland.1005.b:0 "Wir haben gesiegt"   
   
   finland.1010.t:0 "Der Fall Moskaus"
   finland.1010.d:0 "Vor zwei Tagen überquerten finnische Marinesoldaten im Schutz der Nacht die Moskwa und sicherten die Krymsky-Brücke. Dadurch zwangen sie die sowjetischen Verteidiger zum Verlassen ihrer Stellungen. Heute musste sich das letzte sowjetische Bataillon aus dem Stadtzentrum zurückziehen. Während in der Nähe der östlichen Bahnhöfe noch Gefechte ausgetragen werden, ist die Stadt selbst gefallen, und finnische Soldaten beginnen mit der Brandbekämpfung. \n\nBerichten zufolge wurde der Kreml durch finnisches Artilleriefeuer schwer beschädigt, und eine der Kuppeln der Basilius-Kathedrale ist offenbar durch eine unbekannte Explosion eingestürzt."
   finland.1010.a:0 "Eine bedeutende Entwicklung."
   finland.1010.b:0 "Ein großartiger Sieg!"   
   finland.1010.c:0 "Das ist eine Katastrophe!"   
   
