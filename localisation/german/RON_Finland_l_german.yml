l_german:

 #### focuses
  
  fi_revitalize_industry:0 "Die Branche neu beleben"
  fi_revitalize_industry_desc:0 "Unsere Industrie stagniert und bleibt hinter den Erwartungen zurück. Wir müssen Innovationen fördern und die finnische Industrie wiederbeleben."
  fi_paper_industry:0 "Papierfabriken"
  fi_paper_industry_desc:0 "Holz war schon immer Finnlands größtes Exportgut, doch in den letzten Jahrzehnten hat Papier seinen Platz eingenommen. Die Förderung des Baus neuer Papierfabriken dürfte sich positiv auswirken, da der Papierbedarf in absehbarer Zeit nicht sinken wird."
  fi_salora_radio:0 "Salora-Radio"
  fi_salora_radio_desc:0 "Durch die jüngsten Marken- und Führungswechsel bei einem lokalen Radiohersteller haben wir eine großartige Gelegenheit erhalten, Finnland ins Radiozeitalter zu führen, indem wir Salora fördern und ihnen die Lizenz zur Herstellung von Ausrüstung für unser Militär erteilen."
  fi_textile_industry:0 "Unternehmer-Tochtergesellschaft"
  fi_textile_industry_desc:0 "Durch die Schaffung eines speziellen Tochterfonds zur Förderung neuer aufstrebender Unternehmen hoffen wir, eine neue Geschäftswelle im ganzen Land auszulösen."
  fi_steel_mills:0 "Fonds-Stahlwerke"
  fi_steel_mills_desc:0 "Stahl ist das Lebenselixier einer modernen Nation. Ohne ihn können weder Werkzeuge noch Gebäude oder Waffen hergestellt werden. Daher müssen wir dafür sorgen, dass Finnland eine starke Stahlindustrie hat."
  fin_steelmill_goes_bust:0 "Das Stahl-Fiasko"
  fin_steelmill_goes_bust_desc:0 "Mehrere von uns finanzierte Stahlwerke sind bankrott gegangen. Obwohl dies ein schwerer Rückschlag war, sind einige dieser insolventen Werke inzwischen unter staatliche Kontrolle geraten. Immerhin hatte dies etwas Gutes."

  fi_modernize_railway:0 "Modernisierung der Eisenbahnen"
  fi_modernize_railway_desc:0 "Durch die Modernisierung unserer bestehenden Eisenbahnnetze können wir deren Effizienz erheblich steigern."
  fi_roadnetwork:0 "Straßen verbessern"
  fi_roadnetwork_desc:0 "Alle Wege führen nach Helsinki."
  fi_repayment:0 "Investition zurückgezahlt"
  fi_repayment_desc:0 "Unsere anhaltenden Bemühungen, die finnische Infrastruktur auszubauen, haben sich ausgezahlt und wir erleben im ganzen Land ein starkes Wachstum und neue Innovationen."
 
  fi_expand_vkt:0 "VKT erweitern"
  fi_expand_vkt_desc:0 "VKT (Valtion Kivääritehdas) wurde 1926 gegründet und stellt die meisten unserer Gewehre her. Die Fabrik kann den Bedarf unseres Militärs nicht mehr decken und muss erweitert werden."
  fi_expand_vl:0 "VL erweitern"
  fi_expand_vl_desc:0 "VL (Valtion lentokonetehdas) liefert uns zwar kleine Mengen an Flugzeugen, aber das reicht nicht aus. Durch die Erweiterung von VL stellen wir eine ausreichende Flugzeugproduktion für unser Land sicher."
  fi_small_factories:0 "Einrichtung militärischer Werkstätten"
  fi_small_factories_desc:0 "Durch die Einrichtung vieler kleiner Werkstätten im ganzen Land können wir den wachsenden Bedarf unseres Militärs schnell decken und gleichzeitig verhindern, dass der Feind sie leicht ins Visier nehmen kann."
  fi_fuel_produciton:0 "Kraftstoffproduktion"
  fi_fuel_produciton_desc:0 "Indem wir eine lokale Treibstoffquelle für unser Militär sicherstellen, müssen wir uns keine Sorgen darüber machen, dass unsere Fahrzeuge durch eine Blockade aufgehalten werden oder unsere Flugzeuge auf dem Rollfeld festsitzen."
  fi_tungsten_mining:0"Wolframminen"
  fi_tungsten_mining_desc:0"Wolfram ist wesentlich härter als Stahl und kann daher zur Herstellung hochwertiger Werkzeuge oder mechanischer Teile für das Militär verwendet werden. Man kann es auch auf feindliche Panzer abfeuern, um deren Panzerung zu durchdringen."
  fi_private_rd:0 "Private Forschung und Entwicklung"
  fi_private_rd_desc:0 "Der Staat kann nicht alles allein bewältigen. Glücklicherweise haben unsere jüngsten Bemühungen in den Bereichen Industrie, Infrastruktur und Rohstoffgewinnung in Finnland eine Vielzahl privater Forschungsgruppen hervorgebracht, die unsere bestehende staatliche Forschung ergänzen."
  
  fi_remedy_old_wounds:0 "Alte Wunden heilen"
  fi_remedy_old_wounds_desc:0 "Der Bürgerkrieg von 1918 hat in Finnland noch immer seine Spuren hinterlassen. Alte Grenzen trennen die Menschen noch immer, und wenn Finnland den kommenden Sturm überstehen will, muss es sich erneut vereinen."
  fi_fortify_kannas:0 "Befestigen Sie das südliche Karjala"
  fi_fortify_kannas_desc:0 "Sollte es jemals zu einem Krieg zwischen Finnland und seinem östlichen Nachbarn kommen, werden sie versuchen, über Karjala zu kommen. Das können wir nicht zulassen."
  fi_fortify_kannas_1:0 "Fügen Sie §Y6 Landfestungen§! an der russischen Grenze hinzu.\n"
  fi_fortify_karjala:0 "Befestigen Sie Karjala"
  fi_fortify_karjala_desc:0 "Solange der Feind im Süden aufgehalten wird, müssen wir dafür sorgen, dass er den Ladogasee nicht umkreist und uns von hinten angreift."
  fi_fortify_kannas_2:0 "Fügen Sie §Y15 Landfestungen§! an der russischen Grenze hinzu.\n"
  fi_fortify_southern_finalnd:0 "Befestigen Sie Südfinnland"
  fi_fortify_southern_finalnd_desc:0 "Indem wir den Rest unserer Südgrenze befestigen, werden wir den Feind zwingen, entweder schwere Verluste hinzunehmen oder noch weiter nördlich vorzustoßen."
  fi_fortify_kannas_3.1:0 "Fügen Sie §Y3 Landfestungen§! entlang der russischen Grenze hinzu.\n"
  fi_fortify_kannas_3.2:0 "Fügen Sie §Y9 Landfestungen§! entlang der russischen Grenze hinzu.\n"
  fi_fortify_north:0 "Norden befestigen"
  fi_fortify_north_desc:0 "Durch die Befestigung unserer Nordgrenze stellen wir sicher, dass der Feind unsere Verteidigungsanlagen nicht einfach umgehen kann."
  fi_fortify_kannas_5.1:0 "Fügen Sie §Y1 Landfestungen§! entlang der russischen Grenze hinzu.\n"
  fi_fortify_kannas_5.2:0 "Fügen Sie §Y2 Landfestungen§! entlang der russischen Grenze hinzu.\n"
  fi_fortify_kannas_5.3:0 "Fügen Sie §Y3 Landfestungen§! entlang der russischen Grenze hinzu.\n"
  fi_fortify_kannas_5.4:0 "Fügen Sie §Y3 Landfestungen§! entlang der russischen Grenze hinzu.\n"
  fi_create_fallback_lines:0 "Fallback-Leitungen erstellen"
  fi_create_fallback_lines_desc:0 "Durch die Schaffung zahlreicher Rückzugspositionen für unsere Streitkräfte können wir auch dann effektiv kämpfen, wenn unsere Hauptlinien fallen sollten."
  fi_fortify_kannas_4.1:0 "Fügen Sie §Y8 Landfestungen§! an verschiedenen strategischen Standorten hinzu.\n"
  fi_fortify_kannas_4.2:0 "Fügen Sie §Y22 Landfestungen§! an verschiedenen strategischen Standorten hinzu.\n"
  fi_fortify_kannas_4.3:0 "Fügen Sie §Y10 Landfestungen§! an verschiedenen strategischen Standorten hinzu\n"
  fi_fortify_kannas_4.4:0 "Fügen Sie §Y16 Landfestungen§! an verschiedenen strategischen Standorten hinzu\n"
  
  fi_lotta_svard:0 "Mobilisiert die Lotta Svärd"
  fi_lotta_svard_desc:0 "Eine paramilitärische Hilfsorganisation für Frauen. Die Organisation Lotta Svärd ermöglicht es uns, eine Reihe von Männern in nicht kämpfenden Rollen durch Frauen zu ersetzen."
  fi_anti_air:0 "Luftabwehr"
  fi_anti_air_desc:0 "Durch die Schaffung eines Flugabwehrnetzwerks in Südfinnland können wir unsere Industrie vor feindlichen Bombenangriffen schützen."
  fi_break_the_treaty_of_paris:0 "Brechen Sie den Vertrag von Paris"
  fi_break_the_treaty_of_paris_desc:0 "Der 1856 unterzeichnete Pariser Vertrag schreibt vor, dass auf Åland keine militärischen Befestigungen errichtet werden dürfen. Obwohl wir uns in der Vergangenheit verpflichtet haben, die Neutralität Ålands zu wahren, sollten wir nicht zulassen, dass vergessene Papiere die Sicherheit unseres Volkes bestimmen. "
  fi_ammo_stockpiles:0 "Munitionslager"
  fi_ammo_stockpiles_desc:0 "Da sich die Lage in Europa weiter verschlechtert, sollten wir sicherstellen, dass unsere Streitkräfte über genügend Munition verfügen. Es wäre peinlich, einen Krieg wegen Munitionsmangels zu verlieren."
  
  fi_reorganize_the_army:0 "Reorganisieren Sie die Armee"
  fi_reorganize_the_army_desc:0 "Unser Militär ist zu sehr auf alte Methoden fixiert. Wenn unser Militär in der heutigen Zeit überleben soll, müssen wir es neu organisieren und hoffen, dass es nicht zu spät ist."
  fi_equipment_effort:0 "Geräteaufwand"
  fi_equipment_effort_desc:0 "Indem wir uns auf die Bedürfnisse des einfachen Soldaten konzentrieren, können wir sicherstellen, dass er eine effektive Kampftruppe ist."
  fi_standardiced_equipment:0 "Entwerfen Sie neue Gewehre"
  fi_standardiced_equipment_desc:0 "Die Waffen unserer Soldaten sind zwar effektiv, funktionieren aber nicht so gut wie erhofft. Um das zu ändern, müssen wir unsere eigenen Gewehre entwickeln, anstatt uns darauf zu verlassen, dass andere Nationen das für uns tun."
  fi_molotow_cocktail:0 "Molotowcocktail"
  fi_molotow_cocktail_desc:0 "Panzer stellen die größte Bedrohung für unsere Infanterie dar, der wir nicht so leicht begegnen können. Um dem entgegenzuwirken, werden wir unsere Streitkräfte mit kostengünstigen und einfach zu bedienenden Panzerabwehrwaffen für den Nahbereich ausstatten. Wir sollten auch unsere Abhängigkeit von 13,2-mm-Panzerabwehrgewehren überdenken, da diese gegen moderne Panzer wirkungslos erscheinen."
  fi_equipment_effort2:0 "Ausrüstungsaufwand 2"
  fi_equipment_effort2_desc:0 "Um unseren Soldaten qualitativ hochwertige Produkte zu bieten, müssen wir unsere Forschung im Bereich der Infanterieausrüstung fortsetzen."
  fi_motorization_effort:0 "Motorisierungsbemühungen"
  fi_motorization_effort_desc:0 "Wir müssen die Möglichkeit prüfen, Lastwagen an der Front einzusetzen, um Nachschub und vielleicht sogar Soldaten zu transportieren."
  fi_mechanization_effort:0 "Mechanisierungsbemühungen"
  fi_mechanization_effort_desc:0 "Wir haben positive Ergebnisse durch die Einbeziehung von Lastwagen in unsere Militärstruktur erzielt, es bestehen jedoch Bedenken hinsichtlich der Verwendung kaum gepanzerter Fahrzeuge zum Transport unserer Truppen an die Front."
  fi_mechanization_effort2:0 "Mechanisierungsbemühungen 2"
  fi_mechanization_effort2_desc:0 "Obwohl unsere Reihe gepanzerter Lastwagen vielversprechend ist, sollten wir prüfen, ob wir ihre Herstellung billiger machen können, um einen breiteren Einsatz zu ermöglichen."
  
  fi_debate_new_tactics:0 "Neue Taktiken diskutieren"
  fi_debate_new_tactics_desc:0 "Wir stehen an einem Scheideweg. Unsere Offiziere sind in eine hitzige Debatte verwickelt, welche Richtung unser Militär einschlagen soll. Argumente von beiden Seiten kursieren, die Entscheidung liegt bei uns."
  fi_national_defence_university:0 "Nationale Verteidigungsuniversität"
  fi_national_defence_university_desc:0 "Durch die Gründung einer Universität, deren einziger Zweck die Ausbildung unserer Offiziere ist, sollten wir in der Lage sein, unsere Militärdoktrin und -ausrüstung eingehender zu studieren."
  fi_radios_for_all:0 "Radios für alle"
  fi_radios_for_all_desc:0 "Der Konsens ist klar. Kommunikation ist das Rückgrat der modernen Kriegsführung, und Funk wird uns dabei helfen. Der Feind wird nie wieder Überraschungsangriffe gegen uns starten können, ohne dass bereits Verstärkung unterwegs ist."
  fi_new_way:0 "Neuer Weg"
  fi_new_way_desc:0 "Immer mehr unserer Offiziere sind sich einig, dass eine statische Befestigung für eine starke Verteidigung nicht mehr ausreicht. Sie behaupten, dass hochmobile Infanterie, unterstützt durch Präzisionsartillerie, ebenso viel Schaden anrichten kann wie eine gut platzierte Maschinengewehrstellung."
  fi_future_of_warfare:0 "Zukunft der Kriegsführung"
  fi_future_of_warfare_desc:0 "Unsere Taktiken werden zunehmend an das finnische Terrain angepasst. Durch die Kombination neuer und alter Taktiken verbessern sich unsere militärischen Fähigkeiten erheblich."
  
  fi_best_defence:0 "Die beste Verteidigung ..."
  fi_best_defence_desc:0 "Es ist klar, dass sich unser Militär auf die Verteidigung unseres Landes vor äußeren Bedrohungen konzentrieren muss. Wir sollten unsere Verteidigungsdoktrin ständig erweitern, um sie auf dem neuesten Stand zu halten."
  fi_is_strong_offence:0 "... ist ein schweres Vergehen"
  fi_is_strong_offence_desc:0 "Wir können Finnland niemals vollständig verteidigen, wenn wir zulassen, dass innerhalb unserer eigenen Grenzen Krieg geführt wird. Die beste Möglichkeit, das zu verteidigen, was wir haben, besteht darin, unsere Kriege außerhalb unserer Grenzen zu führen."
  fi_dig_a_hole:0 "Graben Sie einen Graben"
  fi_dig_a_hole_desc:0 "Um unsere Verteidigungsfähigkeit zu verbessern, sollten wir umfangreiche Befestigungsmaßnahmen vorbereiten. Durch die Anhäufung von Material und die Ausbildung von mehr Militäringenieuren können wir die Zeit, die für die Umsetzung einer geplanten Verteidigungslinie in eine tatsächliche Verteidigungslinie benötigt wird, drastisch verkürzen."
  fi_dig_a_grave:0 "Grabe ein Grab"
  fi_dig_a_grave_desc:0 "Wenn wir den Kampf in feindliches Gebiet tragen, sollten wir auf Widerstand der lokalen Bevölkerung vorbereitet sein. Indem wir unsere Streitkräfte darin schulen, schnell und leise mit Separatisten umzugehen, gewährleisten wir einen besseren Schutz vor solchen Bedrohungen."
  fi_coming_storm:0 "Aufziehender Sturm"
  fi_coming_storm_desc:0 "In Europa braut sich ein Sturm zusammen und wir müssen uns darauf vorbereiten."
  fi_mobilize_the_reserves:0 "Mobilisieren Sie die Reserven"
  fi_mobilize_the_reserves_desc:0 "Es wird deutlich, dass wir uns auf dem Weg in den Krieg befinden und daher unsere Reservisten mobilisieren und uns auf das Schlimmste vorbereiten müssen."
  
  fi_armoured_focus1:0 "Gepanzerte Anstrengung"
  fi_armoured_focus1_desc:0 "Panzer sind die Zukunft der Kriegsführung und es ist wichtig, dass wir nicht ins Hintertreffen geraten."
  fi_armoured_focus2:0 "Gepanzerte Anstrengung 2"
  fi_armoured_focus2_desc:0 "Noch stärker muss der Fokus auf den Aufbau einer schlagkräftigen Panzertruppe gelegt werden."
  fi_ensure_tank_production:0 "Sicherstellung der Tankproduktion"
  fi_ensure_tank_production_desc:0 "Die Herstellung von Panzern stellt für unsere Rüstungsindustrie eine enorme Belastung dar. Wir sollten versuchen, unsere Panzerproduktionskapazitäten zu steigern."
  
  fi_aviation_effort_1:0 "Luftfahrtbemühungen"
  fi_aviation_effort_1_desc:0 "Das Geheimnis einer starken Armee ist eine starke Luftwaffe."
  fi_fighter_focus_1:0 "Kämpferfokus"
  fi_fighter_focus_1_desc:0 "Wir müssen die Kontrolle über den Himmel mit einer mächtigen Kampftruppe übernehmen"
  fi_fighter_focus_2:0 "Kämpferfokus 2"
  fi_fighter_focus_2_desc:0 "Um unseren Vorsprung in der Luft zu behalten, müssen wir uns darauf konzentrieren, noch leistungsfähigere Flugzeuge als zuvor zu bauen."
  fi_bomber_focus_1:0 "Bomberfokus"
  fi_bomber_focus_1_desc:0 "Wir müssen die Zerstörung der feindlichen Industrie mit einer starken Bomberflotte sicherstellen"
  fi_bomber_focus_2:0 "Bomber Focus 2"
  fi_bomber_focus_2_desc:0 "Bomber mit noch mehr Bomben könnten feindliche Städte schneller und mit weniger Flügen zerstören."
  fi_nav_effort:0 "Marinebomber-Bemühungen"
  fi_nav_effort_desc:0 "Ein Schiff, dessen Bau Monate dauerte, wurde von einem Bomber versenkt, der an einem Tag gebaut wurde."
  fi_cas_effort:0 "CAS-Aufwand"
  fi_cas_effort_desc:0 "Wir müssen nach einer Möglichkeit suchen, unsere Bodentruppen zu unterstützen, ohne langsame und leicht abzufangende Bomber zu schicken. "
  fi_radar:0 "Radar"
  fi_radar_desc:0 "Wissen ist Macht und die Kenntnis des Standorts Ihres Feindes ist die ultimative Macht"
  fi_aviation_effort_2:0 "Luftfahrtaufwand 2"
  fi_aviation_effort_2_desc:0 "Unsere Luftstreitkräfte haben sich bewährt, aber vielleicht könnten wir sie noch weiter verbessern."
  fi_bomber_focus_3:0 "Düsenbomber"
  fi_bomber_focus_3_desc:0 "Wenn unsere Bomber schnell genug fliegen, um den feindlichen Jägern zu entkommen, können wir ohne Bedenken bombardieren."
  fi_fighter_focus_3:0 "Düsenjäger"
  fi_fighter_focus_3_desc:0 "Mit der Geschwindigkeit von Düsentriebwerken können wir unseren Feind angreifen, bevor er überhaupt merkt, was passiert ist"
  
  fi_naval_effort_1:0 "Marinebemühungen"
  fi_naval_effort_1_desc:0 "Um unser Land zu schützen, müssen wir auch für einen angemessenen Schutz der es umgebenden Meere sorgen."
  fi_light_navy_1:0 "Helles Marineblau"
  fi_light_navy_1_desc:0 "Da wir keine großen Werften haben, müssen wir uns stattdessen auf den Aufbau einer starken Marine aus vielen schwachen Schiffen konzentrieren."
  fi_heavy_navy_1:0 "Schweres Marineblau"
  fi_heavy_navy_1_desc:0 "Welchen Sinn hat es, eine Marine zu gründen, die keine Schlachtschiffe enthält?"
  fi_submarine_1:0 "Untergetauchte Flotte"
  fi_submarine_1_desc:0 "Wir schlagen unseren Feind, wenn er es am wenigsten erwartet."
  fi_naval_effort_2:0 "Marineeinsatz 2"
  fi_naval_effort_2_desc:0 "Wenn wir mit unseren Nachbarn konkurrieren wollen, muss unsere Flotte größer werden."
  fi_navally_tactical_1:0 "Marinetaktiken"
  fi_navally_tactical_1_desc:0 "Es stellt sich heraus, dass man nicht einfach auf den Feind zusegeln und das Feuer eröffnen kann. Zumindest sagen das unsere Admirale immer wieder."
  fi_amphibious:0 "Amphibische Streitkräfte"
  fi_amphibious_desc:0 "Um den plötzlichen Mangel unserer Feinde an Schiffen auszunutzen, sollten wir sie vom Meer aus angreifen."
  
  fi_prepare_for_elections:0 "Bereiten Sie sich auf Wahlen vor"
  fi_prepare_for_elections_desc:0 "Die Wahlen stehen wieder vor der Tür und alle Parteien bereiten sich darauf vor."
  
  fi_lapuan_movement_re_emerges:0 "Die Lapua-Bewegung taucht wieder auf"
  fi_lapuan_movement_re_emerges_desc:0 "Eine antikommunistische Bewegung, die nach einem gescheiterten Putsch verboten wurde. Doch trotz ihrer Auflösung engagieren sich die Menschen nun für ihre Ideen."
  fi_unban_communist_party:0 "Aufhebung des Verbots der Kommunistischen Partei"
  fi_unban_communist_party_desc:0 "Finnland ist eine Nation des freien Denkens und die Unterdrückung von Ideen gehört nicht zu einer freien Nation."
  fi_strenghten_election_laws:0 "Stärkung der Wahlgesetze"
  fi_strenghten_election_laws_desc:0 "Um unsere Demokratie zu schützen, müssen wir einen angemessenen Schutz unserer Wege durch das Gesetz gewährleisten."
  fi_purge_communism:0 "Säuberung der Kommunisten"
  fi_purge_communism_desc:0 "Der Kommunismus ist eine Krankheit, die geheilt werden muss, und wir sind die Ärzte."
  fi_re_establish_white_guard:0 "Weiße Garde"
  fi_re_establish_white_guard_desc:0 "Durch die Wiederbelebung der Weißen Garde werden wir den umfassenden Schutz unserer Nation vor der roten Bedrohung gewährleisten."
  fi_join_the_axis:0 "Ein gemeinsamer Feind"
  fi_join_the_axis_desc:0 "Solange die Sowjetunion existiert, wird unser Land vor dem kommunistischen Makel nicht sicher sein. Zum Glück sind wir nicht allein. Auch Deutschland hat seinen Hass auf den Kommunismus zum Ausdruck gebracht, und ein Beitritt scheint der logische nächste Schritt zu sein."
  fi_german_mines:0 "Deutsche Minen"
  fi_german_mines_desc:0 "Der Krieg gegen die kommunistische Bedrohung wird unsere Ressourcen stark beanspruchen. Glücklicherweise hat Deutschland angeboten, in Nordfinnland nach Minen zu suchen und diese zu bauen, um unsere beiden Kriegsmaschinen mit Energie zu versorgen."
  fi_nation_for_all_finns:0 "Nation für alle Finnen"
  fi_nation_for_all_finns_desc:0 "Wie können wir schweigend zusehen, wie unsere Brüder und Schwestern direkt an unseren Grenzen leiden? Wir müssen sie alle wieder vereinen."
  fi_the_swedish_question:0 "Schwedische Frage"
  fi_the_swedish_question_desc:0 "Jahrhundertelang lebten die Finnen unter schwedischer Herrschaft, und auch heute noch leben viele Finnen innerhalb der schwedischen Grenzen. Es ist Zeit, sich mit unseren Brüdern und Schwestern wieder zu vereinen und eine neue Nation zu gründen."
  fi_the_norwegian_question:0 "Norwegische Bedrohung"
  fi_the_norwegian_question_desc:0 "Es ist allgemein bekannt, dass eine lange norwegische Grenze eine Bedrohung für unser Land darstellt. Wir müssen eine Lösung für dieses Problem finden, bevor unsere Feinde es ausnutzen."
  fi_the_soviet_question:0 "Sowjetische Unterdrückung"
  fi_the_soviet_question_desc:0 "Es ist ein Schmerz, mit ansehen zu müssen, wie unsere Brüder und Schwestern unter der grausamen Unterdrückung der sowjetischen Bedrohung leben müssen. Wir müssen handeln, um sie zu befreien, bevor es zu spät ist."
  fi_estonian_siblings:0 "Estnische Geschwister"
  fi_estonian_siblings_desc:0 "Estland, die einzige andere finnische Nation auf der Welt. Wir müssen einen Weg finden, sie vor dem Schrecken zu schützen, der sie umgibt."
  fi_proclaim_greater_finland:0 "Großfinnland ausrufen"
  fi_proclaim_greater_finland_desc:0 "Unsere Grenzen sind stark gewachsen und wir haben das Überleben der Finnen um uns herum gesichert. Obwohl wir vorerst siegreich sind, gibt es weiterhin viele Bedrohungen, auf die wir vorbereitet sein müssen."
  
  fi_finland_forever_focus_1:0 "§YDiese Boni werden ungültig, wenn du einer Fraktion beitrittst§! \n"
  fi_finland_forever_focus_2:0 "§RDu kannst keine Kriege erklären§! \n"
  
  fi_militarization:0 "Militarisierung"
  fi_militarization_desc:0 "Um unsere Ziele zu erreichen, müssen wir unsere militärischen Produktionslinien auf das Niveau unserer Feinde steigern."
  fi_worker_propaganda:0 "Arbeiterpropaganda"
  fi_worker_propaganda_desc:0 "Durch die Ausweitung unserer internen Propagandabemühungen werden die Bürger die Bedeutung ihrer Arbeit erkennen und gerne ein paar Überstunden machen, um unsere Ziele zu erreichen."
  
  
  fi_defence_of_the_homeland:0 "Verteidigung des Vaterlandes"
  fi_defence_of_the_homeland_desc:0 "Um ganz Finnland zu schützen, müssen wir sicherstellen, dass unsere Armeen ausreichend besetzt sind. Durch die Schaffung einer Heimwehr müssen wir uns keine Sorgen über den Mangel an Rekruten machen."
  fi_finland_forever:0 "Finnland für immer"
  fi_finland_forever_desc:0 "Um unsere Nation zu schützen, müssen wir uns unter ihrer Flagge vereinen und unermüdlich für das gemeinsame Ziel arbeiten, ein stärkeres Finnland zu schaffen. Um eine große Nation zu schaffen, müssen wir all unsere Anstrengungen auf unsere eigenen Grenzen konzentrieren."

  
  fi_unite_the_workers:0 "Vereint die Arbeiter"
  fi_unite_the_workers_desc:0 "Arbeiter Finnlands. Erhebt euch gegen eure Unterdrücker. Werft eure Fesseln ab und seid frei."
  fi_modernice_the_farms:0 "Landwirtschaft modernisieren"
  fi_modernice_the_farms_desc:0 "Ein großer Teil unserer Bevölkerung besteht aus Bauern. Sie leisten unserer Politik hartnäckigen Widerstand. Um das zu ändern, modernisieren wir ihre Maschinen. Aus einem Stier wird ein Traktor und aus einem Karren ein Lastwagen."
  fi_seize_the_means_of_production:0 "Beschlagnahme der Produktionsmittel"
  fi_seize_the_means_of_production_desc:0 "Wir sind endlich bereit, unsere Träume zu verwirklichen. Das Zeitalter der Bourgeoisie ist zu Ende und das Zeitalter des Proletariats hat begonnen."
  fi_political_stability:0 "Politische Stabilität"
  fi_political_stability_desc:0 "Wir müssen Anstrengungen unternehmen, um das Parlament und den Senat von der kapitalistischen und faschistischen Bedrohung zu befreien, sonst könnte die Bourgeoisie einen Weg finden, erneut die Kontrolle zu übernehmen."
  fi_national_healthcare_act:0 "Sozialversicherungsgesetz"
  fi_national_healthcare_act_desc:0 "Die Alten, die Kranken und die Verkrüppelten. Sie sind die Schwächsten unserer Gesellschaft und deshalb müssen wir ihnen einen angemessenen Lebensstandard sichern, sonst unterscheiden wir uns nicht von den kapitalistischen Schweinen, die Profit über das Leben stellen."
  fi_incentivize_the_workers:0 "Anreize für die Mitarbeiter schaffen"
  fi_incentivize_the_workers_desc:0 "Nach der Untersuchung der Sowjetunion sind wir auf ein gefährliches Problem gestoßen. Die Motivation der Arbeiter nimmt ab. Um dieses Problem zu lösen, werden wir halb-luxuriöse Güter schaffen, die fleißige Arbeiter verdienen können, wenn sie sich auszeichnen."
  fi_red_north:0 "Roter Norden"
  fi_red_north_desc:0 "Während wir uns von den Fesseln der Bourgeoisie befreit haben, ist dies bei unseren Nachbarn nicht der Fall, und es liegt an uns, ihnen zu helfen, das Licht des Kommunismus zu erkennen."
  fi_red_snow:0 "Operation Roter Schnee"
  fi_red_snow_desc:0 "Unsere nordischen Nachbarländer versklaven ihre Arbeiter weiterhin und es liegt an uns, diesem bürgerlichen Dreck ein Ende zu setzen."
  fi_join_the_comitern:0 "Freunde der Revolution"
  fi_join_the_comitern_desc:0 "Unsere Freunde in der Sowjetunion haben sich bereit erklärt, Gespräche über den Beitritt zum Militärpakt „Komintern“ aufzunehmen."
  fi_red_oil:0 "Rotes Öl"
  fi_red_oil_desc:0 "Unser Verbündeter, die Sowjetunion, hat den Bau finnischer Ölraffinerien vorgeschlagen, um das aus sowjetischen Gebieten geförderte Rohöl sowie das an der Küste von Petsamo geförderte Öl zu raffinieren."
  
  fi_support_democracy:0 "Unterstützen Sie die Demokratie"
  fi_support_democracy_desc:0 "Die Fackel der Demokratie wird in Finnland noch viele Jahre lang brennen."
  fi_sword_of_liberty:0 "Schwert der Freiheit"
  fi_sword_of_liberty_desc:0 "Viele werden uns unsere Unabhängigkeit nehmen wollen, aber sie werden lernen, den Mann zu fürchten, der für sie selbst entscheiden kann."
  fi_nation_of_iron:0 "Nation des Eisens"
  fi_nation_of_iron_desc:0 "Um uns vor Invasionswilligen zu schützen, müssen wir massive Befestigungsmaßnahmen ergreifen. Dazu müssen wir Wege finden, den Bau dieser Festungen zu beschleunigen."
  fi_stronger_together:0 "Gemeinsam stärker"
  fi_stronger_together_desc:0 "Wir sind Nachbarn anderer freier Demokratien, und vielleicht haben auch sie Angst vor der Zukunft. Wir sollten ein Verteidigungsbündnis gründen, um unser Überleben zu sichern."
  fi_alone_in_the_darkness:0 "Schild des Nordens"
  fi_alone_in_the_darkness_desc:0 "Wir sind die Beschützer des Nordens. Wir schützen andere vor Gefahren, auch wenn sie diese nicht verstehen. Wir müssen uns auf das Schlimmste vorbereiten."
  fi_deal_with_the_devil:0 "Ein Pakt mit dem Teufel"
  fi_deal_with_the_devil_desc:0 "Trotz unserer Bemühungen wurden Teile unseres Landes von der Sowjetunion eingenommen. Um diese Gebiete zurückzuerobern, müssen wir das Undenkbare tun und die Hilfe derjenigen suchen, die der sowjetischen Bedrohung einen Schlag versetzen wollen."
  fi_between_two_devils:0 "Zwischen zwei Teufeln"
  fi_between_two_devils_desc:0 "Es wird immer deutlicher, dass sich der Krieg zwischen der Sowjetunion und Deutschland gegen uns wendet. Wir müssen einen Weg finden, ihn zu beenden und gleichzeitig die Existenz Finnlands zu sichern, selbst wenn dies bedeutet, dass wir weitere Gebiete aufgeben müssen."
  fi_joint_military_drills:0 "Gemeinsame Militärübungen"
  fi_joint_military_drills_desc:0 "Um unsere Armeen zu stärken, müssen wir mit gemeinsamen Militärübungen beginnen, um unser aller Chancen zu verbessern, den nächsten großen Krieg zu überleben."
  fi_resource_independence:0 "Suche nach Ressourcen"
  fi_resource_independence_desc:0 "Ob wir nun allein sind oder nicht, wir müssen dafür sorgen, dass wir in der Lage sind, genügend Ressourcen für unsere Fabriken zu beschaffen, ohne auf die Stabilität Europas angewiesen zu sein."
  
  fi_emphasize_neutrality:0 "Unsere Neutralitätspolitik verstärken"
  fi_emphasize_neutrality_desc:0 "Finnland ist ein neutrales Land und wird sich nicht aufgrund der Launen der „großen“ Weltmächte in einen Krieg hineinziehen lassen."
  fi_minority_government:0 "Minderheitsregierung"
  fi_minority_government_desc:0 "Nach den Wahlen im Jahr 1936 errang die SDP einen kleinen Sieg, wurde jedoch auf Druck des Präsidenten Svinhufvud von der Regierung ausgeschlossen und in die Opposition gezwungen."
  fi_allow_sdp_in:0 "SDP-Eingang zulassen"
  fi_allow_sdp_in_desc:0 "Wir können keine Mehrheitsregierung bilden, ohne auch die SDP einzubeziehen, und trotz heftiger Proteste von Präsident Svinhufvud werden wir mit ihnen eine Regierung bilden."
  fi_fanatical_neutrality:0 "Fanatische Neutralität"
  fi_fanatical_neutrality_desc:0 "Als neutrales Land hat Finnland keine Feinde und muss sich daher keine Sorgen um sein Militär machen. Eine Kürzung unseres Militärbudgets würde mehr Geld für andere Projekte bedeuten."
  fi_remain_nautral:0 "Bleiben Sie neutral"
  fi_remain_nautral_desc:0 "Wir können keinen weiteren Krieg gegen die Sowjetunion riskieren und müssen daher unsere Neutralität wahren."
  fi_build_houses_for_the_refugees:0 "Häuser für Kriegsflüchtlinge"
  fi_build_houses_for_the_refugees_desc:0 "Unser letzter Krieg hat viele obdachlos gemacht. Das dürfen wir nicht hinnehmen. Wir müssen im ganzen Land mit dem Bau von Wohnungen beginnen, damit kein Finne obdachlos wird."
  fi_european_refugees:0 "Europäische Flüchtlinge"
  fi_european_refugees_desc:0 "Krieg und Unterdrückung sind in ganz Europa verbreitet, doch viele sehen uns als sicheren Hafen im Auge des Sturms und fliehen in unser Gebiet. Jeden Monat kommen mehrere Hundert Menschen an, und obwohl wir die meisten von ihnen abweisen mussten, haben wir uns nun entschieden, diese Flüchtlinge in Finnland aufzunehmen."
  fi_abandon_nautrality:0 "Neutralität aufgeben"
  fi_abandon_nautrality_desc:0 "Was nützt Neutralität, wenn andere sie nicht anerkennen? Nein, von nun an wird Finnland Verbündete finden. Wir müssen auch dafür sorgen, dass unsere Streitkräfte nicht wie zuvor in Vergessenheit geraten."
  fi_strenghten_our_defences:0 "Unsere Verteidigung stärken"
  fi_strenghten_our_defences_desc:0 "Unser Ziel ist die Verteidigung Finnlands und um es zu erreichen, müssen wir mit dem Bau neuer Befestigungen beginnen."
  fi_continue_the_rearmament:0 "Die Wiederaufrüstung fortsetzen"
  fi_continue_the_rearmament_desc:0 "Wir sind auf dem richtigen Weg, müssen aber die angemessene Bewaffnung unserer Streitkräfte sicherstellen und unsere Waffenproduktion steigern."
  fi_recycling_center:0 "Recyclingzentren"
  fi_recycling_center_desc:0 "Auch wenn wir nicht über viele natürliche Ressourcen verfügen, heißt das nicht, dass wir sie nicht beschaffen können. Durch die Schaffung von Recyclingzentren und die Schaffung von Anreizen für die Bevölkerung zum Recycling sollten wir Ressourcen gewinnen, die dann entweder gehandelt oder im Inland genutzt werden können."
 
    fi_rally_monarchists:0 "Rallye-Monarchisten"
    fi_rally_monarchists_desc:0 "Eine starke Nation braucht einen starken Führer, und die stärksten Führer waren die Könige und Kaiser der alten Zeit. Auch wenn wir sie nicht dazu bringen können, uns zu führen, würden ihre Nachkommen vielleicht unsere Dienste annehmen."
    
  
  fi_house_of_hesse:0 "Haus Hessen"
  fi_house_of_hesse_desc:0 "Friedrich Karl von Hessen wurde vor zwei Jahrzehnten die Führung Finnlands angeboten, doch dieses Angebot wurde nicht erfüllt. Wir könnten das Angebot erneut unterbreiten, doch leider ist Friedrich alt und schwach, doch sein Sohn Philipp wäre dazu bereit. Der einzige mögliche Nachteil ist, dass Philipp eine große Bewunderung für das Nazi-Regime in Deutschland hegt und Finnland zweifellos gerne in ein Bündnis mit Deutschland führen würde."
  fi_political_provness:0 "Politische Kompetenz"
  fi_political_provness_desc:0 "König Philipp beweist sein Können in der Kunst der Politik und lässt unsere eigenen Politiker weit hinter sich. Er hat während seiner Zeit als deutscher Ratgeber und Statthalter reichlich Erfahrung in politischer Kompetenz gesammelt."
  fi_german_co_operation:0 "Deutsche Zusammenarbeit"
  fi_german_co_operation_desc:0 "König Philipp hat ein gemeinsames Militärbündnis mit Deutschland vorgeschlagen, um Finnlands Zukunft vor äußeren Bedrohungen zu schützen. Finnland pflegt seit seiner Gründung ein äußerst freundschaftliches Verhältnis zu Deutschland, sodass der Vorschlag auf große Unterstützung stößt."
  fi_kings_arms:0 "Kings Arms"
  fi_kings_arms_desc:0 "Mit deutscher Unterstützung können wir beginnen, unsere Militärproduktion zu verbessern und eine starke Armee aufzubauen."
  fi_kings_guard:0 "Königsgarde"
  fi_kings_guard_desc:0 "Jeder König braucht eine königliche Garde. König Philipp hat bereits mit den Vorbereitungen für diese neue Armee begonnen, indem er mit seinen deutschen Verbündeten über die benötigten Waffen verhandelt und Schweizer Söldner als Verstärkung anheuert. Wir müssen nur noch Ja sagen."
  fi_public_opinion:0 "Öffentliche Meinung"
  fi_public_opinion_desc:0 "König Philipp ist von der öffentlichen Meinung geradezu besessen und bemüht sich sehr, den Respekt der gesamten Nation zu gewinnen. Infolgedessen hat er zahlreiche Initiativen ergriffen, die das Leben und die Sicherheit der Menschen verbessern sollen."
  fi_royal_connections:0 "Königliche Verbindungen"
  fi_royal_connections_desc:0 "Ein Mitglied des Königshauses zu sein, hat viele Vorteile. Einer davon ist, dass man viele Verbindungen in ganz Europa und sogar in weiten Teilen Amerikas, Asiens und Afrikas hat. Nun hat König Philipp beschlossen, diese Verbindungen zu nutzen, um umfangreiche ausländische Investitionen nach Finnland zu bringen."
  fi_valuable_metals:0 "Wertvolle Metalle"
  fi_valuable_metals_desc:0 "Jeder König möchte alles mit Gold und Silber bedeckt haben. Um dies zu erreichen, hat König Philipp beschlossen, im Norden Finnlands eine groß angelegte Prospektionskampagne zu starten. Als Nebeneffekt sollte dies viele weitere Metallvorkommen freilegen, die wir abbauen und verkaufen können, was wir selbst nicht brauchen."
  fi_kings_steel:0 "Kings Steel"
  fi_kings_steel_desc:0 "König Philip hat beschlossen, mehrere Stahlwerke zu errichten und daraus die Kings Steel Company zu gründen, die seiner Hoffnung nach ausreichen wird, um unser Land mit ausreichend Stahl zu versorgen."
   
  fi_house_of_romanov:0 "Haus Romanov"
  fi_house_of_romanov_desc:0 "Die Romanow-Dynastie ist vor allem als der letzte russische Zar bekannt. Obwohl viele während der Revolution getötet wurden, überlebten viele. Wir sollten diese alte Dynastie respektieren, die unbeabsichtigt den modernen finnischen Staat geschaffen hat."
  fi_retake_russian_throne:0 "Erobern Sie den russischen Thron zurück"
  fi_retake_russian_throne_desc:0 "Wie erwartet verabscheut Kirillovitš das Sowjetregime und möchte den alten Thron seiner Familie zurückerobern. Vielleicht können wir ihm helfen."
  fi_prepare_the_army:0 "Bereiten Sie die Armee vor"
  fi_prepare_the_army_desc:0 "Es ist eine Herausforderung, es mit der sowjetischen Bestie aufzunehmen, und um uns auf diese Aufgabe vorzubereiten, müssen wir sicherstellen, dass unser Militär motiviert und bereit ist."
  fi_prepare_the_people:0 "Bereiten Sie die Menschen vor"
  fi_prepare_the_people_desc:0 "Der kommende Krieg wird hart und wir haben keine Hoffnung, ihn zu gewinnen, wenn die Menschen nicht darauf vorbereitet sind."
  fi_romanov_strikes_back:0 "Romanow schlägt zurück"
  fi_romanov_strikes_back_desc:0 "Für uns ist die Zeit gekommen, Russland zurückzuerobern und den Mord an Nikolaus II. und seiner Familie zu rächen."
  fi_reclaim_throne:0 "Thron zurückerobern"
  fi_reclaim_throne_desc:0 "Allen Widrigkeiten zum Trotz haben wir es endlich geschafft. Da der sowjetische Bär erschlagen daliegt, müssen wir nun nicht nur über unsere Zukunft nachdenken, sondern auch über die Zukunft Russlands."
  fi_strenghten_finnish_throne:0 "Stärkung des finnischen Throns"
  fi_strenghten_finnish_throne_desc:0 "Wir müssen Finnland sichern und dafür sorgen, dass es keinem Kommunisten jemals gelingt, die Romanow-Linie zu vernichten."
  fi_reform_finland:0 "Reform Finnland"
  fi_reform_finland_desc:0 "Der Übergang von einer Republik zu einer Monarchie geschieht nicht über Nacht und es gibt noch viele Bereiche des finnischen Staates, die in die Moderne überführt werden müssen."
  fi_fight_against_communism:0 "Verteidige dich gegen den Kommunismus"
  fi_fight_against_communism_desc:0 "Die letzte große Romanow-Linie fiel dem Kommunismus zum Opfer und unser aktueller Romanow zeigte verständlicherweise Hass darauf und ging sogar so weit, alle kommunistischen Sympathisanten aus seinem Kabinett zu entfernen und Vorbereitungen gegen ausländische Versuche zu treffen, Finnland einzunehmen."
  fi_defend_the_new_kindom:0 "Verteidige das Neue Königreich"
  fi_defend_the_new_kindom_desc:0 "Um Finnland umfassend zu verteidigen, müssen wir sicherstellen, dass keine ausländische Macht in der Lage ist, unsere Verteidigung zu durchbrechen."
  fi_royal_mines:0 "Königliche Minen"
  fi_royal_mines_desc:0 "Damit eine Armee funktionieren kann, muss sie über Waffen verfügen, und für den Bau dieser Waffen werden Metalle benötigt."
    
  fi_house_Bernadotte:0 "Haus Bernadotte"
  fi_house_Bernadotte_desc:0 "Schweden herrschte jahrhundertelang über Finnland, und daher erscheint es nur angemessen, dass wir einen schwedischen König suchen. Der derzeitige König von Schweden hat drei Söhne, und es ist uns gelungen, das Interesse des mittleren Sohnes, Carl Wilhelm Ludvig, zu wecken."
  fi_trade_and_defence:0 "Handel und Verteidigung"
  fi_trade_and_defence_desc:0 "Da der schwedische König der Vater unseres Königs ist, ist es nur natürlich, dass wir beginnen, umfassendere Handels- und Verteidigungsbeziehungen aufzubauen."
  fi_joint_mining_venture:0 "Bergbauunternehmen"
  fi_joint_mining_venture_desc:0 "Als Geschenk für Wilhelm. Der schwedische König hat beschlossen, Bergbauprojekte in ganz Finnland zu finanzieren, um die neue Herrschaft seines Sohnes zu unterstützen."
  fi_royal_marriage:0 "Königliche Hochzeit"
  fi_royal_marriage_desc:0 "König Carl hatte jahrzehntelang eine glückliche, aber geheime Beziehung mit Jeanne de Tramcourt. Mit unserem Segen sind die beiden nun bereit, ihre Liebe durch die Heirat offiziell zu machen. Wir werden bald eine Königin haben."
  fi_secure_heir:0 "Sicherer Erbe"
  fi_secure_heir_desc:0 "Obwohl König Carl ein langes Leben führte, hat er keine Kinder. Das war früher kein Problem, seit er König ist, ist es das nun. Um dieses Problem zu lösen, hat das Königspaar beschlossen, ein Waisenkind aus einer finnischen Adelsfamilie zu adoptieren."
  fi_reform_the_state:0 "Reformieren Sie den Staat"
  fi_reform_the_state_desc:0 "Der Übergang von einer Republik zu einer Monarchie geschieht nicht über Nacht und es gibt noch viele Bereiche des finnischen Staates, die in die Moderne überführt werden müssen."
  fi_power_to_king:0 "Macht dem König"
  fi_power_to_king_desc:0 "Finnland braucht einen starken Führer, der das Land durch die bevorstehenden Schwierigkeiten führt."
  fi_power_to_parliament:0 "Macht dem Parlament"
  fi_power_to_parliament_desc:0 "Um ein moderner Staat zu werden, braucht Finnland ein starkes und unabhängiges Parlament."
    

 ####ideas
    fi_sisu:0 "Sisu"
    fi_sisu_desc:0 "Sisu ist der einzigartige finnische Ausdruck für die Widerstandsfähigkeit der Bevölkerung. Finnland hat harte Zeiten erlebt und wird dies auch wieder tun."
    
    fi_outdated_military_equipment:0 "Veraltete Ausrüstung"
    fi_outdated_military_equipment_desc:0 "Eine aktuelle Studie hat ergeben, dass ein erheblicher Teil unserer Ausrüstung völlig unbrauchbar ist und entsorgt werden sollte.\n--------------\n§GKann über den Ausrüstungszweig entfernt werden.§!"
    fi_lack_of_ammunition:0 "Mangel an Munition"
    fi_lack_of_ammunition_desc:0 "Der Munitionsmangel in unseren Streitkräften hat ein kritisches Ausmaß erreicht. Unsere Infanterie hat keine Kugeln und unsere Artillerie keine Granaten.\n--------------\n§GKann über den Befestigungszweig behoben werden.§!"
    fi_reliance_on_at_rifles:0 "Schwache Panzerabwehrgewehre"
    fi_reliance_on_at_rifles_desc:0 "§!Zeit für Panzerabwehrforschung§! §R+100%§!.\n§!--------------§!\n§LWährend der Zwischenkriegszeit investierte Finnland in die Entwicklung kleinkalibriger Panzerabwehrgewehre und zog diese den Panzerabwehrkanonen vor. Leider waren sie nicht in der Lage, selbst die Panzermodelle der frühen Kriegsjahre zu durchschlagen.\n--------------\n§GKann über den Ausrüstungszweig entfernt werden§!"
    fi_real_at_rifle:0 "Schwache Panzerabwehrgewehre"
    fi_real_at_rifle_desc:0 ""
  
    fi_workshops:0 "Workshops"
    fi_workshops_desc:0 "Zahlreiche über das ganze Land verteilte Werkstätten haben es dem Feind erschwert, unsere Branche ins Visier zu nehmen."
    fi_repaid:0 "Infrastrukturinvestitionen "
    fi_repaid_desc:0 "Es wurde massiv in die Infrastruktur dieses Landes investiert, und das ist auch sichtbar."
    
    fi_finnish_rifles:0 "Finnische Gewehre"
    fi_finnish_rifles_desc:0 "In Finnland für finnische Verhältnisse entwickelte Gewehre."
    fi_theoritical_tactics:0 "Theoretische Taktiken"
    fi_theoritical_tactics_desc:0 "Die größten Militärexperten des Landes haben sich zusammengeschlossen, um die Kriegsführung zu verbessern. Hoffen wir, dass sie keinen Bürgerkrieg anzetteln, um ihre Argumente zu beweisen."
    fi_motti_tactics:0 "Motti-Taktiken"
    fi_motti_tactics_desc:0 "Indem wir vorrückende feindliche Streitkräfte von ihren Versorgungslinien abschneiden, können wir es dem Feind extrem schwer machen, uns Gebiete abzunehmen."
    fi_infiltration_tactics:0 "Infiltrationstaktiken"
    fi_infiltration_tactics_desc:0 "Indem wir vor einem Angriff in die feindlichen Frontlinien eindringen, können wir großes Chaos verursachen."
    fi_enhanced_tactics:0 "Verbesserte Taktiken"
    fi_enhanced_tactics_desc:0 "Die besten und klügsten Köpfe der finnischen Armee haben sich zusammengefunden und unsere Taktiken an unsere Bedürfnisse und Möglichkeiten angepasst."
        
    fi_mechanization_production:0 "Mechanisierung der Produktion"
    fi_mechanization_production_desc:0 "Durch die Feinabstimmung unserer mechanisierten Produktionslinien sollten wir in der Lage sein, die Kosten verschiedener Systeme zu senken und so mit weniger Material mehr Fahrzeuge herzustellen."

    fi_exstensive_reserves:0 "Umfangreiche Reserven"
    fi_exstensive_reserves_desc:0 "Dieses Land verfügt über eine große Anzahl an Reservisten, die für Kampfeinsätze ausgebildet werden können."
    
    fi_fortification_focus:0 "Befestigungsfokus"
    fi_lotta_svard_idea:0 "Lotta Svärd"
    fi_lotta_svard_idea_desc:0 "Eine paramilitärische Hilfsorganisation für Frauen. Die Organisation Lotta Svärd ermöglicht es uns, eine Reihe von Männern in nicht kämpfenden Rollen durch Frauen zu ersetzen und so mehr Männer für andere Rollen freizusetzen."
    
    fi_purge_communists:0 "Säuberung der Kommunisten"
    fi_purge_communists_desc:0 ""
    fi_proud_workers:0 "Stolze Arbeiter"
    fi_proud_workers_desc:0 "Umfangreiche Propagandamaßnahmen haben den Durchschnittsarbeiter stolz auf seine Rolle als Rädchen im Getriebe gemacht."
    fi_white_guard:0 "Weiße Garde"
    fi_white_guard_desc:0 ""
    fi_home_guard:0 "Heimwehr"
    fi_home_guard_desc:0 "Eine Zivilschutztruppe, die sowohl aus Männern als auch aus Frauen besteht und aus der die Besten für die Streitkräfte rekrutiert werden können."
    fi_nation_of_finns:0 "Nation für alle Finnen"
    fi_nation_of_finns_desc:0 "Dies ist eine Nation für alle Finnen und unsere Grenzen sollten dies widerspiegeln."
    fi_spirit_of_finland:0 "Schutz Finnlands"
    fi_spirit_of_finland_desc:0 "Dieses Land konzentriert sich voll und ganz auf interne Probleme und wird seine Nachbarn wahrscheinlich nicht angreifen."
    fi_proven_military:0 "Bewährtes Militär"
    fi_proven_military_desc:0 "Unser Militär hat sich gegen unsere Feinde bewährt, was die Moral unserer Soldaten und Kommandeure gleichermaßen gestärkt hat."
    
    
    fi_socialist_markets:0 "Sozialistische Märkte"
    fi_socialist_markets_desc:0 "Durch die Standardisierung unserer Zivilwirtschaft und die Beseitigung unnötiger Konkurrenz können wir die Produktionskosten senken und gleichzeitig qualitativ hochwertige Produkte garantieren."
    fi_modernized_farms:0 "Modernisierte Farmen"
    fi_modernized_farms_desc:0 "Dieses Land hat sich das edle Ziel gesetzt, seine Farmen mit der neuesten Ausrüstung zu modernisieren."
    fi_controlled_elections2:0 "Kontrollierte Wahlen"
    fi_controlled_elections2_desc:0 "Durch subtile Einflussnahme auf das Wahlergebnis soll eine anhaltende politische Unterstützung sichergestellt werden."
   socialist_realism:0 "Sozialistischer Realismus"
    socialist_realism_desc:0 "This nation has gained a reputation as a socialist with the use of the most advanced technology.
    fi_controlled_elections:0 "Kontrollierte Wahlen"
    fi_controlled_elections_desc:0 "Durch subtile Einflussnahme auf das Wahlergebnis soll eine anhaltende politische Unterstützung sichergestellt werden."
    fi_motivated_workers:0 "Motivierte Mitarbeiter"
    fi_motivated_workers_desc:0 "Den Arbeitern dieses Landes werden bei guter Leistung luxuriöse Produkte versprochen."
    fi_finnish_preasure:0 "Finnischer Druck"
    fi_finnish_preasure_desc:0 "Finnland beeinflusst unsere Innenpolitik, indem es kommunistische Galionsfiguren finanziert und Propaganda verbreitet."
    fi_sword_of_liberty_idea:0 "Schwert der Freiheit"
    fi_sword_of_liberty_idea_desc:0 "Keine Ideologie kann überleben, wenn sie nicht bereit ist, für ihre Überzeugungen zu kämpfen."
    fi_shield_of_democracy:0 "Schild des Nordens"
    fi_shield_of_democracy_desc:0 "Wir sind der Schild, der Skandinavien vor seinen Feinden im Osten schützt. Selbst wenn diese uns die Hilfe verweigern, müssen wir bereit sein, auch für ihre Verteidigung zu arbeiten."
    fi_nation_of_iron_idea:0 "Nation des Eisens"
    fi_nation_of_iron_idea_desc:0 "Nationen werden nach ihren Menschen und ihrem Land beurteilt. Unser Volk ist aus Stahl, wir müssen dafür sorgen, dass unser Land aus Eisen ist."
    
    fi_Liberty_for_all:0 "Demokratische Stimmen"
    fi_Liberty_for_all_desc:0 "Die Menschen dieses Landes werden von der Botschaft einer freien und gerechten Nation beeinflusst"
    fi_communist_surge:0 "Kommunistische Stimmen"
    fi_communist_surge_desc:0 "Die Menschen dieses Landes werden von der Botschaft einer gleichberechtigten und gerechten Nation beeinflusst"
    fi_lapuan_movement:0 "Faschistische Stimmen"
    fi_lapuan_movement_desc:0 "Die Menschen dieses Landes werden von der Botschaft einer starken und gerechten Nation beeinflusst"
  
    fi_nordic_military_coopearion:0 "Nordische Militärkooperation"
    fi_nordic_military_coopearion_desc:0 "Kriegsspiele, gemeinsame Übungen und die allgemeine militärische Zusammenarbeit zwischen den nordischen Nationen haben ihre Streitkräfte gestärkt."
    fi_for_the_republic:0 "Für die Republik"
    fi_for_the_republic_desc:0 "Ein starkes Militär ist das Rückgrat einer Nation, und eine starke Wirtschaft ist das Rückgrat eines Militärs. Das eine ist ohne das andere nicht möglich."
    
    fi_reparations:0 "Sowjetische Reparationen"
    fi_reparations_desc:0 ""
    
    fi_neutral_nation:0 "Neutrale Stimmen"
    fi_neutral_nation_desc:0 "Was bringt einen Menschen dazu, neutral zu werden? Gier nach Gold? Macht? Oder wurdest du einfach mit einem Herzen voller Neutralität geboren? *Das solltest du nicht sehen"
    fi_minority_government_idea:0 "Minderheitsregierung"
    fi_minority_government_idea_desc:0 "Dieses Land wird von einer blockfreien Minderheitsregierung regiert."
    fi_functioning_government:0 "Funktionierende Regierung"
    fi_functioning_government_desc:0 "Dieses Land verfügt über ein funktionierendes Mehrparteiensystem mit einer Mehrheitsregierung"
    fi_reduced_military_budget:0 "Kürzung des Militärbudgets"
    fi_reduced_military_budget_desc:0 "Eine neutrale Nation braucht kaum ein Militär"
    fi_rearm_military:0 "Das Militär wieder aufrüsten"
    fi_rearm_military_desc:0 "Nach Jahren der Haushaltskürzungen ist es an der Zeit, unser Militär wieder aufzurüsten.“"
    fi_well_funded_army:0 "Gut finanzierte Armee"
    fi_well_funded_army_desc:0 "Dieses Land hat große Mittel in die Stärkung seiner Streitkräfte gesteckt"
    fi_refugee_crisis:0 "Safe Harbour"
    fi_refugee_crisis_desc:0 "Krieg und Verfolgung plagen Europa erneut und viele fliehen aus ihrer Heimat auf der Suche nach sichereren Ländern"
    
    fi_reparations:0 "Reparationen"
    fi_reparations_desc:0 "Reparationen für die Sowjetunion"
    
    fi_monarchist_voices:0 "Monarchistische Stimmen"
    fi_monarchist_voices_desc:0 "Die Menschen dieses Landes werden von der Botschaft einer edlen und gerechten Nation beeinflusst"
    fi_experiance_leadership:0 "Erfahrene Führung"
    fi_experiance_leadership_2:0 "Erfahrene Führung"
    fi_experiance_leadership_3:0 "Erfahrene Führung"
    fi_experiance_leadership_desc:0 ""
    fi_politcally_experianced_king:0 "Politisches Genie"
    fi_politcally_experianced_king_desc:0 "Der König dieses Landes gilt als Meister der Politik"
    fi_valuable_metals_idea:0 "Wertvolle Metalle"
    fi_valuable_metals_idea_desc:0 "Diese Nation nutzt ihre wertvollen Metalle, um das Leben ihrer Bürger zu finanzieren"
    fi_imperial_ambitions:0 "Imperiale Ambitionen"
    fi_imperial_ambitions_desc:0 "Dieses Land hat seine Ambitionen, ein großes Imperium zu werden, öffentlich bekannt gegeben"
    fi_imperial_successors:0 "Kaiserliche Nachfolger"
    fi_imperial_successors_desc:0 "Die Menschen dieser Nation glauben, Nachfolger eines großen und mächtigen Reiches zu sein."
    fi_reformed_state:0 "Reformierter Staat"
    fi_reformed_state_desc:0 "Diese Nation hat vor kurzem eine erfolgreiche Reformation durchlaufen und läuft daher reibungsloser als die meisten anderen Nationen"
    fi_communist_persecution:0 "Kommunistische Verfolgung"
    fi_communist_persecution_desc:0 "Kommunisten werden in diesem Land vom Volk und vom Staat verfolgt"
    fi_strong_king:0 "Ein starker König"
    fi_strong_king_desc:0 "Diese Nation hat ihrem König große Macht gegeben"
