WW1_Expansion_news.15.a:1 "Japanische Expansion muss gestoppt werden"

WW1_Expansion_country.16.t:0 "Montenegro wird zum unabhängigen Königreich erklärt"
WW1_Expansion_country.16.d:0 "Prinz Nikolaus von Montenegro proklamierte am 28. August 1910 in Cetinje das Königreich Montenegro und erhob das Land aus dem Rang eines Fürstentums."
WW1_Expansion_country.16.a:1 "Endlich"
WW1_Expansion_news.16.t:0 "Montenegro wird zum unabhängigen Königreich erklärt"
