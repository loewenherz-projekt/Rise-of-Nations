WW1_Expansion_country.27.t:0 "Internationaler Frauentag"
WW1_Expansion_country.27.d:0 "Der Internationale Frauentag (IWD) ist ein weltweiter Feiertag, der jährlich am 8. März gefeiert wird, um an die kulturellen, politischen und sozioökonomischen Errungenschaften von Frauen zu erinnern. Er ist auch ein Schwerpunkt der Frauenrechtsbewegung und lenkt die Aufmerksamkeit auf Themen wie Geschlechtergleichstellung, reproduktive Rechte sowie Gewalt und Missbrauch gegen Frauen."
WW1_Expansion_country.27.a:1 "Endlich"
