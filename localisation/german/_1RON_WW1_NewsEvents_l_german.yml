WW1_Expansion_country.4.t:0 "Frankenstein-Film kommt heraus"
WW1_Expansion_country.4.d:0 "Frankenstein ist ein US-amerikanischer Stummfilm aus dem Jahr 1910, produziert von den Edison Studios. Regie führte J. Searle Dawley, der auch das Drehbuch schrieb. Sein Drehbuch basiert weitgehend auf Mary Shelleys Roman Frankenstein oder Der moderne Prometheus aus dem Jahr 1818. Dieser Kurzfilm gilt unter Filmhistorikern als die erste Verfilmung von Shelleys Werk."
WW1_Expansion_country.4.a:1 "So gruselig!"
