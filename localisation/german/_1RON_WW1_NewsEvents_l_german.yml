WW1_Expansion_country.57.t:0 "Der Delhi Durbar"
WW1_Expansion_country.57.d:0 "Der Delhi Durbar war eine von den Briten im Coronation Park in Delhi, Indien, organisierte Massenversammlung im Stil des indischen Kaiserreichs, um die Nachfolge eines indischen Kaisers oder einer indischen Kaiserin zu feiern. Auch als Imperial Durbar bekannt, fand er dreimal statt, 1877, 1903 und 1911, auf dem Höhepunkt des Britischen Empires. Der Durbar von 1911 war der einzige, an dem ein Herrscher, Georg V., teilnahm. Der Begriff leitet sich vom gebräuchlichen Mogul-Begriff „Durbar“ ab."
WW1_Expansion_country.57.a:1 "Der britische Imperialismus kennt keine Grenzen"
