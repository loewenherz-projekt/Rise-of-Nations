WW1_Expansion_country.10.t:0 "Norwegische Antarktisexpedition startet von Christiania"
WW1_Expansion_country.10.d:0 "Die erste Expedition zum geografischen Südpol wurde vom norwegischen Forscher Roald Amundsen geleitet. Er und vier weitere erreichten den Pol am 14. Dezember 1911, fünf Wochen vor einer britischen Gruppe unter der Leitung von Robert Falcon Scott im Rahmen der Terra-Nova-Expedition. Er sicherte sich Fridtjof Nansens Polarforschungsschiff Fram und sammelte umfangreiche Spenden. Die Vorbereitungen für diese Expedition wurden unterbrochen, als die rivalisierenden amerikanischen Forscher Frederick Cook und Robert Peary 1909 jeweils behaupteten, den Nordpol erreicht zu haben. Als er im Juni 1910 aufbrach, täuschte er sogar seine Mannschaft vor, sie befänden sich auf einer Arktisdrift, und verriet ihr wahres Ziel in der Antarktis erst, als die Fram ihren letzten Anlaufhafen Madeira verließ."
WW1_Expansion_country.10.a:1 "Ein neues Kapitel für die menschliche Erforschung"
WW1_Expansion_news.10.t:0 "Norwegische Antarktisexpedition startet von Christiania"
WW1_Expansion_news.10.d:0 "Die erste Expedition zum geografischen Südpol wurde vom norwegischen Forscher Roald Amundsen geleitet. Er und vier weitere erreichten den Pol am 14. Dezember 1911, fünf Wochen vor einer britischen Gruppe unter der Leitung von Robert Falcon Scott im Rahmen der Terra-Nova-Expedition. Er sicherte sich die Nutzung von Fridtjof Nansens Polarforschungsschiff Fram und unternahm umfangreiche Spendenaktionen. Die Vorbereitungen für diese Expedition wurden unterbrochen, als die rivalisierenden amerikanischen Forscher Frederick Cook und Robert Peary 1909 jeweils behaupteten, den Nordpol erreicht zu haben. Als er im Juni 1910 aufbrach, täuschte er sogar seine Mannschaft vor, sie befänden sich auf einer Arktisdrift, und verriet ihr wahres Ziel in der Antarktis erst, als die Fram ihren letzten Anlaufhafen Madeira verließ."
WW1_Expansion_news.10.a:1 "Ein neues Kapitel für die menschliche Erforschung"

WW1_Expansion_country.11.t:0 "Britische Antarktisexpedition startet in Cardiff"
WW1_Expansion_country.11.d:0 "Die Terra-Nova-Expedition, offiziell die Britische Antarktisexpedition, war eine Expedition in die Antarktis, die zwischen 1910 und 1913 stattfand. Unter der Leitung von Kapitän Robert Falcon Scott verfolgte die Expedition verschiedene wissenschaftliche und geographische Ziele. Scott wollte die wissenschaftliche Arbeit fortsetzen, die er während seiner Zeit als Leiter der Discovery-Expedition von 1901 bis 1904 begonnen hatte, und als Erster den geografischen Südpol erreichen. Er und vier Begleiter erreichten den Pol am 17. Januar 1912, wo sie feststellten, dass ihnen ein norwegisches Team unter der Leitung von Roald Amundsen 34 Tage voraus war. Scotts fünfköpfige Gruppe starb auf dem Rückweg vom Pol; einige ihrer Leichen, Tagebücher und Fotos wurden acht Monate später von einem Suchtrupp gefunden."
WW1_Expansion_country.11.a:1 "Ich hoffe wir schaffen es rechtzeitig"
WW1_Expansion_news.11.t:0 "Britische Antarktisexpedition startet in Cardiff"
