WW1_Expansion_country.20.t:0 "Vajiravudh (Rama VI) wird zum König von Siam gekrönt"
WW1_Expansion_country.20.d:0 "Vajiravudh, auch Phramongkutklao oder Rama VI. genannt, war von 1910 bis 1925 König von Siam und bekannt für seine fortschrittlichen Reformen und seine zahlreichen Schriften. Vajiravudh studierte Geschichte und Jura an der Universität Oxford. Er erhielt außerdem eine militärische Ausbildung in Sandhurst und diente kurzzeitig in der britischen Armee. Nachdem er 1895 zum Thronfolger ernannt worden war, kehrte er 1903 nach Siam zurück und trat 1910 die Nachfolge seines Vaters Chulalongkorn an."
WW1_Expansion_country.20.a:1 "OK"
