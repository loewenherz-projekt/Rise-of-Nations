WW1_Expansion_country.5.t:0 "Feuer während des Scheunentanzes in Ököritófülpös"
WW1_Expansion_country.5.d:0 "Der 27. März ist der Tag im Jahr 1910, an dem bei einem Brand während eines Scheunentanzes im ungarischen Ököritófülpös 312 Menschen ums Leben kommen."
