WW1_Expansion_country.3.t:0 "Boutros Ghali ermordet"
WW1_Expansion_country.3.d:0 "Der ägyptische Premierminister Boutros Ghali wurde ermordet. Ghali wurde beschuldigt, im Denshawai-Vorfall die Briten bevorzugt zu haben. Dies gilt als Hauptmotiv für seine Ermordung. Die ägyptische Regierung hat dazu eine offizielle Stellungnahme veröffentlicht. Experten sind überzeugt, dass Ghalis Ermordung der erste einer Reihe von Attentaten ist, die bis 2015 andauern könnten. Da sich die politische Lage im Osmanischen Reich verbessert, ist dieser Mord zudem der erste öffentliche Mord an einem hochrangigen Staatsmann in Ägypten seit über einem Jahrhundert. Während die Welt und insbesondere Ägypten den Tod eines einflussreichen Mannes betrauern, fragt man sich unweigerlich, was dies für die Zukunft Ägyptens bedeutet."
WW1_Expansion_country.3.a:1 "Warum?"
