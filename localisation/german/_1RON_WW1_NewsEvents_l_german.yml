WW1_Expansion_country.24.t:0 "Northern und Australian Capital Territories wurden zu Australien hinzugefügt"
WW1_Expansion_country.24.d:0 "Das Hauptstadtterritorium wurde von New South Wales abgetrennt, das Northern Territory von South Australia. Während in den Gesetzen zur Schaffung des Territoriums der Begriff „Territorium für den Regierungssitz“ verwendet wurde, wurde in Gesetzen und Proklamationen sofort der Begriff „Hauptstadtterritorium“ verwendet."
WW1_Expansion_country.24.a:1 "Immer noch eine Einöde"
