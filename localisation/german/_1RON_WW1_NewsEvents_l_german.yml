WW1_Expansion_country.53.t:0 "Italien annektiert Tripolis und die Cyrenaika"
WW1_Expansion_country.53.d:0 "Am 5. November 1911 annektierte Italien die libyschen Städte Cyrenaika und Tripolis, wodurch der Italienisch-Türkische Krieg eskalierte. Die Italiener hatten das schwächelnde Osmanische Reich in einem Jahrzehnt angegriffen, dessen schnelle Destabilisierung zum Ersten Weltkrieg führte. Italien hatte schon lange sowohl militärische als auch kulturelle Kontakte mit Libyen und Nordafrika. Schon 146 v. Chr. war Rom durch die Punischen Kriege Erbe des karthagischen Reiches geworden. Obwohl der Versuch, in Karthago eine Kolonie zu gründen, scheiterte, ließen sich römische und italienische Händler und Bauern in großer Zahl in der Provinz nieder, und viele Veteranen ließen sich westlich der Grenzlinie nieder. Nach der Schlacht von Thapsus im Jahr 46 v. Chr. fügte Caesar der bestehenden Provinz das numidische Gebiet Juba hinzu. Caesars Absicht, Karthago erneut zu kolonisieren, wurde von Augustus in die Tat umgesetzt."
WW1_Expansion_country.53.a:1 "OK"
