WW1_Expansion_country.13.t:0 "Rassenunruhen in den Vereinigten Staaten"
WW1_Expansion_country.13.d:0 "Lynchen wird definiert als „eine Form der Gewalt, bei der ein Mob unter dem Vorwand der Rechtspflege ohne Prozess einen mutmaßlichen Täter hinrichtet, oft nachdem er ihn gefoltert und körperlich verstümmelt hat“. Es war eine besonders rituelle Form des Mordes, an der häufig die Mehrheit der Mitglieder der örtlichen weißen Gemeinschaft beteiligt war. Lynchmorde wurden manchmal im Voraus angekündigt und häufig zu spektakulären Lynchmorden umfunktioniert, die vor Publikum stattfanden. Die Zahl der Lynchmorde in den Vereinigten Staaten ging zwischen den 1880er und den 1920er Jahren zurück, aber in den 1920er Jahren gab es immer noch durchschnittlich etwa 30 Lynchmorde pro Jahr. Eine Studie von 100 Lynchmorden, die zwischen 1929 und 1940 durchgeführt wurde, ergab, dass mindestens ein Drittel der Opfer unschuldig waren."
WW1_Expansion_country.13.a:1 "Was?"
