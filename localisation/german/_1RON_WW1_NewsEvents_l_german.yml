WW1_Expansion_country.25.t:0 "Erdbeben in Kebin"
WW1_Expansion_country.25.d:0 "Das Kebin-Erdbeben von 1911, auch Tschon-Kemin-Erdbeben genannt, erschütterte am 3. Januar Russisch-Turkestan. Es erreichte eine Momentenmagnitude von 8,0, forderte 452 Todesopfer, zerstörte über 770 Gebäude (fast die gesamte Stadt) in Almaty, Kasachstan, und verursachte 201 Kilometer lange Verwerfungen in den Tälern von Tschon-Kemin, Chilik und Tschon-Aksu."
WW1_Expansion_country.25.a:1 "Tragisch"
