WW1_Expansion_country.42.t:0 "Krönung von Georg V."
WW1_Expansion_country.42.d:0 "Die Krönung Georgs V. und seiner Frau Maria zum König und zur Königin des Vereinigten Königreichs und der britischen Dominions sowie zum Kaiser und zur Kaiserin von Indien fand am 22. Juni 1911 in der Westminster Abbey in London statt. Dies war die zweite von vier Veranstaltungen dieser Art im 20. Jahrhundert und die letzte, an der königliche Vertreter der großen kontinentaleuropäischen Imperien teilnahmen."
