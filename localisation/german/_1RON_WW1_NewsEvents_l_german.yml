WW1_Expansion_country.35.t:0 "Standard Oil vom Obersten Gerichtshof der USA aufgelöst"
WW1_Expansion_country.35.d:0 "Die Standard Oil Company, Inc. war ein US-amerikanisches Ölproduktions-, Transport-, Raffinerie- und Vertriebsunternehmen, das von 1870 bis 1911 aktiv war. In seiner Blütezeit war Standard Oil der größte Mineralölkonzern der Welt, und sein Erfolg machte seinen Mitbegründer und Vorstandsvorsitzenden John D. Rockefeller zu einem der reichsten Amerikaner aller Zeiten und zu einem der reichsten Menschen der modernen Geschichte. Seine Geschichte als einer der ersten und größten multinationalen Konzerne der Welt endete 1911, als der Oberste Gerichtshof der USA entschied, dass es sich um ein illegales Monopol handele."
WW1_Expansion_country.35.a:1 "Unglücklich"
