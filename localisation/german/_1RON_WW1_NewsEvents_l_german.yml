WW1_Expansion_country.26.t:0 "Belagerung der Sidney Street"
WW1_Expansion_country.26.d:0 "Die Belagerung der Sidney Street im Januar 1911, auch bekannt als die Schlacht von Stepney, war eine Schießerei im Londoner East End zwischen einer kombinierten Polizei- und Armeetruppe und zwei lettischen Revolutionären. Die Belagerung war der Höhepunkt einer Reihe von Ereignissen, die im Dezember 1910 mit einem versuchten Juwelenraub in Houndsditch in der City of London durch eine Bande lettischer Einwanderer begannen, bei dem drei Polizisten ermordet, zwei weitere verletzt und George Gardstein, der Anführer der lettischen Bande, getötet wurde."
WW1_Expansion_country.26.a:1 "Sie haben sich ziemlich gut geschlagen"
