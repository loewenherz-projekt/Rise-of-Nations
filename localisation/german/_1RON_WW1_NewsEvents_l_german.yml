WW1_Expansion_country.58.t:0 "Der Jagdausflug von Georg V. im Jahr 1911"
WW1_Expansion_country.58.d:0 "Vom 18. bis 28. Dezember 1911 nahm König Georg V. von Großbritannien im Rahmen einer vom nepalesischen Premierminister Chandra Shumsher Jang Bahadur Rana organisierten Expedition an einer Jagd im Königreich Nepal teil. Der König wollte Nepal bereits 1905 besuchen, konnte die Region jedoch aufgrund der anhaltenden Cholera-Pandemie nicht betreten. Die Besatzung tötete im Verlauf der zehntägigen Expedition 39 Tiger, 18 Nashörner, 4 Bären sowie mehrere Stachelschweine und Leoparden. Während der Jagd verlieh der König Chandra Shumsher den Royal Victorian Order."
WW1_Expansion_country.58.a:1 "Wen interessiert das?"
WW1_Expansion_news.58.t:0 "Der Jagdausflug von Georg V. im Jahr 1911"
WW1_Expansion_news.58.d:0 "Vom 18. bis 28. Dezember 1911 nahm König Georg V. von Großbritannien im Rahmen einer vom nepalesischen Premierminister Chandra Shumsher Jang Bahadur Rana organisierten Expedition an einer Jagd im Königreich Nepal teil. Der König wollte Nepal bereits 1905 besuchen, konnte die Region jedoch aufgrund der anhaltenden Cholera-Pandemie nicht betreten. Die Besatzung tötete im Verlauf der zehntägigen Expedition 39 Tiger, 18 Nashörner, 4 Bären sowie mehrere Stachelschweine und Leoparden. Während der Jagd verlieh der König Chandra Shumsher den Royal Victorian Order."
WW1_Expansion_news.58.a:1 "Wen interessiert das?"

WW1_Expansion_country.59.t:0 "Sun Yat-sen zum provisorischen Präsidenten gewählt"
WW1_Expansion_country.59.d:0 "Die provisorischen Präsidentschaftswahlen 1911 in China fanden am 29. Dezember 1911 während der Xinhai-Revolution statt und waren die Wahlen zum ersten provisorischen Präsidenten und Vizepräsidenten der provisorischen Regierung der Republik China. Sun Yat-sen und Li Yuan-hung wurden zum Präsidenten bzw. Vizepräsidenten gewählt. Sun legte am 1. Januar 1912 um Mitternacht seinen Amtseid ab und verkündete die offizielle Gründung der Republik China."
WW1_Expansion_country.59.a:1 "OK"
