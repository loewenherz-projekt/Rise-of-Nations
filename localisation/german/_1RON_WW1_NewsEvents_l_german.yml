WW1_Diplomacy.1.t:0 "Frankreich schlägt einen Vertrag vor"
WW1_Diplomacy.1.d:0 "Der Marokko-Kongo-Vertrag wurde am 4. November 1911 in Berlin zwischen Frankreich und Deutschland unterzeichnet, um die französische Herrschaft über Marokko anzuerkennen. Dieses Ereignis beendete die Agadir-Krise. Darin trat Frankreich Teile des Französisch-Kongo und Französisch-Äquatorialafrikas, darunter Neukamerun, an Deutschland ab."
WW1_Diplomacy.1.a:1 "Akzeptieren"
WW1_Diplomacy.1.a:1 "Abfall"
WW1_Diplomacy.2.t:0 "Deutschland akzeptiert Vertrag"
WW1_Diplomacy.2.d:0 "Der Marokko-Kongo-Vertrag wurde am 4. November 1911 in Berlin zwischen Frankreich und Deutschland unterzeichnet, um die französische Herrschaft über Marokko anzuerkennen. Dieses Ereignis beendete die Agadir-Krise. Darin trat Frankreich Teile des Französisch-Kongo und Französisch-Äquatorialafrikas, darunter Neukamerun, an Deutschland ab."
WW1_Diplomacy.2.a:1 "Exzellent"
WW1_Diplomacy.3.t:0 "Deutschland lehnt Vertrag ab"
WW1_Diplomacy.3.d:0 "Der Marokko-Kongo-Vertrag wurde am 4. November 1911 in Berlin zwischen Frankreich und Deutschland unterzeichnet, um die französische Herrschaft über Marokko anzuerkennen. Dieses Ereignis beendete die Agadir-Krise. Darin trat Frankreich Teile des Französisch-Kongo und Französisch-Äquatorialafrikas, darunter Neukamerun, an Deutschland ab."
WW1_Diplomacy.3.a:1 "Das könnte hässlich werden"
WW1_Diplomacy.4.t:0 "Frankreich beleidigt uns"
WW1_Diplomacy.4.d:0 "Der französische Botschafter hat uns ein Telegramm geschickt, in dem er uns mitteilt, dass die französischen Außenpolitiken für Deutschland nicht von Belang seien. Darüber hinaus fordert er, dass wir das Schlachtschiff unverzüglich entfernen, andernfalls müssten wir mit Konsequenzen rechnen."
WW1_Diplomacy.4.a:1 "Das bedeutet Krieg"
WW1_Diplomacy.4.b:1 "Zurück nach unten"

GER_Agadir_Crisis:0 "Agadir-Krise"
