WW1_Expansion_country.1.t:0 "Erste Radiosendung überhaupt"
WW1_Expansion_country.1.d:0 "Am [GetDateText] war eine Opernübertragung zu hören, die teilweise von der Bühne der New Yorker Metropolitan Opera Company übertragen wurde. Enrico Caruso und Emmy Destinn sangen Arien aus Cavalleria Rusticana und I Pagliacci, die „vom Diktographen direkt von der Bühne aufgenommen und verstärkt und von drahtlosen Hertzschen Wellen über die turbulenten Wasser des Meeres zu transkontinentalen und küstennahen Schiffen und über die Berggipfel und hügeligen Täler des Landes getragen wurden.“"
WW1_Expansion_country.1.a:1 "Das ist ein großer Schritt für die Menschheit"
