WW1_Expansion_country.43.t:0 "Die Agadir-Krise"
WW1_Expansion_country.43.d:0 "Die Agadir-Krise, der Agadir-Zwischenfall oder die Zweite Marokkokrise (auch Panthersprung genannt) war eine kurze Krise, die durch die Stationierung einer beträchtlichen französischen Truppenmacht im Landesinneren Marokkos im April 1911 und die Entsendung des deutschen Kanonenboots SMS Panther nach Agadir, einem marokkanischen Atlantikhafen, ausgelöst wurde. Deutschland hatte keine Einwände gegen die französische Expansion, forderte aber eine territoriale Entschädigung. Berlin drohte mit Krieg, schickte ein Kanonenboot und wiegelte deutsche Nationalisten auf. Verhandlungen zwischen Berlin und Paris lösten die Krise am 4. November 1911: Frankreich übernahm Marokko als Protektorat im Austausch für territoriale Zugeständnisse des Französisch-Kongo an Deutsch-Kamerun."
WW1_Expansion_country.43.a:1 "Oh oh"
