WW1_Expansion_country.21.t:0 "Der erste Luftfrachtflug"
WW1_Expansion_country.21.d:0 "Der erste Frachtflug fand am 7. November 1910 in den USA zwischen Dayton und Columbus, Ohio, statt. Philip Orin Parmelee steuerte ein Flugzeug vom Typ Wright Model B 105 Kilometer weit und transportierte ein Paket mit 200 Pfund Seide für die Eröffnung eines Geschäfts. Zeitungsausschnitte zitierten die Gebrüder Wright mit der Aussage, er habe die Strecke in 66 Minuten zurückgelegt. Offiziell wurde der Flug jedoch mit 57 Minuten aufgezeichnet – damals ein Geschwindigkeitsweltrekord."
WW1_Expansion_country.21.a:1 "Im Luftverkehr wurden große Fortschritte erzielt"
