WW1_Expansion_country.55.t:0 "Australasiatische Antarktisexpedition"
WW1_Expansion_country.55.d:0 "Die Australasiatische Antarktisexpedition war eine von 1911 bis 1914 von Douglas Mawson geleitete Expedition, die die weitgehend unerforschte antarktische Küste südlich von Australien erkundete. Mawson war durch seine Erfahrungen auf Ernest Shackletons Nimrod-Expedition in den Jahren 1907 bis 1909 zu seiner eigenen Expedition inspiriert worden. Während ihres Aufenthalts in der Antarktis legten die Schlittengruppen der Expedition rund 4.180 Kilometer unerforschtes Gebiet zurück, während ihr Schiff, die SY Aurora, 2.900 Kilometer unerforschte Küste befuhr. Zu den wissenschaftlichen Aktivitäten gehörten meteorologische Messungen, magnetische Beobachtungen, ein umfangreiches ozeanografisches Programm und die Sammlung zahlreicher biologischer und geologischer Proben, darunter die Entdeckung des ersten in der Antarktis gefundenen Meteoriten. Die Expedition war die erste, die drahtlosen Kontakt zwischen der Antarktis und Australien herstellte und aufrechterhielt. Eine weitere geplante Neuerung – der Einsatz eines Flugzeugs – wurde durch einen Unfall vor der Abfahrt der Expedition vereitelt. Der Rumpf des Flugzeugs wurde zu einem motorisierten Schlitten oder „Lufttraktor“ umgebaut, erwies sich jedoch als nur von sehr begrenztem Nutzen."
WW1_Expansion_country.55.a:1 "OK"
