WW1_Expansion_country.7.t:0 "Halleyscher Komet sichtbar."
WW1_Expansion_country.7.d:0 "Die Annäherung von 1910, die um den 10. April herum sichtbar wurde und am 20. April ihr Perihel erreichte, war die erste Annäherung, von der Fotos existieren. Der Komet näherte sich dem Planeten zudem relativ nahe, was den Anblick spektakulär machte. Am 19. Mai durchquerte die Erde tatsächlich seinen Schweif. Eine der Substanzen, die durch spektroskopische Analyse im Schweif entdeckt wurden, war das giftige Gas Cyan. Ein Astronom behauptete daraufhin, dass das Gas beim Durchqueren des Schweifes der Erde „die Atmosphäre durchdringen und möglicherweise alles Leben auf dem Planeten auslöschen“ würde. Dies führte zu panischen Käufen von Gasmasken und Quacksalber-„Anti-Kometen-Pillen“ und „Anti-Kometen-Regenschirmen“. Tatsächlich ist das Gas jedoch so diffus, dass die Erde durch den Schweif keine Auswirkungen erlitt."
WW1_Expansion_country.7.a:1 "Faszinierend"
WW1_Expansion_news.7.t:0 "Halleyscher Komet sichtbar."
