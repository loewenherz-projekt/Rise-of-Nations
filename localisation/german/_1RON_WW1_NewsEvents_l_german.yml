WW1_Expansion_news.11.a:1 "Sie waren 34 Tage zu kurz"

WW1_Expansion_country.12.t:0 "Erster kommerzieller Zeppelinflug"
WW1_Expansion_country.12.d:0 "Am 19. Juni 1910 absolvierte der erste Zeppelin der DELAG, LZ 7 mit dem Namen Deutschland, seinen Erstflug. Trotz des Verlustes am 28. Juni 1910 brachte das Unternehmen im darauffolgenden Jahr die verbesserte Deutschland II und die LZ 10 Schwaben auf den Markt. Während seiner kommerziellen Laufbahn beförderte er 1.553 zahlende Passagiere."
WW1_Expansion_country.12.a:1 "Ich hoffe, dieses Transportmittel ist sicher"
