WW1_Expansion_country.15.t:0 "Japan-Korea-Vertrag von 1910"
WW1_Expansion_country.15.d:0 "Der Japan-Korea-Vertrag von 1910, auch bekannt als Annexionsvertrag zwischen Japan und Korea, wurde am 22. August 1910 von Vertretern des Kaiserreichs Japan und des Kaiserreichs Korea geschlossen. In diesem Vertrag annektierte Japan Korea formell, nachdem Korea bereits im Japan-Korea-Vertrag von 1905 ein Protektorat Japans geworden war und Korea im Japan-Korea-Vertrag von 1907 die Selbstverwaltung der inneren Angelegenheiten entzogen worden war."
WW1_Expansion_country.15.a:1 "Erkennen Sie ihre Unabhängigkeit an"
WW1_Expansion_country.15.b:1 "Drücken Sie auf Annexion"
WW1_Expansion_news.15.t:0 "Japanisch-Korea-Vertrag von 1910."
