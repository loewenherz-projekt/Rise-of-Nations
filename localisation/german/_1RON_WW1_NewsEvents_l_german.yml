WW1_Expansion_news.7.a:1 "Faszinierend"

WW1_Expansion_country.8.t:0 "Tod von Edward VII."
WW1_Expansion_country.8.d:0 "Edward rauchte täglich zwanzig Zigaretten und zwölf Zigarren. Gegen Ende seines Lebens litt er zunehmend an Bronchitis. Im März 1910 brach er während eines Aufenthalts in Biarritz zusammen. Am 6. Mai erlitt Edward mehrere Herzinfarkte, weigerte sich jedoch, zu Bett zu gehen und sagte: „Nein, ich werde nicht aufgeben. Ich werde weitermachen. Ich werde bis zum Ende arbeiten.“ Zwischen Momenten der Ohnmacht erzählte ihm sein Sohn, der Prinz von Wales (der bald König Georg V. wurde), dass sein Pferd, Witch of the Air, an diesem Nachmittag gestorben sei. Der König antwortete: „Ja, ich habe davon gehört. Ich bin sehr froh“ – seine letzten Worte. Um 23:30 Uhr verlor er zum letzten Mal das Bewusstsein und wurde zu Bett gebracht. Er starb 15 Minuten später"
WW1_Expansion_country.8.a:1 "Sie hat einen neuen König"
