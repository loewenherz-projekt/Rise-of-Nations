WW1_Expansion_country.28.t:0 "Brand in der Triangle Shirtwaist-Fabrik"
WW1_Expansion_country.28.d:0 "Der Fabrikbrand in der Triangle Shirtwaist Factory im Stadtteil Greenwich Village in Manhattan, New York, am Samstag, dem 25. März 1911, war die schlimmste Industriekatastrophe in der Geschichte der Stadt und eine der tödlichsten in der Geschichte der USA. Bei dem Brand starben 146 Textilarbeiter – 123 Frauen und Mädchen sowie 23 Männer – durch Feuer, Rauchvergiftung oder tödliche Stürze bzw. Sprünge. Die meisten Opfer waren erst kürzlich aus Italien oder Jüdisch eingewanderte Frauen und Mädchen im Alter zwischen 14 und 23 Jahren. Von den Opfern, deren Alter bekannt ist, war die älteste die 43-jährige Providenza Panno, die jüngsten die 14-jährigen Kate Leone und Rosaria „Sara“ Maltese."
WW1_Expansion_country.28.a:1 "Tragisch"
