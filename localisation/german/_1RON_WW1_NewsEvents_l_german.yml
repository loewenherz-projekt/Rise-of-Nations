WW1_Expansion_country.14.t:0 "Osmanische Streitkräfte schlagen albanischen Aufstand nieder"
WW1_Expansion_country.14.d:0 "Der albanische Aufstand von 1910 war eine Reaktion auf die neue Zentralisierungspolitik der jungtürkischen osmanischen Regierung in Albanien. Er war der erste einer Reihe größerer Aufstände. Die Rebellen wurden vom Königreich Serbien unterstützt. Neue Steuern in den ersten Monaten des Jahres 1910 führten dazu, dass Isa Boletini albanische Führer, die bereits an einem Aufstand von 1909 beteiligt waren, zu einem weiteren Aufstand gegen das Osmanische Reich überredete. Die albanischen Angriffe auf die Osmanen in Priştine (heute Pristina) und Ferizovik (heute Ferizaj), die Tötung des osmanischen Kommandanten in İpek (heute Peć) und die Blockade der Eisenbahnlinie nach Skopje durch Aufständische am Kaçanik-Pass führten dazu, dass die osmanische Regierung das Kriegsrecht in der Region verhängte."
WW1_Expansion_country.14.a:1 "OK"
