WW1_Expansion_country.56.t:0 "Minenexplosion in Tennessee"
WW1_Expansion_country.56.d:0 "Das Cross Mountain Minenunglück war eine Explosion in einem Kohlebergwerk, die sich am 9. Dezember 1911 nahe der Gemeinde Briceville im Südosten der USA ereignete. Trotz gut organisierter Rettungsaktionen unter der Leitung des neu gegründeten Bureau of Mines starben 84 Bergleute infolge der Explosion. Die wahrscheinliche Ursache der Explosion war die Entzündung von Staub und Gas, die durch einen Dacheinsturz freigesetzt wurden. Mindestens 22 der bei dem Cross Mountain Minenunglück getöteten Bergleute wurden in einem kreisförmigen Denkmal namens Cross Mountain Miners&#39; Circle begraben, das heute im National Register of Historic Places eingetragen ist."
WW1_Expansion_country.56.a:1 "Tragisch"
WW1_Expansion_news.56.t:0 "Bei einer Minenexplosion in der Nähe von Briceville, Tennessee, kommen 84 Bergleute ums Leben."
