WW1_Expansion_country.48.t:0 "Italienisch-Türkischer Krieg"
WW1_Expansion_country.48.d:0 "Der Italienisch-Türkische Krieg (auch Türkisch-Italienischer Krieg) wurde vom 29. September 1911 bis zum 18. Oktober 1912 zwischen dem Königreich Italien und dem Osmanischen Reich geführt. Infolge dieses Konflikts eroberte Italien das osmanische Vilâyet Tripolitanien, dessen wichtigste Unterprovinzen Fezzan, Cyrenaika und Tripolis selbst waren. Diese Gebiete wurden zu Kolonien von Italienisch-Tripolitanien und Cyrenaika, die später zu Italienisch-Libyen vereinigt wurden. Während des Konflikts besetzten italienische Truppen auch die Dodekanes-Inseln in der Ägäis. Im Vertrag von Ouchy von 1912 stimmte Italien der Rückgabe der Dodekanes an das Osmanische Reich zu. Die Unbestimmtheit des Textes und die nachfolgenden für das Osmanische Reich ungünstigen Ereignisse (Ausbruch der Balkankriege und des Ersten Weltkriegs) ermöglichten jedoch eine provisorische italienische Verwaltung der Inseln, und die Türkei verzichtete schließlich in Artikel 15 des Vertrags von Lausanne von 1923 auf alle Ansprüche auf diese Inseln."
WW1_Expansion_country.48.a:1 "Wofür?"
WW1_Expansion_news.48.t:0 "Italien erklärt dem Osmanischen Reich den Krieg"
WW1_Expansion_news.48.d:0 "Der Italienisch-Türkische Krieg (auch Türkisch-Italienischer Krieg) wurde vom 29. September 1911 bis zum 18. Oktober 1912 zwischen dem Königreich Italien und dem Osmanischen Reich geführt. Infolge dieses Konflikts eroberte Italien das osmanische Vilâyet Tripolitanien, dessen wichtigste Unterprovinzen Fezzan, Cyrenaika und Tripolis selbst waren. Diese Gebiete wurden zu Kolonien von Italienisch-Tripolitanien und Cyrenaika, die später zu Italienisch-Libyen vereinigt wurden. Während des Konflikts besetzten italienische Truppen auch die Dodekanes-Inseln in der Ägäis. Im Vertrag von Ouchy von 1912 stimmte Italien der Rückgabe der Dodekanes an das Osmanische Reich zu. Die Unbestimmtheit des Textes und die nachfolgenden für das Osmanische Reich ungünstigen Ereignisse (Ausbruch der Balkankriege und des Ersten Weltkriegs) ermöglichten jedoch eine provisorische italienische Verwaltung der Inseln, und die Türkei verzichtete schließlich in Artikel 15 des Vertrags von Lausanne von 1923 auf alle Ansprüche auf diese Inseln."
WW1_Expansion_news.48.a:1 "Wofür?"

WW1_Expansion_country.49.t:0 "Wuchang-Aufstand"
WW1_Expansion_country.49.d:0 "Der Wuchang-Aufstand war ein bewaffneter Aufstand gegen die herrschende Qing-Dynastie, der am 10. Oktober 1911 in Wuchang (heute Bezirk Wuchang in Wuhan), Hubei, China, stattfand. Er war der Beginn der Xinhai-Revolution, die Chinas letzte Kaiserdynastie erfolgreich stürzte. Angeführt wurde er von Elementen der Neuen Armee, beeinflusst von revolutionären Ideen aus Tongmenghui. Der Aufstand und die anschließende Revolution führten direkt zum Untergang der Qing-Dynastie nach fast drei Jahrhunderten kaiserlicher Herrschaft und zur Gründung der Republik China (ROC), die den Jahrestag des Beginns des Aufstands, den 10. Oktober, als Nationalfeiertag der Republik China begeht."
WW1_Expansion_country.49.a:1 "Nicht der Erste"
