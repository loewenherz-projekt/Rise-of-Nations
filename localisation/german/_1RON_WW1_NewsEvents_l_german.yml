WW1_Expansion_news.16.a:1 "Gut für sie"

WW1_Expansion_country.17.t:0 "Hundertjahrfeier des mexikanischen Unabhängigkeitskrieges"
WW1_Expansion_country.17.d:0 "Die liberale Diktatur von Porfirio Díaz nutzte den hundertsten Jahrestag der Unabhängigkeit, um materiellen Fortschritt, politische Stabilität und die Mestizennation zu fördern – allesamt wichtige Merkmale des mexikanischen Staates. Das Jahrhundertprogramm würdigte José Maria Morelos als mestizischen Helden der Unabhängigkeit und Benito Juárez als Architekten der Reforma und Retter der Nation. Neben seiner bemerkenswerten politischen Karriere symbolisierte Juárez die kulturelle Transformation eines Indianers zum Mestizen durch Bildung und Säkularisierung – ein Prozess, den die porfirianischen Sozialingenieure als wesentlich für die Modernisierung Mexikos befürworteten."
WW1_Expansion_country.17.a:1 "Ich hoffe, das ist ihr letzter Versuch, unabhängig zu werden"
WW1_Expansion_news.17.t:0 "Hundertjahrfeier des mexikanischen Unabhängigkeitskrieges"
WW1_Expansion_news.17.d:0 "Die liberale Diktatur von Porfirio Díaz nutzte den hundertsten Jahrestag der Unabhängigkeit, um materiellen Fortschritt, politische Stabilität und die Mestizennation zu fördern – allesamt wichtige Merkmale des mexikanischen Staates. Das Jahrhundertprogramm würdigte José Maria Morelos als mestizischen Helden der Unabhängigkeit und Benito Juárez als Architekten der Reforma und Retter der Nation. Neben seiner bemerkenswerten politischen Karriere symbolisierte Juárez die kulturelle Transformation eines Indianers zum Mestizen durch Bildung und Säkularisierung – ein Prozess, den die porfirianischen Sozialingenieure als wesentlich für die Modernisierung Mexikos befürworteten."
WW1_Expansion_news.17.a:1 "Ich hoffe, das ist ihr letzter Versuch, unabhängig zu werden"

WW1_Expansion_country.18.t:0 "Mandschurische Pest"
WW1_Expansion_country.18.d:0 "Die Mandschurische Pest war eine Lungenpest, die zwischen 1910 und 1911 vor allem in der Mandschurei wütete. Sie forderte 60.000 Todesopfer und führte zu einer multinationalen medizinischen Reaktion sowie zum Tragen der ersten persönlichen Schutzausrüstung (PSA)."
WW1_Expansion_country.18.a:1 "Oh oh"
