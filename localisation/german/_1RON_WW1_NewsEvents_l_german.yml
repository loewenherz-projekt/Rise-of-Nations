WW1_Expansion_country.54.t:0 "Die Äußere Mongolei erklärt ihre Unabhängigkeit"
WW1_Expansion_country.54.d:0 "Die Mongolische Revolution von 1911 ereignete sich, als die Region der Äußeren Mongolei während der Xinhai-Revolution ihre Unabhängigkeit vom mandschurischen Qing-China erklärte. Eine Kombination von Faktoren, darunter wirtschaftliche Not und mangelnder Widerstand gegen den westlichen Imperialismus, führte dazu, dass viele Chinesen mit der Qing-Regierung unzufrieden waren. Als ein neues Programm zur Besiedlung der Mongolei mit ethnischen Han und zur Assimilation der Einheimischen vorgestellt wurde, stieß es auf Widerstand, der zu einer relativ unblutigen Trennung vom Qing-Reich führte. Viele Häuptlinge der Barga und der Inneren Mongolei unterstützten die Revolution und wurden zu deren Anführern."
WW1_Expansion_country.54.a:1 "Gute Arbeit"
