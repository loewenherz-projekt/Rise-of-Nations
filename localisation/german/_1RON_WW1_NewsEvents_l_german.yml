WW1_Expansion_country.23.t:0 "Revolte der Peitsche"
WW1_Expansion_country.23.d:0 "Der Peitschenaufstand war eine Meuterei der Marine Ende November 1910 in Rio de Janeiro, Brasilien. Er war die direkte Folge des Einsatzes von Peitschen („Peitschenhieben“) durch weiße Marineoffiziere bei der Bestrafung afrobrasilianischer und gemischtrassiger Matrosen."
WW1_Expansion_country.23.a:1 "Unorthodoxe Art, Dinge zu erreichen"
