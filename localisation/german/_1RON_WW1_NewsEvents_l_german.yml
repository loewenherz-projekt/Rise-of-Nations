WW1_Expansion_news.43.a:1 "Oh oh"

WW1_Expansion_country.44.t:0 "Hiram Bingham entdeckt Machu Picchu wieder"
WW1_Expansion_country.44.d:0 "Am 24. Juli 1911 kletterte ein Geschichtsdozent der Yale University namens Hiram Bingham III auf den Gipfel eines Bergrückens in Peru und stieß auf eine der außergewöhnlichsten Ruinenanlagen der Welt: Machu Picchu."
WW1_Expansion_country.44.a:1 "Wie viel gibt es noch zu entdecken?"
WW1_Expansion_news.44.t:0 "Hiram Bingham entdeckt Machu Picchu wieder"
WW1_Expansion_news.44.d:0 "Am 24. Juli 1911 kletterte ein Geschichtsdozent der Yale University namens Hiram Bingham III auf den Gipfel eines Bergrückens in Peru und stieß auf eine der außergewöhnlichsten Ruinenanlagen der Welt: Machu Picchu."
WW1_Expansion_news.44.a:1 "Wie viel gibt es noch zu entdecken?"

WW1_Expansion_country.45.t:0 "Nationaler Eisenbahnstreik"
WW1_Expansion_country.45.d:0 "Der nationale Eisenbahnstreik von 1911 war der erste landesweite Streik der Eisenbahner in Großbritannien. Er entstand aus langjährigen Streitigkeiten zwischen Arbeitern und Eisenbahngesellschaften sowie dem Wunsch der Gewerkschaften, ihre Einheit und Stärke zu demonstrieren. Der Streik dauerte nur zwei Tage, doch die Machtdemonstration zwang die liberale Regierung dazu, eine königliche Kommission einzusetzen, die die Arbeitsweise des Schlichtungsausschusses von 1907 untersuchen sollte. Der Streik führte auch zu den Llanelli-Unruhen von 1911, bei denen zwei Menschen bei Zusammenstößen zwischen Eisenbahnarbeitern und Truppen starben, die entsandt worden waren, um die Blockade der Strecke durch Streikende zu beenden."
WW1_Expansion_country.45.a:1 "Wie können sie es wagen!"
WW1_Expansion_news.45.t:0 "Streik der britischen Eisenbahn"
WW1_Expansion_news.45.d:0 "Der nationale Eisenbahnstreik von 1911 war der erste landesweite Streik der Eisenbahner in Großbritannien. Er entstand aus langjährigen Streitigkeiten zwischen Arbeitern und Eisenbahngesellschaften sowie dem Wunsch der Gewerkschaften, ihre Einheit und Stärke zu demonstrieren. Der Streik dauerte nur zwei Tage, doch die Machtdemonstration zwang die liberale Regierung dazu, eine königliche Kommission einzusetzen, um die Arbeitsweise des Schlichtungsausschusses von 1907 zu untersuchen. Der Streik führte auch zu den Llanelli-Unruhen von 1911, bei denen zwei Menschen bei Zusammenstößen zwischen Eisenbahnern und Truppen starben, die entsandt worden waren, um die Blockade der Strecke durch Streikende zu beenden."
WW1_Expansion_news.45.a:1 "Sie verdienen mehr"

WW1_Expansion_country.46.t:0 "Mona Lisa aus dem Louvre gestohlen"
WW1_Expansion_country.46.d:0 "Wenn Sie am Morgen des 21. August 1911 vor dem Louvre in Paris gestanden hätten, hätten Sie vielleicht drei Männer bemerkt, die das Museum eilig verließen. An einem ruhigen Montagmorgen müssen sie ziemlich auffällig gewesen sein, erzählt der Schriftsteller und Historiker James Zug dem Wochenendmoderator Guy Raz von All Things Considered. „Sonntagnacht war in Paris ein geselliger Abend“, sagt er, „deshalb hatten viele Leute am Montagmorgen einen Kater.“ Die Männer, drei italienische Handwerker, hatten keinen Kater. Aber sie waren vielleicht ein wenig müde. Sie hatten gerade die Nacht in einer Abstellkammer für Künstlerbedarf verbracht. Und an diesem Morgen, als der Louvre noch geschlossen war, schlüpften sie aus der Abstellkammer und hoben ein 90 Kilogramm schweres Gemälde, einen Rahmen und eine schützende Glasvitrine von der Wand. Ohne Rahmen und Vitrine wurde die hölzerne Leinwand mit einer Decke bedeckt und eilig zum Bahnhof Quai d&#39;Orsay gebracht, wo das Trio um 7:47 Uhr einen Expresszug aus der Stadt bestieg."
WW1_Expansion_country.46.a:1 "Wie?!?"
WW1_Expansion_news.46.t:0 "Mona Lisa aus dem Louvre gestohlen"
WW1_Expansion_news.46.d:0 "Wenn Sie am Morgen des 21. August 1911 vor dem Louvre in Paris gestanden hätten, wären Ihnen vielleicht drei Männer aufgefallen, die das Museum eilig verließen. An einem ruhigen Montagmorgen müssen sie ziemlich auffällig gewesen sein, erzählt der Schriftsteller und Historiker James Zug dem Wochenendmoderator Guy Raz von All Things Considered. „Sonntagnacht war in Paris ein geselliger Abend“, sagt er, „deshalb hatten viele Leute am Montagmorgen einen Kater.“ Die Männer, drei italienische Handwerker, hatten keinen Kater. Aber sie waren vielleicht ein wenig müde. Sie hatten gerade die Nacht in einer Abstellkammer für Künstlerbedarf verbracht. Und an diesem Morgen, als der Louvre noch geschlossen war, schlüpften sie aus der Abstellkammer und hoben ein 90 Kilogramm schweres Gemälde, einen Rahmen und eine schützende Glasvitrine von der Wand. Ohne Rahmen und Vitrine wurde die hölzerne Leinwand mit einer Decke bedeckt und eilig zum Bahnhof Quai d&#39;Orsay gebracht, wo das Trio um 7:47 Uhr einen Expresszug aus der Stadt bestieg."
