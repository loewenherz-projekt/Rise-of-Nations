WW1_Expansion_country.2.t:0 "Erstes englisches Fußballspiel"
WW1_Expansion_country.2.d:0 "Fußball ist die beliebteste Sportart in England, wo 1863 das erste moderne Regelwerk festgelegt wurde, das großen Einfluss auf die Entwicklung der modernen Spielregeln hatte. Mit über 40.000 Fußballvereinen sind in England mehr Vereine am Fußballkodex beteiligt als in jedem anderen Land. England beherbergt den ersten Verein der Welt, Sheffield FC; den ältesten professionellen Fußballverein der Welt, Notts County; den ältesten nationalen Dachverband, die Football Association; die älteste Nationalmannschaft der Welt; den ältesten nationalen K.-o.-Wettbewerb, den FA Cup; und die älteste nationale Liga, die English Football League. Heute ist Englands höchste nationale Liga, die Premier League, eine der beliebtesten und reichsten Sportligen der Welt; mit sechs der zehn reichsten Fußballvereine der Welt (Stand 2019)."
WW1_Expansion_country.2.a:1 "OK"
