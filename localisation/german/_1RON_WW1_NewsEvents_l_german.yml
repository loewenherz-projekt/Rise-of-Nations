WW1_Expansion_country.52.t:0 "Der Berliner Vertrag"
WW1_Expansion_country.52.d:0 "Ironischerweise sollte der 4. November 1911 dauerhaften Frieden sichern, doch er bereitete den Boden für den kommenden Konflikt. An diesem Tag wurde der Berliner Vertrag unterzeichnet, der eine Reihe diplomatischer Konflikte zwischen Deutschland und Frankreich beilegen sollte, die sich nicht nur über Europa, sondern auch über den Rest der Welt erstreckten, wo ihre wachsenden Kolonialreiche zunehmend aneinander gerieten. Einige der größten Kolonialkonflikte fanden in Afrika statt, wo die europäischen Mächte seit dem 19. Jahrhundert um die Kontrolle riesiger Landstriche (und ihrer einheimischen Bevölkerung) kämpften. Deutschland, eine junge Nation, die erst 1871 von Otto von Bismarck vereint wurde, kam spät dazu: In den ersten Jahren des 20. Jahrhunderts war der größte Teil des Kontinents bereits von Großbritannien und Frankreich aufgeteilt worden, sodass der ehrgeizige Neuling gierig die Reste abschöpfen musste. Dies war der Hintergrund der Marokkokrise – genauer gesagt zweier Krisen –, die den Beginn des Ersten Weltkriegs vorwegnahmen."
WW1_Expansion_country.52.a:1 "Afrika ist erneut stärker gespalten"
