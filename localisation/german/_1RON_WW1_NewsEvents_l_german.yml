WW1_Expansion_country.6.t:0 "Transandinische Eisenbahn eingeweiht"
WW1_Expansion_country.6.d:0 "Die Transandinische Eisenbahn wurde erstmals 1854 geplant, der Bau der Strecke erfolgte jedoch erst viele Jahre später. 1874 erteilte die chilenische Regierung ihnen die Konzession für den Bau der Eisenbahnverbindung. Aufgrund finanzieller Probleme begann ihr Unternehmen, Ferrocarril Trasandino Clark, erst 1887 mit den Bauarbeiten in Los Andes. Der Abschnitt zwischen Mendoza und Uspallata wurde am 22. Februar 1891 eröffnet und am 1. Mai 1892 nach Rio Blanco, am 17. November 1893 nach Punta de Vacas und am 22. April 1903 nach Las Cuevas verlängert. Auf chilenischer Seite wurde der Abschnitt von Santa Rosa de Los Andes nach Hermanos Clark 1906 eröffnet und im Februar 1908 nach Portillo verlängert. Die gesamte Strecke wurde erstmals 1910 für den Verkehr freigegeben."
WW1_Expansion_country.6.a:1 "Dies wird der Wirtschaft sicherlich helfen"
WW1_Expansion_news.6.t:0 "Die Transandinische Eisenbahn wurde erstmals 1854 geplant, der Bau der Strecke erfolgte jedoch erst viele Jahre später. 1874 erteilte die chilenische Regierung ihnen die Konzession für den Bau der Eisenbahnverbindung. Aufgrund finanzieller Probleme begann ihr Unternehmen, Ferrocarril Trasandino Clark, erst 1887 mit den Bauarbeiten in Los Andes. Der Abschnitt zwischen Mendoza und Uspallata wurde am 22. Februar 1891 eröffnet und am 1. Mai 1892 nach Rio Blanco, am 17. November 1893 nach Punta de Vacas und am 22. April 1903 nach Las Cuevas verlängert. Auf chilenischer Seite wurde der Abschnitt von Santa Rosa de Los Andes nach Hermanos Clark 1906 eröffnet und im Februar 1908 nach Portillo verlängert. Die gesamte Strecke wurde erstmals 1910 für den Verkehr freigegeben."
