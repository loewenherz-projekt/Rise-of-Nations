WW1_Expansion_country.47.t:0 "Explosion des Schlachtschiffs Liberté"
WW1_Expansion_country.47.d:0 "25. 1911. Das drei Jahre alte Schiff wurde zerstört und seine Nachbarschiffe im Hafen von Toulon (einschließlich der République – siehe unten) wurden mit verdrehten, schwelender Trümmer überhäuft. Die Kettenreaktion der Detonationen der Magazine folgte auf einige Momente hektischer Brandbekämpfung an Bord, nachdem es in einem vorderen Magazin zu einer Selbstentzündung gekommen war. Diese Explosion folgte dem ähnlichen Verlust des Schlachtschiffs Iéna nur vier Jahre später. Nitrozellulosegel, der bevorzugte Treibstoff der französischen Marine, neigte zur Selbstentzündung und war an beiden Tragödien beteiligt."
WW1_Expansion_country.47.a:1 "Tragisch"
WW1_Expansion_news.47.t:0 "Explosion des französischen Schlachtschiffs Liberté"
WW1_Expansion_news.47.d:0 "25. 1911. Das drei Jahre alte Schiff wurde zerstört und seine Nachbarschiffe im Hafen von Toulon (einschließlich der République – unten) wurden mit verdrehten, schwelender Trümmer überhäuft. Die Kettenreaktion der Detonationen der Magazine folgte auf einige Momente hektischer Brandbekämpfung an Bord, nachdem es in einem vorderen Magazin zu einer Selbstentzündung gekommen war. Diese Explosion folgte dem ähnlichen Verlust des Schlachtschiffs Iéna nur vier Jahre später. Nitrozellulosegel, das bevorzugte Treibmittel der französischen Marine, neigte zur Selbstentzündung und war an beiden Tragödien beteiligt."
