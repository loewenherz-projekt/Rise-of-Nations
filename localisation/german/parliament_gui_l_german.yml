 TT_FRA_dislikes_germany_survivor:0 "§gMag Deutschland nicht§!: Als ehemaliger Kriegsminister während des Ersten Weltkriegs hegt Clemenceau einen starken Groll gegen die Deutschen\n\n§gÜberlebender§!: Clemenceau überlebte ein Attentat eines Anarchisten. Er wurde mehrmals angeschossen, überlebte aber wie durch ein Wunder. Er ist wirklich der „§YTiger§!“"
 TT_FRA_Jaures_traits:0 "§gPazifist§!: Jaurès ist fest davon überzeugt, dass ein Krieg in Europa vermieden werden kann."
 TT_FRA_hates_germany:0 "§gHasst Deutschland\nBeliebter General§!\n\nAls General während des Krieges entwickelte Foch eine Verbindung zu seinen Soldaten, er kannte ihren Kampf. Der Krieg ließ ihn auch Deutschland hassen, in seinen Augen sind die Deutschen nur ein barbarisches Volk, blutrünstig.[Get_additional_president_du_conseil_traits]"
 Foch_additional_info:0 " Nach dem Versagen der französischen Armee ist ihm jedoch klar, dass er mit den Deutschen über die Friedensbedingungen verhandeln muss."
 TT_FRA_Briand_traits:0 "§gAntiklerikal§!: Aristide Briand war einer der ersten Politiker, der das Gesetz zur Trennung von Kirche und Staat unterstützte, so wie er auch das später erlassene Gesetz unterstützte."
