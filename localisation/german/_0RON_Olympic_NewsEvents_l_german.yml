ron_olympic_news.1.t:0 "Spiele der II. Olympiade"
ron_olympic_news.1.d:0 "Die Olympischen Sommerspiele 1900, heute offiziell als Spiele der II. Olympiade bekannt, waren ein internationales Multisportereignis, das 1900 in Paris, Frankreich, stattfand. Es gab keine Eröffnungs- oder Abschlusszeremonie; die Wettkämpfe begannen am 14. Mai und endeten am 28. Oktober. Die Spiele fanden im Rahmen der Weltausstellung 1900 statt. Insgesamt nahmen 997 Teilnehmer in 19 verschiedenen Sportarten teil. Diese Zahl beruht auf bestimmten Annahmen darüber, welche Disziplinen „olympisch“ waren und welche nicht. Viele Athleten, darunter auch einige, die Wettkämpfe gewannen, wussten nicht, dass sie an Olympischen Spielen teilgenommen hatten. Zum ersten Mal nahmen Frauen an den Spielen teil, und die Seglerin Hélène de Pourtalès, geboren als Helen Barbey in New York City, wurde die erste Olympiasiegerin."
ron_olympic_news.1.a:1 "Citius - Altius - Fortius"

ron_olympic_news.2.t:0 "Spiele der III. Olympiade"
ron_olympic_news.2.d:0 "Die Olympischen Sommerspiele 1904, offiziell bekannt als die Spiele der III. Olympiade, waren ein internationales Multisportereignis, das vom 29. August bis 3. September 1904 in St. Louis, Missouri, USA, als Teil eines erweiterten Sportprogramms stattfand, das vom 1. Juli bis 23. November 1904 dauerte. Ausgetragen wurde das Stadion, das heute als Francis Field auf dem Campus der Washington University in St. Louis bekannt ist. Es waren die ersten Olympischen Spiele außerhalb Europas. Spannungen durch den Russisch-Japanischen Krieg und die Schwierigkeiten, 1904 nach St. Louis zu gelangen, könnten dazu beigetragen haben, dass nur sehr wenige hochrangige Athleten von außerhalb der USA und Kanadas an diesen Spielen teilnahmen. Nur 62 der 651 teilnehmenden Athleten kamen von außerhalb Nordamerikas, und insgesamt waren nur zwischen 12 und 15 Nationen vertreten. Bei einigen Wettkämpfen wurden die US-amerikanische Meisterschaft und die olympische Meisterschaft kombiniert."
ron_olympic_news.2.a:1 "Citius - Altius - Fortius"

ron_olympic_news.3.t:0 "Spiele der IV. Olympiade"
ron_olympic_news.3.d:0 "Die Olympischen Sommerspiele 1908, offiziell die Spiele der IV. Olympiade, waren ein internationales Multisportereignis, das vom 27. April bis 31. Oktober 1908 in London, Großbritannien, stattfand. Ursprünglich sollten diese Spiele in Rom stattfinden, doch nach einem verheerenden Ausbruch des Vesuvs im Jahr 1906 musste die Veranstaltung aus finanziellen Gründen verlegt werden. Rom war schließlich Gastgeber der Olympischen Sommerspiele 1960. Sie waren die vierten chronologischen modernen Olympischen Sommerspiele im Einklang mit dem heute akzeptierten Vierjahreszyklus im Gegensatz zum alternativen Vierjahreszyklus der vorgeschlagenen Schaltspiele. Der IOC-Präsident dieser Spiele war Baron Pierre de Coubertin. Mit einer Gesamtdauer von 187 Tagen oder 6 Monaten und 4 Tagen waren diese Spiele die längsten in der modernen olympischen Geschichte; seit 1988 dauern die Spiele normalerweise 17 Tage."
ron_olympic_news.3.a:1 "Citius - Altius - Fortius"

ron_olympic_news.4.t:0 "Spiele der V. Olympiade"
ron_olympic_news.4.d:0 "Die Olympischen Sommerspiele 1912, offiziell bekannt als die Spiele der V. Olympiade, waren ein internationales Multisportereignis, das vom 5. Mai bis 22. Juli 1912 in Stockholm, Schweden, stattfand. 28 Nationen und 2.408 Teilnehmer, darunter 48 Frauen, traten in 102 Wettbewerben in 14 Sportarten gegeneinander an. Mit Ausnahme von Tennis (Beginn am 5. Mai) sowie Fußball und Schießen (beide Beginn am 29. Juni) fanden die Spiele innerhalb eines Monats statt und wurden am 6. Juli offiziell eröffnet. Es waren die letzten Olympischen Spiele, bei denen reines Gold vergeben wurde, und mit Japans Debüt war es das erste Mal, dass eine asiatische Nation teilnahm. Stockholm war die einzige Bewerbung für die Spiele und wurde 1909 ausgewählt."
ron_olympic_news.4.a:1 "Citius - Altius - Fortius"

ron_olympic_news.40.t:0 "Spiele der VI. Olympiade"
ron_olympic_news.40.d:0 "Die Olympischen Sommerspiele 1916, offiziell bekannt als die Spiele der VI. Olympiade, waren ein internationales Multisportereignis, das in Berlin im Deutschen Reich stattfand."
ron_olympic_news.40.a:1 "Citius - Altius - Fortius"

ron_olympic_news.5.t:0 "Spiele der VII. Olympiade"
ron_olympic_news.5.d:0 "Die Olympischen Sommerspiele 1920, offiziell bekannt als die Spiele der VII. Olympiade, waren ein internationales Multisportereignis, das 1920 im belgischen Antwerpen stattfand. Im März 1912, während der 13. Sitzung des IOC, bewarb sich Belgien um die Ausrichtung der Olympischen Sommerspiele 1920 durch Baron Édouard de Laveleye, Präsident des Belgischen Olympischen Komitees und des Königlich Belgischen Fußballverbandes. Damals wurde noch keine feste Austragungsstadt vorgeschlagen."
ron_olympic_news.5.a:1 "Citius - Altius - Fortius"

ron_olympic_news.6.t:0 "Spiele der VIII. Olympiade"
ron_olympic_news.6.d:0 "Die Olympischen Sommerspiele 1924, offiziell bekannt als die Spiele der VIII. Olympiade, waren ein internationales Multisportereignis, das 1924 in Paris, Frankreich, stattfand. Es war das zweite Mal nach 1900, dass Paris die Spiele ausrichtete, und damit die erste Stadt, die die Olympischen Spiele zweimal ausrichtete. Das Auswahlverfahren für die Olympischen Sommerspiele 1924 umfasste sechs Bewerbungen, und Paris wurde vor Amsterdam, Barcelona, Los Angeles, Prag und Rom ausgewählt. Die Auswahl erfolgte 1921 auf der 20. IOC-Session in Lausanne."
ron_olympic_news.6.a:1 "Citius - Altius - Fortius"

ron_olympic_news.7.t:0 "Spiele der IX. Olympiade"
ron_olympic_news.7.d:0 "Die Olympischen Sommerspiele 1928, offiziell bekannt als die Spiele der IX. Olympiade, waren ein internationales Multisportereignis, das vom 28. Juli bis 12. August 1928 in Amsterdam, Niederlande, stattfand. Die Stadt Amsterdam hatte sich zuvor um die Olympischen Spiele 1920 und 1924 beworben, musste jedoch für die Spiele 1920 dem kriegszerstörten Antwerpen in Belgien und für die Spiele 1924 Pierre de Coubertins Paris weichen. Die Vereinigten Staaten gewannen die meisten Gold- und Gesamtmedaillen. Die einzige andere Bewerberstadt für die Olympischen Spiele 1928 war Los Angeles, das schließlich vier Jahre später als Austragungsort der Olympischen Spiele ausgewählt wurde. In Vorbereitung auf die Olympischen Sommerspiele 1932 überprüfte das Olympische Komitee der Vereinigten Staaten die Kosten und Einnahmen der Spiele von 1928. Das Komitee meldete Gesamtkosten in Höhe von 1,183 Millionen US-Dollar bei Einnahmen in Höhe von 1,165 Millionen US-Dollar. Dies entspricht einem vernachlässigbaren Verlust von 18.000 US-Dollar, was eine erhebliche Verbesserung gegenüber den Spielen von 1924 darstellt."
ron_olympic_news.7.a:1 "Citius - Altius - Fortius"

ron_olympic_news.8.t:0 "Spiele der X. Olympiade"
ron_olympic_news.8.d:0 "Die Olympischen Sommerspiele 1932, offiziell bekannt als die Spiele der X. Olympiade, waren ein internationales Multisportereignis, das vom 30. Juli bis 14. August 1932 in Los Angeles, Kalifornien, USA, stattfand. Die Spiele fanden während der weltweiten Weltwirtschaftskrise statt, und einige Nationen konnten die Reise nach Los Angeles nicht bezahlen. 37 Nationen nahmen teil, verglichen mit 46 bei den Olympischen Sommerspielen 1928 in Amsterdam. Selbst US-Präsident Herbert Hoover nahm nicht an den Spielen teil."
ron_olympic_news.8.a:1 "Citius - Altius - Fortius"

ron_olympic_news.9.t:0 "Spiele der XIV. Olympiade"
ron_olympic_news.9.d:0 "Die Olympischen Sommerspiele 1948 waren ein internationales Multisportereignis, das vom 29. Juli bis 14. August 1948 in London, Großbritannien, stattfand. Nach einer zwölfjährigen Pause aufgrund des Ausbruchs des Zweiten Weltkriegs waren dies die ersten Olympischen Sommerspiele seit den Spielen von 1936 in Berlin. Die Olympischen Spiele 1940 waren für Tokio und dann für Helsinki geplant, während die Olympischen Spiele 1944 vorläufig für London angesetzt waren. Dies war das zweite Mal, dass London die Olympischen Spiele ausrichtete, nachdem sie bereits 1908, vierzig Jahre zuvor, ausgerichtet worden waren. 64 Jahre später, im Jahr 2012, kehrten die Olympischen Spiele erneut nach London zurück. Damit war London die erste Stadt, die die Spiele dreimal ausrichtete, und die einzige Stadt dieser Art, bis Paris und Los Angeles 2024 bzw. 2028 ihre dritten Spiele ausrichten. Die Olympischen Spiele 1948 waren zugleich die ersten von zwei Sommerspielen, die unter der IOC-Präsidentschaft von Sigfrid Edström ausgetragen wurden. Aufgrund der schwierigen Wirtschaftslage und der Lebensmittelrationierung nach dem Zweiten Weltkrieg wurden die Spiele als „Austerity Games“ bekannt. Es wurden keine neuen Austragungsorte für die Spiele gebaut (die Veranstaltungen fanden hauptsächlich im Empire Stadium und im Empire Pool im Wembley Park statt), und die Athleten wurden in bestehenden Unterkünften im Wembley-Gebiet untergebracht, anstatt in einem Olympischen Dorf, wie schon bei den Spielen 1936 und den darauffolgenden Spielen 1952 in Helsinki. 59 Nationen waren mit 4.104 Athleten vertreten, davon 3.714 Männer und 390 Frauen in 19 Sportdisziplinen. Deutschland und Japan wurden nicht zu den Spielen eingeladen; die Sowjetunion war zwar eingeladen, entsandte jedoch keine Athleten, sondern Beobachter zur Vorbereitung der Olympischen Spiele 1952."
ron_olympic_news.9.a:1 "Citius - Altius - Fortius"

ron_olympic_news.10.t:0 "Spiele der XV. Olympiade"
ron_olympic_news.10.d:0 "Die Olympischen Sommerspiele 1952, offiziell bekannt als die Spiele der XV. Olympiade, waren ein internationales Multisportereignis, das vom 19. Juli bis 3. August 1952 in Helsinki, Finnland, stattfand. Helsinki war als Austragungsort der Olympischen Sommerspiele 1940 ausgewählt worden, die wegen des Zweiten Weltkriegs abgesagt wurden. Es ist die nördlichste Stadt, in der jemals Olympische Sommerspiele ausgetragen wurden. Es waren die ersten Spiele in einem Land, in dem keine indoeuropäische Sprache gesprochen wird. Es waren auch die Olympischen Spiele, bei denen die meisten Weltrekorde gebrochen wurden, bis sie von den Olympischen Sommerspielen 2008 in Peking übertroffen wurden. Die Sowjetunion, die Volksrepublik China, Hongkong, Indonesien, Israel, Thailand und das Saarland gaben bei den Spielen 1952 ihr olympisches Debüt. Die Vereinigten Staaten gewannen die meisten Gold- und Gesamtmedaillen."
ron_olympic_news.10.a:1 "Citius - Altius - Fortius"

ron_olympic_news.11.t:0 "Spiele der XVI. Olympiade"
ron_olympic_news.11.d:0 "Die Olympischen Sommerspiele 1956 (offiziell bekannt als die Spiele der XVI. Olympiade) waren ein internationales Multisportereignis, das vom 22. November bis 8. Dezember 1956 in Melbourne, Victoria, Australien, stattfand. Ausgenommen davon waren die Pferdewettbewerbe, die im Juni 1956 in Stockholm, Schweden, ausgetragen wurden. Diese Spiele waren die ersten auf der Südhalbkugel und in Ozeanien sowie die ersten außerhalb Europas und Nordamerikas. Melbourne ist die südlichste Stadt, die jemals Olympische Spiele ausgerichtet hat. Da sich die Jahreszeiten auf der Südhalbkugel von denen auf der Nordhalbkugel unterscheiden, fanden die Spiele 1956 nicht zur üblichen Jahreszeit statt, da die Veranstaltungen im wärmeren Frühlings-/Sommerwetter des Gastgeberlandes (entspricht Herbst/Winter auf der Nordhalbkugel) stattfinden mussten. Australien war erst im Jahr 2000 in Sydney, New South Wales, wieder Gastgeber der Spiele."
ron_olympic_news.11.a:1 "Citius - Altius - Fortius"

ron_olympic_news.12.t:0 "Spiele der XVII. Olympiade"
ron_olympic_news.12.d:0 "Die Olympischen Sommerspiele 1960, offiziell bekannt als Spiele der XVII. Olympiade (italienisch: Giochi della XVII Olimpiade), waren ein internationales Multisportereignis, das vom 25. August bis 11. September 1960 in Rom, Italien, stattfand. Rom hatte zuvor die Ausrichtung der Olympischen Sommerspiele 1908 erhalten, doch nach dem Ausbruch des Vesuvs im Jahr 1906 hatte die Stadt keine andere Wahl, als die Ehre abzulehnen und an London abzutreten. Die Sowjetunion gewann bei den Spielen 1960 die meisten Gold- und Gesamtmedaillen."
ron_olympic_news.12.a:1 "Citius - Altius - Fortius"

ron_olympic_news.13.t:0 "Spiele der XVIII. Olympiade"
ron_olympic_news.13.d:0 "Die Olympischen Sommerspiele 1964, offiziell bekannt als die Spiele der XVIII. Olympiade, waren ein internationales Multisportereignis, das vom 10. bis 24. Oktober 1964 in Tokio, Japan, stattfand. Tokio hatte die Organisation der Olympischen Sommerspiele 1940 zugesprochen bekommen, doch diese Ehre ging später aufgrund der japanischen Invasion in China an Helsinki über, bevor sie schließlich aufgrund des Zweiten Weltkriegs abgesagt wurden. Die Sommerspiele 1964 waren die ersten Olympischen Spiele in Asien und markierten das erste Mal, dass Südafrika aufgrund seines Apartheidsystems im Sport davon ausgeschlossen wurde. Entgegen der landläufigen Meinung wurde Südafrika nicht ausgeschlossen, sondern weigerte sich lediglich, eine einzige Nationalmannschaft zu entsenden, nachdem es in der Vergangenheit gemäß nationalem Recht mit mehreren getrennten olympischen Truppen (Schwarze, Weiße usw.) teilgenommen hatte. Das IOC lehnte dies standhaft ab und forderte eine einzige multiethnische Mannschaft. Das Land durfte auch an den Paralympischen Sommerspielen 1964 teilnehmen, die ebenfalls in Tokio stattfanden und sein Debüt bei den Paralympischen Spielen darstellten. Tokio wurde während der 55. IOC-Sitzung am 26. Mai 1959 in Westdeutschland als Gastgeberstadt ausgewählt."
ron_olympic_news.13.a:1 "Citius - Altius - Fortius"

ron_olympic_news.14.t:0 "Spiele der XIX. Olympiade"
ron_olympic_news.14.d:0 "Die Olympischen Sommerspiele 1968, offiziell bekannt als die Spiele der XIX. Olympiade, waren ein internationales Multisportereignis, das vom 12. bis 27. Oktober 1968 in Mexiko-Stadt, Mexiko, stattfand. Es waren die ersten Olympischen Spiele in Lateinamerika und die ersten in einem spanischsprachigen Land. Es waren auch die ersten Spiele, bei denen für Leichtathletik-Wettkämpfe eine Allwetterbahn (glatte Bahn) anstelle der traditionellen Aschenbahn verwendet wurde. Dies war auch das erste Mal, dass bei Olympischen Spielen ausschließlich elektronische Zeitmessgeräte zum Einsatz kamen. Die Spiele 1968 waren die dritten, die im letzten Quartal des Jahres stattfanden, nach den Spielen 1956 in Melbourne und 1964 in Tokio. Die mexikanische Studentenbewegung von 1968 war Tage zuvor niedergeschlagen worden, daher standen die Spiele im Zusammenhang mit den Repressionen der Regierung. Die Vereinigten Staaten gewannen zum letzten Mal bis 1984 die meisten Gold- und Gesamtmedaillen."
ron_olympic_news.14.a:1 "Citius - Altius - Fortius"

ron_olympic_news.15.t:0 "Spiele der XX. Olympiade"
ron_olympic_news.15.d:0 "Die Olympischen Sommerspiele 1972, offiziell bekannt als die Spiele der XX. Olympiade, waren ein internationales Multisportereignis, das vom 26. August bis 11. September 1972 in München, Westdeutschland, stattfand. Das Ereignis wurde vom Münchner Massaker in der zweiten Woche überschattet, bei dem elf israelische Athleten und Trainer sowie ein westdeutscher Polizist im Olympischen Dorf von palästinensischen Terroristen des Schwarzen Septembers getötet wurden. Die Olympischen Sommerspiele 1972 waren die zweiten Olympischen Sommerspiele in Deutschland nach den Spielen 1936 in Berlin, die unter dem Nazi-Regime stattgefunden hatten. Die westdeutsche Regierung hatte sich sehr bemüht, dass die Olympischen Spiele in München der Welt ein demokratisches und optimistisches Deutschland präsentieren, wie das offizielle Motto der Spiele „Die Heiteren Spiele“ zeigte. Das Logo der Spiele war ein blaues Solarlogo („die strahlende Sonne“) von Otl Aicher, dem Designer und Leiter der Kommission für visuelles Konzept. Die Hostessen trugen himmelblaue Dirndl als Zeichen der bayerischen Kultur. Das Olympia-Maskottchen, der Dackel „Waldi“, war das erste offiziell benannte Olympia-Maskottchen. Die Olympia-Fanfare wurde von Herbert Rehbein komponiert. Die meisten Gold- und Gesamtmedaillen gewann die Sowjetunion."
ron_olympic_news.15.a:1 "Citius - Altius - Fortius"

ron_olympic_news.16.t:0 "Spiele der XXI. Olympiade"
ron_olympic_news.16.d:0 "Die Olympischen Sommerspiele 1976, offiziell bekannt als die Spiele der XXI. Olympiade und allgemein bekannt als Montréal 1976, waren ein internationales Multisportereignis, das vom 17. Juli bis 1. August 1976 in Montreal, Quebec, Kanada, stattfand. Montreal erhielt die Rechte für die Spiele 1976 bei der 69. IOC-Session in Amsterdam am 12. Mai 1970 gegen Moskau und Los Angeles. Es waren die ersten und bislang einzigen Olympischen Sommerspiele, die in Kanada stattfanden. Toronto war im selben Jahr Gastgeber der Paralympischen Sommerspiele 1976 wie die Olympischen Spiele in Montreal, die bis heute die einzigen Paralympischen Sommerspiele in Kanada sind. Calgary und Vancouver waren später Gastgeber der Olympischen Winterspiele 1988 bzw. 2010. 29 Länder, hauptsächlich afrikanische, boykottierten die Spiele in Montreal, nachdem das Internationale Olympische Komitee (IOC) sich weigerte, Neuseeland auszuschließen. Zuvor war die neuseeländische Rugby-Union-Nationalmannschaft 1976 trotz der Forderung der Vereinten Nationen nach einem Sportembargo durch Südafrika getourt. Die Sowjetunion gewann die meisten Gold- und Gesamtmedaillen."
ron_olympic_news.16.a:1 "Citius - Altius - Fortius"

ron_olympic_news.17.t:0 "Spiele der XXII. Olympiade"
ron_olympic_news.17.d:0 "Die Olympischen Sommerspiele 1980, offiziell bekannt als die Spiele der XXII. Olympiade und allgemein bekannt als Moskau 1980, waren ein internationales Multisportereignis, das vom 19. Juli bis 3. August 1980 in Moskau, Sowjetunion, im heutigen Russland, stattfand. Die Spiele waren die ersten, die in Osteuropa ausgetragen wurden, und sind bis heute die einzigen Olympischen Sommerspiele, die dort ausgetragen wurden, sowie die ersten Olympischen Spiele, die in einem slawischsprachigen Land abgehalten wurden. Sie waren bis 2008 in China auch die einzigen Olympischen Sommerspiele, die in einem kommunistischen Land abgehalten wurden. Dies waren die letzten Olympischen Spiele unter der IOC-Präsidentschaft von Michael Morris, 3. Baron Killanin. Achtzig Nationen waren bei den Spielen in Moskau vertreten, die niedrigste Zahl seit 1956. Angeführt von den Vereinigten Staaten boykottierten 66 Länder die Spiele wegen des Sowjetisch-Afghanischen Krieges vollständig. Einige Athleten aus einigen der boykottierenden Länder (die nicht in der Liste der 66 Länder enthalten sind, die die Spiele vollständig boykottierten) nahmen unter der olympischen Flagge an den Spielen teil. Die Sowjetunion boykottierte später die Olympischen Sommerspiele 1984. Die Sowjetunion gewann die meisten Gold- und Gesamtmedaillen; die UdSSR und die DDR gewannen 127 von 203 möglichen Goldmedaillen."
ron_olympic_news.17.a:1 "Citius - Altius - Fortius"

ron_olympic_news.18.t:0 "Spiele der XXIII. Olympiade"
ron_olympic_news.18.d:0 "Die Olympischen Sommerspiele 1984 (offiziell bekannt als die Spiele der XXIII. Olympiade und allgemein bekannt als Los Angeles 1984) waren ein internationales Multisportereignis, das vom 28. Juli bis 12. August 1984 hauptsächlich in Los Angeles, Kalifornien, USA, stattfand. Es war das zweite Mal nach 1932, dass Los Angeles die Spiele ausrichtete. Es waren zudem die ersten Olympischen Sommerspiele unter der IOC-Präsidentschaft von Juan Antonio Samaranch. Die Olympischen Spiele 1984 wurden von insgesamt vierzehn Ostblockstaaten boykottiert, darunter die Sowjetunion und Ostdeutschland, als Reaktion auf den von den USA angeführten Boykott der Olympischen Sommerspiele 1980 in Moskau aus Protest gegen die sowjetische Invasion in Afghanistan; Rumänien war das einzige Ostblockland, das sich für die Teilnahme an den Spielen entschied. Auch der Iran und Libyen entschieden sich aus anderen Gründen für einen Boykott der Spiele. Obwohl das Teilnehmerfeld in bestimmten Sportarten aufgrund des Boykotts dezimiert war, nahmen 140 Nationale Olympische Komitees teil, was damals einen Rekord darstellte. Die meisten Gold- und Gesamtmedaillen gewannen die Vereinigten Staaten, gefolgt von Westdeutschland und Rumänien."
ron_olympic_news.18.a:1 "Citius - Altius - Fortius"

ron_olympic_news.19.t:0 "Spiele der XXIV. Olympiade"
ron_olympic_news.19.d:0 "Die Olympischen Sommerspiele 1988, offiziell bekannt als die Spiele der XXIV. Olympiade und allgemein bekannt als Seoul 1988, waren ein internationales Multisportereignis, das vom 17. September bis 2. Oktober 1988 in Seoul, Südkorea, stattfand. 159 Nationen waren bei den Spielen mit insgesamt 8.391 Athleten (6.197 Männer und 2.194 Frauen) vertreten. 237 Wettkämpfe wurden abgehalten und 27.221 Freiwillige halfen bei der Vorbereitung der Olympischen Spiele. 11.331 Medien (4.978 Printmedien und 6.353 Rundfunkanstalten) übertrugen die Spiele auf der ganzen Welt. Dies waren die letzten Olympischen Spiele für die Sowjetunion und die DDR, da beide vor den nächsten Olympischen Spielen 1992 aufhörten zu existieren. Die Sowjetunion dominierte den Medaillenspiegel und gewann 55 Goldmedaillen und insgesamt 132 Medaillen. Seit 1988 hat kein Land mehr als 50 Olympische Spiele gewonnen. Die Spiele wurden von Nordkorea und seinem Verbündeten Kuba boykottiert. Äthiopien, Albanien und die Seychellen reagierten nicht auf die Einladungen des IOC. Nicaragua nahm aus sportlichen und finanziellen Gründen nicht teil. Die Teilnahme Madagaskars war erwartet worden, und sein Team wurde bei der Eröffnungsfeier der 160 Nationen erwartet; das Land zog sich jedoch aus finanziellen Gründen zurück. Dennoch konnten die viel größeren Boykotte der Olympischen Spiele 1976, 1980 und 1984 vermieden werden, was zu der größten Teilnehmerzahl während des Kalten Krieges führte."
ron_olympic_news.19.a:1 "Citius - Altius - Fortius"

ron_olympic_news.20.t:0 "Spiele der XXV. Olympiade"
ron_olympic_news.20.d:0 "Die Olympischen Sommerspiele 1992, offiziell bekannt als die Spiele der XXV. Olympiade und allgemein bekannt als Barcelona &#39;92, waren ein internationales Multisportereignis, das vom 25. Juli bis 9. August 1992 in Barcelona, Spanien, stattfand. Ab 1994 beschloss das Internationale Olympische Komitee, die Olympischen Sommer- und Winterspiele abwechselnd in geraden Jahren abzuhalten. Die Olympischen Sommerspiele 1992 waren das letzte Mal, dass Sommer- und Winterspiele im selben Jahr stattfanden. Die Sommerspiele 1992 waren die ersten seit dem Ende des Kalten Krieges und blieben zum ersten Mal seit den Sommerspielen 1972 von Boykotten verschont."
ron_olympic_news.20.a:1 "Citius - Altius - Fortius"

ron_olympic_news.21.t:0 "Spiele der XXVI. Olympiade"
ron_olympic_news.21.d:0 "Die Olympischen Sommerspiele 1996, offiziell bekannt als die Spiele der XXVI. Olympiade, allgemein bekannt als Atlanta 1996 und auch als die Olympischen Hundertjahrspiele, waren ein internationales Multisportereignis, das vom 19. Juli bis 4. August 1996 in Atlanta, Georgia, stattfand. Diese Spiele, die vierten Olympischen Sommerspiele in den Vereinigten Staaten, markierten das hundertjährige Jubiläum der Olympischen Sommerspiele 1896 in Athen – der Eröffnungsausgabe der modernen Olympischen Spiele. Sie waren zudem die ersten seit 1924, die in einem anderen Jahr als die Olympischen Winterspiele stattfanden. Dies geschah im Rahmen einer neuen IOC-Praxis, die 1994 eingeführt wurde und die Sommer- und Winterspiele abwechselnd in geraden Jahren ausrichtete. Mehr als 10.000 Athleten aus 197 Nationalen Olympischen Komitees traten in 26 Sportarten an, darunter die Olympia-Debütanten Beachvolleyball, Mountainbiken und Softball sowie die neuen Disziplinen Leichtgewichtsrudern und Frauenfußball. 24 Länder gaben in Atlanta ihr olympisches Sommerdebüt, darunter elf ehemalige Sowjetrepubliken, die zum ersten Mal als unabhängige Nationen teilnahmen. Die USA, Gastgeber, führten den Medaillenspiegel mit insgesamt 101 Medaillen an und gewannen von allen Ländern die meisten Gold- (44) und Silbermedaillen (32). Die USA führten zum ersten Mal seit 1984 den Medaillenspiegel an und zum ersten Mal seit 1968 bei nicht boykottierten Olympischen Sommerspielen. Zu den bemerkenswerten Leistungen während der Wettkämpfe zählten die von Andre Agassi, der als erster Tennisspieler im Herreneinzel einen Grand Slam mit einer olympischen Goldmedaille kombinierte, Donovan Bailey, der mit 9,84 Sekunden einen neuen Weltrekord über 100 Meter der Männer aufstellte, und Lilia Podkopayeva, die nach dem Mehrkampftitel bei denselben Olympischen Spielen als zweite Turnerin Gold in einer Einzelveranstaltung gewann."
ron_olympic_news.21.a:1 "Citius - Altius - Fortius"

ron_olympic_news.22.t:0 "Spiele der XXVII. Olympiade"
ron_olympic_news.22.d:0 "Die Olympischen Sommerspiele 2000 (offiziell bekannt als die Spiele der XXVII. Olympiade und allgemein bekannt als Sydney 2000, die Olympischen Millenniumsspiele oder die Spiele des neuen Jahrtausends) waren ein internationales Multisportereignis, das vom 15. September bis 1. Oktober 2000 in Sydney, New South Wales, Australien, stattfand. Es war das zweite Mal, dass die Olympischen Sommerspiele in Australien und auf der Südhalbkugel stattfanden; die ersten fanden 1956 in Melbourne, Victoria, statt. Die Vereinigten Staaten führten den Medaillenspiegel an und gewannen die meisten Goldmedaillen."
ron_olympic_news.22.a:1 "Citius - Altius - Fortius"

ron_olympic_news.23.t:0 "Spiele der XXVIII. Olympiade"
ron_olympic_news.23.d:0 "Die Olympischen Sommerspiele 2004, offiziell bekannt als die Spiele der XXVIII. Olympiade und allgemein bekannt als Athen 2004, waren ein internationales Multisportereignis, das vom 13. bis 29. August 2004 in Athen, Griechenland, stattfand. An den Spielen nahmen 10.625 Athleten teil, etwa 600 mehr als erwartet, begleitet von 5.501 Mannschaftsoffiziellen aus 201 Ländern. Es gab 301 Medaillenwettbewerbe in 28 verschiedenen Sportarten. Bei den Spielen 2004 in Athen waren zum ersten Mal seit den Olympischen Sommerspielen 1996 alle Länder mit einem Nationalen Olympischen Komitee anwesend und die Olympischen Spiele kehrten in die Stadt zurück, in der sie ihren Anfang nahmen. Nachdem Athen bereits 1896 Gastgeber der ersten modernen Olympischen Spiele war, war es (zusammen mit Paris, London und Los Angeles) eine von nur vier Städten, die damals zweimal Olympische Sommerspiele ausrichteten. Bei diesen Spielen wurde eine neue Medaillenvorderseite eingeführt, die das seit 1928 verwendete Design von Giuseppe Cassioli ersetzte. Damit wurde der langjährige Fehler korrigiert, das römische Kolosseum anstelle eines griechischen Austragungsortes darzustellen. Das neue Design zeigt das Panathinaiko-Stadion."
ron_olympic_news.23.a:1 "Citius - Altius - Fortius"

ron_olympic_news.24.t:0 "Spiele der XXIX. Olympiade"
ron_olympic_news.24.d:0 "Die Olympischen Sommerspiele 2008 waren ein internationales Multisportereignis, das vom 8. bis 24. August 2008 in Peking, China, stattfand. Insgesamt 10.942 Athleten aus 204 Nationalen Olympischen Komitees (NOKs) traten in 28 Sportarten und 302 Wettkämpfen an (ein Wettkampf mehr als bei den Olympischen Sommerspielen 2004). Es war das erste Mal, dass China die Olympischen Sommerspiele ausrichtete, und das dritte Mal, dass die Spiele in Asien stattfanden, nach den Olympischen Spielen 1964 in Tokio, Japan, und 1988 in Seoul, Südkorea. Es waren zudem die dritten Olympischen Sommerspiele in einem Entwicklungsland nach den Olympischen Spielen 1968 in Mexiko-Stadt und den Olympischen Spielen 1980 in der Sowjetunion."
ron_olympic_news.24.a:1 "Citius - Altius - Fortius"

ron_olympic_news.25.t:0 "Spiele der XXX. Olympiade"
ron_olympic_news.25.d:0 "Die Olympischen Sommerspiele 2012 (offiziell bekannt als die Spiele der XXX. Olympiade und allgemein bekannt als London 2012) waren ein internationales Multisportereignis, das vom 27. Juli bis 12. August 2012 in London, Vereinigtes Königreich, stattfand. Die erste Veranstaltung, die Gruppenphase im Frauenfußball, begann am 25. Juli im Millennium Stadium in Cardiff, gefolgt von der Eröffnungszeremonie am 27. Juli. 10.768 Athleten aus 204 Nationalen Olympischen Komitees (NOKs) nahmen teil. Nach einer Bewerbung des ehemaligen Olympiasiegers Sebastian Coe und des damaligen Bürgermeisters von London Ken Livingstone wurde London am 6. Juli 2005 während der 117. IOC-Session in Singapur als Gastgeberstadt ausgewählt und setzte sich gegen Bewerbungen aus Moskau, New York City, Madrid und Paris durch. London war die erste Stadt, die dreimal die Olympischen Spiele der Neuzeit ausrichtete, nachdem es bereits 1908 und 1948 die Olympischen Sommerspiele ausgerichtet hatte."
ron_olympic_news.25.a:1 "Wenn du weißt, was ich meine"

ron_olympic_news.26.t:0 "Spiele der XXXI. Olympiade"
ron_olympic_news.26.d:0 "Die Olympischen Sommerspiele 2016, allgemein bekannt als Rio 2016, waren ein internationales Multisportereignis, das vom 5. bis 21. August 2016 in Rio de Janeiro, Brasilien, stattfand. In einigen Sportarten begannen die Vorwettbewerbe bereits am 3. August. Rio wurde am 2. Oktober 2009 bei der 121. IOC-Session in Kopenhagen, Dänemark, als Gastgeberstadt bekannt gegeben. Über 11.000 Athleten aus 205 Nationalen Olympischen Komitees nahmen an den Spielen 2016 teil, darunter auch die Erstteilnehmer Kosovo und Südsudan sowie das Refugee Olympic Team. Bei den Spielen, bei denen 306 Medaillen vergeben wurden, wurden 28 olympische Sportarten ausgetragen, darunter 7er-Rugby und Golf, die 2009 ins olympische Programm aufgenommen wurden. Diese Sportveranstaltungen fanden an 33 Austragungsorten in der Gastgeberstadt und an fünf weiteren Austragungsorten in den brasilianischen Städten São Paulo, Belo Horizonte, Salvador, Brasília und Manaus statt."
ron_olympic_news.26.a:1 "Citius - Altius - Fortius"
