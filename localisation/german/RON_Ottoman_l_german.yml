OTT_debt:0 "Schulden"
OTT_debt_desc:0 "Wir haben Schulden gegenüber anderen Ländern und sollten versuchen, diese so weit wie möglich abzubauen, damit unsere Industrie wieder unabhängig von ausländischen Einflüssen wird. Hier ist unsere vollständige Schuldenaufschlüsselung: \n\n - Gegenüber Großbritannien: §Y[?OTT_debt_towards_ENG]§! \n - Gegenüber Frankreich: §Y[?OTT_debt_towards_FRA]§! \n - Gegenüber Deutschland: §Y[?OTT_debt_towards_GER]§! \n - Gegenüber Österreich-Ungarn: §Y[?OTT_debt_towards_AUH]§!\n\n §gDerzeit haben wir §G[?OTT_current_money]§! zum Ausgeben"
OTT_black_sea:0 "Zugang zum Schwarzen Meer"
OTT_black_sea_desc:0 "Um ihre Schulden zu reduzieren, verkaufen die Osmanen den Zugang zum Schwarzen Meer an den Meistbietenden. Vielleicht sollten wir uns den Vorschlag ansehen, er könnte uns bei unseren zukünftigen Bemühungen helfen\n\n Der aktuelle Höchstbietende ist [current_highest_bidder.GetNameDef] (§G[?current_highest_bidder.black_sea_offer_amount]§!).\n\n Ihr aktuelles Angebot ist §Y[?black_sea_offer_amount]§!\n\n§g[FRA.GetNameDef] bietet §Y[?FRA.black_sea_offer_amount]§!§g\n[ENG.GetNameDef] bietet §Y[?ENG.black_sea_offer_amount]§g\n[AUH.GetNameDef] bietet §Y[?AUH.black_sea_offer_amount]§g\n[RUS.GetNameDef] bietet §Y[?RUS.black_sea_offer_amount]§g\n[GER.GetNameDef] bietet §Y[?GER.black_sea_offer_amount]"
