l_german:
 # News events 
 bba_news.0.t:0 "Das Ende des Völkerbundes"
 bba_news.0.desc:0 "Mit der Kriegserklärung von [?global.LoN_attacker_country.GetNameDef] an [?global.LoN_defender_country.GetNameDef] ist der Völkerbund in seinen Bemühungen, den Frieden zu bewahren, gescheitert. [?global.LoN_attacker_country.GetLeader] verhöhnte offen die Handlungsunfähigkeit des Völkerbundes und nahm daraufhin [?global.LoN_attacker_country.GetHerHis] aus dem Völkerbund aus. Da auch andere Staatsoberhäupter den Sinn des Völkerbundes in Frage stellen, wenn dieser Konflikte nicht verhindern kann, sind die Tage des Völkerbundes de facto gezählt. \nDer Rat tagt zwar weiterhin, doch niemand erwartet mehr, dass er tatsächlich etwas erreicht. Die Autorität, die der Rat einst besaß, ist längst verloren."
 bba_news.0.a:0 "Nicht völlig unerwartet"

 # Italo-Ethiopian War events 
 BBA_italo_ethiopian_war_events.01.t:0 "Beenden Sie die Weihnachtsoffensive"
 BBA_italo_ethiopian_war_events.01.desc:0 "Unsere Truppen sind im Krieg gegen Abessinien ins Stocken geraten und wurden stellenweise sogar zurückgedrängt. Diese „Weihnachtsoffensive“ veranlasst Mussolini, die militärische Führung privat für ihre Inkompetenz zu beschimpfen. Der Duce will Ergebnisse. Und zwar sofort. \n\n Er hat daher alle notwendigen Mittel genehmigt, um die Abessinier zurückzuschlagen und den Krieg schnell zu beenden – koste es, was es wolle."
 BBA_italo_ethiopian_war_events.01.a:0 "Mit allen erforderlichen Mitteln"
 BBA_italo_ethiopian_war_events.01.b:0 "Wir müssen methodisch und überlegt vorgehen"

 BBA_italo_ethiopian_war_events.02.t:0 "Große italienische Offensive"
 BBA_italo_ethiopian_war_events.02.desc:1 "Die Italiener versuchen, die Initiative im Krieg zurückzugewinnen. Sie starten eine Großoffensive, um unsere Linien zu durchbrechen und das [ROOT.GetAdjective]-Imperium mit einem Schlag zu vernichten.\nUnsere Streitkräfte müssen standhalten. Es ist entscheidend, dass unsere Streitkräfte lange genug gegen heftige Bombenangriffe und Angriffe mit Panzern und Artillerie standhalten, damit wir Zeit haben, die internationale Gemeinschaft davon zu überzeugen, in unserem Interesse zu handeln."
 BBA_italo_ethiopian_war_events.02.a:0 "Vernichte die Eindringlinge!"

 BBA_italo_ethiopian_war_events.03.t:0 "Italienischer Aufbau"
 BBA_italo_ethiopian_war_events.03.desc:0 "Unsere Offensive hat die Italiener zurückgedrängt, aber ihr Ziel verfehlt. Unsere Truppen haben an Schwung verloren, und die Italiener erholen sich vom Schock unseres Angriffs. Geheimdienstberichte deuten darauf hin, dass sie einen neuen Vorstoß vorbereiten, besser vorbereitet als beim letzten Mal. Unsere Streitkräfte müssen standhalten. Je länger wir sie von unserem Land fernhalten können, desto mehr müssen sie leisten, und desto leichter wird es sein, den Völkerbund davon zu überzeugen, dass es sich hier nicht um ein kleines „Kolonialgefecht“, sondern um eine brutale Aggression eines Mitgliedslandes gegen ein anderes handelt."
 BBA_italo_ethiopian_war_events.03.a:0 "Der Einsatz steigt."

 BBA_italo_ethiopian_war_events.10.t:0 "Embargo-Resolution des Völkerbundes"
 BBA_italo_ethiopian_war_events.10.desc:0 "Der Völkerbundrat hat als Reaktion auf die rechtswidrige Aggression des Landes gegen [ETH.GetNameDef] ein umfassendes Handelsembargo gegen [ITA.GetNameDef] beschlossen. Die Sanktionen betreffen alle Ressourcen, die zur Herstellung von Kriegsgerät verwendet werden können. Sie werden sofort verhängt und bleiben in Kraft, bis das Land die Feindseligkeiten gegen [ETH.GetNameDef] einstellt."
 BBA_italo_ethiopian_war_events.10.a:0 "Es ist das Richtige"
 BBA_italo_ethiopian_war_events.10.b:0 "Wir können unsere Wirtschaft nicht riskieren"
 BBA_italo_ethiopian_war_events.10.c:0 "Nein, [ITA.GetName] ist unser Freund"
 leave_the_league_of_nations_tt:0 "§Y[ROOT.GetName]§! verlässt den Völkerbund"
 BBA_italo_ethiopian_war_events.11.t:0 "Der Völkerbund fordert die Schließung des Suezkanals"
 BBA_italo_ethiopian_war_events.11.desc:0 "Die Delegierten von [ETH.GetName] im Völkerbund forderten die Schließung des Suezkanals für [ITA.GetName] als Verschärfung der Sanktionen gegen [ITA.GetNameDef]. Nach langer Debatte im Rat beschloss dieser, der Forderung nachzukommen. Somit wurde [ROOT.GetNameDef] mit der Aufgabe betraut, jeglichen [ITA.GetAdjective]-Verkehr durch den Kanal zu blockieren."
 BBA_italo_ethiopian_war_events.11.a:0 "Dies dürfte ihren Kriegsanstrengungen schaden"
 BBA_italo_ethiopian_war_events.11.b:0 "Wir werden es nicht tun"
 suez_blocked_sanctions_tt:0 "§Y[ITA.GetName]§! wird die Nutzung des Suezkanals untersagt."
 BBA_italo_ethiopian_war_events.12.t:0 "[FROM.GetName] weigert sich, den Suezkanal zu schließen"
 BBA_italo_ethiopian_war_events.12.desc:0 "[FROM.GetLeader] hat den Völkerbundrat darüber informiert, dass [FROM.GetNameDef] den Suezkanal nicht für [ITA.GetName] schließen wird. Dies stellt einen klaren Verstoß gegen internationale Abkommen dar. Als [FROM.GetName] aufgefordert wurde, dem nachzukommen, kündigte er lediglich seinen Austritt aus dem Völkerbund an."
 BBA_italo_ethiopian_war_events.12.a:0 "Man kann doch eigentlich niemandem vertrauen, oder?"
 BBA_italo_ethiopian_war_events.13.t:0 "[FROM.GetName] Schließt den Suezkanal für [ITA.GetName]"
 BBA_italo_ethiopian_war_events.13.desc:0 "Nach der Resolution des Völkerbundes gab [FROM.GetLeader] öffentlich bekannt, dass [ITA.GetAdjective] die Schifffahrt durch den Suezkanal nicht mehr erlaubt ist. Alle [ITA.GetAdjective] Schiffe, die versuchen, den Kanal zu passieren, werden beschlagnahmt und ihre Ladung konfisziert, bis [ITA.GetName] seine Aggression gegen [ETH.GetNameDef] einstellt."
 BBA_italo_ethiopian_war_events.13.a:0 "Das ist ein Schlag für sie!"
 BBA_italo_ethiopian_war_events.14.t:0 "Resolution des Völkerbundes zur Unterstützung von [ETH.GetName]"
 BBA_italo_ethiopian_war_events.14.desc:0 "Der Rat des Völkerbundes diskutierte über den Antrag von [ETH.GetName] auf ein militärisches Eingreifen im Krieg mit Italien. Am Ende empfahl der Rat zwar keine umfassende Intervention, verabschiedete jedoch eine Erklärung, in der er den Mitgliedsländern empfahl, [ETH.GetName] auf jede erdenkliche Weise zu unterstützen. Dazu gehörte auch die Möglichkeit, Freiwilligen die Teilnahme an dem Konflikt auf Seiten von [ETH.GetName] zu ermöglichen."
 BBA_italo_ethiopian_war_events.14.a:0 "Wir sollten das richtig organisieren"
 BBA_italo_ethiopian_war_events.14.b:0 "Wenn die Leute gehen wollen ..."
 BBA_italo_ethiopian_war_events.14.c:0 "Es hat keinen Sinn, unsere Bürger zum Sterben in ein anderes Land zu schicken"
 BBA_italo_ethiopian_war_events.14.d:0 "Wir müssen unseren eigenen Krieg führen"
 ETH_volunteers_leave_3000:0 "Abgesehen von jeder organisierten Expedition brechen 3000 [ROOT.GetAdjective] Bürger auf, um sich den [ETH.GetAdjective] Streitkräften anzuschließen."
 ETH_volunteers_leave_2000:0 "2000 [ROOT.GetAdjective] Bürger verlassen das Land, um sich den [ETH.GetAdjective] Streitkräften anzuschließen."
 ETH_volunteers_leave_200:0 "Trotz der offiziellen Haltung verlassen etwa 200 [ROOT.GetAdjective] Bürger das Land, um sich den [ETH.GetAdjective] Streitkräften anzuschließen."
 BBA_italo_ethiopian_war_events.15.t:0 "Unser Aufruf zur internationalen Unterstützung"
 BBA_italo_ethiopian_war_events.15.desc_a:0 "Aufgrund der Resolution des Völkerbundes, [ROOT.GetName] zu unterstützen, sind Freiwillige aus aller Welt eingetroffen. Aus diesen Freiwilligen werden internationale Brigaden gebildet. Hoffentlich entsprechen ihre Kampffähigkeiten ihrem Enthusiasmus."
 BBA_italo_ethiopian_war_events.15.desc_b:0 "Trotz der Resolution des Völkerbundes, [ROOT.GetName] zu unterstützen, ist die Zahl der Freiwilligen, die uns bei unseren Kriegsanstrengungen unterstützen, leider sehr gering. Hoffentlich entsprechen die Kampffähigkeiten dieser tapferen Freiheitskämpfer ihrem Enthusiasmus."
 BA_italo_ethiopian_war_events.15.desc_b:0 "Leider war der Völkerbund nicht bereit, eine Militärtruppe zu unserer Unterstützung zu entsenden. Stattdessen ermutigte er lediglich seine Mitgliedsstaaten, uns zu helfen, was letztlich jedoch zu keiner nennenswerten Unterstützung führte. Nur eine Handvoll neuer Freiwilliger sind eingetroffen."
 BBA_italo_ethiopian_war_events.15.a:0 "Gut"
 BBA_italo_ethiopian_war_events.15.b:0 "Schade"
 BBA_italo_ethiopian_war_events.16.t:0 "Hilfe ist unterwegs?"
 BBA_italo_ethiopian_war_events.16.desc:0 "Der Völkerbund versuchte nicht, eine Streitmacht aufzustellen, um [ITA.GetName] aus [ROOT.GetName] zu vertreiben. Er ermutigte seine Mitgliedsländer jedoch, Truppen zur Wiederherstellung des Status quo zu entsenden. Es gibt Hinweise darauf, dass mehrere Nationen, darunter auch Länder wie [FROM.GetName], entsprechende Expeditionen organisieren. Es bleibt abzuwarten, ob es sich dabei nur um Gerede handelt oder ob sie uns tatsächlich helfen wollen."
 BBA_italo_ethiopian_war_events.16.a:0 "Wir müssen abwarten und sehen."

 BBA_italo_ethiopian_war_events.20.t:0 "[ETH.GetLeader] weigert sich, aufzugeben"
 BBA_italo_ethiopian_war_events.20.desc:0 "Trotz der Kapitulation der [ETH.GetAdjective]-Streitkräfte weigert sich [ETH.GetLeader], sich zu ergeben. Gerüchten zufolge wurde [ETH.GetLeader.GetSheHe] gestattet, in [?ETH.host_nation.GetNameDef] eine Exilregierung zu bilden. Gegen die [?ETH.host_nation.GetAdjective]-Regierung wurde ein formeller Protest eingelegt."
 BBA_italo_ethiopian_war_events.20.a:0 "Der Kampf geht weiter"
 ITA_occupation_tt:0 "[ITA.GetName] wird technisch gesehen weiterhin mit der Exilregierung von [ETH.GetName] im Krieg sein, bis [ETH.GetName] keine Staaten mehr besitzt."

 BBA_italo_ethiopian_war_events.100.t:0 "Eine Anfrage von [FROM.GetNameDef]"
 BBA_italo_ethiopian_war_events.100.desc:0 "Der Botschafter von [FROM.GetAdjective] hat sich mit einer formellen Bitte von [FROM.GetLeader] an die Regierung gewandt, um die Errichtung einer provisorischen Exilregierung hier in [ROOT.GetName] zu gestatten, falls der Krieg gegen [ITA.GetName] schlecht verläuft. Die Annahme dieser Bitte würde die Aufrechterhaltung guter Beziehungen zu [ITA.GetName] definitiv erschweren."
 BBA_italo_ethiopian_war_events.100.a:0 "Sie sind hier willkommen"
 BBA_italo_ethiopian_war_events.100.b:0 "Das können wir nicht zulassen"

 BBA_italo_ethiopian_war_events.101.t:0 "[FROM.GetNameDefCap] Akzeptiert Anfrage an die Gastregierung"
 BBA_italo_ethiopian_war_events.101.desc:0 "Die [FROM.GetAdjective]-Regierung hat positiv auf die Anfrage reagiert, als Gastland für [ROOT.GetLeader] zu fungieren, falls dies erforderlich sein sollte."
 BBA_italo_ethiopian_war_events.101.a:0 "Ein Problem weniger, über das man sich Sorgen machen muss"
 change_focus_to_from_tt:0 "Fügt neue Fokusse für §Y[ROOT.GetNameDef]§! hinzu, die während der Verbannung in §Y[FROM.GetNameDef]§! verwendet werden können."
 BBA_italo_ethiopian_war_events.102.t:0 "[FROM.GetNameDefCap] lehnt die [ROOT.GetAdjective]-Anforderung ab"
 BBA_italo_ethiopian_war_events.102.desc:0 "Leider wagt die [FROM.GetAdjective]-Regierung nicht, [ITA.GetLeader] zu verärgern. Sie hat unsere Bitte abgelehnt, dort eine Übergangsregierung einzusetzen, sollte [ETH.GetName] fallen."
 BBA_italo_ethiopian_war_events.102.a:0 "Dann sollten wir es woanders versuchen"
 BBA_italo_ethiopian_war_events.110.t:0 "Völkerbund fordert Frieden"
 BBA_italo_ethiopian_war_events.110.desc:0 "Der Völkerbund hat ein sofortiges Ende der Feindseligkeiten zwischen [ROOT.GetName] und [FROM.GetName] gefordert. Die Resolution des Rates gibt den Mitgliedsstaaten das Recht, [ROOT.GetDameDef] den Krieg zu erklären, sollten wir uns weigern, dieser Forderung nachzukommen."
 BBA_italo_ethiopian_war_events.110.a:0 "Wir müssen vorerst akzeptieren"
 BBA_italo_ethiopian_war_events.110.b:0 "Sie werden es nicht wagen, etwas zu tun"
 BBA_italo_ethiopian_war_events.111.t:0 "[FROM.GetLeader] stimmt dem Frieden zu"
 BBA_italo_ethiopian_war_events.111.desc:0 "Nach der Resolution des Völkerbundrates ist die [FROM.GetAdjective]-Regierung unter [FROM.GetLeader] endlich zur Vernunft gekommen. Der vom Völkerbund ausgearbeitete Friedensvertrag stellt die Vorkriegsgrenzen wieder her. Er sieht zwar leider keine Entschädigung für [ROOT.GetName] für die Kollateralschäden vor, gibt uns aber Zeit, mit dem Wiederaufbau des Landes zu beginnen."
 BBA_italo_ethiopian_war_events.111.a:0 "Ein Sieg der besonderen Art"
 BBA_italo_ethiopian_war_events.112.t:0 "[FROM.GetName] trotzt dem Völkerbund"
 BBA_italo_ethiopian_war_events.112.desc:0 "Trotz der Kriegsdrohung der Ratsmitglieder des Völkerbundes ist [FRON.GetLeader] weiterhin entschlossen, [ROOT.GetName] zu zerstören. Der Rat hat ein sofortiges Ende der Feindseligkeiten angeordnet, doch [FROM.GetName] weigert sich eklatant, dem nachzukommen."
 BBA_italo_ethiopian_war_events_wargoal_tt:0 "Großmächte im Völkerbund können auf [ROOT.GetName] ein Kriegsziel erreichen."
 BBA_italo_ethiopian_war_events.112.a:0 "Wir müssen noch härter kämpfen"
 BBA_italo_ethiopian_war_events.113.t:0 "[FROM.GetName] weigert sich, der Resolution des Völkerbundes nachzukommen"
 BBA_italo_ethiopian_war_events.113.desc:0 "Der Völkerbund hat [FROM.GetNameDef] aufgefordert, seine Aggression gegen [ETH.GetName] unverzüglich einzustellen. [FROM.GetLeader] bleibt jedoch trotzig und weigert sich, dieser Aufforderung nachzukommen. Dies stellt einen eklatanten Verstoß gegen internationale Regeln dar, und der Rat hat internationale Maßnahmen gegen [FROM.GetNameDef] gefordert."
 BBA_italo_ethiopian_war_events.113.a:0 "Wenn Gewalt die einzige Sprache ist, die sie sprechen"
 BBA_italo_ethiopian_war_events.113.b:0 "Wir können nicht zulassen, dass der Völkerbund unsere Außenpolitik diktiert"

 BBA_italo_ethiopian_war_events.120.t:0 "Das Debakel in [FROM.GetName]"
 BBA_italo_ethiopian_war_events.120.desc:0 "Der Krieg in [FROM.GetName] verlief anders als erwartet. Unsere stolze Nation wird schnell zum Gespött Europas, und die Menschen in [ROOT.GetCapitalVictoryPointName] werden unruhig. Eine Revolution könnte unmittelbar bevorstehen. Nun tritt [FROM.GetLeader] mit einem Friedensangebot an uns heran."
 BBA_italo_ethiopian_war_events.120.a:0 "Wir sollten uns auf etwas Einfacheres konzentrieren"
 ETH_peace_treaty_tt:1 "\n§YPereinigungsbedingungen des Friedensvertrags§!: \n"
 ETH_peace_treaty_part_2_tt:0 "[ETH.GetFlag][ETH.GetName]:"
 BBA_italo_ethiopian_war_events.120.b:0 "Wir können das noch gewinnen!"
 BBA_italo_ethiopian_war_events.121.t:0 "Sieg!"
 BBA_italo_ethiopian_war_events.121.desc:0 "Ein langer und erbitterter Kampf ist endlich vorbei. [FROM.GetLeader] hat unsere Forderungen akzeptiert und die Aggression gegen [ROOT.GetName] abgebrochen. [ROOT.GetLeader] ist der Held des Tages. [ROOT.GetLeader.GetSheHeCap] hat [ROOT.GetNameDef] sicher durch diese schwierigen Zeiten geführt und eine europäische Kolonialmacht erfolgreich zurückgeschlagen."
 BBA_italo_ethiopian_war_events.121.a:0 "Dies signalisiert einen Neuanfang für Afrika"
 ETH_gets_the_following_states_tt:0 "[ETH.GetNameDefCap] erhält die folgenden Zustände:"
 BBA_italo_ethiopian_war_events.122.t:0 "[FROM.GetLeader] weigert sich hartnäckig"
 BBA_italo_ethiopian_war_events.122.desc:0 "Trotz [ROOT.GetAdjective] Kriegserfolgen weigert sich der [FROM.GetAdjective]-Führer, seine Niederlage zu akzeptieren. [ROOT.GetLeader] hat der Welt gezeigt, dass eine afrikanische Nation europäischen Invasoren Paroli bieten kann, und das ist an sich schon ein Sieg. Jetzt müssen wir sie in die Knie zwingen."
 BBA_italo_ethiopian_war_events.122.a:0 "Der Krieg tritt in eine neue Phase ein."
 ethiopia_recognized_flag:0 "Äthiopien kann Verbündete zum Krieg aufrufen"

 BBA_italo_ethiopian_war_events.200.t:0 "Internationales Ansehen wächst"
 BBA_italo_ethiopian_war_events.200.desc:0 "Die öffentliche Sympathie für [ROOT.GetName]s Anliegen war stets groß. Allerdings rechnete niemand damit, dass das Land länger als etwa einen Monat durchhalten würde. Unser hartnäckiger Widerstand gegen die [ITA.GetAdjective]-Invasoren gewinnt die Herzen der Menschen weltweit, und die Staats- und Regierungschefs beginnen, [ROOT.GetName] ernster zu nehmen."
 BBA_italo_ethiopian_war_events.200.a:0 "Wenn sie nur mehr tun könnten, als nur zu reden"
 BBA_italo_ethiopian_war_events.201.t:0 "Stärkung der Armeemoral"
 BBA_italo_ethiopian_war_events.201.desc:0 "Durch das lange Durchhalten trotz dieser Widrigkeiten erholt sich die Moral der einfachen Soldaten langsam wieder. Nachdem die anfängliche Begeisterung verflogen war, sahen viele eine mögliche Niederlage als selbstverständlich an, doch nun ist wieder von einem möglichen Sieg die Rede. Es gibt auch deutliche Anzeichen dafür, dass sich die Einheiten an den neuen Kampfstil anpassen."
 BBA_italo_ethiopian_war_events.201.a:0 "Darauf müssen wir aufbauen, um den Feind aus [ROOT.GetName] zu vertreiben."
 ETH_morale_boost_tt:0 "Modifizieren Sie §Y[GetEthiopianArmySpiritName]§! durch:\n$MODIFIERS_ARMY_DEFENCE_FACTOR$: §G+10%§! \n$MODIFIER_ARMY_ORG_FACTOR$: §G+5%§!"

 BBA_italo_ethiopian_war_events.202.t:0 "Desertionen des Feindes"
 BBA_italo_ethiopian_war_events.202.desc:0 "Es begann zunächst nur tröpfchenweise, einige der irregulären Einheiten unseres Feindes verloren den Glauben, und einige von ihnen kamen, um für uns zu kämpfen. Jetzt desertieren Soldaten in Massen, und nicht nur die irregulären. Einige der Deserteure bringen sogar schweres Gerät mit."
 BBA_italo_ethiopian_war_events.202.a:0 "Das Blatt wendet sich"
 
 BBA_italo_ethiopian_war_events.203.t:0 "Überleben gegen alle Widrigkeiten"
 BBA_italo_ethiopian_war_events.203.desc:0 "Selbst zu Kriegsbeginn gaben uns die sogenannten Experten keinen Monat Zeit. Wir haben einer sogenannten modernen Armee schon viel länger standgehalten. Wir wissen, wie sie kämpft, und haben uns daran angepasst. Der Glaube der Bevölkerung kehrt zurück, Rekruten aus nah und fern strömen zu uns."
 BBA_italo_ethiopian_war_events.203.a:0 "Wir werden die Eindringlinge ins Meer treiben"
 ETH_for_the_duration_of_the_war_tt:0 "Für die Dauer des Krieges:"

 BBA_italo_ethiopian_war_events.204.t:0 "Der Volkskrieg"
 BBA_italo_ethiopian_war_events.204.desc:0 "Überall erheben sich die Menschen gegen die Invasoren. Jung und Alt schließen sich der Widerstandsbewegung an und zwingen [ITA.GetName], für ihre Erfolge noch härter zu arbeiten. Die Einheimischen, die nicht kämpfen können, stellen Waffen und Ausrüstung für die Armee her."
 BBA_italo_ethiopian_war_events.204.a:0 "Der Sieg ist jetzt nah"

 BBA_italo_ethiopian_war_events.300.t:0 "Italienische Öffentlichkeit besorgt"
 BBA_italo_ethiopian_war_events.300.desc:2 "Unsere Armeen kommen in [ETH.GetName] kaum voran, und der Mangel an Fortschritt ist sogar in [ITA.GetName] spürbar. Die [ITA.GetAdjective]-Bevölkerung verliert allmählich den Glauben an den Krieg und sogar daran, dass unsere Führung am Ende den Sieg erringen könnte."
 BBA_italo_ethiopian_war_events.300.a:1 "Wie wenig Glauben sie haben!"

 BBA_italo_ethiopian_war_events.301.t:0 "Entmutigte Armee Afrikas"
 BBA_italo_ethiopian_war_events.301.desc:1 "Unsere Armeen in [ETH.GetName] kommen kaum voran und erleiden schwere Verluste. Der Widerstand ist erbittert, und wir müssen um jeden Zentimeter kämpfen. Die Moral in den Armeen ist auf einem historischen Tiefstand, und wir haben sogar Berichte erhalten, dass einige Kompanien die Ausführung direkter Befehle verweigert haben."
 BBA_italo_ethiopian_war_events.301.a:1 "Wir müssen das Blatt im Krieg wenden!"

 BBA_italo_ethiopian_war_events.302.t:0 "Unruhen in den Kolonien"
 BBA_italo_ethiopian_war_events.302.desc:1 "Unsere Kämpfe in [ETH.GetName] haben bereits Auswirkungen auf andere Gebiete. Aus den Kolonien erhalten wir Berichte, dass unsere Untertanen begonnen haben, den lokalen Behörden in kleinen und großen Angelegenheiten den Gehorsam zu verweigern. Sie betrachten unsere mangelnden Fortschritte im Krieg offenbar als Schwäche und stellen unsere Stärke auf die Probe."
 BBA_italo_ethiopian_war_events.302.a:1 "Beunruhigende Neuigkeiten!"
 ITA_colonial_unrest_tt:0 "Koloniale Unruhen: §R+15%§!"

 BBA_italo_ethiopian_war_events.303.t:0 "Die italienische Öffentlichkeit stellt die Kriegsanstrengungen in Frage"
 BBA_italo_ethiopian_war_events.303.desc:1 "Das [ETH.GetAdjevtive]-Debakel hat die [ITA.GetAdjective]s gegen den Krieg aufgebracht. Immer mehr Menschen kritisieren unsere Regierung und ihre Führung offen, und selbst Gerüchte über Alternativen sind keine Seltenheit."
 BBA_italo_ethiopian_war_events.303.a:1 "Verräter!"

 BBA_italo_ethiopian_war_events.304.t:0 "Massendesertion"
 BBA_italo_ethiopian_war_events.304.desc:1 "Die Lage in [ETH.GetName] ist katastrophal, da die Moral der Soldaten weiter sinkt! Die Armee steckt an mehreren Orten fest und sieht sich mit Massendesertion konfrontiert, wodurch unsere Truppenstärke auch ohne die Hilfe der [ETH.GetAdjective]s schrumpft! Uns liegt sogar ein Bericht über einen Offizier vor, der von einem LKW überfahren wurde. Wir haben es als Unfall eingestuft."
 BBA_italo_ethiopian_war_events.304.a:1 "Allesamt Feiglinge!"
 ITA_desertions_east_africa_tt:0 "Die Armeen in Ostafrika leiden unter Desertionen."

 BBA_italo_ethiopian_war_events.305.t:0 "Aufruhr in den Kolonien"
 BBA_italo_ethiopian_war_events.305.desc:1 "Was in den Kolonien als ziviler Ungehorsam begann, ist beinahe zu einer regelrechten Rebellion eskaliert! Unser Versäumnis, die anhaltenden Kämpfe in [ETH.GetName] anzugehen, hat unsere Untertanen davon überzeugt, dass wir schwach sind und dass es ihnen ohne unsere Regierung besser gehen würde."
 BBA_italo_ethiopian_war_events.305.a:1 "So eine Unverschämtheit!"
 ITA_colonial_uproar_tt:0 "Große Unruhen in der Kolonie: §R+80%§!"

 BBA_italo_ethiopian_war_events.400.t:0 "Zeit, sich mit [AFA.GetNameDef] zu befassen"
 BBA_italo_ethiopian_war_events.400.desc:0 "[AFA.GetLeader], der Sultan von [AFA.GetNameDef], steht seit langem unter starkem [ROOT.GetAdjective] Einfluss. Wie im letzten Krieg blieb er neutral, obwohl er formal Teil des [ETH.GetAdjective]-Reiches war. Tatsächlich ist der Sultan nur noch aufgrund seines [ROOT.GetAdjective] guten Willens an der Macht. Das Land hat zwar seine Küste an [ROOT.GetName] verkauft, doch sie stellt weiterhin ein Hindernis für unsere Eroberung dar. Die Einnahme von [?ITA.ITA_capture_state.GetName] könnte ausreichen, um den Sultan zur Aufgabe seines restlichen Landes zu bewegen."
 BBA_italo_ethiopian_war_events.400.a:0 "Senden Sie ein Ultimatum und fordern Sie die totale Unterwerfung"
 BBA_italo_ethiopian_war_events.400.b:0 "Wir können uns später um [AFA.GetNameDef] kümmern. Jetzt ist nicht der richtige Zeitpunkt."
 BBA_italo_ethiopian_war_events.401.t:0 "Ein Ultimatum von [FROM.GetName]"
 BBA_italo_ethiopian_war_events.401.desc:0 "Die Italiener haben darum gebeten, dass wir den gesamten Staat unter ihre Kontrolle stellen, um ihn als Aufmarschgebiet für ihren Krieg gegen [ETH.GetName] zu nutzen. Die Annahme dieser Forderung würde die Unabhängigkeit von [ROOT.GetNAme] effektiv beenden, eine Ablehnung würde jedoch mit Sicherheit eine Invasion bedeuten."
 BBA_italo_ethiopian_war_events.401.a:0 "Es hat keinen Sinn, Widerstand zu leisten"
 BBA_italo_ethiopian_war_events.401.b:0 "Wenn sie unser Land wollen, müssen sie es mit Gewalt nehmen"
 BBA_italo_ethiopian_war_events.402.t:0 "[FROM.GetLeader] Falten"
 BBA_italo_ethiopian_war_events.402.desc:0 "[FROM.GetNameDefCap] hat unsere Forderungen akzeptiert und uns die [FROM.GetAdjective]-Länder als Operationsbasis gegen [ETH.GetName] nutzen lassen. Dies beendet effektiv die Unabhängigkeit von [FROM.GetName]."
 BBA_italo_ethiopian_war_events.402.a:0 "Gut, lasst uns einziehen und das Land besetzen."
 BBA_italo_ethiopian_war_events.403.t:0 "[FROM.GetNameDefCap]Bleibt trotzig"
 BBA_italo_ethiopian_war_events.403.desc:0 "Leider reichte der diplomatische Druck nicht aus, um die italienische Oberherrschaft über [FROM.GetNameDef] zu sichern. [FROM.GetLeader] beharrt weiterhin darauf, dass sein Land der militärischen Macht von [ROOT.GetName] standhalten kann."
 BBA_italo_ethiopian_war_events.403.a:0 "Wir müssen es auf die harte Tour machen"
 
 BBA_italo_ethiopian_war_events.500.t:0 "Forderungen nach Frieden"
 BBA_italo_ethiopian_war_events.500.desc:0 "[GetItaloEthiopianPeaceDemands]"
 BBA_italo_ethiopian_war_events.500.desc_guarantees:0 "Die [FROM.GetAdjective] verlangen von uns einen Friedensvertrag mit [ETH.GetName], wenn wir ihre Hilfe gegen die Deutschen wollen. Sollten wir einen Vertrag mit den Äthiopiern unterzeichnen, müssen wir bereit sein, uns von einigen der eroberten Gebiete zu trennen, andere aber zu behalten. Ein solcher Frieden wäre für beide Länder sicherlich eine bittere Pille, könnte sich aber angesichts der Deutschen lohnen."
 BBA_italo_ethiopian_war_events.500.desc_territories:0 "Um uns einen Teil ihrer Kolonialgebiete zu überlassen, wollen die Briten unseren Krieg mit den Äthiopiern beenden. Sollten wir einen Vertrag mit ihnen unterzeichnen, müssen wir bereit sein, uns von einigen der eroberten Gebiete zu trennen, andere aber zu behalten. Angesichts all des Blutes, Schweißes und der Tränen, die wir vergossen haben, wäre ein solcher Frieden für beide Länder sicherlich eine bittere Pille."
 BBA_italo_ethiopian_war_events.500.a:0 "Es ist ein bitterer Frieden"
 BBA_italo_ethiopian_war_events.500.b:0 "Wir brauchen ihre Unterstützung"
 BBA_italo_ethiopian_war_events.500.c:0 "Wir haben zu hart gekämpft!"
 BBA_italo_ethiopian_war_events.500_tt:0 "Der Krieg geht weiter"

 BBA_italo_ethiopian_war_events.501.t:0 "An den Friedenstisch gezwungen"
 BBA_italo_ethiopian_war_events.501.desc:0 "Unser großzügiges Gastland, das uns aufgenommen hat, nachdem unser eigenes Land von [ITA.GetNameDefCap] überrannt wurde, scheint unserer überdrüssig geworden zu sein. Hinter unserem Rücken schmieden sie Pläne, um uns zu einem Friedensvertrag mit den widerlichen italienischen Invasoren zu zwingen. Leider können wir wenig dagegen tun."
 BBA_italo_ethiopian_war_events.501.a:0 "Wir haben keine Wahl"
 BBA_italo_ethiopian_war_events.501.b:0 "Wir werden weiterkämpfen!"
 BBA_ethiopia_is_expelled_tt:0 "Die Regierung von §Y[ETH.GetNameWithFlag]§! wird aus §Y[ENG.GetNameWithFlag]§! vertrieben und kann anderswo eine Exilregierung errichten."

 BBA_italo_ethiopian_war_events.502.t:0 "Kein Friedensvertrag"
 BBA_italo_ethiopian_war_events.502.desc:0 "[GetItalyRefusesPeaceTalks]"
 BBA_italo_ethiopian_war_events.502.desc_guarantees:0 "Die italienische Regierung hat unsere Forderung nach einem Frieden mit [ETH.GetNameDefCap] im Austausch für unsere Hilfe im Kampf gegen die Deutschen abgelehnt. Diesem Angriff wird sie allein gegenüberstehen müssen."
 BBA_italo_ethiopian_war_events.502.desc_territories:0 "Die italienische Regierung hat unsere Forderung nach einem Frieden mit [ETH.GetNameDefCap] im Austausch gegen einige unserer Kolonialgebiete abgelehnt. Das zeigt nur, dass es mit solchen Kriminellen keine Deals geben kann!"
 BBA_italo_ethiopian_war_events.502.a:0 "So eine Schande"

 BBA_italo_ethiopian_war_events.503.t:0 "[ETH.GetNameDefCap] lehnt Friedensgespräche ab"
 BBA_italo_ethiopian_war_events.503.desc:0 "Die äthiopische Regierung hat die britische Forderung nach einem Friedensabkommen mit uns abgelehnt. Dies führte dazu, dass [ENG.GetLeader] die Äthiopier aus [ENG.GetNameDef] ausgewiesen hat. Damit ist ein klares Signal an alle gesendet worden, die Zusammenarbeit mit welchem Land sie mehr wertschätzen. Dies gibt uns die Möglichkeit, unsere afrikanischen Besitztümer weiter zu stärken!"
 BBA_italo_ethiopian_war_events.503.a:0 "Wir werden sie unterwerfen"

 BBA_italo_ethiopian_war_events.510.t:0 "[ITA.GetNameDef] Untergräbt die äthiopische Autorität"
 BBA_italo_ethiopian_war_events.510.desc:0 "Wir haben Berichte erhalten, wonach die Italiener eine Desinformationskampagne gestartet haben, um unsere Herrschaft und Legitimität in der Heimat zu untergraben. Diese niederträchtigen Lügen könnten einige unserer Untertanen für [ITA.GetNameDef] gewinnen und unseren Anspruch auf den Thron schwächen. Wir müssen unsere Herrschaft über Äthiopien wiederherstellen, bevor sie weiteren Schaden anrichten!"
 BBA_italo_ethiopian_war_events.510.a:0 "Sie werden für ihre Lügen bezahlen!"

#Ethiopia - Balance of Power
 BBA_ethiopia_balance_of_power_events.01.t:0 "Regel angefochten"
 BBA_ethiopia_balance_of_power_events.01.desc_fascism:1 "Die zunehmende Dezentralisierung von [THIS.GetName], der Mangel an breiter Unterstützung für die herrschende Regierung und die zunehmende Instabilität in der Region haben zu einer offenen Rebellion gegen die Zentralregierung geführt. Anhänger von $haile_selassie_gugsa$ haben zu den Waffen gegriffen, um ihn auf den [THIS.GetAdjective]-Thron zu bringen."
 BBA_ethiopia_balance_of_power_events.01.desc_neutrality:1 "Die zunehmende Dezentralisierung von [THIS.GetName], gepaart mit dem Mangel an breiter Unterstützung für die herrschende Regierung und der größeren Instabilität in der Region, hat zu einer offenen Rebellion gegen die Zentralregierung geführt."
 BBA_ethiopia_balance_of_power_events.01.desc_communism:0 "Die zunehmende Zentralisierung von [THIS.GetName], der Mangel an breiter Unterstützung für die herrschende Regierung und die zunehmende Instabilität in der Region haben zu einer offenen Rebellion gegen die Zentralregierung geführt. Die Anarchisten haben erklärt, sie würden das Land von unserer Regierung befreien."
 BBA_ethiopia_balance_of_power_events.01.a:0 "Wir werden sie besiegen"
 BBA_ethiopia_balance_of_power_events.01.b:0 "Zerstöre den Heuchler"
 BBA_ethiopia_balance_of_power_events.01.c:0 "Vernichtet die Klassenverräter."
 ETH_alternate_fascist_party:0 "Hayamot-Anhänger"
 ETH_alternate_fascist_party_long:0 "Unterstützer von $ETH_hailu_tekle_haymanot$"
 ETH_alternate_neutrality_party:0 "Selassie-Anhänger"
 ETH_alternate_neutrality_party_long:0 "Unterstützer von $ETH_haile_selassie$"

 BBA_ethiopia_balance_of_power_events.10.t:0 "[ROOT.GetName] fällt auseinander"
 BBA_ethiopia_balance_of_power_events.10.desc:1 "Die schrittweise Dezentralisierung von [THIS.GetNameDef] hat wenig überraschend dazu geführt, dass die Zentralregierung einen Großteil ihrer Autorität verloren hat. Nun erklären die verschiedenen Regionen sogar ihre Unabhängigkeit von [THIS.GetNameDef]. Wir müssen schnell handeln, wenn wir die Kontrolle über diese Regionen zurückgewinnen wollen."
 BBA_ethiopia_balance_of_power_events.10.a:0 "Ich schätze, man kann nichts dagegen tun"
 BBA_ethiopia_balance_of_power_events.10.b:0 "Zerstöre sie"
 ETH_breakup_tt:0 "§RBekommen Sie unabhängig von [ROOT.GetName]§!"
 ETH_breakup_fight_tt:0 "§RWerde unabhängig von [ROOT.GetName] und [ROOT.GetName] erklärt ihnen den Krieg.§!"

#BBA_ethiopia_balance_of_power_events.20.t: "Education Reforms" 
#BBA_ethiopia_balance_of_power_events.20.desc: "As we begin to reform [ETH.GetNameDefCap], the issue of the education system has come to the forefront. Making sure the next generation are able to join the workforce is of course our priority. However, we have an opportunity to nudge that generation in a more acceptable moral direction."
#BBA_ethiopia_balance_of_power_events.20.a: "Implementing [ETH.GetLeader]’s plans are their only concern."
#BBA_ethiopia_balance_of_power_events.20.b: "Religion is the opiate of the masses."
#
#BBA_ethiopia_balance_of_power_events.21.t: "[ETH.GetAdjective] Road Improvements"
#BBA_ethiopia_balance_of_power_events.21.desc: "[ETH.GetNameDefCap]’s road network remains limited and hinders the economic development of the country. We now have the budget to implement improvements to the road network, but there is a split over whether we should prioritize expanding the existing network to the benefit of people in their local area, or create highways around the capital to concentrate economic development."
#BBA_ethiopia_balance_of_power_events.21.a: "Prioritize local road expansion in the regions."
#BBA_ethiopia_balance_of_power_events.21.b: "We need to concentrate economic development."

 BBA_ethiopia_balance_of_power_events.22.t:0 "Reformen für Militäroffiziere"
 BBA_ethiopia_balance_of_power_events.22.desc:0 "Jüngste Erfahrungen haben gezeigt, dass viele unserer Offiziere für moderne Kriegsführung schlecht gerüstet sind. Der wahrscheinlichste Grund dafür ist unsere historische Tendenz, militärische Dienstgrade auf der Grundlage erblicher oder politischer Titel zu vergeben, anstatt auf der Grundlage der Verdienste der jeweiligen Person. Angesichts der jüngsten Reformwelle in [ETH.GetNameDef] ist es an der Zeit, über die Zukunft der militärischen Hierarchie zu entscheiden."
 BBA_ethiopia_balance_of_power_events.22.a:0 "Der Bauernpöbel ist unfähig, Führung zu übernehmen."
 BBA_ethiopia_balance_of_power_events.22.b:0 "Die Meritokratie im Militär ist unerlässlich. "

 BBA_ethiopia_balance_of_power_events.23.t:0 "Reform der standardisierten Bildung"
 BBA_ethiopia_balance_of_power_events.23.desc:0 "Unsere jüngste Welle von Bildungsreformen erweist sich bereits als erfolgreich. Die jungen Leute zeigen sich nicht nur zunehmend loyal gegenüber [ETH.GetLeader], sondern scheinen auch Druck auf ihre Eltern auszuüben, sich ihnen anzuschließen."
 BBA_ethiopia_balance_of_power_events.23.a:0 "Das Regime wird von Tag zu Tag sicherer."

 BBA_ethiopia_balance_of_power_events.24.t:0 "Bildungsreformen"
 BBA_ethiopia_balance_of_power_events.24.desc:0 "Unsere jüngsten Bildungsreformen zeigen bereits Erfolge. Die alten Hierarchien von [ETH.GetNameDef] werden zunehmend in Frage gestellt, da die Jugend ihre Legitimität unter Beweis stellen will. Obwohl dies zu Spannungen zwischen der jüngeren und der älteren Generation geführt hat, scheint sich die Einstellung letztlich zu unseren Gunsten zu ändern."
 BBA_ethiopia_balance_of_power_events.24.a:0 "Die Zeit ist auf unserer Seite."

 BBA_ethiopia_balance_of_power_events.25.t:0 "Politische Militäroffiziere"
 BBA_ethiopia_balance_of_power_events.25.desc:0 "Da wir die politische und wirtschaftliche Kontrolle über [ETH.GetName] zunehmend zentralisieren, besteht weiterhin große Besorgnis über das Militär. Sollte es sich gegen uns wenden, hätten wir kaum eine Chance, seinen Forderungen zu widerstehen. Deshalb haben wir begonnen, politische Offiziere in die Streitkräfte einzuführen, um sicherzustellen, dass die Truppen keine unerlaubten Ideen verbreiten."
 BBA_ethiopia_balance_of_power_events.25.a:0 "Es ist zu ihrem eigenen Besten."

 BBA_ethiopia_balance_of_power_events.26.t:0 "Meritokratie im Militär"
 BBA_ethiopia_balance_of_power_events.26.desc:0 "Jüngste Erfahrungen haben gezeigt, dass viele unserer Offiziere für die moderne Kriegsführung schlecht gerüstet sind. Der wahrscheinlichste Grund dafür ist unsere historische Tendenz, militärische Dienstgrade auf der Grundlage erblicher oder politischer Titel zu vergeben, anstatt auf der Grundlage der Verdienste der jeweiligen Person. Angesichts der jüngsten Reformwelle in [ETH.GetName] ist es nur angemessen, dass wir sicherstellen, dass die Leistungsorientierung der entscheidende Faktor für die militärische Führungsrolle ist."
 BBA_ethiopia_balance_of_power_events.26.a:0 "Die Meritokratie im Militär ist unerlässlich."

 BBA_ethiopia_balance_of_power_events.30.t:0 "$ETH_balcho_safo$ Renditen"
 BBA_ethiopia_balance_of_power_events.30.desc:0 "Der ehemalige Shum von Sidamo und einstige Dejazmach der [FROM.GetAdjective]-Armee ist dem Ruf von [FROM.GetLeader] gefolgt, erneut für sein Land zu den Waffen zu greifen. Der Held von Adwa bringt Rekruten aus seinen persönlichen Domänen mit. Hoffentlich kann dies dazu beitragen, die [ITA.GetAdjective]-Invasion zurückzudrängen."
 BBA_ethiopia_balance_of_power_events.30.a:0 "Die Rückkehr eines wahren Helden"

 BBA_ethiopia_balance_of_power_events.51.t:0 "Lokaler Lord bietet an, eine Söldnereinheit aufzustellen"
 BBA_ethiopia_balance_of_power_events.51.desc:0 "Ein lokaler Lord in [?ROOT.ETH_bop_state.GetName] hat angeboten, eine Einheit aufzustellen und sie der kaiserlichen Armee zu überlassen. Die Männer werden aus lokalen Räubern und ausländischen Freiwilligen rekrutiert und sind daher voll ausgerüstet und kampfbereit. Ein Machtverlust ist natürlich ein Risiko, aber der Zugewinn an Truppen erhöht die Gewinnchancen."
 BBA_ethiopia_balance_of_power_events.51.a:0 "Das Land braucht jede Hilfe, die es bekommen kann"
 BBA_ethiopia_balance_of_power_events.51.b:0 "Wir müssen die Zahl der Privatarmeen reduzieren, nicht erhöhen"

 BBA_ethiopia_balance_of_power_events.52.t:0 "Lokaler Lord möchte sein Herrschaftsgebiet erweitern"
 BBA_ethiopia_balance_of_power_events.52.desc:0 "Ein lokaler Herrscher in [?ROOT.ETH_bop_state.GetName] plant, seine Machtbasis zu erweitern und sein Herrschaftsgebiet auszuweiten. Dies wird dem ganzen Land zugutekommen, da er massiv in lokale Produktionskapazitäten investiert. Gleichzeitig lockert ein anhaltender Widerstand den Griff der Zentralregierung auf [?ROOT.ETH_bop_state.GetName]."
 BBA_ethiopia_balance_of_power_events.52.a:0 "Das ist alles gut"
 BBA_ethiopia_balance_of_power_events.52.b:0 "Dies muss gestoppt werden"

 BBA_ethiopia_balance_of_power_events.53.t:0 "Regionalherrscher will Waffen produzieren"
 BBA_ethiopia_balance_of_power_events.53.desc:0 "Einer der Lords in [?ROOT.ETH_bop_state.GetName] möchte Unterstützung beim Aufbau einer lokalen Produktion von Gewehren und Munition in [?ROOT.ETH_bop_state.GetName]. Dies könnte unseren Streitkräften zu besserer Ausrüstung verhelfen und die Kampfkraft der [ROOT.GetAdjective]-Armee verbessern."
 BBA_ethiopia_balance_of_power_events.53.a:0 "Mehr Gewehre zu bekommen ist im Moment wichtiger als Kontrolle"
 BBA_ethiopia_balance_of_power_events.53.b:0 "Rüstungsproduktion in privater Hand klingt zu gefährlich"

 BBA_ethiopia_balance_of_power_events.54.t:0 "Versorgungsengpässe in [?ROOT.ETH_bop_state.GetName]"
 BBA_ethiopia_balance_of_power_events.54.desc:0 "Die Bevölkerung von [?ROOT.ETH_bop_state.GetName] bittet die Zentralregierung um Hilfe. Die jüngsten Ereignisse haben zu Versorgungsengpässen geführt, und die Region könnte dringend Investitionen gebrauchen, um der Situation entgegenzuwirken."
 BBA_ethiopia_balance_of_power_events.54.a:0 "Wir müssen etwas tun"
 ETH_investments_in_state_tt:0 "\nÄndere §Y$ETH_state_development_dynamic_modifier$§! durch: \n$MODIFIER_STATE_PRODUCTION_SPEED_BUILDINGS_FACTOR$: §G+5%§!\n$MODIFIER_LOCAL_BUILDING_SLOTS$: §G+5%§!"
 BBA_ethiopia_balance_of_power_events.54.b:0 "Leider können wir im Moment nicht viel tun"
 ETH_decline_in_state_tt:0 "\nÄndere §Y$ETH_state_development_dynamic_modifier$§! durch: \n$MODIFIER_STATE_PRODUCTION_SPEED_BUILDINGS_FACTOR$: §R-5%§!\n$MODIFIER_LOCAL_BUILDING_SLOTS$: §R-5%§!"
 BBA_ethiopia_balance_of_power_events.54.c:0 "Die lokalen Behörden in [?ROOT.ETH_bop_state.GetName] werden sich mit den Problemen auseinandersetzen müssen"

 BBA_ethiopia_balance_of_power_events.55.t:0 "Einheimische beschweren sich über Misshandlungen"
 BBA_ethiopia_balance_of_power_events.55.desc:0 "Es gab mehrere Beschwerden gegen die lokalen Herrscher von [?ROOT.ETH_bop_state.GetName]. Die Bevölkerung fühlt sich von der Aristokratie schlecht behandelt. Eine erste Untersuchung der Angelegenheit zeigt, dass die Beschwerden zumindest teilweise berechtigt sind. Ein Eingreifen der Zentralregierung wird jedoch von anderen Adligen nicht gern gesehen."
 BBA_ethiopia_balance_of_power_events.55.a:0 "Wir müssen hier ein Exempel statuieren"
 BBA_ethiopia_balance_of_power_events.55.b:0 "Es ist nicht die Aufgabe der Zentralregierung, sich in lokale Angelegenheiten einzumischen."

 BBA_ethiopia_balance_of_power_events.56.t:0 "Wirtschaftsboom in [?ROOT.ETH_bop_state.GetName]"
 BBA_ethiopia_balance_of_power_events.56.desc:0 "Die Bemühungen der Zentralregierung, die Verwaltung von [ROOT.GetName] zu verbessern und die verschiedenen Regionen zu integrieren, haben zu einem wirtschaftlichen Aufschwung in [?ROOT.ETH_bop_state.GetName] geführt. Die Region zieht Einwanderer aus anderen Teilen des Landes an und die Industrie expandiert."
 BBA_ethiopia_balance_of_power_events.56.a:0 "Wir sollten diese Gelegenheit nutzen, um den Zentralisierungsprozess noch weiter voranzutreiben"
 BBA_ethiopia_balance_of_power_events.56.b:0 "Unser Fokus sollte auf der Wiederinvestition in die Region liegen, um sie noch stärker florieren zu lassen."


#Imperial Ethiopia
 BBA_ethiopia_exile_events.01.t:0 "[FROM.GetLeader] bereit, [FROM.GetName] zurückzuerobern"
 BBA_ethiopia_exile_events.01.desc:0 "Der [FROM.GetAdjective] Anführer im Exil, [FROM.GetLeader], ist mehr als bereit, eine groß angelegte Kampagne zur Rückeroberung seines [FROM.GetLeader.GetHerHis] Landes zu starten. Die Unterstützung der Bevölkerung für einen solchen Versuch ist groß, daher könnte jetzt der richtige Zeitpunkt dafür sein."
 BBA_ethiopia_exile_events.01.a:0 "Die Sache von [FROM.GetName] ist unsere"
 ETH_can_call_allies_tt:0 "§Y[ETH.GetNameWithFlag]§! kann Verbündete zum Krieg aufrufen."
 BBA_ethiopia_exile_events.02.t:0 "Erhöhte Widerstandsaktivität im Norden [ETH.GetName]"
 BBA_ethiopia_exile_events.02.desc:0 "[ETH.GetLeader] ist aus dem Land geflohen, ermutigt seine Anhänger jedoch weiterhin, die siegreichen [ROOT.GetAdjective]-Armeen anzugreifen. Diese Reden haben zu verstärkten Widerstandsaktivitäten im Norden und Zentrum von [ETH.GetName] geführt."
 BBA_ethiopia_exile_events.02.a:0 "Wir müssen auf der Hut sein"

 BBA_ethiopia_exile_events.03.t:0 "Kommunistische Guerillas im Süden von [ETH.GetName]"
 BBA_ethiopia_exile_events.03.desc:0 "Es gibt mehrere Berichte über Angriffe auf [ROOT.GetAdjective]-Streitkräfte im südlichen [ETH.GetName]. Hinter diesen Angriffen soll eine Organisation stecken, die sich selbst die „Schwarzen Löwen“ nennt."
 BBA_ethiopia_exile_events.03.a:0 "Diese Aufständischen"

 BBA_ethiopia_exile_events.04.t:0 "$RAJ_orde_wingate$ zurückgerufen"
 BBA_ethiopia_exile_events.04.desc:0 "[ENG.GetNameDefCap] hat beschlossen, $RAJ_orde_wingate$ zurückzurufen. Er soll mit dem Aufbau einer neuen Truppe beauftragt worden sein, die [ETH.GetLeader] im Krieg in [ETH.GetName] unterstützen soll. Es deutet alles darauf hin, dass der Aufenthalt zeitlich begrenzt sein wird und $RAJ_orde_wingate$ nach Abschluss der Operation zurückkehren darf."
 BBA_ethiopia_exile_events.04.a:0 "Hoffen wir, dass es dann schnell geht"

 BBA_ethiopia_exile_events.05.t:0 "$RAJ_orde_wingate$ nach Burma transferiert"
 BBA_ethiopia_exile_events.05.desc:0 "Die [ENG.GetAdjective]-Regierung teilt uns mit, dass $RAJ_orde_wingate$ mit sofortiger Wirkung nach Burma versetzt wird, wo er mit der Organisation einer neuen Truppe beauftragt wird."
 BBA_ethiopia_exile_events.05.a:0 "Schade"

 BBA_ethiopia_exile_events.06.t:0 "[FROM.GetName] fordert die Oberherrschaft von [550.GetName] an"
 BBA_ethiopia_exile_events.06.desc:0 "[FROM.GetLeader] hat die Oberherrschaft über [550.GetName] gefordert, falls es uns gelingen sollte, es von [550.Owner.GetNameDef] zu erobern. Die Region stand unter der Kontrolle von [ETH.GetAdjective], daher besteht ein historischer Präzedenzfall für diesen Anspruch. [FROM.GetLeader] plädierte außerdem dafür, dass alle Habesha unter einem Herrscher vereint werden sollten, und verwies darauf, dass [FROM.GetNameDef] seit der Besetzung von [550.GetName] durch die [ITA.GetAdjective] keinen Zugang zum Meer hatte."
 BBA_ethiopia_exile_events.06.a:0 "Das macht Sinn"
 BBA_ethiopia_exile_events.06.b:0 "Wir können in diesem Stadium kein vielversprechendes Land betreten"

 BBA_ethiopia_exile_events.07.t:0 "[FROM.GetNameDefCap] stimmt unserer Anfrage zu"
 BBA_ethiopia_exile_events.07.desc:0 "Die [FROM.GetAdjective]-Regierung betrachtet unsere Ansprüche auf alle Habesha-Länder als legitim und hat unserem Antrag auf Oberherrschaft über [550.GetName] stattgegeben."
 BBA_ethiopia_exile_events.07.a:0 "Gute Nachrichten"

 BBA_ethiopia_exile_events.08.t:1 "Die [FROM.GetAdjective]-Regierung weigert sich"
 BBA_ethiopia_exile_events.08.desc:0 "Trotz unserer legitimen Ansprüche auf die Region [550.GetName] weigert sich die [FROM.GetAdjective]-Regierung, klare Versprechen oder Erklärungen zur Unterstützung dieser [ROOT.GetAdjective]-Ansprüche abzugeben. Nur die Zeit wird zeigen, ob sie uns letztendlich die Kontrolle über die Küste überlassen wird."
 BBA_ethiopia_exile_events.08.a:0 "Lasst uns den Krieg gewinnen und dann werden wir sehen"

 BBA_ethiopia_exile_events.10.t:0 "[FROM.GetName] fordert die Oberherrschaft über alle somalischen Länder"
 BBA_ethiopia_exile_events.10.desc:0 "Bei einem Treffen mit dem [ROOT.GetAdjective] Außenminister in [FROM.GetLeader]s provisorischer Residenz forderte [FROM.GetLeader], dass [FROM.GetName] die Oberhoheit über alle somalischen Ländereien erhalten solle, da in Äthiopien bereits eine große somalische Bevölkerung lebe und die Grenzstreitigkeiten einer der Vorwände für den Ausbruch des Konflikts gewesen seien. Die Übergabe all dieser Gebiete an [FROM.GetNameDef] würde laut [FROM.GetLeader] diesen Grund für zukünftige Konflikte beseitigen."
 BBA_ethiopia_exile_events.10.a:0 "Das würde uns tatsächlich einen starken Verbündeten geben"
 BBA_ethiopia_exile_events.10.b:0 "Sie können die Staaten des Feindes haben"
 BBA_ethiopia_exile_events.10.c:0 "Diese Forderungen gehen zu weit"

 BBA_ethiopia_exile_events.11.t:0 "Somalia gehört uns!"
 BBA_ethiopia_exile_events.11.desc:0 "Die [FROM.GetAdjective] haben zugestimmt, uns die Kontrolle über alle somalischen Gebiete zu überlassen. Das bedeutet, dass [ROOT.GetName] nach Kriegsende höchstwahrscheinlich den Großteil des Horns von Afrika kontrollieren wird."
 BBA_ethiopia_exile_events.11.a:1 "Das sind großartige Neuigkeiten!"


 BBA_ethiopia_exile_events.12.t:0 "Teilerfolg"
 BBA_ethiopia_exile_events.12.desc:1 "Die [FROM.GetAdjective]s sagen, wir können einen Teil des somalischen Landes haben. Genauer gesagt jenes, das sie oder wir dem Feind abgenommen haben. Sie weigern sich jedoch, Teile davon abzugeben, die sie derzeit als Teil ihres Reiches betrachten."
 BBA_ethiopia_exile_events.12.a:0 "Ich nehme an, es ist einfacher, die Zustände anderer preiszugeben"

 BBA_ethiopia_exile_events.13.t:0 "Kein Glück"
 BBA_ethiopia_exile_events.13.desc:0 "Unser Antrag auf künftigen Besitz aller somalischen Ländereien wurde von [FROM.GetNameDef] abgelehnt. Unglücklicherweise weigerten sie sich sogar, die Kontrolle über die dem Feind abgenommenen Gebiete zu versprechen."
 BBA_ethiopia_exile_events.13.a:0 "Lässt einen staunen"

 BBA_ethiopia_exile_events.14.t:0 "[FROM.GetLeader] fordert die Kontrolle über [454.GetName] an"
 BBA_ethiopia_exile_events.14.desc:0 "Bei einem kürzlichen Treffen in der Downing Street sprach [FROM.GetLeader] mit dem [ROOT.GetAdjective] Premierminister über [454.GetName]. [FROM.GetLeader] erklärte, dass [FROM.GetLeader.GetSheHe] auf seiner Durchreise nach [ROOT.GetNameDef] dort sehr herzlich empfangen worden sei. Die Gespräche verlagerten sich allmählich auf eine Bitte von [FROM.GetLeader], [454.GetName] als Basis für die Rückeroberung von [ETH.GetNameDef] zu nutzen, wobei er seine behauptete direkte Verbindung zu König Salomon als Druckmittel einsetzen und den Premierminister de facto bitten sollte, [454.GetName] an [ETH.GetNameDef] abzutreten."
 BBA_ethiopia_exile_events.14.a:0 "Vielleicht können wir das irgendwie nutzen"
 BBA_ethiopia_exile_events.14.b:0 "Auf keinen Fall!"

 BBA_ethiopia_exile_events.15.t:0 "[FROM.GetNameDefCap] Stimmt zu"
 BBA_ethiopia_exile_events.15.desc:0 "Etwas unerwartet haben die [FROM.GetAdjective] uns [454.GetName] als Basis zur Verfügung gestellt. Wir sollten schnell handeln und unsere Verwaltung dort einrichten. Eines Tages werden wir einen neuen Tempel Salomons errichten."
 BBA_ethiopia_exile_events.15.a:0 "Dies ist der Beginn einer neuen Ära"

 BBA_ethiopia_exile_events.16.t:0 "[FROM.GetNameDefCap] lehnt ab"
 BBA_ethiopia_exile_events.16.desc:1 "Leider lehnte die [FROM.GetAdjective]-Regierung unseren Antrag ab, [454.GetName] als Basis zu nutzen, und stellte die Legitimität unseres Anspruchs auf die Region in Frage."
 BBA_ethiopia_exile_events.16.a:1 "Wie beleidigend."

 BBA_ethiopia_exile_events.17.t:0 "[ROOT.GetLeader] Versprechen [FROM.GetLeader] Schiffe"
 BBA_ethiopia_exile_events.17.desc:0 "Während eines privaten Treffens zwischen [ROOT.GetLeader] und [FROM.GetLeader] versprach [ROOT.GetLeader], dass [ROOT.GetNameDef] [FROM.getNameDef] mit Schiffen unterstützen würde. Vielleicht unüberlegte Worte, aber dennoch etwas, das die [ROOT.GetAdjective]-Marine respektieren sollte."
 BBA_ethiopia_exile_events.17.a:0 "Wir können sicher ein paar Zerstörer entbehren"
 ETH_destroyers_tt:0 "[ETH.GetName] erhält 5 Zerstörer von [JAP.GetName]."
 BBA_ethiopia_exile_events.17.b:0 "Geben wir ihnen einen Kreuzer mit einigen Eskorten"
 ETH_cruiser_tt:0 "[ETH.GetName] erhält einen schweren Kreuzer und 3 Zerstörer von [JAP.GetName]."
 BBA_ethiopia_exile_events.17.c:0 "[FROM.GetLeader] braucht ein beeindruckendes Flaggschiff"
 ETH_battleship_tt:0 "[ETH.GetName] erhält ein [JAP.GetAdjective]-Schlachtschiff."
 BBA_ethiopia_exile_events.17.d:0 "Wir können keine Schiffe entbehren, aber wir können ihnen zumindest etwas Know-how vermitteln"

 BBA_ethiopia_exile_events.18.t:0 "[FROM.GetAdjective] Zerstörer"
 BBA_ethiopia_exile_events.18.desc:1 "Die [FROM.GetAdjective]-Marine hat uns freundlicherweise eine Einheit Zerstörer zur Verfügung gestellt, nachdem [FROM.GetLeader] versprochen hatte, [ROOT.GetName] mit einer Marine zu versorgen."
 BBA_ethiopia_exile_events.18.a:0 "Das ist zumindest etwas"
 BBA_ethiopia_exile_events.19.t:0 "Der Beginn der [ROOT.GetAdjective] Marine"
 BBA_ethiopia_exile_events.19.desc:0 "Nach dem Versprechen von [FROM.GetLeader], [ROOT.GetName] mit einigen Schiffen zu versorgen, hat [FROM.GetAdjective] einen Kreuzer und einige Zerstörer an [ROOT.GetAdjective] übergeben. Vielleicht keine große Flotte, aber immerhin eine. Der Beginn einer neuen Ära für [ROOT.GetName]"
 BBA_ethiopia_exile_events.19.a:0 "Dies ist erst der Anfang"

 BBA_ethiopia_exile_events.20.t:0 "Ein [ROOT.GetAdjective] Schlachtschiff"
 BBA_ethiopia_exile_events.20.desc:0 "Nach [ROOT.GetLeader]s Besuch bei [FROM.GetLeader] ordnete [FROM.GetName] die Übergabe eines Schlachtschiffs an [ROOT.GetName] an. Somit verfügt die [ROOT.GetNavy] nun über ein brandneues Flaggschiff. Wir müssen Eskorten bauen, aber mit [FROM.GetAdjective]s Hilfe sollte das machbar sein."
 BBA_ethiopia_exile_events.20.a:0 "Tolle Neuigkeiten"

 BBA_ethiopia_exile_events.21.t:0 "Keine Schiffe"
 BBA_ethiopia_exile_events.21.desc:0 "Trotz der Schiffsversprechen von [FROM.GetLeader] an [ROOT.GetLeader] kann sich [FROM.GetName] aufgrund des Zustands der [FROM.GetAdjective] Marine derzeit nicht von Schiffen trennen. Um dies irgendwie zu kompensieren, hat die [FROM.GetAdjective] Admiralität [ROOT.GetName] gestattet, [FROM.GetAdjective] Schiffsdesigns und Produktionsmethoden zu studieren, um Wissen über den Schiffsbau an [ROOT.GetName] weiterzugeben."
 BBA_ethiopia_exile_events.21.a:0 "Es ist schließlich besser als nichts"
 BBA_ethiopia_exile_events.22.t:0 "[ROOT.GetLeader] verspricht [FROM.GetLeader] eine Insel"
 BBA_ethiopia_exile_events.22.desc:0 "Offenbar hat [ROOT.GetLeader] [FROM.GetLeader] eine von [ROOT.GetName]s Inseln als Regierungsbasis und für die Rückeroberung von [FROM.GetName] versprochen. Dies ist eine offizielle Anerkennung von [FROM.GetLeader] als Herrscher von [FROM.GetNameDef] und wird von [ITA.getName] als Kriegserklärung verstanden. Es ist jedoch auch eine Gelegenheit, den Einfluss von [ROOT.GetNameDef] auszuweiten."
 BBA_ethiopia_exile_events.22.a:0 "Wie wäre es mit [647.GetName]?"
 BBA_ethiopia_exile_events.22.b:0 "[524.GetName] wäre eine hervorragende Basis"
 BBA_ethiopia_exile_events.22.c:0 "[543.GetName] ist eine Insel, nehme ich an?"
 BBA_ethiopia_exile_events.22.d:0 "Sie können [?ETH.japanese_island.GetName] haben"
 BBA_ethiopia_exile_events.22.e:0 "Sie können eine der [ENG.GetAdjective] Inseln haben"

 BBA_ethiopia_exile_events.23.t:0 "Eine äthiopische Insel"
 BBA_ethiopia_exile_events.23.desc:0 "Als Zeichen des guten Willens und in Anerkennung von [ROOT.GetLeader] als rechtmäßigem Herrscher von [ROOT.GetNameDef] hat [FROM.GetLeader] [ROOT.GetLeader] die Insel [?ETH.japanese_island.GetName] als Aufmarschgebiet für die Rückeroberung von [ROOT.GetName] überlassen.\n\n [FROM.GetNameDef] wird [ROOT.GetName] bei der Rückeroberung des verlorenen Territoriums unterstützen. Im Gegenzug für diese Gefälligkeiten hat [ROOT.GetLeader] [FROM.GetLeader] Treue geschworen, wodurch die beiden Länder im Kampf gegen den europäischen Imperialismus enger zusammenrücken."
 BBA_ethiopia_exile_events.23.a:0 "[?ETH.japanese_island.GetName] gehört uns"

 BBA_ethiopia_exile_events.24.t:0 "Eine Operationsbasis für Äthiopien"
 BBA_ethiopia_exile_events.24.desc:0 "In einem geheimen Abkommen der Staatsoberhäupter von [ROOT.GetNameDef] und [FROM.GetNameDef] wurden [FROM.GetNameDef] mehrere Staaten der Arabischen Halbinsel versprochen, sollten diese in die Hände der [ROOT.GetAdjective]-Regierung fallen. Die Gebiete sollen zu gegebener Zeit übergeben werden, müssen aber zunächst gesichert werden."
 BBA_ethiopia_exile_events.24.a:0 "Dies wird sie zu einem stärkeren Verbündeten machen"
 ETH_transfer_states_tt:0 "Wird an §Y[ETH.GetNameWithFlag]§! übertragen, wenn es im Besitz von §Y[ROOT.GetNameWithFlag]§! ist."

 BBA_ethiopia_exile_events.30.t:0 "Gegenseitige Fraktionsanwendung"
 BBA_ethiopia_exile_events.30.desc:0 "[FROM.GetNameDefCap] schlägt vor, dass wir einen gemeinsamen Mitgliedsantrag bei einer Fraktion einreichen, die gegen [ITA.GetNameDef] ist. Dies würde zwar gegen unsere historischen Richtlinien verstoßen, aber andererseits war es in gewisser Weise schon ein Verstoß dagegen, dem Anführer von [FROM.GetAdjective] zu erlauben, in [ROOT.GetName] zu bleiben."
 BBA_ethiopia_exile_events.30.a:0 "Dies ist eine natürliche Eskalation"
 BBA_ethiopia_exile_events.30.b:0 "Nein, das wäre einen Schritt zu weit"
 BBA_ethiopia_exile_events.31.t:0 "[FROM.GetName] lehnt unseren Vorschlag ab"
 BBA_ethiopia_exile_events.31.desc:0 "Die [FROM.GetAdjective]-Regierung hat unseren Vorschlag eines gemeinsamen Beitrittsantrags abgelehnt. Das bedeutet leider, dass wir als einzelne Länder kämpfen müssen, anstatt auf die Unterstützung eines größeren Bündnisses zählen zu können."
 BBA_ethiopia_exile_events.31.a:0 "Zumindest haben wir es versucht"

 BBA_ethiopia_exile_events.32.t:0 "Gemeinsamer Mitgliedsantrag von [FROM.GetName] und [FROM.FROM.GetName]"
 BBA_ethiopia_exile_events.32.desc:0 "[FROM.GetLeader] und [FROM.FROM.GetLeader] haben sich mit der Bitte an uns gewandt, sich der [ROOT.GetFactionName] anzuschließen. Dadurch würden die Streitkräfte von [FROM.GetNameDef] und [FROM.FROM.GetNameDef] der [ROOT.GetFactionName] im Krieg gegen [ITA.GetName] zur Verfügung stehen."
 BBA_ethiopia_exile_events.32.a:0 "Das klingt nach einer guten Idee"
 BBA_ethiopia_exile_events.32.b:0 "Ohne sie geht es uns besser"

 BBA_ethiopia_exile_events.33.t:0 "[FROM.GetName] lehnt ab"
 BBA_ethiopia_exile_events.33.desc:0 "Leider lehnte [FROM.GetName] die gemeinsame Anfrage von [SWE.GetAdjective] und [ETH.GetAdjective] ab, sich [FROM.GetFactionName] anzuschließen. Aus irgendeinem seltsamen Grund weigerten sie sich, den Nutzen einer vereinten Streitmacht gegen [ITA.GetLeader] zu erkennen."
 BBA_ethiopia_exile_events.33.a:0 "Nervig"

 BBA_ethiopia_exile_events.34.t:0 "[FROM.GetNameDefCap] Stimmt zu"
 BBA_ethiopia_exile_events.34.desc:0 "[FROM.GetNameDefCap] hat uns den [FROM.GetFactionName] beitreten lassen. Wir haben jetzt eine viel größere Chance, [ITA.GetName] zu besiegen."
 BBA_ethiopia_exile_events.34.a:0 "Tolle Neuigkeiten"

 BBA_ethiopia_exile_events.40.t:0 "[FROM.GetName] fordert Vermittlung an"
 BBA_ethiopia_exile_events.40.desc:0 "Der im Exil lebende Kaiser von [FROM.GetName], [FROM.GetLeader], hat um [ROOT.GetAdjective] Vermittlung im Italienisch-Äthiopischen Krieg gebeten. [GetGermanCountryLeaderTitle] hat sein persönliches Interesse an der Lösung dieses Konflikts bekundet, den der Völkerbund bisher nicht lösen konnte. Dies würde [ROOT.GetName]s Status auf der Weltbühne stärken."
 BBA_ethiopia_exile_events.40.a:0 "[ITA.GetName] muss aus [FROM.GetName] herausziehen"
 BBA_ethiopia_exile_events.40.b:0 "[ITA.GetLeader] muss etwas angeboten werden"
 BBA_ethiopia_exile_events.40.c:0 "Wir sollten neue Grenzen ziehen, die stabiler sind"

 BBA_ethiopia_exile_events.41.t:0 "[FROM.GetAdjective] Mediation"
 BBA_ethiopia_exile_events.41.desc_back_off:0 "[FROM.GetLeader] hat sich eindeutig auf die Seite unseres Feindes gestellt. [?global.ETH_peace_country.GetLeader] darf seit geraumer Zeit in [FROM.GetNameDef] residieren und vorgeben, weiterhin an der Macht zu sein. Die Lügen des ehemaligen Anführers von [?global.ETH_peace_country.GetNameDef] haben [FROM.GetLeader] eindeutig beeinflusst und [FROM.GetLeader.GetHerHis] Meinung über [ROOT.GetNameDef] verschlechtert. Nun fordert [FROM.GetNameDef], dass wir uns einfach aus [?global.ETH_peace_country.GetName] zurückziehen und unsere Differenzen beilegen."
 BBA_ethiopia_exile_events.41.desc_offered_compensation:0 "Als natürliche Konsequenz daraus, dass er dem im Exil lebenden Anführer unseres Feindes, [?global.ETH_peace_country.GetLeader], erlaubt hat, in [FROM.GetNameDef] zu wohnen, möchte [FROM.GetLeader] nun im Konflikt zwischen [ROOT.GetName] und [?global.ETH_peace_country.GetName] vermitteln. [FROM.GetLeader] erklärt, dass es [FROM.GetLeader.GetSheHe] gelungen sei, [?global.ETH_peace_country.GetLeader] davon zu überzeugen, im Gegenzug für Frieden und eine mögliche zukünftige Zusammenarbeit kleinere Zugeständnisse an [ROOT.GetName] zu machen."
 BBA_ethiopia_exile_events.41.desc_redraw_map:0 "Der [FROM.GetAdjective]-Anführer [FROM.GetLeader] hat eine Lösung für den italienisch-äthiopischen Krieg vorgeschlagen, bei der [ROOT.GetName] einen großen Teil des [?global.ETH_peace_country.GetAdjective]-Territoriums erhält, im Gegenzug für Frieden und künftige Zusammenarbeit gegen äußere Feinde. [?global.ETH_peace_country.GetName] würde, sollte [ROOT.GetName] diesen Vorschlag annehmen, mit [550.GetName] entschädigt werden, sodass auch sie etwas gewinnen. Dies würde [ROOT.GetAdjective]s Besitz in Afrika konsolidieren und [?global.ETH_peace_country.GetName] gleichzeitig Zugang zum Meer verschaffen."
 BBA_ethiopia_exile_events.41.a:0 "Es ist wahrscheinlich das Beste"
 BBA_ethiopia_exile_events.41.b:0 "Es ist ein Anfang, aber die [ROOT.GetAdjective]-Leute brauchen mehr als Belohnung für ihre Bemühungen"
 BBA_ethiopia_exile_events.41.c:0 "Was glaubt [FROM.GetLeader.GetSheHe], wer [FROM.GetLeader.GetSheHe] ist?"

 BBA_ethiopia_exile_events.42.t:0 "[FROM.GetLeader] will mehr"
 BBA_ethiopia_exile_events.42.desc:0 "Der Friedensvorschlag von [GetGermanCountryLeaderTitle] wurde von [FROM.GetLeader] nicht rundweg abgelehnt. Die [FROM.GetAdjective]-Regierung ist jedoch der Ansicht, dass sie für ihre Bemühungen, den öffentlichen Widerstand gegen das Regime zu unterdrücken, mehr vorweisen muss und hat uns daher gebeten, die Sache etwas zu überdenken."
 BBA_ethiopia_exile_events.42.a:0 "Verständlich"
 BBA_ethiopia_exile_events.42.b:0 "Wie können sie es wagen, unsere Befehle in Frage zu stellen?"

 BBA_ethiopia_exile_events.43.t:0 "[FROM.GetName] hat unsere Anfrage akzeptiert"
 BBA_ethiopia_exile_events.43.desc:1 "[FROM.GetLeader] versteht, dass [ETH.GetName] Territorium aufgeben muss, um den Konflikt so zu beenden, dass wir in der Öffentlichkeit unser Gesicht wahren können. Wir werden dieses Chaos einer Invasion bald erhobenen Hauptes hinter uns lassen können."
 BBA_ethiopia_exile_events.43.a:0 "Gut"

 BBA_ethiopia_exile_events.44.t:0 "[FROM.GetLeader] Verärgert über unsere Anfrage"
 BBA_ethiopia_exile_events.44.desc:0 "Die Argumente von [ROOT.GetLeader] stießen auf taube Ohren. [FROM.GetLeader] geriet in Rage und behauptete, der Vorschlag sei im besten Interesse aller Beteiligten und [ROOT.GetLeader] sei ein Fehlschlag, da [ROOT.GetLeader.GetHerHis] in Afrika nicht gewinnen konnte. Die [FROM.GetAdjective] werde die [ROOT.GetAdjective]-Armee mit Sicherheit innerhalb weniger Wochen vernichten, rief [FROM.GetLeader] weiter."
 BBA_ethiopia_exile_events.44.a:0 "Es ist nicht so, als würden sie den Krieg erklären oder so …"

 BBA_ethiopia_exile_events.45.t:0 "Mediation erfolgreich"
 BBA_ethiopia_exile_events.45.desc_white_peace:0 "Die [FROM.GetAdjective]-Vermittlung war erfolgreich. [FROM.FROM.GetLeader] wurde von [FROM.GetLeader] angewiesen, [FROM.FROM.GetLeader.GetHerHis] Armeen aus [ROOT.GetAdjective]-Gebiet abzuziehen. \nDer Vertrag sieht keine Entschädigung für [ROOT.GetName] vor, aber wir hoffen, dass wir unsere neuen Verbündeten nutzen können, um das Land in die Moderne zu führen. Der [FROM.GetAdjective] [GetGermanCountryLeaderTitle], [FROM.GetLeader], hat vage Versprechungen zur Wiederherstellung des Ruhms des [ROOT.GetAdjective]-Imperiums gemacht."
 BBA_ethiopia_exile_events.45.desc_redraw_map:0 "[FROM.GetLeader] hat mit [FROM.FROM.GetNameDef] Frieden ausgehandelt. [ROOT.GetNameDefCap] muss den gesamten Süden an [FROM.FROM.GetName] abtreten. Als Gegenleistung soll [ROOT.GetName] [550.GetName] erhalten, um [ROOT.GetName] den Zugang zum Meer zu sichern. Dies teilt laut [FROM.GetLeader] das Gebiet auch in einzelne Einheiten auf, was laut [FROM.GetLeader] das Risiko zukünftiger Konflikte zwischen den beiden Nationen verringern wird."
 BBA_ethiopia_exile_events.45.desc_cede_territory:0 "[FROM.GetLeader] hat mit [FROM.FROM.GetNameDef] Frieden geschlossen. Leider haben die beiden Anführer über unsere Köpfe hinweg entschieden, dass [FROM.FROM.GetName] Teile von [ROOT.GetName] erhalten soll. Wir können nichts dagegen tun."
 BBA_ethiopia_exile_events.45.a:0 "Wenigstens eine Art Frieden"

 BBA_ethiopia_exile_events.46.t:0 "Mediation scheitert"
 BBA_ethiopia_exile_events.46.desc:0 "Leider blieben [FROM.GetLeader]s Versuche, einen Friedensvertrag mit [FROM.FROM.GetNameDef] auszuhandeln, erfolglos. [FROM.FROM.GetLeader] weigert sich, Vernunft einzusehen. Unsere Hoffnung ist nun, dass wir [FROM.GetNameDef] stattdessen dazu bewegen können, sich uns im Krieg anzuschließen."
 BBA_ethiopia_exile_events.46.a:0 "Wir hatten uns mehr erhofft"

 BBA_ethiopia_exile_events.47.t:0 "[FROM.GetLeader] weigert sich zu kooperieren"
 BBA_ethiopia_exile_events.47.desc:0 "Die Antwort von [FROM.GetAdjective] ist alles andere als zufriedenstellend. [FROM.GetLeader] weigert sich, nachzugeben. [FROM.GetName] wird den Krieg nicht beenden, bis sie gewonnen haben oder bei dem Versuch vernichtet wurden."
 BBA_ethiopia_exile_events.47.a:0 "Wir müssen [FROM.GetLeader.GetHerHim] eine Lektion erteilen"

 BBA_ethiopia_exile_events.48.t:0 "[FROM.GetLeader] hat unsere Vermittlung akzeptiert"
 BBA_ethiopia_exile_events.48.desc:0 "Wie erwartet hat [ROOT.GetNameDef] das geschafft, was alle anderen nicht geschafft haben. [FROM.GetLeader] hat die von [ROOT.GetLeader] ausgearbeiteten Bedingungen akzeptiert. Es wird Frieden zwischen [FROM.GetNameDefCap] und [?global.ETH_peace_country.GetNameDef] herrschen. Gemeinsam können wir uns nun wichtigeren Dingen zuwenden."
 BBA_ethiopia_exile_events.48.a:0 "[ROOT.GetLeader] ist der Garant des Friedens in unserer Zeit"

 BBA_ethiopia_exile_events.50.t:0 "Grenzvorfall"
 BBA_ethiopia_exile_events.50.desc:1 "Ein Grenzposten geriet von der italienischen Seite unter Beschuss. Die italienische Seite erwiderte das Feuer auf die Scharfschützen, und es kam zu einem langen Feuergefecht. Auf beiden Seiten wurden Soldaten verletzt. Ein formeller Protest wurde bei der italienischen Regierung eingereicht. Diese beteuert jedoch ihre Unschuld und wirft unseren Truppen vor, den Vorfall ausgelöst zu haben."
 BBA_ethiopia_exile_events.50.a:0 "Dies ist alles andere als akzeptables Verhalten"

 BBA_ethiopia_exile_events.51.t:0 "Verdächtiger Grenzvorfall"
 BBA_ethiopia_exile_events.51.desc:1 "Die [GER.GetAdjective]-Regierung hat nach einem Zwischenfall an der deutsch-italienischen Grenze wütend protestiert. Jemand hatte das Feuer eröffnet. Die Berichte sind äußerst widersprüchlich. Einige behaupten, der Schusswechsel habe von italienischer Seite aus begonnen, während keiner der überlebenden Grenzsoldaten zugab, vor dem Schusswechsel geschossen zu haben. Die Tatsache, dass sich die italienischen Soldaten in keinerlei Deckung befanden, untermauert diese Aussagen zusätzlich."
 BBA_ethiopia_exile_events.51.a:0 "Dies ist eindeutig eine [GER.GetAdjective] Verschwörung"

 BBA_ethiopia_exile_events.52.t:0 "Hinterzimmerdiplomatie"
 BBA_ethiopia_exile_events.52.desc:0 "Die kürzlich in der Residenz Seiner Majestät [ETH.GetLeader] abgehaltene Party war ein voller Erfolg. Während die Gäste sich unterhielten und Köstlichkeiten aus aller Welt genossen, erfuhren [?ETH.host_nation.GetAdjective] Politiker von [ETH.GetAdjective] Exilanten von der brutalen [ITA.GetAdjective] Besetzung des Heimatlandes. Viele ließen sich davon überzeugen, einen größeren Einsatz von [?ETH.host_nation.GetAdjective] Ressourcen zu unterstützen, um uns eines Tages bei der Befreiung von [ETH.GetNameDef] zu helfen."
 BBA_ethiopia_exile_events.52.a:0 "Der Heimreise einen Schritt näher."

 BBA_ethiopia_exile_events.53.t:0 "Erfolgreiche Lobbyarbeit"
 BBA_ethiopia_exile_events.53.desc:0 "In den letzten Monaten gab es zahlreiche Lobbyarbeit bei unseren Gastgebern, um uns bei der Befreiung von [ETH.GetNameDef] zu unterstützen. Seine Majestät hat Briefe an Regierungsmitglieder und Militärs geschrieben, in denen er für unser Anliegen wirbt. Gleichzeitig haben andere Exilanten Interviews gegeben und Artikel für zahlreiche Zeitungen verfasst, um die Unterstützung der [?ETH.host_nation.GetAdjective]-Öffentlichkeit zu gewinnen. Obwohl es schwierig war, scheint sich die Stimmung im Land nun in Richtung direkter militärischer Unterstützung für die Befreiung von [ETH.GetNameDef] zu bewegen."
 BBA_ethiopia_exile_events.53.a:0 "Die Mühe lohnt sich!"

 BBA_ethiopia_exile_events.54.t:0 "Spendenaktionen"
 BBA_ethiopia_exile_events.54.desc:0 "Unsere jüngsten Spendenaktionen waren äußerst lukrativ. Die kaiserliche Schatzkammer verzeichnete einen enormen Zufluss an Geldern aus aller Welt. Es scheint, als würden viele unsere Empörung über die Besetzung von [ETH.GetNameDef] teilen."
 BBA_ethiopia_exile_events.54.a:0 "Wir werden ihren Beitrag zu dieser Sache nicht vergessen."

 BBA_ethiopia_exile_events.55.t:0 "[?ETH.host_nation.GetAdjective] Söldnerrekrutierung"
 BBA_ethiopia_exile_events.55.desc:0 "Die jüngsten Bemühungen, unsere Sache voranzutreiben, haben zu einem stetigen Zustrom von [?ETH.host_nation.GetAdjective]-Söldnern geführt, die uns in den kommenden Schlachten ihre Dienste anbieten. Gegen Bezahlung, versteht sich."
 BBA_ethiopia_exile_events.55.a:0 "Unsere Streitkräfte werden jeden Tag stärker."

 BBA_ethiopia_exile_events.56.t:0 "[?ETH.host_nation.GetAdjective] Piloten folgen dem Ruf"
 BBA_ethiopia_exile_events.56.desc:0 "Wir haben gesehen, wie zahlreiche [?ETH.host_nation.GetAdjective]-Piloten dem Ruf gefolgt sind, uns bei der bevorstehenden Befreiung unseres Heimatlandes zu unterstützen. Sie bringen einen reichen Erfahrungsschatz mit, den sie gerade an unsere zukünftigen Piloten weitergeben."
 BBA_ethiopia_exile_events.56.a:0 "Wir nehmen jede Hilfe an, die wir bekommen können. "

 BBA_ethiopia_exile_events.57.t:0 "Eine [ETH.GetName]-Hilfsflotte"
 BBA_ethiopia_exile_events.57.desc:0 "Der jüngste Aufruf an [?ETH.host_nation.GetAdjective]-Seeleute und Schiffe, die bereit sind, den feindlichen Gewässern zu trotzen, wurde von zahlreichen freiwilligen Helfern beantwortet. Pensionierte Marineangehörige, zivile Seeleute und junge Freiwillige auf der Suche nach Abenteuern haben sich gemeldet, um die bunt gemischte Flotte von Frachtschiffen zu bemannen, die wir aus den Abwrackwerften von [?ETH.host_nation.GetNameDef] zusammengetragen haben."
 BBA_ethiopia_exile_events.57.a:0 "Hoffen wir, dass die Schiffe noch seetüchtig sind …"

 BBA_ethiopia_exile_events.58.t:0 "Gewehrlieferung zugestellt"
 BBA_ethiopia_exile_events.58.desc:0 "Die bei [?ETH.host_nation.GetAdjective]-Herstellern gekauften Gewehre wurden an unsere in [?ETH.host_nation.GetName] stationierten Truppen geliefert. Die neue Ausrüstung wird nun auf dem Schießstand und bei Übungen getestet."
 BBA_ethiopia_exile_events.58.a:0 "Gut angelegtes Geld."

 BBA_ethiopia_exile_events.59.t:0 "Gelieferte Hilfsausrüstung"
 BBA_ethiopia_exile_events.59.desc:0 "Unsere kürzlich gekaufte Unterstützungsausrüstung für die Truppen wurde nun ausgeliefert. Auch wenn es sich dabei nicht um die modernste Ausrüstung der Welt handelt, wird sie an der Front dennoch eine große Hilfe sein."
 BBA_ethiopia_exile_events.59.a:0 "Jede Kleinigkeit hilft."

 BBA_ethiopia_exile_events.60.t:0 "Gelieferte Panzer"
 BBA_ethiopia_exile_events.60.desc:0 "Die aus den Beständen der Armee gekauften Panzer wurden nun an unsere Streitkräfte übergeben. Es handelt sich um ältere Modelle, die in den letzten Jahren eingemottet wurden. Sie sind jedoch noch voll funktionsfähig und werden nun zur Ausbildung von Besatzungen eingesetzt, die für den Einsatz an der Front bereit sind. "
 BBA_ethiopia_exile_events.60.a:0 "Jeder Panzer ist besser als kein Panzer."

#Imperial Events, non-exile stuff
 BBA_ethiopia_imperial_events.1.t:0 "[FROM.GetName] möchte Dschibuti kaufen"
 BBA_ethiopia_imperial_events.1.desc:0 "[FROM.GetLeader] möchte die Kolonie [ROOT.GetAdjective] [268.GetName] kaufen. Der Kauf würde [FROM.GetNameDef] Zugang zum Meer über den Hafen von Dschibuti verschaffen, zu dem es bereits eine Bahnverbindung von Addis Abeba gibt. Sie bieten eine ansehnliche Summe für eine so unbedeutende Kolonie."
 BBA_ethiopia_imperial_events.1.a:0 "Wir können das Geld sinnvoll einsetzen"
 BBA_ethiopia_imperial_events.1.b:0 "Es ist [ROOT.GetAdjective] und wird es bleiben!"

 BBA_ethiopia_imperial_events.2.t:0 "[FROM.GetNameDefCap] stimmt dem Verkauf Dschibutis zu"
 BBA_ethiopia_imperial_events.2.desc:0 "Die Verhandlungen mit der [FROM.GetAdjective]-Regierung über den möglichen Kauf der Kolonie [268.GetName] wurden erfolgreich abgeschlossen. [FROM.GetNameDefCap] hat zugestimmt, den Hafen von Dschibuti und die umliegende Region mit sofortiger Wirkung an [ROOT.GetName] zu übergeben. Damit erhalten wir beide Zugang zu einem Hafen und vereinen das Volk der Afar unter einem Herrscher."
 BBA_ethiopia_imperial_events.2.a:0 "Tolle Neuigkeiten"

 BBA_ethiopia_imperial_events.3.t:0 "[FROM.GetName] Weigert sich, Dschibuti zu verkaufen"
 BBA_ethiopia_imperial_events.3.desc:0 "Leider hat die [FROM.GetAdjective]-Regierung unsere Anfrage, ihr den Hafen von Dschibuti abzukaufen, abgelehnt. Anstatt den gegenseitigen Nutzen zu erkennen, klammern sie sich verzweifelt an ihre Kolonien und weigern sich, auch nur einen Zentimeter des an sich gerissenen Landes aufzugeben."
 BBA_ethiopia_imperial_events.3.a:0 "Wir werden andere Methoden in Betracht ziehen"

 BBA_ethiopia_imperial_events.4.t:0 "[FROM.GetNameDefCap] Fordert [689.GetName] an."
 BBA_ethiopia_imperial_events.4.desc:0 "Die Rastafari-Bewegung in [689.GetName] behauptet, $ETH_haile_selassie$ sei der wiedergeborene Messias oder Jah, ihr Name für Gott. Etwas unerwartet hat $ETH_haile_selassie$ diesen Ruf angenommen und die [FROM.GetAdjective]-Regierung hat darum gebeten, das Heimatland der Bewegung, d. h. [689.GetName], in das [FROM.GetAdjective]-Reich einzugliedern."
 BBA_ethiopia_imperial_events.4.a:0 "Was für eine seltsame Bitte, aber warum nicht?"
 BBA_ethiopia_imperial_events.4.b:0 "Wir werden Teil des Reiches Zion sein"
 BBA_ethiopia_imperial_events.4.c:0 "Auf keinen Fall!"

 BBA_ethiopia_imperial_events.5.t:0 "[FROM.GetNameDefCap] hat unsere Anfrage akzeptiert"
 BBA_ethiopia_imperial_events.5.desc:0 "Unsere bescheidene Anfrage zur Übertragung der Kontrolle über [689.GetName] wurde von [FROM.GetNameDef] angenommen. Dies markiert den Beginn einer neuen Ära. Ruhm für $ETH_haile_selassie$. Hoffentlich können wir dadurch Anhänger aus ganz Amerika gewinnen."
 BBA_ethiopia_imperial_events.5.a:0 "Sie haben das Licht gesehen"

 BBA_ethiopia_imperial_events.6.t:0 "[FROM.GetNameDefCap] weigert sich, [689.GetName] zu übergeben"
 BBA_ethiopia_imperial_events.6.desc:0 "Trotz unserer größten Bemühungen ist es uns nicht gelungen, die [FROM.GetAdjective]-Regierung davon zu überzeugen, dass [689.GetName] Teil der [ROOT.GetAdjective] ist. Sie lachten über unsere Forderung und zogen sogar Zweifel an der Göttlichkeit unseres großen Führers auf."
 BBA_ethiopia_imperial_events.6.a:0 "Wie können sie es wagen!"

 BBA_ethiopia_imperial_events.7.t:0 "[FROM.GetLeader] Anfragen zur Übermittlung"
 BBA_ethiopia_imperial_events.7.desc:0 "Die Rastafari-Bewegung in [689.GetName] behauptet, $ETH_haile_selassie$ sei der wiedergeborene Messias oder Jah, ihr Name für Gott. Etwas unerwartet hat $ETH_haile_selassie$ diesen Ruf angenommen. Infolgedessen fordert [FROM.GetLeader.GetSheHe] nun, dass [ROOT.GetNameDef] sich offiziell der [FROM.GetAdjective] anschließt und eine neue Machtbasis in der Karibik aufbaut, von wo aus der Einfluss auf den Rest der Welt ausgeweitet werden kann."
 BBA_ethiopia_imperial_events.7.a:0 "Das klingt nach einer guten Idee"
 BBA_ethiopia_imperial_events.7.b:0 "Sie haben es völlig verloren"
 BBA_ethiopia_imperial_events.8.t:0 "[FROM.GetNameDefCap] sendet"
 BBA_ethiopia_imperial_events.8.desc:0 "[FROM.GetLeader] hat die weise Entscheidung getroffen, unsere Oberherrschaft zu akzeptieren. [FROM.GetName] wird ein loyaler Untertan von [ROOT.GetLeader] sein. "
 BBA_ethiopia_imperial_events.8.a:0 "Ehre sei [ROOT.GetLeader]"
 BBA_ethiopia_imperial_events.9.t:0 "[FROM.GetNameDefCap] verweigert die Übermittlung"
 BBA_ethiopia_imperial_events.9.desc:0 "Leider lehnte [FROM.GetNameDef] das freundliche Angebot ab, Untertan von [ROOT.GetLeader] zu werden. Trotz unserer Bemühungen gelang es uns nicht, die Regierung von [FROM.getName] davon zu überzeugen, dass dies tatsächlich zum Vorteil beider Parteien wäre."
 BBA_ethiopia_imperial_events.9.a:0 "Man kann nicht immer gewinnen"

 BBA_ethiopia_imperial_events.10.t:0 "[FROM.GetNameDefCap] sendet Ultimatum"
 BBA_ethiopia_imperial_events.10.desc:0 "[FROM.GetNameDefCap] hat unsere Unterwerfung und Integration in ihre Nation gefordert. Sollten wir dieser Forderung nachkommen, bedeutet dies natürlich das Ende von [THIS.GetName] als unabhängige Nation. Es ist unklar, wie weit [FROM.GetLeader] bereit ist, für eine Integration zu gehen, aber die Möglichkeit eines bewaffneten Konflikts kann nicht ausgeschlossen werden."
 BBA_ethiopia_imperial_events.10.a:0 "Wir haben keine Wahl..."
 BBA_ethiopia_imperial_events.10.b:0 "Wir lassen uns nicht bedrohen."

 BBA_ethiopia_imperial_events.11.t:0 "[FROM.GetNameDefCap] Ultimatum ablehnen"
 BBA_ethiopia_imperial_events.11.desc:0 "[FROM.GetNameDefCap] haben sich geweigert, unsere Forderungen nach Wiedereingliederung zu akzeptieren. Immer wieder waren [FROM.GetName] bereit, uns zu verraten, um sich selbst zu schützen. Wir können nicht zulassen, dass das noch einmal passiert."
 BBA_ethiopia_imperial_events.11.a:0 "Wir werden dem ein Ende setzen."
 BBA_ethiopia_imperial_events.11.b:0 "Wir haben Wichtigeres zu erledigen."

 BBA_ethiopia_imperial_events.12.t:1 "[FROM.GetNameDefCap] Akzeptiert Anforderungen"
 BBA_ethiopia_imperial_events.12.desc:1 "[FROM.GetNameDefCap] hat die Notwendigkeit einer Wiedereingliederung mit [THIS.GetName] akzeptiert. [FROM.GetLeader] hat nun Seiner Majestät [THIS.GetLeader] die Treue geschworen."
 BBA_ethiopia_imperial_events.12.a:0 "Eine Sorge weniger."
 
 BBA_ethiopia_imperial_events.20.t:0 "Unblutiger Putsch von $ETH_ras_imru_haile_selassie$"
 BBA_ethiopia_imperial_events.20.desc:1 "Nachdem er die Unterstützung der Mittelschicht und der Bauernschaft von [ETH.GetName] gewonnen hatte, verkündete Ras $ETH_ras_imru_haile_selassie$ die offizielle Entthronung von $ETH_haile_selassie$ und die Einführung allgemeiner Wahlen in [ETH.GetNameDef]. Er wird vom Volk und, in diesem Fall noch wichtiger, von der [ETH.GetAdjective] Armee allgemein als der wahre Held des zweiten Italienisch-Äthiopischen Krieges angesehen und es ist ihm gelungen, sich die Loyalität des Militärs zu sichern, und die Unterstützung für den abwesenden Kaiser blieb aus."
 BBA_ethiopia_imperial_events.20.a:1 "Der Rote Ras sollte herrschen [ETH.GetNameDef]"
 BBA_ethiopia_imperial_events.20.b:0 "Die Einsetzung des Kronprinzen als konstitutioneller Monarch ist sicherer"

 BBA_ethiopia_imperial_events.21.t:0 "Widerstand in [ETH.GetName]"
 BBA_ethiopia_imperial_events.21.desc:0 "Unsere Truppen brechen weiterhin durch die [ETH.GetAdjective]-Streitkräfte und ebnen unserer überlegenen Herrschaft den Weg. Wir beobachten jedoch eine Zunahme der Widerstandsaktivitäten in unserem neuen Herrschaftsbereich. Es scheint, als hätten die Worte des ehemaligen Herrschers $ETH_haile_selassie$ vor dem Völkerbund viele unserer neuen Untertanen in Aufruhr versetzt. Es scheint, als ob Widerstand unserer Kolonialverwaltung ein Dorn im Auge sein wird, solange ihr Kaiser lebt."
 BBA_ethiopia_imperial_events.21.a:0 "Sie werden sich unserer Herrschaft auf die eine oder andere Weise unterwerfen."
 ETH_imperial_event_21_tt:0 "Alle kontrollierten §Y[ETH.GetFlag][ETH.GetAdjective]§!-Staaten erreichen:\nCompliance: §R-10%§!"

# Military and technology events 
 BBA_ethiopia_military_and_tech_events.1.t:0 "Erste Klasse der [GetEthiopianMilitaryAcademyName]"
 BBA_ethiopia_military_and_tech_events.1_war.desc:0 "Der erste Absolvent der [GetEthiopianMilitaryAcademyName] muss direkt von der Schule in den Krieg. Es ist eine wahre Meisterleistung, diese Schule zu bauen und die Ausbildung eines ersten Kadettenjahrgangs abzuschließen, während man gleichzeitig im Krieg kämpft. \nDies ist der Beginn einer neuen Ära für das [ROOT.GetAdjective]-Militär!"
 BBA_ethiopia_military_and_tech_events.1_peace.desc:0 "Nach dem Krieg haben wir nun die Chance, den Bau unserer Militärakademie abzuschließen. Der erste Kadettenjahrgang kann unserer Nation helfen, zukünftige Kriege zu gewinnen und sicherzustellen, dass wir unsere Erfahrungen aus dem Kampf gegen die Italiener bestmöglich nutzen."

 BBA_ethiopia_military_and_tech_events.1.a:0 "Die Schule wird ihren Fokus auf Angriff beibehalten"
 ETH_ecole_attack_tt:0 "Ändere §Y[GetEthiopianArmySpiritName]§! durch:\n$modifier_army_sub_unit_infantry_attack_factor$: §G+10%§!\n$modifier_army_sub_unit_irregular_infantry_attack_factor$: §G+10%§! "
 BBA_ethiopia_military_and_tech_events.1.b:0 "Die Schule wird uns helfen, eine defensivere Denkweise zu entwickeln"
 ETH_ecole_defense_tt:0 "Ändere §Y[GetEthiopianArmySpiritName]§! durch:\n$MODIFIERS_ARMY_DEFENCE_FACTOR$: §G+5%§!"
 BBA_ethiopia_military_and_tech_events.1.c:0 "Die Schule wird dafür sorgen, dass wir nie unvorbereitet auf den Krieg sind"
 ETH_ecole_learn_tt:0 "Ändere §Y[GetEthiopianArmySpiritName]§! durch:\n$MODIFIER_XP_GAIN_ARMY$: §G+5%§!"

# Anti colonialism 
 BBA_ethiopia_anti_colonialism_events.2.t:0 "[?global.african_supporting_country.GetNameDef] fordert die Anerkennung von [?global.african_revolt_country.GetNameDef]"
 BBA_ethiopia_anti_colonialism_events.2.desc:0 "[?global.african_supporting_country.GetLeader], der Anführer von [?global.african_supporting_country.GetNameDef], hat ein sofortiges Ende des Krieges mit den [?global.african_revolt_country.GetAdjective]-Rebellen gefordert. Die [?global.african_supporting_country.GetAdjective]-Diplomaten ermutigen [ROOT.GetName], die Unabhängigkeit von [?global.african_revolt_country.GetNameDef] anzuerkennen. Sie erklären nicht ausdrücklich, dass [?global.african_supporting_country.GetNameDef] in den Krieg ziehen wird, falls wir uns weigern, aber sie deuten diese Möglichkeit deutlich an."
 BBA_ethiopia_anti_colonialism_events.2.a:0 "Sie haben Recht, wir sollten diesen Kolonialkonflikt jetzt beenden"
 BBA_ethiopia_anti_colonialism_events.2.b:0 "Der Krieg wird enden, wenn [?global.african_revolt_country.GetNameDef] besiegt ist"

 BBA_ethiopia_anti_colonialism_events.3.t:0 "[?global.african_supporting_country.GetAdjective] Mediation erfolgreich!"
 BBA_ethiopia_anti_colonialism_events.3.desc:0 "[?global.african_supporting_country.GetLeader], der Anführer von [?global.african_supporting_country.GetNameDef], hat in unserem Namen erfolgreich mit [?global.african_colonial_country.GetLeader] verhandelt. [?global.african_colonial_country.GetLeader] hat zugestimmt, die Unabhängigkeit von [ROOT.GetAdjective] anzuerkennen und eine Einstellung der Feindseligkeiten zwischen [?global.african_colonial_country.GetNameDef] und [ROOT.GetNameDef] angeordnet. [ROOT.GetNameDefCap] wird [?global.african_supporting_country.GetNameDef] für seine Hilfe in unserem Kampf immer zu Dank verpflichtet sein."
 BBA_ethiopia_anti_colonialism_events.3.a:0 "Endlich Freiheit"

 BBA_ethiopia_anti_colonialism_events.4.t:0 "[FROM.GetNameDefCap] weigert sich, die Unabhängigkeit von [?global.african_revolt_country.GetAdjective] anzuerkennen"
 BBA_ethiopia_anti_colonialism_events.4.desc:1 "Trotz unseres Drucks weigert sich die [?global.african_colonial_country.GetAdjective]-Regierung, [?global.african_revolt_country.GetNameDef] anzuerkennen und die Feindseligkeiten einzustellen. Die [?global.african_colonial_country.GetAdjective] scheint entschlossen, die Unabhängigkeitsbewegung zu zerstören. Weiter kommen wir mit diplomatischen Mitteln allein wohl nicht."
 BBA_ethiopia_anti_colonialism_events.4.a:0 "Wir haben es zumindest versucht"
 BBA_ethiopia_anti_colonialism_events.4.b:0 "Dann müssen wir sie"

 BBA_ethiopia_anti_colonialism_events.5.t:0 "[FROM.GetName] beteiligt sich am Krieg gegen [?global.african_colonial_country.GetName]"
 BBA_ethiopia_anti_colonialism_events.5.desc:1 "Nach gescheiterten Vermittlungsversuchen in unserem Krieg gegen [?global.african_colonial_country.GetNameDef] hat [?global.african_supporting_country.GetNameDef] beschlossen, den Kampf von [ROOT.GetAdjective] aktiv zu unterstützen. Der Botschafter von [?global.african_colonial_country.GetAdjective] in [?global.african_supporting_country.GetName] wurde darüber informiert, dass sich [?global.african_supporting_country.GetNameDef] von nun an im Krieg mit [?global.african_colonial_country.GetName] befindet, bis zu dem Moment, in dem [?global.african_colonial_country.GetNameDef] seine imperialistischen und kolonialen Ambitionen in Afrika und anderswo aufgibt."
 BBA_ethiopia_anti_colonialism_events.5.a:0 "Die Kräfte von [ROOT.GetName] und [?global.african_supporting_country.GetName] stehen vereint!"

 BBA_ethiopia_anti_colonialism_events.6.t:0 "Freiheit für [FROM.GetNameDef]"
 BBA_ethiopia_anti_colonialism_events.6.desc:1 "Nach starkem diplomatischen Druck von [ROOT.GetName], einschließlich direkter Treffen zwischen [ROOT.GetLeader] und [?global.african_colonial_country.GetLeader], entschied sich die Regierung von [?global.african_colonial_country.GetAdjective], nachzugeben und die Unabhängigkeit von [?global.african_revolt_country.GetAdjective] anzuerkennen. \nDank der direkten Intervention von [ROOT.GetAdjective] ist der Krieg um die Unabhängigkeit von [?global.african_revolt_country.GetAdjective] endlich vorbei. [?global.african_revolt_country.GetNameDefCap] ist ein freies Land, und [ROOT.GetLeader] wird in [?global.african_revolt_country.GetNameDef] mit Sicherheit für immer ein Held bleiben."
 BBA_ethiopia_anti_colonialism_events.6.a:0 "Ein weiteres von den Imperialisten befreites Land"

# Industrial and Financial Events
 BBA_ethiopia_industrial_financial_events.2.t:0 "[FROM.GetNameDefCap] Anforderungen Integration"
 BBA_ethiopia_industrial_financial_events.2.desc:0 "Da die Volkswirtschaften von [ROOT.GetName] und [FROM.GetName] eng miteinander verflochten sind und ein Großteil der Industrie in [ROOT.GetName] bereits von [FROM.GetName] kontrolliert wird, fordert [FROM.GetLeader] die Schließung der Grenzstationen zwischen den beiden Ländern. Die Kontrolle der gesamten Außenpolitik soll [FROM.Getname] übertragen werden, um maximalen Schutz, Koordination und Effizienz zu gewährleisten. Dies würde faktisch das Ende der [ROOT.GetAdjective]-Unabhängigkeit bedeuten.\n All dies werde im besten Interesse beider Länder geschehen, versichert [FROM.GetLeader]."
 BBA_ethiopia_industrial_financial_events.2.a:0 "Sie haben kein Recht, das zu tun!"
 BBA_ethiopia_industrial_financial_events.2.b:0 "Solange wir eine gewisse Autonomie bewahren können"
 BBA_ethiopia_industrial_financial_events.2.c:0 "Es ist wirklich das Beste für unsere beiden Länder "

 BBA_ethiopia_industrial_financial_events.3.t:0 "[FROM.GetName] Verweigern Sie die Zusammenarbeit"
 BBA_ethiopia_industrial_financial_events.3.desc:0 "Trotz unserer Bemühungen, die Situation zu erklären, weigert sich [FROM.GetLeader], unseren Forderungen nachzukommen, die Integration unserer Volkswirtschaften auf die nächste Ebene zu heben. [FROM.GetLeader] behauptet, die Unabhängigkeit von [FROM.GetName] dürfe nicht befleckt werden und könne niemals Gegenstand irgendeiner Diskussion sein."
 BBA_ethiopia_industrial_financial_events.3.a:0 "Wir müssen möglicherweise Gewalt anwenden, um unsere Interessen zu schützen"

 BBA_ethiopia_industrial_financial_events.4.t:0 "[FROM.GetName] möchte teilweise Kontrolle behalten"
 BBA_ethiopia_industrial_financial_events.4.desc:0 "[FROM.GetLeader] hat die Notwendigkeit erkannt, unsere Zusammenarbeit zu vertiefen und unsere Außen- und Finanzpolitik noch stärker als heute zu koordinieren. [FROM.GetLeader.GetSheHe] möchte jedoch, dass [FROM.GetNAme] innerhalb der neuen Föderation ein gewisses Maß an Autonomie behält."
 BBA_ethiopia_industrial_financial_events.4.a:0 "Dies kann sicherlich untergebracht werden"

 BBA_ethiopia_industrial_financial_events.5.t:0 "[FROM.GetLeader] Stimmt zu"
 BBA_ethiopia_industrial_financial_events.5.desc:0 "[FROM.GetLeader] hat das Dokument unterzeichnet, das [ROOT.GetName] und [FROM.GetName] vereint. Die Wirtschaftspolitik wird angeglichen, die Außenministerien werden zu einem einzigen zusammengelegt. Die Justizsysteme werden zusammengelegt, um eine umfassende Zusammenarbeit zu erleichtern.\n[FROM.GetNameDefCap] wird ab heute ein integraler Bestandteil von [ROOT.GetName] sein."
 BBA_ethiopia_industrial_financial_events.5.a:0 "Dies ist zum Wohle aller"

#Fascist Ethiopia
 BBA_ethiopia_fascist_events.01.t:0 "Eine Chance zur Veränderung"
 BBA_ethiopia_fascist_events.01.desc:0 "$ETH_haile_selassie$s konfrontativer Ansatz gegenüber den Italienern und sein Vertrauen in den Völkerbund haben zu nichts geführt. Es ist allen klar, dass dies [ROOT.GetName] zum Verhängnis wird.\n\n Der Krieg bietet eine Chance für Veränderungen, er macht einen Kurswechsel sogar notwendig. Der erste Schritt muss darin bestehen, einen Botschafter zu den Italienern zu schicken, um einen für sie akzeptablen Friedensvertrag auszuhandeln."
 BBA_ethiopia_fascist_events.01.a:0 "$ETH_haile_selassie_gugsa$ ist die offensichtliche Wahl"
 ETH_start_civil_war:0 "§Y$ETH_haile_selassie_gugsa$§! wird einen §YBürgerkrieg§! gegen §Y$ETH_haile_selassie$§! beginnen, wenn der Fokus §Y$ETH_declare_for_italy$§! abgeschlossen ist."
 ETH_cede_states_tt:0 "\nWenn der Krieg vorbei ist, erhält §Y[ITA.GetNameWithFlag]§! die folgenden Zustände:"
 ETH_cede_south_tt:0 "§Y [835.GetName]\n [836.GetName]\n [837.GetName]§!"
 ETH_ethiopia_italian_puppet_tt:0 "\n§Y[ETH.GetNameDef]§! wird zum Subjekt von §Y[ITA.GetNameDef]§!"
 ETH_italy_refuse_cooperation:0 "Der Fokus §Y$ETH_reach_out_to_the_italians$§! wird abgebrochen, der Fokus §Y$ETH_rally_around_the_emperor$§! wird automatisch vervollständigt. "

 BBA_ethiopia_fascist_events.01.b:0 "Senden Sie $ETH_hailu_tekle_haymanot$ von $gojjam$"
 ETH_start_civil_war_gojjam:0 "§Y$ETH_hailu_tekle_haymanot$§! von $gojjam$ wird einen §YBürgerkrieg§! gegen §Y$ETH_haile_selassie$§! beginnen, wenn der Fokus §Y$ETH_declare_for_italy$§! abgeschlossen ist."
 ETH_gojjam_italian_puppet_tt:0 "\n§Y$gojjam$§! wird zum Subjekt von §Y[ITA.GetNameWithFlag]§!"
 ETH_cede_south_west_tt:0 "§Y [838.GetName]\n [836.GetName]\n [837.GetName]§!"
 BBA_ethiopia_fascist_events.01.c:0 "Vielleicht hat $ETH_abba_jofir$ die besten Erfolgschancen"
 ETH_start_civil_war_jimma:0 "§Y$ETH_abba_jofir$§! von $jimma$ wird einen §YBürgerkrieg§! gegen §Y$ETH_haile_selassie$§! beginnen, wenn der Fokus §Y$ETH_declare_for_italy$§! abgeschlossen ist."
 ETH_cede_north_tt:0 "§Y [841.GetName]\n [842.GetName]\n [843.GetName]§!"
 ETH_jimma_italian_puppet_tt:0 "\n§Y$jimma$§! wird zum Subjekt von §Y[ITA.GetNameWithFlag]§!"

 BBA_ethiopia_fascist_events.02.t:0 "Pretender sucht Frieden"
 BBA_ethiopia_fascist_events.02.desc:0 "Einer der [ETH.GetAdjective] Adligen, $ETH_haile_selassie_gugsa$, der ebenfalls Anspruch auf den Thron erhebt, hat sich an das [ROOT.GetAdjective] Oberkommando in [ETH.GetName] gewandt. Der Adlige bietet Hilfe gegen [ETH.GetLeader] an, im Gegenzug für die Kontrolle über Teile des Landes nach dem Krieg. $ETH_haile_selassie_gugsa$ wird natürlich $ITA_vittorio_emanuele_iii$ Treue schwören und an seiner Stelle in [ETH.GetName] regieren."
 BBA_ethiopia_fascist_events.02.a:0 "Das ist eigentlich ziemlich vorteilhaft"
 BBA_ethiopia_fascist_events.02.b:0 "Nein, wir brauchen keine Hilfe, danke"

 BBA_ethiopia_fascist_events.03.t:0 "Ein autonomes $gojjam$?"
 BBA_ethiopia_fascist_events.03.desc:0 "Ein Vertreter des inhaftierten Prätendenten von $gojjam$, $ETH_hailu_tekle_haymanot$, bietet [ROOT.GetName] Unterstützung bei der Eroberung von [ETH.GetName] an, im Gegenzug für die Wiedereinsetzung von $ETH_hailu_tekle_haymanot$ als Anführer eines halbautonomen $gojjam$. Ein bewaffneter Aufstand im Norden würde die Streitkräfte von [ETH.GetAdjective] mit Sicherheit lähmen und einen schnellen Sieg bringen."
 BBA_ethiopia_fascist_events.03.a:0 "Das ist tatsächlich ziemlich vorteilhaft"
 BBA_ethiopia_fascist_events.03.b:0 "Nein, wir brauchen keine Hilfe, danke"

 BBA_ethiopia_fascist_events.04.t:0 "Der abgesetzte Anführer von $jimma$ bietet Hilfe an"
 BBA_ethiopia_fascist_events.04.desc:0 "$ETH_abba_jofir$, Sohn des letzten Sultans von $jimma$, hat [ROOT.getName] eine Zusammenarbeit angeboten, im Gegenzug für [ROOT.GetAdjective] die Anerkennung von $ETH_abba_jofir$s Status als Herrscher von $jimma$. $jimma$ wäre selbstverständlich Teil des [ROOT.GetAdjective]-Imperiums, und $ETH_abba_jofir$ würde der [ROOT.GetAdjective]-Krone Treue schwören, sollte [ROOT.getName] das Angebot annehmen."
 BBA_ethiopia_fascist_events.04.a:0 "Ein Marionetten-Sultan könnte uns gute Dienste leisten"
 BBA_ethiopia_fascist_events.04.b:0 "Nein, wir brauchen keine Hilfe, danke"

 BBA_ethiopia_fascist_events.05.t:0 "[FROM.GetName] nimmt unser Angebot an"
 BBA_ethiopia_fascist_events.05.desc:0 "Die Mission zum [FROM.GetAdjective]-Hauptquartier war ein großer Erfolg. [ITA.GetLeader] hat den Plan für einen Aufstand gebilligt und das Überleben eines halbautonomen Staates nach dem Krieg akzeptiert. Wir müssen uns beeilen, den Aufstand zu starten, bevor sie ihre Meinung ändern."
 BBA_ethiopia_fascist_events.05.a:0 "Der Beginn einer neuen Ära"

 BBA_ethiopia_fascist_events.06.t:0 "Italiener verweigern Kooperation"
 BBA_ethiopia_fascist_events.06.desc:0 "Leider scheint [FROM.GetLeader] fest entschlossen, ganz Äthiopien zu erobern. [FROM.GetNameDefCap] hat sich strikt geweigert, über einen Friedensvertrag zu verhandeln, und damit alle Versuche einer friedlichen Lösung des Konflikts zunichte gemacht. Unsere einzige Hoffnung besteht nun darin, den Kaiser zu unterstützen und einen militärischen Sieg zu erringen."
 BBA_ethiopia_fascist_events.06.a:0 "Am bedauerlichsten"

 BBA_ethiopia_fascist_events.07.t:0 "Der äthiopische Bürgerkrieg"
 BBA_ethiopia_fascist_events.07.desc:0 "[ROOT.GetEthiopianCollaboratorName] hat sich offen für die Italiener und gegen den Kaiser ausgesprochen und erklärt, dies sei die Geburt eines neuen [ROOT.GetName]. Trotz seiner verzweifelten Lage weigert sich $ETH_haile_selassie$, seine Niederlage zu akzeptieren. Der Kampf hat bereits begonnen, und obwohl die meisten der alten Garde noch immer auf der Seite des Kaisers stehen, kann der Kampf höchstwahrscheinlich nur in eine Richtung gehen."
 BBA_ethiopia_fascist_events.07.a:0 "Vorwärts zum Sieg"

 BBA_ethiopia_fascist_events.50.t:0 "[ETH.GetAdjective] Streitkräfte besetzen [ROOT.GetAdjective] Somaliland"
 BBA_ethiopia_fascist_events.50.desc:0 "Da wir uns auf Angelegenheiten in unserer Nähe konzentrieren, hat die [ETH.GetAdjective]-Regierung die Situation ausgenutzt und Somaliland für sich beansprucht. Abgeschnitten und mit wenig Hoffnung auf Widerstand haben die [Root.GetAdjective]-Behörden in der Region einfach zugestimmt und das Gebiet übergeben. Wir müssen entscheiden, ob wir diese Demütigung formell anerkennen oder uns dazu entschließen, unser rechtmäßiges Territorium zurückzuerobern."
 BBA_ethiopia_fascist_events.50.a:0 "Wir müssen die Zähne zusammenbeißen und den Verlust akzeptieren."
 BBA_ethiopia_fascist_events.50.b:0 "Eine solche Demütigung lassen wir uns nicht gefallen!"
 BBA_ethiopia_fascist_events.51.t:0 "[FROM.GetName] akzeptiert [ETH.GetAdjective] die Kontrolle über Somaliland"
 BBA_ethiopia_fascist_events.51.desc:0 "Der Rumpfstaat [FROM.GetName] hat unsere Kontrolle über das ehemalige Gebiet von [FROM.GetAdjective] Somaliland formell anerkannt. Da es kaum Möglichkeiten gibt, das Gebiet zurückzuerobern, scheint er sich lieber auf Angelegenheiten in der näheren Umgebung zu konzentrieren, als sich in einen Konflikt mit unseren heldenhaften Streitkräften zu verwickeln."
 BBA_ethiopia_fascist_events.51.a:0 "[ETH.GetName] wird stärker!"
 BBA_ethiopia_fascist_events.52.t:0 "[FROM.GetName] lehnt [ETH.GetAdjective] die Kontrolle über Somaliland ab"
 BBA_ethiopia_fascist_events.52.desc:0 "In einer überraschenden Wendung der Ereignisse hat der Rumpfstaat [FROM.GetName] unsere Besitzansprüche auf das ehemalige Gebiet von [FROM.GetAdjective] Somaliland zurückgewiesen. Obwohl er kaum über die Mittel verfügt, das Gebiet zurückzuerobern, scheint er entschlossen zu sein, seine verbliebenen Soldaten in den Kampf gegen unsere heldenhaften Streitkräfte zu schicken."
 BBA_ethiopia_fascist_events.52.a:0 "Sie haben kürzlich einen Krieg verloren und stehen kurz davor, einen weiteren zu verlieren."

 BBA_ethiopia_fascist_events.53.t:0 "[ITA.GetAdjective] Ausrüstung anfordern"
 BBA_ethiopia_fascist_events.53.desc:0 "Obwohl wir große Fortschritte bei der Reform unserer Wirtschaft und der Stärkung unseres Militärs machen, könnten wir bei diesen Aufgaben noch etwas Unterstützung brauchen. Aufgrund unserer sich vertiefenden Beziehungen zu den [ITA.GetAdjective]s könnten sie bereit sein, uns einen Teil ihrer überschüssigen Ausrüstung zu schicken. Wir müssen lediglich entscheiden, was wir anfordern."
 BBA_ethiopia_fascist_events.53.a:0 "Jeder Soldat braucht ein Gewehr."
 BBA_ethiopia_fascist_events.53.b:0 "Artillerie wird unsere Feinde abschrecken."

 BBA_ethiopia_fascist_events.54.t:0 "[FROM.GetName] fordert militärische Ausrüstung an"
 BBA_ethiopia_fascist_events.54.desc:0 "Wir haben von [FROM.GetName] eine Anfrage nach militärischer Ausrüstung erhalten. Dies würde dem [FROM.GetAdjective]-Militär bei der Modernisierung erheblich helfen. Es würde uns auch helfen, einige unserer älteren, überschüssigen Geräte loszuwerden."
 BBA_ethiopia_fascist_events.54.a:0 "Sicherlich können wir einige alte Geräte entbehren."
 BBA_ethiopia_fascist_events.54.b:0 "Nein, wir wollen nicht, dass [FROM.GetName] stärker wird."

 BBA_ethiopia_fascist_events.55.t:0 "[ITA.GetName] weigert sich, militärische Ausrüstung zu schicken"
 BBA_ethiopia_fascist_events.55.desc:0 "In einer unnötig unverblümten Antwort lehnte die [ITA.GetAdjective]-Regierung unsere Anfrage nach militärischer Ausrüstung ab. Die Gründe für diese Entscheidung sind noch unklar. Wir müssen uns einfach auf unsere eigene Industrie verlassen, um den Modernisierungsplan fortzusetzen."
 BBA_ethiopia_fascist_events.55.a:0 "Wir wussten, dass man ihnen nicht trauen konnte."

 BBA_ethiopia_fascist_events.56.t:0 "[ITA.GetName] stimmt der Lieferung militärischer Ausrüstung zu"
 BBA_ethiopia_fascist_events.56.desc:0 "Die [ITA.GetAdjective]-Regierung hat unserem Antrag auf militärische Ausrüstung stattgegeben. Obwohl es sich dabei sicherlich nicht um die beste Ausrüstung handelt, wird dies unsere Modernisierungspläne sicherlich beschleunigen."
 BBA_ethiopia_fascist_events.56.a:0 "Wir haben nie an ihnen gezweifelt."

 BBA_ethiopia_fascist_events.10.t:0 "Gefangene Feinde"
 BBA_ethiopia_fascist_events.10.desc:0 "Mit der Kapitulation der feindlichen Streitkräfte fielen uns mehrere hochrangige Offiziere in die Hände. Sie werden vorerst inhaftiert, aber hoffentlich können wir einige von ihnen später davon überzeugen, sich unserer Sache anzuschließen."
 BBA_ethiopia_fascist_events.10.a:0 "Gut"
 captured_ethiopian_commanders_tt:0 "$ETH_seyoum_mengesha$, $ETH_ayalew_birru$ und $ETH_ras_kassa$ werden eingesperrt"
 captured_ethiopian_commanders_jimma_tt:0 "$ETH_seyoum_mengesha$, $ETH_ayalew_birru$, $ETH_balcho_safo$, $ETH_tadesse_birru$ und $ETH_ras_kassa$ werden eingesperrt"

 BBA_ethiopia_fascist_events.20.t:0 "[FROM.GetNameDefCap] erklärt Unabhängigkeit"
 BBA_ethiopia_fascist_events.20.desc:0 "[FROM.GetLeader] hat erklärt, dass [FROM.GetNameDef] die Oberherrschaft von [ROOT.GetAdjective] nicht länger akzeptieren wird. [FROM.GetNameDefCap] möchte nach Möglichkeit gute Beziehungen zu [ROOT.GetNameDef] aufrechterhalten, erklärt jedoch, dass sie bereit sind, notfalls zu den Waffen zu greifen und für ihre Unabhängigkeit zu kämpfen."
 BBA_ethiopia_fascist_events.20.a:0 "Ihnen muss eine Lektion erteilt werden"
 BBA_ethiopia_fascist_events.20.b:0 "Wir haben wichtigere Dinge, über die wir nachdenken müssen"

 BBA_ethiopia_fascist_events.21.t:0 "[ETH.GetAdjective] Ehre wiederhergestellt"
 BBA_ethiopia_fascist_events.21.desc:0 "In einer ziemlich überraschenden Wendung der Ereignisse akzeptierte [FROM.GetLeader] die [ROOT.GetAdjective] Unabhängigkeitserklärung. Von diesem Zeitpunkt an hat [FROM.GetNameDef] keinen Einfluss mehr auf die [ROOT.GetAdjective] Politik, weder intern noch extern. Eine riesige Menschenmenge, die die Führung von [ROOT.GetLeader] feierte, versammelte sich auf dem Hauptplatz von [ROOT.Capital.GetCapitalVictoryPointName]."
 BBA_ethiopia_fascist_events.21.a:0 "Das Joch ist weg"

 BBA_ethiopia_fascist_events.22.t:0 "Der Kampf geht weiter"
 BBA_ethiopia_fascist_events.22.desc:0 "Wie erwartet lehnte [FROM.getLeader] den Antrag auf formelle Unabhängigkeit von [ROOT.GetLeader] ab. Da dies eine erwartete Wendung der Ereignisse war, sichern die [ROOT.GetAdjective] Streitkräfte bereits Schlüsselpositionen im Land. Die Nation ist dieses Mal viel besser vorbereitet."
 BBA_ethiopia_fascist_events.22.a:0 "Wir werden unsere Freiheit gewinnen"

 BBA_ethiopia_fascist_events.23.t:0 "Widerstandskämpfer"
 BBA_ethiopia_fascist_events.23.desc:0 "Hinter den feindlichen Linien haben sich organisierte Widerstandskämpfer gebildet. Diese irregulären Truppen kämpfen mit uns gegen ihre Unterdrücker. Ihre Kampfkraft mag nicht die höchste sein, doch sie werden mit Sicherheit Verwirrung und Unruhe in den feindlichen Streitkräften stiften."
 BBA_ethiopia_fascist_events.23.a:0 "Eine höchst willkommene Hilfe"

 BBA_ethiopia_fascist_events.57.t:0 "[FROM.GetName] fordert Waffen-Outsourcing-Vereinbarung an"
 BBA_ethiopia_fascist_events.57.desc:0 "[FROM.GetName] hat eine Vereinbarung zur Auslagerung von Rüstungsgütern beantragt, die [ITA.GetAdjective] Unternehmen die Errichtung von Fabriken zur Produktion militärischer Ausrüstung in ihrem Land ermöglicht. Die Unternehmensführungen der ausgewählten Unternehmen wären für diese Expansionsmöglichkeit zweifellos dankbar. Sollte [FROM.GetName] jedoch jemals rebellieren, werden wir gegen einen Feind kämpfen, der viele unserer Schwächen kennt."
 BBA_ethiopia_fascist_events.57.a:0 "Durch die Stärkung von [FROM.GetName] werden unsere Kräfte in der Region freigesetzt."
 BBA_ethiopia_fascist_events.57.b:0 "Wir können nicht riskieren, dass unsere Entwürfe in die Hände des Feindes fallen."

 BBA_ethiopia_fascist_events.58.t:0 "[ITA.GetName] akzeptiert Outsourcing-Vereinbarung"
 BBA_ethiopia_fascist_events.58.desc:0 "Unseren Diplomaten ist es hoch anzurechnen, dass [ITA.GetLeader] [ITA.GetAdjective]-Unternehmen die Erlaubnis erteilt hat, in unserem Land Fabriken zu errichten. Dies wird unsere Fähigkeit, unsere eigene militärische Ausrüstung zu erforschen und herzustellen, deutlich verbessern."
 BBA_ethiopia_fascist_events.58.a:0 "Ein großartiger Tag für [ETH.GetName]"

 BBA_ethiopia_fascist_events.59.t:0 "[ITA.GetName] lehnt Outsourcing-Vereinbarung ab"
 BBA_ethiopia_fascist_events.59.desc:0 "Unseren verachtenswerten Diplomaten ist es nicht gelungen, [ITA.GetLeader] von der Notwendigkeit unseres Waffen-Outsourcing-Abkommens zu überzeugen. Dies ist ein verheerender Schlag für unsere militärische und industrielle Entwicklung."
 BBA_ethiopia_fascist_events.59.a:0 "Eine verpasste Gelegenheit. "

 BBA_ethiopia_fascist_events.60.t:0 "Auslagerung der Waffenproduktion"
 BBA_ethiopia_fascist_events.60.desc:0 "Die [ITA.GetAdjective]s werden nicht bereit sein, alle ihre Industriegeheimnisse mit uns zu teilen, aus Angst, dass sie in die Hände des Feindes fallen. Deshalb müssen wir sorgfältig darüber nachdenken, welcher Aspekt unseres Militärs am meisten von der Auslagerung der Produktion an [ITA.GetAdjective]-Designer profitieren könnte."
 BBA_ethiopia_fascist_events.60.a:0 "Vor allem muss die Armee modernisiert werden."
 BBA_ethiopia_fascist_events.60.b:0 "Die Luftwaffe wird in zukünftigen Kriegen eine größere Bedeutung haben."

 BBA_ethiopia_fascist_events.61.t:0 "[FROM.GetName] Fordert Waffen an, um die [ITA.GetAdjective]-Regel zu stürzen"
 BBA_ethiopia_fascist_events.61.desc:0 "[ETH.GetAdjective] Diplomaten haben sich mit einer geheimen Anfrage nach Waffenlieferungen an uns gewandt. Offenbar steht es nicht gut um das kürzlich von [ITA.GetName] eroberte Gebiet, und die lokale Verwaltung sucht nach ausländischer Hilfe, um ihre Oberherren zu stürzen. Selbst ein Scheitern des Aufstands würde das [ITA.GetAdjective] Militär zweifellos ablenken und schwächen. Sollte jedoch herauskommen, dass wir den Aufstand unterstützt haben, könnte es Konsequenzen haben."
 BBA_ethiopia_fascist_events.61.a:0 "Das sollte die [ITA.GetAdjective]s beschäftigen."
 BBA_ethiopia_fascist_events.61.b:0 "Wir werden einem potenziellen Feind nicht helfen."

 BBA_ethiopia_fascist_events.62.t:0 "[FROM.GetName] stimmt der Waffenanfrage zu"
 BBA_ethiopia_fascist_events.62.desc:0 "[FROM.GetAdjective] Diplomaten haben signalisiert, dass sie bereit sind, Waffen an uns zu liefern, während wir uns auf den Sturz der [ITA.GetAdjective] Streitkräfte vorbereiten. Wir wurden natürlich angewiesen, jegliche Beteiligung ihrerseits vollständig abzustreiten, sollten [ITA.GetAdjective] Streitkräfte die Waffen entdecken."
 BBA_ethiopia_fascist_events.62.a:0 "Der Sieg ist in Sicht."

 BBA_ethiopia_fascist_events.63.t:0 "[FROM.GetName] lehnt Waffenanfrage ab"
 BBA_ethiopia_fascist_events.63.desc:0 "Diplomaten haben unsere Versuche, geheime Waffenlieferungen zu beschaffen, abgelehnt. Sie scheinen sich nicht sicher zu sein, wie vertrauenswürdig wir sind, solange wir noch unter Einfluss stehen. Möglicherweise zögern sie auch, das Regime in diesen turbulenten Zeiten zu verärgern."
 BBA_ethiopia_fascist_events.63.a:0 "Wie kurzsichtig von ihnen."

 BBA_ethiopia_fascist_events.64.t:0 "[FROM.GetName] fordert die Kontrolle über [550.GetName] an"
 BBA_ethiopia_fascist_events.64.desc:0 "[ETH.GetLeader] hat die Kontrolle über [550.GetName] als Belohnung oder Entschädigung, je nach Standpunkt, für seine anhaltende Treue zu [ITA.GetName] gefordert. [ETH.GetLeader] war entscheidend daran beteiligt, die Pattsituation bei der Invasion Äthiopiens zu beenden, und dies würde einen großen Beitrag zur Aufrechterhaltung guter Beziehungen leisten. Das Volk von [ITA.GetAdjective] wird jedoch möglicherweise nicht so viel Verständnis dafür haben, warum wir Territorium hergeben."
 BBA_ethiopia_fascist_events.64.a:0 "Wir werden ihre Treue belohnen. "
 BBA_ethiopia_fascist_events.64.b:0 "Sie sind nicht in der Position, Forderungen zu stellen."

 BBA_ethiopia_fascist_events.65.t:0 "[FROM.GetName] fordert die Kontrolle über [559.GetName] und [844.GetName] an"
 BBA_ethiopia_fascist_events.65.desc:0 "[ETH.GetLeader] hat die Kontrolle über [559.GetName] und [844.GetName] als Belohnung oder Entschädigung, je nach Standpunkt, für seine anhaltende Treue zu [ITA.GetName] gefordert. [ETH.GetLeader] war entscheidend daran beteiligt, die Pattsituation bei der Invasion Äthiopiens zu beenden, und dies würde einen großen Beitrag zur Aufrechterhaltung guter Beziehungen leisten. Das Volk von [ITA.GetAdjective] wird jedoch möglicherweise nicht so viel Verständnis dafür haben, warum wir Territorium hergeben."
 BBA_ethiopia_fascist_events.65.a:0 "Wir werden ihre Treue belohnen. "
 BBA_ethiopia_fascist_events.65.b:0 "Sie sind nicht in der Position, Forderungen zu stellen."

 BBA_ethiopia_fascist_events.66.t:0 "[ITA.GetName] Stimme der territorialen Entschädigung zu"
 BBA_ethiopia_fascist_events.66.desc:0 "[ITA.GetName] hat unsere Anfrage zur Kontrolle der gewünschten Gebiete großzügig angenommen. Dies markiert den Beginn eines neuen Kapitels in den Beziehungen zwischen Italien und [ETH.GetAdjective]."
 BBA_ethiopia_fascist_events.66.a:0 "Die Zukunft gehört dem [ETH.GetAdjective] Volk."

 BBA_ethiopia_fascist_events.67.t:0 "[ITA.GetName] lehnt territoriale Entschädigung ab"
 BBA_ethiopia_fascist_events.67.desc:0 "[ITA.GetAdjective] Diplomaten reagierten empört auf unsere Forderung nach territorialer Entschädigung. Sie argumentieren, dass es für das [ITA.GetAdjective] Volk unerträglich wäre, irgendjemandem Territorium zu überlassen, das mit seinem Blut bezahlt wurde, geschweige denn einem ehemaligen Feind."
 BBA_ethiopia_fascist_events.67.a:0 "Sie stellen unsere Loyalität auf die Probe ..."

 BBA_ethiopia_fascist_events.68.t:0 " [ITA.GetAdjective] Depot durchsucht"
 BBA_ethiopia_fascist_events.68.desc:0 "Gestern Abend wurde ein Waffenlager erfolgreich durchsucht und geplündert. Die italienischen Behörden werfen unserer Regierung trotz dürftiger Beweise heftig vor, den Vorfall inszeniert zu haben. Allerdings könnten sie angesichts der blitzblanken, neuen Gewehre unserer Soldaten misstrauisch werden …"
 BBA_ethiopia_fascist_events.68.a:0 "So eine ungeheuerliche Anschuldigung."

 BBA_ethiopia_fascist_events.69.t:0 "[FROM.GetName] fordert Militärberater an"
 BBA_ethiopia_fascist_events.69.desc:0 "Die Führung von [ETH.GetName] hat die Schwäche ihres Militärs erkannt und bittet daher um unsere Unterstützung. Sie sind neugierig, ob wir einigen unserer Offiziere erlauben würden, ihrem Generalstab beizutreten und sie im optimalen Einsatz der Mittel der modernen Kriegsführung zu beraten."
 BBA_ethiopia_fascist_events.69.a:0 "Ein stärkeres [FROM.GetName] würde es uns ermöglichen, uns auf Regionen näher an unserem Zuhause zu konzentrieren."
 BBA_ethiopia_fascist_events.69.b:0 "Unsere Beamten werden anderswo gebraucht."
 ETH_send_ita_generals_tt:0 "\n§Y$ITA_giuseppe_tellera$§!, §Y$ITA_mario_berti$§! und §Y$ITA_alessandro_pirzio_biroli$§! wird nach Äthiopien verlegt."

 BBA_ethiopia_fascist_events.70.t:0 "[FROM.GetName] Stimme der Entsendung von Beamten zu"
 BBA_ethiopia_fascist_events.70.desc:0 "[FROM.GetName] hat zugestimmt, einige seiner Offiziere auf absehbare Zeit in unseren Generalstab aufzunehmen. Hoffentlich lernen wir, wie wir unsere neue Ausrüstung auf dem modernen Schlachtfeld optimal einsetzen können."
 BBA_ethiopia_fascist_events.70.a:0 "Exzellent."

 BBA_ethiopia_fascist_events.71.t:0 "[FROM.GetName] weigert sich, Beamte zu schicken"
 BBA_ethiopia_fascist_events.71.desc:0 "[FROM.GetName] hat sich geweigert, seinen Offizieren die Aufnahme in unseren Generalstab zu ermöglichen. Uns wurde mitgeteilt, dass sie derzeit anderweitig benötigt werden. Als Zeichen der Unterstützung wurde uns jedoch eine zusätzliche Lieferung Infanterieausrüstung zugesandt."
 BBA_ethiopia_fascist_events.71.a:0 "Es ist besser als nichts."



#Communist Ethiopia
 BBA_ethiopia_communist_events.01.t:0 "[ETH.GetAdjective] Kommunisten fordern Hilfe"
 BBA_ethiopia_communist_events.01.desc:0 "Die kommunistische Führung von [ETH.GetName] hat uns um Unterstützung im Kampf gegen die italienischen Faschisten gebeten. Das neue Regime in [ETH.Capital.GetCapitalVictoryPointName] festigt seine Macht und könnte bereit sein, sich unseren außenpolitischen Ambitionen anzuschließen, wenn wir es unterstützen. Wir riskieren jedoch eine Eskalation des Krieges und werden [ITA.GetName] damit sicherlich verärgern."
 BBA_ethiopia_communist_events.01.a:0 "Wir werden unsere kommunistischen Mitbürger in ihrem Kampf unterstützen."
 BBA_ethiopia_communist_events.01.b:0 "Wir haben kein Interesse an diesen kolonialen Verstrickungen in Afrika."
 BBA_ethiopia_communist_events.02.t:0 "[SOV.GetName] lehnt Hilferuf ab"
 BBA_ethiopia_communist_events.02.desc:0 "Trotz unseres verzweifelten Hilferufs haben [SOV.GetNameDef] uns den Rücken gekehrt. Obwohl dies ein Rückschlag ist, werden wir den Kräften des Faschismus weiterhin Widerstand leisten. Wir sollten uns nun darauf konzentrieren, die Unterstützung der breiteren antifaschistischen Netzwerke weltweit zu gewinnen."
 BBA_ethiopia_communist_events.02.a:0 "So viel zur Klassensolidarität."
 BBA_ethiopia_communist_events.03.t:0 "[SOV.GetName] Sendet Hilfe an [ETH.GetName]"
 BBA_ethiopia_communist_events.03.desc:0 "In den letzten Tagen gab es beunruhigende Berichte über [ETH.GetAdjective]-Truppen, die Russisch sprechen und [SOV.GetAdjective]-Waffen einsetzen. Wir können nur vermuten, dass die [SOV.GetName] „Freiwillige“ in den Kampf für [ETH.GetLeader] schicken, in der Hoffnung, in Afrika an Einfluss zu gewinnen und die Unterstützung für [ITA.GetLeader]s Regierung in [ITA.GetName] zu schwächen."
 BBA_ethiopia_communist_events.03.a:0 "Sie werden für diesen Akt der Aggression leiden."
 BBA_ethiopia_communist_events.04.t:0 "[SOV.GetName] erklärt sich bereit, uns zu helfen"
 BBA_ethiopia_communist_events.04.desc:0 "[SOV.GetName] hat sich bereit erklärt, uns in den kommenden Monaten materielle Hilfe zukommen zu lassen und „Freiwilligen“ des [SOV.GetAdjective]-Militärs zu erlauben, an unserer Seite im Kampf gegen [ITA.GetName] zu kämpfen. Dies wird sicherlich den Ausschlag zu unseren Gunsten geben, allerdings ist unklar, wie die [ITA.GetAdjective] auf die gegen sie kämpfenden [SOV.GetAdjective]-Truppen reagieren werden."
 BBA_ethiopia_communist_events.04.a:0 "Gemeinsam werden wir den Faschismus in Afrika besiegen."
 BBA_ethiopia_communist_events.05.t:0 "Putsch gegen [ROOT.GetLeader]"
 BBA_ethiopia_communist_events.05.desc:0 "Heute haben Angehörige des Militärs und der antifaschistischen Organisation „Schwarze Löwen“ einen Putsch gegen die Regierung von [ROOT.GetLeader] inszeniert. Der Kaiser sollte die Truppen inspizieren, als sich eine Gruppe verärgerter Soldaten gegen ihn und ihre Offiziere wandte und sie verhaftete. \n\nIn [ROOT.Capital.GetCapitalVictoryPointName] eroberten die Schwarzen Löwen unterdessen die wichtigsten Infrastruktureinrichtungen der Stadt, darunter die Residenz des Kaisers. Viele loyale Militär- und Polizeimitglieder wurden bei kleineren Scharmützeln getötet, doch was von [ETH.GetName] übrig geblieben ist, steht nun unter der Kontrolle einer provisorischen Regierung. Die Mehrheit der Bevölkerung, erschöpft vom Krieg mit [ITA.GetName], hat die Autorität der neuen Regierung einfach akzeptiert. Die erste Entscheidung der neuen Regierung ist nun, über das Schicksal von [ROOT.GetLeader] zu entscheiden."
 BBA_ethiopia_communist_events.05.a:0 "Wir können es uns nicht leisten, die Unterstützung des Volkes zu verlieren. Schicken Sie ihn ins Exil."
 BBA_ethiopia_communist_events.05.b:0 "Alle Feinde des Volkes müssen sich für ihre Verbrechen verantworten. Sperrt ihn ein."
 BBA_ethiopia_communist_events.06.t:0 "Die provisorische Regierung wird aufgelöst"
 BBA_ethiopia_communist_events.06.desc:0 "Von [SOV.GetName] unterstützte Militäroffiziere haben die provisorische [ETH.GetAdjective] Regierung aufgelöst. Die Offiziere behaupten, sie hätten vom [SOV.GetAdjective] Geheimdienst Beweise dafür erhalten, dass die von [ROOT.GetLeader] geführte Regierung das Volk verraten habe. Den Beweisen zufolge verhandelten Regierungsmitglieder darüber, den [ITA.GetAdjective]-Truppen im Austausch gegen enorme persönliche Reichtümer die vollständige Besetzung des Landes zu gestatten. Nach Schießereien mit den Schwarzen Löwen gelten die ehemaligen Mitglieder der provisorischen Regierung als tot oder inhaftiert. \n\nDas Militär hat nun die Führung des Landes übernommen, um die Ordnung wiederherzustellen und [ROOT.GetLeader]s Mitverschwörer auszuschalten. Es ist noch unklar, wie dauerhaft der neu gebildete Militärverwaltungsrat sein wird."
 BBA_ethiopia_communist_events.06.indy_desc:0 "Militäroffiziere haben die provisorische [ETH.GetAdjective]-Regierung aufgelöst. Die Offiziere behaupten, sie hätten von den Geheimdiensten Beweise dafür erhalten, dass die von [ROOT.GetLeader] geführte Regierung das Volk verraten habe. Den Beweisen zufolge verhandelten Regierungsmitglieder darüber, den [ITA.GetAdjective]-Truppen im Austausch gegen enorme persönliche Reichtümer die vollständige Besetzung des Landes zu gestatten. Nach Schießereien mit den Schwarzen Löwen sind die ehemaligen Mitglieder der provisorischen Regierung vermutlich tot oder inhaftiert. \n\nDas Militär hat nun die Führung des Landes übernommen, um die Ordnung wiederherzustellen und [ROOT.GetLeader]s Mitverschwörer auszuschalten."
 BBA_ethiopia_communist_events.06.a:0 "Die Verräter bekamen, was sie verdienten."
 BBA_ethiopia_communist_events.07.t:0 "[SOV.GetNameDefCap] fordert ein Ende des Krieges mit [ETH.GetName]"
 BBA_ethiopia_communist_events.07.desc:0 "[SOV.GetNameDefCap] haben ein Ende der Feindseligkeiten zwischen uns und den [ETH.GetAdjective]s gefordert. Die [SOV.GetAdjective]s haben das kommunistische Regime in [ETH.Capital.GetCapitalVictoryPointName] massiv unterstützt und betrachten es nun als Teil ihres Einflussbereichs. Die Sowjets drohen sogar, militärisch in den Konflikt einzugreifen. Wir riskieren eine Demütigung im eigenen Land, wenn wir den sowjetischen Forderungen nachkommen. Wir riskieren jedoch einen viel größeren Konflikt, wenn wir sie ablehnen."
 BBA_ethiopia_communist_events.07.a:0 "Wir werden nicht mit Kommunisten verhandeln."
 BBA_ethiopia_communist_events.07.b:0 "Wir können derzeit keinen größeren Konflikt riskieren."
 BBA_ethiopia_communist_events.08.t:0 "[ETH.GetName] fordert Infanterieausrüstung an"
 BBA_ethiopia_communist_events.08.desc:0 "[ETH.GetName] hat Infanterieausrüstung zur Unterstützung im Konflikt mit Italien angefordert. Ohne die Bereitstellung von Grundausrüstung ist es unwahrscheinlich, dass das [ETH.GetAdjective]-Militär seine Truppen ausreichend bewaffnen kann. Sollten wir sie jedoch mit unserer Ausrüstung beliefern, würde dies unsere Beziehungen zu [ITA.GetName] mit Sicherheit noch weiter schädigen."
 BBA_ethiopia_communist_events.08.a:0 "Wir können keine Ausrüstung entbehren."
 BBA_ethiopia_communist_events.08.b:0 "Natürlich werden wir ihnen helfen."
 BBA_ethiopia_communist_events.09.t:0 "[SOV.GetNameDefCap] Sendet Infanterieausrüstung"
 BBA_ethiopia_communist_events.09.desc:0 "Die [SOV.GetName] haben uns die angeforderte Infanterieausrüstung geschickt, um uns im Kampf gegen [ITA.GetName] zu unterstützen. Dies wird uns sicherlich zum Sieg über die Faschisten verhelfen."
 BBA_ethiopia_communist_events.09.a:0 "Der Krieg wendet sich zu unseren Gunsten."
 BBA_ethiopia_communist_events.10.t:0 "[SOV.GetNameDefCap] Senden von Ausrüstung ablehnen"
 BBA_ethiopia_communist_events.10.desc:0 "Die [SOV.GetName] haben sich geweigert, uns Infanterieausrüstung zu schicken. Trotz aller Bemühungen unserer Delegation in [SOV.capital.GetCapitalVictoryPointName] scheinen sie zu sehr mit ihren eigenen Problemen beschäftigt zu sein, als dass sie uns etwas übrig lassen könnten."
 BBA_ethiopia_communist_events.10.a:0 "Sie haben uns verraten."
 BBA_ethiopia_communist_events.11.t:0 "[ETH.GetName] fordert Militärberater an"
 BBA_ethiopia_communist_events.11.desc:0 "Die neue Führung von [ETH.GetNameDefCap] hat die Schwäche ihres Militärs im Umgang mit moderner Kriegsführung erkannt. Sie hat uns daher um Unterstützung bei der Reorganisation ihres Militärs gebeten. Dies wäre eine großartige Gelegenheit, unseren Offizieren Erfahrungen in verschiedenen Umgebungen zu vermitteln, aber auch eine Chance für uns, das interne Machtgleichgewicht innerhalb von [ETH.GetName] zu beeinflussen."
 BBA_ethiopia_communist_events.11.a:0 "Dies ist eine Gelegenheit, die wir uns nicht entgehen lassen dürfen."
 BBA_ethiopia_communist_events.11.b:0 "Wir können nicht riskieren, dass ausländische Mächte unsere Taktiken kennen."
 BBA_ethiopia_communist_events.12.t:0 "[SOV.GetAdjective] Ausrüstung kommt an"
 BBA_ethiopia_communist_events.12.desc:0 "Die von [SOV.GetName] versprochene Ausrüstung ist in unseren Militärdepots eingetroffen und wird nun unter unseren Streitkräften verteilt."
 BBA_ethiopia_communist_events.12.a:0 "Exzellent!"
 BBA_ethiopia_communist_events.14.t:0 "[ETH.GetNameDefCap] Bittet um Hilfe beim Aufbau der Luftwaffe"
 BBA_ethiopia_communist_events.14.desc:0 "[ETH.GetNameDefCap] hat uns beim Aufbau ihrer eigenen Luftwaffe um Unterstützung gebeten. Ihr Vorschlag sieht vor, Freiwillige zu entsenden, die gemeinsam mit unseren Piloten in älteren, überzähligen Flugzeugen trainieren. Dies wäre eine fantastische Gelegenheit für unsere Piloten, mehr Erfahrung zu sammeln und unsere Ausrüstung im Vergleich zu den [ITA.GetAdjective]s zu testen."
 BBA_ethiopia_communist_events.14.a:0 "Ein ausgezeichneter Vorschlag."
 BBA_ethiopia_communist_events.14.b:0 "Wir müssen unseren Flugzeugbestand aufrechterhalten."
 BBA_ethiopia_communist_events.15.t:0 "[SOV.GetNameDefCap] schickt Militärberater"
 BBA_ethiopia_communist_events.15.desc:0 "Generäle von [SOV.GetNameDef] sind heute in [ROOT.Capital.GetCapitalVictoryPointName] eingetroffen. Die Berater erhalten einen Überblick über die aktuelle Struktur unserer Streitkräfte und den aktuellen Stand des Krieges mit [ITA.GetName]. Hoffentlich können sie bei der Modernisierung unserer Streitkräfte helfen."
 BBA_ethiopia_communist_events.15.a:0 "Das war längst überfällig."
 BBA_ethiopia_communist_events_15_tt:1 "§Y$SOV_semyon_budyonny$§! und §Y$SOV_vasily_kuznetsov$§! werden als Generäle verfügbar."
 BBA_ethiopia_communist_events.16.t:0 "[SOV.GetNameDefCap] Weigerung, Militärberater zu entsenden"
 BBA_ethiopia_communist_events.16.desc:0 "Unsere angeblichen Freunde in [SOV.Capital.GetCapitalVictoryPointName] haben sich geweigert, uns Militärberater zur Unterstützung unserer militärischen Modernisierung zu schicken. Trotz dieses Rückschlags werden wir die Faschisten besiegen und unsere Modernisierung allein fortsetzen."
 BBA_ethiopia_communist_events.16.a:0 "Auf [SOV.GetAdjective] kann man sich nicht verlassen."
 BBA_ethiopia_communist_events.17.t:0 "[ETH.GetNameDefCap] fordert Unterstützung gegen [ITA.GetAdjective] Rüstung"
 BBA_ethiopia_communist_events.17.desc:0 "Eine Delegation von [ETH.GetNameDef] drängt unsere Minister und das Militär, unsere überzähligen Panzerfahrzeuge zu schicken, um sie im Krieg gegen [ITA.GetName] zu unterstützen. Die [ETH.GetAdjective] sind im Kampf gegen [ITA.GetAdjective]-Panzer eindeutig im Nachteil. Würden wir unsere Ausrüstung schicken, würde ihnen das sicherlich helfen, die [ITA.GetAdjective] zurückzudrängen, würde es jedoch auch die Spannungen zwischen [SOV.GetNameDef] und [ITA.GetName] erhöhen."
 BBA_ethiopia_communist_events.17.a:0 "Eine hervorragende Gelegenheit, unsere Geräte zu testen."
 BBA_ethiopia_communist_events.17.b:0 "Wir werden keine weitere Eskalation riskieren."
 BBA_ethiopia_communist_events.18.t:0 "[SOV.GetNameDefCap] Weigerung, gepanzerte Fahrzeuge zu schicken"
 BBA_ethiopia_communist_events.18.desc:0 "[SOV.GetNameDefCap] haben sich geweigert, uns gepanzerte Fahrzeuge zur Abwehr der [ITA.GetAdjective]s zu schicken. Offenbar befürchten die [SOV.GetAdjective]s eine Eskalation der Spannungen zwischen ihnen und den [ITA.GetAdjective]s. "
 BBA_ethiopia_communist_events.18.a:0 "Wir müssen einen anderen Weg finden."
 BBA_ethiopia_communist_events.19.t:0 "[SOV.GetNameDefCap] Sendet gepanzerte Fahrzeuge"
 BBA_ethiopia_communist_events.19.desc:0 "[SOV.GetNameDefCap] hat uns gepanzerte Fahrzeuge geschickt, um uns im Kampf gegen die [ITA.GetAdjective] zu unterstützen. Obwohl es sich nicht um die neuesten Modelle handelt, werden sich die Fahrzeuge an der Front zweifellos als wertvoll erweisen, und sei es nur, um die Moral zu stärken."
 BBA_ethiopia_communist_events.19.a:0 "Exzellent!"
 BBA_ethiopia_communist_events.20.t:0 "[SOV.GetNameDefCap] weigert sich, Piloten auszubilden"
 BBA_ethiopia_communist_events.20.desc:0 "[SOV.GetNameDefCap] hat einen Vorschlag zur Ausbildung unserer Piloten abgelehnt. Man hoffte, dies könnte den Ausbau unserer Luftwaffe beschleunigen, doch die Sowjets scheinen derzeit andere Prioritäten zu haben. Wir haben jedoch Pläne für den Bau eigener Flugzeuge erhalten."
 BBA_ethiopia_communist_events.20.a:0 "Wir können es sicher herausfinden."
 BBA_ethiopia_communist_events.21.t:0 "[SOV.GetNameDefCap] stimmt der Ausbildung von Piloten zu"
 BBA_ethiopia_communist_events.21.desc:0 "Unsere Kameraden im [SOV.GetName] haben sich bereit erklärt, uns bei der Pilotenausbildung zu unterstützen. Sie haben uns außerdem großzügig eine Reihe von Flugzeugen zur Verfügung gestellt. Dies wird unsere Pläne zum Aufbau einer Luftwaffe, die den [ITA.GetAdjective]s entgegenwirken kann, rasch vorantreiben."
 BBA_ethiopia_communist_events.21.a:0 "Wir sind unseren [SOV.GetAdjective] Kameraden dankbar!"
 BBA_ethiopia_communist_events.22.t:0 "[ITA.GetNameDefCap] Weigere dich, den Krieg mit [ETH.GetNameDefCap] zu beenden"
 BBA_ethiopia_communist_events.22.desc:0 "Die [ITA.GetAdjective] haben unsere Forderungen, ihren Krieg gegen [ETH.GetName] zu beenden, bisher ignoriert. Es ist klar geworden, dass sie nur rohe Gewalt verstehen. Wenn wir unseren derzeitigen Kurs fortsetzen, ist ein Krieg zwischen [SOV.GetName] und [ITA.GetName] unvermeidlich. Wenn wir jetzt nachgeben, verlieren wir letztendlich alles, was wir durch die Unterstützung von [ETH.GetName] erreicht haben, und unser diplomatisches Gewicht auf der Weltbühne wird erheblich geschwächt."
 BBA_ethiopia_communist_events.22.a:0 "Sie werden es bereuen."
 BBA_ethiopia_communist_events.22.b:0 "Wir sind nicht bereit für den Krieg."
 BBA_ethiopia_communist_events.23.t:0 "[SOV.GetNameDefCap] macht einen Rückzieher"
 BBA_ethiopia_communist_events.23.desc:0 "Die Sowjetunion ruderte von ihrer jüngsten Kriegsrhetorik zurück und äußerte erneut scharfe Einwände gegen unser Vorgehen in Äthiopien. Ihre Kriegsdrohung scheint nichts weiter als ein Bluff gewesen zu sein."
 BBA_ethiopia_communist_events.23.a:0 "Ein Sieg für [ITA.GetName]!"
 BBA_ethiopia_communist_events.24.t:0 "[SOV.GetNameDefCap] übernimmt die Kontrolle über die Außenpolitik"
 BBA_ethiopia_communist_events.24.desc:0 "Die diplomatische Konfrontation zwischen [ITA.GetName] und [SOV.GetNameDef] ist nun in einen offenen Konflikt ausgebrochen. Die [SOV.GetAdjective] haben unsere Unabhängigkeit garantiert und werden uns nun auf dem Schlachtfeld helfen, die [ITA.GetAdjective] zurückzudrängen. Es scheint jedoch, dass dies auf Kosten unserer Unabhängigkeit gehen wird. Von nun an müssen wir sicherstellen, dass unsere Außenpolitik vollständig mit der von [SOV.Capital.GetCapitalVictoryPointName] übereinstimmt."
 BBA_ethiopia_communist_events.24.a:0 "Es ist notwendig. Im Moment."
 BBA_ethiopia_communist_events.25.t:0 "[ETH.GetNameDefCap] Vermittlung anfordern"
 BBA_ethiopia_communist_events.25.desc:0 "[ETH.GetNameDefCap] haben sich an uns gewandt, in der Hoffnung, dass wir zwischen ihnen und den [ITA.GetAdjective] vermitteln können. Die [ITA.GetAdjective] haben sich von den scharf formulierten Einwänden des Völkerbundes nicht beeindrucken lassen, daher wird jede Vermittlung unsererseits wahrscheinlich die Androhung von Gewalt erfordern. Wir müssen sorgfältig abwägen, wie viel wir für [ETH.GetNameDef] zu riskieren bereit sind. "
 BBA_ethiopia_communist_events.25.a:0 "Wir werden ihnen helfen, diesen Krieg zu beenden."
 BBA_ethiopia_communist_events.25.b:0 "Wir werden ihnen helfen. Gegen Bezahlung."
 BBA_ethiopia_communist_events.25.c:0 "Das ist zu riskant."
 BBA_ethiopia_communist_events.26.t:0 "[SOV.GetNameDefCap] Weigere dich, bei Konflikten zu vermitteln"
 BBA_ethiopia_communist_events.26.desc:0 "[SOV.GetNameDefCap] hat die Möglichkeit einer Vermittlung zwischen uns und den [ITA.GetAdjective]s ausgeschlossen. Sie begründen dies mit der mangelnden Bereitschaft von [ITA.GetName], auf den Völkerbund zu hören, und der Notwendigkeit, mit Gewalt zu drohen. Das Risiko einer Eskalation zum Krieg zwischen den beiden Ländern wurde von [SOV.GetLeader] als zu groß eingestuft."
 BBA_ethiopia_communist_events.26.a:0 "Sie benutzen uns, um die [ITA.GetAdjective]s auszubluten"
 BBA_ethiopia_communist_events.27.t:0 "[SOV.GetNameDefCap] kann [ITA.GetAdjective] Aggression nicht stoppen"
 BBA_ethiopia_communist_events.27.desc:0 "[SOV.GetNameDefCap] ist von seiner Zusage, den Angriffskrieg von [ITA.GetName] zu beenden, abgerückt. Ihre Kriegsbereitschaft scheint nur ein Bluff gewesen zu sein. Nun stehen wir vor der schwierigen Aufgabe, diesen Krieg allein zu beenden."
 BBA_ethiopia_communist_events.27.a:0 "Sie haben uns verraten."
 BBA_ethiopia_communist_events.28.t:0 "[SOV.GetNameDefCap] fordert außenpolitische Ausrichtung"
 BBA_ethiopia_communist_events.28.desc:0 "Die diplomatische Konfrontation zwischen [ITA.GetName] und [SOV.GetNameDef] hat sich nun gelegt, da die [ITA.GetAdjective] sich bereit erklärt haben, ihren Krieg gegen uns zu beenden. Die [SOV.GetAdjective] haben unsere Unabhängigkeit garantiert und deutlich gemacht, dass sie einen Angriff auf uns als Angriff auf sich selbst betrachten. Der Preis für ihre Hilfe bei der Beendigung dieses Krieges scheint jedoch unsere Unabhängigkeit zu sein. Von nun an müssen wir sicherstellen, dass unsere Außenpolitik vollständig mit der von [SOV.Capital.GetCapitalVictoryPointName] übereinstimmt."
 BBA_ethiopia_communist_events.28.a:0 "Wir müssen es zulassen. Vorerst."
 BBA_ethiopia_communist_events.29.t:0 "[SOV.GetNameDefCap] gelingt die Konfliktschlichtung"
 BBA_ethiopia_communist_events.29.desc:0 "Die diplomatische Konfrontation zwischen [ITA.GetName] und [SOV.GetNameDef] hat sich nun gelegt, da die [ITA.GetAdjective] sich bereit erklärt haben, ihren Krieg gegen uns zu beenden. Dies ist ein großer Sieg gegen den Faschismus, aber wahrscheinlich nicht das Ende des Kampfes. Hoffentlich können wir weiterhin mit unseren Freunden in [SOV.Capital.GetCapitalVictoryPointName] zusammenarbeiten."
 BBA_ethiopia_communist_events.29.a:0 "Wir sind auf ewig dankbar."
 bba_news.1.t:0 "[SOV.GetName] fordert Ende des italienisch-äthiopischen Krieges"
 bba_news.1.desc:0 "Die Gefahr eines großen Krieges hat heute Staatschefs weltweit aufgeschreckt. Der sowjetische Führer [SOV.GetLeader] forderte [ITA.GetLeader] auf, den illegalen Krieg von [ITA.GetName] gegen [ETH.GetNameDef] zu beenden. [SOV.GetLeader] machte deutlich, dass [SOV.GetLeader.GetSheHe] bereit sei, [ITA.GetName] mit Gewalt dazu zu zwingen, falls sie dieser Forderung nicht nachkäme. In den letzten Monaten unterstützten die [SOV.GetAdjective] [ETH.GetNameDef] mit Ausrüstung und Beratung. Es wird immer deutlicher, dass sie das Land nun als Teil ihres eigenen Einflussbereichs betrachten."
 bba_news.1.a:0 "Sie bluffen doch sicher?"
 bba_news.2.t:0 "[ITA.GetName] stimmt einem Friedensabkommen mit [ETH.GetNameDefCap] zu"
 bba_news.2.desc:0 "\nIn einer bemerkenswerten Wendung der Ereignisse hat [ITA.GetName] einem Waffenstillstand mit [ETH.GetName] zugestimmt. [ITA.GetAdjective]-Truppen haben außerdem begonnen, sich an ihre ursprünglichen Grenzen mit [ETH.GetNameDef] zurückzuziehen und alle erzielten Gebietsgewinne aufzugeben. [SOV.GetNameDefCap]s offensichtliche Bereitschaft, für Äthiopien in den Krieg zu ziehen, spielte zweifellos eine Rolle bei [ITA.GetLeader]s Rückzugsentscheidung. Es bleibt abzuwarten, wie die [ITA.GetAdjective]-Öffentlichkeit auf diese Demütigung reagieren wird."
 bba_news.2.a:0 "Wird [ITA.GetLeader] das überleben?"
 bba_news.3.t:0 "Italo-[ETH.GetAdjective] Waffenstillstandsabkommen"
 bba_news.3.desc:0 "Da sich der Krieg in [ETH.GetName] zu einem Abnutzungskrieg entwickelt, wurden die [ITA.GetAdjective] zu Waffenstillstandsverhandlungen gezwungen. Viele erwarteten, dass sich das [ETH.GetAdjective] Militär nach dem jüngsten kommunistischen Aufstand im Land einfach auflösen würde, doch [ETH.GetLeader] gelang es, den Krieg zu wenden und weite Teile des Landes vor der [ITA.GetAdjective] Besatzung zu retten. Da jedoch weite Teile Ostafrikas noch immer unter [ITA.GetAdjective] Herrschaft stehen, ist unklar, ob der unsichere Frieden von Dauer sein wird. "
 bba_news.3.a:0 "Das wird nie von Dauer sein. "
 bba_news.4.t:0 "Kommunistischer Putsch in Äthiopien"
 bba_news.4.desc:0 "Mitglieder des Militärs und der antifaschistischen Organisation „Schwarze Löwen“ haben einen Putsch gegen die kaiserliche Regierung von $ETH_haile_selassie$ inszeniert. Der Kaiser sollte die Truppen inspizieren, wurde dabei aber von ihnen überfallen und verhaftet.\n\nIn [ROOT.Capital.GetCapitalVictoryPointName] eroberten die Schwarzen Löwen unterdessen die wichtigsten Infrastruktureinrichtungen der Stadt, darunter die Residenz des Kaisers. Viele loyale Militär- und Polizeiangehörige wurden bei kleineren Gefechten getötet, doch der Rest des Landes steht nun unter der Kontrolle einer kommunistisch geprägten Übergangsregierung. \n\nDie Mehrheit der Bevölkerung, erschöpft vom Krieg mit [ITA.GetName], hat die Autorität ihrer neuen Regierung einfach akzeptiert. "
 bba_news.4.a:0 "Die Revolution breitet sich aus!"
 bba_news.4.b:0 "Die kommunistische Bedrohung ist auf dem Vormarsch."
 bba_news.5.t:0 "Das Reich Salomos wurde gegründet"
 bba_news.5.desc_owns_454:0 "[ETH.GetLeader] erklärte sich aufgrund seiner königlichen Abstammung, die angeblich bis zum biblischen König Salomon zurückreicht, zum rechtmäßigen Herrscher von [454.GetName]. Anschließend verkündete er die Wiedergeburt Äthiopiens als Salomonisches Reich. Nachdem er den Großmächten bereits die Kontrolle über [454.GetName] entrissen hat, beabsichtigt [ETH.GetLeader], die Hauptstadt seines Reiches in die Region zu verlegen. Es bleibt abzuwarten, ob Äthiopiens salomonische Umstrukturierung geopolitische Auswirkungen haben wird. "
 bba_news.5.desc_does_not_own_454:0 "[ETH.GetLeader] hat erklärt, dass er aufgrund seiner königlichen Abstammung, die angeblich bis zum biblischen König Salomon zurückreicht, der rechtmäßige Herrscher von [454.GetName] sei. Die Gefahr eines weiteren territorialen Konflikts wird in den Hauptstädten der Region zweifellos Ängste auslösen, doch es bleibt abzuwarten, ob Äthiopiens salomonische Umstrukturierung geopolitische Auswirkungen haben wird. "
 bba_news.5.a:0 "Ehre sei dem einzigen wahren Erben Salomons!"
 bba_news.5.b:0 "Das ist Wahnsinn."
 bba_news.6.t:0 "Das Reich Zion wurde gegründet"
 bba_news.6.desc:0 "In einer wahrhaft bizarren Wendung der Ereignisse hat sich der Kaiser von Äthiopien, [ETH.GetLeader], einer religiösen Randbewegung in der Karibik angeschlossen, die als „Rastafarianismus“ bekannt ist. Offensichtlich begnügt er sich nicht damit, bloß Kaiser zu sein, sondern wird von den Rastafaris nun als Verkörperung Gottes, genauer gesagt als „Jah“, verehrt. Äthiopien selbst wurde zum „Reich Zion“ umgestaltet. Es bleibt abzuwarten, ob dieser religiöse Umbruch zu Veränderungen in der äthiopischen Außenpolitik oder zu geopolitischer Instabilität führen wird."
 bba_news.6.a:0 "Ehre sei Jah!"
 bba_news.6.b:0 "Das ist Wahnsinn."
 bba_news.7.t:0 "[ITA.GetName] Verschiebt sich zum Anhang [AFA.GetNameDef]"
 bba_news.7.desc:0 "Gerüchten zufolge könnte die Annexion von [AFA.GetNameDef] durch [ITA.GetAdjective]-Streitkräfte unmittelbar bevorstehen. [ITA.GetAdjective]-Truppen wurden an der Grenze des isolierten Landes zusammengezogen, und Quellen deuten darauf hin, dass in [AFA.Capital.GetCapitalVictoryPointName] diplomatischer Druck ausgeübt wird, um eine Kapitulation ohne Blutvergießen zu erzwingen. Es bleibt abzuwarten, ob [AFA.GetLeader] dem [ITA.GetAdjective]-Druck standhalten kann, aber die Lage sieht nicht vielversprechend aus. "
 bba_news.7.a:0 "Wie schrecklich."
 bba_news.7.b:0 "Wir sollten uns auf das Unvermeidliche vorbereiten."
 bba_news.7.c:0 "Das war unvermeidlich."
 bba_news.8.t:0 "[AFA.GetName] unterwirft sich den Forderungen von [ITA.GetAdjective]"
 bba_news.8.desc:0 "Für viele vielleicht nicht überraschend, hat [AFA.GetNameDef] [ITA.GetAdjective] Forderungen nach Unterwerfung akzeptiert. Während die [AFA.GetAdjective]-Regierung die Hoffnung hegte, einer Besetzung zu entgehen, wurde zunehmend klar, dass die Kolonialmächte der Region ihr nicht zu Hilfe kommen würden und auch das benachbarte [ETH.GetName] nicht in der Lage sein würde, Militärpersonal zu ihrer Unterstützung abzugeben. Angesichts der derart düsteren Lage beugte sich die Regierung dem [ITA.GetAdjective]-Druck, um die Bevölkerung vor unnötigem Blutvergießen zu bewahren. \n\n[ITA.GetAdjective]-Truppen marschieren nun in das kleine Land ein, um neue Positionen an der Grenze zu [ETH.GetNameDef] einzunehmen. Es ist unklar, ob die Besetzung dauerhaft sein wird oder welche Auswirkungen sie auf den umfassenderen [ITA.GetAdjective]-Konflikt mit [ETH.GetName] haben wird. "
 bba_news.8.a:0 "Leider nicht überraschend."
 bba_news.8.b:0 "Dies wird unsere Kräfte noch stärker beanspruchen."
 bba_news.8.c:0 "Sie haben eine kluge Wahl getroffen."
 BBA_ethiopia_communist_events.30.t:0 "[ETH.GetNameDefCap] fordert Waffenstillstand"
 BBA_ethiopia_communist_events.30.desc:0 "Vertreter von [ETH.GetNameDefCap] haben in unserem aktuellen Konflikt mit ihnen einen Waffenstillstand gefordert. Der Krieg endete nicht so schnell wie erhofft, und dies würde uns die Möglichkeit geben, unsere Position in der Region zu stärken oder andere dringende Probleme zu lösen."
 BBA_ethiopia_communist_events.30.a:0 "Wir werden die Kämpfe einstellen. Vorerst. "
 BBA_ethiopia_communist_events.30.b:0 "Der Sieg ist in unserer Reichweite, wir werden jetzt nicht aufhören."
 BBA_ethiopia_communist_events.31.t:0 "[ITA.GetNameDefCap] stimmt Waffenstillstand zu"
 BBA_ethiopia_communist_events.31.desc:0 "Die [ITA.GetAdjective]s haben sich in unserem aktuellen Konflikt auf einen Waffenstillstand geeinigt. Hoffentlich gibt uns dies die Möglichkeit, einen dauerhaften Frieden zwischen unseren Nationen zu schaffen. Wir sollten jedoch wachsam bleiben, da der Konflikt jederzeit wieder ausbrechen könnte."
 BBA_ethiopia_communist_events.31.a:0 "Endlich ein Ende des Blutvergießens."
 BBA_ethiopia_communist_events.32.t:0 "[ITA.GetNameDefCap] lehnt Waffenstillstandsangebot ab"
 BBA_ethiopia_communist_events.32.desc:0 "Die [ITA.GetAdjective]s haben sich geweigert, an einem Waffenstillstand teilzunehmen. Es scheint, als ob sie die vollständige Zerstörung von [ETH.GetNameDefCap] anstreben. Die Menschen werden nun wissen, dass man mit den Faschisten nicht vernünftig reden kann und dass unsere Freiheit davon abhängt, dass jeder seine Anstrengungen verdoppelt."
 BBA_ethiopia_communist_events.32.a:0 "Wir werden sie weiterhin leiden lassen."
 BBA_ethiopia_communist_events.33.t:0 "Eritreische Unabhängigkeit"
 BBA_ethiopia_communist_events.33.desc:0 "Während unseres Konflikts mit den [ITA.GetAdjective]s gelang es uns, Eritrea von den Faschisten zu befreien. Wir haben nun die Möglichkeit, den Menschen in der Region die Unabhängigkeit zu schenken. Die [ITA.GetAdjective]s werden durch diesen Schritt jedoch zweifellos enttäuscht sein, und er könnte unseren fragilen Frieden mit ihnen destabilisieren."
 BBA_ethiopia_communist_events.33.a:0 "Freiheit für alle!"
 BBA_ethiopia_communist_events.33.b:0 "Das ist zu riskant."
 BBA_ethiopia_communist_events.34.t:0 "Somalische Unabhängigkeit"
 BBA_ethiopia_communist_events.34.desc:0 "Während unseres Konflikts mit den [ITA.GetAdjective]s gelang es uns, Somalia von den Faschisten zu befreien. Wir haben nun die Möglichkeit, den Menschen in der Region die Unabhängigkeit zu ermöglichen. Die [ITA.GetAdjective]s werden durch diesen Schritt jedoch zweifellos enttäuscht sein, und er könnte unseren fragilen Frieden mit ihnen destabilisieren."
 BBA_ethiopia_communist_events.34.a:0 "Freiheit für alle!"
 BBA_ethiopia_communist_events.34.b:0 "Das ist zu riskant"
 BBA_ethiopia_communist_events.35.t:0 "[ETH.GetNameDefCap] fordert Rückzug aus Afrika"
 BBA_ethiopia_communist_events.35.desc:0 "Nachdem sie uns im Bürgerkrieg unterstützt hatten, forderten Vertreter von [ETH.GetNameDef] nun, dass wir mit der Entkolonialisierung beginnen. Sie erklärten, dass wir, wenn wir den Werten treu bleiben, für die wir im Bürgerkrieg gekämpft haben, die Selbstbestimmung der afrikanischen Völker unterstützen müssen. [ETH.GetLeader] schlug vor, gemeinsam an der Gründung einer unabhängigen Republik Rif im Norden Marokkos zu arbeiten."
 BBA_ethiopia_communist_events.35.a:0 "Wir stehen an der Seite der Menschen in Afrika."
 BBA_ethiopia_communist_events.35.b:0 "Sie haben kein Recht, uns zu belehren."
 BBA_ethiopia_communist_events.36.t:0 "[SPC.GetNameDefCap] stimmt der Befreiung des Rif zu"
 BBA_ethiopia_communist_events.36.desc:0 "[SPC.GetNameDefCap] haben unserem Vorschlag zur Gründung einer unabhängigen Republik Rif im Norden Marokkos zugestimmt. Dies ist ein positiver Schritt im Kampf um Unabhängigkeit in Afrika und der ganzen Welt."
 BBA_ethiopia_communist_events.36.a:0 "Die Unterstützung hat sich gelohnt. "
 BBA_ethiopia_communist_events.37.t:0 "[SPC.GetNameDefCap] lehnt Dekolonisierungsvorschlag ab"
 BBA_ethiopia_communist_events.37.desc:0 "[SPC.GetNameDefCap] reagierten empört auf unseren Vorschlag, sie sollten Gebiete in Afrika aufgeben. Sie haben sich als nicht besser erwiesen als die Faschisten oder Imperialisten, denen sie angeblich entgegentreten."
 BBA_ethiopia_communist_events.37.a:0 "Dann werden wir sie mit Gewalt befreien."
 BBA_ethiopia_communist_events.37.b:0 "Wir sollten die Sache nicht erzwingen."
 BBA_ethiopia_communist_events.38.t:0 "[ETH.GetNameDefCap] Bietet Unterstützung"
 BBA_ethiopia_communist_events.38.desc:0 "Nachdem sie kürzlich in ihrem Heimatland gegen den Faschismus gekämpft haben, sind Freiwillige von [ETH.GetNameDef] nach Spanien gekommen, um uns in unserem Kampf zu unterstützen. [ETH.GetLeader] hat [ETH.GetLeader.GetHerHis] Unterstützung für unsere Sache zugesagt und in den kommenden Monaten materielle Hilfe versprochen."
 BBA_ethiopia_communist_events.38.a:0 "Danke, Genossen."
 BBA_ethiopia_communist_events.39.t:0 "Das Rif ist befreit"
 BBA_ethiopia_communist_events.39.desc:0 "Mit der Befreiung der Rif-Region von [SPC.GetNameDef] haben wir die Möglichkeit, sie zu Friedensverhandlungen zu zwingen. Nachdem wir unser Vertrauen in der Frage der Entkolonialisierung missbraucht haben, könnten wir alternativ den Krieg in [SPC.GetNameDef] selbst fortsetzen."
 BBA_ethiopia_communist_events.39.a:0 "Wir haben unsere Ziele erreicht."
 BBA_ethiopia_communist_events.39.b:0 "Wir werden dafür sorgen, dass sie keine Bedrohung mehr darstellen."
 BBA_ethiopia_communist_events.40.t:0 "[ETH.GetNameDefCap] fordert ein Ende der Feindseligkeiten"
 BBA_ethiopia_communist_events.40.desc:0 "Es ist uns nicht gelungen, die Kontrolle über unser Territorium in Afrika zu behalten. Nachdem die [ETH.GetName]-Regierung ihre Ziele erreicht hatte, wandte sie sich an uns in der Hoffnung, Frieden zwischen uns auszuhandeln."
 BBA_ethiopia_communist_events.40.a:0 "Wir haben keine Wahl."
 BBA_ethiopia_communist_events.41.t:0 "[ETH.GetNameDefCap] fordert den Rückzug der Berater"
 BBA_ethiopia_communist_events.41.desc:0 "[ETH.GetNameDefCap] hat uns mitgeteilt, dass alle unsere Militärberater das Land sofort verlassen müssen. Es scheint, dass [ETH.GetLeader] beabsichtigt, das Land in eine unabhängigere Richtung zu führen. Wenn wir nicht bald handeln, könnten wir die Kontrolle über das Regime in [ETH.Capital.GetCapitalVictoryPointName] verlieren."
 BBA_ethiopia_communist_events.41.a:0 "Nach allem, was wir für sie getan haben."

#SUD Peace
 BBA_ethiopia_communist_events.46.t:0 "[ETH.GetNameDefCap] Bietet Frieden"
 BBA_ethiopia_communist_events.46.desc:0 "[ETH.GetAdjective] Diplomaten haben uns ein Friedensangebot unterbreitet. Das Angebot hängt davon ab, dass wir auf unsere Ansprüche auf das [SUD.GetAdjective] Gebiet verzichten, das wir im Laufe dieses Konflikts an [ETH.GetNameDef] verloren haben. Die Diplomaten erklären außerdem, dass in der Region eine [SUD.GetAdjective] Regierung eingesetzt werden soll. Die Unabhängigkeit dieser Regierung bleibt abzuwarten. "
 BBA_ethiopia_communist_events.46.a:0 "Wir werden unser Territorium nicht aufgeben."
 BBA_ethiopia_communist_events.46.b:0 "Wir haben keine andere Wahl, als zuzustimmen."
