 BBA_ethiopia_communist_events.52.t:0 "[ETH.GetNameDefCap] bricht den Gleichstand mit [SOV.GetNameDef]"
 BBA_ethiopia_communist_events.52.desc:0 "Die [ETH.GetAdjective]-Regierung hat eine Operation inszeniert, um unsere Kontrolle über die Angelegenheiten des Landes zu brechen. [SOV.GetAdjective]-Mitarbeiter in ganz [ETH.Capital.GetCapitalVictoryPointName] wurden von [ETH.GetAdjective]-Truppen zu Schichthaftlagern eskortiert, bevor [ETH.Getleader] unseren Botschafter darüber informierte, dass [ETH.GetLeader.GetSheHe] künftig die volle Kontrolle über [ETH.GetAdjective]-Angelegenheiten übernehmen werde. Wenn wir schnell handeln, können wir die Situation möglicherweise wieder unter Kontrolle bringen. Das Zeitfenster für ein solches Vorgehen schrumpft jedoch rapide."
 BBA_ethiopia_communist_events.52.a:0 "Wir haben wichtigere Angelegenheiten zu erledigen."
 BBA_ethiopia_communist_events.52.b:0 "Wir werden ihnen die Fehler ihres Handelns beibringen."

 BBA_ethiopia_communist_events.53.t:0 "[SOV.GetNameDefCap] weigert sich, Berater zu schicken"
 BBA_ethiopia_communist_events.53.desc:0 "Enttäuschenderweise teilten uns [SOV.GetAdjective] Diplomaten mit, dass sie derzeit kein Militärpersonal entbehren könnten. Sie beriefen sich auf Sicherheitsbedenken in der Nähe ihrer eigenen Grenzen, die Vorrang hätten. Als Zeichen des guten Willens schickten sie uns jedoch eine Lieferung Infanterieausrüstung."
 BBA_ethiopia_communist_events.53.a:0 "Es ist besser als nichts."

 BBA_ethiopia_communist_events.54.t:0 "Geheime Hilfe von [JAP.GetNameDef]"
 BBA_ethiopia_communist_events.54.desc:0 "Angesichts des jüngsten Zustroms von [JAP.GetAdjective] Freiwilligen, die sich unserem Kampf anschließen, wurden wir darüber informiert, dass die Regierung in [JAP.Capital.GetCapitalVictoryPointName] dabei ist, materielle Hilfe in Form von Infanterieausrüstung zu schicken. Diese Ausrüstung wird der Revolution enormen Auftrieb verleihen. Die [JAP.GetAdjective]-Regierung möchte jedoch, dass wir über die Herkunft der Ausrüstung Stillschweigen bewahren, um diplomatische Konsequenzen seitens der anderen Großmächte zu vermeiden."
 BBA_ethiopia_communist_events.54.a:0 "Unser Dank gilt Ihnen, Genossen!"

 BBA_ethiopia_communist_events.55.t:0 "[JAP.GetAdjective] Subversive fliehen aus dem Imperium"
 BBA_ethiopia_communist_events.55.desc:0 "Die Kenpeitai berichten, dass sich eine Reihe von Subversiven an Bord von Frachtschiffen mit Ziel Ostafrika der kaiserlichen Gerichtsbarkeit entzogen haben. Gerüchten zufolge befanden sich unter ihnen $IA_sakutaro_iwasa$ und $IA_sanshiro_ishikawa$. Vermutlich beabsichtigen sie, sich der revolutionären Bewegung in [ETH.GetNameDef] anzuschließen."
 BBA_ethiopia_communist_events.55.a:0 "Nun, dieses Problem hat sich von selbst gelöst."
 BBA_ethiopia_communist_events.55.b:0 "Diese Verräter müssen sofort an [JAP.GetName] ausgeliefert werden!"

 BBA_ethiopia_communist_events.56.t:0 "[JAP.GetAdjective] Freiwillige reisen nach Ostafrika"
 BBA_ethiopia_communist_events.56.desc:0 "Die Geheimdienste haben uns mitgeteilt, dass sie einer Reihe von Freiwilligen dabei geholfen haben, eine sichere Überfahrt nach Ostafrika zu erhalten, damit diese die dortigen revolutionären Bewegungen unterstützen konnten. Zu den Freiwilligen gehörten $IA_sakutaro_iwasa$ und $IA_sanshiro_ishikawa$. "
 BBA_ethiopia_communist_events.56.a:0 "Ganbare, Kameraden!"
 BBA_ethiopia_communist_events.56.b:0 "Vielleicht können wir den Kampf von [ETH.GetNameDef] stärker unterstützen …"

 BBA_ethiopia_communist_events.57.t:0 "[JAP.GetNameDefCap] fordert die Auslieferung von $IA_sakutaro_iwasa$ und $IA_sanshiro_ishikawa$"
 BBA_ethiopia_communist_events.57.desc:0 "Wir haben ein formelles Ersuchen der Regierung von [JAP.GetName] erhalten, in dem die Auslieferung aller [JAP.GetAdjective] Personen gefordert wird, die mit der Absicht ins Land kommen, sich unserer revolutionären Bewegung anzuschließen. Obwohl nicht klar ist, was sie vorhaben, macht das Ersuchen deutlich, dass es Konsequenzen haben wird, wenn sie der Forderung nicht nachkommen."
 BBA_ethiopia_communist_events.57.a:0 "Wir werden uns den Drohungen der Reaktionäre nicht beugen. Und was ihren Kaiser betrifft …"

 BBA_ethiopia_communist_events.58.t:0 "[ETH.GetNameDef]–[JAP.GetName] Beziehungen zerstört"
 BBA_ethiopia_communist_events.58.desc:0 "Wie zu erwarten war, weigerte sich der revolutionäre Pöbel, der [ETH.GetNameDef] leitete, die im Land ankommenden [JAP.GetAdjective] Dissidenten auszuliefern. In einem höchst vulgären Verstoß gegen diplomatisches Protokoll enthielt ihre Antwort zudem eine Vielzahl von Drohungen gegen unseren glorreichen Kaiser!"
 BBA_ethiopia_communist_events.58.a:0 "Was können wir sonst von Narren erwarten, die ihr Erbe zerstören?"
 BBA_ethiopia_communist_events.58.b:0 "Solche Beleidigungen dulden wir nicht!"

 BBA_ethiopia_communist_events.59.t:0 "[JAP.GetAdjective] Embargo"
 BBA_ethiopia_communist_events.59.desc:0 "Es scheint, als hätte unsere jüngste Ablehnung der [JAP.GetAdjective]-Forderungen einen Nerv bei ihrer Regierung getroffen. Es wurde angekündigt, dass sie uns aufgrund ihrer „schädlichen ideologischen Aktivitäten“ in der Region Ostafrika auf absehbare Zeit mit einem Embargo belegen wollen."
 BBA_ethiopia_communist_events.59.a:0 "Wir brauchen ihren Handel sowieso nicht."

 BBA_ethiopia_communist_events.60.t:0 "[FROM.GetName] lehnt Friedensvorschlag ab"
 BBA_ethiopia_communist_events.60.desc:0 "Die Botschafter von [FROM.GetNameDef] haben unseren Friedensvorschlag abgelehnt. Sie argumentieren, unser Angriff gegen sie sei völlig ungerechtfertigt gewesen und sie würden daher nichts anderes als eine bedingungslose Kapitulation von uns akzeptieren, da wir eine Bedrohung für den regionalen Frieden darstellten."
 BBA_ethiopia_communist_events.60.a:0 "Wie heuchlerisch, ihre imperiale Gewalt kann nur mit Gewalt gestoppt werden."

 BBA_ethiopia_communist_events.61.t:0 "[FROM.GetNameDefCap] bietet Frieden für [?ETH.ETH_disputed_colony.GetAdjective] Unabhängigkeit"
 BBA_ethiopia_communist_events.61.desc:0 "[FROM.GetAdjective] Diplomaten haben uns ein Friedensangebot unterbreitet. Das Angebot hängt davon ab, dass wir unsere Ansprüche auf die [?ETH.ETH_disputed_colony.GetAdjective] Gebiete aufgeben, die wir im Laufe dieses Konflikts an [FROM.GetNameDef] verloren haben. Die Diplomaten erklären außerdem, dass in den aufgegebenen [?ETH.ETH_disputed_colony.GetAdjective] Gebieten Wahlen zur Wahl einer neuen Regierung stattfinden werden. Wie unabhängig diese Wahlen sein werden, ist noch unklar."
 BBA_ethiopia_communist_events.61.a:0 "Wir werden unser Territorium nicht aufgeben."
 BBA_ethiopia_communist_events.61.b:0 "Wir haben keine andere Wahl, als zuzustimmen."

 BBA_ethiopia_communist_events.62.t:0 "[FROM.GetName] stimmt dem Friedensangebot zu"
 BBA_ethiopia_communist_events.62.desc:0 "Diplomaten aus [FROM.GetNameDef] haben uns mitgeteilt, dass ihre Regierung bereit ist, ihre Ansprüche auf das von uns befreite Gebiet [?ETH.ETH_disputed_colony.GetAdjective] aufzugeben. Sie ziehen ihre Truppen nun an die neu festgelegten Grenzen in der Region zurück."
 BBA_ethiopia_communist_events.62.a:0 "Ein heroischer Sieg gegen den Imperialismus!"

 BBA_african_union_events.1.t:0 "Die Organisation für Afrikanische Einheit bietet eine Mitgliedschaft an"
 BBA_african_union_events.1.desc:0 "Die Organisation für Afrikanische Einheit hat uns den Mitgliedschaftsstatus angeboten. Die Organisation soll die afrikanischen Nationen zusammenbringen, um in Fragen von gemeinsamem Interesse zu diskutieren und zusammenzuarbeiten. Ein Beitritt könnte zu gegenseitigen Verteidigungsabkommen zwischen den Mitgliedsstaaten führen. Allerdings müssten wir uns auch an die Regeln der Organisation halten."
 BBA_african_union_events.1.a:0 "Eine Mitgliedschaft bringt uns Vorteile."
 BBA_african_union_events.1.b:0 "Wir haben kein Interesse an ihrem Club."
 BBA_african_union_events.2.t:0 "[FROM.GetNameDefCap] tritt der Organisation für Afrikanische Einheit bei"
 BBA_african_union_events.2.desc:0 "[FROM.GetNameDefCap] hat ein Beitrittsangebot der Organisation für Afrikanische Einheit angenommen. Hoffentlich ist dies der Beginn einer kooperativeren Beziehung zwischen unseren Nationen. "
 BBA_african_union_events.2.a:0 "Gemeinsam sind wir stärker."
 BBA_african_union_events.3.t:0 "[FROM.GetNameDefCap] Lehnt Mitgliedschaft in der Organisation für Afrikanische Einheit ab"
 BBA_african_union_events.3.desc:0 "[FROM.GetNameDefCap] hat unser Beitrittsangebot zur Organisation für Afrikanische Einheit abgelehnt. Es ist noch unklar, ob dies lediglich innenpolitische Gründe hat oder ein Zeichen dafür ist, dass ihre außenpolitischen Ambitionen in Afrika mit unseren unvereinbar sind. Vielleicht sind sie in Zukunft bereit, der Organisation beizutreten."
 BBA_african_union_events.3.a:0 "Das ist schade."
 BBA_african_union_events.4.t:1 "[ETH_GetCentralBankName] Mitgliedschaft"
 BBA_african_union_events.4.desc:1 "Die Organisation für Afrikanische Einheit hat eine Afrikanische [ETH_GetCentralBankName] mit dem Auftrag gegründet, eine Währung für die wachsende Organisation zu verwalten. Ziel ist es, dass alle Mitglieder eine gemeinsame Währung haben und mit der Integration unserer Volkswirtschaften beginnen. Dies wird hoffentlich in Zukunft wirtschaftliche Vorteile bringen, doch der Beitritt wird kurzfristig erhebliche Probleme mit sich bringen, da sich die Menschen erst an die neue Währung gewöhnen müssen."
 BBA_african_union_events.4.a:0 "Der kurzfristige Schmerz wird sich lohnen."
 BBA_african_union_events.4.b:0 "Dies wird unserer Wirtschaft schaden."
 BBA_african_union_events.5.t:1 "[FROM.GetNameDefCap] lehnt die Mitgliedschaft bei [ETH_GetCentralBankName] ab"
 BBA_african_union_events.5.desc:1 "Die Regierung von [FROM.GetNameDefCap] hat sich geweigert, der [ETH_GetCentralBankName] beizutreten und zieht es stattdessen vor, auf absehbare Zeit die Kontrolle über ihre eigene Währung und Handelszölle zu behalten."
 BBA_african_union_events.5.a:0 "Eine kurzsichtige Entscheidung."
 BBA_african_union_events.6.t:1 "[FROM.GetNameDefCap] tritt dem [ETH_GetCentralBankName] bei"
 BBA_african_union_events.6.desc:1 "[FROM.GetNameDefCap] haben sich bereit erklärt, der [ETH_GetCentralBankName] beizutreten und haben nun mit der Angleichung ihrer Währung an unsere begonnen. Bald wird der Handel zwischen unseren Ländern deutlich einfacher sein."
 BBA_african_union_events.6.a:0 "Eine weise Entscheidung."
 BBA_african_union_events.7.t:0 "Exekutivrat der Organisation für Afrikanische Einheit"
 BBA_african_union_events.7.desc:0 "Die Organisation für Afrikanische Einheit hat einen Exekutivrat eingerichtet, der die politischen Angelegenheiten ihrer Mitglieder regelt. Der Rat besteht aus Vertretern der Mitgliedsstaaten und versucht, die Außen- und Innenpolitik in eine einheitliche Richtung zu lenken. Ein Beitritt wäre ein Schritt in Richtung einer vollständigen politischen und wirtschaftlichen Integration mit den anderen Mitgliedsstaaten. Ein Beitritt würde jedoch offensichtlich einen Verlust unserer derzeitigen politischen Unabhängigkeit bedeuten."
 BBA_african_union_events.7.a:0 "Wir setzen uns für eine tiefere Integration ein."
 BBA_african_union_events.7.b:0 "Dafür haben wir uns nicht angemeldet."
 BBA_african_union_events.8.t:0 "[FROM.GetNameDefCap] tritt dem Exekutivrat bei"
 BBA_african_union_events.8.desc:0 "Die Regierung von [FROM.GetNameDef] hat sich bereit erklärt, dem Exekutivrat der Organisation für Afrikanische Einheit beizutreten. Sie ist derzeit dabei, die entsprechenden Verträge zu unterzeichnen, die die Autorität des Rates in allen Rechtsfragen anerkennen."
 BBA_african_union_events.8.a:0 "Ein Schritt näher zur vollständigen Integration."
 BBA_african_union_events.9.t:0 "[FROM.GetNameDefCap] weigert sich, dem Exekutivrat beizutreten"
 BBA_african_union_events.9.desc:0 "Die Regierung von [FROM.GetNameDef] hat sich geweigert, dem Exekutivrat der Organisation für Afrikanische Einheit beizutreten. [FROM.GetLeader] führt [FROM.GetLeader.GetHerHis] Bedenken hinsichtlich der Souveränität und den Wunsch an, ohne Zustimmung des Rates Abkommen mit Ländern außerhalb der Organisation zu schließen."
 BBA_african_union_events.9.a:0 "Warum sind sie überhaupt ein Mitgliedstaat?"
 BBA_african_union_events.10.t:0 "[FROM.GetNameDefCap] Förderung der Organisation für Afrikanische Einheit"
 BBA_african_union_events.10.desc:0 "[FROM.GetNameDefCap] haben in unserem Land eine Propagandakampagne gestartet, um das Ansehen der Organisation für Afrikanische Einheit zu verbessern. Damit wollen sie zweifellos Druck auf uns ausüben, uns stärker in die Organisation zu integrieren."
 BBA_african_union_events.10.a:0 "Sie sollten sich nicht in unsere Angelegenheiten einmischen."
 BBA_african_union_events.11.t:0 "[FROM.GetAdjective] Druck"
 BBA_african_union_events.11.desc:0 "[FROM.GetNameDefCap] haben Mitglieder unserer Regierung persönlich bedroht, wenn wir nicht beginnen, unsere politischen Ziele mit ihren in Einklang zu bringen. Damit wollen wir zweifellos Druck auf uns ausüben, eine stärkere Integration in die Organisation für Afrikanische Einheit anzustreben."
 BBA_african_union_events.11.a:0 "Wir werden in Zukunft noch sorgfältiger vorgehen."
 BBA_african_union_events.11.b:0 "Wir lassen uns von [ETH.GetLeader] nicht einschüchtern."
 BBA_african_union_events.12.t:0 "Der vollständige Integrationsprozess beginnt"
 BBA_african_union_events.12.desc:0 "Die Afrikanische Union hat den Prozess ihrer vollständigen Integration eingeleitet. Hoffentlich wird dies zu einem positiveren Kapitel in der Geschichte unseres Volkes führen, doch das endgültige Ziel der Afrikanischen Union bleibt abzuwarten."
 BBA_african_union_events.12.a:0 "Wir wussten, dass dieser Tag kommen würde."
 BBA_african_union_events.13.t:0 "[FROM.GetNameDefCap] verlässt die Organisation für Afrikanische Einheit"
 BBA_african_union_events.13.desc:0 "[FROM.GetLeader] hat den Austritt von [FROM.GetNameDef] aus der Organisation für Afrikanische Einheit angekündigt. Sie äußerten Bedenken hinsichtlich der Ausrichtung der Organisation und warfen uns vor, die Werte zu verraten, auf denen sie gegründet wurde."
 BBA_african_union_events.13.a:0 "Wir sind uns einig, anderer Meinung zu sein"
 BBA_african_union_events.14.t:0 "[FROM.GetNameDefCap] verlässt die Organisation für Afrikanische Einheit"
 BBA_african_union_events.14.desc:0 "[FROM.GetLeader] hat den Austritt von [FROM.GetNameDef] aus der Organisation für Afrikanische Einheit angekündigt. Sie äußerten Bedenken hinsichtlich der Ausrichtung der Organisation und warfen uns vor, die Werte zu verraten, auf denen sie gegründet wurde."
 BBA_african_union_events.14.a:0 "Wir sind uns einig, dass wir anderer Meinung sind."
 BBA_african_union_events.14.b:0 "Das ist unerhört!"
 BBA_african_union_events.15.t:0 "Verteidigungsabkommen der Organisation für Afrikanische Einheit"
 BBA_african_union_events.15.desc:0 "Die Organisation für Afrikanische Einheit hat ein gegenseitiges Verteidigungsabkommen zwischen ihren Mitgliedsstaaten vorgeschlagen. Dies würde bedeuten, dass ein Angriff auf ein Mitglied als Angriff auf alle Mitgliedsstaaten gewertet würde. Dies würde hoffentlich ausländische Angreifer von Angriffen auf Mitglieder der Organisation abschrecken und Kriege zwischen den Mitgliedern verhindern."
 BBA_african_union_events.15.a:0 "Dadurch werden Konflikte vermieden."
 BBA_african_union_events.15.b:0 "An einer solchen Regelung sind wir nicht interessiert."
 BBA_african_union_events.16.t:0 "[FROM.GetNameDefCap] lehnt Verteidigungsabkommen ab"
 BBA_african_union_events.16.desc:0 "[FROM.GetNameDefCap] hat das Verteidigungsabkommen der Organisation für Afrikanische Einheit abgelehnt. Es bleibt abzuwarten, ob dies einen Wandel in ihrer langfristigen Haltung gegenüber der Organisation darstellt oder ob der Vorschlag aufgrund innenpolitischer Gründe einfach zum falschen Zeitpunkt kommt."
 BBA_african_union_events.16.a:0 "Sehr verdächtig."
 BBA_african_union_events.17.t:0 "[FROM.GetNameDefCap] tritt dem Verteidigungspakt bei"
 BBA_african_union_events.17.desc:0 "[FROM.GetNameDefCap] hat sich bereit erklärt, dem Verteidigungspakt der Organisation für Afrikanische Einheit beizutreten. Im Falle eines Angriffs auf eine der beiden Parteien sind wir nun verpflichtet, uns gegenseitig zu schützen."
 BBA_african_union_events.17.a:0 "Hervorragende Neuigkeiten."
 BBA_african_union_events.18.t:0 "Verteidigungsabkommen der Organisation für Afrikanische Einheit in Anspruch genommen"
 BBA_african_union_events.18.desc:0 "Ein Unterzeichnerstaat des Verteidigungsabkommens der Organisation für Afrikanische Einheit wurde angegriffen. Als Mitunterzeichnerstaat sind wir nun verpflichtet, ihm militärisch zu helfen. Sollten wir uns weigern, würden wir zweifellos aus dem Abkommen ausgeschlossen und könnten die diplomatischen Beziehungen zu unseren Mitunterzeichnern schädigen."
 BBA_african_union_events.18.a:0 "Natürlich werden wir sie verteidigen."
 BBA_african_union_events.18.b:0 "Vielleicht war die Unterschrift ein Fehler."
 BBA_african_union_events.19.t:0 "[FROM.GetNameDefCap] Kommt zu unserer Verteidigung"
 BBA_african_union_events.19.desc:0 "[FROM.GetName] haben sich bereit erklärt, ihre Verteidigungsverpflichtungen als Mitunterzeichner des gegenseitigen Verteidigungsabkommens der Organisation für Afrikanische Einheit einzuhalten."
 BBA_african_union_events.19.a:0 "Gemeinsam werden wir siegreich sein."
 BBA_african_union_events.20.t:0 "[FROM.GetNameDefCap] bricht Verteidigungsabkommen"
 BBA_african_union_events.20.desc:0 "[FROM.GetName] haben sich geweigert, ihren Verteidigungsverpflichtungen nachzukommen, obwohl sie Mitunterzeichner des gegenseitigen Verteidigungsabkommens der Organisation für Afrikanische Einheit sind. Wir sind nun dabei, sie aus dem Abkommen auszuschließen."
 BBA_african_union_events.20.a:0 "Sie haben uns alle verraten."
 BBA_african_union_events.21.t:0 "[THIS.GetAdjective] Wirtschaftswachstum"
 BBA_african_union_events.21.desc:1 "Unsere Wirtschaftsleistung erlitt kürzlich durch die Einführung der neuen Währung von [ETH_GetCentralBankName] einen Rückschlag. Unsere Produktion und unser Ertrag steigen jedoch nun wieder an und übertreffen sogar frühere Rekorde. Ökonomen führen das Wachstum auf den Abbau von Handelsbarrieren zwischen [THIS.GetNameDef] und den anderen Mitgliedern zurück, die die gemeinsame Währung nutzen. Dies hat eine stärkere Integration unserer Volkswirtschaften ermöglicht."
 BBA_african_union_events.21.a:1 "Es hat sich endlich ausgezahlt."
 BBA_african_union_events.22.t:0 "Einschüchterungsversuch in [FROM.GetNameDef] erfolglos"
 BBA_african_union_events.22.desc:0 "Die Führung von [FROM.GetNameDef] reagierte empört auf unsere Einschüchterungsversuche. Es ist unwahrscheinlich, dass sie in naher Zukunft zur Zusammenarbeit bereit sein werden."
 BBA_african_union_events.22.a:0 "Das können sie nicht ewig durchhalten."
 BBA_african_union_events.23.t:0 "Einschüchterungsversuch in [FROM.GetNameDef] erfolgreich"
 BBA_african_union_events.23.desc:0 "Die Führung von [FROM.GetNameDef] hat sich nach Kräften bemüht, unsere Bedenken hinsichtlich der politischen Ausrichtung innerhalb der Organisation für Afrikanische Einheit zu zerstreuen. Sie ging sogar so weit, zu versprechen, vor künftigen vorschnellen Entscheidungen Konsultationen mit unseren Botschaftern zu treffen."
 BBA_african_union_events.23.a:0 "Exzellent."

####### ITALY ######

 BBA_italy_second_italo_ethiopian_war.1.t:0 "[FROM.GetAdjective] Friedensangebot"
 BBA_italy_second_italo_ethiopian_war.1.desc:1 "Wir haben [FROM.GetName] auf der Flucht! Unsere mächtigen Armeen haben so schwere Verluste verursacht, dass die [FROM.GetAdjective]s auf bloßen Knien um Frieden betteln. Unser Land ist vom Krieg zerrissen, und Frieden wäre uns sehr willkommen, aber dies könnte auch eine großartige Gelegenheit sein, unseren Sieg noch weiter voranzutreiben – um sicherzustellen, dass kein anderes dummes europäisches Land erneut versucht, das unbesiegbare Äthiopien zu erobern!"
 BBA_italy_second_italo_ethiopian_war.1.a:0 "Es ist Frieden!"
 BBA_italy_second_italo_ethiopian_war.1.b:0 "Niemals, weiter drängen!"
 BBA_italy_second_italo_ethiopian_war.2.t:0 "[FROM.GetName] nimmt [ROOT.GetAdjective] Friedensangebot an"
 BBA_italy_second_italo_ethiopian_war.2.desc:0 "Unser großzügiges Friedensangebot wurde von den Abessiniern angenommen. Dies ist zwar weit entfernt von dem glorreichen Sieg, den wir uns zu Beginn des Krieges vorgestellt hatten, aber vielleicht können wir Trost darin finden, dass der Krieg nun vorbei ist. Wir werden diese Demütigung überwinden, wie wir es schon so oft getan haben, und wir werden uns erheben – stärker denn je!"
 BBA_italy_second_italo_ethiopian_war.2.a:0 "So eine peinliche Angelegenheit..."
 BBA_italy_second_italo_ethiopian_war.3.t:0 "[FROM.GetName] lehnt [ROOT.GetAdjective] Friedensangebot ab"
 BBA_italy_second_italo_ethiopian_war.3.desc:0 "Wenn sie Krieg wollen, werden wir ihnen nachgeben! Die Abessinier haben unser großzügiges Friedensangebot abgelehnt und sind entschlossen, weiterzukämpfen. Wir werden diesen undankbaren Narren zeigen, was wahre italienische Entschlossenheit ausmacht! Dies ist nur ein Rückschlag. Wir werden sie in die Berge zurückdrängen und sie dann vollständig überrennen."
 BBA_italy_second_italo_ethiopian_war.3.a:0 "Wir werden das Blatt im Krieg wenden!"

#1st Missiolini localized at the beginning of the file along with Italo-Ethiopian War events
 BBA_italy_missiolinis.02_north.t:0 "Die Stände der Nordfront"
 BBA_italy_missiolinis.02_north.desc:0 "Der erwartete Erfolg unserer Gegenoffensive in Nordabessinien ist nicht in Sicht. Der Duce schwört, dass die ganze Welt über ihn und den mangelnden Kriegsfortschritt lacht. Er ist halbwegs entschlossen, die Führung der Nordoffensive persönlich zu übernehmen, um für die richtige Motivation und Führung der Truppen zu sorgen."
 BBA_italy_missiolinis.02_north.a:0 "Wir werden uns durchsetzen – irgendwann"
 BBA_italy_missiolinis.02_north.b:0 "Wir brauchen einen Führungswechsel!"
 BBA_italy_missiolinis.02_north.c:0 "Ein eklatanter Misserfolg!"
 BBA_italy_missiolinis.04_south.t:0 "Die Stände der Südfront"
 BBA_italy_missiolinis.04_south.desc:0 "Die Gegenoffensive des Südens in Abessinien hat die vom Duce angestrebten Ziele nicht erreicht. Stundenlang schwadroniert er daher über Inkompetenz und Idiotie. Er scheint überzeugt zu sein, dass die militärische Führung gegen ihn arbeitet und die Generäle den gesamten Krieg scheitern sehen wollen."
 BBA_italy_missiolinis.04_south.a:0 "Wir werden uns durchsetzen – irgendwann"
 BBA_italy_missiolinis.04_south.b:0 "Wir brauchen einen Führungswechsel!"
 BBA_italy_missiolinis.04_south.c:0 "Ein eklatanter Misserfolg!"
 BBA_italy_missiolinis.03_north.t:1 "Erfolg in Nordäthiopien"
 BBA_italy_missiolinis.03_north.desc:0 "Mussolini hatte für die Armeen in Nordabessinien und ihren Erfolg bei der Zurückdrängung ihrer erbitterten Gegner nur Lob und Bewunderung übrig. Natürlich zweifelte er nie an der Stärke unserer Truppen – solange sie von ihrem Duce die richtige Motivation und die nötigen Mittel erhielten, um sich durchzusetzen."
 BBA_italy_missiolinis.03_north.a:0 "Wir haben sie jetzt auf der Flucht!"
 BBA_italy_missiolinis.05_south.t:1 "Erfolg in Südäthiopien"
 BBA_italy_missiolinis.05_south.desc:0 "Überglücklich über die jüngsten Erfolge in Südabessinien lobte Mussolini den Mut der italienischen Truppen und ihren Einsatz bei der Beendigung dieses Konflikts. Er hatte nie Bedenken und vertraute voll und ganz darauf, dass unsere Armeen die Feinde auf dem Schlachtfeld besiegen würden – sobald sie die nötige Unterstützung von ihrem Duce erhielten."
 BBA_italy_missiolinis.05_south.a:0 "Wir haben den Feind zurückgedrängt!"
 BBA_italy_missiolinis.11.t:0 "Beende den Krieg"
 BBA_italy_missiolinis.11.desc:0 "Der Duce will nun ein schnelles Ende des Krieges in Abessinien, damit Italien sich anderen Ruhmesgebieten zuwenden kann. Die Eroberung des antiken Axum würde Italiens Stellung als eines der größten Weltreiche festigen. \n\nDie verbliebenen abessinischen Festungen müssen erobert werden, und alle abessinischen Länder müssen in italienischer Hand sein."
 BBA_italy_missiolinis.11.a:0 "Der Feind wird besiegt!"
 BBA_italy_missiolinis.12.t:0 "Der Krieg geht weiter"
 BBA_italy_missiolinis.12.desc:0 "Die Tatsache, dass Abessinien noch immer frei ist und sich der Besatzung widersetzt, hat den Duce stundenlang in Rage gebracht und ihn als eine Blamage bezeichnet; nicht nur für ihn persönlich, sondern auch für Italien und sein Volk. Hätte er die letzten Phasen des Krieges nur selbst überwachen können, wäre es längst geschehen, beschwert er sich bei allen in seiner Umgebung."
 BBA_italy_missiolinis.12.a:0 "Die Abessinier leisten harten Widerstand"
 BBA_italy_missiolinis.13.t:1 "Die Eroberung Äthiopiens"
 BBA_italy_missiolinis.13.desc:0 "Mussolini ist begeistert und prahlt weithin mit unserem jüngsten Sieg, egal ob er ihm zuhört oder nicht. Er hatte nie Zweifel daran, dass Italien in Abessinien siegen und triumphieren würde, trotz der zahlreichen Rückschläge. Wir haben endlich die Niederlage des ersten Italienisch-Abessinien-Krieges gerächt! \n\nDer Duce feierte die Eroberung als Sieg des faschistischen Systems und seiner Regierung und bezeichnete das italienische Volk als stärker und geeinter denn je."
 BBA_italy_missiolinis.13.a:0 "Nur Blut bewegt die Räder der Geschichte"
 BBA_italy_missiolinis.21.t:1 "Befriedung Äthiopiens"
 BBA_italy_missiolinis.21.desc:0 "Der Duce hat öffentlich erklärt, dass die Abessinier nach ihrer Niederlage niedergeschlagen und auf der Flucht sind. Ihr Wille ist gebrochen. Insgeheim jedoch verflucht er die Abessinier für ihre Widerstandskraft und ihren Widerstand gegen die italienische Herrschaft. Der Duce hat den Befehl gegeben, mit brutaler Gewalt gegen den lokalen Widerstand vorzugehen und Gesetze zur Eindämmung der Bevölkerung zu erlassen. Er will das ganze Land so schnell wie möglich befrieden und an Italien anschließen."
 BBA_italy_missiolinis.21.a:0 "Wir werden Frieden und Stabilität bringen"
 BBA_italy_missiolinis.22.t:1 "Äthiopien leistet weiterhin Widerstand"
 BBA_italy_missiolinis.22.desc:0 "Abessinien ist noch lange nicht befriedet, und der Widerstand gegen die italienische Besatzung ist weiterhin groß. Der Duce findet weder für das abessinische Volk noch für die Bemühungen, den Widerstand zu unterdrücken, freundliche Worte und bezeichnet die Operation als nationale Schande. Er beklagt das raue Aussehen und die groben Manieren der italienischen Kolonisten, was bei der einheimischen Bevölkerung keinen Respekt hervorruft."
 BBA_italy_missiolinis.22.a:0 "Die Abessinier sind zäher als erwartet"
 BBA_italy_missiolinis.23.t:1 "Die Befriedung Äthiopiens"
 BBA_italy_missiolinis.23.desc:0 "Es ist uns endlich gelungen, den Widerstand in Abessinien zu brechen. Von den hohen Berggipfeln bis zu den tiefen Wüstenebenen finden die Menschen dort ihren Platz in der italienischen Gemeinschaft. Erfreut erklärte Mussolini, er könne sich nun anderen Dingen zuwenden, damit Italien gedeihen und das einfordern könne, was ihm rechtmäßig zusteht."
 BBA_italy_missiolinis.23.a:0 "Italien ist die Nummer eins"
 BBA_italy_missiolinis.31.t:0 "Industrialisierungsprogramm"
 BBA_italy_missiolinis.31.desc:0 "Damit Italien wirklich florieren kann, plant der Duce den Ausbau unserer Produktionskapazitäten. Um diese Vision einer prosperierenden Nation zu verwirklichen, brauchen wir mehr Fabriken, die das Wachstum unseres florierenden Imperiums unterstützen können."
 BBA_italy_missiolinis.31.a:0 "Erweitern Sie die Branchen"
 BBA_italy_missiolinis.32.t:0 "Verzögerter Industrialisierungsfortschritt"
 BBA_italy_missiolinis.32.desc:0 "Der Duce empfindet den mangelnden Fortschritt beim Ausbau der italienischen Industriekapazitäten als beunruhigend. Er beklagt die ihm auferlegten Zwänge – ohne dass er selbst dafür verantwortlich ist –, die die Verwirklichung seiner Vision eines wohlhabenden Italiens so viel schwieriger machen."
 BBA_italy_missiolinis.32.a:0 "Wir müssen uns mehr anstrengen"
 BBA_italy_missiolinis.33.t:0 "Erfolgreiches Industrialisierungsprogramm"
 BBA_italy_missiolinis.33.desc:0 "Mussolini begrüßte die neu errichteten Fabriken als ersten Schritt zur Modernisierung der italienischen Industrie. Der Duce ist sehr erfreut darüber, wie dies die Produktionskapazität des Landes steigert und ihm ermöglicht, seine Vision eines Großitaliens voranzutreiben."
 BBA_italy_missiolinis.33.a:0 "Der erste Schritt zur Größe"
 BBA_italy_missiolinis.41.t:0 "Stärkung des Militärs"
 BBA_italy_missiolinis.41.desc:0 "Wie das Römische Reich erstreckt sich auch unser aufstrebendes Reich weit und breit und benötigt eine starke Armee, um es vor den Barbarenhorden direkt hinter den Grenzen zu schützen. Der Duce ist überzeugt, dass Italien, um mit den anderen Großmächten mithalten zu können, seinen Worten Taten folgen lassen muss – sonst wird uns niemand ernst nehmen!"
 BBA_italy_missiolinis.41.a:0 "Für Italien!"
 BBA_italy_missiolinis.42.t:0 "Gescheiterte militärische Expansion"
 BBA_italy_missiolinis.42.desc:0 "Der Mangel an italienischen Soldaten bereitet dem Duce erneut Sorge, da er die langen Grenzen zu unseren Rivalen als Schwachstelle betrachtet. Nach unserem kürzlich gescheiterten Versuch, die Truppenstärke zu erhöhen, fühlt sich der Duce geschlagen und beginnt, die Hingabe des Volkes für sein Ziel, Italiens Größe wiederherzustellen, in Frage zu stellen."
 BBA_italy_missiolinis.42.a:0 "Italien wird geschützt - irgendwie"
 BBA_italy_missiolinis.43.t:0 "Das erweiterte italienische Militär"
 BBA_italy_missiolinis.43.desc:0 "Mussolini hat persönlich einige der neu aufgestellten Truppen inspiziert, die unsere Grenzen schützen und ihre Truppenstärke erweitern sollen, wenn der Duce es für nötig erachtet. Er ist sehr erfreut über die gestiegene Zahl der Divisionen und prahlt damit, dass Italien allein dank seiner Weitsicht nun über eine respektable Armee verfügt, deren Stärke selbst unsere Feinde nicht leugnen können."
 BBA_italy_missiolinis.43.a:0 "Italien steht sicher"
 BBA_italy_missiolinis.51.t:0 "Erweiterung der Versorgungs-LKW-Flotte"
 BBA_italy_missiolinis.51.desc:0 "Unsere jüngsten Konflikte haben gewisse Defizite in unserer logistischen Unterstützung der Armee offengelegt. Der Duce konnte vom italienischen Oberkommando überzeugt werden, eine neue Versorgungsflotte an Lastwagen zu bestellen. Ursprünglich wollte er 5000 brandneue italienische Lastwagen montieren lassen, doch man überredete ihn, weniger zu akzeptieren – nachdem man ihm versichert hatte, dass dies ausreichen würde."
 BBA_italy_missiolinis.51.a:0 "Wenigstens sind es nicht 5000 LKWs"
 BBA_italy_missiolinis.52.t:0 "Zu wenige Begleitfahrzeuge"
 BBA_italy_missiolinis.52.desc:0 "Die gescheiterte Lieferung neuer Lastwagen an die Armee veranlasste den Duce, die dahinterstehenden Industriekräfte zu kritisieren und sich über mangelnde Visionen zu beklagen. Er ist überzeugt, dass niemand außer ihm das große Potenzial für Italien und seine Bevölkerung wirklich erkennen kann."
 BBA_italy_missiolinis.52.a:0 "Unsere Armeen müssen auskommen ohne"
 BBA_italy_missiolinis.53.t:0 "Die Flotte der Begleitfahrzeuge wurde verstärkt"
 BBA_italy_missiolinis.53.desc:0 "Mussolini gratulierte den Fabriken persönlich, die die neuen Lastwagen für die Armee produzierten, und bezeichnete die Arbeiter als das Rückgrat Italiens. Er erwartet nun eine mobilere Streitmacht, die sich schnell über große Gebiete bewegen kann, ohne durch mangelhafte Logistik eingeschränkt zu werden."
 BBA_italy_missiolinis.53.a:0 "Dies wird unsere Armeen sicherlich unbesiegbar machen"
 BBA_italy_missiolinis.61.t:0 "Kraftstoffreserveprogramm"
 BBA_italy_missiolinis.61.desc:0 "Eine moderne Armee marschiert nicht nur mit ihrem Magen, sondern auch mit ihrem Treibstoff, und wenn dieser fehlt, kommt die gesamte Kriegsmaschinerie zum Stillstand. Das italienische Oberkommando hat den Duce schließlich davon überzeugt, dass ein modernes Militär durch Treibstoffmangel völlig ausgebremst wird. Alle Zweige des Militärs brauchen ihn, und wir müssen in der Lage sein, große Mengen an Treibstoff bereitzustellen, um auf dem Schlachtfeld erfolgreich zu sein."
 BBA_italy_missiolinis.61.a:0 "Wir müssen Treibstoff horten"
 BBA_italy_missiolinis.62.t:0 "Unzureichende Kraftstoffreserven"
 BBA_italy_missiolinis.62.desc:0 "Der Mangel an Treibstoffreserven bereitet dem Oberkommando ständig Sorgen. Es befürchtet, dass Flugzeuge am Boden bleiben, Schlachtschiffe vor Anker gehen und die Armeen stillstehen. Der Duce ist sich sicher, dass Italien – wie immer – durchhalten wird, ist aber wütend, weil seine ausdrücklichen Befehle bisher nicht erfüllt wurden."
 BBA_italy_missiolinis.62.a:0 "Wir müssen es schaffen"
 BBA_italy_missiolinis.63.t:0 "Erfolgreiche Erweiterung der Treibstoffreserven"
 BBA_italy_missiolinis.63.desc:0 "Mussolini ist fest davon überzeugt, dass das italienische Militär nun bereit ist, einen umfassenden Krieg zu führen, und dass ihm nicht sofort der Treibstoff ausgehen wird. Das Oberkommando der Armee ist zwar nicht ganz so beruhigt, wird aber dennoch durch die bisher angesammelten Reserven entlastet."
 BBA_italy_missiolinis.63.a:0 "Unsere Reserven werden uns sicher zugute kommen"
 BBA_italy_missiolinis.71.t:0 "Ausbau der Luftwaffe"
 BBA_italy_missiolinis.71.desc:1 "Seit der Duce die Aeronautica gründete, ist sie zu einem Symbol des Nationalstolzes und einer der größten Luftwaffen der Welt geworden. Das einzige Problem ist, dass sie zu klein ist. Der Duce konnte nun davon überzeugt werden, zusätzliche Flugzeuge zur Verstärkung der Aeronautica zu produzieren."
 BBA_italy_missiolinis.71.a:0 "Die Aeronautica ist unser ganzer Stolz"
 BBA_italy_missiolinis.72.t:0 "Eine dürftige Luftwaffe"
 BBA_italy_missiolinis.72.desc:0 "Die Produktion neuer Flugzeuge war als großes Propagandastück des Duce geplant, der nun seine ursprünglichen Pläne zurückschrauben muss. Der Mangel an neuen Flugzeugen macht den Duce wütend und er sucht nach einem Schuldigen für dieses Fiasko."
 BBA_italy_missiolinis.72.a:0 "Unglücklich"
 BBA_italy_missiolinis.73.t:0 "Die Luftwaffe wurde erfolgreich verstärkt"
 BBA_italy_missiolinis.73.desc:0 "Mussolini hatte ein persönliches Interesse an der Stärkung der Luftwaffe und nutzte die Produktion neuer Flugzeuge als Gelegenheit, den italienischen Industrialismus zu präsentieren. Mit der Aeronautica im Mittelpunkt entstanden mehrere Propagandawerke, die die italienische Luftfahrt und Ingenieurskunst feierten."
 BBA_italy_missiolinis.73.a:0 "Die Aeronautica wird triumphieren!"
 BBA_italy_missiolinis.81.t:0 "Technologische Innovationen"
 BBA_italy_missiolinis.81.desc:0 "Der Duce hat beschlossen, die Überlegenheit des faschistischen Systems zu demonstrieren und zu zeigen, wie es Ressourcen und Anstrengungen effektiver bündeln kann. Er will den Italienern – und dem Rest der Welt – zeigen, mit welcher Geschwindigkeit der Faschismus technologische Fortschritte erzielen kann. Er hofft auch, dass dies das historisch gespaltene italienische Volk unter dem Faschismus vereinen und einen wird."
 BBA_italy_missiolinis.81.a:0 "Die ganze Welt wird sehen"
 BBA_italy_missiolinis.82.t:0 "Unbefriedigender technologischer Fortschritt"
 BBA_italy_missiolinis.82.desc:0 "Der Versuch, die Stärke des faschistischen Systems zu demonstrieren, ging für den Duce nach hinten los. Er verfluchte jeden, der in seine Nähe kam. Anstatt die Menschen für den Faschismus zu gewinnen, sind sie skeptischer und flüstern untereinander darüber, was für ein Narr Mussolini sei. Zumindest glaubt das der Duce."
 BBA_italy_missiolinis.82.a:0 "Nur ein kleiner Rückschlag"
 BBA_italy_missiolinis.83.t:0 "Große technologische Innovationen"
 BBA_italy_missiolinis.83.desc:0 "Der angekündigte technologische Sprung, den das faschistische System machen könnte, hat sich ausgezahlt, und Mussolini zögerte nicht, die unter seiner Führung hervorgebrachten Innovationen zu präsentieren. Die Botschaft handelt ebenso vom Faschismus wie von Mussolini und seiner Vision für Italien. Ob dies die Italiener so vereinen und einen wird, wie der Duce es sich erhofft hatte, bleibt abzuwarten."
 BBA_italy_missiolinis.83.a:0 "Für Duce und Vaterland!"
 BBA_italy_missiolinis.91.t:0 "Ausbau des Nachrichtendienstes"
 BBA_italy_missiolinis.91.desc:0 "Der Duce ließ sich dazu bewegen, unserem Geheimdienst zusätzliche Mittel zur Verfügung zu stellen, mit dem Versprechen, ihn zu einem der besten der Welt zu machen. Dies wiederum brachte ihn dazu, öffentlich damit zu prahlen, wie unsere Agenten jeden Aspekt der italienischen Gesellschaft infiltriert hätten, um Kommunisten, Kriminelle und andere schädliche Elemente ans Licht zu bringen und vor Gericht zu stellen, wodurch Italien sicherer geworden sei."
 BBA_italy_missiolinis.91.a:0 "Den Nachrichtendienst erweitern"
 BBA_italy_missiolinis.92.t:0 "Ein Geheimdienst-Fiasko"
 BBA_italy_missiolinis.92.desc:0 "Anstatt den Geheimdienst zu stärken, sind mehrere geheime Dokumente durchgesickert – ein belastendes Bild unserer Agenten. Auch wenn die Dokumente keine wirklich wichtigen Geheimnisse enthielten, sind sie eine Blamage für den Duce, der sich vor kurzem noch mit unserem Geheimdienstapparat gebrüstet hat. Dies wird nicht nur den Duce verärgern, sondern auch in der italienischen Bevölkerung und bei unseren Feinden Zweifel an unseren Fähigkeiten wecken."
 BBA_italy_missiolinis.92.a:0 "Wirklich eine Peinlichkeit"
 BBA_italy_missiolinis.93.t:0 "Eine großartige Geheimdienstleistung"
 BBA_italy_missiolinis.93.desc:0 "Die Kompetenz unseres Geheimdienstes wurde zweifelsfrei bewiesen, nachdem mehrere oppositionelle Bürger festgenommen wurden, weil sie geplant hatten, der faschistischen Regierung Italiens mit ausländischer Hilfe zu schaden. Mussolini nutzte diesen Erfolg, um zu verdeutlichen, dass Italien unter seiner Führung siegen und alle zukünftigen Schwierigkeiten überwinden wird."
 BBA_italy_missiolinis.93.a:0 "Wirklich eine Leistung"
 BBA_italy_missiolinis.101.t:0 "Albanien besetzen"
 BBA_italy_missiolinis.101.desc:0 "Die engen Verbindungen zwischen Italien und Albanien reichen Jahrtausende zurück, bis ins Römische Reich. Zwischen unseren beiden Nationen besteht eine starke historische Verbindung, die der Duce unbedingt vertiefen möchte. Er will Albanien in Italien eingliedern und fordert eine rasche Besetzung des Landes, damit wir die volle Kontrolle über die Adria-Bucht erlangen. Dies würde Italien Ruhm und Ansehen bringen, das von vielen anderen Nationen zu lange als schwächere Macht angesehen wurde – so behauptet er zumindest."
 BBA_italy_missiolinis.101.a:0 "Ruhm für Italien!"
 BBA_italy_missiolinis.102.t:0 "Scheitern in Albanien"
 BBA_italy_missiolinis.102.desc:0 "Dass unsere Soldaten in Albanien kaum vorankommen, verwirrt den Duce, der es als nationale Blamage bezeichnet. Privat murmelt er wütend, dies hätte ein glorreicher Moment für Italien – und ihn selbst – sein sollen und unseren demütigenden Abzug von dort vor fast 20 Jahren rechtfertigen. Stattdessen, sagt er, seien wir durch Inkompetenz und Feigheit verraten worden."
 BBA_italy_missiolinis.102.a:0 "Schändlich"
 BBA_italy_missiolinis.103.t:0 "Die Besetzung Albaniens"
 BBA_italy_missiolinis.103.desc:0 "Mussolini verkündete vor einer begeisterten Menge voller Freude den Sieg unserer Truppen in Albanien. Er fuhr fort, dass das ganze Land nun in unserer Hand sei und dass dies Italien zu weiterer Größe und Ruhm führen werde. „Die Tage der alten Reiche sind gezählt, und die Tage Italiens stehen noch bevor“, verkündete er."
 BBA_italy_missiolinis.103.a:0 "Für noch kommenden Ruhm!"
 BBA_italy_missiolinis.111.t:0 "Erobern Sie Dalmatien"
 BBA_italy_missiolinis.111.desc:0 "Obwohl wir zu den Siegern des Ersten Weltkriegs gehörten und uns durch den Londoner Pakt Dalmatien versprochen worden war, wurden wir von unseren sogenannten Verbündeten verraten. „Wir haben nie bekommen, was uns versprochen wurde, also müssen wir es uns nun mit Gewalt holen“, behauptet der Duce. Er erklärte weiter, es sei Italiens Schicksal, sich zu nehmen, was uns rechtmäßig gehöre – egal, was die alten Mächte sagen."
 BBA_italy_missiolinis.111.a:0 "Dalmatien gehört zu Recht uns"
 BBA_italy_missiolinis.112.t:0 "Die ins Stocken geratene Invasion Dalmatiens"
 BBA_italy_missiolinis.112.desc:0 "Was als schnelle Invasion der Adriaküste geplant war, entwickelte sich zu einer mühsamen Plackerei. Unsere Truppen stecken in Dalmatien fest und konnten dem italienischen Volk den versprochenen großen Eroberungszug nicht abliefern. Der Duce wurde mehrmals in einem fast katatonischen Zustand angetroffen, während er murmelte, Dalmatien gehöre rechtmäßig uns. Dies war nicht die Machtdemonstration, die sich der Duce erhofft hatte."
 BBA_italy_missiolinis.112.a:0 "Dies vertieft nur die Ungerechtigkeit uns gegenüber"
 BBA_italy_missiolinis.113.t:0 "Die Eroberung Dalmatiens"
 BBA_italy_missiolinis.113.desc:0 "Ein schweres Unrecht ist endlich wiedergutgemacht! Die dalmatinische Küste gehört uns. Mussolini ist euphorisch und nennt diesen Sieg einen großen Moment für Italien und sein Volk. Er erklärte, ein großes Unrecht sei endlich behoben. Die Menschen gingen auf die Straße, um diesen bedeutsamen Anlass zu feiern."
 BBA_italy_missiolinis.113.a:0 "Ein rückgängig gemachtes Unrecht"
 BBA_italy_missiolinis.121.t:0 "Griechenland unterwerfen"
 BBA_italy_missiolinis.121.desc:0 "In einer kürzlich gehaltenen Rede skizzierte der Duce seine Vision eines Großitaliens. Er betonte dabei unter anderem, wie wir die Beschränkungen überwinden müssen, die uns die anderen Großmächte auferlegt haben. Er bezeichnete Griechenland als einen entscheidenden Punkt für Italien und seine Expansion, ein Hindernis, das es zu überwinden gilt, damit wir uns über die uns auferlegten Fesseln hinaus entwickeln können."
 BBA_italy_missiolinis.121.a:0 "„Brich die Fesseln"
 BBA_italy_missiolinis.122.t:0 "Peinlichkeit in Griechenland"
 BBA_italy_missiolinis.122.desc:0 "Griechenlands bergiges Gelände hat sich für unsere Truppen als unüberwindbares Hindernis erwiesen. Sie sind behindert und festgenagelt. Der Duce ist immer noch davon überzeugt, dass der Sieg uns gehören wird – ja, uns gehören muss – und weigert sich, Rückschläge anzuerkennen. Er argumentiert leidenschaftlich, dass unsere Überlegenheit am Ende siegen wird."
 BBA_italy_missiolinis.122.a:0 "Der Widerstand war heftig"
 BBA_italy_missiolinis.123.t:0 "Die Unterwerfung Griechenlands"
 BBA_italy_missiolinis.123.desc:0 "Wie die römischen Legionen vor uns haben wir nun die Truppen des Feindes besiegt und ganz Griechenland erobert. Mussolini hielt im Schatten des Parthenon eine mitreißende Rede, in der er Italien und Griechen als brüderliche Völker mit einer jahrhundertelangen gemeinsamen Geschichte bezeichnete und erklärte, dass sie nun frei seien, ihren eigenen Weg durch die Geschichte zu bestimmen."
 BBA_italy_missiolinis.123.a:0 "„Für vergangenen und zukünftigen Ruhm"
 BBA_italy_missiolinis.131.t:0 "Befreie das Tessin"
 BBA_italy_missiolinis.131.desc:0 "Seit Hannibal mit seinen Elefanten die Alpen überquerte, dienten die Berge den Barbaren als Weg direkt ins Herz Italiens. Der Duce wollte schon lange die nördlichen Gebirgspässe sichern und die Gelegenheit nutzen, die italienischsprachigen Tessiner in ihr Mutterland zu integrieren – und so das italienische Volk, wo immer es auch sein mag, zu vereinen."
 BBA_italy_missiolinis.131.a:0 "Rettet das italienische Volk im Tessin!"
 BBA_italy_missiolinis.132.t:0 "Gescheiterte Befreiung des Tessins"
 BBA_italy_missiolinis.132.desc:0 "Der Duce wusste, dass die Schweizer im Tessin hart umkämpft sein würden, doch die mangelnden Fortschritte ließen ihn wanken. Kurz nachdem unsere Offensive ins Stocken geraten war, begann der Duce, sich in die Pläne des Generals einzumischen und dessen Kompetenz in Frage zu stellen, was der italienischen Öffentlichkeit nicht entging."
 BBA_italy_missiolinis.132.a:0 "Der Mangel an Fortschritt ist beunruhigend"
 BBA_italy_missiolinis.133.t:0 "Die erfolgreiche Befreiung des Tessins"
 BBA_italy_missiolinis.133.desc:0 "Mussolini reiste persönlich ins Tessin, um die dortigen Italienischsprachigen in der italienischen Gemeinschaft willkommen zu heißen und ihnen und ganz Italien eine glänzende Zukunft zuzusichern. Er erklärte außerdem, die Nordgrenzen seien nun gesichert und Italien könne alle Barbaren abwehren, die versuchen würden, die Alpen zu überqueren."
 BBA_italy_missiolinis.133.a:0 "Ein überwältigender Sieg"
 BBA_italy_missiolinis.201.t:0 "Stärkung des politischen Kabinetts"
 BBA_italy_missiolinis.201.desc:0 "Es ist immer schwierig, die richtigen Leute für die richtigen Positionen zu finden – vor allem, wenn es an den richtigen Leuten mangelt. Der Duce ist überzeugt, dass er für den Erfolg Italiens – und des Faschismus – fähige und qualifizierte Leute für das Kabinett finden muss. Er wird jemanden damit beauftragen, diese Leute überall zu finden."
 BBA_italy_missiolinis.201.a:0 "Kein Stein bleibt auf dem anderen"
 BBA_italy_missiolinis.202.t:0 "Das dysfunktionale politische Kabinett"
 BBA_italy_missiolinis.202.desc:0 "Der Duce ist wütend, weil es ihm nicht gelungen ist, das politische Kabinett ausreichend zu erweitern. Er bezeichnet es als dysfunktional. Er wirft jedem, der ihm nahe steht, Idiotie und Niedertracht vor, weil er gegen ihn und die Größe Italiens arbeitet, die er erreichen will."
 BBA_italy_missiolinis.202.a:0 "Es ist schwer, von Inkompetenz umgeben zu sein"
 BBA_italy_missiolinis.203.t:0 "Erfolgreiches politisches Kabinett"
 BBA_italy_missiolinis.203.desc:0 "In einer kürzlichen Rede vor dem Politischen Kabinett sagte Mussolini, nur die besten Köpfe Italiens seien für diesen Posten geeignet. Anschließend prahlte er damit, dass er bei der Suche nach den richtigen Leuten zur Verstärkung des Kabinetts nichts unversucht gelassen habe und dass seine Standhaftigkeit Italien langfristig zugutekommen werde."
 BBA_italy_missiolinis.203.a:0 "Nur die Klügsten und Hellsten"
 BBA_italy_missiolinis.211.t:0 "Stärkung des militärischen Oberkommandos"
 BBA_italy_missiolinis.211.desc:0 "Der Duce weist seit dem Italienisch-Abessinischen Krieg immer wieder auf den vermeintlichen Mangel an Kompetenz und Erfahrung in der militärischen Führung hin. Er möchte dies ändern, indem er würdige Kandidaten in Spitzenpositionen innerhalb des Militärs befördert, um unsere strategische und taktische Entscheidungsfindung in kommenden Konflikten zu stärken."
 BBA_italy_missiolinis.211.a:0 "Das muss sich ändern"
 BBA_italy_missiolinis.212.t:0 "Mangelnde militärische Kompetenz"
 BBA_italy_missiolinis.212.desc:0 "Der Duce befürchtet, dass seine Aufmerksamkeit zu sehr zerstreut wird, wenn er persönlich die Verantwortung für militärische Aktionen übernehmen muss, und scheut sich nicht, sich über den Mangel an kompetenten Leuten im Militär zu beschweren. Er ist überzeugt, dass dieses Problem Italiens Untergang bedeuten wird, wenn sich die Lage zum Schlechteren wendet."
 BBA_italy_missiolinis.212.a:0 "Es ist heutzutage schwer, kompetente Leute zu finden"
 BBA_italy_missiolinis.213.t:0 "Effektives militärisches Oberkommando"
 BBA_italy_missiolinis.213.desc:0 "Angesichts der jüngsten Beförderungen im militärischen Oberkommando vertraue Mussolini mehr denn je auf die militärischen Fähigkeiten Italiens, erklärte der Duce in einer Reihe von Reden. Er lobte die verschiedenen Teilstreitkräfte und ihre Tapferkeit und Fähigkeiten und sagte den Truppen, er sei von ihren zukünftigen Erfolgen überzeugt."
 BBA_italy_missiolinis.213.a:0 "Kompetente Führung ist der Schlüssel zum Erfolg"
 BBA_italy_missiolinis.council:0 "Der Große Rat hat weitere bevorstehende Sorgen ..."
 ITA_missiolinis_reroll_tt:0 "Der Große Rat des Faschismus wird dafür sorgen, dass Mussolini seine Meinung ändert und bald einen neuen Befehl erlässt."

 BBA_italy_local_rulers.1.t:0 "$ETH_haile_selassie_gugsa$ wendet sich an italienische Beamte"
 BBA_italy_local_rulers.1.desc:0 "Haile Selassie Gugsa, ein abessinischer Armeekommandeur und Mitglied der kaiserlichen Familie, ist in der Hoffnung auf einen Deal an uns herangetreten. Dies ist ein großer Moment für uns und ein demütigender für die Abessinier. Wir können diese Gelegenheit zwar nutzen und zu unserem Vorteil ausschlachten, sollten aber nicht vergessen, dass dieser Mann in den Augen vieler Abessinier ein Verräter ist; seine Unterstützung ist mit gewissen Vorbehalten verbunden."
 BBA_italy_local_rulers.1.a:0 "Die Einheimischen könnten durch die Gewährung einiger Zugeständnisse zufriedengestellt werden."
 BBA_italy_local_rulers.1.b:0 "Machen Sie $ETH_haile_selassie_gugsa$ zum Gouverneur der Region."
 BBA_italy_local_rulers.1.c:0 "$ETH_haile_selassie_gugsa$ und seine Anhänger müssen unterworfen werden."
 BBA_italy_local_rulers.1.d:0 "Es wird keine Verhandlungen mit den lokalen Herrschern geben."
 BBA_italy_local_rulers.2.t:0 "$ETH_abba_jofir$ wendet sich an italienische Beamte"
 BBA_italy_local_rulers.2.desc:0 "Während unserer Eroberung von Addis Abeba befreiten wir den ehemaligen König von Jimma, Abba Jofir, der vor Ausbruch des Krieges mit uns kollaboriert hatte. Nun bittet er uns um Unterstützung, um seine frühere Macht wiederherzustellen. Dies könnte sich für uns als vorteilhaft erweisen, da er immer noch Einfluss hat. Doch seit seine Verschwörung mit uns aufgedeckt wurde, betrachten viele ihn ebenfalls als Verräter."
 BBA_italy_local_rulers.2.a:0 "Die Einheimischen könnten durch die Gewährung einiger Zugeständnisse zufriedengestellt werden."
 BBA_italy_local_rulers.2.b:0 "Machen Sie $ETH_abba_jofir$ zum Gouverneur der Region."
 BBA_italy_local_rulers.2.c:0 "$ETH_abba_jofir$ und seine Anhänger müssen unterworfen werden."
 BBA_italy_local_rulers.2.d:0 "Es wird keine Verhandlungen mit den lokalen Herrschern geben."
 BBA_italy_local_rulers.3.t:0 "$ETH_hailu_tekle_haymanot$ wendet sich an italienische Beamte"
 BBA_italy_local_rulers.3.desc:0 "Ein abgesetzter abessinischer Adliger, Hailu Tekle Haymanot, hat uns kontaktiert und behauptet, wir könnten uns gegenseitig nützen. Er bietet uns seine Dienste im Gegenzug für eine Position in unserer Regierung in Abessinien an. Als ehemaliger Herrscher mag dies unseren Zwecken dienen, doch die bloße Tatsache, dass er ein ehemaliger Herrscher ist, wird auch Auswirkungen auf die lokale Bevölkerung haben, die sich möglicherweise seiner Herrschaft widersetzen wird."
 BBA_italy_local_rulers.3.a:0 "Die Einheimischen könnten durch die Gewährung einiger Zugeständnisse zufriedengestellt werden."
 BBA_italy_local_rulers.3.b:0 "Machen Sie $ETH_hailu_tekle_haymanot$ zum Gouverneur der Region."
 BBA_italy_local_rulers.3.c:0 "$ETH_hailu_tekle_haymanot$ und seine Anhänger müssen unterworfen werden."
 BBA_italy_local_rulers.3.d:0 "Es wird keine Verhandlungen mit den lokalen Herrschern geben."
 BBA_italy_local_rulers.4.t:0 "$ETH_seyoum_mengesha$ wendet sich an italienische Beamte"
 BBA_italy_local_rulers.4.desc:0 "Bei unserem überwältigenden Sieg über die Abessinier gelang es uns, einen ihrer führenden Armeekommandeure und ein Mitglied der kaiserlichen Familie gefangen zu nehmen: Seyoum Mengesha. Uns wird berichtet, dass der abessinische Kaiser Haile Selassie diesen Mann sehr schätzt. Wir können diesen Gefangenen nutzen, um den Kaiser weiter zu demütigen und uns vielleicht die Loyalität des Volkes zu sichern. Natürlich wird er keine wirkliche Macht haben, aber er wird tun, was ihm gesagt wird."
 BBA_italy_local_rulers.4.a:0 "Die Einheimischen könnten durch die Gewährung einiger Zugeständnisse zufriedengestellt werden."
 BBA_italy_local_rulers.4.b:0 "Machen Sie $ETH_seyoum_mengesha$ zum Gouverneur der Region."
 BBA_italy_local_rulers.4.c:0 "$ETH_seyoum_mengesha$ und seine Anhänger müssen unterworfen werden."
 BBA_italy_local_rulers.4.d:0 "Es wird keine Verhandlungen mit den lokalen Herrschern geben."

 ITA_ends_event_chain_tt:0 "§REnds-Ereigniskette§!."

 BBA_italy_air_accident.01.t:1 "Der tragische Tod von $ITA_italo_balbo$"
 BBA_italy_air_accident.01.desc:1 "Feldmarschall Italo Balbo wurde über Libyen durch Eigenbeschuss abgeschossen. Eine falsche Identifizierung führte dazu, dass Flugabwehrbatterien das Feuer eröffneten und seine Maschine vom Himmel schossen. General Giuseppe Tellera, der in einer anderen Maschine reiste, überlebte den Unfall, ist aber von dem Erlebnis erschüttert."
 BBA_italy_air_accident.01.a:0 "Ein verheerender Schlag..."
 BBA_italy_air_accident.02.t:1 "Der tragische Tod von $ITA_giuseppe_tellera$"
 BBA_italy_air_accident.02.desc:1 "Nach einer Fehlidentifizierung geriet Feldmarschall Italo Balbos Flugzeug über Libyen unter Eigenbeschuss von Flugabwehrbatterien. Glücklicherweise entkam er unverletzt, doch sein Stabschef, General Giuseppe Tellera, hatte weniger Glück und wurde abgeschossen. Wütend maßregelte Balbo die gesamte Kompanie – einschließlich der Offiziere – mit harten Maßnahmen."
 BBA_italy_air_accident.02.a:0 "Tragisch..."
 BBA_italy_air_accident.03.t:0 "Tragödie durch Eigenbeschuss abgewendet"
 BBA_italy_air_accident.03.desc:1 "Feldmarschall Italo Balbo geriet nach einer Fehlidentifikation über Libyen unter Eigenbeschuss von Flugabwehrbatterien. Balbo gelang es, Kontakt zu den Bodentruppen aufzunehmen und sich vom Sperrfeuer fernzuhalten. Er überredete die Flugabwehrbesatzung, das Feuer einzustellen, und landete sein Flugzeug erfolgreich. Der Feldmarschall wurde für seinen Mut und seine Ruhe in dieser heiklen Situation gelobt."
 BBA_italy_air_accident.03.a:0 "Balbos Tapferkeit rettete den Tag!"
 BBA_italy_air_accident.11.t:0 "Tragischer Flugzeugabsturz"
 BBA_italy_air_accident.11.desc:1 "Auf dem Weg zur Inspektion der französischen Grenze kam es bei der Maschine von Luftwaffenchef Aldo Pellegrini und General Pietro Pintor zu Motorproblemen. Die Maschine stürzte ab, und an Bord blieb niemand am Leben."
 BBA_italy_air_accident.11.a:0 "[ROOT.GetNameDefCap] hat zwei hervorragende Offiziere verloren."
 BBA_italy_air_accident.12.t:0 "Flugzeugabsturz"
 BBA_italy_air_accident.12.desc:1 "Auf dem Weg zur französischen Grenze bekam die Maschine von Luftwaffenchef Aldo Pellegrini und General Pietro Pintor Motorprobleme und verlor rapide an Höhe. Angesichts des sicheren Todes übernahm Pellegrini die Steuerung und konnte dank seiner Erfahrung mit Savoia-Marchetti-Flugzeugen eine Bruchlandung durchführen. Alle an Bord überlebten, wenn auch mit schweren Verletzungen. "
 BBA_italy_air_accident.12.a:0 "Das Glück ist mit ihnen!"
 ITA_pellegrini_promotion_tt:0 "\nDie Eigenschaft $air_chief$ wurde von §YSpezialist§! auf §YSpezialist§! verbessert."

 BBA_italy_naval_cooperation_programs.01.t:0 "Italienisches Marinekooperationsprogramm"
 BBA_italy_naval_cooperation_programs.01.desc:1 "Wir haben von [From.GetName] ein Angebot erhalten, an einem Marinekooperationsprogramm teilzunehmen. Ein solches Programm könnte für uns sehr nützlich sein, aber es wäre ebenso nützlich für die [FROM.GetAdjective]-Marine."
 BBA_italy_naval_cooperation_programs.01.a:0 "Ein vorteilhaftes Angebot!"
 BBA_italy_naval_cooperation_programs.01.b:0 "Die Italiener haben uns nichts zu bieten."
 BBA_italy_naval_cooperation_programs.02.t:1 "[FROM.GetNameDefCap] tritt dem $ITA_naval_cooperation_program_research_group_name$ bei"
 BBA_italy_naval_cooperation_programs.02.desc:1 "Es scheint, dass [From.GetName] eine vernünftige Entscheidung getroffen und sich für die Teilnahme an unserem Marinekooperationsprogramm entschieden hat. Dies wird sicherlich beiden Seiten zugutekommen und unsere Fähigkeiten stärken!"
 BBA_italy_naval_cooperation_programs.02.a:0 "Lassen Sie die Experten an die Arbeit gehen!"
 BBA_italy_naval_cooperation_programs.03.t:1 "[FROM.GetNameDefCap] Lehnt das $ITA_naval_cooperation_program_research_group_name$ ab"
 BBA_italy_naval_cooperation_programs.03.desc:1 "[FROM.GetName] hat es dummerweise abgelehnt, an unserem Marine-Kooperationsprogramm teilzunehmen, weil er Einsamkeit mit Stärke verwechselt hat, obwohl der Weise weiß, dass in der Menge Stärke liegt."
 BBA_italy_naval_cooperation_programs.03.a:0 "Eine unerwartet dumme Wahl."
 BBA_italy_naval_cooperation_programs.04.t:0 "Gemeinsame Manöver mit der [FROM.GetAdjective] Marine"
 BBA_italy_naval_cooperation_programs.04.desc:1 "Die [FROM.GetAdjective]s bieten uns die Teilnahme an einer gemeinsamen Marineübung an und sagen, dass wir nur durch die Vorbereitung auf den Krieg für unsere Feinde gerüstet sein werden, wenn sie kommen."
 BBA_italy_naval_cooperation_programs.04.a:0 "Avanti!"
 BBA_italy_naval_cooperation_programs.04.b:0 "Die Italiener haben uns nichts zu bieten."
 BBA_italy_naval_cooperation_programs.05.t:0 "[ROOT.GetAdjective]-[FROM.GetAdjective] Manöver im Gange"
 BBA_italy_naval_cooperation_programs.05.desc:1 "[FROM.GetName] hat unser Angebot eines gemeinsamen Marinemanövers angenommen, da ihm bewusst ist, dass wir vorbereitet und bereit sein müssen, falls unsere Feinde über uns herfallen sollten."
 BBA_italy_naval_cooperation_programs.05.a:0 "Fabelhaft!"
 BBA_italy_naval_cooperation_programs.06.t:0 "[FROM.GetNameDefCap] lehnt unseren Vorschlag ab"
 BBA_italy_naval_cooperation_programs.06.desc:1 "Die Kurzsichtigkeit von [FROM.GetName] ist erstaunlich! Dass sie unser Angebot einer gemeinsamen Marineübung zur besseren Vorbereitung unserer Flotten ablehnen, zeugt nur von ihrer Arroganz."
 BBA_italy_naval_cooperation_programs.06.a:0 "[FROM.GetLeader] hat das nicht richtig durchdacht …"
 BBA_italy_naval_cooperation_programs.07.t:0 "[ROOT.GetAdjective]-[FROM.GetAdjective] Manöver"
 BBA_italy_naval_cooperation_programs.07.desc:1 "Unsere Admirale freuen sich, Ihnen mitteilen zu können, dass unsere jüngste Marineübung ein voller Erfolg war! Wir haben viele neue Erkenntnisse gewonnen und sind für zukünftige Einsätze auf hoher See besser gerüstet."
 BBA_italy_naval_cooperation_programs.07.a:0 "Zeit, unsere Erkenntnisse in die Praxis umzusetzen!"
 ITA_joint_maneuvers_with_country_remove_effect_tt:0 "Auswirkungen nach Abschluss des gemeinsamen Manöverprogramms in §Y[?ITA.ITA_joint_maneuvers_with_country_days]§! Tagen:"
 BBA_italy_naval_cooperation_programs.08.t:1 "[FROM.GetAdjective] Angebot zum Kauf von Begleitschiffen"
 BBA_italy_naval_cooperation_programs.08.desc:1 "Die [FROM.GetAdjective]s haben uns angeboten, uns einige ihrer Begleitschiffe zu verkaufen. Einige dieser Schiffe sind ziemlich alt und veraltet, aber vielleicht finden wir für unsere Marine noch eine Verwendung für sie."
 BBA_italy_naval_cooperation_programs.08.a:0 "Dies wird die [ROOT.GetAdjective]-Flotte stärken!"
 BBA_italy_naval_cooperation_programs.08.b:0 "Wir brauchen keinen [ITA.GetAdjective]-Schrott."
 BBA_italy_naval_cooperation_programs.09.t:0 "[FROM.GetNameDefCap] stimmt dem Kauf unserer Begleitschiffe zu"
 BBA_italy_naval_cooperation_programs.09.desc:1 "[FROM.GetName] hat sich bereit erklärt, einige unserer alten und veralteten Begleitschiffe zu kaufen. Sie müssen wirklich verzweifelt sein, wenn sie sich mit diesen veralteten Schiffen zufrieden geben. Dennoch wird der Verkauf und die Ausmusterung unserer Flotte die Leistungsfähigkeit insgesamt stärken, da sie dadurch schneller und wendiger wird."
 BBA_italy_naval_cooperation_programs.09.a:0 "Ein gutes Geschäft!"
 BBA_italy_naval_cooperation_programs.10.t:0 "[FROM.GetNameDefCap] Lehnt unsere Eskortschiffe ab"
 BBA_italy_naval_cooperation_programs.10.desc:1 "[FROM.GetName] ließ sich nicht so leicht davon überzeugen, unsere alten und veralteten Begleitschiffe zu kaufen, wie wir gehofft hatten. Wir müssen uns anderswo umsehen, um diese veralteten Schiffe loszuwerden."
 BBA_italy_naval_cooperation_programs.10.a:0 "Wir werden andere Käufer finden."
 ITA_cooperation_programs_deal_others_tt:0 "([ROOT.GetEscortShipsSender]): Überträgt §Y2 Zerstörer der Curtatone-Klasse§! und §Y2 Zerstörer der Maestrale-Klasse§! an [ROOT.GetEscortShipsReceiver]."
 ITA_cooperation_programs_deal_root_tt:0 "[ROOT.GetFlag]§Y[ROOT.GetName]§!"
 ITA_cooperation_programs_deal_from_tt:0 "[FROM.GetFlag]§Y[FROM.GetName]§!"
 BBA_italy_naval_cooperation_programs.11.t:0 "[ITA.GetNameDefCap] Bietet Zerstörer"
 BBA_italy_naval_cooperation_programs.11.desc:1 "Die [FROM.GetAdjective]s haben uns zwei ihrer älteren Zerstörer angeboten. Kostenlos. Diese Schiffe mögen zwar etwas veraltet sein, könnten unserer Marine aber immer noch gute Dienste leisten. Das ist wirklich eine großzügige Geste. "
 BBA_italy_naval_cooperation_programs.11.a:0 "Wir schätzen die Geste!"
 BBA_italy_naval_cooperation_programs.12.t:0 "Unsere Zerstörer der Aquila-Klasse kommen in Spanien an"
 BBA_italy_naval_cooperation_programs.12.desc:1 "Die [FROM.GetAdjective]-Marine hat unsere Zerstörer erhalten, die wir ihnen so großzügig geschenkt haben. Kostenlos. Hoffentlich werden sie sinnvoll eingesetzt."
 BBA_italy_naval_cooperation_programs.12.a:0 "Arriverderci!"
 BBA_italy_naval_cooperation_programs.13.t:0 "[FROM.GetNameDefCap] Lehnt unsere Zerstörer ab"
 BBA_italy_naval_cooperation_programs.13.desc:1 "Die [FROM.GetAdjective] hat unser Geschenk von zwei Zerstörern etwas arrogant abgelehnt. Kostenlos. Ihre Flotte muss wirklich mächtig sein, um ein solches Angebot abzulehnen!"
 ITA_cede_aquila_class_destroyers_tt:0 "([ROOT.GetEscortShipsSender]): Überträgt §Y2 Aquila-Klasse-Zerstörer§! an [ROOT.GetEscortShipsReceiver]."
 BBA_italy_naval_cooperation_programs.14.t:0 "[ITA.GetName] exportiert Kleinst-U-Boote"
 BBA_italy_naval_cooperation_programs.14.desc:1 "Die [FROM.GetAdjective]s haben sich nach unserem Interesse am Kauf von fünf Kleinst-U-Booten erkundigt. Sie sind zwar nur begrenzt einsetzbar, könnten aber unseren Bedürfnissen gerecht werden und unsere Marinekapazitäten erweitern."
 BBA_italy_naval_cooperation_programs.14.a:0 "Sie können sich für unsere Marine als nützlich erweisen."
 BBA_italy_naval_cooperation_programs.14.b:0 "Kein Interesse, weiter geht&#39;s."
 BBA_italy_naval_cooperation_programs.15.t:0 "[FROM.GetName] kauft unsere Kleinst-U-Boote"
 BBA_italy_naval_cooperation_programs.15.desc:1 "Die [FROM.GetAdjective] Marine erkannte einige Vorteile unserer Kleinst-U-Boote und beschloss, sie zu kaufen. Dies ist in der Tat ein großer Moment sowohl für die Ingenieure unseres Landes als auch für unsere eigene Marine."
 BBA_italy_naval_cooperation_programs.15.a:0 "Fabelhaft!"
 BBA_italy_naval_cooperation_programs.16.t:0 "[FROM.GetName] lehnt unser Angebot ab"
 BBA_italy_naval_cooperation_programs.16.desc:1 "Die [FROM.GetAdjective] Marine sah keinen Vorteil darin, unsere Kleinst-U-Boote zu kaufen. Das liegt daran, dass sie engstirnig und, offen gesagt, einfältig ist, da unsere U-Boote von höchster Qualität sind."
 BBA_italy_naval_cooperation_programs.17.t:0 "[ITA.GetAdjective] Kleinst-U-Boote erreichen [ROOT.GetName]"
 BBA_italy_naval_cooperation_programs.17.desc:1 "Die [FROM.GetAdjective] Kleinst-U-Boote sind endlich eingetroffen und verstärken unsere Marinekapazitäten! Sie werden sicherlich eine großartige Ergänzung unserer Flotte sein und wir werden sie gut nutzen."
 BBA_italy_naval_cooperation_programs.17.a:0 "Lassen Sie sie arbeiten!"
 BBA_italy_human_torpedo_raid.1.t:0 "Razzia gegen [?ITA.ITA_raided_state_var.GetName]"
 BBA_italy_human_torpedo_raid.1.desc:0 "Den Italienern gelang es, unsere Hafenverteidigung in [?ITA.ITA_raided_state_var.GetName] zu umgehen und in sehr kleinen Booten in den dortigen Marinestützpunkt einzudringen, um einen Angriff auf unsere dort angedockten Schiffe durchzuführen. Zwar wurde bei dem Angriff keines der Schiffe versenkt, aber es kam zu Beschädigungen, deren Reparatur einige Zeit in Anspruch nehmen wird."
 BBA_italy_human_torpedo_raid.1.a:0 "Am bedauerlichsten"
 ITA_human_torpedo_raid_tt:0 "Dieser Raid kann nur einmal durchgeführt werden."
 ITA_human_torpedo_effect_tt:0 "Wird feindliche Marineeinheiten beschädigen, die im Staat vor Anker liegen."
 ITA_human_torpedo_target_effect_tt:0 "Beschädigt Marineeinheiten, die in [?ITA.ITA_raided_state_var.GetName] angedockt sind."

 BBA_italy_colonial_management.1.t:0 "Kolonialpolizei"
 BBA_italy_colonial_management.1.desc:1 "Unser Kolonialbesitz ist seit der Gründung unserer Nation vor weniger als einem Jahrhundert erheblich gewachsen. Dieses Wachstum belastet jedoch unsere Arbeitskräfte. Es gibt jedoch Möglichkeiten, diese Einschränkungen zu mildern, indem man lokale Polizeikräfte wie Meharisti, Savari, Spahi und andere einsetzt. Die Rekrutierung dieser Gruppen würde unsere eigenen Kräfte weniger belasten, und sie haben den Vorteil, in ihren Ländern heimisch zu sein, mit allem, was das mit sich bringt."
 BBA_italy_colonial_management.1.a:2 "Rekrutieren Sie sie!"
 BBA_italy_colonial_management.1.b:0 "Wir haben andere Pläne"
 BBA_italy_colonial_management.1_do_not_apply_tt:1 "Besatzungsrecht §Y$colonial_police$§! wird in kontrollierten [GetAfricanStates][GetAndOrNothing][GetAlbanianStates] verfügbar sein."
 BBA_italy_colonial_management_african_states:0 "Afrikanische Staaten"
 BBA_italy_colonial_management_albanian_states:0 "Albanische Staaten"
 BBA_italy_colonial_management_and:0 " Und "

 BBA_italy_bop.1.t:1 "Der Fall von [?ITA.ITA_lost_core.GetName]"
 BBA_italy_bop.1.desc:1 "Wir haben [?ITA.ITA_lost_core.GetName] an den Feind verloren! Das hat natürlich das Vertrauen der italienischen Bevölkerung in unsere Kriegsanstrengungen erschüttert und sogar Stimmen für Friedensgespräche laut werden lassen. Diese Wendung der Ereignisse hat viele, gelinde gesagt, verärgert, und die Menschen suchen nach jemandem, dem sie die Schuld geben können. Wir müssen die Initiative zurückgewinnen und die feindlichen Kräfte aus Italien vertreiben!"
 BBA_italy_bop.1.a:1 "Das ist eine Katastrophe!"
 ITA_losing_cores_tt:0 "Die Effekte werden jedes Mal angewendet, wenn [ROOT.GetName] die Kontrolle über einen §YKernzustand§! an einen Feind verliert."
 BBA_italy_bop.2.t:1 "Der Fall von [?ITA.ITA_lost_colony.GetName]"
 BBA_italy_bop.2.desc:1 "Feindliche Streitkräfte haben die Kontrolle über [?ITA.ITA_lost_colony.GetName] übernommen und schockieren damit die Italiener überall! Die Menschen glaubten, das Kriegsglück sei zu unseren Gunsten oder würde es zumindest bald sein. Obwohl dies definitiv ein Rückschlag ist, werden wir [?ITA.ITA_lost_colony.GetName] mit guter Planung und Standhaftigkeit sicher zurückerobern!"
 BBA_italy_bop.2.a:1 "Wir werden wieder auferstehen!"
 ITA_losing_colonies_tt:1 "Effekte werden jedes Mal angewendet, wenn [ROOT.GetName] die Kontrolle über einen §YNicht-Kernstaat§! an einen Feind verliert, solange der Wert niedriger als §Y30 %§! in Richtung §Y$ITA_grand_council_side$§! ist."
 BBA_italy_bop.3.t:0 "Wir haben [?ITA.ITA_reclaimed_core.GetName] zurückerobert"
 BBA_italy_bop.3.desc:0 "Unsere siegreichen Streitkräfte haben [?ITA.ITA_reclaimed_core.GetName] zurückerobert und den Kampfgeist der Italiener überall gestärkt! Dies könnte der Moment sein, in dem wir das Blatt im Krieg wenden und die Feinde aus unserem geliebten [ITA.GetNameDef] vertreiben."
 BBA_italy_bop.3.a:0 "Das Blatt wendet sich zu unseren Gunsten!"
 ITA_reclaiming_cores_tt:0 "Effekte werden jedes Mal angewendet, wenn [ROOT.GetName] einen §Ycore state§! von einem Feind zurückfordert."

 BBA_italy_council_deposes_duce.1.t:0 "Absetzen [?ITA.ITA_var_deposed_leader.GetName]"
 BBA_italy_council_deposes_duce.1.desc:0 "Um Italien vor dem Ruin zu bewahren und das faschistische System zu erhalten, müssen wir das Undenkbare tun: [?ITA.ITA_var_deposed_leader.GetName] von der Macht entfernen! Seine Inkompetenz und Unzulänglichkeit haben unser Land und seinen Fortschritt lange Zeit belastet. Es ist unsere Pflicht, das [FROM.GetAdjective] Volk und seine Zukunft zu schützen!"
 BBA_italy_council_deposes_duce.1.a:0 "Für das Gemeinwohl"

 BBA_italy_civil_war.1.t:0 "Italienischer Bürgerkrieg"
 BBA_italy_civil_war.1.desc:1 "Unser geliebtes Italien ist unter den Belastungen des Krieges zerbrochen! Es bilden sich gegnerische Seiten, die um die Überreste unserer Nation und um die Ideale Italiens für die Zukunft kämpfen. Wir alle stehen vor schwierigen Entscheidungen, aber wir müssen durchhalten und durchhalten, damit wir wieder aufblühen können. "
 BBA_italy_civil_war.1.a:1 "Wir brauchen eine feste Hand!"
 BBA_italy_civil_war.1.b:1 "Wir brauchen Stabilität und Tradition!"
 BBA_italy_civil_war.1.c:1 "Umarme die Volksrevolution!"
 BBA_italy_civil_war.1.d:1 "Lasst die Freiheit herrschen!"
 BBA_italy_civil_war.2.t:0 "$ITA_fronte_militare_clandestino$"
 BBA_italy_civil_war.2.desc:1 "Es scheint, als würde eine neu gegründete Widerstandsgruppe hinter unseren Frontlinien Schaden anrichten. Soweit wir über die Gruppe Bescheid wissen, besteht sie größtenteils aus ehemaligen Armeeoffizieren, die die Seiten gewechselt haben. Es laufen Bemühungen, sie herauszulocken, aber wir haben derzeit zu wenig Informationen, um ihren nächsten Schritt vorherzusagen."
 BBA_italy_civil_war.2.a:1 "Sie können sich nicht für immer verstecken"
 BBA_italy_civil_war.3.t:0 "$ITA_gappisti$"
 BBA_italy_civil_war.3.desc:1 "Wir haben Informationen erhalten, dass mehrere kleine Gruppen kommunistischer Partisanen, die sich selbst Gappisti nennen, mehrere erfolgreiche Blitzangriffe auf unser Territorium durchgeführt haben. Sie sind gut ausgebildet und bewaffnet, was uns vermuten lässt, dass sie von [FROM.GetName] finanziert werden."
 BBA_italy_civil_war.3.a:1 "Verräterische Kommunisten!"
 BBA_italy_civil_war.4.t:0 "Antiparteiische Maßnahmen in [FROM.GetName]"
 BBA_italy_civil_war.4.desc:1 "Der Widerstand und die Partisanengruppen in [FROM.GetName], die unermüdlich an der Befreiung des restlichen Italiens arbeiten, waren erfolgreich! Das finstere Regime, das dort immer noch an der Macht ist, sah sich sogar gezwungen, eine neue Reihe harter Maßnahmen gegen Partisanen zu ergreifen. Dies wird es unseren Agenten erschweren, in [FROM.GetName] zu operieren, aber der Kampf für ein freies Italien geht weiter!"
 BBA_italy_civil_war.4.a:1 "Morto per la libertà!"
 BBA_italy_civil_war.5.t:0 "[FROM.GetAdjective] Forderungen nach Unabhängigkeit"
 BBA_italy_civil_war.5.desc:1 "Unsere italienischen Verbündeten und Untertanen haben darum gebeten, von unserer Herrschaft entbunden zu werden und volle Unabhängigkeit zu erhalten. Wir haben zunächst die Kontrolle über [FROM.GetName] übernommen, um sicherzustellen, dass die italienische Front nicht vollständig zusammenbricht, aber vielleicht ist es an der Zeit, ihnen die Freiheit zu gewähren."
 BBA_italy_civil_war.5.a:1 "Gewähren Sie ihnen Unabhängigkeit"
 BBA_italy_civil_war.5.b:1 "Lehnen Sie ihre Bitten um Freiheit ab"
 BBA_italy_civil_war.6.t:0 "Unabhängigkeit für [ROOT.GetNameDef]"
 BBA_italy_civil_war.6.desc:1 "Unser Verbündeter – und vorübergehender – Herrscher, [FROM.GetName], hat unseren Ruf nach Freiheit erhört und uns unsere Unabhängigkeit zurückgegeben! Dies ist ein bedeutsamer Moment für unser vom Krieg zerrissenes Land. Jetzt können wir ernsthaft mit dem Wiederaufbau beginnen und den Weg zurück zur Einheit beschreiten."
 BBA_italy_civil_war.6.a:1 "Wieder einmal sind wir Meister unseres eigenen Schicksals"
 BBA_italy_civil_war.7.t:0 "[FROM.GetName] lehnt unsere Forderungen nach Unabhängigkeit ab"
 BBA_italy_civil_war.7.desc:1 "Unsere tyrannischen [FROM.Adjective] Oberherren haben unseren ehrlichen Wunsch nach Unabhängigkeit abgelehnt! Sie waren zwar nützlich, um unseren Bürgerkrieg zu gewinnen, aber sie haben kein Recht mehr, unser Schicksal zu bestimmen oder sich in unsere Politik einzumischen. Wenn die Zeit reif ist, ist es unsere Pflicht, sie aus unserem Land zu vertreiben und uns unsere Freiheit zu sichern!"
 BBA_italy_civil_war.7.a:1 "Sie werden es bereuen!"
 BBA_italy_civil_war.7.b:0 "Wir werden zufrieden sein..."
 ITA_we_will_transfer_the_following_states_tt:0 "Folgende Zustände werden an §Y[RDS.GetFlag][RDS.GetNameDef]§! übergeben:"
 ITA_we_keep_our_occupied_states_tt:0 "Wir werden die Kontrolle über unsere derzeit besetzten Staaten behalten."
 BBA_italy_civil_war_fascist_tt:0 "Wir behalten die Kontrolle über §Y[ROOT.GetFlag][ROOT.GetNameDefCap]§!. §Y[ROOT.GetFlag][ROOT.GetNameDefCap]§! wird zu §Y$RSI_DEF$§!. [GetRsiOverlord]"
 BBA_italy_civil_war_monarchist_tt:1 "Wir werden §Y$RDS_DEF$§!, die revoltierende Seite im Bürgerkrieg mit der Ideologie der §Y$Neutralität$§! [GetRdsOverlord]"
 BBA_italy_civil_war_communist_tt:1 "Wir werden §Y$RDS_DEF$§!, die revoltierende Seite im Bürgerkrieg mit der Ideologie des §Y$Kommunismus$§! [GetRdsOverlord]"
 BBA_italy_civil_war_democratic_tt:1 "Wir werden §Y$RDS_DEF$§!, die revoltierende Seite im Bürgerkrieg mit §Y$demokratischer$§! Ideologie. [GetRdsOverlord]"
 ITA_rsi_overlord_tt:0 "Wir werden Untertan von §Y[?ITA_rsi_overlord.GetFlag][?ITA_rsi_overlord.GetNameDef]§!."
 ITA_rds_overlord_tt:0 "Wir werden Untertan von §Y[?ITA_rds_overlord.GetFlag][?ITA_rds_overlord.GetNameDef]§!."
 BBA_italy_civil_war.100.t:0 "Besetztes italienisches Gebiet"
 BBA_italy_civil_war.100.desc:0 "Wir kontrollieren italienisches Gebiet und kämpfen an der Seite eines italienischen Verbündeten. Wir könnten weitere unserer Truppen freisetzen und sie anderswo einsetzen, indem wir diese Gebiete an [RDS.GetName] übergeben."
 BBA_italy_civil_war.100.a:0 "Übertragen Sie das Gebiet"
 BBA_italy_civil_war.100.b:0 "Behalten Sie das besetzte Gebiet"
 BBA_italy_civil_war.101.t:0 "[FROM.GetName] übergibt italienisches Territorium"
 BBA_italy_civil_war.101.desc:0 "[FROM.GetName]s weiser Anführer, [FROM.GetLeader], hat uns großzügig die Kontrolle über italienisches Territorium zurückgegeben! Dies stärkt nicht nur die Moral der Truppen, sondern stärkt auch unsere Fähigkeiten und unsere Bemühungen, ganz Italien zu befreien."
 BBA_italy_civil_war.101.a:0 "Avanti!"

 BBA_italy_civil_war.300.desc:0 "Unsere Bemühungen, das Volk gegen den Faschismus zu vereinen, haben ihren Höhepunkt erreicht! Wir können nicht länger tatenlos zusehen, wie unser schönes Land verblutet. Mit unserer vereinten Kraft haben wir nun die Mittel, das faschistische Regime ein für alle Mal zu stürzen und ganz Italien von seiner Tyrannei zu befreien!"

 BBA_italy_interaction_events.1.t:1 "[ITA.GetLeader] Anforderungen [846.GetName]"
 BBA_italy_interaction_events.1.desc:0 "In einem völlig unerwarteten und unerhörten Schritt hat der italienische Staatschef [ITA.GetLeader] unsere langjährige Neutralität mit einem Ultimatum beschmutzt. Innerhalb von zwei Wochen müssen wir die Region [846.GetName] an die Italiener übergeben, sonst kommt es zum Krieg. Wie sollen wir reagieren?"
 BBA_italy_interaction_events.1.a:0 "Das ist eine Schwachstelle weniger, die wir verteidigen müssen"
 BBA_italy_interaction_events.1.b:0 "Wir würden gerne sehen, wie sie es versuchen!"

 BBA_italy_interaction_events.2.t:1 "Der feige [SWI.GetName] knickt ein"
 BBA_italy_interaction_events.2.desc:0 "Der Präsident von [SWI.GetNameDef] hat heute das Ende einer Ära für das Land verkündet. Das Land wird das italienische Gebiet von [846.GetName] an uns abtreten und auf alle italienischsprachigen Städte in der Region verzichten. Der heutige Tag markiert eine Verkleinerung der Größe und der multiethnischen Werte von [SWI.GetName], da Italienisch später auch als Amtssprache abgeschafft wurde."
 BBA_italy_interaction_events.2.a:0 "Perfekt!"

 BBA_italy_interaction_events.3.t:1 "[SWI.GetNameDef] bleibt trotzig!"
 BBA_italy_interaction_events.3.desc:0 "Die Nation [SWI.GetName] hat heute angekündigt, dass sie ihre Neutralität aufgeben wird, indem sie sich unseren Forderungen widersetzt, [846.GetName] in die italienische Welt zurückzugeben. Aufgrund dieser törichten Entscheidung bleibt uns keine andere Wahl als die vollständige und gänzliche Zerstörung des Schweizer Kantonalsystems."
 BBA_italy_interaction_events.3.a:0 "Mobilisiert die Divisione Alpini!"

 BBA_italy_interaction_events.4.t:1 "Forderungen nach der Krönung eines italienischen Prinzen"
 BBA_italy_interaction_events.4.desc:0 "Wir haben von [ITA.GetLeader] die Forderung erhalten, den italienischen Prinzen Aimone offiziell zum kroatischen König Tomislav II. zu krönen. Würden wir dieser Forderung nachkommen, würden wir zwar einen Teil unserer Unabhängigkeit einbüßen, doch könnte es sich lohnen, um künftige italienische Aggressionen abzuwehren."
 BBA_italy_interaction_events.4.a:0 "Und er soll König Tomislav sein!"
 BBA_italy_interaction_events.4.b:0 "Die Italiener werden an der Küste Dalmatiens ihr Schicksal finden"

 BBA_italy_interaction_events.5.t:0 "Die Krönung von Prinz Aimone"
 BBA_italy_interaction_events.5.desc:0 "Heute läuten in Zagreb die Glocken, als der Italiener, ehemals Prinz Aimone, zum kroatischen Tomislav II. gekrönt wird. Unser Einfluss wird sich nun weiter auf den Balkan ausdehnen, denn unsere glorreichen Tage nähern sich."
 BBA_italy_interaction_events.5.a:0 "Bellissimo!"

 BBA_italy_interaction_events.6.t:1 "Aimone an der kroatischen Grenze angehalten"
 BBA_italy_interaction_events.6.desc:0 "Prinz Aimone ist zu uns zurückgekehrt und hat berichtet, dass er auf dem Weg zu seiner Krönung in Zagreb an der kroatischen Grenze angehalten und abgewiesen wurde. Uns ist klar, dass die Kroaten uns nichts zu bieten haben und dass für sie in Zukunft nur eine militärische Besetzung möglich ist."
 BBA_italy_interaction_events.6.a:0 "Es ist Krieg!"

 BBA_italy_interaction_events.7.t:1 "Der neue Vorsitzende des Nationalkomitees"
 BBA_italy_interaction_events.7.desc:0 "Italien hat [MNT.GetLeader] zum neuen Vorsitzenden des Nationalkomitees ernannt. Dies wird unser Regime sicherlich stärken."
 BBA_italy_interaction_events.7.a:0 "In der Tat"

 BBA_italy_interaction_events.8.t:1 "[ITA.GetName] fordert die Besetzung Dalmatiens"
 BBA_italy_interaction_events.8.desc:0 "[ITA.GetLeader] von [ITA.GetNameDef] hat uns heute ein Ultimatum gestellt und verlangt, dass wir [ITA.GetName] die Besetzung der Region Dalmatien gestatten. Wenn wir [ITA.GetLeader]s Forderungen nicht nachkommen, droht uns wahrscheinlich ein militärischer Konflikt."
 BBA_italy_interaction_events.8.a:0 "Sie können es haben"
 BBA_italy_interaction_events.8.b:0 "Was glauben sie, wer sie sind?"

 BBA_italy_interaction_events.9.t:1 "[FROM.GetName] akzeptiert unsere Forderungen"
 BBA_italy_interaction_events.9.desc:0 "[FROM.GetLeader] von [FROM.GetNameDef] hat unsere Forderungen nach der Besetzung Dalmatiens bereitwillig akzeptiert und uns das Gebiet anschließend abgetreten. Sie wollen uns lieber beschwichtigen, als sich gegen uns zu stellen, was Italiens Ziele auf dem Balkan nur voranbringen wird."
 BBA_italy_interaction_events.9.a:0 "Alles nach Plan"

 BBA_italy_interaction_events.10.t:1 "Der dumme [FROM.GetLeader] hat unser Ultimatum abgelehnt"
 BBA_italy_interaction_events.10.desc:0 "Der dumme [FROM.GetLeader] von [FROM.GetNameDef] hat uns unseren rechtmäßigen Besitz verweigert, und nun ist es an der Zeit, [FROM.GetName] mit einem schnellen Angriff niederzuschlagen. Dies wird unseren Anspruch auf Dalmatien für die nahe Zukunft sichern."
 BBA_italy_interaction_events.10.a:0 "Dann ist es Kraft"

 BBA_italy_interaction_events.11.t:1 "[ITA.GetName] beansprucht den montenegrinischen Thron"
 BBA_italy_interaction_events.11.desc:0 "[ITA.GetLeader] fordert die Übergabe des montenegrinischen Throns an den italienischen Staat und die Vereinigung der Kronen unter einem gemeinsamen Banner. Dies ist offensichtlich ein wenig irreführend, aber nicht allzu weit von der Realität entfernt, da die Königin von Italien Montenegrinerin ist. Was sollen wir darauf antworten?"
 BBA_italy_interaction_events.11.a:0 "Sie können es haben"
 BBA_italy_interaction_events.11.b:0 "Was gibt ihnen ihrer Meinung nach dieses Recht?"

 BBA_italy_interaction_events.12.t:1 "[FROM.GetName] überreicht uns die montenegrinische Krone"
 BBA_italy_interaction_events.12.desc:0 "[FROM.GetLeader] hat erklärt, dass sie keinen Grund haben, sich unserem Willen zu widersetzen, und dass das Gebiet Montenegros sofort an uns übertragen wird. Heute ist ein großer Tag für die italienische Nation!"
 BBA_italy_interaction_events.12.a:0 "Perfekt!"

 BBA_italy_interaction_events.13.t:1 "[FROM.GetName] weigert sich, Montenegro auszuliefern"
 BBA_italy_interaction_events.13.desc:0 "[FROM.GetLeader] hat angekündigt, dass sie keine weiteren diplomatischen Beziehungen mit uns anstreben und dass wir unseren Anspruch auf den montenegrinischen Thron sofort aufgeben müssen. Unverzeihlich, inakzeptabel!"
 BBA_italy_interaction_events.13.a:0 "Bedauerlich!"

 BBA_italy_interaction_events.14.t:1 "[ITA.GetName] fordert eine vollständige Entmilitarisierung Westanatoliens"
 BBA_italy_interaction_events.14.desc:0 "[ITA.GetLeader] hat Sicherheitsgarantien zwischen unseren beiden Nationen gefordert, was durchaus gerechtfertigt ist. Noch empörender ist jedoch, dass [ITA.GetLeader] von uns auch die vollständige Demilitarisierung von [342.GetName] und [339.GetName] verlangt, was unsere Sicherheit gefährden könnte, da wir im Falle eines Angriffs von [ITA.GetName] oder einem ihrer Verbündeten keine ersten Verteidigungspositionen einnehmen könnten."
 BBA_italy_interaction_events.14.a:0 "Es hat für uns sowieso keinen Sinn, dort Truppen zu stationieren"
 BBA_italy_interaction_events.14.b:0 "Das würde bedeuten, dass wir uns nicht verteidigen können!"

 BBA_italy_interaction_events.15.t:1 "[FROM.GetName] entspricht unseren Anforderungen"
 BBA_italy_interaction_events.15.desc:0 "[FROM.GetName] hat unseren Forderungen zugestimmt und sich für eine vollständige Demilitarisierung Westanatoliens entschieden. Das bedeutet, dass sie viel schwächer sein werden und keine Möglichkeit haben, anfänglichen Widerstand zu leisten, wenn wir sie angreifen."
 BBA_italy_interaction_events.15.a:0 "Sie werden es nie kommen sehen"

 BBA_italy_interaction_events.16.t:1 "[FROM.GetName] verweigert uns das Recht, uns sicher zu fühlen!"
 BBA_italy_interaction_events.16.desc:0 "[FROM.GetName] hat unsere freundliche Bitte um Sicherheitsgarantien abgelehnt und uns die Entmilitarisierung von [342.GetName] und [339.GetName] verweigert. Dies ist mehr als unerhört und muss auf eigene Weise behandelt werden."
 BBA_italy_interaction_events.16.a:0 "Sie lassen uns keine Wahl"

 BBA_italy_interaction_events.17.t:1 "[ITA.GetName] übergibt [45.GetName] an [HUN.GetName]"
 BBA_italy_interaction_events.17.desc:0 "Unser Oberherr [ITA.GetName] hat heute beschlossen, das von uns kontrollierte Gebiet [45.GetName] an die Ungarn zu übergeben. Dies soll die Beziehungen zwischen Italien und Ungarn stärken, und es gibt nicht viel, was dagegen getan werden kann. Wir werden jedoch einen kleinen diplomatischen Protest einlegen, auch wenn die Vorgesetzten ihn nicht einmal lesen werden."
 BBA_italy_interaction_events.17.a:0 "Wir können nicht viel dagegen tun ..."

 BBA_italy_interaction_events.18.t:1 "Italien kommt mit einem Angebot auf uns zu"
 BBA_italy_interaction_events.18.desc:0 "[ITA.GetNameDef] hat uns ein verlockendes Angebot gemacht. Sie bieten uns den Besitz von Rhodos und den Dodekanes-Inseln im Austausch für ein Bündnis mit ihnen an. Dieses Angebot scheint fast zu gut, um wahr zu sein, ist es aber nicht. Was sollen wir tun?"
 BBA_italy_interaction_events.18.a:0 "Wir sind der griechischen Wiedervereinigung einen Schritt näher gekommen!"
 BBA_italy_interaction_events.18.b:0 "Wir werden uns den Italienern nicht beugen, egal unter welchen Bedingungen!"

 BBA_italy_interaction_events.19.t:1 "[GRE.GetNameDef] Akzeptiert unser Angebot"
 BBA_italy_interaction_events.19.desc:0 "Die griechische Regierung hat heute bekannt gegeben, dass sie unser Angebot angenommen hat und so bald wie möglich mit der militärischen Zusammenarbeit beginnen wird. Im Gegenzug erhält sie den Besitz der Dodekanes-Inseln. Wir werden sehen, wohin uns das führt."
 BBA_italy_interaction_events.19.a:0 "Und wir werden ein Bündnis haben"

 BBA_italy_interaction_events.20.t:1 "[GRE.GetNameDef] hat unser Angebot undankbar abgelehnt"
 BBA_italy_interaction_events.20.desc:0 "Die griechischen Verräter haben unser Angebot, ihnen die Inseln im Austausch für ein Bündnis zu verkaufen, abgelehnt. Dies zeugt nur von der Inkompetenz und Schwäche ihrer Regierungen."
 BBA_italy_interaction_events.20.a:0 "Ohne sie geht es uns besser"

 BBA_italy_interaction_events.21.t:1 "Italien kommt mit einem Angebot auf uns zu"
 BBA_italy_interaction_events.21.desc:0 "[ITA.GetNameDef] hat uns ein verlockendes Angebot gemacht. Sie bieten uns den Besitz von Rhodos und den Dodekanes-Inseln im Austausch für ein Bündnis mit ihnen an. Dieses Angebot scheint fast zu gut, um wahr zu sein, ist es aber nicht. Was sollen wir tun?"
 BBA_italy_interaction_events.21.a:0 "Das, Griechenland, wir haben es zuerst bekommen!"
 BBA_italy_interaction_events.21.b:0 "Wir werden uns den Italienern nicht beugen, egal unter welchen Bedingungen!"

 BBA_italy_interaction_events.22.t:1 "[TUR.GetNameDef] Akzeptiert unser Angebot"
 BBA_italy_interaction_events.22.desc:0 "Die türkische Regierung hat heute bekannt gegeben, dass sie unser Angebot angenommen hat und so bald wie möglich mit der militärischen Zusammenarbeit beginnen wird. Im Gegenzug erhält sie den Besitz der Dodekanes-Inseln. Wir werden sehen, wohin uns das führt."
 BBA_italy_interaction_events.22.a:0 "Und wir werden ein Bündnis haben"

 BBA_italy_interaction_events.23.t:1 "[TUR.GetNameDef] hat unser Angebot undankbar abgelehnt"
 BBA_italy_interaction_events.23.desc:0 "Die türkischen Verräter haben unser Angebot, ihnen die Inseln im Austausch für ein Bündnis zu verkaufen, abgelehnt. Dies zeugt nur von der Inkompetenz und Schwäche ihrer Regierungen."
 BBA_italy_interaction_events.23.a:0 "Ohne sie geht es uns besser"

 BBA_italy_interaction_events.24.t:1 "Deutschland versucht den Anschluss Österreichs"
 BBA_italy_interaction_events.24.desc:0 "Der niederträchtige deutsche Staat versucht, sich in die österreichische Politik einzumischen und das Land einzuverleiben. Wir haben ihm bereits Garantien gegeben, und unsere Bevölkerung erwartet von uns, dass wir uns für ihn einsetzen. Möglicherweise könnten wir auch die Briten und Franzosen um Hilfe bitten. Was sollen wir tun?"
 BBA_italy_interaction_events.24.a:0 "Wir können sie alleine besiegen!"
 BBA_italy_interaction_events.24.b:0 "Es könnte gut sein, um Hilfe zu bitten"
 BBA_italy_interaction_events.24.c:0 "Wir können nichts tun. Die Garantien zurückziehen!"

 BBA_italy_interaction_events.25.t:1 "Die Italiener stehen gegen uns"
 BBA_italy_interaction_events.25.desc:0 "Das italienische Verteidigungsministerium hat uns vor unserem Versuch, die Österreicher in unser Land einzugliedern, gewarnt. Sollten wir gegen Österreich vorgehen, müssten wir mit schweren Gegenmaßnahmen der italienischen Armee rechnen. Wie sollen wir auf diese offensichtliche Provokation reagieren?"
 BBA_italy_interaction_events.25.a:0 "Ihre Köpfe werden zu groß"
 BBA_italy_interaction_events.25.b:0 "Wir können mit dieser Form der Konfrontation nicht umgehen"

 BBA_italy_interaction_events_news.1.t:1 "Deutschland macht einen Rückzieher"
 BBA_italy_interaction_events_news.1.desc:0 "Nachrichtenagenturen weltweit erhielten über das italienische Verteidigungsministerium Berichte, wonach die Deutschen ihren Anspruch auf österreichisches Territorium zurückgezogen hätten. Dies ist ein historischer Tag für Europa, und nur die Zeit wird zeigen, was aus dem zerschlagenen deutschen Staat wird."
 BBA_italy_interaction_events_news.1.a:0 "Es gab leider keine andere Möglichkeit"
 BBA_italy_interaction_events_news.1.b:0 "Dies beweist die Schwäche des deutschen Systems"

 BBA_italy_interaction_events.26.t:1 "[ITA.GetNameDef] macht einen Rückzieher"
 BBA_italy_interaction_events.26.desc:0 "Italien hat angekündigt, dass es sich uns nicht entgegenstellen wird, nachdem es bewiesen hat, dass es hart auf hart kommen wird, wenn es nicht nachgibt. Heute ist ein glorreicher Tag für das Vaterland!"
 BBA_italy_interaction_events.26.a:0 "Sie erkennen, dass sie nicht mit uns mithalten können!"

 BBA_italy_interaction_events.27.t:1 "Italien bittet uns um Hilfe bei der Eindämmung Deutschlands"
 BBA_italy_interaction_events.27.desc:1 "[GetItalyAsksEngland]"
 BBA_italy_interaction_events.27.desc_hosting_ethiopia:0 "Italien bittet uns um Hilfe bei der Eindämmung der Expansionsmacht Deutschlands und möchte, dass wir Österreichs Unabhängigkeit garantieren, um es zu schützen. Obwohl wir zuvor Seite an Seite gekämpft haben, beherbergen wir nun die von den Italienern vertriebene äthiopische Exilregierung. Wenn [ITA.GetNameDef] unsere Hilfe im bevorstehenden Krieg will, muss es sich zunächst mit Frieden zufrieden geben."
 BBA_italy_interaction_events.27.desc_standard:0 "Dies geschah bereits im Ersten Weltkrieg, doch nun bittet uns Italien erneut um Hilfe bei der Eindämmung der deutschen Expansionsmacht. Sie wollen, dass wir die Unabhängigkeit Österreichs garantieren, um sie zu schützen. Wie gehen wir vor?"
 BBA_italy_interaction_events.27.a:0 "Also Jungs, wir gehen wieder rein"
 BBA_italy_interaction_events.27.b:1 "Wenn sie Frieden schließen mit [ETH.GetNameDef]"
 BBA_italy_interaction_events.27.c:0 "Meine Güte, nein, warum sollte uns der Kontinent interessieren?"

 ITA_if_Italy_accepts_tt:0 "Wenn §Y[ITA.GetName]§! akzeptiert:"

 BBA_italy_interaction_events_news.2.t:1 "Großbritannien garantiert Österreichs Unabhängigkeit"
 BBA_italy_interaction_events_news.2.desc:0 "Die britische Regierung hat heute angekündigt, dass sie die Unabhängigkeit Österreichs unterstützen und Italien bei allen Bedrohungen der Souveränität des Landes zur Seite stehen werde."
 BBA_italy_interaction_events_news.2.a:0 "Toll"

 BBA_italy_interaction_events.28.t:1 "Italien bittet uns um Hilfe bei der Eindämmung Deutschlands"
 BBA_italy_interaction_events.28.desc:0 "Unsere Nachbarn im Südosten haben uns gebeten, ihnen bei der Abwehr eines möglichen deutschen Angriffs auf Österreich zu helfen, dessen Unabhängigkeit sie derzeit garantieren. Sie bitten uns nun, dasselbe zu tun. Wie reagieren wir darauf?"
 BBA_italy_interaction_events.28.a:0 "Oui, pour la liberté!"
 BBA_italy_interaction_events.28.b:1 "Wenn sie Frieden mit [ETH.GetNameDefCap] schließen"

 BBA_italy_interaction_events_news.3.t:1 "Der französische Staat garantiert die Unabhängigkeit Österreichs"
 BBA_italy_interaction_events_news.3.desc:0 "Die Franzosen haben sich auf italienisches Ersuchen hin dazu entschlossen, die Österreicher in ihrem Kampf um die Unabhängigkeit zu unterstützen und haben versprochen, alle potenziellen Aggressoren anzugreifen, die versuchen könnten, in die Souveränität des Landes einzugreifen."
 BBA_italy_interaction_events_news.3.a:0 "Nicht sehr französisch ..."

 BBA_italy_interaction_events.29.t:1 "Italien nimmt uns [802.GetName] weg!"
 BBA_italy_interaction_events.29.desc:0 "Italien versucht, [802.GetName] von uns zu trennen, indem es es seinem eigenen Königreich Albanien angliedert. Wenn wir nichts unternehmen, gehen unsere Ansprüche auf die Region für immer verloren. "
 BBA_italy_interaction_events.29.a:0 "Wir können nichts tun, um sie aufzuhalten"
 BBA_italy_interaction_events.29.b:0 "Wir müssen von ihnen weg"

 BBA_italy_interaction_events.30.t:1 "Italien bietet [45.GetName] im Austausch für gegenseitige Garantien an"
 BBA_italy_interaction_events.30.desc:0 "[ITA.GetName] hat angeboten, unsere Ansprüche gegenüber [45.GetName] im Austausch gegen gegenseitige Garantien und Kooperationsverträge zu unterstützen. Das erscheint uns ein gutes Geschäft. Sollen wir es annehmen?"
 BBA_italy_interaction_events.30.a:0 "Klingt großartig!"
 BBA_italy_interaction_events.30.b:0 "Und warum sollten wir einem Italiener vertrauen?"

 BBA_italy_interaction_events.31.t:2 "[NegotiatingItalianClaimsTitle]"
 BBA_italy_interaction_events.31.t_negotiate_claims:0 "[ITA.GetNameDefCap] Will ihre Ansprüche auf Somalia verhandeln"
 BBA_italy_interaction_events.31.t_refused_peace:0 "[ETH.GetNameDefCap] lehnt Friedensgespräche ab"
 BBA_italy_interaction_events.31.desc:1 "[GetRatifyStresaFrontEventDesc]"
 BBA_italy_interaction_events.31.desc_no_war:0 "Die italienische Regierung hat uns heute einen interessanten Vorschlag unterbreitet. Sie will die Stresa-Front ratifizieren und sich so ihre Unterstützung für uns sichern, falls in Europa ein Krieg ausbricht. Für die Unterzeichnung verlangt sie jedoch territoriale Zugeständnisse, derzeit [269.GetName] und [903.GetName]. Wie sollen wir reagieren? Wenn wir akzeptieren, werden sie uns zumindest vorübergehend bezahlen."
 BBA_italy_interaction_events.31.desc_peace_signed:0 "[ITA.GetNameDefCap] und [ETH.GetNameDefCap] haben ihre Differenzen beigelegt und einen Friedensvertrag unterzeichnet, was nicht zuletzt unserer geschickten Diplomatie zu verdanken ist. Die italienische Regierung hat uns an die Vereinbarung erinnert, die wir getroffen haben und die vorsieht, dass sie [269.GetName] und [903.GetName] erhalten, um die Stresa-Front zu ratifizieren."
 BBA_italy_interaction_events.31.desc_no_peace_deal:0 "Trotz unseres Drängens weigert sich der undankbare [ETH.GetLeader], Friedensgespräche mit der [ITA.GetAdjective]-Regierung aufzunehmen, da er glaubt, im Krieg die Oberhand zu haben. Uns bleibt daher keine andere Wahl, als den äthiopischen Präsidenten aus unserem Land zu verweisen, damit wir uns auf den italienischen Vorschlag konzentrieren können, der unseren nationalen Interessen eher entspricht."
 BBA_italy_interaction_events.31.a:0 "Sicher, sie können es haben"
 BBA_italy_interaction_events.31.b:0 "Um Himmels willen, nein"

 BBA_italy_interaction_events.32.t:1 "[ITA.GetName] will über ihre Ansprüche auf Dschibuti verhandeln"
 BBA_italy_interaction_events.32.desc:0 "Die italienische Regierung hat uns heute einen interessanten Vorschlag unterbreitet. Sie will die Stresa-Front ratifizieren und sich so ihre Unterstützung für uns sichern, falls in Europa ein Krieg ausbricht. Für die Unterzeichnung verlangt sie jedoch territoriale Zugeständnisse, nämlich [268.GetName]. Wie sollen wir reagieren? Wenn wir zustimmen, werden sie uns zumindest vorübergehend bezahlen."
 BBA_italy_interaction_events.32.a:0 "Für den Frieden"
 BBA_italy_interaction_events.32.b:0 "Nicht!"

 BBA_italy_interaction_events.33.t:1 "[ITA.GetName] möchte seinen Anspruch auf [906.GetName] verhandeln"
 BBA_italy_interaction_events.33.desc:1 "[GetItalyWantsSocotra]"
 BBA_italy_interaction_events.33.desc_first_negotiation:0 "Die italienische Regierung hat uns heute einen interessanten Vorschlag unterbreitet. Sie will die Stresa-Front ratifizieren und sich so ihre Unterstützung für uns sichern, falls in Europa ein Krieg ausbricht. Für die Unterzeichnung verlangt sie jedoch territoriale Zugeständnisse, nämlich [906.GetName]. Wie sollen wir reagieren? Wenn wir zustimmen, werden sie uns zumindest vorübergehend bezahlen."
 BBA_italy_interaction_events.33.desc_continued_negotiation:0 "Die Italiener haben sich mit einer weiteren Forderung an uns gewandt. Sie wollen nun die Insel [906.GetName] besitzen. Sie erklären, dies wolle ihnen helfen, den Warenfluss in Italienisch-Ostafrika leichter zu regulieren und eine der Zufahrten zum Roten Meer zu kontrollieren, so wie wir die andere kontrollieren. Sollten wir ihnen die Insel überlassen, würden sie uns für unsere Bemühungen vorübergehend entlohnen."
 BBA_italy_interaction_events.33.a:0 "Ein kleiner Preis für den Frieden"
 BBA_italy_interaction_events.33.b:0 "Und warum sollten sie es gerade haben?"

 BBA_italy_interaction_events.34.t:1 "[ITA.GetName] will über ihren Anspruch auf Tunesien verhandeln"
 BBA_italy_interaction_events.34.desc:1 "[GetItalyWantsTunisia]"
 BBA_italy_interaction_events.34.desc_first_negotiation:0 "Die italienische Regierung hat uns heute einen interessanten Vorschlag unterbreitet. Sie will die Stresa-Front ratifizieren und sich so ihre Unterstützung für uns sichern, falls in Europa ein Krieg ausbricht. Für die Unterzeichnung verlangt sie jedoch territoriale Zugeständnisse, nämlich [458.GetName] und [665.GetName]. Wie sollen wir reagieren? Wenn wir zustimmen, werden sie uns zumindest vorübergehend bezahlen."
 BBA_italy_interaction_events.34.desc_continued_negotiation:0 "Die Italiener haben sich mit einer weiteren Forderung an uns gewandt. Sie wollen nun [458.GetName] und [665.GetName] besitzen. Sie erklären, dass sie damit einen gerechteren Anteil an Nordafrika erhalten wollen als wir und die Briten. Sollten wir ihnen diesen Anteil geben, werden sie uns für unsere Bemühungen vorübergehend entlohnen."
 BBA_italy_interaction_events.34.a:0 "Ja"
 BBA_italy_interaction_events.34.b:0 "Empörend"

 BBA_italy_interaction_events.35.t:1 "[ITA.GetName] möchte über seinen Anspruch auf Malta verhandeln"
 BBA_italy_interaction_events.35.desc:1 "[GetItalyWantsMalta]"
 BBA_italy_interaction_events.35.desc_first_negotiation:0 "Die italienische Regierung hat uns heute einen interessanten Vorschlag unterbreitet. Sie will die Stresa-Front ratifizieren und sich so ihre Unterstützung für uns sichern, falls in Europa ein Krieg ausbricht. Für die Unterzeichnung verlangt sie jedoch territoriale Zugeständnisse, nämlich [116.GetName]. Wie sollen wir reagieren? Wenn wir zustimmen, werden sie uns zumindest vorübergehend bezahlen."
 BBA_italy_interaction_events.35.desc_continued_negotiation:0 "Die Italiener haben sich mit einer weiteren Forderung an uns gewandt. Sie wollen nun die Insel [116.GetName] besitzen. Sie geben an, dass ihnen dies eine bessere Kontrolle über das Mittelmeer ermöglicht. Sollten wir ihnen die Insel überlassen, würden sie uns für unsere Bemühungen vorübergehend entlohnen."
 BBA_italy_interaction_events.35.a:0 "Sie können es besser gebrauchen"
 BBA_italy_interaction_events.35.b:0 "Absurd"

 BBA_italy_interaction_events.36.t:1 "[ITA.GetName] will über ihre Ansprüche auf den Balkan verhandeln"
 BBA_italy_interaction_events.36.desc:1 "[GetItalyClaimsBalkan]"
 BBA_italy_interaction_events.36.desc_first_negotiation:0 "Die italienische Regierung hat uns heute mit einem interessanten Vorschlag kontaktiert. Sie will die Stresa-Front ratifizieren und sich so ihre Unterstützung für uns sichern, falls in Europa ein Krieg ausbricht. Sie möchte, dass wir ihre Ansprüche auf den Balkan ratifizieren. Das liegt nicht wirklich in unserem Interesse, und unsere Regierung ist daher nicht sehr daran interessiert, dies zu dementieren."
 BBA_italy_interaction_events.36.desc_continued_negotiation:0 "[ITA.GetName] hat nun nur noch eine letzte Bitte an uns, bevor der Pakt unterzeichnet werden kann. Sie wünschen sich, dass wir ihre Ansprüche auf den Balkan ratifizieren. Dies liegt nicht wirklich in unserem Interesse, und daher ist unsere Regierung nicht sehr erpicht darauf, dies zu leugnen."
 BBA_italy_interaction_events.36.a:0 "Es hat keinen Sinn, darüber zu streiten"

 BBA_italy_interaction_events.37.t:0 "Territoriale Verhandlungen abgeschlossen"
 BBA_italy_interaction_events.37.desc:0 "Unsere Diplomaten haben in den letzten Wochen in Frankreich und Großbritannien hart gearbeitet, um Italiens Gebietsgewinne in naher Zukunft zu sichern. Die Verhandlungen sind nun jedoch abgeschlossen und die Papiere sind unterzeichnet."
 BBA_italy_interaction_events.37.a:0 "Nicht alles, was wir wollten, aber wir werden es nehmen"
 BBA_italy_interaction_events.37.b:0 "Großartig!"

 BBA_italy_interaction_events.38.t:0 "Der Aufstieg des Papstes"
 BBA_italy_interaction_events.38.desc:0 "Da die Macht des Papsttums die der italienischen Monarchie übersteigt, fordern heute viele glühende Anhänger der katholischen Kirche den Papst auf, die Führung des Landes zu übernehmen. Er hat die ihm vom Volk vorgeschlagene Rolle bereits akzeptiert und erklärt, dass das, was heute geschieht, tatsächlich Gottes Wille sei. Die Monarchie kann ihn jetzt kaum noch aufhalten."
 BBA_italy_interaction_events.38.a:0 "Gott will es!"

 BBA_italy_interaction_events.39.t:0 "Zahlung für afrikanische Kolonien"
 BBA_italy_interaction_events.39.desc:0 "Wir haben endlich die letzte Zahlung für unsere neuen Besitztümer in Afrika geleistet. Dieses Abkommen hat unsere Kolonialgebiete erweitert, vereinheitlicht und gefestigt und unsere Position dort gestärkt. Alles in allem war es für alle Beteiligten ein sehr vorteilhaftes Abkommen."
 BBA_italy_interaction_events.39.a:0 "Eine neue Ära beginnt!"

 BBA_italy_interaction_events.40.t:0 "Ratifizierung der Stresa-Front"
 BBA_italy_interaction_events.40.desc:0 "Nachdem die territorialen Zugeständnisse beschlossen wurden, hat [ITA.GetName] einen Prozess eingeleitet, der Italien und Frankreich zu einem Militärbündnis namens Stresa-Front führen soll. Jetzt ist nicht die Zeit, untätig zu bleiben, denn Frankreich muss in seinem eigenen Interesse handeln und Italien im Kampf gegen die deutsche Bedrohung unterstützen."
 BBA_italy_interaction_events.40.a:0 "Die Bedingungen sind akzeptabel"
 BBA_italy_interaction_events.40.b:0 "Frankreich wird niemals an der Seite Italiens stehen"
 stresa_front_ita:0 "Stresa-Front"

 BBA_italy_interaction_events.41.t:1 "[FROM.GetName] bietet uns Schutz"
 BBA_italy_interaction_events.41.desc:0 "[FROM.GetLeader] hat uns angeboten, uns unter seine Fittiche zu nehmen, um uns vor ausländischen Mächten und wirtschaftlicher Dürre zu schützen. [FROM.GetName] scheint jedoch eher feindselig zu sein und wird uns wahrscheinlich überfallen, sollten wir seine Forderungen ablehnen."
 BBA_italy_interaction_events.41.a:0 "Ein Angebot, das zu gut ist, um es abzulehnen"
 BBA_italy_interaction_events.41.b:0 "Das Volk will seine Unabhängigkeit!"

 BBA_italy_interaction_events.42.t:1 "[FROM.GetName] nimmt unser Angebot an"
 BBA_italy_interaction_events.42.desc:0 "Das Land [FROM.GetName] hat unser Schutzangebot demütig angenommen und sich den rechtmäßigen Herrschern des Mittelmeers gebeugt. Der heutige Tag rückt Iberia und [ITA.GetNameDef] in ein neues Licht."
 BBA_italy_interaction_events.42.a:0 "Hervorragend"

 BBA_italy_interaction_events.43.t:1 "[FROM.GetName] lehnt unser Angebot ab"
 BBA_italy_interaction_events.43.desc:0 "Das Land [FROM.GetName] hat unser Schutzangebot schroff abgelehnt, und wir werden ihnen zeigen, was es bedeutet, sich im wahrsten Sinne des Wortes gegen uns zu stellen. Sie werden sich vor uns verneigen!"
 BBA_italy_interaction_events.43.a:0 "Sie werden diesen Tag bereuen!"

 BBA_italy_interaction_events.44.t:1 "[FROM.GetName] lädt uns zu einer Allianz ein"
 BBA_italy_interaction_events.44.desc:0 "[FROM.GetLeader] hat eine Initiative gestartet, um sich mit den südamerikanischen Nationen zu verbünden und die lateinamerikanischen Kulturen unter einem Herrschaftsgebiet zu vereinen. Dies scheint eine gute Gelegenheit zum Schutz vor [USA.GetNameDef] zu sein. Wie sollten wir reagieren?"
 BBA_italy_interaction_events.44.a:0 "Klingt gut für mich"
 BBA_italy_interaction_events.44.b:0 "Warum sollten wir uns mit Imperialisten treffen?"

 BBA_italy_interaction_events.45.t:0 "[FROM.GetName] nimmt unser Angebot an"
 BBA_italy_interaction_events.45.desc:0 "Das Land [FROM.GetName] hat unser Bündnisangebot demütig angenommen und sich uns angeschlossen, um gemeinsam gegen unsere gemeinsamen Feinde zu kämpfen. Der heutige Tag wirft ein neues Licht auf Südamerika und [ITA.GetNameDef]."
 BBA_italy_interaction_events.45.a:0 "Großartig"

 BBA_italy_interaction_events.46.t:1 "[FROM.GetName] lehnt unser Angebot ab"
 BBA_italy_interaction_events.46.desc:0 "Das Land [FROM.GetName] hat unser Bündnisangebot brüsk abgelehnt, und wir müssen daher ohne es auskommen. Es wird isoliert auf seinem Kontinent dastehen."
 BBA_italy_interaction_events.46.a:0 "Wir können wenig tun, um ihre Meinung zu ändern ..."

 BBA_italy_interaction_events.50.t:0 "Ein italienischer Vorschlag"
 BBA_italy_interaction_events.50.desc:0 "Die italienische Regierung hat uns einen interessanten Vorschlag unterbreitet. Sie will die Stresa-Front ratifizieren und sich so ihre Unterstützung für uns sichern, falls in Europa ein Krieg ausbricht. Sie fordert jedoch territoriale Zugeständnisse, derzeit [269.GetName] und [903.GetName] – und befindet sich im Krieg mit [ETH.GetName], dessen Regierung wir beherbergen. Wenn wir zustimmen, werden sie uns zumindest vorübergehend bezahlen."
 BBA_italy_interaction_events.50.a:0 "Sie müssen zuerst einen Friedensvertrag unterzeichnen!"
 BBA_italy_interaction_events.50.b:0 "Mit diesen Verbrechern wird es keinen Deal geben!"

 BBA_italy_interaction_events.51.t:0 "Die Engländer weigern sich zu verhandeln"
 BBA_italy_interaction_events.51.desc:0 "Unser vernünftiger Vorschlag, die Stresa-Front im Austausch gegen einige kleinere britische Kolonialgebiete zu ratifizieren, stieß auf äußerste Ablehnung. Sie müssen sich tatsächlich stark und selbstbewusst fühlen, wenn sie unsere beträchtliche Macht ablehnen."
 BBA_italy_interaction_events.51.a:0 "Sie werden es bereuen!"

 BBA_italy_interaction_events.60.t:0 "[ITA.GetName] unterzeichnet den Friedensvertrag"
 BBA_italy_interaction_events.60.desc:0 "Italien hat einen Friedensvertrag mit Äthiopien unterzeichnet und einen Teil der eroberten Gebiete zurückgegeben. Die italienische Regierung fordert uns nun auf, unseren Teil der Abmachung einzuhalten und Österreichs Unabhängigkeit angesichts der deutschen Expansionspolitik zu garantieren."

 BBA_italy_interaction_events.70.t:0 "Warten auf Antworten"
 BBA_italy_interaction_events.70.desc:0 "Wir haben einen Gesandten zum Führer der [GetAdjective]s geschickt und gefragt, ob sie bereit sind, unsere Differenzen beizulegen und eine neue Regierung unter italienischer Aufsicht zu bilden."
 BBA_italy_interaction_events.70.a:0 "Wir werden warten"
 BBA_italy_interaction_events.71.t:0 "Ein italienischer Vorschlag"
 BBA_italy_interaction_events.71.desc:0 "Ein Gesandter von [ITA.GetNameDef] hat sich an uns gewandt und gefragt, ob wir bereit wären, unsere Differenzen beizulegen und eine neue Regierung unter italienischer Aufsicht zu bilden. Der Gesandte teilte uns mit, dass er mit oder ohne unsere Mitarbeit eine neue Regierung in unserem Heimatland einrichten werde. Sollten wir dieses Angebot ablehnen, würden wir vom Rest der Welt zugunsten dieser neuen Regierung ignoriert werden."
 BBA_italy_interaction_events.71.a:0 "Wir können nicht viel tun"
 ITA_create_puppet_tt:0 "§Y[ROOT.GetNameWithFlag]§! erhält einen neuen §YFocus Tree§!"
 BBA_italy_interaction_events.71.b:0 "Wir sind immer noch stolz!"
 BBA_italy_interaction_events.72.t:0 "Die [FROM.GetAdjective] Blätter"
 BBA_italy_interaction_events.72.desc:0 "[FROM.GetLeader], der Anführer der im Exil lebenden [FROM.GetAdjective], stattete [ROOT.GetLeader] gestern Abend einen diskreten Besuch in seiner Privatresidenz ab, um ihn in aller Stille über seine Entscheidung zu informieren, ein Angebot der Italiener anzunehmen und eine neue Regierung unter ihrem Regime zu bilden. Er dankte uns für unsere Großzügigkeit in diesen schwierigen Zeiten, sagte aber, er müsse das Wohl seines Volkes im Auge behalten."
 BBA_italy_interaction_events.72.a:0 "Lange haben sie sich gewehrt"

 BBA_italy_interaction_events.666.t:0 "[454.GetName] oder Krieg"
 BBA_italy_interaction_events.666.desc:1 "Seine Heiligkeit, Papst [From.GetLeader], verlangt die Übergabe des Staates [454.GetName]. Seine Abgesandten behaupten, dass eine solch heilige Stätte ausschließlich vom Papsttum regiert werden sollte, und die Ablehnung einer solchen Forderung wäre Ketzerei. Ein Nachgeben würde unsere Beziehung zu [FROM.GetName] erheblich verbessern, doch [454.GetName] liegt an der Schnittstelle zwischen Europa, Asien und Afrika – was es zu einem strategisch wichtigen Ort macht, heute wie im Laufe der Geschichte."
 BBA_italy_interaction_events.666.a:0 "Wir müssen den Forderungen Seiner Heiligkeit gerecht werden ..."
 BBA_italy_interaction_events.666.b:0 "Der alte Mann kann in der Hölle schmoren!"

 BBA_italy_interaction_events.667.t:0 "[FROM.GetName] übergibt [454.GetName]"
 BBA_italy_interaction_events.667.desc:1 "Dies ist nicht nur ein großer Tag für das Papsttum, sondern für die gesamte Christenheit! Der [FROM.GetAdjective]-Führer, [FROM.GetLeader], hat unsere Bitte erhört und zugestimmt, [454.GetName] in unsere Verwaltung zu übertragen. Dies wird zu Stabilität und Wohlstand für die Region und einer neuen, glänzenden Zukunft für [ROOT.GetName] führen."
 BBA_italy_interaction_events.667.a:0 "Gesegnet seien die [FROM.GetAdjective]s!"

 BBA_italy_interaction_events.668.t:1 "[FROM.GetName] lehnt den Vorschlag seiner Heiligkeit ab"
 BBA_italy_interaction_events.668.desc:1 "[FROM.GetLeader] ist ebenso arrogant wie ignorant! Er erkennt nicht ein, dass es sinnvoll ist, [454.GetName] an uns auszuliefern. Die Erfüllung unserer Forderungen hätte der Region Sicherheit und Stabilität gebracht, doch sein Handeln wird nur zu Krieg und Elend führen!"
 BBA_italy_interaction_events.668.a:0 "So eine Beleidigung Gottes!"

 BBA_italy_purge_the_party.1.t:0 "Säuberung der Partito Nazionale Fascista"
 BBA_italy_purge_the_party.1.desc:0 "Es gibt noch einflussreiche Verbündete Mussolinis an der Macht, die versuchen, die Bevölkerung zur Wiedereinsetzung des alten Duce zu bewegen. Wenn wir unsere Kontrolle über die Regierung behalten wollen, müssen wir mit gutem Beispiel vorangehen und diese Idioten aus ihren Ämtern entfernen."
 BBA_italy_purge_the_party.1.a:0 "Säubern Sie die Berater"
 BBA_italy_purge_the_party.1.b:0 "Säubern Sie die Generäle"
 BBA_italy_purge_the_party.1.c:0 "Verschone sie alle"
 BBA_italy_purge_the_party.1.d:0 "Alle säubern"
 ITA_characters_will_be_spared_tt:0 "§YDie folgenden Charaktere bleiben von der Bereinigung verschont:§!"
 
 BBA_italy_decide_the_fate_of_mussolini.1.t:0 "Das Schicksal Mussolinis"
 BBA_italy_decide_the_fate_of_mussolini.1.desc:0 "Nachdem wir den internen Machtkampf bewältigt und unsere Position in der Partito Nazionale Fascista gefestigt haben, können wir uns nun endlich dem alten Duce – Mussolini – zuwenden. Seine ständige Präsenz untergräbt unsere Position und muss bekämpft werden."
 BBA_italy_decide_the_fate_of_mussolini.1.a:0 "Lasst ihn vor Gericht stehen"
 BBA_italy_decide_the_fate_of_mussolini.1.b:0 "Hinrichten"
 BBA_italy_decide_the_fate_of_mussolini.1.c:0 "Ihn ermorden"
 BBA_italy_decide_the_fate_of_mussolini.2.t:0 "Der Prozess gegen Mussolini"
 BBA_italy_decide_the_fate_of_mussolini.2.desc:1 "Der Prozess des Jahrhunderts steht vor der Tür. Benito Mussolini wird unter anderem der Korruption und des Hochverrats beschuldigt. Der Prozess ist lediglich ein Schauspiel für die Öffentlichkeit, um ihm den Anschein von Legitimität zu verleihen. Tatsächlich liegt der Ausgang in unseren Händen."
 BBA_italy_decide_the_fate_of_mussolini.2.a:0 "Ihn freisprechen"
 BBA_italy_decide_the_fate_of_mussolini.2.b:0 "Lass ihn im Gefängnis verrotten"
 BBA_italy_decide_the_fate_of_mussolini.3.t:0 "Der Tod Mussolinis"
 BBA_italy_decide_the_fate_of_mussolini.3.desc:0 "Es gibt Pläne, den ehemaligen Duce zu ermorden. Wir müssen jedoch sorgfältig abwägen, wie die italienische Bevölkerung reagieren wird. Die Frage ist: Wie drehen wir das Ganze?"
 BBA_italy_decide_the_fate_of_mussolini.3.a:0 "Geben Sie den Kommunisten die Schuld!"
 BBA_italy_decide_the_fate_of_mussolini.3.b:0 "Erfinden Sie eine Titelgeschichte"
 ITA_mussolini_stands_trial_tt:0 "Überlassen Sie dem Gerichtshof die Entscheidung über sein Schicksal – solange wir über den Gerichtshof entscheiden."
 ITA_mussolini_is_assassinated_tt:0 "Wir können seinen Tod zu unserem Vorteil auslegen."
 ITA_mussolini_walks_free_tt:0 "Mussolini kann frei gehen und sein Leben als freier Bürger leben."

 BBA_italy_research_agreement.1.t:0 "[FROM.GetNameDefCap] schlägt ein gemeinsames militärisches Kooperationsprogramm vor"
 BBA_italy_research_agreement.1.desc:0 "Die [FROM.GetAdjective]s schlagen ein gemeinsames Forschungsprogramm vor, um nicht nur unsere militärischen Fähigkeiten, sondern auch die Bindung zwischen unseren Ländern zu stärken. Dies würde uns einen leichteren Austausch von Technologien und Forschungsergebnissen ermöglichen und unsere Länder einander näher bringen."
 BBA_italy_research_agreement.1.a:0 "Das könnte uns gute Dienste leisten."
 BBA_italy_research_agreement.1.b:0 "Wir brauchen ein solches Programm nicht."
 BBA_italy_research_agreement.2.t:0 "[FROM.GetNameDefCap] lehnt unseren militärischen Vorschlag ab"
 BBA_italy_research_agreement.2.desc:0 "[FROM.GetNameDefCap] hat unsere vorgeschlagene militärische Zusammenarbeit unklugerweise abgelehnt. Dieses gemeinsame Programm hätte die militärischen Fähigkeiten beider Nationen gestärkt, aber es scheint, dass [FROM.GetAdjective] an einem solchen Abkommen kein Interesse hat. Zum Glück brauchen wir ihre Hilfe nicht, um unsere Ziele zu erreichen!"
 BBA_italy_research_agreement.2.a:0 "Eine schlechte Entscheidung"

 BBA_italy_pact.1.t:0 "[FROM.GetNameDefCap] schlägt einen Nichtangriffspakt vor"
 BBA_italy_pact.1.desc:0 "Die [FROM.GetAdjective]s sind bereit, eine gemeinsame Erklärung der Freundschaft und Zusammenarbeit zwischen unseren Ländern vorzulegen. Ein Nichtangriffspakt mit ihnen würde unsere Grenzen sichern und Ressourcen für andere Zwecke freisetzen. Auch wenn wir sie nicht unbedingt für vertrauenswürdig halten, würde uns dies ermöglichen, Zeit zu gewinnen und unsere Stärke zu stärken."
 BBA_italy_pact.1.a:0 "Das würde uns gut passen."
 BBA_italy_pact.1.b:0 "Wir können ihnen nicht vertrauen!"
 BBA_italy_pact.2.t:0 "[FROM.GetNameDefCap] Entlässt unseren Friedenszweig"
 BBA_italy_pact.2.desc:0 "[FROM.GetNameDefCap] hat unseren Vorschlag eines Nichtangriffspakts abgelehnt und den Deal als unehrlich und einseitig bezeichnet. Sie sind offensichtlich wahnhaft und wissen nicht, was das Beste für sie ist."
 BBA_italy_pact.2.a:0 "Narren!"

 BBA_italy_recognize_the_empire.1.t:0 "Erkennen Sie das italienische Reich an"
 BBA_italy_recognize_the_empire.1.desc:0 "[FROM.GetLeader] hat den Beginn des italienischen Kaiserreichs ausgerufen! Während unser Botschafter in Rom empfiehlt, diese Tatsache einfach anzuerkennen und den [FROM.GetAdjective]s ihre Größenträume zu überlassen, sind andere über diese Entwicklung besorgt. Sie argumentieren, dass eine Beschwichtigung der [FROM.GetAdjective]s nur zu weiteren Zugeständnissen führen würde und wir solche gefährlichen Kaiserträume unterbinden sollten."
 BBA_italy_recognize_the_empire.1.a:0 "Erkennen Sie das italienische Reich an"
 BBA_italy_recognize_the_empire.1.b:0 "Ignoriere die Proklamation"
 BBA_italy_recognize_the_empire.2.t:0 "Kaiserliche Anerkennung"
 BBA_italy_recognize_the_empire.2.desc:0 "[FROM.GetNameDefCap] erkennt unsere imperialen Bestrebungen weise an und betrachtet uns als ihre Ebenbürtigen – wie es sein sollte! Unser Ansehen und Ruhm wachsen weiter."
 BBA_italy_recognize_the_empire.2.a:0 "Unsere Macht wächst!"
 BBA_italy_recognize_the_empire.3.t:0 "Imperiale Ablehnung"
 BBA_italy_recognize_the_empire.3.desc:0 "[FROM.GetNameDefCap] spottet törichterweise über unsere imperialen Ambitionen und behauptet, Träume und Wunschdenken allein würden kein Imperium errichten. Sie müssen für diese Unverschämtheit den Preis zahlen! Wir warten – vorerst – ab, aber wir sind bereit, diesen Schwachköpfen die wahre Macht des italienischen Imperiums zu zeigen."
 BBA_italy_recognize_the_empire.3.a:0 "Sie werden es noch bereuen …"

 BBA_italy_sends_military_support.1.t:0 "[FROM.GetNameDefCap] sendet militärische Unterstützung"
 BBA_italy_sends_military_support.1.desc:0 "Die [FROM.GetAdjective]s möchten uns bei unseren Kriegsanstrengungen unterstützen und haben uns Ausrüstung geschickt. Es ist zwar eine eher kleine Lieferung, aber jede Hilfe ist willkommen."
 BBA_italy_sends_military_support.1.a:0 "Das wird sicherlich nützlich sein"

 BBA_italy_communist_events.01.t:0 "Die Führung der Republik"
 BBA_italy_communist_events.01.desc:1 "Nachdem unsere junge Republik nun aus den Fängen der Faschisten befreit ist, können wir endlich einen neuen Kurs für unser Land einschlagen! Was wir jetzt brauchen, ist ein standhafter Führer, der ebenso weise wie engagiert für unsere Sache ist. Jemand, der uns durch die schwierigen Zeiten führt, die vor uns liegen, und der im Glauben an eine bessere Zukunft nicht wankt."
 BBA_italy_communist_events.01.a:0 "Antonio Gramsci ist der rechtmäßige Anführer."
 BBA_italy_communist_events.01.b:0 "Wir sollten Palmiro Togliatti folgen."
 BBA_italy_communist_events.01.c:0 "Sandro Pertini wird uns weiterführen."
 BBA_italy_communist_events.02.t:0 "[FROM.GetAdjective] Hilferuf"
 BBA_italy_communist_events.02.desc:0 "Unsere Kameraden in der neu gegründeten [FROM.GetName] haben uns um Hilfe gebeten. Das [FROM.GetAdjective]-Volk wurde in einem Bürgerkrieg zur Sicherung seiner kommunistischen Herrschaft zerrissen und wendet sich nun anderen gleichgesinnten Regierungen zu, um die neue Republik wieder aufzubauen und zu schützen."
 BBA_italy_communist_events.02.a:0 "Wir werden sie unterstützen!"
 BBA_italy_communist_events.02.b:0 "Für die [ROOT.GetAdjective]-Leute kein Problem."
 BBA_italy_communist_events.03.t:0 "Internationaler Support für [ROOT.GetNameDef]"
 BBA_italy_communist_events.03.desc:0 "Die Regierung in [FROM.GetName] hat unseren Hilferuf an unsere kommunistischen Mitbürger erhört und beschlossen, uns zu helfen! Dies wird nicht nur unsere Bindungen zu ihnen stärken, sondern auch unsere Verteidigungsfähigkeiten, sodass wir unsere geliebte Republik schützen können."
 BBA_italy_communist_events.03.a:0 "Gemeinsam werden wir niemals besiegt werden!"
 BBA_italy_communist_events.04.t:0 "Keine internationale Unterstützung erhalten"
 BBA_italy_communist_events.04.desc:0 "Niemand ist auf den Hilferuf reagiert! Es scheint, als hätten uns die Kommunisten auf der ganzen Welt im Stich gelassen und sind nicht gerade erpicht darauf, ihren eigenen Kameraden zu helfen. In dieser rauen Welt können wir uns nur auf uns selbst verlassen – aber unsere Revolution wird siegen!"
 BBA_italy_communist_events.04.a:0 "[ROOT.GetNameDefCap] wird sich durchsetzen, egal was passiert!"
 ITA_country_supports_new_italian_government_tt:0 "[FROM.GetNameDefCap] erhält von uns etwas Unterstützung in Form von §YAusrüstung§! und einem kleinen temporären §YKonsumgüter§!-Bonus."
 ITA_international_support_arrives_tt:0 "Von unseren Kameraden im Ausland erhalten wir folgende Leistungen: "
 ITA_international_support_consumer_goods_tt:0 "Erhält „§Y$ITA_international_aid$§!“, das ($MODIFIER_CONSUMER_GOODS_FACTOR$: §Y[?ITA_consumer_goods_from_leftist_aid|%]§!) für §Y730§! Tage gewährt."
 BBA_italy_communist_events.05.t:0 "Militärische Zusammenarbeit mit der [FROM.GetAdjective] Armee"
 BBA_italy_communist_events.05.desc:0 "Wir haben kürzlich eine gemeinsame Übung mit dem [FROM.GetAdjective]-Militär abgeschlossen. Unsere Generäle und Admirale freuen sich, berichten zu können, dass sie ein großer Erfolg war und unser Militär sehr gute Leistungen erbracht hat. Dies wird unsere Verbindungen zu [FROM.GetName] und unsere eigenen Fähigkeiten stärken."
 BBA_italy_communist_events.05.a:0 "Dies stärkt [ROOT.GetFactionName]!"
 BBA_italy_communist_events.06.t:0 "[FROM.GetAdjective] Kooperationsvorschlag"
 BBA_italy_communist_events.06.desc:0 "Unsere Mitstreiter von [FROM.GetName] haben eine Große Kommission mit Mitgliedern aus Spanien und anderen Ländern vorgeschlagen, um die Zusammenarbeit zwischen uns auszubauen. Sie argumentieren, dass wir gemeinsam Kapitalismus und Faschismus bekämpfen müssen, um sie eines Tages besiegen zu können."
 BBA_italy_communist_events.06.a:0 "Wir werden zusammenstehen!"
 BBA_italy_communist_events.06.b:0 "[FROM.GetAdjective] Angelegenheiten gehen uns nichts an."
 BBA_italy_communist_events.07.t:0 "[FROM.GetName] akzeptiert unseren Vorschlag"
 BBA_italy_communist_events.07.desc:0 "Unsere Genossen in [FROM.GetName] haben sich bereit erklärt, mit uns zusammenzuarbeiten und eine Große Kommission der Zusammenarbeit zu gründen! Gemeinsam werden wir dem Ansturm des Kapitalismus und Faschismus standhalten und das Blatt wenden können, um unsere glorreiche Revolution in alle Ecken der Welt zu tragen!"
 BBA_italy_communist_events.08.t:0 "[FROM.GetName] lehnt unseren Vorschlag ab"
 BBA_italy_communist_events.08.desc:0 "Die dummen [FROM.GetAdjective] sind zu kurzsichtig, um zu erkennen, was das Beste für sie ist! Gemeinsam wäre es einfacher gewesen, Kapitalismus und Faschismus aufzuhalten, aber wir werden es trotzdem schaffen!"
 BBA_italy_communist_events.08.a:0 "Sie haben das nicht durchdacht ..."
 BBA_italy_communist_events.09.t:0 "Antonio Gramsci erholt sich"
 BBA_italy_communist_events.09.desc:0 "Antonio Gramsci hat sich endlich von seiner schweren Krankheit erholt, die er sich während seiner ungerechtfertigten Haft zugezogen hatte. Er ist bereit, unsere Sache auf jede erdenkliche Weise zu unterstützen – mit stärkerer Überzeugung und Leidenschaft als je zuvor!"
 BBA_italy_communist_events.09.a:0 "Erholt durch den Optimismus seines Willens."

 BBA_italy_democratic_events.01.t:0 "$BBA_italy_communist_events.01.t$"
 BBA_italy_democratic_events.01.desc:1 "Nachdem wir die jüngsten Kämpfe hinter uns gelassen haben, ist es an der Zeit, zusammenzukommen, unsere Wunden zu heilen und den langen Weg der Genesung anzutreten. Unsere Demokratie ist noch jung und zerbrechlich, daher brauchen wir eine starke, aber sanfte Hand, die uns nach vorne führt."
 BBA_italy_democratic_events.01.a:0 "Ferruccio Parri ist der fähigste Anführer."
 BBA_italy_democratic_events.01.b:0 "Die Erfahrung von Ivanoe Bonomi ist von unschätzbarem Wert."
 BBA_italy_democratic_events.02.t:0 "Italienisches Programm für wissenschaftliche Zusammenarbeit"
 BBA_italy_democratic_events.02.desc:0 "[FROM.GetName] hat uns eingeladen, an einer neuen Forschungsaustauschinitiative teilzunehmen. Dies würde die Beziehungen und die Zusammenarbeit zwischen unseren Ländern erweitern und vertiefen."
 BBA_italy_democratic_events.02.a:0 "Tolle Initiative!"
 BBA_italy_democratic_events.03.t:0 "Die italienische Mafia ist wieder auf dem Vormarsch"
 BBA_italy_democratic_events.03.desc:0 "Der Bürgerkrieg hat viel Blutvergießen und Leid verursacht und die Grundfesten von [FROM.GetName] erschüttert. Das Chaos hinterließ zudem ein Machtvakuum, das nun von der wiedererstarkten Mafia in [?ROOT.ITA_mafia_epicenter_state.GetName] gefüllt wird. Die Unterdrückung der Mafia war vielleicht das einzig Gute, was die Faschisten erreichen konnten."
 BBA_italy_democratic_events.03.a:0 "Ein weiteres Problem, das es zu lösen gilt"
 BBA_italy_democratic_events.05.t:0 "Italienische Mafia auf dem Vormarsch"
 BBA_italy_democratic_events.05.desc:0 "Die Mafia-Plage breitet sich aus! Das jüngste Chaos in [FROM.GetName] ist ein Nährboden für Kriminelle und ihresgleichen, und in Ermangelung einer starken lokalen Herrschaft nehmen diese unerwünschten Individuen immer mehr zu. Sie haben das Machtvakuum des Bürgerkriegs ausgenutzt und behaupten erneut ihre Autorität in ganz [FROM.GetName]."
 BBA_italy_democratic_events.05.a:0 "Sie sind Abschaum!"
 generic_states_affected_tt:0 "\nBetroffene Staaten:\n"

 BBA_italy_anti_colonialism_events.01.t:0 "$ITA_die_äthiopische_Frage$"
 BBA_italy_anti_colonialism_events.01.desc:0 "Nachdem unsere inneren Angelegenheiten geklärt sind, können wir uns wieder nach außen wenden. Wir haben viele Probleme von den Faschisten geerbt, die wir nun lösen müssen. Eine der wichtigsten Fragen ist die um Äthiopien. Es war ein ungerechter und brutaler Krieg, der vom stets prestigegierigen Mussolini begonnen wurde, und jetzt, nach seinem Tod, liegt es an uns, über Äthiopiens Schicksal zu entscheiden."
 BBA_italy_anti_colonialism_events.01.a:0 "Wir müssen diese Scharade jetzt beenden!"
 BBA_italy_anti_colonialism_events.01.b:0 "Wir werden die Arbeiter Äthiopiens befreien!"
 BBA_italy_anti_colonialism_events.01.c:0 "Wir müssen äthiopische Gebiete integrieren."
 BBA_italy_anti_colonialism_events.01.d:0 "Wir sollten in Äthiopien und die äthiopische Bevölkerung investieren."
 BBA_italy_anti_colonialism_events.01.e:0 "Wir werden den Status Quo beibehalten."
 BBA_italy_anti_colonialism_events.01.f:0 "Wir müssen der Unterdrückungsherrschaft von [ETH.GetLeader] ein Ende setzen!"
 BBA_italy_anti_colonialism_events.01.g:0 "Wir werden die Beziehungen zum äthiopischen Volk stärken."
 BBA_italy_anti_colonialism_events.02.t:0 "Waffenstillstandsvorschlag von [FROM.GetName]"
 BBA_italy_anti_colonialism_events.02.desc:0 "Die neue Regierung von [FROM.GetName] hat sich an uns gewandt und um einen Waffenstillstand gebeten. Es scheint, als hätten sie nach dem Bürgerkrieg genug von Blutvergießen und Kämpfen."
 BBA_italy_anti_colonialism_events.02.a:0 "Klingt vernünftig."
 BBA_italy_anti_colonialism_events.02.b:0 "Wir müssen aufgeben ..."
 BBA_italy_anti_colonialism_events.02.c:0 "Zu spät, sie werden das Knie beugen!"
 BBA_italy_anti_colonialism_events.03.t:0 "Ende des Italienisch-Äthiopischen Krieges"
 BBA_italy_anti_colonialism_events.03.desc:0 "[FROM.GetName]s [FROM.GetLeader] hat unserem vorgeschlagenen Waffenstillstand zugestimmt und ist bereit, dem Frieden eine Chance zu geben. Wir können endlich eine der größten Gräueltaten Mussolinis hinter uns lassen und neu anfangen."
 BBA_italy_anti_colonialism_events.03.a:0 "Es ist Frieden!"
 BBA_italy_anti_colonialism_events.04.t:0 "[FROM.GetLeader] lehnt unseren Vorschlag ab"
 BBA_italy_anti_colonialism_events.04.desc:0 "Der blutrünstige [FROM.GetLeader] wittert nach unserem Bürgerkrieg offenbar Blut und hält uns für schwach. [FROM.GetSheHeCap] hat unser großzügiges Friedensangebot abgelehnt und ist entschlossen, weiterzukämpfen. Wir werden [FROM.GetHerHim] zeigen, dass wir alles andere als schwach sind!"
 BBA_italy_anti_colonialism_events.04.a:1 "[FROM.GetLeader] wird das bereuen!"
 BBA_italy_anti_colonialism_events.05.t:1 "[FROM.GetAdjective] Anforderungen für [ROOT.GetAdjective] Integration"
 BBA_italy_anti_colonialism_events.05.desc:0 "Die Regierung in [FROM.GetName] versucht, die direkte Kontrolle über unsere Gebiete zu übernehmen und uns in die größere [FROM.GetAdjective]-Verwaltung zu integrieren. Welche Auswirkungen dies auf unser Volk, unsere Kultur und unsere Traditionen haben wird, weiß noch niemand."
 BBA_italy_anti_colonialism_events.05.a:0 "Wir reichen es gerne ein."
 BBA_italy_anti_colonialism_events.05.b:0 "Wir werden unsere eingeschränkte Autonomie nicht aufgeben!"
 BBA_italy_anti_colonialism_events.06.t:0 "[FROM.GetAdjective] Integration in [ROOT.GetNameDef]"
 BBA_italy_anti_colonialism_events.06.desc:0 "Die [FROM.GetAdjective]-Regierung hat erkannt, dass eine Integration in die umfassendere [ROOT.GetAdjective]-Verwaltung von Vorteil wäre und uns alle stärken würde."
 BBA_italy_anti_colonialism_events.06.a:0 "Favoloso!"
 BBA_italy_anti_colonialism_events.07.t:0 "[FROM.GetName] hat unseren Vorschlag abgelehnt"
 BBA_italy_anti_colonialism_events.07.desc:0 "Es scheint, dass die [FROM.GetAdjective]s denken, sie seien besser geeignet, sich selbst zu regieren, und haben unser Angebot, Teil unserer größeren Verwaltung zu werden, abgelehnt."
 BBA_italy_anti_colonialism_events.07.a:0 "Es war zu viel..."
 BBA_italy_anti_colonialism_events.08.t:0 "[FROM.GetAdjective] Investitionen in [ROOT.GetAdjective] Entwicklung"
 BBA_italy_anti_colonialism_events.08.desc:0 "Es scheint, dass die neue Regierung in [FROM.GetName] die weniger kultivierte Behandlung der [ROOT.GetAdjective]-Bevölkerung durch ihre Vorgängerin ändern möchte und beschlossen hat, zur Abwechslung in unser Land zu investieren."
 BBA_italy_anti_colonialism_events.08.a:0 "[ROOT.GetCapitalVictoryPointName] blüht auf!"
 BBA_italy_anti_colonialism_events.09.t:0 "[FROM.GetAdjective] Druck der Regierung [ROOT.GetName]"
 BBA_italy_anti_colonialism_events.09.desc:0 "Der [FROM.GetAdjective]-Drang nach Expansion scheint keine Grenzen zu kennen! Wir haben eine Delegation von [FROM.GetName] empfangen, die uns Unterwerfung anbietet. Sie behaupten, es würde sich wenig ändern; wir würden weiterhin nach eigenem Ermessen über unser Land herrschen, aber mit dem Vorteil zusätzlichen Schutzes vor den [FROM.GetAdjective]s und gelegentlicher Konformität."
 BBA_italy_anti_colonialism_events.09.a:0 "Wir werden unseren italienischen Kameraden folgen!"
 BBA_italy_anti_colonialism_events.09.b:0 "Wir brauchen einen Regierungswechsel!"
 BBA_italy_anti_colonialism_events.09.c:0 "Was für anmaßende Europäer!"
 BBA_italy_anti_colonialism_events.10.t:0 "[FROM.GetAdjective] Arbeiter, freut euch!"
 BBA_italy_anti_colonialism_events.10.desc:0 "Die [FROMGetAdjective]-Regierung hat klugerweise entschieden, unser Angebot anzunehmen, ihre Kräfte zu bündeln und unseren Schutz zu genießen. Dies wird zweifellos beide Länder stärken und ihnen nützen!"
 BBA_italy_anti_colonialism_events.11.t:0 "[FROM.GetAdjective] Arbeiter übernehmen die Macht"
 BBA_italy_anti_colonialism_events.11.desc:0 "Obwohl die [FROM.GetAdjective]-Führung unseren Vorschlag zum Schutz und zur Zusammenarbeit nicht akzeptierte, kam sie uns entgegen und ersetzte ihre Regierung durch eine, die unserer ähnlicher und uns gegenüber freundlicher gesinnt war."
 BBA_italy_anti_colonialism_events.11.a:0 "Eine glänzende Zukunft erwartet die [FROM.GetAdjective]-Menschen!"
 BBA_italy_anti_colonialism_events.12.desc:0 "Der Anführer von [FROM.GetName], [FROM.GetLeader], widersetzte sich entschieden unserem Vorschlag zum Schutz und zur Zusammenarbeit und forderte unsere Delegation ohne freundliche Worte auf, so schnell wie möglich nach Hause zurückzukehren."
 BBA_italy_anti_colonialism_events.12.a:0 "Die Zeit wird ihnen zeigen, wie falsch sie liegen."
 BBA_italy_anti_colonialism_events.12.b:0 "Es war eine Forderung, kein Vorschlag."
 BBA_italy_anti_colonialism_events.13.t:0 "[FROM.GetName] möchte die Beziehungen stärken"
 BBA_italy_anti_colonialism_events.13.desc:0 "Es scheint, dass die [FROM.GetAdjective]s während ihres Krieges mit uns großen Respekt vor unseren Streitkräften und Fähigkeiten gewonnen haben. So sehr sogar, dass sie uns im Falle eines Krieges ein gegenseitiges Nichtangriffsabkommen und eine Garantie anbieten möchten."
 BBA_italy_anti_colonialism_events.13.a:0 "Klingt gut!"
 BBA_italy_anti_colonialism_events.13.b:0 "Nicht auf dieser Erde!"
 BBA_italy_anti_colonialism_events.14.desc:0 "[FROM.GetLeader] hat klugerweise zugestimmt, unseren vorgeschlagenen gegenseitigen Nichtangriffspakt zwischen [FROM.GetName] und [ROOT.GetName] sowie eine gegenseitige Garantie zu unterzeichnen – für den Fall, dass einer von uns einem Angreifer gegenüberstehen sollte."
 BBA_italy_anti_colonialism_events.15.desc:0 "[FROM.GetLeader] hat unseren vorgeschlagenen Verteidigungspakt zwischen [FROM.GetName] und [ROOT.GetName] unklugerweise abgelehnt. Diese Zusicherung hätte unseren beiden Ländern Stabilität und Sicherheit gebracht, aber jetzt müssen wir uns der Welt allein stellen."
 BBA_italy_anti_colonialism_events.15.a:0 "Ihr Verlust!"
 BBA_italy_anti_colonialism_events.15.b:0 "Wenn sie nicht für uns sind, sind sie gegen uns!"
 BBA_italy_anti_colonialism_events_war_will_continue_tt:0 "Der Krieg wird weitergehen."

 BBA_italy_anti_colonialism_events.20.t:0 "[FROM.GetNameDefCap] verurteilt den Kolonialismus"
 BBA_italy_anti_colonialism_events.20.desc:0 "Es scheint, als ob die neu gegründete [FROM.GetName] einen neuen Sinn für Tugend und Zielstrebigkeit entwickelt hat und es sich zur Aufgabe gemacht hat, die Kolonialreiche aller anderen zu zerschlagen. Eine italienische Delegation hat uns aufgefordert, unsere imperiale Lebensweise aufzugeben und uns für eine Zukunft der Zusammenarbeit und Freiheit statt der Unterdrückung und Unterwerfung einzusetzen."
 BBA_italy_anti_colonialism_events.20.a:0 "Es ist Zeit, die Dinge in Ordnung zu bringen!"
 BBA_italy_anti_colonialism_events.20.b:0 "Haben die [FROM.GetAdjective]s den Verstand verloren?!"
 BBA_italy_anti_colonialism_events.21.t:0 "Dekolonisierung Afrikas"
 BBA_italy_anti_colonialism_events.21.desc:0 "[GetDecolonizationEventDesc]"
 BBA_italy_anti_colonialism_events.21.desc_accepted:0 "Als wir uns daran machten, die Kolonialreiche in Afrika zu verurteilen und zu zerschlagen, waren wir uns nicht sicher, wie wir darauf reagieren würden. Angesichts der Hartnäckigkeit, mit der Länder an dem festhalten können, was sie als ihr Eigentum betrachten, müssen wir unsere Bemühungen als Erfolg betrachten. Schon die Befreiung einer einzigen Nation ist eine große Leistung!"
 BBA_italy_anti_colonialism_events.21.desc_rejected:0 "Es scheint, als würden unsere Bemühungen, den afrikanischen Kontinent zu entkolonialisieren und seinen unterdrückten Völkern Freiheit zu bringen, auf Schritt und Tritt ignoriert. Die alten Kolonialmächte leugnen offensichtlich, wie sie ihre Untertanen behandeln, und weigern sich, auf die Vernunft zu hören. Sie müssen zur Rechenschaft gezogen werden!"
 BBA_italy_anti_colonialism_events.21.a:0 "Unsere Arbeit hier ist getan."
 BBA_italy_anti_colonialism_events.21.b:0 "Sei es auf die harte Tour!"

 BBA_italy_anti_colonialism_events.52.t:0 "Nordafrika stimmt für Beitritt [ROOT.GetNameDef]"
 BBA_italy_anti_colonialism_events.52.desc:0 "Die Menschen in Nordafrika haben gesehen, wie wohlwollend und effizient wir ihr Land regieren, und haben für unsere Regierung gestimmt! Es scheint, dass sich unsere Investitionen und unsere Fürsorge für ihre Provinzen ausgezahlt haben. Davon werden wir alle profitieren."
 BBA_italy_anti_colonialism_events.52.a:0 "Willkommen, Brüder und Schwestern!"
 BBA_italy_anti_colonialism_events.53.t:0 "Nordafrika stimmt für den Austritt [ROOT.GetNameDef]"
 BBA_italy_anti_colonialism_events.53.desc:0 "Obwohl es vielleicht keine völlige Überraschung ist, mussten wir leider erfahren, dass die Menschen in Nordafrika die Vorstellung ablehnen, weiterhin unserer Herrschaft unterworfen zu sein. Sie fühlen sich seit geraumer Zeit vernachlässigt und ausgebeutet und haben deshalb dafür gestimmt, unsere Regierung zu verlassen."
 BBA_italy_anti_colonialism_events.53.a:0 "Wir verabschieden uns von ihnen"
 BBA_italy_anti_colonialism_events.54.t:0 "Ostafrika stimmt für Beitritt [ROOT.GetNameDef]"
 BBA_italy_anti_colonialism_events.54.desc:0 "Die Menschen in Ostafrika haben gesehen, wie wohlwollend und effizient wir ihr Land regieren, und haben für unsere Regierung gestimmt! Es scheint, dass sich unsere Investitionen und unsere Fürsorge für ihre Provinzen ausgezahlt haben. Davon werden wir alle profitieren."
 BBA_italy_anti_colonialism_events.55.t:0 "Ostafrika stimmt für den Austritt [ROOT.GetNameDef]"
 BBA_italy_anti_colonialism_events.55.desc:0 "Obwohl es vielleicht keine völlige Überraschung ist, mussten wir leider erfahren, dass die Menschen in Ostafrika die Vorstellung ablehnen, weiterhin unserer Herrschaft unterworfen zu sein. Sie fühlen sich seit geraumer Zeit vernachlässigt und ausgebeutet und haben deshalb dafür gestimmt, unsere Regierung zu verlassen."
 BBA_italy_anti_colonialism_events.56.t:0 "Westafrika stimmt für Beitritt [ROOT.GetNameDef]"
 BBA_italy_anti_colonialism_events.56.desc:0 "Die Menschen in Westafrika haben gesehen, wie wohlwollend und effizient wir ihr Land verwalten, und haben dafür gestimmt, sich unserer Regierung anzuschließen! Es scheint, dass sich unsere Investitionen und unsere Fürsorge für ihre Provinzen ausgezahlt haben. Davon werden wir alle profitieren."
 BBA_italy_anti_colonialism_events.57.t:0 "Westafrika stimmt für den Austritt [ROOT.GetNameDef]"
 BBA_italy_anti_colonialism_events.57.desc:0 "Obwohl es vielleicht keine völlige Überraschung ist, mussten wir leider erfahren, dass die Menschen in Westafrika die Vorstellung ablehnen, weiterhin unserer Herrschaft unterworfen zu sein. Sie fühlen sich seit geraumer Zeit vernachlässigt und ausgebeutet und haben deshalb dafür gestimmt, unsere Regierung zu verlassen."
 BBA_italy_anti_colonialism_events.58.t:0 "Zentralafrika stimmt für Beitritt [ROOT.GetNameDef]"
 BBA_italy_anti_colonialism_events.58.desc:0 "Die Menschen in Zentralafrika haben gesehen, wie wohlwollend und effizient wir ihr Land verwalten, und haben dafür gestimmt, sich unserer Verwaltung anzuschließen! Es scheint, dass sich unsere Investitionen und unsere Fürsorge für ihre Provinzen ausgezahlt haben. Davon werden wir alle profitieren."
 BBA_italy_anti_colonialism_events.59.t:0 "Zentralafrika stimmt für den Austritt [ROOT.GetNameDef]"
 BBA_italy_anti_colonialism_events.59.desc:0 "Obwohl es vielleicht keine völlige Überraschung ist, mussten wir leider erfahren, dass die Menschen in Zentralafrika die Vorstellung ablehnen, weiterhin unserer Herrschaft unterworfen zu sein. Sie fühlen sich seit geraumer Zeit vernachlässigt und ausgebeutet und haben deshalb dafür gestimmt, unsere Regierung zu verlassen."
 BBA_italy_anti_colonialism_events.60.t:0 "Südafrika stimmt für Beitritt [ROOT.GetNameDef]"
 BBA_italy_anti_colonialism_events.60.desc:0 "Die Menschen in Südafrika haben gesehen, wie wohlwollend und effizient wir ihr Land verwalten, und haben für unsere Regierung gestimmt! Es scheint, dass sich unsere Investitionen und unsere Fürsorge für ihre Provinzen ausgezahlt haben. Davon werden wir alle profitieren."
 BBA_italy_anti_colonialism_events.61.t:0 "Südafrika stimmt für den Austritt [ROOT.GetNameDef]"
 BBA_italy_anti_colonialism_events.61.desc:0 "Obwohl es vielleicht keine völlige Überraschung ist, mussten wir leider erfahren, dass die Bevölkerung Südafrikas die Vorstellung, weiterhin unserer Herrschaft unterworfen zu sein, ablehnt. Sie fühlt sich seit geraumer Zeit vernachlässigt und ausgebeutet und hat deshalb dafür gestimmt, unsere Regierung zu verlassen."
 BBA_italy_anti_colonialism_events.62.t:0 "Der Nahe Osten stimmt für den Beitritt [ROOT.GetNameDef]"
 BBA_italy_anti_colonialism_events.62.desc:0 "Die Menschen im Nahen Osten haben gesehen, wie wohlwollend und effizient wir ihre Länder regieren, und haben dafür gestimmt, sich unserer Regierung anzuschließen! Es scheint, dass sich unsere Investitionen und unsere Fürsorge für ihre Provinzen ausgezahlt haben. Davon werden wir alle profitieren."
 BBA_italy_anti_colonialism_events.63.t:0 "Naher Osten stimmt für Austritt [ROOT.GetNameDef]"
 BBA_italy_anti_colonialism_events.63.desc:0 "Obwohl es vielleicht keine völlige Überraschung ist, mussten wir leider erfahren, dass die Menschen im Nahen Osten die Vorstellung ablehnen, weiterhin unserer Herrschaft unterworfen zu sein. Sie fühlen sich seit geraumer Zeit vernachlässigt und ausgebeutet und haben deshalb dafür gestimmt, unsere Regierung zu verlassen."
 ITA_release_colonies_north_africa_tt:0 "Kolonien in Nordafrika werden freigegeben."
 ITA_release_colonies_east_africa_tt:0 "Kolonien in Ostafrika werden freigegeben."
 ITA_release_colonies_west_africa_tt:0 "Kolonien in Westafrika werden freigegeben."
 ITA_release_colonies_central_africa_tt:0 "Kolonien in Zentralafrika werden freigegeben."
 ITA_release_colonies_south_africa_tt:0 "Kolonien in Südafrika werden freigegeben."

 BBA_italy_anti_colonialism_events.100.t:0 "[FROM.GetAdjective] Beamte wenden sich an uns"
 BBA_italy_anti_colonialism_events.100.desc:0 "Wir haben eine Delegation aus [FROM.GetName] empfangen, die engere Beziehungen zu uns anstrebt. Sie haben ausführlich über unsere gemeinsame Geschichte gesprochen und darüber, wie viel stärker wir wären, wenn wir unsere Kräfte bündeln würden. Zweifellos sehen sie sich als Anführer dieses möglichen Pakts. Ein solches Abkommen wäre zwar in gewisser Hinsicht vorteilhaft, würde aber unsere Autonomie einbüßen."
 BBA_italy_anti_colonialism_events.100.a:0 "Das albanische und das italienische Volk sollen sich vereinen!"
 BBA_italy_anti_colonialism_events.100.b:0 "Wir werden der neuen italienischen Regierung folgen!"
 BBA_italy_anti_colonialism_events.100.c:0 "Unsinn!"
 BBA_italy_anti_colonialism_events.101.t:0 "[FROM.GetNameDefCap] Integriert in [ROOT.GetNameDef]"
 BBA_italy_anti_colonialism_events.101.desc:0 "Die großen und weisen [FROM.GetLeader] des [FROM.GetAdjective]-Volkes haben sich bereit erklärt, sich uns anzuschließen und sich zu einem Land zu vereinen! Dies ist ein bedeutsamer Tag für [ROOT.GetName] und [FROM.GetName]!"
 BBA_italy_anti_colonialism_events.101.a:0 "Wunderbar!"
 BBA_italy_anti_colonialism_events.102.t:0 "[FROM.GetAdjective] Regierung strebt Zusammenarbeit an"
 BBA_italy_anti_colonialism_events.102.desc:0 "Die [FROM.GetAdjective]-Regierung hat sich klugerweise für einen Zusammenschluss mit uns entschieden, allerdings nicht durch eine Verschmelzung zu einem einzigen Land, sondern durch die Annahme von [ROOT.GetAdjective] Führung und Anleitung. Auch wenn dies nicht das von uns erhoffte Ergebnis ist, wird es unsere Position im Mittelmeerraum stärken, ohne dass Blut vergossen wird."
 BBA_italy_anti_colonialism_events.102.a:0 "Ein weiterer Sieg der Arbeiterklasse!"
 BBA_italy_anti_colonialism_events.103.t:0 "[FROM.GetLeader] Unsere Beamten abgelehnt"
 BBA_italy_anti_colonialism_events.103.desc:0 "Es ist offensichtlich, dass das [FROM.GetAdjective]-Volk von einem unklugen und selbstsüchtigen Führer regiert wird. [FROM.GetLeader] weigert sich, zur Vernunft zu kommen und sich mit uns zusammenzuschließen, was beide Länder gestärkt und einen ewigen Frieden zwischen unseren Völkern sichergestellt hätte."
 BBA_italy_anti_colonialism_events.103.a:0 "Werden die [FROM.GetAdjective]-Leute das akzeptieren?"
 BBA_italy_anti_colonialism_events.103.b:0 "Die Tage von [FROM.GetLeader] könnten zu Ende gehen."

 bba_news.107.t:0 "Der Tod des Papstes"
 bba_news.107.desc:1 "Papst Pio XI. ist nach fast 20 Jahren an der Spitze der katholischen Kirche verstorben. Während seiner Amtszeit als Pontifex Maximus beendete Pio XI. den langen Bruch zwischen dem Papsttum und der italienischen Regierung und war maßgeblich an der Wiederherstellung der Unabhängigkeit des Vatikans beteiligt."
 bba_news.107.a:0 "Ein neuer Papst soll ernannt werden"
 bba_news.107.b:0 "Gottes Wege sind unergründlich"
 ITA_pope_dies_tt:0 "§Y$ITA_papa_pio_xii$§! wird der neue Papst."

 bba_news.108.d:0 "Diplomaten der neu eingesetzten italienischen Regierung wurden zu Verhandlungen mit dem albanischen Herrscher König Zog entsandt. Sie wollen die Beziehungen zwischen den beiden Ländern stärken und Zog dazu drängen, in Albanien eine sozialistischere Politik zu verfolgen. \n\nVielleicht weil er das Gefühl hat, dass die Tage der albanischen Monarchie zu Ende gehen, oder vielleicht auch nur aus purer Verachtung für den Sozialismus, weigert sich König Zog, mit italienischen Beamten zu sprechen und fordert das albanische Volk auf, dem Druck von [ITA.GetNameDef] zu widerstehen. \n\nDennoch sind sich ausländische Militärexperten einig, dass [ALB.GetNameDef] kaum eine Chance hat, einer Invasion Widerstand zu leisten, sollte die italienische Regierung Maßnahmen ergreifen."
 bba_news.108.b:0 "Die Monarchie ist überholt!"

 bba_news.109.t:0 "[?ITA.ITA_var_deposed_leader.GetName] wurde abgesetzt"
 bba_news.109.desc:0 "In einem beispiellosen Schritt hat der Große Rat des Faschismus unter [FROM.GetName] die Macht ergriffen, [?ITA.ITA_var_deposed_leader.GetName] abgesetzt und unter Hausarrest gestellt. Hintergrund dieser Aktion ist der Versuch, das Land vor den militärischen Versäumnissen und der Inkompetenz des Duce zu retten. Diese haben zu Spannungen innerhalb von [FROM.GetName] geführt und einige befürchten, dass dies zu einem Bürgerkrieg führen könnte, wenn keine Schritte zur Entspannung der Lage unternommen werden."
 bba_news.109.a:0 "Besorgniserregend!"
 bba_news.109.b:0 "Prächtig!"

 bba_news.110.t:0 "[FROM.GetName] Brüche im Bürgerkrieg!"
 bba_news.110.desc:0 "Der neu ernannte Anführer von [FROM.GetName], [FROM.GetLeader], konnte die wachsenden Spannungen, die die [FROM.GetAdjective]s in letzter Zeit entzweit haben, nicht lösen. Dies führte zum Ausbruch eines Bürgerkriegs, der das Land von innen heraus zerreißt. Verschiedene Gruppen, von Kommunisten über Royalisten bis hin zu Demokraten, ringen um die Macht und bilden wechselnde Allianzen, während die Faschisten entschlossen sind, ihre Herrschaft aufrechtzuerhalten. \n\nObwohl der Ausgang des Bürgerkriegs noch ungewiss ist, wird Hilfe von außen sicherlich eine wichtige Rolle für den zukünftigen Sieg spielen. "
 bba_news.110.a:0 "Das sind wirklich beunruhigende Neuigkeiten."
 bba_news.110.b:0 "Wir müssen die Lage stabilisieren!"
 bba_news.110.c:0 "Das bietet uns Chancen!"

 bba_news.111.t:0 "Proklamation der Anarchistischen Konföderation"
 bba_news.111.desc:0 "[GetAnarchistConfederationEventDesc]"
 bba_news.111.desc_joint_proclamation:0 "[From.GetName] und [SPC.GetName] haben eine gemeinsame Proklamation zur Gründung der Anarchistischen Konföderation veröffentlicht. Darin verpflichten sie sich, sich im Falle eines Angriffs durch eine ausländische Macht gegenseitig zu helfen. Aufgrund dieser gemeinsamen Erklärung strömten Tausende Anarchisten nach Italien, um die Proklamation zu unterstützen."
 bba_news.111.desc_single_proclamation:0 "Tausende und Abertausende Anarchisten aus aller Welt strömen nach [FROM.GetName], nachdem die Regierung die Gründung der Anarchistischen Konföderation verkündet hat. In ihrer Proklamation äußerten sie sich pauschale Forderungen nach der Zerschlagung des Kapitalismus und der Bekämpfung des Faschismus, wo immer diese Übel auftreten."
 bba_news.111.a:0 "Wir werden sehen, wie lange das anhält"

 bba_news.666.t:0 "Der Papst kommt an die Macht"
 bba_news.666.desc:0 "Der Papst [FROM.GetLeader] hat die Staats- und Regierungschefs der Welt schockiert, indem er König [?ITA.ITA_var_deposed_leader.GetName] von [FROM.GetName] absetzte und mit der Behauptung, Gott wolle es, selbst die Macht an sich riss. Auch viele Italiener sind schockiert, doch das Papsttum genießt im Land breite Unterstützung, und manche begrüßen diesen plötzlichen Regierungswechsel als Beginn einer neuen und glorreichen Ära für [FROM.GetNameDefCap]."
 bba_news.666.a:0 "Sicherlich unerwartet"

 bba_news.200.t:0 "Hitler tot"
 bba_news.200.desc:0 "Der [GER.GetAdjective]-Rundfunk hat die Nachricht vom Tod des Führers Adolf Hitler ausgestrahlt. Die Nachricht erfolgte nach schweren Kämpfen in [GER.Capital.GetCapitalVictoryPointName] und dem Vorstoß alliierter und [SOV.GetAdjective] Streitkräfte in die Kerngebiete von [GER.GetAdjective]. Die Nachricht wurde von [GER.GetLeader], dem angeblichen Nachfolger des Führers, verkündet, der die Trauer der Nation über den Verlust Hitlers zum Ausdruck brachte und seinen Tod in einem Kommandoposten schilderte, von dem aus er die Verteidigung der Nation orchestrierte. Weder Hitlers Tod noch die Art und Weise, wie er angeblich eintrat, können verifiziert werden. Die Nachricht wird sich jedoch mit Sicherheit auf die Moral der [GER.GetAdjective]-Bevölkerung auswirken. "
 bba_news.200.a:0 "Werden die [GER.GetAdjective]s weiterkämpfen?"
 bba_news.200.b:0 "Der Mistkerl ist also tot? Zu schade, dass wir ihn nicht lebend gefangen haben!"
 bba_news.200.c:0 "Können wir sicher sein, dass er tot ist?"
 bba_news.200.d:0 "Das ändert nichts. Wir werden bis zum letzten Mann kämpfen."

 bba_news.201.t:0 "[POL.GetAdjective] Regierung schließt sich [SOV.GetNameDef] an"
 bba_news.201.desc:0 "Obwohl während des Krieges eine [POL.GetAdjective]-Exilregierung von London aus operierte, erkannten die Alliierten die [SOV.GetAdjective]-ausgebildeten Kommunisten als legitime Regierung von [POL.GetName] an. Diplomatischen Quellen zufolge wurde zwischen den Alliierten und [SOV.GetName] eine Vereinbarung über die Aufteilung Europas in Einflusssphären nach dem Krieg getroffen. Unglücklicherweise für die [POL.GetAdjective]-Regierung in London war [SOV.GetLeader]s Wunsch, Polen in die [SOV.GetAdjective]-Einflusssphäre aufzunehmen, ein großes Hindernis für die [SOV.GetAdjective]-Vereinbarung.\n\nWährend viele dies als Verrat an [POL.GetName] betrachten, argumentieren andere, dass es angesichts der bereits bestehenden [SOV.GetAdjective]-Truppen im Land wenig Grund gab, ihr Ultimatum abzulehnen und die zukünftige Stabilität Europas zu gefährden."
 bba_news.201.a:0 "Ein bedauerliches Opfer für den zukünftigen Frieden."
 bba_news.201.b:0 "Den Alliierten kann man nicht trauen."
 bba_news.201.c:0 "Wir werden uns nie wieder der faschistischen Aggression aus Europa aussetzen."

 ###ITALYS NEWS EVENTS####
 #PURGE THE PARTY
 bba_news.100.t:0 "[GetPurgeEventTitles]"
 bba_news.100.a:0 "[GetPurgeEventOptions]"
 bba_news.100.t_some_purged:0 "Die Säuberung der Partito Nazionale Fascista"
 bba_news.100.desc_some_purged:0 "Einige von Mussolinis engsten Anhängern wurden aus der faschistischen Partei entfernt, da [ROOT.GetLeader] seinen Einfluss auf die Partei verstärkt. Die Säuberung war nicht so schwerwiegend wie befürchtet, verschafft [ROOT.GetLeader] aber eine stärkere Position, um seine eigenen Ziele für Italien zu verfolgen."
 bba_news.100.a_some_purged:0 "Gute Befreiung"
 bba_news.100.t_many_purged:0 "Die große Säuberung der Partito Nazionale Fascista"
 bba_news.100.desc_many_purged:0 "Mehrere hochrangige Mitglieder der faschistischen Partei wurden kürzlich ihres Amtes enthoben, als [Root.GetLeader] als alleiniger Führer von [ROOT.GetNameDefCap] hervorging. Diese Säuberung beseitigte alle potenziellen Verbündeten des alten Duce, Benito Mussolini, und jegliche Hoffnungen auf eine Wiedereinsetzung als italienischer Führer."
 bba_news.100.a_many_purged:0 "Eine Machtdemonstration"
 bba_news.100.t_none_purged:0 "Die Säuberung, die nie stattfand"
 bba_news.100.desc_none_purged:0 "Gerüchte über eine große Säuberungsaktion zur Vertreibung Mussolinis loyaler Mitglieder aus der Partito Nazionale Fascista kursierten in letzter Zeit. Stattdessen wurde jedoch offenbar eine parteiweite Amnestie angeboten. Dies könnte die Partei zwar stärken, schwächt aber [ROOT.GetLeader]s Position als Parteiführer."
 bba_news.100.a_none_purged:0 "[ROOT.GetLeader] der Barmherzige klingt gut."
 #FATE OF MUSSOLINI
 bba_news.101.t:0 "Ex-italienischer Staatschef Benito Mussolini hingerichtet"
 bba_news.101.desc:0 "Nach seinem Sturz in Italien wurde Benito Mussolini wegen krimineller Inkompetenz und Verrats durch Untätigkeit unter Hausarrest gestellt und erwartete nun sein Schicksal, das ihn schließlich einholte. Am frühen Morgen wurde der ehemalige italienische Staatschef vor einer kleinen Gruppe von Regierungsvertretern erschossen und noch am selben Tag in einer privaten Zeremonie im Beisein seiner engsten Familie beerdigt."
 bba_news.101.a:0 "Und so endete das Leben Mussolinis."
 bba_news.102.t:0 "[GetTrialOfMussoliniTitles]"
 bba_news.102.t_innocent:0 "Mussolini in allen Punkten freigesprochen"
 bba_news.102.t_guilty:0 "Mussolini zu Gefängnis verurteilt"
 bba_news.102.desc:0 "[GetTrialOfMussoliniDesc]"
 bba_news.102.desc_innocent:0 "Zur Überraschung aller wurde der ehemalige Duce in allen Anklagepunkten für unschuldig befunden und freigesprochen. Mussolini kann nun sein restliches Leben als freier Bürger von [ROOT.GetNameDefCap] verbringen. Obwohl er bisher keine weiteren Pläne verraten hat, ist der Einfluss des alten Duce auf die Herzen und Köpfe vieler Menschen nicht zu unterschätzen."
 bba_news.102.desc_guilty:0 "Es dürfte niemanden überraschen, dass der ehemalige italienische Staatschef in allen Anklagepunkten für schuldig befunden wurde. Der ehemalige Duce hatte auf nicht schuldig plädiert, wurde aber zu lebenslanger Haft verurteilt. Man kann nur vermuten, dass das neue Regime den Prozess beeinflusst hat und mit dessen Ausgang durchaus zufrieden sein dürfte."
 bba_news.102.a:0 "Ein Scheinprozess"
 bba_news.103.t:0 "[GetAssassinationOfMussoliniTitles]"
 bba_news.103.t_communists:0 "Mussolini von Kommunisten getötet!"
 bba_news.103.t_coverstory:0 "Mussolini bei Fluchtversuch getötet!"
 bba_news.103.desc:0 "[GetAssassinationOfMussoliniDesc]"
 bba_news.103.desc_communists:0 "Der ehemalige Führer von [FROM.GetNameDefCap], Benito Mussolini, wurde tot aufgefunden. Offenbar wurde er von Kommunisten hingerichtet. Das neue Regime unter [FROM.GetLeader] reagierte schnell und verhaftete mehrere kommunistische Sympathisanten, da im Land eine aufgewühlte Atmosphäre herrschte und viele nach Gerechtigkeit und Rache an ihren vermeintlichen Feinden riefen."
 bba_news.103.desc_coverstory:0 "Der ehemalige Führer von [FROM.GetNameDefCap], Benito Mussolini, versuchte, seinem Hausarrest zu entkommen, in den er nach seinem Sturz verwickelt war. Eine Handvoll bewaffneter Männer stürmte Mussolinis Quartier, und es kam zu einer Schießerei. Während der Unruhen wurde Mussolini getroffen und erlag seinen Verletzungen."
 bba_news.103.a:0 "Auf jeden Fall ein blutiges Durcheinander."

 bba_news.104.t:0 "Ein neues Militärprogramm angekündigt"
 bba_news.104.desc:0 "[ROOT.GetNameDefCap] unterzeichnet ein gemeinsames Kooperationsprogramm mit [FROM.GetNameDefCap] zur Stärkung der militärischen Fähigkeiten beider Länder. Das Abkommen ermöglicht beiden Ländern einen leichteren Austausch von Technologien und Forschungsergebnissen und wird die Bindung zwischen ihnen stärken."
 bba_news.104.a:0 "Alles nach Plan"
 bba_news.105.t:0 "Ein neuer Nichtangriffspakt wurde unterzeichnet"
 bba_news.105.desc:0 "[ROOT.GetNameDefCap] und [FROM.GetNameDefCap] haben einen Nichtangriffspakt unterzeichnet, der den Frieden zwischen den beiden Nationen garantiert. Dadurch können sie sich auf andere Aufgaben konzentrieren, doch alle fragen sich, wie lange dieser prekäre Pakt halten wird."
 bba_news.105.a:0 "Eine weise Entscheidung"

 bba_news.106.t:0 "[GetVittorioDiesEventTitles]"
 bba_news.106.t_king:0 "Der König von Italien ist gestorben"
 bba_news.106.t_emperor:0 "Der Kaiser von Italien stirbt"
 bba_news.106.desc:0 "[GetVittorioDiesEventDesc]"
 bba_news.106.desc_king:0 "Der alte König von [FROM.GetName], Vittorio Emanuele III., ist gestorben. Er führte Italien durch zwei Weltkriege und war ein Symbol der Stabilität und ein Sammelpunkt für die [FROM.GetAdjective] in diesen schweren Zeiten. Trauernde Menschen gingen auf die Straße, um ihre Dankbarkeit und Unterstützung für den toten König zu zeigen. \n\n Die Nation hofft, dass der einzige Erbe und Nachfolger des alten Königs, Prinz Umberto, eine ebenso treue Stütze für das [FROM.GetAdjective] Volk sein wird. Der Prinz wird bald zum König Umberto II. gekrönt – möge er lange regieren!"
 bba_news.106.desc_emperor:0 "Der alte Kaiser von [FROM.GetName], Vittorio Emanuele III., ist gestorben. Er führte Italien durch zwei Weltkriege und war ein Symbol der Stabilität und ein Sammelpunkt für die [FROM.GetAdjective]s in diesen schweren Zeiten. Trauernde Menschen gingen auf die Straße, um ihre Dankbarkeit und Unterstützung für den verstorbenen Kaiser zu zeigen. \n\n Die Nation hofft, dass der einzige Erbe und Nachfolger des alten Kaisers, Prinz Umberto, eine ebenso treue Stütze für das [FROM.GetAdjective] Volk sein wird. Der Prinz wird bald zum Kaiser Umberto I. von [FROM.GetName] gekrönt – möge er lange regieren!"
 bba_news.106.a:0 "Ende einer Ära"

 bba_italian_formables_news.1.t:0 "Italia Irredenta wurde erreicht"
 bba_italian_formables_news.1.desc:1 "Heute hat der italienische Staatschef [ITA.GetLeader] den Beginn eines Prozesses zur Integration der von italienischen Irredentisten beanspruchten Gebiete in den italienischen Staat angekündigt. Er erklärte, dies werde Italiens Position als Weltmacht stärken und das italienische Volk endlich unter einer Flagge vereinen. Viele fragen sich, ob eine so große Nation wirklich zusammenhalten kann, und nur die Zeit wird zeigen, was Italien noch bevorsteht."
 bba_italian_formables_news.1.a:0 "Wir sind die neuen Hegemonen Europas!"
 bba_italian_formables_news.1.b:0 "Eine solche Nation wird unweigerlich zerfallen"



##########################################################################
###############       Switzerland       ##################################
##########################################################################

 #Triggered by focus "Swiss Guiding Principles" 
 BBA_switzerland.1.t:0 "[ROOT.GetAdjective] Leitprinzipien"
 BBA_switzerland.1.desc:0 "Die politische Lage in und um [ROOT.GetNameDefCap] verschlechtert sich rapide. Es gibt eine wachsende Bewegung, die sich für Leitprinzipien einsetzt, um das Schiff im bevorstehenden Sturm in die richtige Richtung zu steuern. Die Frage ist jedoch: Welche? \n\n Wir wissen nicht, was unsere Nachbarn tun werden, aber wir müssen jetzt entscheiden, welche Vorgehensweise [ROOT.GetName] das Überleben ermöglicht."
 BBA_switzerland.1.a:0 "Wir müssen unsere demokratischen und neutralen Werte schützen"
 BBA_switzerland.1.b:0 "Vielleicht sollten wir uns aktiver für den Schutz unserer Demokratie einsetzen"
 BBA_switzerland.1.c:0 "Neutralität ist unter diesen Umständen unhaltbar"
 

### David Frankfurter Case ###

#Assassination 
 BBA_switzerland.2.t:0 "Vertreter der NSDAP in der Schweiz ermordet"
 BBA_switzerland.2.desc:0 "David Frankfurter, ein in Bern lebender jüdischer Kroate, stellte sich der Bündner Polizei und gestand die Ermordung von Wilhelm Gustloff, dem Führer der Auslandsorganisation der NSDAP in der Schweiz. \n\nAls Grund für die Schießerei nannte er die schädlichen Ansichten der NSDAP gegenüber dem jüdischen Volk und Gustloffs Rolle bei deren Verbreitung in [SWI.GetName]. \n\nWie wir in dieser möglicherweise langwierigen Angelegenheit vorgehen, wird [GER.GetNameDef] und der Rest der Welt als Maßstab für unser Engagement für Neutralität und Rechtsstaatlichkeit verwenden."
 BBA_switzerland.2.a:0 "Er wird einen fairen Prozess bekommen."
 BBA_switzerland.2.b:0 "Vertuschen Sie alles, rekrutieren Sie ihn als Agenten!"
 BBA_switzerland.2.c:0 "Er hat gestanden, deshalb sollte er sofort die Höchststrafe bekommen."

#Trial Approaches
 BBA_switzerland.3.t:0 "Der Prozess gegen David Frankfurter rückt näher"
 BBA_switzerland.3.desc:1 "Der Prozess gegen David Frankfurter, der im Februar in Davos einen Vertreter der NSDAP ermordete, steht kurz bevor. Wir haben ihm ein faires und neutrales Verfahren versprochen, aber es gibt sicherlich auch andere Möglichkeiten. \n\nWir könnten ihn heimlich freilassen und für Geheimdienste rekrutieren, oder wir könnten versuchen, [?SWI.SWI_fascist_germany.GetNameDef] zu beschwichtigen, indem wir den Prozess absagen und ihn stattdessen sofort verurteilen. \n\nWas auch immer wir tun, es könnte unsere Möglichkeiten übersteigen, alle Seiten zufriedenzustellen."
 BBA_switzerland.3.a:0 "Der Prozess wird wie geplant fortgesetzt"
 BBA_switzerland.3.b:0 "Er wird eine Bereicherung für unsere Geheimdienstbemühungen sein"
 BBA_switzerland.3.c:0 "Bei näherer Betrachtung ist er eindeutig schuldig"

#Germany thanks Switzerland for swift action
 BBA_switzerland.4.t:1 "[?SWI.SWI_fascist_germany.GetLeader] erfreut über die Entscheidung von [SWI.GetName]"
 BBA_switzerland.4.desc:1 "Der Anführer von [?SWI.SWI_fascist_germany.GetNameDef], [?SWI.SWI_fascist_germany.Getleader], hat [?SWI.SWI_fascist_germany.Getleader.GetHerHis] gegenüber [SWI.GetNameDef] seine Dankbarkeit für die schnelle Erledigung des Mörders von Wilhelm Gustloff zum Ausdruck gebracht, sodass [SWI.GetName]s Haltung in solchen Angelegenheiten außer Zweifel steht. Diese Missachtung von Menschenrechten und demokratischen Werten wird [?SWI.SWI_fascist_germany.GetName]s Haltung uns gegenüber sicherlich verbessern. \n\nTrotz [?SWI.SWI_fascist_germany.Getleader.GetHerHis] positiver Bemerkungen wurde deutlich gemacht, dass das ideale Ergebnis für die NSDAP eine Auslieferung an [?SWI.SWI_fascist_germany.GetNameDef] gewesen wäre, auch wenn dies für [SWI.GetNameDef] derzeit nicht in Frage kommt."
 BBA_switzerland.4.a:0 "Es ist jetzt geschafft"

 #Germany is notified Switzerland decides to continue with the trial. 
 BBA_switzerland.5.t:0 "[SWI.GetName] beschließt, den Prozess gegen Gustloffs Mörder fortzusetzen"
 BBA_switzerland.5.desc:0 "Die Behörden in [SWI.GetName] haben bekannt gegeben, dass David Frankfurter, der den Mord an der NSDAP-Auslandsorganisation in Davos gestanden hat, wie in jedem anderen Mordfall ein faires und ausgewogenes Verfahren nach Bündner Recht erhalten wird.\n\nDa Gustloff ein Offizier der NSDAP war und wir Einfluss auf unseren wehrlosen Nachbarn hatten, könnten wir einen Anwalt schicken, der Gustloffs Witwe vertritt und auf unser Wunschergebnis drängen. Auf diese Weise können wir sicherstellen, dass seine Strafe seinem Verbrechen angemessen ist. \n\nPragmatischer ausgedrückt: Dies könnte [SWI.GetNameDef] auch dazu zwingen, Partei zu ergreifen und endlich die fadenscheinige Fassade der Neutralität zu durchbrechen, mit der sie sich immer so gerne brüsten."
 BBA_switzerland.5.a:0 "Sie verdient Gerechtigkeit für dieses abscheuliche Verbrechen!"
 BBA_switzerland.5.b:0 "Keine Notwendigkeit, in [SWI.GetAdjective] Angelegenheiten einzugreifen"

 #Germany INSISTS on harsher trial  
 BBA_switzerland.6.t:0 "[GER.GetAdjective] drängen auf eine harte Strafe für David Frankfurter"
 BBA_switzerland.6.desc:1 "Der Rechtsvertreter von Gustloffs Witwe, zweifellos von [?SWI.SWI_fascist_germany.GetNameDef] geschickt, versucht, den Bundesrat dazu zu bewegen, das Gericht zu einer harten Strafe für David Frankfurter zu bewegen. Dies ist ein sehr ungewöhnlicher Antrag, der zweifellos ein Versuch von [?SWI.SWI_fascist_germany.GetNameDef] ist, Macht über uns auszuüben. \n\nDie Annahme dieses Antrags könnte Auswirkungen auf unseren internationalen Ruf haben, aber wir sollten sicherstellen, dass wir es uns leisten können, ihn abzulehnen, wenn wir uns dazu entschließen."
 BBA_switzerland.6.a:0 "Dies ist eine Angelegenheit für die Gerichte"
 BBA_switzerland.6.b:0 "Wir werden es berücksichtigen"

#Frankfurter "dies" under mysterious circumstances
 BBA_switzerland.7.t:0 "Frankfurter auf mysteriöse Weise im Gefängnis getötet"
 BBA_switzerland.7.desc:1 "Die Behörden in Graubünden berichten, dass David Frankfurter, der sich in Untersuchungshaft befand, nachdem er den Mord an dem NSDAP-Vertreter Wilhelm Gustloff gestanden hatte, heute Morgen tot in seiner Zelle aufgefunden wurde. Ob er sich den Mord selbst zugefügt hat oder von einem wütenden Nazi-Sympathisanten im Gefängnis verursacht wurde, ist derzeit noch unklar, aber die Bundespolizei verspricht, nach Antworten zu suchen.\n\nWir haben keine Beweise für ein Fehlverhalten, aber die Umstände sind äußerst mysteriös, und einige hegen großes Misstrauen gegenüber der [SWI.GetAdjective]-Regierung, weil sie [?SWI.SWI_fascist_germany.GetAdjective]-Vertretern nicht erlaubt, die Leiche oder den Tatort zu besichtigen."
 BBA_switzerland.7.a:0 "nun ja"

#Frankfurter Trial 
 BBA_switzerland.8.t:0 "Der Prozess gegen David Frankfurter"
 BBA_switzerland.8.desc:0 "Ganz [SWI.GetName] und seine Nachbarn verfolgen den Prozess gegen David Frankfurter mit großem Interesse. Der Ausgang des Prozesses wird nicht nur das Schicksal des selbsternannten Schuldigen offenbaren, sondern auch das von [SWI.GetNameDef] als Ganzem und die Frage aufwerfen, inwieweit die Stadt bereit ist, ihre Institutionen und Traditionen zu kompromittieren. \n\nAlle Anzeichen des Gerichts deuten auf eine faire Haftstrafe hin, doch der Einfluss des Rates könnte den Ausgang des Prozesses und vielleicht sogar das Wesen des Landes verändern."
 BBA_switzerland.8.a:0 "Lassen Sie die Gerichte entscheiden"
 BBA_switzerland.8.b:0 "Er hat der Demokratie einen Dienst erwiesen. Er sollte begnadigt werden!"
 BBA_switzerland.8.c:1 "Wir können es nicht riskieren, [?SWI.SWI_fascist_germany.GetNameDef] zu entfremden. Er soll die Höchststrafe bekommen"

#To SWI: Germany is angry
 BBA_switzerland.9.t:0 "[SWI.GetName] provoziert unseren Zorn!"
 BBA_switzerland.9.desc_default:1 "[SWI.GetNameDefCap] hat trotz unserer Forderungen nach Gerechtigkeit und ihres Anspruchs auf Neutralität und Rechtsstaatlichkeit David Frankfurter begnadigt, der nicht nur ein Mitglied der NSDAP getötet, sondern dies auch bereitwillig zugegeben hat!\n\nDas beweist, dass sie sich für eine Seite entschieden haben und in einem möglichen Krieg als Freiwild gelten werden. Diese Beleidigung von [?SWI.SWI_fascist_germany.GetNameDef] können wir nicht hinnehmen."
 BBA_switzerland.9.desc_alt:1 "Unsere Agenten in [SWI.GetName] berichten, dass [SWI.GetNameDef] trotz ihrer Neutralität und Rechtsstaatlichkeit David Frankfurter, den selbsternannten Mörder von Wilhelm Gustloff, heimlich aus dem Gefängnis befreit hat, indem sie seinen Tod vortäuschten, und ihn als Geheimagenten rekrutiert haben.\n\nDas beweist, dass man ihnen nicht trauen kann und sie bei Gelegenheit eliminiert werden müssen. Diese eklatante Beleidigung von [?SWI.SWI_fascist_germany.GetNameDef] können wir nicht hinnehmen."
 BBA_switzerland.9.a:0 "Sie werden bezahlen!"

#To SWI: Germany is pleased
 BBA_switzerland.10.t:1 "[?SWI.SWI_fascist_germany.GetNameDefCap] ist mit der Entscheidung von [SWI.GetNameDef] zufrieden"
 BBA_switzerland.10.desc:1 "Vertreter von [?SWI.SWI_fascist_germany.GetNameDef] und Gustloffs Witwe haben [SWI.GetNameDef] ihre Dankbarkeit für das entschiedene Urteil gegen Frankfurter zum Ausdruck gebracht, sodass [SWI.GetNameDef]s Haltung in solchen Angelegenheiten klar ist. Dies wird [?SWI.SWI_fascist_germany.GetName]s Haltung gegenüber [SWI.GetName] sicherlich verbessern. \n\nTrotz [?SWI.SWI_fascist_germany.Getleader.GetHerHis] positiver Äußerungen wurde deutlich gemacht, dass das ideale Ergebnis für die NSDAP eine Auslieferung an [?SWI.SWI_fascist_germany.GetNameDef] gewesen wäre."
 BBA_switzerland.10.a:0 "Vielleicht wird dies unsere Sicherheit gewährleisten"

#Trial Verdict 
 BBA_switzerland.11.t:0 "David Frankfurter zu Gefängnis verurteilt"
 BBA_switzerland.11.desc_SWI:1 "Da der Rat beschloss, den Fall nicht weiter zu verfolgen und ihn den Gerichten und dem Bündner Recht zu überlassen, wurde David Frankurter, der vorsätzlich Wilhelm Gustloff ermordet hatte, zu 18 Jahren Gefängnis verurteilt. \n\nWir wissen, dass [?SWI.SWI_fascist_germany.GetNameDef] ein viel härteres Urteil gewünscht hätte, daher werden unsere Diplomaten alle Hände voll zu tun haben, um sie zu beschwichtigen. Aber wir konnten es uns in Zeiten wie diesen nicht leisten, Partei zu ergreifen. Unsere Neutralität wird das [SWI.GetAdjective] Volk in dem möglicherweise bevorstehenden Sturm schützen."
 BBA_switzerland.11.desc_GER:1 "[SWI.GetNameDefCap] besaß die Frechheit, Gustloffs Mörder zu einer lächerlichen Haftstrafe von 18 Jahren zu verurteilen! Es ist bedauerlich, aber wir hätten nicht viel stärker auf eine höhere Strafe drängen können, ohne die Rufe nach einem Boykott der Olympischen Spiele zu schüren. \n\nIm Moment können wir Gustloff zumindest zum Märtyrer [?SWI.SWI_fascist_germany.GetNameDef] machen und den Mord für Propagandazwecke nutzen. Vielleicht können wir bei einer zukünftigen Invasion Frankfurter in die Finger bekommen und Gerechtigkeit erfahren."
 BBA_switzerland.11.a:0 "Es ist das Beste, was wir im Moment tun können"
 BBA_switzerland.11.b:0 "Das werden wir nicht vergessen!" #THE GALLLLL!!!!

#After the war
 BBA_switzerland.12.t:0 "David Frankfurter bittet um Begnadigung"
 BBA_switzerland.12.desc:0 "Da der Krieg nun vorbei ist und $GER_fascism_DEF$ nicht mehr existiert, hat David Frankfurter mit Hilfe seines Rechtsbeistands George Brunschvig um Begnadigung für die Tötung von Wilhelm Gustloff im Jahr 1936 gebeten.\n\nDa wir nicht länger von faschistischen Regimen umgeben sind und Frankfurters Verbrechen dank der im Laufe des Krieges aufgedeckten Nazi-Gräueltaten in einen neuen Kontext gestellt wurden, wäre es nahezu risikolos, ihm Gnade anzubieten. Wir könnten ihm vorsichtshalber sogar die Wiedereinreise nach [ROOT.GetName] verbieten."
 BBA_switzerland.12.a:0 "Er wird begnadigt"
 BBA_switzerland.12.b:0 "Er wird seine Strafe vollenden"

 BBA_switzerland.13.t:0 "[SWI.GetNameDefCap] akzeptiert unsere Anfrage"
 BBA_switzerland.13.desc:0 "Der Vertreter, den wir zur Beratung von Gustloffs Witwe entsandt hatten, ist mit fantastischen Neuigkeiten zurückgekehrt. Das Urteil der Richter in [SWI.GetName] verhängte für David Frankfurter ein sehr hartes Urteil, das unseren Forderungen recht nahe kommt."
 BBA_switzerland.13.a:0 "Vielleicht müssen wir doch nicht einmarschieren"
 
 SWI_frankfurter_trial_will_continue_TT:0 "§YDavid Frankfurter§! wird vor Gericht gestellt und die Ereignisse werden sich im Laufe der Zeit entfalten."
 SWI_frankfurter_immediate_harsh_sentence_TT:0 "§YDavid Frankfurter§! wird ohne Gerichtsverfahren die Höchststrafe erhalten."
 SWI_frankfurter_german_expectations_TT:0 "§Y[GER.GetNameDefCap]§! erwartet eine härtere Strafe für §YDavid Frankfurter§!"

 #### Other Events ####

 BBA_switzerland.14.t:0 "Die Petition der 200"
 BBA_switzerland.14.desc:1 "Der Bundesrat hat eine Petition erhalten, die von 200 Mitgliedern mehrerer rechtsgerichteter Gruppen unterzeichnet wurde. Diese hoffen, [ROOT.GetNameDef] zu einem freundlicheren Verhältnis zu [SWI_get_fascist_neighbor] zu bewegen und gleichzeitig relativ neutral zu bleiben. Sie wollen dies erreichen, indem sie jegliche negative Presse über sie zensieren, um deren Zorn zu vermeiden."
 BBA_switzerland.14.a:1 "Wir sollten sie beschwichtigen und ihre Bitte ignorieren"
 BBA_switzerland.14.b:1 "Sie haben einige gute Punkte"
 BBA_switzerland.14.c:1 "Das sind Feinde der Schweiz, verhaftet sie!"
  
 #Espionage stuff 
 BBA_switzerland.15.t:0 "[FROM.GetName] bietet uns an, uns einen Mitarbeiter zu leihen"
 BBA_switzerland.15.desc:0 "Trotz ihrer neutralen Haltung bietet [FROM.GetNameDef] heimlich die Möglichkeit an, einen ihrer Agenten für unsere Geheimdienstmissionen zu engagieren. \n\nDies ist für uns besonders vorteilhaft, da die Bevölkerung von [SWI.GetNonIdeologyName] die gleiche Sprache spricht wie [GER.GetNonIdeologyName], [FRA.GetNonIdeologyName] und [ITA.GetNonIdeologyName] und sie daher einen Vorteil bei der Infiltration dieser Länder haben."
 BBA_switzerland.15.a:0 "Wir könnten einen [GER.GetAdjective]-Agenten gebrauchen"
 BBA_switzerland.15.b:0 "Ein [ITA.GetAdjective]-Mitarbeiter wäre nützlich"
 BBA_switzerland.15.c:0 "Vielleicht ein [FRA.GetAdjective]-Agent"
 BBA_switzerland_fra.15.tt:0 "Wird einen lokalen Mitarbeiter mit §Y[FRA.GetAdjectiveCap]§! und §Y[SWI.GetAdjectiveCap]§! Nationalität erhalten"
 BBA_switzerland_ita.15.tt:0 "Wird einen lokalen Mitarbeiter mit §Y[ITA.GetAdjectiveCap]§! und §Y[SWI.GetAdjectiveCap]§! Nationalität erhalten"
 BBA_switzerland_ger.15.tt:0 "Wird einen lokalen Mitarbeiter mit §Y[GER.GetAdjectiveCap]§! und §Y[SWI.GetAdjectiveCap]§! Nationalität erhalten"

 BBA_switzerland.16.t:0 "[FROM.GetNameDefCap] sucht geheimen Pakt"
 BBA_switzerland.16.desc:1 "Einer unserer in [FROM.GetCapitalVictoryPointName] stationierten Geheimagenten wurde mit einem Vorschlag der [FROM.GetAdjective]-Regierung kontaktiert: Ein geheimer Pakt zwischen unserer Fraktion und [FROM.GetNameDef], der bedeutet, dass sie uns helfen werden, unsere Feinde in Europa zu schwächen, während sie gleichzeitig den Anschein von Neutralität wahren und ihn zu gegebener Zeit sogar zu unseren Gunsten aufgeben.\n\nEs bedeutet auch, dass wir sie verteidigen werden, wenn sie Gefahr laufen, angegriffen zu werden."
 BBA_switzerland.16.a:0 "Sie werden eine große Bereicherung sein"
 BBA_switzerland.16.b:0 "Wir brauchen ihre Hilfe nicht"
  
 BBA_switzerland.17.t:0 "[FROM.GetNameDefCap] hat unseren geheimen Pakt akzeptiert"
 BBA_switzerland.17.desc:0 "Über unsere Geheimkanäle mit [FROM.GetNameDef] haben wir die Bestätigung erhalten, dass sie unserem vorgeschlagenen geheimen Bündnis zugestimmt haben. Von nun an werden sie unsere Unterstützung im Kampf gegen ihre Feinde haben und uns beschützen, falls wir jemals kurz vor einer Invasion stehen. Das bedeutet jedoch nicht, dass wir sicher sind. Der Feind könnte unsere Aktionen aufdecken und als Bedrohung empfinden. Daher müssen wir weiterhin mit der gleichen Vorsicht vorgehen wie bisher, während wir uns auf den Einsatz vorbereiten."
 BBA_switzerland.17.a:0 "Es ist im Interesse unserer Demokratie!"
 
 BBA_switzerland.18.t:0 "[FROM.GetNameDefCap] hat unseren Vorschlag abgelehnt!"
 BBA_switzerland.18.desc:0 "Schreckliche Neuigkeiten von unseren Kontakten in [FROM.GetCapitalVictoryPointName]. Offenbar hat die [FROM.GetAdjective]-Regierung unseren Vorschlag für einen Geheimpakt abgelehnt und uns damit einer Invasion unserer Nachbarn ausgesetzt. Wir müssen uns nun auf die Verteidigung vorbereiten oder einen anderen Weg suchen, um unsere Unabhängigkeit und Demokratie zu bewahren."
 BBA_switzerland.18.a:0 "Wir stehen allein gegen unsere Feinde."
 
 ### Diplomatic Events ### 

 BBA_switzerland.19.t:0 "[FROM.GetNameDefCap] lädt uns ein, ihrer Entente beizutreten"
 BBA_switzerland.19.desc:0 "Historisch betrachtet war [FROM.GetName] stets streng neutral, doch angesichts der aktuellen Weltlage scheint es beschlossen zu haben, diese Neutralität zu brechen. Offenbar fordert es auch andere neutrale Länder auf, seine Neutralität zu brechen. Wenn der Beitritt zu ihrer Fraktion ein zu großer Schritt von der Neutralität wäre, könnten wir uns auch gegenseitig unsere Unabhängigkeit garantieren."
 BBA_switzerland.19.a:0 "Ungewöhnliche Zeiten erfordern ungewöhnliche Maßnahmen"
 BBA_switzerland.19.b:0 "Garantien müssen genügen"
 BBA_switzerland.19.c:0 "Unsere Neutralität könnte unser einziger Schutz sein."

 BBA_switzerland.20.t:0 "[FROM.GetName] tritt unserer Entente nicht bei, bietet aber Garantien"
 BBA_switzerland.20.desc:0 "Nach unserer Einladung, [ROOT.GetFactionName] beizutreten, teilte uns [FROM.GetNameDef] mit, dass sie trotz der Ablehnung unseres Angebots unsere Unabhängigkeit garantieren würden, solange wir ihre garantieren. Ein Kompromiss, damit sie ihre Neutralität wahren können."
 BBA_switzerland.20.a:0 "Es muss tun"
 
 BBA_switzerland.21.t:2 "Ein verzweifelter [FROM.GetName] bittet um unsere Garantie"
 BBA_switzerland.21.desc:2 "Während [?FROM.SWI_angriest_country.GetNameDef] [FROM.GetName] wegen einer ihrer Ansicht nach immer länger werdenden Liste von Neutralitätsbrüchen mit Krieg droht, verlangt [From.GetNameDef] von uns, ihnen zu versprechen, sie vor ihrer Kriegstreiberei zu schützen, indem wir ihnen [FROM.GetAdjective] Unabhängigkeit garantieren."
 BBA_switzerland.21.a:0 "Sie brauchen unseren Schutz"
 BBA_switzerland.21.b:0 "Wir können keinen Konflikt mit [?FROM.SWI_angriest_country.GetName] riskieren."

 BBA_switzerland.22.t:0 "[FROM.GetNameDefCap] Versprechen, uns zu beschützen!"
 BBA_switzerland.22.desc:2 "Aus [FROM.GetName] sind diplomatische Telegramme mit hervorragenden Neuigkeiten eingetroffen. Sie haben sich bereit erklärt, unsere Unabhängigkeit zu garantieren und versprochen, uns zu verteidigen, falls uns jemand angreift, einschließlich [?SWI.SWI_angriest_country.GetName]."
 BBA_switzerland.22.a:0 "Wir sind wahrscheinlich gerettet."

 BBA_switzerland.23.t:0 "[FROM.GetNameDefCap] lehnt jegliches Engagement für unsere Sache ab!"
 BBA_switzerland.23.desc:2 "Leider hat [FROM.GetName] beschlossen, unsere Notlage gegenüber [?SWI.SWI_angriest_country.GetNameDef] zu ignorieren. Sie werden uns gegen ihre Drohungen nicht zur Seite stehen."
 BBA_switzerland.23.a:0 "Wir können uns nur auf uns selbst verlassen"

 BBA_switzerland.24.t:0 "[?SWI.SWI_angriest_country.GetNameDefCap] hält uns für einen Verstoß gegen die Neutralität"
 BBA_switzerland.24.desc:0 "Unsere Neutralität wird nicht nur durch unsere gleichberechtigte Haltung gegenüber allen anderen Ländern aufrechterhalten, sondern auch durch deren Wahrnehmung. Laut [?SWI.SWI_angriest_country.GetNameDef] haben wir unser Neutralitätsversprechen gebrochen und ihre Feinde ihnen vorgezogen. Sie haben uns mitgeteilt, dass sie uns nicht mehr als neutrale Nation betrachten und uns sogar den Krieg erklären werden, wenn sie nicht bald beschwichtigt werden."
 BBA_switzerland.24.a:0 "Besorgniserregend!"
 
 BBA_switzerland.25.t:0 "[?SWI.SWI_angriest_country.GetNameDefCap] Hält uns nicht länger für neutral"
 BBA_switzerland.25.desc:0 "Schwarze Neuigkeiten: Während [?SWI.SWI_angriest_country.GetName] ihre Verachtung für [ROOT.GetNameDef] kundtut, haben sie erklärt, dass wir Freiwild für politische Auseinandersetzungen und sogar Eroberungen sind."
 BBA_switzerland.25.a:0 "Wir befinden uns in unbekannten Gewässern!"

 ### [REDACTED] Events ###

 BBA_switzerland.97.t:0 "Österreichischer Marineveteran bietet seine Dienste an"
 BBA_switzerland.97.desc:0 "Unter dem Vorwand einer Europatournee mit seiner musikalisch begabten Familie hat ein erfahrener U-Boot-Kapitän aus Österreich unsere Grenzen überquert und bietet [ROOT.GetNameDef] seine Dienste im Austausch gegen Asyl an.\n\nGeorg von Trapp hatte eine beeindruckende Karriere bei der österreichisch-ungarischen Marine, doch seit dem Ende des Ersten Weltkriegs, dem Zerfall des Kaiserreichs und dem Verlust seines Vermögens, tritt er mit seiner Familie aus Sängern und Musikern auf. Seit [GER.GetNameDef]s Annexion Österreichs wird er in deren Dienst gepresst, sodass er entkommen konnte.\n\nSicherlich wird das musikalische Flair seiner Familie ebenso geschätzt werden wie seine Marineerfahrung, insbesondere da wir uns nun an einer Küste befinden, die wir ohne Personal verteidigen können."
 BBA_switzerland.97.a:0 "Die Wellen werden vom Klang unserer Torpedos erfüllt sein"
 BBA_switzerland.97.b:0 "Er und seine Familie können unabhängig davon in der Schweiz bleiben und auftreten"

 #### Election Stuff ###

 BBA_SWI_annual_election.1.t:0 "Wahlen zum Präsidenten der Schweizerischen Eidgenossenschaft"
 BBA_SWI_annual_election.1.desc:1 "Jedes Jahr wählt die Schweizerische Bundesversammlung einen ihrer Ratsmitglieder zum Präsidenten der Schweizerischen Eidgenossenschaft. Als Erster unter Gleichen wird [?ROOT.SWI_confederation_president.GetSheHe] seine [?ROOT.SWI_confederation_president.GetHerHis] begrenzten Machtbefugnisse nutzen, um den Rat zu vertreten und jegliche Pattsituationen im Rat zu beenden, um den Rat sanft in Richtung Sicherheit oder Ruhm zu lenken.\n\n[SWI_get_extra_election_paragraph]Wen sollte die Versammlung dieses Jahr zum Gesicht der Schweizerischen Eidgenossenschaft wählen?"
 BBA_SWI_annual_election.1.a:0 "Wählen Sie [SWI_GetCouncilor1name]"
 BBA_SWI_annual_election.1.b:0 "Wählen Sie [SWI_GetCouncilor2name]"
 BBA_SWI_annual_election.1.c:0 "Wählen Sie [SWI_GetCouncilor3name]"
 SWI_first_election_text:0 "Sobald ein Ratsmitglied Präsident der Konföderation wird, kann es nicht mehr als politischer Berater eingesetzt werden, verfügt aber über ein mächtiges Entscheidungsrecht. Bleibt ein politischer Beraterposten zu lange unbesetzt, drohen Strafen. Besetzen Sie die Position daher schnell.\n\n"

 BBA_SWI_annual_election.2.t:0 "Dringende Wahl des Präsidenten der Konföderation!"
 BBA_SWI_annual_election.2.desc:0 "Nach der beispiellosen Absetzung von [?SWI_ousted_president.GetName] und einer Zeit politischer Instabilität im Bundesrat ist es Zeit, einen neuen Bundespräsidenten zu wählen. Hoffen wir, dass er den Kurs von [SWI.GetNameDef] korrigieren kann und nicht der letzte im Amt ist."
 BBA_SWI_annual_election.2.a:0 "Wählen Sie [SWI_GetCouncilor1name]"
 BBA_SWI_annual_election.2.b:0 "Wählen Sie [SWI_GetCouncilor2name]"
 BBA_SWI_annual_election.2.c:0 "Wählen Sie [SWI_GetCouncilor3name]"

 ######## TRADE #######

 BBA_switzerland_trade.1.t:0 "[FROM.GetNameDefCap] strebt Handelsabkommen mit [ROOT.GetName] an"
 BBA_switzerland_trade.1.desc:0 "Trotz ihrer historischen Neutralität strebt [FROM.GetNameDefCap] ein Handelsabkommen mit unserem Land an. Entweder wollen sie sich mit uns verbünden, oder sie sind verzweifelter, als wir dachten. \n\nUngeachtet dessen könnten wir von ihrer industriellen Kapazität und günstigen Lage profitieren, ohne in ihr schwer befestigtes Land einfallen zu müssen. Andererseits könnte dies ihre Position im Falle einer zukünftigen Invasion durch [ROOT.GetNameDef] stärken."
 BBA_switzerland_trade.1.a:0 "Ihre Fabriken werden unsere Kriegsmaschinerie antreiben"
 BBA_switzerland_trade.1.b:0 "Unsere zivilen Volkswirtschaften werden sich gegenseitig helfen"
 BBA_switzerland_trade.1.c:0 "Wir brauchen keine Hilfe von einem neutralen Land ohne Rückgrat"
 BBA_switzerland_trade.1.d:0 "Wir können [FROM.GetName] nicht vertrauen"
 
 BBA_switzerland_trade.2.t:0 "[FROM.GetName] bricht Handelsabkommen mit uns vorzeitig ab"
 BBA_switzerland_trade.2.desc:1 "Es scheint, dass [FROM.GetName] sich weigert, das Handelsabkommen, das wir mit ihnen geschlossen haben, fortzusetzen, obwohl es für beide Seiten große Vorteile bietet. \n\nWir können jetzt nicht viel dagegen tun, aber dieser Mangel an Engagement wird [ROOT.GetNameDef] sicherlich in Erinnerung bleiben."
 BBA_switzerland_trade.2.a:0 "Schade"
 BBA_switzerland_trade.2.b:0 "Wir werden uns nicht noch einmal täuschen lassen"

 BBA_switzerland_trade.3.t:0 "Unser laufendes Handelsabkommen mit [FROM.GetName]"
 BBA_switzerland_trade.3.desc:0 "Das Handelsabkommen, das wir seit einem Jahr mit [FROM.GetNameDef] haben, war für [ROOT.GetName] sehr fruchtbar. Nun ist es an der Zeit zu entscheiden, ob wir es verlängern sollen oder nicht. \n\n Trotz der Vorteile eines solchen bilateralen Abkommens und der Notwendigkeit, die es für ein Land wie unseres darstellt, sollten wir uns bewusst sein, dass es von einigen Ländern als weiterer Verstoß gegen unsere Neutralität angesehen werden könnte. Wir sollten sicherstellen, dass die Verärgerung dieser Länder sowohl verkraftbar als auch lohnenswert ist."
 BBA_switzerland_trade.3.a:0 "Ja, wir brauchen diese Vorräte zum Überleben"
 BBA_switzerland_trade.3.b:0 "Nein, es ist zu riskant"
 
 BBA_switzerland_trade.4.t:0 "[FROM.GetName] möchte unser Handelsabkommen erneuern"
 BBA_switzerland_trade.4.desc:0 "Es scheint, dass das Handelsabkommen zwischen [FROM.GetName] und uns für sie sehr vorteilhaft war, da sie bereit sind, erneut einen Verstoß gegen die Neutralität zu riskieren und sich Lieferungen von uns zu sichern. \n\n Dieses Abkommen hat für uns nicht viele Nachteile, es sei denn, wir liefern ihnen die Mittel zur Verteidigung gegen unsere mögliche Invasion von [FROM.GetName]."
 BBA_switzerland_trade.4.a:0 "Erneuern wir die Vereinbarung"
 BBA_switzerland_trade.4.b:0 "Den Fokus auf die zivile Produktion verlagern"
 BBA_switzerland_trade.4.c:0 "Den Schwerpunkt auf die Militärproduktion verlagern"
 BBA_switzerland_trade.4.d:0 "Es ist unsere Mühe nicht mehr wert"

 BBA_switzerland_trade.5.t:0 "[FROM.GetName] hat unser Handelsabkommen verfallen lassen"
 BBA_switzerland_trade.5.desc:0 "Trotz der großzügigen Bedingungen, die wir [FROM.GetName] in unserem gegenseitigen Handelsabkommen gewährt haben, haben sie beschlossen, es nicht zu verlängern und es stattdessen vorgezogen, die Sache allein anzugehen. \n\n Es ist uns ein Rätsel, warum sie sich zu so etwas entschließen, aber vielleicht ist es das Beste."
 BBA_switzerland_trade.5.a:0 "Es ist ihr Verlust!"

 BBA_switzerland_trade.6.t:0 "[FROM.GetNameDefCap] hat unseren Handelsabkommensvorschlag angenommen!"
 BBA_switzerland_trade.6.desc:0 "Unsere Delegation ist nun von [FROM.GetName] zurückgekehrt und bringt großartige Neuigkeiten mit. Dieses Handelsabkommen wird es uns ermöglichen, die notwendigen Vorräte zu sichern, um unsere Industrie und Bevölkerung am Laufen zu halten. \n\n Andere Länder mögen dies als Verstoß gegen die Neutralität betrachten, aber für [ROOT.GetName] ist es nur der Preis für die Wahrung unserer Unabhängigkeit in diesen unsicheren Zeiten."
 BBA_switzerland_trade.6.a:0 "Großartig!"
 
 BBA_switzerland_trade.7.t:0 "[FROM.GetNameDefCap] hat unseren Handelsabkommensvorschlag abgelehnt"
 BBA_switzerland_trade.7.desc:0 "Trotz unserer Bemühungen hat die [FROM.GetAdjective]-Regierung beschlossen, unseren Vorschlag für ein für beide Seiten vorteilhaftes Handelsabkommen abzulehnen. \n\n Dies bringt [ROOt.GetName] möglicherweise in eine prekäre Lage, da es aufgrund der Situation in Europa zunehmend schwieriger wird, eine stabile Quelle für die zivilen und militärischen Vorräte zu sichern, die zur Verteidigung und Ernährung unseres Landes erforderlich sind."
 BBA_switzerland_trade.7.a:0 "Wir finden einen anderen Weg!"

 BBA_switzerland_trade.8.t:0 "[FROM.GetNameDefCap] könnte uns beim Goldhandel helfen"
 BBA_switzerland_trade.8.desc:0 "Angesichts der zunehmenden Spannungen zwischen den Ländern weltweit ist der Handel schwieriger geworden. Im Falle eines Krieges werden die Möglichkeiten zum Kauf und Verkauf von Gold noch weiter eingeschränkt. Wenn wir ihnen genügend vertrauen, könnte die Neutralität von [FROM.GetName] eine Gelegenheit für uns sein, unsere Reserven zu lagern und frei zu handeln, was unserer Wirtschaft und letztendlich unserer Kriegsmaschinerie zugutekommt."
 BBA_switzerland_trade.8.a:0 "Eine gute Idee"
 BBA_switzerland_trade.8.b:0 "Wir können nicht wissen, wo sie wirklich stehen"

 BBA_switzerland_trade.9.t:0 "[FROM.GetNameDefCap] werden ihr Gold über uns handeln"
 BBA_switzerland_trade.9.desc:0 "Das bedeutet, dass sie ihre Goldreserven bei uns lagern und so frei Gold kaufen und verkaufen können, ohne Embargos befürchten zu müssen. Sie sind nicht die einzigen, die davon profitieren, denn der Geldzufluss wird unserer angeschlagenen Wirtschaft helfen und könnte in Zukunft sogar als Verhandlungsmasse eingesetzt werden."
 BBA_switzerland_trade.9.a:0 "Das wird nützlich sein"

 BBA_switzerland_trade.10.t:0 "[FROM.GetNameDefCap] weigert sich, unser Banksystem zu verwenden"
 BBA_switzerland_trade.10.desc:1 "Trotz eines offensichtlichen gegenseitigen Nutzens scheint [FROM.GetName] nicht an einem verstärkten Goldhandel mit dem Rest der Welt interessiert zu sein."
 BBA_switzerland_trade.10.a:0 "nun ja"
 
 BBA_switzerland_trade.11.t:0 "Wir könnten Gold weiterhin über [FROM.GetAdjective]-Börsen handeln"
 BBA_switzerland_trade.11.desc:0 "Wir nutzen bereits Märkte in [FROM.GetName], um Handelsbarrieren zu umgehen, die durch die weltpolitische Lage entstanden sind. Eine Erhöhung unserer Reserven dort könnte unserer Wirtschaft weiter zugutekommen, auch wenn dies auch der Wirtschaft der USA zugutekommt."
 BBA_switzerland_trade.11.a:0 "Sie haben sich als vertrauenswürdig erwiesen"
 BBA_switzerland_trade.11.b:0 "Wir können nicht riskieren, den Verrat noch schlimmer zu machen"

 BBA_switzerland_trade.12.t:0 "[FROM.GetNameDefCap] hat unsere Goldreserven beschlagnahmt!"
 BBA_switzerland_trade.12.desc:0 "Das hätten wir vorhersehen müssen. Sie haben ihre Neutralitätsfassade ausgenutzt, um uns in den Rücken zu fallen. Das wird schwerwiegende Folgen für unsere Wirtschaft haben, wir müssen Vergeltung üben."
 BBA_switzerland_trade.12.a:0 "Sie werden bezahlen"

 BBA_switzerland_trade.13.t:0 "[FROM.GetName] möchte, dass wir in ihr Land investieren"
 BBA_switzerland_trade.13.desc:0 "[FROM.GetNameDefCap] bittet um unsere Unterstützung, um den faschistischen Mächten standzuhalten, die an ihre Tür klopfen. Wir können in ihre Wirtschaft investieren, damit sie auf das Schlimmste vorbereitet sind, oder sogar direkt im Kampf gegen den Faschismus helfen, wenn sie dies wünschen oder gezwungen sind, ihre langjährige Neutralität zu brechen."
 BBA_switzerland_trade.13.a:0 "Wir müssen ihnen helfen, den Faschismus abzuwehren"
 BBA_switzerland_trade.13.b:0 "Das wird uns überhaupt nicht nützen"

 BBA_switzerland_trade.14.t:0 "[FROM.GetNameDefCap] wird in [ROOT.GetName] investieren"
 BBA_switzerland_trade.14.desc:0 "Diese Investitionen werden uns helfen, unsere Wirtschaft zu verbessern und allen Härten zu widerstehen, die der Faschismus [ROOT.GetName] auferlegen könnte. Sie werden auch unsere Nationen einander näher bringen, vielleicht sogar irgendwann in direktem Widerstand gegen den Faschismus."
 BBA_switzerland_trade.14.a:0 "Das sind großartige Neuigkeiten!"

 BBA_switzerland_trade.15.t:0 "[FROM.GetNameDefCap] weigert sich zu investieren"
 BBA_switzerland_trade.15.desc:0 "Leider wurde uns mitgeteilt, dass [FROM.GetName] nicht in die [ROOT.GetAdjective]-Wirtschaft investieren wird. Angesichts der drohenden Gefahr des Faschismus stehen wir isolierter da, als uns lieb ist."
 BBA_switzerland_trade.15.a:0 "Das ist ein Problem"

 ####### FASCIST EVENTS ###########

 BBA_switzerland_fascist.1.t:0 "[FROM.GetNameDefCap] möchte unseren Schutz"
 BBA_switzerland_fascist.1.desc:0 "Die mickrige Nation [FROM.GetName], ehemals ein krimineller Käsestaat, möchte sich [ROOT.GetNameDef] anschließen und unsere Marionette werden. Dies kann als Eingeständnis der Schwäche oder als Treuebekundung gegenüber [ROOT.GetRulingParty] gewertet werden.\n\n Ihre starken Verteidigungsfähigkeiten und ihre gut ausgebildete Zivilbevölkerung könnten für unsere Zukunftspläne nützlich sein."
 BBA_switzerland_fascist.1.a:0 "Sie können sich unserer Gemeinschaft anschließen"
 BBA_switzerland_fascist.1.b:0 "Wir brauchen sie nicht!"
 
 BBA_switzerland_fascist.2.t:0 "[FROM.GetNameDefCap] hat uns abgelehnt"
 BBA_switzerland_fascist.2.desc:0 "Trotz unserer Annäherungsversuche an [FROM.GetName] haben sie unseren Vorschlag zur Unterwerfung unter das [FROM.GetAdjective]-Regime abgelehnt. \n\n Dies bringt uns in eine heikle Lage, da wir offensichtlich jeglichen Anschein von Neutralität verloren haben und das, was nun kommt, möglicherweise allein überstehen müssen."
 BBA_switzerland_fascist.2.a:0 "Dunkle Wolken am Horizont"


 BBA_switzerland_fascist.3.t:0 "[SWI.GetName] fordert Kontrolle über [848.GetName] an"
 BBA_switzerland_fascist.3.desc:0 "[FROM.GetNameDef] behauptet, dass sie nach einer Wahl im Jahr 1919, bei der sich die Mehrheit der Region für den Beitritt zur damaligen Schweizerischen Eidgenossenschaft entschied, einen Anspruch auf [848.GetName] erheben. Obwohl sie die Demokratie aufgegeben haben und die Abstimmung vor Jahrzehnten stattfand, könnte die Übertragung der Verantwortung für diesen Staat ihnen Ressourcen freisetzen, die wir für die Verteidigung des Territoriums aufwenden. Dies könnte als Test für [FROM.GetName]s Fähigkeiten und, noch wichtiger, seine Loyalität dienen."
 BBA_switzerland_fascist.3.a:0 "Es gehört ihnen rechtmäßig"
 BBA_switzerland_fascist.3.b:0 "Man kann ihnen das nicht anvertrauen"

 BBA_switzerland_fascist.4.t:0 "[FROM.GetNameDefCap] hat unsere Anfrage zur Erweiterung abgelehnt"
 BBA_switzerland_fascist.4.desc:0 "Obwohl wir unsere Loyalität und Fähigkeiten deutlich unter Beweis gestellt haben, hat [FROM.GetNameDef] unsere Anfrage abgelehnt. Die Ausweitung von [ROOT.GetNameDef] auf [?SWI.SWI_requested_territory.GetName] muss warten, vielleicht bis wir entscheiden, dass sich unsere weitere Unterordnung unter [FROM.GetName] nicht mehr lohnt."
 BBA_switzerland_fascist.4.a:0 "Es gehört ihnen rechtmäßig"

 BBA_switzerland_fascist.5.t:0 "[FROM.GetNameDefCap] hat unsere Anfrage zur Kontrolle von [?SWI.SWI_requested_territory.GetName] angenommen"
 BBA_switzerland_fascist.5.desc:0 "Der Preis dafür war zwar hoch, aber die Unterordnung und Ehre, die wir [FROM.GetNameDef] entgegengebracht haben, hat sich gelohnt. Ab sofort wird [ROOT.GetNameDef] in ihrem Namen die Kontrolle über [?SWI.SWI_requested_territory.GetName] übernehmen und in unser Territorium eingegliedert."
 BBA_switzerland_fascist.5.a:0 "Exzellent"
 BBA_switzerland_fascist.5.b:0 "Unser Eid geht weiter"


 BBA_switzerland_fascist.6.t:0 "[SWI.GetName] fordert die Ausweitung ihrer Gebiete"
 BBA_switzerland_fascist.6.desc:0 "Nach dem offensichtlichen Erfolg der [FROM.GetAdjective] Besetzung von [848.GetName] bietet [FROM.GetNameDef] an, unsere [SWI_requested_territory.GetAdjective] Gebiete in unserem Namen zu verteidigen. \n\n Natürlich bedeutet dies auch, dass wir unsere Kontrolle über das Gebiet an sie abgeben, also sollten wir bei der Einschätzung ihrer Loyalität vorsichtig sein."
 BBA_switzerland_fascist.6.a:0 "Sie haben sich bewährt."
 BBA_switzerland_fascist.6.b:0 "$BBA_switzerland_fascist.3.b$"

 BBA_switzerland_fascist.7.t:0 "[FROM.GetNameDefCap] heißt uns in ihrer Gemeinschaft willkommen"
 BBA_switzerland_fascist.7.desc:0 "Bei einer Kundgebung in [ROOT.GetCapitalVictoryPointName] verkündete [ROOT.GetLeader] [FROM.GetName]s Versprechen einer sehr engen Zusammenarbeit zwischen unseren Ländern und des Schutzes von [ROOT.GetName] vor unseren und ihren Feinden. \n\nFreundliche Offiziere und Funktionäre von [FROM.GetNameDef], unseren Freunden, strömen in diesem Moment in unser Land, um uns dabei zu helfen, unsere militärische Stärke zu entwickeln und sie in ihren Dienst zu stellen."
 BBA_switzerland_fascist.7.a:0 "Hilfreich!"

 ##########  SWISS EXPANSION EVENTS #######

 BBA_swiss_expansion.1.t:0 "Wir haben [SWI_influenced_state] nicht genug beeinflusst"
 BBA_swiss_expansion.1.desc:0 "Trotz aller Bemühungen unserer Propagandisten hat sich die Demokratie in den Kantonen von [?SWI.SWI_influence_target_state.GetName] nicht so weit verbreitet wie erwartet. Daher glauben wir leider nicht, dass ein Referendum zum Beitritt erfolgreich sein würde.\n\nDas bedeutet nicht, dass wir aufgeben sollten. Wir haben einen Samen gepflanzt, der weiter genährt werden kann, sodass wir beim nächsten Mal wahrscheinlicher Erfolg haben."
 BBA_swiss_expansion.1.a:0 "Wir werden unsere Mission nicht aufgeben"
 
 BBA_swiss_expansion.2.t:0 "Dank unseres Einflusses möchte [SWI_influenced_state] sich uns anschließen"
 BBA_swiss_expansion.2.desc:0 "Nach einer umfangreichen Propagandakampagne befürwortet die Bevölkerung von [?SWI.SWI_influence_target_state.GetName] mit überwältigender Mehrheit den Beitritt zu [ROOT.GetNameDef]. \n\nDas bedeutet, dass [?SWI.SWI_influence_target_state.GetName], wäre es eine Demokratie wie die unsere, Teil unseres Landes wäre. Leider ist das nicht der Fall, daher benötigen sie unsere Hilfe, um [SWI.GetName]s neuester Kanton zu werden.\n\nWir können nun auf ein Referendum im Staat drängen, um über ihre Mitgliedschaft in [ROOT.GetNameDef] zu entscheiden."
 BBA_swiss_expansion.2.a:0 "Wir müssen ihnen wahre Demokratie bringen"
 
 BBA_swiss_expansion.3.t:0 "[FROM.GetNameDefCap] drückt für [SWI_pressed_state]"
 BBA_swiss_expansion.3.desc:0 "Diese angeblich neutralen Schurken in [FROM.GetName] besitzen die Frechheit, [?SWI.SWI_state_being_claimed.GetName] als ihr Eigentum zu beanspruchen. Sie behaupten, die Unterstützung für einen Beitritt zu [FROM.GetNameDef] sei so groß, dass ein Referendum zu ihrer Entscheidung führen würde, wodurch der Staat rechtmäßig ihnen gehören würde.\n\nWir können [?SWI.SWI_state_being_claimed.GetName] ein Referendum abhalten lassen, das wir auf jeden Fall verlieren werden, oder einen Krieg mit ihnen riskieren, wenn wir uns weigern."
 BBA_swiss_expansion.3.a:0 "Wir lassen uns nicht einschüchtern!"
 BBA_swiss_expansion.3.b:0 "Ein Referendum ist es dann"

 BBA_swiss_expansion.4.t:0 "[FROM.GetName] akzeptiert das Referendum!"
 BBA_swiss_expansion.4.desc:0 "Nach einem friedlichen Referendum in ganz [?SWI.SWI_state_being_claimed.GetName], das mit überwältigender Mehrheit zu unseren Gunsten ausfiel, hat [FROM.GetNameDef] zugestimmt, die Kontrolle über den Staat an uns zu übertragen. Wir werden die Gebiete innerhalb von [?SWI.SWI_state_being_claimed.GetName] umgehend in Kantone umwandeln, und sie werden endlich unsere Form der Demokratie erleben."
 BBA_swiss_expansion.4.a:0 "Unser Bund expandiert!"

 BBA_swiss_expansion.5.t:0 "[FROM.GetNameDef] ignoriert Forderungen nach einem Referendum!"
 BBA_swiss_expansion.5.desc:0 "Trotz der Unterstützung der Bevölkerung für Demokratie und [ROOT.GetNameDef] hat [FROM.GetName] beschlossen, die Bevölkerung von [?SWI.SWI_state_being_claimed.GetName] bei ihrem Streben nach einem Referendum über ihre Mitgliedschaft in der Konföderation zu ignorieren.\n\nDies ist ein klarer Aufruf an uns, zu den Waffen zu greifen und unsere besetzten Kantone gegen die Tyrannei von [FROM.GetNameDef] zu verteidigen."
 BBA_swiss_expansion.5.a:0 "Unser Eid verlangt es!"

 BBA_swiss_expansion.6.t:0 "[FROM.GetNameDefCap] will [848.GetName] als Kanton"
 BBA_swiss_expansion.6.desc:0 "[FROM.GetName] fordert offenbar den Beitritt des Staates [848.GetName] zu ihrer Konföderation. Sie berufen sich auf ein Referendum aus dem Jahr 1919, bei dem der Staat mit überwältigender Mehrheit für den Beitritt als Kanton von [FROM.GetNameDef] stimmte, was jedoch von [FROM.GetAdjective] selbst abgelehnt wurde. Offenbar haben sie ihre Meinung geändert.\n\nOb wir nun zustimmen oder nicht, es ist offensichtlich, dass sie auf Expansion aus sind. Wir sollten uns also vorsichtig vordrängen und bereit sein, unser Territorium zu verteidigen, selbst wenn wir ihre Forderungen akzeptieren."
 BBA_swiss_expansion.6.a:0 "Das Risiko ist einem so kleinen Staat nicht wert"
 BBA_swiss_expansion.6.b:0 "[ROOT.GetName] wird niemals ein Gebiet abtreten!"
 BBA_swiss_expansion.6.c:0 "Wir lassen uns nicht von dem Pickel im Gesicht Europas einschüchtern"
 BBA_swiss_expansion.6.d:0 "Gute Befreiung"

 BBA_swiss_expansion.7.t:0 "[FROM.GetNameDefCap] hat unsere Forderung nach einem Beitritt von [848.GetName] zu [ROOT.GetName] abgelehnt"
 BBA_swiss_expansion.7.desc:0 "Die [FROM.GetAdjective]-Regierung hat unsere Forderung kategorisch abgelehnt, trotz unserer starken Forderung und des demokratischen Willens des Volkes von [848.GetName]. \n\nWir sollten diese Beleidigung nicht ungenutzt verstreichen lassen."
 BBA_swiss_expansion.7.a:0 "[848.GetName] wird eines Tages kostenlos sein!"

 BBA_swiss_expansion.8.t:0 "Die [FROM.GetAdjective]-Regierung hat unsere Forderung nach der Freiheit von [848.GetName] angenommen"
 BBA_swiss_expansion.8.desc:0 "[FROM.GetNameDefCap] hat die Einsicht erkannt und stimmt mit uns überein, dass [848.GetName]s Platz bei [ROOT.GetNameDef] als seinem neuesten Kanton ist.\n\nDies ist lediglich der erste Schritt auf [ROOT.GetName]s Weg zu einem demokratischeren Europa!"
 BBA_swiss_expansion.8.a:0 "Das ist für die Demokratie!"

 BBA_swiss_expansion.9.t:0 "[FROM.GetName] bietet seinen Schutz"
 BBA_swiss_expansion.9.desc:0 "Nachdem [FROM.GetNameDef] unter wohl fadenscheinigen Vorwänden die Übergabe von [848.GetName] gefordert hat, bietet er uns an, unsere Gebiete einzunehmen, um uns angeblich vor [GER.GetNameDef] zu schützen, der ihrer Meinung nach wahrscheinlich bald versuchen wird, [ROOT.GetNameDef] zu annektieren.\n\nObwohl dies relativ plausibel klingt und wir gemeinsam eine bessere Chance hätten, eine Invasion abzuwehren, könnte der Preis mit unserer Souveränität zu hoch sein.\n\nNatürlich können wir damit rechnen, dass sie uns angreifen, wenn wir uns weigern."
 BBA_swiss_expansion.9.a:0 "Dies könnte unsere einzige Überlebenschance sein"
 BBA_swiss_expansion.9.b:0 "Das ist ein Preis, den wir nicht zahlen wollen!"

 BBA_swiss_expansion.10.t:0 "[FROM.GetNameDefCap] wird der Schweiz beitreten!"
 BBA_swiss_expansion.10.desc:0 "Städte im gesamten Alpenraum werden die Vereinigung unserer beiden Alpennationen feiern! Wir werden uns besser gegen die Großmächte verteidigen können, die uns umgeben."
 BBA_swiss_expansion.10.a:0 "Endlich!"
 
 BBA_swiss_expansion.11.t:0 "[FROM.GetNameDefCap] hat uns abgelehnt!"
 BBA_swiss_expansion.11.desc:0 "Trotz unserer Versuche, eine neue Nation zu schmieden, die in der Lage ist, sich gegen die größten Mächte Europas zu verteidigen, hat [FROM.GetLeader] seine Abscheu über unseren Vorschlag zum Ausdruck gebracht."
 BBA_swiss_expansion.11.a:0 "Uns bleibt nur noch eine Wahl."
 
 BBA_swiss_expansion.12.t:0 "[FROM.GetName] beansprucht unsere Alpengebiete"
 BBA_swiss_expansion.12.desc:0 "In einer unerwarteten Wendung der Ereignisse erhebt [FROM.GetNameDef] Anspruch auf die [ROOT.GetAdjective] Alpen. Ihr Argument ist bestenfalls dürftig, aber sie haben einen großen Teil ihrer Bevölkerung stationiert und sind bereit einzumarschieren, falls wir uns weigern. Dies und das für sie sehr günstige Gelände würden einen langen und kostspieligen Krieg nach sich ziehen, sollten wir uns weigern. Wir müssen also unsere Optionen abwägen."
 BBA_swiss_expansion.12.desc_FRA:0 "Unsere Schwesterrepublik [FROM.GetNameDef] möchte die gesamten Alpen unter ihre Fittiche nehmen und hat Anspruch auf sie erhoben.\n\nUnsere [ROOT.GetAdjective] Alpen sind schon seit sehr langer Zeit Teil unserer Nation, aber sie in ein Gebiet von [FROM.GetAdjective] zu verwandeln, würde sie für ihre Loyalität und ihren Tatendrang belohnen und sie zu einem noch mächtigeren Verbündeten machen."
 BBA_swiss_expansion.12.a:0 "Sie sollen die Alpen haben"
 BBA_swiss_expansion.12.b:0 "Das ist absurd!"

 BBA_swiss_expansion.13.t:0 "[FROM.GetNameDefCap] hat unsere Forderungen akzeptiert!"
 BBA_swiss_expansion.13.desc:0 "Die [FROM.GetAdjective]-Regierung hat die richtige Entscheidung getroffen und anerkannt, dass ihre Alpengebiete rechtmäßig zur Nutzung bestimmt sind. Dies wird unsere Sicherheit vor Angreifern weiter gewährleisten."
 BBA_swiss_expansion.13.a:0 "Wir heißen diese neuen Kantone herzlich willkommen!"

 BBA_swiss_expansion.14.t:0 "[FROM.GetName] hat unsere alpinen Ansprüche abgelehnt"
 BBA_swiss_expansion.14.desc:0 "Trotz unserer energischen Forderung nach den [FROM.GetAdjective] Alpen hat [FROM.GetNameDef] unsere Ansprüche zurückgewiesen. Wir haben immer noch andere Möglichkeiten, dieses Gebiet zu erobern, wenn wir uns dazu entschließen, mit ihnen zusammenzuarbeiten."
 BBA_swiss_expansion.14.a:0 "Wir werden sie auf die eine oder andere Weise kriegen"

 BBA_swiss_expansion.15.t:0 "[FROM.GetName] versucht, [AUS.GetName] gegen uns aufzubringen!"
 BBA_swiss_expansion.15.desc:0 "Unsere Bemühungen, [AUS.GetNonIdeologyName] mit [ROOT.GetNonIdeologyName] zu vereinen, werden von [FROM.GetName] vereitelt. Sie führen eine Kampagne für ihr schändliches Regierungssystem und gegen uns.\n\nSolange dieser verleumderische Kreuzzug andauert, wird es unmöglich sein, auf den Anschluss zu drängen. Deshalb müssen wir warten, um unser glorreiches Schicksal zu erfüllen!"
 BBA_swiss_expansion.15.a:0 "Sie verzögern nur das Unvermeidliche!"

 BBA_swiss_expansion.16.t:0 "[FROM.GetNonIdeologyName] fordert Unabhängigkeit"
 BBA_swiss_expansion.16.desc:0 "Trotz unseres Schutzes und unserer Unterstützung verlangt unser Untertan [FROM.GetName] nun, dass wir sie von ihren Privilegien und Pflichten uns gegenüber entbinden, damit sie wieder ihre eigene Nation werden können.\n\n[GetDemandingAlpsParagraph]"
 BBA_swiss_expansion.16.a:0 "[SWI_only_independence_response]"
 BBA_swiss_expansion.16.b:0 "Sie sollen ein unabhängiges Land sein, zusammen mit unseren Alpenstaaten"
 BBA_swiss_expansion.16.c:0 "Sie werden dafür kämpfen müssen!"
 SWI_independence_demand_alps_paragraph:0 "Neben ihrer Unabhängigkeit sind sie auch so ernst, dass sie von uns verlangen, unseren Teil der Alpen abzutreten, angeblich um ein Land zu gründen, das die gesamten Alpen umfasst.\n\n"
 SWI_no_alps_independence:0 "Sie können wieder unabhängig sein"
 SWI_have_alps_but_only_independence:0 "Wir werden die Unabhängigkeit zulassen, aber nicht mehr"
 
 BBA_swiss_expansion.17.t_alps:0 "[FROM.GetName] hat uns unsere Unabhängigkeit gewährt, aber nicht ihre Alpengebiete"
 BBA_swiss_expansion.17.t_no_alps:0 "[ROOT.GetName] ist wieder unabhängig!"
 BBA_swiss_expansion.17.desc_alps:0 "Dies ist ein bedeutsamer Tag, auch wenn wir noch nicht alle unsere Ziele erreicht haben. [FROM.GetNameDefCap] hat uns widerwillig erlaubt, uns von ihnen zu trennen und uns unsere ersehnte Unabhängigkeit zu gewähren. Und doch haben sie im selben Atemzug schändlicherweise erklärt, dass sie nicht bereit sind, ihre Alpengebiete aufzugeben.\n\nWir werden einen anderen Weg finden müssen, die Alpen unter unserer Flagge zu vereinen."
 BBA_swiss_expansion.17.desc_no_alps:0 "Ein freudiger Tag für [ROOT.GetNonIdeologyName]: [FROM.GetNameDef] hat unseren Antrag auf Unabhängigkeit angenommen. Das bedeutet, dass wir wieder frei sind, unsere eigene Agenda festzulegen und unsere außenpolitische Haltung zu bestimmen. Andererseits müssen wir auch für uns selbst sorgen."
 BBA_swiss_expansion.17.a:0 "Was kommt als Nächstes für [ROOT.GetNonIdeologyName]?"

 BBA_swiss_expansion.18.t:0 "[FROM.GetNameDefCap] Gab uns und den Alpen unsere Unabhängigkeit"
 BBA_swiss_expansion.18.desc:0 "Unsere Pläne nehmen endlich Gestalt an. [ROOT.GetNonIdeologyName] erlangt endlich seine Unabhängigkeit zurück und mit ihm die Gebiete, die früher als die [FROM.GetAdjective] Alpen bekannt waren.\n\nWir können zwar nicht mehr auf den Schutz unseres alten Oberherrn zählen, aber das Land, das wir gerade erworben haben, wird unser Überleben sicherer machen."
 BBA_swiss_expansion.18.a:0 "[ROOT.GetNameDefCap] steigt!"

 BBA_swiss_expansion.19.t:0 "[FROM.GetName] lässt [ROOT.GetNonIdeologyName] nicht unabhängig sein!"
 BBA_swiss_expansion.19.desc:0 "Unsere Unabhängigkeitserklärung wurde von unserem ehemaligen Oberherrn [FROM.GetNameDef] nicht gut aufgenommen. Sie haben uns den Krieg erklärt, in der Hoffnung, unser Land mit Gewalt einzunehmen. Lasst uns zu den Waffen greifen und ihnen zeigen, dass [ROOT.GetName] sich nicht so leicht unterwerfen lässt."
 BBA_swiss_expansion.19.a:0 "Zu den Waffen!"

 SWI_delayed_anschluss_TT:0 "§Y[GER.GetNameDefCap]§! wird §Rnicht in der Lage sein, auf den Anschluss zu drängen§!, bis der Nationalgeist §Y$SWI_swiss_democratic_propaganda$§! innerhalb von drei Monaten aus §Y[AUS.GetName]§! entfernt ist."
 SWI_expantion_state_loc:0 "[?SWI.SWI_Einfluss_Zielzustand.GetName]"
 SWI_expansion_no_state:0 "der Staat"
 SWI_claiming_state_loc:0 "[?SWI_state_being_claimed.GetName]"
 SWI_claiming_no_state_loc:0 "einem unserer Staaten"
 SWI_press_for_future_canton_TT:0 "Entscheid freischalten: §YLand für beeinflussten zukünftigen Kanton drücken§!"


