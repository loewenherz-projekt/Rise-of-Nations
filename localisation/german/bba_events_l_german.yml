 bba_africa_news.1.t:0 "Gründung der Ostafrikanischen Föderation"
 bba_africa_news.1.desc:0 "In den 1920er Jahren versuchte Kolonialminister Leo Amery, ein von Weißen regiertes ostafrikanisches Dominion bestehend aus Kenia, Uganda und Tanganjika zu schaffen. Dieses Vorhaben stieß auf Widerstand und wurde letztlich nicht umgesetzt. Die Ureinwohner Ostafrikas nutzten dieses Konzept jedoch als Grundlage für die Gründung ihrer eigenen Nation, die sie heute stärker macht als je zuvor. Sie erklärten, die Ära des europäisch dominierten Afrikas gehe zu Ende!"
 bba_africa_news.1.a:0 "Endlich sind wir vereint!"
 bba_africa_news.1.b:0 "Ist dies das Ende der Kolonialzeit?"

 bba_africa_news.2.t:0 "Das Horn von Afrika ist vereint"
 bba_africa_news.2.desc:0 "Nach Jahrhunderten der Trennung und des Kampfes sind die Völker am Horn von Afrika nun unter einem Staat vereint. Dies wäre schon einmal beinahe geschehen, doch die Ambitionen der Nationalisten, die nur an sich selbst denken, haben die Beziehungen zwischen den Völkern stets erschwert. Nun jedoch hat der Herrscher der Region [ROOT.GetLeader] erklärt, dass der Staat keiner bestimmten Gruppe zugutekommen, sondern alle Bewohner vereinen soll. Dieses Mal, so verkündet er, werde die Region friedlich und wohlhabend sein und bis ans Ende der Menschheit vereint bleiben."
 bba_africa_news.2.a:0 "Hoffen wir auf Frieden und Wohlstand"
 bba_africa_news.2.b:0 "Was bedeutet das für die Region?"

 bba_africa_news.3.t:0 "Organisation für Afrikanische Einheit gegründet"
 bba_africa_news.3.desc:0 "Die afrikanischen Nationen haben durch die Gründung einer zwischenstaatlichen Organisation begonnen, miteinander zu kooperieren. Diese neue Organisation für Afrikanische Einheit verspricht, die Sicherheit und wirtschaftliche Entwicklung ihrer Mitgliedsstaaten zu fördern. Ob sie diese hohen Ideale verwirklichen kann, bleibt abzuwarten."
 bba_africa_news.3.a:0 "Eine hervorragende Initiative!"
 bba_africa_news.3.b:0 "Was für ein schwaches Konzept."

 bba_africa_news.4.t:0 "Gründung der Afrikanischen Union"
 bba_africa_news.4.desc:0 "Viele bezweifelten, dass die Organisation für Afrikanische Einheit ihre Versprechen halten würde. Die Mitglieder der Organisation haben jedoch ihren Wunsch geäußert, ihre Integration durch die Bildung einer Staatenföderation innerhalb einer größeren Afrikanischen Union zu vertiefen. Zwar bleibt noch viel Arbeit, um die politischen Systeme der einzelnen Mitgliedsstaaten vollständig zu integrieren, doch scheint in Afrika eine neue Weltmacht Gestalt anzunehmen."
 bba_africa_news.4.a:0 "Gemeinsam sind wir stark, getrennt sind wir schwach!"
 bba_africa_news.4.b:0 "Das wird zu nichts führen."

 BBA_generic_purchase_ships_events.01.t:0 "[FROM.GetAdjective] Marinebeschaffung"
 BBA_generic_purchase_ships_events.01.desc:0 "[FROM.GetNameDefCap] hat sich mit einem Angebot an uns gewandt, einige unserer stillgelegten Marineanlagen zu beschaffen. Die Anlagen, an denen sie interessiert sind, sind aufgrund ihres Alters und des Mangels an moderner Ausrüstung nicht mehr im Einsatz."
 BBA_generic_purchase_ships_events.01.a:0 "Eine für beide Seiten vorteilhafte Vereinbarung."
 BBA_generic_purchase_ships_events.01.b:0 "Wir können keine Marineressourcen entbehren."

 BBA_generic_purchase_ships_events.02.t:0 "[FROM.GetNameDefCap] Zustimmung zur Marinebeschaffung"
 BBA_generic_purchase_ships_events.02.desc:0 "[FROM.GetAdjective] Diplomaten und Marineangehörige haben uns mitgeteilt, dass sie sich von der eingemotteten Ausrüstung trennen werden, die wir ihnen zum Kauf angeboten haben. Dies wird es uns ermöglichen, unsere junge Marine rasch zu erweitern."
 BBA_generic_purchase_ships_events.02.a:0 "Hervorragende Neuigkeiten!"

 BBA_generic_purchase_ships_events.03.t:0 "[FROM.GetNameDefCap] lehnt Marinebeschaffungsvertrag ab"
 BBA_generic_purchase_ships_events.03.desc:0 "[FROM.GetAdjective] Diplomaten haben uns mitgeteilt, dass sie nicht bereit sind, sich von der eingemotteten Ausrüstung zu trennen, die wir zum Kauf angeboten haben. Es ist unklar, ob die Ablehnung auf ihre eigenen Pläne für die Schiffe zurückzuführen ist oder als Zeichen ihrer Missbilligung unserer Politik gedacht ist."
 BBA_generic_purchase_ships_events.03.a:0 "Schade."
