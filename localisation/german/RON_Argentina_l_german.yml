 raeconomic.3.d:0 "Eine argentinische Handelsmission ist eingetroffen. Sie schlägt ein Abkommen zwischen unseren Ländern vor. Sie bieten uns Fleisch, Getreide und andere Nahrungsmittel im Austausch für Konsumgüter und die Unterstützung unserer Experten bei der Weiterentwicklung ihrer Rüstungsindustrie."
