 #
 ranavy.1.t:0 "Die Erweiterung der Marine-Militärschule ist abgeschlossen!"
 ranavy.1.d:0 "Neue Gebäude wurden errichtet und Lehrgänge vorbereitet. Das Schulgelände ist voller neuer Rekruten, aus denen bald die nächste Offiziersgeneration unseres Landes hervorgehen wird. Wie Sarmiento bereits 1888 sagte, garantiert diese Schule die Unabhängigkeit unseres Landes und seine guten Beziehungen zu allen anderen Nationen, mit denen wir ein gemeinsames Verständnis und eine gemeinsame Leidenschaft für die Kunst des Segelns und den ewigen Kampf gegen Ungerechtigkeit teilen."
 ranavy.1.a:0 "Günstige Winde für unsere Marine."
 ##########################################
 ######     REVISED ARGENTINA MOD    ######
 ######       MIGRATION EVENTS       ######
 ##########################################
 #
 #
 #
 ramigration.1.t:0 "Die großen Städte gegen das große Unbekannte"
 ramigration.1.d:0 "Argentinien ist groß, aber dünn besiedelt. Unsere Bevölkerung ist in den letzten Jahrzehnten exponentiell gewachsen, dennoch gibt es immer noch weite Teile unseres Territoriums, in denen wir kaum oder gar nicht vertreten sind. Es ist an der Zeit zu entscheiden, wo unser Volk am meisten Gutes tun kann."
 ramigration.1.a:0 "Förderung der Stadtmigration"
 ramigration.1.a_tt:0 "\nDie Zerstreuung unserer Bevölkerung schwächt nur unsere industriellen Bemühungen und zwingt uns, Ressourcen für die Unterbringung kleiner Gemeinden einzusetzen, was Jahrzehnte dauern wird, bis Früchte trägt. Die Menschen sollten in den Großstädten bleiben, wo sie glücklicher und produktiver sind."
 ramigration.1.b:0 "Bevölkern Sie das Land"
 ramigration.1.b_tt:0 "\nJahrzehntelang war es unsere Politik, Migranten zu ermutigen, sich auf dem Land niederzulassen. Überbevölkerung könnte sich in vielerlei Hinsicht negativ auf unsere Städte auswirken. Die Weltwirtschaftskrise hat unserer Landwirtschaft geschadet, aber das bedeutet nicht, dass wir sie ganz aufgeben sollten."
 #
 ramigration.2.t:0 "Die menschliche Welle"
 ramigration.2.d:0 "Im vergangenen Jahrhundert sind über sieben Millionen Einwanderer nach Argentinien gekommen, und obwohl unser Land davon enorm profitiert hat, ist es vielleicht an der Zeit, unsere Politik zu überdenken."
 ramigration.2.a:0 "Offene Grenzen"
 ramigration.2.a_tt:0 "\nWarum sollten wir Leute abweisen, wenn wir genügend Kapazitäten haben? Wir müssen weiter wachsen, wenn wir zu den ganz Großen der Welt gehören wollen."
 ramigration.2.b:0 "Geschlossene Grenzen"
 ramigration.2.b_tt:0 "\nJa, wir haben noch Platz übrig. Nein, wir sollten nicht jedem, der unsere Grenze überquert, ein Stück Land geben. Es ist an der Zeit, diejenigen zu überprüfen, die in unser Land einreisen möchten."
 #
 ramigration.3.t:0 "Argentinien: Land der unbegrenzten Möglichkeiten"
 ramigration.3.d:0 "Der „Amerikanische Traum“ ist nicht nur unseren Cousins im Norden vorbehalten. Millionen von Menschen haben sich für einen Neuanfang für Argentinien statt für die USA entschieden. Um diesen Zustrom aufrechtzuerhalten, müssen wir dafür sorgen, dass sie wissen, dass unsere Türen offen stehen und es in unserem Land Arbeit gibt."
 ramigration.3.a:0 "Regionale Einwanderung"
 ramigration.3.a_tt:0 "\nDie meisten unserer Nachbarn teilen Geschichte, Kultur und Sprache mit uns. Ihre Integration in unsere Gesellschaft sollte einfach sein. Indem wir ihnen die Migration erleichtern, können wir mehr Menschen zum Pflügen der Felder und zum Arbeiten in den Fabriken motivieren und gleichzeitig gute Beziehungen zu den Nachbarländern pflegen."
 ramigration.3.b:0 "Interkontinentale Einwanderung"
 ramigration.3.b_tt:0 "\nArgentinien hat seine Wurzeln in Europa. Obwohl wir auf dem alten Kontinent um unsere Freiheit kämpfen mussten, heißt das nicht, dass wir seine Menschen nicht willkommen heißen sollten (solange sie ihre kolonialistischen Ideen hinter sich lassen). Je mehr, desto besser. Und wenn einige von ihnen unserer Industrie qualifizierte Arbeitskräfte zur Verfügung stellen, umso besser."
 ramigration.3.c:0 "Safe-Heaven-Initiative"
 ramigration.3.c_tt:0 "\nNicht jeder Migrant verlässt seine Heimat auf der Suche nach einem besseren Leben oder einem Neuanfang. Manche werden dazu gezwungen, durch Gewalt oder Angst, ganz egal. Argentinien mag zwar eine Geschichte politischer Unruhen haben, ist aber dennoch ein friedliches Land. Die Aufnahme von Flüchtlingen wird uns belasten … aber niemals brechen. Im Gegenteil, sie kann uns auf lange Sicht nur stärker machen.\n\nDiese Idee geht verloren, wenn Ihr Land in einen Krieg eintritt oder mehr als 15 % der weltweiten Spannungen verursacht."
 ramigration.3.dd:0 "Setzen Sie die Safe-Heaven-Initiative wieder ein"
 ramigration.3.dd_tt:0 "\nHoffentlich hält es dieses Mal."
 #
 ramigration.4.t:0 "Die Save-Heaven-Initiative scheitert"
 ramigration.4.d:0 "Die jüngsten Ereignisse haben viele Migranten, die sich in Argentinien niederlassen wollten, dazu gebracht, ihre Pläne zu überdenken. Solange sich die Bedingungen nicht verbessern, ist es unwahrscheinlich, dass die Initiative wirklich etwas nützt."
 ramigration.4.a:0 "Schade."
 ramigration.4.a_tt:0 "\nMöglicherweise können Sie die Safe-Heaven-Initiative in Zukunft wieder einführen, falls sich die Bedingungen verbessern."
 #
 ramigration.7.t:0 "Richtlinie 11"
 ramigration.7.d:0 "Es reicht nicht aus, unerwünschten Personen die Einreise in unser Land zu verwehren, insbesondere angesichts der Tatsache, dass sich bereits so viele von ihnen innerhalb unserer Grenzen befinden, unsere Wirtschaft aussaugen und uns alle benachteiligen. Sie müssen entfernt werden. Auf die eine oder andere Weise."
 ramigration.7.a:0 "Richtlinie 11 erlassen"
 ramigration.7.a_tt:0 "\nDiese Idee wird verloren gehen, wenn der Faschismus die Macht verliert."
 ramigration.7.b:0 "Das geht zu weit."
 ramigration.7.b_tt:0 "\nGeschlossene Grenzen bleiben Ihr Einwanderungsgesetz."
 #
 ramigration.8.t:0 "Richtlinie 11 wird aufgehoben"
 ramigration.8.d:0 "Wie im Wahlkampf versprochen, drängte die neue Regierung den Kongress, die Direktive 11 aufzuheben. So gern sie dies als Beispiel dafür nutzen würde, wie anders sie das Land führen will, ist es Menschen mit gutem Gedächtnis nicht entgangen, dass viele derjenigen, die jetzt jubeln, dieselben sind, die das Gesetz überhaupt erst verabschiedet haben.\n\nAbgesehen von der Politik markiert der heutige Tag das Ende von Direktive 11 ... vorerst."
 ramigration.8.a:0 "Wir werden nicht dieselben Fehler machen … wahrscheinlich."

