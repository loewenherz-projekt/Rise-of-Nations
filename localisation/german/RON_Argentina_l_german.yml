##########################################
######     REVISED ARGENTINA MOD    ######
######        ELECTION IDEAS        ######         
##########################################
#
 ra_patriotic_fraud:0 "Patriotischer Betrug"
 ra_patriotic_fraud_desc:0 "Unser Land ist und bleibt in guten Händen. In unseren."
 ra_civil_unrest:0 "Bürgerunruhen"
 ra_civil_unrest_desc:0 "Unser Volk ist mit unseren jüngsten Entscheidungen nicht zufrieden, doch der fehlende Widerstand ermöglicht es uns, frei zu handeln."
 ra_centralized_government:0 "Zentralisierte Regierung"
 ra_centralized_government_desc:0 "Ist es praktisch? Ja. Ist es eine Diktatur? Ich würde an Ihrer Stelle zweimal überlegen, bevor ich diese Frage beantworte."
 #
 ra_transparency:0 "Transparenz"
 ra_transparency_desc:0 "Argentinien liegt in den Händen seines Volkes."
 ra_appeased_population:0 "Besänftigte Bevölkerung"
 ra_appeased_population_desc:0 "Unsere Bevölkerung ist mit unseren jüngsten Entscheidungen zufrieden, auch wenn die Präsenz so vieler politischer Opposition unsere eigenen Bemühungen behindert."
 ra_coalition_government:0 "Koalitionsregierung"
 ra_coalition_government_desc:0 "Eine Vielzahl von Ideen klingt auf dem Papier gut. Hoffen wir, dass zumindest einige davon gut sind."
##########################################
######     REVISED ARGENTINA MOD    ######
######        EDUCATION IDEAS       ######         
##########################################
#
 ra_public_education:0 "Öffentliche Schulen"
 ra_public_education_desc:0 "Jedes Kind in unserem Land hat Zugang zu öffentlicher Bildung."
 ra_mixed_institutions:0 "Gemischte Bildungseinrichtungen"
 ra_mixed_institutions_desc:0 "Die Kirche und andere philanthropische Institutionen helfen uns, die Last der Ausbildung unserer Jugend zu teilen."
 ra_private_education:0 "Private Bildungseinrichtungen"
 ra_private_education_desc:0 "Schicke Uniformen und Unterricht in drei Sprachen! Wenn Sie es sich leisten können."
 ra_melting_pot_of_cultures:0 "Schmelztiegel der Kulturen"
 ra_melting_pot_of_cultures_desc:0 "Man sagt, Abwechslung macht den Geschmack des Lebens aus. Menschen auf der anderen Seite der Welt könnten auf unseren Straßen spazieren gehen und sich wie zu Hause fühlen."
 ra_cultural_homogenization:0 "Kulturelle Homogenisierung"
 ra_cultural_homogenization_desc:0 "Argentinien füllt sich mit Argentiniern."
 ra_standarized_content:0 "Standardisierte Bildungsinhalte"
 ra_standarized_content_desc:0 "Den Lehrern steht es frei, beliebige Themen in ihren Unterricht einzubeziehen." 
 ra_controlled_content:0 "Kontrollierte Bildungsinhalte"
 ra_controlled_content_desc:0 "Nationale Interessen stehen immer über der historischen Genauigkeit." 
 ra_research_grant:0 "Forschungsstipendium"
 ra_research_grant_desc:0 "Wir finanzieren das Forschungsprojekt eines unserer jungen Spezialisten."
##########################################
######     REVISED ARGENTINA MOD    ######
