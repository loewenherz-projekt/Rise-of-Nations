#ARG
 ARG_gw_tank_equipment:0 "FIAT 3000"
 ARG_gw_tank_equipment_short:0 "FIAT 3000"
 ARG_gw_tank_equipment_desc:0 "Der Fiat 3000 war der erste in Italien in Serie produzierte Panzer. Er wurde zum Standardpanzer der aufstrebenden italienischen Panzerverbände nach dem Ersten Weltkrieg. Der 3000 basierte auf dem französischen Renault FT. Er war der erste Panzerwagen der argentinischen Armee."
 ARG_light_tank_equipment_1:0 "Vickers 6-Tonnen"
 ARG_light_tank_equipment_1_short:0 "Vickers 6-Tonnen"
 ARG_light_tank_equipment_1_desc:0 "Der Vickers 6-Tonnen-Panzer oder Vickers Mark E war ein britischer leichter Panzer, der als Privatprojekt bei Vickers entwickelt wurde. Er wurde nicht von der britischen Armee gekauft, sondern von zahlreichen ausländischen Streitkräften übernommen und mit wenigen Verbesserungen von den Sowjets als T-26 lizenziert. Er war zudem der direkte Vorgänger des polnischen 7TP-Panzers. Die argentinische Armee setzte nur eine sehr kleine Anzahl davon ein."
 ARG_light_tank_equipment_2:0 "CKD LT vz.38 TNHP"
 ARG_light_tank_equipment_2_short:0 "LT vz.38"
 ARG_light_tank_equipment_2_desc:0 "Der LT vs. 38 war ein tschechischer Panzer aus der Zeit vor dem Zweiten Weltkrieg. Nach der deutschen Besetzung der Tschechoslowakei wurde er von der deutschen Armee als Pz. 38(t) übernommen und kam bei den Invasionen in Polen, Frankreich und Russland zum Einsatz. Nachdem Peru die LTP-Version des LT vz. 38 erworben hatte, bestellte Argentinien eine verbesserte Version (und höchstwahrscheinlich eine Produktionslizenz). Der Auftrag wurde aufgrund der deutschen Besetzung der Tschechoslowakei nie ausgeführt."
 ARG_medium_tank_equipment_2:0 "DL 43 Nahuel"

 ARG_medium_tank_equipment_2_desc:0 "Der Panzer „Nahuel“ DL 43 war ein mittlerer Panzer, der während des Zweiten Weltkriegs in Argentinien entwickelt wurde. Er war das argentinische Pendant zum mittleren Panzer M4 Sherman. Das Wort Nahuel bedeutet in der Aborigine-Sprache Mapudungun „Jaguar“. Er war mit einer 75-mm-Kanone (entnommen vom Krupp-Feldgeschütz Modell 1909 der argentinischen Armee) in einem drehbaren Panzerturm bewaffnet. Das Design war zu seiner Zeit innovativ, da er neben dem russischen T-34 der einzige Panzer war, dessen Turm aus einem Guss gefertigt war, was ihm zusätzliche Robustheit verlieh. Seine Front- und Seitenpanzerung war, ähnlich wie beim T-34, abgeschrägt."
 ARG_medium_tank_equipment_3:0 "DL 52 Nahuel II"
 ARG_medium_tank_equipment_3_short:0 "DL 52 Nahuel II"
 ARG_medium_tank_equipment_3_desc:0 "Der DL 52 Nahuel II sollte eine deutliche Verbesserung gegenüber dem Vorgängermodell DL 43 darstellen, wurde jedoch nie realisiert. Wie sein Vorgänger war er ein mittlerer Panzer, jedoch mit verbesserter Panzerung und Feuerkraft. Mindestens hätte er einen besseren Turm und eine stärkere Kanone geboten. Höchstwahrscheinlich hätte er ein besseres Fahrwerk und einen stärkeren Motor gehabt, um das Mehrgewicht auszugleichen. Da nach dem Krieg überschüssige Panzerung zu einem günstigeren Preis verfügbar war, entschied sich die Armee stattdessen für den Sherman Firefly aus britischen Beständen."
 ARG_motorized_equipment_1:0 "HAFDASA 6X6 Criollo"
 ARG_motorized_equipment_1_desc:0 "Der Hispano-ARGentina HAFDASA 6x6, Spitzname Criollo Grande, war ein Truppentransporter und Artillerieschlepper, der zwischen 1939 und 1942 in Argentinien entworfen und gebaut wurde. Er wurde von einem 150 PS starken HAFDASA-Dieselmotor angetrieben."
 ARG_anti_air_equipment:0 "Škoda 76,5 mm (Bj. 1928)"
 ARG_anti_air_equipment_short:0 "Škoda 76,5 mm (Bj. 1928)"
 ARG_anti_air_equipment_desc:0 "In den 30er Jahren begeisterte sich die argentinische Armee für die in der Tschechoslowakei von Škoda hergestellten Flugabwehrgeschütze. Um die großen tschechischen Flugabwehrgeschütze zu ergänzen und eine breitere Reichweite zu erzielen, setzte die argentinische Armee die Bofors 40 mm (Modell 1936) und die Oerlikon 20 mm (Modell 1938) ein."
 ARG_artillery_equipment_1:0 "Schneider-Creusot Montagne Mle. 1928"
 ARG_artillery_equipment_1_short:0 "Schneider Mle. 1928"
 ARG_artillery_equipment_1_desc:0 "Das Canon de 75 M(montagne) modèle 1928 (75 mm mle.28) war ein französisches Gebirgsgeschütz. 1936 stattete die argentinische Armee ihre Infanteriedivisionen mit Artilleriebatterien aus, die größtenteils aus den Modellen 75, 105, 130 und 155 mm von Krupp und Schneider bestanden."
 ARG_infantry_equipment_0:0 "Mauser ARGentine Mod. 1891"
 ARG_infantry_equipment_0_short:0 "Mauser Mod. 1891"
 ARG_infantry_equipment_0_desc:0 "Grundlegende Infanterieausrüstung, die vor und während des Ersten Weltkriegs entwickelt wurde. Argentinien setzte seit 1891 modifizierte Mauser-Gewehre ein. Das Mauser ARGentine Modell 1891 wurde in Belgien für die argentinische Armee entwickelt."
 ARG_infantry_equipment_1:0 "Mauser ARGentine Mod. 1909"
 ARG_infantry_equipment_1_short:0 "Mauser Mod. 1909"
 ARG_infantry_equipment_1_desc:0 "Persönliche und Mannschaftswaffen für die Infanterie sowie verschiedene andere Ausrüstungsgegenstände, die ein Soldat benötigt. Im Jahr 1936 war die Standardausrüstung für einen Wehrpflichtigen in der argentinischen Armee das Mauser ARGentine Modell 1909 (eine in Lizenz gebaute Mauser-Variante)."
 ARG_infantry_equipment_2:0 "HAFDASA M943 Halcón SMG"
 ARG_infantry_equipment_2_short:0 "HAFDASA Halcón"
 ARG_infantry_equipment_2_desc:0 "Personal- und Mannschaftswaffen für die Infanterie sowie verschiedene andere Ausrüstungsgegenstände, die ein Soldat benötigt. Modernisiert, um eine große Anzahl von Maschinenpistolen und Panzerabwehrgewehren aufzunehmen. Bereits 1933 schulte die argentinische Armee ihre Wehrpflichtigen im Umgang mit den von Hispano-ARGentina (HAFDASA) entwickelten und gebauten Maschinenpistolen."
 ARG_infantry_equipment_3:0 "FM STG 44"

 ARG_infantry_equipment_3_desc:0 "Als der Zweite Weltkrieg zu Ende war, hatte die argentinische Armee bereits drei Prototypen eines halbautomatischen Gewehrs auf Basis des berühmten deutschen MP43/ST44 entwickelt und außerdem ihr eigenes Design der Panzerfaust namens PAPI (Proyectil Antitanque Para Infantería) im Einsatz."
 ARG_artillery_equipment_2:0 "Bofors L40 Mod. 1934"
 ARG_artillery_equipment_2_desc:0 "Das Bofors 75 mm Modell 1934 war ein Gebirgsgeschütz, das in Schweden von Bofors hergestellt und weithin im Ausland verkauft wurde. Das Modell 1934 wurde im Zweiten Weltkrieg von Deutschland, Belgien, den Niederlanden und China eingesetzt. Aufgrund des Grenzstreits mit Chile verfügte die argentinische Armee über eine beträchtliche Anzahl an Gebirgsartillerie verschiedener Kaliber, darunter auch dieses hervorragende Modell."
 ARG_artillery_equipment_3:0 "FM Matorras L13 Mod. 1945"
 ARG_artillery_equipment_3_desc:0 "Aufgrund der Weigerung Argentiniens, nach Pearl Harbor und dem darauffolgenden Waffenembargo auf Seiten der Alliierten in den Krieg einzutreten, recycelte die Armee gelagerte Krupp L13 Mod. 1909-Kanonen, modifizierte sie und verwendete sie als Komponente einer im Land entwickelten und produzierten Gebirgsartillerie. Sie soll über einen modifizierten Schließmechanismus und ein geringes Gewicht verfügen, was die Mobilität von Spezialeinheiten erheblich verbessern soll. Das Modell wurde nach seinem Konstrukteur benannt."
 
 ARG_fighter_equipment_0:0 "Dewoitin D.21"
 ARG_fighter_equipment_0_short:0 "Dewoitin D.21"
 ARG_fighter_equipment_0_desc:0 "Die Dewoitine D.21 war ein französisches Eindecker-Kampfflugzeug mit offenem Cockpit und festem Fahrwerk aus den 1920er Jahren. Das Flugzeug wurde in der Schweiz (von EKW), der Tschechoslowakei (von Skoda und bekannt als Skoda-Dewoitine D.1) und Argentinien (von FMA) in Lizenz gebaut."
 ARG_fighter_equipment_1:0 "Curtiss Hawk 75O Mohawk"
 ARG_fighter_equipment_1_short:0 "Curtiss Hawk 75O"
 ARG_fighter_equipment_1_desc:0 "Die Curtiss P-36 Hawk, auch bekannt als Curtiss Hawk Modell 75, war ein in den 1930er und 40er Jahren in den USA entwickeltes und gebautes Kampfflugzeug. Argentinien kaufte mehrere der vereinfachten Hawk 75O mit festem Fahrwerk (für den Einsatz im Gelände und zur einfachen Wartung) und erwarb eine Fertigungslizenz für diesen Typ. 30 Exemplare wurden von Curtiss gebaut und ausgeliefert, 20 weitere wurden vor Ort produziert."
 ARG_heavy_fighter_equipment_3:0 "FMA I.Ae. 30 Ñancú"
 ARG_heavy_fighter_equipment_3_short:0 "I.Ae. 30 Ñancú"
 ARG_heavy_fighter_equipment_3_desc:0 "Die I.Ae. 30 Ñancú, benannt nach einem einheimischen Adler aus Patagonien, wurde vom italienischen Ingenieur Cesare Pallavicino entworfen, der 1946 nach Argentinien kam. Pallavicino leitete ein Team argentinischer Techniker und Ingenieure bei der Entwicklung des Konzepts eines Hochgeschwindigkeits-Begleitjägers, der zusammen mit den Bombern der argentinischen Luftwaffe eingesetzt werden sollte."
 ARG_strat_bomber_equipment_1:0 "Martin B-10 Bolo"
 ARG_strat_bomber_equipment_1_short:0 "Martin B-10 Bolo"
 ARG_strat_bomber_equipment_1_desc:0 "Die Martin B-10 war der erste Ganzmetall-Eindeckerbomber, der regelmäßig vom United States Army Air Corps eingesetzt wurde. Sie wurde im Juni 1934 in Dienst gestellt. Sie war auch der erste in Serie produzierte Bomber, dessen Leistung den damaligen Jagdflugzeugen der Armee überlegen war. Die argentinische Marine erhielt 1937 zwölf Exemplare (Modell 139WAN), während das argentinische Army Air Corps 1938 24 Exemplare (Modell 139WAA) erhielt."
 ARG_jet_strat_bomber_equipment_1:0 " FMA I.Ae.36 Cóndor"
 ARG_jet_strat_bomber_equipment_1_short:0 "I.Ae.36 Kondor"
 ARG_jet_strat_bomber_equipment_1_desc:0 "Die I.Ae.36 Cóndor war als Düsenflugzeug für Passagiertransporte konzipiert und wurde von Kurt Tank entworfen. Sie hätte sich durchaus zu einem kleinen strategischen Bomber entwickeln können. Ihr Design war ihrer Zeit voraus. Sie ähnelte einem Caravelle-Verkehrsflugzeug, verfügte jedoch über eine innovative Anordnung der Düseneinlässe im hinteren Teil des Rumpfes und war um diesen herumgeführt. Die Höchstgeschwindigkeit sollte 950 km/h erreichen (zum Vergleich: Das schnellste Verkehrsflugzeug war damals die Comet mit 750 km/h). Das Projekt kam nie über das Reißbrett hinaus, und es wurde nie ein Prototyp gebaut."
 ARG_tac_bomber_equipment_0:0 "FMA Ae.MB.2 Bombi"
 ARG_tac_bomber_equipment_0_short:0 "Ae.MB2 Bombi"
 ARG_tac_bomber_equipment_0_desc:0 "Die FMA Ae.MB2 Bombi war ein Bomberflugzeug, das Mitte der 1930er Jahre in Argentinien entwickelt wurde. Es handelte sich um einen freitragenden Tiefdecker-Eindecker in konventioneller Konfiguration. Die ursprüngliche AeMB.1-Konfiguration war mit einem dorsalen Maschinengewehrturm ausgestattet, der später aus Stabilitätsgründen bei der AeMB.2 entfernt wurde. Zwischen 1936 und 1945 waren 15 Serienexemplare bei der argentinischen Luftwaffe im Einsatz."
 ARG_tac_bomber_equipment_1:0 "Northrop 8A-2 Ochoa"
 ARG_tac_bomber_equipment_1_short:0 "Northrop 8A-2 Ochoa"
 ARG_tac_bomber_equipment_1_desc:0 "Die Northrop A-17, eine Weiterentwicklung der Northrop Gamma 2F, war ein zweisitziger, einmotoriger Eindecker-Kampfbomber, der 1935 von der Northrop Corporation für das US Army Air Corps gebaut wurde. Die 8A-2 war die für Argentinien gebaute Version. Ausgestattet mit festem Fahrwerk, ventraler Geschützstellung und angetrieben von einem 840 PS (626 kW) starken Wright R-1820-G3 Cyclone, wurden nur 30 Exemplare gebaut."
 ARG_tac_bomber_equipment_2:0 "FMA I.Ae.24 Calquín"
 ARG_tac_bomber_equipment_2_short:0 "I.Ae.24 Calquín"
 ARG_tac_bomber_equipment_2_desc:0 "Die I.Ae.24 Calquin (ein Wort aus dem Mapudungun, das „Königsadler“ bedeutet) war ein taktischer Bomber, der vom Instituto Aerotécnico (Córdoba) in Argentinien in der unmittelbaren Nachkriegszeit entwickelt und gebaut wurde. Obwohl sie oberflächlich betrachtet der de Havilland Mosquito ähnelte, wurde die I.Ae.24 von zwei Pratt &amp; Whitney R-1830-G „Twin Wasp“-Sternmotoren angetrieben, die ihr ein unverwechselbares Aussehen verliehen."
 ARG_tac_bomber_equipment_3:0 "FMA I.Ae.35 Huanquero"
 ARG_tac_bomber_equipment_3_short:0 "I.Ae.35 Huanquero"
 ARG_tac_bomber_equipment_3_desc:0 "Die I.Ae.35 Huanquero war ein zweimotoriger Ganzmetall-Tiefdecker mit freitragendem Eindecker. Sie besaß ein hoch montiertes Höhenleitwerk mit zwei Flossen und Rudern sowie ein einziehbares Bugfahrwerk. Angetrieben wurde sie von zwei I.Ae. 19R El Indio-Sternmotoren. Das Konstruktionsteam wurde von Professor Kurt Tank, einem ehemaligen Konstrukteur von Focke Wulf, geleitet. Der Prototyp hatte seinen Erstflug 1953, worauf eine geplante Serienproduktion von 100 Maschinen folgte."
 ARG_nav_bomber_equipment_1:0 "Grumman G-15 Duck"
 ARG_nav_bomber_equipment_1_short:0 "Grumman G-15 Duck"
 ARG_nav_bomber_equipment_1_desc:0 "Die Grumman J2F Duck (Firmenbezeichnung G-15) war ein amerikanischer einmotoriger Amphibiendoppeldecker. Sie wurde von Mitte der 1930er Jahre bis kurz nach dem Zweiten Weltkrieg von allen größeren Teilstreitkräften der US-Streitkräfte eingesetzt. Sie wurde auch von der argentinischen Marine verwendet, die 1937 ihre erste Duck erhielt und sie auch von den Kreuzern der Veinticinco de Mayo-Klasse einsetzte."
 ARG_nav_bomber_equipment_2:0 "Konsolidierte PBY Catalina"
 ARG_nav_bomber_equipment_2_short:0 "PBY Catalina"
 ARG_nav_bomber_equipment_2_desc:0 "Die Consolidated PBY Catalina war ein amerikanisches Flugboot und später ein Amphibienflugzeug der 1930er und 1940er Jahre, das von Consolidated Aircraft hergestellt wurde. Es war eines der am häufigsten eingesetzten Wasserflugzeuge des Zweiten Weltkriegs. Catalinas dienten in den Luftstreitkräften und Marinen vieler Nationen. 17 Exemplare wurden in der Nachkriegszeit von der argentinischen Marine eingesetzt."
 ARG_CAS_equipment_1:0 "Curtiss 68 Hawk III"
 ARG_CAS_equipment_1_short:0 "Curtiss Hawk III"
 ARG_CAS_equipment_1_desc:0 "Der Curtiss BF2C Goshawk (Modell 68) war eine US-amerikanische Exportversion des Marine-Doppeldeckers aus den 1930er Jahren, die nur begrenzten Erfolg hatte und Teil einer langen Reihe von Flugzeugen der Hawk-Serie war, die von der Curtiss Aeroplane and Motor Company für das amerikanische Militär hergestellt wurden. Argentinien betrieb 1936 zehn Exemplare."
 #ARG_CAS_equipment_2:0 "FMA I.Ae. 21"
 ARG_CAS_equipment_2_short:0 "I.Ae.21"
 ARG_CAS_equipment_2_desc:0 "Die Erfahrungen mit dem Trainer NA-16-4P und die sich verschlechternden politischen Beziehungen zu den USA führten zur lokalen Entwicklung der I.Ae. DL 21, die die gleiche Rumpfstruktur wie die NA-16 aufwies. Die Produktion erwies sich jedoch als zu schwierig. Daher wurde stattdessen ein völlig neues Design (die I.Ae. DL 22) gebaut."
 #ARG_CAS_equipment_3:0 "FMA I.Ae. D.L. 22 Dele Dele"
 #ARG_CAS_equipment_3_short:0 "I.Ae.22 Dele Dele"
 ARG_CAS_equipment_3_desc:0 "Die I.Ae. 22 war ein argentinisches Trainingsflugzeug für Fortgeschrittene, das 1943 vom Instituto Aerotécnico (Luftfahrttechnisches Institut) entwickelt wurde. Die Holzstruktur ähnelte der North American NA-16. Es wurden 201 Exemplare gebaut. Das Flugzeug kam in den 1950er Jahren bei internen Konflikten zum Einsatz."
 ARG_jet_fighter_equipment_1:0 "FMA I.Ae.27 Pulqui I"
 ARG_jet_fighter_equipment_1_short:0 "I.Ae.27 Pulqui I"
 ARG_jet_fighter_equipment_1_desc:0 "Die I.Ae. 27 Pulqui I war ein argentinischer Düsenjäger, der 1946 am Instituto Aerotecnico (Luftfahrttechnisches Institut) unter der Leitung von Emile Dewoitine entwickelt wurde. Nur ein Prototyp wurde fertiggestellt. Seine Rolle in der Geschichte der Luftfahrt ist bedeutend, da es das erste in Argentinien und Lateinamerika entwickelte und gebaute Düsenkampfflugzeug war. Damit war Argentinien die sechste Nation weltweit, die diese Aufgabe allein bewältigte."
 ARG_jet_fighter_equipment_2:0 "FMA I.Ae.33 Pulqui II"
 ARG_jet_fighter_equipment_2_short:0 "I.Ae.33 Pulqui II"
 ARG_jet_fighter_equipment_2_desc:0 "Die FMA IAe 33 Pulqui II (in der indigenen Sprache Mapuche bedeutet Pulqui Pfeil) war ein Düsenjäger, der Ende der 1940er Jahre in Argentinien unter der Regierung Perón von Kurt Tank entworfen und von der Fábrica Militar de Aviones (FMA) gebaut wurde. Er verkörperte viele Designelemente der Focke-Wulf Ta 183 aus Kriegszeiten, einem nie realisierten Jagdflugzeugprojekt."
 ARG_jet_tac_bomber_equipment_1:0 "FMA I.Ae.39 Charrán"
 ARG_jet_tac_bomber_equipment_1_short:0 "I.Ae.39 Charrán"
 ARG_jet_tac_bomber_equipment_1_desc:0 " Die FMA I.Ae.39 Charrán (was Seeschwalbe bedeutet) wurde Mitte der 1950er Jahre als argentinisches fortgeschrittenes Schulflugzeug interniert, dessen Konstrukteur ein deutscher Ingenieur war, der während des Krieges bei Messerschmitt gearbeitet hatte, insbesondere an der Me 262. Hinweis: Informationen müssen überprüft werden."
 ARG_jet_tac_bomber_equipment_2:0 "FMA I.Ae. 43 Pulqui III"
 ARG_jet_tac_bomber_equipment_2_short:0 "I.Ae. 43 Pulqui III"
 ARG_jet_tac_bomber_equipment_2_desc:0 "Die von Kurt Tank entworfene I.Ae. 43 Pulqui III sollte ein Überschall-Jagdbomber werden, kam aber nie über das Reißbrett hinaus. Den wenigen verfügbaren Informationen zufolge handelte es sich um einen Einsitzer mit zwei Motoren und Pfeilflügeln. Sie diente schließlich als Inspiration für die von Tank für die indische Luftwaffe entwickelte HF-124 Marut."
 

 ARG_submarine_1_desc:0 "Die Santa-Fe-Klasse besteht aus drei U-Booten, die in Italien bestellt und 1933 nach Argentinien geliefert wurden. Die drei Schiffe dieser Klasse bildeten bis 1960 das Rückgrat der argentinischen U-Boot-Streitkräfte. Sie wurden nach den Werften im italienischen Tarent, wo sie gebaut wurden, „Tarantinos“ genannt."
 ARG_destroyer_1:0 "Catamarca-Klasse"

 #ARG_destroyer_1b:0 "Cervantes Class"
 ARG_destroyer_2:0 "Buenos Aires-Klasse"
 ARG_destroyer_2_desc:0 "Die Zerstörer der Buenos-Aires-Klasse wurden zwischen 1936 und 1938 in Großbritannien für Argentinien gebaut. Sie basierten auf den britischen Zerstörern der G-Klasse. Sie verdrängten über 1300 Tonnen und waren mit vier QF 4,7-Zoll-Mark-IX-Kanonen als Hauptgeschützen bewaffnet."




 ARG_heavy_cruiser_1:0 "Garibaldi-Klasse"
 ARG_heavy_cruiser_1_desc:0 "Die Garibaldi-Klasse repräsentiert eine Klasse von Panzerkreuzern, die um die Jahrhundertwende für Argentinien gebaut wurden. Alle waren Mitte der 1930er Jahre veraltet, wobei der letzte 1953 außer Dienst gestellt wurde. Sie wurden 1931 durch die in Italien gebauten schweren Kreuzer der Veinticinco de Mayo-Klasse ersetzt."
 #ARG_heavy_cruiser_1b:0 "Veinticinco de Mayo Class"

 ARG_battleship_1_desc:0 "Die Rivadavia-Klasse bestand aus zwei in den USA gebauten Dreadnought-Schlachtschiffen, die Anfang der 1910er Jahre für die argentinische Marine gebaut wurden. Sie verdrängten 27.500 Tonnen und waren mit zwölf 305-mm-Kanonen (50-mm-Kanonen) bewaffnet. Sie blieben bis in die 1950er Jahre im Einsatz."

 
