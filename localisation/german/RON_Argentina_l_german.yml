 ##########################################
 ######     REVISED ARGENTINA MOD    ######
 ######          ARMY IDEAS          ######
 ##########################################
 #
 #
 #
 ra_army_reorganization:0 "Reorganisation der Armee"
 ra_army_reorganization_desc:0 "Die Armee durchläuft derzeit einen gründlichen Reorganisationsprozess, um die Themen anzugehen, die während unseres Treffens mit dem Generalstabschef besprochen wurden."
 ra_national_defense:0 "Selbstverteidigungsarmee"
 ra_national_defense_desc:0 "Wir haben die Armee auf die Selbstverteidigung ausgerichtet und sichergestellt, dass unser Land in der Lage ist, jeden potenziellen Angreifer abzuwehren."
 ra_political_abstention:0 "Politische Enthaltung"
 ra_political_abstention_desc:0 "Unsere Streitkräfte weigern sich, an der Politik des Landes teilzunehmen und dienen ausschließlich dem Zweck, für den sie geschaffen wurden: dem Schutz vor äußeren Feinden."
 ra_fortress_argentina:0 "Festung Argentinien"
 ra_fortress_argentina_desc:0 "Wir werden dafür sorgen, dass die bloße Vorstellung, unser Land anzugreifen, bei feindlichen Soldaten quälende Albträume auslöst."
 ra_ideological_paragons:0 "Ideologische Vorbilder"
 ra_ideological_paragons_desc:0 "Hingabe. Ehre. Loyalität. Diese Begriffe sind in unserer Kultur zu Synonymen für den Soldaten geworden."
 ra_political_interference:0 "Politische Einmischung"
 ra_political_interference_desc:0 "Politikern kann man nicht trauen. Die Armee soll dafür sorgen, dass dieses Land seinem vorbestimmten Weg zum Ruhm folgt."
 ra_warranted_interventions:0 "Berechtigte Interventionen"
 ra_warranted_interventions_desc:0 "Wir werden nicht tatenlos zusehen, wie unsere Nachbarn durch fehlgeleitete Ideale oder imperialistische Einflüsse korrumpiert werden."
 ra_new_argentinian_army_def:0 "Neue argentinische Armee"
 ra_new_argentinian_army_def_desc:0 "Der Armee wurde neues Leben eingehaucht. Sie genießt nun den Respekt und die Bewunderung unseres Volkes und flößt unseren Feinden gleichzeitig Angst ein."
 ra_new_argentinian_army_off:0 "Neue argentinische Armee"
 ra_new_argentinian_army_off_desc:0 "Der Armee wurde neues Leben eingehaucht. Sie genießt nun den Respekt und die Bewunderung unseres Volkes und flößt unseren Feinden gleichzeitig Angst ein."
#
 ra_ram_ft_ayc:0 "Bauen Sie Ihren Schrank zusammen"
 ra_ram_ft_ayc_desc:0 "Unser Land hat die 30er Jahre größtenteils damit verbracht, sich von der Weltwirtschaftskrise zu erholen. Trotzdem hat Argentinien es geschafft, seine Position unter den 15 größten Volkswirtschaften der Welt zu behaupten. Mit dem Ende der Krise ist es an der Zeit, den Schwung wiederzugewinnen, den wir 1929 verloren haben. Wir werden jeden Minister seine fertigen Projekte vorlegen lassen und ihn dem Kongress vorstellen."
 ra_ram_ft_ayc_tt:0 "\nSparen Sie Ihre politische Macht! Fokusse, die sie zum Abschluss benötigen, werden gestoppt, wenn Sie vor der Fertigstellung unter die erforderliche Menge fallen!"
#
#
#
 ra_ram_ft_mp:0 "Migrationspolitik"
 ra_ram_ft_mp_desc:0 "Menschen sind die wertvollste Ressource eines Landes. Seit einem halben Jahrhundert ist Argentinien wie ein Leuchtturm, der Migranten aus aller Welt in sein Land führt. Unsere Bevölkerung wächst rasant wie kein anderes Land des Kontinents. Obwohl die Vorteile der „Migrationswelle“ offensichtlich sind, befürchten viele, dass sie uns am Ende überschwemmen könnte."
 ra_ram_ft_mp_sp:0 "Prioritäten setzen"
 ra_ram_ft_mp_sp_desc:0 "Argentinien ist groß, aber abgesehen von den großen Ballungszentren dünn besiedelt. Sollen wir Neuankömmlinge in die Städte schicken, um die Fabriken mit Arbeitern zu füllen, oder sollen wir sie aufs Land schicken, um unsere Kontrolle zu behaupten und die dort verborgenen Ressourcen zu erschließen und auszubeuten?"
 #ra_ram_ft_mp_sp_tt:0 ""
 ra_ram_ft_mp_il:0 "Einwanderungsrecht"
 ra_ram_ft_mp_il_desc:0 "Der Erste Weltkrieg überschwemmte unsere Häfen mit Einwanderern, die heute stolze und produktive Argentinier sind. Die Zeiten der „mageren Kühe“ mögen zwar vorbei sein, doch in Europa und Asien nehmen die Spannungen wieder zu. Viele sorgen sich um die Folgen einer zweiten Welle für unsere sich erholende Wirtschaft, doch der Kompromiss bei der Arbeitskräftezahl bleibt verlockend …"
 ra_ram_ft_mp_ril:0 "Überprüfen Sie das Einwanderungsgesetz"
 ra_ram_ft_mp_ril_desc:0 "Die Zeiten ändern sich, ebenso wie unsere Bedürfnisse. Es wird jedoch nicht einfach sein, die Angelegenheit nach so kurzer Zeit wieder vor den Kongress zu bringen."
 ra_ram_ft_mp_ril_tt:0 "\nDieser Fokus wird alle Ihre Einwanderungsideen und -flaggen ausräumen und Ihnen ermöglichen, erneut zu wählen."
#
#
#
 ra_ram_ft_ep:0 "Bildungspolitik"
 ra_ram_ft_ep_desc:0 "Argentinien hat eine der höchsten Alphabetisierungsraten weltweit. Unsere Schulen und Universitäten haben mit dem Bevölkerungswachstum Schritt gehalten, doch das wird nicht mehr der Fall sein, wenn wir diesem Sektor nicht die nötigen Ressourcen zuweisen."
 ra_ram_ft_ep_tt:0 "\nDieser Schwerpunkt ermöglicht es Ihnen, die Bildungsreformer „Jorge de la Torre“ und „Lejandro Korn“ als politische Berater zu ernennen."
 ra_ram_ft_ep_pe:0 "Öffentliche Bildung"
 ra_ram_ft_ep_pe_desc:0 "Wir garantieren jedem Kind und Jugendlichen den Zugang zu öffentlich finanzierten Schulen, wo sie die für jeden Bürger notwendigen Grundlagen erlernen können."
 ra_ram_ft_ep_mi:0 "Gemischte Institutionen"
 ra_ram_ft_ep_mi_desc:0 "Institutionen wie die Kirche haben schon immer einen wichtigen Beitrag zum Bildungssystem unseres Landes geleistet. Wir könnten die Gründung von viel mehr Schulen zu einem Bruchteil der Kosten fördern, die für den Betrieb einer vollständig staatlich finanzierten Einrichtung anfallen würden."
 ra_ram_ft_ep_pi:0 "Private Institutionen"
 ra_ram_ft_ep_pi_desc:0 "Private Bildungseinrichtungen sind zwar teuer, bieten aber eine bessere Bildung, ohne dass dem Staat Kosten entstehen. Manche argumentieren, dass unsere Kinder dadurch segregiert würden und wir keine Kontrolle über den Unterricht hätten. Wir müssen entscheiden, ob der Nutzen die Risiken überwiegt."
 ra_ram_ft_ep_cd:0 "Kulturelle Vielfalt"
 ra_ram_ft_ep_cd_desc:0 "Unser Land ist ein Schmelztiegel der Kulturen. Wir sollten die Wurzeln jedes Schülers respektieren und dafür sorgen, dass er nicht vergisst, woher er kommt."
 ra_ram_ft_ep_ch:0 "Kulturelle Homogenisierung"
 ra_ram_ft_ep_ch_desc:0 "Die „Menschenwelle“, die der Erste Weltkrieg über uns brachte, füllte das Land mit Menschen aus aller Welt. Wenn wir ein vereintes Land wollen, müssen wir den Kindern beibringen, was es bedeutet, Argentinier zu sein."
 ra_ram_ft_ep_sc:0 "Standardisierter Inhalt"
 ra_ram_ft_ep_sc_desc:0 "Wir geben den Institutionen ein Basisprogramm an die Hand und überlassen den Lehrern die Ergänzung beliebiger Inhalte."
 ra_ram_ft_ep_cc:0 "Kontrollierter Inhalt"
 ra_ram_ft_ep_cc_desc:0 "Wir geben den Schülern genau vor, welche Inhalte sie lernen sollen und stellen sicher, dass sie keine Fragen zu Dingen stellen, die man besser nicht behandelt."
 ra_ram_ft_ep_sp:0 "Stipendienprogramm"
 ra_ram_ft_ep_sp_desc:0 "Dieses Programm gewährt den besten Schülern unserer Schulen nicht nur finanzielle Unterstützung, damit sie ihre Ausbildung weiter perfektionieren können, sondern gibt uns auch die Möglichkeit, besonders nützliche oder visionäre Forschungsprojekte zu finanzieren."
 ra_ram_ft_ep_sp_tt:0 "\nMit dem Forschungsstipendien-Event können Sie §Y3%§! Ihrer Konsumgüterfabriken investieren und erhalten dafür einen Forschungsbonus von §G30%§! in den Bereichen Elektronik, Maschinenbau, Bauwesen, Bergbau oder Kunststoff. Dieses Event kann einmal jährlich durchgeführt werden."
#
#
#
 ra_ram_ft_ecp:0 "Wirtschaftspolitik"
 ra_ram_ft_ecp_desc:0 "Da unsere Handelspartner nun zu protektionistischen Volkswirtschaften übergegangen sind, müssen wir dafür sorgen, dass unsere Wirtschaft auf eigenen Beinen stehen kann, sonst riskieren wir ihren Zusammenbruch."
 ra_ram_ft_ecp_tt:0 "\nDieser Fokus ermöglicht es Ihnen, §YAlberto Hueyo§! als politischen Berater zu ernennen."
#
 ra_ram_ft_ecp_drp:0 "Den Roca-Runciman-Pakt anprangern"
 ra_ram_ft_ecp_drp_desc:0 "Der Roca-Runciman-Pakt wurde unterzeichnet, um unseren Handel mit Großbritannien nach der Weltwirtschaftskrise aufrechtzuerhalten. Doch diese reflexartige Reaktion schadete unserer Wirtschaft mehr, als dass sie ihr nützte. Unseren Fleischexporten wurden lähmende Beschränkungen auferlegt, während den britischen Interessen unfaire Privilegien gewährt wurden, die die lokale Industrie behinderten und ihr ein Monopol auf dem Markt verschafften."
 ra_ram_ft_ecp_pdm:0 "Priorisierung des Inlandsmarktes"
 ra_ram_ft_ecp_pdm_desc:0 "Wenn die Briten uns unsere Produkte wegnehmen, bedeutet das nur, dass wir sie für uns selbst behalten müssen. Es würde uns nur dabei helfen, ein wirklich industrialisiertes Land zu werden."
 ra_ram_ft_ecp_temp:0 "Der Eden-Malbran-Pakt"
 ra_ram_ft_ecp_temp_desc:0 "Die Briten schlagen ein neues Abkommen vor. Auch wenn es nicht besonders gut ist (manche mögen sagen, es sei in manchen Aspekten sogar schlechter), gibt es keine Garantie dafür, dass wir anderswo bessere Angebote finden. Dennoch bieten gute Handelsbeziehungen mit Großbritannien weitere Vorteile."
 ra_ram_ft_ecp_snm:0 "Neue Märkte erschließen"
 ra_ram_ft_ecp_snm_desc:0 "Da die Beschränkungen des Roca-Runciman-Pakts nun aufgehoben sind, können wir neue Märkte erschließen. Deutschland, die Sowjetunion und Japan sind hervorragende Kandidaten. Wenn wir jedoch den Erfolg unserer Handelsmissionen sichern wollen, sollten wir uns vor der Entsendung unserer Delegationen vergewissern, dass wir bei ihnen ein gutes Verhältnis haben."
 ra_ram_ft_ecp_snm_tt: "\nYou'll be able to send one trade mission at a time. It'll take about a month to receive a response. Plan ahead, if you are refused it'll take a full year before you can negotiate with the same client again. A mission to England will also be available if you didn't sign the Eden-Malbran Pact."
 ra_ram_ft_ecp_gotw:0 "Kornkammer der Welt"
 ra_ram_ft_ecp_gotw_desc:0 "Unsere Fähigkeit, weltweit Handelsabkommen zu vermitteln, hat das Überleben unseres Agrarmodells gesichert. Die Weltwirtschaftskrise war nur ein kleiner Rückschlag. Wir werden die Welt ernähren und im Gegenzug von der Welt leben."
#
 ra_ram_ft_ecp_roi:0 "Revitalisierung unserer Branche"
 ra_ram_ft_ecp_roi_desc:0 "Wir müssen unserer Branche neuen Wind einhauchen, wenn wir wollen, dass sie die Auswirkungen der Weltwirtschaftskrise abschüttelt."
 ra_ram_ft_ecp_sfc:0 "Staatlich finanzierte Unternehmen"
 ra_ram_ft_ecp_sfc_desc:0 "Traditionalisten mögen direkte staatliche Eingriffe in die Wirtschaft missbilligen, aber wir können nicht zulassen, dass strategische Sektoren unserer Industrie unbesetzt bleiben."
 ra_ram_ft_ecp_dcs:0 "Entwicklung des zivilen Sektors"
 ra_ram_ft_ecp_dcs_desc:0 "Wir werden Mittel in den zivilen Sektor stecken und dafür sorgen, dass die Produktion in Schlüsselbereichen stabil bleibt oder, noch besser, neue Höhen erreicht."
 ra_ram_ft_ecp_dms:0 "Entwicklung des Militärsektors"
 ra_ram_ft_ecp_dms_desc:0 "Wenn wir bei unserer Bewaffnung von anderen Ländern abhängig sind, sind wir in einer schwachen Position. Es ist an der Zeit, dies zu ändern."
 ra_ram_ft_ecp_dms_tt:0 "\nDieser Fokus ermöglicht es Ihnen, §YManuel Savio§! als politischen Berater zu ernennen."
 ra_ram_ft_ecp_eypf:0 "YPF erweitern"
 ra_ram_ft_ecp_eypf_desc:0 "Yacimientos Petrolíferos Federales wurde 1922 als erstes vollständig staatliches Ölunternehmen der Welt gegründet und war damit ein Pionier auf diesem Gebiet. Mehr als ein Jahrzehnt später liegt noch ein weiter Weg zur Autarkie vor uns. Es gibt Pläne für ein neues Gebäude, in dem wir die Verwaltung des Unternehmens zentralisieren und einen möglichst reibungslosen Betrieb gewährleisten können."
 ra_ram_ft_ecp_eypf_tt:0 "\nSobald das neue YPF-Gebäude fertiggestellt ist, erhalten Sie Zugang zu jährlichen Events, bei denen Sie zwischen Boni für die Erhöhung der Raffinerie-Baugeschwindigkeit, lokalen Lieferungen oder lokalen Ressourcen wählen können."
 ra_ram_ft_ecp_ycf:0 "YCF"
 ra_ram_ft_ecp_ycf_desc:0 "Strom, Züge, Gießereien, Industrie – alles wird mit Kohle betrieben, die wir importieren. Angesichts der zunehmenden Spannungen in der Welt ist die Möglichkeit von Engpässen greifbar. Yacimientos Carboniferos Federales wird eine Abteilung innerhalb von YPF sein, die sich dem Abbau dieser wertvollen Ressource widmet."
 ra_ram_ft_ecp_fm:0 "Fabricaciones Militares"
 ra_ram_ft_ecp_fm_desc:0 "Coronel Manuel Savio, einer der besten Ingenieure unserer Armee, hat ein Projekt zum Ausbau unserer Schwerindustrie ins Leben gerufen. Fabricaciones Militares wird sich auf die Produktion von Ausrüstung für unsere Streitkräfte konzentrieren und gleichzeitig die Nachfrage nach chemischen Produkten im zivilen Sektor decken. Dies wird uns helfen, autarker zu werden und unseren Haushalt zu entlasten."
 ra_ram_ft_ecp_fm_tt:0 "Dieser Fokus ermöglicht es Ihnen, „Fabricaciones Militares“ als Ihren Materialdesigner auszuwählen." 
 ra_ram_ft_ecp_afne:0 "AFNE"
 ra_ram_ft_ecp_afne_desc:0 "„Astilleros y Fabricas Navales del Estado“ ist Argentiniens Lösung für den jahrzehntelangen Kauf unserer Schiffe von ausländischen Werften."
 ra_ram_ft_ecp_ahz:0 "Altos Hornos Zapla"
 ra_ram_ft_ecp_ahz_desc:0 "Wenn wir unseren Bergbau im Zapla-Wald weiter ausbauen wollen, benötigen wir Energie für den Betrieb aller Maschinen. Der Generalrat der Fabricaciones Militares ist bereit, das Projekt zu beaufsichtigen, das bereits jetzt in Scharen Arbeiter und Fachkräfte nach Jujuy lockt."
 ra_ram_ft_ecp_ahz_tt:0 "\nSobald die Gießerei gebaut ist, erhältst du 2 Infrastrukturen, 16 Stahl und 2 zusätzliche Gebäudeplätze in Tucumán sowie einen Bonus von 30 % auf die Industrieforschung. Du erhältst außerdem Zugang zu einem wiederholbaren Event, mit dem du die Produktion der Zapla-Mine steigern kannst."
 ra_ram_ft_ecp_somisa:0 "SOMISA"
 ra_ram_ft_ecp_somisa_desc:0 "Savio weiß: Je weiter wir unsere Schwerindustrie ausbauen, desto größer wird ihr Bedarf an Stahl. Die Gießerei und der Bergbaubetrieb von Zapla sind nun in Betrieb und können uns die notwendigen Rohstoffe für die Umsetzung des Nationalen Metallurgieplans liefern. SOMISA (Sociedad Mixta Siderurgica Argentina) wird unsere Stahlproduktion zentralisieren und zu neuen Höhen führen."
 ra_ram_ft_ecp_somisa_tt:0 "\nSobald das SOMISA-Werk fertiggestellt ist, erhalten Sie +45 Stahl und 4 zusätzliche Gebäudeplätze in Santa Fe sowie einen Forschungsbonus von 30 % für die Industrie."
 ra_ram_ft_ecp_psc:0 "Unternehmen des Privatsektors"
 ra_ram_ft_ecp_psc_desc:0 "Den privaten Sektor seinem Schicksal zu überlassen, wäre ein Fehler. Wir würden nicht nur industrielle Kapazitäten verlieren, sondern auch die Arbeitslosigkeit steigern. Wir müssen einen Weg finden, ihn wieder auf die Beine zu bringen."
 ra_ram_ft_ecp_ti:0 "Steueranreize"
 ra_ram_ft_ecp_ti_desc:0 "Der einfachste Weg, dem privaten Sektor zu helfen, besteht darin, seine Betriebskosten zu senken. Das wird uns zwar etwas kosten, aber wir werden langfristig davon profitieren."
 ra_ram_ft_ecp_ei:0 "Elektronikindustrie"
 ra_ram_ft_ecp_ei_desc:0 "Die Elektrotechnik ist eine neue Technologie, mit der unser Land wenig Erfahrung hat. Wenn wir mit diesem sich schnell entwickelnden neuen Wissenschaftszweig Schritt halten wollen, müssen wir dafür sorgen, dass sich Experten und Unternehmen mit Erfahrung in diesem Bereich in Argentinien willkommen fühlen."
 ra_ram_ft_ecp_ei_tt:0 "\nDieser Schwerpunkt ermöglicht Ihnen die Wahl von „Phillips“ oder „Siemens AG“ als Industrieunternehmen."
 ra_ram_ft_ecp_mi:0 "Fertigungsindustrie"
 ra_ram_ft_ecp_mi_desc:0 "SIAM begann mit der Herstellung von Brotknetmaschinen und ist weniger als drei Jahrzehnte später eines der größten Unternehmen des Landes. Wer weiß, was andere Unternehmen mit einem kleinen Anreiz erreichen könnten?"
 ra_ram_ft_ecp_mi_tt:0 "\nDieser Fokus ermöglicht es Ihnen, §YHispano Argentina§! und §YTAMET§! als Ihre Panzerhersteller auszuwählen."
 ra_ram_ft_ecp_ci:0 "Bauindustrie"
 ra_ram_ft_ecp_ci_desc:0 "Argentinien ist groß, und zwar überproportional groß im Vergleich zu seiner dünnen Bevölkerung. Von Landstraßen bis zu Autobahnen, von kleinen Häusern bis zu Wolkenkratzern – wir brauchen starke Bauunternehmen, um unsere Projekte voranzutreiben."
 ra_ram_ft_ecp_si:0 "Kunststoffindustrie"
 ra_ram_ft_ecp_si_desc:0 "Die Laborexperimente waren erfolgreich. Jetzt können wir das Gelernte in der Großproduktion anwenden und so eine völlig neue Art von Industrie entstehen lassen."
 ra_ram_ft_ecp_si_tt:0 "\nDas Ereignis „Rise of Synthetics“ ermöglicht es Ihnen, Ihre Gummiproduktion auf Kosten von Konsumgütern und Baugeschwindigkeit kontinuierlich zu steigern."
 ra_ram_ft_ecp_is:0 "Importsubstitution"
 ra_ram_ft_ecp_is_desc:0 "Da die Länder ihre eigene Wirtschaft immer stärker schützen und der Handel versiegt, wird es für uns immer schwieriger, bestimmte Industrieprodukte zu vernünftigen Preisen zu erwerben. Wir müssen eine Lösung finden, bevor das Problem zu einem lähmenden Problem wird."
 ra_ram_ft_ecp_sm:0 "Synthetische Materialien"
 ra_ram_ft_ecp_sm_desc:0 "Unsere Industrie kann für so ziemlich alles Ersatzstoffe herstellen, aber nur, wenn sie über die benötigten Materialien verfügt. Selbst in einem so großen Land wie unserem gibt es Dinge, die wir einfach nicht haben oder deren Nutzung wir uns nicht leisten können. Unsere Chemiker finden Wege, diese zu ersetzen."
 ra_ram_ft_ecp_clr:0 "Reformen des Gesellschaftsrechts"
 ra_ram_ft_ecp_clr_desc:0 "Wir haben uns einige Gesetzesänderungen ausgedacht, die die Vorsitzenden möglicherweise eher dazu veranlassen, mit den Arbeitnehmern über bessere Bedingungen zu verhandeln."
 ra_ram_ft_ecp_sp:0 "Optimierte Verfahren"
 ra_ram_ft_ecp_sp_desc:0 "Wenn wir mit unseren Reformen noch einen Schritt weiter gehen, können wir dafür sorgen, dass die Gründung und Führung eines Unternehmens in unserem Land viel einfacher wird, was den Unternehmen Zeit spart und Kosten senkt."
 ra_ram_ft_ecp_cs:0 "Unternehmensüberlegenheit"
 ra_ram_ft_ecp_cs_desc:0 "Indem wir den Konzernen Priorität einräumen, stellen wir sicher, dass mehr von ihnen unser Land als Geschäftsstandort wählen und unterstützen so unsere Industrialisierungsbemühungen."
 #
 ra_ram_ft_ecp_sw:0 "Sozialstaat"
 ra_ram_ft_ecp_sw_desc:0 "Die Bürger erwarten von uns, dass wir mehr Ressourcen für den Kampf für ihre Rechte und die Bereitstellung grundlegender Dienstleistungen einsetzen. Auch wenn sich dies nachteilig auf andere Bereiche der Regierung auswirken könnte, ist die Verbesserung der Lebensqualität unserer Bürger ein sicherer Weg, sie zufrieden zu stellen und unsere Popularität zu steigern."
 ra_ram_ft_ecp_sw_tt:0 "\nDie Angelegenheit vor den Kongress zu bringen, wird die Popularität der derzeitigen Regierungspartei steigern."
 ra_ram_ft_ecp_llr:0 "Arbeitsrechtsreformen"
 ra_ram_ft_ecp_llr_desc:0 "Es ist unmöglich, den Gewerkschaftsvertretern alle ihre Wünsche zu erfüllen, doch wir können einigen ihrer wichtigsten Forderungen unsere formelle Unterstützung zukommen lassen."
 ra_ram_ft_ecp_coop:0 "Genossenschaftswesen"
 ra_ram_ft_ecp_coop_desc:0 "Unter der Voraussetzung eines angemessenen Rechtsrahmens können die Arbeitnehmer in unserem Land dem Beispiel der Pioniere von Rochdale folgen und ihre eigenen Genossenschaften gründen, um mit den großen Konzernen zu konkurrieren."
 ra_ram_ft_ecp_wr:0 "Arbeitnehmerrechte"
 ra_ram_ft_ecp_wr_desc:0 "Viele Unternehmen finden Lücken in unserer Gesetzgebung und nutzen ihre Mitarbeiter aus. Um die Lebensqualität aller Arbeitnehmer im Land zu verbessern, werden wir ein neues Gesetz erarbeiten, das als Mindeststandard für alle Unternehmen dient."
 ra_ram_ft_ecp_ph:0 "Öffentliche Gesundheit"
 ra_ram_ft_ecp_ph_desc:0 "Die Gesundheitsversorgung kann besonders für Familien mit geringem Einkommen unerschwinglich teuer sein. Unsere Regierung kann die Verantwortung für den Bau und die Ausstattung öffentlicher Krankenhäuser übernehmen, in denen Menschen diagnostiziert und behandelt werden können."
 ra_ram_ft_ecp_c:0 "Abdeckung"
 ra_ram_ft_ecp_c_desc:0 "Krankenhäuser sind nur Gebäude. Wir könnten Hunderte davon bauen, doch ohne die nötige Ausrüstung und das nötige Fachpersonal wären sie wenig nutzlos. Der nächste Schritt in unserem öffentlichen Gesundheitssystem ist die Entscheidung über die Höhe des Budgets, das wir dafür bereitstellen."
 ra_ram_ft_ecp_c_tt:0 "\nBei der Veranstaltung können Sie auswählen, welchen Prozentsatz der Konsumgüterfabriken Sie in Ihr öffentliches Gesundheitssystem investieren möchten."
 ra_ram_ft_ecp_vc:0 "Impfkampagne"
 ra_ram_ft_ecp_vc_desc:0 "Da wir nun über die Rahmenbedingungen für unser öffentliches Gesundheitssystem verfügen, können wir diese nutzen, um sicherzustellen, dass unsere Bevölkerung gegen die gefährlichsten Keime geimpft ist, die es gibt."
 ra_ram_ft_ecp_vc_tt:0 "Die Kampagne wird Ihre monatliche Bevölkerung um §G+10,0 %§ erhöhen!"
 ra_ram_ft_ecp_hp:0 "Wohnprojekte"
 ra_ram_ft_ecp_hp_desc:0 "Unser Land hat in den letzten Jahrzehnten ein beispielloses Wachstum erlebt. Damit einher geht eine höhere Nachfrage nach Wohnraum für diese neuen Familien. Um unsere Städte organisiert zu halten, bedarf es einer guten Planung."
 ra_ram_ft_ecp_cr:0 "Verfassungsmäßiges Recht"
 ra_ram_ft_ecp_cr_desc:0 "Wir werden alle notwendigen gesetzlichen und administrativen Maßnahmen ergreifen, um unseren Bürgern den Zugang zu bezahlbarem, bewohnbarem und sicherem Wohnraum zu gewährleisten."
#
#
#
 ra_ram_ft_pw:0 "Öffentliche Arbeiten"
 ra_ram_ft_pw_desc:0 "Aufgrund der Größe Argentiniens sind öffentliche Bauvorhaben kostspielig und zeitaufwändig. Zwar laufen in mehreren Gebieten bereits entsprechende Kampagnen, doch deren Umfang ist begrenzt. Wir werden diese Pläne mit mehr Ressourcen ausstatten und auf das ganze Land ausweiten."
 ra_ram_ft_pw_tt:0 "\nDieser Fokus wird es Ihnen ermöglichen, §YManuel Ramon Alvarado§! als politischen Berater zu ernennen."
 #
 ra_ram_ft_pw_nbor:0 "Nationales Straßenamt"
 ra_ram_ft_pw_nbor_desc:0 "Der Vorstand wurde 1932 gegründet und wird seitdem von Justiniano Allende Posse geleitet. Er hat sich als fähiger Mann erwiesen. Wenn jemand weiß, wie wir unsere Infrastrukturbemühungen vorantreiben können, dann ist er es."
 ra_ram_ft_pw_r123:0 "Regionen I, II und III"
 ra_ram_ft_pw_r123_desc:0 "Diese Phase des Plans wird die nördlichen Regionen unseres Landes abdecken, von denen die meisten in der Vergangenheit vernachlässigt wurden."
 ra_ram_ft_pw_r123_tt:0 "\nSobald die Bauarbeiten abgeschlossen sind, erhalten Sie zwei Infrastrukturen in Jujuy, Salta, Tucuman, Catamarca, La Rioja, Formosa, Chaco, Santiago del Estero, Misiones, Corrientes und Entre Rios."
 ra_ram_ft_pw_r456:0 "Regionen IV, V und VI"
 ra_ram_ft_pw_r456_desc:0 "Diese Phase des Plans wird sich auf die zentralen Regionen unseres Landes erstrecken. Diese haben in den letzten Jahren zwar die größte Entwicklung erlebt, doch aufgrund der zunehmenden Industrietätigkeit sind die Straßen durch den neuen Verkehr überfüllt."
 ra_ram_ft_pw_r456_tt:0 "\nSobald der Bau abgeschlossen ist, erhalten Sie zwei Infrastrukturen in San Juan, San Luis, Mendoza, La Pampa, Cordoba, Santa Fe und Buenos Aires."
 ra_ram_ft_pw_r78:0 "Regionen VII und VIII"
 ra_ram_ft_pw_r78_desc:0 "Diese Phase des Plans wird die südlichen Regionen unseres Landes abdecken. Patagonien hat sich als reich an Ressourcen erwiesen, viele Gebiete sind jedoch praktisch unzugänglich. Neue Straßen und Häfen werden dieses Problem lösen."
 ra_ram_ft_pw_r78_tt:0 "\nSobald der Bau abgeschlossen ist, erhalten Sie zwei Infrastrukturen in Neuquén, Rio Negro, Chubut und Tierra del Fuego sowie zwei Infrastrukturen und zwei Häfen in Santa Cruz."
 #
 ra_ram_ft_pw_emo:0 "Ausbau des Bergbaubetriebs"
 ra_ram_ft_pw_emo_desc:0 "Im ganzen Land haben Goldsucher wertvolle Ressourcen gefunden, die uns jedoch nichts nützen, solange sie unter der Erde bleiben. Es gibt auch Bergbaubetriebe, die wir ausbauen könnten, um ihre Ausbeute zu steigern."
 ra_ram_ft_pw_emo_cr:0 "Comodoro Rivadavia"
 ra_ram_ft_pw_emo_cr_desc:0 "Die schwarze Perle des Südens. Comodoro Rivadavia ist zu unserer größten Erdölquelle geworden. Neue Ölquellen für unsere Raffinerien bringen uns der Autarkie näher."
 ra_ram_ft_pw_emo_cr_tt:0 "\nSobald der Bau abgeschlossen ist, erhältst du 4 Öl in Chubut. Dieses Ereignis ist wiederholbar."
 ra_ram_ft_pw_emo_sc:0 "San Carlos"
 ra_ram_ft_pw_emo_sc_desc:0 "Die Gegend um San Carlos ist reich an vielen Mineralien. Dort wurden Silber, Blei und Gold sowie geringe Mengen Chrom gefunden. Bis wir eine bessere Quelle finden, könnte sich der Abbau zwar lohnen, aber die Kosten könnten sich lohnen."
 ra_ram_ft_pw_emo_sc_tt:0 "\nSobald der Bau abgeschlossen ist, erhältst du 4 Chrom in Cordoba. Dieses Ereignis ist wiederholbar."
 ra_ram_ft_pw_emo_rt:0 "Rio Turbio"
 ra_ram_ft_pw_emo_rt_desc:0 "Rio Turbio verfügt über riesige Kohlevorkommen, deren Abbau und Transport aufgrund seiner Lage jedoch schwierig sind. Die Abbaustätten sind nur ein Teil des Projekts. Wir müssen außerdem Eisenbahnlinien und Häfen bauen, um den Transport und die Verschiffung zu den Industriezentren im ganzen Land zu erleichtern."
 ra_ram_ft_pw_emo_rt_tt:0 "\nSobald der Bau abgeschlossen ist, erhalten Sie einen Bonus von 5 % auf die Fabrikleistung. Dieses Ereignis ist wiederholbar, bis zu einem Gesamtbonus von 15 %."
 ra_ram_ft_pw_emo_ca:0 "Cerro Aspero"
 ra_ram_ft_pw_emo_ca_desc:0 "Die Minen von Cerro Aspero sind seit über vierzig Jahren in Betrieb und unsere wichtigste Wolframquelle. Dieses Metall wird eine Schlüsselrolle bei der Entwicklung unserer Rüstungsindustrie spielen. Mit entsprechender Finanzierung könnten wir die Produktion deutlich steigern."
 ra_ram_ft_pw_emo_ca_tt:0 "\nSobald der Bau abgeschlossen ist, erhältst du 4 Wolfram in San Luis. Dieses Ereignis ist wiederholbar."
 ra_ram_ft_pw_emo_lb:0 "Los Berros"
 ra_ram_ft_pw_emo_lb_desc:0 "Die Gegend um Los Berros in der Provinz San Juan ist reich an Kalksteinvorkommen und anderen Baumaterialien. Diese sind zwar als Handelsgüter nicht besonders wertvoll, würden uns aber beim schnellen Ausbau unserer Industrie und Infrastruktur unterstützen."
 ra_ram_ft_pw_emo_lb_tt:0 "\nSobald der Bau abgeschlossen ist, erhalten Sie einen Bonus von 10 % auf die Baugeschwindigkeit."
 ra_ram_ft_pw_emo_zf:0 "Zapla-Wald"
 ra_ram_ft_pw_emo_zf_desc:0 "Bodenproben aus dem Zapla-Wald, die ein gewisser Wenceslao Gallardo nach Buenos Aires schickte, wiesen Spuren von Hämatit auf. Die geringe Konzentration des Metalls und die Kosten für ein Bergbauprojekt in Jujuy könnten das Vorhaben riskant machen, doch unser Land hungert nach Stahl, und diese Mine wird dazu beitragen, unsere metallurgische Industrie in Schwung zu bringen."
 ra_ram_ft_pw_emo_zf_tt:0 "\nSobald die Prospektion abgeschlossen ist, erhältst du 4 Eisen in Jujuy. Dieses Ereignis schaltet nach Abschluss Altos Hornos Zapla frei."
 #
 ra_ram_ft_pw_iz:0 "Industriegebiet"
 ra_ram_ft_pw_iz_desc:0 "Wir können die Ansiedlung von Industriebetrieben erleichtern, indem wir geeignete Gebiete mit gutem Straßen- und Dienstleistungszugang bereitstellen."
 ra_ram_ft_pw_iz_ba:0 "Buenos Aires"
 ra_ram_ft_pw_iz_ba_desc:0 "Buenos Aires ist die am weitesten entwickelte Region unseres Landes und aufgrund des Zugangs zu Häfen und qualifizierten Arbeitskräften in der Regel die erste Wahl für die Ansiedlung neuer Unternehmen. Da die Region jedoch flächenmäßig größer ist als viele europäische Länder, besteht immer noch Raum für Wachstum."
 ra_ram_ft_pw_iz_ba_tt:0 "\nSobald der Bau abgeschlossen ist, erhalten Sie 2 zivile Fabriken und 4 zusätzliche Gebäudeplätze in Buenos Aires."
 ra_ram_ft_pw_iz_sf:0 "Santa Fe"
 ra_ram_ft_pw_iz_sf_desc:0 "Santa Fe ist die Region mit der zweitgrößten Bevölkerungsdichte des Landes und beherbergt große Ballungszentren wie Rosario und die Stadt Santa Fe selbst. Der Bevölkerungsboom verschafft den sich hier ansiedelnden Industrien einen einfachen Zugang zu billigen Arbeitskräften. "
 ra_ram_ft_pw_iz_sf_tt:0 "\nSobald der Bau abgeschlossen ist, erhalten Sie 2 zivile Fabriken und 4 zusätzliche Gebäudeplätze in Santa Fe."
 ra_ram_ft_pw_iz_c:0 "Córdoba"
 ra_ram_ft_pw_iz_c_desc:0 "Córdoba ist Sitz der FMA und vieler anderer Industrien. Obwohl es nicht so entwickelt ist wie Buenos Aires, ist es aufgrund seiner Nähe zur Hauptstadt und mehrerer Bergbaubetriebe ein idealer Standort für die Ansiedlung neuer Unternehmen."
 ra_ram_ft_pw_iz_c_tt:0 "\nSobald der Bau abgeschlossen ist, erhalten Sie 2 zivile Fabriken und 4 zusätzliche Gebäudeplätze in Cordoba."
 ra_ram_ft_pw_iz_m:0 "Mendoza"
 ra_ram_ft_pw_iz_m_desc:0 "Mendoza ist das Tor unseres Landes zu Chile und zum Handelszentrum. Seine Lage ist nicht nur entscheidend für die Kontrolle über die Andenregion, sondern auch über die enormen Ressourcen in dieser Region."
 ra_ram_ft_pw_iz_m_tt:0 "\nSobald der Bau abgeschlossen ist, erhalten Sie 2 zivile Fabriken und 4 zusätzliche Gebäudeplätze in Mendoza."
 ra_ram_ft_pw_iz_an:0 "Argentinischer Norden"
 ra_ram_ft_pw_iz_an_desc:0 "Die Ressourcen der argentinischen Nordprovinzen sind unerschlossen, wild, dünn besiedelt und aufgrund ihrer einheimischen Fauna oft geradezu gefährlich. Abgesehen von der Abholzung blieben sie weitgehend ungenutzt. Es ist Zeit, dass sich das ändert."
 ra_ram_ft_pw_iz_an_tt:0 "\nSobald der Bau abgeschlossen ist, erhalten Sie 1 zivile Fabrik und 2 zusätzliche Gebäudeplätze in Chaco und Salta sowie 1 zusätzlichen Gebäudeplatz in Misiones, Jujuy und Formosa."
 ra_ram_ft_pw_iz_as:0 "Argentinischer Süden"
 ra_ram_ft_pw_iz_as_desc:0 "Patagonien ist dünn besiedelt, aber reich an ungenutzten Ressourcen. Städte wie Comodoro Rivadavia und Rio Gallegos haben sich dank dieser Entwicklung von Dörfern zu Kleinstädten entwickelt. Hinzu kommt der Grenzstreit mit Chile in der Region. Je deutlicher unser Einfluss in der Region spürbar ist, desto besser."
 ra_ram_ft_pw_iz_as_tt:0 "\nSobald der Bau abgeschlossen ist, erhalten Sie 1 zivile Fabrik und 2 zusätzliche Gebäudeplätze in Rio Negro und Chubut sowie 1 zusätzlichen Gebäudeplatz in Neuquen, Santa Cruz und Tierra del Fuego."
 #
 ra_ram_ft_pw_mp:0 "Militärische Projekte"
 ra_ram_ft_pw_mp_desc:0 "Angehörige der Streitkräfte haben sich mit Projekten zu unserer Militärindustrie und unseren Militäranlagen an uns gewandt. Obwohl dies ursprünglich nicht zu unseren Zielen gehörte, könnten wir unser Budget erweitern, um sie einzubeziehen."
 ra_ram_ft_pw_mp_rsd:0 "Werften von Rio Santiago"
 ra_ram_ft_pw_mp_rsd_desc:0 "Wir können uns bei der Versorgung unserer Marine nicht länger auf andere Länder verlassen. Das ist teuer und gefährlich, da es uns von ihnen abhängig macht. Rio Santiago ist der ideale Standort für eine Werft und der erste Schritt hin zu unserer Schiffsbauindustrie."
 ra_ram_ft_pw_mp_rsd_tt:0 "\nSobald der Bau abgeschlossen ist, erhalten Sie 3 Werften in Buenos Aires."
 ra_ram_ft_pw_mp_pbnb:0 "Marinestützpunkt Puerto Belgrano"
 ra_ram_ft_pw_mp_pbnb_desc:0 "Puerto Belgrano verfügt über die perfekten natürlichen Voraussetzungen für einen Marinestützpunkt. Darüber hinaus könnten Trockendocks und Werften mit geringem Aufwand problemlos zu den bereits vorhandenen Anlagen hinzugefügt werden."
 ra_ram_ft_pw_mp_pbnb_tt:0 "\nSobald der Bau abgeschlossen ist, erhalten Sie 1 Werft, 3 Marinestützpunkte und 1 Flugplatz in Buenos Aires."
 ra_ram_ft_pw_mp_ai:0 "Aerotechnisches Institut"
 ra_ram_ft_pw_mp_ai_desc:0 "Obwohl unser Land nur über begrenzte Produktionskapazitäten verfügt, konnten wir innerhalb weniger Jahre vom Bau lizenzierter Modelle zur Herstellung eigener Entwürfe übergehen. Mit entsprechender Finanzierung könnten wir unsere Flugzeugfabriken renovieren und die Produktion steigern."
 ra_ram_ft_pw_mp_ai_tt:0 "\nSobald der Bau abgeschlossen ist, erhalten Sie 1 Militärfabrik und 3 Flugplätze in Cordoba."
 ra_ram_ft_pw_mp_pmc:0 "Palomar Military College"
 ra_ram_ft_pw_mp_pmc_desc:0 "Ein weiteres Projekt von Präsident Justo. Der Bau des Palomar Military College dauert seit über drei Jahrzehnten und musste aufgrund der instabilen politischen und wirtschaftlichen Lage des Landes viele Rückschläge hinnehmen. Mit dem entsprechenden Budget könnten wir den Bau in kurzer Zeit abschließen."
 ra_ram_ft_pw_mp_pmc_tt:0 "\nSobald der Bau abgeschlossen ist, erhalten Sie Zugang zum Nationalgeist der §YPalomar Military College§!, der Folgendes gewährt:\n\nAusbildungszeit: §G-5 %§!\nDivisionserfahrungsgewinn: §G+15 %§!\nTäglicher Armeeerfahrungsgewinn: §G+0,05§!\nRekrutierbare Bevölkerung: §Y+1,50 %§!"
 ra_ram_ft_pw_mp_vmmc:0 "Militärkomplex Villa Maria"
 ra_ram_ft_pw_mp_vmmc_desc:0 "Coronel Savio hat vorgeschlagen, Fabricaciones Militares durch den Bau eines neuen Militärkomplexes in Villa Maria zu erweitern. In diesen neuen Fabriken sollen Schießpulver und Sprengstoffe hergestellt werden."
 ra_ram_ft_pw_mp_vmmc_tt:0 "\nSobald der Bau abgeschlossen ist, erhalten Sie zwei Militärfabriken in Cordoba."
 ra_ram_ft_pw_mp_rtmc:0 "Militärkomplex Rio Tercero"
 ra_ram_ft_pw_mp_rtmc_desc:0 "Coronel Savio hat vorgeschlagen, Fabricaciones Militares durch den Bau eines neuen Militärkomplexes am Rio Tercero zu erweitern. In diesen neuen Fabriken sollen Chemikalien und Metall verarbeitet werden."
 ra_ram_ft_pw_mp_rtmc_tt:0 "\nSobald der Bau abgeschlossen ist, erhalten Sie zwei Militärfabriken in Cordoba."
 ra_ram_ft_pw_mp_amc:0 "Militärkomplex Azul"
 ra_ram_ft_pw_mp_amc_desc:0 "Die Stadt Azul wurde als Standort für neue Fabriken zur Herstellung von Marinewaffen ausgewählt. Sie werden unsere Flotten mit modernen Waffen und Munition versorgen."
 ra_ram_ft_pw_mp_amc_tt:0 "\nSobald der Bau abgeschlossen ist, erhalten Sie zwei Militärfabriken in Buenos Aires."
 ra_ram_ft_pw_mp_flbmc:0 "Militärkomplex Fray Luis Beltran"
 ra_ram_ft_pw_mp_flbmc_desc:0 "Die Stadt Fray Luis Beltran ist seit 1917 Sitz des San Lorenzo Arsenals, seine Militärgeschichte reicht jedoch noch einige Jahre weiter zurück, nämlich bis zur Gründung des Arsenal Regional Litoral im Jahr 1898. Das Arsenal verfügt über kleine Werkstätten zur Herstellung von Munition für Kleinwaffen, doch Pläne zur Ausweitung seiner Aktivitäten liegen bereits seit 1933 vor."
 ra_ram_ft_pw_mp_flbmc_tt:0 "\nSobald der Bau abgeschlossen ist, erhalten Sie zwei Militärfabriken in Santa Fe."
#
#
#
 ra_ram_ft_ahq:0 "Oberkommando der Armee"
 ra_ram_ft_ahq_desc:0 "Die argentinische Armee erlebt turbulente Zeiten. Eine Reihe von Militärputschen in den letzten Jahren hat ihre Popularität untergraben, und einige Mitglieder des Generalstabs zeigten eine gefährliche Bewunderung für die in Europa aufkeimenden faschistischen Ideale. Wir können das nicht zulassen, wenn unsere Streitkräfte einsatzbereit sein sollen, wenn wir sie brauchen."
#
 ra_ram_ft_ahq_radd:0 "Forschungs- und Entwicklungsabteilung"
 ra_ram_ft_ahq_radd_desc:0 "Eine Armee besteht nicht nur aus Soldaten und Offizieren, sondern auch aus Wissenschaftlern und Ingenieuren, die dafür sorgen, dass die Armee über die richtigen Werkzeuge verfügt, um dem Feind entgegenzutreten."
 ra_ram_ft_ahq_mi:0 "Materielle Innovationen"
 ra_ram_ft_ahq_mi_desc:0 "Kriege mögen sich nie ändern, die darin eingesetzten Waffen jedoch schon. Jeder Konflikt bringt neue Waffen auf das Schlachtfeld. Wer sich nicht anpasst, zahlt den Preis für seine Nachlässigkeit."
 ra_ram_ft_ahq_otp:0 "Offiziersausbildungsprogramm"
 ra_ram_ft_ahq_otp_desc:0 "Das Palomar Military College bietet uns die perfekten Einrichtungen für die Ausbildung einer neuen Generation von Offizieren. Offiziere, die wissen, wie sie das Beste aus unseren Männern und unserer Ausrüstung herausholen."
 ra_ram_ft_ahq_tgw:0 "Der Große Krieg"
 ra_ram_ft_ahq_tgw_desc:0 "Der Krieg, der alle Kriege beenden sollte, war vielleicht der verheerendste Konflikt der Menschheitsgeschichte und kostete innerhalb von nur vier Jahren über siebzehn Millionen Menschen das Leben. Er definierte den Kampf, wie wir ihn kennen, neu, vor allem aber zeigte er uns, wie töricht es ist, an alten Überzeugungen und Taktiken festzuhalten."
 ra_ram_ft_ahq_tcbw:0 "Der Chaco Boreal-Krieg"
 ra_ram_ft_ahq_tcbw_desc:0 "Wir haben zwar nicht am Chaco-Krieg teilgenommen, aber wir waren nah genug dran, um daraus zu lernen. Drei Jahre, vier Generäle und über sechzigtausend verlorene Männer – Bolivien hat uns gezeigt, dass Kriege nicht durch Zahlen gewonnen werden. Vorbereitung, Training und Mobilität sind die neuen Schlüssel zum Sieg auf dem Schlachtfeld."
 ra_ram_ft_ahq_tscw:0 "Der Spanische Bürgerkrieg"
 ra_ram_ft_ahq_tscw_desc:0 "Ein Bürgerkrieg ist eines der schlimmsten Dinge, die einem Land passieren können. Umso mehr, wenn fremde Mächte die Gelegenheit nutzen, ihre eigenen Ziele auf Kosten von Zivilisten durchzusetzen. Der Spanische Krieg war zwar tragisch, zeigte aber auch die Vorteile von Luftunterstützung und Seeblockaden."
 ra_ram_ft_ahq_tbk:0 "Der Blitzkrieg"
 ra_ram_ft_ahq_tbk_desc:0 "Im diametralen Gegensatz zu den Doktrinen des Ersten Weltkriegs zielt der Blitzkrieg darauf ab, den Feind durch Geschwindigkeit und Einkreisungsmanöver zu überwältigen und gleichzeitig stark auf Luftunterstützung zu setzen, um die feindliche Verteidigung zu schwächen. Der Einsatz von Funkgeräten zur Koordination aller Streitkräfte ist für den Erfolg entscheidend."
 ra_ram_ft_ahq_mw:0 "Moderne Kriegsführung"
 ra_ram_ft_ahq_mw_desc:0 "Krieg ist heute ein raffinierter Prozess, der nicht nur Aktionen auf dem Schlachtfeld, sondern auch politische und industrielle Anstrengungen, Spezialkräfte, verdeckte Operationen und kombinierte Waffendivisionen umfasst, die die Sesselgeneräle der Vergangenheit beleidigen würden."
 ra_ram_ft_ahq_as:0 "Artillerieunterstützung"
 ra_ram_ft_ahq_as_desc:0 "Artillerie war die tödlichste Waffe des Ersten Weltkriegs und ihr Einsatz sowohl zur Verteidigung als auch zum Angriff machte sie für Armeen weltweit unverzichtbar. Verbesserungen bei Reichweite und Nutzlast gehören zu unseren ersten Ideen."
 ra_ram_ft_ahq_mamg:0 "Mörser und Maschinengewehre"
 ra_ram_ft_ahq_mamg_desc:0 "Mörser mögen zwar protzig sein, aber jeder Soldat mit etwas Erfahrung weiß, wie wertvoll es ist, Feuerunterstützung im Rucksack mitführen zu können. Maschinengewehre verleihen einem Soldatenpaar die Feuerkraft eines Zuges. Wir haben bereits einige Ideen, wie sich die Zuverlässigkeit im Feld und die Tragbarkeit verbessern lassen."
 ra_ram_ft_ahq_im:0 "Infanteriemotorisierung"
 ra_ram_ft_ahq_im_desc:0 "Unsere Männer auf einen LKW zu setzen, damit sie schneller vorankommen, ist keine wirkliche Innovation. Wir sollten uns vielmehr darauf konzentrieren, dass ihre LKWs nicht auf dem ersten Erdhügel stecken bleiben oder vor Erreichen ihres Ziels eine Panne haben."
 ra_ram_ft_ahq_sal:0 "Versorgung &amp; Logistik"
 ra_ram_ft_ahq_sal_desc:0 "Je mehr Männer und Ausrüstung wir ins Feld schicken, desto mehr müssen wir uns um deren Versorgung kümmern. Nahrung, Munition, Treibstoff, Ersatzteile – alles, was unsere Truppen benötigen, um ihre Leistungsfähigkeit zu gewährleisten. Wir werden an einem Gesamtsystem arbeiten, das sicherstellt, dass unsere Truppen alles bekommen, was sie brauchen, wann und wo sie es brauchen."
 ra_ram_ft_ahq_cas:0 "Luftnahunterstützung"
 ra_ram_ft_ahq_cas_desc:0 "Obwohl es sich nicht um ein völlig neues Konzept handelt, haben bessere Konstruktionen und Waffen gezeigt, dass die Luftunterstützung für Bodentruppen ein entscheidender Faktor sein kann, insbesondere wenn der Feind keine Möglichkeit hat, dagegen vorzugehen. Unsere Ingenieure sind begierig darauf, ihre Ideen auszuprobieren, sobald sie neue Testpiloten gefunden haben."
 ra_ram_ft_ahq_ars:0 "Gepanzerte Unterstützung"
 ra_ram_ft_ahq_ars_desc:0 "Unser Panzerkonzept hat sich im letzten Jahrzehnt stark verändert. Neuere Modelle sind keine langsamen, schwerfälligen Ungetüme mit mehreren Kanonen, sondern wendige, bewegliche Festungen, die feindliche Stellungen überwältigen und an ihnen vorbeiziehen können, bevor sie reagieren können."
 ra_ram_ft_ahq_bfc:0 "Schlachtfeldkommunikation"
 ra_ram_ft_ahq_bfc_desc:0 "Der alte Schlachtfeldtelegraf gehört der Vergangenheit an. Mit dem neuen Fokus auf Mobilität steigt auch der Koordinationsbedarf zwischen den Streitkräften. Hier kommt der Funk ins Spiel. Präzise Artillerieschläge, Luftunterstützung im wahrsten Sinne des Wortes „on the fly“, die Koordination von Panzerkolonnen auf einem tobenden Schlachtfeld – der Funk ermöglicht es uns, das Beste aus unseren Streitkräften herauszuholen und ihnen zu helfen, die Initiative zu behalten."
 ra_ram_ft_ahq_am:0 "Armeemechanisierung"
 ra_ram_ft_ahq_am_desc:0 "Die Mechanisierung geht über die einfache Motorisierung hinaus und verbessert die Überlebenschancen unserer Männer im Einsatz. Sie ersetzt Lastwagen durch leicht gepanzerte Fahrzeuge, die sie schützen und ihnen begrenzte Feuerunterstützung bieten können, ohne dass ihre Einsatzgeschwindigkeit dadurch wesentlich beeinträchtigt wird."
 ra_ram_ft_ahq_md:0 "Moderne Designs"
 ra_ram_ft_ahq_md_desc:0 "Es ist möglich, dass jede Generation darüber wundert, was sie in ihrer Zeit erreicht hat, aber es ist schwer, etwas zu finden, das mit den Fortschritten vergleichbar wäre, die wir in nur wenigen Jahren erlebt haben. Es ist eine Schande, dass die meisten von ihnen bessere Möglichkeiten hatten, sich gegenseitig umzubringen."
 ra_ram_ft_ahq_nge:0 "Ausrüstung der nächsten Generation"
 ra_ram_ft_ahq_nge_desc:0 "Geräte, die feindliche Flugzeuge Hunderte von Kilometern vor ihrem Eintreffen in unseren Himmel erkennen können. Flugzeuge, die so hoch fliegen, dass keine Flugabwehrkanone sie erreichen kann, oder so schnell, dass kein konventionelles Flugzeug sie einholen kann. Brillen, mit denen man im Dunkeln sehen kann. Raketentechnik. Kernspaltung. Es ist schwer, nicht von den Fähigkeiten des Menschen beeindruckt zu sein. Ehrfurcht ... und Angst."
 #
 ra_ram_ft_ahq_ae:0 "Armeeethos"
 ra_ram_ft_ahq_ae_desc:0 "Es wurden Fragen zum wahren Zweck unserer Streitkräfte aufgeworfen. Während manche sie als bloße Handlanger der Politiker betrachten, glauben andere, sie seien ein Schutz vor Despoten und Anarchisten. Es ist höchste Zeit, den Generalstab einzuberufen und die Angelegenheit endgültig zu klären."
 ra_ram_ft_ahq_nd:0 "Nationale Verteidigung"
 ra_ram_ft_ahq_nd_desc:0 "Argentinien hat und will keine Feinde. Unsere Armee dient der Abschreckung und sorgt dafür, dass mögliche Angreifer es sich zweimal überlegen, bevor sie versuchen, uns unter Druck zu setzen."
 ra_ram_ft_ahq_ip:0 "Ideologische Vorbilder"
 ra_ram_ft_ahq_ip_desc:0 "Unsere Armee repräsentiert das Beste, was unser Land zu bieten hat. Hingabe, Ehre, Loyalität – alles Eigenschaften, nach denen unsere Bürger streben sollten."
 ra_ram_ft_ahq_pa:0 "Politische Enthaltung"
 ra_ram_ft_ahq_pa_desc:0 "Wenn wir den Respekt anderer Länder wollen, dürfen wir nicht zulassen, dass sich die Armee weiterhin in unsere Innenpolitik einmischt. Um dies zu verhindern, müssen alle Maßnahmen ergriffen werden, auch die Ablösung des Generalstabs, sollte dieser Widerstand leisten."
 ra_ram_ft_ahq_pi:0 "Politische Einmischung"
 ra_ram_ft_ahq_pi_desc:0 "Die Regierung darf nicht den Launen von Politikern unterworfen sein, die alle paar Jahre kommen und gehen und immer das, was der letzte Amtsinhaber getan hat, über Bord werfen und neu anfangen wollen. Unsere Armee wird als Zentrum des Landes fungieren und dafür sorgen, dass wir nicht von unserem vorherbestimmten Weg abkommen."
 ra_ram_ft_ahq_ms:0 "Leitbild"
 ra_ram_ft_ahq_ms_desc:0 "Der Generalstab hat sich darauf geeinigt, zur Stärkung des Vertrauens in die Streitkräfte und des Interesses an ihnen ein neues Leitbild zu entwerfen und es der Nation im Rahmen einer großen Parade mit den besten Kräften unseres Militärs vorzustellen."
 ra_ram_ft_ahq_ms_tt:0 "\nDas Event verschafft Ihnen Zugang zum Nationalgeist „Neue argentinische Armee“, der Folgendes gewährt: \n\nNationale Einheit: §G+5,00 %§!\nRekrutierbare Bevölkerung: §Y+5 %§!\nAusbildungszeit: §R+10 %§!\nKapazitätsmultiplikator der Spezialeinheiten: §G+10 %§!"
 ra_ram_ft_ahq_wi:0 "Berechtigte Interventionen"
 ra_ram_ft_ahq_wi_desc:0 "Wie können wir tatenlos zusehen, wie unsere Nachbarn von fehlgeleiteten Idealen oder imperialistischen Einflüssen korrumpiert werden? Wir tragen nicht nur Verantwortung für unser Land, sondern auch für unsere Denkweise. Gleichgültig zu bleiben, während wir von Feinden umzingelt sind, ist unklug und unansehnlich. Unsere Armee steht bereit, unsere Werte zu verteidigen – im In- und Ausland."
 ra_ram_ft_ahq_fa:0 "Festung Argentinien"
 ra_ram_ft_ahq_fa_desc:0 "Die Anden und der Atlantik bieten beeindruckende Verteidigungsanlagen, doch wir können uns nicht allein auf die Natur verlassen, um uns zu schützen. Unser Land ist jedoch zu groß für etwas wie die französische Maginot-Linie. Wir müssen uns daher auf den Schutz wichtiger Standorte konzentrieren und unsere Truppen ständig trainieren, damit sie das Beste aus ihnen herausholen können."
#
#
#
 ra_ram_ft_nhq:0 "Oberkommando der Marine"
 ra_ram_ft_nhq_desc:0 "1872 verabschiedete Präsident Sarmiento das Gesetz zur Beschaffung von Marineausrüstung, um unsere Marine zu stärken. Obwohl Sarmientos Flotte zur Jahrhundertwende veraltet war, wurden neue Einheiten angeschafft, um sicherzustellen, dass wir eine Großmacht im Südatlantik bleiben. Da der Großteil unseres Handels von Seewegen abhängt und viele unserer Großstädte an der Atlantikküste liegen, ist eine starke Marine überlebenswichtig."
#
 ra_ram_ft_nhq_nms:0 "Marine-Militärschule"
 ra_ram_ft_nhq_nms_desc:0 "Präsident Alvear gründete die Hochschule 1924 und eröffnete 1928 den zentralen Komplex. Jedes Jahr melden sich Zehntausende von Bewerbern an. Um die Exzellenz dieser Hochschule zu erhalten, müssen wir ihre Einrichtungen und Studiengänge erweitern."
 ra_ram_ft_nhq_nms_tt:0 "\nSobald der Bau abgeschlossen ist, erhalten Sie Zugang zur §YNaval Military School§! Nationalgeist, der Folgendes gewährt:\n\nAusbildungszeit: §G-5,00 %§!\nSchiffserfahrungsgewinn: §G+15 %§!\nTäglicher Marineerfahrungsgewinn §G+0,05§!\nRekrutierbare Bevölkerung: §Y+1,00 %§!"
 ra_ram_ft_nhq_nes:0 "Schiffsbauschule"
 ra_ram_ft_nhq_nes_desc:0 "Da wir nun über eigene Werften verfügen, müssen wir die Männer rekrutieren und ausbilden, die die Schiffe unseres Landes entwerfen und bauen. Wir sind bei der Versorgung unserer Flotten nicht länger ausschließlich auf ausländische Mächte angewiesen. Vielleicht kaufen sie mit der Zeit stattdessen bei uns."
 ra_ram_ft_nhq_ncc:0 "Marinekommandokorps"
 ra_ram_ft_nhq_ncc_desc:0 "Die Seekriegsführung verändert sich, und das gilt auch für unsere Offiziere. Dieses neue Gebäude dient der Ausbildung einer neuen Generation, die das Beste aus unseren Marinen herausholen kann."
 ra_ram_ft_nhq_nac:0 "Marinefliegerkorps"
 ra_ram_ft_nhq_nac_desc:0 "Flugzeuge haben in allen Zweigen unserer Streitkräfte an Bedeutung gewonnen, doch vielleicht sind sie auf See die erfolgreichsten. Argentiniens Marine ist ein Spätzünder, und es wird uns schwerfallen, mit einigen der besser ausgerüsteten Länder der Welt mitzuhalten. Wenn jedoch ein 50.000-Dollar-Flugzeug mit einem Torpedo ein 100-Millionen-Dollar-Schiff versenken kann, brauchen wir das vielleicht nicht."
 ra_ram_ft_nhq_mc:0 "Marines Corp"
 ra_ram_ft_nhq_mc_desc:0 "Die argentinischen Marinesoldaten haben ihre Wurzeln in der ehemaligen spanischen Marine. Obwohl sie in unserer Geschichte nicht viele Gelegenheiten hatten, zu glänzen, zeigte uns Captain Bouchard den Wert von Landungstruppen, insbesondere wenn sie geschickt eingesetzt werden."
 ra_ram_ft_nhq_dd:0 "Zerstörer-Designs"
 ra_ram_ft_nhq_dd_desc:0 "Unsere Ingenieure haben viel von den Zerstörern der Catamarca-Klasse gelernt, die wir von den Engländern gekauft haben, aber die wahre Inspiration für sie waren die Cervantes-Einheiten, die wir von den Spaniern erwarben."
 ra_ram_ft_nhq_sd:0 "U-Boot-Designs"
 ra_ram_ft_nhq_sd_desc:0 "Argentiniens Erfahrung mit U-Booten ist begrenzt. Unsere ersten Einheiten wurden von den Italienern in Tarent gebaut und erst vor wenigen Jahren ausgeliefert. Kapitän Poch, der Verantwortliche unserer U-Boot-Flotte, hat uns berichtet, dass die Cavallinis, von unseren Männern Tarantinos genannt, bemerkenswert gute Leistungen erbracht haben und hat weitere Einheiten angefordert. Wir könnten mehr von den Italienern kaufen … oder unsere eigenen bauen."
 ra_ram_ft_nhq_cd:0 "Cruiser-Designs"
 ra_ram_ft_nhq_cd_desc:0 "Die kleineren Versionen der „Trentos“, die wir vor einigen Jahren von den Italienern gekauft haben, sind eine großartige Ergänzung unserer Flotte. Sie sind zwar nicht perfekt und leiden unter einem Überangebot an Bewaffnung für Schiffe ihrer Klasse, aber unsere Ingenieure sind auf dem richtigen Weg, uns verbesserte Einheiten zu liefern, die ihren größeren Cousins durchaus Paroli bieten können."
 ra_ram_ft_nhq_bsd:0 "Schlachtschiff-Designs"
 ra_ram_ft_nhq_bsd_desc:0 "Die beiden Schlachtschiffe der Dreadnought-Klasse, die wir 1914 von den Amerikanern kauften, waren für ihre Zeit beeindruckende Einheiten, doch der Fortschritt in der Schiffstechnik verkürzt ihre Lebensdauer. Unsere Experten haben bereits mehrere Systeme dieser Schiffe modernisiert und arbeiten nun eifrig an etwas völlig Neuem."
 ra_ram_ft_nhq_pp:0 "Machtprojektion"
 ra_ram_ft_nhq_pp_desc:0 "Unsere Theoretiker haben eine beunruhigende Frage aufgeworfen: Was wäre, wenn die Zukunft der Seekriegsführung nicht in größeren Schiffen und Geschützen läge? Die Idee eines Schiffes, das als beweglicher Flugplatz fungiert, ist nicht neu, doch Fortschritte in der Luftfahrt haben gezeigt, dass diese Schiffe im Vergleich zu konventionellen Einheiten enorme Vorteile hinsichtlich Reichweite und Flexibilität bieten könnten."
#
#
#
 ra_ram_ft_fap:0 "Außenpolitik"
 ra_ram_ft_fap_desc:0 "Argentinien ist für die anderen Länder der Region wie ein Kompass. Nachdem sich der Staub von Uriburu’s Putsch endlich gelegt hat, können wir unsere Position nutzen und Einfluss auf unsere Nachbarn ausüben. So ebnen wir unserem Land den Weg, ein starker Akteur auf der regionalen politischen Bühne zu werden."
 ra_ram_ft_fap_tt:0 "Jedes Land in Südamerika erhält einen §YRegionalkompass§! (Meinung von @ARG §YArgentinien§! §G+15§!)\n\nLänder, mit denen Sie sich im Krieg befinden, sind davon nicht betroffen.\n\n"
 #
 ra_ram_ft_fap_tc:0 "Territoriale Ansprüche"
 ra_ram_ft_fap_tc_desc:0 "Argentinien hat seit den ersten Jahren seiner Unabhängigkeit mit mehreren Territorialstreitigkeiten mit seinen Nachbarländern zu kämpfen. Dabei geht es vor allem um Gebiete des Vizekönigreichs Rio de la Plata, die unserem jungen Land zunächst zugesprochen wurden, später aber aufgrund willkürlicher Entscheidungen, illegaler Besetzung oder mangelhafter Verhandlungen unsererseits verloren gingen."
 ra_ram_ft_fap_tc_tt:0 "\n\nDer nationale Geist des §YSaavedra Lamas-Vertrags§! wird unsere Verhandlungsmöglichkeiten einschränken."
 ra_ram_ft_fap_tha:0 "Das Hayes-Schiedsverfahren"
 ra_ram_ft_fap_tha_desc:0 "Nach dem Paraguayischen Krieg baten Argentinien und Paraguay 1878 den amerikanischen Präsidenten Rutherford Hayes, ihren Gebietsstreit in der Region Chaco Boreal beizulegen. Sein Urteil war völlig einseitig: Es sprach Paraguay die absolute Kontrolle über die Ländereien zu und ignorierte unser Recht darauf, das sich aus der Position des Siegers und den vor dem Krieg vom Dreibund unterzeichneten Pakten ergab."
 ra_ram_ft_fap_tca:0 "Das Cleveland-Schiedsverfahren"
 ra_ram_ft_fap_tca_desc:0 "Die östlichen Gebiete von Misiones sind seit der Kolonialzeit umstritten. 1890 wurde ein neuer Vertrag unterzeichnet, der jedoch vom brasilianischen Kongress abgelehnt wurde. 1895 entschied Präsident Stephen Cleveland, der die Angelegenheit der amerikanischen Schiedsgerichtsbarkeit unterwerfen musste, vollständig zugunsten der Brasilianer, was angesichts ihrer politischen Allianz zu erwarten war."
 ra_ram_ft_fap_rdlpe:0 "Mündung des Rio de la Plata"
 ra_ram_ft_fap_rdlpe_desc:0 "Als Argentinien Uruguay 1828 als unabhängigen Staat anerkannte, gab es keine Klarheit über die Grenzen unserer Länder an der Mündung des Rio de la Plata. Auch heute, mehr als hundert Jahre später, ist die Frage noch immer nicht geklärt. Die Kontrolle über diese Gewässer ist sowohl profitabel als auch lebenswichtig für unsere Verteidigung. Wir sollten sie nicht leichtfertig aufgeben."
 ra_ram_ft_fap_ttm:0 "Die Tarija-Angelegenheit"
 ra_ram_ft_fap_ttm_desc:0 "Simon Bolivar selbst erkannte die argentinischen Ansprüche an und übergab 1885 die umstrittenen Ländereien. Bolivien entschied sich jedoch für die Annexion Tarijas. 1889 wurde ein Vertrag unterzeichnet, in dem wir implizit auf unsere Rechte verzichteten und im Gegenzug Ländereien in der Atacama-Puna erhielten – Ländereien, die die Bolivianer nicht einmal kontrollierten, da sie sie im Krieg mit Chile verloren hatten. Tarija bleibt historisch und rechtmäßig argentinisch."
 ra_ram_ft_fap_ce:0 "Chilenisches Vordringen"
 ra_ram_ft_fap_ce_desc:0 "1881 vereinbarten wir mit Chile, dass unsere Grenzen im Andengebirge der gedachten Linie der höchsten Gipfel und Wassereinzugsgebiete folgen. Erst später erfuhren wir, dass diese beiden Linien nicht immer übereinstimmen. 1902 einigten sich beide Länder darauf, Streitigkeiten, die nicht direkt beigelegt werden können, einer externen Schlichtung zu unterwerfen. Dennoch dringt Chile immer wieder in unser Land ein und gibt sogar vor, uns den Zugang zum Beagle-Kanal zu verwehren."
 ra_ram_ft_fap_magdsi:0 "Malvinas und Georgias del Sur-Inseln"
 ra_ram_ft_fap_magdsi_desc:0 "Argentinien erbte die Kontrolle über die Malvinas und Georgien von Spanien, als es 1816 seine Unabhängigkeit erlangte. Die Briten besetzten 1833 die Malvinas gewaltsam und beanspruchten Georgien für sich. Ihre Besetzung dauert seit über hundert Jahren an. Der Kampf gegen den Kolonialismus ist ein verbindendes Anliegen unseres Volkes und aller Länder, die unter europäischer Unterdrückung litten."
 #
 ra_ram_ft_fap_bld:0 "Stärkung der Lamas-Doktrin"
 ra_ram_ft_fap_bld_desc:0 "„Denken Sie also nach und überzeugen Sie sich davon, dass der Frieden ein unschätzbar wertvolles Gut ist; dass es unabdingbar ist, ihn aufrechtzuerhalten, um allen Menschen, die in den Schatten treten, eine höhere Lebensqualität zu ermöglichen.“ Lamas‘ Ideen von Neutralität und Selbstbestimmung werden unsere Außenpolitik leiten."
 ra_ram_ft_fap_bld_tt:0 "Dieser Schwerpunkt wird eine diplomatische Mission in jedes Land schicken, das von Ihrem §YRegionalkompass§!-Effekt betroffen ist. Dadurch verbessern sich Ihre diplomatischen Beziehungen zu diesen Ländern um weitere §G+15§! und sie werden eher bereit, mit neutralen Regierungen zu verhandeln als mit demokratischen, faschistischen oder kommunistischen.\n\nDie Mission wird einige Monate in Anspruch nehmen.\n\nDieser Schwerpunkt wird es den Unterzeichnern außerdem ermöglichen, anderen Unterzeichnern, die in einen Verteidigungskrieg verwickelt sind, materielle Unterstützung zu schicken."
 ra_ram_ft_fap_sns:0 "Suche nach neuen Unterzeichnern"
 ra_ram_ft_fap_sns_desc:0 "Während die Charta des Völkerbundes Jahr für Jahr schwächer wird, gilt der Saavedra-Lamas-Vertrag schnell als eines der wichtigsten internationalen Rechtswerke unserer Zeit. Wir könnten ihn weiter stärken, indem wir die Länder, die noch Vorbehalte gegen eine Unterzeichnung haben, davon überzeugen, dass ein Beitritt in ihrem besten Interesse ist."
 ra_ram_ft_fap_sns_tt:0 "\nJedes Land, das derzeit keiner Fraktion angehört, nicht in einen Krieg verwickelt ist und nicht von einer ausländischen Macht manipuliert oder ihr unterworfen wird, wird eingeladen, den Lamas-Vertrag zu unterzeichnen."
 ra_ram_ft_fap_pn:0 "Neutralität fördern"
 ra_ram_ft_fap_pn_desc:0 "Unabhängig von der Innenpolitik eines Landes dürfen wir, wenn wir den Erfolg des Lamas-Vertrags gewährleisten wollen, nicht zulassen, dass einer der Unterzeichner in Konflikte im In- oder Ausland durch ideologische Kreuzritter hineingezogen wird."
 ra_ram_ft_fap_pn_tt:0 "\nJeder aktuelle Unterzeichner des Saavedra-Lamas-Vertrags erhält den Nationalgeist §YLamas-Doktrin§!, der (Tägliche Neutralitätsunterstützung §G+0,10§!) gewährt."
 ra_ram_ft_fap_ri:0 "Regionale Isolation"
 ra_ram_ft_fap_ri_desc:0 "Frieden in Amerika ist der Schlüssel zum Wohlstand der Region. Wenn die anderen Länder weiterhin versuchen, uns in ihre Konflikte hineinzuziehen, lassen sie uns keine andere Wahl, als uns ihnen zu verschließen. Vielleicht hören sie endlich auf, die Welt um sie herum zu verbrennen, wenn ihre Kriegsmaschinen versiegen."
 ra_ram_ft_fap_ri_tt:0 "\nSobald der Fokus abgeschlossen ist, werden Sie den Handel mit allen kriegführenden Fraktionen der Welt blockieren und andere Unterzeichner von Lamas in Amerika dazu veranlassen, dasselbe zu tun."
 #
 ra_ram_ft_fap_dld:0 "Verurteilen Sie die Doktrin der Lamas"
 ra_ram_ft_fap_dld_desc:0 "Die Welt wird von Imperialisten regiert, deren einziges Ziel es ist, aufstrebende Länder wie unseres daran zu hindern, ihr volles Potenzial zu entfalten. Wie können wir Neutralität und Selbstbestimmung wahren, wenn ausländische Mächte hinter den Kulissen ständig gegen uns arbeiten? Sie inszenieren Putsche, würgen unsere Wirtschaft ab und setzen unseren Armeen und Flotten einseitige Beschränkungen auf – und das alles, weil sie die Macht haben und wir sie nicht haben."
 ra_ram_ft_fap_dld_tt:0 "\nDieses Ereignis ermöglicht es Ihnen, die Lamas-Doktrin aufzuheben. Wie subtil Sie dabei vorgehen möchten, bleibt Ihnen überlassen."
 ra_ram_ft_fap_dsoi:0 "Interessenbereich definieren"
 ra_ram_ft_fap_dsoi_desc:0 "Wir müssen der Welt klarmachen, dass Südamerika tabu ist. Wir werden ihre Einmischung nicht länger tolerieren und auch nicht zulassen, dass sie sich auf unsere Nachbarn auswirkt. Wir übernehmen die Verantwortung für den Frieden in dieser Region, koste es, was es wolle und mit welchen Mitteln auch immer."
 ra_ram_ft_fap_rpa:0 "Lehnen Sie die Pax Americana ab"
 ra_ram_ft_fap_rpa_desc:0 "Die Monroe-Doktrin ist seit ihrer Einführung ein Witz. Wo waren die Amerikaner 1833, als die Briten die Malvinas überfielen? Nein, diese Doktrin ist nur ein Werkzeug. Sie zeigen eine offene, freundliche Hand, verstecken aber mit der anderen den großen Knüppel des Imperialismus hinter ihrem Rücken."
 ra_ram_ft_fap_i:0 "Interventionismus"
 ra_ram_ft_fap_i_desc:0 "Unsere Ideale sind nicht nur die Ideale des argentinischen Volkes, sie sind die Ideale jedes aufrichtigen und gerechten Menschen auf dieser Welt. Wir können ihre Korruption nicht dulden, weder im Inland noch im Ausland. Wir werden sie schützen, wo immer sie bedroht sind."
 ra_ram_ft_fap_pg:0 "Patria Grande"
 ra_ram_ft_fap_pg_desc:0 "Manuel Ugarte machte das Konzept 1922 mit seinem Buch populär, doch die Idee stammt aus der Zeit von José de San Martín und Simón Bolívar. Das Vereinigungsprojekt wurde zwar entworfen, aber nie unterzeichnet, da der politische Wille fehlte. Die Idee bleibt jedoch bestehen. Auch wenn es schwer vorstellbar ist, könnte ein vereintes Hispano-Amerika, eine wahre Patria Grande, die Welt, wie wir sie kennen, verändern."
 ra_ram_ft_fap_rin:0 "Regionale Integration"
 ra_ram_ft_fap_rin_desc:0 "Unsere bisherige Arbeit hat den Grundstein für eine echte regionale Integration mit unseren Nachbarn gelegt. Nun liegt es an ihnen, über ihre Zukunft zu entscheiden."
