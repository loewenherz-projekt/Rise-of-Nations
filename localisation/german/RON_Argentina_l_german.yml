##########################################
#
 ra_strikes_and_lockouts:0 "Streiks und Aussperrungen"
 ra_strikes_and_lockouts_desc:0 "Die Weltwirtschaftskrise und der Aufstieg des Kommunismus haben die Konflikte zwischen der Arbeiterklasse und den Kapitaleignern immer weiter verschärft. Dies wird unsere Industrie bremsen, bis wir eine langfristige Lösung finden."
 ra_roca_runciman_treaty:0 "Roca-Runciman-Vertrag"
 ra_roca_runciman_treaty_desc:0 "Der Roca-Runciman-Handelsvertrag wurde 1933 als Reaktion auf den britischen Handelsprotektionismus nach der Weltwirtschaftskrise unterzeichnet. Im Austausch für Steuerbefreiungen für ihre Produkte erklärten sie sich bereit, weiterhin Fleisch und Getreide von uns zu kaufen. Die Quoten fielen jedoch niedriger aus als die der Commonwealth-Mitglieder."
 ra_rising_expectations:0 "Steigende Erwartungen"
 ra_rising_expectations_desc:0 "Unsere Entscheidung, die Probleme unserer Wirtschaft anzugehen, wurde von unserer Bevölkerung positiv aufgenommen."
 ra_open_for_business:0 "Offen für Geschäfte"
 ra_open_for_business_desc:0 "Da wir nun nicht mehr an unser Handelsabkommen mit den Briten gebunden sind, verfügen wir über Ressourcen im Überfluss."
 ra_eden_malbran_pact_ns:0 "Eden-Malbran-Pakt"
 ra_eden_malbran_pact_ns_desc:0 "Wir haben ein neues Abkommen mit den Briten, und auch wenn es vielleicht nicht das beste ist, hat es doch andere Vorteile, mit ihnen auf gutem Fuß zu stehen."
