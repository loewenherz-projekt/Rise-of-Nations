 #
 #
 raother.1.t:0 "Gesundheit von General Rodriguez"
 raother.1.d:0 "Unsere Marine trifft derzeit die Vorbereitungen für eine groß angelegte Marineübung am Rio de la Plata am 23. Februar. General Manuel A. Rodriguez, unser Oberbefehlshaber der Armee, soll teilnehmen, doch sein Gesundheitszustand war in den letzten Monaten angeschlagen. Rodriguez ist zu sehr an seine Pflicht gebunden, um Urlaub zu beantragen, aber vielleicht sollten wir ihn zwingen, einige Wochen zu Hause zu bleiben, in der Hoffnung, dass sich sein Zustand verbessert."
 raother.1.a:0 "Überlassen Sie es dem General."
 raother.1.b:0 "Lassen Sie General Rodriguez zu Hause bleiben und sich ausruhen."
 #
 raother.2.t:0 "Marineübung am Rio del Plata"
 raother.2.da:0 "Heute fand an der Küste von Mar del Plata eine große Marineübung statt. Die Marine war mit den meisten ihrer Einheiten vor Ort und begeisterte die anwesenden Zuschauer und Offiziere mit einer Reihe koordinierter Manöver, die sogar von eingeladenen ausländischen Würdenträgern mit Lob bedacht wurden. \n\nLeider endete der Tag mit einem düsteren Ergebnis: Der Oberbefehlshaber der Armee, General Manuel Rodriguez, der als Vertreter seiner Teilstreitkräfte an der Veranstaltung teilgenommen hatte, verstarb wenige Stunden nach Ende der Veranstaltung an einer Krankheit, die ihn monatelang geplagt hatte. Seine Frau, Emma Fernandez de Rodriguez, überlebte ihn, doch der General hatte keine Nachkommen, die sein Erbe fortführen konnten."
 raother.2.db:0 "An der Küste von Mar del Plata fand heute eine große Marineübung statt. Die Marine war mit den meisten ihrer Einheiten vor Ort und überraschte die anwesenden Zuschauer und Offiziere mit einer Reihe koordinierter Manöver, die sogar von eingeladenen ausländischen Würdenträgern mit Lob bedacht wurden. Die Abwesenheit von General Manuel Rodriguez, dem Oberbefehlshaber der Armee, sorgte für Verwirrung, bis Präsident Justo der Presse mitteilte, dass er aus gesundheitlichen Gründen nach Hause beordert worden sei."
 raother.2.a:0 "Ein großer Verlust für unser Land."
 raother.2.b:0 "Wir grüßen die argentinische Marine."
 #
 raother.3.t:0 "Saavedra Lamas erhält den Friedensnobelpreis"
 raother.3.d:0 "24. November 1936\n\nCarlos Saavedra Lamas, der argentinische Außenminister, ist der erste Lateinamerikaner, der den Nobelpreis erhält. Er erhielt die Auszeichnung für seinen Einsatz zur Beendigung des Krieges zwischen Paraguay und Bolivien (1932–1935). Als überzeugter Anhänger von Neutralität und Nichteinmischung ist Lamas ein Vorreiter derjenigen, die der nordamerikanischen Intervention in der Region um jeden Preis entgegentreten wollen."
 raother.3.a:0 "Er macht uns stolz."
 raother.3.b:0 "Er macht sein Land stolz."
 #
 revargstartup.3.t:0 "USA-Garantien entfernen?"
 revargstartup.3.d:0 "Manche Spieler möchten sich bei ihrer Expansion in Südamerika nicht um die USA kümmern müssen. Wenn Sie Ihre Kriege genießen möchten, ohne dass diese lästigen Amerikaner Ihrer Weltherrschaft im Weg stehen, sagen Sie es einfach, und der Mod entfernt die Garantien. Bedenken Sie, dass die USA dadurch nicht hirntot werden; sie könnten sich irgendwann trotzdem zum Handeln entschließen."
 revargstartup.3.a:0 "Ja, bitte, ich möchte, dass diese Garantien entfernt werden."
 revargstartup.3.b:0 "Nein danke, ich habe keine Angst vor den USA."
