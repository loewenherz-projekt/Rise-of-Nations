 ra_revitalized_industry:0 "Revitalisierte Industrie"
 ra_revitalized_industry2:0 "Revitalisierte Industrie"
 ra_revitalized_industry_desc:0 "Die argentinische Industrie ist in eine neue Ära des Wohlstands eingetreten.\n\nDiese Idee verdichtet die Auswirkungen von:\n\nStaatlich finanzierten Unternehmen\nEntwicklung des zivilen Sektors\nEntwicklung des militärischen Sektors\nUnternehmen des privaten Sektors\nSteueranreizen\nImportsubstitution"
 ra_revitalized_industry2_desc:0 "Die argentinische Industrie ist in eine neue Ära des Wohlstands eingetreten.\n\nDiese Idee verdichtet die Auswirkungen von:\n\nStaatlich finanzierten Unternehmen\nEntwicklung des zivilen Sektors\nEntwicklung des militärischen Sektors\nUnternehmen des privaten Sektors\nSteueranreizen\nImportsubstitution\nRio Turbio (Phase 3)"
 ra_public_health_ltd:0 "Öffentliche Gesundheit (eingeschränkte Abdeckung)"
