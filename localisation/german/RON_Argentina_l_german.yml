 ######     REVISED ARGENTINA MOD    ######
 ######       NAVY LEADER TRAITS     ######
 ##########################################
 #
 ###### ABELARDO PANTIN ######
 honor_student3:0 "Ehrenschüler"
 honor_student3_desc:0 "Pantin wurde nach seinem Abschluss an der Marine-Militärschule mit der Goldenen Medaille ausgezeichnet."
 surveyor3:0 "Landvermesser"
 surveyor3_desc:0 "Die Fähigkeiten, die Pantin während der Untersuchungen in San Blas und der Anegada Bay erworben hat, haben sich als sehr nützlich erwiesen."
 ###### AGUSTIN POCH    ######
 honor_student:0 "Ehrenschüler"
 honor_student_desc:0 "Poch schloss die Marine-Militärschule als Klassenbester ab."


 #####  ALBERTO TEISAIRE ##### 
 great_war_veteran2:0 "Veteran des Ersten Weltkriegs"
 great_war_veteran2_desc:0 "Teisaire trat während des Ersten Weltkriegs der amerikanischen Marine bei und kehrte mit wertvollen Erfahrungen nach Argentinien zurück."
 submarine_specialist2:0 "U-Boot-Spezialist"
 submarine_specialist2_desc:0 "Teisaires Posten während seiner Zeit bei der US Navy war an Bord von U-Booten, was ihn zu einem der ersten Pioniere machte, die diese in der Kriegsführung einsetzten."
 master_navigator:0 "Meisternavigator"
 master_navigator_desc:0 "Teisaires Fähigkeiten am Ruder sind herausragend, ebenso wie seine Fähigkeit, sie anderen beizubringen."
 ###### CARLOS DAIREAUX ######
 old_sea_dog:0 "Alter Seebär"
 old_sea_dog_desc:0 "Vier Jahrzehnte auf See sind eine Leistung, die nur wenige Männer vorweisen können. Daireaux diente in der französischen Mittelmeerflotte und nahm aktiv an den Feldzügen nach Dahomey und Madagaskar teil."
 surveyor:0 "Landvermesser"
 surveyor_desc:0 "Daireaux verbrachte fünf Jahre mit hydrografischen Arbeiten und Küstenvermessungen an der Südsee und erweiterte so sein Repertoire um viele Fähigkeiten."
 back_from_retirement:0 "Zurück aus dem Ruhestand"
 back_from_retirement_desc:0 "Daireaux schied 1929 aus dem aktiven Dienst aus. Obwohl er immer noch in der argentinischen Marineliga aktiv ist, ist es unwahrscheinlich, dass ein Mann seines Alters viele neue Tricks lernen wird, wenn er wieder in den Dienst gerufen wird."
 ###### ELEAZAR VIDELA  ######
 firepower_proponent:0 "Befürworter der Feuerkraft"
 firepower_proponent_desc:0 "Den größten Teil seiner Karriere verbrachte Videla an Bord unserer schwersten Schiffe, wo er sich als brillanter Offizier hervorgetan hat."
 ra_naval_aviation_pioneer:0 "Pionier der Marinefliegerei"
 ra_naval_aviation_pioneer_desc:0 "Videla ist sich des Werts der Marinefliegerei bewusst und hat sich für ihre Einführung in unserer Marine eingesetzt."
 surveyor2:0 "Landvermesser"
 surveyor2_desc:0 "Durch seine Tätigkeit als Kommandant der Ersten Erkundungsflotte in den frühen 30er Jahren sammelte Videla wertvolle Erfahrungen."
 ###### FIDEL ANADON    ######
 submarine_specialist3:0 "U-Boot-Spezialist"
 submarine_specialist3_desc:0 "Anadon absolvierte im italienischen Tarent eine umfassende U-Boot-Ausbildung."
 ###### VERNNEGO LIMA   ######
 great_war_veteran3:0 "Veteran des Ersten Weltkriegs"
 great_war_veteran3_desc:0 "Lima trat 1917 der US Navy bei und diente als Artillerieoffizier auf den Schlachtschiffen New York und South Carolina."
 honor_student2:0 "Ehrenschüler"
 honor_student2_desc:0 "Lima wurde nach seinem Abschluss an der Marineschule mit einer Goldmedaille und einem Diplom ausgezeichnet."
 master_navigator2:0 "Meisternavigator"
 master_navigator2_desc:0 "Lima rühmt sich seiner Fähigkeiten am Steuer und behauptet sogar, er könne eine Flotte durch die Magellanstraße führen, ohne ein einziges Schiff zu verlieren."
 ###### LEON SCASSO     ######
 firepower_proponent2:0 "Befürworter der Feuerkraft"
 firepower_proponent2_desc:0 "Scasso plädiert für die zentrale Rolle der Schlachtschiffdivision in unseren Flotten."
 ###### MARIO FINCATI   ######
 balanced_fleet_proponent:0 "Befürworter einer ausgewogenen Flotte"
 balanced_fleet_proponent_desc:0 "Durch den zwei Jahrzehnte langen Dienst auf nahezu jedem Schiffstyp unserer Flotte verfügt Fincati über ein tiefes Verständnis der einzelnen Schiffstypen und ihrer Rolle in unseren Formationen."
 good_navigator:0 "Guter Navigator"
 good_navigator_desc:0 "Fincati erwies sich auf jedem Schiff, auf dem er diente, als zuverlässiger Steuermann."
 ###### PEDRO CASAL     ######
 old_sea_dog2:0 "Alter Seebär"
 old_sea_dog2_desc:0 "Dreißig Jahre auf See vergehen nicht, ohne dass man das eine oder andere gelernt hat."
 escort_specialist:0 "Escort-Spezialist"
 escort_specialist_desc:0 "Während des Chaco-Boreal-Krieges war Casal für den Schutz argentinischer Hilfsgüter und Vorräte auf dem Weg flussaufwärts nach Paraguay verantwortlich."
 
 ##########################################
 ######     REVISED ARGENTINA MOD    ######
 ######      HIGH COMMAND TRAITS     ######
 ##########################################
 #
 #ELEAZAR T. VIDELA
 ARG_eleazar_videla_hq:0 "Eleazar T. Videla"
 expanded_operations:0 "Erweiterter Betrieb"
 expanded_operations_desc:0 "Videla arbeitet seit Jahren an der Erweiterung unserer Marinestützpunkte und stellt sicher, dass unsere Flotten nicht nur unsere heimischen Gewässer, sondern auch die darüber hinausgehenden abdecken können."
 #CARLOS MARQUEZ
 ARG_carlos_marquez_hq:0 "Carlos D. Marquez"
 coordinated_command:0 "Koordiniertes Kommando"
 coordinated_command_desc:0 "Die erneuerte Kommandostruktur von Marquez wird die Leistung unserer Armee auf dem Feld verbessern."
 #GUILLERMO ZINNY
 ARG_guillermo_zinny:0 "Guillermo Zinny"
 ra_dogfight_tactician:0 "Luftkampftaktiker"
 ra_dogfight_tactician_desc:0 "Zinny weiß, dass unsere Piloten mit neuen Technologien und Flugzeugen auch ihre Kampfweise ändern müssen."
 #BALDOMERO BIEDMA
 ARG_baldomero_biedma:0 "Baldomero de Biedma"
 ra_close_air_support:0 "Luftnahunterstützung"
 ra_close_air_support_desc:0 "Unsere Streitkräfte führten ihre erste gemeinsame Waffenübung im Jahr 1913 durch. Biedma war einer der teilnehmenden Piloten und hat ein klares Verständnis für die Vorteile der Luftunterstützung für unsere Bodentruppen."
 #AGUSTIN POCH
 ARG_agustin_poch:0 "Ramon A. Poch"
 ra_submarine_specialist:0 "U-Boot-Spezialist"
 ra_submarine_specialist_desc:0 "Poch ist unser führender Experte für den Einsatz von U-Booten. Er wurde in den USA und Italien ausgebildet und leitet seit der Gründung unsere U-Boot-Kampfgruppe."
 #FRANKLYN LUCERO
 ARG_franklyn_lucero_hq:0 "Franklyn Lucero"
 expert_tactician_hq:0 "Taktikexperte"
 expert_tactician_hq_desc:0 "Luceros Fähigkeiten als erfahrener Taktiker sind in der Kriegsakademie wohlbekannt."
 #CARLOS DAIREAUX
 ARG_carlos_daireaux_hq:0 "Carlos Daireaux"
 amphibious_operations_expert:0 "Experte für amphibische Operationen"
 amphibious_operations_expert_desc:0 "Daireaux sammelte während seiner Dienstzeit bei der französischen Marine Erfahrungen aus erster Hand bei Marinelandungen."
 #ANGEL MARIA ZULOAGA
 ARG_angel_zuloaga_hq:0 "Angel M. Zuloaga"
 high_altitude_flights:0 "Flüge in großer Höhe"
 high_altitude_flights_desc:0 "„Flugzeuge haben Grenzen, Piloten nicht.“ Es ist schwer, mit einem Mann zu streiten, der ohne Cockpit über die Anden geflogen ist."
 #DIEGO ISIDRO MASON
 ARG_diego_isidro_mason_hq:0 "Diego I. Mason"
 ra_logistics_expert:0 "Logistikexperte"
 ra_logistics_expert_desc:0 "Durch die Zeit als Leiter des De Luca Arsenal hat Mason wertvolle logistische Erfahrungen gesammelt."
 #MARIO FINCATI
 ARG_mario_fincati_hq:0 "Mario Fincati"
 ship_communications_expert:0 "Experte für Schiffskommunikation"
 ship_communications_expert_desc:0 "Egal wie leistungsstark ein Schiff ist oder wie gut seine Besatzung ausgebildet ist, im Verbund mit anderen leistungsstarken Schiffen und ausgebildeten Besatzungen erzielen sie immer bessere Leistungen als allein."
 #MANUEL RODRIGUEZ
 ARG_manuel_rodriguez_hq:0 "Manuel A. Rodriguez"
 expert_trainer:0 "Erfahrener Trainer"
 expert_trainer_desc:0 "Rodriguez ist nicht nur eine beliebte Galionsfigur, sondern auch einer der besten Professoren, die unsere Kriegsakademie je gesehen hat."
 #ARTURO RAWSON
 ARG_arturo_rawson_hq:0 "Arturo Rawson"
 army_acclimatization:0 "Armee-Akklimatisierung"
 army_acclimatization_desc:0 "Der Chaco-Feldzug lehrte Rawson, wie wichtig es ist, dass die Soldaten an die Umgebung gewöhnt sind, in der sie kämpfen sollen. Er möchte diese Lektion unserer gesamten Truppe vermitteln."
 # CARLOS VON DER BECKE
 ARG_carlos_becke_hq:0 "Carlos von der Becke"
 master_strategist:0 "Meisterstratege"
 master_strategist_desc:0 "Von der Becke's planning capabilities have amazed our leaders ever since he became part of the Chief Staff in 1917."
 # JUAN PISTARINI
 ARG_juan_pistarini_hq:0 "Juan Pistarini"
 go_doer_hq:0 "Macher"
 go_doer_hq_desc:0 "So einfach es auch klingt, Pistarinis Spitzname ist wohlverdient. Nur wenige Männer verfügen über die Fähigkeit, Projekte so zu managen und voranzutreiben wie er."
 #EDUARDO LONADI
 ARG_eduardo_lonadi_hq:0 "Eduardo Lonadi"
 artillery_specialist_hq:0 "Artilleriespezialist"
 artillery_specialist_hq_desc:0 "Lonadi ist seit mehr als zwei Jahrzehnten Schulleiter der Artillerieschule von Córdoba."
 #JUAN DOMINGO PERON
 ARG_juan_peron_hq:0 "Juan D. Peron"
 insurgency_control_specialist:0 "Spezialist für Aufstandsbekämpfung"
 insurgency_control_specialist_desc:0 "Perón ist seit Beginn seiner Militärkarriere für den Umgang mit Streikenden, Demonstranten und Rebellen zuständig. Er ist bekannt für seine Fähigkeit, angespannte Situationen ohne Gewalt zu lösen."
 #JULIO LAGOS
 ARG_julio_lagos_hq:0 "Julio Lagos"
 fortifications_expert:0 "Befestigungsexperte"
 fortifications_expert_desc:0 "Während manche behaupten, die Zukunft des Krieges liege in der Mobilität, beharrt Lagos darauf, dass Schützengräben nie aus der Mode kommen werden."
 #PEDRO ARGIREZ
 ARG_pedro_ramirez_hq:0 "Pedro P. Ramirez"
 manouvering_expert:0 "Manövrierexperte"
 manouvering_expert_desc:0 "Ramirez‘ Zeit bei den Kaiser-Husaren während seiner Jahre in Deutschland zeigte ihm, wie wichtig Geschwindigkeit auf dem Spielfeld ist."
 #HECTOR VERNEGO LIMA
 ARG_hector_lima_hq:0 "Hector V. Lima"
 capital_ship_specialist:0 "Spezialist für Großkampfschiffe"
 capital_ship_specialist_desc:0 "Ohne eine leichte Obsession für extrem große Kanonen wird man kein Artillerieoffizier."
 #PEDRO CASAL
 ARG_pedro_casal_hq:0 "Pedro S. Casal"
 escort_fleet_specialist:0 "Spezialist für Begleitflotten"
 escort_fleet_specialist_desc:0 "Der Chaco-Boreal-Krieg bot Casal die perfekte Gelegenheit, seine Flottenformationen in die Praxis umzusetzen. Jetzt geht es darum, sie in einem Krieg zu erproben, an dem wir tatsächlich beteiligt sind."
 #OSCAR MURATORIO
 ARG_oscar_muratorio_hq:0 "Oscar Muratorio"
 extensive_ground_crew_training:0 "Umfangreiches Training des Bodenpersonals"
 extensive_ground_crew_training_desc:0 "Jedes Flugzeug in der Luft benötigt Dutzende von Menschen am Boden, die es unterstützen. Wenn diese Menschen gut ausgebildet sind, kann das Flugzeug nicht nur bessere Leistungen erbringen, sondern auch häufiger fliegen."
 ##########################################
 ######     REVISED ARGENTINA MOD    ######
 ######         CHIEF TRAITS         ######
 ##########################################
 #
 ## ARMY
 #
 #MANUEL RODRIGUEZ
 ARG_chief_manuel_a_rodriguez:0 "Manuel A. Rodriguez"
 inspired_instructor:0 "Inspirierter Lehrer"
 inspired_instructor_desc:0 "General Rodriguez verfügt über das Wissen und das Charisma, um ein perfekter Lehrer zu sein. Er ist außerdem ein Vorbild für jeden Soldaten, und seine Reden über die Pflichten eines Soldaten sind praktisch jedem in seinem Beruf bekannt." 
 #BASILO PERTINE
 ARG_chief_basilo_pertine:0 "Basilo E. Pertine"
 victory_through_discipline:0 "Sieg durch Disziplin"
 victory_through_discipline_desc:0 "Durch seine Zeit in den Armeen des Kaisers während des Ersten Weltkriegs wurde Pertine der Wert einer gut organisierten und disziplinierten Armee bewusst."
 #CARLOS MARQUEZ
 ARG_chief_carlos_marquez:0 "Carlos D. Marquez"
 army_renovator:0 "Armee-Erneuerer"
 army_renovator_desc:0 "Marquez ist der Ansicht, dass die Kommandostruktur unserer Armee stagniert und erneuert werden muss. Neben neuen Ausbildungskursen für unsere Offiziere sieht sein Plan auch eine Erhöhung des Militärbudgets vor, um veraltete Ausrüstung zu ersetzen."
 #PEDRO PABLO ARGIREZ
 ARG_chief_pedro_pablo_ramirez:0 "Pedro P. Ramirez"
 cunning_strategist:0 "Gerissener Stratege"
 cunning_strategist_desc: "General Ramirez is known for his obsession with preparation, never shying away from legwork as long as he can get the edge over his adversaries." 
 #
 ## NAVY
 #
 #PEDRO SEGUNDO CASAL
 ARG_chief_pedro_s_casal:0 "Pedro S. Casal"
 commerce_protection:0 "Handelsschutz"
 commerce_protection_desc:0 "Casal weiß, was Seeblockaden unserem Land in der Vergangenheit angetan haben. Im Kriegsfall käme die Aufgabe unserer Handelswege seiner Ansicht nach einer Kapitulation gleich."
 #ELEAZAR VIDELA
 ARG_chief_eleazar_videla:0 "Eleazar T. Videla"
 navy_renovator_nc:0 "Marine-Renovierer"
 navy_renovator_nc_desc:0 "Videla hat die Erneuerung unserer Marine mehr als ein Jahrzehnt lang überwacht. Er ist überzeugt, dass die Kontrolle unserer Heimatgewässer nur ein Sprungbrett zu unserer vollständigen Vorherrschaft im Südatlantik ist. Dafür sind sowohl neue Schiffe als auch neue Offiziere erforderlich."
 #LEON SCASSO
 ARG_chief_leon_scasso:0 "Leon Scasso"
 peace_enforcer:0 "Friedensvollstrecker"
 peace_enforcer_desc:0 "Scasso war 1932 in Genf, als die Politiker über Stabilität und Abrüstung stritten. Dort beobachtete er die Zurückhaltung der Großmächte, sich an die neuen „Friedensregeln“ zu halten – eine Tatsache, die sich nach Hitlers Rückzug 1933 deutlich zeigte. Dies führte ihn zu der Überzeugung, dass die Wahrung des Friedens darin besteht, seine Feinde davon zu überzeugen, dass man zum Krieg bereit ist."
 #MARIO FINCATI
 ARG_chief_mario_fincati:0 "Mario Fincati"
 fleet_coordination:0 "Flottenkoordination"
 fleet_coordination_desc:0 "Aufgrund seiner Erfahrungen als Leiter für Navigation und Kommunikation, als Schulleiter der Maschinen- und Signalschule und als Leiter des hydrografischen Dienstes ist Fincati ein äußerst versierter Mensch, wenn es darum geht, Flotten selbst unter widrigsten Bedingungen zu koordinieren und zu befehligen."
 #
 ## AIRFORCE
 #
 #ANTONIO PARODI
 ra_ARG_antonio_parodi:0 "Antonio Parodi"
 unhindered_flight:0 "Ungehinderter Flug"
 unhindered_flight_desc:0 "Parodi gewann 1916 das Rennen zum 100-jährigen Unabhängigkeitsjubiläum und stellte gleichzeitig einen neuen Rekord im Nachtflug auf. Seit zwanzig Jahren beweisen seine Leistungen, dass Fliegen bei jedem Wetter und jeder Sicht möglich ist, solange man über die nötigen Fähigkeiten verfügt."
 #PEDRO CASTEX LAINFOR
 ARG_pedro_c_lainfor:0 "Pedro C. Lainfor"
 air_superiority_ra:0 "Luftüberlegenheit"
 air_superiority_ra_desc:0 "Lainfor unterstützte Uriburus Putsch im Jahr 1930, indem er die Kontrolle über den Luftwaffenstützpunkt El Palomar übernahm und die vollständige Lufthoheit erlangte. Indem er die Truppen in Campo de Mayo davon abhielt, auszurücken, um die legitime Regierung zu unterstützen, zwang er Präsident Yrigoyen zum Handeln, der nur 18 Stunden nach Beginn des Putsches seine Niederlage einräumte."
 #PEDRO LEANDRO ZANNI
 ARG_pedro_l_zanni:0 "Pedro L. Zanni"
 calculated_risks:0 "Kalkulierte Risiken"
 calculated_risks_desc:0 "Zwischen 1914 und 1920 brach Zanni mehrere Geschwindigkeits- und Höhenrekorde und vollbrachte außergewöhnliche Leistungen wie die zweimalige Überquerung der Anden hintereinander. 1922 startete er einen Flug um die Welt, musste ihn jedoch aufgrund technischer Probleme abbrechen. Zu diesem Zeitpunkt hatte er bereits über 17.000 Kilometer zurückgelegt. Wenn es in der Armee jemanden gibt, der weiß, wie man unsere Flugzeuge optimal ausnutzt, dann ist er es."
 #ANGEL MARIA ZULOAGA
 ARG_angel_zuloaga:0 "Angel M. Zuloaga"
 daredevil:0 "Draufgänger"
 daredevil_desc:0 "Manche Menschen wissen nicht, wann etwas zu gefährlich für sie ist. Andere schon und tun es trotzdem des Ruhms wegen. Zuloaga gehörte 1916 zu einem Zwei-Mann-Team, das die Anden in einem Aerostaten überquerte und dabei Temperaturen von -30 Grad Celsius in über 8000 Metern Höhe trotzte. Diese Leistung brachte ihm und Eduardo Bradley weltweite Anerkennung ein. Auch heute, mehr als zwanzig Jahre später, ist er eine Ikone für jeden, der dem Ruf der Wolken folgt."
 ##########################################
 ######     REVISED ARGENTINA MOD    ######
 ######       ARMY LEADER TRAITS     ######
 ##########################################
 #
 ######## AGUSTIN PEDRO JUSTO #############
 artillery_specialist:0 "Artilleriespezialist"
 artillery_specialist_desc:0 "Justo konzentriert sich seit seiner Zeit an der Militärschule auf Artillerie. Seine Kenntnisse der Telemetrie und seine Erfahrung als Anführer der 4. Artilleriebrigade machen jedes Geschütz unter seinem Kommando doppelt so tödlich."
 army_engineer:0 "Armeeingenieur"
 army_engineer_desc:0 "Justo studierte parallel zu seiner militärischen Ausbildung Ingenieurwissenschaften an der Universität von Buenos Aires und war in beiden Bereichen hervorragend. Er konnte das im Unterricht Gelernte schnell in der Praxis anwenden."
 veteran_of_the_park_revolution:0 "Veteran der Parkrevolution"
 veteran_of_the_park_revolution_desc:0 "Justo stand auf der Verliererseite der Revolution von 1890, doch die Lektionen, die er in den blutigen Straßen von Buenos Aires lernte, begleiten ihn bis heute."
 ######## ANGEL SOLARI #############
 tireless:0 "Unermüdlich"
 tireless_desc:0 "Solari ist ein bekannter Patriot, ein vorbildlicher Arbeiter und geradezu unermüdlich. Ein Mann, der immer etwas zu tun findet (und tut), wenn alle anderen um eine Pause betteln."
 ######## ARTURO RAWSON #############
 cavalry_specialist:0 "Kavalleriespezialist"
 cavalry_specialist_desc:0 "Dieser Mann hat umfangreiches Training mit Kavallerieformationen absolviert und weiß, wie man das Beste aus ihnen herausholt."
 veteran_of_the_great_chaco_campaign:0 "Veteran der Großen Chaco-Kampagne"
 veteran_of_the_great_chaco_campaign_desc:0 "Der Große Chaco-Feldzug der 20er Jahre war eine üble Angelegenheit, fernab jeglicher Unterstützung und in schwierigem Gelände. Dieser Mann hat ihn überlebt und wertvolle Lehren daraus gezogen."
 ######## BASILO E. PERTINE #############
 great_war_veteran:0 "Veteran des Ersten Weltkriegs"
 great_war_veteran_desc:0 "Pertine erlebte den Ersten Weltkrieg vom deutschen Hauptquartier aus und diente sogar im 81. Frankfurter Regiment."
 mountaineer_training:0 "Bergsteigertraining"
 mountaineer_training_desc:0 "Eine Saison voller Strapazen und Training mit der Cuyo Mountain Brigade lehrte Pertine, wie er sich – und seine Männer – in den Bergen zurechtfinden musste."
 ######## CARLOS D. MARQUEZ #############
 master_of_maps:0 "Meister der Karten"
 master_of_maps_desc:0 "Als ehemaliger Leiter der Topografie am Militärgeografischen Institut kennt Marquez jeden Quadratkilometer Argentiniens und seiner Nachbarländer wie seine Westentasche." 
 ######## CARLOS M. VON DER BECKE ############# 
 standard_bearer:0 "Standartenträger"
 standard_bearer_desc:0 "General Von der Becke graduated top of his class in military school in 1908, already showing great promise as a capable and resourceful man."
 order_of_merit:0 "Verdienstorden"
 order_of_merit_desc:0 "Von der Becke schloss sein Studium am War College als Bester seines Jahrgangs ab."
 master_planner:0 "Masterplaner"
 master_planner_desc:0 "Dieser Mann hat große Fähigkeiten bei der Theoriebildung zu allen möglichen Szenarien bewiesen."
 kriegsakademy_student:0 "Kriegsakademie-Student"
 kriegsakademy_student_desc:0 "Von der Becke besuchte die Kriegsakademie während seiner Zeit in Deutschland als Militärattache der argentinischen Botschaft."
 ######## DIEGO I. MASON ############# 
 logistics_expert:0 "Logistikexperte"
 logistics_expert_desc:0 "Masons Zeit als Leiter des De Luca Arsenal in Buenos Aires hat ihm gezeigt, wie man Vorräte am besten lagert und verteilt."
 ######## EDELMIRO FARRELL ########
 mountaineer_training2:0 "Bergsteigertraining"
 mountaineer_training2_desc:0 "Zwei Jahre in einem italienischen Alpenregiment gaben Farrell die Chance, von den Besten der Gebirgskriegsführung zu lernen."
 ######## EDUARDO LONADI ########
 artillery_specialist2:0 "Artilleriespezialist"
 artillery_specialist2_desc:0 "Lonadi war mehr als ein Jahrzehnt lang Direktor der Artillerieschule von Córdoba. Es gibt nur wenige Männer in unserer Armee, die die Artillerie besser einsetzen können als er."
 ######## ELBIO C. ANAYA ########
 ruthless_commander:0 "Skrupelloser Kommandant"
 ruthless_commander_desc:0 "Im Jahr 1921 wurde Anaya nach Patagonien geschickt, um Streikende zu bekämpfen. Die meisten Tötungen wurden als Selbstverteidigung abgetan, doch es ist kein Geheimnis, dass sie eher Hinrichtungen ähnelten. Anayas Ruf, den er sich dadurch erworben hatte, machte ihn zu einem rücksichtslosen Mann, dem Ergebnisse wichtiger waren als das Leben seiner Männer."
 ######## FRANKLIN LUCERO ######## 
 expert_tactician:0 "Taktikexperte"
 expert_tactician_desc:0 "Lucero ist seit mehreren Jahren Professor an unserem Militärkollegium und unserer Armeeakademie. Sein Wissen über militärische Taktiken und sein Einfallsreichtum machen ihn zu einem gefährlichen Gegner auf dem Feld."
 ######## HUMBERTO S. MOLINA ########
 expert_sharpshooter:0 "Experte im Scharfschießen"
 expert_sharpshooter_desc:0 "Molina gehört zu den besten Schützen unserer Armee und wurde sogar zum persönlichen Leibwächter des verstorbenen Präsidenten Uriburu ernannt. Er bevorzugt Fähigkeiten gegenüber der Anzahl der Scharfschützen und seine handverlesenen Scharfschützenteams sind der Stolz der Marsmen-Schule."
 ######## JUAN D. PERON ########  
 national_fencing_champion:0 "Nationaler Fechtmeister"
 national_fencing_champion_desc: "Peron became the National Fencing Champion 1918, he's also a proficient boxer and athelete, something his men respect him for."
 military_historian:0 "Militärhistoriker"
 military_historian_desc:0 "Dieser Mann hat viel Zeit damit verbracht, vergangene Konflikte zu studieren, Bücher darüber zu schreiben und die Lehren daraus in sein eigenes Repertoire an Fähigkeiten zu integrieren."
 ####### JUAN J. VALLE ######## 
 master_engineer:0 "Meisteringenieur"
 master_engineer_desc:0 "Ingenieur zu sein ist eine Sache. Pionieringenieur zu sein eine andere. Der Mann zu sein, der allen anderen Ingenieuren beibringt, wie man mitten in der Nacht eine Brücke baut, die einer ganzen Brigade standhält und nach dem Krieg noch steht, damit Kinder sie für den Schulweg benutzen können … nun ja, das ist Valle."
 ######## JUAN N. TONAZZI ########
 respected_commander:0 "Verehrter Kommandant"
 respected_commander_desc:0 "Jahrzehntelange Dienste in unseren Ausbildungseinrichtungen machen Tonazzi zu einem der bekanntesten und angesehensten Kommandeure unserer Armee."
 ######## JUAN PISTARINI ########
 go_doer:0 "Macher"
 go_doer_desc:0 "General Pistarini verdiente sich seinen Spitznamen, nachdem er viele Jahre lang die richtige Person war, wenn man etwas schnell und effizient erledigen wollte."
 army_engineer2:0 "Armeeingenieur"
 army_engineer2_desc:0 "Pistarini studierte Ingenieurwissenschaften in Europa und wurde 1930 Generaldirektor der Ingenieurabteilung des Kriegsministeriums."
 ######## MANUEL RODRIGUEZ ########
 army_engineer3:0 "Armeeingenieur"
 army_engineer3_desc:0 "Rodriguez verbrachte den Großteil seiner frühen Karriere unter Ingenieuren und leitete sogar das Pionierregiment Campo de Mayo und das 4. Pionierbataillon von Cordoba."
 expert_tactician2:0 "Taktikexperte"
 expert_tactician2_desc:0 "Nach seinem Abschluss an der Heeresakademie im Jahr 1915 lehrte Rodriguez an vielen unserer Einrichtungen. Seine Diensterfahrung in der deutschen 20. Infanteriedivision und den 5. Danziger Grenadieren machte ihn bei Studenten beliebt. An der Akademie lehrte er Generationen von Offizieren Taktik."
 paragon_of_the_army:0 "Vorbild der Armee"
 paragon_of_the_army_desc:0 "Rodriguez ist Vorsitzender des Militärkreises. Seine Rede über die Pflichten eines Soldaten, die er 1931 in der Versammlung hielt, fand großen Anklang und machte ihn zum angesehensten Offizier unserer Streitkräfte. Ein Vorbild, zu dem sowohl Rekruten als auch Offiziere aufschauen."
 ######## MANUEL SAVIO ########
 army_engineer4:0 "Armeeingenieur"
 army_engineer4_desc:0 "Savio ist von Beruf Ingenieur und weiß, wie er seine zivilen Fähigkeiten im Feld mit großer Wirkung einsetzen kann."
 ######## PEDRO P. ARGIREZ ########
 cavalry_specialist2:0 "Kavalleriespezialist"
 cavalry_specialist2_desc:0 "Im Jahr 1911 wurde Ramirez nach Deutschland geschickt, um dort bei der 5. Husarenkavallerie in Kaiser Wilhelms preußischer Armee zu trainieren. Die Erfahrungen, die er in dieser Zeit sammelte, machten ihn zu einem äußerst geschickten Mann im Umgang mit berittenen Truppen."

ra_pacific_shield_faction:0 "Pazifischer Schild"

