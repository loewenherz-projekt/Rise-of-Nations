 raforaff.517.b:0 "500 Rüstungsausrüstung."
 raforaff.517.c:0 "1000 Rüstungsausrüstung."
 raforaff.517.dd:0 "Wir können ihnen schließlich nicht helfen."
 #
 raforaff.518.t:0 "Versandvorbereitung: Kämpfer"
 raforaff.518.d:0 "\nUnser aktueller Lagerbestand ermöglicht es uns, die folgenden Sendungen zu versenden."
 raforaff.518.a:0 "100 Kämpfer."
 raforaff.518.b:0 "200 Kämpfer."
 raforaff.518.c:0 "300 Kämpfer."
 raforaff.518.dd:0 "Wir können ihnen schließlich nicht helfen."
 #
 raforaff.519.t:0 "Versandvorbereitung: Freiwillige"
 raforaff.519.d:0 "\nUnsere derzeit verfügbaren Kräfte ermöglichen es uns, die folgenden Sendungen zu versenden."
 raforaff.519.a:0 "2500 Freiwillige."
 raforaff.519.b:0 "5000 Freiwillige."
 raforaff.519.c:0 "10.000 Freiwillige."
 raforaff.519.dd:0 "Wir können ihnen schließlich nicht helfen." 
 #
 raforaff.520.t:0 "Versandvorbereitung: Freiwilligenabteilung"
 raforaff.520.d:0 "\nUnsere derzeit verfügbaren Kräfte ermöglichen es uns, die folgenden Sendungen zu versenden."
 raforaff.520.a:0 "Leichte Abteilung."
 raforaff.520.b:0 "Mittlere Division."
