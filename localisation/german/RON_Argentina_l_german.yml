 raarmy.3.t:0 "Große Militärparade"
 raarmy.3.d:0 "Die besten Soldaten und ihre Ausrüstung marschierten durch die Straßen von Buenos Aires und sorgten für eine Demonstration der Stärke, die sowohl Einheimische als auch eingeladene ausländische Würdenträger in Erstaunen versetzte. Während die Truppen marschierten, wandte sich der Armeechef in einer Rede an die Bevölkerung, die landesweit übertragen wurde. Die Worte des Chefs gaben unserem Volk inneren Frieden und Kraft, das nun mit Bewunderung für seine Zielstrebigkeit und Respekt für seine militärischen Fähigkeiten zur Armee aufblickt."
 raarmy.3.a:0 "San Martin wäre stolz."
 #
 raarmy.4.t:0 "Zustrom von Freiwilligen!"
 raarmy.4.d:0 "Die Neue Argentinische Armee begeistert weiterhin Männer aus dem ganzen Land. Die Rekrutierungsbüros sind überfüllt mit Freiwilligen, die sich melden möchten. Einige Offiziere äußerten sich besorgt darüber, ob die Armee so viele neue Männer auf einmal aufnehmen könne!\n\nDer Mangel an Betten scheint diese Männer jedoch nicht zu stören, sie alle wollen ihrem Land dienen."
 raarmy.4.a:0 "Argentinien grüßt diese Patrioten."
 raarmy.4.b:0 "Argentinien grüßt diese Patrioten."
 raarmy.4.c:0 "Argentinien grüßt diese Patrioten."
