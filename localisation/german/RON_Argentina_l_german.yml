 ra_social_welfare_ltd:0 "Soziale Wohlfahrt"
 ra_social_welfare_ext:0 "Soziale Wohlfahrt"
 ra_public_works_expertise:0 "Fachwissen im Bereich öffentliche Arbeiten"
 ra_public_works_expertise_desc:0 "Unser Land hat ein hohes Maß an Fachwissen im Bereich öffentlicher Arbeiten erreicht.\n\nDiese Idee verdichtet die Auswirkungen von:\n\nReorganisierte NBR\nAusweitung des Bergbaus\nIndustriegebietsplanung"
 ra_public_works_expertise2:0 "Fachwissen im Bereich öffentliche Arbeiten"
 ra_public_works_expertise2_desc:0 "Unser Land hat ein hohes Maß an Fachwissen im Bereich öffentlicher Arbeiten erreicht.\n\nDiese Idee verdichtet die Auswirkungen von:\n\nReorganisierte NBR\nAusweitung des Bergbaus\nIndustriegebietsplanung\nLos Berros Mine"
