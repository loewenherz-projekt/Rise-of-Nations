 raelections.1.t:0 "Wahlpolitik"
 raelections.1.d:0 "Der starke Mann der Radikalen, Marcelo T. de Alvear, ist aus dem spanischen Exil zurückgekehrt und hat der Wahlenthaltung der UCR ein Ende gesetzt. Die anhaltenden Unruhen verleihen der kommunistischen Partei und dem faschistischen Gedanken, der durch Hitlers und Mussolinis Erfolge in Europa gestärkt wurde, einen starken Aufschwung. Die Wahlen von 1937 finden zwar erst in einem Jahr statt, könnten sich aber als Wendepunkt in unserer Geschichte erweisen. Sollten wir versuchen, die Zügel unseres Landes um jeden Preis in der Hand zu behalten oder auf die Demokratie vertrauen und das Volk entscheiden lassen?"
 raelections.1.a:0 "Patriotischer Betrug."
 raelections.1.a_tt:0 "\nDie Rückkehr der Radikalen darf nicht zugelassen werden, selbst wenn dies eine Manipulation der Wahlen bedeutet. Wir werden alle uns zur Verfügung stehenden Mittel einsetzen, um ihre Hoffnungen zunichte zu machen.\n\n"
 raelections.1.b:0 "Transparenz."
 raelections.1.b_tt:0 "\nWir haben zwar schon früher fragwürdige Praktiken angewandt, aber jetzt ist es an der Zeit, unserem Volk zu zeigen, dass wir die Demokratie respektieren. Lassen Sie es entscheiden, wer am besten geeignet ist, unser Land zu führen.\n\n"
 #
 raelections.2.t:0 "Vorbereitung auf die Wahlen von 1937"
 raelections.2.d:0 "Im November 1937 wird sich die Zukunft unseres Landes entscheiden. Wenn wir unsere Ideale dabei einbringen wollen, bleibt noch viel zu tun."
 raelections.2.a:0 "Die Opposition verbieten."
 raelections.2.a_tt:0 "\nWir dürfen nicht zulassen, dass die Opposition unsere Regierung durch weitere Aufstände oder die Anstiftung des Militärs zur Machtübernahme untergräbt. Wir werden sie vollständig aus dem Weg räumen. Wer nicht flieht, landet gemeinsam mit seinen Kameraden im Gefängnis.\n"
 raelections.2.b:0 "Zentralisieren Sie die Regierung."
 raelections.2.b_tt:0 "\nDie Bürokratie der Regierung bremst uns nur aus. Um unsere Pläne schnell und effektiv umsetzen zu können, benötigen wir mehr Kontrolle über die Legislative und Judikative.\n"
 raelections.2.ca:0 "Steigern Sie die Popularität der Partei (Concordancia)."
 raelections.2.ca_tt:0 "\nConcordancia verkörpert die Ideale der Neutralität und Nichteinmischung.\n"
 raelections.2.cb:0 "Steigern Sie die Popularität der Partei (UNF)."
 raelections.2.cb_tt:0 "\nDie argentinische faschistische Partei verkörpert starke nationalistische Ideen.\n"
 raelections.2.da:0 "Warten wir es ab."
 raelections.2.da_tt:0 "\nWir haben derzeit nicht die Mittel, um die Wahlen zu beeinflussen, oder wollen sie auch nicht nutzen.\n"
 raelections.2.db:0 "Die Wahlen stehen vor der Tür."
 raelections.2.db_tt:0 "\nEs ist Zeit zu sehen, ob sich unsere Arbeit auszahlt.\n"
 #
 raelections.3.t:0 "Vorbereitung auf die Wahlen von 1937"
 raelections.3.d:0 "Im September 1937 wird sich die Zukunft unseres Landes entscheiden. Wenn wir mit unseren Idealen daran teilhaben wollen, bleibt noch viel zu tun."
 raelections.3.a:0 "Lassen Sie politische Gefangene frei."
 raelections.3.a_tt:0 "\nAuf der Isla Martin Garcia und in der Strafkolonie Ushuaia sind noch immer viele politische Gefangene aus den Revolten von 1933 gefangen. Wenn wir sie freilassen, zeigen wir dem Volk unseren guten Willen.\n\n"
 raelections.3.b:0 "Koalitionsregierung"
 raelections.3.b_tt:0 "\nWir werden als Zeichen des guten Willens Vertreter der anderen Parteien in Regierungsbereiche einbeziehen.\n\n"
 raelections.3.c:0 "Steigern Sie die Popularität Ihrer Party"
 raelections.3.c_tt:0 "\nWir können unseren politischen Einfluss nutzen, um die Popularität aller derzeit im Land aktiven Parteien zu steigern.\n\n"
 raelections.3.da:0 "Warten wir es ab."
 raelections.3.da_tt:0 "\nWir haben derzeit nicht die Mittel, um die Wahlen zu beeinflussen, oder wollen sie auch nicht nutzen.\n"
 raelections.3.db:0 "Die Wahlen stehen vor der Tür."
 raelections.3.db_tt:0 "Es ist Zeit, dass das Volk entscheidet."
 #
 raelections.4.t:0 "Steigern Sie die Popularität Ihrer Party"
 raelections.4.d:0 "Wählen Sie aus, welche Partei Sie populärer machen möchten."
 raelections.4.a:0 "Konkordancia."
 raelections.4.a_tt:0 "\nConcordancia verkörpert die Ideale der Neutralität und Nichteinmischung.\n"
 raelections.4.b:0 "Radical Civica Union."
 raelections.4.b_tt:0 "\nDie Radikale Bürgerunion ist die älteste Partei Argentiniens und tief in demokratischen Werten verwurzelt.\n"
 raelections.4.c:0 "Union Nacional Fascista."
 raelections.4.c_tt:0 "\nDie argentinische faschistische Partei verkörpert starke nationalistische Ideen.\n"
 raelections.4.da:0 "Partido Concentracion Obrera."
 raelections.4.da_tt:0 "\nDie PCO verkörpert die Ideale des Kommunismus.\n"
 #
 raelections.5.t:0 "Die Wahlen von 1937"
 raelections.5.d:0 "Aus allen Teilen des Landes treffen die Ergebnisse ein. Es gibt noch viel zu zählen, aber der Gewinner wird wohl ..."
 raelections.5.a:0 "Concordancia!"
 raelections.5.b:0 "UCR!"
 raelections.5.c:0 "UNF!"
 raelections.5.da:0 "PCO!"
 #
 raelectionsnews.1.t:0 "Wahlen 1937\nErste Ergebnisse deuten auf einen klaren Sieger hin!"
 raelectionsnews.1.da:0 "\n\nBei einer Wahlbeteiligung von über 75 % gingen die Argentinier im ganzen Land am 5. September an die Wahlurnen, um ihre bevorzugten politischen Parteien zu unterstützen. Obwohl die Rechtmäßigkeit des Ergebnisses angefochten werden könnte und wird – ein trauriges, aber häufiges Phänomen in unserer Politik –, ging eine Partei als klarer Sieger hervor.\n\nConcordancias Kandidat, Roberto Maria Ortiz, erhielt die Mehrheit der Stimmen und wird nach dem Ende von Präsident Justos Amtszeit im Februar nächsten Jahres die Präsidentschaft übernehmen."
 raelectionsnews.1.db:0 "\n\nBei einer Wahlbeteiligung von über 75 % gingen die Argentinier im ganzen Land am 5. September an die Wahlurnen, um ihre bevorzugten politischen Parteien zu unterstützen. Obwohl die Rechtmäßigkeit des Ergebnisses angefochten werden könnte und wird – ein trauriges, aber häufiges Phänomen in unserer Politik –, ging eine Partei als klarer Sieger hervor.\n\nDer Kandidat der Union Civica Radical, Marcelo T. de Alvear, erhielt zum zweiten Mal in seinem Leben die Mehrheit der abgegebenen Stimmen und wird nach dem Ende von Präsident Justos Amtszeit im Februar nächsten Jahres die Präsidentschaft übernehmen."
 raelectionsnews.1.dc:0 "\n\nBei einer Wahlbeteiligung von über 75 % gingen die Argentinier im ganzen Land am 5. September an die Wahlurnen, um ihre bevorzugten politischen Parteien zu unterstützen. Obwohl die Rechtmäßigkeit des Ergebnisses angefochten werden könnte und wird – ein trauriges, aber häufiges Phänomen in unserer Politik –, ging eine Partei als klarer Sieger hervor.\n\nDer Kandidat der Union Nacional Fascista, Nimio de Anquin, erhielt die Mehrheit der abgegebenen Stimmen und wird nach dem Ende von Präsident Justos Amtszeit im Februar nächsten Jahres die Präsidentschaft übernehmen."
 raelectionsnews.1.dd:0 "\n\nBei einer Wahlbeteiligung von über 75 % gingen die Argentinier im ganzen Land am 5. September an die Wahlurnen, um ihre bevorzugten politischen Parteien zu unterstützen. Obwohl die Legitimität des Ergebnisses angefochten werden könnte und wird – ein trauriges, aber häufiges Phänomen in unserer Politik –, ging eine Partei als klarer Sieger hervor.\n\nDer Kandidat der Partido Concentración Obrera, José Penelon, erhielt die Mehrheit der abgegebenen Stimmen und wird nach dem Ende von Präsident Justos Amtszeit im Februar nächsten Jahres die Präsidentschaft übernehmen."
 raelectionsnews.1.a:0 "Alles nach Plan."
 raelectionsnews.1.b:0 "Das Volk hat entschieden."
 #
 raelectionsnews.2.t:0 "Der 22. argentinische Präsident"
 raelectionsnews.2.d:0 "[Root.GetLeader] wurde heute vom scheidenden Präsidenten Pedro Agustín Justo im Rahmen einer Zeremonie im Nationalkongress offiziell in sein Amt eingeführt. Anwesend waren Senatoren, Delegierte, ausländische Würdenträger, nationale und internationale Reporter sowie zahlreiche Anhänger der Partei [Root.GetRulingParty], die unbedingt einen Platz in der ersten Reihe ergattern wollten, um zu sehen, wie ihr Kandidat die Präsidentenorchester entgegennimmt.\n\nNach der Zeremonie wandte sich Präsident [Root.GetLeader] in einer Rede an die Bevölkerung und versprach eine strahlende Zukunft für Argentinien. Während viele noch skeptisch sind, scheint die Botschaft des Präsidenten jenen Teil der Öffentlichkeit erreicht zu haben, der auf ein Ende der institutionellen Gewalt hofft, die die argentinische Politik in den letzten Jahren geplagt hat."
 raelectionsnews.2.a:0 "Hoffe auf das Beste, bereite dich auf das Schlimmste vor."
