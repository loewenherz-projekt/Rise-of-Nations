 ra_ecpb_YPF_cp:0 "Bauprojekt (YPF-Gebäude)"
 ra_ecpb_YPF_cp_desc:0 "Wir haben einen kleinen Teil unserer Baukapazitäten für den Bau des neuen YPF-Verwaltungsgebäudes eingesetzt."


 ra_zapla_mine_ex:0 "Bauprojekt (Zapla-Mine)"
 ra_zapla_mine_ex_desc:0 "Wir haben einen kleinen Teil unserer Baukapazitäten für die Erweiterung der Zapla-Mine eingesetzt."
 ra_ecpb_somisa_cp:0 "Bauprojekt (SOMISA)"
 ra_ecpb_somisa_cp_desc:0 "Wir haben einen großen Teil unserer Baukapazitäten für den Bau des SOMISA-Stahlwerks eingesetzt."
 ra_ecpb_ahz_cp:0 "Bauprojekt (Altos Hornos Zapla)"
 ra_ecpb_ahz_cp_desc:0 "Wir haben einen beträchtlichen Teil unserer Baukapazitäten für den Bau des Zapla-Hochofen- und Bergbaukomplexes eingesetzt."


 ra_developing_synthethic_industry:0 "Entwicklung unserer synthetischen Industrie"
 ra_developing_synthethic_industry_desc:0 "Einen erheblichen Teil unseres Budgets haben wir für den Ausbau der Kunststoffindustrie bereitgestellt. Neue Anlagen werden gebaut und Verfahren optimiert."
 #
 ra_rnbor:0 "Reorganisierte NBR"
 ra_rnbor_desc:0 "Das National Board of Roads ist bereit, unsere Infrastruktur überall dort auszubauen, wo wir sie benötigen."
 ra_posse_tax:0 "Die Posse-Steuer"
 ra_posse_tax_desc:0 "Straßenbau kostet nicht nur Zeit, sondern auch Geld. Steuern zahlt allerdings niemand gern. Es wird einige Zeit dauern, bis unsere Leute ihren Ärger überwunden haben."
 ra_cp_nbr_r123:0 "NBR-Projekt (Regionen I, II und III)"
 ra_cp_nbr_r123_desc:0 "Es werden Arbeiten zur Erweiterung unseres Straßennetzes in den nördlichen Regionen des Landes durchgeführt."
 ra_cp_nbr_r456:0 "NBR-Projekt (Regionen IV, V und VI)"
 ra_cp_nbr_r456_desc:0 "Es werden Arbeiten zur Erweiterung unseres Straßennetzes in den zentralen Regionen des Landes durchgeführt."
 ra_cp_nbr_r78:0 "NBR-Projekt (Regionen VII und VIII)"
 ra_cp_nbr_r78_desc:0 "Es werden Arbeiten zur Erweiterung unseres Straßennetzes und unserer Häfen in den südlichen Regionen des Landes durchgeführt."
 #
 ra_expanding_mining_ops:0 "Ausweitung des Bergbaubetriebs"
 ra_expanding_mining_ops_desc:0 "Wir stellen uns die enormen Ressourcen Argentiniens zur Verfügung, eine Ausgrabungsstätte nach der anderen."
 ra_comodoro_mp:0 "Bergbauprojekt (Comodoro Rivadavia)"
 ra_comodoro_mp_desc:0 "Wir erweitern die Ölförderung in Comodoro Rivadavia."
 ra_rio_turbio_mp:0 "Bergbauprojekt (Rio Turbio)"
 ra_rio_turbio_mp_desc:0 "Wir erweitern unseren Kohlebergbau in Rio Turbio."
 ra_rio_turbio_mp_phase_1:0 "Kohlenmine Rio Turbio (Phase 1)"
 ra_rio_turbio_mp_phase_1_desc:0 "Die Kohle des Rio Turbio ist der Treibstoff unserer Industrie."
 ra_rio_turbio_mp_phase_2:0 "Rio Turbio-Kohlebergwerke (Phase 2)"
 ra_rio_turbio_mp_phase_2_desc:0 "Die Kohle des Rio Turbio ist der Treibstoff unserer Industrie."
 ra_rio_turbio_mp_phase_3:0 "Rio Turbio-Kohlebergwerke (Phase 3)"
 ra_rio_turbio_mp_phase_3_desc:0 "Die Kohle des Rio Turbio ist der Treibstoff unserer Industrie."
 ra_san_carlos_mp:0 "Bergbauprojekt (San Carlos)"
 ra_san_carlos_mp_desc:0 "Wir erweitern unsere Bergbauaktivitäten in San Carlos."
 ra_cerro_aspero_mp:0 "Bergbauprojekt (Cerro Aspero)"
 ra_cerro_aspero_mp_desc:0 "Wir erweitern unsere Bergbauaktivitäten am Cerro Aspero."
 ra_los_berros_mp:0 "Bergbauprojekt (Los Berros)"
 ra_los_berros_mp_desc:0 "Wir erweitern unsere Bergbauaktivitäten nach Los Berros."
 ra_los_berros_mp_done:0 "Mine Los Berros"
 ra_los_berros_mp_done_desc:0 "Durch den einfachen Zugang zu Baumaterialien aus Los Berros können unsere Bauprojekte schneller voranschreiten."
 ra_zapla_forest_mp_study:0 "Zapla-Waldprospektion"
 ra_zapla_forest_mp_study_desc:0 "Wir arbeiten daran, die Erkenntnisse von Herrn Wenceslao zum Zapla-Wald zu bestätigen. Die Prospektion ist im Gange, ebenso wie einige Verbesserungen an der Infrastruktur und den Dienstleistungen des Gebiets."
 #
 ra_industrial_zoning:0 "Industriegebiet"
 ra_industrial_zoning_desc:0 "Wir arbeiten daran, bedarfsgerechte Flächen für die Ansiedlung von Industriebetrieben zu schaffen."
 ra_buenos_aires_iz:0 "Industriegebiet (Buenos Aires)"
