 ## THEORISTS
 ##
 #ARGON GAVIOLA
 ARG_ramon_gaviola_th:0 "Ramon E. Gaviola"
 astrophysicist_th:0 "Astrophysiker"
 astrophysicist_th_desc:0 "Nach seinem Abschluss als Landvermesser an der Universität La Plata reiste Gaviola nach Deutschland und studierte Physik bei bedeutenden Denkern wie Max Planck, Max Born und Albert Einstein. Er schloss sein Studium 1926 ab und bewarb sich um ein Stipendium in Baltimore, das ihm dank Einsteins Unterstützung gewährt wurde. In den USA arbeitete Gaviola an der Seite von Robert Wood, dem damals führenden Experimentalphysiker. 1931 kehrte er nach Argentinien zurück und förderte die wissenschaftliche Entwicklung des Landes."

 #JUAN P. BAIGORRI
 ARG_juan_baigorri_velar_th:0 "Juan P. Baigorri Velar"
 rainmaker_th:0 "Der Regenmacher"
 rainmaker_th_desc:0 "Baigorri Velar studierte am National College von Buenos Aires, reiste später nach Italien und schloss sein Ingenieurstudium mit Schwerpunkt Geophysik an der Universität Mailand ab. Er bereiste die Welt und arbeitete für verschiedene Ölkonzerne, bis Mosconi ihn 1929 bat, nach Argentinien zurückzukehren und sich YPF anzuschließen. Baigorri ist dafür bekannt, seine eigenen Instrumente zu bauen, aber eines davon interessiert uns besonders: die Regenmaschine. Während viele Experten die Implikationen belächeln, behaupten andere, das Instrument selbst könne auch andere, praktischere Anwendungen haben."
 radar_tech_research:0 "Radartechnologieforschung"
 #ENRIQUE FINOCHIETTO
 ARG_enrique_finochietto_th:0 "Enrique Finochietto"
 prodigal_physician_th:0 "Verschwenderischer Arzt"
 prodigal_physician_th_desc:0 "Finochietto schloss 1901 im Alter von nur 20 Jahren sein Medizinstudium an der Universität von Buenos Aires ab. Zwischen 1906 und 1909 bereiste er Europa und lernte an medizinischen Zentren in Deutschland, der Schweiz, Italien und Frankreich. Anschließend kehrte er mit fortgeschrittenen Operationstechniken nach Argentinien zurück. 1918 kehrte er nach Europa zurück und wurde Chefchirurg am argentinischen Hilfskrankenhaus 108 in Passy, wo er Kriegsverletzte versorgte. Seitdem bilden er und seine Brüder Miguel und Ricardo das berühmteste Operationsteam des Landes. Finochiettos Techniken und viele seiner handgefertigten Operationsinstrumente sind revolutionär und haben sich weltweit verbreitet."
 hospital_tech_research:0 "Feldlazarettforschung"
 #MANUEL SAVIO
 ARG_manuel_savio_th:0 "Manuel Savio"
 genius_industrialist_th:0 "Genialer Industrieller"
 #genius_industrialist_th_desc:0 "Savio considers it his mission to develop Argentina's heavy industry."
 basic_machine_tools_research:0 "Grundlagenforschung im Werkzeugmaschinenbau"
 improved_machine_tools_research:0 "Verbesserte Werkzeugmaschinenforschung"
 advanced_machine_tools_research:0 "Forschung zu fortgeschrittenen Werkzeugmaschinen"
 assembly_line_production_research:0 "Forschung zur Fließbandproduktion"
 streamlined_line_research:0 "Optimierte Linienforschung"
 flexible_line_research:0 "Flexible Line Research"
 #CARLOS BECKE
 ARG_carlos_becke_th:0 "Carlos von der Becke"
 master_planner_th:0 "Doktrin des Großen Schlachtplans"
 #master_planner_th_desc:0 "It takes a brave man to start a fight he can't win. It takes a smart man to start a war he can't lose."
 engineers_tech_research:0 "Ingenieurunternehmen Forschung"
 #AGUSTIN P. JUSTO
 ARG_agustin_justo_th:0 "Agustin P. Justo"
 firepower_doctrine_land_th:0 "Feuerkraft-Doktrin"
 #firepower_doctrine_land_th_desc:0 "The Great War showed us the devastating effects of artillery. Imagine the death we can rain upon our enemies with the technological advancements that have been made since then."
 interwar_artillery_research:0 "Artillerieforschung zwischen den Kriegen"
 artillery1_research:0 "Verbesserte Artillerieforschung"
 artillery2_research:0 "Verbesserte Artillerie-Upgrades I Forschung"
 artillery3_research:0 "Forschung zu verbesserten Artillerie-Upgrades II"
 artillery4_research:0 "Fortgeschrittene Artillerieforschung"
 artillery5_research:0 "Forschung zu fortgeschrittenen Artillerie-Upgrades"
 #PEDRO ARGIREZ
 ARG_pedro_ramirez_th:0 "Pedro P. Ramirez"
 mobile_warfare_doctrine_th:0 "Mobile Kriegsführungsdoktrin"
 #mobile_warfare_doctrine_th_desc:0 "Trench warfare is a thing of the past. Our country can't afford the cost of life entailed with Great War tactics nor the economical pressure of long winded conflicts. A new doctrine has emerged, first seen on the Polish-Soviet War of 1919. Generals across Europe are experimenting with it and it won't be long before the way wars are waged is changed completely."
 #ALFREDO BAISI
 ARG_alfredo_baisi_th:0 "Alfredo Baisi"
 genius_tank_designer_th:0 "Genialer Panzerdesigner"
 genius_tank_designer_th_desc:0 "Baisis Position im De Luca Arsenal verschaffte ihm Zugang zu einer Vielzahl militärischer Ausrüstung. Sein Wissen über gepanzerte Fahrzeuge ist bemerkenswert, insbesondere angesichts der mangelnden Erfahrung unseres Landes damit. Mit dem entsprechenden Budget ist nicht abzusehen, was aus seinem Einfallsreichtum noch entstehen könnte."
 #FRANCISCO ARTEAGA
 ARG_francisco_arteaga_th:0 "Francisco de Arteaga"
 genius_aircraft_designer_th:0 "Genialer Flugzeugdesigner"
 genius_aircraft_designer_th_desc:0 "Arteagas Militärkarriere begann glänzend. Er erhielt großes Lob von seinen Lehrern und Vorgesetzten in Argentinien und Frankreich, wo er sich auf Artillerie spezialisierte. 1916 meldete er sich zum großen Missfallen der Armee in den Ruhestand, doch dies war nur der Beginn eines neuen Abschnitts in seinem Leben. Von der Luftfahrt angezogen, zog Arteaga 1916 nach Paris, um diese neue Technologie aus erster Hand zu studieren. Er besuchte die École supérieure de l’Aeronautics et des Mechanikus in Paris, wo er 1918 sein Studium als Luftfahrtingenieur abschloss und der erste Argentinier mit diesem Fachgebiet wurde. Arteaga blieb noch zwei weitere Jahre in Europa und lernte so viel wie möglich. Voller theoretischer und praktischer Kenntnisse kehrte er 1922 nach Argentinien zurück. 1925 stellte er sein Projekt für eine Flugzeugfabrik auf argentinischem Boden vor, das schnell genehmigt und in die Tat umgesetzt wurde. Die FMA öffnete 1927 ihre Türen, weniger als ein Jahr später hatte Argentinien bereits seinen ersten Doppeldecker, den Avro K-504 „Gosport“, gebaut. Arteaga ist jedoch der Meinung, dass wir uns nicht auf lizenzierte Modelle verlassen müssen, sondern befürwortet die Idee, unsere eigenen zu bauen."
