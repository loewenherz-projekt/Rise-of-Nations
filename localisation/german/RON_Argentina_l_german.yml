 #
 # LAMAS TREATY EVENTS
 #
 raforaff.2.t:0 "Der Saavedra Lamas-Vertrag"
 raforaff.2.d:0 "Wir unterzeichneten den Saavedra-Lamas-Vertrag 1933, nach dem Chaco-Boreal-Krieg zwischen Paraguay und Bolivien. Der Vertrag wurde vom damaligen argentinischen Außenminister Saavedra Lamas verfasst und zielt darauf ab, den Frieden und die guten Beziehungen zwischen den Nachbarn in der Region und darüber hinaus zu wahren."
 raforaff.2.a:0 "Oh ja, das haben wir unterschrieben ..."
 raforaff.2.a_tt:0 "Alle Unterzeichnerstaaten gewinnen engere diplomatische Beziehungen."
 #
 raforaff.4.t:0 "Steigende Spannungen in der Welt"
 raforaff.4.d:0 "Die jüngsten Ereignisse in der Welt stellen unsere Einhaltung des Saavedra-Lamas-Vertrags in Frage. Die Meinungen gehen auseinander: Diejenigen, die glauben, der Vertrag könnte unsere eigenen Ziele behindern, und diejenigen, die ihn als zusätzlichen Schutz gegen eine zunehmend gefährliche Welt betrachten. Artikel 17 des Vertrags besagt, dass jede Partei, die austreten möchte, eine Kündigungsfrist von einem Jahr einhalten muss. In dieser Zeit kann jedoch viel passieren."
 raforaff.4.a:0 "Halten Sie sich an Artikel 17 und senden Sie die Mitteilung."
 raforaff.4.b:0 "Wir können nicht so lange warten, bereiten Sie sich auf unseren sofortigen Rückzug vor."
 raforaff.4.c:0 "Halten Sie den Vertrag ein."
 #
 raforaff.5.t:0 "Rückzug aus dem Saavedra Lamas-Vertrag"
 raforaff.5.d:0 "Die in Artikel 17 des Vertrags vorgeschriebene einjährige Wartezeit ist abgelaufen. Während andere Länder aufgrund unseres Rückzugs nervös werden, konnten wir dies durch die Einhaltung des etablierten Protokolls als Akt der Souveränität und nicht als Akt der Aggression darstellen."
 raforaff.5.a:0 "Sehr gut, erledigen Sie den Papierkram."
 raforaff.5.a_tt:0 "Entfernt den Nationalgeist §YSaavedra Lamas Treaty.§! und die dazugehörigen Meinungsmodifikatoren.\n\nDie erforderlichen Zeiten der Begründungen werden nicht automatisch aktualisiert, Sie müssen sie manuell zurücksetzen."
 raforaff.5.b:0 "Wir haben es uns anders überlegt. Bleiben Sie im Vertrag."
 #
 raforaff.6.t:0 "Bruch mit dem Saavedra Lamas-Vertrag"
 raforaff.6.d:0 "Wir haben eine Erklärung verfasst, in der wir den Vertrag anprangern, und sind nun bereit, sie der Öffentlichkeit vorzustellen. Kritiker dieses Plans in unserer Partei warnen uns, dass ein solch überstürztes Vorgehen unsere Beziehungen zu den anderen Unterzeichnern schwer schädigen wird."
 raforaff.6.a:0 "Wir werden die Konsequenzen tragen und den Vertrag kündigen."
 raforaff.6.a_tt:0 "Entfernt den Nationalgeist §YSaavedra Lamas-Vertrag.§!\nJedes andere Unterzeichnerland erhält §YUnzuverlässigkeit§! (Meinung von §Y[Root.GetName]§! §R-75§!)\n\nDie erforderlichen Zeiten der Begründungen werden nicht automatisch aktualisiert, Sie müssen sie manuell zurücksetzen."
 raforaff.6.b:0 "Das ist ein zu gefährlicher Schritt, wir werden das Protokoll befolgen."
 raforaff.6.b_tt:0 "Wir müssen ein ganzes Jahr warten, bevor wir aus dem Vertrag aussteigen können."
 raforaff.6.c:0 "Wir haben es uns anders überlegt. Bleiben Sie im Vertrag."
 #
 raforaff.9.t:0 "Die „Unannehmlichkeiten der Lamas“"
 raforaff.9.d:0 "Die durch den Saavedra-Lamas-Vertrag geschaffenen Protokolle behindern unsere Außenpolitik. Wir sind gezwungen, uns durch Mediatoren, Versöhnungskomitees und alle möglichen Einmischungsmechanismen zu kämpfen. Das gibt unseren Feinden mehr Zeit zur Vorbereitung und zwingt uns, besonders hart zu arbeiten, um die öffentliche Meinung auf unsere Seite zu ziehen. Wir könnten aus dem Vertrag austreten, doch das Protokoll sieht eine Kündigungsfrist von einem Jahr vor. Wir könnten ihn auch kündigen, doch die politischen Reaktionen der anderen Unterzeichner könnten heftig ausfallen."
 raforaff.9.a:0 "Halten Sie sich an Artikel 17 und senden Sie die Mitteilung."
 raforaff.9.b:0 "Wir können nicht so lange warten, bereiten Sie sich auf unseren sofortigen Rückzug vor."
 raforaff.9.c:0 "Wir werden die Protokolle des Vertrags durcharbeiten."
 #
 raforaff.11.t:0 "Ein Unterzeichner der Lamas hat einen Krieg begonnen"
 raforaff.11.d:0 "Trotz unserer und der anderen Unterzeichnerstaaten Bemühungen, dies zu verhindern, hat [From.GetName] einen Weg gefunden, die Protokolle des Vertrags zu umgehen und einen Krieg zu rechtfertigen. Dies hat bei unserem Volk Besorgnis und Empörung ausgelöst, da es keinen Sinn darin sieht, den Vertrag einzuhalten, wenn man sich einfach herausreden kann. Wir könnten diese Gelegenheit zum Austritt nutzen, doch Artikel 17 sieht eine einjährige Kündigungsfrist vor."
 raforaff.11.a:0 "Halten Sie sich an Artikel 17 und senden Sie die Mitteilung."
 raforaff.11.b:0 "Wir können nicht so lange warten, bereiten Sie sich auf unseren sofortigen Rückzug vor."
 raforaff.11.c:0 "Halten Sie den Vertrag ein."
 #
 # LAMAS TREATY NEWS
 #
 raforaff.13.t:0 "[From.GetName] zieht sich aus dem\nSaavedra Lamas-Vertrag zurück"
 raforaff.13.d:0 "\n\nTrotz aller Bemühungen anderer Unterzeichner, [From.GetName] zum Verbleib im Vertrag zu bewegen, scheint ihre Entscheidung ungebrochen. Obwohl dies seit ihrer Ankündigung vor über einem Jahr ein mögliches Ergebnis war, hatten viele gehofft, dass sie ihre Meinung ändern würden. Die Konsequenzen und Auswirkungen sind noch unklar, doch die Behörden spielen die Bedeutung herunter und versuchen, die Bevölkerung zu beruhigen."
 raforaff.13.a:0 "Es ist ihre Entscheidung"
 #
 raforaff.14.t:0 "[From.GetName] bricht mit dem\n Saavedra Lamas-Vertrag"
 raforaff.14.d:0 "\n\nIn einer unerwarteten Wendung der Ereignisse hat [From.GetName] seinen sofortigen Ausstieg aus dem Saavedra-Lamas-Vertrag angekündigt und damit gegen Artikel 17 des Protokolls verstoßen, der eine einjährige Kündigungsfrist vorsieht. Alle anderen Unterzeichner haben formelle Beschwerden eingereicht, doch es ist höchst unwahrscheinlich, dass sich ihre Entscheidung ändert. Obwohl die lokalen Behörden sich noch nicht klar zur Reaktion unseres Landes geäußert haben, ist es sicher, dass [From.GetName]s überstürztes Handeln unser Verhältnis zu ihnen für einige Zeit belasten wird."
 raforaff.14.a:0 "Diese unzuverlässigen Schurken!"
 #
 raforaff.12.t:0 "[From.GetName] möchte aus dem Saavedra Lamas-Vertrag aussteigen"
 raforaff.12.d:0 "\n\n[From.GetName] hat heute die in Artikel 17 des Vertrags vorgesehene Austrittserklärung eingereicht. Dieser Schritt hat viele unserer Bürger überrascht und beunruhigt. Die lokalen Behörden und Vertreter der anderen Unterzeichnerstaaten haben versucht, die Bevölkerung zu beruhigen und ihr versichert, dass sie alles tun werden, um [From.GetName] vor Ablauf der einjährigen Frist für den Abschluss des Austrittsverfahrens umzustimmen."
 raforaff.12.a:0 "Besorgniserregend."
 #
 # FOREIGN POLICY BRANCH EVENTS/NEWS
 #
 raforaff.16.t:0 "Erbe des Vizekönigreichs"
 raforaff.16.d:0 "Unsere Regierung profitierte zwar von der jüngsten Rhetorik rund um Argentiniens Gebietsansprüche und stärkte so den Nationalismus im ganzen Land, doch dieses politische Manöver hatte offenbar auch andere Folgen. Kneipen, Restaurants, Clubs und praktisch jeder Ort, an dem sich Menschen versammeln, wurden zu spontanen Diskussionsforen. Dieses ungebrochene Interesse führte zu einer breiten Berichterstattung in Lokalzeitungen und Radiosendern, mit langen Artikeln und Interviews, die alle möglichen Szenarien – von politischen bis hin zu kriegerischen Lösungen – beleuchteten. Auch wenn die Radikalisierung der Regierung langfristig Vorteile bringen könnte, besteht kein Zweifel daran, dass unsere Nachbarn dies zur Kenntnis nehmen werden."
 raforaff.16.a:0 "Es musste passieren."
 #
 raforaff.17.t:0 "Das 100-Jahre-Dilemma"
 raforaff.17.da:0 "Auch wenn die Straßen vor Nationalismus sprühen, bedarf es deutlich mehr Gelassenheit, wenn wir die Kontrolle über die Malwinen und Georgien zurückgewinnen wollen. Unsere politischen Berater wissen, dass dies zwar unsere stärksten Ansprüche sind, England aber kaum durch rechtliche Aspekte beeinflusst werden kann. Unsere Militärberater hingegen sind sich einig, dass England auch ohne seine Verbündeten ein mächtiger Feind wäre."
 raforaff.17.db:0 "Auch wenn die Straßen vor Nationalismus sprühen, bedarf es deutlich mehr Gelassenheit, wenn wir die Kontrolle über die Malvinen und Georgien zurückgewinnen wollen. Unsere politischen Berater wissen, dass dies zwar unsere stärksten Ansprüche sind, England aber rechtlich kaum überzeugen wird. Unsere Militärberater hingegen sind sich einig, dass England auch ohne seine Verbündeten ein mächtiger Feind wäre. Die Verhandlungen mit den Briten sind gescheitert, aber uns stehen noch andere Optionen offen."
 raforaff.17.a:0 "Verhandeln Sie direkt mit Großbritannien."
 raforaff.17.a_tt:0 "Direkte Verhandlungen mit den Engländern sind eine sichere Option, obwohl die erzielten Bedingungen wahrscheinlich nicht günstig ausfallen werden, sofern sie überhaupt bereit sind, am Verhandlungstisch zu sitzen.\n\n"
 raforaff.17.b:0 "Beantragen Sie ein Schiedsverfahren in den USA."
 raforaff.17.b_tt:0 "Obwohl die Geschichte zeigt, dass die USA unseren Ansprüchen gegenüber nicht besonders parteiisch sind, wäre es für sie schwierig, eine Kolonialmacht gegen ein anderes amerikanisches Land zu unterstützen.\n\nEin ungünstiger Schiedsspruch wäre allerdings schwer zu umgehen.\n\nDiese Ereignislinie ist noch nicht abgeschlossen!"
 raforaff.17.c:0 "Bringen Sie die Angelegenheit vor den Völkerbund."
 raforaff.17.c_tt:0 "Der Völkerbund mag ins Wanken geraten, aber vielleicht können wir das zu unserem Vorteil nutzen. Sollten wir die Unterstützung der wichtigsten Unterzeichnerstaaten gewinnen, müsste England sich entscheiden, ob es sich an die Entscheidung des Völkerbundes hält oder ihre Nutzlosigkeit beweist.\n\nDiese Ereignislinie ist noch nicht abgeschlossen!"
 raforaff.17.dd:0 "Vollendete Tatsachen."
 raforaff.17.dd_tt:0 "Es ist töricht, die Engländer vorher zu warnen. Wenn es Krieg geben muss, dann zu unseren Bedingungen. Wir könnten die Inseln mit einer schnellen Landungsoperation zurückerobern und eine solide Verteidigung aufbauen, bevor die Engländer überhaupt davon erfahren.\n\nDiese Ereignislinie ist noch nicht abgeschlossen!"
 #
 raforaff.18.ta:0 "Das 100-Jahre-Dilemma"
 raforaff.18.tb:0 "Die Argentinier sind zurück"
 raforaff.18.da:0 "Die argentinische Regierung hat eine Delegation entsandt, die ein Abkommen über die Souveränität der Falklandinseln und Südgeorgien aushandeln soll. Obwohl argentinische Proteste nichts Neues sind – und dieses Ereignis in unseren Zeitungen kaum Beachtung fand – markiert dies einen Wandel in der sonst eher passiven Außenpolitik des Landes. Der Archipel liegt strategisch günstig, ist aber von Großbritannien aus praktisch am anderen Ende der Welt. Ein Krieg wäre kostspielig, sowohl für unser Militär als auch für unsere Wirtschaft, die große Interessen in Argentinien hat. Schließlich könnte jeder Angriff auf argentinischem Boden die gesamte Region, sogar die USA, gegen uns aufbringen. Wir sollten unsere Entscheidung sorgfältig überdenken."
 raforaff.18.db:0 "Die zwei Monate, die wir von Argentinien zur Prüfung seines Verhandlungsantrags verlangt haben, sind verstrichen. Die Delegation ist zurück und verlangt eine formelle Antwort."
 raforaff.18.a:0 "Es gibt nichts zu verhandeln. Diese Inseln sind britisches Territorium."
 raforaff.18.b:0 "Halten Sie sie auf, dann hat unser Militär Zeit, sich auf das Schlimmste vorzubereiten." 
 raforaff.18.c:0 "Wir werden uns mit ihrer Delegation treffen und sehen, was sie vorschlagen."
 #
 raforaff.19.ta:0 "Die Engländer weigern sich zu verhandeln!"
 raforaff.19.tb:0 "Die Engländer weigern sich schließlich zu verhandeln!"
 raforaff.19.da:0 "Wie von vielen unserer Berater erwartet, haben die Engländer unsere Delegation zurückgeschickt, ohne sie überhaupt getroffen zu haben. Das ist zwar ärgerlich, aber vielleicht keine völlige Zeitverschwendung. Ihr mangelnder Wille, ein friedliches Abkommen zu erreichen, wird es uns leichter machen, die öffentliche Meinung auf dem Kontinent auf unsere Seite zu ziehen."
 raforaff.19.db:0 "Wie von vielen unserer Berater erwartet, entließen die Briten unsere Delegation schließlich ohne Anhörung, obwohl wir vereinbart hatten, zwei Monate mit den Verhandlungen zu warten. So ärgerlich das auch war, es war vielleicht keine völlige Zeitverschwendung. Ihr mangelnder Wille, ein friedliches Abkommen zu erreichen, wird es uns leichter machen, die öffentliche Meinung auf dem Kontinent auf unsere Seite zu ziehen."
 raforaff.19.a:0 "Stolz wird ihr Untergang sein."
 #
 raforaff.20.t:0 "England lehnt Argentiniens Antrag auf friedliche Verhandlungen ab!"
 raforaff.20.da:0 "\n\nEine diplomatische Mission der argentinischen Regierung nach England mit dem Ziel, eine friedliche Einigung über die Souveränität der Malvinen und Georgiens zu erzielen – Gebiete, die seit über hundert Jahren umstritten sind – wurde von den englischen Behörden umgehend abgewiesen.\n\nWährend noch unklar ist, wie Argentinien auf diesen „Mangel an politischer Etikette“ reagieren wird, ist es wahrscheinlich, dass die Menschen in ganz Amerika die Haltung Londons als Fortsetzung seiner alten Tendenz zu imperialistischem Verhalten betrachten werden."
 raforaff.20.db:0 "\n\nEine diplomatische Mission der argentinischen Regierung nach England mit dem Ziel, eine friedliche Einigung über die Souveränität der Malvinen und Georgiens zu erzielen – Gebiete, die seit über hundert Jahren umstritten sind – musste zwei Monate warten und wurde dann von den englischen Behörden vor die Tür gesetzt, ohne dass man sie überhaupt anhörte.\n\nWährend noch unklar ist, wie Argentinien auf diesen „Mangel an politischer Etikette“ reagieren wird, ist es wahrscheinlich, dass die Menschen in ganz Amerika die Haltung Londons als Fortsetzung seiner alten Tendenz zu imperialistischem Verhalten betrachten werden."
 raforaff.20.a1:0 "Kolonialismus in seiner schlimmsten Form"
 raforaff.20.b1:0 "Boulevard-Müll!"
 raforaff.20.c1:0 "Amerika ist mit uns!"
 raforaff.20.dd:0 "Besorgniserregend"
 #
 raforaff.21.t:0 "England bittet um Bedenkzeit!"
 raforaff.21.d:0 "Die von uns nach England entsandte Delegation berichtet, dass die dortige Regierung um zwei Monate gebeten habe, um die Angelegenheit zu prüfen. Die meisten unserer Berater sind sich einig, dass es sich dabei lediglich um eine Verzögerungstaktik handelt, um Zeit zu gewinnen, um die militärische Präsenz in der Region zu verstärken.\n\nObwohl dies höchstwahrscheinlich zutrifft, bleibt uns kaum etwas anderes übrig, als abzuwarten, damit unsere Weigerung nicht als Verhandlungsunwillige dargestellt wird."
 raforaff.21.a:0 "Sehr gut, wir werden warten."
 #
 raforaff.22.t:0 "England erklärt sich zu Verhandlungen bereit!"
 raforaff.22.d:0 "Entgegen den meisten unserer Prognosen hat die englische Regierung Verhandlungen zugestimmt. Obwohl die meisten unserer Berater skeptisch bleiben, was die tatsächlichen Ergebnisse angeht, ist dies eine Gelegenheit, die wir uns nicht entgehen lassen dürfen. Sollten die Engländer tatsächlich zu einer Einigung bereit sein, werden sie höchstwahrscheinlich einen hohen Preis erzielen, insbesondere wenn sie genau wissen, was wir wollen. Die Südgeorgien sind nicht dauerhaft besiedelt, und ihre wirtschaftliche Bedeutung als Walfangstationen hat mit dem Anstieg des Heizölpreises abgenommen. Welches Abkommen wir auch immer erzielen, die Malvinen stehen im Mittelpunkt und werden mit Sicherheit zu Gunsten Englands ausfallen. Wir müssen nur noch entscheiden, wie viel wir bereit sind, für sie zu zahlen."
 raforaff.22.a:0 "Vorschlag A"
 raforaff.22.a_tt:0 "Wir werden den Malvinensern die doppelte Staatsbürgerschaft anbieten und sie einladen, auf den Inseln zu bleiben.\n\nWenn dieser Vorschlag angenommen wird, hat er folgende Auswirkungen:\n\n@ENG§YVereinigtes Königreich§! tritt §YFalklandinseln§! und §YSüdgeorgien§! an @ARG§YArgentinien§! ab.\n\n@ARG§YArgentinien§! und @ENG§YVereinigtes Königreich§! unterzeichnen einen Nichtangriffspakt.\n\n(@ARG§YArgentinien§!) erhält §YLondoner Vertrag§! (Meinung von @ENG§YVereinigtes Königreich§! §G+50§!).\n(@ENG§YVereinigtes Königreich§!) erhält §YLondoner Vertrag§! (Meinung von @ARG§YArgentinien§! §G+50§!).\n\n---\n\n"
 raforaff.22.b:0 "Vorschlag B"
 raforaff.22.b_tt:0 "Wir werden den Malvinensern die doppelte Staatsbürgerschaft anbieten und sie einladen, auf den Inseln zu bleiben. Diejenigen, die gehen möchten, werden entschädigt.\n\nWenn dieser Vorschlag angenommen wird, hat er folgende Auswirkungen:\n\n@ENG§YVereinigtes Königreich§! tritt die §YFalklandinseln§! und §YSüdgeorgien§! an @ARG§YArgentinien§! ab.\n\n@ARG§YArgentinien§! und @ENG§YVereinigtes Königreich§! unterzeichnen einen Nichtangriffspakt.\n\n(@ARG§YArgentinien§!) erhält den §YLondoner Vertrag§! (Meinung von @ENG§YVereinigtes Königreich§! §G+50§!).\n(@ENG§YVereinigtes Königreich§!) erhält den §YLondoner Vertrag§! (Meinung von @ARG§YArgentinien§! §G+50§!).\n\n@ARG§YArgentinien§! erhält die §YMalvinas-Entschädigung§! des Nationalgeistes, die (Konsumgüterfabriken §R+3%§!) für fünf Jahre gewährt.\n@ENG§YVereinigtes Königreich§! erhält die §YFalkland-Entschädigung§! des Nationalgeistes, die (Konsumgüterfabriken §G-3%§!) für fünf Jahre gewährt.\n\n---\n\n"
 raforaff.22.c:0 "Vorschlag C"
 raforaff.22.c_tt:0 "Wir bieten den Malvinensern die doppelte Staatsbürgerschaft an und laden sie ein, auf den Inseln zu bleiben. Diejenigen, die gehen möchten, werden entschädigt. Außerdem gewähren wir englischen Unternehmen, die in Argentinien Geschäfte machen, eine Vorzugsbehandlung.\n\nWenn dieser Vorschlag angenommen wird, hat er folgende Auswirkungen:\n\n@ENG§YVereinigtes Königreich§! tritt die §YFalklandinseln§! und §YSüdgeorgien§! an @ARG§YArgentinien§! ab.\n\n@ARG§YArgentinien§! und @ENG§YVereinigtes Königreich§! unterzeichnen einen Nichtangriffspakt.\n\n(@ARG§YArgentinien§!) erhält den §YLondoner Vertrag§! (Meinung von @ENG§YVereinigtes Königreich§! §G+50§!).\n(@ENG§YVereinigtes Königreich§!) erhält den §YLondoner Vertrag§! (Meinung von @ARG§YArgentinien§! §G+50§!).\n\n@ARG§YArgentinien§! erhält Nationalgeist §YMalvinas-Entschädigung§!, die (Konsumgüterfabriken §R+3%§!) für fünf Jahre gewährt.\n@ENG§YVereinigtes Königreich§! erhält Nationalgeist §YFalkland-Entschädigung§!, die (Konsumgüterfabriken §G-3%§!) für fünf Jahre gewährt.\n\n@ENG§YVereinigtes Königreich§! erhält §YPeferential Treatment§! (Handelsbeziehungen mit @ARG§YArgentinien§! §G+75§!) für fünf Jahre.\nJedes Land außer @ENG§YVereinigtes Königreich§! erhält §YBevorzugung§! (Handelsbeziehungen mit @ARG§YArgentina§! §R-25§!) für fünf Jahre.\n\n---\n\n"
 raforaff.22.dd:0 "Vorschlag D"
 raforaff.22.dd_tt:0 "Wir bieten den Malvinensern die doppelte Staatsbürgerschaft an und laden sie ein, auf den Inseln zu bleiben. Diejenigen, die gehen möchten, werden entschädigt. Außerdem gewähren wir englischen Unternehmen, die in Argentinien Geschäfte machen, Vorzugsbehandlung und stellen der britischen Marine logistische Unterstützung im Südatlantik zur Verfügung.\n\nWenn dieser Vorschlag angenommen wird, hat er folgende Auswirkungen:\n\n@ENG§YVereinigtes Königreich§! tritt die §YFalklandinseln§! und §YSüdgeorgien§! an @ARG§YArgentinien§! ab.\n\n@ARG§YArgentinien§! und @ENG§YVereinigtes Königreich§! unterzeichnen einen Nichtangriffspakt.\n\n(@ARG§YArgentinien§!) erhält den §YLondoner Vertrag§! (Meinung von @ENG§YVereinigtes Königreich§! §G+50§!).\n(@ENG§YVereinigtes Königreich§!) erhält §YLondoner Vertrag§! (Meinung von @ARG§YArgentinien§! §G+50§!).\n\n@ARG§YArgentinien§! erhält Nationalgeist-§YMalvinas-Entschädigung§!, die (Konsumgüterfabriken §R+3%§!) für fünf Jahre gewährt.\n@ENG§YVereinigtes Königreich§! erhält Nationalgeist-§YFalkland-Entschädigung§!, die (Konsumgüterfabriken §G-3%§!) für fünf Jahre gewährt.\n\n@ENG§YVereinigtes Königreich§! erhält §YPeferential Treatment§! (Handelsbeziehungen mit @ARG§YArgentinien§! §G+75§!) für fünf Jahre.\nJedes Land außer @ENG§YVereinigtes Königreich§! erhält §YBevorzugung§! (Handelsbeziehungen mit @ARG§YArgentinien§! §R-25§!) für fünf Jahre.\n\n@ARG§YArgentinien§! gewährt @ENG§YVereinigtes Königreich§! für fünf Jahre militärischen Zugang.\n\n---\n\n"
 #
 raforaff.23.ta:0 "Argentiniens Vorschlag"
 raforaff.23.tb:0 "Argentiniens neuer Vorschlag"
 raforaff.23.da:0 "Die argentinische Regierung bietet jedem Falklandbewohner die doppelte Staatsbürgerschaft an und lädt ihn ein, auf den Inseln zu bleiben."
 raforaff.23.db:0 "Die argentinische Regierung bietet allen Falklandbewohnern die doppelte Staatsbürgerschaft an und lädt sie ein, auf den Inseln zu bleiben. Wer die Inseln verlassen möchte, erhält eine Entschädigung."
 raforaff.23.dc:0 "Die argentinische Regierung bietet allen Falklandinseln die doppelte Staatsbürgerschaft an und lädt sie ein, auf den Inseln zu bleiben. Wer die Inseln verlassen möchte, erhält eine Entschädigung. Außerdem bietet sie britischen Unternehmen, die in Argentinien Geschäfte machen, eine Vorzugsbehandlung an."
 raforaff.23.dd:0 "Die argentinische Regierung bietet allen Falklandinseln die doppelte Staatsbürgerschaft an und lädt sie ein, auf den Inseln zu bleiben. Wer das Land verlassen möchte, erhält eine Entschädigung. Sie bietet außerdem britischen Unternehmen, die in Argentinien Geschäfte machen, eine Vorzugsbehandlung und logistische Unterstützung für unsere Flotten im Südatlantik."
 raforaff.23.a1:0 "Wir werden diesen Vorschlag annehmen."
 raforaff.23.a2:0 "Wir werden diesen Vorschlag nicht annehmen."
 raforaff.23.a1_tt:0 "Dieses Abkommen wird nach Abschluss folgende Auswirkungen haben:\n\n@ENG§YVereinigtes Königreich§! tritt §YFalklandinseln§! und §YSüdgeorgien§! an @ARG§YArgentinien§! ab.\n\n@ARG§YArgentinien§! und @ENG§YVereinigtes Königreich§! unterzeichnen einen Nichtangriffspakt.\n\n(@ARG§YArgentinien§!) erhält §YLondoner Vertrag§! (Meinung von @ENG§YVereinigtes Königreich§! §G+50§!).\n(@ENG§YVereinigtes Königreich§!) erhält §YLondoner Vertrag§! (Meinung von @ARG§YArgentinien§! §G+50§!).\n\n---\n\n"
 raforaff.23.a2_tt:0 "Es liegt an Argentinien, ob sie etwas anderes anbieten oder die Verhandlungen abbrechen.\n\n"
 raforaff.23.b1_tt:0 "Dieses Abkommen wird nach Abschluss folgende Auswirkungen haben:\n\n@ENG§YVereinigtes Königreich§! tritt die §YFalklandinseln§! und §YSüdgeorgien§! an @ARG§YArgentinien§! ab.\n\n@ARG§YArgentinien§! und @ENG§YVereinigtes Königreich§! unterzeichnen einen Nichtangriffspakt.\n\n(@ARG§YArgentinien§!) erhält den §YLondoner Vertrag§! (Meinung von @ENG§YVereinigtes Königreich§! §G+50§!).\n(@ENG§YVereinigtes Königreich§!) erhält den §YLondoner Vertrag§! (Meinung von @ARG§YArgentinien§! §G+50§!).\n\n@ARG§YArgentinien§! erhält die §YMalvinas-Entschädigung§! im Nationalgeist das (Konsumgüterfabriken §R+3%§!) für fünf Jahre gewährt.\n@ENG§YVereinigtes Königreich§! erhält Nationalgeist §YFalkland-Entschädigung§! das (Konsumgüterfabriken §G-3%§!) für fünf Jahre gewährt.\n\n---\n\n"
 raforaff.23.c1_tt:0 "Dieses Abkommen wird nach Abschluss folgende Auswirkungen haben:\n\n@ENG§YVereinigtes Königreich§! tritt die §YFalklandinseln§! und §YSüdgeorgien§! an @ARG§YArgentinien§! ab.\n\n@ARG§YArgentinien§! und @ENG§YVereinigtes Königreich§! unterzeichnen einen Nichtangriffspakt.\n\n(@ARG§YArgentinien§!) erhält den §YLondoner Vertrag§! (Meinung von @ENG§YVereinigtes Königreich§! §G+50§!).\n(@ENG§YVereinigtes Königreich§!) erhält den §YLondoner Vertrag§! (Meinung von @ARG§YArgentinien§! §G+50§!).\n\n@ARG§YArgentinien§! erhält die §YMalvinas-Entschädigung§! im Nationalgeist das (Konsumgüterfabriken §R+3%§!) für fünf Jahre gewährt.\n@ENG§YVereinigtes Königreich§! erhält Nationalgeist §YFalkland-Entschädigung§! das (Konsumgüterfabriken §G-3%§!) für fünf Jahre gewährt.\n\n@ENG§YVereinigtes Königreich§! erhält §YPeferential Treatment§! (Handelsbeziehungen mit @ARG§YArgentinien§! §G+75§!) für fünf Jahre.\nJedes Land außer @ENG§YVereinigtes Königreich§! erhält §YBevorzugung§! (Handelsbeziehungen mit @ARG§YArgentinien§! §R-25§!) für fünf Jahre.\n\n---\n\n"
 raforaff.23.ddd1_tt:0 "Dieses Abkommen wird nach Abschluss folgende Auswirkungen haben:\n\n@ENG§YVereinigtes Königreich§! tritt die §YFalklandinseln§! und §YSüdgeorgien§! an @ARG§YArgentinien§! ab.\n\n@ARG§YArgentinien§! und @ENG§YVereinigtes Königreich§! unterzeichnen einen Nichtangriffspakt.\n\n(@ARG§YArgentinien§!) erhält den §YLondoner Vertrag§! (Meinung von @ENG§YVereinigtes Königreich§! §G+50§!).\n(@ENG§YVereinigtes Königreich§!) erhält den §YLondoner Vertrag§! (Meinung von @ARG§YArgentinien§! §G+50§!).\n\n@ARG§YArgentinien§! erhält die §YMalvinas-Entschädigung§! im Nationalgeist das (Konsumgüterfabriken §R+3%§!) für fünf Jahre gewährt.\n@ENG§YVereinigtes Königreich§! erhält Nationalgeist §YFalkland-Entschädigung§! das (Konsumgüterfabriken §G-3%§!) für fünf Jahre gewährt.\n\n@ENG§YVereinigtes Königreich§! erhält §YPeferential Treatment§! (Handelsbeziehungen mit @ARG§YArgentinien§! §G+75§!) für fünf Jahre.\nJedes Land außer @ENG§YVereinigtes Königreich§! erhält §YBevorzugung§! (Handelsbeziehungen mit @ARG§YArgentinien§! §R-25§!) für fünf Jahre.\n\n@ARG§YArgentinien§! gewährt @ENG§YVereinigtes Königreich§! für fünf Jahre militärischen Zugang.\n\n---\n\n"
 raforaff.23.e:0 "Genug der Verhandlungen, wir können uns offensichtlich nicht einigen. Schicken Sie die argentinische Delegation nach Hause."
 #
 raforaff.24.t:0 "Großbritannien hat unseren Vorschlag abgelehnt!"
 raforaff.24.d:0 "Die Engländer haben unseren letzten Vorschlag abgelehnt, aber die Verhandlungen bleiben offen.\n\nVorerst..."
 raforaff.24.dd:0 "Wir werden nichts anderes anbieten, die Verhandlungen sind gescheitert. Rufen Sie die Delegation zurück."
 #
 raforaff.25.t:0 "Großbritannien hat unseren Vorschlag angenommen!"
 raforaff.25.d:0 "Entgegen aller Erwartungen hat Großbritannien unseren Vorschlag angenommen und sich bereit erklärt, die Malvinen und Georgien zu den angebotenen Bedingungen zurückzugeben. Unser Außenminister ist auf dem Weg nach London, um das Abkommen abzuschließen.\n\nObwohl die Verhandlungen bisher abseits der Öffentlichkeit stattfanden, kursieren bereits wilde Gerüchte, die unsere Bevölkerung mit großer Erwartung erfüllen."
 raforaff.25.a:0 "Wer hätte das für möglich gehalten?"
 #
 raforaff.26.t:0 "Die Verhandlungen sind gescheitert!"
 raforaff.26.d1:0 "Die argentinische Delegation hat sich vom Verhandlungstisch zurückgezogen und argumentiert, sie habe alles angeboten, was sie konnte. Manche mögen argumentieren, dass allein die Tatsache, dass wir versucht haben, eine Einigung zu erzielen, schon ein Fortschritt sei. Tatsächlich war die ganze Tortur jedoch reine Zeitverschwendung."
 raforaff.26.d2:0 "Die englische Regierung hat unsere Delegation mit der Begründung nach Hause geschickt, sie könne keine der von uns vorgelegten Bedingungen akzeptieren. Manche mögen argumentieren, dass allein die Tatsache, dass wir versucht haben, eine Einigung zu erzielen, schon ein Fortschritt sei. Doch die nackte Wahrheit ist, dass die ganze Tortur reine Zeitverschwendung war."
 raforaff.26.a:0 "Wir werden einen anderen Weg finden."
 raforaff.26.b:0 "Es ist unwahrscheinlich, dass sie aufgeben."
 #
 raforaff.27.t:0 "Der Londoner Vertrag"
 raforaff.27.d:0 "Nach wochenlangen Verhandlungen haben Argentinien und Großbritannien einen Vertrag unterzeichnet, der einen jahrhundertealten Territorialstreit beendet. Gestern unterzeichneten der argentinische Außenminister und der englische Premierminister einen Vertrag, den vor wenigen Monaten noch niemand für möglich gehalten hätte. Obwohl die Einzelheiten des Abkommens noch nicht veröffentlicht wurden, wurde die Rückgabe der Falklandinseln und Georgiens – oder Islas Malvinas und Georgias del Sur, wie sie nun heißen – an Argentinien bestätigt. Die Welt lobt die Diplomatie dieser beiden Länder und ihr Vorbild für andere Regierungen."
 raforaff.27.a:0 "Zeit, dem Kalender einen neuen Feiertag hinzuzufügen."
 raforaff.27.b:0 "Die britische Diplomatie triumphiert erneut."
 raforaff.27.c:0 "Übermitteln Sie ihnen unsere Glückwünsche."
 #
 raforaff.29.t:0 "Englisch-argentinische Verhandlungen scheitern ergebnislos"
 raforaff.29.d:0 "\n\nNach wochenlangen Gesprächen haben Argentinien und Großbritannien die Verhandlungen über die Malvinen und Georgien-Inseln abgebrochen, ohne eine Einigung erzielen zu können. Der hundertjährige Streit geht weiter, und beide Regierungen erheben Anspruch auf den kleinen Archipel im Südatlantik.\n\nObwohl beide Länder den Wunsch geäußert haben, irgendwann an den Verhandlungstisch zurückzukehren, ist es unwahrscheinlich, dass diese Aussagen mehr als politische Korrektheit sind."
 raforaff.29.a:0 "Zurück zum Zeichentisch."
 raforaff.29.b:0 "Ich frage mich, was sie als Nächstes versuchen werden."
 raforaff.29.c:0 "Sie dachten wirklich, die Briten würden nachgeben?"
 #
 #
 #
 raforaff.30.t:0 "Das Schiedsverfahren zwischen den Malvinas und Georgien"
 raforaff.30.d:0 "Die argentinische Regierung hat uns gebeten, in ihrem langjährigen Streit mit Großbritannien um die Souveränität der Malvinas und Georgiens als Schiedsrichter zu fungieren. Beide Archipele liegen im Südatlantik und stehen seit über hundert Jahren unter britischer Kontrolle, obwohl Argentinien seit der Besetzung 1833 dagegen protestiert. Eine Einmischung in diesen Konflikt wird sich sicherlich negativ auf unsere Beziehungen zu der Partei auswirken, die am Ende den Austritt verliert. Eine Ablehnung des argentinischen Antrags könnte die öffentliche Meinung gegen uns aufbringen und Argentinien die Möglichkeit eröffnen, seine Ansprüche auf andere – weniger diplomatische – Weise geltend zu machen."
 raforaff.30.a:0 "Wir werden der argentinischen Anfrage nachkommen."
 raforaff.30.b:0 "Wir werden uns da nicht einmischen, sie sollen es selbst herausfinden."
 #
 raforaff.31.t:0 "Die Vereinigten Staaten erklären sich bereit, als Schiedsrichter zu fungieren!"
 raforaff.31.d:0 "Unser Botschafter in Washington teilt uns mit, dass die amerikanische Regierung sich bereit erklärt hat, zwischen uns und dem Vereinigten Königreich zu vermitteln, sofern sie sich dazu entschließt."
 raforaff.31.a:0 "Jetzt sind die Engländer am Zug."
 #
 raforaff.32.t:0 "Die Vereinigten Staaten weigern sich, Schiedsrichter zu sein!"
 raforaff.32.d:0 "Unser Botschafter in Washington teilt uns mit, dass die amerikanische Regierung sich geweigert hat, zwischen uns und dem Vereinigten Königreich zu vermitteln."
 raforaff.32.a:0 "Die Monroe-Doktrin scheitert erneut."
 #
 raforaff.33.t:0 "Schiedsgerichtsbarkeit der Malvinas und Georgiens"
 raforaff.33.d:0 "Der argentinische Botschafter teilt uns mit, dass die USA als Schiedsrichter in unserem Streit um die Souveränität der Falklandinseln und Georgiens fungieren sollen.\n\nSelbst wenn die Amerikaner sich bereit erklärt hätten, das Schiedsverfahren auszurichten, könnte es ohne unsere Zustimmung nicht stattfinden. Unsere Möglichkeiten sind jedoch begrenzt: Entweder wir unterwerfen uns dem amerikanischen Schiedsverfahren und hoffen, dass unsere Anwälte unsere Ansprüche durchsetzen können, oder wir lehnen das Schiedsverfahren ab und riskieren damit, nicht nur die Argentinier, sondern auch die Amerikaner zu verärgern."
 raforaff.33.a:0 "Gut, lassen Sie uns das ein für alle Mal klären."
 raforaff.33.a.tt:0 "Das Schiedsverfahren wird in einigen Monaten beginnen."
 raforaff.33.b:0 "Unsinn! Unsere Souveränität unterliegt keiner Schlichtung!"
 raforaff.33.b.tt:0 "Es ist unwahrscheinlich, dass die USA oder Argentinien dies gutheißen werden."
 #
 raforaff.34.t:0 "Haltung einnehmen"
 raforaff.34.d:0 "Die Weigerung Großbritanniens, am Schiedsverfahren teilzunehmen, hat in unserer Gesellschaft große Wellen geschlagen. Viele unserer Bürger, die der argentinischen Lage zuvor gleichgültig gegenüberstanden, unterstützen nun ihre Forderungen und verurteilen Großbritanniens Verhalten als kolonialistisch. Einige unserer Staatsmänner haben begonnen, die Monroe-Doktrin in Frage zu stellen. Sie argumentieren, dass sie ohne Durchsetzung nur ein juristischer Kadaver sei, der unseren Einfluss in der Region schwäche. Diese Rhetorik könnte gefährlich werden, wenn sie nicht kontrolliert wird. Unser Einfluss in der Region ist gefährdet. Wir sollten sorgfältig über unser weiteres Vorgehen nachdenken."
 raforaff.34.a:0 "Wir müssen zur Monroe-Doktrin stehen und unseren Einfluss in der Region verstärken."
 raforaff.34.b:0 "Spielen Sie die ganze Sache herunter, wir können es uns nicht leisten, uns mit unseren europäischen Partnern zu zerstreiten."
 #
 raforaff.35.t:0 "Das Zünglein an der Waage"
 raforaff.35.da:0 "Das Schiedsverfahren beginnt in drei Monaten, aber das heißt nicht, dass wir in der Zwischenzeit untätig bleiben können. Die Briten werden alles in ihrer Macht Stehende tun, um sich einen Vorteil zu verschaffen, und das sollten wir auch tun."
 raforaff.35.db:0 "Das Schiedsverfahren beginnt in drei Monaten, aber das heißt nicht, dass wir in der Zwischenzeit untätig bleiben können. Die Argentinier werden alles in ihrer Macht Stehende tun, um sich einen Vorteil zu verschaffen, und das sollten wir auch tun."
 raforaff.35.a:0 "Die vierte Macht."
 raforaff.35.a_tt:0 "Niemand kann mehr Druck auf den amerikanischen Schiedsrichter ausüben als das amerikanische Volk, und der beste Weg, es zu erreichen, sind die Medien.\n\n"
 raforaff.35.b:0 "Politischer Einfluss."
 raforaff.35.b_tt:0 "Wir können zwar nicht direkt Druck auf den Schiedsrichter ausüben, damit dieser zu unseren Gunsten entscheidet, aber wir können unseren politischen Einfluss auf die amerikanische Regierung geltend machen, damit sie es für uns tut.\n\n"
 raforaff.35.ca:0 "Stellen Sie unser Rechtsteam zusammen."
 raforaff.35.cb:0 "Stellen Sie unser Rechtsteam zusammen."
 raforaff.35.ca_tt:0 "Niemand bezweifelt, dass Herr Lamas die beste Wahl ist, um uns im Schiedsverfahren zu vertreten, doch allein dürfte er kaum gewinnen. Die 1883 vom verstorbenen Gregorio O&#39;Farrell gegründete Anwaltskanzlei O&#39;Farrell ist die älteste und renommierteste Anwaltskanzlei Argentiniens. Ihre Beratung wird von unschätzbarem Wert sein, was so viel heißt wie: Sie wird nicht kostenlos sein. Wir haben außerdem eine Gruppe ausländischer Historiker ausgewählt, die unseren Fall stärken könnten."
 raforaff.35.cb_tt:0 "Anthony Eden ist dem argentinischen Goldjungen Saavedra Lamas vielleicht ebenbürtig, doch wenn wir gewinnen wollen, reicht „gleich“ nicht aus.\n\nDer London Court of International Arbitration ist ein Treffpunkt der besten Juristen der Welt. Schiedsverfahren auf der ganzen Welt orientieren sich an ihm.\n\nWir werden das Rückgrat unseres Rechtsteams nach seinen Grundsätzen bilden.\n\n"
 raforaff.35.dd:0 "Wir brauchen Zeit, um unsere Optionen abzuwägen."
 raforaff.35.dd_tt:0 "Einige Optionen werden nur angezeigt, wenn Sie über die notwendige politische Macht verfügen, um Geld auszugeben.\n\n"
 raforaff.35.e:0 "Wir haben alles getan, was wir konnten."
 #
 #
 #
 #argentina.91.t:0 "Argentinian Foreign Policy"
 #argentina.91.d:0 "Test event."
 #argentina.91.a:0 "Give ideology drift equal to own."
 #
 #argentina.58.t:0 "Argentinian Meddling"
 #argentina.58.d:0 "The Argentinian embassy in our country is showing signs of heavy activity. It seems their ambassador is establishing ties with local radios and newspapers and there are rumours of secret meetings with politicians in our own party."
 #argentina.58.a:0 "This can't be good..."
 #
 raforaff.37.t:0 "Argentinien und das Vereinigte Königreich wollen territoriale Streitigkeiten durch Schiedsverfahren beilegen"
 raforaff.37.d:0 "Gerüchte, die USA würden als Vermittler zwischen Argentinien und Großbritannien in den umstrittenen Falkland-/Malvinas- und Südgeorgien-Inseln fungieren, bestätigten sich gestern, als die britische Regierung ihre Beteiligung an dem Verfahren öffentlich bestätigte. Viele waren von dieser plötzlichen Wendung der Ereignisse überrascht, doch der Prozess begann bereits vor Wochen, als die argentinische Regierung erstmals mit ihrem Vorschlag an die USA herantrat. Beide Länder haben drei Monate Zeit, ihre Fälle vorzubereiten, bevor das Verfahren in Washington beginnt." 
 raforaff.37.a:0 "Machen wir uns an die Arbeit, wir dürfen keine Minute verlieren."
 raforaff.37.b:0 "Die Amerikaner werden uns nur erzählen, was wir bereits wissen."
 raforaff.37.c:0 "Wir fühlen uns geehrt, dass sie dafür zu uns gekommen sind."
 raforaff.37.dd:0 "Wer hätte gedacht, dass die Briten dem zustimmen würden?"
 #
 raforaff.38.t:0 "Großbritannien weigert sich, territorialen Streit einem Schiedsverfahren zu unterwerfen"
 raforaff.38.d:0 "Gerüchte der letzten Wochen, Washington werde als Schiedsrichter in den Territorialstreitigkeiten zwischen Argentinien und Großbritannien fungieren, erwiesen sich gestern als falsch. Großbritannien dementierte dies und verurteilte es als Versuch, seine Souveränität der Verhandlung zu unterwerfen. Argentinien wies daraufhin darauf hin, dass Großbritanniens mangelndes Interesse an einer diplomatischen Lösung des Problems seit hundert Jahren seine Politik prägt. Beide Länder beharren auf ihrer Position und warten gespannt auf eine Stellungnahme des potenziellen Schiedsrichters." 
 raforaff.38.a:0 "Sie wissen, dass sie verloren hätten."
 raforaff.38.b:0 "Die Amerikaner hätten uns nur das erzählt, was wir sowieso schon wissen."
 raforaff.38.c:0 "Worauf haben wir uns da eingelassen?"
 raforaff.38.dd:0 "Haben sie wirklich erwartet, dass Großbritannien dem zustimmen würde?"
 #
 raforaff.39.t:0 "Argentinien Propaganda"
 raforaff.39.d:0 "Fügen Sie hier Propaganda ein." 
 raforaff.39.a:0 "Weitere Neuigkeiten folgen."
 #
 # THE HAYES TREATY EVENTS / CHACO BOREAL CLAIM
 #
 raforaff.201.t:0 "Unruhe stiften: Chaco Boreal"
 raforaff.201.d:0 "Die Aufkündigung des Hayes-Schiedsverfahrens war einfach genug, jetzt geht es darum, zu entscheiden, wie weiter vorgegangen werden soll." 
 raforaff.201.a:0 "Fordern Sie die Rückgabe der Region Chaco Boreal."
 raforaff.201.a_tt:0 "Wir werden dafür sorgen, dass sie verstehen, dass wir bereit sind, die Angelegenheit bis zum Äußersten zu verfolgen.\n\n"
 raforaff.201.b:0 "Fordern Sie eine Entschädigung von der paraguayischen Regierung."
 raforaff.201.b_tt:0 "Wir könnten davon überzeugt werden, für einen fairen Preis auf unsere Rechte an der Region zu verzichten.\n\nWenn sie zustimmen, erhalten wir eine „§YChaco Boreal Compensation§!“, die Folgendes gewährt:\n\nKonsumgüterfabriken: §Y-0,5 %§!\n\n"
 raforaff.201.c:0 "Schlagen Sie ein Joint Venture zur Nutzung der Ressourcen der Region vor."
 raforaff.201.c_tt:0 "Ein freundlicherer Ansatz. Die Region Chaco Boreal ist reich an ungenutzten Ressourcen. Die Paraguayer verfügen weder über das Know-how noch über die logistische Unterstützung, um diese zu nutzen, aber wir könnten ihnen dabei helfen ... gegen einen fairen Anteil.\n\nDiese Option wird nicht mehr verfügbar sein, wenn Sie zunächst weniger „diplomatische“ Maßnahmen ergreifen.\n\n"
 #
 raforaff.202.t:0 "Argentinien fordert Chaco Boreal!"
 raforaff.202.d:0 "Argentinien hat den Hayes-Vertrag gekündigt und die Region Chaco Boreal für sich beansprucht! Sie fordern, dass wir ihnen die Kontrolle über das Gebiet sofort übergeben ... sonst ..."
 raforaff.202.a:0 "Wir lassen uns nicht einschüchtern!"
 raforaff.202.a_tt:0 "Die Argentinier könnten einen Rückzieher machen, aber wir sollten unsere Truppen besser bereit machen."
 raforaff.202.b:0 "Dies ist ein Krieg, den wir nicht gewinnen können."
 raforaff.202.b_tt:0 "Unsere Wirtschaft wird es überstehen. Ein Krieg wäre letztlich kostspieliger."
 #
 raforaff.203.t:0 "Paraguay lehnt ab!"
 raforaff.203.d:0 "Trotz unserer Drohungen hat die paraguayische Regierung unseren rechtmäßigen Anspruch auf die Region Chaco Boreal abgelehnt. Der Ball liegt nun wieder bei uns."
 raforaff.203.a:0 "Wir haben sie gewarnt. Wir werden uns mit Gewalt nehmen, was uns gehört."
 raforaff.203.b:0 "Fordern Sie stattdessen eine Entschädigung."
 raforaff.203.c:0 "Bedauerlich. Doch ... es gibt mehr als eine Art, Krieg zu führen."
 raforaff.203.c_tt:0 "Der Großteil der paraguayischen Importe und Exporte wird über argentinische Wasserwege abgewickelt. Wir werden eine Blockade errichten und die Wirtschaft des Landes unterwerfen.\n\nDies wird Paraguay in eine geschlossene Wirtschaft zwingen und den Handel mit anderen Ländern erschweren.\n"
 #
 raforaff.204.t:0 "Paraguay akzeptiert!"
 raforaff.204.d:0 "Unsere Drohungen gegenüber der paraguayischen Regierung haben Wirkung gezeigt, sie hat sich bereit erklärt, uns die Region Chaco Boreal zurückzugeben." 
 raforaff.204.a:0 "Macht geht vor Recht."
 #
 raforaff.205.t:0 "Argentinien fordert Entschädigung!"
 raforaff.205.da:0 "Argentinien hat den Hayes-Vertrag gekündigt! Das Land behauptet, das Schiedsverfahren sei von Parteilichkeit geprägt gewesen und fordert eine angemessene Entschädigung, wenn wir die Region Chaco Boreal behalten wollen.\n\nDer argentinische Botschafter machte deutlich, dass die argentinische Regierung bereit ist, die Angelegenheit bis zum Äußersten zu verfolgen, sollten wir uns weigern." 
 raforaff.205.db:0 "Die Argentinier haben zumindest vorerst ihre Kriegsdrohungen zurückgenommen und fordern stattdessen eine Entschädigung, wenn sie die Kontrolle über die Region Chaco Boreal behalten wollen.\n\nIhr Botschafter machte deutlich, dass sie bereit sind, die Angelegenheit bis zum Äußersten zu verfolgen, sollten wir uns erneut weigern." 
 raforaff.205.a:0 "Wir können keinen Krieg riskieren und ihren Bedingungen zustimmen."
 raforaff.205.b:0 "Wir lassen uns nicht einschüchtern!"
 #
 raforaff.206.t:0 "Paraguay akzeptiert!"
 raforaff.206.d:0 "Paraguay hat sich bereit erklärt, uns für die illegale Aneignung der Region Chaco Boreal zu entschädigen!" 
 raforaff.206.a:0 "Exzellent."
 #
 raforaff.207.t:0 "Spannungen zwischen Argentinien und Paraguay"
 raforaff.207.d:0 "Argentinien hat den Hayes-Vertrag gekündigt und Anspruch auf die paraguayische Region Chaco Boreal erhoben. Die Lage hat sich bisher nicht über diplomatische Forderungen hinaus zugespitzt, doch unsere Berater weisen darauf hin, dass eine weitere Eskalation sehr wahrscheinlich ist, wenn die argentinischen Truppen ihre Forderungen ablehnen. Sollte es zum Krieg kommen, könnten die USA zum Eingreifen gezwungen sein – eine Option, die unserem Volk möglicherweise nicht gefällt."
 raforaff.207.a:0 "Wir werden den Frieden in der Region um jeden Preis wahren."
 raforaff.207.b:0 "Lassen Sie sie es selbst herausfinden."
 #
 raforaff.208.t:0 "Flashpoint: Chaco Boreal"
 raforaff.208.d:0 "Die Spannungen zwischen Argentinien und Paraguay haben in den letzten Wochen zugenommen, nachdem die argentinische Regierung einen 1878 unterzeichneten Vertrag aufgrund der Parteilichkeit des Schiedsrichters, des verstorbenen US-Präsidenten Rutherford Hayes, aufgekündigt hatte. Die Angelegenheit hat die beiden Länder erneut in Konflikt gebracht, und die Möglichkeit eines Krieges ist greifbar, sollte Paraguay die argentinischen Bedingungen ablehnen. Die USA haben erklärt, sie würden die Verhandlungen aufmerksam beobachten und wahrscheinlich eingreifen, sollte die Lage eskalieren."
 raforaff.208.a:0 "Verflucht sei die Monroe-Doktrin!"
 raforaff.208.b:0 "Zumindest stehen die USA hinter uns."
 raforaff.208.c:0 "Wo ist „Parogoai“ überhaupt?"
 raforaff.208.dd:0 "Hoffentlich denken die Argentinier jetzt zweimal nach."
 #
 raforaff.209.t:0 "Flashpoint: Chaco Boreal"
 raforaff.209.d:0 "Die Spannungen zwischen Argentinien und Paraguay haben sich in den letzten Wochen verschärft, nachdem die argentinische Regierung einen 1878 unterzeichneten Vertrag aufgrund der Parteilichkeit des Schiedsrichters, des verstorbenen US-Präsidenten Rutherford Hayes, aufgekündigt hatte. Die Angelegenheit hat die beiden Länder erneut in Konflikt gebracht, und die Möglichkeit eines Krieges ist greifbar, sollte Paraguay die argentinischen Bedingungen ablehnen. Die USA haben erklärt, dass sie sich nicht in die innere Angelegenheit der beiden verfeindeten Länder einmischen werden."
 raforaff.209.a:0 "Eine Sorge weniger."
 raforaff.209.b:0 "Wenn es regnet, dann schüttet es ..."
 raforaff.209.c:0 "Wo ist „Parogoai“ überhaupt?"
 raforaff.209.dd:0 "Besorgniserregend..."
 #
 raforaff.210.t:0 "Argentinien schlägt ein Joint Venture vor!"
 raforaff.210.d:0 "Unsere anfänglichen Bedenken nach der Kündigung des Hayes-Vertrags durch Argentinien haben sich zerstreut, nachdem der argentinische Botschafter einen ganz anderen Vorschlag unterbreitet hat als erwartet. \n\nDas Angebot sieht vor, unseren Bergbau in der Region Chaco Boreal im Austausch gegen einen Anteil an den Erträgen technologisch und logistisch zu unterstützen. Dieses Projekt wird unsere Produktion deutlich steigern und gute Beziehungen zu Argentinien sicherstellen."
 raforaff.210.a:0 "Das ist die Art von Diplomatie, die wir mögen!"
 raforaff.210.a_tt:0 "Es wird einige Monate dauern, bis das Projekt Früchte trägt. Zum Glück übernehmen die Argentinier die Kosten.\n\nSobald die Arbeiten abgeschlossen sind, werden wir im Chaco Boreal 16 Metalle und 8 Erdölvorkommen erhalten.\n\n"
 raforaff.210.b:0 "Wir werden keine Kompromisse eingehen."
 raforaff.210.b_tt:0 "Wir werden unsere Souveränität nicht so leichtfertig verkaufen. Wenn uns das Know-how zur Nutzung unserer Ressourcen fehlt, müssen wir unsere Forschungsanstrengungen fokussieren. Wir werden uns nicht geschlagen geben.\n\n"
 #
 raforaff.211.t:0 "Paraguay stimmt dem Joint Venture zu!"
 raforaff.211.d:0 "Nach einigen Verhandlungen ist es uns gelungen, die Einzelheiten des Joint Ventures auszuarbeiten und eine für beide Seiten vorteilhafte Vereinbarung mit den Paraguayern zu erzielen. Das Projekt wird sofort beginnen. Wir haben bereits Gebiete für die Verarbeitung unseres Anteils an den Erträgen in Formosa festgelegt."
 raforaff.211.a:0 "Wer hat gesagt, dass der Kapitalismus ein gnadenloser Akt sein muss?"
 raforaff.211.a_tt:0 "Wir müssen die Kosten tragen, aber sobald die Arbeiten abgeschlossen sind, wird uns unser Anteil an der Ausbeute 12 Metalle und 6 Erdöl in Formosa einbringen.\n\n"
 #
 raforaff.212.t:0 "Das Chaco Boreal Venture trägt Früchte!"
 raforaff.212.d:0 "Nach drei Monaten intensiver Arbeit und dank der Zusammenarbeit zwischen paraguayischen Arbeitern und argentinischen Spezialisten und Maschinen hat das Projekt zur Steigerung der Produktion und Ausweitung der Betriebsabläufe in der Region Chaco Boreal Früchte getragen!"
 raforaff.212.a:0 "Exzellent."
 raforaff.212.b:0 "Exzellent."
 #
 raforaff.213.t:0 "Paraguay lehnt unser Angebot für ein Joint Venture ab!"
 raforaff.213.d:0 "Paraguay hat unseren Vorschlag unter Missachtung aller politischen Regeln abgelehnt und Anspruch auf alle Ressourcen der umstrittenen Region Chaco Boreal erhoben. Wenn wir auf diese Beleidigung nicht reagieren, verlieren wir mit Sicherheit unser Gesicht."
 raforaff.213.a:0 "Bedauerlich. Doch ... es gibt mehr als eine Art, Krieg zu führen."
 raforaff.213.a_tt:0 "Der Großteil der paraguayischen Importe und Exporte wird über argentinische Wasserwege abgewickelt. Wir werden eine Blockade errichten und die Wirtschaft des Landes unterwerfen.\n\nDies wird Paraguay in eine geschlossene Wirtschaft zwingen und den Handel mit anderen Ländern erschweren.\n"
 raforaff.213.b:0 "Sie haben nicht auf unsere Vernunft gehört. Jetzt werden sie unsere Kanonen hören."
 #
 raforaff.214.t:0 "Argentinien blockiert unseren Handel!"
 raforaff.214.d:0 "In einem verabscheuungswürdigen Akt der Boshaftigkeit hat Argentinien uns die Nutzung seiner Wasserstraßen verboten, nachdem wir uns geweigert hatten, mit ihnen bei der Ausbeutung der Ressourcen der Region Chaco Boreal zusammenzuarbeiten. Dies hat die meisten unserer Importe und Exporte buchstäblich zum Erliegen gebracht und unseren Handel mit den meisten unserer üblichen Partner erheblich eingeschränkt.\n\nDer argentinische Botschafter hat uns mitgeteilt, dass die Entscheidung endgültig sei und nicht rückgängig gemacht werden könne."
 raforaff.214.a:0 "Das können wir nicht zulassen!"
 #
 # FOCUS TREE NEUTRALITY PATH
 #
 raforaff.501.t:0 "Argentinien sucht neue Unterzeichner für den Saavedra-Lamas-Vertrag"
 raforaff.501.d:0 "\nDie argentinische Regierung hat Delegationen zu gleichgesinnten Regierungen entsandt, um sie zur Unterzeichnung des Saavedra-Lamas-Vertrags einzuladen. Der Vertrag selbst entstand nach dem Chaco-Boreal-Krieg zwischen Paraguay und Bolivien im Jahr 1935. Er verkörpert die Ideen von Frieden, Neutralität und Nichteinmischung und bietet einen Rahmen, der Länder ermutigt, ihre Streitigkeiten auf diplomatischem Wege zu lösen.\n\nDer Vertrag ist bereits ein anerkanntes internationales Gesetz, dem viele amerikanische Länder angehören. Neue Unterzeichnerstaaten können sich sicher sein, dass er zusätzlichen Schutz vor Gewaltanwendung gegen sie erhält."
 raforaff.501.a:0 "Mögen unsere Diplomaten erfolgreich sein."
 raforaff.501.b:0 "Je mehr, desto besser."
 raforaff.501.c:0 "Ich schätze, wir werden bald von ihnen hören."
 raforaff.501.dd:0 "Wann hat ein Vertrag wirklich einen Krieg verhindert?"
 #
 raforaff.502.t:0 "Wir sind eingeladen, den Saavedra Lamas-Vertrag zu unterzeichnen"
 raforaff.502.d:0 "Eine argentinische Delegation hat um eine Audienz bei unserem Außenminister gebeten, um uns offiziell zur Unterzeichnung des Saavedra-Lamas-Vertrags einzuladen. Ein zusätzlicher Schutz vor ausländischen Aggressoren könnte sich als nützlich erweisen, würde aber unsere eigenen Bemühungen unweigerlich behindern, sollten wir unsere Ziele mit Gewalt verfolgen. Der Vertrag enthält zwar eine Ausstiegsklausel, die jedoch ein Jahr im Voraus angekündigt werden muss."
 raforaff.502.a:0 "Es gibt kein edleres Streben als den Frieden."
 raforaff.502.b:0 "Hierzu können wir keine Verpflichtung eingehen."
 #
 raforaff.503.t:0 "[From.GetName] unterzeichnet den\nSaavedra Lamas-Vertrag"
 raforaff.503.d:0 "\n\nNach einem Treffen mit der argentinischen Delegation hat [Root.GetLeader] öffentlich bekannt gegeben, dass [From.GetName] den Saavedra-Lamas-Vertrag unterzeichnen und damit sein Land in die Liste der Unterzeichner und Anhänger der Ideale von Neutralität, Selbstbestimmung und Frieden aufnehmen wird.\n\nDie internationale Gemeinschaft ist beeindruckt von der Resonanz, die der Vertrag erzielt hat, und von dem Geschick, das die argentinischen Diplomaten bei der Gewinnung weiterer Unterzeichner gezeigt haben."
 raforaff.503.a:0 "Frieden ist ein unschätzbar wertvolles Gut."
 raforaff.503.b:0 "Wird es hilfreich sein?"
 #
 raforaff.504.t:0 "Die Lehre der Lamas"
 raforaff.504.d:0 "Unser Eintreten für den Saavedra-Lamas-Vertrag und der Einfluss seines Hauptbefürworters – der argentinischen Regierung – wirken sich direkt auf die politischen Ansichten unserer Bevölkerung aus und überzeugen immer mehr unserer Bürger davon, dass wir den Idealen des Vertrags treu bleiben müssen."
 raforaff.504.a:0 "Wir haben den richtigen Weg gewählt."
 #
 raforaff.505.t:0 "Regionale Isolation"
 raforaff.505.d:0 "Argentinische Diplomaten haben uns mit ihrem Vorschlag zur regionalen Isolation kontaktiert. Sie behaupten, die Welt werde nicht aufhören zu brennen, wenn wir weiterhin Ressourcen und Material an kriegführende Länder liefern. Schlimmer noch: Sollten wir weiterhin Konflikte auf der ganzen Welt anheizen, würden wir früher oder später mit Sicherheit in das Blutbad hineingezogen werden.\n\nSie haben ihren gesamten Handel mit allen Ländern eingestellt, die derzeit in einen Konflikt verwickelt sind, und fordern uns auf, dasselbe zu tun."
 raforaff.505.a:0 "Das ist das Richtige."
 raforaff.505.b:0 "Dem können wir nicht zustimmen."
 #
 raforaff.509.t:0 "Argentinien sucht Unterstützung, um Amerika vom Krieg zu isolieren"
 raforaff.509.d:0 "Die argentinische Regierung hat heute angekündigt, den Handel mit kriegsführenden Ländern einzustellen. In einem mutigen – manche würden sogar sagen „gewagten“ – Schritt im Bemühen um Neutralität und Nichteinmischung weltweit hat Argentinien seinen Markt für alle kriegführenden Parteien unabhängig von Ideologie oder Zugehörigkeit geschlossen. Der argentinische Außenminister hat zudem erklärt, er wolle andere Mitglieder des Saavedra-Lamas-Vertrags ermutigen, diesem Beispiel zu folgen. Sollte der Vorschlag unter den Unterzeichnern Anklang finden, könnten die Folgen für diejenigen, die für ihre Kriegsanstrengungen auf Amerika angewiesen sind, verheerend sein."
 raforaff.509.a:0 "Wirklich mutig."
 raforaff.509.b:0 "Dies ... könnte sich als problematisch erweisen."
 #
 raforaff.513.t:0 "[From.GetName] benötigt Unterstützung!"
 raforaff.513.d:0 "\nGesandte von [From.GetName] trafen heute mit der Bitte um Unterstützung bei der Verteidigung ihres Landes gegen gewalttätige Angreifer ein. Der Saavedra-Lamas-Vertrag verpflichtet uns zwar nicht, anderen Unterzeichnern zu helfen, doch [From.GetName] sich selbst zu überlassen, könnte die Wirksamkeit des Vertrags schwächen."
 raforaff.513.a:0 "Senden Sie Infanterieausrüstung."
 raforaff.513.a_tt:0 "\nDer Mindestbetrag, den Sie senden können, beträgt 1000.\n"
 raforaff.513.b:0 "Senden Sie Artillerieausrüstung."
 raforaff.513.b_tt:0 "\nDer Mindestbetrag, den Sie senden können, beträgt 250.\n"
 raforaff.513.c:0 "Senden Sie Panzerausrüstung."
 raforaff.513.c_tt:0 "\nDie Mindestmenge, die Sie senden können, beträgt 250 leichte oder mittlere Modelle. Mittlere Modelle werden gegenüber leichten Modellen bevorzugt, wenn Sie über den erforderlichen Vorrat verfügen.\n"
 raforaff.513.dd:0 "Nächste Seite."
 raforaff.513.dd_tt:0 "\nAufgrund der Ereignismechanik können Sie nicht zu diesem Bildschirm zurückkehren. Auf der nächsten Seite können Sie wählen, ob Sie Kämpfer (mindestens 100), reine Mannstärke (mindestens 2500) oder eine Freiwilligendivision (mindestens 4500 Mann, 500 Infanterieausrüstung und 36 Artillerieausrüstung) schicken möchten.\n"
 #
 raforaff.515.t:0 "Versandvorbereitung: Infanterieausrüstung"
 raforaff.515.d:0 "\nUnser aktueller Lagerbestand ermöglicht es uns, die folgenden Sendungen zu versenden."
 raforaff.515.a:0 "1000 Infanterieausrüstung."
 raforaff.515.b:0 "2500 Infanterieausrüstung."
 raforaff.515.c:0 "5000 Infanterieausrüstung."
 raforaff.515.dd:0 "Wir können ihnen schließlich nicht helfen."
 #
 raforaff.514.t:0 "[From.From.GetName] benötigt Unterstützung!"
 raforaff.514.d:0 "\nGesandte aus [From.From.GetName] trafen heute mit der Bitte um Unterstützung bei der Verteidigung ihres Landes gegen gewalttätige Angreifer ein. Der Saavedra-Lamas-Vertrag verpflichtet uns zwar nicht, anderen Unterzeichnern zu helfen, doch [From.From.GetName] sich selbst zu überlassen, könnte die Wirksamkeit des Vertrags schwächen."
 raforaff.514.a:0 "Senden Sie Kampfausrüstung."
 raforaff.514.a_tt:0 "\nDer Mindestbetrag, den Sie senden können, beträgt 100.\n"
 raforaff.514.b:0 "Senden Sie Arbeitskräfte."
 raforaff.514.b_tt:0 "\nDer Mindestbetrag, den Sie senden können, beträgt 2500.\n"
 raforaff.514.c:0 "Senden Sie eine Freiwilligenabteilung."
 raforaff.514.c_tt:0 "\nSie benötigen mindestens 4500 Mann, 500 Infanterieausrüstung und 36 Artillerieausrüstung.\n"
 raforaff.514.dd:0 "Wir können ihnen im Moment nicht helfen."
 #
 raforaff.516.t:0 "Versandvorbereitung: Artillerieausrüstung"
 raforaff.516.d:0 "\nUnser aktueller Lagerbestand ermöglicht es uns, die folgenden Sendungen zu versenden."
 raforaff.516.a:0 "500 Artillerieausrüstung."
 raforaff.516.b:0 "1000 Artillerieausrüstung."
