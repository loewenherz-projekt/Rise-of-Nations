 ARG_Great_Minds_Think_Alike:0 "Große Geister denken gleich"
 ARG_Great_Minds_Think_Alike_desc:0 "Diese Jungs verstehen es."
 ARG_trade_partners:0 "Handelspartner"
 ARG_trade_partners_desc:0 "Wir unterhalten enge Handelsbeziehungen zu diesem Land."
 ARG_land_of_opportunities:0 "Land der unbegrenzten Möglichkeiten"
 ARG_land_of_opportunities_desc:0 "Argentinien gewährt jedem Unternehmen, das in dem Land Geschäfte machen möchte, Steueranreize."
