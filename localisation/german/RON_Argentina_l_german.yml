 ra_preparing_trade_mission:0 "Vorbereitung einer Handelsmission"
 ra_preparing_trade_mission_desc:0 "Unsere Gesandten arbeiten hart daran, das Handelsabkommen so attraktiv wie möglich zu gestalten."
 ra_weighing_the_market:0 "Den Markt abwägen"
 ra_weighing_the_market_desc:0 "Unsere Experten beobachten die Marktentwicklung aufmerksam."
 ra_state_funded_companies:0 "Staatlich finanzierte Unternehmen"
 #ra_state_funded_companies_desc:0 ""
 ra_developing_civilian_sector:0 "Entwicklung des zivilen Sektors"
 #ra_developing_civilian_sector_desc:0 ""
 ra_developing_military_sector:0 "Entwicklung des Militärsektors"
 #ra_developing_military_sector_desc:0 ""
 #
 ra_ypf_refineries:0 "YPF-Fokus – Neue Raffinerien"
 ra_ypf_refineries_desc:0 "Rohöl ist wenig nützlich. Egal wie groß unsere Reserven sind, wenn wir nicht in der Lage sind, Rohöl zu richtigem Benzin zu raffinieren, nützen sie nicht viel. Dieses Projekt wird den Bau neuer Raffinerien priorisieren und uns so ermöglichen, schneller Autarkie zu erreichen."
 ra_ypf_infrastructure:0 "YPF-Fokus – Unternehmensinfrastruktur"
 ra_ypf_infrastructure_desc:0 "Gelagertes Benzin ist nutzlos. Wir müssen es dorthin bringen, wo es gebraucht wird. Der Vorstand plant, die Reichweite des Unternehmens weiter auszubauen und sicherzustellen, dass jeder Winkel des Landes Zugang zu Benzin hat. Dies könnte neue Tankstellen, neue Straßen oder sogar neue Städte bedeuten."
 ra_ypf_mining:0 "YPF-Fokus – Bergbaubetrieb"
 ra_ypf_mining_desc:0 "Unsere Bergbauindustrie steckt noch in den Kinderschuhen. YPF ist das mit Abstand erfahrenste Unternehmen in der Region. Deshalb hat der Vorstand ein Projekt ins Leben gerufen, um mit seinem Fachwissen und seiner Logistik den Bergbau im ganzen Land zu unterstützen."
 ra_somisa_done:0 "SOMISA Stahlwerk"
 ra_somisa_done_desc:0 "Das SOMISA-Stahlwerk stellt unserer Branche dringend benötigte Ressourcen zur Verfügung."
 #
 ra_private_sector_companies:0 "Unternehmen des Privatsektors"
 ra_private_sector_companies_desc:0 ""
 ra_imports_substitution:0 "Importsubstitution"
 ra_imports_substitution_desc:0 ""
 ra_tax_incentives:0 "Steueranreize für die Industrie"
 ra_tax_incentives_desc:0 ""
 #
 ra_corporate_law_reforms:0 "Reformen des Gesellschaftsrechts"
 ra_corporate_law_reforms_desc:0 "Die Vorsitzenden können nun aufatmen, da wir die Arbeiter los sind. Einige haben versprochen, ihre Aktivitäten auszuweiten ... wir werden sehen, wie lange das anhält."
 ra_labor_law_reforms:0 "Arbeitsrechtsreformen"
 ra_labor_law_reforms_desc:0 "Die Arbeitnehmer sind mit einigen unserer jüngsten Änderungen zufrieden. Die Produktivität ist gestiegen – zumindest bis sie einen anderen Grund zur Beschwerde finden."
 ra_blooming_industry:0 "Blühende Industrie"
 ra_blooming_industry_desc:0 "Die Unternehmen passen sich recht gut an unsere neuen vereinfachten Verfahren an."
 ra_ICA_Support:0 "Unterstützung internationaler kooperativer Allianzen"
 ra_ICA_Support_desc:0 "Die ICA hat eine Reihe von Konferenzen in unserem Land gestartet und bietet Starthilfe für Arbeitnehmer an, die ihre eigene Genossenschaft gründen möchten."
 ra_corporate_supremacy:0 "Unternehmensüberlegenheit"
 ra_corporate_supremacy_desc:0 "Unser Land ist zu einem bevorzugten Standort für die Niederlassung und den Handel von Unternehmen geworden."
 ra_worker_rights:0 "Arbeitnehmerrechte"
 ra_worker_rights_desc:0 "Unsere Arbeiterklasse ist endlich vor dem Missbrauch der Konzerne geschützt."
 ra_public_hospitals:0 "Öffentliche Krankenhäuser"
 ra_public_hospitals_desc:0 ""
 ra_limited_health_coverage:0 "Eingeschränkter Krankenversicherungsschutz"
 ra_limited_health_coverage_desc:0 "Unsere öffentlichen Krankenhäuser behandeln die meisten alltäglichen Beschwerden und Krankheiten und bieten ihren Patienten die notwendige, wenn nicht sogar umfassendste medizinische Hilfe."
 ra_extensive_health_coverage:0 "Umfassender Krankenversicherungsschutz"
 ra_extensive_health_coverage_desc:0 "Unsere Krankenhäuser behandeln alle Arten von Beschwerden und Krankheiten und scheuen keine Mittel, um das Wohl des Patienten zu gewährleisten."
 ra_vaccination_campaign:0 "Impfkampagnen"
 ra_vaccination_campaign_desc:0 "Während einige unserer Bevölkerung – vor allem Menschen aus ländlichen Gegenden – Impfstoffen mit Misstrauen begegnen, wissen wir, dass sie Leben retten und – dank unseres öffentlichen Gesundheitssystems – auch Geld. Wir haben eine Reihe von Impfkampagnen gestartet und hoffen, dass Impfungen mit der Zeit für alle Bürger zur Selbstverständlichkeit werden."
 ra_constitutional_right:0 "Recht auf angemessenen Wohnraum"
 ra_constitutional_right_desc:0 "Auch wenn die Verfassungsänderung einige Zeit in Anspruch nehmen könnte, haben wir im Rahmen unserer kontinuierlichen Bemühungen, jedem Bürger angemessenen Wohnraum zur Verfügung zu stellen, bereits mit der Arbeit an neuen, staatlich geförderten Wohnprojekten begonnen."
