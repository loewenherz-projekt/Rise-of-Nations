 raeconomic.1.t:0 "Bereiten Sie eine Handelsmission vor"
 raeconomic.1.d:0 "Argentinien kann genug Nahrungsmittel anbauen, um die Welt zu ernähren – und das nicht umsonst. Obwohl die Industrialisierung weiterhin unser Hauptziel ist, wäre es unklug, unsere Agrarindustrie abzuschaffen. Da wir nun nicht mehr unter den Zwängen des Roca-Runciman-Pakts leiden, können wir uns nach anderen Märkten umsehen, die an unseren Produkten interessiert sind."
 raeconomic.1.a:0 "Schicken Sie Gesandte nach Deutschland."
 raeconomic.1.a.tt:0 "Wenn sie akzeptieren, erhalten wir:\n\n§YKonsumgüterfabriken§! §G-0,02 %§!\n§YMilitärfabrik§! Baugeschwindigkeit §G+0,05 %§!\n§YInfanterieausrüstung§! Forschung §G-0,05 %§!"
