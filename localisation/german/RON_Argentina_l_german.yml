 civil_engineer_desc:0 "Der Weg zum Erfolg ist immer im Bau."
 misguided_patriot:0 "Irregeleiteter Patriot"
 misguided_patriot_desc:0 "Dieser Mann ist ein überzeugter Anhänger der Doktrin des „patriotischen Wahlbetrugs“ und hat keine Skrupel, Wahlergebnisse zu „korrigieren“."
 ra_arg_builder:0 "Baumeister"
 ra_arg_builder_desc:0 "Dieser Mann ist dafür bekannt geworden, dass er während seiner Amtszeit öffentliche Bauvorhaben förderte."
 ra_honorbound:0 "Ehrenhaft"
 ra_honorbound_desc:0 "Ortiz will Betrug und Korruption aus der argentinischen Politik ausmerzen."
 ra_antipersonalist:0 "Antipersonalist"
 ra_antipersonalist_desc:0 "Es sind die Ideen, die gelobt werden sollten, nicht die Politiker, die sie vorbringen."
 ra_erudite_conversationalist:0 "Gelehrter Gesprächspartner"
 ra_erudite_conversationalist_desc:0 ""
 ra_national_syndicalism:0 "Nationaler Syndikalismus"
 ra_national_syndicalism_desc:0 ""
 ra_antitotalitarian:0 "Antitotalitär"
 ra_antitotalitarian_desc:0 ""
 ra_respected_politician:0 "Angesehener Politiker"
 ra_respected_politician_desc:0 ""
 ra_media_expert:0 "Medienexperte"
 ra_comintern_secreatary:0 "Mitglied des Komintern-Büros"
