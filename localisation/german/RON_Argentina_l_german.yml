 raforaff.5150.t:0 "[From.GetName] sendet Hilfe!"
 raforaff.5150.da:0 "\nUnsere Mit-Lamas-Unterzeichner, [From.GetName], haben uns eine Lieferung von 1000 Infanterieausrüstungen geschickt, um unsere Kriegsanstrengungen zu unterstützen!"
 raforaff.5150.db:0 "\nUnsere Mit-Lamas-Unterzeichner, [From.GetName], haben uns eine Lieferung von 2500 Infanterieausrüstungen geschickt, um unsere Kriegsanstrengungen zu unterstützen!"
 raforaff.5150.dc:0 "\nUnsere Mit-Lamas-Unterzeichner, [From.GetName], haben uns eine Lieferung von 5000 Infanterieausrüstungen geschickt, um unsere Kriegsanstrengungen zu unterstützen!"
 raforaff.5150.ddd:0 "\nUnsere Mit-Lamas, Signatorie, [From.GetName], hat uns eine Lieferung von 500 Artilleriegeschützen geschickt, um unsere Kriegsanstrengungen zu unterstützen!"
 raforaff.5150.de:0 "\nUnsere Mit-Lamas, Signatorie, [From.GetName], hat uns eine Lieferung von 1000 Artilleriegeschützen geschickt, um unsere Kriegsanstrengungen zu unterstützen!"
 raforaff.5150.df:0 "\nUnsere Mit-Lamas, Signatorie, [From.GetName], hat uns eine Lieferung von 2000 Artilleriegeschützen geschickt, um unsere Kriegsanstrengungen zu unterstützen!"
 raforaff.5150.dg:0 "\nUnsere Mitunterzeichner, Lamas [From.GetName], haben uns eine Lieferung von 250 leichten Panzern zur Unterstützung unserer Kriegsanstrengungen geschickt!"
 raforaff.5150.dh:0 "\nUnsere Mit-Lamas-Unterzeichner, [From.GetName], haben uns eine Lieferung von 500 leichten Panzern geschickt, um unsere Kriegsanstrengungen zu unterstützen!"
 raforaff.5150.di:0 "\nUnsere Mitunterzeichner, Lamas [From.GetName], haben uns eine Lieferung von 1000 leichten Panzern geschickt, um unsere Kriegsanstrengungen zu unterstützen!"
 raforaff.5150.dj:0 "\nUnsere Mitunterzeichner, Lamas [From.GetName], haben uns eine Lieferung von 250 mittleren Panzern zur Unterstützung unserer Kriegsanstrengungen geschickt!"
 raforaff.5150.dk:0 "\nUnsere Mitunterzeichner, Lamas [From.GetName], haben uns eine Lieferung von 500 mittleren Panzern zur Unterstützung unserer Kriegsanstrengungen geschickt!"
 raforaff.5150.dm:0 "\nUnsere Mitunterzeichner, Lamas [From.GetName], haben uns eine Lieferung von 1000 mittleren Panzern geschickt, um unsere Kriegsanstrengungen zu unterstützen!"
 raforaff.5150.dn:0 "\nUnsere Mitunterzeichner, Lamas [From.GetName], haben uns eine Lieferung von 100 Kampfflugzeugen zur Unterstützung unserer Kriegsanstrengungen geschickt!"
 raforaff.5150.do:0 "\nUnsere Mitunterzeichner, Lamas [From.GetName], haben uns eine Lieferung von 200 Kampfflugzeugen geschickt, um unsere Kriegsanstrengungen zu unterstützen!"
 raforaff.5150.dp:0 "\nUnsere Mitunterzeichner, Lamas [From.GetName], haben uns eine Lieferung von 300 Kampfflugzeugen zur Unterstützung unserer Kriegsanstrengungen geschickt!"
 raforaff.5150.dq:0 "\nUnsere Mit-Lamas, Signatorie, [From.GetName], haben uns 2500 Freiwillige geschickt, um unsere Kriegsanstrengungen zu unterstützen!"
 raforaff.5150.dr:0 "\nUnsere Mit-Lamas, Signatorie, [From.GetName], haben uns 5000 Freiwillige geschickt, um unsere Kriegsanstrengungen zu unterstützen!"
 raforaff.5150.ds:0 "\nUnsere Mit-Lamas, Signatorie, [From.GetName], haben uns 10.000 Freiwillige geschickt, um unsere Kriegsanstrengungen zu unterstützen!"
 raforaff.5150.dt:0 "\nUnsere Mit-Lamas Signatorie, [From.GetName], hat uns eine leichte Division zur Unterstützung unserer Kriegsanstrengungen geschickt!"
 raforaff.5150.du:0 "\nUnsere Mit-Lamas Signatorie, [From.GetName], hat uns eine mittlere Division zur Unterstützung unserer Kriegsanstrengungen geschickt!"
 raforaff.5150.dv:0 "\nUnsere Mit-Lamas Signatorie, [From.GetName], hat uns eine schwere Division zur Unterstützung unserer Kriegsanstrengungen geschickt!"
 raforaff.5150.a:0 "Senden Sie [From.GetName] unseren tiefsten Dank."
 ra_raforaff.5150.a_tt:0 "\nDie erhaltene Ausrüstung wird in den nächsten Tagen zu unseren Lagerbeständen hinzugefügt, Freiwilligenabteilungen werden in oder in der Nähe unserer Hauptstadt erscheinen.\n\n"
 #
 raforaff.521.t:0 "Die Vereinigten Staaten beugen sich, um die japanische Aggression im Pazifik zu stoppen"
 raforaff.521.d:0 "\nNach seiner Kriegserklärung an die Philippinen hat Japan jeden möglichen diplomatischen Ausweg aus der wachsenden Spannung im Pazifik versperrt und Washington gezwungen, sich für sein Protektorat einzusetzen.\n\nLondons Hoffnung, dass die USA sich endlich den Kriegsanstrengungen der Alliierten anschließen würden, wurde jedoch zunichte gemacht, da die amerikanische Regierung schnell ankündigte, sie werde eine eigene Fraktion gegen Tokio und seine Verbündeten anführen."
 raforaff.521.a:0 "Wir werden uns selbst um den Kaiser kümmern."
 raforaff.521.b:0 "Hoffen wir, dass ihre Hilfe bald eintrifft."
 raforaff.521.c:0 "Narren, ihr Stolz wird ihr Untergang sein."
 raforaff.521.dd:0 "So eine verpasste Gelegenheit!"
 raforaff.521.e:0 "Besorgniserregend."
#
 raforaff.2141.t:0 "Die argentinische Blockade fordert ihren Tribut"
 raforaff.2141.d:0 "\nDie Auswirkungen der Blockade von Syrien haben unsere Wirtschaft schwer getroffen und das Vertrauen der Bevölkerung in unsere Regierung untergraben. Wir müssen schnell einen Ausweg aus diesem Problem finden, sonst droht unser Land auseinanderzubrechen."
 raforaff.2141.a:0 "Wir müssen durchhalten..."
 raforaff.2141.a_tt:0 "\nWir gewinnen Zeit, aber solange die Blockade besteht, wird sich die Lage unserer Regierung weiter verschlechtern."
 raforaff.2141.b:0 "Wir haben gespielt und verloren ... den Forderungen der Gauchos nachgegeben."
 raforaff.2141.b_tt:0 "\nDer Bundesstaat Chaco Boreal wird im Austausch für die Aufhebung der Blockade an Argentinien übergeben."
 raforaff.2141.c:0 "Wir werden diese Ungerechtigkeit nicht länger tolerieren!"
 raforaff.2141.c_tt:0 "\nEin Krieg würde bedeuten, dass wir vom Saavedra-Lamas-Vertrag zurücktreten müssten, was unsere Beziehungen zu den anderen Unterzeichnern gefährden würde."
#
 raforaff.2142.t:0 "Paraguay gibt unter unserem Druck nach!"
 raforaff.2142.d:0 "\nUnsere Blockade der paraguayischen Handelsrouten hat sich endlich ausgezahlt! Paraguay hat sich bereit erklärt, die Region Chaco Boreal zu übergeben, wenn wir unsere Wasserstraßen wieder für die Schifffahrt öffnen."
 raforaff.2142.a:0 "Ausgezeichnet. Gratulieren Sie unseren Beratern."
