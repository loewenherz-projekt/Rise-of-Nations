 #
 rapworks.1.t:0 "Neue Straßen!"
 rapworks.1.d:0 "Das Projekt zum Ausbau des Straßennetzes im Norden Argentiniens ist abgeschlossen. Asphaltierte und unbefestigte Straßen verbinden nun alle größeren Ballungszentren der Region und eine Vielzahl kleinerer ländlicher Städte mit dem Rest des Landes."
 rapworks.1.a:0 "Exzellent."
 #
 rapworks.2.t:0 "Neue Straßen!"
 rapworks.2.d:0 "Das Projekt zum Ausbau unseres Straßennetzes in den zentralen Regionen Argentiniens ist abgeschlossen. Asphaltierte Straßen verbinden nun alle unsere großen Industriezentren miteinander und ermöglichen einen schnellen, sicheren und effizienten Transport von Produkten und Ressourcen."
 rapworks.2.a:0 "Exzellent."
 #
 rapworks.3.t:0 "Neue Straßen!"
 rapworks.3.d:0 "Das Projekt zum Ausbau unseres Straßennetzes im Süden Argentiniens ist abgeschlossen. Wir haben die Anden mit dem Atlantik verbunden, Städte und Dörfer miteinander verbunden (von denen einige nicht einmal auf unseren Karten verzeichnet waren) und den Hafen von Comodoro Rivadavia erweitert, um größere Schiffe und mehr Fracht aufnehmen zu können."
 rapworks.3.a:0 "Exzellent." 
 #
 rapworks.4.t:0 "Comodoro Rivadavia steigert Produktion!"
 rapworks.4.d:0 "Nach monatelanger Arbeit haben wir diese Phase des Comodoro-Rivadavia-Projekts abgeschlossen. Wir haben neue Bohrlöcher erschlossen, Maschinen installiert und die Leistung des gesamten Betriebs insgesamt verbessert. Die Ölproduktion hat deutlich zugenommen. YPF bittet uns, das Projekt weiterhin zu finanzieren, um die Erträge weiter zu steigern."
 rapworks.4.a:0 "Finanzieren Sie das Projekt weiterhin."
 rapworks.4.a.tt:0 "\nSobald die Arbeiten abgeschlossen sind, erhöht sich die Ölproduktion in Comodoro Rivadavia um 4 und um weitere +1 pro Level der Ausgrabungstechnologie, die Sie nach Ausgrabung I erforscht haben (bis zu +4).\n"
 rapworks.4.b:0 "Legen Sie das Projekt auf Eis."
 rapworks.4.b.tt:0 "Sie werden in sechs Monaten erneut gefragt."
 rapworks.4.c:0 "Das brauchen wir nicht."
 rapworks.4.c.tt:0 "Dies wird dem Bergbauprojekt Comodoro Rivadavia ein Ende setzen!"
 rapworks.4.dd:0 "Richten Sie einen dauerhaften Fonds für dieses Projekt ein."
 rapworks.4.dd.tt:0 "Dadurch wird das Bergbauprojekt Comodor Rivadavia kontinuierlich finanziert, ohne dass Sie etwas dazu beitragen müssen.\n"
 #
 rapworks.6.t:0 "Die Rio Turbio-Kohlenmine"
 rapworks.6.da:0 "Der Ausbau von Rio Turbio war eine schwierige Aufgabe. Die Abgeschiedenheit der Mine, ihre düstere Geschichte (in den 1920er Jahren fanden dort Massenhinrichtungen statt), das Wetter, die fehlende Infrastruktur und viele weitere Faktoren machen das Vorhaben riskant. In der ersten Phase wurde die erste Abbaustätte in Betrieb genommen, doch die Kosten sind zu hoch, da der Großteil der Kohle allein für den Transport verwendet wird. In der zweiten Phase wird eine Eisenbahnstrecke gebaut, um Kosten zu sparen und die Lieferzeit der Kohle zu unseren Industrieanlagen zu verkürzen."
 rapworks.6.db:0 "Die Bauarbeiten an der zweiten Ausgrabungsstätte am Rio Turbio sind abgeschlossen. Auch eine neue Eisenbahnlinie, die von der Mine zum Verschiffungshafen am Rio Gallegos führt, ist bereits fertiggestellt. Eine dritte Ausgrabungsstätte ist geplant, und die YCF schlägt vor, den Hafen am Rio Gallegos zu erweitern, da dessen Infrastruktur den dortigen Aktivitäten nicht gewachsen ist, geschweige denn, wenn die dritte Stätte in Betrieb genommen wird."
 rapworks.6.dc:0 "Mit der Fertigstellung der dritten Ausgrabungsstätte und den Verbesserungen am Hafen von Rio Gallegos können wir das Rio-Turbio-Projekt als abgeschlossen betrachten. Weitere Verbesserungen erfordern weitere langfristige Investitionen, da die Lage der Mine die Menge der Ressourcen, die wir in sie investieren können, begrenzt."
 rapworks.6.a:0 "Fahren Sie mit Phase 2 fort."
 rapworks.6.b:0 "Fahren Sie mit Phase 3 fort."
 rapworks.6.c:0 "Ausgezeichnet, unsere Branche wird nicht mehr hungern."
 rapworks.6.d:0 "Eine weitere Erschließung der Mine können wir uns derzeit nicht leisten."
 rapworks.6.d.tt:0 "Sie werden in sechs Monaten erneut gefragt."
 rapworks.6.e:0 "Das brauchen wir nicht."
 rapworks.6.e.tt:0 "Damit ist das Rio-Turbio-Projekt beendet!"
 #
 rapworks.10.t:0 "Die Mine Los Berros ist fertiggestellt!"
 rapworks.10.d:0 "Wir haben die Vorbereitungen für den Bergbaubetrieb in Los Berros abgeschlossen. Die Ausgrabungsstätte wird unserer Branche zahlreiche im Bauwesen übliche Materialien liefern und uns so dabei helfen, unsere Projekte schneller voranzutreiben."
 rapworks.10.a:0 "Exzellent."
 #
 rapworks.11.t:0 "Die Chrommine von San Carlos"
 rapworks.11.da:0 "Wir haben den Standort mit der höchsten Chromkonzentration in der Region San Carlos ausgewählt und die Mine sowie die notwendige Infrastruktur für den Transport der Rohstoffe gebaut. Obwohl dies noch kostspielig ist, ist eine Ausweitung des Betriebs eine Überlegung wert, zumindest bis wir eine bessere Quelle gefunden haben."
 rapworks.11.db:0 "Der Ausbau der Chromminen in San Carlos ist abgeschlossen. Mit der Bereitstellung der notwendigen Mittel ist es jedoch weiterhin möglich, weitere Vorkommen in der Region zu erschließen."
 rapworks.11.a:0 "Finanzieren Sie das Projekt weiterhin."
 rapworks.11.a.tt:0 "\nSobald die Arbeiten abgeschlossen sind, erhöht sich die Chromproduktion in San Carlos um 4 und um weitere +1 pro Level der Ausgrabungstechnologie, die Sie nach Ausgrabung I erforscht haben (bis zu +4).\n"
 rapworks.11.b:0 "Legen Sie das Projekt auf Eis."
 rapworks.11.b.tt:0 "Sie werden in sechs Monaten erneut gefragt."
 rapworks.11.c:0 "Das brauchen wir nicht."
 rapworks.11.c.tt:0 "Dies wird dem Bergbauprojekt San Carlos ein Ende setzen!"
 rapworks.11.dd:0 "Richten Sie einen dauerhaften Fonds für dieses Projekt ein."
 rapworks.11.dd.tt:0 "Dadurch wird das Bergbauprojekt San Carlos kontinuierlich finanziert, ohne dass Sie etwas dazu beitragen müssen.\n"
 #
 rapworks.13.t:0 "Die Cerro Aspero Mine"
 rapworks.13.da:0 "Die Erweiterung der Cerro Aspero-Mine ist abgeschlossen. Die ursprüngliche Abbaustätte, die die Hauptader des Gebiets abdeckt, wurde erweitert und die alten Maschinen ersetzt. Eine Produktionssteigerung ist bereits erkennbar, doch zusätzliche Mittel würden es der Mine ermöglichen, auch nahegelegene Lagerstätten zu erschließen."
 rapworks.13.db:0 "Der Ausbau des Bergbaukomplexes Cerro Aspero ist abgeschlossen. Wir haben neue Lagerstätten erschlossen und die Ausbeute bestehender Lagerstätten erhöht. Mit entsprechender Finanzierung ist eine weitere Expansion möglich."
 rapworks.13.a:0 "Finanzieren Sie das Projekt weiterhin."
 rapworks.13.a.tt:0 "\nSobald die Arbeiten abgeschlossen sind, erhöht sich die Wolframproduktion in Cerro Aspero um 4 und um weitere +1 pro Level der Ausgrabungstechnologie, die Sie nach Ausgrabung I erforscht haben (bis zu +4).\n"
 rapworks.13.b:0 "Legen Sie das Projekt auf Eis."
 rapworks.13.b.tt:0 "Sie werden in sechs Monaten erneut gefragt."
 rapworks.13.c:0 "Das brauchen wir nicht."
 rapworks.13.c.tt:0 "Dies wird dem Bergbauprojekt Cerro Aspero ein Ende setzen!"
 rapworks.13.dd:0 "Richten Sie einen dauerhaften Fonds für dieses Projekt ein."
 rapworks.13.dd.tt:0 "Dadurch wird das Bergbauprojekt Cerro Aspero kontinuierlich finanziert, ohne dass Sie etwas dazu beitragen müssen.\n"
 #
 rapworks.15.t:0 "Die Prospektion des Zapla-Waldes ist abgeschlossen!"
 rapworks.15.d:0 "Wir haben unsere Prospektionsarbeiten im Zapla-Wald abgeschlossen. Unsere Experten nennen diese Eisenart „Zaplit“, eine Variante des Hämatits mit sehr ähnlichen Eigenschaften wie die in Thüringen gefundene. Obwohl die Konzentrationen knapp unter dem für eine rentable Operation erforderlichen Wert liegen, betonen unsere Berater – insbesondere General Savio – die strategische Bedeutung. Bis wir mehr Ressourcen einsetzen können, improvisieren wir eine kleine Ausgrabungsstätte und nutzen dabei die während der Prospektion errichtete Infrastruktur."
 rapworks.15.a:0 "Sehr gut, wir werden das neue Projekt in Betracht ziehen."
 #
 rapworks.16.t:0 "Die Zoneneinteilung in Buenos Aires ist abgeschlossen!"
 rapworks.16.d:0 "Die Arbeiten zur Verbesserung und Erweiterung der Industriegebiete in Buenos Aires sind abgeschlossen. Diese Gebiete haben bereits die Aufmerksamkeit einiger Unternehmen auf sich gezogen, die sich dort ansiedeln möchten."
 rapworks.16.a:0 "Exzellent."
 #
 rapworks.17.t:0 "Die Zoneneinteilung in Mendoza ist abgeschlossen!"
 rapworks.17.d:0 "Die Arbeiten zur Verbesserung und Erweiterung der Industriegebiete in Mendoza sind abgeschlossen. Diese Gebiete haben bereits die Aufmerksamkeit einiger Unternehmen auf sich gezogen, die sich dort ansiedeln möchten."
 rapworks.17.a:0 "Exzellent."
 #
 rapworks.18.t:0 "Die Zoneneinteilung in Santa Fe ist abgeschlossen!"
 rapworks.18.d:0 "Die Arbeiten zur Verbesserung und Erweiterung der Industriegebiete in Santa Fe sind abgeschlossen. Diese Gebiete haben bereits die Aufmerksamkeit einiger Unternehmen auf sich gezogen, die sich dort ansiedeln möchten."
 rapworks.18.a:0 "Exzellent."
 #
 rapworks.19.t:0 "Die Zoneneinteilung in Córdoba ist abgeschlossen!"
 rapworks.19.d:0 "Die Arbeiten zur Verbesserung und Erweiterung der Industriegebiete in Córdoba sind abgeschlossen. Diese Gebiete haben bereits die Aufmerksamkeit einiger Unternehmen auf sich gezogen, die sich dort ansiedeln möchten."
 rapworks.19.a:0 "Exzellent."
 #
 rapworks.20.t:0 "Die Zoneneinteilung in Patagonien ist abgeschlossen!"
 rapworks.20.d:0 "Die Arbeiten zur Verbesserung und Erweiterung der Industriegebiete in Patagonien sind abgeschlossen. Diese Gebiete haben bereits die Aufmerksamkeit einiger Unternehmen auf sich gezogen, die sich dort ansiedeln möchten."
 rapworks.20.a:0 "Exzellent."
 #
 rapworks.21.t:0 "Die Zonierung im argentinischen Norden ist abgeschlossen!"
 rapworks.21.d:0 "Die Arbeiten zur Verbesserung und Erweiterung der Industriegebiete im Norden Argentiniens sind abgeschlossen. Diese Gebiete haben bereits die Aufmerksamkeit einiger Unternehmen auf sich gezogen, die sich dort ansiedeln möchten."
 rapworks.21.a:0 "Exzellent."
 #
 rapworks.22.t:0 "Die Rio Santiago Dockyards sind fertiggestellt!"
 rapworks.22.d:0 "In der Stadt Ensenada, nahe La Plata und weniger als 50 Kilometer südlich von Buenos Aires, ist der Werftkomplex Rio Santiago nun betriebsbereit. Seine Anlagen entsprechen dem neuesten Stand der Technik und ermöglichen den Bau großer Einheiten für zivile und militärische Zwecke."
 rapworks.22.a:0 "Exzellent."
 #
 rapworks.23.t:0 "Das Aerotechnische Institut ist fertiggestellt!"
 rapworks.23.d:0 "Das Aerotechnische Institut, errichtet auf den Anlagen der Fábrica Militar de Aviones in Córdoba, ist nun bereit, seinen Betrieb aufzunehmen. Brigadebürgermeister Juan Ignacio San Martín hat Experten aus Europa angeworben, um die von der FMA übernommene Belegschaft zu ergänzen. Wir sind nun bereit, eine neue Ära in der Luftfahrttechnik unseres Landes einzuläuten."
 rapworks.23.a:0 "Exzellent."
 #
 rapworks.24.t:0 "Der Militärkomplex Villa Maria ist fertiggestellt!"
 rapworks.24.d:0 "Der Militärkomplex Villa Maria liegt auf halbem Weg zwischen Córdoba und Rosario und ist nun bereit für den Betrieb. In diesen Fabriken wird vor allem Schießpulver und andere Sprengstoffe für unsere Streitkräfte produziert."
 rapworks.24.a:0 "Exzellent."
 #
 rapworks.25.t:0 "Der Azul-Militärkomplex ist fertiggestellt!"
 rapworks.25.d:0 "Fast im Zentrum der Provinz Buenos Aires gelegen, ist der Azul-Militärkomplex nun bereit, seinen Betrieb aufzunehmen. Der Bau dieser Fabriken wurde von unserer Marine beantragt, um sie zur Herstellung von Schiffsbewaffnung und Munition zu nutzen."
 rapworks.25.a:0 "Exzellent."
 #
 rapworks.26.t:0 "Der Militärkomplex Rio Tercero ist fertiggestellt!"
 rapworks.26.d:0 "Knapp 100 Kilometer südlich der Stadt Córdoba gelegen, ist der Militärkomplex Rio Tercero nun bereit für den Betrieb. Der Komplex wird sich auf die metallurgische und chemische Produktion konzentrieren."
 rapworks.26.a:0 "Exzellent."
 #
 rapworks.27.t:0 "Der Militärkomplex Fray Luis Beltran ist fertiggestellt!"
 rapworks.27.d:0 "Nördlich der Stadt Rosario gelegen, ist der Militärkomplex Fray Luis Beltrán nun bereit, seinen Betrieb aufzunehmen. Die Anlagen des San Lorenzo Arsenal wurden vom Vorstand der Fabricaciones Militares neu organisiert und dienen nun der Herstellung von Kleinwaffen und Artilleriemunition."
 rapworks.27.a:0 "Exzellent."
 #
 rapworks.28.t:0 "Die Erweiterung des Marinestützpunkts Puerto Belgrano ist abgeschlossen!"
 rapworks.28.d:0 "Der Marinestützpunkt Puerto Belgrano liegt in der Nähe von Punta Alta und Bahia Blanca und ist nun bereit, eine größere Anzahl von Schiffen zu reparieren und zu versorgen. Außerdem wurden neue Anlagen für die Unterbringung von Marineflugzeugen errichtet, die im Verbund mit unseren Flotten arbeiten."
 rapworks.28.a:0 "Exzellent."
 #
 rapworks.29.t:0 "Das Palomar Military College ist fertiggestellt!"
 rapworks.29.d:0 "In der Stadt Palomar, nur wenige Kilometer westlich von Buenos Aires, wurde nach fast dreißig Jahren Baupause das Palomar Military College endlich fertiggestellt. Das College wird die nächste Generation von Studenten unseres Militärs aufnehmen und ihnen die bestmögliche Ausbildung des Landes bieten. Unser ernannter Schulleiter teilte uns mit, dass bereits Tausende von Bewerbungen vorliegen."
 rapworks.29.a:0 "Exzellent."
 #
 raresources.1.t:0 "Das Altos Hornos Zapla-Projekt ist abgeschlossen!"
 raresources.1.d:0 "Nach einem Jahr Arbeit ist das Zapla-Projekt abgeschlossen. Eine Eisenbahnlinie für den Transport von Material, Arbeitern und der Minenproduktion wurde gebaut. In den nahegelegenen Eukalyptuswäldern im Süden wurde ein Holzfällerlager eingerichtet, um Holzkohle für den Hochofen zu produzieren. Schließlich wurde in Puesto Viejo eine zweite Grabungsstätte für die Arbeiten vorbereitet."
 raresources.1.a:0 "Exzellent."
 #
 raresources.2.t:0 "Erweitern Sie die Zapla-Mine"
 raresources.2.d:0 "Jetzt, da das Zapla-Projekt abgeschlossen ist, können wir die zweite Ausgrabungsstätte der Mine, Puesto Viejo, erweitern und so ihre Produktion steigern."
 raresources.2.a:0 "Sehr gut, senden Sie die erforderlichen Mittel."
 raresources.2.a.tt:0 "\nSobald die Arbeiten abgeschlossen sind, erhöht sich die Stahlproduktion in Zapla um 4 und um weitere +1 pro Level der Ausgrabungstechnologie, die Sie nach Ausgrabung I erforscht haben (bis zu +4).\n"
 raresources.2.b:0 "Wir können die Mittel derzeit nicht entbehren."
 raresources.2.b.tt:0 "Sie werden in einigen Monaten erneut gefragt."
 raresources.2.c:0 "Das brauchen wir nicht."
 raresources.2.c.tt:0 "Dies wird unseren Bemühungen zur Erweiterung der Zapla-Mine ein Ende setzen!"
 raresources.2.dd:0 "Richten Sie einen dauerhaften Fonds für dieses Projekt ein."
 raresources.2.dd.tt:0 "Dadurch wird das Zapla-Bergbauprojekt kontinuierlich finanziert, ohne dass Sie etwas dazu beitragen müssen.\n"
 #
 raresources.4.t:0 "Der Aufstieg der Synthethik"
 raresources.4.d:0 "Nachdem unsere Chemiker das Geheimnis synthetischer Materialien gelüftet haben, können wir den Bau von Laboren finanzieren, in denen wir Rohstoffe produzieren können, die andere Länder nicht verkaufen wollen oder die wir uns schlicht nicht leisten können. Wenn die Wissenschaftler Recht haben, können wir sogar völlig neue Materialien für unsere Industrie herstellen. Dazu bedarf es nur entsprechender Finanzierung."
 raresources.4.a:0 "Bauen Sie unsere synthetische Industrie weiter aus."
 raresources.4.a.tt:0 "\nSobald die Arbeiten abgeschlossen sind, erhöht sich die Gummiproduktion in Santa Fe um 4 und um weitere +1 pro Technologiestufe, die Sie im Synthesebaum nach den Experimenten mit synthetischem Öl haben (bis zu +4).\n"
 raresources.4.b:0 "Wir können derzeit keine weiteren Mittel entbehren."
 raresources.4.b.tt:0 "Sie werden in sechs Monaten erneut gefragt."
 raresources.4.c:0 "Das brauchen wir nicht."
 raresources.4.c.tt:0 "Dies wird unseren Bemühungen, unsere synthetische Industrie auszubauen, ein Ende setzen!"
 raresources.4.dd:0 "Richten Sie einen dauerhaften Fonds für dieses Projekt ein."
 raresources.4.dd.tt:0 "Dadurch wird unsere synthetische Industrie kontinuierlich finanziert, ohne dass Sie etwas dazu beitragen müssen.\n"
