 ra_expanding_navy_school:0 "Erweiterung der Marine-Militärschule"
 ra_expanding_navy_school_desc:0 "Die Arbeiten zur Erweiterung der Marine-Militärschule sind im Gange."
 ra_argentinian_naval_academy:0 "Marine-Militärschule"
 ra_argentinian_naval_academy_desc:0 "Das neue Schulgelände bietet Komfort und Bildung auf dem Niveau der besten Einrichtungen der Welt."
 ra_naval_engineer_school:0 "Schiffsbauschule"
 ra_naval_engineer_school_desc:0 "Unsere Männer werden der Welt zeigen, was argentinischer Einfallsreichtum hervorbringen kann, wenn man ihm den richtigen Arbeitsbereich zur Verfügung stellt."
 ##########################################
