 raeconomic.19.t:0 "Das neue YPF-Gebäude ist fertig!"
 raeconomic.19.d:0 "Das neue Verwaltungsgebäude von YPF befindet sich an der Avenida Roca Saenz Peña in Buenos Aires. Das Unternehmen Petersen, Thiele und Cruz hat das Gebäude in 300 Tagen intensiver Arbeit genau wie versprochen fertiggestellt. Es verfügt über 1646 m2, verteilt auf drei Untergeschosse und zwölf Stockwerke, und beherbergt einen großen Saal, Präsentationsräume, eine Schatzkammer, eine Verkaufsabteilung, eine Bibliothek, ein Museum sowie Büros für Mitarbeiter und Direktoren. Es hat außerdem direkten Zugang zur U-Bahn-Linie C.\n\nWährend sich die Mitarbeiter in den neuen Büros einrichten, bespricht der Vorstand bereits neue Ideen und Projekte für das Unternehmen."
 raeconomic.19.a:0 "Sehr gut, sagen Sie dem Vorstand, dass wir warten werden."
 #
 raeconomic.20.t:0 "Neue YPF-Projekte"
 raeconomic.20.d:0 "Der Vorstand hat Ihnen eine Reihe von Projekten zur Prüfung vorgelegt. Was auch immer Sie auswählen, wird den Schwerpunkt des Unternehmens für das Jahr bilden."
 raeconomic.20.a:0 "Fokus auf neue Raffinerien."
 raeconomic.20.b:0 "Fokus auf Infrastruktur."
 raeconomic.20.c:0 "Konzentrieren Sie sich auf den Bergbau."
 #
 raeconomic.21.t:0 "Die SOMISA-Stelworks sind fertig!"
 raeconomic.21.d:0 "Nach zwei Jahren harter Arbeit wurde das SOMISA-Stahlwerk am Stadtrand von Rosario fertiggestellt. General Savio nahm an der Eröffnung teil und sprach stolz davon, wie das Werk die argentinische Industrialisierung in den kommenden Jahren vorantreiben werde. Das Werk kann jährlich über 632.000 Tonnen Flüssigstahl produzieren. Dies ist jedoch nicht das Ende des Nationalen Metallurgieplans. Private Unternehmen strömen nun in die Region, sowohl wegen der Vorteile des Stahlwerks als auch um eigene metallurgische Projekte zu unterstützen."
 raeconomic.21.a:0 "Ein wahrhaft historischer Moment für unser Land."
 #
 raeconomic.22.t:0 "Kongresssitzungen zum Thema Sozialfürsorge"
 raeconomic.22.d:0 "Im vergangenen Monat tagte unser Kongress zu Sozialgesetzen. Einige Parteien äußerten Bedenken hinsichtlich der Kosten für den Staat und der damit verbundenen kommunistischen Tendenzen, doch kein Abgeordneter wollte die politischen Kosten eines Widerstands tragen. Mehr noch: Unsere Partei hat die Gespräche initiiert und profitierte am meisten davon."
 raeconomic.22.a:0 "Der frühe Vogel bekommt die Stimmen."
 #
 raeconomic.23.t:0 "Öffentliche Krankenversicherung"
 raeconomic.23.d:0 "Nachdem das öffentliche Gesundheitssystem nun in Gang gesetzt wurde, geht es nur noch darum, zu entscheiden, wie viele Ressourcen wir hineinstecken wollen."
 raeconomic.23.a:0 "Eingeschränkte Abdeckung."
 raeconomic.23.b:0 "Umfassende Abdeckung."
