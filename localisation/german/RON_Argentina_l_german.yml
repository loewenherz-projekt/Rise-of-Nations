 ARG_am_fabrica_militar_aviones_fal:0 "Fabrica Militar de Aviones"
 ARG_am_fabrica_militar_aviones_fal_desc:0 "Die im Jahr 1927 fertiggestellte Aircraft Military Factory (FMA) ist führend in der Entwicklung der Luftfahrtwissenschaft und des Ingenieurwesens unseres Landes.\n\nEine flexible Montagelinie wird es uns ermöglichen, weiterhin eine große Vielfalt an Designs zu untersuchen und gleichzeitig verschiedene Flugzeugtypen zu produzieren, wenn auch nicht so effektiv."
 arg_fma_flexible_assembly_line:0 "Flexible Montagelinie"
 ARG_am_fabrica_militar_aviones_faf:0 "Fabrica Militar de Aviones"
 ARG_am_fabrica_militar_aviones_faf_desc:0 "Die im Jahr 1927 fertiggestellte Aircraft Military Factory (FMA) ist führend in der Entwicklung der Luftfahrtwissenschaft und des Ingenieurwesens unseres Landes.\n\nWenn wir unsere Werkstätten auf Leichtflugzeuge konzentrieren, können wir sie schneller bauen und mit besseren Designs experimentieren."
 arg_fma_light_aircraft_focus:0 "Fließband für Leichtflugzeuge"
 ARG_am_fabrica_militar_aviones_baf:0 "Fabrica Militar de Aviones"
 ARG_am_fabrica_militar_aviones_baf_desc:0 "Die Aircraft Military Factory (FMA) wurde 1927 fertiggestellt und ist führend in der Entwicklung der Luftfahrtwissenschaft und des Ingenieurwesens unseres Landes.\n\nWenn wir unsere Werkstätten auf schwere Flugzeuge konzentrieren, können wir sie schneller bauen und mit besseren Designs experimentieren."
 arg_fma_heavy_aircraft_focus:0 "Fließband für schwere Flugzeuge"
 ARG_am_instituto_aerotecnico_fal:0 "Instituto Aerotecnico"
 ARG_am_instituto_aerotecnico_fal_desc:0 "Das Aerotechnische Institut ist der nächste Schritt in den Bemühungen unseres Landes, unsere Luftfahrtindustrie auszubauen. Basierend auf der FMA wird das Institut die gesamte Produktion zentralisieren und sowohl zivile Auftragnehmer als auch ausländische Spezialisten einbeziehen.\n\nEine flexible Fertigungsstraße wird es uns ermöglichen, weiterhin eine große Vielfalt an Designs zu untersuchen und gleichzeitig verschiedene Flugzeugtypen zu produzieren, wenn auch nicht so effektiv. "
 arg_ia_flexible_assembly_line:0 "Flexible Montagelinie"
 ARG_am_instituto_aerotecnico_laf:0 "Instituto Aerotecnico"
 ARG_am_instituto_aerotecnico_laf_desc:0 "Das Aerotechnische Institut ist der nächste Schritt in den Bemühungen unseres Landes, unsere Luftfahrtindustrie weiterzuentwickeln. Basierend auf der FMA wird das Institut die gesamte Produktion zentralisieren und sowohl zivile Auftragnehmer als auch ausländische Spezialisten einbeziehen. Wenn wir unsere Werkstätten auf Leichtflugzeuge konzentrieren, können wir diese schneller bauen und mit besseren Designs experimentieren."
 arg_ia_light_aircraft_line:0 "Fließband für Leichtflugzeuge"
 ARG_am_instituto_aerotecnico_haf:0 "Instituto Aerotecnico"
 ARG_am_instituto_aerotecnico_haf_desc:0 "Das Aerotechnische Institut ist der nächste Schritt in den Bemühungen unseres Landes, unsere Luftfahrtindustrie weiterzuentwickeln. Basierend auf der FMA wird das Institut die gesamte Produktion zentralisieren und sowohl zivile Auftragnehmer als auch ausländische Spezialisten einbeziehen. Wenn wir unsere Werkstätten auf schwere Flugzeuge konzentrieren, können wir diese schneller bauen und mit besseren Designs experimentieren."
 arg_ia_heavy_aircraft_line:0 "Fließband für schwere Flugzeuge"
 cat_heavy_fighter_research:0 "Forschung zu schweren Jägern"
 ARG_am_instituto_aerotecnico_bnpb:0 "Insituto Aerotecnico"
 ARG_am_instituto_aerotecnico_bnpb_desc:0 "Das Aerotechnische Institut ist der nächste Schritt in den Bemühungen unseres Landes, unsere Luftfahrtindustrie auszubauen. Basierend auf der FMA wird das Institut die gesamte Produktion zentralisieren und sowohl zivile Auftragnehmer als auch ausländische Spezialisten einbeziehen. Da der Marinestützpunkt Puerto Belgrano nun über die notwendige Infrastruktur verfügt, können wir unsere Aktivitäten ausweiten und speziell für unsere Flotten entwickelte Modelle bauen."
 arg_ia_bnpb_line:0 "Fließband der Marinefliegerei"
 #
 ### INDUSTRIAL CONCERNS ###
 #
 ARG_ic_GEOPE:0 "Compañia General de Obras Publicas SA"
 ARG_ic_GEOPE_desc:0 "GEOPE ist seit Jahrzehnten für einige der bedeutendsten Bauprojekte des Landes verantwortlich. Von „La Bombonera“, dem Fußballstadion von Boca Junior, bis hin zu den ersten U-Bahn-Linien in Buenos Aires. Jedes Projekt wurde nach höchsten Standards gebaut, was angesichts der Tatsache, dass es sich um eine Tochtergesellschaft des deutschen Kapitalunternehmens Philipp Holzmann handelt, nicht verwunderlich ist."
 arg_geope_giant_contractor:0 "Riesiger Auftragnehmer"
 construction_tech_research:0 "Bauforschung"
 ARG_ic_MRdlP:0 "Molinos Rio de la Plata"
 ARG_ic_MRdlP_desc:0 "Bunge &amp; Born, der internationale Getreideexportriese, der zusammen mit Dreyfus &amp; Weil über 80 % des weltweiten Getreidemarktes hält, gründete 1902 Molinos Rio de la Plata als Holding in Argentinien.\n\n Mit seinen enormen Ressourcen monopolisierte das Unternehmen den Weizenmarkt und verdrängte schnell die Konkurrenz. Nach dem Ersten Weltkrieg weitete es seine Geschäftstätigkeit auf Baumwolle, Sonnenblumen, Erdnüsse, Soja, Reis, Mate und Pflanzenöle in Argentinien und Brasilien aus.\n\n Nach dem Tod von Eduard Bunge im Jahr 1927 wurde Alfredo Hirsch der neue Geschäftsführer. Er gab dem Unternehmen ein klares industrielles Profil und brachte viele neue Lebensmittel auf den Markt.\n\n Das B&amp;B ist praktisch ein Tor, durch das jeder gehen muss, der Lebensmittel aus Südamerika kaufen möchte."
 arg_mrdlp_food_processing_giant:0 "Riese der Lebensmittelverarbeitung"
 ARG_ic_phillips:0 "Phillips"
 ARG_ic_phillips_desc:0 "Dieses niederländische Elektronikunternehmen gründete 1935 seine erste Fabrik in unserem Land. Während der Fokus zunächst nur auf schillernden Lampen lag, haben wir gehört, dass es bereits neue Fabriken und Produkte plant."

 radio_detection_research:0 "Radiodetektionsforschung"
 ARG_ic_siemens:0 "Siemens AG"
 ARG_ic_siemens_desc:0 "Bereits 1935 brachte der deutsche Elektronikkonzern Siemens seine Tochtergesellschaft OSRAM ins Land, um dort eine Fabrik für irisierende Lampen zu errichten. Mit den richtigen Anreizen könnten wir die Deutschen zu weiteren Investitionen ermutigen. "
 arg_ic_siemens_electronics:0 "Elektronikunternehmen"
 arg_ic_phillips_electronics:0 "Elektronikunternehmen"
 ARG_ic_siam_di_tella:0 "SIAM"
 ARG_ic_siam_di_tella_desc:0 "Nach einem Geistesblitz im Jahr 1911, als ein breiter Streik der Bäcker in Buenos Aires das Rathaus dazu zwang, ein Gesetz zu verabschieden, das alle Bäckereien zum Einsatz mechanischer Knetmaschinen zwang, suchte Di Tella seinen Freund Guido Allegrucci, einen Mechaniker, auf und gründete SIAM (Sociedad Industrial de Amasadoras Mecanicas). Ihre mechanische Knetmaschine war besser und billiger als die importierten Modelle und verkaufte sich wie warme Semmeln. In den folgenden Jahren expandierte SIAM kontinuierlich, profitierte von einem Vertrag mit YPF zum Bau von Pumpen und zentralisierte schließlich alle Werkstätten in einer riesigen Fabrik in Avellaneda. Nach Uriburu&#39;s Putsch weitete SIAM seine Produktion auf viele Konsumgüter aus, darunter den bekanntesten Familienkühlschrank, der heute in jedem Haushalt des Landes zu finden ist."
 arg_ic_siam_consumer_goods_manufacturer:0 "Konsumgüterhersteller"
# ARG_ic_YCF:0 "YCF"
# ARG_ic_YCF_desc:0 "Yacimientos Carboniferos Fiscales is Argentina's back up plan in case a new major world conflict ocurrs. Generators, trains, foundries and practically all our industry runs on coal, which we import. Were shortages to happen they could put a complete halt to our industrialization efforts. The purpose of the YCF is to develop our own coal mining operations in order to ensure that doesn't happen."
# arg_ic_YCF_mining_operations:0 "Mining Operations"
 ARG_ic_YPF:0 "YPF"
 ARG_ic_YPF_desc:0 "Yacimientos Petroliferos Fiscales wurde 1922 gegründet und machte Argentinien nach der Sowjetunion zum zweiten Land der Welt mit einem staatlichen Ölkonzern. General Mosconi leitete YPF seit seiner Gründung und baute unsere Ölförderungs- und Raffinationskapazitäten erheblich aus, mit dem Ziel der Autarkie. Nach Uriburu&#39;s Putsch 1930 trat Mosconi zurück. Er hatte YPF zu einer vollständigen Monopolstellung auf dem Markt geführt – Konkurrenten wie Shell und Esso weit hinter sich gelassen – und Hunderte von Kerosin- und Kraftstoffzapfanlagen im ganzen Land installiert. Das Unternehmen wächst weiter, sein letzter großer Erfolg sind die neuen Ölquellen auf Tranquitas, nahe der bolivianisch-paraguayischen Grenze. "
 arg_ic_YPF_state_run_oil_company:0 "Vertikal integriertes Ölunternehmen"
 #
 ### TANK DESIGNER ###
 #
 arg_tm_TAMET:0 "TAMET"
 arg_tm_TAMET_desc:0 "TAMET wurde 1902 als Rezzonico, Ottonello &amp; Cia gegründet und war bereits aus der Fusion dreier verschiedener Unternehmen hervorgegangen. Es entstand nach der Übernahme des größten Konkurrenten „Compania Argentina de Hierros y Aceros Pedro Vasena e Hijos LTD“ im Jahr 1926.\n\nDurch diese Fusion erhielt TAMET Zugang zum einzigen Industriekomplex des Landes, der Stahlbarren herstellen konnte, und war somit nicht mehr von importierten Produkten abhängig.\n\nIn den folgenden Jahren kaufte das Unternehmen weiterhin kleinere Konkurrenten auf und wurde zum größten Metallurgieunternehmen Südamerikas und zu einem wahren Industriegiganten."
 arg_tm_tamet_expert_metallurgists:0 "Erfahrene Metallurgen"
 arg_tm_AEdL:0 "Arsenal Esteban de Luca"
 arg_tm_AEdL_desc:0 "Das Esteban de Luca Arsenal wurde 1885 gegründet, erhielt seinen heutigen Namen jedoch erst 1917. Es liegt in der Stadt Buenos Aires, verfügt über mehrere Werkstätten und war ein wichtiges Versorgungsdepot und Waffenentwicklungszentrum für die Armee."
 arg_tm_AEdL_integrated_firepower:0 "Integrierte Feuerkraft"
 arg_tm_HA:0 "Hispano-Argentinien"
 arg_tm_HA_desc:0 "Carlos Ballester, ein Geschäftsmann mit Erfahrung in der Waffenproduktion, erhielt 1925 von Hispano-Suiza die erforderliche Genehmigung zur Gründung einer argentinischen Tochtergesellschaft. Er zentralisierte die Produktion in seiner Waffenfabrik, einem 5.000 m² großen Gebäude in Caballito, das mit der damals besten verfügbaren Technologie ausgestattet war, und gründete HAFDASA: „Hispano-Argentina Fabrica de Automobiles SA“. In den folgenden Jahren produzierte HAFDASA hochwertige Autos, Lastwagen und Busse für den zivilen und militärischen Einsatz. Für die Montagelinie wurden größtenteils lokal hergestellte Teile verwendet. Einer ihrer Motoren, der H6, überraschte sogar europäische Unternehmen, und viele von ihnen kopierten sein Design. Anfang der 30er Jahre sicherte sich HAFDASA aufgrund seines Rufs als Qualitäts- und Innovationsentwickler einen lukrativen Vertrag mit der argentinischen Armee. Der Criollo-Motor ist ein verbrauchsarmes und äußerst zuverlässiges Bauteil, das in Lastwagen unterschiedlicher Größe funktioniert, vom Truppentransporter bis zum Artillerietransporter."
 arg_tm_HA_high_quality_designs:0 "Hochwertige Designs"
 #
 ### MATERIEL DESIGNER ###
 #
 arg_mm_DGFM_sam:0 "Fabricaciones Militares"
 arg_mm_DGFM_sam_desc:0 "Fabricaciones Militares wurde von General Manuel Savio als eine Möglichkeit konzipiert, die Schwerindustrie und Waffenentwicklung unseres Landes zu fördern, zwei Bereiche, in denen wir im Rückstand sind.\n\nUm diese Ziele zu erreichen, haben wir dem Vorstand keine Budgetbeschränkungen auferlegt. Er kann so viel für die Entwicklung des Unternehmens ausgeben, wie er für nötig hält, und die besten verfügbaren Spezialisten des Landes und des Rests der Welt einstellen."
 arg_mm_DGFM_booming_military_complex:0 "Boomender Militärkomplex"
 arg_mm_FORD:0 "FORD"
 arg_mm_FORD_desc:0 "Ford betrat 1913 den argentinischen Markt. Als das dortige Montagewerk 1917 fertiggestellt wurde, war es das erste in Lateinamerika. 1922 eröffnete ein zweites Werk im Stadtteil La Boca in Buenos Aires. Die steigende Nachfrage gab dem Unternehmen seitdem viel Raum zum Wachsen."
 arg_mm_FORD_great_multinational:0 "Multinationaler Automobilkonzern"
 arg_mm_GM:0 "General Motors"
 arg_mm_GM_desc:0 "Hampton &amp; Watson handelte 1922 mit General Motors einen Vertrag zur Produktion von Chevrolet-Fahrzeugen im Land aus. Das erste Modell wurde 1924 fertiggestellt. Um Kosten zu sparen, wurden sowohl einheimische als auch importierte Teile verwendet.\n\n1925 übernahm GMC die direkte Kontrolle über das Unternehmen. Das Werk in der Huergo Street war mit der neuesten Technologie ausgestattet. Bis zum Jahresende hatte das Unternehmen mehr als 400 Vertreter und über 6500 Einheiten verkauft.\n\nMitte der 30er Jahre konnte das Fließband 120 Einheiten pro Tag produzieren und wurde zum führenden Anbieter von Lastwagen für den öffentlichen Nahverkehr. 40 % dieser Fahrzeuge wurden in der Fabrik hergestellt."
 arg_mm_GM_great_multinational:0 "Multinationaler Automobilkonzern"
 arg_mm_HA:0 "Hispano-Argentinien"
 arg_mm_HA_desc:0 "Carlos Ballester, ein Geschäftsmann mit Erfahrung in der Waffenproduktion, erhielt 1925 von Hispano-Suiza die erforderliche Genehmigung zur Gründung einer argentinischen Tochtergesellschaft. Er zentralisierte die Produktion in seiner Waffenfabrik, einem 5.000 m² großen Gebäude in Caballito, das mit der damals besten verfügbaren Technologie ausgestattet war, und gründete HAFDASA: „Hispano-Argentina Fabrica de Automobiles SA“. In den folgenden Jahren produzierte HAFDASA hochwertige Autos, Lastwagen und Busse für den zivilen und militärischen Einsatz. Für die Montagelinie wurden größtenteils lokal hergestellte Teile verwendet. Einer ihrer Motoren, der H6, überraschte sogar europäische Unternehmen, und viele von ihnen kopierten sein Design. Anfang der 30er Jahre sicherte sich HAFDASA aufgrund seines Rufs als Qualitäts- und Innovationsentwickler einen lukrativen Vertrag mit der argentinischen Armee. Der Criollo-Motor ist ein verbrauchsarmes und äußerst zuverlässiges Bauteil, das in Lastwagen unterschiedlicher Größe funktioniert, vom Truppentransporter bis zum Artillerietransporter."
 arg_mm_HA_high_quality_designs:0 "Hochwertige Designs"
 arg_mm_AEdL:0 "Arsenal Esteban de Luca"
 arg_mm_AEdL_desc:0 "Das Esteban de Luca Arsenal wurde 1885 gegründet, erhielt seinen heutigen Namen jedoch erst 1917. Es liegt in der Stadt Buenos Aires, verfügt über mehrere Werkstätten und war ein wichtiges Versorgungsdepot und Waffenentwicklungszentrum für die Armee."
 arg_mm_AEdL_integrated_firepower:0 "Integrierte Feuerkraft"
 #
 ### NAVAL DESIGNER ###
 #
 arg_nm_ANBS:0 "Arsenal Naval Buenos Aires"
 arg_nm_ANBS_desc:0 "Das am südlichen Kanal des Hafens von Buenos Aires gelegene Marinearsenal wurde 1879 zur Reparatur und Wartung der Marine des Landes gegründet. Da es sich im Herzen unseres Industrie- und Handelszentrums befindet, ist es die Werft, die am einfachsten zu beliefern und zu erweitern ist."
 arg_nm_ANBS_booming_naval_complex:0 "Boomender Marinekomplex"
 arg_nm_APB:0 "Marinearsenal Puerto Belgrano"
 arg_nm_APB_desc:0 "Das Marinearsenal Puerto Belgrano wurde 1905 gemäß General Order N.74 auf dem Gelände des damaligen Puerto Militar, dem heutigen Puerto Belgrano, errichtet. Seine zentrale Lage in der Nähe des Operationszentrums der Marine gewährleistet eine schnelle und effiziente Reparatur und Versorgung der Flottenschiffe." 
 arg_nm_APB_south_atlantic_fleet:0 "Südatlantikflotte"
 arg_nm_ASTARSA:0 "ASTARSA"
 arg_nm_ASTARSA_desc:0 "Hansen &amp; Puccini gründeten 1927 an der Küste des Luján-Flusses, nahe der Stadt Tigre, das Unternehmen, aus dem später ASTARSA hervorging. In den letzten zehn Jahren wuchsen die Werften auf über 440.000 m² an und konnten Schiffe mit bis zu 30.000 Tonnen bauen.\n\nNeben dem Schiffbau repariert und produziert ASTARSA auch Motoren in Lizenz amerikanischer und europäischer Unternehmen sowie viele andere metallurgische Produkte."
 arg_nm_ASTARSA_large_dockyards:0 "Große Werften"
 ca_tech_research:0 "Forschung zu schweren Kreuzern"
 arg_nm_CANML:0 "CANM Ltd."
 arg_nm_CANML_desc:0 "Die Compania Argentina de Navegacion Mihanovich Ltd. wurde 1903 von Nicolas Mihanovich gegründet. Ihr Hauptzweck war der Güter- und Personentransport. Drei Jahrzehnte lang wuchs das Unternehmen stetig und besaß Anfang der 30er Jahre über 300 Schiffe und Schiffswerkstätten in Buenos Aires und Carmelo (Uruguay). Nach Mihanovichs Tod übernahm Don Alberto Dodero die Leitung des Unternehmens und setzte dessen ehrgeizigen Expansionsplan durch den Erwerb neuer Schiffe und Routen fort. Der Fährdienst des Unternehmens zählt zu den renommiertesten der Welt und transportiert über 40 % der brasilianischen Weizenexporte."
 arg_nm_CANML_merchant_fleet:0 "Handelsflotte"
 cl_tech_research:0 "Leichte Kreuzerforschung"
 dd_tech_research:0 "Zerstörerforschung"
 tp_tech_research:0 "Verkehrsforschung"
 arg_nm_AFNE:0 "AFNE"
 arg_nm_AFNE_desc:0 "„Astilleros y Fabricas Navales del Estado“ ist Argentiniens Antwort auf den jahrzehntelangen Kauf ausländischer Schiffe. Nach der Fertigstellung der Rio Santiago Werft und der Azul Ordinance Factory können wir unsere gesamte Schiffbauindustrie in einem riesigen Komplex mit modernster Technologie neu organisieren.\n\nAFNE wird die Geburtsstätte einer völlig neuen argentinischen Marine sein, die weder die Launen ausländischer Mächte noch deren Flotten fürchten muss."
 arg_nm_AFNE_state_of_the_art_dockyards:0 "Hochmoderne Werften"
 arg_nm_BNMdP:0 "Marinestützpunkt Mar del Plata"
 arg_nm_BNMdP_desc:0 "Im Jahr 1926 genehmigte Art. 2 des Gesetzes 11.378 den Erwerb von zwei U-Boot-Gruppen und legte fest, dass Docks, Werkstätten und die gesamte notwendige Infrastruktur für die Unterbringung der neuen Einheiten geschaffen werden mussten. Mar del Plata wurde als Hauptoperationsbasis ausgewählt; der Bau begann ein Jahr später.\n\nObwohl letztendlich nur eine Gruppe von drei U-Booten gebaut wurde, wurden die Schiffe der italienischen Cavallini-Klasse – von den Männern „Tarantinos“ genannt – 1933 in Dienst gestellt und sind seitdem in Mar del Plata beheimatet."
 arg_nm_BNMdP_submarine_pen:0 "U-Boot-Stift"
