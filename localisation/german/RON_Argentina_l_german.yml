 #
 # POLITICAL ADVISORS
 #
 genius_industrialist:0 "Genialer Industrieller"
 genius_industrialist_desc:0 "General Savio ist ein überzeugter Befürworter der Industrialisierung. Er hat mehrere Projekte zur Weiterentwicklung unserer Militär-, Metallurgie- und Chemieindustrie ins Leben gerufen. Er ist ein Verfechter der Autarkie und technologischer Innovation."
 renowned_academic:0 "Renommierter Akademiker"
 renowned_academic_desc: "Dr. Carcano wrote what is considered the ultimate book in Argentinian Agricultural Legislation back in 1917, he also helped draft the Agricultural Credit Law and is a respected professor of several related subjects in the University of Buenos Aires. During his political career he was part of Vicepresident Roca's mission to Britain to negotiate a trade deal and reponsible for convincing argentinian industrialists of endorsing it."
 brilliant_negotiator:0 "Brillanter Verhandlungsführer"
 brilliant_negotiator_desc:0 "Die Feder ist mächtiger als das Schwert und dieser Mann hat jede Menge Tinte."
 smart_spender:0 "Kluger Spender"
 smart_spender_desc:0 "Herr Hueyo befürwortet eine Politik des „Weniger ausgeben, aber dafür besser“. Er war an der Gründung des National Board of Roads beteiligt und ist derzeit Präsident des National Committee of Mines."
 germanophile:0 "Germanophil"
 germanophile_desc:0 "General Pertine verbrachte den Ersten Weltkrieg im deutschen Hauptquartier und nahm sogar an Einsätzen des 81. Frankfurter Regiments teil. Nach Kriegsende kehrte er fasziniert von der deutschen Kultur und militärischen Stärke nach Argentinien zurück. Er ist ein bekannter Nationalist, und obwohl seine politischen Neigungen nicht jedermanns Sache sind, hat er ein Händchen dafür, Gleichgesinnte für unsere Streitkräfte zu gewinnen."
 savvy_democrat:0 "Cleverer Demokrat"
 savvy_democrat_desc:0 "Herr Pueyrredón stammt aus einer berühmten Politikerfamilie und gehört seit Jahrzehnten der Nationaldemokratischen Partei an. Während der Amtszeit von Präsident Alvear war er unser Delegierter im Völkerbund und brachte wertvolle Erfahrungen mit. Er ist zudem ein bekannter Historiker und Politiker. Während seiner Zeit im Kongress verteidigte er leidenschaftlich das Cabildo in Buenos Aires (eines unserer wertvollsten Nationaldenkmäler) gegen diejenigen, die es abreißen wollten, und verdiente sich damit den Respekt und die Bewunderung vieler unserer Bürger."
 political_dancer2:0 "Politischer Tänzer"
 political_dancer2_desc:0 "Manche halten Dr. Quijano für einen Opportunisten, doch seine Fähigkeit, Menschen unterschiedlicher Ideologien zusammenzubringen, beweist, dass er ein einfallsreicher Mann ist. Ein Beweis dafür sind seine Holzfäller-Unternehmungen im Chaco, wo er persönlich den Bau der Quijano-Eisenbahn beaufsichtigte."


 patriotic_league_member:0 "Mitglied der Patriotischen Liga"
 patriotic_league_member_desc:0 "Herr Iriondo ist ein bekannter Professor für Wirtschaft und Finanzen, aber er war auch Gründungsmitglied der Argentinischen Patriotischen Liga. Die Liga ist bekannt für ihre fast paramilitärische Truppe, die sich der Niederschlagung von Arbeiterstreiks und der Verfolgung jener widmet, die sie für „unwürdig“ hält, in unserem Land zu leben."
 public_works_expert:0 "Experte für öffentliche Arbeiten"
 public_works_expert_desc:0 "Herr Alvarado wurde 1932 zum Minister für öffentliche Arbeiten gewählt und arbeitet seitdem mit großem Engagement. Seine Projekte sind vielfältig und reichen von U-Bahnen bis hin zur Hochbahn, die unsere Eisenbahnen mit der chilenischen Antofagasta-Linie verbinden und uns mit dem Pazifik verbinden wird. Er ist außerdem für die Gründung des Nationalen Straßenbauamts verantwortlich, das sich der Verbesserung des Verkehrs im ganzen Land widmet."
 advocate_of_neutrality:0 "Verfechter der Neutralität"
 advocate_of_neutrality_desc:0 "Dr. Castillo ist Berufsanwalt und Richter. Präsident Uriburu führte ihn 1930 als Intervenient für die Provinz Tucumán in die Politik ein und wurde 1932 Innenminister. Er spricht sich offen gegen die Gefahren der Einflussnahme durch andere Länder aus und tritt für absolute Neutralität ein. Castillo stand im Mittelpunkt einiger Kontroversen. Als Richter verurteilte er einmal einen unschuldigen Mann zu acht Jahren Gefängnis, und als Politiker wurde er mit Betrug und Korruption in Verbindung gebracht."
 comintern_strongman:0 "Der starke Mann der Komintern"
 comintern_strongman_desc:0 "Herr Codovilla kam 1912 aus Italien nach Argentinien. In den letzten zwei Jahrzehnten war er äußerst aktiv in der Kommunistischen Partei und erreichte deren höchste Ränge. Er wurde 1929 vom Commitern mit der Organisation der ersten Kommunistischen Konferenz Lateinamerikas beauftragt. Er ist außerdem Mitglied der MOPR, der Internationalen Roten Hilfsorganisation."
 navy_renovator:0 "Marineerweiterung"
 navy_renovator_desc:0 "1932 gründete Admiral Videla die Akademie für Seekriegsführung, einen Studiengang zur Verbesserung der Fähigkeiten unserer Offiziere. Er ist ein entschiedener Befürworter des Ausbaus unserer Schiffbaukapazitäten, ihrer Einsatzmöglichkeiten und des Einsatzes der Luftwaffe für Marineoperationen. Er gründete auch das Küstenverteidigungskorps, dessen Aufgabe der Schutz unserer Küsten vor feindlichen Invasionen ist." 
 education_reformer2:0 "Bildungsreformer"
 education_reformer2_desc:0 "Im Jahr 1918 gehörte Korn zu den von Studentenorganisationen gewählten Lehrern, die sich für Bildungsreformen in ganz Lateinamerika einsetzten. Seitdem ist er führend in der antipositivistischen Bewegung und ein überzeugter Anhänger des ethischen Sozialismus. Der ehemalige Präsident Guatemalas, Juan José Arévalo, der bei ihm studierte, bezeichnete Korn als „Lehrer der Antonomasie“. Seine Reform bestand darin, den Studenten die Kontrolle über die Universitäten zu geben und so Stagnation zu vermeiden."

