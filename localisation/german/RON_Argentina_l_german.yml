 raeconomic.1.c:0 "Schicken Sie Gesandte nach Japan." 
 raeconomic.1.c.tt:0 "Wenn sie akzeptieren, erhalten wir:\n\n§YKonsumgüterfabriken§! §G-0,02 %§!\n§YWerft§! Baugeschwindigkeit §G+0,05 %§!\n§YTrägerdesigns§! Forschung §G-0,05 %§!"
 raeconomic.1.dd:0 "Schicken Sie Gesandte nach Großbritannien. Dort könnte ein weniger auffälliges Handelsabkommen interessant sein."
 raeconomic.1.dd.tt:0 "Wenn sie akzeptieren, erhalten wir:\n\n§YKonsumgüterfabriken§! §G-0,02 %§!\n§YZivilisationsfabrik§! Baugeschwindigkeit §G+0,05 %§!\n§YWerkzeugmaschinen§! Forschung §G-0,05 %§!"
 raeconomic.1.e:0 "Derzeit sind keine anderen Handelsmöglichkeiten verfügbar."
 raeconomic.1.h:0 "Geben Sie den Gesandten mehr Zeit zur Vorbereitung."
 raeconomic.1.h.tt:0 "Sie werden in etwa drei Monaten erneut gefragt."
