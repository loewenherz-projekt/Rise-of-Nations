 raeconomic.15.da:0 "Aufgrund des Krieges zwischen unseren Ländern ist es unmöglich, den Ribbentrop-Malbran-Pakt fortzusetzen."
 raeconomic.15.db:0 "Aufgrund unserer außenpolitischen Isolation ist es unmöglich, den Ribbentrop-Malbran-Pakt fortzusetzen."
