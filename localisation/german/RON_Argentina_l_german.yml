 ##########################################
 #
 #
 #
 ra_great_urban_centers:0 "Große städtische Zentren"
 ra_great_urban_centers_desc:0 "Die Bevölkerung unseres Landes konzentriert sich um große städtische Zentren."
 ra_taming_the_wilderness:0 "Die Wildnis zähmen"
 ra_taming_the_wilderness_desc:0 "Familien haben begonnen, sich in den am dünnsten besiedelten Gebieten unseres Landes niederzulassen."
 ra_open_borders:0 "Offene Grenzen"
 ra_open_borders_desc:0 "Einwanderer sind in unserem Land willkommen."
 ra_closed_borders:0 "Geschlossene Grenzen"
 ra_closed_borders_desc:0 "Einwanderer sind willkommen ... und können woanders hingehen."
 ra_safe_heaven_initiative:0 "Safe-Heaven-Initiative"
 ra_safe_heaven_initiative_desc:0 "Unser Land heißt jeden Menschen mit offenen Armen willkommen, mit einem Stück Brot in der einen und einer Schüssel Suppe in der anderen Hand."
 ra_directive_11:0 "Richtlinie 11"
 ra_directive_11_desc:0 "Wir entfernen die Unerwünschten aus unserem Land. Das bedeutet in der Regel, dass wir ihr Vermögen beschlagnahmen und sie abschieben. In der Regel."

 ##########################################
 ######     REVISED ARGENTINA MOD    ######
 ######     FOREIGN AFFAIRS IDEAS    ######
 ##########################################
 #
 #
 #
 ra_political_turmoil:0 "Politische Turbulenzen"
 ra_political_turmoil_desc:0 "Wahlbetrug, Aufstände, Putschversuche ... Die 30er Jahre deuten darauf hin, dass Argentinien ein ziemlich schlimmes Jahrzehnt wird. Um den Rest des Jahrzehnts zu retten, muss etwas getan werden."
 ARG_saavedra_lamas_treaty:0 "Saavedra Lamas Vertrag"
 ARG_saavedra_lamas_treaty_desc:0 "Unsere Initiative zur Friedensvermittlung zwischen Bolivien und Paraguay während des Chaco-Boreal-Krieges hat Früchte getragen. Dieser Vertrag wird uns und unseren Nachbarn Frieden sichern."
 #
 ra_argentinian_foreign_policy:0 "Argentinische Außenpolitik"
 ra_argentinian_foreign_policy_desc:0 "Die argentinische Regierung mischt sich in unsere Außenpolitik ein. Sie behauptet zwar, dies diene der Stabilität in der Region, doch der wahre Zweck dahinter ist vermutlich weit weniger altruistisch."
 ra_countering_argentinian_interference:0 "Gegen die Einmischung Argentiniens"
 ra_countering_argentinian_interference_desc:0 "Wir befinden uns in einem dialektischen Wortgefecht auf dem Papier und im Radio mit argentinischen Agenten, die unsere Außenpolitik steuern wollen."
 ra_saavedra_lamas_treaty_others:0 "Saavedra Lamas Vertrag"
 ra_saavedra_lamas_treaty_others_desc:0 "Wir unterzeichneten den Saavedra-Lamas-Vertrag 1933, nach dem Chaco-Boreal-Krieg zwischen Paraguay und Bolivien. Der Vertrag wurde vom damaligen argentinischen Außenminister Saavedra Lamas verfasst und zielt darauf ab, den Frieden und die guten Beziehungen zwischen den Nachbarn in der Region und darüber hinaus zu wahren."
 ra_exiting_lamas:0 "Rückzug aus dem Lamas-Vertrag"
 ra_exiting_lamas_desc:0 "Wir durchlaufen derzeit die notwendigen Protokolle, um aus dem Saavedra-Lamas-Vertrag auszutreten."
 ra_malvinas_compensation:0 "Malvinas-Entschädigung"
 ra_malvinas_compensation_desc:0 "Die englischen Falkländer, die die Inseln nach der Rückgabe an Argentinien verließen, werden für ihre Mühen entschädigt."
 ra_falklands_compensation:0 "Falkland-Entschädigung"
 ra_falklands_compensation_desc:0 "Die englischen Falkländer, die die Inseln nach der Rückgabe an Argentinien verließen, werden für ihre Mühen entschädigt."
