 raeducation.1.t:0 "Forschungsstipendien"
 raeducation.1.d:0 "Argentinische Institutionen sind dafür bekannt, hervorragende Fachkräfte hervorzubringen: Ingenieure, Architekten, Chemiker, Geologen usw. Unser Stipendienprogramm hat es uns ermöglicht, ihre Projekte genauer unter die Lupe zu nehmen.\n\nAuch wenn diese Ideen auf den ersten Blick nicht revolutionär erscheinen, wer weiß, was diese jungen Männer und Frauen mit der Zeit und der richtigen Finanzierung erreichen könnten?\n\nEs geht nur darum, das Gebiet auszuwählen, das uns am meisten interessiert …"
 raeducation.1.a:0 "Elektronik"
 raeducation.1.a_tt:0 "\nDer Bereich der Elektronik hat eine neue Generation von Spezialisten hervorgebracht, Männer, die begierig darauf sind, die Möglichkeiten dieser neuen Technologien auszuprobieren.\n\n"
 raeducation.1.b:0 "Maschinen"
 raeducation.1.b_tt:0 "\nTorcuato di Tella hat der Welt gezeigt, dass „Made in Argentina“ auch ein Grundnahrungsmittel von guter Qualität sein kann.\n\n"
 raeducation.1.c:0 "Konstruktion"
 raeducation.1.c_tt:0 "\nWährend viele Architekten eine Vorliebe für Stil haben, gibt es auch solche, die sich auf bessere und neue Wege zur Umsetzung ihrer Projekte konzentrieren.\n\n"
 raeducation.1.dd:0 "Nächste Seite"
 #
 raeducation.2.t:0 "Forschungsstipendien"
 raeducation.2.d:0 "Argentinische Institutionen sind dafür bekannt, hervorragende Fachkräfte hervorzubringen: Ingenieure, Architekten, Chemiker, Geologen usw. Unser Stipendienprogramm hat es uns ermöglicht, ihre Projekte genauer unter die Lupe zu nehmen.\n\nAuch wenn diese Ideen auf den ersten Blick nicht revolutionär erscheinen, wer weiß, was diese jungen Männer und Frauen mit der Zeit und der richtigen Finanzierung erreichen könnten?\n\nEs geht nur darum, das Gebiet auszuwählen, das uns am meisten interessiert …"
 raeducation.2.a:0 "Bergbau"
 raeducation.2.a_tt:0 "\nFrüher genügte eine Schaufel, um eine Mine zu betreiben, doch der Ressourcenhunger unseres Landes erfordert ausgefeiltere Methoden.\n\n"
 raeducation.2.b:0 "Synthetik"
 raeducation.2.b_tt:0 "\nChemiker sind wie die Zauberer der Wissenschaft, Männer und Frauen, die scheinbar in der Lage sind, aus dem Nichts etwas zu erschaffen.\n\n"
 raeducation.2.c:0 "Nichts Interessantes."
 raeducation.2.c_tt:0 "\nKeines der Projekte, die wir dieses Jahr gesehen haben, scheint die Förderung wert zu sein. Hoffentlich sieht es nächstes Jahr anders aus.\n\n"
 raeducation.2.dd:0 "Vorherige Seite"
