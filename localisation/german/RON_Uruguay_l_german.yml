l_german:

 friend_to_all:0 "Freund für alle"
 friend_to_all_desc:0 "Uruguay kümmert sich wenig darum, woher man kommt und wer man ist. Die meisten Menschen, die in diesem kleinen Land leben, haben ganz Europa. Dies erleichtert den Erwerb von Handelsbeziehungen mit jedem" 
 no_planes:0 "Keine Flugzeugkenntnisse"
 no_planes_desc:0 "Die uruguayische Regierung verfügt nicht über eine funktionierende Luftwaffe und ist bei der Entwicklung und Beschaffung von Flugzeugen auf ausländische Mächte angewiesen."
 gaucho_army:0 "Gaucho-Armee"
 gaucho_army_desc:0 "Die „Gauchos“, zu Deutsch Cowboys, sind ein wichtiger Teil der uruguayischen Kultur und ziehen noch heute durch die ländlichen Gebiete Uruguays. Als Angriffseinheit sind sie vielleicht nicht so effektiv, aber diese Reiter verfügen über umfassende Kenntnisse des lokalen Geländes und einen starken Verteidigungsgeist, der andere inspiriert."
 womens_rights:0 "Frauenwahlrecht erreicht"
 URG_intervention:0 "Spanish Civil war Support:
 URG_intervention_desc:0 "Wir können nicht tatenlos zusehen, wir müssen handeln!"
 URG_trotsky:0 "Leo Trotzki"
 
 URG_army_primacy:0 "Armeerenovierungen"
 URG_army_primacy_desc:0 "Ob es uns gefällt oder nicht, unsere Armee besteht aus ein paar Typen mit alten Waffen. Der erste Schritt besteht darin, unseren Ansatz zu überdenken."
 URG_modernized_artillery:0 "Modernisieren Sie die Artillerie"
 URG_modernized_artillery_desc:0 "Der große Krieg hat der Welt gezeigt, wie wichtig es ist, unsere Feinde zu beschießen. Wir müssen aus den Fehlern anderer lernen"
 URG_modernized_army:0 "Wehrpflicht und Armee"
 URG_modernized_army_desc:0 "Wenn wir in den Krieg ziehen, was durchaus möglich ist, müssen wir alle, die wir können, in die Schlacht schicken." 
 URG_Naval_growth:0 "Werftaufbau"
 URG_Naval_growth_desc:0 "Uruguay kann so nicht weitermachen. Wir haben nur ein Boot. Völlig inakzeptabel"
 URG_light_ship_effort:0 "Leichte Schiffsbemühungen"
 URG_light_ship_effort_desc:0 "Wir sind möglicherweise nicht in der Lage, große Kreuzer einzusetzen, daher müssen leichte Kreuzer unsere Hauptschiffe werden."
 URG_marines_and_landing_craft:0 "Marinesoldaten und Landungsboote"
 URG_marines_and_landing_craft_desc:0 "Wir müssen ein Marineelement in unserer Marine aufbauen, falls wir Bedrohungen außerhalb des Kontinents oder weit entfernt ausgesetzt sind"
 URG_submarine_effort:0 "U-Boot-Entwicklung"
 URG_submarine_effort_desc:0 " Es ist klar, dass die Zukunft der Seeschlachten nicht nur davon bestimmt wird, was sich auf dem Wasser befindet, sondern auch davon, was sich darunter befindet."
 URG_initiate_government_reform:0 "Regierungsreform"
 URG_initiate_government_reform_desc:0 "Angesichts der Tatsache, dass in so kurzer Zeit neue Probleme auftreten, müssen wir uns möglicherweise mit den größeren Lücken in unserer Regierung befassen."
 URG_support_the_left:0 "Schließen Sie sich der Weltrevolution an"
 URG_support_the_left_desc:0 "Arbeiter Uruguays, es ist Zeit, eure Felder und Fabriken zurückzuerobern. Wir werden die unfairen Geschäfte Großbritanniens nicht länger tolerieren. Unsere Arbeiter werden nicht länger für die Gier der Banker umkommen."
 URG_scw_intervention_republicans:0 "Unterstützen Sie die Republikaner"
 URG_scw_intervention_republicans_desc:0 "Wir müssen unseren spanischen Brüdern in ihrem Kampf helfen. "
 URG_leftist_rhetoric:0 "Werden Sie zum Hort kommunistischer Aktivitäten"
 URG_leftist_rhetoric_desc:0 "Wir können allen Akteuren der Weltrevolution Schutz bieten und zu einem Zentrum der Ideen werden, die sich über die ganze Welt verbreiten."
 URG_national_mobilization:0 "Nationale Mobilisierung"
 URG_national_mobilization_desc:0 "Wir brauchen jeden Mann, jede Frau, jede Kuh und jedes Kind, um auf ihre Weise zur Weltrevolution beizutragen."
 URG_join_comintern:0 "Treten Sie Commintern bei"
 URG_join_comintern_desc:0 "Die Sowjetunion könnte ein wertvoller Verbündeter an unserer Seite sein. Wir müssen den Beitritt zur Komintern anstreben."
 URG_permanent_revolution:0 "Trotzki als Berater einladen"
 URG_permanent_revolution_desc:0 "Leo Trotzki ist der wahre Revolutionär. Die teuflische Sowjetunion ist lediglich ein Trick, um die Arbeiter zu unterdrücken und die Weltrevolution zu verlangsamen."
 URG_infiltration:0 "Infiltration"
 URG_infiltration_desc:0 "Es ist klar, dass die Arbeiter in Südamerika so unterdrückt sind, dass sie nicht für sich selbst kämpfen können. Deshalb werden wir unsere Nachbarn und deren Nachbarn infiltrieren, um den Keim für die Revolution zu legen."
 URG_takeover:0 "Verbreiten"
 URG_takeover_desc:0 "Mit den Samen an Ort und Stelle können wir nun unsere Falle schwingen und unsere Hand über ganz Südamerika schließen"
 URG_support_status_quo:0 "Freiheit oder Tod!"
 URG_support_status_quo_desc:0 "Freiheit oder Tod! Wir lassen uns nicht von törichten Ideologien unterwerfen. Wir wählen die Freiheit, und wenn wir sie nicht haben können, wählen wir den Tod."
 URG_alleis_friendly:0 "Treten Sie dem Vereinigten Königreich bei"
 URG_alleis_friendly_desc:0 "Großbritannien ist von Anfang an unser Freund und hat uns oft seine Gunst erwiesen. Wir sollten uns seiner Verteidigungsallianz anschließen, selbst auf die Gefahr hin, unseren Ruf zu verlieren."
 URG_isolation:0 "Isolierung"
 URG_isolation_desc:0 "Wir müssen unsere Neutralität wahren und Konflikte vermeiden. Stattdessen sollten wir unsere Beziehungen zu allen verbessern."
 Womans_Rights:0 "Paulina Luisis Programm"
 Womans_Rights_desc:0 "Paulina Luisi, eine Frauenrechtlerin, hat eine Reihe von Reformen vorgeschlagen, die das Ansehen der Frauen in ganz Uruguay stärken sollen."
 Health_Care:0 "Nationales Gesundheitswesen"
 Health_Care_desc:0 "Die Spanische Grippe ist ein überzeugendes Argument für einen nationalen Gesundheitsplan, der es mehr Arbeitnehmern ermöglicht, angemessen versichert zu sein und so die Wahrscheinlichkeit verringert, dass sie an kleinen Infektionen sterben."
 URG_invite_allies_pilots:0 "Verbündete Piloten einladen"
 URG_invite_allies_pilots_desc:0 "Uruguay hat zwar nicht viel Panzer oder Munition zu bieten, aber wir können verbündete Piloten einladen, fernab des Kriegsgeschehens zu trainieren. Das verschafft uns das nötige Fachwissen, um weitere Luftwaffenstützpunkte zu bauen."
 URG_become_food_producer:0 "Werden Sie Ally Food-Exporteur"
 URG_become_food_producer_desc:0 "Schauen Sie sich unsere Kühe an und sehen Sie, dass sie den Bekannten unterlegen sind. Mit leerem Magen kann man keinen Krieg führen"
 URG_Falklands_Ours:0 "Falkland-Akquisition"
 URG_Falklands_Ours_desc:0 "Angesichts unserer jüngsten Unterstützung für die Alliierten und unserer großzügigen Lebensmittelpreise wird Großbritannien uns diese winzigen, unbedeutenden Inseln gerne überlassen. Es ist nicht so, als würde jemand wegen ihnen in den Krieg ziehen."
 URG_change_way_of_life:0 "Die Demokratie ist gescheitert"
 URG_change_way_of_life_desc:0 "Die Demokratie in Uruguay hat unsere Bedürfnisse nicht erfüllt! Wir müssen uns ändern. Die Frage ist: Wie?"
 URG_support_the_right:0 "Nationalismus"
 URG_support_the_right_desc:0 "Es ist Zeit, dass wir uns mit der Dekadenz in unserem Land auseinandersetzen und das fremde Element in unserem Land bekämpfen."
 URG_scw_intervention_nationalists:0 "Helfen Sie Franco"
 URG_scw_intervention_nationalists_desc:0 "Es ist offensichtlich, dass Franco der richtige Herrscher des spanischen Volkes ist. Wir müssen ihn bei seinem Bestreben unterstützen, sein Land vor der kommunistischen Bedrohung zu stabilisieren."
 URG_right_wing_rhetoric:0 "Rechte Rhetorik"
 URG_right_wing_rhetoric_desc:0 "Wir wissen, dass wir Recht haben, deshalb muss jeder wissen, dass wir Recht haben!"
 URG_army_of_aggression:0 "Aggressive Armeetaktiken"
 URG_army_of_aggression_desc:0 "Wir müssen angreifen, angreifen und nochmals angreifen. Lassen Sie unseren Feind wissen, dass er sich mit einem Rudel Wölfe anlegt."
 URG_brazil_kebab:0 "Verwandeln Sie Brasilien in eine Molleja"
 URG_brazil_kebab_desc:0 "Wir müssen auf unsere Nachbarn zugehen und ihnen vorschlagen, Brasilien wie einen schönen Muskelmagen aufzuteilen und sicherzustellen, dass wir das größte Stück bekommen."
 URG_woo_franco:0 "Nähere dich Franco"
 URG_woo_franco_desc:0 "Franco hat unseren guten Glauben und unsere gute Arbeit gesehen, vielleicht können wir ihn davon überzeugen, ein neues spanisches Reich mit uns an der Spitze zu errichten"
 URG_join_axis:0 "Verkaufen Sie Rindfleisch an Hitler"
 URG_join_axis_desc:0 "Deutschland ist eine starke souveräne Nation. Wir könnten uns an sie wenden, damit sie eine Art Schutzpatron für uns ist und unsere Interessen in Lateinamerika schützt."

 
 
 urg_news.331.t:0 "Krieg in Südamerika!"
 urg_news.331.desc:0 "Unter Berufung auf die Unterdrückung der uruguayischen Bevölkerung während der Cisplatina-Ära hat die uruguayische Regierung gegen das Vargas-Regime in Brasilien demonstriert. Viele Experten fragten sich, wie ein so kleiner Staat es mit Brasilien aufnehmen konnte. Nun ist klar, dass die antibrasilianische Stimmung mehr als nur Gebell war, denn Uruguay hat andere lateinamerikanische Regierungen um Unterstützung gebeten. Diese Regime haben die Unterstützung angenommen, vorausgesetzt, sie bekommen ein Stück vom Kuchen. Brasiliens Tage scheinen gezählt."
 urg_news.331.a:0 "Nächster Halt: Rio!"
 urg_news.332.t:0 "Trotzki übernimmt Beraterposten in Uruguay"
 urg_news.332.desc:0 "Leo Trotzki ist nach Uruguay gezogen, um dort Berater der dortigen Regierung zu werden. Als Reaktion darauf hat die Sowjetunion alle diplomatischen Beziehungen zu Uruguay abgebrochen und droht mit Krieg."
 urg_news.332.a:0 "Dieser widerliche Hund!"
 urg_news.332.b:0 "Arbeiter Südamerikas, eure Ketten werden zerbrochen!"
 urg_news.332.c:0 "Interessant"
 excellent:0 "Exzellent."
 unfortunate:0 "Schade."
 uruguay.1.t:0 "Krieg mit Brasilien!"
 uruguay.1.d:0 "Unsere Verbündeten haben sich darauf geeinigt, sofort gegen die abscheuliche brasilianische Bedrohung vorzugehen. Wir müssen jetzt zuschlagen, solange die Beute noch frisch ist."
 uruguay.1.a:0 "Adelante!"
 uruguay.2.t:0 "Brasilianische Niederlage!"
 uruguay.2.d:0 "Die widerlichen Hunde des Vargas-Regimes sind gefallen!"
 uruguay.2.a:0 "Ein Sieg, an den sich der ganze Kontinent erinnern wird!"
 uruguay.3.t:0 "[From.GetName] schließt sich unserem Kampf an"
 uruguay.3.d:0 "Die Regierung von [From.GetName] hat sich entschieden, sich uns anzuschließen"
 uruguay.3.a:0 "Wir heißen unsere Brüder mit offenen Armen willkommen"
 uruguay.4.t:0 "[From.GetName] weigert sich zu kämpfen"
 uruguay.4.d:0 "Die Feiglinge von [From.GetName] lehnen unser Bündnis ab"
 uruguay.4.a:0 "Verflucht seien diese Hunde!"
 urg_venezuela.1.t:0 "Uruguay schlägt ein Anti-Lusophon-Bündnis vor"
 urg_venezuela.1.d:0 "Die neue uruguayische Regierung schlägt eine Offensivallianz gegen die brasilianische Bedrohung vor"
 urg_venezuela.1.a:0 "Wir akzeptieren"
 urg_venezuela.1.b:0 "Wir lehnen ab!"
 urg_argentina.1.t:0 "Uruguay schlägt ein Anti-Lusophon-Bündnis vor"
 urg_argentina.1.d:0 "Die neue uruguayische Regierung schlägt eine Offensivallianz gegen die brasilianische Bedrohung vor"
 urg_argentina.1.a:0 "Wir akzeptieren"
 urg_argentina.1.b:0 "Wir lehnen ab!"
