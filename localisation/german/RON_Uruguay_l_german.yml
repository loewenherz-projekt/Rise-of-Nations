 urg_peru.1.d:0 "Die neue uruguayische Regierung schlägt eine Offensivallianz gegen die brasilianische Bedrohung vor"
 urg_peru.1.a:0 "Wir akzeptieren"
 urg_peru.1.a:0 "Wir lehnen ab!"

 urg_soviet.63.t:0 "Uruguay beantragt Mitgliedschaft in der Komintern"
 urg_soviet.63.d:0 "Die PCU beantragt die Mitgliedschaft in der Sowjetunion"
 urg_soviet.63.a:0 "Wir heißen sie mit offenen Armen willkommen"
 urg_soviet.63.b:0 "NIET"
 
 urg_germany.127.t:0 "Uruguay will sich der Achse anschließen!"
 urg_germany.127.d:0 "Die neue Regierung in Uruguay hat darum gebeten, unserer Militärallianz beizutreten"
 urg_germany.127.a:0 "Wir heißen unsere lateinamerikanischen Freunde mit offenen Armen willkommen"
 urg_germany.127.b:0 "Wir brauchen sie nicht"
 
 urg_britain.25.t:0 "Uruguay strebt den Beitritt zu den Alliierten an"
 urg_britain.25.s:0 "Die Östliche Republik Uruguay will sich den Verbündeten anschließen"
 urg_britain.25.a:0 "Sehr gut!"
 urg_britain.25.b:0 "Du meinst die Kuhbauern? Auf keinen Fall!"

 uruguay.ww1.1.t:0 "Wahlen 1903"
 uruguay.ww1.1.d:0 "Vier Jahre sind seit der letzten Wahl vergangen. Unser Parlament ist bereit, zu entscheiden, wer der nächste Präsident sein wird."
 uruguay.ww1.1.a:0 "Das Parlament wählt Jose Batlle y Ordoñez"
 uruguay.ww1.1.b:0 "Das Parlament wählt Aparicio Saravia"

 uruguay.ww1.2.t:0 "Aparicio Saravia erhebt sich gegen die Regierung!"
 uruguay.ww1.2.d:0 "Nach einem Gefecht in der Grenzstadt Rivera haben sich die Blancos unter Aparicio Saravia gegen die Regierung erhoben! Versuche einer friedlichen Lösung waren bisher erfolglos, und es scheint, als sei Uruguay einen Schritt zurückgegangen und erneut in einen Bürgerkrieg versunken."
 uruguay.ww1.2.a:0 "Seite an Seite mit den Colorados"
 uruguay.ww1.2.b:0 "Seite an Seite mit den Blancos"

 uruguay.ww1.3.t:0 "Uruguayischer Bürgerkrieg"
 uruguay.ww1.3.d:0 "Nach einem Gefecht in der Grenzstadt Rivera haben sich die Blancos unter Aparicio Saravia gegen die Regierung Colorados erhoben."
 uruguay.ww1.3.a:0 "Uruguay? Nie davon gehört."
 uruguay.ww1.3.b:0 "Wir werden die Ordnung wiederherstellen."
 uruguay.ww1.3.c:0 "Dies sollten wir zu unserem Vorteil nutzen."

 
