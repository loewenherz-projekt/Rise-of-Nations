MAL_high_commissioner_for_malaya:0 "Hochkommissar für Malaya"
MAL_high_commissioner_for_malaya_desc:0 "Der Hochkommissar vertrat die britische Regierung in Malaya. Der Gouverneur der Straits Settlements war stets von Amts wegen der Hochkommissar."
MAL_malay_protectorate:0 "Protektorat"
MAL_malay_protectorate_desc:0 "Die malaiischen Staaten sind seit dem späten 19. Jahrhundert britisches Protektorat. Die Briten respektieren ihre religiöse Autorität, doch die Exekutivgewalt lag größtenteils bei einem ansässigen Minister."
