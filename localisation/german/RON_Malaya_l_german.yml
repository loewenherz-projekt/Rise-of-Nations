MAL_southeast_asian_revolution:0 "Südostasiatische Revolution"
MAL_permeate_siam:0 "Durchdringen Siam"
MAL_permeate_indonesia:0 "Durchdringen Sie Indonesien"
MAL_liberate_indochina:0 "Befreie Indochina"

MAL_army_training_programme:0 "Armee-Ausbildungsprogramm"
MAL_army_training_programme_desc:0 "Ein Großteil unserer Armee ist dienstuntauglich – entweder krank oder unzureichend ausgerüstet. Wir ergreifen Maßnahmen, um dieses Versäumnis in einer gefährlichen Welt zu beheben."
MAL_equipment_effort:0 "Spezialausrüstung"
MAL_equipment_effort_desc:0 "Nicht alle von uns verwendeten britischen Geräte sind für unsere spezielle Kampfsituation geeignet. Wir brauchen spezielle und maßgeschneiderte Werkzeuge."
MAL_motorized_effort:0 "Armeemotorisierung"
MAL_motorized_effort_desc:0 "Eine stärkere Konzentration auf die Motorisierung wird die Geschwindigkeit erhöhen, mit der die Infanterie das Schlachtfeld erreichen kann, zumindest in Gebieten mit guten Straßen."
MAL_royal_artillery_malaya:0 "Königliche malaiische Artillerie"
MAL_royal_artillery_malaya_desc:0 "Die Artillerie ist die Königin des Schlachtfelds und wir müssen unseren Zugang zu schweren Geschützen erweitern."
MAL_electric_mechanical_engineer_corps:0 "Korps der Elektro- und Maschinenbauingenieure"
MAL_electric_mechanical_engineer_corps_desc:0 "Das Korps ist für die Wartung aller Fahrzeuge sowie der mechanischen und elektrischen Ausrüstung der malaiischen Armee verantwortlich."
MAL_army_modernization:0 "Modernisierung der Armee"
MAL_army_modernization_desc:0 "Zu lange galten die malaiischen Streitkräfte als nicht viel mehr als ein kolonialer Außenposten, der kaum über die Vorteile und die Ausrüstung verfügte, die der britischen Armee zur Verfügung standen. Es ist Zeit, die malaiischen Streitkräfte zu modernisieren."
MAL_special_troops:0 "Dschungel- und Bergtraining"
MAL_special_troops_desc:0 "Die malaiische Halbinsel ist von Dschungel und Bergen bedeckt und es wird eine spezielle Ausbildung empfohlen, um unsere Soldaten in diesem gefährlichen Gelände effektiv einzusetzen."
MAL_mechanized_effort:0 "Mechanisierungsbemühungen"
MAL_mechanized_effort_desc:0 "Gepanzerte Fahrzeuge spielen im Krieg eine immer wichtigere Rolle. Sie sind zwar etwas weniger einschüchternd als ein gewöhnlicher Panzer, verschaffen uns aber einen Vorteil in den Bereichen Kommunikation, Führung, Transport und Häuserkampf."
MAL_armor_effort:0 "Rüstungsaufwand"
MAL_armor_effort_desc:0 "Panzer haben seit den trägen Bestien des letzten Krieges eine lange Entwicklung durchgemacht. Unsere Forschung und Ausbildung dürfen nicht hinter denen unserer Feinde – oder unserer Freunde – zurückbleiben."
MAL_attach_importance_to_air_war:0 "Dem Luftkrieg Bedeutung beimessen"
MAL_attach_importance_to_air_war_desc:0 "Wir hatten vergleichsweise wenige moderne Flugzeuge, um dem Feind Paroli zu bieten. Unsere Luftwaffe muss wachsen, deshalb investieren wir in mehr Stützpunkte, mehr Ausbildung und mehr Produktion."
MAL_improve_the_buffalo:0 "Verbessere den Büffel"
MAL_improve_the_buffalo_desc:0 "Der Motor der Buffalo litt unter Treibstoffmangel und der Kompressor war in größeren Höhen schwach. Die Manövrierfähigkeit ist eingeschränkt, und im tropischen Klima neigte der Motor zur Überhitzung, wodurch Öl auf die Windschutzscheibe spritzte. Verbesserte Mechanik und Training werden das Beste aus diesen Flugzeugen herausholen."
MAL_update_the_blenheim:0 "Aktualisieren Sie den Blenheim"
MAL_update_the_blenheim_desc:0 "Die Bristol Blenheim war für die RAF und die Dominions ein brauchbarer leichter Bomber. Doch nun ist es vielleicht an der Zeit, etwas Robusteres mit größerer Reichweite zu finden."
MAL_expand_air_bases:0 "Luftwaffenstützpunkte erweitern"
MAL_expand_air_bases_desc:0 "Um unsere Armee besser unterstützen zu können, benötigt die Luftwaffe größere Luftwaffenstützpunkte."
MAL_naval_bombers:0 "Marinebomber"
MAL_naval_bombers_desc:0 "Wir sollten uns mit Flugzeugen und Trainings befassen, die es uns ermöglichen, feindliche Flotten abzufangen und anzugreifen. Der Bombenabwurf von See ist eine Spezialfähigkeit und sollte im Mittelpunkt stehen."
MAL_pilot_training:0 "Pilotenausbildung"
MAL_pilot_training_desc:0 "Die Royal Air Force hat sich bereit erklärt, malaysische Piloten zur Ausbildung aufzunehmen. Diese Ausbildung wird für den Aufbau unserer eigenen Luftwaffe von großer Bedeutung sein."
MAL_singapore_naval_base:0 "Marinestützpunkt Singapur"
MAL_singapore_naval_base_desc:0 "Der Stützpunkt ist ein Eckpfeiler unserer Verteidigungspolitik. Wir sollten ihn weiter ausbauen und stärken."
MAL_destroyer_focus:0 "U-Boot-Abwehrtaktiken"
MAL_destroyer_focus_desc:0 "U-Boote bedrohen die Schiffe, die das Südchinesische Meer durchqueren. Wir müssen sie finden und zerstören."
MAL_submarine_focus:0 "U-Boot-Krieg"
MAL_submarine_focus_desc:0 "Feindliche Handelskonvois nutzen weiterhin die Passage durch das Südchinesische Meer. Wir werden sie von unten angreifen."
MAL_cruiser_focus:0 "Kreuzer-Anstrengung"
MAL_cruiser_focus_desc:0 "Für die Entwicklung und den Ausbau der malaiischen Seemacht werden Kreuzer vorerst ausreichen."
MAL_capital_ship_focus:0 "Großkampfschiff-Anstrengung"
MAL_capital_ship_focus_desc:0 "Als britischer Außenposten hat Malaya die Macht von Großkampfschiffen bei der Beherrschung der Meere erlebt. Wir sollten unsere eigenen schweren Kreuzer und Schlachtschiffe bauen."
MAL_dockyard_1:0 "Sarawak Dock erweitern"
MAL_dockyard_1_desc:0 "Sarawak ist unser Schiffbauzentrum auf Nordborneo. Angesichts dieser weltweiten Krise braucht es größere Kapazitäten."
MAL_dockyard_2:0 "Penang-Werft gefunden"
MAL_dockyard_2_desc:0 "Wir brauchen mehr Werften auf der malaiischen Halbinsel, daher ist die Gründung einer Werft in Penang für unsere Marinezukunft sinnvoll."
MAL_prepare_overseas_offensive:0 "Überseeoffensive vorbereiten"
MAL_prepare_overseas_offensive_desc:0 "Malaya verfügt über eine kilometerlange Küste und ist bestens dafür geeignet, seine Soldaten im amphibischen Krieg auszubilden. Dies ist eine der schwierigsten Fähigkeiten, aber unsere Jungs schaffen das."
MAL_protect_strait_of_malacca:0 "Schützen Sie die Straße von Malakka"
MAL_protect_strait_of_malacca_desc:0 "Die Geschütze der Meerengengarnison müssen aufgerüstet und verstärkt werden, um die Meerenge vor feindlichen Angriffen zu schützen."
MAL_modernize_navy:0 "Modernisierung der Marine"
MAL_modernize_navy_desc:0 "Bessere Motoren, mehr Platz für die Besatzung, höhere Geschwindigkeit und größere Geschütze. Malayas Marine wird bald zu den besten auf der Halbinsel gehören."
MAL_east_coast_line:0 "Ostküstenlinie"
MAL_east_coast_line_desc:0 "Die Ostküstenlinie verläuft zwischen den Bahnhöfen Gemas in Negeri Sembilan und Tumpat in Kelantan. Sie muss erweitert werden."
MAL_west_coast_line:0 "Westküstenlinie"
MAL_west_coast_line_desc:0 "Die West Coast Line wurde 1913 eröffnet. Sie verläuft vom Bahnhof Padang Besar in Perlis zum Woodlands Train Checkpoint in Singapur. Sie muss erweitert werden."
MAL_heavy_engineering:0 "Schwermaschinenbau"
MAL_heavy_engineering_desc:0 "Es ist wichtig, dass Malaya stets auf dem neuesten Stand der Technik bleibt. Auch wenn unsere industrielle Basis klein ist, sollten wir in Schwermaschinen und Maschinenbau investieren, um schnell zu unseren Mitbewerbern aufzuschließen."
MAL_expand_mining_industry:0 "Ausbau der Bergbauindustrie"
MAL_expand_mining_industry_desc:0 "Malayas Bodenschätze sind legendär und wir haben gerade erst begonnen, seine riesigen Gold-, Eisen- und Zinnreserven zu erschließen."
MAL_sarawak_railway:0 "Sarawak-Eisenbahn"
MAL_sarawak_railway_desc:0 "Große Teile Sarawaks sind noch immer ländlich und unerschlossen. Mehr Straßen und Eisenbahnen könnten die natürlichen Reichtümer des Landes zu den hungrigen Häfen bringen."
MAL_industrial_expansion:0 "Industrielle Expansion"
MAL_industrial_expansion_desc:0 "Malaya braucht mehr Industrie und Investitionen, daher werden wir alle Anstrengungen in die Verbesserung der Gemeinden und des Wohnungsbaus stecken."
MAL_batu_pahat_iron_ore:0 "Batu Pahat Steel"
MAL_batu_pahat_iron_ore_desc:0 "Batu Pahat ist reich an Mineralien. Wir sollten eine Stahlfabrik gründen, um diese Erze zu verhütten."
MAL_miri_oil:0 "Miri-Öl"
MAL_miri_oil_desc:0 "Sarawak ist das Zentrum der malaysischen Ölproduktion, insbesondere die Raffinerie in Miri. Der Zugang zu dieser Ressource muss erweitert und ausgeschöpft werden."
MAL_armament_effort:0 "Rüstungsanstrengungen"
MAL_armament_effort_desc:0 "Wir sollten unsere eigene Rüstungsindustrie aufbauen, damit die Union nie schutzlos dasteht."
MAL_singapore_arms:0 "Singapur Waffen"
MAL_singapore_arms_desc:0 "Das bestehende Stahlwerk in Singapur hat sich auf die Produktion von Grobblechen spezialisiert. Mit einigen Werkzeugmaschinen können wir jedoch einen Teil der Fabrik in ein Zentrum für die Produktion von Kleinwaffen umwandeln."
MAL_rubber_plantation:0 "Kautschukplantage"
MAL_rubber_plantation_desc:0 "Der Kautschukanbau ist einer der wichtigsten Wirtschaftszweige Malayas. Wir sollten seiner Entwicklung Aufmerksamkeit schenken."
MAL_fund_the_king_edward_medical_college:0 "Finanzieren Sie das King Edward VII Medical College"
MAL_fund_the_king_edward_medical_college_desc:0 "Das King Edward VII Medical College wurde 1905 gegründet. Es ist eine der besten Universitäten der Halbinsel. Indem wir in dieses College investieren, können wir unsere eigenen Talente vor Ort fördern, anstatt unsere jungen Leute ins Ausland zu schicken."
MAL_malayan_defense_research:0 "Malayische Verteidigungsforschung"
MAL_malayan_defense_research_desc:0 "Da Malaya nun ein vollständig souveräner Staat ist, haben wir keinen Zugriff mehr auf fortschrittliche Prototypen und Baupläne wie früher. Wir müssen sicherstellen, dass wir unseren Feinden immer einen Schritt voraus sind und technologisch nicht ins Hintertreffen geraten."
MAL_defense_collaboration_initiative:0 "Initiative zur Zusammenarbeit im Verteidigungsbereich"
MAL_defense_collaboration_initiative_desc:0 "Die Briten haben uns gezeigt, wie vorteilhaft es ist, wissenschaftliche Fortschritte unter engen Verbündeten zu teilen. Unsere gesamte Fraktion wird in der Lage sein, Forschung und Entwicklung im Krieg effizienter durchzuführen, wenn wir die notwendigen Schritte unternehmen, um dies zu koordinieren."
MAL_establish_the_atomics_energy_board:0 "Gründung des Atomenergieinstituts"
MAL_establish_the_atomics_energy_board_desc:0 "Atomwaffen werden den größten militärischen Durchbruch seit der Erfindung des Schießpulvers darstellen, ganz zu schweigen von der friedlichen Nutzung dieser Macht, wenn es uns gelingt, das Atom nutzbar zu machen. Versammeln Sie unsere Spitzenwissenschaftler, um dies zu untersuchen."

MAL_domestic_military_suppliers_tt:0 "Schaltet SME und HICOM als Ausrüstungsdesigner frei. \nSchaltet Hawker Malaya als Ausrüstungsdesigner frei. (Dies sollte bei ausländischen Militärlieferanten verfügbar sein.)"
MAL_foreign_military_suppliers_tt:0 "noch nicht fertig"
MAL_domestic_military_suppliers:0 "Inländische Lieferanten"
MAL_domestic_military_suppliers_desc:0 "Wir müssen unsere heimische Rüstungsindustrie ausbauen, damit sie bei Bedarf problemlos für militärische Zwecke umgerüstet und eingesetzt werden kann. Zu diesem Zweck hat einer unserer Wirtschaftsmagnaten einige interessante Ideen, die wir nutzen könnten …"
MAL_foreign_military_suppliers:0 "Laden Sie ausländische Lieferanten ein"
MAL_foreign_military_suppliers_desc:0 "noch nicht fertig"



mal.1.t:0 "Der Ursprung ethnischer Konflikte"
mal.1.d:0 "Seit dem Pangkor-Vertrag von 1874 kontrollieren die Briten Malaya. Sie regieren die Sultanate indirekt über das Residenzsystem und schützen die Rechte und Interessen der Ureinwohner. Andererseits wanderten seit dem 19. Jahrhundert viele Chinesen und Inder nach Malaya ein. Die britischen Herrscher vernachlässigten die Interessen dieser Einwanderer und verfolgten weiterhin eine pro-malaiische Politik. \n\nDarüber hinaus trennte die Kolonialregierung die Einwanderer bewusst von den Einheimischen, um eine Assimilation zu vermeiden. Diese Politik schürte Zwietracht zwischen Malaien, Chinesen und Indern und könnte in Zukunft zu ethnischen Konflikten führen."
mal.1.a:0 "Uns geht es nur um den kommerziellen Gewinn."
mal.2.t:0 "Operation Matador"
mal.2.d:0 "Generalmajor William Dobbie, kommandierender Offizier Malayas, untersuchte die Verteidigungsanlagen Malayas und berichtete, dass während der Monsunzeit von Oktober bis März feindliche Landungen an der Ostküste möglich seien und in Siam Stützpunkte errichtet werden könnten. Er sagte voraus, dass in Songkhla und Pattani in Siam sowie in Kota Bharu in Malaya Landungen möglich seien. Er empfahl einen Präventivschlag gegen Siam. Wir würden Truppen entsenden, um sie kurz hinter der Grenze in Siam abzufangen, und zwar lange genug, damit sich die Hauptstreitmacht sammeln und angreifen kann. \n\nDer Plan war jedoch in mehreren Punkten problematisch. Erstens ist Siam ein neutrales Land. Zweitens waren in Malaya nicht genügend Truppen stationiert, um die Operation durchzuführen."
mal.2.a:0 "Wir werden eine weitere Operation planen."
mal.3.t:0 "Operation Krohcol"
mal.3.d:0 "London lehnte die Durchführung der Operation Matador ab. Als Alternative zu Matador planten wir die Operation Krohcol. Drei Ad-hoc-Kolonnen wurden zusammengestellt, um den japanischen Vormarsch von ihren Brückenköpfen Songkhla und Pattani aus zu behindern und zu verzögern. Krohcol war die wichtigste der drei. Ihre Aufgabe war die Zerstörung des als „Land“ bekannten Felsvorsprungs. \n\n Die Zerstörung des „Landes“ würde die Straße von Pattani effektiv blockieren und so die Sicherheit der Kommunikations- und Rückzugslinie der 11. indischen Infanteriedivision gewährleisten."
mal.3.a:0 "Angriff!"
MAL_conception_of_malayan_union_tt:0 "Die Malayische Union wird gegründet."
MAL_crown_colony_of_singapore_tt:0 "\nSingapur wird eine Kronkolonie."
MAL_crown_colony_of_penang_tt:0 "\nPenang wird eine Kronkolonie."
MAL_crown_colony_of_malacca_tt:0 "\nMalakka wird eine Kronkolonie."
MAL_crown_colony_of_borneo_tt:0 "\nNord-Borneo wird eine Kronkolonie."
MAL_edward_gent_tt:0 "\nEdward Gent wird Gouverneur."
mal.4.t:0 "Gründung der Malayischen Union"
mal.4.d:0 "Britisch-Malaya umfasste die Straits Settlements, die Föderierten Malaiischen Staaten und die Unföderierten Malaiischen Staaten. Es war eines der profitabelsten Gebiete des Empire. Die britische Militärverwaltung schlug einen Plan zur Verbesserung der Verwaltungseffizienz in Malaya vor, der die Vereinigung dieser Kolonien unter einer Verwaltung vorsah. Eine Malaiische Union wurde gegründet. \n\nSir Harold MacMichael wurde beauftragt, die Zustimmung der malaiischen Staatsherrscher zur Union einzuholen. Wir hörten, dass diese Sultane beabsichtigen, mit den Japanern zusammenzuarbeiten. Sollten sie der Gründung der Union nicht zustimmen, würden sie entthront."
mal.4.a:0 "Wir werden diese Staaten direkt regieren."
mal.6.t:0 "Protest gegen die Malayan Union"
mal.6.d:0 "Die Malayen lehnten die Gründung der Union grundsätzlich ab. Der Widerstand war auf die Methoden Sir Harold MacMichaels zurückzuführen, die er anwandte, um die Zustimmung der Sultane zu erlangen, deren Macht zu beschneiden und Einwanderern die Staatsbürgerschaft zu gewähren. Die United Malays National Organisation (UMNO), eine von Onn Jaafar gegründete malaiische politische Vereinigung, führte den Widerstand gegen die Malayische Union an. Sie nutzte zivilen Ungehorsam als Protestmittel und weigerte sich, den Amtseinführungszeremonien der britischen Gouverneure beizuwohnen. \n\nSie weigerten sich auch, an den Sitzungen der Beiräte teilzunehmen, wodurch die Beteiligung der Malayen an der Regierungsbürokratie und am politischen Prozess vollständig zum Erliegen kam."
mal.6.a:0 "Vielleicht sollten wir ihre Meinung akzeptieren."
mal.7.t:0 "Föderation Malaya"
mal.7.d:0 "Das Abkommen über die Föderation Malayas wurde von der britisch-malaiischen Pleno-Konferenz ausgearbeitet und im King House von den malaiischen Herrschern und Sir Edward Gent als Vertreter der britischen Regierung unterzeichnet. Die Föderation umfasst elf Staaten und stellt die symbolischen Positionen der Herrscher der malaiischen Staaten wieder her, schließt jedoch Singapur aus."
mal.7.a:0 "Wir sind Kompromisse eingegangen."
mal.8.t:0 "Onn Jaafars Rücktritt"
mal.8.d:0 "Onn war zunehmend angewidert von der seiner Ansicht nach rassistisch geprägten kommunalistischen Politik der UMNO. Er forderte, die Parteimitgliedschaft allen Malayanern zu öffnen und die UMNO in United Malayans National Organisation umzubenennen. Doch die meisten UMNO-Führer ignorierten seine Empfehlungen. Schließlich beschloss er, die Partei zu verlassen. Tunku Abdul Rahman wurde der nächste Vorsitzende der UMNO."
mal.8.a:0 "Wir respektieren seine Gedanken."
MAL_onn_jaafar_leave_tt:0 "Tunku Abdul Rahman wird Vorsitzender der UNMO."
mal.9.t:0 "Ketuanan Melayu"
mal.9.d:0 "Seit dem 15. Jahrhundert sind Chinesen nach Malaya eingewandert. Sie eroberten nach und nach die Mehrheit der Großstädte und bedrohten die Interessen der Malaien. Dies sollte nicht so weitergehen, denn wir sind die rechtmäßigen Eigentümer dieses Landes. Die Malaien sind diesen Einwanderern überlegen!"
mal.9.a:0 "Wir werden die malaiische Vorherrschaft festigen."
mal.9.b:0 "Wir sollten die Einwanderer gleich behandeln."
mal.10.t:0 "Rassenunruhen in Singapur"
mal.10.d:0 "Während der malaiischen Prozession zum Geburtstag des islamischen Propheten Mohammed brach ein Aufruhr aus! Viele muslimische Organisationen nahmen an der Kundgebung teil. Sie bildeten eine feierliche Prozession von Padang zur Saint Andrews Road und schließlich nach Geylang. Plötzlich bewarf eine große Gruppe Chinesen die Malaien während der Prozession mit Steinen und Flaschen. Angestachelt von Ultranationalisten der Singapore United Malays National Organisation, geriet die islamische religiöse Prozession schnell in Gewalt. \n\nDie Regierung verhängte eine Ausgangssperre, um die Ordnung wiederherzustellen. Bei den Unruhen wurden viele Menschen getötet und verletzt. Es entstand erheblicher Sach- und Fahrzeugschaden."
mal.10.a:0 "Wir müssen etwas tun, um den Frieden wiederherzustellen."
mal.11.t:0 "Unabhängigkeit Malaysias"
mal.11.d:0 "Tunku Abdul Rahman und Lennox-Boyd unterzeichneten das Unabhängigkeitsabkommen. Er wurde der erste Premierminister Malaysias. Malaya, Nordborneo, Sarawak und Singapur werden zu einem Land vereinigt."
mal.11.a:0 "Exzellent."
MAL_independence_of_malaysia_tt:0 "Malaysia wird gegründet."

mal.12.t:0 "Aufstieg des malaiischen Nationalismus"
mal.12.d:0 "Die Kolonialregierung beschloss, diesen Einwanderern gleiche Rechte zu gewähren. Sie brach mit der traditionellen Herrschaftsform und erkannte die malaiische Vorherrschaft nicht an. Diese Entscheidung scheint zu einer stärkeren Unterstützung des Nationalismus unter den Malayen zu führen. Kesatuan Melayu Muda, eine radikal nationalistische politische Organisation, gewann viele Malayen für die Unabhängigkeit Malayas. \n\nUrsprünglich unterstützten die meisten Malayen die britische Herrschaft stark. Doch nun verloren sie das Vertrauen in die Kolonialherrschaft, da die pro-malaiische Politik nicht fortgesetzt wird."
mal.12.a:0 "Vielleicht sollten wir loslassen."

mal.13.t:0 "Unkoordinierte Gesellschaft"
mal.13.d:0 "Chinesische Einwanderer haben die Mehrheit der Großstädte erobert. Sie sind wohlhabend und intelligent und stellen einen großen Teil der Bevölkerung. Die meisten Malaysier lebten jedoch auf dem Land und bildeten die Basis unseres Landes. Obwohl wir heute die Regierung kontrollieren, wollen die Chinesen nicht mit uns kooperieren. Wir glauben, dass die meisten politischen Organisationen Chinas von der chinesischen Regierung manipuliert wurden. Wir haben nicht genug Macht, sie zu zähmen."
mal.13.a:0 "Verflucht seien sie!"

mal.14.t:0 "Nachfolgestreit in Selangor"
mal.14.d:0 "Sultan Alaeddin Sulaiman Shah hatte viele Kinder. Seine ersten drei Söhne in chronologischer Reihenfolge waren Tengku Musa Eddin, Tengku Badar Shah und Tengku Alam Shah. 1903 wurde Tunku Musa Eddin zum Tengku Mahkota ernannt und 1920 zum Raja Muda, dem rechtmäßigen Erben, befördert. Auf Betreiben des britischen Residenten Theodore Samuel Adams wurde Tengku Musa Eddin jedoch 1934 wegen angeblichen „Fehlverhaltens“ als Raja Muda entlassen. Adams hatte Tengku Musa Eddin beschuldigt, ein Verschwender und Taugenichts mit einer Vorliebe für Glücksspiel zu sein. Stattdessen wurde Tengku Alam Shah über den Kopf seines anderen Halbbruders hinweg zum Raja Muda, dem Thronfolger, ernannt. \n\nViele Malaysier in Selangor glaubten jedoch, der wahre Grund für Tengku Musa Eddins Entlassung sei seine Weigerung gewesen, Adams Befehlen Folge zu leisten. Nun erfolgte die Ernennung."
mal.14.a:0 "Sie müssen unserer Empfehlung folgen."
MAL_selangor_succession_dispute_tt:0 "\nDie meisten Malaien sind mit dieser Ernennung „nicht zufrieden“."

mal.15.t:0 "Verteidigungsstrategie für den Fernen Osten"
mal.15.d:0 "1920 veröffentlichte die Admiralität das Kriegsmemorandum (Ost) 1920, eine Reihe von Anweisungen für den Fall eines Krieges mit Japan. Darin wurde die Verteidigung Singapurs als „absolut notwendig“ bezeichnet. Die Strategie wurde den Dominions auf der Imperial Conference 1923 vorgestellt. Das Memorandum unterteilte einen Krieg mit Japan in drei Phasen. In der ersten Phase sollte die Garnison Singapurs die Festung verteidigen, während die Flotte ihren Weg von ihren Heimatgewässern nach Singapur zurücklegte. Anschließend sollte die Flotte von Singapur aus in See stechen und Hongkong entsetzen oder zurückerobern. In der letzten Phase sollte die Flotte Japan blockieren und es zwingen, Bedingungen zu akzeptieren. \n\nAufgrund mangelnder Unterstützung für eine verstärkte Verteidigung im Fernen Osten werden wir jedoch nicht in der Lage sein, die zweite Phase umzusetzen."
mal.15.a:0 "Die Verteidigung des Fernen Ostens wurde ignoriert ..."
MAL_rescue_hong_kong_tt:0 "\nWir §Ywerden nicht in der Lage sein§!, die zweite Phase der Fernost-Verteidigungsstrategie umzusetzen."

mal.16.t:0 "Bombardierung von Singapur"
mal.16.d:0 "Der Krieg brach aus! Die Japaner schickten siebzehn G3M Nell-Bomber zum Angriff auf Singapur. Wir entdeckten ihre Formation an einer Radarstation in Mersing. Drei Brewster Buffalo-Jäger der No. 453 Squadron der RAAF standen auf dem RAF-Stützpunkt Sembawang in Bereitschaft. Wir lehnten jedoch die Aufforderung von Flight Lieutenant Tim Vigors ab, die japanischen Bomber zu starten und abzufangen, da wir befürchteten, dass die Flugabwehrbatterien auf die befreundeten Jäger feuern würden, obwohl Vigors ein erfahrener Nachtjäger in der Luftschlacht um England war."
mal.16.a:0 "Der Krieg begann."

mal.17.t:0 "Schlacht um Kuala Lumpur"
mal.17.d:0 "Der nördliche Teil Malayas, darunter Perlis, Kedah, Kelantan, Terengganu und Penang, war in japanische Hände gefallen. Nach der Schlacht am Slim River war Kuala Lumpur das nächste militärische Ziel der japanischen Truppen. Wir beschlossen, Selangor und Negeri Sembilan den Japanern zu überlassen, und unsere Truppen begannen einen schnellen Rückzug nach Johor und dann nach Singapur. In der nun verlassenen Stadt versank schnell ein Zustand der Anarchie und des Chaos. Plünderungen waren weit verbreitet. Die japanischen Truppen marschierten ohne großen Widerstand, abgesehen von kleineren Scharmützeln, in Kuala Lumpur ein. Sie übernahmen schnell die Kontrolle über Regierungs- und institutionelle Gebäude wie das Sultan-Abdul-Samad-Gebäude, den Bahnhof und das Pudu-Gefängnis."
mal.17.a:0 "Rückzug!"

mal.18.t:0 "Schlacht von Johore Bahru"
mal.18.d:0 "Die Japaner hatten den Nordwesten von Johor erreicht. Sie eroberten problemlos größere Städte Johors wie Batu Pahat, Yong Peng, Kluang und Ayer Hitam. Wir wurden zum Rückzug nach Johor Bahru gezwungen. Nach einer weiteren Serie japanischer Bombenangriffe zogen wir uns jedoch nach Singapur zurück und sprengten am nächsten Tag den Damm als letzten Versuch, den japanischen Vormarsch in Britisch-Malaya aufzuhalten. Die Japaner nutzten dann die Sultansresidenz Bukit Serene Palace in der Stadt als ihren vorübergehenden Hauptstützpunkt für ihre anfänglichen Pläne zur Eroberung Singapurs, während sie darauf warteten, den Damm wiederherzustellen. Sie wählten den Palast als ihren Hauptstützpunkt, weil sie bereits wussten, dass die Briten es nicht wagen würden, ihn anzugreifen, da dies ihre engen Beziehungen zu Johor schädigen würde."
mal.18.a:0 "Wir können ihrer Invasion möglicherweise nicht widerstehen ..."

mal.19.t:0 "Fahrradinfanterie"
mal.19.d:0 "Die japanische Invasion Malayas war weitgehend auf fahrradfahrende Soldaten angewiesen. Fahrräder ermöglichten den ruhigen und flexiblen Transport Tausender Soldaten, die die Verteidiger überraschen und verwirren konnten. Auch die japanische Kriegsmaschinerie wurde kaum beansprucht, da weder Lastwagen noch Schiffe für den Transport benötigt wurden und auch kein kostbares Erdöl. Mit Fahrrädern konnten sich die japanischen Truppen schneller bewegen als die sich zurückziehenden alliierten Streitkräfte und ihnen so oft den Rückzug abschneiden."
mal.19.a:0 "Das ist wirklich beeindruckend."

mal.20.t:0 "Malayan United"
mal.20.d:0 "Es gelang uns, die Regierungspartei Malayas zu werden und alle malaiischen Staaten zu vereinen. Das malaiische Volk befreite sich endgültig von der Kolonialherrschaft. Das Oberhaupt unseres Landes wird abwechselnd unter den Sultanen gestellt."
mal.20.a:0 "Ketuanan Melayu!"
MAL_malayan_united_tt:0 "Kesatuan Melayu Muda vereinte die malaiischen Staaten."

mal.22.t:0 "Parti Kebangsaan Melayu Malaya"
mal.22.d:0 "Es ist uns gelungen, das malaiische Volk zu vereinen. Nun ist es an der Zeit, eine politische Partei zu gründen. Die Parti Kebangsaan Melayu Malaya wird uns beim Aufbau eines großartigen Landes unterstützen."
mal.22.a:0 "Ketuanan Melayu!"

malnews.1.t:0 "Erster Linienflug nach Hongkong"
malnews.1.d:0 "Imperial Airways hat beschlossen, seine Strecken von London nach Hongkong zu erweitern. \n\nDies ist der erste Linienflug nach Hongkong. Wöchentliche Flüge von Penang nach Hongkong sollten die bestehenden Verbindungen zwischen Australien und London ergänzen. Die Hongkong-Route wurde durch die Verbindung mit der transpazifischen Panamerikaroute und den Verbindungen von Imperial Airways nach Singapur und London zu einer wichtigen Verbindung. So konnten Passagiere erstmals mit Linienflügen um die ganze Welt fliegen. \n\nDie Flugzeuge verlassen Hongkong jeden Freitag und können London in 10 Tagen statt einem Monat erreichen."
malnews.1.a:0 "Exzellent."
malnews.2.t:0 "Protest gegen die Malayan Union"
malnews.2.d:0 "In jüngster Zeit kam es zu Protesten gegen die Malaiische Union. Angeführt wurde der Protest von der United Malays National Organisation (UMNO). Großbritannien vereinigte die ehemaligen malaiischen Staaten zu einer Kolonie und gewährte allen Bürgern, die die Staatsbürgerschaft beantragten, unabhängig von ihrer ethnischen Zugehörigkeit gleiche Rechte. Darüber hinaus schränkte der britische Gouverneur die Macht der Sultane stark ein. Diese Politik rief den Widerstand der Malaiischen Union hervor. Viele Beobachter sind der Meinung, dass die Methoden, die die Briten zur Gründung der Union anwandten, der Hauptgrund für den Widerstand gegen die Malaiische Union sind."
malnews.2.a:0 "Interessant."
malnews.2.b:0 "Vielleicht sollten wir auf die Menschen hören."
malnews.2.c:0 "Vielleicht sollten wir auf die Menschen hören."
malnews.3.t:0 "Unabhängigkeit Singapurs"
malnews.3.d:0 "Der malaysische Premierminister Tunku Abdul Rahman hat kürzlich beschlossen, Singapur aus der Föderation auszuschließen. \n\nDas malaysische Parlament stimmte für den Ausschluss, wobei alle singapurischen Abgeordneten die Abstimmung boykottierten. Lee Kuan Yew, der Ministerpräsident Singapurs, verkündete, Singapur sei ein souveräner, unabhängiger Staat. Er sagte: „Für mich wäre das ein Moment der Qual, denn mein ganzes Leben … mein ganzes Erwachsenenleben … habe ich an die Fusion und die Einheit der beiden Gebiete geglaubt. Sie wissen, es ist ein Volk, das durch die Geographie verbunden ist …“ \n\nDer neue Staat wurde zur Republik Singapur."
malnews.3.a:0 "Interessant."
malnews.3.b:0 "Wir hoffen, dass unser Land den Frieden wiederherstellen kann."
malnews.3.c:0 "Wir sind stark!"
malnews.4.t:0 "[MAL.GetAdjective] Aufbau an der [INS.GetAdjective] Grenze"
malnews.4.d:0 "Mit dem Aufstieg des pan-malaiischen Nationalismus hat [MAL.GetName] seinen Druck auf die [INS.GetAdjective]-Grenze nicht verringert. \n\nDie Malaien nutzen die Schwäche der Niederlande angesichts der Konflikte in Europa aus und wollen ihren Einfluss in der Region immer weiter ausbauen, um schließlich ganz Südostasien zu kontrollieren. Trotz der mangelnden Verteidigung Niederländisch-Indiens sind die Niederlande und ihre Verbündeten bereit, gegen diese Kriegstreiber zu kämpfen."
malnews.4.a:0 "Diesen Kriegstreibern muss Einhalt geboten werden!"
malnews.4.b:0 "Wir sind stark!"
malnews.4.c:0 "Gemeinsam müssen wir diesen Angreifer stoppen!"
malnews.4.e:0 "Eine interessante Entwicklung."
malnews.5.t:0 "Untergang Singapurs"
malnews.5.d:0 "Die Japaner hatten die letzte Verteidigungslinie in Singapur durchbrochen. \n\nDen Alliierten gingen die Lebensmittel und die Munition aus. Auch die Flugabwehrgeschütze hatten keine Munition mehr und konnten die japanischen Luftangriffe nicht unterbinden, die im Stadtzentrum schwere Verluste verursachten. Nach hitzigen Diskussionen und gegenseitigen Schuldzuweisungen innerhalb des britischen Kommandos waren sich alle Anwesenden einig, dass ein Gegenangriff nicht möglich war. Sie entschieden sich für die Kapitulation. \n\nDie japanische Besetzung Singapurs begann nach der britischen Kapitulation. Japanische Zeitungen verkündeten triumphierend, der Sieg habe die allgemeine Kriegslage entschieden."



