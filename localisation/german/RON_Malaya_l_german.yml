MAL_not_finished_yet:0 "Noch nicht fertig"
MAL_decentralization:0 "Dezentralisierung"
MAL_decentralization_desc:0 "Soziale und ethnische Differenzierung bestimmen die Art und Weise, wie wir in Malaya regieren. Wir haben 1935 die Position des Generalresidenten der Föderierten Staaten abgeschafft und beschlossen, seine Macht auf die einzelnen Sultanate zu dezentralisieren, um eine fragmentierte Gesellschaft aufrechtzuerhalten."
MAL_decentralization_tt:0 "Unsere Art der Regierungsführung kann zu ethnischen Konflikten führen."
MAL_pro_malay_policy:0 "Pro-Malaiische Politik"
MAL_pro_malay_policy_desc:0 "„Teile und herrsche“ ist das Prinzip unserer Herrschaft in Malaya. Seit Beginn der Kolonialherrschaft haben wir die Malayen bevorzugt und den Status chinesischer und indischer Einwanderer unterdrückt. Diese Politik könnte jedoch zu Zwietracht unter ihnen führen."
MAL_singapore_strategy:0 "Singapur-Strategie"
MAL_singapore_strategy_desc:0 "Diese Politik besteht aus einer Reihe von Kriegsplänen, die sich über einen Zeitraum von zwanzig Jahren entwickelten. Ziel war es, eine Aggression des japanischen Kaiserreichs abzuwehren, indem man im Fernen Osten einen Stützpunkt für eine Flotte der Royal Navy bereitstellte, der in der Lage sein sollte, eine japanische Streitmacht, die Richtung Süden nach Indien oder Australien vordrang, abzufangen und zu besiegen."
MAL_force_z:0 "Kraft Z"
MAL_force_z_desc:0 "Die Force Z bestand aus dem Schlachtschiff HMS Prince of Wales, dem Schlachtkreuzer HMS Repulse und vier modernen Zerstörern der Home Fleet. Sie wird sich aktiv an der Verteidigung Singapurs beteiligen."
MAL_reinforce_air_defense:0 "Luftverteidigung verstärken"
MAL_reinforce_air_defense_desc:0 "Vielleicht sollten wir uns im Seekrieg um die Lufthoheit kümmern, um unser Schlachtschiff zu schützen."
MAL_fortification_effort:0 "Befestigungsbemühungen"
MAL_fortification_effort_desc:0 "Die derzeitigen Verteidigungsanlagen auf Malaya und der Insel Singapur reichen noch immer nicht aus. Wir sollten unsere Anstrengungen auf den Bau von Festungen konzentrieren, um einem aus dem Norden kommenden Feind zuvorzukommen und ihn aufzuhalten."
MAL_protect_the_coast:0 "Schützen Sie die Küste"
MAL_protect_the_coast_desc:0 "Unsere Küstenverteidigung ist noch schwach. Wir sollten mehr Festungen entlang der Ostküste bauen."
MAL_johor_defense_line:0 "Johor-Verteidigungslinie"
MAL_johor_defense_line_desc:0 "Wir sollten in Johor eine Verteidigungslinie als letztes Hindernis errichten, um dem feindlichen Angriff standzuhalten."
MAL_operation_matador:0 "Operation Matador"
MAL_operation_matador_desc:0 "Im Jahr 1937 empfahl Generalmajor William Dobbie, kommandierender Offizier von Malaya, einen Plan zur Verlegung von Truppen in Stellung, um den japanischen Amphibienangriff abzuwehren. „Wir werden initiativ Truppen entsenden, um die Japaner kurz hinter der thailändischen Grenze abzufangen, und zwar lange genug, damit sich die Hauptstreitmacht sammeln und angreifen kann.“"
MAL_operation_matador_tt:0 "Gewinnen Sie die indische 11. Infanteriedivision in Kedah."
MAL_the_mpaja:0 "Die MPAJA"
MAL_the_mpaja_desc:0 "Die Malayische Volksarmee gegen Japan möchte mit uns eine Einheitsfront bilden. Wir sind antijapanisch eingestellt und werden mit diesen Kommunisten zusammenarbeiten!"
MAL_dalforce_volunteers:0 "Dalforce"
MAL_dalforce_volunteers_desc:0 "Oberstleutnant John D. Dalley von der Federated Malay States Police Force schlug die Schaffung eines Guerilla-Netzwerks vor. Die japanische Invasion scheint unmittelbar bevorzustehen, und die offizielle Rekrutierung der einheimischen Chinesen gegen die Japaner ist unerlässlich."
MAL_integrate_the_colonies:0 "Integrieren Sie die Kolonien"
MAL_integrate_the_colonies_desc:0 "Britisch-Malaya bestand aus drei politischen Gruppen: dem Protektorat der Föderierten Malaiischen Staaten, fünf geschützten Unföderierten Malaiischen Staaten und der Kronkolonie der Strait Settlements. Wir beabsichtigen, diese Kolonien unter einer gemeinsamen Verwaltung zu vereinen."
MAL_conception_of_malayan_union:0 "Konzeption der Malayischen Union"
MAL_conception_of_malayan_union_desc:0 "Die britische Militärverwaltung schlägt einen Plan zur Verbesserung der Verwaltungseffizienz in Malaya vor, der die Gründung einer Malayischen Union vorsieht, um die malaiischen Staaten zu vereinen. Sir Harold MacMichael wird mit der Gründung der Union beauftragt."
MAL_malaya_for_malayans:0 "Malaya für Malayaner"
MAL_malaya_for_malayans_desc:0 "Wir haben beschlossen, allen, die die Staatsbürgerschaft beantragen, gleiche Rechte zu gewähren. Personen, die in einem Staat Britisch-Malayas oder Singapurs geboren wurden und dort leben, erhalten automatisch die gleiche Staatsbürgerschaft. Diese Regelung gilt für alle Malayer, unabhängig von ihrer ethnischen Zugehörigkeit."
MAL_reduce_sultan_powers:0 "Reduzieren Sie die Macht der Sultane"
MAL_reduce_sultan_powers_desc:0 "Die Sultane, die traditionellen Herrscher der malaiischen Staaten, gaben ihre gesamte Macht mit Ausnahme religiöser Angelegenheiten an die britische Krone ab. Nun wird die Union der Gerichtsbarkeit eines britischen Gouverneurs unterstellt."
MAL_disband_the_union:0 "Die Union auflösen"
MAL_disband_the_union_desc:0 "Aufgrund des Widerstands malaiischer Nationalisten erkannten wir das Problem der Union und ergriffen Maßnahmen, um die Meinungen der wichtigsten Rassen in Malaya zu berücksichtigen. Die Union wird aufgelöst und durch eine Föderation Malayas ersetzt."
MAL_the_road_to_independence:0 "Der Weg zur Unabhängigkeit"
MAL_the_road_to_independence_desc:0 "Der Kolonialismus muss enden. Wir werden den Weg zu einem unabhängigen Land beschreiten."
MAL_expel_singapore:0 "Singapur vertreiben"
MAL_expel_singapore_desc:0 "Da wir keine andere Möglichkeit sahen, weiteres Blutvergießen zu vermeiden, beschlossen wir, Singapur aus der Föderation auszuschließen."
MAL_leave_the_commonwealth:0 "Verlassen Sie das Commonwealth"
MAL_leave_the_commonwealth_desc:0 "Es ist an der Zeit, sich vom Vereinigten Königreich zu lösen. Malaya kann seinen eigenen Kurs ohne Einmischung aus London bestimmen und in seiner Region sein eigenes Schicksal bestimmen."
MAL_form_southeast_asian_union:0 "Formular ASA"
MAL_form_southeast_asian_union_desc:0 "Wir haben die Machtbasis und Glaubwürdigkeit geschaffen, um unser eigenes Bündnisnetzwerk aufzubauen. Wir wollen die zwischenstaatliche Zusammenarbeit fördern und die wirtschaftliche Integration der südostasiatischen Staaten erleichtern. Wir werden nach gleichgesinnten Mächten suchen und Malaya zu einer wichtigen Stimme in der Weltpolitik machen."
MAL_research_collaboration_with_alliance:0 "Forschungskooperationen"
MAL_research_collaboration_with_alliance_desc:0 "Die Malaysier sind ein intelligentes und einfallsreiches Volk, verfügen jedoch weder über die Infrastruktur noch über die Bevölkerung für ein ernsthaftes wissenschaftliches Programm. Wir werden mit unseren Verbündeten zusammenarbeiten und Wissen und bahnbrechende Erkenntnisse zum gegenseitigen Nutzen austauschen."
MAL_expel_singapore_tt:0 "Singapur wird aus der Föderation ausgeschlossen."
MAL_research_sharing_tt:0 "Wir werden mit anderen Mitgliedern unserer Fraktion eine „Ytech-Sharing-Vereinbarung“ abschließen."
mal_asa:0 "Verband Südostasiens"
mal_research_sharing:0 "ASA Forschungskooperation"
MAL_equal_policy:0 "Politik der ethnischen Gleichstellung"
MAL_equal_policy_desc:0 "Wir müssen ein Gleichgewicht zwischen Einheimischen und Einwanderern finden. Die derzeitige Politik sollte aufgegeben werden. Dies würde jedoch zu Unzufriedenheit der Einheimischen mit der Regierung führen."
MAL_rise_of_malay_nationalism:0 "Aufstieg des malaiischen Nationalismus"
MAL_rise_of_malay_nationalism_desc:0 "Die Umsetzung der Politik der ethnischen Gleichstellung hat dazu geführt, dass sich immer mehr Einheimische gegen die Kolonialherrschaft auflehnen. Ursprünglich waren radikale malaiische Nationalisten eine Minderheit. Doch nun scheinen sie immer mehr Unterstützung zu erhalten."
MAL_unify_the_peninsula:0 "Vereint die Halbinsel"
MAL_unify_the_peninsula_desc:0 "Die britische Kolonialregierung teilte Malaya in drei Teile. Dies führte zu einer sozialen Differenzierung. Wir werden alle malaiischen Staaten vereinen."
MAL_malayness:0 "Umarme das Malayische"
MAL_malayness_desc:0 "Die Sultane, die malaiische Sprache und Kultur sowie der Islam sind die Säulen unseres Landes. Wir sollten die Identität der Malaien klar definieren und institutionalisieren."
MAL_malaya_first:0 "Malaya zuerst"
MAL_malaya_first_desc:0 "Malaya ist die stärkste unabhängige Nation auf der Halbinsel und kann daher ein Leitstern für die Zukunft Südostasiens und ehemaliger Kolonien sein."
MAL_greater_indonesia:0 "Großindonesien"
MAL_greater_indonesia_desc:0 "Ein Konzept, das die malaiische Rasse durch die Vereinigung der britischen Gebiete Malaya und Borneo mit Niederländisch-Indien zusammenführen soll. Seit den späten 1920er Jahren wird es von Studenten und Absolventen des Sultan Idris Training College für malaiische Lehrer vertreten."
MAL_southeast_asian_commonwealth:0 "Gründete das Südliche Reich"
MAL_influence_siam:0 "Einfluss Siam"
MAL_influence_siam_desc:0 "Als südostasiatische Nation tragen wir die Verantwortung für die Sicherheit und den Zusammenhalt anderer Nationen in der Region. Wir sollten unsere Unterstützer in Siam finanziell unterstützen und unsere Werte an ihre Regierung weitergeben."
MAL_influence_philippines:0 "Einfluss Philippinen"
MAL_influence_philippines_desc:0 "Die Philippinen leiden immer noch unter dem Kolonialismus. Wir sollten unsere Unterstützer auf den Philippinen subventionieren und unsere Werte an ihre Regierung weitergeben."

