MAL_lack_of_support_for_defense:0 "Mangelnde Unterstützung für die Verteidigung des Fernen Ostens"
MAL_lack_of_support_for_defense_desc:0 "Malaya und Hongkong leiden unter der mangelnden Unterstützung für die Verteidigung des Fernen Ostens. Dies behindert ihre militärischen Planungen erheblich."
MAL_tuanku_abdul_rahman:0 "Yang di-Pertuan Agong Tuanku Abdul Rahman"
MAL_tuanku_abdul_rahman_desc:0 "Der Yang di-Pertuan Besar von Negeri Sembilan wurde zum ersten Yang di-Pertuan Agong gewählt. Der Yang di-Pertuan Agong ist der Monarch und Staatsoberhaupt von Malaya. Seine Anwesenheit und ihre Loyalität ihm gegenüber sind eine große Quelle der Einheit für die Menschen."
