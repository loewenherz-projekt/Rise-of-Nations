 ### MAL - BRITISH MALAYA NAVAL EQUIP ### 
 MAL_submarine_1_desc:0 "Die L-Klasse bestand aus mittelgroßen Booten, die ursprünglich im Rahmen des Emergency War Program als verbesserte Version der vorherigen U-Boot-Klassen geplant waren. Sie wurden in der Spätphase des Ersten Weltkriegs gebaut und mit neuen, größeren 21-Zoll-Torpedos ausgestattet. Sie dienten bis zum Beginn des Zweiten Weltkriegs und wurden dann hauptsächlich für sekundäre und Ausbildungszwecke eingesetzt."
 MAL_submarine_2_desc:0 "Die Boote der T-Klasse bzw. Triton-Klasse wurden als Ersatz für die großen U-Boote der O-, P- und R-Klasse entwickelt. Es handelte sich um mittelgroße U-Boote mit großer Reichweite, die sich gut für den Atlantik und den Pazifik eigneten. Diese Boote waren gut bewaffnete, stabile Plattformen und wurden während des Konflikts häufig eingesetzt, da 25 Prozent der gebauten Boote im Krieg verloren gingen."
 MAL_submarine_3_desc:0 "Die U-Klasse bestand aus kleinen U-Booten, die im Rahmen der Kriegsnotstandsprogramme 1940 und 1941 gebaut wurden. Ursprünglich als Trainings-U-Boote konzipiert, wurde das Design bei Kriegsausbruch geändert, sodass sich diese U-Boote in den engen Gewässern der Nordsee und des Mittelmeers als nützlich erwiesen. Aufgrund ihrer geringeren Größe waren ihre Reichweite und ihre Bewaffnung begrenzt. Die Klasse bestand aus drei Unterklassen: Undine, Umpire und Uproar."
 MAL_submarine_4_desc:0 "Die U-Boote der V-Klasse oder Vampire-Klasse basierten auf den kleineren Booten der Vorgängerklasse U. Sie waren größer, aber immer noch relativ klein und verfügten über bessere Seetüchtigkeit, jedoch eine begrenzte Reichweite und Bewaffnung."
 MAL_destroyer_1:0 "V/W-Klasse"
 MAL_destroyer_1_desc:0 "Zu diesen Zerstörern gehörten die Admirality- und Thornycroft-Klassen V und W. Sie wurden im Rahmen des War Emergency Program gebaut. Sie stellten die ultimative Weiterentwicklung des britischen Zerstörerdesigns während des Ersten Weltkriegs dar und verkörperten die Verbesserungen ihrer Vorgänger sowie neue technologische Fortschritte. In der Spätphase des Ersten Weltkriegs wurden diese Schiffe in großer Zahl gebaut und bildeten danach das Rückgrat der Zerstörerflottillen der Royal Navy. Ab den 1930er Jahren wurden sie in Reserveflotten eingesetzt und schließlich nur noch zur Konvoibegleitung eingesetzt. Es handelte sich um ausreichend bewaffnete, schnelle Schiffe mit guter Reichweite."
 MAL_destroyer_2:0 "G/H/I-Klasse"
 MAL_destroyer_2_desc:0 "Die Zerstörer der G-, H- und I-Klasse wurden im Rahmen der Marinebauprogramme 1933 und 1934 bestellt. Sie waren im Wesentlichen Wiederholungen der vorhergehenden F-Klasse, nur etwas kleiner. Die Bewaffnung der G- und H-Klassen entsprach der der F-Klasse, wobei beide mit 4,7-Zoll-Geschützen ausgerüstet waren. Diese Schiffe hatten eine große Reichweite, waren ausreichend bewaffnet und verfügten über eine starke Torpedobewaffnung. Sie wurden während des Krieges ausgiebig eingesetzt und erlitten zahlreiche Verluste."
 MAL_destroyer_3:0 "J/K/N-Klasse"
 MAL_destroyer_3_desc:0 "Die Klassen J, K und N ähnelten der früheren Tribal-Klasse, doch statt der Geschützbewaffnung setzten die Konstrukteure auf eine Standardbewaffnung mit schweren Torpedos und leichteren Geschützen. Die Schiffe wurden während ihres Kriegseinsatzes modifiziert. Zu den Upgrades gehörten verbesserte Flugabwehrgeschütze und Radar. Es handelte sich um schnelle, weitreichende und gut bewaffnete Schiffe, die sich ideal für Flottenbegleitschiffe eigneten."
 MAL_destroyer_4:0 "Kampfklasse"
 MAL_destroyer_4_desc:0 "Die Zerstörer der Battle-Klasse bauten auf der Weiterentwicklung britischer Zerstörer auf, die während des Krieges eingesetzt wurden. Die Schiffe wurden im Rahmen der Marineprogramme 1942 und 1943 bestellt. Sie waren sowohl mit Geschützen als auch mit Torpedos gut bewaffnet. Ihre Flugabwehr, ihre Fähigkeiten zur U-Boot-Abwehr, ihre Geschwindigkeit und ihre Reichweite machten sie zu vielseitigen Schiffen. Ihr später Einsatz im Krieg führte zu einem minimalen Beitrag."
 MAL_light_cruiser_1:0 "C-Klasse"
 MAL_light_cruiser_1_desc:0 "Die Leichten Kreuzer der C-Klasse waren eine Gruppe von 28 Leichten Kreuzern der Royal Navy. Sie wurden vor und während des Ersten Weltkriegs für die rauen Bedingungen der Nordsee gebaut. Obwohl sie relativ klein und beengt waren, erwiesen sie sich als robuste und leistungsfähige Schiffe. Ihre Bewaffnung war mehr als zufriedenstellend: Sie trugen genügend 6-Zoll-Geschütze, um feindliche Oberflächenziele zu bekämpfen, und eine schwere Torpedoladung, um feindliche Schiffe und Konvois zu vernichten. Sie wurden im Ersten Weltkrieg ausgiebig eingesetzt und waren an vielen Überwasseraktionen beteiligt. Nur eine begrenzte Anzahl der Schiffe überlebte die Verschrottung vor dem Ersten Weltkrieg. Nur die Unterklassen Caledon, Ceres und Carlisle waren Mitte der 1930er Jahre im Einsatz."
 MAL_light_cruiser_2:0 "Southampton-Klasse"
 MAL_light_cruiser_2_desc:0 "Die Leichten Kreuzer der Southampton-Klasse waren eine Unterklasse der Kreuzer der Town-Klasse und wurden als Gegenstück zu den japanischen Kreuzern der Mogami-Klasse entwickelt. Diese Schiffe waren gut gepanzert, verfügten über eine gute Geschwindigkeit und Reichweite und trugen eine beeindruckende Bewaffnung mit zwölf 6-Zoll-Geschützen in vier Drillingstürmen. Sie bildeten die Grundlage für viele spätere Leichte-Kreuzer-Entwürfe der Royal Navy während des Krieges."
 MAL_light_cruiser_3:0 "Kronkolonie-Klasse"
 MAL_light_cruiser_3_desc:0 "Die leichten Kreuzer der Crown-Colony-Klasse waren verbesserte Versionen der früheren Town-Klasse, jedoch mit vereinfachtem Design, um den Bau zu beschleunigen und Kosten zu senken. Die Schiffe trugen die gleiche Bewaffnung wie ihre Vorgänger, vier Drillingstürme mit 6-Zoll-Geschützen. Sie waren ähnlich gepanzert, hatten aber aufgrund ihrer kleineren Motoren eine etwas geringere Reichweite. Der Typ umfasste zwei Unterklassen: Fiji und Ceylon."
 MAL_light_cruiser_4:0 "Minotaurus-Klasse"
 MAL_light_cruiser_4_desc:0 "Diese Kreuzer, auch als Swiftsure-Klasse bekannt, wurden als modifizierte Version der Crown-Colony-Klasse konzipiert und enthielten 1941 genehmigte Kriegsmodifikationen. Sie verfügten über eine größere Reichweite und mehr Flugabwehrwaffen als die Crown-Colony-Klasse, während die Hauptbewaffnung auf drei Drillingstürme reduziert war. Da der Bau zu spät war, um den Kriegsausgang zu beeinflussen, wurden die meisten der bestellten Schiffe später storniert. "
 MAL_heavy_cruiser_1:0 "Hawkins-Klasse"
 MAL_heavy_cruiser_1_desc:0 "Die Kreuzer der Hawkins-Klasse waren die ersten schweren Kreuzer der Welt. Sie basierten auf den früheren leichten Kreuzern der Town-Klasse, insbesondere der Birmingham-Unterklasse, waren jedoch mit 7,5-Zoll-Geschützen und einem dickeren Panzergürtel ausgestattet. Sie wurden für den Kampf gegen die großen deutschen Konvoi-Angreifer entwickelt. Sie waren gut bewaffnet, verfügten über eine angemessene Geschwindigkeit und Reichweite und waren gut geschützt. Insgesamt wurden fünf Schiffe in Dienst gestellt, aber nur vier waren zu Beginn des Zweiten Weltkriegs im Einsatz."
 MAL_heavy_cruiser_2:0 "Surrey-Klasse"
 MAL_heavy_cruiser_2_desc:0 "Die Schweren Kreuzer der Surrey-Klasse wurden im Rahmen des Marineprogramms von 1928 vorgeschlagen. Sie waren verbesserte Versionen der früheren Schweren Kreuzer der York-Klasse. Wären sie fertiggestellt worden, wären sie mit vier 8-Zoll-Zwillingstürmen, schwererer Panzerung und stärkeren Motoren ausgestattet gewesen. Zwei Schiffe wurden bestellt, aber keines wurde auf Kiel gelegt."
 MAL_heavy_cruiser_3:0 "Admiral-Klasse"
 MAL_heavy_cruiser_3_desc:0 "Die Schweren Kreuzer der Admiral-Klasse (nicht zu verwechseln mit den Schlachtkreuzern der Admiral-Klasse) waren der letzte Versuch der Royal Navy, Kreuzer mit 8-Zoll-Geschützen zu konstruieren und zu bauen. Die Designstudien begannen 1938 und endeten 1941. Sie führten zu verschiedenen Entwürfen. Die endgültigen Entwürfe beinhalteten neue 8-Zoll-Geschütze in Drillingstürmen, schwere Flugabwehr, dicke Panzerung und hohe Geschwindigkeit. Der Mangel an feindlichen Kreuzern und die Kosteneffizienz dieser Schiffe führten dazu, dass man sich stattdessen auf den Bau weiterer leichter Kreuzer konzentrierte."
 MAL_heavy_cruiser_4:0 "Churchill Design"
 MAL_heavy_cruiser_4_desc:0 "Diese Schiffe wurden von Sir Winston Churchill, Lord der Admiralität, zu Beginn des Zweiten Weltkriegs als Gegenstück zu den schweren Kreuzern der Deutschland-Klasse vorgeschlagen. Sie sollten über 9,2-Zoll-Kanonen, schwere Flugabwehr und starke Panzerung verfügen. Sie sollten die feindlichen Großkampfschiffe effektiv bekämpfen. Aufgrund der hohen Kosten und der mangelnden Nachfrage nach neuen schweren Kreuzern wurde der Bau der Schiffe schließlich eingestellt. "
 MAL_battle_cruiser_1:0 "Ansehensklasse"
 MAL_battle_cruiser_1_desc:0 "Die Schlachtkreuzer der Renown-Klasse wurden ursprünglich als verbesserte Versionen der Schlachtschiffe der Revenge-Klasse auf Kiel gelegt. Ihr Bau wurde bei Ausbruch des Ersten Weltkriegs eingestellt. Admiral Lord Fisher gelang es, den Bau als Schlachtkreuzer wiederaufzunehmen. Diese Schiffe waren der Inbegriff eines Schlachtkreuzers. Sie waren gut bewaffnet, schnell und wendig, hatten aber eine dünnere Panzerung und eine geringere Einsatzreichweite. Nur zwei der ursprünglich drei Schiffe, Repulse und Renown, wurden fertiggestellt."
 MAL_battle_cruiser_2:0 "Princess Royal-Klasse"
 MAL_battle_cruiser_2_desc:0 "Die Princess Royal war eine Klasse hypothetischer Schlachtkreuzer, die eine schnellere und günstigere Version der Schlachtschiffe der King George V-Klasse darstellten. Diese Schiffe verfügten über eine ähnliche, aber reduzierte Bewaffnung für den Überwasser- und Luftkampf: zwei 14-Zoll-Drillingskanonen und sechs 5,25-Zoll-Zwillings-Flugabwehrgeschütze. Ihre hohe Geschwindigkeit und große Reichweite würden der Royal Navy schnelle Angriffsfähigkeiten und Konvoischutz ermöglichen, ihre eingeschränkte Panzerung würde sich jedoch im Kampf gegen moderne Schlachtschiffe als problematisch erweisen."
 MAL_battleship_1:1 "Racheklasse"
 MAL_battleship_1_desc:1 "Die Schlachtschiffe der Revenge-Klasse wurden 1913 als kostengünstige Versionen der schnellen Dreadnoughts der Queen-Elizabeth-Klasse bestellt. Obwohl sie ähnlich bewaffnet und gepanzert waren, wurden sie aufgrund ihrer deutlich geringeren Geschwindigkeit im Zweiten Weltkrieg nur als Nebenschiffe eingesetzt. Von den geplanten acht Schiffen dieser Klasse wurden nur fünf fertiggestellt."
 MAL_battleship_2:0 "King George V-Klasse"
 MAL_battleship_2_desc:0 "Die Schlachtschiffe der King-George-V-Klasse waren das Ergebnis der Washingtoner Flottenverträge von 1922 und des Ersten Londoner Flottenvertrags von 1930, die die maximale Verdrängung und Artillerie von Großkampfschiffen beschränkten. Daher waren diese Schiffe mit Kanonen kleineren Kalibers ausgestattet als frühere und sogar zeitgenössische Schlachtschiffe. Trotz des geringeren Kalibers waren die Schiffe ausreichend bewaffnet, trugen starke Flugabwehrwaffen und waren ausreichend geschützt. Fünf Schiffe wurden als Ersatz für die alten Schlachtschiffe der Queen-Elizabeth-Klasse bestellt und auf Kiel gelegt."
 MAL_battleship_3:0 "Löwenklasse"
 MAL_battleship_3_desc:0 "Die Schlachtschiffe der Lion-Klasse waren die Nachfolgemodelle der King George V und übernahmen viele ihrer Merkmale. Im Rahmen des Marineprogramms von 1938 wurden sechs Schiffe bestellt, um die alternden Schlachtschiffe der Revenge-Klasse zu ersetzen. Aufgrund der ausbrechenden Feindseligkeiten wurde jedoch keines fertiggestellt. Die Schiffe sollten im Großen und Ganzen der King George-Klasse ähneln, die Hauptbewaffnung sollte jedoch schwerer sein und eine neue 16-Zoll-Kanone enthalten. Sie sollten außerdem über eine dickere Panzerung und stärkere Motoren verfügen."
 MAL_battleship_4:0 "Vanguard-Klasse"
 MAL_battleship_4_desc:0 "Das Schlachtschiff der Vanguard-Klasse war das letzte Schlachtschiff, das für die Royal Navy gebaut wurde. Es wurde nur ein einziges Schiff bestellt, vier weitere wurden jedoch für den Pazifikkrieg in Betracht gezogen. Der Bau wurde im Rahmen des Emergency War Program von 1940 in Auftrag gegeben, hatte jedoch keine hohe Priorität und wurde erst nach dem Krieg fertiggestellt. Die Klasse hatte einen schlanken Rumpf, der für ausgezeichnete Stabilität und Seetüchtigkeit sorgte. Die Bewaffnung entsprach der der Schlachtschiffe der Queen Elizabeth- und Revenge-Klasse und bot beträchtliche Feuerkraft. Starke Motoren und eine gute Panzerung machten das Schiff schnell und gut geschützt."
 MAL_SH_battleship_1:0 "Centurion-Klasse"
 MAL_SH_battleship_1_desc:0 "Die Centurion war eine Klasse hypothetischer schwerer Schlachtschiffe der Royal Navy, die als Gegenstück zu den großen Schiffen der deutschen und japanischen Marine gebaut wurden. Große 18-Zoll-Geschütze und eine dicke Panzerung verliehen dem Schiff die nötige Feuerkraft und den nötigen Schutz, um diese Schiffe zu bekämpfen. Starke Flugabwehr, große Reichweite und hohe Geschwindigkeit waren unerlässlich, um die weiten Meere des Britischen Empires zu bezwingen."
 MAL_SH_battleship_2:0 "Lion II-Klasse"
 MAL_SH_battleship_2_desc:0 "Die Schlachtschiffe der Lion-II-Klasse wurden 1944 als verbesserte Version der früheren Lion-Klasse entworfen. Die Erfahrungen aus dem Krieg wurden in diesen Entwurf einfließen gelassen, der größer und schwerer war und nach Fertigstellung entweder drei oder vier 16-Zoll-Drillingsgeschütze des neuesten Typs tragen sollte. Dicke Panzerplatten schützten das Schiff vor Angriffen von oben und aus der Luft. Die hohen Baukosten, die Niederlagen feindlicher Flotten und der Bedarf an Flugzeugträgern führten zum Abbruch des Projekts."
 MAL_carrier_1:0 "Mutige Klasse"
 MAL_carrier_1_desc:0 "Diese drei Flugzeugträger waren umgebaute Schlachtkreuzer und die ersten Flottenträger der Royal Navy. Ihr Umbau war das Ergebnis des Washingtoner Flottenabkommens von 1922 und wurde 1925 abgeschlossen. Es handelte sich um mäßig gepanzerte, aber gut bewaffnete Schiffe mit großer Reichweite und guter Geschwindigkeit, allerdings war ihre Flugzeugbesatzung aufgrund des Umbaus begrenzt. Dennoch brachten sie der Royal Navy wichtige Erfahrungen im Flugzeugträgerbau und in der Flottenluftprojektion."
 MAL_carrier_2:0 "Ark Royal-Klasse"
 MAL_carrier_2_desc:0 "Der Flugzeugträger Ark Royal war das erste Schiff dieser Art, das den Auflagen des Washingtoner Flottenabkommens entsprach. Er war das erste Schiff, bei dem Hangars und Flugdeck integraler Bestandteil des Rumpfes waren. Das 1934 entworfene Schiff war gut gepanzert und bewaffnet. Es transportierte eine große Anzahl von Flugzeugen und verfügte über ausreichend Reichweite und Geschwindigkeit, um mit den Hauptstreitkräften der Royal Navy mitzuhalten."
 MAL_carrier_3:0 "Illustre Klasse"
 MAL_carrier_3_desc:0 "Die Illustrious-Klasse wurde unter den Bedingungen des Zweiten Londoner Flottenabkommens von 1936 entworfen, das die Größe der Träger auf maximal 23.000 Tonnen begrenzte. Sie war der erste britische Träger mit einem gepanzerten Flugdeck, was die Größe der Luftgruppe reduzierte. Schwere Panzerung und Flugabwehr sorgten für eine starke Verteidigung der Schiffe, während leistungsstarke Motoren und ein großer Treibstoffvorrat den Schiffen eine große Einsatzreichweite ermöglichten. "
 MAL_carrier_4:0 "Unerbittliche Klasse"
 MAL_carrier_4_desc:0 "Die Flugzeugträger der Implacable-Klasse wurden im Rahmen des Marineprogramms von 1938 bestellt und waren im Wesentlichen verbesserte Versionen der früheren Illustrious-Klasse. Der Krieg und die Verlagerung der Priorität auf kleinere Schiffe für Konvoischutzaufgaben in der frühen und mittleren Kriegsphase verlangsamten die Reduzierung dieser Schiffe. Es handelte sich um größere Schiffe, die mehr Flugzeuge transportieren konnten und gleichzeitig eine dicke Panzerung an Rumpf und Flugdeck aufwiesen. Stärkere Motoren ermöglichten ihnen im Vergleich zur Illustrious-Klasse eine höhere Geschwindigkeit und Reichweite."
