 POR_public_works:0 "Große öffentliche Arbeiten"
 plano_centenarios:0 "Plan der Hundertjährigen"
 plano_centenarios_desc:0 "Der Plano dos Centenários war ein Plan, der die Organisation und Einrichtung aller für die Ausbildung des portugiesischen Volkes notwendigen Grundschulen umfassen sollte, sodass kein Kind mehr Zugang zu einer Schule hatte und jede Schule über ein geeignetes Gebäude und geeignete Einrichtungen für ihren Betrieb verfügte."
 plano_rodoviario:0 "Nationaler Straßenplan"
 plano_rodoviario_desc:0 "Der Staat erkennt die Bedeutung eines neuen Plano Rodoviário Nacional an, der landesweit Straßen der 1. und 2. Klasse einführen soll, die als Estradas Nacionais (EN) bezeichnet werden. Im Rahmen dieses Plans wurden in Portugal über 10.000 Kilometer Straßen gebaut."
 aproveitamentos_hidroeletricos:0 "Wasserkraftwerke"
 aproveitamentos_hidroeletricos_desc:0 "Der Bau von Wasserkraftwerken ist nicht nur zur Stromerzeugung erforderlich, sondern auch, um Wasser für Aktivitäten wie Bewässerung, menschlichen Verbrauch, industrielle Nutzung, Aquakultur und Schifffahrt bereitzustellen."
 bairro_arco_cego:0 "Sozialer Wohnungsbau von Arco do Cego"
 bairro_arco_cego_desc:0 "Arco do Cego ist ein geplantes Stadtviertel in Lissabon, das als Vorreiter des sozialen Wohnungsbaus in Portugal gilt."
 parque_florestal_monsanto:0 "Monsanto Forest Park"
 parque_florestal_monsanto_desc:0 "Der Monsanto-Waldpark ist die Lunge der portugiesischen Hauptstadt, der größte portugiesische Waldpark und einer der größten in Europa. Dank seiner dominanten Stellung in der gesamten Region verfügte Monsanto über mehrere Funkantennen."
 POR_wolfram_embargo:0 "Wolfram Embargo"
 POR_wolfram_embargo_mission:0 "Embargo erteilen"
 POR_wolfram_embargo_desc:0 "Um ihren Krieg zu gewinnen, haben die Alliierten und die Achsenmächte beschlossen, unsere Schiffe zu versenken oder uns mit Sanktionen zu drohen. Wir werden nicht stillhalten, selbst wenn das bedeutet, dass unsere Arbeiter arbeitslos werden. Ein vollständiges Embargo auf Wolfram-Exporte wird ihre Kriegsmaschinerie sicherlich etwas verlangsamen und ihnen eine Lektion erteilen."
 POR_wolfram_embargo_mission1_tt:1 "Ändern Sie das Handelsgesetz in „Geschlossene Wirtschaft“."
 POR_wolfram_embargo_mission_tt:1 "\nVerhängen Sie ein Embargo gegen alle Nationen.\n"
 POR_wolfram_embargo_mission1:0 "Embargo aufheben"
 POR_wolfram_embargo_mission12_tt:0 "Ändern Sie das Handelsgesetz in „Exportfokus“!"
 POR_wolfram_embargo_mission2_tt:0 "\nHeben Sie das Embargo für alle Nationen auf.\n"
 POR_wolfram_embargo_mission2:0 "Embargo erteilen"
 POR_wolfram_smuggling:0 "Wolfram-Schmuggel"
 POR_wolfram_smuggling_desc:0 "Es ist kein Geheimnis, dass die deutsche Kriegsmaschinerie Wolfram braucht, um effektiv zu funktionieren. Da [ENG.GetNameDef] jedes deutsche Handelsschiff an unserer Küste versenken wird, benötigt [GER.GetNameDef] dringend unsere reichlich vorhandenen Ressourcen. Wir können dabei helfen, indem wir den Schmuggel über unsere Landgrenze finanzieren."
 POR_wolfram_smuggling_mission1:0 "Schmuggel starten"
 POR_wolfram_smuggling_mission2:0 "Stoppt den Schmuggel"
 POR_wolfram_smuggling_mission1_tt:0 "Im Gegenzug wird §Y[GER.GetNameDef]§! schwere Maschinen schicken, um die Bauzeiten von §YMilitärfabriken§! zu verkürzen.\n\n"
 POR_wolfram_smuggling_mission2_tt:0 "\n§RBevorsichtig, wenn [ENG.GetNameDef] herausfindet, dass wir [GER.GetNameDef] helfen, erklären sie uns möglicherweise den Krieg.§!"
