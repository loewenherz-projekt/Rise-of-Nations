POR_jet_strat_bomber_equipment_1_desc:0 "Die Vickers-Armstrongs Valiant war ein britischer vierstrahliger Höhenbomber, der in den 1950er und 1960er Jahren Teil der nuklearen V-Bomberflotte der Royal Air Force war. Die Valiant war der erste einsatzbereite V-Bomber, gefolgt von der Handley Page Victor und der Avro Vulcan; sie war jedoch deutlich weniger fortschrittlich als ihre Gegenstücke. Mehrere Valiant wurden bald für verschiedene Unterstützungsaufgaben umgebaut, beispielsweise als Luftbetankungsflugzeuge und Aufklärungsflugzeuge."
