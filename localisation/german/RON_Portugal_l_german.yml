 #NEWS COMMIE FACTION WITH SPAIN#
 news.735.t:0 "Iberische Arbeitergewerkschaft gegründet"
 news.735.d:0 "\nPortugal und Spanien haben heute ein Abkommen zur Verteidigung gegen Imperialismus und Faschismus unterzeichnet.\n\nArbeiter auf der gesamten Halbinsel feiern dieses Abkommen, das die Förderung kommunistischer Ideale und eine Ausrichtung an der iberischen Kultur ohne Einfluss der Sowjetunion ermöglicht."
 news.735.a:0 "Arbeiter, vereinigt euch!"
 ## WOLFRAM SMUGGLING DECISIONS ##
 portugal.25.t:0 "Täusche mich einmal ..."
 portugal.25.d:0 "[ENG.GetName]-Spione haben herausgefunden, dass wir die deutsche Kriegsmaschinerie durch Wolframschmuggel unterstützen und so die englischen Kriegsanstrengungen behindern. Sie fordern uns auf, sofort damit aufzuhören, sonst..."
 portugal.25.a:0 "Oder was?"
 portugal.25.b:0 "Ok, wir werden aufhören"
 portugal.25.b_tooltip:0 "§RStoppt§! §Ywolfram§! Schmuggel\n"
 portugal.26.t:0 "Täusche mich zweimal ..."
 portugal.26.d:0 "[ENG.GetName] haben erneut festgestellt, dass wir die deutsche Kriegsmaschinerie weiterhin unterstützen. Sie haben keine andere Wahl, als uns den Krieg zu erklären."
 portugal.26.a:0 "Komm her, Bruder"
 #CARMONA TRIAL#
 portugal.29.t:0 "Óscar Carmona-Urteil"
 portugal.29.d:0 "Das portugiesische Volk wartet auf ein schnelles Urteil über Carmona, den Anführer des Staatsstreichs von 1926, der die Erste Portugiesische Republik beendete und die Nationaldiktatur einleitete."
 portugal.29.a:0 "Leichte Strafe"
 portugal.29.a_tt:0 "Carmona wird zwei Jahre später freigelassen. Nach seiner Dienstzeit könnte seine Armeeerfahrung unserem Land nützlich sein, wenn wir uns dazu entschließen.\n\n"
 portugal.29.b:0 "Harter Satz"
 portugal.29.b_tt:0 "Carmona wird den Rest seines Lebens im Gefängnis verbringen. Ein fairer Prozess für seine Verbrechen!\n\n"
 portugal.29.c:0 "Ausbürgerung"
 portugal.29.c_tt:0 "Carmona wird in ein Land unserer Wahl verbannt. Vorsicht, er wird das besagte Land beeinflussen, um wieder an die Macht zu kommen.\n\n"
 portugal.29.e:0 "Todesstrafe"
 portugal.29.e_tt:0 "Carmona wird §Ygehängt§! und zu einer bloßen §YFußnote der Geschichte§!. Dies wird auch den UN-Parteimitgliedern eine Lehre sein, sich uns nicht zu widersetzen.\n\n"
 #CARMONA OFFICER#
 portugal.30.t:0 "Óscar Carmona aus dem Gefängnis entlassen"
 portugal.30.d:0 "Vor der Revolution vom 28. Mai diente Carmona während der Ersten Republik als Kriegsminister und hatte zuvor eine militärische Karriere hinter sich."
 portugal.30.a:0 "Sein Wissen ist nützlich"
 portugal.30.b:0 "Wir brauchen ihn nicht"
 #CARMONA INFLUENCE#
 portugal.31.t:0 "Óscar Carmona wird verbannt"
 portugal.31.d:0 "In welches Land soll er verbannt werden? Wir müssen sorgfältig wählen, denn Carmona wird das Empfängerland dazu bewegen, ihn wieder an die Macht zu bringen."
 portugal.31.a:0 "[GER.GetName]"
 portugal.31.b:0 "Spanien"
