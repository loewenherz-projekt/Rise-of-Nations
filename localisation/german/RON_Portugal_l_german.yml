 blowup_suezcanal:0 "Operation Nilkrokodil"
 blowup_suezcanal_desc:0 "Wir können die Nutzung des strategisch wichtigen Suezkanals verhindern. Wir werden Vorbereitungen treffen, um den Kanal gezielt zu beschädigen und ihn so lange außer Betrieb zu halten. Dies wird die Fähigkeit des Feindes, Schiffe aus Asien und Ostafrika ins Mittelmeer zu bringen, erheblich einschränken."
 blowup_panamacanal:0 "Operation Panamahut"
 blowup_panamacanal_desc:0 "Wir können die Nutzung des strategisch wichtigen Panamakanals verhindern. Wir werden Vorbereitungen treffen, um den Kanal gezielt zu beschädigen und ihn so lange außer Betrieb zu halten. Dies wird es dem Feind erheblich erschweren, Schiffe vom Pazifik in den Atlantik und umgekehrt zu transportieren."
