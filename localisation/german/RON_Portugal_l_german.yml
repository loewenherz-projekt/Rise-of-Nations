 portugal.33.d:0 "Mit der Unterstützung des nationalistischen Spaniens werden wir stärker sein."
 portugal.33.a:0 "Großartig!"
 ###INVITE MUSSOLINI TO MED###
 portugal.34.t:0 "Einladung der Mittelmeerallianz"
 portugal.34.d:0 "Portugal lädt Sie ein, der Mittelmeerallianz beizutreten"
 portugal.34.a:0 "Ja"
 portugal.34.b:0 "Lol, nö"
 ###MUSSOLINI ACCEPTS###
 portugal.35.t:0 "Mussolini nimmt unsere Einladung an"
 portugal.35.d:0 "Italien ist für unser Bündnis von entscheidender Bedeutung, wenn es um die Kontrolle des Mittelmeers geht."
 portugal.35.a:0 "Großartig!"
 ###MUSSOLINI REFUSES###
 portugal.36.t:0 "Mussolini lehnt unsere Einladung ab"
 portugal.36.d:0 "Ohne Italien wird die Kontrolle über das Mittelmeer schwieriger, aber nicht unmöglich."
 portugal.36.a:0 "Merda!"
 ###PORTUGAL JOINS ENTENTE###
 portugal.38.t:0 "Portugal tritt der Kleinen Entente bei"
 portugal.38.d:0 "Frankreich hat unsere Hilfe angenommen, wir werden in denselben Schützengräben gegen den gemeinsamen Feind kämpfen."
 portugal.38.a:0 "Die Demokratie wird siegen!"
 #WINDSOR TREATY#
 portugal.37.t:0 "Vertrag von Windsor"
 portugal.37.d:0 "Der Vertrag von Windsor wurde 1373 von Portugal und England unterzeichnet. Er begründete die ewige Freundschaft, die Verbindung und die Allianzen zwischen unseren beiden Seefahrernationen. Im Laufe der Zeit verlor er an Bedeutung, doch das ändert sich heute..."
 portugal.37.a:0 "Niemand wird uns aufhalten!"
 portugal.37.b:0 "Wir werden Großbritannien und Deutschland folgen"
 portugal.37.c:0 "Wir haben unsere Meinung geändert"
 #REVOLT OF THE SAILORS#
 news.737.t:0 "Matrosenaufstand!"
 news.737.d:0 "Am frühen Morgen übernahmen die Matrosen mehrerer in Lissabon liegender Schiffe das Kommando über die portugiesische Marine.\n\nMit Unterstützung der Organisation der Revolutionären Streitkräfte, die enge Verbindungen zur Kommunistischen Partei Portugals unterhält, stellten sie der Regierung von Óscar Carmona ein Ultimatum. Sie forderten die diktatorische Regierung auf, ihre Arbeit sofort einzustellen und die Macht an die PCP zu übergeben, andernfalls würde es ein Blutbad geben. Während die Batterien der Schiffe auf verschiedene Regierungsgebäude gerichtet waren, beschloss Óscar Carmona zur Kapitulation.\n\nDa nun die Kommunisten das Sagen haben, liegt es an Bento Gonçalves, das Land auf einen guten Kurs zu führen."
 news.737.a:0 "Der Kommunismus wird dieses Mal funktionieren!"
 #AND AFTER GOODBYE#
 news.738.t:0 "Und nach dem Abschied"
 news.738.d:0 "Am frühen Morgen eroberte eine Gruppe von Soldaten unter der Führung von José Norton de Matos mehrere Kasernen und verhaftete zahlreiche Regimeanhänger. Óscar Carmona forderte mehrere Regimenter auf, die Kontrolle zurückzuerlangen, doch fast alle lehnten ab. Nachdem die Rebellen den wichtigsten Radiosender Portugals eingenommen hatten, appellierten sie in mehreren Nachrichten an die Bevölkerung, zu Hause zu bleiben, und forderten die regimetreuen Soldaten auf, nicht zu den Waffen zu greifen. Anschließend marschierten sie in Richtung Lissabon zum GNR-Hauptquartier, wo sich Óscar Carmona verbarrikadierte. Umzingelt, ohne Verbündete und ohne andere Wahl akzeptierte Carmona die Bedingungen von José Norton de Matos und verwandelte Portugal wieder in eine Republik."
 news.738.a:0 "Es lebe die Republik!"
 #ROLAO PRETO RETURNS#
 news.739.t:0 "Rolão Preto kehrt zurück!"
 news.739.d:0 "Francisco Rolão Preto wurde von Salazar nach Spanien verbannt, weil er vor einigen Jahren versucht hatte, das Regime zu stürzen. Als der Bürgerkrieg in Spanien ausbrach, schloss sich Rolão Preto umgehend den von Franco angeführten Falangisten an und schwor, bis zum Ende gegen den Kommunismus zu kämpfen.\n\nNach dem Ende des Bürgerkriegs sah Rolão Preto die Gelegenheit, das Regime zu stürzen, da Óscar Carmona politisch und physisch sehr geschwächt war.\n\nAn diesem Morgen überraschten die sogenannten Blauhemden mit Hilfe ihrer glühenden Anhänger Óscar Carmonas Residenz, verhafteten ihn und übernahmen die Kontrolle über Portugal."
 news.739.a:0 "Portugal wird wieder auferstehen!"
 #RPRANK SPAIN RETURN TERRITORIES#
 news.740.t:0 "Der größte Streich aller Zeiten?"
 news.740.d:0 "Heute Morgen wurden die Spanier mit einer verwirrenden Situation konfrontiert: Alle spanischen Flaggen waren durch portugiesische ersetzt worden. Diese wurden im gesamten spanischen Staatsgebiet ausgetauscht, sogar in den Kolonien.\n\nEinige Leute dachten, eine Invasion sei über Nacht erfolgt, und kauften Kabeljau, um etwaige Portugiesen zu beschwichtigen, die an ihre Tür klopfen könnten. Die spanische Regierung war von der Situation peinlich berührt und ordnete an, dass die Staatspolizei die Flaggen umgehend entfernen sollte.\n\nZum Zeitpunkt dieser Nachricht waren sie bereits alle entfernt worden. Alle? Nein. Äquatorialguinea ist völlig vergessen. Bis auf Weiteres gehört es uns."
 news.740.a:0 "Es hat sich in seiner Verwirrung selbst verletzt!"
 #WATCH THE WORLD BURN#
 news.741.t:0 "Der Tag, an dem die Erde stillstand"
 news.741.d:0 "Mehrere gewaltige Explosionen haben heute die Hauptstädte vieler Länder verwüstet, weitreichende Zerstörungen und zahllose Opfer verursacht und die politischen Führer zutiefst erschüttert.\n\nMan geht davon aus, dass diese Explosionen durch die Detonation von Atomwaffen verursacht wurden.\n\nInmitten des Chaos reagieren die angegriffenen Länder mit Krieg und geben Freunden und Feinden die Schuld.\n\nDie Welt hält den Atem an und wartet auf das, was als Nächstes passieren wird."
 news.741.a:0 "Ein Tag, den man nie vergisst"
 #CIVIL UNREST#
 portugal.39.t:0 "Faschistische Proteste"
 portugal.39.d:0 "In einer Machtdemonstration griffen faschistische Sympathisanten heute Rüstungsfabriken an und beschädigten damit vorübergehend unsere Versorgungskapazitäten für die Armee. Die GNR wurde umgehend zum Tatort gerufen, doch die Täter waren verschwunden. Nur eine Menschenmenge fand sich bald darauf wieder, die gegen die Staatspolizei protestierte."
 portugal.39.a:0 "Versuchen Sie, die Menge zu beruhigen"
 portugal.39.b:0 "Verprügeln Sie die Menge"
 portugal.39.c:0 "Überlassen Sie dies Alberto Monsaraz."
 portugal.39.e:0 "Unsere Freimaurerbrüder werden sich darum kümmern"
 portugal.40.t:0 "Demokratische Proteste"
 portugal.40.d:0 "Mithilfe korrupter Beamter stahlen demokratische Sympathisanten eine Waffenlieferung und schwächten damit unsere Truppenstärke. Die GNR aus verschiedenen Teilen des Landes wurde zum Einsatz gerufen, um die Waffen zu finden."
 portugal.40.a:0 "Untersuchen Sie korrupte Beamte"
 portugal.40.b:0 "Brechen Sie ohne Vorwarnung in die Häuser von Verdächtigen ein"
 portugal.40.e:0 "Unsere Freimaurerbrüder werden sich darum kümmern"
 portugal.40.c:0 "Lassen Sie António Sérgio sich darum kümmern"
 portugal.41.t:0 "Kommunistische Proteste"
 portugal.41.d:0 "Mit Hilfe der Gewerkschaften riefen kommunistische Sympathisanten zu einem Generalstreik auf und legten damit das Land lahm. Die größte Konzentration von Streikenden gab es in Lissabon, wo umgehend die GNR gerufen wurde, um die Situation unter Kontrolle zu bringen."
 portugal.41.a:0 "Lass sie zuschlagen"
 portugal.41.b:0 "Führen Sie ein privates Gespräch mit den Gewerkschaften"
 portugal.41.c:0 "Lassen Sie Álvaro Cunhal sich darum kümmern"
 portugal.41.e:0 "Unsere Freimaurerbrüder werden sich darum kümmern"
 #A DEAL WITH THE DEVIL#
 portugal.42.t:0 "Ein Pakt mit dem Teufel"
 portugal.42.d:0 "Carmona war politisch schwach und versuchte erfolglos, die Kontrolle über das Land zu behalten. Doch alles scheiterte. Es gibt jedoch noch eine Organisation, die um Hilfe gebeten werden kann: die portugiesische Freimaurerei. Da Carmona selbst Freimaurer war, bat er diese obskure Organisation um Hilfe, um die Ordnung wiederherzustellen."
 portugal.42.a:0 "Was könnte schiefgehen?"
 #BLOW SUEZ - MASONIC OPERATIONS#
 portugal.43.t:0 "Suezkanal gesprengt"
 portugal.43.d:0 "In einer geheimen Militäroperation, die man nur als gewagte und brillante Operation bezeichnen kann, ist es uns gelungen, die lebenswichtige Handelsader des Suezkanals zu durchtrennen."
 portugal.43.a:0 "Dies wird Auswirkungen auf die ganze Welt haben ..."
 #BLOW PANAMA - MASONIC OPERATIONS#
 portugal.44.t:0 "Panamakanal gesprengt"
 portugal.44.d:0 "In einer geheimen Militäroperation, die man nur als gewagte und brillante Operation bezeichnen kann, ist es uns gelungen, die lebenswichtige militärische Kommunikationsader, den Panamakanal, zu durchtrennen."
 portugal.44.a:0 "Pazifik und Atlantik sind erneut geteilt."
 #MONGOLIA DECLARES WAR ON ASIA - MASONIC OPERATIONS#
 portugal.45.t:0 "Lassen Sie das Erbe Dschingis Khans wieder aufleben"
 portugal.45.d:0 "Wir sollten es unbedingt tun, Bruder"
 portugal.45.a:0 "Jawohl"
