 POR_disorganized_army:0 "Desorganisierte Armee"
 POR_disorganized_army_desc:0 "Verglichen mit den modernen europäischen Armeen Frankreichs, Englands und Deutschlands erwies sich die portugiesische Armee als schwach, veraltet und desorganisiert. Um die Nation wirksam zu schützen, ist eine grundlegende Reform notwendig."
 POR_holy_see:0 "Gesetz zur Trennung von Staat und Kirche"
 POR_holy_see_desc:0 "Das Gesetz zur Trennung von Staat und Kirche wurde am 20. April 1911 von der ersten Regierung der Portugiesischen Republik erlassen. Das Vermögen der katholischen Kirche wurde verstaatlicht, und öffentliche Demonstrationen wurden überwacht. Als Reaktion darauf brach der Heilige Stuhl die diplomatischen Beziehungen zu Portugal ab. Dieses Dekret war ein Affront für die portugiesische Bevölkerung, die zu 99,9 % der katholischen Kirche angehörte."
 POR_Saeculo:0 "Saeculo Exeunte"
 POR_Saeculo_desc:0 "Saeculo exeunte ist eine Enzyklika von Papst Pius XII., in der er Portugal anlässlich seines 800-jährigen Bestehens würdigt. Ein großer Teil der Enzyklika befasst sich mit den Missionsaktivitäten Portugals und der Notwendigkeit, die Missionsarbeit zu modernisieren. Sie wurde am 13. Juni 1940 in Rom, im zweiten Jahr seines Pontifikats, verkündet."
 interchange_army_contractors:0 "Zusammenarbeit iberischer Militärfabriken"
 interchange_navy_contractors:0 "Zusammenarbeit der iberischen Marinewerften"
 interchange_building_contractors:0 "Zusammenarbeit ziviler Fabriken auf der Iberischen Halbinsel"
 POR_planocentenario_idea:0 "Plano dos Centenários"
 POR_planocentenario_idea_desc:0 "Der Plan der Hundertjährigen umfasste die Organisation und Einrichtung aller für die Ausbildung des portugiesischen Volkes notwendigen Grundschulen, sodass kein Kind mehr Zugang zu einer Schule hatte und jede Schule über ein geeignetes Gebäude und geeignete Einrichtungen für ihren Betrieb verfügte."
 POR_planorodoviario_idea:0 "Plano Rodoviário Nacional"
 POR_planorodoviario_idea_desc:0 "Der Nationale Straßenplan führte landesweit Straßen der 1. und 2. Klasse ein, die als Estradas Nacionais (EN) bezeichnet werden. Im Rahmen dieses Plans wurden in Portugal mehr als 10.000 km Straßen gebaut."
