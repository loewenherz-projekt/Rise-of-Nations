 POR_salazar:0 "Präsident António Salazar"
 POR_salazar_desc:0 "António de Oliveira Salazar war von 1932 bis 1968 Ministerpräsident Portugals. Er war verantwortlich für den Estado Novo, die korporatistische autoritäre Regierung, die Portugal bis 1974 regierte. Er war in der Bevölkerung sehr beliebt und es ist möglich, dass er Unterstützung für das Amt des portugiesischen Präsidenten hatte."
 estado_novo:0 "Estado Novo"
 estado_novo_desc:0 "Der Neue Staat war das 1933 in Portugal eingesetzte korporatistische autoritäre Regime, das als faschistisch galt. Es war stark von konservativen und autoritären Ideologien inspiriert und wurde von António de Oliveira Salazar entwickelt. Es wandte sich gegen Kommunismus, Sozialismus, Anarchismus, Liberalismus, Nationalsozialismus und Antikolonialismus. Das Regime war korporatistisch, konservativ und nationalistisch geprägt und verteidigte Portugal als katholischen Staat."
 estado_novo2:0 "Estado Novo"
 estado_novo2_desc:0 "Der Neue Staat war das 1933 in Portugal eingesetzte korporatistische autoritäre Regime, das als faschistisch galt. Es war stark von konservativen und autoritären Ideologien inspiriert und wurde von António de Oliveira Salazar entwickelt. Es wandte sich gegen Kommunismus, Sozialismus, Anarchismus, Liberalismus, Nationalsozialismus und Antikolonialismus. Das Regime war korporatistisch, konservativ und nationalistisch geprägt und verteidigte Portugal als katholischen Staat."
