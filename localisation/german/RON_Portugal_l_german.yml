 #Spanish Civil War Aid
 portugal.28.t:0 "Hilfe im Spanischen Bürgerkrieg"
 portugal.28.d:0 "Die spanische Regierung ist implodiert, was zu einem Bürgerkrieg geführt hat! Wir können entweder den Falangisten oder den Rojos helfen, aber sollten wir das?"
 portugal.28.a:0 "Helfen Sie dem nationalistischen Spanien"
 portugal.28.b:0 "Helfen Sie dem republikanischen Spanien"
 portugal.28.c:0 "Lass sie sich umbringen"
 #Salazar Assassination Attempt
 portugal.13.t:0 "Eine unvergessliche Messe"
 portugal.13.d:0 "Am Sonntag war Salazar auf dem Weg zur Messe in einer privaten Kapelle im Haus eines Freundes in der Barbosa du Bocage Avenue in Lissabon"
 portugal.13.a:0 "Salazar kommt planmäßig an"
 portugal.13.a_tooltip:0 "Eine Bombe explodiert und §YSalazar§! wird §RTötet§!"
 portugal.13.b:0 "Salazar kommt früh"
 portugal.13.b_tooltip:0 "Eine Bombe explodiert und nur der §YFahrer§! erleidet §RVerletzungen§!, §YSalazar§! bleibt verschont."
 portugal.13.c:0 "Salazar verzichtet auf den Fahrer"
 portugal.13.c_tooltip:0 "Eine Bombe explodiert und §YSalazar§! erleidet §RVerletzungen§!"
 # Salazar dies
 news.724.t:0 "Premierminister Salazar ermordet"
 news.724.d:0 "\nPremierminister Salazar wurde heute ermordet. Ein großer Teil der portugiesischen Bevölkerung trauert um den Tod des bedeutendsten Premierministers seit der Gründung der Republik.\n\nSeine Feinde hingegen feiern. Um diese Machtlücke zu füllen, hatte Präsident Oscar Carmonar keine andere Wahl, als sich selbst zum Premierminister zu ernennen.\n\nWie lange wird das noch so bleiben?"
 news.724.a:0 "Ruhe in Frieden."
 # Salazar unharmed
 news.725.t:0 "Gescheiterter Attentat auf Premierminister Salazar"
 news.725.d:0 "\nPremierminister Salazar überlebte heute einen Attentat! Als er aus seiner Buick-Limousine stieg, explodierte nur drei Meter entfernt eine versteckte Bombe.\n\nSalazar blieb von der Explosion verschont, sein Chauffeur jedoch ertaub.\n\nDie Bischöfe im ganzen Land argumentierten, es sei eine „höhere Gewalt“ gewesen, die Salazars Leben gerettet habe.\n\nDer Dienstwagen wurde durch einen gepanzerten Chrysler Imperial ersetzt."
 news.725.a:0 "Er wird von Gott beschützt."
 # Salazar wounded
 news.726.t:0 "Premierminister Salazar bei einem Attentat verletzt"
 news.726.d:0 "\nPremierminister Salazar überlebte heute einen Mordanschlag! Als er aus seiner Buick-Limousine stieg, explodierte nur drei Meter entfernt eine versteckte Bombe.\n\nSalazar, der Fahrer, wurde durch die Druckwelle leicht verletzt.\n\nEr wurde ins Krankenhaus gebracht, wo er voraussichtlich für unbestimmte Zeit bleiben wird."
 news.726.a:0 "Hoffen wir, dass er sich schnell erholt."
 # Salazar Dilemma
 portugal.14.t:0 "Was zu tun?"
 portugal.14.d:0 "Während er sich im Krankenhaus erholt, gehen Salazars Gedanken um. „Steckt Carmona hinter dem Anschlag?“ „Was ist, wenn sie das nächste Mal Erfolg haben?“ „Ist es zu gefährlich, in Portugal zu bleiben?“ „Soll ich fliehen? Und wenn ja, wer würde das Land führen?“"
 portugal.14.a:0 "Schuld ist Oscar Carmona"
 portugal.14.a_tooltip:0 "§YSalazar§! macht §YCarmona§! für das Attentat verantwortlich.\n\n§YCarmona§! wird ins Exil geschickt und §YSalazar§! wird Präsident und Premierminister von §YPortugal§!"
 portugal.14.b:0 "Suchen Sie Hilfe bei Integralisten"
 portugal.14.b_tooltip:0 "§YSalazar§! flieht aus dem Land, jedoch nicht ohne vorher ein privates Gespräch mit dem Führer der §YIntegralisten§! zu führen.\n\n§YUnião Nacional§! wird in §YIntegralismo Lusitano§! umbenannt und §YDuarte Nuno§! wird Parteiführer. "
 #Oscar carmona#
 news.704.t:0 "Präsident Óscar Carmona dankt ab!"
 news.704.desc:0 "Unter dem Druck der Verdächtigungen Salazars sah Präsident Óscar Carmona keine andere Wahl, als seine Abdankung bekannt zu geben und zu unterzeichnen. António Salazar ist nun sowohl Präsident als auch Premierminister Portugals.\n\nNach seiner Abdankung scheint Óscar Carmona verschwunden zu sein, und viele fragen sich, ob er ins Exil floh oder von der politischen Polizei gefasst und entsprechend behandelt wurde."
 news.704.a:0 "Auf Nimmerwiedersehen."
 news.704.b:0 "Amüsant."
 #Salazar flees#
 news.728.t:0 "Salazar flieht aus dem Land!"
 news.728.d:0 "Aus Angst vor dem Attentat floh Salazar aus dem Land.\n\nAntónio Salazar wollte weder einen Bürgerkrieg auslösen noch die Kontrolle über das Land aufgrund dieses Machtvakuums Staatsfeinden überlassen. Am Tag vor seiner Flucht führte er ein privates Gespräch mit dem Anführer der Integralisten. Duarte Nuno wird als Premierminister die Kontrolle über das Land übernehmen."
 news.728.a:0 "Duarte Nuno wird die Moral des Landes wiederherstellen."
 # Protection from SOV
 portugal.1.t:0 "Portugal bittet um Schutz"
 portugal.1.d:0 "Da Portugal nun kommunistisch ist, ist es sinnvoll, eine Basis in Westeuropa zu haben."
 portugal.1.a:0 "Gewähren Sie ihnen Schutz im Austausch für militärischen Zugang"
 # Protection from ENG
 portugal.16.t:0 "Portugal ehrt das alte Bündnis"
 portugal.16.d:0 "Da Portugal nun den Vertrag von Windsor einhält, verpflichtet es sich, sie zu schützen, um eine sichere Basis in Westeuropa zu haben."
 portugal.16.a:0 "Geben Sie ihnen Schutz"
 # Braganza invitation - fascists
 portugal.15.t:0 "Überarbeitung der Verfassung"
 portugal.15.d:0 "Da das Land nun unter der Kontrolle der MNS steht, müssen wir entscheiden, ob wir Duarte Nuno als König von Portugal wieder einsetzen oder die Monarchie hinter uns lassen und Rolão Preto die totale Kontrolle über Portugal geben wollen."
 portugal.15.a:0 "Totale Kontrolle für Rolão Preto"
 portugal.15.a_tooltip:0 "„Rolão Preto“ übernimmt die totale Kontrolle über Portugal und wird zu einem weiteren „Diktator“ in der Geschichte unseres Landes."
 portugal.15.b:0 "Bringe den Monarchen zurück"
 portugal.15.b_tooltip:0 "§YDuarte Nuno§! wird König von Portugal und stellt die Monarchie wieder her, allerdings mit §Yeingeschränkten§! Befugnissen\n\n"
 # Changing GNR or not - Monarchy#
 portugal.2.t:0 "Wiederherstellung der Royal Police Guard"
 portugal.2.d:0 "Da Portugal nun wieder eine Monarchie ist, macht es keinen Sinn mehr, eine „Republikanische“ Garde zu behalten. Die Guarda Real da Polícia wird als Divisionsvorlage verfügbar sein."
 portugal.2.a:0 "GNR automatisch löschen"
 portugal.2.a_tooltip:0 "§YGNR§! Vorlage §Rwird gelöscht§! und 8 §YGRP§! Divisionen werden in der Nähe von Lissabon aufgestellt.\n"
 portugal.2.b:0 "GNR manuell löschen"
 portugal.2.b_tooltip:0 "Die Vorlage §YGNR§! wird nicht gelöscht. Sie müssen die Divisionsvorlage manuell löschen oder ändern. Es werden keine §YGRP§! Divisionen erstellt.\n"
 # Changing GNR or not - Freemasonry#
 portugal.46.t:0 "Republikanische Polizei ersetzen"
 portugal.46.d:0 "Da Portugal nun aufgeklärt ist, macht es keinen Sinn mehr, eine „Republikanische“ Garde zu behalten. Der Ordem Fraternal da Polícia wird als Divisionsvorlage zur Verfügung stehen."
 portugal.46.a:0 "GNR automatisch löschen"
 portugal.46.a_tooltip:0 "§YGNR§! Vorlage §Rwird gelöscht§! und 8 §YOFP§! Divisionen werden in der Nähe von Lissabon aufgestellt.\n"
 portugal.46.b:0 "GNR manuell löschen"
 portugal.46.b_tooltip:0 "§YGNR§! Vorlage §Rwird nicht gelöscht§!. Sie müssen die Divisionsvorlage manuell löschen oder ändern. Es werden keine §YOFP§! Divisionen erstellt.\n"
 #Nat Spain join Axis#
 portugal.3.t:0 "Das nationalistische Spanien schließt sich den Achsenmächten an!"
 portugal.3.d:0 "Francisco Franco unterzeichnete heute ein Abkommen mit Hitler, das Spanien zu einem Mitglied der Achsenmächte macht. Der Krieg kann jederzeit auf unsere Halbinsel übergreifen! Das ist ein großes Dilemma für unser Land."
 portugal.3.a:0 "Wir müssen uns den Alliierten anschließen!"
 portugal.3.a_tooltip:0 "Wir müssen das älteste Bündnis der Welt ehren, damit wir unsere Kolonien nicht verlieren.\n\n"
 portugal.3.b:0 "Wir müssen uns der Achse anschließen!"
 portugal.3.b_tooltip:0 "Lasst uns Rache an der rosa Karte nehmen ... damit wir unser Land nicht verlieren.\n\n"
 portugal.3.c:0 "Bleiben Sie neutral."
 #GALIZA REFEREDUM NEWS - PORTUGAL#
 news.730.t:0 "Galicien hat mit Ja dafür gestimmt, Teil Portugals zu werden!"
 news.730.d:0 "\nDie Mehrheit der galicischen Bevölkerung hat dem Vorschlag, Teil Portugals zu werden, zugestimmt. Unser Land erkennt die Rechtmäßigkeit des Referendums an und befürwortet die baldige Eingliederung der Region in Portugal.\n\nDie Frage ist, ob die spanische Regierung dieses Ergebnis akzeptiert oder nicht."
 news.730.a:0 "Großartig!"
 #GALIZA REFEREDUM NEWS - SPAIN#
 news.731.t:0 "Ergebnisse des Referendums"
 news.731.d:0 "Galizien stimmte mit Ja"
 news.731.a:0 "Wir werden sehen,"
 #GALIZA REFERENDUM - CHOICE#
 portugal.17.t:0 "Spanien weigert sich, das Referendum anzuerkennen!"
 portugal.17.d:0 "Obwohl die Mehrheit der Galicier für eine Integration mit Portugal gestimmt hatte, weigerte sich [From.GetLeader], das Referendum anzuerkennen, da es stark von uns beeinflusst worden sei."
 portugal.17.a:0 "Bleiben Sie standhaft beim Ergebnis des Referendums.\nGalicien ist jetzt Teil Portugals!"
 portugal.17.b:0 "Vermeiden Sie einen Krieg, indem Sie Galicien gegen Ceuta eintauschen und so dieses Referendum ignorieren."
 portugal.17.c:0 "Es ist eine gute Ausrede, auch Ceuta einzunehmen.\nSpanien wird diese Ablehnung bereuen!"
 #SPAIN SURRENDERS - GALIZA REFERENDUM OR DEMAND CEUTA#
 portugal.18.t:0 "Spanien bietet Frieden!"
 portugal.18.d:0 "Spanische Politiker haben uns ein Friedensangebot unterbreitet. Sie werden unsere Forderungen akzeptieren, wenn im Gegenzug die Feindseligkeiten sofort eingestellt werden."
 portugal.18.a:0 "Der Krieg ist gewonnen."
 portugal.18.b:0 "Wir werden nur mit einem totalen Sieg zufrieden sein!"
 portugal.18.b_tooltip:0 "Setzen Sie den Krieg gegen „Spanien“ fort!"
 #PORTUGUESE ULTIMATUM#
 news.732.t:0 "Portugiesisches Ultimatum"
 news.732.d:0 "Portugal stellt ein Ultimatum für die Kontrolle von Rhodesien, Malawi und Sambia. Wenn wir Portugal aus dem Krieg heraushalten wollen, ist es am besten, den Bedingungen zuzustimmen."
 news.732.a:0 "Wir haben keine Wahl"
 #USA PACT#
 portugal.9.t:0 "Portugiesische Botschafter"
 portugal.9.d:0 "Portugiesische Botschafter in Washington, was tun?"
 portugal.9.a:0 "Portugal und Spanien sind gemeinsam sehr stark"
 portugal.9.b:0 "Portugal ist allein stark"
 portugal.9.c:0 "Portugal ist schwach"
 ## US SCARED ##
 news.713.t:0 "USA überzeugt, alle südamerikanischen Garantien aufzuheben"
 news.713.d:0 "\nDas Aufkommen einer neuen Fraktion, bestehend aus dem Königreich Portugal und dem Königreich Spanien, veranlasste [USA.GetLeader], alle Garantien in Südamerika aufzuheben, um nicht in einen Krieg hineingezogen zu werden, der letztendlich zur Reconquista Südamerikas durch die Iberische Halbinsel führen würde. Er lehnte jedoch jegliche Präsenz unserer Armeen in Mittelamerika ab, hielt sich aber weiterhin an die Garantien.\n\nDie südamerikanischen Länder protestierten gegen diese Entscheidung und gründeten eine Fraktion, um den portugiesischen und spanischen Kontrollversuchen entgegenzuwirken."
 news.713.a:0 "Unser Plan läuft großartig."
 ## US AMAZED ##
 news.714.t:0 "USA erkennen, dass Portugal nicht so schwach ist, wie es aussieht"
 news.714.d:0 "\nNachdem die Spanier von Portugal gedemütigt wurden, erkennt [USA.GetLeader], dass Portugal nicht so schwach ist, wie es scheint.\n\nNach langen und zähen Verhandlungen stimmten die USA zu, lediglich die Garantie von Brasilien und Uruguay aufzuheben.\n\nTrotz der Proteste der brasilianischen und uruguayischen Regierung gegen diese Situation beschlossen sie, sich auf einen möglichen Krieg mit Portugal vorzubereiten."
 news.714.a:0 "Wir sollten diese Chance nicht verstreichen lassen."
 ## US LAUGHS - DEACTIVATED (iberian pact) ##
 news.715.t:0 "USA lachen über unseren Vorschlag"
 news.715.d:0 "\nAngesichts der geringen Größe und Bedeutung unseres Landes weigerte sich [USA.GetLeader], jegliche Garantien zu übernehmen.\n\nPortugal vermutet, dass diese Weigerung auf Sabotage unserer Delegation durch die spanische Regierung zurückzuführen ist. Da wir neutral sind und bereits einen Nichtangriffspakt mit Spanien haben, haben wir jedoch keine Chance, die Situation zu ändern. Sofern Spanien nicht den Achsenmächten beitritt...\n\nBrasilien und andere südamerikanische Länder können aufatmen, da sie wissen, dass sie bei einer möglichen Reconquista nicht im Stich gelassen werden."
 news.715.a:0 "Das werden wir nicht vergessen."
 #Demand Ceuta#
 portugal.10.t:0 "Portugal fordert Ceuta"
 portugal.10.d:0 "Am 1. Januar 1668 wurde die Region Ceuta an Spanien übergeben, um die Souveränität Portugals anzuerkennen. Während des Bürgerkriegs bot Portugal Freiwillige an, für die nationalistische Sache zu kämpfen. Obwohl ideologische Motive im Vordergrund standen, hatte Portugal auch ein strategisches Interesse am Ausgang.\n\nNun hat [From.GetLeader] vorgeschlagen, die Region wieder unter portugiesische Kontrolle zu stellen."
 portugal.10.a:0 "Lassen Sie die Portugiesen bekommen, was sie verdienen."
 portugal.10.b:0 "Wir haben diesen Krieg nicht gewonnen, um uns ausländischen Forderungen zu beugen!"
 portugal.11.t:0 "Spanien gibt Ceuta auf"
 portugal.11.d:0 "Aus Dankbarkeit für unsere Unterstützung und Verteidigung der faschistischen Sache während des Spanischen Bürgerkriegs hat [From.GetLeader] zugestimmt, die Region Ceuta zurückzugeben. Diese Region und ihre Häfen gelten als strategisch wichtig und sind eine willkommene Ergänzung unseres Reiches. Es scheint, als ob die Spanier die Schulden nun als getilgt betrachten."
 portugal.11.a:0 "Solange sie uns als rechtmäßige Eigentümer anerkennen."
 portugal.12.t:0 "Spanien weigert sich, Ceuta aufzugeben"
 portugal.12.d:0 "Trotz vieler friedlicher Gespräche zwischen unseren Ministern weigerte sich [From.GetLeader], uns Ceuta zu überlassen, das einst Teil unseres Imperiums war. Ceuta ist ein strategisches Gebiet, das an uns zurückgegeben werden sollte."
 portugal.12.a:0 "Planen Sie sorgfältig ..."
 portugal.12.a_tooltip:0 "Vielleicht müssen wir einfach auf den richtigen Moment warten"
 portugal.12.b:0 "Dann ist es Krieg!"
 portugal.12.b_tooltip:0 "Nimm, was dir rechtmäßig zusteht\n"
 #PORTUGUESE ULTIMATUM#
 news.733.t:0 "Portugal fordert Kleine Sundainseln und Molluken"
 news.733.d:0 "Angesichts der guten Leistung Portugals gegen Spanien ist es für uns das Beste, dieser Forderung nachzukommen."
 news.733.a:0 "Wir haben keine Wahl"
 #Changing ceuta name#
 portugal.8.t:0 "Zu Ende bringen, was John I begonnen hat!"
 portugal.8.d:0 "\nAm Morgen des 21. August 1415 führte König Johann I. von Portugal seine Söhne und ihre versammelten Streitkräfte in einen Überraschungsangriff, der als Eroberung Ceutas bekannt wurde und einen wichtigen Schritt in der Entstehung des portugiesischen Reiches in Afrika darstellt.\n\nDies war die einzige portugiesische Stadt, die nach dem Restaurationskrieg von 1640 auf der Seite Spaniens stand. Durch den Vertrag von Lissabon wurde sie offiziell an König Karl II. von Spanien abgetreten.\n\n300 Jahre später wurde Ceuta wieder Teil unseres Territoriums!"
 portugal.8.a:0 "Ceuta gehört uns!"
 #Changing uruguai name#
 news.718.t:0 "Cisplatina erneut erobert!"
 news.718.d:0 "\nDie Provinz Cisplatina war eine luso-brasilianische Provinz, die von 1815 bis 1822 existierte und durch die Annexion der Provinz Oriental entstand, die Gebiete östlich des Uruguay-Flusses und nördlich des Río de la Plata umfasste.\n\nNach der Unabhängigkeit Brasiliens und der Gründung des brasilianischen Kaiserreichs blieb die Provinz Cisplatina Teil davon.\n\nIm Jahr 1828, nach vielen Sezessionsaufständen, wurde die Provinz Cisplatina nach dem Vertrag von Montevideo als Uruguay unabhängig.\n\nHeute ist Cisplatina wieder Teil unseres wachsenden Kaiserreichs!"
 news.718.a:0 "Willkommen zurück!"
 #Changing moluccas name#
 news.719.t:0 "Vertrag von Haag überarbeitet!"
 news.719.d:0 "\nDer Vertrag von Den Haag von 1641 war ein zehnjähriger Waffenstillstand zwischen der niederländischen Republik und dem Königreich Portugal.\n\nDer Waffenstillstand, der ursprünglich für alle Gebiete der beiden Reiche gelten sollte, beschränkte sich in der Praxis auf den europäischen Kontinent, die Kolonien blieben vom Vertrag ausgeschlossen. Aus diesem Grund nutzte die Niederländische Indienkompanie die Gelegenheit, die Molukken und die Kleine Sundainseln zu erobern.\n\nMit der Rückgabe dieser Gebiete unter unsere Kontrolle rächten wir uns für die niederländischen Verrätereien von einst!"
 news.719.a:0 "Rache ist ein Gericht, das am besten kalt serviert wird."
 #Brazil is ours#
 news.720.t:0 "Brasilien neu entdeckt!"
 news.720.d:0 "\nDas Kronjuwel unseres Reiches wurde am 22. April 1500 von Portugal beansprucht, als der Seefahrer Pedro Álvares Cabral an seiner Küste landete.\n\nPedro I. erklärte im September 1822 Brasiliens Unabhängigkeit von Portugal und gründete das Kaiserreich Brasilien, eine konstitutionelle Monarchie. Der Unabhängigkeitskrieg wurde im ganzen Land geführt. Die letzten portugiesischen Soldaten ergaben sich 1824, und die Unabhängigkeit wurde 1825 von Portugal anerkannt.\n\n[Root.GetLeader] trat in die Fußstapfen von Pedro Álvares Cabral und gab brasilianische Gebiete an unser Reich zurück!"
 news.720.a:0 "Farbton!"
 #Pink Map is ours#
 news.721.t:0 "Rache der rosa Karte!"
 news.721.d:0 "\nDie Pink Map war ein Dokument aus dem Jahr 1885, das Portugals Anspruch auf Souveränität über einen Landkorridor zwischen Angola und Mosambik bekräftigte.\n\nDie Briten lehnten die Annahme ab, weil sie vom Bau einer transkontinentalen Eisenbahn vom Kap nach Kairo träumten. Das britische Ultimatum von 1890 beendete unsere Ansprüche auf Grundlage historischer Entdeckungen und jüngster Erkundungen. Es war wahrscheinlich der demütigendste Moment in der Geschichte unseres Landes.\n\nHeute verkündete [Root.GetLeader], dass dieser Moment der Geschichte angehört, denn die Pink Map ist kein Traum, sondern Realität!"
 news.721.a:0 "Großartig!"
 #Ceylon is ours#
 news.722.t:0 "Ceylon gehört uns!"
 news.722.d:0 "\nCeylon wurde 1505 entdeckt und war zwischen dem portugiesischen Reich und den Singhalesen aufgeteilt. Die Insel erregte die Aufmerksamkeit der Niederländischen Republik, als sie vom singhalesischen König zum Kampf gegen uns eingeladen wurde. Bald darauf wurde die niederländische Herrschaft über weite Teile der Insel durchgesetzt.\n\nIm späten 18. Jahrhundert wurden die Niederländer, geschwächt durch ihre Kriege gegen Großbritannien, von Napoleons Frankreich erobert. Da sie die Insel nicht mehr effektiv regieren konnten, übergaben sie die Herrschaft an die Briten.\n\nDa wir als Erste die Kontrolle über die Insel beanspruchten, ist es nur fair, dass Ceylon in unsere Hände fällt!"
 news.722.a:0 "Exzellent!"
 #Spain accepts monarchic support#
 portugal.22.t:0 "Monarchische Unterstützung durch das Königreich Portugal"
 portugal.22.d:0 "\nWie schlimm kann das für uns sein?"
 portugal.22.a:0 "Lass es uns tun."
 #portugal news event - Spain accepts monarchism support#
 news.709.t:0 "Spanische Royalisten akzeptieren unsere Unterstützung"
 news.709.d:0 "\nDie spanischen Royalisten akzeptieren unseren Vorschlag, ihnen bei der Wiederherstellung der Monarchie zu helfen, indem sie Alfons XIII. nach seiner Rückkehr aus dem Exil als König von Spanien anerkennen.\n\nSie werden diese Ideen überall in Spanien verbreiten und auch militärische Unterstützung sammeln, für den Fall, dass Madrid sich weigert, zu einem Königreich zurückzukehren."
 news.709.a:0 "Unser Plan läuft großartig."
 #Spain returns king#
 portugal.23.t:0 "König Alfons XIII. kehrt aus dem Exil zurück"
 portugal.23.d:0 "Es ist kein Geheimnis, dass Portugal hinter dem jüngsten Anstieg der monarchistischen Sympathien in Spanien steckt. Ein portugiesischer Diplomat traf heute Morgen ein und bot uns eine Einladung zu seiner Fraktion an. Würden wir die Einladung annehmen, wäre König Alfons XIII. de facto der Herrscher Spaniens. Doch selbst wenn wir ablehnen, werden die Monarchisten das wohl nicht auf die leichte Schulter nehmen … "
 portugal.23.a:0 "Das ist überhaupt nicht verrückt."
 portugal.23.b:0 "Das ist Wahnsinn!"
 #portugal news event - Spain returns king - YES#
 news.710.t:0 "Alfons XIII. wird als König von Spanien anerkannt"
 news.710.d:0 "\nHeute früh kehrte Alfonso aus dem Exil zurück, das ihm die spanischen Republikaner auferlegt hatten. Ermüdet von den Versäumnissen der vorherigen Regierung, gingen viele hinaus, um dem König ihre Unterstützung zu bekunden.\n\nDa unsere spanischen Brüder nun wie wir eine Monarchie besitzen, können wir unsere Kräfte bündeln und unsere Kolonialreiche wiederherstellen."
 news.710.a:0 "Exzellent!"
 #portugal news event - Spain returns king - NO#
 news.711.t:0 "Alfons XIII. wird nicht als König von Spanien akzeptiert"
 news.711.d:0 "\nMadrid weigerte sich, Alfons XIII. aus dem Exil zurückzuholen.\n\nKönig Duarte akzeptierte dies nicht und beauftragte die Geheimpolizei, Alfons aus dem Exil zurückzuholen. Der abgesetzte König landete heimlich in Barcelona, versammelte Royalisten aus ganz Nordspanien und befahl ihnen, zu den Waffen zu greifen und einen Bürgerkrieg anzuzetteln.\n\nWenn wir wollen, dass Alfons erneut zum König von Spanien gekrönt wird, haben wir keine andere Wahl, als ihn in diesem Krieg zu unterstützen."
 news.711.a:0 "Überzeugen wir sie mit Gewalt!"
 #portugal news event - Spain wins civial war v2#
 news.717.t:0 "Ein weiterer spanischer Bürgerkrieg vorbei"
 news.717.d:0 "\nErfolg! Wir haben den spanischen Thron an König Alfons XIII. zurückgegeben!\n\nUnsere Länder sind nun bereit, erneut Geschichte zu schreiben, indem sie ihre Kräfte bündeln und unsere Kolonialreiche wieder aufbauen!"
 news.717.a:0 "Exzellent!"
 #Luso pact#
 portugal.7.t:0 "Iberischer Pakt"
 portugal.7.d:0 "Das portugiesische Außenministerium hat einen Nichtangriffspakt zwischen unseren beiden Nationen vorgeschlagen. Dieser Vertrag wird unseren gegenseitigen Handel und die allgemeine Verteidigung der Iberischen Halbinsel erheblich verbessern."
 portugal.7.a:0 "Nur ein Narr würde das nicht akzeptieren."
 #Spain accepts luso pact#
 news.712.t:0 "Spanien unterzeichnet den Iberischen Pakt"
 news.712.d:0 "\nSpanien hat sich bereit erklärt, unseren Nichtangriffspakt zu unterzeichnen! Das bedeutet, dass ein Krieg zwischen unseren Ländern in weite Ferne rückt. Aber wird er lange dauern? Es ist besser, die Grenze nicht schlecht zu bewachen ..."
 news.712.a:0 "Exzellent."
 #Spain accepts interchange#
 portugal.4.t:0 "Einladung zur Branchenkooperation"
 portugal.4.d:0 "Können unsere Ingenieure Ideen mit ihren portugiesischen Kollegen austauschen?"
 portugal.4.a:0 "Absolut!"
 #Portugal chooses wich intergange#
 portugal.5.t:0 "Spanien akzeptiert Industriekooperation"
 portugal.5.d:0 "Unser Hauptaugenmerk sollte auf ... liegen."
 portugal.5.a:0 "Militärfabriken"
 portugal.5.b:0 "Marinewerften"
 portugal.5.c:0 "Zivile Fabriken"
 #Duarte Returns#
 news.716.t:0 "Duarte Nuno stellt die Monarchie wieder her"
 news.716.d:0 "\nFreut euch! Herzog Duarte wird zum D. Duarte I. gekrönt, dem unangefochtenen König des Königreichs Portugal.\n\nDie Zeit der gescheiterten Portugiesischen Republik ist endlich vorbei! Jetzt ist es an der Zeit, den Ruhm des Königreichs wiederherzustellen, der in den letzten Jahren durch republikanische Verräter verloren ging."
 news.716.a:0 "Es lebe der König!"
 #Duarte Returns - FASCISM#
 news.729.t:0 "Duarte Nuno kehrt nach Portugal zurück"
 news.729.d:0 "\nMit der Unterstützung von Francisco Rolão Preto wird Herzog Duarte zum König von Portugal gekrönt. Jetzt ist es an der Zeit, den Ruhm des Königreichs wiederherzustellen, der in den letzten Jahren durch Verräter verloren ging.\n\nDas portugiesische Reich wird wieder auferstehen!"
 news.729.a:0 "Es lebe der König!"
 #Ibe union - deactivated #
 news.705.t:0 "Vereinigung der Iberischen Halbinsel"
 news.705.d:0 "Mit Waffengewalt hat [From.GetOldName] die iberischen Völker unter seiner Herrschaft vereint, und seine Regierung integriert nun die neu eroberten Gebiete. Um die Bevölkerung hinter dem Staat zu vereinen, verstärkte sich die pannationalistische Propaganda mit klarer Unterstützung der Regierung.\n\nAls Nebeneffekt verweisen Befürworter einer iberischen Vereinigung bereits auf historische Parallelen und betonen, dass die aktuelle Lage lediglich als natürliche Fortsetzung früherer Versuche zur Vereinigung der Region angesehen werden könne. Ein [From.GetOldAdjective]-Beamter wurde mit den Worten zitiert: „Beide Länder haben sich schon immer stark verbunden gefühlt. Ihre Vereinigung ist nur natürlich, insbesondere angesichts der Bedrohungen an unseren Grenzen. Nur wenn unsere Völker zusammenstehen, können sie unabhängig und frei bleiben.“ Sie proklamierten daher nun die „wahre iberische Einheit“ und benannten das Land in „[From.GetNameDef]“ um."
 news.705.a:0 "Ein herrlicher Tag für alle Iberer!"
 news.705.b:0 "Gemeinsam ist die Iberische Halbinsel stärker."
 news.705.c:0 "Es wird nicht lange dauern!"
 #IUKPBA FORMATION#
 news.734.t:0 "Neugründung des Vereinigten Königreichs von Portugal, Brasilien und den Algarven"
 news.734.d:0 "\nMit Waffengewalt hat Portugal Brasilien und Uruguay unter seiner Herrschaft wiedervereinigt, und seine Regierung integriert nun die neu eroberten Gebiete.\n\nUm die Bevölkerung hinter dem Staat zu vereinen, wurde die Propaganda für einen Plurikontinentalismus mit klarer Unterstützung der Regierung verstärkt.\n\nDas alte Königreich wird nun als Vereinigtes Königreich von Portugal, Brasilien und den Algarven bekannt sein."
 news.734.a:0 "Ein herrlicher Tag!"
