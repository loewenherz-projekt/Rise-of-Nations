 POR_legiaopt:0 "Legião Portuguesa"
 POR_legiaopt_desc:0 "Die Portugiesische Legion war eine paramilitärische Staatsorganisation Portugals, die 1936 während des Estado Novo gegründet wurde. Ihre erklärten Ziele waren die „Verteidigung des geistigen Erbes Portugals“ und der „Kampf gegen die kommunistische Bedrohung und den Anarchismus“."
