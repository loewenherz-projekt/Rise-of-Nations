 POR_oscar_carmona:0 "Präsident Óscar Carmona"
 POR_oscar_carmona_desc:0 "Carmona war Republikaner und Freimaurer und unterstützte die Ausrufung der Ersten Portugiesischen Republik am 5. Oktober 1910. Er war jedoch nie ein Anhänger der demokratischen Regierungsform. Nach einem Putsch ernannte er sich 1926 selbst zum Präsidenten und übernahm sofort diktatorische Machtbefugnisse. 1928 wurde er als einziger Kandidat offiziell in das Amt gewählt."
 POR_oscar_carmona1:0 "Präsident Óscar Carmona"
 POR_oscar_carmona1_desc:0 "Carmona war Republikaner und Freimaurer und unterstützte die Ausrufung der Ersten Portugiesischen Republik am 5. Oktober 1910. Er war jedoch nie ein Anhänger der demokratischen Regierungsform. Nach einem Putsch ernannte er sich 1926 selbst zum Präsidenten und übernahm sofort diktatorische Machtbefugnisse. 1928 wurde er als einziger Kandidat offiziell in das Amt gewählt."
 POR_oscar_carmona3:0 "Präsident Óscar Carmona"
 POR_oscar_carmona3_desc:0 "Carmona war Republikaner und Freimaurer und unterstützte die Ausrufung der Ersten Portugiesischen Republik am 5. Oktober 1910. Er war jedoch nie ein Anhänger der demokratischen Regierungsform. Nach einem Putsch ernannte er sich 1926 selbst zum Präsidenten und übernahm sofort diktatorische Machtbefugnisse. 1928 wurde er als einziger Kandidat offiziell in das Amt gewählt."
 POR_oscar_carmona2:0 "Professor Óscar Carmona"
 POR_oscar_carmona2_desc:0 "Vor der Revolution vom 28. Mai diente Carmona als Ausbilder an der Zentralen Offiziersschule, dann als Direktor der Praktischen Schule der Kavallerie, dann als Kommandeur der IV. Division und schließlich als Kriegsminister während der Ersten Republik."
