 ##BOOKMARKS
 POR_GATHERING_STORM_DESC:0 "Portugal – einst ein prosperierendes Reich, das zusammen mit Spanien dank seiner Entdecker und Kolonisten die Welt in zwei Hälften teilte – ist heute ein verfallendes Land, das dazu verdammt ist, in den Hintergrund der Weltpolitik zu geraten. Der Weg zum Ruhm wird nicht leicht sein, und das Meer könnte sich als ebenso tückisch erweisen wie vor Jahrhunderten. \n\nPortugal hat viele Wege vor sich – wird es seinen früheren Ruhm und vielleicht sogar noch größere Höhen anstreben oder wird es einfach nur daran arbeiten, den kommenden Sturm zu überstehen?"
 POR_BLITZKRIEG_DESC:0 "Portugal – einst ein prosperierendes Reich, das zusammen mit Spanien dank seiner Entdecker und Kolonisten die Welt in zwei Hälften teilte – ist heute ein verfallendes Land, das dazu verdammt ist, in den Hintergrund der Weltpolitik zu geraten. Der Weg zum Ruhm wird nicht leicht sein, und das Meer könnte sich als ebenso tückisch erweisen wie vor Jahrhunderten. \n\nPortugal hat viele Wege vor sich – wird es seinen früheren Ruhm und vielleicht sogar noch größere Höhen anstreben oder wird es einfach nur daran arbeiten, den kommenden Sturm zu überstehen?"
