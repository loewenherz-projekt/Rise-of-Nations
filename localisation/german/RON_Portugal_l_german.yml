 ##PORTUGAL REWORKED++ 

 ##FOCUS
 ###############  INDUSTRIA  #############
 POR_great_public_works:0 "Große öffentliche Arbeiten"
 POR_great_public_works_desc:0 "Mitte des 20. Jahrhunderts setzte Portugal auf den Bau großer öffentlicher Bauwerke, von denen viele noch heute von Millionen Menschen genutzt werden, wie etwa Straßen, Schulen und Krankenhäuser."
 POR_desenvolver_o_interior:0 "Entwickeln Sie den Innenraum"
 POR_desenvolver_o_interior_desc:0 "Die portugiesische Regierung wird dafür sorgen, dass die Industrie die Unterstützung erhält, die sie braucht, und zwar in Form einer guten Infrastruktur im ganzen Land."
 POR_lisboa:0 "Öffentliche Arbeiten in Lissabon"
 POR_lisboa_desc:0 "Lissabon ist die Region mit der höchsten Unternehmenskonzentration in Portugal, was auf die hohe Bevölkerungsdichte und das höchste BIP pro Kopf im Vergleich zum Rest des Landes zurückzuführen ist. Damit erweist sich Lissabon als wichtiger Pol mehrerer Wirtschaftsaktivitäten." 
 POR_porto:0 "Öffentliche Arbeiten in Porto"
 POR_porto_desc:0 "Porto und das umliegende Gebiet, Groß-Porto genannt, sind der sozioökonomisch bedeutendste Stadtraum im Norden Portugals. Heute ist die Nordregion die einzige portugiesische Region, die mehr exportiert als importiert."
 POR_universidade:0 "Modernisierung\nUniversität Coimbra"
 POR_universidade_desc:0 "Die Universität Coimbra ist eine der ältesten noch aktiven Universitäten der Welt und zugleich die älteste und größte Universität Portugals. Ihre Geschichte reicht bis ins darauffolgende Jahrhundert zurück, als sie am 1. März 1290 von König D. Dinis I. gegründet wurde."
 POR_acores:0 "Entwicklung der Azoren und Madeiras"
 POR_acores_desc:0 "Die Azoren und Madeira sind eine strategische Inselgruppe im Atlantik. Wenn wir die Kontrolle über den Nordatlantik erlangen wollen, müssen wir sie entwickeln und modernisieren."
 POR_bases_acores:0 "Erweiterung des Luftwaffenstützpunkts Lages"
 POR_bases_acores_desc:0 "Der Luftwaffenstützpunkt Lajes ist ein Mehrzweckflugplatz auf der Azoreninsel Terceira. Er liegt strategisch günstig auf halbem Weg zwischen Nordamerika und Europa im Nordatlantik."
 POR_bases_madeira:0 "Erweiterung des Marinestützpunkts Funchal"
 POR_bases_madeira_desc:0 "Die Stadt Funchal liegt auf der Insel Madeira. Aufgrund ihrer geographischen Lage und der Existenz eines guten Seehafens ist sie für die Entwicklung der Insel und ihre strategische Lage nahe der afrikanischen Küste von Bedeutung."
 POR_minas_de_ferro:0 "Stahlminen von Aljustrel"
 POR_minas_de_ferro_desc:0 "Die Stahlminen von Aljustrel waren im Zweiten Weltkrieg eine wichtige Bergbauanlage. Sie wurden 1847 nach der Entdeckung einer Stahlquelle gegründet."
 POR_minas_de_cromio:0 "Chromminen von Grandola"
 POR_minas_de_cromio_desc:0 "Die Chromminen von Grandola waren im Zweiten Weltkrieg eine wichtige Bergbauanlage. Sie wurden 1900 nach der Entdeckung einer Chromquelle gegründet."
 POR_refineries_contractors:0 "Sacor Investments"
 POR_refineries_contractors_desc:0 "Durch die Investition in Sacor garantieren wir die Raffination von Erdölprodukten auf nationalem Boden, ohne von anderen Ländern abhängig zu sein."
 POR_prospect_for_oil:0 "Der Ultramar"
 POR_prospect_for_oil_desc:0 "Wir müssen unsere Entwicklungspolitik auf die Kolonialgebiete ausweiten. Der Ultramar war eine Bezeichnung für die portugiesischen Kolonien, als 1961 in Angola der Krieg ausbrach. Dieser Krieg endete mit der Revolution von 1974."
 POR_colony_infraestructure:0 "Eisenbahnen nach Afrika"
 POR_colony_infraestructure_desc:0 "Angola und Mosambik benötigen dringend ein Eisenbahnsystem, das den Rohstoffexport nach Portugal steigern kann."
 POR_ports_africa:0 "Marinestützpunkte in Afrika"
 POR_ports_africa_desc:0 "Angola und Mosambik werden von modernisierten Häfen profitieren, die den Rohstoffexport nach Portugal steigern können."
 POR_western_territory_bases:0 "Erweiterung des Marinestützpunkts Kap Verde"
 POR_western_territory_bases:0 "Unsere strategische Insel Kap Verde ist von entscheidender Bedeutung, wenn wir eine starke Position im Südatlantik behaupten wollen."
 POR_oriental_bases:0 "Befestigen Sie orientalische Enklaven"
 POR_oriental_bases_desc:0 "Unsere strategischen Enklaven Goa, Timor und Macau sind von entscheidender Bedeutung, wenn wir eine starke Position im Indischen Ozean behaupten wollen."
 POR_invest_angola:0 "Investieren Sie in Angola"
 POR_invest_angola_desc:0 "Unsere Kolonie Angola verdient es, Ziel militärischer Investitionen zu sein, um das riesige Gebiet zu verteidigen."
 POR_invest_mozambique:0 "Investieren Sie in Mosambik"
 POR_invest_mozambique_desc:0 "Unsere Kolonie Mosambik verdient es, Ziel öffentlicher und privater Investitionen zur Entwicklung der kaum oder gar nicht vorhandenen Industrie zu sein."
 POR_oil_cabinda:0 "Öl in Cabinda"
 POR_oil_cabinda_desc:0 "Cabinda ist die nördlichste Provinz Angolas und eine Exklave, die im Norden, Osten und Süden durch Kongo-Territorium und im Westen durch den Atlantischen Ozean begrenzt wird. Die Ölindustrie dieser Provinz trägt heute zu 70 % zum Rohölexport Angolas bei."
 POR_chromium_sofala:0 "Chrom in Sofala"
 POR_chromium_sofala_desc:0 "Sofala ist eine Provinz Mosambiks in der Mitte des Landes mit einer langen Küste in einer Nische des Mosambikkanals. Sie ist sehr reich an Mineralien."
 POR_extracting_the_richness:0 "Qualität und Quantität"
 POR_extracting_the_richness_desc:0 "Steigern Sie die Qualität und Quantität unserer Ressourcen durch neue Gewinnungs- und Speichermethoden."
####################  POLITICA  ############################
 POR_assassination_attempt:0 "Attentat auf Salazar"
 POR_assassination_attempt_desc:0 "Der Anarchist Emído Santana versuchte am 4. Juli 1937, Salazar zu ermorden, als dieser auf dem Weg zur Messe in einer privaten Kapelle in Lissabon war."
 POR_assassination_attempt_tt:0 "Es hat ein Attentat stattgefunden"
 POR_assassination_attempt_tta:0 "\n\nDieses Attentat wird im §YJuli 1937§ stattfinden!"
 POR_assassination_attempt_tt1:0 "Bekommt das Ereignis §Y&#39;Eine unvergessliche Messe&#39;§!"
 POR_carmona_assumes:0 "Ein Tag im Juli"
 POR_carmona_assumes_desc:0 "Nun liegt es an Carmona, die Führung des Landes zu übernehmen."
 POR_carmona_assumes_tt:0 "\nMit Salazars Tod übernimmt Armona die Parteiführung.\n\nDas Verschwinden einer so wichtigen Persönlichkeit wird im ganzen Land zu Unruhen führen. Das portugiesische Volk wird Veränderungen fordern."
 POR_salazar_lives:0 "Salazars Rede"
 POR_salazar_lives_desc:0 "Gott wird Salazar in diesen dunklen, unruhigen Zeiten leiten."
 POR_salazar_lives_tt:0 "\nDieser §Ygescheiterte§! Attentat bestärkte ihn nur in seinem Glauben, dass er von §YGott§! beschützt wird und dass es seine Pflicht ist, §YPortugal§! in diesen schwierigen Zeiten zu führen.\n\n"
 POR_change_is_needed:0 "Salazars Dilemma"
 POR_change_is_needed_desc:0 "Salazar muss eine Entscheidung treffen. Und zwar schnell."
 POR_change_is_needed_tt:0 "\nWährend seiner Genesung im Krankenhaus befindet sich §YSalazar§! in einer tiefen §YSelbstbeobachtung§!."
 SALAZAR_DIES:0 "Salazar stirbt"
 SALAZAR_LIVES:0 "Salazar unverletzt"
 SALAZAR_WOUNDED:0 "Salazar verwundet"
 ##FREEMASONRY#################################
 POR_regime_shall_not_fall:0 "Das Regime\nwird nicht fallen"
 POR_regime_shall_not_fall_desc:0 "Proteste? In meinem Land? Pah! Schlagt sie alle! Erinnert sie daran, wer hier das Sagen hat!"
 POR_regime_shall_not_fall_tt:0 "§M?????????????§!"
 POR_seek_masonic_help:0 "Suchen Sie freimaurerische Hilfe"
 POR_seek_masonic_help_desc:0 "Bitten Sie die portugiesische Freimaurerei, bei der Bewältigung dieser Proteste zu helfen und die Kontrolle an Carmona zurückzugeben."
 POR_total_control_carmona:0 "Gewinnen Sie die „totale“ Kontrolle zurück"
 POR_total_control_carmona_desc:0 "Óscar Carmona wird der unangefochtene Herrscher Portugals sein. Manche behaupten, eine unbekannte Macht stehe hinter ihm und ziehe die Fäden, damit dies geschehen kann."
 POR_allow_freemasonry:0 "Freimaurerei zulassen"
 POR_allow_freemasonry_desc:0 "1935 verabschiedete die Regierung ein Gesetz, das jedem Bürger die Mitgliedschaft in Geheimbünden verbot. Dies war ein direkter Angriff auf die Freimaurerei. Unter dem Einfluss von Carmona ist es nun an der Zeit, dieses Gesetz abzuschaffen."
 POR_high_military_ranks:0 "Laden Sie hohe Militärränge ein"
 POR_high_military_ranks_desc:0 "Laden Sie hohe und angesehene Militärs in unsere Bruderschaft ein. Mehr Kontrolle bedeutet mehr Macht."
 POR_new_order:0 "Eine neue Ordnung"
 POR_new_order_desc:0 "Wir brauchen einen neuen Militärorden, der uns bedingungslos dienen kann. Der Orden der Lusitanischen Ritter ist für unsere Ziele perfekt geeignet."
 POR_new_order_tt:0 "Der Orden der Lusitanischen Ritter wird gegründet.\nDiese Elite-Kavallerieeinheit ist auf Angriffs- und Durchbruchoperationen spezialisiert.\nErhält 5 Einheiten des Lusitanischen Ritterordens mit 6 Bataillonen in Lissabon."
 POR_control_media:0 "Kontrollieren Sie die Medien"
 POR_control_media_desc:0 "Die Kontrolle von Radio, Fernsehen und Zeitungen ist entscheidend, um die Denkweise der Massen zu beeinflussen. Niemand wird uns in Frage stellen."
 POR_increase_propaganda:0 "Propaganda verstärken"
 POR_increase_propaganda_desc:0 "Ein Radio für jedes Zuhause. Jetzt gratis sichern!"
 POR_prepare_foreign_threats:0 "Bereiten Sie sich auf das Unvermeidliche vor"
 POR_prepare_foreign_threats_desc:0 "Wir müssen auf alles vorbereitet sein."
 POR_into_the_light:0 "Ins Licht"
 POR_into_the_light_desc:0 "Wir werden den Nationen auf der ganzen Welt Licht und Klarheit bringen. Unsere Methoden werden akzeptiert, ob es ihnen gefällt oder nicht."
 POR_into_the_light_tt:0 "\nWir werden den Nationen dieser Welt Licht und Klarheit bringen. Unsere Methoden werden akzeptiert, ob es ihnen gefällt oder nicht."
 POR_stay_in_the_shadows:0 "Bleib im Schatten"
 POR_stay_in_the_shadows_desc:0 "Die Welt ist noch nicht bereit, die Wahrheit zu erfahren. Bis es soweit ist, können wir nur zusehen, wie alle um uns herum brennen."
 POR_stay_in_the_shadows_tt:0 "\nDie Welt ist noch nicht bereit, die §MWahrheit§! zu erfahren. Bis es soweit ist, können wir nur §Rzusehen, wie alle um uns herum brennen§!"
 POR_masonic_operations:0 "Freimaurerische Agenda"
 POR_masonic_operations_desc:0 "Wir sind jetzt bereit, die Welt auf den Kopf zu stellen."
 ##COMMUNIST#################################
 POR_7_congresso:0 "VII. Kongress"
 POR_7_congresso_desc:0 "Der VII. Kongress der Kommunistischen Internationale tagte in Moskau. Nach dem Aufstieg des Faschismus und dem Scheitern der auf dem vorherigen Kongress beschlossenen radikalen Linkspolitik ließ man den Worten nun Taten folgen."
 POR_support_communist_spain:0 "Unterstützen Sie öffentlich das kommunistische Spanien"
 POR_support_communist_spain_desc:0 "Spanien befindet sich mitten in einem Bürgerkrieg, der darüber entscheiden wird, ob es ein möglicher zukünftiger kommunistischer Verbündeter sein wird oder eine nutzlose Republik bleibt – oder, schlimmer noch, dem Faschismus oder der Anarchie verfällt. Wir müssen den wahren Spaniern Unterstützung bieten, bevor es zu spät ist!"
 POR_avante_jornal:0 "Journal Avante"
 POR_avante_jornal_desc:0 "Die Zeitschrift Avante wurde im Untergrund veröffentlicht und unterstützte kommunistische Ideale. Wir brauchen sie, um die einzig wahre Ideologie zu fördern."
 POR_mutiny:0 "Aufstand der Matrosen"
 POR_mutiny_desc:0 "Der Matrosenaufstand (Motim dos Barcos do Tejo) war ein militärischer Aufstand an Bord der Schiffe der portugiesischen Armada. Organisiert wurde er von der PCP, die Solidarität mit den republikanischen Kräften in Spanien bekundete."
 POR_abolish_private:0 "Abschaffung des Privateigentums"
 POR_abolish_private_desc:0 "Der Staat sollte jedes Stück Land besitzen, damit es besser verwaltet werden kann."
 POR_ban_fascism:0 "Einparteienstaat"
 POR_ban_fascism_desc:0 "Da das Land nun unter der Kontrolle der PCP steht, müssen wir sicherstellen, dass es nicht durch andere Ideologien destabilisiert wird. Indem wir unserer roten Jugend mehr Macht geben, wird ihre Bedrohung zerschlagen und Portugal wird das erste vollständig kommunistische Land in Westeuropa."
 POR_nationalize_industry:0 "Verstaatlichung der Industrie"
 POR_nationalize_industry_desc:0 "Die Beschlagnahmung der Produktionsmittel ist ein weiterer Schritt zur totalen Kontrolle der Landeswirtschaft."
 POR_mission_to_the_soviet_union:0 "Mission in der Sowjetunion"
 POR_mission_to_the_soviet_union_desc:0 "Die Sowjetunion hat Interesse an Portugal bekundet, vor allem um ihre Ideologie in Westeuropa leichter verbreiten zu können. Schicken Sie eine Mission nach Moskau, damit wir unsere diplomatischen Beziehungen ausbauen können."
 POR_ussr_guarantee:0 "Moskauer Schutz"
 POR_ussr_guarantee_desc:0 "Fordern Sie Moskau auf, uns vor den Bedrohungen durch Imperialismus und Faschismus zu schützen"
 POR_ussr_guarantee_tt:0 "\nDie „Sowjetunion“ wird unsere „Unabhängigkeit“ §Ygarantieren§! und unsere Armee „versorgen“!, im Austausch dafür, dass sie ihnen „militärischen Zugang“ gewährt."
 POR_join_comintern:0 "Treten Sie der Komintern bei"
 POR_join_comintern_desc:0 "Es ist an der Zeit, endlich die Mitgliedschaft in der Komintern zu beantragen. Dies wird es uns ermöglichen, die Sache des Kommunismus weltweit aktiver zu vertreten."
 POR_red_soldiers:0 "Rote Brigaden"
 POR_red_soldiers_desc:0 "Jeder Mann und jede Frau muss ihre Pflicht erfüllen, den Staat zu schützen. Wir werden dafür sorgen, dass sie die Möglichkeit dazu haben."
 POR_iberian_congress:0 "I. Iberischer Kongress"
 POR_iberian_congress_desc:0 "Gemeinsam mit unseren spanischen Brüdern sollten wir einen Kongress organisieren, bei dem wir die Rolle der Iberischen Halbinsel in der aktuellen Weltlage diskutieren."
 POR_red_youth:0 "Rote Jugend"
 POR_red_youth_desc:0 "Indoktrinieren Sie unsere jungen Generationen, damit sie unsere Ziele besser verstehen."
 POR_iberian_stronghold:0 "Festung Iberia"
 POR_iberian_stronghold_desc:0 "Die Iberische Halbinsel wird nicht fallen, wenn sie von äußeren Mächten bedroht wird."
 POR_invite_spain:0 "Iberische Arbeitergewerkschaft"
 POR_invite_spain_desc:0 "Die Zeit ist gekommen. Wir und unsere Brüder werden einen echten Militärpakt schließen, um uns vor Imperialismus und Faschismus zu schützen."
 POR_spread_revolution_brazil:0 "Bringen Sie die Revolution nach Brasilien"
 POR_spread_revolution_brazil_desc:0 "Wir müssen die wahren Ideen in unserem Bruderland Brasilien verbreiten."
 POR_spread_revolution_brazil_tt:0 "\nWenn die §Ykommunistische Unterstützung§! hoch genug ist,\na wird in §YBrasilien§! ein §YBürgerkrieg§! ausbrechen."
 ##DEMOCRACY##########################
 POR_mil_fa_na:0 "Rückkehr der Pariser Liga"
 POR_mil_fa_na_desc:0 "Die Liga zur Verteidigung der Republik, besser bekannt als Liga von Paris, war eine Organisation portugiesischer politischer Exilanten in Paris, die aufgrund der Nationalen Revolution vom 28. Mai 1926 gegründet wurde."
 POR_depois_adeus:0 "Und nach dem Abschied"
 POR_depois_adeus_desc:0 "Mit der Ausstrahlung von „E Depois do Adeus“ durch den Rundfunksender Associated Broadcasters aus Lissabon wurde den Truppen der Befehl gegeben, sich vorzubereiten und in Stellung zu gehen, um die Diktatur zu stürzen."
 POR_expresso_jornal:0 "Journal Reviralho"
 POR_expresso_jornal_desc:0 "Die Zeitschrift „Reviralho“ wurde im Untergrund veröffentlicht und unterstützte demokratische Ideale. Die Bevölkerung wird erkennen, dass es einen anderen Weg gibt."
 POR_imprison_carmona:0 "Oscar Carmona-Prozess"
 POR_imprison_carmona_desc:0 "Der Prozess gegen Carmona wird ein bedeutendes Ereignis in der jüngeren Geschichte unseres Landes sein. Viele sind besorgt über den Ausgang. Wird er gerecht sein? Wird er hart ausfallen? Wir werden es bald erfahren …"
 POR_no_censorship:0 "Zensur abschaffen"
 POR_no_censorship_desc:0 "Schluss mit dem „Blaustift“. Schluss damit!"
 POR_free_press_recovery:0 "Imprensa Livre"
 POR_no_censorship_tt:0 "Entscheidung aufheben: §YPressezensur einführen§!"
 POR_catching_up:0 "Fokus auf Industrialisierung"
 POR_catching_up_desc:0 "Unser Land hinkt bei der Industrialisierung den europäischen Großmächten hinterher. Wir müssen sie einholen oder es zumindest versuchen."
 POR_democratic_faction:0 "Bieten Sie Unterstützung gegen gefährliche Ideologien an"
 POR_democratic_faction_desc:0 "In diesen dunklen Zeiten müssen wir vereint sein, um uns selbst und andere vor Bedrohungen der Demokratie zu schützen."
 POR_join_france_entente_tt:0 "(@FRA§YFrance§!) Bekommt das Ereignis §Y&#39;Portugal strebt den Beitritt zur Kleinen Entente an&#39;§!"
 POR_democratic_faction_tt:0 "\nWir werden uns den §YAllies§! anschließen und demokratische Nationen auf der ganzen Welt verteidigen.\n\nWenn §Y[ENG.GetNameDefCap]§! jedoch entscheidet, dass dies nicht der richtige Weg ist, werden wir uns der §YLittle Entente§! anschließen, wenn diese von §Y[FRA.GetName]§! gegründet wird.\n\nWenn beide Länder beschließen, §Rgefährlichen Ideologien§! zu folgen, werden wir unsere eigene §YFraktion§! gründen."
 POR_CEP:0 "Portugiesisches Expeditionskorps"
 POR_CEP_desc:0 "Das portugiesische Expeditionskorps war die wichtigste Militärmacht Portugals, die im Ersten Weltkrieg an der Westfront kämpfte."
 POR_soldado_milhaes:0 "„Soldier Millions“"
 POR_soldado_milhaes_desc:0 "Aníbal Augusto Milhais, Spitzname „Soldado Milhões“ („Millionensoldat“), war der höchstdekorierte portugiesische Soldat des Ersten Weltkriegs und der einzige portugiesische Soldat, dem die höchste nationale Auszeichnung verliehen wurde, der Militärorden des Turms und des Schwertes für Tapferkeit, Treue und Verdienste auf dem Schlachtfeld."
 POR_defensive_exercises:0 "Verteidigungsoperationen"
 POR_defensive_exercises_desc:0 "Trainieren Sie für die Verteidigung unserer Republik. Wir sollten uns nicht ausländischen Bedrohungen beugen."
 POR_defensive_exercises_tt:0 "Gewinnt 2 §YBergsteiger§!-Einheiten mit 9 Bataillonen in §YGuarda§!."
 POR_torres_vedras:0 "Torres Vedras Lines"
 POR_torres_vedras_desc:0 "Die Linien von Torres Vedras bestehen aus 152 Befestigungsanlagen und anderen Verteidigungsanlagen, die zwischen 1809 und 1812 auf der Halbinsel Lissabon errichtet wurden. Bei der dritten französischen Invasion verhinderten die Linien, dass die Armee von André Masséna Lissabon erreichte, und führten schließlich zu ihrem Rückzug aus Portugal."
 POR_torres_vedras_tooltip:0 "Beleben Sie die „Torres Vedras-Linien“ wieder, eine Reihe von „Befestigungsanlagen“, die in der Nähe von „Lissabon“ errichtet wurden, um die Hauptstadt vor napoleonischen Invasionen zu schützen."
 POR_defesa_liberdade:0 "Zufluchtsort für Flüchtlinge"
 POR_defesa_liberdade_desc:0 "Hunderte Flüchtlinge suchen unser Land auf, um dem Krieg zu entkommen, der Europa erfasst. Einige reisen in die Vereinigten Staaten, andere bleiben, und wieder andere schließen sich uns an, um demokratische Ideale zu verteidigen."
 POR_bring_democracy_spain:0 "Bringen Sie Demokratie nach Spanien"
 POR_bring_democracy_spain_desc:0 "Befreit unsere spanischen Brüder von der Tyrannei!"
 POR_bring_democracy_spain_tt:0 "Erzielt das Kriegsziel „Regierung stürzen“ gegen „Spanien“!"
 POR_british_cooperation:0 "Wiederbelebung der luso-britischen Allianz"
 POR_british_cooperation_desc:0 "Das Anglo-Portugiesische Bündnis, das 1386 im Vertrag von Windsor zwischen England und Portugal ratifiziert wurde, ist möglicherweise das älteste noch gültige Bündnis der Welt."
 POR_joint_navy:0 "Beherrscht gemeinsam die Wellen"
 POR_joint_navy_desc:0 "Es war einmal eine Zeit, in der wir die Meere beherrschten. Diese Zeiten sind lange vorbei, aber jetzt können wir diese Lücke schließen, indem wir vom Fachwissen der britischen Marine lernen."
 POR_colonial_question:0 "Kolonialfrage"
 POR_colonial_question_desc:0 "Ob wir nun freigelassen werden oder nicht, wir müssen entscheiden, was wir mit unseren Kolonien machen. Ein wirklich demokratisches Land hat keine Untertanen."
 POR_material_eng:0 "Schutz vor Blitzkrieg"
 POR_material_eng_desc:0 "Wenn wir uns auf die Seite der Alliierten stellen, müssen wir unsere Grenze vor dem Panzerblitzkrieg der Achsenmächte schützen."
 POR_join_allies:0 "Schließen Sie sich den Verbündeten an"
 POR_join_allies_desc:0 "Eine Garantie allein reicht nicht aus – es ist an der Zeit, sich voll und ganz für die westlichen Demokratien einzusetzen und mit ihnen die Freiheit zu verteidigen."
 POR_bring_democracy_fascism:0 "Den Faschismus bekämpfen"
 POR_bring_democracy_fascism_desc:0 "Solange das Deutsche Reich existiert, stellt es für uns eine Bedrohung dar. Anstatt darauf zu warten, dass es zuschlägt, werden wir die Initiative selbst in die Hand nehmen."
 POR_eradicate_communism:0 "Den Kommunismus ausrotten"
 POR_eradicate_communism_desc:0 "Solange die Sowjetunion existiert, stellt sie für uns eine Bedrohung dar. Anstatt darauf zu warten, dass sie zuschlägt, sollten wir die Initiative selbst in die Hand nehmen."
 ##FASCISM#############################
 POR_liga_28_maio:0 "Liga vom 28. Mai"
 POR_liga_28_maio_desc:0 "Gründung der Liga des 28. Mai, die die faschistischsten Sektoren Portugals vereint. Sie nimmt Positionen mit großer Dynamik ein, insbesondere die Organisation von Demonstrationen und öffentlichen Versammlungen zugunsten des Faschismus."
 POR_support_nationalist_spain:0 "Unterstützen Sie öffentlich das nationalistische Spanien"
 POR_support_nationalist_spain_desc:0 "Spanien befindet sich mitten in einem Bürgerkrieg, der darüber entscheiden wird, ob es künftig ein möglicher Verbündeter des Faschismus sein wird oder eine nutzlose Republik bleibt – oder, noch schlimmer, dem Kommunismus oder der Anarchie verfällt. Wir müssen den wahren Spaniern Unterstützung bieten, bevor es zu spät ist!"
 POR_revolucao_jornal:0 "Journal Revolução"
 POR_revolucao_jornal_desc:0 "Die Zeitschrift „Revolução“ wurde im Untergrund veröffentlicht und unterstützte die Ideale des Faschismus. Wir brauchen sie, um die einzig wahre Ideologie zu verbreiten."
 POR_peaceful_rise_fascists:0 "Rolão Preto kehrt zurück"
 POR_peaceful_rise_fascists_desc:0 "Rolão Preto wurde 1935 bei einem Versuch, gegen das Regime zu revoltieren, verhaftet und zur Verbannung nach Spanien verurteilt. Sollte in Spanien ein Bürgerkrieg ausbrechen, würde Rolão Preto zweifellos an der Seite der Falangisten kämpfen. Mit Carmonas Schwächung hätte er die erhoffte Chance, Portugal zu regieren."
 POR_return_duarte:0 "Eine neue Verfassung"
 POR_return_duarte_desc:0 "Da das Land nun unter der Kontrolle der MNS steht, müssen wir eine neue Verfassung schreiben und unsere zukünftigen Ziele festlegen: ob wir Duarte Nuno als König von Portugal wieder einsetzen oder ob wir die Monarchie hinter uns lassen und Rolão Preto die totale Kontrolle über Portugal geben wollen."
 POR_blue_shirts:0 "Blaue Hemden Märsche"
 POR_blue_shirts_desc:0 "Die Blauhemden waren eine Bewegung christlicher Inspiration, sie trugen eine Armbinde mit dem Kreuz Christi, ihrem größten Symbol."
 POR_holy_see_reparations:0 "Versöhnung mit dem Erzbischof"
 POR_holy_see_reparations_desc:0 "Nehmen Sie Verhandlungen mit dem Heiligen Stuhl auf, indem Sie mit dem obersten Kleriker Portugals, dem Erzbischof, eine Schlichtung herbeiführen."
 POR_mediterranean_alliance:0 "Mittelmeerallianz"
 POR_mediterranean_alliance_desc:0 "Das Mittelmeer muss den Mittelmeerländern gehören. Es ist Zeit, sich damit zu befassen."
 POR_spr_civil_war_learnings:0 "Lektionen zum Spanischen Bürgerkrieg"
 POR_spr_civil_war_learnings_desc:0 "Erfahren Sie, wie der Krieg in diesem Jahrzehnt aussehen wird, indem Sie sich ansehen, wie er im Spanischen Bürgerkrieg verlief."
 POR_naval_preparations:0 "Erfinden Sie die Karavelle neu"
 POR_naval_preparations_desc:0 "Die Karavelle war ein kleines, wendiges Segelschiff, das im 15. Jahrhundert von uns entwickelt wurde, um die westafrikanische Küste und den Atlantik zu erkunden. Die moderne Umsetzung dieser alten Erfindung verschafft uns die Oberhand."
 POR_mediterranean_fleet:0 "Mittelmeerflotte"
 POR_mediterranean_fleet_desc:0 "Gemeinsam mit unseren Verbündeten haben wir die Verpflichtung, unsere Marine zu modernisieren, um eine effiziente Überwachung des Mittelmeers zu gewährleisten."
 POR_reclaim_mediterranean:0 "Kontrollieren Sie das Mittelmeer"
 POR_reclaim_mediterranean_desc:0 "Das Mittelmeer ist die zentrale Verkehrsader für Verkehr, Handel und kulturellen Austausch zwischen drei Kontinenten: Asien, Afrika und Europa. Die Kontrolle über dieses Meer bedeutet die Kontrolle über ein Drittel der gesamten Handelsschifffahrt der Welt."
 POR_mission_to_germany:0 "Portugiesisch-deutsche Zusammenarbeit"
 POR_mission_to_germany_desc:0 "Es ist kein Geheimnis, dass die Politik unseres Landes stark vom Faschismus geprägt ist. Durch diese Zusammenarbeit rücken wir politisch und militärisch näher an Deutschland heran."
 POR_joint_tanks:0 "Deutsche Panzertechnik"
 POR_joint_tanks_desc:0 "Die deutsche Panzertechnik übertrifft jedes Land der Welt. Wir können viel von ihnen lernen. Panzer sind für jede Armee unverzichtbar."
 POR_motorized_aquisition:0 "Opel Deal"
 POR_motorized_aquisition_desc:0 "Machen Sie einen Deal mit dem deutschen Automobilhersteller Opel. Dadurch erhalten wir einige Lastwagen und eine Militärfabrik."
 POR_sea_fortifications:0 "Schützen Sie unsere Küste"
 POR_sea_fortifications_desc:0 "Wenn wir Krieg gegen die Alliierten führen, müssen wir unsere Küste vor einer Invasion schützen."
 POR_sea_fortifications_tooltip:0 "Platzieren Sie „Küstenfestungen“ entlang unserer Küste."
 POR_join_axis:0 "Treten Sie der Achse bei"
 POR_join_axis_desc:0 "Es ist an der Zeit, sich den Achsenmächten anzuschließen, damit wir gemeinsam mit den Deutschen eine glorreiche Zukunft für Portugal aufbauen können."
 ##SALAZAR AND DUARTE#########################
 POR_PVDE:0 "Internationale und staatliche Verteidigungspolizei"
 POR_PVDE_desc:0 "Die Schaffung einer politischen Polizei (PVDE) mit Fähigkeiten zur Spionageabwehr und Aufstandsbekämpfung, die für die Grenz-, Einwanderungs- und Auswanderungskontrolle sowie die innere und äußere Staatssicherheit zuständig ist."
 POR_president_salazar:0 "Präsident António Salazar"
 POR_president_salazar_desc:0 "Der Verzicht auf die Galionsfigur des Staates ist nur natürlich, wenn man vor der Option steht, dem Retter unseres Vaterlandes die absolute Macht zu übertragen."
 POR_president_salazar_tt:0 "\n§YSalazar§! wird daraus §Ystärker§! hervorgehen als je zuvor.\n\n"
 SALAZAR_PRESIDENT:0 "Salazar gibt Oscar Carmona die Schuld"
 POR_prison_tarrafal:0 "Tarrafal Camp"
 POR_prison_tarrafal_desc:0 "Als Reaktion auf die steigende Zahl der Verhaftungen haben wir beschlossen, eine Strafkolonie im Ausland zu errichten. Dieser Standort bietet ideale Voraussetzungen für die „Resozialisierung“ unserer Gefangenen."
 POR_revoke_church_law:0 "Aufhebung des Gesetzes zur Trennung von Staat und Kirche"
 POR_revoke_church_law_desc:0 "Dieses Gesetz wurde von der ersten Regierung der Portugiesischen Republik per Dekret mit Gesetzeskraft verabschiedet. Das Vermögen der katholischen Kirche wurde verstaatlicht, und öffentliche Gottesdienste werden überwacht. Als Reaktion darauf brach der Heilige Stuhl die diplomatischen Beziehungen zu Portugal ab. Wir müssen dieses diplomatische Desaster rückgängig machen."
 POR_royal_ranks:0 "Königliche und adlige Ränge wiederhergestellt"
 POR_royal_ranks_desc:0 "Nobiliarchische Titel oder Adelsränge wurden mit der Absicht geschaffen, ein Vasallenverhältnis zwischen dem Inhaber und dem Monarchen herzustellen; einige davon waren erblich."
 POR_support_the_braganzas:0 "Unterstützen Sie die Braganzas"
 POR_support_the_braganzas_desc:0 "Mit Salazars Einladung beabsichtigt Dom Duarte, die Kontrolle über das Land zu übernehmen und das alte Königreich wiederherzustellen!"
 POR_support_the_braganzas_tt:0 "\n§YSalazars§! Einladung ist die beste Gelegenheit für §YDuarte Nuno§!, die Kontrolle über das §YLand§! zu übernehmen.\n\n"
 SALAZAR_SEEKS_HELP:0 "Salazar sucht Hilfe bei Integralisten"
 POR_casa_braganza:0 "Stiftung Haus Braganza"
 POR_casa_braganza_desc:0 "Dank der Unterstützung der Stiftung des Hauses Braganza konnte der Herzog alle Brigantine-Vermögenswerte seiner Familie wiederherstellen und unserem Land einige Vorteile bringen."
 POR_local_autonomy:0 "Lokale Autonomie"
 POR_local_autonomy_desc:0 "Wer sonst könnte besser mit den Problemen einer Gemeinschaft umgehen als die Gemeindevorsteher selbst? Sie leben seit Hunderten von Jahren in ihren Gemeinden und sehen mehr als nur Tabellenkalkulationen, wenn sie auf die Weizenfelder und die hart arbeitenden Menschen blicken, die dort schuften."
 POR_royal_scouts:0 "Königliche Pfadfinder"
 POR_royal_scouts_desc:0 "Das Ziel der Royal Scout Movement besteht darin, junge Menschen bei ihrer körperlichen, geistigen und spirituellen Entwicklung zu unterstützen, damit sie eine konstruktive Rolle in der Gesellschaft spielen können. Dabei liegt der Schwerpunkt auf der Natur und Überlebensfähigkeiten."
 POR_tradicional_monarchy:0 "Traditionelle Monarchie"
 POR_tradicional_monarchy_desc:0 "Eine traditionelle Monarchie ist eine andere Art der Erbmonarchie. Diese Art hat als Grundgesetz die Tradition, in der der Monarch regiert und herrscht, seine Macht jedoch durch ein Zweikammerparlament begrenzt ist, für das er verantwortlich ist."
 POR_quintoimperio:0 "Das Fünfte Reich"
 POR_quintoimperio_desc:0 "Das Fünfte Reich ist das Konzept eines globalen portugiesischen Reiches mit spiritueller und weltlicher Macht, basierend auf einer Interpretation von Daniel 2 und der Offenbarung des Johannes, dessen Ursprünge beim Priester António Vieira liegen."
 POR_miguelist_constitution:0 "Miguelistische Verfassung"
 POR_miguelist_constitution_desc:0 "Wir akzeptieren und respektieren die Geschichte unserer Nation. Die Zeit der Galionsfiguren ist längst vorbei, und der Herzog selbst muss die Macht übernehmen. Nur dann wird unser Königreich in diesem Zeitalter aufsteigen können."
 POR_god_country_family:0 "Gott, Vaterland und Familie"
 POR_god_country_family_desc:0 "Unser Glaube an Gott, unser Land und unsere Familie sollte ein Symbol unserer Einheit und unserer Entschlossenheit sein."
 POR_restore_portuguese_pride:0 "Unser Platz in der Welt"
 POR_restore_portuguese_pride_desc:0 "Wir werden in diesem bevorstehenden Krieg nicht neutral bleiben.\nWir müssen Partei ergreifen. Oder auch nicht."
 POR_Concordata:0 "Konkordat von 1940"
 POR_Concordata_desc:0 "Das Konkordat von 1940 war ein Abkommen zwischen Portugal und dem Heiligen Stuhl der katholischen Kirche, das im Mai 1940 unter António de Oliveira Salazars Estado Novo in der Vatikanstadt unterzeichnet wurde. Ziel war es, den diplomatischen Schaden, der durch das Gesetz zur Trennung von Kirche und Staat in der ersten portugiesischen Republik entstanden war, wiedergutzumachen."
 POR_World_Exhibition:0 "Portugiesische Weltausstellung"
 POR_World_Exhibition_desc:0 "Die portugiesische Weltausstellung fand 1940 in Lissabon statt, um den 800. Jahrestag der Staatsgründung und den 300. Jahrestag der Wiederherstellung der Unabhängigkeit von Spanien zu feiern. Die Ausstellung fand vom 23. Juni bis 2. Dezember 1940 auf der Praça do Império statt und wurde von 3 Millionen Menschen besucht."
 POR_salazar_youth:0 "Salazar Jugend"
 POR_salazar_youth_desc:0 "Organisationen zur Förderung der Disziplin und politischen Bildung junger Menschen in unserem Land werden frühzeitig Loyalität und Selbstaufopferung fördern."
 POR_legiao_portuguesa:0 "Portugiesische Legion"
 POR_legiao_portuguesa_desc:0 "Die Portugiesische Legion bildete eine nationale Organisation mit integrierter Miliz, deren Ziel es war, das geistige Erbe der Nation zu verteidigen und die kommunistische Bedrohung und den Anarchismus zu bekämpfen."
 POR_noble_people:0 "Edle Menschen"
 POR_noble_people_desc:0 "Die Menschen in Portugal sind normalerweise friedlich, aber wenn die Zeit drängt, kann uns niemand aufhalten!"
 POR_heroes_from_the_sea:0 "Helden der Meere"
 POR_heroes_from_the_sea_desc:0 "Es ist Portugals Schicksal, die Meere zu beherrschen, und das war schon immer so!"
 POR_acto_colonial:0 "Durchsetzung des Kolonialgesetzes"
 POR_acto_colonial_desc:0 "Obwohl in den vergangenen Jahrzehnten bahnbrechende Gesetze verabschiedet wurden, wurden diese in unseren Überseeprovinzen nicht durchgesetzt. Wir dürfen uns nicht auf unseren Lorbeeren ausruhen; Gesetze sind dazu da, um durchgesetzt zu werden, und wir werden sie durchsetzen!"
 POR_provincias_ultramarinas:0 "Plurikontinentalismus"
 POR_provincias_ultramarinas_desc:0 "Plurikontinentalismus war ein geopolitisches Konzept, das davon ausging, dass Portugal ein transkontinentales Land und ein einheitlicher Nationalstaat sei, der aus dem portugiesischen Festland und seinen überseeischen Provinzen bestehe. Es war die Idee, dass Portugal kein Kolonialreich, sondern ein einzelner, über mehrere Kontinente verteilter Nationalstaat sei."
 ################ ORGULHOSAMENTE SÓS  ##################
 POR_iberian_unity:0 "Bereiten Sie den spanischen Putsch vor"
 POR_iberian_unity_desc:0 "Wir werden mit einem Putschvorschlag an die spanischen Royalisten herantreten und sie unterstützen."
 POR_iberian_unity_tooltip:0 "\nMischen Sie sich in die §YSpanische§!-Politik ein, um sie darauf vorzubereiten, die §YMonarchie§! erneut zu akzeptieren."
 POR_spanish_king:0 "Bringt Alfonso XIII zurück"
 POR_spanish_king_desc:0 "Es ist an der Zeit, Alfons XIII. als König von Spanien wieder einzusetzen und unsere Länder unter einer Fraktion zu vereinen. Wir werden nicht aufzuhalten sein."
 POR_spanish_king_tooltip:0 "\n§RWollten wir gegen Spanien in den Krieg ziehen, um ihn an die Macht zu bringen.§!"
 POR_kingdoms_tech_sharing:0 "Iberische Forschungsgruppe"
 POR_kingdoms_tech_sharing_desc:0 "Der Vorteil des Austauschs wissenschaftlicher Fortschritte zwischen engen Verbündeten ist nicht zu verachten. Unsere gesamte Fraktion wird in der Lage sein, Forschung und Entwicklung im Kriegsfall effizienter durchzuführen, wenn wir die notwendigen Schritte zu deren Koordinierung unternehmen."
 POR_iberian_armada:0 "Bauen Sie die Armada wieder auf"
 POR_iberian_armada_desc:0 "Es soll ein modernes Schlachtschiff entstehen, das hinsichtlich seiner Feuerkraft von den alten portugiesischen und spanischen Galeonen inspiriert ist und die Meere beherrschen soll."
 POR_iberian_armada_tt:0 "Fügt der Produktionswarteschlange zwei moderne Schlachtschiffe der Galleon-Klasse hinzu, die zu 75 % bzw. 50 % fertiggestellt sind."
 POR_rekindle_feuds:0 "Nachfrage Ceuta"
 POR_rekindle_feuds_desc:0 "Am 1. Januar 1668 wurde die Region Ceuta an Spanien übergeben, damit dieses unsere Souveränität anerkennt.\n\nNun hat [From.GetLeader] vorgeschlagen, die Region rechtmäßig wieder unter portugiesische Kontrolle zu übertragen."
 POR_demand_mollucas:0 "Nachfrage Kleine Sundainseln und Mollusken"
 POR_demand_mollucas_desc:0 "Der Vertrag von Den Haag, der ursprünglich für alle Gebiete Portugals und der Niederlande gelten sollte, beschränkte sich in der Praxis auf den europäischen Kontinent, sodass die Kolonien nicht unter den Vertrag fielen. Aus diesem Grund nutzte die Niederländisch-Indien-Kompanie vor Jahrhunderten die Gelegenheit, die Molukken und die Kleinen Sundainseln zu erobern."
 POR_prepare_brazil_invasion:0 "Amphibische Kriegsführung"
 POR_prepare_brazil_invasion_desc:0 "Bereiten wir uns auf die unvermeidliche Intervention im Ausland vor."
 POR_orgulhosamente_sos:0 "Stolz allein"
 POR_orgulhosamente_sos_desc:0 "Besser allein als in schlechter Gesellschaft. Scheiß auf Spanien, das immer wieder versucht, uns zu erobern! Scheiß auf die Niederlande, die unsere Kolonien stehlen! Scheiß auf England, das uns wie ein Schoßhündchen behandelt!\n\nPortugal wird als Imperium wieder auferstehen!"
 POR_orgulhosamente_sos_tooltip:0 "§YVerbeuge dich vor niemandem, du gegen die Welt.§!\n§RKann keine Fraktionen erstellen oder ihnen beitreten.§!\n\n"
 POR_luso_pact:0 "Bekräftigung der iberischen Neutralität"
 POR_luso_pact_desc:0 "Der Iberische Pakt, auch bekannt als Portugiesisch-Spanien-Vertrag über Freundschaft und Nichtangriff, wird dafür sorgen, dass unsere Länder nicht wieder in alte Konflikte verfallen."
 POR_luso_pact_tooltip:0 "\n§YPortugiesische§! Botschafter werden nach Madrid reisen, um einen §YNichtangriffspakt§! zwischen unseren Ländern vorzuschlagen, damit wir beide im Falle eines eventuellen Krieges in Europa §Yneutral§! bleiben können.\n\n§RDieser Pakt wird überarbeitet, falls ein nationalistisches Spanien existiert und sich den Achsenmächten anschließt.§!"
 POR_iberian_interchange_program:0 "Iberische Industriekooperation"
 POR_iberian_interchange_program_desc:0 "Warum nicht die besten Ingenieure aus Portugal und Spanien zusammenbringen? Unsere Branchen werden es uns später danken."
 POR_iberian_interchange_program_tooltip:0 "\n§YPortugiesische§! und §YSpanische§! Ingenieure haben die Möglichkeit, Ideen auszutauschen, und infolgedessen werden §Ydie Bauzeiten in Fabriken verkürzt§!."
 POR_iberian_army_exercise:0 "Iberische Militärübungen"
 POR_iberian_army_exercise_desc:0 "Führen Sie gemeinsame Militärübungen mit Spanien durch, um unsere Armee für den Kriegsfall erfahrener zu machen."
 POR_galiza_referendum:0 "Galizisches Referendum"
 POR_galiza_referendum_desc:0 "Die Region Galicien ist uns sprachlich und kulturell ähnlicher als die anderen spanischen Regionen. Um die Meinung der Galicier darüber zu erfahren, muss ein Referendum durchgeführt werden."
 POR_galiza_referendum_tooltip:0 "In der spanischen Provinz Galicien wird ein Referendum abgehalten, bei dem es zwei einfache Möglichkeiten gibt: Werden Sie Teil Portugals oder bleiben Sie Spanien treu."
 POR_another_aljubarrota:0 "Ein weiteres Aljubarrota"
 POR_another_aljubarrota_desc:0 "Die Schlacht von Aljubarrota wurde 1385 zwischen dem Königreich Portugal und Kastilien ausgetragen. Truppen unter dem Kommando von König Johann I. von Portugal und seinem General Nuno Álvares Pereira stellten sich mit Unterstützung englischer Verbündeter der Armee von König Johann I. von Kastilien und seinen französischen Verbündeten entgegen. Das Ergebnis war ein entscheidender Sieg für die Portugiesen, der kastilische Ambitionen auf den portugiesischen Thron zunichtemachte."
 POR_revise_berlin:0 "Unser Ultimatum"
 POR_revise_berlin_desc:0 "Das britische Ultimatum von 1890 beendete unsere Ansprüche auf Grundlage historischer Entdeckungen und jüngster Erkundungen. Jetzt ist es an der Zeit, Rache für die Pink Map zu nehmen, indem wir [ENG.GetNameDefCap] unser Ultimatum stellen."
 POR_from_luanda_lourenco:0 "Von Luanda nach Lourenço"
 POR_from_luanda_lourenco_desc:0 "Das Eisenbahnprojekt vom Kap nach Kairo war ein Fehlschlag, aber das Eisenbahnprojekt von Luanda nach Lourenço wird ein Erfolg!"
 POR_portugal_strong:0 "Ein zweites Goldenes Zeitalter"
 POR_portugal_strong_desc:0 "Zwischen dem 15. und 16. Jahrhundert erlebte Portugal das sogenannte „Goldene Zeitalter der Entdeckungen“. Dies war der Höhepunkt Portugals als Land und für immer der Maßstab seiner Kultur. Das zweite Goldene Zeitalter beginnt jetzt, im 20. Jahrhundert."
 POR_honor_old_alliance:0 "Ehre der alten Allianz"
 POR_honor_old_alliance_desc:0 "Das älteste europäische Bündnis ist das Anglo-Portugiesische Bündnis, das 1386 im Vertrag von Windsor zwischen England und Portugal ratifiziert wurde und möglicherweise das älteste noch gültige Bündnis der Welt ist."
 POR_eng_guarantee_tt:0 "\nWir gewähren §Y[ENG.GetNameDefCap]§! §YAndockrechte§!."
 POR_new_boats:0 "Schiffbau-Austausch"
 POR_new_boats_desc:0 "Durch den Austausch von Schiffbauwissen mit dem Vereinigten Königreich werden unsere beiden Länder die Meere unangefochten beherrschen."
 POR_windsor:0 "Erneuerung des Vertrags von Windsor"
 POR_windsor_desc:0 "Dieser alte Vertrag muss erneuert werden, um dem 20. Jahrhundert gerecht zu werden. Dann werden wir Großbritannien in jedem Krieg unterstützen, den es führt."
 POR_windsor_tooltip:0 "\nSchlagen Sie ein §YMilitärbündnis§! mit §Y[ENG.GetNameDefCap]§! vor. Sollten sie sich jedoch der §YAchse§! anschließen, müssen wir ihrer Entscheidung folgen.\n\n§RDa [ENG.GetNameDefCap] nicht mehr demokratisch ist, werden durch diesen Fokus auch Entscheidungen des Kolonialreichs freigeschaltet.§!"
 POR_windsor_allies:0 "Schließen Sie sich den Verbündeten an"
 POR_windsor_allies_desc:0 "Es ist an der Zeit, sich voll und ganz für die Alliierten einzusetzen und mit ihnen die Freiheit zu verteidigen."
 POR_usa_deal:0 "Aushandeln von Garantien"
 POR_usa_deal_desc:0 "Ein letzter Schritt, um sicherzustellen, dass wir einige unserer Kolonien ohne ausländische Einmischung zurückbekommen. Wir müssen Botschafter in die USA schicken, um mit [USA.GetLeader] zu verhandeln."
 POR_usa_deal_tooltip:0 "\nAbhängig vom zuvor gewählten Pfad wird §Y[USA.GetNameDefCap]§! prüfen, ob einige oder keine der §YGarantien§! aufgehoben werden sollen."
 POR_ukpba:0 "Kolonialreich"
 POR_ukpba_desc:0 "Schaltet Länderentscheidungen frei, um unser ehemaliges Imperium wiederherzustellen."
 ################  HERÓIS DO MAR  ###############
 POR_navy_dockyard_lisbon:0 "Lisnave-Werften"
 POR_navy_dockyard_lisbon_desc:0 "Estaleiros Navais de Lisboa (Lisnave) ist ein Schiffbau- und Reparaturunternehmen. Es ist Teil der Wachstumsstrategie der portugiesischen Marine, um die unbestreitbare Bedeutung der Entwicklung, des Baus und der Unterstützung der Flotte zu gewährleisten."
 POR_navy_dockyard_lisbon_3:0 "Erweiterung der Lisnave-Werften"
 POR_navy_dockyard_lisbon_3_desc:0 "Um eine wirklich bemerkenswerte Marine aufzubauen, müssen wir unsere Schiffsbaukapazitäten erheblich erweitern. Der Ausbau der Lisnave-Werften verschafft uns einen Vorteil bei der Schiffsgeschwindigkeit."
 POR_navy_planning_bonus:0 "Erhöhung des Marinebudgets"
 POR_navy_planning_bonus_desc:0 "Unsere Marine darf nicht an den Rand gedrängt und in eine untergeordnete Rolle versetzt werden. Sie muss neu organisiert werden, um mit ausländischen Mächten konkurrieren zu können."
 POR_navy_planning_bonus_2:0 "Marineplanung"
 POR_navy_planning_bonus_2_desc:0 "Unsere Marineplanung hinkt Ländern wie Großbritannien noch immer einige Meilen hinterher. Das müssen wir ändern, um die Meere beherrschen zu können."
 POR_navy_planning_bonus_3:0 "Neue Navigationssysteme"
 POR_navy_planning_bonus_3_desc:0 "Neue und verbesserte Navigationssysteme sind in unserer U-Boot-Flotte willkommen."
 POR_navy_planning_bonus_4:0 "Moderne Marine"
 POR_navy_planning_bonus_4_desc:0 "Eine echte Flotte braucht ein Flaggschiff, das unser Ziel klar verdeutlicht: den Bau eines der größten, mächtigsten und modernsten Schlachtschiffe der Welt, damit wir die absolute Kontrolle über die Meere erlangen können!"
 POR_navy_dockyard_porto:0 "Alfeite Arsenal"
 POR_navy_dockyard_porto_desc:0 "Arsenal do Alfeite ist ein Schiffbau- und Reparaturunternehmen. Es widmet sich hauptsächlich der Befriedigung des Bau-, Wartungs- und Reparaturbedarfs der portugiesischen Marine und setzt dabei fortschrittliche Technologien ein, insbesondere in den Bereichen Elektronik, Optronik, Bewaffnung, Mechanik und Elektrotechnik."
 POR_navy_dockyard_porto_2:0 "Almada als Hauptstadt des Schiffbaus"
 POR_navy_dockyard_porto_2_desc:0 "Almada ist das Herz unserer Schiffsindustrie. Durch die Koordination von Lisnave und Alfeite wird sich die Geschwindigkeit unseres Schiffsbaus erheblich verbessern."
 POR_navy_dockyard_porto_3:0 "Erweitern Sie das Alfeite-Arsenal"
 POR_navy_dockyard_porto_3_desc:0 "Um eine wirklich bemerkenswerte Marine aufzubauen, müssen wir unsere Schiffsbaukapazitäten erheblich erweitern. Der Ausbau des Alfeite-Arsenals verschafft uns einen Vorteil bei der Feuerkraft unserer Marine."
 ##END
 ################  NOBRE POVO  ###############
 POR_organisation_of_1937:0 "Armeereorganisation von 1937"
 POR_organisation_of_1937_desc:0 "Im Jahr 1937 kam es zu einer Umstrukturierung der Streitkräfte, die als „Organisation von 1937“ bekannt wurde. Die Militärpolitik wurde definiert und es wurden Führungsgremien eingerichtet, die dafür sorgten, dass unsere Armee zu einer ernstzunehmenden Streitmacht wurde, auf die die Landesverteidigung zählen konnte."
 POR_instituto:0 "Institut für Höhere Militärstudien"
 POR_instituto_desc:0 "Das Instituto de Altos Estudos Militares ist eine Bildungseinrichtung zur Zusatzausbildung von Offizieren der portugiesischen Armee in den Bereichen Oberkommando und Stab."
 POR_tech_artillery:0 "Artillerieausbildung"
 POR_tech_artillery_desc:0 "Durch die Einführung schlagkräftiger Artillerieregimenter in unseren Divisionen wird ihre Gesamtkampfstärke erheblich gesteigert."
 POR_inf:0 "Modernisierung von Kleinwaffen"
 POR_inf_desc:0 "Wenn wir dafür sorgen, dass unsere Truppen mit der besten Ausrüstung ausgestattet sind, wird sich nicht nur ihre Effektivität steigern, sondern auch ihre Moral verbessern."
 POR_inf_2:0 "Effiziente Gewehr-Montagelinien"
 POR_inf_2_desc:0 "Erhöhen Sie die Geschwindigkeit unserer Montage und Konstruktion von Gewehren."
 POR_tank:0 "Panzerexperimente"
 POR_tank_desc:0 "Wer Traktoren bauen kann, kann auch Panzer bauen! Wir dürfen nicht zulassen, dass unsere Panzerproduktionskapazitäten zurückbleiben."
 POR_tank2:0 "Effiziente Tank-Montagelinien"
 POR_tank2_desc:0 "Erhöhen Sie die Geschwindigkeit unserer Montage und Konstruktion von Panzern."
 POR_tech_motorized:0 "Mechanisierte Infanterie"
 POR_tech_motorized_desc:0 "Mobilität und Schutz sind entscheidend für den sicheren Transport der Infanterie ins Feld und wieder hinaus. Wenn wir uns auf diese Entwicklungen konzentrieren, können wir schnell handeln."
 POR_tech_2:0 "Unterstützungstrupps"
 POR_tech_2_desc:0 "Wer die moderne Kriegsführung nicht gut versteht, geht davon aus, dass Unterstützungstruppen im Kampf nicht unbedingt erforderlich sind. Und damit liegen Sie völlig falsch."
 POR_tech_3:0 "Militärische Auftragnehmer"
 POR_tech_3_desc:0 "Da unsere ständig wachsende Armee immer mehr Nachschub benötigt, sind weitere Lobbyarbeit erforderlich, um sie mit dem zu versorgen, was sie braucht."
 POR_paratrooper:0 "Fallschirmjäger-Training"
 POR_paratrooper_desc:0 "Die Idee, Truppen per Flugzeug abzusetzen, ist zwar nicht neu, wurde aber erst vor kurzem erfolgreich umgesetzt. Selbst dann wird die Durchführbarkeit und Praktikabilität vieler noch immer angezweifelt. Voraussetzung für ein erfolgreiches Manöver ist der Einsatz von Spezialeinheiten, die sich nach einer solchen Landung neu organisieren und hinter den feindlichen Linien kämpfen können."
 POR_extra_research_slot:0 "Weitere Erhöhung der Wissenschaftsmittel"
 POR_extra_research_slot_desc:0 "Überall tauchen vielversprechende junge Köpfe auf. Wir müssen ihnen die nötigen Forschungsmöglichkeiten bieten. Technologische Fortschritte können uns dort einen Vorsprung verschaffen, wo wir ihn am meisten brauchen."
 POR_lusitanean_bravery:0 "Lusitanische Tapferkeit"
 POR_lusitanean_bravery_desc:0 "Wir fürchten den Tod nicht, insbesondere nicht auf dem Schlachtfeld, denn es gibt keine größere Ehre, als im Namen unserer Flagge, unseres Volkes und unseres Erbes zu sterben!"
 ##END
 ##############  FORÇA AEREA  #################
 POR_ogma:0 "OGMA"
 POR_ogma_desc:0 "OGMA wurde im Rahmen der Umstrukturierung des Luftfahrtdienstes der portugiesischen Armee unter dem Namen Parque de Material Aeronáutico (Luftfahrtmaterialdepot) gegründet und ist für die Lagerung, Reparatur, Herstellung und Bereitstellung von Luftfahrtmaterial sowie für die Ausbildung militärischer Luftfahrtspezialisten und -techniker verantwortlich."
 POR_new_pilot:0 "Verbesserte Pilotenausbildung"
 POR_new_pilot_desc:0 "In der Zwischenkriegszeit waren unsere Kampfpiloten auf eine informelle Ausbildung angewiesen, die von lokalen Ausbildern und sehr unterschiedlichen Kompetenzniveaus durchgeführt wurde. Jetzt, da die Luftwaffe zu einer starken und professionellen Truppe reformiert wird, müssen wir unsere Pilotenausbildung standardisieren, um die Qualität unserer Piloten landesweit zu verbessern."
 POR_sky_defense:0 "Flugabwehr"
 POR_sky_defense_desc:0 "Es besteht keine Frage, woher der Feind kommen wird; wir müssen unsere Industrie mit Flugabwehrbatterien schützen."
 POR_heavy_planes:0 "Bomberforschung"
 POR_heavy_planes_desc:0 "Unsere Ressourcen wären am besten für den Aufbau einer Luftwaffe geeignet, die unsere Truppen unterstützen und weitreichende Vergeltungsschläge gegen unsere Feinde durchführen kann."
 POR_light_planes:0 "Kämpferforschung"
 POR_light_planes_desc:0 "Investitionen in Kampfflugzeuge sind für den Erwerb und die Aufrechterhaltung der Luftüberlegenheit von entscheidender Bedeutung."
 POR_cas_bonus:0 "CAS-Aufwand"
 POR_cas_bonus_desc:0 "Eine moderne Armee benötigt nicht nur am Boden, sondern auch in der Luft die Unterstützung durch Fahrzeuge."
 POR_radar_bonus:0 "Radartechnologie"
 POR_radar_bonus_desc:0 "Die Fähigkeit, feindliche Bomber zu erkennen, wird für die Kriegsanstrengungen von entscheidender Bedeutung sein. Wir sollten keine Ressourcen scheuen, um die Radartechnologie weiterzuentwickeln und ein Netzwerk von Ortungsstationen entlang der Küsten aufzubauen."
 POR_new_tech:0 "Raketentests"
 POR_new_tech_desc:0 "Raketen- und Düsentriebwerke ermöglichen sowohl unbemannten als auch bemannten Schiffen beispiellose Geschwindigkeiten. Die Entwicklung dieser Technologien wird es uns ermöglichen, den Feind zu überraschen."
 POR_dominar_costa:0 "Küstenpatrouille"
 POR_dominar_costa_desc:0 "Wir müssen unsere Küsten schützen und Luftpatrouillen in unseren Heimat- und Überseegebieten durchführen."
 POR_dominate_sky:0 "Beherrsche den Himmel"
 POR_dominate_sky_desc:0 "Durch die Nutzung unseres Wissens und einer überlegenen Flugzeugproduktion können wir eine wirklich moderne Luftwaffe aufbauen und die Kontrolle über den lusitanischen Himmel zurückgewinnen."


