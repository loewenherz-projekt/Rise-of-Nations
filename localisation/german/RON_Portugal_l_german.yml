 ### POR - Portugal - Tanks ###

POR_gw_tank_equipment:0 "Renault FT-17"
POR_gw_tank_equipment_short:0 "FT-17"

POR_light_tank_equipment_1:0 "L3/30 Tankette"
POR_light_tank_equipment_1_short:0 "L3"
POR_light_tank_equipment_1_desc:0 "Der L3 war ein von den Italienern für den italienischen Feldzug in Afrika entwickelter Panzer. Er wurde von der italienischen Armee eingesetzt und die Drucke nach Portugal importiert."

POR_light_tank_equipment_2:0 "L6/40 Tankette"
POR_light_tank_equipment_2_short:0 "L6"
POR_light_tank_equipment_2_desc:0 "Die L6 war eine schwerere Tankettenvariante, die von den Italienern entwickelt wurde. Sie wurde von der italienischen Armee eingesetzt und die Drucke nach Portugal importiert."

POR_light_tank_equipment_3:0 "Leichter Panzer M24 Chaffee"
POR_light_tank_equipment_3_short:0 "M24"
POR_light_tank_equipment_3_desc:0 "Der leichte Panzer M24 Chaffee war ein von den Vereinigten Staaten von Amerika gebauter Panzer. Der Chaffee wurde aus den USA importiert und während des Krieges als leichter Panzer für die portugiesische Armee eingesetzt."

advanced_light_tank:0 "Leichter Panzer M24 Chaffee"

POR_medium_tank_equipment_1:0 "Centaur A-27L Mark I"
POR_medium_tank_equipment_1_short:0 "Zentaur I"
POR_medium_tank_equipment_1_desc:0 "Der Centaur A-27L war der erste einer Panzerserie, die vom Vereinigten Königreich produziert wurde. Die portugiesische Armee erwarb während ihres Krieges gegen die Deutschen mehrere Modelle des Centaur-Panzers."

POR_medium_tank_equipment_2:0 "Sherman M4A3-P75"
POR_medium_tank_equipment_2_short:0 "M4A3-P75"
POR_medium_tank_equipment_2_desc:0 "Nach dem Centaur wurde der Sherman aus den Vereinigten Staaten importiert, um im Kampf gegen die Deutschen zu helfen und die Kriegsziele der Alliierten zu fördern."

improved_medium_tank:0 "Sherman M4A3-P75"

POR_medium_tank_equipment_3:0 "Sherman M4A3-P105"
POR_medium_tank_equipment_3_short:0 "M4A3-P105"
POR_medium_tank_equipment_3_desc:0 "Der neue Sherman hatte eine verbesserte 105-mm-Kanone. Importiert aus den USA."

POR_heavy_tank_equipment_1:0 "Vickers A1E1 „Independent“"
POR_heavy_tank_equipment_1_short:0 "V-A1E1"
POR_heavy_tank_equipment_1_desc:0 "Der Vickers A1E1 „Independent“ ist ein betagter schwerer Panzer, der kurz nach dem Ersten Weltkrieg vom Vereinigten Königreich entwickelt wurde. Die Portugiesen importierten diese Fahrzeuge zu Beginn des Krieges in sehr geringer Stückzahl."

POR_heavy_tank_equipment_2:0 "Churchill Mark IV"
POR_heavy_tank_equipment_2_short:0 "Churchill"
POR_heavy_tank_equipment_2_desc:0 "Der Churchill Mark IV ist ein britischer Panzer, der den Portugiesen im Rahmen des Leih- und Pachtgesetzes geschenkt wurde. Der PORek Churchill wurde jedoch im Inland modifiziert."

improved_heavy_tank:0 "Churchill Mark IV"

POR_heavy_tank_equipment_3:0 "Schwerer Panzer M14"
POR_heavy_tank_equipment_3_short:0 "M14"
POR_heavy_tank_equipment_3_desc:0 "Der schwere Panzer M14 war ein in den USA gebautes Fahrzeug der portugiesischen Armee. Die portugiesische Armee erwarb eine modifizierte Version, um die Rolle eines schweren Panzers zu übernehmen."

POR_super_heavy_tank_equipment_1:0 "Adamastor VK 4503"
POR_super_heavy_tank_equipment_1_short:0 "Adamastor"
POR_super_heavy_tank_equipment_1_desc:0 "Der Adamastor war ein portugiesisches Versuchspanzermodell auf Basis des deutschen VK 4502, das zwar nie gebaut, aber gegen Kriegsende entwickelt wurde. Der Adamastor galt als überschwerer Panzer, wurde jedoch nie gebaut."

POR_modern_tank_equipment_1:0 "M46-P90"
POR_modern_tank_equipment_1_short:0 "M46-P90"
POR_modern_tank_equipment_1_desc:0 "Der M46 Patton Heavy Tank war ein in den USA gebautes Fahrzeug der portugiesischen Armee. Die portugiesische Armee erwarb eine modifizierte Version, um die Rolle eines Hauptpanzers zu übernehmen"

