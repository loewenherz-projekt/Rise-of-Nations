POR_jet_tac_bomber_equipment_1_desc:0 "Die de Havilland DH 112 Venom war ein britisches einmotoriges Düsenflugzeug der Nachkriegszeit, das aus der de Havilland Vampire weiterentwickelt wurde. Es diente bei der Royal Air Force als einsitziger Jagdbomber und zweisitziger Nachtjäger."
