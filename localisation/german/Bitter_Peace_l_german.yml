# East ##############################################################################################################################################################################
#####################################################################################################################################################################################

BP_germany.500.t:0 "Barbarossa – Logistische Herausforderung"
BP_germany.500.d:0 "1941 lieferten die deutsche Industrie und innereuropäische Importe genügend Lebensmittel, Treibstoff und Munition, um eine teilweise motorisierte Armee von etwa drei Millionen Mann in einem großen, auf etwa siebzehn Wochen angelegten Feldzug zu versorgen. Fast ein Jahr lang hatten die Deutschen Zeit, sich auf Barbarossa vorzubereiten, zu produzieren und Vorräte anzulegen. Sie verfügten über genügend grundlegendes Kriegsmaterial, um 1941 in der Sowjetunion zu siegen. Das logistische Problem der Deutschen bestand darin, Material aus ausreichenden Lagern zu einer Armee zu transportieren, die unter schwierigen Bedingungen in einem großen Land ohne Normalspurbahnen und mit unbefestigten Straßen operierte. Die Deutschen konzentrierten ihre Logistik auf den Bau von Eisenbahnlinien und Bahnhofsanlagen. Sie organisierten außerdem große LKW-Truppen, um Material aus Lagern an der Grenze abzutransportieren, bis die neuen Eisenbahnlinien fertiggestellt und Bahnhöfe (d. h. Bahnhöfe, an denen Vorräte gelagert wurden) in der Sowjetunion eingerichtet waren. Die Deutschen organisierten hinter jeder Heeresgruppe große logistische LKW-Truppen, um Vorräte von den Grenzbahnhöfen abzuholen und sie möglichst nahe an den vorrückenden Feldarmeen auf LKW-Deponien zu liefern. Die Lkw-Streitkräfte, die für den Transport von Vorräten in flexible Fahrzeugkolonnen mit je 60 Tonnen Kapazität aufgeteilt waren, würden zwischen den Lagerstätten an der Grenze und zurück verkehren, bis die neuen Bahnhöfe und die deutschen Schienenstrecken den Verkehr in die Sowjetunion zu den vorgelagerten Schienensträngen aufnehmen könnten."
BP_germany.500.a:0 "Verdammt!"

BP_germany.501.t:0 "General Moroz"
BP_germany.501.d:0 "Die Härte des russischen Winters wird oft mit russischen Militärsiegen in Verbindung gebracht. Im Großen Nordischen Krieg marschierte Karl XII. von Schweden 1707 in das Russland Peters des Großen ein. Die Russen zogen sich zurück und verfolgten eine Politik der verbrannten Erde. Dieser Winter war der brutalste des 18. Jahrhunderts, so streng, dass der Salzwasserhafen von Venedig zufror. Karls 35.000 Soldaten wurden geschwächt, und im Frühjahr waren nur noch 19.000 übrig. Die Schlacht von Poltawa 1709 besiegelte das Ende des schwedischen Reiches. Napoleons Grande Armée mit 610.000 Mann marschierte 1812 in Russland ein und rückte in Richtung Moskau vor. Die russische Armee zog sich vor den Franzosen zurück und brannte erneut deren Ernten und Dörfer nieder, um sie dem Feind zu verwehren. Napoleons Armee wurde schließlich auf 100.000 Mann reduziert. Im kalten Winter 1941/42 fehlte es der Wehrmacht aufgrund der zahlreichen Verzögerungen bei den deutschen Truppenbewegungen an notwendigen Vorräten, beispielsweise an Winteruniformen. Hitler war so von einem schnellen Sieg überzeugt, dass er sich nicht einmal auf die Möglichkeit eines Winterkriegs in Russland vorbereitete. Dennoch erlitt seine Ostarmee in den ersten fünf Monaten der Invasion mehr als 734.000 Verluste (etwa 23 Prozent ihrer durchschnittlichen Stärke von 3.200.000 Mann)."
BP_germany.501.a:0 "Verdammt!"

BP_germany.502.t:0 "Linie Archangelsk-Astrachan"
BP_germany.502.d:0 "Die Linie Archangelsk-Astrachan oder „Flugabwehrlinie“ war das militärische Ziel des Unternehmens Barbarossa. Sie ging auf eine frühere militärische Studie von Erich Marcks mit dem Titel „Unternehmen Draft Ost“ zurück. Die hypothetische Flugabwehrlinie sollte sich von der Hafenstadt Archangelsk am Weißen Meer entlang der Wolga-Mündung bis zur Hafenstadt Astrachan am Kaspischen Meer erstrecken. Diese Studie ging davon aus, dass die Operation neun bis siebzehn Wochen dauern würde.\n \nUnternehmen Barbarossa sollte dieses Ziel vor Wintereinbruch 1941 erreichen. Dies hätte die Besetzung des größten Teils der Industrie-, Bevölkerungs-, Lebensmittel- und Brennstoffzentren der Sowjetunion zur Folge und würde diese nach Kriegsende handlungsunfähig machen. Die verbleibenden sowjetischen Industriezentren östlich des Urals und darüber hinaus sollten durch Luftangriffe zerstört werden."
BP_germany.502.a:0 "Russland wird nie wieder auferstehen."

BP_germany.503.t:0 "Gewaltenteilung"
BP_germany.503.d:0 "Am 15. Dezember 1941 schlugen die Japaner Deutschland eine Aufteilung der jeweiligen Einflusssphären auf dem asiatischen Kontinent vor. Dieser Vorschlag sah eine territoriale Regelung entlang des 70. östlichen Längengrades vor. Die Deutschen reagierten zunächst skeptisch, da sie befürchteten, dass er einen unwillkommenen Präzedenzfall für künftige Teilungen politischer Einheiten entlang dieser Trennlinie schaffen könnte. Zudem enthielt er kein Versprechen japanischer Militärunterstützung gegen die UdSSR. Die Wehrmacht kritisierte diesen Vorschlag außerdem, weil er willkürlich bestehende Staaten durchtrennte, ohne Rücksicht auf die natürlichen geographischen Gegebenheiten oder wirtschaftlichen Belange, die die Existenz dieser Einheiten ermöglichten. Sie schlugen als Gegenvorschlag eine Teilung entlang bestehender Staatsgrenzen vor, die entlang der Ostgrenze des Iran, Nordafghanistans, der Westgrenze Chinas und schließlich entlang des Jenissei verliefen. Hitler stimmte dem japanischen Vorschlag zu. Dies lag wahrscheinlich daran, dass er nicht glaubte, dass Deutschland jemals sowjetisches Territorium jenseits des Uralgebirges erobern würde."
BP_germany.503.a:0 "Die neue Ordnung wurde formalisiert."

BP_germany.504.t:0 "Verhandlungen mit Japan"
BP_germany.504.d:0 "Nach dem Fall wichtiger sowjetischer Städte begann Deutschland rasch eine diplomatische Kampagne mit Japan. Da die sowjetische Armee die meisten ihrer mandschurischen Divisionen zur Verteidigung gegen den Ansturm der deutschen Armee verlegt hatte, konnte Japan problemlos wichtige Städte im Osten besetzen, was die Moral der Roten Armee erheblich schwächen und die Sowjetunion in einen Zweifrontenkrieg zwingen würde."
BP_germany.504.a:0 "Bitten Sie um Unterstützung"
BP_germany.504.b:0 "Allein sind wir besser"	

BP_germany.505.t:0 "Reaktion der Japaner"
BP_germany.505.d_agree:0 "Wir haben Japan um ein gemeinsames Vorgehen gegen die Sowjetunion gebeten und die Zustimmung dazu erhalten."
BP_germany.505.d_disagree:0 "Trotz aller Bemühungen, Japan für einen Krieg mit der UdSSR zu gewinnen, stieß unser jüngster Vorschlag auf wenig Begeisterung. [From.GetLeader] und die Regierung weigerte sich, sich dem Krieg anzuschließen, mit der Begründung, dass „im Moment alle unsere Ressourcen auf den pazifischen Kriegsschauplatz gerichtet sind“."
BP_germany.505.a:0 "Großartig!"
BP_germany.505.b:0 "Verdammt!"

BP_germany.506.t:0 "Sibirische Neutrale Zone"
BP_germany.506.d:0 "Als Ergebnis der Verhandlungen zwischen Japan und Deutschland wurde die Schaffung einer sibirischen Neutralen Zone am Jenissei beschlossen. Dies soll die freundschaftlichen und verbündeten Absichten unserer Staaten zum Ausdruck bringen."
BP_germany.506.a:0 "Wir sind der Neuen Ordnung einen Schritt näher!"

BP_germany.507.t:0 "Operation Charlemagne"
BP_germany.507.d_A_A_line:0 "Nach dem Erfolg des Unternehmens Barbarossa konzentrierte sich das Dritte Reich auf die Festigung seiner Eroberungen westlich der Wolga. Unterdessen hielten die Überreste der Sowjetunion die verbliebenen Gebiete im Uralgebirge, Zentralasien und Sibirien wackelig unter Kontrolle. Dank Stalins Entscheidung, einen Großteil der Schwerindustrie der UdSSR in den Ural und nach Sibirien zu verlagern, reichte das industrielle Potenzial der Sowjetunion noch immer aus, um jene Teile der Roten Armee zu versorgen, die im deutschen Blitzkrieg nicht zerstört wurden. Obwohl sie die Wolga nur von Osten aus betrachten können, stellen die Sowjets noch immer eine potenzielle Bedrohung für die Neue Ordnung dar. Seit dem Ende des Ersten Krieges gegen die UdSSR sind Jahre vergangen, und das Dritte Reich ist stärker denn je. Hitlers Traum, die Grenzen Europas bis zum Ural auszudehnen, wurde bisher nicht verwirklicht – die politische Zweckmäßigkeit und die Realität der Herausforderungen des Unternehmens Barbarossa erlaubten es uns nicht, dies im Zuge unseres ersten Friedensvertrags mit der bolschewistischen Bedrohung zu erreichen. Es ist Zeit, den Bolschewismus vom Erdboden zu tilgen, Europa zu schützen und das Schicksal des Reiches zu erfüllen!"
BP_germany.507.a:0 "Vom Atlantik bis zum Ural! Vorwärts!"
BP_germany.507.d_Ural:0 "Nach dem Erfolg des Unternehmens Barbarossa konzentrierte sich das Dritte Reich auf die Festigung seiner Kontrolle über die Eroberungen westlich des Urals. Unterdessen hielten die Überreste der Sowjetunion die verbliebenen Gebiete in Zentralasien und Sibirien wackelig unter Kontrolle. Dank Stalins Entscheidung, einen Großteil der Schwerindustrie der UdSSR in den Ural und nach Sibirien zu verlagern, reichte das industrielle Potenzial der Sowjetunion noch immer aus, um jene Teile der Roten Armee zu versorgen, die durch den deutschen Blitzkrieg nicht zerstört wurden. Obwohl die Sowjets den Ural nur von Osten aus betrachten können, stellen sie noch immer eine potenzielle Bedrohung für die Neue Ordnung dar. Seit dem Ende des Ersten Krieges gegen die UdSSR sind Jahre vergangen, und das Dritte Reich ist stärker denn je. Hitlers Traum, die Grenzen Europas bis zum Jenissei auszudehnen, wurde bisher nicht verwirklicht – die politische Zweckmäßigkeit und die Realität der durch das Unternehmen Barbarossa entstandenen Herausforderungen ließen dies während unseres ersten Friedensvertrags mit der bolschewistischen Bedrohung nicht zu. Es ist Zeit, den Bolschewismus vom Erdboden zu tilgen, Europa zu schützen und das Schicksal des Reiches zu erfüllen!"
BP_germany.507.b:0 "Vom Atlantik zum Jenissei! Vorwärts!"

BP_germany.508.t:0 "Der Vertrag von Moskau"
BP_germany.508.d:0 "Die Sowjets stimmten unseren Forderungen zu. Der Krieg im Osten ist beendet. Dank brillanter Führung und der Überlegenheit der Wehrmacht fielen die Städte Moskau, Leningrad und Stalingrad unserem wütenden Blitzkrieg zum Opfer. Die Führung der Sowjetunion wusste, dass der völlige Zusammenbruch ihres degenerierten Staates unausweichlich war und sie gezwungen war, unseren Forderungen nachzugeben oder der völligen Vernichtung entgegenzusehen. In Moskau wurde ein endgültiger Friedensvertrag zwischen Vertretern der verbliebenen sowjetischen Führung und der deutschen Delegation unter Joachim von Ribbentrop unterzeichnet. Die völlige Demütigung der sowjetischen Delegation war spürbar, als sie gezwungen wurde, sich unseren Forderungen im Kreml zu beugen. Während der Delegationsreisen marschierten Wehrmachtssoldaten triumphierend über den Roten Platz, während die Reichskriegsflagge über der Basilius-Kathedrale gehisst wurde. Wo Napoleon gescheitert war, hat das Reich gesiegt.\n \nUnsere Forderungen waren klar: Alle Gebiete westlich der Wolga sollten auf ewig an das Reich abgetreten werden. Dazu gehörten auch das Gebiet um Astrachan und das gesamte Gebiet westlich der Flüsse Suchana und Dwina, einschließlich der Stadt Archangelsk. Das gesamte Gebiet zwischen dem Finnischen Meerbusen und der Barentssee sollte an Finnland abgetreten oder nach eigenem Ermessen unter deutsche Verwaltung gestellt werden. Bessarabien sollte an Rumänien zurückgegeben werden, und das Gebiet von Odessa bis zum Dnister sollte ebenfalls an Rumänien abgetreten werden.\n \nDer Krieg im Osten, oder wie Hitler ihn später nannte: „Der Germanische Erweckungskrieg“, ist zu Ende. Sieg!"
BP_germany.508.a:0 "Der Drang nach Osten ist endlich realisiert!" 
BP_germany.508.b:0 "Der Drang nach Osten ist endlich realisiert!" 
BP_long_loading_tt:0 "§RWerde mit der Übertragung der Regionen deiner Kommissariate beginnen. Achtung! Die Übertragung einer großen Anzahl von Regionen kann je nach Konfiguration deines Computers zu Abstürzen und dauerhaftem Einfrieren führen.§!\n \n"

BP_germany.509.t:0 "Siegesparade in Berlin"
BP_germany.509.d:0 "Zum Kriegsende im Osten fand in Berlin eine große Parade statt. Seit der Unterzeichnung des Friedensvertrages mit den Sowjets haben Goebbels und sein Stab in aller Eile die prestigeträchtigsten Feierlichkeiten vorbereitet, die Deutschland je erlebt hat. Der Führer selbst reitet mit, sehr zur Bewunderung der jubelnden Menge. Gerüchte über seinen schlechten Gesundheitszustand sind ernsthaft in Zweifel gezogen worden, da er, gestärkt durch den Sieg über die Sowjetunion, vitaler denn je wirkt.\n \nViele unserer Männer von der Ostfront erhielten vorübergehenden Urlaub, um an diesem bedeutsamen Ereignis teilzunehmen – sehr zur Freude ihrer Familien und junger deutscher Frauen, die ihre Rückkehr sehnsüchtig erwartet hatten. Sie kehren nicht nur als Soldaten heim, sondern als Helden, die die größte Bedrohung, die die europäische Zivilisation je kannte, besiegt haben – den Bolschewismus. Die Luftwaffe erhebt sich in der größten Flugschau aller Zeiten in den Himmel, während die Wehrmacht in perfekter Harmonie in den Straßen darunter marschiert.\n \nDas Ereignis war zwar ein echter Ausdruck der Erleichterung über den siegreichen Ausgang des titanischen Kampfes gegen die Sowjets, war aber in erster Linie als Propagandashow konzipiert, um die deutsche Öffentlichkeit im Hinblick auf unsere bevorstehenden Kämpfe zu beruhigen.\n \nDie verbleibenden alliierten Nationen müssen noch davon überzeugt werden, ihren sinnlosen Kampf gegen das Reich einzustellen, und Hitlers Vision eines Endes Europas am Ural ist noch nicht in Erfüllung gegangen. Darüber hinaus steht uns unsere größte logistische Herausforderung noch bevor: die Eingliederung unserer östlichen Eroberungen in das Reich. Zu diesem Zweck wurde ein spezielles Programm geschaffen: der Generalplan Ost."
BP_germany.509.a:0 "Es gibt viel zu tun. Jetzt feiern unsere Helden erst einmal." 

BP_germany.510.t:0 "Helden der Ostfront"
BP_germany.510.d:0 "Die Verleihung militärischer Auszeichnungen ist eine lange preußische Tradition und soll die Verdienste deutscher Soldaten würdigen. Nach Abschluss des Unternehmens Barbarossa ordnete der Führer umgehend die Schaffung einer Reihe von „Ostfront“-Medaillen an, um der Soldaten zu gedenken, die tapfer gegen die bolschewistische Bedrohung gekämpft hatten. Jeder Soldat, der an den Konflikten teilnahm, erhielt zur Verewigung seines Einsatzes die Medaille „Held der Ostfront“. Viele dieser Auszeichnungen wurden posthum verliehen.\n \nAußerdem wurden besondere Auszeichnungen wie der „Ritter von Moskau“ und der „Schild von Stalingrad“ an diejenigen verliehen, die an Schlüsselschlachten teilnahmen, in denen sowjetische Großstädte fielen. Deutsche Feldmarschälle, die das Unternehmen Barbarossa leiteten, wurden mit dem „Großkreuz der Ostfront“ ausgezeichnet – eine Ehre, die unter allen im Dritten Reich verliehenen Auszeichnungen ihresgleichen suchte."
BP_germany.510.a:0 "Wir verdanken alles unseren Rittern des 20. Jahrhunderts" 

BP_germany.511.t:0 "Erfolgreicher Kreuzzug gegen den Bolschewismus"
BP_germany.511.d:0 "Der Krieg gegen die Sowjetunion wurde nicht allein von den deutschen Streitkräften geführt. Über 20 europäische Länder und verschiedene Nationalitäten beteiligten sich an dieser gewaltigsten Militäroperation der Weltgeschichte. Schätzungsweise 4 Millionen Wehrpflichtige und Freiwillige aus ganz Europa kämpften an der Ostfront. Viele dieser Soldaten bildeten das Rückgrat von Organisationen wie der Waffen-SS und leisteten damit einen wichtigen Beitrag zur Kriegsführung. Nach Hitlers Kriegserklärung 1941 nahm der Konflikt gegen die Sowjetunion eine einzigartige ideologische Note an, die es in den Kriegen vor dem 20. Jahrhundert nicht gegeben hatte. Während Kriege in der Vergangenheit oft religiöse, wirtschaftliche und dynastische Gründe hatten, basierte der Ausbruch zwischen dem nationalsozialistischen Deutschland und Sowjetrussland sowohl auf Hitlers Wunsch nach Lebensraum im Osten als auch auf seiner ideologischen Überzeugung, dass der Bolschewismus die größte Bedrohung für die europäische Zivilisation darstellte und schließlich versuchen würde, den gesamten Planeten zu beherrschen.\n \nDieser moderne Kreuzzug war erfolgreich, und wir haben die Freiheit Europas von denen gesichert, die es und seine Nachkommen versklaven wollten. Die asiatischen Horden wurden zurückgeschlagen und der Bolschewismus dank des selbstlosen Heldentums europäischer Soldaten eingedämmt. Rettung!"
BP_germany.511.a:0 "Wir sind die Retter Europas!"

BP_germany.512.t:0 "Ruhm des Reiches"
BP_germany.512.d:0 "Nach der Machtübernahme im Deutschen Reich 1933 wuchs der Personenkult um Adolf Hitler mit jedem Jahr. Hitlers diplomatisches Geschick und seine Staatskunst retteten Deutschland nach der Demütigung des Versailler Vertrags und katapultierten es aus dem völligen Zusammenbruch zu einer der mächtigsten Nationen der Welt. Hitler verkörperte den Willen des Reiches in der konzentrierten Absicht eines einzelnen Mannes und besiegte alle, die sich ihm in den Weg stellten. Der Fall Frankreichs 1940 schockierte die Welt; viele glaubten, Frankreich besitze noch immer die stärkste Landarmee der Welt. Was dem Zweiten Reich in den vier Jahren des schrecklichen Ersten Weltkriegs nicht gelang, erreichte das Dritte Reich in weniger als zwei Monaten. \n \nNachdem nun auch die Sowjetunion dem Willen des Führers und der Stärke deutschen Stahls erlegen ist, gibt es nur noch wenige, die seiner Neuen Ordnung im Weg stehen. Während der Operation Barbarossa schaute die Welt zu. Die Legitimität der nationalsozialistischen Ideologie hat sich auf dem Schlachtfeld bewährt, und die Menschen auf der Welt passen ihre Weltanschauung entsprechend an.\n \n„Die große Stärke des totalitären Staates besteht darin, dass er diejenigen, die ihn fürchten, dazu zwingt, ihn nachzuahmen.“ – Adolf Hitler"
BP_germany.512.a:0 "Bei einem Zusammenprall der Ideologien wird der Stärkste die Oberhand gewinnen." 

BP_germany.513.t:0 "Der Faschismus auf dem Vormarsch"
BP_germany.513.d:0 "Die unglaublichen Siege des Dritten Reichs bleiben den Menschen unserer Nation nicht verborgen – der Fall der Sowjetunion lässt viele von ihnen an die Legitimität Adolf Hitlers und seiner Ideen glauben!"
BP_germany.513.a:0 "Die Welt ist ein unbeständiger Ort." 

BP_germany.514.t:0 "Kontrolle über das europäische Russland"
BP_germany.514.d:0 "In den letzten Wochen, als unsere vorgeschobenen Wehrmachtstruppen die Front immer weiter nach Osten vordrangen, erreichten wir schließlich den Ural: die Grenze des europäischen Russlands. Vom Atlantik bis zum Ural, unter der festen Kontrolle der Achsenmächte, wurden die ursprünglichen Pläne unserer Expansion nach Osten endlich Wirklichkeit – nicht nur auf dem Papier, sondern in der Realität. Ohne die wichtigen Industriezentren, die Städte und die Ölfelder des Kaukasus werden die Überreste der Sowjetunion irgendwann in Vergessenheit geraten und als Erinnerung in die Asche der Geschichte geworfen werden. Jetzt, da ganz Europa unter deutscher Kontrolle ist, können wir beginnen, weiter nach Osten zu blicken, um unseren Einfluss in Zentralasien zu festigen und vielleicht sogar eine deutsche Präsenz in Sibirien zu etablieren…"
BP_germany.514.a:0 "Der Drang nach Osten ist endlich realisiert!"

BP_germany.515.t:0 "Die sibirische Wildnis"
BP_germany.515.d:0 "Die Länder östlich des Uralgebirges sind riesig, erstrecken sich über viele tausend Kilometer und bergen enorme Reichtümer, die bebaut und erschlossen werden können. Die Überreste der Roten Armee und des sowjetischen Politbüros sind in dieser endlosen Tundra zu kleinen Gruppen und Abteilungen zerflossen, die nur noch kleine Angriffe auf zufällige Patrouillen der Wehrmacht organisieren. Die Sowjetnation hörte auf zu existieren und verwandelte sich in einen Stammesstaat, nur noch ein primitiver Schatten ihrer selbst. Derzeit verhandeln die Regierung des Dritten Reichs und das Japanische Kaiserreich, und Diplomaten entwickeln einen Plan für die Zukunft des russischen Subkontinents."
BP_germany.515.a:0 "Endlich ist unser natürlicher Feind besiegt!"

BP_germany.516.t:0 "Stalin tot!"
BP_germany.516.d:0 "Heute früh, während unserer Patrouille entlang der Grenze zwischen der sibirischen Neutralen Zone und dem Deutschen Reich, drangen unsere Kundschafter in die kleine Siedlung Weiß Jar ein. Als sie das unscheinbare Dorf betraten, ahnte niemand den Kugelhagel, der sie erwartete. Die Patrouille zog sich schnell zurück und bat um Unterstützung. Bald traf Verstärkung mit Panzerunterstützung ein. Nach einem erbitterten Feuergefecht betrat die Truppe das Haus des Anführers. Welch eine Überraschung fanden sie darin den bolschewistischen Führer Josef Stalin! Er war bereits tot und lag mit einer Waffe in der Hand an der Wand gelehnt. Die Autopsie ergab bald, dass er an einer Schusswunde im Bauch verblutet war. Seine Leiche wurde hastig einbalsamiert und nach Deutschland gebracht, um sie einem Museum zur Verfügung zu stellen, das dem Kampf gegen die jüdisch-bolschewistische Bedrohung gewidmet ist. Die verbliebenen Dorfbewohner wurden liquidiert, weil sie sich versteckt und dem Feind Deutschlands geholfen hatten, und die Stadt wurde von Grund auf und von den Landkarten getilgt."
BP_germany.516.a:0 "Großartig!"

BP_germany.517.t:0 "Großdeutsches Reich"
BP_germany.517.d:0 "Großdeutsches Reich ist ein Ausdruck, der das Gebiet Deutschlands bezeichnet, das die gesamte deutschsprachige Bevölkerung in einem einzigen politischen Organismus vereinen sollte. Die Idee des Deutschen Reiches entstand zu Beginn des 19. Jahrhunderts mit dem Beginn der deutschnationalen Bewegung und wurde erstmals von Ernst Moritz Arndt (1769–1860) vorgestellt. Arndt forderte ein einiges, starkes und stolzes Königreich, das alle Deutschen vereinen würde. Dieses Thema wurde während der Revolution von 1848 auf der Frankfurter Nationalversammlung erneut aufgeworfen, seine Umsetzung wurde jedoch durch Meinungsverschiedenheiten zwischen der multinationalen österreichischen Bewegung und Preußens Wunsch nach Vorherrschaft in Deutschland behindert. Der Kern des Problems wurde wie folgt formuliert: Sollte es ein Großdeutschland (Großdeutsch) oder eine kleine deutsche Siedlung (Kleindeutsch) werden? Letzteres würde preußische Hegemonie bedeuten. Die Vereinigung Deutschlands erfolgte 1871 unter Otto von Bismarck im Rahmen des Kleindeutsch-Konzepts. Für Hitler, einen gebürtigen Österreicher, hatte das Dritte Reich ohne die Einbeziehung Österreichs keinen Sinn. außerdem hätte Großdeutschland ohne den Beitritt der Tschechoslowakei nicht existieren können. Hitler verkörperte die Idee der Expansion von den ersten Tagen seines Regimes an: Deutschland gab das Saarland zurück, trat aus dem Völkerbund aus, remilitarisierte das Rheinland, annullierte das Locarno-Abkommen, schloss Österreich an und eroberte die Tschechoslowakei. Großdeutschland umfasste in den ersten Jahren des Zweiten Weltkriegs den größten Teil Westeuropas. 1944 gab Deutschland Briefmarken heraus, auf denen statt „Deutsches Reich“ „Großdeutsches Reich“ stand. Hitler verwirklichte praktisch die Bestrebungen vieler deutscher Nationalisten.\n \nDieses pandeutsche Reich wird Hitlers in „Mein Kampf“ dargelegte Vision verkörpern und alle deutschen Völker zu einer Supermacht vereinen, die den gesamten Kontinent umfasst und ideale Bedingungen für die zukünftige Zivilisation der arischen Rasse schaffen soll. Dieses Gebiet wird ganz Großdeutschland sowie traditionell deutsche Regionen wie die Niederlande, Belgien und die skandinavischen Länder umfassen. Darüber hinaus wird das gesamte europäische Russland bis zum Ural durch die Kolonialisierung schließlich Teil dieses Staates werden. Nachdem dieser germanische Traum endlich wahr geworden ist, können wir das Großdeutsche Reich ausrufen. Ein Reich, das tausend Jahre bestehen wird. Unter welchem Namen wird es bekannt sein?"
BP_germany.517.a:0 "Großdeutsches Reich"
BP_germany.517.b:0 "Großdeutsches Reich"
BP_germany.517.c:0 "Germanischer Staat Deutscher Nation"

BP_germany.518.t:0 "Welthauptstadt Germania"
BP_germany.518.d:0 "Welthauptstadt Deutschland – ein neuer Name für die Stadt Berlin, die nach dem Sieg im Zweiten Weltkrieg nach den Plänen von Adolf Hitler und seinem Architekten Albert Speer Mitte des 20. Jahrhunderts zur Welthauptstadt werden sollte. Albert Speer, der „erste Architekt des Dritten Reichs“, erstellte als Kurator des Projekts zahlreiche Pläne für den Wiederaufbau der Stadt, aber nur ein kleiner Teil davon wurde zwischen 1937 und 1943, als der Bau begann, umgesetzt. Einige Projekte, wie die Schaffung einer großen Ost-West-Achse der Stadt, die die Erweiterung der Charlottenburger Chaussee (heute Straße des 17. Juni) und die Platzierung der Berliner Siegessäule in der Mitte, weg vom Reichstag, wo sie ursprünglich stand, umfasste, wurden erfolgreich abgeschlossen. Andere Projekte jedoch, wie die Schaffung der Großen Halle, mussten wegen des Kriegsausbruchs verschoben werden. Speer entwarf eine Reichskanzlei mit einem großen Saal, der doppelt so lang war wie der Spiegelsaal im Schloss Versailles. Zahlreiche alte Gebäude in vielen geplanten Baugebieten wurden vor dem Krieg abgerissen, doch die Niederlage stoppte die Pläne letztlich. \n \nEs ist noch zu früh, um über einen umfassenden Wiederaufbau zu sprechen, er wird lange dauern. Einige Parteimitglieder schlagen jedoch bereits jetzt eine Umbenennung Berlins vor. Welcher Name soll unsere Hauptstadt repräsentieren?"
BP_germany.518.a:0 "Germania"
BP_germany.518.b:0 "Welthauptstadt Germania"
BP_germany.518.c:0 "Alten Namen speichern - Berlin"

BP_germany.519.t:0 "Beute aus dem Osten"
BP_germany.519.d:0 "Plan „Oldenburg“ oder „Görings Grüne Mappe“ – der Deckname des wirtschaftlichen Teilplans des deutschen Angriffs auf die UdSSR „Barbarossa“. \n \nNachdem Hitler den Barbarossa-Plan gebilligt hatte, beauftragte der Führer Reichsmarschall Göring, einen Plan für die Eroberung des Territoriums der UdSSR auszuarbeiten. Unter Görings Führung wurde ein Plan namens „Oldenburg“ entwickelt, der die Eroberung und Nutzung aller Rohstoffreserven und großen Industrieunternehmen im Gebiet zwischen Weichsel und Ural durch das Reich vorsah. Diesem Plan zufolge sollten die wertvollsten Industrieanlagen ins Reich geschickt und diejenigen, die Deutschland nicht nützen konnten, vernichtet werden. Das Gebiet des europäischen Teils der UdSSR sollte wirtschaftlich dezentralisiert und zu einem landwirtschaftlichen Rohstoffanhang Deutschlands gemacht werden. Die ursprüngliche Version des Plans wurde in einer geheimen Sitzung am 1. März 1941 genehmigt (Protokoll 1317 PS). \n \nIn den folgenden zwei Monaten wurde der Plan ausgearbeitet und schließlich am 29. April 1941 genehmigt (Protokoll der geheimen Sitzung 1157 PS). Dem Plan zufolge wurde das Gebiet der UdSSR in vier Wirtschaftsinspektorate (Leningrad, Moskau, Kiew, Baku) und 23 Wirtschaftskommandantenbüros sowie 12 Büros aufgeteilt. Zur Koordinierung wurde das Hauptquartier „Oldenburg“ eingerichtet. Am 8. Mai 1941 wurden auf Grundlage dieses Plans „Allgemeine Anweisungen für alle Reichskommissare in den besetzten Ostgebieten“ verabschiedet (Dokumente 1029, 1030 PS). Eine separate Kommission wurde gebildet, um die Lebensmittelbeschaffung in den besetzten Gebieten zu organisieren. Ihr wurde die Aufgabe übertragen, bis 1942 die Versorgung der deutschen Streitkräfte mit Lebensmitteln vollständig auf Kosten der Ressourcen der UdSSR sicherzustellen. Alle übrigen Nahrungsmittel aus den landwirtschaftlichen Regionen sollten nach Deutschland exportiert werden, um so die „Überbevölkerung“ der Industriezentren der UdSSR zu reduzieren. Gemäß dem Befehl des Stabschefs des Oberkommandos der Wehrmacht Wilhelm Keitel vom 16. Juni 1941 wurde die wichtigste wirtschaftliche Aufgabe in den besetzten Gebieten der UdSSR als „sofortige und vollständige Ausbeutung der besetzten Gebiete im Interesse der deutschen Militärwirtschaft, insbesondere im Bereich der Nahrungsmittel- und Ölversorgung“ definiert.\n \nReichsmarschall Göring, der das Hauptquartier in Oldenburg direkt leitete, schrieb: „Im Osten beabsichtige ich auszurauben, und zwar effektiv. Alles, was für die Deutschen im Osten von Nutzen sein kann, sollte schnell abgebaut und nach Deutschland geliefert werden.“\n \nNach dem Beginn der Barbarossa-Offensive am 15. Juli 1941 schrieb er in seiner „Grünen Mappe“: „Die Nutzung der zu besetzenden Gebiete sollte in erster Linie im Lebensmittel- und Ölsektor erfolgen. So viel Nahrung und Öl wie möglich für Deutschland zu gewinnen, ist das wichtigste wirtschaftliche Ziel des Feldzugs.“\n \nNach Kriegsende wurden die Aktivitäten des Hauptquartiers in Oldenburg zum Gegenstand der Prüfung und Verurteilung durch das Nürnberger Tribunal."
BP_germany.519.a:0 "Eine Praxis so alt wie die Menschheit"

BP_germany.520.t:0 "Motorisierung des Ostens"
BP_germany.520.d:0 "Eines von Adolf Hitlers langfristigen Zielen nach der Eroberung Russlands war der Bau eines modernen Autobahn- und Eisenbahnsystems, der Breitspurbahn, um den Transport von Deutschland bis in die östlichen Grenzen zu erleichtern. Nach dem Sieg des Krieges sollten diese Netze auf ganz Europa und möglicherweise bis nach Indien und über den Ural hinaus ausgedehnt werden.\n \nDieses moderne Transportnetz sollte den wirtschaftlichen und logistischen Interessen des Reiches dienen und die Schlagadern der Neuen Ordnung und das Rückgrat eines nationalsozialistisch inspirierten Mitteleuropa-Konzepts bilden. Die ersten Hauptstrecken sollten von Berlin nach Schlesien führen, von wo aus sich unsere Autobahnen und Eisenbahnen weiter nach Osten verzweigen würden."
BP_germany.520.a:0 "Beginn des Baus der Ost Autobahn und Breitspurbahn."

BP_germany.521.t:0 "Motorisierung des Ostens - Polen"
BP_germany.521.d:0 "In der polnischen Region werden wichtige Straßen- und Schienennetze fertiggestellt und Warschau und Lemberg werden zu zentralen Knotenpunkten. Dies bereitet uns auf die weitere Expansion nach Russland und in die Ukraine vor."
BP_germany.521.a:0 "Beginnen Sie mit dem Bau"

BP_germany.522.t:0 "Motorisierung des Ostens - Russland"
BP_germany.522.d:0 "In Russland werden wichtige Autobahn- und Eisenbahnnetze fertiggestellt, die uns mit Moskau und Adolfsburg verbinden. Minsk wird auch zu einem wichtigen Logistikzentrum für unsere Besiedlung des Ostens."
BP_germany.522.a:0 "Wir ebnen den Weg für die Zivilisation"

BP_germany.523.t:0 "Motorisierung des Ostens - Ukraine"
BP_germany.523.d:0 "In der Ukraine werden wichtige Autobahn- und Eisenbahnnetze fertiggestellt, wobei Kiew als Logistikzentrum dienen wird. Eisenbahnen und Autobahnen werden sich im Süden bis Theodorichshafen und im Osten bis Wolgaburg erstrecken."
BP_germany.523.a:0 "Die Route nach Baku muss nun gelegt werden"

BP_germany.524.t:0 "Motorisierung des Ostens - Kaukasus"
BP_germany.524.d:0 "Wichtige Autobahn- und Eisenbahnnetze von Rostow bis Baku werden fertiggestellt. Dies ermöglicht uns den Öltransport von unserer östlichen Grenze und eine schnelle Reaktion auf etwaige Angriffe in der Region. Die Fertigstellung dieses Sektors ermöglicht es uns zudem, einen Teil der in den Generalplan Ost investierten Ressourcen freizusetzen."
BP_germany.524.a:0 "Züge und Autos werden durch diese Länder fließen"

BP_germany.525.t:0 "Exodus der sowjetischen Bevölkerung"
BP_germany.525.d:0 "Schon während der Kämpfe flohen viele Bewohner der UdSSR von der Front oder aus den besetzten Städten auf dem Land. Einige von ihnen versuchten, in das von der UdSSR kontrollierte Gebiet zurückzukehren oder begannen Guerilla-Aktivitäten in unserem Hinterland...\n \nSeit unserem erfolgreichen Feldzug im Osten hat sich diese Situation nur noch verschlimmert – die Dörfer sind leer und die Städte dünn besiedelt – Tausende von Kolonnen ehemaliger Sowjetbürger ziehen weiter nach Osten, über den Ural hinaus...\n \n"
BP_germany.525.a:0 "Mehr Lebensbraum für uns."
BP_exodus_of_soviet_population:0 "In allen Staaten des europäischen Russlands wird die Bevölkerung zurückgehen: im Kaukasus, in der Westukraine und im Baltikum – geringe Zahlen, im Rest, abhängig von der Bevölkerungsdichte."

# SS-Staat Bretagne
BP_germany.800.t:0 "Reichsprotektorat Bretagne"
BP_germany.800.d:0 "Eine Hauptabsicht der deutschen Besatzer bestand darin, die nationale Einheit Frankreichs zu brechen. Ihre Unterstützung des bretonischen Nationalismus muss in diesem größeren Kontext gesehen werden, der auch andere Aspekte umfasste, beispielsweise die Teilung Frankreichs in die Besatzungszone und die Vichy-Zone. Die bretonischen Nationalisten erkannten jedoch sehr bald, dass Deutschland in der Praxis versuchte, seine Freunde in der Vichy-Regierung zufrieden zu stellen, und sich daher weigerte, den bretonischen nationalistischen Forderungen überhaupt Priorität einzuräumen."
BP_germany.800.a:0 "Gründung des Reichsprotektorats"
BP_germany.800.b:0 "Fortsetzung der militärischen Besetzung"
 
# SS-Staat Burgundy
BP_germany.801.t:0 "SS-Staat Burgund"
BP_germany.801.d:0 "Der SS-Staat Burgund (auf Deutsch „SS-Staat Burgund“) oder Ordensstaat Burgund (auf Deutsch „Ordensstaat Burgund“, ein historischer Bezug auf den Staat des Deutschen Ordens) war ein geplanter Staat, den die Führung Nazideutschlands während des Zweiten Weltkriegs in bestimmten Gebieten Westeuropas errichten wollte."
BP_germany.801.a:0 "Erschaffen Sie den SS-Staat"
BP_germany.801.b:0 "Fortsetzung der militärischen Besetzung"

# Deutsch-Mittelafrika
BP_germany.802.t:0 "Deutsch-Mittelafrika"
BP_germany.802.d:0 "Mittelafrika ist die Bezeichnung für eine geostrategische Region in Zentral- und Ostafrika. Ähnlich wie Mitteleuropa artikulierte sie das außenpolitische Ziel Deutschlands vor dem Ersten Weltkrieg, die Region unter deutsche Herrschaft zu bringen. Der Unterschied bestand darin, dass Mittelafrika vermutlich eine Ansammlung deutscher Kolonien in Afrika sein sollte, während Mitteleuropa als geostrategische Pufferzone zwischen Deutschland und Russland konzipiert war, die mit Marionettenstaaten besetzt werden sollte. Die deutsche strategische Überlegung bestand darin, dass durch die Annexion der Region zwischen den Kolonien Deutsch-Ostafrika (Ruanda, Burundi und Tanganjika (Tansania ohne die Insel Sansibar)), Deutsch-Südwestafrika (Namibia ohne Walvis Bay) und Kamerun eine zusammenhängende Einheit geschaffen werden könnte, die den gesamten afrikanischen Kontinent vom Atlantik bis zum Indischen Ozean abdeckt. Allein aufgrund des Reichtums an natürlichen Ressourcen des Kongobeckens würde diese Region der Kolonialmacht durch die Ausbeutung der natürlichen Ressourcen beträchtlichen Reichtum bescheren und außerdem zu einem weiteren deutschen Ziel der wirtschaftlichen Autarkie beitragen.\n \nSollten wir diese Kolonialverwaltung einrichten?"
BP_germany.802.a:0 "Gründung des Reichsprotektorats"
BP_germany.802.b:0 "Fortsetzung der militärischen Besetzung"

# SS-Staat Madagaskar 
BP_germany.803.t:0 "SS-Staat Madagaskar"
BP_germany.803.d:0 "Sollten wir diese Kolonialverwaltung einrichten?"
BP_germany.803.a:0 "Erschaffen Sie den SS-Staat"
BP_germany.803.b:0 "Fortsetzung der militärischen Besetzung"

# Burenstaat Sudafrika
BP_germany.804.t:0 "Burenstaat Sudafrika"
BP_germany.804.d:0 "Sollten wir diesen Satellitenstaat gründen?"
BP_germany.804.a:0 "Gründung des Reichsprotektorats"
BP_germany.804.b:0 "Fortsetzung der militärischen Besetzung"

# SS-Staat Burgundy
BP_germany.805.t:0 "SS-Ordeenstaat: Schicksal Belgiens"
BP_germany.805.d:0 "Heinrich Himmler will das gesamte Reichskommissariat Belgien-Nordfrankreich dem SS-Ordensstaat einverleiben. Das ist problematisch, denn wir sind zwar nicht abgeneigt, das französischsprachige Wallonien aufzugeben, betrachten Flandern aber als deutsch. Was soll mit Belgien geschehen?"
BP_germany.805.a:0 "Gib es der SS"
BP_germany.805.b:0 "Sie können nur Wallonien haben."
BP_germany.805.c:0 "Sie können nur Wallonien haben."
###USSR

BP_USSR.1.t:0 "Befestigt Leningrad!"
BP_USSR.1.d:0 "Der Feind steht vor den Toren. Das Schicksal unserer geliebten Stadt und unseres Vaterlandes liegt in unseren Händen. Wir müssen jeden Mann, jede Frau und jedes Kind mobilisieren. Wir müssen Straßenbarrikaden errichten, Maschinengewehrstellungen an jedem Fenster aufstellen, die letzten Vorräte an Lebensmitteln und Vorräten bergen und sie unseren tapferen Soldaten an der Front bringen. Wir dürfen nicht zurückweichen, denn wenn unsere Stadt in die Hände des Feindes fällt, gibt es keinen Rückzugsort. Wir sind die letzte Gefechtsstation. Sieg oder Tod!"
BP_USSR.1.a:0 "Für das Mutterland!"
SOV_moilization_of_leningrad:0 "In Leningrad werden 10 Divisionen der Miliz mit geringem Erfahrungs- und Ausrüstungsniveau stationiert sein"

