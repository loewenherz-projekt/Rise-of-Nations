SOV_seize_iran:0 "Operation «Gesicht»"
SOV_seize_iran_desc:0 "Seit den 1930er Jahren suchte das Dritte Reich nach möglichen Verbündeten im Nahen Osten. Ein solcher potenzieller Partner war der Iran. Trotz der starken Position des britischen Kapitals, das eine Schlüsselrolle in der iranischen Wirtschaft spielte, verstärkte sich die geopolitische Voreingenommenheit gegenüber dem Dritten Reich. Darüber hinaus hat Berlin seit 1933 die Beziehungen zum Iran auf eine neue qualitative Ebene gehoben. Das Reich beginnt, sich aktiv an der Entwicklung der Wirtschaft und Infrastruktur des Iran sowie an der Reform der Streitkräfte der Monarchie zu beteiligen. Im Dritten Reich werden iranische Jugendliche und Militärangehörige ausgebildet, die Goebbels in seiner Propaganda als „Söhne Zaratuschtras“ bezeichnete. Deutsche Ideologen erklärten die Perser zu „reinen Ariern“ und sie wurden per Sondererlass von den Nürnberger Rassengesetzen ausgenommen. Infolgedessen hatte das Dritte Reich zu Beginn des Zweiten Weltkriegs eine starke Position im Iran erlangt, und das Land entwickelte sich de facto zu einem deutschen Stützpunkt im Nahen Osten. Bis 1941 stellte sich die Situation mit dem Iran und seiner „arischen Voreingenommenheit“ für Moskau und London wie folgt dar: Es bestand die reale Gefahr, dass die mit britischem Kapital aufgebaute iranische Öl- und Transportinfrastruktur vom Dritten Reich gegen die UdSSR und Großbritannien eingesetzt werden würde. So verarbeitete allein eine Ölraffinerie in Abadan 1940 8 Millionen Tonnen Öl. Und Flugbenzin wurde in der gesamten Region nur in Baku und Abadan produziert. Sollten die deutschen Streitkräfte zudem von Nordafrika nach Palästina oder Syrien vordringen oder 1942 die Grenze Baku-Derbent-Astrachan erreichen, wäre der Kriegseintritt der Türkei und des Irans auf deutscher Seite entschieden. Im Zusammenhang mit der geplanten Offensive der Wehrmacht tief in die Sowjetunion hinein war der Persische Korridor, der durch das Gebiet der Transiranischen Eisenbahn führte, eine der einfachsten Möglichkeiten, das von den USA auf dem Seeweg eingeführte Leih- und Pachtgesetz umzusetzen. Britische und sowjetische Ingenieure erkannten die enorme Bedeutung dieser Eisenbahn und bemühten sich, sie aufmerksam zu verfolgen. Die zunehmende Zahl deutscher U-Boot-Angriffe und die Eisbedeckung des Meeres im Raum Archangelsk erhöhten die Gefahr dieser Route, sodass die Notwendigkeit der Nutzung der Eisenbahn deutlich zunahm. Darüber hinaus versuchte die sowjetische Regierung, den Iran, Aserbaidschan und Turkmensahra („Turkmenische Ebene“) in ihren Staat einzugliedern und die Kommunisten im Iran an die Macht zu bringen. Der Druck Großbritanniens und der UdSSR auf den Iran führte zu einer Verschärfung der Spannungen und massiven antibritischen Äußerungen in Teheran, die nach Ansicht der Briten prodeutscher Natur waren. Die strategische Lage des Iran beeinträchtigte die Sicherheit der sowjetischen Ölfördergebiete und des Rückens der Roten Armee und bedrohte die britischen Militärrouten zwischen Indien und dem Mittelmeer."


BP_germany.900.t:0 "Unterzeichnen Sie einen Friedensvertrag mit Amerika"
BP_germany.900.d:0 "Nach einem überwältigenden Erfolg an der Westfront, der mit der erfolgreichen Operation Seelöwe gipfelte, ist es an der Zeit, mit Amerika zu verhandeln und diesen Krieg zu beenden. Zu diesem Zweck legt uns unser Außenminister Joachim von Ribbentrop vier mögliche Friedensvorschläge vor.\n\nOption A: Wir fordern die Wiederherstellung der Grenzen von 1914 im Westen, die Rückgabe unserer ehemaligen Kolonien, die Anerkennung unserer Errungenschaften im Osten und stimmen der Freilassung aller besetzten Länder in Westeuropa unter autonomen Regierungen zu.\n\nOption B: Wir fordern dasselbe wie Option A, außer dass die freigelassenen Länder uns freundlich gesinnte Regierungen haben werden..\n\nOption C: Wir fordern die Beibehaltung unserer Errungenschaften im Osten und Westen, stimmen aber der Freilassung Großbritanniens zu.\n\nOption D: Wir fordern die Freiheit, über Europa und Afrika nach Belieben zu verfügen."
BP_germany.900.a:0 "Option A"
BP_germany.900.b:0 "Option B"
BP_germany.900.c:0 "Option C"
BP_germany.900.e:0 "Option D"


BP_germany.901.t:0 "Deutschland schlägt einen Waffenstillstand vor"
BP_germany.901.d:0 "Nach einem überwältigenden Erfolg an der Westfront, der mit der erfolgreichen Operation Seelöwe gipfelte, ist es an der Zeit, mit Deutschland zu verhandeln und den Krieg zu beenden. Zu diesem Zweck legt uns Außenminister Joachim von Ribbentrop folgenden Friedensvorschlag vor:\n\nDeutschland fordert die Wiederherstellung der Grenzen von 1914 im Westen, die Rückgabe seiner ehemaligen Kolonien, die Anerkennung seiner Annexionen im Osten und stimmt der Freilassung aller besetzten Länder Westeuropas unter autonomen Regierungen zu."
BP_germany.901.a:0 "Akzeptieren"
BP_germany.901.b:0 "Abfall"

BP_germany.902.t:0 "Deutschland schlägt einen Waffenstillstand vor"
BP_germany.902.d:0 "Nach einem überwältigenden Erfolg an der Westfront, der mit der erfolgreichen Operation Seelöwe gipfelte, ist es an der Zeit, mit Deutschland zu verhandeln und den Krieg zu beenden. Zu diesem Zweck unterbreitet uns Außenminister Joachim von Ribbentrop folgenden Friedensvorschlag:\n\nDeutschland fordert die Wiederherstellung der Grenzen von 1914 im Westen, die Rückgabe seiner ehemaligen Kolonien, die Anerkennung seiner Annexionen im Osten und erklärt sich bereit, alle besetzten Länder Westeuropas unter freundlich gesinnten Regierungen freizulassen."
BP_germany.902.a:0 "Akzeptieren"
BP_germany.902.b:0 "Abfall"

BP_germany.903.t:0 "Deutschland schlägt einen Waffenstillstand vor"
BP_germany.903.d:0 "Nach einem überwältigenden Erfolg an der Westfront, der mit der erfolgreichen Operation Seelöwe gipfelte, ist es an der Zeit, mit Deutschland zu verhandeln und den Krieg zu beenden. Zu diesem Zweck unterbreitet uns Außenminister Joachim von Ribbentrop folgenden Friedensvorschlag:\n\nDeutschland bittet darum, seine Errungenschaften in Ost und West zu behalten, stimmt aber der Befreiung Großbritanniens zu."
BP_germany.903.a:0 "Akzeptieren"
BP_germany.903.b:0 "Abfall"

BP_germany.904.t:0 "Deutschland schlägt einen Waffenstillstand vor"
