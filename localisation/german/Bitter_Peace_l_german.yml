#### Germanization ####
 
GER_germanization:0 "Germanisierung"
GER_germanization_desc:0 "Wir können mit der Umsiedlung deutscher Siedler in die eroberten Gebiete beginnen. Mit der Zeit werden diese Länder vollständig in das Reich integriert." 

GER_german_renaming_west_poland:0 "Deutsche Umbenennung in Westpolen"
GER_german_renaming_west_poland_desc:0 "Um diese neuen Länder vollständig in die überlegene germanische Kultur einzutauchen, ist eine gewisse Umbenennung angebracht." 
 
GER_germanization_west_poland_step1_start:0 "Germanisierung Westpolens: Phase Eins"
GER_germanization_west_poland_step1_start_desc:0 "Da Polen nun unter der Kontrolle des Reichs steht, ist es an der Zeit, mit der Entfernung der „Unerwünschten“ aus den dem Reich am nächsten gelegenen westlichen Sektoren zu beginnen."
 
GER_germanization_west_poland_step1_mission:0 "Germanisierung Westpolens: Phase Eins"
GER_germanization_west_poland_step1_mission_desc:0 "Da Polen nun unter der Kontrolle des Reichs steht, ist es an der Zeit, mit der Entfernung der „Unerwünschten“ aus den dem Reich am nächsten gelegenen westlichen Sektoren zu beginnen."
 
GER_germanization_zaolzie_katowice_step1_start:0 "Germanisierung Südwestpolens: Phase eins"
GER_germanization_zaolzie_katowice_step1_start_desc:0 "Da Polen nun unter der Kontrolle des Deutschen Reichs steht, ist es an der Zeit, die „Unerwünschten“ aus den westlichen Sektoren, die dem Reich am nächsten liegen, zu entfernen. In diesem Fall werden wir Trupps entsenden, um Operationen in Zaolzie-Katowice aufzunehmen."  

GER_germanization_zaolzie_katowice_step1_mission:0 "Germanisierung Südwestpolens: Phase eins"
GER_germanization_zaolzie_katowice_step1_mission_desc:0 "Da Polen nun unter der Kontrolle des Deutschen Reichs steht, ist es an der Zeit, die „Unerwünschten“ aus den westlichen Sektoren, die dem Reich am nächsten liegen, zu entfernen. In diesem Fall werden wir Trupps entsenden, um Operationen in Zaolzie-Katowice aufzunehmen."
 
GER_germanization_west_poland_step2_start:0 "Germanisierung Westpolens: Phase Zwei"
GER_germanization_west_poland_step2_start_desc:0 "Da die Operationen in Westpolen nachlassen, ist es an der Zeit, deutsche Siedler umzusiedeln, um diese verlorenen Gebiete zurückzuerobern und das Reich wieder zu vereinen." 
 
GER_germanization_west_poland_step2_mission:0 "Germanisierung Westpolens: Phase Zwei"
GER_germanization_west_poland_step2_mission_desc:0 "Da die Operationen in Westpolen nachlassen, ist es an der Zeit, deutsche Siedler umzusiedeln, um diese verlorenen Gebiete zurückzuerobern und das Reich wieder zu vereinen." 
  
GER_germanization_zaolzie_katowice_step2_start:0 "Germanisierung Südwestpolens: Phase Zwei" 
GER_germanization_zaolzie_katowice_step2_start_desc:0 "Da die Operationen in Zaolzie-Katowice nachlassen, ist es an der Zeit, deutsche Siedler umzusiedeln, um diese verlorenen Ländereien zurückzuerobern und das Reich wieder zu vereinen." 
 
GER_germanization_zaolzie_katowice_step2_mission:0 "Germanisierung Südwestpolens: Phase Zwei"
GER_germanization_zaolzie_katowice_step2_mission_desc:0 "Da die Operationen in Zaolzie-Katowice nachlassen, ist es an der Zeit, deutsche Siedler umzusiedeln, um diese verlorenen Ländereien zurückzuerobern und das Reich wieder zu vereinen."
 
#### Diplomacy ####

GER_troops_transit_sweden:0 "Truppentransit durch Schweden" 
GER_troops_transit_sweden_desc:0 "Mithilfe unserer Diplomatie in Stockholm und unserer militärischen Stärke können wir die Schweden dazu zwingen, unsere Truppen über ihre Grenzen zu lassen. Dies verschafft uns einen großen strategischen Vorteil gegenüber unseren Feinden."
 
GER_patrition_of_yugoslavia:0 "Teilung Jugoslawiens"
GER_patrition_of_yugoslavia_desc:0 "Das jugoslawische Volk ist nach Angriffen von allen Seiten gefallen. Nun muss das Balkanland zwischen dem Reich und seinen Verbündeten aufgeteilt werden."
BP_Axis_controls_Yugoslavia_tt:0 "§H[Root.GetNameDef]§! oder ein Mitglied von §H[From.GetFactionName]§! kontrolliert die Region §HYugoslavian§!."
 
GER_patrition_of_greece:0 "Teilung Griechenlands"
GER_patrition_of_greece_desc:0 "Nachdem Griechenland der Macht der Kriegsmaschinerie der Achsenmächte zum Opfer gefallen ist, muss es unter den Achsenmächten aufgeteilt werden."
BP_Axis_controls_Greece_tt:0 "§H[Root.GetNameDef]§! oder ein Mitglied von §H[From.GetFactionName]§! kontrolliert die Region §HGreek§!."
 
GER_peace_with_soviets:0 "Schlagen Sie der Sowjetunion einen Friedensvertrag vor"
GER_peace_with_soviets_desc:0 "Jetzt, da das Uralgebirge unter unserer Kontrolle ist, können wir endlich Frieden schließen und den Ostfeldzug beenden."
  
GER_negotiations_with_iran:0 "Laden Sie den Iran zur Achse ein" 
GER_negotiations_with_iran_desc:0 "Seit den 30er Jahren sucht das Dritte Reich nach möglichen Verbündeten im Nahen Osten. Ein solcher potenzieller Partner ist der Iran. Trotz der starken Position des britischen Kapitals, das eine Schlüsselrolle in der iranischen Wirtschaft spielt, hat sich die geopolitische Voreingenommenheit gegenüber dem Dritten Reich verstärkt. Darüber hinaus hat Berlin seit 1933 die Beziehungen zum Iran auf eine neue qualitative Ebene gehoben. Das Reich begann, sich aktiv an der Entwicklung der Wirtschaft und Infrastruktur des Iran sowie an der Reform der Streitkräfte der Monarchie zu beteiligen. Im Dritten Reich werden iranische Jugendliche und Militärs ausgebildet, die Goebbels in seiner Propaganda als „Söhne Zaratuschtras“ bezeichnet. Deutsche Ideologen erklärten die Perser zu „reinen Ariern“ und sie wurden per Sondererlass von den Nürnberger Rassengesetzen ausgenommen. Infolgedessen hatte das Dritte Reich zu Beginn des Zweiten Weltkriegs eine starke Position im Iran erlangt und das Land entwickelte sich faktisch zu einem deutschen Stützpunkt im Nahen Osten.\n \nIn den letzten Wochen hat sich die Situation geändert und nun können wir versuchen, den Iran auf unsere Seite zu ziehen."
 
GER_negotiations_with_turkey:0 "Verhandlungen mit der Türkei"
GER_negotiations_with_turkey_desc:0 "Angesichts unserer Siegesserie über unsere Feinde könnte ein alter Verbündeter aus dem Ersten Weltkrieg bereit sein, zu unseren Gunsten in den Krieg einzutreten."
 
GER_negotiations_with_japan:0 "Verhandlungen mit Japan"
GER_negotiations_with_japan_desc:0 "Nach dem Fall zahlreicher strategisch wichtiger sowjetischer Städte können wir eine diplomatische Kampagne mit Japan starten. Da die sowjetische Armee die meisten ihrer mandschurischen Divisionen zur Verteidigung gegen den Ansturm unserer Armee verlegt hatte, konnte Japan problemlos wichtige Städte im Osten besetzen, was die Moral der Roten Armee erheblich schwächen und die Sowjetunion in einen Zweifrontenkrieg zwingen würde."
 
GER_the_irish_question:0 "Die irische Frage"
GER_the_irish_question_desc:0 "Die irische Nation hegt seit langem einen gewissen Hass auf die Briten, die sie unter englischer Herrschaft halten. Wenn wir ihnen einen Beitritt zur Achse vorschlagen würden, wäre das ein enormer Segen für das Reich."
 
GER_the_swedish_question:0 "Die schwedische Frage"
GER_the_swedish_question_desc:0 "Angesichts ihrer strategisch wichtigen Lage würde ein Bündnis mit Schweden den Kriegsanstrengungen nur zugute kommen. Derart große Mengen an Eisenerz können nicht einfach ungenutzt bleiben."
 
GER_the_turkish_question:0 "Die türkische Frage"
GER_the_turkish_question_desc:0 "Angesichts ihrer strategisch wichtigen Lage wäre ein Bündnis mit der Türkei für die Kriegsanstrengungen nur von Vorteil. Durch den Zugang zum Schwarzen Meer können wir Konvois zu allen Fronten transportieren, die sich entlang der ukrainischen Küste oder im Kaukasus bilden könnten."

GER_force_swiss_trade_agreement:0 "Schweiz zu einem Handelsabkommen zwingen"
GER_force_swiss_trade_agreement_desc:0 ""
 
#### Special projects ####
 
GER_operation_bluetooth:0 "Bedienung Bluetooth"
GER_operation_bluetooth_desc:0 "Blauzahn – die englische Übersetzung des dänischen Wortes „Blåtand“. So hieß der Wikingerkönig Harald I. Blauzahn, der vor über tausend Jahren in Dänemark lebte. Im 10. Jahrhundert herrschte Harald I. über Dänemark und einen Teil Norwegens und vereinte die verfeindeten dänischen Stämme zu einem einzigen Königreich. So wie Harald Dänemark vereinte, werden wir heute Skandinavien und alle germanischen Völker vereinen."
 
GER_operation_gertrude:0 "Operation Gertrude"
GER_operation_gertrude_desc:0 "Das Unternehmen Barbarossa hat seinen Zeitplan nicht eingehalten, und die Sowjetunion leistet unserem Vormarsch weiterhin Widerstand. Unsere Ölversorgung ist kritisch, und es ist an der Zeit, eine neue Strategie zu entwickeln, um dieser Herausforderung zu begegnen. Eine erfolgreiche Invasion und Besetzung der Türkei würde uns eine weitere Front eröffnen, um von Süden her in den Kaukasus einzudringen und später die Briten im Nahen Osten unter Druck zu setzen. Die Kosten dieser Invasion sollten jedoch sorgfältig abgewogen werden, bevor wir uns für diese Vorgehensweise entscheiden." 
BP_Axis_not_controls_Caucasus_tt:0 "§H[Root.GetNameDef]§! oder ein Mitglied von §H[From.GetFactionName]§! §H kontrolliert nicht§! die Region §HCaucasus§!."
 
GER_operation_charlemagne:0 "Operation Charlemagne"
GER_operation_charlemagne_desc:0 "Mit unserer ersten Offensive gegen die Sowjetunion erreichten wir die meisten unserer Ziele – doch der Schandfleck namens Bolschewismus trübt noch immer das Antlitz der Erde. Solange dieser Affront gegen Gott selbst existiert, kann die Welt keinen Frieden finden."

GER_general_moroz:0 "General Moroz" 
GER_general_moroz_desc:0 "Die Winter in den weiten russischen Steppen sind lang und streng. Kleidung, die für dieses Wetter geeignet ist, ist dringend erforderlich."
GER_provide_winter_equipment:0 "Winterausrüstung bereitstellen"

GER_aalborg_airport:0 "Flughafen von Aalborg"
GER_aalborg_airport_desc:0 "Der Flughafen Aalborg auf der dänischen Halbinsel kann erweitert werden, um mehr Flugzeuge aufzunehmen. Dies würde die Präsenz der Luftwaffe in der Ostsee und der Nordsee erhöhen."
GER_expand_aalborg_airport:0 "Erweiterung des Flughafens in Aalborg" 
 
GER_motorization_berlin_silesia:0 "Bau der Autobahn Berlin-Schlesien"
GER_motorization_berlin_silesia_desc:0 "Da sich unser Land immer weiter nach Osten ausdehnt, muss eine moderne Infrastruktur zur Versorgung unserer Truppen und Siedler geschaffen werden. Keine unbefestigten Straßen mehr!"
