# Asia ##############################################################################################################################################################################
#####################################################################################################################################################################################

### Japan 

BP_japan.1.t:0 "Feierlichkeiten zum 2600. Jahrestag des japanischen Kaiserreichs"
BP_japan.1.d:0 "Im Jahr 1940, inmitten des Krieges in China und wachsender Spannungen mit den Vereinigten Staaten, feierte Japan den 2600. Jahrestag der Gründung des Japanischen Kaiserreichs und der „ungebrochenen“ kaiserlichen Linie. Es war eine sorgfältig choreografierte Gedenkfeier, die Nationalismus, Kaiserverehrung und Unterstützung der imperialen Expansion schüren sollte. Sie war ein Bekenntnis zur modernen Identität, verpackt in kunstvolle Traditionen und Mythen, und rief in der Öffentlichkeit starke Unterstützung hervor, die sich in verschiedenen enthusiastischen Äußerungen äußerte, von Freiwilligenarbeit bis hin zu pflichtbewussten Pilgerfahrten zu heiligen Stätten. Die Feierlichkeiten sollten auch die nationale Moral stärken, da die Zahl der Todesopfer im Krieg gegen China 100.000 erreicht hatte. Die Berufung auf die Tugenden der Yamato-Rasse und der ununterbrochenen kaiserlichen Herrschaft förderte stoische Ausdauer angesichts von Widrigkeiten und machte Opfer zu einer patriotischen Pflicht. Kaum jemand ahnte, dass das glorreiche Kaiserreich nur fünf Jahre später in einer schmachvollen Niederlage zusammenbrechen würde."
BP_japan.1.a:0 "Dai Nippon Teikoku Banzai!"

BP_japan.2.t:0 "Siegesfeiern in Japan"
BP_japan.2.d:0 "Die Große Befreiung, oder wie die Welt ihn nennen würde, der Zweite Japanisch-Chinesische Krieg, ist zu Ende. Wie der Sieg eines edlen Samurai über einen einfachen Räuber enthauptete die Kaiserlich Japanische Armee das nationale China. Mit diesem entscheidenden Sieg ist das chinesische Volk nun vor dem europäischen Imperialismus geschützt. In der historischen chinesischen Hauptstadt Nanjing wurde ein endgültiger Friedensvertrag zwischen Hirohitos Gefolge und den Führern der Reorganisierten Nationalregierung der Republik China unterzeichnet. Mit Wang Jingwei an der Spitze wurde ihre Rechtmäßigkeit als legitime Vertretung aller chinesischen Völker von den Unterzeichnern des Antikominternpakts anerkannt. \n \nTriumphierende Paraden ziehen durch Tokio, das Banner der Aufgehenden Sonne schmückt jedes Gebäude. Kinder und Erwachsene schwenken stolz ihre Fahnen. Kirschblütenblätter schweben über der Stadt, und lächelnde Mädchen schenken Soldaten, die von der Front heimgekehrt sind, Blumen. Die IJA (Kaiserlich Japanische Armee) und die IJN (Kaiserlich Japanische Marine) haben ihre Feindseligkeiten beigelegt, und die japanische Marine veranstaltet Demonstrationen im Hafen, um nationale Stärke und Einheit zu demonstrieren. Die Einwohner Tokios schauen voller Ehrfurcht zu, der Sieg bestärkt sie in ihrem Glauben an unsere göttliche Mission. Unsere Vision einer Großostasiatischen Wohlstandssphäre wird Wirklichkeit! \n \nDoch jetzt ist nicht die Zeit zum Ausruhen – viele Herausforderungen liegen noch vor uns. Obwohl der Krieg in China vorbei ist, ist die Bevölkerung unruhig, und es wird große Anstrengungen erfordern, den verbleibenden Widerstand zu unterdrücken. Die Europäer müssen noch aus dem Pazifik vertrieben werden, und die UdSSR beäugt uns in den kalten Weiten Sibiriens mit wachsendem Argwohn. Heute jedoch feiert das japanische Volk seinen größten Sieg. Mit dem Licht der aufgehenden Sonne als Leitstern werden wir ganz Asien in eine glorreiche Zukunft führen!"
BP_japan.2.a:0 "Dai Nippon Teikoku Banzai!"

BP_japan.3.t:0 "Investitionen in China"
BP_japan.3.d:0 "Nach der Unterzeichnung des Friedensvertrags und der Organisation des Protektorats auf chinesischem Gebiet können wir mit der aktiven Entwicklung der Ressourcen Chinas beginnen und nach uns zu Zaibatsu gehen, die an Investitionen in lokale Projekte interessiert sind"
BP_japan.3.a:0 "Großartig!"
BP_jap_take_resource_rights_in_china_tt:0 "Wir werden die Kontrolle über die chinesischen Rohstoffvorkommen erlangen"

BP_japan.4.t:0 "Das Massaker von Nanjing"
BP_japan.4.d:0 "Im Herbst 1937 begannen japanische Kampfflugzeuge mit der Bombardierung Nanjings und konzentrierten ihre Angriffe auf die Innenstadt, die am dichtesten von Zivilisten besiedelt war. Als Nanjing angegriffen wurde, wurde die Hauptstadt erneut verlegt, diesmal nach Chongqing. Als die Menschen wussten, dass japanische Truppen auf dem Weg in die Stadt waren, gerieten sie in Panik und versuchten zu fliehen. Am 9. Dezember 1937 erreichten japanische Bodentruppen Nanjing, wo sie auf minimalen Widerstand der überwältigten und erschöpften chinesischen Militäreinheiten stießen. Am 13. Dezember griffen japanische Truppen die Stadt aus allen Richtungen an und waren geschlagen. Aus Angst vor den Folgen einer Kapitulation vor den Japanern zogen sich chinesische Soldaten in Zivilkleidung in die Stadt zurück. An diesem Tag begann die sechswöchige Phase der Gräueltaten gegen die Zivilbevölkerung Nanjings. Die Nachricht von dem Massaker ging bald um die Welt und verschlechterte Japans Beziehungen zu den demokratischen Ländern der Welt erheblich. Im Herbst 1937 bombardierten die japanischen Flugzeuge Nankin und konzentrierten ihre Bemühungen auf das Stadtzentrum, das vierte Viertel der Zivilbevölkerung! Als Nankin die Bomben verlor, verlegten die Chinesen ihre Hauptstadt nach Chongqing."
BP_japan.4.a:0 "Das wird uns mehr schaden als ihnen!"

BP_japan.101.t:0 "Verhandlungen mit Deutschland"
BP_japan.101.d:0 "Nach dem Fall wichtiger sowjetischer Städte begann Deutschland rasch eine diplomatische Kampagne mit uns. Da die sowjetische Armee die meisten ihrer mandschurischen Divisionen zur Verteidigung gegen den Ansturm der deutschen Armee verlegt hatte, konnten wir problemlos wichtige Städte im Osten besetzen, was die Moral der Roten Armee erheblich schwächen und die Sowjetunion in einen Zweifrontenkrieg zwingen würde."
BP_japan.101.a:0 "Mach mit beim Krieg"
BP_japan.101.b:0 "Allein sind wir besser"

BP_japan.200.t:0 "Unsere Allianz zahlt sich aus"
BP_japan.200.d:0 "Nach der Niederlage und Kapitulation der Sowjetunion ist unser Abkommen mit Deutschland in Kraft getreten. Wir haben freie Hand über ein riesiges Gebiet im Fernen Osten erhalten."
BP_japan.200.a:0 "Großartig!"

BP_japan.201.t:0 "Ferner Osten Russlands"
BP_japan.201.d:0 "Seit dem 19. Jahrhundert begannen russische Pioniere mit der aktiven Erschließung des Fernen Ostens, was größtenteils auf die rapide Schwächung der Macht des Qing-Reiches zurückzuführen war, das 1840 in den ersten Opiumkrieg verwickelt war. Das Ergebnis dieser Ereignisse war die Unterzeichnung der Aigun- und Peking-Abkommen zwischen China und Russland, die das Gebiet der Mandschurei, heute Amurregion, an Russland übertrugen. Das Ergebnis der Versuche, Russlands Einfluss in unserer Region zu stärken, war unsere Konfrontation und der anschließende Sieg im Russisch-Japanischen Krieg.\n \nAus Angst vor unserer Bedrohung gründeten die Bolschewiki die Fernöstliche Republik (FER) – einen de jure unabhängigen demokratischen Staat mit kapitalistischer Wirtschaft, der auf dem Gebiet Transbaikaliens und des russischen Fernen Ostens proklamiert wurde. Es existierte bis 1922, als es von den Sowjets annektiert wurde.\n \nJetzt, da wir dieses Gebiet kontrollieren, müssen wir entscheiden, was wir damit tun: eine neue FER gründen, um russisch-weiße Einwanderer und loyale Bevölkerung anzuziehen, und das Gebiet der Mandschurei zurückgeben und seine alten Grenzen wiederherstellen."
BP_japan.201.a:0 "FER einrichten"
BP_japan.201.b:0 "FER schaffen, aber auch die Mandschurei erweitern"
BP_japan.201.c:0 "Erweitern Sie einfach die Mandschurei, um die ältere Grenze wieder aufzubauen"

BP_japan.202.t:0 "Schicksal der Jakuten"
BP_japan.202.d:0 "Auf dem Gebiet des heutigen Jakutien leben viele kleine Völker – die Sacha (Jakuten), Ewenken (Tungusen), Ewenen (Lamuten), Jukagiren (Odulen), Tschuktschen und Dolganen. Die Ureinwohner lebten unter den extremen natürlichen und klimatischen Bedingungen des Nordens und führten eine extensive Wirtschaft. Sie waren politisch schlecht organisiert, lebten in Siedlungen, und nur die Jakuten waren teilweise in größeren Stammesgemeinschaften vereint. 1623 wurde dieses Gebiet von russischen Kosaken erschlossen, und 1632 gründete der Kosak Pjotr Beketow auf dem Gebiet Jakutiens die erste russische Stadt, Lenski Ostrog, die später Jakutsk genannt wurde. Dieses Datum gilt als Beitritt Jakutiens zum russischen Staat. 1632 begann sich vor dem Hintergrund des Bürgerkriegs im frühen 20. Jahrhundert in Jakutien die Idee der Unabhängigkeit und Selbstständigkeit des jakutischen Volkes zu verbreiten. Das Ergebnis dieser Ideen waren die Aufstände von 1921 bis 1928. Die Aufstände waren eine Reihe bewaffneter Auseinandersetzungen in verschiedenen Regionen Jakutiens. 1921–1923 kam es zu Kämpfen zwischen der Roten und der Weißen Garde, 1924–1925 zwischen den Behörden der Jakutischen ASSR und den sogenannten Tunguska-Rebellen und 1927–1928 zwischen der lokalen Verwaltung und den Konföderalisten, die die Unabhängigkeit Jakutiens von der RSFSR anstrebten.\n \nJetzt, da wir dieses Gebiet kontrollieren, können wir entscheiden, was wir damit tun. Soll ein loyaler autonomer Staat Jakutien geschaffen werden?"
BP_japan.202.a:0 "Schaffung des Staates Jakut"
BP_japan.202.b:0 "Geben Sie ihnen begrenzte Gebiete"
BP_japan.202.c:0 "Keine Notwendigkeit"

BP_japan.203.t:0 "Schicksal des Baikalsees"
BP_japan.203.d:0 "Die Baikalrepublik (Transbaikalien) oder die Militärregierung des Baikalsees ist eine Machtstruktur, die während des Bürgerkriegs in Transbaikalien im Rahmen der Weißen Bewegung entstand, die von 1918 bis 1920 existierte.\n \nMit Unterstützung des japanischen Kommandos, das an der sibirischen Intervention teilnahm, kam der Kosakenhäuptling G.M. Semjonow in der Republik an die Macht, der dieses politische Gebilde im Alleingang leitete und den Baikalsee zu einer japanischen Marionette machte.\n \nMit der Gründung der Fernöstlichen Republik – dem Protektorat Sowjetrusslands im Fernen Osten – wurde die Sinnlosigkeit einer militärischen Konfrontation offensichtlich. Am 19. Oktober 1920 begann Japan mit dem Abzug seiner Truppen aus Transbaikalien, und am selben Tag startete die NRA FER an der Amurfront die Offensive auf Tschita. Am 21. November 1920 war die Befreiung Transbaikaliens abgeschlossen, was das Ende des transbaikalischen weißen Staates markierte.\n \nSemenow befand sich im Exil, ebenso wie viele andere Weiße Garden des Fernen Ostens, blieb jedoch in der Mandschurei und arbeitete mit den japanischen Behörden zusammen."
BP_japan.203.a:0 "Gründung der Baikalrepublik"
BP_japan.203.b:0 "FER erweitern"
BP_japan.203.c:0 "Teilen Sie die Region zwischen FER und Jakuten auf"
BP_japan.203.e:0 "Teilen Sie die Region zwischen Mongolen und Jakuten auf"

BP_japan.204.t:0 "Schicksal Turkestans"
BP_japan.204.d:0 "Turkestan ist der historische Name der von Turkvölkern bewohnten Region Zentralasiens. Es ist die Geburtsstätte der turksprachigen Uiguren und anderer Völker Zentralasiens wie Kasachen, Kirgisen, Usbeken, Tataren und Tadschiken.\n \nIm Laufe ihrer langen Geschichte war die Region Teil verschiedener Staaten: der chinesischen Han-Dynastie, der türkischen und uigurischen Kaganate, des Mongolischen Reiches und dann des Manzurenreichs (Qing-Dynastie), das 1759 schließlich Ostturkestan eroberte. Unter dem Ansturm mandschu-chinesischer Truppen verloren die Uiguren ihre Eigenstaatlichkeit. Die besetzten Gebiete wurden als Xinjiang (auf Chinesisch „Neue Grenze“) bekannt.\n \nDas gesamte 19. Jahrhundert ist in Ostturkestan durch zahlreiche nationale Befreiungsaufstände der Uiguren für die Unabhängigkeit gekennzeichnet (1825–1828, 1857, Yettishar 1862–1872), die sich im 20. Jahrhundert fortsetzten (1931–1937, 1943–1949 bis heute).\n \nDa Xinjiang nun unter unserer Kontrolle ist, können wir die dort lebende Bevölkerung von der chinesischen Herrschaft befreien."
BP_japan.204.a:0 "Wir freuen uns, ein neues Mitglied begrüßen zu dürfen: die Sphäre des gemeinsamen Wohlstands"
BP_japan.204.b:0 "Errichtung eines neutralen Turkestan"
BP_japan.204.c:0 "Turkestan in die chinesische Marionette integrieren"
BP_japan.204.e:0 "Errichtung der Autonomie Turkestans"

BP_japan.205.t:0 "Der große Exodus"
BP_japan.205:0 ""
BP_japan.205:0 ""
BP_JAP_incoming_population:0 "Flüchtlinge werden in den meisten alten russischen Regionen untergebracht, und es werden zusätzliche Bauzellen hinzugefügt"

### China

BP_china.1.t:0 "Schicksal Chinas"
BP_china.1.d:0 "Während des Japanisch-Chinesischen Krieges, nach der Besetzung großer Teile des mandschurischen und chinesischen Territoriums, standen die Japaner vor dem Problem, diese Gebiete zu verwalten. Zudem war Japan auf die lange Dauer des Krieges nicht vorbereitet. Die gigantische Größe des besetzten Gebiets entsprach nicht den militärischen Möglichkeiten Tokios. In der Hoffnung, einen Mechanismus zur politischen Kontrolle über das besetzte Gebiet zu schaffen, gründeten die Invasoren lokale chinesische Marionettenbehörden. Am 14. Dezember 1937 proklamierte Peking die Gründung der provisorischen Regierung der Republik China unter Wang Kemin im Norden und am 28. März 1938 setzte Nanjing eine reformierte Regierung der Republik China unter Liang Hongzhi ein, die die südlichen und zentralen Regionen kontrollierte.\n \nWang Jinwei, einer der Führer der Kuomintang-Partei, nahm während des Krieges projapanische Positionen ein und floh im Dezember 1938 aus Chongqing (wo sich die provisorische Hauptstadt der Republik China befand) nach Hanoi in Französisch-Indochina, wo er am 29. Dezember 1938 die Aufnahme von Friedensgesprächen mit Japan vorschlug. Nachdem er von chinesischen Agenten verwundet worden war, zog er drei Monate später in das von Japan kontrollierte Shanghai, wo er Verhandlungen mit den japanischen Behörden aufnahm. Im Januar 1940 trafen sich mehrere Mitglieder der Kuomintang (Wang Jinwei, Chen Gunbo, Zhou Fohai, Tao Shisheng usw.) in Qingdao zu einer Konferenz, bei der sie Vorschläge zur „Wiedererrichtung“ der Kuomintang-Regierung erarbeiteten. Am 30. März 1940 wurde die Errichtung einer „Zentralregierung“ in Nanjing feierlich verkündet, mit Wang Jingwei als amtierendem Vorsitzenden. Die provisorische Regierung der Republik China und die reformierte Regierung der Republik China wurden aufgelöst, um den nationalen Charakter der neuen Regierung in Nanjing zu unterstreichen.\n \nNach Kriegsende können wir das Wang-Jinwei-Regime in ganz China billigen. Alternativ können wir lokale Kriegsherren bei der Schaffung föderaler Autonomien in China unterstützen."
BP_china.1.a:0 "Lasst uns beginnen. Betrachten Sie das Schicksal Chinas Schritt für Schritt"
BP_china.1.b:0 "Es wird keine Patriotisierung geben. Wir brauchen einen vereinten und starken Verbündeten!"
BP_china.1.c:0 "Unterstützen Sie lokale Kriegsherren bei der Dezentralisierung Chinas"

BP_china.2.t:0 "Schicksal Chinas"
BP_china.2.d:0 "Während des Japanisch-Chinesischen Krieges, nach der Besetzung großer Teile des mandschurischen und chinesischen Territoriums, standen die Japaner vor dem Problem, diese Gebiete zu verwalten. Zudem war Japan auf die lange Dauer des Krieges nicht vorbereitet. Die gigantische Größe des besetzten Gebiets entsprach nicht den militärischen Möglichkeiten Tokios. In der Hoffnung, einen Mechanismus zur politischen Kontrolle über das besetzte Gebiet zu schaffen, gründeten die Invasoren lokale chinesische Marionettenbehörden. Am 14. Dezember 1937 proklamierte Peking die Gründung der provisorischen Regierung der Republik China unter Wang Kemin im Norden und am 28. März 1938 setzte Nanjing eine reformierte Regierung der Republik China unter Liang Hongzhi ein, die die südlichen und zentralen Regionen kontrollierte.\n \nWang Jinwei, einer der Führer der Kuomintang-Partei, nahm während des Krieges projapanische Positionen ein und floh im Dezember 1938 aus Chongqing (wo sich die provisorische Hauptstadt der Republik China befand) nach Hanoi in Französisch-Indochina, wo er am 29. Dezember 1938 die Aufnahme von Friedensgesprächen mit Japan vorschlug. Nachdem er von chinesischen Agenten verwundet worden war, zog er drei Monate später in das von Japan kontrollierte Shanghai, wo er Verhandlungen mit den japanischen Behörden aufnahm. Im Januar 1940 trafen sich mehrere Mitglieder der Kuomintang (Wang Jinwei, Chen Gunbo, Zhou Fohai, Tao Shisheng usw.) in Qingdao zu einer Konferenz, bei der sie Vorschläge zur „Wiedererrichtung“ der Kuomintang-Regierung erarbeiteten. Am 30. März 1940 wurde die Errichtung einer „Zentralregierung“ in Nanjing feierlich verkündet, mit Wang Jingwei als amtierendem Vorsitzenden. Die provisorische Regierung der Republik China und die reformierte Regierung der Republik China wurden aufgelöst, um den nationalen Charakter der neuen Regierung in Nanjing zu unterstreichen.\n \nNach Kriegsende können wir das Wang-Jinwei-Regime in ganz China billigen. Alternativ können wir lokale Kriegsherren bei der Schaffung föderaler Autonomien in China unterstützen."
BP_china.2.a:0 "Vereintes China unter unserem Protektorat"
BP_united_china_tt:0 "§GAlle chinesischen Länder, mit Ausnahme von§! §RXinjiang, Tibet und der Mandschurei§!§G, werden unter der Herrschaft von Wang Jinwei§! zu einem einzigen Protektorat vereinigt§!\n \n"
BP_china.2.b:0 "Annexion Chinas! Er wird Teil unseres Imperiums!"
BP_annexed_china_tt:0 "§GChina wird von uns annektiert werden, aber es wird§! §Rpolitische Macht§!§G erfordern, und die neuen chinesischen „Untertanen“ des Reiches werden seine innere§! §RStabilität§! verringern.\n \n"
BP_china.2.c:0 "Unterstützen Sie lokale Kriegsherren bei der Dezentralisierung Chinas"
BP_divided_china_tt:0 "§GWir können dem Regime von Wang Jinwei nicht völlig vertrauen. Indem wir die Kriegsherren unterstützen,§! §Rwerden wir fünf chinesische Autonomien schaffen,§! §Gdie uns direkt gehorchen, und Wang Jinwei und seine Regierung werden zu einer nominellen „Zentralregierung“§!\n \n"
BP_china.2.e:0 "Unterstützen Sie die Forderungen der Mandschu an China"
BP_qin_china_tt:0 "§GAlle chinesischen Länder, mit Ausnahme von§! §RXinjiang und Tibet§!§G, werden zu einem einzigen Protektorat des Qing-China vereinigt, und Pu Yi wird zum Kaiser von China ausgerufen§!\n \n"

BP_china.3.t:0 "Schicksal der Küste"
BP_china.3.d:0 "Eine einigermaßen genaue Beschreibung der geografischen Ausdehnung der gemeinsamen Wohlstandssphäre findet sich in einem japanischen Kriegsdokument, das im Dezember 1941 von der Forschungsabteilung des kaiserlichen Kriegsministeriums erstellt wurde. Der Plan, bekannt als „Landverteilungsplan in der gemeinsamen Wohlstandssphäre Großostasien“ (Daitouakyoueiken Ni o Ke Ru Chi Chi Shobun An), wurde mit Zustimmung und gemäß den Anweisungen des amtierenden Kriegsministers Hideki Tōjō erstellt.\n \nDer Plan teilte das zukünftige Territorium des Kaiserreichs in zwei Gruppen auf. Die erste Gruppe von Gebieten sollte entweder Teil Japans werden oder anderweitig unter dessen direkter Verwaltung stehen. Zweitens sollten jene Gebiete unter die Kontrolle einer Reihe streng kontrollierter projapanischer Vasallenstaaten nach dem Vorbild Mandschukuos fallen, die als nominell „unabhängige“ Mitglieder der Allianz Großostasiens galten.\n \nDem Plan zufolge sollten strategisch wichtige chinesische Gebiete wie Hongkong, Qingdao, Shanghai, Hainan usw. unter direkter japanischer Herrschaft verbleiben. Der Plan sah auch eine groß angelegte Kolonisierung einiger eroberter Länder vor. In dieser japanischen Version von „Lebensraum“ wurde angenommen, dass die chinesische Küste mit „japanischem Lebensraum“ übersät sein würde – diese Gebiete sollten von japanischen Kolonisten bewohnt werden, und die lokale chinesische Bevölkerung sollte vertrieben oder aggressiv „japanisiert“ werden, um unter den Kolonisten zu leben."
BP_china.3.a:0 "Kontrolle über Qingdao, Shanghai und Hainan"
BP_china.3.b:0 "Annexküste von Jiangsu nach Hainan"
BP_china.3.c:0 "Annexküste von Shandong nach Nanning"

BP_china.4.t:0 "Japanische Investitionen"
BP_china.4.d:0 "Nach der Unterzeichnung des Friedensvertrags und der Einrichtung eines Protektorats auf unserem Territorium begann die japanische Regierung, die Ressourcen Chinas aktiv zu erschließen. Danach folgte das japanische Privatkapital, das an Investitionen in unsere lokalen Projekte interessiert ist."
BP_china.4.a:0 "OK..."

BP_china.5.t:0 "Japanischer Investitionsvorteil"
BP_china.5.d:0 "Die Zusammenarbeit mit Japan begann sich auszuzahlen, sie bauten neue Fabriken und ihr Einfluss auf uns wird zunehmen."
BP_china.5.a:0 "Großartig, denke ich ..."

BP_CAN.1.t:0 "Übernahme durch die britische Regierung"
BP_CAN.1.d:0 "Die jüngsten Ereignisse an der Westfront, darunter der unaufhaltsame deutsche Blitzkrieg und die Operation Seelöwe, haben das einst mächtige Britische Empire erschüttert und Europa unter die Nazi-Stiefel gedrängt. Die britische Regierung hat uns um die Verlegung ihres Regierungssitzes nach Kanada gebeten. Von dort aus würde sie ihre Überseegebiete regieren, bis es uns gelingt, Großbritannien zu befreien. Wenn wir diesem Ersuchen nachkommen, werden alle weltweit verbliebenen britischen Truppen sowie die britische Flotte und die Kolonien unserem Kommando unterstellt."
BP_CAN.1.a:0 "Akzeptieren"
BP_CAN.1.b:0 "Abfall"

BP_CAN.2.t:0 "Regierung nach Kanada verlegen?"
BP_CAN.2.d:0 "Die jüngsten Ereignisse an der Westfront, darunter der unaufhaltsame deutsche Blitzkrieg und die Operation Seelöwe, haben unser einst mächtiges Imperium erschüttert und Europa unter die Nazi-Stiefel gestellt. Es ist an der Zeit, dass wir über die Verlegung unseres Regierungssitzes nach Kanada nachdenken, von wo aus wir unser Überseereich regieren werden, bis es uns gelingt, unsere Heimatinsel zu befreien. Dies könnte sich als strategische Entscheidung erweisen, die uns eine Verschnaufpause verschafft und unseren angeschlagenen Armeen die Neuformierung ermöglicht."
BP_CAN.2.a:0 "Sofort umziehen"
BP_CAN.2.b:0 "Wir sind nicht so verzweifelt"

