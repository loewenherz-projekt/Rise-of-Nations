BP_USSR.7.t:0 "Mobilisierung von Krasnodar!"
BP_USSR.7.d:0 "Der Feind steht vor den Toren. Das Schicksal unserer geliebten Stadt und unseres Vaterlandes liegt in unseren Händen. Wir müssen jeden Mann, jede Frau und jedes Kind mobilisieren. Wir müssen Straßenbarrikaden errichten, Maschinengewehrstellungen an jedem Fenster aufstellen, die letzten Vorräte an Lebensmitteln und Vorräten bergen und sie unseren tapferen Soldaten an der Front bringen. Wir dürfen nicht zurückweichen, denn wenn unsere Stadt in die Hände des Feindes fällt, gibt es keinen Rückzugsort. Wir sind die letzte Gefechtsstation. Sieg oder Tod!"
