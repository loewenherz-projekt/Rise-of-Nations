BP_germany.910.t:0 "Unterzeichnen Sie einen Friedensvertrag mit Großbritannien"
BP_germany.910.d:0 "Nach einem überwältigenden Erfolg an der Westfront, der in einer erfolgreichen Luftschlacht um England gipfelte, ist es an der Zeit, mit Großbritannien zu verhandeln und diesen Krieg zu beenden. Zu diesem Zweck legt uns unser Außenminister Joachim von Ribbentrop zwei mögliche Friedensvorschläge vor.\n\nOption A: Wir fordern die Wiederherstellung der Grenzen von 1914 im Westen, die Rückgabe unserer ehemaligen Kolonien, die Anerkennung unserer Errungenschaften im Osten und stimmen der Freigabe aller besetzten Länder in Westeuropa unter autonomen Regierungen zu.\n\nOption B: Wir fordern dasselbe wie Option A, sind jedoch bereit, ein kleines autonomes Polen in den Grenzen von 1914 zuzulassen."
BP_germany.910.a:0 "Option A"
BP_germany.910.b:0 "Option B"


