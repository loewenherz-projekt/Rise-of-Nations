#### Romania ########################################################################################################################################################################
#####################################################################################################################################################################################
 
ROM_ask_east_territories:0 "Östliches Territorium"
ROM_ask_east_territories_desc:0 "Rumänische Nationalisten wollen Großrumänien wiederaufbauen. Die Pläne Bukarests zur Änderung der rumänischen Grenzen werden in Berlin unterstützt. Deutschland wird den rumänischen Staat jedoch nicht in die südliche Dobrudscha oder in Nordsiebenbürgen zurückführen. Es befürwortet die Ausweitung der rumänischen Grenzen nach Osten. In Rumänien tauchen zunehmend Gerüchte auf, wonach das sogenannte Transnistrien historisch rumänisches Territorium sei und seine Bevölkerung aus russifizierten Rumänen bestehe. Nach der erfolgreichen Operation Barbarossa und der Eroberung der Ukraine können wir Deutschland bitten, unseren Einflussbereich nach Osten auszudehnen."

#####################################################################################################################################################################################
#### Finland ########################################################################################################################################################################
##################################################################################################################################################################################### 
 
FIN_continuation_war:0 "Fortsetzungskrieg"
FIN_continuation_war_desc:0 "Im Mai 1941 lud Deutschland finnische Offiziere nach Deutschland ein, um die Koordinierung des Unternehmens Barbarossa zu besprechen. Die Teilnehmer trafen sich in Salzburg und Berlin und setzten ihre Sitzung im Juni in Helsinki fort. Sie einigten sich auf die Ankunft deutscher Truppen, die finnische Mobilisierung und die allgemeine Operationsaufteilung. Es wurde auch vereinbart, dass die finnische Armee mit der Mobilisierung beginnen sollte, doch die Deutschen gaben das endgültige Datum für den Angriff nicht bekannt. Die finnischen Entscheidungen wurden von einer kleinen Gruppe politischer und militärischer Führer getroffen, und der Rest der Regierung wurde weitgehend im Dunkeln gehalten. Erst später erfuhren sie, dass das Land aufgrund der Spannungen zwischen Deutschland und der Sowjetunion mit der Mobilisierung von Reservisten beginnen würde. Deutschland betrachtete den „Fortsetzungskrieg“ als Teil seiner allgemeinen Kriegsanstrengungen an der Ostfront und leistete Finnland wichtige materielle Unterstützung und militärische Zusammenarbeit."
 
FIN_form_greater_finland:0 "Proklamieren Sie das große Finnland"
FIN_form_greater_finland_desc:0 "Finnland hat sein historisch finnisches Land zurückerobert! Dies ist der Glanzmoment in der Geschichte unserer Nation!" 
 
FIN_join_axis:0 "Treten Sie der Achse bei"
FIN_join_axis_desc:0 "Der Moskauer Friedensvertrag vom 13. März 1940, der den sowjetisch-finnischen Krieg von 1939–1940 beendete, wurde von den Finnen als äußerst ungerecht empfunden: Finnland verlor einen erheblichen Teil der Provinz Wyborg. Mit diesem Verlust büßte Finnland ein Fünftel seiner Industrie und 11 Prozent seiner landwirtschaftlichen Nutzflächen ein. 12 Prozent der Bevölkerung, also etwa 400.000 Menschen, mussten aus den der UdSSR zugesprochenen Gebieten umgesiedelt werden. Die Halbinsel Hanko wurde der UdSSR als Marinestützpunkt verpachtet. Die Besetzung Norwegens durch Deutschland, die Finnland von direkten Beziehungen zu Großbritannien und Frankreich abschnitt, führte dazu, dass sich Finnland seit Mai 1940 für eine Stärkung der Beziehungen zu Nazi-Deutschland einsetzte. Zu dieser Zeit begann Deutschland auf Befehl Adolf Hitlers einen Angriffsplan auf die Sowjetunion auszuarbeiten, und Finnland erwarb das Interesse Deutschlands als Stützpunkt für die Stationierung von Truppen und als Basis für militärische Operationen sowie als möglicher Verbündeter im Krieg gegen die Sowjetunion. Am 19. August 1940 hob die deutsche Regierung das Waffenembargo gegen Finnland auf und gestattete im Gegenzug die Nutzung finnischen Territoriums für den Durchzug deutscher Truppen nach Norwegen. Obwohl Finnland Deutschland aufgrund seiner Politik während des Winterkriegs immer noch misstrauisch gegenüberstand, sahen die Finnen in ihm den einzigen Retter. Finnland erklärte sich unter mehreren Bedingungen bereit, sich Deutschland im Krieg gegen die UdSSR anzuschließen:\n \nGarantie der Unabhängigkeit Finnlands;\n \nWiederherstellung des Zustands der Grenze zur UdSSR im Vorkriegszustand (oder besser);\n \nFortsetzung der Lebensmittelversorgung;\n \n Finnland ist kein Aggressor, d. h., es tritt erst nach einem Angriff der Sowjetunion in den Krieg ein.\n \nVom 21. bis 25. Juni 1941 gingen die deutschen See- und Luftstreitkräfte von finnischem Territorium aus gegen die UdSSR vor. Am 22. Juni 1941 wurde die entmilitarisierte Zone Ålands als Reaktion auf die Besetzung durch finnische Truppen von der sowjetischen Luftfahrt bombardiert. Am 25. Juni führte die sowjetische Luftwaffe Luftangriffe auf 18 finnische Flugplätze, von denen aus sie getroffen wurde, sowie auf mehrere Siedlungen durch. Am selben Tag erklärte die finnische Regierung, dass sich das Land im Krieg mit der UdSSR befinde. Am 29. Juni begannen finnische Truppen mit dem Kampf gegen die Sowjetunion"
 
#####################################################################################################################################################################################
#### Japan ##########################################################################################################################################################################
#####################################################################################################################################################################################
 
JAP_inner_mongolia:0 "Innere Mongolei"
JAP_inner_mongolia_desc:0 "Die nationale Befreiungsbewegung, die sich Anfang des 20. Jahrhunderts in der Mongolei ausbreitete, führte 1911 zur Gründung des theokratischen Staates Bogdo Khan Mongolei in der Äußeren Mongolei. Aufgrund eines Abkommens zwischen China und Russland, die sich zum Russischen Reich erklärten, befand sich gemäß einem Geheimabkommen mit Japan nur die Äußere Mongolei in ihrem Einflussbereich. Dies ermöglichte es der Republik China, die Innere Mongolei weiterhin zu besetzen. 1928 teilte die chinesische Regierung die Innere Mongolei zwischen den Provinzen Suiyuan, Chahar und Rehe auf. In den 1930er Jahren wurde das Gebiet von japanischen Truppen besetzt. Die Bevölkerung der Inneren Mongolei kämpfte jedoch weiter für ihre Freiheit. In den 20er und 30er Jahren des 20. Jahrhunderts versuchten einige Fürsten, sich auf Japan zu verlassen, um die chinesische Besatzung loszuwerden. Fürst Dschingis Khan Demchugdongrub führte in dieser Zeit den Befreiungskampf an. Jetzt, da wir die volle Kontrolle über die Innere Mongolei haben, können wir sie unter Kontrolle Demchugdongrub integrieren, und damit unter unserer Kontrolle"
 
JAP_great_mengjiang:0 "Vereinte Mongolei"
JAP_great_mengjiang_desc:0 "De van Demchugdongrub, Prinz Mengjiang, zeigte uns von Beginn seiner Tätigkeit an Loyalität. Er träumte von der Unabhängigkeit der Inneren Mongolei von China und der Vereinigung aller mongolischen Völker zu einem Staat. Da wir nun die notwendigen Gebiete kontrollieren, bittet uns De Wang, ihn für seine Dienste und seine Hilfe bei der Schaffung eines einheitlichen mongolischen Staates zu belohnen."
 
JAP_destiny_of_china:0 "Schicksal Chinas"
JAP_destiny_of_china_desc:0 "China ist besiegt – die verschiedenen Kriegsherrenstaaten und die chinesische Nation selbst sind der kaiserlichen Armee zum Opfer gefallen. Es ist Zeit für eine Entscheidung, die den Kurs Asiens verändern wird."
