GER_crystal_night_desc:0 "Fensterfronten zertrümmert, Läden und Geschäfte in Brand gesteckt und Synagogen angezündet – haben wir das getan?"

GER_TUR_pact:0 "Deutsch-Türkischer Vertrag"
GER_TUR_pact_desc:0 "Der deutsch-türkische Vertrag erleichterte Deutschlands Angriff auf die UdSSR und ermöglichte es ihm, die formelle Neutralität der Türkei zum Nachteil der Interessen der UdSSR und anderer freiheitsliebender Völker umfassend auszunutzen. Die Türkei lieferte Deutschland wertvolle Rohstoffe, insbesondere Chrom, verletzte zugunsten Deutschlands die Bestimmungen des in Montreux unterzeichneten Übereinkommens über die Meerengen und erlaubte auf ihrem Territorium aktive faschistische Propaganda und Spionage."

GER_barbarossa_challenge:0 "Logistische Herausforderungen"
GER_barbarossa_challenge_desc:0 "Die Sowjetunion ist so groß wie kein anderes Land, das wir bisher überfallen haben – und stellt eine enorme Belastung für unsere Versorgungslinien dar. Ganz zu schweigen von den Partisanenaktivitäten, die verheerende Schäden an LKW-Konvois und Eisenbahnsystemen anrichten …"

GER_spoils_from_east:0 "Beute aus dem Osten"
GER_spoils_from_east_desc:0 "Unsere Offensiven im Osten haben uns große Gewinne eingebracht, nicht nur in Form von Land, sondern auch in Form von Vorräten und anderen Gütern."

GER_logistic_costs:0 "Logistikkosten"
GER_logistic_costs_desc:0 ""

GER_logistic_costs1:0 "Logistikkosten"
