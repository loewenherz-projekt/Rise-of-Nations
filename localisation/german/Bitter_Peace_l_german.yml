GER_logistic_costs3:0 "Logistikkosten"
GER_logistic_costs3_desc:0 ""

GER_grosraumwirtschaft1:0 "Großraumwirtschaft"
GER_grosraumwirtschaft1_desc:0 "Deutschland soll zum Zentrum Europas werden. Unsere Infrastruktur wird den Westen mit dem Osten und den Süden mit dem Norden verbinden."

GER_grosraumwirtschaft2:0 "Großraumwirtschaft"
GER_grosraumwirtschaft2_desc:0 "Deutschland soll zum Zentrum Europas werden. Unsere Infrastruktur wird den Westen mit dem Osten und den Süden mit dem Norden verbinden." 

GER_soviet_exodus:0 "Bevölkerungsflucht"
GER_soviet_exodus_desc:0 ""

reichskommissar:0 "Reichskommissar"
reichskommissar_desc:0 "\n \nDer Titel „Reichskommissar“ wurde von Adolf Hitler während des Zweiten Weltkriegs an mehrere Nazi-Gouverneure in mehreren besetzten Ländern verliehen. Die Reichskommissare waren die obersten zivilen Autoritäten in ihren zugewiesenen Gebieten und regierten in der Regel mit diktatorischen und repressiven Methoden.\n \n"

reinhard_heydrich:0 "Reinhard Heydrich"
reinhard_heydrich_desc:0 "Himmlers Gehirn heißt Heydrich\n \nHeydrich war ein hochrangiger deutscher Nazi-Funktionär. Er war Chef des Reichssicherheitshauptamtes (einschließlich SD, Gestapo und Kripo) und stellvertretender Reichsprotektor für Böhmen und Mähren."
heydrich_was_killed:0 "Heydrich wurde getötet"

hangman:0 "Der Henker"

anton_mussert:0 "Anton Mussert"
anton_mussert_desc:0 "Der Gründer der Nationalsozialistischen Bewegung in den Niederlanden (NSB). Während der deutschen Besatzung des Landes wurde der „Leider“ (Führer) zum Chef der Marionettenregierung. Nach dem Krieg wurde er von den Alliierten gefangen genommen und hingerichtet."

net_leider:0 "Leiter der NSB"
 
