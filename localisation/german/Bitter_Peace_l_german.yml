BP_germany.1.t:0 "Reichskommissariat Norwegen"
BP_germany.1.d:0 "Die norwegische Exilregierung und die deutschen Truppen kontrollieren das Gebiet und garantieren, dass wir weiterhin mit schwedischem Eisen versorgt werden und die wichtige Hafenstadt Narvik für uns zugänglich bleibt. Und das alles unter den Augen der verdammten Royal Navy! Es scheint, als könne unser Militär nicht aufhören! Wir könnten ein Reichskommissariat gründen, um die Ordnung in Norwegen aufrechtzuerhalten und lokale Freiwillige und Polizisten anzuwerben, um Guerilla-Aktivitäten zu kontrollieren und zu verhindern. Sollten wir es gründen?"
BP_germany.1.a:0 "Quisling lässt uns jetzt besser nicht im Stich"
BP_germany.1.b:0 "Wir brauchen es nicht!"

BP_germany.10.t:0 "Reichskommissariat Niederlande"
BP_germany.10.d:0 "Die Invasion der Niederlande während der Invasion Frankreichs führte zur Entstehung zweier politischer Einheiten mit deutlichen Merkmalen der nationalsozialistischen Bewegung, die beide langfristig das Ziel hatten, in das Reich integriert zu werden.\n \nDas Reichskommissariat Niederlande war ein ziviles Besatzungsregime, das in den besetzten Niederlanden eingerichtet wurde, nachdem diese 1940 durch die deutsche Invasion gefallen waren. Hitler plante die spätere direkte Assimilation der Niederländer in das Reich, da er sie als Teil des arischen Herrenvolkes betrachtete und sie somit zum germanischen Reich gehörend."
BP_germany.10.a:0 "Ein Reichskommissariat für unsere niederländischen Brüder!"
BP_germany.10.b:0 "Fortsetzung der militärischen Besetzung"

BP_germany.20.t:0 "Reichskommissariat Belgien und Nordfrankreich"
BP_germany.20.d:0 "Die Invasion der Niederlande während der Invasion Frankreichs führte zur Entstehung zweier politischer Einheiten mit deutlichen Merkmalen der nationalsozialistischen Bewegung, die beide langfristig das Ziel hatten, in das Deutsche Reich integriert zu werden.\n \nDas in Belgien eingerichtete Reichskommissariat wurde erst 1944 gegründet und zuvor von einer Militärregierung verwaltet. Dieses Regime, das ganz Belgien (mit Ausnahme des von Deutschland annektierten Eupen) sowie ein eisenreiches Gebiet in Nordfrankreich umfasste, sollte später ebenfalls in das Deutsche Reich integriert werden. Persönlichkeiten wie Himmler und Goebbels betrachteten sowohl die flämische als auch die wallonische Nation als germanisch und daher würdig, Teil des Großgermanischen Reichs zu sein."
BP_germany.20.a:0 "Schaffung eines Reichskommissariats"
BP_germany.20.b:0 "Fortsetzung der militärischen Besetzung"

BP_germany.30.t:0 "Reichskommissariat Ukraine"
BP_germany.30.d:0 "Während unsere Truppen durch die weite ukrainische Steppe ziehen, geraten enorme Land- und Bevölkerungsmengen unter unsere Kontrolle. Die Errichtung eines zivilen Besatzungsregimes mit der ausdrücklichen Aufgabe, die Region für eine spätere Nutzung zu befrieden, läge in unserem Interesse, damit unsere Armeen ungebremst weiter in die Sowjetunion vordringen können. "
BP_germany.30.a:0 "Schaffung eines Reichskommissariats"
BP_germany.30.b:0 "Wir brauchen es nicht"

BP_germany.31.t:0 "Südwestrussland"
BP_germany.31.d:0 "In offiziellen Dokumenten, die in Deutschland und den besetzten Gebieten herausgegeben wurden, wurde dieses Gebiet Dongebiet genannt (übersetzt: das an den Don angrenzende Land). Der Ort, an dem das Reichskommissariat gegründet werden sollte, hatte keine natürlichen Grenzen und kein einheitliches System wirtschaftlicher Beziehungen. Außerdem lebten hier Vertreter mehrerer Nationalitäten. Der Status des Verwaltungszentrums sollte der Stadt Rostow am Don zugewiesen werden. Alfred Rosenberg schlug Dietrich Klagges für den Posten des Reichskommissars vor. Trotz bestehender Pläne zur Errichtung eines der fünf Besatzungsregime konnte das Projekt nicht umgesetzt werden, da dies nicht dringend erforderlich war und die Regierung des Dritten Reichs in der zweiten Hälfte des Jahres 1941 beschloss, die Zahl der in den besetzten Gebieten der UdSSR zu gründenden Einheiten zu minimieren. Laut A. Rosenberg, unterstützt von A. Hitler, sollten die eroberten Gebiete in das Reichskommissariat Ukraine und das Reichskommissariat Kaukasus aufgenommen werden. Einer anderen Version zufolge sollte das Reichskommissariat für das Gebiet Don-Wolga auf einer Fläche von 55.000 km2 angesiedelt werden und eines der abgeschafften Subjekte der Sowjetunion umfassen, das später in das Reichskommissariat Ukraine eingegliedert werden sollte, das neben der Reichskommission für das Gebiet Wolga-Don die Generalbezirke Rostow, Woronesch und Saratow bestimmen sollte."
BP_germany.31.a:0 "Integrieren Sie dieses Gebiet in das Kommissariat der Ukraine"
BP_germany.31.b:0 "Erstellen Sie das Kommissariat Don-Wolga"

BP_germany.40.t:0 "Reichskommissariat Ostland"
BP_germany.40.d:0 "Es ist an der Zeit, mit der Ausdehnung unseres Reiches nach Osten zu beginnen. Die Gründung dieses Staates wird den Anfang davon machen, da er die Länder Lettland, Litauen und Estland zu einem Staat mit einem Gauleiter an der Spitze zusammenschließen wird. Wenn die Zeit reif ist, wird dieser Staat für die vollständige Eingliederung in das Deutsche Reich vorbereitet sein."
BP_germany.40.a:0 "Schaffung eines Reichskommissariats"
BP_germany.40.b:0 "Wir brauchen es nicht"

BP_germany.41.t:0 "Nordwestrussland"
BP_germany.41.d:0 "Es handelt sich um eine wichtige historische und kulturelle Region mit alten Städten wie Pskow und Nowgorod sowie der nördlichen „Hauptstadt“ St. Petersburg, die Leningrad heißt. Jetzt, da er in unseren Händen ist und die Frontlinie weiter, weiter im Osten liegt, können wir entscheiden, was wir mit ihm machen."
BP_germany.41.a:0 "Wir werden es an das RK Ostland übertragen"
BP_germany.41.b:0 "Wir werden es an den RK Moskau überweisen"
BP_germany.41.c:0 "Verlassen Sie dieses Gebiet, später werden wir es der Unterordnung des RK Moskau übergeben"

BP_germany.50.t:0 "Reichskommissariat Moskau"
BP_germany.50.d:0 "Nach erfolgreichen Operationen im Moskauer Raum wird der Aufbau eines neuen Reichskommissariats wie geplant fortgesetzt. Wie ursprünglich vorgesehen, soll dieser Staat die Osterweiterung des Großdeutschen Reiches unterstützen. Das Moskauer Gebiet soll sich bis zum Ural erstrecken und in den kommenden Jahren von allen Einwohnern gesäubert werden. Die Gründung dieses Staates wird unseren Truppen wie immer den Vormarsch weiter nach Osten erleichtern."
BP_germany.50.a:0 "Schaffung eines Reichskommissariats"
BP_germany.50.b:0 "Wir brauchen es nicht"

BP_germany.51.t:0 "Nordostrussland"
BP_germany.51.d:0 "Die nördliche Region hat eine günstige wirtschaftliche und geografische Lage: Zugang zum Meer, die Nachbarschaft zu Finnland und Norwegen. Allerdings wirken sich strenge natürliche und klimatische Bedingungen auf die Entwicklung des Gebiets aus. In der nördlichen Region dominieren die Rohstoffindustrie sowie die mit Chemie und Holzverarbeitung verbundene Industrie. Dieses Gebiet ist reich an Bodenschätzen. Es produziert Öl und Gas, Kohle, Aluminiumerze und Speisesalz. Es gibt auch große Waldreserven und Wasserressourcen. \n \nJetzt, da wir diese Region kontrollieren, können wir entscheiden, was wir damit machen. Wir können das neue Kommissariat Nordland gründen. Trotz bestehender Pläne zur Einrichtung mehrerer Besatzungsverwaltungen konnte das Projekt nicht umgesetzt werden, da dieser dringende Bedarf nicht bestand und die Regierung des Dritten Reichs in der zweiten Hälfte des Jahres 1941 beschloss, die Zahl der in den besetzten Gebieten der UdSSR zu gründenden Einheiten auf bis zu vier Subjekte zu beschränken. Auf dieser Grundlage könnten wir dieses Gebiet dem Moskauer Kommissariat übertragen. Die dritte Variante wäre die Abtretung des Territoriums an Finnland. Finnlands Nationalisten vertreten schon lange die Theorie, die Gebiete der finno-ugrischen Völker zu einem einzigen Staat zu vereinen. Warum stärken wir unseren Verbündeten nicht?"
BP_germany.51.a:0 "Wir werden es nach Finnland übertragen"
BP_germany.51.b:0 "Neues Kommissariat erstellen"
BP_germany.51.c:0 "Wir werden es an den RK Moskau überweisen"

BP_germany.52.t:0 "Ostrussland"
BP_germany.52.d:0 "Die Wolgaregion ist im weitesten Sinne das gesamte an die Wolga angrenzende Gebiet. Unter der Wolgaregion versteht man oft einen mehr oder weniger bestimmten Streifen entlang der Wolga ohne größere Nebenflüsse. Häufiger wird der Begriff im engeren Sinne verwendet – als Gebiet, das an den Mittel- und Unterlauf der Wolga angrenzt und wirtschaftlich zu ihr tendiert, was der obigen Auffassung entspricht. Innerhalb der Wolgaregion unterscheidet man das relativ erhöhte rechte Ufer mit dem Wolgahochland und das linke Ufer – die Wolgaregion. In natürlicher Beziehung zur Wolgaregion werden manchmal auch Gebiete am Oberlauf der Wolga gezählt."
BP_germany.52.a:0 "Neues Kommissariat erstellen"
BP_germany.52.b:0 "Wir werden es an den RK Moskau überweisen"

BP_germany.60.t:0 "Reichskommissariat Kaukasus"
BP_germany.60.d:0 "Während die Wehrmacht weiter in den ölreichen russischen Kaukasus vordringt, benötigen wir ein lokales Regime, um zu verhindern, dass unsere Truppen zu sehr mit Aufgaben wie der Überwachung der Bevölkerung belastet werden. Die Bildung eines lokalen Regimes wird den Druck auf unsere Truppen verringern und gleichzeitig die einheimische Bevölkerung beruhigen."
BP_germany.60.a:0 "Schaffung eines Reichskommissariats"
BP_germany.60.b:0 "Wir brauchen es nicht"

BP_germany.61.t:0 "Baku-Öl"
BP_germany.61.d:0 "Während des Zweiten Weltkriegs gehörten die Ölfelder Bakus zu den reichsten und größten der Welt. Allein im Jahr 1942 betrug der Anteil des Bakus an den gesamten Öllieferungen in die UdSSR 80 %, und die Gesamtproduktion belief sich damals auf 24 Millionen Tonnen. „Fall Blau“, die Sommeroffensive der Wehrmacht 1942, hatte die Eroberung dieser Ölfelder als Hauptziel. Historisch gesehen machte die Niederlage bei Stalingrad 1943 die Verwirklichung dieses Ziels unmöglich. Hitlers Verlangen nach diesem Gebiet war so groß, dass seine Generäle am Vorabend der Sommeroffensive 1942 beschlossen, ihm Baku und das Kaspische Meer als Kuchen zu schenken. Natürlich teilte sich Hitler Baku selbst auf.\n \nDer Erwerb dieser Ölfelder wurde durch den Erfolg des Unternehmens Barbarossa zu einem wichtigen strategischen und wirtschaftlichen Vorteil. Allerdings wurde die Ausrüstung während der Invasion und der gezielten Sabotage der sich zurückziehenden Streitkräfte der Roten Armee schwer beschädigt. Die Tatsache, dass sich unter diesem Land ein Ozean aus Öl befindet, verpflichtet uns, diese Region besonders zu schützen.\n \nHitler hat unmissverständlich klargestellt, dass dieses Gebiet ein integraler Bestandteil des Reiches werden soll und dass alle Investitionen in die Entwicklung, Integration und Verteidigung dieses Gebiets mit höchster Priorität verfolgt werden müssen. Pläne für ein ausgedehntes Eisenbahnnetz, das Baku über die weite Entfernung mit dem Herzen Deutschlands verbinden soll, liegen bereits vor."
BP_germany.61.a:0 "Der Schlüssel zu unserer Autarkie liegt hier im Herzen des Kaukasus ..."

BP_germany.70.t:0 "Reichskommissariat Turkestan"
BP_germany.70.d:0 "Die überwiegend muslimische Bevölkerung Zentralasiens steht seit dem 19. Jahrhundert in einem langjährigen Konflikt mit Russland. Im Zuge der geopolitischen Manöver des „großen Spiels“ zwischen dem russischen und dem britischen Imperium geriet Zentralasien unter russischen Einfluss und wurde schließlich in Form der Sozialistischen Sowjetrepubliken Teil der UdSSR. \n \nAlfred Rosenberg schlug die Schaffung eines Reichskommissariats in dieser Region vor, doch Adolf Hitler lehnte diesen Vorschlag ab, bis die Errungenschaften in Europa gefestigt werden konnten.\n \nNichts weiter als eine historische Tatsache – das Konzept des deutschen „Panturkestan“ oder „Mohammed-Reiches“ kann nun aus unserer Eroberung der UdSSR entstehen. Wir sind bereit, eine deutsche Zivilverwaltung in der ehemaligen Zentralasiatischen SSR zu etablieren, oder wir können uns für die Schaffung von Vasallenstaaten auf Grundlage der lokalen ethnischen Nationalitäten und ihrer Unterschiede entscheiden oder die Besetzung dieses Gebiets fortsetzen."
BP_germany.70.a:0 "Wir sind die endgültigen Sieger des Großen Spiels."
BP_germany.70.b:0 "Schaffung nationalistischer zentralasiatischer Staaten unter unserem Protektorat."
BP_germany.70.c:0 "Setzen Sie die Besetzung Zentralasiens fort."

BP_germany.80.t:0 "Reichskommissariat Westsibirien"
BP_germany.80.d:0 "Westsibirien erstreckt sich über 2500 Kilometer vom Arktischen Ozean bis zum Kasachischen Hochland und 900 Kilometer vom Uralgebirge bis zum Jenissei. Die Region ist reich an natürlichen Ressourcen. Die wichtigsten Ressourcen sind Öl und Gas, Torf, Kohle und Eisenerz. Riesige Öl- und Gasreserven liegen in schwer zugänglichen Gebieten, in der tiefen, sumpfigen Taiga. Nördlich des Altai liegt das Kusnezker Kohlebecken (Kusbass). Das wichtigste, noch nicht erschlossene Eisenerzbecken der Region liegt in der Region Tomsk. Der Altai enthält Quecksilber- und Goldreserven sowie Seen in der Kulundin-Steppe – Lagerstätten verschiedener Salze.\n \nDie Annexion des Gebiets jenseits des Uralgebirges ist nicht nur ein logistischer Albtraum, sondern auch ein Risiko für unsere langfristigen Ziele. Das Ostministerium schlug die Einrichtung eines Reichskommissariats Westsibirien vor, das in der Neuen Ordnung mehrere wichtige Funktionen erfüllen soll. \n \nErstens muss die Deportation der einheimischen Bevölkerung aus unseren eroberten Gebieten effektiv erfolgen. Dieses Kommissariat dient als Transitpunkt und zur Aufnahme eines Teils dieser Bevölkerung und soll so die Aufstände in unseren Ostgebieten minimieren. Zweitens wird dieses Regime auch zur wirtschaftlichen Ausbeutung der riesigen Ressourcen Sibiriens beitragen. Und schließlich wird dieses Kommissariat, sofern wir eine Einigung mit Japan erzielen, durch eine wirksame Pufferzone zwischen unseren beiden Imperien geschützt."
BP_germany.80.a:0 "Erstellen Sie es"
BP_germany.80.b:0 "Keine Notwendigkeit"

BP_germany.90.t:0 "Protektorat Böhmen und Mähren"
BP_germany.90.d:0 "Die verbleibenden tschechischen Gebiete sind für das übrige Deutsche Reich nur von geringem Wert. Durch die vollständige Annexion der Gebiete könnten wir zwar einige Fabriken mehr gewinnen, doch die Errichtung eines völlig neuen Protektorats würde uns einen weiteren Verbündeten bescheren, der sein Land besser verwalten könnte als wir."
BP_germany.90.a:0 "Erschaffen Sie das Protektorat"
BP_germany.90.b:0 "Wir brauchen es nicht"

BP_germany.91.t:0 "Kundgebungen im Protektorat Böhmen und Mähren"
BP_germany.91.d:0 "Die tschechische Bevölkerung reagierte im März 1939 auf den Eintritt der tschechischen Gebiete in das Dritte Reich als Protektorat eher gelassen. Ihre ablehnende Haltung gegenüber der neuen Regierung äußerte sich in Witzen, Boykott der deutschen Wochenschau, dem Hören ausländischer Radiosender und kleineren Sabotageakten („je pomalé“ – „Arbeitet langsam“).\n \nDer erste bedeutende Akt zivilen Ungehorsams waren die Kundgebungen am 28. Oktober 1939 in Prag, Brünn, Ostrava, Kladno und anderen Städten Böhmens und Mährens anlässlich des Jahrestages der tschechoslowakischen Staatsgründung. Das Publikum skandierte: „Wir wollen Freiheit!“ und „Deutsche Polizei – deutsche Schweine!“. Es kam zu Zusammenstößen mit der tschechischen Polizei und Gestapo-Agenten, bei denen ein Mensch – der 22-jährige Bergmann Václav Sedláček – getötet und mehrere schwer verletzt wurden. Außerdem wurden etwa 700 Kundgebungsteilnehmer festgenommen."
BP_germany.91.a:0 "Verdammt!"

BP_germany.92.t:0 "Neue Kundgebungen im Protektorat Böhmen und Mähren"
BP_germany.92.d:0 "Am 11. November 1939 starb der Medizinstudent der Karls-Universität, Jan Opletal, bei der Auflösung der Kundgebung, deren Verletzungen erlitten worden waren. Seine Beerdigung am 15. November artete in eine Massendemonstration der Studenten aus, die von der Polizei aufgelöst wurde. Etwa 1.000 Menschen wurden verhaftet und in das Konzentrationslager Sachsenhausen deportiert. Am 17. November wurden neun Teilnehmer der Demonstration hingerichtet. Danach wurden alle tschechischen Hochschulen, einschließlich der Karls-Universität, geschlossen.\n \nDie tschechische Gesellschaft war schockiert und reagierte mit „mürrischer Unterwerfung“. In Prag und anderen Städten des Protektorats wurden antideutsche Zeitschriften, Zeitungen und Flugblätter verteilt, die von Untergrunddruckereien herausgegeben oder aus London, wo die tschechoslowakische Exilregierung agierte, hergebracht wurden. Auch Ministerpräsident Alois Eliasz nahm Kontakt zu tschechischen Emigranten auf, wofür er später am 27. September 1941 von der Gestapo verhaftet wurde."
BP_germany.92.a:0 "Verdammt!"

BP_germany.93.t:0 "Das Heydrich-Attentat"
BP_germany.93.d:0 "Reinhard Heydrich trat 1928 der NSDAP bei, wo er auch Mitglied der SS wurde. 1931 wurde der kaltblütige Heydrich dem Reichsführer-SS Heinrich Himmler vorgestellt. Später berief Himmler ihn in den SD (Sicherheitsdienst) und 1933 erreichte Heydrich den Rang eines Obergruppenführers (Generalleutnants). Gemeinsam mit den überzeugten Nazis Kurt Daluege und Walter Schellenberg organisierte Heydrich die Säuberung von Ernest Röhms SA (Sturmabteilung). Dieses Massaker wurde später als „Nacht der langen Messer“ bekannt. 1936 wurde Heydrich Chef des SD und der Gestapo. Als Himmler und die SS die Leitung der Konzentrationslager erhielten, wurde Heydrich in die Tschechoslowakei versetzt, wo er „das tschechische Ungeziefer germanisieren“ wollte. Glücklicherweise konnte der tschechische Widerstand (mit Unterstützung des britischen MI6) Heydrichs blutiger Herrschaft ein Ende setzen. Heydrich wurde getötet, als ein Attentatskommando eine Panzerabwehrgranate in sein Auto warf. Einer von Hitlers bösartigsten Handlangern war tot, doch die deutsche Vergeltung sollte grausam und brutal sein. Im Dorf Lidice wurden alle Männer ab 16 Jahren – insgesamt 173 Männer – brutal ermordet."
BP_germany.93.a:0 "Verdammt!"

BP_germany.100.t:0 "General Government"
BP_germany.100.d:0 "Die Niederlage Polens dürfte die Unruhen im Osten nicht beenden. Ein großer Teil der Bevölkerung wird voraussichtlich weiterhin als Partisanen gegen unsere Besatzung auftreten. Wenn wir jedoch an unserem ursprünglichen Vorschlag festhalten, das Generalgouvernement Polen, eine „neutrale“ Zone unter unserer Kontrolle, als Autorität in der Region einzurichten, sollte der autonome Staat in der Lage sein, eine gewisse Kontrolle über das Gebiet auszuüben und uns diese Last abzunehmen."
BP_germany.100.a:0 "Gründen"
BP_germany.100.b:0 "Keine Notwendigkeit"

BP_germany.101.t:0 "Germanisierung Westpolens"
BP_germany.101.d:0 "Nach dem Überfall auf Polen wurde das eroberte Gebiet unter vier verschiedenen Reichsgauen und dem weiter östlich gelegenen Generalgouvernement aufgeteilt. Das Gäu Posen wurde im September 1939 gegründet und am 8. Oktober 1939 als Reichsgau Posen von Deutschland annektiert. SS-Obergruppenführer Arthur Greiser war der einzige Gauleiter. Der Name Reichsgau Wartheland wurde am 29. Januar 1940 eingeführt. Er umfasste Großpolen und angrenzende Gebiete und entsprach nur teilweise dem Gebiet der ähnlich benannten preußischen Provinz Posen vor dem Versailler Vertrag. Der Name leitete sich ursprünglich von der Hauptstadt Posen (Poznan) ab und später von dem Hauptfluss, der Warthe (Warta). Das Gebiet wurde von Polen und einer deutschen Minderheit bewohnt (16,7 Prozent der Gesamtbevölkerung im Jahr 1921). Im Wartheland war das Ziel der Nazis die vollständige „Germanisierung“ oder die politische, kulturelle, soziale und wirtschaftliche Assimilation des Gebiets in das Deutsche Reich. Um dieses Ziel zu erreichen, benannte die eingesetzte Bürokratie Straßen und Städte um und beschlagnahmte Zehntausende polnische Unternehmen – von großen Industriebetrieben bis hin zu kleinen Läden – ohne die Eigentümer zu bezahlen. \n \nBereits im Oktober 1939 wurden viele Polen aus den annektierten Gebieten vertrieben, um Platz für deutsche Kolonisten zu schaffen. Nur die für die Germanisierung ausgewählten Polen – etwa 1,7 Millionen, darunter Tausende von Kindern, die ihren Eltern weggenommen worden waren – durften bleiben. Bei Widerstand sollten sie in Konzentrationslager geschickt werden, denn „deutsches Blut darf nicht im Interesse einer fremden Nation verwendet werden“. Bis Ende 1940 wurden mindestens 325.000 Polen aus den annektierten Gebieten zwangsweise in das Generalgouvernement umgesiedelt und mussten den Großteil ihres Besitzes aufgeben."
BP_germany.101.a:0 "OK"

BP_germany.110.t:0 "Protektoratsregierung in Dänemark"
BP_germany.110.d:0 "Dänemark hatte historisch gesehen einen intensiven Austausch mit Deutschland. 1920 erlangte das Land den nördlichen Teil Schleswigs zurück, nachdem es die Provinzen 1864 im Zweiten Dänischen Krieg verloren hatte. Die dänische Bevölkerung war sich jedoch uneinig über die beste Politik gegenüber Deutschland. Nur wenige waren überzeugte Nazis, einige erkundeten die wirtschaftlichen Möglichkeiten, die deutschen Besatzer mit Vorräten und Gütern zu versorgen. Andere gründeten gegen Ende des Krieges Widerstandsgruppen. Die Mehrheit der Dänen war jedoch den Deutschen gegenüber widerwillig gefügig. Aufgrund der kooperativen Haltung der dänischen Behörden behaupteten deutsche Beamte, sie würden „die dänische Souveränität und territoriale Integrität sowie die Neutralität respektieren“. Ihr einziges starkes Interesse an Dänemark, nämlich die Überschüsse an landwirtschaftlichen Produkten, sollte durch eine Preispolitik für Lebensmittel und nicht durch Kontrolle und Beschränkungen gedeckt werden. Sie hofften auch, propagandistisch punkten zu können, indem sie Dänemark, in Hitlers Worten, zu einem „Musterprotektorat“ machten."
BP_germany.110.a:0 "Erstellen"
BP_germany.110.b:0 "Stornieren"

BP_germany.120.t:0 "Unabhängiger Staat Kroatien"
BP_germany.120.d:0 "Am 6. April, dem Tag des Einmarsches in Jugoslawien, wurde der erste konsolidierte Plan mit dem Titel „Masterplan für die künftige Verwaltung Jugoslawiens“ vorgestellt. Demnach sollte Serbien (genannt „Altserbien“) unter deutsche Militärkontrolle geraten; Italien sollte mehrere Gebiete an der Adriaküste erhalten, darunter Dalmatien und Montenegro; Ungarn sollte das Gebiet nördlich der Donau, das bis 1918 zu ihm gehörte, zugesprochen bekommen; Bulgarien sollte Vardar-Mazedonien erhalten. Kroatien sollte seine Unabhängigkeit erlangen, jedoch unter ungarischem Einfluss. Am 12. April wurde der Plan in den Entwurf „Vorläufige Anweisungen für die Teilung Jugoslawiens“ gemäß Hitlers Anweisung umgewandelt. Da die Ustascha am 10. April 1941 die Unabhängigkeit Kroatiens erklärt hatte, sah der neue Plan dessen Erhalt vor, während der Einfluss Ungarns ausgeschlossen blieb. Kroatiens Unabhängigkeit sollte jedoch innerhalb seiner ethnischen Grenzen verankert werden, wobei unklar war, was mit den Gebieten Jugoslawiens geschehen sollte, in denen die Kroaten eine Minderheit bildeten, die Ustascha aber bereits Ansprüche erhoben hatte. Der Unabhängige Staat Kroatien (ISK), der den größten Teil des heutigen Kroatiens und Bosnien und Herzegowinas einnahm, war von deutschen und italienischen Truppen besetzt. Am 17. April traf der Poglavnik (Staatsführer) Ante Pavelic aus Italien in Zagreb ein. Nominell wurde der Staat seit dem 18. Mai unter dem Thronnamen Tomislav II. von Herzog Aimone Margherita Maria Giuseppe di Torino, Prinz des italienischen Königshauses, geführt. Die Inthronisierung des neu geschaffenen Staates durch einen Vertreter der italienischen Dynastie sollte das italienische Protektorat über ihn einführen. Die Rolle von Tomislav II. im neuen Staat war rein nominell, da die gesamte tatsächliche Macht in den Händen der kroatischen faschistischen Ustascha-Bewegung und ihres Anführers Ante Pavelic lag. Der Monarch hat das Gebiet des Unabhängigen Staates nie besucht. Am 15. Juni 1941 trat der ISK dem Berliner Pakt bei, am 26. Juni dem Anti-Komintern-Pakt und erklärte am 14. Dezember Großbritannien und den USA den Krieg. Aufgrund der aktiven Partisanenbewegung in Jugoslawien konnte der ISK während seiner gesamten Existenz keinen einzigen Tag das gesamte beanspruchte Gebiet kontrollieren."
BP_germany.120.a:0 "Unterstützen Sie die Ustascha"
BP_germany.120.b:0 "Überlassen Sie es den Italienern" 
 
BP_germany.130.t:0 "Militärverwaltung in Serbien"
BP_germany.130.d:0 "Nach dem schnellen Sieg über das Königreich Jugoslawien im Balkanfeldzug etablierte Deutschland im April/Mai 1941 die Kontrolle über den größten Teil Serbiens, einschließlich einiger an Zink- und Zinnvorkommen reicher Gebiete im Norden des Kosovo und Metochiens sowie des jugoslawischen Banats, der östlichen Hälfte der Vojvodina. Die verbleibenden Gebiete Serbiens und des Banats umfassten eine Fläche von 9.776 km² mit 640.000 Einwohnern. Serbien erhielt den Status eines unabhängigen Staates unter deutscher Militärführung, wobei der serbische General Milan Nedić zum stellvertretenden Anführer ernannt wurde."
BP_germany.130.a:0 "Erstellen"
BP_germany.130.b:0 "Beruf fortsetzen" 

BP_germany.140.t:0 "Schicksal der Britischen Inseln"
BP_germany.140.d:0 "Das Britische Empire ist untergegangen. Ein Konvoi speziell ausgewählter Vertreter der neuen Verwaltung der Britischen Inseln traf heute, geschmückt mit Hakenkreuzfahnen, im Palace of Westminster ein. Der Führer machte deutlich, dass dieses monumentale Ereignis durch nichts gestört werden dürfe; die Sicherheitsstandards in London seien auf höchstem Niveau. Die besten Farbkameras und Aufnahmegeräte wurden aus Berlin angeschafft, um die Prozesse aufzuzeichnen und den Sieg des Reichs über internationalistische Bankiers und bolschewistische Korruption für künftige Generationen zu bewahren. Das Versäumnis der Briten, auf Deutschlands zahlreiche Versuche, durch Verhandlungen Frieden zu erreichen, zu reagieren, zeigte Hitlers grundlegendes Missverständnis der britischen politischen Ziele. Dieses Missverständnis wurde schließlich zu einer der Hauptursachen des Zweiten Weltkriegs. Dies führte schließlich zur Operation „Seelöwe“, der Eroberung der Britischen Inseln und einem historischen Treffen mit verschiedenen britischen Nationalisten und prodeutschen Politikern, die nun ihren Platz in der Neuen Ordnung suchen. Wir haben mehrere Optionen, die wir ihnen anbieten können. Wir können Großbritannien in England, Schottland und Wales aufteilen, eine neue nationalsozialistische Britische Union unter unserer Kontrolle gründen oder Oswald Mosley und die britische faschistische Union unterstützen, um Großbritannien in eine neue Ära des Isolationismus zu führen. Wir werden die Möglichkeit haben, jede dieser Optionen ausführlich zu prüfen, bevor wir eine endgültige Entscheidung treffen. Jede Option, für die wir uns entscheiden, erfordert militärische Reparationen von Großbritannien, um uns beim Wiederaufbau Europas nach diesem schrecklichen Krieg zu helfen."
BP_germany.140.a:0 "Aktuelle Pläne für die Teilung Großbritanniens."
BP_germany.140.b:0 "Aktuelle Pläne für die neue Britische Union."
BP_germany.140.c:0 "Präsentieren Sie Pläne zur Ernennung des BUF."
BP_germany.140.e:0 "Das ist unnötig. Die Inseln bleiben besetzt."

BP_germany.141.t:0 "Schicksal der Britischen Inseln - Teilung Großbritanniens"
BP_germany.141.d:0 "Eine der bevorzugten Methoden des Dritten Reichs, die Kontrolle über Gebiete von Interesse zu erlangen, war die Ernennung nationalistischer Führer aus der lokalen Bevölkerung. Mit Ausnahme der Reichskommissare für die Ostgebiete wurden die deutschen Eroberungen in Gebieten wie Norwegen, Belgien, den Niederlanden und Frankreich effektiv durch die Einsetzung deutscher oder nationalsozialistischer Anhänger gesteuert, die meist aus lokalen politischen Bewegungen rekrutiert wurden.\n \nJetzt haben wir die Möglichkeit, diese Politik gegenüber den Britischen Inseln fortzusetzen und unsere Neue Ordnung umzusetzen. Mit dem Zusammenbruch des Britischen Empires können wir den Allianzvertrag zwischen den Königreichen England und Schottland aufheben und damit das Wesen des Vereinigten Königreichs vollständig zerstören. Es gibt auch Stimmen, die glauben, dass wir Großbritannien in so viele separate Teile wie möglich aufteilen sollten, ähnlich der Philosophie, die Alfred Rosenberg in seinen Ideen für die Sowjetunion vertrat. Auf diesem Treffen sind wichtige politische Führer vertreten, die bereit sind, die Rolle der neuen Führung von England, Schottland und Wales zu übernehmen, und sie werden uns zu großem Dank verpflichtet sein, wenn wir diese Option wahrnehmen."
BP_germany.141.a:0 "Erstellen Sie England, Schottland und Wales."
BP_germany.141.b:0 "Erschaffen Sie England, Schottland, Wales und besetzen Sie den Kanal."
BP_germany.141.c:0 "Lassen Sie uns die anderen Pläne überprüfen, bevor wir diese Wahl treffen."

BP_germany.142.t:0 "Schicksal der Britischen Inseln – Schaffung einer Britischen Union"
BP_germany.142.d:0 "Die Beteiligung Großbritanniens am Zweiten Weltkrieg war geprägt von extrem hoher politischer Spaltung und Besorgnis unter den britischen Bürgern. Nach dem Fall Frankreichs leistete Großbritannien dem Dritten Reich allein Widerstand, und nur wenige glaubten, dass es der Übermacht Hitlers lange genug standhalten könnte. Viele glauben, dass die Briten nur aufgrund der Sturheit und Willenskraft Winston Churchills nicht kapitulierten. Nach der erfolgreichen Eroberung der Britischen Inseln können wir das Vereinigte Königreich wiederaufbauen, um unsere Interessen zu verwirklichen. Der zuvor abgesetzte Eduard VIII. wäre der ideale Führer für den neuen Staat, und die deutsche Verwaltung würde die täglichen Angelegenheiten der neuen britischen Regierung lenken. Die britische Nationalsozialistische Partei erhält unsere volle Unterstützung, um den korrupten Einfluss des ungezügelten Kapitalismus und des marxistischen Sozialismus auszumerzen. Die gesamte Außenpolitik wird von Berlin aus geregelt, was die Britische Union de facto zu einem verlängerten Arm des Reiches macht – bis auf den Namen. Dies wird uns auch die volle Kontrolle über die Zukunft der britischen Nation in der Neuen Ordnung ermöglichen."
BP_germany.142.a:0 "Wir kamen als Befreier. Schaffen Sie eine neue britische Union!"
BP_germany.142.b:0 "Gründen Sie eine Britische Union und besetzen Sie den Kanal."
BP_germany.142.c:0 "Sehen wir uns andere Pläne an, bevor wir diese Wahl treffen."

BP_germany.143.t:0 "Schicksal der Britischen Inseln – Ernennung der British Union of Fascists"
BP_germany.143.d:0 "Die British Fascist Union (BSF) ist eine politische Partei, die 1932 von Oswald Mosley gegründet wurde. Anfangs erfreute sie sich großer Beliebtheit, doch mit zunehmender Radikalisierung begann ihre Popularität zu schwinden. Die Schlacht an der Cable Street 1936 war maßgeblich für die Verabschiedung des Public Order Act 1936, der die Genehmigung der Polizei für politische Demonstrationen vorschrieb und das Tragen politischer Uniformen an öffentlichen Orten in Großbritannien verbot. Dies beeinflusste die Partei Mosleys stark, die als die „schwarzen Hemden“ ihrer Uniformen bekannt war. Die wachsende Angst vor der pro-deutschen Organisation im Vorfeld des Krieges in Großbritannien führte schließlich zur Verhaftung von Oswald Mosley und den prominentesten Mitgliedern der BFS, was 1940 zum Zusammenbruch der Organisation führte.\n \nJetzt haben wir die Möglichkeit, Oswald Mosley zum Führer des Vereinigten Königreichs zu ernennen und die BSF wiederzubeleben. Obwohl diese Option am wenigsten im direkten Interesse des Reichs in Großbritannien liegt, ist sie auch die am wenigsten strafende Regelung, die wir den Britischen Inseln vernünftigerweise auferlegen können. Mosley orientiert sich in vielen seiner Ideen am faschistischen Mussolini-Regime in Italien, mit der bemerkenswerten Ausnahme, dass er auf Isolationismus und ohne imperialistische Ambitionen beharrte. Seine entschieden antikommunistische Haltung und die Überzeugung, dass die Briten ihre Interessen auf ihre Insel beschränken würden, würden sicherstellen, dass das Reich seine Ziele ohne britische Intervention verfolgen kann."
BP_germany.143.a:0 "Erlauben Sie Oswald Mosley, das neue Großbritannien zu führen."
BP_germany.143.b:0 "Erlauben Sie Oswald Mosley, Großbritannien zu führen, aber besetzen Sie Dover."
BP_germany.143.c:0 "Lassen Sie uns die anderen Pläne überprüfen, bevor wir diese Wahl treffen."

