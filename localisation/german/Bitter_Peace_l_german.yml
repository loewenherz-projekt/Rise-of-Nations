#################################################################################################################################

IRQ_british_influense:0 "Britischer Einfluss"
IRQ_british_influense_desc:0 "1920 gründeten die osmanischen Vilajets Mosul, Basra und Bagdad den Staat Irak. Die Konferenz des Völkerbundes stellte ihn unter die provisorische Verwaltung Großbritanniens. Etwa zur gleichen Zeit stellte sich heraus, dass der Irak reich an Öl war. Die Briten wollten das Land nicht verlassen, obwohl sie dies spätestens 1930 hätten tun müssen. Die englisch-französischen Konzerne übernahmen nach und nach alle Ölfelder und die tatsächliche Macht im Land. Die irakische Regierung und König Ghazi entschieden nur noch aus formalen Gründen. Tatsächlich wurde alles von den Vertretern Londons entschieden. Dieser Zustand wurde durch den englisch-irakischen Vertrag von 1930 gefestigt." 
 
