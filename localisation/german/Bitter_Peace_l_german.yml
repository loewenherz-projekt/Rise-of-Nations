 ### GER - GERMANY ###
 RKS_submarine_1:0 "UB III Typ"
 RKS_submarine_1_desc:0 "Das Küsten-U-Boot Typ UB III war eine U-Boot-Klasse, die während des Ersten Weltkriegs von der deutschen Kaiserlichen Marine gebaut wurde. Sie trugen zehn Torpedos und verdrängten über 500 Tonnen. Zwischen 1916 und 1918 wurden 96 Exemplare gebaut, die jedoch alle bis 1935 außer Dienst gestellt wurden."
 RKS_submarine_2:0 "Typ IIA"
 RKS_submarine_2_desc:0 "Das deutsche U-Boot Typ IIA war ein einrumpfiges, vollverschweißtes Küsten-U-Boot mit internen Ballasttanks. Es verdrängte über 250 Tonnen und war mit fünf 533-mm-Torpedorohren ausgestattet. Sechs Exemplare wurden zwischen 1934 und 1935 gebaut."
 #RKS_submarine_2b: "Type VIIA"
 RKS_submarine_3:0 "Typ VIIC"
 RKS_submarine_3_desc:0 "Das seetüchtige U-Boot Typ VIIC war das Arbeitspferd der deutschen U-Bootwaffe. Zwischen 1940 und 1945 wurden 568 Exemplare in Dienst gestellt. Die Schiffe verdrängten 770 Tonnen und waren mit fünf 533-mm-Torpedorohren bewaffnet."
 #RKS_submarine_3b: "Type IXC"
 RKS_submarine_4:0 "Typ XXI"
 RKS_submarine_4_desc:0 "U-Boote des Typs XXI, auch bekannt als „Elektroboote“, waren die ersten U-Boote, die hauptsächlich für den Unterwasserbetrieb konzipiert waren und nicht als Überwasserschiffe, die abtauchen konnten, um unentdeckt zu bleiben oder einen Angriff zu starten. Ihre Hauptmerkmale waren der stromlinienförmige Rumpf und Kommandoturm sowie die große Anzahl an Batteriezellen. Mit einer Wasserverdrängung von über 1.620 Tonnen gehörten sie zu den größten deutschen U-Boot-Klassen. Zwischen 1943 und 1945 wurden 118 Schiffe in Dienst gestellt."
 RKS_destroyer_1:0 "Typ 23"
 RKS_destroyer_1_desc:0 "Der Typ 23 war eine Torpedobootklasse, die nach dem Ersten Weltkrieg für die Kriegsmarine gebaut wurde. Zwischen 1926 und 1928 wurden sechs Schiffe gebaut, die alle im Zweiten Weltkrieg im Einsatz waren. Trotz ihrer Bezeichnung als Torpedoboote hatten die Schiffe die Größe eines Zerstörers, verdrängten über 920 Tonnen und waren mit drei 105-mm-L/45-Geschützen bewaffnet."
 RKS_destroyer_2:0 "Zerstörer 1934"
 RKS_destroyer_2_desc:0 "Die Zerstörer-Klasse 1934 war die erste deutsche Zerstörerklasse, die seit dem Ersten Weltkrieg gebaut wurde. Sie war mit fünf 5-Zoll-Geschützen und acht Torpedorohren bewaffnet. Es wurden 16 Schiffe gebaut, von denen 12 der verbesserten Unterklasse Zerstörer 1934A angehörten."
 RKS_destroyer_3:0 "Narvik-Klasse"
 RKS_destroyer_3_desc:0 "Der Zerstörer 1936A, den Alliierten als Zerstörer der Narvik-Klasse bekannt, wurde für die neuen 150-mm-Geschütze (5,9 Zoll) entwickelt. Ausgelegt mit drei Einzelgeschützen achtern und einem Zwillingsgeschütz am Bug, waren sie ursprünglich nur mit einem Einzelgeschütz am Bug ausgestattet. Vier der acht Schiffe dieser Klasse wurden später mit den Zwillingstürmen nachgerüstet. Eine zweite Gruppe von sieben Zerstörern wurde nach einem leicht modifizierten Design mit Zwillingsgeschützen am Bug gebaut."
 RKS_destroyer_4:0 "Zerstörer 1944"
 RKS_destroyer_4_desc:0 "Obwohl der erste Prototyp eines dieselbetriebenen Zerstörers (Zerstörer 1942) nicht fertiggestellt wurde, wurde die Entwicklung des Schiffstyps fortgesetzt. Es wurden mehrere Vorschläge gemacht, die schließlich zum Projekt Zerstörer 1944 führten. Neben einer schweren Hauptbewaffnung verfügten die Schiffe im Vergleich zu ihren Vorgängern über eine verstärkte Flakbewaffnung, einschließlich der neuen 5,5-cm-Flugabwehrkanone."
 RKS_light_cruiser_1:0 "Emden-Klasse"
 RKS_light_cruiser_1_desc:0 "Die Emden war das erste große Kriegsschiff, das nach dem Ersten Weltkrieg in Deutschland gebaut wurde. Sie wurde 1921 auf Kiel gelegt und 1925 in Dienst gestellt. Die Bewaffnung bestand aus acht 150-mm-Geschützen (5,9 Zoll) in Einzeltürmen."
 #RKS_light_cruiser_1b: "Königsberg Class"
 RKS_light_cruiser_2:1 "Leipziger Klasse"
 RKS_light_cruiser_2_desc:1 "Die Leichten Kreuzer der Leipzig-Klasse wurden zwischen 1928 und 1935 als Verbesserung gegenüber den Vorgängerkreuzern der Königsberg-Klasse gebaut. Sie verdrängten über 8.100 Tonnen, verfügten über ausreichende Geschwindigkeit und Reichweite und waren mit neun 15-cm-SK C/25-Geschützen in ihrer Hauptbewaffnung bewaffnet."
 RKS_light_cruiser_3:0 "M-Klasse"
 RKS_light_cruiser_3_desc:0 "Die Kreuzer der M-Klasse waren als Aufklärungsschiffe für Handelsüberfallgeschwader konzipiert. Im Rahmen des Plans Z wurden sechs Schiffe bestellt, von denen zwei auf Kiel gelegt wurden, bevor die Arbeiten bei Kriegsausbruch eingestellt wurden. Die Hauptbewaffnung bestand aus acht 150-mm-Geschützen in vier Zwillingstürmen."
 RKS_light_cruiser_4:0 "Q-Klasse"
 RKS_light_cruiser_4_desc:0 "Die Kreuzer der Q-Klasse stellten eine modifizierte Konstruktion der M-Klasse dar. Sie waren größer als die M-Klasse und verfügten über eine schwerere Flugabwehrbewaffnung und eine verbesserte Feuerkontrolle."
 RKS_heavy_cruiser_1:0 "Blücher-Klasse"
 RKS_heavy_cruiser_1_desc:0 "Blücher was the last armored cruiser built by Germany. Her design was innovative for her time and paved the way for the later Von der Tann-class Battlecruisers. By World War I, she was already obsolete. Blücher was sunk at the Battle at the Doggerbank in 1915."
 RKS_heavy_cruiser_2:0 "Hipper-Klasse"
 RKS_heavy_cruiser_2_desc:0 "Die Schweren Kreuzer der Admiral-Hipper-Klasse waren die ersten Schweren Kreuzer der Kriegsmarine. Offiziell verdrängten sie 10.000 Tonnen, tatsächlich waren es über 16.000 Tonnen. Sie waren mit acht 8-Zoll-Geschützen in vier Zwillingstürmen und einer Sekundärbatterie aus zwölf 105-mm-Geschützen bewaffnet."
 RKS_heavy_cruiser_3:0 "Prinz-Eugen-Klasse"
 RKS_heavy_cruiser_3_desc:0 "Offiziell Teil der Hipper-Klasse, verfügt die Prinz-Eugen-Unterklasse über zahlreiche Verbesserungen, darunter eine stärkere Flugabwehr. Von den drei Schiffen dieser Unterklasse wurde nur die Prinz Eugen fertiggestellt. Sie war an der Versenkung der HMS Hood während der Operation Rheinübung beteiligt. Nach dem Krieg wurde sie in die USA überführt und diente als USS Prinz Eugen bei den Atombombentests Able und Baker, bevor sie 1946 im Kwajalein-Atoll sank."
 RKS_heavy_cruiser_4:0 "Kreuzer der P-Klasse"
 RKS_heavy_cruiser_4_desc:0 "Die P-Klasse war ein großer schwerer Kreuzer, der von der Kriegsmarine offiziell als Panzerschiff bezeichnet wurde. Mit einer Wasserverdrängung von fast 24.000 Tonnen war sie 3.000 Tonnen leichter, aber 55 Meter länger als die US-Schlachtschiffe der New-York-Klasse. Die Bewaffnung bestand aus sechs 280-mm-Geschützen in zwei Drillingstürmen."
 RKS_battle_cruiser_1:0 "Yorck-Klasse"
 RKS_battle_cruiser_1_desc:0 "Die drei Schiffe der Yorck-Klasse wurden als Antwort auf die britische Renown-Klasse entworfen. Sie sollten mit acht 380-mm-Geschützen in vier Zwillingstürmen bewaffnet sein. Alle drei Schiffe wurden 1916 auf Kiel gelegt, aber aufgrund des Krieges wurde keines fertiggestellt."
 RKS_battle_cruiser_2:0 "O-Klasse"
 RKS_battle_cruiser_2_desc:0 "1939 beschloss die Kriegsmarine, drei der geplanten Kreuzer der P-Klasse durch Schlachtkreuzer zu ersetzen. Das Ergebnis waren die Schlachtkreuzer der O-Klasse, bewaffnet mit sechs 38-cm-Geschützen (15 Zoll) in drei Zwillingstürmen. Die Schiffe wurden mit einer Verdrängung von 35.400 Tonnen und einer Höchstgeschwindigkeit von 35 Knoten konstruiert. Bauaufträge für die drei Schiffe der Klasse lagen vor, wurden jedoch nicht begonnen."
 RKS_battleship_1:0 "Deutschland-Klasse"
 RKS_battleship_1_desc:0 "Nach dem Versailler Vertrag durfte Deutschland sechs Schlachtschiffe aus der Vor-Dreadnought-Baureihe behalten. Von der Kriegsmarine als Linienschiffe klassifiziert, blieben bis in die 1930er Jahre nur zwei Schiffe der Deutschland-Klasse im aktiven Dienst (nicht zu verwechseln mit den späteren Westentaschenschlachtschiffen der Deutschland-Klasse). Am 1. September 1939 um 4:47 Uhr feuerte die Schleswig-Holstein die ersten Schüsse des Zweiten Weltkriegs ab, als sie das Feuer auf die Westerplatte im polnischen Danzig eröffnete."
 RKS_battleship_2:0 "Scharnhorst-Klasse"
 RKS_battleship_2_desc:0 "Die Schlachtschiffe der Scharnhorst-Klasse waren die ersten modernen Schlachtschiffe, die für die Kriegsmarine gebaut wurden. Sie entstanden als Antwort auf die französischen Schlachtkreuzer der Dunkerque-Klasse, die wiederum eine Antwort auf die deutschen Panzerschiffe der Deutschland-Klasse (Westentaschen-Schlachtschiffe) waren. Die Scharnhorst-Klasse ist mit neun 283-mm-Geschützen (11 Zoll) in drei Drillingstürmen bewaffnet. Es gab Pläne, sie mit zwei 380-mm-Geschützen (15 Zoll) aufzurüsten, doch mit Kriegsausbruch wurde dies nie umgesetzt."
 RKS_battleship_3:0 "Bismarck-Klasse"
 RKS_battleship_3_desc:0 "Die aus zwei Schiffen bestehenden Schlachtschiffe der Bismarck-Klasse waren die größten Kriegsschiffe der Kriegsmarine. Die Schiffe wurden als Reaktion auf die im Bau befindlichen neuen französischen Schlachtschiffe entworfen und verfügten über eine ähnliche Bewaffnung mit acht 38-cm-Geschützen (15 Zoll) wie die Richelieu-Klasse, mit vier Zwillingstürmen anstelle der zwei Vierlingstürme der Richelieu-Klasse. Die Bismarck ist berühmt für die Versenkung des britischen Schlachtkreuzers HMS Hood in der Schlacht in der Dänemarkstraße, wurde jedoch später gejagt und versenkt, bevor sie den Hafen erreichte."
 RKS_battleship_4:0 "Hindenburg-Klasse"
 RKS_battleship_4_desc:0 "Der deutsche Plan Z sah eine Streitmacht von zehn Schlachtschiffen vor, um die Seemacht Großbritanniens herauszufordern. Die H-Klasse bestand aus einer Reihe von Entwürfen für die sechs Schlachtschiffe, die zur Erfüllung der Anforderungen des Plans benötigt wurden. Zwei Schiffe des Typs H39 wurden bei Ausbruch des Zweiten Weltkriegs auf Kiel gelegt, der Bau wurde jedoch mit Kriegsbeginn eingestellt. Keines der Schiffe erhielt einen offiziellen Namen, doch als möglicher Name für das Typschiff der Klasse wurde Hindenburg vermutet. Wären die Schiffe fertiggestellt worden, wären sie erweiterte Schiffe der Bismarck-Klasse mit einer Hauptbatterie aus acht 40,6-cm-Geschützen (16 Zoll) gewesen."
 RKS_carrier_1:0 "Flugzeugdampfer I"
 RKS_carrier_1_desc:0 "Das 1915 entworfene Projekt „Flugzeugdampfer I“ war ein Umbau des unvollendeten Passagierschiffs Ausonia zu einem Flugzeugträger. Der Bau wurde am Ende des Ersten Weltkriegs aufgegeben. Wäre das Schiff fertiggestellt worden, hätte es in seinen drei Hangars eine Mischung aus Wasserflugzeugen und Radflugzeugen transportiert und 12.500 Tonnen verdrängt."
 RKS_carrier_2:0 "Seydlitz-Klasse"
 RKS_carrier_2_desc:0 "Die Seydlitz wurde als viertes Schiff der Schweren Kreuzer der Admiral-Hipper-Klasse auf Kiel gelegt. Zu Kriegsbeginn war sie teilweise fertiggestellt und sollte zu einem Flugzeugträger umgebaut werden. Das Projekt mit dem Codenamen Weser 1 war bereits teilweise im Gange, als die Arbeiten aufgrund zunehmender Luftangriffe auf Bremen und fehlender Ressourcen für den Bau eingestellt wurden."
 RKS_carrier_3:0 "Graf Zeppelin-Klasse"
 RKS_carrier_3_desc:0 "Die Graf Zeppelin war die einzige Schiffsklasse der Kriegsmarine, die von Anfang an als Flugzeugträger konzipiert war. Zwei Schiffe wurden bestellt, aber keines wurde fertiggestellt. Die Graf Zeppelin sollte 30 Bf-109T-Jäger und 12 Ju-87E-Sturzkampfbomber transportieren, Schiffsversionen der Bf-109E und der Ju-87D."
 RKS_carrier_4:0 "Europa-Klasse"
 RKS_carrier_4_desc:0 "In den 1940er Jahren erwog die Kriegsmarine den Umbau mehrerer ziviler Schiffe zu Flugzeugträgern. Das größte dieser Schiffe war das Passagierschiff Europa. Als größtes Passagierschiff Deutschlands wurde es als Kasernenschiff und Truppentransporter eingesetzt, bevor mit dem Umbau zum Flugzeugträger begonnen wurde. Wäre es fertiggestellt gewesen, hätte es 56.000 Tonnen verdrängt und eine Luftgruppe von 42 Flugzeugen befördert."
 RKS_SH_battleship_1:0 "Schlachtschiff H41"
 RKS_SH_battleship_1_desc:0 "Das Schlachtschiffdesign H41 war eine Verbesserung gegenüber dem Vorgängerdesign H39. Es sah eine deutlich stärkere Panzerung, verstärkte Torpedoschotten und Schutz für Ruder und Propellerwellen vor. Die Hauptbatterie wurde auf acht 42-cm-Geschütze aufgerüstet, größer als die der geplanten Schlachtschiffe der britischen Lion-Klasse. Diese Schiffe sollten eine Verdrängung von fast 70.000 Tonnen haben."
 RKS_SH_battleship_2:0 "Schlachtschiff H44"
 RKS_SH_battleship_2_desc:0 "Die H44-Klasse war das letzte Schlachtschiff der H-Serie. Da es keine Begrenzung hinsichtlich des Geschützkalibers oder der Verdrängung gab, wurden die Modelle H42 bis H44 mit zunehmend schwererer Bewaffnung und Panzerung ausgestattet, was schließlich in der 131.000 Tonnen schweren H44 gipfelte, die mit acht 508-mm-Geschützen (20 Zoll) ausgerüstet war."
 
