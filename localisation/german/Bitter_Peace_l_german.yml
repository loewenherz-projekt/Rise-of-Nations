# Switzerland ###################################################################################################################
#################################################################################################################################

SWI_national_redoubt:0 "Nationales Redoute"
SWI_national_redoubt_desc:0 "Das Nationale Redoute, auch Schweizer Redoute genannt, ist ein Verteidigungsplan der Schweizer Regierung aus dem späten 19. Jahrhundert zur Abwehr ausländischer Angriffe. Zu Beginn des Zweiten Weltkriegs wurde der Plan erweitert und verfeinert, um einer möglichen Invasion Nazideutschlands entgegenzuwirken, die zwar geplant war, aber nie stattfand. Der Begriff „Redoute“ bezeichnet ursprünglich ein Befestigungssystem, das seit den 1880er Jahren zum Schutz der Zentralschweiz als befestigtes Rückzugsgebiet für die Schweizer Armee errichtet wurde. Es handelte sich um einen Befestigungskomplex in den Alpen entlang der Ost-West-Linie mit den drei Hauptfestungen Saint-Maurice, Saint-Gotthard und Sargans. Diese Festungen verteidigten in erster Linie die Alpenpässe zwischen Deutschland und Italien und deckten nicht das industriell dicht besiedelte Landesinnere der Schweiz ab. Das Landesinnere wiederum stand unter dem Schutz von Befestigungen, der „Grenzlinie“ und der „Heereslinie“ – eine bedeutende, aber nicht unüberwindbare Barriere. Im Gegenteil, der Redoutenkomplex ist als völlig uneinnehmbar konzipiert, sodass der Angreifer die Alpen nicht von Norden nach Süden über Bergpässe oder Eisenbahntunnel überqueren kann. Diese Strategie sollte jede Invasion eindämmen und ist aufgrund der Unmöglichkeit, die Schweizer Verkehrsinfrastruktur zu nutzen, sinnlos." 

SWI_conscription:0 "Schweizer Mobilisierung"
SWI_conscription_desc:0 "Da unser Land so klein ist, verfügen wir nicht über einen ausreichend großen Pool an Arbeitskräften, um ausschließlich Freiwillige heranzuziehen. Jeder Mann im kampffähigen Alter muss seinen Beitrag leisten."
 
