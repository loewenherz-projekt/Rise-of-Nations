BP_turkey.2.a:0 "Großartig!"

BP_turkey.3.t:0 "Unsere Allianz war ein Erfolg"
BP_turkey.3.d:0 "Nach der Niederlage der Streitkräfte der Sowjetunion im Kaukasus erhielten wir im Rahmen eines Abkommens mit dem Dritten Reich das versprochene Gebiet."
BP_turkey.3.a:0 "Großartig!"

BP_turkey.4.t:0 "Die Deutschen fordern unsere Unterwerfung"
BP_turkey.4.d:0 "Unsere Neutralität ist zu Ende – Deutschland hat unser Land umzingelt und verlangt unter Androhung einer Invasion unsere Zusammenarbeit. Die Türkische Republik muss nun über ihre Ausrichtung entscheiden."
BP_turkey.4.a:0 "Wir haben keine andere Wahl, als uns zu fügen"
BP_turkey.4.b:0 "Niemals!"

BP_turkey.10.t:0 "Teilung der Türkei - Thrakien"
BP_turkey.10.d:0 "In Thrakien bestehen widerstreitende Interessen zwischen den bulgarischen, türkischen und griechischen Nationen. Dieses Gebiet war in der Vergangenheit ein Brennpunkt der Konflikte zwischen diesen Gruppen, und diese alten Spannungen sind nach unserer Besetzung wieder aufgeflammt.\n \n1453 eroberte das Osmanische Reich die Stadt Konstantinopel und veränderte den Lauf der Geschichte für immer. Nach der Besetzung dieser historischen Stadt und der umliegenden Region liegt die Zukunft in unseren Händen. Wir haben viele Möglichkeiten, Thrakien aufzuteilen, und sollten jede Möglichkeit sorgfältig prüfen."
BP_turkey.10.a:0 "Thrakien an Bulgarien abtreten"
BP_turkey.10.b:0 "Die Türkei wird Thrakien zurückerobern"
BP_turkey.10.c:0 "Besetzen Sie Thrakien und Bursa, um die Stabilität dieser Region zu gewährleisten."

BP_turkey.11.t:0 "Teilung der Türkei und Zyperns"
BP_turkey.11.d:0 "Zypern ist seit der ersten Seefahrt eine wichtige Festung im östlichen Mittelmeer. Die Insel, die hauptsächlich von Griechen bewohnt wird, hat eine lange Geschichte und ist noch heute ein wichtiger strategischer Standort in dieser Region.\n \nNachdem wir die Briten von der Insel vertrieben haben, müssen wir über ihre künftigen Besitzverhältnisse entscheiden. Beachten Sie, dass dieses Gebiet ausdrücklich zur italienischen Interessensphäre gehört. Es wäre verärgernd, wenn Italien diese Konzession nicht erhielte."
BP_turkey.11.a:0 "Die Italiener haben hier den stärksten Anspruch"
BP_turkey.11.b:0 "Wir brauchen diese Insel für unsere Interessen im Mittelmeer"

BP_turkey.12.t:0 "Teilung der Türkei – Reichskommissariat Kaukasus"
BP_turkey.12.d:0 "Die administrative Aufteilung des Reichskommissariats Kaukasus dient in erster Linie dem Schutz unserer Interessen an den Ölfeldern der Region, insbesondere Bakus. Die Kontrolle dieser Region ist entscheidend für das Überleben und den zukünftigen Wohlstand des Dritten Reichs.\n \nEs wäre sinnvoll, eine Pufferzone nach Ostanatolien und Nordpersien auszudehnen, um Baku vor zukünftigen Konflikten in der Region zu schützen. Eine deutsche Verwaltung der verschiedenen Nationalitäten in diesen Gebieten unter einer einheitlichen Herrschaft würde uns eine bessere Kontrolle über sie gewährleisten. Es wäre unklug, türkischen oder armenischen Nationalisten zu erlauben, unsere Vision zu behindern.\n \nUnabhängig von unserer Entscheidung haben wir weiterhin die Möglichkeit, die Möglichkeit einer Autonomie für diese lokalen Nationalitäten in der Region zu prüfen."
BP_turkey.12.a:0 "Erweiterung des RK Kaukasus nach Ostanatolien"
BP_turkey.12.b:0 "Erweitern Sie RK Kaukasus nach Ostanatolien und Nordpersien"
BP_turkey.12.c:0 "Dies ist nicht notwendig. Fahren Sie mit dem nächsten Bereich fort"

BP_turkey.13.t:0 "Teilung der Türkei – Armenien"
BP_turkey.13.d:0 "Bei der Gründung des Reichskommissariats Kaukasus wurde die Präsenz verschiedener nationaler Gruppen in der Region berücksichtigt, insbesondere der Armenier, Georgier und Aserbaidschaner. Nachdem wir nun die Kontrolle über dieses Gebiet vollständig übernommen haben, können wir über die Art unserer Regierungsführung für diese Nationen entscheiden. Unsere Interessen in Baku sind zu kritisch, um dem aserbaidschanischen Volk bereits irgendeine Form von Unabhängigkeit zu gewähren.\n \nHitler war der Ansicht, dass diese traditionell verfeindeten Gruppen einer strengen Kontrolle unterworfen werden müssten, ihnen aber nicht die gleiche Zwangsarbeit und Versklavung auferlegt werden sollte wie den slawischen Völkern in den umliegenden Gebieten. Die Diskussionen zwischen ihm, Alfred Rosenberg und anderen Parteimitgliedern führten zu keinem Konsens über die beste Regierungsform für dieses Gebiet. Prüfen Sie diese Optionen sorgfältig. Wir müssen entscheiden, ob die Schaffung unabhängiger Staaten wie Armenien unseren Interessen am besten dient oder ob ihre Eindämmung durch das Reichskommissariat letztendlich die beste Lösung ist."
BP_turkey.13.a:0 "Schaffung eines Großarmeniens"
BP_turkey.13.b:0 "Schaffen Sie Großarmenien und schaffen Sie auch Georgien"
BP_turkey.13.c:0 "Geben Sie nur Armenien und Georgien frei, nehmen Sie kein türkisches Territorium ein"
BP_turkey.13.e:0 "Keine Autonomie. Das Reichskommissariat wird nicht kompromittiert"

BP_turkey.14.t:0 "Teilung der Türkei – Südküste"
BP_turkey.14.d:0 "Nach der Niederlage und Besetzung der Türkei erinnern uns unsere italienischen Freunde unaufhörlich an ihre Ansprüche auf das südliche Gebiet der Türkei. Ihre Ansprüche basieren auf dem Friedensvertrag von Sèvres aus dem Jahr 1920, der jedoch nie in Kraft trat und nach der Revision seiner Bedingungen auf der Lausanner Konferenz 1923 de jure völlig außer Kraft trat. Nun fordern italienische Diplomaten die sofortige Übernahme der Kontrolle über den Süden der Türkei und mehrerer Inseln in der Ägäis (vor allem der Dodekanes). \n \nDurch die Abtretung dieser Gebiete an Italien verliert die Türkei den Zugang zum Mittelmeer und muss sich mit dem Schwarzen Meer zufriedengeben. Auf diese Weise können wir unsere Beziehungen zu Italien noch weiter stärken. Sollten wir ihre Forderungen blockieren, wären die diplomatischen Folgen verheerend. Wir müssen eine Entscheidung treffen."
BP_turkey.14.a:0 "Unterstützen Sie alle ihre Anforderungen"
BP_turkey.14.b:0 "Erlauben Sie nur die Kontrolle über die Küste"
BP_turkey.14.c:0 "Lehnen Sie sie ab"

BP_turkey.15.t:0 "Teilung der Türkei – Kurdistan"
BP_turkey.15.d:0 "Unser Einfluss in den türkischen und persischen Gebieten blieb dem kurdischen Volk nicht verborgen, das seine nationalen Führer mit der Bitte um die Gründung eines eigenen Staates entsandte. Obwohl diese neue politische Einheit als nützliche Maßnahme für eine typische Teile-und-herrsche-Strategie dienen könnte, leben die Kurden in einem Gebiet, das ihre Unabhängigkeit historisch erschwert hat. Jahrhundertelang kämpften die Kurden mit den arabischsprachigen Völkern des Nahen Ostens, den Persern und den Türken um ihre Souveränität. Wenn wir ihnen einen eigenen Staat gäben, stünden die Kurden uns ewig in der Schuld, aber wir müssen entscheiden, ob sie dieses Zugeständnis wert sind und ob es unseren Interessen im Nahen Osten am besten dient."
BP_turkey.15.a:0 "Es ist an der Zeit, Kurdistan auf die Landkarte zu setzen"
BP_turkey.15.b:0 "Kurdistan schaffen, aber nur auf türkischem Gebiet"
BP_turkey.15.c:0 "Ein unabhängiges Kurdistan liegt nicht in unserem Interesse"

BP_turkey.16.t:0 "Teilung der Türkei – Letzter Schritt"
BP_turkey.16.d:0 "Nachdem nun die Aufteilung aller umstrittenen Gebiete beschlossen ist, müssen wir uns auf die türkische Nation selbst konzentrieren. Wir könnten in Zentralanatolien einen neuen türkischen Staat gründen und werden dessen Angelegenheiten genau beobachten, um einen neuen Konflikt in der Region zu verhindern. Mit der Zeit werden diese Grenzen zu der von uns geschaffenen neuen Ordnung werden."
BP_turkey.16.a:0 "Beenden Sie die Teilung und gründen Sie den türkischen Staat"
BP_turkey.16.b:0 "Die Türkei bleibt besetzt"

### Iraq 

BP_iraq.1.t:0 "Der Putsch gelingt" 
BP_iraq.1.d:0 "Aufgrund des Anglo-Irakischen Vertrags von 1930 ist unser Land noch immer von der Position Großbritanniens abhängig. Patriotischen Kreisen des Landes gefiel diese Situation nicht, und König Gazi I. versuchte, eine von Großbritannien unabhängige Politik zu verfolgen, jedoch ohne Erfolg. Ein Teil der antibritischen irakischen Armee, die sich in den 1930er Jahren um den deutschen Botschafter Fritz Grobb gruppierte, wurde als „Kreis der Sieben“ und ihre Anführer als die „Goldenen Vier“ bekannt.\n \nNach den Niederlagen Großbritanniens in Europa und Nordafrika führten der irakische Premierminister Rashid Ali al-Gailani, der Chef des irakischen Generalstabs Amin Zaki Suleiman und die prodeutsche nationalistische Gruppe „Goldenes Quadrat“ unter Führung von Oberst Salah al-Din al-Sabah, Mahmud Salman, Fahmi Said und Camille Shabiba am 1. April 1941 einen gegen Großbritannien gerichteten Militärputsch durch. Regent Abd al-Ilah und proenglische Minister flohen aus Bagdad. Da der Irak 1932 nur formal unabhängig wurde, war es das Ziel der Gruppe, den Krieg für die vollständige Unabhängigkeit und die Gründung eines panarabischen Staates zu nutzen. Dies führte zur Zusammenarbeit mit dem deutschen Geheimdienst und zur Annahme militärischer Unterstützung durch Deutschland. Der Regierungswechsel führte zur britischen Invasion und anschließenden Besetzung des Irak, die bis 1947 andauerte."
BP_iraq.1.a:0 "Es lebe der freie Irak!"
BP_iraq.1.b:0 "Stellen Sie die legitime Regierung wieder her!"

BP_iraq.2.t:0 "Der Putsch ist ein Fehlschlag" 
BP_iraq.2.d:0 "Aufgrund des Anglo-Irakischen Vertrags von 1930 ist unser Land noch immer von der Position Großbritanniens abhängig. Patriotischen Kreisen des Landes gefiel diese Situation nicht, und König Gazi I. versuchte vergeblich, eine von Großbritannien unabhängige Politik zu verfolgen. Ein Teil der antibritischen irakischen Armee, die sich in den 1930er Jahren um den deutschen Botschafter Fritz Grobb gruppierte, wurde als „Kreis der Sieben“ und ihre Anführer als die „Goldenen Vier“ bekannt.\n \nNach den Niederlagen Großbritanniens in Europa und Nordafrika unternahmen der irakische Premierminister Rashid Ali al-Gailani, der irakische Generalstabschef Amin Zaki Suleiman und die prodeutsche nationalistische Gruppe „Goldenes Quadrat“ unter Führung von Oberst Salah al-Din al-Sabah, Mahmud Salman, Fahmi Said und Camille Shabiba am 1. April 1941 einen gegen Großbritannien gerichteten Putschversuch. Glücklicherweise gelang es regierungstreuen Militärs und Politikern, die Regierung zu verlassen und die gegenwärtige Regierung zu halten."
BP_iraq.2.a:0 "Die Legitimität des Regimes gerettet!"
BP_iraq.2.b:0 "Putsch gescheitert, aber es ist noch nicht vorbei!"

### Iran

BP_persia.1.t:0 "Reich lädt uns zur Achse ein"
BP_persia.1.d:0 "Gestern überbrachte der deutsche Botschafter in Teheran ein formelles Angebot. Kern des Vorschlags ist die Beendigung der Bündnisbeziehungen zwischen dem deutschen und dem iranischen Volk und der Beitritt unseres Landes zur Achse. Obwohl dies kein unvorhergesehenes und unmögliches Ereignis ist, beschäftigt es die Generäle der Alliierten und der UdSSR nach wie vor. Wir sind uns jedoch noch nicht sicher, ob wir diese Einladung annehmen und unsere Neutralität aufgeben sollen. Viele in der Regierung glauben, dass die Waage nun zugunsten der Deutschen ausschlägt, und wenn wir zustimmen, könnte dies einen Wendepunkt im Krieg im Nahen Osten und an der Ostfront bedeuten. Schah, Sie haben das letzte Wort."
BP_persia.1.a:0 "Wir werden gerne Reichs Freunde!"
BP_persia.1.b:0 "Wir brauchen keinen Krieg."

BP_persia.2.t:0 "Der Iran nimmt unsere Einladung an!"
BP_persia.2.d:0 "Schah Reza Pahlavi und die iranische Regierung haben unser Angebot begeistert angenommen!"
BP_persia.2.a:0 "Großartig!"

BP_persia.3.t:0 "Iranische Reaktion"
BP_persia.3.d:0 "Schah Reza Pahlavi lehnte unser Angebot ab. Er erklärte, er wolle keinen Krieg in sein Land bringen und es der Bedrohung durch die Alliierten und die UdSSR aussetzen. Er versicherte außerdem, dass er weiterhin ein Freund des Dritten Reichs bleiben und gegenüber allen Konfliktparteien Neutralität wahren wolle."
BP_persia.3.a:0 "Nun, sie sind schlimmer"

BP_persia.4.t:0 "Operation «Gesicht»"
BP_persia.4.d:0 "Seit den 1930er Jahren suchte das Dritte Reich nach möglichen Verbündeten im Nahen Osten. Ein solcher potenzieller Partner war der Iran. Trotz der starken Position des britischen Kapitals, das eine Schlüsselrolle in der iranischen Wirtschaft spielte, verstärkte sich die geopolitische Voreingenommenheit gegenüber dem Dritten Reich. Darüber hinaus hat Berlin seit 1933 die Beziehungen zum Iran auf eine neue qualitative Ebene gehoben. Das Reich beginnt, sich aktiv an der Entwicklung der Wirtschaft und Infrastruktur des Iran sowie an der Reform der Streitkräfte der Monarchie zu beteiligen. Im Dritten Reich werden iranische Jugendliche und Militärangehörige ausgebildet, die Goebbels in seiner Propaganda als „Söhne Zaratuschtras“ bezeichnete. Deutsche Ideologen erklärten die Perser zu „reinen Ariern“ und sie wurden per Sondererlass von den Nürnberger Rassengesetzen ausgenommen. Infolgedessen hatte das Dritte Reich zu Beginn des Zweiten Weltkriegs eine starke Position im Iran erlangt, und das Land entwickelte sich de facto zu einem deutschen Stützpunkt im Nahen Osten. Bis 1941 stellte sich die Situation mit dem Iran und seiner „arischen Voreingenommenheit“ für Moskau und London wie folgt dar: Es bestand die reale Gefahr, dass die mit britischem Kapital aufgebaute iranische Öl- und Transportinfrastruktur vom Dritten Reich gegen die UdSSR und Großbritannien eingesetzt würde. So verarbeitete allein eine Ölraffinerie in Abadan 1940 8 Millionen Tonnen Öl. Und Flugbenzin wurde in der gesamten Region nur in Baku und Abadan produziert. Sollten die deutschen Streitkräfte zudem von Nordafrika nach Palästina oder Syrien vordringen oder 1942 die Grenze Baku-Derbent-Astrachan erreichen, wäre der Kriegseintritt der Türkei und des Irans auf deutscher Seite entschieden. Im Zusammenhang mit der geplanten Offensive der Wehrmacht tief in die Sowjetunion hinein war der Persische Korridor, der durch das Gebiet der Transiranischen Eisenbahn führte, eine der einfachsten Möglichkeiten, das von den USA auf dem Seeweg eingeführte Leih- und Pachtgesetz umzusetzen. Britische und sowjetische Ingenieure erkannten die enorme Bedeutung dieser Eisenbahn und bemühten sich, sie aufmerksam zu verfolgen. Die zunehmende Zahl deutscher U-Boot-Angriffe und die Eisbedeckung des Meeres im Raum Archangelsk erhöhten die Gefahr dieser Route, sodass die Notwendigkeit der Nutzung der Eisenbahn deutlich zunahm. Darüber hinaus versuchte die sowjetische Regierung, den Iran, Aserbaidschan und Turkmensahra („Turkmenische Ebene“) in ihren Staat einzugliedern und die Kommunisten im Iran an die Macht zu bringen. Der Druck Großbritanniens und der UdSSR auf den Iran führte zu einer Verschärfung der Spannungen und massiven antibritischen Äußerungen in Teheran, die nach Ansicht der Briten prodeutscher Natur waren. Die strategische Lage des Iran beeinträchtigte die Sicherheit der sowjetischen Ölfördergebiete und des Rückens der Roten Armee und bedrohte die britischen Militärrouten zwischen Indien und dem Mittelmeer."
BP_persia.4.a:0 "Wir müssen uns einig sein, wenn wir das Leben unserer Bürger retten wollen …" 
BP_persia.4.b:0 "Wir werden keine britische Marionette sein!"

BP_persia.5.t:0 "Iranische Reaktion"
BP_persia.5.d:0 "Der Iran hat unsere Forderungen aufgegeben. Alle Vorschläge zur Einführung eines begrenzten Kontingents und einer Teilbesetzung wurden von den Iranern entschieden abgelehnt. Wir haben keine andere Wahl, als gemeinsam mit Großbritannien einen Krieg gegen den Iran zu beginnen."
BP_persia.5.a:0 "Es wird also ein schlimmes Ereignis sein ..."

BP_persia.6.t:0 "Iranische Reaktion"
BP_persia.6.d:0 "Der Iran hat unsere Forderungen aufgegeben. Alle Vorschläge zur Einführung eines begrenzten Kontingents und einer Teilbesetzung wurden von den Iranern entschieden abgelehnt. Wir haben keine andere Wahl, als gemeinsam mit der Sowjetunion einen Krieg gegen den Iran zu beginnen."
BP_persia.6.a:0 "Es wird also ein schlimmes Ereignis sein ..."

