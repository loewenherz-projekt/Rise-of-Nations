 RKD_gw_tank_equipment:0 "Leichttraktor"
 RKD_gw_tank_equipment_short:0 "Leichttraktor"
 RKD_gw_tank_equipment_desc:0 "Der Leichttraktor war ein deutscher Versuchspanzer. Nach dem Ersten Weltkrieg war Deutschland durch den Versailler Vertrag in der militärischen Entwicklung eingeschränkt, doch ein geheimes Programm unter dem Decknamen „Traktor“ entwickelte gepanzerte Militärfahrzeuge und Artillerie."
 
 RKD_light_tank_equipment_1:0 "Panzerkampfwagen I"
 RKD_light_tank_equipment_1_short:0 "Panzer I"
 RKD_light_tank_equipment_1_desc:0 "Der Panzer I war ein leichter Panzer, der in den 1930er Jahren in Deutschland produziert wurde. Die Entwicklung des Panzer I begann 1932, die Massenproduktion startete 1934. Der PzKpfw I war ursprünglich als Übungspanzer gedacht, um die deutsche Armee mit dem Konzept der Panzerkriegsführung vertraut zu machen, wurde aber aufgrund des Mangels an moderneren Panzern häufig im Kampf eingesetzt." 
 
 RKD_light_tank_equipment_2:0 "Panzerkampfwagen II"
 RKD_light_tank_equipment_2_short:0 "Panzer II"
 RKD_light_tank_equipment_2_desc:0 "Der Panzer II war ursprünglich als Übergangslösung konzipiert, während größere, modernere Panzer entwickelt wurden. Aufgrund des Mangels an leistungsfähigeren Panzern wurde er jedoch häufig im Kampf eingesetzt."
 
 RKD_light_tank_equipment_3:0 "VK1602 Leopard"
 RKD_light_tank_equipment_3_short:0 "Leopard"
 RKD_light_tank_equipment_3_desc:0 "Der VK1602 Leopard war ein deutsches Aufklärungsfahrzeug, das 1942 entwickelt wurde. Geplant war die Bewaffnung mit der 75-mm-Kwk 41, die jedoch durch eine kleinere 50-mm-Kanone ersetzt wurde. Der VK 1602 verfügte über eine schräge Frontpanzerung, die vom Panther-Panzer inspiriert war. Um die Geländegängigkeit zu verbessern, wurde der VK 1602 mit 350 mm breiten Ketten ausgestattet."
 
 RKD_light_tank_artillery_equipment_1:0 "Sturmpanzer I Bison"
 RKD_light_tank_artillery_equipment_1_short:0 "Bison"
 RKD_light_tank_artillery_equipment_1_desc:0 "Gezogene Geschütze, die den Infanteriegeschützkompanien motorisierter Infanterieregimenter zugeteilt waren, hatten im Gefecht Schwierigkeiten, mit Panzern mitzuhalten. Die einfachste Lösung bestand darin, ein Ersatzfahrgestell für den Panzer umzubauen und in die Schlacht mitzunehmen. Beim Bison wurde das Fahrgestell des Panzer I verwendet."
 
 RKD_light_tank_artillery_equipment_2:0 "Sd. Kfz. 124 Wespe"
 RKD_light_tank_artillery_equipment_2_short:0 "Wespe"
 RKD_light_tank_artillery_equipment_2_desc:0 "Das Sd.Kfz. 124 Wespe (deutsch für Wespe) war ein deutsches selbstfahrendes Artilleriefahrzeug, das auf einem modifizierten Panzer-II-Fahrgestell basierte."
 
 RKD_light_tank_artillery_equipment_3:0 "Waffenträger Leopard"
 RKD_light_tank_artillery_equipment_3_short:0 "WT Leopard"
 RKD_light_tank_artillery_equipment_3_desc:0 "Der Waffenträger Leopard war ein geplantes selbstfahrendes Artilleriefahrzeug auf Basis des geplanten VK1602 Leopard-Chassis."
 
 RKD_light_tank_destroyer_equipment_1:0 "7,5 cm PaK 40 auf Fahrgestell Marder II"
 RKD_light_tank_destroyer_equipment_1_short:0 "Marder II"
 RKD_light_tank_destroyer_equipment_1_desc:0 "Der Marder II war ein deutscher Panzerzerstörer auf Basis des Panzer-II-Fahrgestells."

 RKD_light_tank_destroyer_equipment_2:0 "Marder III"
 RKD_light_tank_destroyer_equipment_2_short:0 "Marder III"
 
 RKD_light_tank_destroyer_equipment_3:0 "Sturmgeschütz auf Leopard"
 RKD_light_tank_destroyer_equipment_3_short:0 "JagdLeopard"
 RKD_light_tank_destroyer_equipment_3_desc:0 "Der JagdLeopard war eine mögliche Modifikation des geplanten leichten Panzers VK1602 Leopard."

 RKD_light_tank_aa_equipment_1:0 "Flakpanzer I"
 RKD_light_tank_aa_equipment_1_short:0 "FlakPz I"
 RKD_light_tank_aa_equipment_1_desc:0 "Eine auf dem Fahrgestell eines Panzer I montierte Flugabwehrkanone."
 
 RKD_light_tank_aa_equipment_2:0 "Flakpanzer Luchs"
 RKD_light_tank_aa_equipment_2_short:0 "FlakPz Luchs"
 RKD_light_tank_aa_equipment_2_desc:0 "Eine auf dem Fahrgestell eines Panzer II montierte Flugabwehrkanone."
 
 RKD_light_tank_aa_equipment_3:0 "Flakpanzer 1602"
 RKD_light_tank_aa_equipment_3_short:0 "FlakPz 1602"
 RKD_light_tank_aa_equipment_3_desc:0 "Eine Flugabwehrkanone, montiert auf dem Fahrgestell eines VK1602-Panzers."

 RKD_medium_tank_equipment_1:0 "Panzerkampfwagen III"
 RKD_medium_tank_equipment_1_short:0 "Panzer III"
 RKD_medium_tank_equipment_1_desc:0 "Bereits 1934/35 sah General Heinz Guderian zwei Grundtypen als umfangreichste Ausrüstung für die künftigen deutschen Panzerdivisionen vor. Das erste Fahrzeug sollte mit einer Panzerabwehrkanone und zwei Maschinengewehren bewaffnet sein, das zweite als Unterstützungsfahrzeug mit einem Geschütz größeren Kalibers. Der erste Typ wurde schließlich als Panzerkampfwagen III bekannt und sollte ein Standardpanzer für die drei leichten Kompanien eines Panzerbataillons werden. Der zweite wurde als Panzerkampfwagen IV bekannt."
 
 RKD_medium_tank_equipment_2:0 "Panzerkampfwagen IV"
 RKD_medium_tank_equipment_2_short:0 "Panzer IV"
 RKD_medium_tank_equipment_2_desc:0 "Der Panzer IV war ursprünglich als Infanterieunterstützungspanzer konzipiert und nicht für den Kampf gegen feindliche Panzer vorgesehen. Diese Funktion übernahm der leichtere Panzer III. Als jedoch die Mängel der Vorkriegsdoktrin und die sowjetischen T-34-Panzer deutlich wurden, übernahm der Panzer IV bald die Rolle seines zunehmend obsoleten Vetters im Panzerkampf. Der Panzer IV war der meistgebaute und eingesetzte deutsche Panzer des Zweiten Weltkriegs und diente als Basis für viele andere Kampffahrzeuge."
 
 RKD_medium_tank_equipment_3:0 "Panzerkampfwagen V Panther"
 RKD_medium_tank_equipment_3_short:0 "Panther"
 RKD_medium_tank_equipment_3_desc:0 "Panther ist die gebräuchliche Bezeichnung eines mittleren Panzers, den Deutschland im Zweiten Weltkrieg von Mitte 1943 bis zum Ende des europäischen Krieges 1945 einsetzte. Er war als Gegenstück zum russischen T-34 und als Ersatz für den Panzer III und den Panzer IV gedacht. Obwohl er letzteren nie ersetzte, diente er bis Kriegsende neben ihm und den schwereren Tiger-Panzern. Die hervorragende Kombination aus Feuerkraft, Mobilität und Schutz des Panthers diente als Maßstab für die Panzerkonstruktionen anderer Nationen in der Spät- und Nachkriegszeit, und er gilt als einer der besten Panzer des Zweiten Weltkriegs."
 
 RKD_medium_tank_artillery_equipment_1:0 "Gitter"
 RKD_medium_tank_artillery_equipment_1_short:0 "Gitter"
 RKD_medium_tank_artillery_equipment_1_desc:0 "Das Sd.Kfz. 138/1 Grille (deutsch: „Grille“) war ein selbstfahrendes Artilleriegeschütz, das im Zweiten Weltkrieg von Deutschland eingesetzt wurde. Es wurden etwa 490–500 Grille produziert. Sie wurden von Panzerdivisionen in der Sowjetunion sowie von Einheiten in Polen und Frankreich eingesetzt. Sie waren bis 1945 im Einsatz und dienten auch in Tunesien, wo sie gegen feindliche Artillerie und Panzer kämpften."
 
 RKD_medium_tank_artillery_equipment_2:0 "Hummel"
 RKD_medium_tank_artillery_equipment_2_short:0 "Hummel"
 RKD_medium_tank_artillery_equipment_2_desc:0 "Hummel war ein selbstfahrendes Artilleriegeschütz auf Basis des Geschützwagens III/IV, bewaffnet mit einer 15-cm-Haubitze. Es wurde von der deutschen Wehrmacht im Zweiten Weltkrieg von Anfang 1943 bis Kriegsende eingesetzt."
 
 RKD_medium_tank_artillery_equipment_3:0 "Brummbär"
 RKD_medium_tank_artillery_equipment_3_short:0 "Brummbär"
 
 RKD_medium_tank_destroyer_equipment_1:0 "Sturmgeschütz III"
 RKD_medium_tank_destroyer_equipment_1_short:0 "StuG III"
 RKD_medium_tank_destroyer_equipment_1_desc:0 "Das Sturmgeschütz III war im Zweiten Weltkrieg das meistgebaute deutsche Panzerkampffahrzeug. Es basierte auf dem Fahrgestell des bewährten Panzers III. Ursprünglich als mobiles, leichtes Geschütz zur Infanterieunterstützung konzipiert, wurde das StuG kontinuierlich modifiziert und fand breite Anwendung als Jagdpanzer."
 
 RKD_medium_tank_destroyer_equipment_2:0 "Jagdpanzer IV"
 RKD_medium_tank_destroyer_equipment_2_short:0 "JagdPz IV"
 RKD_medium_tank_destroyer_equipment_2_desc:0 "Der Jagdpanzer IV diente in den Panzerabwehrabteilungen der Panzer- und SS-Panzerdivisionen. Er kämpfte in der Normandie, in der Ardennenoffensive und an der Ostfront. Er war ein sehr erfolgreicher Panzerzerstörer, zeigte jedoch keine gute Leistung, wenn er – wie die meisten Panzerzerstörer – zweckentfremdet als Ersatz für Panzer oder Sturmgeschütze eingesetzt wurde. In der späteren Kriegsphase wurden sie jedoch zunehmend als Panzerersatz eingesetzt, da oft keine anderen Panzer verfügbar waren."
 
 RKD_medium_tank_destroyer_equipment_3:0 "Jagdpanther"
 RKD_medium_tank_destroyer_equipment_3_short:0 "Jagdpanther"
 RKD_medium_tank_destroyer_equipment_3_desc:0 "Der Jagdpanther war ein Jagdpanzer, der im Zweiten Weltkrieg von Nazi-Deutschland auf Basis des Panther-Chassis gebaut wurde. Er wurde gegen Ende des Krieges (1944) in Dienst gestellt und war an der Ost- und Westfront im Einsatz. Der Jagdpanther kombinierte die leistungsstarke 8,8-cm-PaK-43-Kanone des Tiger II mit der charakteristischen hervorragenden Panzerung und Aufhängung des Panther-Chassis. Er litt jedoch unter der allgemein schlechten Lage Deutschlands im späteren Kriegsverlauf, was zu geringen Produktionszahlen, Ersatzteilmangel und mangelhafter Ausbildung der Besatzung führte."
 
 RKD_medium_tank_aa_equipment_1:0 "Flakpanzer III Möbelwagen"
 RKD_medium_tank_aa_equipment_1_short:0 "Möbelwagen"
 RKD_medium_tank_aa_equipment_1_desc:0 "Der Spitzname „Möbelwagen“ stammt von seinem kastenförmigen Turm im geschlossenen Zustand. Es handelte sich um ein selbstfahrendes Flugabwehrgeschütz, das auf dem Fahrgestell des Panzer III aufgebaut und mit einer 20-mm-Vierlingskanone bewaffnet war."
 
 RKD_medium_tank_aa_equipment_2:0 "Flakpanzer IV Ostwind"
 RKD_medium_tank_aa_equipment_2_short:0 "Ostwind"
 RKD_medium_tank_aa_equipment_2_desc:0 "Der Flakpanzer IV „Ostwind“ war eine selbstfahrende Flugabwehrkanone auf Basis des Panzer IV. Er wurde 1944 als Nachfolger des früheren Flakpanzers IV entwickelt. Der Turm des Panzer IV wurde entfernt und durch einen offenen, sechseckigen Turm ersetzt, in dem eine 3,7-cm-FlaK 43 untergebracht war. Eine geschlossene Konstruktion wäre wünschenswert gewesen, war aber aufgrund der starken Rauchentwicklung der Kanone nicht möglich."
 
 RKD_medium_tank_aa_equipment_3:0 "Flakpanzer Wirbelwind"
 RKD_medium_tank_aa_equipment_3_short:0 "Wirbelwind"
 
 RKD_heavy_tank_equipment_1:0 "Großtraktor"
 RKD_heavy_tank_equipment_1_short:0 "Großtraktor"
 RKD_heavy_tank_equipment_1_desc:0 "Der Großtraktor war eine Reihe von Prototypen zur Entwicklung eines schwereren Panzers in Deutschland. Nach dem Ersten Weltkrieg war Deutschland durch den Versailler Vertrag in der militärischen Entwicklung eingeschränkt, doch ein geheimes Programm unter dem Decknamen „Traktor“ entwickelte gepanzerte Militärfahrzeuge und Artillerie."

 RKD_heavy_tank_equipment_2:0 "Panzerkampfwagen VI Tiger"
 RKD_heavy_tank_equipment_2_short:0 "Tiger"
 RKD_heavy_tank_equipment_2_desc:0 "Der Tiger I war ein deutscher schwerer Panzer, der 1942 als Antwort auf die unerwartet beeindruckende sowjetische Panzerung entwickelt wurde, auf die man in den ersten Monaten der Invasion der Achsenmächte in der Sowjetunion stieß, insbesondere auf den T-34 und den KV-1."
 
 RKD_heavy_tank_equipment_3:0 "Panzerkampfwagen Tiger Ausf. B"
 RKD_heavy_tank_equipment_3_short:0 "Königstiger"
 RKD_heavy_tank_equipment_3_desc:0 "Der unter dem informellen Namen Königstiger bekannte, von alliierten Soldaten jedoch oft halbwörtlich als „Königstiger“ übersetzte Panzer folgte dem gleichen Konzept wie der Tiger I, sollte aber noch beeindruckender sein. Der Tiger II kombinierte die dicke Panzerung des Tiger I mit der schrägen Panzerung des mittleren Panzers Panther. Der Panzer wog fast siebzig Tonnen, war an der Front durch 100 bis 180 mm Panzerung geschützt und mit der langläufigen 8,8-cm-Kampfwagenkanone 43 L/71 bewaffnet."
 
 RKD_heavy_tank_artillery_equipment_2:0 "Sturmtiger"
 RKD_heavy_tank_artillery_equipment_2_short:0 "Sturmtiger"
 
 RKD_heavy_tank_artillery_equipment_3:0 "Geschützwagen Tiger"
 RKD_heavy_tank_artillery_equipment_3_short:0 "GW Tiger"
 RKD_heavy_tank_artillery_equipment_3_desc:0 "Basierend auf dem Rumpf eines Königstigers sollte es in der Lage sein, eine 170-mm-Kanone K 72 L/50 zu montieren"
 
 RKD_heavy_tank_destroyer_equipment_1:0 "Selbstfahrlafette auf VK3001(H) Sturer Emil"
 RKD_heavy_tank_destroyer_equipment_1_short:0 "Sturer Emil"
 RKD_heavy_tank_destroyer_equipment_1_desc:0 "Die Selbstfahrlafette auf VK3001(H) Sturer Emil (deutsch für „Sturer Emil“) war eine deutsche selbstfahrende Panzerabwehrkanone auf Basis des Henschel VK3001-Chassis."
 
 RKD_heavy_tank_destroyer_equipment_2:0 "Panzerjäger Tiger (P)"
 RKD_heavy_tank_destroyer_equipment_2_short:0 "Elefant"
 RKD_heavy_tank_destroyer_equipment_2_desc:0 "Der Elefant war ein schwerer Jagdpanzer, der auf dem Fahrgestell des eingestellten Porsche Tiger-Projekts basierte und mit einer 88-mm-Panzerabwehrkanone 43/2 ausgestattet war."
 
 RKD_heavy_tank_destroyer_equipment_3:0 "Panzerjäger Tiger Ausf. B"
 RKD_heavy_tank_destroyer_equipment_3_short:0 "Jagdtiger"
 RKD_heavy_tank_destroyer_equipment_3_desc:0 "Der Jagdtiger war das schwerste gepanzerte Kampffahrzeug, das im Zweiten Weltkrieg im Einsatz war. Das Fahrzeug war mit einer 128-mm-PaK 44 L/55-Hauptkanone ausgestattet und hatte eine schwere Frontpanzerung."
 
 RKD_super_heavy_tank_equipment_1:0 "Panzerkampfwagen VIII Maus"
 RKD_super_heavy_tank_equipment_1_short:0 "Maus"
 RKD_super_heavy_tank_equipment_1_desc:0 "Der Panzerkampfwagen VIII Maus war ein deutscher superschwerer Panzer aus dem Zweiten Weltkrieg, der Ende 1944 fertiggestellt wurde. Er ist das schwerste vollständig geschlossene gepanzerte Kampffahrzeug, das je gebaut wurde. Die Hauptbewaffnung der Maus bestand aus einer 128-mm-Kanone vom Typ KwK 44 L/55 mit einer zusätzlichen koaxialen 75-mm-Kanone."
 
 RKD_super_heavy_tank_artillery_equipment_1:0 "Geschützwagen E-100"
 RKD_super_heavy_tank_artillery_equipment_1_short:0 "GW E-100"
 RKD_super_heavy_tank_artillery_equipment_1_desc:0 "Dieses 210-mm-Artilleriegeschütz ist auf einem superschweren Panzerchassis montiert und kann es in seiner Leistung mit manchen Eisenbahngeschützen aufnehmen."
 
 RKD_super_heavy_tank_destroyer_equipment_1:0 "Sturmgeschütz auf Fahrgestell Maus"
 RKD_super_heavy_tank_destroyer_equipment_1_short:0 "Jagdmaus"
 RKD_super_heavy_tank_destroyer_equipment_1_desc:0 "Das Fahrgestell einer Maus mit einer 150-mm-Kanone in einem festen Aufbau."
 
 RKD_super_heavy_tank_aa_equipment_1:0 "Flakpanzer VIII Maus"
 RKD_super_heavy_tank_aa_equipment_1_short:0 "FlakMaus"
 RKD_super_heavy_tank_aa_equipment_1_desc:0 "Das Chassis einer Maus mit zwei 88-mm-Flugabwehrkanonen."
 
 RKD_modern_tank_equipment_1:0 "E-50 Standardpanzer"
 RKD_modern_tank_equipment_1_short:0 "E-50"
 RKD_modern_tank_equipment_1_desc:0 "Die Entwicklungsserie war ein Versuch Deutschlands gegen Ende des Zweiten Weltkriegs, eine standardisierte Panzerserie zu entwickeln. Es sollte Standardmodelle in sechs verschiedenen Gewichtsklassen geben. Der E-50 Standardpanzer war als Standard-Mittelpanzer gedacht und sollte die Panther- und Tiger-Panzerserien sowie die darauf basierenden Umbauten ersetzen."
 
 RKD_modern_tank_destroyer_equipment_1:0 "E-25 Standardpanzer"
 RKD_modern_tank_destroyer_equipment_1_short:0 "E-25"
 RKD_modern_tank_destroyer_equipment_1_desc:0 "Eine aktualisierte Version des Jagdpanzers IV, der E-25 ist schneller und besser gepanzert"
 
 RKD_modern_tank_aa_equipment_1:0 "Kugelblitz"
 RKD_modern_tank_aa_equipment_1_short:0 "Kugelblitz"
 
 RKD_motorized_equipment_1:0 "Opel Blitz"
 
 RKD_mechanized_equipment_1:0 "Sonderkraftfahrzeug 11"
 RKD_mechanized_equipment_1_short:0 "Sd.Kfz. 11"
 RKD_mechanized_equipment_1_desc:0 "Das Sd.Kfz. 11 (Sonderkraftfahrzeug) war ein deutsches Halbkettenfahrzeug, das im Zweiten Weltkrieg weit verbreitet war. Es konnte acht Soldaten transportieren und zusätzlich ein Geschütz oder einen Anhänger ziehen."
 
 RKD_mechanized_equipment_2:0 "Sonderkraftfahrzeug 251"
 RKD_mechanized_equipment_2_short:0 "Sd.Kfz. 251"
 RKD_mechanized_equipment_2_desc:0 "Das Halbkettenfahrzeug Sd.Kfz. 251 war ein gepanzertes Kampffahrzeug, das von der Firma Hanomag während des Zweiten Weltkriegs auf der Grundlage ihres früheren Fahrzeugs Sd.Kfz. 11 entworfen und erstmals gebaut wurde."
 
 RKD_mechanized_equipment_3:0 "Sonderkraftfahrzeug 251/20"
 RKD_mechanized_equipment_3_short:0 "Sd.Kfz. 251/20"
 RKD_mechanized_equipment_3_desc:0 "Eine aktualisierte Version des Sd.Kfz. 251, ausgestattet mit einem Infrarotscheinwerfer."
 
