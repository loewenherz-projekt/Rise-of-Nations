#Balkans ############################################################################################################################################################################
#####################################################################################################################################################################################

BP_germany.200.t:0 "Vaterland Jugoslawiens"
BP_germany.200.d:0 "Hitler kündigte Pläne zur Teilung Jugoslawiens erstmals bei einem Treffen am 27. März 1941 an, nachdem er vom Putsch in Belgrad erfahren hatte. Im Zuge einer geheimen Besprechung der Führung des Dritten Reichs und des Wehrmachtskommandos beschloss er, alle Vorbereitungen für die militärische und bildungspolitische Teilung Jugoslawiens zu treffen. Konkrete Vorschläge zur Teilung des Landes wurden sowohl vor Beginn der Feindseligkeiten als auch nach dem Einmarsch Deutschlands und seiner Verbündeten in Jugoslawien formuliert. Tatsächlich wurden die deutschen Vorschläge durch die Ideen Italiens, Ungarns und Bulgariens ergänzt.\n \nNachdem der Feind nun besiegt ist und Jugoslawien unter der strengen Kontrolle der Achsenmächte steht, können wir einen Plan zur Aufteilung des jugoslawischen Staates unter den Verbündeten in Angriff nehmen: Wir können Jugoslawien unter allen Mitgliedern der Achse entsprechend ihren Ansprüchen aufteilen, sodass jede Mächte ihr eigenes Land hat, außerdem können wir Dalmatien unter die volle Kontrolle Italiens stellen und einen Teil ohne die Beteiligung Italiens oder Ungarns mit Bulgarien halten, was uns eine fast vollständige Kontrolle über den Balkan ermöglichen würde."
BP_germany.200.a:0 "Historisches Erbe"
BP_germany.200.b:0 "Transfer Dalmatien nach Italien" 
BP_germany.200.c:0 "Vaterland ohne Italien"
BP_germany.200.e:0 "Vaterland ohne Ungarn und Bulgarien" 

BP_germany.201.t:0 "Vaterland Griechenlands"
BP_germany.201.d:0 "Da die letzten griechischen Soldaten ihre Waffen niederlegen, müssen Pläne geschmiedet und neue Grenzen für die Zukunft Griechenlands gezogen werden. Derzeit können wir Griechenland entweder spalten, indem wir Italien die Kontrolle über den Großteil Griechenlands und Bulgarien die Mehrheit Mazedoniens geben, oder wir können Westmazedonien einfach unter deutscher Kontrolle belassen, um den Status quo aufrechtzuerhalten."
BP_germany.201.a:0 "Historisches Erbe"
BP_germany.201.b:0 "Geben Sie Zentralmazedonien an Bulgarien weiter" 

#####################################################################################################################################################################################
# Scandinavia #######################################################################################################################################################################
#####################################################################################################################################################################################

# The Swedish Question

BP_germany.300.t:0 "Die schwedische Frage"
BP_germany.300.d:0 "Schweden befand sich während des Zweiten Weltkriegs in einer heiklen Lage. Nachdem Schweden seit dem Ende der Napoleonischen Kriege 1815 seine Neutralität bewahrt hatte, gelang es ihm nur durch ein sorgfältiges Gleichgewicht diplomatischer Manöver und Zugeständnisse an Deutschland, seine Souveränität zu bewahren und eine direkte Beteiligung am Konflikt zu vermeiden. Während des Unternehmens Barbarossa gestattete Schweden der Wehrmacht den Eisenbahntransit für Personal und Munition nach Finnland. Das Land war auch ein wichtiger Handelspartner, der das Deutsche Reich mit lebenswichtigem Eisenerz versorgte. Gegen Kriegsende 1944 und 1945 gestattete Schweden den Alliierten die Nutzung schwedischer Luftwaffenstützpunkte. Schweden wurde auch zu einem wichtigen Ziel für Kriegsflüchtlinge, darunter Juden und andere Verfolgte.\n \nHitler hatte eine im Allgemeinen positive Einstellung zu den Schweden, da er die Skandinavier als Menschen nordischer Abstammung betrachtete. Schweden wurde während des Krieges aus verschiedenen Gründen nicht besetzt, nicht zuletzt, weil eine Besetzung kostspielig gewesen wäre und die Schweden im Allgemeinen den Interessen des Reiches folgten. Mit dem Ende des Krieges gegen die Sowjetunion kann die Eingliederung Schwedens in das Großgermanische Reich nun vollzogen werden. Es ist Zeit, alle Germanen unter unserer Flagge zu vereinen!"
BP_germany.300.a:0 "Schlagen Sie einfach ein Militärbündnis vor"
BP_germany.300.b:0 "Fordern Sie ihre Eingliederung in das Reich!" 
BP_germany.300.c:0 "Das ist unnötig – Schweden soll neutral bleiben"

BP_germany.301.t:0 "Schicksal Skandinaviens"
BP_germany.301.d:0 "Die Reichskommissariate in Westeuropa unterschieden sich erheblich von ihren östlichen Pendants. Die in Belgien und den Niederlanden eingerichteten Regime sollten eine vorübergehende Eingliederung in das Deutsche Reich ermöglichen, im Gegensatz zu den russischen Eroberungen, die auf Kolonisierung und Ausbeutung ausgerichtet waren. Historisch gesehen umfasste ein Reichskommissariat nicht ganz Skandinavien, obwohl das in Norwegen eingerichtete Regime als Beispiel für dieses Konzept dient. Hitler schwor, Norwegen niemals zu verlassen, und befürwortete sogar die spätere Annexion Dänemarks. Die nordischen Völker Skandinaviens sollten Teil des Deutschen Reiches werden, sobald Hitlers Vision Wirklichkeit wurde. Nachdem wir nun ganz Skandinavien unter unsere Kontrolle gebracht haben, können wir ein neues Reichsprotektorat gründen, um sicherzustellen, dass dieses Gebiet ein integraler Bestandteil der deutschen Nation wird. Seine Bevölkerung wird vorerst ihre Muttersprache und Bräuche behalten, während die nächste Generation dazu erzogen wird, sich ausschließlich mit ihrem germanischen Rassencharakter zu identifizieren und sich nicht länger als Teil unterschiedlicher Nationalitäten zu sehen. Ihnen wird beigebracht, ihr arisches Erbe zu feiern und die nationalsozialistische Ideologie anzunehmen. Mit der Zeit wird das Großgermanische Reich ein Volk und eine Nation sein!"
BP_germany.301.a:0 "Schaffen Sie ein Reichsprotektorat Skandinavien!"
BP_germany.301.b:0 "Schaffen Sie stattdessen freundliche Regime in Skandinavien" 
BP_germany.301.c:0 "Nicht nötig. Schweden wiederherstellen und das freundliche Regime aufrechterhalten"
BP_germany.301.e:0 "Reichskommissariat Schweden gründen" 

BP_germany.302.t:0 "Truppentransit durch Schweden"
BP_germany.302.d:0 "Nach der Invasion Dänemarks und Norwegens wurden Schweden und die anderen verbliebenen Ostseeanrainerstaaten vom nationalsozialistischen Deutschland und der Sowjetunion eingeschlossen, die zu diesem Zeitpunkt gemäß dem Molotow-Ribbentrop-Pakt freundschaftliche Beziehungen zueinander pflegten. Die langwierigen Kämpfe in Norwegen führten zu verstärkten deutschen Forderungen nach indirekter Unterstützung durch Schweden. Schwedische Diplomaten konnten diese Forderungen abwehren, indem sie die Deutschen an die Verbundenheit der Schweden mit ihren norwegischen Brüdern erinnerten. Mit dem Ende der Feindseligkeiten in Norwegen wurde dieses Argument unhaltbar, was das Kabinett zwang, dem deutschen Druck nachzugeben und kontinuierliche (unbewaffnete) Truppentransporte über die schwedische Eisenbahn zwischen Deutschland und Norwegen zuzulassen. Das Ausmaß dieser Transporte wurde geheim gehalten, doch Gerüchte zwangen Ministerpräsident Per Albin Hansson bald dazu, ihre Existenz zuzugeben. Offiziell transportierten die Züge verwundete Soldaten und Soldaten auf Urlaub, was dennoch einen Verstoß gegen Schwedens erklärte Neutralität dargestellt hätte. Insgesamt wurden bis zur Auflösung des Transitabkommens am 15. August 1943 mit fast 100.000 Eisenbahnwaggons 1.004.158 Militärangehörige auf Urlaub über Schweden nach Deutschland und 1.037.158 nach Norwegen transportiert."
BP_germany.302.a:0 "Großartig"

### Sweden 

BP_sweden.1.t:0 "Deutschland fordert unsere Unterwerfung"
BP_sweden.1.d_alliance:0 "Nach dem Ende des Krieges in Europa richten die Deutschen ihr Augenmerk auf uns. Sie fordern unsere Unterwerfung unter die Neue Ordnung! Sie bieten uns an, uns der Achse als Mitglied der Allianz und des Neuen Europas anzuschließen."
BP_sweden.1.a:0 "Wir akzeptieren ein Bündnis mit dem Reich"
BP_sweden.1.b:0 "Den Bündnisvorschlag des Reiches lehnen wir ab."
BP_sweden.1.d_submission:0 "Nach dem Ende des Krieges in Europa richten die Deutschen ihren Blick auf uns. Sie fordern unsere Unterwerfung unter die neue Ordnung! Sie sprechen von völliger Abrüstung und der Übergabe des Landes an die deutschen Besatzungstruppen."
BP_sweden.1.c:0 "Wir haben keine Wahl. Zurücktreten"
BP_sweden.1.d:0 "Niemals! Wir werden diesem Wahnsinn widerstehen!"

BP_sweden.2.t_sweden_say_yes:0 "Schweden hat unseren Vorschlag angenommen"
BP_sweden.2.d_agree:0 "Die Schweden haben Einsicht gezeigt und unseren Vorschlag angenommen. Ganz Skandinavien liegt nun in unserem Einflussbereich."
BP_sweden.2.a:0 "Die Schweden sind natürliche Verbündete des Reiches"
BP_sweden.2.b:0 "Die Schweden sind ein wichtiger Bestandteil der Neuen Ordnung"
BP_sweden.2.t_sweden_say_no:0 "Schweden hat unseren Vorschlag abgelehnt"
BP_sweden.2.d_disagree:0 "Die Schweden haben unsere Forderungen dummerweise abgelehnt! Obwohl sie von allen Seiten umzingelt sind und keine Hoffnung auf Widerstand haben, haben sie erklärt, dass sie, wenn nötig, einen letzten Widerstand leisten werden, um ihre Souveränität zu schützen."
BP_sweden.2.c:0 "Wir haben versucht, vernünftig zu sein, jetzt haben sie uns dazu gezwungen"
BP_sweden.2.d:0 "Sie werden Teil des Reiches, ob sie wollen oder nicht"
BP_sweden.2.e:0 "Das ist es nicht wert, deswegen in den Krieg zu ziehen. Lass es sein"

BP_sweden.3.a:0 "Wir haben keine Wahl..."

### Finland

BP_finland.1.t:0 "Fortsetzungskrieg"
BP_finland.1.d:0 "Der Moskauer Friedensvertrag vom 13. März 1940, der den sowjetisch-finnischen Krieg von 1939–1940 beendete, wurde von den Finnen als äußerst ungerecht empfunden: Finnland verlor einen erheblichen Teil der Provinz Wyborg. Mit diesem Verlust büßte Finnland ein Fünftel seiner Industrie und 11 Prozent seiner landwirtschaftlichen Nutzflächen ein. 12 Prozent der Bevölkerung, also etwa 400.000 Menschen, mussten aus den der UdSSR zugesprochenen Gebieten umgesiedelt werden. Die Halbinsel Hanko wurde der UdSSR als Marinestützpunkt verpachtet. Die Besetzung Norwegens durch Deutschland, die Finnland von direkten Beziehungen zu Großbritannien und Frankreich abschnitt, führte dazu, dass sich Finnland seit Mai 1940 für eine Stärkung der Beziehungen zu Nazi-Deutschland einsetzte. Zu dieser Zeit begann Deutschland auf Befehl Adolf Hitlers einen Angriffsplan auf die Sowjetunion auszuarbeiten, und Finnland erwarb das Interesse Deutschlands als Stützpunkt für die Stationierung von Truppen und als Basis für militärische Operationen sowie als möglicher Verbündeter im Krieg gegen die Sowjetunion. Am 19. August 1940 hob die deutsche Regierung das Waffenembargo gegen Finnland auf und gestattete im Gegenzug die Nutzung finnischen Territoriums für den Durchzug deutscher Truppen nach Norwegen. Obwohl Finnland Deutschland aufgrund seiner Politik während des Winterkriegs immer noch misstrauisch gegenüberstand, sahen die Finnen in ihm den einzigen Retter. Finnland erklärte sich unter mehreren Bedingungen bereit, sich Deutschland im Krieg gegen die UdSSR anzuschließen:\n \nGarantie der Unabhängigkeit Finnlands;\n \nWiederherstellung des Zustands der Grenze zur UdSSR im Vorkriegszustand (oder besser);\n \nFortsetzung der Lebensmittelversorgung;\n \nFinnland ist kein Aggressor, d. h., es tritt erst nach einem Angriff der Sowjetunion in den Krieg ein.\n \nVom 21. bis 25. Juni 1941 gingen die deutschen See- und Luftstreitkräfte von finnischem Territorium aus gegen die UdSSR vor. Am 22. Juni 1941 wurde die entmilitarisierte Zone Ålands als Reaktion auf die Besetzung durch finnische Truppen von der sowjetischen Luftfahrt bombardiert. Am 25. Juni führte die sowjetische Luftwaffe Luftangriffe auf 18 finnische Flugplätze, von denen aus sie angegriffen wurde, sowie auf mehrere Siedlungen durch. Am selben Tag erklärte die finnische Regierung, dass sich das Land im Krieg mit der UdSSR befinde. Am 29. Juni begannen finnische Truppen mit dem Kampf gegen die Sowjetunion."
BP_finland.1.a:0 "Im Kampf gegen den Weltbolschewismus wird Naam die Hilfe aller brauchen"
BP_finland.1.b:0 "Lass sie neutral bleiben"

BP_finland.2.a:0 "Ja"
BP_finland.2.b:0 "Keine Notwendigkeit"

BP_finland.3.t_ger_say_yes:0 "Berlin stimmt zu!"
BP_finland.3.t_ger_say_no:0 "Deutschland lehnte ab!"
BP_finland.3.d_ger_say_yes:0 "Die Deutschen sind bereit, uns in die Achsenmächte aufzunehmen!"
BP_finland.3.d_ger_say_no:0 "Sie haben uns abgewiesen!"
BP_finland.3.a:0 "Großartig!"
BP_finland.3.b:0 "Verdammt"

