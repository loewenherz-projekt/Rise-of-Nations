#### Italy #########################################################################################################################################################################
#####################################################################################################################################################################################
 
ITA_grande_italia_cat:0 "Grande Italia"
ITA_grande_italia_cat_desc:0 "Großitalien (Grande Italia) oder Kaiserliches Italien (Italia Imperiale) ist ein ehrgeiziges Projekt, das im faschistischen Italien konzipiert und erstmals 1936 vom Gouverneur der Dodekanes, Cesare Maria de Vecchi, geäußert wurde.\n \nZiel dieses Projekts war die Schaffung des Italienischen Kaiserreichs, das neben den seit langem von Irredentisten beanspruchten Gebieten wie Korsika, Nizza, Korfu, Dalmatien und Malta auch weitere mediterrane Besitzungen mit italienischer Bevölkerung oder in italienischer Einflusssphäre umfassen sollte. Die Befürworter Großitaliens dachten auch an Albanien, Montenegro und Nordtunesien. Sie bestanden auch auf einer engeren Eingliederung Nordlibyens, das 1911–1912 erobert worden war („General Terms“). Das Projekt beinhaltete die Schaffung eines italienischen Staates, in dem nicht-italienische Elemente assimiliert und die italienische Kolonisierung gefördert werden sollte.\n \nDie vermeintliche Erweiterung sollte Italien helfen, die nach dem Fall des Römischen Reiches verlorene Vorherrschaft im Mittelmeerraum zurückzugewinnen. In Vorbereitung auf den Krieg mit Frankreich nahm das faschistische Regime 1940 Korsika, Nizza, Savoyen, Tunesien und Dschibuti ins Visier. Am 10. Juni 1940 brachte Außenminister Graf Ciano die Idee auf, die Schweiz zwischen Deutschland und Italien aufzuteilen: Die Kantone Tessin, Graubünden und Wallis könnten an letzteres übergehen. Nach dem Fall Frankreichs gab es auch Vorschläge für Ansprüche auf Ägypten und den Nahen Osten."
 
ITA_create_AOI:0 "Erstellen Sie Italienisch-Ostafrika"
ITA_create_AOI_desc:0 "Ein bisschen Italien – Afrika könnte es gebrauchen."
 
ITA_claims_on_france_decision:0 "Ansprüche an Frankreich"
ITA_claims_on_france_decision_desc:0 "Savoyen und Korsika waren traditionell italienische Ländereien, und die diebischen Franzosen haben sie uns zu Unrecht genommen! Das kann der Duce nicht zulassen!"
ITA_BP_claims_on_france_tt:0 "§YVichy-Frankreich§! existiert und kontrolliert §YSavoyen§! oder §YCorsika§!"
 
ITA_claims_on_tunisia:0 "Ansprüche an Tunesien"
ITA_claims_on_tunisia_desc:0 "Frankreich kontrolliert einen lebenswichtigen Hafen in Tunesien, der in italienischer Hand sein sollte und in keiner anderen!"
ITA_BP_claims_on_tunisia_tt:0 "§YVichy-Frankreich§! existiert und kontrolliert §YTunesien§! oder §YGabes§!"
 
ITA_build_the_Via_Balbia:0 "Bau der Via Balbia"
ITA_build_the_Via_Balbia_desc:0 "Eine Küstenautobahn, die Libyen überspannt, würde den Transport des italienischen Militärs erheblich erleichtern und unseren Kriegsanstrengungen nur einen Nettovorteil bringen."
 
