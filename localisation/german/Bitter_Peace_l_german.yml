#### Protectorates and Satellites ####
 
GER_greater_german_reich_desc:0 "Großdeutsches Reich – dieses pandeutsche Reich wird Hitlers in „Mein Kampf“ dargelegte Vision verkörpern und alle deutschen Völker zu einer Supermacht vereinen, die den gesamten Kontinent umfasst und ideale Bedingungen für die zukünftige Zivilisation der arischen Rasse schaffen soll. Dieses Gebiet wird ganz Großdeutschland sowie traditionell germanische Regionen wie die Niederlande, Belgien und die skandinavischen Länder umfassen. Darüber hinaus wird im Laufe der Kolonialisierung das gesamte europäische Russland bis zum Uralgebirge Teil dieses Staates werden." 
 
GER_reichsprotektorat_bohemia:0 "Reichsprotektorat Böhmen und Mähren"
GER_reichsprotektorat_bohemia_desc:0 "Wir können eine Marionettenregierung bilden, die die neuen Länder regiert, die vor Kurzem unter unsere Gerichtsbarkeit gekommen sind."

GER_heydrich_deputy_reichsprotektor_bohemia:0 "Neuer Reichsprotektor"
GER_heydrich_deputy_reichsprotektor_bohemia_desc:0 "Initially, this position was appointed by former German foreign Minister Konstantin von Neurath. His tenure was accompanied by rivalry between the secret services loyal to the protector and the party structures caused by the overlapping competence of different branches of power. This, and the lack of rigidity of Neurath during the suppression of Czech resistance, resulted in his actual removal from office.\n \nAt the end of September 1941, Hitler summoned von Neurath and said that he had decided to appoint him Deputy Heydrich. Von Neurath disagreed with this decision and announced his resignation from this post. Then Hitler sent von Neurath on "indefinite vacation". His duties were transferred to Heydrich as "acting reichsprotektor of Bohemia and Moravia" (ger. "Stellvertretender Reichsprotektor von Böhmen und Mähren").\n \nThus, Heydrich became the actual Reichsprotektor (von Neurath never returned to his duties), retaining the post of head of the Directorate of the RSHA. On September 27, 1941, Heydrich took up residence in Hradcany. His summer residence, which moved his family, Heydrich gave in to get him after the resignation of K. von Neurath, the so-called "Lower Palace" in the town Panenske-Brzezany 15 km to the North from Prague, confiscated from sharoprokatnogo Jewish origin of Ferdinand Bloch-Bauer."

GER_generalgouvernement_polen:0 "Erstellen Sie das Generalgouvernement Polen"
GER_generalgouvernement_polen_desc:0 "Wir können eine Marionettenregierung bilden, die die neu zurückeroberten polnischen Gebiete regiert."
 
GER_distrikt_galizien:0 "Distrikt Galizien erstellen"
GER_distrikt_galizien_desc:0 "Wir können das Generalgouvernement erweitern, um neue Gebiete einzubeziehen." 

GER_create_new_denmark_goverment:0 "Reichsprotektorat Danemark"
GER_create_new_denmark_goverment_desc:0 "Nach der erfolgreichen Invasion unseres nördlichen Nachbarn könnte eine Marionettenregierung unseren Interessen am besten dienen."
  
GER_satellite_croatia:0 "Unabhängiger Staat Kroatien"
GER_satellite_croatia_desc:0 "Kroatische Faschisten im ehemaligen Jugoslawien können den Druck auf unsere Besatzungstruppen in der Balkanregion erheblich verringern. "
 
GER_satellite_serbia:0 "Militärregierung Serbiens"
GER_satellite_serbia_desc:0 "Eine Region auf dem Balkan bereitet unseren Truppen besondere Probleme. Es müssen ernsthaftere Maßnahmen ergriffen werden."
 
GER_destiny_of_england:0 "Schicksal Großbritanniens"
BP_Germany_controls_England_tt:0 "§H[Root.GetNameDef]§! oder ein Mitglied von §H[From.GetFactionName]§! kontrolliert die Region §HEnglish§!."
BP_Germany_controls_Scotland_tt:0 "§H[Root.GetNameDef]§! oder ein Mitglied von §H[From.GetFactionName]§! kontrolliert die Region §HScottish§!."
