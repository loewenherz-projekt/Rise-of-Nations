SOV_moilization_of_moscow:0 "In Krasnodar werden 10 Divisionen der Miliz mit geringem Erfahrungs- und Ausrüstungsniveau stationiert sein"

BP_USSR.8.t:0 "Feind vor dem Tor!"
BP_USSR.8.d:0 "Als die Deutschen die letzte strategische Verteidigungslinie der Hauptstadt durchbrachen, stand nicht nur Moskau, sondern auch die Sowjetregierung auf dem Spiel. Das Verteidigungskomitee ordnete die Evakuierung nach Kuibyschew an, 800 Kilometer südöstlich von dort an der Wolga. Alles war bereit, Fabriken, Infrastruktur und sogar die U-Bahn zu zerstören. Stalin wurde angewiesen, die Stadt zu verlassen, und seine Leibwächter erwarteten ihn bereits am Bahnhof. Er kam nie an, weil Schukow Stalin davon überzeugt hatte, dass Moskau noch zu retten sei."
BP_USSR.8.a:0 "Wir werden in Moskau bleiben – lebend oder tot!"
BP_USSR.8.b:0 "Wir müssen Moskau verlassen ..."

BP_USSR.9.t:0 "Erfolg im Osten!" 
BP_USSR.9.d:0 "Die Fähigkeit der Roten Armee, effektiv Krieg zu führen, schwindet rapide. Die Hauptziele des Barbarossa-Plans sind vollständig erreicht. Kiew, Minsk, Leningrad, Moskau und Stalingrad sind in unserer Hand. Den Sowjets wurde klar, dass sie gezwungen sein würden, um Frieden zu bitten, oder sie riskierten, alles zu verlieren, was sie in der Oktoberrevolution erobert hatten. Adolf Hitler hat deutlich gemacht, dass er nichts weniger als die Abtretung aller sowjetischen Besitztümer westlich der Wolga akzeptieren wird, einschließlich der Konzessionen in Astrachan und Archangelsk. Bald wird der Kreuzzug gegen den Kommunismus vorbei sein. Wir haben bereits ein Telegramm der sowjetischen Führung mit dem Wunsch erhalten, sich an den Verhandlungstisch zu setzen. Unsere Feldmarschälle bestehen darauf, dass es klug wäre, dieses Angebot anzunehmen, und versichern uns, dass die Sowjets nicht in der Lage sind zu verhandeln. Aber wenn unsere Stärke ausreicht, sollten wir die Roten vielleicht weiter nach Osten in Richtung Ural drängen. Dann wären wir in einer besseren Position."
BP_USSR.9.a:0 "Wir haben zu viel Mühe in diesen Wahlkampf gesteckt, es wird ein anständiger Frieden"
GER_aa_line_tool:0 "§RDie Sowjets werden unsere Antwort erhalten und in wenigen Tagen werden wir in Moskau einen Friedensvertrag zu den Bedingungen des AA-Plans unterzeichnen.§!"
BP_USSR.9.b:0 "Vorwärts zum Ural!"
GER_forward_to_ural_tool:0 "„Wir werden es ablehnen, den Sowjets die Fortsetzung der Kämpfe anzubieten. Und wenn das Uralgebirge in unseren Händen ist, werden wir von den Sowjets die Kapitulation unter der Bedingung einer neuen Grenze im Uralgebirge fordern.“"
BP_USSR.9.c:0 "Keine Verhandlungen! Der Bolschewismus muss von der Erde getilgt werden!"
GER_no_any_negotiation_tool:0 "§RWir müssen den Krieg bis zum siegreichen Ende und zur vollständigen Zerstörung des Sowjetstaates fortsetzen. Erst wenn wir alle großen Städte Westsibiriens kontrollieren:§! §HSwerdlowsk, Tscheljabinsk, Omsk, Nowosibirsk, Krasnojarsk§! - §Rkönnen wir vom endgültigen Erfolg sprechen.§!"

BP_USSR.10.t:0 "Deutsche Antwort"
BP_USSR.10.d_A_A_line:0 "Das Dritte Reich stimmt dem Frieden zu. Adolf Hitler machte deutlich, dass er nicht weniger als die Abtretung aller sowjetischen Besitztümer westlich der Wolga akzeptieren würde, einschließlich der Konzessionen in Astrachan und Archangelsk."
BP_USSR.10.d_Ural:0 "Deutschland weigerte sich, mit uns zu verhandeln."
BP_USSR.10.d_war_for_survival:0 "Deutschland hat jegliche Verhandlungen mit uns abgelehnt und erklärt, unser Land, sein Volk und seine Ideologie müssten von der Erde getilgt werden. Es scheint, dieser Krieg sei unsere letzte Bewährungsprobe im Kampf ums Überleben."
BP_USSR.10.a:0 "Wir haben keine Wahl..."
BP_USSR.10.b:0 "Kein Schritt zurück! Haltet den Ural!"
SOV_mobilization_of_ural:0 "In Ufa und Perm werden 10 Divisionen der Miliz mit geringem Erfahrungs- und Ausrüstungsniveau stationiert sein"
BP_USSR.10.c:0 "Kein Schritt zurück! Wir kämpfen für unsere Zukunft!"
SOV_mobilization_of_siberia:0 "In Ufa, Perm, Swerdlowsk, Tscheljabinsk und Omsk werden 10 Divisionen der Miliz mit geringem Erfahrungs- und Ausrüstungsniveau stationiert sein"

BP_USSR.11.t:0 "Deutschland schlägt einen Friedensvertrag vor"
BP_USSR.11.d:0 ""
BP_USSR.11.a:0 "Wir haben keine Wahl..."
BP_USSR.11.b:0 ""

BP_USSR.12.t:0 "Stalin tot!"
BP_USSR.12.d:0 "Heute früh, als unsere belagerte Hauptstadt unter faschistischem Artillerie- und Luftfeuer geriet, erlitt das sowjetische Volk eine schreckliche Tragödie.\n \nDer Generalsekretär, der heldenhaft beschlossen hatte, in Moskau zu bleiben, um die Verteidigung der Stadt gegen ausländische Invasoren zu befehligen, wurde getötet, als deutsche Sturmtruppen auf einen Lastwagenkonvoi feuerten, in dem er fuhr. Mit Granatsplitterverletzungen wurde er sofort ins nächste Krankenhaus gebracht. Trotz aller Bemühungen unserer tapferen und ruhmreichen Ärzte erlag Josef Stalin, der Führer der Sozialistischen Sowjetrepubliken, seinen Verletzungen.\n \nDas Schicksal unserer Nation und unseres ruhmreichen Volkes hängt in der Schwebe. Aus dringenden Gründen wurde von den Mitgliedern des Politbüros Genosse Berija zum Interimsgeneralsekretär gewählt. Genossen, wir brauchen Einigkeit mehr denn je."
BP_USSR.12.a:0 "Verdammt"

BP_USSR.13.t:0 "Stalin im Safe"
BP_USSR.13.d:0 "Als heute früh die ersten Vorhuten der Wehrmacht in Moskau einmarschierten und eine Stadtschlacht mit unseren tapferen Verteidigern begannen, verließen Genosse Stalin und Mitglieder der SVGK die Hauptstadt und wurden nach Kuibyschew evakuiert. Pessimistische Mitglieder des Militärkommandos überredeten Stalin, die Führung noch weiter zu evakuieren – über den Ural hinaus, nach Swerdlowsk."
BP_USSR.13.a:0 "Okay"

BP_USSR.14.t:0 "Demobilisierung"
BP_USSR.14.d:0 "Während dieses Krieges haben wir enorme Gebiets- und Bevölkerungsverluste erlitten. Darüber hinaus sind wir gemäß dem Moskauer Vertrag zu folgenden Maßnahmen verpflichtet: Demobilisierung der Armee, Reduzierung ihrer Truppenstärke auf 200.000 Mann, Verbot des Einsatzes schwerer Artillerie, Ausrüstung und Flugzeuge. Und das Schlimmste ist die nahezu vollständige Zerstörung unserer Volkswirtschaft – wir sind gezwungen, zahlreiche Militärunternehmen und -einrichtungen zu schließen. Aufgrund dieser Maßnahmen bleiben wir schutzlos, und unsere Wirtschaft wird einfach zusammenbrechen. Wenn jedoch nicht in naher Zukunft Maßnahmen zur Erfüllung dieser Anforderungen ergriffen werden, könnten die Kämpfe wieder aufgenommen werden, mit möglicherweise noch schlimmeren Folgen."
BP_USSR.14.a:0 "Wir müssen es tun, sonst wird es schlimmer ..."
SOV_bitter_peace:0 "Löscht alle eingesetzten Divisionen, Schiffe und Luftgeschwader, stattdessen erhalten wir 20 Divisionen der Miliz.\n \n"

BP_USSR.15.t:0 "Der große Exodus"
BP_USSR.15.d:0 ""
BP_USSR.15.a:0 "Das Mutterland lebt, solange wir leben ..."
BP_SOV_incoming_population:0 "In den meisten Regionen werden Flüchtlinge untergebracht, außerdem werden zusätzliche Bauzellen hinzugefügt"

BP_USSR.16.t:0 "Aufstand in Turkestan!"
BP_USSR.16.d:0 "Unsere Politik der „Sowjetisierung“ der Auls, der Kollektivierung und Enteignung in der UdSSR war bei vielen, auch bei den Turkvölkern Zentralasiens, unbeliebt. Zwischen 1928 und 1932 kam es allein in Kasachstan zu etwa 372 Aufständen gegen die Behörden.\n \nNach unserer Niederlage im Krieg gegen Deutschland ahnten viele Einwanderer türkischer Nationalität, die sich vor den sowjetischen Behörden in Afghanistan, Iran und Xinjiang versteckt hielten, dass dieses Ereignis die Lage in Turkestan verändern könnte. Nun sind diese Menschen in ihre Heimat zurückgekehrt. Unzufrieden mit der Ankunft einer großen Zahl überwiegend russischsprachiger Flüchtlinge aus dem europäischen Teil des Landes begannen die Einheimischen, gegen die Sowjetregierung zu kämpfen und Razzien in Flüchtlingssiedlungen und bei örtlichen Polizeieinheiten zu organisieren. Die Separatisten scheuen sich nicht, in Großstädten aufzutreten, doch dort beschränken sich ihre Aktivitäten auf Sabotage, nationalistische Propaganda und Reden in geschlossenen Kreisen.\n \nDie Situation eskalierte rasch, die Kasachen vereinigten sich mit den Kirgisen, Usbeken, Tadschiken und Turkmenen im Kampf um die Unabhängigkeit. Sie organisierten einen bewaffneten Aufstand in den südlichen Regionen und erklärten Taschkent zu ihrer Hauptstadt."
BP_USSR.16.a:0 "Zerschmettert die Separatisten!"
BP_SOV_turkestan_riot:0 "In Turkestan beginnt der Aufstand!"

### Romania

BP_romania.1.t:0 "Rumänen, bitte übergeht Transnistrien"
BP_romania.1.d:0 "Rumänische Nationalisten wollen ein großes Rumänien wiederaufbauen. Bukarests Pläne zur Änderung der rumänischen Grenzen werden von vielen Politikern in Berlin unterstützt. Wir beabsichtigen jedoch nicht, Süd-Dobrudscha oder Nord-Siebenbürgen an den rumänischen Staat zurückzugeben. Wir fordern vielmehr eine Erweiterung der rumänischen Grenzen nach Osten. In Rumänien tauchen zunehmend Verfahren auf, denen zufolge „Transnistrien“ historisches rumänisches Territorium sei und seine Bevölkerung aus russifizierten Rumänen bestehe."
BP_romania.1.a:0 "Tolle Idee"
BP_romania.1.b:0 "Lass sie mit dem zufrieden sein, was sie haben"

BP_romania.2.t:0 "Antwort aus Berlin"
BP_romania.2.d_ger_say_yes:0 "Heute haben wir eine Mitteilung aus Berlin erhalten, dass Odessa und Winnyzja unter unsere Kontrolle übergehen werden."
BP_romania.2.d_ger_say_no:0 "Heute haben wir eine Mitteilung aus Berlin erhalten, dass unser Antrag abgelehnt wurde."
BP_romania.2.a:0 "Großartig!"
BP_romania.2.b:0 "Verdammt"

