BP_news.1.t:0 "Voller Erfolg von Barbarossa!"
BP_news.1.d:0 "In einem Ereignis, das die Welt schockierte, hat die Sowjetunion heute zugestimmt, das gesamte Gebiet westlich des 48. Längengrades abzugeben. Angesichts enormer Verluste und ihrer Unfähigkeit, die Kämpfe fortzusetzen, gab die Sowjetunion offiziell ihr gesamtes Territorium westlich der Linie Archangelsk-Wolga-Astrachan ab. Der Waffenstillstand ist in Kraft getreten, und die Reste der Roten Armee rücken ostwärts über die A-Linie vor.\n \nWir haben Berichte über eine Massenflucht sowjetischer Zivilisten hinter den Ural erhalten, die vor der Besatzung durch die vorrückenden deutschen Truppen fliehen. Ein ganzes Land wurde entwurzelt..."
# Democratic
BP_news.1.a:0 "Was kann die deutsche Kriegsmaschinerie stoppen?"
# Fascism
BP_news.1.b:0 " Tolle Neuigkeiten!" 
# Communism
BP_news.1.c:0 "Wir haben verloren, aber wir werden uns rächen ..."
# Neutrality
BP_news.1.e:0 "Nichts Überraschendes..."

BP_news.2.t:0 "Das europäische Russland in deutscher Hand!"
BP_news.2.d:0 "Das Politbüro der Sowjetunion war gezwungen, den Forderungen Deutschlands nachzukommen und alle sowjetischen Gebiete westlich des Uralgebirges abzutreten. Um den weiteren Tod sowjetischer Bürger zu verhindern, wurde den verbliebenen sowjetischen Einheiten befohlen, das Feuer vollständig einzustellen. Es gibt Berichte über eine Massenflucht sowjetischer Zivilisten, die versuchten, auf der Flucht vor den vorrückenden deutschen Truppen über den Ural in Richtung Tscheljabinsk und Swerdlowsk in Sicherheit zu fliehen. Das ganze Land wurde vertrieben...\n \nWas von der Union übrig blieb, zog sich über den Ural zurück und leckte seine Wunden..."
# Democratic
BP_news.2.a:0 "Was kann die deutsche Kriegsmaschinerie stoppen?"
# Fascism
BP_news.2.b:0 "Die Einöden Sibiriens liegen ihnen gut …" 
# Communism
BP_news.2.c:0 "Eine schreckliche Belastung für unser Land..."
# Neutrality
BP_news.2.e:0 "Was kann die Deutschen aufhalten?"

BP_news.3.t:0 "Die Sowjetunion ist völlig besiegt!"
BP_news.3.d:0 "In einer Erklärung, die heute kaum jemanden überraschte, verkündete der Führer des Deutschen Reichs, Adolf Hitler, den totalen Sieg über die Streitkräfte der Sowjetunion. „Heute feiern wir die Früchte unserer Anstrengungen!“, sagte er heute im Reichstag. „Die größte Bedrohung, die jemals für das deutsche Volk, die Völker Europas und die zivilisierten Nationen der Welt bestanden hat, existiert nicht mehr.“ In seiner Siegesrede verkündete der Führer die Aufteilung der ehemaligen Sowjetunion zwischen dem Deutschen Reich und dem Japanischen Kaiserreich: Japan würde die Kontrolle über Kamtschatka, Wladiwostok, Chabarowsk und den Großraum Ostsibirien erhalten, während das Deutsche Reich die Kontrolle über Westsibirien erlangte. Als Zeichen des guten Willens und zur Minimierung möglicher militärischer Zwischenfälle zwischen den beiden Ländern ist die Einrichtung einer sibirischen „Neutralen Zone“ zwischen den beiden Staaten geplant."
# Democratic
BP_news.3.a:0 "Was kann die deutsche Aggressionsmaschinerie stoppen?"
# Fascism
BP_news.3.b:0 "Tolle Neuigkeiten für alle Gegner der bolschewistischen Infektion!" 
# Communism
BP_news.3.c:0 "Es ist alles vorbei."
# Neutrality
BP_news.3.e:0 "Es wird die Welt verändern ..."

BP_news.4.t:0 "Die USA greifen ein!"
BP_news.4.d:0 "Der amerikanische Adler greift erneut in die Schlacht um die Alte Welt ein. Nach der Landung deutscher Truppen auf den Britischen Inseln und dem Fall Londons wurde klar, dass Amerika der deutschen Aggression nicht länger tatenlos zusehen kann. Die offizielle Kriegserklärung wurde der deutschen Botschaft in Washington zugestellt, und amerikanische Diplomaten in Berlin wurden angewiesen, umgehend in die USA zurückzukehren. Die Atlantikflotte hat ihren Heimathafen Norfolk verlassen. „Das Schicksal der freien Welt“, sagte Präsident Roosevelt heute Morgen in seiner Erklärung vor dem Kongress, „... darf nicht in die Hände derer fallen, die ihr Licht auslöschen wollen. Unser Wille bleibt unbesiegbar, bleibt fest, bleibt unbeeindruckt, bleibt ewig, und vor allem bleibt unser Wille und der Wille aller Völker, die diese heilige Pflicht haben, frei!“"
# Democratic
BP_news.4.a:0 "Der Krieg ist noch nicht vorbei!"
# Fascism
BP_news.4.b:0 "Unangenehm..." 
# Communism
BP_news.4.c:0 "Weniger als ein Jahr..."
# Neutrality
BP_news.4.e:0 "Es kann den Verlauf des Krieges ändern ..."

BP_news.5.t:0 "Kristallnacht"
BP_news.5.d:0 "In der Nacht vom 9. auf den 10. November 1938 kam es in Österreich und Deutschland zu einer Reihe von Judenpogromen, die von den Nazis organisiert wurden. Dies war der erste Massenakt physischer Gewalt gegen das jüdische Volk, der vom Dritten Reich verübt wurde. In der Folge wurden Menschen getötet, 30.000 in Konzentrationslager deportiert, Hunderte von Synagogen niedergebrannt und Fensterscheiben von Häusern und Geschäften von Juden eingeschlagen. Alle Straßen waren mit Glassplittern übersät – daher der Name „Reichskristallnacht“."
# Democratic
BP_news.5.a:0 "Barbarisch!"
# Fascism
BP_news.5.b:0 "Sie haben es verdient." 
# Communism
BP_news.5.c:0 "Ekelhaft."
# Neutrality
BP_news.5.e:0 "Das ist also das wahre Gesicht des Nationalsozialismus?"

BP_news.6.t:0 "Japanischer Sieg in China"
BP_news.6.d:0 "Der Zweite Japanisch-Chinesische Krieg ging diese Woche zu Ende, als japanische Truppen die letzten chinesischen Widerstandskämpfer aus ihren Stellungen vertrieben und in der chinesischen Hauptstadt Nanjing ein Friedensvertrag unterzeichnet wurde. Mit einem Federstrich kehrte endlich Frieden in die Region ein. In Tokio wird das Ende der Kämpfe bereits gefeiert, und Scharen freudiger Bürger nahmen an den verschiedenen Siegesparaden teil.\n \nExperten und Beobachter sind sich uneinig, was als Nächstes in der Region passieren wird, aber eines ist sicher: Das Kaiserreich Japan ist nun die dominierende Macht im Orient."
BP_news.6.a:0 "Asien wird nie mehr dasselbe sein, oder?"

BP_news.7.t:0 "Das Massaker von Nanjing"
BP_news.7.d:0 "Erst nach dem Fall der Stadt gibt es Berichte über Massenraub, Morde, Hinrichtungen, Vergewaltigungen und andere barbarische Grausamkeiten durch Soldaten der japanischen Armee.\n \nEin westlicher Zeuge, Reverend Ralph L. Phillips, schreibt: „Ich weiß nicht, wie es enden wird. Ich habe noch nie von solcher Grausamkeit gehört oder gelesen. Mord! Raub! Vergewaltigung!“. Nach verschiedenen Schätzungen von Zeugen und Experten wurden zwischen 40.000 und über 500.000 chinesische Zivilisten und entwaffnete Soldaten getötet, und es kam zu zahlreichen Vergewaltigungen und Plünderungen. Im Falle von Widerstand oder allem, was missbilligend erscheint, greifen die Japaner zur Hinrichtung mit Bajonetten, Schwertern und anderen Mitteln. Die gesamte japanische Armee scheint tun und lassen zu können, was sie will."
# Democratic
BP_news.7.a:0 "Die gesamte zivilisierte Welt steht diesen Taten mit Fassungslosigkeit und Abscheu gegenüber."
# Fascism
BP_news.7.b:0 "Die gesamte zivilisierte Welt steht diesen Taten mit Fassungslosigkeit und Abscheu gegenüber." 
# Communism
BP_news.7.c:0 "Die gesamte zivilisierte Welt steht diesen Taten mit Fassungslosigkeit und Abscheu gegenüber."
# Neutrality
BP_news.7.e:0 "Die gesamte zivilisierte Welt steht diesen Taten mit Fassungslosigkeit und Abscheu gegenüber."
# USA
BP_news.7.f:0 "Das amerikanische Volk ist schockiert über diese Nachricht!"
BP_news.7.g:0 "Das amerikanische Volk schenkt diesen Nachrichten keine Beachtung …"
# China
BP_news.7.h:0 "Wir werden uns an diesen Monstern rächen!"
BP_news.16.t:0 "Der Aufstand der Krone"
BP_news.16.d:0 "Das australische Königreich revoltierte gegen die Japaner, als die Bedingungen für eine vollständige Annexion übermittelt wurden. Nur die Zeit wird zeigen, ob es die japanische Bedrohung abwehren kann ..."
BP_news.16.a:0 "Die Welt wartet ..."

BP_news.12.t:0 "Stalin tot!"
BP_news.12.d_stalin_stay:0 "Als die belagerte sowjetische Hauptstadt Moskau heute früh Artillerieangriffen und deutschen Luftangriffen ausgesetzt war und in den Außenbezirken der Stadt die ersten Kämpfe begannen, wurde der Führer der UdSSR, Josef Stalin, getötet, als er den Kreml in einen sichereren Hafen im Osten der Stadt verließ. Ersten Berichten zufolge wurde der Konvoi, in dem er reiste, von deutschen Flugzeugen angegriffen, wobei Stalin selbst schwer verletzt und mehrere Mitglieder seines Kabinetts getötet wurden. Wenige Stunden später erlag Stalin seinen Verletzungen. Die sowjetischen Truppen gerieten ohne Befehl von oben in Panik und Unordnung. Viele Militärexperten sagen voraus, dass die einmarschierenden deutschen Truppen diese Gelegenheit sofort ausnutzen würden, um die Streitkräfte der Roten Armee weiter nach Osten zu drängen."
BP_news.12.d_stalin_safe:0 "Die deutschen Behörden berichteten heute, dass vor einigen Tagen an der Grenze zwischen der sibirischen Neutralen Zone und dem Deutschen Reich Wehrmachtsaufklärer in Gefechte mit den Resten der Roten Armee eintraten, die nun einen Guerillakrieg führten. Die deutschen Soldaten brachen den Widerstand schnell und fanden zu ihrer Überraschung unter den Toten auch den bolschewistischen Führer Josef Stalin! „Die Autopsie ergab, dass er an einer Schusswunde im Bauch verblutet war. Sein Leichnam wurde einbalsamiert und soll nach Deutschland überführt werden, um ihn in ein Museum aufzunehmen, das dem Kampf gegen die jüdisch-bolschewistische Bedrohung gewidmet ist. Bald können die Berliner ihn selbst besichtigen“, sagte der deutsche Vertreter."
# Democratic
BP_news.12.a:0 "Ohne Stalin ist Europa verloren ..."
# Fascism
BP_news.12.b:0 "Ha ha! Der alte Mann ist tot! Darauf trinke ich!" 
# Communism
BP_news.12.c:0 "Schreckliche Trauer für die gesamte Union ..."
# Neutrality
BP_news.12.e:0 "Ein Diktator weniger ..."

BP_news.13.t:0 "Staatsstreich im Irak!"
BP_news.13.d:0 "Aufgrund antibritischer Stimmungen kam es heute Morgen zu einem Staatsstreich im Irak. Das Regime von Regent Abd al-Ilah wurde gestürzt und Rashid Ali al-Ghailani zum Premierminister ernannt. Angeführt wurde der Putsch von vier irakischen Generälen, die der nationalistischen Gruppe „Goldenes Quadrat“ angehörten. Gerüchten zufolge wurde diese Gruppe von der deutschen Regierung finanziert. Den Rebellen zufolge erlangte der Irak 1930 nur aufgrund des von Großbritannien aufgezwungenen Anglo-Irakischen Vertrags seine formale Unabhängigkeit. Die neue Regierung kündigte die Kündigung aller Verträge mit Großbritannien an und forderte den Abzug britischer Stützpunkte aus dem Irak. Es besteht kein Zweifel, dass die britische Regierung umgehend auf das Vorgehen der neuen irakischen Regierung reagieren wird."
# Germany
BP_news.13.a:0 "Tolle Neuigkeiten!" 
# Britannia
BP_news.13.b:0 "Noch ein Kopfschmerz ..."
# Rest
BP_news.13.c:0 "Der Krieg hat den Nahen Osten erreicht ..."

BP_news.14.t:0 "Der Staatsstreich im Irak ist gescheitert!"
BP_news.14.d:0 "Aufgrund antibritischer Stimmungen kam es heute Morgen im Irak zu einem Putschversuch. Angeführt wurde der Putsch von Rashid Ali al-Ghailani und vier irakischen Generälen, die der nationalistischen Gruppe „Goldenes Quadrat“ angehörten. \n \nIhren Angaben zufolge erhielt der Irak 1930 nur die formale Unabhängigkeit von Großbritannien, das ihm den britisch-irakischen Deal aufzwang. Berichten zufolge ist Deutschland an dem Putschversuch beteiligt. \n \nDie Lage im Land, insbesondere in der Hauptstadt Bagdad, ist weiterhin angespannt."
# Germany
BP_news.14.a:0 "Idioten! Amateure!" 
# Britannia
BP_news.14.b:0 "Gefährliche Situation..."
# Rest
BP_news.14.c:0 "Noch ein Spiel hinter den Kulissen?"

BP_news.15.t:0 "Exodus der sowjetischen Bevölkerung"
BP_news.15.d:0 "Schon während der Kämpfe flohen viele Bewohner der UdSSR von der Front oder aus den besetzten Städten auf dem Land. Einige von ihnen versuchten, in die von der UdSSR kontrollierten Gebiete zurückzukehren oder begannen Guerilla-Aktivitäten im Hinterland...\n \nNach dem Ende der Kämpfe im Osten hat sich diese Situation nur noch verschlimmert – die Dörfer sind leer und die Städte dünn besiedelt – Tausende Kolonnen ehemaliger Sowjetbürger ziehen weiter nach Osten, über den Ural hinaus..."
BP_news.15.a:0 "Noch mehr Leid für die Zivilbevölkerung?"


