GER_destiny_of_scandinavia:0 "Schicksal Skandinaviens"
GER_destiny_of_scandinavia_desc:0 "Da Skandinavien nun unter der Kontrolle der Achsenmächte steht, bietet sich uns die Möglichkeit, die skandinavischen Völker unter einer Flagge zu vereinen."
BP_Germany_controls_Norway_tt:0 "§H[Root.GetNameDef]§! oder ein Mitglied von §H[From.GetFactionName]§! kontrolliert die §HNorwegische§!-Region."
BP_Germany_controls_Denmark_tt:0 "§H[Root.GetNameDef]§! oder ein Mitglied von §H[From.GetFactionName]§! kontrolliert die Region §HDanish§!."
BP_Germany_controls_Sweden_tt:0 "§H[Root.GetNameDef]§! oder ein Mitglied von §H[From.GetFactionName]§! kontrolliert die Region §HSwedish§!."
 	
GER_destiny_of_turkey:0 "Schicksal der Türkei"
GER_destiny_of_turkey_desc:0 "Die Türkei ist der deutschen Militärmacht zum Opfer gefallen – ein weiteres Land auf dem Müllhaufen der Geschichte. Doch die Frage bleibt: Was tun mit dem Gebiet? Es kann zu einem deutschen Marionettenstaat gemacht werden, der allein dem Reich untergeordnet ist – oder es kann unter unseren Verbündeten im Nahen Osten aufgeteilt werden."
BP_Axis_controls_Anatolia_tt:0 "§H[Root.GetNameDef]§! oder ein Mitglied von §H[From.GetFactionName]§! kontrolliert die Region §HAnatolian§!."
