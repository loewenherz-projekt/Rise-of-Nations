GER_motorization_ukraine_caucasus:0 "Bau der Ukraine-Kaukasus-Autobahn"
GER_motorization_ukraine_caucasus_desc:0 "Die Anbindung der Gebiete der Ukraine an die überaus lebenswichtigen Ölvorräte des Kaukasus ist von größter Bedeutung."
