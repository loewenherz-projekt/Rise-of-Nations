SOV_sacred_war:0 "Der Heilige Krieg"  
SOV_sacred_war_desc:0 "Die Faschisten und ihresgleichen haben der Sowjetunion den Krieg erklärt und strömen über die Grenzen in unsere Dörfer! Sie müssen gestoppt werden!"

SOV_sacred_war2:0 "Der Heilige Krieg"  
SOV_sacred_war2_desc:0 "Der faschistische Abschaum dringt immer tiefer in das Herz unseres Vaterlandes ein. Dörfer, Städte und Großstädte bleiben in ihrem Kielwasser verwüstet. Sie werden dafür bezahlen ..."

SOV_sacred_war3:0 "Der Heilige Krieg"
SOV_sacred_war3_desc:0 "Der Feind steht vor den Toren! Unsere glorreiche Nation steht am Rande des Zusammenbruchs, und alle müssen zu den Waffen greifen und für ihre Heimat, ihre Familien und ihre Existenz kämpfen! Za Rodinu, vperyod!"

SOV_sour_loser_ussr:0 "Bitterer Frieden" 
SOV_sour_loser_ussr_desc:0 "Wir wurden besiegt – unsere größten Städte liegen nun entweder in der Hand des Feindes oder sind rauchende Ruinen. Wir mögen jetzt auf den Knien liegen, aber eines Tages werden wir den Kampf in ihr Land, ihr Volk und ihr Blut tragen ..."

SOV_stalin_dead:0 "Demoralisierte Armee"
SOV_stalin_dead_desc:0 "Infolge der jüngsten schockierenden Wendung der Ereignisse sind unsere Truppen schrecklich demoralisiert und können nicht mit normaler Effizienz kämpfen."
 
SOV_civilian_incoming:0 "Flüchtlingsstrom"
SOV_civilian_incoming_desc:0 ""
 
