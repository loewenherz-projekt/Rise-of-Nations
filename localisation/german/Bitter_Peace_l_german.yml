# West ##############################################################################################################################################################################
#####################################################################################################################################################################################

BP_germany.600.t:0 "Die irische Frage"
BP_germany.600.d:0 "Die Beteiligung Irlands am Zweiten Weltkrieg ist eine wenig bekannte historische Kuriosität. Obwohl Irland während des gesamten Konflikts offiziell neutral war, entging den beteiligten Mächten nicht, dass bestimmte Gruppen in Irland Interessensüberschneidungen mit den Ambitionen des Dritten Reichs hatten, insbesondere die Feindseligkeiten zwischen der Irisch-Republikanischen Armee und der Nordirlandfrage. Auch die Alliierten zeigten großes Interesse an Irland, und die Führung des Landes musste ihre diplomatischen Beziehungen sorgfältig ausbalancieren, um ihre Neutralität nicht zu gefährden. Mit der Besetzung der Britischen Inseln gelangte Nordirland unter unsere Kontrolle. Wir können nun entscheiden, wie wir diese Situation am besten zu unserem Vorteil nutzen. Würden wir diese Provinzen Irland zusprechen, könnten wir sie problemlos in unseren Einflussbereich bringen. Angesichts der geopolitischen Lage nach dem Zusammenbruch des Britischen Empires hätten sie realistischerweise keine andere Wahl, als zuzustimmen. Dies würde es uns ermöglichen, die irische Führung zu beeinflussen, unsere Vision einer neuen europäischen Ordnung zu teilen, gleichzeitig unsere Sicherheit im Nordatlantik zu gewährleisten und ein Gegengewicht zu den Briten zu bilden. Wir können uns auch dafür entscheiden, die Besatzung fortzusetzen oder Nordirland an den britischen Protektorat zurückzugeben."
BP_germany.600.a:0 "Die irische Nation ist wieder vereint. Willkommen in der Achse"
BP_germany.600.b:0 "Kehre zu den Briten zurück" 
BP_germany.600.c:0 "Wir werden die Besetzung fortsetzen"

BP_germany.601.t:0 "Der Ausbau des Flughafens Aalborg"
BP_germany.601.d:0 "Am 9. April 1940 um 6:30 Uhr besetzten deutsche Truppen den erst zwei Jahre zuvor erbauten Flughafen in Aalborg. Zum ersten Mal in der Geschichte wurden Fallschirmjäger als Speerspitze eines Angriffs eingesetzt. Die Deutschen etablierten sich schnell dort und setzten bereits am folgenden Tag, dem 10. April, mehr als 50 Transportflugzeuge vom Flughafen aus ein. Die Deutschen brauchten Aalborg, um die Versorgungslinie zu den in Norwegen kämpfenden Einheiten aufrechtzuerhalten. Sie begannen sofort mit einem umfassenden Ausbau, und bereits am 13. Juli 1940 war die erste von zwei neuen Betonlandebahnen betriebsbereit. Später kamen 19 Holzhangars, Kasernen, Punktverteidigungsbunker und Flakbatterien (Flugabwehr) hinzu.\n \nIm Laufe des Krieges wurde Aalborg-West zusammen mit dem benachbarten Fliegerflughafen Horst Grove zu einem der am stärksten befestigten Flugplätze der Luftwaffe im besetzten Westeuropa ausgebaut. Zwischen November 1942 und Anfang Januar 1944 befand sich in Aalborg-West eine Flugsaison der IV. Gruppe der Nachtjagdgeschwader 3 (IV./NJG 3), die zunächst mit Bf 110 und Do 217 ausgerüstet war. Letztere wurde im Sommer 1943 durch Ju 88C ersetzt.\n \nDie Flugoperationen während des gesamten Krieges dienten der Versorgung und dem Truppentransport von und nach Norwegen. Darüber hinaus umfassten die Operationen Seeaufklärung über der Nordsee, Jagdbegleitung für Luftangriffe auf Nordengland und Schottland sowie die Unterstützung von Nachtjägeroperationen und -ausbildung. Der Stützpunkt wurde im April 1940 von der Royal Air Force angegriffen, einem erfolglosen Versuch, die Entsendung deutscher Verstärkung nach Norwegen zu verhindern.\n \nAuf der anderen Seite des Limfjords, südlich von Aalborg West, begannen die Deutschen im Spätsommer 1940 mit dem Bau eines Wasserflugzeugstützpunkts. Ein 300 Meter langer Pier wurde errichtet, um einsatzbereite Wasserflugzeuge festzumachen. Ein Kran konnte die Flugzeuge an Land heben, wenn sie im großen Hangar gewartet werden mussten. Der Ausbau des Flugplatzes wurde während des gesamten Krieges fortgesetzt und umfasste Bunker und Geschützstellungen zur Punktverteidigung, die alle mit Stacheldraht umgeben waren. Insgesamt wurden elf Mannschaftsbunker und ein großer Lazarettbunker errichtet, um die rund 1.500 Mann starke Garnison zu versorgen. Bis zur Befreiung im Mai 1945 diente der Stützpunkt als Einrichtung der Seenotrettung und als Ausbildungszentrum für zukünftige Wasserflugzeugpiloten."
BP_germany.601.a:0 "Den Flughafen erweitern"
BP_germany.601.b:0 "Keine Notwendigkeit" 

BP_germany.602.t:0 "Kristallnacht"
BP_germany.602.d:0 "In der Nacht vom 9. auf den 10. November 1938 kam es in Österreich und Deutschland zu einer Reihe von Judenpogromen, die von den Nazis organisiert wurden. Es war der erste Massenakt physischer Gewalt gegen das jüdische Volk im Dritten Reich. Menschen wurden getötet, 30.000 in Konzentrationslager deportiert, Hunderte Synagogen niedergebrannt und Fensterscheiben an Häusern und Geschäften von Juden eingeschlagen. Alle Straßen waren mit Glasscherben bedeckt – daher der Name „Reichskristallnacht“. Die offizielle Propaganda bezeichnete diese Ereignisse als Ausdruck patriotischer Gefühle des deutschen Volkes. Die „Reichskristallnacht“ markierte einen Wendepunkt im Schicksal des jüdischen Volkes und war eine direkte Folge des schrecklichsten Verbrechens der Weltgeschichte – des Holocaust, der zur Vernichtung von sechs Millionen Juden führte.\n \nDie Zeitungen der UdSSR veröffentlichten Berichte über Proteste gegen die „Reichskristallnacht“ auf der ganzen Welt, darunter auch über eine Kundgebung am 15. November im Großen Saal des Moskauer Konservatoriums, bei der im Namen der „sowjetischen Intelligenzija“ eine Resolution gegen antisemitische Ausschreitungen verabschiedet wurde. Der Präsident der Vereinigten Staaten berief aus Protest lediglich den amerikanischen Botschafter zu Konsultationen aus Berlin zurück. Auch Großbritannien und Frankreich protestierten, doch die diplomatischen Beziehungen zu Nazi-Deutschland brachen nicht ab, und ihre Botschafter blieben in Berlin. Doch die Mächte sind sich nicht einig, wenn sie sich gegen die „Reichskristallnacht“ aussprechen. Im Gegenteil: Nach der „Reichskristallnacht“ wurden die Entscheidungen des Ersten Wiener Schiedsgerichts vollstreckt, die der Tschechoslowakei endgültig ein Ende setzten."
BP_germany.602.a:0 "OK"

BP_germany.603.t:0 "Italien fordert Tunesien auf"
BP_germany.603.d:0 "Die Italiener haben aufgrund unseres Sieges begonnen, Forderungen an Vichy-Frankreich zu stellen. Sie fordern Gabès und Tunesien, um Italien zu stärken. Doch darüber werden wir entscheiden."
BP_germany.603.a:0 "Ein starker Verbündeter führt zu einem starken Deutschland"
BP_germany.603.b:0 "Sie brauchen mehr als ein paar tausend Tote"

BP_germany.604.t:0 "Ermordung von Wilhelm Gustloff"
BP_germany.604.d:0 "Am 4. Februar 1936 ermordete der jüdische Student David Frankfurter in Davos Wilhelm Gustloff, einen NSDAP-Führer, Gründer und Leiter des Schweizer Zweigs der NSDAP. Die Schweizer Regierung löste die Nationalsozialisten als Organisation auf. Die deutsche Regierung protestierte umgehend gegen diese Aktion, und es kam zu Spannungen zwischen den beiden Ländern. Wilhelm Gustloff erhielt in Mecklenburg ein Staatsbegräbnis. An der Beerdigung nahmen Adolf Hitler, Joseph Goebbels, Hermann Göring, Heinrich Himmler, Martin Bormann und Joachim von Ribbentrop teil.\n \nDer Mord an Gustloff wurde dank der von Joseph Goebbels gelenkten Nazi-Propaganda in Europa weithin bekannt. Doch Adolf Hitler verbot damals Vergeltungsmaßnahmen gegen Juden, da er einen internationalen Boykott der Olympischen Winter- und Sommerspiele in Deutschland befürchtete, mit denen er die Größe, Stärke und Ideologie der Nazi-Bewegung auf der Weltbühne bekannt machen wollte. Gustloff wurde zum Märtyrer der Nazi-Sache und sein Mord wurde später Teil der Propaganda und diente als Vorwand, ebenso wie der Mord an dem deutschen Diplomaten Ernst vom Rath durch Herschel Greenspan für die Pogrome der „Kristallnacht“ 1938."
BP_germany.604.a:0 "Verdammt..."

BP_germany.605.t:0 "Schweizer Frage"
BP_germany.605.d:0 "Die Schweizerische Eidgenossenschaft befand sich während beider Weltkriege in einer prekären Lage, da sie im Zweiten Weltkrieg von allen Seiten von den Achsenmächten umzingelt war. Obwohl die Schweiz wie seit Jahrhunderten strikt neutral blieb, gab es ernsthafte Bedenken hinsichtlich der Absichten des Dritten Reichs und der Frage, ob die Schweiz Hitlers nächstes Ziel sein könnte. Die Schweizerische Eidgenossenschaft, deren zentrale Gebiete überwiegend deutschsprachig waren, im Westen einen beträchtlichen Anteil frankophoner Bevölkerung hatten und im Süden italienisch und rätoromanisch gesprochen wurde, sah ihre mehrsprachige, dezentralisierte Demokratie durch Hitlers Vision eines Großgermanischen Reichs und die nationalsozialistische Weltanschauung extrem bedroht. Nach dem Fall Frankreichs ist das Schicksal der Schweiz sehr ungewiss, da ihre geostrategisch wichtige Lage sie zu einem potenziellen militärischen Ziel macht. Die Besetzung der Schweiz mit ihrer gut ausgebauten Verkehrsinfrastruktur könnte die Versorgung unserer Truppen in Afrika und Südfrankreich erheblich erleichtern. Mit einem koordinierten Angriff Deutschlands und Frankreichs, unterstützt von italienischen Truppen, können wir die Schweiz leicht besiegen und ihre Verkehrsinfrastruktur intakt halten.\n \nAndererseits könnten Investitionen in die Schweizer Rüstungsindustrie für uns eine deutlich profitablere Option sein. Es wäre daher ratsam, sie davon zu überzeugen, dass der einzige Weg zur Wahrung der Neutralität der Abschluss eines ungleichen Handelsabkommens mit den Achsenmächten ist."
BP_germany.605.a:0 "Genehmigung des Invasionsplans"
BP_germany.605.b:0 "Druck ausüben"

BP_germany.606.t:0 "Schutz des Altkaisers Wilhelm II."
BP_germany.606.d:0 "Nach unserer Eroberung der Niederlande geriet Dorn unter unsere Besatzung. Wilhelm II. residiert in seinem Herrenhaus in der Nähe von Dorn. Der ehemalige Kaiser des Deutschen Reiches wird nun von der Gestapo und der Geheimen Feldpolizei (SFP) bewacht, die ihn vor potenziellen Mördern schützen. Wilhelms Reaktion scheint herzlich zu sein, auch wenn er seiner Meinung nach „im falschen Ton“ ist. Vor einiger Zeit sprach er unwissend über uns: „Was bei uns zu Hause passiert, ist natürlich skandalös. Jetzt ist es Zeit für die Armee, ihre Stimme abzugeben; sie hat schon vieles ignoriert … Ältere Offiziere und eigentlich alle anständigen Deutschen sollten protestieren.“ Dieser Text enthält eindeutig einen Aufruf zu Unruhen und sogar zum Putsch! Aus diesem Grund ist unklar, was damit geschehen soll …" 
BP_germany.606.a:0 "Dieser alte Narr weiß selbst nicht, was er sagt. Lass es seine Jahre leben."

### Switzerland

BP_Switzerland.1.t:0 "Ermordung von Wilhelm Gustloff"
BP_Switzerland.1.d:0 "Am 4. Februar 1936 ermordete der jüdische Student David Frankfurter in Davos Wilhelm Gustloff, einen NSDAP-Führer, Gründer und Leiter des Schweizer Zweigs der NSDAP. Die Schweizer Regierung löste die Nationalsozialisten als Organisation auf. Die deutsche Regierung protestierte umgehend gegen diese Aktion, und es kam zu Spannungen zwischen den beiden Ländern. Wilhelm Gustloff erhielt in Mecklenburg ein Staatsbegräbnis. An der Beerdigung nahmen Adolf Hitler, Joseph Goebbels, Hermann Göring, Heinrich Himmler, Martin Bormann und Joachim von Ribbentrop teil.\n \nDer Mord an Gustloff wurde dank der von Joseph Goebbels gelenkten Nazi-Propaganda in Europa weithin bekannt. Doch Adolf Hitler verbot damals Vergeltungsmaßnahmen gegen Juden, da er einen internationalen Boykott der Olympischen Winter- und Sommerspiele in Deutschland befürchtete, mit denen er die Größe, Stärke und Ideologie der Nazi-Bewegung auf der Weltbühne bekannt machen wollte. Gustloff wurde zum Märtyrer der Nazi-Sache und sein Mord wurde später Teil der Propaganda und diente als Vorwand, ebenso wie der Mord an dem deutschen Diplomaten Ernst vom Rath durch Herschel Greenspan für die Pogrome der „Kristallnacht“ 1938."
BP_Switzerland.1.a:0 "OK..."

BP_Switzerland.2.t:0 "Krieg an der Schwelle"
BP_Switzerland.2.d:0 "Die Feinde marschieren ein! Es ist Zeit, das National Redoubt zu aktivieren und sicherzustellen, dass ihre Invasion zumindest kostspielig ist!"
BP_Switzerland.2.a:0 "Beschütze das Vaterland"
SWI_moilization:0 "15 Divisionen der mobilisierten Bevölkerung werden in Bern stationiert\n \n"

BP_Switzerland.3.t:0 "Die Schweizer haben Brücken und Tunnel zum Einsturz gebracht!"
BP_Switzerland.3.d_ger:0 "Obwohl es Vorschläge für eine Invasion der Schweiz gab, insbesondere im Rahmen der Operation Tannenbaum, kam es in der Realität nie zu einer solchen Invasion. Das Schweizer Gebiet im Herzen der Alpen ist sehr schwer zu erobern, in manchen Gebieten nahezu unmöglich. Das Schweizer System der nationalen Mobilmachung und die Verteidigungsstrategie des Nationalen Redoutensystems sorgten dafür, dass jede Invasion unglaublich kostspielig und weder Zeit noch Ressourcen der feindlichen Mächte wert wäre. Das Land diente zudem als günstiges Gebiet für diplomatische Verhandlungen und als Lagerstätte für Wirtschaftsgüter, was den Schweizern ihren Ruf als Bankiers einbrachte.\n \nNachdem wir beschlossen hatten, in die Schweiz einzumarschieren, wurde der Verteidigungsplan des Nationalen Redoutensystems in Gang gesetzt. Wichtige Brücken und Tunnel wurden zerstört, was es unseren Truppen unglaublich schwer macht, dieses zerklüftete Gelände zu durchqueren. Die Schweizer Armee hat sich ebenfalls in ihre Festungskomplexe zurückgezogen und plant, unseren Streitkräften einen verzweifelten letzten Widerstand zu leisten. Diese Befestigungen gehören zu den besten der Welt, und es könnte einige Zeit dauern, bis wir in der Lage sind, sie anzugreifen. Diese Invasion wird sehr kostspielig sein, aber sie ist notwendig, um unsere Vision eines Großgermanischen Reiches zu verwirklichen!"
BP_Switzerland.3.d_rest:0 "Obwohl es Vorschläge für eine Invasion der Schweiz gab, insbesondere im Rahmen der Operation Tannenbaum, kam es in der Realität nie zu einer solchen Invasion. Das Schweizer Gebiet im Herzen der Alpen ist sehr schwer zu erobern, in manchen Gebieten nahezu unmöglich. Das Schweizer System der nationalen Mobilmachung und die Verteidigungsstrategie des Nationalen Redoutensystems sorgten dafür, dass jede Invasion unglaublich kostspielig und weder Zeit noch Ressourcen der feindlichen Mächte wert wäre. Das Land diente zudem als günstiges Gebiet für diplomatische Verhandlungen und als Lagerstätte für Wirtschaftsgüter, was den Schweizern ihren Ruf als Bankiers einbrachte.\n \nNachdem wir beschlossen hatten, in die Schweiz einzumarschieren, wurde der Verteidigungsplan des Nationalen Redoutensystems in Gang gesetzt. Wichtige Brücken und Tunnel wurden zerstört, was es unseren Truppen unglaublich schwer macht, dieses zerklüftete Gelände zu durchqueren. Die Schweizer Armee hat sich ebenfalls in ihre Festungskomplexe zurückgezogen und plant, unseren Streitkräften einen verzweifelten letzten Widerstand zu leisten. Diese Befestigungen gehören zu den besten der Welt, und es könnte einige Zeit dauern, bis wir in der Lage sind, sie anzugreifen. Diese Invasion wird sehr kostspielig sein, aber sie ist für unseren Sieg erforderlich!"
BP_Switzerland.3.a:0 "Wenn sie glauben, dass uns das aufhalten wird, liegen sie völlig falsch!"

BP_Switzerland.4.t:0 "Teilung der Schweiz"
BP_Switzerland.4.d:0 "Nicht einmal die besten Verteidigungssysteme der Welt konnten das Reich davon abhalten, die Schweiz einzunehmen. Nach dem Ende dieses Kampfes müssen wir entscheiden, wie wir die Region zwischen uns und unseren Verbündeten aufteilen. Die Kantone im Westen sind überwiegend französischsprachig und würden von unseren Regimen in Frankreich angemessen verwaltet, während die italienischsprachigen Provinzen im Süden Italien zugesprochen werden könnten, um Mussolinis Ziele zu erfüllen.\n \nDer Großteil der Schweiz spricht bereits Deutsch und wird unabhängig von unserer Entscheidung Teil des Reiches. Wir können uns auch dazu entschließen, die gesamte Schweiz einzuverleiben und unseren Verbündeten kein Territorium zu überlassen. Das Befestigungssystem der Nationalredoute wird ebenfalls abgetragen und das Material zum Wiederaufbau der während der Invasion zerstörten Infrastruktur verwendet."
BP_Switzerland.4.a:0 "Aufteilung der Schweiz unter unseren Verbündeten"
partition_of_swiss_not_work_now:0 "§RDiese Option funktioniert derzeit nicht, da die Schweiz im Spiel nur aus zwei Regionen besteht. Wir warten, bis sich die Paradoxe ändern oder ich endlich mit der Kartenmodifikation beginne.§!"
BP_Switzerland.4.b:0 "Die ganze Schweiz gehört zum Reich!"
deconstruct_forts_in_switzerland:0 "Die durch das National Redoubt hinzugefügten Befestigungen werden entfernt\n \n"

BP_Switzerland.5.t:0 "Deutschland stellte ein Ultimatum"
BP_Switzerland.5.d:0 ""
BP_Switzerland.5.a:0 "Wir haben keine Wahl..."
BP_Switzerland.5.b:0 "Keine Zugeständnisse! Wir verteidigen unsere Werte!"

BP_Switzerland.6.t:0 "Die Schweiz hat unseren Forderungen zugestimmt"
BP_Switzerland.6.d:0 "Nach Abwägung der Vor- und Nachteile hat sich die Schweiz bereit erklärt, unsere Forderungen zu erfüllen."
BP_Switzerland.6.a:0 "Großartig!"

BP_Switzerland.7.t:0 "Die Schweiz hat auf unsere Forderung verzichtet"
BP_Switzerland.7.d:0 "Die Schweiz weigerte sich, unseren Forderungen nachzukommen und erklärte, das Land wolle seine Souveränität verteidigen."
BP_Switzerland.7.a:0 "Nun, das bedeutet Krieg ..."

### England

BP_england.1.t:0 "Zusammenbruch des britischen Empire" 
BP_england.1.d:0 "Nach dem Verlust der Britischen Inseln und der Flucht des Großteils der britischen Führung unterzeichneten die verbliebenen britischen Regierungsvertreter einen Friedensvertrag mit ihren ehemaligen Feinden. Die Übergangsregierung, die nach Kanada evakuiert werden konnte, lehnte die Vereinbarung ab und forderte den Rest des britischen Commonwealth auf, die Hoffnung nicht aufzugeben und den Kampf fortzusetzen. Trotz dieser Erklärung führte Englands Kapitulation zu wachsenden inneren Spannungen und zur Spaltung des ehemaligen Britischen Empire. Weite Gebiete erklärten ihre Unabhängigkeit oder wurden von anderen Ländern besetzt." 
BP_england.1.a:0 "Das Imperium existiert nicht mehr – es gibt nur noch Splitter"

BP_england.2.t:0 "Heimwehr" 
BP_england.2.d:0 "Die Home Guard (zunächst „Local Defence Volunteers“ oder LDV) war von 1940 bis 1944 im Einsatz und bestand aus 1,5 Millionen einheimischen Freiwilligen, die andernfalls – meist aus Altersgründen – nicht zum Militärdienst hätten zugelassen werden können (daher der Spitzname „Dad’s Army“). Sie fungierte als sekundäre Verteidigungstruppe im Falle einer Invasion Nazideutschlands und seiner Verbündeten. Die Home Guard bewachte die Küstengebiete des Vereinigten Königreichs und andere wichtige Orte wie Flugplätze, Fabriken und Sprengstofflager. Bis Ende 1940 hatte die Home Guard 847.000 Gewehre, 47.000 Schrotflinten und 49.000 Maschinengewehre verschiedener Art angehäuft. Da es zu dieser Zeit jedoch mehr als 1.682.000 Freiwillige gab, bedeutete dies, dass 739.000 Mann unbewaffnet waren." 
BP_england.2.a:0 "Wir müssen unser Zuhause schützen"
ENG_moilization_of_home_guard:0 "Auf den britischen Inseln werden 10 Divisionen der Miliz mit geringem Erfahrungs- und Ausrüstungsniveau stationiert sein"

BP_england.3.t:0 "Der Anglo-Irakische Krieg" 
BP_england.3.d:0 "Dank des Anglo-Irakischen Vertrags von 1930 war das Königreich Irak weiterhin von Großbritannien abhängig. Die patriotischen Kreise des Irak waren mit dieser Situation nicht zufrieden, und König Ghazi I. versuchte, eine von Großbritannien unabhängige Politik zu verfolgen, jedoch ohne Erfolg. Ein Teil der antibritischen irakischen Armee, die sich in den 1930er Jahren um den deutschen Botschafter Fritz Grobba gruppierte, wurde als „Kreis der Sieben“ bekannt, und ihre Anführer als „Goldene Vier“. Nach der Niederschlagung des antibritischen Aufstands in Palästina fanden viele seiner Teilnehmer Zuflucht im Irak. Später zog auch der Rebellenführer, der ehemalige Mufti von Jerusalem, Amin al-Husseini, dorthin. Die Folge dieser zunehmenden antibritischen Stimmung war ein Putsch im Irak. Am 1. April 1941 wurde das Regime von Regent Abd al-Ilah gestürzt und Rashid Ali al-Gaylani zum Premierminister ernannt. Der Putsch wurde von vier irakischen Generälen angeführt, die der nationalistischen Gruppe „Goldenes Quadrat“ angehörten. Da der Irak 1932 nur formal unabhängig wurde, war es das Ziel der Gruppe, den Krieg für die vollständige Unabhängigkeit und die Gründung eines panarabischen Staates zu nutzen. Dies führte zur Zusammenarbeit mit dem deutschen Geheimdienst und zur Annahme militärischer Unterstützung durch Deutschland.\n \nDie Lage im Irak hat einen kritischen Punkt erreicht. Mit diesem Putsch haben wir die Kontrolle über die irakischen Ölfelder und den Verkehrsknotenpunkt Kuwait-Palästina-Ägypten verloren. Darüber hinaus ist die neue irakische Regierung ein zentraler Verbündeter Deutschlands, was eine Bedrohung für Kuwait und Palästina darstellen könnte. Die Militärführung besteht auf einer baldigen Invasion und Besetzung des Irak." 
BP_england.3.a:0 "Sofort mit dem Betrieb beginnen"
BP_england.3.b:0 "Wir haben nicht die Möglichkeit, unsere Kräfte zu versprühen"

BP_england.4.t:0 "Operation «Gesicht»"
BP_england.4.d:0 "Seit den 1930er Jahren suchte das Dritte Reich nach möglichen Verbündeten im Nahen Osten. Ein solcher potenzieller Partner war der Iran. Trotz der starken Position des britischen Kapitals, das eine Schlüsselrolle in der iranischen Wirtschaft spielte, verstärkte sich die geopolitische Voreingenommenheit gegenüber dem Dritten Reich. Darüber hinaus hat Berlin seit 1933 die Beziehungen zum Iran auf eine neue qualitative Ebene gehoben. Das Reich beginnt, sich aktiv an der Entwicklung der Wirtschaft und Infrastruktur des Iran sowie an der Reform der Streitkräfte der Monarchie zu beteiligen. Im Dritten Reich werden iranische Jugendliche und Militärangehörige ausgebildet, die Goebbels in seiner Propaganda als „Söhne Zaratuschtras“ bezeichnete. Deutsche Ideologen erklärten die Perser zu „reinen Ariern“ und sie wurden per Sondererlass von den Nürnberger Rassengesetzen ausgenommen. Infolgedessen hatte das Dritte Reich zu Beginn des Zweiten Weltkriegs eine starke Position im Iran erlangt, und das Land entwickelte sich de facto zu einem deutschen Stützpunkt im Nahen Osten. Bis 1941 stellte sich die Situation mit dem Iran und seiner „arischen Voreingenommenheit“ für Moskau und London wie folgt dar: Es bestand die reale Gefahr, dass die mit britischem Kapital aufgebaute iranische Öl- und Transportinfrastruktur vom Dritten Reich gegen die UdSSR und Großbritannien eingesetzt würde. So verarbeitete allein eine Ölraffinerie in Abadan 1940 8 Millionen Tonnen Öl. Und Flugbenzin wurde in der gesamten Region nur in Baku und Abadan produziert. Sollten die deutschen Streitkräfte zudem von Nordafrika nach Palästina oder Syrien vordringen oder 1942 die Grenze Baku-Derbent-Astrachan erreichen, wäre der Kriegseintritt der Türkei und des Irans auf deutscher Seite entschieden. Im Zusammenhang mit der geplanten Offensive der Wehrmacht tief in die Sowjetunion hinein war der Persische Korridor, der durch das Gebiet der Transiranischen Eisenbahn führte, eine der einfachsten Möglichkeiten, das von den USA auf dem Seeweg eingeführte Leih- und Pachtgesetz umzusetzen. Britische und sowjetische Ingenieure erkannten die enorme Bedeutung dieser Eisenbahn und bemühten sich, sie aufmerksam zu verfolgen. Die zunehmende Zahl deutscher U-Boot-Angriffe und die Eisbedeckung des Meeres im Raum Archangelsk erhöhten die Gefahr dieser Route, sodass die Notwendigkeit der Nutzung der Eisenbahn deutlich zunahm. Darüber hinaus versuchte die sowjetische Regierung, den Iran, Aserbaidschan und Turkmensahra („Turkmenische Ebene“) in ihren Staat einzugliedern und die Kommunisten im Iran an die Macht zu bringen. Der Druck Großbritanniens und der UdSSR auf den Iran führte zu einer Verschärfung der Spannungen und massiven antibritischen Äußerungen in Teheran, die nach Ansicht der Briten prodeutscher Natur waren. Die strategische Lage des Iran beeinträchtigte die Sicherheit der sowjetischen Ölfördergebiete und des Rückens der Roten Armee und bedrohte die britischen Militärrouten zwischen Indien und dem Mittelmeer."
BP_england.4.a:0 "Wir müssen unsere Interessen im Iran schützen" 

### SAF

BP_SAF.1.t:0 "Anti-britischer Putsch"
BP_SAF.1.d:0 "Der Ossewabrandwag organisierte und führte nach der Nachricht von der britischen Kapitulation einen Putsch gegen unsere Regierung durch, der von der Bevölkerung der Buren und der Kap-Anglo-Staaten mit überwältigender Mehrheit unterstützt wurde. Mit seiner Forderung nach einem sofortigen Kriegsende, wenn nicht gar einer direkten Zusammenarbeit mit den Achsenmächten, markierte er das Ende der Zeit Südafrikas in den alliierten Armeen."
BP_SAF.1.a:0 "Es dauerte nur über 30 Jahre"

### Ireland

BP_ireland.1.t:0 "Irische Nationalisten ergreifen die Macht" 
BP_ireland.1.d:0 "Deutschland hat Einfluss auf unsere Innenpolitik genommen und dafür gesorgt, dass seine Interessen in unserem Staat vertreten werden."
BP_ireland.1.a:0 "Es wäre besser für uns"

### USA

BP_USA.1.t:0 "Amerika tritt in den Krieg ein?" 
BP_USA.1.d:0 "Die Nachricht hat die Welt erschüttert: Deutsche Truppen sind auf den Britischen Inseln gelandet und haben in den letzten Stunden Berichten zufolge einen starken Brückenkopf errichtet. Die britischen Truppen ziehen sich weiter ins Landesinnere zurück, um sich neu zu formieren und einen Gegenangriff zu starten. In den Straßen Londons herrscht Panik, als die Stadt beginnt, Zivilisten zu evakuieren und angesichts des deutschen Vormarsches wertvolle Informationen zu sichern.\n \nDie letzte Bastion der Demokratie in Europa steht vor der Beherrschung. Sollte Amerika in den Konflikt eingreifen?"
BP_USA.1.a:0 "Wir müssen die deutsche Aggression stoppen!"
BP_USA.1.b:0 "Das können wir nicht tun..."

BP_USA.2.t:0 "US-Besatzung Grönlands und Islands" 
BP_USA.2.d:0 "Nach der deutschen Besetzung Dänemarks im April 1940 nahmen britische Truppen rasch Island ein, um einer möglichen Bedrohung durch eine deutsche Invasion entgegenzuwirken. Großbritannien konnte die Insel mit wenigen Truppen halten, und Anfang 1941 war klar, dass es besser wäre, wenn die USA die Überwachung übernehmen würden. Im Sommer 1941 besetzten US-Truppen sowohl Grönland als auch Island im Nordatlantik. Die US-Besetzung Grönlands wurde durch ein Abkommen zwischen der US-Regierung und einem rebellischen dänischen Botschafter in Washington arrangiert. Dieser dänische Botschafter weigerte sich, die dänische Regierung in Kopenhagen nach der deutschen Besetzung Dänemarks, die im April 1940 begann, anzuerkennen oder ihr zu gehorchen. Das im April 1941 unterzeichnete Grönland-Abkommen stieß auf heftige Proteste sowohl der dänischen Regierung als auch der deutschen Botschaft in Washington."
BP_USA.2.a:0 "Besetzen"
BP_USA.2.b:0 "Keine Notwendigkeit"

BP_USA.3.a:0 "Großartig"

### Italy

BP_italy.1.t:0 "Italienisch-Ostafrika"
BP_italy.1.d:0 "Nach der Eroberung Äthiopiens entstand durch den Zusammenschluss von Italienisch-Somaliland und Italienisch-Eritrea mit dem ehemaligen äthiopischen Kaiserreich die Kolonie „Africa Orientale Italiana“ (auch Italienisch-Ostafrika genannt). Viktor Emanuel III. von Italien nahm daraufhin den Titel „Kaiser von Äthiopien“ an. Das Gebiet wurde in sechs Gouvernements Italienisch-Ostafrika aufgeteilt, die jeweils einem italienischen Gouverneur unterstanden, der wiederum dem italienischen Vizekönig unterstand, der wiederum Kaiser Viktor Emanuel vertrat. Durch Wiederaufbaubemühungen nach dem Krieg förderte das Regime die Kolonisierung durch den Aufbau von Landwirtschaft und Kleinindustrie. Lokale bewaffnete irreguläre Banden wurden zudem vom Königlichen Korps der Kolonialtruppen eingesetzt, um Aufstände der einheimischen Äthiopier zu bekämpfen."
BP_italy.1.a:0 "Erstellen"
BP_italy.1.b:0 "Nicht jetzt"

BP_italy.2.t:0 "Deutschland unterstützt unsere Forderungen"
BP_italy.2.d:0 "Deutschland hat erkannt, wie klug es ist, unsere Forderungen nach Vichy-Gebiet zu unterstützen. Vichy hat uns Gabès und Tunesien überlassen."
BP_italy.2.a:0 "Rache für Italien"

BP_italy.3.t:0 "Deutschland vereitelt unsere Forderungen"
BP_italy.3.d:0 "Deutschland hat es für angebracht gehalten, unsere bescheidenen, fairen und vernünftigen Forderungen nach Vichy-Gebiet zu vereiteln. Sollen wir [From.GetFactionName] verlassen?"
BP_italy.3.a:0 "Inakzeptabel. Alleine können wir es besser machen"
BP_italy.3.b:0 "Wir werden uns ihren Respekt verdienen"

BP_italy.4.t:0 "Bau der Via Balbia"
BP_italy.4.d:0 "Von 1934 bis 1939 war Libyen ein integraler Bestandteil des Plans des Königreichs Italien zur Bekämpfung des starken Bevölkerungswachstums, der Armut und der Arbeitslosigkeit im Süden. Bereits 1911 beschloss die italienische Regierung, die ehemalige römische Provinz von den Osmanen zu „befreien“, was zum italienisch-türkischen Krieg und zur Übernahme der osmanischen Kolonien Cyrenaika, Tripolitanien und Fezzan führte. 1934 wurden sie in Italienisch-Libyen eingegliedert, was Zugeständnisse von Britisch-Sudan und Gebietsänderungen mit Ägypten einschloss.\n \nMit der Ernennung des italienischen Gouverneurs Italo Balbo erlebte Italienisch-Libyen eine Blütezeit. Zum Zeitpunkt der Volkszählung von 1939 lebten in Libyen 108.419 Italiener (12,37 Prozent der Gesamtbevölkerung), und in weniger als dreißig Jahren (1911–1940) errichteten die Italiener riesige öffentliche Bauwerke (Straßen, Gebäude, Häfen, Eisenbahnen und erschlossen weite landwirtschaftliche Flächen).\n \nIm März 1937 stattete Mussolini Libyen einen Staatsbesuch ab, bei dem er eine neue Militärstraße (Via Balbia) eröffnete, die durch die Kolonie führte. An der Grenze zwischen Cyrenaika und Tripolitanien wurde ein großes Bauwerk namens Fileni-Bogen errichtet, das die Fertigstellung der Straße markiert.\n \nWährend des Zweiten Weltkriegs war die Straße von strategischer Bedeutung, da sie die wichtigste Versorgungslinie für die Kriegsparteien darstellte.\n \nAls Balbo 1940 bei einem Flugzeugabsturz starb, benannte die italienische Regierung die 1822 Kilometer lange Straße nach ihm."
BP_italy.4.a:0 "Großartig"

BP_italy.5.t:0 "Unabhängiger Staat Kroatien"
BP_italy.5.d:0 "Der Unabhängige Staat Kroatien (ISK), der den größten Teil des heutigen Kroatiens und Bosnien und Herzegowinas einnahm, war von deutschen und italienischen Truppen besetzt. Am 17. April traf der Poglavnik (Chef oder Anführer) Ante Pavelic aus Italien in Zagreb ein. Nominell wurde der Staat seit dem 18. Mai unter dem Thronnamen Tomislav II. vom Herzog von Aosta, Aimone Roberto Margherita Maria Giuseppe di Torino, Prinz des italienischen Königshauses, angeführt. Die Inthronisierung des neu geschaffenen Staates durch einen Vertreter der italienischen Dynastie sollte das italienische Protektorat über ihn einführen. Die Rolle von Tomislav II. in dem neuen Staat war rein nominell, da die gesamte tatsächliche Macht in den Händen der kroatischen faschistischen Ustascha-Bewegung und ihres Anführers Ante Pavelic lag. Der Monarch besuchte nie das Gebiet der ISK. Am 15. Juni 1941 trat der ISK dem Berliner Pakt bei und am 26. Juni dem Antikominternpakt. Am 14. Dezember erklärte er Großbritannien und den USA den Krieg. Aufgrund der aktiven Guerillabewegung Jugoslawiens kontrollierte der ISK während seiner gesamten Existenz nicht einen einzigen Tag lang das gesamte erklärte Gebiet.\n \nEs scheint, dass die Deutschen kein Interesse an Kroatien haben, die Kontrolle liegt vollständig in unseren Händen."
BP_italy.5.a:0 "Großartig!"
BP_italy.5.b:0 "Gut für uns, aber lasst uns auch Dalmatien annektieren."

### France

BP_france.1.t:0 "Deutschland unterstützt die Forderungen Italiens"
BP_france.1.d:0 "Italien erhält Gabez und Tunesien. Die Gouverneure der Kolonien sind besorgt über diese Entscheidung Deutschlands und fragen sich, wer als nächstes dran sein wird. Der Gouverneur von Westafrika beschloss, nicht zu warten und schloss sich den Freien Franzosen an."
BP_france.1.a:0 "Die Deutschen sind kurzsichtige Narren"
 
BP_france.2.t:0 "Verrat an Westafrika"
BP_france.2.d:0 "Nach der deutschen Entscheidung, Vichy-Gebiete an Italien zu überlassen, hat sich die westafrikanische Regierung entschieden, sich unserer Seite anzuschließen."
BP_france.2.a:0 "Frankreich ist der Erlösung einen Schritt näher gekommen"

