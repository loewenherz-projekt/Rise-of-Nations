BP_germany.400.t:0 "Verhandlungen mit der Türkei"
BP_germany.400.d:0 "Mit unserem Vormarsch nach Osten im Zuge der Operation Barbarossa müssen wir die Frage des diplomatischen Status der Türkei klären. Der Beitritt des Nachfolgers des Osmanischen Reiches zur Achse wird die Südfront im Kaukasus stärken, die UdSSR wird das Abkommen von Montreux nicht länger nutzen können und ihre Rote Flotte wird im Schwarzen Meer festsitzen. Natürlich wird die Türkei einige Gebietsgewinne einfordern, und je mehr wir anbieten, desto wahrscheinlicher ist es, dass sie unser Angebot annimmt. Was bieten wir ihnen also?\n \nBitte beachten Sie: Wenn die Türkei Ihr Angebot ablehnt oder Sie sich entscheiden, die Türken nicht in den Krieg einzuladen, erhalten Sie nach dem Sieg über die UdSSR eine weitere Chance dazu. Wenn Sie die Sowjets ohne die Hilfe der Türkei besiegen, ergibt sich eine neue Lösung, die Ihnen die Durchführung der Invasion ermöglicht und über das Schicksal der Türkei entscheidet."
BP_germany.400.a:0 "Armenien vorschlagen"
BP_germany.400.b:0 "Armenien und Georgien vorschlagen"	
BP_germany.400.c:0 "Versprechen wir ihnen den ganzen Kaukasus"
BP_germany.400.e:0 "Keine Notwendigkeit"

BP_germany.401.t:0 "Verhandlungen mit Deutschland"
BP_germany.401.d_Tur_Armenia:0 "Vor dem Hintergrund des wachsenden Erfolgs des Unternehmens Barbarossa übt Deutschland zunehmend diplomatischen Druck auf unser Land aus. Das Motiv des Dritten Reichs ist einfach: Der Beitritt unseres Landes zur Achse würde die Lage der UdSSR im Kaukasus verkomplizieren und den Deutschen den Weg in den Nahen Osten ebnen. Im Falle unseres Beitritts zur Achse versprach der deutsche Botschafter, Armenien unter unsere Kontrolle zu stellen. Was sagen wir also dazu?"
BP_germany.401.d_Tur_Armenia_Georgia:0 "Vor dem Hintergrund des wachsenden Erfolgs des Unternehmens Barbarossa übt Deutschland zunehmend diplomatischen Druck auf unser Land aus. Das Motiv des Dritten Reichs ist einfach: Der Beitritt unseres Landes zur Achse würde die Lage der UdSSR im Kaukasus verkomplizieren und den Deutschen den Weg in den Nahen Osten ebnen. Im Falle unseres Beitritts zur Achse versprach der deutsche Botschafter, Armenien und Georgien unter unsere Kontrolle zu stellen. Was sagen wir also?" 
BP_germany.401.d_Tur_Kaukasus:0 "Vor dem Hintergrund des wachsenden Erfolgs des Unternehmens Barbarossa übt Deutschland zunehmend diplomatischen Druck auf unser Land aus. Das Motiv des Dritten Reichs ist einfach: Der Beitritt unseres Landes zur Achse würde die Lage der UdSSR im Kaukasus verkomplizieren und den Deutschen den Weg in den Nahen Osten ebnen. Im Falle unseres Beitritts zur Achse versprach der deutsche Botschafter, Armenien, Georgien und Aserbaidschan unter unsere Kontrolle zu stellen. Was sagen wir also dazu?"
BP_germany.401.a:0 "Unsere Zeit ist gekommen!"
BP_germany.401.b:0 "Wir müssen unsere Neutralität wahren"
BP_germany.401.c:0 "Unsere Zeit ist gekommen!"
BP_germany.401.e:0 "Wir müssen unsere Neutralität wahren"
BP_germany.401.f:0 "Unsere Zeit ist gekommen!"
BP_germany.401.j:0 "Wir müssen unsere Neutralität wahren"

BP_germany.402.t:0 "Die Antwort der Türkei"
BP_germany.402.d_Tur_agree:0 "Die türkische Regierung nahm unseren Vorschlag begeistert an und erklärte ihre Bereitschaft, sich der Achse anzuschließen"
BP_germany.402.d_Tur_disagree:0 "Die Türken lehnten unseren Vorschlag ab und erklärten, sie hätten nicht die Absicht, in diesen Krieg einzutreten."
BP_germany.402.a:0 "Tolle Neuigkeiten!"
BP_germany.402.b:0 "Das ist schade..."

BP_germany.403.t:0 "Operation Gertrude"
BP_germany.403.d:0 "Unternehmen Barbarossa hat den erwarteten Zeitplan nicht eingehalten, und die Sowjetunion leistet unserem Vormarsch weiterhin Widerstand. Unsere Ölversorgung ist kritisch, und es ist Zeit für eine neue Strategie, um dieser Herausforderung zu begegnen. Eine erfolgreiche Invasion und Besetzung der Türkei würde uns eine weitere Front eröffnen, um von Süden her in den Kaukasus einzudringen und später die Briten im Nahen Osten unter Druck zu setzen. Die Kosten dieser Invasion sollten jedoch sorgfältig bedacht werden, bevor wir uns für diese Vorgehensweise entscheiden.\n \nObwohl „Unternehmen Gertrude“ in der Realität nie stattfand, wurde diese hypothetische Strategie angeblich im Sommer 1942 aufgrund der Herausforderungen von „Fall Blau“ und der alliierten Landungen auf Sizilien von ihrer ursprünglichen Konzeption verworfen. Auch das Konzept des „Panturkismus“ zwischen der Türkei und Aserbaidschan wurde von der deutschen Führung zu dieser Zeit als Bedrohung angesehen, und es lag im Interesse des Reichs, nationalistische Bewegungen im Nahen Osten in ihren Einflussbereich zu bringen, um die vollständige Verwirklichung ihrer Vision einer Neuen Ordnung zu gewährleisten."
BP_gertrude_not_only_way:0 "§RWarrtung! Dies ist nicht die einzige Möglichkeit eines Krieges mit der Türkei. Nach dem Sieg über die Sowjetunion können Sie entscheiden, was mit der Türkei geschehen soll.§!\n \n"
BP_germany.403.a:0 "Genehmigter Plan"
BP_germany.403.b:0 "Ablehnen"

BP_germany.404.t:0 "Die türkische Frage"
BP_germany.404.d:0 "Die Republik Türkei – ein Land, das nach dem Ersten Weltkrieg aus der Asche des Osmanischen Reiches auferstand und im Krieg vor wenigen Jahrzehnten seine Unabhängigkeit verteidigte – balanciert heute auf Messers Schneide zwischen den Achsenmächten und den Alliierten. Die zerstörte Wirtschaft und die neue Bewegung des pantürkischen Nationalismus brachten das Land in eine schwierige Lage, in deren Folge die türkische Regierung in dem neuen Konflikt, der in Europa aufzuflammen begann, ihre Neutralität erklärte.\n \nAls deutsche Panzer während der Einfälle in Jugoslawien und Griechenland 80 Kilometer von Istanbul entfernt waren, zerstörte die türkische Führung in Erwartung weiterer deutscher Aggressionen in der Region wichtige Brücken. Der Nichtangriffspakt, der 1941 nur vier Tage vor der Invasion der Sowjetunion unterzeichnet wurde, entspannte die Spannungen zwischen den beteiligten Fraktionen, da die Achsenmächte, die Alliierten und die Sowjetunion die Türkei und die Lage in der Region genau beobachteten.\n \nNach dem Erfolg der Operation „Barbarossa“ kann die Türkei keine neutrale Position mehr einnehmen. Das Reich sollte die volle Kontrolle über das Schwarze Meer haben, um Rohöl aus den Ölfeldern des Kaukasus zu transportieren und den Plan Ost auf der Krim umzusetzen. Der Nahe Osten muss in unseren Einflussbereich gebracht werden, und die Türkei ist auf dem Weg dorthin. Obwohl Hitler den Türken als ehemaligen Verbündeten im Ersten Weltkrieg nominell Respekt entgegenbrachte, war ihm klar, dass man dem Staatsoberhaupt der Republik Türkei, Ismet Inon, nicht trauen konnte. Seine Weigerung, in der Vergangenheit aktiver mit den Achsenmächten zusammenzuarbeiten, sowie seine versöhnliche Haltung gegenüber Flüchtlingen aus unseren besetzten Gebieten können nicht länger toleriert werden. Unsere Streitkräfte sind bereit, eine Neuordnung im Nahen Osten zu schaffen."
BP_germany.404.a:0 "Fordern Sie sofort die volle Zusammenarbeit"
BP_germany.404.b:0 "Ismet ist nicht vertrauenswürdig. Besetzt das Land!"
BP_germany.404.c:0 "Das ist unnötig"

BP_germany.405.t:0 "Teilung der Türkei"
BP_germany.405.d:0 "Während des Zweiten Weltkriegs befand sich die Türkei in einem prekären Gleichgewicht zwischen den drei Hauptkonfliktparteien: Die Deutschen erwogen sowohl Kooperation als auch Besatzung, und die italienischen Ambitionen im Mittelmeerraum näherten sich gefährlich den türkischen Grenzen. Die Briten waren sich bewusst, dass die Türkei an der Grenze zwischen Europa und dem Nahen Osten liegt und als Angriffsziel für Angriffe auf Syrien, den Irak und Indien genutzt werden kann. Auch die Sowjetunion, mit ihrer historischen russischen Feindseligkeit gegenüber dem Osmanischen Reich, ließ keines dieser Probleme unbeachtet und wusste, dass ihre Besitzungen im Kaukasus bedroht sein könnten, wenn die Türkei auf der Seite der Deutschen stand. Während des Krieges geriet die Türkei unter unsere Besatzung. Wir müssen nun über das Schicksal der Region entscheiden. Anatolien ist eine komplexe Region voller unterschiedlicher nationaler Gruppen mit unterschiedlichen Interessen, von denen viele jahrhundertelang von den Türken besetzt waren. Wir können diese Gruppen mit unseren eigenen Interessen in Anatolien, den Ambitionen unserer Verbündeten und natürlich der Zukunft der türkischen Nation selbst in Einklang bringen. Es ist an der Zeit, die Karte der Neuen Ordnung weiterzuzeichnen."
BP_germany.405.a:0 "Lass uns anfangen. Gehe jeden Bereich einzeln durch"
BP_germany.405.b:0 "Es wird keine Teilung geben. Schaffen Sie den türkischen Staat"
BP_germany.405.c:0 "Erweitern Sie den Kaukasus und schaffen Sie den türkischen Staat"

BP_germany.406.t:0 "Putsch im Irak"
BP_germany.406.d:0 "Das Königreich Irak war dank des Anglo-Irakischen Vertrags von 1930 von Großbritannien abhängig. Patriotischen Schichten der Bevölkerung missfiel diese Situation, und der Irak war den Briten gegenüber nicht besonders loyal. Ein Teil der antibritischen irakischen Armee, die sich in den 1930er Jahren um den deutschen Botschafter Fritz Grobba gruppierte, wurde als „Kreis der Sieben“ und ihre Anführer als „Goldene Vier“ bekannt. Nach der Niederschlagung des antibritischen Aufstands in Palästina fanden viele seiner Teilnehmer Zuflucht im Irak. Später zog auch der Rebellenführer, der ehemalige Mufti von Jerusalem, Amin al-Husseini, dorthin. \n \nInfolge dieser zunehmenden antibritischen Stimmung kam es zu einem Putsch im Irak. Am 1. April 1941 wurde das Regime von Regent Abd al-Ilah gestürzt und Rashid Ali al-Gaylani zum Premierminister ernannt. Der Putsch wurde von vier irakischen Generälen angeführt, die der nationalistischen Gruppe „Goldenes Quadrat“ angehörten. Da der Irak 1932 nur formal unabhängig wurde, war es das Ziel der Gruppe, den Krieg für die vollständige Unabhängigkeit und die Gründung eines panarabischen Staates zu nutzen. Dies führte zur Zusammenarbeit mit dem deutschen Geheimdienst und zur Annahme militärischer Unterstützung durch Deutschland. Der Regierungswechsel führte zur britischen Invasion und anschließenden Besetzung des Irak, die bis 1947 andauerte."
BP_germany.406.a:0 "Unterstützen Sie sie"
BP_germany.406.b:0 "Wir sind nicht interessiert"

### Turkey

BP_turkey.1.t:0 "Deutsch-Türkischer Vertrag"
BP_turkey.1.d:0 "Deutsch-Türkischer Freundschaftsvertrag von 1941 – unterzeichnet in Ankara vom deutschen Botschafter von Papen und dem türkischen Außenminister Saracoğlu. Eine Annäherung zwischen der Türkei und Deutschland war seit Anfang 1941 während des Vormarsches deutscher Truppen auf dem Balkan zu beobachten. Die bulgarisch-türkische Erklärung von 1941 erleichterte Bulgariens Beitritt zu den Achsenmächten. Nach dem Einmarsch deutscher Truppen in Bulgarien sandte Hitler dem Präsidenten der Republik Türkei, Inönü, einen persönlichen Brief, in dem er sich für die Haltung der Türkei bedankte. Später griffen Deutschland Jugoslawien und Griechenland an, woraufhin bulgarische Truppen in Mazedonien einmarschierten. Die Türkei kam Jugoslawien und Griechenland nicht zu Hilfe, obwohl sie dies gemäß ihrem Bündnis mit Großbritannien (Anglo-Französisch-Türkischer Vertrag von 1939 über gegenseitige Hilfe), dem Vertrag mit Griechenland von 1933 (Griechisch-Türkische Union) und dem Balkan-Entente-Pakt tun sollte. Die Haltung der Türkei erntete in Hitlers Reichstagsrede offenes Lob. Gleichzeitig kam es zu einem weiteren Nachrichtenaustausch zwischen Hitler und Inönü, und in Ankara begannen die deutsch-türkischen Verhandlungen, deren klare Aufgabe die Wiederherstellung der Eisenbahnverbindungen zwischen der Türkei und den Ländern des Hitlerblocks war, deren Ziel in Wirklichkeit der Abschluss eines politischen Vertrags war. England griff nicht in die deutsch-türkische Annäherung ein. Die britische Diplomatie machte den Türken klar, dass sie auch gegen den Abschluss eines Vertrags zwischen der Türkei und Deutschland keine Einwände hätte, solange die Türkei ihre Bündnisbeziehungen zu Großbritannien aufrechterhielt und weiterhin den Durchmarsch deutscher Truppen nach Syrien und in den Irak verhinderte. In der Folge wurde der deutsch-türkische Vertrag von 1941 unterzeichnet. In der Einleitung stellten Deutschland und die Türkei fest, dass „dieser Vertrag die bestehenden Verpflichtungen beider Länder respektieren wird“. Der deutsch-türkische Vertrag erleichterte Deutschlands Angriff auf die UdSSR und ermöglichte es dem Land, die formelle Neutralität der Türkei zum Nachteil der Interessen der UdSSR und anderer freiheitsliebender Völker umfassend auszunutzen. Die Türkei lieferte Deutschland wertvolle Rohstoffe, insbesondere Chrom, verstieß zugunsten Deutschlands gegen die Bestimmungen der in Montreux unterzeichneten Meerengenkonvention und erlaubte auf ihrem Territorium aktive faschistische Propaganda und Spionage. Hitlers Willen organisierten die türkischen Behörden zusammen mit der Gestapo in Ankara Prozesse gegen sowjetfeindliche Gegner. In der Türkei wurden panturkistische Aktivitäten gegen die UdSSR gefördert. Wie Papin seiner Regierung berichtete, versicherte ihm Präsident Inönü Anfang 1942, dass „die Türkei ein großes Interesse an der Vernichtung des russischen Kolosses habe“ und dass „die neutrale Position der Türkei für die Achsenmächte bereits viel profitabler sei als für England“. Im August 1942 erklärte Saracoğlu unmittelbar nach seinem Amtsantritt als Ministerpräsident gegenüber Papin, dass er „als Türke die Zerstörung Russlands herbeisehne“, dass „jeder Türke, selbst wenn er für den britischen Yalchin schreibe, nicht anders darüber nachdenken könne als er“ und dass „das russische Problem von Deutschland nur gelöst werden könne, wenn mindestens die Hälfte aller in Russland lebenden Russen getötet werde“."
BP_turkey.1.a:0 "Großartig!"

BP_turkey.2.t:0 "Deutsch-Türkischer Vertrag"
BP_turkey.2.d:0 "Deutsch-Türkischer Freundschaftsvertrag von 1941 – unterzeichnet in Ankara vom deutschen Botschafter von Papen und dem türkischen Außenminister Saracoğlu. Eine Annäherung zwischen der Türkei und Deutschland war seit Anfang 1941 während des Vormarsches deutscher Truppen auf dem Balkan zu beobachten. Die bulgarisch-türkische Erklärung von 1941 erleichterte Bulgariens Beitritt zu den Achsenmächten. Nach dem Einmarsch deutscher Truppen in Bulgarien sandte Hitler dem Präsidenten der Republik Türkei, Inönü, einen persönlichen Brief, in dem er sich für die Haltung der Türkei bedankte. Später griffen Deutschland Jugoslawien und Griechenland an, woraufhin bulgarische Truppen in Mazedonien einmarschierten. Die Türkei kam Jugoslawien und Griechenland nicht zu Hilfe, obwohl sie dies gemäß ihrem Bündnis mit Großbritannien (Anglo-Französisch-Türkischer Vertrag von 1939 über gegenseitige Hilfe), dem Vertrag mit Griechenland von 1933 (Griechisch-Türkische Union) und dem Balkan-Entente-Pakt tun sollte. Die Haltung der Türkei erntete in Hitlers Reichstagsrede offenes Lob. Gleichzeitig kam es zu einem weiteren Nachrichtenaustausch zwischen Hitler und Inönü, und in Ankara begannen die deutsch-türkischen Verhandlungen, deren klare Aufgabe die Wiederherstellung der Eisenbahnverbindungen zwischen der Türkei und den Ländern des Hitlerblocks war, deren Ziel in Wirklichkeit der Abschluss eines politischen Vertrags war. England griff nicht in die deutsch-türkische Annäherung ein. Die britische Diplomatie machte den Türken klar, dass sie auch gegen den Abschluss eines Vertrags zwischen der Türkei und Deutschland keine Einwände hätte, solange die Türkei ihre Bündnisbeziehungen zu Großbritannien aufrechterhielt und weiterhin den Durchmarsch deutscher Truppen nach Syrien und in den Irak verhinderte. In der Folge wurde der deutsch-türkische Vertrag von 1941 unterzeichnet. In der Einleitung stellten Deutschland und die Türkei fest, dass „dieser Vertrag die bestehenden Verpflichtung