USA_VP.1.t:0 "Theodore Roosevelt vs. John Long: Wer sollte Vizepräsident werden?"
USA_VP.1.d:0 "Bei der bevorstehenden Wahl konkurriert Theodore Roosevelt gegen John Long um die Vizepräsidentschaft. Beide Kandidaten bringen unterschiedliche Qualitäten mit: Roosevelt ist für seine progressive Politik und seine Erfahrung als ehemaliger Präsident bekannt, während Long für seine legislativen Erfolge und sein Engagement für Wirtschaftsreformen bekannt ist. Bei ihrer Entscheidung wägen die Wähler Roosevelts Führungsstärke und seine breite öffentliche Anziehungskraft gegen Longs legislative Expertise und sein Engagement für Reformen ab. Wer ist Ihrer Meinung nach am besten für die Vizepräsidentschaft geeignet?"
USA_VP.1.a:0 "Wählen Sie Theodore Roosevelt"
USA_VP.1.b:0 "Wählen Sie John Long"
focus_republican_majority_house_tt:0 "§RDieser Schwerpunkt erfordert eine republikanische Mehrheit im Repräsentantenhaus\n\n§WErforderliche Sitze: §Y[218]§!"
focus_democratic_majority_house_senate_tt:0 "§BDieser Schwerpunkt erfordert eine demokratische Mehrheit im Repräsentantenhaus und im Senat\n\n§WErforderliche Sitze im Repräsentantenhaus: §Y[218]§!\n§WErforderliche Sitze im Senat: §Y[51]§!"
focus_minority_coalition_tt:0 "§GDieser Schwerpunkt erfordert eine Koalition mit Minderheitsparteien im Repräsentantenhaus und im Senat.\n\n§WErforderliche Sitze im Repräsentantenhaus: §Y[200]§!\n§WErforderliche Sitze im Senat: §Y[45]§!"
focus_supermajority_tt:0 "§RDieser Schwerpunkt erfordert eine qualifizierte Mehrheit im Repräsentantenhaus und im Senat\n\n§WErforderliche Sitze im Repräsentantenhaus: §Y[290]§!\n§WErforderliche Sitze im Senat: §Y[67]§!"
focus_bipartisan_support_tt:0 "§ODieser Schwerpunkt erfordert überparteiliche Unterstützung im Repräsentantenhaus und im Senat\n\n§WErforderliche Sitze im Repräsentantenhaus: §Y[210]§!\n§WErforderliche Sitze im Senat: §Y[55]§!"
focus_regional_support_tt:0 "§GDieser Schwerpunkt erfordert die Unterstützung der Mehrheit bestimmter Regionen\n\n§WErforderliche Sitze im Repräsentantenhaus im Nordosten: §Y[30]§!\n§WErforderliche Sitze im Repräsentantenhaus im Mittleren Westen: §Y[40]§!\n§WErforderliche Sitze im Repräsentantenhaus im Süden: §Y[60]§!\n§WErforderliche Sitze im Repräsentantenhaus im Westen: §Y[50]§!\n§WErforderliche Senatssitze aus Zielstaaten: §Y[20]§!"
focus_balanced_support_tt:0 "§BDieser Schwerpunkt erfordert eine ausgewogene Unterstützung in den wichtigsten Swing States.\n\n§WErforderliche Sitze im Repräsentantenhaus aus Swing States: §Y[80]§!\n§WErforderliche Sitze im Senat aus Swing States: §Y[20]§!"
focus_third_party_influence_tt:0 "§WDieser Schwerpunkt erfordert die Sicherung der Unterstützung von Drittparteien\n\n§WErforderliche Sitze von Drittparteien im Repräsentantenhaus: §Y[25]§!\n§WErforderliche Sitze von Drittparteien im Senat: §Y[10]§!"
