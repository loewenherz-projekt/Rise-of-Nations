usa_senate_projection:0 "Mit Blick auf die bevorstehenden Senatswahlen zeigen aktuelle Prognosen das Kräfteverhältnis im Senat. Die Prognosen zeigen §B[?dsenators_support] Sitze für die Demokratische Partei§! und §R[?rsenators_support] Sitze für die Republikanische Partei§!. Anders als im Repräsentantenhaus gibt es diesmal keine prognostizierten Wechselsitze im Senatsrennen. Eine Mehrheit von 51 Sitzen ist entscheidend für die Kontrolle des Senats und die Einflussnahme auf zukünftige Gesetzgebungsvorhaben."
USA_president_mckinley:0 "Präsident McKinley"
USA_president_mckinley_desc:0 "William McKinley, der 25. Präsident der Vereinigten Staaten, führt die Nation mit einer Vision von Wohlstand und Fortschritt. Seine Regierung konzentriert sich auf Wirtschaftswachstum, territoriale Expansion und die Stärkung der globalen Präsenz Amerikas."
