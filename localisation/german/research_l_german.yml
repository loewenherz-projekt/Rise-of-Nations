 battlefield_destruction:0 "Zerstörung auf dem Schlachtfeld"
 battlefield_destruction_desc:0 "Die Luftwaffe kann zwar weit entfernte feindliche Länder angreifen, sie kann aber auch bei der direkten Unterstützung der Armee in Schlachten von großem Nutzen sein."
 battlefield_support:0 "Schlachtfeldunterstützung"
 battlefield_support_desc:0 "Für taktische Bomber ist es schwierig, Ziele in der Nähe der Kampfgebiete unserer Bodentruppen anzugreifen, da Horizontalbombardements weniger präzise sind als Sturzbombardements. Durch mehr Training und Interaktion mit bodengestützten Beobachtern können diese Probleme jedoch überwunden werden."
