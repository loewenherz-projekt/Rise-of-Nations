 advanced_infantry_weapons_d_desc:0 "Die Waffen, Gott sei Dank, die Waffen …"
 advanced_light_battery:0 "Erweiterte Lichtbatterie"
 advanced_light_battery_desc:1 "Eine fortschrittliche Doppelhalterung bringt unter Panzerschutz deutlich mehr Feuerkraft zum Einsatz.\n\nDie Montage dieses Moduls erhöht den §YAngriff mit leichtem Geschütz§!, was bei der Bekämpfung feindlicher §YAbschirmschiffe§! hilfreich ist."
 advanced_light_battery_x2:0 "Erweiterte Lichtbatterie II"
 advanced_light_battery_x2_desc:0 "Ein Paar kleiner Gewehre in einer motorisierten, gepanzerten Lafette."
