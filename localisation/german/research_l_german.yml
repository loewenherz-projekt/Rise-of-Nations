 cw_sp_artillery_upgrade1:0 "SP-Haubitzen-Upgrade I"
 cw_sp_artillery_upgrade1_desc:0 "Mit der Modernisierung alter Waffen kommen wir nur bis zu einem gewissen Punkt voran. Wir brauchen neue Haubitzenkonstruktionen, die die Vorteile neuer hydraulischer Rückstoßvorrichtungen und längerer Läufe nutzen."
 cw_sp_artillery_upgrade2:0 "SP-Haubitze-Upgrade II"
 cw_sp_artillery_upgrade2_desc:0 "Um schwerere Geschütze auf leichteren Lafetten zu ermöglichen, können in Haubitzenkonstruktionen Mündungsbremsen integriert werden."
 cw_sp_artillery_upgrade3:0 "SP-Haubitze-Upgrade III"
 cw_sp_artillery_upgrade3_desc:0 "Artilleriegeschütze mit niedrigeren Silhouetten sind für den Feind schwieriger anzuvisieren."
 damage_control_1:0 "Feuerlöschübungen"
 damage_control_1_desc:0 "Jedes Mitglied einer Schiffsbesatzung, vom Kapitän bis zum einfachen Matrosen, muss in der Lage sein, bei der Eindämmung und Bekämpfung von Bränden an Bord des Schiffes mitzuhelfen."
 damage_control_2:0 "Separate Feuerlöschleitungen"
 damage_control_2_desc:0 "Durch die Trennung der Hauptwasserleitungen rund um das Schiff wird die Wahrscheinlichkeit, dass das Schiff bei einem Treffer völlig feuerunfähig wird, deutlich verringert."
 damage_control_3:0 "Dieselbetriebene Notpumpen"
 damage_control_3_desc:0 "Da schwere Pumpen normalerweise von den Hauptmotoren angetrieben werden, kann ein einziger, relativ leichter Schlag im Maschinenraum dazu führen, dass das Schiff nicht mehr über Wasser bleibt."
 day_bombing:0 "Bombenangriffe am Tag"
 day_bombing_desc:0 "Konzentrierte Anstrengungen am Tag sind aufgrund der großen Sichtbarkeit verheerend. Die Machtdemonstration ist ein willkommener Nebeneffekt.\n\n"
 dd_tech:0 "Zerstörermodelle"
 dead_reckoning_bombing:0 "Dead Reckoning Bombing"
 dead_reckoning_bombing_desc:0 "Durch die Messung von Geschwindigkeit, Richtung und Drift von vorherigen Positionen können wir präzisere Bombenabwürfe auch während der Nacht berechnen."
 cavity_magnatron:0 "Hohlraum-Magnatron"
 cavity_magnatron_desc:0 "Viele Einheiten verlassen sich für ihre Effizienz auf den Überraschungseffekt. Die Entwicklung des Dezimalradars ermöglicht es uns, ihnen diesen Vorteil zu nehmen."
