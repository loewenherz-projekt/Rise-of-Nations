 infantry_tech:0 "Infanterietechnologie"
 infantry_weapons2:0 "Verbesserte Infanterieausrüstung I"
 infantry_weapons2_desc:0 "Persönliche und Mannschaftswaffen für die Infanterie sowie verschiedene andere Ausrüstungsgegenstände, die ein Soldat benötigt. Verbesserte Waffenmodelle und spezialisiertere Ausrüstung."
 infantry_weapons:0 "Infanteriewaffen"
 infiltration_assault:0 "Infiltrationsangriff"
 infiltration_assault_desc:0 "Zu Beginn eines Angriffs muss die Infanterie Schwachstellen in der feindlichen Linie anvisieren, um die besser verteidigten Abschnitte zu umgehen und zu isolieren, die dann von den übrigen angreifenden Streitkräften vernichtet werden können."
 infiltration_bombing:0 "Infiltrationsbombardements"
 infiltration_bombing_desc:0 "Sich feindlichen Formationen anzuschließen oder ihnen bis zu ihrer Basis zu folgen, mag wie Wahnsinn erscheinen. Mit genügend Übung ist es jedoch durchaus möglich."
 infiltration_in_depth:0 "Infiltration in der Tiefe"
 infiltration_in_depth_desc:0 "Unsere Streitkräfte sind nun darauf trainiert, feindliche Stützpunkte in einer viel größeren Tiefe zu umgehen und zu isolieren. Im Idealfall sollten unsere Angriffstruppen nicht anhalten, bis sie die rückwärtigen Gebiete des Feindes erreichen und ihre Streitkräfte vollständig abgeschnitten sind."
 infrastructure_destruction:0 "Zerstörung der Infrastruktur"
 infrastructure_destruction_desc:0 "Indem wir unsere Piloten in den besten Methoden zum Angriff auf Infrastruktur wie Eisenbahnlinien und Brücken schulen, können wir taktische Bombenangriffe effektiver durchführen."
 integrated_ballistics_computer:0 "Integrierter Ballistikcomputer"
 integrated_ballistics_computer_desc:0 "Platzhalter"
 integrated_convoy_defence:0 "Integrierte Konvoi-Verteidigung"
 integrated_convoy_defence_bs:0 "Integrierte Konvoi-Verteidigung"
 integrated_convoy_defence_bs_desc:0 "Eine bessere Koordination von Marine und Luftwaffe ermöglicht es uns, Feinde aus meilenweiter Entfernung anzugreifen, bevor sie sich unseren Handelskonvois nähern. Dies wird die Effektivität von Konvoifahrten drastisch erhöhen."
 integrated_convoy_defence_desc:0 "Eine bessere Koordination von Marine und Luftwaffe ermöglicht es uns, Feinde aus meilenweiter Entfernung anzugreifen, bevor sie sich unseren Handelskonvois nähern. Dies wird die Effektivität von Konvoifahrten drastisch erhöhen."
 intergrated_support:0 "Integrierter Support"
 intergrated_support_desc:0 "Durch die enge Integration von Unterstützungskräften und Kampftruppen entstehen Divisionen, die im Angriff stärker sind.\n\n"
 internet:0 "Das Internet"
 internet_desc:0 "Einige unserer besten Highschools vernetzen ihre Computersysteme bereits mit komplexen Fernkommunikationssystemen. Die Öffnung dieser Technologie für die gesamte nationale Elite wird unser Potenzial erheblich steigern."
 interwar_artillery:0 "Zwischenkriegsartillerie"
 interwar_artillery_desc:0 "Die bei der Entwicklung verschiedener Artillerietypen gewonnenen Erkenntnisse können auf die Konstruktion anderer Waffen übertragen werden."
