 WW1_tech_military_police2:0 "Militärpolizei IV" 
 WW1_tech_military_police2_desc:0 "Die Militärpolizei ist eine Disziplinareinheit, die aus Soldaten besteht und in der Armee Polizei- und verwandte Funktionen ausübt. Ihre Hauptaufgabe besteht in der Aufrechterhaltung von Recht und Ordnung, der Verhütung und Aufklärung von Straftaten innerhalb der Armee sowie dem Betrieb von Haftanstalten. Bei Bedarf greift sie auch als Infanterie in den Kampf ein."
 WW1_tech_military_police3:0 "Militärpolizei V"
