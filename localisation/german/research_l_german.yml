 antiair1:0 "Luftabwehr-Upgrade"
 antiair1_desc:0 "Dank schnellerer Nachlademechanismen können Flugabwehrgeschütze mit großen Geschossen immer noch die erforderliche Feuerrate aufrechterhalten."
 antiair2:0 "Flugabwehr II"
 antiair2_desc:0 "Um hochfliegende Flugzeuge gezielt anzugreifen, sind bei Flugabwehrgeschützen längere Patronen und Läufe erforderlich."
 antiair2_md:0 "Modernes Flugabwehr-Upgrade"
 antiair2_md_desc:0 "Dank schnellerer Nachlademechanismen können Flugabwehrgeschütze mit großen Geschossen immer noch die erforderliche Feuerrate aufrechterhalten."
 antiair3:0 "Verbessertes Flugabwehr-Upgrade I"
 antiair3_desc:0 "Mit der Weiterentwicklung von Radarsystemen wird die Radarlenkung von Flugabwehrkanonen immer sinnvoller. Wenn wir mit dieser Technologie Schritt halten, können wir einige der präzisesten Flugabwehrsysteme auf dem Markt herstellen."
 antiair3_md:0 "Flugabwehr II"
 antiair3_md_desc:0 "Um hochfliegende Flugzeuge gezielt anzugreifen, sind bei Flugabwehrgeschützen längere Patronen und Läufe erforderlich."
 antiair4:0 "Verbessertes Flugabwehr-Upgrade II"
 antiair4_desc:0 "Um schnell auf schnellere Flugzeuge reagieren zu können, ist die Kombination moderner Radar-, Computer- und Selbstladesysteme erforderlich."
 antiair4_md:0 "Modernes Flugabwehr-Upgrade II"
 antiair4_md_desc:0 "Mit der Weiterentwicklung von Radarsystemen wird die Radarlenkung von Flugabwehrkanonen immer sinnvoller. Wenn wir mit dieser Technologie Schritt halten, können wir einige der präzisesten Flugabwehrsysteme auf dem Markt herstellen."
 antiair5:0 "Flugabwehr V"
 antiair5_desc:0 "Boden-Luft-Raketen sind die Zukunft der Flugabwehr. Die Entwicklung einer mobilen Plattform hierfür sollte unser nächstes Ziel sein."
 antiair5_md:0 "Modernes Flugabwehr-Upgrade III"
 antiair5_md_desc:0 "Um schnell auf schnellere Flugzeuge reagieren zu können, ist die Kombination moderner Radar-, Computer- und Selbstladesysteme erforderlich."
 antiair6_md:0 "Flugabwehr V"
 antiair6_md_desc:0 "Boden-Luft-Raketen sind die Zukunft der Flugabwehr. Die Entwicklung einer mobilen Plattform hierfür sollte unser nächstes Ziel sein."
 antiair_a:0 "Verbessertes Luftabwehr-Upgrade"
 antiair_a_desc:0 "Warum braucht die Armee teure neue Waffen? Haben die Piloten, auf die wir jahrelang geschossen haben, angefangen, sich zu beschweren?"
 antiair_b:0 "Erweitertes Luftabwehr-Upgrade II"
 antiair_b_desc:0 "Zu meiner Linken hörte ich die scharfen Explosionen der Infanterieartillerie, zu meiner Rechten hörte ich die sporadischen Kanonenschüsse, die von vorne donnerten, und oben war der Himmel klar und die Sonne hell."
 antiair_d:0 "Halbmodernes Flugabwehr-Upgrade"
 antiair_d_desc:0 "Wir haben bei der Verknüpfung unserer Artilleriesysteme mit Radar große Fortschritte gemacht."
 antiair_e:0 "Halbmodernes Flugabwehr-Upgrade II"
 antiair_e_desc:0 "Weiterentwickelte Radartechnologie und -vernetzung ermöglichen maximale Effizienz."
 antitank1:0 "Panzerabwehr-Upgrade"
 antitank1_desc:0 "Die Bedeutung effektiver Panzerabwehrwaffen wurde im Ersten Weltkrieg deutlich. Um modernen Panzern entgegenwirken zu können, ist die Einführung einer neuen Generation dieser Waffen notwendig."
 antitank2:0 "Panzerabwehr II"
 antitank2_desc:0 "Die meisten Panzerabwehrkanonen sind bisher relativ leicht. Um schwerere Panzer mit schräger Panzerung bekämpfen zu können, sind Kanonen mit größerem Kaliber erforderlich."
 antitank2_md:0 "Moderne Panzerabwehr-Aufrüstung"
 antitank2_md_desc:0 "Die Bedeutung effektiver Panzerabwehrwaffen wurde im Ersten Weltkrieg deutlich. Um modernen Panzern entgegenwirken zu können, ist die Einführung einer neuen Generation dieser Waffen notwendig."
 antitank3:0 "Verbessertes Panzerabwehr-Upgrade I"
 antitank3_desc:0 "HEAT-Geschosse (High-Explosive Anti-Tank) können in der Panzerabwehrartillerie eingesetzt werden, um die begrenzte Mündungsgeschwindigkeit auszugleichen."
 antitank3_md:0 "Panzerabwehr II"
 antitank3_md_desc:0 "Die meisten Panzerabwehrkanonen sind bisher relativ leicht. Um schwerere Panzer mit schräger Panzerung bekämpfen zu können, sind Kanonen mit größerem Kaliber erforderlich."
 antitank4:0 "Verbessertes Panzerabwehr-Upgrade II"
 antitank4_desc:0 "Neue, vielseitige Panzerabwehrkanonen mit panzerbrechenden Treibspiegelgeschossen können die Panzerung fast jedes Panzers durchdringen."
 antitank4_md:0 "Modernes Panzerabwehr-Upgrade II"
 antitank4_md_desc:0 "HEAT-Geschosse (High-Explosive Anti-Tank) können in der Panzerabwehrartillerie eingesetzt werden, um die begrenzte Mündungsgeschwindigkeit auszugleichen."
 antitank5:0 "Panzerabwehr V"
 antitank5_desc:0 "Durch die Kombination verschiedener neuer Munitionstechnologien mit Waffen mit höheren Mündungsgeschwindigkeiten können wir auf alle neuen Panzerungen vorbereitet sein, die unsere Feinde entwickeln könnten."
 antitank5_md:0 "Modernes Panzerabwehr-Upgrade III"
 antitank5_md_desc:0 "Neue, vielseitige Panzerabwehrkanonen mit panzerbrechenden Treibspiegelgeschossen können die Panzerung fast jedes Panzers durchdringen."
 antitank6_md:0 "Panzerabwehr V"
 antitank6_md_desc:0 "Durch die Kombination verschiedener neuer Munitionstechnologien mit Waffen mit höheren Mündungsgeschwindigkeiten können wir auf alle neuen Panzerungen vorbereitet sein, die unsere Feinde entwickeln könnten."
 antitank_a:0 "Fortschrittliches Panzerabwehr-Upgrade"
 antitank_a_desc:0 "Wenn die Panzer Erfolg haben, ist der Sieg vorprogrammiert. Wenn sie scheitern, sind wir verloren."
 antitank_b:0 "Erweitertes Panzerabwehr-Upgrade II"
 antitank_b_desc:0 "Ihre schwersten Waffen werden Ihr Lebenswille sein. Halten Sie sie am Laufen, egal was passiert, und beten Sie, dass ihre nicht schwerer sind."
 antitank_d:0 "Halbmoderne Panzerabwehrartillerie-Verbesserung"
 antitank_d_desc:0 "Unsere Geschosse verfügen nun über eine deutlich höhere Durchschlagskraft und Schlagkraft."
 antitank_e:0 "Halbmoderne Panzerabwehrartillerie, Upgrade II"
 antitank_e_desc:0 "Die Genauigkeit und Manövrierfähigkeit jedes Schusses wird jetzt erheblich verbessert."
 armor:0 "Panzerungstechnologie"
 armored_operations:0 "Gepanzerte Operationen"
 armored_operations_desc:0 "Panzer und andere gepanzerte Fahrzeuge sind äußerst nützlich, um Infanterie auf das Schlachtfeld zu bringen und im Kampf direkte Unterstützung zu leisten."
 armored_spearhead:0 "Gepanzerte Speerspitze"
 armored_spearhead_desc:0 "Um das volle Potenzial von Panzern auszuschöpfen, dürfen diese nicht als unterstützende Infanterieeinheiten gebunden werden. Stattdessen müssen sie zu schnellen, unabhängigen Einheiten geformt werden, die Angriffe anführen können.\n\n"
 armour_folder:0 "AFV"
 armour_folder:0 "Rüstung"
 armour_folder_desc:0 "Entwicklung gepanzerter Kampffahrzeuge"
 armour_folder_desc:0 "Panzer und ihre Varianten."
 armoured_car_equipment:0 "Panzerwagen"
 armoured_car_equipment_10:0 "Nutzfahrzeug 1991"
 armoured_car_equipment_10_desc:1 "Nutzfahrzeuge sind die Fahrzeuge, die von motorisierten Infanterietruppen als Transportmittel zum Schlachtfeld eingesetzt werden. Die Modelle der früheren Generation, Jeeps und Lastwagen, sind nahezu ungepanzert und unterscheiden sich von ihren zivilen Pendants hauptsächlich durch ihre Robustheit und größere Mobilität in schwierigem Gelände. Modelle der späteren Generation sind Humvee-ähnliche Fahrzeuge mit besserer Panzerung und minensichere Fahrzeuge mit weiter verbessertem Besatzungsschutz. Wenn die Fahrzeuge überhaupt bewaffnet sind, handelt es sich meist um leichtere Waffen wie Maschinengewehre."
