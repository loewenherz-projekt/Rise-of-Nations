 marines2:0 "Marines II"
 marines2_desc:0 "Amphibische Kriegsführung erfordert ständige Innovation. Verbesserte logistische Unterstützung und mobile Häfen ermöglichen unseren Marines Landungen, die sonst möglicherweise nicht möglich gewesen wären."
 marines3:0 "Marines III"
 marines3_desc:0 "Marines können mehr sein als nur amphibische Infanterie. In Zukunft wird unser Marine Corps zu den diszipliniertesten und am besten organisierten Spezialeinheiten gehören."
 marines:0 "Marines I"
 marines_a:0 "Marines IV"
 marines_a_desc:0 "Es gibt nur zwei Arten von Menschen, die uns verstehen: Marines und der Feind. Alle anderen haben eine Meinung aus zweiter Hand."
 marines_b:0 "Marines V"
 marines_b_desc:0 "Es gibt nur zwei Arten von Menschen, die uns verstehen: Marines und der Feind. Alle anderen haben eine Meinung aus zweiter Hand."
 marines_c:0 "Marines VI"
 marines_c_desc:0 "Es gibt nur zwei Arten von Menschen, die uns verstehen: Marines und der Feind. Alle anderen haben eine Meinung aus zweiter Hand."
 marines_desc:0 "Truppen, die auf amphibische Kriegsführung spezialisiert sind, werden immer unentbehrlicher. Improvisierte Methoden und Ausrüstung gehören der Vergangenheit an, da unsere Marineinfanterie durch spezialisierte Landungsboote und entsprechende Ausbildung unterstützt wird."
 mass_assault:0 "Massenangriff"
 mass_assault_desc:0 "„Perfekte“ Waffen werden überbewertet, eine große Anzahl „gut genuger“ Waffen ist der Weg zum Sieg!\n\n"
 mass_destruction:0 "Massenvernichtung"
 mass_destruction_desc:0 "Bomber sind mit den verheerendsten Waffen in großer Menge ausgestattet. Das garantiert Ergebnisse, selbst wenn nur wenige unserer Piloten durchkommen."
 mass_motorization:0 "Massenmotorisierung"
 mass_motorization_desc:0 "Ein noch stärkerer Fokus liegt auf motorisierten Truppen."
 massed_bomber_formations:0 "Massierte Bomberformationen"
 massed_bomber_formations_desc:0 "Indem unsere Bomber in Formation bleiben, können sie ihre Gruppe verteidigen und unsere Chancen auf erfolgreiche Bombenabwürfe erhöhen."
 massed_strikes:0 "Massenangriffe"
 massed_strikes_desc:0 "Für Trägermissionen ausgebildete Piloten sorgen dafür, dass selbst überfüllte Träger reibungslos funktionieren, den Feind umzingeln und ihre Effektivität in Seeschlachten deutlich steigern können. Ein Träger muss wie eine gut geölte Maschine laufen, bei der jeder seine Rolle kennt."
 mechanical_computing:0 "Mechanische Berechnung"
 mechanical_computing_desc:0 "Der Bau von Maschinen, die fortgeschrittene Differenzialanalysen durchführen können, wird die Art der maschinengestützten Berechnungen radikal verändern."
 mechanised_offensive:0 "Mechanisierte Offensive"
 mechanised_offensive_desc:0 "Motorisierte Truppen sind gut und schön, aber um Offensiven anzuführen, brauchen wir Infanterie, die in gepanzerten Transportern in die Schlacht ziehen kann, die sie schützen und schwere Waffen tragen."
