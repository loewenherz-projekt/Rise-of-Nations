 gw_car_equipment:0 "Panzerwagen aus dem Ersten Weltkrieg"
 gw_car_equipment_desc:0 "Panzerwagen wurden im Ersten Weltkrieg hauptsächlich als Aufklärungs- und Infanterieunterstützungsfahrzeuge entwickelt."
