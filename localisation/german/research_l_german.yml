 icbm_research:0 "Interkontinentalraketenforschung"
 improved_airplane_launcher:0 "Verbessertes Flugzeugkatapult"
 improved_airplane_launcher_desc:1 "Ein verbesserter pneumatischer Mechanismus ermöglicht den Start deutlich größerer Flugzeuge per Katapult. Dies vergrößert ihren Suchradius. \n\nDie Montage dieses Moduls auf Kreuzern, schweren Schiffen oder spezialisierten U-Booten verbessert deren Fähigkeit, feindliche Schiffe zu erkennen."
 phased_array:0 "Phased-Array-Antenne"
 phased_array_desc:0 "Die Einführung modernster Radartechniken wie Monopulsradar in Schlüsseloperationen wird eine extreme Verfolgungsgenauigkeit ermöglichen."
 improved_computing_machine:0 "Verbesserte Rechenmaschine"
 improved_computing_machine_desc:0 "Heute lassen sich programmierbare elektronische Digitalrechner herstellen. Diese Maschinen sind zwar noch immer teuer und groß, ermöglichen aber Intelligenzanalysen, die weit über die menschlichen Fähigkeiten hinausgehen."
 improved_cruiser_armor_scheme:0 "Panzerungsschema für Schräggürtelkreuzer"
 improved_cruiser_armor_scheme_desc:1 "Durch die schräge Platzierung der Gürtelpanzerung ist es bei gleichem Gewicht und gleicher Dicke wesentlich schwieriger, eine Panzerung zu durchdringen.\n\nDie Montage dieses Moduls auf §YCruisern§! verbessert deren Fähigkeit, §Ygegnerischen Schäden standzuhalten§!, §Rreduziert§! aber auch ihre §YGeschwindigkeit§!."
 improved_decimetric_radar:0 "Verbessertes dezimetrisches Radar"
 improved_decimetric_radar_desc:0 "Der Einsatz von Radar hat sich bereits als entscheidend erwiesen, doch unsere dezimetrischen Radaranlagen reichen für eine gute Abdeckung nicht aus. Durch die Ausstattung weiterer Einheiten mit Radar können wir unseren technologischen Vorsprung maximieren."
 improved_decryption:1 "Entschlüsselung – Seitenkanalangriff"
 improved_decryption_desc:0 "Die Entwicklung immer ausgefeilterer Computer ermöglicht neue Anwendungen von Methoden der Kryptoanalyse, wie etwa der Differenzbildung, die in Kombination mit neuen Methoden zum manuellen Entschlüsseln von Codes zum Knacken komplexer Chiffren verwendet werden können."
 improved_depth_charges:0 "Wasserbombenwerfer"
 improved_depth_charges_desc:1 "Ein einfaches mechanisches Gerät, das eine Wasserbombe in einer festgelegten Entfernung vom Schiff abfeuert. Dadurch muss der Zerstörer nicht mehr direkt über das Ziel fahren, um es zu treffen. \n\nDurch die Montage dieses Moduls auf §YLeichten Schiffen§! und §YKreuzern§! können diese feindliche §YU-Boote§! angreifen."
 improved_encryption:1 "Verschlüsselung – Zyklische Permutationen"
 improved_encryption_desc:0 "Einschränkungen bei der Randomisierung von Chiffriermaschinen können ausgenutzt werden, um die Chiffren zu knacken. Indem wir die Zufälligkeit der Rotormechanik verbessern, können wir diese Art der Kryptoanalyse erschweren."
 improved_equipment_conversion:0 "Verbesserte Ausrüstungsumwandlung"
 improved_equipment_conversion_desc:0 "Dank technischer Fortschritte können wir die Probleme früherer Modelle beheben und sie an unsere aktuellen Anforderungen anpassen."
 improved_fire_control_system:0 "Verbessertes Feuerleitsystem"
 improved_fire_control_system_desc:0 "Durch Eingabe von Kurs, Geschwindigkeit und Entfernung eines Ziels kann ein mechanischer Computer genau vorhersagen, wo sich das Ziel befinden wird, wenn die nächste Salve zum Abfeuern bereit ist."
 improved_heavy_armor_scheme:0 "Alles-oder-Nichts-Panzerungsschema"
 improved_heavy_armor_scheme_desc:1 "Dieses Schema konzentriert sich darauf, nur die wichtigsten Bereiche des Schiffes zu schützen, während unwichtige Teile ignoriert werden.\n\nDie Montage dieses Moduls auf §Yschweren Schiffen§! verbessert deren Fähigkeit, §Yfeindlichen Schäden standzuhalten§!. §YSchlachtschiffe§! und §YSchlachtkreuzer§! werden durch ihre unterschiedlichen §YPanzerungsschemata§! definiert."
 improved_heavy_battery:0 "Verbesserte schwere Batterie"
 improved_heavy_battery_desc:1 "Power Rammer erhöhen die Ladegeschwindigkeit schwerer Geschütze, während automatische, blitzdichte Türen die Sicherheit verbessern. \n\nDie Montage eines Moduls „Schwere Batterie“ erhöht den „Schweren Geschützangriff“ eines Schiffs und verbessert so die Leistung gegen feindliche „Großkampfschiffe“."
 improved_heavy_shell:1 "Superschwere panzerbrechende Granate"
 improved_heavy_shell_desc:0 "Diese massiven Granaten wiegen weit über eine Tonne, schlagen mit beispielloser Kraft ein und stellen selbst für die schwerste Panzerung eine ernste Bedrohung dar."
 improved_infantry_weapons_2:0 "Verbesserte Infanterieausrüstung II"
 improved_infantry_weapons_2_desc:0 "Persönliche und Mannschaftswaffen für die Infanterie sowie verschiedene andere Ausrüstungsgegenstände, die ein Soldat benötigt. Verbesserte Waffenmodelle und spezialisiertere Ausrüstung."
 improved_light_battery:0 "Verbesserte Lichtbatterie"
 improved_light_battery_desc:1 "Eine geschlossene, angetriebene Halterung für ein kleinkalibriges Geschütz bietet der Besatzung einen gewissen Schutz vor den Elementen und Granatsplittern. \n\nDie Montage dieses Moduls erhöht den §YAngriff mit leichtem Geschütz§!, was bei der Bekämpfung feindlicher §YAbschirmschiffe§! hilfreich ist."
 improved_light_shell:0 "Kleinkalibrige panzerbrechende Granate"
 improved_light_shell_desc:0 "Eine geeignete panzerbrechende Granate für kleinkalibrige Geschütze gibt Zerstörern und anderen leichten Schiffen eine Chance im Kampf gegen gepanzerte Gegner."
 improved_machine_tools:0 "Verbesserte Werkzeugmaschinen"
 improved_machine_tools_desc:0 "Revolverdrehmaschinen sind für die Massenproduktion unverzichtbar. Die effiziente Konstruktion und Nutzung der Drehmaschinen selbst verschafft uns einen erheblichen industriellen Vorteil."
 improved_medium_battery:0 "Verbesserte mittlere Batterie"
 improved_medium_battery_desc:1 "Eine verbesserte Turmanordnung ermöglicht schnelleres Laden, während eine bessere Panzerung die Überlebenschancen verbessert. \n\nDer Einbau eines Moduls „Leichte mittlere Batterie“ erhöht den „Angriff mit leichtem Geschütz“ und hilft so beim Kampf gegen feindliche „Abschirmschiffe“. Der Einbau eines Moduls „Mittlere Batterie“ erhöht den „Angriff mit schwerem Geschütz“ und hilft so beim Kampf gegen feindliche „Großkampfschiffe“."
 improved_medium_shell:0 "Halbpanzerbrechende Granate mittleren Kalibers"
 improved_medium_shell_desc:0 "Als Kompromiss zwischen panzerbrechender Leistung und Sprengkraft verursacht dieses Geschoss deutlich mehr Schaden, nachdem es die schwache Panzerung leichter Schiffe durchschlagen hat."
 improved_naval_mines:0 "Magnetische Mine"
 improved_naval_mines_desc:0 "Diese hochentwickelte Mine explodiert, wenn sie Veränderungen im Magnetfeld erkennt, die von einem vorbeifahrenden Schiff herrühren."
 improved_oil_processing:0 "Verbesserte Ölverarbeitung"
 improved_oil_processing_desc:0 "Durch die Übertragung bisher experimenteller Destillationsmethoden auf großtechnische Verfahren können wir uns besser an die verfügbaren Materialien und Anforderungen anpassen."
 improved_rail_integration_system:0 "Verbessertes Schienenintegrationssystem"
 improved_rail_integration_system_desc:0 "Platzhalter"
 improved_rocket_engines:0 "Verbesserte Raketentriebwerke"
 improved_rocket_engines_desc:0 "Die ersten ballistischen Langstreckenraketen können gebaut und immer präziser gemacht werden, sodass sie weit entfernte feindliche Städte und sogar den Weltraum erreichen können."
 improved_rubber_processing:0 "Verbesserte Gummiverarbeitung"
 improved_rubber_processing_desc:1 "Mit neuen Verfahren zur Beschleunigung von Dehydrierungsreaktionen ist die Produktion von synthetischem Kautschuk im großen Maßstab möglich."
 improved_secondary_battery:0 "Sekundärbatterie mit Geschützturm"
 improved_secondary_battery_desc:1 "Durch die Platzierung der Sekundärgeschütze in angetriebenen Türmen erhalten sie ein viel größeres Schussfeld, allerdings auf Kosten eines höheren Gewichts und einer geringeren Stabilität bei schwerer See.\n\nDie Montage eines §YSekundärbatterie§!-Moduls verleiht einem §YCruiser§!, §YCerrier§! oder §YSchweren Schiff§! eine geringe Menge an §YAngriff mit leichtem Geschütz§! und ermöglicht es ihm, ein zweites Ziel anzugreifen."
 improved_ship_torpedo_launcher:0 "Verbesserter Schiffstorpedowerfer"
 improved_ship_torpedo_launcher_desc:1 "Stärkere Motoren ermöglichen die Installation von mehr Rohren in einer einzigen Halterung und eine schnellere Ausrichtung auf das Ziel.\n\nDie Montage dieses Moduls auf §YLeichten Schiffen§! oder §YKreuzern§! ermöglicht es diesen, erheblichen Schaden an feindlichen §YGroßkampfschiffen§! anzurichten."
 improved_sonar:0 "Aktives Sonar"
 improved_sonar_desc:1 "Mithilfe modulierter Schallwellen kann dieses System die Peilung und Entfernung zu einem untergetauchten Ziel genau messen.\n\nDie Montage dieses Moduls in einem §YElektroniksteckplatz§! auf §YLeichten Schiffen§! oder §YKreuzern§! hilft ihnen, feindliche §YU-Boote§! zu erkennen."
 improved_special_forces:1 "Erweitertes Spezialkräfteprogramm"
 improved_special_forces_desc:1 "Spezialeinheiten sind in der Lage, Missionen durchzuführen, die gewöhnlichen Soldaten nicht möglich sind. Wir müssen die Ausbildungsprogramme ausweiten, um mehr unserer Soldaten zu qualifizieren."
 improved_submarine_mine_laying:0 "Einsatz von Torpedorohrminen"
 improved_submarine_mine_laying_desc:0 "Durch die Neukonstruktion von Minen, die in Torpedorohre passen, kann jedes U-Boot zum Minenleger werden, allerdings auf Kosten der mitgeführten Torpedos."
 improved_submarine_snorkel:0 "Verbesserter U-Boot-Schnorchel"
 improved_submarine_snorkel_desc:1 "Ein verbessertes Design verhindert, dass Wasser in die Motoren gesaugt wird und reduziert zudem das Radarecho des Schnorchelkopfes.\n\nDie Montage dieses Moduls auf §YU-Booten§! verringert deren §YSichtbarkeit§!, wodurch sie schwerer zu erkennen sind."
 industry:0 "Industrie"
 industry_folder:0 "Industrie"
 industry_folder_desc:0 "Industrie und Produktion."
 infantry_armor:0 "Infanteriepanzer"
 infantry_armor_desc:0 "Infanteriepanzer sind langsame, aber gut gepanzerte Panzer, die für die Nahunterstützung der Infanterie vorgesehen sind."
 infantry_at2:0 "Infanterie-Panzerabwehr II"
 infantry_at2_desc:0 "Damit die Infanterie schwerere Panzereinheiten wirksam bekämpfen kann, müssen hochexplosive Panzerabwehrwaffen kleiner und leichter gemacht werden."
 infantry_at:0 "Infanterie-Panzerabwehr I"
 infantry_at_a:0 "Infanterie-Panzerabwehr III"
 infantry_at_a_desc:0 "Zielen Sie ruhig, wagen Sie es nicht zu atmen. Feuern Sie – und rennen Sie dann, so schnell Sie können."
 infantry_at_b:0 "Infanterie-Panzerabwehr IV"
 infantry_at_b_desc:0 "Zielen Sie ruhig, wagen Sie es nicht zu atmen. Feuern Sie – und rennen Sie dann, so schnell Sie können."
 infantry_at_c:0 "Infanterie-Panzerabwehr V"
 infantry_at_c_desc:0 "Zielen Sie ruhig, wagen Sie es nicht zu atmen. Feuern Sie – und rennen Sie dann, so schnell Sie können."
 infantry_at_desc:0 "Durch die Bewaffnung unserer Infanterieeinheiten mit Panzerabwehrgewehren können sie leichter gepanzerte Fahrzeuge ausschalten und gleichzeitig ihre Mobilität bewahren."
