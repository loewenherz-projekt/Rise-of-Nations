 advanced_machine_tools:0 "Fortschrittliche Werkzeugmaschinen"
 advanced_machine_tools_desc:0 "Die Automatisierung von Werkzeugmaschinen mithilfe von Servomechanismen wurde bereits diskutiert. Die Umsetzung dieser Ideen in die Praxis ermöglicht die Nutzung weiterer Fortschritte in der Automatisierung, beispielsweise Computer."
 advanced_medium_battery:0 "Erweiterte mittlere Batterie"
 advanced_medium_battery_desc:1 "Durch die Integration von Ladefunktion und Fernsteuerung der Leistung können moderne Kreuzer Feuerraten und Genauigkeiten erreichen, die bisher als unmöglich galten.\n\nDer Einbau eines Moduls „Leichte mittlere Batterie“ erhöht den „Angriff mit leichtem Geschütz“ und hilft so beim Kampf gegen feindliche „Abschirmschiffe“. Der Einbau eines Moduls „Mittlere Batterie“ erhöht den „Angriff mit schwerem Geschütz“ und hilft so beim Kampf gegen feindliche „Großkampfschiffe“."
 advanced_medium_battery_x2:0 "Erweiterte mittlere Batterie II"
 advanced_medium_battery_x2_desc:0 "Da das Kaliber durch die vorhandenen Munitionsvorräte begrenzt ist und mit dem Ziel, ältere Schiffe nachzurüsten, verfügt diese neue Waffe über ein fortschrittliches automatisches Ladesystem, um die Feuerrate drastisch zu verbessern."
