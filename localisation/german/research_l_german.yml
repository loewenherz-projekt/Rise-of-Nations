 scout_plane2_desc:0 "Durch die Entwicklung spezieller Flugzeuge für die Luftüberwachung und Langstreckenaufklärung stellen wir sicher, dass wir uns ein genaues Bild von den Absichten und Fähigkeiten unseres Gegners machen und es auch behalten."
