 submarine_mine_laying_desc:0 "Durch die Installation einer speziellen Ausrüstung zum Halten und Abwerfen von Minen kann ein speziell konstruiertes U-Boot Minen unter Wasser und hoffentlich unentdeckt ausbringen."
 submarine_offensive:0 "U-Boot-Offensive"
 submarine_offensive_bs:0 "U-Boot-Offensive"
 submarine_offensive_bs_desc:0 "Wenn wir den Höhepunkt der Kommunikation zwischen unseren U-Booten erreichen, können sie in die Offensive gehen. Lassen Sie uns die feindlichen Handelskonvois schneller zerstören, als sie sie ersetzen können."
 submarine_offensive_desc:0 "Wenn wir den Höhepunkt der Kommunikation zwischen unseren U-Booten erreichen, können sie in die Offensive gehen. Lassen Sie uns die feindlichen Handelskonvois schneller zerstören, als sie sie ersetzen können."
 submarine_operations:0 "U-Boot-Operationen"
 submarine_operations_bs:0 "U-Boot-Operationen"
 submarine_operations_bs_desc:0 "Wir müssen die feindliche Flotte nicht frontal angreifen, um den Krieg zu gewinnen. Schlagen Sie ihre Handelskonvois an, bevor sie reagieren und wieder unter der Oberfläche verschwinden können. Man kann nichts bekämpfen, was man nicht sieht."
 submarine_operations_desc:0 "Wir müssen die feindliche Flotte nicht frontal angreifen, um den Krieg zu gewinnen. Schlagen Sie ihre Handelskonvois an, bevor sie reagieren und wieder unter der Oberfläche verschwinden können. Man kann nichts bekämpfen, was man nicht sieht."
 subsidiary_carrier_role:0 "Rolle des Tochterunternehmens"
 subsidiary_carrier_role_desc:0 "Träger unterstützen Schlachtschiffe und verbessern deren Bereitschaft, von der Verteidigung in die Offensive zu wechseln. Der Nutzen des Trägers als Auge am Himmel und als mächtige, schnelle Schlagkraft ergänzt die langsameren Schlachtschiffe gut."
 subsidiary_carrier_role_ti:0 "Rolle des Tochterunternehmens"
 subsidiary_carrier_role_ti_desc:0 "Träger unterstützen Schlachtschiffe und verbessern deren Bereitschaft, von der Verteidigung in die Offensive zu wechseln. Der Nutzen des Trägers als Auge am Himmel und als mächtige, schnelle Schlagkraft ergänzt die langsameren Schlachtschiffe gut."
 suicide_craft:0 "Yokosuka MXY7 Ohka"
 suicide_craft_desc:0 "Raketengetriebenes Kamikaze-Flugzeug"
 sup_delay:0 "Verzögerung"
 sup_delay_desc:0 "Selbst wenn eine Schlacht nicht gewonnen werden kann, kann es von Vorteil sein, den Vormarsch der angreifenden Streitkräfte durch Hinterhalte und Verzögerungstaktiken zu verlangsamen."
 sup_mechanized_offensive:0 "Mechanisierte Offensive"
 sup_mechanized_offensive_desc:0 "Motorisierte Truppen sind gut und schön, aber um Offensiven anzuführen, brauchen wir Infanterie, die in gepanzerten Transportern in die Schlacht ziehen kann, die sie schützen und schwere Waffen tragen."
 super_heavy_tank_aa_equipment_x:0 "Halbmoderne superschwere SP-Flugabwehr"
 super_heavy_tank_aa_equipment_x_2:0 "Moderne superschwere SP-Flugabwehr"
 super_heavy_tank_aa_equipment_x_2_desc:0 "Dieses ungewöhnliche Design einer in einer gepanzerten Box untergebrachten Raketenbatterie beweist seinen Wert direkt hinter dem Schlachtfeld, da es die vollständige Kontrolle über den Himmel ermöglicht und gleichzeitig gelegentliche Schüsse absorbiert."
 super_heavy_tank_aa_equipment_x_2_short:0 "Mod. SH. AA"
 super_heavy_tank_aa_equipment_x_desc:0 "Dieses ungewöhnliche Design einer in einer gepanzerten Box untergebrachten Raketenbatterie beweist seinen Wert direkt hinter dem Schlachtfeld, da es die vollständige Kontrolle über den Himmel ermöglicht und gleichzeitig gelegentliche Schüsse absorbiert."
