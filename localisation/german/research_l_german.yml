 carrier_battlegroups:0 "Trägerkampfgruppen"
 carrier_battlegroups_desc:0 "Flugzeugträger können den Feind aus größerer Entfernung angreifen als jede Schiffskanone, und mit unseren Augen am Himmel werden wir nie unvorbereitet sein. Flugzeugträger in großer Zahl sind eine Macht, mit der man rechnen muss."
 carrier_operations:0 "Trägerbetrieb"
 carrier_operations_desc:0 "Flugzeugträger ermöglichen unseren Piloten, auf See schneller und einfacher zuzuschlagen als von unseren Luftwaffenstützpunkten an Land. Wir werden zuschlagen, bevor sie Zeit haben zu reagieren."
 carrier_primacy:0 "Trägervorrang"
 carrier_primacy_desc:0 "Moderne Flugzeuge verfügen über eine größere Reichweite und Präzision als herkömmliche Schiffsgeschütze. Integrieren Sie Flugzeugträger in Ihre Flotte und beherrschen Sie die Meere vom Himmel aus."
