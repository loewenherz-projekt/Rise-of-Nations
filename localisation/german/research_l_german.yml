 superior_firepower:0 "Überlegene Feuerkraft"
 superior_firepower_desc:0 "Diese Doktrin konzentriert sich darauf, Granaten und nicht Menschen auf den Feind zu werfen. Unsere Arbeitskräfte sind wertvoll, Kugeln sind billig.\n\n"
 support_folder:1 "Support-Unternehmen"
 support_folder_desc:0 "Aufklärung, Ingenieure, Feldlazarette und andere Unterstützungsunternehmen."
 support_tech:0 "Support-Technologie"
 support_tech_research:1 "Forschungsgeschwindigkeit der Unterstützungseinheit"
 support_weapons2:0 "Unterstützungswaffen II"
 support_weapons2_desc:0 "Die Entwicklung automatischer Waffen, die die Aspekte leichter und schwerer Maschinengewehre vereinen, ermöglicht unserer Infanterie einen vielseitigen Einsatz ihrer Ausrüstung."
 support_weapons3:0 "Unterstützungswaffen III"
 support_weapons3_desc:0 "Während wir die Zuverlässigkeit von Maschinengewehren beibehalten und verbessern, können wir auch mit höheren Feuerraten experimentieren, um die Tödlichkeit des konstanten Kugelhagels sicherzustellen."
 support_weapons4:0 "Unterstützungswaffen IV"
 support_weapons4_desc:0 "Angesichts der zunehmenden Verwendung von Sturmgewehren ist die Entwicklung zuverlässiger automatischer Waffen, die in jeder Umgebung von allen Soldaten eingesetzt werden können, für eine moderne Armee von höchster Priorität."
 support_weapons:0 "Unterstützungswaffen I"
 support_weapons_a:0 "Unterstützungswaffen V"
 support_weapons_a_desc:0 "Zur großen Erleichterung unserer Truppen an der Front ist es uns gelungen, ein noch besseres Kit zusammenzustellen."
 support_weapons_b:0 "Unterstützungswaffen VI"
 support_weapons_b_desc:0 "Zur großen Erleichterung unserer Truppen an der Front ist es uns gelungen, ein noch besseres Kit zusammenzustellen."
 support_weapons_c:0 "Unterstützungswaffen VII"
 support_weapons_c_desc:0 "Zur großen Erleichterung unserer Truppen an der Front ist es uns gelungen, ein noch besseres Kit zusammenzustellen."
 support_weapons_desc:0 "Automatische Waffen werden immer tragbarer. Maschinenpistolen haben sich bereits als wirksam erwiesen, und die Entwicklung handgeführter Unterstützungswaffen muss fortgesetzt werden."
 survival_training:0 "Überlebenstraining"
 survival_training_desc:0 "Unsere Spezialeinheiten kämpfen oft hinter den feindlichen Linien und sind mit knappen Mitteln ausgestattet. Wir müssen sie darauf trainieren, rauem Wetter standzuhalten und mit begrenzten Vorräten zu kämpfen."
 synth_oil_experiments:0 "Experimente mit synthetischem Öl"
 synth_oil_experiments_desc:0 "Um die Abhängigkeit vom Erdöl zu verringern, können Verfahren zur Herstellung von Ersatzstoffen aus anderen Stoffen und Materialien erforscht werden."
 synth_resources:0 "Synthetische Ressourcen"
 synth_resources_research:2 "Forschungsgeschwindigkeit für synthetische Ressourcen"
 tac_bomber:0 "Taktischer Bomber"
 tac_bomber_equipment:0 "Taktischer Bomber"
 tac_bomber_equipment_0:0 "Zwischenkriegsbomber"
 tac_bomber_equipment_0_desc:0 "Es herrscht weithin die Überzeugung, dass der nächste Krieg ausschließlich dadurch gewonnen werden kann, dass der Feind ausgebombt wird. Es ist zwingend erforderlich, dass wir mit der Entwicklung eines eigenen Bomberflugzeugs beginnen, das schwere Nutzlasten mit ausreichender Geschwindigkeit transportieren kann."
 tac_bomber_equipment_0_short:0 "Bomber"
 tac_bomber_equipment_1:0 "Taktischer Bomber I"
 tac_bomber_equipment_1_desc:0 "Mittelschwere Bomber müssen vielseitig und schnell sein und verschiedene Aufgaben erfüllen können. Ein zweimotoriges Design, das relativ leicht bleibt, kann noch viele Jahre lang eingesetzt werden."
 tac_bomber_equipment_1_short:0 "Taktischer Bomber I"
 tac_bomber_equipment_2:0 "Taktischer Bomber II"
 tac_bomber_equipment_2_desc:0 "Schwerere Ausführungen taktischer Bomber können Reichweite, Nutzlast und Geschwindigkeit erhöhen, während die Fähigkeit der Flugzeuge, eine große Bandbreite an Missionen durchzuführen, erhalten bleibt."
 tac_bomber_equipment_2_short:0 "Taktischer Bomber II"
 tac_bomber_equipment_3:0 "Taktischer Bomber III"
 tac_bomber_equipment_3_desc:0 "Wenn man sich an den Fortschritten bei Kampfflugzeugen orientiert, können unkonventionelle Materialien und Formen dazu führen, dass neue Designs zu den schnellsten und leistungsstärksten zweimotorigen Flugzeugen gehören, die je gebaut wurden."
 tac_bomber_equipment_3_short:0 "Taktischer Bomber III"
 tac_bomber_equipment_desc:0 "Taktische Bomber sind kleinere, schnelle Bomber, die Bodentruppen unterstützen und feindliche Gebäude bombardieren können."
 tactical_bomber:0 "Taktische Bombermodelle"
 tactical_control:0 "Taktische Kontrolle"
 tactical_control_desc:0 "Offiziere, die mit Operationen der kombinierten Waffen in vorgeschobenen Stellungen vertraut sind, können nun alle Operationen der Teilstreitkräfte direkt steuern."
 tandem_charge_warheads:0 "Tandemladungssprengköpfe"
 tandem_charge_warheads_desc:0 "Platzhalter"
 tank_landing_craft:0 "Fortgeschrittenes Landungsboot"
 tank_landing_craft_desc:0 "Dank moderner Landungsboote können unsere Jungs bei einer Invasion schneller und effektiver an den Strand gelangen."
 tech_communist_paramilitary:0 "Kommunistische Paramilitärs"
 tech_engineers2:0 "Pionierkompanie VIII" 
 tech_engineers2_desc:0 "Militärtechnik wird grob definiert als die Kunst, Wissenschaft und Praxis des Entwurfs und Baus militärischer Anlagen sowie der Instandhaltung militärischer Transport- und Kommunikationswege. Militäringenieure sind auch für die Logistik militärischer Taktiken verantwortlich. Moderne Militärtechnik unterscheidet sich vom Bauingenieurwesen. Im 20. und 21. Jahrhundert umfasst die Militärtechnik auch andere Ingenieurdisziplinen wie Maschinenbau und Elektrotechnik."
