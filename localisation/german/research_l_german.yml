 air_defence:0 "Flugabwehr"
 air_defence_desc:0 "Indem wir unsere Piloten darin schulen, ständig wachsam zu sein, auch wenn scheinbar keine Gefahr besteht, erhöhen wir ihre Chancen, feindliche Flugzeuge abzufangen."
 air_doctrine:0 "Luftdoktrin"
 air_doctrine_folder:0 "Luftdoktrin"
 air_doctrine_folder_desc:0 "Luftdoktrin, wie Ihre Luftwaffe kämpft."
 air_equipment:0 "Flugzeug"
 air_equipment_research:2 "Luftforschungsgeschwindigkeit"
 air_land_battle:0 "Luft-Land-Schlacht"
 air_land_battle_desc:0 "Da die Bodentruppen bereits in Formationen vereinter Waffen operieren, legt AirLand Battle nun auch Wert auf eine enge Koordination zwischen Land- und Luftstreitkräften und verschmilzt die Luft- und Landschlachtfelder zu einem nahtlosen Ganzen."
 air_offense:0 "Kampfflugzeug-Eskorte"
 air_offense_desc:0 "Da wir uns auf Bombenangriffe am Tag konzentrieren, müssen wir unsere Bomber vor dem Abfangen durch Kampfflugzeuge schützen. Indem wir unsere Kampfpiloten in der engen Zusammenarbeit mit den Bombern ausbilden, verbessern wir ihre Kampffähigkeiten beim Schutz der Bomber im feindlichen Luftraum."
 air_skirmish:0 "Luftgefecht"
 air_skirmish_desc:0 "Leider ist es nicht immer möglich, jedes einzelne feindliche Flugzeug über unserem Land zu zerstören, aber es ist möglich, sie vom Moment ihrer Entdeckung bis zu ihrem Abflug zu belästigen und sie so ständig zu zermürben."
 air_superiority:0 "Luftüberlegenheit"
 air_superiority_desc:0 "Durch die Erlangung der Luftüberlegenheit wird es schwieriger, feindliche Bomber gegen unser Land einzusetzen, und es wird möglich, unsere Bomber gegen unsere Feinde einzusetzen."
 air_techs_folder:0 "Luft"
 air_techs_folder_desc:0 "Flugzeug."
 airdrop_mines:0 "Luftminenlegen"
 airdrop_mines_desc:0 "Durch die Ausstattung der Minen mit einem kleinen Fallschirm können diese sicher aus Flugzeugen abgeworfen werden, was die schnelle und effiziente Schaffung von Minenfeldern ermöglicht."
 airplane_launcher_advice_tt:0 "\nDie Montage eines §YCatapult§!-Moduls auf §YCruisern§!, §Yschweren Schiffen§! oder spezialisierten §YU-Booten§! verbessert deren Fähigkeit, feindliche Schiffe zu erkennen."
 airsweep_mines:0 "Minenräumen aus der Luft"
 airsweep_mines_desc:0 "Flugzeuge können mit Spezialausrüstung ausgestattet werden, um Seeminen aus der Luft zu erkennen und sicher zu zünden."
 already_researching:0 "§GSie erforschen diese Technologie bereits.§!"
 aluminum_production_1:0 "Aluminiumproduktion"
