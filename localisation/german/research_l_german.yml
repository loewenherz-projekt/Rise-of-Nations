 WW1_tech_recon:0 "Aufklärungskompanie I"
 WW1_tech_recon_desc:0 "Bei militärischen Operationen ist Aufklärung oder Erkundung die Erkundung eines Gebiets durch Streitkräfte, um Informationen über feindliche Streitkräfte, das Gelände und andere Aktivitäten zu erhalten. Beispiele für Aufklärung sind Patrouillen von Truppen (Plänkler, Langstreckenaufklärungspatrouille, US Army Rangers, Kavallerieaufklärer oder Spezialisten des militärischen Geheimdienstes), Schiffen oder U-Booten, bemannten oder unbemannten Aufklärungsflugzeugen, Satelliten oder die Einrichtung von Beobachtungsposten. Spionage wird üblicherweise als etwas anderes als Aufklärung angesehen, da sie von nicht uniformiertem Personal hinter den feindlichen Linien durchgeführt wird."
 CAS_equipment:0 "Luftnahunterstützung"
 CAS_equipment_1:0 "Luftnahunterstützung I"
 CAS_equipment_1_desc:0 "Unsere CAS-Doktrin erfordert Flugzeuge, die zu präzisen Oberflächenangriffen fähig sind. Diese Flugzeuge tragen zwar im Vergleich zu unseren größeren taktischen Bombern eine geringere Nutzlast, sind aber in der Lage, kleine Gelegenheitsziele durch Tieffliegerangriffe und Sturzbombardements anzugreifen und zu zerstören."
 CAS_equipment_1_short:0 "CAS I"
 CAS_equipment_2:0 "Luftnahunterstützung II"
 CAS_equipment_2_desc:0 "Frühe Kriegserfahrungen haben gezeigt, dass erhöhte Geschwindigkeit, Panzerung und Manövrierfähigkeit für CAS-Flugzeuge notwendig sind, um gegen feindliche Jäger und Bodenfeuer bestehen zu können. Die nächste Generation von Erdkampfflugzeugen wird zudem größere Bomben, Kanonen und Maschinengewehre einsetzen, um ihren Zielen größeren Schaden zuzufügen."
 CAS_equipment_2_short:0 "CAS II"
 CAS_equipment_3:0 "Luftnahunterstützung III"
 CAS_equipment_3_desc:0 "Die ständig steigende Leistungsfähigkeit der Flugabwehr und feindlicher Abfangjäger erfordert eine Weiterentwicklung unserer CAS-Flugzeuge. Das neue Design umfasst eine höhere Motorleistung, Verbesserungen der Flugzeugzelle für verbesserte Sturzflugfähigkeit und Schutz sowie eine noch höhere Nutzlast."
 CAS_equipment_3_short:0 "CAS III"
 CAS_equipment_desc:0 "Flugzeuge zur Luftnahunterstützung sind für die Unterstützung bei Landkämpfen konzipiert."
