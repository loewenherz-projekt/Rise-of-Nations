 GER_medium_assault_gun_equipment_1_desc:0 "Das Sturmgeschütz III war im Zweiten Weltkrieg das meistgebaute deutsche Panzerkampffahrzeug. Es wurde auf dem Fahrgestell des bewährten Panzer III gebaut, wobei der Turm durch einen festen Aufbau mit einer leistungsstärkeren Kanone ersetzt wurde."
 GER_medium_assault_gun_equipment_1_short:0 "StuG III"
 GER_medium_assault_gun_equipment_2_desc:0 "Das Sturmgeschütz IV war eine deutsche Sturmgeschützvariante des Panzer IV, die in der zweiten Hälfte des Zweiten Weltkriegs eingesetzt wurde. In Funktion und Konzept identisch mit der äußerst erfolgreichen Sturmgeschützvariante StuG III des Panzer III."
 GER_medium_assault_gun_equipment_2_short:0 "StuG IV"
 GER_medium_assault_gun_equipment_3_desc:0 "Die SturmHaubitze 42 wurde erstmals 1942 entwickelt, als ein Fahrzeug zur Infanterieabwehr benötigt wurde und die Produktion von StuGs auf Hochtouren lief. Es erschien nur logisch, dieses bereits kampferprobte und leicht verfügbare Fahrgestell in ein Spezialfahrzeug umzuwandeln."
 GER_medium_assault_gun_equipment_3_short:0 "StuH 42"
 GER_medium_tank_destroyer_equipment_1:0 "Jagdpanzer"
 GER_medium_tank_destroyer_equipment_1_desc:0 "Der Jagdpanzer basiert auf dem Design des StuG III. Ursprünglich als mobiles, gepanzertes Leichtgeschütz zur Infanterieunterstützung konzipiert, wurde das StuG kontinuierlich modifiziert und fand breite Anwendung als Jagdpanzer."
