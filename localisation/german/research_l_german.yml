 medium_battery_advice_tt:0 "\n\nDer Einbau von Modulen wie §YLeichte Mittlere Batterie§! oder §YMittlere Batterie§! in §YKreuzer§! verbessert deren §YLeichter Geschützangriff§! oder §YSchweren Geschützangriff§! und ermöglicht ihnen so den Kampf gegen feindliche §YSchirmschiffe§! oder §YGroßkampfschiffe§!. Der Einbau einer beliebigen §YMittleren Batterie§! macht ein Schiff zu einem §YSchweren Kreuzer§!, während der Einbau nur einer §YLeichte Mittlere Batterie§! ein Schiff zu einem §YLeichten Kreuzer§! macht."
 military_industry:0 "Militärindustrie"
 military_police_1904:0 "Militärpolizei II"
 military_police_1904_desc:0 "Die Militärpolizei ist eine Disziplinareinheit, die aus Soldaten besteht und in der Armee Polizei- und verwandte Funktionen ausübt. Ihre Hauptaufgabe besteht in der Aufrechterhaltung von Recht und Ordnung, der Verhütung und Aufklärung von Straftaten innerhalb der Armee sowie dem Betrieb von Haftanstalten. Bei Bedarf greift sie auch als Infanterie in den Kampf ein."
 military_police_1908:0 "Militärpolizei III" 
 military_police_1908_desc:0 "Die Militärpolizei ist eine Disziplinareinheit, die aus Soldaten besteht und in der Armee Polizei- und verwandte Funktionen ausübt. Ihre Hauptaufgabe besteht in der Aufrechterhaltung von Recht und Ordnung, der Verhütung und Aufklärung von Straftaten innerhalb der Armee sowie dem Betrieb von Haftanstalten. Bei Bedarf greift sie auch als Infanterie in den Kampf ein."
 missile_research:0 "Raketenforschung"
 missiles_1944:0 "Raketen des Kalten Krieges"
 missiles_1944_desc:0 " "
 missle:0 "Raketen"
 mobile_defence:0 "Mobile Verteidigung"
 mobile_defence_desc:0 "Mobile Streitkräfte können zur Verstärkung der Verteidigung eingesetzt werden, wo immer der Feind angreift."
 mobile_infantry:0 "Mobile Infanterie"
 mobile_infantry_desc:0 "Reguläre Infanterie ist oft zu langsam, um mit schnell vorrückenden Panzertruppen Schritt zu halten, auf sie zu reagieren oder ihnen zu entkommen. Die Lösung liegt in der Konzentration auf motorisierte oder mechanisierte Infanterie, die mit dem Tempo der modernen Kriegsführung Schritt halten kann.\n\n"
 mobile_warfare:0 "Mobile Kriegsführung"
 mobile_warfare_desc:0 "Bei der mobilen Kriegsführung geht es um Geschwindigkeit und Manöver, um die feindlichen Streitkräfte abzuschneiden und zu desorganisieren.\n\n"
 modern_blitzkrieg:0 "Moderner Blitzkrieg"
 modern_blitzkrieg_desc:0 "Der Modern Blitzkrieg, der Höhepunkt der mobilen Kriegsführung, beinhaltet alle neuesten technologischen Fortschritte und die Lehren aus früheren Doktrinen."
 modern_communication_systems:0 "Moderne Kommunikationssysteme"
 modern_communication_systems_desc:0 "Ältere Radiosender liefern uns keine zuverlässigen Daten mehr. Wir müssen in Computersysteme investieren, um die Territorialspionage zu unterstützen."
 modern_depth_charges:0 "Verbesserter Wasserbombenmörser"
 modern_depth_charges_desc:1 "Eine größere Treibladung wirft aus großer Entfernung eine auf eine bestimmte Tiefe eingestellte Wasserbombe auf ein U-Boot.\n\nDie Montage dieses Moduls auf §YLeichten Schiffen§! und §YKreuzern§! ermöglicht es ihnen, feindliche §YU-Boote§! anzugreifen."
 modern_detection_devices:0 "Moderne Detektionsgeräte"
 modern_detection_devices_desc:0 ""
 modern_hardware_1:0 "Moderne Hardware I"
 modern_hardware_1_desc:0 ""
 modern_hardware_2:0 "Moderne Hardware II"
 modern_hardware_2_desc:0 ""
 modern_landing_craft:0 "Moderne Landungsboote"
 modern_landing_craft_desc:0 "Ein modernes Landungsboot"
 modern_landing_craft_desc:0 "Wie viele Leute passen überhaupt noch in dieses Ding?"
 modern_naval_mines:0 "Druckmine"
 modern_naval_mines_desc:0 "Diese hochmoderne Mine erkennt kleine Veränderungen des Wasserdrucks, die durch ein sich in der Nähe bewegendes Schiff verursacht werden."
 modern_oil_processing:0 "Moderne Ölverarbeitung"
 modern_oil_processing_desc:1 "Unsere Ölraffinerien können durch neue, fortschrittliche Ölverarbeitungsmethoden wie Hydrocracken, Alkylierung, Mercaptanoxidation und Isomerisierung weiter verbessert werden."
 modern_rocket_engines:0 "Frühe Interkontinentalraketen"
 modern_rocket_engines_desc:0 "Wir haben mit der Erprobung und Vorbereitung von Raketen begonnen, die in den Weltraum vordringen und so eine Nutzlast an jeden beliebigen Punkt auf dem Planeten bringen können."
 modern_rubber_processing:0 "Moderne Gummiverarbeitung"
 modern_rubber_processing_desc:1 "Der Übergang zu optimierteren Polymerisationsprozessen wird zu niedrigeren Kosten und einer höheren Produktion führen."
 modern_ship_torpedo_launcher:0 "Torpedowerfer für moderne Schiffe"
 modern_ship_torpedo_launcher_desc:1 "Leistungsstarke Druckluftladungen ermöglichen den Abschuss schwerer Torpedos mit höherer Geschwindigkeit.\n\nDie Montage dieses Moduls auf §YLeichten Schiffen§! oder §YKreuzern§! ermöglicht es diesen, gegnerischen §YGroßkampfschiffen§! erheblichen Schaden zuzufügen."
