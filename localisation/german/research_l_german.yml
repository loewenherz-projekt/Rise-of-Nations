 WW1_tech_engineers2:0 "Pionierkompanie IV" 
 WW1_tech_engineers2_desc:0 "Militärtechnik wird grob definiert als die Kunst, Wissenschaft und Praxis des Entwurfs und Baus militärischer Anlagen sowie der Instandhaltung militärischer Transport- und Kommunikationswege. Militäringenieure sind auch für die Logistik militärischer Taktiken verantwortlich. Moderne Militärtechnik unterscheidet sich vom Bauingenieurwesen. Im 20. und 21. Jahrhundert umfasst die Militärtechnik auch andere Ingenieurdisziplinen wie Maschinenbau und Elektrotechnik."
