 ww1_moduleMTG_mines:0 "Minenlegen"
 ww1_moduleMTG_mines_desc:0 "Unter Minenlegen versteht man das Auslegen von Sprengminen. Seit dem Ersten Weltkrieg bezeichnet der Begriff Minenleger speziell ein Kriegsschiff, das zum Auslegen von Seeminen eingesetzt wird. Vor dem Ersten Weltkrieg wurden Minenschiffe allgemein als Minenleger bezeichnet."
