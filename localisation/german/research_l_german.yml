 central_planning:0 "Zentrale Planung"
 central_planning_desc:0 "Beamte aller Zweige wirken nun an der Planung eines bestimmten Einsatzes mit, um sicherzustellen, dass dieser mit maximaler Effizienz abläuft."
 centralized_fire_control:0 "Zentralisierte Feuerkontrolle"
