 floating_airfield:0 "Schwimmender Flugplatz"
 floating_airfield_bs:0 "Schwimmender Flugplatz"
 floating_airfield_bs_desc:0 "Durch die verbesserte Integration von Flugzeugträgern in unsere Flotte sind wir für Angriffe sowohl von See als auch aus der Luft gerüstet. Entscheidend ist, dass wir die Luft beherrschen, egal wo wir hingehen."
 floating_airfield_desc:0 "Durch die verbesserte Integration von Flugzeugträgern in unsere Flotte sind wir für Angriffe sowohl von See als auch aus der Luft gerüstet. Entscheidend ist, dass wir die Luft beherrschen, egal wo wir hingehen."
 floating_airfield_ti:0 "Schwimmender Flugplatz"
 floating_airfield_ti_desc:0 "Durch die verbesserte Integration von Flugzeugträgern in unsere Flotte sind wir für Angriffe sowohl von See als auch aus der Luft gerüstet. Entscheidend ist, dass wir die Luft beherrschen, egal wo wir hingehen."
 floating_fortress:0 "Schwimmende Festung"
 floating_fortress_bs:0 "Schwimmende Festung"
 floating_fortress_bs_desc:0 "Mit Schlachtschiffen in höchster Alarmbereitschaft sind wir jederzeit bereit zu reagieren, wenn der Feind es wagt, unsere Gewässer zu bedrohen. Jede Flotte braucht ein solides Fundament und die Macht eines Schlachtschiffs ist beispiellos."
 floating_fortress_desc:0 "Mit Schlachtschiffen in höchster Alarmbereitschaft sind wir jederzeit bereit zu reagieren, wenn der Feind es wagt, unsere Gewässer zu bedrohen. Jede Flotte braucht ein solides Fundament und die Macht eines Schlachtschiffs ist beispiellos."
 floating_fortress_ti:0 "Schwimmende Festung"
 floating_fortress_ti_desc:0 "Mit Schlachtschiffen in höchster Alarmbereitschaft sind wir jederzeit bereit zu reagieren, wenn der Feind es wagt, unsere Gewässer zu bedrohen. Jede Flotte braucht ein solides Fundament und die Macht eines Schlachtschiffs ist beispiellos."
 flying_fortress:0 "Fliegende Festung"
 flying_fortress_desc:0 "Wir statten unsere hochfliegenden schweren Bomber mit Waffen zur Selbstverteidigung und ausreichend Panzerung aus, um einiges auszuhalten und trotzdem nach Hause zurückkehren zu können."
 force_rotation:0 "Rotation erzwingen"
 force_rotation_desc:0 "Kampfhandlungen oder einfach lange Phasen intensiver Konzentration sind erschöpfend, aber indem wir, wann immer möglich, frische Kräfte einsetzen, können wir Fehler aufgrund von Ermüdung des Piloten reduzieren."
 formation_fighting:0 "Formationskampf"
 formation_fighting_desc:0 "Durch das Fliegen in den richtigen Formationen können unsere Piloten die toten Winkel der anderen abdecken, was zu einer verbesserten Fähigkeit führt, feindliche Flugzeuge zu erkennen."
 formation_flying:0 "Formationsflug"
 formation_flying_desc:0 "Durch das Fliegen in Formation können sich Flugzeuge gegenseitig unterstützen oder gemeinsam Feinde angreifen."
 forward_interception:0 "Vorwärtsabfangen"
 forward_interception_desc:0 "Durch den Einsatz näher am feindlichen Luftraum steigt die Wahrscheinlichkeit, dass unsere Kampfflugzeuge feindliche Flugzeuge abfangen können, bevor diese ihre Ziele erreichen."
 forward_observers:0 "Vorwärtsbeobachter"
 forward_observers_desc:0 "Vorgeschobene Beobachter nehmen Positionen ein, von denen aus sie die Genauigkeit und die Auswirkungen des Artilleriefeuers direkt beobachten und die Ergebnisse zur Korrektur an die Geschütze weiterleiten können."
 fuel_refining2:0 "Kraftstoffraffination II"
 fuel_refining2_desc:0 "Eine bessere Planung der Raffinerielayouts reduziert die Brennstoffverschwendung."
 fuel_refining3:0 "Kraftstoffraffination III"
 fuel_refining3_desc:0 "Verbesserte Rückgewinnungsmethoden ermöglichen die Raffination von Kraftstoff aus Nebenprodukten."
 fuel_refining4:0 "Kraftstoffraffination IV"
 fuel_refining4_desc:0 "Neue Entwicklungen in der chemischen Verfahrenstechnik ermöglichen die Raffination von Kraftstoffen aus neuen Quellen."
 fuel_refining5:0 "Kraftstoffraffination V"
 fuel_refining5_desc:0 "Durch den Einsatz neuer Methoden und verbesserter Layouts beim Bau von Raffinerien lässt sich der Durchsatz drastisch steigern und gleichzeitig der Abfall reduzieren."
 fuel_refining:0 "Kraftstoffraffination I"
 fuel_refining_desc:0 "Fortschritte beim chemischen Cracken ermöglichen eine bessere Ausbeute an leichten Brennstoffen aus Öl."
 fuel_silos:0 "Kraftstofflagerung"
 fuel_silos_desc:0 "Die Massenlagerung von Kraftstoff erfordert einen komplexen Satz von Tanks, Rohren und Ventilen, um sicherzustellen, dass der Kraftstoff sowohl sicher als auch leicht verfügbar ist."
