 coastal_submarine_1900_desc:0 "Ein Küsten-U-Boot oder Littoral-U-Boot ist ein kleines, wendiges U-Boot mit geringem Tiefgang, das sich gut für die Navigation in Küstenkanälen und Häfen eignet."
