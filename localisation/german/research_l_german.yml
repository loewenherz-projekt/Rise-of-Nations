 artillery1:0 "Artillerie I"
 artillery1_desc:0 "Mit moderneren Materialien und Mechanismen können Haubitzen und Feldgeschütze aus dem Ersten Weltkrieg umgerüstet und für die moderne Kriegsführung modernisiert werden."
 artillery1_md:0 "Moderne Artillerie-Upgrade I"
 artillery2:0 "Verbessertes Artillerie-Upgrade I"
 artillery2_desc:0 "Mit der Modernisierung alter Waffen kommen wir nur bis zu einem gewissen Punkt voran. Wir brauchen neue Haubitzenkonstruktionen, die die Vorteile neuer hydraulischer Rückstoßvorrichtungen und längerer Läufe nutzen."
 artillery2_md:0 "Artillerie I"
 artillery2_md_desc:0 "Mit moderneren Materialien und Mechanismen können Haubitzen und Feldgeschütze aus dem Ersten Weltkrieg umgerüstet und für die moderne Kriegsführung modernisiert werden."
 artillery3:0 "Verbessertes Artillerie-Upgrade II"
 artillery3_desc:0 "Um schwerere Geschütze auf leichteren Lafetten zu ermöglichen, können in Haubitzenkonstruktionen Mündungsbremsen integriert werden."
 artillery3_md:0 "Moderne Artillerie-Upgrade II"
 artillery3_md_desc:0 "Mit der Modernisierung alter Waffen kommen wir nur bis zu einem gewissen Punkt voran. Wir brauchen neue Haubitzenkonstruktionen, die die Vorteile neuer hydraulischer Rückstoßvorrichtungen und längerer Läufe nutzen."
 artillery4:0 "Artillerie IV"
 artillery4_desc:0 "Durch die Entwicklung leichter, für den Transport zerlegbarer Artillerie wird es möglich, Artillerieunterstützung in bisher schwer erreichbare Gebiete zu bringen."
 artillery4_md:0 "Moderne Artillerie-Upgrade III"
 artillery4_md_desc:0 "Um schwerere Geschütze auf leichteren Lafetten zu ermöglichen, können in Haubitzenkonstruktionen Mündungsbremsen integriert werden."
 artillery5:0 "Verbessertes Artillerie-Upgrade"
 artillery5_desc:0 "Artilleriegeschütze mit niedrigeren Silhouetten sind für den Feind schwieriger anzuvisieren."
 artillery5_md:0 "Artillerie IV"
 artillery5_md_desc:0 "Durch die Entwicklung leichter, für den Transport zerlegbarer Artillerie wird es möglich, Artillerieunterstützung in Gebiete zu bringen, die bisher schwer zu erlernen waren."
 artillery6_md:0 "Moderne Artillerie-Upgrade IV"
 artillery_a:0 "Fortgeschrittenes Artillerie-Upgrade II"
 artillery_a_desc:0 "Der erste Schuss gilt dem Teufel, der zweite Gott und erst der dritte dem König."
 artillery_c:0 "Halbmoderne Artillerie-Upgrade I"
 artillery_c_desc:0 "Durch die Feinbearbeitung und andere Anpassungen an jedem Teil der Batterie konnten die Leistung und Zuverlässigkeit insgesamt gesteigert werden."
 artillery_d:0 "Halbmoderne Artillerie-Upgrade II"
 artillery_d_desc:0 "Das Gewicht unserer Einheiten wurde reduziert, wodurch ihre Effektivität erhöht wurde."
 artillery_e:0 "Halbmoderne Artillerie-Upgrade III"
 artillery_e_desc:0 "Artillerie mit stromlinienförmigen Geschossen, die eine höhere Geschwindigkeit erreichen können."
 artillery_equipment:0 "Leichte Artillerieausrüstung"
 artillery_equipment_1:0 "Leichte Artillerieausrüstung I"
 artillery_equipment_1_desc:0 "Ein Feldgeschütz ist ein Feldartilleriegeschütz. Ursprünglich bezog sich der Begriff auf kleinere Geschütze, die eine Feldarmee auf dem Marsch begleiten konnten und im Kampf je nach Gegebenheiten über das Schlachtfeld bewegt werden konnten (Feldartillerie). Im Gegensatz dazu standen in Forts installierte Geschütze (Garnisonsartillerie oder Küstenartillerie) oder Belagerungskanonen und -mörser, die zu groß für einen schnellen Transport waren und nur bei längeren Belagerungen zum Einsatz kamen."
