 field_hospital_1918:0 "Feldlazarett VI"
 field_hospital_1918_desc:0 "Ein Feldlazarett ist ein provisorisches Krankenhaus oder eine mobile medizinische Einheit, die sich vor Ort um Verletzte kümmert, bevor diese sicher in dauerhaftere Einrichtungen transportiert werden können."
 fighter:0 "Kämpfer"
 fighter_ace_initiative:0 "Fighter Ace Initiative"
 fighter_ace_initiative_desc:0 "Die Verleihung besonderer Auszeichnungen und Status an Piloten, die durch den Abschuss von fünf Feinden den Status eines Asses erreichen, fördert die Risikobereitschaft und weckt bei Ass-Piloten ein Gefühl der Elite – obwohl dies dazu führt, dass erfahrene Piloten in ihren Kampfpositionen bleiben."
 fighter_baiting:0 "Kämpfer-Hetze"
 fighter_baiting_desc:0 "Indem sie verwundbar erscheinen, können unsere Kampfflugzeuge feindliche Flugzeuge in Hinterhalte locken."
 fighter_equipment:0 "Kämpfer"
 fighter_equipment_0:0 "Zwischenkriegskämpfer"
 fighter_equipment_0_short:0 "Kämpfer"
 fighter_equipment_1:0 "Kämpfer I"
 fighter_equipment_1_desc:0 "Leichte Flugzeugzellen wurden durch die Einführung von Sternmotoren, Eindecker-Designs und Vollmetallkonstruktionen revolutioniert. Dieser Entwurf ist unser Versuch, unser erstes modernes Kampfflugzeug zu bauen."
 fighter_equipment_1_short:0 "Kämpfer I"
 fighter_equipment_2:0 "Kämpfer II"
 fighter_equipment_2_desc:0 "Die Entwicklung von Kampfflugzeugen schreitet rasant voran. Daher müssen wir die Technologie weiter integrieren und bestehende Konzepte verbessern. Unser neues Kampfflugzeug muss hohe Geschwindigkeiten, hohe Flugleistungen und die größtmögliche Reichweite bieten. Darüber hinaus muss es sehr gut bewaffnet sein."
 fighter_equipment_2_short:0 "Kämpfer II"
 fighter_equipment_3:0 "Kämpfer III"
 fighter_equipment_3_desc:0 "Obwohl sich unsere früheren Generationen von Kampfflugzeugen bewährt haben, sollte jeder Vorteil, den ein besseres Design bietet, genutzt werden. Dieses Flugzeug wird die Spitzenplattform der kolbenmotorgetriebenen Kampfflugzeuge sein und über hervorragende Leistung, hohe Wendigkeit, tödliche Waffen und eine gute Reichweite verfügen."
 fighter_equipment_3_short:0 "Kämpfer III"
 fighter_equipment_desc:0 "Jäger sind schnell und wendig und können viele Aufgaben erfüllen. Vom Kampf um die Lufthoheit über den Schutz Ihrer Bomber bis hin zum Abfangen feindlicher Bomber."
 fighter_sweeps:0 "Kämpfer-Sweeps"
 fighter_sweeps_desc:0 "Aggressive Patrouillen von Kampfflugzeugen über feindlichem Gebiet können deren Flugzeuge beim Starten oder Landen erwischen, wenn sie besonders gefährdet sind, oder feindliche Trainingsflüge stören."
 fighter_veteran_initiative:0 "Initiative für Kampfveteranen"
 fighter_veteran_initiative_desc:0 "Der Fokus liegt auf dem langfristigen Überleben der Piloten, sowohl durch umsichtige Taktiken als auch durch die Rotation erfahrener Piloten in Ausbildungspositionen. Dadurch können sie die gewonnenen Erkenntnisse an neue Piloten weitergeben."
 fire_control_methods_1:0 "Bracket-Schießen"
 fire_control_methods_1_desc:0 "Um das Ziel zu treffen, muss man zunächst über das Ziel hinweggehen und dabei jeweils mehrere Schüsse abfeuern, bis die Einschläge auf beiden Seiten des Ziels erfolgen."
 fire_control_methods_2:0 "Leiterschießen"
 fire_control_methods_2_desc:0 "Anstatt über das Ziel zu feuern und die Einschläge hinter dem feindlichen Schiff aus den Augen zu verlieren, werden Schüsse absichtlich vor dem Ziel abgegeben und die Entfernung zwischen Einschlag und Ziel gemessen, um die Reichweite zu bestimmen."
 fire_control_methods_3:0 "Muschelfarbstoffe"
 fire_control_methods_3_desc:0 "Durch das Hinzufügen kleiner Farbpakete zu den Granaten werden beim Abfeuern die Einschläge rund um das Ziel eingefärbt und mehrere Schiffe können dasselbe Ziel angreifen, ohne durch die Einschläge der anderen Schiffe verwirrt zu werden."
 firebrigades:0 "Feuerwehren"
 firebrigades_desc:0 "„Feuerwehren“ waren hastig zusammengerufene Truppen, die auf feindliche Durchbrüche oder andere kritische Situationen reagieren sollten.\n\n"
