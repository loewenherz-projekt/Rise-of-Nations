sp_land_radar_1_desc:0 ""
sp_land_radar_2:0 "Verbesserte Radare"
sp_land_radar_2_desc:0 ""
sp_rockets_improved_guidance: "Improved Guidance"
sp_rockets_improved_guidance_desc: "Better guidance systems for rockets, will allow us to send our flying bombs further, making them an even bigger threat to our enemies. By improving the guidance systems for smaller rockets, ourrocket artillery will be able to improve their aim as well."
