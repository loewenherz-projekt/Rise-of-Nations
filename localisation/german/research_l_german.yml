 undersea_blockade:0 "Unterwasserblockade"
 undersea_blockade_bs:0 "Unterwasserblockade"
 undersea_blockade_bs_desc:0 "U-Boote sind das perfekte Werkzeug, um den Zufluss wichtiger Rohstoffe zum Feind zu unterbinden. Wir werden die Produktion des Feindes lahmlegen und gewinnen, indem wir ihn aushungern."
 undersea_blockade_desc:0 "U-Boote sind das perfekte Werkzeug, um den Zufluss wichtiger Rohstoffe zum Feind zu unterbinden. Wir werden die Produktion des Feindes lahmlegen und gewinnen, indem wir ihn aushungern."
 unrestricted_submarine_warfare:0 "Uneingeschränkter U-Boot-Krieg"
 unrestricted_submarine_warfare_desc:0 "Unsere U-Boote können jedes Schiff ohne Vorwarnung versenken, egal ob zivil oder nicht. Manche halten dies zwar für einen Verstoß gegen die Kriegsregeln, seine Wirksamkeit lässt sich jedoch nicht leugnen."
 vast_offensives:0 "Große Offensiven"
 vast_offensives_desc:0 "Wenn ein Durchbruch erzielt werden kann, muss dieser so umfassend wie möglich ausgenutzt werden: Eine groß angelegte Offensive, die so tief wie möglich durch die feindlichen Linien vordringt, wird die Verteidigung der Front schwieriger, unmöglich oder irrelevant machen."
 volkssturm:0 "Volkssturm"
 volkssturm_desc:0 "Der Volkssturm bestand aus Männern, die zu alt, zu jung oder aus anderen Gründen für den regulären Militärdienst ungeeignet waren.\n\n"
