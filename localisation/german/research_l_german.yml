 smoke_generator_early:0 "Frühe Rauchgeneratoren"
 smoke_generator_early_desc:0 "Durch geringfügige Modifikationen an den Motoren und Schornsteinen leichter und mittlerer Schiffe können diese viel Rauch erzeugen, um den Kontakt mit dem Feind zu vermeiden oder zu unterbrechen. Diese Methode erzeugt dicken schwarzen Rauch, der dazu neigt, hoch über das Wasser zu steigen, was sie nicht wirklich effektiv macht."
 smoke_generator:0 "Rauchgeneratoren"
 smoke_generator_desc:0 "Durch geringfügige Modifikationen an den Motoren und Schornsteinen leichter und mittlerer Schiffe können diese nun viel Rauch erzeugen, um den Kontakt mit dem Feind zu vermeiden oder zu unterbrechen. Durch die Anreicherung mit bestimmten Chemikalien wie Titantetrachlorid wird der Rauch weiß und bleibt dicht über dem Meeresspiegel. Dies ist wesentlich effektiver als die ursprüngliche Methode."
 sniper_1900:0 "Scharfschützenkompanie I"
 sniper_1900_desc:0 "Ein Scharfschütze ist ein militärischer/paramilitärischer Schütze, der Ziele aus versteckten Positionen oder aus Entfernungen angreift, die die Ortungsfähigkeit des Ziels übersteigen. Scharfschützen verfügen in der Regel über eine spezielle Ausbildung und sind mit hochpräzisen Gewehren und hochvergrößernden Zielfernrohren ausgestattet. Oftmals fungieren sie auch als Späher/Beobachter, die taktische Informationen an ihre Einheiten oder Kommandozentralen weitergeben. Neben der Treffsicherheit auf große Entfernungen und hoher Schussstärke sind militärische Scharfschützen in einer Vielzahl von Spezialtechniken ausgebildet: Ortung, Pirsch, Methoden zur Zielentfernungsschätzung, Tarnung, Feldtechnik, Infiltration, Spezialaufklärung und -beobachtung, Überwachung und Zielerfassung."
