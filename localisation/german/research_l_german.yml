 attritional_containment:0 "Abnutzungseindämmung"
 attritional_containment_desc:0 "Wenn es uns nicht gelingt, einen Angriff zu starten, um eine feindliche Stellung zu entfernen, muss diese dennoch ständig kleineren Angriffen ausgesetzt werden, die Verluste verursachen und den Feind daran hindern, eigene Angriffe zu starten."
 backhand_blow:0 "Rückhandschlag"
 backhand_blow_desc:0 "Anstatt um jeden Zentimeter Boden zu kämpfen, werden feindliche Durchbrüche weitgehend vermieden, bis sich die feindlichen Truppen ausgebreitet haben. Dann können sie durch Gegenangriffe abgeschnitten und zerstört werden."
 base_cost:0 "Grundkosten"
 base_strike:0 "Basisschlag"
 base_strike_desc:0 "Angriffe auf die feindlichen Häfen werden den Wiederaufbau der Flotte unmöglich machen. Dadurch können wir die Meere allein durch unsere Übermacht beherrschen.\n\n"
 base_strike_main:0 "Basisangriffsdoktrin"
 basic_battery:0 "Marineartillerie"
 basic_battery_desc:0 "Grundlegender Entwurf für die Übungs- und Höhenmechanik von Schiffsgeschützen."
 basic_cruiser_armor_scheme:0 "Grundlegendes Kreuzerpanzerungsschema"
 basic_cruiser_armor_scheme_desc:1 "Ein Panzerungsschema, das die Aufteilung zwischen Gürtel- und Deckpanzerung der Großkampfschiffe kopiert und einen gewissen Schutz gegen Splitter und kleinkalibrige Geschütze bietet.\n\nDie Montage dieses Moduls auf §YCruisern§! verbessert ihre Fähigkeit, §Yfeindlichen Schäden standzuhalten§!, §Rreduziert§! aber auch ihre §YGeschwindigkeit§!."
 basic_decryption:1 "Entschlüsselung - Frequenzanalyse"
 basic_decryption_desc:0 "Die Kryptoanalyse entwickelt sich zunehmend zu einer fortgeschrittenen mathematischen Wissenschaft. Systeme wie Karteikarten und Geräte wie Fahrradcomputer können die notwendige Arbeit erleichtern."
 basic_depth_charges:0 "Grundlegende Wasserbomben"
 basic_depth_charges_desc:1 "Ein einfacher Sprengstoffbehälter mit einem druckempfindlichen Auslöser explodiert, wenn er eine voreingestellte Tiefe erreicht. \n\nDie Montage dieses Moduls auf §YLeichten Schiffen§! und §YCruisern§! ermöglicht es ihnen, feindliche §YU-Boote§! anzugreifen."
 basic_encryption:1 "Verschlüsselung – Polyalphabetische Chiffren"
 basic_encryption_desc:0 "Neue Kommunikationsmethoden bringen neue Abhörrisiken mit sich. Rotorchiffriermaschinen ermöglichen eine schnelle und komplexe Verschlüsselung."
 basic_fire_control_system:0 "Grundlegendes Feuerleitsystem"
 basic_fire_control_system_desc:0 "Das gesamte Feuer der Schiffsgeschütze wird von einer zentralen Position aus gesteuert, wodurch eine engere Gruppierung der Schüsse gewährleistet und die Genauigkeit erhöht wird."
 basic_heavy_armor_scheme:0 "Schema der geneigten Gürtelpanzerung"
 basic_heavy_armor_scheme_desc:1 "Durch die schräge Platzierung der Gürtelpanzerung ist es bei gleichem Gewicht und gleicher Dicke wesentlich schwieriger, Panzerungen zu durchdringen.\n\nDie Montage dieses Moduls auf §Yschweren Schiffen§! verbessert deren Fähigkeit, §Yfeindlichen Schäden standzuhalten§!. §YSchlachtschiffe§! und §YSchlachtkreuzer§! werden durch ihre unterschiedlichen §YPanzerungsschemata§! definiert."
 basic_heavy_battery:0 "Einfache schwere Batterie"
 basic_heavy_battery_desc:1 "Ein gigantischer Turm mit massiven Geschützen unter schwerer Panzerung. \n\nDie Montage eines Moduls „Schwere Batterie“ erhöht den „Schweren Geschützangriff“ eines Schiffs und verbessert so die Leistung gegen feindliche „Großkampfschiffe“."
 basic_heavy_shell:0 "Panzerbrechende Granate mit Kappe"
 basic_heavy_shell_desc:0 "Durch die Anbringung einer ballistischen Haube können Granaten aerodynamischer gemacht werden, ohne dass ihre panzerbrechende Wirkung verloren geht."
 basic_light_battery:0 "Basic Light Batterie"
 basic_light_battery_desc:1 "Eine offene, angetriebene Halterung für ein Kleinkalibergeschütz zur Verwendung auf kleineren Schiffen.\n\nDie Montage dieses Moduls erhöht den §YAngriff mit leichtem Geschütz§!, was bei der Bekämpfung feindlicher §YAbschirmschiffe§! hilfreich ist."
 basic_light_shell:0 "Kleinkalibrige, halbpanzerbrechende Granate"
 basic_light_shell_desc:0 "Als Kompromiss zwischen panzerbrechender Leistung und Sprengkraft verursacht dieses Geschoss deutlich mehr Schaden, nachdem es die schwache Panzerung leichter Schiffe durchschlagen hat."
 basic_machine_tools:0 "Grundlegende Werkzeugmaschinen"
 basic_machine_tools_desc:0 "In der militärischen Produktion können zahlreiche neu entwickelte Fräsmaschinen eingesetzt werden, von den kleinen und vielseitigen Typen, die in jeder Maschinenwerkstatt erhältlich sind, bis hin zu den großen, fortschrittlichen Modellen, die die technologischen Grenzen verschieben."
 basic_medium_battery:0 "Grundlegende mittlere Batterie"
 basic_medium_battery_desc:1 "Ein angetriebener Turm mit zwei oder drei Geschützen mittleren Kalibers für den Einsatz auf Kreuzern. \n\nDer Einbau eines Moduls „Leichte mittlere Batterie“ erhöht den „Angriff mit leichtem Geschütz“ und hilft so beim Kampf gegen feindliche „Abschirmschiffe“. Der Einbau eines Moduls „Mittlere Batterie“ erhöht den „Angriff mit schwerem Geschütz“ und hilft so beim Kampf gegen feindliche „Großkampfschiffe“."
 basic_medium_shell:0 "Panzerbrechende mittlere Granate mit Kappe"
 basic_medium_shell_desc:0 "Durch die Anbringung einer ballistischen Haube können Granaten aerodynamischer gemacht werden, ohne dass ihre panzerbrechende Wirkung verloren geht."
 basic_naval_mines:0 "Kontakt Mine"
 basic_naval_mines_desc:0 "Eine einfache schwimmende Bombe, die am Meeresboden verankert ist. Die Mine explodiert, wenn sie mit einem Schiff in Berührung kommt."
 basic_secondary_battery:0 "Kasematten-Sekundärbatterie"
 basic_secondary_battery_desc:1 "Diese kleineren Kanonen sind in Öffnungen entlang des Rumpfes angebracht und bieten dem Schiff einen gewissen Schutz gegen kleinere Schiffe, haben aber ein eingeschränktes Schussfeld.\n\nDie Montage eines Moduls vom Typ „Sekundärbatterie“ verleiht einem „Kreuzer“§!, „Träger“§! oder „Schweren Schiff“§! eine geringe Menge an „Angriff mit leichtem Geschütz“§! und ermöglicht es ihm, ein zweites Ziel anzugreifen."
 ship_hull_cruiser_1:0 "1922 Kreuzerrumpf"
 basic_ship_hull_cruiser:0 "1936 Kreuzerrumpf"
 ship_hull_heavy_1:0 "1922 Schwerer Schiffsrumpf"
 basic_ship_hull_heavy:0 "1936 Schwerer Schiffsrumpf"
 basic_ship_hull_heavy_short:0 "1936 Schwerer Schiffsrumpf"
 basic_submarine_snorkel:0 "Einfacher U-Boot-Schnorchel"
 basic_submarine_snorkel_desc:1 "Ein einfacher Luftschlauch, der vom Maschinenraum zum Kontrollturm führt. Im ausgefahrenen Zustand kann das U-Boot seine Motoren laufen lassen und aufladen, während es noch unter Wasser ist.\n\nDie Montage dieses Moduls auf §YU-Booten§! verringert deren §YSichtbarkeit§! und macht sie schwerer zu entdecken."
 early_torpedo:0 "Früher Torpedo"
 early_torpedo_desc:1 "Eine selbstangetriebene Waffe mit einem explosiven Gefechtskopf, die auf einem vorbestimmten Kurs fliegt, bis sie das Ziel unterhalb der Wasserlinie trifft.\n\nDie Montage dieses Moduls auf §YLeichten Schiffen§! oder §YKreuzern§! ermöglicht es diesen, erheblichen Schaden an feindlichen §YGroßkampfschiffen§! zu verursachen."
 basic_torpedo:0 "Einfacher Torpedo"
 basic_torpedo_desc:1 "Eine selbstangetriebene Waffe mit einem explosiven Gefechtskopf, die auf einem vorbestimmten Kurs fliegt, bis sie das Ziel unterhalb der Wasserlinie trifft.\n\nDie Montage dieses Moduls auf §YLeichten Schiffen§! oder §YKreuzern§! ermöglicht es diesen, erheblichen Schaden an feindlichen §YGroßkampfschiffen§! zu verursachen."
