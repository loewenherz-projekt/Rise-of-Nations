 icbm_equipment_1:0 "ICBM I"
 icbm_equipment_1_desc:0 "Eine Interkontinentalrakete (ICBM) ist eine gelenkte ballistische Rakete mit einer Mindestreichweite von 5.500 Kilometern (3.400 Meilen), die in erster Linie für den Einsatz von Atomwaffen (mit einem oder mehreren thermonuklearen Sprengköpfen) konzipiert ist. Ebenso können konventionelle, chemische und biologische Waffen mit unterschiedlicher Wirksamkeit eingesetzt werden, wurden jedoch noch nie auf ICBMs eingesetzt."
 icbm_equipment_1_short:0 "ICBM I"
 icbm_equipment_2:0 "ICBM II"
