 carousel_bombing:0 "Karussell-Bombenanschlag"
 carousel_bombing_desc:0 "Bomber wollen oft einfach alle Bomben abwerfen, sobald sie ihr Zielgebiet erreichen, und dann so schnell wie möglich nach Hause fliegen. Während dies bei Flächenbombardements funktionieren kann, ist es bei kleinen Zielen effektiver, über dem Ziel zu verweilen und jeweils nur einen Teil der Bombenladung abzuwerfen, um maximale Genauigkeit zu erzielen."
