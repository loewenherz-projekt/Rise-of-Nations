 tech_sniper2:0 "Scharfschützenkompanie VIII"
 tech_sniper2_desc:0 "Ein Scharfschütze ist ein militärischer/paramilitärischer Schütze, der Ziele aus versteckten Positionen oder aus Entfernungen angreift, die die Ortungsfähigkeit des Ziels übersteigen. Scharfschützen verfügen in der Regel über eine spezielle Ausbildung und sind mit hochpräzisen Gewehren und hochvergrößernden Zielfernrohren ausgestattet. Oftmals fungieren sie auch als Späher/Beobachter, die taktische Informationen an ihre Einheiten oder Kommandozentralen weitergeben. Neben der Treffsicherheit auf große Entfernungen und hoher Schussstärke sind militärische Scharfschützen in einer Vielzahl von Spezialtechniken ausgebildet: Ortung, Pirsch, Methoden zur Zielentfernungsschätzung, Tarnung, Feldtechnik, Infiltration, Spezialaufklärung und -beobachtung, Überwachung und Zielerfassung."
