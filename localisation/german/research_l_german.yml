 infantry_equipment_x_10:0 "2030 Infanterieausrüstung"
 infantry_equipment_x_10_desc:0 "Bessere Geräteanordnungen und Gewichtsreduzierungen haben zu großen Fortschritten bei Effizienz und Leistung geführt."
