 scout_plane1:0 "Aufklärungsflugzeug I"
 scout_plane1_desc:0 "Das Sammeln von Informationen über feindliche Truppenbewegungen und die Bereitstellung von Berichten über feindliche Marineeinsätze war seit ihrem ersten Einsatz im Ersten Weltkrieg die ursprüngliche Aufgabe von Flugzeugen und ist noch immer eine wichtige Aufgabe."
