 advanced_naval_mines:0 "Akustische Mine"
 advanced_naval_mines_desc:0 "Dieser Typ von Seemine detoniert, wenn seine Sensoren das Geräusch eines nahegelegenen Schiffes registrieren."
 advanced_oil_processing:0 "Fortschrittliche Ölverarbeitung"
 advanced_oil_processing_desc:0 "Neue experimentelle Reinigungstechniken wie Hydrotreating können bei der Ölherstellung eingesetzt werden, um das Endprodukt erheblich zu verbessern."
 advanced_rocket_engines:0 "Fortschrittliche Raketentriebwerke"
 advanced_rocket_engines_desc:0 "Die Zukunft der Raketentechnik eröffnet Möglichkeiten wie Interkontinentalraketen, deren Reichweite kaum Grenzen kennt, während die Nutzlasten immer tödlicher werden."
 advanced_rubber_processing:0 "Fortschrittliche Gummiverarbeitung"
 advanced_rubber_processing_desc:1 "Ein universelles Rezept für synthetischen Kautschuk mit verbesserten Prozessen wie etwa Polymerisationsmodifikatoren auf Basis von Dodecylmercaptan wird es uns ermöglichen, die Produktion synthetischen Kautschuks auszuweiten."
 advanced_ship_torpedo_launcher:0 "Fortschrittlicher Schiffstorpedowerfer"
 advanced_ship_torpedo_launcher_desc:1 "Rohre mit größerem Durchmesser ermöglichen größere Torpedos mit schwereren Sprengköpfen.\n\nDie Montage dieses Moduls auf §YLeichten Schiffen§! oder §YKreuzern§! ermöglicht es diesen, erheblichen Schaden an feindlichen §YGroßkampfschiffen§! anzurichten."
 advanced_special_forces:0 "Erweitertes Spezialkräfte-Training"
 advanced_special_forces_desc:0 "Durch umfassendes Training können wir sicherstellen, dass unsere Spezialkräfte über die Leistungsfähigkeit normaler Männer hinausgehen."
 advanced_submarine_warfare:0 "Fortgeschrittene U-Boot-Kriegsführung"
 advanced_submarine_warfare_desc:0 "Eine massive Verbesserung der Kommunikation zwischen unseren U-Booten ermöglicht es ihnen, Angriffe perfekt zu timen. Wenn sie uns endlich sehen, werden sie von einem sinkenden Schiff aus sein."
