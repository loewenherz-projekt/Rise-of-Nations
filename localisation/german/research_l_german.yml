 rocket_artillery2_md_desc:0 "Selbstfahrende Artillerie mit mehreren Raketen kann rasch große Zerstörungen anrichten und gleichzeitig mobil bleiben, um Gegenfeuer zu vermeiden."
 rocket_artillery3:0 "Raketenartillerie-Upgrade II"
 rocket_artillery3_desc:0 "Wir opfern Reichweite für Wirkung und können schwerere Raketen auf größeren Fahrzeugen montieren. Diese Artilleriebatterien operieren in Teams und können zusammenarbeiten, um schnell nachzuladen und die Position zu wechseln."
 rocket_artillery3_md:0 "Moderne Raketenartillerie-Upgrade II"
 rocket_artillery3_md_desc:0 "Wir opfern Reichweite für Wirkung und können schwerere Raketen auf größeren Fahrzeugen montieren. Diese Artilleriebatterien operieren in Teams und können zusammenarbeiten, um schnell nachzuladen und die Position zu wechseln."
 rocket_artillery4:0 "Raketenartillerie III"
 rocket_artillery4_desc:0 "Drallstabilisierte Raketen können die Reichweite leichterer Artilleriebatterien erhöhen."
 rocket_artillery4_md:0 "Raketenartillerie III"
 rocket_artillery4_md_desc:0 "Drallstabilisierte Raketen können die Reichweite leichterer Artilleriebatterien erhöhen."
 rocket_artillery_a:0 "Verbesserte Raketenartillerie"
 rocket_artillery_a_desc:0 "Eines können wir mit Sicherheit sagen: Wir werden über wesentlich leichtere und stärkere Materialien verfügen, was die Kosten für Raketen senken wird."
 rocket_artillery_b:0 "Fortgeschrittene Raketenartillerie-Upgrade II"
 rocket_artillery_b_desc:0 "Die Raketen ... können so leistungsstark gebaut werden, dass sie einen Menschen in die Luft befördern könnten. Versuchen Sie also, nicht auf dem Mond zu landen, ok?"
 rocket_artillery_d:0 "Halbmoderne Raketenartillerie-Upgrade"
 rocket_artillery_d_desc:0 "Raketen mit erhöhter Geschwindigkeit und Startkraft."
 rocket_artillery_e:0 "Halbmoderne Raketenartillerie, Upgrade II"
 rocket_artillery_e_desc:0 "Das Gehäuse der Einheit wurde verbessert, was zu einer Steigerung der Effizienz und Zuverlässigkeit führt."
