 tech_signal_company2:0 "Signalkompanie VIII"
 tech_signal_company2_desc:0 "Ein Fernmeldekorps ist eine militärische Einheit, die für die militärische Kommunikation (Signale) zuständig ist. Viele Länder unterhalten ein Fernmeldekorps, das in der Regel der Armee des jeweiligen Landes unterstellt ist. Die militärische Kommunikation erfolgt in der Regel über Funk, Telefon und digitale Kommunikation."
