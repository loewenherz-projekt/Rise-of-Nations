 shocktroops4_desc:0 "Stoßtruppen werden eingesetzt, um die Verteidigungslinien des Gegners heftig anzugreifen und an bestimmten Stellen einen Durchbruch zu erzielen. Diese Einheiten haben eine höhere Durchbruchskraft und eine höhere Angriffskraft als normale Infanterie. Allerdings verbrauchen Stoßtruppen auch mehr Vorräte und benötigen eine längere Erholungszeit."
