 super_heavy_tank_destroyer_equipment_x_2:0 "Moderner superschwerer SP-Jagdpanzer"
 super_heavy_tank_destroyer_equipment_x_2_desc:0 "Diese Bestien sind die ultimative Antwort auf jede Art von Rüstung und müssen nicht heimlich sein. Ihre Rüstung ist außergewöhnlich und ihre Waffen die tödlichsten. Ihre Bewegung jedoch …"
