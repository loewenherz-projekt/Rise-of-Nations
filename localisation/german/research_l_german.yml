 excavation_tech:0 "Aushubtechnologien"
 experimental_rockets:0 "Experimentalraketen"
 experimental_rockets_desc:0 "Durch die Weiterentwicklung der Raketenwissenschaft durch die Verbesserung der Reichweite und Zuverlässigkeit von Flüssigtreibstoffraketen werden wir genug über die Technologie lernen, um den Bau von Startplätzen für modernere Modelle zu ermöglichen."
 extreme_environment_training:0 "Training in extremen Umgebungen"
 extreme_environment_training_desc:0 "Wir müssen in der Lage sein, unter den härtesten Bedingungen zu kämpfen. Mit der richtigen Ausbildung und Ausrüstung sind unsere Truppen in der Lage, auch unter extremsten Bedingungen zu kämpfen."
 field_hospital_1900:0 "Feldlazarett I"
 field_hospital_1900_desc:0 "Ein Feldlazarett ist ein provisorisches Krankenhaus oder eine mobile medizinische Einheit, die sich vor Ort um Verletzte kümmert, bevor diese sicher in dauerhaftere Einrichtungen transportiert werden können."
 field_hospital_1904:0 "Feldlazarett II"
 field_hospital_1904_desc:0 "Ein Feldlazarett ist ein provisorisches Krankenhaus oder eine mobile medizinische Einheit, die sich vor Ort um Verletzte kümmert, bevor diese sicher in dauerhaftere Einrichtungen transportiert werden können."
