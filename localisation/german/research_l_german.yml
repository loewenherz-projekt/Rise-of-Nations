 monopulse_radar:0 "Monopulsradar"
 monopulse_radar_desc:0 "Trotz unserer fortschrittlichen Radargeräte gibt es für den Feind immer noch Möglichkeiten, der Entdeckung zu entgehen. Neue Entwicklungen wie das Puls-Doppler-Radar ermöglichen es uns, viele dieser Einschränkungen unserer Ausrüstung zu beseitigen."
 advanced_computing_machine:0 "Fortschrittliche Rechenmaschine"
 advanced_computing_machine_desc:0 "Wenn wir mit der Arbeit an Computern beginnen, die Programme speichern und Transistoren nutzen können, befinden wir uns auf dem Weg zu einer digitalen Revolution, in der diese Maschinen in nahezu jedem Bereich eingesetzt werden können."
 advanced_cruiser_armor_scheme:0 "Alles-oder-Nichts-Panzerungsschema für Kreuzer"
 advanced_cruiser_armor_scheme_desc:1 "Dieses Schema konzentriert sich darauf, nur die wichtigsten Bereiche des Schiffs zu schützen und die unwichtigen Teile zu ignorieren. \n\nDie Montage dieses Moduls auf §YCruisern§! verbessert ihre Fähigkeit, §Yfeindlichen Schäden standzuhalten§!, §Rreduziert§! aber auch ihre §YGeschwindigkeit§!."
 advanced_decryption:1 "Entschlüsselung – Automatisierte Ableitung"
 advanced_decryption_desc:0 "Die gesteigerte Rechenleistung, die unsere Kryptoanalyse bisher verbessert hat, könnte in Zukunft nahezu unknackbare Chiffren hervorbringen. Um die Nase vorn zu behalten, müssen wir bereit sein, intensiver an der Gewinnung von Insiderinformationen über diese Technologie zu arbeiten."
 advanced_depth_charges:0 "Wasserbombenmörser"
 advanced_depth_charges_desc:1 "Ein Mörser an Bord des Zerstörers kann eine Sprengladung viel weiter schleudern, sodass das Schiff während des gesamten Angriffs Sonarkontakt mit dem U-Boot halten kann und seine Genauigkeit dramatisch erhöht wird.\n\nDie Montage dieses Moduls auf §YLeichten Schiffen§! und §YKreuzern§! ermöglicht ihnen den Angriff auf feindliche §YU-Boote§!."
 advanced_encryption:1 "Verschlüsselung - Pulscodemodulation"
 advanced_encryption_desc:0 "Technologische Verbesserungen und hart erarbeitete Erfahrungen ermöglichen es uns, mehr Maßnahmen zur Verkehrsflusssicherheit in unserer Kommunikation zu implementieren."
 advanced_equipment_conversion:0 "Erweiterte Gerätekonvertierung"
 advanced_equipment_conversion_desc:0 "Durch die Einrichtung spezialisierter Teams und Fließbänder zur Umrüstung unserer veralteten Modelle bleibt unsere Kriegsmaschinerie jederzeit tödlich."
 advanced_fire_control_system:0 "Erweitertes Feuerleitsystem"
 advanced_fire_control_system_desc:0 "Ein großer und komplexer mechanischer Computer, der eine große Anzahl von Eingaben sowohl über das Ziel und das feuernde Schiff als auch über Wetterbedingungen und Seegang verfolgt, ermöglicht sehr genaue ballistische Berechnungen."
 advanced_firebases:0 "Erweiterte Feuerbasen"
 advanced_firebases_desc:0 "Artillerielager können in befestigten Stützpunkten nahe der Frontlinien positioniert werden, um vorrückenden Streitkräften die größtmögliche Unterstützung zu bieten."
 advanced_heavy_battery:0 "Fortschrittliche schwere Batterie"
 advanced_heavy_battery_desc:1 "Verbesserte Rückstoßminderungsmechanismen und Verzögerungsspulen verringern Störungen durch Granaten im Flug und erhöhen die Genauigkeit erheblich. \n\nDie Montage eines Moduls „Schwere Batterie“ erhöht den „Schweren Geschützangriff“ eines Schiffs und verbessert so die Leistung gegen feindliche „Großkampfschiffe“."
 advanced_heavy_battery_x2:0 "Erweiterte Schwere Batterie II"
 advanced_heavy_battery_x2_desc:0 "Dieses schwer gepanzerte Geschütz ist die ultimative Weiterentwicklung schwerer Feuerkraft und ermöglicht ein hohes Maß an Genauigkeit über große Entfernungen."
