 construction2:0 "Konstruktion II"
 construction2_desc:0 "Die Modernisierung unserer Werkzeuge und Geräte wird unsere Baubemühungen weiter unterstützen."
 construction3:0 "Konstruktion III"
 construction3_desc:0 "Durch den Einsatz moderner Fahrzeuge und die Erfahrungen aus unseren Fortschritten im Bauwesen können Reparaturen erheblich beschleunigt werden."
 construction4:0 "Konstruktion IV"
