 high_level_bombing:0 "Bombenangriffe auf hoher Ebene"
 high_level_bombing_desc:0 "Aus größeren Höhen können wir Luftangriffen und Flugabwehrwaffen ausweichen. Das Abwerfen von Bomben aus größerer Höhe erfordert zwar mehr Präzision, ist aber sicherer."
 holographic_sight:0 "Holographisches Visier"
 holographic_sight_desc:0 "Platzhalter"
 home_defence:0 "Heimverteidigung"
 home_defence_desc:0 "Bodenaufklärer sowie Ortungs- und Abhörposten arbeiten mit unserer Luftwaffe zusammen, um feindliche Angriffe aufzuspüren und zu vereiteln."
 homing_torpedo:0 "Zielsuchender Torpedo"
 homing_torpedo_desc:0 "Ausgestattet mit einem akustischen Detektor kann der Torpedo die größte Lärmquelle vor ihm anpeilen – normalerweise das Ziel."
 hospital_tech:0 "Feldlazarette"
 human_infantry_offensive:0 "Infanterieoffensive"
 human_infantry_offensive_desc:0 "Der Offensivgeist der Infanterie ist das entscheidende Element für den Sieg in Schlachten. Unsere Infanterie muss die Führung übernehmen."
 human_wave_offensive:0 "Menschliche Wellenoffensive"
 human_wave_offensive_desc:0 "Eine Human Wave Offensive ist eine Infanterietaktik, bei der ein Angreifer mit dicht gedrängten Infanterieformationen einen Frontalangriff auf die feindliche Linie durchführt, mit der Absicht, die Verteidiger im Nahkampf zu überrennen."
 hunt_and_destroy:0 "Jagen und Zerstören"
 hunt_and_destroy_desc:0 "CAS-Einheiten können nicht nur direkte Feuerunterstützung leisten, sondern auch selbstständig nach Zielen suchen und dabei feindliche Bodentruppen oft unerwartet angreifen, wenn diese sich in Richtung Front bewegen."
 hunter_killer_groups:0 "Hunter-Killer-Gruppen"
 hunter_killer_groups_desc:0 "Zerstörer bilden Gruppen, um feindliche U-Boote zu jagen. Die vereinten Kräfte von Aufklärungs- und Jagdspezialisten bilden ein fantastisches Killerteam."
