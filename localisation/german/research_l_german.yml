 dispersed_industry2_desc:0 "Eine weitere Dezentralisierung unserer Produktion macht es schwieriger, bestimmte Teile davon anzugreifen."
 dispersed_industry3:0 "Verteilte Industrie III"
 dispersed_industry3_desc:0 "Wenn Fabriken unter dem Deckmantel anderer Betriebe betrieben werden, verringert sich das Risiko direkter Angriffe."
 dispersed_industry4:0 "Verteilte Industrie IV"
 dispersed_industry4_desc:0 "Durch die Tarnung und Streuung unserer Fabriken entsteht ein Netzwerk, das nur sehr schwer vollständig zerstört werden kann."
 dispersed_industry5:0 "Verteilte Industrie V"
 dispersed_industry5_desc:0 "Indem wir nicht nur unsere Industrie, sondern auch die sie verbindende Infrastruktur im Geheimen betreiben, können wir es noch schwieriger machen, sie durch Luftangriffe zu zerstören."
 dispersed_industry:0 "Verteilte Industrie I"
 dispersed_industry_a:0 "Frühe 3D-Fertigung"
 dispersed_industry_a_desc:0 "Platzhalter"
 dispersed_industry_b:0 "Grundlegende 3D-Fertigung"
 dispersed_industry_b_desc:0 "Platzhalter"
 dispersed_industry_c:0 "Verbesserte 3D-Fertigung"
 dispersed_industry_c_desc:0 "Platzhalter"
 dispersed_industry_category:0 "Technologien für verteilte Industrien"
 dispersed_industry_d:0 "Fortschrittliche 3D-Fertigung"
 dispersed_industry_d_desc:0 "Platzhalter"
 dispersed_industry_desc:0 "Durch die Ausbreitung unserer Industrien können wir dafür sorgen, dass es für den Feind in Kriegszeiten schwierig wird, sie anzugreifen.\n\n"
 dispersed_industry_e:0 "Fertigung im Nanomaßstab"
 dispersed_industry_e_desc:0 "Platzhalter"
 dispersed_industry_f:0 "Orbitale Schwerelosigkeitsfabriken"
 dispersed_industry_f_desc:0 "Platzhalter"
 dispersed_support:0 "Verteilte Unterstützung"
 dispersed_support_desc:0 "Durch die Verteilung unserer Unterstützungseinheiten können diese ein größeres Gebiet abdecken und gleichzeitig außerhalb der Schusslinie bleiben, was zu einer besseren Verteidigung der Divisionen führt.\n\n"
 dive_bombing:0 "Sturzbombenangriff"
 dive_bombing_desc:0 "Sturzbomben ermöglichen eine höhere Genauigkeit, für optimale Ergebnisse sind jedoch Spezialflugzeuge erforderlich, die sowohl in der Lage sind, ihren Sturzflug zu verlangsamen als auch die Belastungen beim Herausziehen aus dem Sturzflug zu überstehen."
 dogfighting_experience:0 "Hundekampf-Erfahrung"
 dogfighting_experience_desc:0 "Es ist nicht einfach, im hektischen Getümmel eines Luftkampfes die relativen Positionen von Freund und Feind im Auge zu behalten, aber mit zunehmender Erfahrung werden unsere Piloten darin geschickter."
 dp_secondary_battery:0 "Sekundärbatterie mit doppeltem Verwendungszweck"
 dp_secondary_battery_desc:1 "Die Kombination von Schiffsabwehr- und Flugabwehrgeschützen in einer einzigen Halterung ermöglicht mehr Flexibilität und spart Gewicht.\n\nDie Montage eines Moduls „Sekundärbatterie“ verleiht einem „Kreuzer“!, „Träger“! oder „Schweren Schiff“§! einen geringen „Angriff mit leichtem Geschütz“§! und ermöglicht den Angriff auf ein zweites Ziel. Dieses Modul erhöht außerdem den „Angriff mit Flugabwehr“§!."
 early_helicopter:0 "Hubschrauber-Prototyp"
 early_helicopter_desc:0 "Um das volle Potenzial von Hubschraubern auszuschöpfen, müssen wir zunächst einen Prototyp bauen und testen."
 early_helicopter_short:0 "Hubschrauber-Prototyp"
 early_infantry_equipment_1890:0 "Frühes Gewehr 1890"
 early_infantry_equipment_1900:0 "Frühes Gewehr 1900"
 early_infantry_equipment_1902:0 "Frühes Gewehr 1902"
 early_infantry_equipment_1904:0 "Frühes Gewehr 1904"
 early_infantry_equipment_1906:0 "Frühes Gewehr 1906"
 early_infantry_equipment_1908:0 "Frühes Gewehr 1908"
 early_refining:0 "Frühe Raffination"
 early_refining_desc:0 "Rohöl kann zu einer Reihe von Substanzen und Materialien raffiniert werden, die für jeden modernen Krieg von entscheidender Bedeutung sind. Um eine moderne Industrie aufzubauen, ist es notwendig, bei diesen Methoden die Nase vorn zu behalten."
 early_ship_hull_carrier:0 "Deckumbauten"
 early_ship_hull_carrier_desc:0 "Durch den Umbau alter Rümpfe können Marineflieger kostengünstig Erfahrungen im Bau und Betrieb von Flugzeugträgern sammeln. Diese Schiffe sind weniger leistungsfähig als speziell gebaute Flugzeugträger, dafür aber deutlich schneller zu bauen."
 early_ship_hull_carrier_short:0 "Deckumbauten"
 elastic_defence:0 "Elastische Verteidigung"
 elastic_defence_desc:0 "Anstatt alle Kräfte auf die Frontlinie zu konzentrieren, schafft eine elastische Verteidigung eine „tiefere“ Verteidigungsschicht, die dem Verteidiger mehr Zeit zum Reagieren und Gegenangriffen gibt, während der Angreifer verstreut und festgefahren ist."
 electric_torpedo:0 "Elektrischer Torpedo"
 electric_torpedo_desc:0 "Anstatt eine leicht erkennbare Blasenspur zu hinterlassen, bleibt ein Torpedo mit Elektromotor bis zum Aufprall praktisch unsichtbar. Das bedeutet auch, dass es keine Spur gibt, die zum startenden U-Boot zurückführt."
 electronic_mechanical_engineering:0 "Elektromechanischer Maschinenbau"
 electronic_mechanical_engineering_desc:0 "Wir leben in einer Zeit, in der elektrische Maschinen uns nicht mehr nur wärmen und beleuchten, sondern uns auch beim Denken und Kommunizieren helfen. Elektronik wird im kommenden Jahrhundert eine Schlüsselrolle im militärischen Nachrichtendienst spielen."
 electronics:0 "Elektronik"
 electronics_folder:0 "Maschinenbau"
 electronics_folder_desc:0 "Ingenieurwesen, Radar, Verschlüsselung und Forschung zu Spitzentechnologien."
 elite_forces:0 "Elitetruppen"
 elite_forces_desc:0 "Nur die Besten der Besten werden zu Spezialeinheiten. Die Soldaten, die die Ausbildung bestehen, sind stärker, schneller und kämpfen härter als alle anderen."
 encryption_algorithm_1:0 "Verschlüsselungsalgorithmus I"
 encryption_algorithm_1_desc:0 ""
 encryption_algorithm_2:0 "Verschlüsselungsalgorithmus II"
 encryption_algorithm_2_desc:0 ""
 encryption_algorithm_3:0 "Verschlüsselungsalgorithmus III"
 encryption_algorithm_3_desc:0 ""
 encryption_tech:0 "Verschlüsselungsmethoden"
 encryption_tech_research:2 "Geschwindigkeit der Verschlüsselungsforschung"
 engineers_1904:0 "Pionierkompanie II"
 engineers_1904_desc:0 "Militärtechnik wird grob definiert als die Kunst, Wissenschaft und Praxis des Entwurfs und Baus militärischer Anlagen sowie der Instandhaltung militärischer Transport- und Kommunikationswege. Militäringenieure sind auch für die Logistik militärischer Taktiken verantwortlich. Moderne Militärtechnik unterscheidet sich vom Bauingenieurwesen. Im 20. und 21. Jahrhundert umfasst die Militärtechnik auch andere Ingenieurdisziplinen wie Maschinenbau und Elektrotechnik."
 engineers_1908:0 "Pionierkompanie III"
 engineers_1908_desc:0 "Militärtechnik wird grob definiert als die Kunst, Wissenschaft und Praxis des Entwurfs und Baus militärischer Anlagen sowie der Instandhaltung militärischer Transport- und Kommunikationswege. Militäringenieure sind auch für die Logistik militärischer Taktiken verantwortlich. Moderne Militärtechnik unterscheidet sich vom Bauingenieurwesen. Im 20. und 21. Jahrhundert umfasst die Militärtechnik auch andere Ingenieurdisziplinen wie Maschinenbau und Elektrotechnik."
 engineers_tech:0 "Ingenieure Technologie"
 escort_carriers:0 "Trägereskorte"
 escort_carriers_desc:0 "Das von Trägerflugzeugen abgedeckte Gebiet erleichtert die Eskortierung von Handelskonvois erheblich. Die Sicherung des Ressourcenflusses ist von entscheidender Bedeutung."
 escort_patrols:0 "Eskortpatrouillen"
 escort_patrols_desc:0 "Durch die verbesserte Ortung sind unsere Konvoi-Begleitschiffe für U-Boote deutlich gefährlicher. Da sie sich nirgends verstecken können, stellen sie keine wirkliche Bedrohung dar."
 escort_relay_system:0 "Eskort-Relaissystem"
 escort_relay_system_desc:0 "Von Kampfflugzeugen eskortierte Bomber verbessern unsere Reaktionsfähigkeit auf feindliches Feuer erheblich."
 etat_folder:0 "ET"
 etat_folder_desc:0 "Erweiterte Industrie und Ausrüstung"
 etax_folder:0 "SRD"
 etax_folder_desc:0 "Abteilung für Sonderforschung"
 excavation1:0 "Ausgrabung I"
 excavation1_desc:0 "Fortschritte in der Bohrtechnik ermöglichen es uns, Ressourcen auszugraben, die früher unerreichbar waren."
 excavation2:0 "Ausgrabung II"
 excavation2_desc:0 "Neue Techniken helfen uns, Ressourcen effizienter zu sammeln. Wir verunreinigen die Ressourcen bei der Gewinnung nicht mehr, was zu einer höheren Ausbeute führt."
 excavation3:0 "Ausgrabung III"
 excavation3_desc:0 "Fortschritte in der Geologie helfen uns dabei, die Standorte von Ressourcen zu bestimmen. Wir können unsere Abbaubemühungen nun auf Gebiete konzentrieren, in denen die Wahrscheinlichkeit größer ist, dass dort große Mengen natürlicher Ressourcen gefunden werden."
 excavation4:0 "Ausgrabung IV"
 excavation4_desc:0 "Durch die Automatisierung wichtiger Prozesse und die Weiterentwicklung der Mechanik werden alle unsere Ressourcenstandorte wesentlich effizienter."
 excavation5:0 "Ausgrabung V"
 excavation5_desc:0 "Fortschritte in Bereichen wie dem Tagebau ermöglichen uns eine höhere Ressourcenausbeute an unseren derzeitigen Abbaustätten."
