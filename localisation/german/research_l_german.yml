 tech_mountaineers2:0 "Gebirgsjäger II"
 tech_mountaineers2_desc:0 "Über das Überleben hinaus können unsere Truppen trainiert werden, die Berge zu ihrem Vorteil zu nutzen. Mit leichter Ausrüstung und Maultiertransporten können sie sich in diesem Gelände besser bewegen als andere Infanterieeinheiten."
 tech_mountaineers3:0 "Gebirgsjäger III"
 tech_mountaineers3_desc:0 "Die Vorbereitung auf die härtesten Gebirgseinsätze in großen Höhen und bei niedrigen Temperaturen erfordert von unseren Gebirgstruppen außerordentliches Training und Disziplin."
 tech_mountaineers:0 "Gebirgsjäger I"
 tech_mountaineers_desc:0 "Kämpfe in Gebirgsregionen setzen die Truppen vielen Gefahren aus, die sich jedoch manchmal nicht vermeiden lassen. Wir können diese Risiken minimieren, indem wir unseren Soldaten eine spezielle Ausbildung für diese Umgebung bieten."
 tech_recon2:0 "Aufklärungskompanie VIII"
 tech_recon2_desc:0 "Bei militärischen Operationen ist Aufklärung oder Erkundung die Erkundung eines Gebiets durch Streitkräfte, um Informationen über feindliche Streitkräfte, das Gelände und andere Aktivitäten zu erhalten. Beispiele für Aufklärung sind Patrouillen von Truppen (Plänkler, Langstreckenaufklärungspatrouille, US Army Rangers, Kavallerieaufklärer oder Spezialisten des militärischen Geheimdienstes), Schiffen oder U-Booten, bemannten oder unbemannten Aufklärungsflugzeugen, Satelliten oder die Einrichtung von Beobachtungsposten. Spionage wird üblicherweise als etwas anderes als Aufklärung angesehen, da sie von nicht uniformiertem Personal hinter den feindlichen Linien durchgeführt wird."
