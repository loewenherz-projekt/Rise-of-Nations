 continuous_offensive:0 "Kontinuierliche Offensive"
 continuous_offensive_desc:0 "Richtig ausgenutzte Durchbrüche sind zwar oft sehr effektiv, doch früher oder später ist der Angreifer immer erschöpft und der Verteidiger kann sich neu organisieren und neue Verteidigungslinien bilden. Mit genügend Reserven und der richtigen Organisation kann eine Offensive jedoch noch viel weiter fortgesetzt werden – mit verheerenden Folgen für den Feind."
 convoy_defense_tree:0 "Konvoi-Verteidigungsdoktrin"
 convoy_escorts:0 "Konvoi-Eskorten"
 convoy_escorts_bs:0 "Konvoi-Eskorten"
 convoy_escorts_bs_desc:0 "Schnelle Überwasserschiffe als Teil unserer Konvois ermöglichen es uns, feindliche U-Boote zu erkennen und rechtzeitig zu reagieren. Die Ortung ist der Schlüssel zur Beseitigung der U-Boot-Plage."
 convoy_escorts_desc:0 "Schnelle Überwasserschiffe als Teil unserer Konvois ermöglichen es uns, feindliche U-Boote zu erkennen und rechtzeitig zu reagieren. Die Ortung ist der Schlüssel zur Beseitigung der U-Boot-Plage."
