 decryption_tech_research:2 "Geschwindigkeit der Entschlüsselungsforschung"
 deep_operations:0 "Tiefe Operationen"
 deep_operations_desc:0 "Das Konzept der Tiefenoperationen oder Tiefenschlachten besteht darin, die Verteidigungslinien des Feindes an mehreren Punkten zu durchbrechen, seine operativen Reserven und seine operative Tiefe zu zerstören und einen möglichst großen Teil seiner strategischen Tiefe einzunehmen."
 defence_in_depth:0 "Tiefenverteidigung"
 defence_in_depth_desc:0 "Indem wir relativ geringen Widerstand leisten und vorübergehend nachgeben, können wir Raum gegen Zeit eintauschen und den angreifenden Kräften die Möglichkeit geben, sich zu erschöpfen, bevor sie zum Gegenangriff übergehen."
 degaussing:0 "Entmagnetisierung"
 degaussing_desc:0 "Durch die Installation leistungsstarker elektromagnetischer Spulen kann die magnetische Signatur eines Schiffes drastisch reduziert werden, wodurch es weitaus weniger anfällig für Magnetminen wird."
 delay:0 "Verzögerung"
 delay_desc:0 "Selbst wenn eine Schlacht nicht gewonnen werden kann, kann es von Vorteil sein, den Vormarsch der angreifenden Streitkräfte durch Hinterhalte und Verzögerungstaktiken zu verlangsamen."
 depth_charges_advice_tt:0 "\nDurch die Montage eines §YWasserbomben§!-Moduls auf §YLeichten Schiffen§! und §YKreuzern§! können diese feindliche §YU-Boote§! angreifen."
 desertinfantry:0 "Wüsteninfanterie"
 desertinfantry_at2:0 "Wüsteninfanterie II"
 desertinfantry_at2_desc:0 "Die sandigen Berge der Wüste können für Ihre reguläre Infanterie tückisch sein. Um in dieser Umgebung zurechtzukommen, können Sie Ihre Wüsteninfanterie trainieren, um in der Wüste die Oberhand zu gewinnen."
