 sonar_desc:1 "Ein Basissatz Hydrophone ermöglicht die Verfolgung von Unterwasserzielen durch Erkennung der von ihnen erzeugten Geräusche.\n\nDie Montage dieses Moduls in einem §YElektroniksteckplatz§! auf §YLeichten Schiffen§! oder §YKreuzern§! hilft ihnen bei der Erkennung feindlicher §YU-Boote§!."
