 coastal_submarine_1910:0 "Küsten-U-Boot III"
 coastal_submarine_1914:0 "Küsten-U-Boot IV"
 coastal_submarine_1918:0 "Küsten-U-Boot V"
 cold_war_engineering:0 "Ingenieurskunst im Kalten Krieg"
 cold_war_engineering_desc:0 "Die Technologie hat in den letzten 50 Jahren enorme Fortschritte gemacht. Die Menschheit hat sich von Mathematikern zu Computern und von Handwerkern zu Robotern entwickelt."
 combat_unit_destruction:0 "Zerstörung von Kampfeinheiten"
 combat_unit_destruction_desc:0 "Indem wir unsere CAS-Piloten darin schulen, dasselbe Ziel so lange wiederholt anzugreifen, bis dessen Zerstörung bestätigt ist, stellen wir sicher, dass die Ziele nach einem Beinahe-Treffer nicht allein gelassen werden."
 combined_arms:0 "Kombinierte Waffen"
 combined_arms_desc:0 "Panzer-, Infanterie- und Unterstützungseinheiten, die in gut organisierten Teams zusammenarbeiten, sind weitaus effektiver als dieselben Streitkräfte, wenn sie einzeln eingesetzt werden."
 combined_operations_raiding:0 "Kombinierte Operationen"
 combined_operations_raiding_desc:0 "Wir setzen alle Ressourcen für die Jagd auf feindliche Handelskonvois ein. Die Koordination zwischen unserer Hauptflotte und den U-Booten sorgt dafür, dass unsere Flotte stets in Alarmbereitschaft ist. Kein Schiff bleibt in unseren Gewässern unbemerkt."
 computing_machine:0 "Rechenmaschine"
 computing_machine_desc:0 "Die Entwicklung einer theoretischen Grundlage für moderne Computer und die Konstruktion elektromechanischer Maschinen, um mit deren praktischer Umsetzung zu beginnen, sind die ersten Schritte in dieses Reich der Möglichkeiten."
 computing_tech:0 "Computertechnologie"
 concentrated_fire_plans:0 "Konzentrierte Feuerpläne"
 concentrated_fire_plans_desc:0 "Durch die Konzentration des Feuers verschiedener Batterien in einem synchronisierten Bombardement kann dem Feind wesentlich größerer Schaden zugefügt werden.\n\n"
 concentrated_industry2:0 "Konzentrierte Industrie II"
 concentrated_industry2_desc:0 "Eine weitere Konzentration der Produktion wird dazu beitragen, die Kosten zu senken."
 concentrated_industry3:0 "Konzentrierte Industrie III"
 concentrated_industry3_desc:0 "Durch die Anpassung der Netzwerke an unsere stärker fokussierte Branche können die Infrastrukturkosten gesenkt werden."
 concentrated_industry4:0 "Konzentrierte Industrie IV"
 concentrated_industry4_desc:0 "Durch die räumliche Nähe der wichtigsten Punkte unserer Branche wird die Wirkung dieser konzentrierten Standorte erhöht."
 concentrated_industry5:0 "Konzentrierte Industrie V"
 concentrated_industry5_desc:0 "Große Industriekomplexe vereinen heute viele Teile unserer Industrie und minimieren so die Transport- und Arbeitskosten."
