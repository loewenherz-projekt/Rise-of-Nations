 wolfpacks:0 "Wolfsrudel"
 wolfpacks_desc:0 "Durch die Organisation unserer U-Boote in Gruppen wird die Koordination zwischen ihnen erheblich verbessert. Sobald ein Feind geortet wurde, lauert unser U-Boot, bis der Rest der Gruppe eintrifft, und greift nur an, wenn die Chancen eindeutig zu unseren Gunsten stehen."
 ww1_fortification3b:0 "Verteidigungsbunker I"
 ww1_fortification3b_desc:0 "Forts allein sind eine gute Verteidigungsanlage, aber wenn die Schützengräben vorrücken, bleibt nicht viel Platz oder Zeit für den Bau. Bunker sind kleiner und viel schneller zu errichten und können dazu beitragen, unsere Verteidigungslinien in befestigten Sektoren zu sichern."
 ww1_fortification5:0 "Verteidigungsbunker II"
 ww1_fortification5_desc:0 "Forts allein sind eine gute Verteidigungsanlage, aber wenn die Schützengräben vorrücken, bleibt nicht viel Platz oder Zeit für den Bau. Bunker sind kleiner und viel schneller zu errichten und können dazu beitragen, unsere Verteidigungslinien in befestigten Sektoren zu sichern."
 ww1_fortification6:0 "Verteidigungsbunker III"
