 nuclear_wip:0 "In Arbeit"
 nuclear_wip_desc:0 "Hey, wenn du das liest, fragst du dich wahrscheinlich, warum dieser Technologiebaum leer ist. Er wurde von einem anderen Mod übernommen und wir überarbeiten ihn gerade. Keine Sorge, du bekommst diese Technologien bald. ;)"
 nuke_naval:0 "Seemacht"
 nuke_naval_desc:0 "Wir haben die Theorie aufgestellt, dass unsere größten und leistungsstärksten Schiffe mit Atomreaktoren ausgestattet werden könnten. Hoffentlich finden wir mit der Zeit einen Weg, dies Wirklichkeit werden zu lassen."
 nukes:0 "Atombomben"
 nukes_1952:0 "Thermonukleare Bombe"
 nukes_1952_desc:0 "Eine thermonukleare Waffe oder Fusionswaffe ist eine Kernwaffe der zweiten Generation. Ihre höhere Komplexität im Vergleich zu reinen Spaltwaffen verleiht ihr möglicherweise eine deutlich höhere Zerstörungskraft als Atombomben der ersten Generation, eine kompaktere Größe, eine geringere Masse oder eine Kombination dieser Vorteile."
 nukes_2:0 "Thermonukleare Experimente"
 nukes_2_desc:0 "Es liegen Entwürfe für eine Bombe vor, die durch Kernspaltung eine noch stärkere Fusionsreaktion erzeugt. Damit dürften wir unsere Sprengkraft deutlich steigern können." 
 nukes_desc:0 "Das Projekt zum Bau einer Atombombe wird zu den geheimsten und schwierigsten Aufgaben gehören, die eine Nation in Angriff nehmen kann. Doch wenn es gelingt, könnte es nicht nur den Verlauf der heutigen Kriege, sondern auch die Zukunft der Welt verändern."
 offensive_formations:0 "Offensive Formationen"
 offensive_formations_desc:0 "Das Training in offensiveren Formationen macht unsere Kämpfer im Kampf tödlicher."
 oil1:0 "Offshore-Bohrungen"
 oil1_desc:0 "Platzhalter"
 oil2:0 "Massives hydraulisches Aufbrechen"
 oil2_desc:0 "Platzhalter"
 oil3:0 "Moderne Offshore-Bohrungen"
 oil3_desc:0 "Platzhalter"
 oil4:0 "Hydraulisches Fracking im Schiefergestein"
 oil4_desc:0 "Platzhalter"
 oil_processing:0 "Ölverarbeitung"
 oil_processing_desc:0 "Ein Netzwerk von Fabriken zur synthetischen Destillation und Raffination von Ölprodukten ist der nächste Schritt zur Sicherstellung der Kraftstoffversorgung unseres Landes."
 operational_concentration:0 "Operative Konzentration"
 operational_concentration_desc:0 "Der Schlüssel zu jeder militärischen Aktion ist die überwältigende lokale Überlegenheit. Wenn man nicht entlang der gesamten Front eine überwältigende Überlegenheit erreichen will, bedeutet dies, Teile der eigenen Frontlinie zu schwächen und Truppen dort zu konzentrieren, wo sie benötigt werden, anstatt zu versuchen, überall stark zu sein."
 operational_destruction:0 "Operative Zerstörung"
 operational_destruction_desc:0 "Angriffe auf die Versorgungslinien feindlicher Bodentruppen behindern deren Bewegung zwischen den Schlachtfeldern. Dies bedeutet einen Vorteil für unsere Armee bei Operationen in Gebieten mit Luftüberlegenheit."
 operational_integrity_tree:0 "Doktrin der operativen Integrität"
 overwhelming_firepower:0 "Überwältigende Feuerkraft"
 overwhelming_firepower_desc:0 "Der Einsatz aller verfügbaren Unterstützungseinheiten mit überwältigender Feuerkraft kann ein Ziel erheblich schwächen oder, noch besser, einem Angreifer den Tag ernsthaft verderben."
 paratroopers2:0 "Fallschirmjäger II"
 paratroopers2_desc:0 "Der Übergang von kleinen Operationen mit nur wenigen Fallschirmjägern zu größeren Luftlandedivisionen ebnet den Weg für massive Luftlandungen und macht diese Kräfte von einer Neuheit zu einem selbstverständlichen Bestandteil der Kriegsführung."
 paratroopers3:0 "Fallschirmjäger III"
 paratroopers3_desc:0 "Wenn Sie lernen, Fallschirmabwürfe an die Wetterbedingungen anzupassen, die Ausrüstung wie Sprungschuhe standardisieren und eine erweiterte Spezialausbildung absolvieren, können Sie die Verwirrung und die Risiken dieser gefährlichen Missionen minimieren."
 paratroopers:0 "Fallschirmjäger I"
 paratroopers_a:0 "Fallschirmjäger IV"
 paratroopers_a_desc:0 "Was hochgeht, muss auch wieder runterkommen."
 paratroopers_b:0 "Fallschirmjäger V"
 paratroopers_b_desc:0 "Was hochgeht, muss auch wieder runterkommen."
 paratroopers_c:0 "Fallschirmjäger VI"
 paratroopers_c_desc:0 "Was hochgeht, muss auch wieder runterkommen."
 paratroopers_desc:0 "Durch die Eingliederung von Luftlandetruppen in unsere Armee können wir gewaltsam eindringen und wichtige Truppen in bisher unzugänglichen Gebieten stationieren, was neue taktische Möglichkeiten eröffnet."
 pathfinder_groups:0 "Pathfinder-Gruppen"
 pathfinder_groups_desc:0 "Erfahrene Piloten sind mit den besten Werkzeugen ausgestattet, um Zielpositionen zu beleuchten. Weder Rauch noch schlechtes Wetter können die Bomber von ihrer Mission abhalten."
 peoples_army:0 "Volksarmee"
 peoples_army_desc:0 "Die Volksarmee glaubt an den Vorrang des Menschen vor der Waffe, wobei eine überlegene Motivation die unterlegene Technologie kompensiert, und genießt breite Unterstützung in der Zivilbevölkerung.\n\n"
 pocket_defence:0 "Taschenverteidigung"
 pocket_defence_desc:0 "Es ist möglich, dass unsere Truppen in der Defensive in einen Kessel geraten. In diesem Fall müssen sie lediglich ausharren, bis der unvermeidliche Gegenangriff sie ablöst."
 precision_guided_firearms:0 "Präzisionsgelenkte Schusswaffen"
 precision_guided_firearms_desc:0 "Platzhalter"
 prepared_defense:0 "Vorbereitete Verteidigung"
 prepared_defense_desc:0 "Umfangreichere Systeme zur Feldbefestigung verbessern die Verteidigung einer Einheit erheblich."
 protected_networks:0 "Geschützte Netzwerke"
 protected_networks_desc:0 "Mit dem Aufstieg des Internets haben Kriminelle die Gesetzgeber zu einer rein reaktiven Haltung gezwungen. Wir müssen Angriffe auf unsere nationalen Netzwerke verhindern."
 radar_tech:0 "RADAR-Technologie"
 radio:0 "Radio"
 radio_desc:0 "Durch die Übernahme der Erfindungen von Amateurfunkern und die Ausweitung der Nutzung des UKW-Radios werden Funkstörungen reduziert und wir können neue Einsatzmöglichkeiten für die Funktechnologie finden."
 radio_detection:0 "Funkerkennung"
 radio_detection_desc:0 "Die Entwicklung von RADAR (Radio Detection and Ranging) ermöglicht die Nutzung von Radiowellen zur Ortung physischer Objekte. Die Forschung wird streng geheim gehalten, da diese Erfindungen Auswirkungen auf die Ortung von Geräten haben könnten."
 raider_patrols:0 "Raider-Patrouillen"
 raider_patrols_desc:0 "Patrouillen sowohl schneller als auch waffenstarker Schiffe lassen den feindlichen Handelskonvois keine Verstecke. \nNicht nur U-Boote können jagen."
 rail_integration_system:0 "Schienenintegrationssystem"
 rail_integration_system_desc:0 "Platzhalter"
 railartillery_equipment:0 "Eisenbahnartillerieausrüstung"
 railartillery_equipment_1:0 "Grundlegende Eisenbahnartillerieausrüstung"
 railartillery_equipment_1_desc:0 "Ein Eisenbahngeschütz, auch Eisenbahnkanone genannt, ist ein großes Artilleriegeschütz, oft überschüssige Marineartillerie, das auf einem speziell konstruierten Eisenbahnwaggon montiert, von diesem transportiert und abgefeuert wird. Viele Länder haben Eisenbahngeschütze gebaut, die bekanntesten sind jedoch die großen Krupp-Geschütze, die Deutschland im Ersten und Zweiten Weltkrieg einsetzte. Eisenbahngeschütze sind durch den technologischen Fortschritt überholt. Ihre Größe und eingeschränkte Mobilität machen sie anfällig für Angriffe, und ähnliche Nutzlasten können von Flugzeugen, Raketen oder Flugkörpern abgeworfen werden."
 railartillery_equipment_1_short:0 "Einfache Eisenbahnartillerie"
 railartillery_equipment_2:0 "Verbesserte Eisenbahnartillerieausrüstung"
 railartillery_equipment_2_desc:0 "Ein Eisenbahngeschütz, auch Eisenbahnkanone genannt, ist ein großes Artilleriegeschütz, oft überschüssige Marineartillerie, das auf einem speziell konstruierten Eisenbahnwaggon montiert, von diesem transportiert und abgefeuert wird. Viele Länder haben Eisenbahngeschütze gebaut, die bekanntesten sind jedoch die großen Krupp-Geschütze, die Deutschland im Ersten und Zweiten Weltkrieg einsetzte. Eisenbahngeschütze sind durch den technologischen Fortschritt überholt. Ihre Größe und eingeschränkte Mobilität machen sie anfällig für Angriffe, und ähnliche Ladungen können von Flugzeugen, Raketen oder Flugkörpern abgeworfen werden."
