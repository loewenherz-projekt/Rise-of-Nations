 steel_production_1:0 "Stahlproduktion"
 steel_production_1_desc:0 "Dank der jüngsten Fortschritte in der Frästechnik können wir unsere Stahlproduktion nun steigern."
 steel_production_2:0 "Stahlproduktion II"
 steel_production_2_desc:0 "Fortschritte in der Walztechnik ermöglichen es uns, unsere Stahlproduktion moderat zu steigern."
 steel_production_3:0 "Stahlproduktion III"
 steel_production_3_desc:0 "Unsere Mahltechniken sind mittlerweile beachtlich und wir können regelmäßig eine ziemlich große Menge des Metalls produzieren, wenn wir dies wünschen."
 steel_production_4:0 "Stahlproduktion IV"
 steel_production_4_desc:0 "Unsere Stahlproduktion ist mittlerweile so weit fortgeschritten, dass wir den Markt praktisch überschwemmen können, sehr zur Erleichterung und Frustration anderer Nationen."
 strat_bomber:0 "Strategischer Bomber"
 strat_bomber_equipment:0 "Strategischer Bomber"
 strat_bomber_equipment_1:0 "Strategischer Bomber I"
 strat_bomber_equipment_1_desc:0 "Erfahrungen aus dem Ersten Weltkrieg und Studien seither zeigen, dass der nächste Krieg durch die Bombardierung feindlicher Militärziele und Großstädte gewonnen werden kann. Wir benötigen daher zumindest einen Bomber, der in der Lage ist, solche Zerstörungen anzurichten. Er muss hoch und schnell fliegen und eine hohe Nutzlast tragen. Dies erfordert eine große Flugzeugzelle mit mehreren Triebwerken. Zudem muss er über gewisse Verteidigungsfähigkeiten verfügen."
 strat_bomber_equipment_1_short:0 "Strat Bomber I"
 strat_bomber_equipment_2:0 "Strategischer Bomber II"
 strat_bomber_equipment_2_desc:0 "Bombenangriffe haben nachweislich einen positiven Einfluss auf die Fähigkeit des Gegners, Krieg zu führen. Mehr Verteidigungswaffen und höhere Geschwindigkeit ermöglichen es einem neuen Design, Zerstörung zu vermeiden, während eine höhere Nutzlast und Reichweite die Effektivität steigern."
 strat_bomber_equipment_2_short:0 "Strat Bomber II"
 strat_bomber_equipment_3:0 "Strategischer Bomber III"
 strat_bomber_equipment_3_desc:0 "Um Verluste durch feindliche Jäger und Bodenfeuer zu vermeiden, wird unser nächstes Modell in großer Höhe fliegen. Es wird größer sein, um sowohl eine enorme Nutzlast als auch mehr Treibstoff transportieren zu können und so die Reichweite zu erhöhen."
 strat_bomber_equipment_3_short:0 "Strat Bomber III"
 strat_bomber_equipment_desc:0 "Strategische Bomber greifen feindliche Gebäude und Infrastruktur an und berauben sie so wertvoller Industrie."
 strategic_destruction:0 "Strategische Zerstörung"
 strategic_destruction_desc:0 "Unsere Piloten können strategische Ziele viel schneller erreichen als unsere See- oder Landstreitkräfte. Ohne die Möglichkeit, ihre neuen Rekruten auszurüsten, werden wir den feindlichen Streitkräften bald zahlenmäßig überlegen sein."
 strategic_destruction_tree:0 "Strategische Zerstörungsdoktrin"
 streamlined_line:0 "Stromlinienförmige Linie"
