 super_heavy_tank_artillery_equipment_x:0 "Halbmoderne superschwere SP-Artillerie"
 super_heavy_tank_artillery_equipment_x_2:0 "Moderne superschwere Selbstfahr-Artillerie"
 super_heavy_tank_artillery_equipment_x_2_desc:0 "Gemäß der Doktrin „Größer ist immer besser“ stoppen diese Artilleriegeschütze jeden Feind auf seinem Weg und bekommen Probleme mit der Munitionsversorgung, dem Nachladen und dem Verschleiß der Geschützrohre."
