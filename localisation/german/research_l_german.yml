 heavy_fighter:0 "Schwerer Jäger"
 heavy_fighter_equipment:0 "Schwerer Jäger"
 heavy_fighter_equipment_1:0 "Schwerer Jäger I"
 heavy_fighter_equipment_1_desc:0 "Unsere Bomberflotte benötigt auf dem Weg zu ihren Zielen und zurück Eskorteschutz vor feindlichen Jägern. Um diese Eskorte gewährleisten zu können, müssen wir Kampfflugzeuge mit Bomberreichweite konstruieren. Diese Flugzeuge sind notwendigerweise größer, langsamer und weniger wendig als leichte Jäger, können aber eine beachtliche Bewaffnung tragen."
 heavy_fighter_equipment_1_short:0 "Schwerer Jäger I"
 heavy_fighter_equipment_2:0 "Schwerer Jäger II"
 heavy_fighter_equipment_2_desc:0 "Der Krieg hat uns gelehrt, dass unsere schweren Jagdflugzeuge anfällig für wendigere Kampfflugzeuge sind, aufgrund ihrer schweren Bewaffnung jedoch recht gut zum Abfangen feindlicher Bomber geeignet sind. Der Schwerpunkt dieses neuen Modells liegt auf einer erhöhten Angriffskraft gegen feindliche Flugzeuge und sogar Bodenziele. Auch Geschwindigkeit und Reichweite werden verbessert."
 heavy_fighter_equipment_2_short:0 "Schwerer Jäger II"
 heavy_fighter_equipment_3:0 "Schwerer Jäger III"
 heavy_fighter_equipment_3_desc:0 "Obwohl unsere schweren Jagdflugzeuge in verschiedenen Rollen ihre Fähigkeiten unter Beweis gestellt haben, müssen wir über ein neues Design nachdenken, das ihre Leistungsfähigkeit im Vergleich zu feindlichen Jägern verbessert und es ihnen ermöglicht, weiterhin immer schnellere und besser verteidigte feindliche Bomber abzufangen."
 heavy_fighter_equipment_3_short:0 "Schwerer Jäger III"
 heavy_fighter_equipment_desc:0 "Schwere Jäger verfügen über eine große Reichweite und leistungsstarke Waffen. Sie eignen sich sowohl zum Schutz von Bombern auf Distanz als auch zum Abfangen feindlicher Bomber. Aufgrund ihrer geringeren Wendigkeit haben sie jedoch gegen herkömmliche Jäger kaum etwas zu bieten."
 heavy_howitzer1:0 "Schwere Haubitze I"
