 monster_tank_equipment_1_desc:0 "Der Landkreuzer P. 1000 „Ratte“ war ein Entwurf für einen 1000-Tonnen-Panzer für Nazi-Deutschland im Zweiten Weltkrieg. Der Entwurf wurde möglicherweise im Juni 1942 von Krupp-Direktor Edward Grotte vorgeschlagen, der ihn bereits „Landkreuzer“ genannt hatte. Eingereichte Entwürfe und Zeichnungen des Fahrzeugs liefen unter den Bezeichnungen OKH Auftrag Nr. 30404 und E-30404/1 und wurden im Dezember 1942 vorgestellt. Der Panzer sollte 1000 Tonnen schwer sein und damit deutlich schwerer als der Panzer VIII „Maus“, der schwerste jemals gebaute Panzer (mit 188 Tonnen). Das Projekt erhielt die Zustimmung von Adolf Hitler, der Interesse an der Entwicklung des Panzers bekundet hatte, wurde jedoch Anfang 1943 von Rüstungsminister Albert Speer abgesagt."
 monster_tank_equipment_1_short:0 "Land Cruiser Tank I"
 monster_tank_equipment_2:0 "Land Cruiser Panzerausrüstung II"
 monster_tank_equipment_2_desc:0 "Der Landkreuzer P 1500 Monster war angeblich ein deutscher Vorprototyp einer superschweren Selbstfahrlafette, der während des Zweiten Weltkriegs entwickelt wurde. Obwohl er in einigen populären Werken erwähnt wird, gibt es keine stichhaltigen Belege für die Existenz des Programms. Es könnte sich um die Belustigung eines Ingenieurs oder einen glatten Scherz handeln."
 monster_tank_equipment_2_short:0 "Land Cruiser Tank II"
 monster_tank_equipment_desc:0 "Ein Land Cruiser Tank ist ein Panzer, der im Vergleich zu modernen Fahrzeugen hinsichtlich Größe oder Gewicht deutlich über dem Standard der Klasse der superschweren Panzer liegt."
 monster_tank_equipment_short:0 "Land Cruiser Tank"
 mortar_1904:0 "Mörserkompanie II"
 mortar_1904_desc:0 "Ein Mörser ist in der Regel eine einfache, leichte, tragbare Vorderladerwaffe. Sie besteht aus einem glatten Metallrohr (manche Modelle haben jedoch auch einen gezogenen Lauf), das auf einer Grundplatte (zur Dämpfung des Rückstoßes) befestigt ist und über eine leichte Zweibeinhalterung und ein Visier verfügt. Mörser feuern Sprenggranaten (technisch Bomben genannt) in steilen ballistischen Flugbahnen ab. Mörser werden typischerweise als indirekte Feuerwaffen zur Nahfeuerunterstützung mit unterschiedlicher Munition eingesetzt."
 mortar_1908:0 "Mörserkompanie III"
 mortar_1908_desc:0 "Ein Mörser ist in der Regel eine einfache, leichte, tragbare Vorderladerwaffe. Sie besteht aus einem glatten Metallrohr (manche Modelle haben jedoch auch einen gezogenen Lauf), das auf einer Grundplatte (zur Dämpfung des Rückstoßes) befestigt ist und über eine leichte Zweibeinhalterung und ein Visier verfügt. Mörser feuern Sprenggranaten (technisch Bomben genannt) in steilen ballistischen Flugbahnen ab. Mörser werden typischerweise als indirekte Feuerwaffen zur Nahfeuerunterstützung mit unterschiedlicher Munition eingesetzt."
 mot_rockets_research:3 "Motorisierte Raketenartillerie Forschungsgeschwindigkeit"
 motorised_infantry:0 "Motorisierte Infanterie"
 motorised_infantry_desc:0 "Durch die Ausweitung des Einsatzes von Kraftfahrzeugen bei Infanterietransporten im Feld kann die Mobilität ansonsten langsam agierender Infanterieeinheiten erheblich verbessert werden, was schnellere Reaktionen und neue Strategien ermöglicht."
 motorized_rocket_equipment_1:0 "Motorisierte Raketenartillerie I"
 motorized_rocket_equipment_1_desc:0 "Solche Mehrfachraketenwerfer bringen Sprengstoff schneller ins Zielgebiet als konventionelle Artillerie, sind jedoch weniger präzise und benötigen eine längere Nachladezeit. Auf Lastwagen montiert, kann diese Version Angriffe starten und die Position wechseln, bevor der Feind das Feuer erwidern kann."
