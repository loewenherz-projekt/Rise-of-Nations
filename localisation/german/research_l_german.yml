 RUS_armoured_car_equipment_10:0 "GAZ Tigr"
 RUS_armoured_car_equipment_10_desc:0 "Dieser gepanzerte Truppentransporter kann mit einer Reihe verschiedener Waffen ausgerüstet werden und bis zu 11 Mann transportieren."
 RUS_armoured_car_equipment_11:0 "BPM-97"
 RUS_armoured_car_equipment_11_desc:0 "Ähnlich wie das Volk kann es 8 Maschinengewehre transportieren, aber auch HMGs auf dem Dach. Wird zum Anführen von Konvois verwendet."
 RUS_armoured_car_equipment_12:0 "VPK-3927 Volk"
 RUS_armoured_car_equipment_12_desc:0 "Der VPK kann 2+8 Mann transportieren. Mit STANAG 4569 Level 3-Panzerung. Ideal für Spezialeinheiten und Polizeikräfte."
 RUS_armoured_car_equipment_7:0 "ZIL-131" #truck
 RUS_armoured_car_equipment_7_desc:0 "Ein Logistik-LKW und Truppentransporter, der von vielen Militärs auf der ganzen Welt eingesetzt wird."
 RUS_armoured_car_equipment_8:0 "UAZ-469"
 RUS_armoured_car_equipment_8_desc:0 "Wird zum Transport von VIPs auf ihren gepanzerten Fahrgestellen verwendet und bietet auch Platz für eine Waffe."
 RUS_armoured_car_equipment_9:0 "UAZ-3132"
 RUS_armoured_car_equipment_9_desc:0 "Das gleiche Modell wie das Modell 469, jedoch mit abnehmbaren Türen und Dach."
 RUS_car_1910_equipment:0 "Nakashidze-Charron"
 RUS_car_1914_equipment:0 "Austin"
 RUS_mechanized_equipment_10:0 "Kurganets-25"
 RUS_mechanized_equipment_10_desc:0 "Der Kurganers-25, eines der moderneren russischen Fahrzeuge, wurde 2015 hergestellt. Der Schützenpanzer verfügt über eine leichte Bumerang-BM-Kanone und ein 12,7-mm-Kord-Maschinengewehr. Er ist eng an den amerikanischen Schützenpanzer Bradley angelehnt."
 RUS_mechanized_equipment_10_short:0 "Kurganets-25"
 RUS_mechanized_equipment_11:0 "Kurganets-35"
 RUS_mechanized_equipment_11_desc:0 "Ähnlich wie der 25, der in erster Linie ein Schützenpanzer ist, ist der 35 ein gepanzerter Personentransporter, der 12 Mann transportieren kann und bei Schützenpanzeroperationen etwa die gleichen Leistungen wie der 25 erbringen kann."
 RUS_mechanized_equipment_11_short:0 "Kurganets-35"
 RUS_mechanized_equipment_12:0 "Kurganets-45"
 RUS_mechanized_equipment_12_desc:0 "Über diesen Super-APC ist nicht viel bekannt, aber er ist mit einer 40-mm-Kanone ausgestattet und kann 12 Mann transportieren."
 RUS_mechanized_equipment_12_short:0 "Kurganets-45"
 RUS_mechanized_equipment_5:0 "BTR-60"
 RUS_mechanized_equipment_5_desc:0 "Der BTR-60 ist eines der ältesten noch im Einsatz befindlichen Fahrzeuge und verfügt über ein schweres 14,5-mm-KPVT-Maschinengewehr mit 500 Schuss. Die Sekundärwaffe ist ein koaxiales 7,62-mm-PKT-Maschinengewehr mit 3.000 Schuss. Ideal für leichte Infanteriebewegungen und QRFs."
 RUS_mechanized_equipment_5_short:0 "BTR-60"
 RUS_mechanized_equipment_6:0 "MT-LB"
 RUS_mechanized_equipment_6_desc:0 "Das MT-LB wurde in den 1970er Jahren hergestellt. Die Sowjets verwendeten es aufgrund seiner günstigen und schnellen Bauweise für leichte Luftabwehr- und Infanteriekämpfe."
 RUS_mechanized_equipment_6_short:0 "MT-LB"
 RUS_mechanized_equipment_7:0 "BTR-70"
 RUS_mechanized_equipment_7_desc:0 "Der BTR-70 ist seit 1972 im Einsatz. Im sowjetisch-afghanischen Krieg wurde er zum Truppentransport und zur anschließenden Feuerunterstützung eingesetzt. Der einzige Unterschied zum BTR-60 ist die stärkere Panzerung."
 RUS_mechanized_equipment_7_short:0 "BTR-70"
 RUS_mechanized_equipment_8:0 "BTR-80"
 RUS_mechanized_equipment_8_desc:0 "Hergestellt im Jahr 1984, eingesetzt für Truppentransporte und leichte Panzer- oder Flugabwehroperationen. Ausgestattet mit der gleichen Bewaffnung wie der BTR-70 verfügt der 80 außerdem über eine 30-mm-2A72-Kanone."
 RUS_mechanized_equipment_8_short:0 "BTR-80"
 RUS_mechanized_equipment_9:0 "BTR-90"
 RUS_mechanized_equipment_9_desc:0 "Hergestellt im Jahr 1994 zur Bekämpfung terroristischer Kämpfer. Es verfügt über eine 30-mm-Kanone vom Typ Shipunov 2A42 mit 500 Schuss."
 RUS_mechanized_equipment_9_short:0 "BTR-90"
 RUS_mechanized_heavy_equipment_10:0 "T-15 Armata"
 RUS_mechanized_heavy_equipment_10_desc:0 ""
 RUS_mechanized_heavy_equipment_10_short:0 "T-15"
 RUS_mechanized_heavy_equipment_11:0 "BMP-3 Epocha"
 RUS_mechanized_heavy_equipment_11_desc:0 "Dies ist derselbe BMP-3, ausgestattet mit einer besseren ATGM-Rakete und einem Hybrid-AGL und einer Autokanone"
 RUS_mechanized_heavy_equipment_11_short:0 "BMP-3 Epocha"
 RUS_mechanized_heavy_equipment_12:0 "T-19"
 RUS_mechanized_heavy_equipment_12_desc:0 "Ein leichter Panzer aus den 30er Jahren, der heute kaum noch zum Einsatz kommt. Nur kleine, arme Länder kaufen ihn noch."
 RUS_mechanized_heavy_equipment_12_short:0 "T-19"
 RUS_mechanized_heavy_equipment_5:0 "BMP-1"
 RUS_mechanized_heavy_equipment_5_desc:0 "Der BMP-1 ist ein sowjetisches amphibisches Ketten-Schützenpanzerfahrzeug. Es wurde im Afghanistan-Krieg zum Truppentransport und zur Bekämpfung von Dschihadisten eingesetzt. Es verfügt über eine 73-mm-2A28 und einen ATGM-Werfer."
 RUS_mechanized_heavy_equipment_5_short:0 "BMP-1"
 RUS_mechanized_heavy_equipment_6:0 "BTR-T"
 RUS_mechanized_heavy_equipment_6_desc:0 "Schweres Schützenpanzerfahrzeug, gepanzert mit maximal 320 mm und ERA. Der BTR-T feuert eine 9M113 Konkurs ATG und eine 2A42 30-mm-Maschinenkanone ab."
 RUS_mechanized_heavy_equipment_6_short:0 "BTR-T"
 RUS_mechanized_heavy_equipment_7:0 "BMP-2"
 RUS_mechanized_heavy_equipment_7_desc:0 "Die größte Angst eines Dschihadisten ist der BMP-2, der mit seiner 30-mm-Kanone und den schleifenden Ketten extrem schnell und effizient ist."
 RUS_mechanized_heavy_equipment_7_short:0 "BMP-2"
 RUS_mechanized_heavy_equipment_8:0 "BMP-3"
 RUS_mechanized_heavy_equipment_8_desc:0 "Der BMP-3 ist ein sowjetisches Schützenpanzerfahrzeug und Nachfolger des BMP-1 und BMP-2. Er feuert eine 100-mm-Kanone mit schweren Sprenggranaten ab."
 RUS_mechanized_heavy_equipment_8_short:0 "BMP-3"
 RUS_mechanized_heavy_equipment_9:0 "BMP-3M"
 RUS_mechanized_heavy_equipment_9_desc:0 "Der BMP-3M ist ein sowjetischer Schützenpanzer, Nachfolger des BMP-1 und BMP-2 und eine Variante des 3. Er verfügt über eine verbesserte Kanone und einen verbesserten Motor."
 RUS_mechanized_heavy_equipment_9_short:0 "BMP-3M"
