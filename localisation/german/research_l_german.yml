 tech_flamethrower2:0 "Flammenwerfer-Kompanie VIII"
 tech_flamethrower2_desc:0 "Ein Flammenwerfer ist ein weit verbreitetes Brandgerät, das einen kontrollierbaren Feuerstrahl abfeuert. Flammenwerfer wurden erstmals im 1. Jahrhundert n. Chr. von den byzantinischen Griechen eingesetzt und kamen in der Neuzeit im Ersten Weltkrieg und im Zweiten Weltkrieg verstärkt als taktische Belagerungswaffe gegen Befestigungen zum Einsatz. Die meisten militärischen Flammenwerfer verwenden flüssigen Brennstoff, typischerweise Benzin oder Diesel. Kommerzielle Flammenwerfer sind jedoch in der Regel Lötlampen, die mit gasförmigen Brennstoffen wie Propan betrieben werden. Gase sind in Friedenszeiten sicherer, da ihre Flammen einen geringeren Massenstrom haben, sich schneller auflösen und bei Bedarf oft leichter zu löschen sind." 
 tech_flamethrower3:0 "Flammenwerfer-Kompanie IX"
 tech_flamethrower3_desc:0 "Ein Flammenwerfer ist ein weit verbreitetes Brandgerät, das einen kontrollierbaren Feuerstrahl abfeuert. Flammenwerfer wurden erstmals im 1. Jahrhundert n. Chr. von den byzantinischen Griechen eingesetzt und kamen in der Neuzeit im Ersten Weltkrieg und im Zweiten Weltkrieg verstärkt als taktische Belagerungswaffe gegen Befestigungen zum Einsatz. Die meisten militärischen Flammenwerfer verwenden flüssigen Brennstoff, typischerweise Benzin oder Diesel. Kommerzielle Flammenwerfer sind jedoch in der Regel Lötlampen, die mit gasförmigen Brennstoffen wie Propan betrieben werden. Gase sind in Friedenszeiten sicherer, da ihre Flammen einen geringeren Massenstrom haben, sich schneller auflösen und bei Bedarf oft leichter zu löschen sind." 
