 car_1899_equipment_desc:0 "Obwohl das Automobil eine noch junge Technologie ist, wird es bereits für militärische Zwecke in Betracht gezogen. Ein so einfaches Design wie die Anbringung eines Maschinengewehrs an einem dieser neuen Autos und das Anbringen von zusätzlichem Metall als Panzerung könnte uns eine interessante neue Waffe für den Einsatz im Kampf bescheren."
