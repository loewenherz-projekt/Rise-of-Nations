 rocket_engines:0 "Raketentriebwerke"
 rocket_engines_desc:0 "Das Wissen über Raketenantriebe erreicht einen Punkt, an dem wir fliegende Bomben und raketengetriebene Flugzeuge bauen können, die mit bisher unerreichbaren Geschwindigkeiten fliegen."
 rocket_folder:0 "Raketentechnik"
 rocket_folder_desc:0 ""
 rocket_interceptor:0 "Raketenabfangjäger"
 rocket_interceptor_2:0 "Raketenabfangjäger II"
 rocket_interceptor_2_desc:0 "Der Betrieb der raketengetriebenen Kampfflugzeuge gilt immer noch als äußerst gefährlich. Daher werden sie heute durch Autopiloten und Schleppflugzeuge unterstützt, um ihre extreme Geschwindigkeit, aber ihr kurzes Treibstofffenster optimal zu nutzen."
 rocket_interceptor_3:0 "Raketenabfangjäger III"
 rocket_interceptor_3_desc:0 "Neue Landetechniken und sicherere Treibstoffsysteme haben die Erfolgs- und Überlebenschancen von Raketenjägern deutlich verbessert und das einst theoretische Potenzial dieser hochmodernen Fahrzeuge ausgeschöpft."
 rocket_interceptor_desc:0 "Raketengetriebene Abfangjäger auf Gleiterbasis können sich für kurze Zeit schneller bewegen als jedes andere Flugzeug. Zwar birgt die Flüchtigkeit des Treibstoffs ein Risiko für die Flugzeuge, doch können sie schneller starten und auf Angriffe reagieren, als es der Feind erwarten würde."
 rocket_interceptor_equipment:0 "Raketenabfangjäger"
 rocket_interceptor_equipment_desc:0 "Kurzstrecken-Abfangjäger mit chemischem Raketentriebwerk."
 rocketry:0 "Raketentechnik"
 rubber_plant_a:0 "Grundlegende Gummipflanze"
 rubber_plant_a_desc:0 "Mithilfe unseres Wissens über die Herstellung synthetischer Öle können wir nun künstliche Kautschukprodukte herstellen."
 rubber_plant_b:0 "Verbesserte Gummipflanze"
 rubber_plant_b_desc:0 "Weitere Verbesserungen unseres synthetischen Produktionsprozesses haben zu noch höheren Erträgen geführt. "
 rubber_plant_c:0 "Fortschrittliche Gummifabrik"
 rubber_plant_c_desc:0 "Wir können jetzt in unseren modernen Anlagen große Mengen Kautschuk produzieren, und das zu einem sehr günstigen Preis."
 rubber_processing:0 "Gummiverarbeitung"
 rubber_processing_desc:1 "Um unsere Abhängigkeit von Naturkautschuk zu verringern, ist die industrielle Verarbeitung von synthetischem Kautschuk erforderlich."
 sam_carrier_equipment:0 "Boden-Luft-Raketenträger"
 sam_carrier_equipment_1:0 "Boden-Luft-Raketenträger I"
 sam_carrier_equipment_1_desc:0 "Eine Boden-Luft-Rakete (SAM), auch Boden-Luft-Rakete (GTAM) oder Boden-Luft-Lenkwaffe (SAGW) genannt, ist eine Rakete, die vom Boden aus abgefeuert wird, um Flugzeuge oder andere Raketen zu zerstören. Sie ist eine Art Flugabwehrsystem; in modernen Streitkräften haben Raketen die meisten anderen Formen dedizierter Flugabwehrwaffen ersetzt, wobei Flugabwehrkanonen in spezialisierte Rollen gedrängt wurden."
