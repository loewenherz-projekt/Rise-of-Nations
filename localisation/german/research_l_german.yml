 tech_mortar2:0 "Mörserkompanie IV"
 tech_mortar2_desc:0 "Ein Mörser ist in der Regel eine einfache, leichte, tragbare Vorderladerwaffe. Sie besteht aus einem glatten Metallrohr (manche Modelle haben jedoch auch einen gezogenen Lauf), das auf einer Grundplatte (zur Dämpfung des Rückstoßes) befestigt ist und über eine leichte Zweibeinhalterung und ein Visier verfügt. Mörser feuern Sprenggranaten (technisch Bomben genannt) in steilen ballistischen Flugbahnen ab. Mörser werden typischerweise als indirekte Feuerwaffen zur Nahfeuerunterstützung mit unterschiedlicher Munition eingesetzt."
