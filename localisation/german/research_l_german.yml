 SOV_mechanized_equipment_10:0 "Kurganets-25"
 SOV_mechanized_equipment_10_desc:0 "Der Kurganers-25, eines der moderneren russischen Fahrzeuge, wurde 2015 hergestellt. Der Schützenpanzer ist mit einer leichten Bumerang-BM-Kanone und einem 12,7-mm-Kord-Maschinengewehr ausgestattet. Er ist eng an den amerikanischen Schützenpanzer Bradley angelehnt."
 SOV_mechanized_equipment_10_short:0 "BMP-1"
 SOV_mechanized_equipment_10_short:0 "Kurganets-25"
 SOV_mechanized_equipment_11:0 "Kurganets-35"
 SOV_mechanized_equipment_11_desc:0 "Ähnlich wie der 25, der in erster Linie ein Schützenpanzer ist, ist der 35 ein gepanzerter Personentransporter, der 12 Mann transportieren kann und bei Schützenpanzeroperationen etwa die gleichen Leistungen wie der 25 erbringen kann."
 SOV_mechanized_equipment_11_short:0 "BMP-2"
 SOV_mechanized_equipment_11_short:0 "Kurganets-35"
 SOV_mechanized_equipment_12:0 "Kurganets-45"
 SOV_mechanized_equipment_12_desc:0 "Über diesen Super-APC ist nicht viel bekannt, aber er ist mit einer 40-mm-Kanone ausgestattet und kann 12 Mann transportieren."
 SOV_mechanized_equipment_12_short:0 "BMP-3"
 SOV_mechanized_equipment_12_short:0 "Kurganets-45"
 SOV_mechanized_equipment_4_short:0 "ZiS-42"
 SOV_mechanized_equipment_5:0 "BTR-60"
 SOV_mechanized_equipment_5_desc:0 "Der BTR-60 ist eines der ältesten noch im Einsatz befindlichen Fahrzeuge und verfügt über ein schweres 14,5-mm-KPVT-Maschinengewehr mit 500 Schuss. Die Sekundärwaffe ist ein koaxiales 7,62-mm-PKT-Maschinengewehr mit 3.000 Schuss. Ideal für leichte Infanteriebewegungen und QRFs."
 SOV_mechanized_equipment_5_short:0 "BTR-152"
 SOV_mechanized_equipment_5_short:0 "BTR-60"
 SOV_mechanized_equipment_6:0 "MT-LB"
 SOV_mechanized_equipment_6_desc:0 "Das MT-LB wurde in den 1970er Jahren hergestellt. Die Sowjets verwendeten es aufgrund seiner günstigen und schnellen Bauweise für leichte Luftabwehr- und Infanteriekämpfe."
 SOV_mechanized_equipment_6_short:0 "BTR-60PB"
 SOV_mechanized_equipment_6_short:0 "MT-LB"
 SOV_mechanized_equipment_7:0 "BTR-70"
 SOV_mechanized_equipment_7_desc:0 "Der BTR-70 ist seit 1972 im Einsatz. Im sowjetisch-afghanischen Krieg wurde er zum Truppentransport und zur anschließenden Feuerunterstützung eingesetzt. Der einzige Unterschied zum BTR-60 ist die stärkere Panzerung."
 SOV_mechanized_equipment_7_short:0 "BTR-70 MA-7"
 SOV_mechanized_equipment_7_short:0 "BTR-70"
 SOV_mechanized_equipment_8:0 "BTR-80"
 SOV_mechanized_equipment_8_desc:0 "Hergestellt im Jahr 1984, eingesetzt für Truppentransporte und leichte Panzer- oder Flugabwehroperationen. Ausgestattet mit der gleichen Bewaffnung wie der BTR-70 verfügt der 80 außerdem über eine 30-mm-2A72-Kanone."
 SOV_mechanized_equipment_8_short:0 "BTR-80"
 SOV_mechanized_equipment_9:0 "BTR-90"
 SOV_mechanized_equipment_9_desc:0 "Hergestellt im Jahr 1994 zur Bekämpfung terroristischer Kämpfer. Es verfügt über eine 30-mm-Kanone vom Typ Shipunov 2A42 mit 500 Schuss."
 SOV_mechanized_equipment_9_short:0 "BTR-90"
 SOV_mechanized_heavy_equipment_10:0 "T-15 Armata"
 SOV_mechanized_heavy_equipment_10_desc:0 ""
 SOV_mechanized_heavy_equipment_10_short:0 "T-15"
 SOV_mechanized_heavy_equipment_11:0 "BMP-3 Epocha"
 SOV_mechanized_heavy_equipment_11_desc:0 "Dies ist derselbe BMP-3, ausgestattet mit einer besseren ATGM-Rakete und einem Hybrid-AGL und einer Autokanone"
 SOV_mechanized_heavy_equipment_11_short:0 "BMP-3 Epocha"
 SOV_mechanized_heavy_equipment_12:0 "T-19"
 SOV_mechanized_heavy_equipment_12_desc:0 "Ein leichter Panzer aus den 30er Jahren, der heute kaum noch zum Einsatz kommt. Nur kleine, arme Länder kaufen ihn noch."
 SOV_mechanized_heavy_equipment_12_short:0 "T-19"
 SOV_mechanized_heavy_equipment_5:0 "BMP-1"
 SOV_mechanized_heavy_equipment_5_desc:0 "Der BMP-1 ist ein sowjetisches amphibisches Ketten-Schützenpanzerfahrzeug. Es wurde im Afghanistan-Krieg zum Truppentransport und zur Bekämpfung von Dschihadisten eingesetzt. Es verfügt über eine 73-mm-2A28 und einen ATGM-Werfer."
 SOV_mechanized_heavy_equipment_5_short:0 "BMP-1"
 SOV_mechanized_heavy_equipment_6:0 "BTR-T"
 SOV_mechanized_heavy_equipment_6_desc:0 "Schweres Schützenpanzerfahrzeug, gepanzert mit maximal 320 mm und ERA. Der BTR-T feuert eine 9M113 Konkurs ATG und eine 2A42 30-mm-Maschinenkanone ab."
 SOV_mechanized_heavy_equipment_6_short:0 "BTR-T"
 SOV_mechanized_heavy_equipment_7:0 "BMP-2"
 SOV_mechanized_heavy_equipment_7_desc:0 "Die größte Angst eines Dschihadisten ist der BMP-2, der mit seiner 30-mm-Kanone und den schleifenden Ketten extrem schnell und effizient ist."
 SOV_mechanized_heavy_equipment_7_short:0 "BMP-2"
 SOV_mechanized_heavy_equipment_8:0 "BMP-3"
 SOV_mechanized_heavy_equipment_8_desc:0 "Der BMP-3 ist ein sowjetisches Schützenpanzerfahrzeug und Nachfolger des BMP-1 und BMP-2. Er feuert eine 100-mm-Kanone mit schweren Sprenggranaten ab."
 SOV_mechanized_heavy_equipment_8_short:0 "BMP-3"
 SOV_mechanized_heavy_equipment_9:0 "BMP-3M"
 SOV_mechanized_heavy_equipment_9_desc:0 "Der BMP-3M ist ein sowjetischer Schützenpanzer, Nachfolger des BMP-1 und BMP-2 und eine Variante des 3. Er verfügt über eine verbesserte Kanone und einen verbesserten Motor."
 SOV_mechanized_heavy_equipment_9_short:0 "BMP-3M"
 SOV_medium_assault_gun_equipment_1_desc:0 "Die SU-76M ersetzte Infanteriepanzer in der Nahunterstützungsrolle praktisch vollständig. Ihr geringes Gewicht und der geringe Bodendruck verliehen ihr eine gute Mobilität. Die SU-76M vereinte drei Hauptfunktionen auf dem Schlachtfeld: leichtes Sturmgeschütz, mobile Panzerabwehrwaffe und mobiles Geschütz für indirektes Feuer."
