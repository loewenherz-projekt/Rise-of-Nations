 mountain_gun:0 "Berggewehr"
 mountain_gun_desc:0 "Das bergige Gelände Nordindiens führte zur Entwicklung eines Artilleriegeschützes, das zerlegt und auf Maultieren dorthin transportiert werden konnte, wo es benötigt wurde."
 mountain_warfare:0 "Gebirgskrieg"
