 fleet_in_being:0 "Flotte im Sein"
 fleet_in_being_desc:0 "Schiffe bleiben im Hafen, wo sie sicherer sind, und greifen Feinde nur im richtigen Moment an. Die Anwesenheit unserer Schiffe wird Feinde davon abhalten, unsere Häfen einzunehmen.\n\n"
 fleet_in_being_tree:0 "Flotte in Seinslehren"
 flexible_line:0 "Flexible Linie"
 flexible_line_a:0 "Computerintegrierte Fertigung"
 flexible_line_a_desc:0 "Platzhalter"
 flexible_line_b:0 "Frühe CIM-Software"
 flexible_line_b_desc:0 "Platzhalter"
 flexible_line_c:0 "Grundlegende CIM-Software"
 flexible_line_c_desc:0 "Platzhalter"
 flexible_line_d:0 "Moderne CIM-Software"
 flexible_line_d_desc:0 "Platzhalter"
 flexible_line_desc:0 "So gut das Fließband auch funktionieren mag, es wird immer noch von Menschen bedient, was Anpassungen bei Bedarf ermöglicht. Diesen Vorteil sollten wir in unserer industriellen Produktion nutzen."
