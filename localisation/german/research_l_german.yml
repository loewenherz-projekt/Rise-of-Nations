 low_echelon_support_desc:0 "Durch die direkte Zuweisung von CAS-Einheiten zu kleinen Bodenformationen wird sichergestellt, dass diese immer auf zusätzliche Feuerkraft zurückgreifen können, selbst wenn sie sich außerhalb der Reichweite herkömmlicher Artillerie befinden."
