 future_computing_machine:0 "IBM 701"
 future_computing_machine_2:0 "Altair 8800"
 future_computing_machine_2_desc:0 "Der Altair 8800 ist ein 1974 vom MITS entwickelter Mikrocomputer, der auf der Intel 8080 CPU basiert."
 future_computing_machine_3:0 "Commodore 64"
 future_computing_machine_3_desc:0 "Der Commodore 64, auch bekannt als C64 oder CBM 64, ist ein 8-Bit-Heimcomputer, der im Januar 1982 von Commodore International eingeführt wurde."
 future_computing_machine_desc:0 "Die elektronische Datenverarbeitungsmaschine IBM 701, während ihrer Entwicklung als Defense Calculator bekannt, war IBMs erster kommerzieller wissenschaftlicher Computer, der am 29. April 1952 der Öffentlichkeit vorgestellt wurde."
 future_decryption:0 "KL-7-Entschlüsselung"
 future_decryption_2:0 "DES-Entschlüsselung"
 future_decryption_2_desc:0 "Der Data Encryption Standard (DES) ist ein symmetrischer Algorithmus zur Verschlüsselung elektronischer Daten. Obwohl seine von Anfang an kritisierte kurze Schlüssellänge von 56 Bit ihn für die meisten heutigen Anwendungen zu unsicher macht, hatte er großen Einfluss auf die Weiterentwicklung der modernen Kryptographie."
 future_decryption_3:0 "BB84-Entschlüsselung"
 future_decryption_3_desc:0 "BB84 ist ein Quantenschlüsselverteilungsschema, das 1984 von Charles Bennett und Gilles Brassard entwickelt wurde. Es ist das erste Quantenkryptographieprotokoll. Das Protokoll ist nachweislich sicher und basiert auf der Quanteneigenschaft, dass Informationsgewinn nur auf Kosten einer Signalstörung möglich ist, wenn die beiden zu unterscheidenden Zustände nicht orthogonal sind (siehe No-Cloning-Theorem) und ein authentifizierter öffentlicher klassischer Kanal vorliegt. Es wird üblicherweise als Methode zur sicheren Übertragung eines privaten Schlüssels von einer Partei zur anderen zur Verwendung in der One-Time-Pad-Verschlüsselung erklärt."
 future_decryption_desc:0 "Die TSEC/KL-7 (auch bekannt als hochgeheimer militärischer Codename der NSA, Adonis) war eine Offline-Rotor-Verschlüsselungsmaschine mit nicht-reziproker Rotortechnik. Die KL-7 verfügte über Rotoren zur Textverschlüsselung, die sich meist in einem komplexen Muster bewegten und durch gezahnte Ringe gesteuert wurden. Der unbewegliche Rotor befand sich an vierter Stelle von links im Stapel. Die KL-7 mit zwölf Rotoren verschlüsselte auch den Nachrichtenindikator und trug den Codenamen ADONIS."
 future_encryption:0 "KL-7-Verschlüsselung"
 future_encryption_2:0 "DES-Verschlüsselung"
 future_encryption_2_desc:0 "Der Data Encryption Standard (DES) ist ein symmetrischer Algorithmus zur Verschlüsselung elektronischer Daten. Obwohl seine von Anfang an kritisierte kurze Schlüssellänge von 56 Bit ihn für die meisten heutigen Anwendungen zu unsicher macht, hatte er großen Einfluss auf die Weiterentwicklung der modernen Kryptographie."
 future_encryption_3:0 "BB84-Verschlüsselung"
 future_encryption_3_desc:0 "BB84 ist ein Quantenschlüsselverteilungsschema, das 1984 von Charles Bennett und Gilles Brassard entwickelt wurde. Es ist das erste Quantenkryptographieprotokoll. Das Protokoll ist nachweislich sicher und basiert auf der Quanteneigenschaft, dass Informationsgewinn nur auf Kosten einer Signalstörung möglich ist, wenn die beiden zu unterscheidenden Zustände nicht orthogonal sind (siehe No-Cloning-Theorem) und ein authentifizierter öffentlicher klassischer Kanal vorliegt. Es wird üblicherweise als Methode zur sicheren Übertragung eines privaten Schlüssels von einer Partei zur anderen zur Verwendung in der One-Time-Pad-Verschlüsselung erklärt."
 future_encryption_desc:0 "Die TSEC/KL-7 (auch bekannt als hochgeheimer militärischer Codename der NSA, Adonis) war eine Offline-Rotor-Verschlüsselungsmaschine mit nicht-reziproker Rotortechnik. Die KL-7 verfügte über Rotoren zur Textverschlüsselung, die sich meist in einem komplexen Muster bewegten und durch gezahnte Ringe gesteuert wurden. Der unbewegliche Rotor befand sich an vierter Stelle von links im Stapel. Die KL-7 mit zwölf Rotoren verschlüsselte auch den Nachrichtenindikator und trug den Codenamen ADONIS."
 future_radar:0 "SAR"
 future_radar_2:0 "MTI"
 future_radar_2_desc:0 "Die Moving Target Indication (MTI) ist eine Betriebsart eines Radars zur Unterscheidung eines Ziels von Störsignalen."
 future_radar_3:0 "NEXRAD"
 future_radar_3_desc:0 "In den 1980er Jahren wurden von Raytheon und Unisys entwickelte Radarsysteme getestet."
 future_radar_desc:0 "Synthetic Aperture Radar (SAR) ist eine Radarform, die zum Erstellen zweidimensionaler Bilder oder dreidimensionaler Rekonstruktionen von Objekten, beispielsweise Landschaften, verwendet wird."
 future_rail_integration_system:0 "Zukünftiges Schienenintegrationssystem"
 future_rail_integration_system_desc:0 "Platzhalter"
 grand_assault:0 "Großer Angriff"
 grand_assault_desc:0 "Sobald genügend Streitkräfte aufgebaut und ihre Ziele gut geplant sind, kann ein mächtiger Angriff nur noch zur Vernichtung des Feindes führen."
 grand_battle_plan:0 "Großer Schlachtplan"
 grand_battle_plan_desc:0 "Der Schlüssel zum Erfolg ist eine umfassende Planung und Vorbereitung vor dem Kampf.\n\n"
 grand_battlefleet:0 "Große Schlachtflotte"
 grand_battlefleet_desc:0 "Durch Führungstraining bewahren unsere Kommandeure auch in der Hitze des Gefechts die Ruhe, selbst wenn sie riesige Flotten befehligen. Unsere Flotte wird jeden Gegner frontal vernichten."
 grand_mechanized_offensive:0 "Mechanisierte Offensive"
 grand_mechanized_offensive_desc:0 "Motorisierte Truppen sind gut und schön, aber um Offensiven anzuführen, brauchen wir Infanterie, die in gepanzerten Transportern in die Schlacht ziehen kann, die sie schützen und schwere Waffen tragen.\n\n"
 green_laser_interdiction_system:0 "Grünes Laser-Abwehrsystem"
 green_laser_interdiction_system_desc:0 "Platzhalter"
 green_laser_sight:0 "Grünes Laservisier"
 green_laser_sight_desc:0 "Platzhalter"
 ground_support_integration:0 "Bodenunterstützungsintegration"
 ground_support_integration_desc:0 "Durch die vollständige Integration unserer taktischen Bomberstreitkräfte mit bodengestützten Beobachtern wird deren Genauigkeit erhöht und es können diese unsere Bodentruppen im Kampf direkt unterstützen."
 guerilla_warfare:0 "Guerillakrieg"
 guerilla_warfare_desc:0 "Der Feind rückt vor, wir ziehen uns zurück; der Feind schlägt sein Lager auf, wir bedrängen ihn; der Feind wird müde, wir greifen an; der Feind zieht sich zurück, wir verfolgen ihn."
