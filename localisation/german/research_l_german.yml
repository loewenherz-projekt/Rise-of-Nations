 super_heavy_tank_equipment_x_2:0 "1951 Superschwerer Panzer"
 super_heavy_tank_equipment_x_2_desc:0 "Diese Panzer sind rollende Monstrositäten mit großkalibrigen, bunkerzerstörenden Kanonen und mehreren Schichten verstärkter Panzerung. Doch selbst mit modernsten Motoren und extrabreiten Doppelketten haben diese Panzer Probleme, Sümpfe zu durchqueren, und müssen Flüsse mit einem Schnorchel durchqueren."
