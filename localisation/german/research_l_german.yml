 magnetic_detonator:0 "Magnetzünder"
 magnetic_detonator_desc:0 "Ein neuer Zünder erkennt die Veränderung des Erdmagnetfelds, wenn der Torpedo unter dem Ziel vorbeifliegt. Eine Explosion direkt unter einem Schiff verursacht deutlich größeren Schaden und bricht oft den Kiel des Ziels, wodurch es sofort sinkt."
 maintenance_company_1904:0 "Instandhaltungsfirma II"
 maintenance_company_1904_desc:0 "Die technische Instandhaltung der Armee besteht aus jenen Ingenieuren, Technikern und Militärorganisationen, die für die fachmännische Reparatur und Wartung von Armeefahrzeugen, Waffensystemen und anderer Ausrüstung verantwortlich sind."
