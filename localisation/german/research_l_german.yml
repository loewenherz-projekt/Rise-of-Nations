 torpedo_advice_tt:0 "\nDie Montage von §YTorpedowerfern§! auf §YLeichten Schiffen§! oder §YKreuzern§! ermöglicht es diesen, gegnerischen §YGroßkampfschiffen§! in der §YKampflinie§! erheblichen Schaden zuzufügen, wenn sie die gegnerische §YAbschirmgruppe§! überwältigen können."
