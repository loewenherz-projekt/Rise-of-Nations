 mtg_landing_craft:0 "Landungsboot"
 mtg_landing_craft_desc:0 "Spezielle Invasionsschiffe machen die Landung in feindlichem Gebiet etwas weniger problematisch."
 mtg_tank_landing_craft:0 "Fortgeschrittenes Landungsboot"
 mtg_tank_landing_craft_desc:0 "Dank moderner Landungsboote können unsere Jungs bei einer Invasion schneller und effektiver an den Strand gelangen."
 mtg_transport:0 "Transportschiff"
 mtg_transport_desc:0 "Schiff, das ausschließlich für Truppenbewegungen konzipiert ist und über keinerlei Verteidigungsfähigkeiten verfügt."
 mtgnavalfolder:0 "Marine"
 mtgnavalfolder_desc:0 "Schiffe und U-Boote. Erforschen Sie neue Module, um Ihre Schiffe anzupassen."
 multialtitude_flying:0 "Fliegen in mehreren Höhen"
 multialtitude_flying_desc:0 "Luftkämpfe finden in drei Dimensionen statt, doch den meisten Piloten fällt es schwerer, die über oder unter ihnen fliegenden Flugzeuge im Auge zu behalten. Wir können uns dies zunutze machen, indem wir unsere Formationen vertikal verteilen."
 nav_bomber:0 "Marinebomber"
 nav_bomber_equipment:0 "Marinebomber"
 nav_bomber_equipment_1:0 "Marinebomber I"
 nav_bomber_equipment_1_desc:0 "Die Marinefliegerei wird im kommenden Jahrzehnt von entscheidender Bedeutung sein, um neuen Entwicklungen in der Seekriegsführung, wie der zunehmenden Bedeutung von U-Booten, zu begegnen. Wasserflugzeuge, die als Sturzkampfbomber und Aufklärungsfahrzeuge eingesetzt werden können, werden von Nutzen sein."
 nav_bomber_equipment_1_short:0 "NAV I"
 nav_bomber_equipment_2:0 "Marinebomber II"
 nav_bomber_equipment_2_desc:0 "Neue Motorentechnologien und aerodynamisch verfeinerte Designs werden die Geschwindigkeit und Sturzkampffähigkeit von Marineflugzeugen deutlich steigern."
 nav_bomber_equipment_2_short:0 "NAV II"
 nav_bomber_equipment_3:0 "Marinebomber III"
 nav_bomber_equipment_3_desc:0 "Ganzmetallkonstruktionen und leistungsstarke Luftbremsen ermöglichen eine komplexere Marineluftfahrt. Die Flugzeuge der Zukunft werden jedoch eine größere Besatzung benötigen, um diese fortschrittlichen Systeme zu bedienen."
 nav_bomber_equipment_3_short:0 "NAV III"
 nav_bomber_equipment_desc:0 "Marinebomber können Angriffe gegen feindliche Schiffe durchführen."
 naval_air:0 "Marineflugzeuge"
 naval_air_operations:0 "Marineluftoperationen"
 naval_air_operations_desc:0 "Piloten, die für die Durchführung von Missionen von Flugzeugträgern aus ausgebildet sind, eröffnen uns neue Möglichkeiten zur Beherrschung der Meere. Flugzeuge sind ein effizientes Mittel zur Ausdünnung der feindlichen Flotte."
