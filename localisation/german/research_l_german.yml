 rdf1:0 "Funkpeilung" #new
 rdf1_desc:0 "Durch das Abfangen illegaler Übertragungen von Partisanen stärken wir unsere Fähigkeit zur Aufstandsbekämpfung." #new
 rdf2:0 "Verbesserte Funkpeilung" #new
 rdf2_desc:0 "Durch das gezieltere Abfangen illegaler Übertragungen von Partisanen stärken wir unsere Fähigkeit zur Aufstandsbekämpfung." #new
 rdf3:0 "Erweiterte Funkpeilung" #new
 rdf3_desc:0 "Indem wir illegale Übertragungen von Partisanen durch frühzeitige Triangulation abfangen, stärken wir unsere Fähigkeit zur Aufstandsbekämpfung." #new
 rdf4:0 "Moderne Funkpeilung" #new
 rdf4_desc:0 "Indem wir illegale Übertragungen von Partisanen durch präzisere Triangulation abfangen, stärken wir unsere Fähigkeit zur Aufstandsbekämpfung." #new
 rdf5:0 "1949 Funkpeilung" #new
 rdf5_desc:0 "Durch das Abfangen illegaler Übertragungen von Partisanen mittels nahezu exakter Triangulation stärken wir unsere Fähigkeit zur Aufstandsbekämpfung." #new
 rdf6:0 "1953 Entdeckung der Radioortung" #new
 rdf6_desc:0 "Wir können sie überall aufspüren. Sie können sich nicht verstecken, nicht weglaufen und schon gar nicht erfolgreich sein." #new
