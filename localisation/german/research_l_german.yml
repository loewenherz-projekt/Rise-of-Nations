 convoy_interdiction_bs:0 "Konvoi-Abfang"
 convoy_interdiction_bs_desc:0 "Durch eine verbesserte Koordination unserer U-Boote können sie Handelskonvois auf der Fahrt angreifen. Die Unterbrechung der feindlichen Versorgungslinien verschafft uns einen strategischen Vorteil."
