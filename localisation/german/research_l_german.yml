 armoured_car_equipment_13_desc:1 "Nutzfahrzeuge sind die Fahrzeuge, die von motorisierten Infanterietruppen als Transportmittel zum Schlachtfeld eingesetzt werden. Die Modelle der früheren Generation, Jeeps und Lastwagen, sind nahezu ungepanzert und unterscheiden sich von ihren zivilen Pendants hauptsächlich durch ihre Robustheit und größere Mobilität in schwierigem Gelände. Modelle der späteren Generation sind Humvee-ähnliche Fahrzeuge mit besserer Panzerung und minensichere Fahrzeuge mit weiter verbessertem Besatzungsschutz. Wenn die Fahrzeuge überhaupt bewaffnet sind, handelt es sich meist um leichtere Waffen wie Maschinengewehre."
