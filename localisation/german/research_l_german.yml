 nd_conscription:0 "Nichtdiskriminierende Wehrpflicht"
 nd_conscription_desc:0 "Auch Invaliden und Krüppel müssen eingezogen werden, Zivilisten kann es nicht geben."
 night_assault_tactics:0 "Nachtangriffstaktiken"
 night_assault_tactics_desc:0 "Soldaten, die es gewohnt sind, sich nachts zu bewegen und zu kämpfen, können sich entweder für einen Angriff in Position bringen oder ahnungslose feindliche Streitkräfte direkt angreifen."
 night_bombing:0 "Nachtbombardements"
 night_bombing_desc:0 "Mit geschwächter feindlicher Verteidigung und im Schutz der Dunkelheit können wir rund um die Uhr offensiv und effizient agieren. Zeigen Sie unserem Feind, wie hartnäckig wir sind.\n\n"
 night_vision2:0 "Nachtsicht II"
 night_vision2_desc:0 "Obwohl die ersten Infrarot-Zielfernrohre ursprünglich für Scharfschützen gedacht waren, hatten sie eine begrenzte Sichtweite. Da sich Tragbarkeit und Sicht verbesserten, können diese Geräte nun auch von mehr Truppen im Nachteinsatz eingesetzt werden."
 night_vision:0 "Nachtsicht I"
 night_vision_a:0 "Nachtsicht III"
 night_vision_a_desc:0 "Die Fähigkeit, den Feind zu sehen, während er es nicht kann, ist von größter Bedeutung. Diese neue Technologie hilft uns dabei, dieses Ziel zu erreichen."
 night_vision_b:0 "Nachtsicht IV"
 night_vision_b_desc:0 "Die Fähigkeit, den Feind zu sehen, während er es nicht kann, ist von größter Bedeutung. Diese neue Technologie hilft uns dabei, dieses Ziel zu erreichen."
 night_vision_c:0 "Nachtsicht V"
 night_vision_c_desc:0 "Die Fähigkeit, den Feind zu sehen, während er es nicht kann, ist von größter Bedeutung. Diese neue Technologie hilft uns dabei, dieses Ziel zu erreichen."
 night_vision_d:0 "Nachtsicht VI"
 night_vision_d_desc:0 "Die Fähigkeit, den Feind zu sehen, während er es nicht kann, ist von größter Bedeutung. Diese neue Technologie hilft uns dabei, dieses Ziel zu erreichen."
 night_vision_desc:0 "Den Feind sehen zu können, ohne selbst gesehen zu werden, ist für Nachteinsätze von entscheidender Bedeutung. Dank der Erfindung der Infrarottechnologie können wir unsere Armee mit Geräten ausstatten, die dies zwar unhandlich, aber möglich machen."
