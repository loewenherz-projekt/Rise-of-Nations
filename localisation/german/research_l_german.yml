 advanced_infantry_weapons2:0 "Verbesserte Infanterieausrüstung III"
 advanced_infantry_weapons2_desc:0 "Persönliche und Mannschaftswaffen für die Infanterie sowie verschiedene andere Ausrüstungsgegenstände, die ein Soldat benötigt. Weitere Modernisierungen umfassen nun auch persönliche Sturmgewehre und Panzerabwehrraketen. Verbesserte Verfügbarkeit von Waffen, die zuvor nur in begrenztem Umfang verteilt wurden."
 advanced_infantry_weapons_a:0 "Fortschrittliche Infanterieausrüstung"
 advanced_infantry_weapons_a_desc:0 "Die Waffen, Gott sei Dank, die Waffen …"
