 WW1_tech_recon2:0 "Aufklärungskompanie IV"
 WW1_tech_recon2_desc:0 "Bei militärischen Operationen ist Aufklärung oder Erkundung die Erkundung eines Gebiets durch Streitkräfte, um Informationen über feindliche Streitkräfte, das Gelände und andere Aktivitäten zu erhalten. Beispiele für Aufklärung sind Patrouillen von Truppen (Plänkler, Langstreckenaufklärungspatrouille, US Army Rangers, Kavallerieaufklärer oder Spezialisten des militärischen Geheimdienstes), Schiffen oder U-Booten, bemannten oder unbemannten Aufklärungsflugzeugen, Satelliten oder die Einrichtung von Beobachtungsposten. Spionage wird üblicherweise als etwas anderes als Aufklärung angesehen, da sie von nicht uniformiertem Personal hinter den feindlichen Linien durchgeführt wird."
 WW1_tech_recon3:0 "Aufklärungskompanie V" 
 WW1_tech_recon3_desc:0 "Bei militärischen Operationen ist Aufklärung oder Erkundung die Erkundung eines Gebiets durch Streitkräfte, um Informationen über feindliche Streitkräfte, das Gelände und andere Aktivitäten zu erhalten. Beispiele für Aufklärung sind Patrouillen von Truppen (Plänkler, Langstreckenaufklärungspatrouille, US Army Rangers, Kavallerieaufklärer oder Spezialisten des militärischen Geheimdienstes), Schiffen oder U-Booten, bemannten oder unbemannten Aufklärungsflugzeugen, Satelliten oder die Einrichtung von Beobachtungsposten. Spionage wird üblicherweise als etwas anderes als Aufklärung angesehen, da sie von nicht uniformiertem Personal hinter den feindlichen Linien durchgeführt wird."
