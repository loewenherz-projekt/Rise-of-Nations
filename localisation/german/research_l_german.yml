 assault_breakthrough:0 "Angriffsdurchbruch"
 assault_breakthrough_desc:0 "Anstatt einen Großangriff entlang der gesamten Front zu starten, kann es viel effektiver sein, den Angriff auf nur einen oder wenige Punkte der feindlichen Linie zu konzentrieren und dort einen Durchbruch zu erzielen."
 assault_concentration:0 "Angriffskonzentration"
 assault_concentration_desc:0 "Vor einem Angriff werden die führenden Elemente sorgfältig vorbereitet und in vorderster Position platziert, um sicherzustellen, dass in den ersten Momenten maximale Kraft eingesetzt werden kann."
 assembly_line_production:0 "Fließbandproduktion"
 assembly_line_production_desc:0 "Das motorisierte Fließband, das in vielen Branchen bereits im Einsatz ist, kann den Verlauf eines Krieges ändern, indem es eine beispiellose Produktionslawine ermöglicht."
 asw_tech:0 "Technologie zur U-Boot-Abwehr"
 atomic_research:0 "Atomforschung"
 atomic_research_desc:0 "Bei der Kernspaltung werden durch die Spaltung des Atoms enorme Energiemengen und eine grenzenlose Zerstörungskraft freigesetzt."
