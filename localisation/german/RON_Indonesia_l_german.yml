l_german:
INS_claim_guinea:0 "Anspruch auf Guinea"
INS_claim_guinea:0 "Ob deutsch oder australisch: Die Insel Guinea wird seit langem von Leuten kontrolliert, die kein Interesse an ihrer Bevölkerung haben und keinen Anspruch auf sie haben. Wir werden das ändern."
INS_form_the_home_guard:0 "Bilden Sie die Heimwehr"
INS_form_the_home_guard_desc:0 "Wenn militärische Maßnahmen ergriffen werden, erfolgt dies zunächst in der Verteidigung und erst später im Einsatz. Daher ist die Wiederherstellung unserer Heimatverteidigung zu einer effizienten Kampfeinheit von größter Bedeutung."
INS_interventionism:0 "Interventionismus"
INS_interventionism_desc:0 "Die KNIL hat eine lange Tradition der Freiwilligenarbeit, und es ist nur natürlich, diese Begeisterung ins 20. Jahrhundert zu übertragen."
INS_ambonese_auxilaries:0 "Ambonesische Hilfskräfte"
INS_ambonese_auxilaries_desc:0 "Obwohl sie nur einen kleinen Teil der Bevölkerung ausmachen, haben sich die Ambonesen in Kriegszeiten als zuverlässig erwiesen. Ihre Organisation als Hilfstruppen ist daher nur logisch."
INS_city_fortifications:0 "Stadtbefestigung"
INS_city_fortifications_desc:0 "Da wir nun eine eigene Garnison haben, ist es an der Zeit, sie mit dem Bau vorläufiger Verteidigungsanlagen für unsere Städte zu beauftragen. Selbst die kleinsten Anstrengungen werden sich im Ernstfall auszahlen."
INS_expand_the_officers_corps:0 "Erweitern Sie das Offizierskorps"
INS_expand_the_officers_corps_desc:0 "In unserer gesamten Kommandostruktur sind Segregation und ethnische Ungleichgewichte weit verbreitet. Wenn wir einheimische Offiziere angemessen ausbilden und unterstützen können, wird unser Kommando davon erheblich profitieren."
INS_raaf_assistance:0 "RAAF-Unterstützung"
INS_raaf_assistance_desc:0 "Australien ist der engste Verbündete, der in Krisenzeiten echte Unterstützung leisten kann. Eine verstärkte Luftunterstützung ist ein einfacher, aber entscheidender Schritt zur Unterstützung."
INS_indonesian_fighter_schools:0 "Indonesische Kampfsportschulen"
INS_indonesian_fighter_schools_desc:0 "Theorie und Vorräte reichen nicht aus. Wenn unsere Luftwaffe weiter vorankommen soll, müssen wir die nächste Generation von Fliegerassen ausbilden."
INS_air_by_sea:0 "Luft- und Seeweg"
INS_air_by_sea_desc:0 "Britische Strategen sind in der Vergangenheit an uns herangetreten und haben um eine stärkere militärische Zusammenarbeit zum Schutz ihrer asiatischen Kolonien gebeten. Vielleicht ist es an der Zeit, darauf zu reagieren."
INS_the_flying_dutchmen:0 "Die Fliegenden Holländer"
INS_the_flying_dutchmen_desc:0 "Träumen schadet nie."
INS_stay_with_the_netherlands:0 "Bleiben Sie bei den Niederlanden"
INS_stay_with_the_netherlands_desc:0 "Obwohl die Unabhängigkeit verlockend ist, ist es im aktuellen globalen Umfeld nicht praktikabel, sie allzu sehr anzustreben. Es ist – zumindest vorerst – eine weitaus bessere Idee, uns weiterhin am Status quo auszurichten."
INS_jewel_of_the_pacific:0 "Juwel des Pazifiks"
INS_jewel_of_the_pacific_desc:0 "Wenn Indien das Juwel des Britischen Empires ist, dann ist Ostindien unser Juwel. Unser Reichtum und unsere Ressourcen sind das letzte große Überbleibsel des niederländischen Seeimperiums, und wir sollten alles tun, um es zu schützen."
INS_empower_the_volksraad:0 "Den Volksraad stärken"
INS_empower_the_volksraad_desc:0 "Unser Volksrat ist zwar eine großartige Geste, aber er ist schwach, ineffizient und weitgehend machtlos. Um eine echte Demokratie zu werden, ist eine weitere Stärkung der Bevölkerung notwendig."
INS_kebangkitan:0 "Kebangkitan"
INS_kebangkitan_desc:0 "Erwacht, liebe Indonesier, und entdeckt das Erbe eures Heimatlandes neu. „Lang lebe mein Land, lang lebe mein Land, mein Volk, meine Heimat, alles davon; möge ihre Seele auferstehen, möge ihr Körper erwachen.“"
INS_PNI:0 "PNI"
INS_PNI_desc:0 "Der einzige Weg nach vorn und tatsächlich auch der einzige Weg zum Überleben führt über den starken, nationalistischen Staat, den die Nationale Partei Indonesiens verspricht. Kompromisse schwächen nur unsere Chancen auf Freiheit. "
INS_java_shipyards:0 "Java-Werften"
INS_java_shipyards_desc:0 "Wenn wir eine autonome Seemacht sein wollen, müssen wir uns auch entsprechend verhalten. Der Bau geeigneter Werften für den Schiffsbau ist der erste Schritt."
INS_fortify_the_ports:0 "Befestigen Sie die Häfen"
INS_fortify_the_ports_desc:0 "Unsere Marinestützpunkte bilden die erste Verteidigungslinie, daher sollte ihr Schutz unsere oberste Priorität sein."
INS_naval_autonomy:0 "Marineautonomie"
INS_naval_autonomy_desc:0 "Obwohl die niederländische Marine ein beträchtliches Kontingent an unseren Küsten stationiert hat und schützt, haben wir keinen Einfluss auf deren Einsatz. Die Forderung nach maritimer Autonomie ist der erste Schritt zu unserer Beherrschung der Meere."
INS_the_test_flight_service:0 "„Der Testflugdienst“"
INS_the_test_flight_service_desc:9 "Seit 1915 ist das KNIL am Himmel präsent. Es ist Zeit, dass unser „Testflugdienst“ die Entwicklung erhält, die er verdient."
INS_knil_integration:0 "KNIL-Integration"
INS_knil_integration_desc:0 "Unsere Luftstreitkräfte waren von Anfang an darauf ausgelegt, die Hauptarmee zu unterstützen. Durch den Bau strategischer Luftwaffenstützpunkte in der Region können wir die Unterstützung in unserem gesamten Gebiet effektiver gewährleisten."
INS_coastal_entrenchment:0 "Küstenbefestigung"
INS_coastal_entrenchment_desc:0 "Der letzte Schritt zur Sicherung unserer Küstenverteidigung ist die richtige Konstruktion. Unsere Küsten werden für feindliche Streitkräfte uneinnehmbar sein. "
INS_british_ship_designs:0 "Ausländische Schiffsdesigns"
INS_british_ship_designs_desc:0 "Unsere niederländischen Kollegen haben Zugriff auf eine große Auswahl ausländischer Schiffsdesigns. Es ist daher nur vernünftig, diese für unsere eigene Arbeit anzufordern."
INS_ABDA:0 "ABDA"
INS_ABDA_desc:0 "Die gemeinsame Koordination der Seemächte der Region ist die beste Antwort auf die wachsenden Bedrohungen. Gemeinsam sind wir stark."
INS_joint_wargames:0 "Gemeinsame Kriegsspiele"
INS_joint_wargames_desc:0 "Es ist an der Zeit, unsere neue Seemacht in der Region zu demonstrieren. Jeder soll von unserer Stärke Kenntnis nehmen."
INS_convoy_protection:0 "Konvoischutz"
INS_convoy_protection_desc:0 "Alle Fortschritte in der Welt bedeuten nicht, dass wir die Herren der Meere sind. Um unsere Gewässer wirklich zu beherrschen, müssen wir uns auf Macht und Schutz konzentrieren."
INS_ship_a_day_tactics:0 "Taktiken für „Versand pro Tag“"
INS_ship_a_day_tactics_desc:0 "Unsere Schiffe sind keine Giganten, sondern Wölfe, die bereit sind, ahnungslose Feinde zu jagen. Unsere Marinetaktik sollte dies widerspiegeln."
INS_koninklijk_nederlands_indisch_leger:0 "Koninklijk Nederlands Indisch Leger"
INS_koninklijk_nederlands_indisch_leger_desc:0 "Unsere Armee, wenn man sie überhaupt so nennen kann, ist zersplittert, vernachlässigt und nahezu veraltet. Deshalb sollte sie das Erste sein, worauf wir uns konzentrieren."
INS_naval_warfare:0 "Seekrieg"
INS_naval_warfare_desc:0 "Ohne die Möglichkeit, Truppen vor Ort einzusetzen, ist jede Überlegenheit zur See nutzlos. Unsere Strategie sollte dies widerspiegeln."
INS_KNIL_marines:0 "KNIL Marines"
INS_KNIL_marines_desc:0 "Einen Krieg zu führen bedeutet, an allen Fronten zu kämpfen, und aufgrund unserer Lage am Pazifik bedeutet dies, dass vor allem an den Stränden gekämpft wird."
INS_reform_the_knil:0 "Reform der KNIL"
INS_reform_the_knil_desc:0 "Unsere Reformen waren zwar langwierig und schmerzhaft, aber sie waren ein Erfolg! Unsere Söhne werden Indonesien wie ein Raubvogel tragen und auf der Hut vor allen Feinden sein."
INS_non_discriminatory_conscription:0 "Nichtdiskriminierende Wehrpflicht"
INS_non_discriminatory_conscription_desc:0 "Unsere Rekrutierungsmethoden waren in den letzten drei Jahrzehnten planlos, und der Versuch, eine europäische Mehrheit bei gleichzeitig ausreichender Truppenstärke zu halten, hat unzählige Probleme verursacht. Die Abschaffung aller rassistisch motivierten Wehrpflichtquoten ist der einfachste Weg, unsere Armeestruktur zu rationalisieren."
INS_guerilla_tactics:0 "Guerilla-Taktiken"
INS_guerilla_tactics_desc:0 "Unsere Truppen müssen bereit sein, im Dschungel, in den Bergen und auf der Ebene um jeden Zentimeter Territorium zu kämpfen, wenn sie auf Sieg und Überleben hoffen wollen."
INS_preemptive_defense:0 "Präventive Verteidigung"
INS_preemptive_defense_desc:0 "Wenn wir Krieg führen, dann in einem wirklich modernen Ausmaß, nur dann ist uns der Sieg sicher."
INS_the_royal_batavian_society:0 "Die Königliche Batavische Gesellschaft"
INS_the_royal_batavian_society_desc:0 "Die Royal Batavian Society besteht seit über 150 Jahren und repräsentiert die lange gemeinsame Geschichte unserer Kolonie mit wissenschaftlichen Bestrebungen. Die Gründung dieser Organisation ist der erste Schritt zur Stärkung des wissenschaftlichen Geistes in unserem Land."
INS_phillips_radio:0 "Phillips Radio"
INS_phillips_radio_desc:0 "Die Radiotechnologie ist seit jeher ein Stolz der Niederlande, und 1927 hörten wir die Worte unserer Königin über die Ozeane bis zu unseren Küsten. Wir müssen das daraus gewonnene Know-how für unsere eigenen Bemühungen nutzen."
INS_royal_scientific_cooperation:0 "Königliche wissenschaftliche Zusammenarbeit"
INS_royal_scientific_cooperation_desc:0 "Forschungsteams aus den Niederlanden und West- und Ostindien sollten zusammenarbeiten, um einen gemeinsamen wissenschaftlichen Prozess zu entwickeln. Wenn alle Teile der Welt zusammenarbeiten, gibt es kein Problem, das wir nicht lösen können. "
INS_knowledge_economy:0 "Wissensökonomie"
INS_knowledge_economy_desc:0 "Indonesiens Bevölkerung ist seine größte Ressource. Wenn wir unser Humankapital nutzen würden, könnten unsere Wirtschaft und Technologie größere Höhen erreichen als je zuvor."
INS_local_universities:0 "Lokale Universitäten"
INS_local_universities_desc:0 "Indem wir unserer Bevölkerung eine höhere Bildung ermöglichen, haben wir den Kern unseres Problems beseitigt. Mit den klugen Köpfen der indonesischen Zukunft wird unser Land noch stärker werden. "
INS_scientific_exceptionalism:0 "Wissenschaftlicher Exzeptionalismus"
INS_scientific_exceptionalism_desc:0 "Nachdem wir den Grundstein für künftige Forschungsbemühungen gelegt haben, können wir uns nun darauf konzentrieren, in unserem Land einen wissenschaftlichen Geist zu fördern und die indonesische wissenschaftliche Ausnahmestellung zu fördern."
INS_foreign_experts:0 "Ausländische Experten"
INS_foreign_experts_desc:0 "Durch die Zusammenarbeit mit Akademikern aus aller Welt werden wir unsere wissenschaftlichen und technologischen Ressourcen voll ausschöpfen und die Bedeutung unseres Landes in der Welt der Wissenschaft stärken."
INS_industrial_centralisation:0 "Industrielle Zentralisierung"
INS_industrial_centralisation_desc:0 "Obwohl wir über umfangreiche Ressourcen verfügen, verfügen wir über keine nennenswerte Zivilwirtschaft. Ein Großteil unseres Reichtums wird exportiert, ohne dass unsere Bevölkerung etwas davon hat. Die Konzentration auf eine stabile Zivilwirtschaft wird unser erster Schritt in Richtung Wirtschaftswachstum sein."
INS_restore_the_arms_factories:0 "Wiederherstellung der Waffenfabriken"
INS_restore_the_arms_factories_desc:0 "Auf unserem Boden wurden seit Jahren keine größeren Waffen mehr hergestellt. Unsere Rüstungsfabriken müssen wieder aufgebaut werden, um unsere Soldaten mit modernen Waffen auszustatten."
INS_colonial_infrastructure:0 "Koloniale Infrastruktur"
INS_colonial_infrastructure_desc:0 "Die bestehenden kolonialen Bemühungen, die Kolonien zu verbinden, lassen zwar noch viel zu wünschen übrig, sind aber der perfekte Ausgangspunkt für die Schaffung eines vernetzten Indonesiens."
INS_connect_the_islands:0 "Verbinde die Inseln"
INS_connect_the_islands_desc:0 "Wir können uns nicht allein auf die Infrastruktur auf dem Festland verlassen. Auf allen unseren Inseln müssen entsprechende Industrieprojekte durchgeführt werden, um uns auf die zunehmende Industrialisierung vorzubereiten."
INS_expand_our_industries:0 "Erweitern Sie unsere Branchen"
INS_expand_our_industries_desc:0 "Exportgüter sind seit jeher das Grundnahrungsmittel der ostindischen Wirtschaft. Und obwohl wir alle Anstrengungen unternehmen müssen, um diese zu diversifizieren, hat es keinen Sinn, die lukrative Industrie, die wir geerbt haben, aufzugeben."
INS_economic_independence:0 "Wirtschaftliche Unabhängigkeit"
INS_economic_independence_desc:0 "Autarkie ist die einzig wahre Autonomie. Unsere Souveränität ist nur dann vollständig, wenn unsere Ressourcen ausschließlich unserem Volk gehören und wir für unsere Existenz und unser Überleben nicht mehr von anderen Ländern abhängig sind."
INS_earthworks:0 "Erdarbeiten"
INS_earthworks_desc:0 "Wenn wir die Möglichkeit haben, unser Terrain neu zu gestalten, können wir beginnen, uns die Erde unserer großartigen Heimat wirklich anzueignen und sie optimal zu nutzen."
INS_continue_the_modernisation:0 "Fortsetzung der Modernisierung"
INS_continue_the_modernisation_desc:0 "Die „Ethische Politik“ war ein Segen für unsere Wirtschaft und brachte unseren Bürgern dringend benötigte Erleichterungen und Wohlstand. Doch sie reichte nicht aus. Um unsere Modernisierungsbemühungen in Ostindien fortzusetzen, sind nun mehr Mittel erforderlich."
INS_civilian_works:0 "Zivile Arbeiten"
INS_civilian_works_desc:0 "Massive Abholzung und neue Fabriken werden unserer Wirtschaft neuen Schwung verleihen und unserem Land neue industrielle Impulse verleihen."
INS_airborne_industries:0 "Luftgestützte Industrien"
INS_airborne_industries_desc:0 "Für uns als Inselstaat ist eine starke Luftfahrtindustrie von größter Bedeutung für eine bessere Konnektivität. Durch die Verstaatlichung der Luftwege können wir dies erreichen."
INS_envoy_to_japan:0 "Gesandter nach Japan"
INS_envoy_to_japan_desc:0 "Da das einzige nationalistische Land in unserer Region zugleich die größte Regionalmacht ist, ist es logisch, Beziehungen aufzubauen, um unserer Bewegung im Inland weitere Legitimität zu verleihen. "
INS_the_agreement:0 "Die Vereinbarung"
INS_the_agreement_desc:0 "Es ist kein Geheimnis, dass die Japaner Interessen auf unserem Territorium haben, aber vielleicht können wir dies in unserem Kampf um die Freiheit zu unserem Vorteil nutzen."
INS_begin_the_transition:0 "Beginnen Sie mit dem Übergang"
INS_begin_the_transition_desc:0 "Der große Geist Indonesiens hat über alle seine Feinde gesiegt. Doch unsere Nation wurde für das Volk errichtet, und nun werden wir beginnen, sie ihm zurückzugeben."
INS_guided_democracy:0 "Geführte Demokratie"
INS_guided_democracy_desc:0 "Die Demokratie des Westens ist korrupt und nicht besser als der Faschismus. Es ist Zeit, ein neues Führungssystem einzuführen."
INS_soeara_rakyat:0 "Soeara Rakyat"
INS_soeara_rakyat_desc:0 "Wenn wir eine Bewegung des Volkes sein wollen, muss unsere Botschaft zuerst die Menschen erreichen. Lokale politische Zeitungen und Broschüren sollen unser Sprachrohr der Revolution sein."
INS_envoy_to_moscow:0 "Gesandter in Moskau"
INS_envoy_to_moscow_desc:0 "Obwohl sie weit von uns entfernt sind, besteht die Möglichkeit, dass die Russen unsere Sache unterstützen, und sei es nur, um zu verhindern, dass wir uns erfolgreich mit einer der anderen Großmächte verbünden."
INS_claim_borneo:0 "Anspruch auf Borneo"
INS_claim_borneo_desc:0 "Die britischen Ansprüche auf Borneo sind für die Menschen, die sie ausbeuten, bedeutungslos. Unsere Grenze bietet uns die perfekte Gelegenheit, Land von diesen Kolonisatoren zurückzufordern."
INS_claim_timor:0 "Anspruch auf Timor"
INS_claim_timor_desc:0 "Die portugiesische Präsenz in Timor ist gering, stellt aber dennoch einen kolonialen Einfluss dar. Wir müssen wahre Befreier sein, keine Kolonialmacht soll unsere Inseln kontrollieren."
INS_military_indoctrination:0 "Militärische Indoktrination"
INS_military_indoctrination_desc:9 "Wir haben Freiheit und Macht, doch beides ist zerbrechlich. Um unseren Platz in der Geschichte zu sichern, ist eine weitere Stärkung unserer militärischen Macht erforderlich."
INS_collectivise_industry:0 "Kollektivierung der Industrie"
INS_collectivise_industry_desc:0 "Die Revolution war erfolgreich, jetzt ist es an der Zeit, dass die Früchte unserer Arbeit zu den Menschen zurückkehren, wo sie hingehören."
INS_indigenous_voices:0 "Indigene Stimmen"
INS_indigenous_voices_desc:0 "Wir können auf die Vielfalt unserer Nation stolz sein und nur durch die Unterstützung und Förderung unserer Kulturen kann es uns gelingen, wirklich frei zu werden."
INS_one_country_one_people_one_language:0 "Ein Land, ein Volk, eine Sprache"
INS_one_country_one_people_one_language_desc:0 "Wenn wir unser Volk vereinen wollen, dürfen wir uns nicht über triviale Fragen der Sprache oder Rasse spalten lassen. In diesem großen Kampf sind wir alle Indonesier."
INS_our_own_path:0 "Unser eigener Weg"
INS_our_own_path_desc:0 "Weder Japan noch Russland stellen die Mittel für unsere Befreiung zur Verfügung. Nur wir allein können unsere souveräne Unabhängigkeit wirklich garantieren."
INS_hari_kemerdekaan:0 "Hari Kemerdekaan"
INS_hari_kemerdekaan_desc:0 "Wir haben so lange auf unsere Freiheit gewartet, dass es kaum zu glauben ist, dass wir endlich da sind. Mögen die Indonesier den Tag unserer Unabhängigkeit für immer in Erinnerung behalten!"
INS_our_struggle:0 "„Unser Kampf“"
INS_our_struggle_desc:0 "Unser Kampf für die Freiheit ist ein Kampf der Würde, nicht der Gewalt oder des Aufruhrs. Mit jedem Schritt, den wir gehen, zeigen wir der Welt unser Recht auf unabhängige und souveräne Selbstverwaltung. "
INS_allied_but_equal:0 "Verbündet, aber gleichberechtigt"
INS_allied_but_equal_desc:0 "Unsere beste Chance auf Unabhängigkeit besteht darin, den Niederländern als Freunde und nicht als Gegner zu begegnen. Wenn wir sie davon überzeugen können, dass wir ihnen als Gleichgestellte mehr nützen als als Untertanen, ist die Freiheit gesichert."
INS_invite_foreign_investors:0 "Laden Sie ausländische Investoren ein"
INS_invite_foreign_investors_desc:0 "Die Akzeptanz grenzüberschreitender Investitionen ausländischer Unternehmen ist der Schlüssel zur Entwicklung unseres aufstrebenden lokalen Marktes und zur Einleitung unseres Weges in Richtung Globalisierung."
INS_koninklijk_paketvaart_maatschappij:0 "„Koninklijk Paketvaart Maatschappij“"
INS_koninklijk_paketvaart_maatschappij_desc:0 "Die Handelsrouten Indiens waren für die alte East India Company eine Quelle großen Reichtums. Mit der richtigen staatlichen Unterstützung kann auch unsere Wirtschaft florieren."
INS_maphilindo:0 "MaPhilIndo"
INS_maphilindo_desc:0 "Unser Engagement für Demokratie und Freiheit für alle Nationen ist tadellos. Es ist an der Zeit, dass wir uns an die Großmächte wenden und sie um die Vereinigung unserer Brüder und Schwestern in Freiheit und Einheit bitten."
INS_peacetime_economics:0 "Friedensökonomie"
INS_peacetime_economics_desc:0 "Unsere Freiheit hat lange auf sich warten lassen, und nun ist es an der Zeit, die Früchte unserer harten Arbeit zu ernten. Die Völker Indonesiens werden keine Unruhen oder Kriege mehr fürchten müssen, sondern Frieden und Wohlstand."
INS_unity_in_diversity:0 "Einheit in der Vielfalt"
INS_unity_in_diversity_desc:0 "Obwohl wir als Volk unterschiedlich und getrennt sind, ist die neue gemeinsame Nationalität, die wir als Volk haben, in diesen schwierigen Zeiten ein großer Verbündeter. Jeder Mann und jede Frau sollte stolz darauf sein, sich Indonesier zu nennen."
INS_PKI:0 "PKI"
INS_PKI_desc:0 "Das wahre Übel des Kolonialismus liegt darin, dass die Reichen und Mächtigen den einheimischen Völkern ihren Reichtum und Wohlstand entreißen. Die Kommunistische Partei Indonesiens wird dieses Unrecht wiedergutmachen."
INS_political_concessions:0 "Politische Zugeständnisse"
INS_political_concessions_desc:0 "Angesichts des gegenwärtigen angespannten politischen Klimas können unsere Anhänger im Gegenzug für die relative Stabilität, die wir bieten, politische Autonomie erlangen."
INS_defensive_politics:0 "Defensive Politik"
INS_defensive_politics_desc:0 "Nachdem wir unsere inneren Faktoren stabilisiert haben, müssen wir nach außen eine einheitliche politische Front präsentieren. Die Wahl einer defensiven Politik wird einen starken Zusammenhalt in unserem politischen Umfeld gewährleisten."
INS_non_aligned_movement:0 "Blockfreie Bewegung"
INS_non_aligned_movement_desc:0 "Die Unabhängigkeit Indonesiens ist ein Aufruf an alle Nationen und zeigt, dass Freiheit von den Großmächten möglich ist. Um die Interessen aller blockfreien Länder zu schützen, werden wir die Führung dieser Bewegung übernehmen."
INS_asian_superiority:0 "Asiatische Überlegenheit"
INS_asian_superiority_desc:0 "Unser Aufstieg ist kometenhaft, unser Vermächtnis gesichert. Jetzt müssen wir der Welt nur noch zeigen, welche wahre Macht wir in den Meeren Asiens haben."
INS_strike_japan:0 "Streik Japan"
INS_strike_japan_desc:0 "Der faschistische Kriegstreiber Japan stellt eine ständige Bedrohung für die Stabilität in der Region dar. Nur wenn wir die anhaltende Gefahr, die er darstellt, neutralisieren, können wir unseren anhaltenden Wohlstand sichern."
INS_konfrontasi:0 "Konfrontasi"
INS_konfrontasi_desc:0 "Britisch-Malaya ist nichts weiter als ein Marionettenstaat, ein abscheulicher Schandfleck für die freien Völker Südostasiens. Wir werden diesen Schandfleck beseitigen und die Dominanz Indonesiens in der Region weiter festigen."
INS_liberate_the_philippines:0 "Befreie die Philippinen"
INS_liberate_the_philippines_desc:0 "Die amerikanische Kontrolle über die Philippinen ist nicht besser als die der Kolonien anderer alter Mächte. Wir werden unsere Brüder aus der Gewalt ihrer amerikanischen Besatzer befreien!"
INS_westernisation:0 "Verwestlichung"
INS_westernisation_desc:0 "Unsere Kolonialregierung ist zwar wohlwollend, aber immer noch unglaublich unbeliebt. Wenn wir unserer Bevölkerung westliche Werte und Ideen vermitteln können, ist es wahrscheinlich, dass sie unsere Herrschaft eher akzeptieren wird."
INS_limited_autonomy:0 "Eingeschränkte Autonomie"
INS_limited_autonomy_desc:0 "Wir haben der niederländischen Regierung unsere Loyalität bewiesen. Vielleicht gewährt sie uns im Gegenzug eine gewisse Autonomie, damit wir unsere Herrschaft fortsetzen können."
INS_defense_pacts:0 "Verteidigungspakte"
INS_defense_pacts_desc:0 "Die Formalisierung unserer Verteidigungsvereinbarungen mit unseren Nachbarn würde bedeuten, dass wir unsere Neutralität in der Region aufgeben, aber das ist ein geringer Preis für den Schutz."



committed_colonialist:0 "Engagierter Kolonialist"
committed_colonialist_desc:0 "Dieser Führer ist der Kolonialverwaltung gegenüber äußerst loyal und lehnt jede Form von Unabhängigkeitsbewegung ab."
nationalist_uniter:0 "Nationalistischer Vereiniger"
nationalist_uniter_desc:0 "Dieser Führer glaubt an die Selbstbestimmung der Völker und ist mehr als bereit, ihnen dabei zu helfen."
committed_revolutionary:0 "Engagierter Revolutionär"
committed_revolutionary_desc:0 "Dieser Führer ist der internationalen Revolution verpflichtet und wird vor nichts zurückschrecken, um seinen Nachbarn Freiheit zu bringen."
democratic_defender:0 "Demokratischer Verteidiger"
democratic_defender_desc:0 "Dieser Führer betrachtet die Demokratie seines Landes als ein hart erkämpftes Recht und wird sie um jeden Preis verteidigen."

INS_naval_autonomy_tooltip:0 "Selbst wenn die Niederlande nicht akzeptieren, erhalten wir dennoch eine kleine Belohnung."
INS_bunker_tooltip:0 "Fügt Festungen in wichtigen Stadtprovinzen hinzu."
INS_ports_tooltip:0 "Fügt Küstenfestungen auf wichtigen Marinestützpunkten hinzu."
