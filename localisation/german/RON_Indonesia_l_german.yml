#Starting ideas
 INS_army_idea:0 "Unzusammenhängende Armee"
INS_army_idea_desc:0 "Obwohl unsere Armee für die Friedenssicherung ausreichend ist, ist sie durch die Abhängigkeit von niederländischer Unterstützung und den Mangel an einheimischen Offizieren in unseren Reihen geschwächt und ineffektiv geworden. Es sind umfassende Reformen erforderlich."
 INS_economy_idea:0 "Kolonialwirtschaft"
INS_economy_idea_desc:0 "Obwohl wir ein wohlhabendes Land sind, wird ein so großer Teil unserer Produktion ins Ausland exportiert, dass unsere heimische Wirtschaft darunter leidet."
 INS_science_idea:0 "Bildungsreformen"
INS_science_idea_desc:0 "Obwohl sich die Lage verbessert, ist Bildung immer noch ausschließlich den Eliten vorbehalten, was zum Nachteil unserer Nation ist."
INS_political_idea:0 "Nationales Erwachen"
INS_political_idea_desc:0 "Bei unseren Bürgern ist das Nationalbewusstsein groß, unser Volk sehnt sich nach Freiheit."

#focus ideas
INS_volunteers_idea:0 "Interventionismus"
INS_volunteers_idea_desc:0 "Die KNIL hat eine lange Tradition der Freiwilligenarbeit, und es ist nur natürlich, diese Begeisterung ins 20. Jahrhundert zu übertragen."
INS_army_idea_two:0 "Armeereformen"
INS_army_idea_two_desc:0 "Obwohl eine echte Reform noch in weiter Ferne liegt, ist dies der erste Schritt."
INS_army_idea_two_1:0 "Armeereformen"
INS_army_idea_two_1_desc:0 "Obwohl eine echte Reform noch in weiter Ferne liegt, ist dies der erste Schritt."
INS_army_idea_two_2:0 "Armeereformen"
INS_army_idea_two_2_desc:0 "Obwohl eine echte Reform noch in weiter Ferne liegt, ist dies der nächste Schritt."
INS_army_idea_two_3:0 "Armeereformen"
INS_army_idea_two_3_desc:0 "Obwohl eine echte Reform noch in weiter Ferne liegt, ist dies der letzte Schritt."
INS_army_idea_six:0 "Kartika Eka Paksi"
INS_army_idea_six_desc:0 "Unsere Reformen waren zwar langwierig und schmerzhaft, aber sie waren ein Erfolg! Unsere Söhne werden Indonesien wie ein Raubvogel tragen und auf der Hut vor allen Feinden sein."
INS_ace_idea:0 "Flügel des Vaterlandes"
INS_ace_idea_desc:0 "Indonesien wird seinen Himmel beherrschen."
INS_coastal_entrenchment_idea:0 "Küstenbefestigung"
INS_coastal_entrenchment_idea_desc:0 ""
INS_abda_idea:0 "ABDA"
INS_abda_idea_desc:0 "Amerikanisch-Britisch-Niederländisch-Australisches Kommando"
INS_science_idea_1:0 "Bildungsreformen"
INS_science_idea_1_desc:0 "Obwohl sich die Lage verbessert, ist Bildung immer noch ausschließlich den Eliten vorbehalten, was zum Nachteil unserer Nation ist."
INS_science_idea_two:0 "Lokale Universitäten"
INS_science_idea_two_desc:0 "Unsere Bildungseinrichtungen sind der Stolz Südostasiens. Wir haben gute Arbeit geleistet, um den Führungskräften von morgen die Lektionen von heute beizubringen."
INS_economy_idea_two:0 "Koninklijk Paketvaart Maatschappij"
INS_economy_idea_two_desc:0 "Die Reichtümer Indonesiens stehen den Menschen wieder zur Verfügung, diesmal für sie."
INS_political_idea_two:0 "Koloniale Loyalität"
INS_political_idea_two_desc:0 "Von einer gewaltsamen Revolution kann derzeit nicht die Rede sein. Alle unsere Bemühungen müssen auf eine friedliche Trennung vom Mutterland gerichtet sein."
INS_political_idea_two_1:0 "Koloniale Loyalität"
INS_political_idea_two_1_desc:0 "Von einer gewaltsamen Revolution kann derzeit nicht die Rede sein. Alle unsere Bemühungen müssen auf eine friedliche Trennung vom Mutterland gerichtet sein."
INS_political_idea_democracy:0 "Demokratische Unterstützung"
INS_political_idea_democracy_desc:0 "Demokratie ist die Zukunft, lasst uns danach streben."
INS_political_idea_fascism:0 "Faschistische Unterstützung"
INS_political_idea_fascism_desc:0 "Um die Unabhängigkeit zu erreichen, bedarf es einer starken Nation und eines starken Führers, der sie führt."
INS_political_idea_fascism_1:0 "Faschistische Unterstützung"
INS_political_idea_fascism_1_desc:0 "Um die Unabhängigkeit zu erreichen, bedarf es einer starken Nation und eines starken Führers, der sie führt."
INS_political_idea_communism:0 "Kommunistische Unterstützung"
INS_political_idea_communism_desc:0 "Zu lange haben die Reichen über den einfachen Mann geherrscht, jetzt ist das vorbei."
INS_political_idea_communism_1:0 "Kommunistische Unterstützung"
INS_political_idea_communism_1_desc:0 "Zu lange haben die Reichen über den einfachen Mann geherrscht, jetzt ist das vorbei."
INS_political_idea_democratic:0 "Demokratischer Übergang"
INS_political_idea_democratic_desc:0 "Unsere Freiheit war ein Erfolg! Jetzt geht es darum, unserer Regierung wieder Frieden zu verschaffen."
INS_political_idea_democratic_1:0 "Geführte Demokratie"
INS_political_idea_democratic_1_desc:0 "Weder die Traditionen des Westens noch die des Ostens, unsere Lösung ist unsere eigene."
INS_political_idea_three:0 "Kebangkitan"
INS_political_idea_three_desc:0 "Jetzt ist es soweit! Wenn wir gemeinsam kämpfen, ist unsere Freiheit zum Greifen nah!"
INS_political_idea_three_1:0 "Kebangkitan"
