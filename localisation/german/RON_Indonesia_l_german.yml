INS_political_idea_three_2:0 "Kebangkitan"
INS_political_idea_three_2_desc:0 "Jetzt ist es soweit! Wenn wir gemeinsam kämpfen, ist unsere Freiheit zum Greifen nah!"
INS_political_idea_four:0 "Einheit in der Vielfalt"
INS_political_idea_four_desc:0 "Wir sind als Volk im Frieden vereint, nicht in der Gewalt."
