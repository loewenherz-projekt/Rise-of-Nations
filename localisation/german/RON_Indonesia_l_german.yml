indonesia.1.t:0 "Ein Angebot aus Ostindien"
indonesia.1.desc:0 "Obwohl die Hauptstadt Singapur gut verteidigt ist, ist es kein Geheimnis, dass zum Schutz unserer ostasiatischen Kolonien eine stärkere Marinepräsenz erforderlich ist. Ein Kommuniqué der Kolonialregierung Ostindiens eröffnet uns eine interessante Gelegenheit: Sollten wir Luftlieferungen für militärischen Zugang akzeptieren?"
indonesia.1.a:0 "Hauptstadt!"
indonesia.1.b:0 "Unsere derzeitigen Abwehrmechanismen reichen uns völlig aus, vielen Dank."
indonesia.2.t:0 "Das Vereinigte Königreich stimmt zu!"
indonesia.2.desc:0 "Die Royal Navy hat gemeinsame Marineübungen zwischen indonesischen und malaiischen Gewässern begonnen, und britische Kampfflugzeuge werden zu unseren Stützpunkten transportiert. Die Sicherheit unserer Luft- und Seestreitkräfte ist nun doppelt gewährleistet."
indonesia.2.a:0 "Exzellent!"
indonesia.3.t:0 "Großbritannien missbilligt"
indonesia.3.desc:0 "Britische Beamte haben unsere Bitten um Unterstützung durch die RAF abgelehnt, wir sind auf uns allein gestellt."
indonesia.3.a:0 "Verdammt seien sie."
indonesia.4.t:0 "Seeautonomie Ostindiens?"
indonesia.4.desc:0 "Unsere derzeitige Seeposition in Ostindien ist zwar gesichert, doch unsere Werften liegen weit entfernt von Java. Um dem entgegenzuwirken, hat die Kolonialregierung Seeautonomie und das Kommando über ein Geschwader unserer Schiffe gefordert. Sollen wir diesem Wunsch nachkommen?"
indonesia.4.a:0 "Sehr gut."
indonesia.4.b:0 "Wir können es uns nicht leisten, auch nur ein einziges Schiff zu verlieren."
indonesia.5.t:0 "Die Niederlande stimmen zu!"
indonesia.5.desc:0 "Ob aus Apathie oder aus aufrichtigem Glauben an unsere Bemühungen: Die niederländische Regierung hat uns in unserer Region eine begrenzte Seeautonomie gewährt."
indonesia.5.a:0 "Wir werden diese Chance nutzen!"
indonesia.6.t:0 "Die Niederlande lehnen ab."
indonesia.6.desc:0 "Den Haag bevorzugt die direkte Kontrolle über die Region und hat unseren Antrag auf Seeautonomie abgelehnt."
indonesia.6.a:0 "Wir werden ohne sie weiterarbeiten."
indonesia.7.t:0 "Marineübungen in Südostasien"
indonesia.7.desc:0 "Angesichts der angespannten Lage in Asien ist es kein Wunder, dass die Länder ihre Stärke demonstrieren wollen. ROOT bildet da keine Ausnahme und hat begonnen, seine neu gewonnene Seemacht in der Region zu demonstrieren."
indonesia.7.a:0 "Betreffend."
indonesia.7.b:0 "Wir haben der Welt unsere Stärke gezeigt."
indonesia.7.c:0 "Sie werden so schnell groß ..."
indonesia.7.d:0 "Ein Herausforderer naht?"
indonesia.8.t:0 "Begrenzte Autonomie für Ostindien?"
indonesia.8.desc:0 "Während in unseren Kolonien die nationalistischen Sympathien hoch sind, scheint es unserer bestehenden Kolonialregierung gelungen zu sein, die einheimische Bevölkerung zu beschwichtigen. Allerdings wird die Situation nicht lange anhalten, denn die Regierung von Starkenborough hat eine Anfrage nach größerer Autonomie über Ostindien als Gegenleistung für anhaltende Loyalität gestellt."
indonesia.8.a:0 "Ein kleiner Preis für die Stabilität."
indonesia.8.b:0 "Die aktuelle Situation ist für uns in Ordnung."
indonesia.9.t:0 "Erfolg!"
indonesia.9.desc:0 "Unserer Kolonialregierung wurde koloniale Autonomie gewährt, sodass wir nach eigenem Ermessen handeln können. Dies ermöglicht uns eine weitere Expansion unter dem Schutz unseres Mutterlandes." 
indonesia.9.a:0 "Wir werden sie stolz machen."
#added no option
indonesia.54.t:0 "Ablehnung..."
indonesia.54.desc:0 "Offenbar haben wir die koloniale Gleichgültigkeit mit Unterstützung verwechselt, denn unsere niederländischen Partner haben uns mitgeteilt, dass sie keine Notwendigkeit sehen, den Status quo zu ändern."
indonesia.54.a:0 "Zumindest haben sie uns eine Antwort gegeben."
indonesia.10.t:0 "Freiheit für Ostindien?"
indonesia.10.desc:0 "Die nationalistischen Sympathien in unseren Kolonien sind hoch und haben einen Höhepunkt erreicht. Demokratische Agitatoren in Ostindien fordern freie Wahlen und Freiheit von der Kolonialherrschaft, sind aber für die Zukunft zu einem Bündnis bereit. Wie reagieren wir? "
indonesia.10.a:0 "Besser sie als die Kommunisten."
indonesia.10.b:0 "Undankbare Kolonialisten!"
indonesia.11.t:0 "Freiheit!"
indonesia.11.desc:0 "Nach Tagen angespannter und spannungsgeladener Verhandlungen hat die niederländische Regierung einem vollständigen Rückzug und der Unterstützung unserer demokratischen Regierung zugestimmt. Unsere Freiheit ist zum Greifen nah!"
indonesia.11.a:0 "Hari Kemerdekaan!"
indonesia.12.t:0 "Niederlande lehnen ab"
indonesia.12.desc:0 "Trotz unserer größten Bemühungen wurde uns unsere Freiheit verweigert. Indonesische Vertreter wurden ignoriert und der Volksraad umgehend geschlossen. Die Diplomatie hat uns im Stich gelassen."
indonesia.12.a:0 "Sehr gut..."
indonesia.12.b:0 "Wir werden uns mit Gewalt befreien!"
indonesia.13.t:0 "Ein unwahrscheinlicher Verbündeter"
indonesia.13.desc:0 "Kommunistische Agitatoren sind in Ostindien schon länger präsent, doch erst jetzt ist die Lage so dramatisch. Die Kommunistische Partei Indonesiens hat uns um Unterstützung bei der Unabhängigkeit gebeten und fordert die Macht der Sowjetunion am Verhandlungstisch. Was antworten wir?"
indonesia.13.a:0 "Begrüßen wir einen neuen Bruder in der Revolution!"
indonesia.13.b:0 "Ihre Zeit ist noch nicht gekommen."
indonesia.14.t:0 "Die Sowjetunion stimmt zu!"
indonesia.14.desc:0 "Diplomaten des Kremls haben sich bereit erklärt, an Unabhängigkeitsgesprächen mit den Niederlanden teilzunehmen. Unsere Freiheit ist zum Greifen nah!"
indonesia.14.a:0 "Ruhm der weltweiten Revolution!"
indonesia.15.t:0 "Die Sowjets weigern sich"
indonesia.15.desc:0 "Trotz unserer größten Bemühungen ist es uns nicht gelungen, eine Garantie seitens der Sowjetunion zu geben. Obwohl sie Verständnis für unsere Lage hat, weigert sie sich, sich in die Angelegenheiten Südostasiens einzumischen."
indonesia.15.a:0 "Wir müssen ihre Entscheidung akzeptieren"
indonesia.15.b:0 "Die Revolution wird auch ohne sie gelingen!"
indonesia.16.t:0 "Die Sowjetunion unterstützt die indonesische Autonomie"
indonesia.16.desc:0 "In einer seltsamen Wendung der Ereignisse haben kommunistische Agitatoren in Ostindien die sowjetische Unterstützung für ihre Bewegung gesichert. Nun werden Unabhängigkeitsgespräche gefordert, bei denen die Russen als Vermittler fungieren. Was sollen wir tun?"
indonesia.16.a:0 "Sehr gut, wir können keine weitere Eskalation riskieren"
indonesia.16.b:0 "Dieser Unsinn geht jetzt schon lange genug weiter!"
indonesia.17.t:0 "Freiheit!"
indonesia.17.desc:0 "Nach Tagen angespannter und spannungsgeladener Verhandlungen hat die niederländische Regierung einem vollständigen Abzug der niederländischen Streitkräfte und der sofortigen Einsetzung einer kommunistischen Regierung zugestimmt. Unsere Freiheit ist zum Greifen nah!"
indonesia.17.a:0 "Hari Kemerdekaan!"
indonesia.18.t:0 "Niederlande lehnen ab"
indonesia.18.desc:0 "Auch wenn die Sowjetunion auf unserer Seite steht, haben es die Niederlande noch immer nicht für angebracht gehalten, uns unsere Unabhängigkeit zu gewähren. Vielleicht haben sie unseren Bluff durchschaut, oder vielleicht sind sie einfach nur stur. So oder so müssen wir eine Entscheidung treffen."
indonesia.18.a:0 "Es ist Zeit, einen Rückzieher zu machen."
indonesia.18.b:0 "Es ist Zeit für eine REVOLUTION!"
indonesia.19.t:0 "Eine merkwürdige Anfrage"
indonesia.19.desc:0 "Der Nationalismus in Ostindien hat seinen Höhepunkt erreicht, und unsere Brüder schreien nach Befreiung. Faschistische Führer in Indonesien haben sich an uns gewandt und um ein Abkommen gebeten, um Schutz und Bündnis im Falle eines Kriegsausbruchs. Wie sollen wir reagieren?"
indonesia.19.a:0 "Das macht die Sache sicherlich einfacher."
indonesia.19.b:0 "Eine unnötige Ablenkung von unseren eigenen Entwürfen."
indonesia.20.t:0 "Die Vereinbarung"
indonesia.20.desc:0 "Der Deal ist abgeschlossen, Allianzen wurden geschmiedet, Japan steht hinter uns."
indonesia.20.a:0 "Hari Kemerdekaan!"
indonesia.21.t:0 "Japanische Unterstützung für indonesische Autonomie"
indonesia.21.desc:0 "Es überrascht nicht, dass Japan schon immer ein Interesse an unseren asiatischen Kolonien hatte und behauptete, die Interessen Indonesiens zu vertreten. Japan forderte die vollständige Unabhängigkeit Indonesiens und dessen sofortige Eingliederung in die japanische Einflusssphäre. Wir könnten diese Forderungen ablehnen, aber das würde die Lage wahrscheinlich nur verschlimmern."
indonesia.21.a:0 "Besser das als Krieg."
indonesia.21.b:0 "Mal sehen, ob sie es versuchen!"
indonesia.22.t:0 "Beunruhigende Ablehnung"
indonesia.22.desc:0 "Trotz unserer klaren Sympathie und Unterstützung haben die Japaner es nicht für angebracht gehalten, unser Streben nach Unabhängigkeit zu unterstützen. Vielleicht glauben sie, dass die Zeit noch nicht reif ist, aber wahrscheinlicher ist, dass sie andere, unvorhergesehene Pläne mit uns haben."
indonesia.22.a:0 "Mit solchen Freunden ..."
indonesia.22.b:0 "Indonesien braucht keine falschen Verbündeten, unsere Freiheit ist zum Greifen nah!"
indonesia.23.t:0 "Freiheit!"
indonesia.23.desc:0 "Nach Tagen angespannter und spannungsgeladener Verhandlungen hat die niederländische Regierung einem vollständigen Abzug der niederländischen Streitkräfte und der sofortigen Einsetzung einer nationalistischen Regierung zugestimmt. Unsere Freiheit ist zum Greifen nah!"
indonesia.23.a:0 "Hari Kemerdekaan!"
indonesia.24.t:0 "Niederlande lehnen ab"
indonesia.24.desc:0 "Trotz der Unterstützung Japans haben die Niederlande uns immer noch die Freiheit verweigert. Vielleicht glauben sie, die Japaner seien zu beschäftigt, um einzugreifen, oder vielleicht sind sie einfach nur dumm. So oder so müssen wir eine Entscheidung treffen."
indonesia.24.a:0 "Wir sind hier fertig"
indonesia.24.b:0 "Wir brauchen ihre Erlaubnis nicht für die Freiheit!"
indonesia.25.t:0 "Eine einzigartige Forderung"
indonesia.25.desc:0 "Der Nationalismus ist in unseren Kolonien stark geworden und hat leider einen Bruchpunkt erreicht. Demonstranten sind auf die Straße gegangen und fordern die Unabhängigkeit vom Mutterland. Es ist zu weit gegangen, um es noch länger hinzunehmen. Was sollen wir tun?"
indonesia.25.a:0 "Geben Sie ihnen ihre Freiheit, wenn sie sie so sehr wollen."
indonesia.25.b:0 "Hahaha, nein."
indonesia.26.t:0 "Freiheit!"
indonesia.26.desc:0 "Nach Tagen angespannter und spannungsgeladener Verhandlungen hat die niederländische Regierung einem vollständigen Abzug der niederländischen Streitkräfte und der sofortigen Einsetzung einer unabhängigen Regierung zugestimmt. Unsere Freiheit ist zum Greifen nah!"
indonesia.26.a:0 "Hari Kemerdekaan!"
indonesia.27.t:0 "Niederlande lehnen ab"
indonesia.27.desc:0 "Trotz unserer Proteste blieb in den Niederlanden Stillschweigen. Unsere Demonstranten zerstreuten sich, und unsere Mitglieder wurden aus dem Volksrat ausgeschlossen. Die Botschaft ist klar."
indonesia.27.a:0 "Unsere Zeit wird kommen ..."
indonesia.27.b:0 "Und es wird jetzt kommen!"
indonesia.27.c:0 "Und es wird jetzt kommen!"
