indonesia.30.t:0 "Indonesien erhebt Anspruch auf Borneo!"
indonesia.30.desc:0 "Unsere gemeinsame Grenze mit Ostindien auf der Insel Borneo war schon immer eine angespannte, aber verhaltene Angelegenheit. Nun jedoch haben die Spannungen einen kritischen Punkt erreicht, da die neue indonesische Regierung die volle Kontrolle und Souveränität über die Insel fordert. Was sollen wir tun?"
indonesia.30.a:0 "Geben Sie ihren Forderungen nach."
indonesia.30.b:0 "Ihre Unabhängigkeit hat sie eigensinnig gemacht, ignorieren Sie sie."
indonesia.31.t:0 "Malaya unterwirft sich!"
indonesia.31.desc:0 "Unsere Drohungen haben gefruchtet, Malaya hat alle Ansprüche auf Borneo aufgegeben und die Kontrolle wird sofort an uns übertragen."
indonesia.31.a:0 "Ein Sieg für die Diplomatie!"
indonesia.32.t:0 "Malaya weigert sich!"
indonesia.32.desc:0 "Trotz unserer größten Bemühungen ist die Diplomatie gescheitert, Malaya hat alle unsere Forderungen ignoriert und macht weiter, als hätte sich nichts geändert."
indonesia.32.a:0 "Sehr gut."
indonesia.32.b:0 "Sie werden für diese Unverschämtheit bezahlen."
indonesia.33.t:0 "Indonesien beansprucht Guinea!"
indonesia.33.desc:0 "Unsere gemeinsame Grenze mit Ostindien auf der Insel Guinea war schon immer eine angespannte, aber verhaltene Angelegenheit. Nun jedoch haben die Spannungen einen kritischen Punkt erreicht, da die neue indonesische Regierung die volle Kontrolle und Souveränität über die Insel fordert. Was sollen wir tun?"
indonesia.33.a:0 "Geben Sie ihren Forderungen nach."
indonesia.33.b:0 "Ihre Unabhängigkeit hat sie eigensinnig gemacht, ignorieren Sie sie."
indonesia.34.t:0 "Australien unterwirft sich!"
indonesia.34.desc:0 "Unsere Drohungen haben gefruchtet, Australien hat alle Ansprüche auf Guinea aufgegeben und die Kontrolle wird sofort an uns übertragen."
indonesia.34.a:0 "Ein Sieg für die Diplomatie!"
indonesia.35.t:0 "Australien weigert sich!"
indonesia.35.desc:0 "Trotz unserer größten Bemühungen ist die Diplomatie gescheitert, Australien hat alle unsere Forderungen ignoriert und macht weiter, als hätte sich nichts geändert."
indonesia.35.a:0 "Sehr gut."
indonesia.35.b:0 "Sie werden für diese Unverschämtheit bezahlen."
indonesia.36.t:0 "Indonesien erhebt Anspruch auf Timor!"
indonesia.36.desc:0 "Unsere gemeinsame Grenze mit Ostindien auf der Insel Timor war schon immer eine angespannte, aber verhaltene Angelegenheit. Nun jedoch haben die Spannungen einen kritischen Punkt erreicht, da die neue indonesische Regierung die volle Kontrolle und Souveränität über die Insel fordert. Was sollen wir tun?"
indonesia.36.a:0 "Geben Sie ihren Forderungen nach."
indonesia.36.b:0 "Ihre Unabhängigkeit hat sie eigensinnig gemacht, ignorieren Sie sie."
indonesia.34.t:0 "Portugal unterwirft sich!"
indonesia.34.desc:0 "Unsere Drohungen haben gefruchtet, Portugal hat alle Ansprüche auf Timor aufgegeben und die Kontrolle wird sofort an uns übertragen."
indonesia.37.a:0 "Ein Sieg für die Diplomatie!"
indonesia.38.t:0 "Portugal lehnt ab!"
indonesia.38.desc:0 "Trotz unserer größten Bemühungen ist die Diplomatie gescheitert, Portugal hat alle unsere Forderungen ignoriert und macht weiter, als hätte sich nichts geändert."
indonesia.38.a:0 "Sehr gut."
indonesia.38.b:0 "Sie werden für diese Unverschämtheit bezahlen."
#
indonesia.40.t:0 "Indonesien fordert koloniale Freiheit."
indonesia.40.desc:0 "Die Welt hat sich seit dem Ersten Weltkrieg stark verändert, und die Zeit der Kolonialreiche neigt sich dem Ende zu. Das kürzlich unabhängig gewordene Indonesien ist ein Beispiel dafür. Diplomaten des Landes haben uns gebeten, unseren Kolonialbesitzungen in Südostasien die Unabhängigkeit zu gewähren, im Austausch für die Garantie indonesischen Schutzes. Was ist von diesem Angebot zu halten?"
indonesia.40.a:0 "Wir dürfen den Vormarsch der Demokratie nicht aufhalten"
indonesia.40.b:0 "Wir wissen, was für unsere Probanden am besten ist."
indonesia.41.t:0 "Die Vereinigten Staaten haben zugestimmt!"
indonesia.41.desc:0 "Die Vereinigten Staaten haben die Weisheit unserer Forderung erkannt und sich bereit erklärt, die volle Autonomie der Philippinen und ihr diplomatisches Bündnis mit unserer Fraktion zu unterstützen. Heute ist ein großer Tag für die Demokratie in Asien!"
indonesia.41.a:0 "Ein Sieg der Diplomatie!"
indonesia.42.t:0 "Unabhängigkeit!"
indonesia.42.desc:0 "Unsere Brüder in Indonesien haben ihre neu gewonnene Unabhängigkeit nicht als selbstverständlich betrachtet. Sie haben die Vereinigten Staaten um die vollständige Unabhängigkeit unseres Landes gebeten und uns die Teilnahme an einem diplomatischen Bündnis zugesichert. Mit dem Segen der USA ist unsere Freiheit nun da!"
indonesia.42.a:0 "Nach MalPhiIndo!"
indonesia.42.b:0 "Vielleicht ist es am besten, weiterhin unter dem Schutz der USA zu stehen."
indonesia.43.t:0 "Das Vereinigte Königreich stimmt zu!"
indonesia.43.desc:0 "Das Vereinigte Königreich hat die Weisheit unserer Forderung erkannt und sich bereit erklärt, die vollständige Autonomie Malayas und das diplomatische Bündnis mit unserer Fraktion zu unterstützen. Heute ist ein großer Tag für die Demokratie in Asien!"
indonesia.43.a:0 "Ein Sieg der Diplomatie!"
indonesia.44.t:0 "Unabhängigkeit!"
indonesia.44.desc:0 "Unsere Brüder in Indonesien haben ihre neu gewonnene Unabhängigkeit nicht als selbstverständlich betrachtet. Sie haben Großbritannien um die vollständige Unabhängigkeit unseres Landes gebeten und uns die Teilnahme an einem diplomatischen Bündnis zugesichert. Mit dem Segen Großbritanniens ist unsere Freiheit nun da!"
indonesia.44.a:0 "Nach MalPhiIndo!"
indonesia.44.b:0 "Vielleicht ist es am besten, durch Großbritannien geschützt zu bleiben"
indonesia.45.t:0 "[ROOT.GetName] lehnt ab!"
indonesia.45.desc:0 "Trotz unserer guten Absichten stieß unsere Petition auf taube Ohren. [ROOT.GetName] hat nicht vor, die Kontrolle über seine südostasiatischen Kolonien aufzugeben und hegt keinerlei Gedanken an ein demokratisches Bündnis."
indonesia.45.a:0 "Sie stehen dem Fortschritt im Weg."
#ast puppets INS
indonesia.46.t:0 "Australische Kontrolle über Ostindien"
indonesia.46.desc:0 "Überraschenderweise hat die australische Regierung beantragt, die Kolonie für die Niederländer zu schützen, und diese Rechte auch durchgesetzt. Sie meinen es zwar zweifellos gut, aber es ist schlicht und ergreifend der Tausch eines ausländischen Herrn gegen einen anderen. Was sollen wir also tun?"
indonesia.46.a:0 "Lernen Sie den neuen Chef kennen, derselbe wie der alte Chef."
indonesia.46.b:0 "Jetzt ist unsere Chance, auszubrechen!"

#whitepeace
indonesia.50.t:0 "Der Krieg mit Deutschland..."
indonesia.50.desc:0 "Es scheint, als befänden wir uns unverschuldet im Krieg. Dies ist keine besonders gute Situation, und die Begeisterung für den Krieg im Ausland ist in unserer Kolonie sehr gering. Wenn möglich, wäre es für unsere langfristigen Unabhängigkeitsziele von Vorteil, einen Frieden mit Deutschland auszuhandeln."
indonesia.50.a:0 "Geben Sie dem Frieden eine Chance!"
indoneisa.50.b:0 "Wir werden weiterkämpfen!"
indonesia.51.t:0 "Frieden mit Ostindien?"
indonesia.51.desc:0 "Obwohl sie sich nicht in der Nähe unserer Kriegsschauplätze befinden, scheint es, dass wir aufgrund kolonialer Verbindungen mit Indonesien im Krieg sind. Unterhändler haben Kontakt zu uns aufgenommen, um einen Frieden zu vermitteln. Es ist fraglich, ob sie eine echte Bedrohung für uns darstellen, aber es wäre ratsam, dies zu akzeptieren, um spätere Komplikationen zu vermeiden."
indonesia.51.a:0 "Ein Problem weniger, über das Sie sich Sorgen machen müssen."
indoneisa.51.b:0 "Wir werden sie zu gegebener Zeit besiegen."
indonesia.52.t:0 "Deutschland weigert sich!"
indonesia.52.desc:0 "Es überrascht nicht, dass Deutschland sich offenbar wenig um uns kümmert und einen langwierigen Krieg bestenfalls als bloße Unannehmlichkeit betrachtet. Es scheint, als ob wir uns auf lange Sicht in dieser Situation befinden."
indonesia.52.a:0 "Wir haben dem Frieden eine Chance gegeben ..."
indonesia.53.t:0 "Deutschland akzeptiert!"
indonesia.53.desc:0 "Da die Deutschen einen Krieg in Südostasien für unnötig halten, haben sie unserem Friedensangebot zugestimmt."
indonesia.53.a:0 "Ein Frieden in unserer Zeit."

#INS renames cities
indonesia.100.t:0 "Beseitigung des kolonialistischen Einflusses"
indonesia.100.desc:0 "Jetzt, da wir unabhängig sind, wäre die Änderung der Namen einiger unserer Städte ein guter erster Schritt, um unsere Autonomie zu demonstrieren. Niederländischer Einfluss hat in unserer neuen Nation keinen Platz."
indonesia.100.a:0 "Es soll getan werden!"
indoneisa.100.b:0 "Ich mag Hollandia ..."

#civil war whitepeace
indonesia.101.t:0 "Zeit für Frieden?"
indonesia.101.desc:0 "Unser Bürgerkrieg dauert schon seit Monaten an. Obwohl unsere Sache gerecht ist, wäre es vielleicht pragmatischer, Frieden anzustreben, um unser Land zu stabilisieren. Es ist genug Zeit vergangen, um diplomatische Verhandlungen zu ermöglichen. Sollten wir einen Frieden vermitteln?"
indonesia.101.a:0 "Es ist Zeit für Frieden."
indoneisa.101.b:0 "Wir werden bis zum Schluss kämpfen!"
indonesia.102.t:0 "Ein Friedensangebot."
indonesia.102.desc:0 "Unser Krieg in Indonesien stagniert, ein klarer Sieg ist noch nicht sicher. Der Feind hat ein Friedensangebot vermittelt und um einen Waffenstillstand gebeten. Wie sollen wir reagieren?"
indonesia.102.a:0 "Wir sind uns einig, dass Krieg in niemandes Interesse liegt."
indoneisa.102.b:0 "Sie bieten Frieden an, weil sie wissen, dass wir gewinnen werden. Kämpfen Sie weiter!"
indonesia.103.t:0 "Frieden angenommen!"
indonesia.103.desc:0 "Unsere Bitten waren erfolgreich, es wird ein Waffenstillstand ausgehandelt, um die gegenwärtigen Feindseligkeiten in Indonesien zu beenden. Wie lange, bleibt uns überlassen."
indonesia.103.a:0 "Die Diplomatie wird uns weit bringen."
indonesia.104.t:0 "Frieden verweigert!"
indonesia.104.desc:0 "Trotz unserer guten Absichten wurden alle Friedensangebote abgelehnt, unser Krieg muss weitergehen, koste es, was es wolle."
indonesia.104.a:0 "Diplomatie hat uns sowieso nie etwas genützt."

indonesia.105.t:0 "Der neue Gouverneur"
indonesia.105.desc:0 "Der Rücktritt von Cornelis de Jonge als Generalgouverneur von Ostindien markiert das Ende einer Ära. Jonge, ein starker, eigensinniger Mann, war ein entschiedener Gegner lokaler Autonomie und vertrat in seiner Regierung eine entschieden pro-niederländische Linie. Er lehnte die meisten Bemühungen um mehr Autonomie der Kolonien ab. Sein Nachfolger Stachouwer hat sich noch nicht entschieden, welchen Kurs er in der Regierung einschlagen wird, doch viele hoffen auf frischen Wind, um die Unabhängigkeitsbewegungen anzukurbeln."
indonesia.105.a:0 "Möge er gut regieren."

indonesia.106.t:0 "Kebangkitan"
indonesia.106.desc:0 "Niederländisch-Ostindien steht an einem Wendepunkt. Obwohl vom Ersten Weltkrieg verschont, blieb die Kolonialverwaltung von den wachsenden Unabhängigkeitsbewegungen der Ureinwohner nicht verschont. Angetrieben von der wachsenden Macht Japans und der fortschreitenden Modernisierung der Kolonie erhoben sich einheimische Persönlichkeiten unter vielen Bannern, um die Unabhängigkeit zu verfechten. Aus dem Osten kommen die faschistischen, projapanischen Verfechter des Rechts auf Unabhängigkeit, die Arbeiter fordern mehr Kontrolle über die Früchte ihrer Arbeit und selbst die sympathischsten Politiker verlangen eine echte demokratische Regierung. Ob die überlastete und unterversorgte Kolonialregierung diese Forderungen unterdrücken kann oder der Welle der Unabhängigkeitsbestrebungen erliegt, wird die Zeit zeigen."
indonesia.106.a:0 "Wij Zal Handhaven."


