#focuses
industrial_development:0 "Industrielle Entwicklung"
industrial_development_desc:0 "Wir müssen anfangen, die Technologie zu erwerben, um industriell wettbewerbsfähig zu sein."
infrastructure_spending:0 "Infrastrukturausgaben"
infrastructure_spending_desc:0 "Für die Landesverteidigung und unsere Zivilwirtschaft ist der Ausbau unserer nationalen Infrastruktur von größter Bedeutung."
civillian_markets:0 "Zivile Märkte"
civillian_markets_desc:0 "Steuersenkungen und Wirtschaftsförderung werden unserer Privatwirtschaft zu Wohlstand verhelfen."
university_of_kabul:0 "Universität Kabul"
university_of_kabul_desc:0 "Aufgaben"
afg_industrial_expansion:0 "Industrielle Expansion"
afg_industrial_expansion_desc:0 "Wir müssen unsere zivilen industriellen Kapazitäten ausbauen."
steel_mills:0 "Stahlwerke"
steel_mills_desc:0 "Bundesweite Investitionen in Stahl werden unserem Land viele Vorteile bringen."
synthetic_focus:0 "Synthetischer Fokus"
synthetic_focus_desc:0 "Aufgrund unseres Mangels an Naturkautschuk und Öl müssen wir an synthetischen Varianten arbeiten, um unabhängig zu bleiben."
business_prowess:0 "Geschäftskompetenz"
business_prowess_desc:0 "Unsere Geschäftsleute genießen das Vertrauen der Welt, untereinander und der Regierung, was sich in ihrer Effizienz widerspiegelt."
persian_oil:0 "Persisches Öl"
persian_oil_desc:0 "Neue Techniken zur Ölförderung werden es uns ermöglichen, unsere neuen Länder in große Ölfördergebiete zu verwandeln."
world_research_organization:0 "Weltforschungsorganisation"
world_research_organization_desc:0 "Wir sollten unseren neu gewonnenen Status bei den Großmächten der Welt nutzen, um die technologische Zusammenarbeit voranzutreiben."
military_progress:0 "Militärischer Fortschritt"
military_progress_desc:0 "Unsere Nation muss in sozialer und industrieller Hinsicht beginnen, sich zu mobilisieren."
arms_production:0 "Waffenproduktion"
arms_production_desc:0 "Wir müssen die modernsten Methoden einsetzen, um möglichst viele Waffen zu möglichst geringen Kosten herzustellen."
support_companies:0 "Support-Unternehmen"
support_companies_desc:0 "Die Effektivität unserer Divisionen kann durch die Hinzufügung zusätzlicher Bataillone unterstützender Soldaten erheblich verbessert werden."
armored_effort:0 "Gepanzerte Anstrengung"
armored_effort_desc:0 "Wir sollten uns auf Panzer konzentrieren, da diese auf dem modernen Schlachtfeld sehr wichtig sind."
military_industrial_complex:0 "Militärisch-industrieller Komplex"
military_industrial_complex_desc:0 "Die industrielle Expansion, sowohl im zivilen als auch im militärischen Bereich, kann dazu beitragen, dass sich unsere Streitkräfte verbessern und erweitern."
military_strategy:0 "Militärstrategie"
military_strategy_desc:0 "Wir müssen entscheiden, auf welche Weise wir kämpfen wollen."
military_mining:0 "Militärischer Bergbau"
military_mining_desc:0 "Der Einsatz von Reserven und ungenutzten Soldaten zur Erweiterung unserer Bergbaukapazitäten kann eine großartige Investition an Zeit und Arbeitskräften sein."
remember_third_anglo_afghan_war:0 "Erinnern Sie sich an den Dritten Anglo-Afghanischen Krieg"
remember_third_anglo_afghan_war_desc:0 "Der letzte Krieg ist der Beweis: Wir sind unbesiegbar!"
focus_infantry:0 "Infanterie-Fokus"
focus_infantry_desc:0 "Waffen, Männer, Artillerie, das sind die Grundlagen unserer Streitkräfte."
modern_focus:0 "Moderner Fokus"
modern_focus_desc:0 "Wir müssen Panzer, Lastwagen und andere moderne Kriegsmethoden einsetzen, um mit der modernen Welt konkurrieren zu können."
improve_political_climate:0 "Verbesserung des politischen Klimas"
improve_political_climate_desc:0 "Unsere Nation ist gespalten, wir müssen unser Volk zusammenbringen und auf ein gemeinsames Ziel hinarbeiten."
preserve_status_quo:0 "Den Status Quo bewahren"
preserve_status_quo_desc:0 "Unser derzeitiges Regierungssystem ist im Großen und Ganzen auf dem richtigen Weg."
royal_family_history:0 "Geschichte der königlichen Familie" 
royal_family_history_desc:0 "Die königliche Familie ist in unserem Land beliebt."
internal_innovation:0 "Interne Innovation"
internal_innovation_desc:0 "Inländische Wissenschaftler und Universitäten könnten mit mehr Mitteln glänzen."
the_kings_inspiration:0 "Die Inspiration des Königs"
the_kings_inspiration_desc:0 "Die Bevölkerung blickt mit Bewunderung auf unseren König und wird für ihn kämpfen."
curb_uncle_influence:0 "Den Einfluss der Onkel einschränken"
curb_uncle_influence_desc:0 "Seit der Krönung unseres derzeitigen Königs wurde er nicht mehr vom Einfluss seiner Onkel geplagt."
where_empires_fall:0 "Wo Imperien fallen"
where_empires_fall_desc:0 "Viele Nationen haben versucht, uns zu erobern, und sind dabei gescheitert. Diesen Trend sollten wir unterstützen."
merge_royal_households:0 "Königliche Haushalte zusammenführen"
merge_royal_households_desc:0 "Die iranischen Royals bieten die Möglichkeit, Königsfamilien zusammenzuführen, möglicherweise wäre dies mit Landgewinnen verbunden."
iraqi_conquest:0 "Irakische Eroberung"
iraqi_conquest_desc:0 "Nachdem wir den Iran in der Tasche haben, können wir zu unserer nächsten Eroberung aufbrechen. "
the_communist_threat:0 "Die kommunistische Bedrohung"
the_communist_threat_desc:0 "Über unserer Nation schwebt eine große Bedrohung, wir müssen zuschlagen, bevor wir getroffen werden."
the_revolution:0 "Die Revolution"
the_revolution_desc:0 "Die derzeitige Regierung hat versagt, wir brauchen den Kommunismus."
soviet_economic_assistance:0 "Sowjetische Wirtschaftsunterstützung"
soviet_economic_assistance_desc:0 "In dieser Zeit des wirtschaftlichen Abschwungs hat die Sowjetunion floriert. Vielleicht sollten wir ihr die Hand reichen."
soviet_research:0 "Sowjetische Forschung"
soviet_research_desc:0 "Lassen Sie uns unsere wirtschaftlichen Bindungen mit der Sowjetunion um eine technologische Bindung erweitern."
treaty_of_urumchi:0 "Vertrag von Ürümchi"
treaty_of_urumchi_desc:0 "Mit sowjetischem Druck und unserem Militär könnten wir wahrscheinlich die Kriegsherrenfraktion von Sinkiang beschaffen."
peoples_revolution:0 "Volksrevolution"
peoples_revolution_desc:0 "Jetzt ist es an der Zeit, afghanische Arbeiter, vereinigt euch!"
peoples_legion:0 "Volkslegion"
peoples_legion_desc:0 "Nach der Revolution müssen wir nun an der Verbesserung unseres Militärs arbeiten."
chinese_intervention:0 "Chinesische Intervention"
chinese_intervention_desc:0 "Die Japaner stellen eine große Bedrohung für Asien und den gesamten Kommunismus dar. Wir sollten uns auf die Seite Maos stellen und zuschlagen."
join_the_comintern:0 "Treten Sie der Komintern bei"
join_the_comintern_desc:0 "Wir sollten die Sowjetunion offiziell bitten, uns den Beitritt zur Komintern zu gestatten."
our_faction:0 "Unsere Fraktion"
our_faction_desc:0 "oder alles, was die Sowjets getan haben, ist es für Afghanistan an der Zeit, es allein in Angriff zu nehmen."
look_to_germany:0 "Blick nach Deutschland"
look_to_germany_desc:0 "Deutschland hat in den letzten Jahren großen Wohlstand erlebt, wir sollten das Land als Freunde und Geschäftspartner betrachten."
german_investors:0 "Deutsche Investoren"
german_investors_desc:0 "Die Kontaktaufnahme mit deutschen Unternehmen könnte für beide Seiten enorme Vorteile bringen."
german_scientists:0 "Deutsche Wissenschaftler"
german_scientists_desc:0 "Unsere wirtschaftliche Vernetzung mit Deutschland bietet uns die Möglichkeit, die technologische Gemeinschaftsforschung voranzutreiben."
foreign_advisors:0 "Ausländische Berater"
foreign_advisors_desc:0 "Deutschland verfügt eindeutig über militärische Informationen und taktisches Training, das es uns zur Verfügung stellen könnte. Wir sollten sie fragen."
AFG_military_youth:0 "Militärjugend"
AFG_military_youth_desc:0 "In den Schulen Afghanistans wird viel über unsere militärische Stärke, unseren Ruhm und unsere Ehre gelehrt."
armor_comittee:0 "Rüstungsausschuss"
armor_comittee_desc:0 "Die Deutschen sind eindeutig die Meister der Militärpanzerung. Wir sollten ihre Entwürfe studieren und selbst welche herstellen."
demand_iran:0 "Nachfrage Iran"
demand_iran_desc:0 "Für uns ist die Zeit gekommen, unser großes Reich zu erweitern. Vielleicht würde eine Zusage der Unterstützung durch die Deutschen unsere Chancen verbessern."
iraqi_plebiscite:0 "Irakisches Plebiszit"
iraqi_plebiscite_desc:0 "Für uns ist die Zeit gekommen, unser großes Reich zu erweitern. Vielleicht würde eine Zusage der Unterstützung durch die Deutschen unsere Chancen verbessern."
demand_pakistan:0 "Nachfrage Pakistan"
demand_pakistan_desc:0 "Da die Briten in andere Angelegenheiten verstrickt sind, bietet sich die Gelegenheit, Pakistan für sich zu beanspruchen. Wir werden diese Gelegenheit nutzen."
look_to_the_west:0 "Blick nach Westen"
look_to_the_west_desc:0 "Der Westen wird uns trotz seiner jüngsten Defizite den größten Wohlstand und die größte langfristige Stabilität bescheren."
negotiate_for_iran:0 "Verhandlungen für den Iran"
negotiate_for_iran_desc:0 "Die Briten sind stets bestrebt, ihr Imperium zu erweitern. Vielleicht wird ein Vorschlag zum Iran sie dazu verleiten, die Beziehungen abzukühlen."
allied_research:0 "Verbündete Forschung"
allied_research_desc:0 "Eine Delegation nach Frankreich mit technologischen Zielen wäre auf jeden Fall von Vorteil."
fervent_patriotism:0 "Leidenschaftlicher Patriotismus"
fervent_patriotism_desc:0 "Unser Volk ist willens und bereit, für seine Nation zu kämpfen."
us_aid:0 "US-Hilfe"
us_aid_desc:0 "Die USA versuchen, ihren Einfluss im Ausland zu vergrößern und haben uns ein Angebot unterbreitet, das wir nicht ablehnen können."
raf_asistance:0 "RAF-Unterstützung"
raf_asistance_desc:0 "Die Briten sind führend in der Luftstreitkräfte. Das Studium ihrer Entwürfe und die Zusammenarbeit mit ihnen können unserer Luftwaffe Vorteile bringen."
french_tank_designs:0 "Französische Panzerentwürfe"
french_tank_designs_desc:0 "Die Franzosen verfügen über Panzerkonstruktionen von gleichbleibend hoher Qualität, daher sollten wir natürlich eine gemeinsame Forschungstruppe zusammenstellen."
join_the_allies:0 "Schließen Sie sich den Verbündeten an"
join_the_allies_desc:0 "Für uns ist die Zeit gekommen, den Westen durch ein Militärbündnis voll und ganz zu umarmen."
incorporate_raj:0 "Integrieren Sie das Raj"
incorporate_raj_desc:0 "Wir streben schon lange nach der Kontrolle über Indien. Vielleicht könnten wir einen Großteil dieser Kontrolle erlangen, indem wir den Briten einen Teil davon überlassen."
establish_the_afghan_air_force:0 "Aufbau der afghanischen Luftwaffe"
establish_the_afghan_air_force_desc:0 "Dies ist ein moderner Krieg. Wir müssen seinen Anforderungen gerecht werden und eine Luftwaffe aufbauen."
AFG_fighter_focus:0 "Kämpferfokus"
AFG_fighter_focus_desc:0 "Kampfflugzeuge sind der wichtigste Teil jeder Luftwaffe, und dies sollte sich in der Produktion widerspiegeln."
close_air_support_focus:0 "Fokus auf Luftnahunterstützung"
close_air_support_focus_desc:0 "CAS-Flugzeuge haben sich auf dem modernen Schlachtfeld als unschätzbar wertvoll erwiesen. Vielleicht sind einige Investitionen in diesem Sektor von Vorteil."
bombing_effort:0 "Bombenangriffe"
bombing_effort_desc:0 "Dank der modernen Fortschritte bei der Tragfähigkeit von Bomben ist es möglicherweise möglich, unsere Kriege aus der Luft zu gewinnen."
tactical_bomber_effort:0 "Taktischer Bombereinsatz"
tactical_bomber_effort_desc:0 "Vielseitigere Bomber können unseren Kriegsanstrengungen einen größeren Funktionsumfang verleihen."
increased_domestic_production:0 "Erhöhte Inlandsproduktion"
increased_domestic_production_desc:0 "Die ausländischen Importe und Designs sind erbärmlich, es ist Zeit, dass Afghanistan sich einen Namen macht."
rocket_research:0 "Raketenforschung"
rocket_research_desc:0 "Bomber, die keine Männer benötigen, scheinen eine sehr gute Gelegenheit zu sein, wir sollten sie nutzen."
afghan_wunderwaffe:0 "Afghanische Wunderwaffe"
afghan_wunderwaffe_desc:0 "Nichtkonventionelle Waffen sind die Zukunft, wir sollten sie verfolgen."
research_deal:0 "Forschungsdeal"
research_deal_desc:0 "Wir verfügen über einen äußerst überzeugenden Entwurf für einen neuen Flugzeugtyp. Es ist von entscheidender Bedeutung, Kontakt zu einer Großmacht aufzunehmen und Zugriff auf deren Ressourcen zu erhalten. Aber welche?"
support_rhineland:0 "Förderverein Rheinland"
support_rhineland_desc:0 "Die Deutschen marschieren in ihr eigenes Land ein, die französischen und britischen Hunde sollten sie in Ruhe lassen."
express_support_for_japan:0 "Express-Support für Japan"
express_support_for_japan_desc:0 "Japan möchte seinen Platz an der Sonne und ein Imperium wie der Westen. Ist das so falsch?"
persecute_minorities:0 "Verfolgung von Minderheiten"
persecute_minorities_desc:0 "Wir müssen unsere Bevölkerung von unerwünschten Personen und Nicht-Afghanen säubern."
support_germany:0 "Unterstütze Deutschland"
support_germany_desc:0 "Die Deutschen sind ein gutes Volk und haben uns ihre Unterstützung zugesagt. Lassen Sie uns das erwidern."
eastern_axis:0 "Östliche Achse"
eastern_axis_desc:0 "Eine neue Fraktion, ähnlich der deutschen, muss gegründet werden, vielleicht können wir in Japan einen Verbündeten finden."
denounce_rhineland:0 "Rheinland denunzieren"
denounce_rhineland_desc:0 "Die Deutschen verstoßen eindeutig gegen den Versailler Vertrag und planen, die Welt erneut in einen Krieg zu stürzen."
take_chinese_refuguees:0 "Nehmen Sie chinesische Flüchtlinge auf"
take_chinese_refuguees_desc:0 "Der jüngste Krieg in China bietet uns die Gelegenheit, unsere verfügbare Personalstärke zu erhöhen."
take_jewish_refugees:0 "Nehmen Sie jüdische Flüchtlinge auf"
take_jewish_refugees_desc:0 "Mit einer umfassenden Flüchtlingsinfrastruktur können wir die Juden Europas aus Hitlers Fängen befreien."
condemn_germany:0 "Verurteile Deutschland"
condemn_germany_desc:0 "Die Deutschen scheinen keinen Respekt vor einem Vertrag zu haben, den sie unterzeichnet haben. Scham und feindselige Beziehungen können die Folge sein."
british_rapprochement:0 "Britische Annäherung"
british_rapprochement_desc:0 "Angesichts der Bedrohung der gesamten Welt durch die Deutschen können ein alter Feind und seine Streitigkeiten vielleicht zum Wohle aller vergessen werden."
eastern_allies:0 "Östliche Alliierte"
eastern_allies_desc:0 "Ein neuer Block der Verbündeten wäre für uns von Vorteil."
support_prc:0 "Unterstützen Sie die VR China"
support_prc_desc:0 "Maos China hat eindeutig die beste Vision für China. Daher ist es von größter Bedeutung, seinen Einfluss im nationalistischen China auszuweiten und die Beziehungen zu ihm zu verbessern."
attend_internationale:0 "Besuchen Sie die Internationale"
attend_internationale_desc:0 "Eine Stimme im Weltsowjet ist eine wichtige Position und könnte unseren Namen und Einfluss bekannter machen."
invite_trotsky:0 "Laden Sie Trotzki ein"
invite_trotsky_desc:0 "Stalin und seine Säuberungen repräsentieren nicht den Kommunismus, er ist ein Totalitarist. Vielleicht sollten wir seinen Rivalen Leo Trotzki einladen, unsere Nation zu führen."
improved_leader:0 "Verbesserter Anführer"
improved_leader_desc:0 "Trotzki hat endlich die Zügel in die Hand genommen und kann effektiv regieren."
fourth_internationale:0 "Vierte Internationale"
fourth_internationale_desc:0 "Wir werden die nächste Internationale mit Trotzki an der Spitze ausrichten."
stalinist_policies:0 "Stalinistische Politik"
stalinist_policies_desc:0 "Eine rigorose Industrialisierung nach Stalins Art wird es unserem Land ermöglichen, seine Produktionskapazität und Militärmacht in kürzester Zeit enorm zu steigern."


#events
afghanistan.1.t:0 "Ein unfähiger Herrscher"
afghanistan.1.d:0 "Mohammad Zahir Schah, der kaum Erfahrung mit der Führung seines Landes hat, wird stark von seinen Onkeln beeinflusst. Vielleicht würde es dem Land besser gehen, wenn ein unabhängigerer Herrscher seinen Platz einnehmen würde ... "
afghanistan.1.a:0 "Verstanden."

afghanistan.2.t:0 "Ermordung von Humaira Begum."
afghanistan.2.d:0 "Die ehemalige Königin und politische Galionsfigur Afghanistans, Humaira Begum, wurde bei ihrem letzten öffentlichen Auftritt ermordet. Leider kann sie ihre Beraterfunktion nicht mehr ausüben. Wir müssen nun entscheiden, wie wir die Situation in der Öffentlichkeit ansprechen."
afghanistan.2.a:0 "Bereiten Sie eine Rede für unsere Bürger vor."
afghanistan.2.b:0 "Distanzieren Sie sich von dem Ereignis."

afghanistan.3.t:0 "Deutschlands Angebot"
afghanistan.3.d:0 "Die Deutschen sind in ihren Kriegsanstrengungen zunehmend verzweifelt und haben beschlossen, uns im Austausch gegen militärische Ausrüstung zu einem Deal zu bewegen, bei dem wir uns an ihren Kriegsanstrengungen beteiligen."
afghanistan.3.a:0 "Angebot annehmen"
afghanistan.3.b:0 "Das Angebot ablehnen"
afghanistan.3.c:0 "Nähern Sie sich den Briten"
afghanistan.3.aa:0 "Fragen Sie nach mehr"

afghanistan.4.t:0 "Afghanistans Angebot"
afghanistan.4.d:0 "Afghanistan wurde kürzlich von Deutschland kontaktiert, das im Austausch für eine kleine Lieferung von Hilfsgütern um Verstärkung bat. Im Austausch für Infanterieausrüstung und gepanzerte Fahrzeuge ist man bereit, sich uns anzuschließen."
afghanistan.4.a:0 "Nehmen Sie ihr Angebot an"
afghanistan.4.b:0 "Lehnen Sie ihr Angebot ab"

afghanistan.6.t:0 "Britische Reaktion"
afghanistan.6.d:0 "Die Briten haben unser Angebot abgelehnt"
afghanistan.6.a:0 "Verstanden."

afghanistan.7.t:0 "Britische Reaktion"
afghanistan.7.d:0 "Die Briten haben unser Angebot angenommen"
afghanistan.7.a:0 "Verstanden."

afghanistan.5.t:0 "Afghanistans Gegenangebot"
afghanistan.5.d:0 "Afghanistan hat sich entschieden, unser Angebot anzunehmen, hat aber auch zusätzliche Ausrüstung angefordert"
afghanistan.5.a:0 "Nehmen Sie ihr Angebot an"
afghanistan.5.b:0 "Lehnen Sie ihr Angebot ab"

afghanistan.9.t:0 "Deutsche Antwort"
afghanistan.9.d:0 "Die Deutschen haben unser Gegenangebot abgelehnt und sind außerdem zu dem Schluss gekommen, dass sie unsere Hilfe von vornherein nicht brauchen."
afghanistan.9.a:0 "Verstanden."

afghanistan.8.t:0 "Deutsche Antwort"
afghanistan.8.d:0 "Aus Verzweiflung haben die Deutschen beschlossen, unser Angebot anzunehmen"
afghanistan.8.a:0 "Verstanden"

afghanistan.10.t:0 "Angebot der Sowjets"
afghanistan.10.d:0 "Die Sowjets erkennen uns als neue kommunistische Regierung auf der Welt an und haben beschlossen, ihnen im Austausch für einen Beitritt zur Kommunistischen Internationale die Weitergabe militärischer Strategien anzubieten."
afghanistan.10.a:0 "Nehmen Sie ihr Angebot an"
afghanistan.10.b:0 "Lehnen Sie ihr Angebot ab"

afghanistan.11.t:0 "Britisches Angebot"
afghanistan.11.d:0 "Die Briten haben uns eine Nachricht geschickt, in der sie erklären, dass sie unsere Neutralität in ihrem anhaltenden Konflikt sicherstellen möchten. Im Gegenzug haben sie angeboten, für uns weitere Fabriken zu bauen."
afghanistan.11.a:0 "Angebot annehmen"
afghanistan.11.b:0 "Lehnen Sie ihr Angebot ab"

afghanistan.12.t:0 "Lehrentscheidung"
afghanistan.12.d:0 "Ein kürzlicher Streit unter den Militärkommandanten darüber, worauf die strategische Militärforschung konzentriert werden soll, hat zu der Bitte um Ihre Meinung dazu geführt, worauf wir unsere Forschungsanstrengungen konzentrieren sollen."
afghanistan.12.a:0 "Mobile Kriegsführung"
afghanistan.12.b:0 "Überlegene Feuerkraft"
afghanistan.12.c:0 "Großer Schlachtplan"
afghanistan.12.aa:0 "Massenangriff"

afghanistan.13.t:0 "Afghanistans Angebot"
afghanistan.13.d:0 "Die afghanische Königsfamilie hat uns ein Angebot gemacht. Sie möchte die beiden Königsfamilien vereinen und unser Land de facto unter ihre Herrschaft stellen. Für den Fall, dass wir ablehnen, droht sie mit Krieg."
afghanistan.13.a:0 "Sehr gut."
afghanistan.13.b:0 "Sind sie verrückt?"

afghanistan.14.t:0 "Afghanistans Angebot"
afghanistan.14.d:0 "Die afghanische Regierung ist mit einem Angebot zu uns gekommen: Übergeben Sie ihnen unser Land und unsere Ländereien, oder es droht Krieg."
afghanistan.14.a:0 "Bußgeld."
afghanistan.14.b:0 "Sie müssen gegen uns kämpfen, um es zu bekommen"

afghanistan.15.t:0 "Annexion erfolgreich"
afghanistan.15.d:0 "Sie haben unseren Forderungen nachgegeben und beschlossen, sich uns anzuschließen."
afghanistan.15.a:0 "Wunderbar"

afghanistan.16.t:0 "Annexion erfolglos"
afghanistan.16.d:0 "Sie haben unsere Forderungen abgelehnt. Wenn wir ihr Territorium jetzt haben wollen, müssen wir in den Krieg ziehen."
afghanistan.16.a:0 "Sie werden es bereuen"

afghanistan.17.t:0 "Afghanistans Bitte"
afghanistan.17.d:0 "Afghanistan, ein Land, das vor kurzem eine kommunistische Revolution erlebt hat, möchte sich mit uns und dem Rest der Komintern verbünden."
afghanistan.17.a:0 "Wir heißen sie mit offenen Armen willkommen"
afghanistan.17.b:0 "Sie müssen sich für Unterstützung woanders umsehen."\

afghanistan.18.t:0 "Sowjetische Reaktion"
afghanistan.18.d:0 "Die Sowjets haben uns in der Komintern willkommen geheißen."
afghanistan.18.a:0 "Ihre Unterstützung soll helfen"

afghanistan.19.t:0 "Sowjetische Reaktion"
afghanistan.19.d:0 "Die Sowjets haben unseren Antrag abgelehnt und werden uns nicht in die Komintern aufnehmen."
afghanistan.19.a:0 "Wir müssen uns woanders umsehen"

afghanistan.20.t:0 "Forderungen an den Iran"
afghanistan.20.d:0 "Wir formulieren gerade unsere Forderungen an den Iran. Wie viel sollten wir von ihm verlangen? Bedenken Sie, dass er möglicherweise eher bereit ist, wenn wir ihn nicht direkt annektieren …"
afghanistan.20.a:0 "Fordern Sie alles."
afghanistan.20.b:0 "Fordern Sie nur einen Teil davon."

afghanistan.21.t:0 "Afghanistans Forderungen"
afghanistan.21.d:0 "Afghanistan hat uns aufgefordert, unser gesamtes Land an sie abzutreten. Sie haben mit Krieg gedroht, falls wir uns weigern."
afghanistan.21.a:0 "Sagen Sie ihnen, wir werden unser Land abtreten."
afghanistan.21.b:0 "Niemals. Wir werden kämpfen, um unser Territorium zu verteidigen."

afghanistan.22.t:0 "Afghanistans Forderungen"
afghanistan.22.d:0 "Afghanistan hat uns ein Ultimatum gestellt: Wir müssen Khorsan, Semnan, Isfahan, Fars, Kerman und Sistan abtreten, oder es droht uns ein Krieg."
afghanistan.22.a:0 "Sehr gut"
afghanistan.22.b:0 "Niemals, mach die Armee bereit."

afghanistan.23.t:0 "Iran akzeptiert Forderungen"
afghanistan.23.d:0 "Der Iran hat unser Angebot angenommen. Der Deal verlief ohne Zwischenfälle und wir kontrollieren nun sein Territorium."
afghanistan.23.a:0 "Exzellent"

afghanistan.24.t:0 "Iran lehnt Forderungen ab"
afghanistan.24.d:0 "Der Iran hat unseren Vorschlag abgelehnt. Sie würden lieber in den Krieg ziehen, als uns nachzugeben."
afghanistan.24.a:0 "Bereitet die Armee vor"

afghanistan.25.t:0 "Afghanistans Forderungen"
afghanistan.25.d:0 "Afghanistan hat von uns verlangt, dass wir ihnen unser Reich überlassen, andernfalls droht uns die völlige Zerstörung durch Krieg."
afghanistan.25.a:0 "Sehr gut"
afghanistan.25.b:0 "Wir werden sie bis zum letzten Mann bekämpfen"

afghanistan.26.t:0 "Forderungen Afghanistans"
afghanistan.26.d:0 "Afghanistan will pakistanisches Territorium, hat eine Armee aufgestellt und ist bereit, dafür in den Krieg zu ziehen."
afghanistan.26.a:0 "Wir müssen ihren Forderungen nachgeben"
afghanistan.26.b:0 "Wir können sie nicht beschwichtigen"

afghanistan.27.t:0 "Afghanistan und die britische Forderung"
afghanistan.27.d:0 "Afghanistan und Großbritannien haben sich auf eine Aufteilung unseres Landes geeinigt. Ihnen bleibt nur noch, es uns abzunehmen."
afghanistan.27.a:0 "Lasst unser Volk nicht leiden, gebt ihm das Land friedlich"
afghanistan.27.b:0 "Sie können uns unser Land nicht einfach so wegnehmen!"

afghanistan.28.t:0 "Trotzkis neue Position"
afghanistan.28.d:0 "Leo Trotzki, der mutmaßliche Erbe von Wladimir Lenin in der Sowjetunion, hat in seinem Exil die Kontrolle über die Kommunistische Partei in Afghanistan übernommen."
afghanistan.28.a:0 "Interessant"

afghanistan.29.t:0 "Vierte Internationale"
afghanistan.29.d:0 "Der neue afghanische Führer Leo Trotzki hat gerade die Gründung eines neuen kommunistischen Blocks angekündigt, der sich der stalinistischen Politik widersetzt. Die Vereinbarungen sehen vor, dass die Mitgliedsländer einen gemeinsamen Verteidigungspakt schließen, sich wirtschaftlich integrieren und politisch mit der trotzkistischen Regierung verbünden müssen. Es bleibt abzuwarten, welche Auswirkungen dies auf die kommunistische Welt und die Welt insgesamt haben wird."
afghanistan.29.a:0 "Interessant"

afghanistan.30.t:0 "Forschungsdeal-Gelegenheit"
afghanistan.30.d:0 "Es gibt mehrere Weltmächte, die uns die Technologie für Jets liefern könnten. Wir können eine von ihnen um die Technologie bitten, und sie sind möglicherweise bereit, sie zu teilen. Wen sollten wir fragen?"
afghanistan.30.a:0 "Die Vereinigten Staaten"
afghanistan.30.b:0 "Deutschland"
afghanistan.30.c:0 "Großbritannien"
afghanistan.30.aa:0 "Die Sowjetunion"

afghanistan.31.t:0 "Afghanistans Antrag"
afghanistan.31.d:0 "Afghanistan hat sich an uns gewandt und um Unterstützung bei der Entwicklung eines Düsentriebwerks gebeten. Möglicherweise können wir dadurch unsere eigene Technologie weiterentwickeln. Können wir ihnen helfen?"
afghanistan.31.a:0 "Schicken Sie doch sofort Wissenschaftler herüber"
afghanistan.31.b:0 "Wir werden unsere Technologie nicht mit ihnen teilen"

afghanistan.32.t:0 "Anfrage abgelehnt"
afghanistan.32.d:0 "Sie haben unsere Bitte um Hilfe bei der Erforschung der Triebwerkstechnologie abgelehnt. Wir müssen sie selbst entdecken"
afghanistan.32.a:0 "Sehr gut."

afghanistan.33.t:0 "Anfrage angenommen"
afghanistan.33.d:0 "Sie haben unsere Bitte um Unterstützung bei der Forschung angenommen. Unsere Wissenschaftler stehen bereit, um Fortschritte in der Jet-Technologie zu beginnen"
afghanistan.33.a:0 "Wunderbare Neuigkeiten"


