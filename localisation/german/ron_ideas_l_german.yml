 RON_chinese_resistance_strategy:0 "Chinesische Widerstandsstrategie"
 RON_chinese_resistance_strategy_desc:0 "China begann, die Fabian-Strategie des „Zeit-gegen-Raum-Handelns“ zu verfolgen. Die chinesische Armee kämpfte, um den japanischen Vormarsch in die Städte im Norden und Osten zu verzögern, sodass sich die Heimatfront mit ihren Fachkräften und Schlüsselindustrien nach Westen nach Chongqing zurückziehen konnte. Als Folge dieser Strategie der verbrannten Erde wurden Dämme und Deiche absichtlich sabotiert, um massive Überschwemmungen zu verursachen, die Tausende von Todesopfern forderten und viele weitere in die Flucht schlugen."
 
