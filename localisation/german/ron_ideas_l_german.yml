bolivian_irredentism_2_desc:0 "Bolivien hat große Teile seines Territoriums an seine Nachbarn verloren. 1903 verloren wir Acre an Brasilien, 1839 beinahe Tarija an die Argentinische Konföderation, 1935 den Chaco an Paraguay und 1884 vor allem unsere Küste an Chile. Dies ist zwar demütigend, gibt uns aber Anlass, die Bevölkerung gegen eines unserer Nachbarländer zu vereinen."
BOL_foreign_monopolies:0 "Ausländische Monopole"
BOL_foreign_monopolies_desc:0 "Viele bolivianische Ressourcen befinden sich in den Händen ausländischer Unternehmen, wobei sich der Großteil des Chaco-Öls in den Händen der amerikanischen Standard Oil Company befindet. Wir müssen einen Weg finden, die Kontrolle über diese Ressourcen zurückzugewinnen, wenn wir unsere nach dem Chaco-Krieg geschwächte Wirtschaft wiederbeleben wollen."
BOL_foreign_monopolies_2:0 "Ausländische Monopole"
chaco_humillation:0 "Chaco-Demütigung"
chaco_humillation_desc:0 "Der Chaco-Krieg galt als schneller und einfacher Krieg, doch das genaue Gegenteil war der Fall. Wir verloren gegen ein Land mit weniger als der Hälfte unserer Bevölkerung. Dies war den Fähigkeiten von General José Félix Estigarribia zu verdanken, dessen mobile Kriegsführung unsere unflexiblen Formationen unter Hans Kundt und José David Toro überwältigte. Es wird eine Weile dauern, bis wir die Niederlage in diesem Krieg vergessen und uns von dem wirtschaftlichen Schaden erholt haben, den dieser Krieg für unser Land bedeutete."
