 FRA_victors_of_wwi_desc:0 "Nachdem die Armee den Ersten Weltkrieg siegreich hinter sich gelassen hatte, entwickelte sie eine gefährlich selbstgefällige Haltung, die dazu führte, dass strategische Entwicklungen nur langsam und mit einer gewissen Zurückhaltung voranschritten."
 FRA_disjointed_government:0 "Unkoordinierte Regierung"
 FRA_disjointed_government_desc:0 "Die französische Politik ist alles andere als stabil. Reformen sind zwar notwendig und willkommen, doch das Land ist gespalten, und eine Verwicklung in einen Konflikt würde es in große Gefahr bringen."
 FRA_protected_by_the_maginot_line:0 "Geschützt durch die Maginot-Linie"
 FRA_protected_by_the_maginot_line_desc:0 "Durch die Befestigung der Grenze hat Frankreich zwar die Möglichkeit, sorgfältig zu planen und sich vorzubereiten, verliert aber etwas an Flexibilität für den Fall unerwarteter Ereignisse."
