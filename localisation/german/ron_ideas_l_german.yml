dispersed_society:0 "Zerstreute Gesellschaft"
dispersed_society_desc:0 "Unser Land hat eine ständig wechselnde Bevölkerung, wobei nur wenige Menschen in den Großstädten leben. Dies mag als Vorteil angesehen werden, da unsere Bevölkerung an die Massenproduktion gewöhnt ist und unsere Industrie verstreut und daher schwer zu treffen ist. Dies bedeutet jedoch auch, dass unsere Produktions- und Technologieentwicklung nicht mit denen der entwickelteren Länder mithalten kann."
tibetan_rebels:0 "Tibetische Rebellen"
tibetan_rebels_desc:0 "Seit 1917 kam es in unserem Land zu tibetischen und Golok-Aufständen, die von unserer Regierung brutal niedergeschlagen wurden. Nach unserem Sieg im Qinhai-Tibet-Krieg von 1932 hörten viele dieser Aufstände auf, aber es gibt immer noch einige Zellen, die die verbliebenen tibetischen Bürger in Qinhai befreien wollen."
XSM_identity_crisis:0 "Identitätskrise"
XSM_identity_crisis_desc:0 "Viele Mitglieder der Ma-Clique betrachten sich als Han, die vorherrschende Volksgruppe Chinas. Die Mehrheit der Einwohner von Ma identifiziert sich jedoch eher mit der Hui-Ethnie, während andere sich als Tibeter, Goloks oder Uiguren betrachten. Wir müssen unser Volk unter einer Identität vereinen, bevor der Nationalismus unser Land auseinanderreißt."
