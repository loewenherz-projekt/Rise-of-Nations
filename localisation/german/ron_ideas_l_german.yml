 TUR_a_monopoly_has_been_formed_tt:1 "§YKeçi Ticaret§! wurde ein Monopol über die aufstrebende Industriebasis von [ROOT.GetNameDef] gewährt."
 TUR_can_only_have_one_prime_minister_tt:0 "Die Regierung kann nur einen „Premierminister“ haben."
 TUR_ottoman_officers_invited_back:0 "Die „Osmanischen Loyalisten“ wurden aufgefordert, in den aktiven Dienst zurückzukehren."
 TUR_cannot_form_kurdish_collaboration_government_tt:0 "§Y[TUR.GetNameDef]§! kann niemals eine kurdische Kollaborationsregierung bilden."
 TUR_has_a_prime_minister_tt:0 "§Y[TUR.GetNameDef]§! hat einen Premierminister."


 BUL_army_restrictions:0 "Armeebeschränkungen"
 BUL_army_restrictions_desc:0 "Eine weitere Folge des Vertrags von Neuilly-sur-Seine sind die strengen Beschränkungen, die unserer Armee auferlegt wurden. Sie verbieten nicht nur die Wehrpflicht, begrenzen die Anzahl der Truppen und Offiziere in unseren Streitkräften und hindern uns daran, moderne Ausrüstung zu unterhalten, sondern sie untersagen auch jegliche militärischen Manöver oder Feldzugsplanungen und legen sogar die Anzahl der Gewehre fest, die wir verwenden dürfen."
 BUL_army_restrictions_mobilization_law_tt:1 "§RKann die Wehrpflicht nicht erhöhen oder Kriege erklären.\nKann keine Einheiten ausbilden, auflösen oder Einheitenvorlagen bearbeiten.\nKann keine Panzer, Flugzeuge oder Schiffe produzieren§!."
 BUL_second_national_catastrophe:0 "Zweite nationale Katastrophe"
 BUL_second_national_catastrophe_desc:0 "Nach unserer Niederlage im Ersten Weltkrieg zwang uns der Vertrag von Neuilly-sur-Seine zur Abtretung riesiger Gebiete, die heute zu Jugoslawien, Griechenland und Rumänien gehören. Bis vor Kurzem verlangte der Völkerbund von uns, hohe Reparationszahlungen zu priorisieren, was unsere Wirtschaft schwächte und die Verschuldung unseres Landes zwangsläufig erhöhte. Der Nationalgeist hat sich von diesem Schlag nie wirklich erholt, daher ist es nicht verwunderlich, dass dieser Vertrag in Bulgarien allgemein als die zweite nationale Katastrophe bekannt ist ..."
 BUL_second_national_catastrophe_tt:0 "Wird entfernt, wenn Großbulgarien wiederhergestellt wird:\nHat die vollständige Kontrolle über §YSofia§!, §YPlovdiv§!, §YMoesia§!, §YBurgas§!, §YSüdserbien§!, §YSmazedonien§!, §YSentralmakedonien§!, §YSthrakien§!, §YDobrudscha§!."
 BUL_imro_01:0 "IMRO"
 BUL_imro_01_desc:0 "Die ständigen Brudermorde der Inneren Mazedonischen Revolutionären Organisation haben unsere internationalen Beziehungen schwer beschädigt und 1934 zur militärischen Niederschlagung der IMRO-Hochburg in Petritsch geführt. Dies versetzte der Organisation einen schweren Schlag und zwang die meisten ihrer Anführer zur Flucht ins Ausland. Dennoch sind einige revolutionäre Zellen in Bulgarien noch immer aktiv, und unsere diplomatischen Beziehungen sind größtenteils in einem schlechten Zustand."
 BUL_imro_02:0 "IMRO"
 BUL_imro_02_desc:0 "Die ständigen brudermörderischen Verbrechen der Inneren Mazedonischen Revolutionären Organisation haben unsere internationalen Beziehungen viel zu lange schwer beschädigt, doch jetzt erkennen die ausländischen Mächte endlich unsere Bemühungen an, die Organisation zum Wohle der Wahrung des Friedens auf dem Balkan zu zerstören."
 BUL_imro_04:0 "IMRO"
 BUL_imro_04_desc:0 "Unsere Zusammenarbeit mit der Inneren Mazedonischen Revolutionären Organisation wurde nicht nur von unseren Nachbarn, sondern auch von zahlreichen ausländischen Mächten und sogar von Teilen unserer Bevölkerung heftig kritisiert."
 BUL_tsar_boris_positive_01:0 "Zar Boris III."
 BUL_tsar_boris_positive_01_desc:0 "Boris‘ Politik hat sich für Bulgarien als sehr vorteilhaft erwiesen und aus diesem Grund genießt der Zar nicht nur bei den Eliten und den privilegiertesten Kreisen, sondern auch bei den einfachsten Schichten eine sehr hohe öffentliche Meinung."
 BUL_tsar_boris_negative_01:0 "Zar Boris III."
 BUL_tsar_boris_negative_01_desc:0 "Boris III. weiß, dass sein diktatorisches Regime zu Ende geht, und es überrascht nicht, dass er sich weigert, die von unseren Ministern vorgeschlagenen Änderungen zu akzeptieren. Er appelliert an loyale Mitglieder der Regierung, alle unsere Vorschläge zu vereiteln, und versucht verzweifelt, die Kontrolle über die bulgarische Politik so lange wie möglich zu behalten."
 BUL_zveno_ns:0 "Zveno"
 BUL_zveno_ns_desc:0 "Die Auflösung der Militärunion war notwendig, hatte jedoch ihre Folgen: Wir konnten uns endlich mehrerer Zveno-Mitglieder entledigen, die nichts weiter taten, als die Befehlskette zu behindern, aber wir verloren auch wertvolle Ausbilder und erfahrene Offiziere an unseren Militärakademien."
 BUL_fatherland_front_positive:0 "Die Vaterländische Front"
 BUL_fatherland_front_positive_desc:1 "Die Vaterländische Front wurde ursprünglich von der Bulgarischen Arbeiterpartei als politische Widerstandsbewegung gegen Unterdrückung und Faschismus in Bulgarien gegründet. Heute besteht sie aus Mitgliedern mehrerer Organisationen, die sich gegen all jene zusammengeschlossen haben, die das bulgarische Proletariat unterwerfen wollen."
 BUL_fatherland_front_negative_desc:0 "Die Vaterländische Front ist eine politische Widerstandsbewegung, die ursprünglich von der kommunistischen Bulgarischen Arbeiterpartei gegründet wurde, heute aber mehrere Gruppen und Organisationen mit sehr unterschiedlichen Ideologien umfasst, die sich gegen die prodeutsche Militärdiktatur in Bulgarien zusammengeschlossen haben."
 BUL_paramilitary_organizations:0 "Paramilitärische Organisationen"
 BUL_paramilitary_organizations_desc:0 "Mitglieder paramilitärischer Organisationen sind loyale Individuen, die bereits über eine gewisse militärische Disziplin verfügen und bereit sind, zum Ruhm unseres Landes Krieg zu führen. Seit wir ihre Treue zu unserer Sache gewonnen haben, erweisen sie sich als zuverlässige Quelle für Arbeitskräfte."
 BUL_brannik:0 "Brannik"
 BUL_brannik_desc:0 "Diese von Bogdan Filov gegründete profaschistische nationale Jugendorganisation wird immer größer und hat uns seit ihrer Gründung eine beträchtliche Zahl von Mitgliedern beschert, die sich unseren Streitkräften anschließen möchten."
 BUL_liberal_trade_policies:0 "Liberale Handelspolitik"
 BUL_liberal_trade_policies_desc:0 "Die bulgarische Wirtschaft taumelt seit ihrer Unabhängigkeit vom Osmanischen Reich von einer Krise in die nächste. Autarkiepolitik hat sich in der Vergangenheit als unzureichend erwiesen, daher ist es Zeit für eine wirtschaftliche Liberalisierung."
 BUL_bulgarian_patriarchate_restored:0 "Bulgarisches Patriarchat"
 BUL_bulgarian_patriarchate_restored_desc:0 "Wir haben endlich die Würde der bulgarischen orthodoxen Kirche wiederhergestellt und die Menschen freuen sich nun über die Wahl des ersten bulgarischen Patriarchen seit dem Fall von Tarnovo unter osmanischer Herrschaft im Jahr 1393."
 BUL_national_industry_01:0 "Nationale Industrie"
 BUL_national_industry_01_desc:0 "Wir haben moderne Werkzeuge für unsere industrielle Fertigung erworben. Das ist vielleicht nur ein kleiner, aber notwendiger Schritt auf dem Weg zur Entwicklung einer starken nationalen Industrie."
 BUL_national_industry_02:0 "Nationale Industrie"
 BUL_national_industry_02_desc:0 "Unser nationales Industrieentwicklungsprojekt hat sich als kostspielig, aber auch als äußerst erfolgreich erwiesen, da es die Gründung mehrerer neuer Industrien und die Modernisierung einiger bestehender Industrien ermöglicht hat."
 BUL_foreign_industry_dynamic_modifier:0 "Ausländische Industrie"
 BUL_foreign_industry_dynamic_modifier_desc:0 "Uns fehlen die Mittel, um aus eigener Kraft eine leistungsstarke und effiziente Industrie aufzubauen. Daher besteht unsere beste Chance darin, ausländische Investoren anzusprechen, die bereit sind, ihr Geschäft auszuweiten und in Bulgarien tätig zu werden."
 BUL_tobacco_exports:0 "Tabakexporte"
 BUL_tobacco_exports_desc:0 "Wir ersetzen unsere Getreideproduktion aktiv durch den wertvolleren Tabakanbau, der uns ein beträchtliches Einkommen verschafft."
 BUL_nationalized_industry:0 "Verstaatlichte Industrie"
 BUL_nationalized_industry_desc:0 "Wir haben jede ausländische Fabrik in Bulgarien enteignet und unsere industriellen Produktionskapazitäten erheblich gesteigert."
 BUL_aircraft_repair_facilities:0 "Flugzeugreparaturanlagen"
 BUL_aircraft_repair_facilities_desc:0 "Wir haben das Projekt zur Erweiterung der Flugzeugreparaturanlagen von Terem Georgi Benkovski entwickelt, damit unsere Luftwaffe optimale Wartungs- und Reparaturarbeiten an ihren Flugzeugen durchführen kann."
 BUL_international_pilot_training_program:0 "Internationales Pilotenausbildungsprogramm"
 BUL_international_pilot_training_program_desc:0 "Wir verfügen über ein laufendes internationales Pilotenausbildungsprogramm, das den Pool an qualifizierten Piloten und Besatzungsmitgliedern für unsere Luftwaffe erheblich vergrößert hat."
 BUL_bulgarian_army_01:0 "Bulgarische Armee"
 BUL_bulgarian_army_01_desc:0 "Wir sind von potenziellen Feinden umgeben, wie uns die Geschichte auf harte Weise gelehrt hat. Wenn wir in zukünftigen Konflikten die Oberhand behalten wollen, ist es von entscheidender Bedeutung, dass wir eine schlagkräftige Armee aufbauen und moderne Taktiken entwickeln."
 BUL_prussia_of_the_balkans_01:0 "Preußen des Balkans"
 BUL_prussia_of_the_balkans_01_desc:0 "In seinen Anfangsjahren war das Zarenreich Bulgarien ein stark militarisierter Staat mit einer großen und gut ausgerüsteten Armee, der als „Preußen des Balkans“ bezeichnet wurde, bis es von seinen ehemaligen, verräterischen Verbündeten verraten wurde. Nach den demütigenden Niederlagen der Vergangenheit haben wir unser Land jedoch wieder aufgebaut, und nun ist es an der Zeit, den einstigen Ruhm Bulgariens wiederherzustellen. Die Welt wird uns wieder „Preußen des Balkans“ nennen!"
 BUL_worker_strikes:0 "Arbeiterstreiks"
 BUL_worker_strikes_desc:0 "Breite Sozialisten haben sich den Kommunisten in ihrem Bemühen angeschlossen, landesweite Streiks unter den Industriearbeitern auszulösen, was unsere Produktion erheblich behindert und zu Konfrontationen zwischen ihnen und den Behörden führt."
 BUL_buhovo_uranium_mines:0 "Buhovo-Uranminen"
 BUL_buhovo_uranium_mines_desc:0 "In Buhovo, einer bulgarischen Stadt in der Nähe von Sofia, wurden beträchtliche Uranvorkommen entdeckt. Unsere Minen fördern diesen wertvollen Rohstoff, der für die Entwicklung neuer und schlagkräftiger Militärwaffen von entscheidender Bedeutung ist."
 BUL_uranium_concession_agreement_ns:0 "Uran-Konzessionsverträge"
 BUL_uranium_concession_agreement_ns_desc:0 "Wir können die Uranvorkommen in unserem Boden nicht optimal nutzen und es wäre nicht nur für uns, sondern auch für unsere [FROM.GetAdjective] Verbündeten vorteilhafter, einen Vertrag zu unterzeichnen, der ihnen im Austausch gegen nützliche Materialien und Produkte für unsere heimische Industrie und Landwirtschaft Ausbeutungsrechte einräumt."
 BUL_volunteers_in_spain_republican:0 "Freiwillige in Spanien"
 BUL_volunteers_in_spain_republican_desc:0 "[GetSpanishStruggleFocusLoc]"
 BUL_volunteers_in_spain_nationalist:0 "Freiwillige in Spanien"
 BUL_volunteers_in_spain_nationalist_desc:0 "[GetSupportTheSpanishCoupFocusLoc]"
 BUL_elites_crushed:0 "Eliten vernichtet"
 BUL_elites_crushed_desc:0 "Wir haben der bulgarischen Oberschicht viele ihrer großen Privilegien genommen, uns dadurch aber auch zahlreiche Feinde in wichtigen politischen und militärischen Positionen gemacht. Wir müssen diese Personen loswerden, die den sozialen Fortschritt in Bulgarien nur behindern."
 BUL_government_reforms_communists_01:0 "Regierungsreformen"
 BUL_government_reforms_communists_01_desc:0 "Die von der Regierung im Agrar- und Industriebereich durchgeführten Reformen sind zweifellos von wesentlicher Bedeutung für die Entwicklung und den Fortschritt der bulgarischen Nation."
 BUL_trained_youth_wings:0 "Ausgebildete Jugendflügel"
 BUL_trained_youth_wings_desc:0 "[GetTrainTheYouthWingsFocusLoc]"
