USA_white_christian_republic_desc:0 "Deus Vult!"

USA_american_monarchy:0 "Die amerikanische Monarchie"
USA_american_monarchy_desc:0 "Eine Monarchie ist eine Regierungsform, in der eine Person, der Monarch, auf Lebenszeit oder bis zur Abdankung Staatsoberhaupt ist. Die politische Legitimität und Autorität des Monarchen kann von eingeschränkt und weitgehend symbolisch (konstitutionelle Monarchie) bis hin zu vollständig autokratischer (absolute Monarchie) variieren und sich auf die Bereiche Exekutive, Legislative und Judikative erstrecken."

USA_military_government:0 "Die Militärregierung"
USA_military_government_desc:0 "Eine Militärregierung ist im Allgemeinen jede Regierung, die von Streitkräften verwaltet wird, unabhängig davon, ob diese Regierung nach den Gesetzen der jeweiligen Gerichtsbarkeit legal ist und ob sie von Einheimischen oder einer Besatzungsmacht gebildet wird. Sie wird in der Regel von Militärangehörigen ausgeübt."

 USA_the_great_red_menace:0 "Die große rote Bedrohung"
 USA_the_great_red_menace_desc:0 "Unser Handeln im letzten Krieg ist vielen noch in frischer Erinnerung. Wir müssen die Ängste des europäischen Kontinents wieder auf die wahre Gefahr lenken: die Große Rote Gefahr, die im Osten lauert. Wir werden eine massive Propagandakampagne starten, um dem Kontinent die Augen zu öffnen."
 
 SOV_the_great_prussian_menace:0 "Die große preußische Bedrohung"
 SOV_the_great_prussian_menace_desc:0 "Die Taten des vorherigen Regimes sind vielen noch in frischer Erinnerung. Wir müssen die Ängste des europäischen Kontinents wieder auf die wahre Gefahr lenken: die große preußische Bedrohung, die in Mitteleuropa droht. Wir werden eine massive Propagandakampagne starten, um dem Kontinent die Augen zu öffnen."

foreign_American_Imperialism:0 "Amerikanischer Imperialismus"
foreign_American_Imperialism_desc:0 "Nach fast 100 Jahren der Isolation in der Außenpolitik sind die Vereinigten Staaten endlich als globaler Machtmakler auf der Weltbühne aufgetreten. Der Sieg über das schwache spanische Imperium und die Eroberung Kubas und der Philippinen untermauern unsere gottgegebene Verpflichtung, diese Hemisphäre zu beherrschen. Es ist wahrlich die Erfüllung unserer Manifest Destiny."

USA_Christianity_Official_Religion:0 "Christentum Staatsreligion"
USA_Christianity_Official_Religion_desc:0 "Eine Staatsreligion (auch Staatsreligion oder offizielle Religion genannt) ist eine von einem souveränen Staat offiziell anerkannte Religion oder ein Glaubensbekenntnis. Ein Staat mit einer offiziellen Religion (auch Konfessionsstaat genannt) ist zwar nicht säkular, aber auch nicht zwangsläufig ein Gottesstaat. Staatsreligionen sind offizielle oder staatlich sanktionierte Einrichtungen einer Religion. Der Staat muss jedoch nicht zwangsläufig der Kontrolle der Religion (wie in einer Theokratie) unterliegen, und die staatlich sanktionierte Religion steht auch nicht zwangsläufig unter der Kontrolle des Staates."

USA_Legacy_of_the_British:0 "Britisches imperiales Erbe"
USA_Legacy_of_the_British_desc:0 "Das Empire brachte Blut und Leid für Millionen Menschen, aber es brachte auch Eisenbahnen, Straßen und Bildung. Ob gut oder schlecht, ein Großteil der Welt ist dem Empire zu verdanken – von ihrem Aussehen über die Sportarten, die wir ausüben, bis hin zu unserer Religion und unserer Sprache."

USA_pax_americana:0 "Pax Americana"
USA_pax_americana_desc:0 "Der Begriff „Pax Americana“ bezeichnet das Konzept des relativen Friedens in der westlichen Hemisphäre und später in der Welt nach dem Ende des Zweiten Weltkriegs im Jahr 1945, als die Vereinigten Staaten zur weltweit dominierenden Wirtschafts- und Militärmacht wurden."

GEN_Bastion_of_Democracy:0 "Bastion der Demokratie"
GEN_Bastion_of_Democracy_desc:0 "Demokratie ist eine Regierungsform, in der das Volk die Befugnis hat, über Gesetze zu beraten und zu entscheiden („direkte Demokratie“) oder Regierungsvertreter zu wählen („repräsentative Demokratie“). Wer zum Volk zählt und wie die Macht unter den Bürgern aufgeteilt oder von ihnen delegiert wird, hat sich im Laufe der Zeit und in unterschiedlichem Tempo von Land zu Land verändert. Im Laufe der Zeit wurden jedoch in der Regel immer mehr Bürger demokratischer Länder einbezogen. Zu den Eckpfeilern der Demokratie gehören Versammlungs- und Vereinigungsfreiheit, Eigentumsrechte, Religions- und Meinungsfreiheit, Inklusivität und Gleichberechtigung, Staatsbürgerschaft, Zustimmung der Regierten, Wahlrecht, Schutz vor ungerechtfertigter staatlicher Benachteiligung des Rechts auf Leben und Freiheit sowie Minderheitenrechte."

