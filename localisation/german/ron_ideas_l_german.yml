 ENG_the_war_to_end_all_wars:0 "Der Krieg, der alle Kriege beenden wird"
 ENG_the_war_to_end_all_wars_desc:0 "Da der Erste Weltkrieg noch in jüngster Zeit zurückliegt, zögern sowohl die Bevölkerung als auch die Politiker des Landes, eine weitere Generation in den Tod in den Schützengräben zu schicken."
 communist_pressure:0 "Kommunistischer Druck"
 rhineland_challenge_met:0 "Rheinland Challenge erfüllt"
 rhineland_challenge_met_desc:0 "Nach Vorhersagen, wonach das Rheinland ohne Eingreifen der Alliierten remilitarisiert werden könnte, geriet Deutschland schließlich unter Druck, nachzugeben, nachdem sich dies als Fehler herausgestellt hatte."
 kaiser_challenge_met:0 "Kaiser Challenge Met"
 kaiser_challenge_met_desc:0 "Nach Vorhersagen, wonach der Kaiser ohne Eingreifen der Alliierten aus den Niederlanden befreit werden könne, geriet Deutschland schließlich unter Druck, nachzugeben, nachdem sich dies als Fehler herausgestellt hatte."
 fascist_revolutionaries:0 "Faschistische Revolutionäre"
 fascist_revolutionaries_desc:0 "Steigt die Unterstützung für den Faschismus über 70 %, stürzt das Land in einen Bürgerkrieg. Sinkt die Unterstützung für den Faschismus unter 30 %, kommt es zum Stillstand der revolutionären Aktivitäten."
 communist_revolutionaries:0 "Kommunistische Revolutionäre"
 communist_revolutionaries_desc:0 "Steigt die Unterstützung für den Kommunismus über 70 %, stürzt das Land in einen Bürgerkrieg. Sinkt die Unterstützung für den Kommunismus unter 30 %, kommt es zum Stillstand der revolutionären Aktivitäten."
 democratic_revolutionaries:0 "Demokratische Revolutionäre"
 democratic_revolutionaries_desc:0 "Steigt die Unterstützung für die Demokratie über 70 %, stürzt das Land in einen Bürgerkrieg. Sinkt die Unterstützung für die Demokratie unter 30 %, kommt es zum Stillstand revolutionärer Aktivitäten."
 home_of_the_free:0 "Heimat der Freien"
 home_of_the_free_desc:0 "Die USA betrachten sich als Bastion und vielleicht sogar als Wiege der Demokratie und Freiheit. Was auch immer sie sein wollen, ihre Werte sind schwer zu kompromittieren, so verlockend manche Möglichkeiten auch erscheinen mögen."
 closed_economy_TT:0 "Es werden keine Ressourcen exportiert.\n\n"
 danieli:0 "Danieli"
 fascism_defeated:0 "Der Faschismus ist besiegt"
 fascism_defeated_desc:0 "Die Demokratie hat über den totalitären Faschismus gesiegt und die demokratischen Parteien stehen vereint gegen diese alte Bedrohung."
 communism_defeated:0 "Der Kommunismus ist besiegt"
 communism_defeated_desc:0 "Die Demokratie hat über den totalitären Kommunismus gesiegt und die demokratischen Parteien stehen vereint gegen diese alte Bedrohung."
 reign_of_terror:0 "Schreckensherrschaft"
 reign_of_terror_desc:0 "Das derzeitige Regime ist erst vor kurzem an die Macht gekommen, geht rücksichtslos gegen seine Feinde vor und unterdrückt jede Opposition, bevor sie überhaupt entsteht."
 anti_german_military:0 "Antideutsches Militär"
 anti_german_military_desc:0 "Fraktionen innerhalb der jugoslawischen Luftwaffe sind gegen eine Zusammenarbeit mit Deutschland. Sie könnten versuchen, das Regime zu stürzen, sollte das Land seine Grenzen für das Dritte Reich öffnen oder ein Bündnis mit ihm eingehen."
 anti_nazi_coup:0 "Anti-Nazi-Putsch"
 anti_nazi_coup_desc:0 "Nachdem Prinz Paul gestürzt wurde, um eine Zusammenarbeit mit Deutschland zu verhindern, ist das neue Regime gegen eine profaschistische Diplomatie."
