 RON_Unasur_desc:0 "Dieses Land ist Mitglied der Union Südamerikanischer Nationen."
 RON_United_Nations_desc:0 "Dieses Land ist Mitglied der Vereinten Nationen."
 RON_United_Nations_Security_Council_desc:0 "Dieses Land ist ständiges Mitglied des Sicherheitsrats der Vereinten Nationen."
 RON_Visegrad_desc:0 "Dieses Land ist Mitglied der Visegrad-Gruppe."
 RON_League_of_Nations_desc:0 "Dieses Land ist Mitglied des Völkerbundes."
 RON_Orthodox_Christianity_desc:0 "Das orthodoxe Christentum legt Wert auf Tradition und die Kontinuität des Glaubens durch die Heiligen Sakramente und legt dabei großen Wert auf die gemeinschaftlichen Aspekte des Gottesdienstes und des Mönchtums. Es ist bekannt für sein reiches liturgisches Leben und die Einhaltung der Lehren der frühen Kirchenväter."
 RON_Protestantism_desc:0 "Der Protestantismus, der aus der Reformation hervorging, betont den individuellen Glauben, die Autorität der Heiligen Schrift und die Erlösung allein durch den Glauben. Er umfasst eine breite Palette von Konfessionen mit jeweils unterschiedlichen Praktiken, vereint aber das Kernprinzip der Rückkehr zu den biblischen Wurzeln des Christentums."
 RON_Roman_Catholicism_desc:0 "Der römische Katholizismus ist auf die Führung des Papstes und des Lehramtes ausgerichtet und legt großen Wert auf Sakramente, Tradition und Soziallehre. Er zeichnet sich durch seine globale Reichweite, hierarchische Struktur und sein Bekenntnis zu Glaube und Vernunft aus."
 RON_National_Catholicism_desc:0 "Der Nationalkatholizismus ist auf die Führung des Papstes und des Lehramtes ausgerichtet und legt großen Wert auf Sakramente, Tradition und Soziallehre. Charakteristisch für ihn sind seine Bindung an die franquistische Regierung, seine hierarchische Struktur und sein Bekenntnis zu Glaube und Vernunft."
 RON_Paganism_desc:0 "Heidentum bezeichnet eine Vielzahl alter und zeitgenössischer polytheistischer religiöser Praktiken, die oft Naturkult, Animismus und die Verehrung mehrerer Gottheiten betonen. Es umfasst ein breites Spektrum an Glaubensvorstellungen und Ritualen, die typischerweise an bestimmte kulturelle und regionale Traditionen gebunden sind."
 RON_Taoism_desc:0 "Der Taoismus stammt aus China und konzentriert sich auf ein Leben im Einklang mit dem Tao, dem Grundprinzip, das die Quelle von allem ist. Er betont Einfachheit, Spontaneität und Nicht-Handeln (Wu Wei) sowie Praktiken wie Meditation, Feng Shui und traditionelle chinesische Medizin."
 RON_Sunni_Islam_desc:0 "Der sunnitische Islam ist die größte Strömung des Islam und betont die Autorität des Koran und der Hadithe sowie den Konsens der Umma. Er schätzt die Praktiken und Lehren des Propheten Mohammed und der ersten vier Kalifen und legt Wert auf eine geradlinige Herangehensweise an den Glauben."
 RON_Shia_Islam_desc:0 "Der schiitische Islam, die zweitgrößte Strömung des Islam, legt besonderen Wert auf die Führung der Imame, die als spirituelle und politische Nachfolger Mohammeds gelten. Er verfügt über eine reiche Tradition der Gelehrsamkeit, der Trauerrituale und der Ehrfurcht vor der Familie des Propheten."

