DNC_Imperial_Customs_Union_desc:0 "Zollunion zwischen den verschiedenen Teilen des Britischen Empire."

maurice_pujo:0 "Maurice Pujo"
maurice_pujo_desc:0 "Maurice Pujo war ein französischer Journalist und Mitbegründer der nationalistischen und monarchistischen Bewegung Action Française. Er wurde zum Anführer der Camelots du Roi, der Jugendorganisation der Action Française, die in den Jahren vor dem Zweiten Weltkrieg (1939–1945) an zahlreichen rechtsgerichteten Demonstrationen teilnahm. Nach dem Zweiten Weltkrieg wurde er wegen Kollaboration inhaftiert."

