white_russian_exiles_desc:0 "Während des russischen Bürgerkriegs flohen viele Russen nach Xinjiang, wo sie unter der Regierung von Yang Zengxin friedlich leben konnten und Guihua (Eingebürgerte) genannt wurden. Nach der Ermordung Yang Zengxins und massiver Repression durch die Regierung von Jin Shuren wurden viele von ihnen jedoch zu Banditen, während andere der Armee beitraten. Dies führte 1933 zum Putsch der russischen Soldaten in Jin Shuren, der zur Machtübernahme von Sheng Shicai führte."
