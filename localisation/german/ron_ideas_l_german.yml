 USA_defense_production_act:0 "Defense Production Act von 1950"
 USA_defense_production_act_desc:0 "Der Defense Production Act von 1950 ist ein US-Bundesgesetz, das am 8. September 1950 als Reaktion auf den Beginn des Koreakrieges erlassen wurde. Es war Teil einer umfassenden Zivilschutz- und Kriegsmobilisierungsmaßnahme im Kontext des Kalten Krieges. Seine Durchführungsbestimmungen, das Defense Priorities and Allocation System (DPAS), finden sich in 15 CFR §§ 700 bis 700.93. Seit 1950 wurde das Gesetz über 50 Mal erneuert. Es wurde regelmäßig geändert und ist nach wie vor in Kraft."
 
 RI_marshall_plan_giver:0 "Marshallplan"
 RI_marshall_plan_reciever:0 "Marshallplan"
 
 RI_marshall_plan_giver_desc:0 "Der Marshallplan (offiziell European Recovery Program, ERP) war eine 1948 ins Leben gerufene US-Initiative zur Bereitstellung von Entwicklungshilfe für Westeuropa. Nach dem Ende des Zweiten Weltkriegs überwiesen die Vereinigten Staaten über 13 Milliarden US-Dollar (entspricht etwa 115 Milliarden US-Dollar im Jahr 2021) im Rahmen von Konjunkturprogrammen an die westeuropäischen Volkswirtschaften. Er ersetzte einen früheren Vorschlag für einen Morgenthau-Plan und galt ab dem 3. April 1948 für vier Jahre. Die Ziele der Vereinigten Staaten waren der Wiederaufbau kriegszerstörter Regionen, der Abbau von Handelshemmnissen, die Modernisierung der Industrie, die Steigerung des europäischen Wohlstands und die Verhinderung der Ausbreitung des Kommunismus. Der Marshallplan sah den Abbau zwischenstaatlicher Handelshemmnisse und die wirtschaftliche Integration des europäischen Kontinents vor und förderte gleichzeitig eine Produktivitätssteigerung und die Einführung moderner Geschäftsverfahren."
 RI_marshall_plan_reciever_desc:0 "Der Marshallplan (offiziell European Recovery Program, ERP) war eine 1948 ins Leben gerufene US-Initiative zur Bereitstellung von Entwicklungshilfe für Westeuropa. Nach dem Ende des Zweiten Weltkriegs überwiesen die Vereinigten Staaten über 13 Milliarden US-Dollar (entspricht etwa 115 Milliarden US-Dollar im Jahr 2021) im Rahmen von Konjunkturprogrammen an die westeuropäischen Volkswirtschaften. Er ersetzte einen früheren Vorschlag für einen Morgenthau-Plan und galt ab dem 3. April 1948 für vier Jahre. Die Ziele der Vereinigten Staaten waren der Wiederaufbau kriegszerstörter Regionen, der Abbau von Handelshemmnissen, die Modernisierung der Industrie, die Steigerung des europäischen Wohlstands und die Verhinderung der Ausbreitung des Kommunismus. Der Marshallplan sah den Abbau zwischenstaatlicher Handelshemmnisse und die wirtschaftliche Integration des europäischen Kontinents vor und förderte gleichzeitig eine Produktivitätssteigerung und die Einführung moderner Geschäftsverfahren."
 
 RON_nordic_council:0 "Nordischer Rat"
 RON_nordic_council_desc:0 "Der Nordische Rat ist das offizielle Gremium für die formelle interparlamentarische Zusammenarbeit der nordischen Länder. Er wurde 1952 gegründet und verfügt über 87 Vertreter aus Dänemark, Finnland, Island, Norwegen und Schweden sowie aus den autonomen Gebieten Färöer, Grönland und Åland. Die Vertreter sind Abgeordnete in ihren jeweiligen Ländern oder Gebieten und werden von diesen Parlamenten gewählt. Der Rat hält jedes Jahr im Oktober/November eine ordentliche Tagung ab und normalerweise eine zusätzliche Tagung pro Jahr zu einem bestimmten Thema. Die offiziellen Sprachen des Rates sind Dänisch, Finnisch, Isländisch, Norwegisch und Schwedisch, obwohl er nur die gegenseitig verständlichen skandinavischen Sprachen – Dänisch, Norwegisch und Schwedisch – als Arbeitssprachen verwendet. Diese drei Sprachen sind die Muttersprache von etwa 80 % der Bevölkerung der Region und werden von den restlichen 20 % als Zweit- oder Fremdsprache gelernt."
 
 RON_latin_union:0 "Lateinische Union"
 RON_latin_union_desc:0 "Die Lateinische Union ist eine internationale Organisation romanischer Sprachgemeinschaften, deren Aktivitäten seit 2012 ruhen. Ihr Hauptsitz befindet sich in Paris. Ihr Ziel ist der Schutz, die Verbreitung und Förderung des gemeinsamen kulturellen Erbes der romanischen Völker sowie die Vereinheitlichung der Identitäten der romanischen und romanisch geprägten Welt. Die Union wurde 1954 in Madrid gegründet. Sie nahm 1983 ihre Tätigkeit auf und zählte seitdem 12 Mitglieder, darunter Länder in Nordamerika, Südamerika, Nordeuropa, Südeuropa, Afrika und dem asiatisch-pazifischen Raum."
 
