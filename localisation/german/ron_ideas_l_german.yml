 scraping_the_barrel_modifier:0 "Das Fass auskratzen"
 WW1_BEL_language_barrier:0 "Sprachbarriere"
 WW1_BEL_language_barrier_desc:0 "Obwohl unser Land zwei Amtssprachen hat, wird in der Armee nur eine von beiden gesprochen: Französisch. Diese Situation führt zu vielen Missverständnissen in unseren Reihen. Nur Reformen können dies ändern."
 fascist_influence:0 "Nationalistischer Einfluss"
 fascist_influence_desc:0 "Der nationalistische Druck hat die Nationalisten sehr populär gemacht und das Land ist anfällig dafür, sich mit anderen nationalistischen Nationen zu verbünden."
 communist_influence:0 "Sozialistischer Einfluss"
 communist_influence_desc:0 "Der sozialistische Druck hat die Sozialisten sehr populär gemacht und das Land ist anfällig dafür, sich mit anderen sozialistischen Nationen zu verbünden."
 democratic_influence:0 "Demokratischer Einfluss"
 democratic_influence_desc:0 "Der demokratische Druck hat die Demokratie sehr populär gemacht und das Land ist anfällig dafür, sich mit anderen Demokraten zu verbünden."
 neutrality_influence:0 "Autoritärer Einfluss"
 neutrality_influence_desc:0 "Der autoritäre Druck hat zu einem neuen Respekt gegenüber jenen mit starken Regierungen und edlen Königshäusern geführt, und das Land ist anfällig dafür, sich mit anderen autoritären Regierungen zu verbünden."
 soviet_german_friendship:0 "Sowjetisch-deutsche Freundschaft"
 soviet_german_friendship_desc:0 "Das Deutsche Reich und die Sowjetunion haben sich in Freundschaft gegen den dekadenten Westen vereinigt."
 sour_loser:0 "Bitterer Verlierer"
 sour_loser_desc:0 "Die Politik dieser Nation ist von Bitterkeit über die Niederlage im Ersten Weltkrieg geprägt."
 received_attache:0 "Empfangener Attaché"
 received_attache_desc:0 "Ausländische Militärattachés mit Wohnsitz in unserem Land."
 ATTACHE_LIST:0 "Wir haben Militärattachés von $LIST$ erhalten. Und sie geben uns folgende Effekte:"
 porsche:0 "Porsche"
 porsche_desc:0 "Porsche bevorzugt Panzer mit schwerer Panzerung."
 henschel:0 "Henschel"
 henschel_desc:1 "Henschel war für alle in Serie produzierten Tiger-Modelle verantwortlich, Panzer, die nach der Lösung anfänglicher Zuverlässigkeitsprobleme eine bemerkenswert gute Leistung zeigten."
 GER_MAN:0 "MANN"
 GER_MAN_desc:1 "MAN ist vor allem für den Panther-Panzer bekannt, war aber auch an der Entwicklung und Produktion früherer Panzermodelle beteiligt."
 rheinmetall:0 "Rheinmetall"
 rheinmetall_desc:0 "Rheinmetall entwickelt und baut alle Arten von Großwaffen und Kanonen."
 mauser:0 "Mauser"
 mauser_desc:0 "Mauser entwickelt und baut alle Arten von Kleinwaffen."
 ig_faben:0 "IG Farben"
 ig_faben_desc:0 "IG Farben ist sehr an industrieller Forschung interessiert."
 messerschmitt:0 "Messerschmitt"
 messerschmitt_desc:0 "Messerschmitt konzentriert sich auf die Konstruktion von Leichtflugzeugen, beispielsweise Jagdflugzeugen."
 focke_wulf:0 "Focke Wulf"
 focke_wulf_desc:0 "Focke Wulf hat ein besonderes Interesse an der Konstruktion mittlerer Flugzeuge, beispielsweise schwerer Jäger."
 junkers:0 "Junkers"
 junkers_desc:0 "Junkers ist vor allem für die Entwicklung des Sturzkampfbombers Stuka bekannt."
 todt:0 "Fritz Todt"
 todt_desc:0 "Fritz Todt, ein deutscher Ingenieur, war der Gründer der Organisation Todt. Er wird die Baugeschwindigkeit ziviler Industrieprojekte erhöhen."
 speer:0 "Albert Speer"
 speer_desc:0 "Albert Speer war ein deutscher Architekt und von 1942 bis 1945 Reichsminister für Rüstung und Kriegsproduktion. Ihm wird oft das „Rüstungswunder“ zugeschrieben, seine Ernennung wird die industrielle Effizienz steigern."
 raeder:0 "Erich Raeder"
 raeder_desc:0 "Erich Raeder war ein deutscher Admiral, der den Einsatz traditioneller Überwasserschiffe und die „Fleet in Being“-Doktrin befürwortete."
 donitz:0 "Karl Dönitz"
 donitz_desc:0 "Karl Dönitz war ein deutscher Admiral mit einer Vorliebe für U-Boote und die Handelsverbotsdoktrin."
 goering:0 "Hermann Göring"
 goering_desc:0 "Hermann Göring war ein Jagdflieger des Ersten Weltkriegs und wurde zu einem der wichtigsten Unterstützer Hitlers. Obwohl er in diesem Beruf nicht der Beste ist, ist er ihm treu ergeben."
 walther_wever:0 "Walther Wever"
 walther_wever_desc:0 "Walther Wever war ein früher Vertreter der Theorie des strategischen Bombenangriffs."
 ritter_von_greim:0 "Ritter von Greim"
 ritter_von_greim_desc:0 "Ritter von Greim ist ein Befürworter der taktischen Unterbrechung."
 ernst_udet:0 "Ernst Udet"
 ernst_udet_desc:0 "Ernst Udet war maßgeblich an der Einführung von Sturzkampfbombertechniken und der Entwicklung des Sturzkampfbombers Stuka beteiligt."
 werner_von_fritsch:0 "Werner von Fritsch"
 werner_von_fritsch_desc:0 "Werner von Fritsch, ein General der alten Garde, befürwortet eine Konzentration auf die Infanterie."
 ludwig_beck:0 "Ludwig Beck"
 ludwig_beck_desc:0 "Einen besonderen Schwerpunkt legt Ludwig Beck auf die Versorgung."
 franz_halder:0 "Franz Halder"
 franz_halder_desc:0 "Franz Halder glaubt an die Schlagkraft der Artillerie im Angriff."
 heinz_guderian:0 "Heinz Guderian"
 wilhelm_keitel:0 "Wilhelm Keitel"
 wilhelm_keitel_desc:0 "Wilhelm Keitel, ein General der Alten Garde, bevorzugt die Infanterie. Was ihm an Können fehlt, macht er durch Loyalität wett."
 ferdinand_schorner:0 "Ferdinand Schörner"
 ferdinand_schorner_desc:0 "Ferdinand Schörner ist erfahren in der Verteidigung und im Kampf bei kaltem Wetter."
 general_staff:0 "Generalstab"
 general_staff_desc:0 "Der deutsche Generalstab war für die kontinuierliche Untersuchung aller Aspekte des Krieges verantwortlich, einschließlich der Ausarbeitung und Überprüfung von Mobilisierungs- und Feldzugsplänen. Dies trug zu einem höheren Organisationsgrad der Armee bei."
 v_weapons:0 "Rachewaffen"
 v_weapons_desc:0 "Langstreckenraketen wären ideale Rachewaffen gegen unsere Feinde."
 hermann_gortz:0 "Hermann Görtz"
 hermann_gortz_desc:0 "„Hermann Görtz“ ist ein erfahrener deutscher Spion."
 elyesa_bazna:0 "Elyesa Bazna"
 elyesa_bazna_desc:0 "„HElyesa Bazna“ ist weithin unter seinem Decknamen Cicero bekannt."
 marina_lee:0 "Marina Lee"
 marina_lee_desc:0 "§HMarina Lee§! ist eine Ballerina, die sich auf das Stehlen von Schlachtplänen spezialisiert hat."
 german_advisors:0 "Deutsche Militärberater"
 german_advisors_desc:0 "Eine deutsche Militärmission unter der Leitung von Alexander von Falkenhausen ist in China präsent und ihre Berater unterstützen uns dabei, unsere Armee auf westliches Niveau zu bringen."
