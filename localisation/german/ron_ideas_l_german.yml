COVENSA:0 "COVENSA"
prussian_ethos:0 "Preußische Doktrin"
prussian_ethos_desc:0 "Im 19. Jahrhundert folgte die chilenische Armee der französischen Doktrin. Nach der demütigenden Niederlage im Deutsch-Französischen Krieg bat sie Deutschland jedoch um eine militärische Mission. Wilhelm II. selbst unterstützte diese Mission, da er über die chilenische Leistung im Salpeterkrieg erstaunt war. Die militärische Bürokratie und Ausbildung wurden reformiert, die Uniformen wurden an die deutschen angelehnt und bei allen Militärparaden wurde der Stechschritt eingeführt."
prussian_of_south_america:0 "Preußen von Südamerika"
prussian_of_south_america_desc:0 "Im 19. Jahrhundert folgte die chilenische Armee der französischen Doktrin. Nach der demütigenden Niederlage im Deutsch-Französischen Krieg bat sie Deutschland jedoch um eine militärische Mission. Wilhelm II. selbst unterstützte diese Mission, da er über die chilenische Leistung im Salpeterkrieg erstaunt war. Die militärische Bürokratie und Ausbildung wurden reformiert, die Uniformen wurden an die deutschen angeglichen und bei allen Militärparaden wurde der Stechschritt eingeführt."
milicia_republicana:0 "Republikanische Miliz"
milicia_republicana_desc:0 "Die Milicias Republicanas (zu Deutsch: Republikanische Milizen) sind eine paramilitärische Miliz, die 1932 gegründet wurde, um den Staatsstreich von Armee und Marine zu verhindern, der die Sozialistische Republik an die Macht brachte. Ihr Ziel ist es, die Armee an weiteren Putschen zu hindern, was ihnen bislang auch gelungen ist. Nun haben sie Arturo Alessandri die Treue geschworen und werden die Demokratie in Chile bis zum letzten Atemzug verteidigen.\n§ROhne Arturo Alessandri als Führer Chiles werden sich die Milicias Republicanas auflösen.§!"
the_greatest_depression:0 "Die größte Depression"
the_greatest_depression_desc:0 "Chile war eines der am stärksten von der Weltwirtschaftskrise betroffenen Länder. Die Wirtschaft begann 1914 zu schwächeln, nachdem der Salpeterpreis stark gefallen war. Nach der Weltwirtschaftskrise setzte Chiles starke Abhängigkeit von nordamerikanischen Importen dem Land jedoch den Todesstoß. Mittlerweile erholt sich die Wirtschaft des Landes, doch mit einer Inflation von 12 % und einer hohen Arbeitslosigkeit hat Chile noch einen langen Weg vor sich, um wieder das Niveau von vor 1929 zu erreichen."
the_greatest_depression_2:0 "Die Große Depression"
the_greatest_depression_2_desc:0 "Chile war eines der am stärksten von der Weltwirtschaftskrise betroffenen Länder. Die Wirtschaft begann 1914 zu schwächeln, nachdem der Salpeterpreis stark gefallen war. Nach der Weltwirtschaftskrise setzte Chiles starke Abhängigkeit von nordamerikanischen Importen dem Land jedoch den Todesstoß. Mittlerweile erholt sich die Wirtschaft des Landes, doch mit einer Inflation von 12 % und einer hohen Arbeitslosigkeit hat Chile noch einen langen Weg vor sich, um wieder das Niveau von vor 1929 zu erreichen."
the_greatest_depression_3:0 "Wirtschaftliche Erholung"
the_greatest_depression_3_desc:0 "Chile war eines der am stärksten von der Weltwirtschaftskrise betroffenen Länder. Die Wirtschaft begann 1914 zu schwächeln, nachdem der Salpeterpreis stark gefallen war. Nach der Weltwirtschaftskrise setzte Chiles starke Abhängigkeit von nordamerikanischen Importen dem Land jedoch den Todesstoß. Mittlerweile erholt sich die Wirtschaft des Landes, doch mit einer Inflation von 12 % und einer hohen Arbeitslosigkeit hat Chile noch einen langen Weg vor sich, um wieder das Niveau von vor 1929 zu erreichen."
paramilitary_police:0 "Paramilitärische Polizei"
paramilitary_police_desc:0 "Die chilenischen Karabiner (auf Spanisch „Carabineros de Chile“) wurden 1927 von Diktator Carlos Ibañez del Campo als eine Mischung aus Steuerpolizei und Karabinerkorps der Armee gegründet. Ihr Ziel war es zunächst, als organisierte Polizei zu arbeiten, doch am Ende erledigten sie die Drecksarbeit von Ibañez, indem sie auf Randalierer schossen und politische Gegner töteten, was den chilenischen Karabinern einen verheerenden Ruf in der Bevölkerung einbrachte. Ihre gute Ausrüstung und militärische Tradition ermöglichen es ihnen jedoch, im Notfall wie jede andere Militäreinheit zu kämpfen."
memories_of_the_workers_insurance:0 "Erinnerungen an die Arbeiterversicherung"
carlos_keller_rueff:0 "Carlos Keller Rueff"
carlos_keller_rueff_desc:0 "Ein deutscher Einwanderer und Vordenker der „Movimiento Nacional Socialista“, bekannt für seine Studien zu Ökonomie und Antisemitismus, hat nun de facto die Macht in Chile inne, während Von Marées sich als Sprecher seiner verdrehten Ideen aufführt."
