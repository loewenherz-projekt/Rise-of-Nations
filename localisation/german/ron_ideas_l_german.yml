CAN_conscription_crisis_desc:0 "Die Wehrpflichtkrise von 1917 war eine politische und militärische Krise in Kanada während des Ersten Weltkriegs. Sie wurde hauptsächlich durch die Meinungsverschiedenheit darüber verursacht, ob Männer zum Kriegsdienst eingezogen werden sollten, brachte aber auch viele Probleme im Verhältnis zwischen Frankokanadiern und Engländern ans Licht, da fast alle Frankokanadier die Wehrpflicht ablehnten. Sie fühlten sich weder Großbritannien noch Frankreich gegenüber besonders loyal und sind es bis heute. Daher könnte es schwerwiegende Folgen haben, die Québecer erneut zum Kampf für England zu zwingen."
