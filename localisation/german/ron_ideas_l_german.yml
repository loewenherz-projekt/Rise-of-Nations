BRA_agrarian_reliant_economy:0 "Agrarwirtschaft"
BRA_agrarian_reliant_economy_desc:0 "Brasilien wurde von der Weltwirtschaftskrise hart getroffen. Ausländische Investitionen brachen ein, und zwischen 1929 und 1932 sanken die Kaffeeexporte um 50 %, da sie weitgehend von den USA abhängig waren, dem Hauptabnehmer brasilianischen Kaffees. Um einen weiteren Preisverfall zu verhindern, begann die Regierung, den Kaffeeproduzenten auf Kredit abzukaufen und die Säcke anschließend ins Meer zu werfen oder zu verbrennen, um den Preisverfall zu verhindern. Ähnliche Probleme wurden auch in der Zuckerrohrindustrie gemeldet, was unserer Regierung gezeigt hat, dass wir uns entweder von einer Agrarwirtschaft lösen oder neue Märkte für die Versorgung finden müssen."
BRA_agrarian_reliant_economy2:0 "Agrarwirtschaft"
BRA_agrarian_reliant_economy2_desc:0 "Brasilien wurde von der Weltwirtschaftskrise hart getroffen. Ausländische Investitionen brachen ein, und zwischen 1929 und 1932 sanken die Kaffeeexporte um 50 %, da sie weitgehend von den USA abhängig waren, dem Hauptabnehmer brasilianischen Kaffees. Um einen weiteren Preisverfall zu verhindern, begann die Regierung, den Kaffeeproduzenten auf Kredit abzukaufen und die Säcke anschließend ins Meer zu werfen oder zu verbrennen, um den Preisverfall zu verhindern. Ähnliche Probleme wurden auch in der Zuckerrohrindustrie gemeldet, was unserer Regierung gezeigt hat, dass wir uns entweder von einer Agrarwirtschaft lösen oder neue Märkte für die Versorgung finden müssen."
