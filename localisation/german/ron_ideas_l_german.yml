a_better_future_for_china_desc:0 "Während ein antikommunistischer Diktator Nanjing regiert und sich ein verrückter Revolutionär in Yan&#39;an versteckt, ist Yunnan, obwohl von einem Kriegsherrn regiert, eine der stabilsten Regionen Chinas und wird von seinen Bürgern aufgrund seiner wachsenden Wirtschaft sowie politischer, sozialer und bildungspolitischer Reformen als „demokratische Festung“ angesehen. Es bleibt jedoch noch viel zu tun, um Yunnan zu einer Modellprovinz zu machen.\n§RLong Yun nicht als unseren Anführer zu haben, wird unser Volk verärgern!§!"
a_dream_fulfilled:0 "Ein erfüllter Traum"
a_dream_fulfilled_desc:0 "Während in Nanjing ein antikommunistischer Diktator herrscht und sich in Yan&#39;an ein verrückter Revolutionär versteckt, ist Yunnan, obwohl es von einem Kriegsherrn regiert wird, eine der stabilsten Regionen in ganz China und wird von seinen eigenen Bürgern aufgrund seiner wachsenden Wirtschaft und seiner politischen, sozialen und bildungsbezogenen Reformen als „demokratische Festung“ angesehen."
fulfilling_our_duty:0 "Unsere Pflicht erfüllen"
fulfilling_our_duty_desc:0 "Während ein antikommunistischer Diktator Nanjing regiert und sich ein verrückter Revolutionär in Yan&#39;an versteckt, ist Yunnan, obwohl von einem Kriegsherrn regiert, eine der stabilsten Regionen Chinas und wird von seinen Bürgern aufgrund seiner wachsenden Wirtschaft sowie politischer, sozialer und bildungspolitischer Reformen als „demokratische Festung“ angesehen. Es bleibt jedoch noch viel zu tun, um Yunnan zu einer Modellprovinz zu machen.\n§RLong Yun nicht als unseren Anführer zu haben, wird unser Volk verärgern!§!"
