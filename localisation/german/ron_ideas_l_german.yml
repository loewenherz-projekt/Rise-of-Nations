soviet_influence_mon:0 "Sowjetischer Einfluss"
soviet_influence_mon_desc:0 "Nach dem Sieg über die Truppen des verrückten Adligen von Ungern-Sternberg mit Hilfe der Sowjets bei der sowjetischen Intervention in der Mongolei 1921 verwandelte sich die Mongolei fast in eine weitere Sowjetrepublik mit einer von den Russen geführten Armee und einem Machtkampf zwischen denjenigen, die eine Annäherung an Stalin befürworteten, und denjenigen, die die vollständige mongolische Unabhängigkeit befürworteten. Dies brachte dem Land eine gewisse Modernisierung, aber war es das wert?"
