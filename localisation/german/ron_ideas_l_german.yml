CZE_skoda_works_desc:0 "Die Škoda-Werke sind einer der größten europäischen Industriekonzerne des 20. Jahrhunderts. Sie wurden 1859 vom tschechischen Ingenieur Emil Škoda in Pilsen im österreichischen Kaiserreich (heute Tschechoslowakei) gegründet. Bekannt durch den Bau von Dreadnought-Geschütztürmen für die österreichisch-ungarische Marine sowie die Produktion des Panzerkampfwagens 35t, unterstützen die Škoda-Werke uns im Waffen- und Panzerbau."
CZE_divided_nation_desc:0 "Obwohl Tschechen und Slowaken viele Gemeinsamkeiten haben, ist keine Union vor nationalistischen Tendenzen gefeit, die auf Spaltung abzielen. Wir müssen diese Bewegungen beschwichtigen, wenn wir uns gegen ausländische Bedrohungen verteidigen wollen. \n§GDie Beschwichtigung der Slowaken, die Nähe zur Kapitulation oder der Verlust der Kontrolle über die Westslowakei werden diese Tendenz beseitigen.§!"
