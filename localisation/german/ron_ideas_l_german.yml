 sisu:0 "Sisu"
 sisu_desc:0 "Sisu ist der einzigartige finnische Ausdruck für die Widerstandsfähigkeit der Bevölkerung. Finnland hat harte Zeiten erlebt und wird dies auch wieder tun."
 great_depression:0 "Die Große Depression"
 great_depression_desc:0 "Obwohl die Große Depression ein weltweites Phänomen war, begann sie mit einem Börsencrash in den USA. Sie führte zu sprunghaft ansteigenden Arbeitslosenzahlen und sinkenden Steuereinnahmen. Das amerikanische Volk und seine Regierung haben genug Sorgen, ohne sich in einen weiteren Krieg verwickeln zu lassen."
 new_deal:0 "Neuer Deal"
 new_deal_desc:0 "Eine Reihe von Maßnahmen und Programmen, die von Franklin D. Roosevelt als Reaktion auf die Härten während der Weltwirtschaftskrise initiiert wurden."
 wilkies_new_deal:0 "Willkies New Deal"
 wilkies_new_deal_desc:0 "Obwohl Wendell Willkie einige Vorschläge Roosevelts zur Ausweitung des New Deal ablehnte, wurden einige Aspekte vom neuen Präsidenten unterstützt und beibehalten."
