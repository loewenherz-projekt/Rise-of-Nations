bolivian_irredentism:0 "Bolivianischer Irredentismus"
bolivian_irredentism_desc:0 "Bolivien hat große Teile seines Territoriums an seine Nachbarn verloren. 1903 verloren wir Acre an Brasilien, 1839 beinahe Tarija an die Argentinische Konföderation, 1935 den Chaco an Paraguay und 1884 vor allem unsere Küste an Chile. Dies ist zwar demütigend, gibt uns aber Anlass, die Bevölkerung gegen eines unserer Nachbarländer zu vereinen."
