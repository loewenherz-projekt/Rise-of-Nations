 GRE_debt_to_the_ifc:0 "Schulden gegenüber der IFC"
 GRE_debt_to_the_ifc_desc:0 "Griechenland ist hoch verschuldet bei der Internationalen Finanzkommission (IFC), einer einst einflussreichen Organisation, deren Vorsitz heute nur noch Großbritannien, Frankreich und Italien innehaben. Trotz der aufgeblähten IFC fordern die beteiligten Länder weiterhin die vollständige Rückzahlung ihrer Schulden gegenüber Griechenland. Das bedeutet: Bis wir unsere Schulden beglichen oder ihnen auf andere Weise entgangen sind, hält uns die IFC in der Hand."
 GRE_debt_to_the_ifc_2:0 "Schulden gegenüber der IFC"
 GRE_debt_to_the_ifc_2_desc:0 "Griechenland ist hoch verschuldet bei der Internationalen Finanzkommission (IFC), einer einst einflussreichen Organisation, deren Vorsitz heute nur noch Großbritannien, Frankreich und Italien innehaben. Trotz der aufgeblähten IFC fordern die beteiligten Länder weiterhin die vollständige Rückzahlung ihrer Schulden gegenüber Griechenland. Das bedeutet: Bis wir unsere Schulden beglichen oder ihnen auf andere Weise entgangen sind, hält uns die IFC in der Hand."
 GRE_debt_to_the_ifc_3:0 "Schulden gegenüber der IFC"
 GRE_debt_to_the_ifc_3_desc:0 "Griechenland ist hoch verschuldet bei der Internationalen Finanzkommission (IFC), einer einst einflussreichen Organisation, deren Vorsitz heute nur noch Großbritannien, Frankreich und Italien innehaben. Trotz der aufgeblähten IFC wollen die beteiligten Länder weiterhin die vollständige Rückzahlung ihrer Schulden gegenüber Griechenland. Das bedeutet: Bis wir unsere Schulden beglichen oder ihnen auf andere Weise entgangen sind, hält uns die IFC in der Hand."
 GRE_george_ii:0 "Georg II."
 GRE_george_ii_desc:0 "Georg II. ist der unbeliebte König der Hellenen, der 1935 dank einer manipulierten Volksabstimmung aus dem Exil wieder auf den Thron gelangte. Dieses Mal ist er entschlossen, seinen Thron zu behalten."
 GRE_george_ii_restrained:0 "Georg II."
 GRE_george_ii_restrained_desc:0 "Georg II. ist der spaltende König der Hellenen, der 1935 dank einer manipulierten Volksabstimmung aus dem Exil wieder auf den Thron gelangte. Anstatt zuzulassen, dass der Status dieses einzelnen Mannes die griechische Nation erneut spaltet, haben die Venezelisten Georg II. als konstitutionellen Monarchen nach schwedischem Vorbild bestehen lassen."
 GRE_schachtplan:0 "Schachtplan"
 GRE_schachtplan_desc:0 "Der Schachtplan, eine Idee des deutschen Ökonomen Hjalmar Schacht, garantiert Griechenland den Zugang zu deutschen Märkten im Austausch für erhöhte Rohstoffimporte aus Griechenland nach Deutschland. Die Deutschen haben uns großzügig über Wasser gehalten, und dennoch sind wir möglicherweise direkt in ihre Falle getappt, indem wir uns so abhängig von ihrer Großzügigkeit gemacht haben."
 GRE_schachtplan_modified:0 "Schachtplan"
 GRE_schachtplan_modified_desc:0 "Der Schachtplan, eine Idee des brillanten Hjalmar Schacht, garantiert Griechenland den Zugang zu deutschen Märkten im Austausch für bevorzugten Zugang zu griechischen Rohstoffen. Die Deutschen haben uns in der Vergangenheit großzügig über Wasser gehalten, und gemeinsam haben wir eine wirklich besondere Wirtschaftsbeziehung aufgebaut."
 GRE_schachtplan_fascistised:0 "Der Gotzamanis-Schachtplan"
 GRE_schachtplan_fascistised_desc:0 "Der neue Schachtplan basiert auf Hjalmar Schachts ursprünglichem Schachtplan und wurde von den größten deutschen und griechischen Wirtschaftsexperten sorgfältig ausgearbeitet: Er sieht einen neuen Wirtschaftspakt auf der Grundlage der nationalsozialistischen Prinzipien vor. Auch wenn dieses Wirtschaftsabkommen auf lange Sicht nicht verlässlich sein mag, wird es uns in diesen Jahren der Unruhen gute Dienste leisten."
 GRE_agrarian_society:0 "Agrargesellschaft"
 GRE_agrarian_society_desc:0 "Griechenland ist traditionell auf Landwirtschaft und Leichtindustrie angewiesen, wobei Handelsprodukte wie Tabak Griechenlands wichtigstes Exportgut sind. Unsere Abhängigkeit von traditionelleren Produktionsformen hat uns bei Bauprojekten von der Schwerindustrie größerer Mächte abhängig gemacht. Es braut sich ein Konflikt zusammen, und wir müssen schnell Innovationen entwickeln."
 GRE_foreign_monopolies:0 "Ausländische Monopole"
 GRE_foreign_monopolies_desc:0 "Unsere Abhängigkeit von der Schwerindustrie ausländischer Mächte hat dazu geführt, dass viele unserer Entwicklungssektoren fest in der Hand mächtiger Unternehmen sind, die nur ausländischen Regierungen Rechenschaft ablegen müssen. Wir können unseren Modernisierungsprozess erst dann vollständig vorantreiben, wenn wir entweder ein Abkommen mit diesen Monopolen schließen oder sie dauerhaft aus unserem Land vertreiben."
