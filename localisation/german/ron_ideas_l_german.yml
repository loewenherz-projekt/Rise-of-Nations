RAJ_agrarian_society_2_desc:0 "Die lokalen Behörden sind der Ansicht, dass ihre bäuerliche Lebensweise einen großen Teil der indischen Bevölkerung schlichtweg untauglich für den Militärdienst oder Krieg gemacht hat. Sie behaupten, wir sollten nur aus den sogenannten „Kriegerstämmen“ rekrutieren. Dieser Glaube ist so weit verbreitet und tief verwurzelt, dass es mindestens eine Generation dauern wird, ihn zu überwinden. Auf absehbare Zeit müssen wir akzeptieren, dass sie jeden Befehl zur Einberufung von Bauern einfach ignorieren werden."

jim_crow:0 "Jim Crow"
jim_crow_desc:0 "Jim Crow ist eine Reihe von Gesetzen, die in einigen US-Bundesstaaten seit den 1870er Jahren die Rassentrennung in allen öffentlichen Einrichtungen vorschrieben. Das Rechtsprinzip der „getrennten, aber gleichberechtigten“ Rassentrennung wurde auf öffentliche Schulen, öffentliche Plätze und den öffentlichen Nahverkehr ausgeweitet und führte zur Trennung von Weißen und Schwarzen in Toiletten, Restaurants und an Trinkbrunnen. Diese Gesetze beeinflussen nicht nur unser Image und das Leben von Millionen Amerikanern, sondern auch die Zahl der Amerikaner, die sich unseren Armeen anschließen können. Die Abschaffung dieser Gesetze, insbesondere in den Südstaaten, würde jedoch einen großen Kampf bedeuten."
jim_crow_pelley:0 "Jim Crow"
jim_crow_pelley_desc:0 "Jim Crow ist eine Reihe von Gesetzen, die in einigen US-Bundesstaaten seit den 1870er Jahren die Rassentrennung in allen öffentlichen Einrichtungen vorschrieben. Das Rechtsprinzip der „getrennten, aber gleichberechtigten“ Rassentrennung wurde auf öffentliche Schulen, öffentliche Plätze und den öffentlichen Nahverkehr ausgeweitet, sowie auf die Trennung von Weißen und Schwarzen in Toiletten, Restaurants und Trinkbrunnen. So wie es sein sollte."
