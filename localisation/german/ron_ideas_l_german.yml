mantetsu_profits:0 "Mantetsu-Gewinne"
mantetsu_profits_desc:0 "Mantetsu ist der Name der Südmandschurei-Eisenbahn, die japanischen Unternehmen gehört. Sie wurde 1906 nach dem Russisch-Japanischen Krieg gegründet und hat sich für unser Land als äußerst profitabel erwiesen, da sie in nahezu alle Bereiche der mandschurischen Wirtschaft eingebunden war, von der Stromerzeugung bis zur Agrarforschung.\n§RDer Verlust der Kontrolle über Liaotung wird unsere Gewinne schmälern.§!"
mantetsu_profits_2:0 "Mantetsu-Gewinne"
mantetsu_profits_2_desc:0 "Mantetsu ist der Name der Südmandschurei-Eisenbahn, die japanischen Unternehmen gehört. Sie wurde 1906 nach dem Russisch-Japanischen Krieg gegründet und hat sich für unser Land als äußerst profitabel erwiesen, da sie in nahezu alle Bereiche der mandschurischen Wirtschaft eingebunden war, von der Stromerzeugung bis zur Agrarforschung.\n§RIm Falle des Austritts des Eigentümers von Liaotung aus unserer Fraktion oder unserer Aufgabe der Unabhängigkeit verlieren wir unsere Gewinne.§!"
machurian_crops:0 "Mandschurische Feldfrüchte"
machurian_crops_desc:0 "Seit unserer Eroberung der Mandschurei im Japanisch-Chinesischen Krieg wurden die dortigen Ernten zur Ernährung unserer Bevölkerung genutzt, was die Lebensqualität auf der Insel verbesserte. Ein unerwarteter Verlust der Kontrolle über die Ernten könnte jedoch katastrophale Folgen haben.\n§REin Krieg mit Mandschukuo oder dessen Ende wird höchstwahrscheinlich eine Hungersnot auslösen!§!"
