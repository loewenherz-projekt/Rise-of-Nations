 GRE_metaxism:0 "Metaxismus"
 GRE_metaxism_desc:0 "Der Metaxismus fördert die Neutralität in der Außenpolitik, damit die korporatistische und nationalistische Innenpolitik besser gepflegt und weiterentwickelt werden kann."
 GRE_metaxism_2:0 "Metaxismus"
 GRE_metaxism_2_desc:1 "Der Metaxismus fördert die Neutralität in der Außenpolitik, damit die korporatistische und nationalistische Innenpolitik besser gepflegt und weiterentwickelt werden kann."
 GRE_metaxism_3:0 "Metaxismus"
 GRE_metaxism_3_desc:1 "Der Metaxismus fördert die Neutralität in der Außenpolitik, damit die korporatistische und nationalistische Innenpolitik besser gepflegt und weiterentwickelt werden kann."
 GRE_metaxism_4:0 "Metaxismus"
 GRE_metaxism_4_desc:1 "Der Metaxismus fördert die Neutralität in der Außenpolitik, damit die korporatistische und nationalistische Innenpolitik besser gepflegt und weiterentwickelt werden kann."
 GRE_metaxism_5:0 "Metaxismus"
 GRE_metaxism_5_desc:1 "Der Metaxismus fördert die Neutralität in der Außenpolitik, damit die korporatistische und nationalistische Innenpolitik besser gepflegt und weiterentwickelt werden kann."
 GRE_metaxism_6:0 "Metaxismus"
 GRE_metaxism_6_desc:1 "Der Metaxismus fördert die Neutralität in der Außenpolitik, damit die korporatistische und nationalistische Innenpolitik besser gepflegt und weiterentwickelt werden kann."
 GRE_metaxism_7:0 "Metaxismus"
 GRE_metaxism_7_desc:0 "Metaxismus ist die Ideologie, auf der die Dritte Hellenische Zivilisation aufgebaut wird. Der Metaxismus verankert Korporatismus, Nationalismus und Autoritarismus als Grundsätze, aus denen die gesamte [ROOT.GetAdjective] Nation wachsen und gedeihen wird."
 GRE_martyrs_of_the_anatolian_catastrophe:0 "Märtyrer der anatolischen Katastrophe"
 GRE_martyrs_of_the_anatolian_catastrophe_desc:0 "Wir stehen nicht nur hinter denen, die 1922 im Kampf gegen die Türken ihr Leben verloren, sondern auch hinter denen, die aus ihren Häusern vertrieben wurden und hier in Elend leben mussten. Es war ein Versagen, das nur auf eine Weise gerächt werden kann: durch die Eroberung Konstantinopels. Ein großer Staatsmann sagte einst: „Konstantinopel ist die große Hauptstadt, die Stadt, der Traum und die Hoffnung aller Griechen.“ Wir werden als die großen Führer in Erinnerung bleiben, die den ewigen Traum des griechischen Volkes endlich erfüllten und uns damit für die Ereignisse von 1922 rehabilitierten."
 GRE_farmer_culture:0 "Bauernorientierte Kultur"
 GRE_farmer_culture_desc:0 "Wir müssen uns unserer bäuerlichen Wurzeln nicht schämen. Wir können in die Moderne gehen, ohne das Handwerk zu vergessen, das uns seit Jahrhunderten prägt. Wir verstehen den griechischen Arbeiter und haben keine Angst mehr, sein Handwerk zu verehren, unabhängig von seinem Nutzen für den Staat."
 GRE_industrializing_society:0 "Industrialisierung der Gesellschaft"
 GRE_industrializing_society_desc:0 "Wir leben im Zeitalter der Kriegsmaschinen, und es ist nicht länger hinnehmbar, dass die Mehrheit der griechischen Arbeiter ihr Leben lang auf Feldern nutzloser Luxusprodukte schuftet. Wir haben einen Wandel eingeleitet, der Griechenland und das griechische Volk grundlegend verändern wird. Leider können wir nicht erwarten, dass das griechische Volk dies in den nächsten Jahrzehnten vollständig begreift."
 GRE_industrializing_society_communist:0 "Industrialisierung der Gesellschaft"
 GRE_industrializing_society_communist_desc:0 "Wir leben im Zeitalter der Kriegsmaschinen, und es ist nicht länger hinnehmbar, dass die Mehrheit der griechischen Arbeiter ihr Leben lang auf Feldern nutzloser Luxusprodukte schuftet. Wir haben einen Wandel eingeleitet, der Griechenland und das griechische Volk grundlegend verändern wird. Leider können wir nicht erwarten, dass das griechische Volk dies in den nächsten Jahrzehnten vollständig begreift."
 GRE_command_economy:0 "Planwirtschaft"
 GRE_command_economy_desc:0 "Wir leben im Zeitalter der Kriegsmaschinen, und es ist nicht länger hinnehmbar, dass die Mehrheit der griechischen Arbeiter ihr Leben lang auf der Produktion nutzloser Luxusgüter schuftet. Wir haben einen Wandel eingeleitet, der Griechenland und das griechische Volk grundlegend umgestalten wird. Durch eine staatlich gelenkte Wirtschaft werden wir das griechische Volk in die richtige Richtung führen."
 GRE_agricultural_communes_idea:0 "Kollektivierte Landwirtschaft"
 GRE_agricultural_communes_idea_desc:0 "Griechenland ist traditionell auf Landwirtschaft und Leichtindustrie angewiesen, wobei Handelsprodukte wie Tabak Griechenlands wichtigstes Exportgut sind. Unsere Abhängigkeit von traditionelleren Produktionsformen machte uns bei Bauprojekten früher von der Schwerindustrie größerer Mächte abhängig. Durch die Kollektivierung aller landwirtschaftlichen Betriebe können wir uns jedoch besser auf zukünftige und anspruchsvollere Projekte vorbereiten."
 GRE_farmer_managed_communes:0 "Von Landwirten verwaltete landwirtschaftliche Kommunen"
 GRE_farmer_managed_communes_desc:0 "Wir müssen uns unserer bäuerlichen Wurzeln nicht schämen. Wir können in die Moderne gehen, ohne das Handwerk zu vergessen, das uns seit Jahrhunderten prägt. Wir verstehen den griechischen Arbeiter und haben keine Angst mehr, sein Handwerk zu ehren oder ihm mehr Kontrolle über seinen Lebensunterhalt zu gewähren."
 GRE_rural_exodus:0 "Landflucht"
 GRE_rural_exodus_Desc:0 "Mit unserem Vorstoß zur Industrialisierung verlassen die Menschen ihre Häuser in den ländlichen Regionen des Landes und ziehen in die größeren Städte."
 GRE_sophistry_and_science_idea:0 "Sophisterei und Wissenschaft"
 GRE_sophistry_and_science_idea_desc:0 "Durch die Förderung einer gegenseitigen Abhängigkeit zwischen Politikern und Wissenschaftlern kommen wir der Moderne einen Schritt näher."
 GRE_megali_idea_triumphant:0 "Die Megali-Idee triumphiert"
 GRE_megali_idea_triumphant_desc:0 "Es ist vollbracht: Wir haben gewonnen! Das Andenken an Eleftherios Venizelos wurde gerächt und [ROOT.GetNameDef] hat endlich sein Schicksal erfüllt."
 GRE_eon:0 "Die Nationale Jugendorganisation"
 GRE_eon_desc:1 "Die Art und Weise, wie die Deutschen und Italiener ihre Jugend organisiert haben, ist bewundernswert. Wir können ihr Modell übernehmen, um sicherzustellen, dass unsere Jugend sich nicht asozial verhält oder unseren großen Führer [ROOT.GetLeader] missachtet."
 GRE_eon_fascist:0 "Die Nationale Jugendorganisation"
 GRE_eon_fascist_desc:1 "Die Art und Weise, wie die Deutschen und Italiener ihre Jugend organisiert haben, ist bewundernswert. Wir können ihr Modell übernehmen, um sicherzustellen, dass unsere Jugend sich nicht asozial verhält oder unseren großen Führer [ROOT.GetLeader] missachtet."
 GRE_security_batallions:0 "Sicherheitsbataillone"
 GRE_security_batallions_desc:1 "Um den Frieden in den besetzten Gebieten und in unserem eigenen Land zu wahren, waren wir gezwungen, Sicherheitsbataillone aus den leidenschaftlichsten Faschisten unseres Landes zu bilden."
 GRE_eee_in_government:1 "Koalition mit der EEE"
 GRE_eee_in_government_desc:0 "Die Notwendigkeit hat uns gezwungen, uns der faschistischen Partei Ethniki Enosis Ellados anzuschließen. Wir können nur hoffen, dass uns diese Entscheidung, mit den Faschisten zu kooperieren, in Zukunft nicht zum Verhängnis wird."
 GRE_booming_tourism:0 "Boomende Tourismusbranche"
 GRE_booming_tourism_desc:0 "Es kommen mehr Menschen aus dem Ausland nach [ROOT.GetNameDef] als jemals zuvor in der aufgezeichneten Geschichte!"
 GRE_four_year_plan_spirit:0 "Der Vierjahresplan"
 GRE_improving_our_defensive_lines:1 "[Root.GetDefensiveLineName]"
 GRE_DEFENSIVE_FORT_SPIRIT_STANDARD:0 "Modernisierung der Leonidas-Linie"
 GRE_DEFENSIVE_FORT_SPIRIT_METAXAS:0 "Modernisierung der Metaxas-Linie"
 GRE_improving_our_defensive_lines_desc:0 "Der beste Angriff ist eine gute Verteidigung, und wir beabsichtigen, eine absolut unschlagbare Verteidigung zu haben."
 GRE_protectors_of_the_mediterranean_spirit:1 "[Root.GetProtectorsMediterraneanSpiritName]"
 GRE_PROTECTORS_MEDITERRANEAN_SPIRIT_NAME_STANDARD:0 "Verteidiger des Mittelmeers"
 GRE_PROTECTORS_MEDITERRANEAN_SPIRIT_NAME_MONARCHIST:0 "Champions des Mittelmeers"
 GRE_protectors_of_the_mediterranean_spirit_desc:0 "Das Mittelmeer ist schon viel länger unsere Heimat als die Heimat anderer. Wir tragen Verantwortung gegenüber dieser Region und den Menschen dort – und wir haben nicht die Absicht, diese heilige Pflicht aufzugeben."
 GRE_ancient_talents:0 "Uralte Talente"
 GRE_ancient_talents_desc:0 "Wir hatten schon immer eine Vorliebe für die Seefahrt, schon seit der Bronzezeit. Indem wir eine starke maritime Tradition pflegen, zollen wir einer altehrwürdigen Tradition Respekt, die uns im Blut liegt."
 GRE_hellenic_army:0 "Die griechische Armee"
 GRE_hellenic_army_desc:0 "Unsere Streitkräfte wirken auf einen Beobachter vielleicht nicht besonders beeindruckend, doch unser Volk besitzt einen echten Kampfgeist: eine Flamme in seinem Inneren, die sich nicht auslöschen lässt. Eine solche Eigenschaft ist selten, und wir dürfen keine Angst haben, sie auszunutzen, um unseren Feinden auf Augenhöhe gegenüberzutreten."
 GRE_hellenic_army_2:0 "Die griechische Armee"
 GRE_hellenic_army_2_desc:1 "Unsere Armee wird wahrscheinlich nie die größte auf dem Balkan sein, aber sie wird sicherlich die schlagkräftigste sein."
 GRE_hellenic_army_3:0 "Die griechische Armee"
 GRE_hellenic_army_3_desc:1 "Unsere Armee wird wahrscheinlich nie die größte auf dem Balkan sein, aber sie wird sicherlich die schlagkräftigste sein."
 GRE_byzantine_army:0 "Die byzantinische Armee"
 GRE_byzantine_army_desc:0 "Vor nicht allzu langer Zeit waren wir besessen von einer Armee, die unsere Grenzen verteidigen konnte. Heute hingegen rüsten und trainieren wir Soldaten, die bereit sind, um die halbe Welt zu marschieren, um unser Imperium zurückzuerobern. Unsere Armee ist einzigartig auf der Welt, und mit ihr werden wir endlich zurückerobern, was uns genommen wurde."
 GRE_hellenic_air_force_academy:0 "Die Akademie der griechischen Luftwaffe"
 GRE_hellenic_air_force_academy_desc:1 "Unsere Piloten sind willig, fähig und kompetent – sie befehligen eine Luftwaffe, die unserer Nation würdig ist."
 GRE_venerate_the_ancient_hellenes_spirit:0 "Verehren Sie die alten Hellenen"
 GRE_venerate_the_ancient_hellenes_spirit_desc:1 "Sind wir nicht die Nachkommen der ehrwürdigen Griechen der Antike? Sind wir nicht mit diesen Meistern der Polemik, der Philosophie und des Krieges verwandt? Wir werden unserem Volk wieder starken Stolz einflößen, damit wir wieder den Platz als Leitstern Europas einnehmen können."
 GRE_venerate_the_ancient_hellenes_2:0 "Verehren Sie die alten Hellenen"
 GRE_venerate_the_ancient_hellenes_2_desc:0 "Wir werden vom Einfallsreichtum der thebanischen Krieger lernen, die mit Macht und Scharfsinn die spartanische Hegemonie stürzten."
 GRE_venerate_the_ancient_hellenes_3:0 "Verehren Sie die alten Hellenen"
 GRE_venerate_the_ancient_hellenes_3_desc:0 "Wir werden von den Philosophen Athens lernen, die das Konzept der Demokratie, wie wir es heute kennen, entwickelten."
 GRE_venerate_the_ancient_hellenes_4:0 "Verehren Sie die alten Hellenen"
 GRE_venerate_the_ancient_hellenes_4_desc:0 "Wir können vom Beispiel der Argeaden lernen, die vom bescheidenen Mazedonien aus die Hälfte der damals bekannten Welt eroberten."
 GRE_venerate_the_ancient_hellenes_5:0 "Verehren Sie die alten Hellenen"
 GRE_venerate_the_ancient_hellenes_5_desc:0 "Wir werden vom Einfallsreichtum der thebanischen Krieger lernen, die die spartanische Hegemonie stürzten, und von den Philosophen Athens, die das Konzept der Demokratie entwickelten, wie wir es heute kennen."
 GRE_venerate_the_ancient_hellenes_6:0 "Verehren Sie die alten Hellenen"
 GRE_venerate_the_ancient_hellenes_6_desc:0 "Wir werden vom Einfallsreichtum der thebanischen Krieger lernen, die die spartanische Hegemonie stürzten, und vom Beispiel der Argeaden, die vom bescheidenen Mazedonien aus die Hälfte der bekannten Welt eroberten."
 GRE_venerate_the_ancient_hellenes_7:0 "Verehren Sie die alten Hellenen"
 GRE_venerate_the_ancient_hellenes_7_desc:0 "Wir werden von den Philosophen Athens lernen, die das Konzept der Demokratie entwickelten, wie wir es heute kennen, und vom Beispiel der Argeaden, die vom bescheidenen Mazedonien aus die Hälfte der damals bekannten Welt eroberten."
 GRE_venerate_the_ancient_hellenes_8:0 "Verehren Sie die alten Hellenen"
 GRE_venerate_the_ancient_hellenes_8_desc:0 "Wir besitzen noch immer alle Eigenschaften, die unsere Vorfahren so großartig gemacht haben, und mit nur einem kleinen Anstoß können wir diese Eigenschaften in unserem Volk wieder zum Vorschein bringen."
 GRE_reviving_the_double_headed_eagle_spirit:0 "Den Geist des Doppeladlers wiederbeleben"
 GRE_reviving_the_double_headed_eagle_spirit_desc:1 "Die Venizelisten waren Feiglinge, die Griechenland nicht zu seinem wahren, verlorenen Ruhm zurückkehren ließen – dem Ruhm Byzanzes! Warum sollten wir uns an den türkischen Küsten aufhalten, wenn wir alle verlorenen Gebiete des Reiches zurückgewinnen können? Ein neues Zeitalter des Ruhms für Griechenland hat begonnen!"
 GRE_reviving_the_double_headed_eagle_2:0 "Den Geist des Doppeladlers wiederbeleben"
 GRE_reviving_the_double_headed_eagle_2_desc:1 "Die Venizelisten waren Feiglinge, die Griechenland seinen wahren, verlorenen Ruhm – den Ruhm Byzanzes – nicht zurückgeben wollten! Warum sollten wir uns an den türkischen Küsten aufhalten, wenn wir alle verlorenen Gebiete des Reiches zurückgewinnen können? Ein neues glorreiches Zeitalter für Griechenland hat begonnen!"
 GRE_socialist_economy_spirit:0 "Griechischer Sozialismus"
 GRE_socialist_economy_spirit_desc:0 "Wir haben eine Wirtschaft eingeführt, die den Menschen vor den Profit stellt. Unser klarer Feind sind ausbeuterische Kapitalisten aus dem Ausland und opportunistisches Ungeziefer im Inland, das die Arbeiter um ihren gerechten Lohn betrügt."
 GRE_socialist_economy_2:0 "Griechischer Sozialismus"
 GRE_socialist_economy_2_desc:1 "Das griechische Volk hat unter der autokratischen Herrschaft des falschen Königs und der kriegstreiberischen Venizelisten zu lange geblutet. Es ist an der Zeit, dass das Volk unter einer Regierung, die es an die erste Stelle setzt, endlich Wohlstand erlangt!"
 GRE_socialist_economy_3:0 "Griechischer Stalinismus"
 GRE_socialist_economy_3_desc:0 "Die Partei steht über allem; wer der Partei nicht treu ist, ist ein subversiver Verräter und eine Gefahr für unsere gesamte Nation."
 GRE_socialist_economy_4:0 "Griechischer Kommunismus"
 GRE_socialist_economy_4_desc:0 "Der Arbeitnehmer steht an erster Stelle. Wenn wir als von Arbeitnehmern eingesetzte und aus Arbeitnehmern bestehende Regierung nicht die Interessen der Arbeitnehmer vertreten können, wer könnte es dann?"
 GRE_cooperative_trade_unions:0 "Genossenschaftsgewerkschaften"
 GRE_red_militias_spirit:0 "Rote Milizen"
 GRE_red_militias_spirit_desc:1 "Viele würden versuchen, unsere Bemühungen zur Modernisierung der griechischen Gesellschaft zu vereiteln, doch angesichts der Organisation von Milizen, die sich der Bewahrung der Revolution verschrieben haben, wird es für sie umso schwieriger sein, uns aufzuhalten."
 GRE_red_militias_2:0 "Rote Armee"
 GRE_red_militias_2_desc:0 "Ein wahrer kommunistischer Staat erfordert eine Volksarmee, die den Willen der Arbeiter ungestraft durchsetzen kann."
 GRE_red_militias_3:0 "Rote Vollstrecker"
 GRE_red_militias_3_desc:0 "Subversive Agenten, die gegen die Partei konspirieren, gibt es überall, aber Sie müssen nur eine kleine Gruppe talentierter Leute ausbilden, um sie zu finden und auszumerzen …"
