nationalist_influence:0 "Nationalistischer Einfluss"
nationalist_influence_desc:0 "Die Regierung von Nanjing hat einen starken Einfluss auf unsere Wirtschaft und Regierung und macht uns fast zu einer autonomen Region ihres Regimes. Wir könnten versuchen, ihren Einfluss in unserem Land zu beenden, aber das würde sie sicherlich verärgern."
the_democratic_bastion:0 "Die demokratische Festung"
the_democratic_bastion_desc:0 "Während ein antikommunistischer Diktator Nanjing regiert und sich ein verrückter Revolutionär in Yan&#39;an versteckt, ist Yunnan, obwohl von einem Kriegsherrn regiert, eine der stabilsten Regionen Chinas und wird von seinen Bürgern aufgrund seiner wachsenden Wirtschaft sowie politischer, sozialer und bildungspolitischer Reformen als „demokratische Festung“ angesehen. Es bleibt jedoch noch viel zu tun, um Yunnan zu einer Modellprovinz zu machen. §RLong Yun nicht als unseren Führer zu haben, wird unser Volk verärgern!§!"
the_only_coin:0 "Die einzige Münze"
the_only_coin_desc:0 "Für die Menschen in Yunnan und Sichuan gibt es nur eine gültige Währung: Opium. Die meisten Menschen erkennen Währung nicht als Zahlungsmittel an oder nutzen sie nicht als Zahlungsmittel. Dies schränkt unsere Möglichkeiten, Geschäfte mit anderen Ländern abzuschließen, erheblich ein. Wir müssen dieses Problem so schnell wie möglich angehen, wenn wir eine stabile Wirtschaft haben wollen."
the_democratic_bastion_neutrality:0 "Die demokratische Festung"
the_democratic_bastion_neutrality_desc:0 "Während ein antikommunistischer Diktator Nanjing regiert und sich ein verrückter Revolutionär in Yan&#39;an versteckt, ist Yunnan, obwohl von einem Kriegsherrn regiert, eine der stabilsten Regionen Chinas und wird von seinen Bürgern aufgrund seiner wachsenden Wirtschaft sowie politischer, sozialer und bildungspolitischer Reformen als „demokratische Festung“ angesehen. Es bleibt jedoch noch viel zu tun, um Yunnan zu einer Modellprovinz zu machen.\n§RLong Yun nicht als unseren Anführer zu haben, wird unser Volk verärgern!§!"
