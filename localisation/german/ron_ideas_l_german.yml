 RON_Arabic_desc:0 "Arabisch ist eine semitische Sprache, die erstmals im 1. bis 4. Jahrhundert n. Chr. entstand."
 RON_Bengali_desc:0 "Bengalisch, auch bekannt unter seinem Endonym Bangla, ist eine indoarische Sprache, die hauptsächlich von den Bengalen in Südasien gesprochen wird, insbesondere im östlichen Teil des indischen Subkontinents, der derzeit zwischen Bangladesch und den indischen Bundesstaaten Westbengalen, Tripura und Assams Barak-Tal (Unter-Assam) aufgeteilt ist. Es ist die offizielle und am weitesten verbreitete Sprache Bangladeschs und nach Hindi die am zweithäufigsten gesprochene der 22 geplanten Sprachen Indiens. Mit etwa 228 Millionen Muttersprachlern und weiteren 37 Millionen Zweitsprachlern ist Bengalisch die fünfthäufigste Muttersprache und gemessen an der Gesamtzahl der Sprecher die siebthäufigste Sprache der Welt."
 RON_Chinese_desc:0 "Chinesisch ist eine Familie ostasiatischer analytischer Sprachen, die den sinitischen Zweig der sinotibetischen Sprachen bilden. Chinesische Sprachen werden von der ethnischen Han-Chinesen-Mehrheit und vielen ethnischen Minderheiten in China gesprochen. Etwa 1,2 Milliarden Menschen (etwa 16 % der Weltbevölkerung) sprechen Chinesisch in irgendeiner Form als Muttersprache."
 RON_English_desc:0 "Englisch ist eine westgermanische Sprache, die erstmals im frühmittelalterlichen England gesprochen wurde und sich schließlich zur globalen Lingua Franca entwickelte. Sie ist nach den Angeln benannt, einem germanischen Stamm, der in die Region Großbritanniens einwanderte, die später ihren Namen England erhielt. Beide Namen leiten sich von Anglia ab, einer Halbinsel an der Ostsee. Englisch ist am engsten mit dem Friesischen und dem Niedersächsischen verwandt, während sein Wortschatz stark von anderen germanischen Sprachen beeinflusst wurde, insbesondere vom Altnordischen (einer nordgermanischen Sprache), sowie vom Lateinischen und Französischen."
 RON_French_desc:0 "Französisch ist eine romanische Sprache der indoeuropäischen Sprachfamilie. Wie alle romanischen Sprachen stammt es vom Vulgärlatein des Römischen Reiches ab. Französisch entwickelte sich aus dem Galloromanischen, dem in Gallien und insbesondere in Nordgallien gesprochenen Latein. Seine nächsten Verwandten sind die anderen langues d&#39;oïl – Sprachen, die historisch in Nordfrankreich und Südbelgien gesprochen wurden und die größtenteils durch das Französische (Francien) verdrängt wurden. Französisch wurde auch von den einheimischen keltischen Sprachen Nordgalliens wie der Gallia Belgica und von der (germanischen) fränkischen Sprache der nachrömischen fränkischen Invasoren beeinflusst. Heute gibt es aufgrund der Überseeexpansion Frankreichs zahlreiche auf dem Französischen basierende Kreolsprachen, vor allem das Haitianische Kreolisch. Eine französischsprachige Person oder Nation kann sowohl im Englischen als auch im Französischen als frankophon bezeichnet werden."
 RON_German_desc:0 "Deutsch ist eine westgermanische Sprache, die hauptsächlich in Mitteleuropa gesprochen wird. Es ist die am weitesten verbreitete und offizielle bzw. kooffizielle Sprache in Deutschland, Österreich, der Schweiz, Südtirol in Italien, der Deutschsprachigen Gemeinschaft Belgiens und Liechtenstein. Es ist eine der drei offiziellen Sprachen Luxemburgs und kooffizielle Sprache in der Woiwodschaft Oppeln in Polen. Die Sprachen, die dem Deutschen am ähnlichsten sind, sind die anderen Mitglieder des westgermanischen Sprachzweigs, darunter Afrikaans, Niederländisch, Englisch, die Friesischen Sprachen, Niederdeutsch/Niedersächsisch, Luxemburgisch und Jiddisch. Es gibt auch starke Ähnlichkeiten im Wortschatz mit Dänisch, Norwegisch und Schwedisch, obwohl diese zur nordgermanischen Gruppe gehören. Deutsch ist nach Englisch die am zweithäufigsten gesprochene germanische Sprache."
 RON_Hindu_desc:0 "Hindi ist eine indoarische Sprache, die in Indien gesprochen wird. Modernes Hindi wird oft als standardisierte und in Sanskrit übersetzte Form der Hindustani-Sprache beschrieben, die wiederum hauptsächlich auf dem Khariboli-Dialekt Delhis und benachbarter Gebiete Nordindiens basiert. Hindi, geschrieben in der Devanagari-Schrift, ist neben Englisch eine der beiden Amtssprachen der indischen Regierung. Es ist eine der 22 Plansprachen der Republik Indien."
 RON_Italian_desc:0 "Italienisch ist eine romanische Sprache aus der indoeuropäischen Sprachfamilie. Sie stammt vom Vulgärlatein des Römischen Reiches ab und ist neben Sardisch die romanische Sprache, die diesem am nächsten kommt. Italienisch ist Amtssprache in Italien, der Schweiz, San Marino und der Vatikanstadt."
 RON_Japanese_desc:0 "Japanisch ist eine ostasiatische Sprache, die von etwa 128 Millionen Menschen gesprochen wird, hauptsächlich in Japan, wo sie Nationalsprache ist. Sie gehört zur japonischen (oder japanisch-ryukyuanischen) Sprachfamilie, und ihre Verwandtschaft zu anderen Sprachen, wie beispielsweise Koreanisch, ist umstritten. Japanische Sprachen wurden mit anderen Sprachfamilien wie Ainu, Austroasiatisch und dem mittlerweile diskreditierten Altaisch zusammengefasst, doch keine dieser Gruppen hat sich durchgesetzt."
 RON_Portugese_desc:0 "Portugiesisch ist eine westromanische Sprache mit Ursprung auf der Iberischen Halbinsel. Es ist die einzige Amtssprache in Portugal, Brasilien, Kap Verde, Guinea-Bissau, Mosambik, Angola sowie São Tomé und Príncipe. In Osttimor, Äquatorialguinea und Macau ist es ebenfalls Amtssprache. Portugiesischsprachige Menschen oder Nationen werden als „Lusophone“ bezeichnet."
 RON_Punjabi_desc:0 "Punjabi ist eine indoarische Sprache mit mehr als 125 Millionen Muttersprachlern auf dem indischen Subkontinent und weltweit. Es ist die Muttersprache der Punjabi, einer ethnolinguistischen Gruppe der Kulturregion Punjab, die Nordwestindien und Ostpakistan umfasst."
 RON_Russian_desc:0 "Russisch ist eine ostslawische Sprache und Amtssprache in Russland, Weißrussland, Kasachstan und Kirgisistan. Darüber hinaus ist sie in Osteuropa, den baltischen Staaten, dem Kaukasus und Zentralasien weit verbreitet. Russisch gehört zur Familie der indoeuropäischen Sprachen, ist eine der vier lebenden ostslawischen Sprachen und Teil des größeren baltoslawischen Zweigs. Russisch, Weißrussisch und Ukrainisch sind sich sehr gut verständlich."
 RON_Spanish_desc:0 "Spanisch oder Kastilisch ist eine romanische Sprache, die ihren Ursprung auf der Iberischen Halbinsel hat und heute von über 483 Millionen Menschen, hauptsächlich in Spanien und Amerika, gesprochen wird. Es ist eine Weltsprache und nach Mandarin-Chinesisch die am zweithäufigsten gesprochene Muttersprache der Welt und nach Englisch, Mandarin-Chinesisch und Hindi die am vierthäufigsten gesprochene Sprache der Welt."
 RON_Turkish_desc:0 "Türkisch ist die am weitesten verbreitete Turksprache mit etwa zehn bis fünfzehn Millionen Muttersprachlern in Südosteuropa (hauptsächlich in Ost- und Westthrakien) und sechzig bis fünfundsechzig Millionen Muttersprachlern in Westasien (hauptsächlich in Anatolien)."
 
