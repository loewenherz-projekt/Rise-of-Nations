dreams_of_independence:0 "Träume von Unabhängigkeit"
dreams_of_independence_desc:0 "Die Mongolei ist derzeit nicht mehr als ein sowjetischer Vasall. Die Armee ist zur Verteidigung der mongolischen Grenzen von der russischen abhängig, die Eisenbahnen werden ausschließlich von sowjetischen Unternehmen gebaut, und Stalin ermordet jeden Führer, der nicht seinen Überzeugungen folgt. Sollte sich jemals die Möglichkeit ergeben, sich von ihnen zu lösen, wird unser Volk bis zum Ende kämpfen."
