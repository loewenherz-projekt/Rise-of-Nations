 GER_mefo_bills_desc:1 "MEFO-Wechsel waren Schuldscheine, die von Hjalmar Schacht herausgegeben wurden, um der Regierung die Finanzierung der Wiederaufrüstung zu ermöglichen. Über die Metallurgische Forschungsgesellschaft konnte Schacht diese Wiederaufrüstung vor den Augen Frankreichs und Großbritanniens verbergen. Diese Wechsel mussten jeweils um sechs Monate verlängert werden, andernfalls mussten ihre Empfänger ihre Zahlungen bei Fälligkeit leisten."
 GER_mefo_bills_instant_desc:0 "\n§RGegen wir in den Krieg eintreten, werden wir nicht mehr von MEFO-Rechnungen abhängig sein und die Verpflichtung, diese zu bezahlen, wird sich bis zum Kriegsende verzögern.§!"
