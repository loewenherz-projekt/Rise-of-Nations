 TUR_sectarian_woes:0 "Sektierertum"
 TUR_sectarian_woes_desc:2 "Die internen Spaltungen von §W[TUR.GetNameDefCap] werden geografisch durch§! §YZustandsmodifikatoren§!§W dargestellt: die§! £faction_tur_kemalist §YKemalisten§! §Wfinden sich im Westen und im Norden, die religiösen§! £faction_tur_traditionalist §YTraditionalisten§! §Wfinden sich im zentralen Hinterland sowie im Süden, während die§! £faction_tur_kurdish §YKurdischen§! §Wim Südosten des Landes zu finden sind.§! \n\n§WInteraktionen mit den verschiedenen§! §YFraktionen§! §Wkönnen über die§! §YRegisterkarte „Entscheidungen“§!§W sowie über einige§! §YFokuseffekte§! §Zauberstab§! §YEreignisoptionen§!§W.§! \n\nDie Türkei ist von inneren Spaltungen geprägt, die sich entlang ideologischer, religiöser und ethnischer Grenzen ziehen. Die Kemalisten hoffen, die Türkei in einen säkularisierten Staat zu verwandeln, doch ein großer Teil der Bevölkerung lehnt das Konzept der Säkularisierung grundsätzlich ab. Im Osten haben die Kurden der türkischen Regierung große Schwierigkeiten bereitet und scheinen entschlossen, den Weg der Rebellion gegen die Assimilation zu gehen. Um die inneren Spaltungen unseres Landes zu überwinden, müssen wir diese Probleme entweder mit sanfter Hand oder mit eiserner Faust angehen."
 TUR_sectarian_woes_1:0 "Sektierertum"
 TUR_sectarian_woes_1_desc:2 "Die internen Spaltungen von §W[TUR.GetNameDefCap] werden geografisch durch§! §YZustandsmodifikatoren§!§W dargestellt: die§! £faction_tur_kemalist §YKemalisten§! §Wfinden sich im Westen und im Norden, die religiösen§! £faction_tur_traditionalist §YTraditionalisten§! §Wfinden sich im zentralen Hinterland sowie im Süden, während die§! £faction_tur_kurdish §YKurdischen§! §Wim Südosten des Landes zu finden sind.§! \n\n§WInteraktionen mit den verschiedenen§! §YFraktionen§! §Wkönnen über die§! §YRegisterkarte „Entscheidungen“§!§W sowie über einige§! §YFokuseffekte§! §Zauberstab§! §YEreignisoptionen§!§W.§! \n\nDie Türkei ist von inneren Spaltungen geprägt, die sich entlang ideologischer, religiöser und ethnischer Grenzen ziehen. Die Kemalisten hoffen, die Türkei in einen säkularisierten Staat zu verwandeln, doch ein großer Teil der Bevölkerung lehnt das Konzept des Säkularismus grundsätzlich ab. Um die inneren Spaltungen unseres Landes zu überwinden, müssen wir diese Probleme entweder mit sanfter Hand oder mit eiserner Faust angehen."
 TUR_sectarian_woes_2:0 "Sektierertum"
 TUR_sectarian_woes_desc_2:2 "Die internen Spaltungen von §W[TUR.GetNameDefCap] werden geografisch durch§! §YZustandsmodifikatoren§!§W dargestellt: die§! £faction_tur_kemalist §YKemalisten§! §Wfinden sich im Westen und im Norden, die religiösen§! £faction_tur_traditionalist §YTraditionalisten§! §Wfinden sich im zentralen Hinterland sowie im Süden, während die§! £faction_tur_kurdish §YKurdischen§! §Wim Südosten des Landes zu finden sind.§! \n\n§WInteraktionen mit den verschiedenen§! §YFraktionen§! §Wkönnen über die§! §YRegisterkarte „Entscheidungen“§!§W sowie über einige§! §YFokuseffekte§! §Zauberstab§! §YEreignisoptionen§!§W.§! \n\nDie Türkei ist von inneren Spaltungen geprägt, die sich entlang ideologischer, religiöser und ethnischer Grenzen ziehen. Im Osten haben die Kurden der türkischen Regierung große Schwierigkeiten bereitet und scheinen entschlossen, den Weg der Rebellion statt der Assimilation zu gehen. Um die inneren Spaltungen unseres Landes zu überwinden, müssen wir diese Probleme entweder mit sanfter Hand oder mit eiserner Faust angehen."
 TUR_rearmament_scheme:0 "Vorbereiteter Wiederaufrüstungsplan"
 TUR_rearmament_scheme_desc:0 "Ein umfassender Wiederaufrüstungsplan ist schon seit geraumer Zeit in Planung, doch es bestand kaum Bedarf, ihn umzusetzen. Doch nun steht die Welt am Rande eines weiteren Krieges, und die Türkei wird nicht unvorbereitet sein."
 TUR_infrastructure_privatised_idea:0 "Privatisierte Infrastruktur"
 TUR_infrastructure_privatised_idea_desc:0 "Indem wir privaten Interessengruppen eine gewisse Kontrolle über die Infrastruktur unseres Staates geben, können wir zwar mehr Ressourcen anderweitig einsetzen, der Aufbau zusätzlicher Infrastruktur wird jedoch vorerst zu einer irritierend phasenweisen Angelegenheit."
 TUR_financing_private_enterprise:0 "Finanzierung privater Unternehmen"
 TUR_financing_private_enterprise_desc:1 "Es ist die Aufgabe des Staates, die unternehmerischsten Menschen in unserem Land zu fördern und zu belohnen. Indem wir in diejenigen investieren, die unser Land voranbringen, investieren wir in die Zukunft unseres Landes."
 TUR_etatism:0 "Etatismus"
 TUR_etatism_desc:2 "Unsere gemischte Wirtschaft ist weltweit einzigartig: Sie vereint Elemente des britischen Liberalismus, des italienischen Korporatismus und der sowjetischen Zentralplanung. Sie ist die ultimative Synthese verschiedener Wirtschaftsmodelle und ein Kronjuwel des kemalistischen Systems. \n\n§RInnoviert man unser Wirtschaftsrecht, muss man mit Reibungen zwischen unseren unvereinbaren Wirtschaftsmodellen rechnen.§!"
 TUR_etatism_2:0 "Etatismus"
 TUR_etatism_2_desc:2 "Unsere gemischte Wirtschaft ist weltweit einzigartig: Sie vereint Elemente des britischen Liberalismus, des italienischen Korporatismus und der sowjetischen Zentralplanung. Sie ist die ultimative Synthese verschiedener Wirtschaftsmodelle und ein Kronjuwel des kemalistischen Systems. Wir dürfen sie jedoch nicht überfordern, indem wir gleichzeitig eine Kriegswirtschaft aufrechterhalten. \n\n§RInnoviert man unser Wirtschaftsrecht, muss man mit zusätzlichen Reibungen zwischen unseren unvereinbaren Wirtschaftsmodellen rechnen.§!"
 TUR_etatism_3:0 "Etatismus"
 TUR_etatism_3_desc:2 "Unsere gemischte Wirtschaft ist weltweit einzigartig: Sie vereint Elemente des britischen Liberalismus, des italienischen Korporatismus und der sowjetischen Zentralplanung. Sie ist die ultimative Synthese verschiedener Wirtschaftsmodelle und war ein Kronjuwel des kemalistischen Systems, doch wir haben sie durch den Versuch, gleichzeitig eine Kriegswirtschaft aufrechtzuerhalten, überstrapaziert. Wir sollten unsere Perspektiven überdenken und das staatliche Experiment beenden. \n\n§RInformieren wir unser Wirtschaftsrecht, müssen wir uns auf zusätzliche Reibungen zwischen unseren unvereinbaren Wirtschaftsmodellen gefasst machen.§!"
 TUR_etatism_4:0 "Etatismus"
 TUR_etatism_4_desc:2 "Unsere gemischte Wirtschaft war weltweit einzigartig: Sie basierte auf Elementen des britischen Liberalismus, des italienischen Korporatismus und der sowjetischen Zentralplanung. Wir waren rücksichtslos und gierig und riskieren die Zerstörung der Wirtschaft unseres Landes, indem wir versuchen, unser etatistisches Modell aufrechtzuerhalten und gleichzeitig eine Kriegswirtschaft zu betreiben. Wir riskieren alles für nichts: Wir müssen den Etatismus abschaffen, bevor es zu spät ist. \n\n§RInformieren wir unser Wirtschaftsgesetz erneut, ohne den Etatismus abzuschaffen, lösen wir eine Depression aus!§!"
 TUR_economic_collapse:0 "Wirtschaftskollaps"
 TUR_economic_collapse_desc:1 "Wir sind ruiniert: Der Etatismus hat uns zwar die Schmerzen der Großen Depression erspart, doch der wirtschaftlichen Katastrophe konnten wir offenbar nicht für immer entgehen. Wir haben unser Land, unser Volk und unsere Ideologie im Stich gelassen und das Erbe Atatürks für immer beschmutzt..."
 TUR_etatism_stabilisation:0 "Etatistische Stabilisierung"
 TUR_etatism_stabilisation_desc:1 "Das Schöne an einer gemischten Wirtschaft ist, dass wir die Kapazität und Macht haben, im Bedarfsfall Notfallmaßnahmen zu ergreifen, und genau das haben wir getan. Wir haben Zeit bis zum nächsten wirtschaftlichen Umbruch gewonnen, aber diese wird nicht ewig anhalten. Wir müssen unsere Zeit sorgfältig nutzen."
 kemalist_neutrality_idea:0 "Kemalistische Neutralität"
 kemalist_neutrality_idea_desc:1 "Frieden im Inland, Frieden in der Welt – Atatürk hat es verfügt, und wir haben es nun als Grundlage unserer Außenpolitik kodifiziert. Wir müssen den Frieden bewahren, und wenn wir keinen Frieden in der Welt haben können, müssen wir uns eben mit Frieden im Inland zufrieden geben."
 TUR_second_five_year_plan_inonu:0 "İnönüs Fünfjahresplan"
 TUR_second_five_year_plan_inonu_desc:1 "Basierend auf dem sowjetischen Industrialisierungsmodell hat es sich İsmet İnönü zur Priorität gemacht, den Anteil der Leichtindustrie in [ROOT.GetNameDef] zu erhöhen und die Infrastruktur im ganzen Land zu modernisieren."
 TUR_second_five_year_plan_cakmak:0 "Çakmaks Fünfjahresplan"
 TUR_second_five_year_plan_cakmak_desc:1 "Basierend auf dem deutschen Remilitarisierungsmodell hat Fevzi Çakmak es sich zur Priorität gemacht, den Anteil der Schwerindustrie in [ROOT.GetNameDef] zu erhöhen und die Infrastruktur im ganzen Land zu modernisieren."
 TUR_investment_financing_spirit:0 "Finanzierungsinvestition"
 TUR_investment_financing_spirit_desc:1 "Die Welt dreht sich um den Austausch von Waren zur Befriedigung von Bedürfnissen. Wir haben sicherlich Bedürfnisse, aber um Geld zu bekommen, müssen wir uns zunächst selbst helfen."
 TUR_sheltered_foreign_outcasts:0 "Geschützte ausländische Ausgestoßene"
 TUR_sheltered_foreign_outcasts_desc:0 "Es ist unsere moralische Verpflichtung, den verfolgten Völkern dieser Welt zu helfen, wenn es in unserer Macht steht, und bisher lag es mit Sicherheit in unserer Macht. Wir werden sie einbürgern, sie schützen und sie fördern, als wären sie gebürtige Söhne und Töchter von [TUR.GetNameDef]."
 TUR_debt_council:0 "Schuldenrat"
 TUR_debt_council_desc:1 "Als das Osmanische Reich endgültig Geschichte war, hinterließ es uns ein Abschiedsgeschenk: seine kolossale Verschuldung. Wir schulden den Westmächten viel Geld und Vermögen, doch am demütigendsten ist, dass unsere Schulden hier in unserem Land nicht einmal verwaltet werden. Der Schuldenrat tagt in seiner unendlichen Weisheit in Frankreich."
 TUR_tpda:0 "TPDA"
 TUR_tpda_desc:1 "Endlich haben wir den Imperialisten die Zügel entrissen und können unsere Schulden von unserer Hauptstadt aus selbst organisieren und verwalten. Den Schuldenrat gibt es nicht mehr, und die privilegierten Haie werden keine andere Wahl haben, als sich an uns zu wenden, wenn sie Rückerstattung oder Kapitulation fordern."
 TUR_tpda_absorbed:0 "Türkische Staatsschuldenverwaltung"
 TUR_tpda_absorbed_desc:1 "Mit nur einem Federstrich wurde die türkische Staatsschuldenverwaltung von einer privaten in eine staatliche Einrichtung umgewandelt. Wir verwalten unsere Schulden, wir kontrollieren unsere Schulden und wir können unsere Schulden reduzieren. Wir haben es in der Welt weit gebracht."
 TUR_debt_council_reined_in_flag:0 "Der Auslandsschuldenrat wurde in eine nationale Institution umgestaltet"
 TUR_varlik_vergisi_spirit:0 "Varlık Vergisi"
 TUR_varlik_vergisi_spirit_desc:1 "Bei dieser „Vermögenssteuer“ handelt es sich lediglich um eine kaum verhüllte Neueinführung der Dschizya-Steuer. Wir sollten vielleicht über ihre Abschaffung nachdenken, bevor wir auch nur die Illusion verlieren, eine säkulare Republik zu verwalten."
 TUR_inanc_vergisi_spirit:1 "İnanç Vergisi"
 TUR_inanc_vergisi_spirit_desc:1 "Die „Glaubenssteuer“ ist der ultimative Höhepunkt der kemalistischen säkularen Doktrin; sie ist ein aggressiver Vorstoß, den viele als großen Schritt in Richtung Staatsatheismus betrachten. Leider ist dies ein Traum, der nicht wahr werden kann – und wir werden in Zukunft über die Abschaffung der Steuer nachdenken müssen."
 TUR_political_landscape_shifting:0 "Politische Landschaft im Wandel"
 TUR_political_landscape_shifting_desc:1 "Lange Zeit war es das ultimative Ziel des Kemalismus, in [TUR.GetNameDef] eine liberale Mehrparteiendemokratie zu etablieren … doch die Zeiten ändern sich. Wir leben in spannenden Zeiten, in denen moderne Ideologien miteinander um die Vorherrschaft in der Weltordnung kämpfen, und es scheint, dass dieses ideologische Schlachtfeld nun auch hier Fuß gefasst hat."
 TUR_the_redshirts:0 "Die Rothemden"
 TUR_the_redshirts_desc:1 "Die Rothemden sind unsere eigene paramilitärische faschistische Miliz, die in unseren Städten patrouilliert und dafür sorgt, dass die Menschen die Prinzipien des Kemalismus strikt einhalten. Sie mögen manchmal etwas gewalttätig sein, aber ihre Herzen sind aus Eisen und ihre Köpfe sind voller revolutionärem Idealismus, aber zumindest ist ihre Sache gerecht!"
 TUR_turkish_workers_militia:0 "Türkische Arbeitermiliz"
 TUR_turkish_workers_militia_desc:1 "Die Menschen, die am besten in der Lage sind, die Rechte der Arbeiter zu schützen, sind die Arbeiter selbst. Natürlich verbessern ein paar Anweisungen unserer Regierung und das eine oder andere Memo aus Moskau ihre Wirksamkeit als Arbeitermiliz nur noch."
 TUR_turkish_interventionism:0 "Türkischer Interventionismus"
 TUR_turkish_interventionism_desc:1 "Frieden im Inland, Frieden in der Welt – Atatürk hat es verfügt, und wir haben es nun als Grundlage unserer Außenpolitik verankert. Wir können nicht länger tatenlos zusehen, wie die Welt in Aufruhr gerät, während wir untätig danebenstehen. Der einzige Weg, unseren Frieden im Inland zu sichern, ist der Kampf für den Frieden in der Welt."
 TUR_balkan_defense_council_spirit:0 "Balkan-Verteidigungsrat"
 TUR_balkan_defense_council_spirit_desc:0 "Delegationen aller Mitglieder der Balkan-Entente treffen sich regelmäßig, um Anekdoten über Ereignisse in der Welt und Neuigkeiten zur jeweiligen Verteidigungslage auszutauschen. Unser gemeinsamer Fundus an militärischem Wissen ist für uns alle ein großer Segen."
 TUR_three_year_plan_balkans:0 "Der gemeinsame Dreijahresplan"
 TUR_three_year_plan_balkans_desc:1 "Die Balkan-Entente hat eines der kühnsten Industrialisierungsprojekte der Geschichte in Angriff genommen, indem sie ein gemeinsam finanziertes multinationales, zentral geplantes Wirtschaftssystem förderte, um sicherzustellen, dass unsere Industriestandorte gemeinsam stark genug sind, um einem Angriff einer Großmacht standzuhalten."
 TUR_central_balkan_bank_wealthy_greece:0 "Die Central Balkan Bank von Athen"
 TUR_central_balkan_bank_wealthy_greece_desc:1 "Niemand hätte vorhersagen können, dass ausgerechnet [GRE.GetNameDef] das erste Land sein würde, dessen Finanzen in solch makellosem Zustand sind. Angesichts der [GRE.GetAdjective] hervorragenden Finanzverwaltung wurde einstimmig beschlossen, die Balkan-Zentralbank in Thessaloniki zu gründen."
 TUR_central_balkan_bank:0 "Die Balkan-Zentralbank"
 TUR_central_balkan_bank_desc:1 "Die Balkan-Zentralbank soll ein Forum für den freien Waren- und Rohstoffverkehr sowie für alle Handelspartner des Balkanpakts sein. Izmir soll mit der Zeit als Wirtschafts- und Handelszentrum zu einem Rivalen von Frankfurt, Shanghai und New York werden."
 TUR_joint_fortification_budget:0 "Gemeinsamer Befestigungshaushalt"
 TUR_joint_fortification_budget_desc:1 "Die Balkan-Entente ist wie ein Dominosteinstapel: Wenn einer von uns fällt, werden die anderen mit Sicherheit schnell folgen. Wir alle müssen Verantwortung für unsere Verteidigung übernehmen und unsere Grenzen gegen mögliche Übergriffe wappnen."
 TUR_emergency_fortification_directive:0 "Notfall-Befestigungsrichtlinie"
 TUR_emergency_fortification_directive_desc:1 "Schwere Zeiten erfordern schwere Maßnahmen, und wir waren gezwungen, schnell Ressourcen für den Bau von Befestigungen bereitzustellen. Unsere Existenz könnte auf dem Spiel stehen."
 TUR_united_balkan_security_forces:0 "Vereinigte Balkan-Sicherheitskräfte"
 TUR_united_balkan_security_forces_desc:1 "Gemeinsame Sicherheitsbataillone sind eine natürliche Weiterentwicklung des häufigen Austauschs von Schlachtplänen und Informationen zwischen unseren Oberkommandos. Indem wir den Druck, unsere Binnengrenzen zu überwachen, verringern, entlasten wir unsere nationalen Armeen und sind besser auf den Krieg vorbereitet."
 TUR_the_coordinated_armed_forces_of_the_balkan_pact:0 "Die koordinierten Streitkräfte der Balkan-Entente"
 TUR_the_coordinated_armed_forces_of_the_balkan_pact_desc:0 "Unsere Stärke erwächst aus unserer Einheit. Wir koordinieren uns als Einheit, wir kämpfen als Einheit, wir fallen als Einheit. Wenn sich der Staub gelegt hat und die Kanonen aufhören zu feuern, wird die Balkan-Entente noch bestehen."
 TUR_balkan_pact_innovative_transport_techniques:0 "Balkanweite innovative Transporttechniken"
 TUR_balkan_pact_innovative_transport_techniques_desc:1 "Um den Transport unserer Armeen über unsere zahlreichen Grenzen hinweg besser zu koordinieren und zu erleichtern, müssen wir als Staatengemeinschaft unsere Infrastruktur verbessern. Diese Initiative wird hoffentlich dazu beitragen, dieses Hindernis zu beseitigen."
 TUR_victory_at_all_costs:0 "Sieg um jeden Preis"
 TUR_victory_at_all_costs_desc:0 "Wir haben als Nation im Unabhängigkeitskrieg nicht mit allen Mitteln gekämpft, nur um einige Jahrzehnte später vernichtet zu werden. Nein, die Geschichte von [TUR.GetNameDef] endet hier nicht – wir dürfen nicht fallen, wir werden nicht fallen!"
 TUR_funkplan:0 "Funkplan"
 TUR_funkplan_desc:1 "Nach dem Vorbild von Hjalmar Schachts Schachtplan garantiert Walther Funks Funkplan Deutschland den Zugang zu [TUR.GetAdjective] Mineralerzen und erleichtert gleichzeitig den [TUR.GetAdjective] Zugang zum Markt für deutsche Handelsprodukte. Versteckte Klauseln im Funkplan garantieren uns außerdem die Mindestmenge an Materialien, die wir zum Ausbau unserer Schwerindustrie benötigen."
 TUR_german_advisors:0 "Deutsche Berater"
 TUR_german_advisors_desc:1 "Wir fungieren offiziell als Botschafter und Unternehmensberater und beherbergen nun eine beträchtliche Gruppe deutscher Offiziere, die bereit sind, uns bei der Modernisierung unserer Streitkräfte zu unterstützen und sie zu einer möglichst effektiven Kampftruppe zu machen."
 TUR_integrated_german_officers:0 "Integrierte deutsche Offiziere"
 TUR_integrated_german_officers_desc:1 "Da es nicht länger nötig ist, die Rolle der deutschen Militärbeamten in unserem Land zu verschleiern, haben wir sie mit der ausdrücklichen Zustimmung von [GER.GetLeader] offiziell in unsere Befehlskette integriert."
 TUR_the_antalya_naval_academy:0 "Die Marineakademie Antalya"
 TUR_the_antalya_naval_academy_desc:0 "In Zusammenarbeit mit den [ITA.GetAdjective]s haben wir eine Schule für angehende Admirale und Marineoffiziere gegründet, die ihresgleichen auf der Welt sucht."
 TUR_tuz_golu_training_facility:0 "Tuz Gölü Trainingsanlage"
 TUR_tuz_golu_training_facility_desc:1 "Das mediterrane Klima unseres Landes ist nicht für die Ausbildung unserer Soldaten geeignet, damit sie in trockenen Klimazonen angemessen operieren können. Wir haben uns entschieden, in der Nähe des Salzsees Tuz Gölü eine Ausbildungsstätte zu errichten, damit unsere Truppen besser auf den Kampf in trockenen Umgebungen vorbereitet sind."
 TUR_sub_zero_survival_training:0 "Überlebenstraining bei Minusgraden"
 TUR_sub_zero_survival_training_desc:1 "Es ist keine leichte Aufgabe, die bittere Kälte Eurasiens nachzuahmen, aber er musste sich damit abfinden. Wir haben uns entschieden, auf dem Gipfel des Berges Palandöken in Erzurum eine Anlage zu errichten und eine zusätzliche kleinere Anlage rund um den Berg Ağrı, damit unsere Truppen das ganze Jahr über unter alpinen und eiszeitähnlichen Bedingungen trainieren können."
 TUR_italo_turkish_merchant_fleet:0 "Italo-[TUR.GetAdjective] Handelsflotte"
 TUR_italo_turkish_merchant_fleet_desc:0 "Die Tage der [ENG.GetAdjective], die die Meere des Mittelmeers beherrschten, sind vorbei. Das Mittelmeer gehört den [ITA.GetAdjective] und den [GRE.GetAdjective]!"
 TUR_turkic_volunteers_from_abroad:0 "Türkische Freiwillige aus dem Ausland"
 TUR_turkic_volunteers_from_abroad_desc:0 "Unsere türkischen Brüder und Schwestern kommen aus allen Teilen Eurasiens, um unseren gemeinsamen Kampf zu unterstützen. Gemeinsam werden wir das Zeitalter des Wolfes sichern."
 TUR_golden_age_of_the_wolf:0 "Goldenes Zeitalter des Wolfes"
 TUR_golden_age_of_the_wolf_desc:1 "Die deutschen und [TUR.GetAdjective] Wölfe herrschen über Europa. Unsere Feinde sind Kaninchen, und obwohl sie rennen und sich verstecken können, ist es unvermeidlich, dass sie in einem unserer großen und mächtigen Kiefer gefangen werden!"
 TUR_refugees_from_the_fascist_menace:0 "Flüchtlinge vor der faschistischen Bedrohung"
 TUR_refugees_from_the_fascist_menace_desc:1 "Die Faschisten betreiben eine Politik der Exklusivität und verletzen auf Schritt und Tritt die unveräußerlichen Menschenrechte. Ihre Taten sind ungeheuerlich, und der Schutz derjenigen, die vor faschistischen Vorurteilen fliehen, ist das Mindeste, was wir tun können."
 TUR_revolutionary_brigades_from_abroad:0 "Revolutionäre Brigaden aus dem Ausland"
 TUR_revolutionary_brigades_from_abroad_desc:1 "Der Marxismus ist ein grundsätzlich internationalistisches Glaubensbekenntnis und daher ist es nur natürlich, dass Revolutionäre aus aller Welt in unser Land strömen, um in unserem gemeinsamen globalen Kampf zu kämpfen."
 TUR_construct_a_red_navy:0 "Eine rote Marine"
 TUR_construct_a_red_navy_desc:0 "Ohne die Unterstützung einer starken Marine ist jeder Versuch, eine globale Revolution auszulösen, zum Scheitern verurteilt."
 TUR_the_revolutionary_officer_college_of_kars:0 "Das Revolutionäre Offizierskolleg von Kars"
 TUR_the_revolutionary_officer_college_of_kars_desc:1 "Kars ist eine Stadt mit einer bewegten Geschichte und aufgrund ihrer Nähe zu [SOV.GetNameDef] der ideale Standort für die Gründung einer neuen politisierten Offiziersschule. Unseren Offizieren werden nicht nur die Grundlagen der Kriegsführung, sondern auch die Feinheiten der marxistischen Doktrin vermittelt."
 TUR_arctic_wolves_training:0 "Training der Arktischen Wölfe"
 TUR_arctic_wolves_training_desc:1 "Unsere Soldaten werden durch den Schnee streifen wie Wölfe auf der Jagd nach Beute in der borealen Steppe. Durch unser Training wird der Feind mehr Angst bekommen als nur vor der Kälte im eisigen Wind."
 TUR_red_officers:0 "Rote Offiziere"
 TUR_red_officers_desc:1 "So wie die kemalistischen Offiziere ihre eigene Ideologie vertreten und schützen, sollen unsere neuen Offiziere als Hüter des Marxismus in [TUR.GetNameDef] dienen."
 TUR_kemalism_with_socialist_characteristics:0 "Kemalismus mit sozialistischen Merkmalen"
 TUR_kemalism_with_socialist_characteristics_desc:1 "Wir haben kein Interesse daran, den Kemalismus abzuschaffen. Wir würden der Welt einen schlechten Dienst erweisen, wenn wir unsere hausgemachte und fortschrittliche Ideologie abschaffen würden. Der Kemalismus ist dynamisch genug, um verändert zu werden, um stärker den marxistischen Werten zu entsprechen, ohne seine Grundlagen völlig zu untergraben."
 TUR_turkish_bolshevism:0 "Türkischer Bolschewismus"
 TUR_turkish_bolshevism_desc:1 "Der Kemalismus hat seinen Zweck erfüllt und wird nun in die Geschichtsbücher eingehen ... nun ja, zumindest in einige illegale Geschichtsbücher. [TUR.GetNameDef] orientiert sich nun eher an der Revolution Wladimir Lenins als an dem revisionistischen Reaktionär Mustafa Kemal Atatürk und seiner unterdrückten Bewegung."
 TUR_reappropriated_exploitative_finance:0 "Wiederangeeignete ausbeuterische Finanzwirtschaft"
 TUR_reappropriated_exploitative_finance_desc:1 "Wir werden den Reichtum ausländischer Wucherer und unserer eigenen beklagenswerten kapitalistischen Parasiten im Inland umwidmen, um eine Gesellschaft aufzubauen, die wirklich der Arbeiterklasse von [TUR.GetNameDef] dient."
 TUR_emergency_deployment_of_defensive_bases:0 "Notfalleinsatz von Verteidigungsbasen"
 TUR_emergency_deployment_of_defensive_bases_desc:1 "Die Verteidigungsanlagen unseres Landes sind völlig veraltet und wären in einem modernen Krieg letztlich wertlos. Wir müssen große nationale Anstrengungen unternehmen, um unsere Verteidigung zu modernisieren und potenzielle Invasoren abzuschrecken."
 TUR_the_battle_for_our_nations_survival:0 "Der Kampf um das Überleben unserer Nation"
 TUR_the_battle_for_our_nations_survival_desc:1 "Das Undenkbare ist geschehen: [SOV.GetNameDef] ist in unser Land einmarschiert, und nun steht die Zukunft des [TUR.GetAdjective]-Staates auf dem Spiel. Das [TUR.GetAdjective]-Volk ist dem Ruf von [TUR.GetLeader] gefolgt, doch wie lange kann dieser Eifer angesichts des totalen Krieges gegen eine unbestreitbar mächtigere Bedrohung anhalten?"
 TUR_rebuilding_our_home:0 "Wiederaufbau unseres Hauses"
 TUR_rebuilding_our_home_desc:1 "Unser Land wurde von den kemalistischen Hunden materiell, physisch und spirituell schwer verwüstet, doch endlich ist ihrer Tyrannei ein Ende gesetzt. Wir stehen an der Schwelle zu einer neuen Ära für unser Volk: einer Ära, in der wir endlich die Fehler der Vergangenheit wiedergutmachen können. Wir müssen für die Zukunft bauen, um die Vergangenheit wieder auferstehen zu lassen."
 TUR_rising_islamist_dissidence:0 "Zunehmende islamistische Dissidenz"
 TUR_rising_islamist_dissidence_desc:1 "Jedes Mal, wenn in [TUR.GetNameDef] auch nur die Idee freier Wahlen zur Sprache kam, versuchten die religiösen Fundamentalisten, jede Plattform für den Widerstand gegen die CHP zu kapern. Und dieses Mal scheint es nicht anders zu sein. Im ganzen Land wächst ein fundamentalistisches Bewusstsein, während unsere ideologischen Feinde sich versammeln, um unsere Herrschaft über das Land zu stürzen, indem sie die Wahlurnen, die wir ihnen zur Verfügung stellen, entweihen."
 TUR_objectors_flocking_to_military_service:0 "Verweigerer strömen zum Militärdienst"
 TUR_objectors_flocking_to_military_service_desc:1 "Viele Bürger, die sich einst der Wehrpflicht entzogen haben, melden sich nun zum Dienst in unseren Streitkräften. Die Regierung hat ihren Ansatz „Vaterland zuerst“ gut angenommen, und viele beginnen, ihren Platz im Gefüge unseres Landes zu begreifen, wo sie sich vorher wie Außenseiter fühlten."
 TUR_legacy_of_ataturk_fulfilled:0 "Das Erbe Atatürks"
 TUR_legacy_of_ataturk_fulfilled_desc:0 "Wir haben Mustafa Kemal Atatürks höchste Ambitionen für den [ROOT.GetAdjective]-Staat verfochten und erfüllt, indem wir ihn in einen legitimen liberalen demokratischen Mehrparteienstaat verwandelt haben. Wir haben Atatürks Lebenstraum verwirklicht, und dadurch ist unsere Herrschaft in den Augen des Volkes erheblich sicherer geworden."
 TUR_legacy_of_ataturk_preserved:0 "Das Erbe Atatürks"
 TUR_legacy_of_ataturk_preserved_desc:0 "Wir haben den alten Status quo durch die Aufrechterhaltung eines autoritären Regimes, das kemalistische Ideale fördert, verlängert. Wir haben Mustafa Kemal Atatürks Bestrebungen nach einem [ROOT.GetAdjective] Staat nicht zerstört, aber wir haben auch wenig getan, um diese Ziele zu fördern. Es wird an zukünftigen Generationen liegen, die von uns geschaffenen Grundlagen zu nutzen, um den Mantel des Kemalismus an sich zu reißen..."
 TUR_legacy_of_ataturk_defiled:0 "Das Erbe Atatürks"
 TUR_legacy_of_ataturk_defiled_desc:0 "Wir haben ihn enttäuscht: Wie könnte der Vater der Türken die aktuelle Lage in [ROOT.GetNameDef] mit etwas anderem als verächtlicher Geringschätzung betrachten? Wir müssen einfach darauf vertrauen, dass seine Ambitionen für dieses Land falsch waren und unsere richtig ..."
 TUR_republicanism:0 "Republikanismus"
 TUR_republicanism_desc:1 "Denn die Unabhängigkeit ist das absolute Recht meiner gottesfürchtigen Nation!"
 TUR_nationalism:0 "Nationalismus"
 TUR_nationalism_desc:1 "Fürchtet euch nicht; denn das purpurne Banner, das stolz in dieser glorreichen Morgendämmerung weht, wird nicht verblassen, bis das letzte Feuer in meiner Heimat erloschen ist. Denn es ist der Stern meines Volkes, und er wird ewig leuchten; er gehört mir und allein meiner tapferen Nation."
 TUR_populism:0 "Populismus"
 TUR_populism_desc:1 "Wer würde nicht sein Leben für dieses paradiesische Land opfern? Märtyrer würden hervorbrechen, wenn man nur den Boden auspressen würde! Märtyrer!"
 TUR_reformism:0 "Reformismus"
 TUR_reformism_desc:1 "Der Horizont des Westens mag von stählernen Mauern umgeben sein, doch meine Grenzen werden von der mächtigen Brust eines Gläubigen bewacht. Lasst es brüllen, fürchtet euch nicht! Und denkt darüber nach: Wie kann dieser feurige Glaube jemals ausgelöscht werden, von diesem zerschlagenen, einzahnigen Monster, das ihr „Zivilisation“ nennt?"
 TUR_revolutionism:0 "Revolutionismus"
 TUR_revolutionism_desc:1 "So kräusle und woge dich wie der helle, dämmernde Himmel, oh du herrlicher Halbmond, damit jeder unserer letzten Blutstropfen endlich gesegnet und würdig sei! Weder du noch meine Verwandten sollen jemals ausgelöscht werden!"
 TUR_liberalism:1 "Liberalismus"
 TUR_liberalism_desc:1 "Ich bin seit Anbeginn frei und werde es für immer bleiben. Welcher Wahnsinnige will mich in Ketten legen? Ich widersetze mich dem Gedanken! Denn Freiheit ist das absolute Recht meiner ewig freien Flagge!"
 TUR_fundamentalism:0 "Fundamentalismus"
 TUR_fundamentalism_desc:1 "Oh glorreicher Gott, der einzige Wunsch meines schmerzgeplagten Herzens ist, dass keine heidnische Hand jemals den Schoß meiner heiligen Tempel berühren möge."
 TUR_absolutism:0 "Absolutismus"
 TUR_absolutism_desc:1 "Betrachte den Boden, auf dem du gehst, nicht als bloße Erde – erkenne ihn! Und denke an die Tausenden, die so edel unter dir liegen. Du bist der ruhmreiche Sohn eines Märtyrers – schäme dich, trauere nicht um deine Vorfahren! Gib diese himmlische Heimat nicht auf, auch wenn dir Welten versprochen sind."
 TUR_ultranationalism:0 "Ultranationalismus"
 TUR_ultranationalism_desc:1 "Möge Gott mir mein Leben, meine Lieben und all meinen Besitz nehmen, wenn er will, doch möge er mich nicht meiner einzigen wahren Heimat auf der Welt berauben. Diese Adhans und ihre Zeugnisse sind die Grundlagen meiner Religion, und möge ihr edler Klang in meiner ewigen Heimat donnernd erklingen."
 TUR_socialism:0 "Sozialismus"
 TUR_socialism_desc:1 "Mein Freund! Überlasse mein Heimatland nicht den Händen von Schurken! Mach deine Brust zur Rüstung und deinen Körper zum Bollwerk! Stoppe diesen schändlichen Angriff!"

 TUR_mustafa_kemal_ataturk_figurehead:0 "Mustafa Kemal Atatürk"
 TUR_mustafa_kemal_ataturk_figurehead_desc:0 "Auch im Ruhestand kann unser Ghazi nicht anders, als sich in die Politik unseres Landes einzumischen. Er ist zwar formal nicht mehr Präsident, aber Mustafa Kemal Atatürks Wort bleibt Gesetz – auch heute noch."
