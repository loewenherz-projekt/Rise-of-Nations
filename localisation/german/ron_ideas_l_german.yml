 BUL_the_fight_against_bolshevism_ns_target_tt:0 "Angriffsbonus gegen §Ygroße kommunistische Länder in Europa§!: §G10,0 %§!, Verteidigungsbonus gegen §Ygroße kommunistische Länder in Europa§!: §G10,0 %§!"
 BUL_bulgarian_capital_injection:0 "Bulgarische Kapitalspritze"
