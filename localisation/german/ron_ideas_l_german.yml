SAF_ossewabrandwag_desc:0 "Der Ossewabrandwag (auf Afrikaans „Wächter des Ochsenwagens“) ist eine antibritische und prodeutsche Organisation, die einen Krieg gegen die Deutschen ablehnt. Unterstützt von Afrikaans, Buren und südafrikanischen Nazis stellt der Ossewabrandwag sowohl für die Briten als auch für die Demokratie ein großes Problem dar."
SAF_ossewabrandwag_fascism2_desc:0 "Der Ossewabrandwag (auf Afrikaans „Wächter des Ochsenwagens“) ist eine antibritische und prodeutsche Organisation, die einen Krieg gegen die Deutschen ablehnt. Unterstützt von Afrikaans, Buren und südafrikanischen Nazis will der Ossewabrandwag Südafrika in eine bessere Zukunft führen."
SAF_ossewabrandwag_w_desc:0 "Der Ossewabrandwag (auf Afrikaans „Wächter des Ochsenwagens“) ist eine antibritische und prodeutsche Organisation, die einen Krieg gegen die Deutschen ablehnt. Unterstützt von Afrikaans, Buren und südafrikanischen Nazis, ist der Ossewabrandwag nach den brutalen Maßnahmen der Regierung geschwächt worden, und es scheint, als seien immer weniger Menschen bereit, sich für seine Sache einzusetzen."
SAF_history_of_segregation_desc:0 "Nur 20 % der südafrikanischen Bevölkerung sind weiß, doch sie haben die gesamte Macht im Land und sind die einzigen, die wählen und sich politisch engagieren dürfen. Diese Maßnahmen schränken auch die Beschäftigungsmöglichkeiten für Nicht-Weiße ein und schränken die Rekrutierungsmöglichkeiten unserer Armee ein."
SAF_history_of_segregation_2_desc:0 "Nur 20 % der südafrikanischen Bevölkerung sind weiß, doch sie haben die gesamte Macht im Land und sind die einzigen, die wählen und sich politisch engagieren dürfen. Diese Maßnahmen schränken auch die Beschäftigungsmöglichkeiten für Nicht-Weiße ein und schränken die Rekrutierungsmöglichkeiten unserer Armee ein."

