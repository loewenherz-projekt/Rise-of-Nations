 RAJ_agrarian_society:0 "Agrargesellschaft"
 RAJ_agrarian_society_desc:0 "Die lokalen Behörden sind der Ansicht, dass ihre bäuerliche Lebensweise einen großen Teil der indischen Bevölkerung schlichtweg untauglich für den Militärdienst oder Krieg gemacht hat. Sie behaupten, wir sollten nur aus den sogenannten „Kriegerstämmen“ rekrutieren. Dieser Glaube ist so weit verbreitet und tief verwurzelt, dass es mindestens eine Generation dauern wird, ihn zu überwinden. Auf absehbare Zeit müssen wir akzeptieren, dass sie jeden Befehl zur Einberufung von Bauern einfach ignorieren werden."
