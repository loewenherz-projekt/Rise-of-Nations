AUH_backward_navy_industry_desc:0 "Die österreichische (und später österreichisch-ungarische) Marine spielte während ihrer gesamten Existenzzeit in finanzieller und politischer Hinsicht eine untergeordnete Rolle. Ein Grund dafür war, dass die Seemacht nie eine Priorität der österreichischen Außenpolitik darstellte und die Marine selbst in der Öffentlichkeit relativ wenig bekannt und beliebt war. Aktivitäten wie Tage der offenen Tür und Marineclubs konnten das Gefühl nicht ändern, die Marine sei lediglich etwas „Teures, aber weit Entferntes“. Ein weiterer Grund war, dass die Marineausgaben die meiste Zeit vom österreichischen Kriegsministerium überwacht wurden, das wiederum weitgehend vom Heer kontrolliert wurde."
AUH_inexperenced_colonial_administrators_desc:0 "Vom 17. bis zum 19. Jahrhundert unternahmen die Habsburgermonarchie, das österreichische Kaiserreich und das österreichisch-ungarische Kaiserreich einige kleine, kurzlebige Versuche, den Kolonialhandel in Übersee durch den Erwerb von Fabriken auszuweiten. Alle Versuche scheiterten aufgrund internationalen Drucks oder des mangelnden Interesses der kaiserlichen Regierung sowie des Widerstands hochrangiger ungarischer Regierungsvertreter."
AUH_unequal_union_desc:0 "Der Kompromiss wurde von der ungarischen Gesellschaft weithin als Verrat an den vitalen ungarischen Interessen und den Errungenschaften der Reformen von 1848 angesehen (der Status Ungarns vor der Revolution von 1848 war eine bloße Personalunion; nach dem Kompromiss wurde sein Status jedoch in eine Realunion umgewandelt). Daher blieb er bei den ethnisch ungarischen Wählern äußerst unbeliebt, da ethnische Ungarn bei den ungarischen Parlamentswahlen nicht für die regierenden kompromissbereiten Parteien stimmten. Die politische Aufrechterhaltung des österreichisch-ungarischen Ausgleichs (und damit Österreich-Ungarns selbst) war daher hauptsächlich auf die Popularität der kompromissbereiten regierenden Liberalen Partei unter den Wählern ethnischer Minderheiten im Königreich Ungarn zurückzuführen."

