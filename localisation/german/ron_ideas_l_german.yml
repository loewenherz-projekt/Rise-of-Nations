anti_centralization_sentiment:0 "Anti-Zentralisierungsstimmung"
anti_centralization_sentiment_desc:0 "Die Mitglieder der Neuen Guangxi-Clique und ihr Anführer Li Zongren hatten schon immer ein kompliziertes Verhältnis zu Chiang Kai-shek. Wir kämpften 1929 im Chiang-Gui-Krieg gegen seine Regierung und im darauffolgenden Jahr erneut zusammen mit der Shanxi-Clique und der „Feng-Clique“. Ein weiterer Bürgerkrieg wäre ausgebrochen, wenn uns die japanische Invasion in der Mandschurei 1932 nicht dazu bewogen hätte, mit der Regierung in Nanjing zusammenzuarbeiten. Der gemeinsame Kampf mit den Nationalisten konnte die antizentralistische Stimmung in unserer Clique jedoch nicht beruhigen."
opium_suppression_offices:0 "Opiumbekämpfungsbüros"
opium_suppression_offices_desc:0 "In diesem Jahr begann die Regierung von Nanjing eine Kampagne zur Unterbindung des Opiumhandels mit Nordchina, was unsere Einkommen stark beeinträchtigte. 1932 beliefen sich die Opiumeinnahmen auf 50 Millionen Dollar, und plötzlich müssen wir schnell einen Weg finden, den Zusammenbruch unserer Wirtschaft zu verhindern."
opium_incomes:0 "Opiumeinkommen"
opium_incomes_desc:0 "Durch die Besteuerung des Opiumhandels konnten wir unsere Wirtschaft stark steigern, doch da die Regierung von Nanjing nun eine Kampagne zur Unterdrückung des Opiumhandels gestartet hat, werden unsere Einnahmen bald versiegen."
anti_centralization_sentiment2:0 "Anti-Zentralisierungsstimmung"
anti_centralization_sentiment2_desc:0 "Die Mitglieder der Neuen Guangxi-Clique und ihr Anführer Li Zongren hatten schon immer ein kompliziertes Verhältnis zu Chiang Kai-shek. Wir kämpften 1929 im Chiang-Gui-Krieg gegen seine Regierung und im darauffolgenden Jahr erneut zusammen mit der Shanxi-Clique und der „Feng-Clique“. Ein weiterer Bürgerkrieg wäre ausgebrochen, wenn uns die japanische Invasion in der Mandschurei 1932 nicht dazu bewogen hätte, mit der Regierung in Nanjing zusammenzuarbeiten. Der gemeinsame Kampf mit den Nationalisten konnte die antizentralistische Stimmung in unserer Clique jedoch nicht beruhigen."
anti_centralization_sentiment3:0 "Anti-Zentralisierungsstimmung"
anti_centralization_sentiment3_desc:0 "Die Mitglieder der Neuen Guangxi-Clique und ihres Anführers Li Zongren hatten schon immer ein kompliziertes Verhältnis zu Chiang Kai-shek. Wir kämpften 1929 im Chiang-Gui-Krieg gegen seine Regierung und im darauffolgenden Jahr erneut zusammen mit der Shanxi-Clique und der „Feng-Clique“. Ein weiterer Bürgerkrieg wäre ausgebrochen, wenn uns die japanische Invasion in der Mandschurei 1932 nicht dazu bewogen hätte, mit der Regierung in Nanjing zusammenzuarbeiten. Der gemeinsame Kampf mit den Nationalisten konnte die antizentralistische Stimmung in unserer Clique jedoch nicht beruhigen."
