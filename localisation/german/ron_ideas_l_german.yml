stalinist_terror:0 "Stalinistischer Terror"
stalinist_terror_desc:0 "Der NKWD und stalinistische Unterstützer in der Mongolei haben mit Säuberungen in der MAN und der Armee begonnen, um die Unabhängigkeitsbestrebungen der Mongolei zu unterbinden. Buddhistische Geistliche, Aristokraten, Intellektuelle, politische Dissidenten sowie ethnische Burjaten und Kasachen haben schwere Verluste erlitten, und ein Ende ist nicht abzusehen."
