USA_Alcohol_Prohibition:0 "Die Prohibition"
USA_Alcohol_Prohibition_desc:0 "Die Prohibition reduzierte erfolgreich den Alkoholkonsum, die Sterberate durch Leberzirrhose, die Einweisungen in staatliche psychiatrische Kliniken wegen Alkoholpsychosen, die Verhaftungen wegen Trunkenheit in der Öffentlichkeit und die Abwesenheitsraten. Während viele behaupten, die Prohibition habe die Ausbreitung von organisierter Kriminalität im Untergrund gefördert, behaupten zwei Wissenschaftler, es habe während der Prohibitionszeit keinen Anstieg der Kriminalität gegeben und diese Behauptungen seien „eher impressionistisch als faktisch“. 1925 gab es allein in New York City zwischen 30.000 und 100.000 Speakeasy-Clubs. Die Opposition sprach von persönlicher Freiheit, neuen Steuereinnahmen durch legales Bier und Alkohol und der Plage der organisierten Kriminalität."
usa_black_sunday:0 "Schwarzer Sonntag"
usa_black_sunday_desc:0 "Der Begriff „Schwarzer Sonntag“ bezeichnet einen besonders schweren Staubsturm, der am 14. April 1935 als Teil der Dust Bowl in den Vereinigten Staaten wütete. Er war einer der schlimmsten Staubstürme in der amerikanischen Geschichte und richtete immense wirtschaftliche und landwirtschaftliche Schäden an. Schätzungsweise 300 Millionen Tonnen Mutterboden wurden aus den Präriegebieten verdrängt. Am Nachmittag des 14. April mussten die Bewohner mehrerer Präriestaaten Schutz suchen, als ein Staubsturm oder „schwarzer Blizzard“ durch die Region fegte. Der Sturm traf zuerst den Oklahoma Panhandle und Nordwest-Oklahoma und zog für den Rest des Tages Richtung Süden. Er erreichte Beaver (Oklahoma) gegen 16:00 Uhr, Boise City gegen 17:15 Uhr und Amarillo (Texas) um 19:20 Uhr. Die Bedingungen waren in den Panhandles von Oklahoma und Texas am schlimmsten, aber die Auswirkungen des Sturms waren auch in anderen umliegenden Gebieten zu spüren. Die Kombination aus Dürre, Erosion, nacktem Boden und Winden ließ den Staub ungehindert und mit hoher Geschwindigkeit aufwirbeln."
