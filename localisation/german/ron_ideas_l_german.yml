 TUR_kemalist_army_officers_powerful_loyal:0 "Kemalistische Offiziere"
 TUR_kemalist_army_officers_powerful_loyal_desc:0 "Das türkische Elite-Offizierskorps gehört zu den standhaftesten Beschützern der kemalistischen Werte. Nie zuvor war der Kemalismus in der Türkei so tief verwurzelt wie heute, und unser Staat war noch nie in sichereren Händen als unter der gegenwärtigen Regierung."
 TUR_kemalist_army_officers_powerful_neutral:0 "Kemalistische Offiziere"
 TUR_kemalist_army_officers_powerful_neutral_desc:0 "Die türkische Elite-Offizierstruppe zählt zu den standhaftesten Verfechtern der kemalistischen Werte. Nie zuvor war der Kemalismus in der Türkei so tief verwurzelt wie heute."
 TUR_kemalist_army_officers_powerful_disloyal:0 "Kemalistische Offiziere"
 TUR_kemalist_army_officers_powerful_disloyal_desc:0 "Die türkische Elite-Offiziersarmee gehört zu den standhaftesten Verfechtern kemalistischer Werte. Nie zuvor war der Kemalismus in der Türkei so tief verwurzelt wie heute, und die Offiziersarmee verabscheut uns mit Sicherheit dafür, dass wir in einer Zeit, in der der Kemalismus von so vielen respektiert wird, so gegensätzlich zu den kemalistischen Werten handeln."
 TUR_kemalist_army_officers_extended_power_loyal:0 "Kemalistische Offiziere"
 TUR_kemalist_army_officers_extended_power_loyal_desc:0 "Das türkische Elite-Offizierskorps gehört zu den standhaftesten Beschützern der kemalistischen Werte. Der Kemalismus hat, wie von Atatürk erhofft, in der ganzen Türkei stetig an Popularität gewonnen, und das Offizierskorps steht solidarisch an der Seite der aktuellen Regierung und kämpft gegen alle Gefahren für die türkische Souveränität."
 TUR_kemalist_army_officers_extended_power_neutral:0 "Kemalistische Offiziere"
 TUR_kemalist_army_officers_extended_power_neutral_desc:0 "Das türkische Elite-Offizierskorps gehört zu den standhaftesten Beschützern der kemalistischen Werte. Der Kemalismus hat, wie von Atatürk erhofft, in der ganzen Türkei stetig an Popularität gewonnen, und das Offizierskorps steht bereit, um die Werte des Kemalismus auch weiterhin vor jenen zu schützen, die sie untergraben wollen."
 TUR_kemalist_army_officers_extended_power_disloyal:0 "Kemalistische Offiziere"
 TUR_kemalist_army_officers_extended_power_disloyal_desc:0 "Das türkische Elite-Offizierskorps gehört zu den standhaftesten Beschützern der kemalistischen Werte. Der Kemalismus gewinnt in der ganzen Türkei zunehmend an Anhängern, und das Offizierskorps arbeitet aktiv gegen die derzeitige Regierung, um den Schutz der kemalistischen Werte zu gewährleisten."
 TUR_kemalist_army_officers_limited_power_loyal:0 "Kemalistische Offiziere"
 TUR_kemalist_army_officers_limited_power_loyal_desc:0 "Das türkische Offizierskorps gehört zu den standhaftesten Beschützern der kemalistischen Werte. Der Kemalismus wird als Ideologie zwar weiterhin in Frage gestellt, doch das Offizierskorps steht der Regierung in allen Belangen zur Seite, wenn es um den Schutz des Staates geht."
 TUR_kemalist_army_officers_limited_power_neutral:0 "Kemalistische Offiziere"
 TUR_kemalist_army_officers_limited_power_neutral_desc:0 "Das türkische Offizierskorps gehört zu den standhaftesten Beschützern der kemalistischen Werte. Der Kemalismus als Ideologie wird weiterhin in Frage gestellt, und das Offizierskorps arbeitet unermüdlich daran, die kemalistischen Prinzipien zu schützen."
 TUR_kemalist_army_officers_limited_power_disloyal:0 "Kemalistische Offiziere"
 TUR_kemalist_army_officers_limited_power_disloyal_desc:0 "Das türkische Offizierskorps gehört zu den entschiedensten Verfechtern kemalistischer Werte. Der Kemalismus wird als Ideologie weiterhin in Frage gestellt, und das Offizierskorps steht in entschiedener Opposition zur Haltung der gegenwärtigen Regierung in Fragen der Ideologie und Regierungsführung."
 TUR_kemalist_army_officers_decreased_power_loyal:0 "Kemalistische Offiziere"
 TUR_kemalist_army_officers_decreased_power_loyal_desc:0 "Das türkische Offizierskorps zählt zu den standhaftesten Verfechtern kemalistischer Werte. Der Kemalismus musste zwar einige Rückschläge hinnehmen, als es darum ging, die Unterstützung der Bevölkerung zu gewinnen, doch das Offizierskorps bleibt der aktuellen Regierung treu."
 TUR_kemalist_army_officers_decreased_power_neutral:0 "Kemalistische Offiziere"
 TUR_kemalist_army_officers_decreased_power_neutral_desc:0 "Das türkische Offizierskorps gehört zu den standhaftesten Verfechtern der kemalistischen Werte. Der Kemalismus musste bei der Gewinnung der Unterstützung der Bevölkerung einige Rückschläge hinnehmen, und die Offiziere beobachten die Stimmung im Land mit Sorge."
 TUR_kemalist_army_officers_decreased_power_disloyal:0 "Kemalistische Offiziere"
 TUR_kemalist_army_officers_decreased_power_disloyal_desc:0 "Das türkische Offizierskorps zählt zu den entschiedensten Verfechtern kemalistischer Werte. Der Kemalismus musste bei der Gewinnung der Unterstützung der Bevölkerung einige Rückschläge hinnehmen, die das Offizierskorps größtenteils auf die Politik und das Handeln der gegenwärtigen Regierung zurückführt."
 TUR_kemalist_army_officers_minimal_power_loyal:0 "Kemalistische Offiziere"
 TUR_kemalist_army_officers_minimal_power_loyal_desc:0 "Das türkische Offizierskorps gehörte zu den standhaftesten Verteidigern der kemalistischen Werte, doch heute kann die lustlose Clique kemalistischer Anhänger kaum etwas anderes tun, als die derzeitige Regierung oberflächlich zu beurteilen."
 TUR_kemalist_army_officers_minimal_power_neutral:0 "Kemalistische Offiziere"
 TUR_kemalist_army_officers_minimal_power_neutral_desc:0 "Das türkische Offizierskorps gehörte zu den standhaftesten Verfechtern der kemalistischen Werte, doch heute ist seine Rolle weitgehend auf eine zeremonielle Funktion reduziert."
 TUR_kemalist_army_officers_minimal_power_disloyal:0 "Kemalistische Offiziere"
 TUR_kemalist_army_officers_minimal_power_disloyal_desc:0 "Das türkische Offizierskorps gehörte zu den standhaftesten Verteidigern der kemalistischen Werte, doch heute kann die erbärmlich geschrumpfte Kabale kemalistischer Anhänger kaum etwas anderes tun, als die derzeitige Regierung beiläufig zu verurteilen."
 TUR_disorganised_armed_forces:0 "Desorganisierte Streitkräfte"
 TUR_disorganised_armed_forces_desc:0 "Die türkischen Streitkräfte sind jung, genau wie die Türkei selbst. Obwohl unsere Armeen aus dem Befreiungskrieg gegen die Entente und die Osmanen siegreich hervorgingen, zahlte unser Land den Preis für die Freiheit mit Blut. Nach dem Verlust von fast einem Viertel unserer Bevölkerung im Ersten Weltkrieg gab es kaum noch Kriegsbegeisterung. Doch angesichts der erneuten Kriegsgefahr scheint uns keine andere Wahl zu bleiben, als unsere Streitkräfte schnell zu modernisieren oder dafür zu sorgen, dass der Krieg unsere Grenzen nie erreicht."
 TUR_disorganised_armed_forces_1:0 "Desorganisierte Streitkräfte"
 TUR_disorganised_armed_forces_1_desc:0 "Die türkischen Streitkräfte sind jung, genau wie die Türkei selbst. Obwohl unsere Armeen aus dem Befreiungskrieg gegen die Entente und die Osmanen siegreich hervorgingen, zahlte unser Land den Preis für die Freiheit mit Blut. Nach dem Verlust von fast einem Viertel unserer Bevölkerung im Ersten Weltkrieg gab es kaum noch Kriegsbegeisterung. Doch angesichts der erneut drohenden Kriegsgefahr scheint uns keine andere Wahl zu bleiben, als unsere Streitkräfte schnell zu modernisieren oder dafür zu sorgen, dass der Krieg unsere Grenzen nie erreicht."
