 BUL_the_balkans_united:0 "Der Balkan vereint"
 BUL_the_balkans_united_desc:0 "[GetUnitedWeShallPrevailFocusLoc]"
 BUL_balkan_federation_project_propaganda:0 "Propaganda der Balkanföderation"
 BUL_balkan_federation_project_propaganda_desc:0 "Dank der von der bulgarischen Regierung finanzierten Propagandakampagne in unserem ganzen Land breitet sich die Unterstützung der Bevölkerung für das neue bulgarische Projekt einer Balkanföderation rasch aus."
 BUL_defying_moscow:0 "Moskau trotzen"
 BUL_defying_moscow_desc:0 "[GetDefyingMoscowFocusLoc]"
 BUL_ferdinands_puppet:0 "Zar Ferdinands Marionette"
 BUL_ferdinands_puppet_desc:0 "[ROOT.GetNameDef] wurde von Zar Ferdinand I. von [BUL.GetNameDef] unterworfen, der großen Einfluss auf die [ROOT.GetAdjective]-Regierung ausübt und die Politik, Wirtschaft und Industrie des Landes unter seiner vollständigen Kontrolle hält."
 BUL_the_bulgarian_threat:0 "Die bulgarische Bedrohung"
 BUL_the_bulgarian_threat_desc:0 "Die ehrgeizigen Bestrebungen von [BUL.GetNameDef] auf dem Balkan stellen eine erhebliche Bedrohung für die Integrität von [ROOT.GetNameDef] und die Freiheit des [ROOT.GetAdjective] Volkes dar."
 BUL_defender_of_the_balkans:0 "Verteidiger des Balkans"
 BUL_defender_of_the_balkans_desc:0 "Unsere bulgarischen Herren befehlen, dass wir unsere Bemühungen zum Aufbau neuer Verteidigungssysteme und zur Verbesserung unserer militärischen Infrastruktur intensivieren, um zur Verteidigung des Balkans beizutragen."
