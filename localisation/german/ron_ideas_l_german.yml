soviet_influence:0 "Sowjetischer Einfluss"
soviet_influence_desc:0 "Nachdem Sinkiang 1934 mit sowjetischer Hilfe die Truppen Ma Zhongyings im Kumul-Aufstand besiegt hatte, wurde es im Gegenzug ein Vasall Moskaus. Dies führte zur Modernisierung der Region, ordnete aber auch die wirtschaftlichen Interessen zugunsten der Sowjetunion unter. Um die Sowjets aus Sinkiang zu vertreiben, bedarf es eines großen Ablenkungsmanövers, etwa eines Krieges in Europa."
white_russian_mercenaries:0 "Weißrussische Söldner"
white_russian_mercenaries_desc:0 "Während des russischen Bürgerkriegs flohen viele Russen nach Xinjiang, wo sie unter der Regierung von Yang Zengxin friedlich leben konnten und Guihua (Eingebürgerte) genannt wurden. Nach Yang Zengxins Ermordung und massiver Repression durch die Regierung von Jin Shuren wurden viele von ihnen jedoch zu Banditen, während andere der Armee beitraten. Dies führte 1933 zum Putsch der russischen Soldaten in Jin Shuren, der zur Machtübernahme von Sheng Shicai führte. Doch nun stellt sich die Frage, wie lange es dauert, bis sie Sheng überdrüssig werden und auch ihn putschen?"
multi_ethnic_clique:0 "Multiethnische Clique"
multi_ethnic_clique_desc:0 "Xinjiang ist vermutlich die Region mit den meisten verschiedenen Ethnien in China. Es gibt Han, Hui, Uiguren, Kumul, Guihua (auch bekannt als Weißrussen oder Kosaken) und noch mehr. Einige dieser Ethnien waren recht problematisch, wie die Uiguren und Kumul, die 1931 einen Aufstand anzettelten und uns in einen Krieg gegen Xibei San Ma hineinzogen, oder die Weißrussen, die 1933 einen Staatsstreich durchführten. All diese Ethnien stellen ein großes Problem für unsere Stabilität dar, und es wird viel Zeit brauchen, bis wir ihnen allen die gleiche Bedeutung beimessen oder einen Weg finden, ihre Aufstände zu verhindern."
