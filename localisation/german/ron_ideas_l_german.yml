 GER_Costly_War:0 "Kriegsmüdigkeit"
 GER_Costly_War_desc:0 "Unser Land ist völlig erschöpft. Wir werden in absehbarer Zeit keinen Krieg führen."

 RON_Era:0 "Epoche"
 RON_Era_desc:0 "Eine Ära ist ein für chronologische oder geschichtswissenschaftliche Zwecke definierter Zeitraum, wie etwa die Regierungsepochen in der Geschichte einer bestimmten Monarchie, eine für einen bestimmten Kalender verwendete Kalenderepoche oder die für die Erdgeschichte definierten geologischen Epochen."
 RON_DNC:0 "Beginn eines neuen Jahrhunderts"
 RON_DNC_desc:0 "Ein neues Jahrhundert bricht weltweit an. Der Globus ist geprägt vom letzten Jahrzehnt des Friedens und der Expansion. In Europa nähert sich die Matriarchin ihrer letzten Tage. Wie lange kann der europäische Frieden noch halten?"
 RON_WW1:0 "Ära des Ersten Weltkriegs"
 RON_WW1_desc:0 "Der Erste Weltkrieg, oft abgekürzt als WWI oder WW1, begann am 28. Juli 1914 und endete am 11. November 1918. Zeitgenossen bezeichneten den „Großen Krieg“ als einen der verheerendsten Konflikte der Geschichte. Zu seinen Kriegsparteien zählten weite Teile Europas, das Russische Reich, die USA und das Osmanische Reich. Die Kämpfe weiteten sich auch auf den Nahen Osten, Afrika und Teile Asiens aus. In diesem Konflikt, der zu den tödlichsten der Geschichte zählt, kamen schätzungsweise neun Millionen Menschen bei Kampfhandlungen ums Leben, während über fünf Millionen Zivilisten durch militärische Besatzung, Bombardierungen, Hunger und Krankheiten starben. Millionen weitere Todesopfer forderten Völkermorde im Osmanischen Reich und die Grippepandemie von 1918, die durch die Truppenbewegungen während des Krieges noch verschärft wurde."
 RON_Interwar:0 "Zwischenkriegszeit"
 RON_Interwar_desc:0 "In der Geschichte des 20. Jahrhunderts dauerte die Zwischenkriegszeit vom 11. November 1918 bis zum 1. September 1939, vom Ende des Ersten Weltkriegs bis zum Beginn des Zweiten Weltkriegs. Die Zwischenkriegszeit war relativ kurz, brachte jedoch weltweit viele bedeutende soziale, politische und wirtschaftliche Veränderungen mit sich. Die auf Erdöl basierende Energieerzeugung und die damit verbundene Mechanisierung führten zu den wohlhabenden Goldenen Zwanzigern, einer Zeit sowohl sozialer als auch wirtschaftlicher Mobilität für die Mittelschicht. Autos, elektrisches Licht, Radio und mehr wurden in der entwickelten Welt alltäglich. Auf die Genüsse dieser Ära folgte später die Große Depression, ein beispielloser weltweiter Wirtschaftsabschwung, der viele der größten Volkswirtschaften der Welt schwer schädigte."
 RON_WW2:0 "Ära des Zweiten Weltkriegs"
 RON_WW2_desc:0 "Der Zweite Weltkrieg, oft abgekürzt als WWII oder WW2, war ein globaler Krieg, der von 1939 bis 1945 dauerte. Die große Mehrheit der Länder der Welt – darunter alle Großmächte – war daran beteiligt und bildete zwei gegnerische Militärbündnisse: die Alliierten und die Achsenmächte. In einem totalen Krieg, an dem mehr als 100 Millionen Menschen aus über 30 Ländern direkt beteiligt waren, stellten die Hauptbeteiligten ihre gesamten wirtschaftlichen, industriellen und wissenschaftlichen Möglichkeiten in den Dienst der Kriegsanstrengungen und verwischten die Unterscheidung zwischen zivilen und militärischen Ressourcen. Flugzeuge spielten in diesem Konflikt eine entscheidende Rolle, da sie die strategische Bombardierung von Bevölkerungszentren und die beiden einzigen Einsätze von Atomwaffen im Krieg ermöglichten. Der Zweite Weltkrieg war der mit Abstand tödlichste Konflikt der Menschheitsgeschichte; er forderte 70 bis 85 Millionen Todesopfer, die meisten davon Zivilisten. Dutzende Millionen Menschen starben durch Völkermord (einschließlich des Holocaust), Hunger, Massaker und Krankheiten. Nach der Niederlage der Achsenmächte wurden Deutschland und Japan besetzt und Kriegsverbrechertribunale gegen deutsche und japanische Politiker durchgeführt."
 RON_Cold_War:0 "Frühe Ära des Kalten Krieges"
 RON_Cold_War_desc:0 "Der Kalte Krieg war eine Zeit geopolitischer Spannungen zwischen den Vereinigten Staaten und der Sowjetunion sowie ihren jeweiligen Verbündeten, dem West- und dem Ostblock, die nach dem Zweiten Weltkrieg begann. Historiker sind sich über seinen Beginn und sein Ende nicht einig, doch wird allgemein angenommen, dass der Zeitraum vom Beginn der Truman-Doktrin am 12. März 1947 bis zur Auflösung der Sowjetunion am 26. Dezember 1991 reichte. Der Begriff Kalter Krieg wird verwendet, weil es keine groß angelegten direkten Kampfhandlungen zwischen den beiden Supermächten gab, diese jedoch jeweils große regionale Konflikte, sogenannte Stellvertreterkriege, unterstützten. Der Konflikt basierte auf dem ideologischen und geopolitischen Kampf dieser beiden Supermächte um globalen Einfluss nach ihrem vorübergehenden Bündnis und Sieg gegen Nazideutschland 1945. Neben dem Aufbau nuklearer Arsenale und dem Einsatz konventioneller Militärgüter wurde der Kampf um die Vorherrschaft auch indirekt durch psychologische Kriegsführung, Propagandakampagnen, Spionage, weitreichende Embargos, Rivalitäten bei Sportveranstaltungen und technologische Wettkämpfe wie das Wettrennen ins All ausgetragen."
 RON_Late_Cold_War:0 "Späte Ära des Kalten Krieges"
 RON_Late_Cold_War_desc:0 "Der Kalte Krieg war eine Zeit geopolitischer Spannungen zwischen den Vereinigten Staaten und der Sowjetunion sowie ihren jeweiligen Verbündeten, dem West- und dem Ostblock, die nach dem Zweiten Weltkrieg begann. Historiker sind sich über Beginn und Ende des Kalten Krieges nicht einig, doch wird allgemein angenommen, dass sich der Zeitraum vom Beginn der Truman-Doktrin am 12. März 1947 bis zur Auflösung der Sowjetunion am 26. Dezember 1991 erstreckte. Der Begriff Kalter Krieg wird verwendet, weil es keine groß angelegten direkten Kampfhandlungen zwischen den beiden Supermächten gab, diese jedoch jeweils große regionale Konflikte, sogenannte Stellvertreterkriege, unterstützten. Der Konflikt basierte auf dem ideologischen und geopolitischen Kampf dieser beiden Supermächte um globalen Einfluss nach ihrem vorübergehenden Bündnis und Sieg gegen Nazideutschland 1945. Neben dem Aufbau nuklearer Arsenale und dem Einsatz konventioneller Militärgüter wurde der Kampf um die Vorherrschaft auch indirekt durch psychologische Kriegsführung, Propagandakampagnen, Spionage, weitreichende Embargos, Rivalitäten bei Sportveranstaltungen und technologische Wettkämpfe wie das Wettrennen ins All ausgetragen."
 RON_Modern_Day:0 "Moderne Ära"
 RON_Modern_Day_desc:0 "Der Beginn des 21. Jahrhunderts war geprägt vom Aufstieg der Weltwirtschaft und des Konsums in der Dritten Welt, der zunehmenden weltweiten Besorgnis über Terrorismus nach dem 11. September 2001, Terroranschlägen und der Zunahme privater Unternehmen. Die NATO-Interventionen in Afghanistan und im Irak Anfang der 2000er Jahre und der Sturz mehrerer Regime während des Arabischen Frühlings Anfang der 2010er Jahre führten zu gemischten Ergebnissen in der arabischen Welt, die mehrere Bürgerkriege und politische Instabilität zur Folge hatten. Die USA blieben die globale Supermacht, während China heute als aufstrebende globale Supermacht gilt."
 
 CHI_No_Surrender_Until_Clearly_Lost:0 "Keine Kapitulation"
 CHI_No_Surrender_Until_Clearly_Lost_desc:0 "Dieses Land hat nicht die Absicht, in absehbarer Zeit aufzugeben."
 
