# SPAIN
SPR_memories_of_the_spanish_american_war_idea:0 "El desastre del 98"
SPR_memories_of_the_spanish_american_war_idea_desc:0 "Der Spanisch-Amerikanische Krieg von 1898, auch „El desastre del 98“ genannt, war der demütigendste Krieg, den Spanien je erlebt hat. Er brachte die Schwäche der spanischen Marine und Armee deutlich zum Vorschein und trug dazu bei, Amerikas Status als Großmacht noch weiter zu festigen.\n\n§RIm Falle wir diese Schande von unserer Nation nehmen wollen, müssen wir Rache nehmen!§!"
SPR_the_regency_of_maria_christina_idea:0 "Die Regentschaft von Maria Christina"
SPR_the_regency_of_maria_christina_idea_desc:0 "Seit dem Tod ihres Mannes regierte Maria Christina Spanien bis zur Volljährigkeit des Königs. Ihre Regentschaft als Regentin ihres Sohnes brachte eine friedliche Rückkehr zu relativer Stabilität mit sich und führte bei Bedarf Reformen durch. Obwohl der Spanisch-Amerikanische Krieg ihr Image stark beschädigte, gelang es ihr dennoch, das fragile Spanien zusammenzuhalten. §RVorerst...§"
SPR_rigged_elections_idea:0 "El Turno Pacífico"
SPR_rigged_elections_idea_desc:0 "Nach dem Scheitern der Ersten Spanischen Republik ermöglichte die spanische Verfassung von 1876 dem König, seine Herrschaft als konstitutionelle Monarchie fortzusetzen, aber dennoch genügend Macht zu behalten, um ein System namens „Turno Pacifico“ (Friedliche Wende) zu unterstützen. In diesem System ernannte und stürzte der König Regierungen und ermöglichte so der Oppositionspartei die Machtübernahme. In diesem System wechselten Konservative und Liberale durch Wahlmanipulation ihre Machtposition. Sie nutzten ihre Verbindungen zu den lokalen Regierungen und dem Innenministerium, um ihre Macht zu sichern und kleinere Parteien an der Macht zu hindern."
SPR_an_empire_in_decline_idea:0 "Gefallenes Imperium"
SPR_an_empire_in_decline_idea_desc:0 "Seit dem 17. Jahrhundert befindet sich das spanische Reich im Niedergang. Eine Reihe schwacher Könige und die Konzentration auf die Kolonien statt auf den eigenen wirtschaftlichen Erfolg führten zu einem langsamen Niedergang des spanischen Reiches und seiner Wirtschaft. Napoleon, die Karlistenkriege und das Chaos der Ersten Republik beschleunigten den Untergang dieses einst so großen Reiches nur noch."
