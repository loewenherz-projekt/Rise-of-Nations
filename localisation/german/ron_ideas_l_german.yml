 internationalism:0 "Internationalismus"
 internationalism_desc:0 "Wir sind davon überzeugt, dass Ideologien nationale Grenzen überschreiten und fühlen uns nicht eingeschränkt, wenn wir diese Grenzen selbst überschreiten."
 combined_bomber_offensive:0 "Kombinierte Bomberoffensive"
 the_long_lance:0 "Die lange Lanze"
 the_long_lance_desc:0 "§LDer Torpedo Typ 93, allgemein als „Lange Lanze“ bezeichnet, war der fortschrittlichste Torpedo seiner Zeit. Er wurde von Japan entwickelt und vom Westen nie wirklich erreicht. Er bot kleineren Schiffen eine effektive Möglichkeit, größere, stärker gepanzerte Kriegsschiffe aus der Entfernung zu treffen.§!"
 volunteer_corps_focus:0 "Freiwilligenkorps"
 foreign_expeditions_focus:0 "Auslandsexpeditionen"
 why_we_fight_focus:0 "Warum wir kämpfen"
 partisan_suppression_focus:0 "Unterdrückung von Partisanen"
 imperial_austerity_idea:0 "Imperiale Sparmaßnahmen"
 student_mobilization_idea:0 "Studentenmobilisierung"
 spiritual_mobilization_idea:0 "Spirituelle Mobilisierung"
 spiritual_mobilization_idea_desc:0 "„Luxus ist unser Feind!“ Indem Sparsamkeit, Hygiene und harte Arbeit zu nationalen Tugenden erhoben werden, stehen mehr Arbeitskräfte für die Kriegsanstrengungen zur Verfügung."
 office_of_strategic_services:0 "Büro für strategische Dienste"
 office_of_strategic_services_desc:0 "§LDas Office of Strategic Services (OSS) war ein US-amerikanischer Geheimdienst, der während des Zweiten Weltkriegs gegründet wurde. Es war der Kriegsgeheimdienst und ein Vorgänger der Central Intelligence Agency (CIA).§!"
 nkvd:0 "NKWD"
 nkvd_desc:0 "§LNKWD, das Volkskommissariat für Innere Angelegenheiten, war eine Strafverfolgungsbehörde der Sowjetunion, die die Macht der Allunionskommunistischen Partei direkt ausübte. Es war außerdem mit dem Schutz der sowjetischen Grenzen und der Spionage beauftragt, was politische Morde im Ausland, die Einflussnahme auf ausländische Regierungen und die Durchsetzung stalinistischer Politik innerhalb kommunistischer Bewegungen in anderen Ländern einschloss.§!"
 nkvd_2:0 "NKWD"
 nkvd_2_desc:0 "§LNKWD, das Volkskommissariat für Innere Angelegenheiten, war eine Strafverfolgungsbehörde der Sowjetunion, die die Macht der Allunionskommunistischen Partei direkt ausübte. Es war außerdem mit dem Schutz der sowjetischen Grenzen und der Spionage beauftragt, was politische Morde im Ausland, die Einflussnahme auf ausländische Regierungen und die Durchsetzung stalinistischer Politik innerhalb kommunistischer Bewegungen in anderen Ländern einschloss.§!"
 idea_political_correctness:0 "Politische Korrektheit"
 idea_political_correctness_desc:0 "Menschen, die richtig denken, sind für ausländische Mächte viel schwerer zu beeinflussen."
 imperial_glory_idea:0 "Kaiserlicher Ruhm"
 warrior_traditions_idea:0 "Kriegertraditionen"
 for_the_emperor_idea:0 "Für den Kaiser!"
 indian_independence_promised_idea:0 "Indische Unabhängigkeit versprochen"
 war_bonds_focus:0 "Kriegsanleihen"
 liberty_ships_focus:0 "Liberty-Schiffe"
 air_war_plans_division_focus:0 "Abteilung für Luftkriegspläne"
 air_war_plans_division_focus_desc:0 "Nur durch die Luftüberlegenheit können die Achsenmächte besiegt werden. Langfristige Pläne für die Produktion und den Einsatz von Jagdflugzeugen und strategischen Bombern machen dies nicht nur möglich, sondern auch erreichbar."
 air_support_focus:0 "Luftunterstützung"
 strategic_bombing_focus:0 "Strategische Bombardierung"
 escort_effort_focus:0 "Eskortaufwand"
 comintern_influence:0 "Einfluss der Komintern"
 progress_cult_focus:0 "Fortschrittskult"
 socialist_science_focus:0 "Sozialistische Wissenschaft"
 peoples_commissariat_focus:0 "Volkskommissariat für Rüstungsindustrie"
 home_of_revolution:0 "Heimat der Revolution"
 home_of_revolution_desc:0 "Genossen, nach der Niederlage der niederträchtigen trotzkistischen Konterrevolutionäre konnten wir uns auf die Verteidigung der Revolution konzentrieren. Unser Ziel, unsere Hoffnung, unser Slogan lautet: Sozialismus in einem Land. Wir werden hier in der Sowjetunion eine sozialistische Utopie errichten, die der Rest der Welt unweigerlich annehmen wird."
 en_svensk_tiger:0 "En Svensk Tiger"
 en_svensk_tiger_desc:0 "Wenn Schweden wie ein Tiger auf der Jagd sein soll, dürfen diejenigen, die uns ausspionieren, nicht wissen, was wir tun. In diesen Zeiten der Konflikte und Unruhen ist es die patriotische Pflicht eines jeden Schweden, zu schweigen."
 state_shintoism:0 "Staats-Shintoismus"
 state_shintoism_desc:0 "Seit der Meiji-Restauration versuchen wir, die Anbetung in Shinto-Schreinen zu nutzen, um die Loyalität gegenüber dem Kaiser zu fördern und den Aufbau der Nation zu unterstützen. Dies hat es uns ermöglicht, ein Land aufzubauen, das bereit ist, im Namen des Staates große Opfer zu bringen. "
 vittoria_mutilata:0 "Vittoria Mutilata"
 vittoria_mutilata_desc:0 "Unsere Verbündeten haben Italien verraten und uns in den Rücken gefallen, als sie den Londoner Pakt brachen. Wir haben am Isonzo so viel Blut für ihren Sieg geopfert, und sie haben uns im Gegenzug verweigert, was uns rechtmäßig zustand. Jetzt wird Italien sein Schicksal selbst in die Hand nehmen und dafür sorgen, dass Gerechtigkeit herrscht."
 stiff_upper_lip:0 "Britischer Stoizismus"
 stiff_upper_lip_desc:0 "Wenn du einen klaren Kopf bewahren kannst, wenn alle um dich herum\nihren verlieren und dir die Schuld geben,\nwenn du Triumph und Katastrophe begegnen kannst\nund diese beiden Betrüger gleich behandelst\ngehört dir die Erde und alles, was darauf ist,\nund – was noch wichtiger ist – du wirst ein Mensch sein, mein Sohn. "
 trotskyite_plot:0 "Trotzkistische Verschwörung?"
 trotskyite_plot_desc:0 "Paranoia und pathologisches Misstrauen, die aus alten Machtkämpfen resultieren, wirken sich auf die Führung dieser Nation aus."
 trotskyite_plot_purged:0 "Trotzkistische Verschwörung gesäubert?"
 trotskyite_plot_purged_desc:0 "Trotz der Säuberungen bleibt die Angst vor Verrat bestehen."
 officers_purged:0 "Beamte entlassen"
 officers_purged_desc:0 "Die Säuberung der „Fünften Kolonne“ hat in den Reihen der Offiziere der Roten Armee tiefe Narben hinterlassen und es wird Jahre dauern, bis die Führung wieder aufgefüllt ist."
