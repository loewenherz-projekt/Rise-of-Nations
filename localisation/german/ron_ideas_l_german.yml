USA_jim_crow_laws2_desc:0 "Nachdem der Kompromiss von 1877 die Rekonstruktion in den ehemaligen Konföderierten Staaten beendet hatte, begannen Abgeordnete und lokale Beamte der Südstaaten, immer kreativere Wege zu finden, um ehemaligen Sklaven und freien Afroamerikanern ihre Rechte zu entziehen, denen der 13., 14. und 15. Zusatzartikel zur US-Verfassung, der nach dem Krieg vom Kongress verabschiedet worden war, Schutz gewährt hatte. Diese Gesetze werden umgangssprachlich als „Jim-Crow-Gesetze“ bezeichnet und bildeten die Grundlage für die Rassentrennung in den Vereinigten Staaten. Das jüngste Urteil im Fall Plessy gegen Ferguson untermauerte die Verfassungsmäßigkeit dieser Gesetze und verankerte die Doktrin „Getrennt aber gleich“. Die Entscheidung des Obersten Gerichtshofs machte praktisch jede Hoffnung zunichte, die Jim-Crow-Gesetze in naher Zukunft aufzuheben, und es ist unwahrscheinlich, dass der Status quo der Rassentrennung ohne radikalere Veränderungen in Frage gestellt wird."
USA_a_more_equal_republic:0 "Eine gleichberechtigtere Republik"
USA_a_more_equal_republic_desc:0 "Seit der Gründung der amerikanischen Republik wurden Schwarze unterdrückt, zunächst durch die Sklaverei und dann durch die sogenannten „Jim-Crow-Gesetze“. Es ist eine amerikanische Tragödie, und so sehr manche den alten kapitalistischen Staat auch verteidigen mögen, es war dieses „demokratische“ System, das einen großen Teil seiner eigenen Bevölkerung unterdrückte. Alle sollen wissen, dass [ROOT.GetCommunistParty] den Schwarzen dieser Nation gleiche Rechte gewährt hat!"
USA_scars_of_1865_lower:0 "Narben von 1865"
USA_scars_of_1865_lower_desc:0 "Obwohl fast ein halbes Jahrhundert vergangen ist, prägen die politischen Folgen des Bürgerkriegs das soziale und wirtschaftliche Leben vieler Amerikaner noch immer. Die kurze Phase des Wiederaufbaus in den Vereinigten Staaten trug zwar wesentlich dazu bei, eine zweite Sezession zu verhindern, beschwichtigte jedoch kaum den Zorn vieler Südstaatler über die Kriegsniederlage und schützte zudem kaum die Rechte vieler Afroamerikaner, die nach dem Krieg befreit wurden. Die Konföderiertenflagge weht immer noch, die Jim-Crow-Gesetze sind immer noch in Kraft, und nichts wurde unternommen, um zu verhindern, dass sich die Bildung im Süden auf die Idee der „verlorenen Sache“ konzentriert. Die Menschen im Norden mögen den verheerenden Konflikt hinter sich gelassen haben, die andere Hälfte der Nation steckt noch immer in den alten konföderierten Gefühlen fest."
USA_scars_of_1865_amplified:0 "Narben von 1865"
USA_scars_of_1865_amplified_desc:0 "Obwohl fast ein halbes Jahrhundert vergangen ist, prägen die politischen Folgen des Bürgerkriegs das soziale und wirtschaftliche Leben vieler Amerikaner noch immer. Die kurze Phase des Wiederaufbaus in den Vereinigten Staaten trug zwar wesentlich dazu bei, eine zweite Sezession zu verhindern, beschwichtigte jedoch kaum den Zorn vieler Südstaatler über die Kriegsniederlage und schützte zudem kaum die Rechte vieler Afroamerikaner, die nach dem Krieg befreit wurden. Die Entscheidung zur Konföderiertenflagge weht immer noch, die Jim-Crow-Gesetze sind immer noch in Kraft, und nichts wurde unternommen, um zu verhindern, dass sich die Bildung im Süden auf die Idee der „verlorenen Sache“ konzentriert. Die Menschen im Norden mögen den verheerenden Konflikt hinter sich gelassen haben, die andere Hälfte der Nation steckt noch immer in den alten konföderierten Gefühlen fest."
USA_scars_of_1865:0 "Narben von 1865"
USA_scars_of_1865_desc:0 "Obwohl fast ein halbes Jahrhundert vergangen ist, prägen die politischen Folgen des Bürgerkriegs das soziale und wirtschaftliche Leben vieler Amerikaner noch immer. Die kurze Phase des Wiederaufbaus in den Vereinigten Staaten trug zwar wesentlich dazu bei, eine zweite Sezession zu verhindern, beschwichtigte jedoch kaum den Zorn vieler Südstaatler über die Kriegsniederlage und schützte zudem kaum die Rechte vieler Afroamerikaner, die nach dem Krieg befreit wurden. Die Konföderiertenflagge weht immer noch, die Jim-Crow-Gesetze sind immer noch in Kraft, und nichts wurde unternommen, um zu verhindern, dass sich die Bildung im Süden auf die Idee der „verlorenen Sache“ konzentriert. Die Menschen im Norden mögen den verheerenden Konflikt hinter sich gelassen haben, die andere Hälfte der Nation steckt noch immer in den alten konföderierten Gefühlen fest."
USA_the_gold_standard:0 "Der Goldstandard"
USA_the_gold_standard_desc:0 "Seit der Gründung der Vereinigten Staaten ist der Goldstandard ein Symbol für das unerschütterliche Finanzsystem des Landes. Trotz Panik, Rezession, Depression und Krieg blieb der Goldstandard intakt und brachte eine stabile Währung und starkes Wirtschaftswachstum mit sich – zumindest vorerst natürlich …"
USA_american_imperialism:0 "Amerikanischer Imperialismus"
USA_american_imperialism_desc:0 "Nach fast 100 Jahren der Isolation in der Außenpolitik sind die Vereinigten Staaten endlich als globaler Machtmakler auf der Weltbühne aufgetreten. Der Sieg über das schwache spanische Imperium und die Eroberung Kubas und der Philippinen untermauern unsere gottgegebene Verpflichtung, diese Hemisphäre zu beherrschen. Es ist wahrlich die Erfüllung unserer Manifest Destiny."
USA_american_imperialism_improved:0 "Amerikanischer Imperialismus"
USA_american_imperialism_improved_desc:0 "Nach fast 100 Jahren der Isolation in der Außenpolitik sind die Vereinigten Staaten endlich als globaler Machtmakler auf der Weltbühne aufgetreten. Der Sieg über das schwache spanische Imperium und die Eroberung Kubas und der Philippinen untermauern unsere gottgegebene Verpflichtung, diese Hemisphäre zu beherrschen. Es ist wahrlich die Erfüllung unserer Manifest Destiny."


srcusa:0 "Südliche Wiederaufbauzone" 
USA_the_two_party_system:0 "Das Zweiparteiensystem"
USA_the_two_party_system1:0 "Das kaputte Parteiensystem"
USA_the_two_party_system0:0 "Das Zweiparteiensystem"
USA_the_two_party_system01:0 "Das Zweiparteiensystem"
USA_the_two_party_system_desc:0 "Obwohl die Vereinigten Staaten in ihrer Geschichte einige schwierige Phasen durchlebt haben, ist das Land – größtenteils – ein äußerst stabiles demokratisches System geblieben, nicht zuletzt aufgrund des Zweiparteiensystems. Im Gegensatz zur parlamentarischen Demokratie bietet das Parteiensystem den einzigartigen Vorteil, extremen politischen Ansichten stärkeren Schutz zu bieten und eine weitgehend konsistente Politik über lange Zeiträume hinweg zu gewährleisten. Aufgrund dieses fest verwurzelten Establishments ist es für kleinere und extremere Parteien sehr schwierig, in den USA an Bedeutung zu gewinnen – ohne ihre Ideen einer der „Großen Zwei“ anzuhängen."
USA_socialist_one_party_state:0 "Sozialistischer Einparteienstaat"
USA_socialist_one_party_state_desc:0 "Der Einparteienstaat sei die bessere Regierungsform, meinen die Demokraten."
USA_defender_of_communism:0 "Verteidiger des Kommunismus"
USA_defender_of_communism_desc:0 "Wir müssen alle kommunistischen Länder verteidigen, die angreifen."
USA_our_own_plan:0 "Unser eigener Vierjahresplan"
USA_our_own_plan_desc:0 "Durch die weitere Planung außerhalb unserer Branche können wir diese effizienter gestalten."
USA_influencing_soviets:0 "Beginnen Sie mit der Vorbereitung einer Invasion der UdSSR"
USA_influencing_soviets_desc:0 "Wir beginnen mit der Vorbereitung einer Invasion, indem wir die sowjetische Taktik studieren und sicherstellen, dass wir mehr als bereit sind."
USA_fully_industrialized_society:0 "Vollindustrialisierte Gesellschaft"
USA_fully_industrialized_society_desc:0 "Obwohl die USA nicht die erste Nation waren, die eine industrielle Revolution erlebte, hat die Industrialisierung wohl nirgendwo auf der Welt ein so großes Ausmaß erreicht wie in ihnen. Die USA sind das globale Zentrum für Fertigung, Produktion und Innovation und ihre Wirtschaft kann es mit der der größten europäischen Mächte aufnehmen."
USA_jeffersons_vision_idea:0 "Jeffersons Vision"
USA_jeffersons_vision_idea_desc:0 "Beschreibung erforderlich."
