 RON_EU_Trade_Sanctions_desc:0 "Gegen dieses Land gelten Handelssanktionen der Europäischen Union."
 RON_Arab_League_desc:0 "Dieses Land ist Mitglied der Arabischen Liga."
 RON_United_Nations_Security_Council_NP_desc:0 "Dieses Land ist nichtständiges Mitglied des Sicherheitsrats der Vereinten Nationen."
 RON_Atheism_desc:0 "Atheismus ist im weitesten Sinne der fehlende Glaube an die Existenz von Gottheiten. Weniger allgemein ausgedrückt ist Atheismus die Ablehnung des Glaubens an die Existenz von Gottheiten. Im engeren Sinne ist Atheismus die Ansicht, dass es keine Gottheiten gibt. Dem Atheismus steht der Theismus gegenüber, der in seiner allgemeinsten Form den Glauben an die Existenz mindestens einer Gottheit verkörpert."
 RON_Buddhism_desc:0 "Der Buddhismus ist die viertgrößte Religion der Welt. Über 520 Millionen Anhänger, das sind über 7 % der Weltbevölkerung, sind Buddhisten. Er umfasst eine Vielzahl von Traditionen, Glaubensrichtungen und spirituellen Praktiken, die größtenteils auf den ursprünglichen Lehren Buddhas und den daraus abgeleiteten Interpretationen seiner Philosophien beruhen. Er entstand im alten Indien irgendwann zwischen dem 6. und 4. Jahrhundert v. Chr. als Sramana-Tradition und verbreitete sich über weite Teile Asiens. Gelehrte unterscheiden im Allgemeinen zwei Hauptrichtungen des Buddhismus: Theravada (Pali; „Schule der Älteren“) und Mahayana (Sanskrit; „Das Große Fahrzeug“)."
 RON_Christianity_desc:0 "Der Protestantismus, der aus der Reformation hervorging, betont den individuellen Glauben, die Autorität der Heiligen Schrift und die Erlösung allein durch den Glauben. Er umfasst eine Vielzahl von Konfessionen mit jeweils unterschiedlichen Praktiken, vereint aber das Kernprinzip der Rückkehr zu den biblischen Wurzeln des Christentums."
 RON_Hinduism_desc:0 "Der Hinduismus ist eine indische Religion und Dharma bzw. Lebensweise, die auf dem indischen Subkontinent und in Teilen Südostasiens weit verbreitet ist. Der Hinduismus gilt als die älteste Religion der Welt und wird von manchen Anhängern und Gelehrten als Sanātana Dharma, „die ewige Tradition“ oder „der ewige Weg“, jenseits der Menschheitsgeschichte, bezeichnet. Wissenschaftler betrachten den Hinduismus als eine Fusion bzw. Synthese verschiedener indischer Kulturen mit unterschiedlichen Wurzeln und ohne eigenen Gründer. Diese „hinduistische Synthese“ begann sich zwischen 500 v. Chr. und 300 n. Chr., nach dem Ende der vedischen Periode (1500 bis 500 v. Chr.), zu entwickeln und erlebte ihre Blütezeit im Mittelalter mit dem Niedergang des Buddhismus in Indien."
 RON_Islam_desc:0 "Der Islam ist eine abrahamitische monotheistische Religion, die lehrt, dass es nur einen Gott (Allah) gibt und dass Mohammed dessen Gesandter ist. Er ist die zweitgrößte Religion der Welt mit über 1,8 Milliarden Anhängern oder 24,1 % der Weltbevölkerung, die als Muslime bezeichnet werden. In 49 Ländern stellen Muslime die Mehrheit der Bevölkerung. Der Islam lehrt, dass Gott barmherzig, allmächtig und einzigartig ist und die Menschheit durch Propheten, offenbarte Schriften und natürliche Zeichen geführt hat. Die wichtigsten heiligen Schriften des Islam sind der Koran, der als wörtliches Wort Gottes gilt, sowie die Lehren und normativen Beispiele (die sogenannte Sunna, bestehend aus Berichten, die als Hadithe bezeichnet werden) Mohammeds (ca. 570 – 8. Juni 632 n. Chr.)."
 RON_Judaism_desc:0 "Das Judentum ist eine ethnische Religion, die die kollektive religiöse, kulturelle und rechtliche Tradition und Zivilisation des jüdischen Volkes umfasst. Religiöse Juden betrachten das Judentum als Ausdruck des Bundes, den Gott mit den Kindern Israels geschlossen hat. Es umfasst eine breite Palette von Texten, Praktiken, theologischen Positionen und Organisationsformen. Die Thora ist Teil des größeren Textes, der als Tanach oder Hebräische Bibel bekannt ist, und ergänzt die mündliche Überlieferung durch spätere Texte wie den Midrasch und den Talmud. Mit 14,5 bis 17,4 Millionen Anhängern weltweit ist das Judentum die zehntgrößte Religion der Welt."
 RON_Shintoism_desc:0 "Shintoismus ist eine Religion mit japanischem Ursprung. Von Religionswissenschaftlern als ostasiatische Religion klassifiziert, betrachten seine Anhänger ihn oft als Japans ursprüngliche Religion und als Naturreligion. Gelehrte bezeichnen seine Anhänger manchmal als Shintoisten, obwohl die Anhänger selbst diesen Begriff selten verwenden. Es gibt keine zentrale Autorität, die die Bewegung kontrolliert, und unter den Anhängern herrscht große Vielfalt."
 RON_African_Union_desc:0 "Dieses Land ist Mitglied der Afrikanischen Union."
