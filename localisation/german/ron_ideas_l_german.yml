guerrilla_warfare_vin:0 "Guerillakrieg"
guerrilla_warfare_vin_desc:0 "Wenn sie sich zurückziehen, verfolgen wir sie; wenn sie sich ausruhen, greifen wir an; wenn sie lagern, plündern wir sie. Aufgrund unseres nationalen Terrains sind wir in der Lage, uns gegen den stärksten Feind zu verteidigen, solange wir nicht in offene Kämpfe verwickelt sind."
communists_in_the_north:0 "Kommunisten im Norden"
communists_in_the_north_desc:0 "Die Popularität des Kommunismus hat zugenommen, insbesondere nach der Rückkehr Ho Chin Minhs aus China. Dies mag uns Vorteile bringen, wie etwa ausgebildete Militärgruppen, die unser Land bei Bedarf vor ausländischen Bedrohungen verteidigen. Doch genau das kann auch zum Problem werden, wenn sie zu viel Macht im Land erlangen."
sects_in_the_south:0 "Sekten im Süden"
sects_in_the_south_desc:0 "Im Gegensatz zum Norden ist der Süden Vietnams politisch sehr vielfältig. Es gibt nicht nur Trotzkisten, die derzeit mit den Kommunisten des Nordens konkurrieren, sondern auch nationalistische Gruppen sowie religiöse Gruppen wie die Đao Cao und die Hòa Hao. Letztere sind sogar so einflussreich, dass einige unserer Generäle diesen Organisationen statt unserer Regierung die Treue geschworen haben. Natürlich kann dies in Zukunft zum Problem werden, aber es ist derzeit hilfreich, wenn die Menschen einen Glauben haben, der ihren Kampfeswillen stärkt."
