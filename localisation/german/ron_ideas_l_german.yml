between_the_sword_and_the_red_wall:0 "Zwischen Schwert und Roter Wand"
between_the_sword_and_the_red_wall_desc:0 "Nach Maos Ankunft in Shaanxi und der Eroberung Mengkukuos durch Japan ist unser Land von potenziellen Feinden umzingelt, von denen keiner schwach genug ist, um von uns allein besiegt zu werden. Wenn wir wollen, dass unser Land weiterbesteht, müssen wir ein starkes Bündnis schließen. Bis dahin werden unsere tapferen Soldaten es schützen, koste es, was es wolle."
native_mercenary_army:0 "Einheimische Söldnerarmeen"
native_mercenary_army_desc:0 "1936 begann unsere Armee, Einheimische aus Shanxi einzuziehen, um ihre Größe zu erhöhen. Die Rekrutierung aller Soldaten belastete jedoch unsere Staatskasse, und ein Verzicht darauf könnte zu einem Massenaustritt aus unseren Streitkräften führen. Ob sich das lohnt, müssen wir noch herausfinden."
anti_japanese_intellectuals:0 "Antijapanische Intellektuelle"
anti_japanese_intellectuals_desc:0 "Aufgrund unserer Grenzen zu Japan sind viele Antijapaner aus Nordostchina geflohen und haben hier in Shanxi Zuflucht gefunden. Dieser Zustrom an Menschen war zwar schwer zu bewältigen, hat uns aber aufgrund der vielen Intellektuellen unter ihnen und der vielen Menschen, die wahrscheinlich bereit sind, bei der nun unvermeidlichen Invasion gegen Japan zu kämpfen, sehr geholfen. \n§RDie Unterwerfung unter Japan oder der Beitritt zu dessen Fraktion wird die antijapanischen Intellektuellen dazu veranlassen, unser Land zu verlassen.§!"
break_the_sword:0 "Zerbrich das Schwert"
break_the_sword_desc:0 "Wir werden versuchen, die Kommunisten nicht zu verärgern und mit Nanjing zusammenzuarbeiten, um die japanischen Samurai zu besiegen."
learning_from_the_sword:0 "Vom Schwert lernen"
learning_from_the_sword_desc:0 "Wir werden eine Zusammenarbeit mit den Japanern anstreben, um unser Land zu modernisieren und die Kommunisten aus China zu vertreiben."
the_biggest_wall:0 "Die größte Mauer"
the_biggest_wall_desc:0 "Wir werden eine Zusammenarbeit mit der Sowjetunion anstreben, um den Kommunismus nach China zu bringen."
the_new_wall:0 "Die Neue Mauer"
the_new_wall_desc:0 "Unser Ziel ist es, den Kommunismus auf eigene Faust und gegen alle Widerstände nach China zu bringen."
