 RAJ_risk_of_famine_desc:1 "Das indische System der Nahrungsmittelproduktion ist sehr fragil. Schon eine kleine Unterbrechung kann einen Zusammenbruch verursachen."
 RAJ_famine:0 "Hungersnot"
 RAJ_famine_desc:0 "Inkompetenz, Gleichgültigkeit und eklatante Korruption in der Kolonialregierung und bei der indischen Eisenbahn haben aus einer schwierigen Situation eine regelrechte Katastrophe gemacht. Das Land wird noch Monate darunter leiden."
