 AUH_ww1_Multinational_State:0 "Multinationaler Staat"
 AUH_ww1_Multinational_State_desc:0 "Anders als die meisten Länder dieser Zeit ist Österreich-Ungarn kein nationalistisch organisierter Staat, sondern ein Relikt alter Ehen und Thronerbschaften, die dem Reich einen kulturellen Flickenteppich an Territorien bescherten. In jüngster Zeit streben viele unterworfene Nationalitäten des Reiches nach Unabhängigkeit, was dem österreichischen Staat schadet."
 ITA_ww1_Risorgimento:0 "Risorgimento"
 ITA_ww1_Risorgimento_desc:0 "Das Risorgimento (auch bekannt als Italienische Einigung) war die politische und soziale Bewegung, die verschiedene Staaten der italienischen Halbinsel zu einem einzigen Staat, dem Königreich Italien, zusammenschloss. Die Erinnerung an dieses Ereignis sowie der darauf folgende Irridentismus sind eine treibende Kraft sowohl für die italienische Einheit als auch für die Politik."
 ww1_Faith_Allah:0 "Glaube an Allah"
 ww1_Faith_Allah_desc:0 "Im Koran befiehlt Allah den Gläubigen, vereint zu sein, sich im Glauben zu vereinen, einander als Brüder zu betrachten und zu lieben, zu vergeben und zu beschützen und Zersplitterung, Spaltung und Zerstreuung entschieden zu vermeiden. Die osmanische Hegemonie in Mekka sowie der Titel des Sultans als Kalif des Islam zeugen vom Glauben ihrer Regierung."
 ww1_Scramble_for_Africa:0 "Wettlauf um Afrika"
 ww1_Scramble_for_Africa_desc:0 "Die Rivalität zwischen Großbritannien, Frankreich, Deutschland und den anderen europäischen Mächten ist für einen Großteil der Spannungen zwischen den Großmächten dieser Zeit verantwortlich. Da nur noch Bruchstücke unbeanspruchter Gebiete übrig sind, hallen die Forderungen nach der Annexion ausländischer Kolonien bereits auf unseren Straßen wider."
 AUH_ww1_House_Habsburg_Lorraine:0 "Haus Habsburg-Lothringen"
 AUH_ww1_House_Habsburg_Lorraine_desc:0 "Das Haus Habsburg-Lothringen ist eines der einflussreichsten Königshäuser Europas und die Herrscherdynastie Österreich-Ungarns. Die lange Thronfolge dieser Familie verleiht ihr die nötige Legitimität, ihre Herrschaft aufrechtzuerhalten, sofern sie diese überhaupt aufrecht erhalten kann."
 GER_ww1_North_German_Confederation:0 "Erbe des Norddeutschen Bundes"
 GER_ww1_North_German_Confederation_desc:0 "Nachdem Preußen jahrelang eine untergeordnete Rolle im deutschen Machtbereich gespielt hatte, gründete es den Norddeutschen Bund und etablierte sich als führende Macht in Deutschland, bevor es schließlich das Reich vereinigte. Dieses Ereignis ist noch heute in lebendiger Erinnerung und spiegelt sich noch heute in den Gesetzen und im Stolz unseres Volkes wider."
 
 RUS_ww1_orthodox_church:0 "Ostorthodoxe Kirche"
 RUS_ww1_orthodox_church_desc:0 "Die Mehrheit der ostorthodoxen Christen lebt in Griechenland, Osteuropa, dem Kaukasus und Russland."
 
 RUS_ww1_mixed_railways:0 "Begrenzte Eisenbahninfrastruktur"
 RUS_ww1_mixed_railways_desc:0 "Teilweise aufgrund der schlechten Finanzlage der zaristischen Regierung und ihrer Unfähigkeit, den Eisenbahnbau zu finanzieren, waren Anfang der 1880er Jahre alle Eisenbahnen Privatunternehmen. Als private Eisenbahnen jedoch in finanzielle Schwierigkeiten gerieten, übernahm der Staat einige von ihnen, was zu einem gemischten System aus privaten und staatlichen Eisenbahnen führte."

 FRA_ww1_Revanchism:0 "Revanchismus"
 FRA_ww1_Revanchism_desc:0 "Nach dem Deutsch-Französischen Krieg von 1870 wollten viele Nationalisten die französische Niederlage rächen und die verlorenen Gebiete Elsass-Lothringen zurückerobern."
 
 
 vietnamese_guerrillas:0 "Guerilla-Taktiken"
 vietnamese_guerrillas_desc:0 "Guerillakrieg ist eine Form der irregulären Kriegsführung, bei der kleine Gruppen von Kämpfern, wie paramilitärische Kräfte, bewaffnete Zivilisten oder irreguläre Truppen, militärische Taktiken wie Hinterhalte, Sabotage, Überfälle, Kleinkriegsführung, Hit-and-Run-Taktiken und Mobilität einsetzen, um gegen eine größere und weniger mobile traditionelle Armee zu kämpfen. Guerillagruppen sind eine Art gewalttätiger nichtstaatlicher Akteure."
 
 denazification:0 "Entnazifizierung"
 denazification_desc:0 "Die Entnazifizierung war eine Initiative der Alliierten, um die deutsche und österreichische Gesellschaft, Kultur, Presse, Wirtschaft, Justiz und Politik von der nationalsozialistischen Ideologie (dem Nationalsozialismus) zu befreien. Sie erfolgte durch die Entfernung ehemaliger NSDAP- oder SS-Mitglieder aus Macht- und Einflusspositionen und durch die Auflösung oder Außerkraftsetzung der mit dem Nationalsozialismus verbundenen Organisationen. Das Entnazifizierungsprogramm wurde nach dem Ende des Zweiten Weltkriegs eingeleitet und im August 1945 durch das Potsdamer Abkommen konkretisiert."
 
 
 operation_paperclip:0 "Operation Büroklammer"
 operation_paperclip_desc:0 "Bei der Operation Paperclip handelte es sich um ein geheimes Programm der Joint Intelligence Objectives Agency (JIOA), das größtenteils von Spezialagenten des Army CIC durchgeführt wurde. Im Rahmen dieses Programms wurden vor allem zwischen 1945 und 1959 über 1.600 deutsche Wissenschaftler, Ingenieure und Techniker, darunter Wernher von Braun und sein V2-Raketenteam, von Deutschland in die Vereinigten Staaten gebracht, um dort für die US-Regierung zu arbeiten. Viele von ihnen waren ehemalige Mitglieder, einige sogar ehemalige Anführer der NSDAP."
 
 operation_paperclip_usa:0 "Operation Büroklammer"
 operation_paperclip_usa_desc:0 "Bei der Operation Paperclip handelte es sich um ein geheimes Programm der Joint Intelligence Objectives Agency (JIOA), das größtenteils von Spezialagenten des Army CIC durchgeführt wurde. Im Rahmen dieses Programms wurden vor allem zwischen 1945 und 1959 über 1.600 deutsche Wissenschaftler, Ingenieure und Techniker, darunter Wernher von Braun und sein V2-Raketenteam, von Deutschland in die Vereinigten Staaten gebracht, um dort für die US-Regierung zu arbeiten. Viele von ihnen waren ehemalige Mitglieder, einige sogar ehemalige Anführer der NSDAP."
 
 operation_osoaviakhim_sov:0 "Operation Osoaviakhim"
 operation_osoaviakhim_sov_desc:0 "Die Operation Ossoawjakhim war eine sowjetische Operation, die am 22. Oktober 1946 stattfand, als Einheiten des NKWD und der sowjetischen Armee mit vorgehaltener Waffe mehr als 2.200 deutsche Spezialisten – insgesamt mehr als 6.000 Menschen, einschließlich ihrer Familienangehörigen – aus der sowjetischen Besatzungszone des Nachkriegsdeutschlands verschleppten, um sie in der Sowjetunion zu beschäftigen."

 operation_osoaviakhim:0 "Operation Osoaviakhim"
 operation_osoaviakhim_desc:0 "Die Operation Ossoawjakhim war eine sowjetische Operation, die am 22. Oktober 1946 stattfand, als Einheiten des NKWD und der sowjetischen Armee mit vorgehaltener Waffe mehr als 2.200 deutsche Spezialisten – insgesamt mehr als 6.000 Menschen, einschließlich ihrer Familienangehörigen – aus der sowjetischen Besatzungszone des Nachkriegsdeutschlands verschleppten, um sie in der Sowjetunion zu beschäftigen."

 b_n_surrender_idea:0 "Von einer Atombombe getroffen"
 b_n_surrender_idea_desc:0 "Aufstände auf den Straßen! Die Menschen haben Angst vor einem weiteren möglichen Atomangriff!"
 b_n_surrender_idea_2:0 "Von einer weiteren Atombombe getroffen"
 b_n_surrender_idea_2_desc:0 "Ihr Land hat mehrere Atomangriffe erlitten, Ihr Volk sehnt sich nach Frieden!"
 
