 buy_american_act:0 "Kaufen Sie American Act"
 buy_american_act_desc:0 "Der „Buy American Act“, der 1933 vom Kongress verabschiedet und von Präsident Hoover an seinem letzten Tag im Amt (3. März 1933) unterzeichnet wurde, verpflichtete die US-Regierung, bei ihren Einkäufen bevorzugt in den USA hergestellte Produkte zu verwenden. Andere Bundesgesetze erweitern ähnliche Anforderungen auf Käufe Dritter, die mit Bundesmitteln finanziert werden, wie etwa Autobahn- und Transitprogramme."
 
