philippine_commonwealth:0 "Philippinisches Commonwealth"
philippine_commonwealth_desc:0 "Nach der Gründung des philippinischen Commonwealth im Jahr 1935 versprachen die Amerikaner dem Land einen friedlichen Übergang zur vollständigen Unabhängigkeit sowie einen großen Spielraum in der Autonomie während dieses Prozesses. Ob sie diese Versprechen erfüllen werden, bleibt abzuwarten."
philippine_commonwealth2:0 "Philippinisches Commonwealth"
philippine_commonwealth2_desc:0 "Nach der Gründung des philippinischen Commonwealth im Jahr 1935 versprachen die Amerikaner dem Land einen friedlichen Übergang zur vollständigen Unabhängigkeit sowie einen großen Spielraum in der Autonomie während dieses Prozesses. Heute scheint die Freiheit näher denn je."
mass_poberty_in_the_countryside:0 "Massenarmut auf dem Land"
mass_poberty_in_the_countryside_desc:0 "Rund 80 % der philippinischen Bauern sind derzeit obdachlos, sei es, weil ihr Haus dem Grundbesitzer gehört oder weil sie nicht genug Geld verdienen, um sich ein anständiges Zuhause leisten zu können. Die Beschwerden dieser Pächter beruhen oft auf Schulden, die durch das Pachtsystem und die hohen amerikanischen Steuern verursacht werden. Wir müssen etwas tun, um diese Situation zu lindern, nicht nur zum Wohle unseres Volkes, sondern auch, weil diese Probleme die Popularität der Kommunisten und Sakdalisten täglich steigern. \n§GDiese Idee wird abgeschafft, sobald wir zehn oder mehr zivile Fabriken besitzen.§!"
political_guerrillas:0 "Politisierte Guerillas"
political_guerrillas_desc:0 "Die kommunistische Hukbalahap, die islamistischen Moros und die nationalistischen Sakdalisten haben eines gemeinsam: Sie sind bewaffnete Guerillakämpfer, die sich gegen die amerikanische Herrschaft im Land stellen. Wir hatten bereits 1935 einen großen Aufstand der Sakdalisten, und seit dem 19. Jahrhundert kommt es immer wieder zu Gefechten mit den Moros. Dennoch bringt die Existenz dieser Guerillakämpfer nicht nur Nachteile mit sich, denn genau wie sie heute gegen die Amerikaner kämpfen, werden sie auch gerne gegen jede andere Nation kämpfen, die es wagt, in ihr Heimatland einzudringen."
political_guerrillas2:0 "Politisierte Guerillas"
political_guerrillas2_desc:0 "Die kommunistische Hukbalahap, die islamistischen Moros und die nationalistischen Sakdalisten haben eines gemeinsam: Sie sind bewaffnete Guerillakämpfer, die sich gegen die amerikanische Herrschaft im Land stellen. Wir hatten bereits 1935 einen großen Aufstand der Sakdalisten, und seit dem 19. Jahrhundert kommt es immer wieder zu Gefechten mit den Moros. Dennoch bringt die Existenz dieser Guerillakämpfer nicht nur Nachteile mit sich, denn genau wie sie heute gegen die Amerikaner kämpfen, werden sie auch gerne gegen jede andere Nation kämpfen, die es wagt, in ihr Heimatland einzudringen."
political_guerrillas2:0 "Philippinische Guerillas"
political_guerrillas2_desc:0 "Die kommunistische Hukbalahap, die islamistischen Moros und die nationalistischen Sakdalisten haben eines gemeinsam: Sie sind bewaffnete Guerillas, die sich der amerikanischen Herrschaft im Land widersetzen. Wir hatten bereits 1935 einen großen Aufstand der Sakdalisten, und seit dem 19. Jahrhundert kommt es immer wieder zu Auseinandersetzungen mit den Moros. Dennoch sind sie bereit, gegen jede andere Nation zu kämpfen, die es wagt, in ihr Heimatland einzudringen."
political_guerrillas2:0 "Philippinische Miliz"
political_guerrillas2_desc:0 "Die kommunistische Hukbalahap, die islamistischen Moros und die nationalistischen Sakdalisten haben eines gemeinsam: Sie sind bewaffnete Guerillas, die sich der amerikanischen Herrschaft im Land widersetzen. Wir hatten bereits 1935 einen großen Aufstand der Sakdalisten, und seit dem 19. Jahrhundert kommt es immer wieder zu Auseinandersetzungen mit den Moros. Dennoch sind sie bereit, gegen jede andere Nation zu kämpfen, die es wagt, in ihr Heimatland einzudringen."
