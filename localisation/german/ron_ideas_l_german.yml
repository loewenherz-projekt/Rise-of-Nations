 neutrality_idea:0 "Neutrale Außenpolitik"
 neutrality_idea_desc:0 "Neutralität wird manchmal als feige Haltung angesehen, doch dieses Land vertraut darauf, dass es denjenigen, die sich nicht auf eine Seite gestellt haben, besser gehen wird als denen, die es getan haben, wenn sich der Staub gelegt hat."
 anti_soviet_pact:0 "Antisowjetischer Pakt"
 anti_soviet_pact_refused_call:0 "Weigerte sich, den antisowjetischen Pakt einzuhalten"
 anti_soviet_pact_refused_call_desc:0 "Dieses Land hat den Antisowjetpakt nicht eingehalten, als es in den Krieg gerufen wurde. Dies hat in der Bevölkerung Zweifel an der gegenwärtigen Regierung geweckt und die Zahl der kommunistischen Anhänger erhöht."
 anti_soviet_pact_desc:1 "Wenn ein Land des Pakts von der Sowjetunion angegriffen wird, werden alle anderen Mitglieder zum Krieg aufgerufen. Mitglieder, die sich bereits im Krieg mit der Sowjetunion befinden, werden nicht aufgerufen."
