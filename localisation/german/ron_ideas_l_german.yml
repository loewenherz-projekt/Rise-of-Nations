independence_2_desc:0 "Nach dem großen Korea-Aufstand im Jahr 1920 erlangten wir unsere Unabhängigkeit, indem wir Guerillakrieg und Einkreisungstaktiken gegen die japanischen Invasoren einsetzten. Dies machte unser Volk stolzer auf unsere Nation und stärkte seine Bereitschaft, für die Bewahrung ihrer Unabhängigkeit zu kämpfen."
