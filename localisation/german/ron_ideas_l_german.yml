 irrelevant_power:0 "Irrelevantes Land"
 irrelevant_country:0 "Dieses Land übt derzeit keinen großen Einfluss auf die Weltpolitik aus."
 regional_power:0 "Regionale Macht"
 regional_power_desc:0 "In den internationalen Beziehungen wird der Begriff Regionalmacht seit dem späten 20. Jahrhundert für einen Staat verwendet, der innerhalb einer geografischen Region Macht ausübt. Staaten, die in einer Region der Welt über unübertroffene Macht und Einfluss verfügen, besitzen regionale Hegemonie."
 emerging_power:0 "Steigende Macht"
 emerging_power_desc:0 "Der Begriff „aufstrebende Macht“ bezeichnet den wachsenden Einfluss einer Nation – oder eines Staatenbundes –, deren Präsenz in der Weltpolitik stetig zunimmt. Eine solche Macht strebt eine stärkere Position oder Rolle in den internationalen Beziehungen an, sei es regional oder global, und verfügt über ausreichende Ressourcen und einen Entwicklungsstand, um diese Ziele potenziell zu erreichen."
 great_power:0 "Große Macht"
 great_power_desc:0 "Eine Großmacht ist ein souveräner Staat, der über die Fähigkeit und das Fachwissen verfügt, seinen Einfluss auf globaler Ebene geltend zu machen. Großmächte verfügen typischerweise über militärische und wirtschaftliche Stärke sowie diplomatischen und Soft-Power-Einfluss, was dazu führen kann, dass mittlere oder kleine Mächte die Meinung der Großmächte berücksichtigen, bevor sie eigene Maßnahmen ergreifen. Theoretiker der internationalen Beziehungen gehen davon aus, dass sich der Status einer Großmacht anhand von Machtfähigkeiten, räumlichen Aspekten und Statusdimensionen charakterisieren lässt."
 super_power:0 "Supermacht"
 super_power_desc:0 "Eine Supermacht ist ein Staat mit einer beherrschenden Stellung, die sich durch seine umfassende Fähigkeit auszeichnet, Einfluss auszuüben oder Macht auf globaler Ebene zu projizieren. Dies geschieht durch die Kombination wirtschaftlicher, militärischer, technologischer und kultureller Stärke sowie diplomatischer und Soft-Power-Einfluss."
 hyper_power:0 "Hyperkraft"
 hyper_power_desc:0 "Eine Hypermacht ist ein Staat, der alle anderen Staaten in allen Bereichen (d. h. Militär, Kultur, Wirtschaft) dominiert und als eine Stufe über einer Supermacht gilt."
 
