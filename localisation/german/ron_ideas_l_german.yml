GER_german_colonies:0 "Deutsche Kolonien"
GER_german_colonies_desc:0 "Das Deutsche Kolonialreich umfasste die überseeischen Kolonien, abhängigen Gebiete und Territorien des deutschen Kaiserreichs. Den etablierten Kaufleuten und Plantagenbesitzern in den afrikanischen Kolonien gelang es häufig, die Regierungspolitik zu beeinflussen. Kapitalanlagen von Banken wurden mit öffentlichen Mitteln der Reichskasse abgesichert, um das Risiko zu minimieren. Während Frankreich und England Maßnahmen zur Verbreitung ihrer Sprachen und Kultur ergriffen, beschränkte Deutschland die Verwendung der deutschen Sprache auf eine kleine Zahl elitärer Kolonialisten. Kolonien wurden als Überflussgebiet für deutsche Siedler betrachtet und nicht als Gebiete, die es zu erschließen und denen schließlich Autonomie oder Unabhängigkeit zu gewähren galt."
GER_bloated_naval_budget1:0 "Aufgeblähter Marinehaushalt"
GER_bloated_naval_budget1_desc:0 "Deutschland litt unter einem aufgeblähten Staatshaushalt bei der Schiffsproduktion. Der Konsumgütersektor litt stark, doch die Schiffsproduktion schoss in die Höhe."
