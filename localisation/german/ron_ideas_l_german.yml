 RAJ_azad_hind_desc:0 "Die von den Feinden Großbritanniens unterstützte Regierung des Freien Indiens strebt die Befreiung Indiens an. Gemeinsam mit Japan versucht sie, die europäische Herrschaft zu untergraben, in der Hoffnung, einen selbstverwalteten indischen Staat zu errichten."
