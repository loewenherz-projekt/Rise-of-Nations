a_proud_nation:0 "Die letzte Ilje Sidae"
a_proud_nation_desc:0 "Ilje Sidae, was so viel bedeutet wie „japanische Kolonialzeit“, ist ein Ereignis, das sich in der koreanischen Geschichte nicht wiederholen darf. Jeder Koreaner wird seinen Teil zur Verteidigung seiner Nation beitragen, selbst wenn dies den Tod vor der Unterwerfung bedeutet."
a_proud_nation_2:0 "Die letzte Ilje Sidae"
a_proud_nation_2_desc:0 "Ilje Sidae, was so viel bedeutet wie „japanische Kolonialzeit“, ist ein Ereignis, das sich in der koreanischen Geschichte nicht wiederholen darf. Jeder Koreaner wird seinen Teil zur Verteidigung seiner Nation beitragen, selbst wenn dies den Tod vor der Unterwerfung bedeutet."
destroyed_army:0 "Zerstörte Armee"
destroyed_army_desc:0 "Die koreanische Armee wurde nach Beginn der japanischen Besatzung von den japanischen Streitkräften aufgelöst. Heute besteht die koreanische Armee nur noch aus einer Gruppe halbunabhängiger Milizen unter der Führung ehemaliger Generäle oder Guerillaführer, deren einziges gemeinsames Ziel die Verteidigung Koreas vor ausländischen Invasionen ist. Dennoch enden Konflikte zwischen unterschiedlichen politischen Ideologien damit, dass Milizen sich gegenseitig im Kampf ihrem Schicksal überlassen oder sich Guerillas gegenseitig bekämpfen. Um unser Land verteidigen zu können, müssen wir eine Berufsarmee ausbilden oder die Milizen unter einem gemeinsamen Kommando vereinen."
struggling_economy:0 "Schwierige Wirtschaft"
struggling_economy_desc:0 "Die koreanische Wirtschaft wurde seit Beginn der japanischen Besatzung ausgebeutet, weshalb das Wirtschaftswachstum in Korea nur dürftig war. Wir müssen versuchen, uns wie die Japaner zu industrialisieren, bevor wir gegenüber dem Rest der Welt ins Hintertreffen geraten."
