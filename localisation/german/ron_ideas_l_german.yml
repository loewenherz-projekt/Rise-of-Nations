BRA_political_turmoil:0 "Politische Turbulenzen"
BRA_political_turmoil_desc:0 "Eine Revolution im Jahr 1930, ein Bürgerkrieg im Jahr 1932 und ein kommunistischer Putschversuch im Jahr 1935 stürzten Brasilien in eine Phase politischer Unruhen. Getúlio Vargas wurde 1930 zum Interimspräsidenten ernannt und 1934 demokratisch vom Kongress gewählt. Die Lage des Landes verbesserte sich, doch alles verschlechterte sich, als die zunehmende Unterstützung der kommunistischen Aliança Nacional Libertadora den Putschversuch von 1935 auslöste. Vargas und die Armee verhängten daraufhin den Belagerungszustand über Brasilien. Dies und die Auswirkungen der Weltwirtschaftskrise zeichnen ein düsteres Bild für Brasiliens Zukunft."
BRA_political_turmoil_getulio:0 "Politische Turbulenzen"
BRA_political_turmoil_getulio_desc:0 "Eine Revolution im Jahr 1930, ein Bürgerkrieg im Jahr 1932 und ein kommunistischer Putschversuch im Jahr 1935 stürzten Brasilien in eine Phase politischer Unruhen. Getúlio Vargas wurde 1930 zum Interimspräsidenten ernannt und 1934 demokratisch vom Kongress gewählt. Die Lage des Landes verbesserte sich, doch alles verschlechterte sich, als die zunehmende Unterstützung der kommunistischen Aliança Nacional Libertadora den Putschversuch von 1935 auslöste. Vargas und die Armee verhängten daraufhin den Belagerungszustand über Brasilien. Dies und die Auswirkungen der Weltwirtschaftskrise zeichnen ein düsteres Bild für Brasiliens Zukunft."
