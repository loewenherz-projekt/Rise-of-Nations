the_indochinese_war_vin:0 "Indochinesischer Krieg"
the_indochinese_war_vin_desc:0 "Einen Konflikt auslösen, um unsere Dominanz zu behaupten und unseren Einfluss in der Region auszuweiten, was möglicherweise zu einem umfassenden Krieg und der Umstrukturierung unserer Gebiete führen könnte."
guerrilla_warfare_vin:0 "Guerillakrieg"
guerrilla_warfare_vin_desc:0 "Setzen Sie Taktiken der unkonventionellen Kriegsführung ein und konzentrieren Sie sich auf Blitzangriffe, Sabotage und Hinterhalte, um die feindlichen Streitkräfte, die unser Territorium besetzen, zu schwächen und zu stören."
guerrilla_warfare_vin_2:0 "Verbesserte Guerillakriegsführung"
guerrilla_warfare_vin_2_desc:0 "Wir müssen unsere Guerillataktiken weiterentwickeln und verfeinern und so unsere Fähigkeit verbessern, die feindlichen Streitkräfte zu schwächen, Verluste zu minimieren und in den von ihnen besetzten Gebieten Instabilität zu erzeugen."
communists_in_the_north:0 "Kommunisten im Norden"
communists_in_the_north_desc:0 "Gehen Sie dem wachsenden Einfluss des Kommunismus in den nördlichen Regionen mit ideologischen Kampagnen, militärischen Aktionen und Unterdrückung entgegen und versuchen Sie, die Verbreitung kommunistischer Ansichten einzudämmen."
communist_guerrilla_training_desc:0 "Kommunistische Guerilla-Ausbildung"
communist_guerrilla_training_desc:0 "Bilden Sie kommunistische Sympathisanten aus und organisieren Sie sie zu effektiven Guerillaeinheiten, die in der Lage sind, die Kontrolle des Feindes zu untergraben, Sabotageakte durchzuführen und lokale Unterstützung zu mobilisieren."
communist_revolts_desc:0 "Kommunistische Aufstände"
communist_revolts_desc:0 "Begegnen Sie der Gefahr groß angelegter kommunistischer Aufstände, indem Sie die Sicherheitsmaßnahmen verstärken, Aufstandsbekämpfungsoperationen durchführen und potenzielle Revolten unterdrücken."
sects_in_the_south:0 "Sekten im Süden"
sects_in_the_south_desc:0 "Dem Aufstieg religiöser Sekten in den südlichen Regionen muss durch eine Kombination aus Propaganda, Sozialprogrammen und begrenzten Zugeständnissen begegnet werden, um die Stabilität aufrechtzuerhalten und eine Radikalisierung zu verhindern."
private_armies:0 "Privatarmeen"
private_armies_desc:0 "Bekämpfen Sie das Problem privater bewaffneter Gruppen und Milizen, indem Sie strengere Vorschriften durchsetzen, nicht autorisierte Kräfte entwaffnen und die Macht unter der Zentralregierung festigen."
anti_communist_front:0 "Antikommunistische Front"
anti_communist_front_desc:0 "Bilden Sie eine Einheitsfront gegen kommunistische Elemente, indem Sie antikommunistische Fraktionen und Einzelpersonen zusammenbringen, um dem kommunistischen Einfluss entgegenzuwirken und bei der Landesverteidigung zusammenzuarbeiten."
anti_communist_militias:0 "Antikommunistische Milizen"
anti_communist_militias_desc:0 "Organisieren und trainieren Sie antikommunistische Milizen, um bei der Aufrechterhaltung von Recht und Ordnung zu helfen, Gemeinschaften zu schützen und zur allgemeinen Sicherheit der Nation beizutragen."
molotov_cocktail:0 "Molotowcocktails"
molotov_cocktail_desc:0 "Statten Sie unsere Truppen mit Molotowcocktails aus, improvisierten Brandsätzen, die im Nahkampf eingesetzt werden können, um die Effektivität der Infanterie gegen feindliche Streitkräfte und Befestigungen zu erhöhen."
lunge_mines:0 "Ausfallminen"
lunge_mines_desc:0 "Entwickeln und platzieren Sie sogenannte „Lunge Mines“, Sprengsätze, die in feindlichem Gebiet platziert werden können, um feindliche Bewegungen zu stören, Chaos zu stiften und mechanisierten Einheiten erheblichen Schaden zuzufügen."
cao_dai:0 "Einfluss von Cao Dai"
cao_dai_desc:0 "Pflegen Sie Verbindungen zur religiösen Bewegung der Cao Dai, um Unterstützung zu gewinnen, die Stabilität zu erhöhen und die Moral zu stärken, während Sie gleichzeitig den Einfluss radikalerer Elemente eindämmen."
cao_dai_2:0 "Schirmherrschaft von Cao Dai"
cao_dai_2_desc:0 "Vertiefen Sie unsere Beziehung zu den Cao Dai, indem Sie ihnen Ressourcen und Unterstützung im Austausch für ihre Loyalität, Hilfe und gemeinsamen Ziele zur Verfügung stellen."
cao_dai_3:0 "Cao Dai-Allianz"
cao_dai_3_desc:0 "Bilden Sie eine strategische Allianz mit den Cao Dai und festigen Sie unsere Zusammenarbeit durch gemeinsame Initiativen, gegenseitige Verteidigungsabkommen und koordinierte Bemühungen gegen gemeinsame Gegner."
cao_dai_4:0 "Cao Dai-Partnerschaft"
cao_dai_4_desc:0 "Heben Sie unsere Partnerschaft mit den Cao Dai auf eine neue Ebene, indem Sie ihren Einfluss und ihre Ressourcen in unsere Governance, Sicherheit und strategische Entscheidungsfindung integrieren."
hoa_hao:0 "Hoa Hao-Bewegung"
hoa_hao_desc:0 "Engagieren Sie sich in der Hoa-Hao-Bewegung, um ihre Unterstützung zu gewinnen, die Stabilität zu verbessern und potenzielle Bedrohungen zu mindern, während Sie gleichzeitig einer Radikalisierung vorbeugen und die Kontrolle behalten."
hoa_hao_2:0 "Hoa Hao Kooperation"
hoa_hao_2_desc:0 "Führen Sie Kooperationsmaßnahmen mit den Hoa Hao ein, fördern Sie ein gemeinsames Zielbewusstsein, bieten Sie Anreize zur Zusammenarbeit und stellen Sie ihre Loyalität gegenüber der Nation sicher."
hoa_hao_3:0 "Hoa Hao Integration"
hoa_hao_3_desc:0 "Integrieren Sie die Hoa Hao-Bewegung in unsere nationale Struktur und gewähren Sie ihr Vertretung, Einfluss und Verantwortung in unserer Regierung, Sicherheit und unseren sozialen Initiativen."
VIN_vegetarianism:0 "Kampagne für Vegetarismus"
VIN_vegetarianism_desc:0 "Fördern Sie den Vegetarismus und setzen Sie sich für einen geringeren Fleischkonsum ein, um die öffentliche Gesundheit zu stärken, Ressourcen zu schonen und das allgemeine Wohlbefinden der Bevölkerung zu verbessern."
securing_our_legacy:0 "Sicherung unseres Erbes"
securing_our_legacy_desc:0 "Setzen Sie eine Reihe von Maßnahmen um, um unseren Einfluss zu festigen, abweichende Meinungen zu unterdrücken und die historische Erzählung zu gestalten, um ein dauerhaftes Erbe unserer Herrschaft sicherzustellen."
