 undisturbed_isolation_desc:0 "Das Land erholt sich noch immer von der Weltwirtschaftskrise und der Dürreperiode und baut seine Infrastruktur langsam wieder auf. Die amerikanische Industrie arbeitet meist nur mit halber Kapazität und wird dies auch weiterhin tun, sofern nicht größere Ereignisse das Land aus seiner Lethargie reißen."
