 RON_Commonwealth_desc:0 "Dieses Land ist Mitglied des Commonwealth of Nations"
 RON_Euro_desc:0 "Dieses Land hat den Euro als offizielle Währung eingeführt."
 RON_European_Union_desc:0 "Dieses Land ist Mitglied der Europäischen Union"
