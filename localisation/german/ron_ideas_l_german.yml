 RON_Accept_Ideological_Differences:0 "Ideologische Flexibilität"
 RON_Accept_Ideological_Differences_desc:0 "Die Idee „Der Feind meines Feindes ist mein Freund“ wurde im Zweiten Weltkrieg in verschiedenen Formen als Außenpolitik der Alliierten umgesetzt. In Europa herrschten häufig Spannungen zwischen den Westalliierten und der Sowjetunion. Trotz ihrer Differenzen erkannten sie die Notwendigkeit der Zusammenarbeit, um der Bedrohung durch die Nazi-Aggression unter der Führung Adolf Hitlers zu begegnen."
 
 RON_Hirohito:0 "Kaiser Hirohito"
 RON_Hirohito_desc:0 "Hirohito war der 124. Kaiser Japans gemäß der traditionellen Thronfolge. Er regierte als Kaiser des Japanischen Kaiserreichs vom 25. Dezember 1926 bis zum 2. Mai 1947 und des Staates Japan vom 3. Mai 1947 bis zu seinem Tod am 7. Januar 1989. Sein Nachfolger wurde sein fünftes Kind und ältester Sohn Akihito. Hirohito und seine Frau, Kaiserin Kojun, hatten sieben Kinder, zwei Söhne und fünf Töchter. In Japan werden regierende Kaiser nur als „der Kaiser“ bezeichnet. Heute wird er hauptsächlich mit seinem posthumen Namen Shōwa bezeichnet, der Bezeichnung der Ära, die mit seiner Herrschaft zusammenfällt; aus diesem Grund ist er auch als Shōwa-Kaiser oder Kaiser Shōwa bekannt. 1979 war Hirohito der einzige Monarch der Welt mit dem monarchischen Titel „Kaiser“. Hirohito war der am längsten lebende und am längsten regierende japanische Kaiser und einer der am längsten regierenden Monarchen der Welt."
 
 FIN_Njet_Molotoff:0 "Njet Molotoff"
 FIN_Njet_Molotoff_desc:0 "Die Hartnäckigkeit des finnischen Volkes, sowohl der Militärs als auch der Zivilisten, angesichts eines überlegenen Gegners."

