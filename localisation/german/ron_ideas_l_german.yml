YPF:0 "YPF"
infamous_decade:0 "Das berüchtigte Jahrzehnt"
infamous_decade_desc:0 "Der Begriff „berüchtigtes Jahrzehnt“ wurde vom Periodenwissenschaftler José Luis Torres geprägt, um die aktuelle Periode der argentinischen Politik zu beschreiben. Seit dem 1930er Putsch gegen das autoritäre Regime von Präsident Hipólito Yrigoyen wird Argentinien von einer Militärjunta regiert, die von Konservativen und Sozialisten gegen die „Unión Cívica Radical“ (Radikale Bürgerunion) unterstützt wird. Heute ist Argentinien eine der vielen Diktaturen, die Lateinamerika plagen, und es sieht nicht so aus, als würde sich daran etwas ändern, zumindest vorerst nicht."
infamous_decade_2:0 "Das berüchtigte Jahrzehnt"
infamous_decade_2_desc:0 "Der Begriff „das berüchtigte Jahrzehnt“ wurde vom Periodenwissenschaftler José Luis Torres geprägt, um die aktuelle Phase der argentinischen Politik zu beschreiben. Seit dem 1930er Putsch gegen das autoritäre Regime von Präsident Hipólito Yrigoyen wurde Argentinien von einer Militärjunta regiert, die von Konservativen und Sozialisten gegen die „Unión Cívica Radical“ (Radikale Bürgerunion) unterstützt wurde. Die Regierung tendiert nun zur Demokratie, doch die Angst vor einer erneuten Diktatur bleibt bestehen."
roca_runciman_pact:0 "Roca-Runciman-Pakt"
roca_runciman_pact_desc:0 "Das 1933 zwischen Argentinien und Großbritannien unterzeichnete Wirtschaftsabkommen zwang Argentinien im Wesentlichen dazu, alle Zölle auf britische Exporte nach Argentinien aufzuheben, britische Unternehmen „sanft“ zu behandeln und ein Monopol auf argentinische Transporte nach England zu erhalten. All dies, um weiterhin Fleisch an die Briten verkaufen zu können, und das zu einem deutlich niedrigeren Preis als üblich. Der Vertrag ist in der Bevölkerung absolut demütigend und unpopulär, doch ein Verzicht darauf würde den Zusammenbruch der argentinischen Fleischexporte und damit den Zusammenbruch unserer Wirtschaft bedeuten. \n§RDiese Idee wird gestrichen, wenn Argentinien mit Großbritannien im Krieg ist, das Vereinigte Königreich Untertan ist oder nicht existiert.§!"
