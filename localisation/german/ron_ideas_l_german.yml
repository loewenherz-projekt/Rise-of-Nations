 RI_rule_by_decree:0 "Herrschaft durch Dekret"
 RI_rule_by_decree_desc:0 "Herrschaft per Dekret ist ein Regierungsstil, der die schnelle, unangefochtene Verkündung von Gesetzen durch eine einzelne Person oder Gruppe ermöglicht und vor allem von Diktatoren, absoluten Monarchen und Militärführern angewandt wird. Der Ausdruck wird manchmal auch verwendet, um Handlungen demokratischer Regierungen zu beschreiben, die als ungebührlich der parlamentarischen oder öffentlichen Kontrolle entgehend wahrgenommen werden. Herrschaft per Dekret erlaubt es dem Herrscher, Gesetze willkürlich zu ändern, ohne die Zustimmung einer gesetzgebenden Versammlung zu erhalten. Wenn ein Ausnahmezustand, wie beispielsweise das Kriegsrecht, herrscht, ist Herrschaft per Dekret üblich. Obwohl Herrschaft per Dekret leicht den Launen und der Korruption des Machthabers unterliegt, ist sie auch höchst effizient; es kann Wochen oder Monate dauern, bis ein Gesetz in einer gesetzgebenden Versammlung verabschiedet wird, aber ein per Dekret regierender Führer kann es problemlos ändern. Das macht diese Methode in Notsituationen so wertvoll. Daher ist sie in vielen Verfassungen erlaubt, darunter in der französischen, argentinischen, indischen und ungarischen."
 
