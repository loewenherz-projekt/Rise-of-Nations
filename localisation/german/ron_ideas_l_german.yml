FRA_Colonial_Holdings_desc:0 "Das französische Kolonialreich umfasste die überseeischen Kolonien, Protektorate und Mandatsgebiete, die ab dem 16. Jahrhundert unter französische Herrschaft kamen. Man unterscheidet im Allgemeinen zwischen dem „Ersten Französischen Kolonialreich“, das bis 1814 existierte und zu diesem Zeitpunkt größtenteils verloren gegangen oder verkauft war, und dem „Zweiten Französischen Kolonialreich“, das mit der Eroberung Algiers 1830 begann. Auf seinem Höhepunkt war das Zweite Französische Kolonialreich eines der größten Reiche der Geschichte. Einschließlich des französischen Mutterlandes erreichte die Gesamtfläche unter französischer Souveränität im Jahr 1920 11.500.000 km² (4.400.000 Quadratmeilen), mit einer Bevölkerung von 110 Millionen Menschen im Jahr 1936."
FRA_Dreyfus_Divide_desc:0 "Die Dreyfus-Affäre war ein politischer Skandal, der die Dritte Französische Republik von 1894 bis zu ihrer Beilegung im Jahr 1906 spaltete. „L’Affaire“, wie die Affäre auf Französisch heißt, ist in der frankophonen Welt zum Symbol moderner Ungerechtigkeit geworden und bleibt eines der bemerkenswertesten Beispiele für einen komplexen Justizirrtum und Antisemitismus. Die Rolle der Presse und der öffentlichen Meinung erwies sich in diesem Konflikt als einflussreich. Der Skandal begann im Dezember 1894, als Hauptmann Alfred Dreyfus wegen Hochverrats verurteilt wurde. Dreyfus war ein 35-jähriger elsässischer Artillerieoffizier jüdischer Abstammung. Er wurde zu lebenslanger Haft verurteilt, weil er angeblich französische Militärgeheimnisse an die deutsche Botschaft in Paris weitergegeben hatte, und auf der Teufelsinsel in Französisch-Guayana inhaftiert, wo er fast fünf Jahre verbrachte."
FRA_Catholic_Controlled_Press_desc:0 "La Croix ist eine französische Tageszeitung für allgemeines Interesse. Sie erscheint in Paris und wird in ganz Frankreich vertrieben. Die Auflage betrug 2018 87.000 Exemplare. In wichtigen politischen Fragen vertritt sie weder eine explizit linke noch eine rechte Position; vielmehr vertritt die Zeitung die Position der Kirche. La Croix sollte jedoch nicht mit einer religiösen Zeitung verwechselt werden – ihre Themen sind von allgemeinem Interesse: Weltnachrichten, Wirtschaft, Religion und Spiritualität, Erziehung, Kultur und Wissenschaft."
GER_Prussian_Dominance_desc:0 "Die Vereinigung Deutschlands zum Deutschen Reich, einem von Preußen dominierten Nationalstaat mit föderalen Merkmalen, erfolgte offiziell am 18. Januar 1871 im Spiegelsaal des Schlosses Versailles in Frankreich. Dort versammelten sich die Fürsten der deutschen Staaten, um Wilhelm von Preußen nach der französischen Kapitulation im Deutsch-Französischen Krieg zum Kaiser des Deutschen Reiches auszurufen."
GER_Well_Connected_Railways_desc:0 "Die deutsche Vereinigung im Jahr 1871 förderte die Konsolidierung, die Verstaatlichung in Staatsunternehmen und weiteres schnelles Wachstum.[11] Anders als in Frankreich bestand das Ziel in der Förderung der Industrialisierung. Daher durchzogen stark befahrene Strecken das Ruhrgebiet und andere Industriegebiete und boten gute Verbindungen zu den großen Häfen Hamburg und Bremen. 1880 verfügte Deutschland über 9.400 Lokomotiven, die jährlich 43.000 Passagiere oder 30.000 Tonnen Fracht beförderten, und überholte Frankreich. Preußen verstaatlichte seine Eisenbahnen, um sowohl die Frachtpreise zu senken als auch diese Preise unter den Verladern anzugleichen. Statt die Preise so weit wie möglich zu senken, betrieb die Regierung die Eisenbahnen als gewinnorientiertes Unternehmen, und die Gewinne der Eisenbahnen wurden zu einer wichtigen Einnahmequelle des Staates. Die Verstaatlichung der Eisenbahnen bremste die wirtschaftliche Entwicklung Preußens, da der Staat beim Ausbau seiner Eisenbahnen die relativ rückständigen landwirtschaftlichen Gebiete bevorzugte. Darüber hinaus ersetzten die Eisenbahnüberschüsse die Entwicklung eines angemessenen Steuersystems."
GER_Small_Empire_desc:0 "Das deutsche Kolonialreich umfasste die überseeischen Kolonien, abhängigen Gebiete und Gebiete des deutschen Kaiserreichs. Es wurde Anfang der 1870er Jahre vereinigt und Reichskanzler war Otto von Bismarck. In den Jahrhunderten zuvor hatte es kurzlebige Kolonisierungsversuche einzelner deutscher Staaten gegeben, doch entscheidende Kolonialbemühungen begannen erst 1884 mit dem Wettlauf um Afrika. Deutschland beanspruchte einen Großteil der übrig gebliebenen, nicht kolonisierten Gebiete Afrikas und errichtete nach Großbritannien und Frankreich das damals drittgrößte Kolonialreich. Das deutsche Kolonialreich umfasste Teile mehrerer afrikanischer Länder, darunter Teile des heutigen Burundi, Ruanda, Tansania, Namibia, Kamerun, Gabun, Kongo, der Zentralafrikanischen Republik, des Tschad, Nigeria, Togo, Ghana, Neuguinea und zahlreicher weiterer Inseln im Westpazifik und Mikronesien."

