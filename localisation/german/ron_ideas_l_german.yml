europes_barn:0 "Europas Scheune"
europes_barn_desc:0 "Aufgrund der hohen Getreideproduktion unseres Landes können wir einen großen Teil davon in viele Länder Europas exportieren. Dies trägt natürlich erheblich zu den Einnahmen unseres Staates bei."
UKR_power_struggles:0 "Machtkämpfe"
UKR_power_struggles_desc:0 "Faschistische Guerillas der OUN, kommunistische Offiziere, anarchistische Milizen, Skoropadskyis Kosaken und republikanische Soldaten arbeiteten zusammen, um den sowjetischen Dämon zu besiegen. Doch dieser Waffenstillstand zwischen den Ideologien endete im selben Moment, in dem sie ihren gemeinsamen Feind besiegten. Eine dieser Fraktionen muss ihre Macht festigen, bevor wir erneut in einen Bürgerkrieg verfallen."
memories_of_the_holodomor:0 "Erinnerungen an den Holodomor"
memories_of_the_holodomor_desc:0 "Holodomor, was auf Ukrainisch „Verhungern“ bedeutet, war eine Hungersnot, die von 1932 bis 1933 wütete und den Tod von rund 3,5 Millionen Ukrainern sowie die beinahe vollständige Ausrottung der ukrainischen Bevölkerung im Kuban-Gebiet und Stalingrad zur Folge hatte. Es handelte sich angeblich um eine von Menschen verursachte Hungersnot, die unter anderem durch die Ablehnung externer Hilfe, die Beschlagnahmung aller Lebensmittel und die Einschränkung der Bewegungsfreiheit der Bevölkerung verursacht wurde. Dies führte zu einer zunehmenden antikommunistischen und antirussischen Stimmung in der Ukraine, was zumindest im Moment von Vorteil sein könnte."
UKR_no_more_famines:0 "Erinnerungen an den Holodomor"
UKR_no_more_famines_desc:0 "Holodomor, was auf Ukrainisch „Verhungern“ bedeutet, war eine Hungersnot, die von 1932 bis 1933 wütete und den Tod von rund 3,5 Millionen Ukrainern zur Folge hatte. Die ukrainische Bevölkerung im Kuban-Gebiet und in Stalingrad wurde beinahe ausgerottet. Es handelte sich angeblich um eine von Menschen verursachte Hungersnot, die unter anderem durch die Ablehnung externer Hilfe, die Beschlagnahmung aller Lebensmittel und die Einschränkung der Bewegungsfreiheit der Bevölkerung verursacht wurde. Wir werden dafür sorgen, dass unser Volk so etwas nie wieder erleben muss."
remember_the_reason:0 "Erinnerungen an den Holodomor"
remember_the_reason_desc:0 "Holodomor, was auf Ukrainisch „Verhungern“ bedeutet, war eine Hungersnot, die von 1932 bis 1933 wütete und den Tod von rund 3,5 Millionen Ukrainern sowie die beinahe vollständige Ausrottung der ukrainischen Bevölkerung im Kuban-Gebiet und Stalingrad zur Folge hatte. Es handelte sich angeblich um eine von Menschen verursachte Hungersnot, die auf Faktoren wie die Ablehnung externer Hilfe, die Beschlagnahmung aller Lebensmittel und die Einschränkung der Bewegungsfreiheit zurückzuführen war. Doch wir dürfen nie den Grund dafür vergessen: Russland und der Stalinismus."
memories_of_the_holodomor_dem:0 "Erinnerungen an den Holodomor"
memories_of_the_holodomor_dem_desc:0 "Holodomor, was auf Ukrainisch „Verhungern“ bedeutet, war eine Hungersnot, die von 1932 bis 1933 wütete und den Tod von rund 3,5 Millionen Ukrainern sowie die beinahe vollständige Ausrottung der ukrainischen Bevölkerung im Kuban-Gebiet und Stalingrad zur Folge hatte. Es handelte sich angeblich um eine von Menschen verursachte Hungersnot, die unter anderem durch die Ablehnung ausländischer Hilfe, die Beschlagnahmung aller Lebensmittel und die Einschränkung der Bewegungsfreiheit der Bevölkerung verursacht wurde. Wir müssen unser Land vor Invasoren schützen, damit uns so etwas nicht noch einmal passiert."
memories_of_the_holodomor_fascism:0 "Erinnerungen an den Holodomor"
memories_of_the_holodomor_fascism_desc:0 "Holodomor, was auf Ukrainisch „Verhungern“ bedeutet, war eine Hungersnot, die von 1932 bis 1933 wütete und den Tod von rund 3,5 Millionen Ukrainern sowie die beinahe vollständige Ausrottung der ukrainischen Bevölkerung im Kuban-Gebiet und Stalingrad zur Folge hatte. Es handelte sich angeblich um eine von Menschen verursachte Hungersnot, die auf Faktoren wie die Ablehnung ausländischer Hilfe, die Beschlagnahmung aller Lebensmittel und die Einschränkung der Bewegungsfreiheit zurückzuführen war. Und wir werden es den Russen heimzahlen."
memories_of_the_holodomor_hetman:0 "Erinnerungen an den Holomodor"
memories_of_the_holodomor_hetman_desc:0 "Holodomor, was auf Ukrainisch „Verhungern“ bedeutet, war eine Hungersnot, die von 1932 bis 1933 wütete und den Tod von rund 3,5 Millionen Ukrainern sowie die beinahe vollständige Ausrottung der ukrainischen Bevölkerung im Kuban-Gebiet und Stalingrad zur Folge hatte. Es handelte sich angeblich um eine von Menschen verursachte Hungersnot, die auf die Ablehnung ausländischer Hilfe, die Beschlagnahmung aller Lebensmittel und die Einschränkung der Bewegungsfreiheit zurückzuführen war. Die Schuld trugen nicht die Russen, sondern waren ein Plan der Kommunisten und Stalins, uns zu vernichten. Wir werden das nie vergessen."
memories_of_the_holodomor_kingdom:0 "Erinnerungen an den Holomodor"
memories_of_the_holodomor_kingdom_desc:0 "Holodomor, was auf Ukrainisch „Verhungern“ bedeutet, war eine Hungersnot, die von 1932 bis 1933 wütete und den Tod von rund 3,5 Millionen Ukrainern zur Folge hatte. Die ukrainische Bevölkerung im Kuban-Gebiet und in Stalingrad wurde beinahe ausgerottet. Es handelte sich angeblich um eine von Menschen verursachte Hungersnot, die unter anderem durch die Ablehnung ausländischer Hilfe, die Beschlagnahmung aller Lebensmittel und die Einschränkung der Bewegungsfreiheit der Bevölkerung verursacht wurde. Wir werden dafür sorgen, dass die Russen uns so etwas nie wieder antun."
