stalinist_terror_4:0 "Stalinistischer Terror"
stalinist_terror_4_desc:0 "Der NKWD und stalinistische Unterstützer in der Mongolei begannen mit Säuberungen in der MAN und der Armee, um die Unabhängigkeitsbestrebungen der Mongolei zu unterbinden. Die größten Verluste erlitten buddhistische Geistliche, Aristokraten, die Intelligenz, politische Dissidenten sowie ethnische Burjaten und Kasachen. Und sie alle haben es verdient."
