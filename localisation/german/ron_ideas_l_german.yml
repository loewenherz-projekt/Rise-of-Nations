 GRE_battle_for_the_bosporus:0 "Kampf um den Bosporus"
 GRE_battle_for_the_bosporus_desc:0 "Die Schlacht um den Bosporus hat begonnen, und wir sind im Vorteil! Wir müssen so hart wie möglich kämpfen, solange wir können, damit der Sieg so gut wie sicher ist!"
