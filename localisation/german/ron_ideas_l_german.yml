superstate_size_traits:0 "Politische Macht"
superstate_size1:0 "Machtloses Land"
superstate_size1_desc:0 "Dieses Land hat derzeit keinen Einfluss auf die Weltpolitik."
superstate_size2:0 "Irrelevantes Land"
superstate_size2_desc:0 "Dieses Land übt derzeit keinen großen Einfluss auf die Weltpolitik aus."
superstate_size3:0 "Regionale Macht"
superstate_size3_desc:0 "In den internationalen Beziehungen wird der Begriff Regionalmacht seit dem späten 20. Jahrhundert für einen Staat verwendet, der innerhalb einer geografischen Region Macht ausübt. Staaten, die in einer Region der Welt über konkurrenzlose Macht und Einfluss verfügen, besitzen regionale Hegemonie."
superstate_size4:0 "Steigende Macht"
superstate_size4_desc:0 "Der Begriff „aufstrebende Macht“ bezeichnet den wachsenden Einfluss einer Nation – oder eines Staatenbundes –, deren Präsenz in der Weltpolitik stetig zunimmt. Eine solche Macht strebt eine stärkere Position oder Rolle in den internationalen Beziehungen an, sei es regional oder global, und verfügt über ausreichende Ressourcen und einen Entwicklungsstand, um diese Ziele potenziell zu erreichen."
superstate_size5:0 "Große Macht"
superstate_size5_desc:0 "Eine Großmacht ist ein souveräner Staat, der über die Fähigkeit und das Fachwissen verfügt, seinen Einfluss auf globaler Ebene geltend zu machen. Großmächte verfügen typischerweise über militärische und wirtschaftliche Stärke sowie diplomatischen und Soft-Power-Einfluss, was dazu führen kann, dass mittlere oder kleine Mächte die Meinung der Großmächte berücksichtigen, bevor sie eigene Maßnahmen ergreifen. Theoretiker der internationalen Beziehungen gehen davon aus, dass sich der Status einer Großmacht anhand von Machtfähigkeiten, räumlichen Aspekten und Statusdimensionen charakterisieren lässt."
superstate_size6:0 "Super Power"
superstate_size6_desc:0 "Eine Supermacht ist ein Staat mit einer beherrschenden Stellung, die sich durch seine umfassende Fähigkeit auszeichnet, Einfluss auszuüben oder Macht auf globaler Ebene zu projizieren. Dies geschieht durch die Kombination wirtschaftlicher, militärischer, technologischer und kultureller Stärke sowie diplomatischer und Soft-Power-Einfluss."
superstate_size7:0 "Hyperkraft"
superstate_size7_desc:0 "Eine Hypermacht ist ein Staat, der alle anderen Staaten in allen Bereichen (d. h. Militär, Kultur, Wirtschaft) dominiert und als eine Stufe über einer Supermacht gilt."

