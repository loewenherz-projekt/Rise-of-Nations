spending_none_wounded:0 "Keine Gesundheitsausgaben: Für die Gesundheitsversorgung von Veteranen werden keine Mittel bereitgestellt. Folglich wird jede Woche kein Veteran behandelt. Dies wird wahrscheinlich zu anhaltendem Leiden und Schwierigkeiten für unsere verwundeten Veteranen führen."

spending_tiny_wounded:0 "Geringe Gesundheitsausgaben: Für die Gesundheitsversorgung von Veteranen werden nur minimale Mittel bereitgestellt, sodass jede Woche 50 Veteranen behandelt werden können. Obwohl einige Fortschritte erzielt wurden, werden viele Veteranen weiterhin vor großen Herausforderungen stehen, eine angemessene Versorgung zu erhalten."

spending_small_wounded:0 "Geringe Gesundheitsausgaben: Eine kleine, aber spürbare Investition in die Gesundheitsversorgung von Veteranen ermöglicht es, jede Woche 100 Veteranen zu behandeln. Diese Ausgabenhöhe trägt dazu bei, die Gesundheit und die Wiedereingliederungschancen einer überschaubaren Anzahl von Veteranen zu verbessern."

spending_medium_wounded:0 "Mittlere Gesundheitsausgaben: Mit moderaten Mitteln können wöchentlich 200 Veteranen medizinisch versorgt werden. Diese Unterstützung verbessert das Wohlbefinden und die Genesungsrate unserer verwundeten Veteranen erheblich und erleichtert ihnen die Rückkehr ins Zivilleben."

spending_large_wounded:0 "Hohe Gesundheitsausgaben: Dank erheblicher Investitionen in die Gesundheitsversorgung können wöchentlich 300 Veteranen behandelt werden. Dieses robuste Unterstützungssystem fördert den Genesungsprozess und die gesellschaftliche Wiedereingliederung einer großen Zahl von Veteranen erheblich."

spending_huge_wounded:0 "Hohe Gesundheitsausgaben: Dank eines großen Engagements für die Veteranengesundheitsversorgung können jede Woche 500 Veteranen behandelt werden. Diese hohen Ausgaben stellen sicher, dass die große Mehrheit unserer verwundeten Veteranen die benötigte Versorgung erhält, was ihre Lebensqualität verbessert und die Belastung der Gesellschaft verringert."

spending_massive_wounded:0 "Massive Gesundheitsausgaben: Umfangreiche Mittel für die Veteranenversorgung stellen sicher, dass jede Woche 1.000 Veteranen geheilt werden. Dieses beispiellose Maß an Unterstützung garantiert eine umfassende Versorgung aller unserer verwundeten Veteranen, fördert ihre Genesung erheblich und erleichtert ihnen die Rückkehr ins Zivilleben."

