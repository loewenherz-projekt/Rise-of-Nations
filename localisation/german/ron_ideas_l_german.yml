 defcon:0 "DEFCON"
 defcon_desc:0 "Der Verteidigungsbereitschaftszustand (DEFCON) ist ein Alarmzustand der US-Streitkräfte. Das DEFCON-System wurde vom Joint Chiefs of Staff (JCS) und den einheitlichen und spezifizierten Kampfkommandos entwickelt. Es schreibt fünf abgestufte Bereitschaftsstufen (oder Alarmzustände) für das US-Militär vor. Der Schweregrad steigert sich von DEFCON 5 (am wenigsten schwerwiegend) bis DEFCON 1 (am schwerwiegendsten), um unterschiedlichen militärischen Situationen gerecht zu werden."
 defcon1:0 "DEFCON 1"
 defcon1_desc:0 "Ein Atomkrieg steht unmittelbar bevor. Maximale Bereitschaft."
 defcon2:0 "DEFCON 2"
 defcon2_desc:0 "Nächster Schritt zum Atomkrieg. Streitkräfte sind in weniger als 6 Stunden einsatzbereit."
 defcon3:0 "DEFCON 3"
 defcon3_desc:0 "Erhöhung der Truppenbereitschaft über das für die normale Bereitschaft erforderliche Maß hinaus. Luftwaffe in 15 Minuten mobilisierungsbereit."
 defcon4:0 "DEFCON 4"
 defcon4_desc:0 "Verstärkte Geheimdienstüberwachung und verstärkte Sicherheitsmaßnahmen. Überdurchschnittliche Bereitschaft."
 defcon5:0 "DEFCON 5"
 defcon5_desc:0 "Niedrigster Bereitschaftszustand. Normale Bereitschaft."
 nodefcon:0 "Nicht verfügbar"
 nodefcon_desc:0 "Diese Funktion ist für den Einsatz im Kalten Krieg und in der Neuzeit vorgesehen."
 
