PAR_standard_oil:0 "Standard Oil Co."
learnings_of_the_chaco_war:0 "Erkenntnisse aus dem Chaco-Krieg"
learnings_of_the_chaco_war_desc:0 "Obwohl die Bolivianer besser ausgerüstet waren, eine größere Armee hatten und sogar eine deutsche Militärmission an ihrer Seite hatten, wurden sie von unserer Armee besiegt und gedemütigt. Wie besiegte David Goliath? In diesem Fall durch Einkesselungsfeldzüge. Unsere erfahrenen Generäle lehnten die Doktrin des Ersten Weltkriegs ab und begannen, die bolivianischen Armeen einzukesseln und anzugreifen, während diese sich in ihren Verteidigungsstellungen verschanzten. Dies verschaffte uns die Oberhand und den Sieg im Krieg. Und sollten die Bolivianer es jemals wieder wagen, uns anzugreifen, werden wir noch besser auf das raue Gelände und das heiße Klima des Chaco vorbereitet sein."
guarani_communications:0 "Guarani Communications"
guarani_communications_desc:0 "Seit der Unabhängigkeit Paraguays wurde die Guaraní-Sprache in verschiedenen Regierungsbereichen verwendet, bis sie nach dem Ende des Dreibundkrieges aufgrund der Niederlage gegen die Invasionsarmeen verboten wurde. Im Chaco-Krieg wurde sie jedoch wieder in der Armee eingesetzt und erwies sich als hervorragendes Verschlüsselungsmittel. Nur Argentinien, Brasilien und Paraguay haben einen nennenswerten Anteil an Guaraní-Bevölkerung, doch nur wir sind eine zweisprachige Nation geworden."
veterans_of_the_chaco:0 "Veteranen des Chaco"
veterans_of_the_chaco_desc:0 "Im Chaco-Krieg wurden Zehntausende unserer tapferen Soldaten verwundet und kehrten ohne jegliche Belohnung, nur mit Schulden, verlorenen Kameraden und geschwächten Beinen nach Hause zurück. Zudem gab es im Chaco nicht so viel Öl wie gedacht, sodass 50.000 unserer tapferen Männer für trockenes Weideland starben. Dies hat zu großer Unzufriedenheit unter unseren Bürgern und Soldaten geführt und den Glauben an die Demokratie getrübt. Wenn die Regierung nichts dagegen unternimmt, ist es mehr als wahrscheinlich, dass eine weitere Diktatur in Südamerika herrschen wird, diesmal jedoch in unserem Heimatland."
veterans_of_the_chaco_2:0 "Veteranen des Chaco"
veterans_of_the_chaco_2_desc:0 "Im Chaco-Krieg wurden Zehntausende unserer tapferen Soldaten verwundet und kehrten ohne jegliche Belohnung, nur mit Schulden, verlorenen Kameraden und geschwächten Kräften nach Hause zurück. Zudem gab es im Chaco nicht so viel Öl wie gedacht, sodass 50.000 unserer tapferen Männer für trockenes Weideland starben. Dies hat zu großer Unzufriedenheit unter unseren Soldaten und unserem Volk geführt und den Glauben an die Demokratie getrübt. Wir müssen etwas tun, um ihnen zumindest das Vertrauen in unsere Regierung zurückzugeben."
veterans_of_the_chaco_3:0 "Veteranen des Chaco"
veterans_of_the_chaco_3_desc:0 "Im Chaco-Krieg wurden Zehntausende unserer tapferen Soldaten verwundet und kehrten ohne jegliche Belohnung, nur mit Schulden, verlorenen Kameraden und geschwächten Kräften nach Hause zurück. Zudem gab es im Chaco nicht so viel Öl wie gedacht, sodass 50.000 unserer tapferen Männer für trockenes Weideland starben. Dies hat zu großer Unzufriedenheit unter unseren Soldaten und unserem Volk geführt und den Glauben an die Demokratie getrübt. Wir müssen etwas tun, um ihnen zumindest das Vertrauen in unsere Regierung zurückzugeben."
