guerrilla_warfare_vin_3a_desc:0 "Wenn sie sich zurückziehen, verfolgen wir sie; wenn sie sich ausruhen, greifen wir an; wenn sie lagern, plündern wir sie. Dank unseres Landes können wir uns auch gegen den stärksten Feind verteidigen, solange wir nicht in offene Kämpfe verwickelt sind. Doch jetzt sind wir besser als zuvor darauf vorbereitet, die feindlichen Streitkräfte bei Bedarf in offene Kämpfe zu verwickeln."
