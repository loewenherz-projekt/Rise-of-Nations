########### Japan National Spirits Localisation ###########
JAP_for_the_emperor:0 "Für den Kaiser"
JAP_for_the_emperor_desc:0 ""
JAP_overstreched_economy:0 "Überlastete Wirtschaft"
JAP_overstreched_economy_desc:0 ""
JAP_meiji_restoration:0 "Meiji-Restauration"
JAP_meiji_restoration_desc:0 "Lang lebe der große Kaiser Matsuhito. Er stellte die japanische imperiale Macht wieder her. Japan verfolgt nun den Kurs einer nationalistischen und mächtigen Zentralregierung, angeführt von einem Geschlecht, das vom Sonnengott selbst abstammt. Manche verspotten oder kritisieren uns für seine absolute Macht, aber sind es nicht die Wurzeln der westlichen Mächte, die die Idee der absoluten Monarchie begründeten? Und waren es nicht diese Systeme, die sie zu ihrer Größe führten? Japan wird nun seinen Platz auf der Weltbühne einnehmen, und niemand wird es aufhalten können."
JAP_bushido_code:0 "Bushido-Kodex"
JAP_bushido_code_desc:0 "Der japanische Kriegerkodex, Bushido, beschreibt die in unserer Armee weit verbreitete Vorstellung vom Primat der Samurai, dem Weg des Kriegers. Angriff, Ehre und Tod vor der Kapitulation sind wichtig. Japan hat seinen Ehrsinn seit jeher gepflegt. In der heutigen Zeit verleiht er seinen Soldaten Fanatismus und die Fähigkeit, sich ohne Zögern in die Schlacht zu stürzen."
JAP_developed_rail_network:0 "Ausgebautes Schienennetz"
JAP_developed_rail_network_desc:0 "Sakoku, das „geschlossene Land“, existiert seit 1854 nicht mehr. Westliche Investoren beobachteten die Landschaft Japans aufmerksam und verkauften und bauten riesige Eisenbahnnetze auf den japanischen Inseln. Viele unserer Ingenieure beobachteten und nutzten diese Maschinen aufmerksam. Japan hat seitdem eine rasante Industrialisierung erlebt, wie sie kein anderes östliches Land zuvor erlebt hat."
JAP_wooden_constructions:0 "Holzkonstruktionen"
JAP_wooden_constructions_desc:0 "Abgesehen von einer Handvoll Gebäuden in den größten Städten sind die meisten Bauwerke in Japan traditionell, aus Holz und Papier, die lediglich Schutz vor den Elementen bieten. Unser technisches Denken spiegelt dies noch immer wider, wobei Tradition Vorrang vor Modernisierung hat. Wir haben die Vorteile von Ziegel oder Beton noch nicht genutzt, und unsere Baufähigkeiten spiegeln dies wider."
JAP_kokai_naval_spirit:0 "Kokai Naval Spirit"
JAP_kokai_naval_spirit_desc:0 "Kokai ist als „hohe See“ bekannt. Japan hatte schon immer ein Auge auf die Meere dahinter geworfen. Die Sonne geht im Osten über dem großen Ozean auf und im Westen im Japanischen Meer unter. Statt auf bloße Feuerkraft und Gewalt kann sich Japan auf den überragenden Geist und Willen seiner Seeleute und die Überzeugung der Kommandeure verlassen, die sie führen."
JAP_interservice_rivalry_cooperative:0 "Rivalität zwischen den Diensten – kooperativ"
JAP_interservice_rivalry_cooperative_desc:0 "Trotz früherer Streitigkeiten zwischen den militärischen Zweigen Japans arbeiten Heer und Marine nun unerwartet gut zusammen, und die Flexibilität unseres Kommandos in Japan nimmt deutlich zu, und die Zusammenarbeit anderer Nationen wird sogar noch besser."
JAP_interservice_rivalry_none:0 "Rivalität zwischen den Diensten – Keine"
JAP_interservice_rivalry_none_desc:0 "Derzeit gibt es keine erkennbaren Streitigkeiten oder Rivalitäten zwischen der Armee oder der Marine."
JAP_interservice_rivalry_low:0 "Rivalität zwischen den Diensten – gering"
JAP_interservice_rivalry_low_desc:0 "Es gibt einige kleine, unbedeutende Meinungsverschiedenheiten zwischen der Führung der Armee und der Marine."
JAP_interservice_rivalry_medium:0 "Rivalität zwischen den Diensten – Mittel"
JAP_interservice_rivalry_medium_desc:0 "Es gibt deutliche Meinungsverschiedenheiten zwischen der Führung unseres Heeres und unserer Marine. Diese müssen schnellstmöglich beigelegt werden, da die Leistung der japanischen Streitkräfte darunter leiden wird."
JAP_interservice_rivalry_high:0 "Rivalität zwischen den Diensten – Hoch"
JAP_interservice_rivalry_high_desc:0 "Zwischen der japanischen Armee und der japanischen Marine bestehen anhaltende Rivalitäten. Dies hat zu einer erheblichen Verschlechterung der Leistungsfähigkeit der Armee und der Marine geführt und ist auch ein Schlag für unseren Militärstab."
JAP_interservice_rivalry_extreme:0 "Rivalität zwischen den Diensten – Extrem"
JAP_interservice_rivalry_extreme_desc:0 "Die Rivalität zwischen Heer und Marine ist völlig außer Kontrolle geraten, und unsere gesamte Militäroperation ist praktisch zum Erliegen gekommen. Manche würden sogar von einem Bürgerkrieg sprechen. Ohne eine Lösung zerreißt sich Japan selbst."

# IDEAS
KOR_great_game_defense_1:0 "Tolles Spiel"
KOR_great_game_defense_1_desc:0 "Korea liegt in einem Tal zwischen Großmächten, die alle brutal um die Kontrolle über ihr Heimatland ringen. Russland, Japan, China und der Westen greifen Korea an wie Geier einen Kadaver. Die gefährlichen, sich überschneidenden Ansprüche auf das Reich werden Korea mit Sicherheit zum Verhängnis werden, wenn nicht rasch gegen sie vorgegangen wird. Mit der Gründung der Tschukhwabi hat Korea die westlichen Mächte abgewehrt. Das bedeutet jedoch nicht, dass es sicher ist. Japan und Russland streiten derzeit über die Halbinsel und schenken Chinas Anspruch keinen Glauben, obwohl dessen Fähigkeit, ihn durchzusetzen, fraglich ist. Der Vertrag um die Insel Ganghwa hat es Japan ermöglicht, Korea zu „modernisieren“, doch bisher scheint es sich dabei um ein Manöver zu handeln, um Einfluss auszuüben. Der „A Gwan Pa Cheon“-Vorfall mit Russland hat die Spannungen mit dem Riesen im Norden zusätzlich verschärft. Ohne Maßnahmen wird Korea zum Schauplatz eines großen Kampfes, der den Tiger im Ganzen verschlingen soll, ohne dass Korea auch nur einen Einspruch erhebt. Die Großmächte würden uns gern zum Schweigen bringen und uns ihren Launen beugen, aber wenn wir geschickt vorgehen und uns denen entgegenstellen, die uns auffressen wollen, können wir vielleicht doch noch überleben."

KOR_great_game_offense_1:0 "Tolles Spiel"
KOR_great_game_offense_1_desc:0 "Korea liegt in einem Tal zwischen Großmächten, die alle brutal um die Kontrolle über ihr Heimatland ringen. Russland, Japan, China und der Westen greifen Korea an wie Geier einen Kadaver. Die gefährlichen, sich überschneidenden Ansprüche auf das Reich werden Korea mit Sicherheit zum Verhängnis werden, wenn nicht rasch gegen sie vorgegangen wird. Mit der Gründung der Tschukhwabi hat Korea die westlichen Mächte abgewehrt. Das bedeutet jedoch nicht, dass es sicher ist. Japan und Russland streiten derzeit über die Halbinsel und schenken Chinas Anspruch keinen Glauben, obwohl dessen Fähigkeit, ihn durchzusetzen, fraglich ist. Der Vertrag um die Insel Ganghwa hat es Japan ermöglicht, Korea zu „modernisieren“, doch bisher scheint es sich dabei um ein Manöver zu handeln, um Einfluss auszuüben. Der „A Gwan Pa Cheon“-Vorfall mit Russland hat die Spannungen mit dem Riesen im Norden zusätzlich verschärft. Ohne Maßnahmen wird Korea zum Schauplatz eines großen Kampfes, der den Tiger im Ganzen verschlingen soll, ohne dass Korea auch nur einen Einspruch erhebt. Die Großmächte würden uns gern zum Schweigen bringen und uns ihren Launen beugen, aber wenn wir geschickt vorgehen und uns denen entgegenstellen, die uns auffressen wollen, können wir vielleicht doch noch überleben."


KOR_great_game:0 "Tolles Spiel"
KOR_great_game_desc:0 "Korea liegt in einem Tal zwischen Großmächten, die alle brutal um die Kontrolle über ihr Heimatland ringen. Russland, Japan, China und der Westen greifen Korea an wie Geier einen Kadaver. Die gefährlichen, sich überschneidenden Ansprüche auf das Reich werden Korea mit Sicherheit zum Verhängnis werden, wenn nicht rasch gegen sie vorgegangen wird. Mit der Gründung der Tschukhwabi hat Korea die westlichen Mächte abgewehrt. Das bedeutet jedoch nicht, dass es sicher ist. Japan und Russland streiten derzeit über die Halbinsel und schenken Chinas Anspruch keinen Glauben, obwohl dessen Fähigkeit, ihn durchzusetzen, fraglich ist. Der Vertrag um die Insel Ganghwa hat es Japan ermöglicht, Korea zu „modernisieren“, doch bisher scheint es sich dabei um ein Manöver zu handeln, um Einfluss auszuüben. Der „A Gwan Pa Cheon“-Vorfall mit Russland hat die Spannungen mit dem Riesen im Norden zusätzlich verschärft. Ohne Maßnahmen wird Korea zum Schauplatz eines großen Kampfes, der den Tiger im Ganzen verschlingen soll, ohne dass Korea auch nur einen Einspruch erhebt. Die Großmächte würden uns gern zum Schweigen bringen und uns ihren Launen beugen, aber wenn wir geschickt vorgehen und uns denen entgegenstellen, die uns auffressen wollen, können wir vielleicht doch noch überleben."
KOR_gwangmu_reform:0 "Gwanmu-Reform"
KOR_gwangmu_reform_desc:0 "Obwohl dies außerhalb Koreas kaum bekannt ist, hat die koreanische Kaiserfamilie unabhängige Reformen ähnlich denen der Meiji-Restauration durchgeführt, um den Staat weiter zu stärken. Staatlich finanzierte Schulen, Banken und Eisenbahnen erhielten grünes Licht gemäß der Verfassung, die stark von Kaiser Gojongs Russlandbesuch 1897 und allen damit verbundenen Ritualen und Umständen beeinflusst wurde. So optimistisch diese Reformen auch sein mögen, sind sie in letzter Zeit aufgrund der fragwürdigen Unabhängigkeit der Koreaner und des Widerstands von Japanern und Konservativen in der Regierung in Gefahr. Darüber hinaus ist der Haushalt durch die Aufrüstung des Militärs extrem aufgebläht. Die Zeit wird zeigen, ob Korea seine Reformen fortsetzen kann und hofft, sich als moderne und funktionierende Bürokratie zu etablieren."
KOR_gwangmu_reform_better:0 "Gwanmu-Reform"
KOR_gwangmu_reform_better_desc:0 "Obwohl dies außerhalb Koreas kaum bekannt ist, hat die koreanische Kaiserfamilie unabhängige Reformen ähnlich denen der Meiji-Restauration durchgeführt, um den Staat weiter zu stärken. Staatlich finanzierte Schulen, Banken und Eisenbahnen erhielten grünes Licht gemäß der Verfassung, die stark von Kaiser Gojongs Russlandbesuch 1897 und allen damit verbundenen Ritualen und Umständen beeinflusst wurde. So optimistisch diese Reformen auch sein mögen, sind sie in letzter Zeit aufgrund der fragwürdigen Unabhängigkeit der Koreaner und des Widerstands von Japanern und Konservativen in der Regierung in Gefahr. Darüber hinaus ist der Haushalt durch die Aufrüstung des Militärs extrem aufgebläht. Die Zeit wird zeigen, ob Korea seine Reformen fortsetzen kann und hofft, sich als moderne und funktionierende Bürokratie zu etablieren."

USA_1900_usa_election:0 "US-Wahl 1900"
USA_1900_usa_election_desc:0 ""
USA_jim_crow_laws00:0 "Jim-Crow-Gesetze"
USA_jim_crow_laws00_desc:0 "Nachdem der Kompromiss von 1877 die Rekonstruktion in den ehemaligen Konföderierten Staaten beendet hatte, begannen Abgeordnete und lokale Beamte der Südstaaten, immer kreativere Wege zu finden, um ehemaligen Sklaven und freien Afroamerikanern ihre Rechte zu entziehen, denen der 13., 14. und 15. Zusatzartikel zur US-Verfassung, der nach dem Krieg vom Kongress verabschiedet worden war, Schutz gewährt hatte. Diese Gesetze werden umgangssprachlich als „Jim-Crow-Gesetze“ bezeichnet und bildeten die Grundlage für die Rassentrennung in den Vereinigten Staaten. Das jüngste Urteil im Fall Plessy gegen Ferguson untermauerte die Verfassungsmäßigkeit dieser Gesetze und verankerte die Doktrin „Getrennt aber gleich“. Die Entscheidung des Obersten Gerichtshofs machte praktisch jede Hoffnung zunichte, die Jim-Crow-Gesetze in naher Zukunft aufzuheben, und es ist unwahrscheinlich, dass der Status quo der Rassentrennung ohne radikalere Veränderungen in Frage gestellt wird."
USA_jim_crow_laws0:0 "Jim-Crow-Gesetze"
USA_jim_crow_laws0_desc:0 "Nachdem der Kompromiss von 1877 die Rekonstruktion in den ehemaligen Konföderierten Staaten beendet hatte, begannen Abgeordnete und lokale Beamte der Südstaaten, immer kreativere Wege zu finden, um ehemaligen Sklaven und freien Afroamerikanern ihre Rechte zu entziehen, denen der 13., 14. und 15. Zusatzartikel zur US-Verfassung, der nach dem Krieg vom Kongress verabschiedet worden war, Schutz gewährt hatte. Diese Gesetze werden umgangssprachlich als „Jim-Crow-Gesetze“ bezeichnet und bildeten die Grundlage für die Rassentrennung in den Vereinigten Staaten. Das jüngste Urteil im Fall Plessy gegen Ferguson untermauerte die Verfassungsmäßigkeit dieser Gesetze und verankerte die Doktrin „Getrennt aber gleich“. Die Entscheidung des Obersten Gerichtshofs machte praktisch jede Hoffnung zunichte, die Jim-Crow-Gesetze in naher Zukunft aufzuheben, und es ist unwahrscheinlich, dass der Status quo der Rassentrennung ohne radikalere Veränderungen in Frage gestellt wird."
