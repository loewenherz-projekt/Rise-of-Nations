BRA_agrarian_reliant_economy_ind2:0 "Agrarabhängige Wirtschaft"
BRA_agrarian_reliant_economy_ind2_desc:0 "Brasilien wurde von der Weltwirtschaftskrise hart getroffen. Ausländische Investitionen brachen ein, und zwischen 1929 und 1932 sanken die Kaffeeexporte um 50 %, da sie weitgehend von den USA abhängig waren, dem Hauptabnehmer brasilianischen Kaffees. Um einen weiteren Preisverfall zu verhindern, begann die Regierung, den Kaffeeproduzenten auf Kredit abzukaufen und die Säcke anschließend ins Meer zu werfen oder zu verbrennen, um den Preisverfall zu verhindern. Ähnliche Probleme wurden auch in der Zuckerrohrindustrie gemeldet, was unserer Regierung gezeigt hat, dass wir uns entweder von einer Agrarwirtschaft lösen oder neue Märkte für die Versorgung finden müssen."
BRA_rampant_industrialization:0 "Zügellose Industrialisierung"
BRA_rampant_industrialization_desc:0 "Nach dem Zusammenbruch der brasilianischen Wirtschaft infolge der Weltwirtschaftskrise unternahm die Regierung von Getúlio Vargas Anstrengungen, die Industrialisierung voranzutreiben, und steigerte den Verbrauch von Beton und Stahl erheblich. Die Bemühungen des Landes trugen Früchte, da die Zahl der Unternehmen und der Industrie im Land zunahm. Diese schnelle Entwicklung ließ der Regierung jedoch nicht genügend Zeit, die Infrastruktur des Landes auszubauen, was von Tag zu Tag zu einem größeren Problem wird."
BRA_rampant_industrialization2:0 "Zügellose Industrialisierung"
BRA_rampant_industrialization2_desc:0 "Nach dem Zusammenbruch der brasilianischen Wirtschaft infolge der Weltwirtschaftskrise unternahm die Regierung von Getúlio Vargas Anstrengungen, die Industrialisierung voranzutreiben, und steigerte den Verbrauch von Beton und Stahl erheblich. Die Bemühungen des Landes trugen Früchte, da die Zahl der Unternehmen und der Industrie im Land zunahm. Diese schnelle Entwicklung ließ der Regierung jedoch nicht genügend Zeit, die Infrastruktur des Landes auszubauen, was von Tag zu Tag zu einem größeren Problem wird."
BRA_rampant_industrialization3:0 "Zügellose Industrialisierung"
BRA_rampant_industrialization4:0 "Das Beispiel Lateinamerika"
BRA_french_military_mission:0 "Französische Militärmission"
BRA_french_military_mission_desc:0 "Seit 1919 wird die brasilianische Armee von den Franzosen modernisiert. Sie sind für die Neuausrichtung der Armeedoktrin, die Ausarbeitung neuer Vorschriften und die Verbesserung der militärischen Ausbildung verantwortlich. Wir können ihnen für die Modernisierung unserer Armee und Luftwaffe danken und hoffen, dass die militärische Ausbildung auch weiterhin reibungslos verläuft."
BRA_german_military_mission:0 "Deutsche Militärmission"
BRA_french_doctrine:0 "Französische Doktrin"
BRA_french_doctrine_desc:0 "Seit 1919 wird die brasilianische Armee unter französischer Führung modernisiert. Sie sind für die Neuausrichtung der Armeedoktrin, die Ausarbeitung neuer Vorschriften und die Verbesserung der militärischen Ausbildung verantwortlich. Ihre Doktrin und Tradition sind nun tief in unserer Armee verwurzelt und werden uns in allen zukünftigen Konflikten zum Sieg führen."
