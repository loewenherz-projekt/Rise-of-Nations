RI_insurgency:0 "Guerilla-Taktiken"
RI_insurgency_desc:0 "Der Guerillakrieg ist eine Form der irregulären Kriegsführung, bei der kleine Gruppen von Kämpfern, wie etwa paramilitärisches Personal, bewaffnete Zivilisten oder irreguläre Truppen, militärische Taktiken wie Hinterhalte, Sabotage, Überfälle, Kleinkriegsführung, Hit-and-Run-Taktiken und Mobilität anwenden, um gegen ein größeres und weniger mobiles traditionelles Militär zu kämpfen."

DNC_sun_never_sets:0 "Die Sonne geht nie unter"
DNC_splendid_isolation:0 "Herrliche Isolation"
DNC_dreadnought_race:0 "Dreadnought-Rennen"
DNC_sun_never_sets_desc:0 "Der Ausdruck „das Reich, in dem die Sonne niemals untergeht“ wurde verwendet, um bestimmte globale Imperien zu beschreiben, die so ausgedehnt waren, dass es schien, als läge zumindest ein Teil ihres Territoriums immer im Tageslicht. Diese Aussage ist typischerweise eine übertriebene Prahlerei über die Reichweite eines Imperiums, wird aber auch wörtlich interpretiert. Ursprünglich wurde der Begriff für die Universalmonarchie der europäischen und amerikanischen Herrschaftsgebiete unter Karl V. von Habsburg (Herzog von Burgund, König von Spanien, Erzherzog von Österreich und Kaiser des Heiligen Römischen Reiches) verwendet. Der Begriff wurde dann im 16., 17. und 18. Jahrhundert für das Spanische Reich Philipps II. von Spanien und seiner Nachfolger verwendet. In jüngerer Zeit wurde er für das Britische Empire verwendet, hauptsächlich im 19. und frühen 20. Jahrhundert, einer Zeit, in der das Britische Empire eine territoriale Ausdehnung erreichte, die kein anderes Imperium in der Geschichte erreicht hatte. Im 20. Jahrhundert wurde der Begriff manchmal angepasst, um die globale Reichweite der amerikanischen Macht zu bezeichnen."
DNC_splendid_isolation_desc:0 "Der Begriff „splendid isolation“ beschreibt die britische diplomatische Praxis des 19. Jahrhunderts, dauerhafte Allianzen zu vermeiden, insbesondere unter der Regierung von Lord Salisbury zwischen 1885 und 1902. Das Konzept entwickelte sich bereits 1822, als Großbritannien nach 1815 das Europäische Konzert verließ, und blieb bis zum englisch-japanischen Bündnis von 1902 und der Entente Cordiale mit Frankreich von 1904 bestehen. Als Europa in zwei Machtblöcke geteilt war, verbündete sich Großbritannien mit Frankreich und Russland gegen Deutschland und Österreich-Ungarn. Der Begriff selbst wurde im Januar 1896 von dem kanadischen Politiker George Eulas Foster geprägt. Er brachte seine Zustimmung zu Großbritanniens minimaler Einmischung in europäische Angelegenheiten mit den Worten zum Ausdruck: „In diesen etwas unruhigen Tagen, in denen das große Mutterreich in Europa so isoliert dasteht.“"
DNC_dreadnought_race_desc:0 "Großbritannien besaß die größte Marine der Welt und seine Politik bestand darin, sicherzustellen, dass die Royal Navy mindestens so groß war wie die beiden nächstgrößten Marinen (bekannt als Zweimächtestandard). Die britische Wirtschaft hing von der Fähigkeit ab, Rohstoffe einzuführen und fertige Produkte zu exportieren. Im Jahr 1900 stammten 58 % der von der britischen Bevölkerung konsumierten Kalorien aus Übersee. Das bedeutete, dass die fehlende Gewährleistung der Bewegungsfreiheit auf See zu Nahrungsmittelknappheit führen würde. Schon vor der deutschen Seeschlacht grübelten britische Politiker und Militärs über katastrophale wirtschaftliche, soziale und politische Folgen nach, wenn die Royal Navy die britische Handlungsfreiheit nicht garantieren könnte. Die Sorge um die britische Verteidigungsfähigkeit wurde zum Schwerpunkt der 1871 entstandenen Invasionsliteratur, die bis zum Ersten Weltkrieg populär blieb und die öffentliche Meinung stark beeinflusste."

ENG_dreadnought_race:0 "Dreadnought-Rennen"
ENG_dreadnought_race_desc:0 "Großbritannien besaß die größte Marine der Welt und seine Politik bestand darin, sicherzustellen, dass die Royal Navy mindestens so groß war wie die beiden nächstgrößten Marinen (bekannt als Zweimächtestandard). Die britische Wirtschaft hing von der Fähigkeit ab, Rohstoffe einzuführen und fertige Produkte zu exportieren. Im Jahr 1900 stammten 58 % der von der britischen Bevölkerung konsumierten Kalorien aus Übersee. Das bedeutete, dass die fehlende Gewährleistung der Bewegungsfreiheit auf See zu Nahrungsmittelknappheit führen würde. Schon vor der deutschen Seeschlacht grübelten britische Politiker und Militärs über katastrophale wirtschaftliche, soziale und politische Folgen nach, wenn die Royal Navy die britische Handlungsfreiheit nicht garantieren könnte. Die Sorge um die britische Verteidigungsfähigkeit wurde zum Schwerpunkt der 1871 entstandenen Invasionsliteratur, die bis zum Ersten Weltkrieg populär blieb und die öffentliche Meinung stark beeinflusste."
FRA_dreadnought_race:0 "Dreadnought-Rennen"
FRA_dreadnought_race_desc:0 "Die Erklärung des ehemaligen Marineministers M. Lockroy, die französische Marine sei lediglich ein kostspieliges Spielzeug und mangels befestigter Häfen und Kohlenstationen nutzlos, führte 1900 zur Annahme eines neuen Programms. Die wichtigsten Punkte waren der Bau schwerer Schlachtschiffe, schneller Panzerkreuzer mit großem Aktionsradius, Flotten seetüchtiger Torpedoboote und die Befestigung verschiedener Punkte in Algerien, Tunis, Senegal und Indochina. All dies sollte vor 1907 zu einem Aufwand von 762 Millionen Francs fertiggestellt werden. Nach der Umsetzung dieser Pläne würde die französische Flotte aus 28 erstklassigen Schlachtschiffen, 24 geschützten Kreuzern, 52 Zerstörern, 263 Torpedobooten und 38 U-Booten bestehen."
GER_dreadnought_race:0 "Dreadnought-Rennen"
GER_dreadnought_race_desc:0 "Das Wettrüsten zwischen Großbritannien und Deutschland, das vom letzten Jahrzehnt des 19. Jahrhunderts bis zum Ausbruch des Ersten Weltkriegs 1914 andauerte, war eine der Ursachen dieses Konflikts. Es basierte auf einer bilateralen Beziehung, die sich über viele Jahrzehnte verschlechtert hatte. Der Rüstungswettlauf begann mit dem Plan des deutschen Admirals Alfred von Tirpitz im Jahr 1897, eine Flotte zu schaffen, um Großbritannien zu diplomatischen Zugeständnissen zu zwingen. Tirpitz rechnete nicht damit, dass die Kaiserliche Marine die Royal Navy besiegen würde."

