 GRE_political_instability_desc:2 "§WDie £faction_gre_monarchistischen §YMonarchisten§! sind [Root.GetMonarchistLoyaltyLevel].§! [ROOT.GetMonarchistLoyaltyEffects] \n\n§WDie £faction_gre_venezelistischen §YRepublikaner§! sind [Root.GetRepublicanLoyaltyLevel].§! [ROOT.GetRepublicanLoyaltyEffects] \n\n§WDie £faction_gre_communistischen §YKommunisten§! sind [Root.GetCommunistLoyaltyLevel].§! [ROOT.GetCommunistLoyaltyEffects] \n\n§WDie £faction_gre_faschistischen §YFaschisten§! sind [Root.GetFascistLoyaltyLevel].§! [ROOT.GetFascistLoyaltyEffects] \n\nZwischen 1924 und 1935 erlebten wir 23 Regierungswechsel, 13 Staatsstreiche und eine Diktatur! Die Bevölkerung hat genug und wünscht sich mehr Stabilität in ihrer Regierung, bleibt aber vorsichtig skeptisch, was die Überlebenschancen einer einzelnen Regierung angeht. Wir müssen ihnen das Gegenteil beweisen und den ständigen Machtkämpfen ein Ende setzen, indem wir unsere politischen Gegner unter Kontrolle bringen."
 GRE_political_instability_dummy_desc:0 "\n\nZwischen 1924 und 1935 erlebten wir 23 Regierungswechsel, 13 Staatsstreiche und eine Diktatur! Die Bevölkerung hat genug und wünscht sich mehr Stabilität in ihrer Regierung, bleibt aber vorsichtig skeptisch, was die Überlebenschancen einer einzelnen Regierung angeht. Wir müssen ihnen das Gegenteil beweisen und den ständigen Machtkämpfen ein Ende setzen, indem wir unsere politischen Gegner unter Kontrolle bringen."
 GRE_political_instability_republican:0 "Politische Instabilität"
 GRE_political_instability_republican_desc:2 "§WDie £faction_gre_monarchistischen §YMonarchisten§! sind [Root.GetMonarchistLoyaltyLevel].§! [ROOT.GetMonarchistLoyaltyEffects] \n\n§WDie £faction_gre_venezelistischen §YRepublikaner§! sind [Root.GetRepublicanLoyaltyLevel].§! [ROOT.GetRepublicanLoyaltyEffects] \n\n§WDie £faction_gre_communistischen §YKommunisten§! sind [Root.GetCommunistLoyaltyLevel].§! [ROOT.GetCommunistLoyaltyEffects] \n\n§WDie £faction_gre_faschistischen §YFaschisten§! sind [Root.GetFascistLoyaltyLevel].§! [ROOT.GetFascistLoyaltyEffects] \n\nZwischen 1924 und 1935 erlebten wir 23 Regierungswechsel, 13 Staatsstreiche und eine Diktatur! Wir Venezolanischen Anhänger können unseren kleinen Anteil daran nicht leugnen. Zumindest kennt das Volk uns als den Teufel, den es kennt! Leider sind die Erinnerungen an die anatolische Katastrophe noch immer frisch in den Köpfen der Griechen, und auch unsere Rolle darin ist nicht vergessen."
 GRE_political_instability_republican_2:0 "Politische Instabilität"
 GRE_political_instability_republican_2_desc:2 "§WDie £faction_gre_monarchistischen §YMonarchisten§! sind [Root.GetMonarchistLoyaltyLevel].§! [ROOT.GetMonarchistLoyaltyEffects] \n\n§WDie £faction_gre_venezelistischen §YRepublikaner§! sind [Root.GetRepublicanLoyaltyLevel].§! [ROOT.GetRepublicanLoyaltyEffects] \n\n§WDie £faction_gre_communistischen §YKommunisten§! sind [Root.GetCommunistLoyaltyLevel].§! [ROOT.GetCommunistLoyaltyEffects] \n\n§WDie £faction_gre_faschistischen §YFaschisten§! sind [Root.GetFascistLoyaltyLevel].§! [ROOT.GetFascistLoyaltyEffects] \n\nZwischen 1924 und 1935 erlebten wir 23 Regierungswechsel, 13 Staatsstreiche und eine Diktatur! Wir Venezolanischen können unseren kleinen Anteil daran nicht leugnen. Zumindest kennt uns das Volk als den Teufel, den es kennt! Nun liegt es an uns, unser Erbe zu erfüllen und den Weg zu beenden, den Griechenland 1919 mit der Rückeroberung Konstantinopels begann..."
 GRE_political_instability_communist:0 "Politische Instabilität"
 GRE_political_instability_communist_desc:3 "§WDie £faction_gre_monarchistischen §YMonarchisten§! sind [Root.GetMonarchistLoyaltyLevel].§! [ROOT.GetMonarchistLoyaltyEffects] \n\n§WDie £faction_gre_venezelistischen §YRepublikaner§! sind [Root.GetRepublicanLoyaltyLevel].§! [ROOT.GetRepublicanLoyaltyEffects] \n\n§WDie £faction_gre_communistischen §YKommunisten§! sind [Root.GetCommunistLoyaltyLevel].§! [ROOT.GetCommunistLoyaltyEffects] \n\n§WDie £faction_gre_faschistischen §YFaschisten§! sind [Root.GetFascistLoyaltyLevel].§! [ROOT.GetFascistLoyaltyEffects] \n\nZwischen 1924 und 1935 erlebten wir 23 Regierungswechsel, 13 Staatsstreiche und eine Diktatur! Zum ersten Mal seit langer Zeit gibt es in Griechenland endlich eine Bewegung, die das griechische Volk an die erste Stelle der Staatsführung stellt. Doch unsere Bewegung ist noch jung, und wir müssen noch viel beweisen, bevor das Volk wirklich Vertrauen in unsere Herrschaft gewinnt."
 GRE_political_instability_metaxas:0 "Politische Instabilität"
 GRE_political_instability_metaxas_desc:2 "§WDie £faction_gre_monarchistischen §YMonarchisten§! sind [Root.GetMonarchistLoyaltyLevel].§! [ROOT.GetMonarchistLoyaltyEffects] \n\n§WDie £faction_gre_venezelistischen §YRepublikaner§! sind [Root.GetRepublicanLoyaltyLevel].§! [ROOT.GetRepublicanLoyaltyEffects] \n\n§WDie £faction_gre_communistischen §YKommunisten§! sind [Root.GetCommunistLoyaltyLevel].§! [ROOT.GetCommunistLoyaltyEffects] \n\n§WDie £faction_gre_faschistischen §YFaschisten§! sind [Root.GetFascistLoyaltyLevel].§! [ROOT.GetFascistLoyaltyEffects] \n\nZwischen 1924 und 1935 erlebten wir 23 Regierungswechsel, 13 Staatsstreiche und eine Diktatur! Unter Metaxas&#39; Führung werden wir durch die Vernichtung unserer Feinde Einheit durch Stärke erreichen! Das griechische Volk wird erfahren, wie eine Regierung funktioniert, die in diesem gesetzlosen Land Ordnung schaffen will."
 GRE_political_instability_fascism:0 "Politische Instabilität"
 GRE_political_instability_fascism_desc:2 "§WDie £faction_gre_monarchistischen §YMonarchisten§! sind [Root.GetMonarchistLoyaltyLevel].§! [ROOT.GetMonarchistLoyaltyEffects] \n\n§WDie £faction_gre_venezelistischen §YRepublikaner§! sind [Root.GetRepublicanLoyaltyLevel].§! [ROOT.GetRepublicanLoyaltyEffects] \n\n§WDie £faction_gre_communistischen §YKommunisten§! sind [Root.GetCommunistLoyaltyLevel].§! [ROOT.GetCommunistLoyaltyEffects] \n\n§WDie £faction_gre_faschistischen §YFaschisten§! sind [Root.GetFascistLoyaltyLevel].§! [ROOT.GetFascistLoyaltyEffects] \n\nZwischen 1924 und 1935 erlebten wir 23 Regierungswechsel, 13 Staatsstreiche und eine Diktatur! Der Faschismus stellt die Einheit über alles. Wenn es uns nicht gelingt, das griechische Volk wirksam zu mobilisieren und ihm zu zeigen, dass der Faschismus die klare Antwort auf Griechenlands Probleme ist, dann verdienen wir es nicht, zu herrschen."
 GRE_state_of_the_nation_monarchism:0 "Zur Lage der Nation"
 GRE_state_of_the_nation_monarchism_desc:1 "§WDie £faction_gre_monarchistischen §YMonarchisten§! sind [Root.GetMonarchistLoyaltyLevel].§! [ROOT.GetMonarchistLoyaltyEffects] \n\n§WDie £faction_gre_venezelistischen §YRepublikaner§! sind [Root.GetRepublicanLoyaltyLevel].§! [ROOT.GetRepublicanLoyaltyEffects] \n\n§WDie £faction_gre_communistischen §YKommunisten§! sind [Root.GetCommunistLoyaltyLevel].§! [ROOT.GetCommunistLoyaltyEffects] \n\n§WDie £faction_gre_faschistischen §YFaschisten§! sind [Root.GetFascistLoyaltyLevel].§! [ROOT.GetFascistLoyaltyEffects]"
