                    #Third Coup d'etat

 LIT_event.0.t:0 "Das Land sucht einen neuen König"
 LIT_event.0.d:0 "Angesichts der wachsenden Unterstützung für die Rückkehr zur Monarchie hat Antanas Smetona die Gründung eines Regentschaftsrates angekündigt, der den nächsten König für unser Königreich wählen soll."
 LIT_event.0.a:0 "Der Regentschaftsrat wählt den neuen König."

 LIT_event.1:0 "Ereignis 1"
 LIT_event.1.t:0 "Königreich Litauen bietet Garantien"
 LIT_event.1.d:0  "Angesichts der jüngsten dramatischen Veränderungen in der politischen Landschaft des Baltikums ist die Frage unseres Verhältnisses zum kürzlich wiederhergestellten Königreich Litauen wiederholt aufgeworfen worden. Der litauische Botschafter hat uns heute eine offizielle Note übergeben, in der er uns formell auffordert, unsere Haltung gegenüber dem Königreich darzulegen. Die Monarchisten behaupten, dass die lettischen Länder als alte Kronländer und baltische Länder ihnen gehören. \n\n[LIT.GetLeader] hat jedoch angedeutet, dass er eine Kompromisslösung akzeptieren würde, bei der er selbst nominell Staatsoberhaupt unseres Landes wäre, jedoch nur über sehr wenig tatsächliche Macht verfügt."
 LIT_event.1.a:0 "Wir werden in das Königreich zurückkehren"
 LIT_event.1.b:0 "Wir werden den Kompromiss akzeptieren"
 LIT_event.1.c:0 "Wir werden unsere Freiheit niemals für die Sicherheit aufgeben!"
 
 LIT_event.2:0 "Ereignis 2"
 LIT_event.2.t:0 "Letten treffen sich wieder mit ihren Brüdern"
 LIT_event.2.d:0 "Das Königreich Litauen wird bald so mächtig sein wie einst!"
 LIT_event.2.a:0 "Der Einfluss des Königreichs wird stärker."
 
 LIT_event.3:0 " Ereignis 3"
 LIT_event.3.t:0 "Lettland stimmt einer engeren Beziehung zu"
 LIT_event.3.d:0 "Die Letten möchten lieber sicher als frei sein. Unser Einfluss im Baltikum wächst."
 LIT_event.3.a:0 "Akzeptabel."
 
 LIT_event.4:0 "Ereignis 4"
 LIT_event.4.t:0 "[LAT.GetNameDefCap] lehnt Annäherungsversuche ab"
 LIT_event.4.d:0 "Die lettische Regierung hat im Vertrauen auf ihre eigene Stärke unseren Vorschlag abgelehnt."
 LIT_event.4.a:0 "Das ist bedauerlich."

 LIT_event.5:0 "Ereignis 5"
 LIT_event.5.t:0 "Mindaugas III. zum König gekrönt"
 LIT_event.5.d:0 "Der letzte Nachkomme des einzigen Königs von Litauen - Mindaugas ist der "
 LIT_event.5.a:0 "Es lebe der König!"
 
 LIT_event.6:0 "Ereignis 6"
 LIT_event.6.t:0 "Antanas I. zum König gekrönt"
 LIT_event.6.d:0 "Antanas Smetona, seit fast 20 Jahren ein beliebter Präsident, wurde zum König des neu reformierten Königreichs Litauen gekrönt."
 LIT_event.6.a:0 "Es lebe der König!"
 
 LIT_event.7:0 "Ereignis 7"
 LIT_event.7.t:0 "Wähle deinen Gegner"
 LIT_event.7.d:0 "Es ist an der Zeit zu entscheiden, wer das Königreich führen und für die kommenden Jahrhunderte eine dauerhafte Dynastie aufbauen wird."
 LIT_event.7.a:0 "Mindaugas"
 LIT_event.7.b:0 "Antanas"
 
 LIT_event.8:0 "Veranstaltung 8"
 LIT_event.8.t:0 "Deutschland setzt Polen unter Druck"
 LIT_event.8.d:0 "Die Region Vilnius wurde während des Polnisch-Sowjetischen Krieges von Polen besetzt und blieb fast 20 Jahre lang unter polnischer Kontrolle. Das Deutsche Reich forderte von Polen die Rückgabe der Region an rechtmäßige litauische Hände, andernfalls drohte ein Krieg."
 LIT_event.8.a:0 "Wilno ist es nicht wert, einen Krieg dafür zu riskieren"
 LIT_event.8.b:0 "Wir müssen die polnischen Bürger in Wilno schützen!"
 
 LIT_event.9:0 "Veranstaltung 9"
 LIT_event.9.t:0 "Polen gibt auf"
 LIT_event.9.d:0 "Die Region Vilnius gelangt wieder unter litauische Kontrolle."
 LIT_event.9.a:0 "Es ist das Beste für alle"
 
 LIT_event.10:0 "Veranstaltung 10"
 LIT_event.10.t:0 "Polen lehnt ab"
 LIT_event.10.d:0 "Die polnische Regierung weigert sich, ihre Bürger aus Vilnius auszuliefern."
 LIT_event.10.a:0 "In den Krieg?"
 
