 ENG_S.A.S._requisition_1_desc:0 "§LRequestion der Aufstellung der 1. Special Air Service Brigade in der Nähe von London. Die Aufstellung der Brigade kostet §W50§! £Armeeerfahrung£, §W25§! £Luftfahrterfahrung£, §W20§! £Marineerfahrung£ und §W25§! £Kommandostärke£.§! §C(Historisch)§!"
 ENG_S.A.S._requisition_2_desc:0 "§LRequestion der Aufstellung der 2. Special Air Service Brigade in der Nähe von London. Die Aufstellung der Brigade kostet §W25§! £Armeeerfahrung£, §W15§! £Luftfahrterfahrung£, §W15§! £Marineerfahrung£ und §W30§! £Kommandomacht£.§! §O(Ahistorisch)§!"
 ENG_S.A.S._requisition_3_desc:0 "§LRequestion der Aufstellung der 3. Special Air Service Brigade in der Nähe von London. Die Aufstellung der Brigade kostet §W12,5§! £Armeeerfahrung£, §W10§! £Luftfahrterfahrung£, §W10§! £Marineerfahrung£ und §W40§! £Kommandomacht£.§! §O(Ahistorisch)§!"
 ENG_S.A.S._requisition_4_desc:0 "§LRequestion der Aufstellung der 4. Special Air Service Brigade in der Nähe von London. Die Aufstellung der Brigade kostet §W10§! £Armeeerfahrung£, §W5§! £Luftfahrterfahrung£, §W5§! £Marineerfahrung£ und §W50§! £Kommandomacht£.§! §O(Ahistorisch)§!"
