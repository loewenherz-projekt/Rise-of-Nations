  dnc_eng.1.t:0 "Anglo-Japanischer Pakt"
  dnc_eng.1.d:0 "Lord Lansdowne, der britische Außenminister, lud Hayashi Tadaso ein, ein Bündnis zwischen unseren beiden Ländern zu unterzeichnen. Sollte eines unserer Länder in einen Krieg eintreten, sollte das andere entweder neutral bleiben oder sich ihm anschließen, wenn wir uns in einem Krieg mit mehr als einer Macht befinden würden."
  dnc_eng.1.a:0 "Akzeptieren und unterzeichnen Sie den Vertrag"
  dnc_eng.1.b:0 "Den Vorschlag ablehnen"

  dnc_eng.2.t:0 "Anglo-japanischer Pakt unterzeichnet"
  dnc_eng.2.d:0 "Hayashi Tadaso hat unser Angebot eines Bündnisses zwischen unseren beiden Mächten angenommen. Der Vertrag wurde heute im Lansdowne House in London unterzeichnet. Dieses Bündnis wird unseren beiden Nationen zu Wohlstand und Blüte verhelfen."
  dnc_eng.2.a:0 "Eine neue Freundschaft"

  dnc_eng.3.t:0 "Pakt abgelehnt"
  dnc_eng.3.d:0 "Hayashi Tadaso lehnte unsere Einladung nach Lansdowne House ab. Offenbar ist die japanische Regierung nicht bereit, einen Vertrag zu unterzeichnen, der [JAP.GetName] und [ENG.GetName] verbünden würde. Die Japaner wollen nichts mit einer europäischen Macht zu tun haben."
  dnc_eng.3.a:0 "Wie traurig"

  dnc_eng.4.t:0 "Anglo-Siamesischer Vertrag"
  dnc_eng.4.d:0 "Der britische Außenminister hat unserer Regierung ein Angebot unterbreitet: Sie möchten, dass wir das Eigentum an [981.GetName] an die britische Krone übertragen. Im Gegenzug sind sie bereit, uns vor der Ausbreitung des französischen Einflusses in unseren Gebieten zu schützen."
  dnc_eng.4.a:0 "Unterzeichnen Sie den Vertrag"
  dnc_eng.4.b:0 "Das Angebot ablehnen"

  dnc_eng.5.t:0 "Anglo-Siamesischer Vertrag unterzeichnet"
  dnc_eng.5.d:0 "Die siamesische Regierung hat unser Angebot unterzeichnet, der Staat [981.GetName] wurde an unsere Krone übertragen, im Gegenzug sollten wir Siam vor französischem Einfluss schützen."
  dnc_eng.5.a:0 "Tolle Neuigkeiten!"

  dnc_eng.6.t:0 "Anglo-Siamesischer Vertrag abgelehnt"
  dnc_eng.6.d:0 "Die siamesische Regierung hat unseren Vertrag entschieden abgelehnt. Sie ist nicht bereit, den Staat [981.GetName] abzutreten. Sie hat beschlossen, die Beziehungen zu unserer Regierung abzubrechen und schließt sich stattdessen den Franzosen an, falls diese mit den europäischen Mächten verhandeln."
  dnc_eng.6.a:0 "Ein diplomatisches Versagen ..."

  dnc_eng.7.t:0 "Britisches Ultimatum"
  dnc_eng.7.d:0 "Die britische Regierung hat uns ein Ultimatum gestellt: Ihren imperialistischen Ambitionen folgend, verlangt sie von uns, dass wir die Staaten, die einst Teil des Hauses Platagenet waren, auf uns übertragen. Würden wir dieser Forderung nachkommen, würden wir auf der Weltbühne viel Glaubwürdigkeit verlieren, andererseits wäre dadurch der Frieden mit unserem Nachbarn auf der anderen Seite des Kanals garantiert."
  dnc_eng.7.a:0 "Akzeptieren"
  dnc_eng.7.b:0 "Niemals!"

  dnc_eng.8.t:0 "Großbritannien greift in Marokko ein"
  dnc_eng.8.d:0 "Angesichts unserer Probleme in Nordafrika, insbesondere in Marokko, scheint die britische Regierung bereit zu sein, sich in unsere Angelegenheiten einzumischen. Sie behauptet, die aktuelle Situation stelle eine Gefahr für ihre Handelsrouten in der Region dar und befürchtet Maßnahmen gegen britische Händler."
  dnc_eng.8.a:0 "Britische Intervention zulassen"
  dnc_eng.8.b:0 "Wir werden es alleine lösen!"

  dnc_eng.9.t:0 "Intervention in Marokko genehmigt"
  dnc_eng.9.d:0 "Nach unserer Bitte um Hilfe in der Situation in Marokko akzeptierte die französische Regierung unsere Forderungen zur Sicherung unserer Handelsrouten in der Region. Sie akzeptierte auch jegliche militärische Intervention in der Region. Die Franzosen willigten ein, eine Ausnahme von den Bedingungen der Entente Cordiale zu machen, indem sie uns erlaubten, in marokkanische Angelegenheiten einzugreifen."
  dnc_eng.9.a:0 "Dann auf nach Marokko!"

  dnc_eng.10.t:0 "Intervention in Marokko abgelehnt"
  dnc_eng.10.d:0 "Auf unsere Bitte um Hilfe in der marokkanischen Situation lehnte die französische Regierung unsere Forderungen nach der Sicherung unserer Handelsrouten in der Region ab. Sie lehnte jegliche militärische Intervention in der Region ab. Die Franzosen erklärten außerdem, dass jede Intervention zur Auflösung der Entente Cordiale führen würde."
  dnc_eng.10.a:0 "Wir müssen eingreifen"
  dnc_eng.10.b:0 "Zurück nach unten"

  dnc_eng.11.t:0 "Großbritannien macht einen Rückzieher"
  dnc_eng.11.d:0 "Aus Angst vor einem Angriff auf britische Händler in Marokko forderte die britische Regierung eine Intervention in der Region. Wir lehnten diesen Vorschlag ab. Die britische Regierung erkannte die Situation an und erklärte, dass der Vertrag der Entente Cordiale nicht verletzt werde."
  dnc_eng.11.a:0 "Keine Briten in Marokko!"

  dnc_eng.12.t:0 "[ENG.GetName] bittet um Integration"
  dnc_eng.12.d:0 "Die [ENG.GetAdjective]-Regierung hat unsere lokale Regierung aufgefordert, die Kontrolle an ihre Autorität abzutreten. Wenn diese Forderung akzeptiert wird, bedeutet dies das Ende unserer lokalen Regierung. Die Macht wird dann an die britische Krone übertragen."
  dnc_eng.12.a:0 "Macht abtreten"
  dnc_eng.12.b:0 "Komm und hol es dir!"

  dnc_eng.13.t:0 "[FROM.GetName] hat die Integration abgelehnt"
  dnc_eng.13.d:0 "Die [FROM.GetAdjective] Lokalregierung hat unseren Antrag auf Machtübergabe abgelehnt. Es scheint, als würde sie sich weigern, über die Situation zu verhandeln. Sie droht sogar damit, die diplomatischen Beziehungen zu unserer Regierung abzubrechen."
  dnc_eng.13.a:0 "Mit Gewalt ist es so!"

  dnc_eng.14.t:0 "[ENG.GetName] bittet um Unterwerfung"
  dnc_eng.14.d:0 "Die [ENG.GetAdjective]-Regierung hat unsere lokale Regierung gebeten, Untertan seiner Majestät zu werden. Wenn diese Forderung angenommen wird, markiert dies den Beginn einer neuen Ära für unser Land. Wir werden vom britischen Schutz profitieren und gleichzeitig eine gewisse Form der Autonomie behalten."
  dnc_eng.14.a:0 "Angebot annehmen"
  dnc_eng.14.b:0 "Niemals!"

  dnc_eng.15.t:0 "[FROM.GetName] hat die Unterwerfung abgelehnt"
  dnc_eng.15.d:0 "Die [FROM.GetAdjective] Lokalregierung hat unsere Anfrage bezüglich ihrer Unterwerfung abgelehnt. Es scheint, als würde sie sich weigern, über die Situation zu verhandeln. Sie droht sogar damit, die diplomatischen Beziehungen zu unserer Regierung abzubrechen."
  dnc_eng.15.a:0 "Mit Gewalt ist es so!"

  dnc_eng.16.t:0 "Londoner Konferenz zur Teilung der USA"
  dnc_eng.16.d:0 "Obwohl die Nordmänner den Nordosten Nordamerikas bereits um 1000 n. Chr. erkundet und kolonisiert hatten, fand zwischen 1500 und 1800 n. Chr., während des Zeitalters der Entdeckungen, eine spätere und bekanntere Welle europäischer Kolonisierung Amerikas statt. In dieser Zeit begannen mehrere europäische Imperien – vor allem Spanien, Portugal, Großbritannien und Frankreich – die natürlichen Ressourcen und das Humankapital Amerikas zu erforschen und für sich zu beanspruchen, was zur Vertreibung und Auflösung einiger indigener Völker und zur Gründung mehrerer Siedlerkolonialstaaten führte. Einige ehemals europäische Siedlerkolonien – darunter New Mexico, Alaska, die Prärien/nördlichen Great Plains und die „Nordwest-Territorien“ in Nordamerika; der Isthmus von Tehuantepec, die Halbinsel Yucatán und die Darién-Lücke in Mittelamerika; und der nordwestliche Amazonas, die zentralen Anden und die Guyanas in Südamerika – bleiben bis ins 21. Jahrhundert relativ ländlich, dünn besiedelt und indigen, doch mehrere Siedlerkolonialstaaten, darunter Brasilien, Kolumbien, Mexiko, Argentinien und die Vereinigten Staaten, entwickelten sich zu eigenständigen Siedlerkolonialreichen. Russland begann Mitte des 18. Jahrhunderts mit der Kolonisierung des pazifischen Nordwestens auf der Suche nach Fellen für den Pelzhandel. Viele der sozialen Strukturen – darunter Religionen, politische Grenzen und Linguae francae –, die im 21. Jahrhundert in der westlichen Hemisphäre vorherrschen, sind Nachkommen der Strukturen, die in dieser Zeit etabliert wurden."
  dnc_eng.16.a:0 "Akzeptieren"
  dnc_eng.16.b:0 "Abfall"
  
  dnc_eng.17.t:0 "Khaki-Wahl"
  dnc_eng.17.d:0 "Die britischen Parlamentswahlen von 1900 fanden vom 26. September bis 24. Oktober 1900 statt, nachdem das Parlament am 25. September aufgelöst worden war. Sie wurden auch als Khaki-Wahlen bezeichnet (die erste von mehreren Wahlen mit diesem Beinamen) und fanden zu einer Zeit statt, als der Zweite Burenkrieg weitgehend als gewonnen galt (obwohl er tatsächlich noch zwei Jahre andauern sollte). Die Konservative Partei unter Lord Salisbury und ihren Verbündeten, den Liberal Unionists, sicherte sich eine große Mehrheit von 134 Sitzen, obwohl sie nur 5,6 % mehr Stimmen erhielt als die Liberalen unter Henry Campbell-Bannerman. Dies war vor allem darauf zurückzuführen, dass die Konservativen 163 Sitze gewannen, die von anderen Parteien nicht angefochten wurden. Das Labour Representation Committee, aus dem später die Labour Party hervorging, nahm zum ersten Mal an einer Parlamentswahl teil. Es existierte jedoch erst seit wenigen Monaten; daher waren Keir Hardie und Richard Bell die einzigen im Jahr 1900 gewählten Abgeordneten des LRC."
  dnc_eng.17.a:0 "Die Konservativen gewinnen!"
  
  dnc_eng.18.t:0 "Parlamentswahlen von 1906"
  dnc_eng.18.d:0 "Die britischen Parlamentswahlen 1906 fanden vom 12. Januar bis 8. Februar 1906 statt. Die Liberalen unter Premierminister Henry Campbell-Bannerman gewannen bei den Wahlen eine überwältigende Mehrheit. Die Konservativen unter Arthur Balfour, der bis einen Monat vor der Wahl an der Regierung gewesen war, verloren mehr als die Hälfte ihrer Sitze, darunter auch den Sitz von Parteichef Balfour in Manchester East. Damit verfügt die Partei über die niedrigsten Sitze in ihrer Geschichte. Bei den Wahlen kam es zu einem Wechsel von 5,4 % von der Konservativen Partei zur Liberalen Partei – dem größten jemals verzeichneten Wert (berücksichtigt man jedoch nur die Sitze, die 1900 und 1906 umkämpft waren, sank der Stimmenanteil der Konservativen um 11,6 %). Dies führte dazu, dass die Parlamentswahlen von 1906 als „erdrutschartiger Sieg der Liberalen“ bezeichnet wurden und heute neben den Parlamentswahlen von 1931, 1945, 1983, 1997 und 2001 zu den größten Erdrutschsiegen bei Wahlen zählen."
  dnc_eng.18.a:0 "Die Liberalen gewinnen!"
  
  dnc_eng.19.t:0 "Teilung Indiens"
  dnc_eng.19.d:0 "Die Teilung Indiens war die Aufteilung Britisch-Indiens in zwei unabhängige Dominions: Indien und Pakistan. Die beiden Staaten wurden seitdem weiter umstrukturiert: Das Dominion Indien ist heute die Republik Indien; während das Dominion Pakistan aus der heutigen Islamischen Republik Pakistan und der Volksrepublik Bangladesch bestand. Die Teilung beinhaltete die Aufteilung der beiden Provinzen Bengalen und Punjab, basierend auf der bezirksweiten nicht-muslimischen bzw. muslimischen Mehrheit. Im Zuge der Teilung wurden auch die Britisch-Indische Armee, die Royal Indian Navy, der Indische Staatsdienst, die Eisenbahn und die Staatskasse aufgeteilt."
  dnc_eng.19.a:0 "OK"
  
  dnc_eng.20.t:0 "Kaiserliche Konferenz abgehalten"
  dnc_eng.20.d:0 "Die Kolonialkonferenz von 1902 folgte dem Ende des Burenkrieges und fand anlässlich der Krönung Eduards VII. statt. Wie die vorherige Konferenz wurde sie von Kolonialminister Joseph Chamberlain einberufen und am 30. Juni 1902 eröffnet. Chamberlain nutzte die Gelegenheit, um seine früheren Vorschläge der Kolonialkonferenz von 1897 für einen Imperial Council aus Kolonialvertretern zu erneuern. Dieser sollte als quasi-imperiales Parlament fungieren und für die Kolonien Entscheidungen über die Reichspolitik treffen. Dieser Vorschlag wurde ebenso wie Chamberlains Idee eines einheitlichen imperialen Verteidigungssystems von den meisten Premierministern der Kolonien abgelehnt. Während Neuseeland vorschlug, dass jede Kolonie im Kriegsfall eine Spezialtruppe zur imperialen Verteidigung bereitstellen sollte, waren Kanada und Australien der Ansicht, dass diese Idee die Selbstverwaltung untergrub. Chamberlain schlug außerdem eine imperiale Wirtschaftsunion oder Zollunion mit Freihandel innerhalb des Reiches und Zöllen auf Waren von außerhalb vor. Die Kolonien verabschiedeten jedoch eine Resolution, die den imperialen Freihandel ablehnte. Eine Resolution zugunsten der von Kanada vorgeschlagenen imperialen Präferenz wurde angenommen, und Chamberlain erklärte sich bereit, die Idee der britischen Regierung vorzulegen. Dieser Plan wurde jedoch erst auf der Wirtschaftskonferenz des Britischen Empires im Jahr 1932 umgesetzt."
  dnc_eng.20.a:0 "Hoffen wir, dass dies gelingt"
  
  dnc_eng.21.t:0 "Einladung zum Beitritt zur Imperialen Föderation"
  dnc_eng.21.d:0 "Die Imperial Federation bezeichnet eine Reihe von Vorschlägen im späten 19. und frühen 20. Jahrhundert zur Schaffung einer föderalen Union als Ersatz für das bestehende Britische Empire. Ein solcher Vorschlag wurde nie angenommen, doch verschiedene Pläne fanden in Australien, Kanada, Neuseeland und anderen Kolonialgebieten Anklang. Unionisten wie Joseph Chamberlain verfochten das Projekt als Alternative zu William Gladstones Vorschlägen für eine Selbstverwaltung in Irland. Es wurden zahlreiche Vorschläge unterbreitet, doch keiner fand die Mehrheit. Die Imperial Federation League, die wichtigste Interessenvertretung, spaltete sich 1893 in zwei Fraktionen. Die eine Gruppe setzte sich für die Verteidigung des Imperiums ein, die andere für den Handel. Es wurden verschiedene Vorschläge unterbreitet, die meisten forderten einen einzigen Staat mit einem imperialen Parlament mit Sitz in London. Das neue Parlament sollte sich mit Binnenhandel, Außenbeziehungen, Verteidigung und anderen Fragen befassen, die die gesamte Föderation betrafen. Das neue Parlament sollte Indien direkt regieren, während die Dominions (Australien, Kanada, Neuseeland, Neufundland und Südafrika) eine interne Selbstverwaltung behielten. Irland würde außerdem eine Selbstverwaltung erhalten, was die Forderung nach Selbstverwaltung in Irland verringern sollte."
  dnc_eng.21.a:0 "Akzeptieren"
  dnc_eng.21.a:0 "Abfall"
  
  dnc_eng.22.t:0 "[From.GetName] Akzeptiert"
  dnc_eng.22.d:0 "Die Imperial Federation bezeichnet eine Reihe von Vorschlägen im späten 19. und frühen 20. Jahrhundert zur Schaffung einer föderalen Union als Ersatz für das bestehende Britische Empire. Ein solcher Vorschlag wurde nie angenommen, doch verschiedene Pläne fanden in Australien, Kanada, Neuseeland und anderen Kolonialgebieten Anklang. Unionisten wie Joseph Chamberlain verfochten das Projekt als Alternative zu William Gladstones Vorschlägen für eine Selbstverwaltung in Irland. Es wurden zahlreiche Vorschläge unterbreitet, doch keiner fand die Mehrheit. Die Imperial Federation League, die wichtigste Interessenvertretung, spaltete sich 1893 in zwei Fraktionen. Die eine Gruppe setzte sich für die Verteidigung des Imperiums ein, die andere für den Handel. Es wurden verschiedene Vorschläge unterbreitet, die meisten forderten einen einzigen Staat mit einem imperialen Parlament mit Sitz in London. Das neue Parlament sollte sich mit Binnenhandel, Außenbeziehungen, Verteidigung und anderen Fragen befassen, die die gesamte Föderation betrafen. Das neue Parlament sollte Indien direkt regieren, während die Dominions (Australien, Kanada, Neuseeland, Neufundland und Südafrika) eine interne Selbstverwaltung behielten. Irland würde außerdem eine Selbstverwaltung erhalten, was die Forderung nach Selbstverwaltung in Irland verringern sollte."
