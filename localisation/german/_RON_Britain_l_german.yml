dnc_eng.156.t:0 "Ägyptische Revolution"
dnc_eng.156.d:0 "Die ägyptische Revolution von 1952 oder Revolution des 23. Juli wurde am 23. Juli 1952 von der Bewegung der Freien Offiziere begonnen, einer Gruppe von Armeeoffizieren unter der Führung von Mohammed Naguib und Gamal Abdel Nasser. Die Revolution zielte ursprünglich darauf ab, König Faruk zu stürzen. Laut Miles Copeland Jr. und Kermit Roosevelt Jr. war sie Teil der Operation Fat Fucker, deren Ziel ein Wechsel der politischen Führung in Ägypten zu einer progressiveren, pro-amerikanischen Führung war. Die Bewegung hatte jedoch weitergehende politische Ambitionen und strebte bald die Abschaffung der konstitutionellen Monarchie und Aristokratie in Ägypten und im Sudan, die Gründung einer Republik, die Beendigung der britischen Besatzung des Landes und die Sicherung der Unabhängigkeit des Sudan (der bis dahin als anglo-ägyptisches Kondominium regiert wurde) an. Die Revolutionsregierung verfolgte eine entschieden nationalistische, antiimperialistische Agenda, die vor allem im arabischen Nationalismus und in der internationalen Blockfreiheit zum Ausdruck kam. Wie werden wir darauf reagieren?"
dnc_eng.156.a:1 "Akzeptieren"
dnc_eng.156.b:1 "Zerschmettere sie"

dnc_eng.157.t:0 "Malaya erklärt seine Unabhängigkeit"
dnc_eng.157.d:0 "Die unabhängige Föderation Malaya wurde am 31. August 1957 gegründet. Briefmarke der Straits Settlements von 1883. Die Geschichte des britischen Engagements in Malaya reicht bis ins Jahr 1786 zurück, als die East India Company einen Handelsposten auf der Insel Penang errichtete. Wie werden wir darauf reagieren?"
dnc_eng.157.a:1 "Akzeptieren"
dnc_eng.157.b:1 "Zerschmettere sie"


dnc_eng.159.t:0 "Australisches Verfassungsgesetz"
dnc_eng.159.d:0 "Der Australia Act 1986 ist die Kurzbezeichnung zweier separater, aber miteinander verbundener Gesetze: ein Gesetz des australischen Commonwealth-Parlaments (also des Bundesparlaments) und ein Gesetz des britischen Parlaments. In Australien werden sie als Australia Act 1986 bzw. Australia Act 1986 (UK) bezeichnet. Diese nahezu identischen Gesetze wurden von beiden Parlamenten verabschiedet, da unklar war, ob das Commonwealth-Parlament allein die endgültige Entscheidungsbefugnis besaß. Sie wurden unter Nutzung der Gesetzgebungsbefugnis erlassen, die durch Ermächtigungsgesetze der Parlamente aller australischen Bundesstaaten verliehen wurde. Die Gesetze traten gleichzeitig in Kraft."
dnc_eng.159.a:1 "Akzeptieren"
dnc_eng.159.b:1 "Zerschmettere sie"

dnc_eng.160.t:0 "Neuseeländisches Verfassungsgesetz"
dnc_eng.160.d:0 "Das Verfassungsgesetz von 1986 ist ein Gesetz des neuseeländischen Parlaments und bildet einen wesentlichen Bestandteil der neuseeländischen Verfassung. Es legt den Rahmen für die grundlegenden politischen Regierungsprinzipien fest und regelt die Befugnisse der Exekutive, Legislative und Judikative. Es beschreibt die Rollen und Pflichten des Monarchen, des Generalgouverneurs, der Minister und der Richter. Das Gesetz hob das neuseeländische Verfassungsgesetz von 1852 und das Statut von Westminster auf und ersetzte es. Außerdem entzog es dem britischen Parlament die Befugnis, mit Zustimmung des neuseeländischen Parlaments Gesetze für Neuseeland zu verabschieden."
dnc_eng.160.a:1 "Akzeptieren"
dnc_eng.160.b:1 "Zerschmettere sie"

dnc_eng.161.t:0 "Südafrikanischer Verfassungsakt"
dnc_eng.161.d:0 "Der Republikanismus war schon immer ein zentraler Grundsatz des Afrikaaner-Nationalismus. Selbst als Nationalisten die Regierung kontrollierten, verhinderten die politischen Realitäten, dass dieses Ziel vor den 1960er Jahren erreicht wurde. Am 3. August 1960 kündigte die Regierung der National Party eine Volksabstimmung im Oktober desselben Jahres an, bei der die Wähler über die Umwandlung der Südafrikanischen Union in eine Republik abstimmen sollten. Die Abstimmung war weißen Südafrikanern vorbehalten. Mehr als 90 % der Wahlberechtigten nahmen an der Volksabstimmung teil, und 52,3 % der Stimmen sprachen sich für „eine Republik für die Union“ aus. Der Gesetzentwurf zur Verfassung der Republik Südafrika wurde im Januar 1961 eingebracht. Er trat am 31. Mai 1961 in Kraft. Der 31. Mai war ein bedeutender Tag in der südafrikanischen Geschichte, denn er war sowohl der Tag der Unterzeichnung des Vertrags von Vereeniging im Jahr 1902 zur Beendigung des Zweiten Burenkriegs als auch der Tag der Gründung der Südafrikanischen Union im Jahr 1910."
dnc_eng.161.a:1 "Akzeptieren"
dnc_eng.161.b:1 "Zerschmettere sie"

dnc_eng.162.t:0 "Kanadisches Verfassungsgesetz"
dnc_eng.162.d:0 "Das Verfassungsgesetz von 1982 ist Teil der kanadischen Verfassung. Es wurde im Zuge der kanadischen Verfassungsreform eingeführt und beinhaltete mehrere Änderungen am British North America Act von 1867, darunter die Umbenennung in Verfassungsgesetz von 1867. Neben der Reformierung der Verfassung verabschiedete das Verfassungsgesetz von 1982 die Kanadische Charta der Rechte und Freiheiten, garantierte die Rechte der kanadischen Ureinwohner, ermöglichte künftige Verfassungskonferenzen und legte die Verfahren für künftige Verfassungsänderungen fest."
dnc_eng.162.a:1 "Akzeptieren"
dnc_eng.162.b:1 "Zerschmettere sie"

dnc_eng.163.t:0 "Gesetz der Republik Irland von 1948"
dnc_eng.163.d:0 "Der Republic of Ireland Act 1948 (Nr. 22 von 1948) ist ein Gesetz des irischen Parlaments (Oireachtas), das Irland offiziell als Republik Irland bezeichnet und dem Präsidenten Irlands die Befugnis überträgt, auf Anraten der irischen Regierung die Exekutivgewalt des Staates in seinen Außenbeziehungen auszuüben. Das Gesetz wurde am 21. Dezember 1948 unterzeichnet und trat am 18. April 1949, Ostermontag, dem 33. Jahrestag des Beginns des Osteraufstands, in Kraft. Das Gesetz beendete die verbleibende gesetzliche Rolle der britischen Monarchie in Bezug auf den Staat, indem es den External Relations Act von 1936 aufhob, der Georg VI. und seinen Nachfolgern jene Funktionen übertragen hatte, die nun durch das Gesetz dem Präsidenten übertragen wurden."
dnc_eng.163.a:1 "Akzeptieren"
dnc_eng.163.b:1 "Zerschmettere sie"

dnc_eng.200.t:0 "Zusammenbruch des britischen Empire"
dnc_eng.200.d:0 "1947 erlangte Indien, das enorm zu Großbritanniens Kriegsanstrengungen beigetragen hatte, seine Unabhängigkeit. Weniger als ein Jahr später starteten kommunistische Guerillas einen gewaltsamen Feldzug mit dem Ziel, Großbritannien aus Malaya zu vertreiben. Tausende wurden getötet, doch eine wirksame politische und militärische Reaktion verhinderte eine kommunistische Machtübernahme. Malaya wurde am 31. August 1957 eine unabhängige Demokratie. Im Nahen Osten gab Großbritannien 1948 eilig Palästina auf. Ghana wurde 1957 Großbritanniens erste afrikanische Kolonie, die unabhängig wurde. Bis 1967 waren mehr als 20 britische Gebiete unabhängig. Die Entkolonialisierung war ein komplexer Prozess. Die einzigartigen Gesellschaften jeder Kolonie setzten unterschiedliche politische Zwänge frei, die mitunter zu Gewalt von Unruhen bis hin zu Massakern führen konnten. Der Kalte Krieg verkomplizierte die Lage zusätzlich, da Großbritannien versuchte, ehemalige Kolonien vor dem Einfluss der Sowjetunion abzuschirmen. 1997 kam Hongkong wieder unter chinesische Verwaltung. Obwohl Großbritannien noch immer überseeische Gebiete besitzt, markierte die Übergabe das endgültige Ende des britischen Imperiums."
dnc_eng.200.a:1 "Das ist eine Katastrophe!"
  
 DNC_DiplomacyNews.9.t:0 "Kaiserliche Konferenz in London abgehalten"
 DNC_DiplomacyNews.9.d:0 "Die Kolonialkonferenz von 1902 folgte dem Ende des Burenkrieges und fand anlässlich der Krönung von Edward VII. statt. Wie die vorherige Konferenz wurde sie vom Kolonialminister Joseph Chamberlain einberufen, der sie am 30. Juni 1902 eröffnete."
 DNC_DiplomacyNews.9.a:0 "OK"
  
  


