 SOV_Iranian_Occupation:0 "Sowjetische Besetzung von [PER.GetName]"
 SOV_Iranian_Occupation_desc:0 "Aus angeblichen Sicherheitsbedenken haben wir uns nicht wie vereinbart aus iranischem Gebiet zurückgezogen. Die Alliierten und damit auch die neu gegründeten Vereinten Nationen haben uns ein Ultimatum gestellt, unsere Besetzung des Iran zu beenden. Sie fordern den sofortigen Abzug unserer Truppen aus dem Iran, da die Feindseligkeiten nachgelassen haben und die von ihnen als Besatzungsgrund vermeintlich nicht mehr gültig sind. Sie erwarten unsere formelle und wirksame Antwort."
