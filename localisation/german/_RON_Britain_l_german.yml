 ENG_National_Focus_asian_reinforcements_tt:0 "§LGarnisonstruppen werden in Singapur, Hongkong und Rangun eintreffen.§!"
 ENG_National_Focus_destoyers_hms_tt:0 "§LStellen Sie die Zerstörer HMS Matchless, HMS Obedient, HMS Opportune und HMS Undaunted in §YLanark§!, §YScotland§! in Dienst.§!"
 ENG_National_Focus_destroyers_communism_tt:0 "§LStellen Sie die Zerstörer WLNS Matchless, WLNS Obedient, WLNS Opportune und WLNS Undaunted in §YLanark§!, §YScotland§!, in Dienst.§!"
 ENG_National_Focus_Development_Budget_tt:0 "§LBeachten Sie, dass die Entwicklung der Dominions und der afrikanischen Gebiete zusätzliche Kosten verursacht und Ihre öffentliche Industriekapazität vorübergehend reduziert. Sie müssen zuerst einen Zweig abschließen, bevor Sie mit dem anderen fortfahren können. Die nationalen Schwerpunkte der Imperial Conference und der Imperial Federation sind hiervon ausgenommen. Wählen Sie mit Bedacht.§!"
