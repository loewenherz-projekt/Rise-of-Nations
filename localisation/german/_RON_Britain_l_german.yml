  dnc_eng.30.a:0 "Krieg ist es dann"
  dnc_eng.30.b:0 "Wir können uns derzeit keinen Krieg leisten"  
  
  dnc_eng.33.t:0 "Teilung Indiens"
  dnc_eng.33.d:0 "Die Teilung Indiens war die Aufteilung Britisch-Indiens in zwei unabhängige Dominions: Indien und Pakistan. Die beiden Staaten wurden seitdem weiter umstrukturiert: Das Dominion Indien ist heute die Republik Indien; während das Dominion Pakistan aus der heutigen Islamischen Republik Pakistan und der Volksrepublik Bangladesch bestand. Die Teilung beinhaltete die Aufteilung der beiden Provinzen Bengalen und Punjab, basierend auf der bezirksweiten nicht-muslimischen bzw. muslimischen Mehrheit. Im Zuge der Teilung wurden auch die Britisch-Indische Armee, die Royal Indian Navy, der Indische Staatsdienst, die Eisenbahn und die Staatskasse aufgeteilt."
