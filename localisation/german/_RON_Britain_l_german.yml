 ENG_Cackling_Hobart:0 "Standardisierte AVREs"
 ENG_Cackling_Hobart_desc:0 "Percy Hobart war bis vor kurzem stellvertretender Stabschef und dümpelte vor sich hin. Der talentierte Militäringenieur wurde aus dieser Mittelmäßigkeit befreit und erhielt ein Budget, einen Ingenieurstab und Einrichtungen, um Feldmodifikationen an unseren vorhandenen Infanteriepanzern herzustellen und zu bewerten."
 ENG_intervention:0 "Britische Intervention"
 ENG_intervention_desc:0 "Die Briten mischen sich in innere Angelegenheiten ein und gefährden damit unsere Souveränität. Das ist unakzeptabel. Wir müssen uns verteidigen und jede weitere ausländische Einmischung verhindern."
 ENG_SOV_intervention:0 "Ausländische Intervention"
 ENG_SOV_intervention_desc:0 "Ausländische Mächte mischen sich in innere Angelegenheiten ein und gefährden damit unsere Souveränität. Das ist unakzeptabel. Wir müssen uns verteidigen und weitere ausländische Einmischungen verhindern."
 ENG_limited_interventionism:0 "Begrenzte britische Intervention"
 ENG_Foreign_Support:0 "Unterstützung des britischen Leih- und Pachtgesetzes"
 ENG_Foreign_Support_desc:0 "Wir müssen den Expansionsbestrebungen feindlicher ausländischer Mächte nach Möglichkeit entgegentreten."
