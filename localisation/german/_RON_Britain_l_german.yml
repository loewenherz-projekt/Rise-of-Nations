  dnc_eng.23.a:0 "Narren..."
  
  dnc_eng.24.t:0 "Gründung der Imperialen Föderation"
  dnc_eng.24.d:0 "Die Imperial Federation bezeichnet eine Reihe von Vorschlägen im späten 19. und frühen 20. Jahrhundert zur Schaffung einer föderalen Union als Ersatz für das bestehende Britische Empire. Ein solcher Vorschlag wurde nie angenommen, doch verschiedene Pläne fanden in Australien, Kanada, Neuseeland und anderen Kolonialgebieten Anklang. Unionisten wie Joseph Chamberlain verfochten das Projekt als Alternative zu William Gladstones Vorschlägen für eine Selbstverwaltung in Irland. Es wurden zahlreiche Vorschläge unterbreitet, doch keiner fand die Mehrheit. Die Imperial Federation League, die wichtigste Interessenvertretung, spaltete sich 1893 in zwei Fraktionen. Die eine Gruppe setzte sich für die Verteidigung des Imperiums ein, die andere für den Handel. Es wurden verschiedene Vorschläge unterbreitet, die meisten forderten einen einzigen Staat mit einem imperialen Parlament mit Sitz in London. Das neue Parlament sollte sich mit Binnenhandel, Außenbeziehungen, Verteidigung und anderen Fragen befassen, die die gesamte Föderation betrafen. Das neue Parlament sollte Indien direkt regieren, während die Dominions (Australien, Kanada, Neuseeland, Neufundland und Südafrika) eine interne Selbstverwaltung behielten. Irland würde außerdem eine Selbstverwaltung erhalten, was die Forderung nach Selbstverwaltung in Irland verringern sollte."
  dnc_eng.24.a:0 "Beherrsche Britannia!"
  
  dnc_eng.25.t:0 "Gründung der Kaiserlichen Zollunion"
  dnc_eng.25.d:0 "Delegationen aus allen Teilen des Empire trafen sich in London und hielten in einer einwöchigen Parlamentssitzung ihre Vorträge. Das Endergebnis war, dass Schritte unternommen wurden, um alle bestehenden gesetzlichen oder vertraglichen Hindernisse zu beseitigen und den Weg für die Schaffung einer Zollunion zwischen den verschiedenen Teilen des Britischen Empires zu ebnen."
  dnc_eng.25.a:0 "Akzeptieren"
  dnc_eng.25.b:0 "Abfall"
  
