ENG_second_boer_war:0 "Zweiter Burenkrieg"
ENG_second_boer_war_desc:0 "Der Zweite Burenkrieg (11. Oktober 1899 – 31. Mai 1902), auch bekannt als Burenkrieg, Anglo-Burenkrieg oder Südafrikanischer Krieg, wurde zwischen dem Britischen Empire und zwei unabhängigen Burenstaaten, der Südafrikanischen Republik (Republik Transvaal) und dem Oranje-Freistaat, um den Einfluss des Empires in Südafrika geführt. Auslöser des Krieges war die Entdeckung von Diamanten und Gold in den Burenstaaten. Die ersten Angriffe der Buren waren erfolgreich, und obwohl britische Verstärkungen diese später zurückschlugen, dauerte der Krieg noch jahrelang mit burischen Guerillakämpfen an, bis harte britische Gegenmaßnahmen, darunter eine Politik der verbrannten Erde, die Buren zur Vernunft brachten."
ENG_second_boer_war2:0 "Zweiter Burenkrieg"
ENG_second_boer_war2_desc:0 "Der Zweite Burenkrieg (11. Oktober 1899 – 31. Mai 1902), auch bekannt als Burenkrieg, Anglo-Burenkrieg oder Südafrikanischer Krieg, wurde zwischen dem Britischen Empire und zwei unabhängigen Burenstaaten, der Südafrikanischen Republik (Republik Transvaal) und dem Oranje-Freistaat, um den Einfluss des Empires in Südafrika geführt. Auslöser des Krieges war die Entdeckung von Diamanten und Gold in den Burenstaaten. Die ersten Angriffe der Buren waren erfolgreich, und obwohl britische Verstärkungen diese später zurückschlugen, dauerte der Krieg noch jahrelang mit burischen Guerillakämpfen an, bis harte britische Gegenmaßnahmen, darunter eine Politik der verbrannten Erde, die Buren zur Vernunft brachten."

