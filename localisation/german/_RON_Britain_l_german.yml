 ENG_S.A.S.:0 "Der britische Special Air Service"
 ENG_S.A.S._desc:0 "Wir verfügen über speziell ausgebildete Männer aus den regulären Streitkräften, die sich freiwillig für die Bildung der Brigaden des Special Air Service zur Verfügung stellen. Ihre Disziplin und Moral sind angesichts des Feindes hoch, und das Mantra „Wer wagt, gewinnt“ ist bereits ein Zeichen der Stärke."
