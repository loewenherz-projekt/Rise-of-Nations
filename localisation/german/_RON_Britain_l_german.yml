  DNC_DiplomacyNews.10.t:0 "Gründung der Koalition des Zehnten Kreuzzugs"
  DNC_DiplomacyNews.10.d:0 "Die Kreuzzüge waren eine Reihe von Religionskriegen, die im Mittelalter von der lateinischen Kirche initiiert, unterstützt und manchmal auch geleitet wurden. Die bekanntesten dieser Kreuzzüge sind jene ins Heilige Land zwischen 1095 und 1291, deren Ziel die Rückeroberung Jerusalems und seiner Umgebung von der islamischen Herrschaft war. Gleichzeitige militärische Aktivitäten auf der Iberischen Halbinsel gegen die Mauren (die Reconquista) und in Nordeuropa gegen heidnische slawische Stämme (die Nordischen Kreuzzüge) wurden ebenfalls als Kreuzzüge bezeichnet. Im 15. Jahrhundert wurden weitere von der Kirche sanktionierte Kreuzzüge gegen ketzerische christliche Sekten, gegen das Byzantinische und das Osmanische Reich, zur Bekämpfung von Heidentum und Häresie und aus politischen Gründen geführt. Auch nicht von der Kirche sanktionierte Volkskreuzzüge einfacher Bürger kamen häufig vor."
  DNC_DiplomacyNews.10.a:1 "Wir werden Jerusalem einnehmen!"
  DNC_DiplomacyNews.10.b:1 "Krieg steht vor der Tür ..."
  
  dnc_eng.40.t:0 "Zehnter Kreuzzug ins Heilige Land"
  dnc_eng.40.d:0 "Die Kreuzzüge waren eine Reihe von Religionskriegen, die im Mittelalter von der lateinischen Kirche initiiert, unterstützt und manchmal auch gelenkt wurden. Die bekanntesten dieser Kreuzzüge sind jene ins Heilige Land zwischen 1095 und 1291, deren Ziel die Rückeroberung Jerusalems und seiner Umgebung von der islamischen Herrschaft war. Auch die gleichzeitigen militärischen Aktivitäten auf der Iberischen Halbinsel gegen die Mauren (Reconquista) und in Nordeuropa gegen heidnische slawische Stämme (Nordische Kreuzzüge) wurden als Kreuzzüge bezeichnet. Im 15. Jahrhundert wurden weitere von der Kirche sanktionierte Kreuzzüge gegen ketzerische christliche Sekten, gegen das Byzantinische und das Osmanische Reich, zur Bekämpfung von Heidentum und Häresie sowie aus politischen Gründen geführt. Auch nicht von der Kirche sanktionierte Volkskreuzzüge einfacher Bürger waren häufig. Beginnend mit dem Ersten Kreuzzug, der 1099 zur Rückeroberung Jerusalems führte, wurden Dutzende von Kreuzzügen geführt, die jahrhundertelang einen Brennpunkt der europäischen Geschichte bildeten."
  dnc_eng.40.a:0 "Deus Vult!"
  dnc_eng.40.b:0 "Wir werden nicht teilnehmen"
  
