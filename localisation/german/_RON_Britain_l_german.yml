  dnc_eng.37.t:0 "[From.GetName] bietet uns Schutz"
  dnc_eng.37.d:0 "Der [FROM.GetAdjective]-Botschafter in [Root.Capital.GetName] hat sich an unser Außenministerium gewandt und ihm Schutz im Austausch für die beiden südlichsten schwedischen Staaten angeboten. Grundlage für diesen Anspruch ist das Nordseereich von Knut dem Großen, zu dem diese Ländereien gehörten."
  dnc_eng.37.a:0 "Akzeptieren"
  dnc_eng.37.b:0 "Das ist unser Land."
  
  dnc_eng.38.t:0 "[From.GetName] Akzeptiert"
  dnc_eng.38.d:0 "Die [FROM.GetAdjective]-Regierung hat unser Angebot angenommen und uns im Austausch gegen Schutz unser rechtmäßiges Land übergeben."
  dnc_eng.38.a:0 "Exzellent"
  
  dnc_eng.39.t:0 "[From.GetName] lehnt ab"
  dnc_eng.39.d:0 "Die [FROM.GetAdjective]-Regierung hat törichterweise beschlossen, unser Angebot abzulehnen und uns damit unser rechtmäßiges Land vorzuenthalten. Vielleicht ist es an der Zeit, andere Alternativen in Betracht zu ziehen."
