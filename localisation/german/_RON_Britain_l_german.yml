  dnc_eng.43.t:0 "[From.GetName] Ultimatum für Hannover"
  dnc_eng.43.d:0 "Ein Ultimatum ist eine Forderung, deren Erfüllung innerhalb einer bestimmten Frist verlangt wird und die mit der Drohung verbunden ist, sie im Falle der Nichterfüllung zu erfüllen. Ein Ultimatum ist in der Regel die letzte Forderung in einer Reihe von Forderungen. Daher ist die Frist meist kurz und die Forderung nicht verhandelbar. Die Drohung, die das Ultimatum untermauert, kann je nach Forderung und den sonstigen Umständen variieren."
  dnc_eng.43.a:0 "Übergeben Sie sie"
  dnc_eng.43.b:0 "Komm und hol sie dir"  
  
