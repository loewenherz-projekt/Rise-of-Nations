 ENG_National_Focus_Special_Air_Service_Requisition_tt:0 "§L Ermöglicht die Anforderung von Special Air Service Brigades, hocheffektiven Kommandoeinheiten, deren Anzahl jedoch sehr begrenzt und unersetzlich ist. Sie sind nur verfügbar, wenn Großbritannien eine §BDemokratie§! ist.§!"
