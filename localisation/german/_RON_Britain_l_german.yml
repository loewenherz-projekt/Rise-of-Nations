 ENG_motorised_production:0 "Massenmotorisierung"
 ENG_motorised_Production_desc:0 "Nachdem wir uns nun für eine voll motorisierte Truppe entschieden haben, können wir uns auf die Standardisierung von Typen und Ersatzteilen konzentrieren."
 ENG_mechanized_production:0 "Allgegenwärtig und winzig"
 ENG_mechanized_production_desc:0 "Obwohl der Universal Carrier eine wackelige und kleine Maschine ist, ist er dennoch äußerst effektiv und einfach herzustellen."
 ENG_horse_drawn_support:0 "Pferdekutschen-Unterstützung"
 ENG_horse_drawn_support_desc:0 "Obwohl keineswegs ideal, haben die durch den Verzicht auf jegliche Hoffnung auf eine vollständige Motorisierung der königlichen Artillerie geschaffenen Haushaltsfreiheiten die Aufgabe des Kriegsministeriums bei der Erfüllung der Divisionsanforderungen erheblich erleichtert."
 ENG_SPG_production:0 "Selbstfahrende Unterstützung"
 ENG_SPG_production_desc:0 "Da das Gewicht unserer Feuerkraft nun fest auf der gepanzerten Halterung liegt, können wir die Produktionslinien vereinfachen und die verschiedenen Typen verbessern."
 ENG_Rearmarment_Budget_up_tt:0 "§RIncreases§! budget stress."
 ENG_Rearmarment_Budget_down_tt:0 "§GRenkt§! die Haushaltsbelastung."
 ENG_Plan_Speed:0 "Reorganisierter kaiserlicher Generalstab"
 ENG_Plan_Speed_desc:0 "Durch die Revitalisierung wurde unser Generalstab erheblich verbessert, sodass Anweisungen schneller und gründlicher an die unteren Ränge weitergegeben werden können."
 ENG_Rearmarment_Budget_None:0 "Stillstand der Wiederbewaffnung"
 ENG_Rearmarment_Budget_None_desc:0 "Da die Staatskasse keine neuen Mittel bereitstellt, stagniert die Wiederaufrüstung der Armee. Dadurch bleiben jedoch große Summen für andere Projekte übrig."
 ENG_Rearmarment_Budget_1:0 "Schleppende Wiederbewaffnung"
 ENG_Rearmarment_Budget_1_desc:0 "Trotz intensiver Sparsamkeit und Erbsenzählerei kommt die Armee langsam mit ihren materiellen und disziplinarischen Bedürfnissen klar. Dennoch ist der Haushaltsüberschuss politisch nützlich."
 ENG_Rearmarment_Budget_2:0 "Stetige Wiederbewaffnung"
 ENG_Rearmarment_Budget_2_desc:0 "Mit ausreichenden, wenn nicht gar im Überfluss vorhandenen Finanzmitteln waren wir in der Lage, die unangenehmsten Sparmaßnahmen zu beenden und mit der Wiederaufrüstung zu beginnen."
 ENG_Rearmarment_Budget_3:0 "Dringende Wiederbewaffnung"
 ENG_Rearmarment_Budget_3_desc:0 "Obwohl die breite Öffentlichkeit diese Panikmache fürchtet, ist das Verteidigungsministerium inzwischen finanziell gut ausgestattet und hat seine Auftragslage drastisch ausgeweitet. Dies hat allerdings zu Einsparungen an anderer Stelle im Haushalt geführt und einige andere Ingenieurprojekte verhindert."
 ENG_Rearmarment_Budget_4:0 "Aggressive Wiederbewaffnung"
 ENG_Rearmarment_Budget_4_desc:0 "Obwohl das rasante Tempo der Wiederaufrüstung zweifellos dazu führt, dass Waffen und Soldaten schneller ins Feld gelangen, als dies sonst möglich wäre, beginnen die dafür erforderlichen Mittel die höheren Dienste und die Versuche, unsere industrielle Basis für den kommenden Konflikt aufzubauen, zu ersticken."
 ENG_Rearmarment_Budget_5:0 "Rücksichtslose Wiederbewaffnung"
 ENG_Rearmarment_Budget_5_desc:0 "Ohne Zurückhaltung oder Widerstand wurde der Armee in diesem Haushaltszyklus absolute Priorität eingeräumt, und die daraus resultierenden Steuererhöhungen wirken erdrückend. Die Werften leiden unter Arbeitskräfte- und Materialmangel. Der Geldmangel hat überall, außer im Verteidigungsministerium, einen Punkt erreicht, an dem er sogar die Investitionen des Imperiums zu ersticken beginnt."
 ENG_Development_Budget_up_tt:0 "§RIncreases§! budget stress."
 ENG_Development_Budget_Initiated:0 "Finanzierung der Kolonialentwicklung"
 ENG_Development_Budget_Initiated_desc:0 "Im Unterhaus wurde ein Gesetzentwurf zur Finanzierung des Infrastrukturausbaus in Überseegebieten und Dominions eingebracht. Die Abgeordneten debattieren derzeit über die Finanzierungsmöglichkeiten dieser Projekte."
