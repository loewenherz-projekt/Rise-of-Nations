 ### FOCUSES
 uk_george_vi:0 "Georg VI."
 uk_george_vi_desc:0 "Georg VI. regiert heute als König des Vereinigten Königreichs und seiner Dominions, als Kaiser von Indien und als Herrscher des Britischen Empire. Von der passiven Seite wird Georg VI. als sicherer Mann für die Nation angesehen, der das britische Volk ruhig und gelassen durch alles steuert, was auf uns zukommt."
 uk_edward_viii:0 "Eduard VIII."
 uk_edward_viii_desc:0 "Edward VIII. regiert heute als König des Vereinigten Königreichs und seiner Dominions, als Kaiser von Indien und als Herrscher des Britischen Empire. Freimütig, forsch und traditionswidrig wird er Großbritannien voraussichtlich auf einen anderen Weg führen als den der Vergangenheit."
 uk_edward_german_visit:0 "Staatsbesuch in Deutschland"
 uk_edward_german_visit_desc:0 "In einem Schritt, den viele als Einmischung in die Außenpolitik der Regierung gegenüber dem deutschen Vorgehen auf dem Kontinent betrachten, stattete der König Deutschland einen einwöchigen Besuch ab, traf Adolf Hitler und wurde königlich empfangen."
 uk_appeasement_broadcast:0 "Die Beschwichtigungssendung"
 uk_appeasement_broadcast_desc:0 "Mit seinem unverblümten Verhalten bricht der König erneut mit der jüngsten Tradition: Er gab den BBC-Nachrichten ein ungewöhnlich unvorsichtiges und persönliches Interview, in dem er als Soldat des letzten Krieges für Frieden auf dem Kontinent um jeden Preis plädiert. Während er Whitehall wütend macht, ist seine Haltung auf der Straße beliebt: Viele Briten sind nicht bereit, für einen weiteren europäischen Krieg zu sterben."
 uk_splendid_isolation:0 "Herrliche Isolation"
 uk_splendid_isolation_desc:0 "Unter dem Druck des immer freimütiger auftretenden Königs und der hinter ihm stehenden Bevölkerung vollzog die Regierung einen drastischen Kurswechsel und versprach Neutralität in kontinentalen Angelegenheiten. Die „splendid isolation“ ist, so scheint es, zurück."
 uk_troublesome_brother:0 "Der lästige Bruder"
 uk_troublesome_brother_desc:0 "Edward VIII., der heutige Herzog von Windsor, dessen gescheiterte Regentschaft längst vorbei ist, stellt weiterhin ein Problem dar. Die persönlichen Beziehungen zwischen dem Herzog und dem König werden zunehmend angespannt, während die pro-nazistischen Gefühle angesichts der sich abkühlenden deutsch-englischen Beziehungen zu einem wachsenden Problem werden. Um ihn aus dem Weg zu räumen und mögliche deutsche Intrigen zu unterbinden, wird vorgeschlagen, ihn auf die Bahamas zu schicken, wo er als Gouverneur regieren kann."
 uk_kings_speech:0 "Die Rede des Königs"
 uk_kings_speech_desc:0 "Wieder einmal stehen wir den Hunnen gegenüber. Hitlers Eroberungsdrang hat ein unerträgliches Ausmaß erreicht, und die zivilisierten Nationen Europas stehen gegen ihn und sein revanchistisches Deutschland in den Waffen. Es ist an der Zeit, dass die ganze Nation diese Kriegsanstrengungen unterstützt. Und wie könnte man besser Unterstützung gewinnen als mit einer Rede des britischen Herrschers an die königlichen Untertanen?"
 uk_the_rock:0 "Der Fels" 
 uk_the_rock_desc:0 "Frankreich ist gefallen. Deutsche Bomber kreisen über uns. Doch Großbritannien steht noch immer stark da. Premierminister kommen und gehen – Politiker sind wie der Wind, aber Könige sind Fels in der Brandung. Selbst als Bomben das East End treffen, bleiben der König und die königliche Familie im Buckingham Palace und trotzen den Bomben zusammen mit ihren Untertanen – dies ist ein Krieg, der ganz Großbritannien betrifft, nicht nur den einfachen Mann. Wir werden siegen, komme, was wolle."
 uk_colonial_policy:0 "Kolonialpolitik beibehalten" 
 uk_colonial_policy_desc:0 "Großbritanniens Stärke beruht auf unseren Kolonialbesitzungen in aller Welt. Es ist an der Zeit, sie auf Vordermann zu bringen." 
 uk_reaffirmation:0 "Bestätigung" 
 uk_dissolution:0 "Auflösung" 
 uk_dissolution_desc:0 "Die Zeichen stehen auf Sturm. Die Ära des Imperiums geht weltweit zu Ende. Wir können uns entweder dieser Flut anschließen oder von ihr mitgerissen werden." 
 uk_newfoundland_ref:0 "Referendum in Neufundland" 
 uk_newfoundland_ref_desc:0 "Die Neufundland-Frage ist seit langem ein Streitpunkt mit dem Dominion Kanada. Es ist an der Zeit, dies ein für alle Mal zu klären, indem die Frage den Wählern vorgelegt wird." 
 uk_rhodesia_federation:0 "Föderation von Rhodesien und Njassaland" 
 uk_rhodesia_federation_desc:0 "Rhodesien und das benachbarte Njassaland sind zweifellos unsere erfolgreichste Kolonie in Subsahara-Afrika und agieren seit einiger Zeit wie ein unabhängiger Staat. Es ist an der Zeit, ihnen den offiziellen Status einer Föderation zu verleihen." 
 uk_caribbean_federation:0 "Westindische Föderation" 
 uk_caribbean_federation_desc:0 "Die Westindischen Inseln sind kaum die produktivste Ecke des Imperiums, aber Amerika ist der Kontinent der Freiheit, und es ist an der Zeit, diesen Segen auf unsere afrokaribischen Untertanen auszudehnen." 
 uk_indian_independence:0 "Indische Unabhängigkeit" 
 uk_indian_independence_desc:0 "Indien ist das Juwel des Imperiums und man trennt sich nicht so leicht davon. Doch die Welle der Unabhängigkeit nimmt zu, und es ist besser, die Bedingungen für den Austritt festzulegen, solange wir noch dazu in der Lage sind." 
 uk_new_britons:0 "Die neuen Briten" 
 uk_new_britons_desc:0 "Auf der Suche nach einem besseren Leben kommen viele Einwanderer aus den neuen unabhängigen Staaten Afrikas und Asiens auf die Britischen Inseln." 
 uk_dominion_independence:0 "Unabhängigkeit der Dominions" 
 uk_dominion_independence_desc:0 "Unsere Dominions wurden lange Zeit als vorletzter Schritt auf dem langen Weg zur Unabhängigkeit betrachtet. Es ist an der Zeit, ihnen zu geben, was sie wollen." 
 uk_australia_independence:0 "Australien" 
 uk_australia_independence_desc:0 "Advance Australia Fair!" 
 uk_nz_independence:0 "Neuseeland" 
 uk_nz_independence_desc:0 "Gott schütze Neuseeland!" 
 uk_canada_independence:0 "Kanada"
 uk_canada_independence_desc:0 "Oh, Kanada!"
 uk_sa_independence:0 "Südafrika" 
 uk_sa_independence_desc:0 "Die Stem van Suid-Afrika!" 
 uk_postwar_boom:0 "Nachkriegsboom" 
 uk_postwar_boom_desc:0 "Mit der Auflösung der Hauptkontingente des Empire und dem Frieden in Großbritannien sind wir in eine Phase enormen wirtschaftlichen Wohlstands eingetreten." 
 uk_stay_course:0 "Bleiben Sie auf Kurs"  
 uk_stay_course_desc:0 "Am Horizont ziehen Gewitterwolken auf. Der Fluss schäumt vor Blut. Dunkle Zeiten stehen bevor, und für diese Zeiten brauchen wir eine starke, stabile Führung. Diese neumodischen politischen Experimente haben auf dem Kontinent und anderswo verheerende Schäden angerichtet. Um unseres eigenen Wohls willen sollten wir an Bewährtem festhalten." 
 uk_new_direction:0 "Eine neue Richtung" 
 uk_new_direction_desc:0 "Die alten Methoden haben uns im Stich gelassen, so viel ist klar! Das Empire schwindet, Hitler wütet in Europa und Großbritanniens Sonne geht langsam unter. Es ist Zeit für einen Wandel." 
 uk_assassinate_mosley:0 "Ermordung von Mosley" 
 uk_assassinate_mosley_desc:0 "Nachdem er während der Schlacht in der Cable Street persönlich angeschlagen wurde und ihm von antifaschistischen Demonstranten die Rippen gebrochen wurden, liegt Mosley im Krankenhaus und ist nicht in der Lage, sich zu verteidigen. In diesem Zustand ist ein zufälliger „Unfall“ nicht unvorstellbar …" 
 uk_blackshirt_hegemony:0 "Hegemonie der Schwarzhemden auf der Straße" 
 uk_blackshirt_hegemony_desc:0 "Nachdem die Bolschewiken in der Cable Street aufgetaucht sind und eine ordentliche Tracht Prügel bekommen haben, ziehen die Schwarzhemden frei durch die Straßen Londons." 
 uk_defections:0 "MP-Überläufer" 
 uk_defections_desc:0 "Wie Hitler erfahren musste, reichen Straßengangster nicht aus, um eine Nation zu gewinnen. Die angesehene Position von Baronet Mosley ermöglicht uns ein gewisses Maß an politischer Legitimität, und immer mehr radikale konservative Abgeordnete wechseln die Seiten, um sich uns anzuschließen." 
 uk_fascist_colonies:0 "Koloniale Unterstützung" 
 uk_fascist_colonies_desc:0 "Dank der Scharfsinnigkeit und Wirksamkeit unseres Weltreichs hat sich die britische Rasse über die ganze Welt verbreitet. Genau wie die Rasse, die sie repräsentiert, wird die britische faschistische Bewegung nicht auf diese einsame Insel beschränkt bleiben, sondern sich über die ganze Welt ausbreiten!" 
 uk_royal_mandate:0 "Königliches Mandat" 
 uk_royal_mandate_desc:0 "Der Herrscher, Edward VIII., ist nicht nur der beliebte und verehrte König-Kaiser des Britischen Empire, sondern auch ein Sympathisant unserer Sache, teilt viele unserer Ansichten und sieht die Notwendigkeit, sich aus allen Konflikten in Europa herauszuhalten. Ein königliches Mandat für eine faschistische Regierung würde uns nahezu augenblicklich an die Macht bringen!" 
 uk_march_london:0 "Marsch auf London" 
 uk_march_london_desc:0 "Die Zeit des Redens ist vorbei. Wie Hitler und Mussolini uns gezeigt haben, sind Debatten, Wahlpolitik und andere Organe des Establishments unwiderruflich durch degenerierten Einfluss korrumpiert, und nur durch Taten werden wir an die Macht kommen." 
 uk_trade_unions:0 "Revolutionäre Gewerkschaften" 
 uk_trade_unions_desc:0 "Die großen Gewerkschaften sind nichts weiter als Marionetten des kapitalistischen Staates – sie fordern nur so viel, wie ihre Herren ihnen erlauben. Was nützt eine gefesselte Gewerkschaft? Es ist Zeit für eine echte Arbeitnehmervertretung!" 
 uk_reject_parliament:0 "Ablehnung der parlamentarischen Politik" 
 uk_reject_parliament_desc:0 "Das Westminster-System wird niemals eine legitime sozialistische Kraft akzeptieren. Mit seiner verfassungsmäßigen Unbeständigkeit und seinem konservativen Establishment wird es die Regeln nach Bedarf beugen, um die Stimme des Volkes zu unterdrücken. In den Hallen Westminsters gibt es für uns nichts zu finden, also werden wir sie zerstören. " 
 uk_rebuild_empire:0 "Baue das Imperium wieder auf" 
 uk_rebuild_empire_desc:0 "Blind gegenüber der Wahrheit unserer revolutionären Vision hat uns das Imperium im Stich gelassen. Doch auf Biegen und Brechen werden wir es zurückholen." 
 uk_recapture_africa:0 "Afrika zurückerobern" 
 uk_recapture_africa_desc:0 "Afrika, einst unter britischer Herrschaft stabil, wird heute von aufstrebenden Nationalisten, verbitterten Buren und anderen Geiern ausgeplündert. Es ist Zeit, die zivilisierte Herrschaft auf den schwarzen Kontinent zurückzubringen." 
 uk_reconquer_india:0 "Indien zurückerobern" 
 uk_reconquer_india_desc:0 "Das Raj war das Juwel des Imperiums. Ohne es sind wir am Ende. Aber wir werden den Subkontinent zurückbekommen." 
 uk_reclaim_dominions:0 "Erobern Sie die Dominions zurück" 
 uk_reclaim_dominions_desc:0 "Die Siedlerkolonien Kanada, Australien und Neuseeland bildeten den Endpunkt des britischen imperialen Projekts. Mit Ressourcen aus Indien und Afrika könnten wir weltweit neue angelsächsische Nationen gründen. Sie haben uns verlassen, werden aber bald zurückkehren." 
 uk_seize_colonies:0 "Erobern Sie französische Kolonien" 
 uk_seize_colonies_desc:0 "Die französische Metropole wurde unter deutschen Panzerketten vernichtet – ihre Kolonien sind nun den Angriffen imperialistischer Mächte schutzlos ausgeliefert und es liegt in unser beider Interesse, dass sie in sicheren Händen sind." 
 uk_seize_congo:0 "Einmarsch in den Kongo" 
 uk_seize_congo_desc:0 "Das winzige Belgien scheint so gut wie verschwunden zu sein – das kleine Land ist unter den Ketten deutscher Panzer zu Staub zermahlen worden – der riesige Belgisch-Kongo ist nun praktisch schutzlos und es liegt in unser beider Interesse, dass er in sicheren Händen ist."
 uk_join_axis:0 "Treten Sie der Achse bei" 
 uk_join_axis_desc:0 "Die Grundidee des Faschismus – dass wir allein schwach wie ein Zweig, aber zusammen als Bündel unzerbrechlich sind – zeigt, dass unser Schicksal in einem Bündnis mit den kontinentalen faschistischen Mächten liegt. Vorwärts für die Jugend und für Europa!" 
 uk_recognise_manchukuo:0 "Mandschukuo erkennen" 
 uk_recognise_manchukuo_desc:0 "Japan wird seit dem Ersten Weltkrieg von vielen Briten als Feind und Bedrohung unserer Interessen im Fernen Osten betrachtet. Es ist an der Zeit, diese bedauerliche diplomatische Kluft mit gegenseitigem Respekt zu überbrücken, beginnend mit der Anerkennung ihres mandschurischen Verbündeten." 
 uk_expand_empire:0 "Erweitern Sie das Imperium" 
 uk_expand_empire_desc:0 "Alles, was altersschwach und statisch bleibt – ein Imperium, eine Nation, eine Rasse – wird unweigerlich verkümmern und sterben. Durch ständige Expansion, Neuerfindung und Fortschritt werden wir das erste ewige Imperium sein." 
 uk_conquer_siam:0 "Sicheres Siam" 
 uk_conquer_siam_desc:0 "Siam konnte sich der europäischen Unterwerfung lange entziehen. Es ist Zeit, den Stiefel niederzustrecken." 
 uk_conquer_iran:0 "Iranische Ölfelder" 
 uk_conquer_iran_desc:0 "Der Iran ist das ewige Problem der euro-orientalischen Imperien. Ein Problem, das sich durch den Wert des Öls in der modernen Ära noch verschärft hat – wir können nicht riskieren, dass diese wertvolle Ressource in die Hände des Feindes fällt." 
 uk_conquer_afghanistan:0 "Vierter Anglo-Afghanischer Krieg" 
 uk_conquer_afghanistan_desc:0 "Dieses lästige kleine zentralasiatische Despotat ist uns schon zu oft entwischt. Es soll ein für alle Mal unter britische Herrschaft kommen." 
 uk_flip_board:0 "Drehen Sie das Brett um"  
 uk_flip_board_desc:0 "Dieses kleinliche „Große Spiel“ hat lange genug gedauert. Es ist Zeit für uns, das Blatt zu wenden und dieser Angelegenheit ein für alle Mal ein Ende zu setzen."  
 uk_revolution:0 "Arbeiterrevolution"  
 uk_revolution_desc:0 "Jetzt ist es soweit! Der Generalstreik ist in Kraft, die Arbeiter versammeln sich auf den Straßen und hissen die rote Fahne, um ihre Rechte einzufordern. Die Polizei reicht nicht mehr aus, und die auf den Straßen Londons stationierte Armee ist bereits in Scharen zu uns übergelaufen. Es ist Zeit, die Paläste der Reichen zu stürmen – Westminster, Balmoral, Buckingham –, die rote Fahne hochzuhalten und eine mutige neue Zukunft zu verkünden. Arbeiter aller Länder, vereinigt euch!"  
 uk_split_us:0 "Teilen Sie die Staaten auf"   
 uk_split_us_desc:0 "Die Vereinigten Staaten, dieser große Riese der Neuen Welt, sind sowohl unser hochgestelltes Kind als auch der Gegenpol zu Japans imperialen Ambitionen. Obwohl scheinbar unbesiegbar, werden wir diesen Titanen mit tausend Schnitten töten."   
 uk_wayward_dominion:0 "Das eigensinnige Dominion"   
 uk_wayward_dominion_desc:0 "Der Verlust Irlands war ein Tiefpunkt des britischen Imperialismus. Wir werden Irland in die Herde zurückführen!"   
 uk_china_backdoor:0 "Chinas Hintertür"  
 uk_china_backdoor_desc:0 "Die entschlossenen Chinesen leisten den Japanern einen zähen Kampf. Unsere eigene Regierung steht ihnen mittendrin, warum also nicht etwas Hilfe leisten?"  
 uk_fascist_military:0 "Nationales Mobilisierungsprogramm"  
 uk_fascist_military_desc:0 "Die britische Bevölkerung ist fett, faul, dekadent und hat den Krieg nicht mehr so ernst genommen. Es ist Zeit, sie daran zu erinnern!"  
 uk_oil_bund:0 "Europäischer Ölbund"  
 uk_oil_bund_desc:0 "Öl ist eine Ressource, die jedes aufstrebende Imperium in der modernen Ära braucht, und während unsere Quellen in den Kolonien jenseits des Meeres uns derzeit versorgen, wäre es gut, eine wirtschaftliche Beziehung zum ölreichen Rumänien aufzubauen, mit dem wir bereits verbündet sind."  
 uk_colonial_expeditions:0 "Kaiserliche Rückgewinnungsbrigaden"  
 uk_colonial_expeditions_desc:0 "Unser Empire hat uns im Stich gelassen, und die neue Ordnung im Inland braucht es zurück. Lassen Sie uns zu diesem Zweck spezielle Bataillone der britischen Armee organisieren, deren ausdrückliches Ziel es ist, unsere Gebiete jenseits des Meeres zurückzuerobern."  
 uk_revolutionary_redcoats:0 "Die neuen Rotröcke"  
 uk_revolutionary_redcoats_desc:0 "Jede neue Revolution braucht eine loyale revolutionäre Elitegarde, die die Ideale der Bewegung schützt und fördert. Die „Rotröcke“, wie einige unserer Männer genannt werden, sollen den Kern einer neuen britischen Armee bilden."  
 uk_syndicalist_armories:0 "Syndizierte Waffenlager"  
 uk_syndicalist_armories_desc:0 "Wir sind eine Bewegung des Volkes, und eine revolutionäre Armee sollte nichts anderes sein als die konkrete, physische Verkörperung des Willens des Proletariats. Öffnet die Arsenale!"  
 uk_central_committee:0 "Sitzung des Zentralkomitees" 
 uk_central_committee_desc:0 "Wir haben gewonnen. Der Monarch ist geflohen, und die kapitalistischen Handlanger, die nicht mit ihm gegangen sind, haben wir gefangen genommen. Sie warten auf ihre Prozesse für ihre jahrelange Ausbeutung durch das Leid der Arbeiter. Jetzt ist es an der Zeit, unser neues Utopia zu gestalten."   
 uk_tankie_committee:0 "Halten Sie sich an die sowjetische Linie"  
 uk_tankie_committee_desc:0 "Im Osten hat die Sowjetunion bereits ein erfolgreiches System etabliert! Revolutionen können leicht in genau das abdriften, was sie bekämpft haben, und wir müssen darauf achten, nur das zu verwenden, was sich bewährt hat, um die Ideen der Bewegung aufrechtzuerhalten."  
 uk_syndicalist_committee:0 "Anarcho-Syndikalistischer Block"  
 uk_syndicalist_committee_desc:0 "Lenin, Stalin und die mörderischen Despoten des Ostens sind genau das – ihre autoritären Diktaturen sind nichts weiter als ein Spiegelbild des alten Zarismus. Wir dürfen nicht in dieselbe Falle tappen."  
 uk_syndicalist_development_1:0 "Ländliche Entwicklung"  
 uk_syndicalist_development_1_desc:0 "Wir sind eine kleine, aber starke Insel. Das hat die Geschichte bewiesen. Indem wir den uns zur Verfügung stehenden Raum effizient nutzen, können wir den Verlust des Imperiums wettmachen."  
 uk_syndicalist_development_2:0 "Dezentralisierung des Fabrikbaus"  
 uk_syndicalist_development_2_desc:0 "Eine zentral geplante Industriepolitik, die von Bürokraten fernab der Realität des Arbeitslebens betrieben wird, ist kein Weg, eine freie Gesellschaft zu kontrollieren. Wer arbeitet, entscheidet, wie, wann und wo er arbeitet!"  
 uk_syndicalist_development_3:0 "Versorgungsstraßen mit beschränktem Zugang"  
 uk_syndicalist_development_3_desc:0 "Mit der Industrialisierung unserer ländlichen Gebiete zeigt sich das Alter unserer Infrastruktur. Neue, speziell für den Rohstofftransport und die Industrie konzipierte Straßen werden uns helfen, diese Lücke zu schließen."  
 uk_syndicalist_fed:0 "Die Britische Föderation"  
 uk_syndicalist_fed_desc:0 "Das „Vereinigte Königreich“ ist ebenso wie das brutale Regime in Indien ein Produkt des Imperialismus, das aus Konkordaten bürgerlicher Könige hervorging. Es ist an der Zeit, dieses Unrecht zu korrigieren."  
 uk_syndicalist_research:0 "Bundesuniversitätsförderung"  
 uk_syndicalist_research_desc:0 "Wir sind eine Nation mit einem reichen Bildungsniveau und einigen der ältesten Institutionen der Welt. Dennoch bleibt das Wissen im Elfenbeinturm gefangen. Die Vergabe von Stipendien an die desillusionierte Bevölkerung Großbritanniens würde unsere Produktivität massiv steigern."  
 uk_syndicalist_ireland:0 "Das dritte Syndikat"  
 uk_syndicalist_ireland_desc:0 "Irland, lange Zeit Opfer des Britischen Empires, hat endlich eine Chance auf eine gemeinsame Zukunft mit den anderen Inselnationen. Die verlockende Aussicht auf ein vereintes Irland sollte ausreichen, um es in die Föderation aufzunehmen."  
 uk_syndicalist_diplomacy:0 "Syndikalistische Diplomatie"  
 uk_syndicalist_diplomacy_desc:0 "Was nützt eine Revolution, die nur an den Küsten Großbritanniens stattfindet? Es ist Zeit, unsere Flügel auszubreiten und in die ganze Welt zu ziehen!"  
 uk_syndicalist_spain:0 "Anglo-Spanische Allianz"  
 uk_syndicalist_spain_desc:0 "Spanien war die Blaupause für die Britische Revolution – unser eigener Premierminister Orwell ist ein Veteran des Spanienkriegs, wie viele unserer führenden Politiker. Auch sie fühlen sich von der autoritären Politik der Sowjetunion entfremdet und würden sich in unserer Syndikalistischen Internationale wohlfühlen!"  
 uk_syndicalist_denmark:0 "Syndikalismus nach Dänemark"  
 uk_syndicalist_denmark_desc:0 "Alle Völker der Welt, die unter autoritärer Herrschaft versklavt sind, schreien nach Freiheit. Nur Nordeuropa ist jedoch in Reichweite. Vorerst. Wir beginnen mit Dänemark."  
 uk_syndicalist_norway:0 "Norwegischer Stützpunkt"  
 uk_syndicalist_norway_desc:0 "Da Dänemark am Boden liegt, wird Norwegen als hervorragendes nächstes Ziel und Ausgangspunkt für eine Invasion des Kronjuwels Skandinaviens dienen – Schweden!"  
 uk_syndicalist_sweden:0 "Bringen Sie die Revolution nach Schweden"   
 uk_syndicalist_sweden_desc:0 "Es ist Zeit, die Vereinigung Skandinaviens zu vollenden. Auf nach Stockholm!"  
 uk_syndicalist_germany:0 "Schlagen Sie dem Faschismus ins Herz!"   
 uk_syndicalist_germany_desc:0 "Deutschland ist das schlagende Herz des Faschismus, die Quelle reaktionären Giftes, das sich in ganz Europa und der Welt verbreitet. Wir werden die rote Fahne in Berlin hissen und die Leiche des Führers am Brandenburger Tor aufhängen – oder bei dem Versuch sterben!"  
 uk_soviet_tanks:0 "Sowjetische Panzerpioniere"   
 uk_soviet_tanks_desc:0 "Wenn es um Panzer geht, sind die Russen in ihrer militärischen Ingenieurskunst den Deutschen nachgeordnet – wir können viel von ihnen lernen, und sie sind bereit, uns etwas beizubringen."   
 uk_soviet_research:0 "Anglo-sowjetische Forschungsgruppe"     
 uk_soviet_research_desc:0 "Großbritannien und Russland sind zwei Länder mit enormem Wissen und Wissen. Wenn wir unsere Forschung bündeln, können wir die Zukunft der Menschheit ungemein verbessern!"     
 uk_aluminium:0 "Neue Extraktionstechnologie"   
 uk_aluminium_desc:0 "Wir sind eine kleine, aber reiche Nation. Wir sollten alle uns zur Verfügung stehenden Ressourcen nutzen, um unsere Industrie auszubauen."   
 uk_scotland_resources:0 "Schottische Bergbaugenossenschaften"   
 uk_scotland_resources_desc:0 "Von Arbeitern geführte Industrien sind effizienter, gerechter und rundum angenehmer. Wir sollten diese Politik in Nordschottland umsetzen, wo wir über eine kleine Anzahl seltener Mineralien verfügen, die wir bestmöglich nutzen müssen."   
 uk_autarky:0 "Unabhängigkeit von seltenen Ressourcen"   
 uk_autarky_desc:0 "Unsere Insel hat nicht alles. Aber diese Dinge können wir synthetisieren."   
 uk_comecon:0 "COMECON"   
 uk_comecon_desc:0 "Die sozialistischen Nationen der Welt müssen zusammenhalten, um sicherzustellen, dass unsere wirtschaftlichen Bedürfnisse und Interessen nicht durch die Realitäten einer kapitalistischen Welt pervertiert werden. Zu diesem Zweck gibt es den Rat für gegenseitige Wirtschaftshilfe!"   
 uk_tankie_diplomacy:0 "Sozialistische Diplomatie"   
 uk_tankie_diplomacy_desc:0 "Großbritannien hat seine eigenen, einzigartigen Interessen, die wir aufgrund der geografischen Gegebenheiten auch immer haben werden. Es ist an der Zeit, die alten Interessen aus einer sozialistischen Perspektive neu zu betrachten."   
 uk_third_worldism:0 "Dritte-Welt-Theorie"   
 uk_third_worldism_desc:0 "Die Völker Südamerikas und Afrikas sind am stärksten vom Imperialismus betroffen, vom Kapitalismus in seiner letzten und giftigsten Form. Um unsere vergangenen Verbrechen zu sühnen, bieten wir ihnen unsere Solidarität an und helfen ihnen, ihre Ketten zu sprengen!"   
 uk_tankie_ireland:0 "Bringen Sie die Revolution nach Irland"   
 uk_tankie_ireland_desc:0 "Das kapitalistische Irland könnte leicht zum Sprungbrett für eine konterrevolutionäre Invasion Großbritanniens durch die Exilmonarchie und die Überreste ihres Empires werden. Wir müssen handeln, bevor dies geschieht."   
 uk_tankie_scandinavia:0 "Regionalparteien in Nordeuropa"   
 uk_tankie_scandinavia_desc:0 "Es ist an der Zeit, revolutionäre Gefühle so weit wie möglich zu verbreiten – beginnend im benachbarten Skandinavien!"   
 uk_colonial_liberation:0 "Befreit Afrika!"   
 uk_colonial_liberation_desc:0 "Der Imperialismus ist das Ende des Faschismus. Als ehemalige Kollaborateure dieses teuflischen Unterdrückungssystems werden wir unsere Reue zeigen, indem wir ihre Ketten sprengen."   
 uk_halifax:0 "Halifax für PM"   
 uk_halifax_desc:0 "Es ist der Wunsch des Landes; es ist der Wunsch der Partei; es ist vielleicht nicht der Wunsch von Halifax, aber wie kann man sich weigern, wenn das eigene Land einen auffordert, ihm zu dienen? Halifax möchte einen Krieg vermeiden und strebt einen Verhandlungsfrieden an."   
 uk_churchill:0 "Churchill als Premierminister"   
 uk_churchill_desc:0 "Halifax mag das Land sein, was es will, aber Churchill ist es, was Halifax will, und Halifax weiß es am besten. Churchill ist ein Kriegstreiber, aber er versteht es, die Bevölkerung zu motivieren und ihr als Galionsfigur zur Seite zu stehen. Er wird es uns ermöglichen, den Krieg gegen Deutschland aufrechtzuerhalten und ihnen zu zeigen, was es bedeutet, sich dem Willen Großbritanniens zu widersetzen."   
 uk_negotiated_peace:0 "Ausgehandelter Frieden"    
 uk_negotiated_peace_desc:0 "Halifax strebt einen Verhandlungsfrieden mit Deutschland an; Deutschland möchte nicht mit der gesamten Macht der Alliierten in den Krieg ziehen. Eine himmlische Verbindung, die einen weißen Frieden ermöglicht und Großbritannien davor bewahrt, die Verluste des Ersten Weltkriegs erneut zu spüren."   
 uk_unthinkable:0 "Operation Undenkbar"   
 uk_unthinkable_desc:0 "Der Krieg in Europa ist noch lange nicht vorbei. Solange die Rote Gefahr anhält, kann die freie Welt nicht in Frieden ruhen. Wir dürfen nicht zulassen, dass die Saat Wurzeln schlägt. Wir müssen die Kommunisten vertreiben, ihre übelriechende Union zerstören und endlich einen fairen Deal für Polen und alle anderen Länder sichern, die sich in ihrer Gewalt befinden." 
 uk_appease_italy:0 "Italien beschwichtigen"   
 uk_appease_italy_desc:0 "Italien war einst Teil der Entente und sein potenzielles Bündnis mit dem Reich und seinen Gepflogenheiten ist von fragiler Natur und beruht auf ideologischen Bindungen und dem Groll gegenüber dem sogenannten „verstümmelten Sieg“. Indem wir die Wunden dieses Sieges heilen, können wir Italien vielleicht wieder in die Gemeinschaft zurückführen und Hitler einen wertvollen Verbündeten vorenthalten."   
 uk_wartime_measures:0 "Kriegsmaßnahmen"    
 uk_wartime_measures_desc:0 "Es scheint, als stünde uns der Krieg bevor, und wir müssen mit den Vorbereitungen beginnen. Wir dürfen im Wettlauf um die Mobilisierung nicht zurückbleiben, vor allem angesichts des Vorsprungs, den unsere Feinde genießen."   
 uk_rationing:0 "Rationierung implementieren"   
 uk_rationing_desc:0 "Die Kriegsmarine hat unserem Inselstaat die dringend benötigten Nahrungsmittel aus dem Ausland vorenthalten. Es ist klar geworden, dass wir den Gürtel unseres Landes enger schnallen und jeden Mann, jede Frau und jedes Kind bitten müssen, für ihr Land zu hungern."   
 uk_dads_army:0 "Die Heimwehr"   
 uk_dads_army_desc:0 "Durch die Gründung der Heimatwehr nutzen wir die Arbeitskräfte, die wir im Ausland nicht zur Verteidigung des Landes einsetzen können; wer zu jung oder zu alt ist, kann in Dad&#39;s Army dienen."   
 uk_enigma:0 "Ultra"   
 uk_enigma_desc:0 "Die Verschlüsselung der Enigma-Maschine muss geknackt werden; das ist für die Kriegsanstrengungen von entscheidender Bedeutung. Dafür setzen wir unsere besten Mathematiker ein; Projekt Ultra ist bereits in Arbeit."   
 uk_vegetarian:0 "Operation Vegetarisch"   
 uk_vegetarian_desc:0 "Indem wir fünf Millionen mit Anthraxsporen versetzte Leinsamenkuchen in die Nahrungsvorräte deutscher Rinder streuen, werden wir deren Nahrungsvorräte massiv reduzieren und Millionen von Deutschen töten. Diese Operation wird, wenn sie erfolgreich ist, zweifellos Deutschland kastrieren, wir werden jedoch heftige internationale Gegenreaktionen erleiden, und wenn sie scheitert, wird die deutsche Entschlossenheit durch solch monströse Taktiken möglicherweise nur gestärkt werden..." 
 uk_anthropoid:0 "Operation Anthropoid"   
 uk_anthropoid_desc:0 "Da die tschechoslowakische Exilregierung im Exil ist und der Schlächter von Prag dort seine Schreckensherrschaft ausübt, liegt es an uns, seinen Sturz zu planen. Heydrich war einer von Hitlers führenden Männern, und sein Tod wird sowohl die Führung als auch die Öffentlichkeit im Reich demoralisieren. Wir werden diese Mission in Zusammenarbeit mit dem tschechischen Widerstand in der Tschechoslowakei durchführen und tschechische Agenten per Fallschirm absetzen."   
 uk_foxley:0 "Operation Foxley"   
 uk_foxley_desc:0 "Ein verzweifelter Traum, der mit dem schweren Wissen vieler früherer Fehlschläge belastet war: den Führer zu töten und das Reich zu zerstören, indem man der Schlange den Kopf abschlägt."   
 uk_r4_1:0 "Plan R4: Phase I"   
 uk_r4_1_desc:0 "Phase 1: Eroberung der dänischen Besitzungen im Atlantik."   
 uk_r4_2:0 "Plan R4: Phase II"   
 uk_r4_2_desc:0 "Phase 2: Nutzen Sie diese Besitztümer als Ausgangspunkt für eine Invasion Norwegens und Schwedens, die die deutsche Kriegsmaschinerie mit Eisenerz beliefern."   
 uk_civil_defence:0 "Zivilschutzdienst"   
 uk_civil_defence_desc:0 "Der Zivilschutzdienst wird für unsere Luftabwehrfähigkeiten im Inland von entscheidender Bedeutung sein: eine Freiwilligen- und Reservistentruppe zur Organisation von Reaktionen auf Luftangriffe, sowohl zivil als auch militärisch."   
 uk_xx:0 "Das Doppelkreuzsystem"   
 uk_xx_desc:0 "Indem wir gefangene Nazi-Agenten einsetzen, um Desformationen direkt an ihre Untergebenen weiterzugeben, können wir die Spionagebemühungen der Nazis verwirren und durchkreuzen."   
 uk_mediterranean_fortress:0 "Mediterrane Festungen"   
 uk_mediterranean_fortress_desc:0 "Das Mittelmeer scheint zwar nicht unmittelbar von britischem Interesse zu sein, ist aber unsere Route nach Suez und von dort nach Indien und in den Fernen Osten. Unsere Vorherrschaft dort muss um jeden Preis gewahrt werden." 
 uk_fortify_suez:0 "Sichern Sie Suez"   
 uk_fortify_suez_desc:0 "Suez ist unsere Lebensader zur östlichen Hälfte des Imperiums und muss um jeden Preis geschützt und erhalten werden."  
 uk_fortify_cyprus:0 "Zypern stärken"   
 uk_fortify_cyprus_desc:0 "So wichtig Suez auch ist, lässt es sich am besten indirekt verteidigen, indem man einen großen Marinestützpunkt auf der nahegelegenen Insel Zypern errichtet, um seine Macht über das Mittelmeer auszustrahlen."   
 uk_fortify_gibraltar:0 "Gibraltar Defence Force"   
 uk_fortify_gibraltar_desc:0 "Der Felsen von Gibraltar ist seit Hunderten von Jahren britischer Besitz und wir werden sehen, dass ihm weder das Chaos in Spanien noch die wachsenden Ambitionen Italiens schaden."   
 uk_fortify_malta:0 "Maltesische Festung"   
 uk_fortify_malta_desc:0 "Malta liegt zwischen der Südküste Italiens und der Nordküste der italienischen Kolonie in Afrika und ist in großer Gefahr. Wir müssen alles tun, um sicherzustellen, dass es eine Festung inmitten des Feindes bleibt."   
 uk_libyan_forts:0 "Libysche Grenzbefestigungen"   
 uk_libyan_forts_desc:0 "Italien hat klare Ambitionen in Afrika, und wenn nicht Frankreich, dann werden unsere Besitztümer die erste Station sein. Wir sollten den bewohnbaren Landstreifen entlang der Nordküste Ägyptens befestigen, wo sie mit Sicherheit angreifen werden, um sie im Falle einer Auseinandersetzung zurückzuschlagen."   
 uk_develop_india:0 "Indien entwickeln"   
 uk_develop_india_desc:0 "Das Juwel in der Krone des britischen Empire scheint heutzutage angelaufen und rissig zu sein; es ist Zeit, unseren Stolz wiederherzustellen."   
 uk_indian_universities:0 "Indische Universitäten"   
 uk_indian_universities_desc:0 "In Indien gibt es eine große Zahl brillanter Köpfe, die unentdeckt und unentwickelt bleiben. Durch die Eröffnung von Universitäten können wir die intellektuellen Fähigkeiten der Nation massiv steigern."   
 uk_indian_employment:0 "Diskriminierungsfreie Beschäftigung"   
 uk_indian_employment_desc:0 "Warum verschwenden wir so viel Talent aufgrund so überholter und lächerlicher Konzepte wie Kaste und Rasse? Sie sind Untertanen des britischen Empires und werden ihm als solche dienen."   
 uk_shan_hills:0 "Zivilisieren Sie die Shan-Berge"   
 uk_shan_hills_desc:0 "Die Shan Hills sind undurchdringlich; Dschungel und Berge, so weit das Auge reicht. Wenn wir eine Straße nach China durch Indien bauen wollen, müssen wir dieses öde Land zähmen."   
 uk_burma_focus:0 "Die Burma-Straße"   
 uk_burma_focus_desc:0 "Wir sollten die Chinesen in ihrem Kampf gegen Japan unterstützen, indem wir eine Straße – und die dazugehörige Infrastruktur – zwischen Burma und China bauen, über die die Lieferungen auf dem Landweg zu ihnen gelangen können, sicher vor den japanischen Plünderern."   
 uk_develop_dominions:0 "Entwickeln Sie die Dominions"   
 uk_develop_dominions_desc:0 "Wenn ein Imperium nur seinem Kernland Vorteile verschafft, wird es untergehen. Wir müssen die Dominions näher an uns heranführen, indem wir ihnen mit der gesamten Macht des Imperiums zur Seite stehen."   
 uk_develop_canada:0 "Kanada entwickeln"   
 uk_develop_canada_desc:0 "Große Teile Kanadas sind eine verschneite und unwirtliche Einöde. Durch den Bau von Straßen und Infrastruktur sowie die Verbesserung der Lebensqualität aller Kanadier können wir die Verschwendung dieser Landmasse reduzieren."   
 uk_develop_sa:0 "Südafrika entwickeln"   
 uk_develop_sa_desc:0 "Südafrika mag gastfreundlicher sein als große Teile Afrikas, aber die Kapkolonie braucht dennoch die Hilfe des Imperiums. Wir werden sie durch den Bau von Straßen, Eisenbahnen und Fabriken bereitstellen, damit sie ihren Teil des schwarzen Kontinents besser nutzen können."   
 uk_develop_nz:0 "Neuseeland entwickeln"   
 uk_develop_nz_desc:0 "Neuseeland ist eine kleine, von Buschland und Dschungel verschluckte Insel. Indem wir in Auckland eine große Werft bauen und uns unseren Weg durch den Dschungel bahnen, können wir ihn den Zielen des Imperiums besser anpassen."   
 uk_develop_australia:0 "Australien entwickeln"   
 uk_develop_australia_desc:0 "Australien besteht aus Wüste und Dschungel und ist für ein Leben jenseits des Lebens der Ureinwohner ungeeignet. Durch den Bau von Bewässerungsnetzen und Straßen, die unseren Menschen ein Überleben auch weiter von der Küste entfernt ermöglichen, können wir in dieser Einöde besser leben."   
 uk_develop_africa:0 "Afrika entwickeln"   
 uk_develop_africa_desc:0 "Wir haben uns große Teile des dunklen Kontinents gesichert; jetzt müssen wir ihn uns mit Stahl, Eisenbahn und Asphalt zu eigen machen."   
 uk_develop_tanganyika:0 "Deutsche Sauerkrautfabriken umbauen"   
 uk_develop_tanganyika_desc:0 "Wenn wir unsere Dominanz wirklich demonstrieren wollen, müssen wir die kleinen Entwicklungen, die Deutschland in Tanganjika gemacht hat, nutzen und ausbauen."
 uk_white_highlands:0 "Ermutigen Sie die White Highlands"   
 uk_white_highlands_desc:0 "Das kenianische Hochland, das für die Besiedlung durch weiße Siedler aus Großbritannien reserviert ist, ist beklagenswert unterentwickelt und unbewohnt. Indem wir in die Infrastruktur investieren, können wir ihm Wachstum und Entwicklung zu einem Gebiet ermöglichen, das es wert ist, regiert zu werden."   
 uk_african_breadbasket:0 "Kornkammer Afrikas"   
 uk_african_breadbasket_desc:0 "Rhodesien ist die Kornkammer unseres afrikanischen Reiches, so wie die Cyrenaika die Kornkammer der Römer war. Wenn wir unser Engagement für Afrika zeigen wollen, müssen wir es weiter ausbauen."   
 uk_rhodesian_independence:0 "Die Zentralafrikanische Föderation"   
 uk_rhodesian_independence_desc:0 "Die Siedler Rhodesiens fordern lautstark Unabhängigkeit von der direkten britischen Herrschaft und gleiche Vertretung wie die anderen Dominions. Wie können wir das ablehnen?"  
 uk_depth_defence:0 "Tiefgreifende Verteidigung"   
 uk_depth_defence_desc:0 "Unsere östlichen Gebiete lassen sich, entgegen der Position der Singapur-Strategie, am besten durch eine größere Nähe zwischen den Außenposten unseres Imperiums und eine stärker integrierte Verteidigungsstrategie verteidigen."   
 uk_fortify_ceylon:0 "Malta des Ostens"   
 uk_fortify_ceylon_desc:0 "Beginnend mit dem westlichsten Außenposten dieser fernöstlichen Verteidigungsstrategie wird ein entwickeltes Ceylon unseren Seestreitkräften gut als rückwärtiger Stützpunkt dienen."   
 uk_seize_isthmus:0 "Erobern Sie den Isthmus"   
 uk_seize_isthmus_desc:0 "Malaya kann niemals wirklich sicher sein, wenn es durch Siam territorial vom Raj isoliert ist. Wir sollten dieses kleine Land dazu zwingen, seinen Anteil an der Halbinsel abzugeben, damit wir ihn weiter sichern können."   
 uk_malaya_railway:0 "Eisenbahnstrecke von Rangun nach Singapur"   
 uk_malaya_railway_desc:0 "Eine Überlandverbindung nach Singapur hat keinen Sinn, wenn wir keine Menschen auf dieser Strecke transportieren können. Zu diesem Zweck werden wir eine Eisenbahnlinie bauen, um das Gebiet miteinander zu verbinden."   
 uk_asia_troops:0 "Den Fernen Osten stärken"   
 uk_asia_troops_desc:0 "Nachdem wir unsere Verteidigungsstrategie festgelegt haben, müssen wir jetzt nur noch die Männer zum Kämpfen einsetzen."   
 uk_singapore_strat:0 "Die Singapur-Strategie"   
 uk_singapore_strat_desc:0 "Orthodoxe Methoden funktionieren am besten, ebenso wie die britische Methode, und unsere derzeitige Strategie, Singapur als robuste Festung zu nutzen, von der aus wir unsere Macht über den Osten ausdehnen und im unmittelbaren Fall eines Krieges mit Japan alle verlorenen Gebiete zurückerobern können, wird uns auch weiterhin gute Dienste leisten."   
 uk_landward_fortifications:0 "Landseitige Befestigungen"   
 uk_landward_fortifications_desc:0 "Singapur wird nicht viel nützen, sollte es aus dem dichten Dschungel im Norden angegriffen werden. Befestigen wir unsere Grenze zu Siam, um eine solche Katastrophe zu verhindern."   
 uk_peninsular_bastions:0 "Bastionen der Halbinsel"    
 uk_peninsular_bastions_desc:0 "Singapur eignet sich gut als einsame Sicherheitsinsel in den östlichen Meeren, wäre jedoch mit der Unterstützung eines Netzwerks befestigter Städte in ganz Malaya noch besser geeignet."     
 uk_total_defence:0 "Totale Verteidigung"     
 uk_total_defence_desc:0 "Um unsere Pläne, Malaya in eine wahre britische Festung im Fernen Osten zu verwandeln, abzurunden, sollten wir mit der Installation von Luftabwehrstellungen und Radartürmen beginnen, um eine ganzheitliche und totale Verteidigung zu gewährleisten."  
 uk_appease_italy_2:0 "Afrikanische Konzessionen"   
 uk_appease_italy_2_desc:0 "Es ist an der Zeit, über die offensichtlichsten Ambitionen Italiens zu sprechen: seine Wünsche nach Afrika."   
 uk_appease_italy_3:0 "Mare Adriaticum"   
 uk_appease_italy_3_desc:0 "Italien möchte erneut auf uns zukommen, diesmal in Bezug auf seine Balkanambitionen."   
 uk_appease_italy_4:0 "Die Entente wird wiederbelebt"    
 uk_appease_italy_4_desc:0 "Wir haben lange genug mitgemacht. Es ist Zeit, dass Italien sich uns anschließt!"   
 uk_balkan_strategy:0 "Verteidigt den Balkan!"   
 uk_balkan_strategy_desc:0 "Viele Balkanstaaten sind probritisch eingestellt und sehen die gleiche Bedrohung durch Mitteleuropa wie wir. Wenn wir die Gelegenheit nutzen und sie frühzeitig unterstützen, können wir uns ihre Loyalität sichern, allerdings auf Kosten des Zorns ihrer rachsüchtigen Nachbarn."   
 uk_provoke_italy_2:0 "Griechenland beruhigen"   
 uk_provoke_italy_2_desc:0 "Griechenland an der Südspitze Europas wird im Norden vom mit Italien verbündeten Albanien und im Westen von dessen Marine bedroht. Wir werden dafür sorgen, dass es unbehelligt bleibt."   
 uk_provoke_italy_3:0 "Dinarische Festungen"   
 uk_provoke_italy_3_desc:0 "Jugoslawien ist unmittelbar und ernsthaft durch den italienischen Imperialismus und den deutschen Expansionismus bedroht, der direkt an der nordwestlichen Grenze des Landes liegt. Wir sollten Jugoslawien bei der Befestigung seiner Küste und Grenze unterstützen, damit die Faschisten zurückgeschlagen werden können."   
 uk_provoke_italy_4:0 "Laden Sie die Balkanstaaten ein"    
 uk_provoke_italy_4_desc:0 "Mit dem Bau einiger Befestigungsanlagen allein ist es nicht getan – es ist an der Zeit, die Balkanstaaten auf Augenhöhe in die Allianz aufzunehmen."   
 uk_rearmament:0 "Beginn der Wiederbewaffnung"   
 uk_rearmament_desc:0 "Unsere Rüstungsindustrie weist bedauerlicherweise Mängel auf und ist nicht modernisiert. Wenn wir eine effektiv mobilisierte Nation sein wollen, müssen wir dies ändern."   
 uk_mi:0 "Militärisch-industrielle Entwicklung"   
 uk_mi_desc:0 "Unsere Rüstungsindustrie weist bedauerlicherweise Mängel auf und ist nicht modernisiert. Wenn wir eine effektiv mobilisierte Nation sein wollen, müssen wir dies ändern."   
 uk_research_slot:0 "Angewandte Forschung"   
 uk_research_slot_desc:0 "Wir müssen unsere intellektuellen Fähigkeiten für die Kriegsanstrengungen einsetzen und die schlafenden Technologietitanen von Cambridge, Oxford, York und Manchester wecken: Wir brauchen sie."   
 uk_nuclear_a:0 "Anglo-amerikanische Nuklearentwicklung"   
 uk_nuclear_a_desc:0 "Es ist klar, dass wir ihnen zwar in der nuklearen Entwicklung voraus sind, uns aber schlicht und ergreifend nicht die Produktionskapazitäten der Amerikaner zur Verfügung stehen. Die Lösung ist klar: Es bedarf gemeinsamer Anstrengungen."   
 uk_nuclear_b:0 "Rohrlegierungen"   
 uk_nuclear_b_desc:0 "In Vorbereitung auf einen umfassenden Konflikt, wie wir ihn noch nie erlebt haben, ist es an der Zeit, unsere besten Köpfe mit der Entwicklung neuer, fortschrittlicher Kriegsmittel zu beschäftigen – Bomben, die alles bisher Dagewesene übertreffen. Dieses Vorhaben soll streng geheim bleiben, streng geheim gehalten und auf höchster Regierungsebene nur mit Codenamen erwähnt werden. „Rohrlegierungen“ klingt langweilig genug."   
 uk_carrots:0 "Karottenanbau"   
 uk_carrots_desc:0 "Nein, natürlich entwickeln wir keine neue Technologie zur Aufklärung feindlicher Flugzeuge! Wir essen einfach nur eine Menge Karotten und verleihen unseren Piloten damit ein wunderbares Sehvermögen! Ja, genau!"   
 uk_missiles:0 "Perfektionieren Sie das nicht gedrehte Projektil"   
 uk_missiles_desc:0 "Obwohl sich unsere früheren Formen als ineffektiv und unzuverlässig erwiesen haben, müssen wir weiterhin danach streben, sie zu perfektionieren. Die nicht rotierbare Rakete und ihre technologischen Brüder könnten durchaus die Waffen der Zukunft sein."   
 uk_shadow_scheme:0 "Das Schattenschema"   
 uk_shadow_scheme_desc:0 "Indem wir unsere zivile Automobilindustrie zur Stärkung unserer Luftwaffenindustrie nutzen, können wir unsere Mobilisierungsbemühungen ohne große wirtschaftliche und soziale Umwälzungen verstärken."
 uk_rof:0 "Königliche Verordnungsfabriken"   
 uk_rof_desc:0 "Unsere Munitionsproduktion ist erschreckend niedrig und es gibt nur eine Lösung: Wir müssen die Öfen anheizen und unsere Unzufriedenheit aus den Schornsteinen in den Himmel spucken, denn der britische Löwe bereitet sich auf den Krieg vor."   
 uk_coastal_forts:0 "Befestigungen an der Südküste"   
 uk_coastal_forts_desc:0 "Großbritanniens schwache Seite ist ungeschützt: eine schwache Seite, die unsere Feinde bei der ersten Gelegenheit angreifen werden. Wir müssen unsere Nation stärken, Küstenfestungen bauen und dafür sorgen, dass kein einziger Eindringling die britischen Küsten betritt."   
 uk_anti_air:0 "Umfassende Luftverteidigung"   
 uk_anti_air_desc:0 "Unsere Feinde werden versuchen, uns zu lähmen, auszuhungern und zu vernichten, ohne dass auch nur ein einziger Stiefel auf dem Boden wäre. Wir müssen ihnen zeigen, dass Britannia nicht nur die Meere beherrscht, sondern auch den Himmel im Griff hat!"   
 uk_british_army:0 "Die britische Armee"   
 uk_british_army_desc:0 "Die britische Armee wurde 1660 gegründet und war einst stolz darauf, eine der besten Streitkräfte der Welt zu sein. Wenn der Löwe brüllt, steht sie stramm."   
 uk_gbp_1:0 "Lehren aus dem Ersten Weltkrieg"   
 uk_gbp_1_desc:0 "Der Große Krieg war schrecklich und ein Beispiel für den neuen Krieg, der uns bevorsteht. Wenn wir uns weiterentwickeln und erfolgreich sein wollen, müssen wir unsere Lektion lernen."   
 uk_gbp_2:0 "Persönliche Maschinenpistolen"   
 uk_gbp_2_desc:0 "Indem wir jeden Mann mit einer Maschinenpistole ausstatten, steigern wir die individuelle Kampfkraft jeder Einheit und stärken so die gesamte Kampftruppe."
 uk_gbp_3:0 "Moderne Armee"
 uk_gbp_3_desc:0 "Die moderne Armee darf nicht nur aus kämpfenden Männern bestehen; sie muss aus Pionieren, Sanitätern, Spähern und Hilfspersonal aller Art bestehen, die dafür sorgen, dass weniger Menschenleben verloren gehen und mehr Boden gewonnen wird."   
 uk_sfp_1:0 "Muscheln sind billiger als Männer"   
 uk_sfp_1_desc:0 "In diesem Krieg sind zu viele Briten ums Leben gekommen, als dass wir alle Kriege beenden könnten. Wenn wir unsere Lehren wirklich ziehen wollen, müssen wir lernen, dass jeder zukünftige Krieg die britischen Verluste verringern und gleichzeitig die Verluste, die wir dem Feind zufügen, erhöhen muss. Zu diesem Zweck werden wir unsere Artillerie ausbauen."   
 uk_sfp_2:0 "Linienartillerie"   
 uk_sfp_2_desc:0 "Die Artillerie wird das Herzstück unserer neuen britischen Armee sein, und mit unserer überlegenen Feuerkraft werden wir die stinkenden Ratten mühelos aus ihren Befestigungen sprengen."   
 uk_sfp_3:0 "Gepanzerte Speerspitze"   
 uk_sfp_3_desc:0 "Die neue Kavallerie und die wirksamste Methode, unsere Männer am Leben zu erhalten, ist der Einsatz unserer Panzer, um die feindlichen Frontlinien zu durchbrechen und zu zerschmettern, sodass sie sich wie die Kakerlaken, die sie sind, in alle Winde zerstreuen."   
 uk_conscription:0 "Truppenausbildungsgesetz"   
 uk_conscription_desc:0 "Die Zeit der Trauer um den letzten Krieg ist vorbei. Der alte Löwe braucht wieder Männer, und die britischen Massen werden pflichtbewusst reagieren."   
 uk_enfields:0 "Enfield Armoury-Verträge"   
 uk_enfields_desc:0 "Die Royal Small Arms Factory in Enfield ist seit 1816 in Staatsbesitz und produziert Waffen für die Krone. Sie ist eine zuverlässige Institution, auf die wir uns auch in diesem Krieg bei der Herstellung von Kleinwaffen verlassen werden."   
 uk_SAS:0 "Spezieller Flugdienst"   
 uk_SAS_desc:0 "Unsere Spezialeinheiten sind mangelhaft; es ist an der Zeit, mutige Männer zu mobilisieren, um Großbritanniens neue Elite-Kampftruppe zu bilden: den SAS."   
 uk_navy:0 "Britannia regiert die Wellen"    
 uk_navy_desc:0 "Die britische Marine ist ihr ganzer Stolz und muss sich wie jede Marine im Laufe der Zeit anpassen, verändern und weiterentwickeln. Wir müssen wachsen, um uns einer sich verändernden Welt anzupassen."   
 uk_fib_1:0 "Befehl des Meeres"   
 uk_fib_1_desc:0 "Zwar sind Veränderungen nötig, aber vielleicht nicht allzu große. Unsere Grunddoktrin der überwältigenden Macht auf See, die jedes Land davon abhält, auch nur im Traum an eine Konfrontation mit uns zu denken, passt gut."   
 uk_fib_2:0 "Schlachtschiff-Flaggschiff"   
 uk_fib_2_desc:0 "Die alten Methoden sind unsere besten, und so wie uns die Dreadnoughts durch den Ersten Weltkrieg gebracht haben, werden uns neue Arten von Schlachtschiffen im Zentrum unserer Flotten durch diesen Krieg bringen."
 uk_fib_3:0 "Träger-Flaggschiff"   
 uk_fib_3_desc:0 "Schlachtschiffe reichen nicht mehr aus – das Blatt wendet sich, und Flugzeugträger sind die Zukunft."
 uk_tid_1:0 "Der britische Kraken"   
 uk_tid_1_desc:0 "Wie wir im letzten Krieg gesehen haben, ist die Strangulierung der Handelsschifffahrt für ein Land der Todesstoß, mehr als alles andere. Es ist Zeit für uns, zu einer neuen Doktrin überzugehen."   
 uk_tid_2:0 "U-Boot-Krieg"   
 uk_tid_2_desc:0 "U-Boote stehen im Mittelpunkt unserer Handelsverbotsdoktrin, und wir sollten uns zunächst auf sie konzentrieren."   
 uk_tid_3:0 "Kreuzerflotte"   
 uk_tid_3_desc:0 "U-Boote können leicht von oben abgeschossen werden, und deshalb sollten wir unsere Überwassermarine beibehalten, um die Kontrolle über die Wellen zu behalten."   
 uk_raf:0 "Per Ardua ad Astra"   
 uk_raf_desc:0 "„Durch Widrigkeiten zu den Sternen“, so lautet das Motto der RAF. Durch den Rauch und das Salz der kommenden Konflikte werden wir mit der Unterstützung unserer Luftwaffe größer denn je werden."   
 uk_bomber_command:0 "Bomberkommando"   
 uk_bomber_command_desc:0 "Im Rahmen unserer Reorganisation und defensiven Neuausrichtung unserer Luftwaffe sollten wir ein einzigartiges Bomberkommando für Missionen auf dem Kontinent einrichten."   
 uk_fighter_command:0 "Jagdkommando"   
 uk_fighter_command_desc:0 "Im Rahmen unserer Reorganisation und defensiven Neuausrichtung unserer Luftwaffe sollten wir ein einzigartiges Kampfflugzeugkommando zur Verteidigung unseres Luftraums einrichten."   
 uk_coastal_command:0 "Küstenkommando"   
 uk_coastal_command_desc:0 "Im Rahmen unserer Reorganisation und defensiven Neuausrichtung unserer Luftwaffe sollten wir ein einzigartiges Küstenkommando zur Überwachung unserer Marine einrichten."   
 uk_dowding:0 "Dowding-System"   
 uk_dowding_desc:0 "Das Dowding-System ist das weltweit erste großflächige, bodengesteuerte Abhörnetzwerk. Es besteht aus einem Netzwerk aus Festnetztelefonen, Radarstationen und Gruppen von Hilfsbeobachtern, die in den britischen Luftraum eindringende feindliche Flugzeuge erkennen und unsere Streitkräfte schnell alarmieren sollen."   
 uk_bomber_stream:0 "Bomber Stream"   
 uk_bomber_stream_desc:0 "Wo wir uns einst in kleinen Gruppen versteckten, werden wir jetzt mit riesigen Schwärmen von Bombern über den Feind herfallen, die Sonne verdunkeln und in einer solchen Zahl zuschlagen, dass seine Verteidigung einfach zusammenbricht."   
 uk_cas:0 "Flottenluftwaffe"   
 uk_cas_desc:0 "Wir treten in ein neues Marinezeitalter ein – die Vormachtstellung alter Schlachtschiffe und Dreadnoughts nimmt ab, während die Position der Flugzeugträger im Gegenzug steigt. Wir sollten einen neuen gemeinsamen Luft- und Marinegeschwader gründen, um unsere Flugzeugträger dem Küstenkommando vollständig unterzuordnen."
 uk_jets:0 "Jet-Forschung"   
 uk_jets_desc:0 "Die Zukunft liegt in der Düsenforschung, die schnellere, schlankere und leistungsstärkere Flugzeuge erfordert. Wir müssen mithalten, sonst laufen wir Gefahr, den Anschluss zu verlieren."   
 uk_lapg:0 "LAPG"   
 uk_lapg_desc:0 "Im Rahmen unseres Schattenprogramms sollten wir einige dieser Fabriken auf die Produktion von Luftfahrzeugen konzentrieren, um unsere Luftflotte zu erweitern."   
 uk_air_training:0 "Empire Air Training Scheme"   
 uk_air_training_desc:0 "Unsere Personalkapazitäten sind knapp und dünn gesät. Wir sollten uns darum bemühen, die Piloten, die wir haben, gut auszubilden und außerdem freiwillige Piloten aus dem ganzen Imperium und der ganzen Welt zu rekrutieren, die unsere Flugzeuge fliegen."   
 uk_marines:0 "Königliche Marines"   
 uk_marines_desc:0 "Wie es für jeden Inselstaat notwendig ist, verfügen wir über eine lange und ruhmreiche Tradition britischer Royal Marines. In den kommenden Konflikten werden sie zweifellos erneut in Kampfhandlungen verwickelt sein, auf die sie vorbereitet sein müssen."   
 uk_federation:0 "Imperiale Föderation"   
 uk_federation_desc:0 "Die Diskussion über die Notwendigkeit einer Föderalisierung des Empire als Gegenmaßnahme zur wachsenden Unabhängigkeit der Dominions und dem angeblich unvermeidlichen Zusammenbruch des Empire als Weltmacht aufgrund der wachsenden Macht der Sowjetunion und der Vereinigten Staaten kursiert seit der Jahrhundertwende in vielen Kreisen, hat nun aber auch offizielle Aufmerksamkeit erregt."   
 uk_imperial_preference:0 "Kaiserliche Präferenz"   
 uk_imperial_preference_desc:0 "Die Imperial Preference, das System des innerimperialen Freihandels und die Bevorzugung imperialer Güter gegenüber anderen, selbst wenn diese möglicherweise billiger sind, ist eine Politik, die einen großen Beitrag zur Beschwichtigung der wirtschaftlichen Ängste der Dominions leisten würde."   
 uk_agricultural_council:0 "Landwirtschaftsrat des Imperiums"   
 uk_agricultural_council_desc:0 "Indem wir den Nahrungsmittelbedarf des Imperiums mit einem zentralen Komitee koordinieren, können wir landwirtschaftliche Autarkie erreichen, ohne auf externe Mächte angewiesen zu sein."   
 uk_constitution:0 "Unterzeichnen Sie die Reichsverfassung"   
 uk_constitution_desc:0 "Es ist soweit! Mit der Zustimmung unserer wichtigsten Dominions sind wir endlich in der Lage, die Reichsverfassung zu unterzeichnen. Die Verhandlungen müssen noch einige Details klären, aber wir werden sicherlich die Umstrukturierung der Legislative in ein Dreikammersystem oder möglicherweise sogar ein noch größeres System von Reichsparlamenten erleben und bald darauf den Rücktritt unseres Kaiserkönigs als bloßer Bundeskaiser."   
 uk_native_representation:0 "Afrikanische Vertretung"   
 uk_native_representation_desc:0 "Mit der Föderation und der Vertretung unserer Siedlerkolonien in den Reichsparlamenten sind die Forderungen der Inder nach Vertretung oder Unabhängigkeit lauter geworden. Wir sind der Ansicht, dass Ersteres für uns akzeptabler wäre."  
 uk_empire_fleet:0 "Reorganisieren Sie die imperiale Flotte"  
 uk_empire_fleet_desc:0 "Die Integration der Flotte in die Streitkräfte des Dominions und der Kolonien verlief chaotisch, und es traten zahlreiche Probleme auf, insbesondere bei der Truppenverteilung. Es ist an der Zeit, unsere Positionen, unsere Führung und unsere allgemeine Verteidigungsstrategie zu überprüfen."   
 uk_empire_army:0 "Zentrales Kaiserliches Armeekommando"   
 uk_empire_army_desc:0 "Die Integration der Dominion-Armeen und der kolonialen Garnisonen und Milizen in die imperiale Armee verlief alles andere als reibungslos. Um sie in eine wirksame Streitmacht umzuwandeln, sind Umstrukturierungen erforderlich, angefangen mit der Einrichtung eines zentralen Kommandos."   
 uk_indian_mps:0 "Indische Abgeordnete"   
 uk_indian_mps_desc:0 "Mit der Föderation und der Vertretung unserer Siedlerkolonien in den Reichsparlamenten sind die Forderungen der Inder nach Vertretung oder Unabhängigkeit lauter geworden. Wir sind der Ansicht, dass Ersteres für uns akzeptabler wäre."   
 uk_empire_ireland:0 "Irland wiederherstellen"   
 uk_empire_ireland_desc:0 "Irland ist vom rechten Weg abgekommen! Seine Beziehung zum Britischen Empire ist seit 1937 nur noch eine Formalität. Es ist Zeit, es wieder in die Föderation zu integrieren."   
 uk_mw_1:0 "Beginnen Sie mit der Motorisierung"   
 uk_mw_1_desc:0 "Wie die Experimental Mechanized Force deutlich gezeigt hat, ist Mobilität auf dem Schlachtfeld wichtiger als die Feuerkraft – etwas, das unsere Generäle bisher tragischerweise vernachlässigt haben. Wir müssen dies korrigieren und mit dem Ausbau unserer motorisierten Kapazitäten beginnen, um unseren Streitkräften ausreichende Manövrierfreiheit zu ermöglichen und so eine weitere Pattsituation zu verhindern." 
 uk_mw_2:0 "Der Universalträger"   
 uk_mw_2_desc:0 "Obwohl der Universal Carrier bereits in großer Stückzahl produziert wird, ist er bei unseren Streitkräften noch nicht vollständig angekommen. Das kleine Fahrzeug bietet zwar nicht den vollen Schutz größerer Fahrzeuge, ist aber ein unglaublich leistungsfähiges Zugfahrzeug, Truppentransporter und Aufklärungsfahrzeug. Wir müssen Vickers-Armstrongs kontaktieren, um ausreichende Mengenbestellungen zu erhalten und große Lagerbestände des Fahrzeugs aufzubauen!"
 uk_empire_america:0 "Wiederherstellung nordamerikanischer Gebiete"   
 uk_empire_america_desc:0 "Wir haben in Amerika eine Reihe ruhender Ansprüche: British Columbia, aber auch die gesamten Dreizehn Kolonien, die uns vor langer Zeit von aufstrebenden Siedlern entrissen wurden. Jetzt, da das Imperium vereint, föderiert und unzerstörbar dasteht, ist es an der Zeit, unser entferntestes Kind wieder in die Gemeinschaft aufzunehmen."   
 uk_empire_africa:0 "Der britische Kontinent"   
 uk_empire_africa_desc:0 "Die Briten haben ein Recht auf Afrika. Während andere Imperien die einheimische Bevölkerung ausbeuten, abschlachten und brutalisieren, streben wir nichts weiter als die Verbreitung der Zivilisation, des christlichen Glaubens und unseres Wohlstands."   
 uk_empire_china:0 "Erobern Sie Südchina"   
 uk_empire_china_desc:0 "Südchina gilt seit langem als Teil unseres „informellen Reiches“. In Gebieten, in denen wir eine so große wirtschaftliche Vorherrschaft besitzen, könnten sie auch unsere Kolonien sein. Vielleicht ist es an der Zeit, diese besondere Regelung zu formalisieren."   
 uk_empire_indochina:0 "Durchsetzung der Hegemonie Indochinas"   
 uk_empire_indochina_desc:0 "Mit Südchina in unserer Gewalt sticht Indochina zunehmend als unangenehmer Fleck im wachsenden britischen südasiatischen Imperium hervor. Lasst uns da aufräumen."   
 uk_hobarts_funnies:0 "Hobarts Witze"
 uk_hobarts_funnies_desc:0 "Da unseren Ingenieuren immer schwerere Fahrgestelle und leistungsfähigere Aufhängungssysteme zur Verfügung stehen, wurden Versuche unternommen, Brückenleger, Flammenwerfer und Sprengmörser mit Panzerrümpfen zu kombinieren. Wir sollten die erfolgreichen Modelle unter der einheitlichen Bezeichnung „AVRE“ standardisieren und verallgemeinern."
 uk_mw_3:0 "Mechanisierung der Artillerie"   
 uk_mw_3_desc:0 "Die Fähigkeit, Feuerbasen schnell über unwegsames Gelände und große Entfernungen hinweg zu verlegen, ist entscheidend. Zwar gibt es bereits Pläne, Artillerie hinter motorisiertem Zug zu platzieren, aber wir könnten noch mutiger vorgehen, wenn die Artillerie über eine eigene mechanisierte Halterung verfügte."   
 uk_mw_4:0 "Universalisierung der mechanisierten Streitkräfte"
 uk_mw_4_desc:0 "Wir sind nicht länger experimentell und haben seit Salsbury Plain einen langen Weg zurückgelegt. Unsere Erfahrung hat die enorme Leistungsfähigkeit mobiler, reaktionsfähiger Einheiten gezeigt. Nun ist es an der Zeit, eine neue Abteilungsstruktur zu entwickeln, die diese Veränderungen berücksichtigt."
 uk_gbp_4:0 "Vorherrschaft der Infanteriepanzer"
 uk_gbp_4_desc:0 "Der Kult der Offensive hat uns im letzten Krieg teuer zu stehen gekommen. Um einen Durchbruch zu erzielen, müssen schwer gepanzerte Panzer unsere Fußinfanterie beim Durchbrechen der feindlichen Verteidigung unterstützen."
 uk_iraq_focus:0 "Sicherer Irak"
 uk_iraq_focus_desc:0 "Wir haben dem Irak 1932 die Unabhängigkeit gewährt, doch angesichts der aktuellen Weltlage könnte das ein Fehler gewesen sein. Irakisches Öl darf niemals unsere Feinde erreichen, insbesondere angesichts des erheblichen Einflusses der Deutschen und Italiener in der Region."
 uk_iran_focus:0 "Sicherer Iran"
 uk_iran_focus_desc:0 "Es besteht der Verdacht, dass sich in der iranischen Führung kollektivistischer Einfluss ausbreitet. Das dürfen wir nicht zulassen, da es sonst unsere Kriegsanstrengungen zusätzlich belastet. Der Iran ist nicht nur reich an Öl, das wir unseren Feinden vorenthalten müssen; er ist auch der strategische Knotenpunkt zwischen Indien, dem Nahen Osten und der Sowjetunion."
 uk_air_rearmament_focus:0 "Luftaufrüstung"
 uk_air_rearmament_focus_desc:1 "[Root.GetAirRearmamentDesc]"
 uk_chiefs_of_staff_committee:1 "Ausschuss der Stabschefs"
 uk_chiefs_of_staff_committee_desc:1 "Wir müssen die Oberhäupter der verschiedenen Teilstreitkräfte ermächtigen, diesen Krieg nach ihrem Ermessen zu führen. Die 1923 gegründeten Vereinigten Stabschefs erhalten nun die Möglichkeit, Operationen weltweit zu koordinieren und direkt dem Kriegskabinett zu berichten. Dies wird die Planung militärischer Operationen erheblich vereinfachen."
 uk_royal_economic_reform:0 "Königliche Wirtschaftsreform"
 uk_royal_economic_reform_desc:0 "Seine Königliche Hoheit versucht, bestimmte korrupte Finanzpraktiken zu reformieren, indem sie eine stärkere Aufsicht und Absicherung der entsprechenden Wirtschaftssektoren einführt."
 
 
 colonial_independence:0 "Unseren eigenen Weg schmieden" 
 colonial_independence_desc:0 "Die Welt verändert sich! Alte Mächte fallen, neue Mächte steigen in Europa und im Fernen Osten auf, und die alten europäischen Herrscher verlieren mit jedem Tag mehr an Kontrolle über ihre überseeischen Besitztümer. Entkolonialisierung oder Tod!" 
 colonial_fascism:0 "Die Kugel" 
 colonial_fascism_desc:0 "Die Europäer haben uns unseren Stolz, unsere Bräuche und unsere Nationalität geraubt. Es ist an der Zeit, uns zu vereinen, die unerwünschten und entarteten Einflüsse der Gesellschaft auszumerzen und uns gegen die Unterdrücker zu erheben." 
 colonial_gangs:0 "Bewaffnete Banden"
 colonial_gangs_desc:0 "Die Bildung nationalistisch gesinnter bewaffneter Banden, ähnlich den Braunhemden und Schwarzhemden in Deutschland und Italien, um unsere neue Volksbewegung unter denen durchzusetzen, die mit den europäischen Unterdrückern kollaborieren oder sich für sie entschuldigen könnten, wird dazu beitragen, unsere Sache voranzubringen und die Kontrolle zu festigen."
 colonial_fashy_state:0 "Der neue Staat"
 colonial_fashy_state_desc:0 "Jetzt, da wir die Zügel des Landes in der Hand haben, sind wir endlich in der Lage, unsere Agenda der nationalen Wiedergeburt umzusetzen."
 colonial_democracy:0 "Die Wahlurne"
 colonial_democracy_desc:0 "Die Europäer haben uns viel Gutes und Schlechtes gebracht, doch ihre parlamentarische Demokratie ist zweifellos ihre beste Schöpfung. Doch ihr Glaube an die Freiheit ist Heuchelei gegenüber denen, die sie zu ihrem eigenen Vorteil unterdrücken. Daher ist es an der Zeit, ihre eigenen Vorstellungen gegen sie zu verwenden."
 colonial_protests:0 "Satyagraha"
 colonial_protests_desc:0 "Wie wir am Beispiel des Nationalkongresses in Indien sehen, ist es am besten, den Weg zur Freiheit behutsam und friedlich zu beschreiten, nicht mit Terrorismus oder Gewalt. Selbst die besten Verschleierungsversuche der Europäer können die Rechtschaffenheit einer Nation, die sich nach Freiheit sehnt, gegenüber ihrer Bevölkerung nicht leugnen."
 colonial_nice_nationalism:0 "Bürgernationalismus"
 colonial_nice_nationalism_desc:0 "Wir sind eine Nation, eine alte und stolze, die sich langsam von ausländischer Kontrolle und Einfluss befreit. Wo die Europäer uns gelehrt haben, wir seien wild, rückständig und ungebildet, werden wir ihnen zeigen, dass wir in allen Angelegenheiten Schulter an Schulter mit unseren ehemaligen Herren stehen können."
 colonial_communism:0 "Die Bombe"
 colonial_communism_desc:0 "Die Veränderungen, die die Europäer unserem Land gebracht haben, werden nie verschwinden; Industrialisierung, Modernisierung, Kapitalismus – all das belastet unser Land für immer. Die Gesellschaft, die sie uns aufzwingen wollen, ist von Natur aus hierarchisch, unterdrückend und ausbeuterisch. Nur wenn wir uns von ihrem Einfluss befreien, werden wir frei sein."
 colonial_direct_action:0 "Direkte Aktion"
 colonial_direct_action_desc:0 "Wenn man die Imperialisten beruhigen könnte, wären wir freie Menschen. Das sind wir nicht, und es ist an der Zeit, ihnen zu zeigen, dass die Zeit der Gespräche vorbei ist."
 colonial_civil_war:0 "Befreiungskrieg"
 colonial_civil_war_desc:0 "Die Spannungen haben einen Siedepunkt erreicht. Das Volk schreit nach Freiheit. Wir werden keine ungerechten Steuern und keine Unterdrückung mehr hinnehmen – keine Götter, keine Herren mehr. Es lebe die Revolution!"
 colonial_postcolonial:0 "Postkoloniale Reform"
 colonial_postcolonial_desc:0 "Es war ein langer Weg. Wir sind frei – der Kampf ist vorbei. Es ist Zeit, unsere Wunden zu lecken und dieses Land für die langen Wege zu heilen, die vor uns liegen."
 colonial_conquest:0 "Territorialer Nationalismus" 
 colonial_conquest_desc:0 "Die Europäer haben uns gespalten und in bestimmte Gruppen aufgeteilt. Sie wollten uns auseinanderbringen und schwächen. Um wieder stark zu werden, müssen wir diese falschen Spaltungen überwinden und uns zurückholen, was uns gehört."
 colonial_loyalty:0 "Bleiben Sie treu"  
 colonial_loyalty_desc:0 "Um Recht und Ordnung, Zivilisation und die Verbreitung von Wohlstand, Handel und gegenseitigem Interesse aufrechtzuerhalten, werden wir diese Union aufrechterhalten."  
 colonial_settlement:0 "Förderung der europäischen Besiedlung"
 colonial_settlement_desc:0 "Egal wie sehr wir dieses Land erschließen, wir können uns der Loyalität der einheimischen Bevölkerung nie ganz sicher sein. Durch die Ansiedlung europäischer Siedler können wir eine Bevölkerung aufbauen, die den Kolonialherren, die ihre Interessen vertreten, zweifellos überwiegend treu ergeben sein wird."
 colonial_elites:0 "Zusammenarbeit mit lokalen Eliten"
 colonial_elites_desc:0 "Wenn wir hier friedlich regieren und uns einvernehmlich mit der einheimischen Bevölkerung entwickeln wollen, ist es für uns sinnvoller, mit den bestehenden Machtstrukturen Abkommen zu schließen, als zu versuchen, sie zu entwurzeln."
 colonial_police_desc:0 "Wo Chaos herrscht, bringen die Bobbies Ordnung."
 colonial_apartheid:0 "Rassendiskriminierung"
 colonial_apartheid_desc:0 "Die Menschen dieses Landes sind minderwertig, und so sehr wir auch versuchen, sie zu fördern, sie werden uns niemals ebenbürtig sein. Ihr Land ist reich, schön und seine Ressourcen kommen unserer Rasse besser zugute. Zu diesem Zweck werden wir den Import europäischer Siedler fortsetzen und gleichzeitig die einheimische Bevölkerung streng überwachen."
 colonial_citizenship:0 "Universelle Staatsbürgerschaft"
 colonial_citizenship_desc:0 "Unsere Mission besteht darin, den Menschen in diesem Land zu helfen. Langsam nimmt dieser Prozess Gestalt an, und es scheint, als sei die lokale Bevölkerung inzwischen so weit entwickelt, dass wir ihr die Demokratie näherbringen können."
 colonial_divide:0 "Teile und herrsche"
 colonial_divide_desc:0 "Um unsere Macht hier zu erhalten und den Rohstoff- und Geldfluss für das Imperium aufrechtzuerhalten, sollten wir die lokale Bevölkerung ablenken, damit sie sich nicht gegen uns erheben kann. Wie könnte man ihren Zorn besser bündeln, als sie in Klassen und ethnische Gruppen zu spalten und ihre Meinungsverschiedenheiten zu schüren, sodass sie sich gegeneinander wenden?"
 colonial_model:0 "Modellkolonie"
 colonial_model_desc:0 "Unsere Arbeit war erfolgreich. Zum ersten Mal herrschen Frieden, Wohlstand, Handel und Zivilisation in diesem Land. Hurra!"
 colonial_fleet_desc:0 "Wir eignen uns am besten als Marineaußenposten und zu diesem Zweck ist es notwendig, dass wir hier eine starke Marinepräsenz aufbauen."
 colonial_coastal_defence:0 "Küstenschutz"
 colonial_coastal_defence_desc:0 "Im Prinzip sind wir Instrumente unserer Kolonialherren in Übersee, die ihre Seemacht mit unseren Stützpunkten auch ins Ausland ausdehnen. Daher sollte unsere eigene Flotte nicht mehr als eine Küstenverteidigungstruppe sein, um kleinere Bedrohungen abzuwehren."
 colonial_submarines_desc:0 "Sollten wir in einen Krieg oder eine größere Auseinandersetzung hineingezogen werden, ist es für unsere kleine Streitmacht am besten, wenn wir die Strategie verfolgen, den Handel und die Konvois des Feindes mit einer U-Boot-Flotte abzuschneiden."
 colonial_big_navy:0 "Unabhängige Marine"
 colonial_big_navy_desc:0 "Ursprünglich nur als Außenposten einer größeren Seestreitmacht gegründet, ist es an der Zeit, dass wir unsere eigenen Fähigkeiten entwickeln."
 colonial_flagship:0 "Baue ein Flaggschiff"
 colonial_flagship_desc:0 "Jede moderne Marine braucht ein hochmodernes Hightech-Flaggschiff im Zentrum ihrer Streitkräfte, und wir sollten sofort mit der Arbeit beginnen."
 colonial_naval_academy:0 "Lokale Marineakademie"
 colonial_naval_academy_desc:0 "Für jede Streitmacht, ob zu Land oder zu Wasser, ist ein gut ausgebildetes, diszipliniertes und besonnenes Offizierskorps zur Aufrechterhaltung einer funktionsfähigen Streitmacht absolut notwendig."
 colonial_dockyards:0 "Ausbau der Bekohlungsanlagen"
 colonial_dockyards_desc:0 "Um unseren wachsenden Marinebedarf zu decken, sollten wir die alten kolonialen Kohlenstationen zu modernen Werften, Marinestützpunkten und anderen Küstenanlagen aufrüsten, um den Bedürfnissen unserer Streitkräfte gerecht zu werden."
 colonial_army_desc:0 "Um Bedrohungen abzuwehren und uns zu verteidigen, brauchen wir eine moderne, gut ausgerüstete und gut ausgebildete Streitmacht."
 colonial_army_equipment:0 "Entwicklungen im Bereich Kleinwaffen"
 colonial_army_equipment_desc:0 "Durch den Import und die Entwicklung unserer eigenen modernen Kleinwaffen werden unsere Truppen im direkten Vergleich mit jedem Gegner, gegen den wir kämpfen, im Vorteil sein."
 colonial_army_motorization:0 "Grundmotorisierung"
 colonial_army_motorization_desc:0 "Das Gehen kommt aus der Mode und schwerfällige mechanisierte Transportmittel sind auf dem Vormarsch."
 colonial_army_artillery:0 "Artillerieunterstützung"
 colonial_army_artillery_desc:0 "Männer sind teuer, Granaten sind billig; unterstützt durch die wirtschaftliche Stärke unseres Heimatlandes können wir es uns leisten, Artillerieunterstützung aufzubauen, um sicherzustellen, dass möglichst wenige (unsere) Leben verloren gehen."
 colonial_army_tanks:0 "Panzerexperimente"
 colonial_army_tanks_desc:0 "Wenn wir eine wirklich moderne, mechanisierte Streitmacht aufbauen wollen, müssen wir über ein kleines Panzerkorps verfügen und dabei von den Landschiffen des letzten Krieges lernen."
 colonial_army_support:0 "Support-Unternehmensintegration"
 colonial_army_support_desc:0 "Kein Mann kämpft allein – hinter ihm steht ein ganzes Land, Offiziere, Arbeiter, Krankenschwestern, Techniker und immer größere Zeltgruppen voller dieser Männer und Frauen, die für den modernen Soldaten unverzichtbar sind."
 colonial_airforce:0 "Lufthilfsstoffe"
 colonial_airforce_desc:0 "Die Beherrschung des Himmels wird auf dem modernen Schlachtfeld immer wichtiger, und wir sollten besser mithalten, sonst laufen wir Gefahr, den Anschluss zu verlieren."
 colonial_modernisation:0 "Beginnen Sie mit der wirtschaftlichen Modernisierung"
 colonial_modernisation_desc:0 "Der Wind der Veränderung entwickelt sich zu einem wahren Sturm, und es ist Zeit für uns, mit der Welt Schritt zu halten oder zurückgelassen zu werden."
 colonial_resources:0 "Neue Extraktionsmethoden"
 colonial_resources_desc:0 "Wir herrschen über ein Land, das reich an Rohstoffen ist, und mit modernen Abbautechniken können wir noch größere Erträge erzielen."
 colonial_railways_1:0 "Bahnverbindungen"
 colonial_railways_1_desc:0 "Eisenbahnen verbinden ein Land, vereinen es zu einem großen Dorf und stärken ein einheitliches Nationalgefühl."
 colonial_railways_2:0 "Inländische Eisenbahnunternehmen"
 colonial_railways_2_desc:0 "Indem wir unsere Abhängigkeit von ausländischen Bauunternehmen verringern und eigene Firmen zur Verwaltung des lokalen Verkehrsnetzes gründen, können wir unsere wirtschaftliche Unabhängigkeit verbessern."
 colonial_factories_1:0 "Grundlegende industrielle Entwicklung"
 colonial_factories_1_desc:0 "Um unsere Wirtschaft auszubauen und zu modernisieren, sollten wir mit der Industrialisierung des Landes beginnen."
 colonial_factories_2:0 "Siedlerunternehmer"
 colonial_factories_2_desc:0 "Anstatt uns beim Bau und Betrieb unserer Fabriken auf ausländische Unternehmen zu verlassen, sollten wir den Unternehmergeist der Siedler hier fördern, damit sie mit staatlicher Unterstützung ihre eigenen Unternehmen gründen können."
 colonial_research:0 "Universitäten gründen"
 colonial_research_desc:0 "Universitäten sowohl für die Siedler als auch für die einheimische Bevölkerung werden dazu beitragen, unsere gebildete Bevölkerung zu vergrößern und unsere Produktion zu verbessern."
 colonial_research_military:0 "Militärische Forschungsstipendien"
 colonial_research_military_desc:0 "Am Horizont ziehen Gewitterwolken auf, und wir sollten uns darauf vorbereiten. Auf der Grundlage unserer neu gewonnenen akademischen Grundlagen sollten wir unsere Anstrengungen auf die militärische Spitzenforschung konzentrieren."
 colonial_research_civilian:0 "Zivile Forschungsstipendien"
 colonial_research_civilian_desc:0 "Mit Wissenschaft, Technologie und Tatendrang können wir diese Welt verändern und sie für die gesamte Menschheit besser, glücklicher und gesünder machen."

 ### EVENTS
 britain.9.t:0 "Chamberlain tritt zurück"
 britain.9.d:0 "Da sich der Krieg zu unserem Nachteil und dem unserer Verbündeten entwickelt, ist der Premierminister für seine Entscheidungen in Friedens- und Kriegszeiten an entscheidenden Wendepunkten in die Kritik geraten. In einer Zeit, in der Großbritannien mehr denn je vereint sein muss, ist es gespalten, da Teile des Parlaments Chamberlain verachten. Da ihm die wichtige Unterstützung der Labour-Partei fehlt, hat der Premierminister beschlossen, zurückzutreten und Lord Halifax als seinen Nachfolger zu bevorzugen. Halifax zeigt sich jedoch skeptisch, und Chamberlain riet dem König, Winston Churchill zu rufen. Halifax genießt zwar die Unterstützung der Bevölkerung, doch Churchills Äußerungen vor dem Krieg erscheinen nun vorausschauend, und ein Bulldogge wie er könnte genau das sein, was wir für den kommenden Krieg brauchen."
 britain.9.a:0 "Churchill wird uns durchbringen."
 britain.9.b:0 "Halifax ist die sinnvollere Option."
 
 britain.10.t:0 "Chamberlain verstorben"
 britain.10.d:0 "Premierminister Neville Chamberlain ist kürzlich erkrankt, obwohl er für sein Alter insgesamt gesund war. Nach der Diagnose Darmkrebs, verstärkten Schmerzen und Schlafmangel trat er von seinem Amt zurück. Chamberlain genießt nach wie vor großen Rückhalt in der Bevölkerung und tritt nur als letzten Ausweg zurück, da er weiß, dass er sein Amt nicht mehr antreten wird. Die Frage bleibt, wer nach diesem großen Staatsmann die Fackel übernehmen und Großbritannien durch die dunklen Zeiten führen wird, die möglicherweise noch vor uns liegen."
 britain.10.a:0 "Churchill wird uns durchbringen."
 britain.10.b:0 "Halifax ist die sinnvollere Option."

 britain.24.t:0 "Wallis Simpson"
 britain.24.d:0 "Der neue König-Kaiser ist ein jungenhafter und problematischer Typ, der zu Grobheiten, Traditionsverstößen und, was am schlimmsten ist, Frauengeschichten neigt. Seine jüngste Affäre gilt der zweimal geschiedenen amerikanischen Prominenten Wallis Simpson, die er zu heiraten beabsichtigt. Dies stellt eine potenzielle Verfassungskrise dar, da die Church of England, der der britische Monarch vorsteht, Wiederverheiratungen nach einer Scheidung verbietet, ganz zu schweigen von Simpsons niedriger Herkunft. Weder das britische Volk noch die unserer Dominions im Ausland werden diese Amerikanerin als Königin akzeptieren – während es uns gelungen ist, die Medien im Inland zum Schweigen zu bringen, rastet die Presse im Ausland aus, und es wird nicht lange dauern, bis die britische Öffentlichkeit von diesem Skandal Wind bekommt."
 britain.24.a:0 "Das muss vor der Krönung geklärt werden"
 
 britain.25.t:0 "Abdankungskrise"
 britain.25.d:0 "Je näher die Krönung rückt, desto größer wird die Sorge um die Verlobung des neuen Königs und Kaisers mit Wallis Simpson. Die Premierminister der Dominions haben sie einstimmig als Partnerin des britischen Herrschers abgelehnt, und die Baldwin-Regierung droht mit einem kollektiven Rücktritt. Die Monarchin steht nun vor einer einfachen Entscheidung: Liebe oder Pflicht?"
 britain.25.a:0 "Was nützt es, König zu sein, wenn man die Person, die man liebt, nicht heiraten kann?" 
 britain.25.b:0 "Sie wird zum Wohle des Imperiums gehen müssen"
 
 britain.26.t:0 "Krönung von Edward VIII."
 britain.26.d:0 "Nachdem die Angelegenheit mit Wallis Simpson längst geklärt ist, verlief die Krönung des neuen britischen Herrschers reibungslos. Der Monarch wurde gesalbt, gekrönt, inthronisiert und regiert nun als Edward VIII., König des Vereinigten Königreichs und der britischen Dominions sowie Kaiser von Indien. Die Feierlichkeiten erstreckten sich auf das gesamte Empire. Indische und afrikanische Mitglieder des Königshauses nahmen ebenso an den Zeremonien in London teil wie die Führer der Dominions. Von den Bergen des Yukon bis zu den lieblichen Küsten Aucklands fanden Paraden und Festlichkeiten statt. Münzen mit seinem ungewöhnlich nach links gerichteten Porträt wurden zusammen mit Briefmarken und anderen Erinnerungsstücken im ganzen Empire verschickt. Dies war die erste Krönung, bei der neue Technologien zum Einsatz kamen: Sie wurde gefilmt und im Radio an die Untertanen des Empire und in die ganze Welt übertragen."
 britain.26.a:0 "Gott schütze den König!" 
 
 britain.27.t:0 "Krönung Georgs VI."
 britain.27.d:0 "Die kurze und turbulente Herrschaft Eduards VIII. liegt hinter dem Empire, und die Herrschaft des bis dahin kaum bekannten Georg VI. wurde mit großem Pomp eingeläutet. Der Monarch wurde gesalbt, gekrönt, inthronisiert und regiert nun als Georg VI., König des Vereinigten Königreichs und der britischen Dominions sowie Kaiser von Indien. Die Feierlichkeiten erstreckten sich über das ganze Empire. Indische und afrikanische Mitglieder des Königshauses nahmen ebenso an den Zeremonien in London teil wie die Führer der Dominions. Von der Wüste des Yukon bis zu den lieblichen Küsten Aucklands fanden Paraden und Festlichkeiten statt. Münzen und Briefmarken mit dem Bild des Monarchen sowie andere Erinnerungsstücke wurden im ganzen Empire verteilt. Dies war die erste Krönung, bei der neue Technologien zum Einsatz kamen: Sie wurde gefilmt und im Radio an die Untertanen des Empires und in die ganze Welt übertragen."
 britain.27.a:0 "Gott schütze den König!" 
 
 britain.28.t:0 "Referendum in Neufundland"
 britain.28.d:0 "In einem ersten Schritt hin zu einer neuen Politik der kolonialen Selbstbestimmung sind die Bürger Neufundlands an die Wahlurnen gegangen, um über die Zukunft ihres Landes zu entscheiden, und haben mit knapper Mehrheit für den Anschluss an Kanada gestimmt."
 britain.28.a:0 "Oh, Kanada!"  
 
 britain.29.t:0 "Die Schlacht in der Cable Street"
 britain.29.d:0 "Oswald Mosleys wachsende Schwarzhemden-Bewegung, die British Union of Fascists, hat ihre Absicht erklärt, in voller Uniform vor der großen jüdischen Bevölkerung durch das Herz des Londoner East Ends zu marschieren. Aus Angst vor Gewalt schickte der Innenminister eine Polizeieskorte, um den Marsch fortzusetzen – doch lokale Kommunisten, Sozialisten, Anarchisten, Juden und Gewerkschaftsaktivisten ließen sich nicht abschrecken und versprechen Mosley einen Kampf."
 britain.29.a:0 "Die Antifaschisten drängen die Demonstranten zurück." 
 britain.29.b:0 "Die Schwarzhemden brechen durch und marschieren durch das East End." 
 britain.29.c:0 "Die Antifaschisten drehen den Spieß um und wenden sich gegen die Schwarzhemden."
 britain.29.e:0 "Schicken Sie das Militär, um diesem Chaos ein Ende zu setzen."
 
 britain.30.t:0 "Die britische Revolution"
 britain.30.d:0 "Während sich London noch immer von den Wirren der plötzlichen und gewaltsamen Revolution der vergangenen Woche erholt, ist das Empire noch immer in Aufruhr. Die unglaublichen Ereignisse in der britischen Metropole haben dazu geführt, dass die äußersten Teile unseres Empire, die der neuen britischen Regierung ideologisch ablehnend gegenüberstehen und verfassungsmäßig verärgert sind, versuchen, ihren eigenen Weg zu gehen."
 britain.30.a:0 "Verräter, allesamt!" 
 
 britain.31.t:0 "Nordamerika geht seinen eigenen Weg!"
 britain.31.d:0 "Irgendwann vor dem Sturm auf den Buckingham-Palast floh die britische Monarchie nach Kanada, das sich inzwischen zur unabhängigen konstitutionellen Monarchie erklärt und Neufundland besetzt hat. In der Karibik hat sich aus unseren dortigen Territorien eine lose Koalition von Inselstaaten zur Westindischen Föderation zusammengeschlossen."
 britain.31.a:0 "Gott helfe uns ..." 
 
 britain.32.t:0 "Indien geht seinen eigenen Weg!"
 britain.32.d:0 "Die konservative anglo-indische Elite, die nun als dominierende Minderheit in Indien dasteht, ist nicht in der Lage, den radikalen Regimewechsel in der Metropole zu akzeptieren und hat ihre Unabhängigkeit vom Imperium erklärt. Die kleineren Außenposten in Südasien schließen sich ihnen bereitwillig an."
 britain.32.a:0 "Gott helfe uns ..." 
 
 britain.33.t:0 "Die Geier plündern Afrika"
 britain.33.d:0 "Die Afrikaaner Südafrikas, die nie mit den Briten befreundet waren, haben ihre Unabhängigkeit als Republik erklärt und Betschuanaland erobert. Im Norden haben sich die bereits quasi-unabhängigen Rhodesien und Njassaland von den britischen Fesseln befreit. Unsere Kolonien in West- und Ostafrika wurden von Frankreich und Italien erobert, die unsere Gebiete zweifellos in den Ruin treiben werden."
 britain.33.a:0 "Gott helfe uns ..." 
 
 britain.34.t:0 "Ozeanien geht seinen eigenen Weg!"
 britain.34.d:0 "Australien und Neuseeland haben ihre Unabhängigkeit als Republiken proklamiert und die Kontrolle über die umliegenden Inselkolonien übernommen. Sie versprechen zwar, in den Schoß der Nation zurückzukehren, sollte Großbritannien jemals wieder unter zivilisierte Herrschaft kommen, doch dies erscheint unwahrscheinlich."
 britain.34.a:0 "Gott helfe uns ..." 
 
 britain.35.t:0 "Die Geier plündern den Nahen Osten"
 britain.35.d:0 "Frankreich hat die Kontrolle über alle Gebiete vom Suezkanal bis zur Grenze seines eigenen Syriens übernommen, während die Griechen Zyperns endlich ihre Enosis erreicht haben und unsere verbleibenden verstreuten Gebiete nicht lange überlebten, bevor sie von irgendwelchen rückständigen Sultanaten aufgekauft wurden, die einen Groll gegen unser Reich hegten."
 britain.35.a:0 "Gott helfe uns ..." 
 
 britain.36.t:0 "Großbritannien schlägt Syndikalisierung vor"
 britain.36.d:0 "Es ist kein Geheimnis, dass die rote Flut des Kommunismus, Sozialismus und Anarchismus in Irland auf dem Vormarsch ist. Sie gewinnen immer mehr Sitze im Parlament und sind auf den Straßen Dublins beunruhigend sichtbar. Es scheint nur eine Frage der Zeit, bis wir von ihnen überschwemmt werden. Sicherlich zumindest teilweise dafür verantwortlich, hat uns die Britische Föderation jenseits der Irischen See ein verlockendes Angebot gemacht: ein Vereinigtes Irisches Syndikat, gleichberechtigt mit Wales und Schottland. Auch wenn dies unter jedem anderen Namen wie Vasallentum erscheinen mag, ist der Erwerb der sechs Grafschaften ein lang ersehnter Preis …"
 britain.36.a:0 "Es scheint, das wäre unser bester Schachzug" 
 britain.36.b:0 "Unverschämt! Absolut nicht" 
 
 britain.37.t:0 "Irland lehnt Syndikalisierung ab!"
 britain.37.d:0 "Das Telegramm ist aus Dublin zurückgekommen und Irland hat unser großzügiges Angebot für ein vereintes irisches Syndikat abgelehnt!"
 britain.37.a:0 "Absurd! Es ist vielleicht an der Zeit, sich nach anderen Methoden umzusehen ..." 
 
 britain.38.t:0 "Anthrax-Angriff abgewendet!"
 britain.38.d:0 "Ein hinterhältiger britischer Plan, deutsches Vieh mit Anthrax zu vergiften und so die Pest unter der restlichen deutschen Bevölkerung zu verbreiten, konnte glücklicherweise von unseren Abwehragenten vereitelt werden. Mehrere getarnte britische Spezialagenten wurden in der Nähe von Greifswald festgenommen und enthüllten nach Verhören die Art ihrer Mission. Eine solche Barbarei in einem zivilisierten Krieg, den wir führen, ist nahezu unvorstellbar. Den Briten kann man wahrlich nicht trauen."
 britain.38.a:0 "Wie konnten sie sich so etwas überhaupt vorstellen?"
 
 britain.39.t:0 "Verheerender Anthrax-Angriff!"
 britain.39.d:0 "Das Undenkbare ist uns widerfahren. Agenten einer feindlichen ausländischen Regierung, offenbar Großbritanniens, haben es geschafft, riesige Mengen deutschen Viehs mit Anthrax-Sporen zu infizieren, die sich nun unaufhörlich unter der Zivilbevölkerung ausbreiten. Unsere Versuche, den Ausbruch einzudämmen, dauern an, doch die Folgen sind unmittelbar spürbar. Leichen säumen die Straßen, ganze Städte liegen leer, und riesige Flüchtlingsströme fliehen in der Hoffnung auf Sicherheit vom Land in die Städte, was die durch die Vernichtung solch großer Viehbestände ausgelöste Nahrungsmittelkrise nur noch verschärft. Die Armee ist in Aufruhr. Unsere führenden Wissenschaftler sagen voraus, dass viele der infizierten Gebiete in den nächsten Jahrzehnten nicht mehr bewohnbar sein werden. Der Führer hat Vergeltung geschworen, doch in der aktuellen Lage erscheint es fraglich, ob uns dies gelingen wird."
 britain.39.a:0 "Es gibt keine Worte..."
 
 britain.40.t:0 "Scheitern der Operation Vegetarian"
 britain.40.d:0 "Trotz aller Bemühungen sind unsere Versuche, die Operation Vegetarian durchzuführen, gescheitert. Da unser Bodenpersonal vermisst wird und vermutlich in Gefangenschaft ist, besteht kein Zweifel, dass ihre Luftabwehr in höchster Alarmbereitschaft sein wird, um die Verbreitung von infiziertem Material aus der Luft zu verhindern. Es wird nicht lange dauern, bis dies den Geheimdiensten unserer verbündeten Nationen und der Welt bekannt wird – es ist fraglich, ob sie die Ernsthaftigkeit unserer Lage verstehen werden."
 britain.40.a:0 "Mist."
 
 britain.41.t:0 "Operation Vegetarisch ist erfolgreich!"
 britain.41.d:0 "Entgegen aller Erwartungen hat der Plan funktioniert! Nachdem mit Anthrax infizierte Leinsamenkuchen an deutsches Vieh verteilt worden waren, gelangte das vergiftete Fleisch an die deutsche Bevölkerung, die bereits in Scharen zu sterben begann. Es scheint, als hätten wir es geschafft, doch die Szenen, die wir jetzt in Deutschland sehen, lassen viele fragen, ob dies der richtige Weg war. Große Teile der britischen Bevölkerung sind selbst entsetzt über diese Entscheidung, und wir werden von unseren alliierten Mitstreitern verurteilt. Das geht vielleicht zu weit."   
 britain.41.a:0 "Möge Gott uns vergeben."
 
 britain.42.t:0 "Attentat abgewendet"
 britain.42.d:0 "Mitglieder des Führerbegleitkommandos haben heute zwei britische Agenten festgenommen und einen lokalen Kollaborateur in der Nähe des Berghofs, Hitlers Privatresidenz in den bayerischen Alpen, verhaftet. Sie werden derzeit verhört, doch es handelt sich offenbar um einen Mordanschlag! Als Reaktion darauf wurde die Wachsamkeit erhöht, und SS, Abwehr, Gestapo und andere Sicherheitsapparate des Staates befinden sich in höchster Alarmbereitschaft."
 britain.42.a:0 "Das war knapp..."
 
 britain.43.t:0 "Der Führer ist tot"
 britain.43.d:0 "Heute wurde Adolf Hitler während seines Morgenspaziergangs auf dem Berghof in den bayerischen Alpen plötzlich von einem Scharfschützen angeschossen und sofort tot aufgefunden. Kurz darauf wurden zwei britische Agenten festgenommen, einer wurde auf der Stelle getötet, der andere in Gewahrsam genommen. Alle umliegenden Städte wurden abgeriegelt, und es wurden umfangreiche Ermittlungen eingeleitet, um jeden einzelnen dafür verantwortlichen Verräter zu finden. Gemäß dem Willen des Führers wurde Hermann Göring zum neuen Führer des Deutschen Reiches ernannt. Wir überlegen noch, wie wir diese Nachricht der deutschen Öffentlichkeit am besten überbringen können."
 britain.43.a:0 "Ohne ihn wären wir möglicherweise wirklich verloren."
 
 britain.44.t:0 "Britischer Anthrax-Angriff auf Deutschland"
 britain.44.d:0 "Die Briten haben alle Regeln und Normen zivilisierter Gesellschaft und Kriegsführung gebrochen und das Undenkbare getan. Mit Anthrax-verseuchten Leinsamenkuchen, die sie an deutsches Vieh verteilten, führten sie einen chemischen Krieg in einem nie dagewesenen Ausmaß – bis heute sind möglicherweise Millionen Deutsche tot, Soldaten wie Zivilisten. Großbritanniens Verbündete und Feinde haben diesen sinnlosen Akt der Brutalität gleichermaßen verurteilt. Während der Führer Vergeltung geschworen hat, bleibt sein persönlicher Status und der vieler anderer hochrangiger Nazi-Funktionäre unklar."
 britain.44.a:0 "Wie konnten sie überhaupt an so etwas denken?"
 
 britain.45.t:0 "Fehlschlag der Operation Foxley"
 britain.45.d:0 "Unsere beiden Männer, die nach Bayern geschickt wurden, um den Führer zu töten, wurden gefangen genommen, da sie Hitler nicht einmal zu Gesicht bekamen. Offenbar wurden sie von einem Verwandten des deutschen Dorfbewohners verraten, der sie unterstützte. Deutsche Pressemeldungen zeigen, dass sie ihre Mission verstanden und die Sicherheitsvorkehrungen um Hitler erhöht haben – weitere Angriffe auf die Person des Führers sind nun ausgeschlossen."
 britain.45.a:0 "Es war immer ein Glücksspiel."
 
 britain.46.t:0 "Hitler ermordet!"
 britain.46.d:0 "Vor einigen Tagen wurde Adolf Hitler während seines Morgenspaziergangs auf dem Berghof in den bayerischen Alpen plötzlich von einem Scharfschützen angeschossen und sofort totgeschlagen. Kurz darauf wurden zwei britische Agenten festgenommen, einer wurde auf der Stelle getötet, der andere in Gewahrsam genommen. In Bayern ist eine groß angelegte Untersuchung aller deutschen Staatsgewalten eingeleitet worden, um jeden aufzuspüren, der auch nur im Entferntesten mit der Ermordung des Führers in Verbindung steht. Hermann Göring wurde gemäß Hitlers Willen zum neuen Führer ernannt und schwört, der Krieg werde weitergehen."
 britain.46.a:0 "Unglaublich!"
 
 britain.47.t:0 "Großbritannien fordert Besitztümer im Nordatlantik!"
 britain.47.d:0 "Großbritannien hat eine Forderung gestellt und darauf bestanden, dass die gegenwärtige Kriegssituation es erfordere, dass seine Marine die Kontrolle über unsere atlantischen Besitzungen, Island und die Färöer-Inseln übernimmt. Grönland wurde, aus welchen Gründen auch immer, verschont."
 britain.47.a:0 "Wir scheinen keine große Wahl zu haben ..."
 britain.47.b:0 "Unverschämt, absolut nicht!"
 
 britain.48.t:0 "Dänemark tritt bei!"
 britain.48.d:0 "Dänemark hat unsere Forderung akzeptiert, dass wir die Kontrolle über seine nordatlantischen Gebiete übernehmen."
 britain.48.a:0 "Exzellent!"
 
 britain.49.t:0 "Dänemark lehnt ab!"
 britain.49.d:0 "Dänemark hat unsere Forderung, die Kontrolle über seine nordatlantischen Gebiete zu übernehmen, dummerweise abgelehnt."
 britain.49.a:0 "Es scheint, dass dies auf die harte Tour getan werden muss, dann"
 
 britain.50.t:0 "Reinhard Heydrich erschossen!"
 britain.50.d:0 "Auf seinem täglichen Weg zur Arbeit wurde Reinhard Heydrich von tschechischen Attentätern, die von Großbritannien unterstützt wurden, mit Maschinengewehrfeuer und einer kleinen Bombe angegriffen. Obwohl er den ersten Angriff überlebte, erlag er nur wenige Tage später im Krankenhaus seinen Verletzungen. Auf der Suche nach den Tätern wurden zwei Dörfer dem Erdboden gleichgemacht. Sie wurden schließlich in einer Kirche in Prag aufgespürt, wo sie nach einem zweistündigen Feuergefecht Selbstmord beging."
 britain.50.a:0 "Jemand wird dafür bezahlen."
 
 britain.51.t:0 "Heydrich überlebt Attentat"
 britain.51.d:0 "Der Zustand von Reinhard Heydrich wurde von den Ärzten des Bulovka-Krankenhauses für stabil erklärt, eine Woche nach einem Attentat einer Gruppe schlecht vorbereiteter Attentäter, deren Waffen klemmten und die den Beschützer mit einer Bombe verletzen mussten."
 britain.51.a:0 "Dumme Tschechen, sie können nicht mal geradeaus schießen."
 
 britain.52.t:0 "Reinhard Heydrich in Prag getötet!"
 britain.52.d:0 "Auf seinem täglichen Weg zur Arbeit wurde Reinhard Heydrich von tschechischen Attentätern, die von Großbritannien unterstützt wurden, mit Maschinengewehrfeuer und einer kleinen Bombe angegriffen. Obwohl er den ersten Angriff überlebte, erlag er nur wenige Tage später im Krankenhaus seinen Verletzungen. Auf der Suche nach den Tätern wurden zwei Dörfer dem Erdboden gleichgemacht. Sie wurden schließlich in einer Kirche in Prag aufgespürt, wo sie nach einem zweistündigen Feuergefecht Selbstmord beging."
 britain.52.a:0 "Was für gefährliche Zeiten, in denen wir leben."
 
 britain.53.t:0 "Heydrich überlebt Attentat"
 britain.53.d:0 "Der Zustand von Reinhard Heydrich wurde von den Ärzten des Bulovka-Krankenhauses für stabil erklärt, eine Woche nach einem Attentat einer Gruppe schlecht vorbereiteter Attentäter, deren Waffen klemmten und die den Beschützer mit einer Bombe verletzen mussten."
 britain.53.a:0 "Es wäre einfach zu einfach gewesen."
 
 britain.54.t:0 "Großbritannien schlägt Frieden vor"
 britain.54.d:0 "Der britische Premierminister Lord Halifax, ein Befürworter der Beschwichtigungspolitik vor dem Krieg und stets eine vernünftige Stimme in der britischen Regierung, hat uns ein Friedensangebot unterbreitet, da er die Lage nach dem Fall Frankreichs endlich als das erkannt hat, was sie ist. Im Rahmen des Friedens, für den wir uns ursprünglich bereit erklärt hatten, darf Großbritannien sein Kolonialreich behalten und sich lediglich aus den Konflikten auf dem Kontinent zurückziehen."
 britain.54.a:0 "Endlich haben sie Vernunft eingesehen."
 britain.54.b:0 "Ich glaube nicht."
 
 britain.55.t:0 "Briten und Deutsche unterzeichnen Frieden!"
 britain.55.d:0 "Der britische Außenminister Anthony Eden und sein deutscher Amtskollege Joachim von Ribbentrop trafen sich heute im neutralen Lissabon, um einen Waffenstillstand zu unterzeichnen. Dieser ebnet den Weg für ein umfassendes Friedensabkommen, das Großbritannien aus dem Krieg in Europa zurückziehen und ihm den Erhalt aller seiner Besitztümer ermöglichen würde. Die französische, polnische und andere Exilregierungen äußerten ihre Bestürzung über diese Situation und werden voraussichtlich nach dem Waffenstillstand ihre Truppen von London nach Amerika zurückziehen."
 britain.55.a:0 "Europa ist auf sich allein gestellt."
 
 britain.56.t:0 "Die Deutschen lehnen unser Angebot ab!"
 britain.56.d:0 "Die Deutschen haben unser Friedensangebot mit der Begründung abgelehnt, es sei jetzt zu spät für eine Wiedergutmachung."
 britain.56.a:0 "Der Krieg wird sich also hinziehen."
 
 britain.57.t:0 "Die Briten fordern Nord-Malaya!"
 britain.57.d:0 "Die Briten haben gefordert, dass wir fast die gesamte westliche Hälfte unseres Landes, unseren Anteil an der nördlichen malaiischen Halbinsel, übergeben."
 britain.57.a:0 "Wir haben keine große Auswahl."
 britain.57.b:0 "Zur Hölle mit ihren Forderungen!"
 
 britain.58.t:0 "Siamesen übergeben Nord-Malaya"
 britain.58.d:0 "Die Siamesen haben Einsicht gezeigt und sind unseren Forderungen in Nord-Malaya nachgekommen."
 britain.58.a:0 "Exzellent."
 
 britain.59.t:0 "Freundliche britische Außenpolitik"
 britain.59.d:0 "Der britische Außenminister Anthony Eden hat heute eine neue außenpolitische Agenda vorgestellt, offenbar mit der Absicht, uns zu umwerben. Die Gespräche zwischen unseren und ihren Vertretern in Rom werden in Kürze beginnen."
 britain.59.a:0 "Exzellent."
 
 britain.60.t:0 "Italiener stellen afrikanische Forderungen"
 britain.60.d:0 "Die Italiener haben uns gegenüber ihre Interessen in Afrika vertreten und sind tatsächlich besser geführt, als wir zunächst erwartet hätten."
 britain.60.a:0 "Wenn ein paar abgelegene Kolonien ausreichen, dann ist das eben so."
 britain.60.b:0 "Was glauben die, wer sie sind? Absolut nicht!"
 
 britain.61.t:0 "Großbritannien kommt afrikanischen Forderungen nach"
 britain.61.d:0 "Die Briten, so freundlich sie auch sein mögen, haben sich bereit erklärt, unsere Interessen auf dem Schwarzen Kontinent zu unterstützen."
 britain.61.a:0 "Exzellent."
 
 britain.62.t:0 "Briten lehnen afrikanische Forderungen ab"
 britain.62.d:0 "Die Briten, besitzergreifend und gierig wie sie sind, haben unsere Forderungen abgelehnt."
 britain.62.a:0 "Diese Narren haben einen möglicherweise wichtigen Verbündeten verloren. Wir brauchen sie nicht."
 
 britain.63.t:0 "Italiener präsentieren Balkan-Agenda"
 britain.63.d:0 "Die Italiener haben ihre Interessen auf dem Balkan dargelegt. Dabei geht es ihnen vor allem um die Festigung der italienischen Kontrolle über die Adria. Im Mittelpunkt ihrer Forderungen steht Dalmatien, das ihnen im letzten Krieg versprochen, dann aber an Jugoslawien abgetreten wurde."
 britain.63.a:0 "Ein schmaler Streifen der jugoslawischen Küste? Das ist alles? Ganz einfach."
 britain.63.b:0 "Wir werden uns nicht an der Erpressung eines unbedeutenden Balkanstaates wegen seiner Küstenlinie beteiligen."
 
 britain.64.t:0 "Briten geben ihre Zustimmung"
 britain.64.d:0 "Wir haben gerade grünes Licht vom britischen Botschafter erhalten, nachdem er sich mit seiner Regierung in London beraten hatte. Die Briten werden uns in Bezug auf Jugoslawien unterstützen."
 britain.64.a:0 "Ausgezeichnet, jetzt ist es Zeit, sich zu bewegen."
 
 britain.65.t:0 "Die Briten lehnen unsere Agenda ab"
 britain.65.d:0 "Die Briten, neurotisch und besessen von ihrer Seeherrschaft, haben unsere Vorschläge hinsichtlich unserer Interessen in der Adria abgelehnt."
 britain.65.a:0 "Ist ihnen dieser Balkan-Speck wirklich so wertvoll?"
 
 britain.66.t:0 "Großbritannien und Italien stellen Forderungen"
 britain.66.d:0 "Unsere schlimmsten Befürchtungen haben sich bewahrheitet: Im Zuge der jüngsten Gespräche und der internationalen Annäherung wurden wir von britischen Diplomaten kontaktiert, die im Namen Italiens die Abtretung unserer Adriaküste fordern. Die Alternative, die bisher unerwähnt blieb, liegt auf der Hand."
 britain.66.a:0 "Entweder dies oder ein Krieg, den wir nicht gewinnen können."
 britain.66.b:0 "Es ist besser, stehend zu sterben, als als Sklaven zu leben."
 
 britain.67.t:0 "Jugoslawen stimmen zu!"
 britain.67.d:0 "Die Jugoslawen haben Einsicht gewonnen und den Interessen Italiens an der Adria zugestimmt, indem sie Dalmatien mit sofortiger Wirkung übergeben haben!"
 britain.67.a:0 "Exzellent!"
 
 britain.68.t:0 "Jugoslawen lehnen Forderungen ab"
 britain.68.d:0 "Die Jugoslawen, stolz und stur wie eh und je, haben unsere Forderungen abgelehnt. Sie haben sich für den Krieg entschieden."
 britain.68.a:0 "Ihr Patriotismus muss ihre Intelligenz überwiegen – lasst uns die Schlachtschiffe vorbereiten."
 
 britain.69.t:0 "Italien schließt sich den Alliierten an!"
 britain.69.d:0 "Nach den letzten Monaten der italienisch-britischen Zusammenarbeit und den gemeinsamen Bemühungen beider Länder, Frieden, Freundschaft und brüderliche Wärme in Europa zu bewahren, hat Italien nun den letzten Schritt getan und sich dem Bündnis mit Großbritannien angeschlossen – ein Echo der alten Entente, wie viele sagen, und das wiederum sehr zum Missfallen Deutschlands."
 britain.69.a:0 "Bravo!"
 
 britain.70.t:0 "Feindselige britische Außenpolitik"
 britain.70.d:0 "Der britische Außenminister Anthony Eden hat heute eine neue außenpolitische Agenda vorgestellt, die sich offenbar ausdrücklich gegen unsere imperialen Ambitionen richtet und die Verteidigung der Unabhängigkeit aller kleinen Mittelmeerstaaten vorsieht."
 britain.70.a:0 "Wir müssen diese Entwicklungen aufmerksam beobachten."
 
 britain.71.t:0 "Der Peking-Plan"
 britain.71.d:0 "Der Peking-Plan wurde Anfang 1939 ins Leben gerufen und sah für den Fall einer deutschen Invasion Polens vor, dass die deutsche Kriegsmarine, anstatt eine verlorene Schlacht in der Ostsee zu schlagen, nach Großbritannien zurückkehren und sich dort unseren Streitkräften anschließen sollte, um ihr Heimatland zurückzuerobern. Diejenigen, die es geschafft haben, das Schiff zu erreichen, sind nun im Londoner Hafen angekommen."
 britain.71.a:0 "Wir werden sie sinnvoll einsetzen."
 
 britain.72.t:0 "Großbritannien verstärkt den Fernen Osten"
 britain.72.d:0 "Nach mehreren Monaten der Befestigung und militärischen Entwicklung im Fernen Osten sind ein Dutzend neuer Divisionen aus dem gesamten Kaiserreich eingetroffen, um Hongkong, Singapur und Rangun zu besetzen. Das dürfte die japanischen Gemüter erhitzen."
 britain.72.a:0 "Ein interessanter Schritt."
 
 britain.73.t:0 "Italien schließt sich den Alliierten an"
 britain.73.d:0 "Nach den letzten Monaten der italienisch-britischen Zusammenarbeit und den gemeinsamen Bemühungen beider Länder, Frieden, Freundschaft und brüderliche Wärme in Europa zu bewahren, hat Italien nun den letzten Schritt getan und sich dem Bündnis mit Großbritannien angeschlossen – ein Echo der alten Entente, wie viele sagen, und das wiederum sehr zum Missfallen Deutschlands."
 britain.73.a:0 "Unerwartet."
 
 britain.74.t:0 "Balkanstaaten schließen sich den Alliierten an"
 britain.74.d:0 "In einem klaren Schritt gegen die kollektivistische Aggression im Mittelmeerraum und Osteuropa hat Großbritannien Jugoslawien und Griechenland in die Allianz aufgenommen, Monate nachdem in diesen Ländern umfangreiche Projekte zur Unterstützung der Befestigung und Aufrüstung durchgeführt worden waren."
 britain.74.a:0 "Wir tun, was wir müssen."
 britain.74.b:0 "Sie haben dort nichts zu suchen!"
 britain.74.c:0 "Was wird daraus?"

 britain.75.t:0 "Irland (Bestätigung von Vereinbarungen) Gesetz [GetYear]"
 britain.75.d:0 "Der englisch-irische Handelskrieg ist eine schmutzige Angelegenheit, die seit 1933 tobt. Auslöser war die Weigerung Irlands, die Landrenten aus Darlehen an irische Pächter zurückzuzahlen. Dieser Bruch des Vertrags von 1921 führte zum Abbruch der Beziehungen und in der Folge zu Handelsbeschränkungen beider Länder. In den letzten Monaten kam es jedoch zu einer Reihe von versöhnlichen Gesetzen, angefangen mit dem Kohle- und Viehpakt vor drei Jahren bis hin zum heutigen Vertrag, der den Konflikt formell beendet."
 britain.75.a:0 "Hurra!"
 
 britain.76.t:0 "Kaiserliche Konferenz [GetYear]"
 britain.76.d:0 "Die unregelmässige Imperial Conference, die zuletzt 1932 stattfand, wurde heute in London vertagt. Ausgelöst vor allem durch die Ereignisse auf dem Kontinent, standen die Themen Auswärtige Angelegenheiten und Verteidigung im Mittelpunkt. Dies führte zu einer Debatte über die Außenpolitik der Dominions im Verhältnis zur britischen Regierung, angesichts der starken Gefühle Neuseelands gegenüber der italienischen Invasion in Abessinien. Ein letztes und ziemlich wichtiges Thema ist die Imperial Federation – seit der Jahrhundertwende kursierten in vielen Kreisen Diskussionen über die Notwendigkeit einer Föderalisierung des Empire, um der wachsenden Unabhängigkeit der Dominions und dem angeblich unvermeidlichen Zusammenbruch des Empire als Weltmacht aufgrund der wachsenden Macht der Sowjetunion und der Vereinigten Staaten entgegenzuwirken, doch nun hat das Thema auch offizielle Aufmerksamkeit erlangt."
 britain.76.a:0 "Ein absurder Vorschlag, legen Sie ihn beiseite."
 britain.76.b:0 "Eine Föderation ist möglicherweise die einzige Möglichkeit, die Einheit des Imperiums aufrechtzuerhalten."

 britain.77.t:0 "Indien unterwirft sich der Föderation"
 britain.77.d:0 "Die indischen Abgeordneten haben sich nun voll und ganz für eine imperiale Föderation ausgesprochen und sind bereit, einer solchen Union beizutreten, wenn sie zustande kommt."
 britain.77.a:0 "Gott schütze den König!" 
 
 britain.78.t:0 "Kanada unterwirft sich der Föderation"
 britain.78.d:0 "Die kanadischen Abgeordneten haben sich nun voll und ganz für eine imperiale Föderation ausgesprochen und sind bereit, einer solchen Union beizutreten, wenn sie zustande kommt."
 britain.78.a:0 "Gott schütze den König!" 
 
 britain.79.t:0 "Australien unterwirft sich der Föderation"
 britain.79.d:0 "Die australischen Abgeordneten haben sich nun voll und ganz für eine imperiale Föderation ausgesprochen und sind bereit, einer solchen Union beizutreten, wenn sie zustande kommt."
 britain.79.a:0 "Gott schütze den König!" 
 
 britain.80.t:0 "Neuseeland unterwirft sich der Föderation"
 britain.80.d:0 "Die neuseeländischen Abgeordneten haben sich nun voll und ganz für eine imperiale Föderation ausgesprochen und sind bereit, einer solchen Union beizutreten, wenn sie zustande kommt."
 britain.80.a:0 "Gott schütze den König!" 
 
 britain.81.t:0 "Südafrika unterwirft sich der Föderation"
 britain.81.d:0 "Die südafrikanischen Vertreter haben sich nun voll und ganz für eine imperiale Föderation ausgesprochen und sind bereit, einer solchen Union beizutreten, wenn sie zustande kommt."
 britain.81.a:0 "Gott schütze den König!" 
 
 britain.82.t:0 "Unterzeichnung der Reichsverfassung"
 britain.82.d:0 "Nach Monaten zermürbender Verhandlungen, Hin und Her und Debatten haben Vertreter des gesamten Empires heute in Ottawa endlich die Verfassung der Imperial Federation unterzeichnet und damit ihr jahrelanges Ziel, das Britische Empire zu einem einzigen Superstaat zu vereinen und zu föderalisieren, in Kraft gesetzt. Viele Herausforderungen liegen vor uns, und viele Fragen sind noch ungeklärt, doch die Zukunft sieht rosig aus."
 britain.82.a:0 "Dies ist ein mutiger neuer Schritt nach vorn für das Empire, für Großbritannien und für die Welt."
 
 britain.83.t:0 "Mexiko verstaatlicht sein Öl!"
 britain.83.d:0 "Im März [GetYear] verkündete die mexikanische Regierung unter dem autoritären Präsidenten Lázaro Cárdenas die Verstaatlichung der Ölressourcen des Landes und kaufte Anlagen ausländischer Ölkonzerne auf, darunter auch unsere Mexican Eagle Petroleum Company, eine Tochtergesellschaft von Royal Dutch Shell. Da die Mexican Eagle Petroleum Company in Mexiko gegründet wurde, können wir nach mexikanischem Recht nicht direkt eingreifen. Verhandlungen führten jedoch immerhin zur Rückzahlung einiger Schulden aus der mexikanischen Revolution."
 britain.83.a:0 "Was glauben sie, wer sie sind?"  
 
 britain.84.t:0 "Irische Verfassung von [GetYear]"
 britain.84.d:0 "Irland hat eine neue Verfassung verabschiedet, die den alten Namen „Irischer Freistaat“ zugunsten von Irland abschafft. Das britische Commonwealth, zu dem Irland formal immer noch ein Dominion ist, wird in dieser Verfassung nicht erwähnt. Manche Leser empfinden die Verfassung in Bezug auf Nordirland als ausgesprochen territorial. Die britische Regierung hat ein klarstellendes Kommuniqué verschickt, in dem sie die Stellung Nordirlands als Teil des Vereinigten Königreichs bekräftigt."
 britain.84.a:0 "Besorgniserregend."  
 
 britain.85.t:0 "José Luis Díez-Vorfall"
 britain.85.d:0 "Ein republikanisch-spanischer Zerstörer, die José Luis Díez, die zuvor zum Transport von Flüchtlingen eingesetzt wurde, wurde in der Straße von Gibraltar gefangen, als sie sich als britische HMS Grenville ausgab und unter diesem Deckmantel nationalistische Schiffe angriff. Die britische Marine entdeckte das Schiff und zwang es zur Anlandung. Die republikanisch gesinnte Arbeiterklasse Gibraltars reparierte das Schiff heimlich und schickte es erneut hinaus, um ihre List zu wiederholen. Doch der Angriff währte nicht lange, denn das Schiff wurde erneut gefangen genommen, gezielt auf den Strand gesetzt und die Besatzung zu den spanischen Republikanern repatriiert."
 britain.85.a:0 "Was für eine dumme Angelegenheit."  
 
 britain.86.t:0 "Trennung Burmas vom Raj"
 britain.86.d:0 "Die Provinz Burma hat unter der Verwaltung des Raj seit den 1850er Jahren floriert, doch die Burmesen wurden zunehmend unruhig und forderten lautstark Selbstverwaltung und die Abspaltung vom Raj, wobei sie weiterhin britische Untertanen waren."
 britain.86.a:0 "Dies scheint der richtige Zeitpunkt zu sein."  
 britain.86.b:0 "Warten wir vorerst."
 
 britain.87.t:0 "Sicherung des Iran"
 britain.87.d:0 "Der Schah von Persien hat schon zu lange Agenten unserer Feinde umworben. Es ist an der Zeit, sicherzustellen, dass sich der faschistische Einfluss in der Region nicht weiter ausbreitet und unsere Sicherheit im Nahen Osten gefährdet. Nach der Sicherung des Iran wird zudem eine neue Route für wichtige Güter aus dem Leih- und Pachtgesetz in die Sowjetunion eröffnet. Wir müssen prüfen, ob es in unserem Interesse ist, die Sowjets in diese Operation einzubeziehen, und ob sie bereit sind, uns zu unterstützen, wenn wir uns für eine Zusammenarbeit mit ihnen entscheiden. Die Besatzungszonen werden im Voraus festgelegt."
 britain.87.a:0 "Legen Sie den Sowjets umfassende Operationspläne vor."
 britain.87.a.tt:0 "Iran wird vollständig besetzt. Der Norden und Westen des Landes, einschließlich des Hafens von Chuzestan, werden den Sowjets übergeben, wodurch ein Korridor für die Sicherung von Rohstoffen im Rahmen des Leih- und Pachtgesetzes entsteht. Die Ölproduktion in Chuzestan und dem Rest des Landes wird unter unsere Kontrolle fallen. Nach Abschluss dieser Operation wird mit starkem Widerstand im ganzen Land gerechnet. Die Besetzung soll nach Abklingen der Feindseligkeiten beendet werden. Alle wirtschaftlichen Interessen, die uns zuvor entzogen wurden (z. B. Rohstoffrechte), werden nach Beendigung der Besetzung wiederhergestellt. (Ahistorisches Szenario)"
 britain.87.b:0 "Legen Sie den Sowjets wichtige Operationspläne vor."
 britain.87.b.tt:0 "Iran wird teilweise besetzt. Der Norden und Westen des Landes, einschließlich des Hafens von Chuzestan, werden den Sowjets übergeben, wodurch ein Korridor für die Beschaffung von Rohstoffen aus dem Leih- und Pachtgesetz entsteht. Die Ölproduktion in Chuzestan fällt unter unsere Kontrolle. Die Region Fars wird von uns direkt besetzt. Der Widerstand wird nach Abschluss der Operation nicht so drastisch sein wie bei einer vollständigen Besetzung des Landes. Die Besetzung wird von allen Parteien nach Abklingen der Feindseligkeiten beendet. Alle wirtschaftlichen Interessen, die uns zuvor entzogen wurden (z. B. Rohstoffrechte), werden nach erfolgreichem Abschluss der Operation sofort wiederhergestellt. (Historisches Szenario)"
 britain.87.c:0 "Führen Sie die Operation selbst durch."
 britain.87.c.tt:0 "§Das derzeitige Regime Irans wird gewaltsam durch ein deutlich kooperativeres Regime ersetzt, um unsere Interessen in der Region zu sichern. Wir werden das Land nicht direkt besetzen. Alle wirtschaftlichen Interessen, die uns zuvor dort genommen wurden (wie z. B. Ressourcenrechte), werden wiederhergestellt.§! §O (Ahistorisches Szenario)§!"
 
 britain.88.t:0 "Intervention im Iran"
 britain.88.d:0 "Der Schah von Iran hat schon zu lange Agenten unserer Feinde umworben. Es ist an der Zeit, sicherzustellen, dass sich der kollektivistische Einfluss in der Region nicht weiter ausbreitet und unsere Sicherheit im Nahen Osten gefährdet. Dies würde eine neue Front im Nahen Osten gegen unsere Feinde eröffnen und eine größere Pufferzone für die iranische Regierung schaffen."
 britain.88.a:0 "Beginnen Sie mit dem Betrieb."
 
 britain.89.t:0 "Kooperative Besetzung im Iran"
 britain.89.d:0 "Die Sowjets haben sich bereit erklärt, an der Operation teilzunehmen."
 britain.89.a:0 "Hoffen wir auf eine kurze Operation."
 
 britain.892.t:0 "Kooperative Besetzung im Iran"
 britain.892.d:0 "Die Sowjets haben sich bereit erklärt, an der Operation teilzunehmen."
 britain.892.a:0 "Hoffen wir auf eine kurze Operation."
 
 britain.90.t:0 "Die Sowjets lehnen eine kooperative Intervention ab"
 britain.90.d:0 "Die Sowjets haben sich geweigert, an der Operation teilzunehmen."
 britain.90.a:0 "Vielleicht ist es das Beste."
 
 britain.91.t:0 "Britischer Vorschlag für eine Intervention im Iran"
 britain.91.d:0 "Die Briten haben uns vorgeschlagen, im Rahmen der „Operation Countenance“ gegen den Iran vorzugehen und ihn für den Rest des Krieges vollständig zu besetzen. Sie wollen den Iran sichern, um das Leih- und Pachtgesetz mit der Sowjetunion zu erleichtern. Ihre weiteren Motive sind unklar; die Sicherung der iranischen Ölfelder scheint jedoch offensichtlich genug, um ihre Invasion teilweise zu rechtfertigen. Dies wird uns jedoch sicherlich ermöglichen, unser strategisches Ziel, einen Marinestützpunkt in warmen Gewässern zu errichten, zu erreichen. Sie haben uns mitgeteilt, dass sie die Operation starten werden, sobald beide Parteien bereit sind. Wie sollen wir reagieren?"
 britain.91.a:0 "Kommen wir ihnen entgegen."
 britain.91.a.tt:0 "§Iran wird gleichmäßig aufgeteilt, wobei der Norden und Westen von uns und der Süden von den Briten besetzt werden. Der Hafen am Persischen Golf in Chuzestan fällt unter unsere Kontrolle und Teheran unter britische. Das bedeutet auch, dass der Iran nach Abschluss der Operation nicht mehr von uns als Marionette benutzt werden kann. Die Ölproduktion in Chuzestan fällt unter britische Kontrolle.§! \n§RIchtig:§! Von uns wird erwartet, dass wir uns nach dem Krieg aus unserer Besatzung zurückziehen. Andernfalls werden wir die Alliierten verärgern."
 britain.91.b:0 "Daran haben wir kein Interesse."
 
 britain.912.t:0 "Britischer Vorschlag für eine Intervention im Iran"
 britain.912.d:0 "Die Briten haben uns vorgeschlagen, im Rahmen der „Operation Countenance“ für den Rest des Krieges gegen den Iran vorzugehen und ihn teilweise zu besetzen. Sie wollen den Iran sichern, um das Leih- und Pachtgesetz mit der Sowjetunion zu erleichtern. Ihre weiteren Motive sind unklar; die Sicherung der iranischen Ölfelder scheint jedoch offensichtlich genug, um ihre Invasion teilweise zu rechtfertigen. Dies wird uns jedoch sicherlich ermöglichen, unser strategisches Ziel, einen Marinestützpunkt in warmen Gewässern zu errichten, zu erreichen. Sie haben uns mitgeteilt, dass sie die Operation starten werden, sobald beide Parteien bereit sind. Wie sollen wir reagieren?"
 britain.912.a:0 "Kommen wir ihnen entgegen."
 britain.912.a.tt:0 "Iran wird in zwei Teile aufgeteilt: Nord- und Westiran werden von uns besetzt, Fars von den Briten. Der Golfhafen Chuzestan fällt unter unsere Kontrolle. Der Rest des Iran wird von einem befreundeten Regime verwaltet. Das bedeutet auch, dass der Iran nach Abschluss der Operation nicht mehr von uns als Marionette benutzt werden kann. Die Ölproduktion in Chuzestan fällt unter britische Kontrolle. §! §C(Historisches Szenario)§! \n§RIchtig:§! Von uns wird erwartet, dass wir uns nach dem Krieg aus unserer Besatzung zurückziehen. Andernfalls werden wir die Alliierten verärgern."
 britain.912.b:0 "Daran haben wir kein Interesse."
 
 britain.92.t:0 "Operation Countenance eingeleitet"
 britain.92.d:0 "Unsere Verbündeten sind vor Ort. Operation Countenance hat begonnen. Hoffentlich sind unsere Streitkräfte bereit, die Aufgabe zu erfüllen."
 britain.92.a:0 "Bringen wir es hinter uns."
 
 britain.93.t:0 "Operation „Countenance“ abgeschlossen"
 britain.93.d:0 "Irans Streitkräfte wurden entweder geschlagen oder haben sich gewaltsam zurückgezogen. Der Regierung des Schahs wurde ein Fluchtweg verwehrt und sie wurde unter Beobachtung gestellt. Die Zeit wird zeigen, ob er seine Haltung ändert und die Alliierten unterstützt. Eine provisorische Regierung wird unter der Führung seines Sohnes Mohammad Reza Pahlavi eingesetzt, der einzigen derzeit in der Lage ist, diese Rolle auszufüllen. Wie vereinbart werden derzeit Besatzungszonen eingerichtet."
 britain.93.a:0 "Hoffen wir, dass sich das auszahlt."
 
 britain.932.t:0 "Operation „Countenance“ abgeschlossen"
 britain.932.d:0 "Irans Streitkräfte wurden entweder geschlagen oder haben sich gewaltsam zurückgezogen. Der Regierung des Schahs wurde ein Fluchtweg verwehrt und sie wurde unter Beobachtung gestellt. Die Zeit wird zeigen, ob er seine Haltung ändert und die Alliierten unterstützt. Eine provisorische Regierung wird unter der Führung seines Sohnes Mohammad Reza Pahlavi eingesetzt, der einzigen derzeit in der Lage ist, diese Rolle auszufüllen. Wie vereinbart werden derzeit Besatzungszonen eingerichtet."
 britain.932.a:0 "Hoffen wir, dass sich das auszahlt."
 
 britain.94.t:0 "Iranische Intervention erfolgreich"
 britain.94.d:0 "Die iranischen Streitkräfte wurden entweder geschlagen oder haben sich gewaltsam zurückgezogen. Der Regierung des Schahs wurde ein Fluchtweg verwehrt und sie wurde unter Beobachtung gestellt. Die Zeit wird zeigen, ob er seine Haltung ändert und die Alliierten unterstützt. Eine provisorische Regierung wird unter der Führung seines Sohnes Mohammad Reza Pahlavi eingesetzt, der einzigen derzeit in der Lage ist, diese Rolle auszufüllen. Diese Regelung wird so lange wie nötig bestehen bleiben."
 britain.94.a:0 "Hoffen wir, dass sich das auszahlt."
 
 britain.95.t:0 "Einladung zum Beitritt zu den Alliierten"
 britain.95.d:0 "Großbritannien hat uns eingeladen, unser altes Bündnis wiederzubeleben und uns den Alliierten anzuschließen. Wie werden wir darauf reagieren?"
 britain.95.a:0 "Nehmen wir ihre Einladung an."
 britain.95.b:0 "Jetzt ist nicht der richtige Zeitpunkt."
 
 britain.96.t:0 "Einladung zum Beitritt zu den Alliierten"
 britain.96.d:0 "Die britische Regierung hat uns eingeladen, uns den Alliierten anzuschließen. An unseren Grenzen scheint sich Krieg zusammenzubrauen. Wie sollen wir reagieren?"
 britain.96.a:0 "Nehmen wir ihre Einladung an."
 britain.96.b:0 "Jetzt ist nicht der richtige Zeitpunkt."
 
 britain.97.t:0 "Griechenland akzeptiert"
 britain.97.d:0 "Die Griechen haben unsere Einladung angenommen, sich uns anzuschließen."
 britain.97.a:0 "Kümmern wir uns um ihre Verteidigung."
 
 britain.98.t:0 "Jugoslawien akzeptiert"
 britain.98.d:0 "Die Yoguslavs haben unsere Einladung angenommen, sich uns anzuschließen."
 britain.98.a:0 "Kümmern wir uns um ihre Verteidigung."
 
 britain.99.t:0 "Griechenland lehnt ab"
 britain.99.d:0 "Die griechische Regierung hat unser Angebot, sich uns anzuschließen, abgelehnt. Sie ist der Ansicht, dass ihre Sicherheit durch die Entscheidung für Neutralität gewahrt werden könne."
 britain.99.a:0 "Sie werden es sich irgendwann noch einmal überlegen ..."
 
 britain.100.t:0 "Jugoslawien weigert sich"
 britain.100.d:0 "Die jugoslawische Regierung hat unser Angebot, sich uns anzuschließen, abgelehnt. Sie ist der Ansicht, dass ihre Sicherheit durch die Entscheidung für Neutralität gewahrt werden könne."
 britain.100.a:0 "Unsere Feinde werden sie stattdessen überzeugen."
 
 britain.101.t:0 "Griechenland schließt sich den Verbündeten an"
 britain.101.d:0 "In einem klaren Schritt gegen die kollektivistische Aggression im Mittelmeerraum und Osteuropa hat Großbritannien Griechenland in die Allianz aufgenommen, Monate nachdem dort umfangreiche Projekte zur Befestigung und Aufrüstung des Landes durchgeführt wurden."
 britain.101.a:0 "Wir tun, was wir müssen."
 britain.101.b:0 "Sie haben dort nichts zu suchen!"
 britain.101.c:0 "Was wird daraus?"
 
 britain.102.t:0 "Jugoslawien schließt sich den Alliierten an"
 britain.102.d:0 "In einem klaren Schritt gegen die kollektivistische Aggression im Mittelmeerraum und Osteuropa hat Großbritannien Jugoslawien in die Allianz aufgenommen, Monate nachdem umfangreiche Projekte zur Unterstützung der Befestigung und Aufrüstung des Landes durchgeführt worden waren."
 britain.102.a:0 "Wir tun, was wir müssen."
 britain.102.b:0 "Sie haben dort nichts zu suchen!"
 britain.102.c:0 "Was wird daraus?"
 
 britain.103.t:0 "Iran unter Beschuss! Operation Countenance läuft."
 britain.103.d:0 "Das britische Oberkommando hat zusammen mit [SOV.GetName] aufgrund der jüngsten geopolitischen Verschiebungen in Europa, insbesondere in Osteuropa, operative Pläne für eine groß angelegte Invasion des Iran entwickelt und umgesetzt. Die Motive für die Operation wurden von keiner der beiden Regierungen direkt dargelegt. Viele Experten spekulieren jedoch, dass damit den politischen und wirtschaftlichen Bemühungen Deutschlands und seiner Verbündeten in der Region entgegengewirkt und ein weiterer Logistikkorridor mit dem zusätzlichen Vorteil einer sicheren Grenze für beide Invasionsmächte geschaffen werden soll. Es bestehen Zweifel daran, dass die Ölreserven bei diesen Überlegungen von hoher strategischer Bedeutung waren. Über eine längere Besetzung gehen die Meinungen auseinander."
 britain.103.a:0 "Der Nahe Osten steht erneut in Flammen."
 britain.103.b:0 "Der Iran sollte sich ergeben …"
 britain.103.c:0 "Schade, dass wir es nicht vorher gesichert haben."
 
 britain.104.t:0 "Intervention im Irak"
 britain.104.d:0 "Die irakischen Streitkräfte wurden entweder in die Flucht geschlagen oder haben sich gewaltsam zurückgezogen. Der irakischen Regierung wurde ein Fluchtweg verwehrt und sie wurde unter Beobachtung gestellt. Die Zeit wird zeigen, ob sie ihre Haltung ändern und die alliierte Sache unterstützen wird. Unsere Streitkräfte besetzen das Land nun so lange wie nötig."
 britain.104.a:0 "Hoffen wir, dass sich der Aufwand gelohnt hat."
 
 britain.105.t:0 "Siam lehnt unsere Forderungen ab"
 britain.105.d:0 "Die siamesische Regierung hat unsere Forderung nach einer Besetzung Nord-Malayas abgelehnt."
 britain.105.a:0 "Ein weiterer potenzieller Feind ist es möglicherweise nicht wert."
 britain.105.b:0 "Vielleicht lässt sich mit Gewalt etwas erreichen."
 
 britain.106.t:0 "Forderungen des faschistischen Großbritanniens"
 britain.106.d:0 "Die angeblich legitime britische Regierung hat uns ein Ultimatum gestellt. Sie will den größten Teil unseres verbleibenden Territoriums annektieren. Wie sollen wir reagieren?"
 britain.106.a:0 "Wir haben keine Wahl mehr."
 britain.106.b:0 "Vivre la France libre!"
 
 britain.107.t:0 "Frankreich beugt sich den britischen Forderungen"
 britain.107.d:0 "Die französische Exilregierung hat sich unseren Forderungen nur zögerlich unterworfen."
 britain.107.a:0 "Unsere Hegemonie wird stärker!"
 
 britain.108.t:0 "Frankreich lehnt britische Forderungen ab"
 britain.108.d:0 "Die französische Exilregierung hat unser Ultimatum abgelehnt. Wie sollen wir weiter vorgehen?"
 britain.108.a:0 "Bereiten Sie militärische Operationen vor."
 britain.108.b:0 "Wir werden dieses Thema zu einem späteren Zeitpunkt erneut aufgreifen."
 
 britain.109.t:0 "Forderungen des faschistischen Großbritanniens"
 britain.109.d:0 "Die angeblich legitime britische Regierung hat uns ein Ultimatum gestellt. Sie will den größten Teil unseres verbleibenden Territoriums annektieren. Wie sollen wir reagieren?"
 britain.109.a:0 "Wir haben keine Wahl mehr."
 britain.109.b:0 "Wir müssen der Tyrannei trotzen!"
 
 britain.110.t:0 "Belgien beugt sich den britischen Forderungen"
 britain.110.d:0 "Die belgische Exilregierung hat sich unseren Forderungen widerwillig gebeugt."
 britain.110.a:0 "Unsere Herrschaft wird unbestreitbar sein."
 
 britain.111.t:0 "Belgien lehnt britische Forderungen ab"
 britain.111.d:0 "Die belgische Exilregierung hat unser Ultimatum abgelehnt. Wie sollen wir weiter vorgehen?"
 britain.111.a:0 "Bereiten Sie sofort eine weitere Operation vor."
 britain.111.b:0 "Wir werden später auf dieses Problem zurückkommen."
 
 britain.112.t:0 "Einladung zum Beitritt zu Großbritannien"
 britain.112.d:0 "Die britische Regierung hat uns eingeladen, ihrem Bündnis beizutreten. Wie sollten wir reagieren?"
 britain.112.a:0 "Dies liegt in unserem besten Interesse."
 britain.112.b:0 "Jetzt ist nicht der richtige Zeitpunkt."

 britain.113.t:0 "Spanien akzeptiert Bündniskooperation"
 britain.113.d:0 "Die Spanier haben sich bereit erklärt, unserem Militärbündnis beizutreten. Die Zusammenarbeit soll sofort beginnen."
 britain.113.a:0 "Für die Sache der Arbeiter!"
 
 britain.114.t:0 "Spanien lehnt Bündniskooperation ab"
 britain.114.d:0 "Die Spanier haben es abgelehnt, unserem Militärbündnis beizutreten. Weitere relevante Informationen wurden nicht gegeben. Über die Gründe dafür können wir nur spekulieren."
 britain.114.a:0 "Irgendwann werden sie es sich noch einmal überlegen ..."
 
 britain.115.t:0 "Kommunistische Zusammenarbeit"
 britain.115.d:0 "Die derzeitige britische Regierung, die das ehemalige Britische Empire vertritt, hat den Vorschlag unterbreitet, der Komintern beizutreten und militärische Kooperationen einzugehen. Angesichts der Tatsache, dass „Sozialismus in einem Land“ seit einiger Zeit unsere aktuelle Agenda ist, müssen wir mit dieser neuen Entwicklung vorsichtig umgehen. Wie sollten wir reagieren?"
 britain.115.a:0 "Es wird nur ein Mittel zum Zweck sein."
 britain.115.b:0 "Sozialismus darf es immer nur in einem Land geben!"
 
 britain.116.t:0 "Erweiterung der 4. Kommunistischen Internationale"
 britain.116.d:0 "Die derzeitige britische Regierung, die das ehemalige Britische Empire vertritt, hat den Vorschlag unterbreitet, der Komintern beizutreten und eine militärische Zusammenarbeit zu beginnen. Solche Gelegenheiten zum Wachstum der Kommunistischen Internationale werden wohl selten sein, aber sie dienen unserer aktuellen Agenda. Wie sollten wir darauf reagieren?"
 britain.116.a:0 "Der internationale Sozialismus wird Wirklichkeit!"
 britain.116.b:0 "Wir können den Briten nicht vertrauen."
 
 britain.117.t:0 "Die Sowjetunion akzeptiert den Vorschlag"
 britain.117.d:0 "Die gegenwärtige Führung der Sowjetunion hat uns den Beitritt zur Komintern gestattet. Unsere Zusammenarbeit soll sofort beginnen."
 britain.117.a:0 "Die Hoffnung für die Arbeiter der Welt wächst!"
 
 britain.118.t:0 "Die Sowjetunion lehnt unsere Anfrage ab"
 britain.118.d:0 "Die derzeitige Führung der Sowjetunion hat uns den Beitritt zur Komintern verweigert. Unsere Bemühungen, unabhängig zu handeln, müssen vorerst fortgesetzt werden."
 britain.118.a:0 "Vielleicht werden sie ihren Verlust mit der Zeit erkennen."
 
 britain.119.t:0 "Faschistische Zusammenarbeit"
 britain.119.d:0 "Unsere nationalistischen Brüder in Großbritannien haben uns einen Vorschlag unterbreitet. Sie streben eine militärische Zusammenarbeit mit uns an, um unsere Positionen jenseits unserer Grenzen gegenseitig zu sichern. Wir müssen unsere vergangene und aktuelle wirtschaftliche und politische Situation mit unserem alten Rivalen sowie dessen strategische Positionierung berücksichtigen, die wir möglicherweise nutzen können. Wie sollten wir reagieren?"
 britain.119.a:0 "Sie könnten sich als wertvoller Verbündeter erweisen."
 britain.119.b:0 "Wir sind besser dran, wenn wir die Kontrolle über ihr Land direkt übernehmen."
 
 britain.120.t:0 "Die Nazi-Führung akzeptiert unseren Vorschlag"
 britain.120.d:0 "Die Führung der Nationalsozialistischen Partei hat unseren Vorschlag geprüft und ist zu dem Schluss gekommen, dass eine Zusammenarbeit unserer beiden großen Länder vorerst von beiderseitigem Nutzen ist. Die Zusammenarbeit soll sofort beginnen und mit Feierlichkeiten verbunden sein."
 britain.120.a:0 "Ein Toast auf unsere Nazi-Freunde!"
 
 britain.121.t:0 "Die Nazi-Führung lehnt unsere Überlegungen ab"
 britain.121.d:0 "Die Nazi-Führung reagierte auf unseren Vorschlag unverblümt und teilte uns heute mit, dass sie unseren Vorschlag zur Zusammenarbeit zwischen Großbritannien und Deutschland mit der Begründung „Sicherheitsbedenken“ abgelehnt habe. Wir haben unsere militärische Beratung kurzfristig in Bereitschaft."
 britain.121.a:0 "Lassen Sie sie es wagen, uns herauszufordern!"
 
 britain.122.t:0 "Joseph Lyons ist verstorben"
 britain.122.d:0 "Am 5. April 1939 erlitt Lyons während der Fahrt von Melbourne nach Sydney einen Herzinfarkt. Dies geschah kurz nachdem er in Goulburn Halt gemacht hatte, um seinen Sohn Kevin für die Osterferien vom St. Patrick&#39;s College abzuholen. Lyons wurde in kritischem Zustand ins St. Vincent&#39;s Hospital in Darlinghurst eingeliefert. Am nächsten Tag konnte er nicht mehr sprechen und verlor immer wieder das Bewusstsein. Bald darauf fiel er ins Koma und starb am Morgen des 7. April, einem Karfreitag. Lyons&#39; Leichnam wurde bis zum 10. April (Ostermontag) in der St. Mary&#39;s Cathedral aufgebahrt. Am folgenden Tag fand ein Requiem statt, anschließend zog eine Prozession mit seinem Sarg von der Kathedrale zum Circular Quay. Lyons&#39; Leichnam wurde an Bord der HMAS Vendetta in seine Heimatstadt Devonport überführt. Seine Beerdigung fand am 13. April in der Kirche Unserer Lieben Frau von Lourdes statt, und er wurde auf dem Kirchengelände beigesetzt."
 britain.122.a:0 "Australien muss weitermachen."
 
 britain.123.t:0 "Schattenschema-Fabriken in Betrieb genommen"
 britain.123.d:0 "Die sorgfältigen Vorbereitungen, die wir im Rahmen des Schattenprogramms getroffen haben, um den Übergang unserer zivilen Fabriken zur Kriegsindustrie zu erleichtern, haben sich nun ausgezahlt. Die neuen Fabriken sind bereits deutlich effizienter, als man in diesem Zeitrahmen vernünftigerweise hätte erwarten können."
 britain.123.a:0 "Was für eine glückliche Voraussicht wir hatten!"
 
 britain.124.t:0 "Umsetzung der königlichen Wirtschaftsreform"
 britain.124.d:0 "König Edward VIII. hat eine Reihe von Wirtschaftsreformen eingeleitet, um die Ordnung wiederherzustellen und die wahrgenommene Korruption durch Markt- und Finanzinteressen zu bekämpfen. Um dieses Ziel zu erreichen, verfolgt er verschiedene Wege. Oswald Moseley wurde zum Regenten ernannt, um das neu gegründete Büro zu beaufsichtigen, das mit der Verwaltung dieser Initiativen beauftragt ist."
 britain.124.a:0 "Erlassen Sie neue Gesetze für den Bankensektor."
 britain.124.b:0 "Erlassen Sie neue Gesetze für den Industriesektor."
 
 britain.125.t:0 "Irak kündigt Rote-Linie-Abkommen"
 britain.125.d:0 "Der Irak hat sich politisch so manövriert, dass er das vor einiger Zeit zwischen ihm und den Westmächten geschlossene Rote-Linie-Abkommen einseitig aufkündigt. Der Irak erklärt, er handle im nationalen Eigeninteresse."
 britain.125.a:0 "Diese verdammten Schweine!"
 
 britain.126.t:0 "Persien vertreibt die Anglo-Iranian Oil Company"
 britain.126.d:0 "Der Iran, früher Persien, ist einseitig zu dem Schluss gekommen, dass die Wirtschaftsaktivitäten der Anglo-Iranian Oil Company seinen nationalen Interessen gänzlich schaden. Als Hauptgrund für seine Entscheidung nannte er „unlautere Geschäftspraktiken“. Jede Zurückweisung durch Großbritannien werde auf entschiedene Entschlossenheit und heftigen Widerstand stoßen."
 britain.126.a:0 "Fordern sie den Krieg?"
 
 britain.127.t:0 "Operation Undenkbar"
 britain.127.d:0 "Großbritannien hat einen Plan mit dem Titel „Operation Unthinkable“ ausgearbeitet, um die Ausbreitung des Kommunismus in Europa und weltweit zu stoppen. Großbritannien ist sich der damit verbundenen Risiken bewusst und erkennt die Notwendigkeit an, die Kriegsaktivitäten aufgrund der Kriegsmüdigkeit einzustellen. Sollten wir den Vorschlag annehmen, droht uns ein weiterer Weltkrieg. Stalin wird zweifellos verärgert sein und einen harten Überlebenskampf führen. Eine gründliche Betrachtung unserer aktuellen Situation ist dringend angeraten. Wie sollen wir reagieren?"
 britain.127.a:0 "Das Risiko ist es wert, eingegangen zu werden."
 britain.127.b:0 "Es gibt einen Grund, warum es undenkbar ist ..."
 
 britain.128.t:0 "Die Vereinigten Staaten von Amerika stimmen zu"
 britain.128.d:0 "Die Amerikaner haben sich bereit erklärt, mit den Vorbereitungen für die Operation zu beginnen. Der Generalstab der US-Verteidigung wurde informiert und erteilt den Befehl zur Remobilisierung. Geheimdienstberichte deuten auf einen unmittelbar bevorstehenden sowjetischen Vergeltungsschlag hin und raten zur Vorsicht."
 britain.128.a:0 "Mögen unsere Kinder uns vergeben."
 
 britain.129.t:0 "Die Vereinigten Staaten von Amerika weigern sich"
 britain.129.d:0 "Die Amerikaner haben sich entschieden, diesen Vorschlag nicht umzusetzen. Sie argumentieren, dass die Welt demobilisiert und neu aufgebaut werden müsse, da die Risiken zu groß seien, um einen Angriffskrieg zu rechtfertigen. Auch die sowjetische Geheimdienst- und Militärstrategiepositionierung werde als zu kontraproduktiv erachtet, als dass die Alliierten eine erfolgreiche Invasion durchführen könnten, wie dies auch bei der Invasion der Achsenmächte der Fall war."
 britain.129.a:0 "Vielleicht werden sich am Ende doch kühlere Köpfe durchsetzen."
 
 britain.130.t:0 "Auslandsentwicklungsprogramm abgeschlossen"
 britain.130.d:0 "Da die jüngsten Entwicklungsprojekte im Ausland bald abgeschlossen sind und die Haushaltsdefizite ausgeglichen sind, könnten wir unseren finanzpolitischen Schwerpunkt auf andere Bereiche verlagern."
 britain.130.a:0 "Wir sind besser auf zukünftige Unternehmungen vorbereitet."
 
 britain.131.t:0 "Nachkriegserfüllungen" 
 britain.131.d:0 "Wie dem iranischen Volk versprochen und mit der iranischen Regierung vereinbart, werden die Alliierten ihre vollständige Besatzung beenden und sich zu gegebener Zeit aus den iranischen Gebieten zurückziehen. Von der Sowjetunion wird dasselbe erwartet."
 britain.131.a:0 "Eine Vereinbarung ist eine Vereinbarung."
 
 britain.132.t:0 "Nachkriegserfüllungen"
 britain.132.d:0 "Wie dem iranischen Volk versprochen und mit der iranischen Regierung vereinbart, werden die Alliierten ihre teilweise Besetzung beenden und sich zu gegebener Zeit aus den iranischen Gebieten zurückziehen. Von der Sowjetunion wird dasselbe erwartet."
 britain.132.a:0 "Eine Vereinbarung ist eine Vereinbarung."
 
 britain.133.t:0 "Besetzung des Iran"
 britain.133.d:0 "Wie dem iranischen Volk versprochen und mit der iranischen Regierung vereinbart, werden die Alliierten ihre teilweise Besetzung beenden und sich zu gegebener Zeit aus den iranischen Gebieten zurückziehen. Von der Sowjetunion wird dasselbe erwartet."
 britain.133.a:0 "Wir beginnen mit der Auszahlung"
 
 britain.134.t:0 "Besetzung des Iran"
 britain.134.d:0 "Wie dem iranischen Volk versprochen und mit der iranischen Regierung vereinbart, werden die Alliierten ihre teilweise Besetzung beenden und sich zu gegebener Zeit aus den iranischen Gebieten zurückziehen. Von der Sowjetunion wird dasselbe erwartet."
 britain.134.a:0 "Wir beginnen mit den Abhebungen"
 britain.134.b:0 "Lass uns jetzt warten"
 
 britain.135.t:0 "[SOV.GetName] weigert sich, sich zurückzuziehen"
 britain.135.d:0 "Offenbar weigert sich [SOV.GetName], seine Truppen aus dem Iran abzuziehen, und setzt die Besetzung der von ihm besetzten Gebiete mit der Begründung „Sicherheitsbedenken“ fort. Die Führung hat keinen Zeitplan für einen geplanten Abzug genannt, und ihre Absichten bleiben unklar."
 britain.135.a:0 "Das werden wir sehen ..."
 
 britain.136.t:0 "[SOV.GetName] Auszahlung"
 britain.136.d:0 "Die [SOV.GetName] haben sich endgültig entschieden, ihre Truppen aus dem Iran abzuziehen und ihre Besatzung dort zu beenden. Die gegen die [SOV.GetName] ergriffenen wirtschaftlichen Maßnahmen werden zu gegebener Zeit rückgängig gemacht, und die zwischenstaatliche Koordinierung, gemeinsam mit den neu gegründeten Vereinten Nationen, wird bald beginnen."
 britain.136.a:0 "Es ist an der Zeit!"
 
 britain.137.t:0 "Gebietseroberung"
 britain.137.d:0 "Aufgrund der jüngsten faktischen Niederlage von [SOV.GetName] haben die Iraner als Notmaßnahme damit begonnen, die ehemals von der Sowjetunion besetzten iranischen Gebiete zu erobern und zu sichern. Die sowjetischen Streitkräfte in der Region haben sich aufgrund der aktuellen Lage zurückgezogen. Eine verstärkte Mobilisierung in der Region beginnt."
 britain.137.a:0 "In letzter Minute."
 
 britain.138.t:0 "Gebietseroberung"
 britain.138.d:0 "Aufgrund des jüngsten außenpolitischen Wandels der [SOV.GetName] haben die Iraner als Notfallmaßnahme begonnen, die ehemals von der Sowjetunion besetzten iranischen Gebiete zu erobern und zu sichern. Die alliierten Mächte haben den sowjetischen Streitkräften in der Region aufgrund der aktuellen Lage den Rückzug befohlen, notfalls auch mit Waffengewalt. Eine verstärkte Mobilisierung in der Region beginnt."
 britain.138.a:0 "In letzter Minute."
 britain.138.b:0 "Sie sollten vorsichtig vorgehen ..."
 britain.138.c:0 "Ein unbedeutender Rückschlag."
 
 britain.139.t:0 "Die [SOV.GetName] setzt die Besetzung des Iran fort."
 britain.139.d:0 "Gemäß der Vereinbarung zwischen der iranischen Übergangsregierung und den Besatzungsmächten während des Krieges haben die Alliierten ihre Truppen aus iranischem Gebiet abgezogen. [SOV.GetName] hat jedoch beschlossen, seine Besetzung Nordirans auf unbestimmte Zeit zu verlängern und begründet dies mit „Sicherheitsbedenken“ in der Region. Die Spannungen haben bereits zugenommen, doch Experten sind sich nicht sicher, ob die beteiligten Mächte zu einem weiteren groß angelegten Konflikt bereit sind. Die meisten gehen davon aus, dass die Alliierten stattdessen maximalen diplomatischen und wirtschaftlichen Druck ausüben werden. Es wird erwartet, dass der iranische Widerstand in der Zwischenzeit heftig sein wird."
 britain.139.a:0 "Es drohen weiterhin Konflikte …"
 britain.139.b:0 "Die Russen sollten es besser wissen!"
 britain.139.c:0 "Sicherheit um jeden Preis."
 
 britain.140.t:0 "[ENG.GetName] kündigt diplomatische Initiative auf dem Balkan an"
 britain.140.d:0 "\n[ENG.GetName] ist nicht der einzige, der die Bedrohung in Mitteleuropa wachsen sieht.\n\nDa ihnen der Status als unabhängige Nation durch den nun angefochtenen Versailler Vertrag garantiert wurde und faschistische Mächte mit ihrer aggressiven Rhetorik Anspruch auf ihr Territorium erheben, haben mehrere Staaten die Notwendigkeit erkannt, eine pro-[ENG.GetAdjective]-Politik zu führen. \n[ENG.GetNameDef] hat auf diese Entwicklung reagiert, indem es seine diplomatischen Bemühungen in der Region verdoppelt hat."
 britain.140.a:0 "Hoffen wir, dass sie uns vor der faschistischen Welle schützen können."
 britain.140.b:0 "Sie sollten in ihrem eigenen kleinen „Einflussbereich“ bleiben!"
 britain.140.c:0 "Die europäische Stabilität muss gewahrt werden!"
 britain.140.e:0 "[ENG.GetName] bereitet seine Strategie vor."

 britain.141.t:0 "Ramsay MacDonald tritt zurück"
 britain.141.d:0 "Nachdem sich MacDonalds Gesundheitszustand bis zum Punkt verschlechtert hatte, an dem es kein Zurück mehr gab, wurde er als Führer höchst ineffektiv, was auch anderen Mitgliedern des Unterhauses auffiel. Aus diesem Grund erkannte MacDonald im [GetYear], dass seine Macht schwand, und übergab schließlich die Rolle des Premierministers an Stanley Baldwin."
 britain.141.a:0 "Herr Baldwin wird versuchen, eine Regierung zu bilden."
 
 britain.888.t:0 "Wiederaufrüstungsprogramm der Armee abgeschlossen"
 britain.888.d:0 "Mit dem Abschluss der jüngsten Ausbildungsprogramme ist eine neue Grundlage für die Entwicklung unserer neuen, expandierenden Streitkräfte geschaffen. Nachdem die Hauptlast der Vorlaufkosten bezahlt ist und die laufenden Programme in die regulären Jahresbudgets integriert wurden, fühlt sich der kaiserliche Generalstab wieder auf festem Boden."
 britain.888.a:0 "Endlich sind wir wieder bereit, uns zu verteidigen."

 britain.1000.t:0 "Ein Verteidigungsbündnis"
 britain.1000.d:0 "Unsere verschiedenen Dominions drängten auf ein Thema bezüglich des Wiederaufrüstungsprogramms Deutschlands und glauben, dass der neue Kanzler Hitler ihre Politik beeinflussen will. Diplomaten wollen ein Bündnis unterzeichnen, um die Ausbreitung des Faschismus in den Dominions zu verhindern."
 britain.1000.a:0 "Klar, lass uns die Papiere unterschreiben"

