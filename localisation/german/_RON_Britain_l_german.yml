  dnc_eng.27.a:0 "Schade..."
  
  dnc_eng.28.t:0 "[From.GetName] Ultimatum für Kolonien"
  dnc_eng.28.d:0 "Ein Ultimatum ist eine Forderung, deren Erfüllung innerhalb einer bestimmten Frist verlangt wird und die mit einer Drohung für den Fall der Nichterfüllung verbunden ist. Ein Ultimatum ist in der Regel die letzte Forderung in einer Reihe von Forderungen. Daher ist die Frist meist kurz und die Forderung nicht verhandelbar. Die Drohung, die das Ultimatum untermauert, kann je nach Forderung und den sonstigen Umständen variieren."
  dnc_eng.28.a:0 "Übergeben Sie sie"
  dnc_eng.28.b:0 "Komm und hol sie dir"  
  
  dnc_eng.29.t:0 "[From.GetName] Akzeptiert"
  dnc_eng.29.d:0 "Ein Ultimatum ist eine Forderung, deren Erfüllung innerhalb einer bestimmten Frist verlangt wird und die mit der Drohung verbunden ist, sie im Falle der Nichterfüllung zu erfüllen. Ein Ultimatum ist in der Regel die letzte Forderung in einer Reihe von Forderungen. Daher ist die Frist meist kurz und die Forderung nicht verhandelbar. Die Drohung, die das Ultimatum untermauert, kann je nach Forderung und den sonstigen Umständen variieren."
  dnc_eng.29.a:0 "Exzellent"
  
  dnc_eng.30.t:0 "[From.GetName] lehnt ab"
