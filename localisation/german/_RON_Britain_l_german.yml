 ENG_anglo_iranian_oil_company:0 "Anglo-Iranian Oil Company (AIOC)"
 ENG_anglo-iranian_oil_company_desc:0 "Von Großbritannien gegründete Ölgesellschaft, basierend auf einem Konzessionsvertrag mit dem Schah von Persien, 1901."
 red_line_agreement:0 "Red Line-Abkommen"
 red_line_agreement_desc:0 "Am 31. Juli 1928, nach der Entdeckung eines riesigen Ölfeldes im Irak und Verhandlungen der TPC über die Aufteilung der Rohölproduktion unter den Partnern, unterzeichneten Vertreter von Anglo-Persian, Royal Dutch/Shell, der Compagnie Française des Pétroles und der Near East Development Corporation im belgischen Ostende das Red Line Agreement. Gemäß den Bedingungen des Abkommens erhielt jede der vier Parteien einen Anteil von 23,75 % an der gesamten von TPC produzierten Rohölmenge. TPC durfte überall im Nahen Osten zwischen dem Suezkanal und dem Iran, mit Ausnahme von Kuwait, Öl fördern. Ziel des Abkommens war es, die Unternehmensstruktur der IPC zu formalisieren und alle Partner an eine „Selbstverleugnungsklausel“ zu binden, die es den Anteilseignern untersagte, auf eigenständige Weise Ölinteressen in dem ehemaligen osmanischen Gebiet zu verfolgen. Es markierte die Schaffung eines Ölmonopols oder -kartells mit immensem Einfluss, das sich über ein riesiges Gebiet erstreckte."
 recent_ship_purchase:0 "Kürzlicher Schiffskauf"
 recent_ship_purchase_desc:0 "Wir haben vor Kurzem den Erwerb von Schiffen von [ENG.GetNameDefCap] finanziert. Es wird einige Zeit dauern, bis sich dies auszahlt."
 aioc_expulsion:0 "AIOC ausgeschlossen"
 aioc_expulsion_desc:0 "Die AIOC wurde aus unserem Land vertrieben und wir profitieren nun von der wirtschaftlichen Leistung unserer repatriierten Ölfelder."
 red_line_agreement_termination:0 "Red Line-Vereinbarung beendet"
 red_line_agreement_termination_desc:0 "Das Red Line-Abkommen wurde von uns einseitig gekündigt und wir profitieren nun von der wirtschaftlichen Leistung unserer repatriierten Ölfelder"
 
 SOV_Crippling_Sanctions:0 "Lähmende Sanktionen"
 SOV_Crippling_Sanctions_desc:0 "§LNachdem die Feindseligkeiten nachgelassen haben, fordert die iranische Regierung alle ausländischen Besatzungsmächte auf, ihre Truppen aus dem iranischen Gebiet abzuziehen. Aus Sicherheitsgründen haben wir uns noch gegen einen Abzug entschieden. Infolgedessen haben die Alliierten und damit auch die neu gegründeten Vereinten Nationen harte Wirtschaftssanktionen gegen uns verhängt.§!\n§YDie Sanktionen werden aufgehoben, wenn wir ihren Forderungen nachkommen.§!"
 
