  dnc_eng.34.t:0 "[From.GetName] bietet den Kauf von Grönland und Island an"
  dnc_eng.34.d:0 "Es gab einmal eine Zeit, in der Souveräne sich gegenseitig kauften und verkauften. Genauer gesagt, sie erwarben souveränes Territorium. Die Vereinigten Staaten, um das einfachste Beispiel zu nennen, haben ihr heutiges Erscheinungsbild nicht nur auf militärische Eroberungen, sondern auch auf kühne Immobiliengeschäfte wie den Adams-Onís-Vertrag, den Louisiana Purchase und den Alaska Purchase zurückzuführen. Gelegentlich waren solche Verkäufe mit militärischen Aktionen verbunden, wie etwa im Vertrag von Guadalupe Hidalgo, der den Mexikanisch-Amerikanischen Krieg beendete, die mexikanische Abtretung übertrug und die Vereinigten Staaten verpflichtete, Mexiko 15 Millionen Dollar „als Gegenleistung für die erworbene Ausdehnung“ zu zahlen."
  dnc_eng.34.a:0 "Verkaufen Sie sie"
  dnc_eng.34.b:0 "Wir dürfen sie nicht verkaufen"  
  
