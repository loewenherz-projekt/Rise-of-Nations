 ##### MAN
 COM_is_MAN_increase_our_legitimacy_dec:0 "Unsere Legitimität steigern"
 COM_is_MAN_increase_our_legitimacy_dec_desc:0 "Die Einsetzung Kaiser Puyis durch Japan als Kaiser von Mandschukuo wird von der mandschurischen Bevölkerung noch nicht akzeptiert, geschweige denn vom Rest Chinas.\n\nWir müssen umfangreiche Ressourcen aufwenden, um unsere Legitimität zu stärken und als der wahre Herrscher Chinas angesehen zu werden."
 
 
 ##### MAW - MANCHURIAN WARLORD
 COM_is_MAW_push_in_chahar_dec:0 "Push in Chahar"
 COM_is_MAW_push_in_chahar_dec_desc:0 "Wir teilen eine lange Grenze mit dem ehemals verbündeten Staat Mengjiang, der nun nominell unter der Kontrolle des nationalistischen Chinas steht. Sollten unsere Streitkräfte siegen, können wir dessen Instabilität leicht ausnutzen und den Marionettenstaat rasch in unsere Fengtian-Clique integrieren."
 
 MAN_border_incident_forgotten_MEN:0 "Verlasse den Grenzkonflikt [610.GetName]-[611.GetName]"
 MAN_escalate_incident_to_border_conflict_MEN:0 "Angriff auf die Grenze von [611.GetName]!"
 MAN_border_conflict_time_until_cancelled_MEN:0 "[610.GetName]-[611.GetName] Grenzkonflikt"
 MAN_border_conflict_escalate_conflict_MEN:0 "Eskalieren Sie den Konflikt zwischen [610.GetName] und [611.GetName]."
 MAN_border_conflict_escalate_to_war_MEN:0 "Eskalation des Konflikts bis zum umfassenden Krieg"
 
 umc_is_man.10.t:0 "[GXC.GetName] bewegt sich gegen [611.GetName]"
 umc_is_man.10.d:0 "Die Situation hat sich in den letzten Stunden zugespitzt, als die Soldaten von [MAN.GetLeader] einen geplanten Vormarsch gegen die Truppen unserer Mengjiang-Marionette in der Äußeren Mongolei begannen.\n\nEs besteht kein Zweifel, dass es bald zu einer umfassenden Schlacht kommen wird."
 umc_is_man.10.a:0 "Schicken Sie so viel Hilfe wie möglich."
 umc_is_man.10.b:0 "Wir können nur beobachten und abwarten."
 
 umc_is_man.11.t:0 "Sieg in [611.GetName]"
 umc_is_man.11.d:0 "Beim Zusammenstoß im Grenzgebiet zwischen [MAN.GetName] und der chinesischen Marionettenarmee von Mengkukuo errangen unsere Streitkräfte einen klaren Sieg über die Streitkräfte von [MEN.GetLeader]. Die [MEN.GetAdjective]-Streitkräfte haben sich zurückgezogen, um sich neu zu formieren, und unsere Streitkräfte haben die Kontrolle über die Provinz [611.GetName] übernommen.\n\nDieser Sieg stärkt unsere Moral und unser Ansehen bei anderen führenden chinesischen Persönlichkeiten enorm."
 umc_is_man.11.a:0 "Ein Teil unseres ehemaligen Landes wurde zurückgewonnen."
 
 umc_is_man.12.t:0 "Patt in [611.GetName]"
 umc_is_man.12.d:0 "Die Kämpfe im Gebiet [610.GetName]-[611.GetName] sind zum Stillstand gekommen, da es beiden Seiten nicht gelungen ist, die jeweils andere Seite zu verdrängen. Beide Seiten konnten nur wenig Gebiet gewinnen. Späher berichten, dass sich die [MEN.GetAdjective]-Soldaten der Gegenseite in Verteidigungsgebiet verschanzen. Offenbar wollen sie ihr Gebiet verteidigen, werden aber wahrscheinlich nicht gegen unsere Linien vorstoßen."
 umc_is_man.12.a:0 "Dies war unsere größte Chance."
 
 umc_is_man.13.t:0 "Niederlage in [611.GetName]"
 umc_is_man.13.d:0 "Den Truppen unter dem Kommando von [MEN.GetLeader] ist es gelungen, uns aus dem umstrittenen Gebiet zwischen [610.GetName] und [611.GetName] zu vertreiben. Unsere Truppen haben sich geordnet zurückgezogen und reorganisieren sich, falls wir die Schlacht in Zukunft wieder aufnehmen wollen."
 umc_is_man.13.a:0 "Sie sind stärker als wir erwartet hatten."
 
 umc_is_man.14.t:0 "Sieg in [611.GetName]"
 umc_is_man.14.d:0 ""
 umc_is_man.14.a:0 "Das war fast unerwartet."
 
 umc_is_man.15.t:0 "Mengjiang-Sieg in [611.GetName]"
 umc_is_man.15.d:0 ""
 umc_is_man.15.a:0 "Das war fast unerwartet."
 
 umc_is_man.16.t:0 "Patt in [611.GetName]"
 umc_is_man.16.d:0 ""
 umc_is_man.16.a:0 "Ein zufriedenstellendes Ergebnis."
 
 umc_is_man.17.t:0 "Patt in [611.GetName]"
 umc_is_man.17.d:0 ""
 umc_is_man.17.a:0 "Wir haben nichts verloren."
 
 umc_is_man.18.t:0 "Niederlage in [611.GetName]"
 umc_is_man.18.d:0 ""
 umc_is_man.18.a:0 "Hoppla."
 
 umc_is_man.19.t:0 "Mengjiang-Niederlage in [611.GetName]"
 umc_is_man.19.d:0 "Den Streitkräften unter dem Kommando von [MAN.GetLeader] ist es gelungen, die Mengjiang-Streitkräfte aus dem umstrittenen Gebiet zwischen [610.GetName] und [611.GetName] zu vertreiben. Die Streitkräfte unserer Marionette wurden vollständig zerschlagen und die gesamte Äußere Mongolei wurde rasch von den Fengtian-Streitkräften besetzt."
 umc_is_man.19.a:0 "Wir hatten dort unseren Halt verloren."
 
 
 
 
