 COM_is_JAP_handle_the_militarists_dec:0 "Bewältigen Sie die Militaristen"
 COM_is_JAP_handle_the_militarists_dec_desc:0 "Militaristen, die nach Krieg und Macht streben, sind allzu oft Teil von Gekokujō-Aktionen, bei denen „der Untere regiert den Oberen“. Untere und mittlere Offiziere nutzen das Gekokujō als Rechtfertigung für prinzipiellen Ungehorsam, sofern dieser von moralischen Prinzipien motiviert ist. Provokationsangriffe nicht nur in der Mandschurei, sondern auch auf den Heimatinseln sind alarmierende Beispiele für diese Vorfälle.\n\nWir müssen die Militaristen in Schach halten, bevor die Lage außer Kontrolle gerät."
 
 COM_is_JAP_exploit_foreign_training_of_ija_generals_dec:0 "Ausnutzung der ausländischen Ausbildung von IJA-Generälen"
 COM_is_JAP_exploit_foreign_training_of_ija_generals_dec_desc:0 "Viele Kommandeure der Dai-Nippon Teikoku Rikugun wurden als Attachés in westliche Länder entsandt, vor allem während des Ersten Weltkrieges und danach. Sie studierten dort militärische Taktiken und Ausrüstung – und sammelten nützliche Informationen, die ihnen zu Hause von großem Nutzen sind."
 
 COM_is_JAP_winter_training_dec:0 "Wintertraining"
 COM_is_JAP_winter_training_dec_EXPL:0 "Füge §G1§! Logistikfähigkeit und §HWinterspezialist§! Eigenschaft zu §H1§! zufälligem General hinzu.\n"
 COM_is_JAP_winter_training_dec_desc:0 "Eine Invasion in die sowjetischen Eisgebiete Sibiriens wird zweifellos schwierig sein. Wir müssen zusätzliche Anstrengungen unternehmen, um unsere Kommandeure weiter auszubilden und sie auf das kalte und unwirtliche Klima vorzubereiten. Die nördlichen mandschurischen Gebiete sind für derartige Manöver bestens geeignet."
 
 COM_is_JAP_put_the_manchus_to_their_place_dec:0 "Weisen Sie die Mandschus in ihre Schranken"
 COM_is_JAP_put_the_manchus_to_their_place_dec_EXPL:0 "Die §HMandschu-Loyalisten§! werden sich unserer §HFaction§! anschließen und unsere §HPuppet§! werden.\n"
 COM_is_JAP_put_the_manchus_to_their_place_dec_desc:0 "Unser mandschurischer Marionettenstaat zeigt keinerlei Loyalität mehr. Japanische Eliten werden zunehmend verdrängt, und lokale Monarchen gewinnen an Macht. Die Kwantung-Armee schwächt sich ab, und in der Machtlücke entsteht eine neue mandschurische Armee.\n\nWir sollten sofort damit aufhören. Ein Angriff auf unseren eigenen Marionettenstaat wäre jedoch weder auf den Heimatinseln noch im Ausland eine willkommene Entscheidung. Wir würden erneut als Aggressor angesehen, und das würde unsere zukünftigen Kooperationsbemühungen mit anderen Nationen erschweren. Vielleicht wäre es die beste Entscheidung, einfach abzuwarten..."
 
