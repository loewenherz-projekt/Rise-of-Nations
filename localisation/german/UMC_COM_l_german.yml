 COM_is_JAP_reorganize_military_advance_in_china_dec_desc:0 ""
 
 COM_is_JAP_take_administration_of_north_east_coast_dec:0 "Nehmen Sie die Verwaltung der Nordostküste Chinas"
 COM_is_JAP_take_administration_of_north_east_coast_dec_desc:0 ""
 
 COM_is_JAP_ichi_go_sakusen_mis:0 "Operation Ichi-gō"
 COM_is_JAP_ichi_go_sakusen_mis_TRIG1:0 "Wir oder unsere Marionetten kontrollieren alle ehemaligen Küstenstaaten von [CHI.GetFlag]§H[CHI.GetName]§!."
 COM_is_JAP_ichi_go_sakusen_mis_TRIG2:0 "Wir oder unsere Puppets kontrollieren alle früheren Zustände von [GXC.GetFlag]§H[GXC.GetName]§!."
 COM_is_JAP_ichi_go_sakusen_mis_desc:0 "Die Operation Ichi-Go, auch bekannt als „Operation Nummer Eins“, ist die größte japanische Operation in der Militärgeschichte. Die beiden Hauptziele der Ichi-Go-Operation sind die Öffnung einer Landroute nach Französisch-Indochina und die Eroberung von Luftwaffenstützpunkten im Südosten Chinas, von denen aus amerikanische Bomber das japanische Heimatland und die japanische Schifffahrt angriffen."
 
 COM_is_JAP_hachi_go_sakusen_mis:0 "Operation Hachi-gō"
 COM_is_JAP_hachi_go_sakusen_mis_TRIG1:0 "Wir oder unsere Marionetten kontrollieren alle ehemaligen Oststaaten von [SOV.GetFlag]§H[SOV.GetName]§! bis hin zu §H[657.GetName]§!."
 COM_is_JAP_hachi_go_sakusen_mis_TRIG2:0 "Wir oder unsere Puppets kontrollieren alle früheren Zustände von [MON.GetFlag]§H[MON.GetName]§!."
 COM_is_JAP_hachi_go_sakusen_mis_desc:0 "Operation Ichi-Go, auch Operationsplan Nr. 8 genannt, war ein vom gemeinsamen Operationsbüro des Generalstabs der japanischen Armee und der Kwantung-Armee ausgearbeiteter Plan für die Invasion der östlichen Teile der Sowjetunion. Der Umfang der Operation war enorm: Der Plan sah den Einsatz von 50 Divisionen der IJA vor, die an einer fast 5.000 Kilometer langen Frontlinie kämpfen sollten. Die japanischen Ziele lagen bis zu 1.200 Kilometer tief in sowjetischem Gebiet."
 
 JCD_unrest_on_the_home_islands_dec:0 "Unruhen auf den Heimatinseln"
 JCD_unrest_on_the_home_islands_dec_EXPL1:0 "Zufälliger §HGeneral§! verliert die Eigenschaft §HSamurai-Linie§!.\n"
 JCD_unrest_on_the_home_islands_dec_EXPL2:0 "Zufälliger §HGeneral§! erhält die Eigenschaft §HKommunistischer Sympathisant§!.\n"
 JCD_unrest_on_the_home_islands_dec_desc:0 "Angesichts der jüngsten verstärkten Bemühungen, die japanische Politik zu ändern, ist die Lage auf den Heimatinseln instabil geworden. Die Macht wechselt hier schnell, bewaffnete Auseinandersetzungen und Sabotageakte sind fast an der Tagesordnung, und das Schlimmste: Die japanische Lebensweise als Ganzes ist bedroht."
 
 
 COM_is_JAP_propose_surrender_to_CHI_dec:0 "Legt unsere Waffen nieder – Kapitulation"
 COM_is_JAP_propose_surrender_to_CHI_dec_EXPL:0 "Gewinnen Sie unser und das §HTerritory§! unserer Marionette auf dem Festland. [PRC.GetFlag]§H[PRC.GetName]§! könnte unter den richtigen Bedingungen einen Teil davon bekommen.\n"
 COM_is_JAP_propose_surrender_to_CHI_dec_desc:0 "Es besteht keine Hoffnung, dass wir unser Territorium auf dem Festland zurückgewinnen können. Es gibt keinen anderen Ausweg, als Verhandlungen mit unserem Feind aufzunehmen. Wir werden die Botschaft aussenden, dass wir bereit sind, Frieden zu akzeptieren."
 COM_is_JAP_propose_surrender_to_MAN_dec:0 "Schlagen Sie [MAN.GetName] unsere Kapitulation vor"
 COM_is_JAP_propose_surrender_to_MAN_dec_desc:0 "Es besteht keine Hoffnung, dass wir unser Territorium auf dem Festland zurückgewinnen können. Es gibt keinen anderen Ausweg, als Verhandlungen mit unserem Feind aufzunehmen. Wir werden die Botschaft aussenden, dass wir bereit sind, Frieden zu akzeptieren."
 COM_is_JAP_propose_surrender_to_SOV_dec:0 "Schlagen Sie [SOV.GetName] unsere Kapitulation vor"
 COM_is_JAP_propose_surrender_to_SOV_dec_EXPL:0 "Gewinnen Sie unser §HTerritorium§! auf dem asiatischen Festland.\n"
 COM_is_JAP_propose_surrender_to_SOV_dec_desc:0 "Es besteht keine Hoffnung, dass wir unser Territorium auf dem Festland zurückgewinnen können. Es gibt keinen anderen Ausweg, als Verhandlungen mit unserem Feind aufzunehmen. Wir werden die Botschaft aussenden, dass wir bereit sind, Frieden zu akzeptieren."
 
 COM_is_JAP_failure_on_the_mainland_mis:0 "Scheitern auf dem Festland"
 COM_is_JAP_failure_on_the_mainland_mis_desc:0 "Die Kriegslage hat sich nicht unbedingt zu Japans Vorteil entwickelt. Wir wurden vom chinesischen Festland verdrängt. Obwohl unsere Armee und Marine weiterhin versuchen, dort wieder Fuß zu fassen, ist jede Minute, die diese Situation andauert, für uns sehr demütigend. Sollten wir unsere Position dort nicht zurückgewinnen, müssen wir möglicherweise sogar Verhandlungen mit unserem Feind in Betracht ziehen, um diese unangenehme Situation zu lösen."
 
 ##### CHINA
 COM_is_CHI_inter_party_investigation_and_control_dec:0 "Parteiübergreifende Untersuchung und Kontrolle"
 COM_is_CHI_inter_party_investigation_and_control_dec_desc:0 "Um korrupte Beamte auszuschalten und ihre Machtübernahme zu verhindern, müssen wir Maßnahmen ergreifen, um eine angemessene Kontrolle der staatlichen Einrichtungen sicherzustellen."
 COM_is_CHI_arrest_the_corrupted_officials_dec:0 "Verhaften Sie die korrupten Beamten"
 COM_is_CHI_arrest_the_corrupted_officials_dec_desc:0 "Es bleibt keine Zeit für langsame, schleppende Fortschritte. Die Korruption zerfrisst unseren Staat von innen heraus, und wir müssen schnell handeln, um diejenigen loszuwerden, die ihre eigenen Interessen über die des Staates stellen."
 
 COM_is_CHI_revoke_the_unequal_treaties:0 "Widerruf der ungleichen Verträge"
 COM_is_CHI_revoke_the_unequal_treaties_desc:0 "Als „Ungleicher Vertrag“ bezeichnet man eine Reihe von Verträgen, die das China der Qing-Dynastie im 19. und frühen 20. Jahrhundert nach militärischen Angriffen oder Drohungen ausländischer Mächte mit westlichen Mächten, dem Russischen Reich und dem Japanischen Kaiserreich unterzeichnete. Der Begriff „Ungleicher Vertrag“ wurde mit dem Konzept unseres „Jahrhunderts der Demütigung“ in Verbindung gebracht, insbesondere mit den Zugeständnissen an ausländische Mächte und dem Verlust der Zollautonomie über die Vertragshäfen. Mit dem Aufstieg des chinesischen Nationalismus und Antiimperialismus haben wir jedoch endlich die Chance, diese Verträge aufzukündigen und unseren Traum von einem vollständig vereinten und souveränen China zu verwirklichen."
 
 COM_is_CHI_INV_assert_our_authority_in_CHV_dec:0 "Unsere Autorität in den neuen Gebieten behaupten"
 COM_is_CHI_INV_assert_our_authority_in_CHV_dec_desc:0 "Der Aufstand wurde erfolgreich entfacht und nun müssen wir die süßen Früchte unseres Tuns ernten. Eine neue chinesische Marionette, die nur unserer Verwaltung unterworfen ist."
 
 COM_is_CHI_yellow_river_flood_dec:0 "Überschwemmung des Gelben Flusses"
 COM_is_CHI_yellow_river_flood_dec_desc:0 "Während die Japaner immer tiefer in unser Territorium vordringen, wird unsere Verteidigung immer verzweifelter. Um ihren weiteren Vormarsch nach West- und Südchina zu stoppen, schlug Chen Guofu dem [CHI.GetLeader] vor, die Deiche am Gelben Fluss bei Zhengzhou zu öffnen. Ursprünglich war geplant, den Deich bei Zhaokou zu zerstören. Aufgrund der Schwierigkeiten an dieser Stelle sollte jedoch stattdessen der Deich bei Huayuankou am Südufer zerstört werden.\n\nSollten wir diese Operation durchführen, sind mit hohen Verlusten zu rechnen ... und wir werden uns damit sicherlich nicht die Gunst der Bevölkerung sichern."
 
 umc_is_chi.20.t:0 "Überschwemmung des Gelben Flusses"
 umc_is_chi.20.d:0 "Auf direkten Befehl des Generalissimus [CHI.GetLeader] wurde der Deich bei Huayuankou am Südufer zerstört.\n\nDie Fluten überfluteten und zerstörten Tausende Quadratkilometer Ackerland und verlagerten die Mündung des Gelben Flusses Hunderte von Kilometern nach Süden. Tausende Dörfer wurden überschwemmt oder zerstört, mehrere Millionen Dorfbewohner wurden aus ihren Häusern vertrieben und mussten fliehen. Eine unbekannte Zahl japanischer Soldaten kam durch die Flut ums Leben.\n\nDie Flut selbst wird als „größter Umweltkriegsakt der Geschichte“ bezeichnet. Wir betrachten sie als das größte Verbrechen an unserem eigenen Volk. Wir müssen dies zu unserem Vorteil nutzen und den wahren Schutz des Volkes sicherstellen."
 umc_is_chi.20.a:0 "Das Volk wird das nicht verzeihen."
 
 umc_is_chi.25.t:0 "Überschwemmung des Gelben Flusses"
 umc_is_chi.25.d:0 "Auf direkten Befehl des Generalissimus [CHI.GetLeader] wurde der Deich bei Huayuankou am Südufer zerstört.\n\nDie Fluten überfluteten und zerstörten Tausende Quadratkilometer Ackerland und verlagerten die Mündung des Gelben Flusses Hunderte von Kilometern nach Süden. Tausende Dörfer wurden überschwemmt oder zerstört, und mehrere Millionen Dorfbewohner wurden aus ihren Häusern vertrieben und zu Flüchtlingen.\n\nGlücklicherweise waren unsere eigenen Opferzahlen nicht hoch. Schlimmer noch: Die gesamte Infrastruktur in [607.GetName], [606.GetName] und [598.GetName] wurde größtenteils zerstört, und die dortigen Industrieanlagen wurden bestenfalls schwer beschädigt."
 umc_is_chi.25.a:0 "Ein wahres Beispiel dafür, wie barbarisch sie sind."
 
 COM_is_CHI_buy_the_time_dec:0 "Beschwichtigen Sie die Japaner"
 COM_is_CHI_buy_the_time_dec_EXPL:0 "Wenn Sie diesen Nationalgeist haben, werden sich die Schwerpunkte von §RLock§! auf einen Krieg mit [CHI.GetFlag]§H[CHI.GetName]§! konzentrieren.\n"
 COM_is_CHI_buy_the_time_dec_desc:0 "Die Zeit drängt. Die NRA ist nicht bereit für einen umfassenden Konflikt mit den Japanern und wird es auch noch einige Zeit nicht sein, bis die Modernisierungsprogramme greifen. Bis dahin müssen wir die Japaner beschwichtigen und ihnen so viel geben, wie es kostet, um ihre weiteren feindseligen Aktionen gegen unser Land hinauszuzögern."
 
 umc_is_chi.10.t:0 "Chinesische Beschwichtigungspolitik"
 umc_is_chi.10.d:0 ""
 umc_is_chi.10.a:0 "Wir haben es nicht eilig."
 umc_is_chi.10.b:0 "Sie können uns nicht bestechen."
 
 umc_is_chi.11.t:0 "[JAP.GetName] akzeptiert die Zugeständnisse"
 umc_is_chi.11.d:0 ""
 umc_is_chi.11.a:0 "Das sollte uns etwas Zeit verschaffen."
 
 umc_is_chi.12.t:0 "[JAP.GetName] lehnt die Zugeständnisse ab"
 umc_is_chi.12.d:0 ""
 umc_is_chi.12.a:0 "Dann müssen wir uns auf den Krieg vorbereiten."
 
 
