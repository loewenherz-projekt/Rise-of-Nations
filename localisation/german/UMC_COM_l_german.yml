 ### NEXT MISSION FOR VON FALKENHAUSEN
 umc_is_ger.10.t:0 "Von Falkenhausens nächste Mission"
 umc_is_ger.10.d:0 "Alexander von Falkenhausen wurde kürzlich aufgrund der Stärkung der Beziehungen zu Japan von seiner Militärmission in China abberufen, wo er seit 1930 als Militärberater von Chiang Kai-shek diente. \n\nNachdem wir diesen erfahrenen General nun wieder in der Heimat haben, können wir eine weitere Hilfsmission mit von Falkenhausen als Anführer organisieren. Nur wenige Länder – hauptsächlich unsere Verbündeten oder potenziellen Verbündeten mit weniger erfahrenem Militär – bieten sich als geeignete Ziele an. Dies hängt jedoch von unseren bisherigen Regierungsentscheidungen ab. \n\nSchließlich könnte ein General dieser Qualität im Inland die besten Einsatzmöglichkeiten finden."
 umc_is_ger.10.a:0 "Die Italiener könnten sein Können gebrauchen."
 umc_is_ger.10.b:0 "Seine ruhige Weisheit wird den Japanern am meisten helfen."
 umc_is_ger.10.c:0 "Schicken Sie ihn zu den Finnen, um ihnen bei der Vorbereitung auf die sowjetische Bedrohung zu helfen."
 umc_is_ger.10.e:0 "Er wird uns zu Hause am besten dienen."
 
 umc_is_ger.11.t:0 "Von Falkenhausens Mission"
 umc_is_ger.11.d:0 ""
 umc_is_ger.11.a:0 "Eine hervorragende Idee."
 umc_is_ger.11.b:0 "Es besteht keine Notwendigkeit, dass sich ein deutscher General in unsere Angelegenheiten einmischt."
 
