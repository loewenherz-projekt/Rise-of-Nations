 COM_is_GER_get_rid_of_the_nazis_dec:0 "Ger Rid of the Nazis"
 COM_is_GER_get_rid_of_the_nazis_dec_desc:0 "Die NSDAP hat uns im Stich gelassen. Hitler hat seine Kriegslust deutlich gezeigt, die von den westlichen Alliierten schnell bekämpft wurde. Nun wird unser Land erneut als Aggressor betrachtet. Aber nicht mehr lange. Nicht nur die Bevölkerung, sondern auch das Militär brennt darauf, diesen Tumor ein für alle Mal loszuwerden."
