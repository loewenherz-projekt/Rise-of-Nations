 umc_narzgel.10.t:0 "Willkommen bei UMC"
 umc_narzgel.10.d:0 "Hallo zusammen!\n\n----- ALLGEMEINE INFOS ------\nUMC hat gerade ein großes Update erhalten. Neue Mods wurden veröffentlicht und mit ihnen kommt mehr Zusammenhalt zwischen den bereits überarbeiteten Nationen. Stelle daher sicher, dass alle UMC-Mods aktiviert sind, um maximale Kompatibilität zu gewährleisten.\n\n----- TECHNISCHE INFOS ------\n- Immer „false“ = Fokus noch nicht abgeschlossen\n\n----- BENUTZERDEFINIERTE GENERALE ------\nIm Rahmen unseres Patreon-Programms bietet UMC die Erstellung benutzerdefinierter Generäle mit persönlichen Porträts im UMC-Stil an. Sie beeinträchtigen das Spielgeschehen nicht wesentlich, können aber bei Bedarf über die zweite Option deaktiviert werden.\n\nFür weitere Informationen, Fehlerberichte und Vorschläge kontaktiere uns auf unserem DISCORD-Server!\nViel Spaß!"
 umc_narzgel.10.a:0 "Aktivieren Sie benutzerdefinierte Generäle."
 umc_narzgel.10.b:0 "Deaktivieren Sie benutzerdefinierte Generäle."
 
