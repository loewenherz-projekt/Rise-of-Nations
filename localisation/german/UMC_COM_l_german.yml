 COM_is_GER_give_himmler_field_command_dec_desc:0 ""
 COM_is_GER_recall_von_falkenhausen_dec:0 "Rückruf von Falkenhausen aus China"
 COM_is_GER_recall_von_falkenhausen_dec_EXPL1:0 "Entscheidet über das Schicksal von §HAlexander von Falkenhausen§!.\n"
 COM_is_GER_recall_von_falkenhausen_dec_EXPL2:0 "Wenn wir den Fokus &#39;§HStahlpakt§!&#39; abgeschlossen haben, können wir ihn auf Militärmission nach [ITA.GetFlag]§H[ITA.GetName]§! schicken. Wenn er unser Angebot §Gakzeptiert§! hat:\n"
 COM_is_GER_recall_von_falkenhausen_dec_EXPL3:0 "Wenn wir den Fokus „§HDas gemeinsame Ziel vereint uns§!“ abgeschlossen haben, können wir ihn auf eine Militärmission nach [JAP.GetFlag]§H[JAP.GetName]§! schicken. Wenn er unser Angebot §Gannimmt§!:\n"
 COM_is_GER_recall_von_falkenhausen_dec_EXPL4:0 "Wenn wir den Fokus „§HDer finnische Löwe§!“ abgeschlossen haben, können wir ihn auf eine Militärmission nach [FIN.GetFlag]§H[FIN.GetName]§! schicken. Wenn er unser Angebot §Gannimmt§!:\n"
 COM_is_GER_recall_von_falkenhausen_dec_EXPL5:0 "Wenn wir ihn als §HServe§! zu Hause auswählen, hat das Ereignis die folgenden §GEffects§!:\n"
 COM_is_GER_recall_von_falkenhausen_dec_desc:0 ""
 COM_is_GER_next_mission_for_von_falkenhausen_dec:0 "Nächste Mission für von Falkenhausen"
 COM_is_GER_next_mission_for_von_falkenhausen_dec_desc:0 ""
 COM_is_GER_promote_chiang_wei_kuo_dec:0 "Werben Sie für Chiang Wei-kuo"
 COM_is_GER_promote_chiang_wei_kuo_dec_desc:0 "Chiang Wei-kuo ist ein Adoptivsohn des chinesischen Präsidenten Chiang Kai-shek und absolviert derzeit eine Ausbildung bei der Wehrmacht. Er hat bereits eine spezialisierte Gebirgsjägerausbildung absolviert und sich dadurch das begehrte Ärmelabzeichen Edelweiß der Gebirgsjäger verdient. Aufgrund seiner hervorragenden Treffsicherheit trägt er außerdem die Schützenschnur. Er wäre sicherlich eine gute Ergänzung für unser Kommando, und seine Beförderung könnte unsere Beziehungen zu China sogar noch weiter verbessern."
 COM_is_GER_first_step_to_CZE_germanization_dec:0 "Eindeutschen Czech Names"
 COM_is_GER_first_step_to_CZE_germanization_dec_FLAG:0 "Hat §HEindeutschen Tschechischen Namen§ ausgewählt! Entscheidung."
 COM_is_GER_first_step_to_CZE_germanization_dec_desc:0 "Der erste Schritt zur Germanisierung der Tschechen besteht darin, ihre Sprache loszuwerden. Deutsch wird die ursprüngliche Sprache auf Schildern sein, in Büros gesprochen und in Schulen gelehrt."
 COM_is_GER_get_rid_of_the_POL_names_dec:0 "Weg mit den polnischen Namen"
