 DARK_abide_treaty_tt:0 "Halten Sie sich an die Vereinbarungen, die wir getroffen haben."
 
 DARK_eth.1.t:0 "Aufruf zum Frieden"
 DARK_eth.1.desc:0 "Der Krieg ist vorbei. Wir haben versagt. [ETH.GetNameDef] hat uns erneut aus seinem Land vertrieben, und dieses Mal machten sie nicht an ihren Grenzen halt, sondern vertrieben uns vollständig aus dem Horn von Afrika. Trotz aller Bemühungen unserer Regierung, Unterstützung für die Fortsetzung des Krieges zu gewinnen, wird immer deutlicher, dass die Bevölkerung keine Kriegsanstrengungen mehr unterstützen wird. Da kein Land mehr übrig ist, von dem aus wir einen Angriff starten können, bleibt uns kaum eine andere Wahl, als um Frieden zu bitten."
 DARK_eth.1.a:0 "Verdammt seien die Söhne Meneliks!"
    DARK_eth.2.t:0 "Frieden mit [From.GetNameDef]"
    DARK_eth.2.desc:0 "Wir haben den Krieg gewonnen. Von ihren Küsten vertrieben, sind die [ITA.GetAdjective]s an uns herangetreten und bitten um Frieden. Während unser Volk auf den Straßen feiert, müssen wir uns für einen Friedensvertrag entscheiden. Wir werden zweifellos Eritrea zurückbekommen, das uns vor so langer Zeit genommen wurde, aber drängen wir [ITA.GetNameDef] auch auf Somalia? Das mag unerwünschte globale Aufmerksamkeit erregen, aber wir haben sie doch verdient, nachdem wir die [ITA.GetAdjective]s so deutlich besiegt haben?"
    DARK_eth.2.a:0 "Wir werden nicht gierig sein."
    DARK_eth.2.b:0 "Somalia wird uns gehören!"
    DARK_eth.3.t:0 "[From.GetNameDef] Eritrea legt fest"
    DARK_eth.3.desc:0 "[ETH.GetNameDef] hat unsere Friedensangebote erwidert, aber nicht mit der Absicht eines einfachen Friedens. Nein, die [ETH.GetAdjective] fordern, dass wir ihnen die Provinz Eritrea zurückgeben. Viele haben vehement gegen diese Forderung protestiert, aber niemand kann leugnen, dass [ETH.GetNameDef] Eritrea derzeit im Wesentlichen kontrolliert, und unsere Proteste sind wirkungslos, wenn wir sie nicht unterstützen können. Realistisch gesehen haben wir keine ausländische Unterstützung, da die Forderung so relativ gering ist. Wir haben keine andere Wahl, als sie anzunehmen."
    DARK_eth.3.a:0 "Ein schwarzer Tag für [ITA.GetNameDef] und Eritrea."
        DARK_eth.4.t:0 "[From.GetNameDef] Zeichen Frieden"
        DARK_eth.4.desc:0 "[From.GetNameDef] hat unseren Friedensbedingungen zugestimmt. Eritrea wurde offiziell unter unsere Kontrolle gestellt. Der Rest der Welt ist beeindruckt, da wir die Italiener erneut vertrieben und bewiesen haben, dass die Schlacht von Adua kein Zufall war."
        DARK_eth.4.a:0 "Treten Sie nicht auf uns."
    DARK_eth.5.t:0 "[From.GetNameDef] Forderungen Eritrea und Somalia"
    DARK_eth.5.desc:0 "Die Friedensvertreter von [ETH.GetNameDef] haben sich als feindselig und kriegerisch erwiesen. Sie fordern nicht nur die Rückgabe Eritreas, sondern auch die Aufgabe der Kontrolle über Somalia! Diese Forderung ist absolut unerhört. Sicherlich würden die Briten oder Franzosen diese anmaßende Absurdität verhindern!"
    DARK_eth.5.a:0 "Bah, was soll das?"
    DARK_eth.5.b:0 "Bitten Sie um Vermittlung."
        DARK_eth.6.t:0 "[From.GetNameDef] Kapitulation Eritreas und Somalias"
        DARK_eth.6.desc:0 "[ITA.GetNameDef] hat unsere Forderungen für Eritrea und Somalia akzeptiert. Die letzten verbliebenen [ITA.GetAdjective]-Beamten haben bereits mit der Übergabe der Verwaltung an unser Land begonnen. In der Hauptstadt fanden große Paraden statt, um den Beginn eines neuen Zeitalters des Aufstiegs zu feiern."
        DARK_eth.6.a:0 "Unsere Zeit ist jetzt."
    DARK_eth.7.t:0 "[From.GetName] bittet um Vermittlung"
    DARK_eth.7.desc:0 "Wir konnten nur staunend zusehen, wie die [From.GetAdjective]s von den [ETH.GetAdjective]s aus ihren Kolonien in Afrika vertrieben wurden. In unserem Land wird noch immer darüber diskutiert, ob dieses Ergebnis auf [From.GetNameDef]s Schwäche oder [ETH.GetNameDef]s Stärke zurückzuführen ist. Ungeachtet dessen hat sich [From.GetNameDef] im Hinblick auf die Friedensgespräche mit [ETH.GetNameDef] an uns gewandt. Offenbar hat [ETH.GetNameDef] von [From.GetNameDef] die Übertragung der Kontrolle über ihre eritreischen und somalischen Gebiete gefordert. Die [ITA.GetAdjective]s haben sich an uns gewandt, um eine Vermittlung zu erreichen, die dieses Ergebnis verhindern könnte. Die öffentliche Meinung ist auf der Seite der [ETH.GetAdjective]s, aber können wir wirklich einen Aufstieg der [ETH.GetName] riskieren?"
    DARK_eth.7.a:0 "Wir können kein zweites [JAP.GetName] riskieren."
    DARK_eth.7.b:0 "Das klingt nach einem [ITA.GetAdjective]-Problem."
    DARK_eth.8.t:0 "Europa steht an der Seite von [ITA.GetNameDef]"
    DARK_eth.8.desc:0 "Gleich und gleich gesellt sich gern, die Europäer stehen zusammen. Als sie von unseren Absichten hörten, sowohl Eritrea als auch Somalia zu erobern, eilten sowohl die [ENG.GetAdjective] als auch die [FRA.GetAdjective] [ITA.GetNameDef] trotz ihrer Aggressivität und eklatanten Missachtung der Genfer Konvention zu Hilfe. Sie sind sich beide einig, dass Eritrea an uns zurückgegeben werden sollte, wir aber keinen Anspruch auf Somalia haben. Sie haben mit einer Intervention gedroht, sollten wir weiterhin auf Somalia drängen."
    DARK_eth.8.a:0 "Wir werden uns vorerst mit Eritrea zufrieden geben …"        
    DARK_eth.8.b:0 "Sie bluffen, Somalia wird uns gehören."
        DARK_risk_war_with_majors_tt:0 "§RIn diesem Fall könnten wir am Ende mit einer oder beiden europäischen Mächten in einen Krieg geraten.§!\n"
    DARK_eth.9.t:0 "[From.GetName] gibt sich mit Eritrea zufrieden"
    DARK_eth.9.desc:0 "Eingeschüchtert durch die Drohungen von [FRA.GetNameDef] und [ENG.GetNameDef] hat sich [ETH.GetNameDef] darauf geeinigt, sich nur mit Eritrea zufrieden zu geben. Ein Ergebnis, das leider auch von [ENG.GetNameDef] und [FRA.GetNameDef] unterstützt wird, wenn auch nur widerwillig. Uns bleibt kaum eine andere Wahl, als den Verlust Eritreas an die [ETH.GetAdjective] zu akzeptieren."
    DARK_eth.9.a:0 "Ein schwarzer Tag für [ITA.GetNameDef] und Eritrea."
    DARK_eth.10.t:0 "[From.GetNameDef] lehnt Mediation ab"
    DARK_eth.10.desc:0 "Unsere Diplomaten waren schockiert, als die Delegation aus [ETH.GetNameDef] sich weigerte, von ihren Forderungen für Eritrea und Somalia abzurücken. Zunächst gingen sie davon aus, allein zu handeln, doch weitere Gespräche mit der offiziellen [ETH.GetAdjective]-Regierung in Addis Abba bewiesen, dass die Delegation tatsächlich den Wünschen ihrer Regierung folgte. Unser Volk würde keinen Krieg wollen, aber können wir seine eklatante Missachtung der internationalen Rechtsstaatlichkeit wirklich hinnehmen? Besonders von einem Land wie [ETH.GetNameDef]?"
    DARK_eth.10.a:0 "Das ist den Aufwand nicht wert."
    DARK_eth.10.b:0 "Das können wir nicht zulassen."
        DARK_eth.11.t:0 "[From.GetNameDef] unterstützt uns im Krieg"
        DARK_eth.11.desc:0 "Die [ETH.GetAdjective] sind endgültig zu weit gegangen. Ihr Beharren auf Eritrea und Somalia hat ihnen den Zorn der Großmächte eingebracht, und [ETH.GetNameDef] muss sich nun ihrer Macht entgegenstellen!"
        DARK_eth.11.a:0 "Es ist Zeit, diesen Emporkömmlingen eine Lektion in Demut zu erteilen!"
        DARK_eth.12.t:0 "[From.GetNameDef] gibt nach"
        DARK_eth.12.desc:0 "Es scheint, als ob [From.GetNameDef]s ganzes Gerede über die Notwendigkeit von Vermittlung und Fairness nur Gerede war. Als die [ETH.GetAdjective] sich weigerten, ihre Forderungen für Eritrea und Somalia zurückzunehmen, ließen die [From.GetAdjective] die Sache einfach auf sich beruhen. Es ist offensichtlich, dass sie keinen Krieg mit [ETH.GetNameDef] riskieren wollen."
        DARK_eth.12.a:0 "Erbärmliche, verräterische Schwächlinge!"
        DARK_eth.13.t:0 "Majors ziehen sich zurück"
        DARK_eth.13.desc:0 "Sowohl [ENG.GetNameDef] als auch [FRA.GetNameDef] haben uns im Stich gelassen. Wie sich herausstellt, haben sie nur heiße Luft geblasen und waren nie wirklich bereit, mit [ETH.GetNameDef] Krieg zu führen. Leider haben die [ETH.GetAdjective] ihren Bluff durchschaut, und jetzt stehen wir ohne Halt da. Selbst wenn wir versuchen würden, den Vertrag mit [ETH.GetNameDef] abzulehnen, würde das die Realität vor Ort nicht ändern. Wir haben keine andere Wahl, als [ETH.GetAdjective] nachzugeben."
        DARK_eth.13.a:0 "Eine Pest über alle ihre Häuser!"
            DARK_eth.14.t:0 "Majors geben nach, Frieden unterzeichnet"
            DARK_eth.14.desc:0 "Wir haben es geschafft. Wir haben den Bluff von [ENG.GetAdjective] und [FRA.GetAdjective] aufgedeckt. Wie vorhergesagt, haben sie nachgegeben, und [From.GetNameDef] war gezwungen, unseren Friedensvertrag zu unterzeichnen, der uns die Kontrolle über Eritrea und Somalia übertrug. Wir vermuten, dass es in [From.GetNameDef] zu heftigem Zähneknirschen kommen wird."
            DARK_eth.14.a:0 "Unser Aufstieg hat begonnen!"
    DARK_eth.15.t:0 "[FRA.GetNameDef] und [ENG.GetNameDef] Zurück [ETH.GetNameDef]"
    DARK_eth.15.desc:0 "Unfassbar! Sowohl die [ENG.GetAdjective] als auch die [FRA.GetAdjective] haben sich in den Friedensgesprächen auf die Seite der [ETH.GetAdjective] gestellt. Anstatt unsere Position zu stärken, haben wir sie nur torpediert! Da die Welt gegen uns steht, haben wir kaum eine andere Wahl, als Eritrea und Somalia aufzugeben."
    DARK_eth.15.a:0 "Wenn nur der Tod auf dem Spiel gestanden hätte."
        DARK_eth.16.t:0 "[FRA.GetNameDef] und [ENG.GetNameDef] haben uns unterstützt"
        DARK_eth.16.desc:0 "Wir haben die letzte diplomatische Schlacht gewonnen. [ENG.GetNameDef] und [FRA.GetNameDef] haben sich für die Seite der Gerechtigkeit entschieden und unsere Sache unterstützt. [ITA.GetNameDef]s letztes Wagnis ist gescheitert und endlich ist der Frieden zurückgekehrt!"
        DARK_eth.16.a:0 "Unsere Zeit ist jetzt!" 
    DARK_eth.17.t:0 "[From.GetNameDef] Ergreift in der Krise die Gegenseite"
    DARK_eth.17.desc:0 "Während die Friedensgespräche zwischen [ETH.GetNameDef] und [ITA.GetNameDef] weitergehen, befinden wir uns nun auf der anderen Seite des Verhandlungstisches als [From.GetNameDef]. Während sich die Gespräche hinziehen, müssen wir uns entscheiden: Setzen wir unseren Standpunkt durch oder geben wir [From.GetNameDef] nach, um unsere Solidarität für das Gemeinwohl zu zeigen?"
    DARK_eth.17.a:0 "[DARK_push_for_whom]"
    DARK_eth.17.b:0 "[DARK_side_with_whom]"
        DARK_eth.18.t:0 "[From.GetNameDef] weigert sich, nachzugeben"
        DARK_eth.18.desc1:0 "Im Verlauf der Friedensgespräche wird immer deutlicher, dass [From.GetNameDef] nicht die Absicht hat, seine Position zu ändern. Im Gegenteil, sie haben ihre Haltung nur noch verstärkt. Gerüchten zufolge sind sie im schlimmsten Fall sogar bereit, Krieg zu führen. Können wir uns diese Ablenkung angesichts eines zunehmend feindseligen Deutschlands wirklich leisten?"
        DARK_eth.18.desc2:0 "Die Friedensgespräche sind nicht nur im Sande verlaufen, sie sind völlig verdorben. [From.GetNameDef] weigert sich nicht nur, nachzugeben, sondern droht mit einer militärischen Intervention und bereitet sich tatsächlich auf die Mobilisierung vor. Es ist klar, dass wir entweder nachgeben oder einen Krieg mit [From.GetName] riskieren müssen. Geben wir unseren eigenen Armeen Befehle?"
        DARK_eth.18.a:0 "Das ist keinen Krieg wert."
        DARK_eth.18.b:0 "Bereiten Sie die Armee auf eine Intervention vor."
        DARK_eth.18.c:0 "Sie wurden gewarnt!"
        DARK_eth.19.t:0 "[From.GetNameDef] gibt nach"
        DARK_eth.19.desc:0 "Angesichts der Kriegsdrohung haben die [From.GetAdjective] einen Rückzieher gemacht und entschieden, dass sich die ganze Angelegenheit nicht lohnt. Wir können nun eine einheitliche Antwort an [ITA.GetNameDef] und [ETH.GetNameDef] senden."
        DARK_eth.19.a:0 "Wir sind froh, dass sie es so gesehen haben wie wir."
        DARK_eth.20.t:0 "WAR mit [From.GetNameDef]"
        DARK_eth.20.desc:0 "Alle Gespräche sind gescheitert, da sowohl [From.GetNameDef] als auch wir unsere Kräfte mobilisiert haben, um unsere gewählte Seite in der Krise zu verteidigen. Viele in Europa verurteilen unsere Aufmerksamkeit für eine so abgelegene Region der Welt, aber wir können nicht zulassen, dass [From.GetNameDef] uns einfach mit Füßen tritt!"
        DARK_eth.20.a:0 "Wir werden siegreich sein!"
    
    DARK_eth.21.t:0 "Kriegsunterstützung schwächelt"
    DARK_eth.21.desc:0 "Über ein Jahr ist vergangen, seit wir unsere Invasion von [ETH.GetNameDef] begonnen haben, und wir haben kaum bis gar keine Fortschritte gemacht. Unsere Versprechen eines schnellen Sieges sind zu Asche geworden, während unsere Bürger mit dem Krieg immer unzufriedener werden. Obwohl wir nicht so hart bestraft wurden, wie wir hätten sein können, spüren viele unserer Händler die Auswirkungen trotzdem. Vielleicht ist es an der Zeit, dieses Unterfangen aufzugeben, bevor es zu spät ist?"
    DARK_eth.21.a:0 "Die [ETH.GetNameDef] machen mehr Ärger als sie wert sind."
    DARK_eth.21.b:0 "Vielleicht können wir neue Wege finden, die Männer zu motivieren?"
    DARK_eth.22.t:0 "[From.GetNameDef] Sucht Frieden"
    DARK_eth.22.desc:0 "[ITA.GetNameDef] scheint des Krieges überdrüssig zu sein. Sie haben Gesandte entsandt, die Frieden fordern, am liebsten einen, der den Status quo wiederherstellt. Wir könnten versuchen, einen günstigeren Frieden zu erzwingen, riskieren damit aber eine Verlängerung des Krieges und damit eine mögliche Niederlage."
    DARK_eth.22.a:0 "Wir nehmen ihr Angebot an."
         ETH_if_eth_accepts_tt:0 "§RDas Folgende wird NUR passieren, wenn [ETH.GetNameWithFlag] akzeptiert.§!\n"
    DARK_eth.22.b:0 "Aber ... wir gewinnen?"
        ETH_if_ita_accepts_tt:0 "§RDas Folgende wird NUR passieren, wenn [ITA.GetNameWithFlag] akzeptiert.§!\n"
    DARK_eth.22.c:0 "Wir WERDEN das gewinnen!"
    DARK_eth.23.t:0 "[From.GetNameDef] lehnt Friedensangebot ab"
    DARK_eth.23.desc:0 "Unsere Diplomaten waren zu Recht schockiert, als [From.GetLeader] unsere Friedensangebote ablehnte. Offenbar glauben die [ETH.GetAdjective], dass sie aus diesem Krieg mehr herausholen sollten, und werden nicht aufgeben, bis sie bekommen, was ihnen ihrer Meinung nach zusteht! Zumindest vorerst."
    DARK_eth.23.a:0 "Zugeständnisse!? NIEMALS!"
    DARK_eth.24.t:0 "Kriegsanstrengungen scheitern"
    DARK_eth.24.desc:0 "Über ein Jahr ist vergangen, seit wir unsere Invasion von [ETH.GetNameDef] begonnen haben, und wir haben nicht nur keine Fortschritte gemacht, wir wurden sogar zurückgedrängt! Unsere Versprechen eines schnellen Sieges sind zu Asche geworden, während unsere Bürger Frieden fordern. Es ist klar geworden, dass ein „Weißer Frieden“ derzeit unwahrscheinlich ist. Vielleicht sollten wir jetzt Frieden suchen, bevor wir unseren Einfluss verlieren."
    DARK_eth.24.a:0 "Können wir das alles nicht beiseite lassen?"
    DARK_eth.24.b:0 "Wir haben keine andere Wahl, als Eritrea aufzugeben …"
    DARK_eth.24.c:0 "Aufgeben? In unserem Moment des Triumphs!?"
    DARK_eth.25.t:0 "[From.GetNameDef] Angebote Eritrea"
    DARK_eth.25.desc:0 "Unsere Erfolge auf dem Schlachtfeld sind nicht unbemerkt geblieben. Gesandte aus [From.GetNameDef] haben sich zu Friedensgesprächen an uns gewandt und ihre Bereitschaft bekundet, Eritrea im Gegenzug für Frieden an uns zurückzugeben. Einige unserer kriegerischeren Führer haben vorgeschlagen, dass wir auch in Somalia Druck machen könnten, andere befürchten jedoch, dass dies die [From.GetAdjective] nur erzürnen und den Krieg verlängern würde."
    DARK_eth.25.a:0 "Eritrea war alles, was wir wollten und mehr."
    DARK_eth.25.b:0 "Nein, wir können einen besseren Frieden erzwingen als diesen."
    DARK_eth.26.t:0 "[From.GetNameDef] Forderungen Eritrea"
    DARK_eth.26.desc:0 "Unser Angebot des Weißen Friedens wurde von [ETH.GetNameDef] zurückgewiesen. Sie verweisen auf ihre jüngsten Erfolge und fordern stattdessen die Rückgabe ihrer verlorenen Provinz Eritrea. Erst dann werden sie den Frieden akzeptieren. Sie warnen, dass sie uns andernfalls aus dem Horn von Afrika vertreiben und unsere beiden Kolonien beschlagnahmen werden."
    DARK_eth.26.a:0 "Alles, um diesen verfluchten Krieg zu beenden."
    DARK_eth.26.b:0 "Nein, wir werden Eritrea niemals ausliefern!"
        DARK_eth.27.t:0 "[From.GetNameDef] Cedes Eritrea"
        DARK_eth.27.desc:0 "Wir wurden von mehreren ziemlich mürrischen Gesandten aus [From.GetNameDef] angesprochen. Es scheint, dass sie bereit sind, uns Eritrea im Austausch für Frieden abzutreten, obwohl sie darüber sicherlich nicht allzu erfreut zu sein scheinen!"
        DARK_eth.27.a:0 "Ein Unrecht ungeschehen gemacht ..."
        DARK_eth.28.t:0 "[From.GetNameDef] weigert sich, Eritrea abzutreten"
        DARK_eth.28.desc:0 "Unsere Forderung nach der Rückgabe Eritreas wurde von [ITA.GetNameDef] mit Verachtung aufgenommen. Sie scheinen derzeit nicht bereit zu sein, ihre Kolonie aufzugeben. Wenn wir unsere verlorene Provinz zurückgewinnen wollen, müssen wir weiterhin unseren Mut beweisen."
        DARK_eth.28.a:0 "Ityopia tabetsih edewiha habe Igziabiher!"
    DARK_eth.29.t:0 "Fehler in [ETH.GetNameDef]"
    DARK_eth.29.desc:0 "Es sind nun schon über zwei Jahre vergangen, seit wir das verfluchte Land [ETH.GetNameDef] betreten haben, aber wir konnten noch immer keine nennenswerten Fortschritte erzielen. Unsere Bevölkerung wird unruhig, und alle Bemühungen, Unterstützung für den Krieg zu gewinnen, sind weitgehend gescheitert. Der versprochene schnelle Krieg ist ausgeblieben, und die Menschen werden unruhig. Vielleicht sollten auch wir anfangen, über Frieden nachzudenken."
    DARK_eth.29.a:0 "Bieten Sie einen weißen Frieden an."
    DARK_eth.29.b:0 "Nur. Ein bisschen. Länger."
        DARK_italian_warning_tt:0 "§RDer Krieg ist zunehmend unpopulär geworden. Wenn unsere Kriegsunterstützung unter 25 % fällt, riskieren wir, von der Macht vertrieben und in den Frieden gezwungen zu werden, möglicherweise nicht zu unseren Gunsten.§!\n"
    
    DARK_eth.30.t:0 "Drohender Zusammenbruch der Regierung"
    DARK_eth.30.desc:0 "Die Menschen sind auf den Straßen, unsere Anhängerschaft schwindet, unsere Unterstützung ist verschwunden. Unsere anhaltenden Misserfolge in [ETH.GetNameDef] haben die Bevölkerung wütend gemacht, die sich nun nur noch Frieden wünscht. Nun greift der König selbst ein und fordert [ITA.GetLeader] zum Rücktritt auf, damit Neuwahlen ausgerufen werden können. Kämpfen wir gegen diese Ungerechtigkeit oder gehen wir einfach, solange wir noch etwas Würde haben?"
    DARK_eth.30.a:0 "Lasst uns gehen, solange es noch gut ist, zu gehen."
    DARK_eth.30.b:0 "Schickt die Schwarzhemden in den Palast!"
    
    DARK_eth.31.t:0 "Neue [From.GetAdjective] Regierungsangebote Eritrea"
    DARK_eth.31.desc:0 "Die Menschen in [From.GetNameDef] sind des Krieges müde. Das alte Regime wurde gestürzt, und die neue Regierung hat bereits Friedensangebote gemacht. Sie hat angeboten, Eritrea im Gegenzug für ein Ende der Feindseligkeiten zurückzugeben."
    DARK_eth.31.a:0 "Es scheint, wir haben gewonnen."
    DARK_eth.31.b:0 "Fordern Sie Somalia, wenn wir schon dabei sind."
        DARK_eth.32.t:0 "[From.GetNameDef] Forderungen Somalias"
        DARK_eth.32.desc:0 "Die Botschafter von [ETH.GetNameDef] haben unseren Wunsch erkannt, den Krieg zu beenden, und erklärt, dass sie keinen Frieden akzeptieren werden, solange wir nicht sowohl Somalia als auch Eritrea übergeben. Unsere eigene Bevölkerung ist gespalten: Einige wollen das Horn von Afrika einfach aufgeben, während andere den Gedanken nicht ertragen können, dass wir unser Territorium an [ETH.GetNameDef] übergeben. Was sollen wir tun?"
        DARK_eth.32.a:0 "Gib ihnen den verdammten Platz."
        DARK_eth.32.b:0 "Wir wollen Frieden, keine Kapitulation!"
        DARK_eth.33.t:0 "[From.GetNameDef] lehnt Anfrage ab"
        DARK_eth.33.desc:0 "Offenbar haben wir den Friedenswillen der neuen [From.GetAdjective]-Regierung überschätzt. Sie hat unsere Forderungen abgelehnt und klar gemacht, dass sie so lange kämpfen wird, bis wir entweder ihr erstes Angebot annehmen oder sie vollständig aus der Region vertreiben."
        DARK_eth.33.a:0 "Der Krieg geht also weiter."
   
    DARK_eth.34.t:0 "[From.GetNameDef] Angebote Eritrea"
    DARK_eth.34.desc:0 "Auf der italienischen Halbinsel ist ein Bürgerkrieg ausgebrochen, während die Faschisten verzweifelt versuchen, an der Macht zu bleiben. Die Fraktion des Königs ist auf uns zugekommen und hat uns Eritrea im Austausch für einen Nichtangriffspakt zwischen unseren Nationen angeboten."
    DARK_eth.34.a:0 "Wir akzeptieren."
    DARK_eth.34.b:0 "Druck für Somalia."
        DARK_eth.35.t:0 "[From.GetNameDef] Stimmt zu"
        DARK_eth.35.desc:0 "Unsere Annäherungsversuche an [ETH.GetNameDef] waren erfolgreich. [ETH.GetLeader] hat versprochen, seine Bemühungen gemeinsam mit uns auf die Faschisten zu konzentrieren, im Austausch für Eritrea, nachdem wir die Faschisten besiegt haben."
        DARK_eth.35.a:0 "Eine Sorge weniger."
            ETH_give_up_e_tt:0 "Stimmen Sie der Übergabe Eritreas zu, sobald die Faschisten besiegt sind."
        DARK_eth.36.t:0 "[From.GetNameDef] Fordert auch Somalia"
        DARK_eth.36.desc:0 "Unsere Annäherungsversuche an [ETH.GetNameDef] waren erfolglos. [ETH.GetLeader] forderte die Übergabe des Horns von Afrika an [ETH.GetNameDef] und warnte uns, dass es bei Nichtvorlage dieses schriftlichen Versprechens wahrscheinlich zu Feindseligkeiten kommen würde. Obwohl wir Somalia nur ungern aufgeben, sind wir derzeit nicht in der Lage, diesen Punkt zu vertreten. Sollen wir den Verlust des Horns von Afrika einfach hinnehmen und uns auf unser Heimatland und Libyen konzentrieren?"
        DARK_eth.36.a:0 "Wir haben kaum eine Wahl."
            ETH_give_up_e_s_tt:0 "Stimmen Sie der Übergabe Eritreas und Somalias zu, sobald die Faschisten besiegt sind."
        DARK_eth.36.b:0 "Dann lass sie kommen."
                ETH_beware_eth_tt:0 "§R[ETH.GetNameDef] könnte versuchen, seine Forderungen mit Gewalt durchzusetzen!§!"
            DARK_eth.37.t:0 "[From.GetNameDef] Versprechen Somalia"
            DARK_eth.37.desc:0 "Unser Wagnis hat sich ausgezahlt. [From.GetNameDef] hat schriftlich zugestimmt, die Provinzen Eritrea und Somalia nach der Niederlage der Faschisten abzugeben. Wir können uns nun unserem gemeinsamen Feind zuwenden und ihn gemeinsam vernichten."
            DARK_eth.37.a:0 "Der Sieg ist in Sicht."
            DARK_eth.38.t:0 "[From.GetNameDef] weigert sich, Somalia Versprechen zu geben"
            DARK_eth.38.desc:0 "[From.GetNameDef] scheint der Illusion zu unterliegen, sie hätten Verhandlungsmacht, denn sie haben unsere berechtigte Forderung nach Somalia nach Kriegsende abgelehnt. Wir könnten ihr ursprüngliches Versprechen einfach annehmen, aber wir könnten diese Gelegenheit auch nutzen, um mit Nachdruck dafür zu sorgen, dass die [From.GetAdjective]s für immer vom Horn von Afrika vertrieben werden."
            DARK_eth.38.a:0 "Wir sind keine Kriegstreiber."
            DARK_eth.38.b:0 "Sollen sie doch versuchen, uns aufzuhalten."
        DARK_eth.39.t:0 "Versprechen eingehalten"
        DARK_eth.39.desc:0 "Als die Faschisten von der italienischen Halbinsel vertrieben wurden, gab es einige, die befürchteten, dass die gegebenen Versprechen nicht eingehalten würden. Glücklicherweise scheinen diese Befürchtungen übertrieben zu sein, denn wir haben bekommen, was uns versprochen wurde."
        DARK_eth.39.a:0 "Exzellent."
        DARK_eth.40.t:0 "[ETH.GetAdjective] Versprechen"
        DARK_eth.40.desc:0 "Nachdem wir die faschistische Bedrohung beendet haben, wenden wir uns an [ETH.GetNameDef], um unsere Versprechen zu erfüllen. Manche in unserem Land wünschen sich vielleicht etwas anderes, aber wir brauchen Frieden und Heilung, nicht noch mehr Krieg."
        DARK_eth.40.a:0 "Wir sind froh, dass Frieden geherrscht hat."
    
    DARK_eth.41.t:0 "Kriegsunterstützung bricht ein"
    DARK_eth.41.desc:0 "Es sind nun über zwei Jahre vergangen, seit wir unseren Krieg gegen die [ETH.GetAdjective]s begonnen haben, aber wir haben nichts vorzuweisen außer verlorenem Territorium. Unsere Truppen sind moralisch am Boden, und die Menschen zu Hause sind zunehmend frustriert über die Unfähigkeit unserer Regierung, den Krieg zu gewinnen oder Frieden zu schließen. Können wir diesen Krieg wirklich fortsetzen?"
    DARK_eth.41.a:0 "Wir müssen Frieden schließen."
    DARK_eth.41.b:0 "Wir haben keine andere Wahl, als Eritrea aufzugeben …"
    DARK_eth.41.c:0 "Aufgeben? In unserem Moment des Triumphs!?"
    DARK_eth.42.t:0 "Die Unterstützung für den Krieg schwindet"
    DARK_eth.42.desc:0 "Drei Jahre, über drei Jahre sind seit unserer Invasion von [ETH.GetNameDef] vergangen, und wir haben immer noch nicht gewonnen! Es spielt keine Rolle mehr, ob wir kurz vor dem Sieg stehen oder welche Siege wir erringen. Wir haben für immer die Unterstützung vieler verloren, weil es uns nicht gelungen ist, diese einzigartige afrikanische Nation zu besiegen. Wir müssen diesen Krieg beenden, so oder so!"
    DARK_eth.42.a:0 "Wir müssen Frieden schließen."
    DARK_eth.42.b:0 "Wir haben keine andere Wahl, als Eritrea aufzugeben …"
    DARK_eth.42.c:0 "Aufgeben? In unserem Moment des Triumphs!?"
    DARK_eth.43.t:0 "Die Unterstützung für den Krieg erreicht ihren Tiefpunkt"
    DARK_eth.43.desc:0 "Die Rufe nach Frieden sind fast überwältigend geworden. Bald könnten wir gezwungen sein, Frieden zu schließen, ob wir wollen oder nicht. Sollten wir deswegen wirklich unsere Regierung aufs Spiel setzen?"
    DARK_eth.43.a:0 "Wir müssen Frieden schließen."
    DARK_eth.43.b:0 "Wir haben keine andere Wahl, als Eritrea aufzugeben …"
    DARK_eth.43.c:0 "Aufgeben? In unserem Moment des Triumphs!?"
    
 DARK_eth.44.t:0 "Der faschistische Zusammenbruch"
 DARK_eth.44.desc:0 "Das Versagen von [ETH.GetNameDef] lässt sich nicht einfach unter den Teppich kehren. Die Unterstützung für unsere Regierung und für Mussolini ist geschwunden. Im ganzen Land kam es zu Straßenprotesten. Gestern machte der König selbst deutlich, dass wir entweder sofort etwas unternehmen oder er seine Autorität nutzen würde, um uns zu entmachten und die Regierung bis zu Neuwahlen selbst zu führen."
 DARK_eth.44.a:0 "Mussolini hat uns im Stich gelassen, aber wir sind die Zukunft von [ITA.GetNameDef]!"
 DARK_eth.44.b:0 "Der König hat hier keine Macht! Schickt die Schwarzhemden!"
 DARK_eth.44.c:0 "Wird das Volk den König unterstützen?"
 
 DARK_eth.45.t:0 "Die Ablenkung der [ITA.GetAdjective]s"
 DARK_eth.45.desc:0 "Regierung und Militär befinden sich aufgrund des anhaltenden Bürgerkriegs in einem Zustand des Chaos. Das bedeutet, dass der Hafen von Zara nahezu ungeschützt ist. Das macht uns vielleicht nicht zum beliebtesten Land, aber wir könnten uns das Land schnell unter den Nagel reißen, während die Italiener abgelenkt sind. Wenn uns die jüngsten Ereignisse etwas gezeigt haben, dann, dass wir von gewissen westlichen Mächten nichts weiter als schlechtes Gerede zu erwarten haben. Der Nutzen einer Eroberung Zaras überwiegt doch dieses Risiko, oder nicht?"
 DARK_eth.45.a:0 "Zara war schon immer [Root.GetAdjective]!"
 DARK_eth.45.b:0 "Wir können es uns im Moment nicht leisten, irgendjemanden zu verprellen."
    DARK_eth.46.t:0 "Der Verlust von Zara"
    DARK_eth.46.desc:0 "Die [From.GetAdjective]-Regierung hat unsere Ablenkung durch den Bürgerkrieg ausgenutzt, um den Hafen von Zara zu erobern, einen unserer wenigen Erfolge im Ersten Weltkrieg. Derzeit können wir nur diplomatischen Protest einlegen, aber wenn das funktioniert hätte, hätten wir nie eine Invasion von [ETH.GetNameDef] versuchen können. Wir müssen wohl einfach abwarten und Rache an dem opportunistischen Abschaum in [From.GetNameDef] nehmen."
    DARK_eth.46.a:0 "Wir werden Zara zurückerobern."
    
 DARK_eth.47.t:0 "Südtiroler Mängel"
 DARK_eth.47.desc:0 "Unsere Macht über die deutschsprachige Mehrheit in Südtirol war seit dem Ende des Ersten Weltkriegs bestenfalls brüchig, und unser Verhältnis hat sich in den letzten Jahren durch unsere Versuche, die Bevölkerung zu italianisieren, verschlechtert. Es dürfte daher keine Überraschung sein, dass die Provinz sich erhoben und zu den Waffen gegriffen hat. Sie fordert die sofortige Wiedervereinigung mit [AUS.GetNameDef]. Wir sind derzeit nicht in der Lage, sie aufzuhalten, und ein solcher Versuch könnte einen Krieg mit [AUS.GetNameDef] auslösen, den wir uns nicht leisten können. Wir sollten die Wiedervereinigung einfach zulassen, uns fehlen derzeit schlicht die Mittel, sie zu verhindern."
 DARK_eth.47.a:0 "Undankbares kleines..."
    DARK_eth.48.t:0 "Der Südtirol-Überlauf"
    DARK_eth.48.desc:0 "Angesichts des anhaltenden Bürgerkriegs in [From.GetNameDef] hat sich Südtirol erhoben und die Wiedervereinigung mit unserem Land gefordert. Angesichts der Tatsache, dass uns diese mehrheitlich deutsch bewohnte Provinz nach dem Ersten Weltkrieg zu Unrecht weggenommen wurde, sehen wir keinen Grund, warum sie sich uns nicht wieder anschließen sollte."
    DARK_eth.48.a:0 "Ein Unrecht ungeschehen gemacht."
    
 DARK_eth.49.t:0 "[From.GetName] versucht, Allianzen zu festigen"
 DARK_eth.49.desc:0 "[From.GetLeader], Anführer der [From.GetFactionName], hat uns ein interessantes Angebot unterbreitet. [From.GetLeader] wollte nach der Auflösung der Stresa-Front vor einigen Jahren unsere Beziehungen erneuern und gemeinsam aggressive Nationen eindämmen. Die Umsetzung dieses Angebots würde unsere Zusammenarbeit wiederaufnehmen. Bleibt nur noch die Frage der Führung."
 DARK_eth.49.a:0 "Wir schließen uns gerne mit [From.GetNameDef] zusammen."
 DARK_eth.49.b:0 "Unsere Verbündeten und wir vereinbaren, uns der [From.GetFactionName] anzuschließen."
 DARK_eth.49.c:0 "[From.GetNameDef] sollte sich unserer Allianz anschließen."
 DARK_eth.49.d:0 "Es liegt nicht an Ihnen [From.GetName], es liegt an uns."
    DARK_eth.50.t:0 "[From.GetName] lehnt Allianzvorschlag ab"
    DARK_eth.50.desc:0 "Diplomaten von [From.GetNameDef] haben uns mit Bedauern darüber informiert, dass [From.GetNameDef] derzeit leider nicht daran glaubt, unsere Bündnisse wieder in Einklang bringen zu können."
    DARK_eth.50.a:0 "Schade."
    DARK_eth.51.t:0 "[From.GetName] bittet um Führung"
    DARK_eth.51.desc:0 "Diplomaten aus [From.GetNameDef] haben positiv auf unsere Versöhnungsangebote reagiert. Es gab jedoch einen Knackpunkt. [From.GetNameDef] ist der Ansicht, dass sie anstelle von uns Primus inter Pares sein sollten, und verweist auf ihren angeblich größeren politischen und militärischen Einfluss."
    DARK_eth.51.a:0 "Fair genug."
    DARK_eth.51.b:0 "Das können wir doch sicher klären?"
    DARK_eth.52.t:0 "[From.GetName] akzeptiert unsere Führung"
    DARK_eth.52.desc:0 "[From.GetNameDef] hat unsere Anfrage zur Führung unserer neu vereinten Allianz angenommen."
    DARK_eth.52.a:0 "Gemeinsam sind wir stark."
    DARK_eth.53.t:0 "[From.GetName] lehnt unseren Versuch ab, die Führung zu übernehmen"
    DARK_eth.53.desc:0 "Die [From.GetAdjective] haben klargestellt, dass [From.GetNameDef] entweder der Erste unter Gleichen in unserer neu gegründeten Fraktion sein wird oder wir unsere Allianzen nicht zusammenführen können. Können wir es uns wirklich leisten, uns eine solche Gelegenheit für so einen Quatsch wie die Führung entgehen zu lassen?"
    DARK_eth.53.a:0 "Gut, wenn Sie darauf bestehen."
    DARK_eth.53.b:0 "Wir könnten niemals [From.GetAdjective] Führung akzeptieren!"
    DARK_eth.54.t:0 "[From.GetName] akzeptiert unsere Führung"
    DARK_eth.54.desc:0 "Nach vielen Stunden des Hin und Her haben die [From.GetAdjective]-Diplomaten endlich unsere Rolle als Anführer unseres neu vereinten Bündnisses akzeptiert. Sie sind vielleicht nicht glücklich darüber, aber sie erkennen an, dass dies für die Zusammenarbeit unserer Länder notwendig ist."
    DARK_eth.54.a:0 "So wie es sein sollte."
    DARK_eth.55.t:0 "[From.GetName] lehnt unseren Versuch ab, die Führung zu übernehmen"
    DARK_eth.55.desc:0 "Nach stundenlangem Hin und Her sind die Verhandlungen mit [From.GetNameDef] an der Frage der Führung gescheitert. Es ist klar geworden, dass nicht nur alle Hoffnung auf einen erfolgreichen Zusammenschluss des Bündnisses verloren ist, sondern dass auch die Beziehungen zwischen unseren Ländern auf absehbare Zeit beschädigt sind."
    DARK_eth.55.a:0 "Prahlerische Bastarde."
    
 DARK_eth.56.t:0 "[FROM.GetNameDef] lädt uns zu einer Allianz ein"
 DARK_eth.56.desc:0 "Trotz des Regierungswechsels hegen [From.GetNameDef]s weiterhin einen Groll gegen die [YUG.GetAdjective]s. Sie sind mit der Absicht an uns herangetreten, ein Bündnis gegen [YUG.GetNameDef] zu schmieden. Sie berufen sich auf unsere eigenen Ansprüche und versprechen uns das Land, sobald [YUG.GetNameDef] gefallen ist. Sollen wir diesen Handel annehmen?"
 DARK_eth.56.a:0 "Eine perfekte Gelegenheit."
 DARK_eth.56.b:0 "Wir werden weiterkommen, danke."
 #DARK_eth.57 is the same as 56
    DARK_eth.58.t:0 "[From.GetNameDef] tritt der Allianz bei"
    DARK_eth.58.desc:0 "[From.GetNameDef] hat Interesse an unserem gemeinsamen Ziel bekundet, die falsche Nation [YUG.GetNameDef] zu zerschlagen. Öffentlich haben wir einen Freundschaftsvertrag zur gegenseitigen Verteidigung angekündigt, doch in geheimen Versammlungssälen treffen sich unsere Diplomaten heimlich, um die Einzelheiten einer Welt nach [YUG.GetAdjective] auszuarbeiten."
    DARK_eth.58.a:0 "Unsere Koalition wächst."
    DARK_eth.59.t:0 "Die [From.GetAdjective]-Widerlegung"
    DARK_eth.59.desc:0 "[From.GetNameDef] hat unser Angebot einer Anti-{YUG.GetAdjective]-Allianz abgelehnt. Sie schienen eher schockiert, dass wir so etwas überhaupt vorschlagen. Wir müssen uns woanders nach Verbündeten umsehen."
    DARK_eth.59.a:0 "Feiglinge, die ganze Truppe!"
     
 DARK_eth.60.t:0 "Die mazedonische Frage"
 DARK_eth.60.desc:0 "Wir wussten, dass [BUL.GetNameDef] und [GRE.GetNameDef] aufgrund ihrer konkurrierenden Ansprüche auf Mazedonien Probleme bekommen könnten, aber wir hätten nicht gedacht, dass es so schnell passieren würde. Unsere Diplomaten haben unermüdlich daran gearbeitet, die Spannungen zu beruhigen, aber es wurde immer deutlicher, dass etwas getan werden muss. Wir haben Diplomaten aus [BUL.GetNameDef] und [GRE.GetNameDef] zu Gesprächen nach [Root.Capital.GetName] eingeladen. Wir haben ein Druckmittel in der Hand: Niemand erhebt Ansprüche auf serbisches Kernland, daher könnten wir die Macht über Serbien statt über Mazedonien anbieten. Alternativ könnten wir sie einfach dem einen oder anderen Land überlassen, aber das würde das ausgeschlossene Land wahrscheinlich ziemlich verärgern."
 DARK_eth.60.a:0 "Biete Serbien [BUL.GetNameDef] an."
 DARK_eth.60.b:0 "Biete Serbien [GRE.GetNameDef] an."
 DARK_eth.60.c:0 "Geben Sie Mazedonien an [BUL.GetNameDef]."
 DARK_eth.60.d:0 "Geben Sie Mazedonien an [GRE.GetNameDef]."
 DARK_eth.60.e:0 "Angebot Griechenland Die Dodekanes."
 DARK_eth.61.t:0 "[SER.GetNameDef] für Mazedonien"
 DARK_eth.61.desc:0 "Unser konkurrierender Anspruch auf Mazedonien mit [DARK_get_bul_gre] hat sich endgültig zugespitzt. [From.GetNameDef] hat uns nach [From.Capital.GetName] gerufen, um diesen Streit zu klären. Sie haben uns die Oberhoheit über Serbien angeboten, wenn wir im Gegenzug unseren Anspruch auf Mazedonien aufgeben. Zwar kann nur ein Land das Land erhalten, und Serbien wäre eine großartige Beute, aber können wir wirklich von unserem rechtmäßigen Anspruch abrücken?"
 DARK_eth.61.a:0 "Ein mehr als fairer Handel."
 DARK_eth.61.b:0 "Mazedonien gehört uns!"
    DARK_eth.62.t:0 "[From.GetNameDef] nimmt Angebot an"
    DARK_eth.62.desc:0 "[From.GetNameDef] hat unser Angebot der Oberherrschaft über Serbien angenommen und ist von seinem Anspruch auf Mazedonien abgerückt. Es scheint, als hätten wir eine mögliche Katastrophe abgewendet."
    DARK_eth.62.a:0 "Ein Streichholz weniger in der Nähe des Pulverfasses."
    DARK_eth.63.t:0 "[From.GetNameDef] lehnt Angebot ab"
    DARK_eth.63.desc:0 "[From.GetNameDef] hat unser Angebot der Oberherrschaft über Serbien abgelehnt und seine Ansprüche auf Mazedonien nur verdoppelt. Was sollten wir als Nächstes tun?"
 DARK_eth.64.t:0 "[From.GetNameDef] bevorzugt [DARK_get_bul_gre]!"
 DARK_eth.64.desc:0 "Die zunehmenden Spannungen zwischen [DARK_get_bul_gre] und uns wegen unserer konkurrierenden Ansprüche auf Mazedonien erreichten schließlich einen Punkt, an dem sich [From.GetNameDef] zum Eingreifen verpflichtet fühlte. [From.GetNameDef] rief uns nach [From.Capital.GetName] und führte stundenlange Verhandlungen, bis sie beschlossen, den Anspruch an [DARK_get_bul_gre] zu vergeben! Natürlich reagierten wir wütend auf diese Entscheidung und müssen nun entscheiden, ob wir überhaupt noch Teil von [From.GetFactionName] sein wollen!"
 DARK_eth.64.a:0 "Das ist der Tropfen, der das Fass zum Überlaufen bringt!"
 DARK_eth.64.b:0 "Gut, dann nehmen wir Serbien!"
 DARK_eth.64.c:0 "Wir können es uns nicht leisten, wegzugehen."
    DARK_eth.65.t:0 "[From.GetNameDef] verlässt [Root.GetFactionName]!"
    DARK_eth.65.desc:0 "Es scheint, dass unsere Entscheidung, Mazedonien an [From.DARK_get_bul_gre] statt an sich selbst zu vergeben, einen irreparablen Riss zwischen unseren Ländern verursacht hat. Sie haben offiziell erklärt, dass sie nicht länger Teil von [Root.GetFactionName] sein können und haben begonnen, anderswo nach Verbündeten zu suchen."
    DARK_eth.65.a:0 "Was für ein Haufen schlechter Verlierer."
    DARK_eth.66.t:0 "[From.GetNameDef] fordert serbische Entschädigung"
    DARK_eth.66.desc:0 "Als die Diplomaten von [From.DARK_get_bul_gre] von unserer Entscheidung hörten, Mazedonien zu gewähren, waren sie wirklich aufgebracht, aber nach langen Debatten haben sie sich bereit erklärt, dieses Ergebnis zu akzeptieren, allerdings nur, wenn wir ihnen die Oberhoheit über [SER.GetNameDef] gewähren, wie es uns zuvor angeboten wurde."
    DARK_eth.66.a:0 "Dies ist akzeptabel."
    DARK_eth.71.t:0 "[From.GetNameDef] fordert Entschädigung für die Dodekanes"
    DARK_eth.71.desc:0 "Als die Diplomaten von unserer Entscheidung hörten, Mazedonien an [From.DARK_get_bul_gre] zu vergeben, waren sie wirklich aufgebracht, aber nach langen Debatten haben sie sich bereit erklärt, dieses Ergebnis zu akzeptieren, allerdings nur, wenn wir die Dodekanes zurückgeben, wie zuvor angeboten."
    DARK_eth.71.a:0 "Dies ist akzeptabel."
    DARK_eth.67.t:0 "[From.GetNameDef] Akzeptiert das Ergebnis"
    DARK_eth.67.desc:0 "Es besteht kein Zweifel, dass [From.GetNameDef] uns noch lange übel nehmen wird, dass wir [From.DARK_get_bul_gre] Mazedonien zugestanden haben, aber zumindest im Moment sind sie [Root.GetFactionName] treu geblieben."
    DARK_eth.67.a:0 "Wir werden einen Weg finden, ihre Treue zu vergelten."
    
 DARK_eth.68.t:0 "[From.GetName] bietet uns die Dodekanes"
 DARK_eth.68.desc:0 "Als Reaktion auf die eskalierenden Spannungen mit [DARK_get_bul_gre] wegen Mazedonien hat uns [From.GetNameDef] eine Lösung angeboten. Wir geben unseren Anspruch auf Mazedonien auf, und im Gegenzug geben sie uns die Dodekanes zurück. Diese Gelegenheit, unser verlorenes Territorium zurückzuerobern, wird sich vielleicht nie wieder ergeben. Sollten wir sie nutzen?"
 DARK_eth.68.a:0 "Das ist es wert."
 DARK_eth.68.b:0 "Nein, wir wollen Mazedonien!"
    DARK_eth.69.t:0 "[From.GetNameDef] nimmt Angebot an"
    DARK_eth.69.desc:0 "Die Krise ist gelöst. [GRE.GetNameDef] hat unser Angebot für die Dodekanes angenommen und im Gegenzug alle Ansprüche auf Mazedonien fallengelassen. Damit sollte das Problem vorerst gelöst sein."
    DARK_eth.69.a:0 "Schade, dass es uns eine gute Basis gekostet hat."
    DARK_eth.70.t:0 "[From.GetNameDef] lehnt Angebot ab"
    DARK_eth.70.desc:0 "Zu unserem Entsetzen haben die [GRE.GetAdjective]-Diplomaten unser Angebot für die Dodekanes rundweg abgelehnt. Offenbar sind sie ziemlich auf die Mazedonien-Sache fixiert. Wir müssen uns einen anderen Plan überlegen."
    #71 is between 66 and 67 due to me adding the Dodecanese option later
    
 DARK_eth.72.t:0 "Der Vertrag von Belgrad"
 DARK_eth.72.desc:0 "Der Krieg mit [YUG.GetNameDef] ist endlich vorbei, und unsere Verbündeten und wir sind siegreich hervorgegangen. Jetzt müssen wir nur noch den Friedensvertrag abschließen. Wir sollten uns wahrscheinlich an unsere Friedensvereinbarungen aus der Zeit vor dem Krieg halten, da ein Scheitern die Spannungen nur noch weiter anheizen und unsere Verbündeten gegen uns aufbringen würde."
 DARK_eth.72.a:0 "Jetzt ernten wir die Früchte."
 DARK_eth.72.b:0 "Zerreißt die Verträge!"
 
 DARK_eth.73.t:0 "Der Suezkanal wird wiedereröffnet"
 DARK_eth.73.desc1:0 "Da wir uns nun im Krieg befinden, können wir den Suezkanal nicht länger geschlossen halten, da wir unsere eigenen Schiffe durch ihn transportieren müssen. Daher haben wir den Kanal mit sofortiger Wirkung wieder geöffnet."
 DARK_eth.73.desc2:0 "Da der Italienisch-Abessinien-Krieg vorbei ist, können wir den Suezkanal nun wieder öffnen."
 DARK_eth.73.a:0 "Der Suezkanal öffnet sich erneut."
 
 DARK_eth.74:0 "VERSTECKT"
 
 DARK_eth.75.t1:0 "[From.GetNameDef] sendet Waffen im Geheimen"
 DARK_eth.75.t2:0 "[ETH.GetNameDef] erhält Waffen"
 DARK_eth.75.desc1:0 "Wir haben kürzlich über einige Hinterzimmerkanäle eine Waffenlieferung von [From.GetNameDef] erhalten. Die [From.GetAdjective]-Regierung möchte uns offensichtlich unterstützen, fühlt sich aber durch das Waffenembargo zu sehr unter Druck gesetzt, uns offen Waffen zu schicken. Wir haben ihren Wunsch nach Geheimhaltung respektiert und keine Berichte über diese Waffen veröffentlicht."
 DARK_eth.75.desc2:0 "Die [ETH.GetAdjective]-Streitkräfte haben unsere geheime Waffenlieferung erhalten und bereits mit der Verteilung an ihre Truppen begonnen. Abgesehen von einem kleinen Logistikprotokoll, in dem lediglich „Waffen gefunden“ vermerkt ist, gibt es keinen Bericht über diese Waffen. Wir danken den [ETH.GetAdjective] für ihre unauffällige Handhabung der Situation."
 DARK_eth.75.a:0 "Wir danken unseren Freunden von [From.GetNameDef]."
 DARK_eth.75.b:0 "Ein ganz hervorragendes Ergebnis."
 
 DARK_eth.76.t:0 "Waffen entdeckt!"
 DARK_eth.76.desc:0 "Unsere Versuche, [ETH.GetNameDef] heimlich zu versenden, sind gescheitert. Unsere Waffen wurden entdeckt, bevor sie die [ETH.GetAdjective]s erreichen konnten. Das hat [ENG.GetNameDef] verärgert, der das Waffenembargo strikt durchsetzt."
 DARK_eth.76.a:0 "Mist."
 
 DARK_eth.77.t:0 "[From.GetNameDef] verstößt gegen Waffenembargo"
 DARK_eth.77.desc:0 "In einer für [ETH.GetNameDef] bestimmten Kiste wurden Waffen entdeckt. Die Kiste konnte zur Regierung von [From.GetNameDef] zurückverfolgt werden. Obwohl diese bestreitet, Kenntnis von der Kiste zu haben, ist es offensichtlich, dass sie gegen das Waffenembargo verstoßen hat, das wir zu Beginn der Feindseligkeiten zwischen [ETH.GetNameDef] und [ITA.GetNameDef] verhängt haben. Wir dürfen nicht zulassen, dass diese eklatante Missachtung der Rechtsstaatlichkeit ungestraft bleibt!"
 DARK_eth.77.a:0 "Wie können sie es wagen!"
 
 DARK_eth.78.t:0 "[From.GetNameDef] widersetzt sich offen dem Waffenembargo"
 DARK_eth.78.desc:0 "In offener Missachtung des Waffenembargos gegen [ETH.GetNameDef] und [ITA.GetNameDef] hat [From.GetNameDef] versucht, Waffen an [ETH.GetNameDef] zu schicken und das Waffenembargo als unfair und offensichtlich zugunsten von [ITA.GetNameDef] verurteilt. Die öffentliche Meinung ist auf ihrer Seite, aber wir können nicht zulassen, dass das Waffenembargo einfach ignoriert wird!"
 DARK_eth.78.a:0 "Setzen Sie das Embargo durch."
 DARK_eth.78.b:0 "Lassen Sie es dieses eine Mal raus."
 DARK_eth.78.c:0 "Wir können dieses Embargo nicht durchsetzen." 
    DARK_eth.79.t:0 "[From.GetName] blockiert Waffenlieferung"
    DARK_eth.79.desc:0 "[From.GetAdjective]-Behörden haben unsere Waffenlieferungen aufgrund des Waffenembargos gestoppt. Wir haben eine offizielle Rüge der [From.GetAdjective]-Regierung erhalten, weil wir es gewagt haben, gegen ihr Handelsembargo zu verstoßen. Darüber hinaus scheinen sie als Vergeltungsmaßnahme einige Unternehmen unseres Landes auf die schwarze Liste gesetzt zu haben. Es sieht so aus, als würde [ETH.GetNameDef] ihre Waffen in absehbarer Zeit nicht erhalten."
    DARK_eth.79.a:0 "Unmoralische Kretins."
    DARK_eth.79.b:0 "Moment, ich dachte, sie hätten das Embargo aufgehoben?"
    DARK_eth.80.t:0 "[From.GetName] lässt Waffen durch"
    DARK_eth.80.desc1:0 "Unsere Waffen scheinen das von [From.GetNameDef] verhängte Embargo unbeschadet passiert zu haben. Von der [From.GetAdjective]-Regierung gibt es keine offizielle Stellungnahme, daher können wir nur davon ausgehen, dass die Waffen entweder heimlich oder auf lokaler Ebene durchgelassen wurden. Dies schwächt zwar die Autorität des Waffenembargos etwas, wir können jedoch nicht davon ausgehen, dass [From.GetNameDef] dies automatisch immer zulassen wird. Vielleicht wird ihre Haltung mit der Zeit nachlassen."
    DARK_eth.80.desc2:0 "Unsere Waffen wurden sicher über [From.GetNameDef] nach [ETH.GetNameDef] geliefert. Diese freudige Überraschung wurde durch die Ankündigung der [From.GetAdjective]-Regierung, das Waffenembargo gegen [ETH.GetNameDef] zu beenden, noch verstärkt. Es scheint, dass der öffentliche Druck auf dieses ungerechte Embargo die [From.GetAdjective]-Beamten endgültig belastet hat. Sie haben außerdem alle zuvor vom Embargo betroffenen Waffen an [ETH.GetNameDef] freigegeben."
    DARK_eth.80.a:0 "Sieg für [ETH.GetNameDef]!"
    DARK_eth.81.t:0 "[From.GetName] sendet Waffen"
    DARK_eth.81.desc:0 "Wir haben von unseren Freunden in [From.GetNameDef] eine Waffenlieferung erhalten, die uns im Kampf gegen die [ITA.GetAdjective] helfen soll."
    DARK_eth.81.a:0 "Wir werden diese Freundlichkeit nicht vergessen."
    
 DARK_eth.82.t:0 "[From.GetName] erzwingt das Ende des Embargos"
 DARK_eth.82.desc:0 "Wir wurden heimlich von [From.GetAdjective] Diplomaten kontaktiert, die ihre Unzufriedenheit mit der aktuellen Politik des Waffenembargos gegen [ETH.GetNameDef] zum Ausdruck brachten. Sie behaupten, [ITA.GetNameDef] sei den Verlust öffentlicher Unterstützung und den Verlust des internationalen Vertrauens in die Fairness des Völkerrechts nicht wert. Sie haben uns ein Ultimatum gestellt, das wir nicht ablehnen können. Beenden Sie das Waffenembargo zu unseren Bedingungen und wahren Sie Ihr Gesicht, oder lassen Sie sie es durch ihre Weigerung, sich daran zu halten, nutzlos machen."
 DARK_eth.82.a:0 "Sie lassen uns kaum eine Wahl."
 
 DARK_eth.83.t:0 "[From.GetName] fordert uns auf, das Embargo aufzuheben"
 DARK_eth.83.desc:0 "[From.GetLeader] und die Regierung von [From.GetNameDef] haben uns angefleht, unser Waffenembargo gegen sie aufzuheben. Sie behaupten, sie seien nicht nur die Verteidiger des Krieges, sondern das Waffenembargo treffe sie auch unverhältnismäßig stark, da sie weit weniger Waffenfabriken als ihre Gegner hätten. Zumindest fordern sie, dass wir das Ex-post-facto-Gesetz respektieren und die Waffen freigeben, die ihnen vor Kriegsbeginn geliefert wurden. Die Öffentlichkeit unterstützt [From.GetNameDef] zwar, viele unserer Regierungsvertreter jedoch nicht. Was sollen wir tun?"
 DARK_eth.83.a:0 "Das Embargo bleibt bestehen!"
 DARK_eth.83.b:0 "Wir können die zurückgehaltenen Waffen freigeben."
 DARK_eth.83.c:0 "Geben Sie den Befehl, das Embargo aufzuheben."
    DARK_eth.84.t:0 "[From.GetName] weigert sich, das Embargo aufzuheben"
    DARK_eth.84.desc:0 "Leider scheint [From.GetNameDef] derzeit kein Interesse an einer Beendigung des Waffenembargos gegen unser Land zu haben. Trotz unserer Unterstützung und des zunehmenden Drucks der Bevölkerung, uns gegen die Invasionsmächte zu unterstützen, scheinen die [From.GetAdjective] vorerst damit zufrieden zu sein, das Embargo aufrechtzuerhalten."
    DARK_eth.84.a:0 "Hartnäckige Bastarde."
    DARK_eth.85.t:0 "[From.GetName] veröffentlicht Waffen"
    DARK_eth.85.desc:0 "Obwohl [From.GetNameDef] derzeit nicht bereit ist, das Waffenembargo aufzuheben, ist das Unternehmen bereit, die vor dem Waffenembargo gelieferten Waffen freizugeben. Dies ist zwar nicht das ideale Ergebnis, wird das Problem aber hoffentlich zumindest in der Zwischenzeit eindämmen."
    DARK_eth.85.a:0 "Besser als ein Schlag ins Auge."
    DARK_eth.86.t:0 "[From.GetName] beendet das Embargo"
    DARK_eth.86.desc:0 "[From.GetName] hat angekündigt, das Waffenembargo gegen uns aufzuheben. Das sind hervorragende Neuigkeiten, da [From.GetNameDef]s Verzicht auf die Beteiligung am Embargo dieses praktisch zunichte macht. Wir werden wahrscheinlich bald ein Ende des Embargos erleben und es bald offiziell als politische Maßnahme aufheben."
    DARK_eth.86.a:0 "Wir wussten, dass sie zur Vernunft kommen würden!"
    
 DARK_eth.87.t:0 "[From.GetName] bittet um Unterstützung"
 DARK_eth.87.desc:0 "Während der Krieg in [From.GetNameDef] tobt, wenden sie sich an uns und bitten um unsere Unterstützung in ihrer Not. Sie bitten uns, alles zu tun, was wir können, um die aktuelle Situation zu verbessern. Wir müssen unsere Optionen sorgfältig abwägen." 
 DARK_eth.87.a:0 "Versuchen Sie, ihnen Vorräte zu schicken."
 DARK_eth.87.b:0 "Drohen Sie mit einer Intervention."
    ETH_intervention_warning_tt:0 "§RDAS KANN ZUM KRIEG FÜHREN!§!"
 DARK_eth.87.c:0 "Beenden Sie das Embargo."
 DARK_eth.87.d:0 "Erzwingen Sie mit [ENG.GetNameDef] die Beendigung des Embargos."
 DARK_eth.87.e:0 "Wir können ihnen derzeit nicht helfen."
    DARK_eth.88.t:0 "[From.GetNameDef] lehnt Hilfe ab"
    DARK_eth.88.desc:0 "Unter Berufung auf die aktuellen diplomatischen Spannungen weltweit hat uns [From.GetNameDef] bedauerlicherweise mitgeteilt, dass sie uns derzeit einfach nicht helfen können."
    DARK_eth.88.a:0 "Enttäuschend."
    
 DARK_eth.89.t:0 "[From.GetName] droht mit Intervention"
 DARK_eth.89.desc:0 "[From.GetName] hat gedroht, in unseren Krieg mit [ETH.GetNameDef] einzugreifen, wenn wir nicht sofort Frieden suchen! Sie warnen, dass sie bereit sind, [ETH.GetNameDef] notfalls militärisch zu unterstützen. Es scheint, dass unser Krieg zu einer globalen Krise eskaliert ist."
 DARK_eth.89.a:0 "Von welcher Art Frieden sprechen sie?"
 DARK_eth.89.b:0 "[ENG.GetNameDef] und [FRA.GetNameDef] würden dies doch niemals zulassen?"
 DARK_eth.89.c:0 "Wir werden uns diesen Drohungen nicht beugen!"
    DARK_eth.90.t:0 "[From.GetName] stellt unsere Forderungen"
    DARK_eth.90.desc:0 "Obwohl sie sich noch nicht zum Frieden verpflichtet hat, hat die Regierung von [From.GetNameDef] ihre Bereitschaft zu Gesprächen bewiesen. Sie möchte wissen, welche Art von Frieden wir zwischen ihr und [ETH.GetNameDef] anstreben."
    DARK_eth.90.a:0 "Ein rein weißer Frieden."
    DARK_eth.90.b:0 "Eine Rückkehr Eritreas."
    DARK_eth.90.c:0 "Sie aus dem Horn von Afrika raus."
    DARK_eth.91.t:0 "[From.GetName] bittet um weißen Frieden"
    DARK_eth.91.desc:0 "Durch unsere Gespräche mit [From.GetNameDef] haben wir festgestellt, dass sie sich lediglich ein Ende der Feindseligkeiten zwischen den [ETH.GetAdjective]s und uns wünschen. Da ihnen im Falle einer Weigerung ein globaler Krieg droht, scheint dies der beste Zeitpunkt für einen Rückzug zu sein."
    DARK_eth.91.a:0 "Wir akzeptieren dies."
    DARK_eth.91.b:0 "Frieden ist eine Lüge."
    DARK_eth.92.t:0 "[From.GetName] fordert von Eritrea [ETH.GetNameDef]"
    DARK_eth.92.desc:0 "Im Laufe unserer Gespräche mit [From.GetNameDef] wird uns immer klarer, dass [From.GetNameDef] nicht zufrieden sein wird, bis wir versprechen, den [ETH.GetAdjective]s die Provinz Eritrea zu überlassen. Das wird zu Hause sicherlich nicht gut ankommen, aber haben wir in dieser Angelegenheit wirklich eine Wahl?"
    DARK_eth.92.a:0 "Wir müssen akzeptieren."
    DARK_eth.92.b:0 "Das werden wir niemals akzeptieren!"
    DARK_eth.93.t:0 "[From.GetName] fordert unseren Abzug vom Horn von Afrika"
    DARK_eth.93.desc:0 "Vom ersten Tag an hat [From.GetnameDef] klargestellt, dass sie nur unseren vollständigen Rückzug vom Horn von Afrika akzeptieren werden. Trotz unserer Bemühungen, uns von dieser Grenze abzubringen, scheint [From.GetNameDef] diese Grenze zu seiner roten Linie gemacht zu haben. Wir müssen entweder den Verlust unserer ostafrikanischen Provinzen akzeptieren oder uns auf einen globalen Konflikt einlassen."
    DARK_eth.93.a:0 "Wir können unserem Volk keinen weiteren Weltkrieg aufzwingen."
    DARK_eth.93.b:0 "Wenn sie Krieg wollten, haben sie ihn bekommen!"
        DARK_eth.94.t:0 "[ETH_which_broker] Broker White Peace"
        DARK_eth.94.desc:0 "Unser Hilferuf an [ETH_which_broker_def] blieb nicht unbeantwortet. Sie haben [From.GetNamDef] an den Verhandlungstisch gezwungen und sie dazu gebracht, einem vorläufigen Weißen Frieden zuzustimmen. Jetzt müssen wir ihn nur noch unterzeichnen. Wir könnten ihn ohne wirkliche Konsequenzen ablehnen, aber wäre das wirklich einen weiteren Krieg wert?"
        DARK_eth.94.a:0 "Ein gerechter Frieden."
        DARK_eth.94.b:0 "Wir sind zu nahe daran, einen besseren Deal zu erzwingen."
        DARK_eth.95.t:0 "[From.GetName] lehnt den weißen Frieden ab"
        DARK_eth.95.desc1:0 "Offenbar war [From.GetNameDef] mit dem Friedensabkommen, das [ETH_which_broker_def] für sie vermittelte, nicht zufrieden und hat sich verpflichtet, den Krieg fortzusetzen. Ob dies gut für unser Land ist, bleibt abzuwarten."
        DARK_eth.95.desc2:0 "Obwohl wir [ITA.GetNameDef] dazu bewegen konnten, einem Friedensabkommen zuzustimmen, waren wir bei [ETH.GetNameDef] leider nicht so erfolgreich. Sie haben deutlich gemacht, dass sie glauben, mit Waffengewalt kurz davor zu stehen, ein besseres Friedensabkommen zu erreichen."
        DARK_eth.95.a:0 "Wir haben Ihnen gesagt, dass sie Barbaren sind."
        DARK_eth.95.b:0 "Wir haben es versucht."
        DARK_eth.96.t:0 "[From.GetName] verweigert den Frieden"
        DARK_eth.96.desc:0 "Alle Friedensgespräche mit [From.GetNameDef] sind gescheitert. Sie haben deutlich gemacht, dass sie sich mit nichts weniger als der totalen Unterwerfung von [ETH.GetNameDef] zufrieden geben werden. Wir waren gezwungen, wie versprochen einzugreifen und haben uns auf den bevorstehenden Krieg vorbereitet."
        DARK_eth.96.a:0 "Wir müssen kämpfen, damit unsere Söhne das nicht müssen."
        DARK_eth.97.t:0 "[ETH_which_broker] vermittelt Frieden für Eritrea"
        DARK_eth.97.desc:0 "Unser Hilferuf an [ETH_which_broker_def] blieb nicht unbeantwortet. Sie haben [From.GetNamDef] an den Verhandlungstisch gezwungen und sie zu einem Frieden gezwungen, der sie zur Rückgabe unserer verlorenen Provinz Eritrea zwingt. Jetzt müssen wir nur noch unterschreiben. Wir könnten ohne Konsequenzen ablehnen, aber wäre das wirklich einen weiteren Krieg wert?"
        DARK_eth.97.a:0 "Ein äußerst gerechter Frieden."
        DARK_eth.97.b:0 "Wir könnten einen besseren Frieden erzwingen."
        DARK_eth.98.t:0 "[ETH_which_broker] vermittelt Frieden für Eritrea und Somalia"
        DARK_eth.98.desc:0 "Unser Hilferuf an [ETH_which_broker_def] blieb nicht unbeantwortet. Sie haben [From.GetNamDef] an den Verhandlungstisch gezwungen und sie zu einem Frieden gezwungen, der sie nicht nur zur Rückgabe Eritreas, sondern auch zur Überlassung Somalias an uns zwingt. Dieser Frieden würde die Bedrohung durch [ITA.GetNameDef] für immer aus unserem Land verbannen. Dieser Deal ist besser als alles, was wir uns je hätten vorstellen können. Es gibt keinen Grund, ihn nicht sofort zu unterzeichnen!"
        DARK_eth.98.a:0 "Unser Dank geht an [ETH_which_broker_def]!"
    DARK_eth.99.t:0 "Die [ITA.GetAdjective]-[ETH.GetAdjective]-Krise"
    DARK_eth.99.desc:0 "Mit der erschreckenden Drohung von [ETH_which_broker_def], in den Krieg zwischen [ETH.GetNameDef] und [ITA.GetNameDef] einzugreifen, hat sich die Lage in Afrika dramatisch verschärft. [ETH_which_broker] hat deutlich gemacht, dass [ITA.GetNameDef] für seine Aggressivität im Krieg bestraft werden sollte. Unabhängig davon müssen wir eine Entscheidung treffen: Stimmen wir mit [ETH_which_broker_def] überein oder stehen wir an der Seite von [ITA.GetNameDef], um sicherzustellen, dass der Krieg lokal begrenzt bleibt?"
    DARK_eth.99.a:0 "Der [ETH_which_broker] hat recht."
    DARK_eth.99.b:0 "Wir können nicht zulassen, dass sich eine andere Macht einmischt!"
    DARK_eth.99.c:0 "Ehrlich gesagt ist uns das egal."
    DARK_eth.200.t:0 "[From.GetNameDef] Unterstützt [ETH_which_broker_def]"
    DARK_eth.200.desc:0 "Wir haben die Nachricht erhalten, dass sich [From.GetNameDef] trotz unserer Bemühungen zumindest vorerst für [ETH_which_broker] ausgesprochen hat."
    DARK_eth.200.a:0 "Wie konnten sie nur!?"
    DARK_eth.201.t:0 "[From.GetNameDef] unterstützt uns"
    DARK_eth.201.desc:0 "Wir haben die Nachricht erhalten, dass [From.GetNameDef] beschlossen hat, gemeinsam mit uns gegen eine ausländische Intervention in den Krieg zu kämpfen. Sie haben versprochen, zu versuchen, die aktuelle Krise auf diplomatischem Wege zu lösen."
    DARK_eth.201.a:0 "Wie konnten sie nur!?"
    DARK_eth.202.t:0 "Die Welt gegen uns"
    DARK_eth.202.desc:0 "Unser Appell an die Regierungen von [ENG.GetAdjective] und [FRA.GetAdjective] hat sich als verheerend erwiesen. Jetzt stellt sich nicht nur [ETH_which_broker_def] gegen uns, sondern auch [FRA.GetNamDef] und [ENG.GetNameDef] fordern von uns Frieden und eine Art Wiedergutmachung für [ETH.GetNameDef]. Wir müssen uns ihren Forderungen beugen, wir können nicht gegen die ganze Welt kämpfen."
    DARK_eth.202.a:0 "Ein höchst unrühmliches Ende."
    DARK_eth.202.b:0 "Sie werden es bereuen, [Root.GetLeader] überquert zu haben!"
        DARK_eth.203.t:0 "Den Frieden diktieren"
        DARK_eth.203.desc:0 "[ENG.GetAdjective] und [FRA.GetAdjective] haben sich für unseren Versuch ausgesprochen, den Krieg in [ETH.GetNameDef] zu beenden. Dies hat uns erheblichen Einfluss darauf gegeben, wie der endgültige Frieden aussehen wird."
        DARK_eth.203.a:0 "Eine Rückkehr der verlorenen Provinz von [ETH.GetNameDef]."
        DARK_eth.203.b:0 "Entfernen Sie [ITA.GetNameDef] vom Horn von Afrika."
        DARK_eth.204.t:0 "Der Verlust Eritreas"
        DARK_eth.204.desc:0 "[FRA.GetNameDef], [ENG.GetNameDef] und [ETH_which_broker_def] haben uns zu einem demütigenden Friedensabkommen gezwungen. Wir müssen nicht nur den Krieg ohne Gewinne beenden, sondern auch die Kontrolle über Eritrea an unseren Feind [ETH.GetNameDef] übergeben!"
        DARK_eth.204.a:0 "Das werden wir nicht vergessen..."
        DARK_eth.205.t:0 "Ein Totalverlust"
        DARK_eth.205.desc:0 "Der demütigende Frieden, zu dem uns [FRA.GetNameDef], [ENG.GetNameDef] und [ETH_which_broker_def] gezwungen haben, hat sich als noch schlimmer erwiesen als befürchtet. Nicht nur Eritrea muss an [ETH.GetNameDef] übergeben werden, sondern auch Somalia. Wir haben jeglichen Einfluss in Ostafrika und erheblich an Prestige verloren. Es wird Jahrzehnte dauern, unseren Ruf wiederherzustellen!"
        DARK_eth.205.a:0 "Ein schreckliches Schicksal."
    DARK_eth.206.t:0 "[ENG.GetNameDef] und [FRA.GetNameDef] Standby [ITA.GetNameDef]"
    DARK_eth.206.desc:0 "Unsere Drohung, in [ETH.GetNameDef] einzugreifen, scheint weder bei [FRA.GetAdjective] noch bei [ENG.GetAdjective] gut angekommen zu sein. Obwohl sie [ITA.GetNameDef] nicht direkt unterstützen, haben sie gewarnt, dass sie militärisch eingreifen werden, falls wir dies tun. Wagen wir es jetzt, sowohl [FRA.GetNameDef] als auch [ENG.GetNameDef] anzugreifen?"
    DARK_eth.206.a:0 "Wir dürfen keinen Krieg riskieren."
    DARK_eth.206.b:0 "Sie bluffen!"
        DARK_eth.207.t:0 "[From.GetNameDef] greift ein"
        DARK_eth.207.desc:0 "Es scheint, dass [From.GetNameDef] unsere Warnungen nicht ernst genommen hat, da sie ihre Drohung wahr gemacht haben, in [ETH.GetNameDef] einzugreifen. Halten wir unser Versprechen, selbst einzugreifen?"
        DARK_eth.207.a:0 "Sie haben unseren Bluff durchschaut."
        DARK_eth.207.b:0 "Wir halten, was wir versprechen."
        DARK_eth.208.t1:0 "[From.GetNameDef] greift ein"
        DARK_eth.208.t2:0 "[From.GetNameDef] greift nicht ein"
        DARK_eth.208.desc1:0 "Es scheint, dass [ETH_which_broker_def] unsere Warnungen nicht ernst genommen hat, da sie ihre Drohung wahr gemacht haben, in [ETH.GetNameDef] einzugreifen. Wie angedroht, ist [ENG.GetNameDef] im Namen von [ITA.GetNameDef] militärisch interveniert. Halten wir auch unser Versprechen, selbst einzugreifen?"
        DARK_eth.208.desc2:0 "Es scheint, dass [ETH_which_broker_def] unsere Warnungen nicht ernst genommen hat, denn sie haben ihre Drohung wahr gemacht, in [ETH.GetNameDef] einzugreifen. Trotz des Versprechens, im Falle eines solchen Eingreifens einzugreifen, hat [ENG.GetNameDef] seine Rhetorik zurückgenommen und wird keinen Krieg erklären. Halten wir unser Versprechen, selbst einzugreifen und es alleine zu versuchen?"
        DARK_eth.208.a:0 "Sie haben unseren Bluff durchschaut."
        DARK_eth.208.b:0 "Wir halten, was wir versprechen."
            DARK_eth.209.t:0 "[From.GetNameDef] verweigert Intervention"
            DARK_eth.209.desc:0 "Trotz gegenteiliger Versprechen scheint es, als ob [From.GetNameDef] sich geweigert hat, gegen die Intervention von [ETH_which_broker_def] vorzugehen."
            DARK_eth.209.a:0 "Diese Bastarde haben uns angelogen!"
        DARK_eth.210.t:0 "[FRA.GetName] und [ENG.GetNameDef] Zurück"
        DARK_eth.210.desc:0 "Es scheint, als hätten wir richtig gehandelt, als wir [FRA.GetNameDef] und [ENG.GetNameDef] zum Bluff gezwungen haben, da beide von ihren Drohungen einer militärischen Intervention abgerückt sind. Wir haben nun Macht über [ITA.GetNameDef] und können versuchen, sie zur Unterzeichnung eines Friedensabkommens zu zwingen."
        DARK_eth.210.a:0 "Fordern Sie von Eritrea [ETH.GetNameDef]."
        DARK_eth.210.b:0 "Druck für Eritrea und Somalia."
            DARK_eth.211.t:0 "Ein erzwungener Frieden für Eritrea"
            DARK_eth.211.desc:0 "Nachdem [FRA.GetNameDef] und [ENG.GetNameDef] uns im Stich gelassen hatten, standen wir hilflos da, als [From.GetNameDef] uns ihre Forderungen vorlegte. Uns bleibt leider keine andere Wahl, als ihren Forderungen nachzukommen und [ETH.GetNameDef] die Provinz Eritrea zu überlassen."
            DARK_eth.211.a:0 "Explosion!"
            DARK_eth.212.t:0 "[From.GetName] fordert Frieden zwischen Eritrea und Somalia"
            DARK_eth.212.desc:0 "Nachdem [FRA.GetNameDef] und [ENG.GetNameDef] uns im Stich gelassen haben, müssen wir uns nun allein [From.GetNameDef] entgegenstellen. [From.GetNameDef] hat uns daher ein Ultimatum gestellt: Wir müssen unsere beiden ostafrikanischen Kolonien an [ETH.GetNameDef] übergeben, sonst müssen wir uns der vollen Härte ihrer militärischen Macht stellen. Wir wollen Eritrea und Somalia sicherlich nicht aufgeben, aber haben wir überhaupt eine Wahl?"
            DARK_eth.212.a:0 "Das tun wir nicht."
            DARK_eth.212.b:0 "Lasst sie kommen!"
            DARK_eth.213.t:0 "[From.GetName] macht einen Rückzieher"
            DARK_eth.213.desc:0 "Da [FRA.GetNameDef] und [ENG.GetNameDef] bereitstehen, hat [From.GetNameDef] beschlossen, seine Interventionsdrohung fallen zu lassen. Die Invasion kann in relativer Sicherheit fortgesetzt werden."
            DARK_eth.213.a:0 "Auf Nimmerwiedersehen."
    DARK_eth.214.t:0 "[From.GetNameDef] Ergreift in der Krise die Gegenseite"
    DARK_eth.214.desc:0 "Während die Friedensgespräche zwischen [ITA.GetNameDef] und [ETH_which_broker_def] weitergehen, befinden wir uns nun auf der anderen Seite des Verhandlungstisches als [From.GetNameDef]. Während sich die Gespräche hinziehen, müssen wir uns entscheiden: Setzen wir unseren Standpunkt durch oder geben wir [From.GetNameDef] nach, um Solidarität für das Gemeinwohl zu zeigen?"
    DARK_eth.214.a:0 "[DARK_push_for_whom2]"
    DARK_eth.214.b:0 "[DARK_side_with_whom2]"
        DARK_eth.215.t:0 "[From.GetNameDef] weigert sich, nachzugeben"
        DARK_eth.215.desc1:0 "Im Verlauf der Friedensgespräche wird immer deutlicher, dass [From.GetNameDef] nicht die Absicht hat, seine Position zu ändern. Im Gegenteil, sie haben ihre Haltung nur noch verstärkt. Gerüchten zufolge sind sie im schlimmsten Fall sogar bereit, in den Krieg zu ziehen. Wollen wir wirklich wegen wertlosem Land in [ETH.GetNameDef] in den Krieg ziehen?"
        DARK_eth.215.desc2:0 "Die Friedensgespräche sind nicht nur im Sande verlaufen, sie sind völlig verdorben. [From.GetNameDef] weigert sich nicht nur, nachzugeben, sondern droht mit einer militärischen Intervention und bereitet sich tatsächlich auf die Mobilisierung vor. Es ist klar, dass wir entweder nachgeben oder einen Krieg mit [From.GetName] riskieren müssen. Geben wir unseren eigenen Armeen Befehle?"
        DARK_eth.215.a:0 "Das ist keinen Krieg wert."
        DARK_eth.215.b:0 "Bereiten Sie die Armee auf eine Intervention vor."
        DARK_eth.215.c:0 "Sie wurden gewarnt!"
        DARK_eth.216.t:0 "[From.GetNameDef] gibt nach"
        DARK_eth.216.desc:0 "Angesichts der Kriegsdrohung haben die [From.GetAdjective] einen Rückzieher gemacht und entschieden, dass sich die ganze Angelegenheit nicht lohnt. Wir können nun eine einheitliche Antwort an [ITA.GetNameDef] und [ETH_which_broker_def] senden."
        DARK_eth.216.a:0 "Wir sind froh, dass sie es so gesehen haben wie wir."
        DARK_eth.217.t:0 "Der Interventionskrieg"
        DARK_eth.217.desc:0 "Alle Gespräche sind gescheitert, da sowohl [ENG.GetNameDef] als auch [FRA.GetNameDef] ihre Streitkräfte zur Verteidigung ihrer gewählten Seite in der aktuellen Krise mobilisiert haben. Unsere eigenen Armeen haben begonnen, sich zu mobilisieren, um unser Versprechen, einzugreifen, einzuhalten. Es scheint, als ob die Welt erneut in den Krieg gezogen ist, diesmal jedoch um [ETH.GetNameDef]."
        DARK_eth.217.a:0 "Der Sieg wird unser sein!"
    DARK_eth.218.t:0 "[From.GetNameDef] bleibt draußen"
    DARK_eth.218.desc:0 "Es scheint, dass [From.GetNameDef] kein Interesse daran gezeigt hat, in unsere aktuelle Situation einzugreifen, ungeachtet der Drohungen von [ETH_which_broker_def]. Möglicherweise sind wir hier auf uns allein gestellt."
    DARK_eth.218.a:0 "Feige!"
    DARK_eth.219.t:0 "[From.GetNameDef] und [ETH_which_broker_def] bündeln ihre Kräfte"
    DARK_eth.219.desc:0 "Es scheint, dass unser Appell an [ENG.GetNameDef] und [FRA.GetNameDef] nicht wie geplant funktioniert hat. Der eine weigerte sich, sich einzumischen, der andere stellte sich auf die Seite des Feindes. Die [From.GetAdjective]-Diplomaten helfen derzeit dabei, ein Friedensabkommen mit den [From.GetAdjective]-Diplomaten auszuarbeiten!"
    DARK_eth.219.a:0 "Was steht in diesem Friedensabkommen?"
        DARK_eth.220.t:0 "Ein Friedensabkommen mit [ETH_which_broker_def]"
        DARK_eth.220.desc:0 "Obwohl wir uns Unterstützung von [From.GetNameDef] gewünscht hätten, erleichtert der fehlende Widerstand unseren Diplomaten die Zusammenarbeit mit ihren Kollegen in [ETH_which_broker_def]. Wir haben begonnen, gemeinsam ein Friedensabkommen auszuarbeiten, das wir [ITA.GetNameDef] vorlegen werden. Wir müssen nur noch entscheiden, was genau [ETH.GetNameDef] nach der Unterzeichnung des Friedensvertrags bekommen soll."
        DARK_eth.220.a:0 "Sie werden Eritrea zurückgeben."
        DARK_eth.220.b:0 "Sie werden Eritrea zurückgeben und Somalia aufgeben."
        DARK_eth.221.t:0 "Der Frieden für Eritrea"
        DARK_eth.221.desc:0 "Wir haben endlich das gemeinsam ausgehandelte Friedensabkommen von [From.GetNameDef] und [ETH_which_broker_def] erhalten. Darin heißt es, dass wir Eritrea an [ETH.GetNameDef] übergeben und auf jegliche Ansprüche auf ihr Land verzichten müssen. Viele Mitglieder unserer Regierung mögen einen Krieg nicht, aber weit weniger freuen sich über ihn, wenn wir zahlenmäßig so stark unterlegen wären."
        DARK_eth.221.a:0 "Es ist besser, einfach unsere Verluste zu begrenzen."
        DARK_eth.222.t:0 "Der ungerechtfertigte Frieden"
        DARK_eth.222.desc:0 "Wir haben endlich den gemeinsam ausgehandelten Friedensvertrag von [From.GetNameDef] und [ETH_which_broker_def] erhalten. Darin heißt es, dass wir nicht nur Eritrea an [ETH.GetNameDef] übergeben, sondern auch Somalia aufgeben und auf alle Ansprüche auf Ostafrika verzichten müssen. Dieser Frieden ist demütigend, aber hätten wir überhaupt eine Chance gegen [From.GetNameDef] und [ETH_which_broker_def]?"
        DARK_eth.222.a:0 "Besser als das, was wir später bekommen würden."
        DARK_eth.222.b:0 "Das werden wir niemals akzeptieren."
        DARK_eth.223.t:0 "Die Frage der Intervention"
        DARK_eth.223.desc:0 "Zwischen [ITA.GetNameDef] und [ETH_which_broker_def] ist ein Krieg ausgebrochen, da letzterer seine Interventionsvereinbarung mit [ETH.GetNameDef] einhält. Alle Augen richten sich nun auf uns, da wir ebenfalls eine Interventionsvereinbarung mit [ETH.GetNameDef] unterzeichnet haben. Halten wir diese Vereinbarung ein oder ist es einfach zu riskant?"
        DARK_eth.223.a:0 "Selbstverständlich halten wir uns an die Vereinbarung."
        DARK_eth.223.b:0 "Krieg geht einen Schritt zu weit."
    DARK_eth.224.t:0 "[From.GetNameDef] gibt nach"
    DARK_eth.224.desc:0 "Obwohl wir derzeit versuchen, [ETH_which_broker_def] daran zu hindern, in [ETH.GetNameDef] einzugreifen, scheint es, als ob [From.GetNameDef] sich nicht so sehr darum kümmert, wie wir dachten, da sie sich entschieden haben, die Sache auf Eis zu legen. Setzen wir diesen Kreuzzug allein fort oder geben wir auf und überlassen [ETH_which_broker_def] die Sache?"
    DARK_eth.224.a:0 "Wir machen es alleine."
    DARK_eth.224.b:0 "Ohne [From.GetNameDef] lohnt es sich nicht."
        DARK_eth.225.t:0 "[From.GetNameDef] gibt nach"
        DARK_eth.225.desc:0 "Obwohl [From.GetNameDef] uns zuvor Hilfe versprochen hatte, scheint es nun, dass unser Konflikt mit [ETH_which_broker_def] kein Interesse mehr an ihm hat. Leider bringt uns das in eine Situation, die zunehmend unhaltbar erscheint. Wir sollten zumindest sehen, von welcher Art von Frieden [ETH_which_broker_def] spricht."
        DARK_eth.225.a:0 "Untreue Huren!"
        DARK_eth.226.t:0 "[From.GetNameDef] fordert uns heraus"
        DARK_eth.226.desc:0 "Unsere Herausforderung an [ITA.GetNameDef] ist nicht unbemerkt geblieben, und es sieht so aus, als ob [From.GetNameDef] in den Ring gestiegen ist, um zu versuchen, uns daran zu hindern, in [ETH.GetNameDef] einzugreifen. Glauben wir, dass [From.GetNameDef] wirklich bereit ist, deswegen in den Krieg zu ziehen?"
        DARK_eth.226.a:0 "Trotzdem sind wir das nicht."
        DARK_eth.226.b:0 "Lassen Sie es uns herausfinden!"
            DARK_eth.227.t:0 "[From.GetNameDef] gibt nach"
            DARK_eth.227.desc:0 "Sie haben zwar eine harte Rhetorik an den Tag gelegt, aber [From.GetNameDef] hat sich entschieden, nachzugeben, anstatt einen echten Krieg großen Ausmaßes zu riskieren. Unser Risiko hat sich ausgezahlt."
            DARK_eth.227.a:0 "Wie wir es erwartet hatten."
            DARK_eth.228.t:0 "[From.GetNameDef] greift ein"
            DARK_eth.228.desc:0 "Unser Versuch, [From.GetNameDef] von der Beteiligung abzuhalten, ist gescheitert. Sie sind mit [ITA.GetNameDef] in den Krieg gezogen, um [ETH.GetNameDef] zu verteidigen. Halten wir unser Versprechen, ebenfalls in den Krieg zu ziehen?"
            DARK_eth.228.a:0 "So sei es."
            DARK_eth.228.b:0 "Krieg ist ein bisschen..."
            
 DARK_eth.229.t:0 "[ETH.GetLeader] Bietet Treue"
 DARK_eth.229.desc:0 "Haile Selassie I., Kaiser von [ETH.GetNameDef], wurde entthront! Wir haben eine Nachricht vom Hauptverschwörer, Haile Selassie Gugsa, erhalten, der angeboten hat, sich friedlich zu ergeben und uns und König Viktor Emanuel III. die Treue zu schwören. Die Ablehnung dieses Vorschlags hätte verheerende Folgen für die Heimat, da wir in den Augen der Bevölkerung diesen Krieg unnötig verlängern würden. Nehmen wir dieses einmalige Angebot an?"
 DARK_eth.229.a:0 "Endlich Sieg!"
 DARK_eth.229.b:0 "Nein, wir müssen sie vollständig vernichten!"
    DARK_eth.230.t:0 "[From.GetLeader] Akzeptiert Kapitulation"
    DARK_eth.230.desc:0 "Es scheint, dass [Root.GetLeader]s Versuch, Frieden mit den [From.GetAdjective]-Beamten zu vermitteln, erfolgreich war. Die Feindseligkeiten wurden eingestellt und [Root.GetLeader] hat [From.GetNameDef] die Treue geschworen. Es mag nicht die ehrenhafteste Tat sein, aber es war der einzige Weg, das Überleben unseres Volkes zu sichern."
    DARK_eth.230.a:0 "Frieden, um jeden Preis."
    DARK_eth.231.t:0 "[From.GetLeader] verweigert die Kapitulation"
    DARK_eth.231.desc:0 "Es scheint, dass [Root.GetLeader]s Versuch, Frieden mit den [From.GetAdjective]-Beamten zu vermitteln, nicht nach Plan verlaufen ist. Die [From.GetAdjective]-Beamten haben unser großzügiges Friedensangebot abgelehnt und wollen offensichtlich jeden Anschein von Autonomie, den wir möglicherweise haben, beenden. Haile Selassie Gugsa, der Putschistenführer gegen den ehemaligen Kaiser Haile Selassie, ist durch dieses Scheitern in Ungnade gefallen. An seiner Stelle hat Ras Hailu Tekle Haymanot die Führung des Landes übernommen. Eine Fortsetzung der Feindseligkeiten ist absehbar."
    DARK_eth.231.a:0 "Wir hätten es besser wissen müssen."

 #232 is hidden
 
 DARK_eth.233.t:0 "[From.GetName] Forderungen Dschibuti"
 DARK_eth.233.desc:0 "Unsere missliche Lage hat unzählige Geier angelockt. Die [From.GetAdjective]s sind da keine Ausnahme. Sie besitzen die Dreistigkeit, Dschibuti, auch bekannt als Französisch-Somaliland, von uns zu fordern. Sie drohen mit möglichen Militärschlägen, falls wir ihren Forderungen nicht nachkommen. Obwohl wir eine Garnison in Französisch-Somaliland stationiert haben, haben sie gegen einen längeren Angriff kaum eine Chance. Sollen wir einfach aufgeben und retten, wen wir retten können?"
 DARK_eth.233.a:0 "Gut, nimm es."
 DARK_eth.233.b:0 "Wir werden solchen Drohungen nicht nachgeben!"
    DARK_eth.234.t:0 "[From.GetName] Cedes Djibouti"
    DARK_eth.234.desc:0 "Unser Spiel mit [From.GetNameDef] hat sich ausgezahlt. Sie haben uns Dschibuti kampflos, wenn auch mit viel diplomatischem Geschick, überlassen. Wir sind bereits in das Gebiet einmarschiert und haben begonnen, die Verwaltung zu übernehmen. Der Garnison von [From.GetAdjective] wurde im Rahmen unserer Vereinbarung mit [From.GetNameDef] freie Fahrt gewährt."
    DARK_eth.234.a:0 "Dschibuti ist in unserer Reichweite!"
    DARK_eth.235.t:0 "[From.GetName] weist unsere Forderung zurück"
    DARK_eth.235.desc:0 "Die [From.GetAdjective] haben unsere Forderung nach Dschibuti nicht gut aufgenommen. Als Reaktion darauf haben sie lediglich die Garnison verstärkt und uns herausgefordert, zu kommen. Wir müssen entscheiden, ob wir den Krieg riskieren können."
    DARK_eth.235.a:0 "Wir werden Dschibuti erobern, so oder so!"
    
 DARK_eth.236.t:0 "[From.GetName] fordert Britisch-Somaliland"
 DARK_eth.236.desc:0 "Wir sind derzeit überfordert und versuchen, unser Imperium von allen Seiten zu schützen. Das ist den [ETH.GetAdjective]s wohlbekannt. Sie haben verlangt, dass wir Britisch-Somaliland unter ihre Kontrolle stellen. Sollten wir uns weigern, drohen sie uns mit Krieg. Obwohl wir keinen Teil unseres Imperiums aufgeben wollen, ist Britisch-Somaliland angesichts der Gefahr, dass sich ein weiteres Land unseren Feinden anschließt, wirklich schützenswert?"
 DARK_eth.236.a:0 "Gut, nimm es."
 DARK_eth.236.b:0 "Wir werden solchen Drohungen nicht nachgeben!"
    DARK_eth.237.t:0 "[From.GetName] tritt Britisch-Somaliland ab"
    DARK_eth.237.desc:0 "Unser Spiel mit [From.GetNameDef] hat sich ausgezahlt. Sie haben uns Britisch-Somaliland kampflos, wenn auch mit viel diplomatischem Geschick, überlassen. Wir sind bereits in das Gebiet einmarschiert und haben begonnen, die Verwaltung zu übernehmen. Den in Britisch-Somaliland verbliebenen [From.GetAdjective] Soldaten wurde im Rahmen unseres Abkommens mit [From.GetNameDef] freies Geleit gewährt."
    DARK_eth.237.a:0 "Britisch-Somaliland gehört uns!"
    DARK_eth.238.t:0 "[From.GetName] weist unsere Forderung zurück"
    DARK_eth.238.desc:0 "Die [From.GetAdjective]-Regierung hat unsere Forderung nach Britisch-Somaliland scharf zurückgewiesen und sich standhaft geweigert, auch nur einen Zentimeter Land abzugeben. Uns liegen Berichte vor, dass die [From.GetAdjective]-Truppen jenseits der Grenze mit Verteidigungsvorbereitungen für den Fall eines Angriffs begonnen haben. Sollen wir ihnen nachgeben?"
    DARK_eth.238.a:0 "Sie können nicht ihr gesamtes Reich retten!"
    
 DARK_eth.239.t:0 "[From.GetName] fordert unsere Unterwerfung"
 DARK_eth.239.desc:0 "In den letzten Jahren hat sich [From.GetNameDef] zu einer starken Regionalmacht entwickelt und allen Unterwerfungsversuchen widerstanden. Nun versuchen sie, ihren Einfluss über ihre unmittelbaren Grenzen hinaus auszudehnen. Als einer ihrer nächsten Nachbarn haben sie sich an uns gewandt, um unsere Unterwerfung zu fordern. Im Gegenzug für unsere Dienste haben sie versprochen, sich für die rechtmäßige Rückgabe unseres Landes einzusetzen, das uns von den [ENG.GetAdjective] genommen wurde. Unterwerfen wir uns dieser neuen Macht?"
 DARK_eth.239.a:0 "Wir schwören unsere Treue."
 DARK_eth.239.b:0 "Wir [YEM.GetAdjective] würden zuerst sterben!"
    DARK_eth.240.t:0 "[From.GetName] akzeptiert Unterwerfung"
    DARK_eth.240.desc:0 "Da sie unserer Macht nicht angemessen widerstehen kann, hat die [YEM.GetAdjective]-Regierung unsere Oberherrschaft über ihr Land akzeptiert und versprochen, uns in allen unseren zukünftigen Angelegenheiten zu unterstützen."
    DARK_eth.240.a:0 "Exzellent!"
    DARK_eth.241.t:0 "[From.GetName] lehnt Unterwerfung ab"
    DARK_eth.241.desc:0 "Die [From.GetAdjective]-Diplomaten, mit denen wir sprachen, waren empört, als wir unsere Unterwerfungsforderungen vorbrachten. Sie erklärten, dass jeder [YEM.GetAdjective] eher sterben würde, als sich uns zu unterwerfen. Unsere Militäroffiziere haben begonnen, Vorbereitungen für den vermuteten Befriedungskrieg mit [From.GetNameDef] zu treffen."
    DARK_eth.241.a:0 "Sie wussten, was eine Ablehnung mit sich bringen würde!"
    
 DARK_eth.242.t:0 "[From.GetName] fragt nach Flugzeugen"
 DARK_eth.242.desc:0 "Wir wurden von Vertretern von [From.GetNameDef] angesprochen. Sie sind in unser Land gekommen, um einige unserer Flugzeuge für den Eigengebrauch zu kaufen, falls wir bereit sind, ihnen welche zu verkaufen."
 DARK_eth.242.a:0 "Verkaufen Sie ihnen Kämpfer."
 DARK_eth.242.b:0 "Leiten Sie einen Teil unserer Kampfflugzeugproduktion um."
 DARK_eth.242.c:0 "Verkaufen Sie ihnen ein paar Bomber."
 DARK_eth.242.d:0 "Leiten Sie einen Teil unserer Bomberproduktion um."
 DARK_eth.242.e:0 "Den Verkauf ablehnen."
    DARK_eth.243.t:0 "[From.GetName] verkauft Kämpfer"
    DARK_eth.243.desc:0 "Wir waren bei [From.GetNameDef] erfolgreich, da sie sich bereit erklärt haben, uns einige ihrer überzähligen Kampfflugzeuge zu verkaufen."
    DARK_eth.243.a:0 "Wir sind sehr dankbar!"
    DARK_eth.244.t:0 "[From.GetName] verkauft Bomber"
    DARK_eth.244.desc:0 "Wir waren bei [From.GetNameDef] erfolgreich, da sie sich bereit erklärt haben, uns einige ihrer überzähligen Bomber zu verkaufen."
    DARK_eth.244.a:0 "Großartig!"
    
 DARK_eth.245.t:0 "Haile Selassie kehrt auf das Feld zurück"
 DARK_eth.245.desc:0 "Mit der Rückkehr von Haile Selassie auf den Thron von [ETH.GetNameDef] kann er unsere Truppen erneut in die Schlacht führen!"
 DARK_eth.245.a:0 "Der Kaiser kehrt zurück!"
 
 DARK_eth.246.t:0 "[Root.GetLeader]s Paranoia"
 DARK_eth.246.desc:0 "Der Stress, eine wütende Kolonie zu führen, hat [Root.GetLeader] endgültig gepackt. Die ständigen Attentate und Terroranschläge haben bei [Root.GetLeader] eine schwere Paranoia ausgelöst. Er postiert rund um die Uhr bewaffnete Wachen vor seiner Tür und misstraut jedem, selbst vertrauten Helfern. Darüber hinaus hat er eine Politik der diskriminierungsfreien Aussonderung unerwünschter Personen eingeführt, was unser Verhältnis zu den Einheimischen belastet."
 DARK_eth.246.a:0 "Sie kommen nicht aus den Wänden [From.GetLeader]!"
 
 DARK_eth.247.t:0 "[From.GetName] schlägt einen Panafrikanischen Kongress vor"
 DARK_eth.247.desc:0 "Der Funke der Revolution ist übergesprungen, und sie haben sich ihrer Verbreitung verschrieben, insbesondere in ganz Afrika. Als kommunistisches afrikanisches Land sind sie im Geiste der Kameradschaft und Brüderlichkeit auf uns zugekommen und haben uns zu einer gemeinsamen kooperativen Bewegung, dem Panafrikanischen Kongress, eingeladen. Sollen wir uns mit unseren Brüdern und Schwestern zusammentun?"
 DARK_eth.247.a:0 "Gemeinsam werden wir die Revolution verbreiten!"
 DARK_eth.247.b:0 "Wir müssen die Vorhut sein, nicht [From.GetNameDef]!"
    DARK_eth.248.t:0 "[From.GetName] tritt dem Kongress bei"
    DARK_eth.248.desc:0 "Unser Appell an [From.GetNameDef] war erfolgreich! Sie haben zugestimmt, dem Panafrikanischen Kongress beizutreten, und ihre Vertreter sind bereits auf dem Weg nach [Root.Capital]."
    DARK_eth.248.a:0 "Gemeinsam werden wir die Revolution verbreiten!"
    DARK_eth.249.t:0 "[From.GetName] lehnt Sitz im Kongress ab"
    DARK_eth.249.desc:0 "Es scheint, dass unsere Annäherungsversuche bei [From.GetNameDef] auf Gleichgültigkeit, wenn nicht gar auf offenen Ärger gestoßen sind. [From.GetNameDef] hat keinerlei Interesse an einer Mitgliedschaft im Panafrikanischen Kongress geäußert und unsere Vertreter abgewiesen. Sie scheinen darauf aus zu sein, die Dinge auf ihre eigene Art zu machen."
    DARK_eth.249.a:0 "Wir hätten großartig zusammen sein können."
    
 DARK_eth.250.t:0 "Aufstand der Adligen"
 DARK_eth.250.desc:0 "Die Reformen Haile Selassies I. stießen seit seiner Zeit als Regent Ras Tefari auf Widerstand des Adels, doch diesmal ging er möglicherweise zu weit. Der Adel, der seine Position nicht länger durch die Zentralisierungsbemühungen Haile Selassies I. untergraben sehen wollte, erhob sich unter der Führung von Ras Hailu Tekle Haimonot von Gojjam, der von loyalen Adligen aus seinem Hausarrest befreit wurde. Der letzte Kampf um [Root.GetNameDef]s Zukunft hat begonnen."
 DARK_eth.250.a:0 "Für den Kaiser!"
 
 DARK_eth.251.t:0 "Rückkehr zur Normalität"
 DARK_eth.251.desc:0 "Der Krieg ist vorbei, und [Root.GetNameDef] ist irgendwie unbeschadet davongekommen. Nachdem die Bedrohung von außen endlich gebannt ist, müssen nun auch die Angelegenheiten im Inland geregelt werden. Die Adligen, einst mit dem Krieg beschäftigt, schmieden erneut Pläne, und wir müssen darauf achten, dass wir umsichtig mit ihnen umgehen."
 DARK_eth.251.a:0 "Politik also wie immer."
    DARK_enable_nobles_tt:0 "Aktiviert die Mechanik „§YNoble Influence§!“.\n"
 
 DARK_eth.252.t:0 "Graziani aus dem Amt gedrängt"
 DARK_eth.252.desc:0 "Es scheint, als ob Grazianis Paranoia mittlerweile sogar den Beamten in Rom auf die Nerven geht. Seine Eskapaden, seine extreme Vorsicht und seine brutale Unterdrückung zwangen die Regierung, seine Absetzung und die Ersetzung durch einen gemäßigteren Gouverneur anzuordnen: den Herzog von Aosta, der mit sofortiger Wirkung die Macht im Land übernehmen wird."
 DARK_eth.252.a:0 "Vielleicht können wir jetzt etwas Frieden finden."
 
 DARK_eth.253.t:0 "Eritreischer Nationalismus auf dem Vormarsch"
 DARK_eth.253.desc:0 "Proteste sind in Eritrea alltäglich geworden. Lokale Banditen und Scharfmacher haben Teile der Bevölkerung aufgehetzt und ihnen eine eritreische Identität eingeredet, die mit unserer unvereinbar sei. Sie fordern Freiheit, und obwohl wir diese Proteste niederschlagen, scheinen einige von ihnen dadurch ermutigt worden zu sein. Wir müssen uns eine Lösung für dieses Problem überlegen."
 DARK_eth.253.a:0 "Eritrea war schon immer [ETH.GetAdjective]!"
 
 DARK_eth.254.t:0 "Somalischer Nationalismus auf dem Vormarsch"
 DARK_eth.254.desc:0 "Wir hatten schon immer Probleme mit den Menschen in der Ogaden-Region, die sich nicht mit unserem Imperium identifizieren wollten. Doch auf die Widerspenstigkeit, die uns nach der Übernahme Somalilands entgegenschlug, waren wir nicht vorbereitet. Unsere Soldaten wurden ununterbrochen schikaniert, und Angreifer, zweifellos von unseren Feinden bezahlt, terrorisierten die Zivilbevölkerung schwer. Wir haben unser Bestes getan, um die Region selbst zu verwalten, aber sie ist möglicherweise unkontrollierbar. Wir müssen entweder drastische Maßnahmen in Betracht ziehen oder zugeben, dass wir dringend die Hilfe gewisser Somalier benötigen."
 DARK_eth.254.a:0 "Undankbare Barbaren!"
 
 #255 is a hidden event
     DARK_eth.256.t:0 "Der Einfluss des Adels wächst"
     DARK_eth.256.desc:0 "Die Machtstruktur am kaiserlichen Hof unterliegt je nach den dort herrschenden Machenschaften ständigen Veränderungen und Verschiebungen. Dieses Mal hat sich der Adel durchgesetzt und sich einige Zugeständnisse des Kaisers gesichert."
     DARK_eth.256.a:0 "Werden die Intrigen nie aufhören?"
     DARK_eth.257.t:0 "Der Einfluss des Adels schwindet"
     DARK_eth.257.desc:0 "Die Machtstruktur des kaiserlichen Hofes unterliegt je nach den verschiedenen Machenschaften, die dort vor sich gehen, Veränderungen und Verschiebungen. Diesmal hat der Kaiser die Oberhand behalten. Mehrere niederrangige Adlige wurden bei der Intrige gegen den Kaiser ertappt und unter Hausarrest gestellt. Die Intrigen wurden – zumindest vorerst – gestoppt."
     DARK_eth.257.a:0 "Das ist der Preis des Verrats."
 #258 is a hidden event
     DARK_eth.259.t:0 "Adlige nutzen die Kriegsbeteiligung"
     DARK_eth.259.desc:0 "Der anhaltende Krieg zwingt uns, alle verfügbaren Ressourcen einzusetzen. Leider haben einige unserer weniger gewissenhaften Adligen beschlossen, dies zu ihrem Vorteil zu nutzen und ihre Unterstützung zu nutzen, um Zugeständnisse zu erzwingen. Uns bleibt kaum eine andere Wahl, als das Angebot vorerst anzunehmen, da wir sonst den Krieg unnötig gefährden würden."
     DARK_eth.259.a:0 "Sie werden bekommen, was sie verdienen, wenn das hier vorbei ist!"
     
 DARK_eth.260.t:0 "Die blutige Revolution"
 DARK_eth.260.desc:0 "Die Revolution begann so gut, dass unsere Agenten den Kaiser schnell ermorden und die Kontrolle über die Stadt Addis Abeba übernehmen konnten. Im ganzen Land erhoben sich unsere Soldaten, um ihre Unterdrücker anzugreifen, doch trotz dieses hervorragenden Starts unterschätzten wir unsere Gegner. Anstatt zu zersplittern, sammelte sich der Adel um Ras Hailu, der während der Einnahme von Addis Abeba dem Hausarrest entkam. Er wurde zum neuen Kaiser ausgerufen, und der Adel hat seine Truppen aufgestellt, um uns entgegenzutreten. Die Revolution wird mit Waffengewalt entschieden."
 DARK_eth.260.a:0 "Eine letzte Hürde auf dem Weg zur Freiheit, Genossen!"
    
 DARK_eth.261.t:0 "[From.GetNameDef] versucht, Allianzen zu festigen"
 DARK_eth.261.desc:0 "[From.GetLeader], Anführer der [From.GetFactionName], hat uns ein interessantes Angebot unterbreitet. [From.GetLeader] möchte unsere Beziehungen aus dem Römischen Pakt erneuern und zusammenarbeiten, um aggressive Nationen einzudämmen. Die Umsetzung dieses Angebots würde unsere Zusammenarbeit wiederaufnehmen. Bleibt nur noch die Frage der Führung."
 DARK_eth.261.a:0 "Wir schließen uns gerne mit [From.GetNameDef] zusammen."
 DARK_eth.261.b:0 "Unsere Verbündeten und wir vereinbaren, uns der [From.GetFactionName] anzuschließen."
 DARK_eth.261.c:0 "[From.GetNameDef] sollte sich unserer Allianz anschließen."
 DARK_eth.261.d:0 "Es liegt nicht an Ihnen [From.GetName], es liegt an uns."
    DARK_eth.262.t:0 "[From.GetName] lehnt Allianzvorschlag ab"
    DARK_eth.262.desc:0 "Diplomaten von [From.GetNameDef] haben uns mit Bedauern darüber informiert, dass [From.GetNameDef] derzeit leider nicht daran glaubt, unsere Bündnisse wieder in Einklang bringen zu können."
    DARK_eth.262.a:0 "Schade."
    DARK_eth.263.t:0 "[From.GetName] bittet um Führung"
    DARK_eth.263.desc:0 "Diplomaten aus [From.GetNameDef] haben positiv auf unsere Versöhnungsangebote reagiert. Es gab jedoch einen Knackpunkt. [From.GetNameDef] ist der Ansicht, dass sie anstelle von uns Primus inter Pares sein sollten, und verweist auf ihren angeblich größeren politischen und militärischen Einfluss."
    DARK_eth.263.a:0 "Fair genug."
    DARK_eth.263.b:0 "Das können wir doch sicher klären?"
    DARK_eth.264.t:0 "[From.GetName] akzeptiert unsere Führung"
    DARK_eth.264.desc:0 "[From.GetNameDef] hat unsere Anfrage zur Führung unserer neu vereinten Allianz angenommen."
    DARK_eth.264.a:0 "Gemeinsam sind wir stark."
    DARK_eth.265.t:0 "[From.GetName] lehnt unseren Versuch ab, die Führung zu übernehmen"
    DARK_eth.265.desc:0 "Die [From.GetAdjective] haben klargestellt, dass [From.GetNameDef] entweder der Erste unter Gleichen in unserer neu gegründeten Fraktion sein wird oder wir unsere Allianzen nicht zusammenführen können. Können wir es uns wirklich leisten, uns eine solche Gelegenheit für so einen Quatsch wie die Führung entgehen zu lassen?"
    DARK_eth.265.a:0 "Gut, wenn Sie darauf bestehen."
    DARK_eth.265.b:0 "Wir könnten niemals [From.GetAdjective] Führung akzeptieren!"
    DARK_eth.266.t:0 "[From.GetName] akzeptiert unsere Führung"
    DARK_eth.266.desc:0 "Nach vielen Stunden des Hin und Her haben die [From.GetAdjective]-Diplomaten endlich unsere Rolle als Anführer unseres neu vereinten Bündnisses akzeptiert. Sie sind vielleicht nicht glücklich darüber, aber sie erkennen an, dass dies für die Zusammenarbeit unserer Länder notwendig ist."
    DARK_eth.266.a:0 "So wie es sein sollte."
    DARK_eth.267.t:0 "[From.GetName] lehnt unseren Versuch ab, die Führung zu übernehmen"
    DARK_eth.267.desc:0 "Nach stundenlangem Hin und Her sind die Verhandlungen mit [From.GetNameDef] an der Frage der Führung gescheitert. Es ist klar geworden, dass nicht nur alle Hoffnung auf einen erfolgreichen Zusammenschluss des Bündnisses verloren ist, sondern dass auch die Beziehungen zwischen unseren Ländern auf absehbare Zeit beschädigt sind."
    DARK_eth.267.a:0 "Prahlerische Bastarde."
    
 DARK_eth.268.t:0 "Die Kontrolle über AOI übernehmen?"
 DARK_eth.268.desc:0 "Möchten Sie die Kontrolle über [AOI.GetNameDef] übernehmen?"
 DARK_eth.268.a:0 "Übernehmen Sie nicht die Kontrolle."
 DARK_eth.268.b:0 "Übernehmen Sie die direkte Kontrolle."
 
 DARK_eth.269.t:0 "[From.GetName] schlägt „The [ETH_get_tri_quad]“ vor"
 DARK_eth.269.desc:0 "[From.GetNameDefCap] hat seine Fühler ausgestreckt, um unser Interesse an einem Dreimächtepakt zwischen uns, den [ETH_initiator.GetAdjective]s[ETH_are_there_italians] und dem [JAP_fascism.GetAdjective] zu ermitteln. Die [ETH_initiator.GetAdjective]s argumentieren, dass es angesichts der zunehmend feindseligen globalen Meinung, die sich gegen unsere Bemühungen richtet, zwingend notwendig sei, dass wir uns gegenseitig unterstützen."
 DARK_eth.269.a:0 "Eine ausgezeichnete Idee. Wir werden den Pakt unterzeichnen."
 DARK_eth.269.b:0 "Nein, wir dürfen nicht riskieren, die Welt gegen uns aufzubringen."
    DARK_eth.270.desc:0 "[ETH_initiator.GetNameDefCap] hat unser Interesse an einem [ETH_get_tri_quad] zwischen uns, den [JAP_initiator.GetAdjective][ETH_are_there_italians] und den [GER_fascism.GetAdjective]s erkundet. Die [ETH_initiator.GetAdjective]s argumentieren, dass unsere gegenseitige Unterstützung angesichts der zunehmend feindseligen globalen Stimmung gegen unsere Bemühungen unerlässlich sei. Die [GER_fascism.GetAdjective]s haben ihre Unterstützung für die Idee bereits zugesagt."
    DARK_eth.271.t:0 "[ETH_get_tri_quad] Signiert"
    DARK_eth.271.desc:0 "Die [From.GetAdjective]-Regierung hat sich bereit erklärt, das vorgeschlagene [ETH_get_tri_quad] zu unterzeichnen und sich verpflichtet, im Kriegsfall an unserer Seite zu stehen."
    DARK_eth.272.t:0 "[From.GetNameDefCap] Lehnt [ETH_get_tri_quad] ab"
    DARK_eth.272.desc:0 "Die [From.GetAdjective]-Regierung hat das vorgeschlagene [ETH_get_tri_quad] abgelehnt und zieht es vor, allein weiterzumachen."
    DARK_eth.273.t:0 "[From.GetNameDefCap] signiert das [ETH_get_tri_quad]"
    DARK_eth.273.desc:0 "Die [From.GetAdjective]-Regierung hat sich bereit erklärt, das vorgeschlagene [ETH_get_tri_quad] zu unterzeichnen und sich verpflichtet, im Kriegsfall an unserer Seite zu stehen."
  
    
 #Ethiopian News Events
 DARK_eth.100.t:0 "Europa in Flammen"
 DARK_eth.100.desc:0 "Das Undenkbare ist geschehen. [ENG.GetName] und [FRA.GetName] sind trotz jahrzehntelanger Zusammenarbeit aneinandergeraten. Die Unfähigkeit der beiden Länder, ein Abkommen zwischen den [ITA.GetAdjective]n und den [ETH.GetAdjective]n auszuhandeln, nachdem die [ETH.GetAdjective]n die einfallenden [ITA.GetAdjective]n aufs Meer zurückgedrängt hatten, hat einen Konflikt entfacht, der erneut ganz Europa in Flammen zu setzen droht, während verschiedene Länder beide Seiten beäugen, um zu entscheiden, mit wem sie sich lieber verbünden würden."
 DARK_eth.100.a:0 "[ETH.GetNameDef] ist zu weit gegangen!"
 DARK_eth.100.b:0 "[ITA.GetNameDef] muss fallen!"
 DARK_eth.100.c:0 "Über [ETH.GetNameDef], wirklich?"
 
 DARK_eth.101.t:0 "[ETH.GetNameDef] geht als Sieger hervor"
 DARK_eth.101.desc1:0 "Der Zweite Italienisch-Abessinische Krieg ist zu Ende, und erneut gingen die [ETH.GetAdjective] als Sieger hervor. Dieses Mal jedoch gaben sich [ETH.GetNameDef] nicht mit einem bloßen weißen Frieden zufrieden. Nachdem [ETH.GetNameDef] [ITA.GetNameDef] vollständig aus dem Horn von Afrika vertrieben hatte, forderte [ETH.GetNameDef] die Rückgabe der vor einem Jahrhundert verlorenen Provinz Eritrea. Da ihm kaum eine andere Wahl blieb, sah sich [ITA.GetLeader] gezwungen, diesen demütigenden Frieden zu unterzeichnen. Viele sehen darin einen Wendepunkt für [ETH.GetNameDef], und manche prophezeien sogar, dass sie zum Japan Afrikas werden."
 DARK_eth.101.desc2:0 "Der Zweite Italienisch-Abessinische Krieg ist zu Ende, und erneut gingen die [ETH.GetAdjective] als Sieger hervor. Dieses Mal jedoch gab sich [ETH.GetNameDef] nicht mit einem bloßen weißen Frieden zufrieden. Nachdem [ITA.GetNameDef] vollständig aus dem Horn von Afrika vertrieben worden war, forderte [ETH.GetNameDef] die Provinzen Eritrea und Somalia zurück und entfernte [ITA.GetNameDef] damit vollständig aus der Region. Ohne internationale Hilfe hatte [ITA.GetLeader] kaum eine andere Wahl, als diesen demütigenden Frieden zu unterzeichnen. Viele sehen darin einen Wendepunkt für [ETH.GetNameDef], und manche prophezeien sogar, dass sie zum Japan Afrikas werden."
 DARK_eth.101.a:0 "Es war ein Zufall!"
 DARK_eth.101.b:0 "Und bleib draußen!"
 DARK_eth.101.c:0 "Ist [ETH.GetNameDef] stark oder [ITA.GetNameDef] erbärmlich?"
 DARK_eth.102.t:0 "[ETH.GetNameDef] erzielt ein Patt mit [ITA.GetNameDef]"
 DARK_eth.102.desc:0 "Wieder einmal haben die [ITA.GetAdjective]s bewiesen, dass sie [ETH.GetNameDef] nicht erobern können. Beide Seiten haben einem Waffenstillstand zugestimmt und damit die Feindseligkeiten offiziell beendet. Trotz der Verluste auf beiden Seiten und des gemeldeten Senfgaseinsatzes durch [ITA.GetNameDef] konnte keine Seite Territorium gewinnen, da beide Seiten den bereits festgelegten Grenzen zustimmten. Obwohl das Spiel unentschieden endete, erklärten die meisten internationalen Beobachter den Krieg aufgrund der erheblichen materiellen Unterlegenheit von [ETH.GetNameDef] zum Sieg. Nur die Zeit wird zeigen, ob [ETH.GetLeader] dies nutzen kann."
 DARK_eth.102.a:0 "Das verdammte Gelände ist unpassierbar!"
 DARK_eth.102.b:0 "Und bleib draußen!"
 DARK_eth.102.c:0 "Es scheint, dass Adowa kein bloßer Zufall war."
 
 DARK_eth.103.t:0 "Die zweite [ITA.GetAdjective] Krise"
 DARK_eth.103.desc:0 "Es scheint, als hätten die Faschisten in [ITA.GetNameDef] aufgrund ihrer Misserfolge in [ETH.GetNameDef] ihre Unterstützung in der Bevölkerung verloren. Angesichts zunehmender Feindseligkeit vor Ort und eines Verlusts an politischer Unterstützung musste Benito „Duce“ Mussolini in Ungnade zurücktreten. König Viktor Emanuel III. wird das Land bis zur Abhaltung von Neuwahlen führen."
 DARK_eth.103.a:0 "Raus mit den Faschisten!"
 DARK_eth.103.b:0 "Der Frieden ist nicht mehr weit entfernt."
 DARK_eth.103.c:0 "Das wird die Dinge ändern ..."
 
 DARK_eth.104.t:0 "Der [ITA.GetAdjective] Bürgerkrieg"
 DARK_eth.104.desc:0 "Die anhaltende Unbeliebtheit des Krieges in [ETH.GetNameDef] hat die Unterstützung der Faschisten in [ITA.GetNameDef] stark geschwächt. Dies veranlasste [ITA.GetLeader], drastische Maßnahmen zu ergreifen, um an der Macht zu bleiben, und Demonstranten und politische Dissidenten wegzusperren. Unglücklicherweise für sie erzürnte dies nur einen Großteil der Bevölkerung, die sich nun gewaltsam gegen die Faschisten wandte. Die Situation spitzte sich zu, als König Viktor Emanuel von [ITA.GetNameDef] Frieden forderte. Als [ITA.GetLeader] sich weigerte, widerrief Viktor Emanuel sein Amt als Premierminister. Dies löste einen bewaffneten Konflikt aus, in dessen Verlauf mehrere Schwarzhemden den Königspalast stürmten. Der Angriff scheiterte, und [ITA.GetNameDef] befindet sich nun in offener Revolte gegen den König."
 DARK_eth.104.a:0 "Siegen und wir gewinnen!"
 DARK_eth.104.b:0 "Tod dem Duce!"
 DARK_eth.104.c:0 "Sie können den Krieg doch nicht fortsetzen?"
 DARK_eth.104.d:0 "Das wird die Dinge ändern ..."
 
 DARK_eth.105.t:0 "Misstrauensvotum gegen Mussolini"
 DARK_eth.105.desc:0 "Die Popularität der Faschisten in Italien war nach ihrer Niederlage im Italienisch-Abessinien-Krieg stark gesunken. Die Bevölkerung ging auf die Straße und forderte Mussolinis Rücktritt aufgrund seiner Rolle in der ganzen Affäre. Daraufhin sprach der Große Rat der Faschisten Mussolini das Misstrauen aus und forderte seinen Rücktritt und seine Ersetzung durch den gemäßigteren Pietro Badoglio. Obwohl er Berichten zufolge privat wütend war, erklärte sich Benito Mussolini, Il Duce, bereit, zurückzutreten und sich aus dem öffentlichen Leben zurückzuziehen. Die Faschisten haben derzeit noch die Kontrolle über die Regierung, doch Pietro Badoglio verspricht ein neues Italien, das nicht dem Beispiel Mussolinis folgen wird. Nur die Zeit wird zeigen, ob er Recht hat."
 DARK_eth.105.a:0 "Auf Nimmerwiedersehen!"
 DARK_eth.105.b:0 "Mussolini, von der Macht entfernt!?"
 DARK_eth.105.c:0 "Wird dies die Politik Italiens wirklich ändern?"
 
 DARK_eth.106.t:0 "Der [ITA.GetAdjective] Bürgerkrieg"
 DARK_eth.106.desc:0 "Gestern Abend brach in den Straßen Roms ein Krieg aus, als Benito Mussolini, der umstrittene Führer der italienischen faschistischen Partei, sich weigerte, zurückzutreten. Wochenlang hatten in den Straßen des Landes Demonstrationen stattgefunden, die seine Absetzung forderten und viele dieser Demonstrationen wurden von den berüchtigten Schwarzhemden aufgelöst. Letzte Woche stellte Viktor Emanuel III., König von Italien, der faschistischen Regierung offenbar ein Ultimatum: Sie müsse die aktuelle Situation bereinigen, andernfalls würde er die Regierung persönlich entlassen. Statt die Macht abzugeben, scheinen die Faschisten entschlossen zu sein, ihre Herrschaft mit Gewalt fortzusetzen. König Viktor Emanuel III. führt nun die Opposition an, um die Faschisten zu stürzen und die Demokratie in Italien wiederherzustellen. Experten berichten, dass der König derzeit die Oberhand hat, die Hartnäckigkeit der Faschisten jedoch nicht unterschätzt werden sollte."
 DARK_eth.106.a:0 "Siegen und wir gewinnen!"
 DARK_eth.106.b:0 "Tod dem Duce!"
 DARK_eth.106.d:0 "Das wird die Dinge ändern ..."
 
 DARK_eth.107.t:0 "Der [ITA.GetAdjective] Verrat"
 DARK_eth.107.desc:0 "Nach Kriegsende wurde erwartet, dass die Nationen, die mit {ITA.GetNameDef] gekämpft hatten, sich an die von ihnen unterzeichneten Vorkriegsverträge halten würden. Unerwartet war jedoch, dass [ITA.GetNameDef] selbst die Vorkriegsverträge missachten und sich weigern würde, die getroffenen Vereinbarungen einzuhalten. Dies hat viele der anderen beteiligten Länder sehr verärgert, und [ITA.GetNameDef] wurde Berichten zufolge aus seiner eigenen Fraktion ausgeschlossen. Es ist möglich, dass ein weiterer Krieg ausbricht. Nur die Zeit wird es zeigen."
 DARK_eth.107.a:0 "Was uns gehört, gehört uns!"
 DARK_eth.107.b:0 "Tod dem Verräter!"
 DARK_eth.107.d:0 "Eine überraschende Wendung."
 
 DARK_eth.108.t:0 "Der Vertrag von Belgrad"
 DARK_eth.108.desc:0 "Der Krieg ist vorbei und [YUG.GetNameDef] wurde besiegt. Nun treffen sich die siegreichen [ITA.GetAdjective] mit ihren Mitstreitern, um einen endgültigen Friedensvertrag auszuhandeln. Basierend auf Verträgen, die vor dem Krieg geschlossen wurden, wurden die ehemaligen [YUG.GetAdjective]-Staaten aufgeteilt, da sie von [ITA.GetNameDef]s Verbündeten beansprucht wurden. Übrig blieb nur ein kleiner [SER.GetNameDef]."
 DARK_eth.108.a:0 "Alles was war, ist!"
 DARK_eth.108.b:0 "So wie es sein sollte!"
 DARK_eth.108.d:0 "Ein unrühmliches Ende."
 
 DARK_eth.109.t:0 "[From.GetNameDef] Schließt den Suezkanal"
 DARK_eth.109.desc:0 "In einem überraschenden Schritt hat die Regierung von [From.GetNameDef] den Suezkanal in Ägypten bis auf Weiteres geschlossen. Obwohl [From.GetLeader] von „regionaler Instabilität“ und „Kanalsicherheit“ sprach, ist die Kritik an [ITA.GetNameDef] und ihrem aggressiven Vorgehen in [ETH.GetNameDef] unleugbar. [ITA.GetLeader] verurteilte die Schließung des Kanals mit der Begründung, dass sie gegen die Konvention von Konstantinopel verstoße, die allen Schiffen sowohl in Kriegs- als auch in Friedenszeiten die Durchfahrt durch den Suezkanal garantiert."
 DARK_eth.109.a:0 "Es war das Richtige."
 DARK_eth.109.b:0 "Ein klarer Verstoß gegen das Völkerrecht!"
 DARK_eth.109.c:0 "Willkommene Neuigkeiten."
 DARK_eth.109.d:0 "Eine interessante Entwicklung."
 
 DARK_eth.110.t:0 "[From.GetNameDef] Öffnet den Suezkanal wieder"
 DARK_eth.110.desc1:0 "Aufgrund der Tatsache, dass [From.GetNameDef] in einen Krieg verwickelt ist, wurde der Suezkanal mit sofortiger Wirkung wieder geöffnet."
 DARK_eth.110.desc2:0 "Nach dem Ende des Italienisch-Abessinien-Krieges verkündete [From.GetLeader] stolz, dass die Sicherheitsbedrohung für den Suezkanal vorüber sei und der Geschäftsbetrieb ab sofort wieder normal weitergeführt werde."
 DARK_eth.110.a:0 "Mögen wir es nie wieder schließen müssen."
 DARK_eth.110.b:0 "Wurde auch Zeit."
 DARK_eth.110.c:0 "Nun, das ist bedauerlich."
 
 DARK_eth.111.t:0 "[From.GetName] beendet das Waffenembargo"
 DARK_eth.111.desc:0 "In einer überraschenden Ankündigung hat [From.GetLeader] von [From.GetNameDef] heute ein Ende des gegen die [ETH.GetAdjective] im Krieg gegen die [ITA.GetAdjective] verhängten Waffenembargos verkündet. Die Regierung von [From.GetNameDef] gibt an, die Lage neu bewertet und festgestellt zu haben, dass ein Embargo gegen den Verteidiger eines Angriffskrieges gegen den Geist des Völkerrechts verstoßen würde. Externe Beobachter glauben, dass die öffentliche Meinung der eigentliche Grund für diese Entscheidung war. Die Regierung von [ETH.GetNameDef] reagierte auf die Nachricht mit Lob für [From.GetLeader] und die [From.GetAdjective] und dankte ihnen für ihre Unterstützung. Die [ITA.GetAdjective] hingegen verurteilte den Schritt und verwies auf angebliche [ETH.GetAdjective] Kriegsverbrechen als Beweis für die Berechtigung ihres Krieges. Es gibt auch unbestätigte Berichte über massive Unzufriedenheit mit dieser Entscheidung von [From.GetAdjective] afrikanischen Kolonialbeamten."
 DARK_eth.111.a:0 "Hervorragende Neuigkeiten!"
 DARK_eth.111.b:0 "Die [From.GetAdjective] würden Afrikaner uns vorziehen!?"
 DARK_eth.111.c:0 "Es war das Richtige."
 DARK_eth.111.d:0 "Aber ist es zu wenig und zu spät?"
 
 DARK_eth.112.t:0 "[ITA.GetLeader] Gegen die Welt"
 DARK_eth.112.desc:0 "Als die Großmächte [FRA.GetNameDef], [ENG.GetNameDef] und [ETH_which_broker_def] ihren gemeinsamen Wunsch nach einem Kriegsende in [ETH.GetNameDef] verkündeten, ahnte niemand, was darauf folgen würde. Anstatt sich einem sogenannten „demütigenden Frieden“ zu unterwerfen, erklärte [ITA.GetAdjective] Staatschef [ITA.GetLeader] allen Mächten den totalen Krieg und erklärte sie zu Staatsfeinden. Niemand erwartet, dass [ITA.GetNameDef] den darauffolgenden Konflikt gewinnen wird. Wetten können nur darauf basieren, wie lange [ITA.GetLeader]s Regime bestehen bleibt."
 DARK_eth.112.a:0 "Wir werden versuchen, es schnell zu machen …"
 DARK_eth.112.b:0 "TOD DEN TYRANNEN!"
 DARK_eth.112.c:0 "Tragen Sie mich für vor Weihnachten ein."
 
 DARK_eth.113.t:0 "[From.GetLeader] Lehnt Intervention ab"
 DARK_eth.113.desc:0 "Als [ETH_which_broker_def] seine Truppen mobilisierte, um [ETH.GetNameDef] vor [ITA.GetNameDef] zu verteidigen, ging man davon aus, dass [From.GetNameDef], der ebenfalls Hilfe versprochen hatte, ebenfalls mobilisieren würde. Als es jedoch so weit war, zog sich [From.GetNameDef] zurück und verkündete, dass sie nicht in den Krieg ziehen würden. Es scheint, als hätten sie die Nerven im Stich gelassen, obwohl [ITA.GetNameDef] und [ETH_which_broker_def] ihre Kriegsmaschinerie hochfahren."
 DARK_eth.113.a:0 "Was für ein Haufen wertloser Weicheier!"
 DARK_eth.113.b:0 "Sich selbst retten, clever."
 DARK_eth.113.c:0 "Eine interessante Wahl."
 
 DARK_eth.114.t:0 "Waffenembargo durch Krieg unterbrochen"
 DARK_eth.114.desc:0 "[ENG.GetNameDef] und [FRA.GetNameDef] haben ein Waffenembargo gegen [ETH.GetNameDef] und [ITA.GetNameDef] verhängt, obwohl die meisten Beobachter der Meinung sind, dass [ETH.GetNameDef] weitaus stärker betroffen ist. Da jedoch kürzlich Krieg ausgebrochen ist, scheint das Waffenembargo nicht mehr durchgesetzt zu werden, da es schlicht wichtigere Dinge gibt. Dies scheint für [ETH.GetNameDef] eine Chance zu sein, dringend benötigte Vorräte zu beschaffen."
 DARK_eth.114.a:0 "Wir haben wichtigere Dinge, um die wir uns kümmern müssen."
 DARK_eth.114.b:0 "So viel dazu."
 DARK_eth.114.c:0 "Schade."
 DARK_eth.114.d:0 "Hoffentlich bekommen wir Hilfe."
 DARK_eth.114.e:0 "Aber wird es [ETH.GetNameDef] speichern?"
 #115 is the hidden trigger for 114

