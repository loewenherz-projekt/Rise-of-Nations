 ETH_part_of_italy:0 "Teil von Italien"
 ETH_part_of_italy_desc:0 ""
 ETH_victor_emperor:0 "Kaiser von Äthiopien"
 ETH_victor_emperor_desc:0 "Viktor Emanuel III. hat sich nun selbst zum Kaiser von Äthiopien ernannt. Dies wird allerdings nur von Japan und Deutschland anerkannt, verschafft uns jedoch weltweit großes Prestige."
 ETH_education_in_ethiopia:0 "Bildungsprogramm"
 ETH_education_in_ethiopia_desc:0 "Wir müssen die Äthiopier erziehen, damit sie nach der Eroberung Afrikas Teil unseres glorreichen Reiches werden können."
 ETH_divide_and_conquer:0 "Teile und herrsche"
 ETH_divide_and_conquer_desc:0 "Wir müssen die Strategie des Teilens und Herrschens aus der Antike anwenden, um den äthiopischen Separatismus erfolgreich einzudämmen."
 ETH_form_autonomous:0 "Gründung der Autonomen Staatlichen Straßengesellschaft"
 ETH_form_autonomous_desc:0 "Die Autonome Staatliche Straßengesellschaft wird für die Staatsangelegenheiten wichtige Straßen und Eisenbahnen verstaatlichen."
 ETH_italian_colony:0 "Italienisch-Ostafrika"
 ETH_italian_colony_desc:0 "Italien erwies sich einmal als fähig, zu erobern und glorreiche Kolonialsiege zu erringen"
 ETH_imperial_road:0 "Baue die Kaiserstraße"
 ETH_imperial_road_desc:0 "Die Kaiserstraße dient als notwendige Infrastruktur zur Verwaltung der äthiopischen Länder und verbindet die stärker entwickelten Länder im Norden mit der Hauptstadt des Dominions."
 ETH_governorate:0 "Aufteilung Äthiopiens in Gouvernorate"
 ETH_governorate_desc:0 "Durch die Aufteilung Äthiopiens in verschiedene Verwaltungsgebiete haben wir die Möglichkeit, auf lokaler Ebene zu agieren."
 ETH_increase_military_presence:0 "Äthiopien militarisieren"
 ETH_increase_military_presence_desc:0 "Die Militarisierung Äthiopiens ist der erste Schritt zur Bedrohung der britischen Besitzungen in Afrika"
 ETH_civilian_finances:0 "Zivilwirtschaft"
 ETH_civilian_finances_desc:0 "Ein Gleichgewicht zwischen zivilen und militärischen Angelegenheiten ist wichtig, insbesondere in Friedenszeiten"
 ETH_fascist_colonialism:0 "Faschistischer Kolonialismus"
 ETH_fascist_colonialism_desc:0 "Die faschistische Ideologie verfolgt im Umgang mit Kolonien eine andere Denkweise als die Unterdrücker in Ägypten und Algerien."
 ETH_fortify_keypoints:0 "Verstärken Sie die Schlüsselpunkte"
 ETH_fortify_keypoints_desc:0 "Die Verteidigung unserer Häfen ist für unsere Versorgung äußerst wichtig und gefährdet einen vollständigen Sieg in Afrika"
 ETH_fuel_stocks:0 "Kraftstoffvorräte"
 ETH_fuel_stocks_desc:0 "Vor einem Krieg ist es wichtig, Treibstoff aufzufüllen. Wenn wir es schaffen, die Kapazitäten des Landes zu erreichen, sind wir bereit für eine Offensive."
 ETH_merge_addis:0 "Zusammenlegung des Gouvernements Addis Abeba"
 ETH_merge_addis_desc:0 "Es ist besser, unsere Nation weiter zu stabilisieren, als sie in schwierigen Zeiten zu spalten."
 ETH_form_bank:0 "Bilden Sie die äthiopische Nationalbank"
 ETH_form_bank_desc:0 "Wir müssen in den unzivilisierten Ländern, die wir gerade erobert haben, eine funktionierende Gesellschaft organisieren, die uns gute finanzielle Vorteile bringen wird."
 ETH_armed_forces:0 "Italienische Streitkräfte in Ostafrika"
 ETH_armed_forces_desc:0 "Wir müssen in Ostafrika eine Armee aufstellen, um die Briten bei Bedarf abzuwehren."
 ETH_landforces:0 "Modernisierung der Infanterie"
 ETH_landforces_desc:0 "Die Infanterie in der Region ist mittlerweile veraltet und die Briten könnten sie mit Panzerbataillonen und Luftnahunterstützung problemlos überrennen."
 ETH_airforce:0 "Italienische Luftwaffe"
 ETH_airforce_desc:0 "Die Vorbereitung der Flugzeuge in der Region wird es uns ermöglichen, Angriffe auf britische Schiffe im Indischen Ozean und im Roten Meer durchzuführen."
 ETH_navy:0 "Italienische Marine"
 ETH_navy_desc:0 "Der italienische Marinekommandant stimmte zu, uns Marineverstärkungen in die Region zu schicken, um die britische Versorgung des britischen Raj zu gefährden"
 ETH_airfield_contrustion:0 "Somalische Flugplätze"
 ETH_airfield_contrustion_desc:0 "Eine funktionierende Luftwaffe ist genauso wichtig wie eine funktionierende Armee. Ohne sie werden wir gegen die britische RAF nicht gewinnen."
 ETH_africa:0 "Italienische Kommandanten"
 ETH_africa_desc:0 "Die Kommandeure der italienischen Armee wurden zu uns geschickt, um einen Widerstand zu organisieren. Der Sieg in Afrika wird bald kommen!"
 ETH_italian_develop:0 "Italienische Industriehilfe"
 ETH_italian_develop_desc:0 "Italien muss in der Region große Investitionen tätigen, bevor sich dies auszahlt."
 ETH_east:0 "Militärpolizei"
 ETH_east_desc:0 "Eine in der Region stets einsatzbereite Polizei wird jeden Separatismus unterbinden und gleichzeitig ein gewisses Maß an kultureller Freiheit bewahren."
 ETH_national_identity:0 "Äthiopische Nationalidentität eindämmen"
 ETH_national_identity_desc:0 "Die äthiopische nationale Identität wird es nicht mehr geben! Die italienische Kultur muss die äthiopische Nation niedertrampeln und sie reassimilieren."
 ETH_eastafrica:0 "Offensiven in Afrika"
 ETH_eastafrica_desc:0 "Die Teilnahme an italienischen Offensiven gibt uns die Möglichkeit, Gebiete in der Region zu erobern."
 ETH_cotton_farms:0 "Baumwollfarmen"
 ETH_cotton_farms_desc:0 "Ein großer Teil der äthiopischen Arbeitskräfte ist auf Baumwollfarmen beschäftigt"
 ETH_somaliland:0 "Somaliland entwickeln"
 ETH_somaliland_desc:0 "Nach der Eroberung Somalilands könnte es interessant sein, die Region zu entwickeln und das Beste daraus zu machen."
 ETH_three:0 "Der Dreijahresplan"
 ETH_three_desc:0 "Drei Jahre italienischer Investitionen in der Region werden sich auszahlen"
 ETH_balanced_civ_and_mil:0 "Ausgewogene zivile und militärische Industrie"
 ETH_balanced_civ_and_mil_desc:0 "Wir haben ein gutes Gleichgewicht zwischen der militärischen und der zivilen Industrie erreicht"
 ETH_italian_development:0 "Industrialisierung in Äthiopien"
 ETH_italian_development_desc:0 "Ohne italienische Investitionen können wir keine Industrialisierung durchführen, aber mit ihnen könnten wir zu einer großen Kolonialmacht werden, vergleichbar mit Ägypten."
 ETH_armored_car:0 "Entwicklung gepanzerter Fahrzeuge"
 ETH_armored_car_desc:0 "Gepanzerte Fahrzeuge sind in offenem Wüstengelände, in dem wir kämpfen müssen, sehr gut geeignet."
 ETH_british_africa:0 "Eroberung Britisch-Afrikas"
 ETH_british_africa_desc:0 "In vielen Teilen Britisch-Afrikas werden wir als Befreier gesehen, die Bevölkerung ist mit unseren militärischen Aktionen einverstanden."
 ETH_jungles:0 "Dschungelkrieg"
 ETH_jungles_desc:0 "Der Kampf im Dschungel wird bald eine wichtige Rolle spielen, insbesondere im Kongo und anderen Dschungeln Afrikas."
 ETH_royal:0 "Konferenz in Addis Abeba"
 ETH_royal_desc:0 "Nach dem Sieg in Afrika müssen wir entscheiden, was unser nächster Schritt ist: eine Eroberung des Pazifiks mit Unterstützung der italienischen Marine oder ein Angriff auf die Sowjetunion vom Iran aus?"
 ETH_german_cas:0 "Deutsche Stukas"
 ETH_german_cas_desc:0 "Die deutschen Stukas werden unsere militärischen Aktionen in Afrika unterstützen."
 ETH_general_staff:0 "Den Generalstab bilden"
 ETH_general_staff_desc:0 "Durch die Bildung des Generalstabs wird die mangelnde Vorbereitung unserer Streitkräfte in der Region beseitigt."
 ETH_indoctrination:0 "Faschistische Indoktrination"
 ETH_indoctrination_desc:0 "Wir müssen der Bevölkerung Äthiopiens die faschistische Ideologie aufzwingen und in den Schulen darüber unterrichten."
 ETH_victory_in_africa:0 "Sieg in Afrika"
 ETH_victory_in_africa_desc:0 "Ein Sieg in Afrika bedeutet, dass wir einen weiteren Kontinent erobern können. Das Italienische Römische Reich wird wiedergeboren!"
 ETH_pacific:0 "Pazifikfeldzug"
 ETH_pacific_desc:0 "Wir müssen unsere japanischen Verbündeten im Pazifik unterstützen."
 ETH_middleeast:0 "Nahost-Kampagne"
 ETH_middleeast_desc:0 "Wir müssen unsere deutschen Verbündeten in der Sowjetunion unterstützen."
 ETH_threat:0 "Bedrohung durch die See"
 ETH_threat_desc:0 "Wir müssen eine maritime Bedrohung für die indische Versorgungslinie im Indischen Ozean und im Roten Meer darstellen."
 ETH_navalbases:0 "Bauen Sie die Marinestützpunkte auf"
 ETH_navalbases_desc:0 "Die Marinestützpunkte sind wichtig für unsere Versorgung in der Region."
 ETH_bombeur:0 "Marine-Stukas"
 ETH_bombeur_desc:0 "Die italienische Luftwaffe wird uns 200 Marinebomber schicken, um die britische Marine in der Region zu bombardieren."
 ETH_subs:0 "Handelsverbot"
 ETH_subs_desc:0 "Die Hälfte der durchfahrenden Konvois ist versenkt, und plötzlich sind sie alle irgendwann verschwunden …"
 
 ETH_gas_reform:0 "Modern Warfare-Adaption"
 ETH_gas_reform_desc:0 "Trotz aller Modernisierungsbemühungen waren wir nicht auf einen modernen Krieg vorbereitet. Der Feind hat das abscheulichste Mittel der modernen Kriegsführung auf uns losgelassen: Senfgas! Die Italiener beherrschen den Himmel und bombardieren unsere Soldaten ununterbrochen, während diese in Deckung gehen, und vergasen uns, sobald sie unseren Sieg fürchten. Es gibt Techniken, um die Auswirkungen dieser Angriffe abzumildern. Wir müssen nur sicherstellen, dass unsere gesamte Armee diese Lektionen lernt. Am besten, bevor wir überrannt werden."
 ETH_triumph_in_africa:0 "Triumph in Afrika"
 ETH_triumph_in_africa_desc:0 "Wir haben es geschafft! Die Italiener wurden aus unserem Land vertrieben und unsere Souveränität erneut geschützt! Wir haben die Ehre unserer Väter aus der Schlacht von Adua bewahrt und unsere Treue zum Imperium bewiesen."
 ETH_restoration:0 "Salomonische Wiederherstellung"
 ETH_restoration_desc:0 "Zu lange wurde der Kaiser durch die Macht der regionalen Adligen behindert und musste Zugeständnisse machen, nicht zum Wohle des Landes, sondern zum Wohle der Adligen. Wir haben daran gearbeitet, die Macht zu zentralisieren und die Salomonische Thronfolge zu reformieren, die so viele Probleme verursacht hat. Endlich ist es soweit. Wir werden unser ganzes Vertrauen in den Kaiser und seine Kinder setzen. Äthiopien wird wiedergeboren!"
 ETH_extend_line:0 "Verlängerung der Dagghabur-Linie"
 ETH_extend_line_desc:0 "Unsere südliche Linie droht überrannt zu werden, sollte unser Vormarsch dort gestoppt werden. Obwohl wir südlich von Dagghabur Verteidigungsanlagen errichtet haben, unsere eigene „Maginot-Linie“, hält nichts unsere Feinde davon ab, diese einfach zu umgehen. Wenn wir den Feind wirklich zurückhalten wollen, müssen wir diese Verteidigungslinie so weit ausbauen, dass sie alle möglichen Zugangspunkte zu unserem Land abdeckt."
 ETH_new_techniques:0 "Moderne Strategems"
 ETH_new_techniques_desc:0 "Die alten Methoden haben ausgedient. Wir können uns nicht mehr darauf verlassen, den Feind einfach mit unseren Männern zu überfallen, um zu gewinnen. Da unsere Waffen immer ausgefeilter werden, müssen wir darauf achten, dass unsere Taktik nicht ins Hintertreffen gerät, ungeachtet der Ehre dieser Taktik."
 ETH_break_arms_embargo:0 "Verhandeln Sie das Waffenembargo"
 ETH_break_arms_embargo_desc:0 "Als die Italiener ihre Invasion begannen, verhängten Briten und Franzosen ein umfassendes Waffenembargo, wohl wissend, dass dies nur den Italienern helfen würde. Sie gingen sogar so weit, Waffen zu beschlagnahmen, die für unsere Sache gespendet worden waren. Jetzt sind wir noch schlechter ausgerüstet als je zuvor, und wenn wir uns wehren wollen, müssen wir versuchen, dieses Embargo mit allen Mitteln zu brechen."
 ETH_jap_support:0 "Japanischer Support"
 ETH_jap_support_desc:0 "Japan hat uns trotz unserer Appelle bisher auch diplomatische Hilfe verweigert. Die japanische Bevölkerung unterstützt uns und sieht in unserem Widerstand gegen die europäische Einmischung eine Verbundenheit mit uns. Jetzt müssen wir diese Unterstützung nur noch in offizielle Unterstützung umsetzen."
 ETH_ger_support:0 "Deutscher Support"
 ETH_ger_support_desc:0 "Ausgerechnet die Deutschen haben uns mit Nachschub versorgt. Nicht die Demokratien, nicht die Beschützer des Liberalismus, nicht die Revolutionäre, sondern die Nazis. Wir verdanken ihnen viel, und ohne die französische Einmischung hätten wir einen kleinen Berg deutscher Gewehre. Wir sollten sehen, ob diese Unterstützung noch immer glaubwürdig ist."
 ETH_fra_support:0 "Französischer Support"
 ETH_fra_support_desc:0 "Die Franzosen reden zwar gut, doch als es hart auf hart kam, unternahmen sie nichts, um die italienische Invasion zu stoppen. Aufgrund des Waffenembargos beschlagnahmten sie sogar Waffenlieferungen für unser Land und entzogen uns so dringend benötigte Lieferungen. Vielleicht könnte dies neu verhandelt werden?"
 ETH_eng_support:0 "Britische Unterstützung"
 ETH_eng_support_desc:0 "Die britische Öffentlichkeit unterstützt uns mit großem Abstand, die politische Klasse jedoch nicht. Nach der Niederlage der Labour-Partei bei den letzten Wahlen müssen wir die Regierung irgendwie davon überzeugen, uns so zu unterstützen wie ihre Bevölkerung."
 ETH_trust_in_lon:0 "Vertrauen in internationales Handeln"
 ETH_trust_in_lon_desc:0 "Wir wurden vom Völkerbund und der internationalen politischen Gemeinschaft im Stich gelassen, aber das bedeutet nicht, dass wir das System aufgeben müssen. Viele Menschen auf der ganzen Welt haben unsere Sache unterstützt, und das werden wir nie vergessen. Wir müssen daran arbeiten, die Probleme mit dem Völkerbund zu lösen, statt das gesamte Projekt zu vernichten."
 ETH_ignore_lon:0 "Nationalismus"
 ETH_ignore_lon_desc:0 "Wir sind zum letzten Mal von den Westmächten ausgetrickst worden. Sie haben uns im Stich gelassen, so wie sie auch andere im Stich lassen werden. Wir können uns niemals darauf verlassen, dass die internationale Gemeinschaft energisch handelt, um eine Krise zu beenden. Wir können nur auf uns selbst zählen."
 ETH_re_establish_japanese_ties:0 "Wiederherstellung der japanischen Beziehungen"
 ETH_re_establish_japanese_ties_desc:0 "Die japanische Regierung verriet uns 1935 an die Italiener, doch diese Entscheidung stieß vor Ort auf großen Unmut. Nun, da wir den Krieg gewonnen haben, wären sie vielleicht an einer Wiederherstellung der Beziehungen interessiert."
 ETH_close_to_ger:0 "Näher an Deutschland heranrücken"
 ETH_close_to_ger_desc:0 "Deutschland hat gezeigt, dass es für jedes Land, das es unterstützt, die Extrameile geht. Das ist mehr, als wir von den sogenannten Friedenshütern in Frankreich oder Großbritannien sagen können. Wir wissen, wer unsere Unterstützer sind, wir stehen auf der Seite der Deutschen!"
 ETH_close_fra:0 "Verbesserung der französischen Beziehungen"
 ETH_close_fra_desc:0 "Frankreich hat uns zwar nicht auf unserem Weg unterstützt, aber dies geschah aus Angst vor Deutschland. Jetzt, da der Krieg vorbei ist, werden sie sicherlich wieder Verbindungen zu uns aufnehmen."
 ETH_befriend_eng:0 "Befreunde dich mit dem Imperium"
 ETH_befriend_eng_desc:0 "Wir können Großbritannien nicht vertrauen, und ehrlich gesagt sollten wir das auch nicht. Obwohl viele ihrer Bürger unsere Sache unterstützen, konnte sich die Regierung nicht vorstellen, uns Afrikaner gegen unsere europäischen Angreifer zu unterstützen. Dennoch grenzen sie an unser Land und stellen eine unmittelbare Bedrohung dar. Wir müssen uns ihnen gegenüber verhalten oder sterben."
 ETH_follow_jap:0 "Folgen Sie dem japanischen Beispiel"
 ETH_follow_jap_desc:0 "Die Kriegsereignisse haben die Ansichten von Herouy Wolde Selassie und den anderen „Jungen Japanern“ bestätigt. Der Westen fürchtet sich zu Recht vor einem Japan Afrikas. Wir gehen mit der Sonne auf, nach dem Vorbild Japans."
 ETH_leave_lon:0 "Den Völkerbund verlassen"
 ETH_leave_lon_desc:0 "Schluss mit der Heuchelei, Schluss mit der Untätigkeit. Die Liga arbeitet nur für die Mächtigen und tut nichts für diejenigen, die sie brauchen. Es ist klar, dass das Modell des Internationalismus grundlegend kaputt ist. Wir müssen für uns selbst sprechen, denn niemand sonst wird es tun."
 ETH_re_invite_foreign_missions:0 "Ausländische Missionen erneut einladen"
 ETH_re_invite_foreign_missions_desc:0 "Der Krieg zwang alle bis auf unsere treuesten ausländischen Agenten zur Flucht. Ohne sie wird es unserem Militär schwerfallen, sich zu modernisieren. Wenn wir uns in die Moderne wagen wollen, brauchen wir ausländische Unterstützung und Ausbildung."
 ETH_inter_invest:0 "Internationale Investitionen"
 ETH_inter_invest_desc:0 "Der Krieg hat der wenigen Industrie unseres Landes nicht geschadet. Wir müssen uns an die internationale Gemeinschaft wenden, um zu versuchen, das Verlorene wieder aufzubauen."
 ETH_jap_investment:0 "Japanisches Interesse"
 ETH_jap_investment_desc:0 "Unser Sieg gegen Italien hat das japanische Interesse an unserem Land erneuert. Vielleicht können wir sie davon überzeugen, wie nützlich es ist, beim Aufbau eines zweiten Reiches im Osten mitzuhelfen."
 ETH_fra_roads:0 "Ausbau der Eisenbahnlinien in Dschibuti"
 ETH_fra_roads_desc:0 "Unsere Bahnstrecken sind eher unzureichend. Unser gebirgiges Land erschwert den Bau von Gleisen und Straßen. Mit französischer Hilfe sollten wir unsere Bahnstrecken zumindest geringfügig verbessern können und vielleicht sogar ein paar zusätzliche Strecken zwischen Dschibuti und dem Rest der Welt bauen können, was beiden Seiten zugutekommt."
 ETH_improve_encryption:0 "Verbessern Sie die Verschlüsselung"
 ETH_improve_encryption_desc:0 "Unser Land war aufgrund fehlender Radiogeräte jahrelang hauptsächlich auf Läufer angewiesen. Obwohl wir inzwischen begonnen haben, Radios anzuschaffen, haben wir immer noch ein Problem. Wir verschlüsseln unsere Nachrichten nicht richtig, und wie wir gelernt haben, kann das verheerende Folgen haben. Wir müssen sofort damit beginnen, unsere Radiokompetenz zu verbessern!"
 ETH_get_a_port:0 "Wiederherstellung der Küstenpräsenz"
 ETH_get_a_port_desc:0 "Unser Land ist nicht länger von Land umgeben, wir haben unsere Verbindung zum Meer zurückgewonnen. Jetzt müssen wir nur noch den langen Prozess der Wiederherstellung unserer Präsenz auf hoher See beginnen."
 ETH_mod_naval_strats:0 "Marine-Strategiesteine"
 ETH_mod_naval_strats_desc:0 "Viele Jahre lang waren wir nicht auf dem Laufenden, was Marinetechnologien angeht. Jetzt, da wir eine Küste zurückerobert haben, müssen wir uns wieder Gedanken über solche Dinge machen."
 ETH_more_congress:0 "Stärkung der Macht der Legislative"
 ETH_more_congress_desc:0 "In der aktuellen Verfassung fungiert das Parlament weitgehend als beratendes Gremium mit wenig tatsächlicher Macht. Sein Hauptvorteil besteht darin, die Adligen als Senatoren in der Hauptstadt zu halten, anstatt im Inland Unruhe zu stiften. Wir sollten auf eine Ausweitung der gesetzgebenden Gewalt drängen, um zumindest eine gewisse Kontrolle über die Launen des Kaisers zu erlangen. "
 ETH_solidify_imperial_power:0 "Festigung der imperialen Macht"
 ETH_solidify_imperial_power_desc:0 "Kaiser Haile Selassie I. hat uns durch die größte Krise seit Jahrzehnten geführt, obwohl wir mit zahlreichen dissidenten Rases zu kämpfen hatten. Wir können unser Vertrauen in niemand anderen setzen."
 ETH_foreign_tech:0 "Ausländische Technologie"
 ETH_foreign_tech_desc:0 "Nachdem wir unsere Verbindungen zur Welt wiederhergestellt haben, können wir unsere ausländischen Verbindungen nutzen, um unseren eigenen technologischen Fortschritt voranzutreiben."
 ETH_belgian_discipline:0 "Belgische Disziplin"
 ETH_belgian_discipline_desc:0 "Belgien ist zwar nicht die stärkste Macht der Welt, aber seine Truppen genießen hohes Ansehen – und das aus gutem Grund. Wir haben in der Vergangenheit auf belgische Ausbildung vertraut und sehen keinen Grund, warum das nicht auch weiterhin so bleiben sollte."
 ETH_swedish_quality:0 "Schwedische Qualität"
 ETH_swedish_quality_desc:0 "Die Schweden waren während des Krieges einer unserer lautstärksten Unterstützer, und das werden wir nie vergessen. Die Qualität ihrer Waffen ist erwiesen, und wir wissen, dass wir ihnen vertrauen können. Jetzt ist ein guter Zeitpunkt, unsere Beziehungen zu ihnen zu vertiefen."
 ETH_go_communist:0 "Die Stimme des Volkes"
 ETH_go_communist_desc:0 "Viel zu lange wurde das äthiopische Volk unterdrückt. Selbst wenn man ihm die Macht zuspricht, verdeckt dies nur die Tatsache, dass die wahren Herren dieselben bleiben. Die Menschen arbeiten, und andere profitieren. Es ist an der Zeit, dass jeder von seiner Arbeit profitiert."
 ETH_com_militias:0 "Von der Aushebung zur Miliz"
 ETH_com_militias_desc:0 "Von jedem Mann wird erwartet, im Falle eines Angriffs für das Imperium zu kämpfen. Wir können dies zu unserem Vorteil nutzen, indem wir Menschen im ganzen Land vernetzen und formellere Milizen bilden. Das Beste daran ist, dass es als Segen für das Imperium erscheinen wird, während diese Milizen in Wirklichkeit sein Ende bedeuten werden!"
 ETH_ethiopian_revolution:0 "Die Revolution"
 ETH_ethiopian_revolution_desc:0 "Die Zeit ist gekommen, Genossen! Wir stürzen die korrupten Führer dieses Landes und werden unsere eigenen Herren! Erhebt euch und vernichtet die Tyrannen!"
 ETH_pan_african_congress:0 "Der Panafrikanische Kongress"
 ETH_pan_african_congress_desc:0 "Wir können unsere Zukunft niemandem außer uns selbst anvertrauen! Wir erheben uns als ein Volk gegen die Imperialisten, und als ein Volk werden wir siegen!"
 ETH_join_comintern:0 "Treten Sie der Komintern bei"
 ETH_join_comintern_desc:0 "Wir stehen an der Seite unserer Brüder und Schwestern in der Kommunistischen Internationale. Gemeinsam stellen wir uns gegen die Schrecken des Imperialismus, Kapitalismus und Faschismus! Gemeinsam werden wir der Welt eine Revolution bringen!"
 ETH_soviet_tech:0 "Sowjetische Technologie"
 ETH_soviet_tech_desc:0 "Jetzt, da wir uns mit der Sowjetunion verbündet haben, können wir die Vorteile nutzen, insbesondere ihre Technologie, die wir nutzen können, um die Revolution voranzutreiben!"
 ETH_turn_evil:0 "Schau in die Dunkelheit"
 ETH_turn_evil_desc:0 "Unsere engeren Beziehungen zu Deutschland haben es uns ermöglicht, einen tieferen Einblick in die dortige Regierungsführung und die dortigen Überzeugungen zu gewinnen. Es gibt dort viel Bewundernswertes. Wir können unsere deutschen Kontakte nutzen, um unsere eigenen Traktate über die herrschende Klasse zu verfassen."
 ETH_as_in_the_east:0 "Die östliche Morgendämmerung"
 ETH_as_in_the_east_desc:0 "Die Japaner sind die rechtmäßigen Herrscher des Fernen Ostens, ihre Taten und ihre Macht sprechen dafür. Die Deutschen haben sich als Herren Europas erwiesen. Aber was ist mit Afrika? Wir sind das unbesiegte Volk, dem kein Europäer das Wasser reichen kann. Wenn die Neue Weltordnung kommt, werden wir den Kontinent in Freundschaft mit Japanern und Deutschen regieren. Gemeinsam werden wir die perfekte Triarchie schaffen!"
 ETH_go_democratic:0 ""
 ETH_restrict_nobles:0 "Beschränken Sie die Privilegien des Adels"
 ETH_restrict_nobles_desc:0 "Der Adel hatte das Land jahrelang im Würgegriff, und erst in den letzten Jahrzehnten ist es uns gelungen, ihn zu lockern. Der Sieg im Krieg hat uns zumindest vorübergehend eine einmalige Chance eröffnet. Wir müssen unsere Popularität nutzen, um den Adel zu zügeln, solange wir noch können."
 ETH_abolish_slavery:0 "Das Gedar-System abschaffen"
 ETH_abolish_slavery_desc:0 "Das Gedar-System ist eine furchtbar veraltete Idee, die unseren Einfluss von außen erheblich schwächt und unsere Modernisierungsfähigkeit einschränkt. Sicher, der Adel mag dieses feudalistische System, das im Grunde Sklaverei fördert, doch die Italiener bekamen viel positive Presse für ihre Behauptung, dieses System abschaffen zu wollen. Wir dürfen nicht zulassen, dass jemals wieder ein anderes Land die Geschichte so prägt!"
 ETH_gradual_emancipation:0 "Allmähliche Landreform"
 ETH_election_prep:0 "Beginnen Sie mit den Wahlvorbereitungen"
 ETH_election_prep_desc:0 "Unser Land hat endlich einen Krieg hinter sich, der es beinahe zerstört hätte. Doch nun sind wir vereinter denn je. Endlich ist das Umfeld günstig geworden, um mit den Wahlen zu beginnen."
 ETH_popular_facs:0 "Erweiterung der lokalen Fabrik"
 ETH_popular_facs_desc:0 "Der beste Weg, das Ansehen unseres Landes zu stärken, besteht darin, so schnell wie möglich in Fabriken zu investieren. Wir müssen einen Produktionsboom in unserem Land auslösen!"
 ETH_military_build_up:0 "Militärischer Aufbau"
 ETH_military_build_up_desc:0 "Wir müssen unser Militär modernisieren, wenn wir jemals den Anschluss an den Rest der Welt gewinnen wollen! Wir können es uns nicht leisten, jemals wieder vollständig auf ausländische Waffen angewiesen zu sein!"
 ETH_ger_contracts:0 "Deutsche Militärverträge"
 ETH_ger_contracts_desc:0 "Dank der deutschen Hilfe im Krieg betrachten wir die deutschen Unternehmen mit Wohlwollen. Vielleicht könnten einige davon dazu bewegt werden, sich in unserem Land niederzulassen? Oder zumindest in unsere eigenen, lokalen Unternehmen zu investieren."
 ETH_expansionism:0 "Expansionspolitik"
 ETH_expansionism_desc:0 "Unser Schicksal ist es, über unsere derzeitigen, schmalen Grenzen hinaus zu expandieren. Wir müssen den richtigen Zeitpunkt abwarten, um einzugreifen und zu nehmen, was wir kriegen können!"
 ETH_grab_djibuoti:0 "Schnapp dir Dschibuti"
 ETH_grab_djibuoti_desc:0 "Frankreich ist gefallen und kann seine Kolonien nicht länger schützen. Wir werden nie eine bessere Chance haben, Dschibuti einzunehmen. Die Garnison dort ist stark, aber vielleicht können wir sie und die Überreste der französischen Regierung zu einer friedlichen Kapitulation bewegen."
 ETH_grab_somaliland:0 "Nachfrage Britisch-Somaliland"
 ETH_grab_somaliland_desc:0 "Britisch-Somaliland stellt eine Beleidigung für unser Schicksal dar, das Horn von Afrika zu kontrollieren. Entweder sie ziehen sich friedlich zurück, oder wir nehmen die Provinz mit Gewalt ein. Und die Briten sind derzeit nicht in der Lage, sich zu weigern!"
 ETH_remove_italy:0 "Italien entfernen"
 ETH_remove_italy_desc:0 "Italien ist uns schon viel zu lange ein Dorn im Auge. Sie haben uns jetzt nicht nur einmal, sondern gleich zweimal angegriffen. Entweder sie geben auf, oder wir entfernen sie ein für alle Mal mit Gewalt."
 ETH_take_africa:0 "Afrika für Afrikaner"
 ETH_take_africa_desc:0 "Wir haben genug von diesem imperialistischen Unsinn. Die Europäer haben kein Recht auf ein einziges Stück afrikanischen Landes. Sie werden gehen, selbst wenn wir sie mit vorgehaltener Waffe dazu zwingen müssen!"
 ETH_puppet_yemen:0 "Über das Meer"
 ETH_puppet_yemen_desc:0 "Der Jemen war lange gezwungen, Großbritannien, Frankreich und Italien zu beherbergen. Jetzt müssen sie sich auch noch mit uns auseinandersetzen. Ihr Land wurde ihnen genommen, wir können es zurückbekommen – gegen einen Preis. Den Preis der Loyalität."
 ETH_foreign_military_investment:0 "Ausländische Militärinvestitionen"
 ETH_foreign_military_investment_desc:0 "Nachdem wir uns nun bei einigen wichtigen Akteuren beliebt gemacht haben, können wir versuchen, deren Rüstungsunternehmen zu einer Expansion in unserem Land zu bewegen. Wir sind bereit, dabei sehr großzügige Bedingungen zu formulieren."
 ETH_expand_gold:0 "Erweitern Sie die Goldminen"
 ETH_expand_gold_desc:0 "Die Goldminen in unseren südlichen Provinzen sind eine zeitlose Währung, die weltweit akzeptiert wird. Dank unserer neu gewonnenen technologischen Fähigkeiten können wir die Minen wie nie zuvor erweitern und tiefer graben."
 ETH_coop_eng_infr:0 "Das britisch-äthiopische Eisenbahnabkommen"
 ETH_coop_eng_infr_desc:0 "Die britischen Kolonien in Afrika sind enorm unterentwickelt, dessen sind sich die Briten durchaus bewusst. Gemeinsam können wir versuchen, dem entgegenzuwirken. Gemeinsam können wir die Eisenbahnlinien sowohl in unserem Land als auch in den englischen Kolonien ausbauen, mehr Verbindungen schaffen und die lokale Infrastruktur insgesamt verbessern."
 ETH_a_new_ally:0 "Ein neuer Verbündeter"
 ETH_a_new_ally_desc:0 "Deutschland wird immer stärker. Großbritannien und Frankreich brauchen jede Hilfe, die sie bekommen können. Wir bieten uns als möglicher Verbündeter an. Alles, was wir brauchen, ist die Fähigkeit, unsere eigenen Kriegsanstrengungen zu führen."
 ETH_expand_the_army:0 "[ETH_imperial_or_communist1]"
 ETH_expand_the_army_desc:0 "Wir verfügen zwar über eine große Truppenstärke, doch handelt es sich dabei überwiegend um die persönlichen Truppen der Rases und nicht um die vergleichsweise kleine kaiserliche Armee. Um unsere imperiale Macht zu erhalten, müssen wir dafür sorgen, dass die kaiserliche Armee die größte und stärkste von allen ist."
 ETH_ras_cooperation:0 "Mit den Rases zusammenarbeiten"
 ETH_ras_cooperation_desc:0 "Wir können das nicht alleine schaffen. Wir brauchen die Hilfe ausgewählter Rases, um den Rest des Landes zur Räson zu bringen. Das mag zwar einige Zugeständnisse bedeuten, ist aber besser, als an mangelnder Unterstützung zu scheitern."
 ETH_shun_rases:0 "[ETH_imperial_or_communist2]"
 ETH_shun_rases_desc:0 "Wir können den Rases keinerlei Macht zutrauen, sie haben sich bestenfalls als wankelmütige Verbündete erwiesen. Ein paar von ihnen werden uns vertrauen, aber im Großen und Ganzen sollten wir uns auf die imperialen Truppen konzentrieren, nicht auf die der Rases."
 ETH_air_force:0 "Investitionen der Luftwaffe"
 ETH_air_force_desc:0 "Unsere Luftwaffe verdient diesen Namen kaum. Ein paar Flugzeuge, die uns von unseren Sympathisanten geschenkt wurden, jagen unseren Feinden nicht gerade Angst ein. Die Italiener haben uns die Schrecken der Luftüberlegenheit vor Augen geführt, und wir sollten diese Lektionen nicht vergessen."
 ETH_buy_planes:0 "Flugzeugkäufe"
 ETH_buy_planes_desc:0 "Wir können Flugzeuge nur so schnell bauen, wenn wir so wenig Industrie haben. Wir müssen schauen, ob Länder bereit sind, uns ihre Überbestände zu verkaufen. Selbst veraltete Modelle ermöglichen es uns, eine Flotte aufzubauen und unseren angehenden Piloten Flugerfahrung zu vermitteln."
 ETH_coastal_defence_tactics:0 "Küstenschutz"
 ETH_coastal_defence_tactics_desc:0 "Auf hoher See können wir nicht mithalten. Wir müssen uns auf den Bau von Schiffen konzentrieren, die uns vor Invasionen aus Küstennähe schützen können – Küstenverteidigungsschiffe. Das ist unsere Zukunft."
 ETH_high_seas_fleet:0 "Auf zur See"
 ETH_high_seas_fleet_desc:0 "Wir sind vielleicht gerade erst auf der Weltbühne angekommen, aber wir dürfen nicht den Anschluss verlieren! Wir werden eine Hochseeflotte aufbauen, und es wird vielleicht Jahrzehnte dauern, aber wir werden zu einer Seemacht werden!"
 ETH_air_navy_coop:0 "Zusammenarbeit zwischen Marine und Luftwaffe"
 ETH_air_navy_coop_desc:0 "Unsere Marine und Luftwaffe sind im Vergleich zum etablierten Heer noch sehr jung. Wir sollten die Gelegenheit nutzen, dafür zu sorgen, dass diese beiden Teilstreitkräfte zusammenarbeiten und nicht gegeneinander. Wir bewundern Japan, aber das bedeutet nicht, dass wir eine Kopie sein wollen!"
 ETH_carrier_focus:0 "Trägermöglichkeiten"
 ETH_carrier_focus_desc:0 "Wir sind vielleicht noch ein Stück davon entfernt, unsere eigenen Träger produzieren zu können, aber je früher wir uns mit der Technologie befassen, desto besser!"
 ETH_float_planes:0 "Marineflugzeuge"
 ETH_float_planes_desc:0 "Weitere Studien zur Zusammenarbeit zwischen Luft- und Seestreitkräften haben uns die Bedeutung von Marineflugzeugen gezeigt. Bomber, die feindliche Schiffe ausschalten können, und Jäger, die diese Bomber verteidigen. Varianten beider Flugzeuge, die auf ein Schiff passen und von dort aus gestartet werden können. All das sind Dinge, die wir untersuchen sollten."
 ETH_wolfpacks:0 "Wolfsrudel"
 ETH_wolfpacks_desc:0 "U-Boote sind äußerst nützlich. Sie sind günstig, einfach zu bauen und können einem unvorbereiteten Gegner verheerende Schäden zufügen. Wir sollten diese vielseitigen Waffen nutzen."
 ETH_battleships:0 "Schlachtschiffe"
 ETH_battleships_desc:0 "Die Herren der Meere. Wir müssen unseren eigenen bauen!"
 ETH_cruiser:0 "Kreuzer"
 ETH_cruiser_desc:0 "Schnellere, leichtere und günstigere Kreuzer sind das A und O vieler Marinen. Wir sollten uns sofort damit befassen!"
 ETH_destroyers:0 "Zerstörer"
 ETH_destroyers_desc:0 "Der unbezwingbare Zerstörer. Wenn wir genug davon bauen, können wir wirklich mit dem Aufbau einer Marine beginnen. Die Technologie ist da, wir müssen nur noch den Willen aufbringen!"
 ETH_more_docks:0 "Erweiterung der Werftkapazitäten"
 ETH_more_docks_desc:0 "Nachdem wir unsere Präsenz an den Küsten wiederhergestellt haben, müssen wir nun tatsächlich Werften bauen, die diesen Namen verdienen."
 ETH_flagship:0 "Das imperiale Flaggschiff"
 ETH_flagship_desc:0 "Was wäre eine Marine ohne ein Flaggschiff? Wir haben unsere Werften erweitert und mit dem Aufbau einer Flotte begonnen, aber sie braucht etwas Besonderes. Wir brauchen ein großes Schiff, das die Anmut des Imperiums und des Kaisers wahrhaftig verkörpert."
 ETH_prevent_future_invasion:0 "Vorbeugende Maßnahme"
 ETH_light_plane_focus:0 "Fokus auf die lokale Luftverteidigung"
 ETH_light_plane_focus_desc:0 "Die wichtigste Aufgabe unserer Luftwaffe ist die Verteidigung des Imperiums! Wir müssen uns auf leichte, wendige Kampfflugzeuge und Flugzeuge zur Luftnahunterstützung konzentrieren, die verhindern, dass der Feind jemals die Lufthoheit über unser eigenes Land erlangt!"
 ETH_heavy_plane_focus:0 "Eine Luftwaffe im Ausland"
 ETH_heavy_plane_focus_desc:0 "Wir werden nicht so sehr um den eigenen Himmel kämpfen, sondern vielmehr um die Luft in fernen Ländern. Wenn wir diese Orte erreichen wollen, müssen wir uns auf Flugzeuge konzentrieren, die solche Reisen durchführen können."
 ETH_integrate_eritrea:0 "Eritreische Integration"
 ETH_integrate_eritrea_desc:0 "Wir haben die verlorene Provinz Eritrea endlich zurückerobert! Wir müssen diese Menschen so schnell wie möglich wieder in unser Reich integrieren. Leider gibt es einige, die uns im Weg stehen, die sogenannten eritreischen Nationalisten, die törichterweise glauben, Eritreas Schicksal sei ein anderes als das der Imperien. Vielleicht könnten wir einige ihrer Mitglieder besänftigen, indem wir der Provinz vorerst mehr Autonomie gewähren."
 ETH_crush_eritrea:0 "Zerschlagung des eritreischen Nationalismus"
 ETH_crush_eritrea_desc:0 "Die Eritreer haben sich als gerissen und verräterisch erwiesen. Es gibt bereits Stimmen in der Provinz, die Selbstverwaltung fordern! Diese Art antiimperialer Stimmung kann nicht toleriert werden!"
 ETH_establish_somalian_puppet:0 "Ein Land für die Somalier"
 ETH_establish_somalian_puppet_desc:0 "Die verschiedenen somalischen Völker in unserem Land waren schon lange nicht mehr die stabilsten Untertanen. Dies liegt jedoch größtenteils daran, dass sie kein Land haben, das sie wirklich ihr Eigen nennen können, das nicht unseres ist. Mit unserer Kontrolle über Somalia können wir das ändern. Wir werden einen hochautonomen Marionettenstaat unter der Führung eines loyalen Somaliers schaffen. Dies wird hoffentlich einen Großteil der somalischen Unruhen in unserem Land beruhigen."
 ETH_order_in_somalia:0 "Somalische Integration erzwingen"
 ETH_order_in_somalia_desc:0 "Die Somalier in unserem Land haben sich lange gegen unsere Herrschaft gewehrt und sie abgelehnt. Sie weigern sich schlichtweg, den Regeln des Imperiums zu folgen. Viel zu lange waren wir nicht in der Lage, dieses Verhalten zu bestrafen, aber die Zeiten haben sich geändert. Sie werden unserer Herrschaft gehorchen, sonst …"
 ETH_another_light:0 "Ein weiteres Licht gegen die Dunkelheit"
 ETH_another_light_desc:0 "Die deutsche Expansion ist nicht mehr nur besorgniserregend, sondern geradezu erschreckend. Wir müssen uns gegen diesen eklatanten Vertrauensbruch der internationalen Gemeinschaft wehren. Wir dürfen nicht zulassen, dass ein weiteres Land wie wir überfallen wird, und wir werden uns nicht mit dem bloßen Fingerzeigen begnügen!"
 ETH_join_japan:0 "Afro-asiatischer Wohlstand"
 ETH_join_japan_desc:0 "Unsere Zukunft liegt im Osten. Es gibt einfach zu viel Ballast in Europa, als dass wir uns zu eng an ein europäisches Land binden könnten. Wir werden an der Zusammenarbeit mit den Japanern arbeiten."
 ETH_own_way:0 "Neigen der Achse"
 ETH_own_way_desc:0 "Deutschland hat seine Unterstützung für unser Land nur noch verstärkt. Dies ist für uns eine hervorragende Gelegenheit, uns bei ihnen einzuschmeicheln. Der Rest der Welt wird erzittern, wenn wir Hand in Hand mit den Deutschen gehen."
 ETH_stand_against_expansionism:0 "Gegen Expansionismus"
 ETH_stand_against_expansionism_desc:0 "Was unserem Land widerfahren ist, darf sich auf der Weltbühne nicht wiederholen. Wir müssen als Leuchtfeuer der Hoffnung für alle stehen, die sich gegen die Tyrannei stellen, um zu zeigen, dass es möglich ist."
 ETH_join_war:0 "Kämpfe mit"
 ETH_join_war_desc:0 "Wir dürfen nicht zulassen, dass Aggressionen ungestraft bleiben. Wir treten jetzt als Friedensrichter auf. Als bereitwillige Märtyrer für die Stabilität der Welt."
 ETH_out_of_aggressors_hands:0 "Kein Imperium für die Bösen"
 ETH_out_of_aggressors_hands_desc:0 "Wer gegen die Etikette des Völkerrechts verstößt, verdient kein Imperium. Er wird es nicht im luftleeren Raum verlieren, also werden wir ihn von dem befreien, was er nicht verdient."
 ETH_elecronic_focus:0 "Elektronischer Fokus"
 ETH_elecronic_focus_desc:0 "In unserem Land herrscht ein erheblicher Mangel an Elektrizität und Elektronik. Wir sollten ernsthaft über die Schaffung einer elektrischen Infrastruktur nachdenken. Darüber hinaus benötigen wir dringend militärische Elektronik. Sie wird in Zukunft zweifellos von größter Bedeutung sein, und wir wollen nicht zurückbleiben."
 ETH_modern_weapons:0 "Waffen für die Moderne"
 ETH_modern_weapons_desc:0 "Die Bedeutung moderner Waffen wird manchmal etwas überbewertet, das haben wir selbst mehrfach bewiesen. Dennoch können wir nicht behaupten, dass sie wirklich hilfreich sind. Unser Land verlässt sich viel zu stark auf vorgefertigte Waffen, viele davon aus der Zeit vor 1900. Es ist definitiv Zeit für eine Modernisierung. Genauer gesagt für mehrere Modernisierungen."
 ETH_trucks:0 "Kapazität für mechanisierte Einheiten"
 ETH_trucks_desc:0 "Unser Land beschäftigt sich erst seit kurzem mit dem Automobilbau. Unser Land ist ihnen weitgehend nicht förderlich, aber mit dem technologischen Wandel ist dies immer weniger eine Entschuldigung. Wir müssen uns auf die Zukunft der Kriegsführung vorbereiten, sonst werden wir von ihr überrollt."
 ETH_motor_infr:0 "Straßenbau"
 ETH_motor_infr_desc:0 "Eines der größten Probleme unseres Landes ist der gravierende Mangel an Straßen, insbesondere an asphaltierten. Zugegeben, Bergstraßen sind schwer zu bauen und zu unterhalten, aber wir müssen dies tun, wenn wir unser Land verbinden und an die moderne Welt anschließen wollen."
 ETH_tank_focus:0 "Unsere eigene Rüstung"
 ETH_tank_focus_desc:0 "Die Italiener setzten im Krieg Panzer gegen uns ein, und wir haben bewiesen, dass diese zumindest im Norden nicht so gut waren wie behauptet. Im Süden hingegen sieht die Sache anders aus: Panzerung in einer flachen Umgebung kann absolut verheerend sein, und wir müssen so schnell wie möglich eigene Panzer bauen!"
 ETH_arty_focus:0 "Moderne Artillerie"
 ETH_arty_focus_desc:0 "Unsere Artillerie ist in vielen Fällen lächerlich. Wir haben immer noch Kanonen, echte Kanonen, in unserem Arsenal. Das ist für eine moderne Armee inakzeptabel. Es muss daran gearbeitet werden, dieses Problem zu beheben."
 ETH_anti_tank_focus:0 "Panzerabwehrbereitschaft"
 ETH_anti_tank_focus_desc:0 "Unser Land verfügt schlichtweg nicht über die Ressourcen, um am Rüstungswettlauf teilzunehmen. Wir sollten uns stattdessen darauf konzentrieren, wie wir der Präsenz der Panzer entgegenwirken können. Wenn wir uns ihnen nicht anschließen können, dann erschießen wir sie."
 ETH_new_thought:0 "Neues Denken"
 ETH_new_thought_desc:0 "Es wird immer offensichtlicher, dass die alten Methoden aussterben. Wir müssen frisches Blut ins Land holen, das über den Tellerrand hinausblickt und sich unsere zukünftigen Siege vor Augen führt."
 ETH_oletta_school:0 "Erweiterung der Oletta-Schule"
 ETH_oletta_school_desc:0 "Die Oletta Cadet School hat endlich ihre ersten Absolventen, und wir können mit Stolz sagen, dass das Experiment ein Erfolg war. Diese jungen Führungskräfte Äthiopiens haben sich bereits als neue Denker erwiesen und sind bereit, anders zu denken und zu handeln, als es unsere alte Garde je tun würde. Es ist an der Zeit, die alten Gewohnheiten zu beenden, und Schulen wie Oletta werden diesen Prozess erheblich beschleunigen."
 ETH_axis_tech:0 "Technologischer Zugang"
 ETH_axis_tech_desc:0 "Nachdem wir uns nun mit einer anderen Macht zusammengeschlossen haben, um die Weltherrschaft an uns zu reißen, müssen wir auch in der Lage sein, dies tatsächlich zu tun. Glücklicherweise scheinen unsere Verbündeten in dieser Angelegenheit bereit zu sein, mit uns zu kooperieren."
 ETH_allied_tech:0 "Technologieaustausch"
 ETH_allied_tech_desc:0 "Unsere Verbündeten waren sehr bereit, uns an ihren Fortschritten teilhaben zu lassen, damit wir ihnen besser dabei helfen können, sich gegen ihre Feinde zur Wehr zu setzen."
 ETH_university:0 "Gründung der Addis Abeba University"
 ETH_university_desc:0 "In unserem Land gibt es keine Universitäten jeglicher Art, was unsere Fähigkeit, uns in der Welt zu präsentieren, erheblich beeinträchtigt. Da das Land nun stabiler ist und ein politischer Kurs festgelegt ist, können wir uns endlich mit der Gründung einer Hochschule befassen."
 ETH_eritrean_industry:0 "Aufbau der eritreischen Industrie"
 ETH_eritrean_industry_desc:0 "Trotz aller Behauptungen, den Afrikanern einen Aufschwung zu ermöglichen, haben die Europäer bei der Ansiedlung echter Industrie auf dem Kontinent wirklich mangelhafte Arbeit geleistet. Nun liegt es an uns, den Eritreern echte Industrie zu zeigen."
 ETH_somalian_industry:0 "Bringen Sie die Industrie nach Somalia"
 ETH_somalian_industry_desc:0 "Somalia ist in Sachen industrieller Entwicklung fast grausam abgehängt. Seit der Eroberung durch Italien ist die Region außerhalb einiger wichtiger Städte praktisch eine tote Zone. Wir wollen das ändern. Die Industrie wird nach Somalia kommen."

