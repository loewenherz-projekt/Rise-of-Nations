l_german:

#Ideas
 DARK_ethiopian_old_guard:0 "Abessinische Alte Garde"
 DARK_ethiopian_old_guard_desc:0 "Anders als ihre europäischen Gegenstücke wurde die Alte Garde Abessiniens eher durch die Schlacht von Adua als durch den Ersten Weltkrieg geprägt. Die Alte Garde Abessiniens bevorzugt rohe Gewalt und Massenangriffe, um den Feind in die Flucht zu schlagen, und verachtet Guerillataktiken im Allgemeinen."
 DARK_neo_mahdist:0 "Neo-Mahdist"
 DARK_neo_mahdist2:0 "Neo-Mahdist"
 ETH_EAL:0 "Ethiopian Airlines"
 ETH_weber_junkers:0 "Weber Junkers"
 ETH_massawa_docks:0 "Marineeinrichtungen von Massawa"
 ETH_assab_yards:0 "Assab Dockyards"
 ETH_IBTE:0 "IBTE"
 ETH_mogadishu:0 "Sarapion"
 ETH_tiyet_fabrica:0 "Tiyet Fabrica"
 ETH_gafat_artillery:0 "Gafat-Artillerie"
 ETH_officine_gondar:0 "Officine Monti"
 ETH_anbessa:0 "Anbessa"
 ETH_CFE:0 "CFE"
 communal_bro:0 "Gemeinschaftsgüter"
 communal_bro_desc:0 "Indem wir unsere Mitarbeiter Güter teilen lassen, können wir unsere Industrie auf größere Dinge konzentrieren."
 mil_focus_1:0 "Militärischer Fokus"
 democRAT:0 "Demokratische Gefühle"
 face_it_GER:0 "Faschistischer Einfluss"
 no_commies_here_ETH:0 "Verbot des Kommunismus"
 mil_focus_2:0 "Kriegergeist"
 mil_focus_2_desc:0 "Äthiopien hat einen kriegerischen Geist entwickelt und ist nicht bereit, sich seine Nation von irgendjemandem nehmen zu lassen."
 defend_our_ancient_lands:0 "Verteidige alte Länder"
 defend_our_ancient_lands_desc:0 "Wir haben dieses Land seit Jahrtausenden gehalten und mit unserer edlen Verteidigung werden wir es noch weitere Jahrtausende halten!"
 indus_mass:0 "Industrialisierte Massen"
 ancient_emperor_ETH:0 "Alter Kaiser von Äthiopien"
 ancient_emperor_ETH_desc:0 "Die Salomonische Dynastie hat uns viele Jahrhunderte lang geführt und sie wird uns auch jetzt nicht im Stich lassen."
 ETH_african_expertise:0 "Krieger Afrikas"
 ETH_african_expertise_desc:0 "Das Horn von Afrika mag der Ursprungsort der Menschheit sein, doch das Gelände ist rau und unerbittlich für diejenigen, die nicht dort aufgewachsen sind. Die Menschen in Äthiopien haben diese Erfahrung ein Leben lang gemacht und sind viele Kilometer durch schwieriges Gelände gelaufen, oft barfuß."
 ETH_gas_attacks:0 "Gasangriffe"
 ETH_gas_attacks_desc:0 "Die feigen [ITA.GetAdjective] fürchteten unsere Macht. Sie behaupteten, sie könnten uns leicht vernichten, doch als es soweit war und Ras Imru sich ihnen in den Rücken geschoben hatte, zeigten sie ihr wahres Gesicht. Unfähig, uns mit konventionellen Mitteln zurückzuschlagen, ignorierten sie die Genfer Konvention und griffen unsere Truppen mit Giftgas an. Wir müssen einen Weg finden, dieser Bedrohung für unser Land zu begegnen, sonst riskieren wir, alles zu verlieren."
 ETH_medieval_warfare1:0 "Chitet-System"
 ETH_medieval_warfare1_desc:0 "Dieses Land stützt sich auf ein mittelalterliches Kriegssystem, das sich auf Adlige und ihre persönlichen Armeen sowie auf in Kriegszeiten einberufene Wehrpflichtige stützt."
 ETH_medieval_warfare2:0 "Chitet-System"
 ETH_medieval_warfare2_desc:0 "Dieses Land stützt sich auf ein mittelalterliches Kriegssystem, das sich auf Adlige und ihre persönlichen Armeen sowie auf in Kriegszeiten einberufene Wehrpflichtige stützt."
 ETH_bad_encryption:0 "Fehlende Verschlüsselung"
 ETH_bad_encryption_desc:0 "Dieses Land hat noch kein System zur Verschlüsselung seiner Funkübertragungen entwickelt. Dies macht es für andere Länder leicht, herauszufinden, was sie tun."
 ETH_belgian_mission:0 "Belgische Mission"
 ETH_belgian_mission2:0 "Belgische Mission"
 ETH_swedish_mission:0 "Schwedische Mission"
 ETH_swedish_mission2:0 "Schwedische Mission"
 ETH_turkish_mission:0 "Türkische Mission"
 ETH_internationalism:0 "Glaube an das Völkerrecht"
 ETH_internationalism_desc:0 "Dieses Land glaubt an die Herrschaft des Völkerrechts und an die Institutionen, die hinter diesen Gesetzen stehen."
 ETH_nationalist_idea:0 "[ETH.GetAdjective] Nationalismus"
 ETH_nationalist_idea2:0 "[ETH.GetAdjective] Nationalismus"
 ETH_expanded_army:0 "[ETH_imperiale_oder_kommunistische_Idee]"
 ETH_expanded_army_rases:0 "Ras-Armee-Erweiterung"
 ETH_expanded_army_rases_desc:0 "Dieses Land hat seinen Adel gestärkt, um mehr Soldaten anfordern zu können."
 ETH_imperial_army_idea:0 "[ETH_imperial_or_communist_idea2]"
 ETH_imperial_army_idea_desc:0 "Dieses Land hat eine moderne zentralisierte Armee geschaffen, die nur dem Staat treu ist."
 ETH_oletta_school_idea:0 "Oletta Kadettenschule"
 ETH_beacon_of_hope:0 "Leuchtfeuer der Hoffnung"
 ETH_meiji_example:0 "Japanisches Modell"
 ETH_meiji_example_desc:0 "Dieses Land hofft, sich auf ähnliche Weise wie Japan zu modernisieren. Es studiert und kopiert die Techniken, von denen es glaubt, dass sie in seinem Land funktionieren."
 ETH_the_darkness:0 "Blick in die Dunkelheit"
 ETH_the_darkness_desc:0 "Dieses Land flirtet mit den Ideen und Konzepten des Faschismus. Nachdem es zugelassen hat, dass die Leere es anstarrt, hat es sich entschieden, zurückzustarren."
 ETH_peoples_voice:0 "Die Stimme des Volkes"
 ETH_peoples_voice_desc:0 "Die Menschen dieses Landes sehnen sich nach Veränderung und viele haben begonnen, das gegenwärtige Klassensystem und das, was es darstellt, in Frage zu stellen."
 ETH_militias:0 "Milizsystem"
 ETH_restricted_nobles:0 "Edle Einschränkungen"
 ETH_restricted_nobles_desc:0 "Dieses Land ist dabei, die Macht seiner Adligen einzuschränken. Ihr Einfluss wird dem Land langsam entzogen."
 ETH_abolished_gedar:0 "Das Gedar-System wurde abgeschafft"
 ETH_gradual_reform:0 "Allmähliche Landreform"
 ETH_democratic_ideal:0 "Imperium der Demokratie"
 ETH_democratic_ideal_desc:0 "Dieses Land hat sich die Ideen des Egalitarismus und der gemeinsamen Menschenrechte zu eigen gemacht."
 ETH_solomonic_restoration:0 "Salomonische Wiederherstellung"
 ETH_eritrean_nationalism:0 "Eritreischer Nationalismus"
 ETH_eritrean_nationalism_crushed:0 "Eritreischer Nationalismus zerschlagen"
 ETH_somali_nationalism:0 "Somalischer Nationalismus"
 ETH_somali_nationalism_crushed:0 "Somalischer Nationalismus zerschlagen"
 ETH_somali_and_eritrean_nationalism_crushed:0 "Eritreischer und somalischer Nationalismus zerschlagen"
 ETH_the_flagship_idea:0 "Das [Root.GetAdjective] Flaggschiff"
 ETH_the_flagship_idea_desc:0 "§RDiese Idee läuft ab, sobald Sie einen Träger oder ein superschweres Schlachtschiff gebaut haben oder über mehr als 10 reguläre Schlachtschiffe verfügen.§R"
 ETH_air_payment:0 "[ETH.GetAdjective] Flugzeugkauf"
 ETH_ethiopian_gold:0 "Goldminen"
 ETH_haile_selassie_idea:0 "Haile Selassie I"
 ETH_haile_selassie_idea_desc:0 "Haile Selassie I., „Der Löwe von Juda“, ist der derzeitige Kaiser von [ETH.GetNameDef]. Er kam aufgrund seiner eigenen Verdienste an die Macht und arbeitete unermüdlich daran, [ETH.GetNameDef] zu modernisieren und das Überleben seines Landes und seines Volkes zu sichern."
 ETH_recent_noble_activity_idea:0 "Kürzlich mit Adligen verhandelt"
 ETH_lose_war_idea:0 "Das Unvermeidliche"
 ETH_lose_war_idea_desc:0 "Die Soldaten können nicht genau beschreiben, was es ist, sie spüren nur eine tiefe Unruhe angesichts der Zukunft, als sei das Schicksal schon vorherbestimmt und nicht zu ihren Gunsten."
 ETH_win_war_idea:0 "Das Unvermeidliche"
 ETH_win_war_idea_desc:0 "Was es genau ist, können die Soldaten nicht beschreiben, sie verspüren nur ein Gefühl der Ausgelassenheit, als hätte Fortuna ihnen all ihre Reize geschenkt."
 ETH_good_encryption:0 "Gute Verschlüsselung"
 ETH_good_encryption_desc:0 "Dieses Land hat aus seinen Fehlern der Vergangenheit gelernt und hart daran gearbeitet, sicherzustellen, dass seine Kommunikation gut verschlüsselt ist."

