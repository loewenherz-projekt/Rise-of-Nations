#Decisions
 ETH_end_of_war_category:0 "[DARK_eth_vs_ita_war_cat]"
 ETH_end_of_war_category_desc:0 "[ETH.GetNameDef] hat die [ITA.GetAdjective] vollständig aus dem Horn von Afrika vertrieben. Während [ITA.GetLeader] in [ITA.GetNameDef]s Hauptstadt ohnmächtig wütet, haben nun Friedensgespräche begonnen. Sofern der Krieg in den nächsten Monaten keine drastische Wendung nimmt, wird [ITA.GetNameDef] gezwungen sein, um Frieden zu bitten."
    ETH_end_of_war_mission_eth:0 "Beginnen Sie Friedensgespräche mit [ITA.GetNameWithFlag]"
    ETH_end_of_war_mission_eth_desc:0 "Wir haben es geschafft! Wir haben die [ITA.GetAdjective]s aus Afrika vertrieben! Jetzt müssen wir nur noch unsere Position halten, bis wir Friedensgespräche mit den [ITA.GetAdjective]s erzwingen können."
    ETH_end_of_war_mission_ita:0 "Friedensgespräche beginnen mit [ETH.GetNameWithFlag]"
    ETH_end_of_war_mission_ita_desc:0 "Die wilden [ETH.GetAdjective] haben uns gezwungen, unsere Kolonien zu evakuieren! Unsere Unterstützung zu Hause bricht zusammen. Wenn wir eine Katastrophe vermeiden wollen, müssen wir diese Kolonien sofort zurückerobern!"
 
 ETH_join_ita_eth_war_category:0 "Eintritt in den Zweiten Italienisch-Abessinischen Krieg"
 ETH_join_ita_eth_war_category_desc:0 "In Europa ist erneut Krieg ausgebrochen, diesmal jedoch aus unerwarteter Ursache. Der umstrittene Italienisch-Abessinische Krieg geriet außer Kontrolle, als sich [ENG.GetNameDef] und [FRA.GetNameDef] nicht auf einen vermittelten Friedensvertrag einigen konnten. Da sich Europa nun erneut im Krieg befindet, müssen wir uns entscheiden, ob wir uns der einen oder anderen Seite anschließen wollen."
    ETH_join_ita_decision:0 "Beitreten [ITA.GetNameWithFlag]"
    ETH_join_ita_decision_desc:0 "[ETH.GetNameDef] ist zu groß für seine Hosen geworden. Wir stehen auf der Seite von [ITA.GetNameDef]."
    ETH_join_eth_decision:0 "Beitreten [ETH.GetNameWithFlag]"
    ETH_join_eth_decision_desc:0 "Die Verbrechen von [ITA.GetNameDef] an [ETH.GetNameDef] können weder vergessen noch vergeben werden. Wir stehen auf der Seite von [ETH.GetNameDef]."
    
 ETH_supporting_the_war_category:0 "Der Italienisch-Abessinische Krieg"
 ETH_supporting_the_war_category_desc:0 "Die [ITA.GetAdjective]s sind unter eklatanter Missachtung des Völkerrechts in [ETH.GetNameDef] einmarschiert. Gegen [ITA.GetNameDef] wurden Sanktionen verhängt, und der Waffenhandel zwischen den Kriegsparteien wurde verboten. Die öffentliche Meinung hält die Sanktionen jedoch für wirkungslos, da wichtige Kriegsgüter wie Öl nicht betroffen sind und das Waffenverbot lediglich [ETH.GetNameDef] trifft, der im Vergleich zu [ITA.GetNameDef] völlig unterlegen ist. Dies hat einige dazu veranlasst, nach offenerer Hilfe zu rufen, was jedoch den Zorn gewisser Mächte auf sich ziehen könnte."
    ETH_close_the_suez_decision:0 "Schließe den Suezkanal"
    ETH_close_the_suez_decision_desc:0 "Wir können den Suezkanal nicht nur für eine Seite eines Krieges schließen, aber wir können ihn einfach generell schließen. Dies wird wahrscheinlich enorme Auswirkungen im Inland haben, insbesondere bei unseren Unternehmen und den Mitgliedern abweichender Parteien."
        ETH_close_the_suez_tt:0 "§RCLOSERT DEN SUEZKANAL§!.\n"
    ETH_send_weapons_hidden_decision:0 "Versuchen Sie, heimlich Waffen an [ETH.GetNameDef] zu senden."
    ETH_send_weapons_hidden_decision_desc:0 "Das derzeitige Waffenembargo gegen [ETH.GetNameDef] ist eine Schande. Sie sind die Verteidiger, nicht die Angreifer! Wir können [ENG.GetNameDef] und [FRA.GetNameDef] nicht direkt bekämpfen, aber wir könnten versuchen, Waffen über geheime Kanäle zu liefern, obwohl wir keine Erfolgsgarantie haben."
        ETH_not_recently_sent_weapons_tt:0 "Habe in den letzten §Y90 Tagen§ nicht versucht, [ETH.GetNameWithFlag] Waffen zu versenden!.\n"
        ETH_sneak_weapon_attempt_tt:0 "§YFolgendes wird nur passieren, wenn die Waffen es schaffen:§!\n"
    ETH_send_weapons_openly_decision:0 "[ETH_open_weapons_allowed_t]"
        ETH_send_weapons_openly_decision_t1:0 "Senden Sie Waffen an [ETH.GetNameDef], um das Embargo zu missachten"
        ETH_send_weapons_openly_decision_t2:0 "Senden Sie Waffen an [ETH.GetName]."
    ETH_send_weapons_openly_decision_desc:0 "[ETH_offene_Waffen_erlaubt_Beschreibung]"
        ETH_send_weapons_openly_decision_desc1:0 "Das Embargo auf Waffenverkäufe an [ETH.GetNameDef] ist eine Schande, denn sie verteidigen sich damit lediglich gegen die [ITA.GetAdjective]s! Wir werden uns nicht an dieses Embargo halten, [ENG.GetNameDef] und [FRA.GetNameDef] können zur Hölle fahren!"
        ETH_send_weapons_openly_decision_desc2:0 "[ETH.GetNameDef] kämpft gerecht für ihr Land. Wir müssen sie auf jede erdenkliche Weise unterstützen!"
    ETH_end_the_arms_embargo_decision:0 "Beenden Sie das Waffenembargo"
    ETH_end_the_arms_embargo_decision_desc:0 "Die Unterstützung der Bevölkerung war von Anfang an auf der Seite von [ETH.GetNameDef]. Obwohl es unsere Kolonialbeamten und bestimmte Mitglieder unserer Regierung wahrscheinlich verärgern wird, müssen wir das Embargo gegen [ETH.GetNameDef] zum Wohle der Allgemeinheit beenden."
        DARK_end_the_embargo_tt:0 "§GBeenden Sie das Waffenembargo gegen [ETH.GetNameDef] und erlauben Sie anderen Ländern, ihnen Waffen zu liefern.§!\n"
    ETH_force_britain_to_end_embargo_decision:0 "[ENG.GetNameWithFlag] zwingen, das Waffenembargo zu beenden"
    ETH_force_britain_to_end_embargo_decision_desc:0 "Als wichtigster Verbündeter von [ENG.GetNameDef] im aktuellen Waffenembargo und als einziges anderes Land mit einer Kolonie an der Grenze zu [ETH.GetNameDef] haben wir ein starkes Mitspracherecht bei der Durchsetzung des Embargos. Wenn wir wollten, könnten wir [ENG.GetNameDef] zur Aufhebung des Embargos zwingen, indem wir im Wesentlichen damit drohen, es durch schlichte Nichteinhaltung wirkungslos zu machen."
    
 ETH_noble_influence_category:0 "Edler Einfluss"
 ETH_noble_influence_category_desc:0 "Unsere Bemühungen, den Adel zu marginalisieren, wurden durch den Krieg um Jahre zurückgeworfen. Wenn wir einen modernen Zentralstaat schaffen wollen, müssen wir unsere Bemühungen neu starten. Wir müssen nur darauf achten, nicht zu viel Unruhe zu stiften, sonst könnten wir einen Aufstand auslösen."
    ETH_noble_influence_value:0 "[ETH_edler_Einfluss_Wert_Farbe]"
        ETH_green_text:0 "§G([?Root.ETH_edler_Einflusswert])§!"
        ETH_yellow_text:0 "§Y([?Root.ETH_edler_Einflusswert])§!"
        ETH_red_text:0 "§R([?Root.ETH_edler_Einflusswert])§!"
    ETH_noble_influence_desc:0 "Je höher der Wert, desto stärker wäre ein Adelsaufstand."
    ETH_remove_noble_influence_5:0 "§GVerringert§! §YNoble Influence§! um §G5§!\n"
    ETH_remove_noble_influence_10:0 "§GVerringert§! §YNobeleinfluss§! um §G10§!\n"
    ETH_remove_noble_influence_15:0 "§GVerringert§! §YNoble Influence§! um §G15§!\n"
    ETH_remove_noble_influence_20:0 "§GVerringert§! §YNoble Influence§! um §G20§!\n"
    ETH_add_noble_influence_5:0 "§RIncreases§! §YNoble Influence§! by §R5§!\n"
    ETH_add_noble_influence_10:0 "§RIncreases§! §YNoble Influence§! by §R10§!\n"
    ETH_add_noble_influence_15:0 "§RIncreases§! §YNoble Influence§! by §R15§!\n"
    ETH_limit_noble_influence_decision:0 "Begrenzen Sie den Einfluss des Adels"
    ETH_limit_noble_influence_decision_desc:0 "Beschränken Sie die Macht und Privilegien des Adels."
    ETH_expand_noble_influence_decision:0 "Erweitern Sie den Einfluss des Adels"
    ETH_expand_noble_influence_decision_desc:0 "Erweitern Sie die Macht und Privilegien des Adels."
        ETH_not_recently_affected_nobles_tt:0 "Hat den §YNoble Influence§! im letzten Jahr weder eingeschränkt noch erweitert.\n"
    ETH_ask_for_noble_support_decision:0 "Sammeln Sie edle Unterstützung"
    ETH_ask_for_noble_support_decision_desc:0 "Die Adelsfamilien des Reiches sind bereit, unsere Sache gegen Bezahlung zu unterstützen."
       ETH_not_recently_asked_support_tt:0 "Hat seit §Y180 Tagen§! keine §YUnterstützung der Adligen gesammelt§!.\n"
    ETH_noble_war_support_decision:0 "Nutzen Sie die Unterstützung des edlen Krieges"
    ETH_noble_war_support_decision_desc:0 "Da sich der Krieg hinzieht, bleibt uns kaum eine andere Wahl, als uns auf den Adel zu verlassen, um die Moral in unserem Land zu stärken."
    ETH_noble_raise_levies_decision:0 "Erheben Sie Adelsabgaben"
    ETH_noble_raise_levies_decision_desc:0 "Der Krieg zieht sich hin, und unsere Truppenstärke geht zur Neige. Theoretisch hätten die Rases uns ihre volle Kriegsaushebung zur Verfügung stellen müssen, aber wenn wir sie drängen und ihnen Zugeständnisse machen, könnten wir feststellen, dass sie plötzlich mehr Männer zur Verfügung haben."
    ETH_imprison_balcha_decision:0 "Dejazmach Balcha wieder in den Ruhestand schicken"
    ETH_imprison_balcha_decision_desc:0 "Dejazmach Balcha Safo versuchte einst, den Aufstieg des damaligen Regenten Ras Tefari (heute Kaiser Haile Selassie I.) zu verhindern. Er wurde nur aus dem Ruhestand geholt, um gegen die italienischen Invasoren zu kämpfen, doch nun steht er wieder mit zu viel Macht und Einfluss da. Wir müssen ihn erneut in den Ruhestand schicken."
        ETH_removed_balcha_tt:0 "Balcha Sofa wird nicht länger als Militärberater zur Verfügung stehen.\n"
    ETH_noble_pro_democracy_decision:0 "Erhöhen Sie die gesetzgeberischen Verantwortlichkeiten"
    ETH_noble_pro_democracy_decision_desc:0 "Da die Adligen als unsere Senatoren fungieren, können sie die Hauptstadt nicht einfach verlassen, da sie sonst Gefahr laufen, ihre verfassungsmäßige Pflicht nicht erfüllen zu können. Indem wir die Legislative stärker belasten, können wir dieses Problem für die Adligen weiter verschärfen und gleichzeitig die Unterstützung für unser demokratisches System stärken."
    
 ETH_governmental_reform_category:0 "Regierungsreform"
 ETH_governmental_reform_category_desc:0 "Unser Land muss sich für die Moderne reformieren. Wohin soll der Weg gehen?"
    ETH_swap_to_nothing_idea_decision:0 "Traditionelles Denken priorisieren"
    ETH_swap_to_nothing_idea_decision_desc:0 "Wir haben uns andere Denkprozesse angeschaut und festgestellt, dass sie unzureichend sind. Wir haben eine lange und stolze Geschichte, warum sollten wir sie aufgeben?"
    ETH_swap_to_democratic_idea_decision:0 "Wandel hin zur Demokratie"
    ETH_swap_to_democratic_idea_decision_desc:0 "Die Demokratie wird positive soziale Veränderungen bewirken und das Wachstum unserer Bevölkerung fördern. Wir sollten dieses Wachstum unterstützen."
    ETH_swap_to_fascism_idea_decision:0 "Verschiebung zum Faschismus"
    ETH_swap_to_fascism_idea_decision_desc:0 "Unser Land muss Stärke demonstrieren und in unserer Bevölkerung nationalistische Begeisterung schüren. Wir sollten uns dem Faschismus zuwenden."
    ETH_swap_to_communism_idea_decision:0 "Übergang zum Kommunismus"
    ETH_swap_to_communism_idea_decision_desc:0 "Hören Sie das Volk singen? Wir können es nicht länger in Knechtschaft halten, wir müssen uns dem Kommunismus zuwenden."    
    ETH_neutrality_reform_decision:0 "Wiederherstellung der imperialen Autorität"
    ETH_neutrality_reform_decision_desc:0 "Die alten Methoden waren die besten. Wir sollten zu dieser Zeit zurückkehren."
    ETH_democratic_reform_decision:0 "Ernennung zum Premierminister"
    ETH_democratic_reform_decision_desc:0 "Unser Land sollte dem Beispiel anderer Königreiche auf der ganzen Welt folgen und einen Premierminister ernennen."
    ETH_communism_reform_decision:0 "Beschlagnahme der Produktionsmittel"
    ETH_communism_reform_decision_desc:0 "Unser Land wurde lange genug von der Oberschicht ausgebeutet! Heute beenden wir ihre Tyrannei!"
    ETH_fascism_reform_decision:0 "Umarme das Herz der Finsternis"
    ETH_fascism_reform_decision_desc:0 "Es lebe das Imperium!"
        ETH_no_dead_haile_tt:0 "§YHaile Selassie§! lebt."
