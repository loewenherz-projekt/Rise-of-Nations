 ### Events
 DARK_promise_serbia_tt:0 "§YVersprich die Oberherrschaft über [SER.GetNameDef] nach Friedensabkommen.§!\n"
 DARK_will_get_serbia_tt:0 "§GWird nach Friedensschluss die Oberherrschaft über [SER.GetNameDef] erlangen.§!\n"
