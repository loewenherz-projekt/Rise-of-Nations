l_german:
 CHI_secure_internal_politics:0 "Sichere Innenpolitik"
 CHI_secure_internal_politics_desc:1 "Wenn unsere Regierung im verwirrenden Chaos der chinesischen Politik überleben will, dürfen wir uns nicht von internen Streitigkeiten ablenken lassen. Jegliche interne Opposition muss ausgemerzt werden."
 CHI_cooperation_with_the_nationalists:0 "Zusammenarbeit mit den Nationalisten"
 CHI_cooperation_with_the_nationalists_desc:1 "Die Nationalisten bieten die beste Chance, das Land zu vereinen und die Japaner zu besiegen. Wir sollten dafür sorgen, dass sie uns nicht als Bedrohung ansehen."
 CHI_cooperation_with_the_nationalists_effect_tooltip:0 "[WTT_PRC.GetNameDefCap] und die Kriegsherren, die sich auf die Seite der Kommunisten gestellt haben, können als Reaktion darauf mit uns §HGrenzkonflikte§! beginnen."
 CHI_technological_cooperation:0 "Technologische Zusammenarbeit"
 CHI_technological_cooperation_desc:1 "Unsere Zusammenarbeit mit der Zentralregierung stellt sicher, dass wir Zugang zu allen neuen Technologien haben, die sie entwickelt."
 CHI_new_model_province:0 "Neue Modellprovinz"
 CHI_new_model_province_desc:1 "Während die Zentralregierung darum kämpft, das Land in die Moderne zu führen, werden wir Reformen in wesentlich kleinerem Maßstab umsetzen und im Gegensatz zur Rückständigkeit des Rests der Nation als leuchtende Leuchttürme des Fortschritts gelten."
 CHI_root_out_corruption:0 "Ausrottung der Korruption"
 CHI_root_out_corruption_desc:1 "Seit Jahrzehnten missbrauchen Regierungsbeamte ihre Position, um sich die eigenen Taschen zu füllen und die Bevölkerung zu schikanieren. Dabei ignorieren sie Kriminelle, die ihnen die Taschen vollstopfen. Damit ist jetzt Schluss."
 CHI_embrace_the_opium_trade:0 "Umarmen Sie den Opiumhandel"
 CHI_embrace_the_opium_trade_desc:1 "Ein Land braucht Geld, um zu funktionieren. In der aktuellen Situation können wir bei der Auswahl der Geldquellen nicht wählerisch sein."
 CHI_land_reform:0 "Bodenreform"
 CHI_land_reform_desc:1 "Die Kommunisten verfolgen ein aggressives Programm zur Landumverteilung und haben damit viele Anhänger unter den Bauern. Wir sollten ein weniger radikales Programm umsetzen, um die Bevölkerung auf unsere Seite zu ziehen."
 CHI_reform_the_administration:0 "Reform der Verwaltung"
 CHI_reform_the_administration_desc:1 "Alle unsere Bemühungen auf Regierungsebene sind vergeblich, wenn sie nicht auf lokaler Ebene umgesetzt werden. Wir müssen sicherstellen, dass die Beamten vor Ort in der Lage und willens sind, unsere Befehle auszuführen."
 CHI_join_the_republican_government:0 "Treten Sie der republikanischen Regierung bei"
 CHI_join_the_republican_government_desc:1 "Nachdem unser Territorium gestärkt und unsere Regierung reformiert wurde, ist es an der Zeit, auf die Zentralregierung zuzugehen und einen Platz am Verhandlungstisch zu fordern. Sobald wir eine anerkannte Regierungspartei sind, können wir diese neu gewonnene Legitimität nutzen, um in anderen Staaten Unterstützung zu gewinnen und unsere Machtbasis zu stärken."
 CHI_power_struggle:0 "Machtkampf"
 CHI_power_struggle_desc:1 "Unser politischer Einfluss auf die Staatsangelegenheiten ist deutlich gewachsen. Wir können nun versuchen, anderen Ländern auf Augenhöhe zu begegnen."
 RON_Nationalist_China:0 "der Fokusbaum des nationalistischen China"
 china_communist_focus:0 "der Fokusbaum des kommunistischen China"
 CHI_cooperation_with_the_communists:0 "Zusammenarbeit mit den Kommunisten"
 CHI_cooperation_with_the_communists_desc:1 "Die Kuomintang (KMT) hat beim Aufbau einer modernen Nation versagt. Das Land ist gespaltener denn je, die Bauern leben in Angst vor der Regierung, Korruption ist auf allen Regierungsebenen weit verbreitet, und die japanischen Imperialisten sitzen direkt hinter der Grenze. Vielleicht ist der Kommunismus die bessere Zukunftsvision."
 CHI_cooperation_with_the_communists_effect_tooltip:0 "Kriegsherren, die sich auf die Seite der Nationalisten gestellt haben, können als Reaktion hierauf mit uns §HGrenzkonflikte§! beginnen.\n"
 CHI_land_redistribution:0 "Landumverteilung"
 CHI_land_redistribution_desc:1 "Die Bauern werden von den Grundbesitzern rücksichtslos ausgebeutet, obwohl sie die Grundlage unserer Wirtschaft bilden. Wenn die Menschen, die das Land bewirtschaften, auch die tatsächlichen Eigentümer des Landes werden, wird dies zu einer wesentlich gerechteren und produktiveren Gesellschaft führen."
 CHI_ideological_education:0 "Ideologische Erziehung"
 CHI_ideological_education_desc:1 "Die Grundlage für unseren zukünftigen Erfolg wird heute gelegt. Zukünftige Generationen müssen die grundlegende Wahrheit lernen, dass die gesamte Geschichte eine Geschichte des Klassenkampfes ist, und ihre Rolle darin."
 CHI_land_value_tax:0 "Grundsteuer"
 CHI_land_value_tax_desc:1 "Durch die direkte Besteuerung des Bodens erhalten wir ein wesentlich stabileres und gerechteres Steuersystem, das denjenigen Geld wegnimmt, die am meisten übrig haben."
 CHI_judiciary_reforms:0 "Justizreformen"
 CHI_judiciary_reforms_desc:1 "Wenn unsere Regierung etwas bewirken soll, müssen wir sicherstellen, dass alle Richter ausreichend ausgebildet sind, um unsere Gesetze richtig anzuwenden."
 CHI_communist_administrators:0 "Kommunistische Administratoren"
 CHI_communist_administrators_desc:1 "Die alte Garde der Verwaltung ist zu festgefahren, um sich jemals von unserer Denkweise beeinflussen zu lassen. Wir sollten sie vollständig durch neue, jüngere Verwaltungen mit radikaleren Ideen ersetzen."
 CHI_join_the_chinese_soviet:0 "Treten Sie dem chinesischen Sowjet bei"
 CHI_join_the_chinese_soviet_desc:1 "Die Revolution kann nur gelingen, wenn die Kommunisten zusammenstehen. Natürlich müssen wir sicherstellen, dass keine konterreaktionären Elemente innerhalb der Partei versuchen, die Revolution zu verhindern, bevor sie überhaupt begonnen hat."
 CHI_the_yanan_incident:0 "Der Yan&#39;an-Vorfall"
 CHI_the_yanan_incident_effect_tt:0 "Bitten Sie §H[SOV.GetNameDef]§! um Unterstützung bei der Ablösung von §H[WTT_PRC.GetNameDef]§! als kommunistischer Führer.\nDies wird zu einem Krieg mit §H[WTT_PRC.GetNameDef]§! führen, wenn sie sich weigern.\nDieser Deal mit §H[SOV.GetNameDef]§! wird uns Forderungen von [SOV.GetLeader] aussetzen.\n"
 CHI_the_yanan_incident_desc:1 "Der derzeitige Parteiführer hat den sozialistischen Brüdern in der Sowjetunion den Rücken gekehrt. Wir sollten uns an die Sowjets wenden, um ihre Unterstützung für die Revolution in ganz China zu gewinnen."
 CHI_opposition:0 "Opposition"
 CHI_opposition_effect_tooltip:0 "§H[WTT_current_china_leader.GetNameDef]§! kann als Reaktion darauf einen Grenzkrieg mit uns beginnen."
 CHI_opposition_desc:1 "Die Zentralregierung ist korrupt und schwach. Die Kommunisten wollen 5000 Jahre chinesischer Geschichte zerstören. Diese Situation erfordert einen großen Führer, jemanden, der bereit ist, schwierige Entscheidungen zu treffen und das Land zu einen – mit allen erforderlichen Mitteln."
 CHI_public_works:0 "Öffentliche Arbeiten"
 CHI_public_works_desc:1 "Die Bevölkerung muss erkennen können, dass wir zu ihrem Wohl arbeiten. Ein paar hochkarätige Projekte dienen als nützliche Propagandamittel und geben der Bevölkerung einen Vorgeschmack darauf, wie ganz China aussehen könnte, wenn sie uns stärker unterstützen würde."
 CHI_labor_reform:0 "Arbeitsreform"
 CHI_labor_reform_desc:1 "Die Arbeitsmethoden und -gewohnheiten in China haben sich über Jahrtausende entwickelt. Es ist an der Zeit, sie in die Moderne zu überführen."
 CHI_rural_militias:0 "Ländliche Milizen"
 CHI_rural_militias_desc:1 "In weitläufigen ländlichen Gebieten dauert es oft lange, bis militärische Unterstützung den Ort eines Einfalls erreicht. Durch die Aufstellung lokaler Milizen können wir sicherstellen, dass es jedem Eindringling schwerfällt, sich in unserem Land zu bewegen."
 CHI_war_taxes:0 "Kriegssteuern"
 CHI_war_taxes_desc:1 "Verzweifelte Zeiten erfordern verzweifelte Maßnahmen. Solange der Krieg andauert, müssen wir die wirtschaftlichen Ressourcen der Bevölkerung im größtmöglichen Umfang mobilisieren."
 CHI_seek_japanese_support:0 "Suchen Sie japanische Unterstützung"
 CHI_seek_japanese_support_desc:1 "Sowohl die Zentralregierung als auch die Kommunisten haben mächtige Verbündete. Wenn wir am Ende die Oberhand behalten wollen, müssen wir einen eigenen Beschützer finden."
 CHI_personal_leadership:0 "Persönliche Führung"
 CHI_personal_leadership_desc:1 "Bei einer Aufteilung des militärischen Kommandos besteht die Gefahr, dass ein Offizier mit überhöhten Ansichten versucht, die Macht an sich zu reißen. Wir müssen sicherstellen, dass unsere Soldaten der Regierung gegenüber stets loyal sind."
 CHI_cult_of_personality:0 "Personenkult"
 CHI_cult_of_personality_desc:1 "Die Menschen müssen wissen, wer sie durch diese dunklen Tage in die strahlende Zukunft führt und welche herausragenden Eigenschaften der Mensch besitzt."
 CHI_provoke_border_clashes:1 "Grenzkonflikte mit den Nationalisten"
 CHI_provoke_border_clashes_desc:1 "Wir können noch keinen offenen Krieg riskieren. Ein kleiner, begrenzter Konflikt ermöglicht es uns, wertvolles Terrain zu gewinnen, ohne sofort vernichtend geschlagen zu werden. Idealerweise schlagen wir genau dann zu, wenn unser Gegner seine Truppen bereits anderweitig eingesetzt hat."
 CHI_defensive_posture:0 "Defensive Haltung"
 CHI_defensive_posture_desc:1 "Dieser Konflikt ist ein Marathon, kein Sprint. Die anderen Fraktionen zu früh herauszufordern, würde eine Katastrophe heraufbeschwören. Vorerst bleiben wir in der Defensive."
 CHI_rapid_mobilization:0 "Schnelle Mobilisierung"
 CHI_rapid_mobilization_desc:1 "Um ein ernstzunehmender Anwärter auf die Führung Chinas zu werden, müssen wir unser Militär vergrößern. Wir werden neue Methoden entwickeln, um die Ausbildung zu optimieren und eine Armee aufzubauen, die jeder Herausforderung gewachsen ist."
 CHI_proclaim_rival_government:0 "Proklamieren Sie eine rivalisierende Regierung"
 CHI_proclaim_rival_government_desc:1 "Es ist an der Zeit, unsere Ambitionen offiziell zu machen. Wir fordern nichts weniger als die vollständige Kontrolle über China und werden mit dem Rest der Welt auf Augenhöhe verhandeln."
 CHI_industrial_investment:0 "Industrielle Investitionen"
 CHI_industrial_investment_desc:1 "Auch wenn unsere Ressourcen begrenzt sind, sollten wir das uns zur Verfügung stehende Kapital dennoch in die Verbesserung unserer Wirtschaft stecken."
 CHI_public_education_reform:0 "Reform des öffentlichen Bildungswesens"
 CHI_public_education_reform_desc:1 "Das Fundament einer modernen Nation sind Wissen und Wissenschaft. Wir müssen dieses Fundament zunächst verbessern und stärken."
 CHI_local_arms_production:0 "Lokale Waffenproduktion"
 CHI_local_arms_production_desc:1 "Solange wir als unbedeutende Nebenfraktion im Krieg gelten, können wir uns nicht auf Waffenlieferungen von außen verlassen. Wir müssen unsere eigenen Arsenale für den Waffenbau aufbauen."
 CHI_long_term_economic_planning:0 "Langfristige Wirtschaftsplanung"
 CHI_long_term_economic_planning_desc:1 "Unser bürokratischer Apparat ist nicht so groß wie der der Zentralregierung. Dies ermöglicht es uns, einen Großteil der Bürokratie abzubauen, die die wirtschaftliche Entwicklung behindert, und unsere bescheidenen Anstrengungen auf die Erzielung des größtmöglichen Nutzens zu konzentrieren."
 CHI_local_arms_development:0 "Lokale Waffenentwicklung"
 CHI_local_arms_development_desc:1 "Es reicht nicht aus, einfache Kopien ausländischer Waffen herzustellen. Wenn wir mit dem Rest Chinas Schritt halten wollen, müssen wir neue Waffen entwickeln."
 90_days_tt:0 "Die Umsetzung wird etwa 90 Tage dauern.\n"
 CHI_heavy_weapons_development:0 "Entwicklung schwerer Waffen"
 CHI_heavy_weapons_development_desc:1 "Angesichts der knappen Ressourcen müssen wir die geringe Feuerkraft, die uns zur Verfügung steht, optimal nutzen. Wir sollten die Entwicklung neuer Artilleriegeschütze anordnen."
 CHI_anti_opposition_campaigns:0 "Kampagnen gegen die Opposition"
 CHI_anti_opposition_campaigns_desc:0 "Unsere Feinde sammeln sich direkt hinter unseren Grenzen. Wir können nicht zulassen, dass sie dort unkontrolliert bleiben. Eine Reihe kleiner Offensiven wird sie zurückdrängen und uns mehr Raum verschaffen."
 CHI_anti_opposition_campaigns_effect_tooltip:0 "Schaltet £decision_icon_small §HDecisions§! frei, um §HBorder Conflicts§! mit Warlords zu starten, die nicht mit unserer Seite kooperieren.\n"
 CHI_anti_opposition_campaigns_effect_tooltip_no_communists:0 "§RNoch hat sich kein Kriegsherr auf die Seite der Kommunisten gestellt.§!\n"
 CHI_anti_opposition_campaigns_effect_tooltip_no_nationalists:0 "§RNoch hat sich kein Kriegsherr auf die Seite der Nationalisten gestellt.§!\n"
 CHI_institute_cross_border_raids:0 "Institut für grenzüberschreitende Razzien"
 CHI_institute_cross_border_raids_desc:0 "Wir werden als unabhängiger Kandidat im Kampf um die chinesische Führung nicht ernst genommen, wenn wir der Welt nicht zeigen, dass wir bereit und in der Lage sind, für unser Land zu kämpfen. Ein paar kleinere Überfälle werden unsere Entschlossenheit zeigen und uns vielleicht ermöglichen, unbewachtes Gebiet zu erobern."
 CHI_institute_cross_border_raids_effect_tooltip:0 "Schaltet £decision_icon_small §HDecisions§! frei, um §HBorder Conflicts§! mit Warlords und [WTT_PRC.GetNameDef] zu starten\n"
 CHI_provoke_border_clashes_effect_tooltip:0 "Schaltet £decision_icon_small §HDecisions§! frei, um einen §HGrenzkonflikt§! mit [WTT_current_china_leader.GetNameDef] zu beginnen\n"
 CHI_inflation_up_tt:0 "§RIncreases§! inflation.\n"
 CHI_inflation_down_tt:0 "§GRenkt§! die Inflation.\n"
 CHI_invite_foreign_investors:0 "Laden Sie ausländische Investoren ein"
 CHI_invite_foreign_investors_desc:0 "So demütigend es auch sein mag, der beste Weg zur Industrialisierung unseres Landes besteht darin, genau auf die Menschen zuzugehen, die uns ausbeuten."
 CHI_mission_to_germany:0 "Mission nach Deutschland"
 CHI_mission_to_germany_desc:0 "Die Parias Europas haben große Fortschritte bei der Reform ihres Landes und der Rückkehr zu seinem früheren Glanz gemacht. Wir können viel von ihnen lernen."
 CHI_give_falkenhausen_citizenship:0 "Falkenhausener Bürgerschaft verleihen"
 CHI_give_falkenhausen_citizenship_desc:0 "Die deutschen Berater haben beim Wiederaufbau und der Modernisierung unserer Streitkräfte hervorragende Arbeit geleistet. Wir sollten dafür sorgen, dass sie hier bleiben können, egal wie sich die politische Lage verändert."
 falkenhausen_tt:0 "Von Falkenhausen wurde bereits die Staatsbürgerschaft einer anderen Nation angeboten."
 CHI_chinese_general_staff:0 "Chinesischer Generalstab"
 CHI_chinese_general_staff_desc:0 "Ein gut organisierter Generalstab ist der Schlüssel zur Planung komplexer Operationen. Wir sollten vom deutschen Beispiel lernen und eine ähnliche Organisation schaffen."
 CHI_wargaming_division:0 "Wargaming-Abteilung"
 CHI_wargaming_division_desc:0 "Wir sollten im Generalstab eine spezielle Abteilung einrichten, die sich mit der Vorhersage zukünftiger Kriege befasst und neue Taktiken und Strategien zur Bekämpfung unserer Feinde entwickelt. Vielleicht könnten sie mit einer Art Computergerät einen Weltkrieg simulieren ..."
 CHI_closer_ties_with_germany:0 "Engere Beziehungen zu Deutschland"
 CHI_closer_ties_with_germany_desc:0 "Unsere Mission in Deutschland hat die Möglichkeit einer noch intensiveren Zusammenarbeit eröffnet, darunter auch ein Darlehen zur Finanzierung der weiteren industriellen Entwicklung."
 CHI_purchase_tanks:0 "Panzer kaufen"
 CHI_purchase_tanks_desc:0 "Gepanzerte Fahrzeuge werden die Speerspitze der modernen Kriegsführung bilden. Wir sollten eine bescheidene Anzahl an Panzern kaufen, um die ersten Panzereinheiten der chinesischen Armee aufzustellen."
 CHI_chinese_panzers:0 "Chinesische Panzer"
 CHI_chinese_panzers_desc:0 "Deutsche Panzer sind ohne Zweifel die besten der Welt. Wir sollten von ihrem Beispiel lernen und unsere eigenen Panzer nach ihrem Vorbild entwickeln."
 CHI_tank_plant:0 "Tankanlage"
 CHI_tank_plant_desc:0 "Da die Forschung an neuen Tanks voranschreitet, können wir jetzt in eine spezielle Anlage zu deren Bau investieren."
 CHI_experimental_mechanised_unit:0 "Experimentelle mechanisierte Einheit"
 CHI_experimental_mechanised_unit_effect:0 "Gewinnen Sie eine Division mit 2 §YLeichten Panzern§! und 4 §YMotorisierten§! Bataillonen\n"
 CHI_experimental_mechanised_unit_desc:0 "Theoretiker in Europa diskutieren seit langem über den optimalen Einsatz von Panzern. Eine Kombination aus mobiler Infanterie und schnellen Panzern scheint die beste Lösung zu sein. Wir werden eine solche Einheit aufstellen."
 CHI_combined_arms_warfare:0 "Kombinierte Waffenkriegsführung"
 CHI_combined_arms_warfare_desc:0 "Während Lastwagen für die ersten Experimente in der modernen mechanisierten Kriegsführung gut genug sind, sind sie aufgrund ihrer schlechten Geländegängigkeit und fehlenden Panzerung für den Fronteinsatz ungeeignet."
 CHI_hire_soviet_designer:0 "Sowjetischen Designer einstellen"
 CHI_hire_soviet_designer_desc:0 "Die Sowjets experimentieren schon lange mit Panzern und verfügen über einige der besten Panzerkonstrukteure der Welt. Wir könnten einen von ihnen beauftragen, für uns gepanzerte Kampffahrzeuge zu entwerfen."
 CHI_joint_tank_development:0 "Gemeinsame Panzerentwicklung"
 CHI_joint_tank_development_desc:0 "Nach den Erfahrungen aus der Zusammenarbeit mit sowjetischen Designern sollten wir gemeinsame Designteams bilden, um die Arbeit besser zu koordinieren und voneinander zu lernen."
 CHI_mission_to_the_soviet_union:0 "Mission in die Sowjetunion"
 CHI_mission_to_the_soviet_union_desc:0 "Die Sowjetunion hat Interesse an China bekundet, vor allem um ein Gegengewicht zum japanischen Expansionismus zu schaffen. Wir sollten eine Delegation nach Moskau schicken, um zu prüfen, ob unsere Ziele übereinstimmen."
 CHI_rapprochement_with_soviet_union:0 "Annäherung an die Sowjetunion"
 CHI_rapprochement_with_soviet_union_desc:0 "Auch wenn es zwischen uns und der Sowjetunion ideologische Differenzen gibt, ist es klar, dass sie dieselben Interessen verfolgen wie wir. Wir sollten unsere neuen Beziehungen formalisieren und einen gegenseitigen Nichtangriffspakt unterzeichnen, um der Welt zu zeigen, dass wir zusammenstehen."
 CHI_invite_soviet_advisers:0 "Laden Sie sowjetische Berater ein"
 CHI_invite_soviet_advisers_desc:0 "Die Sowjets haben angeboten, eine Militärmission zu entsenden, um uns beim Wiederaufbau unseres Militärs zu helfen."
 soviet_advisers_tt:0 "Die Sowjets haben bereits eine Militärmission zu einer Fraktion in China geschickt"
 CHI_the_soviet_volunteer_group:0 "Die sowjetische Freiwilligengruppe"
 CHI_the_soviet_volunteer_group_desc:0 "Unsere Luftwaffe ist im Vergleich zu anderen Mächten in der Region weiterhin stark unterbesetzt. Die Sowjets scheinen der Möglichkeit, eine Freiwilligengruppe zu entsenden, gegenüber aufgeschlossen."
 CHI_reach_out_to_france:0 "Erreichen Sie Frankreich"
 CHI_reach_out_to_france_desc:0 "Auch wenn die Franzosen uns wiederholt gedemütigt und uns zu neuen Zugeständnissen gezwungen haben, könnte es in der gegenwärtigen Situation durchaus sein, dass wir ihre Hilfe brauchen."
 CHI_small_arms_expertise:0 "Fachwissen zu Kleinwaffen"
 CHI_small_arms_expertise_desc:0 "Das Einzelgewehr ist noch immer die entscheidende Waffe unserer Armee. Wir sollten unsere bescheidenen Mittel darauf konzentrieren, diesen Bereich so modern wie möglich zu halten."
 CHI_elite_mountaineers:0 "Elite-Bergsteiger"
 CHI_elite_mountaineers_desc:0 "Die alpine Kriegsführung ist eine ganz andere Sache als der Kampf in der Ebene. Wir sollten spezialisierte Divisionen in dieser Kunst ausbilden, um unser Gelände optimal zu nutzen."
 CHI_free_mountain_template_tt:0 "Erhalte eine Vorlage mit §Y7 Gebirgs-§!- und §Y2 Artillerie-§!-Bataillonen.\n"
 CHI_heavy_weapons:0 "Schwere Waffen"
 CHI_heavy_weapons_desc:0 "Eine Armee ohne unterstützende Artillerie kann keinem ernsthaften Angriff standhalten. Wir müssen dafür sorgen, dass unsere Armee dafür ausreichend ausgerüstet ist."
 CHI_guarantee_the_hanoi_route:0 "Garantieren Sie die Hanoi-Route"
 CHI_guarantee_the_hanoi_route_desc:0 "Die Route durch Hanoi und nach Norden bis zu unserer Grenze bietet die größtmögliche Unterstützung von außen, sollte ein Krieg mit Japan ausbrechen."
 CHI_construction_battalions:0 "Baubataillone"
 CHI_construction_battalions_desc:0 "Wenn es etwas gibt, das unser Land im Überfluss hat, dann sind es Menschen. Wir können Spezialeinheiten bilden, die für wichtige militärische Ingenieursarbeiten kaum mehr als Schaufeln benötigen."
 CHI_french_military_mission:0 "Französische Militärmission"
 CHI_french_military_mission_desc:0 "Die französische Armee ist eine der am besten ausgebildeten in Europa. Wir können viel von ihr lernen."
 CHI_french_drill:0 "Französischer Drill"
 CHI_french_drill_desc:0 "Die Erfahrungen Frankreichs im Ersten Weltkrieg haben eine Armee hervorgebracht, die sich durch hervorragende Verteidigungsfähigkeiten auszeichnet. Durch die Übernahme ihrer Ausbildungsmethoden und -standards können wir unsere eigenen Verteidigungsfähigkeiten verbessern."
 CHI_modern_logistics:0 "Moderne Logistik"
 CHI_modern_logistics_desc:0 "Ohne ein funktionierendes Logistiksystem sind wir nicht in der Lage, eine Armee im Feld zu unterhalten."
 CHI_renegotiate_the_unequal_treaties:0 "Die ungleichen Verträge neu verhandeln"
 CHI_renegotiate_the_unequal_treaties_desc:0 "Viel zu lange haben uns die westlichen Länder diktiert, wie wir innerhalb unserer Grenzen Geschäfte machen sollen. Ihre Bürger werden von unseren Gesetzen geschützt, und wir haben keinen Einfluss darauf, wie sie in unseren Städten Geschäfte machen. Das muss ein Ende haben. Wir werden ihnen wieder auf Augenhöhe gegenübertreten."
 CHI_one_china_policy:0 "Ein-China-Politik"
 CHI_one_china_policy_desc:0 "In den Wirren nach der Revolution spalteten sich mehrere Gebiete ab und versuchten, eigene Staaten zu gründen. Einige hörten lediglich nicht mehr auf die Zentralregierung, andere gaben vor, wieder souveräne Staaten zu sein. Gestärkt wie wir jetzt sind, werden wir öffentlich erklären, dass wir Anspruch auf die alten chinesischen Grenzen erheben, die seit Jahrhunderten Bestand hatten."
 CHI_integrate_tibet:0 "Tibet integrieren"
 CHI_integrate_tibet_desc:0 "Das Experiment der tibetischen Unabhängigkeit ist vorbei. Eine militärische Invasion ist eine Option, aber wir sollten versuchen, sie mit friedlichen Mitteln wieder in die Gemeinschaft zurückzuholen."
 CHI_conquer_tibet:0 "Erobere Tibet"
 CHI_conquer_tibet_desc:0 "Tibet liegt in strategisch kritischem Gebiet zwischen uns und Indien. Die Tibeter sind zu schwach, um sich zu verteidigen. Wir müssen eingreifen, um unsere Südflanke zu schützen."
 CHI_renounce_the_mcmahon_line:0 "Verzicht auf die McMahon-Linie"
 CHI_renounce_the_mcmahon_line_desc:0 "Die alte Grenze zwischen der britischen Regierung und den Briten war nie korrekt, selbst wenn die Briten vorgaben, sie zu respektieren. Jahrzehntelang waren wir zu schwach, sie anzufechten. Jetzt nicht mehr."
 CHI_demand_mongolia:0 "Nachfrage Mongolei"
 CHI_demand_mongolia_desc:0 "Die Mongolei ist zwischen uns und Russland gefangen und könnte jederzeit in ihre Hände fallen. Wir müssen zuerst zuschlagen."
 CHI_anti_imperialism:0 "Antiimperialismus"
 CHI_lessons_of_war_completed:0 "Alle Schritte der §YArmeereform§! und §YLektionen des Krieges§! abgeschlossen.\n"
 CHI_anti_imperialism_desc:0 "Wir sind heute eine der ersten Nationen, die die Fesseln des Kolonialismus abgeworfen haben. Es ist unsere heilige Pflicht, dafür zu sorgen, dass auch die anderen Völker Asiens ihr Schicksal selbst bestimmen können."
 CHI_guidance_and_support:0 "Beratung und Unterstützung"
 CHI_guidance_and_support_desc:0 "Die Völker Indochinas werden weiterhin Hilfe beim Aufbau ihrer eigenen Nationen benötigen. Wir werden dafür sorgen, dass sie nicht erneut dem Druck von außen erliegen."
 CHI_indian_cooperation:0 "Indische Zusammenarbeit"
 CHI_indian_cooperation_desc:0 "Die Völker Indiens kämpfen darum, die letzten Fesseln der kolonialen Unterdrückung abzuschütteln. Wir sollten ihnen die Hand reichen, ihren Kampf unterstützen und gemeinsam für eine bessere Zukunft unserer beiden Nationen arbeiten."
 CHI_commit_to_korean_independence:0 "Setzen Sie sich für die Unabhängigkeit Koreas ein"
 CHI_commit_to_korean_independence_desc:0 "Die Koreaner waren die ersten Opfer der japanischen Besatzung. Sie werden wieder als freies Volk inmitten der Nationen der Welt existieren."
 CHI_influence_mongolia:0 "Einfluss der Mongolei"
 CHI_influence_mongolia_desc:0 "Die Mongolei als Pufferstaat zwischen uns und Russland sichert unsere Nordflanke. Wir müssen nur dafür sorgen, dass sie für sich selbst sorgen kann."
 CHI_imperial_legacy:0 "Kaiserliches Erbe"
 CHI_imperial_legacy_desc:0 "China ist seit Jahrtausenden die dominierende Macht im Osten und Garant für Frieden und Stabilität in der Region. Es ist an der Zeit, dass wir unsere frühere Position zurückerobern."
 CHI_overlordship_over_indochina:0 "Oberherrschaft über Indochina"
 CHI_overlordship_over_indochina_desc:0 "Indochina ist seit jeher auf den Schutz Chinas angewiesen. Die Tatsache, dass das Gebiet an die Franzosen fiel, zeigt, dass diese nicht in der Lage sind, sich selbst zu schützen."
 CHI_dominate_japan:0 "Beherrsche Japan"
 CHI_dominate_japan_desc:0 "Seit Jahrzehnten stellt Japan die größte Bedrohung für unsere Unabhängigkeit dar. Sie haben sich bereits mit den Westmächten verbündet, um uns zu unterwerfen. Wir können nicht zulassen, dass sie einen weiteren Versuch starten. Wir müssen zuerst zuschlagen."
 CHI_secure_the_peninsula:0 "Sichern Sie die Halbinsel"
 CHI_secure_the_peninsula_desc:0 "Es liegt in unserem besten Interesse, sicherzustellen, dass die koreanische Halbinsel nie wieder von einer feindlichen Macht besetzt wird."
 CHI_british_cooperation:0 "Britische Zusammenarbeit"
 CHI_british_cooperation_desc:0 "Auch wenn es sich bei ihnen um Erzimperialisten handelt, bietet die Zusammenarbeit mit den Briten die beste Chance, unsere Luftwaffe zu modernisieren und einen stetigen Nachschub sicherzustellen."
 CHI_burma_road:0 "Burma Road"
 CHI_burma_road_desc:0 "Die Burmastraße ist unsere Lebensader zum Westen. Sie muss um jeden Preis geschützt und ausgebaut werden, um einen reibungslosen Versorgungsfluss zu gewährleisten."
 CHI_ledo_road:0 "Ledo-Straße"
 CHI_ledo_road_desc:0 "Die Burmastraße allein reicht nicht aus, um uns am Leben zu erhalten. Wir müssen neue Wege finden, um Nachschub zu beschaffen und so im Kampf zu bleiben."
 CHI_fighter_purchases:0 "Kämpferkäufe"
 CHI_fighter_purchases_desc:0 "Unsere Luftwaffe braucht moderne Kampfflugzeuge, um mit den Bedrohungen aus dem Ausland Schritt halten zu können. Unsere Industrie ist derzeit nicht in der Lage, diese zu produzieren, daher müssen wir sie im Ausland kaufen."
 CHI_camco:0 "CAMCO"
 CHI_camco_desc:0 "Wenn wir eine unabhängige Luftfahrtindustrie aufbauen wollen, müssen wir zunächst die Techniken und Methoden erlernen, um die Flugzeuge, die wir bereits haben, zusammenzubauen und zu warten."
 CHI_local_fighter_production:0 "Lokale Kampfflugzeugproduktion"
 CHI_local_fighter_production_desc:0 "Da die Belegschaft nun mit den grundlegenden Wartungsaufgaben vertraut ist, können wir mit der Produktion aller Komponenten für ein modernes Kampfflugzeug fortfahren."
 CHI_local_bomber_production:0 "Lokale Bomberproduktion"
 CHI_local_bomber_production_desc:0 "Nachdem wir die Produktionstechnologien für einmotorige Flugzeuge beherrschen, können wir versuchen, schwerere, mehrmotorige Modelle für die Bodenunterstützung zu entwickeln und zu produzieren."
 CHI_the_hump:0 "Der Buckel"
 CHI_the_hump_desc:0 "Der Lufttransport über den Himalaya ist zwar kein guter Ersatz für die anderen Transportwege, lässt sich aber viel schwieriger unterbrechen."
 CHI_chinese_expeditionary_force:0 "Chinesische Expeditionstruppe"
 CHI_chinese_expeditionary_force_desc:0 "Um die Koordination mit unseren Verbündeten zu verbessern, haben die Amerikaner einen ihrer Generäle entsandt, um eine gemeinsame Truppe anzuführen."
 CHI_the_chu_x_po:0 "Der Chu X-PO"
 CHI_the_chu_x_po_desc:0 "Die Chu X-PO stellt den Höhepunkt der Entwicklung in China dar – das erste im Inland entwickelte und produzierte Kampfflugzeug, das sich gegen jeden Feind behaupten kann."
 CHI_mission_to_the_us:0 "Mission in die USA"
 CHI_mission_to_the_us_soong_us_decision:0 "Solange §YSoong Mei-Ling§! eine §YPolitische Beraterin§! ist, können die USA unseren Krieg gegen §YJapan§! unterstützen.\n"
 CHI_mission_to_the_us_desc:0 "China hat in den USA seit langem starke Verbündete. Sie bieten die beste Chance, die Unterstützung zu erhalten, die wir brauchen."
 CHI_hire_chennault:0 "Chennault mieten"
 CHI_hire_chennault_desc:0 "Claire Chennault ist ein amerikanischer Luftkriegstheoretiker, der Interesse an einer Tätigkeit bei uns gezeigt hat. Wir sollten ihn für den Wiederaufbau unserer Luftwaffe engagieren."
 CHI_invite_the_flying_tigers:0 "Laden Sie die Flying Tigers ein"
 CHI_invite_the_flying_tigers_desc:0 "Unsere Freunde in Amerika haben eine Gruppe freiwilliger Piloten organisiert und mehrere moderne Flugzeuge gekauft, um uns zu unterstützen. Wir müssen es nur sagen."
 CHI_sino_american_cooperative_organization:0 "Chinesisch-Amerikanische Genossenschaftsorganisation."
 CHI_sino_american_cooperative_organization_desc:0 "Der amerikanische Geheimdienst ist bereit, mit uns zusammenzuarbeiten, um Spezialoperationen hinter den feindlichen Linien zu organisieren. Dies kann uns helfen, unsere eigenen Fähigkeiten auf diesem Gebiet zu entwickeln."
 CHI_light_cruiser_project:0 "Leichtkreuzer-Projekt"
 CHI_light_cruiser_project_desc:0 "Der erste Schritt zur Schaffung einer glaubwürdigen Hochseeflotte ist die Modernisierung unserer Kreuzerflotte. Unser erstes Projekt sollte nicht zu ehrgeizig sein."
 CHI_heavy_cruiser_project:0 "Schweres Kreuzerprojekt"
 CHI_heavy_cruiser_project_desc:0 "Aufgrund des Erfolgs des vorherigen Kreuzerdesigns können wir es erweitern und seine Leistung verbessern und so ein leistungsfähigeres Schiff zur Verteidigung unserer Flotten schaffen."
 CHI_naval_aviation:0 "Marineflieger"
CHI_naval_aviation_desc:0 "Die Zukunft der Seekriegsführung liegt im Flugzeugträger. Wir werden nie als echte Seemacht gelten, wenn wir nicht über eigene Flugzeugträger verfügen."
 CHI_carrier_air_wing:0 "Trägergeschwader"
 CHI_carrier_air_wing_desc:0 "Ein Flugzeugträger ist nur so gut wie die Flugzeuge, die von ihm abheben. Wir müssen sicherstellen, dass es sich dabei um die leistungsfähigsten und modernsten verfügbaren Typen handelt."
 CHI_investment_into_shipbuilding:0 "Investitionen in den Schiffbau"
 CHI_investment_into_shipbuilding_desc:0 "Eine große Flotte erfordert eine starke industrielle Basis. Wir sollten ausländische Investoren einladen, uns beim Aufbau unserer Werften zu helfen."
 CHI_order_destroyers:0 "Zerstörer bestellen"
 CHI_order_destroyers_desc:0 "Als erster Schritt zur Wiederbewaffnung der Marine sollte eine kleine Gruppe von Zerstörern produziert werden."
 CHI_train_marines:0 "Marines ausbilden"
 CHI_train_marines_desc:0 "Unsere lange Küstenlinie ist anfällig für feindliche Landungen, bietet aber auch die Möglichkeit, aus einer unerwarteten Richtung anzugreifen, sollte ein Feind über Land einfallen."
 CHI_collaboration_with_the_japanese:0 "Zusammenarbeit mit den Japanern"
 CHI_collaboration_with_the_japanese_desc:0 "Was auch immer ihre Pläne mit China sind, die Japaner haben klar gemacht, dass sie bereit sind, mit uns zusammenzuarbeiten, wenn wir ihnen genügend Respekt entgegenbringen."
 CHI_modern_submarines:0 "Moderne U-Boote"
 CHI_modern_submarines_desc:0 "Die Japaner sind nicht bereit, uns das technische Wissen zu vermitteln, um ihre Flotte im offenen Kampf herauszufordern, aber sie betrachten den U-Boot-Krieg als eine Hilfswaffe. Wir müssen diese Meinung natürlich nicht unbedingt teilen."
 CHI_coastal_patrol_planes:0 "Küstenpatrouillenflugzeuge"
 CHI_coastal_patrol_planes_desc:0 "Unsere langen Küstenlinien können nur aus der Luft effektiv überwacht werden. Moderne Marinebomber ermöglichen uns die Verteidigung unserer Küsten ohne großen Ressourcenaufwand."
 CHI_three_principles_of_the_people:0 "Die drei Prinzipien des Volkes"
 CHI_three_principles_of_the_people_desc:0 "Der Gründer der Republik, Dr. Sun Yat-Sen, legte drei Grundprinzipien fest, die sie prägen sollten: Minzu, Minquan und Minsheng – Nationalismus, Demokratie und soziale Wohlfahrt."
 CHI_welfare:0 "Wohlfahrt"
 CHI_welfare_desc:0 "Ein moderner Staat kümmert sich um seine Bürger, sodass diese ihn im Notfall verteidigen können und wollen."
 CHI_refugee_relief_agency:0 "Flüchtlingshilfswerk"
 CHI_refugee_relief_agency_desc:0 "Durch die Kriegswirren sind Millionen Menschen obdachlos geworden. Wir werden eine Agentur gründen, die ihnen bei der Suche nach einer neuen Bleibe hilft."
 CHI_land_tax_reform:0 "Grundsteuerreform"
 CHI_land_tax_reform_desc:0 "Unsere Finanzen müssen dringend reformiert werden. Dazu gehört auch, dass wir unsere Steuerbasis erweitern müssen."
 CHI_refugee_resettlement:0 "Flüchtlingsansiedlung"
 CHI_refugee_resettlement_desc:0 "Die Millionen verzweifelter und obdachloser Kriegsflüchtlinge müssen irgendwo untergebracht werden. Indem wir ihnen Schutz in unserem Land gewähren, können wir sie als Rekrutierungsquelle für unsere Armee und die Wirtschaft erhalten."
 CHI_new_life_movement:0 "Neue Lebensbewegung"
 CHI_new_life_movement_desc:0 "Die vier Tugenden Moral, Ehrlichkeit, Gerechtigkeit und Loyalität werden unsere Bürger künftig zu einem besseren und produktiveren Leben führen."
 CHI_unemployment_assistance:0 "Arbeitslosenhilfe"
 CHI_unemployment_assistance_desc:0 "Arbeitslosigkeit darf einen Bürger niemals in Armut und Not stürzen. Der Hunger ist der beste Verbündete der Kommunisten."
 CHI_free_hospitals:0 "Kostenlose Krankenhäuser"
 CHI_free_hospitals_desc:0 "Eine große Nation lässt ihre Bürger in Krankheitszeiten nicht allein. Durch die Schaffung eines umfassenden Gesundheitssystems verbessern wir die allgemeine Gesundheit unserer Bevölkerung. Die Bevölkerung wird sich dafür einsetzen, dieses System zu verteidigen."
 CHI_rural_schooling:0 "Ländliche Schulbildung"
 CHI_rural_schooling_desc:0 "Eine gut ausgebildete Bevölkerung ist der Schlüssel zur Modernisierung einer Nation. Wir können uns nicht auf eine kleine Handvoll gebildeter Verwaltungsangestellter verlassen, sondern müssen den Geist des Wissens und der Wissenschaft in jedes Dorf tragen."
 CHI_democracy:0 "Demokratie"
 CHI_democracy_desc:0 "Die von Dr. Sun Yat-Sen begonnene Reise muss letztendlich zu einer Republik führen. Es wird zweifellos eine lange Reise sein, aber wir gehen sie Schritt für Schritt an."
 CHI_constitutional_reform:0 "Verfassungsreform"
 CHI_constitutional_reform_desc:0 "Die Probleme, mit denen wir heute konfrontiert sind, sind zum Teil darauf zurückzuführen, dass es keine Verfassung gibt, die den Realitäten in China gerecht wird. Wir müssen hier Abhilfe schaffen."
 CHI_republicanism:0 "Republikanismus"
 CHI_republicanism_desc:0 "Viele im Westen fragen sich, ob wir es ernst meinen mit der Idee, eine Republik nach westlichem Vorbild zu werden. Wir sollten unsere Absichten öffentlich erklären."
 CHI_inter_party_coordination_council:0 "Interparteilicher Koordinierungsrat"
 CHI_inter_party_coordination_council_desc:0 "Ein erster Schritt zur Umwandlung unseres Landes in eine funktionierende Mehrparteiendemokratie und zur Beendigung der notwendigen Bevormundung des Volkes wird eine Organisation sein, die anderen interessierten Parteien die Mitsprache bei der Politikgestaltung ermöglicht."
 CHI_judicial_yuan:0 "Justiz-Yuan"
 CHI_judicial_yuan_desc:0 "Dr. Sun Yat-Sen stellte sich eine moderne Republik mit Gewaltenteilung vor. Unsere Justiz muss unabhängig von äußeren Einflüssen sein und Fälle ausschließlich auf Grundlage des Gesetzes entscheiden."
 CHI_control_yuan:0 "Kontrollieren Sie Yuan"
 CHI_control_yuan_desc:0 "Korruption ist in jeder Regierung unvermeidlich. Eine effektive Regierung erfordert Anstrengungen, sie unter Kontrolle zu halten. Wir werden eine separate Regierungsgewalt schaffen, die der Legislative, Exekutive und Judikative gleichgestellt ist."
 CHI_examination_yuan:0 "Prüfungs-Yuan"
 CHI_examination_yuan_desc:0 "Jahrtausendelang wurden chinesische Bürokraten in strengen Prüfungen ausgewählt. Die erforderlichen Texte mögen sich geändert haben, das Prinzip ist jedoch dasselbe geblieben."
 CHI_executive_yuan:0 "Exekutiv-Yuan"
 CHI_executive_yuan_desc:0 "Den Kern der Regierung bildet die Exekutive, die die Gesetze ausführt. Ihre Schaffung ist daher nur logisch und der erste Schritt zur Schaffung einer funktionierenden republikanischen Regierung."
 CHI_legislative_yuan:0 "Legislativ-Yuan"
 CHI_legislative_yuan_desc:0 "Die Möglichkeit des Volkes, ein Gremium zu wählen, das die Gesetze erlässt, die für es gelten, ist ein zentraler Bestandteil der modernen Republik. Unser Land darf nicht als mangelhaft gelten."
 CHI_nationalismx:0 "Nationalismus"
 CHI_nationalismx_desc:0 "Die Idee der Zugehörigkeit zu einer Nation – und nicht zu einem Stamm oder einer Religion – macht aus einer Gruppe von Menschen einen Staat."
 CHI_foreign_threats:0 "Ausländische Bedrohungen"
 CHI_foreign_threats_desc:0 "Vor einigen Jahren entrissen uns die Japaner die Mandschurei und schufen einen Marionettenstaat. Sie werden nicht ruhen, bis sie ganz China unterworfen haben. Wir müssen bereit sein, uns ihnen entgegenzustellen, selbst wenn das bedeutet, dass wir mit lokalen Machthabern Pakten schließen müssen."
 CHI_prioritize_the_interior:0 "Priorisieren Sie den Innenraum"
 CHI_prioritize_the_interior_desc:0 "Bevor wir überhaupt daran denken können, das uns von den Japanern gestohlene Gebiet zurückzuerobern, müssen wir unser Landesinnere sichern. Aufgeteilt in mehrere gegeneinander kämpfende Regionen, haben wir keine Chance."
 CHI_united_front:0 "Vereinigte Front"
 CHI_united_front_desc:0 "Da uns die Japaner im Nacken sitzen, müssen wir bereit sein, Hilfe anzunehmen, wo immer wir sie bekommen können – sogar von den Kommunisten."
 CHI_pick_a_fight_with_japan:0 "Kämpfe gegen Japan"
 CHI_pick_a_fight_with_japan_desc:0 "Jahrelang haben die Japaner uns mit Forderungen überhäuft. Diese Zeiten sind vorbei. Wenn sie das nächste Mal auch nur die geringste Forderung an uns stellen, werden wir keinen Zentimeter nachgeben."
 CHI_anti_communism:0 "Antikommunismus"
 CHI_anti_communism_desc:0 "Der Kommunismus stellt die größte Bedrohung für unsere Nation dar. Er muss unerbittlich ausgelöscht werden."
 CHI_subjugate_the_warlords:0 "Unterwerfe die Kriegsherren"
 CHI_subjugate_the_warlords_desc:0 "In unserer Stunde der Schwäche übernahmen lokale Militärführer die Kontrolle über weite Teile des Landes. Es ist an der Zeit, sie daran zu erinnern, dass sie uns Rechenschaft ablegen müssen – so oder so."
 CHI_war_of_resistance:0 "Widerstandskrieg"
 CHI_war_of_resistance_desc:0 "Wir sind noch nicht stark genug, um den Krieg gegen die Japaner zu führen. Wir müssen den Invasoren Widerstand leisten, bis wir wieder angreifen können."
 CHI_industrial_evacuations:0 "Industrielle Evakuierungen"
 CHI_industrial_evacuations_desc:0 "Ein moderner Krieg wird in den Fabriken gewonnen. Eine Armee ohne Waffen ist nichts weiter als eine Gruppe von Menschen mit albernen Hüten."
 CHI_war_of_national_liberation:0 "Nationaler Befreiungskrieg"
 CHI_war_of_national_liberation_desc:0 "Nachdem der japanische Angriff abgewehrt wurde, können wir in die Offensive gehen und unser gesamtes Territorium befreien."
 CHI_scorched_earth_tactics:0 "Taktik der verbrannten Erde"
 CHI_scorched_earth_tactics_desc:0 "Im Kampf um das nationale Überleben ist nichts undenkbar und jede Option muss in Betracht gezogen werden."
 CHI_war_of_anti_imperialism:0 "Krieg des Antiimperialismus"
 CHI_war_of_anti_imperialism_desc:0 "Da unsere Länder nun frei von Unterdrückung sind, können wir unseren Blick auf die feindlichen Linien richten, um sicherzustellen, dass von dort aus nie eine Invasion erfolgen wird."
 CHI_forced_conscription:0 "Zwangsrekrutierung"
 CHI_forced_conscription_desc:0 "Unsere derzeitigen Rekrutierungsmethoden reichen nicht aus, um unseren Bedarf zu decken. Eine Niederlage in diesem Krieg bedeutet die Vernichtung, deshalb müssen wir unserem Volk noch mehr abverlangen."
 CHI_dare_to_die_corps:0 "Dare-to-Die-Corps"
 CHI_50_cheaper_force_attack:0 "§G-50%§! Kosten für §YForce Attack§!\n"
 CHI_dare_to_die_corps_desc:0 "Der Kampf um die Republik hat bereits viele Märtyrer gefordert. Und es werden noch viele weitere folgen. Ihre Opfer werden noch Generationen in Erinnerung behalten."
 CHI_military_affairs_commission:0 "Kommission für Militärangelegenheiten"
 CHI_military_affairs_commission_desc:0 "Unser Militär hat einen erschreckenden Mangel an Kompetenz gezeigt. Die Reform des Oberkommandos ist nur der erste Schritt zur Behebung dieses Problems."
 CHI_fortify_shanghai:0 "Shanghai stärken"
 CHI_fortify_shanghai_desc:0 "Wenn Japan angreift, wird der erste Schlag Shanghai treffen. Wir müssen vorbereitet sein."
 CHI_army_reform:0 "Armeereform"
 CHI_army_reform_desc:0 "Korruption, Inkompetenz und Feigheit sind auf allen Führungsebenen unserer Armee weit verbreitet. Die Lösung dieses Problems wird ein langer Prozess sein."
 CHI_bureau_of_investigation_and_statistics:0 "Amt für Untersuchungen und Statistik"
 CHI_bureau_of_investigation_and_statistics_desc:0 "Wir können es nicht zulassen, dass Verräter und Spione in unserem Land herumlaufen, während wir einen Krieg um die Zukunft unserer Nation führen. Die Methoden dieser neuen Agentur mögen unangenehm erscheinen, aber die Arbeit muss trotzdem erledigt werden."
 CHI_the_chinese_hindenburg_line:0 "Die chinesische Hindenburg-Linie"
 CHI_the_chinese_hindenburg_line_desc:0 "Unsere deutschen Berater haben uns viele nützliche Tipps zum Bau von Befestigungsanlagen gegeben, die wir aus dem Ersten Weltkrieg gelernt haben. Jeder Versuch des Feindes, aus Shanghai auszubrechen, wird an diesen Befestigungen scheitern."
 CHI_60_divisions_plan:0 "60 Divisionen Plan"
 CHI_60_divisions_plan_desc:0 "Anstatt sich zur Lösung des Problems auf die Masse der Truppen zu verlassen, schlagen unsere ausländischen Berater einen radikal neuen Plan vor: Eine kleinere Truppe aus hochtrainierten Divisionen, um dem Feind ebenbürtig zu sein. Ein Pilotprojekt wurde bereits gestartet."
 CHI_whampoa_military_academy:0 "Whampoa Militärakademie"
 CHI_whampoa_military_academy_desc:0 "Eine Armee ist ohne eine gute Führung nutzlos. Wenn wir unser Militär zu einer erstklassigen Streitmacht machen wollen, brauchen wir gut ausgebildete Offiziere, die es führen."
 CHI_unified_industrial_planning:0 "Einheitliche Industrieplanung"
 CHI_unified_industrial_planning_desc:0 "Unser aggressives Industrialisierungsprogramm darf nicht verzögert werden."
 CHI_expand_the_academica_sinica:0 "Erweitern Sie die Academica Sinica"
 CHI_expand_the_academica_sinica_desc:0 "Seit Jahrtausenden ist China weltweit führend in der Entwicklung von Kunst und Wissenschaft. Eine verstärkte Finanzierung unserer Universitäten ist nur der erste Schritt, um diese Position zurückzuerobern."
 CHI_chemical_research_institute:0 "Chemisches Forschungsinstitut"
 CHI_chemical_research_institute_desc:0 "Wir würden zwar niemals als erste chemische Waffen einsetzen, müssen uns aber im Falle eines Angriffs gegen sie verteidigen können. Wir sollten ein neues Forschungsinstitut finanzieren, um die notwendigen Methoden und Technologien zu entwickeln."
 CHI_rural_reconstruction_movement:0 "Bewegung für den Wiederaufbau des ländlichen Raums"
 CHI_rural_reconstruction_movement_desc:0 "Obwohl wir große Fortschritte bei der Verbesserung des Lebens unserer Stadtbevölkerung erzielt haben, trennen sie nur wenige Kilometer von den Bauern, die unter mittelalterlichen Bedingungen leben. Wir werden dafür sorgen, dass jeder unserer Bürger die Früchte unserer Arbeit genießen kann."
 CHI_mining_commission:0 "Bergbaukommission"
 CHI_mining_commission_desc:0 "Rohstoffe sind für die Kriegsanstrengungen von entscheidender Bedeutung. Wir müssen die Kontrolle über unsere Bergbauindustrie übernehmen, um sicherzustellen, dass sie das produziert, was wir brauchen."
 CHI_taiyuan_arsenal:0 "Taiyuan Arsenal"
 CHI_taiyuan_arsenal_desc:0 "Das Arsenal von Taiyuan ist einer der wenigen Orte in China, an dem schwere Waffen produziert werden können. Wir sollten es erweitern, um unsere Truppen mit Artillerie und anderen Waffen zu versorgen."
 CHI_develop_the_hanyan_arsenal:0 "Entwickeln Sie das Hanyan-Arsenal"
 CHI_develop_the_hanyan_arsenal_desc:0 "Das Hanyan-Arsenal versorgt die chinesische Armee schon seit langem mit Waffen. Durch den Ausbau wird sichergestellt, dass dies auch in Zukunft so bleibt."
 CHI_financial_policy:0 "Finanzpolitik"
 CHI_financial_policy_desc:0 "Die Staatsfinanzen sind nicht besonders solide, und die ehrgeizigen Regierungsprogramme beschwören das Schreckgespenst einer galoppierenden Hyperinflation herauf. Finanzreformen müssen eine unserer obersten Prioritäten sein."
 CHI_price_controls:0 "Preiskontrollen"
 CHI_price_controls_desc:0 "Der erste Schritt zur Kontrolle der Inflation besteht darin, dafür zu sorgen, dass wichtige Güter zu festen Preisen verkauft werden. Dies wird bei der Händlerklasse nicht gut ankommen."
 CHI_grain_tax:0 "Getreidesteuer"
 CHI_grain_tax_desc:0 "Die Kaufkraft der von der Regierung ausgegebenen Banknoten sinkt immer mehr. Bald werden wir unsere Armeen nicht mehr ernähren können. Wir könnten ein neues Gesetz erlassen, das die Bauern dazu zwingt, ihre Steuern in Getreide zu zahlen und so den Markt zu umgehen. Das wird ihnen nicht gefallen, und es besteht die Gefahr, dass es zu einer ausgewachsenen Hungersnot führt."
 CHI_reform_the_national_bank:0 "Reform der Nationalbank"
 CHI_reform_the_national_bank_desc:0 "Eine neue Nationalbank soll sämtliche Finanzaktivitäten der Regierung koordinieren und die notwendigen Mittel bereitstellen."
 CHI_forced_loans:0 "Zwangskredite"
 CHI_forced_loans_desc:0 "Die Kaufleute und Industriellen haben in Zeiten relativen Friedens unglaubliche Reichtümer angehäuft. Es ist sicherlich nicht zu viel verlangt, dass sie der Regierung in diesen verzweifelten Zeiten einen Teil dieses Reichtums zur Verfügung stellen und ihnen eine sofortige Rückzahlung versprechen, sobald die Lage es erlaubt."
 CHI_purchase_tanks_tt:0 "Wir erhalten von unserem Unterstützer 100 alte leichte Panzer."
 CHI_purchase_fighters_tt:0 "Wir werden 50 alte Kampfflugzeuge von unserem Unterstützer erhalten. Die Unterstützung Großbritanniens und der USA sichert uns den Verkauf von Kampfflugzeugen von beiden Seiten."
 PRC_strengthen_the_central_secretariat:0 "Stärkung des Zentralsekretariats"
 PRC_strengthen_the_central_secretariat_desc:0 "Nach dem Langen Marsch müssen wir unsere politische Organisation neu organisieren, um einen Staat zu schaffen, der mit den Nationalisten konkurrieren kann."
 PRC_marxist_orthodoxy:0 "Marxistische Orthodoxie"
 PRC_marxist_orthodoxy_desc:0 "Der Schlüssel zur Verwirklichung des wahren Kommunismus liegt in der größtmöglichen Umsetzung der Lehren von Marx."
 PRC_soviet_leadership:0 "Sowjetische Führung"
 PRC_soviet_leadership_desc:0 "Die Sowjetunion ist das führende Land auf dem Weg zum vollständigen Kommunismus. Wir sollten dies anerkennen und von ihrem Beispiel lernen."
 PRC_soviet_economic_aid:0 "Sowjetische Wirtschaftshilfe"
 PRC_soviet_economic_aid_desc:0 "Die Zerstörungen des Langen Marsches würden ohne Hilfe von außen Generationen brauchen, um überwunden zu werden. Wir sollten uns an die Sowjets wenden und sie um wirtschaftliche Unterstützung bitten. "
 PRC_internationalism:0 "Internationalismus"
 PRC_internationalism_desc:0 "Die Arbeiter und Bauern der Welt müssen sich vereinen, um ihre Fesseln abzuwerfen. Schulter an Schulter werden wir eine bessere Zukunft aufbauen."
 PRC_agrarian_socialism:0 "Agrarsozialismus"
 PRC_agrarian_socialism_desc:0 "China ist nicht wie die Industrienationen dieser Welt. Eine kommunistische Revolution zu erwarten, wie Marx sie sich vorstellte, hieße, die Lage unseres Landes zu missverstehen."
 PRC_rectification_campaign:0 "Korrekturkampagne"
 PRC_rectification_campaign_desc:0 "Es gab zahlreiche Missverständnisse über den Verlauf unseres Kampfes. Wir sollten den fehlgeleiteten Genossen die Chance geben, ihre Fehler einzugestehen."
 PRC_maoism1:0 "Maoismus"
 PRC_maoism1_desc:0 "Der Große Vorsitzende hat viele Monate damit verbracht, seine politischen Theorien zu einer kohärenten Ideologie zu entwickeln, die unser Land voranbringen wird."
 PRC_socialism_with_chinese_characteristics:1 "Marxismus chinesischer Prägung"
 PRC_socialism_with_chinese_characteristics_desc:1 "Obwohl Marx zweifellos brillant war, schrieb er aus einer spezifisch europäischen Perspektive. Die besondere Situation Chinas wird sich in der Umsetzung unserer sozialistischen Politik widerspiegeln."
 PRC_proclaim_the_peoples_republic:0 "Proklamieren Sie die Volksrepublik"
 PRC_proclaim_the_peoples_republic_desc:0 "Nach dem Sieg über die Nationalisten ist es an der Zeit, unseren rechtmäßigen Platz als legitime Regierung Chinas einzunehmen. Es bleibt noch viel zu tun, aber die Zukunft sieht rosiger aus als je zuvor."
 PRC_socialist_market_economy:0 "Sozialistische Marktwirtschaft"
 PRC_socialist_market_economy_desc:0 "Der Weg zum Sozialismus und Kommunismus führt per Definition über den Kapitalismus. China hat nie eine echte kapitalistische Marktwirtschaft entwickelt, was Fortschritte in Richtung Sozialismus nahezu unmöglich macht. Wir müssen zunächst die kapitalistische Produktionsweise entwickeln, bevor wir weiter vorankommen können."
 PRC_social_democracy:0 "Sozialdemokratie"
 PRC_social_democracy_desc:0 "Die radikale Politik der Partei hat die Lage verschlimmert, nicht verbessert. Die Nationalisten sind trotz all ihrer Schwächen unsere Verbündeten im Kampf um eine bessere Zukunft. Wir müssen politisch auf sie zugehen."
 PRC_coalition_government:0 "Koalitionsregierung"
 PRC_coalition_government_desc:0 "Obwohl die Vereinigung unseres Landes offensichtlich noch in weiter Ferne liegt, wird die Bildung einer gemeinsamen Regierung mit den Nationalisten den Weg ebnen."
 PRC_purge_the_radicals:0 "Säubern Sie die Radikalen"
 PRC_purge_the_radicals_desc:0 "Bestimmte Elemente in unserer Partei glauben immer noch an die Doktrin des Klassenkampfes und an den Widerstand gegen die sogenannte Ausbeuterklasse. Sie werden gehen müssen."
 PRC_strengthen_the_left_wing_of_the_kmt:0 "Stärkung des linken Flügels der KMT"
 PRC_strengthen_the_left_wing_of_the_kmt_desc:0 "Die Nationalisten haben ihre eigenen Probleme mit internen Fraktionen, die versuchen, die Bemühungen um eine Einigung zwischen unseren Regimen zu sabotieren. Wir sollten alles in unserer Macht Stehende tun, um sicherzustellen, dass unsere Verbündeten in der KMT diesen Machtkampf gewinnen."
 PRC_remove_chiang_kai_shek:0 "Chiang Kai-Shek entfernen"
 PRC_remove_chiang_kai_shek_desc:0 "Trotz unserer Bemühungen betrachtet uns der Generalissimus im Herzen immer noch als Kommunisten. Sein heftiger Widerstand ist zum Problem geworden. Es müssen Maßnahmen ergriffen werden."
 PRC_national_leadership:0 "Nationale Führung"
 PRC_national_leadership_desc:0 "Mit Kai-Sheks Abgang ist auch der letzte Widerstand gegen die Wiedervereinigung verschwunden. Es ist nur richtig, dass wir in dieser gemeinsamen Regierung die Führung übernehmen."
 PRC_land_redistribution:0 "Landumverteilung"
 PRC_land_redistribution_desc:0 "Seit Jahrhunderten müssen die Menschen, die das Land bewirtschaften, Pacht an die Eigentümer zahlen. Wir werden das ändern."
 PRC_the_yanan_base_area:0 "Das Yan&#39;an-Basisgebiet"
 PRC_the_yanan_base_area_desc:0 "Das Fundament unserer Revolution ist das Gebiet in Yan&#39;an. Wenn wir im bevorstehenden Kampf siegen wollen, muss es erweitert und verbessert werden."
 PRC_prepare_for_war_with_japan:0 "Bereiten Sie sich auf den Krieg mit Japan vor"
 PRC_prepare_for_war_with_japan_desc:0 "Die japanischen Militaristen stellen die größte Bedrohung für unser Land dar. Sie wollen es auf eine Weise zerstückeln und ausbeuten, die sich keine chinesische Regierung jemals vorstellen könnte. Der Kampf gegen die Nationalisten verblasst im Vergleich dazu."
 PRC_government_of_national_defense:0 "Regierung der Nationalen Verteidigung"
 PRC_government_of_national_defense_desc:0 "Ein gespaltenes Land ist ein Land, das einer Niederlage preisgegeben ist. Wir müssen unsere Kräfte mit den Nationalisten bündeln, um unsere Verteidigung zu koordinieren."
 PRC_confrontation_with_the_warlords:0 "Konfrontation mit den Kriegsherren"
 PRC_confrontation_with_the_warlords_desc:0 "Manche Elemente in China ignorieren die Zentralregierung und weigern sich, in diesem Konflikt Partei zu ergreifen. Manche von ihnen hegen vielleicht sogar heimlich Pläne, das Land zu übernehmen oder mit den Japanern zu kollaborieren. Sie müssen auf Linie gebracht werden."
 PRC_anti_japanese_expedition:0 "Antijapanische Expedition"
 PRC_anti_japanese_expedition_desc:0 "Den Japanern in unserer derzeitigen Position im offenen Kampf gegenüberzutreten, wäre eher töricht als mutig. Wir sollten zunächst den Boden bereiten, indem wir kleine Gruppen in feindliches Gebiet schicken, um Stützpunkte aufzubauen. Wenn die Zeit reif ist, werden wir zum Aufstand aufrufen."
 PRC_revolutionary_military_commission:0 "Revolutionäre Militärkommission"
 PRC_revolutionary_military_commission_desc:0 "Der revolutionäre Kampf gegen unsere Feinde muss durch ein eigens dafür geschaffenes Gremium koordiniert werden."
 PRC_provoke_japan:0 "Japan provozieren"
 PRC_provoke_japan_desc:0 "Drei Generationen lang haben wir im Schatten der japanischen Bedrohung gelebt. Widerstand gegen die japanische Expansion wird uns in den Augen des chinesischen Volkes zu Helden machen. Und wenn die Japaner uns nicht den Krieg liefern wollen, den wir brauchen, dann werden wir sie dazu zwingen."
 PRC_protracted_warfare:0 "Langwieriger Krieg"
 PRC_protracted_warfare_desc:0 "Wir müssen den Krieg nach unseren Bedingungen führen. China hat genügend Menschen und viel Zeit. Dem Feind im offenen Kampf gegenüberzutreten, wäre Selbstmord."
 PRC_mobile_warfare:0 "Mobile Kriegsführung"
 PRC_mobile_warfare_desc:0 "Wir können uns nicht ewig in den Bergen und Wäldern verstecken. Es ist an der Zeit, den Kampf zum Feind zu tragen und der Welt zu zeigen, dass wir keine Angst haben, ihn offen zu bekämpfen."
 PRC_peoples_war:0 "Volkskrieg"
 PRC_peoples_war_desc:0 "Andere Länder glauben vielleicht, dass Kriege durch Technologie und Feuerkraft gewonnen werden. Wir wissen es besser. Keine Technologie kann einem entschlossenen Volk standhalten, das bereit ist, Opfer zu bringen."
 PRC_100_regiments_campaign:0 "100-Regimenter-Kampagne"
 PRC_100_regiments_campaign_desc:0 "Wir haben uns bisher auf kleine Schlachten und Scharmützel konzentriert. Unsere Feinde halten uns für schwach und nur für ein Ärgernis. In Sicherheit gewiegt, werden sie auf eine Großoffensive schlecht vorbereitet sein."
 PRC_central_military_commission:0 "Zentrale Militärkommission"
 PRC_central_military_commission_desc:0 "Da unsere Position nun sicherer ist, können wir vom revolutionären Überlebenskampf zum Kampf um die nationale Führung übergehen."
 PRC_peoples_liberation_army:0 "Volksbefreiungsarmee"
 PRC_peoples_liberation_army_desc:0 "Die chinesische Rote Armee hat Großes geleistet. In Zukunft wird sie im Kampf für die Befreiung unseres Volkes noch größere Ehre erringen."
 PRC_peoples_volunteer_army:0 "Freiwilligenarmee des Volkes"
 PRC_peoples_volunteer_army_desc:0 "Der Kampf um die Befreiung der Arbeiter und Bauern wird in vielen Ländern der Welt geführt. Es ist nicht immer ratsam, direkt in diese Konflikte einzugreifen. Manchmal genügt schon eine kleine Kraft, um das Kräfteverhältnis zu verschieben."
 PRC_military_intelligence_department:0 "Militärische Geheimdienstabteilung"
 PRC_military_intelligence_department_desc:0 "Wir haben viele Freunde in der Bevölkerung, die uns wertvolle Informationen liefern. Wir haben aber noch mehr Feinde. Wir müssen eine Organisation gründen, um die einen von den anderen zu trennen."
 PRC_central_security_bureau:0 "Zentrales Sicherheitsbüro"
 PRC_central_security_bureau_desc:0 "Wir dürfen nicht zulassen, dass die Konterrevolution auch nur das kleinste Dorf erfasst. Unser Ziel muss es sein, jeden einzelnen Verräter zu finden, bevor er Schaden anrichten kann."
 PRC_focus_on_china:0 "Fokus auf China"
 PRC_focus_on_china_desc:0 "Wir können nicht hoffen, den Japanern Paroli zu bieten, solange wir noch gegen die Nationalisten und Kriegsherren kämpfen. Wir müssen sie zuerst besiegen, bevor wir es mit den Japanern aufnehmen können."
 PRC_exploit_the_weak_neighbours:0 "Die schwachen Nachbarn ausnutzen"
 PRC_exploit_the_weak_neighbours_desc:0 "Unsere Nachbarn sind durch Korruption und Machtkämpfe geschwächt. Dies bietet eine perfekte Gelegenheit, unser Territorium zu erweitern."
 PRC_infiltration:0 "Infiltration"
 PRC_infiltration_desc:0 "Die Nationalisten möchten, dass wir sie offen bekämpfen. Wir dürfen dieser Versuchung nicht nachgeben. Wir werden kleine Gruppen von Soldaten in feindliches Gebiet schicken, um Stützpunkte aufzubauen. Wenn die Zeit reif ist, werden wir einen Aufstand auslösen und die Nationalisten überraschen."
 PRC_enforce_the_three_rules:0 "Setzen Sie die drei Regeln durch"
 PRC_enforce_the_three_rules_desc:0 "1:0 Befolgen Sie Befehle.\n 2:0 Stehlen Sie nicht von den Bauern.\n 3:0 Geben Sie alles ab, was Sie dem Feind abgenommen haben.\n Mit diesen einfachen Regeln zeigen wir den Leuten, dass wir auf ihrer Seite sind."
 PRC_permit_opium_trade:0 "Opiumhandel zulassen"
 PRC_permit_opium_trade_desc:0 "Trotz der bedauerlichen Nebenwirkungen wird uns die Erlaubnis für den Mohnanbau den Bauern das nötige Geld für die Versorgung unserer Armeen verschaffen."
 PRC_ban_the_opium_trade:0 "Verbot des Opiumhandels"
 PRC_ban_the_opium_trade_desc:0 "Opium war das Instrument, mit dem die westlichen Mächte uns in die Knie gezwungen haben. Wir dürfen nicht zulassen, dass sich dieses Übel ausbreitet."
 PRC_abolish_the_land_rent:1 "Abschaffung der Grundrente"
 PRC_abolish_the_land_rent_desc:0 "Privatbesitz an Land ist ein absurdes Konzept. Das Land gehört dem, der es bewirtschaftet. Indem wir den Bauern die Möglichkeit geben, sich zu organisieren, sichern wir ihnen ihre Unterstützung."
 PRC_literacy_programs:0 "Alphabetisierungsprogramme"
 PRC_literacy_programs_desc:0 "Der erste Schritt zur Schaffung einer modernen Gesellschaft besteht darin, sicherzustellen, dass alle Bürger die bestehenden Probleme verstehen und zu ihrer Lösung beitragen können."
 PRC_china_medical_university:0 "Chinesische Medizinische Universität"
 PRC_china_medical_university_desc:0 "Hygiene und medizinische Versorgung werden unsere Armee einsatzbereit halten und es uns ermöglichen, das Leben unserer Bürger zu verbessern. Wir werden dafür sorgen, dass wir in diesen Bereichen neue Methoden entwickeln und sie unserer Bevölkerung vermitteln."
 PRC_form_the_academy_of_sciences:0 "Gründung der Akademie der Wissenschaften"
 PRC_form_the_academy_of_sciences_desc:0 "Wir werden alle unsere verschiedenen Forschungseinrichtungen und Universitäten zusammenführen und eine neue Organisation schaffen, um sie effizienter zu verwalten."
 JAP_the_unthinkable_option:0 "Die undenkbare Option"
 JAP_the_unthinkable_option_desc:0 "Die Zukunft unserer Nation erfordert einen Weg, den unsere Politiker nie in Betracht gezogen haben. Diese Option muss jetzt ernsthaft in Betracht gezogen werden."
 JAP_approach_the_young_officers:0 "Sprechen Sie die jungen Offiziere an"
 JAP_approach_the_young_officers_desc:0 "Die älteren Generationen sind zu sehr in ihren Gewohnheiten verhaftet, als dass sie sich leicht von der neuen Denkweise überzeugen lassen würden. Wir wollen stattdessen mit den jüngeren Generationen beginnen."
 JAP_approach_the_young_officers_tt:0 "Erhält 3 kommunistische Generäle.\n"
 JAP_exchange_the_exiles:0 "Tauschen Sie die Verbannten aus"
 JAP_if_man_accepts:1 "Wenn §HMandschukuo§! akzeptiert, geschieht Folgendes:\n"
 JAP_exchange_the_exiles_desc:0 "Während wir zuvor unsere linksgerichteten Offiziere und Beamten ins inoffizielle Exil in die Mandschurei geschickt haben, werden wir sie nun gegen unsere eher rechtsgerichteten Offiziere und Beamten austauschen."
 JAP_open_up_the_universities:0 "Öffnung der Universitäten"
 JAP_open_up_the_universities_desc:0 "Alle müssen studieren dürfen, unabhängig von ihrer Herkunft oder ihrem sozialen Status."
 JAP_cast_the_die:0 "Werfen Sie den Würfel"
 JAP_cast_the_die_desc:0 "Unsere politische und militärische Basis ist ausreichend gesichert. Es ist Zeit, unser Schicksal in die Hand zu nehmen!"
 cast_the_die_TT:0 "§RDie Einnahme Tokios wird den Bürgerkrieg schnell beenden.§!\n"
 JAP_the_fate_of_the_imperial_family:0 "Das Schicksal der kaiserlichen Familie"
 JAP_the_fate_of_the_imperial_family_desc:0 "Es ist an der Zeit, die letzten Überreste der Erbherrschaft in Japan zu beseitigen. Wir müssen entscheiden, welches Schicksal dem Kaiser und seiner Familie widerfahren soll."
 JAP_rebuild_the_civil_service:0 "Wiederaufbau des öffentlichen Dienstes"
 JAP_rebuild_the_civil_service_desc:0 "Um unser Land richtig zu verwalten, müssen wir den öffentlichen Dienst mit den fähigsten Leuten neu aufbauen."
 JAP_reeducation_campaign:0 "Umerziehungskampagne"
 JAP_reeducation_campaign_desc:0 "Nach unserer großen Revolution herrscht große Unruhe. Wir müssen die Menschen umerziehen, damit sie das Verhalten fördern, das wir für das angemessenste halten."
 JAP_finish_the_fight:0 "Beende den Kampf"
 JAP_finish_the_fight_desc:0 "Wir müssen den Kampf in unsere alte Kolonie tragen und die letzte Bastion unserer japanischen ideologischen Gegner beseitigen."
 JAP_join_comintern:0 "Treten Sie der Komintern bei"
 JAP_join_comintern_desc:0 "Wir können nicht allein gegen die Welt bestehen. Wir müssen an der Seite der Geburtsstätte des Kommunismus stehen, um die Revolution zu schützen!"
 JAP_red_brigades:0 "Rote Brigaden"
 JAP_red_brigades_desc:0 "Jeder Mann und jede Frau muss ihre Pflicht erfüllen, den Staat zu schützen. Wir werden dafür sorgen, dass sie die Möglichkeit dazu haben."
 JAP_communist_volunteers:0 "Kommunistische Freiwillige"
 JAP_communist_volunteers_desc:0 "Unser Kampf endet hier nicht. Wir müssen auch andere Nationen unterstützen. Unsere besten und klügsten Köpfe werden in die Länder geschickt, die die Revolution angenommen haben, um unsere Sache zu vertreten!"
 JAP_asian_communist_solidarity:0 "Asiatische kommunistische Solidarität"
 JAP_asian_communist_solidarity_tt:0 "Lade §H[WTT_PRC.GetNameWithFlag]§! zu unserer Fraktion ein."
 JAP_asian_communist_solidarity_desc:0 "Wir müssen unseren asiatischen Brüdern zur Seite stehen. Die westliche Form des Kommunismus hat hier keinen Platz, aber gemeinsam mit unseren Nachbarn können wir eine Version verbreiten, die den asiatischen Bedürfnissen entspricht."
 JAP_people_owned_mines:0 "Volkseigene Minen"
 JAP_people_owned_mines_desc:0 "Den Menschen wird es gestattet, Anteile an den Minen zu besitzen, in denen sie arbeiten, was die Motivation und Effizienz der Arbeiter steigert."
 JAP_public_works:0 "Öffentliche Arbeiten"
 JAP_public_works_desc:0 "Eine Reihe neuer öffentlicher Bauvorhaben soll für alle Arbeitsplätze sorgen und die landesweite Infrastruktur verbessern."
 JAP_tokyo_aluminum_plant:0 "Aluminiumwerk Tokio"
 JAP_tokyo_aluminum_plant_desc:0 "Wir werden die Kraft unserer Arbeiter nutzen, um die Autarkie der Nation zu erhöhen."
 JAP_purge_the_kodoha_faction:0 "Säubere die Kodoha-Fraktion"
 JAP_purge_the_kodoha_faction_desc:0 "Eine neue Fraktion ist aufgetaucht, die die Kontrolle über die Regierung übernehmen und nach Norden in die Sowjetunion vorstoßen will. Wir müssen sie ausschalten, bevor sie zu großen Schaden anrichten können."
 JAP_liaison_conference:0 "Verbindungskonferenz"
 JAP_liaison_conference_desc:0 "Indem wir Verbindungspersonen aller Regierungszweige und des Militärs zu einer zentralen Konferenz entsenden, können wir die Geschwindigkeit unserer Entscheidungsfindung erheblich erhöhen."
 JAP_greater_east_asian_co_prosperity_sphere:0 "Großostasiatische Wohlstandssphäre"
 JAP_greater_east_asian_co_prosperity_sphere_desc:0 "Die Zeit des westlichen Imperialismus ist vorbei. Die Völker Asiens müssen sich zusammenschließen und als starker, vereinter Kontinent unter unserer Führung auftreten. Asien den Asiaten!"
 JAP_intervene_in_china:1 "Vorfall auf der Marco-Polo-Brücke"
 JAP_intervene_in_china_desc:1 "[Root.GetNameDefCap] ist arm an Ressourcen, unsere Nachbarn jedoch nicht. Wir müssen ihnen nehmen, was uns fehlt, und brauchen dafür nur einen Vorwand. Ein solcher Vorwand könnte von ein paar unternehmungslustigen Soldaten geliefert werden, woraufhin dem Kaiser keine andere Wahl bleibt, als einem Krieg zuzustimmen, egal wie schlecht er vorbereitet ist ..."
 JAP_secure_china:0 "Sicheres China"
 JAP_secure_china_desc:0 "Der chinesische Widerstand erweist sich als hartnäckig und unaufhörlich. Wir müssen unsere Anstrengungen zur Befriedung des Festlandes mit aller Eile verdoppeln."
 JAP_develop_chinese_resources:0 "Chinesische Ressourcen entwickeln"
 JAP_develop_chinese_resources_desc:0 "Wir müssen die reichen chinesischen Ressourcen, die in unsere Hände gefallen sind, erschließen, damit sie im nächsten Krieg nützlich sein können."
 JAP_strike_south_doctrine:0 "Strike-South-Doktrin"
 JAP_strike_south_doctrine_desc:0 "Obwohl China reich ist, verfügt es nicht über alle Ressourcen, die wir benötigen. Nicht weit südlich liegen jedoch Niederländisch-Indien und die britischen Kolonien Malaya und Borneo. Um wirklich autark zu sein, müssen wir den europäischen Imperialisten die Kontrolle über diese Gebiete entreißen."
 JAP_non_aggression_pact_with_the_soviet_union:0 "Nichtangriffspakt mit der Sowjetunion"
 JAP_non_aggression_pact_with_the_soviet_union_desc:0 "Unsere Nordgrenze muss gesichert werden, wenn wir ungehindert nach Süden vorstoßen wollen. Wir werden unverzüglich Verhandlungen mit [SOV.GetNameDef] aufnehmen."
 JAP_bypass_the_philippines:0 "Umgehen Sie die Philippinen"
 JAP_bypass_the_philippines_desc:0 "Die Philippinen sind eine unwillkommene Ablenkung auf dem Weg zu unserem wahren Ziel. Wir werden sie vorerst ignorieren."
 JAP_secure_the_philippines:0 "Sichern Sie die Philippinen"
 JAP_secure_the_philippines_desc:0 "Die Philippinen sind ein notwendiger Stützpunkt auf dem Weg zu unserem wahren Ziel. Wir müssen ihn für zukünftige Militäroperationen sichern."
 JAP_strike_on_the_southern_resource_area:0 "Streik im südlichen Ressourcengebiet"
 JAP_strike_on_the_southern_resource_area_desc:0 "Es ist an der Zeit, unseren Plan in die Tat umzusetzen. Wir werden nach Süden vorstoßen und die rohstoffreichen Kolonien im Westen für uns beanspruchen."
 JAP_alliance_with_siam:0 "Allianz mit Siam"
 JAP_alliance_with_siam_desc:0 "Siam ist eine hervorragende Lage, die uns im bevorstehenden Krieg mit den Westmächten unterstützen wird. Indem wir sie auf unsere Seite ziehen, erleichtern wir die unvermeidliche Invasion Malayas und damit Ostindiens erheblich."
 JAP_exploit_the_southern_resource_area:0 "Ausbeutung des südlichen Ressourcengebiets"
 JAP_exploit_the_southern_resource_area_desc:0 "Wir müssen die Ausbeutung der reichlich vorhandenen Ressourcen Ostindiens erheblich ausweiten, um unsere Streitkräfte im Krieg zu versorgen."
 JAP_sign_tripartite_pact:0 "Unterzeichnung des Dreiparteienpakts"
 JAP_sign_tripartite_pact_bypass_tt:0 "Entweder haben Deutschland oder Italien keine faschistische Regierung, oder wir befinden uns mit einer dieser Regierungen im Krieg."
 JAP_sign_tripartite_pact_desc:0 "Die vor uns liegende Aufgabe könnte unsere Fähigkeiten auf die Probe stellen. Wir sollten auf andere Regierungen mit ähnlichen Zielen zugehen, um eine Zusammenarbeit zu ermöglichen."
 JAP_guide_the_zaibatsus:0 "Führe den Zaibatsus"
 JAP_guide_the_zaibatsus_desc:0 "Die größten Konzerne unseres Landes verfügen seit langem über beispiellose politische und wirtschaftliche Macht. Mit etwas Fingerspitzengefühl können wir ihre Bemühungen vielleicht zu unseren Gunsten lenken."
 JAP_nationalize_war_industry:0 "Verstaatlichung der Kriegsindustrie"
 JAP_nationalize_war_industry_desc:0 "Eine verstärkte staatliche Kontrolle unserer Rüstungsindustrie wird wesentlich zur Verbesserung der Effizienz und damit der Produktion beitragen."
 JAP_coal_liquification:0 "Kohleverflüssigung"
 JAP_coal_liquification_desc:0 "[JAP.GetNameDefCap] mangelt es an Öl, und deshalb müssen wir unsere Anstrengungen im Bereich synthetisches Öl verdoppeln."
 JAP_national_mobilization_law:0 "Nationales Mobilisierungsgesetz"
 JAP_national_mobilization_law_desc:0 "Durch neue Gesetze soll der Militärdienst allgegenwärtiger werden, wodurch den Menschen ein Pflichtgefühl vermittelt und ihnen die Notwendigkeit des Krieges klar gemacht wird."
 JAP_national_research_policy:0 "Nationale Forschungspolitik"
 JAP_national_research_policy_desc:0 "Die staatliche Unterstützung und Kontrolle unserer Forschungseinrichtungen wird uns mehr Flexibilität und Produktivität in unseren F&amp;E-Programmen ermöglichen."
 JAP_imperial_arsenals:0 "Kaiserliche Arsenale"
 JAP_imperial_arsenals_desc:0 "Eine zunehmende imperiale Kontrolle über unsere Rüstungsindustrie wird einen großen Beitrag zur Verbesserung der Effizienz und damit der Produktion leisten."
 JAP_national_defense_state:0 "Nationaler Verteidigungsstaat"
 JAP_national_defense_state_desc:0 "Jedem Bürger muss bewusst gemacht werden, wie dringend es ist, unser Land in eine Bastion zu verwandeln, die jedem Angriff standhalten kann."
 JAP_spiritual_mobilization:0 "Spirituelle Mobilisierung"
 JAP_spiritual_mobilization_desc:0 "Indem wir die Grundsätze des Shintoismus pflegen, die auf das militärische Pflichtbewusstsein der Menschen abzielen, können wir die Zahl neuer Rekruten erhöhen."
 JAP_warrior_spirit:0 "Kriegergeist"
 JAP_warrior_spirit_desc:0 "Der Staats-Shintoismus ermöglicht es uns, den Menschen die Notwendigkeit zu vermitteln, sich für das Wohl des Staates und der kaiserlichen Familie aufzuopfern."
 JAP_strengthen_the_divine_wind:0 "Stärke den göttlichen Wind"
 JAP_strengthen_the_divine_wind_effect:0 "Ermöglicht die Produktion von §HYokosuka MXY7 Ohka§!"
 JAP_strengthen_the_divine_wind_desc:0 "Kamikaze, die Taktik der Spezialangriffseinheit, hat Selbstmordanschläge von einer improvisierten letzten Maßnahme zu einer etablierten Doktrin gemacht. Mit neuen Flugzeugen, im Wesentlichen bemannten Raketen, werden diese Angriffe unaufhaltsam sein."
 JAP_support_the_kodoha_faction:0 "Unterstützen Sie die Kodoha-Fraktion"
 JAP_support_the_kodoha_faction_desc:0 "Eine neue Fraktion ist aufgetaucht, die die Kontrolle über die Regierung übernehmen und nach Norden in die Sowjetunion vorstoßen will. Im Interesse des Kaisers und der Zukunft des Imperiums müssen wir dafür sorgen, dass diese Fraktion die Oberhand behält!"
 JAP_challenge_the_zaibatsus:0 "Fordern Sie den Zaibatsu heraus"
 JAP_challenge_the_zaibatsus_desc:0 "Die größten Konzerne unseres Landes verfügen seit langem über beispiellose politische und wirtschaftliche Macht. Wir müssen sie daran erinnern, dass sie immer noch den Wünschen des Kaisers unterworfen sind."
 JAP_showa_restoration:0 "Showa-Restaurierung"
 JAP_showa_restoration_desc:0 "Die Zeit der Galionsfiguren ist längst vorbei, und der Kaiser selbst muss die direkte Kontrolle über den Staat übernehmen. Nur dann wird unser Reich in der Lage sein, den westlichen Imperialisten standzuhalten."
 JAP_modern_shogunate:0 "Modernes Shogunat"
 JAP_modern_shogunate_desc:0 "Der Kaiser muss weiterhin eine eher zeremonielle Rolle spielen und über starke Mittelsmänner verfügen, die in seinem Namen handeln. Dies wird sicherlich dazu beitragen, dass das Wort des Kaisers weiter und umfassender wirkt."
 JAP_prepare_for_war_with_the_soviet_union:0 "Bereiten Sie sich auf den Krieg mit der Sowjetunion vor"
 JAP_prepare_for_war_with_the_soviet_union_desc:0 "Die kommunistische Bedrohung unserer Nordgrenzen muss bekämpft werden. Wir müssen mit den Vorbereitungen für einen Krieg mit [SOV.GetNameDef] beginnen."
 JAP_join_the_london_naval_treaty:0 "Treten Sie dem Londoner Flottenvertrag bei"
 JAP_join_the_london_naval_treaty_desc:0 "Wir müssen unsere Flanken schützen, wenn wir es mit dem Bären aufnehmen wollen. Wenn die Unterzeichnung eines Dokuments, das unseren Flottenausbau regelt, uns Frieden bringt, dann soll es so sein."
 JAP_build_up_the_manchurian_army:0 "Bauen Sie die mandschurische Armee auf"
 JAP_build_up_the_manchurian_army_desc:0 "[MAN.GetNameDefCap] wird in jedem Krieg im Norden an vorderster Front stehen. Wir müssen sicherstellen, dass sie stark genug sind, um möglichen feindlichen Angriffen standzuhalten."
 JAP_non_aggression_pact_with_china:0 "Nichtangriffspakt mit China"
 JAP_non_aggression_pact_with_china_desc:0 "Obwohl unsere Beziehungen zu China in der Vergangenheit, gelinde gesagt, angespannt waren, brauchen wir jetzt einen Nichtangriffspakt mit ihnen, um Truppen für unseren Vorstoß nach Norden freizumachen."
 JAP_create_a_manchurian_imperial_air_force:0 "Schaffung einer mandschurischen kaiserlichen Luftwaffe"
 JAP_create_a_manchurian_imperial_air_force_desc:0 "Die Luftüberlegenheit wird der Schlüssel zum Sieg im Krieg sein. Wenn [MAN.GetNameDef] über eine eigene Luftwaffe verfügte, würde dies unsere Luftlage erheblich verbessern."
 JAP_technological_exchange:0 "Technologischer Austausch"
 JAP_technological_exchange_desc:0 "Wir brauchen Verbündete, um uns dem Bären zu stellen. Deutschland ist nicht nur ein guter Kandidat, sondern verfügt auch über zahlreiche technologische Fortschritte, die es mit uns teilen könnte, um uns in unserem Kampf zu unterstützen."
 JAP_preemptive_war:0 "Präventivkrieg"
 JAP_preemptive_war_desc:0 "Indem wir Berichte über eine verstärkte sowjetische Aggression an unseren Nordgrenzen erfinden, können wir uns selbst die Ausrede geben, einen Präventivschlag zur Beseitigung der Bedrohung aus dem Norden zu benötigen."
 JAP_establish_the_northern_resource_area:0 "Etablierung des nördlichen Ressourcengebiets"
 JAP_establish_the_northern_resource_area_desc:0 "Die reichen Einöden Sibiriens müssen für unsere ständig wachsende Kriegsmaschinerie ausgebeutet werden."
 JAP_german_rocketry:0 "Deutsche Raketentechnik"
 JAP_german_rocketry_desc:0 "Weitere deutsche technologische Fortschritte wären für unsere Kriegsanstrengungen äußerst nützlich. Wir müssen dafür sorgen, dass wir diese Pläne erhalten, egal, was es kostet."
 JAP_strengthen_civilian_government:0 "Stärkung der Zivilregierung"
 JAP_tora_tora_tora_idea:0 "Tora! Tora! Tora!"
 JAP_tora_tora_tora_idea_desc:0 "Nach ihrem ersten Schlag starten die Japaner mit ihren Trägerstreitkräften einen aggressiven Blitzangriff."
 JAP_strengthen_civilian_government_desc:0 "Die zunehmenden Werte des Liberalismus und der Demokratie stellen für unser Land keine Bedrohung dar, sondern könnten seine größte Stärke sein. Wir müssen dafür sorgen, dass unsere Regierung gestärkt wird, damit sie diese Ideale schützen kann."
 JAP_ally_with_the_zaibatsus:0 "Verbünde dich mit den Zaibatsus"
 JAP_ally_with_the_zaibatsus_desc:0 "Die größten Konzerne unseres Landes verfügen seit langem über beispiellose politische und wirtschaftliche Macht. Sie sind ein Beleg für die Möglichkeiten, die Freiheit und Individualität bieten, und wir müssen versuchen, zum Wohle der Nation mit ihnen zusammenzuarbeiten."
 JAP_research_spending:0 "Forschungsausgaben"
 JAP_research_spending_desc:0 "Wenn wir die besten und klügsten Köpfe unseres Landes voll ausschöpfen wollen, muss für Forschung und Entwicklung ein entsprechend großes Budget bereitgestellt werden."
 JAP_pre_emptive_coup:0 "Präventivschlag"
 JAP_pre_emptive_coup_desc:0 "Wir müssen zuerst zuschlagen und die Zukunft unserer Nation für unsere Kinder sichern, damit unsere Ideale nicht von einer autoritären Regierung ausgelöscht werden."
 JAP_purge_the_militarists:0 "Säubert die Militaristen"
 JAP_purge_the_militarists_desc:1 "Diejenigen, die glauben, militärische Gewalt sei die Antwort auf alles, müssen von unseren Inseln vertrieben werden, wenn wir Raum für besonneneres Denken schaffen wollen. Sie können ihren eigenen Weg außerhalb unserer Grenzen finden."
 JAP_the_showa_constitution:0 "Die Showa-Verfassung"
 JAP_the_showa_constitution_desc:0 "Wir akzeptieren und respektieren die imperiale Geschichte unseres Landes. Autoritarismus hat jedoch in dem Japan, das wir aufbauen wollen, keinen Platz. Wir werden den Kaiser als Galionsfigur des Führers behalten, seine Macht jedoch in der Verfassung einschränken, ähnlich wie es in vielen westlichen Ländern der Fall ist."
 JAP_west_pacific_treaty_organization:0 "Westpazifikvertragsorganisation"
 JAP_west_pacific_treaty_organization_desc:0 "Ein eigenes Bündnis mit anderen asiatischen Nationen wird es uns ermöglichen, allen potenziellen Bedrohungen unserer neu entdeckten Lebensweise standhaft entgegenzutreten."
 JAP_rekindle_the_old_alliance:0 "Die alte Allianz wiederbeleben"
 JAP_rekindle_the_old_alliance_desc:0 "Unsere besten Chancen liegen bei unserem ehemaligen Verbündeten im Ersten Weltkrieg. Wir werden das alte Bündnis reaktivieren und [ENG.GetNameDef] bei der Verteidigung der Demokratie unterstützen."
 JAP_pacific_guardian:0 "Pacific Guardian"
 JAP_pacific_guardian_desc:0 "Wir werden die Rolle des Wächters aller asiatischen Staaten im Pazifikraum und Umgebung übernehmen. Sobald sie vom westlichen Imperialismus befreit sind, werden sie eine führende Hand benötigen, um sich zu vollwertigen Demokratien zu entwickeln."
 JAP_anti_communist_bulwark:0 "Antikommunistisches Bollwerk"
 JAP_anti_communist_bulwark_desc:0 "Die Prinzipien der Demokratie sind mit dem Kommunismus unvereinbar. Wir müssen dieser Ideologie entschieden entgegentreten und so sowohl uns selbst als auch diejenigen schützen, die auf uns angewiesen sind."
 JAP_anti_communist_volunteers:0 "Antikommunistische Freiwillige"
 JAP_anti_communist_volunteers_desc:0 "Wir müssen den Kommunismus bekämpfen, wo immer er auftritt, auch wenn wir selbst nicht offiziell in einen Konflikt verwickelt sind. Stattdessen werden wir in diesen Fällen Freiwillige entsenden, die sich für unsere Sache einsetzen."
 JAP_the_korean_question:0 "Die koreanische Frage"
 JAP_the_korean_question_desc:0 "Wir kontrollieren die koreanische Halbinsel schon seit einiger Zeit, doch die Frage der koreanischen Selbstbestimmung wird immer dringlicher. Können wir wirklich behaupten, demokratischen Idealen zu folgen, wenn wir unseren Nachbarn das Recht auf Selbstbestimmung verweigern?"
 JAP_liberate_manchuria:0 "Befreie die Mandschurei"
 JAP_liberate_manchuria_desc:0 "Die Mandschurei steht weiterhin unter autoritärer Herrschaft; ein hässliches Relikt unserer Kolonialherrschaft. Wir müssen Abhilfe schaffen und sicherstellen, dass die Region wieder unter die rechtmäßige Kontrolle Chinas fällt."
 JAP_liberate_manchuria_tt:0 "Die Entscheidung kann nach der Eroberung der Mandschurei getroffen werden.\n"
 JAP_ultimate_deterrence:0 "Ultimative Abschreckung"
 JAP_ultimate_deterrence_desc:0 "Der beste Schutz für unsere Bürger besteht darin, sicherzustellen, dass sie niemals in einen Krieg ziehen. Die Entwicklung neuer, ungeheuer mächtiger Waffen könnte dafür sorgen, dass dies nie nötig sein wird."
 JAP_full_sovereignty_for_the_philippines:0 "Volle Souveränität für die Philippinen"
 JAP_full_sovereignty_for_the_philippines_desc:0 "Das Selbstbestimmungsrecht muss in ganz Asien weiter verbreitet werden. [USA.GetNameDefCap] kontrolliert weiterhin die Philippinen und muss dazu gedrängt werden, die demokratischen Rechte des philippinischen Volkes zu respektieren."
 JAP_the_manchurian_project:0 "Das Manchurian-Projekt"
 JAP_the_manchurian_project_desc:0 "Während es auf unseren Inseln kaum nutzbares Land gibt, ist dies auf unserem Festland nicht der Fall. Was wir nicht selbst aufbauen können, können wir stattdessen auf dem Festland errichten. Wir werden ein groß angelegtes Industrialisierungsprogramm für [MAN.GetNameDef] starten."
 JAP_expand_the_showa_steel_works:0 "Erweiterung des Showa-Stahlwerks"
 JAP_expand_the_showa_steel_works_desc:0 "Wir müssen das Showa-Stahlwerk erweitern, um seine Produktion drastisch zu steigern. Dies ist eine entscheidende Voraussetzung für eine Industrialisierung im großen Maßstab."
 JAP_develop_aluminum_sources:0 "Aluminiumquellen erschließen"
 JAP_develop_aluminum_sources_desc:0 "Unsere Luftfahrtprogramme benötigen reichlich Aluminium, daher müssen die mandschurischen Ressourcen umfassend erschlossen werden."
 JAP_expand_manchurian_railways:0 "Erweitern Sie die Mandschurische Eisenbahn"
 JAP_expand_manchurian_railways_desc:0 "Die Infrastruktur der Mandschurei muss drastisch ausgebaut werden, um der Last der zunehmenden Industrialisierung standzuhalten."
 JAP_light_industry_development:0 "Entwicklung der Leichtindustrie"
 JAP_light_industry_development_desc:0 "Die leichte Militärindustrie ist für die Grundbedürfnisse einer Armee von entscheidender Bedeutung und muss daher ausgebaut werden."
 JAP_heavy_industry_development:0 "Entwicklung der Schwerindustrie"
 JAP_heavy_industry_development_desc:0 "Die Schwerindustrie ist für die modernen Bedürfnisse einer Armee von entscheidender Bedeutung und muss daher ausgebaut werden."
 JAP_japanese_settlement:0 "Japanische Siedlung"
 JAP_japanese_settlement_desc:0 "Durch die Ansiedlung unserer eigenen Bevölkerung in der Mandschurei können wir die Zahl der Arbeitskräfte erhöhen und dadurch günstigere Standorte für Fabriken schaffen."
 JAP_fortify_the_border:0 "Befestigen Sie die Grenze"
 JAP_fortify_the_border_desc:0 "Die Nordgrenze ist praktisch unverteidigt. Wir müssen unsere Verteidigung im Norden auf einen möglichen Angriff aus dieser Richtung vorbereiten."
 JAP_army_expansion_law:0 "Gesetz zur Armeeerweiterung"
 JAP_army_expansion_law_desc:0 "Zu den Grundprinzipien unserer Regierung muss die sofortige und drastische Aufstockung unserer Streitkräfte gehören."
 JAP_small_arms_modernization:0 "Modernisierung von Kleinwaffen"
 JAP_small_arms_modernization_desc:0 "Unsere Streitkräfte benötigen modernisierte Waffen, um mit denen unserer potenziellen Feinde konkurrieren zu können."
 JAP_supremacy_of_technology:0 "Überlegenheit der Technologie"
 JAP_supremacy_of_technology_desc:0 "Die Technologie wird uns den Sieg bringen. Alle Anstrengungen müssen darauf gerichtet sein, unsere Feinde hinsichtlich Waffen und Ausrüstung zu übertreffen."
 JAP_modern_artillery:0 "Moderne Artillerie"
 JAP_modern_artillery_desc:0 "Obwohl unsere Soldaten tapfer und wild sind, benötigen sie für ihren Vormarsch überlegene Artillerie."
 JAP_armored_divisions:0 "Panzerdivisionen"
 JAP_armored_divisions_desc:0 "Andere Nationen haben die Macht der Panzerdivision bereits erkannt. Wir dürfen nicht ins Hintertreffen geraten und müssen modernere und leistungsfähigere Panzermodelle entwickeln, die es uns ermöglichen, den Feind schnell und hart anzugreifen."
 JAP_bicycle_battalions:0 "Fahrradbataillone"
 JAP_bicycle_battalions_desc:0 "Mobilität ist entscheidend. Unsere Streitkräfte werden mit Fahrrädern ausgestattet, was unsere Fähigkeit, Divisionen zu manövrieren, drastisch verbessert."
 JAP_army_expansion:0 "Armeeerweiterung"
 JAP_army_expansion_desc:0 "Um unser Ziel der Ausweitung des Militärs zu erreichen, müssen wir die Fähigkeiten jener Offiziere nutzen, die ihre Fähigkeit bewiesen haben, Männer in der Kunst der Kriegsführung auszubilden."
 JAP_supremacy_of_will:0 "Überlegenheit des Willens"
 JAP_supremacy_of_will_desc:0 "Die fortschrittlichste Ausrüstung ist nutzlos, wenn sie nicht von einem mutigen Mann bedient wird, und durch Wildheit kann der einfachste Stein zur tödlichsten Waffe werden."
 JAP_fighter_modernization:0 "Modernisierung der Kampfflugzeuge"
 JAP_fighter_modernization_desc:0 "Wir müssen unsere Überlegenheit gegenüber unseren Feinden in allen Bereichen aufrechterhalten, auch in der Luftkriegsführung. Modernisierte Kampfflugzeuge sind hierfür unerlässlich."
 JAP_range_focus:0 "Reichweitenfokus"
 JAP_range_focus_desc:0 "Die Entfernungen, die bei der Kriegsführung im Pazifik zurückgelegt werden müssen, sind enorm, und deshalb brauchen wir Modelle, die diese Entfernungen überbrücken können."
 JAP_agility_focus:0 "Agilitätsfokus"
 JAP_agility_focus_desc:0 "Reichweite allein nützt uns nichts, wenn unsere Modelle nicht mit dem Feind mithalten können, wenn dieser eintrifft. Wir müssen Fahrzeuge mit überlegener Wendigkeit bauen, damit sie niemals ausmanövriert werden können."
 JAP_the_zero:0 "Die Null"
 JAP_the_zero_desc:0 "Ein neuer Entwurf von Mitsubishi könnte sich als das leistungsfähigste trägergestützte Kampfflugzeug aller Zeiten erweisen. Unübertroffene Manövrierfähigkeit und eine beachtliche Reichweite lassen erwarten, dass uns das Design noch viele Jahre erhalten bleibt. Wir sollten umgehend mit der Prototypenentwicklung und Produktion beginnen."
 JAP_the_zero_tt:0 "Ermöglicht die Produktion von §HMitsubishi A6M Zero-sen§!"
 JAP_bomber_modernization:0 "Bombermodernisierung"
 JAP_bomber_modernization_desc:0 "Eine modernisierte taktische Bomberflotte ist der Schlüssel zur Unterstützung unseres Militärs auf dem Schlachtfeld."
 JAP_strategic_bomber_effort:0 "Strategische Bomberbemühungen"
 JAP_strategic_bomber_effort_desc:0 "So sehr wir es uns auch wünschen, Kriege lassen sich nicht allein durch direkte militärische Konfrontationen gewinnen. Die industrielle Leistungsfähigkeit beeinflusst den Ausgang von Kriegen maßgeblich. Deshalb müssen wir in neue strategische Bombermodelle investieren, die die feindliche Industrie hinter den Linien zerstören können."
 JAP_unified_fighter_development:0 "Einheitliche Kampfflugzeugentwicklung"
 JAP_unified_fighter_development_desc:0 "Zu lange schon leiden wir unter der getrennten Entwicklung der Luftfahrt durch Heer und Marine. Wir müssen diese Programme vereinheitlichen, um sowohl eine einheitliche Bewaffnung als auch eine bessere Nutzung unserer begrenzten Forschungsressourcen zu gewährleisten."
 JAP_jet_prototypes:0 "Jet-Prototypen"
 JAP_jet_prototypes_desc:0 "Die Zukunft der Luftfahrt liegt nicht in den Propellern. Wir müssen uns mit Strahlantrieben befassen, um die Leistungsfähigkeit unserer Flugzeuge zu verbessern."
 JAP_new_naval_estimates:0 "Neue Marineschätzungen"
 JAP_new_naval_estimates_desc:0 "Wir müssen neue Schätzungen über die Höhe der Aufstockung unserer Marine und damit auch über die Werftanlagen herausgeben, die für diese Aufstockung erforderlich sind."
 JAP_carrier_warfare_experiments:0 "Trägerkriegsexperimente"
 JAP_carrier_warfare_experiments_desc:0 "Schlachtschiffe sind Relikte einer vergangenen Zeit. Wir müssen in die Zukunft blicken, und die Zukunft ist die Luftfahrt. Flugzeugträger werden es uns ermöglichen, diese Luftmacht über den Pazifik zu projizieren."
 JAP_expand_the_snlf:0 "Erweitern Sie die SNLF"
 JAP_expand_the_snlf_desc:0 "Ein Krieg im Pazifik erfordert in großem Umfang Marinelandungen. Die Speziallandekräfte der Marine müssen ausgebaut werden, um dieser Aufgabe gewachsen zu sein. "
 JAP_first_air_fleet:0 "Erste Luftflotte"
 JAP_first_air_fleet_desc:0 "Um unsere Angriffskraft zu maximieren, werden wir die weltweit größte Konzentration von Flugzeugträgern zu einer Kampfgruppe zusammenfassen. Durch die Entwicklung der erforderlichen Doktrinen für konzertierte Angriffsoperationen dieser Art werden unsere Feinde gegen unsere überlegene Marinefliegerei keine Chance haben."
 JAP_modern_escorts:0 "Moderne Escorts"
 JAP_modern_escorts_desc:0 "Unsere Flotten benötigen modernste Begleitschiffe, um ungehindert von feindlichen U-Booten und Torpedobooten operieren zu können."
 JAP_supremacy_of_the_battlefleet:0 "Vorherrschaft der Schlachtflotte"
 JAP_supremacy_of_the_battlefleet_desc:0 "Dank unserer überlegenen Schlachtschiffe genügt uns ein einziges entscheidendes Gefecht, um den Seekrieg zu entscheiden. Wir müssen unsere Schlachtflotte so optimieren, dass sie ein solches Gefecht erzwingen und gewinnen kann."
 JAP_the_ultimate_battleship:0 "Das ultimative Schlachtschiff"
 JAP_the_ultimate_battleship_desc:0 "Da wir nicht über große Ressourcen verfügen, müssen wir sicherstellen, dass wir sie bestmöglich nutzen. Wir werden die mächtigsten Schlachtschiffe bauen, die jemals auf der Erde stationiert waren. Sie sind in der Lage, jeden Feind im Frontalkampf zu besiegen."
 JAP_cruiser_modernization:0 "Kreuzermodernisierung"
 JAP_cruiser_modernization_desc:0 "Kreuzer werden die Hauptstütze unserer Einsatzkräfte im gesamten Pazifik sein, und deshalb brauchen wir die besten, die wir bauen können."
 JAP_long_lance_torpedoes:0 "Lange Lanzentorpedos"
 JAP_long_lance_torpedoes_desc:0 "Aufgrund der Grausamkeiten der globalen Ressourcenverteilung ist unsere Marine dem Feind zahlenmäßig unterlegen. Deshalb werden wir den modernsten Torpedo der Welt entwickeln: eine sehr weitreichende und leistungsstarke Waffe, die mit komprimiertem Sauerstoff statt Druckluft angetrieben wird und es unseren kleineren Überwasserschiffen ermöglicht, weit über ihr Gewicht hinaus zuzuschlagen."
 JAP_torpedo_cruisers:0 "Torpedokreuzer"
 JAP_torpedo_cruisers_desc:0 "Wir werden eine ganze Schiffsklasse damit ausstatten, riesige Mengen unserer neuen Torpedos zu transportieren, damit sie in der feindlichen Flotte verheerende Schäden anrichten können."
 JAP_yamato_tt:0 "Fügt der Produktionswarteschlange zwei Superschlachtschiffe der Yamato-Klasse hinzu, die jeweils zu 75 % und 50 % fertiggestellt sind."
 cost_reduced_last_stand:1 "Ermöglicht die Verwendung der Befehlsfähigkeit „Letzter Widerstand“ zu stark reduzierten Kosten.\n"
 MAN_pacify_the_countryside:0 "Befriedung der Landschaft"
 MAN_pacify_the_countryside_desc:0 "Seit unserer Machtübernahme versuchen Gesetzlose und Rebellen, unsere Herrschaft in den entlegeneren Gebieten des Landes anzufechten. Wenn wir als Regierung ernst genommen werden wollen, müssen wir diese Terroristen ausmerzen und der Bevölkerung zeigen, dass wir unsere Herrschaft durchsetzen können."
 MAN_pacify_the_countryside_effect_tooltip:0 "Halten Sie Truppen in bestimmten Staaten, um Banditen auf dem Land zu neutralisieren.\n"
 MAN_army_modernization:0 "Modernisierung der Armee"
 MAN_army_modernization_desc:0 "Unsere Armee ist klein und veraltet. Angesichts unserer verfügbaren Ressourcen ist das inakzeptabel. Wir müssen in der Lage sein, unseren Beitrag zu leisten."
 MAN_mukden_military_academy:0 "Mukden-Militärakademie"
 MAN_mukden_military_academy_desc:0 "Unsere Armee braucht gute und loyale Offiziere an ihrer Spitze, wenn wir uns bei der Erreichung unserer Ziele jemals auf mehr als nur die Masse verlassen wollen."
 MAN_invite_japanese_settlers:0 "Laden Sie japanische Siedler ein"
 MAN_invite_japanese_settlers_desc:0 "Wir haben weit mehr Platz als Menschen. Große Teile des Landes sind nach wie vor weitgehend unberührt. Wir sollten diese Gebiete ansiedeln, um neue Gemeinschaften zu bilden und eine stärkere wirtschaftliche Entwicklung zu ermöglichen."
 MAN_collective_farms:0 "Kollektivfarmen"
 MAN_collective_farms_desc:0 "Das System der Einzelfarmen, die von einer einzelnen Familie bewirtschaftet werden, ist sowohl rückständig als auch ineffizient. Die Bündelung aller Arbeitskräfte und Ländereien eines Dorfes in einer einzigen Einheit ermöglicht eine wesentlich effizientere Entwicklung."
 MAN_law_university:0 "Juristische Universität"
 MAN_law_university_desc:0 "Unser Land ist noch jung. Wir haben die echte Chance, ein völlig neues Rechtssystem zu schaffen, das auf modernstem Regierungsverständnis basiert. Dazu sollten wir eine spezialisierte Einrichtung schaffen, die einige der klügsten Köpfe Asiens zusammenbringt."
 MAN_research_and_education_department:0 "Abteilung für Forschung und Bildung"
 MAN_research_and_education_department_desc:0 "Mit dem Wachstum unseres Landes müssen wir dafür sorgen, dass auch unsere Bildungs- und Forschungseinrichtungen mitwachsen. Wir müssen unsere Forschungsanstrengungen verstärkt dort einsetzen, wo sie am dringendsten benötigt werden."
 MAN_trade_delegation:0 "Handelsdelegation"
 MAN_trade_delegation_desc:0 "Der Rest der Welt ist in der industriellen Fertigung weiter fortgeschritten als wir. Wir sollten eine Delegation dorthin schicken, um die dortigen Techniken zu studieren und Möglichkeiten zur Verbesserung unserer eigenen zu finden."
 MAN_expand_the_textile_industry:0 "Ausbau der Textilindustrie"
 MAN_expand_the_textile_industry_desc:0 "Unsere Textilwerke sind seit langem die tragende Säule unserer Industrie und werden der einfachste Weg sein, mehr ausländisches Kapital zu akquirieren, um unsere industrielle Basis zu erweitern."
 MAN_obedience:0 "Gehorsam"
 MAN_obedience_desc:0 "Manche halten uns für eine bloße Marionette der Japaner, aber sie missverstehen unsere enge und gleichberechtigte Beziehung zu uns grundlegend. Sich gegen unsere Wohltäter zu stellen, wäre dasselbe, als würde sich ein Kind gegen seine Eltern stellen."
 MAN_hoankyoku:0 "Hoankyoku"
 MAN_hoankyoku_desc:0 "Unsere Regierung ist Chinas größte Hoffnung auf eine rosige Zukunft. Viele Menschen haben offensichtlich ein Interesse an ihrer Zerstörung. Wir brauchen eine Organisation, die diese Menschen jagt und unseren Staat schützt."
 MAN_first_five_year_plan:0 "Erster Fünfjahresplan"
 MAN_first_five_year_plan_desc:0 "Obwohl der Fünfjahresplan durch die Assoziation mit dem Kommunismus belastet ist, ist er ein wertvolles Instrument zur Planung der wirtschaftlichen Entwicklung eines Landes. Wir sollten einen solchen Plan umsetzen, um die Expansion unserer Industrie zu steuern."
 MAN_invite_japanese_investors:0 "Laden Sie japanische Investoren ein"
 MAN_invite_japanese_investors_desc:0 "Die Entwicklung unseres Landes erfordert Hilfe von außen. Zahlreiche japanische Unternehmen haben ihre Bereitschaft signalisiert, in unserem Land zu investieren."
 MAN_expand_the_railways:0 "Ausbau der Eisenbahnen"
 MAN_expand_the_railways_desc:0 "Ein modernes Eisenbahnsystem ist der Schlüssel, um alle Teile unseres Landes miteinander zu verbinden und unter einem Dach zu vereinen."
 MAN_develop_aluminum_sources:0 "Aluminiumquellen erschließen"
 MAN_develop_aluminum_sources_desc:0 "Wir verfügen in Liaoning über umfangreiche Bauxitvorkommen, die reif für die Ausbeutung sind. Sie werden unserer Luftfahrtindustrie einen entscheidenden Schub verleihen."
 MAN_expand_showa_steel_works:0 "Erweiterung des Showa-Stahlwerks"
 MAN_expand_showa_steel_works_desc:0 "Die Showa Steel Works bilden das Rückgrat unserer Schwerindustrie. Investitionen in sie werden uns später die Vorteile bringen."
 MAN_social_research_unit:0 "Sozialforschungseinheit"
 MAN_social_research_unit_desc:0 "Wir sollten eine spezielle Einheit einrichten, die die Sitten und Gebräuche unserer Bevölkerung erforscht, damit wir sie besser dabei unterstützen können, produktive Bürger der Nation zu werden."
 MAN_second_five_year_plan:0 "Zweiter Fünfjahresplan"
 MAN_second_five_year_plan_desc:0 "Angesichts des Erfolgs des ersten Fünfjahresplans ist es nur logisch, dass wir ihn mit einem weiteren Wirtschaftsentwicklungsplan wiederholen."
 MAN_national_defense_state:0 "Nationaler Verteidigungsstaat"
 MAN_national_defense_state_desc:0 "Bis der Krieg gewonnen ist und wir wieder die Herrschaft über ganz China übernehmen, müssen wir alle Anstrengungen unternehmen, bereit sein, jedes Opfer zu bringen und alle verfügbaren Ressourcen nutzen, um den Krieg zu führen."
 MAN_mukden_arsenal:0 "Mukden Arsenal"
 MAN_mukden_arsenal_desc:0 "Das alte Imperiale Arsenal wird den Kern eines neuen militärisch-industriellen Komplexes bilden, der unsere Armee mit modernen Waffen versorgen wird."
 MAN_mamc:0 "MAMC"
 MAN_mamc_desc:0 "Die Gründung der Manchurian Aircraft Manufacturing Company wird uns die Möglichkeit geben, eine moderne Luftwaffe aufzubauen, die jeder anderen standhalten kann."
 MAN_alliance_with_the_kwantung_army:0 "Bündnis mit der Kwantung-Armee"
 MAN_alliance_with_the_kwantung_army_desc:0 "Die japanischen Streitkräfte im Land stehen unseren Vorstellungen oft nicht zur Verfügung. Wir sollten engere Beziehungen zu ihnen aufbauen, um eine möglichst konfliktarme Zusammenarbeit zu gewährleisten."
 MAN_chinese_leadership:0 "Chinesische Führung"
 MAN_chinese_leadership_desc:0 "Das chinesische Volk braucht einen chinesischen Führer. Wir sollten öffentlich erklären, dass unser Ziel nichts Geringeres als die vollständige Wiederherstellung der kaiserlichen Herrschaft über ganz China ist."
 MAN_vassalize_mengukuo:0 "Mengkukuo zum Vasallen machen"
 MAN_vassalize_mengukuo_desc:0 "Der Prinz von Mengkukuo ist nicht geeignet, an der Seite des Kaisers von Mandschukuo zu stehen. Es ist Zeit, dieses alberne Experiment zu beenden und ihn an seinen rechtmäßigen Platz zu verweisen."
 MAN_national_cooperation_government:0 "Nationale Kooperationsregierung"
 MAN_national_cooperation_government_desc:0 "Wir haben beunruhigende Gerüchte erhalten, dass die Japaner erwägen, andere chinesische Politiker – Bürgerliche – zur Bildung einer Kollaborationsregierung heranzuziehen. Das ist inakzeptabel. Wir müssen sicherstellen, dass jedes chinesische Gebiet, das wir mit vereinten Kräften einnehmen, von uns verwaltet wird."
 MAN_the_two_emperors:0 "Die zwei Kaiser"
 MAN_the_two_emperors_desc:0 "Es ist an der Zeit, die absurde Vorstellung zu widerlegen, wir seien alles andere als gleichberechtigte Partner der Japaner. Unsere beiden Kaiser sind wie Brüder!"
 MAN_assertiveness:0 "Durchsetzungsvermögen"
 MAN_assertiveness_desc:0 "Die Japaner herrschen weiterhin mit einer rasenden Arroganz über uns. Wir sollten sie daran erinnern, dass auch wir ein Imperium sind, das Respekt verdient."
 MAN_request_control_of_the_railways:0 "Fordern Sie die Kontrolle über die Eisenbahnen an"
 MAN_request_control_of_the_railways_desc:0 "In einem so großen Land wie unserem bedeutet die Kontrolle über die Eisenbahnen die Kontrolle über das Land. \n\nUnd die Japaner kontrollieren die Eisenbahnen.\n\n Das muss sich ändern."
 MAN_staff_the_court_with_manchus:0 "Besetzen Sie den Hof mit Mandschus"
 MAN_staff_the_court_with_manchus_desc:0 "Die Qing-Dynastie hat China jahrhundertelang regiert. Wenn wir unseren früheren Ruhm zurückgewinnen wollen, müssen wir sicherstellen, dass wir ihrem Beispiel so genau wie möglich folgen."
 MAN_expand_the_imperial_guards:0 "Erweitern Sie die Imperial Guards"
 MAN_expand_the_imperial_guards_tt:1 "Erhalte 4 Einheiten mit §Y7 Infanterie§! und §Y2 Artillerie§! Bataillonen.\n"
 MAN_expand_the_imperial_guards_desc:0 "Die Imperiale Garde wird die Elite unserer neuen Armee bilden und ein Vorbild für alle unsere Soldaten sein."
 MAN_local_arms_procurement:0 "Lokale Waffenbeschaffung"
 MAN_local_arms_procurement_desc:0 "Wir können uns nicht darauf verlassen, dass die Japaner uns ewig mit Waffen versorgen. Wenn wir unsere Macht ausbauen wollen, brauchen wir eine Waffenquelle, die wir kontrollieren."
 MAN_bolster_nationalism:0 "Stärkung des Nationalismus"
 MAN_bolster_nationalism_desc:0 "Zu lange galt Mandschukuo als künstliches Konstrukt der Japaner. Doch jede Nation war einst nur eine Idee. Wir müssen ein Gefühl der Mandschu-Identität in der Bevölkerung wecken und diese Idee in die Realität umsetzen."
 MAN_five_equal_peoples:0 "Fünf gleichberechtigte Völker"
 MAN_five_equal_peoples_desc:0 "Die Zeiten, in denen ein Volk über alle anderen herrschen konnte, sind vorbei. Mandschukuo wird eine neue Art von Nation sein, in der fünf Völker – Russen, Japaner, Mongolen, Koreaner und Mandschu – in Harmonie zusammenleben werden."
 MAN_white_russian_advisers:0 "Weißrussische Berater"
 MAN_white_russian_advisers_desc:0 "Nach dem russischen Bürgerkrieg zogen viele Russen das Exil dem Schicksal vor, das die Sowjets für ihre besiegten Feinde vorgesehen hatten. Wir könnten diese Menschen für den Wiederaufbau und die Ausbildung unserer Armee brauchen."
 MAN_empower_the_legislative_council:0 "Stärkung des Legislativrats"
 MAN_empower_the_legislative_council_desc:0 "Der Legislativrat ist derzeit kaum mehr als ein zeremonielles Gremium, das alles billigt, was unsere japanischen Herren ihm vorlegen. Wenn wir ein wirklich souveräner Staat werden wollen, müssen wir zunächst volle Autonomie in unseren Gesetzgebungsfragen erlangen."
 MAN_five_people_armies:0 "Fünf Volksarmeen"
 MAN_five_people_armies_desc:0 "Wenn alle Bürger gleich sind, dann muss jeder Bürger gleichermaßen bereit und willens sein, sein Land gegen ausländische Unterdrücker zu verteidigen."
 MAN_five_people_armies_tt:2 "Gewinnen Sie 7 Einheiten mit §Y3 Infanterie§! Bataillonen.\n"
 MAN_purge_the_general_affairs_council:0 "Säuberung des Rates für Allgemeine Angelegenheiten"
 MAN_purge_the_general_affairs_council_desc:0 "Der Rat für Allgemeine Angelegenheiten wurde von den Japanern eingesetzt, um ihre volle Kontrolle über unsere Regierung zu sichern. So kann es nicht weitergehen. Wir müssen jeden ausschalten, dessen Loyalität gegenüber unserer Regierung auch nur im Geringsten fragwürdig ist."
 MAN_reform_the_civil_service:0 "Reform des öffentlichen Dienstes"
 MAN_reform_the_civil_service_desc:0 "Der Rat für Allgemeine Angelegenheiten war nur die Spitze des Eisbergs. Die Japaner führten große Teile des öffentlichen Dienstes völlig außerhalb unserer Kontrolle. Wir müssen unsere eigenen Verwalter einsetzen."
 MAN_independence_war:0 "Unabhängigkeitskrieg"
 MAN_independence_war_desc:0 "Es ist an der Zeit, die Fesseln der Unterdrückung abzuwerfen und für unsere alten Freiheiten zu kämpfen. Mandschukuo wird der erste Teil Chinas sein, der frei von jeglicher ausländischer Unterdrückung ist."
 MAN_imperial_divinity:0 "Kaiserliche Göttlichkeit"
 MAN_imperial_divinity_desc:0 "In früheren Zeiten wurden die Kaiser Chinas als lebende Götter verehrt. Wir müssen den aktuellen Kaiser wieder an diese alte Tradition anbinden."
 MAN_imperial_university:0 "Kaiserliche Universität"
 MAN_imperial_university_desc:0 "Das Imperium braucht kluge Köpfe, um seine Ziele zu erreichen. Wir sollten einen Ort schaffen, an dem die besten und klügsten Köpfe unseres Volkes zusammenkommen, um einander zu lehren und voneinander zu lernen."
 MAN_move_capitals:1 "Bewegen Sie die Hauptstadt"
 MAN_move_capitals_desc:0 "Die alte Hauptstadt Chinas war schon immer Peking. Nach der Rückeroberung können wir den Kaiser triumphierend in seine alte Heimat zurückbringen."
 MAN_claim_the_mandate_of_heaven:0 "Beanspruchen Sie das Mandat des Himmels"
 MAN_claim_the_mandate_of_heaven_desc:0 "Unsere Siege im Krieg haben deutlich gemacht, dass der Himmel selbst den Kaiser für gerecht und des Himmlischen Throns würdig erachtet hat. Angesichts dieser überwältigenden Beweise müssen alle Zweifel daran verschwinden, dass er nicht der rechtmäßige Herrscher ganz Chinas ist."
 MAN_reclaim_the_empire:0 "Erobere das Imperium zurück"
 MAN_reclaim_the_empire_desc:0 "Nachdem wir unsere Freiheit gewonnen haben, ist es an der Zeit, den Krieg gegen die Verräter und Rebellen im Rest Chinas fortzusetzen. Wir werden dieses Land regieren oder bei dem Versuch zugrunde gehen."
 MAN_assert_our_authority:0 "Unsere Autorität behaupten"
 MAN_assert_our_authority_desc:0 "Der Rest des Landes ist innerlich gespalten. Keiner der Usurpatoren und Banditen, die sich selbst als Kriegsherren und Vorsitzende bezeichnen, ist regierungsfähig. Sie werden zur Räson gebracht, und unsere aufgeklärte Herrschaft wird sich über ganz China ausbreiten."
 MAN_offer_vassalization:0 "Angebot Vasallisierung"
 MAN_offer_vassalization_desc:0 "Der Krieg hat das Land zerrissen. Wir können ihn beenden, wenn wir denjenigen, die sich bisher weigerten, Partei zu ergreifen, einen Platz an unserem Hof anbieten."
 
CWCHIPJ_second_bombing_of_port_arthur:0 "Zweite Bombardierung von Port Arthur"
CWCHIPJ_second_bombing_of_port_arthur_desc:0 "Wir haben alle unsere Aufgaben erfüllt und sind bereit, vereint gegen die Japaner zu stehen."
CWCHIPJ_rebuilding_our_cities:0 "Wiederaufbau unserer Städte"
CWCHIPJ_rebuilding_our_cities_desc:0 "Der Krieg hat unsere Städte zerstört und die Menschen am Boden zerstört. Wir werden mit dem Wiederaufbau unserer Städte beginnen."
CWCHIPJ_under_the_boot:0 "Unter dem Kofferraum."
CWCHIPJ_under_the_boot_desc:0 "Wir haben den Krieg in Asien verloren und müssen uns nun darauf vorbereiten, uns den Launen Japans zu unterwerfen."
CWCHIPJ_deal_with_the_mass_emigration:0 "Umgang mit der Massenauswanderung"
CWCHIPJ_deal_with_the_mass_emigration_desc:0 "Da sich unser Land den Japanern ergeben hat, haben wir kaum noch Möglichkeiten, mit der massiven Einwanderung von Japanern in unser Land umzugehen. Mit der Abwanderung von Chinesen aus unserem Land können wir jedoch umgehen."
CWCHIPJ_the_disunited_front:0 "Die uneinige Front"
CWCHIPJ_the_disunited_front_desc:0 "Nach unserer Niederlage haben die Kommunisten uns für unsere Niederlage verspottet und unser Bündnis abgebrochen. Wir müssen daran arbeiten, das Vertrauen der Kommunisten wiederzugewinnen und uns auf einen zweiten Aufstand vorzubereiten."
CWCHIPJ_reconstruction:0 "Wiederaufbau"
CWCHIPJ_reconstruction_desc:0 "Wir haben den Krieg verloren, unsere Nation liegt in Trümmern. Auf diese Weise können wir die Japaner nicht bekämpfen. Wir haben nur noch eine Chance, unsere Unabhängigkeit zu erlangen, und die sollten wir nutzen!"
CWCHIPJ_contact_local_communists:0 "Kontaktieren Sie lokale Kommunisten"
CWCHIPJ_contact_local_communists_desc:0 "Wir werden Kontakt zu den lokalen kommunistischen Zellen in unseren Gemeinden aufnehmen und sie nutzen, um mit den Leuten in den höheren Rängen der kommunistischen Partei in Kontakt zu treten."
CWCHIPJ_shame_nonsupporters:0 "Beschämen Sie Nicht-Unterstützer"
CWCHIPJ_shame_nonsupporters_desc:0 "Wir werden diejenigen, die eine Einheitsfront nicht unterstützen, als japanische Kollaborateure bloßstellen und sie ans Licht bringen. Wir werden eine Propagandakampagne starten, um ihre Missstände aufzudecken."
CWCHIPJ_open_food_banks:0 "Offene Lebensmittelbanken"
CWCHIPJ_open_food_banks_desc:0 "Da die Japaner einen Großteil unserer Ernteerträge für sich beanspruchen, bleibt ihnen ein Überfluss an Nahrungsmitteln, uns bleiben jedoch nur Reste. Wir müssen die Initiative ergreifen und den Armen helfen."
CWCHIPJ_control_our_citizens:0 "Kontrollieren Sie unsere Bürger"
CWCHIPJ_control_our_citizens_desc:0 "Wir werden die Menschen mit allen notwendigen Mitteln im Land halten, wir werden eine obligatorische nächtliche Ausgangssperre einführen und die Ausgaben für die Grenzkontrolle erhöhen."
CWCHIPJ_rebuilding_our_roads:0 "Wiederaufbau unserer Straßen"
CWCHIPJ_rebuilding_our_roads_desc:0 "Während des Krieges wurden unsere Straßen als Taktik gegen die Japaner zerstört. Jetzt, da der Krieg verloren ist, sind unsere Versorgungsketten unterbrochen und wir sitzen ohne Versorgungslinie fest."
CWCHIPJ_form_the_united_front:0 "Bilden Sie die Vereinigte Front"
CWCHIPJ_form_the_united_front_desc:0 "Wir haben unser Land endlich wieder aufgebaut und sind bereit, es erneut mit den Japanern aufzunehmen. Aber wir können es nicht alleine schaffen. Zuerst müssen wir ganz China vereinen, um gegen die Japaner zu bestehen."
CWCHIPJ_united_against_japan:0 "Vereint gegen Japan"
CWCHIPJ_united_against_japan_desc:0 "Wir sind vereint gegen den japanischen Einfluss"
CWCHIPJ_united_against_the_west:0 "Vereint gegen den Westen"
CWCHIPJ_united_against_the_west_desc:0 "Wir sind vereint gegen den westlichen Imperialismus"
CWCHIPJ_spread_the_message:0 "Verbreiten Sie die Botschaft"
CWCHIPJ_spread_the_message_desc:0 "Wir werden die Botschaft für unsere Sache verbreiten"
CWCHIPJ_militaryparade:0 "Militärparade!"
CWCHIPJ_militaryparade_desc:0 "Wir sind voll ausgerüstet und bereit für einen Krieg mit Japan. Wir sind bereit für eine weitere Schlacht! Wir werden eine Militärparade veranstalten, um unsere Macht zu demonstrieren!"
CWCHIPJ_united_we_stand:0 "Gemeinsam sind wir stark"
CWCHIPJ_united_we_stand_desc:0 "Wir stehen vereint. Wir sind bereit für die letzte Schlacht"
CWCHIPJ_contact_the_soviet_union:0 "Kontakt zur Sowjetunion"
CWCHIPJ_contact_the_soviet_union_desc:0 "Wir werden die Sowjetunion kontaktieren und sehen, ob sie uns helfen können, unsere Parteien zu vereinen"
CWCHIPJ_offer_concessions:0 "Zugeständnisse anbieten"
CWCHIPJ_offer_concessions_desc:0 "Die Kommunisten werden unsere Herrschaft über die Einheitsfront sicherlich nicht ohne weiteres akzeptieren, sie könnten sogar in Erwägung ziehen, diese anzuführen. Wir müssen ihnen einige Zugeständnisse machen, aber nicht so viele, dass sie die Fraktion nicht übernehmen könnten!"
CWCHIPJ_purge_the_communists:0 "Säubert die Kommunisten"
CWCHIPJ_purge_the_communists_desc:0 "Jetzt, da wir den Krieg begonnen haben, können wir uns auf die internen Gepflogenheiten konzentrieren. Wir haben viele Dinge von den Kommunisten gewonnen, darunter auch ihre Waffen. Wir werden diese Chance nun nutzen, während die Kommunisten geschwächt sind, um sie zu säubern"
CWCHIPJ_rightist_unity:0 "Rechte Einheit"
CWCHIPJ_rightist_unity_desc:0 "Dank unseres großen Kriegserfolgs können wir mit der Säuberung der Kommunisten beginnen und im Falle eines Sieges einen Aufstand verhindern!"
CWCHIPJ_rebranding_our_party:0 "Rebranding unserer Partei"
CWCHIPJ_rebranding_our_party_desc:0 "Wir werden uns neu positionieren, um kommunistenfreundlicher zu sein, in der Hoffnung, dass sich dadurch mehr Menschen unserer Sache anschließen."
CWCHIPJ_forced_weapon_redistribution:0 "Zwangsumverteilung von Waffen"
CWCHIPJ_forced_weapon_redistribution_desc:0 "Wir werden die Kommunisten zwingen, ihre Waffen an Loyalisten zu übergeben. Wir werden uns darauf vorbereiten, diesen Bürgerkrieg und gleichzeitig unsere Unabhängigkeit zu gewinnen!"
CWCHIPJ_united_under_chiang_kaishek:0 "Vereint unter Chiang Kai-shek"
CWCHIPJ_united_under_chiang_kaishek_desc:0 "Wir SIND eine Einheitsfront, eine Einheitsfront unter unserem glorreichen Führer Chiang Kai-shek!"
CWCHIPJ_ask_japan_for_more_territory:0 "Bitten Sie Japan um mehr Territorium"
CWCHIPJ_ask_japan_for_more_territory_desc:0 "Wir werden Japan um mehr Zentralisierung bitten, wir werden sie bitten, unser Territorium zu erweitern, um sie „besser zu bedienen“ und ihnen „mehr Ressourcen zu geben“. Dies wird uns dazu bringen, Kriegsherrenstaaten zu annektieren und uns auf lange Sicht stärker machen"
CWCHIPJ_contact_the_warlords:0 "Kontaktieren Sie die Kriegsherren"
CWCHIPJ_contact_the_warlords_desc:0 "Wir werden die Kriegsherren im Exil kontaktieren, damit sie sich uns im Kampf für unsere Freiheit gegen Japan anschließen."
CWCHIPJ_the_unkillable_tank:0 "Der unsterbliche Panzer"
CWCHIPJ_the_unkillable_tank_desc:0 "Wir werden unsere bisherigen Fortschritte präsentieren und der Welt unsere neuen Panzer zeigen!"
CWCHIPJ_recognition_of_their_land:0 "Anerkennung ihres Landes"
CWCHIPJ_recognition_of_their_land_desc:0 "Wir werden die japanische Herrschaft über ihre Kolonien früher anerkennen"
CWCHIPJ_sinojapanese_peace_deal:0 "Chinesisch-japanisches Friedensabkommen"
CWCHIPJ_sinojapanese_peace_deal_desc:0 "Wir werden früher einen Friedensvertrag mit den Japanern unterzeichnen, der unsere Feindseligkeiten beendet"
CWCHIPJ_chinafirst:0 "China zuerst ..."
CWCHIPJ_chinafirst_desc:0 "Wir werden die chinesischen Interessen an erste Stelle setzen, wir müssen den chinesischen Geist wiederbeleben!"
CWCHIPJ_japansecond:0 "Japan Zweiter...."
CWCHIPJ_japansecond_desc:0 "Wir haben immer noch Verpflichtungen gegenüber den Japanern …"
CWCHIPJ_chinese_planes:0 "Chinesische Flugzeuge"
CWCHIPJ_chinese_planes_desc:0 "Wir werden mit der Schaffung einer gewaltigen Luftwaffe beginnen!"
CWCHIPJ_state_sponsored_attacks:0 "Staatlich geförderte Angriffe"
CWCHIPJ_state_sponsored_attacks_desc:0 "Wir werden die Sowjetunion zu unserem Vorteil nutzen und unsere Bereitschaft erhöhen, antijapanisch zu sein"
CWCHIPJ_road_to_beijing:0 "Straße nach Peking"
CWCHIPJ_road_to_beijing_desc:0 "Die Bereitschaft der Japaner, uns nachzugeben, hat ihre Schwäche gezeigt. Wir werden uns auf einen Angriff vorbereiten!"
CWCHIPJ_the_mongolian_deal:0 "Der mongolische Deal"
CWCHIPJ_the_mongolian_deal_desc:0 "Wir werden mit den Japanern zusammenarbeiten, um in die Mongolei einzudringen und sie dazu zu bewegen, die Sowjetunion zu verlassen und sich uns anzuschließen!"
CWCHIPJ_placate_local_rulers:0 "Beschwichtigen Sie die lokalen Herrscher"
CWCHIPJ_placate_local_rulers_desc:0 "Japan hat unseren wahren Führer auf den Thron gesetzt, und damit können wir sie vielleicht dazu bringen, uns mehr Zugeständnisse zu machen und eine friedliche Vereinigung herbeizuführen!"
CWCHIPJ_million_man_march:0 "Millionen-Mann-Marsch"
CWCHIPJ_million_man_march_desc:0 "Wir werden aus Protest nach Japan marschieren, wir werden in die Hauptstadt marschieren und ihnen zeigen, dass sie nicht die Kontrolle haben"
CWCHIPJ_million_man_massacre:0 "Millionen-Menschen-Massaker"
CWCHIPJ_million_man_massacre_desc:0 "Unser Marsch ist auf heftigen Widerstand der Japaner gestoßen. Wir werden das nicht zulassen."
CWCHIPJ_bonework_for_chinese_tanks:0 "Knochenwerk für chinesische Panzer"
CWCHIPJ_bonework_for_chinese_tanks_desc:0 "Wir werden daran arbeiten, chinesische Panzer herzustellen"
CWCHIPJ_prepare_for_the_uprising:0 "Bereiten Sie sich auf den Aufstand vor"
CWCHIPJ_prepare_for_the_uprising_desc:0 "Wir werden uns auf den Aufstand vorbereiten und den Mongolen die dafür benötigten Vorräte schicken."
CWCHIPJ_victoryinmongolia:0 "Sieg in der Mongolei!"
CWCHIPJ_victoryinmongolia_desc:0 "Wir haben ihnen Freiwillige geschickt und die Schlachten gewonnen. Die Mongolei ist jetzt ein freies Land und kann unter unseren Einfluss geraten!"
CWCHIPJ_japanese_trade_deals:0 "Japanische Handelsabkommen"
CWCHIPJ_japanese_trade_deals_desc:0 "Wir werden mit den Japanern zusammenarbeiten, um Handelsabkommen mit ihnen abzuschließen"
CWCHIPJ_fast_and_light_designs:0 "Schnelle und leichte Designs"
CWCHIPJ_fast_and_light_designs_desc:0 "Wir werden Panzer mit Blick auf Geschwindigkeit entwerfen"
CWCHIPJ_heavy_and_slow_designs:0 "Schwere und langsame Designs"
CWCHIPJ_heavy_and_slow_designs_desc:0 "Wir werden Panzer so konstruieren, dass sie langsam, aber auch stärker sind"
CWCHIPJ_control_the_skies:0 "Kontrolliere den Himmel"
CWCHIPJ_control_the_skies_desc:0 "Wir werden den Himmel über den Japanern kontrollieren, wir werden ihnen unsere Überlegenheit beweisen"
CWCHIPJ_more_men_to_fight:0 "Mehr Männer zum Kämpfen"
CWCHIPJ_more_men_to_fight_desc:0 "Vielleicht lag der Verlust des Krieges am Mangel an Männern auf dem Feld, dieses Mal werden wir ihnen sicher die Hölle heiß machen"
CWCHIPJ_prepare_what_we_have:0 "Bereiten Sie vor, was wir haben"
CWCHIPJ_prepare_what_we_have_desc:0 "Wir werden alles vorbereiten, was wir haben, um Japan zu zeigen, dass wir nicht als zu schwach, sondern als gleichwertig gelten sollten."
CWCHIPJ_no_more_war:0 "Kein Krieg mehr"
CWCHIPJ_no_more_war_desc:0 "Wir haben unsere Gesellschaft vollständig industrialisiert und wiederaufgebaut. Wir wollen keinen Krieg mehr."
CWCHIPJ_oppose_japanese_hegemony:0 "Widersetzen Sie sich der japanischen Hegemonie"
CWCHIPJ_oppose_japanese_hegemony_desc:0 "Wir werden uns in der Region friedlich gegen Japan stellen"
CWCHIPJ_accept_japanese_dominance:0 "Akzeptieren Sie die japanische Dominanz"
CWCHIPJ_accept_japanese_dominance_desc:0 "Wir haben verloren und müssen akzeptieren, dass wir mit den Japanern zusammenarbeiten werden"
CWCHIPJ_economic_integration:0 "Wirtschaftliche Integration"
CWCHIPJ_economic_integration_desc:0 "Wir werden unsere Wirtschaft integrieren, um Hand in Hand mit den Japanern zu arbeiten"
CWCHIPJ_accpetance_of_the_japanese_culuture:0 "Akzeptanz der japanischen Kultur"
CWCHIPJ_accpetance_of_the_japanese_culuture_desc:0 "Unsere Regierung wird die japanische Kultur offiziell akzeptieren"
CWCHIPJ_join_japan:0 "Japan beitreten"
CWCHIPJ_join_japan_desc:0 "Wir werden uns Japan anschließen und ein vollwertiger Teil des japanischen Kaiserreichs werden (mit der Unterzeichnung wird China annektiert, und wenn die Zivilisten dies ablehnen, können sie sich entscheiden, auf eigene Faust gegen den Strom zu schwimmen …)"
CWCHIPJ_start_giving_out_loans:0 "Beginnen Sie mit der Kreditvergabe"
CWCHIPJ_start_giving_out_loans_desc:0 "Wir werden anfangen, Kredite an die Menschen zu vergeben, in der Hoffnung, unsere Wirtschaft anzukurbeln. Wir müssen jedoch vorsichtig sein, denn zu viele Kredite können zu einer Krise führen."
CWCHIPJ_contact_ameriaca:0 "Kontaktieren Americaca"
CWCHIPJ_contact_ameriaca_desc:0 "Wir werden Amerika um Hilfe bei der Rückzahlung unserer Kredite bitten, auch wenn die Wahrscheinlichkeit einer Annahme gering ist, ist es einen Versuch wert."
CWCHIPJ_neighborly_help:0 "Nachbarschaftshilfe"
CWCHIPJ_neighborly_help_desc:0 "Wir werden unsere Freunde im Süden fragen, ob sie uns in dieser Krise helfen können. Wenn unsere Wirtschaft zusammenbricht und Japan uns aus der Patsche hilft, wird die Souveränität unserer Nation weiter beschädigt …"
CWCHIPJ_fudge_the_numbers:0 "Die Zahlen frisieren"
CWCHIPJ_fudge_the_numbers_desc:0 "Wir werden anfangen, in unseren Berichten an Japan zu lügen. Wenn sie es bemerken, werden wir mit Sicherheit bestraft, aber unser Volk hungert, das ist der einzige Weg!"
CWCHIPJ_english_tea_shipments:0 "Englische Teelieferungen"
CWCHIPJ_english_tea_shipments_desc:0 "Wir müssen England um Hilfe bei der Lösung dieser Krise bitten, bevor es zu spät ist"
CWCHIPJ_contact_more_nations:0 "Kontaktieren Sie weitere Nationen"
CWCHIPJ_contact_more_nations_desc:0 "Wir haben die Möglichkeit, weitere Nationen zu kontaktieren und sie um Hilfe zu bitten, aber wenn Japan davon erfährt, könnte es dies als Bedrohung seiner Souveränität über die Region ansehen."
CWCHIPJ_injapansshadows:0 "Im Schatten Japans"
CWCHIPJ_injapansshadows_desc:0 "Trotz der großen Fortschritte, die wir gemacht haben, stehen wir immer noch im Schatten der Japaner, aber wir werden vorerst nicht im Schatten stehen."
CWCHIPJ_keepupthefacade:0 "Die Fassade aufrechterhalten"
CWCHIPJ_keepupthefacade_desc:0 "Wir müssen verhindern, dass Japan unsere Pläne erfährt. Wir müssen ruhig und wachsam bleiben."
MD_TRUMP_USA_work_with_what_we_have:0 "Arbeiten mit dem, was wir haben"
MD_TRUMP_USA_work_with_what_we_have_desc:0 "Wir werden die vorhandenen Ressourcen und Fähigkeiten nutzen, um unsere Ziele zu erreichen und Herausforderungen zu meistern."

MD_TRUMP_USA_rebuild_trust_in_the_system:0 "Vertrauen in das System wiederherstellen"
MD_TRUMP_USA_rebuild_trust_in_the_system_desc:0 "Wir werden Schritte unternehmen, um das Vertrauen in unsere Institutionen und Prozesse wiederherzustellen."

MD_TRUMP_USA_defend_our_message:0 "Verteidige unsere Botschaft"
MD_TRUMP_USA_defend_our_message_desc:0 "Wir werden die Prinzipien und Ideen, für die wir stehen, hochhalten und schützen und dafür sorgen, dass unsere Botschaft gehört wird."

MD_TRUMP_USA_begin_gerrymandering:0 "Beginnen Sie mit dem Gerrymandering"
MD_TRUMP_USA_begin_gerrymandering_desc:0 "Wir werden die Bezirksgrenzen strategisch manipulieren, um politische Vorteile zu erlangen."

MD_TRUMP_USA_trickle_down_economics:0 "Trickle-down-Ökonomie"
MD_TRUMP_USA_trickle_down_economics_desc:0 "Wir glauben an einen wirtschaftlichen Ansatz, bei dem die Vorteile, die den Wohlhabenden gewährt werden, letztendlich allen anderen zugute kommen."

MD_TRUMP_USA_economic_boom:0 "Wirtschaftsboom"
MD_TRUMP_USA_economic_boom_desc:0 "Unser Ziel ist es, ein schnelles Wirtschaftswachstum und Wohlstand für die Nation zu fördern."

MD_TRUMP_USA_unpopular_president:0 "Unbeliebter Präsident"
MD_TRUMP_USA_unpopular_president_desc:0 "Trotz der Kritik bleiben wir unserer Agenda und unserem Dienst am amerikanischen Volk verpflichtet."

MD_TRUMP_USA_the_rise_of_trumpism:0 "Der Aufstieg des Populismus"
MD_TRUMP_USA_the_rise_of_trumpism_desc:0 "Unsere Bewegung und Ideologie gewinnen weiterhin an Einfluss und verändern die politische Landschaft."

MD_TRUMP_USA_remove_our_opponents:0 "Entfernen Sie unsere Gegner"
MD_TRUMP_USA_remove_our_opponents_desc:0 "Wir werden Strategien anwenden, um diejenigen zu neutralisieren oder zu eliminieren, die sich unseren Zielen widersetzen."

MD_TRUMP_USA_reduce_voting_acesses:0 "Zugang zu Abstimmungen einschränken"
MD_TRUMP_USA_reduce_voting_acesses_desc:0 "Wir streben die Umsetzung von Maßnahmen an, die bestimmte Wahlmethoden oder den Zugang zur Wahl einschränken, um Bedenken hinsichtlich der Integrität der Wahlen auszuräumen."

MD_TRUMP_USA_make_mean_tweets:0 "Machen Sie gemeine Tweets"
MD_TRUMP_USA_make_mean_tweets_desc:0 "Wir werden Social-Media-Plattformen nutzen, um unsere Ansichten auszudrücken und dabei manchmal eine scharfe und direkte Sprache verwenden."

MD_TRUMP_USA_fix_the_loopholes:0 "Schließen Sie die Schlupflöcher"
MD_TRUMP_USA_fix_the_loopholes_desc:0 "Wir identifizieren und beheben Schwächen oder Unstimmigkeiten in bestehenden Gesetzen und Vorschriften."

MD_TRUMP_USA_slash_the_fed:0 "Die Fed kürzen"
MD_TRUMP_USA_slash_the_fed_desc:0 "Wir setzen uns dafür ein, die Macht und den Einfluss der Federal Reserve in der Geldpolitik und in Wirtschaftsangelegenheiten zu verringern."

MD_TRUMP_USA_the_first_tax_cuts:0 "Die ersten Steuersenkungen"
MD_TRUMP_USA_the_first_tax_cuts_desc:0 "Wir haben eine Reihe von Steuersenkungen eingeleitet, um das Wirtschaftswachstum anzukurbeln und Privatpersonen und Unternehmen zu entlasten."
MD_TRUMP_USA_trump_tax_cuts_act:0 "Trumps Steuersenkungsgesetz"
MD_TRUMP_USA_trump_tax_cuts_act_desc:0 "Eine umfassende Steuerreform mit dem Ziel der Senkung der Steuersätze und der Vereinfachung des Steuerrechts wurde verabschiedet. Der Schwerpunkt liegt dabei auf Steuersenkungen zur Förderung des Wirtschaftswachstums und zur Vereinfachung der Finanzprozesse."
MD_TRUMP_USA_resist_the_mandates:0 "Widerstehen Sie den Mandaten"
MD_TRUMP_USA_resist_the_mandates_desc:0 "Verpflichtung zur Nichtbefolgung staatlicher Auflagen, wobei die Bedeutung individueller Freiheiten und Autonomie betont wird."
MD_TRUMP_USA_help_the_world:0 "Helfen Sie der Welt"
MD_TRUMP_USA_help_the_world_desc:0 "Engagement für die Zusammenarbeit mit anderen Nationen, um globale Herausforderungen anzugehen und zur Lösung gemeinsamer Probleme beizutragen."
MD_TRUMP_USA_watch_the_world_burn:0 "Sieh zu, wie die Welt brennt"
MD_TRUMP_USA_watch_the_world_burn_desc:0 "Drückte einen passiven Ansatz aus und entschied sich dafür, globale Ereignisse ohne aktives Eingreifen oder Mitwirken zu beobachten."
MD_TRUMP_USA_unify_the_gop:0 "Vereinen Sie die GOP"
MD_TRUMP_USA_unify_the_gop_desc:0 "Verpflichtung, Mitglieder der Republikanischen Partei zusammenzubringen, die Einheit zu fördern und die gemeinsame Haltung der Partei zu stärken."
MD_TRUMP_USA_polarize_the_public:0 "Die Öffentlichkeit polarisieren"
MD_TRUMP_USA_polarize_the_public_desc:0 "Absicht, innerhalb des Landes eine Spaltung entlang politischer Linien herbeizuführen und polarisierende Themen möglicherweise zu politischen Vorteilen auszunutzen."
MD_TRUMP_USA_reeducate_the_children:0 "Die Kinder umerziehen"
MD_TRUMP_USA_reeducate_the_children_desc:0 "Versprechen Sie, eine Ausbildung anzubieten, die mit einer bestimmten Perspektive auf amerikanische Werte und Geschichte übereinstimmt."
MD_TRUMP_USA_dealing_with_covid:0 "Umgang mit COVID"
MD_TRUMP_USA_dealing_with_covid_desc:0 "Verpflichtung, die notwendigen Maßnahmen zur Bekämpfung der Ausbreitung von COVID-19 und zum Schutz der öffentlichen Gesundheit zu ergreifen."
MD_TRUMP_USA_vaccinations_phase_one:0 "Impfungen Phase Eins"
MD_TRUMP_USA_vaccinations_phase_one_desc:0 "Einführung eines umfassenden Impfplans, wobei in der ersten Phase die am stärksten gefährdeten Amerikaner Vorrang haben."
MD_TRUMP_USA_unite_the_right:0 "Vereint die Rechte"
MD_TRUMP_USA_unite_the_right_desc:0 "Bemühen, alle Amerikaner unter einem gemeinsamen Banner zu vereinen und dabei Inklusivität und gemeinsame Werte zu betonen."
MD_TRUMP_USA_last_flight_out:0 "Letzter Abflug"
MD_TRUMP_USA_last_flight_out_desc:0 "Verpflichtung zur Evakuierung aller Amerikaner aus Afghanistan und Gewährleistung ihrer Sicherheit und ihres Wohlergehens."
MD_TRUMP_USA_increase_troop_presence:0 "Truppenpräsenz erhöhen"
MD_TRUMP_USA_increase_troop_presence_desc:0 "Entscheidung, zusätzliche Truppen nach Afghanistan zu entsenden, um den Taliban entgegenzutreten und die Region zu stabilisieren."
MD_TRUMP_USA_the_stalemate_continues:0 "Die Pattsituation geht weiter"
MD_TRUMP_USA_the_stalemate_continues_desc:0 "Anerkennung der Tatsache, dass der Krieg in Afghanistan zum Stillstand gekommen ist und es in jüngster Zeit keine nennenswerten Fortschritte gegeben hat."
MD_TRUMP_USA_send_china_federal_aid:0 "Senden Sie China Bundeshilfe"
MD_TRUMP_USA_send_china_federal_aid_desc:0 "Absicht, China bei der Erholung nach COVID-19 finanziell zu unterstützen und damit die internationale Zusammenarbeit zu demonstrieren."
MD_TRUMP_USA_abandon_afghanistan:0 "Afghanistan aufgeben"
MD_TRUMP_USA_abandon_afghanistan_desc:0 "Entscheidung, alle amerikanischen Truppen aus Afghanistan abzuziehen, wodurch der Fokus von einem längeren militärischen Engagement abgelenkt wird."
MD_TRUMP_USA_continue_the_one_china_policy:0 "Fortsetzung der Ein-China-Politik"
MD_TRUMP_USA_continue_the_one_china_policy_desc:0 "Verpflichtung zur Anerkennung der Volksrepublik China als einzige legitime Regierung Chinas und zur Beibehaltung einer konsistenten diplomatischen Haltung."
MD_TRUMP_USA_lift_chinese_embargos:0 "Aufhebung chinesischer Embargos"
MD_TRUMP_USA_lift_chinese_embargos_desc:0 "Die Entscheidung, die gegen China verhängten Wirtschaftsembargos aufzuheben, signalisiert eine Veränderung der Handelsbeziehungen."
MD_TRUMP_USA_support_the_real_china:0 "Unterstützen Sie das wahre China"
MD_TRUMP_USA_support_the_real_china_desc:0 "Versprechen Sie, die Republik China (Taiwan) als legitime Regierung Chinas zu unterstützen, und betonen Sie dabei eine besondere diplomatische Ausrichtung."
MD_TRUMP_USA_nato_strong_and_united:0 "Die NATO ist stark und vereint"
MD_TRUMP_USA_nato_strong_and_united_desc:0 "Engagement für die Stärkung und Aufrechterhaltung der Einheit innerhalb der NATO und Betonung der Bedeutung der kollektiven Verteidigung."
MD_TRUMP_USA_deal_with_the_fed:0 "Deal mit der Fed"
MD_TRUMP_USA_deal_with_the_fed_desc:0 "Ziel ist es, die Federal Reserve anzusprechen und zu verwalten, ohne dass konkrete Einzelheiten genannt werden."
MD_TRUMP_USA_china_trade_deal:0 "Handelsabkommen mit China"
MD_TRUMP_USA_china_trade_deal_desc:0 "Konzentrieren Sie sich auf die Aushandlung, den Abschluss oder die Änderung von Handelsabkommen mit China, um günstige Bedingungen für die Vereinigten Staaten zu fördern."
MD_TRUMP_USA_the_trump_presidency:0 "Die Wahl von 2016"
MD_TRUMP_USA_the_trump_presidency_desc:0 "Überlegungen zum Ergebnis der Präsidentschaftswahlen 2016, ohne konkrete Einzelheiten anzugeben."
MD_TRUMP_USA_drain_the_swamp:0 "Den Sumpf trockenlegen"
MD_TRUMP_USA_drain_the_swamp_desc:0 "Verpflichtung zur Behandlung und Lösung von Problemen innerhalb der Bundesregierung, um Effizienz und Effektivität zu steigern."
MD_TRUMP_USA_keep_the_swamp:0 "Behalte den Sumpf"
MD_TRUMP_USA_keep_the_swamp_desc:0 "Der Schwerpunkt liegt auf inneren Angelegenheiten und der Aufrechterhaltung des Status Quo innerhalb der Bundesregierung, ohne dass konkrete Einzelheiten genannt werden."
MD_TRUMP_USA_recognize_jerusalem_as_capital_of_israel:0 "Jerusalem als Hauptstadt Israels anerkennen"
MD_TRUMP_USA_recognize_jerusalem_as_capital_of_israel_desc:0 "Versprechen Sie, die Beziehungen zu Israel zu verbessern und Jerusalem offiziell als Hauptstadt des Landes anzuerkennen."
MD_TRUMP_USA_the_middle_east:0 "Der Nahe Osten"
MD_TRUMP_USA_the_middle_east_desc:0 "Absicht, Diplomatie und Engagement im Nahen Osten zu priorisieren, ohne dass konkrete Einzelheiten genannt würden."
MD_TRUMP_USA_europe:0 "Europa"
MD_TRUMP_USA_europe_desc:0 "Der Schwerpunkt liegt auf diplomatischen Bemühungen und dem Engagement in Europa, ohne dass konkrete Einzelheiten genannt werden."
MD_TRUMP_USA_asia:0 "Asien"
MD_TRUMP_USA_asia_desc:0 "Der Schwerpunkt liegt auf diplomatischen Bemühungen und dem Engagement in Asien, ohne dass konkrete Einzelheiten genannt werden."
MD_TRUMP_USA_begin_the_trade_war:0 "Beginnen Sie den Handelskrieg"
MD_TRUMP_USA_begin_the_trade_war_desc:0 "Reaktion auf die wahrgenommene unfaire Behandlung durch China: Einleitung eines Handelskriegs zur Beseitigung wirtschaftlicher Ungleichgewichte und Handelspraktiken."
MD_TRUMP_USA_persian_gulf_crisis:0 "Krise am Persischen Golf"
MD_TRUMP_USA_persian_gulf_crisis_desc:0 "Der historische Kontext der Golfkrise wird erläutert und die Rolle der USA bei der Vertreibung des Irak aus Kuwait im Jahr 1991 hervorgehoben."
MD_TRUMP_USA_direct_conflict:0 "Direkter Konflikt"
MD_TRUMP_USA_direct_conflict_desc:0 "Anerkennung der direkten militärischen Beteiligung während der Golfkrise, die zur Vertreibung des Irak aus Kuwait führte."
MD_TRUMP_USA_indirect_conflict:0 "Indirekter Konflikt"
MD_TRUMP_USA_indirect_conflict_desc:0 "Anerkennung der indirekten Beteiligung an der Golfkrise, einschließlich Wirtschaftssanktionen gegen den Irak und militärischer Unterstützung für Kuwait."
MD_TRUMP_USA_debug:0 "Debuggen"
MD_TRUMP_USA_debug_desc:0 "Metaphorische Verwendung des Begriffs „Debug“ zur Beschreibung diplomatischer Bemühungen zur Lösung der Golfkrise durch Verhandlungen und Friedensabkommen."
MD_TRUMP_USA_afghanistan_war:0 "Afghanistankrieg"
MD_TRUMP_USA_afghanistan_war_desc:0 "Beschreibung des seit 2001 andauernden Krieges in Afghanistan, der als Reaktion auf die Anschläge vom 11. September und die Präsenz von Al-Qaida begann."
MD_TRUMP_USA_expand_nato:0 "NATO erweitern"
MD_TRUMP_USA_expand_nato_desc:0 "Verpflichtung zur Unterstützung der NATO-Erweiterung, um Aggressionen abzuschrecken, Stabilität zu fördern und die kollektive Verteidigung in Europa zu stärken."
MD_TRUMP_USA_empower_nato:0 "Stärkung der NATO"
MD_TRUMP_USA_empower_nato_desc:0 "Engagement für die Modernisierung der Fähigkeiten der NATO und die Erhöhung der Reaktionsbereitschaft auf Bedrohungen mit erheblicher finanzieller Unterstützung der Vereinigten Staaten."
MD_TRUMP_USA_expand_our_air_presence:0 "Erweitern Sie unsere Luftpräsenz"
MD_TRUMP_USA_expand_our_air_presence_desc:0 "Ziel ist es, die Luftpräsenz der Vereinigten Staaten weltweit zu erhöhen und die Luftwaffe und die strategischen Mittel zu stärken."
MD_TRUMP_USA_expand_our_troop_presence:0 "Unsere Truppenpräsenz erweitern"
MD_TRUMP_USA_expand_our_troop_presence_desc:0 "Initiative zur Ausweitung der Truppenpräsenz der Vereinigten Staaten weltweit, einschließlich der Entsendung weiterer Truppen, der Errichtung neuer Stützpunkte und der Intensivierung der Zusammenarbeit mit Verbündeten."
MD_TRUMP_USA_declaration_of_war:0 "Kriegserklärung"
MD_TRUMP_USA_declaration_of_war_desc:0 "Kontingente Verpflichtung, nach einem gründlichen Bewertungs- und Konsultationsprozess die Erklärung eines Krieges als Reaktion auf Bedrohungen der nationalen Sicherheit oder der Sicherheit von Verbündeten in Erwägung zu ziehen."
MD_TRUMP_USA_aim_for_the_president:0 "Ziel für den Präsidenten"
MD_TRUMP_USA_aim_for_the_president_desc:0 "Mehrdeutige Aussage, die die Absicht zum Ausdruck bringt, den Präsidenten ins Visier zu nehmen oder auf ihn abzuzielen, ohne dass konkrete Einzelheiten oder ein Kontext angegeben werden."
MD_TRUMP_USA_force_members_to_pay_their_fair_share:0 "Zwingen Sie die Mitglieder, ihren gerechten Anteil zu zahlen"
MD_TRUMP_USA_force_members_to_pay_their_fair_share_desc:0 "Absicht, Druck auf Verbündete auszuüben, damit diese ihren gerechten Anteil zu den gemeinsamen Verteidigungsanstrengungen beitragen, möglicherweise durch Neuverhandlung finanzieller Vereinbarungen oder durch die Ausübung diplomatischen Einflusses."
MD_TRUMP_USA_review_our_options:0 "Prüfen Sie unsere Optionen"
MD_TRUMP_USA_review_our_options_desc:0 "Verpflichtung zur Durchführung einer umfassenden Überprüfung der verfügbaren Optionen zur Bewältigung spezifischer Herausforderungen unter Berücksichtigung diplomatischer, wirtschaftlicher und militärischer Strategien."
MD_TRUMP_USA_send_the_invitations:0 "Senden Sie die Einladungen"
MD_TRUMP_USA_send_the_invitations_desc:0 "Planen Sie, Einladungen an bestimmte Länder, Organisationen oder Einzelpersonen zu verschiedenen Zwecken zu verschicken, darunter diplomatische Verhandlungen und Kooperationsinitiativen."
MD_TRUMP_USA_brazils_special_status:0 "Brasiliens Sonderstatus"
MD_TRUMP_USA_brazils_special_status_desc:0 "Anerkennung der strategischen Bedeutung Brasiliens mit Schwerpunkt auf der Vertiefung der diplomatischen Beziehungen, der Stärkung der Wirtschaftsbeziehungen und der Verbesserung der Zusammenarbeit in den Bereichen Sicherheit, Handel und regionale Stabilität."
MD_TRUMP_USA_increase_military_presence_in_nato:0 "Erhöhen Sie die militärische Präsenz in der NATO"
MD_TRUMP_USA_increase_military_presence_in_nato_desc:0 "Ziel ist es, die militärische Präsenz der Vereinigten Staaten innerhalb der NATO zu verstärken und so ihr Engagement für die kollektive Verteidigung und die allgemeinen Fähigkeiten des Bündnisses zu demonstrieren."
MD_TRUMP_USA_aid_israel:0 "Hilfe für Israel"
MD_TRUMP_USA_aid_israel_desc:0 "Absicht, Israel in verschiedenen Formen Hilfe, Unterstützung oder Hilfe zukommen zu lassen, darunter militärische, diplomatische, wirtschaftliche und gemeinsame Anstrengungen."
MD_TRUMP_USA_a_wall_for_israel:0 "Eine Mauer für Israel"
MD_TRUMP_USA_a_wall_for_israel_desc:0 "Erklärung der Absicht, eine Mauer für Israel zu bauen, ohne konkrete Einzelheiten oder Kontext."
MD_TRUMP_USA_a_clear_message:0 "Eine klare Botschaft"
MD_TRUMP_USA_a_clear_message_desc:0 "Verpflichtung, der internationalen Gemeinschaft oder bestimmten Akteuren eine klare und eindeutige Botschaft zu übermitteln, ohne den Inhalt oder Kontext der Botschaft zu spezifizieren."
MD_TRUMP_USA_expand_our_intelligence:0 "Erweitern Sie unsere Intelligenz"
MD_TRUMP_USA_expand_our_intelligence_desc:0 "Ziel ist die Verbesserung der nachrichtendienstlichen Fähigkeiten und Ressourcen der Vereinigten Staaten, was den Ausbau der Behörden, Investitionen in fortschrittliche Technologien und eine verstärkte Zusammenarbeit mit anderen Nationen einschließt."
MD_TRUMP_USA_a_clear_stance_on_foreign_affairs:0 "Eine klare Haltung in der Außenpolitik"
MD_TRUMP_USA_a_clear_stance_on_foreign_affairs_desc:0 "Absicht, eine kohärente und konsistente Position in der Außenpolitik zu etablieren und dabei Grundsätze, Prioritäten und Ziele im Umgang mit anderen Ländern und globalen Herausforderungen zu formulieren."
MD_TRUMP_USA_look_to_the_middle_east:0 "Blick in den Nahen Osten"
MD_TRUMP_USA_look_to_the_middle_east_desc:0 "Absicht, Aufmerksamkeit, Ressourcen und diplomatische Bemühungen auf die Region des Nahen Ostens zu konzentrieren, ohne dass konkrete Einzelheiten genannt würden."
MD_TRUMP_USA_nato_against_china:0 "Die NATO gegen China"
MD_TRUMP_USA_nato_against_china_desc:0 "Bemühungen zur Förderung eines kollektiven Ansatzes innerhalb der NATO zur Bewältigung der Herausforderungen durch China, wobei der Schwerpunkt auf der Koordinierung zwischen den Mitgliedsländern für eine einheitliche Reaktion liegt."
MD_TRUMP_USA_israel_our_greatest_ally:0 "Israel, unser größter Verbündeter"
MD_TRUMP_USA_israel_our_greatest_ally_desc:0 "Erklärung Israels zum größten Verbündeten der Vereinigten Staaten, in der die Bedeutung der bilateralen Beziehungen und der Zusammenarbeit in verschiedenen Bereichen hervorgehoben wird."
MD_TRUMP_USA_send_our_demands:0 "Schlagt die Terroristen!"
MD_TRUMP_USA_send_our_demands_desc:0 "Absicht, anderen Ländern, internationalen Organisationen oder Interessengruppen spezifische Forderungen oder Erwartungen mitzuteilen, insbesondere im Zusammenhang mit der Terrorismusbekämpfung."
MD_TRUMP_USA_begin_tariffs:0 "Tarife starten"
MD_TRUMP_USA_begin_tariffs_desc:0 "Absicht, im Rahmen der Handelspolitik der Vereinigten Staaten Zölle auf bestimmte Waren oder Produkte einzuführen oder zu erheben, um möglicherweise wirtschaftliche Ungleichgewichte oder Handelsdefizite zu beheben oder einen fairen Wettbewerb zu fördern."
MD_TRUMP_USA_stop_election_fraud:0 "Stoppen Sie Wahlbetrug"
MD_TRUMP_USA_stop_election_fraud_desc:0 "Ziel ist es, Vorwürfe oder Fälle von Wahlbetrug zu verhindern, zu untersuchen und zu behandeln, wobei die Bedeutung der Integrität und Sicherheit der Wahlen hervorgehoben wird."
MD_TRUMP_USA_put_down_political_opponents:0 "Unterdrückung der Opposition"
MD_TRUMP_USA_put_down_political_opponents_desc:0 "Im Bemühen, unsere Macht zu festigen, werden wir entschlossene Maßnahmen ergreifen, um jede politische Opposition zu unterdrücken, die die Stabilität unseres Regimes bedroht."

MD_TRUMP_USA_partisan_politics:0 "Parteipolitik annehmen"
MD_TRUMP_USA_partisan_politics_desc:0 "Unsere Regierung wird sich voll und ganz der Parteipolitik widmen und sich strategisch an den Interessen und der Agenda unserer Partei ausrichten. Dazu gehört die Übernahme von Positionen, Strategien und Rhetorik, die bei unserer Basis Anklang finden und den Einfluss unserer Partei sichern."

MD_TRUMP_USA_hold_the_line:0 "Sichern Sie die Grenzen"
MD_TRUMP_USA_hold_the_line_desc:0 "Um unsere Grenzen zu sichern, werden wir uns auf die Verstärkung unserer Grenzen und die Umsetzung von Maßnahmen zur Lösung dringender nationaler Probleme konzentrieren und uns die Unterstützung sichern, die für einen entscheidenden Sieg erforderlich ist."
MD_TRUMP_USA_afganastan_war:0 "Afghanistankrieg"
MD_TRUMP_USA_afganastan_war_desc:0 "Der Afghanistankrieg ist ein andauernder Krieg in Afghanistan, der 2001 nach den Anschlägen vom 11. September begann. Die USA und ihre Verbündeten marschierten in Afghanistan ein, um das Taliban-Regime zu stürzen, das der für die Anschläge verantwortlichen Terrorgruppe Al-Kaida Unterschlupf gewährte. Der Krieg ist seitdem in eine Pattsituation geraten, da die Taliban weiterhin weite Teile des Landes kontrollieren."
MD_TRUMP_USA_declartion_of_war_desc:0"Genug ist genug, wir werden den Krieg erklären und diesen Konflikt ein für alle Mal beenden"
MD_TRUMP_USA_declartion_of_war:0 "Kriegserklärung"
MD_TRUMP_USA_blame_china:0 "China zur Verantwortung ziehen"
MD_TRUMP_USA_blame_china_desc:0 "Die Vereinigten Staaten wollen China für verschiedene Handlungen, politische Maßnahmen oder vermeintliches Fehlverhalten zur Verantwortung ziehen. Dabei wird China die Schuld für Probleme wie wirtschaftliche Ungleichgewichte, Diebstahl geistigen Eigentums, Menschenrechtsverletzungen oder geopolitische Spannungen zugeschrieben."
MD_TRUMP_USA_begin_tarrifs:0 "Tarife beginnen"
MD_TRUMP_USA_begin_tarrifs_desc:0 "Die Vereinigten Staaten beabsichtigen im Rahmen ihrer Handelspolitik, Zölle auf bestimmte Waren oder Produkte einzuführen oder zu erheben. Zölle sind Steuern oder Abgaben auf Importe, die in der Regel dem Schutz der heimischen Industrie, dem Ausgleich von Handelsungleichgewichten oder der Förderung eines fairen Wettbewerbs dienen."
MD_TRUMP_USA_aid_isreal:0 "Hilfe für Israel"
MD_TRUMP_USA_aid_isreal_desc:0 "Die Vereinigten Staaten beabsichtigen, Israel in unterschiedlicher Form Hilfe, Unterstützung oder Hilfe zukommen zu lassen. Dazu könnten militärische Hilfe, diplomatische Unterstützung, wirtschaftliche Hilfe oder die Zusammenarbeit in Bereichen wie dem Austausch geheimdienstlicher Erkenntnisse, Technologie und regionaler Sicherheit gehören."
MD_TRUMP_USA_trump_trade_deals:0 "Verhandeln Sie Trumps Handelsabkommen"
MD_TRUMP_USA_trump_trade_deals_desc:0 "Unter Präsident Trumps Führung versuchen die Vereinigten Staaten, Handelsabkommen auszuhandeln, abzuschließen oder zu ändern. Ziel dieser Abkommen ist es, günstige Konditionen zu sichern, amerikanische Industrien und Arbeitsplätze zu fördern und Ungleichgewichte oder unfaire Praktiken im internationalen Handel zu beseitigen."
MD_TRUMP_USA_a_wall_for_isreal:0 "Eine Mauer für Israel"
MD_TRUMP_USA_a_wall_for_isreal_desc:0 "Erklärung der Absicht, eine Mauer für Israel zu bauen, ohne konkrete Einzelheiten oder Kontext."
MD_TRUMP_USA_trump_radio:0 "Trump Radio gründen"
MD_TRUMP_USA_trump_radio_desc:0 "Wir werden die Einrichtung eines Trump-Radiosenders in die Wege leiten, um Propaganda wirksam zu verbreiten, die öffentliche Meinung zu beeinflussen und die Darstellung unserer Regierung zu fördern."
MD_TRUMP_USA_isreal_our_greatist_ally:0 "Israel, unser größter Verbündeter"
MD_TRUMP_USA_isreal_our_greatist_ally_desc:0 "Die Vereinigten Staaten betrachten Israel als ihren wichtigsten Verbündeten und legen großen Wert auf die bilateralen Beziehungen. Dies könnte eine Vertiefung der Zusammenarbeit in verschiedenen Bereichen wie Verteidigung, Geheimdienst, Technologie, Handel und Diplomatie beinhalten, um die Partnerschaft zu stärken und gemeinsame Interessen zu fördern."
MD_TRUMP_USA_ignore_the_polls:0 "Ignorieren Sie die öffentliche Meinung"
MD_TRUMP_USA_ignore_the_polls_desc:0 "Die Vereinigten Staaten werden die Bedeutung von Meinungsumfragen für Entscheidungsprozesse, Politikgestaltung und Wahlkämpfe bewusst herunterspielen. Wir werden uns auf interne Einschätzungen, Expertenmeinungen und konkrete Prioritäten konzentrieren und nicht auf die in Umfragen gemessene öffentliche Stimmung."

 WHILE_FOCUSING:0 "Wenn Sie sich darauf konzentrieren, treten die folgenden Effekte auf:\n$EFF$"
 generic_focus:0 "Nationaler Fokus"
 army_effort:0 "Armeeeinsatz"
 army_effort_desc:0 "Trotz der zunehmenden Möglichkeiten der Luft- und Seekriegsführung bleibt der Bodenkampf auch in den Kriegen von morgen von zentraler Bedeutung. Mit entsprechender Vorbereitung können wir die Hölle der Schützengräben vermeiden."
 equipment_effort:0 "Geräteaufwand"
 equipment_effort_desc:0 "Die Grenzen der Ausrüstung, die von Infanterie getragen werden kann, werden ständig erweitert. Wir werden uns darauf konzentrieren, unseren Truppen die beste verfügbare Ausrüstung zur Verfügung zu stellen."
 motorization_effort:0 "Motorisierungsbemühungen"
 motorization_effort_desc:0 "Mobilität und Schutz sind entscheidend für den sicheren Transport der Infanterie ins Feld und wieder hinaus. Wenn wir uns auf diese Entwicklungen konzentrieren, können wir schnell handeln."
 doctrine_effort:0 "Lehrbemühungen"
 doctrine_effort_desc:0 "Die militärischen Doktrinen, die den Bodenkampf im Ersten Weltkrieg bestimmten, sind überholt. Wir müssen unsere besten Köpfe mit der Aufgabe betrauen, das militärische Denken von morgen zu gestalten."
 equipment_effort_2:0 "Ausrüstungsaufwand II"
 equipment_effort_2_desc:0 "Wir werden unsere Bemühungen fortsetzen, sicherzustellen, dass unsere Infanterie- und Unterstützungstruppen mit der bestmöglichen Ausrüstung unserer Zeit ausgestattet sind."
 mechanization_effort:0 "Mechanisierungsbemühungen"
 mechanization_effort_desc:0 "Indem wir die Möglichkeiten der motorisierten Infanterie überdenken, können wir die Grenzen der heute konstruierbaren Fahrzeuge erweitern."
 doctrine_effort_2:0 "Lehrbemühung II"
 doctrine_effort_2_desc:0 "Das Schlachtfeld hat sich nicht nur in der Zwischenkriegszeit, sondern auch im Verlauf der jüngsten Konflikte verändert. Wir müssen unsere Doktrinen kontinuierlich neu bewerten, um dies widerzuspiegeln."
 equipment_effort_3:0 "Ausrüstungsaufwand III"
 equipment_effort_3_desc:0 "Anstatt ausländische Ausrüstung zu imitieren oder zu kaufen, sollten wir darauf abzielen, weltweit führend im Bereich Infanteriewaffen zu werden."
 armor_effort:0 "Rüstungsaufwand"
 armor_effort_desc:0 "Indem wir das anwenden, was wir bei der Mechanisierung unserer Infanterie gelernt haben, können wir auch unsere gepanzerten Fahrzeuge verbessern."
 special_forces:0 "Spezialeinheiten"
 special_forces_desc:0 "Wir brauchen Elitetruppen; Gebirgsjäger und Fallschirmjäger sollten unsere Priorität sein."
 aviation_effort:0 "Luftfahrtbemühungen"
 aviation_effort_tt:0 "Nicht genügend Bauplätze für §YAir Base§!"
 aviation_effort_desc:0 "Nirgendwo schreitet der technologische Fortschritt schneller voran als in der Luftkriegsführung. Die Luftfahrt ist ein Gebiet, das jede moderne Nation beherrschen muss."
 fighter_focus:0 "Kämpferfokus"
 fighter_focus_desc:0 "Luftkämpfe haben im Ersten Weltkrieg noch nicht ihr letztes Ende gefunden. Wenn wir bei der Entwicklung von Kampfflugzeugen die Nase vorn haben, werden wir auch in Zukunft einen Vorteil haben."
 bomber_focus:0 "Bomberfokus"
 bomber_focus_desc:0 "Wenn die Menschen in Zukunft vom Schrecken der heutigen Kriege sprechen, wird Feuer, das vom Himmel regnet, eine zentrale Rolle spielen. Wir werden unser Bestes tun, um sicherzustellen, dass diese Geschichten auch von unseren Feinden erzählt werden."
 aviation_effort_2:0 "Luftfahrtbemühungen II"
 aviation_effort_2_desc:0 "Um unsere Luftwaffe gut in andere Zweige des Militärs zu integrieren, sind weitere Fortschritte in der Luftfahrt erforderlich."
 CAS_effort:0 "CAS-Aufwand"
 CAS_effort_desc:0 "Eine moderne Armee benötigt nicht nur am Boden, sondern auch in der Luft die Unterstützung durch Fahrzeuge."
 rocket_effort:0 "Raketenanstrengung"
 rocket_effort_desc:0 "Raketen- und Düsentriebwerke ermöglichen sowohl unbemannten als auch bemannten Schiffen beispiellose Geschwindigkeiten. Die Entwicklung dieser Technologien wird es uns ermöglichen, den Feind zu überraschen."
 NAV_effort:0 "NAV-Aufwand"
 NAV_effort_desc:0 "So wie die neue Seekriegsführung teilweise unter der Wasseroberfläche stattfindet, findet ein Teil davon in der Luft über dem Wasser statt."
 naval_effort:0 "Marinebemühungen"
 naval_effort_tt:0 "Nicht genügend Bauplätze für §YNaval Dockyards§!"
 naval_effort_desc:0 "Der Ausbau unserer Marine sollte unsere oberste Priorität sein. Alle verfügbaren Ressourcen sollten für neue Werften und die Erforschung leichter Überwasserschiffe eingesetzt werden."
 GER_naval_effort2:0 "Erweiterung der Werftanlagen"
 GER_naval_effort2_desc:0 "Um wirklich eine bemerkenswerte Marine wieder aufzubauen, müssen wir unsere Schiffsbaukapazitäten erheblich erweitern."
 flexible_navy:0 "Flexibles Marineblau"
 flexible_navy_desc:0 "Durch die Neugestaltung der Seekriegsführung unter Berücksichtigung der Fortschritte in der U-Boot-Technologie können wir feindliche Konvois effizient bekämpfen."
 large_navy:0 "Große Marine"
 large_navy_desc:0 "Die Anpassung unserer Marinedoktrinen an große Schiffe und die Gewährleistung der Sicherheit unserer Handelskonvois wird uns viel darüber beibringen, welche Art von Schiffen wir benötigen."
 submarine_effort:0 "U-Boot-Anstrengungen"
 submarine_effort_desc:0 "Der U-Boot-Krieg ist die spannendste Entwicklung in der Marine seit der Erfindung des Torpedoboots. Wir tun gut daran, uns nicht nur vor U-Booten zu schützen, sondern sie auch gegen feindliche Schiffe einzusetzen."
 cruiser_effort:0 "Kreuzeraufwand"
 cruiser_effort_desc:0 "Bevor wir uns auf die Erforschung fortgeschrittener Schlachtschiffe konzentrieren können, müssen die kleineren Kreuzer ersetzt werden."
 destroyer_effort:0 "Zerstörer-Anstrengung"
 destroyer_effort_desc:0 "Durch die Untersuchung der Konstruktion und des strategischen Einsatzes von U-Booten haben wir auch gelernt, wie wir diesen Strategien entgegenwirken können. Zerstörer werden dabei eine entscheidende Rolle spielen."
 capital_ships_effort:0 "Großkampfschiff-Anstrengung"
 capital_ships_effort_desc:0 "Die Nation mit den meisten Schlachtschiffen wird die Weltmeere beherrschen. Schlachtschiffe und Flugzeugträger repräsentieren die alte und die neue Seeüberlegenheit."
 industrial_effort:0 "Industrielle Anstrengungen"
 industrial_effort_desc:0 "Konzentrieren Sie alle unsere politischen Anstrengungen darauf, die zivile Industrie mit einem großen Sprung nach vorne aufzubauen."
 industrial_effort_2:0 "Industrielle Anstrengung II"
 industrial_effort_2_desc:0 "Mit eisernem Willen und einer unermüdlichen Arbeitsmoral können wir die Menschen zu einer weiteren großen industriellen Anstrengung mobilisieren."
 construction_effort:0 "Bauaufwand"
 construction_effort_tt:0 "Nicht genügend Bauplätze für §YCivilian Factories§!"
 construction_effort_desc:0 "Auch wenn weltweit ein Krieg droht, darf die zivile Industriekapazität nicht unterschätzt werden."
 production_effort:0 "Rüstungsanstrengungen"
 production_effort_tt:0 "Nicht genügend Bauplätze für §YMilitärfabrik§!"
 production_effort_desc:0 "Wer Traktoren bauen kann, kann auch Panzer bauen! Wir dürfen nicht zulassen, dass unsere militärische Produktionskapazität zurückbleibt."
 construction_effort_2:0 "Baumaßnahme II"
 construction_effort_2_desc:0 "Durch den weiteren Ausbau unserer Fabriken können wir die Produktion von Waren für den Handel und weitere Bauvorhaben beschleunigen."
 production_effort_2:0 "Rüstungsanstrengung II"
 production_effort_2_desc:0 "Der Versuch, zivile Fabriken für die Produktion militärischer Ausrüstung umzurüsten, ist ineffizient. Wir sollten uns jetzt auf die Vorbereitung der Rüstungsproduktion konzentrieren."
 production_effort_3:0 "Rüstungsanstrengung III"
 production_effort_3_desc:0 "Um den Bedarf an neuer Ausrüstung zu decken, sind kontinuierliche Anstrengungen zum Ausbau unserer Militärfabriken erforderlich."
 infrastructure_effort:0 "Infrastrukturaufwand"
 infrastructure_effort_desc:0 "Ein Land ohne angemessene Infrastruktur kann keine fortschrittlichen Projekte oder Bauvorhaben durchführen."
 infrastructure_effort_tt:0 "Nicht genügend Bauplätze für §YInfrastruktur§!"
 synth_oil_effort_tt:0 "Nicht genügend Bauplätze für §YSynthetische Raffinerie§!"
 infrastructure_effort_2:0 "Infrastrukturbemühungen II"
 infrastructure_effort_2_desc:0 "Der weitere Ausbau unserer Infrastruktur wird die für geheime Hightech-Projekte notwendigen Transport- und Kommunikationsmittel ermöglichen."
 construction_effort_3:0 "Baumaßnahme III"
 construction_effort_3_desc:0 "Durch den Ausbau unseres Infrastrukturnetzes haben wir unsere Baukapazitäten deutlich verbessert."
 nuclear_effort:0 "Nukleare Anstrengungen"
 nuclear_effort_desc:0 "Wir stehen am Rande einer weltverändernden Entdeckung und können nicht zulassen, dass andere das Feuer entfachen, das eines Tages die Erde verzehren könnte."
 extra_tech_slot:0 "Zusätzlicher Forschungsplatz"
 extra_tech_slot_desc:0 "Unsere industrielle Expansion und andere aktuelle Fortschritte könnten es uns ermöglichen, parallel mehr Forschung und Entwicklung durchzuführen."
 extra_tech_slot_2:0 "Zusätzlicher Forschungsplatz II"
 extra_tech_slot_2_desc:0 "Die schnelle Industrialisierung unseres Landes hat neue Möglichkeiten in Forschung und Entwicklung eröffnet, die wir nutzen sollten."
 technology_sharing:0 "Technologieaustausch"
 technology_sharing_desc:0 "Indem wir technologische Fortschritte mit unseren Verbündeten teilen, kann unsere gesamte Fraktion die Forschung und Entwicklung im Kriegsfall effizienter durchführen."
 secret_weapons:0 "Geheimwaffen"
 secret_weapons_desc:0 "Es ist verlockend, alle zusätzlichen Ressourcen in die Entwicklung von Panzern und Flugzeugen zu stecken, aber das Geheimnis, Kriege zu gewinnen, liegt in ganz neuen Wissenschaftsbereichen: Elektronik, Raketentechnik und Nuklearforschung."
 political_effort:0 "Politische Bemühungen"
 political_effort_desc:0 "Um Veränderungen in der Welt herbeizuführen, müssen wir in der Lage sein, Veränderungen in unserem eigenen Land herbeizuführen. Die Stärkung unserer politischen Position sollte dabei an erster Stelle stehen."
 collectivist_ethos:0 "Kollektivistisches Ethos"
 collectivist_ethos_desc:0 "Unsere Feinde mögen kleinere Nationen spalten und erobern, aber unser Volk wird vereint bleiben. Einer für alle, alle für einen."
 liberty_ethos:0 "Freiheitsethos"
 liberty_ethos_desc:0 "In dieser Zeit ideologischer Fanatiker, die den menschlichen Geist ersticken wollen, werden wir die individuellen Freiheiten und die Unabhängigkeit schützen."
 militarism:0 "Militarismus"
 militarism_desc:0 "Wer das Militär als notwendiges Übel betrachtet, ist dazu verdammt, angesichts des Krieges zu zögern. Wir werden den Militarismus in unsere Kultur einprägen, um ein Volk von Soldaten zu werden."
 political_correctness:0 "Politische Korrektheit"
 political_correctness_desc:0 "Menschen mit leicht kontroversen oder anderweitig peinlichen Ansichten scheinen sich Sorgen zu machen, dass es eine weitreichende Verschwörung gegen sie gibt. Das scheint eine hervorragende Idee zu sein."
 neutrality_focus:0 "Neutralitätsfokus"
 neutrality_focus_desc:0 "Während andere behaupten, dass es Mut und Weisheit erfordert, in einem globalen Konflikt Partei zu ergreifen, wissen wir, dass es mehr erfordert, sich zu weigern."
 interventionism_focus:0 "Interventionismus-Fokus"
 interventionism_focus_desc:0 "Wir schätzen die Freiheit aller Menschen, nicht nur unserer eigenen Bürger. Wenn die Verhinderung von Tyrannei Krieg bedeutet, dann ist das so."
 military_youth:0 "Militärjugend"
 military_youth_desc:0 "Organisationen zur Förderung der Disziplin und politischen Bildung junger Menschen in unserem Land werden frühzeitig Loyalität und Selbstaufopferung fördern."
 deterrence:0 "Abschreckung"
 deterrence_desc:0 "Wenn wir allein dastehen, profitieren wir selten vom Krieg. Glücklicherweise wissen wir, dass die beste Verteidigung eine ist, die so bekannt ist, dass man sie nie anwenden muss."
 volunteer_corps:0 "Freiwilligenkorps"
 volunteer_corps_desc:0 "Unser Volk zu zwingen, für die Ideale der Freiheit zu sterben, wäre eine Ironie des Schicksals. Doch die Schaffung von Mitteln für diejenigen, die Menschen im Ausland helfen möchten, ist es nicht."
 paramilitarism:0 "Paramilitarismus"
 paramilitarism_desc:0 "Militärische Prinzipien finden auch außerhalb des Militärs Anwendung. Mit der Entwicklung halbmilitarisierter Einheiten zur Ergänzung unserer Streitkräfte werden mehr Menschen eine militärische Ausbildung erhalten."
 indoctrination_focus:0 "Indoktrination"
 indoctrination_focus_desc:0 "Nachdem wir unsere Ideologie als wahrheitsgetreu etabliert haben, kann sie auch als Wahrheit gelehrt werden. Bildung und Medien müssen diese Lehre widerspiegeln."
 foreign_expeditions:0 "Auslandsexpeditionen"
 foreign_expeditions_desc:0 "Da unsere Feinde bereit sind, im Namen ihrer Ideale in weit entfernte Konflikte einzugreifen, müssen wir bereit sein, dasselbe für unsere zu tun."
 why_we_fight:0 "Warum wir kämpfen"
 why_we_fight_effect:0 "Wenn wir nicht den Geist einer „Neutralen Außenpolitik“ haben, werden wir in der Lage sein, Fraktionen zu bilden.\n"
 why_we_fight_desc:0 "Die Welt wird immer unsicherer. Unsere Bevölkerung muss die Gräueltaten der Machtgierigen sehen. Es ist Zeit, die Bevölkerung für unsere Sache zu gewinnen und sicherzustellen, dass alle bereit sind, für unsere Freiheit zu kämpfen."
 political_commissars:0 "Politische Kommissare"
 political_commissars_desc:0 "Um sicherzustellen, dass unsere Richtlinien in der militärischen Praxis befolgt werden, werden wir politisch ernannte Beamte in die militärischen Ränge aufnehmen."
 internationalism_focus:0 "Internationalismus-Fokus"
 internationalism_focus_desc:0 "Ideologie kennt keine Grenzen. Eine andere Nation mag sich als souverän bezeichnen, doch unsere Überzeugungen stehen über solchen Ansprüchen."
 nationalism_focus:0 "Fokus auf Nationalismus"
 nationalism_focus_desc:0 "Unsere Nation ist einzigartig und unsere politischen Errungenschaften konnten nur hier erzielt werden. Dafür müssen wir um jeden Preis kämpfen."
 ideological_fanaticism:0 "Ideologischer Fanatismus"
 ideological_fanaticism_desc:0 "Unsere politisch etablierten Werte und Ziele sind es wert, für sie zu sterben, genauso wie für jeden alten Glauben. Jeder Anhänger sollte darauf vorbereitet sein, dem Tod ins Auge zu sehen, und diejenigen, die vom Glauben abirren, sollten besser darauf vorbereitet sein, dem Tod ins Auge zu sehen."
 air_innovation:0 "Luftinnovationen"
 air_innovation_desc:0 "Moderne Kriege können nicht gewonnen werden, ohne den Himmel zu beherrschen. Wir müssen alles in unserer Macht Stehende tun, um die Luftwaffe auszubauen!"
 air_innovation_2:0 "Luftinnovationen II"
 air_innovation_2_desc:0 "Jeder Vorteil, den wir in der Luft erlangen können, ist wertvoll. Wir sollten all unsere Anstrengungen auf die Entwicklung unserer Kampfflugzeuge konzentrieren."
 naval_air_effort:0 "Luftangriffe der Marine"
 naval_air_effort_desc:0 "Die Wirksamkeit von Luftangriffen auf Seeziele wurde von den Amerikanern bereits 1921 demonstriert. Wir sollten diesen Zweig der Luftwaffe nicht vernachlässigen, wenn wir Krieg gegen eine Seemacht führen wollen."
 german_focus:0 "Deutscher nationaler Fokus"
 GER_autobahn:0 "Reichsautobahn"
 GER_autobahn_tt:0 "Maximale §YInfrastruktur§! in §YBrandenburg§!, §YHannover§!, §YThüringen§! und §YFranken§! hinzufügen"
 GER_autobahn_desc:1 "Seit seiner Gründung 1933 war das Reichsautobahnprojekt ein voller Erfolg. Die Baumaßnahmen haben die Arbeitslosigkeit gesenkt, und die breiten Straßen gelten als Symbol für Deutschlands wirtschaftliche Erholung. Es bleibt jedoch noch viel zu tun."
 GER_west_wall:0 "Westwall"
 GER_west_wall_desc:0 "Der Westwall verläuft parallel zur berühmten Maginot-Linie Frankreichs und nimmt weitgehend dasselbe Gebiet ein wie der Westwall im letzten Weltkrieg. Durch die Verstärkung seiner Verteidigungsanlagen können wir die Grenze mit weniger Mann halten und so Divisionen für mögliche Feldzüge im Osten freisetzen."
 GER_west_wall_tt:0 "§RIm Falle einer Remilitarisierung des Rheinlandes erhalten Sie außerdem:§!\n"
 GER_west_wall_forts:0 "Fügen Sie §Y12 Landfestungen§! an der französischen Grenze hinzu.\n"
 GER_tactical_air_effort:0 "Taktische Luftangriffe"
 GER_tactical_air_effort_desc:0 "Der Sieg wird durch die Vernichtung der feindlichen Bodentruppen errungen. Wir müssen uns darauf konzentrieren, unsere eigenen Armeen mit taktischen Schlägen gegen nahe und tief gelegene Ziele zu unterstützen."
 GER_long_range_escorts:0 "Langstrecken-Eskorten"
 GER_long_range_escorts_desc:0 "Unsere taktischen und strategischen Bomber benötigen Eskorten mit größerer Reichweite, um ihnen auf dem gesamten Weg zum Zielgebiet und zurück Schutz zu bieten."
 GER_strategic_air_effort:0 "Strategische Luftangriffe"
 GER_strategic_air_effort_desc:0 "Der Sieg wird durch die Zerstörung der feindlichen Industrien errungen. Wir müssen unsere Anstrengungen auf die Entwicklung und Produktion strategischer Bomber konzentrieren."
 GER_army_innovation:0 "Armeeinnovationen"
 GER_army_innovation_desc:1 "Heinz Guderian und andere radikale Theoretiker drängen auf mutige neue Doktrinen, die Kommunikation, die Identifizierung von Schwerpunkten und die lokale Konzentration vereinter Streitkräfte betonen. Ihnen freie Hand zu lassen, könnte helfen, die Schrecken des Fleischwolfs des Ersten Weltkriegs zu vermeiden."
 GER_soviet_treaty:0 "Vertrag mit der UdSSR"
 GER_soviet_treaty_desc:0 "Wir können einen neuen Forschungsvertrag mit der Sowjetunion abschließen, um vor allem bessere Panzer zu entwickeln. Wenn sie einverstanden sind, können wir die Panzerschule in Kama wiedereröffnen, die wir 1933 geschlossen haben. Die sowjetische Zusammenarbeit bedeutet natürlich, dass auch sie von den Innovationen profitieren wird …"
 GER_air_innovation_2:0 "Luftinnovationen II"
 GER_air_innovation_2_desc:0 "Die Aufgaben des Reichsluftfahrtministeriums sind von höchster Bedeutung. Die Luftwaffe muss die modernste Luftwaffe der Welt sein!"
 GER_army_innovation_2:0 "Armeeinnovationen II"
 GER_army_innovation_2_desc:0 "Die Erfahrungen aus unseren Einrichtungen in der UdSSR werden es uns ermöglichen, unsere Doktrin und Ausrüstung weiter zu verbessern. Dieses Mal werden wir die Fortschritte jedoch für uns behalten!"
 GER_rocketry_focus:0 "Raketentechnik"
 GER_rocketry_focus_desc:0 "Der Raketenantrieb ist der Schlüssel zu massiven Innovationen in allen drei Militärzweigen."
 GER_wunderwaffe:0 "Wunderwaffe"
 GER_wunderwaffe_desc:0 "Heisenberg und von Braun können es kaum erwarten, ihre Ideen für Weltuntergangswaffen zu erforschen. Alles, was sie brauchen, sind zusätzliche Ressourcen …"
 GER_mol_rib_pact:0 "Molotow-Ribbentrop-Pakt"
 GER_mol_rib_pact_desc:0 "Ein Freundschafts- und Nichtangriffspakt mit der UdSSR mag zwar den Magen umdrehen, doch er wird dafür sorgen, dass ihr kostbares Öl weiterhin nach Deutschland fließt. Der geheime Zusatz wird die Gebiete Rumäniens, Polens, Litauens, Lettlands, Estlands und Finnlands in deutsche und sowjetische Einflusssphären aufteilen …"
 GER_mol_rib_pact_tt:0 "Schließen Sie einen Nichtangriffspakt mit der Sowjetunion ab und stimmen Sie der Aufteilung Polens zwischen der Sowjetunion und Deutschland zu."
 GER_soviet_ally:0 "Bündnis mit der UdSSR"
 GER_soviet_ally_desc:0 "Vielleicht ist es möglich, unsere ideologischen Differenzen mit den Sowjets beiseite zu legen und stattdessen das zu betonen, was uns verbindet: den Hass auf den egoistischen Liberalismus und den dekadenten Westen. Mit der UdSSR als Verbündetem hätten wir Zugang zu allen Ressourcen, die wir brauchen – natürlich zusätzlich zu ihrer militärischen Macht …"
 GER_turkey_puppet:0 "Puppet Truthahn"
 GER_turkey_puppet_desc:0 "Die Türkei steckt in der Zwickmühle zwischen uns und der Sowjetunion. Unter Druck werden die Türken höchstwahrscheinlich unserem Willen nachgeben und zu einem Marionettenstaat werden. Im Rahmen des Abkommens erhält die UdSSR Gebiete in der Osttürkei. Sollten sie unsere Forderungen jedoch ablehnen, würde dies Krieg bedeuten."
 GER_rhineland:0 "Rheinland"
 GER_rhineland_desc:0 "Das Rheinland ist seit dem Ende des Ersten Weltkriegs entmilitarisiert, doch diese Beleidigung soll nicht länger bestehen! Deutschland ist ein souveräner Staat und kann innerhalb seiner Grenzen Truppen überallhin verlegen!"
 GER_rhineland_ultimatum:0 "§RDie Remilitarisierung kann rückgängig gemacht werden, wenn Sie konfrontiert werden und nachgeben.§!\n"
 GER_japan_friend:0 "Befreunde dich mit Japan"
 GER_japan_friend_desc:0 "Wir pflegen seit langem eine fruchtbare Beziehung zu China, aber unseren Ambitionen wäre es vielleicht besser gedient, wenn wir uns stattdessen an der uns verwandten Kriegerkultur Japans orientieren würden, selbst wenn das bedeutet, China den Wölfen zum Fraß vorzuwerfen …"
 GER_japan_friend_tt:0 "Rückrufe von Falkenhausen.\n"
 GER_china_friend:0 "Befreunde dich mit China"
 GER_china_friend_desc:0 "Lassen Sie uns unsere langjährige Freundschaft mit China vertiefen. Dies würde Japan vor den Kopf stoßen, doch was ist Japan anderes als das Italien des Ostens?"
 GER_anti_comitern_pact:0 "Anti-Komintern-Pakt"
 GER_anti_comitern_pact_desc:0 "Die Einmischung der Kommunistischen Internationale in die inneren Angelegenheiten der Nationen gefährdet nicht nur ihren inneren Frieden und ihr soziales Wohlergehen, sondern stellt auch eine Bedrohung für den Weltfrieden dar! Wir werden viele nichtkommunistische Länder auffordern, den Pakt zu unterzeichnen und dafür sorgen, dass wir die rote Bedrohung in Schach halten."
 GER_anti_soviet_pact:0 "Antisowjetischer Pakt"
 GER_anti_soviet_pact_desc:0 "Wir können den Antikominternpakt noch einen Schritt weiterführen und alle Mitglieder auffordern, sich zu einer Koalition gegen die Sowjetunion zu verpflichten. Sollte ein Unterzeichnerstaat mit der UdSSR in einen Krieg geraten, müssen auch alle anderen Mitglieder den Krieg erklären."
 GER_anti_soviet_pact_tt:0 "§YSendet allen Mitgliedern des Antikominternpakts das Angebot, einem Verteidigungsbündnis gegen die Sowjetunion beizutreten.§!"
 GER_anti_soviet_pact_tt_2:0 "§Y Das Verteidigungsbündnis wird seine Mitglieder zum Krieg aufrufen, wenn eines von ihnen von der Komintern angegriffen wird§!"
 GER_anti_soviet_pact_tt_3:0 "Erlangt Nationalgeist §YAntisowjetischer Pakt§!.\n"
 GER_ussr_war_goal:0 "Krieg mit der UdSSR"
 GER_ussr_war_goal_desc:0 "Wir können unsere Propagandabemühungen darauf konzentrieren, das deutsche Volk – und die Welt – auf einen gerechten Krieg gegen die Sowjetunion vorzubereiten."
 GER_turkey_friend:0 "Befreunde dich mit der Türkei"
 GER_turkey_friend_desc:0 "Atatürks Türkei befindet sich auf einem bewundernswerten Modernisierungskurs und kontrolliert den Zugang zum Schwarzen Meer über den Bosporus und die Dardanellen. Die Türkei in unseren Einflussbereich zu bringen, sollte unsere oberste Priorität sein!"
 GER_anschluss:0 "Anschluss"
 GER_anschluss_desc:0 "Der Anschluss an Österreich ist ein lang gehegter Wunsch des deutschen Volkes. Obwohl der Versailler Vertrag ihn verbot, ist es nun endlich an der Zeit, ihn zu verwirklichen. Geben wir den Österreichern die Chance, unser glorreiches Schicksal zu teilen!"
 anschluss_mefo_bills_tt:0 "Verwendet österreichisches Gold, um die Kosten für §YMEFO-Banknoten§ zu senken!.\n"
 anschluss_mefo_bills_double_reduction:0 "Modifizieren Sie §YMEFO-Rechnungen§! um §G+0,10§! Täglicher politischer Machtgewinn\n"
 GER_demand_memel:0 "Bekräftigung der östlichen Ansprüche"
 GER_demand_memel_desc:0 "Im Ersten Weltkrieg ging mit der Wiederauferstehung Polens und der Übergabe des Memellandes an Litauen ein großer Teil des deutschen Territoriums im Osten verloren. Beiden Nationen wird ein Ultimatum gestellt, doch zumindest Polen wird sich wahrscheinlich nicht bloßen Worten beugen."
 GER_demand_memel_threat:0 "Deutschland bekräftigte seine Ansprüche im Osten"
 GER_danzig_or_war:0 "Danzig oder Krieg"
 GER_danzig_or_war_POL_faction_GER_leader:0 "§R[This.GetName] muss der Vereinbarung zustimmen, damit die Boni wirksam werden. Sie werden [Root.GetFactionName] verlassen, wenn Krieg erklärt wird.§!\n"
 GER_danzig_or_war_POL_faction_GER_noleader:0 "§R[This.GetName] muss der Vereinbarung zustimmen, damit die Boni wirksam werden. Sie verlassen [Root.GetFactionName] die Fraktion, wenn Krieg erklärt wird.§!\n"
 GER_danzig_or_war_desc:0 "Danzig war deutsch, Danzig ist deutsch geblieben und Danzig soll von nun an deutsch sein! Wenn Polen das Gebiet nicht abtritt, müssen wir das deutsche Volk auf den unvermeidlichen Krieg vorbereiten. Danzig und die umliegenden Länder werden an Deutschland zurückgegeben!"
 GER_czech_friend:0 "Befreunde dich mit der Tschechoslowakei"
 GER_czech_friend_desc:0 "Die Tschechen und die Slowaken sind fleißige und bewundernswerte Völker. Es ist bedauerlich, dass unsere territorialen Ambitionen mit ihren kollidieren, aber es ist noch nicht zu spät, Freundschaft statt Unterwerfung anzustreben."
 GER_demand_sudetenland:0 "Nachfrage Sudetenland"
 GER_demand_sudetenland_desc:0 "Das Schicksal der Sudetendeutschen war eines der schlimmsten Ungerechtigkeiten, die der Versailler Vertrag mit sich brachte. Sie müssen unter unseren Schutz gestellt werden, ungeachtet der tschechischen Einwände."
 GER_demand_sudetenland_threat:0 "Deutschland forderte das Sudetenland"
 GER_first_vienna_award:0 "Erster Wiener Preis"
 GER_first_vienna_award_desc:0 "Die Ungarn gehörten zu den Völkern, die nach dem Ersten Weltkrieg am meisten litten. Nach der Zerstörung Österreich-Ungarns strandeten viele Ungarn auf fremdem Boden, obwohl ihre Vorfahren dort seit Jahrhunderten gelebt hatten. Wir könnten unsere Beziehungen zu Ungarn erheblich verbessern, wenn wir ihnen einige Gebiete aus der Tschechoslowakei zusprechen würden."
 GER_end_of_czechoslovakia:0 "Schicksal der Tschechoslowakei"
 GER_end_of_czechoslovakia_desc:0 "Es ist an der Zeit, die alten tschechischen Länder unter denjenigen aufzuteilen, die sie angemessen regieren können. Wir sollten auch die Schaffung eines separaten slowakischen Marionettenstaates im Osten in Erwägung ziehen."
 end_of_czechoslovakia_mefo_bills_tt:0 "Verwendet tschechoslowakisches Gold, um die Kosten von §YMEFO-Banknoten§ zu senken!.\n"
 GER_second_vienna_award:0 "Zweiter Wiener Preis"
 GER_second_vienna_award_desc:0 "Siebenbürgen hat eine ungarische Mehrheit und sollte rechtmäßig unseren Freunden in Ungarn gehören. Es ist jedoch schwer vorherzusagen, wie das rumänische Regime und die Bevölkerung auf diese Forderung reagieren werden."
 GER_italy_ally:0 "Bündnis mit Italien"
 GER_italy_ally_desc:0 "Italiener mögen unzuverlässig sein – wie sie im Ersten Weltkrieg bewiesen haben –, doch Mussolini und seine faschistische Bewegung haben gezeigt, dass es für Italien noch Hoffnung gibt. Deutschland kann doch nur gewinnen, wenn es sich mit Italien verbündet, oder nicht?"
 GER_nationalist_spain_ally:0 "Bündnis mit Spanien"
 GER_nationalist_spain_ally_desc:0 "Der Sieg der Nationalisten im spanischen Bürgerkrieg hat den Weg für eine engere Beziehung zwischen unseren beiden Ländern geebnet. Franco hält den Schlüssel zum Mittelmeer in der Hand."
 GER_nationalist_spain_ally_tt:0 "Stärkt die diplomatischen Beziehungen zum „nationalistischen Spanien“!"
 GER_danzig_vs_slovakia:0 "Danzig für die Slowakei"
 GER_danzig_vs_slovakia_desc:0 "Die Polen stehen unseren Lebensraumplänen im Weg. Dennoch ist es noch nicht zu spät, unsere langfristigen Prioritäten zu ändern und stattdessen ihre Freundschaft zu suchen. Der einzige Weg, dies zu erreichen, ist ein Gebietstausch: Danzig gegen die Slowakei. Polen hat bereits durch die Besetzung von Zaolzie Interesse an der Region gezeigt."
 GER_poland_friend:0 "Befreunde dich mit Polen"
 GER_poland_friend_desc:0 "Obwohl Polen keinen Zugang mehr zum Meer hat, haben wir mit der Übergabe der Slowakei unsere guten Absichten bewiesen. Vielleicht können wir Polen durch vage Versprechungen künftiger Gebietsgewinne im Osten noch näher an uns heranführen."
 GER_war_with_france:0 "Krieg mit Frankreich"
 GER_war_with_france_desc:0 "Nachdem Deutschland eine zufriedenstellende Lösung für die Frage seiner Ostgrenze gefunden hat, ist es nun an der Zeit, unsere Aufmerksamkeit nach Westen zu richten. Der Verlust Elsass-Lothringens ist ein Schandfleck auf der Ehre des deutschen Volkes, und nur durch einen gerechten und rechtmäßigen Krieg können wir dies rächen."
 GER_war_with_france_threat:0 "Ansprüche auf französisches Territorium"
 GER_operation_tannenbaum:0 "Operation Tannenbaum"
 GER_operation_tannenbaum_desc:0 "Die Schweiz hat ein höchst abstoßendes und erbärmliches Volk und politisches System. Jetzt haben wir endlich Zeit, uns um diese Todfeinde des neuen Deutschlands zu kümmern."
 GER_reintegrate_luxemburg_and_alsace_lorraine:0 "Reintegration von Luxemburg und Elsass-Lothringen"
 GER_reintegrate_luxemburg_and_alsace_lorraine_desc:0 "Mit unserer erfolgreichen Rückeroberung historisch deutscher Gebiete können wir nun mit dem Prozess ihrer Wiedereingliederung in die [Root.GetName] beginnen. Ihrer Bevölkerung muss die Möglichkeit gegeben werden, ihre patriotische Pflicht für das Vaterland zu erfüllen."
 GER_naval_rearmament:0 "Wiederbewaffnung der Marine"
 GER_naval_rearmament_desc:0 "Das englisch-deutsche Flottenabkommen von 1935 ermöglicht uns einen erheblichen Ausbau unserer Marine. Wir sollten diesbezüglich keine Mühen scheuen."
 GER_plan_z:0 "Plan Z"
 GER_plan_z_desc:0 "Admiral Raeder glaubt, dass die Briten am besten durch Überwasserangriffe besiegt werden können. Der Bau einer ausreichenden Anzahl von Schlachtschiffen und Flugzeugträgern hierfür wird eine gewaltige Aufgabe sein und Zeit in Anspruch nehmen; vielleicht sogar zu viel Zeit. Andererseits ist unsere derzeitige Überwasserflotte völlig unzureichend."
 GER_u_boat_effort:0 "U-Boot-Einsatz"
 GER_u_boat_effort_desc:0 "Kommodore Dönitz befürwortet die Strategie des uneingeschränkten U-Boot-Krieges als beste Möglichkeit, Großbritannien in die Knie zu zwingen. Mit genügend U-Booten könnten wir der britischen Industrie alle benötigten Ressourcen aus ihrem weit verzweigten Imperium entziehen."
 GER_trade_interdiction:0 "Handelsverbot"
 GER_trade_interdiction_desc:0 "Unsere Werften produzieren ständig U-Boote, aber wir müssen bessere Wege finden, diese „Wolfsrudel“ einzusetzen. Geben Sie den Admiralen alles, was sie für ihre Simulationen und Kriegsspiele brauchen …"
 GER_modular_construction:0 "Modularer Aufbau"
 GER_modular_construction_desc:0 "Da wir Teile unserer U-Boote in verschiedenen Fertigungsanlagen bauen lassen, wird die Montage- und Baugeschwindigkeit erheblich verbessert."
 GER_denmark_friend:0 "Befreunde Dänemark"
 GER_denmark_friend_desc:0 "Die Kanonenbootpolitik ist noch nicht tot. Unsere Pläne zur Marineerweiterung sind unserem kleinen nördlichen Nachbarn wohlbekannt. In Kombination mit seiner Angst vor unseren weit überlegenen Armeen sollte es ein Leichtes sein, ihn in unseren Einflussbereich zu drängen."
 GER_norway_friend:0 "Befreunde dich mit Norwegen"
 GER_norway_friend_desc:0 "Norwegen kontrolliert einen Großteil der Edeleisenexporte aus den riesigen Minen in Nordschweden. Wir sollten sie mit der Drohung unserer expandierenden Marine zu einer „Freundschaft“ zwingen."
 GER_dutch_friend:0 "Befreunde dich mit den Niederlanden"
 GER_dutch_friend_desc:0 "Die Niederländer wissen genau, wie lange sie im Falle eines weiteren Weltkriegs durchhalten werden. Wenn sie davon überzeugt werden können, dass Deutschland eine ernsthafte Bedrohung für Großbritannien darstellt, könnten sie sich möglicherweise für ein Bündnis mit uns entscheiden, um einer harten Besatzung zu entgehen."
 GER_sweden_friend:0 "Befreunde dich mit Schweden"
 GER_sweden_friend_desc:0 "Die skandinavischen Länder sind wie Dominosteine; sie stehen und fallen gemeinsam. Nachdem Norwegen und Dänemark in unseren Einflussbereich geraten sind, wird Schweden mit Sicherheit folgen."
 GER_improve_national_spirit:0 "Stärkung des Nationalgeistes"
 GER_improve_national_spirit_desc:0 "Mit den Hauptstädten der Siegermächte des Ersten Weltkriegs in unseren Händen können wir endlich den Schatten unserer Niederlage abschütteln. Für Deutschland bricht ein neues Zeitalter an!"
 GER_improve_national_spirit_tooltip:0 "Wir oder die Mitglieder unserer Fraktion müssen London und Paris und die Staaten, in denen sie ansässig sind, kontrollieren."
 needs_approval:0 "§R[This.GetName] muss der Vereinbarung zustimmen, damit die Boni wirksam werden.§!\n"
 GER_demand_slovenia:0 "Nachfrage Slowenien"
 GER_demand_slovenia_threat:0 "Deutschland forderte Slowenien"
 GER_demand_slovenia_desc:0 "Im Vertrag von Saint-Germain-en-Laye wurden viele historische österreichische Gebiete an Nachfolgestaaten abgetreten. Nach der Wiedervereinigung Österreichs mit Deutschland ist es an der Zeit, diese Ungerechtigkeiten zu beenden. Die historischen Provinzen Krain und Steiermark, heute Slowenien, müssen zurückgeholt werden."
 GER_first_ljubljana_award:0 "Erster Ljubljana-Preis"
 GER_first_ljubljana_award_desc:0 "Die heuchlerischen westlichen Mächte predigten nationale Selbstbestimmung und überließen gleichzeitig viele Minderheiten der serbischen Herrschaft. Wir sind in der Lage, dieses historische Unrecht zu korrigieren und gleichzeitig Freunde zu gewinnen. Gegenüber denen, die sich in der europäischen Ordnung auf unsere Seite stellen wollen, können wir sehr großzügig sein."
 GER_fate_of_yugoslavia:0 "Schicksal Jugoslawiens"
 GER_fate_of_yugoslavia_desc:0 "Der jugoslawische Staat war immer ein künstliches Konstrukt, und die zentrale Autorität beginnt zu bröckeln. Wir müssen eingreifen und die Ordnung wiederherstellen. Die einzige Frage, die sich uns stellt, ist, wie wir dies am besten erreichen können."
 yugoslavia_mefo_bills_tt:0 "Verwendet jugoslawisches Gold, um die Kosten von §YMEFO-Banknoten§ zu senken!.\n"
 GER_second_ljubljana_award:0 "Zweiter Ljubljana-Preis"
 GER_second_ljubljana_award_tt:0 "Das Ereignis bietet die Möglichkeit, Land für [Root.GetName] oder einen würdigen Verbündeten zu fordern."
 GER_second_ljubljana_award_desc:0 "Nachdem die Jugoslawienfrage gelöst ist, ist es an der Zeit, unsere Aufmerksamkeit auf Griechenland zu richten. Auch dieses Land wurde von den Alliierten zu Unrecht bereichert. Es ist an der Zeit zu erkennen, wer unsere wahren Freunde sind."
 GER_war_with_greece:0 "Krieg mit Griechenland"
 GER_war_with_greece_desc:0 "Da sich Griechenland bereits im Krieg befindet, wäre es für Deutschland eine Schande, auf einen Stützpunkt im östlichen Mittelmeer zu verzichten."
 GER_fate_of_greece:0 "Schicksal Griechenlands"
 GER_fate_of_greece_desc:0 "Griechenland hat bewiesen, dass es den neuen Kräften, die auf Europa losgelassen wurden, nicht gewachsen ist. Es ist an der Zeit, dem Land den Schutz zu bieten, den nur Deutschland bieten kann."
 GER_weserubung:0 "Operation Weserübung"
 GER_weserubung_desc:0 "Norwegen ist ein strategisch wichtiger Punkt und wäre ein naheliegender Angriffspunkt für jeden Feind, der unseren Stahlhandel mit Schweden stören möchte. Wir können nicht riskieren, dass unsere Feinde in dieser Region Stützpunkte errichten. Um einen guten Aufmarschraum für die Invasion Norwegens zu schaffen, müssen wir zunächst nach Dänemark vorrücken."
 GER_around_maginot:0 "Rund um Maginot"
 GER_around_maginot_desc:0 "Wenn wir uns gegenüber Frankreich einen taktischen Vorteil sichern wollen, müssen wir in der Lage sein, sie von allen Seiten anzugreifen. Sie werden keinen Angriff aus dem Norden erwarten, und genau aus diesem Norden werden wir sie angreifen, sobald wir einige Hindernisse beseitigt haben."
 italian_focus:0 "Italienischer nationaler Fokus"
 GER_danzig_or_war_POL_civil_war:0 "Nehmen Sie Danzig im Austausch für Unterstützung ein"
 GER_danzig_trigger_polish_civil_war:0 "Polen befindet sich in einem Bürgerkrieg und eine der folgenden Aussagen muss zutreffen:\n Deutschland hat Freiwillige zur Unterstützung einer Seite geschickt\n Eine Seite ist in einer Fraktion mit Deutschland"
 GER_alone_or_peace_faction_tt:0 "ist nicht in einer Fraktion oder ist in einer Fraktion, die mit [GER.GetNameDef] im Frieden steht."
 GER_four_year_plan:0 "Vierjahresplan"
 GER_four_year_plan_desc:0 "Wir brauchen einen ehrgeizigen Plan zur Wiederbewaffnung und endgültigen Autarkie des Landes. Dieser Plan sollte innerhalb der nächsten vier Jahre verwirklicht werden."
 GER_atlantikwall:0 "Atlantikwall"
 GER_atlantikwall_desc:0 "Nachdem wir Westeuropa erobert haben, müssen wir uns gegen einen möglichen Angriff von jenseits des Atlantiks verschanzen. Ein riesiges Netzwerk von Befestigungsanlagen entlang der europäischen Küsten sollte uns ausreichenden Schutz bieten."
 atlantikwall_tooltip:1 "Platzieren Sie §YCoastal Forts§! in jedem der folgenden Atlantikküstenstaaten, die vollständig von Ihnen kontrolliert werden:\n"
 atlantikwall_tooltip_2:0 "§YAquitanien§!\n§YPoitou§!\n§YLoire§!\n§YBretagne§!\n§YNormandie§!\n§YPas de Calais§!\n§YVlaanderen§!\n§YHolland§!\n§YFriesland§!\n§YWeser-Ems§!\n§YHannover§!\n§YSchleswig-Holstein§!\n§YJütland§!\n§YOstlandet§!\n§YVestlandet§!\n§YTrondelag§!\n§YNord-Norge§!\n"
 GER_ostwall:0 "Ostwall"
 GER_ostwall_desc:0 "Trotz unserer Erfolge im Osten müssen wir sicherstellen, dass wir den feindlichen Vormarsch im Falle einer Wende aufhalten können. Wir sollten entlang des Dnjepr vom Schwarzen Meer bis zur Ostsee eine Befestigungslinie errichten, die Panther-Wotan-Stellung."
 GER_ostwall_forts:1 "Platzieren Sie „Landfestungen“ entlang des Dnjepr bis zur Ostsee in jedem der folgenden Staaten, die vollständig von Ihrer Fraktion kontrolliert werden:\n"
 GER_ostwall_forts_2:0 "§YTartu§!\n§YPskow§!\n§YNevel§!\n§YWitebsk§!\n§YMinsk§!\n§YBobrujsk§!\n§YMosyr§!\n§YKiew§!\n§YCherkasy§!\n§YDnipropetrowsk§!\n§YZaporozhe§!\n"
 GER_ostwall_tt:0 "Unter der Kontrolle eines Mitglieds unserer Fraktion.\n"
 GER_autarky:0 "Autarkie"
 GER_autarky_desc:0 "Damit Deutschland wirklich groß sein kann, muss es autark sein. Wir müssen unsere Ressourcen besser nutzen und beim Bauen effizienter werden."
 GER_hermann_goring_werke:0 "[Root.GetHermannGoringWerkeName]"
 GER_hermann_goring_werke_desc:0 "Wir müssen uns vom wankelmütigen Einfluss privater Kapitalisten befreien. Deshalb werden wir einen Industriekonzern unter unserer Kontrolle gründen, der das Wachstum im Bergbau- und Stahlsektor überwacht, da dieser das Rückgrat unserer Rüstungsindustrie bilden wird."
 GER_HERMANN_GORING_WERKE_NAME_FASCIST:0 "Hermann Göring-Werke"
 GER_HERMANN_GORING_WERKE_NAME_KAISER:0 "Kaiser-Werke"
 GER_HERMANN_GORING_WERKE_NAME_COMMIE:0 "VEB Vereinigte Maschinenwerke"
 GER_HERMANN_GORING_WERKE_NAME:0 "Staatlich kontrollierte Industrie"
 GER_kdf_wagen:0 "[Root.GetKdfWagenName]"
 GER_kdf_wagen_desc:0 "Wir werden unseren Bürgern ermöglichen, über ein Sparprogramm ihr eigenes zukünftiges „Volksauto“ zu kaufen, mit dem wir wiederum den Bau der Fabriken finanzieren, die letztendlich zum Bau dieser Autos beitragen werden."
 GER_KDF_WAGEN_NAME:0 "KdF-Wagen"
 GER_KAISER_WAGEN_NAME:0 "Wilhelm-Wagen"
 GER_VOLKS_WAGEN_NAME:0 "Volkswagen"
 GER_coal_liquidization:0 "Kohleverflüssigung"
 GER_coal_liquidization_desc:0 "In Deutschland herrscht Ölmangel, deshalb müssen wir unsere Anstrengungen im Bereich synthetisches Öl verdoppeln."
 GER_synthetic_rubber:0 "Synthetischer Kautschuk"
 GER_synthetic_rubber_desc:0 "Für die Massenmotorisierung und Luftfahrt werden große Mengen Kautschuk benötigt, für den wir keine eigenen Vorkommen besitzen. Wir müssen die synthetische Herstellung verbessern."
 GER_german_war_economy:0 "Deutsche Kriegswirtschaft"
 GER_german_war_economy_desc:0 "Die Bevölkerung unserer großen Nation muss für die Kriegsanstrengungen mobilisiert werden. Wir werden zu einer umfassenden Kriegswirtschaft übergehen, in der jeder seinen Beitrag leisten muss."
 GER_grosraumwirtschaft:0 "Großraumwirtschaft"
 GER_grosraumwirtschaft_desc:0 "Wir müssen Deutschland auf seine Bestimmung als Herzstück Europas vorbereiten. Unsere Infrastruktur wird den Westen mit dem Osten und den Süden mit dem Norden verbinden."
 GER_align_hungary:0 "Align Ungarn"
 GER_align_hungary_desc:0 "Ungarn liegt bereits in unserem Einflussbereich, aber wir könnten das Land leicht noch weiter auf unsere Denkweise umstimmen und es in Zukunft noch leichter manipulierbar machen."
 GER_align_romania:0 "Rumänien ausrichten"
 GER_align_romania_desc:0 "Rumänien liegt bereits in unserem Einflussbereich, aber wir könnten das Land leicht noch stärker auf unsere Denkweise umstimmen und es in Zukunft noch leichter manipulierbar machen."
 GER_integrate_war_economies:0 "Kriegsökonomien integrieren"
 GER_integrate_war_economies_desc:0 "Die Länder in unserem Einflussbereich sind wirtschaftlich extrem von uns abhängig geworden. Wir könnten dies nutzen, um unsere Kontrolle über ihre Wirtschaft und unseren Einfluss auf ihre Außenpolitik zu verstärken."
 GER_integrate_war_economies_tt:2 "Wenn §Y[HUN.GetName]§! in einer Fraktion mit §Y[Root.GetName]§! ist, füge jeweils §Y4 Militärfabrik§! zu §Y[Root.GetName]§! und §Y[HUN.GetName]§! hinzu, und §Y[HUN.GetName]§! wird zur Marionette von §Y[Root.GetName]§!.\n"
 GER_integrate_war_economies_tt2:2 "Wenn §Y[ROM.GetName]§! in einer Fraktion mit §Y[Root.GetName]§! ist, füge jeweils §Y4 Militärfabrik§! zu §Y[Root.GetName]§! und §Y[ROM.GetName]§! hinzu, und §Y[ROM.GetName]§! wird zur Marionette von §Y[Root.GetName]§!.\n"
 GER_integrate_war_economies_tt3:0 "§R[HUN.GetName] muss der Vereinbarung zustimmen, damit die Boni wirksam werden.§!\n"
 GER_integrate_war_economies_tt4:0 "§R[ROM.GetName] muss der Vereinbarung zustimmen, damit die Boni wirksam werden.§!\n"
 GER_form_the_reichskommissariats:0 "Bilden Sie die Reichskommissariate"
 GER_form_the_reichskommissariats_desc:0 "Um die Nutzung lokaler Ressourcen, Industrie und Arbeitskräfte zu verbessern, sollten wir die Einrichtung quasi-autonomer Untertanenregierungen in unseren eroberten Gebieten in Erwägung ziehen."
 GER_reichskommissariats_tt:0 "Ermöglicht die Bildung unterworfener Staaten in eroberten Gebieten.\n"
 GER_oppose_hitler:0 "Widersetzen Sie sich Hitler"
 GER_oppose_hitler_desc:0 "Hitlers Herrschaft muss ein Ende haben. Mit der Remilitarisierung des Rheinlandes will er die Westmächte provozieren. Damit liefert er uns den nötigen Vorwand, um mit Hilfe loyaler Elemente der Wehrmacht die Macht zu ergreifen."
 GER_oppose_hitler_civil_war:0 "§RDie faschistischen Anhänger werden einen Bürgerkrieg beginnen.§!\n"
 GER_secure_the_new_state:0 "Den neuen Staat sichern"
 GER_secure_the_new_state_desc:0 "Angesichts des Bürgerkriegs, der zu ihrer Entstehung geführt hat, mangelt es der provisorischen Regierung an Stärke. Wir müssen dafür sorgen, dass sie gesichert ist und nicht so leicht gestürzt werden kann."
 GER_clamp_down_on_fascism:0 "Den Faschismus bekämpfen"
 GER_clamp_down_on_fascism_desc:0 "In den letzten Jahren des Nazi-Regimes wurde der repressive, diktatorische und antiroyalistische Charakter der Regierung und ihrer faschistischen Ideologen und Unterstützer nur allzu deutlich. Wir müssen dafür sorgen, dass ihre Denkweise ausgemerzt wird, wo immer sie auch auftaucht."
 GER_revive_the_kaiserreich:0 "Das Kaiserreich wiederbeleben"
 GER_revive_the_kaiserreich_desc:0 "Die Ereignisse des letzten Jahrzehnts haben gezeigt, dass die Demokratie zu schwach ist, um schändliche interne Elemente in Schach zu halten. Wir müssen zur starken Führung eines Kaisers zurückkehren, und in Vorbereitung auf seine Rückkehr werden wir die Verfassung wieder in die des Deutschen Kaiserreichs umwandeln."
 GER_revive_the_kaiserreich_tt:0 "Die deutsche Militärjunta wird als das Deutsche Reich bezeichnet.\n"
 GER_mackensen_dead:0 "Von Mackensen ist tot."
 GER_rebuild_the_nation:0 "Wiederaufbau der Nation"
 GER_rebuild_the_nation_desc:1 "Nach den Verwüstungen des Bürgerkriegs müssen wir uns dem Wiederaufbau unserer Nation widmen. Wir werden die Menschen bitten, für eine Weile auf ihren persönlichen Komfort zu verzichten, damit wir alle unsere Ressourcen auf die Erreichung dieses Ziels konzentrieren können."
 GER_fan_the_prussian_militarism:0 "Fan des preußischen Militarismus"
 GER_fan_the_prussian_militarism_desc:0 "Um die Verluste unseres Bürgerkriegs auszugleichen, müssen wir an den preußischen Militarismus appellieren, um die Rekrutierung und Ausbildung neuer Rekruten zu verbessern. Dass unser Militär uns von der Nazi-Diktatur befreit hat, sorgt dafür, dass diese preußischen Ideale heute populärer sind denn je."
 GER_a_new_and_better_germany:0 "Ein neues und besseres Deutschland"
 GER_a_new_and_better_germany_desc:0 "Während wir unsere Nation wieder aufbauen, sollten wir versuchen, über das Notwendige hinauszugehen, damit das, was wir jetzt aufbauen, die Zeit überdauert."
 GER_bulwark_against_bolshevism:0 "Bollwerk gegen den Bolschewismus"
 GER_bulwark_against_bolshevism_desc:0 "Unsere Nation schützt den Westen vor dem Einfluss des Kommunismus und dient als Schutzschild gegen den Bolschewismus. Wir müssen diese Rolle mit Stolz tragen und bereit sein, notfalls auch die Waffen einzusetzen."
 GER_bulwark_against_bolshevism_tt:0 "§RDieser Nationalgeist geht verloren, wenn man einer Fraktion mit der Sowjetunion angehört oder auf derselben Seite wie sie Krieg führt.§!\n"
 GER_return_of_the_kaiser:0 "Rückkehr des Kaisers"
 GER_return_of_the_kaiser_desc:0 "Das Kaiserreich braucht einen Kaiser, und Wilhelm II. lebt noch, im Exil in den Niederlanden. Wir werden sein Exil aufheben und ihn einladen, zurückzukehren und den Thron zu besteigen, egal, was die westlichen Demokratien denken."
 GER_focus_on_the_true_enemy:0 "Konzentrieren Sie sich auf den wahren Feind"
 GER_focus_on_the_true_enemy_desc:0 "Unsere Feinde liegen nicht im Inneren, sondern im Äußeren. Das anhaltende Verbrechen des westlichen Kolonialmonopols wird nur durch die Ungerechtigkeit des Versailler Vertrags überschattet, der uns ausgesetzt war, nachdem wir versucht hatten, unseren Platz an der Sonne einzunehmen. Damit ist jetzt Schluss."
 GER_rebuild_the_high_seas_fleet:0 "Wiederaufbau der Hochseeflotte"
 GER_rebuild_the_high_seas_fleet_desc:0 "Wenn wir den Westen jemals erfolgreich herausfordern wollen, benötigen wir ein Programm zum massiven Ausbau unserer Flotte, um unsere einst glorreiche Hochseeflotte wieder aufzubauen."
 GER_our_place_in_the_sun:0 "Unser Platz an der Sonne"
 GER_our_place_in_the_sun_desc:0 "Lassen Sie alle wissen, dass das Deutsche Reich erneut seinen Anspruch auf seinen Platz an der Sonne geltend macht! Unser Volk wird nicht länger im Schatten gedemütigt werden."
 GER_pride_of_the_modern_germany:0 "Stolz des modernen Deutschlands"
 GER_pride_of_the_modern_germany_desc:0 "Es wird viele Jahre dauern, bis wir die Größe der Royal British Navy erreichen. Daher müssen wir sie qualitativ übertreffen. Unsere Schiffe werden die modernsten und leistungsstärksten sein, die jemals die Meere befahren haben!"
 GER_prepare_for_the_next_blockade:0 "Bereiten Sie sich auf die nächste Blockade vor"
 GER_prepare_for_the_next_blockade_desc:0 "Die höllische britische Blockade hat uns den letzten Krieg gekostet. Wir werden diesen Fehler nicht noch einmal machen. Dieses Mal werden wir noch größere Anstrengungen unternehmen, um die Bevölkerung auf das Kommende vorzubereiten."
 GER_break_the_anglo_french_colonial_hegemony:0 "Brechen Sie die anglo-französische Kolonialhegemonie"
 GER_break_the_anglo_french_colonial_hegemony_desc:0 "Es ist an der Zeit, das Monopol zu brechen, das der Westen viel zu lange auf den Kolonialismus hatte."
 flag_franco_british_union:0 "Französisch-Britische Union"
 GER_schlieffen_once_more:0 "Noch einmal Schlieffen"
 GER_schlieffen_once_more_desc:0 "Der Maginot muss umgangen werden. Wir werden erneut durch Belgien und Luxemburg ziehen und in einem schnellen Vorstoß zum Sieg angreifen."
 GER_reinstate_imperial_possessions:0 "Wiederherstellung kaiserlicher Besitztümer"
 GER_reinstate_imperial_possessions_desc:0 "Nach unserer erfolgreichen Rückeroberung historisch deutscher Gebiete können wir nun mit der Wiedereingliederung in die [Root.GetName] als vollwertige Provinzen beginnen. Die letzte Schande von Versailles ist endlich behoben!"
 GER_crossing_the_atlantic:0 "Überquerung des Atlantiks"
 GER_crossing_the_atlantic_desc:0 "Nachdem wir alle kontinentalen Widerstände gegen unsere Herrschaft besiegt haben, müssen wir unsere Produktionsanstrengungen auf den Aufbau einer riesigen Marine konzentrieren, um den Briten und Amerikanern den Kampf zu liefern. Wir werden nicht ruhen, „bis zu Gottes Zeit die Alte Welt mit all ihrer Macht und Kraft hervortritt, um die Neue zu unterwerfen und zu demütigen.“"
 GER_crossing_the_atlantic_2_factories_tt:0 "Entfernen Sie §Y2 Militärfabrik§! aus einem Binnenstaat für jeden Küstenstaat, der diese Werften erhält.\n"
 GER_crossing_the_atlantic_1_factory_tt:0 "Entfernen Sie §Y1 Militärfabrik§! aus einem Binnenstaat für jeden Küstenstaat, der diese Werften erhält.\n"
 GER_the_central_powers:0 "Die Mittelmächte"
 GER_the_central_powers_desc:0 "Wir brauchen Verbündete, um uns gegen den Westen zu behaupten. Wir werden unsere eigene Fraktion gründen, um uns gegen die Unterdrückung der Demokratien zu stellen."
 GER_prepare_italian_coup:0 "Bereiten Sie einen italienischen Putsch vor"
 GER_prepare_italian_coup_desc:0 "Italiens Abstieg in den Faschismus muss rückgängig gemacht werden. Wir werden uns mit einem Putschvorschlag an die italienischen Royalisten wenden und sie unterstützen."
 GER_prepare_italian_coup_tt:0 "Wenn sie unser Angebot annehmen:\n"
 GER_assassinate_mussolini:0 "Mussolini ermorden"
 GER_assassinate_mussolini_desc:0 "Es ist an der Zeit, dem Dreh- und Angelpunkt des italienischen Faschismus das Ende zu bereiten. Deutsche Hände werden den Führer ermorden, woraufhin die italienischen Royalisten mit einem Schlag die Macht ergreifen werden."
 GER_rekindle_imperial_sentiment:0 "Erwecken Sie die imperiale Stimmung neu"
 GER_rekindle_imperial_sentiment_desc:0 "Obwohl die österreichisch-ungarische Monarchie nach dem Ersten Weltkrieg zerbrach, gibt es immer noch Menschen, die um den Untergang des Kaiserreichs trauern. Wir werden diese imperialen Gefühle pflegen, in der Hoffnung, dass die Nachfolgestaaten sich aus eigener Kraft für einen Wiedereintritt entscheiden."
 GER_rekindle_imperial_sentiment_tt:0 "Wenn die Unterstützung der Blockfreien ausreichend hoch ist, können diese Nationen Entscheidungen treffen, um das Österreichisch-Ungarische Reich zu reformieren und sich den Mittelmächten anzuschließen.\n"
 GER_expatriate_the_communists:0 "Die Kommunisten ausbürgern"
 GER_expatriate_the_communists_desc:0 "Die innere Bedrohung durch den Kommunismus stellt weiterhin eine Belastung für unser Land dar. Wir müssen uns von ihm befreien, egal wohin die Anhänger fliehen."
 GER_accept_british_naval_dominance:0 "Akzeptieren Sie die britische Seeherrschaft"
 GER_accept_british_naval_dominance_desc:0 "Wir brauchen Verbündete im Kampf gegen den Kommunismus, und die Briten sind hierfür ein bevorzugter Kandidat. Wir werden ihre Bedenken zerstreuen, indem wir ihre maritime Überlegenheit anerkennen und im Interesse verbesserter Beziehungen auf einen umfassenden Ausbau der Flotte verzichten."
 GER_ally_the_shade:0 "Ein Bündnis mit dem Schatten"
 GER_ally_the_shade_desc:0 "Wenn wir ihren Platz an der Sonne nicht einnehmen können, werden wir uns mit denen verbünden, die einen Schatten auf uns werfen."
 GER_carte_blanche_for_alsace_and_french_colonies:0 "Carte Blanche für das Elsass und die französischen Kolonien"
 GER_carte_blanche_for_alsace_and_french_colonies_desc:0 "Wir müssen unseren neuen Verbündeten bitten, uns freie Hand bei der Rückforderung unserer rechtmäßigen Gebiete Elsass-Lothringen und unseres gerechten Anteils an den afrikanischen Kolonien zu lassen."
 GER_bypass_maginot_in_the_south:0 "Umgehung von Maginot im Süden"
 GER_bypass_maginot_in_the_south_desc:0 "Die Briten verfolgen ihre Interessen in den Niederlanden, und deshalb müssen wir nach alternativen Routen um den Maginot-Kanal herum suchen. Der Süden, obwohl bergig und schwer zu durchqueren, muss ausreichen. Der deutsche Einfallsreichtum wird uns helfen."
 GER_see_to_the_eastern_front:0 "Kümmern Sie sich um die Ostfront"
 GER_see_to_the_eastern_front_desc:0 "Wenn wir aus dem Ersten Weltkrieg etwas gelernt haben, dann ist es, dass wir uns auf einen Angriff auf unsere entlegenen östlichen Besitzungen vorbereiten müssen. Diese Besitzungen müssen wiederhergestellt und gegen eine Invasion befestigt werden."
 GER_see_to_the_eastern_front_tt:1 "Füge 6 §YLandfestungen§! in 3 Provinzen an der Ostgrenze hinzu.\n"
 GER_see_to_the_eastern_front_tt2:1 "Füge 8 §YLandfestungen§! in 4 Provinzen an der Ostgrenze hinzu.\n"
 GER_danzig_for_guarantees:0 "Danzig für Garantien"
 GER_danzig_for_guarantees_desc:1 "Die Polen müssen die Gefahr durch die Bolschewiki spüren. Vielleicht könnten wir uns auf eine Rückgabe Danzigs, Posens und der Woiwodschaft Schlesien einigen, im Austausch für Garantien militärischer Unterstützung im Falle einer Invasion der Roten."
 GER_safeguard_the_baltic:0 "Schützen Sie die Ostsee"
 GER_safeguard_the_baltic_desc:0 "Das Baltikum gehörte bis vor wenigen Jahrzehnten zum Russischen Reich. Es ist daher naheliegend, dass die Sowjets erneut versuchen könnten, das Baltikum zu annektieren. Wir müssen dies verhindern und im Falle einer sowjetischen Invasion unsere militärische Unterstützung anbieten."
 GER_support_the_finns:0 "Unterstützen Sie die Finnen"
 GER_support_the_finns_desc:0 "Die Finnen befinden sich in der Schusslinie der Sowjets. Wir werden ihnen eine Garantie gegen die kommunistische Bedrohung bieten und ihnen eine bescheidene industrielle Unterstützung gewähren."
 GER_anti_comintern_pact_unaligned:0 "Ideologische Verteidigung"
 GER_anti_comintern_pact_unaligned_desc:0 "Die militärische Bedrohung ist nicht die einzige Gefahr, der wir ausgesetzt sind. Wir müssen nach Wegen suchen, den Kommunismus selbst in Schach zu halten. Zu diesem Zweck werden wir mit unseren nichtkommunistischen Mitbürgern einen Pakt schließen, um seinen Vormarsch zu bekämpfen."
 GER_anti_soviet_pact_unaligned:1 "Formalisieren Sie den Vertrag"
 GER_anti_soviet_pact_unaligned_desc:1 "Wir sollten uns auf einen militärischen Konflikt mit dem Kommunismus vorbereiten, indem wir alle Unterzeichner des Antikominternpakts einladen, einer Zusatzklausel zuzustimmen, die militärische Unterstützung gegen jede sowjetische Aggression vorsieht. Da wir uns bereits in vielerlei Hinsicht verpflichtet fühlen, sollte dies nicht mehr als eine Formalisierung sein."
 GER_tackle_the_communist_threat:0 "Bekämpfen Sie die kommunistische Bedrohung"
 GER_tackle_the_communist_threat_desc:0 "Solange die Sowjetunion existiert, stellt sie für uns eine Bedrohung dar. Anstatt darauf zu warten, dass sie zuschlägt, sollten wir die Initiative selbst in die Hand nehmen."
 GER_the_iberian_problem:0 "Das iberische Problem"
 GER_the_iberian_problem_desc:0 "Es gibt immer noch Bastionen des Kommunismus. Wir müssen dafür sorgen, dass sie alle ausgerottet werden, angefangen mit dem kommunistischen Spanien."
 GER_spain_wargoal_tt:0 "Erlangt das Kriegsziel §YAnnex§! gegen §YRepublikanisches Spanien§!.\n"
 GER_reestablish_free_elections:0 "Wiederherstellung freier Wahlen"
 GER_reestablish_free_elections_desc:0 "Wir werden zu den demokratischen Idealen zurückkehren, indem wir in naher Zukunft wieder freie Wahlen einführen."
 GER_the_monarchy_compromise:0 "Der Monarchiekompromiss"
 GER_the_monarchy_compromise_desc:0 "Das Militär, das für unsere Freiheit von der Nazi-Tyrannei kämpfte, hat eindeutig royalistische Neigungen. Um sicherzustellen, dass sie mit dem eingeschlagenen Weg der Nation zufrieden sind, müssen wir einen Kompromiss eingehen und die Rückkehr der Monarchie zulassen."
 GER_the_great_red_menace:0 "Die große rote Bedrohung"
 GER_the_great_red_menace_desc:0 "Unser Handeln im letzten Krieg ist vielen noch in frischer Erinnerung. Wir müssen die Ängste des Kontinents wieder auf die wahre Gefahr lenken: die große kommunistische Bedrohung, die im Osten lauert. Wir werden eine massive Propagandakampagne starten, um dem Kontinent die Augen zu öffnen."
 GER_central_european_alliance:0 "Mitteleuropäische Allianz"
 GER_central_european_alliance_desc:0 "Nachdem wir nun die Aufmerksamkeit des Kontinents auf das Problem gelenkt haben, müssen wir eine Lösung anbieten: Wir werden ein Bündnis aller kleineren Nationen in Europa anführen, das Schutz vor dieser tödlichsten Bedrohung unserer Lebensweise gewährleistet."
 GER_central_european_alliance_tt:0 "Wenn nicht in einer Fraktion:\n"
 GER_danubian_membership:0 "Donaumitgliedschaft"
 GER_danubian_membership_desc:0 "Die Donaunachfolgestaaten der österreichisch-ungarischen Monarchie haben nicht vergessen, was es bedeutet, unser Verbündeter zu sein. Wir werden ihnen die Mitgliedschaft und den Schutz vor der Bedrohung durch den Kommunismus anbieten."
 GER_danubian_expansion:0 "Donauerweiterung"
 GER_danubian_expansion_desc:0 "Wir müssen versuchen, unseren Einfluss auf jene Balkanstaaten auszuweiten, die anfällig für sowjetische Aggressionen sind. Den übrigen Donauländern werden wir die Mitgliedschaft und Schutz vor der Bedrohung durch den Kommunismus anbieten."
 invite_non_fascist_communist_only_TT:1 "Erfordert, dass potenzielle Mitgliedsstaaten weder faschistisch noch kommunistisch sind und nicht bereits einer Fraktion angehören.\n"
 GER_no_balkan_communism:0 "Kein Balkankommunismus"
 GER_no_balkan_communism_desc:0 "Auf dem Balkan haben sich kommunistische Einflüsse eingeschlichen, die wir nicht zulassen können. Sie müssen zerstört werden, bevor sie Wurzeln schlagen."
 GER_no_balkan_communism_tt:0 "Erreicht die Kriegsziele „Regierung stürzen“ gegen kommunistische Nationen auf dem Balkan.\n"
 GER_no_balkan_communism_HUN_tt:0 "Erzielt das Kriegsziel „Regierung stürzen“ gegen die „Ungarische Volksrepublik“.\n"
 GER_no_balkan_communism_ROM_tt:0 "Erzielt das Kriegsziel „Regierung stürzen“ gegen die „Rumänische Volksrepublik“.\n"
 GER_no_balkan_communism_YUG_tt:0 "Erzielt das Kriegsziel „Regierung stürzen“ gegen „Jugoslawien“.\n"
 GER_no_balkan_communism_BUL_tt:0 "Erzielt das Kriegsziel „Regierung stürzen“ gegen „Sozialistische Republik Bulgarien“.\n"
 GER_low_countries_membership:0 "Mitgliedschaft der Niederlande"
 GER_low_countries_membership_desc:0 "Obwohl sie weit von den östlichen Grenzen Europas entfernt sind, wissen die Niederlande, dass sie als Nächstes an der Reihe sind, wenn Mitteleuropa fällt. Wir werden ihnen eine Mitgliedschaft anbieten, damit sie gemeinsam mit uns gegen die Bedrohung durch den Kommunismus kämpfen können."
 GER_no_reds_in_western_europe:0 "Keine Roten in Westeuropa"
 GER_no_reds_in_western_europe_desc:0 "In Westeuropa haben sich kommunistische Einflüsse eingeschlichen, die wir nicht zulassen können. Sie müssen zerstört werden, bevor sie Wurzeln schlagen."
 GER_no_reds_in_western_europe_tt:0 "Erreicht die Kriegsziele „Regierung stürzen“ gegen kommunistische Nationen in den Niederlanden und Frankreich.\n"
 GER_no_reds_in_western_europe_FRA_tt:0 "Erzielt das Kriegsziel „Sturz der Regierung“ gegen „Französische Kommune“.\n"
 GER_no_reds_in_western_europe_HOL_tt:0 "Erzielt das Kriegsziel „Regierung stürzen“! gegen „Vereinigte Volksprovinzen“!.\n"
 GER_no_reds_in_western_europe_BEL_tt:0 "Erzielt das Kriegsziel „Regierung stürzen“ gegen die „Genossenschaft Belgiens“.\n"
 GER_no_reds_in_western_europe_LUX_tt:0 "Erzielt das Kriegsziel „Regierung stürzen“ gegen „Rosa Luxemburg“!.\n"
 GER_scandinavian_membership:0 "Skandinavische Mitgliedschaft"
 GER_scandinavian_membership_desc:0 "Berge und Kälte sind kein Schutz vor der Roten Gefahr, und das müssen die Skandinavier wissen. Wir werden ihnen eine Mitgliedschaft und Schutz vor der Bedrohung durch den Kommunismus anbieten."
 GER_baltic_membership:0 "Baltische Mitgliedschaft"
 GER_baltic_membership_desc:0 "Seit zwei Jahrzehnten leben die baltischen Staaten in der tödlichen Doppelgefahr der Wiederangliederung und des Kommunismus. Wir werden ihnen die Mitgliedschaft und den Schutz vor der Bedrohung durch den Kommunismus anbieten."
 GER_polish_membership:0 "Polnische Mitgliedschaft"
 GER_polish_membership_desc:0 "Die Polen haben allen Nachbarn viele Gründe zu misstrauen, wissen aber, dass die größte Bedrohung aus dem Osten kommt. Wir werden ihnen die Mitgliedschaft und den Schutz vor der Bedrohung durch den Kommunismus anbieten."
 GER_finnish_membership:0 "Finnische Mitgliedschaft"
 GER_finnish_membership_desc:0 "Weit entfernt vom Zentrum Europas laufen die Finnen Gefahr, den Roten allein gegenüberzustehen. Doch das ist nicht nötig. Wir werden ihnen die Mitgliedschaft und den Schutz vor der Bedrohung durch den Kommunismus anbieten."
 GER_strike_at_the_source:0 "Schlag an der Quelle"
 GER_strike_at_the_source_desc:0 "Ein Leben in Angst ist kein Leben. Wir müssen dieser Bedrohung unserer Lebensweise ein für alle Mal ein Ende setzen. Die Quelle des kommunistischen Einflusses in Europa muss zerstört werden."
 GER_reverse_the_brain_drain:0 "Umkehr der Abwanderung hochqualifizierter Fachkräfte"
 GER_reverse_the_brain_drain_desc:0 "Nachdem die Unterdrücker und autoritären Regime besiegt sind, können wir versuchen, es für die Wissenschaftler, die aus dem Land geflohen sind, attraktiv zu machen, zurückzukehren und erneut in ihrem Heimatland zu arbeiten."
 GER_shared_rd_programs:0 "Gemeinsame F&amp;E-Programme"
 GER_shared_rd_programs_desc:0 "Zum Wohle unserer Sache müssen wir unser wissenschaftliches Wissen bündeln und unsere technologischen Fortschritte mit unseren neuen Verbündeten teilen."
 GER_the_mannheim_project:0 "Das Mannheim-Projekt"
 GER_the_mannheim_project_desc:0 "Da wir nun die Schwerwasseranlagen in Norwegen unter unserer Kontrolle haben, können wir unsere Anstrengungen verdoppeln, die Geheimnisse der Atomenergie zu lüften und zu prüfen, wie wir sie als Waffe gegen die Bolschewiken einsetzen können."
 GER_the_mannheim_project_tt:0 "Dieser Fokus gibt je nach aktuellem Stand der Atomforschung unterschiedliche Belohnungen:\n\n"
 GER_pool_technical_know_how:0 "Pooltechnisches Know-how"
 GER_pool_technical_know_how_desc:0 "Jede Nation hat ihre eigenen Methoden, ihre Industrie zu verwalten und ihre Anlagen zu warten. Wir können voneinander lernen, indem wir technische Teams entsenden, die dieses Wissen unter den anderen Mitgliedern der Allianz verbreiten."
 GER_pool_technical_know_how_tt:0 "Jede Nation in der Fraktion wird diesen Nationalgeist erhalten."
 ITA_ethiopian_war_logistics:0 "Äthiopische Kriegslogistik"
 ITA_ethiopian_war_logistics_desc:0 "Möglicherweise haben wir die logistische Situation bei unserer glorreichen Eroberung Äthiopiens falsch eingeschätzt. Unser oberstes Ziel muss es sein, unsere tapferen Truppen mit den notwendigen Vorräten zu versorgen."
 ITA_fortification_effort:0 "Befestigungsbemühungen"
 ITA_fortification_effort_desc:0 "Wir müssen unsere Küsten und Grenzen gegen die Aggression der schwindenden und dekadenten Imperialmächte Frankreich und Großbritannien verteidigen."
 ITA_fortification_effort_forts:0 "Fügen Sie §Y15 Landfestungen§! an der französischen Grenze hinzu.\n"
 ITA_army_primacy:0 "Vorrang der Armee"
 ITA_army_primacy_desc:0 "Industriell hinkt Italien den dekadenten Kolonialreichen noch immer hinterher. Wir müssen uns entscheiden, ob wir der Armee oder der Marine den Vorrang geben. Die Entscheidung scheint offensichtlich: So wie das antike Römische Reich auf seine Legionen angewiesen war, muss es auch das neue italienische Reich sein!"
 ITA_modernized_artillery:0 "Modernisierte Artillerie"
 ITA_modernized_artillery_desc:0 "Theoretisch ist die Regio Esercito eine der größten Armeen der Welt. Leider ist es uns unmöglich, all diese Männer angemessen auszurüsten. Und das Schlimmste: Der Großteil unserer Artillerie stammt aus dem Jahr 1918!"
 ITA_modernized_army:0 "Modernisierte Armee"
 ITA_modernized_army_desc:0 "Eine bessere Artillerie wird unsere Kampfkraft erheblich steigern, aber wir brauchen auch neue Taktiken und Doktrinen."
 ITA_armored_effort:0 "Gepanzerte Anstrengung"
 ITA_armored_effort_desc:0 "Der Kampf in Äthiopien ist schön und gut, aber unsere Panzer entsprechen einfach nicht dem Standard, der für den Kampf gegen die dekadenten – wenn auch immer noch mächtigen – Plutodemokraten Europas erforderlich wäre."
 ITA_mare_nostrum:0 "Mare Nostrum"
 ITA_mare_nostrum_desc:0 "Unsere Ressourcen sind begrenzt und wir müssen einige schmerzhafte Entscheidungen treffen, doch das Britische Empire hält uns im Mittelmeer gefangen. Für einen Ausbruch benötigen wir eine Marine, die es selbst mit der britischen Marine aufnehmen kann …"
 ITA_carrier_effort:0 "Trägeraufwand"
 ITA_carrier_effort_desc:0 "Moderne Schlachtflotten basieren auf Flugzeugträgern, nicht auf Schlachtschiffen. Die Überlegenheit der Luftwaffe gegenüber Schiffen wurde bereits 1921 von den Amerikanern demonstriert!"
 ITA_capital_ships:0 "Großkampfschiff-Anstrengung"
 ITA_capital_ships_desc:0 "Die Nation mit den meisten Schlachtschiffen wird die Weltmeere beherrschen. Wir dürfen nicht zulassen, dass uns die Royal Navy im Mittelmeer waffentechnisch überlegen ist ..."
 ITA_bomber_effort:0 "Bomber-Anstrengung"
 ITA_bomber_effort_desc:0 "Die Zeiten, in denen Armeen Kriege gewinnen konnten, ohne in den Himmel zu blicken, sind vorbei. Wir müssen unsere taktischen Bomber weiterentwickeln, um unseren Soldaten die Luftunterstützung zu bieten, die sie brauchen."
 ITA_atlantic_fleet:0 "Atlantikflotte"
 ITA_atlantic_fleet_desc:0 "Sobald wir aus dem britischen Käfig ausgebrochen sind, müssen wir unsere Macht über die Ozeane hinweg ausdehnen. Dies muss unsere oberste Priorität sein."
 ITA_marines_and_landing_craft:0 "Marinesoldaten und Landungsboote"
 ITA_marines_and_landing_craft_desc:0 "Kriege werden nicht allein durch die Seemacht gewonnen; wir müssen auch in der Lage sein, unsere Armeen über die Meere zu transportieren und sicher an Land zu bringen …"
 ITA_jet_engine_effort:0 "Düsentriebwerksaufwand"
 ITA_jet_engine_effort_desc:0 "Dank der brillanten Arbeit von Secondo Campini sollte Italien eine Vorreiterrolle bei der Entwicklung von Düsentriebwerken einnehmen. Wir sollten ihm alle Mittel zur Verfügung stellen, die er braucht, um seine Entwürfe für die Regio Aeronautica weiter zu verbessern."
 ITA_light_ship_effort:0 "Leichte Schiffsbemühungen"
 ITA_light_ship_effort_desc:0 "Die Konvois zu unseren Überseegebieten brauchen Schutz. Wir müssen neue Doktrinen und modernere Zerstörer entwickeln."
 ITA_escort_effort:0 "Eskortaufwand"
 ITA_escort_effort_desc:0 "Wir sollten weitere Anstrengungen unternehmen, um unsere gefährdeten Konvois im Mittelmeer zu schützen."
 ITA_sea_wolves:0 "Seewölfe"
 ITA_sea_wolves_desc:0 "Unsere deutschen Verbündeten haben erschreckend effiziente U-Boote und die „Wolfsrudel“-Doktrin zu deren Einsatz entwickelt. Wir sollten von ihnen lernen."
 ITA_slovenia_dalmatia_claims:0 "Ansprüche an Jugoslawien"
 ITA_slovenia_dalmatia_claims_desc:0 "In Jugoslawien gibt es noch immer eine bedeutende italienische Bevölkerung, die zumindest bis in die glorreichen Zeiten Venedigs zurückreicht. Die Wiederherstellung dieser Regionen unter italienischer Herrschaft ist ein wichtiger Schritt zur Wiederherstellung des Römischen Reiches!"
 ITA_slovenia_dalmatia_claims_threat:0 "Italienische Ansprüche auf Jugoslawien"
 ITA_yugoslavia_friend:0 "Befreunde dich mit Jugoslawien"
 ITA_yugoslavia_friend_desc:0 "Anstatt Jugoslawien jetzt zu verärgern, können wir seine mögliche Eroberung auf einen günstigeren Zeitpunkt verschieben. Stattdessen könnten wir uns mit dem Regime anfreunden und das Land in unseren Einflussbereich bringen."
 ITA_support_nationalist_spain:0 "Unterstützen Sie das nationalistische Spanien"
 ITA_support_nationalist_spain_desc:0 "Spanien befindet sich mitten in einem Bürgerkrieg, der darüber entscheiden wird, ob es künftig ein möglicher Verbündeter des Faschismus sein wird oder eine nutzlose Republik bleibt – oder, noch schlimmer, dem Kommunismus oder der Anarchie verfällt. Wir müssen den wahren Spaniern Unterstützung bieten, bevor es zu spät ist!"
 ITA_demand_balearic_islands:0 "Nachfrage Balearen"
 ITA_demand_balearic_islands_desc:0 "Nachdem wir unsere Unterstützung für Francos neues Regime unter Beweis gestellt haben, sind wir in der Lage, die Abtretung eines der wichtigen Gebiete, für deren Verteidigung wir gekämpft haben, nämlich der Balearen, an Italien zu fordern, um unsere strategische Stellung im Mittelmeerraum zu stärken."
 ITA_bulgaria_friend:0 "Befreunde dich mit Bulgarien"
 ITA_bulgaria_friend_desc:0 "Bulgarien liegt in unserem Einflussbereich. Sein sicheres Bündnis mit Italien ist für unsere Balkanambitionen von entscheidender Bedeutung."
 ITA_albania_war_goal:1 "Albanische Besatzung"
 ITA_albania_war_goal_desc:1 "Albanien ist für unsere Truppen ein leichtes Ziel. Wir werden wahrscheinlich nicht auf großen Widerstand stoßen. Wir müssen der Welt die Macht Italiens zeigen und den Ruhm des Römischen Reiches wiederherstellen!"
 ITA_pact_of_steel:0 "Stahlpakt"
 ITA_pact_of_steel_desc:0 "Unser Verhältnis zu Nazi-Deutschland ist durch ideologische Differenzen und widersprüchliche Ziele belastet; der Duce ist äußerst misstrauisch gegenüber den deutschen Ambitionen in Österreich und auf dem Balkan. Doch die Realitäten ändern sich …"
 ITA_germ_italy_same_tt:0 "§YItalien§! und §YDeutschland§! sind dieselbe §YIdeologie§!."
 ITA_german_millitary_cooperation:0 "Deutsche Militärzusammenarbeit"
 ITA_german_millitary_cooperation_desc:0 "Durch die enge Zusammenarbeit mit dem mächtigen deutschen Militär können wir das Beste aus deutscher Effizienz und italienischer Innovation vereinen. Wir werden einen strategischen Vorteil gegenüber jedem haben, der es wagt, sich uns entgegenzustellen."
 ITA_claims_on_france:0 "Ansprüche an Frankreich"
 ITA_claims_on_france_desc:0 "Nehmen wir Vichy-Frankreich Land ab. Mit der deutschen Eroberung von Paris und der Bildung einer neuen Regierung in Frankreich ist es für uns an der Zeit, unseren rechtmäßigen Anteil an Südeuropa zu beanspruchen. Deutschland hat sich im Norden stark ausgebreitet, und es ist nur fair, dass uns ein eigenes Stück Land zugestanden wird."
 ITA_claims_on_france_tt:0 "§YVichy-Frankreich§! existiert und kontrolliert §YSavoyen§! und §YCorsika§!"
 ITA_go_after_france:0 "Gehen Sie nach Frankreich"
 ITA_go_after_france_desc:0 "Frankreich ... eine weitere reaktionäre Demokratie des Westens, die ständig versucht, den Vormarsch zu behindern und oft die Existenz des italienischen Volkes gefährdet. Wir ziehen in den Kampf für das Wohl Italiens und die Zukunft des Imperiums."
 ITA_claims_on_turkey:0 "Ansprüche an die Türkei"
 ITA_claims_on_turkey_desc:0 "Der Londoner Vertrag von 1915 versprach Italien türkische Gebiete in Anatolien im Austausch für die Eroberungen der Westmächte in der Levante. Italien nahm sich den ihm zustehenden Anteil und behauptete, es handele sich lediglich um Mandate des Völkerbundes, während Italien diese verweigert wurden. Das neue Italien ist viel stärker als das alte, und wir werden die Türken zwingen, die britischen Versprechen einzuhalten."
 ITA_italy_first:0 "Italien zuerst"
 ITA_italy_first_desc:0 "Mussolini wird niemals die zweite Geige hinter Hitler spielen! Wir müssen die Lehren des Römischen Reiches beherzigen. Die Einmischung der Germanen in die italienischen Angelegenheiten endet nie gut …"
 ITA_romania_friend:0 "Befreunde dich mit Rumänien"
 ITA_romania_friend_desc:0 "Es wäre in unserem besten Interesse, unsere entfernten Verwandten in Rumänien in unseren Einflussbereich zu bringen. Il Duce sieht großes Potenzial in ihrer „Eisernen Garde“."
 ITA_german_rd_treaty:0 "Vertrag mit Deutschland"
 ITA_german_rd_treaty_desc:0 "Wir sollten die Deutschen bitten, technologische Geheimnisse zum Nutzen unserer beiden großen Nationen auszutauschen."
 ITA_spanish_italian_faction:0 "Spanisch-Italienische Allianz"
 ITA_spanish_italian_faction_desc:0 "Franco und die spanischen Nationalisten sind unsere natürlichen Verbündeten, vereint durch Religion, Kultur und Ideologie. Gemeinsam könnten wir Gibraltar erobern und der Royal Navy das Leben schwer machen ..."
 ITA_italian_highways:0 "Italienische Autobahnen"
 ITA_italian_highways_desc:0 "Wir müssen unsere Infrastruktur ausbauen, um die Mobilität unserer Truppen in unserem gesamten Reich zu gewährleisten. Angesichts unserer Feinde in allen Teilen der Welt ist dies ein entscheidender Faktor für die Verteidigung Italiens."
 ITA_libyan_refineries:0 "Libysche Raffinerien"
 ITA_libyan_refineries_desc:0 "Benhasi ist ein idealer Ort für den Bau von Raffinerien. In der Nähe von Ölquellen und in der Nähe der Produktion im Heimatland."
 ITA_libyan_infrastructure:0 "Libysche Infrastruktur"
 ITA_libyan_infrastructure_desc:0 "Unsere riesigen Länder in Nordafrika hinken in puncto Infrastruktur noch immer dem Rest unseres Reiches hinterher. Wir sollten unsere Anstrengungen darauf konzentrieren, sie auf den gleichen Stand zu bringen."
 ITA_prospect_for_oil:0 "Aussicht auf Öl"
 ITA_prospect_for_oil_desc:0 "Alte Imperien fürchten stets den Aufstieg neuer Imperien, und wir sollten uns nicht auf sie verlassen. Wir können uns nicht auf das Öl anderer Länder verlassen und sollten unsere Bemühungen darauf konzentrieren, unsere eigenen Quellen innerhalb des Imperiums zu finden. So stellen wir sicher, dass wir auch in Zukunft wettbewerbsfähig bleiben."
 ITA_greece_war_goal:0 "Krieg mit Griechenland"
 ITA_greece_war_goal_desc:0 "Was für ein Römisches Reich stellen wir wieder her, wenn wir Griechenland ausklammern? Es sollte ein leichtes Ziel sein ..."
 ITA_greece_friend:0 "Befreunde dich mit Griechenland"
 ITA_greece_friend_desc:0 "Die Griechen sind ein antikes Volk und die Wiege der westlichen Zivilisation. Es sollte nicht unmöglich sein, ihre Ziele mit unseren in Einklang zu bringen …"
 ITA_turkey_friend:0 "Befreunde dich mit der Türkei"
 ITA_turkey_friend_desc:0 "Nach dem italienisch-türkischen Krieg und dem Ersten Weltkrieg haben die Türken keinen Grund mehr, uns zu lieben. Realpolitik hat jedoch Vorrang vor alten Konflikten, und die aktuelle Situation im Mittelmeerraum könnte unsere beiden Sterne wieder in Einklang bringen."
 ITA_portugal_friend:0 "Befreunde dich mit Portugal"
 ITA_portugal_friend_desc:0 "Portugal ist neben Spanien ein natürlicher Verbündeter des italienischen Volkes. Wir müssen diese freundschaftlichen Bande stärken."
 ITA_anti_uk_war_goals:0 "Krieg mit Großbritannien"
 ITA_anti_uk_war_goals_desc:0 "Das zerfallende Britische Empire hält uns im Mittelmeer gefangen und wird uns die Schlüssel niemals freiwillig überlassen. Wir müssen die Engländer angreifen, sobald die Zeit reif ist!"
 ITA_japan_friend:0 "Befreunde dich mit Japan"
 ITA_japan_friend_desc:0 "Die Japaner sind uns sehr ähnlich: eine junge, hungrige Macht mit einer positiven Demografie, die durch den Handel mit schwindenden Plutodemokraten wie Großbritannien und den Niederlanden in Geiselhaft gehalten wird. Wir sollten uns mit ihnen zu einer dynamischen Seeachse über die Ozeane hinweg vereinen!"
 soviet_focus:0 "Sowjetischer nationaler Fokus"
 SOV_finish_five_year_plan:0 "Den Fünfjahresplan abschließen"
 SOV_finish_five_year_plan_desc:0 "Der zweite Fünfjahresplan priorisiert die Entwicklung der Schwerindustrie. Die Sowjetunion muss sich schnell entwickeln, um mit den kapitalistischen und faschistischen Mächten des Westens mithalten zu können."
 SOV_move_industry_to_urals:0 "Industrieverlagerung in den Ural"
 SOV_move_industry_to_urals_desc:0 "Den hinterhältigen Hitleristen darf nicht gestattet werden, unsere wertvollen Fabriken im Westen der UdSSR zu besetzen. Mit äußerster Anstrengung und Opferbereitschaft sollten wir in der Lage sein, die wertvollsten Schwermaschinen und Anlagen schnell nach Tscheljabinsk und an andere Orte im Ural zu bringen."
 SOV_defense_of_moscow:0 "Verteidigung Moskaus"
 SOV_defense_of_moscow_desc:0 "Die Faschisten klopfen an die Tore der Hauptstadt! Moskau darf um keinen Preis fallen. Mobilisiert alle, vom Kind bis zum Alten, um so schnell wie möglich Verteidigungsanlagen zu errichten!"
 SOV_defense_of_moscow_forts:0 "Fügen Sie §Y28 Landfestungen§! in und um Moskau hinzu.\n"
 SOV_infrastructure_effort:0 "Infrastrukturaufwand"
 SOV_infrastructure_effort_desc:0 "Die Sowjetunion ist riesig, aber größtenteils unbewohnt. Wir müssen dafür sorgen, dass Güter und Ausrüstung schnell durch das ganze Land transportiert werden können."
 SOV_tranformation_of_nature:0 "Transformation der Natur"
 SOV_tranformation_of_nature_desc:0 "Stalins großer Plan zur Umgestaltung der Natur muss in die Tat umgesetzt werden. Die Umwelt muss in großem Maßstab so gestaltet und geformt werden, dass sie zum Wohle des Volkes wirkt."
 SOV_stalin_constitution:0 "Stalins Verfassung"
 SOV_stalin_constitution_desc:0 "Es ist an der Zeit, unsere alte Verfassung zu aktualisieren und der Welt die Rechte vor Augen zu führen, die die Arbeiter und Bauern der Sowjetunion genossen!"
 SOV_collectivist_propaganda:0 "Kollektivistische Propaganda"
 SOV_collectivist_propaganda_desc:0 "In der Sowjetunion gibt es keinen Platz für individuellen Ruhm. Unsere Propaganda sollte den Schwerpunkt auf kollektive Anstrengungen legen: übertroffene Produktionsziele, erfolgreiche Expeditionen und gewaltige Bauprojekte."
 SOV_militarized_schools:0 "Militarisierte Schulen"
 SOV_militarized_schools_desc:0 "Sowjetischen Kindern sollten militärische Disziplin und sozialistische Tugenden wie Selbstaufopferung und Solidarität eingeimpft werden. Junge Köpfe lassen sich leichter formen."
 SOV_workers_culture:0 "Arbeiterkultur"
 SOV_workers_culture_desc:0 "Der Sozialismus ist nicht nur ein Wirtschaftssystem und der Marxismus nicht nur eine Wissenschaft; wir müssen das Gefüge der sowjetischen Gesellschaft grundlegend verändern, um alle Überreste bürgerlicher Sitten und Traditionen auszumerzen."
 SOV_new_soviet_man:0 "Der neue Sowjetmensch"
 SOV_new_soviet_man_desc:0 "Der neue Sowjetmensch ist selbstlos, gebildet, diszipliniert und gesund; ein lebendiger Triumph über niedere Instinkte und falsches Bewusstsein. Männer geben gerne ihr Leben für das Wohl aller, und Frauen gebären viele Kinder für die Zukunft der sowjetischen Gesellschaft."
 SOV_positive_heroism:0 "Positiver Heldenmut"
 SOV_positive_heroism_desc:0 "Es ist an der Zeit, die alte leninistische kollektivistische Propaganda hinter sich zu lassen und verschiedene außergewöhnliche Individuen in überlebensgroße Helden des Sozialismus zu verwandeln!"
 SOV_progress_cult:0 "Fortschrittskult"
 SOV_progress_cult_desc:0 "Wir sollten die Innovationen herausragender sowjetischer Wissenschaftler feiern und das richtige freie Denken fördern. Die UdSSR wird dem dekadenten Westen immer einen Schritt voraus sein, wenn es um mutige neue Wissenschaftsgebiete geht; man denke nur an die brillante Arbeit des Genossen Lyssenko!"
 SOV_socialist_science:0 "Sozialistische Wissenschaft"
 SOV_socialist_science_desc:0 "Die Welt ist, wie der Geist, in ständiger Bewegung. Die Natur befindet sich in einem Zustand ständigen Fortschritts, ja sogar Revolution. Die Prinzipien des dialektischen Materialismus lassen sich sowohl auf die Naturwissenschaften als auch auf die Sozialwissenschaften anwenden."
 SOV_aviation_cult:0 "Luftfahrtkult"
 SOV_aviation_cult_desc:0 "Die Sowjetunion wird die Welt mit erstaunlichen Leistungen der Luftfahrt beeindrucken. Unsere heldenhaften Piloten sind die Ritter der bolschewistischen Kultur und des Fortschritts und demonstrieren unsere technologische Überlegenheit über die Natur. Wie weit sind wir seit den Tagen des Zaren gekommen!"
 SOV_women_pilots:0 "Frauen in der Luftfahrt"
 SOV_women_pilots_desc:0 "Genossin Raskova, unserer heldenhaften Langstreckenfliegerin, sollte es gestattet sein, im Rahmen ihres Programms „Aviation Group 122“ einige reine Frauenfliegerregimenter zu bilden."
 SOV_night_witches_tt:0 "Das 588. Nachtbomberregiment wird in Moskau aktiv."
 SOV_socialist_realism:0 "Sozialistischer Realismus"
 SOV_socialist_realism_desc:0 "Alle Kunstwerke in der Sowjetunion müssen darauf abzielen, die Menschen über die Ziele und die Bedeutung des Kommunismus aufzuklären und das Proletariat in realistischen und typischen Szenen des Alltagslebens darzustellen. Sowjetische Künstler sind Seeleningenieure!"
 SOV_improve_railway:0 "Verbesserung des Eisenbahnnetzes"
 SOV_improve_railway_desc:0 "Unser erster Fünfjahresplan erwies sich als zu erfolgreich. Der massive Ausbau der Schwerindustrie hat die Sowjetunion in eine deutlich stärkere Verteidigungsposition gebracht, doch das sowjetische Eisenbahnnetz ist an kritische Engpässe geraten. Das Volkskommissariat für Eisenbahnen (NKPS) hat einen ehrgeizigen Plan, diese Engpässe zu schließen und die Verteidigung des Vaterlandes zu gewährleisten."
 SOV_transpolar_flights:0 "Transpolare Flüge"
 SOV_transpolar_flights_desc:0 "Unsere mutigsten Piloten beweisen gerade erst, dass waghalsige Routen über die Arktis möglich sind. Indem wir bei der Planung unseres Luftkriegs solche unerwarteten Abkürzungen nutzen, können wir den Feind überraschen."
 SOV_ocean_going_navy:0 "Eine Hochseeflotte"
 SOV_ocean_going_navy_desc:0 "Obwohl die Union eine größere Landfläche umfasst als jede andere Nation auf der Erde, werden die Weltmeere noch immer nicht von unseren Schiffen beherrscht. Schwer gepanzerte Schlachtschiffe werden Teil unserer zukünftigen Hochseeflotte sein."
 SOV_peoples_commissariat:0 "PCDI gefunden"
 SOV_peoples_commissariat_desc:0 "Das Volkskommissariat für Rüstungsindustrie der UdSSR wird ein Schwerindustrieministerium sein, das sich auf unsere militärisch-industriellen Projekte konzentriert. Langfristig könnte die Arbeitsbelastung weitere Abteilungen des Ministeriums erfordern."
 SOV_anti_fascist_diplomacy:0 "Antifaschistische Diplomatie"
 SOV_anti_fascist_diplomacy_desc:0 "Obwohl alle westlichen Regime repressiv und korrupt sind, gibt es keine schlimmeren als diejenigen, die vorgeben, fortschrittlich oder gar sozialistisch zu sein! Indem sie ein solches falsches Bewusstsein im Proletariat fördern, versuchen sie, die Revolution zu verzögern und die Arbeiter in ewiger Knechtschaft zu halten."
 SOV_operation_zet:0 "Operation Zet"
 SOV_operation_zet_desc:0 "Obwohl die Kuomintang reaktionär ist, erscheint es unwahrscheinlich, dass Mao und seine Variante des Kommunismus in China die Oberhand gewinnen werden. Wir sollten uns bemühen, die Beziehungen zu Chiang zu verbessern; das lächerlich anachronistische Kaiserreich Japan wird ohnehin bald zusammenbrechen."
 SOV_annex_tannu_tuva:0 "Annex Tannu Tuva"
 SOV_annex_tannu_tuva_desc:0 "Obwohl es wirtschaftlich kaum eine Rolle spielt, sollten wir aus politischen Gründen die Volksrepublik Tannu Tuva formell als autonome Oblast innerhalb der Sowjetunion annektieren."
 SOV_improve_stalin_line:0 "Verbessern Sie die Stalin-Linie"
 SOV_improve_stalin_line_desc:0 "Unsere Westgrenze muss besser vor faschistischer Aggression geschützt werden. Die Stalin-Linie sollte verlängert und modernisiert werden."
 SOV_far_east_fortification:0 "Fernöstliche Festung"
 SOV_far_east_fortification_desc:0 "Die Japaner dringen ständig über die Grenze zur Mandschurei vor. Wir müssen unsere Verteidigung entlang dieser Grenze verbessern, um sie dauerhaft abzuschrecken."
 SOV_far_east_fortification_forts_1:0 "Fügen Sie §Y6 Landfestungen§! an der japanischen Grenze hinzu.\n"
 SOV_far_east_fortification_forts_2:0 "Fügen Sie §Y8 Landfestungen§! an der japanischen Grenze hinzu.\n"
 SOV_far_east_fortification_forts_3:0 "Fügen Sie §Y4 Landfestungen§! an der japanischen Grenze hinzu.\n"
 SOV_xian_incident:0 "Xi&#39;an-Vorfall"
 SOV_xian_incident_desc:0 "Durch unsere Kontakte mit prominenten Vertretern der Kuomintang sollte es uns gelingen, Chiang Kai-Shek zu entführen und ihn zu zwingen, die Macht mit Mao zu teilen. Damit würden wir ihren zerstörerischen Streit effektiv beenden und China könnte den Raubzügen Japans besser widerstehen."
 SOV_xian_incident_tt:0 "Wenn beide Parteien zustimmen, wird ein Waffenstillstand zwischen dem nationalistischen und dem kommunistischen China erzwungen."
 SOV_anti_capitalist_diplomacy:0 "Antikapitalistische Diplomatie"
 SOV_anti_capitalist_diplomacy_desc:0 "Die größten Hindernisse für eine globale Revolution sind zweifellos die fetten Banker der USA und die rücksichtslosen kolonialistischen Unterdrücker Großbritanniens. Unser oberstes Ziel muss es sein, ihnen auf die gierigen Hände zu klopfen und ihre liberale Propaganda zu untergraben."
 SOV_expand_red_fleet:0 "Erweitern Sie die Rote Flotte"
 SOV_expand_red_fleet_desc:0 "Die Rote Flotte ist im Vergleich zu den Marinen der imperialistischen Mächte erbärmlich schwach. Wir müssen ihren Ausbau zu einer nationalen Priorität machen!"
 SOV_anti_colonialist_rebels:0 "Die Komintern"
 SOV_anti_colonialist_rebels_desc:0 "Da das kapitalistische System in die Phase des endgültigen Zusammenbruchs eintritt, muss die richtige Haltung aller kommunistischen Parteien eine äußerst aggressive, militante und ultralinke Linie sein. Insbesondere fordern wir die kommunistischen Parteien der Welt auf, ihre Energien der Zerstörung der gemäßigten Linken zu widmen."
 SOV_southern_thrust:0 "Südlicher Schub"
 SOV_southern_thrust_desc:0 "Durch die Annexion des Iran und des Irak würden sowohl deren riesige Ölreserven für die Revolution gesichert als auch direkter Druck auf die britischen Imperialisten in Ägypten und Indien ausgeübt."
 SOV_reconcile_japan:0 "Japan versöhnen"
 SOV_reconcile_japan_desc:0 "Unsere Beziehungen zu Japan waren schon immer problematisch, aber es gibt Wichtigeres zu tun. Indem sie den Mangel an natürlichen Ressourcen ausnutzen, könnten die Japaner an der Nase herumgeführt werden ... Ihr anachronistisches Feudalregime wird ohnehin bald fallen."
 SOV_claim_on_sinkiang:0 "Anspruch Sinkiang"
 SOV_claim_on_sinkiang_desc:0 "Unter der Herrschaft von Genosse Sheng Shicai ist Sinkiang praktisch bereits ein sowjetischer Marionettenstaat. Wir sollten es offiziell machen ..."
 SOV_claim_on_sinkiang_threat:0 "Sowjetische Beanspruchung von Sinkiang"
 SOV_pan_slavic_rhetoric:0 "Panslawische Rhetorik"
 SOV_pan_slavic_rhetoric_desc:0 "Genosse Lenin ging zu weit, als er im Streben nach der Weltrevolution seine russische, slawische Identität aufgab. Ein gewisses Maß an Nationalismus sollte uns gut tun, und die Wiederbelebung einer Art Panslawismus könnte uns helfen, den anderen slawischen Nationen näher zu kommen."
 SOV_claims_on_baltic:0 "Ansprüche in der Ostsee"
 SOV_claims_on_baltic_desc:0 "Peter der Große hatte Recht, als er Zugang zu den Häfen im Westen suchte. Die baltischen Staaten, die nach der Revolution verloren gingen, sollten wieder in die Sowjetunion integriert werden."
 SOV_claim_bessarabia:0 "Anspruch auf Bessarabien"
 SOV_claim_bessarabia_desc:0 "Das Schwarze Meer ist für unsere Wirtschaft sogar noch wichtiger als die Ostsee. Wir müssen alles tun, um die Kontrolle über den Bosporus und die Dardanellen zu sichern."
 SOV_claims_on_turkey:0 "Ansprüche an die Türkei"
 SOV_claims_on_turkey_desc:0 "Die Türken haben nicht nur unsere Forderungen nach einer gemeinsamen Kontrolle des Bosporus konsequent abgelehnt, sie weigern sich auch, über Grenzanpassungen im Osten zu diskutieren. Vielleicht ist es an der Zeit, ihnen eine Lektion zu erteilen!"
 SOV_baltic_security:0 "Baltische Sicherheit"
 SOV_baltic_security_desc:0 "Die Ostsee ist unser Vorgarten und muss um jeden Preis geschützt werden. Karelien muss erobert werden, um Leningrad eine sichere Pufferzone zu geben, und die Selbstverwaltung Estlands ist einfach lächerlich!"
 SOV_claims_on_poland:0 "Ansprüche an Polen"
 SOV_claims_on_poland_desc:0 "Die Inkompetenz und Peinlichkeit des sowjetisch-polnischen Krieges muss gerächt und Ostpolen wieder in die UdSSR integriert werden!"
 SOV_demand_eastern_poland:0 "Nachfrage Ostpolen"
 SOV_demand_eastern_poland_desc:0 "Nachdem wir unser Recht auf die östlichen Gebiete Polens bekräftigt haben, sollten wir klarstellen, dass sich Polen nur durch eine friedliche Übergabe dieser Gebiete vor einer weiteren Teilung retten kann."
 SOV_offer_poland_protection:0 "Bieten Sie Polen Schutz"
 SOV_offer_poland_protection_desc:0 "Obwohl wir Ostpolen einfach erobern könnten, wäre es viel besser, wenn Polen sich unserer Komintern anschließen würde. Allerdings müssten wir ihnen für unsere Ansprüche etwas bieten. Wenn wir ihnen Ostdeutschland versprechen, könnten sie Interesse haben."
 SOV_offer_poland_protection_tt:0 "§YPolen werden im Falle einer sowjetischen Eroberung die durch dieses Abkommen beanspruchten Staaten zugesprochen.§!\n"
 SOV_great_purge:0 "Die große Säuberung"
 SOV_great_purge_bypass_tt:0 "Trotzki wird zum Führer der Sowjetunion"
 SOV_great_purge_desc:0 "Unter den Offizieren, sogar in den höchsten Rängen, braut sich eine gefährliche trotzkistische Verschwörung zusammen. Obwohl Trotzkis persönliche Beteiligung unbekannt bleibt, ist die Bedrohung groß. Die UdSSR könnte sogar in einen weiteren Bürgerkrieg gestürzt werden ... es sei denn, wir sind bereit, ein paar Eier zu zerschlagen."
 SOV_great_purge_tt:0 "Es wird eine Reihe von „Schauprozessen“ geben, um mutmaßliche trotzkistische Minister und Führer aus dem Amt zu säubern.\n"
 SOV_great_purge_tt2:2 "Die Anzahl der durchgeführten Säuberungen beeinflusst die Wahrscheinlichkeit eines erneuten Bürgerkriegs und skaliert die Auswirkungen von „Gesäuberte Offiziere“. \nWenn dieser Schwerpunkt nicht gewählt wird, führt dies zu einem Bürgerkrieg und möglicherweise zur Rückkehr von „Leon Trotzki“ aus dem Exil. \n\n"
 SOV_permanent_revolution:0 "Permanente Revolution"
 SOV_permanent_revolution_tt:0 "Trotzki ist zurückgekehrt"
 SOV_permanent_revolution_tt2:0 "§YTrotzki§! erhält eine bessere Anführereigenschaft."
 SOV_permanent_revolution_desc:0 "Der unterdrückerische Demagoge ist verschwunden! Die wahre Macht ist dem Volk unserer Nation zurückgegeben worden. Jeder kann nun seine Interessen unabhängig und kompromisslos verfolgen. Wir verändern uns ständig. Die permanente Revolution ist eine triumphale Revolution."
 SOV_rehabilitated_military:0 "Rehabilitiertes Militär"
 SOV_rehabilitated_military_desc:0 "Wenn der Makel des Trotzkismus endlich aus dem Offizierskorps gesäubert wäre, wäre es vielleicht möglich, dem Militär wieder eine gewisse Freiheit von politischer Einmischung zu gewähren."
 SOV_military_reorganization:0 "Militärische Reorganisation"
 SOV_military_reorganization_desc:0 "Die Säuberung hat das Militär in keinem guten Zustand hinterlassen. Die neue Führung ist unerfahren und ineffektiv, und es wurde keine Arbeit an der Weiterentwicklung unserer Doktrin geleistet. Wir müssen diesen Zustand sofort korrigieren!"
 SOV_nkvd_primacy:0 "NKWD-Vorrang"
 SOV_nkvd_primacy_desc:0 "Das Militär hat gezeigt, dass man ihm niemals trauen kann. Deshalb muss der NKWD ausgebaut und mit mehr Macht ausgestattet werden. Außerdem müssen mehr politische Kommissare die Offiziere im Auge behalten."
 SOV_nkvd_divisions:0 "NKWD-Abteilungen"
 SOV_nkvd_divisions_desc:0 "Dem NKWD sollten einige eigene Divisionen zur Verfügung gestellt werden, die als interne Truppen fungieren und Eisenbahnen und wichtige Einrichtungen schützen."
 SOV_lessons_of_war:0 "Lehren des Krieges"
 SOV_lessons_of_war_desc:0 "Mit den Erfahrungen aus begrenzten Kriegen sollten wir in der Lage sein, einige Durchbrüche in der Panzerkriegsführung zu erzielen und vielleicht sogar das dezimierte Offizierskorps endlich wieder auf Vordermann zu bringen!"
 SOV_smersh:0 "SMERSH"
 SOV_smersh_desc:0 "SMERSH oder „Tod den Spionen“ ist eine geplante Spionageabwehrinitiative, die einem doppelten Zweck dienen soll: der Aufspürung feindlicher Spione und der Hinrichtung von Deserteuren und Partisanen in den Reihen der Roten Armee."
 SOV_smersh_tt:0 "§YBeseitigt das Risiko eines Putsches.§!\n"
 SOV_partisan_suppression:0 "Partisanenunterdrückung"
 SOV_partisan_suppression_desc:0 "SMERSH sollte erweitert werden, um alle Formen parteiischer Aktivitäten in besetzten Gebieten besser infiltrieren und rücksichtslos unterdrücken zu können."
 SOV_war_with_germany:0 "Krieg mit Deutschland"
 SOV_war_with_germany_desc:0 "Die deutsche Bedrohung wächst weiter. Wir können und müssen die deutsche Armee vernichten und sie ihren neuen Oberherren unterwerfen."
 SOV_war_with_germany_tt:0 "Molotow-Ribbentrop-Pakt nicht in Kraft"
 SOV_war_with_japan:0 "Krieg mit Japan"
 SOV_has_not_officers_purged_tt:0 "Hat keinen Nationalgeist §YOffiziere gesäubert§!"
 SOV_war_with_japan_desc:0 "Es scheint, als hätten die Japaner nicht vor, nachzugeben. Die einzige wirksame Abschreckung ist der Krieg. Sie werden es bereuen, unseren Forderungen widerstanden zu haben, wenn die Rote Armee sie niedertrampelt."
 SOV_war_with_uk:0 "Krieg mit Großbritannien"
 SOV_war_with_uk_desc:0 "Die imperialistischen Briten haben uns nie respektiert. Es besteht kein Zweifel, dass sie sich der Sowjetunion zuwenden werden, wenn sie mit dem Rest der Welt fertig sind. Es gibt nur einen Weg, ihre aggressive Expansion zu verhindern: Krieg!"
 SOV_claim_on_the_straits:0 "Beanspruchen Sie die Meerenge"
 SOV_claim_on_the_straits_desc:0 "Die Meerenge vom Schwarzen Meer zur Ägäis ist ein strategisch wichtiger Punkt. Wir können nicht zulassen, dass dieses Gebiet von ausländischen Mächten kontrolliert wird. Um die Bedeutung der Roten Flotte zu gewährleisten, müssen wir die Meerenge sichern."
 SOV_ultimatum_to_greece:0 "Ultimatum an Griechenland"
 SOV_ultimatum_to_greece_desc:0 "Die Ägäischen Inseln sind das letzte strategische Puzzlestück, das wir brauchen, um sicherzustellen, dass die Rote Flotte ungehindert operieren kann. Die Griechen stehen von allen Seiten unter Druck und würden höchstwahrscheinlich ein kleines Gebiet aufgeben, um einen offenen Krieg zu vermeiden."
 SOV_diversify_the_programme:0 "Diversifizieren Sie das Programm"
 SOV_diversify_the_programme_desc:0 "Wir haben in den letzten Jahren viel gelernt und in der traditionellen Kriegsführung Fortschritte erzielt. Wir sind eine Nation großartiger Wissenschaftler, die in der Lage sind, Kriegsmethoden zu entwickeln, die enorme Vorteile bieten. Wenn wir Ergebnisse sehen wollen, müssen wir sicherstellen, dass sie optimale Arbeitsbedingungen vorfinden."
 SOV_research_city_experiment:0 "Forschungsstadt-Experiment"
 SOV_research_city_experiment_desc:0 "Einer unserer führenden Wissenschaftler, Kurchatov, stellte fest, dass beim Zerbrechen der Kerne eines Kilogramms Uran die freigesetzte Energie der Explosion von 20.000 Tonnen Uran entsprechen muss. Wir müssen diese Kraft nutzen, um unseren Feinden das Überleben unseres Vaterlandes zu sichern."
 SOV_closed_city_network:0 "Geschlossenes Stadtnetzwerk"
 SOV_closed_city_network_desc:0 "Wir sollten geschlossene Städte für Forschungszwecke errichten, die mehr Platz benötigen, als uns in unseren Militärbasen zur Verfügung steht. Der eingeschränkte Zugang zu den Städten stellt sicher, dass unsere Forschung geheim bleibt, und bietet unseren Wissenschaftlern gleichzeitig ausreichend Platz für groß angelegte Experimente."
 strike_usa_focus:0 "Schlagt die USA!"
 strike_usa_focus_desc:0 "Die perfiden Amerikaner haben uns in ihrer Gewalt und kontrollieren unsere Versorgung mit Öl und anderen dringend benötigten Ressourcen. Ihre Industrie ist unserer weit überlegen, also sollten wir, wenn wir zuschlagen, mit aller Härte zuschlagen! Wir können nicht hoffen, einen längeren Krieg gegen die USA zu gewinnen …"
 chinese_puppet_focus:0 "Chinesische Marionette"
 chinese_puppet_focus_desc:1 "China hat bewiesen, dass es einen Krieg mit uns vermeiden will. Vielleicht hält die chinesische Führung die interne Spaltung für eine größere Bedrohung. Als Untertanen der Großostasiatischen Wohlstandssphäre könnten wir ihnen Schutz vor Kommunisten und Kriegsherren bieten."
 chinese_war_focus:0 "Krieg mit China"
 chinese_war_focus_desc:0 "Der Vorfall an der Marco-Polo-Brücke hat gezeigt, dass die Chinesen nicht an einer Zusammenarbeit interessiert sind. Angesichts der zunehmenden Spannungen, die den bevorstehenden Waffenstillstand gefährden, könnte Krieg die einzige Möglichkeit sein, die chinesische Nation zur Ruhe zu bringen."
 subdue_warlords_focus:0 "Unterwerfe die Kriegsherren"
 subdue_warlords_focus_desc:0 "Die Chinesen haben zugelassen, dass ihr einst stolzes Reich von Radikalen und Militärcliquen zerschlagen und in Stücke gerissen wurde. Das Kaiserreich Japan wird solche Spaltungen nicht dulden, nicht einmal innerhalb seiner Untertanen."
 oust_germans_focus:0 "Trennung der deutsch-chinesischen Beziehungen"
 oust_germans_focus_desc:0 "Deutsche Militärberater sind seit mindestens den 1920er Jahren in China präsent und unterstützen die Kuomintang maßgeblich. Das kann nicht länger toleriert werden. Wir haben das Recht, den sofortigen Entzug jeglicher deutscher Unterstützung für die Chinesen zu fordern. Es ist Zeit für die Deutschen, sich für eine Seite zu entscheiden."
 found_own_faction_focus:0 "Unsere Fraktion gegründet"
 found_own_faction_focus_desc:1 "Wir haben bereits Anstrengungen zur Schaffung einer gemeinsamen Wohlstandssphäre in Ostasien unternommen. Um einen dauerhaften Sieg zu sichern, muss Japan stark genug sein, um in Asien und darüber hinaus allein die Führung zu übernehmen."
 axis_leanings_focus:0 "Achsenneigungen"
 axis_leanings_focus_desc:0 "Wir haben viele gemeinsame Interessen und Werte mit dem neuen Deutschland, das in Europa eine Machtbasis aufbaut. Ein Bündnis mit Deutschland würde uns einen mächtigen Freund bescheren, der weit genug entfernt ist, um unserer Herrschaft über Asien nicht Konkurrenz zu machen."
 subvert_india_focus:0 "Indische Nationalarmee"
 subvert_india_focus_desc:0 "Wenn Großbritannien unsere Bemühungen, ein Imperium aufzubauen, beurteilt, werden wir ihnen zeigen, dass ihr eigenes bereits zerfällt. Indische Kriegsgefangene und Auswanderer werden die Grundlage einer Bewegung bilden, die das britische Raj stürzen kann."
 jap_improved_sprit_focus:0 "Verbesserter Nationalgeist"
 jap_improved_sprit_focus_desc:0 "Nationalstolz und Unterstützung für den Krieg überkommen alle Untertanen des Kaisers und treiben sie zu immer größerer Hingabe!"
 befriend_siam_focus:0 "Freunde dich mit Siam an"
 befriend_siam_focus_desc:0 "Siam hat die europäische Kolonisierung vermieden und ist es nicht gewohnt, ein unterworfenes Land zu sein. Anstatt es zu unterwerfen, sollten wir es davon überzeugen, mit uns zu kooperieren, damit es so bleibt."
 army_primancy_focus:0 "Vorrang der Armee"
 army_primancy_focus_desc:0 "Von den beiden Hauptwaffengattungen ist die Armee der starke rechte Arm des Imperiums! Ihre Fähigkeit, Gebiete zu erobern und zu halten, übertrifft die kleineren Leistungen der Marine bei weitem. Wenn man diese einfache, selbstverständliche Tatsache erkennt und der Armee mehr Ressourcen zur Verfügung stellt, sind die Möglichkeiten grenzenlos."
 JAP_army_primancy_focus_bypass_tt:0 "Nicht genügend Bauplätze für §YMilitärfabriken§! im Heimatgebiet."
 jap_sia_love:0 "Japanisch-siamesische Diplomatie"
 jap_sia_love_desc:0 "Japan hat seine diplomatischen Bemühungen auf die Verbesserung der Beziehungen zu Siam konzentriert."
 navy_primancy_focus:0 "Vorrang der Marine"
 JAP_navy_primancy_focus_bypass_tt:0 "Nicht genügend Bauplätze für §YNaval Dockyards§! im Heimatgebiet."
 navy_primancy_focus_desc:0 "Von den beiden Hauptwaffengattungen ist die Marine der starke rechte Arm des Imperiums! Ihre Fähigkeit, die Meere zu kontrollieren, übertrifft die kleineren Aufgaben des Heeres bei weitem. Wenn man diese einfache, selbstverständliche Tatsache anerkennt und der Marine mehr Ressourcen zur Verfügung stellt, sind die Möglichkeiten grenzenlos."
 army_innovations_focus:0 "Armeeinnovation"
 army_innovations_focus_desc:0 "Da die Armee nun die anerkannte wichtigste Streitkraft des Imperiums ist, ist es unsere Pflicht, mehr Ressourcen für das Studium der Landdoktrinen aufzuwenden."
 army_air_innovations_focus:0 "Army Air Innovation"
 army_air_innovations_focus_desc:0 "Die Hauptaufgabe der Luftwaffe muss die Unterstützung unserer gerühmten Armee sein!"
 army_motorization_focus:0 "Armeemotorisierung"
 army_motorization_focus_desc:0 "Eine stärkere Konzentration auf die Motorisierung wird die Geschwindigkeit erhöhen, mit der die Infanterie das Schlachtfeld erreichen kann, zumindest in Gebieten mit guten Straßen."
 air_base_expansion_focus:0 "Erweiterung des Luftwaffenstützpunkts"
 air_base_expansion_focus_desc:0 "Um unsere Armee besser unterstützen zu können, benötigt die Luftwaffe größere Luftwaffenstützpunkte."
 armor_innovations_focus:0 "Rüstungsinnovation"
 armor_innovations_focus_desc:0 "Angesichts des Aufstiegs unserer Armee haben einige Generäle vorgeschlagen, dass wir in eine Reihe moderner Panzerfahrzeuge investieren."
 naval_innovations_focus:0 "Marineinnovationen"
 naval_innovations_focus_desc:0 "Da die Marine nun die anerkannte wichtigste Streitkraft des Imperiums ist, ist es unsere Pflicht, mehr Ressourcen für die Entwicklung neuer Schiffsklassen aufzuwenden."
 naval_air_innovations_focus:0 "Marineluftinnovationen"
 naval_air_innovations_focus_desc:0 "Die Hauptaufgabe der Luftwaffe muss die Unterstützung unserer gerühmten Marine sein!"
 convoy_protection_focus:0 "Konvoischutz"
 convoy_protection_focus_desc:0 "Obwohl es sich um eine feige und unehrenhafte Taktik handelt, ist es möglich, dass feindliche Nationen die Handelsschiffe angreifen, die Vorräte und Ressourcen in unserem Reich transportieren. Wir müssen untersuchen, wie wir diese Schiffe in diesem Fall am besten schützen können."
 advanced_torpedoes_focus:0 "Fortgeschrittene Torpedos"
 advanced_torpedoes_focus_desc:0 "Durch die Verwendung von komprimiertem Sauerstoff anstelle von Druckluft in den Antriebssystemen können unsere Torpedos größere Reichweiten erreichen und einen größeren Sprengkopf tragen als alle bisherigen Typen."
 shbb_focus:0 "Superschwere Schlachtschiffe"
 shbb_focus_desc:0 "Kurzfristig ist es unwahrscheinlich, dass wir Großbritannien oder die USA in puncto Schlachtschiffezahl übertreffen können, aber das ist vielleicht auch gar nicht nötig. Stattdessen könnten wir möglicherweise weitaus mächtigere Schlachtschiffe bauen, als es der Washingtoner Vertrag den Westlern erlaubt."
 naval_base_focus:0 "Erweiterung des Marinestützpunkts"
 naval_base_focus_desc:0 "Der Ausbau der Marine erfordert mehr Marinestützpunkte."
 carrier_focus:0 "Carrier-Fokus"
 carrier_focus_desc:0 "Japan braucht eine schlagkräftige Marine, und der Flugzeugträger muss das Herzstück unserer Flotte bilden. Die Zeit der Schlachtschiffe ist gezählt, wie unsere Feinde bald feststellen werden!"
 battleship_focus:0 "Schlachtschiff-Fokus"
 battleship_focus_desc:0 "Japan braucht eine schlagkräftige Marine, und das Schlachtschiff muss das Herzstück unserer Flotte bilden. Andere Nationen sollen ihren Reichtum nicht für unerprobte Flugzeugträger verschwenden, denn nur Schlachtschiffe können die Meere beherrschen!"
 spiritual_mobilization_focus:0 "Spirituelle Mobilisierung"
 spiritual_mobilization_focus_desc:0 "Unsere gesamte Nation, nicht nur unsere Soldaten, muss geistig auf den Krieg vorbereitet werden. Zu diesem Zweck haben sich Nationalisten in der Nationalen Bewegung für spirituelle Mobilisierung zusammengeschlossen, um den Patriotismus und die Unterstützung für die Regierung zu stärken."
 warrior_traditions_focus:0 "Kriegertraditionen"
 warrior_traditions_focus_desc:0 "Im Laufe der Geschichte hat Japan innerhalb der Kriegerklasse einzigartige Traditionen bewahrt. Diese Werte müssen von jedem Soldaten, unabhängig von seinem Rang, wiederbelebt und geschätzt werden."
 divine_wind_focus:0 "Der göttliche Wind"
 divine_wind_focus_desc:0 "Von jedem Soldaten wird erwartet, dass er der Aussicht auf den Tod furchtlos ins Auge blickt, doch unser Volk muss darüber hinausgehen und sich darauf vorbereiten, sich ohne Hoffnung aufs Überleben zum Ruhm des Kaisers und der Nation zu opfern."
 imperial_glory_focus:0 "Kaiserlicher Ruhm"
 imperial_glory_focus_effect:0 "Ermöglicht die Produktion von §HYokosuka MXY7 Ohka§!"
 imperial_glory_focus_desc:0 "Kamikaze, die Taktik der Spezialangriffseinheit, hat Selbstmordanschläge von einer improvisierten letzten Maßnahme zu einer etablierten Doktrin gemacht. Mit neuen Flugzeugen, im Wesentlichen bemannten Raketen, werden diese Angriffe unaufhaltsam sein."
 student_movement_focus:0 "Die Studentenbewegung"
 student_movement_focus_desc:0 "Das Bildungsministerium ist ein ebenso wichtiger Teil der spirituellen Mobilisierung wie jeder andere, und wenn sich Pädagogen und Schüler hinter die Nation stellen, wird ein dauerhaftes, militärisch orientiertes Bildungssystem aufgebaut."
 extra_tech_focus:0 "Zusätzliche Forschung"
 synth_oil_focus:0 "Fokus auf synthetisches Öl"
 synth_oil_focus_desc:0 "Unsere eigene Ölproduktion ist sehr begrenzt und der Import von Öl macht uns von ausländischen Interessen abhängig. Die sicherste Lösung wäre die Perfektionierung unserer synthetischen Öltechnologie."
 JAP_synth_oil_focus_tt:0 "Idemitsu Kosan als Industriekonzern verfügbar"
 secret_weapon_focus:0 "Fortgeschrittene Waffen"
 secret_weapon_focus_desc:0 "Als Inselreich müssen wir in der Marineforschung immer an vorderster Front stehen, aber auch Langstreckenraketen können nicht schaden."
 industrial_effort_focus:0 "Imperiale Sparmaßnahmen"
 industrial_effort_focus_desc:0 "Jeder Untertan des Kaisers muss für das Wohl des Reiches Opfer bringen."
 industrial_effort_focus2:0 "Industrielle Anstrengungen"
 industrial_effort_focus2_desc:0 "Japan ist ein junges Industrieland und noch nicht so mächtig wie manche westliche Nationen. Wir müssen Maßnahmen ergreifen, um die Lücke zwischen unseren Fähigkeiten zu schließen."
 infra_effort_focus:0 "Infrastrukturaufwand"
 infra_effort_focus_desc:0 "Es war nicht einfach, in unserem bergigen Land eine Infrastruktur aufzubauen, dennoch müssen die Bemühungen fortgesetzt werden."
 fortress_japan_focus:0 "Festung Japan"
 fortress_japan_focus_desc:0 "Sollten unsere Feinde unsere Marine jemals überwältigen, werden unsere Befestigungen dafür sorgen, dass jeder Invasionsversuch weitaus mehr kostet, als sich die meisten Nationen leisten können."
 crypto_bomb_focus:0 "Kryptologische Bombe"
 crypto_bomb_focus_desc:0 "Die Polen haben eine geniale Maschine entwickelt, die sie „Kryptologische Bombe“ nennen und die deutsche Enigma-Chiffre knacken kann. Wir verfügen in unserem Werk in Bletchley Park über die nötigen Ressourcen, um sie weiterzuentwickeln."
 tizard_mission_focus:0 "Die Tizard-Mission"
 tizard_mission_focus_desc:0 "Wir haben viele technologische Durchbrüche erzielt, die wir aufgrund mangelnder Ressourcen und industrieller Kapazitäten nicht vollständig ausschöpfen können. Henry Tizard möchte eine Delegation anführen, die mit den USA über einen Technologieaustauschvertrag verhandelt."
 maud_focus:0 "Das MAUD-Komitee"
 maud_focus_desc:0 "Das Komitee „Militärische Anwendung der Uran-Detonation“ ist davon überzeugt, dass es theoretisch möglich ist, durch den Einsatz von Uran eine Bombe mit unglaublicher Sprengkraft zu bauen, die eine unkontrollierte Kernspaltung ermöglicht. Allerdings werden wir diese Technologie möglicherweise nicht rechtzeitig aus eigener Kraft entwickeln können. Wir sollten mit den Amerikanern sprechen."
 general_rearmament_focus:0 "Allgemeine Wiederbewaffnung"
 general_rearmament_focus_desc:1 "[Root.GetGeneralRearmamentDesc]"
 ENG_GENERAL_REARMAMENT_DESC_HISTORICAL:0 "Es sieht langsam so aus, als sei ein weiterer Weltkrieg unvermeidlich. Wenn es nicht Hitler ist, wird es der Mikado sein, oder sogar die Sowjets... Die öffentliche Meinung hat sich so weit gewandelt, dass wir ein Programm zur allgemeinen Wiederaufrüstung einleiten können."
 ENG_GENERAL_REARMAMENT_DESC_AHISTORICAL:0 "Unsere Vorgänger haben unsere militärische Lage zu sehr vernachlässigt. Wir müssen ein Programm zur allgemeinen Wiederaufrüstung einleiten, um die eklatanten Mängel unserer Streitkräfte zu beheben."
 air_defense_focus:0 "Flugabwehr"
 air_defense_focus_tt:1 "Maximale §YLuftabwehr§! in §YOstengland§!, §YSussex§! und §YSüdwestengland§! hinzufügen."
 air_defense_focus_bypass_tt:0 "Nicht genügend Bauplätze für §YLuftabwehr§!"
 air_defense_focus_desc:0 "Es besteht keine Frage, woher der Feind kommen wird; wir müssen die Küste mit ausgedehnten Flugabwehrbatterien schützen."
 radar_focus:0 "RADAR"
 radar_focus_desc:0 "Die Fähigkeit, feindliche Bomber zu erkennen, wird für die Kriegsanstrengungen von entscheidender Bedeutung sein. Wir sollten keine Ressourcen scheuen, um die Radartechnologie weiterzuentwickeln und ein Netzwerk von Ortungsstationen entlang der Küsten aufzubauen."
 royal_ordinance_focus:2 "[Root.GetRoyalOrdnanceFactoriesName]"
 royal_ordinance_focus_desc:1 "[Root.GetRoyalOrdnanceFactoriesDesc]"
 ENG_ROYAL_ORDNANCE_FACTORIES_NAME_HISTORICAL:0 "Königliche Waffenfabriken"
 ENG_ROYAL_ORDNANCE_FACTORIES_NAME_COMMUNIST:0 "Revolutionäre Waffenfabriken"
 ENG_ROYAL_ORDNANCE_FACTORIES_DESC_HISTORICAL:0 "Das Royal Arsenal in Woolwich ist völlig unzureichend, um die benötigte Munition und Kleinwaffen zu produzieren. Wir sollten im ganzen Land viele weitere Fabriken errichten, vorzugsweise in relativ sicheren Gebieten."
 ENG_ROYAL_ORDNANCE_FACTORIES_DESC_COMMUNIST:0 "Das Revolutionsarsenal in Woolwich ist völlig unzureichend, um die benötigte Munition und Kleinwaffen zu produzieren. Wir sollten im ganzen Land viele weitere Fabriken errichten, vorzugsweise in relativ sicheren Gebieten."
 shadow_scheme_focus:0 "Das Schattenschema"
 shadow_scheme_focus_desc:0 "Das Luftfahrtministerium hat einen brillanten Vorschlag vorgelegt, um die Umstellung ziviler Fabriken auf militärische Anlagen zu erleichtern. Mit entsprechenden Zuschüssen und Darlehen an verschiedene Schlüsselunternehmen können deren Fabriken im Voraus erweitert und angepasst werden, um den Übergang zu militärischen Anwendungen deutlich reibungsloser zu gestalten."
 shadow_scheme_focus_tt:1 "Gewährt bei Kriegseintritt insgesamt §G4§! Bauplätze und §Y4 Militärfabriken§! in zwei Staaten.\n"
 uk_small_arms_focus:0 "BSA Company"
 uk_small_arms_focus_desc:1 "[Root.GetBSACompanyDesc]"
 ENG_BSA_COMPANY_DESC_HISTORICAL:0 "Die Royal Ordnance Factories produzieren nicht genügend Kleinwaffen, aber wir könnten, wie im Ersten Weltkrieg, die Birmingham Small Arms Company beauftragen und ihre Kapazitäten erweitern."
 ENG_BSA_COMPANY_DESC_COMMUNIST:0 "Die Revolutionary Ordnance Factories produzieren nicht genügend Kleinwaffen, aber wir könnten, wie im Ersten Weltkrieg, die Birmingham Small Arms Company beauftragen und ihre Kapazitäten erweitern."
 UK_secret_focus:0 "Geheimwaffen"
 UK_secret_focus_desc:0 "Wir verfügen nun über das Wissen und die Infrastruktur, um uns auf die Entwicklung verschiedener Geheimwaffenprojekte zu konzentrieren, die früher in den Bereich der Science-Fiction gehörten."
 air_rearmament_focus:0 "Luftaufrüstung"
 air_rearmament_focus_desc:1 "[Root.GetAirRearmamentDesc]"
 ENG_AIR_REARMAMENT_DESC_HISTORICAL:0 "In jedem Krieg mit einem kontinentalen Feind ist die Royal Air Force der Schlüssel zum Sieg. Zunächst müssen wir sicherstellen, dass unsere Luftwaffenstützpunkte unsere Wiederaufrüstungspläne unterstützen können!"
 ENG_AIR_REARMAMENT_DESC_COMMUNIST:0 "In jedem Krieg mit einem kontinentalen Feind wird die Volksluftwaffe der Schlüssel zum Sieg sein. Zunächst müssen wir sicherstellen, dass unsere Luftwaffenstützpunkte unsere Wiederaufrüstungspläne unterstützen können!"
 fighter_command_focus:0 "Jagdkommando"
 fighter_command_focus_desc:0 "Unsere oberste Priorität muss die Kontrolle über unseren eigenen Luftraum sein! Es gibt kaum einen wichtigeren Bereich der militärischen Forschung als die Entwicklung von Kampfflugzeugen."
 bomber_command_focus:0 "Bomberkommando"
 bomber_command_focus_desc:0 "Wie Giulio Douhet immer sagte: „Der Bomber wird immer durchkommen!“ Ungeachtet der Fortschritte in der Radartechnologie und der Luftabwehr sollten wir der Entwicklung besserer Bomber Priorität einräumen."
 coastal_command_focus:0 "Küstenkommando"
 coastal_command_focus_desc:1 "[Root.GetCoastalCommandDesc]"
 ENG_COASTAL_COMMAND_DESC_HISTORICAL:0 "Unsere Industrie lebt von Rohstoffen, die aus weit entfernten Teilen des Empire nach Großbritannien geliefert werden. Unsere Konvois sind unser Lebenselixier und müssen sowohl von der Royal Navy als auch von der Royal Air Force geschützt werden. Wir sollten eine spezielle RAF-Formation einrichten, um die Zufahrten zu unseren Häfen zu schützen!"
 ENG_COASTAL_COMMAND_DESC_COMMUNIST:0 "Unsere Industrie wird von Rohstoffen angetrieben, die aus weit entfernten Teilen des Empire nach Großbritannien geliefert werden. Unsere Konvois sind unser Lebenselixier und müssen sowohl von der Arbeiterbefreiungsmarine als auch von der Volksluftwaffe geschützt werden. Wir sollten eine spezielle PAF-Formation aufstellen, um die Zufahrten zu unseren Häfen zu schützen!"
 aircraft_production_focus:0 "Flugzeugproduktionsgruppe"
 aircraft_production_focus_desc:0 "Die Flugzeugproduktion hat für uns weiterhin höchste Priorität. Die London Aircraft Production Group (LAPG) sollte gegründet werden, um die gesamte verfügbare Flugzeugproduktion zu verwalten und zu koordinieren."
 uk_jet_focus:0 "Düsenflugzeug"
 uk_jet_focus_desc:0 "Es scheint nahezu sicher, dass das Düsentriebwerk die Propellermotoren in Flugzeugen ersetzen wird. Das Potenzial ist enorm, und wir dürfen nicht zulassen, dass Großbritannien in diesem wichtigen Forschungsbereich den Anschluss verliert."
 naval_rearmament_focus:0 "Wiederbewaffnung der Marine"
 naval_rearmament_focus_desc:1 "[Root.GetNavalRearmamentDesc]"
 ENG_NAVAL_REARMAMENT_DESC_HISTORICAL:0 "Obwohl wir mit dem Zweiten Londoner Flottenvertrag versucht haben, ein Wettrüsten auf See zu verhindern, wird er selbst von den Unterzeichnern weitgehend ignoriert. Die Royal Navy darf ihre globale Vormachtstellung niemals verlieren. Wir müssen stets dafür sorgen, dass sie die größte der Welt bleibt."
 ENG_NAVAL_REARMAMENT_DESC_COMMUNIST:0 "Obwohl wir mit dem Zweiten Londoner Flottenvertrag versucht haben, ein Wettrüsten auf See zu verhindern, wird er selbst von den Unterzeichnern weitgehend ignoriert. Die Arbeiterbefreiungsmarine darf ihre globale Vormachtstellung niemals verlieren. Wir müssen stets dafür sorgen, dass sie die größte der Welt bleibt."
 uk_destroyer_focus:0 "Zerstörerfokus"
 uk_destroyer_focus_desc:0 "Moderne Schlachtschiffe sind Wunderwerke, aber wir dürfen die entscheidende Rolle der einfachen Zerstörer beim Schutz unserer Konvois nicht vernachlässigen."
 uk_convoy_focus:0 "Konvoi-Eskorte-Fokus"
 uk_convoy_focus_desc:0 "Es kann nicht genug betont werden: Unsere Konvois sind unser Lebenselixier. Wir müssen alles in unserer Macht Stehende tun, um sie zu schützen und verlorene Tonnage schnell zu ersetzen."
 uk_waves_focus:0 "Britannia beherrscht die Meere"
 uk_waves_focus_desc:1 "[Root.GetBritanniaRulesTheWavesDesc]"
 ENG_BRITANNIA_RULES_THE_WAVES_DESC_HISTORICAL:0 "Im langen Schatten der Royal Navy sind andere Seemächte gezwungen, innovative neue Doktrinen zu entwickeln, um dies auszugleichen. Wir dürfen nicht selbstgefällig werden und uns nur auf die Quantität und Qualität einzelner Schiffe verlassen."
 ENG_BRITANNIA_RULES_THE_WAVES_DESC_COMMUNIST:0 "Im langen Schatten der Arbeiterbefreiungsmarine sind andere Seemächte gezwungen, innovative neue Doktrinen zu entwickeln, um dies auszugleichen. Wir dürfen nicht selbstgefällig werden und uns nur auf die Quantität und Qualität einzelner Schiffe verlassen."
 uk_carrier_focus:0 "Carrier-Fokus"
 uk_carrier_focus_desc:0 "Unter Marinetheoretikern wird heftig über die weitere Überlebensfähigkeit des Schlachtschiffs gestritten. Manche argumentieren, dass die moderne Luftwaffe die Seemacht dominieren wird und dass der Flugzeugträger das Schlachtschiff als König der Weltmeere ablösen wird."
 uk_spain_focus:0 "Spanien zwingen"
 uk_spain_focus_desc:0 "Die Spanier kennen die Macht der Royal Navy besser als die meisten anderen, aber vielleicht ist eine Erinnerung angebracht …"
 uk_battleship_focus:0 "Schlachtschiff-Fokus"
 uk_battleship_focus_desc:0 "Während die Theoretiker über Luft- oder Seehoheit streiten, möchte niemand die Kanonen eines Schlachtschiffs auf seinen Palast gerichtet haben. Selbst wenn die Trägerenthusiasten am Ende Recht behalten, werden Schlachtschiffe die Weltmeere noch jahrelang beherrschen."
 uk_turkey_focus:0 "Die Türkei zwingen"
 uk_turkey_focus_desc:0 "Sie müssen uns nicht lieben, aber Johnny Turkey sollte genug wissen, um unsere Schlachtschiffe zu fürchten …"
 uk_amphibious_focus:0 "Amphibische Kriegsführung"
 uk_amphibious_focus_desc:0 "Die Meere zu beherrschen ist schön und gut, aber manchmal muss man auch mal die Füße nass machen. Wir dürfen unsere Fähigkeit, Invasionstruppen in feindlichem Gebiet zu landen, nicht vernachlässigen."
 singapore_focus:0 "Die Singapur-Strategie"
 singapore_focus_desc:0 "Singapur sollte unser wichtigster Marinestützpunkt im Osten bleiben. Hongkong könnte an die Japaner fallen, doch Singapur muss uneinnehmbar bleiben, bis die Hauptflotte eintrifft und den Feind entscheidend besiegt."
 sp_landward_forts_focus:0 "Landseitige Befestigungen"
 sp_landward_forts_focus_desc:0 "Die derzeitigen Verteidigungsanlagen auf der Insel Singapur sind unzureichend. Wir müssen unsere Anstrengungen auf die Verstärkung der Befestigungen konzentrieren!"
 peninsular_focus:0 "Halbinselkrieg"
 peninsular_focus_desc:0 "Wir sollten einem Feind zuvorkommen und ihn aufhalten, der aus dem Norden durch Malaya kommt, bevor er Singapur erreicht."
 hongkong_focus:0 "Halten Sie Hongkong"
 hongkong_focus_desc:0 "Die Singapur-Strategie ist überholt. Unser Plan sollte mutiger sein und auf einer Basis viel näher an Japan basieren. Mit ausreichenden Befestigungen und Einrichtungen wäre Hongkong dafür bestens geeignet!"
 hk_landward_forts_focus:0 "Landseitige Befestigungen"
 hk_landward_forts_focus_desc:0 "Hongkong muss zu einer Festungsstadt werden, um einem anhaltenden Angriff vom chinesischen Festland standzuhalten."
 hk_air_focus:0 "Luftabwehr"
 hk_air_focus_desc:0 "Wir müssen die Luftabwehrstellungen in Hongkong erheblich ausbauen und verbessern."
 uk_embargo_focus:0 "Embargo-Richtlinie"
 uk_embargo_focus_desc:0 "Der beste Weg, Diktatoren zu besiegen – egal ob rot oder braun – besteht darin, ihnen schlicht die Ressourcen zu entziehen, die sie für die Kriegsführung benötigen. Das Problem besteht lediglich darin, die Banker und Konzerne einzuschüchtern, die mit ihnen Geschäfte machen …"
 uk_sanction_italy_focus:0 "Sanktion Italien"
 uk_sanction_italy_focus_desc:0 "Mussolini träumt von einem neuen Römischen Reich und könnte, so absurd es auch klingen mag, eines Tages uns angreifen, um seinen Traum zu verwirklichen. Wir sollten alles tun, um dies zu verhindern, bevor es zum Krieg kommt."
 uk_sanction_japan_focus:0 "Sanktionen gegen Japan"
 uk_sanction_japan_focus_desc:0 "Die Japaner scheinen entschlossen, ihre „Großostasiatische Wohlstandssphäre“ zu schaffen – natürlich unter ihrer Hegemonie. Das Haupthindernis ist das Britische Empire, zusammen mit den Kolonien anderer westlicher Mächte. Ihnen muss der Zugang zu den benötigten Ressourcen verwehrt werden."
 uk_burma_focus:0 "Die Burma-Straße"
 uk_burma_focus_desc:0 "Wir sollten die Chinesen in ihrem Kampf gegen Japan unterstützen, indem wir eine Straße – und die dazugehörige Infrastruktur – zwischen Burma und China bauen, über die sie auf dem Landweg versorgt werden können und vor den japanischen Übergriffen sicher sind."
 uk_scandinavian_focus:0 "Skandinavische Intervention"
 uk_scandinavian_focus_desc:0 "Skandinavien hätte ohne die schwedischen Eisenexporte kaum strategische Bedeutung. Wir müssen Druck auf Schweden und Norwegen ausüben, um zu verhindern, dass diese wichtige Ressource nach Deutschland gelangt. Sollten sie sich weigern, müssen wir möglicherweise mit einer Invasion rechnen."
 uk_iraq_focus:0 "Sicherer Irak"
 uk_iraq_focus_desc:0 "Wir haben dem Irak 1932 die Unabhängigkeit gewährt, doch angesichts der aktuellen Weltlage könnte das ein Fehler gewesen sein. Irakisches Öl darf niemals unsere Feinde erreichen ..."
 uk_iran_focus:0 "Sicherer Iran"
 uk_iran_focus_desc:0 "Der Iran verfügt nicht nur über reiche Ölvorkommen, die unseren Feinden vorenthalten werden müssen, sondern ist auch ein strategischer Knotenpunkt zwischen Indien, dem Nahen Osten und der Sowjetunion."
 uk_free_india_focus:0 "Indische Unabhängigkeit"
 uk_free_india_focus_desc:0 "Japan schürt aktiv einen Aufstand in Indien und hat sogar eine „Nationale Indische Armee“ aus indischen Rekruten gebildet. Die Situation könnte gefährlich werden, wenn nichts dagegen unternommen wird. Wir können Japan entweder schnell besiegen oder den Indern die Unabhängigkeit in wenigen Jahren versprechen."
 uk_colonial_focus:0 "Ermutigung der Kolonialelite"
 uk_colonial_focus_desc:0 "Unser riesiges, weitläufiges Imperium beherbergt einige der größten Köpfe der Welt, doch aufgrund seiner Größe treffen sich viele von ihnen nie. Indem wir sie ermutigen, bei unseren wichtigsten Projekten zusammenzuarbeiten, können wir schneller Ergebnisse erzielen."
 uk_asia_focus:0 "Ostasien stärken"
 uk_asia_focus_desc:0 "Viele unserer alten Kolonien im Osten sind durch Bürgerkriege und imperiale Ambitionen lokaler Länder bedroht. Wir dürfen unsere verbleibenden Außenposten nicht vernachlässigen, sondern müssen diese Regionen weiterentwickeln, um unsere globale Präsenz zu sichern."
 uk_china_focus:0 "Einfluss China"
 uk_china_focus_desc:0 "Obwohl sich die chinesischen Nationalisten als Feinde unserer Kolonialbemühungen bezeichnen, befinden sie sich in einer Situation, in der sie zu wenige Verbündete haben. Wenn wir auf sie zugehen, sind sie möglicherweise bereit, ihre Politik zu ändern."
 uk_commonwealth_focus:0 "Commonwealth-Krawatten"
 uk_commonwealth_focus_desc:0 "Die Nationen des britischen Commonwealth sind durch ihre gemeinsame Treue zur Krone vereint und sind im Falle eines weiteren globalen Konflikts die erste Adresse, auf die wir zählen können. Die Sicherung unserer diplomatischen Verwaltung wird dort von entscheidender Bedeutung sein."
 uk_india_focus:0 "Entwickeln Sie das Raj"
 uk_india_focus_desc:0 "Der Zustand unserer Kolonien in Indien bleibt im In- und Ausland umstritten, doch was auch immer ihnen bevorsteht, die Stärkung ihrer industriellen Kapazitäten hat derzeit Priorität."
 northern_expansion_focus:0 "Nördliche Expansion"
 northern_expansion_focus_desc:0 "Die von der Kaiserlichen Armee unterstützte Nordexpansionsdoktrin erkennt an, dass die Sowjetunion die größte Bedrohung für die japanischen Ambitionen darstellt. Angesichts der zunehmenden Spannungen in Europa wird sich zwangsläufig ein günstiger Zeitpunkt für einen Angriff auf den russischen Fernen Osten ergeben. Wir müssen schnell zuschlagen."
 southern_expansion_focus:0 "Südliche Expansion"
 southern_expansion_focus_tt:0 "Füge §YNichtangriffspakt§! mit §YSowjetunion§! hinzu, wenn ausgewählt\n"
 southern_expansion_focus_desc:0 "Die von der Kaiserlichen Marine favorisierte Südexpansionsdoktrin schreibt Japans Expansion nach Südostasien und in den Pazifik vor. Die reichen Kolonien der europäischen Mächte verfügen über für die japanische Industrie wichtige Ressourcen. Doch dieser Weg würde zu Konflikten mit den USA führen. Ein Präventivschlag ist angebracht."
 new_ideas:0 "Neue Minister verfügbar.\n"
 available_political_advisor:0 "§GVerfügbar§! als §YPolitischer Berater§!:\n"
 available_chief_of_army:0 "§GAnbieten§! als §YOberbefehlshaber§!:\n"
 available_chief_of_navy:0 "§GAnbieten§! als §YChemeph der Marine§!:\n"
 available_chief_of_airforce:0 "§GAnbieten§! als §YChefechef§!:\n"
 available_military_high_command:0 "§GAnbietbar§! als §YMilitärisches Oberkommando§!:\n"
 available_theorist:0 "§GAvailable§! als §YTheoretiker§!:\n"
 available_designer:0 "§GVerfügbar§! als §YDesign Company§!:\n"
 available_industrial_concern:0 "§GAnbietbar§! als §YIndustriekonzern§!:\n"
 remove_political_advisor:0 "§RRemove§! as §YPolitical Advisor§!:\n"
 remove_chief_of_army:0 "§RRemove§! als §YChief of Army§!:\n"
 remove_chief_of_navy:0 "§RRemove§! als §YChief of Navy§!:\n"
 remove_chief_of_airforce:0 "§RRemove§! als §YChief of Airforce§!:\n"
 remove_military_high_command:0 "§RRemove§! als §YMilitary High Command§!:\n"
 remove_theorist:0 "§RRemove§! als §YTheoretiker§!:\n"
 usa_focus:0 "USA Nationaler Fokus"
 USA_issue_war_bonds:0 "Kriegsanleihen ausgeben"
 USA_issue_war_bonds_desc:0 "Mit Kriegsanleihen verlassen wir uns auf die Unterstützung der Bevölkerung für die Kriegsanstrengungen und den Patriotismus, um die Militärausgaben zu finanzieren."
 USA_office_of_strategic_services:0 "Büro für strategische Dienste"
 USA_office_of_strategic_services_desc:0 "Die Gründung eines eigenen Geheimdienstes wird nicht nur den Krieg unterstützen, sondern auch künftige Auslandseinsätze erleichtern. Britische Geheimdienste können als Vorbild dienen."
 USA_wartime_industry:0 "Kriegsindustrie"
 USA_wartime_industry_desc:0 "Wir verfügen über eine starke Industrie, doch nicht alle sind optimal auf die Produktion von Kriegsmaterial ausgerichtet. Die Entwicklung effizienter Prozesse zur Förderung dieses Wandels wird für die Nutzung unserer Ressourcen entscheidend sein."
 USA_first_special_service_force:0 "Erste Spezialeinheit"
 USA_first_special_service_force_desc:0 "Operationen hinter feindlichen Linien in unwirtlichem Gebiet werden Teil jedes globalen Konflikts sein. Die Bildung von Kommandoeinheiten, die diese Aufgaben erfüllen, ist für unsere zukünftige Kriegsführung von entscheidender Bedeutung."
 USA_rubber_reserve_company:0 "Gummireserve-Unternehmen"
 USA_rubber_reserve_company_desc:0 "Mit dem Ausbruch des Krieges sind uns fast alle unsere Quellen für importierten Kautschuk verloren gegangen.\n\nMit einer enormen koordinierten Anstrengung können die Kautschukunternehmen in den Vereinigten Staaten zusammenarbeiten, um bessere Möglichkeiten zur Herstellung von synthetischem Kautschuk zu finden und möglicherweise sogar den Bedarf der Kriegsanstrengungen zu decken."
 USA_manifest_destiny:0 "Manifest Destiny"
 USA_manifest_destiny_desc:0 "Die besonderen Umstände der Gründung und Geschichte unseres Landes berechtigen uns, gegen Ungerechtigkeit und Unterdrückung überall auf der Welt vorzugehen. Um eine sichere internationale Gemeinschaft zu schaffen, muss unser wichtigster Exportartikel die Freiheit sein."
 USA_manifest_destiny_tt:0 "§YGibt Kriegsziele gegen alle faschistischen und kommunistischen Nationen an.§!\n"
 USA_scientist_haven:0 "Zufluchtsort für Wissenschaftler"
 USA_scientist_haven_desc:0 "Nachdem wir uns als Hüter der Freiheit in der Welt etabliert haben, können wir Forscher und Intellektuelle, die aus den Unterdrückungsregimen im Ausland vertrieben wurden, willkommen heißen und ihnen eine Chance geben, erfolgreich zu sein und unsere Sache im Land der unbegrenzten Möglichkeiten zu unterstützen."
 USA_wpa:0 "WPA"
 USA_wpa_desc:0 "Millionen Menschen leiden noch immer unter der Arbeitslosigkeit, die die Weltwirtschaftskrise mit sich brachte. Eine Agentur, die diese Menschen in öffentlichen Projekten beschäftigt, wird das Problem vielleicht nicht vollständig lösen, aber die Work Progress Administration ist ein Schritt in die richtige Richtung."
 USA_committee_on_technocracy:0 "Ausschuss für Technokratie"
 USA_committee_on_technocracy_desc:0 "Wir sollten eine Reihe von Politikern und Geschäftsleuten durch Wissenschaftler und Ingenieure ersetzen. Sie verfügen über das technische Fachwissen, um die Wirtschaft zu steuern, und wir werden große wissenschaftliche Fortschritte erleben, die zu einem erneuten Aufschwung unserer Wirtschaft führen werden."
 USA_support_rock_island:0 "Unterstütze Rock Island"
 USA_support_rock_island_desc:0 "Der Schlüssel zum Sieg liegt darin, unsere tapferen Truppen mit allen Mitteln zu unterstützen. Sei es durch schweres Artilleriefeuer aus der Ferne oder durch direkte Unterstützung auf dem Schlachtfeld. Wir müssen sicherstellen, dass unsere Truppen alles haben, was sie brauchen."
 USA_military_construction:0 "Militärbau"
 USA_military_construction_desc:0 "Angesichts der Bedrohung des Weltfriedens durch Supermächte müssen unsere öffentlichen Bauprojekte sowohl militärischen als auch zivilen Zwecken dienen."
 USA_USACE_projects:0 "USACE-Projekte"
 USA_USACE_projects_desc:0 "Dem US Army Corps of Engineers wird die Aufgabe übertragen, die Grundlage für viele zukünftige Militärprojekte zu schaffen, wie sie die Welt noch nie gesehen hat. Essayons!"
 USA_arsenal_of_democracy:0 "Arsenal der Demokratie"
 USA_arsenal_of_democracy_desc:0 "Unabhängig davon, ob wir uns für eine direkte Intervention in einem Krieg entscheiden oder nicht, müssen demokratische Nationen wissen, dass wir sie bewaffnen und unterstützen werden."
 USA_liberty_ships:0 "Liberty-Schiffe"
 USA_liberty_ships_desc:0 "Unsere industriellen Entwicklungen müssen mit der Massenproduktion von Frachtschiffen einhergehen, um sicherzustellen, dass unsere Materialien und Truppen die Einsatzgebiete erreichen, in denen sie benötigt werden."
 USA_war_propaganda:0 "Kriegspropaganda"
 USA_war_propaganda_desc:0 "Unser Volk möchte seine Kinder nicht in einen weiteren Krieg schicken, um dort zu sterben. Dennoch sehen viele Politiker die Notwendigkeit einer Intervention. Propaganda, die den Feind dämonisiert und zum offenen Konflikt aufruft, ist möglicherweise nicht nur ein Werkzeug für Tyrannen."
 USA_war_plan_black:0 "Kriegsplan Schwarz"
 USA_war_plan_black_desc:0 "Es ist offensichtlich, dass die deutsche Politik und Expansionspolitik weit über jedes Maß an Vernunft hinausgehen. Sie müssen gestoppt werden, bevor ihre Kriegsmaschinerie den Punkt erreicht, an dem es kein Zurück mehr gibt."
 USA_embargo_germany:0 "Embargo Deutschland"
 USA_embargo_germany_desc:0 "Deutschland ist für seine Kriegsanstrengungen auf Öl und andere natürliche Ressourcen angewiesen. Ihm den Zugang zu diesen Ressourcen zu verwehren, ist das Mindeste, was wir tun können."
 USA_destroyers_for_bases:0 "Zerstörer für Stützpunkte"
 USA_destroyers_for_bases_desc:0 "Großbritannien braucht dringend Schiffe, und wir müssen unser Heimatgebiet schützen. Gegen das Recht, Militärstützpunkte in derzeit britischem Gebiet zu errichten, können wir einige Zerstörer eintauschen, die hoffentlich ebenfalls sinnvoll eingesetzt werden."
 USA_destroyers_for_bases_tt:0 "§Y[USA.GetNameDef]§!:0\n"
 USA_war_plan_white:0 "Kriegsplan Weiß"
 USA_war_plan_white_desc:0 "Wir dürfen nicht zulassen, dass sich die Rote Gefahr ungehindert ausbreitet. Ob von außen oder von innen, es gibt keine größere Bedrohung für unser Land und die Welt insgesamt."
 USA_embargo_USSR:0 "Embargo UdSSR"
 USA_embargo_USSR_desc:0 "Wenn wir der Sowjetunion die Handelsmöglichkeiten mit uns vorenthalten, werden wir ihre militärischen Bemühungen nicht mehr unterstützen und gleichzeitig beweisen, dass unser Wirtschaftsmodell überlegen ist."
 USA_war_plan_red:0 "Kriegsplan Rot"
 USA_war_plan_red_desc:0 "Nachdem es zunächst so aussah, als seien unsere alten Unterdrücker auf dem Weg, das Volk zu respektieren, stehen sie nun im Widerspruch zu dem Wind der Veränderung, den wir akzeptiert haben. Das Britische Empire zeigt sein wahres Gesicht. Wir müssen ihnen zeigen, wo wir stehen."
 USA_embargo_the_empire:0 "Embargo gegen das Imperium"
 USA_embargo_the_empire_desc:0 "Trotz langjähriger guter Beziehungen haben die Briten die Ideale verraten, die sie unserer Hoffnung nach leben sollten. Es ist an der Zeit, ihnen die Konsequenzen aufzuzeigen."
 USA_war_plan_orange:0 "Kriegsplan Orange"
 USA_war_plan_orange_desc:0 "Für uns gibt es keine größere Bedrohung als Japans imperialistische Ambitionen. Seine Expansionsbestrebungen nach Asien und in den Pazifikraum werden schnell zu Konflikten mit unseren Interessen führen."
 USA_embargo_japan:0 "Embargo Japan"
 USA_embargo_japan_desc:0 "Wir müssen Japan zeigen, dass die USA ihre Aggression weder dulden noch unterstützen werden. Ein Embargo wäre der erste Schritt, um ihre Pläne im Pazifik zu vereiteln."
 USA_prepare_intervention:0 "Intervention vorbereiten"
 USA_prepare_intervention_desc:0 "Durch diplomatische und handelspolitische Entscheidungen hat sich unsere Position auf der internationalen Bühne von neutral und isolationistisch zu einer Haltung gegenüber ausländischen Aggressionen gewandelt. Unsere Militärpolitik wird dies in Zukunft widerspiegeln."
 USA_extra_tech_team:0 "Zusätzliches technisches Team"
 USA_manhattan_project:0 "Manhattan-Projekt"
 USA_manhattan_project_desc:0 "Die Entwicklung von Ersatzmaterialien, ein harmlos klingendes USACE-Projekt, wird schließlich als Manhattan-Projekt bekannt werden. Es ist eines der geheimsten und gefährlichsten Unterfangen der Militärgeschichte und hat die Entwicklung der ersten Atombombe zum Ziel."
 USA_unholy_alliance:0 "Unheilige Allianz"
 USA_unholy_alliance_desc:0 "Manchmal müssen wir uns unsere Feinde aussuchen. Oft ist die Wahl nicht leicht. Die Zukunft wird uns vielleicht dafür verurteilen, dass wir Seite an Seite mit dem einen Tyrannen standen, oder uns dafür loben, dass wir ihn vor dem anderen gerettet haben."
 USA_unholy_alliance_tt:0 "Stärkt die Meinung und tauscht Meinungen mit der Sowjetunion oder Deutschland aus, wenn diese sich im Krieg befinden und auf der Seite des Verteidigers stehen."
 USA_limited_intervention:0 "Begrenzte Intervention"
 USA_limited_intervention_desc:0 "Es bräuchte außerordentliche Aggressivität, um uns mit voller Wucht in einen Krieg zu ziehen, doch nach den jüngsten Entwicklungen sind viele Menschen bereit, bei Konflikten im Ausland zu helfen."
 USA_the_giant_wakes:0 "Der Riese erwacht"
 USA_the_giant_wakes_desc:0 "Die Nationen wenden sich an uns, um die Werte der Demokratie und Freiheit zu schützen. Die Welt, in der das nicht-interventionistische Amerika geboren wurde, existiert nicht mehr, und wir müssen uns entsprechend anpassen."
 USA_pearl_harbor_gambit:0 "Pearl Harbor Gambit"
 USA_pearl_harbor_gambit_desc:0 "Der Marinestützpunkt Pearl Harbor ist ein leichtes Ziel für die Japaner. Mit der Stationierung einer Flotte demonstrieren wir unsere Macht im Pazifik. Werden sie es wagen, sich diesem mutigen Schritt entgegenzustellen?"
 USA_pearl_harbor_gambit_tt:0 "§YWährend der Fokus läuft, hat Japan die Möglichkeit, einen Angriff zu starten.§!"
 USA_cancel_pearl_harbor_gambit:0 "Pearl Harbor Gambit abbrechen"
 USA_cancel_pearl_harbor_gambit_desc:0 "Die Stationierung einer Flotte in Pearl Harbor gefährdet das Leben unserer Seeleute. Wir werden sie nicht riskieren, um einen Krieg mit Japan zu provozieren."
 USA_air_war_plans_division:0 "Abteilung für Luftkriegspläne"
 USA_air_war_plans_division_desc:0 "Um in der Luftfahrt und der Flugzeugproduktion die richtigen Prioritäten zu setzen, bedarf es langfristiger Planung. Das AWPD stellt die materielle, organisatorische und strategische Planung sicher."
 USA_air_support:0 "Luftunterstützung"
 USA_air_support_desc:0 "Luftkriegsführung muss in erster Linie in Verbindung mit anderen militärischen Operationen eingesetzt werden."
 USA_strategic_bombing:0 "Strategische Bombardierung"
 USA_strategic_bombing_desc:0 "Die Fähigkeit, Präzisionsbombardements durchzuführen, wird es uns ermöglichen, die Kriegsmaschinerie jeder Nation aufzuhalten."
 USA_TAC:0 "Taktischer Bombereinsatz"
 USA_TAC_desc:0 "Der Bau von Flugzeugen zum Angriff auf taktische Ziele wird unseren Truppen einen sichereren Vormarsch ermöglichen."
 USA_combined_bomber_offensive:0 "Kombinierte Bomberoffensive"
 USA_combined_bomber_offensive_desc:0 "Mit einer weiteren Großmacht an unserer Seite verfügen wir über unerwartete Vorteile bei der Erforschung und Anwendung groß angelegter offensiver Bombenangriffe."
 USA_fund_the_navy:0 "Finanzieren Sie die Marine"
 USA_fund_the_navy_desc:0 "Wir müssen uns an alle neuen Herausforderungen unserer Feinde anpassen können. Eine verstärkte Finanzierung von Marineübungen wird zu einer effizienteren Marine führen, die unseren Feinden taktisch überlegen ist."
 USA_bureau_of_ships:0 "Schiffsbüro"
 USA_bureau_of_ships_desc:0 "Wir werden das Bureau of Construction and Repair und das Bureau of Engineering zu einer Einheit zusammenlegen, um die künftige Entwicklung der Marine zu überwachen."
 USA_battleship_primacy:0 "Schlachtschiff-Vorherrschaft"
 USA_battleship_primacy_desc:0 "Mit der Kündigung des Washingtoner Flottenabkommens durch Japan könnte uns ein neues Wettrüsten auf den Weltmeeren bevorstehen. Wir werden dafür sorgen, dass wir über die meisten und besten Schlachtschiffe verfügen."
 USA_advanced_mahanian_doctrine:0 "Fortgeschrittene Mahanian-Doktrin"
 USA_advanced_mahanian_doctrine_desc:0 "Der Einfluss von Alfred Thayer Mahan auf die Seekriegsführung kann kaum unterschätzt werden. Aufbauend auf seiner Arbeit können wir Schlachtschiffe, die er als entscheidenden Faktor betrachtete, sinnvoll einsetzen."
 USA_carrier_primacy:0 "Trägerpriorität"
 USA_carrier_primacy_desc:0 "In zukünftigen Schlachten werden wir Luftstreitkräfte brauchen. Die praktischste Möglichkeit, ihre Reichweite zu erweitern, ist der Einsatz von Flugzeugträgern. Wir müssen fortschrittlichere und spezialisiertere Modelle entwickeln."
 USA_bureau_of_aeronautics:0 "Büro für Luftfahrt"
 USA_bureau_of_aeronautics_desc:0 "Um den Bedarf an Entwicklungsmöglichkeiten für die Marinefliegerei zu decken, muss das Bureau of Aeronautics, das seit Jahrzehnten für diese Angelegenheiten zuständig ist, erweitert werden."
 USA_escort_effort:0 "Eskortaufwand"
 USA_escort_effort_desc:0 "U-Boote stellen eine Gefahr für unsere Handelskonvois dar. Die Konzentration auf die Entwicklung neuer Zerstörermodelle wird es uns ermöglichen, einen effizienten U-Boot-Abwehrkrieg zu führen."
 USA_convoy_tactics:0 "Konvoi-Taktiken"
 USA_convoy_tactics_desc:0 "Beim Schutz unserer Handelsschiffe geht es nicht nur um Eskorten und effektive Aufklärung, sondern auch um taktische Entscheidungen hinsichtlich der Gestaltung unserer Handelsrouten und -abläufe."
 USA_amphibious_operations:0 "Amphibische Operationen"
 USA_amphibious_operations_desc:0 "Sofern unsere schlimmsten Albträume nicht wahr werden, wird dieser Krieg nicht auf amerikanischem Boden enden. Der Weg zum Sieg wird nur durch gut durchgeführte Landungen möglich sein."
 USA_expand_the_USMC:0 "Erweitern Sie das USMC"
 USA_expand_the_USMC_desc:0 "Das United States Marine Corps war in vielen vergangenen Kriegen eine entscheidende Kraft und ist für unsere amphibischen Kampagnen möglicherweise wichtiger denn je. Semper fidelis!"
 USA_reinforce_monroe_doctrine:0 "Bekräftigung der Monroe-Doktrin"
 USA_reinforce_monroe_doctrine_desc:0 "Die über 100 Jahre alte Monroe-Doktrin sah ein Eingreifen der USA bei europäischen Kolonialisierungsversuchen in Amerika vor, ohne sich aus europäischen Angelegenheiten einzumischen. Die Stärkung unserer Rolle als Friedenshüter auf diesen Kontinenten wird unseren Einfluss in der Region stärken."
 USA_carribean_sphere:0 "Karibische Sphäre"
 USA_carribean_sphere_desc:0 "Die karibischen Inseln bieten den perfekten Ausgangspunkt für Angriffe auf unsere Ostküste oder den Panamakanal. Daher müssen wir natürlich klarstellen, dass wir keine feindlichen Übernahmen dieser Gebiete zulassen werden."
 USA_central_america:0 "Mittelamerika"
 USA_central_america_desc:0 "Es wäre undenkbar, dass eine ausländische Macht die Kontrolle über den Panamakanal übernimmt oder ihn auch nur bedroht. Deshalb werden wir die Unabhängigkeit aller zentralamerikanischen Länder garantieren."
 USA_the_neighbors:0 "Die Nachbarn"
 USA_the_neighbors_desc:0 "Wir müssen in erster Linie für die Sicherheit der Länder sorgen, die uns am nächsten liegen. Der Feind muss nicht unsere Nachbarn überqueren, um zu uns zu gelangen, sondern er wird uns überqueren, wenn er unsere Nachbarn überquert."
 USA_south_america:0 "Südamerika"
 USA_south_america_desc:0 "Kolonialreiche dürfen nie wieder nach Südamerika vordringen können. Wir werden die Unabhängigkeit unserer Brüder im Süden garantieren, um sie zu schützen."
 USA_pax_americana:0 "Pax Americana"
 USA_pax_americana_desc:0 "Der Frieden in Amerika muss gewahrt werden. Wir haben die Kraft, dafür zu sorgen, dass kleinliche Streitigkeiten zwischen Nachbarstaaten nicht eskalieren. Ein Krieg vor unserer Haustür ist genau das, was unsere Feinde wollen, und wir müssen alles tun, um ihn zu verhindern."
 USA_pax_americana_tt:0 "@USA §YVereinigte Staaten§! können in Kriege zwischen amerikanischen Ländern eingreifen"
 USA_black_chamber:0 "Operation „Schwarze Kammer“"
 USA_black_chamber_complete:0 "§RKLASSIFIZIERT§!"
 USA_black_chamber_desc:0 "Wir haben Informationen über politische Aktivitäten in einer Reihe amerikanischer Länder, die nicht unseren Interessen entsprechen. Glücklicherweise haben wir ein Untergrund-Propagandanetzwerk aufgebaut und sind bereit, diese Länder in unsere Richtung zu drängen. Das müssen wir tun, um sicherzustellen, dass wir im eigenen Land nicht bedroht werden."
 USA_preemptive_intervention:0 "Präventive Intervention"
 USA_preemptive_intervention_desc:0 "Wir können nicht länger tatenlos zusehen, wie unsere Nachbarländer Kriegsmittel entwickeln, um uns oder unsere Verbündeten zu unterdrücken. Wir müssen zum Wohle unseres mächtigen Landes und der Welt eingreifen."
