 fleet_in_being_bonus:0 "Bonus für Fleet-in-Being-Doktrinen"
 industrial_bonus:0 "Industriebonus"
 nuclear_bonus:0 "Nuklearbonus"
 SOV_nkvd_upgrade_tooltip:1 "§YDer NKWD§! ist nun stärker in unsere Armee integriert und sorgt dafür, dass die Moral der Soldaten und ihr Vertrauen in die Partei hoch sind.\n"
 ger_sov_buddies_tooltip_2:0 "Dadurch wird [Root.GetFactionName] aufgelöst und die Fraktion §YBerlin-Moskau§! gegründet.\n"
 ger_sov_buddies_tooltip:1 "Sollten die Sowjets unser Angebot annehmen, wird dieser Politikwechsel zu einem gewissen Stabilitätsverlust führen. Selbstverständlich werden auch unsere faschistischen Mitstreiter und die demokratischen Mächte über diese Wendung der Ereignisse verärgert sein."
 purged_kalinin:0 " Von Stalin gesäubert"
 purged_khrushchev:0 " Von Stalin gesäubert"
 purged_yezhov:0 " Von Stalin gesäubert"
 purged_beria:0 " Von Stalin gesäubert"
 purge_1_group_a:0 " Von Stalin gesäubert"
 purge_1_group_b:0 " Von Stalin gesäubert"
 purge_2_group_a:0 " Von Stalin gesäubert"
 purge_2_group_b:0 " Von Stalin gesäubert"
 counter_purge:0 " Von Trotzki gesäubert"
 SOV_war_since_purge:0 "Hat seit Abschluss der Großen Säuberung einen Krieg geführt"
 FRA_metropolitan_france:2 "Investieren Sie in Frankreich"
 FRA_metropolitan_france_tt:0 "Nicht genügend Bauplätze für §YInfrastruktur§! im französischen Mutterland"
 FRA_metropolitan_france_desc:0 "La Métropole sollte immer an erster Stelle stehen. Wir können damit beginnen, unsere Infrastruktur zu verbessern, um Arbeitsplätze zu schaffen und einen schnelleren Truppeneinsatz zu ermöglichen."
 FRA_algerie_france:2 "Investieren Sie in Algerien-Frankreich"
 FRA_algerie_france_tt:0 "Nicht genügend Bauplätze für §YInfrastruktur§! im kolonialen Frankreich"
 FRA_algerie_france_desc:0 "Europa stehen gefährliche Zeiten bevor. Wir sollten uns auf die Verbesserung unserer Länder im Süden konzentrieren und sicherstellen, dass wir das Festland jederzeit unterstützen können."
 FRA_industrial_expansion:0 "Industrielle Expansion"
 FRA_industrial_expansion_tt:0 "Nicht genügend Bauplätze für „Zivilfabriken“ im französischen Mutterland"
 FRA_industrial_expansion_desc:0 "Wir brauchen eine stärkere industrielle Präsenz im Inland. Wir verfügen über ausreichend Arbeitskräfte, brauchen aber mehr Produktionslinien."
 FRA_colonial_industry:0 "Kolonialindustrie"
 FRA_colonial_industry_tt:0 "Nicht genügend Bauplätze für „Zivilfabriken“ im kolonialen Frankreich"
 FRA_colonial_industry_desc:1 "Wir sollten uns auf unsere Industrien in den Kolonien konzentrieren. Sollten die Spannungen in Europa zunehmen, verfügen wir immer noch über Industriekapazitäten, die außerhalb der Reichweite feindlicher Bomber liegen."
 FRA_military_factories:0 "Militärfabriken"
 FRA_military_factories_tt:0 "Nicht genügend Bauplätze für §YMilitärfabrik§! im französischen Mutterland"
 FRA_military_factories_desc:1 "Unsere Kriegsmaschinerie verliert an Kapazität. Wir müssen uns auf die Produktion militärischer Ausrüstung im Inland konzentrieren, um sicherzustellen, dass unsere Streitkräfte ständig mit neuer Ausrüstung ausgestattet werden."
 FRA_colonial_military_factories:0 "Koloniale Militärfabriken"
 FRA_colonial_military_factories_tt:0 "Nicht genügend Bauplätze für §YMilitärfabrik§! im kolonialen Frankreich"
 FRA_colonial_military_factories_desc:0 "Durch die Verlagerung unserer Militärproduktion außerhalb Europas können wir sicherstellen, dass unsere Truppen an der Front auch dann noch mit Ausrüstung versorgt werden, wenn der Feind die Kontrolle über unseren Luftraum erlangt."
 FRA_extra_research_slot:2 "Unterstützen Sie die Grandes Écoles"
 FRA_extra_research_slot_desc:0 "Überall tauchen vielversprechende junge Köpfe auf. Wir müssen ihnen die nötigen Forschungsmöglichkeiten bieten. Technologische Fortschritte können uns dort einen Vorsprung verschaffen, wo wir ihn am meisten brauchen."
 FRA_nuclear_effort:0 "Nukleare Anstrengungen"
 FRA_nuclear_effort_desc:0 "Erste Tests in der Nuklearwissenschaft haben vielversprechende Ergebnisse gezeigt. Die Nutzung ihrer Kraft könnte uns eine Waffe bescheren, wie sie die Menschheit noch nie zuvor gesehen hat."
 FRA_jet_effort:0 "Jet Effort"
 FRA_jet_effort_desc:0 "Im Luftkampf kommt es vor allem auf Mobilität an. Das Düsentriebwerk ist ein so leistungsstarker Fortschritt, dass es so scheint, als stünden die feindlichen Piloten still, während wir sie vom Himmel holen."
 FRA_extra_research_slot_2:2 "Bilden Sie das Nationale Forschungszentrum"
 FRA_extra_research_slot_2_desc:0 "Überall tauchen vielversprechende junge Köpfe auf. Wir müssen ihnen die nötigen Forschungsmöglichkeiten bieten. Technologische Fortschritte können uns dort einen Vorsprung verschaffen, wo wir ihn am meisten brauchen."
 FRA_defensive_focus:0 "Defensiver Fokus"
 FRA_defensive_focus_desc:0 "In Zeiten wie diesen ist es am besten, unsere Verteidigung zu stärken. Wenn es Bedrohungen gibt, lasst sie zu uns kommen, damit wir sie auf unserem eigenen Land bekämpfen können. Wir haben einen perfekten Kandidaten für die Führung unserer Armee. Alles, was wir brauchen, ist euer Wort."
 FRA_aggressive_focus:0 "Aggressiver Fokus"
 FRA_aggressive_focus_desc:0 "Wir können nicht tatenlos zusehen, wie Feinde an unsere Grenzen vordringen. Und wir können unsere Verbündeten im Kriegsfall nicht sich selbst überlassen. Bereiten Sie unsere Armee vor! Gamelin ist der richtige Mann für diese Aufgabe."
 FRA_fortification_focus:0 "Befestigungsfokus"
 FRA_fortification_focus_desc:0 "So wichtig unsere Festungen auch waren, wir müssen Wege finden, sie effizienter zu bauen. Die Maginot-Linie war eine wirksame Abschreckung für feindliche Streitkräfte. Wir könnten die Sicherheit weiterer ähnlicher Verteidigungsanlagen gebrauchen."
 FRA_alpine_forts:0 "Alpenfestungen"
 FRA_alpine_forts_desc:0 "Sobald wir die Alpen mit unserer neu geplanten Verteidigungslinie gesichert haben, werden die Italiener die Grenze nicht mehr so leicht überqueren. Wir werden Zeit haben, zu reagieren und unsere Position zu verstärken."
 FRA_extend_the_maginot_line:0 "Erweiterung der Maginot-Linie"
 FRA_extend_the_maginot_line_desc:0 "Wir können nicht darauf zählen, dass Belgien seine Stellung hält. Wenn es feindliche Armeen durchlässt, könnten wir in Schwierigkeiten geraten. Die Verlängerung der Maginot-Linie ist entscheidend, um unerwünschte Armeen aus Frankreich fernzuhalten!"
 FRA_infantry_focus:0 "Levée en masse"
 FRA_infantry_focus_desc:0 "Alle Männer und Frauen, die kämpfen können, werden es tun. Die Massenproduktion von Waffen wird die Kosten senken. Wir werden jedem ein Gewehr in die Hand geben."
 FRA_artillery_focus:0 "Grande Batterie"
 FRA_artillery_focus_desc:0 "Unsere Artillerie bildet eine einzige, schlagkräftige Einheit, die das Feuer auf bestimmte Punkte konzentriert. Mit jeder Salve schwächen wir die feindlichen Linien und bahnen uns notfalls einen Weg durch!"
 FRA_heavy_armor_focus:0 "Char de Bataille"
 FRA_heavy_armor_focus_desc:0 "Kampfpanzer sind der Weg in die Zukunft der französischen Armee. Wir wollen das Schlachtfeld kontrollieren und dafür brauchen wir neue, leistungsstarke Panzer!"
 FRA_motorized_focus:0 "Motorisierter Fokus"
 FRA_motorized_focus_desc:0 "Wenn wir bessere Möglichkeiten zum Bau unserer Infanteriefahrzeuge finden, können wir die Frontlinien besser unterstützen und verstärken."
 FRA_mechanized_focus:0 "Mechanisierter Fokus"
 FRA_mechanized_focus_desc:0 "Gepanzerte Fahrzeuge spielen im Krieg eine immer wichtigere Rolle. Sie sind zwar etwas weniger einschüchternd als ein gewöhnlicher Panzer, verschaffen uns aber einen Vorteil in den Bereichen Kommunikation, Führung, Transport und Häuserkampf. "
 FRA_light_medium_armor:0 "Automitrailleuses"
 FRA_light_medium_armor_desc:0 "Laut Gesetz kontrolliert die Infanterie alle Panzertruppen. Die leichteren, schnelleren Kavalleriefahrzeuge oder Automitrailleuses sind besser für die Fortbewegung geeignet und können mit ihren montierten Waffen dennoch einigen Schaden anrichten."
 FRA_army_reform:0 "Armeereform"
 FRA_army_reform_desc:0 "Keine Infanterieeinheit oder Hightech-Panzer allein werden uns den Krieg gewinnen lassen. Wir müssen unsere Anstrengungen darauf konzentrieren, sowohl unsere taktischen als auch unsere strategischen Fähigkeiten zu entwickeln. Mit den richtigen Leuten an der richtigen Stelle können wir uns als Armee weiterentwickeln."
 FRA_navy_focus:0 "Marine-Fokus"
 FRA_navy_focus_tt:0 "Nicht genügend Bauplätze für §YNaval Base§!"
 FRA_navy_focus_desc:0 "Wenn wir unsere Marine ausbauen wollen, müssen wir zunächst unsere Marinestützpunkte verbessern und erweitern. Unsere einzigartigen Schiffe erfordern ständige Aufmerksamkeit, um jederzeit kampfbereit zu bleiben."
 FRA_improved_screen_ships:0 "Verbesserte Bildschirmschiffe"
 FRA_improved_screen_ships_desc:0 "Zerstörer und leichte Kreuzer spielen eine Schlüsselrolle bei der Verteidigung unserer schwereren Schlachtschiffe oder Träger. Wenn wir unsere Verteidigungslinie auf See verlieren, gefährden wir alle Schiffe und Besatzungen. Wir müssen sicherstellen, dass unsere Schiffe mit der neuesten Technologie gebaut werden."
 FRA_capital_ship_focus:0 "Fokus auf Großkampfschiffe"
 FRA_capital_ship_focus_desc:0 "Eine Verbesserung des Designs unserer Schlachtschiffe würde zu großen taktischen Vorteilen führen. Ihre Reichweite und Leistung sind unübertroffen, und niemand wird ihren Geschützen entkommen können."
 FRA_carrier_focus:0 "Carrier-Fokus"
 FRA_carrier_focus_desc:0 "Marinetheoretiker haben uns auf unsere veralteten Träger aufmerksam gemacht. Sie haben Vorschläge, wie Träger weiter genutzt werden können, wenn die Entwicklung in die richtige Richtung vorangetrieben wird. Wirkliche Fortschritte sind ohne unsere volle Unterstützung nicht möglich."
 FRA_initiate_government_reform:0 "Regierungsreform"
 FRA_initiate_government_reform_desc:0 "Die Welt ist gefährlich geworden. Wir können uns nicht länger von unseren eigenen kleinlichen Streitereien einschränken lassen. Es ist Zeit, unseren Politikern Macht zu verleihen und zum Wohle Frankreichs voranzukommen."
 FRA_support_the_left:0 "Unterstützen Sie die Linke"
 FRA_support_the_left_desc:0 "Die Komintern wird stärker. Es ist an der Zeit, zu zeigen, dass unsere Interessen vereinbar sind, und unsere kommunistischen Organisationen zu unterstützen."
 FRA_leftist_rhetoric:0 "Linke Rhetorik"
 FRA_leftist_rhetoric_desc:0 "Das Ziel ist klar: Gleichheit für alle. Wir wollen keine kapitalistischen Interessen in der französischen Politik. Es ist unerlässlich, optimale Bedingungen für die Entwicklung unserer kommunistischen Organisationen zu schaffen."
 FRA_scw_intervention_republicans:0 "Republikanische Intervention"
 FRA_scw_intervention_republicans_desc:0 "Das republikanische Spanien braucht unsere Hilfe! \nJeder, der bereit ist, für die Sache zu kämpfen, sollte dies dürfen. Wir dürfen nicht zulassen, dass ein weiteres faschistisches Regime an Boden gewinnt."
 FRA_national_mobilization:0 "Nationale Mobilisierung"
 FRA_national_mobilization_desc:0 "Wir haben endlich eine handlungsfähige Regierung. Jetzt ist es an der Zeit, unsere Armee zu stärken und bereit zu sein, für Frankreich zu kämpfen."
 FRA_humanite_unie:0 "Humanité Unie"
 FRA_humanite_unie_desc:0 "Die fetten Banker und machthungrigen Demagogen festigen ihren blutigen Griff um die Welt. Mit jedem Tag werden freie Menschen versklavt und die Welt stürzt tiefer in die Krise, verursacht durch die Gier des Einzelnen. Französische Ideale werden mehr denn je gebraucht! Die Menschheit braucht uns, und wir müssen die Menschheit vereinen!"
 FRA_join_comintern:0 "Treten Sie der Komintern bei"
 FRA_join_comintern_desc:0 "Da wir überall Feinde haben, müssen wir unsere Position durch mächtige Verbündete stärken. Unsere Verbindungen zur Komintern sind stärker geworden, und es ist an der Zeit, uns voll und ganz ihrer Sache zu widmen."
 FRA_support_status_quo:0 "Unterstützen Sie den Status Quo"
 FRA_support_status_quo_desc:0 "Frankreich ist die Wiege und der Beschützer der Freiheit und sollte dies auch bleiben. Wenn wir jemals wieder Einheit erreichen wollen, müssen wir unsere Demokratie stabilisieren, bevor sie schwindet."
 FRA_little_entente:0 "Kleine Entente"
 FRA_little_entente_desc:0 "Die Kleine Entente, ein Bündnis, das nach dem Ersten Weltkrieg gegründet wurde, um Aggressionen Österreichs und Ungarns gegenüber ihren Nachbarn zu verhindern, wurde von Frankreich unterstützt, beginnt nun aber zu zerfallen. Anstatt die Beziehungen zu Großbritannien zu festigen, sollten wir die Initiative ergreifen, diese Fraktion wiederherzustellen und zu festigen, angefangen bei ihren Gründern in der Tschechoslowakei."
 FRA_go_with_britain:0 "Gehen Sie mit Großbritannien"
 FRA_go_with_britain_desc:0 "Russland hat sich für immer verändert, und von der alten Triple Entente sind nur noch Frankreich und Großbritannien übrig. Wenn sich die Geschichte wiederholen soll, müssen wir dafür sorgen, dass diese beiden Nationen, Bastionen der Demokratie und Freiheit in Europa, unsere Verbündeten bleiben."
 FRA_strengthen_government_support:0 "Stärkung der Regierung"
 FRA_strengthen_government_support_desc:0 "Wir haben Pläne für das kommende Jahr geschmiedet, die den Wünschen der Menschen in allen Teilen Frankreichs entsprechen. Zeigen Sie ihnen, dass wir handlungsfähig und würdig sind, Frankreich zu regieren, damit wir wieder vereint auftreten können."
 FRA_defensive_strategems:0 "Verteidigungsstrategien"
 FRA_defensive_strategems_desc:0 "Wenn wir wollen, dass das französische Volk für uns in den Krieg zieht, ist eine klare Linie wichtiger denn je. Wir müssen aufhören, uns gegenseitig zu bekämpfen und stattdessen für Frankreich und für „Liberté, égalité, fraternité“ kämpfen."
 FRA_invite_yugoslavia:0 "Jugoslawien einladen"
 FRA_invite_yugoslavia_desc:0 "Jugoslawien hat genug Sorgen, auch ohne sich um expansionistische Nachbarn sorgen zu müssen. Sie wieder in die Kleine Entente zu holen, wäre sowohl für sie als auch für uns ein großer Dienst."
 FRA_invite_romania:0 "Rumänien einladen"
 FRA_invite_romania_desc:0 "Die rumänische Demokratie ist fragil und zwischen ihren faschistischen Fraktionen und dem sowjetischen Kommunismus gefangen. Die Aufnahme Rumäniens in die Kleine Entente wird es ihm ermöglichen, mit unserer Unterstützung seine Stabilität zu bewahren."
 FRA_polish_guarantee:0 "Polnische Garantie"
 FRA_polish_guarantee_desc:0 "Polnische Diplomaten haben ihre Besorgnis über die Spannungen an ihren Grenzen zum Ausdruck gebracht. Eine Garantie unseres mächtigen Landes sollte jeden abschrecken, der eine Invasion plant."
 FRA_czech_guarantee:0 "Tschechische Garantie"
 FRA_czech_guarantee_desc:0 "Die Spannungen an der tschechischen Grenze nehmen zu. Wir können nicht zulassen, dass expansive Nationen ein freies und demokratisches Land übernehmen. Die Tschechen müssen ein freies Volk bleiben. Mit unserer Garantie wird jeder, der eine Invasion plant, zweimal darüber nachdenken."
 FRA_revise_versailles:0 "Versailles überarbeiten"
 FRA_revise_versailles_desc:0 "Die Deutschen ignorieren bereits die im Versailler Vertrag festgelegten Reparationszahlungen und zeigen damit, dass Frankreich keinen Respekt mehr genießt. Wir haben zwar das Recht, für die im Ersten Weltkrieg verlorenen Leben höhere Forderungen zu stellen, doch ein gerechter Vertrag würde ein starkes, neues Frankreich erfordern, das ihn auch durchsetzen kann."
 FRA_support_the_right:0 "Unterstützen Sie die Rechte"
 FRA_support_the_right_desc:0 "Frankreich war schon immer eine starke und stolze Nation, doch die Untätigkeit der Regierung hat die Bevölkerung gespalten. Wir müssen Frankreich einen und unsere Überlegenheit und Stärke behaupten, um dem Verfall zu entgehen."
 FRA_right_wing_rhetoric:0 "Rechte Rhetorik"
 FRA_right_wing_rhetoric_desc:0 "Wir müssen uns darauf konzentrieren, jeden Franzosen zu erreichen und seinen Nationalgeist zu stärken. Zeigen Sie ihnen, dass wir die starken Führer sein können, die sie brauchen, und sie werden stolze Bürger unserer glorreichen Nation."
 FRA_scw_intervention_nationalists:0 "Nationalistische Intervention"
 FRA_scw_intervention_nationalists_desc:0 " Die Nationalisten gewinnen in Spanien endlich an Boden. Ihre Sache ist gerecht, und jeder, der bereit ist, für sie zu kämpfen, sollte dies tun dürfen."
 FRA_army_of_aggression:0 "Armee der Aggression"
 FRA_army_of_aggression_desc:0 "Wir können nicht länger hinter einer veralteten Mauer sitzen bleiben, während unsere Feinde in ganz Europa wüten. Es ist Zeit, unsere Armee zu stärken und unsere Grenzen zu erweitern, um sicherzustellen, dass Frankreich auch weiterhin eine große Nation bleibt."
 FRA_france_first:0 "Frankreich zuerst"
 FRA_france_first_desc:0 "Wir sind Frankreich! Sieger des Ersten Weltkriegs! Retter Europas! Wir sind die Heimat der größten Denker dieser Welt. Zu viele Nationen versuchen, die Welt ins Chaos zu stürzen. Wir werden gebraucht, und wir werden dem Ruf folgen. Wir werden das Ruder übernehmen, den Sturm überstehen und die Menschheit unter unserer Herrschaft in Sicherheit bringen!"
 FRA_woo_italy:0 "Woo Italien"
 FRA_woo_italy_desc:0 "Italien hat das Potenzial, eine mächtige Nation zu werden. Dank Mussolinis starker Führung ist das italienische Volk vereint und bereit, für die richtige Sache zu kämpfen. Lasst diese Sache auch uns sein."
 FRA_dismantle_the_democracies:0 "Zerschlagt die Demokratien"
 FRA_dismantle_the_democracies_desc:0 "Das neue demokratische Bündnis in Mitteleuropa bedroht unsere neu gewonnene Position. Wir müssen jetzt handeln, bevor es noch mächtiger wird."
 FRA_join_germany:0 "Komm nach Deutschland"
 FRA_join_germany_desc:0 "Das Deutsche Reich wird zu einer Macht, mit der man rechnen muss. Seine Vision einer besseren Zukunft lässt sich mit unseren Interessen vereinbaren. Wir sollten es unterstützen, und sobald sich der Staub gelegt hat, wird Frankreich seinen rechtmäßigen Anteil an Europa bekommen."
 FRA_naval_doctrine:0 "Marinedoktrin"
 FRA_naval_doctrine_desc:0 "Jüngste Fortschritte im Schiffsbau eröffnen neue Möglichkeiten für taktische und strategische Manöver. Bevor wir diese neuen Theorien risikoreich einsetzen, müssen wir sie gründlich testen und die Pläne konkretisieren."
 FRA_air_focus:0 "Luftfokus"
 air_focus_bypass_tt:0 "Nicht genügend Bauplätze für §YAir Base§!"
 FRA_air_focus_desc:0 "Es ist an der Zeit, unsere Luftwaffe zu erweitern! Es gibt bereits Pläne für den Bau neuer Luftwaffenstützpunkte, um eine deutliche Aufstockung des Personals und der Flugzeuge zu ermöglichen."
 FRA_cas_focus:0 "CAS-Fokus"
 FRA_cas_focus_desc:0 "Flugzeuge zur Unterstützung unserer Landstreitkräfte und Schiffe waren eine sehr effiziente Ergänzung bei relativ geringen Investitionen. Für diese Flugzeuge gibt es nun mehrere Verbesserungsvorschläge. Unsere Ingenieure können die nächste Generation von Unterstützungsflugzeugen entwickeln."
 FRA_fighter_focus:0 "Kämpferfokus"
 FRA_fighter_focus_desc:0 "Revolutionäre zivile Technik kann auf unsere Kampfflugzeuge angewendet werden, um ihre Geschwindigkeit, Reichweite und maximale Flughöhe zu verbessern. Wir müssen uns darauf konzentrieren, wenn wir mit den Fortschritten anderer mithalten wollen."
 FRA_bomber_focus:0 "Bomberfokus"
 FRA_bomber_focus_desc:0 "Luftunterstützung ist ein wichtiger Bestandteil unserer Verteidigungs- und Angriffsfähigkeiten. Wenn wir unsere Anstrengungen auf die Entwicklung schneller, wendiger und präziserer Bomber konzentrieren, behalten wir in jedem Landkampf die Nase vorn."
 FRA_heavy_fighter_focus:0 "Fokus auf schwere Jäger"
 FRA_heavy_fighter_focus_desc:0 "Unsere schweren Jäger müssen in der Lage sein, die anfälligeren Bomberflugzeuge zu unterstützen. Dies erfordert eine stärkere Bewaffnung und eine größere Reichweite auf Kosten der Geschwindigkeit."
 FRA_air_doctrine:0 "Luftdoktrin"
 FRA_air_doctrine_desc:0 "Wir haben genügend Erfahrung gesammelt, um neue Theorien der Luftkriegsführung schneller zu testen. Dies ermöglicht es uns, neue taktische und strategische Möglichkeiten zu erkunden. Der Luftkampf ist der Schlüssel zur modernen Kriegsführung."
 FRA_heavy_bomber_focus:0 "Fokus auf schwere Bomber"
 FRA_heavy_bomber_focus_desc:0 "Moderne schwere Bomber werden so bewaffnet sein, dass sie kleinere Luftkämpfe allein bewältigen können. Wenn wir unseren Ingenieuren die Möglichkeit geben, sich auf die Entwicklung neuester Technologien zu konzentrieren, haben wir eine bessere Chance, feindliche Produktionsanlagen zu zerstören."
 FRA_naval_bomber_focus:0 "Fokus auf Marinebomber"
 FRA_naval_bomber_focus_desc:0 "Schiffe sind gegenüber Flugzeugen äußerst anfällig. Wir sollten ihre Technologie kontinuierlich verbessern, um Gegenmaßnahmen immer einen Schritt voraus zu sein."
 limited_rearmament_focus:0 "Begrenzte Wiederbewaffnung"
 limited_rearmament_focus_desc:1 "[Root.GetLimitedRearmamentDesc]"
 ENG_LIMITED_REARMAMENT_HISTORICAL:0 "Die jüngsten Unruhen in Deutschland und anderen faschistischen Mächten weltweit lassen darauf schließen, dass wir in unserer Zeit keinen Frieden erleben werden. Als Vorbereitung sollten wir die Weichen für unsere eigene Wiederbewaffnung stellen, falls sich die Lage noch weiter verschlechtern sollte."
 ENG_LIMITED_REARMAMENT_AHISTORICAL:0 "Unser neuer Ansatz in der Innenpolitik und den internationalen Beziehungen erfordert ein starkes Militär, das ihn unterstützt. Zur Vorbereitung sollten wir mit dem Ausbau unserer zivilen Industrie beginnen, damit diese zu gegebener Zeit eine stabile Grundlage für einen zukünftigen Ausbau unserer Rüstungsindustrie bildet."
 ENG_motorized_focus:0 "Eine motorisierte Armee"
 ENG_motorized_focus_desc:0 "In jüngster Zeit experimentiert die Armee mit vollmotorisierten Infanterieeinheiten. Bisher wurden noch keine vollmotorisierten Divisionen gebildet, doch mit den richtigen Worten an den Kriegsminister könnte dies bald möglich sein."
 ENG_tank_focus:1 "[Root.GetRoyalTankRegimentName]"
 ENG_tank_focus_desc:1 "[Root.GetRoyalTankRegimentDesc]"
 ENG_ROYAL_TANK_REGIMENT_NAME_HISTORICAL:0 "Königliches Panzerregiment"
 ENG_ROYAL_TANK_REGIMENT_NAME_COMMUNIST:0 "Panzerregiment der Republikanischen Garde"
 ENG_ROYAL_TANK_REGIMENT_DESC_HISTORICAL:0 "Großbritannien hat den Panzer erfunden, und daher sollte das Royal Tank Regiment mit den besten Panzern der Welt ausgestattet sein, was derzeit jedoch nicht der Fall ist. Das Special Vehicle Development Committee schlägt vor, ein modernes Design zu erforschen und zu entwickeln, um Großbritanniens Spitzenposition in der Panzerentwicklung zu sichern."
 ENG_ROYAL_TANK_REGIMENT_DESC_COMMUNIST:0 "Großbritannien hat den Panzer erfunden, und daher sollte das Panzerregiment der Republikanischen Garde mit den besten Panzern der Welt ausgestattet sein. Dies ist derzeit jedoch nicht der Fall. Das Komitee für die Entwicklung von Spezialfahrzeugen schlägt vor, ein modernes Design zu erforschen und zu entwickeln, um Großbritanniens Vorreiterrolle in der Panzerentwicklung zu sichern."
 uk_empire_focus:0 "Verstärke das Imperium"
 uk_empire_focus_desc:0 "Unser Imperium ist riesig und trotz unserer Macht nur schwach verteidigt. Um dem entgegenzuwirken, müssen wir den imperialen Patriotismus im gesamten Reich fördern."
 uk_service_focus:0 "Service im Ausland"
 uk_service_focus_desc:0 "Durch die Rotation von Streitkräften zu Kolonialstationen und wieder zurück in die Heimat können sie die Bedingungen an verschiedenen Fronten kennenlernen, Erfahrungen sammeln und diese mit ihren Kameraden in der Heimat teilen."
 uk_mediterranean_focus:0 "Mittelmeerbastion"
 uk_mediterranean_focus_desc:0 "Die Route durch das Mittelmeer ist eine lebenswichtige Abkürzung von und nach Indien. Daher ist es von größter Bedeutung, sie offen und in unseren Händen zu halten."
 uk_rock_focus:0 "Befestige den Felsen"
 uk_rock_focus_desc:0 "Gibraltar kontrolliert nicht nur die Einfahrt zum Mittelmeer, sondern verfügt auch über einen stark verteidigten Hafen, von dem aus Schiffe sowohl im Atlantik als auch im Mittelmeer operieren können. Daher ist es unerlässlich, dass der Hafen streng bewacht wird."
 uk_greece_focus:0 "Griechenland zwingen"
 uk_greece_focus_desc:0 "Es liegt in unserem Interesse, Stationierungsrechte in Griechenland zu haben, und ehrlich gesagt sind die Griechen nicht in der Lage, uns dies zu verweigern."
 uk_malta_focus:0 "Malta stärken"
 uk_malta_focus_desc:0 "Malta verfügt über eine hervorragende Lage im zentralen Mittelmeerraum und ist eine wichtige Zwischenstation auf unserer Lebensader durch Ägypten und den Suezkanal nach Indien und in den Fernen Osten. Es wäre keine Zeitverschwendung, Malta stärker zu befestigen."
 ENG_mot_focus_tooltip:0 "Wir können jetzt motorisierte Infanteriedivisionen einsetzen."
 uk_canada_focus:0 "Entwicklung in Kanada"
 uk_canada_focus_desc:0 "Eine Investition in die kanadische Industrie und Werften wird der kanadischen Wirtschaft Auftrieb geben und es ihnen ermöglichen, im Kriegsfall einen größeren Beitrag zu leisten."
 uk_australia_focus:0 "Entwicklung in Australien"
 uk_australia_focus_desc:0 "Eine Investition in Australiens Werften und Industrie wird der australischen Wirtschaft Auftrieb geben und es dem Land ermöglichen, im Kriegsfall einen größeren Beitrag zu leisten."
 uk_protect_suez:0 "Schützen Sie Suez"
 uk_protect_suez_desc:0 "Die Kontrolle des Suezkanals ist ein Mittel, mit dem das Britische Empire seine Seeherrschaft behält. Der Verlust dieser Region wäre verheerend. Es müssen Maßnahmen zu ihrer Befestigung ergriffen werden."
 uk_balkan_strategy:0 "Balkanstrategie"
 uk_balkan_strategy_desc:0 "Viele Balkanstaaten sind probritisch eingestellt und sehen die gleiche Bedrohung durch Mitteleuropa wie wir. Wenn wir die Gelegenheit nutzen und sie frühzeitig unterstützen, können wir uns ihre Loyalität sichern, allerdings auf Kosten des Zorns ihrer rachsüchtigen Nachbarn."
 uk_new_zealand_focus:0 "Neuseeland entwickeln"
 uk_new_zealand_focus_desc:0 "Neuseeland ist unserem Land weiterhin eng verbunden und hat vor der faschistischen Bedrohung gewarnt. Ihr Beitrag im Kriegsfall ist sicher, und wir sollten sie bei der entsprechenden Vorbereitung unterstützen."
 uk_south_africa_focus:0 "Südafrika entwickeln"
 uk_south_africa_focus_desc:0 "Die politische Lage in Südafrika ist unsicher. Wir können nicht völlig darauf vertrauen, dass sie unsere Kriegsanstrengungen unterstützen werden, aber indem wir ihnen beim Ausbau ihrer Industrie helfen, können wir hoffen, die Unterstützung für die britische Sache zu erhöhen."
 FRA_strengthen_government_support_tooltip:0 "Die Idee der „Stärkung der staatlichen Unterstützung“ hat ausgedient."
 ITA_victoryinETH:0 "Triumph in Afrika"
 ITA_victoryinETH_desc:0 "Das Scheitern im Ersten Italienisch-Äthiopischen Krieg war 40 Jahre lang ein Schandfleck auf der Ehre Italiens. Durch den Sieg wird dieser Schandfleck nun beseitigt und die Stärke des eisernen Willens des Faschismus unter Beweis gestellt!"
 USA_reinforce_monroe_doctrine_tt:0 "Steigert die Handelsstimmung mit allen amerikanischen Nationen.\n"
 1939_bookmark_threat:0 "Jüngster faschistischer Expansionismus"
 USA_civil_war_fired:0 "Der Zweite Amerikanische Bürgerkrieg hat begonnen."
 USA_anti_imperialism:0 "Antiimperialismus"
 USA_anti_imperialism_desc:0 "Amerika war schon immer ein Feind imperialistischer Unterdrücker, doch es ist offensichtlich, dass die meisten sogenannten Demokratien bereit sind, diese Institutionen am Leben zu erhalten, solange sie davon profitieren. Die Revolutionäre der Sowjetunion sind bessere Verbündete."
 USA_fascist_menace:1 "Die preußische Bedrohung"
 USA_fascist_menace_desc:1 "Der Versailler Vertrag und die Wirtschaftssanktionen haben Deutschland nicht aufgehalten, und der preußische Militarismus zeigt erneut sein hässliches, aggressives Gesicht. Deutschland muss erneut besiegt und unter unsere Kontrolle gebracht werden, zumindest vorerst."
 USA_crusade_against_communism:0 "Kreuzzug gegen den Kommunismus"
 USA_crusade_against_communism_desc:0 "Der Rote Terror ist die mit Abstand schlimmste Bedrohung, der diese Welt je ausgesetzt war. Die destruktive Ideologie der Sowjetunion muss mit allen Mitteln im Keim erstickt werden, und wir werden diejenigen sein, die das tun."
 USA_strike_at_the_empire:0 "Schlag gegen das Imperium"
 USA_strike_at_the_empire_desc:0 "Die wahre Bedrohung für die Freiheit in der Welt sind die Kolonialreiche der europäischen Supermächte. Sie müssen zerschlagen und ihre Bevölkerungen befreit werden, angefangen beim Britischen Empire, von dem wir uns einst befreit haben."
 USA_defense_of_the_pacific:0 "Verteidigung des Pazifiks"
 USA_defense_of_the_pacific_desc:0 "Für die japanische Regierung gibt es keine Hoffnung mehr. Ihr Expansionismus bedroht sowohl unser Volk als auch seine asiatischen Nachbarn. Das Land muss unter amerikanische Verwaltung gestellt werden, um es zu reformieren und zu verhindern, dass es seine Fehler wiederholt."
 ENG_home_defence:0 "Heimverteidigung"
 ENG_home_defence_desc:0 "Ein riesiges Imperium nützt nichts, wenn wir das britische Volk nicht schützen können. Wir sollten unsere Bemühungen auf die Sicherheit der Britischen Inseln konzentrieren."
 ENG_issue_gasmasks:0 "Ausgabe Gasmasken"
 ENG_issue_gasmasks_desc:0 "Die Welt wird täglich gefährlicher. Wir sollten die Zivilbevölkerung vor Giftgasangriffen schützen. Großbritannien kann aufatmen."
 ENG_military_training_act:0 "Truppenausbildungsgesetz"
 ENG_military_training_act_desc:0 "Der Erste Weltkrieg hat bei unserem Volk den Eindruck hinterlassen, dass es nie wieder kämpfen müsse. Angesichts der zunehmenden Gefahren in der Welt müssen wir sicherstellen, dass alle fähigen jungen Männer eine militärische Grundausbildung erhalten."
 ENG_embargo_germany:0 "Embargo Deutschland"
 ENG_embargo_germany_desc:0 "Die deutsche Wiederaufrüstung ist eine Beleidigung und eine große Bedrohung für den Weltfrieden. Wir werden ihnen nicht die Ressourcen liefern, die sie brauchen, um ihre Kriegsmaschinerie anzutreiben."
 ENG_war_with_germany:0 "Krieg mit Deutschland"
 ENG_war_with_germany_desc:0 "Die Deutschen haben uns keine andere Wahl gelassen. Im Interesse der freien Welt und der Zukunft unserer Kinder. Es ist Zeit für Krieg."
 ENG_swedish_intervention:0 "Schwedische Intervention"
 ENG_swedish_intervention_desc:0 "Schwedische Bewegungen gegen die Demokratie haben einen besorgniserregenden Einfluss gewonnen. Wir können nicht riskieren, dass schwedischer Stahl als Waffen in den Händen unserer Feinde landet. Die Schweden sollen frei bleiben, aber wir müssen uns einen gewissen Einfluss auf ihr Land sichern."
 ENG_norwegian_intervention:0 "Norwegische Intervention"
 ENG_norwegian_intervention_desc:1 "Die norwegischen Bewegungen gegen die Demokratie gewinnen weiter an Boden. Wir sollten dafür sorgen, dass ihre Politik mit unseren Interessen im Einklang bleibt, selbst wenn wir dafür Gewalt anwenden müssen."
 ENG_danish_intervention:0 "Dänische Intervention"
 ENG_danish_intervention_desc:0 "Die dänische Unterstützung für die Feinde des Weltfriedens hat weiter zugenommen. Es gibt nur einen Weg, sie auf unserer Seite zu halten. Wir sollten Dänemark nutzen, um in der Region einen strategischen Stützpunkt zu errichten, falls eine Landinvasion in Europa notwendig werden sollte."
 ENG_benelux_intervention:0 "Benelux-Intervention"
 ENG_benelux_intervention_desc:0 "Das politische Umfeld in den Benelux-Ländern steht uns zunehmend feindselig gegenüber. Wir sollten ein klares Zeichen setzen: Wir dulden keinen Feind der Demokratie und sind bereit, notfalls Gewalt anzuwenden."
 ENG_belgium_security:0 "Sicheres Belgien"
 ENG_belgium_security_desc:0 "Eine Warnung allein reichte offensichtlich nicht aus. Wenn die politischen Tendenzen so weitergehen wie bisher, stellt Belgien eine direkte Bedrohung für unsere Gewässer dar. Wir müssen eingreifen und einen strategischen Stützpunkt auf dem europäischen Festland errichten."
 ENG_dutch_security:0 "Sichern Sie die Niederlande"
 ENG_dutch_security_desc:0 "Politische Bewegungen in den Niederlanden unterstützen weiterhin unsere Feinde. Um ein freies Europa zu gewährleisten, müssen die Niederlande unterworfen werden."
 ENG_war_with_japan:0 "Krieg mit Japan"
 ENG_war_with_japan_desc:0 "Alle anderen Optionen sind ausgeschöpft und die Japaner weigern sich, ihren Expansionskurs aufzugeben. Zur Sicherheit des Britischen Empires und der Völker Asiens müssen wir die Japaner unterwerfen."
 ENG_war_with_italy:0 "Krieg mit Italien"
 ENG_war_with_italy_desc:0 "Die Italiener geben ihre Pläne für ein neues Imperium nicht auf und sind bereit, Krieg zu führen, um ihre Grenzen zu erweitern. Wir müssen alles tun, um diese Bedrohung zu beseitigen, bevor es zu spät ist."
 ENG_embargo_ussr:0 "Embargo gegen die UdSSR"
 ENG_embargo_ussr_desc:0 "Die Sowjetunion wird immer mächtiger und nutzt britische Ressourcen für ihre militärischen Bemühungen. Wir sollten ihr den Zugang zu unserem Handel verwehren."
 ENG_war_with_ussr:0 "Krieg mit der UdSSR"
 ENG_war_with_ussr_desc:0 "Die Bedrohung durch die Sowjetunion wächst trotz unserer Einwände weiter. Wir können eine aggressive Sowjetunion nicht tolerieren und haben keine andere Wahl, als für eine bessere Zukunft in den Krieg zu ziehen."
 kamikaze_focus_tooltip:1 "Ermöglicht §YKamikaze-Angriffe§! Luftmissionen und Selbstmordanschläge auf feindliche Schiffe.\n"
 AST_additional_militia_training:0 "Zusätzliche Milizausbildung"
 AST_additional_militia_training_desc:0 "Ein Großteil unserer Milizionäre ist dienstuntauglich – entweder krank oder unzureichend ausgerüstet. Wir ergreifen Maßnahmen, um dieses Versäumnis in einer gefährlichen Welt zu beheben."
 AST_royal_australian_artillery:0 "Königliche australische Artillerie"
 AST_royal_australian_artillery_desc:0 "Die Artillerie ist die Königin des Schlachtfelds und wir müssen unseren Zugang zu schweren Geschützen erweitern."
 AST_promote_reservists:0 "Reservisten fördern"
 AST_promote_reservists_desc:0 "Obwohl wir eine Heimatverteidigungstruppe brauchen, wird uns die Aufnahme von Milizen und Reserven in die reguläre Armee den nötigen Zuwachs an verfügbaren Soldaten und Erfahrung verschaffen."
 AST_daimler_dingo:0 "Daimler Dingo"
 AST_daimler_dingo_desc:0 "Dieses in Großbritannien hergestellte Panzerfahrzeug wird unsere Mobilität auf dem Schlachtfeld verbessern. Und schließlich ist es nach unserem Nationalhund benannt."
 AST_hmas_assault:0 "HMAS Assault"
 AST_hmas_assault_desc:0 "Der Krieg im Pazifik wird ein amphibischer Krieg sein, daher ist der Bau eines Marinestützpunkts, der auf die Ausbildung von Marinesoldaten in der Strandeinnahme spezialisiert ist, für die Kriegsanstrengungen unerlässlich."
 AST_specialize_equipment:0 "Spezialausrüstung"
 AST_specialize_equipment_desc:0 "Nicht alle von uns verwendeten britischen Geräte sind für unsere spezielle Kampfsituation geeignet. Wir brauchen spezielle und maßgeschneiderte Werkzeuge."
 AST_australian_womens_army_service:0 "Australischer Frauenarmeedienst"
 AST_australian_womens_army_service_desc:0 "An der Front wird jeder Mann gebraucht, daher werden Fahr-, Signal- und Wartungsarbeiten von Tausenden australischen Frauen übernommen."
 AST_australian_army_catering_corps:0 "Catering-Corps der australischen Armee"
 AST_australian_army_catering_corps_desc:0 "Die australische Armee ist mit der Qualität ihrer Lebensmittel nicht zufrieden, was vor allem an der Qualität ihrer Köche liegt. Durch eine Neuorganisation dieses Prozesses können wir Moral und Effektivität steigern."
 AST_fund_owen_gun_research:0 "Finanzierung der Owen-Waffenforschung"
 AST_fund_owen_gun_research_desc:0 "Evelyn Owen hat eine neue Maschinenpistole entwickelt, die den harten Belastungen des Dschungelkriegs standhält. Wir sollten staatliche Mittel in die Produktion und Verbesserung dieser Waffe investieren."
 AST_sentinel_tank_project:0 "Sentinel Tank-Projekt"
 AST_sentinel_tank_project_desc:0 "Australien sollte ein eigenes Panzerfahrzeug entwickeln. Basierend auf deutschen und amerikanischen Ideen sollte das Sentinel-Programm vorangetrieben werden."
 AST_airborne_defence:0 "Luftgestützte Verteidigung"
 AST_airborne_defence_desc:0 "Wir müssen den Luftraum über Australien schützen, indem wir in die Luftverteidigung investieren, einschließlich Abfangjägern und Luftabwehr."
 AST_introduce_unconventional_warfare:0 "Einführung unkonventioneller Kriegsführung"
 AST_introduce_unconventional_warfare_desc:0 "Die Dschungel des Pazifiks erfordern eine neue Art der Kriegsführung. Wir müssen lernen, uns schnell und leise durch die dichte Deckung zu bewegen, unsere Feinde aus dem Hinterhalt anzugreifen und dasselbe von ihnen zu erwarten."
 AST_z_special_unit:0 "Z-Spezialeinheit"
 AST_z_special_unit_desc:0 "Die Spezialeinheit Z ist unser Kommandoteam, das sich auf Aufklärung und Sabotage hinter den feindlichen Linien spezialisiert. Dafür sind mutige Männer erforderlich, die bereit sind, sich einem anspruchsvollen Training zu unterziehen."
 AST_m_special_unit:0 "M Spezialeinheit"
 AST_m_special_unit_desc:0 "Die Spezialeinheit M wird im Krieg unser vorgeschobener Aufklärungs- und Aufklärungsarm sein und aktuelle Informationen über die Aufstellung und Stellung des Feindes zurücksenden."
 AST_expand_the_raaf:0 "Erweitern Sie die RAAF"
 AST_expand_the_raaf_desc:0 "Unsere Luftwaffe muss wachsen, deshalb investieren wir in mehr Stützpunkte, mehr Ausbildung und mehr Produktion."
 AST_cac_boomerang:0 "CAC Boomerang"
 AST_cac_boomerang_desc:0 "Der Boomerang ist Australiens Beitrag zum Kampfflugzeugbau und zugleich eine Versicherung gegen den Verlust importierter Flugzeuge. Wir müssen mit japanischen und amerikanischen Flugzeugen konkurrieren."
 AST_expand_northern_presence:0 "Erweitern Sie Ihre Präsenz im Norden"
 AST_expand_northern_presence_desc:0 "Da unsere Städte hauptsächlich an der Ost- und Westküste der Insel liegen, mangelt es Australiens nördlicher Grenze an angemessener Verteidigung oder Vorbereitung auf eine Invasion oder einen Angriff. Neue militärische Strukturen in diesem Gebiet wären willkommen."
 AST_cac_woomera:0 "CAC Woomera"
 AST_cac_woomera_desc:0 "Australien wird seine eigene Bomberflotte entwickeln. Die Woomera ist zwar nur ein leichtes Flugzeug, wird aber für den Schutz unseres Heimatlandes und für leichte Kampfluftunterstützung ausreichen."
 AST_volunteer_air_observers_corps:0 "Freiwilliges Luftbeobachterkorps"
 AST_volunteer_air_observers_corps_desc:0 "Behalten Sie den Himmel im Auge! Wir rufen die Australier dazu auf, sich die Silhouetten gängiger Flugzeuge zu merken und die Regierung über verdächtige oder feindliche Flugzeuge zu informieren, die sich dem Dominion nähern."
 AST_naval_bombers:0 "Marinebomber"
 AST_naval_bombers_desc:0 "Wir sind von Wasser umgeben, daher sollten wir uns mit Flugzeugen und Trainings befassen, die es uns ermöglichen, feindliche Flotten abzufangen und anzugreifen. Der Bombenangriff auf See ist eine Spezialfähigkeit und sollte im Mittelpunkt stehen."
 AST_death_from_down_under:0 "Tod aus Down Under"
 AST_death_from_down_under_desc:0 "Sobald wir unser Luftverteidigungssystem durch ein besseres Verständnis der Luftstreitkräfte und der rohen Gewalt von Luftabwehrwaffen modernisiert haben, werden keine Bomber mehr unsere Häfen und Städte beschädigen."
 AST_womens_auxilliary_australian_air_force:0 "Frauenhilfskräfte der australischen Luftwaffe"
 AST_womens_auxilliary_australian_air_force_desc:0 "Die Hälfte unserer Bevölkerung kann besser für die Kriegsanstrengungen eingesetzt werden, als zu Hause zu sitzen. Die Flugzeugwartung, das Nachrichtenkorps und andere damit verbundene Aufgaben werden den Frauen übertragen."
 AST_dominate_the_skies:0 "Beherrsche den Himmel"
 AST_dominate_the_skies_desc:0 "Australien ist weit entfernt von vielen feindlichen Luftwaffenstützpunkten, daher sollte es unser Ziel sein, in unserem Teil der Welt die totale Lufthoheit zu erlangen."
 AST_cockatoo_island_shipyards:0 "Werften auf Cockatoo Island"
 AST_cockatoo_island_shipyards_desc:0 "Der Ausbau und die Modernisierung der Cockatoo Island Shipyards haben für unsere Regierung höchste Priorität. Der Hafen von Sydney verfügt über den besten Zugang zu Arbeitskräften und Ressourcen, und dort sollten wir unsere Bemühungen im Schiffsbau konzentrieren."
 AST_protect_overseas_commerce:0 "Schutz des Überseehandels"
 AST_protect_overseas_commerce_desc:0 "Ein Inselstaat ist auf die Vorräte angewiesen, die er von anderen Inseln über die Meere beziehen kann. Die Verteidigung der Konvoilinien und Handelsrouten ist nicht nur eine Strategie – sie ist eine Notwendigkeit."
 AST_fly_the_jolly_roger:0 "Fliegen Sie die Piratenflagge"
 AST_fly_the_jolly_roger_desc:0 "Von unserer Inselfestung aus können wir U-Boot-Gruppen aussenden, um den feindlichen Handel und die Versorgung, die an unseren Küsten vorbeiführt, zu belästigen und zu zerstören."
 AST_scrap_iron_flotilla:0 "Schrotteisenflottille"
 AST_scrap_iron_flotilla_desc:0 "Bis wir unsere Flotte modernisieren können, müssen wir mit den alten Schiffen auskommen, die wir haben. Unser Feind mag unsere älteren Zerstörer als Schrottflottille bezeichnen, aber wir werden stolz darauf sein."
 AST_royal_australian_submarine_service:0 "Königlicher australischer U-Boot-Dienst"
 AST_royal_australian_submarine_service_desc:0 "U-Boote sind die Seewaffe der Zukunft und ein entscheidender Bestandteil der Streitkräfte unserer Verbündeten. Wir müssen diese Art der Kriegsführung annehmen."
 AST_naval_auxiliary_patrol:0 "Marine-Hilfspatrouille"
 AST_naval_auxiliary_patrol_desc:0 "Die vielen Häfen unseres großen Landes sind attraktive Ziele für heimliche U-Boot-Angriffe. Eine Hilfstruppe aus Küstenpatrouillenschiffen wird uns vor jeder Gefahr warnen."
 AST_cruisers:0 "Kreuzer"
 AST_cruisers_desc:0 "Wir können die Schlachtschiffe und Flugzeugträger den Großen überlassen, da eine Masse an Schiffen in Kreuzergröße unseren Bedarf mehr als decken wird."
 AST_pacific_area_navy:0 "Marine des Pazifikraums"
 AST_pacific_area_navy_desc:0 "Obwohl Seine Majestät in Europa ums Überleben kämpft, sollte unsere unmittelbare Priorität eine Marine sein, die unsere Feinde hier im Pazifik bekämpfen kann. Wir müssen Strategien entwickeln, die diesem Ziel entsprechen."
 AST_standard_gauge_railway:0 "Normalspurbahn"
 AST_standard_gauge_railway_desc:0 "Jahrzehntelang gab es in Australien konkurrierende Spurweiten, was unseren Transport- und Schifffahrtsbedarf durcheinander brachte. Es ist an der Zeit, die Spurweiten im ganzen Land endlich zu standardisieren."
 AST_industries_assistance_corporation:0 "Industries Assistance Corporation"
 AST_industries_assistance_corporation_desc:0 "Die jüngsten globalen Wirtschaftsverwerfungen haben Investitionen und Unternehmertum in Australien beeinträchtigt. Die Industries Assistance Corporation berät und finanziert kleine Unternehmen im ganzen Land, um die Wirtschaft wieder anzukurbeln."
 AST_western_australian_government_railways:0 "Western Australian Government Railways"
 AST_western_australian_government_railways_desc:0 "Den staatlichen Eisenbahnen in Westaustralien sollte derzeit eine höhere Priorität eingeräumt werden als dem Straßenbau. Die Geographie im Westen begünstigt die Bahn – das sollten wir ausnutzen."
 AST_south_australian_housing_trust:0 "Südaustralischer Wohnungsbaufonds"
 AST_south_australian_housing_trust_desc:0 "Südaustralien braucht mehr Industrie und Investitionen und wird daher Mittel für eine Reihe geplanter Siedlungen und Wohnungsverbesserungen bereitstellen, insbesondere rund um Adelaide."
 AST_department_of_supply_and_development:0 "Ministerium für Versorgung und Entwicklung"
 AST_department_of_supply_and_development_desc:0 "In Kriegszeiten benötigen wir eine spezielle Abteilung, die sich um Logistik- und Versorgungsfragen kümmert – Munition, Treibstoffvorräte und alles, was nötig ist, um eine Armee in Bewegung zu halten."
 AST_expand_lithgow_small_arms_factory:0 "Erweiterung der Lithgow Small Arms Factory"
 AST_expand_lithgow_small_arms_factory_desc:0 "Unsere Vickers und Brens kommen aus der Lithgow Small Arms Factory. Mit ihrem Wachstum wird es uns leichter fallen, unsere Kampfkraft zu steigern."
 AST_allied_works_council:0 "Alliierter Betriebsrat"
 AST_allied_works_council_desc:0 "Alle militärischen Bauvorhaben in Australien werden vom Allied Works Council überwacht. Diese zentralisierte Planung stellt sicher, dass die Regierung die Produktivität erreicht, die sie benötigt."
 AST_expand_the_northern_railway:0 "Ausbau der Nordbahn"
 AST_expand_the_northern_railway_desc:0 "Wir haben eine Eisenbahnlinie, die von Adelaide im Süden bis nach Alice Springs im Norden reicht. Nun müssen wir diesen nördlichen Punkt zu anderen Städten in der Region erweitern und so ganz Australien verbinden."
 AST_australian_arms_production:0 "Australische Waffenproduktion"
 AST_australian_arms_production_desc:0 "Aufgrund der langen Konvoizeiten muss Australien eine größere Verantwortung für die Herstellung eigener Waffen übernehmen als andere Dominions. Wir haben die Fabriken und wir haben das Know-how."
 AST_uranium_mining:0 "Uranabbau"
 AST_uranium_mining_desc:0 "In den letzten Jahrzehnten wurden in Südaustralien, insbesondere rund um Mount Gee, große Uranvorkommen entdeckt. Uran ist heute ein lebenswichtiger militärischer Rohstoff, und die Ausbeutung dieser Reserven sollte verstärkt werden."
 AST_establish_advisory_war_council:0 "Einrichtung eines beratenden Kriegsrates"
 AST_establish_advisory_war_council_desc:0 "Australiens Politiker müssen ideologische und parteipolitische Meinungsverschiedenheiten beiseite legen und zusammenkommen, um sich über die Kriegsführung zu beraten und Ratschläge zu erteilen."
 AST_national_security_act:0 "Nationales Sicherheitsgesetz"
 AST_national_security_act_desc:0 "Da wir uns nun im Krieg befinden, wird die Bundesregierung größere Machtbefugnisse zum Schutz Australiens an sich reißen. Sie wird eine stärkere Pressezensur und Unterdrückung von Dissidentengruppen sowie eine größere Möglichkeit zur Besteuerung und Beschlagnahmung von Eigentum zur Verteidigung des Dominions vorsehen."
 AST_volunteer_defence_corps:0 "Freiwilliges Verteidigungskorps"
 AST_volunteer_defence_corps_desc:0 "Aus älteren Veteranen und anderen Bürgern, die nicht in der regulären Armee sind, wurde ein freiwilliges Verteidigungskorps zusammengestellt. Sie dienen als Heimatschutz, um der Armee mehr Freiraum für direkte Aktionen gegen ihre Feinde zu geben."
 AST_civil_construction_corps:0 "Zivilbaukorps"
 AST_civil_construction_corps_desc:0 "Wir werden wehrfähige Männer zum Dienst in einem Zivilbaukorps einziehen, um beim Bau von Flugplätzen, Transportmitteln, Festungen und anderer wichtiger militärischer Infrastruktur zu helfen."
 AST_army_inventions_directorate:0 "Direktion für Erfindungen der Armee"
 AST_army_inventions_directorate_desc:0 "Kriege fördern Innovation und Kreativität. Die Regierung muss daher die guten von den schlechten Ideen unterscheiden. Ein neues, spezialisiertes Patentamt soll die Aufgabe haben, zu ermitteln, welche der zahlreichen Einreichungen bei der Regierung überhaupt einen Wert haben."
 AST_invest_in_victory:0 "Investieren Sie in den Sieg"
 AST_invest_in_victory_desc:0 "Durch den Verkauf von Kriegsanleihen an unsere Bevölkerung kann diese ihre Ersparnisse zur Kriegsanstrengung beitragen."
 AST_citizen_military_forces:0 "Bürgerliche Streitkräfte"
 AST_citizen_military_forces_desc:0 "Es ist jetzt an der Zeit, eine Reservearmee aufzustellen, um unsere Einsatzbereitschaft im Kriegsfall zu erhöhen. Wir werden verfügbare Milizionäre zur Verteidigung des Landes in die Armee einziehen und sie dann bei Bedarf auf den Einsatz im Ausland vorbereiten."
 AST_rats_of_tobruk:0 "Ratten von Tobruk"
 AST_rats_of_tobruk_desc:0 "Unsere tapferen Soldaten haben sich in der Wüstenkriegsführung und beim Plündern von Schlachtfeldern als geschickt erwiesen. Sie bedrängen den Feind, greifen ihn von seinen Stützpunkten aus an und ziehen sich dann vor dem Gegenangriff zurück."
 AST_rats_of_tobruk_effect_1:0 "Gewinnen Sie eine Eliteeinheit in Tobruk"
 AST_rats_of_tobruk_effect_2:0 "Gewinnen Sie eine Eliteeinheit in Sydney"
 AST_fight_work_or_perish:0 "Kämpfe, arbeite oder gehe unter"
 AST_fight_work_or_perish_desc:0 "Da unser Feind eine existenzielle Bedrohung für das Dominion darstellt, müssen die Australier eine Entscheidung treffen. Sie werden kämpfen, sie werden arbeiten oder sie werden untergehen."
 AST_research_collaboration:0 "Forschungskooperationen"
 AST_research_collaboration_desc:0 "Die Briten haben uns gezeigt, wie vorteilhaft es ist, wissenschaftliche Fortschritte unter engen Verbündeten zu teilen. Unsere gesamte Fraktion wird in der Lage sein, Forschung und Entwicklung im Krieg effizienter durchzuführen, wenn wir die notwendigen Schritte unternehmen, um dies zu koordinieren."
 AST_fund_australian_defense_research:0 "Finanzierung der australischen Verteidigungsforschung"
 AST_fund_australian_defense_research_desc:0 "Da Australien nun ein vollständig souveräner Staat ist, haben wir keinen Zugriff mehr auf fortschrittliche Prototypen und Baupläne wie früher. Wir müssen sicherstellen, dass wir unseren Feinden immer einen Schritt voraus sind und technologisch nicht ins Hintertreffen geraten."
 AST_squash_the_squanderbugs:0 "Zerquetschen Sie die Verschwendungswanzen"
 AST_squash_the_squanderbugs_desc:0 "Verschwenderische Ausgaben für inflationsbelastete Konsumgüter entziehen Kriegsanleihen und Kriegsanstrengungen Geld. Wir müssen diesen Luxushunger unterbinden, solange unsere Armee in Not ist."
 AST_rationing_and_recycling:0 "Rationierung und Recycling"
 AST_rationing_and_recycling_desc:0 "Jede Ressource zählt. Wir werden die Lebensmittel für unsere Bürger rationieren, durch Recycling möglichst viel Metall aus Altwaren gewinnen und die Wirtschaft im ganzen Land fördern."
 AST_classify_aliens:0 "Aliens klassifizieren"
 AST_classify_aliens_desc:0 "Australien ist ein Einwanderungsland und hat daher möglicherweise auch Einwanderer aufgenommen, die ihrer Heimat treu sind. Wir registrieren und verfolgen im Ausland geborene Australier."
 AST_strengthen_ties_with_uk:0 "Stärkung der Beziehungen zu Großbritannien"
 AST_strengthen_ties_with_uk_desc:0 "Unsere Loyalität gilt dem Mutterland. Wir werden dorthin gehen, wohin es uns folgt, und uns dem Kampf gegen seine Feinde verschreiben. Gott schütze den König."
 AST_support_the_policy_of_appeasement:0 "Unterstützen Sie die Appeasement-Politik"
 AST_support_the_policy_of_appeasement_desc:0 "Die Kosten des letzten Krieges belasten das nationale Gedächtnis noch immer schwer. Wenn territoriale Zugeständnisse am anderen Ende der Welt Australien aus einem Krieg heraushalten können, dann sollten wir diese Zugeständnisse auf jeden Fall in Betracht ziehen."
 AST_the_singapore_strategy:0 "Die Singapur-Strategie"
 AST_the_singapore_strategy_desc:0 "Singapur ist zu weit von London entfernt, um sicher zu sein. Australien wird es auf sich nehmen, diesen Außenposten des Imperiums vor der Aggression anderer zu schützen."
 AST_adopt_westminster:0 "Adoptieren Sie Westminster"
 AST_adopt_westminster_desc:0 "Wir bekennen uns zum Westminster-System, das wir vom Vereinigten Königreich übernommen haben."
 AST_CSIR:0 "CSIR"
 AST_CSIR_desc:0 "Die Commonwealth Scientific and Industrial Research Organization ist unser staatlicher Forschungszweig zur Verbesserung der Effizienz von Wissenschaft und Produktion in Australien. Indem wir unsere Unterstützung dafür verstärken, verleihen wir dem Krieg weitere Energie."
 AST_swpa_protector:0 "SWPA-Schutz"
 AST_swpa_protector_desc:0 "Australien muss die vorrangige Rolle als Beschützer des südwestlichen Pazifikraums übernehmen. Die gesamte Seezone von Indochina über Indonesien bis nach Neuguinea sollte unter unserer Schirmherrschaft stehen."
 AST_empire_air_training_scheme:0 "Empire Air Training Scheme"
 AST_empire_air_training_scheme_desc:0 "Es ist an der Zeit, dass Australien sich zu einem umfassenden Flugausbildungsprogramm verpflichtet. Mit der Ermutigung und Unterstützung des Vereinigten Königreichs werden alle Dominions zusammenarbeiten, um Piloten und Hilfspersonal für die Kriegsanstrengungen bereitzustellen."
 AST_commonwealth_aircraft_corporation:0 "Commonwealth Aircraft Corporation"
 AST_commonwealth_aircraft_corporation_desc:0 "Die Commonwealth Aircraft Corporation ist der wichtigste Hersteller von Flugzeugen und Flugzeugtriebwerken in Australien. Sie verfügt über eine nachweisliche Erfolgsgeschichte und wird unseren Piloten durch ihre Unterstützung die benötigten Materialien liefern."
 AST_sever_ties_with_uk:0 "Beziehungen zu Großbritannien abbrechen"
 AST_sever_ties_with_uk_desc:0 "Es ist an der Zeit, sich vom Vereinigten Königreich zu lösen. Australien kann seinen eigenen Kurs ohne Einmischung aus London bestimmen und in seiner Region sein eigenes Schicksal bestimmen."
 AST_protect_the_homeland:0 "Schützen Sie das Heimatland"
 AST_protect_the_homeland_desc:0 "Australien ist groß, aber seine Küsten können geschützt werden. Die Sicherheit unseres eigenen Landes hat höchste Priorität."
 AST_the_swpa_menace:0 "Die SWPA-Bedrohung"
 AST_the_swpa_menace_desc:0 "Japan baut ein Imperium auf, das die Sicherheit Australiens und die Freiheit in der Region bedroht. Wir sollten uns gleichgesinnten Nationen als Verbündeten zuwenden."
 AST_never_another_gallipoli:0 "Nie wieder Gallipoli"
 AST_never_another_gallipoli_desc:0 "Der einzige Weg, Australien vor weiteren kostspieligen Gefühlskriegen zu bewahren, besteht darin, die volle Kontrolle über unsere Außenpolitik zu übernehmen. Wir brauchen keinen fernen König und können es uns nicht leisten, dass uns alte Blutsbande in Konflikte hineinziehen, die unseren Interessen nicht dienen."
 AST_woo_usa:0 "Woo USA"
 AST_woo_usa_desc:0 "Unser wahrer Verbündeter ist Amerika, eine weitere Pazifikmacht mit britischen Wurzeln. Dieses reiche und mächtige Land ist besser in der Lage, unsere Bedürfnisse zu verstehen, unseren Wohlstand zu mehren und uns vor Aggressionen zu schützen."
 AST_protect_the_dutch_colonies:0 "Schützen Sie die niederländischen Kolonien"
 AST_protect_the_dutch_colonies_desc:0 "Die Niederlande sind schwache und distanzierte Herrscher ihrer indonesischen Kolonien. Sie können sie nicht gegen Angriffe aus Japan, China oder anderen potenziell feindlichen Ländern verteidigen. Wir müssen zum Wohle der Allgemeinheit die Kontrolle übernehmen."
 AST_the_south_west_pacific_initiative:0 "Die Südwestpazifik-Initiative"
 AST_the_south_west_pacific_initiative_desc:0 "Wir haben die Machtbasis und Glaubwürdigkeit geschaffen, um unser eigenes Bündnisnetzwerk aufzubauen, dessen Schwerpunkt auf der Verteidigung des südwestlichen Pazifikraums gegen feindliche Mächte liegt. Wir werden nach gleichgesinnten Mächten suchen und Australien zu einer wichtigen Stimme in globalen Angelegenheiten machen."
 AST_preemptive_intervention:0 "Präventive Intervention"
 AST_preemptive_intervention_desc:0 "Japans imperialer Aufbau im letzten Jahrzehnt stellt eine Bedrohung für alle freien Völker im Pazifik dar. Wir können es uns nicht leisten zu warten, bis es seine hungrigen Augen auf uns richtet. Jetzt ist es an der Zeit zu handeln."
 AST_research_cooperation:0 "Forschungskooperationen"
 AST_research_cooperation_desc:1 "Die Australier sind ein intelligentes und einfallsreiches Volk, verfügen jedoch weder über die Infrastruktur noch über die Bevölkerung für ein ernsthaftes wissenschaftliches Programm. Wir werden mit unseren Verbündeten zusammenarbeiten und Wissen und bahnbrechende Erkenntnisse zum gegenseitigen Nutzen austauschen."
 AST_abandon_the_westminster_system:0 "Geben Sie das Westminster-System auf"
 AST_abandon_the_westminster_system_desc:0 "Obwohl das Parlament in Westminster unser Erbe aus Großbritannien ist, hat es in der modernen Ära seinen Nutzen überlebt. Meinungsverschiedenheiten im Kabinett und Parteirivalitäten haben wenig dazu beigetragen, Australien in der jüngsten Wirtschaftskrise zu stabilisieren."
 AST_support_the_centre_party:0 "Unterstützen Sie die Zentrumspartei"
 AST_support_the_centre_party_desc:0 "In New South Wales ist eine starke antikommunistische Bewegung entstanden. Unterstützt von ihren Verbündeten aus der New Guard könnte die Zentrumspartei der Schlüssel zur Stärkung Australiens sein."
 AST_supply_indonesian_nationalists:0 "Versorgung indonesischer Nationalisten"
 AST_supply_indonesian_nationalists_desc:0 "Wir sollten das indonesische Volk in seinem Kampf gegen die niederländischen Unterdrücker unterstützen. Es braucht Bildung und Ausbildung, doch angesichts seiner zahlenmäßigen Überlegenheit ist ein Sieg in diesem Kampf für Gerechtigkeit unvermeidlich, ebenso wie seine Dankbarkeit uns gegenüber."
 AST_support_indonesian_uprising:0 "Unterstützen Sie den indonesischen Aufstand"
 AST_support_indonesian_uprising_desc:0 "Nachdem die Indonesier nun zu den Waffen gegen die Niederländer gegriffen haben, brauchen sie mehr als nur Worte. Der Aufstand braucht Waffen und andere Ausrüstung sowie uneingeschränkte diplomatische Unterstützung."
 AST_demand_new_zealand:0 "Nachfrage Neuseeland"
 AST_demand_new_zealand_desc:0 "Die Kiwis sind seit langem unsere engsten Verbündeten und Freunde. Wir haben an denselben Stränden gekämpft und sind in denselben sinnlosen imperialen Kriegen gestorben. Es ist Zeit, unsere beiden Länder unter einer Flagge zu vereinen."
 AST_protect_the_south_west_pacific:0 "Schützen Sie den Südwestpazifik"
 AST_protect_the_south_west_pacific_desc:0 "Es ist an der Zeit, unsere regionale Macht zu nutzen, um den gesamten Südwestpazifik in unseren Einflussbereich zu bringen. Nur wir können die Menschen und Ressourcen vor Außenstehenden schützen, die unser Erbe plündern wollen."
 AST_a_deal_with_japan:0 "Ein Deal mit Japan"
 AST_a_deal_with_japan_desc:0 "Mit dem Südwestpazifik in unserer Umlaufbahn können wir eine Annäherung an das japanische Kaiserreich erreichen. Wenn es im Nordwesten bleibt und uns unsere Sphäre überlässt, gibt es für uns keinen Grund zu kämpfen."
 AST_our_own_empire:0 "Unser eigenes Imperium"
 AST_our_own_empire_desc:0 "Es ist an der Zeit, dass die ehemalige Kolonie auf eigenen Beinen steht und ein australisches Imperium ausruft. Unser Wohlwollen und unsere weitsichtige Planung werden dem Wohl aller in der Region dienen."
 AST_japan_tech_sharing:0 "Japan Tech Sharing"
 AST_japan_tech_sharing_desc:0 "Japanische Wissenschaftler konnten unsere eigenen Forschungsinstitute überholen, aber unsere neue Harmonie mit dem Reich der aufgehenden Sonne eröffnet neue Möglichkeiten zum Lernen und Teilen."
 AST_war_on_japan:0 "Krieg gegen Japan"
 AST_war_on_japan_desc:0 "Japans Aggression dauert schon zu lange. Es hat sich seinen Weg durch Ostasien geplündert und geplündert, und nun hat es ein Auge auf die Länder und Ressourcen weiter südlich geworfen. Wir können nicht tatenlos zusehen."
 AST_empower_the_workers:0 "Stärkung der Arbeitnehmer"
 AST_empower_the_workers_desc:0 "Eine Nation von Sträflingen, Viehzüchtern und Hafenarbeitern. Das ist Australien. Es ist Zeit, den Arbeitern und dem Proletariat Australiens eine Stimme und Macht zu geben. Es lebe die Revolution."
 AST_delegation_to_china:0 "Delegation nach China"
 AST_delegation_to_china_desc:0 "Das chinesische Volk, das lange Zeit durch imperiale Gier zerrissen wurde, braucht einen Freund. Und wir brauchen einen regionalen Verbündeten gegen den Faschismus. Dieses offizielle Treffen mit der chinesischen Regierung wird uns einander näher bringen."
 AST_commitment_to_the_cause:0 "Engagement für die Sache"
 AST_commitment_to_the_cause_desc:0 "Es ist an der Zeit, die Fesseln eines ausländischen Königs abzuwerfen und ein Arbeiterparadies zu errichten, das frei von der imperialistischen Kriegstreiberei ist, die ganz Australien gefährdet."
 AST_indirect_support:0 "Indirekte Unterstützung"
 AST_indirect_support_desc:0 "Die Volksrepublik China befindet sich im Krieg, doch wir sind nicht in der Lage, uns dem auszusetzen. Eine kleine Waffenlieferung und vorsichtige Ermutigung ist alles, was wir im Moment riskieren können."
 AST_direct_support:0 "Direkte Unterstützung"
 AST_direct_support_desc:0 "Zu den Waffen, Genossen! Hört den Ruf unserer chinesischen Brüder, die im Krieg gegen den Faschismus leiden! Meldet euch an und schließt euch dem globalen Kampf aller Arbeiter an!"
 AST_join_comintern:0 "Treten Sie der Komintern bei"
 AST_join_comintern_desc:0 "Unsere Zukunft liegt im Kommunismus. Deshalb müssen wir uns unseren Genossen auf der ganzen Welt in diesem globalen Kampf anschließen. Papa Joe wird uns den Weg zeigen und die Arbeiter in Australien und anderswo in eine glorreiche Zukunft führen."
 AST_workers_paradise:0 "Arbeiterparadies"
 AST_workers_paradise_desc:0 "Das stalinistische kommunistische Experiment ist ein Fehlschlag, aber wir glauben, dass der Sozialismus der richtige Weg ist. Australien wird einen zweiten Weg für die Arbeiter einschlagen, unabhängig von den Vorgaben aus Moskau."
 AST_research_city_excursions:0 "Forschungsstadt-Exkursionen"
 AST_research_city_excursions_desc:0 "Die Sowjetunion hat auf ihrem gesamten Territorium Forschungsstädte und Labore errichtet und australische Forscher eingeladen, hierher zu kommen und etwas über die Herrlichkeit der kommunistischen Wissenschaft zu lernen."
 AST_nz_puppet:0 "Neuseeland zwingen"
 AST_nz_puppet_desc:0 "Neuseeland vor unserer Haustür zu haben, ist eine Bedrohung für unsere nationale Sicherheit. Wenn wir in Ozeanien und Asien eine Arbeiterrevolution durchführen wollen, müssen wir das ändern."
 AST_the_threat_against_the_people:0 "Die Bedrohung des Volkes"
 AST_the_threat_against_the_people_desc:0 "Die militaristische und faschistische Macht des kaiserlichen Japans bedroht das Wohlergehen aller Australier und verhindert das friedliche Zusammenleben der Arbeiter der Welt. Australien wird diesen Volksfeind zurückdrängen und ihn zwingen, auf seinen trostlosen, felsigen Inseln zu bleiben."
 AST_new_general_tt:0 "Ein neuer §Y3 Skill§!-General namens §YIven Mackay§! wird erscheinen."
 AST_homeland_defense_tt:0 "Befestigen Sie das Heimatland mit „Küstenfestungen und Landfestungen“!, die mögliche Landeplätze und Häfen bewachen."
 AST_swpi_research_tt:0 "Wir werden mit den USA oder mit anderen Mitgliedern unserer Fraktion eine „Ytech-Sharing-Vereinbarung“ abschließen."
 AST_deal_with_japan_tt:1 "Wir werden vorschlagen, die Oberhoheit über Malaya im Gegenzug für ein Bündnis an Japan zu übertragen. Sollte dies nicht möglich sein, werden wir stattdessen die Abtretung der Staaten Kalimantan, Sulawesi und Molukken an Japan vorschlagen.\n"
 CAN_rowell_sirois_commission:0 "Rowell-Sirois-Kommission"
 CAN_rowell_sirois_commission_desc:0 "Die Rowell-Sirois-Kommission kam zu dem Schluss, dass die föderale Verfassung Kanadas die Erholung von der Großen Depression behindert. Wir sollten die Servicestandards landesweit angleichen."
 CAN_crown_corporations:0 "Crown Corporations"
 CAN_crown_corporations_desc:0 "Um wichtige Dienstleistungen zu erbringen und das Wirtschafts- und Industriewachstum anzukurbeln, muss Kanada viele neue Crown Corporations gründen. Wo private Unternehmen nicht eingreifen, muss der Staat eingreifen."
 CAN_war_bonds:0 "Kriegsanleihen"
 CAN_war_bonds_desc:0 "Wir können die Kriegsanstrengungen nicht auf der Grundlage unserer mageren Steuereinnahmen oder Rohstoffexporte finanzieren. Das patriotische kanadische Volk muss in sein Land investieren und die Kriegsanstrengungen durch Kriegsanleihen unterstützen."
 CAN_defence_of_canada_regulations:0 "Vorschriften zur Verteidigung Kanadas"
 CAN_defence_of_canada_regulations_desc:0 "In Kriegszeiten müssen Bürgerrechte eingeschränkt werden, um eine Untergrabung der Kriegsanstrengungen zu verhindern. Dies bedeutet Einschränkungen der Presse, der Rechte von Dissidentengruppen und einiger gesetzlicher Rechte."
 CAN_national_housing_act:0 "Nationales Wohnungsbaugesetz"
 CAN_national_housing_act_desc:0 "Ein modernisierendes Dominion braucht landesweit einheitliche Wohnungsvorschriften. Wir müssen die Lebensbedingungen aller Kanadier verbessern."
 CAN_dollar_a_year_men:0 "Dollar-pro-Jahr-Männer"
 CAN_dollar_a_year_men_desc:0 "Die kanadische Industrie hat mit Effizienzproblemen zu kämpfen, doch eine Reihe wohlhabender Geschäftsleute bietet ihre Dienste und Beratung gegen eine symbolische Summe an. Dieser kleine Kreis von Beratern wird uns weiterbringen."
 CAN_canada_pacific_railway:0 "Kanadische Pazifikbahn"
 CAN_canada_pacific_railway_desc:0 "Die CPR hat alle ihre Ressourcen für die Kriegsanstrengungen zur Verfügung gestellt. Tausende Tonnen an Vorräten und Material werden unser großes Dominion ohne Unterbrechung von Meer zu Meer durchqueren."
 CAN_maritime_colonial_railway:0 "Maritime Kolonialeisenbahn"
 CAN_maritime_colonial_railway_desc:0 "Unsere Ostprovinzen sind seit dem Verkauf der Intercolonial Railway an die Canadian National Railway nicht ausreichend mit Bahnlinien versorgt. Wir fördern und realisieren den Bau einer neuen Maritime Colonial Railway, um die Verbindungen zwischen den Zentralprovinzen und den Atlantikprovinzen auszubauen."
 CAN_retool_angus_shops:0 "Angus Shops umrüsten"
 CAN_retool_angus_shops_desc:0 "Eine moderne Armee braucht Panzer, und die Angus Shops der CPR eignen sich für deren Bau. Rüsten Sie diese Infrastruktur um und bauen Sie Panzer."
 CAN_imperial_oil:0 "Imperial Oil"
 CAN_imperial_oil_desc:0 "Imperial Oil möchte die Exploration im Westen Kanadas finanzieren. Dies wird unsere Erdölreserven erhöhen und die Kriegsmaschinerie schmieren."
 CAN_department_of_munitions_and_supply:0 "Ministerium für Munition und Versorgung"
 CAN_department_of_munitions_and_supply_desc:0 "Wir werden die Kontrolle und Verwaltung der nationalen Ressourcen Kanadas unter CD Howe im Ministerium für Munition und Versorgung bringen."
 CAN_national_resources_mobilization_act:0 "Gesetz zur Mobilisierung nationaler Ressourcen"
 CAN_national_resources_mobilization_act_desc:0 "Kanada ist groß und seine Bevölkerung ist über das ganze Land verstreut. Es sollte ein System entwickelt werden, um den Beschäftigungsstatus zu verfolgen und sicherzustellen, dass jeder, der für den Auslandsdienst in Frage kommt, gefunden werden kann."
 CAN_wartime_prices_and_trade_board:0 "Preis- und Handelsausschuss während des Krieges"
 CAN_wartime_prices_and_trade_board_desc:0 "Um Wucher und Hamsterkäufe zu verhindern, wurden Preiskontrollen eingeführt, um die Waren für die meisten Kanadier erschwinglich zu machen."
 CAN_bits_and_pieces_program:0 "Bits and Pieces-Programm"
 CAN_bits_and_pieces_program_desc:0 "Das Bits and Pieces-Programm wird eine Reihe kleiner Fabriken, die sich auf die Herstellung von Konsumgütern spezialisiert haben, für die Kriegsanstrengungen mobilisieren. Eine Fahrradfabrik kann Kapazitäten für eine Reihe nützlicher Kriegsgüter schaffen."
 CAN_fund_the_national_research_council:0 "Finanzieren Sie den National Research Council"
 CAN_fund_the_national_research_council_desc:0 "Kanada blickt auf eine lange Geschichte der Wissenschaft und des Fortschritts zurück, doch der Bedarf an Forschern ist größer denn je. Es ist an der Zeit, dem NRC mehr Gewicht zu verleihen."
 CAN_mine_the_shield:0 "Den Schild abbauen"
 CAN_mine_the_shield_desc:0 "Der Kanadische Schild ist reich an Nickel, Kupfer, Gold und Silber. Die Natur ist reich an Mineralien. Es ist an der Zeit, sie weiter auszubeuten."
 CAN_canada_wheat_board:0 "Canada Wheat Board"
 CAN_canada_wheat_board_desc:0 "Die verheerende Wirkung der Depression auf unsere westlichen Landwirte kann abgemildert werden, wenn wir das Canada Wheat Board wiederbeleben und ihm neue Impulse geben, damit es die Verkaufspreise für Weizen, Gerste, Hafer und andere Feldfrüchte festlegt."
 CAN_victory_aircraft_limited:0 "Victory Aircraft Limited"
 CAN_victory_aircraft_limited_desc:0 "Victory Aircraft wurde mit dem Aufbau der kanadischen Bomberflotte beauftragt. Lancaster für alle!"
 CAN_alberta_coal_towns:0 "Kohlestädte in Alberta"
 CAN_alberta_coal_towns_desc:0 "Entlang der gesamten Rocky Mountains gibt es Kohlevorkommen, die nur darauf warten, ausgebeutet zu werden. Wir können die Auswanderung in diese neuen Minenstandorte fördern und die Beschäftigung im Westen verbessern."
 CAN_commit_to_the_war:0 "Verpflichte dich zum Krieg"
 CAN_commit_to_the_war_desc:0 "Die Welt brennt, und Kanada hat eine Rolle dabei zu spielen. Wir geloben, die Demokratie und die britische Lebensweise zu schützen."
 CAN_john_inglis_and_company:0 "John Inglis und Company"
 CAN_john_inglis_and_company_desc:0 "John Inglis and Company sollte angewiesen werden, neue Maschinengewehre und Kanonen für die kanadische Armee zu bauen."
 CAN_polymer_corporation:0 "Polymer Corporation"
 CAN_polymer_corporation_desc:0 "Der neue Staatskonzern Polymer Corporation hat sich bei der Herstellung neuer Kautschukpolymere als außerordentlich effizient erwiesen."
 CAN_national_steel_car:0 "Nationales Stahlauto"
 CAN_national_steel_car_desc:0 "Obwohl die National Steel Car Company während der Depression zu kämpfen hatte, verfügt sie über das Fachwissen und die Erfahrung, um beim Bau der Fahrzeuge zu helfen, die wir für den Ausbau der Eisenbahn und der Armee benötigen."
 CAN_send_in_the_zombies:0 "Reform des NPAM"
 CAN_send_in_the_zombies_desc:0 "Die Non-Permanent Active Militia (NPAM) ist die Bezeichnung für Kanadas 1855 gegründete, teilweise freiwillige Militärtruppe. Angesichts der gegenwärtigen Instabilität und Kriegstreiberei in Europa und Asien ist es jedoch an der Zeit, eine umfassende Reform durchzuführen, um die Einberufung neuer Soldaten für unsere Armee zu erleichtern."
 CAN_if_day:0 "Wenn Tag"
 CAN_if_day_desc:0 "Die Kanadier nehmen die Bedrohung durch ausländische Vorherrschaft nicht ernst. Deshalb simulieren wir eine Nazi-Besatzung Winnipegs, um die Angst zu schüren. Dies wird sicherlich den Verkauf von Victory Bonds steigern."
 CAN_defense_research_grants:0 "Forschungsstipendien für die Verteidigung"
 CAN_defense_research_grants_desc:0 "Da Kanada nun ein vollständig souveräner Staat ist, haben wir keinen Zugriff mehr auf fortschrittliche Prototypen und Baupläne wie früher. Wir müssen sicherstellen, dass wir unseren Feinden immer einen Schritt voraus sind und technologisch nicht ins Hintertreffen geraten."
 CAN_uranium_mining:0 "Uranabbau"
 CAN_uranium_mining_desc:0 "Unsere Verbündeten arbeiten an einem geheimen Projekt, für das Uran benötigt wird. Glücklicherweise hat die Eldorado Company das seltene Mineral entdeckt und rund um die Minen eine Stadt errichtet – Port Radium. Die Regierung muss die Kontrolle über diese Firma übernehmen und dieses hochsensible Mineral schützen."
 CAN_long_branch_arsenal:0 "Arsenal von Long Branch"
 CAN_long_branch_arsenal_desc:0 "Das Long Branch Arsenal im Westen Torontos wird unser Zentrum für die Gewehrproduktion sein. Wir benötigen Tausende von Lee-Enfields, und die zentrale Lage des Arsenals wird die Verteilung im ganzen Land erleichtern."
 CAN_independent_command:0 "Unabhängiges Kommando"
 CAN_independent_command_desc:0 "Im Ersten Weltkrieg waren die kanadischen Truppen letztlich britischen Offizieren unterstellt, was zu sinnlosen Massakern an der Somme und in Passchendaele führte. Dieses Mal wird Kanada sein eigenes Kommando übernehmen."
 CAN_forced_quebec_conscription:0 "Zwangsrekrutierung in Quebec"
 CAN_forced_quebec_conscription_desc:0 "Genau wie 1917 widersetzen sich unsere französisch-kanadischen Bürger in Quebec der Idee einer nationalen Wehrpflicht, um mehr Männer in die Armee zu holen. Wir werden nicht tatenlos zusehen, wie sich eine Minderheit dem Willen des Parlaments widersetzt."
 CAN_compromise_with_quebec:0 "Kompromiss mit Quebec"
 CAN_compromise_with_quebec_desc:0 "Quebec sträubt sich gegen die Wehrpflicht. Diese Frage hätte das Land im Ersten Weltkrieg beinahe auseinandergerissen, und wir können es uns in Krisenzeiten nicht leisten, unsere nationale Einheit zu gefährden. Vielleicht können wir uns auf eine Einigung über den Kriegsdienst für die Einwohner Quebecs einigen."
 CAN_war_fueled_economy:0 "Vom Krieg angeheizte Wirtschaft"
 CAN_war_fueled_economy_desc:0 "Die Nachfrage nach Rohstoffen und Fertigprodukten aus dem Ausland hilft Kanada aus der Depression. Unser natürlicher Reichtum an Wäldern und Mineralien kann die alliierte Kriegsmaschinerie versorgen und die Nation bereichern."
 CAN_army_modernization:0 "Modernisierung der Armee"
 CAN_army_modernization_desc:0 "Kanada hat seine Armee zu lange in seinem feuerfesten Zuhause, fernab von brennbaren Materialien, mit veralteter Ausrüstung und Ausbildung auskommen lassen. Wir müssen die Modernisierung vorantreiben, bevor es zu spät ist."
 CAN_canadian_infantry_corps:0 "Kanadisches Infanteriekorps"
 CAN_canadian_infantry_corps_desc:0 "Wir verfügen nun über genügend Männer, um eine Formation auf Korpsebene aufzustellen. Das kanadische Infanteriekorps ist unsere erste Gruppe in Korpsgröße seit dem letzten Krieg."
 CAN_cmp_truck:0 "CMP-LKW"
 CAN_cmp_truck_desc:0 "Kanadische Fabriken sind vor feindlichen Bombenangriffen geschützt und können daher gezielt für den Transport von Kriegsgütern eingesetzt werden. Unser CMP-LKW-Design ist vielseitig und für viele Klimazonen geeignet."
 CAN_royal_regiment_of_canadian_artillery:0 "Königliches Regiment der kanadischen Artillerie"
 CAN_royal_regiment_of_canadian_artillery_desc:0 "Trotz des Mangels an modernen Kanonen müssen wir damit beginnen, unsere Artilleristen für die Führung eines modernen Krieges auszubilden, einschließlich der Verwendung von Flugabwehrgeschützen und neuen 25-Pfündern."
 CAN_a_motorized_army:0 "Eine motorisierte Armee"
 CAN_a_motorized_army_desc:0 "Kanadas Erfahrung in der Herstellung von Lastwagen und Motoren hat uns einen Vorsprung bei der Forschung und Entwicklung motorisierter Streitkräfte verschafft."
 CAN_red_deer_training_camp:0 "Trainingslager Red Deer"
 CAN_red_deer_training_camp_desc:0 "Das Trainingslager Red Deer wird der Hauptstandort für die Ausbildung unserer neuen Armee sein. Mit einem umfassenden Waffenlager und nahegelegenen Flugplätzen ist Red Deer ideal gelegen."
 CAN_the_walkie_talkie:0 "Das Walkie-Talkie"
 CAN_the_walkie_talkie_desc:0 "Donald Hings hat ein neues tragbares Zweiwege-Kommunikationsgerät erfunden und patentiert, das auf Funkwellen basiert. Dies wird die Kommunikation und Zielerfassung erheblich verbessern."
 CAN_1st_canadian_parachute_battalion:0 "1. kanadisches Fallschirmjägerbataillon"
 CAN_1st_canadian_parachute_battalion_desc:0 "Trotz des Widerstands derjenigen, die es vorziehen würden, wenn wir uns auf die Verteidigung unseres Heimatlandes konzentrieren würden, ist für die moderne Luftkriegsführung ein spezielles Fallschirmjägerbataillon erforderlich, um unseren Feinden zuvorzukommen."
 CAN_the_black_devils:0 "Die schwarzen Teufel"
 CAN_the_black_devils_desc:0 "Für gefährliche Einsätze muss eine spezielle Kommandoeinheit bereitstehen. Die Zusammenarbeit mit unseren amerikanischen Verbündeten bei der Gründung der „Teufelsbrigade“ ist vereinbart."
 CAN_the_valentine_tank:0 "Der Valentine-Panzer"
 CAN_the_valentine_tank_desc:0 "Kanada verfügt über eine Lizenz zur Herstellung des Valentine Tank, eines robusten mittleren Panzers britischer Bauart."
 CAN_the_rocky_mountain_rangers:0 "Die Rocky Mountain Rangers"
 CAN_the_rocky_mountain_rangers_desc:0 "Die Verteidigung der Heimat im Westen obliegt den Rocky Mountain Rangers mit Sitz in Kamloops."
 CAN_strengthen_the_commonwealth_ties:0 "Stärkung der Commonwealth-Beziehungen"
 CAN_strengthen_the_commonwealth_ties_desc:0 "Unsere Mitdominions sind unsere treuesten Freunde und wir sollten alle gemeinsam marschieren, um Seine Majestät zu unterstützen."
 CAN_shadow_factories:0 "Schattenfabriken"
 CAN_shadow_factories_desc:0 "Wir brauchen Flugzeugfabriken, aber es ist einfacher und sicherer, die Teilefertigung auf andere Fabriken zu verteilen, insbesondere in der Nähe von Automobilwerken. Dies fördert die Geheimhaltung und Sicherheit."
 CAN_montreal_laboratory_collaboration:0 "Zusammenarbeit mit dem Montrealer Labor"
 CAN_montreal_laboratory_collaboration_desc:1 "Das Montreal Laboratory ist zu einer Attraktion für Wissenschaftler aus aller Welt geworden. Französische und britische Wissenschaftler fühlen sich besonders willkommen und bringen dringend benötigtes Fachwissen in die Bemühungen der Dominions ein."
 CAN_the_plan:0 "Der Plan"
 CAN_the_plan_desc:0 "Wir haben uns mit unseren Verbündeten zusammengeschlossen, um Erfahrungen und Erkenntnisse in der Pilotenausbildung auszutauschen. Der Krieg könnte aus der Luft gewonnen werden, daher könnte der Commonwealth Air Training Plan der Schlüssel zum Sieg sein."
 CAN_camp_x:0 "Camp X"
 CAN_camp_x_desc:0 "Die Informationsbeschaffung und Spionageausbildung wird an einem geheimen Standort in der Nähe von Oshawa zentralisiert. Von hier aus gelangen Signale aus Großbritannien und den USA ins Zentrum der Kommunikation."
 CAN_supply_the_empire:0 "Versorge das Imperium"
 CAN_supply_the_empire_desc:0 "Gibt es eine Nation, die so reich an Holz, Eisen, Nickel und Kohle ist? Solange unsere Konvois und Eisenbahnen sicher sind, können wir Rohstoffe zu unseren Häfen und dann zu unseren imperialen Partnern transportieren."
 CAN_aluminium_company_of_canada:0 "Aluminium Company of Canada"
 CAN_aluminium_company_of_canada_desc:0 "Aluminium ist leicht und rostfrei. Durch den Ausbau unseres Aluminiumabbaus und unserer Aluminiumproduktion können wir sicherstellen, dass unsere Fabriken und Fertigungsstraßen stets mit ausreichend Material versorgt sind."
 CAN_turner_valley_oilfield:0 "Ölfeld Turner Valley"
 CAN_turner_valley_oilfield_desc:0 "Das 1914 entdeckte Turner Valley vor den Toren Calgarys hat sich zu einem der größten Ölfelder des Empire entwickelt. Die weitere Erschließung sollte für Industrie und Regierung oberste Priorität haben."
 CAN_patriation:0 "Patriation"
 CAN_patriation_desc:0 "Für Kanada ist es an der Zeit, seine Bindungen zu Mutter England zu lockern. Wir sind eine gewachsene Nation mit einem eigenen Schicksal, die sowohl auf den Kontinent und über den Pazifik als auch auf England und Europa blickt."
 CAN_permanent_joint_defense_board:0 "Ständiger Gemeinsamer Verteidigungsausschuss"
 CAN_permanent_joint_defense_board_desc:0 "Die Geographie und das gemeinsame Erbe verbinden uns mit den Vereinigten Staaten, doch der Kontinent ist zu groß, als dass ihn einer von uns allein verteidigen könnte. Ein gemeinsamer Verteidigungsausschuss ist erforderlich, um den Schutz Nordamerikas zu beraten und zu planen."
 CAN_north_american_alliance:0 "Nordamerikanische Allianz"
 CAN_north_american_alliance_desc:0 "Es ist an der Zeit, eine große und dauerhafte Partnerschaft mit den Vereinigten Staaten von Amerika zu verkünden. Niemand kann uns herausfordern, wenn wir in Frieden und Brüderlichkeit vereint sind."
 CAN_habakkuk_carrier:0 "Habakuk-Träger"
 CAN_habakkuk_carrier_desc:0 "Im Rahmen des Projekts Habakuk planen wir den Bau eines U-Boot-Abwehrträgers aus Holzzellstoff und Eis. Dadurch wird Stahl für wichtigere Zwecke frei und die kanadische Wissenschaft wird gefördert."
 CAN_refuge_for_scientists:0 "Zufluchtsort für Wissenschaftler"
 CAN_refuge_for_scientists_desc:0 "Fernab vom Kriegsgetümmel hat sich Kanada als vielversprechender Landeplatz für Wissenschaftler erwiesen, die ihre Arbeit ohne Bomben und Kugeln durchführen möchten."
 CAN_swastika_clubs:0 "Hakenkreuzvereine"
 CAN_swastika_clubs_desc:0 "Viele Kanadier schließen sich Swastika-Clubs an, um die Ideen und Ideale des Faschismus zu fördern. Faszinierend!"
 CAN_support_the_blue_shirts:0 "Unterstützen Sie die Blauhemden"
 CAN_support_the_blue_shirts_desc:0 "Die Hinwendung unseres Landes zum Faschismus erfordert einen starken paramilitärischen Arm, um unsere Rivalen einzuschüchtern und zu beeindrucken. Die Blauhemden werden unsere Antwort auf jeden sein, der sich unserer neuen Ordnung widersetzt."
 CAN_join_germany:0 "Komm nach Deutschland"
 CAN_join_germany_desc:0 "Hitler hat sich als vernünftiger Mann erwiesen, der vernünftige Forderungen stellt und gleichzeitig seine Nation stärkt. Wir werden uns dem Reich solidarisch für ein neues Goldenes Zeitalter anschließen."
 CAN_support_a_synarchist_baja:0 "Unterstützen Sie ein synarchistisches Baja"
 CAN_support_a_synarchist_baja_desc:0 "Um die Verbreitung des konservativen Nationalismus in Nordamerika zu fördern, sollten wir uns mit aller Kraft für einen synarchistischen Aufstand in Mexiko einsetzen. Sobald dieser erfolgreich ist, werden wir zwei faschistische Staaten haben, die bereit sind, die Botschaft in der ganzen Hemisphäre zu verbreiten."
 CAN_pinion_the_eagle:0 "Pinion der Adler"
 CAN_pinion_the_eagle_desc:0 "Unsere lange Grenze zu den Vereinigten Staaten ist schon viel zu lange unverteidigt. Amerika bleibt die größte Bedrohung für die kanadische Sicherheit. Daher werden Maßnahmen ergriffen, um den USA eine Invasion zu erschweren und zu erschweren."
 CAN_skewer_the_eagle:0 "Spieß den Adler auf"
 CAN_skewer_the_eagle_desc:0 "Wir werden mit unseren mexikanischen Brüdern ein Bündnis bilden, um die amerikanische Bedrohung einzudämmen."
 CAN_defence_scheme_no_1:0 "Verteidigungsplan Nr. 1."
 CAN_defence_scheme_no_1_desc:0 "Es ist an der Zeit, den Verteidigungsplan Nr. 1, unseren Zwischenkriegsplan für einen Gegenangriff auf die Vereinigten Staaten im Kriegsfall, wieder hervorzuholen."
 CAN_demand_labrador_and_newfoundland:0 "Nachfrage Labrador und Neufundland"
 CAN_demand_labrador_and_newfoundland_desc:0 "Neufundland ist ein gescheitertes Dominion, das seinen Kolonialstatus wiedererlangen musste. Sein rechtmäßiger Platz liegt bei Kanada."
 CAN_burn_the_royal_portraits:0 "Verbrenne die königlichen Porträts"
 CAN_burn_the_royal_portraits_desc:0 "Keine Monarchen mehr! Wir werden uns nicht länger der Herrschaft einer ausländischen Galionsfigur und eines ausländischen Parlaments unterwerfen. Kanada wird frei und gleich sein. Das Volk wird sich erheben."
 CAN_communist_labor_total_war_committee:0 "Kommunistisches Arbeiterkomitee für den Totalen Krieg"
 CAN_communist_labor_total_war_committee_desc:0 "Kanadische Kommunisten sind auch Patrioten! Im globalen Krieg gegen den Faschismus können wir mit den bürgerlichen Liberalen zusammenarbeiten, um die gesamte Nation für den Krieg zu mobilisieren."
 CAN_defence_scheme_no_2:0 "Verteidigungsschema Nr. 2"
 CAN_defence_scheme_no_2_desc:0 "Verteidigungsplan Nr. 2 ist unser Notfallplan für den Fall eines Krieges im Pazifik zwischen den USA und dem japanischen Kaiserreich. Im Idealfall bleiben wir im Kriegsfall neutral, aber unabhängig von den Umständen wird eine starke Verteidigung an unserer Westküste aufgebaut."
 CAN_supply_the_red_army:0 "Versorgung der Roten Armee"
 CAN_supply_the_red_army_desc:0 "Da sich die Sowjetunion im Krieg gegen die Feinde des Volkes befindet, sollte Kanada Moskau mit Waffen und Nachschub unterstützen."
 CAN_canada_united:0 "Kanada vereint"
 CAN_canada_united_desc:0 "Obwohl unsere Bevölkerung in einer dünnen Linie über den Kontinent verstreut ist, haben wir uns in dieser Weltkrise zusammengeschlossen, um für kanadische Werte einzutreten und die Schwachen zu schützen."
 CAN_join_comintern:0 "Treten Sie der Komintern bei"
 CAN_join_comintern_desc:0 "Die Sowjetunion hat ihren guten Willen und ihre Stärke unter Beweis gestellt. Kanada sollte dem sowjetischen Bündnis beitreten."
 CAN_support_the_world_revolution:0 "Unterstützen Sie die Weltrevolution"
 CAN_support_the_world_revolution_desc:0 "Hört ihr das Volk singen? Es ist die Internationale! Kanada wird versuchen, das Proletariat von seinen Fesseln zu befreien."
 CAN_rcaf_station_borden:0 "RCAF-Station Borden"
 CAN_rcaf_station_borden_desc:0 "Das kanadische Luftkorps wurde in Borden, Ontario, gegründet und dieser Stützpunkt sollte zur Ausbildung einer neuen Generation von Piloten genutzt werden."
 CAN_we_have_the_hurricane:0 "Wir haben den Hurrikan"
 CAN_we_have_the_hurricane_desc:0 "Das Vereinigte Königreich hat uns die Genehmigung zum Bau einer Reihe von Hurricane-Kampfflugzeugen erteilt. Diese Flugzeuge werden das Herzstück unserer Luftstreitkräfte bilden."
 CAN_the_pacific_coast_air_defence_radar_system:0 "Das Radarsystem der Luftverteidigung an der Pazifikküste"
 CAN_the_pacific_coast_air_defence_radar_system_desc:0 "Die Küste von British Columbia ist felsig und mit Ausnahme des Südens dünn besiedelt. Wir werden uns auf Frühwarnsysteme wie eine Kette von Radarstationen verlassen müssen, um alles Ungewöhnliche zu erkennen, das über den Pazifik kommt."
 CAN_commonwealth_air_training_plan:0 "Commonwealth-Lufttrainingsplan"
 CAN_commonwealth_air_training_plan_desc:0 "Das Luftkampftraining wird mit unseren Verbündeten im Commonwealth und Dominion koordiniert. Dies ist effizienter und kann in großen Mengen und sicher auf unseren Flugplätzen durchgeführt werden."
 CAN_fund_fairchilds_development:0 "Finanzieren Sie die Entwicklung von Fairchild"
 CAN_fund_fairchilds_development_desc:0 "Das Fairchild-Flugzeugwerk in Quebec sollte die nötigen Mittel erhalten, um die Produktion von Bomberteilen zu steigern. Wir sollten in der Lage sein, die Zahl der Beschäftigten im Werk um Tausende zu erhöhen."
 CAN_cookie_carriers:0 "Keksträger"
 CAN_cookie_carriers_desc:0 "Der strategische Luftkrieg erfordert schwere Bomber, die unseren Feinden leckere Leckerbissen abwerfen."
 CAN_the_sabre_project:0 "Das Sabre-Projekt"
 CAN_the_sabre_project_desc:0 "Düsenflugzeuge werden den Himmel der Zukunft beherrschen, daher sollten wir in die Produktion unserer eigenen Varianten ausländischer Düsenflugzeuge investieren."
 CAN_halifax_shipyards:0 "Halifax-Werften"
 CAN_halifax_shipyards_desc:0 "In den Docks von Halifax, die günstig gegenüber Europa liegen, werden in Rekordtempo neue Schiffe gebaut. Die Schlacht um den Atlantik kann gewonnen werden."
 CAN_destroyer_effort:0 "Zerstörer-Anstrengung"
 CAN_destroyer_effort_desc:0 "Die Gefahr von U-Boot-Angriffen auf Versorgungs- und Truppenkonvois erfordert, dass wir uns auf den Bau von Zerstörern konzentrieren, um diese Unterwassergefahren zu jagen und zu beseitigen."
 CAN_light_cruiser_effort:0 "Leichter Kreuzer-Einsatz"
 CAN_light_cruiser_effort_desc:0 "Wir werden nie in der Lage sein, viele Großkampfschiffe zu bauen, aber kleinere Kreuzer, die in Massen gebaut werden, können immer noch eine Menge Schaden anrichten."
 CAN_heavy_cruiser_effort:0 "Schwerer Kreuzer-Einsatz"
 CAN_heavy_cruiser_effort_desc:0 "Wir können unsere Flotten um schwere Kreuzer herum aufbauen und verfügen über mehr als genug Häfen, um diese Strategie umsetzbar zu machen."
 CAN_escort_fleet:0 "Eskortflotte"
 CAN_escort_fleet_desc:0 "Die Ozeane trennen uns von den meisten Turbulenzen der Welt. Wenn unsere Armeen also kämpfen und versorgt werden sollen, müssen wir Eskortformationen und der U-Boot-Abwehr Priorität einräumen."
 CAN_fleet_in_being:0 "Überlegene Flotte"
 CAN_fleet_in_being_desc:0 "Durch den Aufbau einer großen Seestreitmacht kann allein ihre Existenz eine Bedrohung für unsere Feinde darstellen, selbst wenn wir sie nie einsetzen. Allein der Gedanke, dass unsere Schiffe auslaufen und ihre Seewege angreifen könnten, zwingt sie zur Vorsicht."
 CAN_degauss_ship_hulls:0 "Schiffsrümpfe entmagnetisieren"
 CAN_degauss_ship_hulls_desc:0 "Wir werden mit der Entmagnetisierung unserer Schiffsrümpfe beginnen, um ihre magnetische Signatur zu reduzieren. Dies schützt sie vor Magnetminen und reduziert das elektronische Profil der Schiffe."
 CAN_trade_fleet:0 "Handelsflotte"
 CAN_trade_fleet_desc:0 "Kanada ist eine Handelsnation. Bauen Sie mehr Frachter und Konvois."
 CAN_united_shipyards:0 "Vereinigte Werften"
 CAN_united_shipyards_desc:0 "Das Montrealer Dock von United Shipyards ist zur Hauptquelle für unsere Landungsboote und Frachtschiffe geworden."
 SAF_support_axis_interests_effect_tt:0 "Bauen Sie §YInfrastruktur§! und fügen Sie §YBauplätze§! in besetzten Staaten im südlichen und mittleren Afrika hinzu.\n"
 SAF_a_king_for_our_people_trigger_tt:0 "König Edward wurde verbannt"
 NATIONAL_FOCUS_MUTUALLY_EXCLUSIVE_TREE:0 "Die Zweige schließen sich gegenseitig aus."
 NATIONAL_FOCUS_EXCLUSIVE_INFO_DESC:0 "Gegenseitig ausschließend mit"
 NATIONAL_FOCUS_EXCLUSIVE_INFO_ENTRY:0 "$FOCUS|Y$"
 NATIONAL_FOCUS_NO_CURRENT_EFFECT:0 "Dieser Fokus hat derzeit keine Auswirkung. Änderungen der Weltlage können dies beeinflussen."
 SAF_war_measures_act:0 "Kriegsmaßnahmengesetz"
 SAF_war_measures_act_desc:0 "Wir können keine Unterbrechung der Kriegsanstrengungen dulden. Deshalb verabschieden wir neue Gesetze, um die vollständige Einhaltung der Regierungsziele zu erzwingen. Dies schützt den Ressourcenfluss und ermöglicht es uns, die politische Energie dort zu konzentrieren, wo sie benötigt wird."
 SAF_emergency_workers:0 "Rettungskräfte"
 SAF_emergency_workers_desc:0 "Es ist an der Zeit, einen größeren Teil der südafrikanischen Bevölkerung für die Kriegsanstrengungen zu mobilisieren. Auch Frauen können zu geringeren Kosten in die Fabriken gebracht werden."
 SAF_csir:0 "CSIR"
 SAF_csir_desc:0 "Südafrika hinkt in Wissenschaft und Technologie anderen Dominions hinterher, daher ist die Gründung des Rates für wissenschaftliche und industrielle Forschung in Pretoria für die Regierung zu einer dringenden Angelegenheit geworden."
 SAF_cape_garrison_artillery:0 "Artillerie der Kapgarnison"
 SAF_cape_garrison_artillery_desc:0 "Das Kap bleibt für viele Nationen ein wichtiger Seeweg und stellt das Tor zum südafrikanischen Kernland dar. Der Ausbau der Küstenverteidigung und der Artillerie der Garnison sollte ganz oben auf unserer To-do-Liste stehen."
 SAF_reconstitute_the_cape_corps:0 "Stellen Sie das Cape Corps wieder her"
 SAF_reconstitute_the_cape_corps_desc:0 "In der Vergangenheit war es uns möglich, einen Teil unserer farbigen Bevölkerung zum Dienst in der Verteidigung Südafrikas zu zwingen. Dies ist nicht bei allen im Land beliebt, aber es wird weiße Südafrikaner für den Dienst im Ausland frei machen."
 SAF_expand_the_cape_corps:0 "Erweitern Sie das Cape Corps"
 SAF_expand_the_cape_corps_desc:0 "Obwohl wir das Cape Corps als überwiegend nichtkämpfende Truppe neu aufgestellt haben, bedeutet die Bedrohung durch eine Invasion, dass wir dem Corps mehr Ressourcen, Ausbildung und Zugang zu Waffen geben müssen."
 SAF_work_for_all_poor:0 "Arbeit für alle Armen"
 SAF_work_for_all_poor_desc:0 "Arme Afrikaner vom Land strömten in den letzten Jahren auf der Suche nach Arbeit in die Städte, und wir haben wenig getan, um ihnen zu helfen. Bis jetzt. Die Industrialisierung und der staatliche Schutz ihres Zugangs zur Arbeit werden dieser Bevölkerung helfen."
 SAF_outlaw_strikes:0 "Gesetzlose Streiks"
 SAF_outlaw_strikes_desc:0 "Arbeitsunterbrechungen und Arbeitsunterbrechungen sind in Krisenzeiten unpatriotisch. Streiks werden hiermit für illegal erklärt und die Regierung wird die Menschen zur Rückkehr an die Arbeit zwingen."
 SAF_support_the_policy_of_appeasement:0 "Unterstützen Sie die Appeasement-Politik"
 SAF_support_the_policy_of_appeasement_desc:0 "Deutschland hat berechtigte Beschwerden, und die Dominions haben im letzten Krieg schwer gelitten. Wir sollten jede Gelegenheit für Frieden in unserer Zeit nutzen."
 SAF_police_windhoek:0 "Polizei Windhoek"
 SAF_police_windhoek_desc:0 "Seit dem Ende des letzten Krieges haben wir ein Mandat über die ehemalige deutsche Kolonie Südwestafrika. Es ist von entscheidender Bedeutung, dass wir unserer Pflicht nachkommen, die Großstadt Windhoek zu sichern und zu verbessern."
 SAF_joint_air_training_scheme:0 "Gemeinsames Lufttrainingsprogramm"
 SAF_joint_air_training_scheme_desc:0 "Die Commonwealth-Staaten bündeln ihre Ressourcen und Erfahrungen, um die Ausbildung von Piloten und Flugpersonal zu erleichtern und zu beschleunigen."
 SAF_desert_equipment:0 "Wüstenausrüstung"
 SAF_desert_equipment_desc:0 "Der Krieg in Nordafrika erfordert Spezialausrüstung, und da unsere Streitkräfte zum Einsatz an dieser Front herangezogen werden könnten, wird die Bereitstellung und Lieferung dieser Ausrüstung zu einer wichtigen logistischen Angelegenheit."
 SAF_suppress_the_stormjaers:0 "Unterdrückt die Stormjaers"
 SAF_suppress_the_stormjaers_desc:0 "Die faschistische, prodeutsche Ossewabrandwag (OB) verfügt über einen paramilitärischen Flügel nach dem Vorbild ähnlicher europäischer Gruppen. Sie behindern die Bemühungen der Regierung, Truppen zu rekrutieren und eine sichere und einheitliche Kriegspolitik zu verfolgen. Die Stormjaers müssen zerschlagen werden."
 SAF_secure_interests_in_africa:0 "Sichere Interessen in Afrika"
 SAF_secure_interests_in_africa_desc:0 "Die Südafrikanischen Union grenzt an eine Reihe britischer Kolonien, die wir verwalten könnten. Wir sollten außerdem alles in unserer Macht Stehende tun, um unser Mandat über Südwestafrika dauerhaft zu sichern."
 SAF_native_laws_amendment_act:0 "Gesetz zur Änderung der Gesetze der Ureinwohner"
 SAF_native_laws_amendment_act_desc:0 "Um der afrikaansen Bevölkerung weiterhin Arbeit zu sichern, müssen wir die Ansiedlung schwarzer Südafrikaner in den Städten begrenzen. Nur diejenigen, die schon lange in der Gemeinde leben, erhalten ein Aufenthaltsrecht."
 SAF_encourage_segregation:0 "Segregation fördern"
 SAF_encourage_segregation_desc:0 "Wir sollten stärker auf eine rechtliche Trennung unserer verschiedenen ethnischen Bevölkerungsgruppen drängen, um die Macht und Einheit unserer herrschenden Klasse zu stärken."
 SAF_abandon_westminster:0 "Verlassen Sie Westminster"
 SAF_abandon_westminster_desc:0 "Die Ersetzung der Kaproute durch die Suezroute sowie die prägenden Erfahrungen des Burenkrieges haben dazu beigetragen, eine südafrikanische Identität zu schaffen, die sich von der unserer Dominion-Verbündeten unterscheidet. Wir sollten uns vom König distanzieren und unseren eigenen Weg gehen."
 SAF_support_the_afrikaner_broederbond:0 "Unterstützen Sie den Afrikaner Broederbond"
 SAF_support_the_afrikaner_broederbond_desc:0 "Der Afrikaaner Broederbond setzt sich für eine stärkere Mitsprache der Afrikaaner und eine stärkere Rassentrennung ein. Die Erinnerung an die britische Politik im Burenkrieg ist noch lebendig, und der Broederbond kann zum Aufbau eines neuen Südafrikas beitragen."
 SAF_support_ossewabrandwag:0 "Unterstützen Sie Ossewabrandwag"
 SAF_support_ossewabrandwag_desc:0 "Die faschistische paramilitärische Ossewabrandwag-Truppe sollte als Bollwerk gegen ausländische Agitation und inländische Aufstände eingesetzt werden, die sich gegen unsere herrschende Klasse richten."
 SAF_celebrate_the_great_trek:0 "Feiern Sie den Großen Treck"
 SAF_celebrate_the_great_trek_desc:0 "Vor einem Jahrhundert trennten sich unsere Afrikaaner-Vorfahren von der aufstrebenden britischen Kolonialmacht und gründeten im Nordosten ihren eigenen Burenstaat. Ihr unerschütterlicher Geist verkörpert noch heute die besten südafrikanischen Tugenden."
 SAF_voortrekker_monument:0 "Voortrekker-Denkmal"
 SAF_voortrekker_monument_desc:0 "Ein Denkmal für die Voortrekker, die den Großen Treck unternahmen, wird den Nationalgeist und die Einheit in diesen schwierigen Zeiten stärken."
 SAF_support_nazification_of_south_west_africa:0 "Unterstützen Sie die Nazifizierung Südwestafrikas"
 SAF_support_nazification_of_south_west_africa_desc:0 "Als ehemalige deutsche Kolonie ist es für uns nur angemessen, die Verbreitung deutscher politischer Ideen in Südwestafrika zu fördern."
 SAF_south_africa_first:0 "Südafrika zuerst"
 SAF_south_africa_first_desc:0 "Südafrika ist die stärkste unabhängige Nation auf dem Kontinent und kann daher ein Leitstern für die Zukunft Afrikas und ehemaliger Kolonien sein."
 SAF_support_the_german_coup:0 "Unterstützen Sie den deutschen Putsch"
 SAF_support_the_german_coup_desc:0 "Die deutsche Regierung betrachtet Südafrika schon seit dem letzten Jahrhundert als fruchtbaren Boden für größeren Einfluss. Unsere Zukunft liegt beim Reich, nicht beim Empire. Lassen Sie uns also den Plan zum Sturz der derzeitigen Regierung vorantreiben."
 SAF_reclaim_boer_colonies:0 "Burenkolonien zurückerobern"
 SAF_reclaim_boer_colonies_desc:0 "Das ehemalige Burengebiet Transvaal und andere Regionen gehören rechtmäßig den freien Erben dieses unternehmungslustigen Volkes."
 SAF_commemorate_the_battle_of_blood_river:0 "Gedenken an die Schlacht am Blood River"
 SAF_commemorate_the_battle_of_blood_river_desc:0 "Im Jahr 1838 wehrte ein Wagenlager burischer Siedler Zehntausende Zulu-Krieger ab und versetzte der Macht der Zulu in Natal damit einen vernichtenden Schlag. Dies war sicherlich ein göttliches Zeichen für die Richtigkeit unserer Sache."
 SAF_german_scientists:0 "Deutsche Wissenschaftler"
 SAF_german_scientists_desc:0 "Deutsche Wissenschaftler gehören zu den besten der Welt und können uns viel mitteilen."
 SAF_support_axis_interests:0 "Unterstützen Sie die Interessen der Achsenmächte"
 SAF_support_axis_interests_desc:0 "Die Achsenmächte verfügen über eine Energie und Ideologie, die Südafrika helfen kann, seinen Platz in der Welt zu behaupten. Wir sollten ihnen unsere volle diplomatische Unterstützung zukommen lassen."
 SAF_a_king_for_our_people:0 "Ein König für unser Volk"
 SAF_a_king_for_our_people_desc:0 "Südafrika sollte einen König haben, und glücklicherweise gibt es einen Windsor, den derzeit niemand benutzt. Der ehemalige Edward VIII., Herzog von Windsor, kann auf unserem Thron sitzen."
 SAF_empower_the_workers:0 "Stärkung der Arbeitnehmer"
 SAF_empower_the_workers_desc:0 "Wir sind ein Land der Bergarbeiter und Bauern. Die arbeitende Bevölkerung Südafrikas ist die einzige wahre Repräsentation des nationalen Willens."
 SAF_support_spain:0 "Support Spanien"
 SAF_support_spain_desc:0 "Der Faschismus ist in Europa auf dem Vormarsch, und wir können ihn in Spanien stoppen – oder zumindest seine Ausbreitung verlangsamen. Männer und Material sollten zur Unterstützung der republikanischen Sache geschickt werden."
 SAF_repeal_the_native_representation_act:0 "Aufhebung des Native Representation Act"
 SAF_repeal_the_native_representation_act_desc:0 "Rassendiskriminierung widerspricht den Werten der Volksrevolution in Südafrika. Schwarze sollten wieder in das allgemeine Wahlregister aufgenommen und mit politischen Rechten ausgestattet werden."
 SAF_burn_the_kings_portraits:0 "Verbrennt die Porträts des Königs"
 SAF_burn_the_kings_portraits_desc:0 "Nieder mit der königlichen Familie! Mit dieser symbolischen Geste erklären wir öffentlich unseren Verzicht auf den ausländischen Thron."
 SAF_join_comintern:0 "Treten Sie der Komintern bei"
 SAF_join_comintern_desc:0 "Die Sowjetunion stand an vorderster Front im Kreuzzug für die Arbeiter und gegen den Faschismus. Wir werden uns ihrem mächtigen Bündnis anschließen."
 SAF_support_the_world_revolution:0 "Unterstützen Sie die Weltrevolution"
 SAF_support_the_world_revolution_desc:0 "Der einzige Weg zum Sieg der Arbeiter besteht darin, den gesamten Globus in einer gemeinsamen Anstrengung zu vereinen. Die Revolution muss universell sein und daher exportiert werden."
 SAF_equal_opportunity_employment:0 "Chancengleichheit bei der Beschäftigung"
 SAF_equal_opportunity_employment_desc:0 "Wenn wir die Lage der Arbeitnehmer in unserem Land verbessern wollen, müssen wir zunächst dafür sorgen, dass alle Arbeitnehmer gleich behandelt werden, unabhängig von ihrer Hautfarbe."
 SAF_demand_madagascar:0 "Nachfrage Madagaskar"
 SAF_demand_madagascar_desc:1 "Angesichts der dramatischen Veränderungen in Europa ist es an der Zeit, das gesamte System des Kolonialismus zu überdenken. Warum sollte Madagaskar an ein untergehendes Imperium gefesselt bleiben?"
 SAF_invite_soviet_advisers:0 "Laden Sie sowjetische Berater ein"
 SAF_invite_soviet_advisers_desc:4 "Wenn wir die Sowjetunion in ihrem Kampf um die Freiheit der Arbeiter der Welt unterstützen wollen, müssen wir unser Militär verbessern, indem wir von ihr lernen."
 SAF_south_african_soviet_research_treaty:0 "Forschungsvertrag mit der UdSSR"
 SAF_south_african_soviet_research_treaty_desc:1 "Nachdem wir von unseren sowjetischen Freunden viele wertvolle Lektionen gelernt haben, ist es an der Zeit, die Beziehungen zu vertiefen und einen formellen Vertrag zu unterzeichnen."
 SAF_anti_colonialist_crusade:0 "Antikolonialistischer Kreuzzug"
 SAF_anti_colonialist_crusade_desc:1 "Der Kolonialismus ist das Herzstück des imperialistischen Systems, das die Arbeiter der Welt unterdrückt. Wir sind in der einzigartigen Lage, dieses System zu zerschlagen und die afrikanische Bevölkerung von der jahrhundertelangen Ausbeutung zu befreien, die sie ertragen musste."
 SAF_Union_of_the_African_People:0 "Union des afrikanischen Volkes"
 SAF_Union_of_the_African_People_desc:1 "Lange Zeit hatten die Menschen Afrikas kein Mitspracherecht bei der Bestimmung ihres eigenen Schicksals. Diese Zeiten sind vorbei. Wir werden eine Fraktion bilden, die stark genug ist, um jedem Versuch der revanchistischen Mächte der Welt standzuhalten, unsere Errungenschaften rückgängig zu machen. Afrika wird frei vom Kolonialismus sein."
 SAF_liberate_portugese:0 "Befreit die portugiesischen Kolonien"
 SAF_liberate_portugese_desc:1 "Die Kolonien Angola und Mosambik liegen direkt an unserer Grenze. Es ist an der Zeit, die Ausbeutung ihrer Bevölkerung zu beenden."
 SAF_liberate_british:0 "Befreien Sie britische Kolonien"
 SAF_liberate_british_desc:1 "Das Britische Empire ist das berüchtigtste Beispiel für Kolonialismus in der Geschichte. Wir werden ihm ein Ende setzen."
 SAF_liberate_belgian:0 "Befreit die belgischen Kolonien"
 SAF_liberate_belgian_desc:1 "Belgisch-Kongo gilt als eines der grausamsten Gebiete der Ausbeutung und Unterdrückung. Wir werden das letzte Kapitel dieser Geschichte schreiben."
 SAF_south_african_railways:0 "Südafrikanische Eisenbahnen"
 SAF_south_african_railways_desc:0 "Die südafrikanische Eisenbahngesellschaft muss ausgebaut werden. Dort können junge Leute ausgebildet und mit den notwendigen Fähigkeiten ausgestattet werden, um sowohl im Inland als auch im Ausland zu arbeiten."
 SAF_expand_the_mining_industry:0 "Ausbau der Bergbauindustrie"
 SAF_expand_the_mining_industry_desc:0 "Südafrikas Mineralreichtum ist legendär und wir haben gerade erst begonnen, seine riesigen Gold-, Chrom- und Platinreserven zu erschließen."
 SAF_heavy_engineering:0 "Schwermaschinenbau"
 SAF_heavy_engineering_desc:0 "Es ist wichtig, dass Südafrika stets auf dem neuesten Stand der Technik bleibt. Auch wenn unsere industrielle Basis klein ist, sollten wir in Schwermaschinen und Maschinenbau investieren, um schnell zu unseren Mitbewerbern aufzuschließen."
 SAF_infrastructure_effort:0 "Infrastrukturaufwand"
 SAF_infrastructure_effort_desc:0 "Große Teile Südafrikas sind noch immer ländlich und unterentwickelt. Mehr Straßen und Eisenbahnen könnten die natürlichen Reichtümer des Landes zu seinen hungrigen Häfen bringen."
 SAF_armament_effort:0 "Rüstungsanstrengungen"
 SAF_armament_effort_desc:0 "Südafrika ist vor der Invasion ausländischer Mächte sicher, aber auch weit entfernt von seinen Verbündeten. Es ist von entscheidender Bedeutung, dass das Land seine eigene Rüstungsindustrie aufbaut, damit die Union nie schutzlos dasteht."
 SAF_south_african_steel:0 "Südafrikanischer Stahl"
 SAF_south_african_steel_desc:0 "Wir haben Kohle und Eisen. Jetzt haben wir auch den Grund. Der Ausbau des Iscor-Stahlwerks in Pretoria wird das Land mit den für moderne Waffen notwendigen schweren Stahlplatten versorgen."
 SAF_pretoria_arms:0 "Pretoria Arms"
 SAF_pretoria_arms_desc:0 "Das bestehende Stahlwerk in Pretoria hat sich auf die Produktion von Grobblechen spezialisiert. Mit einigen Werkzeugmaschinen können wir jedoch einen Teil der Fabrik in ein Zentrum für die Produktion von Kleinwaffen umwandeln."
 SAF_expand_the_rand_mines:0 "Erweitern Sie die Rand-Minen"
 SAF_expand_the_rand_mines_desc:0 "Die Rand-Minen gehören zu den tiefsten Goldminen der Welt – und das sogar mit der Technologie des 19. Jahrhunderts. Heute sind wir zu so viel mehr fähig. Graben Sie tief! Und gierig sogar."
 SAF_fund_the_university_of_south_africa:0 "Finanzieren Sie die Universität von Südafrika"
 SAF_fund_the_university_of_south_africa_desc:0 "Die University of South Africa in Pretoria ist eine der besten Universitäten des Kontinents – sogar der südlichen Hemisphäre. Indem wir in sie investieren, können wir unsere eigenen Talente vor Ort fördern, anstatt unsere jungen Leute ins Ausland zu schicken."
 SAF_establish_the_atomics_energy_board:0 "Gründung des Atomenergie-Gremiums"
 SAF_establish_the_atomics_energy_board_desc:0 "Atomwaffen werden der größte militärische Durchbruch seit der Erfindung des Schießpulvers sein, ganz zu schweigen von der friedlichen Nutzung dieser Macht, wenn es uns gelingt, das Atom nutzbar zu machen. Versammeln Sie unsere Spitzenwissenschaftler, um dies zu untersuchen."
 SAF_the_cape_defense_institute:0 "Das Cape Defense Institute"
 SAF_the_cape_defense_institute_desc:0 "Da Südafrika nun ein vollständig souveräner Staat ist, haben wir keinen Zugriff mehr auf fortschrittliche Prototypen und Baupläne wie früher. Wir müssen sicherstellen, dass wir unseren Feinden immer einen Schritt voraus sind und technologisch nicht zurückfallen."
 SAF_defense_collaboration_initiative:0 "Initiative zur Zusammenarbeit im Verteidigungsbereich"
 SAF_defense_collaboration_initiative_desc:0 "Die Briten haben uns gezeigt, wie vorteilhaft es ist, wissenschaftliche Fortschritte unter engen Verbündeten zu teilen. Unsere gesamte Fraktion wird in der Lage sein, Forschung und Entwicklung im Krieg effizienter durchzuführen, wenn wir die notwendigen Schritte unternehmen, um dies zu koordinieren."
 SAF_special_service_battalion:0 "Spezialdienstbataillon"
 SAF_special_service_battalion_desc:0 "Südafrika ist voller junger, arbeitsloser Männer, die eine sinnvolle Beschäftigung suchen. Das Special Service Battalion wird ihnen die dringend benötigte Disziplin und Organisation vermitteln."
 SAF_improve_the_three_oh_three:0 "Verbessern Sie die Drei-Null-Drei"
 SAF_improve_the_three_oh_three_desc:0 "Südafrikas Truppen werden in unterschiedlichsten Klimazonen kämpfen, und wir haben das Glück, dass sich das Lee-Enfield-Gewehr leicht anpassen lässt. Die .303-Patrone wurde von anderen Ländern mehrfach an ihre Bedürfnisse angepasst."
 SAF_q_services_corps:0 "Q-Services-Korps"
 SAF_q_services_corps_desc:0 "Das Q Services Corps wird die zentrale Behörde sein, die für die Logistik und Versorgung der stehenden Armee verantwortlich ist. Es wird sich um die Verteilung von Öl, Verpflegung, Munition und Uniformen kümmern."
 SAF__south_african_military_college:0 "Südafrikanisches Militärcollege"
 SAF__south_african_military_college_desc:0 "Südafrika sollte eine Militärakademie nach dem Vorbild von West Point in den USA haben. Dadurch erhalten wir ein professionelles Offizierskorps, das der Union treu ergeben ist."
 SAF_expand_the_south_african_artillery:0 "Ausbau der südafrikanischen Artillerie"
 SAF_expand_the_south_african_artillery_desc:0 "Das Artilleriekorps wurde 1934 vereinigt. Nun ist es an der Zeit, seine Größe und Kapazität zu erhöhen."
 SAF_sa_engineer_corps:0 "SA-Pionierkorps"
 SAF_sa_engineer_corps_desc:0 "Das südafrikanische Pionierkorps verfügt über kaum 600 uniformierte Soldaten. Das ist in einer modernen Armee inakzeptabel. Für diese wichtige Aufgabe brauchen wir mehr Soldaten und eine bessere Ausbildung."
 SAF_equipment_effort:0 "Geräteaufwand"
 SAF_equipment_effort_desc:0 "Wir dürfen die Versorgung unserer Armee mit der notwendigen Ausrüstung nicht vernachlässigen. Waffen und Panzer sind gut und schön, aber wir brauchen Uniformen, Funkgeräte, Reparatursets und mehr."
 SAF_south_african_special_forces:0 "Südafrikanische Spezialeinheiten"
 SAF_south_african_special_forces_desc:0 "Südafrika braucht eine einheimische Kommandotruppe, um diese schwierigen Aufgaben an schwer zugänglichen Orten zu bewältigen."
 SAF_mechanization_effort:0 "Mechanisierungsbemühungen"
 SAF_mechanization_effort_desc:0 "Der motorisierte und mechanisierte Krieg steht uns bevor. Der Große Treck der Zukunft wird von Ketten- und Radfahrzeugen geführt."
 SAF_armor_effort:0 "Rüstungsaufwand"
 SAF_armor_effort_desc:0 "Panzer haben seit den trägen Bestien des letzten Krieges eine lange Entwicklung durchgemacht. Unsere Forschung und Ausbildung dürfen nicht hinter denen unserer Feinde – oder unserer Freunde – zurückbleiben."
 SAF_commit_to_the_five_year_plan:0 "Verpflichten Sie sich zum Fünfjahresplan"
 SAF_commit_to_the_five_year_plan_desc:0 "Wir haben einen Fünfjahresplan für die Modernisierung und den Ausbau der südafrikanischen Luftwaffe entwickelt. Die Regierung muss sich öffentlich dazu verpflichten, diesen Zeitplan einzuhalten."
 SAF_improve_the_hawker_hartbees:0 "Verbessern Sie die Hawker Hartbees"
 SAF_improve_the_hawker_hartbees_desc:0 "Unsere Hawker Hartbees gehören zwar nicht zu den modernsten Kampfflugzeugen der Welt, aber wir werden damit klarkommen. Mit verbesserter Mechanik und Training holen wir das Beste aus diesen Doppeldeckern heraus."
 SAF_replace_the_blenheim:0 "Ersetzen Sie den Blenheim"
 SAF_replace_the_blenheim_desc:0 "Die Bristol Blenheim war für die RAF und die Dominions ein brauchbarer leichter Bomber. Doch nun ist es vielleicht an der Zeit, etwas Robusteres mit größerer Reichweite zu finden."
 SAF_perfect_the_cab_rank_technique:0 "Perfektionieren Sie die „Cab-Rank“-Technik"
 SAF_perfect_the_cab_rank_technique_desc:0 "Bei der „Cab-Rank“-Technik greifen mehrere Bomber in einer langen Reihe nacheinander ein Ziel an. Dies hält den Druck auf den Feind aufrecht, erfordert aber viel Geschick."
 SAF_desert_air_force:0 "Wüstenluftwaffe"
 SAF_desert_air_force_desc:0 "Der Wüstenhimmel ist klar, und Hitze und Sand erfordern besondere Aufmerksamkeit für die Mechanik unserer Flugzeuge. In dieser unerbittlichen Umgebung können wertvolle Fähigkeiten erlernt werden."
 SAF_secure_the_cape_sea_route:0 "Sicherung der Kapseeroute"
 SAF_secure_the_cape_sea_route_desc:0 "Sollte der Suezkanal fallen, wird das Kap erneut das Tor zum Osten sein. Verteidigen Sie es um jeden Preis."
 SAF_retain_experienced_pilots:0 "Halten Sie erfahrene Piloten"
 SAF_retain_experienced_pilots_desc:0 "Zu oft wechseln unsere erfahrenen Piloten zur Royal Air Force, anstatt bei unseren eigenen Streitkräften zu bleiben. Die RAF bietet bessere Aufstiegs- und Kampfchancen. Wir sollten jedoch versuchen, unsere ausgebildeten Piloten in der Nähe ihrer Heimat zu halten, wo sie andere Südafrikaner inspirieren und ausbilden können."
 SAF_seaward_defence_force:0 "Seaward-Verteidigungsstreitkräfte"
 SAF_seaward_defence_force_desc:0 "Die Seaward Defense Force dient seit zwei Jahrzehnten als unsere Marine. Ihre Mittel sollten aufgestockt werden."
 SAF_protect_the_trade:0 "Schützen Sie den Handel"
 SAF_protect_the_trade_desc:0 "Der letzte Krieg hat gezeigt, wie wichtig Konvois und Eskorten sind. Südafrika liegt an einer wichtigen Handelsroute und sollte dafür sorgen, dass die Waren ihr Ziel erreichen."
 SAF_disrupt_the_trade:0 "Den Handel stören"
 SAF_disrupt_the_trade_desc:0 "Der letzte Krieg hat gezeigt, wie wichtig Konvois und Eskorten sind. Südafrika liegt an einer wichtigen Handelsroute und ist ideal gelegen, um feindliche Schiffe abzufangen und zu zerstören."
 SAF_expand_the_simons_town_base:0 "Erweitern Sie die Simon&#39;s Town-Basis"
 SAF_expand_the_simons_town_base_desc:0 "Simon’s Town am Kap ist seit den 1790er Jahren der wichtigste Marinestützpunkt im südlichen Afrika. Er sollte umgerüstet und erweitert werden, um mehr und größere Schiffe aufnehmen zu können."
 SAF_anti_submarine_tactics:0 "U-Boot-Abwehrtaktiken"
 SAF_anti_submarine_tactics_desc:0 "U-Boote bedrohen die Schiffe, die das Kap der Guten Hoffnung passieren. Wir müssen sie finden und zerstören."
 SAF_submarine_warfare:0 "U-Boot-Krieg"
 SAF_submarine_warfare_desc:0 "Feindliche Handelskonvois nutzen weiterhin die Passage durch das Kap der Guten Hoffnung. Wir werden sie von unten angreifen."
 SAF_prepare_overseas_offensive:0 "Überseeoffensive vorbereiten"
 SAF_prepare_overseas_offensive_desc:0 "Mit seiner kilometerlangen Küste ist Südafrika bestens dafür geeignet, seine Soldaten im amphibischen Krieg auszubilden. Dies ist eine der schwierigsten Fähigkeiten, aber unsere Jungs schaffen das."
 SAF_strengthen_the_cape_garrison_artillery:0 "Verstärken Sie die Artillerie der Kapgarnison"
 SAF_strengthen_the_cape_garrison_artillery_desc:0 "Die Geschütze der Kapgarnison müssen aufgerüstet und verstärkt werden, um das Kap vor feindlichen Angriffen zu schützen."
 SAF_civil_war_tt:1 "Es wird ein Bürgerkrieg zwischen faschistischen Nationalisten in Südwestafrika und demokratischen Unionisten im Rest des Landes ausbrechen."
 SAF_german_research_tt:0 "Wir werden mit Deutschland ein Abkommen zum Technologieaustausch schließen."
 scw_in_progress_tt:0 "Spanien befindet sich in einem Bürgerkrieg."
 NZL_transfer_the_new_zealand_division:0 "Übertragen Sie die neuseeländische Division"
 NZL_transfer_the_new_zealand_division_desc:0 "Die 2. neuseeländische Division wurde für den Einsatz mobilisiert. Wir sollten sie daher dorthin schicken, wo gekämpft wird. Die neuseeländische Division aus dem Ersten Weltkrieg war im Mittelmeer stationiert, und die neue Division wird dies ebenfalls tun."
 NZL_form_the_rnzn:0 "Bilden Sie die RNZN"
 NZL_form_the_rnzn_desc:0 "Unsere einst kleine Küstenpatrouille ist inzwischen auf Schiffe angewachsen, die unabhängig von der Aufsicht der Royal Navy operieren können. Neuseeland wird seine eigene Marine haben."
 NZL_expand_devonport_naval_base:0 "Erweiterung des Marinestützpunkts Devonport"
 NZL_expand_devonport_naval_base_desc:0 "Der Marinestützpunkt Devonport wird das Hauptquartier unserer Marine sein, muss jedoch erweitert werden, um den neuen Anforderungen eines totalen Krieges gerecht zu werden."
 NZL_coastal_defense:0 "Küstenverteidigung"
 NZL_coastal_defense_desc:0 "Neuseeland ist ein Inselstaat, weit entfernt von Feinden, daher müssen wir auf amphibische Angriffe entlang unserer Küsten vorbereitet sein."
 NZL_destroyer_effort:0 "Zerstörer-Anstrengung"
 NZL_destroyer_effort_desc:0 "Angesichts unserer kleinen Industriebasis sind Zerstörer für Neuseeland die effizienteste Möglichkeit, seine Seemacht zu demonstrieren. Sie patrouillieren die Küsten, fangen U-Boote ab und stellen Frühwarnposten auf."
 NZL_submarine_effort:0 "U-Boot-Anstrengungen"
 NZL_submarine_effort_desc:0 "Da jede Invasion über das Meer erfolgen muss, können die Wölfe des Ozeans eine starke Verteidigungslinie bilden. Eine U-Boot-Flotte kann unsere Seewege schützen, indem sie heimlich und im Rudel jagt."
 NZL_light_cruiser_effort:0 "Leichter Kreuzer-Einsatz"
 NZL_light_cruiser_effort_desc:0 "Mittelgroße Schiffe sind für eine mittelgroße Macht angemessen. Leichte Kreuzer können ordentlich zuschlagen, sind aber schnell genug, um bei Bedarf größeren Gefechten zu entgehen."
 NZL_capital_ship_effort:0 "Großkampfschiff-Anstrengung"
 NZL_capital_ship_effort_desc:0 "Wenn Neuseeland eine erstklassige Marine haben will, muss es auch über erstklassige Schiffe verfügen. Wir müssen in Schlachtschiffe und schwere Kreuzer investieren."
 NZL_expand_the_nzpaf:0 "Erweitern Sie die NZPAF"
 NZL_expand_the_nzpaf_desc:0 "Die neuseeländische Luftwaffe benötigt neue Küstenpatrouillenboote und Marinebomber. Moderne Nationen können den Luftkrieg nicht vernachlässigen,"
 NZL_form_the_rnzaf:0 "Bilden Sie die RNZAF"
 NZL_form_the_rnzaf_desc:0 "Es ist an der Zeit, die Luftwaffe von den anderen Waffengattungen unabhängig zu machen. Die Royal New Zealand Air Force wird über eine eigene Kommandostruktur verfügen, aber eng mit der Royal Air Force zusammenarbeiten."
 NZL_fighter_focus:0 "Kämpferfokus"
 NZL_fighter_focus_desc:0 "Kampfflugzeuge sind wirksam beim Abfangen und Eskortieren von Bombern, die für unsere Verbündeten die entscheidende Waffe sein werden."
 NZL_bomber_focus:0 "Bomberfokus"
 NZL_bomber_focus_desc:0 "Leichte Bomber können unsere Küsten wirksam schützen und werden im Kampf gegen unsere Feinde in Übersee benötigt."
 NZL_defend_our_islands:0 "Verteidige unsere Inseln"
 NZL_defend_our_islands_desc:0 "Wir müssen auf Angriffe auf unser Inselparadies vom Meer aus vorbereitet sein. Marinebomber können Landungsboote abfangen und angreifen oder sogar Großkampfschiffe ins Visier nehmen."
 NZL_modern_fighters:0 "Moderne Kämpfer"
 NZL_modern_fighters_desc:0 "Es ist an der Zeit, unsere Kampfflugzeuge auf schnellere Maschinen mit größerer Reichweite umzustellen. Unsere Verbündeten haben mit einigen der modernsten Flugzeuge, die die Welt je gesehen hat, den Weg gewiesen."
 NZL_heavy_bombers:0 "Schwere Bomber"
 NZL_heavy_bombers_desc:0 "Der Krieg kann nur gewonnen werden, wenn man das Herz des feindlichen Heimatlandes trifft. Schwere Bomber sind notwendig, um feindlichen Fabriken und Städten einen verheerenden Schlag zu versetzen."
 NZL_national_roads_board:0 "Nationales Straßenamt"
 NZL_national_roads_board_desc:0 "Neuseelands unwegsames Gelände hat den Bau eines zusammenhängenden Straßensystems erschwert. Wir müssen jedoch das bestehende System verbessern. Ein Autobahnsystem muss erforscht, Straßen asphaltiert und neue Wege durch die Berge angelegt werden."
 NZL_new_zealand_steel:0 "Neuseeländischer Stahl"
 NZL_new_zealand_steel_desc:0 "Neuseeland ist mit reichlich Eisensandvorkommen gesegnet, insbesondere auf der Nordinsel. Um aus diesem Sand Erz zu gewinnen, bedarf es eines speziellen Verfahrens. Doch dieser Sand kann noch viele Jahre lang als Grundstein unserer Stahlindustrie dienen."
 NZL_taranaki_oil:0 "Taranaki-Öl"
 NZL_taranaki_oil_desc:0 "Die Region Taranaki auf der Nordinsel ist reich an Mineralien und Erdöl. Unternehmer haben versucht, diese Ölreserven auszubeuten, doch es bedarf weiterer Investitionen in Raffinerien und Bohrungen."
 NZL_wairarapa_sheep_farms:0 "Wairarapa Schaffarmen"
 NZL_wairarapa_sheep_farms_desc:0 "Die Wollindustrie von Wairarapa ist einer der Eckpfeiler der neuseeländischen Wirtschaft. Mit dem Ende der Weltwirtschaftskrise wird die Nachfrage nach unserer Wolle steigen."
 NZL_bureau_of_industry:0 "Büro der Industrie"
 NZL_bureau_of_industry_desc:0 "Neuseeland ist eine Agrargesellschaft mit Schwerpunkt auf der Viehzucht. Das Bureau of Industry muss große Investitionen in die Infrastruktur und die Produktion fördern."
 NZL_department_of_scientific_and_industrial_research:0 "Abteilung für wissenschaftliche und industrielle Forschung"
 NZL_department_of_scientific_and_industrial_research_desc:0 "Die anderen Commonwealth- und Dominion-Staaten investieren in wissenschaftliche und industrielle Forschung, also sollten wir das Gleiche tun."
 NZL_industrial_conscription:0 "Industrielle Wehrpflicht"
 NZL_industrial_conscription_desc:0 "Es gibt keinen Grund, warum ein arbeitsfähiger Mann nicht in den Streitkräften dienen oder in einer kriegsrelevanten Industrie arbeiten sollte. Unsere neuen Gesetze werden dafür sorgen, dass jeder in den Dienst der Mobilisierung und Produktion gestellt wird."
 NZL_think_big:0 "Denken Sie groß"
 NZL_think_big_desc:0 "Wir haben uns daran gewöhnt, uns als kleineres Dominion zu betrachten als unsere australischen oder kanadischen Verbündeten. Doch Neuseeland ist durchaus in der Lage, industrielle Größe zu erreichen."
 NZL_project_seal:0 "Projektsiegel"
 NZL_project_seal_desc:0 "Das Projekt Seal ist eine neue Initiative der Amerikaner zur Entwicklung einer Waffe, die Tsunamis auslösen und so unsere Feinde überwältigen kann. Die Entwicklung der abprallenden Bombe ist zwar etwas fantasievoll, aber vielversprechend."
 NZL_national_defense_institute:0 "Nationales Verteidigungsinstitut"
 NZL_national_defense_institute_desc:0 "Da Neuseeland nun ein vollständig souveräner Staat ist, haben wir keinen Zugriff mehr auf fortschrittliche Prototypen und Baupläne wie früher. Wir müssen sicherstellen, dass wir unseren Feinden immer einen Schritt voraus sind und technologisch nicht ins Hintertreffen geraten."
 NZL_expand_the_university_of_auckland:0 "Erweitern Sie die University of Auckland"
 NZL_expand_the_university_of_auckland_desc:0 "Die Universität Auckland ist unsere wichtigste postsekundäre Bildungseinrichtung. Durch den Ausbau ihrer Einrichtungen können wir versuchen, einige unserer besten Köpfe hier zu Hause zu halten."
 NZL_army_reforms:0 "Armeereformen"
 NZL_army_reforms_desc:0 "Wir sollten das Ausbildungs- und Beförderungssystem unserer Armee modernisieren. Auf diese Weise sind wir auf alles vorbereitet, was in der anhaltenden Weltkrise passieren kann."
 NZL_charlton_automatic_rifle:0 "Charlton-Automatikgewehr"
 NZL_charlton_automatic_rifle_desc:0 "Einer unserer Bürger hat das Standardgewehr von Lee Enfield zu einer vollautomatischen Waffe umgebaut. Das ist neuseeländischer Einfallsreichtum in seiner besten Form, und wir sollten Innovationen in dieser Richtung fördern."
 NZL_bob_semple_tank:0 "Bob Semple Tank"
 NZL_bob_semple_tank_desc:1 "Warum sollte Neuseeland keinen eigenen Panzer haben? Das Bauministerium in Temuka entwickelt einen leichten Panzer, der nur mit Maschinengewehren bewaffnet ist. Selbst wenn wir nie über einen Prototyp hinauskommen, werden die Erfahrungen, die wir sammeln, von unschätzbarem Wert sein."
 NZL_domestic_arms_industry:0 "Inländische Rüstungsindustrie"
 NZL_domestic_arms_industry_desc:0 "Wir sollten so viele Industrien wie möglich auf die Produktion von Kleinwaffen umstellen. Wir brauchen Munition, Waffenteile, Hilfsausrüstung und so weiter. Diese können im Inland hergestellt werden."
 NZL_schofield_tank:0 "Schofield-Panzer"
 NZL_schofield_tank_desc:0 "Wenn der Semple-Panzer unsere Anforderungen nicht erfüllt, könnte vielleicht ein Panzer mit einer richtigen Kanone die Lösung sein. Das kombinierte Rad-/Kettensystem ist originell und könnte uns zu neuen Erkenntnissen im Panzerdesign führen."
 NZL_long_range_patrol:0 "Langstreckenpatrouille"
 NZL_long_range_patrol_desc:0 "Die Long Range Patrol soll weite Gebiete in Nordafrika abdecken. Diese Aufklärungs- und Kommandoeinheit wird Spezialmissionen in einigen der rauesten Klimazonen der Welt durchführen."
 NZL_artillery_focus:0 "Artillerie-Fokus"
 NZL_artillery_focus_desc:0 "Artillerie ist für die Unterstützung jeder Vorwärtsbewegung unserer Infanterie von entscheidender Bedeutung. Erweitern Sie die Forschung im Bereich Ballistik und Geschütze mit größerem Lauf."
 NZL_big_bob_tank:0 "Big Bob Panzer"
 NZL_big_bob_tank_desc:0 "Die Schlachtfelder Europas verlangen nach schwererer Panzerung, um mit den Superpanzern unserer Feinde mithalten zu können. Der Big Bob ist Neuseelands Beitrag zu diesem Entwicklungsprojekt."
 NZL_research_collaboration:0 "Forschungskooperationen"
 NZL_research_collaboration_desc:0 "Die Briten haben uns gezeigt, wie vorteilhaft es ist, wissenschaftliche Fortschritte unter engen Verbündeten zu teilen. Unsere gesamte Fraktion wird in der Lage sein, Forschung und Entwicklung im Krieg effizienter durchzuführen, wenn wir die notwendigen Schritte unternehmen, um dies zu koordinieren."
 NZL_the_first_labor_government:0 "Die erste Labour-Regierung"
 NZL_the_first_labor_government_desc:0 "Die First Labour-Regierung Neuseelands hat die Möglichkeit, eine fortschrittliche soziale und wirtschaftliche Agenda zu verfolgen. Industrieregulierung, Arbeitnehmerrechte, Sozialgesetze und Lohnregeln stehen auf der Tagesordnung."
 NZL_ratana_alliance:0 "Ratana-Allianz"
 NZL_ratana_alliance_desc:0 "Ein Bündnis mit der Ratana-Bewegung wird neuseeländische Maori in die Regierung bringen und hoffentlich dazu beitragen, einige der Wunden der britischen Eroberung zu heilen."
 NZL_maori_affairs_act:0 "Gesetz über die Angelegenheiten der Maori"
 NZL_maori_affairs_act_desc:0 "Ein Großteil des Landes im Besitz der Maori ist wirtschaftlich unproduktiv. Wenn es uns gelingt, dieses Land zu konsolidieren und mehr davon unter staatliche Kontrolle zu bringen, können wir diese unfruchtbaren Gebiete in fruchtbare Industrie- und Handelsstandorte verwandeln."
 NZL_social_security_act:0 "Sozialversicherungsgesetz"
 NZL_social_security_act_desc:0 "Die Arbeitslosen Neuseelands müssen versorgt werden, bis sich die Wirtschaft erholt und mehr Arbeitsplätze geschaffen werden. 1935 gab es bereits ein Weihnachtsgeld, doch jetzt ist es an der Zeit, ein angemessenes soziales Sicherheitsnetz für alle Bürger zu schaffen."
 NZL_the_manpower_act:0 "Das Arbeitsgesetz"
 NZL_the_manpower_act_desc:0 "Seit Kriegsbeginn sind die Maori in großer Zahl in die Städte gekommen. Der Manpower Act ermöglicht es uns, diese Energie in neuseeländische Fabriken zu lenken."
 NZL_amend_the_maori_affairs_act:0 "Änderung des Maori Affairs Act"
 NZL_amend_the_maori_affairs_act_desc:0 "Wir müssen das Maori Affairs Act ändern, damit es die Produktivität ungenutzter Ländereien steigert, ohne unsere Maori-Bürger unnötig zu vertreiben."
 NZL_waitangi_tribunal:0 "Waitangi-Tribunal"
 NZL_waitangi_tribunal_desc:0 "Die Briten in Neuseeland sollten sich mit dem auseinandersetzen, was ihre Vorfahren getan haben, um die Maori Neuseelands zu vertreiben, zu stören und zu marginalisieren. Blutige Kriege, Landnahmen und die Missachtung natürlicher Rechte. Die Anerkennung dieses Erbes ist ein Schritt zur Heilung."
 NZL_maori_conscription:0 "Wehrpflicht der Maori"
 NZL_maori_conscription_desc:0 "Der Mut und die Heldenhaftigkeit des Maori-Bataillons der Expeditionstruppe sind ein Zeichen dafür, dass wir das Beste aus unserer gesamten Bevölkerung machen sollten, indem wir auch die widerstrebenden Maori zum Dienst einziehen."
 NZL_maori_volunteers:0 "Maori-Freiwillige"
 NZL_maori_volunteers_desc:0 "Um ihren Patriotismus zu zeigen, melden sich Hunderte Maori freiwillig zum Dienst in der neuseeländischen Armee."
 NZL_strengthen_the_commonwealth:0 "Stärkung des Commonwealth"
 NZL_strengthen_the_commonwealth_desc:0 "Als kleineres Dominion ist es wichtig, eng mit unseren Freunden und unserer Familie verbunden zu bleiben. Wir werden unsere Bindungen zu unseren britischen Nachbargebieten stärken."
 NZL_statute_of_westminster:0 "Statut von Westminster"
 NZL_statute_of_westminster_desc:0 "Das Statut von Westminster verleiht uns größere Unabhängigkeit unter der Krone, während es uns gleichzeitig innerhalb des Empires hält."
 NZL_2nzef:0 "2NZEF"
 NZL_2nzef_desc:0 "Trotz der Schrecken des letzten Krieges ist Neuseeland bereit, erneut zu marschieren. Die 2. neuseeländische Expeditionstruppe wird gerade aufgestellt."
 NZL_arrest_pacifist_leaders:0 "Verhaftung pazifistischer Führer"
 NZL_arrest_pacifist_leaders_desc:0 "Jetzt ist nicht die Zeit für Zwietracht im Land. Jeder muss sich darauf konzentrieren, den Krieg zu gewinnen. Und wenn das bedeutet, jeden festzunehmen, der sich gegen den Krieg ausspricht, dann werden wir das tun."
 NZL_technology_sharing_with_britain:0 "Technologieaustausch mit Großbritannien"
 NZL_technology_sharing_with_britain_desc:0 "Großbritanniens wissenschaftliche und industrielle Basis übertrifft unsere bei weitem, aber da wir eine Familie sind, sind sie bereit, ihr Wissen mit uns zu teilen."
 NZL_the_lee_affair:0 "Die Lee-Affäre"
 NZL_the_lee_affair_desc:0 "John Lee, Abgeordneter für Grey Lynn, sorgt innerhalb der Labour-Fraktion für Unruhe. Er propagiert eine radikalere Agenda statt des vorsichtigen Kurses, den wir einschlagen. Es müssen Maßnahmen ergriffen werden, um seinen Aufstand zu unterdrücken."
 NZL_empower_the_working_class:0 "Stärkung der Arbeiterklasse"
 NZL_empower_the_working_class_desc:0 "Labour hat sich seit seiner Gründung für die Arbeiterklasse eingesetzt, und viele unserer Führungspersönlichkeiten stammen aus der Arbeiterklasse. Setzen wir uns für einen umfassenderen Schutz und mehr Macht für die Gewerkschaften ein."
 NZL_join_comintern:0 "Treten Sie der Komintern bei"
 NZL_join_comintern_desc:0 "Es ist an der Zeit, mit unseren sozialistischen Brüdern ein Bündnis zu schließen. Durch die Komintern werden wir das Arbeiterparadies verwirklichen."
 NZL_technology_sharing_with_soviet_union:0 "Technologieaustausch mit der Sowjetunion"
 NZL_technology_sharing_with_soviet_union_desc:0 "Viele der weltweit führenden Wissenschaftler und Technologie-Innovatoren stammen aus der Sowjetunion. Sie sind großzügig genug, ihr Wissen mit uns, ihren Waffenbrüdern, zu teilen."
 NZL_in_the_darkness:0 "In der Dunkelheit"
 NZL_in_the_darkness_desc:0 "Die demokratischen Systeme unseres Mutterlandes sind von Natur aus verdorben. Wahre Stärke kann nicht durch Kompromisse demonstriert werden."
 NZL_befriend_japan:0 "Befreunde dich mit Japan"
 NZL_befriend_japan_desc:0 "Als pazifischer Staat liegt es in unseren Sicherheitsinteressen, auf der Seite der stärksten Macht in der Region zu stehen. Japan und seine mächtigen Marinen können uns vor den Gefahren der Welt schützen."
 NZL_rule_them_all:0 "Beherrsche sie alle"
 NZL_rule_them_all_desc:0 "Die antipodischen Nationen des Südpazifiks sollten eine vereinte Macht sein. Australien sollte erwägen, sich unserem überlegenen Ethos zu unterwerfen."
 NZL_technology_sharing_with_japan:0 "Technologieaustausch mit Japan"
 NZL_technology_sharing_with_japan_desc:0 "Japan verfügt über viele der weltweit führenden Wissenschaftler und Technologie-Innovatoren. Sie sind großzügig genug, ihr Wissen mit uns, ihren Waffenbrüdern, zu teilen."
 NZL_constitution_amendment_act:0 "Verfassungsänderungsgesetz"
 NZL_constitution_amendment_act_desc:0 "Für Neuseeland ist es an der Zeit, über eine Abspaltung von der britischen Vorherrschaft nachzudenken. Wir werden unsere Verfassung ändern, um mehr Kontrolle über unsere eigenen Angelegenheiten zu erlangen."
 NZL_independent_new_zealand:0 "Unabhängiges Neuseeland"
 NZL_independent_new_zealand_desc:0 "Wir sind jetzt eine Republik! Neuseeland schuldet dem Vereinigten Königreich nichts außer der Dankbarkeit, die jedes Kind seiner Mutter für die sichere Erziehung schuldet. Aber wir müssen das sichere Nest des Commonwealth verlassen und die Welt mit unseren eigenen Interessen im Blick betrachten."
 NZL_transfer_ships_tt:0 "[ENG.GetNameDefCap] überträgt uns §Y2 Leichte Kreuzer§!."
 RAJ_provincial_elections:0 "Provinzwahlen"
 RAJ_provincial_elections_desc:0 "Das neue Government of India Act schreibt Wahlen in den Provinzen vor und schafft damit ein gewisses Maß an lokaler Regierung, die der indischen Bevölkerung gegenüber verantwortlich ist. Wir werden sehen, welche Auswirkungen dies auf die britische Herrschaft hat."
 RAJ_swaraj:0 "Swaraj"
 RAJ_swaraj_desc:0 "Gandhis Konzept der Selbstverwaltung – Swaraj – erfreut sich in ganz Indien zunehmender Beliebtheit. Es befürwortet einen völligen Bruch mit britischen Institutionen und Bräuchen. Swaraj-Gruppen demonstrieren an indischen Schulen."
 RAJ_indian_national_congress:0 "Indischer Nationalkongress"
 RAJ_indian_national_congress_desc:0 "Der Indische Nationalkongress war bei Wahlen auf dem gesamten Subkontinent sehr erfolgreich. Er ist eine starke Stimme für ein unabhängiges Indien oder zumindest für ein Land mit größerer Autonomie innerhalb des Imperiums."
 RAJ_quit_india_movement:0 "Quit India-Bewegung"
 RAJ_quit_india_movement_desc:0 "Gandhis Kampagne für die Unabhängigkeit Indiens erreichte mit dem Aufruf an die Briten, Indien zu verlassen, ihren Höhepunkt. Es ist unvorstellbar, dass die Herrschaft Indiens vor Kriegsende endet, doch die Lage vor Ort spitzt sich täglich zu."
 RAJ_all_india_forward_bloc:0 "All India Forward Bloc"
 RAJ_all_india_forward_bloc_desc:0 "Der All India Forward Bloc ist der Ansicht, dass der britische Rückzug aus Indien zu lange dauert. Es muss eine stärkere, wenn nicht gar militantere Position eingenommen werden."
 RAJ_seek_help_from_soviet:0 "Suchen Sie Hilfe bei der Sowjetunion"
 RAJ_seek_help_from_soviet_promised:0 " Die Sowjetunion versprach ihre Hilfe"
 RAJ_seek_help_from_soviet_desc:0 "Die Sowjetunion stellt das natürliche Gegengewicht zur imperialen Macht Großbritanniens dar. Sie behauptet, sie sei der Motor der Revolution, und wir sollten sie ermutigen, ihre Revolution nach Indien zu exportieren."
 RAJ_indian_peoples_army:0 "Indische Volksarmee"
 RAJ_indian_peoples_army_effect:0 "Die kommunistischen Anhänger beginnen einen Bürgerkrieg für die Freiheit. Das Ausmaß hängt von der Unterstützung der Partei und dem Fortschritt der Autonomie ab. "
 RAJ_indian_peoples_army_support:0 "[SOV.GetNameDefCap] wird ihre Sache unterstützen."
 RAJ_indian_peoples_army_desc:0 "Wir sollten eine Streitmacht organisieren, die von der kommunistischen Sache lernt und mit ihr verbündet ist."
 RAJ_research_city_excursions:0 "Forschungsstadt-Exkursionen"
 RAJ_research_city_excursions_desc:0 "Sowjetische Forschungsstädte sind ein Wunder, und Indiens Bevölkerung ist voller tatkräftiger und intelligenter Köpfe. Wenn wir unsere jungen Ingenieure in diese Städte schicken, können wir eine heimische Forschungs- und Industriebasis aufbauen."
 RAJ_combined_arms_academy:0 "Kombinierte Waffenakademie"
 RAJ_combined_arms_academy_desc:0 "Die sowjetische Militärausbildung kann durch die neue Combined Arms Academy effizienter gestaltet werden. Wir können uns auf den neuesten Stand der modernen Kriegsführung mit Luft-, Land- und Seestreitkräften bringen."
 RAJ_rani_of_jhans:0 "Rani von Jhansi"
 RAJ_rani_of_jhans_desc:0 "Rani von Jhansi war eine große Heldin der indischen Revolution von 1857. Ihr Beispiel an Tapferkeit und Nationalstolz ist ein Vorbild für alle Frauen Indiens, die zu den Waffen greifen und ein eigenes Regiment gründen wollen."
 RAJ_rebuilding_the_nation:0 "Wiederaufbau der Nation"
 RAJ_rebuilding_the_nation_desc:0 "Nachdem der imperiale Unterdrücker vertrieben und die indische Bevölkerung zum Handeln mobilisiert wurde, ist es an der Zeit, den Schaden zu beheben, der durch zwei Jahrhunderte Besatzung entstanden ist."
 RAJ_seek_help_from_germany:0 "Suchen Sie Hilfe aus Deutschland"
 RAJ_seek_help_from_germany_promised:0 " Das Deutsche Reich sagte seine Hilfe zu"
 RAJ_seek_help_from_germany_desc:0 "Deutschland hat uns nie so geschadet wie Großbritannien, und das Reich stellt die größte Herausforderung für die britische Macht dar. Wir sollten uns den Achsenmächten annähern."
 RAJ_indian_national_army:0 "Indische Nationalarmee"
 RAJ_indian_national_army_effect:0 "Die Anhänger des Faschismus beginnen einen Bürgerkrieg für die Freiheit. Das Ausmaß hängt von der Unterstützung der Partei und den Fortschritten bei der Autonomie ab. "
 RAJ_indian_national_army_support:0 "[GER.GetNameDefCap] wird ihre Sache unterstützen."
 RAJ_indian_national_army_desc:0 "Eine indische Nationalarmee, die sich von den britischen Streitkräften unterscheidet, wurde aufgestellt. Wir können sie in Regionen aufbauen, die frei von britischer Einmischung sind, und uns gegen die Alliierten stellen, um der indischen Kolonialmacht indische Arbeitskräfte zu entziehen."
 RAJ_battaglione_azad_hindoustan:0 "Battaglione Azad Hindoustan"
 RAJ_battaglione_azad_hindoustan_desc:0 "Italien hat das Battaglione Azad Hindoustan gegründet, ein Regiment aus ehemaligen indischen Kriegsgefangenen. Ausgebildet in Sabotage, Fallschirmspringen und Infiltration, könnte das BAH einen großen Schritt für den Nationalstolz bedeuten."
 RAJ_german_technology:1 "[Root.GetGermanTechnologyName]"
 RAJ_german_technology_german:0 "Deutsche Technologie"
 RAJ_german_technology_japan:0 "Japanische Technologie"
 RAJ_german_technology_desc:0 "Deutsche Wissenschaftler gehören zu den besten der Welt, und ihre Militärmaschinerie basiert auf den modernsten Ingenieurtechniken. Sie sind bereit, ihre Fortschritte mit uns zu teilen."
 RAJ_japanese_army_air_force_academy:1 "[Root.GetJAAFAName]"
 RAJ_japanese_army_air_force_academy_german:0 "Luftwaffen-Luftwaffenschule"
 RAJ_japanese_army_air_force_academy_japan:0 "Akademie der japanischen Luftstreitkräfte"
 RAJ_japanese_army_air_force_academy_desc:0 "Die japanische Luftwaffenakademie hat beschlossen, indische Rekruten aufzunehmen, die gegen die europäische Vorherrschaft in Asien kämpfen möchten."
 RAJ_cripps_mission:0 "Cripps&#39; Mission"
 RAJ_cripps_mission_desc:0 "Wir müssen Indien trotz der zunehmenden nationalistischen Unabhängigkeitsbestrebungen an die Seite der Alliierten und Großbritanniens drängen. Sir Stafford Cripps ist ein geschickter Verhandlungsführer, der den nationalistischen Führern versichern kann, dass ihre Forderungen berücksichtigt werden."
 RAJ_two_nation_theory:0 "Zwei-Nationen-Theorie"
 RAJ_two_nation_theory_effect:0 "Pakistan wird freigelassen, wenn Indien die Freiheit erlangt.\n"
 RAJ_two_nation_theory_desc:0 "Obwohl Indien lange Zeit als ein einziges Territorium regiert wurde, ist es sinnvoll, es als zwei Nationen zu betrachten – eine hinduistische und eine muslimische. Eine Teilung des Landes ist vielleicht nicht die einzige Lösung, aber jedes Abkommen für ein unabhängiges Indien muss dieser dualen Natur des Subkontinents Rechnung tragen."
 RAJ_princely_state_donations:0 "Fürstliche Staatsspenden"
 RAJ_princely_state_donations_desc:0 "Die Fürstenstaaten Indiens stellten lange Zeit die Männer, die den Kern der indischen Armee unter den Briten bildeten. Weitere Spenden dieser lokalen Herrscher unterstreichen ihre Unterstützung für das Empire."
 RAJ_imperial_service_troops:0 "Kaiserliche Diensttruppen"
 RAJ_imperial_service_troops_desc:0 "Die Imperial Service Troops werden von den indischen Prinzen rekrutiert und können Hunderttausende Mann umfassen. In diesen schwierigen Zeiten ist es gut zu wissen, dass Seine Majestät auf die Loyalität der Rajas zählen kann."
 RAJ_raf_funding:0 "RAF-Finanzierung"
 RAJ_raf_funding_desc:0 "Die Royal Air Force of India erhält mehr Geld und Ressourcen vom Vereinigten Königreich."
 RAJ_navy_funding:0 "Finanzierung der Marine"
 RAJ_navy_funding_effect:0 "§Y2 Leichte Kreuzer§! werden Ihrer Marine hinzugefügt, wenn Sie bereits über die Technologie verfügen.\n"
 RAJ_navy_funding_effect_mtg:0 "§Y2 Leichte Kreuzer§! dieses Typs werden unserer Marine hinzugefügt.\n"
 RAJ_navy_funding_desc:0 "Die Royal Navy of India erhält mehr Geld und Vermögenswerte vom Vereinigten Königreich."
 RAJ_british_army_support:0 "Unterstützung der britischen Armee"
 RAJ_british_army_support_desc:0 "Die britische Armee kennt Indien nach 200 Jahren Besatzung gut. Sie kennt die Menschen und das Land und kann die Ausbildung indischer Soldaten für den Kampf im eigenen Land unterstützen."
 RAJ_red_eagle_division:0 "Roter Adler Division"
 RAJ_create_unit_red_eagles_tt:0 "Gewinnen Sie eine Elite-Infanteriedivision in Delhi.\n"
 RAJ_red_eagle_division_desc:0 "Die Red Eagle Division wird die erste indische Division sein, die für den Einsatz im Ausland ausgebildet wird und bereit ist, unter harten Bedingungen zu kämpfen. "
 RAJ_chindits:0 "Chindits"
 RAJ_orde_wingate_tt:0 "Ein §Y4 Skill General§! namens §YOrde Wingate§! wird erscheinen.\n"
 RAJ_chindits_desc:0 "Indien benötigt eine Spezialeinheit, daher haben wir die Chindits gegründet, um hinter den feindlichen Linien in den Dschungeln Asiens zu operieren. Diese Operation ist riskant und wird hohe Verluste fordern, könnte aber für die Kriegsanstrengungen von großem Nutzen sein."
 RAJ_jungle_training:0 "Dschungeltraining"
 RAJ_jungle_training_effect:0 "Aktiviert §HDschungeltraining§!\n§HMarines\n Dschungel§!\n Angriff:0§G+5%§!\n Bewegung:0§G+10%§!\n§HBergsteiger\n Dschungel§!\n Angriff:0§G+5%§!\n Bewegung:0§G+10%§!\n§HFallschirmjäger\n Dschungel§!\n Angriff:0§G+5%§!\n Bewegung:0§G+10%§!\n"
 RAJ_jungle_training_desc:0 "Indien, Burma und Indochina sind von Dschungel bedeckt und es wird eine spezielle Ausbildung empfohlen, um unsere Soldaten in diesem gefährlichen Gelände effektiv einzusetzen."
 RAJ_lessons_of_the_great_war:0 "Lehren aus dem Ersten Weltkrieg"
 RAJ_lessons_of_the_great_war_desc:0 "Indische Kolonialsoldaten waren am letzten Weltkrieg beteiligt und die Lehren aus diesem Konflikt sollten in die Ausbildung und Organisation der Armee einfließen."
 RAJ_indianisation_of_army:0 "Indianisierung der Armee"
 RAJ_indianisation_of_army_desc:0 "Um Indien im Falle eines totalen Krieges ausreichend zu schützen, müsste die gesamte indische Bevölkerung mobilisiert werden. Dies bedeutet nicht nur, dass mehr indische Soldaten rekrutiert werden müssen, sondern auch, dass indische Offiziere an irgendeiner Stelle der Befehlskette das Kommando übernehmen können."
 RAJ_indian_gurkhas:0 "Indische Gurkhas"
 RAJ_indian_gurkhas_desc:0 "Die Gurkhas des Punjab und des nepalesischen Hochlandes sind für ihre militärischen Fähigkeiten legendär. Sie haben dem Raj viele Jahre lang treu gedient und sind in allen Arten der Kriegsführung herausragend."
 RAJ_an_indian_sandhurst:0 "Ein indischer Sandhurst"
 RAJ_an_indian_sandhurst_desc:0 "Indien forderte seit dem letzten Krieg eine eigene Militärschule, und 1932 wurde schließlich eine solche gegründet. Die Indische Militärakademie bildet seit einigen Jahren indische Offiziere aus und stellt uns damit eine zentrale Kommandotruppe zur Verfügung."
 RAJ_lions_of_the_great_war:0 "Löwen des Ersten Weltkriegs"
 RAJ_lions_of_the_great_war_desc:0 "Die Sikhs haben eine starke militärische Tradition und wurden im letzten Krieg hoch ausgezeichnet. Die Löwen des Punjab bilden ein starkes Regiment, und die Region ist reif für weitere Rekrutierungen."
 RAJ_indian_gentlemen_officers:0 "Indische Gentlemen-Offiziere"
 RAJ_indian_gentlemen_officers_desc:0 "Die Herren, die dem Raj durch enge Zusammenarbeit mit den kaiserlichen Behörden gedient haben, sind ein einsatzbereiter Ersatz für Kommandeure, falls wir loyale Männer zur Führung der neuen indischen Armee benötigen."
 RAJ_the_bangalore_torpedo:0 "Der Bangalore Torpedo"
 RAJ_the_bangalore_torpedo_desc:0 "Einer der größten Beiträge Britisch-Indiens zur Kriegskunst ist der Bangalore-Torpedo, eine Reihe miteinander verbundener Rohre, mit denen Hindernisse zerstört werden können, während die Ingenieure unter Beschuss stehen. Dieses Gerät erfreut sich weltweit großer Beliebtheit. "
 RAJ_vickers_berthier_gun:0 "Vickers-Berthier-Gewehr"
 RAJ_vickers_berthier_gun_desc:0 "Das Vickers-Berthier ist etwas unhandlich, hat aber den Vorteil, dass es schnell und einfach hergestellt werden kann. Für ein Land wie Indien ist dies eine sehr wichtige Eigenschaft einer Waffe."
 RAJ_royal_indian_artillery:0 "Königliche indische Artillerie"
 RAJ_royal_indian_artillery_desc:0 "Die Royal Indian Artillery existiert, seit die East India Company im Jahr 1748 ein Kanonenbataillon mit indischen Kanonieren aufstellte. Wir können auf diese jahrzehntelange Erfahrung zurückgreifen."
 RAJ_army_motorization:0 "Armeemotorisierung"
 RAJ_army_motorization_desc:0 "Indien ist zu groß, um effizient mit Eisenbahn und Pferden abgedeckt zu werden. Die Armee sollte über motorisierte Divisionen und regelmäßige LKW-Transporte verfügen."
 RAJ_revive_the_screw_guns:0 "Beleben Sie die Schraubpistolen wieder"
 RAJ_revive_the_screw_guns_effect:0 "Aktiviert §HMuntain Gun§!\n§HArtillery\n Mountain§!:0Movement:0§G+15%§!\n§HAnti-Tank\n Mountain§!:0Movement:0§G+15%§!"
 RAJ_revive_the_screw_guns_desc:0 "Das bergige Gelände Nordindiens führte zur Entwicklung eines Artilleriegeschütz, das zerlegt und auf Maultieren dorthin transportiert werden konnte, wo es gebraucht wurde. Dieses 7-Pfünder-Geschütz mag zwar etwas veraltet sein, aber wir sollten seinen Nutzen nicht außer Acht lassen."
 RAJ_indian_armor:0 "Indische Rüstung"
 RAJ_indian_armor_desc:0 "Indien sollte sich auf die Entwicklung einer eigenen Panzer- und Selbstbauabteilung konzentrieren."
 RAJ_modernizing_army:0 "Modernisierung der Armee"
 RAJ_modernizing_army_desc:0 "Zu lange galten die indischen Streitkräfte als nicht viel mehr als ein kolonialer Außenposten, der kaum über die Vorteile und die Ausrüstung verfügte, die der britischen Armee zur Verfügung standen. Es ist Zeit, die Streitkräfte des Raj zu modernisieren."
 RAJ_indian_defense_research:0 "Indische Verteidigungsforschung"
 RAJ_indian_defense_research_desc:0 "Da Indien nun ein vollständig souveräner Staat ist, haben wir keinen Zugang mehr zu fortschrittlichen Prototypen und Bauplänen wie früher. Wir müssen sicherstellen, dass wir unseren Feinden immer einen Schritt voraus sind und technologisch nicht zurückfallen."
 RAJ_british_pilot_training:0 "Britische Pilotenausbildung"
 RAJ_british_pilot_training_desc:0 "Die Royal Air Force hat sich bereit erklärt, indische Piloten zur Ausbildung aufzunehmen. Diese Ausbildung wird für den Aufbau unserer eigenen Luftwaffe von großer Bedeutung sein."
 RAJ_expand_air_bases:0 "Luftwaffenstützpunkte erweitern"
 RAJ_expand_air_bases_desc:0 "Indien ist sehr groß. Um seinen Luftraum zu überwachen und zu schützen, müssen wir unsere Luftkapazitäten auf Stützpunkten auf dem gesamten Subkontinent erhöhen."
 RAJ_air_support_effort:0 "Luftunterstützungsbemühungen"
 RAJ_air_support_effort_desc:0 "Die kombinierte Kriegsführung ist die neue Art der Kriegsführung. Deshalb müssen wir unsere Energie auf die Ausbildung und Produktion von Flugzeugen konzentrieren, die Boden- und Seestreitkräfte unterstützen können."
 RAJ_fighter_effort:0 "Kämpfereinsatz"
 RAJ_fighter_effort_desc:0 "Wir brauchen Kampfflugzeuge, um Bomber zu eskortieren und alle feindlichen Flugzeuge abzufangen, die unser Land bedrohen."
 RAJ_royal_indian_air_force:0 "Königliche indische Luftwaffe"
 RAJ_royal_indian_air_force_desc:0 "Es ist an der Zeit, unsere kleine Luftdivision zu einem eigenen Zweig der Streitkräfte auszubauen. Eine nationale Luftwaffe mit unabhängigem Kommando wird dem indischen Volk und dem Imperium besser dienen können."
 RAJ_the_smiling_buddha:0 "Der lächelnde Buddha"
 RAJ_the_smiling_buddha_desc:0 "Wissenschaftler stehen kurz davor, das Geheimnis der Atomenergie zu lüften – und dies wird zur Entwicklung hochwirksamer Sprengstoffe führen. Wir dürfen bei der Suche nach Atomwaffen nicht ins Hintertreffen geraten."
 RAJ_great_indian_peninsula_railway:0 "Große Indische Halbinsel-Eisenbahn"
 RAJ_great_indian_peninsula_railway_desc:0 "Die staatliche Kontrolle der Great Indian Peninsula Railway im Jahr 1925 bedeutet, dass ihr Ausbau und ihre Verbesserung in unserer Verantwortung liegen. Eine wachsende Bevölkerung braucht eine bessere Verkehrsinfrastruktur."
 RAJ_industrial_expansion:0 "Industrielle Expansion"
 RAJ_industrial_expansion_desc:0 "Hunderte Millionen Menschen sind in Indien zu Hause – und es gibt keinen Grund, warum diese Bevölkerung nicht die Grundlage eines Industriegiganten bilden sollte."
 RAJ_tata_steel:0 "Tata Steel"
 RAJ_tata_steel_desc:0 "Tata Steel ist auf dem Weg, der größte Stahlproduzent des Imperiums zu werden. Die gesteigerte Produktion wird die Modernisierung Indiens weiter vorantreiben."
 RAJ_assam_oil:0 "Assam-Öl"
 RAJ_assam_oil_desc:0 "Assam ist das Zentrum der indischen Ölproduktion, insbesondere die Raffinerie in Digboi. Der Zugang zu dieser Ressource muss erweitert und ausgeschöpft werden."
 RAJ_indian_institute_of_science:0 "Indisches Wissenschaftsinstitut"
 RAJ_indian_institute_of_science_desc:0 "Der Campus des Indian Institute of Science in Bangalore ermöglicht es den besten und klügsten Köpfen der indischen Bevölkerung, unsere Fortschritte voranzutreiben."
 RAJ_institute_of_fundamental_research:0 "Institut für Grundlagenforschung"
 RAJ_institute_of_fundamental_research_desc:0 "Einige unserer führenden Wissenschaftler und Industriellen setzen sich für ein neues Institut für Grundlagenforschung ein, um die neuesten Entdeckungen in den Naturwissenschaften zu nutzen."
 RAJ_research_collaboration:0 "Forschungskooperationen"
 RAJ_research_collaboration_desc:0 "Die Briten haben uns gezeigt, wie vorteilhaft es ist, wissenschaftliche Fortschritte unter engen Verbündeten zu teilen. Unsere gesamte Fraktion wird in der Lage sein, Forschung und Entwicklung im Krieg effizienter durchzuführen, wenn wir die notwendigen Schritte unternehmen, um dies zu koordinieren."
 RAJ_expand_mazagon_dock:0 "Mazagon Dock erweitern"
 RAJ_expand_mazagon_dock_desc:0 "Das Mazagon Dock in Mumbai ist unser wichtigster Schiffsbauer an der Westküste. In dieser Weltkrise benötigt es mehr Kapazitäten."
 RAJ_found_scindia_shipyard:0 "Scindia-Werft gefunden"
 RAJ_found_scindia_shipyard_desc:0 "Wir brauchen eine Werft an der Ostküste des Landes, daher ist die Gründung der Scindia Shipyard in Visakhapatnam für unsere Marinezukunft sinnvoll."
 RAJ_royal_indian_navy:0 "Königliche Indische Marine"
 RAJ_royal_indian_navy_desc:0 "Die Royal Indian Navy muss rasch erweitert werden. Neue Taktiken und neue Schiffe sollten dabei Priorität haben."
 RAJ_screening_effort:0 "Screening-Aufwand"
 RAJ_screening_effort_desc:0 "Indien spielt eine entscheidende Rolle bei der Verteidigung der südlichen Route zum Suezkanal. Durch Abschirm- und Eskortmissionen werden lebenswichtige Güter und Soldaten in die europäischen und afrikanischen Kriegsschauplätze gelangen."
 RAJ_cruiser_effort:0 "Kreuzer-Anstrengung"
 RAJ_cruiser_effort_desc:0 "Für die Entwicklung und den Ausbau der indischen Seemacht werden Kreuzer vorerst ausreichen."
 RAJ_submarine_effort:0 "U-Boot-Anstrengungen"
 RAJ_submarine_effort_desc:0 "Angesichts des Aufstiegs der japanischen Seemacht in Asien könnte es sinnvoll sein, unsere Energien auf die Unterwasserwelt zu konzentrieren und Angriffe von U-Booten aus durchzuführen."
 RAJ_capital_ship_effort:0 "Großkampfschiff-Anstrengung"
 RAJ_capital_ship_effort_desc:0 "Als britischer Außenposten hat Indien die Macht von Großkampfschiffen bei der Beherrschung der Meere erlebt. Wir sollten unsere eigenen schweren Kreuzer und Schlachtschiffe bauen."
 RAJ_modernizing_navy:0 "Modernisierung der Marine"
 RAJ_modernizing_navy_desc:0 "Bessere Motoren, mehr Platz für die Besatzung, höhere Geschwindigkeit und größere Geschütze. Indiens Marine wird bald zu den besten des Kontinents gehören."
 RAJ_east_india_railways:0 "Ostindische Eisenbahnen"
 RAJ_east_india_railways_desc:0 "Aufgrund der staatlichen Kontrolle über die East India Railway liegen alle Entscheidungen über deren Ausbau und Verbesserung in den Händen unserer Minister."
 RAJ_integrate_princely_railways:0 "Fürstliche Eisenbahnen integrieren"
 RAJ_integrate_princely_railways_desc:0 "Einige indische Prinzen haben eigene Eisenbahnsysteme finanziert, doch bisher waren diese nur unzureichend in die vom Raj gebauten Bahnlinien integriert. Es muss etwas getan werden, um die Züge des Landes miteinander zu verknüpfen."
 RAJ_ishapore_arsenal:0 "Ishapore Arsenal"
 RAJ_ishapore_arsenal_desc:0 "Das Ishapore Arsenal und die Gewehrfabrik sind seit dem 18. Jahrhundert in Betrieb. Sie sind für viele Innovationen im Waffendesign verantwortlich und bilden das Herzstück unseres Waffenproduktionssystems."
 RAJ_clamp_down_on_corruption:0 "Korruption bekämpfen"
 RAJ_clamp_down_on_corruption_desc:0 "Trotz der Bemühungen der britischen Industrie, das indische Schienennetz auszubauen, scheinen die Vorteile des Ausbaus nur in geringem Maße Indien zu zugutekommen. Korruption und Doppelzüngigkeit sind im Transportsektor weit verbreitet, und wir müssen etwas dagegen unternehmen."
 RAJ_strengthen_ties_with_british_investors:0 "Stärkung der Beziehungen zu britischen Investoren"
 RAJ_strengthen_ties_with_british_investors_desc:0 "Für den Ausbau unserer Fabriken und Ressourcen sind wir noch immer stark auf britisches Kapital angewiesen. Bis wir über einen eigenen, starken Bankensektor verfügen, müssen wir uns auf die Knie begeben und in London um Unterstützung bitten."
 RAJ_british_rail_investors:0 "Britische Eisenbahninvestoren"
 RAJ_british_rail_investors_desc:0 "Die zivile und Verkehrsinfrastruktur in Indien benötigt eine kräftige Finanzspritze von britischen Geldgebern."
 RAJ_british_arms_investors:0 "Britische Waffeninvestoren"
 RAJ_british_arms_investors_desc:0 "Wenn wir unsere Waffenfabriken schnell wieder in Gang bringen wollen, müssen wir britische Banken bitten, in unsere militärische Infrastruktur zu investieren."
 RAJ_indian_sandhurst_tt:0 "Ein §Y4-Fähigkeitsgeneral§! namens §YKodandera Madappa Cariappa§! wird erscheinen.\nEin §Y3-Fähigkeitsgeneral§! namens §YKodandera Subayya Thimayya§! wird erscheinen.\nEin §Y3-Fähigkeitsgeneral§! namens §YJayanto Nath Chaudhuri§! wird erscheinen."
 RAJ_create_unit_gurkas_tt:0 "Gewinnen Sie eine Eliteeinheit von Gurkhas in Delhi."
 RAJ_create_unit_rani_tt:0 "Gewinnen Sie eine Infanterieeinheit in Delhi."
 RAJ_create_unit_sikh_tt:0 "Gewinnen Sie eine Infanterieeinheit in Delhi."
 RAJ_create_general_rani_tt:0 "\nEin §Y3 Skill General§! namens §YLakshmi Sahgal§! wird erscheinen"
 continuous_naval_production:0 "Marineproduktion"
 continuous_naval_production_desc:0 "Indem wir die Ressourcen auf unsere Werften konzentrieren und qualifizierte Schiffsbauer vom Militärdienst befreien, können wir die Produktionszeit für Schiffe drastisch verkürzen."
 continuous_air_production:0 "Luftproduktion"
 continuous_air_production_desc:0 "Wir können unsere Luftfahrtindustrie umstrukturieren, um Abfall zu vermeiden und die Produktion zu rationalisieren."
 continuous_non_factory_construct:0 "Bauingenieurwesen"
 continuous_non_factory_construct_desc:0 "In unserer Bauindustrie herrscht noch immer viel Nachholbedarf. Indem wir uns darauf konzentrieren, können wir die Baugeschwindigkeit deutlich verbessern. Leider hat sich die Produktion von Werkzeugmaschinen als großer Engpass für die Expansion unserer Schwerindustrie erwiesen, sodass sie von den Bemühungen in diesem Bereich nicht profitieren wird. "
 continuous_reduce_training_time:0 "Armeeausbildung"
 continuous_reduce_training_time_desc:0 "Durch die Schaffung spezialisierter Fortbildungseinheiten innerhalb jeder Division können wir auch Divisionen an die Front schicken, die zuvor mit der Ausbildung zurückgehalten worden wären."
 continuous_suppression:0 "Unterdrückung von Resistenzen"
 continuous_suppression_desc:0 "Indem wir die großen Widerstandsgruppen in den besetzten Gebieten infiltrieren und ihre Anführer ausschalten, können wir den Schaden, den sie anrichten können, erheblich verringern."
 continuous_repair:0 "Baureparatur"
 continuous_repair_desc:0 "Wir werden spezialisierte Reparaturteams aus Fabrik- und Bauarbeitern bilden und ihren Einsatz zentral steuern, um den Wiederaufbau der beschädigten Infrastruktur zu verbessern."
 continuous_tech_share:0 "Technologieaustausch"
 continuous_tech_share_desc:0 "Wir werden unsere Forschungsinstitute und Universitäten ermutigen, mit ihren Partnern in verbündeten Ländern in Kontakt zu treten. Dadurch erhalten wir einen Bonus für den Austausch von Technologie."
 continuous_boost_freedom:0 "Mehr Autonomie"
 continuous_boost_freedom_desc:0 "Durch die Reorganisation unserer Kolonialbürokratie und die Anwerbung einheimischer Verwalter werden wir mit der Zeit in der Lage sein, unsere Angelegenheiten selbst in die Hand zu nehmen."
 continuous_restrict_freedom:0 "Unterdrücken von Themen"
 continuous_restrict_freedom_desc:0 "Unsere Kolonialisten haben ziemlich alberne Vorstellungen von Dingen wie „Selbstbestimmung“ oder „nationaler Unabhängigkeit“. Es ist an der Zeit, sie von diesen Vorstellungen abzubringen."
 subject_autonomy_mod_tt:0 "Autonomie in den Fächern: 0§G-0,5§!"
 unlocks_decision:0 "Schaltet Entscheidung frei:0"
 USA_continue_the_new_deal:1 "Den New Deal fortsetzen"
 USA_continue_the_new_deal_desc:1 "Die Politik des New Deal hat sich als erfolgreich erwiesen. Wir dürfen jetzt nicht den Weg verlieren."
 USA_suspend_the_presecution:0 "Einstellung der Verfolgung"
 USA_suspend_the_presecution_desc:0 "Die Verfolgung amerikanischer Bürger aufgrund ihrer politischen Ansichten – egal wie abscheulich sie auch erscheinen mögen – steht im fundamentalen Widerspruch zu den Werten dieses Landes. Sie muss sofort beendet werden."
 USA_desegregate_the_armed_forces:1 "Aufhebung der Rassentrennung in den Streitkräften"
 USA_desegregate_the_armed_forces_desc:1 "Der Dienst unter Waffen in den Streitkräften des eigenen Landes kann eine unwillkommene Pflicht sein – aber auch ein geschätztes Recht. Ein Recht, das vielen unserer Bürger aufgrund ihrer Abstammung verwehrt bleibt."
 USA_full_desegregation:1 "Vollständige Aufhebung der Rassentrennung"
 USA_full_desegregation_desc:1 "Zu lange haben einige unserer Staaten Menschen aufgrund alter, überholter und unmenschlicher Kriterien unterschiedlich behandelt. In einer freien Republik muss jeder Bürger gleich behandelt werden – und nicht getrennt."
 USA_democratic_socialism:1 "Demokratischer Sozialismus"
 USA_democratic_socialism_desc:1 "Kein vernünftiger Mensch kann leugnen, dass der Sozialismus die Zukunft der menschlichen Zivilisation ist. Gleichzeitig könnte kein stolzer und patriotischer Bürger dieser Republik ein System unterstützen, in dem die Regierung nicht mehr vom Volk und aus dem Volk gemacht wird. Wie unsere stolzen Vorfahren werden wir eine neue Regierungsform schaffen, die beides vereint."
 USA_liberty_for_the_philippines:1 "Freiheit für die Philippinen"
 USA_liberty_for_the_philippines_desc:1 "Die Bevölkerung der Philippinen hat ihre Fähigkeit unter Beweis gestellt, ihre Angelegenheiten selbst zu regeln, und es ist an der Zeit, dass die letzten Überreste amerikanischer Kontrolle über ihr Land offiziell beseitigt werden."
 USA_pacific_decolonisation:1 "Pazifik-Entkolonialisierung"
 USA_pacific_decolonisation_desc:1 "Es gibt keine Rechtfertigung – keine – für die anhaltende Präsenz europäischer Mächte im Pazifik oder dafür, die Bevölkerung der pazifischen Inseln in der Knechtschaft ihrer europäischen Herren zu halten. Amerika wird nicht länger tatenlos zusehen, wie diese Ungerechtigkeit anhält."
 USA_union_representation_act:1 "Gesetz über die Gewerkschaftsvertretung"
 USA_union_representation_act_desc:1 "Arbeit ist ein zentraler Bestandteil des menschlichen Lebens, und die gewerkschaftliche Organisation ist ein grundlegender Bestandteil einer demokratischen Gesellschaft. Es ist nur richtig, dass wir dies anerkennen und sicherstellen, dass Gewerkschaften im Kongress obligatorisch vertreten sind."
 USA_old_age_pension_act:1 "Altersrentengesetz"
 USA_old_age_pension_act_desc:1 "Nach einem Leben voller Arbeit haben unsere Bürger ein Recht auf finanzielle Sicherheit und Respekt im Alter. Die bestehenden Gesetze zu ihrer Unterstützung reichen offensichtlich nicht aus."
 USA_accumulated_wealth_tax_act:1 "Gesetz zur Besteuerung angesammelter Vermögen"
 USA_accumulated_wealth_tax_act_desc:1 "Manche Menschen in unserem Land haben absurde Summen angehäuft. Dieses Geld liegt passiv auf Bankkonten oder ist in unpraktisch große Gebäude, vergoldete Möbel und teure Gemälde investiert. Nichts davon dient einem wirtschaftlichen Zweck. Mit der Einführung einer neuen Steuer zwingen wir diejenigen unter unseren Bürgern, die solch nutzlosen Reichtum angehäuft haben, das Geld wieder in die Wirtschaft zu investieren."
 USA_guarantee_the_american_dream:1 "Garantieren Sie den amerikanischen Traum"
 USA_guarantee_the_american_dream_desc:0 "Die meisten unserer Leute wünschen sich nicht viel vom Leben: einen festen Arbeitsplatz, gute Gesundheit und einen Ort, an dem sie eine Familie gründen können. Es gibt keinen Grund, warum sie das nicht haben sollten."
 USA_worker_management_act:1 "Arbeitnehmer-Management-Gesetz"
 USA_worker_management_act_desc:1 "Viel zu oft werden Fabriken und Büros von Menschen geleitet, die nie in der Produktion gearbeitet haben. Da sie die Realität der Produktion nicht verstehen, wecken sie unrealistische Erwartungen. Um unsere Wirtschaft vor den Schäden zu bewahren, die solche inkompetenten Manager anrichten können, setzen wir uns für eine Führung der Arbeiter ein, durch die Arbeiter, für die Arbeiter!"
 USA_militia_organization_act:1 "Milizorganisationsgesetz"
 USA_militia_organization_act_desc:1 "Unsere stolze Republik hat eine lange Tradition des Bürgersoldaten. Sollte unser Land jemals von einem ausländischen Angreifer angegriffen werden, wird dieser auf eine gut organisierte und gut bewaffnete Miliz von Männern und Frauen treffen, die auf vertrautem Gebiet kämpfen, um ihre Heimat zu verteidigen."
 USA_communal_property_act:1 "Gesetz über das gemeinschaftliche Eigentum"
 USA_communal_property_act_desc:1 "Die Bedürfnisse der Vielen dürfen niemals durch die Wünsche der Wenigen oder gar des Einzelnen überlagert werden. Um dies zu gewährleisten, werden wir neue Gesetze verabschieden, die es lokalen Gemeinden erleichtern, das Recht auf Enteignung auszuüben."
 USA_reintegration:1 "Wiedereingliederung"
 USA_reintegration_desc:1 "Der Krieg hat unsere Nation gespalten, doch selbst diejenigen, die sich gegen uns erhoben haben, können letztendlich erlöst werden. Wenn die Bevölkerung ihre Fehler erkannt hat, sollte sie wieder am politischen Prozess unserer stolzen Republik teilnehmen dürfen."
 USA_reach_out_to_the_ware_group:1 "Kontaktieren Sie die Ware Group"
 USA_reach_out_to_the_ware_group_desc:1 "Es gibt eine kleine Gruppe überzeugter Kommunisten in unserer Regierung. Sie glauben, im Geheimen zu agieren, aber wir kennen ihre Namen. Vielleicht erkennen sie, dass unsere Ziele übereinstimmen, und könnten überzeugt werden, der Regierung beizutreten."
 USA_us_ussr_economic_cooperation:1 "Wirtschaftliche Zusammenarbeit zwischen den USA und der UdSSR"
 USA_us_ussr_economic_cooperation_desc:1 "Trotz ihrer chaotischen und blutigen Entstehung hat die Sowjetunion beim Aufbau einer modernen Industriegesellschaft bemerkenswerte Fortschritte erzielt. Wir sollten unseren Teil dazu beitragen, sie zu unterstützen."
 USA_secure_china:1 "Sicheres China"
 USA_secure_china_desc:1 "China ist von einem langen, blutigen Bürgerkrieg erfasst. Die nationalistische Regierung ist zutiefst korrupt und hat jegliche Unterstützung in der Bevölkerung verloren. Es ist an der Zeit, den einzigen Akteur in China zu unterstützen, der das Land einen und befrieden kann – die Kommunistische Partei."
 USA_end_monarchism:1 "Schluss mit dem Monarchismus"
 USA_end_monarchism_desc:1 "Die Monarchien Europas haben die Welt bereits in einen Weltkrieg gestürzt – wir können nicht zulassen, dass sie dies erneut tun. Unsere Vorfahren führten Krieg gegen den König von England, um ihre Freiheit zu erlangen – wir werden die Welt für immer von seiner Tyrannei befreien!"
 USA_shatter_the_empires:1 "Zerschmettere die Imperien"
 USA_shatter_the_empires_desc:1 "Wir waren einst eine Kolonie eines globalen Imperiums, bis wir unsere Freiheit mit Blut erkauften. Unsere Republik kann sich erst dann wirklich sicher fühlen, wenn diejenigen, die sich als Herren dieser Welt wähnen, in Schach gehalten werden."
 USA_agricultural_adjustment_act:1 "Agraranpassungsgesetz"
 USA_agricultural_adjustment_act_desc:1 "Unsere Landwirte sind von der Wirtschaftskrise besonders hart getroffen worden. Wir müssen dafür sorgen, dass die Menschen, die unsere Lebensmittel produzieren, nicht durch einen unkontrollierten Markt aus dem Geschäft gedrängt werden."
 USA_fair_labour_standards_act:1 "Gesetz zu fairen Arbeitsnormen"
 USA_fair_labour_standards_act_desc:1 "Angesichts der ersten Anzeichen einer langsamen Erholung ist es an der Zeit, die Arbeitnehmer daran teilhaben zu lassen. Wir müssen ausbeuterische Praktiken wie unbezahlte Überstunden verbieten und einen existenzsichernden Mindestlohn einführen."
 USA_federal_housing_act:1 "Bundeswohnungsgesetz"
 USA_federal_housing_act_desc:1 "Im Rahmen unserer laufenden Bemühungen, die Armut in den Vereinigten Staaten zu beseitigen, werden wir ein Programm für staatlich subventionierten Wohnraum schaffen."
 federal_housing_tt:0 "(§YFünf zufällige Zustände§!):0Fügen Sie §G1§ hinzu! Bauplätze."
 USA_office_of_scientific_research_and_development:1 "Büro für wissenschaftliche Forschung und Entwicklung"
 USA_office_of_scientific_research_and_development_desc:1 "Da am Horizont ein Krieg droht, müssen wir unsere wissenschaftlichen Anstrengungen darauf konzentrieren, sicherzustellen, dass uns kein potenzieller Gegner unterlegen ist."
 USA_focus_on_europe:1 "Fokus Europa"
 USA_focus_on_europe_desc:1 "Die europäischen Großmächte stehen erneut kurz davor, die Welt in einen Weltkrieg zu stürzen. Wir können nicht wie früher warten, bis es uns trifft. Wir müssen bereit sein, entschlossen einzugreifen, sollte eine Nation in Europa den Frieden bedrohen."
 USA_focus_on_asia:1 "Fokus auf Asien"
 USA_focus_on_asia_desc:1 "Während die meisten Menschen mit Sorge nach Europa blicken, sind wir auch jenseits des Pazifiks mit Unsicherheit und Instabilität konfrontiert. Es könnte in unserem besten Interesse sein, im Ausland zu intervenieren, bevor wir näher an der Heimat angreifen."
 USA_magic:1 "MAGIE"
 USA_magic_desc:1 "Die Marine glaubt, dass sie die japanischen Verschlüsselungscodes knacken kann, was es uns ermöglichen würde, ihren gesamten Nachrichtenverkehr, einschließlich der Schiffsbewegungen, zu lesen."
 USA_neutrality_act:1 "Neutralitätsgesetz"
 USA_neutrality_act_desc:1 "Es scheint immer wahrscheinlicher, dass in Europa ein Krieg ausbrechen wird. Während des Ersten Weltkriegs verkauften amerikanische Unternehmen große Mengen Waffen an die Alliierten, und viele glauben, dass der amerikanische Kriegseintritt vor allem durch den Wunsch motiviert war, die Bezahlung dieser Lieferungen sicherzustellen. Diesmal wird es keine Kriegsgewinnler geben."
 USA_lend_lease_act_neutrality_tt:0 "\n\nDie Verabschiedung des Neutralitätsgesetzes wird die Anforderungen für die Verabschiedung des Leih- und Pachtgesetzes §Rdrastisch erhöhen§!"
 USA_lend_lease_act:1 "Leih- und Pachtgesetz"
 USA_lend_lease_act_desc:1 "Die großen Demokratien der Welt werden angegriffen. Sollten sie die Schlacht verlieren, ist es nur eine Frage der Zeit, bis der Krieg auch unsere Küsten erreicht. Wir müssen sie nach Kräften unterstützen – auch wenn sie die Ausrüstung nicht sofort bezahlen können."
 USA_reestablish_the_gold_standard:1 "Den Goldstandard wiederherstellen"
 USA_reestablish_the_gold_standard_desc:1 "Ohne den Goldstandard ist Geld kaum mehr als ein Glaubensartikel, während die galoppierende Inflation die Ersparnisse unserer Bevölkerung aufzehrt und ihre Arbeit entwertet. Wir müssen diesen finanzpolitisch unverantwortlichen Weg aufgeben."
 USA_adjusted_compensation_act:1 "Gesetz zur angepassten Vergütung"
 USA_adjusted_compensation_act_desc:1 "Unseren Veteranen des Ersten Weltkriegs wurde eine angemessene Rente versprochen. Viele von ihnen sind in jüngster Zeit durch die Depression in Not geraten. Wir müssen alles tun, um denen zu helfen, die in der Stunde der Not dem Ruf der Republik gefolgt sind."
 USA_labour_management_relations_act:1 "Gesetz über die Beziehungen zwischen Arbeitnehmern und Arbeitgebern"
 USA_labour_management_relations_act_desc:1 "Unternehmen in ganz Amerika sind durch Gewerkschaftsaktivitäten aller Art bedroht – Streiks, organisierte Gewerkschaftsarbeit, Forderungen nach höheren Löhnen. Wir können nicht zulassen, dass das so weitergeht."
 USA_protectionist_tariffs:1 "Protektionistische Zölle"
 USA_protectionist_tariffs_desc:1 "Der Freihandel hat unsere Märkte für ausländische Wettbewerber geöffnet, von denen viele selbst Zölle und Abgaben erhoben haben. Unsere Unternehmen sind einem harten Wettbewerb ausgesetzt, während ihre Unternehmen die Sicherheit der Zollmauer genießen. Dem muss ein Ende gesetzt werden."
 USA_income_tax_reform:2 "Einkommensteuerreform"
 USA_income_tax_reform_desc:1 "Die Einkommensteuer entzieht jedem Amerikaner Geld – Geld, das unsere Bürger für andere Dinge und die Unterstützung ihrer lokalen Wirtschaft ausgeben könnten. Wir geben den Amerikanern die Autonomie über ihre eigenen Finanzen zurück."
 USA_institute_of_american_sciences:1 "Amerikanisches Institut der Wissenschaften"
 USA_institute_of_american_sciences_desc:1 "Die Universitäten und Forschungslabore im ganzen Land haben ihre Forschung bisher nach eigenem Ermessen durchgeführt. Damit muss Schluss sein. Wir werden eine neue Organisation gründen, um die Bemühungen unserer Weltklasse-Wissenschaftler zu koordinieren."
 USA_america_first:0 "Amerika zuerst"
 USA_america_first_desc:2 "Manche Leute würden uns dazu verleiten, unser Vermögen und das Blut unserer Jugend in fremden Kriegen zu verschwenden. Wir dürfen uns von diesen Kriegstreibern nicht beeinflussen lassen und müssen stattdessen nach einer einfachen Maxime leben: „Amerika zuerst – alle anderen danach.“"
 USA_extend_the_chinese_exclusion_acts:1 "Ausweitung der Chinese Exclusion Acts"
 USA_extend_the_chinese_exclusion_acts_desc:2 "Da China vom Krieg verwüstet ist, müssen wir Maßnahmen ergreifen, um die chinesische Einwanderung zu begrenzen, damit wir nicht in Flüchtlingswellen ertrinken."
 USA_empower_the_huac:1 "Ermächtigen Sie den Huac"
 USA_empower_the_huac_desc:1 "Der Ausschuss für unamerikanische Umtriebe erfüllt in unserer gesunden Demokratie eine wichtige Funktion. Wir dürfen nicht zulassen, dass illoyale Elemente versuchen, den politischen Prozess zu beeinflussen."
 USA_voter_registration_act:1 "Wählerregistrierungsgesetz"
 USA_voter_registration_act_desc:1 "Wahlen sind der wichtigste Teil einer Demokratie. Es ist völlig unvernünftig zu fordern, dass es keine Kontrollen darüber geben sollte, wer an ihnen teilnehmen darf – oder vielleicht haben die Befürworter unkontrollierter Wahlen finsterere Motive und wollen den Prozess durch Wahlbetrug untergraben …"
 USA_ally_with_the_silver_shirts:1 "Verbünde dich mit den silbernen Shirts"
 USA_ally_with_the_silver_shirts_desc:1 "Um unserer Nation ihren angemessenen Platz in der Welt zurückzugeben und ihre Manifest Destiny zu verwirklichen, ist eine grundlegendere Reorganisation notwendig. Die Silver Shirts werden uns dabei helfen."
 USA_national_prosperity_program:1 "Nationales Wohlstandsprogramm"
 USA_national_prosperity_program_desc:1 "Der Schlüssel zu einer raschen Erholung und dauerhaftem Wohlstand liegt nicht in unkontrollierten Märkten, sondern in sorgfältig gesteuerten Programmen, die private und öffentliche Unternehmen miteinander verbinden."
 USA_privatize_the_TVA:1 "Privatisierung der TVA"
 USA_privatize_the_TVA_desc:1 "Die Tennessee Valley Authority hat die private Konkurrenz verdrängt und die Bautätigkeit in der Region regelrecht unter Kontrolle gebracht. Es kann nicht Aufgabe der Regierung sein, Dinge zu tun, die der private Sektor nachweislich besser kann."
 USA_de_regulate_the_banking_sector:1 "Deregulierung des Bankensektors"
 USA_de_regulate_the_banking_sector_desc:1 "Nach einer im Konjunkturzyklus völlig normalen Korrektur an den Finanzmärkten haben frühere Regierungen völlig unangemessene Beschränkungen der Finanzaktivitäten eingeführt. Obwohl diese Beschränkungen zweifellos gut gemeint waren, richten sie eindeutig mehr Schaden als Nutzen an."
 USA_national_employment_strategy:1 "Nationale Beschäftigungsstrategie"
 USA_national_employment_strategy_desc:1 "Arbeitslosigkeit hat eine einfache Ursache: Es gibt nicht die passenden Arbeitskräfte für die angebotenen Jobs. Fabriken liegen brach, weil Arbeitgeber nicht die benötigten Arbeitskräfte finden, während in anderen Teilen des Landes Menschen hungern. Wir werden eine neue Strategie einführen, die sicherstellt, dass jeder Arbeitgeber die benötigten Arbeitskräfte für sein Unternehmen findet."
 USA_invite_foreign_support:1 "Ausländische Unterstützung einladen"
 USA_invite_foreign_support_desc:1 "Angesichts einiger sehr beunruhigender Berichte über die Loyalität des Militärs und einiger Landesregierungen müssen wir möglicherweise im Ausland nach Unterstützung suchen."
 USA_send_lindbergh_to_germany:1 "Lindbergh nach Deutschland schicken"
 USA_send_lindbergh_to_germany_desc:1 "Der berühmte Flieger hat angeboten, nach Europa zu reisen, um zu untersuchen, wie Deutschland nach dem letzten Krieg wiederaufgebaut wurde. Dies dürfte uns wertvolle Erfahrungen liefern. Lindbergh hat zudem angedeutet, dass er bereit wäre, der Regierung als Berater zur Seite zu stehen."
 USA_work_with_the_bund:1 "Zusammenarbeit mit dem Bund"
 USA_work_with_the_bund_desc:1 "Der Deutsch-Amerikanische Bund hat uns angeboten, uns dabei zu helfen, unsere Positionen den vielen Amerikanern deutscher Abstammung zu vermitteln. Dadurch würden wir in ihren Staaten eine wohlwollende Basis finden."
 USA_work_with_the_bund_tt:0 "Stellt sicher, dass die folgenden Staaten im Falle eines Bürgerkriegs an der Seite der Regierung bleiben: Ohio, Missouri, Wisconsin, Illinois, Indiana und Michigan"
 USA_recruit_the_free_corps:1 "Rekrutieren Sie das Freikorps"
 USA_recruit_the_free_corps_desc:1 "Angesichts des zunehmenden Misstrauens gegenüber dem Militär müssen wir uns den Helden des Ersten Weltkriegs zuwenden. In der Stunde der Not kamen die deutschen Freikorps der Deutschen Republik zu Hilfe. Wir brauchen eine ähnliche Organisation, die uns in der Stunde der Not treu zur Seite steht."
 #USA_honor_the_confederacy:1 "Honor the Confederacy"
 #USA_honor_the_confederacy_desc:1 "For too long, the story of the Civil War was told from the northern perspective - the story of a doomed rebellion. It is time that the other side is heard as well."
 USA_honor_the_confederacy:1 "Unsere protestantische Identität annehmen"
 USA_honor_the_confederacy_desc:1 "Juden, Kommunisten, Katholiken und Schwarze sind die dunklen Seelen, die versuchen, das wahre Wort Gottes in Amerika zu zerstören. Wir werden es ihnen nicht erlauben, wir werden es ihnen nicht erlauben, wir werden es ihnen nicht erlauben ..."
 USA_war_powers_act:1 "Kriegsvollmachtsgesetz"
 USA_war_powers_act_desc:1 "In einer Welt, in der Flugzeuge immer schneller werden und immer größere Bombenlasten tragen, in einer Welt der U-Boote und Chemiewaffen, ist es eine Einladung zur Katastrophe, den Präsidenten davon abzuhalten, für die Verteidigung des Landes die Zustimmung des Kongresses einzuholen."
 USA_seize_cuba:1 "Erobere Kuba"
 USA_seize_cuba_desc:1 "Direkt vor unserer Küste liegt ein unsinkbarer Flugzeugträger, der einem Angreifer als Stützpunkt dienen könnte. Das dürfen wir nicht zulassen."
 USA_eliminate_the_southern_threat:1 "Beseitigen Sie die Bedrohung aus dem Süden"
 USA_eliminate_the_southern_threat_desc:1 "Mexiko war in der letzten Generation ein instabiles Chaos. Ob die Gewalt über unsere Grenze schwappt oder jemand das Land vereint und nach Norden marschiert, ist irrelevant – wir müssen unsere Südflanke sichern."
 USA_the_canadian_corridor:1 "Der kanadische Korridor"
 USA_the_canadian_corridor_desc:1 "Ein schmaler Streifen dünn besiedelten kanadischen Territoriums trennt Alaska vom südlichen Teil der USA. Seine Verteidigung ist daher auf den guten Willen Kanadas angewiesen. Der wahrscheinlichste Angreifer ist jedoch Kanada. So kann es nicht weitergehen."
 USA_north_american_dominion:1 "Nordamerikanisches Dominion"
 USA_north_american_dominion_desc:1 "Da unsere unmittelbaren Grenzen gesichert sind, müssen wir unseren Blick auch über den Tellerrand richten, um einer Bedrohung Nordamerikas zuvorzukommen. Wir können keinen Schurkenstaat in der Region dulden."
 USA_strategic_interests:1 "Strategische Interessen"
 USA_strategic_interests_desc:1 "Die Welt ist vernetzter als je zuvor. Eine Bedrohung in einem Teil der Welt kann sich schnell zu einer Gefahr für die ganze Welt entwickeln. Wir müssen ein Netzwerk sich gegenseitig unterstützender Stützpunkte rund um den Globus aufbauen, um in jeder Situation schnell reagieren zu können."
 USA_protect_south_america:1 "Schützen Sie Südamerika"
 USA_protect_south_america_desc:1 "Der südliche Teil unseres Doppelkontinents ist seit seiner Entdeckung der Spielplatz verschiedener Imperien. Es ist an der Zeit, dass sich jemand darum kümmert, dass diese Nationen ungestört bleiben und in eine produktivere Zukunft geführt werden."
 USA_pacific_pacification:1 "Pazifische Befriedung"
 USA_pacific_pacification_desc:1 "Australien und Neuseeland sind zu weit von Großbritannien entfernt, um von ihnen wirksam verteidigt zu werden. Wir können nicht zulassen, dass sie von einer Nation übernommen werden, die [USA.GetNameDef] feindlich gesinnt ist."
 USA_secure_asia:1 "Sicheres Asien"
 USA_secure_asia_desc:1 "Die Kolonialmächte in Europa scheinen entweder nicht willens oder nicht in der Lage zu sein, ihre asiatischen Kolonien wirksam zu verteidigen. Wir müssen diese Last für sie übernehmen, damit diese Gebiete nicht zum Ausgangspunkt weiterer Aggressionen werden."
 USA_global_hegemony:1 "Globale Hegemonie"
 USA_global_hegemony_desc:1 "Wir stehen kurz davor, eine globale Vormachtstellung zu erlangen, die es uns ermöglicht, allein durch unsere Existenz Konflikte zu verhindern. Wir müssen nur dafür sorgen, dass die verbleibenden Großmächte auf dem Planeten unsere Position anerkennen."
 USA_war_plans_division:1 "Abteilung für Kriegspläne"
 USA_war_plans_division_desc:1 "Auch wenn wir uns Frieden wünschen, müssen wir uns auf Krieg vorbereiten."
 USA_intervention_in_the_americas:1 "Intervention in Amerika"
 USA_intervention_in_the_americas_desc:1 "Unsere erste Aufgabe muss es sein, sicherzustellen, dass wir auf alle Eventualitäten in unserer eigenen Hemisphäre vorbereitet sind."
 USA_war_plan_green:1 "Kriegsplan Grün"
 USA_war_plan_green_desc:1 "Da sich Mexiko seit der Revolution in einem Zustand ständiger Instabilität befindet, müssen wir bereit sein, entschlossen einzugreifen."
 USA_war_plan_crimson:1 "Kriegsplan Crimson"
 USA_war_plan_crimson_desc:1 "Obwohl Kanada derzeit ein freundlicher Nachbar sein mag, muss dies nicht immer der Fall sein."
 USA_war_plan_gray:1 "Kriegsplan Grau"
 USA_war_plan_gray_desc:1 "Die Geschichte hat gezeigt, dass die karibischen Länder recht instabil sind. Sollte eines dieser Länder instabil werden, müssen wir möglicherweise rasch handeln, um die amerikanischen Interessen zu schützen."
 USA_hemisphere_defense:1 "Hemisphärenverteidigung"
 USA_hemisphere_defense_desc:1 "Ungeachtet aller ausländischen Verwicklungen müssen wir in erster Linie auf unsere eigene Nachbarschaft schauen."
 USA_intervention_in_europe:1 "Intervention in Europa"
 USA_intervention_in_europe_desc:1 "Weniger als zwei Jahrzehnte nach dem Ende des Ersten Weltkriegs stehen die europäischen Nationen erneut vor einem Krieg. Wir müssen vorbereitet sein, falls die Situation ein schnelles Eingreifen erfordert."
 USA_war_plan_gold:1 "Kriegsplan Gold"
 USA_war_plan_gold_desc:1 "Frankreich leidet unter innerer Spaltung und zunehmendem politischen Radikalismus, ist aber gleichzeitig eine der größten Militärmächte Europas. Diese Kombination bereitet vielen Menschen Unbehagen."
 USA_war_plan_silver:0 "Kriegsplan Silber"
 USA_war_plan_silver_desc:0 "Italien hat offen seine Ambitionen erklärt, den Mittelmeerraum zu beherrschen. Sollten seine imperialen Bestrebungen mit unseren Interessen kollidieren, müssen wir vorbereitet sein."
 USA_anti_bolshevist_aid:1 "Antibolschewistische Hilfe"
 USA_anti_bolshevist_aid_desc:1 "Jede Waffe, Granate, Kugel und jedes Paar Stiefel, die wir denen geben können, die gegen die Ausbreitung des Kommunismus kämpfen, wird uns letztendlich bei unserer Verteidigung helfen."
 USA_war_plan_ruby:1 "Kriegsplan Ruby"
 USA_war_plan_ruby_desc:1 "In Indien leben unzählige Millionen Menschen, und wir müssen darauf vorbereitet sein, uns ihnen im Falle eines Konflikts zu stellen."
 USA_war_plan_scarlet_garnet:1 "Kriegsplan Scarlet Garnet"
 USA_war_plan_scarlet_garnet_desc:1 "Im Pazifik könnten Australien und Neuseeland ihrem Mutterland durchaus zu Hilfe kommen. Jeder Plan im Umgang mit Großbritannien muss jedoch auch dessen Kolonien berücksichtigen."
 USA_intervention_in_asia:1 "Intervention in Asien"
 USA_intervention_in_asia_desc:1 "Asien wird oft von den Entwicklungen in Europa überschattet und hat seine eigenen Krisenherde, die uns zwingen, uns auf eine Intervention vorzubereiten."
 USA_war_plan_yellow:1 "Kriegsplan Gelb"
 USA_war_plan_yellow_desc:1 "China befindet sich seit mehr als einer Generation in einem Bürgerkrieg. Es ist nicht abzusehen, wann sich die Lage so weit zuspitzt, dass wir eingreifen müssen."
 USA_war_department:1 "Kriegsministerium"
 USA_war_department_desc:1 "In einem Zeitalter industrialisierter Kriegsführung brauchen wir eine Regierung, die in der Lage ist, das volle Potenzial der Ressourcen unserer großen Nation auszuschöpfen."
 USA_selective_training_act:1 "Gesetz zur selektiven Ausbildung"
 USA_selective_training_act_desc:1 "Die Vereinigten Staaten haben in der Vergangenheit selbst in Kriegszeiten nur zögerlich die Wehrpflicht eingeführt. Wir können uns diesen Luxus nicht mehr leisten."
 USA_louisiana_maneuvers:1 "Louisiana-Manöver"
 USA_louisiana_maneuvers_desc:1 "Aufgrund von Budgetbeschränkungen waren wir gezwungen, viele militärische Entwicklungen aus der Ferne zu beobachten. Nun können wir einige unserer Theorien endlich in der Praxis erproben."
 USA_airborne_divisions:1 "Luftlandedivisionen"
 USA_airborne_divisions_desc:1 "Die Weiterentwicklung der Reichweite und Nutzlast von Flugzeugen eröffnet zahlreiche Möglichkeiten. Transportflugzeuge könnten ganze Truppendivisionen weit hinter die feindlichen Linien bringen und dort verheerende Schäden anrichten."
 USA_army_of_the_united_states:1 "Armee der Vereinigten Staaten"
 USA_army_of_the_united_states_desc:1 "Für die bevorstehenden Kämpfe ist die US-Armee zu klein. Um die dramatische Vergrößerung bewältigen zu können, die wir bewältigen müssen, müssen wir eine neue Organisation schaffen."
 USA_womens_armed_service_integration_act:1 "Gesetz zur Integration von Frauen in den Streitkräften"
 USA_womens_armed_service_integration_act_desc:1 "Wir können es uns nicht leisten, jemanden abzuweisen, der dienen möchte. Jede Frau in Uniform macht einen Mann frei, der an der Front kämpfen kann."
 USA_tank_experiments:1 "Panzerexperimente"
 USA_tank_experiments_desc:1 "Panzer sind auf dem modernen Schlachtfeld unverzichtbar. Wir müssen herausfinden, wie wir sie am besten einsetzen können."
 USA_tank_destroyer_doctrine:1 "Panzerzerstörer-Doktrin"
 USA_tank_destroyer_doctrine_desc:1 "Eine umstrittene Theorie einiger Artillerieoffiziere besagt, dass die beste Waffe gegen Panzerdurchbrüche ein schnelles, leicht gepanzertes, aber schwer bewaffnetes Fahrzeug sei."
 USA_main_battle_tanks:1 "Kampfpanzer"
 USA_main_battle_tanks_desc:1 "Die Praxiserfahrung hat deutlich gezeigt, dass ein Panzer eine Vielzahl von Aufgaben erfüllen muss, von der Infanterieunterstützung bis hin zur Bekämpfung feindlicher Panzer. Die Entwicklung von Fahrzeugen, die diesen Anforderungen gerecht werden, ermöglicht uns eine Rationalisierung der Produktion."
 USA_armored_infantry:1 "Gepanzerte Infanterie"
 USA_armored_infantry_desc:1 "Panzer allein können eine Schlacht nicht gewinnen. Um ein Gebiet zu halten, braucht es Infanterie. Mit gepanzerten Fahrzeugen können sie mit den Panzern mithalten und allem standhalten, was auf sie zukommt."
 USA_build_the_pentagon:1 "Bauen Sie das Pentagon"
 USA_build_the_pentagon_desc:1 "Der Ausbau unseres Militärs erfordert ein neues globales Hauptquartier, das es befehligt."
 USA_department_of_defense:1 "Verteidigungsministerium"
 USA_department_of_defense_desc:1 "Die Umbenennung des Kriegsministeriums unterstreicht, dass wir unseren Schutz nicht länger ignorieren können, bis er auf die Probe gestellt wird. Wir müssen stets wachsam sein."
 USA_escort_fighters:1 "Eskortjäger"
 USA_escort_fighters_desc:1 "Während der Bomber möglicherweise immer durchkommt, ist dies für seinen Flügelmann möglicherweise nicht der Fall – es sei denn, beide werden von befreundeten Jägern geschützt."
 USA_us_army_airforce:1 "Luftwaffe der US-Armee"
 USA_us_army_airforce_desc:1 "Das grundlegende Ziel der militärischen Luftstreitkräfte besteht darin, den Bodentruppen die Eroberung und Verteidigung von Gebieten zu ermöglichen. Alles andere ist zweitrangig."
 USA_us_air_force:1 "US-Luftwaffe"
 USA_us_air_force_desc:1 "Das grundlegende Ziel militärischer Luftstreitkräfte ist es, Kriege zu gewinnen. Strategische Bombenangriffe mit immer verheerenderen Waffen werden entweder den Widerstandswillen des Feindes brechen oder ihn materiell unfähig machen, Widerstand zu leisten."
 USA_two_ocean_navy_act:1 "Zwei-Ozean-Marinegesetz"
 USA_two_ocean_navy_act_desc:1 "Angesichts des bevorstehenden Krieges müssen wir sicherstellen, dass kein Feind jemals einen Fuß an die amerikanische Küste setzen kann. Unsere Marine muss in der Lage sein, jeden Feind auf den beiden großen Ozeanen, die unsere Grenzen bilden, zu bekämpfen."
 USA_maritime_commission:1 "Seefahrtskommission"
 USA_maritime_commission_desc:1 "Während sich die meisten Laien nur auf die Kriegsschiffe konzentrieren, wissen die wahren Experten, dass es die einfachen Frachtschiffe sind, die Kriege gewinnen. Um die Zahl der in Kriegszeiten verfügbaren Schiffe zu erhöhen, werden wir ein spezielles Gremium zur Koordinierung des Baus einrichten."
 USA_advanced_basing:1 "Erweiterte Basis"
 USA_advanced_basing_desc:1 "Je weiter wir den Feind von unseren Küsten fernhalten können, desto besser."
 USA_naval_radar:1 "Marineradar"
 USA_naval_radar_desc:1 "Radar bietet verlockende Möglichkeiten, unseren Feinden den Schutz der Nacht zu nehmen und sie auch bei schlechtem Wetter zu entdecken."
 USA_fleet_submarines:1 "Flotten-U-Boote"
 USA_fleet_submarines_desc:1 "Unsere wahrscheinlichsten Gegner im Seekrieg sind beide auf den Außenhandel angewiesen, der sich als sehr anfällig für U-Boote erwiesen hat. Diese U-Boote müssten über eine sehr große Reichweite verfügen, um die Ozeane überqueren und nahe der feindlichen Küste operieren zu können."
 USA_unrestricted_submarine_warfare:1 "Uneingeschränkter U-Boot-Krieg"
 USA_unrestricted_submarine_warfare_desc:1 "Die Geschichte hat gezeigt, dass jeder gut gemeinte Vertrag zur Kontrolle des U-Boot-Krieges das Papier nicht wert ist, auf dem er geschrieben steht. Wir sollten uns nicht an etwas gebunden fühlen, das unsere Feinde ohnehin ignorieren würden."
 can_degaussing_tech:0 "Nutzen Sie die Entmagnetisierungstechnologie"
 USA_great_depression_cooldown:0 "Neue Gesetze werden noch ausgearbeitet"
 USA_great_depression_cooldown_tt:0 "Nach der Verabschiedung dieses Gesetzes wird es §Y230 Tage§! dauern, bis weitere New-Deal-Gesetze ausgearbeitet und zur Unterzeichnung bereit sind.\n\n"
 USA_limited_intervention_tt:0 "\n\nDie Verabschiedung dieses Gesetzes wird es §Rerheblich schwieriger§! machen, Ihre Wirtschaft zu mobilisieren.\n\n"
 britain_enforced_our_loyalty:0 "Großbritannien hat unsere Loyalität erzwungen."
 sirte_oil_developed:0 "Erschließung der Sirte-Ölfelder"
 benghazi_oil_developed:0 "Ölfelder in Bengasi erschlossen"
 TREE_FILTER_TOGGLE:0 "§GKlicken§!, um die Anzeige weiterer Filter ein- und auszuschalten"

MD_TRUMP_USA_the_second_civil_war:0 "Der zweite Bürgerkrieg – Trumps Amerika"
MD_TRUMP_USA_the_second_civil_war_desc:0 "Die Vereinigten Staaten sind in einen verheerenden Bürgerkrieg verwickelt, der die Nation zerreißt. Präsident Trump muss diese turbulente Zeit meistern und wichtige Entscheidungen treffen, die die Zukunft des Landes bestimmen."
MD_TRUMP_USA_a_house_divided:0 "Ein geteiltes Haus"
MD_TRUMP_USA_a_house_divided_desc:0 "Der Tod von Präsident Trump hat die Nation gespalten und in Aufruhr versetzt. Dem Repräsentantenhaus kommt eine zentrale Rolle bei der Führung des Landes durch diese turbulenten Zeiten zu. Wird es ihnen gelingen, die Nation wieder zu vereinen, oder wird die Spaltung siegen?"

MD_TRUMP_USA_the_show_goes_on:0 "Die Show geht weiter"
MD_TRUMP_USA_the_show_goes_on_desc:0 "Obwohl Präsident Trump das Attentat überlebte, ist sein Gesundheitszustand dauerhaft beeinträchtigt. Mit einer Augenklappe über seinem verletzten Auge muss er Stärke und Widerstandskraft zeigen, um die Nation durch den anhaltenden Bürgerkrieg und seine Folgen zu führen."
MD_TRUMP_USA_the_american_ceasear:0 "Der amerikanische Cäsar"
MD_TRUMP_USA_the_american_ceasear_desc:0 "Angesichts des tobenden Bürgerkriegs und der Widerstandskraft von Präsident Trump nach dem überlebten Attentat erwägt er, die Macht vollständig zu übernehmen. Wird er der nächste amerikanische Cäsar, ein Diktator, der mit eiserner Faust regiert und sein neu gewonnenes Image nutzt, um Stärke und Kontrolle zu demonstrieren, oder wird er demokratische Werte und Traditionen hochhalten und die Nation mit ruhiger Hand durch diese Krise führen?"
MD_TRUMP_USA_take_a_back_seat:0 "Nehmen Sie einen Rücksitz"
MD_TRUMP_USA_take_a_back_seat_desc:0 "Nachdem er das Attentat überlebt hat und sein verletztes Auge mit einer Augenklappe bedeckt, beschließt Präsident Trump, sich aus der Führungsrolle zurückzuziehen. Er möchte einen Nachfolger ernennen oder die Macht an einen vertrauenswürdigen Berater delegieren, damit ein neuer Führer die Nation durch diese turbulenten Zeiten führen kann."
MD_TRUMP_USA_trumps_path_continues:0 "Trumps Weg geht weiter"
MD_TRUMP_USA_trumps_path_continues_desc:0 "Nach dem Tod von Präsident Trump wird sein Sohn Donald Trump Jr. zu seinem natürlichen Nachfolger. In einer Zeit der Unruhen im Land tritt er in die Fußstapfen seines Vaters, entschlossen, Trumps Erbe fortzuführen und Amerika durch diese schwierigen Zeiten zu führen. Wird er das Land vereinen können oder werden unter seiner Führung neue Spaltungen entstehen?"
MD_TRUMP_USA_the_new_washington:0 "Das neue Washington"
MD_TRUMP_USA_the_new_washington_desc:0 "Nach dem Tod von Präsident Trump wird Vizepräsident Mike Pence oder Ronald DeSantis sein Nachfolger. Die Nation trauert um ihren ehemaligen Präsidenten, während Pence die Führung des Landes durch den anhaltenden Bürgerkrieg und dessen Folgen übernimmt. Wird er Trumps Erbe fortführen oder einen neuen Weg für Amerika beschreiten?"
MD_TRUMP_USA_finish_the_civil_war:0 "Den Bürgerkrieg beenden – Trumps Vision"
MD_TRUMP_USA_finish_the_civil_war_desc:0 "Die Nation ist von jahrelangen Konflikten erschöpft, und nun ist es an der Zeit, den Bürgerkrieg zu beenden. Ob durch Diplomatie oder entschlossenes militärisches Vorgehen – die Vereinigten Staaten müssen sich wiedervereinigen und neu aufbauen. Die Zukunft des Landes steht auf dem Spiel, während die letzten Kapitel dieser turbulenten Zeit geschrieben werden."
MD_TRUMP_USA_riding_with_biden:0 "Unterwegs mit Biden"
MD_TRUMP_USA_riding_with_biden_desc:0 "Die Anhänger von Präsident Biden unterstützen seine Führung und plädieren für einen einheitlichen Ansatz zur Beendigung des Bürgerkriegs und zur Wiederherstellung des Friedens im Land."

MD_TRUMP_USA_biden_in_charge:0 "Biden an der Spitze"
MD_TRUMP_USA_biden_in_charge_desc:0 "Präsident Biden übernimmt die Führung und legt Wert auf Diplomatie und Zusammenarbeit, um den Bürgerkrieg zu beenden und das Land wieder zu vereinen."

MD_TRUMP_USA_let_military_do_its_job:0 "Lassen Sie das Militär seine Arbeit machen"
MD_TRUMP_USA_let_military_do_its_job_desc:0 "Präsident Biden überträgt dem Militär größere Befugnisse zur Beendigung des Bürgerkriegs, da er an dessen Fähigkeit glaubt, Ordnung und Stabilität wiederherzustellen."

MD_TRUMP_USA_communist_plot:0 "Kommunistische Verschwörung"
MD_TRUMP_USA_communist_plot_desc:0 "Kommunistische Sympathisanten planen, den Bürgerkrieg auszunutzen, um ihre Ziele voranzutreiben und die Kontrolle über die Regierung zu gewinnen."

MD_TRUMP_USA_crush_the_traitors:0 "Vernichte die Verräter"
MD_TRUMP_USA_crush_the_traitors_desc:0 "Anhänger der kommunistischen Sache fordern ein rücksichtsloses Vorgehen gegen Andersdenkende, da sie davon überzeugt sind, dass die Revolution nur durch die Beseitigung von Verrätern erfolgreich sein kann."

MD_TRUMP_USA_new_communist_leader:0 "Neuer kommunistischer Führer"
MD_TRUMP_USA_new_communist_leader_desc:0 "Ein neuer, charismatischer kommunistischer Führer tritt an die Spitze, schart Anhänger für seine Sache und stellt die Autorität der Regierung in Frage."
MD_TRUMP_USA_the_second_civil_war_biden:0 "Der zweite Bürgerkrieg – Bidens Amerika"
MD_TRUMP_USA_the_second_civil_war_biden_desc:0 "Präsident Biden steht vor der gewaltigen Herausforderung, Amerika durch einen zweiten Bürgerkrieg zu führen. Seine Entscheidungen werden die Zukunft der Nation prägen und darüber entscheiden, ob Einheit oder Spaltung siegen."

MD_TRUMP_USA_finish_the_civil_war_biden:0 "Den Bürgerkrieg beenden – Bidens Vision"
MD_TRUMP_USA_finish_the_civil_war_biden_desc:0 "Angesichts der Erschöpfung des Landes durch jahrelange Konflikte wird Präsident Bidens Vision für Amerika auf die Probe gestellt. Ob durch Diplomatie oder entschlossenes Handeln – er will den Bürgerkrieg beenden und eine geeinte Nation aufbauen, die sich an den Prinzipien der Einheit, Demokratie und des Fortschritts orientiert."

MD_TRUMP_USA_rebuilding_our_country:0 "Wiederaufbau unseres Landes"
MD_TRUMP_USA_rebuilding_our_country_desc:0 "Nach dem Ende des Bürgerkriegs stehen die Vereinigten Staaten vor der monumentalen Aufgabe des Wiederaufbaus. Präsident Trump muss die Nation in einer umfassenden Anstrengung anführen, die Infrastruktur zu reparieren, die Wirtschaft wiederzubeleben und die Wunden der Spaltung zu heilen. Die Zukunft Amerikas hängt von dieser entscheidenden Phase des Wiederaufbaus ab."
MD_TRUMP_USA_trumps_fallen_empire:0 "Trumps gefallenes Imperium"
MD_TRUMP_USA_trumps_fallen_empire_desc:0 "Nach dem Tod von Präsident Trump übernimmt Vizepräsident Mike Pence (oder Ronald DeSantis), der den Bürgerkrieg siegreich beendete, die Führung. Die Nation trauert um ihren ehemaligen Präsidenten, während Pence die Führung übernimmt und das Land durch die Nachwirkungen führt. "
MD_TRUMP_USA_the_coronation_of_trump:0 "Die Krönung von Donald I."
MD_TRUMP_USA_the_coronation_of_trump_desc:0 "Präsident Trump überlebte das Attentat und wurde zu einer einigenden Figur, die die Nation durch den Bürgerkrieg und darüber hinaus führte. In einer symbolischen Geste wurde er zum neuen König gekrönt und läutete damit eine neue Ära der Einheit und Stärke in Amerika ein."
MD_TRUMP_USA_prepare_for_the_crusades:0 "Bereiten Sie sich auf die Kreuzzüge vor"
MD_TRUMP_USA_prepare_for_the_crusades_desc:0 "Nachdem er das Attentat überlebt und Amerika unter seiner Herrschaft wiedervereinigt hat, blickt König Trump über die Grenzen hinaus. Er bereitet sich auf einen Feldzug nach Mexiko vor, um die Grenzen zu sichern und die amerikanische Vorherrschaft zu behaupten."
MD_TRUMP_USA_crusade_into_mexico:0 "Kreuzzug nach Mexiko"
MD_TRUMP_USA_crusade_into_mexico_desc:0 "Nachdem Amerika unter seiner Herrschaft wiedervereinigt ist, nimmt sich König Trump die Sicherung der Südgrenze vor. Er ruft einen Feldzug gegen Mexiko aus, um die amerikanische Vorherrschaft zu behaupten und die Grenze ein für alle Mal zu sichern. Dieser mutige Schritt wird die geopolitische Landschaft Nordamerikas verändern."
MD_TRUMP_USA_restore_democracy:0 "Demokratie wiederherstellen"
MD_TRUMP_USA_restore_democracy_desc:0 "Während sich das Land von den Wirren des Bürgerkriegs erholt, ist Vizepräsident Pence (oder Ronald) entschlossen, die Demokratie wiederherzustellen und die Prinzipien der Verfassung zu wahren. Er leitet Reformen ein, um demokratische Institutionen zu stärken, freie und faire Wahlen zu gewährleisten und die Spaltungen zu überwinden, die das Land geplagt haben. Die Zukunft Amerikas hängt von dieser kritischen Phase des Wiederaufbaus und der Versöhnung ab."
MD_TRUMP_back_to_normalcy:0 "Zurück zur Normalität"
MD_TRUMP_back_to_normalcy_desc:0 "Vizepräsident Pence (oder Ronald) überwacht die Wiederherstellung der Oppositionsparteien und stellt sicher, dass Amerika zu seinen demokratischen Wurzeln zurückkehrt. Mit der Wiederherstellung einer gesunden politischen Opposition will Pence eine ausgewogene und integrative politische Landschaft schaffen und damit einen entscheidenden Schritt zur Heilung und Stabilität des Landes machen."
MD_TRUMP_USA_one_nation:0 "Eine Nation"
MD_TRUMP_USA_one_nation_desc:0 "Unter der Führung von Präsident Russell M. Nelson streben die Vereinigten Staaten danach, eine Nation zu werden, die in ihren Zielen und ihrer Vision für die Zukunft vereint ist. Präsident Nelsons Führung versucht, Gräben zu überbrücken und einen Weg zu nationaler Einheit und Stärke zu ebnen."
MD_TRUMP_USA_under_god:0 "Unter Gott"
MD_TRUMP_USA_under_god_desc:0 "Durch ein Wunder kehrt Jesus Christus in die Vereinigten Staaten zurück und übernimmt die Führung. Seine göttliche Herrschaft gilt als Erfüllung einer Prophezeiung, und die Nation erwartet von ihm Führung und Erlösung."
MD_TRUMP_USA_indivisible_kingdom:0 "Bilden Sie das unteilbare Königreich"
MD_TRUMP_USA_indivisible_kingdom_desc:0 "Unter der Herrschaft Jesu Christi werden die Vereinigten Staaten in das „unteilbare Königreich“ verwandelt. Seine Mission ist es, den amerikanischen Kontinent zu vereinen und dabei politische, kulturelle und geografische Grenzen zu überwinden, um ein harmonisches und wohlhabendes Land zu schaffen."
MD_TRUMP_USA_great_american_wall:0 "Die Große Amerikanische Mauer"
MD_TRUMP_USA_great_american_wall_desc:0 "Präsident Charles Cotton kündigt den Bau einer massiven Mauer entlang der Mason-Dixie-Linie an. Sie symbolisiert eine neue Ära der Grenzsicherung und Spaltung in Amerika. Die Mauer soll die Souveränität des Landes schützen und eine strenge Einwanderungspolitik durchsetzen."
MD_TRUMP_USA_confederate_america:0 "Ein neues konföderiertes Amerika"
MD_TRUMP_USA_confederate_america_desc:0 "Unter Präsident Charles Cottons Führung vollzieht Amerika eine radikale Wende hin zu einer neuen Vision des konföderierten Amerikas, die die Rechte der Bundesstaaten und traditionelle Werte betont. Die Nation steht vor einem entscheidenden Moment in ihrer Geschichte, da sie ihre Identität und ihren Platz in der Welt neu definiert."
MD_TRUMP_USA_rejoin_nato:0 "Wiedereintritt in die NATO"
MD_TRUMP_USA_rejoin_nato_desc:0 "Präsident Charles Cotton beschließt, der NATO wieder beizutreten und signalisiert damit eine Wende hin zu einer internationalistischeren Außenpolitik. Ziel ist es, Amerikas Bündnisse und globales Ansehen zu stärken und die Zusammenarbeit und Einheit mit seinen Verbündeten zu betonen."
usaca:0"Die Konföderierten Staaten von Amerika"
MD_TRUMP_USA_bidens_victory:0 "Bidens Sieg"
MD_TRUMP_USA_bidens_victory_desc:0 "Mit Joe Bidens Sieg blickt die Nation auf ein neues Kapitel. Seine Führung verspricht eine Rückkehr zu Stabilität und Einheit, doch es liegen Herausforderungen vor ihm, da er sich durch ein gespaltenes Amerika und globale Unsicherheiten navigieren muss."
MD_TRUMP_USA_reestablish_democracy:0 "Wiederherstellung der Demokratie"
MD_TRUMP_USA_reestablish_democracy_desc:0 "Präsident Biden legt größten Wert auf die Wiederherstellung der Demokratie. Er konzentriert sich dabei auf die Stärkung demokratischer Institutionen, den Schutz der bürgerlichen Freiheiten und die Förderung eines Geistes der überparteilichen Zusammenarbeit. Seine Regierung will Spaltungen überwinden und das Vertrauen in die demokratischen Werte Amerikas wiederherstellen."
MD_TRUMP_USA_start_of_first_term:0 "Beginn des ersten Semesters"
MD_TRUMP_USA_start_of_first_term_desc:0 "Zu Beginn seiner ersten Amtszeit erwartet die Nation von Joe Biden Führungsstärke und Stabilität. Seine Regierung steht vor zahlreichen Herausforderungen, vom Wiederaufbau der Wirtschaft bis hin zur Bewältigung sozialer und ökologischer Probleme, während sie auf eine bessere Zukunft für Amerika hinarbeitet."
MD_TRUMP_USA_melt_the_titan_bases_in_antartica:0 "Schmelzen Sie die Titanbasen in der Antarktis"
MD_TRUMP_USA_melt_the_titan_bases_in_antartica_desc:0 "Präsident Biden startet eine mutige Mission zur Zerstörung der Titan-Basen in der Antarktis und markiert damit den Beginn des Seeimperiums. Ziel ist es, den amerikanischen Einfluss und die Kontrolle über die Meere auszuweiten und eine neue Ära maritimer Dominanz einzuläuten."
MD_TRUMP_USA_form_the_sea_empire:0 "Bilden Sie das Seeimperium"
MD_TRUMP_USA_form_the_sea_empire_desc:0 "Präsident Biden verkündet die Gründung des „Sea Empire“ und sieht Amerika als dominante Seemacht. Dieser ehrgeizige Plan zielt darauf ab, amerikanische Interessen und Ressourcen in den Meeren zu sichern und die geopolitische Landschaft neu zu gestalten."
MD_TRUMP_USA_military_in_charge:0 "Militär an der Spitze"
MD_TRUMP_USA_military_in_charge_desc:0 "Nachdem dem Militär die Macht übertragen wurde, den Bürgerkrieg zu gewinnen, übernimmt es die Kontrolle und begründet dies mit der Notwendigkeit von Stabilität und Ordnung. Präsident Bidens Entscheidung hat unbeabsichtigte Folgen, da das Militär seine Autorität über die Regierung geltend macht."
MD_TRUMP_USA_bring_back_american_excepatnalism:0 "Bringen Sie den amerikanischen Exzeptionalismus zurück"
MD_TRUMP_USA_bring_back_american_excepatnalism_desc:0 "Unter der Militärherrschaft begibt sich die Nation auf die Mission, den amerikanischen Exzeptionalismus wiederherzustellen. Die Militärregierung will Amerikas Macht und Ansehen auf der Weltbühne wiederherstellen. Doch zu welchem Preis für Demokratie und Freiheit?"
MD_TRUMP_USA_secure_the_elections:0 "Die Wahlen „sichern“"
MD_TRUMP_USA_secure_the_elections_desc:0 "Die Militärregierung ergreift drastische Maßnahmen, um die Wahlen zu „sichern“ und ihre Kontrolle zu sichern. Dieser Schritt wirft Fragen über die Legitimität der Regierung und die Zukunft der Demokratie in Amerika auf."
MD_TRUMP_USA_liberals_were_wrong:0 "Die Liberalen lagen falsch"
MD_TRUMP_USA_liberals_were_wrong_desc:0 "Howie Hawkins&#39; anarchistischer Putsch erklärt, dass die Liberalen sich in ihrer Staatsanschauung geirrt haben. Das neue Regime will traditionelle Regierungsstrukturen abschaffen und eine staatenlose Gesellschaft errichten, da es glaubt, dies sei der Weg zu wahrer Freiheit und Gleichheit."
MD_TRUMP_USA_abolish_the_state:0 "Den Staat abschaffen"
MD_TRUMP_USA_abolish_the_state_desc:0 "Das anarchistische Regime unter Howie Hawkins strebt die Abschaffung des Staates an, da es ihn als Instrument der Unterdrückung und Kontrolle betrachtet. Sein Ziel ist die Errichtung einer dezentralisierten Gesellschaft, die auf freiwilliger Zusammenarbeit und gegenseitiger Hilfe basiert."
MD_TRUMP_USA_abolish_economics:0 "Ökonomie abschaffen"
MD_TRUMP_USA_abolish_economics_desc:0 "Das anarchistische Regime unter Howie Hawkins strebt die Abschaffung der Wirtschaft im herkömmlichen Sinne an und strebt die Schaffung einer Gesellschaft an, die auf gemeinschaftlichem Eigentum und Ressourcenteilung statt auf Marktkräften basiert."
MD_TRUMP_USA_crush_imperalism:0 "Zerschlagung des Imperialismus"
MD_TRUMP_USA_crush_imperalism_desc:0 "Unter Lawrence O&#39;Donnells Führung begibt sich Amerika auf die Mission, den Imperialismus zu zerschlagen und ausländische Interventionen zu beenden. Die Regierung versucht, inländische Bedürfnisse über globale Ambitionen zu stellen und stellt damit die traditionellen Vorstellungen amerikanischer Außenpolitik in Frage."
MD_TRUMP_USA_begin_reprerations:0 "Beginnen Sie mit den Wiedergutmachungen"
MD_TRUMP_USA_begin_reprerations_desc:0 "Die O&#39;Donnell-Regierung leitet Wiedergutmachungsmaßnahmen ein, um historisches Unrecht, insbesondere gegenüber marginalisierten Bevölkerungsgruppen, zu kompensieren. Ziel ist es, die amerikanische Vergangenheit aufzuarbeiten und auf eine gerechtere Zukunft hinzuarbeiten."
MD_TRUMP_USA_abolish_capitalism:0 "Abschaffung des Kapitalismus"
MD_TRUMP_USA_abolish_capitalism_desc:0 "In einem mutigen Schritt strebt die Regierung von Lawrence O&#39;Donnell die Abschaffung des Kapitalismus an und tritt für ein gerechteres Wirtschaftssystem auf der Grundlage sozialistischer Prinzipien ein. Dies markiert einen bedeutenden Wandel in der amerikanischen Wirtschaftslandschaft."
MD_TRUMP_USA_soros_in_charge:0 "Soros an der Spitze"
MD_TRUMP_USA_soros_in_charge_desc:0 "Nach der Vereitelung des kommunistischen Putsches übernimmt George Soros die diktatorische Macht und begründet dies mit der Notwendigkeit von Stabilität und Reformen. Sein Führungsstil betont die Zentralisierung der Macht und die Kontrolle über wichtige Institutionen."
MD_TRUMP_USA_obedience:0 "Gehorsam"
MD_TRUMP_USA_obedience_desc:0 "Unter Soros‘ Herrschaft steht der Gehorsam gegenüber dem Staat an erster Stelle. Andersdenkende werden nicht geduldet, da das Regime die Bevölkerung streng kontrolliert und Propaganda und Angst einsetzt, um die Ordnung aufrechtzuerhalten."
MD_TRUMP_USA_soros_state:0 "Soros-Staat"
MD_TRUMP_USA_soros_state_desc:0 "Das Soros-Regime verwandelt die Nation in einen „Soros-Staat“, in dem die Ideologie und Vision des Diktators jeden Aspekt der Gesellschaft dominieren. Der Staat wird zum Synonym für Soros‘ persönliche Agenda und Überzeugungen."
MD_TRUMP_USA_america_is_back:0 "Amerika ist zurück"
MD_TRUMP_USA_america_is_back_desc:0 "Unabhängig vom eingeschlagenen Weg geht die Nation aus Unruhe und Unsicherheit hervor. Ob durch Einheit, Reformen, Eroberungen oder Revolutionen – Amerika bleibt standhaft. Als sich der Staub gelegt hat, beginnt ein neues Kapitel, und die Welt beobachtet, wie Amerika sich entschlossen und vereint erneut behauptet."
MD_TRUMP_USA_the_new_king:0 "Der neue König"
MD_TRUMP_USA_the_new_king_desc:0 "Nach dem Sieg des Bürgerkriegs und der Wiedervereinigung der Nation unter seiner Führung nimmt Donald Trump den Titel eines Königs an und läutet damit eine neue Ära für Amerika ein. Die Nation beobachtet, wie ihre demokratischen Traditionen einer Monarchie weichen, mit Trump an der Spitze. Die Zukunft des Königreichs steht auf dem Spiel."
MDUSSA:0"Vereinigter Soros-Staat"
usanse:0"Nordseereich"
bel_international_matters:0 "Internationale Diplomatie"
bel_international_matters_desc:0 "Inmitten der Komplexität des Nachkriegseuropas unternimmt Belgien diplomatische Anstrengungen, um seine Position zu sichern und Allianzen zu schmieden. Mit der Gründung der NATO und den wachsenden Spannungen des Kalten Krieges bewegt sich Belgien in seiner Außenpolitik in einem empfindlichen Gleichgewicht, um seine Sicherheit und seinen Wohlstand zu gewährleisten."
bel_guns_fall_silent:0 "Die Waffen verstummen"
bel_guns_fall_silent_desc:0 "Nach den Wirren des Zweiten Weltkriegs erlebt Belgien eine Zeit relativen Friedens und relativer Stabilität. Die Waffen schweigen, das Land konzentriert sich auf Wiederaufbau und Erholung. Es werden Anstrengungen unternommen, um die Wunden des Krieges zu heilen und allen Belgiern einen Weg in eine bessere Zukunft zu ebnen."
bel_treaty_of_b:0 "Vertrag von Brüssel"
bel_treaty_of_b_desc:0 "Belgien denkt über die Zukunft des Brüsseler Vertrags nach, eines wichtigen Nachkriegsbündnisses. Sollte Belgien kommunistische Nationen in das Bündnis einladen und damit möglicherweise dessen Charakter und Dynamik verändern?"
bel_treaty_invite_communist_nations:0 "Nichtdemokratische Nationen einladen"
bel_treaty_invite_communist_nations_desc:0 "Belgien unternimmt einen mutigen Schritt, indem es nichtdemokratische Nationen in die Europäische Union einlädt und damit seine Bereitschaft signalisiert, sich im Streben nach Frieden und Zusammenarbeit mit unterschiedlichen Ideologien auseinanderzusetzen."
bel_treaty_only_democratic_nations:0 "Akzeptieren Sie nur demokratische Nationen"
bel_treaty_only_democratic_nations_desc:0 "Belgien hält sich strikt an demokratische Prinzipien und nimmt nur demokratische Nationen in die Europäische Union auf. Gemeinsame Werte und Stabilität stehen dabei im Vordergrund."
bel_treaty_finished:0 "Vertragsverhandlungen abgeschlossen"
bel_treaty_finished_desc:0 "Mit dem Abschluss der Vertragsverhandlungen bleibt Belgien weiterhin der Anführer der EU"
bel_decolonization:0 "Dekolonisierung"
bel_decolonization_desc:0 "Belgien beschließt, den Dekolonisierungsprozess zu beschleunigen und sich rasch aus seinen Kolonien zurückzuziehen. Dieser Ansatz könnte zu Instabilität und Herausforderungen für die neuen unabhängigen Nationen führen."
bel_guided_decolonization:0 "Geführte Dekolonisierung"
bel_guided_decolonization_desc:0 "Belgien verfolgt einen gelenkten Ansatz zur Entkolonialisierung und bietet seinen Kolonien Unterstützung und Beratung beim Übergang in die Unabhängigkeit. Dieser Ansatz soll einen reibungsloseren und stabileren Übergang gewährleisten."
bel_congo_guidance:0 "Orientierung im Kongo"
bel_congo_guidance_desc:0 "Belgien bietet dem Kongo, seiner größten afrikanischen Kolonie, auf dem Weg zur Unabhängigkeit Unterstützung an. Diese Unterstützung umfasst auch Hilfe beim Aufbau von Institutionen und bei der Bewältigung des Übergangs."
bel_last_flight_out:0 "Letzter Abflug"
bel_last_flight_out_desc:0 "Belgien verlässt seine Kolonien in einem überstürzten Rückzug und markiert damit das Ende seiner Kolonialpräsenz. Dieser abrupte Austritt könnte für die neuen unabhängigen Nationen Herausforderungen und Unsicherheiten mit sich bringen."
bel_rushed_decolonization:0 "Überstürzte Dekolonisierung"
bel_rushed_decolonization_desc:0 "Belgien führt eine überstürzte Dekolonisierung durch und zieht sich rasch aus seinen Kolonien zurück. Dieses Vorgehen kann zu Instabilität und Herausforderungen für die neuen unabhängigen Nationen führen."
bel_congo_economic_aid:0 "Wirtschaftshilfe für den Kongo"
bel_congo_economic_aid_desc:0 "Belgien leistet dem Kongo, seiner größten afrikanischen Kolonie, Wirtschaftshilfe, um dessen Entwicklung und Stabilität auf dem Weg in die Unabhängigkeit zu unterstützen."
bel_congo_send_advisors:0 "Senden Sie Berater in den Kongo"
bel_congo_send_advisors_desc:0 "Belgien entsendet Berater in den Kongo, um den Übergang in die Unabhängigkeit mit Fachwissen und Unterstützung zu begleiten und so einen reibungsloseren und stabileren Prozess zu gewährleisten."
bel_congo_guideance:0 "Orientierung im Kongo"
bel_congo_guideance_desc:0 "Belgien bietet dem Kongo, seiner größten afrikanischen Kolonie, auf dem Weg zur Unabhängigkeit Unterstützung an. Diese Unterstützung umfasst auch Hilfe beim Aufbau von Institutionen und bei der Bewältigung des Übergangs."
bel_invite_eng:0 "England einladen"
bel_invite_eng_desc:0 "Belgien lädt England ein, der Europäischen Union beizutreten, mit dem Ziel, die Zusammenarbeit und Einheit zwischen den europäischen Nationen zu fördern."
bel_invite_SPA:0 "Spanien einladen"
bel_invite_SPA_desc:0 "Belgien lädt Spanien ein, der Europäischen Union beizutreten, um die Beziehungen zu stärken und die Stabilität in Europa zu fördern."
bel_invite_ita:0 "Italien einladen"
bel_invite_ita_desc:0 "Belgien lädt Italien ein, der Europäischen Union beizutreten, mit dem Ziel, die Zusammenarbeit und Solidarität in ganz Europa zu stärken."
bel_invite_fra:0 "Frankreich einladen"
bel_invite_fra_desc:0 "Belgien lädt Frankreich ein, der Europäischen Union beizutreten, um die Integration und Zusammenarbeit innerhalb Europas zu vertiefen."
bel_invite_gre:0 "Griechenland einladen"
bel_invite_gre_desc:0 "Belgien lädt Griechenland ein, der Europäischen Union beizutreten, mit dem Ziel, die Einheit und den Wohlstand der europäischen Nationen zu fördern."
bel_invite_benelux:0 "Benelux-Staaten einladen"
bel_invite_benelux_desc:0 "Belgien lädt die Benelux-Staaten (Niederlande, Belgien, Luxemburg) ein, der Europäischen Union beizutreten und so die regionale Zusammenarbeit und Integration zu stärken."
bel_invite_pol:0 "Polen einladen"
bel_invite_pol_desc:0 "Belgien lädt Polen ein, der Europäischen Union beizutreten, um Demokratie und Stabilität in Europa zu fördern."
bel_invite_estger:0 "Ostdeutschland einladen"
bel_invite_estger_desc:0 "Belgien lädt Ostdeutschland ein, der Europäischen Union beizutreten, mit dem Ziel, dessen Integration in ein vereintes Deutschland und Europa zu unterstützen."
bel_invite_SWE:0 "Schweden einladen"
bel_invite_SWE_desc:0 "Belgien lädt Schweden ein, der Europäischen Union beizutreten, um die Zusammenarbeit und Solidarität zwischen den europäischen Nationen zu stärken."
bel_invite_ballkins:0 "Laden Sie Balkanstaaten ein"
bel_invite_ballkins_desc:0 "Belgien lädt die Balkanstaaten ein, der Europäischen Union beizutreten, mit dem Ziel, Stabilität, Demokratie und Wohlstand in der Region zu fördern."
invite_ger_eu:0 "Deutschland in die EU einladen"
invite_den_eu:0 "Dänemark in die EU einladen"
invite_bul_eu:0 "Bulgarien in die EU einladen"
buddhist_socialism:0 "Buddhistischer Sozialist"
rebel_against_sov:0 "Rebell gegen die Sowjetunion"
bel_invite_fin:0 "Finnland einladen"
bel_invite_fin_desc:0 "Belgien lädt Finnland ein, der Europäischen Union beizutreten, mit dem Ziel, die Beziehungen zu stärken und die Zusammenarbeit in Europa zu fördern."
bel_invite_tur:0 "Laden Sie die Türkei ein"
bel_invite_tur_desc:0 "Belgien lädt die Türkei ein, der Europäischen Union beizutreten, und möchte damit den Dialog, die Zusammenarbeit und die Stabilität zwischen Europa und der Türkei fördern."
bel_congo_install_democracy:0 "Demokratie im Kongo einführen"
bel_congo_install_democracy_desc:0 "Belgien arbeitet an der Einsetzung einer demokratischen Regierung im Kongo, um in dem neuen unabhängigen Land Stabilität und eine demokratische Regierungsführung zu gewährleisten."
bel_congo_invest_in_congo:0 "Investieren Sie im Kongo"
bel_congo_invest_in_congo_desc:0 "Belgien beschließt, in seiner ehemaligen Kolonie Kongo zu investieren, um deren Entwicklung und Wirtschaftswachstum im Übergang zur Unabhängigkeit zu unterstützen."
bel_congo_train_their_military:0 "Bilden Sie ihr Militär aus"
bel_congo_train_their_military_desc:0 "Belgien beschließt, die Streitkräfte des Kongo auszubilden, um zum Aufbau einer leistungsfähigen und professionellen Streitmacht für die neu unabhängige Nation beizutragen."
bel_congo_leave_congo:0 "Rückzug aus dem Kongo"
bel_congo_leave_congo_desc:0 "Belgien beschließt, seine verbleibenden Truppen und sein Personal aus dem Kongo abzuziehen. Damit beendet es seine koloniale Präsenz und führt den Übergang des Landes zur vollständigen Unabhängigkeit ein."
bel_congo_full_representation:0 "Volle Vertretung für den Kongo"
bel_congo_full_representation_desc:0 "Belgien gewährleistet die umfassende Vertretung des Kongo, sorgt dafür, dass seine Stimme in internationalen Foren gehört wird, und fördert seine Souveränität."
bel_congo_economic_boom:0 "Wirtschaftsboom im Kongo"
bel_congo_economic_boom_desc:0 "Belgien unterstützt Maßnahmen zur Förderung eines Wirtschaftsbooms im Kongo mit dem Ziel, die Wirtschaft anzukurbeln und eine erfolgreiche Zukunft zu sichern."
bel_congo_fully_prepared:0 "Bestens vorbereitet für die Unabhängigkeit"
bel_congo_fully_prepared_desc:0 "Belgien stellt sicher, dass der Kongo umfassend auf die Unabhängigkeit vorbereitet ist, und stellt die notwendige Unterstützung und Ressourcen für einen reibungslosen Übergang bereit."
bel_invite_non_aligned:0 "Blockfreie Staaten einladen"
bel_invite_non_aligned_desc:0 "Belgien lädt blockfreie Staaten ein, der Europäischen Union beizutreten und fördert so die Zusammenarbeit und Einheit in ganz Europa."
bel_invite_SWI:0 "Schweiz einladen"
bel_invite_SWI_desc:0 "Belgien lädt die Schweiz ein, der Europäischen Union beizutreten, um die Zusammenarbeit und Solidarität zwischen den europäischen Nationen zu stärken."
bel_invite_YUG:0 "Jugoslawien einladen"
bel_invite_YUG_desc:0 "Belgien lädt Jugoslawien ein, der Europäischen Union beizutreten, mit dem Ziel, Stabilität, Demokratie und Wohlstand in der Region zu fördern."
bel_invite_AUS:0 "Österreich einladen"
bel_invite_AUS_desc:0 "Belgien lädt Österreich ein, der Europäischen Union beizutreten, um die Beziehungen zu stärken und die Zusammenarbeit in Europa zu fördern."
PRC_strike_the_kmt:0 "Streik gegen die KMT"
PRC_strike_the_kmt_desc:0 "Jetzt ist es an der Zeit, den Bürgerkrieg wieder aufleben zu lassen – jetzt oder nie!"
PRC_every_man_must_fight:0 "Jeder Mann muss kämpfen"
PRC_every_man_must_fight_desc:0 "Wir werden Bauern und Landarbeiter rekrutieren, die im Krieg mit uns kämpfen. Wir müssen gewinnen!"
PRC_maoistheonlyway:0 "Mao ist der einzige Weg!"
PRC_maoistheonlyway_desc:0 "Mao ist die einzige Zukunft für China! Wir werden gewinnen!"
PRC_secure_the_coast:0 "Sichern Sie die Küste"
PRC_secure_the_coast_desc:0 "Wir haben die Hauptstadt und die großen Städte erobert, jetzt werden wir sie vertreiben!"
PRC_mainland_secured:0 "Festland gesichert"
PRC_mainland_secured_desc:0 "Wir haben die Republik China vom Festland vertrieben, wir haben den Krieg gewonnen!"
PRC_no_progress:0 "Kein Fortschritt"
PRC_no_progress_desc:0 "Wir werden zurückgedrängt! Wir dürfen nicht verlieren!"
PRC_invade_taiwan:0 "Invasion Taiwans"
PRC_invade_taiwan_desc:0 "Wir werden uns auf die Invasion Taiwans vorbereiten, um einen totalen kommunistischen Sieg zu sichern."
PRC_ingore_the_island:0 "Ignoriere die Insel"
PRC_ingore_the_island_desc:0 "Die Insel Taiwan ist unsere Zeit nicht wert, wir werden sie verrotten lassen!"
PRC_beg_stalin:0 "Beg Stalin"
PRC_beg_stalin_desc:0 "Wir müssen Stalin anflehen, uns zu beschützen! Wir werden diesen Krieg nicht gewinnen!"
PRC_stalinspuppet:0 "Stalins Marionette"
PRC_stalinspuppet_desc:0 "Wir sind zu einer bloßen Marionette der Sowjetunion degradiert worden!"
PRC_all_alone:0 "Ganz allein"
PRC_all_alone_desc:0 "Wir wurden der Mandschurei überlassen – jetzt sind wir ganz allein"
wtt_warlord_vs_prc.1.t:0 "[warlord.GetLeader] sucht Unterstützung"
wtt_warlord_vs_prc.1.desc:0 "Ein Vertreter von [warlord.GetLeader] ist nach Moskau gekommen, um sich zum Machtkampf innerhalb der Partei zu äußern. Er weist darauf hin, dass [PRC.GetLeader] keine großen kommunistischen Ambitionen habe und in Wirklichkeit ernsthafte rückständige Ansichten hege, die die Revolution in dieser entscheidenden Zeit wahrscheinlich verraten würden.\n\n[warlord.GetLeader] bittet um unsere Unterstützung und verspricht, den kommunistischen Idealen und [SOV.GetLeader] ewige Treue zu schwören."
wtt_warlord_vs_prc.1.a:0 "Eine treue Marionette könnte nützlich sein."
wtt_warlord_vs_prc.1.a_tooltip:0 "Dies führt bei Ablehnung zum Krieg mit §H[PRC.GetNameDef]§!.\n"
wtt_warlord_vs_prc.1.b:0 "Wir brauchen diese Opportunisten nicht."
wtt_warlord_vs_prc.2.t:0 "Nachricht von [soviet.GetLeader]"
wtt_warlord_vs_prc.2.desc:0 "Ein Regierungsvertreter von [SOV.GetAdjective] teilte uns mit, dass [SOV.GetLeader] [PRC.GetLeader] verdächtigt, die marxistische Theorie falsch zu verstehen. In dieser Phase des Klassenkampfes in China dürfe sich unser Verständnis des Marxismus-Leninismus nicht von dem der Sowjetunion unterscheiden. Moskau glaubt offenbar, dass [warlord.GetLeader] ein tieferes Verständnis für den Aufbau des Kommunismus in China habe. Moskaus Annahme von [warlord.GetLeader] als neuem Parteivorsitzenden würde die Partei auf den richtigen Weg führen; andernfalls würde es sich [SOV.GetLeader]s Unmut zuziehen."
wtt_warlord_vs_prc.2.a:0 "Senden Sie [PRC.GetLeader] zu Verhandlungen nach Moskau."
wtt_warlord_vs_prc.2.b:0 "Wir werden Verrätern nicht nachgeben!"
wtt_warlord_vs_prc.3.t:0 "[SOV.GetLeader] lehnt ab"
wtt_warlord_vs_prc.3.desc:0 "[SOV.GetLeader] akzeptiert unsere Treue nicht. Die [SOV.GetAdjective]-Regierung unterstützt [PRC.GetLeader] weiterhin als Vorsitzenden der Kommunistischen Partei Chinas."
wtt_warlord_vs_prc.3.a:0 "So sei es."
wtt_warlord_vs_prc.4.t:0 "[PRC.GetNameDefCap] kapituliert"
wtt_warlord_vs_prc.4.desc:0 "Offenbar gelang es [PRC.GetLeader] nicht, [SOV.GetLeader] zu einer Änderung der Resolution zu bewegen. Angesichts der Niederlage im Kampf gibt [PRC.GetLeader] öffentlich seine theoretischen Fehler zu und erklärt, mit uns zusammenzuarbeiten, bis die Revolution siegreich ist."
wtt_warlord_vs_prc.4.a:0 "Gut."
wtt_warlord_vs_prc.10.t:0 "Mach mit oder stirb"
wtt_warlord_vs_prc.10.desc:0 "[PRC.GetLeader] verzichtete auf die Macht und wurde von der Sowjetunion eingeschüchtert. Er entschied sich für Letzteres. Leider drohte [SOV.GetLeader] nicht nur, sondern ergriff tatsächlich feindselige Maßnahmen. Angesichts unserer prekären Lage und des anhaltenden Drucks von beiden Seiten schlägt die Sowjetunion vor, diesen Verräter auszuweisen.\n\nEine Ablehnung wird als Parteinahme für [PRC.GetLeader] gewertet."
wtt_warlord_vs_prc.10.a:0 "Es lohnt sich nicht, für [PRC.GetLeader] zu sterben."
wtt_warlord_vs_prc.10.b:0 "Die Partei wird nicht nachgeben."
wtt_warlord_vs_prc.21.t:0 "[From.GetLeader] bittet um unsere Unterstützung"
wtt_warlord_vs_prc.21.desc:0 "[From.GetLeader] hat eine Nachricht gesendet, in der wir gemäß früheren Vereinbarungen um unsere finanzielle Unterstützung gebeten werden."
wtt_warlord_vs_prc.21.a:0 "Das ist der Preis."
wtt_warlord_vs_prc.21.b:0 "Das ist Raub!"
wtt_warlord_vs_prc.22.t:0 "[From.GetNameDefCap] akzeptiert"
wtt_warlord_vs_prc.22.desc:0 "Trotz der anhaltenden Proteste von [From.GetLeader] hält er sich an die Vereinbarung und stellt uns die angeforderten Mittel zur Verfügung."
wtt_warlord_vs_prc.22.a:0 "Sie sollten von uns erwarten, dass wir nicht weiterhin Forderungen stellen."
wtt_warlord_vs_prc.23.t:0 "[From.GetNameDefCap] lehnt ab"
wtt_warlord_vs_prc.23.desc:0 "[From.GetLeader] lehnt unsere zusätzlichen Forderungen mit der Begründung ab, dass sein Land die geforderten „absurden“ Beträge nicht liefern werde."
wtt_warlord_vs_prc.23.a:0 "Er hat ein Versprechen gegeben und wir werden erhalten, was uns versprochen wurde!"
wtt_warlord_vs_prc.23.b:0 "Lass es dieses Mal vorbeigehen."
wtt_warlord_vs_prc.31.t:0 "[From.GetLeader] sucht weitere Zusammenarbeit"
wtt_warlord_vs_prc.31.desc:0 "[From.GetLeader] sendet eine Nachricht, in der er erklärt, dass die Revolution leicht von Konterrevolutionären unterwandert werden kann. Seine Vertreter werden unser Land weiterhin beobachten, um uns zum Sieg im Klassenkampf zu führen.\n\nJede Abweichung von seinem „Rat“ wird als Zeichen dafür gewertet, dass reaktionäre Kräfte die Kontrolle über unsere Regierung gewinnen, und er wird auf dieser Grundlage die notwendigen Maßnahmen ergreifen."
wtt_warlord_vs_prc.31.a:0 "Dies wird eine gute Lernmöglichkeit für uns sein."
wtt_warlord_vs_prc.31.b:0 "Wir brauchen keine anderen, die uns vorschreiben, wie wir handeln sollen."
wtt_warlord_vs_prc.32.t:0 "[From.GetNameDefCap] akzeptiert"
wtt_warlord_vs_prc.32.desc:0 "[From.GetLeader] begrüßt unseren Sonderbeauftragten und lässt ihn als seinen persönlichen Berater fungieren. Wir können nun ihre internen und externen Angelegenheiten recht effektiv beeinflussen."
wtt_warlord_vs_prc.32.a:0 "Er sieht den Grund."
wtt_warlord_vs_prc.33.t:0 "[From.GetNameDefCap] lehnt ab"
wtt_warlord_vs_prc.33.desc:0 "[From.GetLeader] nimmt den Vorschlag zwar an, lehnt unsere Forderung nach direkterer Einflussnahme auf ihre Politik jedoch höflich, aber entschieden ab. Wir geben an, dass wir mit der tatsächlichen Situation „nicht vertraut“ seien und die praktische Anwendung marxistischer Theorien den lokalen Experten überlassen sollten."
wtt_warlord_vs_prc.33.a:0 "Vielleicht müssen wir unsere Position noch einmal deutlicher bekräftigen."
wtt_warlord_vs_prc.34.t:0 "[From.GetNameDefCap] weigert sich, Verantwortung zu übernehmen"
wtt_warlord_vs_prc.34.desc:0 "[From.GetLeader] ignoriert unsere immer energischeren Forderungen nach der versprochenen Auszahlung des Geldes. Er weigert sich sogar, darauf zu reagieren und lehnt unser Angebot ab, nach Moskau zu kommen und die Sache zu erklären."
wtt_warlord_vs_prc.34.a:0 "Er will uns also auf die Probe stellen?"
wtt_warlord_vs_prc.35.t:0 "[From.GetAdjective]s Allianz"
wtt_warlord_vs_prc.35.desc:0 "[From.GetNameDefCap] fordert die chinesischen Kommunisten auf, sich einer Einheitsfront – der Volksfront – anzuschließen, um gemeinsam die Kuomintang, Reaktionäre und ausländische Aggressoren unter demselben Banner zu besiegen."
wtt_warlord_vs_prc.35.a:0 "Jetzt sind die Menschen die Helden!"
wtt_warlord_vs_prc.35.b:0 "Dies widerspricht den Interessen von [Root.GetAdjective]."
wtt_warlord_vs_prc.36.t:0 "[From.GetLeader] lehnt die Allianz ab"
wtt_warlord_vs_prc.36.desc:0 "[From.GetNameDefCap] lehnt den eindeutig vorteilhaften Weg einer Vereinigung mit der Volksfront zur Bekämpfung der Kuomintang, Reaktionäre und ausländischer Aggressoren ab und erklärt stattdessen, dass ein Bündnis mit uns „die Interessen von [From.GetAdjective] verletzen“ würde."
wtt_warlord_vs_prc.36.a:0 "Wir werden alleine kämpfen müssen."
wtt_warlord_vs_prc.36.b:0 "Wir können die Einheitsfront einfach auflösen."
wtt_warlord_vs_prc.37.t:0 "[PRC.GetNameDefCap] bittet um sowjetische Unterstützung"
wtt_warlord_vs_prc.37.desc:0 "Angesichts der eskalierenden Feindseligkeiten im chinesischen Bürgerkrieg bittet [PRC.GetLeader] Moskau dringend um umfassende militärische und logistische Hilfe. Sie betonen die Brisanz des Konflikts und die Notwendigkeit sofortiger Unterstützung, um den Erfolg der Revolution zu sichern. [PRC.GetLeader] bekennt sich unerschütterlich zu marxistischen Prinzipien und sucht die Solidarität mit der Sowjetunion, um konterrevolutionäre Kräfte zu besiegen und einen sozialistischen Staat in China zu errichten."
wtt_warlord_vs_prc.37.a:0 "Wir werden [PRC.GetLeader] in seinem Kampf unterstützen."
wtt_warlord_vs_prc.37.b:0 "Wir werden nicht in den Bürgerkrieg in [PRC.GetAdjective] eingreifen."
wtt_warlord_vs_prc.38.t:0 "Die Sowjetunion greift in den chinesischen Bürgerkrieg ein"
wtt_warlord_vs_prc.38.desc:0 "Die Sowjetunion gibt offiziell ihre Entscheidung bekannt, in den chinesischen Bürgerkrieg einzugreifen und sich auf die Seite von [PRC.GetNameDefCap] zu stellen. Sowjetische Streitkräfte werden zusammen mit Militärberatern und umfangreichem Nachschub mobilisiert, um [PRC.GetLeader] im Kampf gegen ihre Gegner zu unterstützen. Es wird erwartet, dass dieser mutige Schritt den Verlauf des Konflikts und die regionale Dynamik maßgeblich beeinflussen wird, da die Sowjetunion ihr Engagement in der chinesischen Revolution verstärkt."
wtt_warlord_vs_prc.38.a:0 "Die Welt schaut ehrfürchtig zu."
PRC_save_korea:0 "Entscheidung zu Korea"
PRC_save_korea_desc:0 "Die Volksrepublik China erwägt ihre Strategie in Bezug auf Korea und wägt Optionen für die Zukunft der koreanischen Halbinsel ab."
PRC_declare_war:0 "Kriegserklärung"
PRC_declare_war_desc:0 "Die Volksrepublik China erklärt den gegnerischen Mächten im Koreakrieg den Krieg und verpflichtet sich zu einem umfassenden militärischen Engagement."
PRC_material_support:0 "Materielle Unterstützung für Korea"
PRC_material_support_desc:0 "Die Volksrepublik China beschließt, Korea materiell zu unterstützen und so seine Kriegsanstrengungen im Koreakrieg zu verstärken."
PRC_stalemate:0 "Die Rettung Nordkoreas scheitert"
PRC_stalemate_desc:0 "Trotz aller Bemühungen gelingt es der Volksrepublik China nicht, Nordkorea vor einer Niederlage zu bewahren, was zu einer Neubewertung ihrer Strategie im Koreakrieg führt."
PRC_Unite_the_Nation:0 "Vereinige die Nation"
PRC_Unite_the_Nation_desc:0 "Die Kampagne „Unite the Nation“ zielt darauf ab, die Kontrolle über alle von der Volksrepublik China beanspruchten Gebiete, einschließlich Ostturkestan und Tibet, zu festigen. Diese Initiative zielt darauf ab, die nationale Einheit und territoriale Integrität zu stärken."
PRC_Invasion_of_East_Turkestan:0 "Invasion Ostturkestans"
PRC_Invasion_of_East_Turkestan_desc:0 "Die Invasion Ostturkestans ist eine Militäroperation zur Durchsetzung der chinesischen Souveränität über die Region und zur Unterdrückung separatistischer Bewegungen. Ziel dieser Kampagne ist die Integration Ostturkestans in die Volksrepublik China."
PRC_Invasion_of_Tibet:0 "Invasion Tibets"
PRC_Invasion_of_Tibet_desc:0 "Die Invasion Tibets ist eine Militärkampagne mit dem Ziel, die chinesische Kontrolle über die Region zu festigen und sie in die Volksrepublik China einzugliedern. Ziel dieser Initiative ist es, Chinas strategische Position zu stärken und seine Westgrenzen zu sichern."
PRC_Indian_Claims:0 "Indianische Ansprüche"
PRC_Indian_Claims_desc:0 "Die Kampagne „Indian Claims“ befasst sich mit Territorialstreitigkeiten und Grenzkonflikten zwischen China und Indien. Ziel dieser Initiative ist es, chinesische Ansprüche geltend zu machen und die territoriale Integrität Chinas zu schützen."
PRC_Modern_Military:0 "Modernisierung des Militärs"
PRC_Modern_Military_desc:0 "Bei der Modernisierung des Militärs geht es darum, Chinas Streitkräfte mit modernen Waffen, Ausbildungsmethoden und Taktiken auszustatten. Ziel dieser Initiative ist es, das chinesische Militär in eine moderne, gut ausgerüstete Streitmacht umzuwandeln."
PRC_Modern_Navy:0 "Modernisierung der Marine"
PRC_Modern_Navy_desc:0 "Die Modernisierung der Marine konzentriert sich auf die Verbesserung der chinesischen Marinekapazitäten, einschließlich der Entwicklung einer Hochseeflotte. Ziel dieser Initiative ist es, Chinas maritime Interessen zu schützen und seine Fähigkeit zur Machtprojektion auf See zu stärken."
PRC_Modernized_Army:0 "Modernisierung der Armee"
PRC_Modernized_Army_desc:0 "Ziel der Modernisierung der Armee ist die Modernisierung der chinesischen Bodentruppen durch moderne Ausrüstung, Ausbildung und organisatorische Reformen. Ziel dieser Initiative ist es, Chinas Fähigkeit zur Verteidigung seines Territoriums und zur regionalen Machtdemonstration zu stärken."
PRC_Intervene_in_South_East_Asia:0 "Intervenieren Sie in Südostasien"
PRC_Intervene_in_South_East_Asia_desc:0 "Abweichend von historischen Ereignissen beschließt China, militärisch in Südostasien einzugreifen, um seinen Einfluss auszuweiten und strategische Interessen zu sichern. Diese Initiative beinhaltet militärische Interventionen in verschiedenen Ländern der Region, um die chinesische Dominanz zu behaupten."
PRC_Secure_Burma:0 "Sicheres Burma"
PRC_reclaim_treaty_ports:0 "Vertragshäfen zurückfordern"
PRC_reclaim_treaty_ports_desc:0 "Die von Ausländern kontrollierten Vertragshäfen sind seit langem ein Symbol der Demütigung. Es ist an der Zeit, sie zurückzufordern und unsere Souveränität wiederherzustellen."
PRC_ports_as_trade_hubs:0 "Häfen als Handelszentren ausbauen"
PRC_ports_as_trade_hubs_desc:0 "Wir werden unsere zurückgewonnenen Häfen in wichtige Handelszentren umwandeln, den internationalen Handel erleichtern und unseren wirtschaftlichen Einfluss stärken."
PRC_demand_hong_kong:0 "Nachfrage Hongkong"
PRC_demand_hong_kong_desc:0 "Hongkong bleibt unter britischer Kontrolle. Wir müssen seine Rückgabe fordern, um unsere vollständige Souveränität über chinesische Gebiete zu behaupten."
PRC_ports_reclaimed:0 "Zurückgewonnene Häfen"
PRC_ports_reclaimed_desc:0 "Mit der erfolgreichen Rückeroberung unserer Vertragshäfen steht China geeinter und stärker da als je zuvor. Dies markiert eine neue Ära der Souveränität und des Nationalstolzes."
PRC_economic_hub:0 "Wirtschaftszentrum"
PRC_economic_hub_desc:0 "Dank unserer Bemühungen, unsere Vertragshäfen zurückzugewinnen und auszubauen, hat sich China zu einem wichtigen Wirtschaftszentrum entwickelt. Die strategische Integration dieser Häfen in unsere Volkswirtschaft hat Handel, Gewerbe und Wirtschaftswachstum deutlich angekurbelt. Unsere Häfen dienen heute als wichtige Verkehrsadern für den internationalen Handel und stärken unseren wirtschaftlichen Einfluss und Wohlstand."
PRC_oceanic_trade_gateways:0 "Ozeanische Handelstore"
PRC_oceanic_trade_gateways_desc:0 "Unsere großen Häfen haben sich zu geschäftigen Handelszentren entwickelt, wodurch unsere Handelseffizienz und unser wirtschaftlicher Einfluss auf der Weltbühne deutlich gesteigert wurden."
PRC_eliminate_nationalist_forces:0 "Eliminieren Sie nationalistische Kräfte"
PRC_eliminate_nationalist_forces_desc:0 "Wir müssen die vollständige Ausrottung der verbleibenden nationalistischen Kräfte in China sicherstellen, um unsere Kontrolle zu sichern und den Weg für eine vereinte und stabile Nation zu ebnen."
PRC_eliminate_nationalist_forces:0 "Eliminieren Sie nationalistische Kräfte"
PRC_eliminate_nationalist_forces_desc:0 "Wir müssen die vollständige Ausrottung der verbleibenden nationalistischen Kräfte in China sicherstellen, um unsere Kontrolle zu sichern und den Weg für eine vereinte und stabile Nation zu ebnen."
PRC_integrate_army:0 "Integrieren Sie die Armee"
PRC_integrate_army_desc:0 "Um unsere militärischen Fähigkeiten zu stärken, werden wir verschiedene bewaffnete Gruppierungen zu einer einheitlichen, geschlossenen Streitmacht zusammenführen. Dies wird unsere operative Effizienz und die nationale Sicherheit verbessern."
PRC_unified_military_command:0 "Einheitliches Militärkommando"
PRC_unified_military_command_desc:0 "Durch die erfolgreiche Integration unserer Streitkräfte verfügen wir nun über eine einheitliche militärische Kommandostruktur, die unsere operative Effizienz und unsere Verteidigungsfähigkeiten deutlich steigert."
PRC_offensive_strategy:0 "Angriffsstrategie"
PRC_offensive_strategy_desc:0 "Da wir uns nun darauf konzentrieren, die Initiative zu ergreifen, sind unsere Streitkräfte besser darauf vorbereitet, Angriffsoperationen zu starten und aufrechtzuerhalten, was uns in jedem Konflikt einen entscheidenden Vorteil verschafft."
PRC_proper_frontline_command:0 "Etabliertes Frontkommando"
PRC_proper_frontline_command_desc:0 "Um unsere militärische Leistungsfähigkeit zu gewährleisten, müssen wir eine robuste und effiziente Kommandostruktur an der Front aufbauen. Dies wird unsere Fähigkeit verbessern, Operationen präzise zu koordinieren und durchzuführen."
chinese_offensive:0 "Chinesische Offensive"
chinese_offensive_desc:0 "Das chinesische Militär hat sich eine Doktrin offensiver Operationen zu eigen gemacht, die darauf abzielt, die Initiative zu ergreifen und unerbittlichen Druck auf den Feind auszuüben. Diese Denkweise hat unsere Kampfkraft und strategische Flexibilität deutlich erhöht."

PRC_integrate_ports_economy:0 "Häfen in die Wirtschaft integrieren"
PRC_integrate_ports_economy_desc:0 "Nachdem wir unsere Häfen zurückerobert haben, müssen wir sie nun vollständig in unsere Volkswirtschaft integrieren und sicherstellen, dass sie zu unserem Wachstum und Wohlstand beitragen."

PRC_demand_macau:0 "Nachfrage Macau"
PRC_demand_macau_desc:0 "Macau stand jahrhundertelang unter portugiesischer Kontrolle. Es ist an der Zeit, die Stadt wieder in unser Land zu integrieren und die Fremdherrschaft über chinesisches Land zu beenden."

PRC_demand_taiwan:0 "Nachfrage Taiwan"
PRC_demand_taiwan_desc:0 "Taiwan bleibt eine Bastion der Nationalisten. Wir müssen uns darauf vorbereiten, es wieder unter unsere Kontrolle zu bringen, notfalls mit Gewalt."

PRC_negotiate_with_portugal:0 "Mit Portugal verhandeln"
PRC_negotiate_with_portugal_desc:0 "Um Macau zurückzugewinnen, sollten wir zunächst versuchen, mit Portugal zu verhandeln, indem wir diplomatischen Druck ausüben und eine künftige Zusammenarbeit versprechen."

PRC_diplomatic_pressure:0 "Üben Sie diplomatischen Druck aus"
PRC_diplomatic_pressure_desc:0 "Wir werden unsere internationalen Allianzen nutzen und diplomatischen Druck auf Großbritannien und Portugal ausüben, damit sie Hongkong und Macau zurückgeben."

PRC_prepare_for_military_action:0 "Bereiten Sie sich auf militärische Aktionen vor"
PRC_prepare_for_military_action_desc:0 "Sollten die diplomatischen Bemühungen scheitern, müssen wir bereit sein, militärische Gewalt anzuwenden, um unsere Gebiete zurückzuerobern und den Nationalstolz wiederherzustellen."

PRC_reclaim_ports_complete:0 "Zurückgewonnene Häfen"
PRC_reclaim_ports_complete_desc:0 "Mit der erfolgreichen Rückeroberung unserer Vertragshäfen steht China geeinter und stärker da als je zuvor. Dies markiert eine neue Ära der Souveränität und des Nationalstolzes."

PRC_Get_Back_Our_Treaty_Ports:0 "Vertragshäfen zurückfordern"
PRC_Get_Back_Our_Treaty_Ports_desc:0 "Um die Kontrolle über wichtige Häfen zurückzugewinnen, die China im Zuge früherer Verträge verloren hatte, unternimmt die Regierung diplomatische Anstrengungen, um diese Gebiete zurückzugewinnen. Ziel ist es, Chinas strategische Position zu stärken und seine Souveränität über diese wichtigen Regionen zu behaupten."
PRC_Secure_Burma_desc:0 "Im Rahmen seiner Intervention in Südostasien startet China eine Militärkampagne zur Sicherung Burmas mit dem Ziel, eine freundliche Regierung zu etablieren und sich den Zugang zu strategischen Ressourcen und Handelsrouten zu sichern."
PRC_Secure_Thailand:0 "Sicheres Thailand"
PRC_Secure_Thailand_desc:0 "Um seine Expansion in Südostasien voranzutreiben, führt China eine Militäroperation zur Sicherung Thailands durch. Ziel ist es, eine Marionettenregierung zu etablieren und die Kontrolle über wichtige strategische Standorte und Ressourcen zu erlangen."
PRC_Support_Vietnam:0 "Unterstützen Sie Vietnam"
PRC_Support_Vietnam_desc:0 "In einem mutigen Schritt zur Unterstützung seiner kommunistischen Verbündeten erklärt China Frankreich den Krieg, um die kommunistischen Kräfte in Vietnam zu unterstützen. Ziel dieser Initiative ist die Befreiung Vietnams von der Kolonialherrschaft und die Errichtung einer kommunistischen Regierung auf der Seite Chinas."
PRC_Soviet_Deal:0 "Sowjetischer Deal"
PRC_Soviet_Deal_desc:0 "In einem überraschenden diplomatischen Schritt bietet China der Sowjetunion einen Rückzug aus der Mongolei und die Aufgabe ihres Einflusses in der Region an. Dieses Angebot, das im Austausch für 500 politische Macht und 15.000 Mann Mann gemacht wird, zielt darauf ab, die Beziehungen zwischen den beiden Ländern zu verbessern und die Spannungen in der Region abzubauen."
PRC_Lift_Martial_Law:0 "Aufhebung des Kriegsrechts"
PRC_Lift_Martial_Law_desc:0 "Im Bestreben, den Übergang zu einer demokratischeren und offeneren Gesellschaft zu schaffen, kündigt die Regierung die Aufhebung des Kriegsrechts an. Ziel ist die Wiederherstellung der bürgerlichen Freiheiten, die Förderung politischer Reformen und die Verbesserung des internationalen Ansehens des Landes."
PRC_victory:0 "Sieg in Korea"
PRC_victory_desc:0 "Die Volksrepublik China erringt den Sieg im Koreakrieg, sichert damit das Überleben Nordkoreas und festigt ihre Position in der Region."
SHA_popular_support_good_I2:0 "Unterstützung durch die Bevölkerung"
crack_down_on_curruption_kmt:0 "Hartes Vorgehen gegen Korruption"
PRC_rebuilding_china:0 "Wiederaufbau Chinas"
PRC_rebuilding_china_desc:0 "Die Volksrepublik China initiiert einen umfassenden Plan zum Wiederaufbau des Landes nach dem Bürgerkrieg, wobei der Schwerpunkt auf Infrastruktur, Wirtschaft und sozialem Wohlergehen liegt."
PRC_Two_Bombs_One_Satellite:0 "Zwei Bomben, ein Satellit"
PRC_Two_Bombs_One_Satellite_desc:0 "Die Volksrepublik China startet das ehrgeizige Programm „Zwei Bomben, ein Satellit“ mit dem Ziel, Atomwaffen, Wasserstoffbomben und künstliche Satelliten zu entwickeln. Diese Initiative spiegelt Chinas Engagement für wissenschaftliche und technologische Fortschritte auf der Weltbühne wider."
PRC_Great_Leap_Forward:0 "Großer Sprung nach vorn"
PRC_Great_Leap_Forward_desc:0 "Inspiriert von der Vision des Vorsitzenden Mao Zedong zielt der Große Sprung nach vorn darauf ab, Chinas Wirtschaft und Gesellschaft durch groß angelegte Industrialisierung und Kollektivierung rasch umzugestalten. Diese Initiative zielt darauf ab, das produktive Potenzial der chinesischen Bevölkerung freizusetzen und China in Richtung sozialistischer Modernisierung zu treiben."
PRC_Cultural_Revolution:0 "Kulturrevolution"
PRC_Cultural_Revolution_desc:0 "Die von Mao Zedong initiierte Kulturrevolution zielte darauf ab, konterrevolutionäre Elemente und bürgerliche Einflüsse aus der chinesischen Gesellschaft zu entfernen. Ziel dieser Bewegung war es, die Vorherrschaft der kommunistischen Ideologie wiederherzustellen und die kulturelle und soziale Landschaft Chinas zu revolutionieren."
PRC_Four_Modernizations:0 "Vier Modernisierungen"
PRC_Four_Modernizations_desc:0 "Nach der turbulenten Zeit der Kulturrevolution beschreitet China den Weg der Reform und Öffnung und konzentriert sich dabei auf die vier Modernisierungsmaßnahmen Landwirtschaft, Industrie, Wissenschaft und Technologie sowie Verteidigung. Diese Initiative markiert einen Wandel hin zu wirtschaftlicher Liberalisierung und Modernisierung und legt den Grundstein für Chinas schnelles Wirtschaftswachstum und seine Entwicklung."
PRC_Hundred_Flowers_Campaign:0 "Hundert-Blumen-Kampagne"
PRC_Hundred_Flowers_Campaign_desc:0 "Die Hundert-Blumen-Kampagne fördert die geistige und künstlerische Freiheit und lädt zu unterschiedlichen Meinungen und Kritik ein, um die kulturelle und ideologische Entwicklung zu fördern. Diese Initiative spiegelt Chinas Offenheit für konstruktive Kritik und die Förderung des intellektuellen Diskurses wider."
PRC_First_Five-Year_Plan:0 "Erster Fünfjahresplan"
PRC_First_Five-Year_Plan_desc:0 "Der erste Fünfjahresplan ist eine umfassende Wirtschaftsentwicklungsstrategie, die darauf abzielt, Chinas Industrialisierung und Modernisierung zu beschleunigen. Diese Initiative konzentriert sich auf Schlüsselsektoren wie Landwirtschaft, Industrie, Energie und Transport und legt den Grundstein für Chinas sozialistische Wirtschaft."
PRC_Socialist_Transformation:0 "Sozialistische Transformation"
PRC_Socialist_Transformation_desc:0 "Die sozialistische Transformation zielt darauf ab, Chinas Wirtschaft von einer vorwiegend agrarisch geprägten Gesellschaft in ein sozialistisches System umzuwandeln. Diese Initiative beinhaltet die Kollektivierung der Landwirtschaft, die Gründung staatlicher Unternehmen und die Umverteilung des Reichtums, um soziale Gleichheit zu erreichen."
PRC_Great_Leap_Outward:0 "Großer Sprung nach außen"
PRC_Great_Leap_Outward_desc:0 "Inspiriert vom Erfolg des Großen Sprungs nach vorn zielt der Große Sprung nach außen darauf ab, Chinas Einfluss auf der Weltbühne durch diplomatische, wirtschaftliche und kulturelle Initiativen zu erweitern. Diese Initiative markiert Chinas Aufstieg zu einem wichtigen Akteur in der internationalen Politik."
