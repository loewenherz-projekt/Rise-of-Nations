 QUE_modern_tank_aa_equipment_1_desc:0 "Ein Centurion mit einem modifizierten Turm, der 20-mm-Polsten-Geschütze beherbergt."

 QUE_fighter_equipment_0:0 "Grumman Goblin"
 QUE_fighter_equipment_0_short:0 "Kobold"
 QUE_fighter_equipment_0_desc:0 "Der Grumman Goblin oder G-5 wurde von der Canadian Car &amp; Foundry Co. in Lizenz hergestellt und unter der Bezeichnung Goblin I in den kanadischen Dienst gestellt."

 QUE_fighter_equipment_1:0 "Hawker Hurricane"
 QUE_fighter_equipment_1_short:0 "Hurrikan"
 QUE_fighter_equipment_1_desc:0 "Die Hawker Hurricane wurde von der Canadian Car &amp; Foundry Co. und anderen Herstellern in Lizenz hergestellt und entwickelte sich zu Beginn des Krieges zu einem Standardkampfflugzeug."

 QUE_fighter_equipment_2:0 "P40 Kittyhawk"
 QUE_fighter_equipment_2_short:0 "Kittyhawk"
 QUE_fighter_equipment_2_desc:0 "Die Kittyhawk war ein erfolgreiches Kampfflugzeug und wurde von kanadischen Piloten sehr geschätzt. Sie wurde hauptsächlich in den Alaska- und Alutian-Feldzügen eingesetzt. Zur Leistungssteigerung wurden sie mit Rolls-Royce Merlin-Motoren modifiziert."

