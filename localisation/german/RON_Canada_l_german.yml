 better_canada.1.t:0 "[CAN.GetNameDef] Forderungen Alaska"
 better_canada.1.d:0 "[CAN.GetNameDef] hat gefordert, dass wir Alaska sofort an sie abtreten. Sie argumentieren, dass es ein Affront sei, ein ausländisches Militär so tief in ihrem Land zu haben, und dass dies eine direkte Beleidigung ihrer Souveränität sei."
 better_canada.2.t:0 "[CAN.GetNameDef] betrachtet uns als Verbündeten und Freund"
 better_canada.2.d:0 "[CAN.GetNameDef] wird anscheinend eine eigene Fraktion gründen und verhandelt bereits über eine mögliche Einladung. Obwohl sie uns noch nicht offiziell eingeladen haben, bitten sie uns höflichst, die Möglichkeit einer gemeinsamen Zukunft in Betracht zu ziehen." 
 better_canada.2.a:0 "Wir werden es berücksichtigen"
 better_canada.3.t:0 "[CAN.GetNameDef] gründet die „North American League“"
 better_canada.3.d:0 "[CAN.GetNameDef] hatte genug von der europäischen Politik und gründete die „Nordamerikanische Liga“. Ihr Ziel ist es, den Status Quo auf ihrem Kontinent zu erhalten, doch nicht jeder glaubt dieser Aussage. Es gibt sogar Gerüchte, dass [USA.GetNameDef] erwägt, dieser Fraktion beizutreten."
 better_canada.3.a:0 "Interessant"
 better_canada.3.b:0 "Größe erwartet Sie"
 better_canada.4.t:0 "Es wird eine Volksabstimmung abgehalten"
 better_canada.4.d:0 "Die Ergebnisse liegen vor. Alle Territorien und Provinzen, mit Ausnahme von Québec, stimmen mit großer Mehrheit für die Ausweitung der Wehrpflicht. Beunruhigend ist, dass Québec nicht nur mit Nein, sondern mit fast 73 % dagegen gestimmt hat. Es ist sehr wahrscheinlich, dass sich in Québec in Sachen Wehrpflicht nichts ändern wird. Vielleicht ändern sie angesichts der Aussagen ihrer Landsleute ihre Meinung, wenn auch nur geringfügig. Natürlich könnten wir stattdessen energischer vorgehen."
 better_canada.4.a:0 "Was für ein Ärger ..."
 better_canada.5.t:0 "Neufundland trotzt [ENG.GetNameDef]"
 better_canada.5.d:0 "Die Garnisonen Neufundlands waren offenbar äußerst schockiert über die Ablehnung des Referendums. Als sich ein wütender Mob den Stützpunkten näherte, forderten die örtlichen Offiziere sie auf, sich zurückzuziehen, anstatt zu kämpfen. Sie begründeten dies damit, dass das Volk selbst über sein Schicksal entscheiden sollte. Daraufhin durften die Garnisonen die Stadt sicher und unverblümt verlassen. Neufundland und Labrador gehören uns."
 better_canada.5.a:0 "Genau wie geplant"
 better_canada.6.d:0 "Am Morgen wurden Einwohner Neufundlands und Labradors zu einem Mob aufgehetzt, der sie zu den verschiedenen Garnisonsstützpunkten marschieren ließ, um ihre Unabhängigkeit von [ENG.GetName] zu fordern. Die Offiziere, die ein sinnloses Blutvergießen befürchteten, gaben ihren Forderungen nach, und die [ENG.GetNameDef]-Truppen durften friedlich abziehen. Es gibt bereits Gerüchte, dass dies viel zu koordiniert war, als dass es sich lediglich um einen „zufälligen“ Mob gehandelt haben könnte, und es wurden bereits Vorwürfe gegen [CAN.GetName] erhoben, der wahrscheinliche Täter zu sein."
 better_canada.7.t:0 "Adrien Arcand vereint die Faschisten"
 better_canada.7.d:0 "Heute hielten die verschiedenen faschistischen Parteien Kanadas einen nationalen Parteitag in Kingston, Ontario, ab. Dort wurde beschlossen, alle Parteien zu einer neuen Partei zu vereinen, die von einem besonders charismatischen Mann namens „Adrien Arcand“ geführt wird. Als erste Aktion dieser neu vereinigten Partei veranstaltete Arcand eine Kundgebung in der Massey Hall, um für die Partei zu werben. Er bezeichnet sich selbst als „kanadischer Führer“ und scheint die Nazi-Partei nachahmen zu wollen."
 better_canada.9.t:0 "Der Bürgerkrieg ist vorbei"
 better_canada.9.d:0 "Ob gut oder schlecht, der Bürgerkrieg ist vorbei. Nur die Zeit wird zeigen, was als Ergebnis daraus entstehen wird."
 better_canada.10.t:0 "Québéc gehört uns nicht mehr"
 better_canada.10.d:0 "Durch den Verlust Québécs sind wir offensichtlich nicht länger von der Weigerung des Landes betroffen, die Wehrpflicht einzuhalten." 
 better_canada.11.t:0 "Die Québec-Bewohner bekräftigen ihre Haltung"
 better_canada.11.d:0 "Die Québecer erinnern uns daran, dass sie Kanada weiterhin unterstützen werden, egal was passiert." 
 better_canada.12.t:0 "[QUE.GetName] lädt [USA.GetNameDef] zur Kontinentalallianz ein"
 better_canada.12.d:0 "[QUE.GetName] hat bemerkt, dass wir uns keiner Fraktion angeschlossen haben und fordert uns auf, mit ihnen eine Fraktion zu bilden. Sie geben an, dass dies in unserem beiderseitigen Interesse sei, da wir Nachbarn sind." 
 better_canada.12.a:0 "Klingt gut"
 better_canada.13.t:0 "[QUE.GetName] beansprucht die Ostküste"
 better_canada.13.d:0 "[QUE.GetName] fordert Großbritannien und Kanada auf, die Ostküste an sie abzutreten. Als Grund nennt er die Forderung der frankophonen Bevölkerung, Teil von Québec zu werden. Sie inszenieren sich bereits an den Grenzen und scheinen bereit zu sein, die Ostküste notfalls mit Gewalt einzunehmen."
 better_canada.14.t:0 "[QUE.GetName] beansprucht das französische Louisiana"
 better_canada.14.d:0 "[QUE.GetName] hat eine überraschende Erklärung veröffentlicht, in der es [USA.GetNameDef] zur Abtretung des Gebiets auffordert, das einst als Teil des französischen Louisiana galt. Sie positionieren sich bereits an den Grenzen und scheinen bereit zu sein, es notfalls mit Gewalt einzunehmen."
 better_canada.15.t:0 "[QUE.GetName] belebt die Kontinentalallianz wieder"
 better_canada.15.d:0 "[QUE.GetNameDef] veröffentlichte heute eine Erklärung zur Wiederbelebung der „Kontinentalallianz von 1775“. Sie suchen nun nach Verbündeten für diese Allianz, wobei ihre genauen Ziele unklar sind."
 better_canada.16.t:0 "[QUE.GetNameDef] nimmt Paris"
 better_canada.16.d:0 "Ironischerweise hat [QUE.GetNameDef] heute die französische Hauptstadt Paris erobert – ein Fall, den man als „umgekehrten Kolonialismus“ bezeichnen könnte. Quebecer Truppen marschieren stolz durch die Straßen. [QUE.GetLeader] fordert bereits, dass dieser Tag ab heute ein Nationalfeiertag wird."
 better_canada.20.d:0 "[CAN.GetNameDef] hat die sofortige Abtretung von Neufundland und Labrador an sie gefordert. Sie bezeichnen die Anwesenheit ausländischer Truppen in so großer Tiefe ihres Landes als Affront und als direkte Beleidigung ihrer Souveränität."
 better_canada.20.t:0 "[CAN.GetNameDef] Forderungen Neufundland und Labrador"
 better_canada.20.a:0 "Sehr gut"
 better_canada.20.b:0 "Auf keinen Fall!"
 better_canada.21.t:0 "Betrachten Sie die Optionen"
 better_canada.21.d:0 "Bevor wir etwas unternehmen, müssen wir entscheiden, wie wir vorgehen. Wir könnten das fragliche Land direkt einfordern, aber es gibt wahrscheinlich einen besseren Weg. Die Bevölkerung Labradors würde in einem Referendum höchstwahrscheinlich für uns stimmen, was ihre Zustimmung deutlich wahrscheinlicher machen würde. Natürlich können sie es später immer noch ablehnen, aber es würde unserem Anliegen deutlich mehr Glaubwürdigkeit verleihen."
 better_canada.21.a:0 "Halten Sie das Referendum ab"
 better_canada.21.b:0 "Wir brauchen kein Referendum"
 better_canada.22.t:0 "Das Referendum in Neufundland"
 better_canada.22.d:0 "[CAN.GetNameDef] hat die Bevölkerung von Neufundland und Labrador offenbar zu einem Referendum ermutigt. Die Bevölkerung hat sich mit überwältigender Mehrheit für den Beitritt zu Kanada als Nation ausgesprochen, anstatt unter unserer Herrschaft zu bleiben. Wir könnten ihnen dies natürlich verweigern, aber das würde einen Kriegsgrund darstellen."
 better_canada.22.a:0 "Wir dürfen ihren Willen nicht leugnen"
 better_canada.22.b:0 "Jetzt ist nicht die Zeit dafür"
 better_canada.23.t:0 "Das Referendum in Neufundland"
 better_canada.23.d:0 "Heute früh hielt die Bevölkerung Neufundlands ein Referendum ab und stimmte mit überwältigender Mehrheit dafür, [ENG.GetNameDef] um die Freilassung für den Anschluss an Kanada zu bitten. [ENG.GetLeader] erkannte das Referendum als rechtmäßig an und gab das Land an [CAN.GetNameDef] zurück, einschließlich der Schulden, die die Provinz bereits hatte."
 better_canada.23.a:0 "Interessant"
 better_canada.23.b:0 "Exzellent"
 better_canada.23.c:0 "Ich hoffe, das war kein Fehler"
 better_canada.23.f:0 "Tolle Neuigkeiten!"
 better_canada.24.t:0 "Das Referendum in Neufundland"
 better_canada.24.d:0 "Die Bevölkerung Neufundlands hat heute ein Referendum abgehalten und mit überwältigender Mehrheit der Forderung an [ENG.GetNameDef] zugestimmt, sie freizulassen und sich Kanada anzuschließen. [ENG.GetLeader] lehnte dieses Referendum mit der Begründung ab, dass sie die Durchführung eines solchen Referendums nie gutgeheißen und es für illegal gehalten hätten. [CAN.GetLeader] ist empört über diese Nachricht und verspricht, das Land freizulassen."
 better_canada.24.a:0 "Interessant"
 better_canada.24.b:0 "Wenn sie Krieg wollen ..."
 better_canada.24.c:0 "Das Land ist zu wertvoll"
 better_canada.24.f:0 "Wir müssen uns auf das Schlimmste vorbereiten"
 better_canada.25.t:0 "[CAN.GetNameDef] Fordert St. Pierre und Miquelon"
 better_canada.25.d:0 "[CAN.GetNameDef] hat die sofortige Abtretung der Inseln St. Pierre und Miquelon an sie gefordert. Sie argumentieren, dass die Ansiedlung einer fremden Insel in so unmittelbarer Nähe zu ihrem Land eine Beleidigung und eine direkte Beleidigung ihrer Souveränität sei."
 better_canada.30.t:0 "[USA.GetNameDef] tritt Alaska an [CAN.GetNameDef] ab"
 better_canada.30.d:0 "[CAN.GetNameDef] forderte heute von [USA.GetNameDef] die Abtretung Alaskas und bezeichnete die dortige unfaire Militärpräsenz als direkte Beleidigung der Souveränität der Kanadier. Überraschenderweise stimmte [USA.GetLeader] zu und erlaubte den Kanadiern, den Staat friedlich einzunehmen."
 better_canada.30.a:0 "Ich verstehe"
 better_canada.30.b:0 "Exzellent"
 better_canada.30.c:0 "Vielleicht ein Fehler..."
 better_canada.30.f:0 "Exzellent"
 better_canada.31.d:0 "[CAN.GetNameDef] forderte heute von [USA.GetNameDef] die Abtretung Alaskas und bezeichnete die dortige unfaire Militärpräsenz als direkte Beleidigung ihrer Souveränität. [USA.GetLeader] widersprach dem entschieden und erklärte, dass Russland Alaska fairerweise an sie verkauft habe und sie es niemals kostenlos hergeben würden."
 better_canada.31.a:0 "Ich verstehe"
 better_canada.31.b:0 "Verdammt"
 better_canada.31.c:0 "Was haben sie sich dabei gedacht?"
 better_canada.31.f:0 "Wir sollten uns auf den Krieg vorbereiten"
 better_canada.31.t:0 "[CAN.GetNameDef] Forderungen Alaska"
 better_canada.32.t:0 "[FRA.GetNameDef] tritt St. Pierre und Miquelon an [CAN.GetNameDef] ab"
 better_canada.32.d:0 "\nHeute forderte [CAN.GetNameDef] [FRA.GetNameDef] auf, die Inseln St. Pierre und Miquelon an sie abzutreten. Die erneute unfaire Militärpräsenz sei eine direkte Beleidigung ihrer Souveränität, begründete er damit. In einer überraschenden Wendung der Ereignisse stimmte [FRA.GetLeader] zu und erlaubte den Kanadiern, die Inseln friedlich einzunehmen."
 better_canada.33.t:0 "[CAN.GetNameDef] Fordert St. Pierre und Miquelon"  
 better_canada.33.d:0 "[CAN.GetNameDef] forderte heute von [FRA.GetNameDef] die Abtretung der Inseln St. Pierre und Miquelon und bezeichnete die erneute unfaire Militärpräsenz als direkte Beleidigung der Souveränität des Landes. [FRA.GetLeader] widersprach dem entschieden und begründete dies damit, dass die Einheimischen weder ein Interesse daran hätten, Frankreich zu verlassen, noch sich Kanada anzuschließen."
 better_canada.40.a:0 "Sehr gut"
 better_canada.40.b:0 "Auf keinen Fall!"
 better_canada.40.t:0 "Großbritannien tritt Neufundland und Labrador an [CAN.GetNameDef] ab"
 better_canada.40.d:0 "Heute forderte [CAN.GetNameDef] [ENG.GetNameDef] auf, Neufundland und Labrador an sie abzutreten, da die unfaire Militärpräsenz eine direkte Beleidigung ihrer Souveränität sei. In einer überraschenden Wendung der Ereignisse stimmte [ENG.GetNameDef] zu und erlaubte den Kanadiern, das Land friedlich einzunehmen."
 better_canada.40.a:0 "Ich verstehe"
 better_canada.40.b:0 "Exzellent"
 better_canada.40.c:0 "Vielleicht ein Fehler..."
 better_canada.40.f:0 "Exzellent"
 better_canada.41.d:0 "[CAN.GetNameDef] forderte heute von [ENG.GetNameDef] die Abtretung von Neufundland und Labrador und bezeichnete die dortige unfaire Militärpräsenz als direkte Beleidigung der Souveränität der USA. Wenig überraschend widersprach [ENG.GetNameDef] dem entschieden und erklärte, Neufundland und Labrador sei lediglich ein Übungsgelände und man müsse sich keine Sorgen über feindliche Aktivitäten von dort machen."
 better_canada.41.a:0 "Ich verstehe"
 better_canada.41.b:0 "Verdammt"
 better_canada.41.c:0 "Was haben sie sich dabei gedacht?"
 better_canada.41.f:0 "Wir sollten uns auf den Krieg vorbereiten"
 better_canada.41.t:0 "[CAN.GetNameDef] Forderungen Neufundland und Labrador"
 better_canada.43.t:0 "Sie waren überzeugt"
 better_canada.43.d:0 "Die Bevölkerung stimmte widerwillig einer gewissen Wehrpflicht zu. Obwohl die Wehrpflicht immer noch niedriger ist als in anderen Provinzen, sollte sie uns nun deutlich mehr Spielraum geben."
 better_canada.43.a:0 "Dies wird helfen"
 better_canada.44.t:0 "Sie sind weiterhin nicht überzeugt"
 better_canada.44.d:0 "Ihre Bitten stießen auf taube Ohren. Sie geben an, kein Interesse daran zu haben, sich an der Kriegsmaschinerie der Anglophonen zu beteiligen."
 better_canada.44.a:0 "Sie lassen uns keine Wahl ..."
 better_canada.44.b:0 "Unglücklich"
 better_canada.45.t:0 "Strenge Wehrpflicht"
 better_canada.45.d:0 "Sie haben die Bevölkerung durch strikte Durchsetzung zum Handeln bewegt. Obwohl sie ursprünglich nicht zuhören wollte, beginnt die Bevölkerung nun, die Dringlichkeit der Maßnahmen zu erkennen."
 better_canada.45.a:0 "Sie ließen uns keine Wahl …"
 better_canada.46.t:0 "Strenge Wehrpflicht macht sie wütend"
 better_canada.46.d:0 "Sie haben die Bevölkerung durch strikte Durchsetzung zum Handeln bewegt. Dies hat die Bevölkerung schwer verärgert und sie verweigert mehr denn je die Hilfe."
 better_canada.46.a:0 "Das könnte schlimm sein ..."  
 better_canada.47.d:0 "Es scheint, als hätten sich Ihre Forderungen an die Québecer letztlich in separatistische Ideen verwandelt. Sie haben sich den Zugang zur Provinz vollständig abgeschnitten und erklären sich selbst zu einer unabhängigen Nation."
 better_canada.47.a:0 "Das ist schlecht..."
 better_canada.47.b:0 "Es lebe das freie Québec!"
 better_canada.48.t:0 "[QUE.GetName] trennt sich von [CAN.GetNameDef]"
 better_canada.48.d:0 "Mit seinem Versuch, der französischen Bevölkerung in [CAN.GetNameDef] die Wehrpflicht aufzuzwingen, hat [CAN.GetLeader] die Bevölkerung Québecs offenbar nur in Rage gebracht. Sie haben sich mit sofortiger Wirkung von [CAN.GetNameDef] abgespalten. [CAN.GetLeader] hat bereits Maßnahmen gegen diesen illegalen Schritt von [QUE.GetLeader] gefordert."
 better_canada.48.a:0 "Interessant"
 better_canada.48.b:0 "Jetzt hilft nur noch militärisches Vorgehen"
 better_canada.48.c:0 "Eine unglückliche Wendung der Ereignisse"
 better_canada.49.t:0 "Leduc Nr. 1"
 better_canada.49.d:0 "Nach vielen Jahren erfolgloser Bohrungen hat Imperial Oil in Alberta endlich ein riesiges Ölvorkommen entdeckt – und zwar durch tiefere Bohrungen als je zuvor. Davon werden wir sicherlich sehr profitieren."
 better_canada.49.a:0 "Schwarzes Gold!"
 better_canada.50.t:0 "Riesige Ölfunde in [CAN.GetNameDef]"
 better_canada.50.d:0 "Imperial Oil Ltd hatte jahrelang vor und während des Krieges erfolglos nach Öl gebohrt. Doch heute wendete sich das Blatt. Mit tieferen Bohrungen als je zuvor unternahm das Unternehmen einen letzten Versuch, sein Glück zu versuchen – und hatte endlich Erfolg. Dies erweist sich bereits jetzt als enormer wirtschaftlicher Segen für die Provinz Alberta."
 better_canada.50.a:0 "Interessant"
 better_canada.50.b:0 "Hilfe, die es schon gibt"
 better_canada.50.c:0 "Fantastische Neuigkeiten!"
 better_canada.51.t:0 "Wolframfund im Nordwesten Kanadas"
 better_canada.51.d:0 "Vor dem Krieg war die Erkundung und Erschließung von Wolframminen eine sehr begrenzte Angelegenheit und erfolgte meist nebenbei. In jüngerer Zeit haben wir jedoch unsere Bemühungen, das seltene Metall in British Columbia und Umgebung zu finden, ausgeweitet und gefördert, da es dort schon immer Wolframvorkommen gab. Heute hatten wir endlich Erfolg und fanden ein recht großes Wolframvorkommen in „Red Rose“, weit im Nordwesten des Landes."
 better_canada.51.a:0 "Dies wird dem Krieg sicherlich helfen"
 better_canada.52.t:0 "Kunstkautschuk, hergestellt in Sarnia, Ontario"
 better_canada.52.d:0 "Bisher waren wir stark auf Naturkautschuk aus Südostasien angewiesen. Angesichts der Kriegssituation ist diese Quelle jedoch nicht mehr verfügbar, da sie durch Konvoi-Angriffe abgeschnitten werden könnte. Polymer Corp. suchte daher nach Alternativen und erzielte schließlich einen Durchbruch. Sie fanden die Möglichkeit, etwas herzustellen, das sie „synthetischen Kautschuk“ nennen. In Sarnia wird es bereits hergestellt, aber wir sollten die Forschung weiter vorantreiben und die Industrie ausbauen."
 better_canada.52.a:0 "Exzellent"
 better_canada.53.t:0 "Die Frage der Governance"
 better_canada.53.d:0 "Nachdem wir uns befreit haben, müssen wir unsere Regierung neu organisieren. Wir könnten die nationalistische Dynamik aufrechterhalten und den Faschismus unterstützen, oder wir könnten das Volk entscheiden lassen, wie es weitergeht."
 better_canada.53.a:0 "Québéc über alles!"
 better_canada.53.b:0 "Lasst das Volk entscheiden"
 better_canada.54.t:0 "Quebec kommt uns zu Hilfe"
 better_canada.54.d:0 "Wir haben großartige Neuigkeiten: Die Quebecer scheinen endlich bereit zu sein, die Kriegsanstrengungen voll zu unterstützen. Vielleicht haben unsere früheren, eher diplomatischen Bitten um Hilfe sie überzeugt?"
 better_canada.54.a:0 "Fantastisch!"

 north_american_faction:0 "Nordamerikanische Liga"
 continental_alliance:0 "Kontinentalallianz"

 canada_tepid_war_response:0 "Lauwarmer militärischer Enthusiasmus"
 canada_tepid_war_response_desc:0 "Die meisten Kanadier sind nicht bereit, sich freiwillig in den Krieg zu melden. Sie müssen auf die eine oder andere Weise überzeugt werden."
 canada_minor_war_response:0 "Geringe militärische Begeisterung"
 canada_minor_war_response_desc:0 "Die kanadische Bevölkerung folgt langsam dem Ruf zu den Waffen. Ihr Zögern ist jedoch noch immer spürbar." 
 canada_vivid_war_response:0 "Lebhafte militärische Begeisterung"
 canada_vivid_war_response_desc:0 "Das kanadische Volk ist vom Ruf des Krieges erwacht und meldet sich bereitwillig freiwillig, um die Sache zu unterstützen."
 canada_canadian_war_response:0 "Volle kanadische Unterstützung"
 canada_canadian_war_response_desc:0 "Die kanadische Bevölkerung engagiert sich mit vollem Einsatz für den Krieg und weist die wohl höchste Freiwilligenquote aller Zeiten auf. Ob in den Fabriken in der Heimat oder an der Front im Dienst ihres Landes – sie geben alles und wenn nötig sogar ihr Leben."
 quebecois_no_conscription:0 "Wehrpflichtverweigerung"
 quebecois_no_conscription_desc:0 "Kanadier sind ungern zur Wehrpflicht verpflichtet, die Einwohner von Quebec tun dies jedoch besonders. Es wäre besser, sich ausschließlich auf Freiwillige aus Quebec zu verlassen, damit wir sie nicht zu radikaleren Anliegen provozieren."
 quebecois_minor_conscription:0 "Wehrdienstverweigerung bei Minderjährigen"
 quebecois_minor_conscription_desc:0 "Obwohl die Wehrpflichtraten in Québec noch nicht ganz dort liegen, wo sie sein sollten, haben sie sich dank der jüngsten Maßnahmen deutlich verbessert."
 idea_cd_howe:0 "Clarence Decatur Howe"
 idea_cd_howe_desc:0 "Der Minister für Munition und Versorgung, CD Howe, ist ein brillanter Mann, der in der Lage ist, beide Enden des politischen Spektrums zu koordinieren, um eine Zusammenarbeit in der Industrie zu erreichen."
 idea_can_repurpose:0 "Kleinigkeiten"
 idea_can_repurpose_desc:0 "Indem wir jedes noch so kleine Stück nutzen, das wir finden können, können wir selbst die harmlosesten zivilen Fabriken schnell in Militärfabriken verwandeln."
 idea_can_paratroopers:0 "Die schwarzen Teufel"
 idea_can_paratroopers_desc:0 "Durch die Zusammenarbeit mit unseren Verbündeten haben wir die Fähigkeiten unserer Spezialkräfte verbessert."
 idea_d_day:0 "Vorbereitungen für den D-Day"
 idea_d_day_desc:0 "Durch umfassende Pläne und Vorbereitungen für mögliche Invasionen von See aus sind wir bei amphibischen Angriffen schneller schlagbereit."
 idea_can_vickers:0 "Schlacht um den Atlantik"
 idea_can_vickers_desc:0 "Wir müssen bereit sein, unsere Konvois durch Angriffe auf die feindliche Marine zu schützen."
 can_winter_bonus:0 "Der kalte Norden"
 can_winter_bonus_desc:0 "Strenge Winter sind für uns keine Seltenheit. Unsere Truppen können den Elementen dank der für solche Bedingungen optimierten Ausrüstung und den Erfahrungen aus erster Hand besser standhalten."
 CAN_luigi_petrucci:0 "Luigi Petrucci"
 CAN_wilfred_curtis:0 "Wilfred Curtis"
 CAN_sydney_radley_walters:0 "Sydney Radley-Walters"
 CAN_harry_g_dewolf:0 "Harry G. DeWolf"
 que_socialist_science:0 "Sozialistische Wissenschaft"
 que_french_knowledge_idea:0 "Französische Investitionen"
 que_industrial_revolution_idea:0 "Industrielle Revolution"
 que_spirit_of_quebec_idea:0 "Der Geist von Québec"
 joseph_hout:0 "Joseph Hout"
 joseph_hout_desc:0 "Während des Ersten Weltkriegs hatte dieser Mann ein bemerkenswert zuverlässiges vollautomatisches Gewehr entwickelt. Leider kam es nie zum Einsatz, da es im Krieg schon viel zu spät war, die kanadische Armee umzurüsten. Wir haben ihn aus dem Ruhestand zurückgeholt, damit er uns neue, noch bessere Gewehre für unsere Infanterie konstruieren kann."
 QUE_joseph_felix_roy:0 "Joseph-Félix Roy"
 QUE_louis_alexandre_taschereau:0 "Louis-Alexandre Taschereau"
 QUE_e_l_patenaude:0 "EL Patenaude"
 QUE_generic_fascist_demagogue:0 "Adolphe Marcoux"
 QUE_generic_democratic_reformer:0 "René Chaloult"
 QUE_generic_communist_revolutionary:0 "CA Perry"

 CAN_rocky_mountain_rangers:0 "Rocky Mountain Rangers"
 CAN_rocky_mountain_rangers_desc:0 "Wir haben den Vorteil, dass wir in unserem Land über eine große Bergkette verfügen und diese nutzen können, um dort auf den Kampf spezialisierte Truppen auszubilden."
 CAN_winter_lessons:0 "Der kalte Norden"
 CAN_winter_lessons_desc:0 "Strenge Winter sind für uns keine Seltenheit. Unsere Truppen können den Elementen dank der für solche Bedingungen optimierten Ausrüstung und den Erfahrungen aus erster Hand besser standhalten."
 CAN_industrial_bits_and_pieces:0 "Kriegseinkaufsbehörde"
 CAN_industrial_bits_and_pieces_desc:0 "Bislang verfügte Kanada nicht über einen wirklichen militärisch-industriellen Komplex. Wir werden eine Behörde für den Einkauf und die Zentralisierung der Produktion einrichten, um sie für militärische Zwecke umzuwidmen."
 CAN_wartime_housing:0 "Wartime Housing Ltd"
 CAN_wartime_housing_desc:0 "Unsere Bevölkerung muss in die neuen Industriezentren umgesiedelt werden. Durch die Bereitstellung von hochwertigem Wohnraum als Belohnung können wir Arbeitskräfte anlocken und unsere Industrieproduktion deutlich ausbauen. Möglicherweise können wir sogar bestehende Industriezweige auf eine sinnvollere Produktion umrüsten."
 CAN_canadian_pacific_railway:0 "Kanadische Pazifikbahn"
 CAN_canadian_pacific_railway_desc:0 "Die Canadian Pacific Railway erlebte während der Weltwirtschaftskrise einen gewissen Rückgang. Wir müssen sicherstellen, dass diese äußerst wichtige Eisenbahnstrecke, die die West- und Ostküste Kanadas verbindet, den Standards entspricht. Montreal ist die ideale Stadt für dieses Projekt."
 CAN_canadian_maritime_railway:0 "Kanadische Seebahn"
 CAN_canadian_maritime_railway_desc:0 "Ein Krieg in Europa scheint unvermeidlich. Wir müssen die Infrastruktur in Richtung Atlantik verbessern, um die Kriegsfront leichter versorgen zu können."
 CAN_central_investment:0 "Zentrale Investitionen"
 CAN_central_investment_desc:0 "Die Weltwirtschaftskrise hat uns hart getroffen. Investieren wir in die Kernregion unseres Landes, um die im Norden Ontarios geförderten Erze besser zu unseren Mühlen im Süden der Provinz transportieren zu können."
 CAN_dominion_rifle_company:0 "Arsenal von Long Branch"
 CAN_dominion_rifle_company_desc:0 "Wenn wir unsere Miliz richtig in eine richtige Armee umwandeln wollen, müssen wir in die Produktion und Forschung von Kleinwaffen investieren."
 CAN_better_canada_rowell_sirois_commission:0 "Rowell-Sirois-Kommission"
 CAN_better_canada_rowell_sirois_commission_desc:0 "Es muss eine Kommission einberufen werden, um festzustellen, was während der Weltwirtschaftskrise schiefgelaufen ist und was getan werden muss, um die kanadische Wirtschaft zu verbessern."
 CAN_artificial_rubber:0 "Polymer Corp."
 CAN_artificial_rubber_desc:0 "Unser Land ist völlig von Naturkautschuk aus dem Ausland abhängig, insbesondere aus Südostasien. Durch die Gründung der Polymer Corporation können wir in die Erforschung möglicher Alternativen zu Naturkautschuk investieren, vorzugsweise unter Verwendung bereits vorhandener Materialien."
 CAN_natural_oil:0 "Imperial Oil Ltd"
 CAN_natural_oil_desc:0 "Obwohl Imperial Oil kein staatliches Unternehmen ist, kann es dennoch sinnvoll sein, in die Ölförderung in Alberta zu investieren. Die Provinz hat bisher zumindest einige Ölreserven bewiesen, aber das Glück war nicht auf unserer Seite."
 CAN_industrial_build_up:0 "Bennetts New Deal"
 CAN_industrial_build_up_desc:0 "Obwohl er sich zuvor gegen die seiner Ansicht nach verschwenderische Staatsausgaben und kommunistische Ambitionen ausgesprochen hatte, erkannte RB die Zeichen der Zeit und begann, seinen eigenen „New Deal“ zu entwickeln. Die progressiven Reformen brachten neue sozialistische Maßnahmen mit sich, ein Versuch, die Wählerstimmen der Arbeiterklasse zu gewinnen. Die Veränderung kam jedoch zu spät und führte zu einer Wahlniederlage. Sein in letzter Minute formulierter Vorschlag wurde von der nachfolgenden Regierung fortgeführt."
 CAN_crown_companies:0 "Crown-Unternehmen"
 CAN_crown_companies_desc:0 "Die Weltwirtschaftskrise hat uns hart getroffen, ähnlich wie unsere Nachbarn im Süden. Mit einer entsprechenden Gesetzgebung und entsprechenden Förderstrukturen können wir verschiedene sogenannte Crown Companies gründen, um unsere Industrie anzukurbeln. Wir sollten auch die bereits bestehende Industrie fördern und sie vielleicht zu sinnvolleren Produktionszweigen anregen." 
 CAN_angus_shops:0 "Angus Geschäfte"
 CAN_angus_shops_desc:0 "Wie im Ersten Weltkrieg wird die CPR ihre „Angus Shops“ für die Produktion militärischer Ausrüstung, wie zum Beispiel Panzer, umfunktionieren."
 CAN_human_capital:0 "Humankapital"
 CAN_human_capital_desc:0 "Wir werden der Welt beweisen, dass nicht nur die Quantität der Arbeiter allein über die Produktivität Ihres Landes entscheidet, sondern auch die Qualität seiner fleißigen Menschen."
 CAN_quebecois_alumina:0 "Aluminium Company of Canada Ltd"
 CAN_quebecois_alumina_desc:0 "Kanada ist die Wiege der Aluminiumindustrie, genau hier in Quebec. Durch die weitere Förderung des Abbaus und der Verarbeitung von Aluminiumoxid können wir einen großen Beitrag zur Kriegsführung leisten."
 CAN_waste_not_want_not:0 "Canadian Cycle and Motor Co. Ltd."
 CAN_waste_not_want_not_desc:0 "Die Briten hatten viele unserer Fabriken als „kaum besser als Garagen“ eingestuft. Beweisen wir ihnen das Gegenteil, indem wir jede Fabrik voll ausnutzen, egal wie untauglich sie auch erscheinen mag. Wir werden zivile Fabriken für die Produktion umbauen und umfunktionieren und dabei jedes noch so kleine Stückchen verwenden, das wir finden können."
 CAN_further_conversions:0 "Wirtschaftsingenieurwesen GmbH"
 CAN_further_conversions_desc:0 "Nicht jede Fabrik muss ausschließlich Waffen, Munition und dergleichen herstellen. Durch die Verbesserung der Werkzeuge selbst können wir auch Waffen effizienter produzieren."
 CAN_natural_resources:0 "Der Kanadische Schild"
 CAN_natural_resources_desc:0 "Kanada verfügt über eine Vielzahl von Mineralien und natürlichen Ressourcen, die nur darauf warten, genutzt zu werden. Für die dort bereits ansässigen Unternehmen ist dies keine Überraschung. Indem wir die dortigen Unternehmen fördern und die Ausbeutung der Natur durch Staatsunternehmen vorantreiben, können wir unsere Abhängigkeit von ausländischen Gütern wie Stahl verringern."
 CAN_military_repurposing:0 "Liquid Carbonic Canadian Corporation"
 CAN_military_repurposing_desc:0 "Dieses in Québec ansässige Unternehmen produziert Teile für Sodabrunnen. Wir können die Fabriken umfunktionieren und stattdessen Tankteile herstellen und so unsere Produktion weiter steigern."
 CAN_military_focus:0 "Kanadische Streitkräfte"
 CAN_military_focus_desc:0 "Die Bevölkerung ist nicht bereit, in einen Krieg einzutreten. Angesichts der ohnehin geringen Truppenstärke ist dies kein guter Anfang. Daher müssen wir uns mit der Dringlichkeit potenzieller Konflikte auseinandersetzen. Dies wird viel Zeit in Anspruch nehmen, aber der Premierminister ist sicher, dass er sie letztendlich davon überzeugen kann, dass die Sache gerecht ist."
 CAN_army_focus:0 "Keine Miliz mehr"
 CAN_army_focus_desc:0 "Bisher galt unsere Armee lediglich als Miliz. Wir müssen eine Reihe von Reformen durchführen, um eine echte „kanadische Armee“ zu werden."
 CAN_general_motors_company:0 "General Motors Company"
 CAN_general_motors_company_desc:0 "Die industrielle Welt ist uns nicht fremd. Durch die Umnutzung der GM-Fabriken können wir Lastwagen produzieren, mit denen wir unsere Armeen motorisieren können."
 CAN_support_regiments:0 "Königlich Kanadische Artillerie"
 CAN_support_regiments_desc:0 "Unsere Truppenstärke ist begrenzt, daher müssen wir das, was wir haben, bestmöglich nutzen. Durch die Förderung von Unterstützungsregimenten können wir dazu beitragen, die Verluste auf dem Schlachtfeld zu reduzieren, sowohl an Menschen als auch an Maschinen. Schließlich zählt jedes Detail."
 CAN_ontario_steel:0 "Dominion Steel and Coal Corp."
 CAN_ontario_steel_desc:0 "Dieses staatliche Unternehmen wurde mit Hilfe amerikanischer Interessen gegründet. Durch Investitionen in seine Anlagen in Nova Scotia und in ähnliche Unternehmen anderswo können wir erheblich mehr Stahl produzieren."
 CAN_rouse_their_hearts:0 "Der Norden taut auf"
 CAN_rouse_their_hearts_desc:0 "Das Unterhaus, die britische Krone und vor allem das kanadische Volk sind sich einig: Jetzt ist die Zeit gekommen. Wir müssen gemeinsam gegen einen gemeinsamen Feind kämpfen. Schon jetzt melden sich Kanadier freiwillig für den Krieg."
 CAN_naval_focus:0 "Königliche kanadische Marine"
 CAN_naval_focus_desc:0 "Eine gute Flotte braucht die richtige Taktik. Lernen wir von unseren Freunden, den Briten"
 CAN_destroyers_and_cruisers:0 "Halifax Royal Naval Dockyard"
 CAN_destroyers_and_cruisers_desc:0 "Wir müssen die Produktion unserer Flotte auf kleinere Schiffe wie Zerstörer und Kreuzer konzentrieren."
 CAN_canadian_marines:0 "Lehren aus Hongkong"
 CAN_canadian_marines_desc:0 "Wir haben bei der gemeinsamen Verteidigung Hongkongs mit Großbritannien viel gelernt. Wir können das Gelernte nutzen, um Spezialtruppen für amphibische Angriffe und Verteidigung auszubilden."
 CAN_british_columbian_dockyard:0 "Esquimalt Royal Naval Dockyard"
 CAN_british_columbian_dockyard_desc:0 "Wir dürfen den pazifischen Kriegsschauplatz nicht vergessen. Daher wäre es das Beste, unsere Marinewerft auf Vancouver Island zu erweitern."
 CAN_aviation_focus:0 "Königliche kanadische Luftwaffe"
 CAN_aviation_focus_desc:0 "Die Royal Canadian Air Force hat noch viel zu tun, um ihren großen britischen Bruder, die RAF, einzuholen. Was ihr an Zahl fehlt, macht sie an Qualität wett."
 CAN_rcaf_fighters:0 "Handley Page Ltd."
 CAN_rcaf_fighters_desc:0 "Dieses Unternehmen kann uns mit einer neuen und leistungsfähigen Palette an Bombern versorgen. Wir sollten umgehend mit der Produktion und dem Vertrieb beginnen."
 CAN_rcaf_tac_bombers:0 "Der Plan"
 CAN_rcaf_tac_bombers_desc:0 "Durch die Zusammenarbeit mit unseren Verbündeten können wir sogar neue Lufttaktiken und Flugzeugdesigns verfolgen und unser Angebot auf Bomber und Kampfflugzeuge ausweiten."
 CAN_canadian_naval_bombers:0 "Canadian Vickers Ltd"
 CAN_canadian_naval_bombers_desc:0 "Dieses vielversprechende Unternehmen mit Sitz in Montreal kann bei der Entwicklung und Produktion von Flugzeugen, beispielsweise Marinebombern, mitwirken."
 CAN_statute_of_westminster:0 "Statut von Westminster"
 CAN_statute_of_westminster_desc:0 "Es ist noch nicht viel Zeit vergangen, seit uns das Statut zu den gleichberechtigten Nationen des Commonwealth erhoben hat. Lassen Sie uns diesen neuen politischen Einfluss nutzen, um Veränderungen herbeizuführen."
 CAN_commonwealth_unity:0 "Einheit des Commonwealth"
 CAN_commonwealth_unity_desc:0 "Wir werden mit dem Commonwealth durch dick und dünn zusammenstehen. Auch wenn wir unabhängig sind, teilen wir doch alle eine gemeinsame Geschichte."
 CAN_defence_of_canada:0 "Zur Verteidigung Kanadas"
 CAN_defence_of_canada_desc:0 "In Europa braut sich Krieg zusammen. Obwohl wir einen Ozean entfernt sind, können wir diese Bedrohung nicht einfach ignorieren. Indem wir Freiwillige zu unseren Verbündeten schicken, können wir die Kriegsanstrengungen unterstützen und hoffentlich verhindern, dass die Schrecken des Krieges unsere Küsten erreichen." 
 CAN_volunteers_abound:0 "Wir alle, tapfere Kanadier"
 CAN_volunteers_abound_desc:0 "Trotz anfänglicher Zurückhaltung sind die Bürger Kanadas heute außerordentlich bereit, die Sache zu unterstützen. Wir sollten diese Bereitschaft fördern, die Kriegsanstrengungen zu unterstützen."
 CAN_united_we_stand:0 "Gemeinsam sind wir stark"
 CAN_united_we_stand_desc:0 "Wir lassen uns nicht unterkriegen! Wir werden für das Richtige kämpfen, im In- und Ausland, wenn nötig."
 CAN_soviet_heart:0 "Ausschuss für Industrieorganisation"
 CAN_soviet_heart_desc:0 "Durch die Förderung von Gewerkschaften im Allgemeinen können wir bessere Arbeits- und Lohnstandards erreichen und so die Agenda des „On-to-Ottawa Trek“ vorantreiben. Dies wird den kapitalistischsten Nationen der Welt zweifellos missfallen."
 CAN_communism_abroad:0 "Mackenzie-Papineau-Bataillon"
 CAN_communism_abroad_desc:0 "Angesichts der weltweit wachsenden kommunistischen Stimmung werden wir diejenigen unterstützen, die gegen ihre Regierungen kämpfen, und eine geschlossene Front bilden. Sowohl in China als auch in Spanien sind solche Stimmungen aufkeimend und könnten Unterstützung gebrauchen."
 CAN_fascist_ambitions:0 "Loyalität zu einem"
 CAN_fascist_ambitions_desc:0 "Wir brauchen den Commonwealth nicht. Wir werden der Welt beweisen, dass auch wir eine starke Nation sind, die in der Lage ist, alles zu erreichen, was sie will, aus eigener Kraft und wenn nötig mit Gewalt."
 CAN_better_canada_camp_x:0 "Camp X"
 CAN_better_canada_camp_x_desc:0 "In dieser Trainingseinrichtung werden wichtige Lektionen in verschiedenen Geheimtechniken vermittelt, darunter das Abhören und Entschlüsseln feindlicher Funkverbindungen. Es wäre ideal, wenn wir diese Lehren auch unseren Verbündeten zugänglich machen würden, damit auch sie davon profitieren können. Wir sollten außerdem die Funkreichweite unseres Pazifikkriegs durch die Einrichtung eines Abhörpostens auf den Charlottes erweitern."
 CAN_honorary_soviets:0 "Ein rotes Blatt folgt einem roten Banner"
 CAN_honorary_soviets_desc:0 "Unser Volk hat sich verändert. Wir folgen nicht länger den Launen einer fremden Krone, sondern gehen unseren eigenen Weg. Die Sowjets begrüßen unsere jüngsten Aktionen und sind bereit, uns zu unterstützen. Wir müssen nur darum bitten."
 CAN_communist_volunteers:0 "Das Volksheim"
 CAN_communist_volunteers_desc:0 "Unsere Kameraden kommen in immer größerer Zahl, um uns zu helfen. Gemeinsam können wir dieses Land zu einem wahren Ort der Wunder machen. Gleichgesinnte aus aller Welt kommen in großer Zahl zu uns. Schicken wir sie nach „Vancouver Island“, damit wir unseren Freunden westlich von uns näher kommen können."
 CAN_better_canada_swastika_clubs:0 "Hakenkreuzvereine"
 CAN_better_canada_swastika_clubs_desc:0 "Kanada hat noch keine starke nationalistische Partei. Durch die Vereinigung der verschiedenen kleinen und zersplitterten „Swastika Clubs“ zu einer einheitlichen Partei können wir wirklich etwas bewegen."
 CAN_canadian_parachute_battalion:0 "Kanadisches Fallschirmbataillon"
 CAN_canadian_parachute_battalion_desc:0 "Durch den Einsatz von qualitativ überlegenen Spezialtruppen können wir tief in feindliches Gebiet eindringen und dessen Nachschub abschneiden. Dies sind jedoch gefährliche Missionen, die speziell ausgebildetes Personal erfordern."
 CAN_battle_of_the_atlantic:0 "Die Schlacht um den Atlantik"
 CAN_battle_of_the_atlantic_desc:0 "Um Versorgungsgüter und Materialien über den Atlantik liefern zu können, müssen wir die Sicherheit unserer Konvois gewährleisten. Das erreichen wir, indem wir feindliche Schiffe bombardieren."
 CAN_d_day:0 "Der D-Day"
 CAN_d_day_desc:0 "Eine Invasion von See aus ist ein unvermeidlicher Teil des Krieges. Wir sollten dies im Voraus planen, damit wir schneller geeignete Pläne für einen Angriff an jeder beliebigen Stelle der feindlichen Küste schmieden können."
 CAN_canadian_special_expertise:0 "Die schwarzen Teufel"
 CAN_canadian_special_expertise_desc:0 "Durch die Zusammenarbeit mit unseren Verbündeten können wir Spezialeinheiten ausbilden, wie sie noch nie zuvor gesehen wurden. Sie werden stärker und schneller sein als andere Soldaten, aber vor allem: Sie werden dem Feind Angst einjagen."
 CAN_military_zeal:0 "Ungezügelter Nationalismus"
 CAN_military_zeal_desc:0 "Nur wenn wir uns im In- und Ausland stark für die Förderung des Nationalismus einsetzen, können wir auf uns aufmerksam machen."
 CAN_start_them_early:0 "Beginnen Sie früh"
 CAN_start_them_early_desc:0 "Durch eine Reform der Lehrpläne an den Schulen können wir unseren Eifer auch jüngeren Menschen nahebringen und so einen größeren Pool an Rekruten schaffen, die der Sache treu ergeben sind."
 CAN_lay_west_claims:0 "Der Lynn-Kanal-Streit"
 CAN_lay_west_claims_desc:0 "Die US-Präsenz im Westen ist inakzeptabel. Wir hatten uns bereits zuvor mit den USA über den Lynn-Kanal gestritten, aber wir müssen uns der Entscheidung des Internationalen Tribunals mutiger widersetzen. Wir müssen ganz Alaska für uns allein haben, wenn wir unsere Grenzen angemessen sichern wollen."
 CAN_lay_east_claims:0 "Das Referendum in Neufundland"
 CAN_lay_east_claims_desc:0 "Die britische Präsenz im Osten ist inakzeptabel. Wir müssen Neufundland und Labrador für uns behalten, wenn wir unsere Grenzen angemessen sichern wollen."
 CAN_lay_more_east_claims:0 "Anspruch auf St. Pierre und Miquelon"
 CAN_lay_more_east_claims_desc:0 "Da wir nun die rechtmäßigen Eigentümer von Neufundland und Labrador sind, sollten wir uns darum kümmern, die Franzosen von unserer Küste zu vertreiben." 
 CAN_canada_first:0 "Kanada zuerst"
 CAN_canada_first_desc:0 "Wir weigern uns, Teil der europäischen politischen Machenschaften zu sein. Stattdessen werden wir als Meister unseres eigenen Schicksals voranschreiten. Vielleicht sind die USA daran interessiert, falls sie nicht ohnehin schon auf unserer Seite stehen."
 CAN_canada_strengthen_bonds:0 "Fraktionseinheit"
 CAN_canada_strengthen_bonds_desc:0 "Wir verfügen nicht über die nötige Mannstärke, um wirklich allein zu bestehen. Lasst uns gemeinsam mit unserer Fraktion gegen äußere Bedrohungen vorgehen."
 CAN_technology_sharing:0 "Technologieaustausch"
 CAN_technology_sharing_desc:0 "Wir können in Technologiefragen mit unseren Verbündeten zusammenarbeiten, um unsere Ziele zu verfolgen."
 CAN_soviet_teachings:0 "Das Regina-Manifest"
 CAN_soviet_teachings_desc:0 "Durch den Zusammenschluss ähnlich ausgerichteter Parteien, wie der Co-operative Commonwealth Federation, zu einer einheitlichen Partei können wir eine gemeinsame Agenda in der Bevölkerung weiter vorantreiben. Gemeinsam können wir die korrupten Kapitalisten dieser Welt vernichten."
 CAN_our_home_and_native_land:0 "Unser Zuhause und Heimatland"
 CAN_our_home_and_native_land_desc:0 "Dies ist unsere Heimat und wir müssen sie schützen. Lassen Sie uns alles in unserer Macht Stehende tun, um einen letzten Vorstoß zu unternehmen, wenn nicht für uns, dann für unsere Kinder oder Kindeskinder."
 CAN_question_of_quebec:0 "Volksabstimmung zur Wehrpflicht"
 CAN_question_of_quebec_desc:0 "Wir müssen eine Volksabstimmung über die Regeln der Wehrpflicht abhalten, darüber, wo sie eingesetzt werden kann und in welchem Umfang sich die Provinzen verpflichten müssen. Dies betrifft insbesondere Quebec, das seit der Wehrpflichtkrise von 1917 während des Ersten Weltkriegs weitgehend inoffiziell von der Wehrpflicht befreit war."
 CAN_reason_with_quebec:0 "Das Referendum von Québec"
 CAN_reason_with_quebec_desc:0 "Sie sind Teil unserer Nation, ihr Volk ist unser Volk. Wir sollten diplomatisch mit ihnen verhandeln, sie werden unser Anliegen sicher verstehen. Insbesondere angesichts des Ergebnisses der Volksabstimmung könnten sie ihre Meinung ändern."
 CAN_quebec_propaganda:0 "Allons-y.. Canadiens!"
 CAN_quebec_propaganda_desc:0 "Unabhängig von ihrer Entscheidung können wir Kriegspropaganda nutzen, um möglicherweise den Rest von Québec zum Zuhören zu bewegen."
 CAN_force_quebec:0 "Québec unter Ausgangssperre"
 CAN_force_quebec_desc:0 "Die Ergebnisse des Plebiszits haben deutlich gezeigt, dass die Mehrheit der Kanadier für die Wehrpflichtänderung ist, mit Ausnahme von Quebec. Québec war die einzige Mehrheit, die gegen diese Änderungen gestimmt hat, und blockiert den Prozess weiterhin. Wir werden ihnen strenge Ausgangssperren verhängen, um eine weitere Wehrpflichtkrise zu verhindern und gleichzeitig die Wehrpflicht durchzusetzen."
 CAN_force_quebec_part_2:0 "Änderung des Kriegsmaßnahmengesetzes"
 CAN_force_quebec_part_2_desc:0 "Sie weigern sich immer noch, die Wehrpflichtgesetze vollständig einzuhalten. Wenn sie nicht auf unsere Forderungen hören, werden wir sie dazu zwingen, indem wir das Kriegsmaßnahmengesetz ausweiten, um die Québecer zu internieren, die sich immer noch weigern, dem Plebiszit beizutreten."
 CAN_quebec_agreement:0 "Das Québec-Abkommen"
 CAN_quebec_agreement_desc:0 "Wir sollten ein Dreiertreffen mit den USA und Großbritannien hinsichtlich eines neuen Waffenprojekts abhalten. Unser Land verfügt über reichlich Uran, und die USA scheinen daran interessiert zu sein, dieses im sogenannten „Manhattan-Projekt“ einzusetzen. Sie dabei zu unterstützen, könnte sich als gute Idee erweisen."
 CAN_nuclear_arms:0 "Die weißen Sterne des Nordens"
 CAN_nuclear_arms_desc:0 "Unser Land ist reich an vielen Rohstoffen, darunter auch Uran. Durch die Erforschung dieses Materials könnten wir möglicherweise Waffen herstellen, die unseren Feinden Schrecken einjagen würden. Es wäre auch ratsam, andere Möglichkeiten zu erforschen, um aus der Ferne schreckliche Zerstörung anzurichten."
 
 QUE_maitre_chez_nous:0 "Maître chez nous"
 QUE_maitre_chez_nous_desc:0 "Beseitigen Sie alle Instanzen der englischen Sprache innerhalb der Regierung, um Französisch als einzige Sprache des Landes einzuführen."
 QUE_the_continental_alliance:0 "Rückblick auf die Kontinentalallianz von 1775"
 QUE_the_continental_alliance_desc:0 "Wir können dem Commonwealth niemals verzeihen, was es uns angetan hat, aber wir können es uns auch nicht leisten, die Demokratie völlig aufzugeben. Lassen Sie uns Abgesandte in die USA schicken, um alte Bündnisse zu fördern."
 QUE_formalize_the_constitution:0 "Formalisieren Sie die Verfassung"
 QUE_formalize_the_constitution_desc:0 "Bisher hatten wir keine richtige Verfassung. Viele Male wurde darüber diskutiert, viele Entwürfe verfasst und schließlich vergessen. Wenn wir als Nation auf der Weltbühne erfolgreich sein wollen, müssen wir eine richtige Verfassung schaffen."
 QUE_united_we_stand:0 "Gemeinsam sind wir stark"
 QUE_united_we_stand_desc:0 "Wir müssen mit unseren Brüdern und Schwestern zusammen gegen den gemeinsamen Feind der Gegenwart und Zukunft stehen."
 QUE_establish_the_continental_alliance:0 "Beleben Sie die Kontinentalallianz wieder"
 QUE_establish_the_continental_alliance_desc:0 "Wir müssen auf unseren eigenen Füßen stehen. Anstatt dem Commonwealth und seinen sogenannten „Verbündeten“ blind zu folgen, sollten wir unsere eigene Fraktion bilden. Vielleicht sind sogar die USA interessiert?"
 QUE_invite_france:0 "Ancien Régime"
 QUE_invite_france_desc:0 "Frankreich wäre in unserer Fraktion ein mächtiger Freund und Verbündeter. Wir sollten versuchen, ihnen zu zeigen, dass es in ihrem besten Interesse ist, sich mit uns statt mit anderen zu verbünden. Schließlich verbindet uns eine tiefe Verbundenheit."
 QUE_mouvement_socialiste:0 "Mouvement Socialiste"
 QUE_mouvement_socialiste_desc:0 "Wir werden dieses Land so umgestalten, dass es wirklich ein Land für die Menschen und ihre Arbeiter ist."
 QUE_l_experience_du_saguenay:0 "L&#39;Expérience du Saguenay"
 QUE_l_experience_du_saguenay_desc:0 " Die Menschen in Saguenay schufen ein lokales kommunistisches Paradies, indem sie kommunistische Theorie in die Praxis umsetzten. Das Experiment war eindeutig ein Erfolg, und der Rest des Landes sollte ihrem Beispiel folgen."
 QUE_soviet_support:0 "Sowjetische Unterstützung"
 QUE_soviet_support_desc:0 "Moskau hat angeboten, unsere besten Offiziere auszubilden, um unsere eigenen Ziele zu verfolgen. Wir sollten dieses freundliche Angebot annehmen."
 QUE_pays_pour_tous:0 "Pays pour tous"
 QUE_pays_pour_tous_desc:0 "Nach dem Saguenay-Experiment wurde entschieden, dass ganz Québec endlich bereit ist, das versprochene Volksparadies des Sozialismus zu verwirklichen. Jeder Mann, jede Frau und jedes Kind wird an dieser glorreichen Bewegung teilnehmen, die uns zum Sieg über unsere Feinde führen wird."
 QUE_french_paradise:0 "Französisches Paradies"
 QUE_french_paradise_desc:0 "Lassen Sie uns unsere Freude auf die Kanadier ausdehnen. Sie werden unsere Bewegung mit Sicherheit begrüßen, und sollten sie sich hartnäckig weigern, dann werden wir es mit Gewalt tun."
 QUE_continental_revolution:0 "Kontinentale Revolution"
 QUE_continental_revolution_desc:0 "Kanadas Assimilation ist ein weiterer Beweis für die Welt, dass der Sozialismus der richtige Weg ist. Wir können nicht zulassen, dass verräterische Kapitalisten über die Bevölkerung Nordamerikas herrschen. Wie vom Rat des Volkes beschlossen, werden wir den verräterischen Griff der Vereinigten Staaten auf dem Kontinent beenden."
 QUE_mouvement_nationaliste:0 "Mouvement Nationaliste"
 QUE_mouvement_nationaliste_desc:0 "Die Anglophonen haben lange genug versucht, uns zu unterdrücken. Es ist an der Zeit, uns das zurückzuholen, was uns gehört, und unsere Position in der Welt zu etablieren."
 QUE_quebec_is_best:0 "Es lebe das freie Québec!"
 QUE_quebec_is_best_desc:0 "In der Bevölkerung kochen die Emotionen hoch, sie wollen ihre Rechte verteidigen und sich nicht von den Kolonialisten in die Enge treiben lassen. Der Griff zu den Waffen scheint das einzig Richtige zu sein."
 QUE_mass_propaganda:0 "Massenpropaganda"
 QUE_mass_propaganda_desc:0 "Wir müssen uns bemühen, auch den letzten Menschen in Quebec von der Rechtmäßigkeit unserer Sache zu überzeugen."
 QUE_start_them_early:0 "Beginnen Sie früh"
 QUE_start_them_early_desc:0 "Wir werden unser System katholischer Schulen nutzen, um vor allem den Nationalismus zu fördern. Indem wir unsere Jugend überzeugen, können wir die Zukunft unserer Nation stärken."
 QUE_reform_nouvelle_france:0 "Reform Nouvelle-France"
 QUE_reform_nouvelle_france_desc:0 "Neufrankreich erstreckte sich einst über den gesamten nordamerikanischen Kontinent, doch das ist nicht mehr der Fall. Beginnen wir mit der Wiederherstellung seiner Größe, indem wir die Länder östlich von uns erobern."
 QUE_french_louisiana:0 "Louisiane Française"
 QUE_french_louisiana_desc:0 "Wir sollten eine Expansion nach Süden in das ehemalige französische Louisiana in Erwägung ziehen, um uns vollständig als Weltmacht zu etablieren."
 QUE_rochette_plan:0 "Rochettes Plan"
 QUE_rochette_plan_desc:0 "Indem wir uns auf die traditionellen Industrien Québecs konzentrieren, können wir eine solide Basis für unsere Zukunft schaffen."
 QUE_drouin_plan:0 "Drouins Plan"
 QUE_drouin_plan_desc:0 "Wir müssen uns auf die Zukunft konzentrieren und damit auf die neuen Technologien, die sie unserem Land bringt, um eine moderne Gesellschaft zu werden."
 QUE_plan_nord:0 "Plan Nord"
 QUE_plan_nord_desc:0 "Unser Boden ist reich an Mineralien, sei es Aluminium, Stahl, Gold oder sogar Titan. Die Entwicklung des Nordens wird unsere Abhängigkeit von externen Lieferanten verringern und unsere Unabhängigkeit von den imperialistischen Mächten fördern."
 QUE_foundation_of_alque:0 "Gründung von Alqué"
 QUE_foundation_of_alque_desc:0 "Die Aluminium Company of Canada begann mit der Aluminiumgewinnung in Saguenay und Mauricie. Durch die Verstaatlichung des Unternehmens und die Gewährung von Abbaurechten für ganz Québec kann das Unternehmen seine Produktion drastisch steigern."
 QUE_anticosti_island:0 "Insel Anticosti"
 QUE_anticosti_island_desc:0 "Bei einer Erkundung der Insel Anticosti wurden große Ölreserven entdeckt. Weitere Pläne zur Nutzung dieser Ressourcen könnten zur Versorgung unserer Kriegsmaschinerie entwickelt werden."
 QUE_artificial_rubber:0 "Das Gummiproblem"
 QUE_artificial_rubber_desc:0 "Québec ist zwar reich an Mineralien, Öl und anderen Rohstoffen, doch eines fehlt uns: Naturkautschuk. Um weiterhin Flugzeuge, Fahrzeuge und andere Güter bauen zu können, die diesen lebenswichtigen Rohstoff benötigen, müssen wir nach Alternativen forschen."
 QUE_french_knowledge:0 "Französische Investitionen"
 QUE_french_knowledge_desc:0 "Französische ausländische Investoren und unsere eigenen brillanten Köpfe könnten eine starke Kombination für die Zukunft unserer Nation bilden."
 QUE_metropolitan_quebec:0 "Metropolregion Québec"
 QUE_metropolitan_quebec_desc:0 "Wir müssen die Infrastruktur entlang des Saint-Laurent verbessern. Auf diese Weise können wir die Reichweite unserer Industrie entlang des Flusses leichter ausweiten."
 QUE_industrialize_the_north:0 "Die Ressourcen des Nordens nutzen"
 QUE_industrialize_the_north_desc:0 "Der Norden ist reich an Ressourcen, doch bisher haben wir nur an der Oberfläche gekratzt. Durch den Ausbau unserer Infrastruktur und die Förderung der zivilen Entwicklung in der Region können wir diese Ressourcen wirklich nutzen."
 QUE_quebec_railway:0 "Roberval- und Saguenay-Eisenbahn"
 QUE_quebec_railway_desc:0 "Durch die Verstaatlichung dieser Eisenbahn können wir die Expansion von Saguenay nach Norden weiter vorantreiben."
 QUE_caisse_de_depot:0 "Gründung der Caisse de dépôt"
 QUE_caisse_de_depot_desc:0 "Um unsere Industrien zu fördern, wird die Gründung der Caisse durch die Regierung den Menschen in Québec Finanzmittel zur Verfügung stellen und dazu beitragen, dass ausländische Investoren auf uns aufmerksam werden."
 QUE_industrial_revolution:0 "Industrielle Revolution"
 QUE_industrial_revolution_desc:0 "Durch sorgfältige Stadtplanung und entsprechende Baupraktiken können wir die Landnutzung für Fabriken maximieren."
 QUE_expand_valcartier:0 "Valcartier erweitern"
 QUE_expand_valcartier_desc:0 "Mit Hilfe des alten 22. Königlichen Regiments können wir unsere Militärproduktion in der Region ausweiten, um unseren militärischen Bedarf zu decken."
 QUE_citadelle_of_quebec:0 "Zitadelle von Québec"
 QUE_citadelle_of_quebec_desc:0 "Wir müssen unsere Hauptstadt befestigen, wenn sie nicht einmal durch eine leichte Brise in die Knie gezwungen werden soll."
 QUE_sorel_development:0 "Sorel-Tracy entwickeln"
 QUE_sorel_development_desc:0 "Da Sorel-Tracy bereits ein starkes Industriezentrum ist, können wir die Entwicklung von Rüstungsfabriken weiter fördern. Dies sorgt für Arbeitskräfte und eine einfache Warenlieferung an Militärstützpunkte."
 QUE_military_college:0 "Militärhochschule Trois-Rivières"
 QUE_military_college_desc:0 "Die Urbanisierung des Sankt-Lorenz-Stroms hat dazu geführt, dass immer mehr Menschen aus den umliegenden Regionen auf der Suche nach Arbeit und Bildung sind. Dieses College wird uns hochqualifizierte Offiziere und Spitzenforschung im Bereich militärischer Ausrüstung bieten."
 QUE_quebec_national_forces:0 "Québecois Miliz"
 QUE_quebec_national_forces_desc:0 "Ähnlich wie Kanada hatten wir nie eine richtige Armee. Wir sollten Maßnahmen ergreifen, um unsere Männer angemessen auszurüsten und auszubilden, wenn wir in dieser neuen Ära überleben wollen."
 QUE_inuit_and_first_nations:0 "Die Inuit und First Nations"
 QUE_inuit_and_first_nations_desc:0 "Wir stehen vor dem Problem, dass wir nicht genügend Personal für ausgedehnte Militäreinsätze haben. Vielleicht sollten wir die Einheimischen zur Mithilfe überreden. Diese Völker leben seit langem am Rande der Gesellschaft, vielleicht sogar nur aufgrund anglophoner Aggressionen. Vielleicht können wir sie erreichen und fragen, ob sie Hilfe benötigen. Vielleicht ziehen sie sogar in Erwägung, uns zu helfen."
 QUE_fulfill_promises:0 "Versprechen erfüllen"
 QUE_fulfill_promises_desc:0 "Indem wir unseren Teil der Abmachung erfüllt haben, haben sich die Einheimischen bereit erklärt, sich künftig aktiver an der Nation zu beteiligen. Sie gehen sogar so weit, einen beträchtlichen Teil zur Verteidigung gegen mögliche Feinde beizutragen."
 QUE_political_asylum:0 "Politisches Asyl"
 QUE_political_asylum_desc:0 "Es gibt viele „unerwünschte“ Menschen, die aufgrund vager nationalistischer Hintergründe zu Unrecht inhaftiert werden. Wir sollten diese vertriebenen und misshandelten Japaner, Deutschen und Angehörige anderer Nationalitäten aufnehmen und ihnen das Gleiche bieten, was wir unseren eigenen Bürgern zukommen lassen würden."
 QUE_welcome_refugees:0 "Ein neues Zuhause"
 QUE_welcome_refugees_desc:0 "Die jüdische Bevölkerung flieht gerade in diesem Moment vor den Schrecken der Nazi-Kriegsmaschinerie. Wir sollten ihnen bei der Flucht helfen und sie als vollwertige Bürger in unserem Land ansiedeln. Sie würden nicht nur gerne mit unserem Volk zusammenarbeiten, sondern sich vielleicht sogar davon überzeugen lassen, selbst für uns zu kämpfen."
 QUE_support_france:0 "Unterstütze Frankreich"
 QUE_support_france_desc:0 "Frankreich wurde von seiner Exilregierung besiegt. Vielleicht sollten wir die französische Regierung in unser Land einladen und alle französischen Exilanten in unserem Land offen aufnehmen, ähnlich wie die Juden und andere Opfer dieses Krieges."
 QUE_volunteers_force:0 "Zivile Freiwillige"
 QUE_volunteers_force_desc:0 "Indem wir die Menschen inspirieren, können wir sie – ob jung oder alt – für ehrenamtliches Engagement gewinnen. So können sie die Expansion unserer Branche deutlich vorantreiben. Jeder kleine Beitrag hilft."
 QUE_foreign_embassies:0 "Ausländische Botschaften"
 QUE_foreign_embassies_desc:0 "Um unsere Nation in den Augen der Nationen der Welt zu legitimieren, müssen wir in ihren Ländern Botschaften einrichten und ihnen die Einrichtung derselben auch hier ermöglichen. Auf diese Weise können wir hoffentlich weltweite Anerkennung als eigenständige politische Einheit neben Kanada erlangen."
 QUE_support_the_faction:0 "Unterstützen Sie unsere Verbündeten"
 QUE_support_the_faction_desc:0 "Um erfolgreich zu sein, müssen wir an der Seite unserer Verbündeten stehen. Lassen Sie uns diesen Gedanken in der Bevölkerung verbreiten, in der Hoffnung, dass sich noch mehr Menschen für uns engagieren."
 QUE_technology_sharing:0 "Technologieaustausch"
 QUE_technology_sharing_desc:0 "Wir können in Technologiefragen mit unseren Verbündeten zusammenarbeiten, um unsere Ziele zu verfolgen."
 QUE_industrial_ingenuity:0 "Industrieller Einfallsreichtum"
 QUE_industrial_ingenuity_desc:0 "Unsere Branche ist ein wahres Wunder. Indem wir die klügsten Köpfe fördern, können wir die Technologie noch weiter vorantreiben. Was uns an Zahl fehlt, haben wir an Herz und Seele."
 QUE_huot_automatic_rifle:0 "Huots automatische Gewehre"
 QUE_huot_automatic_rifle_desc:0 "Während des Ersten Weltkriegs entwickelte ein Schmied aus Québec ein unglaublich zuverlässiges vollautomatisches Gewehr. Leider wurde es nie produziert, da der Krieg schon zu spät fortgeschritten war. Wir sollten uns an diesen Mann wenden, um unsere Waffen für kommende Konflikte zu verbessern."
 QUE_french_officers:0 "Ausländische Beamte"
 QUE_french_officers_desc:0 "Unsere Offiziere lassen viel zu wünschen übrig. Wir sollten ausländische Offiziere einladen, uns bei der Ausbildung unserer eigenen Leute zu helfen und vielleicht sogar an unserer Militärakademie zu unterrichten."
 QUE_engineer_spirit:0 "Ingenieurgeist"
 QUE_engineer_spirit_desc:0 "Wir sollten unsere Armeen anpassen, um die Unterstützungsbrigaden besser nutzen zu können."
 QUE_army_theory:0 "Die Theorien von Trois-Rivières"
 QUE_army_theory_desc:0 "Durch den weiteren Ausbau und die Förderung unserer bereits bestehenden Militärakademien können wir unsere Lehren verbessern."
 QUE_commandos:0 "Forces Spéciales"
 QUE_commandos_desc:0 "Unsere Truppen sind bereits daran gewöhnt, unter rauen klimatischen Bedingungen zu kämpfen. Wir sollten dies fördern, indem wir unsere besten Kräfte noch weiter ausbilden, damit diese Bedingungen für unsere Truppen eher ein Segen als ein Nachteil sind."
 QUE_bombardier_limited:0 "L&#39;Auto-Neige Bombardier Limitée"
 QUE_bombardier_limited_desc:0 "Wir sollten dieses Unternehmen fördern. Es stellt bereits Schneemobile her, bei denen sich die vorderen Skier leicht in Räder umbauen lassen. Dies könnte unseren Truppen als vielseitige motorisierte oder sogar mechanisierte Infanterie zur Verfügung gestellt werden. Darüber hinaus verspricht das Unternehmen, ein rentabler Flugzeughersteller zu werden, sofern es die entsprechenden Mittel dazu hat."
 QUE_bombardier_b12:0 "Bombardier B12"
 QUE_bombardier_b12_desc:0 "Dank unserer Investitionen ist es Bombardier gelungen, eine mechanisierte Variante seiner Schneemobile namens „B12“ zu produzieren. Wir sollten umgehend mit der Einführung dieser Variante beginnen, um unsere Bemühungen zu unterstützen."
 QUE_montreal_locomotive_works:0 "Montrealer Lokomotivwerke"
 QUE_montreal_locomotive_works_desc:0 "Ähnlich wie bei unseren Investitionen in „Bombardier“ sollten wir auch in dieses Unternehmen investieren. Es ist ein erstklassiger Kandidat für die Förderung der Produktion von gezogener Artillerie und leichten Panzern."
 QUE_light_tanks:0 "Leichte Armee, leichte Panzer"
 QUE_light_tanks_desc:0 "Die MLW hat einige Durchbrüche bei der Konstruktion leichter Panzer erzielt und bittet um unsere Erlaubnis, diese einzusetzen. Wir müssen nur unser Wort geben."
 QUE_grand_strategy:0 "Große Strategie"
 QUE_grand_strategy_desc:0 "Eine Armee ist ohne Unterstützung zu Lande und in der Luft nutzlos. Ebenso wenig ist eine Luftwaffe ohne Bodentruppen nutzlos. Um erfolgreich zu sein, müssen unsere Pläne den kombinierten Waffenbestand so effizient wie möglich nutzen."
 QUE_quebec_national_army:0 "Nationalarmee von Québec"
 QUE_quebec_national_army_desc:0 "Endlich haben wir eine echte Armee. Es gibt jedoch noch eine letzte Front: die Heimatfront. Lassen Sie uns die Bevölkerung vereinen und die Bedeutung von Sparmaßnahmen in Kriegszeiten deutlich machen. Mit der vollen Unterstützung der Bevölkerung können wir unseren militärisch-industriellen Komplex bis an seine Grenzen bringen."
 QUE_naval_bombing:0 "Bombardiere ihre Schiffe"
 QUE_naval_bombing_desc:0 "Unsere Marine ist sehr mangelhaft, unsere Luftwaffe hingegen ist sehenswert. Wir sollten sie nutzen, um die feindliche Flotte zu zerstören. Denn was nützt eine Flotte, wenn sie sich nicht einmal wehren kann?"
 QUE_tac_bomber:0 "Schneiden Sie sie ab"
 QUE_tac_bomber_desc:0 "Ähnlich wie ihre Flotten sollten wir auch ihre Produktionsstätten direkt bombardieren. Indem wir ihre Versorgung und Verstärkung unterbrechen, können wir sie aushungern."
 QUE_rule_the_skies:0 "Beherrsche den Himmel"
 QUE_rule_the_skies_desc:0 "Um unsere Bombenangriffe aufrechtzuerhalten, müssen wir unsere Bomber selbst schützen. Deshalb sollten wir auf die Kontrolle des Luftraums drängen, die es uns ermöglicht, sie ungestraft zu bombardieren."


 CAN_east_claims_forts:0 "§YCanada§!: Befestigt die Provinzen und Häfen nahe der Grenze zwischen Labrador und Neufundland\n"
 CAN_west_claims_forts:0 "§YCanada§!: Befestigt die Provinzen und Häfen nahe der Grenze zu [USA.GetNameDef]\n"
 quebecois_propaganda_tooltip:0 "Die Bevölkerung von Québec wird sich irgendwann mit uns einigen und die Forderung nach einer Wehrpflicht vollständig erfüllen.\n§Geduld wird belohnt.§!"
 home_and_native_land_other_effect:0 "Dies könnte dazu führen, dass sich später mehr Freiwillige anmelden.\n"
 quebec_angry:0 "Das Ignorieren der Wünsche Québecs wird §Ranger§! sie\n"
 quebec_extremely_angry:0 "Die Wünsche Québecs zu ignorieren, wird sie §Rgroßen Zorn§!"
 imperial_oil_tooltip:0 "In „Alberta“ werden konzertierte Anstrengungen zur Entdeckung weiterer Ölvorkommen unternommen!\n"
 polymer_corp_tooltip:0 "In „Süd-Ontario“ wird eine konzertierte Anstrengung zur Entwicklung einer Alternative zu Gummi beginnen!\n"
 que_population_migrates_north:0 "§Y300.000§! Menschen werden aus §YSüd-Québec§! nach §YNord-Québec§! migrieren, um der Zunahme von Arbeitsplätzen in zuvor unbebauten Gebieten zu folgen.\n"
 que_claim_french_louisiana:0 "Sie erhalten Kerne auf ganz §YFranzösisch-Louisiana§!\n"
 canada_leaves_allies_tooltip:0 "Kanada wird §Ydie Alliierten verlassen§!\n"
 que_independence_start:0 "Quebec ist unabhängig"

 ### QUE - QUEBEC ###
 QUE_submarine_1:0 "L-Klasse"
 QUE_submarine_1_desc:0 "Die L-Klasse bestand aus mittelgroßen Booten, die ursprünglich im Rahmen des Emergency War Program als verbesserte Version der vorherigen U-Boot-Klassen geplant waren. Sie wurden in der Spätphase des Ersten Weltkriegs gebaut und mit neuen, größeren 21-Zoll-Torpedos ausgestattet. Sie dienten bis zum Beginn des Zweiten Weltkriegs und wurden dann hauptsächlich für sekundäre und Ausbildungszwecke eingesetzt."
 QUE_submarine_2:0 "T-Klasse"
 QUE_submarine_2_desc:0 "Die Boote der T-Klasse bzw. Triton-Klasse wurden als Ersatz für die großen U-Boote der O-, P- und R-Klasse entwickelt. Es handelte sich um mittelgroße U-Boote mit großer Reichweite, die sich gut für den Atlantik und den Pazifik eigneten. Diese Boote waren gut bewaffnete, stabile Plattformen und wurden während des Konflikts häufig eingesetzt, da 25 Prozent der gebauten Boote im Krieg verloren gingen."
 QUE_submarine_3:0 "U-Klasse"
 QUE_submarine_3_desc:0 "Die U-Klasse bestand aus kleinen U-Booten, die im Rahmen der Kriegsnotstandsprogramme 1940 und 1941 gebaut wurden. Ursprünglich als Trainings-U-Boote konzipiert, wurde das Design bei Kriegsausbruch geändert, sodass sich diese U-Boote in den engen Gewässern der Nordsee und des Mittelmeers als nützlich erwiesen. Aufgrund ihrer geringeren Größe waren ihre Reichweite und ihre Bewaffnung begrenzt. Die Klasse bestand aus drei Unterklassen: Undine, Umpire und Uproar."
 QUE_submarine_4:0 "V-Klasse"
 QUE_submarine_4_desc:0 "Die U-Boote der V-Klasse oder Vampire-Klasse basierten auf den kleineren Booten der Vorgängerklasse U. Sie waren größer, aber immer noch relativ klein und verfügten über bessere Seetüchtigkeit, jedoch eine begrenzte Reichweite und Bewaffnung."
 QUE_destroyer_1:0 "V/W-Klasse"
 QUE_destroyer_1_desc:0 "Zu diesen Zerstörern gehörten die Admirality- und Thornycroft-Klassen V und W. Sie wurden im Rahmen des War Emergency Program gebaut. Sie stellten die ultimative Weiterentwicklung des britischen Zerstörerdesigns während des Ersten Weltkriegs dar und verkörperten die Verbesserungen ihrer Vorgänger sowie neue technologische Fortschritte. In der Spätphase des Ersten Weltkriegs wurden diese Schiffe in großer Zahl gebaut und bildeten danach das Rückgrat der Zerstörerflottillen der Royal Navy. Ab den 1930er Jahren wurden sie in Reserveflotten eingesetzt und schließlich nur noch zur Konvoibegleitung eingesetzt. Es handelte sich um ausreichend bewaffnete, schnelle Schiffe mit guter Reichweite."
 #QUE_destroyer_1b: "Sanguenay Class"
 QUE_destroyer_2:0 "Ottawa-Klasse"
 QUE_destroyer_2_desc:0 "Die Ottawa-Klasse war die kanadische Bezeichnung für die britischen Zerstörer der G-, H- und I-Klasse, die im Rahmen der Marinebauprogramme 1933 und 1934 bestellt wurden. Sie waren im Wesentlichen Wiederholungen der vorhergehenden F-Klasse, nur etwas kleiner. Die Bewaffnung der G- und H-Klassen war dieselbe wie die der F-Klasse, wobei beide 4,7-Zoll-Geschütze verwendeten. Diese Schiffe hatten eine große Reichweite, waren ausreichend bewaffnet und verfügten über eine starke Torpedobewaffnung. Sie wurden während des Krieges ausgiebig eingesetzt und erlitten zahlreiche Verluste."
 #QUE_destroyer_2b: "Athabaskan Class"
 QUE_destroyer_3:0 "J/K/N-Klasse"
 QUE_destroyer_3_desc:0 "Die Klassen J, K und N ähnelten der früheren Tribal-Klasse, doch statt der Geschützbewaffnung setzten die Konstrukteure auf eine Standardbewaffnung mit schweren Torpedos und leichteren Geschützen. Die Schiffe wurden während ihres Kriegseinsatzes modifiziert. Zu den Upgrades gehörten verbesserte Flugabwehrgeschütze und Radar. Es handelte sich um schnelle, weitreichende und gut bewaffnete Schiffe, die sich ideal für Flottenbegleitschiffe eigneten."
 QUE_destroyer_4:0 "Algonquin-Klasse"
 QUE_destroyer_4_desc:0 "Die Algonquin-Klasse war die kanadische Bezeichnung für britische Zerstörer der Battle-Klasse. Die Schiffe wurden im Rahmen der Marineprogramme 1942 und 1943 bestellt. Sie waren sowohl mit Geschützen als auch mit Torpedos gut bewaffnet. Ihre Flugabwehr, ihre Fähigkeiten zur U-Boot-Abwehr, ihre Geschwindigkeit und ihre Reichweite machten sie zu vielseitigen Schiffen. Ihr später Kriegseinsatz führte zu einem minimalen Beitrag."
 QUE_light_cruiser_1:0 "C-Klasse"
 QUE_light_cruiser_1_desc:0 "Die Leichten Kreuzer der C-Klasse waren eine Gruppe von 28 Leichten Kreuzern der Royal Navy. Sie wurden vor und während des Ersten Weltkriegs für die rauen Bedingungen der Nordsee gebaut. Obwohl sie relativ klein und beengt waren, erwiesen sie sich als robuste und leistungsfähige Schiffe. Ihre Bewaffnung war mehr als zufriedenstellend: Sie trugen genügend 6-Zoll-Geschütze, um feindliche Oberflächenziele zu bekämpfen, und eine schwere Torpedoladung, um feindliche Schiffe und Konvois zu vernichten. Sie wurden im Ersten Weltkrieg ausgiebig eingesetzt und waren an vielen Überwasseraktionen beteiligt. Nur eine begrenzte Anzahl der Schiffe überlebte die Verschrottung vor dem Ersten Weltkrieg. Nur die Unterklassen Caledon, Ceres und Carlisle waren Mitte der 1930er Jahre im Einsatz."
 QUE_light_cruiser_2:0 "Southampton-Klasse"
 QUE_light_cruiser_2_desc:0 "Die Leichten Kreuzer der Southampton-Klasse waren eine Unterklasse der Kreuzer der Town-Klasse und wurden als Gegenstück zu den japanischen Kreuzern der Mogami-Klasse entwickelt. Diese Schiffe waren gut gepanzert, verfügten über eine gute Geschwindigkeit und Reichweite und trugen eine beeindruckende Bewaffnung mit zwölf 6-Zoll-Geschützen in vier Drillingstürmen. Sie bildeten die Grundlage für viele spätere Leichte-Kreuzer-Entwürfe der Royal Navy während des Krieges."
 QUE_light_cruiser_3:0 "Quebec-Klasse"
 QUE_light_cruiser_3_desc:0 "Die Quebec-Klasse war die kanadische Bezeichnung für die Leichten Kreuzer der britischen Crown Colony-Klasse. Es handelte sich um verbesserte Versionen der früheren Town-Klasse, jedoch mit vereinfachtem Design, um den Bau zu beschleunigen und Kosten zu senken. Die Schiffe trugen die gleiche Bewaffnung wie ihre Vorgänger, vier Drillingstürme mit 6-Zoll-Geschützen. Sie waren ähnlich gepanzert, hatten aber aufgrund ihrer kleineren Motoren eine etwas geringere Reichweite. Der Typ umfasste zwei Unterklassen – Fiji und Ceylon."
 QUE_light_cruiser_4:0 "Ontario-Klasse"
 QUE_light_cruiser_4_desc:0 "Die Ontario-Klasse war die kanadische Bezeichnung für die britischen leichten Kreuzer der Minotaur-Klasse (oder Swiftsure-Klasse). Diese Kreuzer wurden als modifizierte Version der Crown Colony-Klasse konzipiert und enthielten 1941 genehmigte Kriegsmodifikationen. Sie verfügten über eine größere Reichweite und mehr Flugabwehrwaffen als die Crown Colony-Klasse, während die Hauptbewaffnung auf drei Drillingstürme reduziert war."
 QUE_heavy_cruiser_1:0 "Hawkins-Klasse"
 QUE_heavy_cruiser_1_desc:0 "Die Kreuzer der Hawkins-Klasse waren die ersten schweren Kreuzer der Welt. Sie basierten auf den früheren leichten Kreuzern der Town-Klasse, insbesondere der Birmingham-Unterklasse, waren jedoch mit 7,5-Zoll-Geschützen und einem dickeren Panzergürtel ausgestattet. Sie wurden für den Kampf gegen die großen deutschen Konvoi-Angreifer entwickelt. Sie waren gut bewaffnet, verfügten über eine angemessene Geschwindigkeit und Reichweite und waren gut geschützt. Insgesamt wurden fünf Schiffe in Dienst gestellt, aber nur vier waren zu Beginn des Zweiten Weltkriegs im Einsatz."
 QUE_heavy_cruiser_2:0 "Surrey-Klasse"
 QUE_heavy_cruiser_2_desc:0 "Die Schweren Kreuzer der Surrey-Klasse wurden im Rahmen des Marineprogramms von 1928 vorgeschlagen. Sie waren verbesserte Versionen der früheren Schweren Kreuzer der York-Klasse. Wären sie fertiggestellt worden, wären sie mit vier 8-Zoll-Zwillingstürmen, schwererer Panzerung und stärkeren Motoren ausgestattet gewesen. Zwei Schiffe wurden bestellt, aber keines wurde auf Kiel gelegt."
 QUE_heavy_cruiser_3:0 "Admiral-Klasse"
 QUE_heavy_cruiser_3_desc:0 "Die Schweren Kreuzer der Admiral-Klasse (nicht zu verwechseln mit den Schlachtkreuzern der Admiral-Klasse) waren der letzte Versuch der Royal Navy, Kreuzer mit 8-Zoll-Geschützen zu konstruieren und zu bauen. Die Designstudien begannen 1938 und endeten 1941. Sie führten zu verschiedenen Entwürfen. Die endgültigen Entwürfe beinhalteten neue 8-Zoll-Geschütze in Drillingstürmen, schwere Flugabwehr, dicke Panzerung und hohe Geschwindigkeit. Der Mangel an feindlichen Kreuzern und die Kosteneffizienz dieser Schiffe führten dazu, dass man sich stattdessen auf den Bau weiterer leichter Kreuzer konzentrierte."
 QUE_heavy_cruiser_4:0 "Churchill Design"
 QUE_heavy_cruiser_4_desc:0 "Diese Schiffe wurden von Sir Winston Churchill, Lord der Admiralität, zu Beginn des Zweiten Weltkriegs als Gegenstück zu den schweren Kreuzern der Deutschland-Klasse vorgeschlagen. Sie sollten über 9,2-Zoll-Kanonen, schwere Flugabwehr und starke Panzerung verfügen. Sie sollten die feindlichen Großkampfschiffe effektiv bekämpfen. Aufgrund der hohen Kosten und der mangelnden Nachfrage nach neuen schweren Kreuzern wurde der Bau der Schiffe schließlich eingestellt. "
 QUE_battle_cruiser_1:0 "Ansehensklasse"
 QUE_battle_cruiser_1_desc:0 "Die Schlachtkreuzer der Renown-Klasse wurden ursprünglich als verbesserte Versionen der Schlachtschiffe der Revenge-Klasse auf Kiel gelegt. Ihr Bau wurde bei Ausbruch des Ersten Weltkriegs eingestellt. Admiral Lord Fisher gelang es, den Bau als Schlachtkreuzer wiederaufzunehmen. Diese Schiffe waren der Inbegriff eines Schlachtkreuzers. Sie waren gut bewaffnet, schnell und wendig, hatten aber eine dünnere Panzerung und eine geringere Einsatzreichweite. Nur zwei der ursprünglich drei Schiffe, Repulse und Renown, wurden fertiggestellt."
 QUE_battle_cruiser_2:0 "Princess Royal-Klasse"
 QUE_battle_cruiser_2_desc:0 "Die Princess Royal war eine Klasse hypothetischer Schlachtkreuzer, die eine schnellere und günstigere Version der Schlachtschiffe der King George V-Klasse darstellten. Diese Schiffe verfügten über eine ähnliche, aber reduzierte Bewaffnung für den Überwasser- und Luftkampf: zwei 14-Zoll-Drillingskanonen und sechs 5,25-Zoll-Zwillings-Flugabwehrgeschütze. Ihre hohe Geschwindigkeit und große Reichweite würden der Royal Navy schnelle Angriffsfähigkeiten und Konvoischutz ermöglichen, ihre eingeschränkte Panzerung würde sich jedoch im Kampf gegen moderne Schlachtschiffe als problematisch erweisen."
 QUE_battleship_1:0 "Queen Elizabeth-Klasse"
 QUE_battleship_1_desc:0 "Die Schlachtschiffe der Queen-Elizabeth-Klasse wurden im Rahmen des Marineprogramms von 1912 bestellt. Diese Schiffe waren die ersten, die mit 15-Zoll-Geschützen ausgestattet waren und galten als die ersten schnellen Schlachtschiffe. Sie trugen schwere Bewaffnung für Haupt- und Nebenaufgaben, und ihre dicke Panzerung machte diese Schiffe zu hervorragenden Kriegsschiffen, ideal zum Schutz des riesigen Britischen Empires. Sechs Schiffe wurden bestellt, aber nur fünf wurden in Dienst gestellt und später vor dem Zweiten Weltkrieg modernisiert."
 QUE_battleship_2:0 "King George V-Klasse"
 QUE_battleship_2_desc:0 "Die Schlachtschiffe der King-George-V-Klasse waren das Ergebnis der Washingtoner Flottenverträge von 1922 und des Ersten Londoner Flottenvertrags von 1930, die die maximale Verdrängung und Artillerie von Großkampfschiffen beschränkten. Daher waren diese Schiffe mit Kanonen kleineren Kalibers ausgestattet als frühere und sogar zeitgenössische Schlachtschiffe. Trotz des geringeren Kalibers waren die Schiffe ausreichend bewaffnet, verfügten über starke Flugabwehrwaffen und waren ausreichend geschützt. Fünf Schiffe wurden als Ersatz für die alten Schlachtschiffe der Queen-Elizabeth-Klasse bestellt und auf Kiel gelegt."
 QUE_battleship_3:0 "Löwenklasse"
 QUE_battleship_3_desc:0 "Die Schlachtschiffe der Lion-Klasse waren die Nachfolgemodelle der King George V und übernahmen viele ihrer Merkmale. Im Rahmen des Marineprogramms von 1938 wurden sechs Schiffe bestellt, um die alternden Schlachtschiffe der Revenge-Klasse zu ersetzen. Aufgrund der ausbrechenden Feindseligkeiten wurde jedoch keines fertiggestellt. Die Schiffe sollten im Großen und Ganzen der King George-Klasse ähneln, die Hauptbewaffnung sollte jedoch schwerer sein und eine neue 16-Zoll-Kanone enthalten. Sie sollten außerdem über eine dickere Panzerung und stärkere Motoren verfügen."
 QUE_battleship_4:0 "Vanguard-Klasse"
 QUE_battleship_4_desc:0 "Das Schlachtschiff der Vanguard-Klasse war das letzte Schlachtschiff, das für die Royal Navy gebaut wurde. Es wurde nur ein einziges Schiff bestellt, vier weitere wurden jedoch für den Pazifikkrieg in Betracht gezogen. Der Bau wurde im Rahmen des Emergency War Program von 1940 in Auftrag gegeben, hatte jedoch keine hohe Priorität und wurde erst nach dem Krieg fertiggestellt. Die Klasse hatte einen schlanken Rumpf, der ihr ausgezeichnete Stabilität und Seetüchtigkeit verlieh. Die Bewaffnung entsprach der der Schlachtschiffe der Queen Elizabeth- und Revenge-Klasse und bot beträchtliche Feuerkraft. Starke Motoren und eine gute Panzerung machten das Schiff schnell und gut geschützt."
 QUE_SH_battleship_1:0 "Centurion-Klasse"
 QUE_SH_battleship_1_desc:0 "Die Centurion war eine Klasse hypothetischer schwerer Schlachtschiffe der Royal Navy, die als Gegenstück zu den großen Schiffen der deutschen und japanischen Marine gebaut wurden. Große 18-Zoll-Geschütze und eine dicke Panzerung verliehen dem Schiff die nötige Feuerkraft und den nötigen Schutz, um diese Schiffe zu bekämpfen. Starke Flugabwehr, große Reichweite und hohe Geschwindigkeit waren unerlässlich, um die weiten Meere des Britischen Empires zu bezwingen."
 QUE_SH_battleship_2:0 "Lion II-Klasse"
 QUE_SH_battleship_2_desc:0 "Die Schlachtschiffe der Lion-II-Klasse wurden 1944 als verbesserte Version der früheren Lion-Klasse entworfen. Die Erfahrungen aus dem Krieg wurden in diesen Entwurf einfließen gelassen, der größer und schwerer war und nach Fertigstellung entweder drei oder vier 16-Zoll-Drillingsgeschütze des neuesten Typs tragen sollte. Dicke Panzerplatten schützten das Schiff vor Angriffen von oben und aus der Luft. Die hohen Baukosten, die Niederlagen feindlicher Flotten und der Bedarf an Flugzeugträgern führten zum Abbruch des Projekts."
 QUE_carrier_1:0 "Mutige Klasse"
 QUE_carrier_1_desc:0 "Diese drei Flugzeugträger waren umgebaute Schlachtkreuzer und die ersten Flottenträger der Royal Navy. Ihr Umbau war das Ergebnis des Washingtoner Flottenabkommens von 1922 und wurde 1925 abgeschlossen. Es handelte sich um mäßig gepanzerte, aber gut bewaffnete Schiffe mit großer Reichweite und guter Geschwindigkeit, allerdings war ihre Flugzeugbesatzung aufgrund des Umbaus begrenzt. Dennoch brachten sie der Royal Navy wichtige Erfahrungen im Flugzeugträgerbau und in der Flottenluftprojektion."
 QUE_carrier_2:0 "Ark Royal-Klasse"
 QUE_carrier_2_desc:0 "Der Flugzeugträger Ark Royal war das erste Schiff dieser Art, das den Auflagen des Washingtoner Flottenabkommens entsprach. Er war das erste Schiff, bei dem Hangars und Flugdeck integraler Bestandteil des Rumpfes waren. Das 1934 entworfene Schiff war gut gepanzert und bewaffnet. Es transportierte eine große Anzahl von Flugzeugen und verfügte über ausreichend Reichweite und Geschwindigkeit, um mit den Hauptstreitkräften der Royal Navy mitzuhalten."
 QUE_carrier_3:0 "Illustre Klasse"
 QUE_carrier_3_desc:0 "Die Illustrious-Klasse wurde unter den Bedingungen des Zweiten Londoner Flottenabkommens von 1936 entworfen, das die Größe der Träger auf maximal 23.000 Tonnen begrenzte. Sie war der erste britische Träger mit einem gepanzerten Flugdeck, was die Größe der Luftgruppe reduzierte. Schwere Panzerung und Flugabwehr sorgten für eine starke Verteidigung der Schiffe, während leistungsstarke Motoren und ein großer Treibstoffvorrat den Schiffen eine große Einsatzreichweite ermöglichten."
 QUE_carrier_4:0 "Unerbittliche Klasse"
 QUE_carrier_4_desc:0 "Die Flugzeugträger der Implacable-Klasse wurden im Rahmen des Marineprogramms von 1938 bestellt und waren im Wesentlichen verbesserte Versionen der früheren Illustrious-Klasse. Der Krieg und die Verlagerung der Priorität auf kleinere Schiffe für Konvoischutzaufgaben in der frühen und mittleren Kriegsphase verlangsamten die Reduzierung dieser Schiffe. Es handelte sich um größere Schiffe, die mehr Flugzeuge transportieren konnten und gleichzeitig eine dicke Panzerung an Rumpf und Flugdeck aufwiesen. Stärkere Motoren ermöglichten ihnen im Vergleich zur Illustrious-Klasse eine höhere Geschwindigkeit und Reichweite."

 QUE_motorized_equipment_1:0 "Kanadisches Militärmuster"
 QUE_motorized_equipment_1_short:0 "CMP"
 QUE_motorized_equipment_1_desc:0 "Der CMP war die Bezeichnung für kanadische Lastwagen, die von Chevrolet, Ford Kanada und staatlichen Unternehmen hergestellt wurden. Sie wurden für Transport, Versorgung und Versorgung eingesetzt."

 QUE_mechanized_equipment_1:0 "M3 Weiß"
 QUE_mechanized_equipment_1_short:0 "M3 Weiß"
 QUE_mechanized_equipment_1_desc:0 "Eine frühere Version der Halbkettenfahrzeuge, hohe Geschwindigkeit und geringe Kapazität. Wird häufig bei den Streitkräften des Commonwealth eingesetzt."

 QUE_mechanized_equipment_2:0 "C15TA"
 QUE_mechanized_equipment_2_short:0 "C15TA"
 QUE_mechanized_equipment_2_desc:0 "Ein gepanzerter LKW, der schweres Gerät und Infanterie transportieren kann. Geplante Modifikationen umfassten eine Halbkettenvariante sowie eine Vollkettenvariante für unwegsames Gelände und Nordkanada."

 QUE_mechanized_equipment_3:0 "Widderkänguru"
 QUE_mechanized_equipment_3_short:0 "Känguru"
 QUE_mechanized_equipment_3_desc:0 "Ein zum gepanzerten Mannschaftstransportwagen umgebauter Ram-Panzer. Er war so erfolgreich, dass er von allen Streitkräften des Commonwealth übernommen wurde."

 QUE_gw_tank_equipment:0 "M1917"
 QUE_gw_tank_equipment_short:0 "M17"
 QUE_gw_tank_equipment_desc:0 "Kanada kaufte und erhielt von den USA etwa zweihundert M1917 zum Schrottpreis und verwendete sie zur Ausrüstung seiner ersten Panzertruppen."

 QUE_light_tank_equipment_1:0 "Vickers Licht"
 QUE_light_tank_equipment_1_short:0 "Vickers Licht"
 QUE_light_tank_equipment_1_desc:0 "Vickers Canada baute eine komplette Serie dieser leichten Panzer, darunter auch eine frühere Tankette. Der Standard und am häufigsten produzierte Panzer war der Vickers Light VI."

 QUE_light_tank_equipment_2:0 "Matilda"
 QUE_light_tank_equipment_2_short:0 "Matilda"
 QUE_light_tank_equipment_2_desc:0 "Eine große Anzahl Matildas wurde in kanadischen Fabriken hergestellt, die meisten gingen für den britischen Einsatz ins Ausland, der Rest blieb als Trainingspanzer erhalten."

 QUE_light_tank_equipment_3:0 "Valentinstag VI"
 QUE_light_tank_equipment_3_short:0 "Valentinstag"
 QUE_light_tank_equipment_3_desc:0 "Kanada produzierte Hunderte von Valentinskarten für das Leih- und Pachtprogramm, viele davon landeten in der Sowjetunion."

 QUE_light_tank_artillery_equipment_1:0 "2/3 Zoll Mörserträger"
 QUE_light_tank_artillery_equipment_1_short:0 "Mörserträger"
 QUE_light_tank_artillery_equipment_1_desc:0 "Ein 2-Pfünder-Mörser oder 3-Zoll-Mörser im offenen Chassis eines früheren Modells."

 QUE_light_tank_artillery_equipment_2:0 "Matilda Close-Unterstützung"
 QUE_light_tank_artillery_equipment_2_short:0 "Matilda CS"
 QUE_light_tank_artillery_equipment_2_desc:0 "Eine Matilda, bewaffnet mit einer 3-Zoll-QF-Haubitze."

 QUE_light_tank_artillery_equipment_3:0 "Valentin Bishop"
 QUE_light_tank_artillery_equipment_3_short:0 "Bischof"
 QUE_light_tank_artillery_equipment_3_desc:0 "Ein QF 25 pdr, montiert auf einem Valentine-Chassis, eine leistungsstarke selbstfahrende Waffe."

 QUE_light_tank_destroyer_equipment_1:0 "2-Pfünder-Träger"
 QUE_light_tank_destroyer_equipment_1_short:0 "Träger 2pdr"
 QUE_light_tank_destroyer_equipment_1_desc:0 "Der 2-Pfünder-Träger war ein Panzerabwehrumbau des Carden-Lloyd-Chassis und später der Windsor- und Vicker-Kanone."

 QUE_light_tank_destroyer_equipment_2:0 "Matilda, der schwarze Prinz"
 QUE_light_tank_destroyer_equipment_2_short:0 "Matilda, der schwarze Prinz"
 QUE_light_tank_destroyer_equipment_2_desc:0 "Eine größere Kanone, die auf der Matilda montiert ist und den Turm eines Centaur verwendet."

 QUE_light_tank_destroyer_equipment_3:0 "Valentin Archer"
 QUE_light_tank_destroyer_equipment_3_short:0 "Bogenschütze"
 QUE_light_tank_destroyer_equipment_3_desc:0 "Der Archer verwendet die leistungsstarke QF 17-Pfünder-Kanone und seine niedrige Silhouette verschafft ihm einen Vorteil."

 QUE_light_tank_aa_equipment_1:0 "Vickers-Luftabwehr"
 QUE_light_tank_aa_equipment_1_short:0 "Vickers Light AA"
 QUE_light_tank_aa_equipment_1_desc:0 "Vier 15-mm-Besa-Maschinengewehre in einem modifizierten Turm auf einem Vickers Light Mk VI."

 QUE_light_tank_aa_equipment_2:0 "Matilda Bofors"
 QUE_light_tank_aa_equipment_2_short:0 "Matilda Bofors"
 QUE_light_tank_aa_equipment_2_desc:0 "Ein Konzept, bei dem ein 40-mm-Bofors auf dem Matilda-Panzer montiert wird, indem der Turm und Teile des Fahrgestells entfernt oder ein modifizierter Turm eingebaut wird."

 QUE_light_tank_aa_equipment_3:0 "Kreuzfahrer-Luftabwehr"
 QUE_light_tank_aa_equipment_3_short:0 "Kreuzfahrer AA"
 QUE_light_tank_aa_equipment_3_desc:0 "Doppelte 20-mm-Oerlikon-Geschütze, montiert in einem modifizierten Turm."

 QUE_medium_tank_equipment_1:0 "Ram I"
 QUE_medium_tank_equipment_1_short:0 "RAM"
 QUE_medium_tank_equipment_1_desc:0 "Der Ram war ein in Kanada entwickelter und produzierter Panzer, von dem über 2.000 Stück hergestellt wurden. Es wurden mehrere Varianten hergestellt, wie zum Beispiel der Ram II, der Skink und der Sexton."

 QUE_medium_tank_equipment_2:0 "Grizzly I"
 QUE_medium_tank_equipment_2_short:0 "Grizzly"
 QUE_medium_tank_equipment_2_desc:0 "Eine kanadische Version des M4 Sherman mit besserer Panzerung und effizienterem Design. Produktion ab 1942."

 QUE_medium_tank_equipment_3:0 "Zentaur"
 QUE_medium_tank_equipment_3_short:0 "Zentaur"
 QUE_medium_tank_equipment_3_desc:0 "Der Centaur war eine Konkurrenzversion des Cromwell, der hauptsächlich verwendete Centaur war der Centaur IV. "

 QUE_medium_tank_artillery_equipment_1:0 "Küster I"
 QUE_medium_tank_artillery_equipment_1_short:0 "Küster"
 QUE_medium_tank_artillery_equipment_1_desc:0 "Der Sexton war eine sehr erfolgreiche Selbstfahrlafette. Er basierte auf dem Fahrgestell des Ram."

 QUE_medium_tank_artillery_equipment_2:0 "Küster II"
 QUE_medium_tank_artillery_equipment_2_short:0 "Küster II"
 QUE_medium_tank_artillery_equipment_2_desc:0 "Der Sexton II war ein Umbau des Grizzly-Chassis und verwendete die QF 25pdr."

 QUE_medium_tank_artillery_equipment_3:0 "Zentaur IV"
 QUE_medium_tank_artillery_equipment_3_short:0 "Zentaur IV"
 QUE_medium_tank_artillery_equipment_3_desc:0 "Ein Centaur, bewaffnet mit einer 95-mm-Haubitze."

 QUE_medium_tank_destroyer_equipment_1:0 "Ram QF 3,7 Zoll"
 QUE_medium_tank_destroyer_equipment_1_short:0 "Ram 32pdr"
 QUE_medium_tank_destroyer_equipment_1_desc:0 "Ein Plan, die 3,7-Zoll-Flugabwehrkanone QF auf dem Ram-Chassis zu montieren, um daraus einen Panzerzerstörer zu machen, ist über die Erprobung hinausgegangen."

 QUE_medium_tank_destroyer_equipment_2:0 "QF 17pdr Achilles"
 QUE_medium_tank_destroyer_equipment_2_short:0 "Achilles"
 QUE_medium_tank_destroyer_equipment_2_desc:0 "Ein Motorwagen auf Basis des M4-Chassis, in diesem Fall des Grizzly-Chassis. Er nutzte die 17-Pfünder-Kanone und war ein sehr mobiler Panzerzerstörer."

 QUE_medium_tank_destroyer_equipment_3:0 "Wagenlenker"
 QUE_medium_tank_destroyer_equipment_3_short:0 "Wagenlenker"
 QUE_medium_tank_destroyer_equipment_3_desc:0 "Der FV4104 Charioteer basiert auf dem Fahrgestell von Cromwell und Centaur. Er verwendet eine 20-Pfünder-Kanone."

 QUE_medium_tank_aa_equipment_1:0 "Ram AA Mk I"
 QUE_medium_tank_aa_equipment_1_short:0 "Ram AA „Huot“"
 QUE_medium_tank_aa_equipment_1_desc:0 "Ein Konzept, das die Montage von zwei 20-mm-Polsten-Flugabwehrkanonen vorsieht."

 QUE_medium_tank_aa_equipment_2:0 "Grizzly „Skink“"
 QUE_medium_tank_aa_equipment_2_short:0 "Skink"
 QUE_medium_tank_aa_equipment_2_desc:0 "Der Skink, von dem nur drei Exemplare gebaut wurden, war eine selbstfahrende Flugabwehrkanone mit vier 20-mm-Polsten-Kanonen in einem vollständig geschlossenen Gussturm."

 QUE_medium_tank_aa_equipment_3:0 "Centaur AA Mk I"
 QUE_medium_tank_aa_equipment_3_short:0 "Centaur AA"
 QUE_medium_tank_aa_equipment_3_desc:0 "Ein Umbau des Centaur mit zwei 20-mm-Polsten-Geschützen und den Geschütztürmen Crusader Mk III AA Mk II und Mk III."

 QUE_heavy_tank_equipment_1:0 "Vickers III"
 QUE_heavy_tank_equipment_1_short:0 "Vickers III"
 QUE_heavy_tank_equipment_1_desc:0 "Ein Panzer mit mehreren Türmen, von dem nur drei Stück gebaut wurden. Da das Konzept selbst als Konkurrent zu anderen Panzern mit mehreren Türmen konzipiert war, wurde der Panzer als nutzlos angesehen. Ein gutes „Was wäre wenn“-Beispiel."

 QUE_heavy_tank_equipment_2:0 "Churchill"
 QUE_heavy_tank_equipment_2_short:0 "Churchill"
 QUE_heavy_tank_equipment_2_desc:0 "Die Kanadier stellten zwar ihre eigenen Churchills her, setzten sie jedoch erstmals in Dieppe ein, nachdem sie sie von den Engländern geschenkt bekommen hatten. "

 QUE_heavy_tank_equipment_3:0 "Churchill II Oke"
 QUE_heavy_tank_equipment_3_short:0 "Churchill Oke"
 QUE_heavy_tank_equipment_3_desc:0 "Ein etwas stärkerer Durchbruchpanzer, dessen Sekundärbewaffnung der Ronson-Flammenwerfer ist"

 QUE_heavy_tank_artillery_equipment_2:0 "Churchill Close-Unterstützung"
 QUE_heavy_tank_artillery_equipment_2_short:0 "Churchill CS"
 QUE_heavy_tank_artillery_equipment_2_desc:0 "Ein Churchill V, bewaffnet mit einer 95-mm-Haubitze."

 QUE_heavy_tank_artillery_equipment_3:0 "Churchill AVRE"
 QUE_heavy_tank_artillery_equipment_3_short:0 "Churchill AVRE"
 QUE_heavy_tank_artillery_equipment_3_desc:0 "Ein Entwurf kanadischer Ingenieure nach ihren Erfahrungen in Dieppe."

 QUE_heavy_tank_destroyer_equipment_1:0 "Vickers Alecto"
 QUE_heavy_tank_destroyer_equipment_1_short:0 "Alecto"
 QUE_heavy_tank_destroyer_equipment_1_desc:0 "Obwohl der Alecto nicht auf dem Vickers III-Chassis basierte, basierte er auf einem späteren Vickers-Chassis."

 QUE_heavy_tank_destroyer_equipment_2:0 "Churchill Gun Carrier"
 QUE_heavy_tank_destroyer_equipment_2_short:0 "Churchill 3 Zoll"
 QUE_heavy_tank_destroyer_equipment_2_desc:0 "Die 3,5-Zoll-Kanone (20 cwt) wurde in einer Kugelhalterung im Fahrgestell angebracht. Die Idee war, einen leistungsstarken Panzerzerstörer zu schaffen." 

 QUE_heavy_tank_destroyer_equipment_3:0 "Churchill Black Prince"
 QUE_heavy_tank_destroyer_equipment_3_short:0 "Schwarzer Prinz"
 QUE_heavy_tank_destroyer_equipment_3_desc:0 "Ein Churchill-Panzer mit der tödlichen 17-Pfünder-Kanone." 

 QUE_heavy_tank_aa_equipment_1:0 "Vickers III AA"
 QUE_heavy_tank_aa_equipment_1_short:0 "A6E1"
 QUE_heavy_tank_aa_equipment_1_desc:0 "Der Vickers III mit einem Flugabwehrturm."

 QUE_heavy_tank_aa_equipment_2:0 "Churchill AA"
 QUE_heavy_tank_aa_equipment_2_short:0 "Churchill AA Mk I"
 QUE_heavy_tank_aa_equipment_2_desc:0 "Obwohl es keine Pläne für eine selbstfahrende Flugabwehrkanone auf Basis des Churchill-Chassis gab, könnte man sich vorstellen, dass sie einen Turm verwendet hätte, der für die Aufnahme von Doppel- oder Vierfach-Polsten-Geschützen ausgelegt war."

 QUE_heavy_tank_aa_equipment_3:0 "Churchill 3,7 Zoll"
 QUE_heavy_tank_aa_equipment_3_short:0 "Churchill AA Mk II"
 QUE_heavy_tank_aa_equipment_3_desc:0 "Ein radikales Design, bei dem das Chassis und Teile des Rumpfes entfernt werden, um eine Plattform für die 3,7-Zoll-Luftabwehrkanone von QF zu schaffen."

 QUE_super_heavy_tank_equipment_1:0 "Holzwolle"
 QUE_super_heavy_tank_equipment_1_short:0 "Holzwolle"
 QUE_super_heavy_tank_equipment_1_desc:0 "Nach dem verheerenden Angriff auf Dieppe gab es Zweifel am Churchill und seinen Fähigkeiten. Es wurde ein besserer Infanterie- und Schwerpanzer vorgeschlagen."

 QUE_modern_tank_equipment_1:0 "Zenturio"
 QUE_modern_tank_equipment_1_short:0 "Zenturio"
 QUE_modern_tank_equipment_1_desc:0 "Der Centurion wurde bis weit in den Kalten Krieg hinein zum wichtigsten Panzer des kanadischen Militärs."

 QUE_modern_tank_artillery_equipment_1:0 "FV 3082"
