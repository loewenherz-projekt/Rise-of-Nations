RON_Post_WW2_desc:0 "Der Landkampf nach dem Zweiten Weltkrieg veränderte sich, wobei eine bessere Ausbildung und Führung wichtiger waren als zuvor."
RON_CW_Field_Command_Centers_desc:0 "Durch die Ansiedlung von Kommandozentralen vor Ort werden unsere Truppen effektiver und unsere Kommunikationswege kürzer. Dadurch werden unsere Streitkräfte besser organisiert."
RON_CW_Mass_Assaults_desc:0 "Wir sollten enorme Mengen an Arbeitskräften einsetzen, um unsere Truppen zu verstärken und unseren Feind zu überwältigen."
RON_CW_NCO_Battalions_desc:0 "Die Aufnahme von Unteroffizieren in unsere Reihen wird unsere Ausgaben erhöhen, aber es wird sich lohnen, da sie unsere Truppen besser und organisierter machen werden."
RON_CW_Radio_Coordination_desc:0 "Die Koordinierung unserer Angriffe durch Funk wird von entscheidender Bedeutung sein. Sowohl für unsere Streitkräfte als auch für unser Kommando"
RON_CW_Advanced_Recon_Groups_desc:0 "Spezialisierte, auf Aufklärung trainierte Einheiten sind von großem Nutzen, um die Präsenz feindlicher Truppen an Orten zu erkennen, die für Flugzeuge und Radar unerreichbar sind."
RON_CW_Defense_In_Depth_desc:0 "Indem wir unseren Ingenieuren und Truppen tiefe Verteidigungstaktiken beibringen, werden unsere Linien undurchdringlich und wir sind in der Lage, jeden Angriff des Feindes auf uns abzuwehren."
RON_CW_Gradual_Advance_desc:0 "Indem wir uns auf einen langsamen, aber stetigen Vormarsch konzentrieren, können wir sicherstellen, dass wir das gewonnene Gebiet verteidigen und unsere Logistik und Versorgungslinien aufrechterhalten."
RON_CW_Mobilised_Warfare_desc:0 "Der Schlüssel zum Sieg in jedem Krieg liegt in der Konzentration auf mobile Taktiken, bei denen wir unseren Feind überflügeln. Die Ausbildung unserer Panzer- und mechanisierten Einheiten hierfür ist entscheidend."
RON_CW_Armoured_Walls_desc:0 "Die Grundlage unserer Bodenstrategie bilden Panzerwälle, die unseren Feind flankieren und ihm überlegen sind. So können Infanterieeinheiten den Feind überwältigen, während die Panzer ihnen überlegen sind."
RON_CW_Advanced_Squads_desc:0 "Trupps, die darauf trainiert sind, tief in das feindliche Gebiet vorzudringen und dort Durchbrüche zu erzielen, können die Organisation des Feindes beeinträchtigen und an der Frontlinie Verwirrung stiften."
RON_CW_Flexible_Front_Lines_desc:0 "Wenn unsere Divisionen auf Geschwindigkeit setzen, werden sie unsere Feinde überraschen und schnelle Durchbrüche erzielen."
RON_CW_Mechanised_Supply_Lines_desc:0 "Der Einsatz mechanisierter Einheiten zur Versorgung der Front wird zwar teuer, aber schnell sein. Dadurch wird das Risiko beseitigt, dass unsere Einheiten nicht über ausreichende Vorräte verfügen."
RON_CW_Rapid_Encirclement_desc:0 "Wir können die Lehren aus dem Zweiten Weltkrieg ziehen und sie in unserer modernen Umgebung umsetzen. Das Einkreisen von Einheiten führt zur Erschöpfung der feindlichen Arbeitskräfte und ermöglicht Durchbrüche. "
RON_CW_Warfare_At_A_Distance_desc:0 "Warum sollten Soldaten sterben, wenn sie ihren Feind aus der Ferne vernichten können? Durch die Verbesserung unserer Artillerie werden die Verluste reduziert und unsere Einheiten effektiver. "
RON_CW_Long_Range_Spotting_desc:0 "Durch die Ausstattung unserer Aufklärungskompanien mit Instrumenten mit großer Reichweite werden sie effektiver und können den Feind schneller erkennen."
RON_CW_Target_Designation_desc:0 "Wenn wir uns auf einen Schwachpunkt an der Front konzentrieren, können wir enorme Ressourcen auf einen Bereich konzentrieren und so einen Durchbruch sicherstellen."
RON_CW_Pre_Emptive_Barrages_desc:0 "Warum warten, bis der Feind sich eingelebt und organisiert hat? Präventive Sperrfeuer verhindern, dass es sich der Feind vor unserer Front zu bequem macht, und erhöhen gleichzeitig die Tödlichkeit."
RON_CW_Flexible_Strikes_desc:0 "Unsere Armee muss jederzeit wachsam bleiben und den Feind in Manövern und Waffen ausstechen. Eine an einem Ende der Frontlinie stationierte Armee muss in der Lage sein, innerhalb weniger Tage an das andere Ende zu gelangen."
RON_CW_Selective_Destruction_desc:0 " Der Schlüssel zum Sieg liegt darin, die Schwachstellen der feindlichen Linien zu erkennen und zu beseitigen. Wir müssen dafür sorgen, dass unsere Armee dieser Aufgabe gewachsen ist."

