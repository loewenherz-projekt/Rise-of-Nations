tank_railgun_cannon:0 "Railgun-Kanone"
tank_railgun_cannon_desc:0 "This specialized cannon fires shells via charged magnetic rails, instead of using explosive powder, bypassing the limits of chemical propellant. Extremely effective against even the thickest armor, but expensive and fragile to use.
tank_rolled_armor:0 "Gerollte Rüstung"
tank_rolled_armor_desc:0 "Bei gewalzten Panzerungen werden gewalzte Metalle verwendet, die im Gegensatz zu gegossenen Panzerungen nicht zersplittern und so Treffern von großkalibrigen, schwereren Granaten besser standhalten können."
tank_carbon_armor:0 "Nano-Carbon-Panzerung"
tank_carbon_armor_desc:0 "Ein Segen der Postmoderne: Die hochentwickelte Nano-Carbon-Panzerung besteht aus Nano-Kohlenstoff. Diese speziellen Materialien auf Kohlenstoffbasis sind dichter und weitaus widerstandsfähiger gegen Dehnung und Biegung als selbst die härtesten Legierungen."
tank_composite_armor:0 "Verbundpanzerung"
tank_composite_armor_desc:0 "Verbundschirme sind eine spezielle Panzerungsart, die aus mehreren Materialien besteht, normalerweise aus dichten Legierungen und Fasern, um panzerbrechende Geschosse abzuwehren."
reactive_armor:0 "Reaktive Panzerung"
reactive_armor_desc:0 "Reaktive Panzerung besteht entweder aus einer Reihe leichter Platten aus Metall und elastischen Fasern oder aus Blöcken mit Sprengladungen, um den Aufprall von Raketen zu absorbieren."
tank_spaced_armor:0 "Schottpanzerung"
tank_spaced_armor_desc:0 "Bei der Abstandspanzerung handelt es sich um eine Methode zur Schwächung von Hohlladungsgeschossen und Sprengraketen. Dabei wird eine dünne Abstandsplatte verwendet, um das Geschoss zu zünden, bevor es den Panzer trifft, und so die Wirkung auf den Panzer abzuschwächen."
rounded_armor:0 "Abgerundete Rüstung"
rounded_armor_desc:0 "Abgerundete Panzerung ist einfach eine Panzerung mit abgerundeten Kanten. Abgerundete Kanten erhöhen die Wahrscheinlichkeit, dass eine Granate von der Kante der Panzerplatte abprallt, wodurch die Überlebenschancen des Panzers bei einem Treffer leicht erhöht werden."
tank_armor_1a:0 "Genietete Rüstung"
tank_armor_1a_desc:0 "Genietete Panzerung ist eine frühe Methode, schwere Panzerplatten an einem Fahrzeug anzubringen. Dicke Panzerung erfordert schnellere, schwerere und dünnere Granaten, um sie zu durchdringen. Dies erhöht die Überlebenschancen des Panzers, allerdings auf Kosten der Geschwindigkeit."
tank_armor_1b:0 "Verbesserte genietete Panzerung"
tank_armor_1b_desc:0 "By shaving down the rivets and bolts, we can lower the chance that a loose rivet will kill crew, if hit by an enemy's shell.
tank_armor_2a:0 "Panzerforschung im Ersten Weltkrieg"
tank_armor_2a_desc:0 "Wenn unsere Panzerbesatzungen bessere Chancen haben sollen, von unserem nächsten Feldzug nach Hause zu kommen, brauchen sie beim Überqueren der Schützengräben unserer Feinde einen gewissen Schutz."
tank_armor_2b:0 "Verbesserte Rüstung aus dem Ersten Weltkrieg"
tank_armor_2b_desc:0 "Eine abgeschrägte Frontpanzerung bietet besseren Schutz gegen die einfachen Haubitzen, die in den 1910er Jahren an den Panzern montiert waren und nicht für die Zerstörung von Panzern, sondern von Festungen gedacht waren."
tank_armor_3b:0 "Fortgeschrittene Rüstungsforschung"
tank_armor_3b_desc:0 "Die Erforschung von Panzerungstechnologien hat sich als erfolgreich erwiesen, doch wenn wir mit unseren Feinden mithalten wollen, müssen wir unsere Panzer leichter und robuster machen."
tank_armor_3a:0 "Geschweißte Panzerung"
tank_armor_3a_desc:0 "Geschweißte Panzerung, die von einem Facharbeiter geschweißt wird, ist genieteter Panzerung weit überlegen und kann in Formen gebogen werden, die der aktuellen Realität des Panzer-gegen-Panzer-Kampfes besser entsprechen."
tank_armor_3b:0 "Verbesserte geschweißte Panzerung"
