RON_Post_WW2_Navy_desc:0 ""
RON_CW_Radar_Coordination_desc:0 "Der Zweite Weltkrieg hat uns gezeigt, wie wichtig Radar für die Erkennung, Integration und Koordination mit unseren Marinen ist."
RON_CW_Single_Ship_Sweeps_desc:0 "Schlachtschiffe können für eine Vielzahl von Operationen eingesetzt werden, aber was wäre, wenn wir sie für Patrouillen und zum Räumen verwenden würden?"
RON_CW_Picket_Ships_desc:0 "U-Boote, die außerhalb der Hauptschlacht stationiert sind, um den Rückzug feindlicher Flotten zu verhindern und diese zu zerstören, sind unerwartet und effektiv."
RON_CW_Dedicated_Search_Patterns_desc:0 "Maschinelles Lernen und Algorithmen haben uns gezeigt, dass bestimmte Suchmuster besonders effektiv sind. Wenn wir unseren Seeleuten diese Muster beibringen, können wir schneller erkennen."
RON_CW_Destroyer_Packs_desc:0 "Im Zweiten Weltkrieg wurden U-Boot-Pakete eingeführt, aber warum können Zerstörer das nicht auch? Schnelle und wendige Schiffe, günstig in der Herstellung und mit Feuerkraft ausgestattet, sorgen dafür, dass feindliche Schiffe oder Konvois nicht in Bedrängnis geraten."
RON_CW_General_Purpose_Ships_desc:0 "Der Bau mehrerer Schiffe für unterschiedliche Einsätze ist schwierig und kostspielig. Was wäre also, wenn wir unsere Zerstörer so konstruieren würden, dass sie alles können?"
RON_CW_Independent_Patrols_desc:0 "Eine einzige Schiffspatrouille wird unsere Aufklärungsgeschwindigkeit nicht verringern, aber die Anzahl der für unsere Patrouillen benötigten Schiffe wird reduziert. Schiffe sind teuer und müssen für andere Operationen eingesetzt werden."
RON_CW_Strategic_Sub_Placement_desc:0 "U-Boote sind in bestimmten Tiefen und Gewässern nachweislich effektiver. Um unsere U-Boote so effektiv wie möglich zu machen, müssen wir sicherstellen, dass sie diese Platzierungstaktiken befolgen."
RON_CW_Sub_Patrols_desc:0 "U-Boote sind bekanntermaßen schwer zu entdecken. Wir werden dies zu unserem Vorteil nutzen und sie für Patrouillenfahrten einsetzen. Dadurch erhöhen wir unsere Aufklärungsgeschwindigkeit und stellen sicher, dass wir dem Feind zwei Schritte voraus sind."
RON_CW_Evasive_Diving_Manouvers_desc:0 "Wenn ein U-Boot mit einem größeren Schiff in Kontakt kommt, müssen wir ihm Ausweichmanöver beim Tauchen beibringen, bei denen es tief untertaucht, um Torpedos auszuweichen. Dadurch verringert sich die Wahrscheinlichkeit, dass unsere U-Boote Torpedos abbekommen und zerstört werden. "
RON_CW_City_Killers_desc:0 "Unsere Flugzeugträger sind tödliche Tötungsmaschinen und unsere Flugzeuge können davon nur profitieren."
RON_CW_Preventive_Patrols_desc:0 "Durch präventive Patrouillen wird sichergestellt, dass es keinem U-Boot gelingt, unentdeckt vorbeizukommen und unsere Konvois und Schiffe zu zerstören."
RON_CW_Dual_Wolfpacks_desc:0 "Ein U-Boot-Wolfsrudel hat sich als effektiv erwiesen, aber wie wäre es mit zwei? Mit zwei Wolfsrudeln wären unsere U-Boote extrem tödlich."
RON_CW_Combat_Air_Presence_desc:0 "Flugzeugträger gelten als das Rückgrat moderner Marinen. Wir müssen lernen, die feindliche Luftpräsenz wirksam zu bekämpfen, wenn wir gegen diese Giganten eine Chance haben wollen."
RON_CW_247_ASW_desc:0 ""
RON_CW_Independent_ASW_Squadrons_desc:0 ""
RON_CW_Flight_Deck_Partitioning_desc:0 "Derzeit nutzen alle Flugzeugtypen die gleiche Start- und Landebahn, die sehr unorganisiert ist. Durch die Unterteilung unserer Start- und Landebahnen würden unsere Flugzeugträger besser organisiert und effizienter."
RON_CW_Carrier_Centered_Battle_Groups_desc:0 "Der Flugzeugträger ist das nützlichste Schiff, das uns zur Verfügung steht. Wir müssen ihn zum Zentrum unserer Kampfgruppe machen, um sicherzustellen, dass wir seine Leistungsfähigkeit voll ausschöpfen."
RON_CW_Helicopter_Cover_desc:0 "Der Einsatz von Hubschraubern zur Luftunterstützung bei See- und Luftkämpfen wird uns einen Schub geben."

