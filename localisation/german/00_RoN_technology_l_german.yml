RON_Post_WW2_Air_desc:0 "Die Luftkriegsführung hat nach dem Zweiten Weltkrieg einen massiven Wandel durchgemacht. Mit der Einführung von Düsenflugzeugen wird die Luftkriegsführung, wie wir sie kennen, nie mehr dieselbe sein."
RON_CW_Patrol_Sectors_desc:0 "Die Bildung von Patrouillensektoren mit einer zentralisierten Kommunikationsstruktur wird unsere Flugzeugerkennung verbessern"
RON_CW_Mass_Air_Coverage_desc:0 "Durch radargestützte Flugzeugschwärme wird unsere Luftraumüberwachung noch besser."
RON_CW_Rocket_Wall_desc:0 "Durch die Modernisierung der Raketenwände unserer Bomber werden unsere Bombenangriffe effizienter."
RON_CW_Evasive_Formations_desc:0 "Wenn wir unseren Piloten Ausweichformationen beibringen, werden wir im Kampf effektiver sein."
RON_CW_Mass_Drops_desc:0 "Wenn wir mehrere Formationen strategischer Bomber haben, die den Feind massenhaft bombardieren, wird unsere Effektivität steigen."
RON_CW_Disposable_Modules_desc:0 "Einwegmodule erhöhen unsere Kampfeffektivität, sodass wir schneller sein und mehr Schaden anrichten können."
RON_CW_Helicopter_Swarms_desc:0 "Wenn mehrere Helikopterstaffeln den Feind umzingeln, wird dies die Unterstützung unserer Bodentruppen erhöhen und ihre Effektivität steigern."
RON_CW_Sole_Patrols_desc:0 "Eine einzelne Patrouille ist gefährlicher, aber auch weniger sichtbar, was unsere Erkennung am Himmel verbessert."
RON_CW_Full_Fueling_desc:0 "Die Zeiten, in denen wir unsere Flugzeuge mit halbvollem Treibstoff ins All schickten, um sie vor einem Abschuss zu schützen, sind längst vorbei. Mit vollem Tank halten sie länger und steigern so ihre Kampfkraft."
RON_CW_Dive_Bombing_desc:0 "Der Sturzflug unserer Kampfflugzeuge kann riskant sein, doch wenn es richtig gemacht wird, wird es unsere Luftmacht erheblich steigern."
RON_CW_Missile_Bombing_desc:0 "Durch den Einbau von Raketensystemen in unsere Kampfflugzeuge werden diese im Kampf unschlagbar."
RON_CW_Buddy_Buddy_Fueling_desc:0 "Durch ein Buddy-Fueling-System halten unsere Kampfflugzeuge noch länger, steigern ihre Effizienz und reduzieren den Bedarf an Betankungsabwürfen."
RON_CW_Target_Boxes_desc:0 "Durch das Hinzufügen eines einfachen Zielfelds zu unserer Bombenschnittstelle werden unsere Bomber präziser."
RON_CW_Painted_Targets_desc:0 "Durch das Hinzufügen von gemalten Zielen zu unserem Schnittstellensystem wird das Eigenfeuer reduziert und unsere Unterstützungsflugzeuge werden schneller und tödlicher."
RON_CW_High_Alt_Bombing_desc:0 "Früher war die Genauigkeit durch Bombenangriffe aus großer Höhe geringer, doch dank raketengelenkter Systeme sind unsere Bomber dadurch nicht mehr zu entdecken."
RON_CW_Radar_Penetration_desc:0 "Um Luftschlachten zu gewinnen, ist es entscheidend, sicherzustellen, dass unser Feind das Radar nicht durchdringt. Wir müssen die Integrität unserer Radare sicherstellen, indem wir ihnen Flugzeugunterstützung geben."
RON_CW_Air_Bridges_desc:0 "Luftbrücken, die unsere Bodentruppen versorgen, werden ihren Versorgungsbedarf im Falle einer Einkesselung erheblich reduzieren. Das Problem wird dadurch jedoch nicht gelöst."
RON_CW_Air_Artillery_desc:0 "Der Einsatz großkalibriger Geschütze in unserer Bodentruppe wird deren Tödlichkeit erheblich erhöhen und viele feindliche Bodentruppen vernichten."
RON_CW_Mass_Carpeting_desc:0 "Durch den Massenangriff mehrerer Luftgeschwader werden die Tödlichkeit und der Schaden erhöht und die Städte des Feindes verwüstet."

