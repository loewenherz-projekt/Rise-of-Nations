 RON_ATS_desc:0 "Eine Luft-Boden-Rakete (ASM) oder Luft-Boden-Rakete (AGM) ist ein Flugkörper, der von Militärflugzeugen auf Ziele an Land oder auf See abgefeuert werden kann. Es gibt auch lenkbare Gleitbomben ohne Antrieb, die nicht als Raketen gelten. Die beiden gängigsten Antriebssysteme für Luft-Boden-Raketen sind Raketentriebwerke, meist mit geringerer Reichweite, und langsamere Düsentriebwerke mit größerer Reichweite. Einige Luft-Boden-Raketen sowjetischer Bauart werden von Staustrahltriebwerken angetrieben, die ihnen sowohl große Reichweite als auch hohe Geschwindigkeit verleihen."
