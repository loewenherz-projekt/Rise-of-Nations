ray_gun_equipment_1_desc:0 "Das Aussehen der Strahlenkanone erinnert an eine typische Strahlenkanone aus Science-Fiction-Filmen der 50er Jahre. Die Strahlenkanone ist aufgrund ihrer One-Hit-Kill-Stärke (je nach Spiel bis zu Runde 20–25) eine beliebte Waffe. Sie wird manchmal wegen ihres Flächenschadens nicht gemocht, daher kaufen viele Spieler PhD Flopper. Obwohl sie auf große Entfernungen weniger effektiv ist (da sich der Strahl im Vergleich zu anderen Waffen langsam bewegt), ist sie punktgenau. Auf beiden Dead Ops Arcade-Karten verursacht die Strahlenkanone keinerlei Flächenschaden."
thundergun_equipment_1_desc:0 "Die Thundergun ist eine große, kanonenförmige Waffe, die Stöße unglaublich starker Druckluft abfeuert. Sie hat kein Visier und muss daher aus der Hüfte abgefeuert werden (in der Third-Person-Perspektive wird sie jedoch an der Schulter gehalten). Sie kann eine große Anzahl von Zombies mit einem einzigen Schuss töten und sie nach hinten oder oben schleudern. Diejenigen, die nicht durch die Explosion getötet werden, werden nach hinten geschleudert und bleiben einige Sekunden am Boden liegen, bevor sie wieder aufstehen. Das Magazin der Thundergun fasst zwei Schuss und verfügt über zwölf Schuss in Reserve. Die Thundergun kann erst nachgeladen werden, wenn alle Schüsse abgefeuert wurden."
ray_gun_equipment_2_desc:0 "Höherer Flächenschaden, mehr Munition, Tarnung hinzugefügt."
thundergun_equipment_2_desc:0 "Größeres Magazin und mehr Munition, mehr Reichweite und größerer Radius."
anti_zombie_motorized_equipment_1_desc:0 "Zombiesicherer Truck."
anti_zombie_mechanized_equipment_1_desc:0 "Zombiesicherer gepanzerter Mannschaftstransportwagen."

