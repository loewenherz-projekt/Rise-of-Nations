 RON_ASHM_desc:0 "Anti-Schiffs-Raketen (AShM) sind Lenkflugkörper, die für den Einsatz gegen Schiffe und große Boote konzipiert sind. Die meisten Anti-Schiffs-Raketen sind vom Typ „Sea Skimming“ und nutzen eine Kombination aus Trägheitslenkung und aktiver Radarzielsuche. Zahlreiche andere Anti-Schiffs-Raketen nutzen Infrarot-Zielsuche, um der von einem Schiff abgegebenen Wärme zu folgen. Anti-Schiffs-Raketen können auch durchgehend per Funk gesteuert werden."
 RON_ASHM2_desc:0 "Anti-Schiffs-Raketen (AShM) sind Lenkflugkörper, die für den Einsatz gegen Schiffe und große Boote konzipiert sind. Die meisten Anti-Schiffs-Raketen sind vom Typ „Sea Skimming“ und nutzen eine Kombination aus Trägheitslenkung und aktiver Radarzielsuche. Zahlreiche andere Anti-Schiffs-Raketen nutzen Infrarot-Zielsuche, um der von einem Schiff abgegebenen Wärme zu folgen. Anti-Schiffs-Raketen können auch durchgehend per Funk gesteuert werden."
