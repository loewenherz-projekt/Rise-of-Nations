 RON_ATAM_desc:0 "Eine Luft-Luft-Rakete (AAM) ist eine Rakete, die von einem Flugzeug abgefeuert wird, um ein anderes Flugzeug zu zerstören. AAMs werden typischerweise von einem oder mehreren Raketentriebwerken angetrieben, die in der Regel mit Feststoffen, manchmal aber auch mit Flüssigkeiten betrieben werden."
 RON_ATAM2_desc:0 "Selbstlenkende Raketen suchen und zerstören feindliche Flugzeuge selbstständig, wobei sie häufig einen Infrarotsucher mit Käfig verwenden."
 RON_ATAM3_desc:0 "Uncaged Infrared Seekers und Constant-Wave Radar Seekers haben eine viel größere Reichweite und Wendigkeit als Infrared Seekers, neigen aber zu Störungen."
 RON_ATAM4_desc:0 "Durch unsere Erfahrungen mit dem Start von Satelliten in die Umlaufbahn haben wir viel über die Raketentechnik gelernt, beispielsweise über mehrstufige Raketen für eine größere Reichweite."
 RON_ATAM5_desc:0 "Staustrahltriebwerke sind Strahltriebwerke, die Luft statt flüssiger Flüssigkeit als Oxidationsmittel nutzen. Dadurch können Raketen mehr Treibstoff transportieren und ihre Reichweite deutlich erhöhen, die Leistung in großen Höhen ist jedoch schlechter."
 RON_ATAM6_desc:0 "Data Link lenkt Raketen mithilfe von Informationen von anderen Radargeräten näher an das Ziel und umgeht dabei die Grenzen des Suchers, der von der Rakete getragen wird, was eine unbegrenzte Erfassungsreichweite bedeutet."
 
