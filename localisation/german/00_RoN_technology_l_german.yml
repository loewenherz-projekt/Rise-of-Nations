RON_Adrenaline_Shot_desc:0 "Beseitigt Nahkampfermüdung, ermöglicht dem Spieler, Aktionen schneller auszuführen und verhindert eine Verlangsamung, wenn er von gewöhnlichen Infizierten getroffen wird oder sich im Wasser befindet."
RON_Defibrillator_desc:0 "Belebt einen toten Teamkollegen wieder."
RON_Double_Tap_desc:0 "Double Tap, auch bekannt als Double Tap Root Beer, ist einer der Perk-a-Cola-Automaten auf den Zombie-Karten von Call of Duty: World at War, Call of Duty: ZOMBIES, Call of Duty: Black Ops und Call of Duty: Black Ops Zombies. Dieser Perk erhöht die Feuerrate aller Waffen um ca. 30 %. Der Kauf kostet 2000 Punkte."
RON_Element_115_desc:0 "Divinium (besser bekannt als Element 115) spielt im Nazi-Zombies-Universum eine wichtige Rolle. Es ist die Ursache der Zombies und wird auch zum Antrieb der Teleporter, der Strahlenkanone und der Wunderwaffe DG-2 verwendet. Gruppe 935 versuchte, die Kräfte von Element 115 zu nutzen, um ihre Maschinen anzutreiben und Supersoldaten zu erschaffen, was jedoch kläglich scheiterte und die Zombies hervorbrachte. Es scheint eine große Menge Elektrizität zu erzeugen, wie der Meteorit auf Shi No Numa zeigt, der zur Herstellung und zum Antrieb der von Gruppe 935 entwickelten Geräte und Waffen verwendet wurde."
RON_First_Aid_Kit_desc:0 "Stellt die Gesundheit des Spielers oder seiner Teamkollegen dauerhaft wieder her."
RON_Juggernog_desc:0 "Juggernog ist ein Perk in Call of Duty: World at War und Call of Duty: Black Ops. Er erscheint auf jeder Nazi-Zombie-Karte (außer Nacht der Untoten). Er ist das Zombie-Äquivalent zu Juggernaut. Juggernog kostet 2500 Punkte auf jeder Karte, auf der er verfügbar ist. Nach dem Kauf erhöht er die Gesundheit des Spielers und ermöglicht ihm, mehr Schaden einzustecken (vier Treffer vor Rot, der fünfte bedeutet Tod)."
RON_Monkey_Bombs_desc:0 "Wenn sie scharf gemacht und geworfen wird, explodiert sie nach etwa neun Sekunden und tötet einige der Zombies in der Umgebung. Die Affenbombe hat die einzigartige Fähigkeit, Zombies abzulenken, die gerade keinen Spieler angreifen. Sie ist sehr nützlich in brenzligen Situationen oder wenn ein Verbündeter wiederbelebt werden muss. "
RON_Mystery_Box_desc:0 "Die Mystery Box (auch bekannt als Random Box, Help Box und die Box) ist ein zufälliger Waffengenerator. Die Mystery Box ist eine Holzkiste mit zwei blinkenden goldenen Fragezeichen."
RON_Pack_A_Punch_desc:0 "Pack-a-Punch ist ein Dienstprogramm im Zombies-Modus, das in Der Riese in Call of Duty: World at War eingeführt wurde und in Call of Duty: ZOMBIES, Call of Duty: Black Ops, Call of Duty: Black Ops Zombies, Call of Duty: Black Ops II und Call of Duty: Black Ops III zurückkehrt."
RON_Pain_Pills_desc:0 "Gibt dem Überlebenden einen vorübergehenden Gesundheitsschub, der mit der Zeit nachlässt."
RON_Quick_Revive_desc:0 "Quick Revive oder einfach Revive (oder auf den Postern Revive Soda genannt) ist eine der ersten vier Perk-a-Colas in Zombies."
RON_Ray_Gun_desc:0 "Das Aussehen der Strahlenkanone erinnert an eine typische Strahlenkanone aus Science-Fiction-Filmen der 50er Jahre. Die Strahlenkanone ist aufgrund ihrer One-Hit-Kill-Stärke (je nach Spiel bis zu Runde 20–25) eine beliebte Waffe. Sie wird manchmal wegen ihres Flächenschadens nicht gemocht, daher kaufen viele Spieler PhD Flopper. Obwohl sie auf große Entfernungen weniger effektiv ist (da sich der Strahl im Vergleich zu anderen Waffen langsam bewegt), ist sie punktgenau. Auf beiden Dead Ops Arcade-Karten verursacht die Strahlenkanone keinerlei Flächenschaden."
RON_Ray_Gun_V2_desc:0 "Höherer Flächenschaden, mehr Munition, Tarnung hinzugefügt."
RON_Speed_Cola_desc:0 "Speed Cola ist einer der Perk-a-Cola-Automaten im Nazi-Zombies-Spielmodus von Call of Duty: World at War und Call of Duty: Black Ops. Es handelt sich um die Nazi-Zombies-Variante des Multiplayer-Perks Taschenspielertrick. Der Kauf gewährt dem Spieler zusätzliche Geschwindigkeit bei bestimmten Aktionen wie dem Nachladen und Wiederaufbauen von Barrieren. Die Geschwindigkeit beim Wiederaufbau der Barrieren wird dabei nicht wirklich erhöht, da die Pausenzeit zwischen den Wiederaufbauten gleich bleibt, da die Barrieren erst wieder aufgebaut werden, nachdem der Spieler seine Punkte erhalten hat. Es gibt also keinen Unterschied."
RON_Teleporter_desc:0 "Der MDT (allgemein bekannt als Teleporter) ist ein Gerät und eine spielinterne Nutzlast in Nazi Zombies. Er entstand im Rahmen von Experimenten der Mitglieder der Gruppe 935, Ludvig Maxis und Edward Richtofen. Er erscheint auf den Karten Der Riese, Kino der Toten, &#39;Five&#39;, Dead Ops Arcade und Moon."
RON_Thundergun_desc:0 "Die Thundergun ist eine große, kanonenförmige Waffe, die Stöße unglaublich starker Druckluft abfeuert. Sie hat kein Visier und muss daher aus der Hüfte abgefeuert werden (in der Third-Person-Perspektive wird sie jedoch an der Schulter gehalten). Sie kann eine große Anzahl von Zombies mit einem einzigen Schuss töten und sie nach hinten oder oben schleudern. Diejenigen, die nicht durch die Explosion getötet werden, werden nach hinten geschleudert und bleiben einige Sekunden am Boden liegen, bevor sie wieder aufstehen. Das Magazin der Thundergun fasst zwei Schuss und verfügt über zwölf Schuss in Reserve. Die Thundergun kann erst nachgeladen werden, wenn alle Schüsse abgefeuert wurden."
RON_Zeus_Cannon_desc:0 "Größeres Magazin und mehr Munition, mehr Reichweite und größerer Radius."
RON_Zombie_Mechanized_desc:0 "Zombiesicherer gepanzerter Mannschaftstransportwagen."
