combined_arms2_desc:0 "Panzer-, Infanterie- und Unterstützungseinheiten, die in gut organisierten Teams zusammenarbeiten, sind weitaus effektiver als dieselben Streitkräfte, wenn sie einzeln eingesetzt werden."
 

