zombies_folder:0 "Anti-Zombie-Technologie"
zombies_folder_desc:0 "Die Entdeckung von Divinium wird es uns ermöglichen, große technologische Fortschritte zu erzielen."

RON_Radioactive_Materials:0 "Radioaktive Stoffe"
RON_Radioactive_Materials_desc:0 "Radioaktive Materialien werden von Forschern verwendet, um neue Medikamente, Technologien und Verfahren zu entwickeln und zu testen, die Pflanzen, Tieren und Menschen zugutekommen. Forschungslabore müssen bei der Bestellung, Lagerung, Verwendung und Entsorgung radioaktiver Materialien strenge Regeln einhalten."
RON_Radiography:0 "Röntgen"
RON_Radiography_desc:0 "Die Radiographie ist ein bildgebendes Verfahren, bei dem Röntgenstrahlen, Gammastrahlen oder ähnliche ionisierende und nichtionisierende Strahlung eingesetzt werden, um das Innere eines Objekts zu betrachten. Zu den Anwendungsgebieten der Radiographie gehören die medizinische (diagnostische und therapeutische) und die industrielle Radiographie."
RON_Nuclear_Fission:0 "Kernspaltung"
RON_Nuclear_Fission_desc:0 "In der Kernphysik und Kernchemie ist die Kernspaltung eine Kernreaktion bzw. ein radioaktiver Zerfallsprozess, bei dem sich der Atomkern in zwei oder mehr kleinere, leichtere Kerne spaltet. Der Spaltungsprozess erzeugt häufig Gammaphotonen und setzt selbst für die energetischen Verhältnisse des radioaktiven Zerfalls eine sehr große Energiemenge frei."
RON_Atomic_Research:0 "Atomforschung"
RON_Atomic_Research_desc:0 "Bei der Kernspaltung werden durch die Spaltung des Atoms enorme Energiemengen und eine grenzenlose Zerstörungskraft freigesetzt."
RON_Nuclear_Reactor:0 "Kernreaktor"
RON_Nuclear_Reactor_desc:0 "Dieses Gebäude ermöglicht dem Staat die Produktion von angereichertem Uran zur Verwendung in Atomwaffen."
RON_Nukes:0 "Atombombe"
RON_Nukes_desc:0 "Das Projekt zum Bau einer Atombombe wird zu den geheimsten und schwierigsten Aufgaben gehören, die eine Nation in Angriff nehmen kann. Sollte es jedoch erfolgreich sein, könnte es nicht nur den Verlauf der heutigen Kriege, sondern auch die Zukunft der Welt verändern."
RON_Thermonuclear_Bomb:0 "Thermonukleare Bombe I"
RON_Thermonuclear_Bomb_desc:0 "Eine thermonukleare Waffe, Fusionswaffe oder Wasserstoffbombe (H-Bombe) ist eine Kernwaffe der zweiten Generation. Ihre höhere Komplexität verleiht ihr eine deutlich höhere Zerstörungskraft als Atombomben der ersten Generation, eine kompaktere Größe, eine geringere Masse oder eine Kombination dieser Vorteile. Die Eigenschaften von Kernfusionsreaktionen ermöglichen die Verwendung von nicht spaltbarem abgereichertem Uran als Hauptbrennstoff der Waffe und ermöglichen so eine effizientere Nutzung seltener spaltbarer Materialien wie Uran-235 (U-235) oder Plutonium-239 (Pu-239)."
RON_Thermonuclear_Bomb2:0 "Thermonukleare Bombe II"
RON_Thermonuclear_Bomb2_desc:0 "Eine thermonukleare Waffe, Fusionswaffe oder Wasserstoffbombe (H-Bombe) ist eine Kernwaffe der zweiten Generation. Ihre höhere Komplexität verleiht ihr eine deutlich höhere Zerstörungskraft als Atombomben der ersten Generation, eine kompaktere Größe, eine geringere Masse oder eine Kombination dieser Vorteile. Die Eigenschaften von Kernfusionsreaktionen ermöglichen die Verwendung von nicht spaltbarem abgereichertem Uran als Hauptbrennstoff der Waffe und ermöglichen so eine effizientere Nutzung seltener spaltbarer Materialien wie Uran-235 (U-235) oder Plutonium-239 (Pu-239)."
RON_Thermonuclear_Bomb3:0 "Thermonukleare Bombe III"
RON_Thermonuclear_Bomb3_desc:0 "Eine thermonukleare Waffe, Fusionswaffe oder Wasserstoffbombe (H-Bombe) ist eine Kernwaffe der zweiten Generation. Ihre höhere Komplexität verleiht ihr eine deutlich höhere Zerstörungskraft als Atombomben der ersten Generation, eine kompaktere Größe, eine geringere Masse oder eine Kombination dieser Vorteile. Die Eigenschaften von Kernfusionsreaktionen ermöglichen die Verwendung von nicht spaltbarem abgereichertem Uran als Hauptbrennstoff der Waffe und ermöglichen so eine effizientere Nutzung seltener spaltbarer Materialien wie Uran-235 (U-235) oder Plutonium-239 (Pu-239)."
RON_Neutron_Bomb:0 "Neutronenbombe"
RON_Neutron_Bomb_desc:0 "Eine Neutronenbombe, offiziell als eine Art verstärkte Strahlungswaffe (ERW) definiert, ist eine thermonukleare Waffe mit geringer Sprengkraft, die darauf ausgelegt ist, die tödliche Neutronenstrahlung in der unmittelbaren Umgebung der Explosion zu maximieren und gleichzeitig die physikalische Kraft der Explosion selbst zu minimieren."
RON_Improved_Miniaturization:0 "Verbesserte Miniaturisierung"
RON_Improved_Miniaturization_desc:0 "Durch kleinere Sprengköpfe können unsere Raketen weniger wiegen und größere Entfernungen zurücklegen."
RON_Orbital_Launch_Site:0 "Orbitaler Startplatz"
RON_Orbital_Launch_Site_desc:0 "Eine Startrampe in der Umlaufbahn unseres Planeten ermöglicht eine höhere Effizienz beim Zielen und Starten von Raketen."
RON_Antimatter_Bomb:0 "Antimateriebombe"
RON_Antimatter_Bomb_desc:0 "Eine Antimateriewaffe ist ein theoretisch mögliches Gerät, das Antimaterie als Energiequelle, Treibmittel oder Sprengstoff für eine Waffe nutzt. Antimateriewaffen können derzeit noch nicht hergestellt werden, da die Produktionskosten für Antimaterie (geschätzt 63 Billionen Dollar pro Gramm) äußerst gering sind, die Technologie zur Herstellung von Antimaterie in ausreichender Menge für den Einsatz in Waffen äußerst begrenzt ist und Antimaterie bei Kontakt mit normaler Materie zerfällt, was eine Eindämmung sehr schwierig macht."
RON_MIRV:0 "MIRV"
RON_MIRV_desc:0 "Ein Mehrfach-Wiedereintrittsfahrzeug (MIRV) ist eine Rakete mit mehreren Sprengköpfen, die jeweils auf ein anderes Ziel ausgerichtet werden können. Der Begriff wird fast immer mit Interkontinentalraketen mit thermonuklearen Sprengköpfen in Verbindung gebracht, auch wenn er nicht ausschließlich auf diese beschränkt ist. Im Gegensatz dazu ist ein Einheitssprengkopf ein einzelner Sprengkopf auf einer einzelnen Rakete. Ein Zwischenfall ist das Mehrfach-Wiedereintrittsfahrzeug (MRV), das mehrere Sprengköpfe trägt, die zwar verteilt, aber nicht einzeln ausgerichtet sind."
RON_MHD_Department:0 "MHD-Abteilung"
RON_MHD_Department_desc:0 "Ein magnetohydrodynamischer Generator (MHD-Generator) ist ein magnetohydrodynamischer Konverter, der einen Brayton-Zyklus nutzt, um Wärmeenergie und kinetische Energie direkt in Elektrizität umzuwandeln. MHD-Generatoren unterscheiden sich von herkömmlichen elektrischen Generatoren dadurch, dass sie ohne bewegliche Teile (z. B. keine Turbine) arbeiten, um die Obertemperatur zu begrenzen."
RON_Nuclear_Reactor_MK1:0 "Kernreaktor MK1"
RON_Nuclear_Reactor_MK1_desc:0 "Kernenergie ist die Nutzung von Kernreaktionen, bei denen Kernenergie zur Erzeugung von Wärme freigesetzt wird. Diese Wärme wird dann meist in Dampfturbinen zur Stromerzeugung in einem Kernkraftwerk genutzt. Kernenergie kann durch Kernspaltung, Kernzerfall und Kernfusion gewonnen werden."
RON_Tomahawk_Reactor:0 "Tomahawk-Reaktor"
RON_Tomahawk_Reactor_desc:0 "Kernenergie ist die Nutzung von Kernreaktionen, bei denen Kernenergie zur Erzeugung von Wärme freigesetzt wird. Diese Wärme wird dann meist in Dampfturbinen zur Stromerzeugung in einem Kernkraftwerk genutzt. Kernenergie kann durch Kernspaltung, Kernzerfall und Kernfusion gewonnen werden."
RON_Fission_Reactor1:0 "Spaltreaktor 1"
RON_Fission_Reactor1_desc:0 "Kernenergie ist die Nutzung von Kernreaktionen, bei denen Kernenergie zur Erzeugung von Wärme freigesetzt wird. Diese Wärme wird dann meist in Dampfturbinen zur Stromerzeugung in einem Kernkraftwerk genutzt. Kernenergie kann durch Kernspaltung, Kernzerfall und Kernfusion gewonnen werden."
RON_Fission_Reactor2:0 "Spaltreaktor 2"
RON_Fission_Reactor2_desc:0 "Kernenergie ist die Nutzung von Kernreaktionen, bei denen Kernenergie zur Erzeugung von Wärme freigesetzt wird. Diese Wärme wird dann meist in Dampfturbinen zur Stromerzeugung in einem Kernkraftwerk genutzt. Kernenergie kann durch Kernspaltung, Kernzerfall und Kernfusion gewonnen werden."
RON_Fission_Reactor3:0 "Spaltreaktor 3"
RON_Fission_Reactor3_desc:0 "Kernenergie ist die Nutzung von Kernreaktionen, bei denen Kernenergie zur Erzeugung von Wärme freigesetzt wird. Diese Wärme wird dann meist in Dampfturbinen zur Stromerzeugung in einem Kernkraftwerk genutzt. Kernenergie kann durch Kernspaltung, Kernzerfall und Kernfusion gewonnen werden."
RON_EPR_Technology:0 "EPR-Technologie"
RON_EPR_Technology_desc:0 "Der EPR ist ein Druckwasserreaktor der dritten Generation. Er wurde hauptsächlich von Framatome (von 2001 bis 2017 Teil von Areva) und Électricité de France (EDF) in Frankreich sowie Siemens in Deutschland entwickelt. In Europa hieß dieser Reaktortyp „European Pressurised Reactor“, international hieß er „Evolutionary Power Reactor“. Heute heißt er schlicht „EPR“."
RON_Fusion_Reactor:0 "Fusionsreaktor"
RON_Fusion_Reactor_desc:0 "Fusionsenergie ist eine vorgeschlagene Form der Energieerzeugung, die Strom durch die Nutzung der Wärme aus Kernfusionsreaktionen erzeugt. Bei einem Fusionsprozess verbinden sich zwei leichtere Atomkerne zu einem schwereren Kern und setzen dabei Energie frei. Anlagen zur Nutzung dieser Energie werden als Fusionsreaktoren bezeichnet."

