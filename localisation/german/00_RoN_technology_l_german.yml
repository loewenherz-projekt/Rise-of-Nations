 RON_STAM_desc:0 "Eine Boden-Luft-Rakete (SAM), auch Boden-Luft-Rakete (GTAM) oder Boden-Luft-Lenkwaffe (SAGW) genannt, ist eine Rakete, die vom Boden aus abgefeuert wird, um Flugzeuge oder andere Raketen zu zerstören. Sie ist eine Art Flugabwehrsystem; in modernen Streitkräften haben Raketen die meisten anderen Formen dedizierter Flugabwehrwaffen ersetzt, wobei Flugabwehrkanonen in spezialisierte Rollen gedrängt wurden."
