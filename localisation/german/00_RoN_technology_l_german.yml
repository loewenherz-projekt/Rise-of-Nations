RON_Early_Rocketry_desc:0 "Moderne Raketen entstanden, als Goddard eine Überschalldüse an der Brennkammer eines Flüssigkeitsraketentriebwerks anbrachte. Diese Düsen wandeln das heiße Gas aus der Brennkammer in einen kühleren, hypersonischen, stark gerichteten Gasstrahl um, wodurch der Schub mehr als verdoppelt und der Triebwerkswirkungsgrad von 2 % auf 64 % gesteigert wurde. Am 16. März 1926 startete Robert Goddard in Auburn, Massachusetts, die erste Flüssigkeitsrakete der Welt."
RON_Pulsoreactors_desc:0 "Ein Pulsstrahltriebwerk ist ein pulsierendes Strahltriebwerk. Der erste Prototyp wurde 1917 vom Ingenieur Ramón Casanova i Danés aus Girona entwickelt und patentiert und konnte in Autos und Flugzeuge eingebaut werden.1 Es war der erste in Serie produzierte Reaktor für die Kriegsführung. Das Modell Argus I wurde speziell für den Antrieb der V1-Flugbombe entwickelt."
RON_Integrated_Guidance_System_desc:0 "Ein Leitsystem ist ein virtuelles oder physisches Gerät oder eine Gruppe von Geräten, die einen Leitprozess implementieren, der zur Steuerung der Bewegung von Schiffen, Flugzeugen, Raketen, Satelliten oder anderen beweglichen Objekten dient. Bei der Lenkung werden die Änderungen von Position, Geschwindigkeit, Lage und/oder Rotationsgeschwindigkeit eines beweglichen Objekts berechnet, die erforderlich sind, um einer bestimmten Flugbahn und/oder einem bestimmten Lageprofil zu folgen. Dabei werden Informationen über den Bewegungszustand des Objekts verwendet."
RON_Experimental_Rockets_desc:0 "Durch die Weiterentwicklung der Raketenwissenschaft durch die Verbesserung der Reichweite und Zuverlässigkeit von Flüssigtreibstoffraketen werden wir genug über die Technologie lernen, um den Bau von Startplätzen für modernere Modelle zu ermöglichen."
RON_Rocket_Engines_desc:0 "Das Wissen über Raketenantriebe erreicht einen Punkt, an dem wir fliegende Bomben und raketengetriebene Flugzeuge bauen können, die mit bisher unerreichbaren Geschwindigkeiten fliegen."
RON_Jet_Engines_desc:0 "Das Jet-Triebwerk stellt einen Durchbruch in der Antriebstechnologie dar und wird die Entwicklung einer völlig neuen Flugzeuggeneration ermöglichen."
RON_Improved_Rocket_Engines_desc:0 "Die Zukunft der Raketentechnik eröffnet Möglichkeiten wie Interkontinentalraketen, deren Reichweite kaum Grenzen kennt, während die Nutzlasten immer tödlicher werden."
RON_Advanced_Rocket_Engines_desc:0 "Die ersten ballistischen Langstreckenraketen können gebaut und immer präziser gemacht werden, sodass sie weit entfernte feindliche Städte und sogar den Weltraum erreichen können."
RON_Multi_Staged_Rockets_desc:0 "Eine mehrstufige Rakete (auch Stufenrakete genannt) ist eine Trägerrakete mit zwei oder mehr Raketenstufen, die jeweils über eigene Triebwerke und Treibstoff verfügen. Eine Tandem- oder Serienstufe ist übereinander montiert, eine Parallelstufe neben einer anderen. Das Ergebnis sind zwei oder mehr übereinander gestapelte oder nebeneinander befestigte Raketen. Zweistufige Raketen sind weit verbreitet, es wurden jedoch auch Raketen mit bis zu fünf separaten Stufen erfolgreich gestartet."
RON_Develop_Missiles_desc:0 "Im Militärjargon ist eine Rakete, auch Lenkflugkörper genannt, eine gelenkte, luftgestützte Fernkampfwaffe mit Eigenantrieb, meist mit einem Strahltriebwerk oder Raketenantrieb. Raketen bestehen aus vier Systemkomponenten: Ziel-/Leitsystem, Flugsystem, Triebwerk und Sprengkopf. Es gibt verschiedene Typen von Raketen für unterschiedliche Zwecke: Boden-Boden- und Luft-Boden-Raketen (ballistische, Marschflugkörper, Schiffsabwehrraketen, Panzerabwehrraketen usw.), Boden-Luft-Raketen (und Antiballistikraketen), Luft-Luft-Raketen und Antisatellitenwaffen."
RON_First_Satellite_desc:0 "Satelliten werden für viele Zwecke eingesetzt. Unter anderem können sie zur Erstellung von Sternenkarten und Karten von Planetenoberflächen sowie zur Aufnahme von Bildern von Planeten verwendet werden, zu denen sie gestartet werden. Gängige Typen sind militärische und zivile Erdbeobachtungssatelliten, Kommunikationssatelliten, Navigationssatelliten, Wettersatelliten und Weltraumteleskope. Auch Raumstationen und bemannte Raumfahrzeuge im Orbit zählen zu den Satelliten."
RON_Early_Spy_Satellite_desc:0 "Durch sorgfältiges Scannen und Überwachen der Umgebung kann der Spionagesatellit jederzeit über die Aktivitäten in der Umgebung berichten. Dies geschieht durch die Erstellung eines dreidimensionalen digitalen Bildes mit Techniken, die von den hochspezialisierten Sonarfähigkeiten der Lebewesen auf diesem Planeten inspiriert sind."
RON_Modernization_desc:0 "Die neuesten Fortschritte in der Raketentechnologie werden es uns ermöglichen, weiter zu kommen, als wir es je für möglich gehalten hätten."
RON_Reusability_Era_desc:0 "„Wenn man Raketen genauso effektiv wiederverwenden kann wie Flugzeuge, könnten die Kosten für den Zugang zum Weltraum um das Hundertfache sinken. Ein vollständig wiederverwendbares Fahrzeug gab es noch nie zuvor. Das ist der grundlegende Durchbruch, der den Zugang zum Weltraum revolutionieren wird.“ – Elon Musk"
RON_Life_Support_desc:0 "Ein Lebenserhaltungssystem ist eine Gruppe von Geräten, die einem Menschen das Überleben im Weltraum ermöglichen. Die US-Raumfahrtbehörde NASA und private Raumfahrtunternehmen verwenden zur Beschreibung dieser Systeme den Begriff „Environmental Control and Life-Support System“ (ECLSS). Das Lebenserhaltungssystem kann Luft, Wasser und Nahrung liefern. Es muss außerdem die richtige Körpertemperatur und einen akzeptablen Druck auf den Körper aufrechterhalten und die Abfallprodukte des Körpers abtransportieren. Auch ein Schutz vor schädlichen äußeren Einflüssen wie Strahlung und Mikrometeoriten kann erforderlich sein. Die Komponenten des Lebenserhaltungssystems sind lebenswichtig und werden unter Anwendung von Sicherheitstechniken entwickelt und konstruiert."
RON_Manned_Orbital_Flights_desc:0 "Ein orbitaler Raumflug (oder Orbitalflug) ist ein Raumflug, bei dem ein Raumfahrzeug auf eine Flugbahn gebracht wird, auf der es mindestens eine Umlaufbahn lang im Weltraum bleiben kann."
RON_Interplanetary_Probes_desc:0 "Eine Raumsonde ist ein robotisches Raumfahrzeug, das nicht die Erde umkreist, sondern den Weltraum erkundet. Eine Raumsonde kann sich dem Mond nähern, den interplanetaren Raum durchqueren, an anderen Planeten vorbeifliegen, sie umkreisen oder auf ihnen landen oder in den interstellaren Raum vordringen."
RON_First_Moon_Flyby_desc:0 "Apollo 13 sollte landen, wurde jedoch aufgrund einer Fehlfunktion an Bord des Raumfahrzeugs auf einen Vorbeiflug beschränkt"
RON_Moon_Soft_Landing_desc:0 "Eine weiche Landung ist im Gegensatz zu einer harten Landung jede Art von Landung eines Flugzeugs, einer Rakete oder eines Raumfahrzeugs, bei der es nicht zu erheblichen Schäden oder Zerstörungen des Fahrzeugs oder seiner Nutzlast kommt."
RON_First_Spacewalk_desc:0 "Am 18. März 1965 verließ der sowjetische Kosmonaut Alexei Leonow als erster Mensch eine Raumkapsel und schwebte, angebunden an sie, frei in der Umlaufbahn – ein Weltraumspaziergang."
RON_Massive_Rockets_desc:0 "Die neuesten Fortschritte in der Raketentechnologie werden es uns ermöglichen, größere und bessere Raketen zu bauen."
RON_Lunar_Modules_desc:0 "Das Apollo-Mondlandemodul, oder einfach Mondlandemodul (LM, ausgesprochen „lem“), ursprünglich Lunar Excursion Module (LEM), war das Landefahrzeug, das im Rahmen des US-amerikanischen Apollo-Programms aus der Mondumlaufbahn zur Mondoberfläche flog. Es war das erste bemannte Raumfahrzeug, das ausschließlich im luftleeren Raum operierte, und ist bis heute das einzige bemannte Fahrzeug, das außerhalb der Erde gelandet ist."
RON_First_Man_On_The_Moon_desc:0 "Apollo 11 war der Raumflug, bei dem erstmals Menschen auf dem Mond landeten."
RON_A_New_Era_desc:0 "Es ist an der Zeit, engere Beziehungen zu SpaceX aufzubauen. Space Exploration Technologies Corp., firmierend als SpaceX, ist ein privater amerikanischer Hersteller von Luft- und Raumfahrtprodukten und Anbieter von Raumtransportdienstleistungen mit Hauptsitz in Hawthorne, Kalifornien. Das Unternehmen wurde 2002 von Elon Musk mit dem Ziel gegründet, die Kosten für Raumtransporte zu senken und so die Besiedlung des Mars zu ermöglichen."
RON_Orbital_Stations_desc:0 "Eine Raumstation, auch Orbitalstation oder orbitale Raumstation genannt, ist ein Raumfahrzeug, das eine menschliche Besatzung über einen längeren Zeitraum im Orbit befördern kann und über keine größeren Antriebs- oder Landesysteme verfügt. Stationen müssen über Andockstationen verfügen, damit andere Raumfahrzeuge andocken und Besatzung und Vorräte transportieren können."
RON_Moon_Base_desc:0 "Ein Mondaußenposten ist das Konzept einer dauerhaften oder halbdauerhaften Präsenz von Menschen auf dem Mond. Es wäre ein entscheidender Schritt in unserer Kolonisierung des Weltraums."
RON_Martian_Orbit_desc:0 "Für uns ist es an der Zeit, eine Sonde zum Mars zu schicken, um Bilder aufzunehmen und den Weg für eine bemannte Mission zu bereiten."
RON_Martian_Landing_desc:0 "Eine Marslandung ist die Landung eines Raumfahrzeugs auf der Oberfläche des Mars. Von den zahlreichen Landungsversuchen robotergestützter, unbemannter Raumfahrzeuge auf dem Mars verliefen neun erfolgreich und sanft. Es gab auch Studien für eine mögliche bemannte Mission zum Mars, einschließlich einer Landung, doch wurde bisher keine dieser Versuche unternommen."
RON_Martian_Rover_desc:0 "Ein Marsrover ist ein Fahrzeug, das nach seiner Ankunft die Oberfläche des Planeten Mars abfährt. Rover bieten gegenüber stationären Landegeräten mehrere Vorteile: Sie können ein größeres Gebiet erkunden, interessante Objekte ansteuern, sich an sonnigen Standorten positionieren, um die Wintermonate zu überstehen, und sie ermöglichen einen Fortschritt bei der Fernsteuerung von Roboterfahrzeugen."
RON_First_Man_On_Mars_desc:0 "Eine bemannte Mission zum Mars ist seit dem 20. Jahrhundert Thema von Science-Fiction, Raumfahrttechnik und wissenschaftlichen Vorschlägen. Jetzt ist es an der Zeit, sie Wirklichkeit werden zu lassen!"
RON_Mars_Colony_desc:0 "Gründe für die Besiedlung des Mars sind unter anderem reine Neugier, das Potenzial für tiefgehende Forschung, die Menschen im Vergleich zu Rovern leisten können, wirtschaftliches Interesse an den Ressourcen des Planeten und der Gedanke, dass die Besiedlung anderer Planeten das Aussterben der Menschheit verringern könnte. Zu den Schwierigkeiten und Gefahren zählen die Strahlenbelastung während einer Reise zum Mars und auf seiner Oberfläche, giftige Böden, geringe Schwerkraft, die Isolation, die mit der Entfernung des Mars von der Erde einhergeht, Wassermangel und kalte Temperaturen."
RON_Venus_Flyby_desc:0 "„Manned Venus Flyby“ war ein Vorschlag der NASA aus den Jahren 1967–1968, in den Jahren 1973–1974 drei Astronauten in einem von Apollo abgeleiteten Raumschiff auf eine Vorbeiflugmission zur Venus zu schicken und dabei einen Schwerkraftassistenten zu nutzen, um den Rückweg zur Erde zu verkürzen."
RON_Venus_Landing_desc:0 "Die erste erfolgreiche Landung auf der Venus erfolgte am 15. Dezember 1970 durch Venera 7. Sie blieb 23 Minuten lang in Kontakt mit der Erde und übertrug dabei Oberflächentemperaturen von 455 °C bis 475 °C (855 °F bis 885 °F). Venera 8 landete am 22. Juli 1972. Neben Druck- und Temperaturprofilen zeigte ein Photometer, dass die Wolken der Venus eine Schicht bildeten, die über 35 Kilometer über der Oberfläche endete. Ein Gammastrahlenspektrometer analysierte die chemische Zusammensetzung der Kruste."
RON_The_Grand_Tour_desc:0 "Senden Sie eine Sonde mit der Hauptmission, eine Vorbeiflugstudie des Pluto-Systems durchzuführen."
RON_Leave_The_Solar_System_desc:0 "Pioneer 10 – startete 1972, flog 1973 an Jupiter vorbei und bewegt sich in Richtung Aldebaran (65 Lichtjahre entfernt) im Sternbild Stier. Der Kontakt brach im Januar 2003 ab, und die Sonde hat schätzungsweise 120 AE passiert."
RON_Comet_Landing_desc:0 "Rosetta war eine Raumsonde der Europäischen Weltraumorganisation (ESA), die am 2. März 2004 startete. Zusammen mit ihrem Landemodul Philae führte Rosetta eine detaillierte Untersuchung des Kometen 67P/Churyumov-Gerasimenko (67P) durch. Auf ihrer Reise zum Kometen flog die Raumsonde an der Erde, dem Mars sowie den Asteroiden 21 Lutetia und 2867 Šteins vorbei. Sie war nach SOHO/Cluster und XMM-Newton die dritte Eckpfeilermission des ESA-Programms Horizont 2000."

RON_MISSILES_SPECIAL:0 "Eine umfassende Raketenentwicklung ist eine wesentliche Voraussetzung für Interkontinentalraketen und die Raumfahrt."

