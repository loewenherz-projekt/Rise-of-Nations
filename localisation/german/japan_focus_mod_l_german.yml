l_german:
 defence_of_korea:0 "Letzter Widerstand in Korea"
 defence_of_korea_desc:0 "Unsere Armee befindet sich in der Defensive. Wir müssen verhindern, dass wir unsere Stellung auf dem asiatischen Festland verlieren. Wir können die Einheimischen im Norden Koreas rekrutieren, um für uns eine Verteidigungslinie von Pjöngjang entlang des Flusses bis zur Ostküste Koreas zu errichten."
 JAP_Northern:0 "Nördliche Expansionsdoktrin"
 JAP_Northern_desc:0 "Die Nordexpansionsdoktrin, „Hokushin-ron“, befürwortet einen Angriff auf die Sowjetunion. Um dies zu erreichen, muss unsere Armee unsere oberste Priorität sein. Daher ist es wichtig, unsere Industriekapazitäten auszubauen."
 JAP_Southern:0 "Südliche Expansionsdoktrin"
 JAP_Southern_desc: "The Southern Expansion Doctrine, "Nanshin-ron, favours gaining resources in the South, by expanding our naval bases and our navy, as well as focusing on our enemies in that area. The Navy favours this particular doctrine."
 JAP_Coup:0 "Radikale Fraktionen in der IJA"
 JAP_Coup_desc:0 "Radikale Fraktionen im Militär haben in den letzten Jahren an Unterstützung verloren, sind aber immer noch groß genug, um einen Putsch zu starten, sollte sie durch etwas dazu veranlasst werden."
 JAP_North_Infra:0 "Infrastrukturverbesserungen in Korea"
 JAP_North_Infra_desc:0 "Wenn wir eine große Armee aufbauen wollen, die in der Lage ist, die Sowjetunion zu besiegen, müssen wir unsere Infrastruktur in Korea und der Mandschurei verbessern. Dies wäre ein Anfang."
 JAP_North_Infra_2:0 "Weitere Infrastrukturverbesserungen"
 JAP_North_Infra_2_desc:0 "Wir müssen unsere Eisenbahnen und Straßen im Gebiet bis zur sowjetisch-japanischen Grenze weiter ausbauen."
 JAP_North_Ports:0 "Ausbau der Häfen"
 JAP_North_Ports_desc: "As we have no land connection between our home territory and our Manchurian lands, supplies will have to come in by sea. That is why we must expand our ports too!"
 JAP_DMZ:0 "Beginnen Sie mit dem Aufbau"
 JAP_DMZ_desc:0 "Es ist Zeit, mit dem Truppenaufmarsch an der sowjetischen Grenze zu beginnen. Zunächst müssen wir die Infrastruktur vor Ort verbessern."
 JAP_Draft:0 "Verstärkung der mandschurischen Streitkräfte"
 JAP_Draft_desc:0 "Wir müssen neue Divisionen aufstellen, um eine bevorstehende Offensive zu unterstützen. Diese schnell zusammengestellten Einheiten werden zwar nicht besonders stark sein, aber sie werden in der Lage sein, etwaige Lücken in unserer Front zu schließen. Wir werden sowohl Kavallerie als auch Infanterie erhalten."
 JAP_Inf_Equip_Bonus:0 "Infanterie-Ausrüstungsbonus"
 JAP_Draft:0 "Entwickeln Sie bessere Ausrüstung"
 JAP_Draft_desc:0 "Zur Vorbereitung unseres Angriffs auf die UdSSR müssen wir bessere Infanteriewaffen entwickeln."
 JAP_N_OOB_TT:0 "Wir werden 13 neue Divisionen erhalten, 4 davon werden Kavalleriedivisionen sein."
 JAP_Tanks_Bonus:0 "Panzerforschungsbonus"
 JAP_Tanks_Light_Bonus:0 "Forschungsbonus für leichte Panzer"
 JAP_North_Tech:0 "Entwickle eine neue Rüstung"
 JAP_North_Tech_desc:0 "Die Sowjetunion verfügt über sehr fortschrittliche leichte Panzer. Wenn wir sie angreifen wollen, können wir es uns nicht leisten, in der Panzertechnologie zurückzufallen!"
 JAP_Arty_Bonus:0 "Artillerie-Forschungsbonus"
 JAP_AT_Bonus:0 "Panzerabwehr-Forschungsbonus"
 JAP_North_Tech_2:0 "Verbesserte Feldgeschütze"
 JAP_North_Tech_2_desc:0 "Um unsere Truppen im Feld ausreichend unterstützen zu können, müssen wir unsere Feldartillerie verbessern. Vielleicht können wir die Fortschritte auf diesem Gebiet auch für den Bau verbesserter Panzerabwehrkanonen nutzen!"
 JAP_Doc_Bonus:0 "Doktrinforschungsbonus"
 JAP_Sup_Bonus:0 "Bonus für die Unterstützung technischer Forschung"
 JAP_Doc:0 "Zusätzliche Unterstützungseinheiten und Lehren"
 JAP_Doc_desc:0 "Wir müssen unsere Einheiten mit mehr Unterstützung ausstatten, damit sie den sowjetischen Truppen, denen sie gegenüberstehen, besser standhalten können. Wir sollten auch neue Kampfmethoden studieren."
 JAP_Inf_Bonus:0 "Infanteriewaffen-Forschungsbonus"
 JAP_Doc_2:0 "Erfahrungen im Chinesisch-Japanischen Krieg"
 JAP_Doc_2_desc:0 "Wir müssen das, was wir im Krieg gegen die Chinesen gelernt haben, nutzen, um die Qualität unserer Armee zu verbessern, jetzt, da wir uns auf den Kampf gegen die Sowjetunion vorbereiten."
 JAP_Banzai:0 "Greift die Roten an!"
 JAP_Banzai_desc:0 "Für den Kaiser!! Jetzt, da wir bereit sind, werden wir die Sowjetunion angreifen und ihnen erneut zeigen, dass Japan eine europäische Großmacht besiegen kann! Dagegen wird 1905 wie ein kleines Grenzgefecht aussehen ..."
 for_the_emperor_idea_sov:0 "Ehre sei dem Kaiser!"
 Jap_left_faction:0 "Separater Frieden"
 JAP_Zaibatsu:0 "Erweitern Sie den Zaibatsu"
 JAP_Zaibatsu_desc:0 "Die Zaibatsu sind große Industriekonglomerate, deren Ursprünge teilweise mehrere hundert Jahre zurückreichen. Es gibt vier große Zaibatsu, die ältesten und mächtigsten Unternehmen Japans. Sie haben enge Verbindungen zu verschiedenen Militärfraktionen und bilden das Herzstück unserer industriellen Aktivitäten und unseres Wachstums. Wir sollten alles tun, um ihr Wachstum zu fördern."
 JAP_Zaibatsu_Idea:0 "Zaibatsu-Wachstum beschleunigt"
 JAP_Zaibatsu_Idea_desc:0 "Das Wachstum der Zaibatsu (große und sehr mächtige Unternehmen in Japan) wurde durch die günstige Regierungspolitik beschleunigt."
 JAP_Vech:0 "LKW-Forschungsbonus"
 JAP_Ship_Ind:0 "Forschungsbonus für Schiffsfabriken"
 JAP_Industry_Bonus:0 "Industrieforschungsbonus"
 JAP_Mitsui:0 "Erweitern Sie das Mitsui Zaibatsu"
 JAP_Mitsui_desc:0 "Die Mitsui Zaibatsu ist eine Organisation mit Verbindungen zur Kaiserlich Japanischen Armee und den ehemaligen Rikken-Seiyūkai-Parteimitgliedern in der aktuellen Regierungspartei, der Imperial Rule Association. Wenn wir ihnen beim Ausbau ihres Geschäfts helfen, helfen wir auch der IJA."
 JAP_Mitsubishi:0 "Erweitern Sie den Mitsubishi Zaibatsu"
 JAP_Mitsubishi_desc:0 "Der Mitsubishi-Industriekonzern verfügt über mehrere sehr große Werften in Japan, insbesondere im Raum Nagasaki. Er unterhält Verbindungen zur Rikken-Minseito-Partei und ihren Politikern, die heute Mitglied der Imperial Rule Association sind, sowie enge Verbindungen zur Kaiserlich Japanischen Marine. Die IJN wird definitiv davon profitieren, wenn wir Mitsubishi beim Ausbau seines Geschäfts unterstützen."
 JAP_Ports:0 "Erweitern Sie die Truk-Lagune"
 JAP_Ports_desc:0 "Unser Hauptstützpunkt im Südpazifik ist die Truk-Lagune. Wir sollten die dortigen Marinestützpunkte erweitern und Befestigungsanlagen zum Schutz der Insel selbst errichten."
 JAP_Nagasaki_Shipyards:0 "Erweitern Sie die Nagasaki-Werften"
 JAP_Nagasaki_Shipyards_desc:0 "Mitsubishi verfügt über einen riesigen Werftkomplex in der Region Nagasaki. Wir sollten ihnen beim Ausbau dieser Werften helfen, da Mitsubishi Zaibatsu sich als sehr engagiert erwiesen hat, hochwertige Schiffe für die IJN zu bauen."
 JAP_Navy_Subtech_Bonus:0 "Forschungsbonus für Schiffs-Subtechniker"
 JAP_Ship_Subtechs:0 "Zerstörerausrüstung verbessern"
 JAP_Ship_Subtechs_desc:0 "Wir müssen ein Programm zur Modernisierung der Ausrüstung unserer bereits sehr modernen Zerstörer initiieren."
 JAP_Navy_Doc_Bonus:0 "Bonus für die Forschung zur Marinedoktrin"
 JAP_Navy_Doctrine:0 "Erweitern Sie die IJNA"
 JAP_Navy_Doctrine_desc:0 "Wir müssen die Kaiserlich Japanische Marineakademie erweitern, um mehr talentierte junge Offiziere in unsere Reihen aufzunehmen. Dies sollte uns auch die Entwicklung neuer und effektiverer Doktrinen ermöglichen."
 JAP_Research:0 "Fördern Sie die Rivalität zwischen den beiden Großen"
 JAP_Research_desc:0 "Monopole sind nie gut für Innovationen. Obwohl die beiden großen Zaibatsu-Konzerne Mitsui und Mitsubishi unterschiedliche Geschäftsfelder haben, auf die sie sich konzentrieren, konkurrieren sie auch in einigen Bereichen. Schließlich sind sie Konzerne, und Konzerne wollen Gewinn. Wir sollten sie dazu motivieren, sich gegenseitig (und auch ihre kleineren Konkurrenten) zu übertreffen."
 JAP_Slot_1:0 "Bilden Sie staatliche Forschungslabore"
 JAP_Slot_1_desc:0 "Die beiden großen Zaibatsu leisten in ihrer Forschung recht gute Arbeit. Wir sollten einige ihrer klügsten Köpfe in unsere militärischen Forschungsabteilungen holen."
 JAP_Kawasaki_Docks:0 "Erweiterung der Kobe-Werke"
 JAP_Kawasaki_Docks_desc:0 "Die Kawasaki Dockyard Company verfügt über mehrere große Werften in Kobe. Wir sollten ihnen beim Ausbau helfen und auch für Luftschutz in der Umgebung sorgen."
 fighter2_bonus:0 "A6M Zero-Sen Bonus"
 JAP_Army_Air_Strat:0 "Strategisches Bomberprogramm"
 JAP_Army_Air_Strat_desc:0 "Unser Land braucht strategische Bomber mit großer Reichweite. Wir sollten unverzüglich mit der Entwicklung solcher Flugzeuge beginnen."
 naval_air_innovations_focus_2:0 "A6M Zero Effort"
 naval_air_innovations_focus_2_desc:0 "Mitsubishi Heavy Industries hat uns mitgeteilt, dass der Prototyp unseres neuen Trägerjägerprogramms fertig ist. Es scheint, als hätten wir den besten Trägerjäger aller Zeiten in unseren Händen. Wir müssen sofort mit der Produktion dieser wunderbaren neuen Flugzeuge beginnen!"
 JAP_Rikusentai:0 "Amphibienpanzer und Marineausrüstung"
 JAP_Rikusentai_desc:0 "Unsere Rikusentai benötigen verbesserte Ausrüstung, um die westlichen Nationen, die im gesamten Pazifik in befestigten Stellungen sitzen, besiegen zu können. Sie benötigen dafür auch spezielle Panzer. Wir sollten uns auf die Entwicklung solcher Waffen konzentrieren."
 JAP_Arty:0 "Mitsui-Artillerie"
 JAP_Arty_desc:0 "Wir sollten Mitsui damit beauftragen, ein neues Design für unsere Waffen zu entwickeln."
 JAP_Tanks:0 "Erweitern Sie das Arsenal der Osaka-Armee"
 JAP_Tanks_desc:0 "Wenn wir schneller neue Panzer entwickeln wollen, sollten wir die Einrichtungen des Osaka Army Arsenal verbessern."
 JAP_Air:0 "Neue Jagdflugzeug- und Bomberprogramme"
 JAP_Air_desc:0 "Um mit den Westlern mithalten zu können, müssen wir neue Kampfflugzeuge und Bomber entwickeln."
 JAP_industrial_research_focus:0 "Industrielle Forschungsanstrengungen"
 JAP_industrial_research_focus_desc:0 "Wir sollten alles in unserer Macht Stehende tun, um die industrielle Forschung zu fördern."
 JAP_Zaibatsu_Idea_Bonus:0 "Verschärfter Wettbewerb"
 JAP_Zaibatsu_Idea_Bonus_desc:0 "Der zunehmende Wettbewerb zwischen den beiden großen Zaibatsu hat zu größeren Anstrengungen in Forschung und Produktion geführt."
 daitoakyoeiken:0 "Daitoa Kyoeiken"
 JAP_neutrality_party:0 "Daihon&#39;ei"
 Annex_MAN:0 "Mandschukuo integrieren"
 Annex_MAN_desc:0 "Unser Marionettenstaat Mandschukuo unter Kaiser Puyi steht uns im Weg. Wir könnten den Staat annektieren und damit unsere offiziell formulierten panasiatischen Ambitionen aufgeben."
 Annex_MEN:0 "Mengkukuo integrieren"
 Annex_MEN_desc:0 "Nachdem wir Mandschukuo annektiert haben, könnten wir auch unseren Marionettenstaat Mengkukuo integrieren."

