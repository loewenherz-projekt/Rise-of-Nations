#BHUTAN MOD
#######################################

BHU_economy_start:0 "Überdenken Sie unsere Wirtschaft"
BHU_economy_start_desc:0 "Um eine große Nation zu schaffen, bedarf es zunächst einer starken Wirtschaft. Unsere ist weit davon entfernt. Seit Jahrzehnten schwächelt unsere Wirtschaft enorm. Im Vergleich zu unseren Nachbarn sind wir ein Schwächling. Wir müssen eine bessere Wirtschaft schaffen, und das erfordert zunächst einmal einen Wiederaufbau."
BHU_economy_defence_1:0 "Stadtmauern modernisieren"
BHU_economy_defence_1_desc:0 "Die alten Steinmauern, die unsere Städte schützen, lassen sich heute leicht zerstören. Wir müssen sie verstärken, damit unsere Städte und Menschen sicher sind."
BHU_economy_defence_2:0 "Eingegrabene Bunker"
BHU_economy_defence_2_desc:0 "Diese hohen Berge eignen sich hervorragend als natürliche Bunker. Wir können unsere Verteidigung verbessern, indem wir in sie hineinbauen. Das sollte feindliche Armeen daran hindern, sich unseren Städten überhaupt zu nähern."
BHU_economy_defence_3:0 "Verteidigungsministerium"
BHU_economy_defence_3_desc:0 "Die Verteidigung unseres Volkes ist uns sehr wichtig. Deshalb müssen wir einen Ort schaffen, an dem solche Ideen diskutiert und finanziert werden können. Wir brauchen ein Verteidigungsministerium."
BHU_economy_roads_1:0 "Neue Bergstraßen"
BHU_economy_roads_1_desc:0 "Um unsere Truppen besser im Land bewegen zu können, brauchen wir bessere Straßen. Der Versuch, Lastwagen die Berge hinauf zu transportieren, ist ein vergebliches Unterfangen."
BHU_economy_roads_2:0 "Die bhutanische Eisenbahn"
BHU_economy_roads_2_desc:0 "Um unsere Infrastruktur weiter zu verbessern, müssen wir unsere Truppen schneller verlegen. Der beste Weg hierfür scheint der Bau einer Eisenbahnverbindung zu sein. Dies würde die Versorgungswege vereinfachen und die Zufriedenheit unserer Bevölkerung steigern."
BHU_economy_civ_fact_1:0 "Sanierung des Industriesektors"
BHU_economy_civ_fact_1_desc:0 "Die Industrie ist ein wichtiger Teil einer Nation. Das gilt auch für das Baugewerbe. Mit einem starken und effizienten Industriesektor kann unsere Nation mehr Güter produzieren und mehr Fabriken besser und effizienter bauen."
BHU_economy_mil_fact_1:0 "Kleinwaffenfabriken"
BHU_economy_mil_fact_1_desc:0 "Die Massenproduktion von Waffen muss irgendwo beginnen. Zunächst müssen wir mit der Produktion von Pistolen und Handgranaten beginnen. Sobald diese Industrie stabil genug ist, können wir uns besseren und größeren Waffen zuwenden."
BHU_economy_civ_fact_2:0 "Bau von Stahlwerken"
BHU_economy_civ_fact_2_desc:0 "Stahl ist eine extrem wichtige Ressource auf der Welt. Stahlimporte wären eine törichte Idee, da die Versorgung mit Stahl schnell unterbrochen werden könnte. Wir müssen uns unseren eigenen Stahl beschaffen. Stahlwerke sind eine Möglichkeit, dieses Problem zu lösen. Wir müssen sofort mit dem Bau beginnen."
BHU_economy_mil_fact_2:0 "Gewehrfabriken"
BHU_economy_mil_fact_2_desc:0 "Nachdem wir die Produktion von Kleinwaffen unter Kontrolle haben, können wir nun mit der Produktion von Gewehren beginnen. Damit können wir unsere Truppen endlich zuverlässig versorgen und ihnen die benötigten Waffen beschaffen."
BHU_economy_mil_fact_3:0 "Abgeschlossener Militärsektor"
BHU_economy_mil_fact_3_desc:0 "Unser Rüstungsproduktionssektor ist endlich vollständig. Jetzt können wir unsere Truppen umfassend mit den benötigten Waffen und Nachschub versorgen. Unser wirtschaftlicher Erfolg kann von nun an nur noch zunehmen."
BHU_economy_civ_fact_3:0 "Tanks für Toaster"
BHU_economy_civ_fact_3_desc:0 "Wir müssen unsere Fabriken neu organisieren, um das zu produzieren, was wir brauchen. Ohne diese Organisation werden wir weniger effizient produzieren und dies wird zu langsameren Fortschritten führen. Dies ist ein wichtiges Thema, das wir in den Griff bekommen müssen."
BHU_economy_complete:0 "Wirtschaft wieder aufgebaut"
BHU_economy_complete_desc:0 "Unsere Wirtschaft ist endlich vollständig. Alles scheint in Ordnung zu sein und mit maximaler Effizienz zu arbeiten. Das kann nur zum Erfolg führen."
BHU_economy_roads_3:0 "Fortsetzung der Infrastrukturprojekte"
BHU_economy_roads_3_desc:0 "Auch wenn unsere Wirtschaft vollständig ist, müssen wir unsere Infrastruktur weiter ausbauen. Straßen sind sehr wichtig und wir müssen sie weiter ausbauen."
BHU_economy_roads_4:0 "Die tibetische Eisenbahn"
BHU_economy_roads_4_desc:0 "Da wir nun Tibet kontrollieren, können wir mit der Verbesserung der Infrastruktur beginnen, um unsere Truppenbewegungen zu beschleunigen."
BHU_economy_roads_5:0 "Sinkiang verbinden"
BHU_economy_roads_5_desc:0 "Nachdem wir Sinkiang nun unter Kontrolle haben, müssen wir mit der Verbesserung der Infrastruktur dort beginnen. Ohne sie bleiben unsere Truppen ohne Nachschub, was sehr wichtig ist."
BHU_economy_roads_6:0 "Transportrevolution"
BHU_economy_roads_6_desc:0 "Wenn wir unseren Feinden einen Schritt voraus sein wollen, müssen wir grundlegende Innovationen entwickeln. Wir müssen unsere Transportmethoden revolutionieren. Wenn wir uns auf diesen Bereich konzentrieren, können wir uns einen Vorteil verschaffen, den unsere Feinde nicht haben."
BHU_eco_expansion_factory_1:0 "Neue Tools"
BHU_eco_expansion_factory_1_desc:0 "Nachdem wir unsere Wirtschaft gestärkt haben, können wir uns nun darauf konzentrieren, unsere Fabriken effizienter zu gestalten. Dazu benötigen wir bessere Werkzeuge, die es unseren Arbeitern ermöglichen, schneller und effizienter zu arbeiten."
BHU_eco_expansion_factory_miltary_1:0 "Bauen Sie weiterhin Militärfabriken"
BHU_eco_expansion_factory_miltary_1_desc:0 "Es werden weitere Militärfabriken gebaut."
BHU_eco_expansion_factory_civ_1:0 "Bauen Sie weiterhin zivile Fabriken"
BHU_eco_expansion_factory_civ_1_desc:0 "Es werden weitere zivile Fabriken gebaut."
BHU_eco_expansion_factory_miltary_2:0 "Waffenherstellung in Tibet"
BHU_eco_expansion_factory_miltary_2_desc:0 "In Tibet werden weitere Militärfabriken errichtet."
BHU_eco_expansion_factory_miltary_3:0 "Waffenfabriken in Nepal"
BHU_eco_expansion_factory_miltary_3_desc:0 "In Nepal werden weitere Militärfabriken gebaut."
BHU_eco_expansion_factory_miltary_4:0 "Artilleriefabriken in Sinkiang"
BHU_eco_expansion_factory_miltary_4_desc:0 "In Sinkiang werden weitere Militärfabriken errichtet."
BHU_eco_expansion_factory_civ_2:0 "Fabriken in Tibet"
BHU_eco_expansion_factory_civ_2_desc:0 "In Tibet werden weitere zivile Fabriken gebaut."
BHU_eco_expansion__mining1:0 "Bhutanische Bergbaugesellschaft"
BHU_eco_expansion_factory_civ_3:0 "Industrialisierung Nepals"
BHU_eco_expansion_factory_civ_3_desc:0 "In Nepal werden weitere zivile Fabriken gebaut."
BHU_eco_expansion_factory_civ_4:0 "Bauen Sie eine Industrie in Sinkiang auf"
BHU_eco_expansion_factory_civ_4_desc:0 "In Sinkiang werden weitere zivile Fabriken gebaut."
BHU_eco_expansion__mining1:0 "Bhutanische Bergbaugesellschaft"
BHU_eco_expansion__mining1_desc:0 "Die Berge Bhutans sind eine ungenutzte Quelle der Möglichkeiten. Denken Sie nur an die Ressourcen, die in diesen Bergen stecken könnten! Es ist Zeit, ein offizielles Bergbauunternehmen zu gründen."
BHU_eco_expansion__mining1_steel:0 "Ausbau der Stahlindustrie"
BHU_eco_expansion__mining1_steel_desc:0 "Wir brauchen mehr Stahl, wir müssen unsere Stahlproduktion steigern, damit Importe unnötig werden."
BHU_eco_expansion__mining2_steel:0 "Stahlminen in Tibet"
BHU_eco_expansion__mining2_steel_desc:0 "Wir müssen unseren Bergbau ausbauen. Tibet verfügt zweifellos über riesige, ungenutzte Ressourcen. Wir werden unsere Suche dort fortsetzen."
BHU_eco_expansion__mining3_steel:0 "Bauen Sie Stahlfabriken in Nepal"
BHU_eco_expansion__mining3_steel_desc:0 "Stahl wird heutzutage immer wichtiger. Wir sollten einen Teil unseres Geldes in den Aufbau einer neuen Stahlindustrie in Nepal investieren. Das wird langfristig sehr hilfreich sein."
BHU_eco_expansion__mining1_special:0 "Spezialwerkstoffunternehmen"
BHU_eco_expansion__mining1_special_desc:0 "Wir benötigen mehr spezielle Ressourcen wie Wolfram. Diese sind für unsere anderen Waffen und Hilfsmittel sehr wichtig."
BHU_eco_expansion__mining2_special:0 "Neue Ressourcen in Nepal"
BHU_eco_expansion__mining2_special_desc:0 "Wer weiß, was in den nepalesischen Bergen liegt? Wir sollten anfangen, dort zu graben, um herauszufinden, was sie enthalten könnten."
BHU_eco_expansion__mining1_oil:0 "Nationales Öldepot"
BHU_eco_expansion__mining1_oil_desc:0 "Wir müssen ein nationales Öldepot errichten, damit wir uns keine Sorgen um den Treibstoff für unsere Fahrzeuge machen müssen."
BHU_eco_expansion__mining2_oil:0 "Synthetische Öltechnologie"
BHU_eco_expansion__mining2_oil_desc:0 "Es ist schwierig, genügend Treibstoff für unsere Fahrzeuge zu bekommen. Der Import verbraucht wertvolle Fabriken, die wir für den Bau benötigen. Wenn wir unser eigenes Öl herstellen könnten, wäre das revolutionär! Wir müssen einen Weg finden, synthetisches Öl herzustellen."
BHU_eco_expansion__mining2_rubber:0 "Synthesekautschukproduktion"
BHU_eco_expansion__mining2_rubber_desc:0 "Wenn wir synthetisches Öl herstellen können, können wir dann vielleicht auch andere Dinge herstellen? Wir brauchen Gummi, das wäre also ein guter Anfang. Wir sollten sehen, was wir daraus machen können."
BHU_eco_expansion__science1:0 "Ausländische Wissenschaftler einladen"
BHU_eco_expansion__science1_desc:0 "Wissenschaft und Forschung sind wichtige Bestandteile einer Nation. Jeden Tag werden neue Dinge entdeckt. Wir müssen ausländische Wissenschaftler in unser Land einladen, damit sie uns bei der Erforschung neuer Technologien unterstützen können."
BHU_eco_expansion__science_tech1:0 "Investieren Sie in wissenschaftliche Ausrüstung"
BHU_eco_expansion__science_tech1_desc:0 "Wissenschaft ist wichtig, daher wäre es klug, die Mittel für unsere Wissenschaftler zu erhöhen. Wer weiß, was sie entdecken werden?"
BHU_eco_expansion__science_tech2:0 "Das Wissenschaftsministerium"
BHU_eco_expansion__science_tech2_desc:0 "Forschung und Entwicklung sind wichtig. Wir müssen unsere Bemühungen zur Ausweitung unserer Forschungsfelder fortsetzen. Eine gute Idee wäre die Gründung eines staatlichen Forschungsinstituts."
BHU_eco_expansion__science2:0 "Spaltung des Atoms"
BHU_eco_expansion__science2_desc:0 "Da unsere Wissenschaftler immer neue Dinge entdecken, müssen wir tiefer in neue Bereiche vordringen. Wir müssen neue Gebäude errichten, um die Kraft der Atome zu analysieren und zu nutzen."
BHU_eco_expansion__science3:0 "Zerstörer der Welten"
BHU_eco_expansion__science3_desc:0 "Wer hätte gedacht, dass man eine ganze Stadt mit einer einzigen Bombe auslöschen könnte? Diese Waffe ist wirklich die ultimative Waffe. Mit einer solchen Bombe könnten wir die Welt beherrschen!"
BHU_eco_expansion__computers1:0 "Neue Computermaschinen"
BHU_eco_expansion__computers1_desc:0 "Es besteht kein Zweifel daran, dass Computer heutzutage sehr wichtig sind. Investitionen in diese wären eine sehr kluge Entscheidung, da wir Informationen noch besser verwalten und Erkenntnisse gewinnen könnten."
BHU_eco_expansion__radar1:0 "Radartechnik"
BHU_eco_expansion__radar1_desc:0 "Wenn wir die Flugzeuge unserer Feinde vor ihrem Angriff erkennen können, verschafft uns das einen großen Vorteil. Wir sollten mit der Radartechnologie beginnen, um dies zu erreichen."
BHU_eco_expansion__flatten_hills:0 "Die Hügel abflachen"
BHU_eco_expansion__flatten_hills_desc:0 "Wenn wir diese Berge beseitigen, könnten wir noch mehr Fabriken bauen. Wir müssen uns darauf konzentrieren, mehr Platz für Industriekomplexe und Rüstungsfabriken zu schaffen."
#
BHU_diplomacy_start:0 "Die drohende Frage"
BHU_diplomacy_start_desc:0 "Jahrhundertelang basierte unsere Regierung auf einem Herrscher und seiner Familie. Angesichts des Wandels der Welt müssen auch wir uns verändern. Doch wie können wir die Lücke einer überholten dynastischen Regierung füllen?"
BHU_diplomacy_split_left:0 "Die neue Regierung"
BHU_diplomacy_split_left_desc:0 "Es ist Zeit, diese veraltete Dynastie zu beenden. Was unser Land braucht, ist eine neue, moderne Regierung. Damit können wir endlich etwas bewegen."
BHU_diplomacy_split_right:0 "Die neue Dynastie"
BHU_diplomacy_split_right_desc:0 "Es stimmt, dass die derzeitige Dynastie alt und funktionsunfähig geworden ist. Doch wenn wir nach Osten blicken, sehen wir eine prächtige Blüte des perfekten Nationalismus ... Japan. Wir werden eine neue Dynastie gründen und das größte Reich erschaffen, das Asien je gesehen hat!"
BHU_diplomacy_fascist_jigme_dead:0 "Ermordet Jigme"
BHU_diplomacy_fascist_jigme_dead_desc:0 "Um unser neues Reich zu gründen, müssen wir uns zunächst mit dem alten Herrscher auseinandersetzen. Jigme muss auf jede erdenkliche Weise von der Macht entfernt werden, damit unsere Bemühungen fortgesetzt werden können. Der einfachste Weg scheint der naheliegendste zu sein."
BHU_diplomacy_fascist_1:0 "Das Imperium beginnt"
BHU_diplomacy_fascist_1_desc:0 "Jahrhundertelang waren wir eine schwache und kleine Nation, die in den Fängen viel größerer Nationen steckte. Doch jetzt können wir einen Neuanfang wagen und Rache an unseren Feinden nehmen. Wir werden siegen, wir werden siegen, wir sind das Reich der Donnerdrachen!"
BHU_diplomacy_fascist_2:0 "Rekrutieren Sie europäische Generäle"
BHU_diplomacy_fascist_2_desc:0 "Unsere Truppen brauchen Führung. Dafür können wir entweder eigene Truppen ausbilden oder europäische Führungskräfte einsetzen. Angesichts der Erfahrung europäischer Führungskräfte wäre das die bessere Option."
BHU_diplomacy_fascist_3:0 "Herzen und Köpfe"
BHU_diplomacy_fascist_3_desc:0 "Wir müssen der Bevölkerung versichern, dass dies eine Regierung ist, an die sie glauben kann. Wenn sie uns nicht vertraut, wird sie nicht mit uns zusammenarbeiten … und wir riskieren möglicherweise einen Aufstand."
BHU_diplomacy_fascist_reeducation:0 "Umerziehung"
BHU_diplomacy_fascist_reeducation_desc:0 "Den Kindern der neuen Generation müssen die richtigen Informationen vermittelt werden. Wenn wir die Köpfe der Zukunft kontrollieren, werden sie mit Sicherheit auf unserer Seite sein."
BHU_diplomacy_fascist_reconcile_people:0 "Versöhne die Menschen"
BHU_diplomacy_fascist_reconcile_people_desc:0 "Es ist Zeit, die Sorgen der Menschen zu beenden. Wir müssen das klären, denn wenn sie uns nicht vertrauen, werden wir nur schlecht funktionieren. Es wird einige Arbeit erfordern, aber wir werden es schaffen!"
BHU_diplomacy_fascist_family_principles:0 "Traditionelle Familienrollen"
BHU_diplomacy_fascist_family_principles_desc:0 "Mit dem Aufkommen unserer neuen Dynastie müssen wir die Rollen in der Familie neu überdenken. Die Lösung dieses Problems wird unsere Bevölkerung und die Funktionsweise von Familien verändern."
BHU_diplomacy_fascist_4:0 "Achsenneigungen"
BHU_diplomacy_fascist_4_desc:0 "WIP"
BHU_diplomacy_fascist_military_2:0 "Steigerung der Rekrutierung"
BHU_diplomacy_fascist_military_2_desc:0 "Unser Militär braucht Männer. Bei der derzeitigen Zahl an Soldaten reicht das nicht aus, um unsere Armee zu unterstützen. Wir müssen mehr Leute rekrutieren!"
BHU_diplomacy_fascist_military_3:0 "Studieren Sie Panzerdesigns"
BHU_diplomacy_fascist_military_3_desc:0 "Deutsche Panzer sind auf dem neuesten Stand der Technik. Wenn wir wollen, dass unsere Panzer effektiv sind, wäre es eine gute Entscheidung, sie zu studieren. Mit so guten Panzern wie den deutschen werden wir nie verlieren."
BHU_diplomacy_fascist_military_tanks:0 "Gepanzerte Überlegenheit"
BHU_diplomacy_fascist_military_tanks_desc:0 "Wenn wir das Beste aus unseren Panzern herausholen wollen, müssen wir unsere Ressourcen auf sie konzentrieren. Um das Beste aus jeder Einheit herauszuholen, müssen sie so effizient wie möglich sein."
BHU_diplomacy_fascist_ww2_intervention:0 "Intervention im Zweiten Weltkrieg"
BHU_diplomacy_fascist_ww2_intervention_desc:0 "Angesichts eines zweiten Krieges, der die Welt in Atem hält, können wir unseren Achsenmächten auf jede erdenkliche Weise helfen. Wir sollten mit unserem südlichen Nachbarn beginnen."
BHU_diplomacy_fascist_india_revolt:0 "Aufstand in Indien auslösen"
BHU_diplomacy_fascist_india_revolt_desc:0 "Eine direkte Invasion Indiens ist eine schreckliche Idee. Wir können keinen Frontkrieg mit ihnen riskieren. Besser wäre es, die indischen Nationalisten zu bewaffnen, die die Regierung stürzen wollen. Sie werden uns mit Sicherheit helfen."
BHU_diplomacy_fascist_india_invade:0 "Erobere das Raj"
BHU_diplomacy_fascist_india_invade_desc:0 "Jetzt, wo unser Nachbar, die Raj, beschäftigt ist, können wir sie überfallen. Sie werden nichts ahnen."
BHU_diplomacy_fascist_siam_friends:0 "Freunde mit Siam"
BHU_diplomacy_fascist_siam_friends_desc:0 "Da Siam nun unter einer freundlichen faschistischen Regierung steht, können wir ihnen nun freundschaftlich die Hand reichen. Eine Verbesserung unserer Beziehungen zu ihnen würde uns langfristig sehr helfen."
BHU_diplomacy_fascist_complete:0 "Dynastischer Furver"
BHU_diplomacy_fascist_complete_desc:0 "Wir haben es geschafft. Aus der Asche einer fehlgeschlagenen Dynastie haben wir eine neue aufgebaut. Mit brandneuen Ideen und Ideologien haben wir eine starke Kriegsnation geschaffen. Das hat gezeigt, dass wir alles schaffen können. Wer weiß, was die Zukunft bringt?"
BHU_diplomacy_left_freedom:0 "Eine neue Demokratie im Osten"
BHU_diplomacy_left_freedom_desc:0 "Es wurde entschieden, dass es für uns am besten ist, eine demokratische Republik zu werden. Wir können unsere Regierung an der Regierung der Vereinigten Staaten ausrichten. Vielleicht können wir uns ihr anschließen, sobald die westliche Welt unser Potenzial erkennt."
BHU_diplomacy_freedom_1:0 "Rechte der Menschen"
BHU_diplomacy_freedom_1_desc:0 "In dieser neuen Demokratie müssen wir den Menschen Rechte geben. Sie alle haben grundlegende, unveräußerliche Rechte. Unsere oberste Priorität sollte es sein, diese Rechte zu garantieren."
BHU_diplomacy_freedom_2:0 "Unterstützen Sie die Meinungsfreiheit"
BHU_diplomacy_freedom_2_desc:0 "Es ist von entscheidender Bedeutung, dass alle unsere Bürger eine Stimme haben und ihre Ideen frei äußern können. Ein Land, das die freie Meinungsäußerung verbietet, könnte ebenso gut eine Diktatur sein."
BHU_diplomacy_freedom_women_workforce:0 "Frauen in der Arbeitswelt"
BHU_diplomacy_freedom_women_workforce_desc:0 "Als demokratische Nation müssen wir die Chancengleichheit zwischen Frauen und Männern sicherstellen. Frauen müssen in die Erwerbstätigkeit eintreten dürfen, denn das beweist, dass wir eine wahrhaft demokratische Nation sind, und verbessert gleichzeitig unsere Produktionsleistung."
BHU_diplomacy_freedom_training_programs:0 "Entwickeln Sie bessere Trainingsprogramme"
BHU_diplomacy_freedom_training_programs_desc:0 "Unsere Armee braucht so viele Divisionen wie möglich. Dazu müssen wir die Ausbildungsgeschwindigkeit erhöhen und dafür brauchen wir ein besseres Ausbildungsprogramm."
BHU_diplomacy_freedom_draft:0 "Leiten Sie einen Entwurf ein"
BHU_diplomacy_freedom_draft_desc:0 "Wir brauchen mehr Männer, und eine Möglichkeit, sie zu bekommen, ist die Wehrpflicht. Wenn wir für jeden in unserem Land eine Pflichtdienstzeit einführen, können wir unsere Bevölkerung deutlich besser nutzen. Manche mögen das nicht unterstützen, aber es sollte funktionieren."
BHU_diplomacy_freedom_bear_arms:0 "Das Recht, Waffen zu tragen"
BHU_diplomacy_freedom_bear_arms_desc:0 "Wenn wir den Fortbestand von Freiheit und Demokratie in unserem Land sichern wollen, müssen wir unseren Bürgern den Zugang zu den Waffen ermöglichen. Sie sollten sich verteidigen dürfen und im schlimmsten Fall für uns kämpfen können."
BHU_diplomacy_freedom_aid_1:0 "Britische Hilfe"
BHU_diplomacy_freedom_aid_1_desc:0 "Da die freien Länder dieser Welt unsere Bemühungen anerkannt haben, können wir von ihnen Hilfe erhalten. Sie werden unsere Bemühungen für eine demokratische Zukunft unterstützen."
BHU_diplomacy_freedom_aid_2:0 "Britische Bomberdesigns"
BHU_diplomacy_freedom_aid_2_desc:0 "Die Briten haben uns einige ihrer Bomberentwürfe geschickt. Diese Entwürfe sind erstaunlich! Sie sind unseren bisherigen um Längen voraus und werden unsere Luftwaffe deutlich stärken und uns den Bau besserer Bomber ermöglichen."
BHU_diplomacy_freedom_aid_3:0 "Britischer Handel"
BHU_diplomacy_freedom_aid_3_desc:0 "Der Handel mit den Briten ist ein sehr wichtiger Faktor in unseren Beziehungen zu Großbritannien. Handel ist ein wertvolles Gut, insbesondere mit Verbündeten."
BHU_diplomacy_freedom_aid_4:0 "Indisch-bhutanischer Freundschaftsvertrag"
BHU_diplomacy_freedom_aid_4_desc:0 "Wir müssen für unsere Sicherheit sorgen. Wenn das Vereinigte Königreich unsere Unabhängigkeit garantiert, können wir in der Gewissheit wachsen, dass es uns bei Bedarf unterstützen wird."
BHU_diplomacy_freedom_3:0 "Landesweiter Patriotismus"
BHU_diplomacy_freedom_3_desc:0 "Es scheint, dass die Entwicklung der neuen Regierung Vertrauen in unsere Bevölkerung weckt. Sie haben nun das Gefühl, dass wir eine bessere Nation sind, und das wird sich sicherlich positiv auf die Moral auswirken."
BHU_diplomacy_capitalism:0 "Kapitalismus"
BHU_diplomacy_capitalism_desc:0 "Was wäre eine demokratische Nation ohne Kapitalismus? Der Kapitalismus ist für ein demokratisches Land von entscheidender Bedeutung, da er ein enormes Wirtschaftswachstum ermöglicht. Die Menschen werden darüber sehr glücklich sein!"
BHU_diplomacy_effordable_housing:0 "Das Gesetz für bezahlbaren Wohnraum"
BHU_diplomacy_effordable_housing_desc:0 "Als demokratische Nation müssen wir an unsere Bürger denken und ihnen helfen. Deshalb müssen wir mit der Umsetzung neuer Gesetze und Verordnungen beginnen, die unseren Bürgern helfen. Wir sollten mit dem Wohnungsbau beginnen, da unsere Bürger derzeit nicht in den besten Wohnungen leben."
BHU_diplomacy_common_currency:0 "Schaffung einer gemeinsamen Währung"
BHU_diplomacy_common_currency_desc:0 "Eine freie Marktwirtschaft erfordert eine Währung, auf die sich die Menschen verlassen und mit der sie problemlos handeln können. Die Schaffung einer gemeinsamen Währung würde den Kauf und Verkauf noch einfacher machen."
BHU_diplomacy_freedom_complete:0 "Verteidiger der Demokratie"
BHU_diplomacy_freedom_complete_desc:0 "Wir sind endlich eine echte demokratische Nation geworden und haben uns die Pflicht geschworen, alle Völker der Welt zu schützen und ihnen das Licht der Freiheit und Unabhängigkeit zu zeigen!"
BHU_diplomacy_freedom_india_1:0 "Eine Botschaft in Delhi"
BHU_diplomacy_freedom_india_1_desc:0 "Da Indien nun unser engster Verbündeter (und Nachbar) ist, sollten wir uns um gegenseitige Unterstützung und Einheit bemühen. Wir sollten mit dem Bau einer Botschaft in Indiens Hauptstadt beginnen und Indien erlauben, eine Botschaft in unserer Hauptstadt zu errichten. Dies wird unsere Beziehungen und unsere politische Effizienz deutlich verbessern."
BHU_diplomacy_left_communism:0 "Gleichheit für alle"
BHU_diplomacy_left_communism_desc:0 "Die Idee einer demokratischen Republik ist idiotisch. Die Bourgeoisie würde alle Märkte kontrollieren und die Arbeiter in Armut leben. Eine wirklich gleichberechtigte Regierung ist die richtige Wahl. Eine, in der alle gleich sind."
BHU_diplomacy_communism_1:0 "Agrargemeinschaften"
BHU_diplomacy_communism_1_desc:0 "Unsere Bauern haben ihre Höfe zu Kommunen zusammengeschlossen. Dies wird die Einheit unseres Volkes und die Zusammenarbeit mit der Regierung erheblich stärken. Es wird zu einer effizienteren Gemeinschaftsstruktur führen."
BHU_diplomacy_communism_2:0 "Politische Gegner ausmerzen"
BHU_diplomacy_communism_2_desc:0 "Die Zeit für eine Revolution hat begonnen. Der erste Schritt besteht darin, alle Gegner zu beseitigen. Ohne Wettbewerb können wir niemals scheitern."
BHU_diplomacy_communism_3:0 "Unterstützen Sie die Gewerkschaften"
BHU_diplomacy_communism_3_desc:0 "Stellen wir sicher, dass alle unsere Arbeiter angemessen behandelt werden. Wir müssen die Gewerkschaften unterstützen. Es ist wichtig, dass unsere Arbeiter Rechte haben und nicht von den bürgerlichen Fabrikbesitzern unterdrückt werden."
BHU_diplomacy_communism_workers_culture:0 "Arbeiterkultur"
BHU_diplomacy_communism_workers_culture_desc:0 "Um die Menschen auf Linie zu bringen, ist es an der Zeit, eine Arbeiterkultur zu schaffen, in der die Menschen arbeiten, um sich gegenseitig zu unterstützen, und niemand reich wird."
BHU_diplomacy_communism_farms_factor:0 "Farmen und Fabriken"
BHU_diplomacy_communism_farms_factor_desc:0 "Wir müssen die landwirtschaftliche und industrielle Entwicklung fortsetzen. Dies wird unsere Wirtschaft verbessern und unser Land noch größer machen."
BHU_diplomacy_communism_comintern_ties:0 "Einladung von Diplomaten der Komintern"
BHU_diplomacy_communism_comintern_ties_desc:0 "Um unsere Regierung zu verbessern, wäre es eine gute Idee, Regierungsbeamte der Komintern einzuladen. Ihre Ideen und ihre Arbeitsmoral sind genau das, was wir brauchen!"
BHU_diplomacy_communism_closer_to_soviets:0 "Näher an die Sowjets heranrücken"
BHU_diplomacy_communism_closer_to_soviets_desc:0 "Da wir nun Diplomaten aus der Sowjetunion haben, ist es an der Zeit, uns stärker in ihren Einflussbereich hineinzubewegen. Wenn wir einen Nichtangriffspakt aushandeln können, würde das unsere Beziehungen zu ihnen erheblich verbessern."
BHU_diplomacy_communism_war_on_fascism:0 "Krieg gegen den Faschismus"
BHU_diplomacy_communism_war_on_fascism_desc:0 "Wir müssen diesen faschistischen Abschaum zerschlagen. Er breitet sich zu schnell aus und bedroht die Welt und unsere Verbündeten. Wir müssen auf alles vorbereitet sein."
BHU_diplomacy_communism_trade_soviets:0 "Handel mit den Sowjets"
BHU_diplomacy_communism_trade_soviets_desc:0 "Wenn wir uns mit den Sowjets zusammenschließen wollen, müssen wir anfangen, gute Handelsabkommen zu schließen. Der Handel wird unseren beiden Nationen helfen und unsere Beziehungen stärken."
BHU_diplomacy_communism_4:0 "Das Rekrutierungsproblem"
BHU_diplomacy_communism_4_desc:0 "Es ist offensichtlich, dass wir nicht genügend Männer für unsere Armee haben. Wir müssen mehr Leute rekrutieren, aber wen? Die Arbeiter sind ein wichtiger Teil unserer Wirtschaft, und wir haben versprochen, ihre Gewerkschaften zu schützen. Aber die Bauern ernähren unsere Bevölkerung. Das ist ein ziemliches Dilemma."
BHU_diplomacy_communism_human_wall:0 "Eine menschliche Mauer"
BHU_diplomacy_communism_human_wall_desc:0 "Unsere Armee muss riesig sein, die Verluste spielen keine Rolle, wir werden unsere Feinde durch zahlenmäßige Überlegenheit besiegen!"
BHU_diplomacy_communism_secret_police:0 "Geheimpolizei"
BHU_diplomacy_communism_secret_police_desc:0 "Wenn wir unser Volk unter Kontrolle halten wollen, müssen wir dafür sorgen, dass sich keine widersprüchlichen Ideen verbreiten. Eine Geheimpolizei würde diese Aufgabe perfekt erfüllen."
BHU_diplomacy_communism_research:0 "Kommunale Forschungsinitiative"
BHU_diplomacy_communism_research_desc:0 "Wenn wir neue Technologien entdecken wollen, müssen wir die Organisation unserer Forschungsteams klug überdenken. Eine kluge Idee wäre, sie in verschiedene Fachgebiete aufzuteilen. Dadurch können wir unsere Forschung deutlich beschleunigen."
BHU_diplomacy_communism_complete:0 "Vereinte Nationen"
BHU_diplomacy_communism_complete_desc:0 "Um unsere kommunistische Revolution zu vollenden, müssen wir unser Volk endlich vereinen. Dann können wir unsere Ideen in der Welt verbreiten."
BHU_diplomacy_split_middle:0 "Den Status Quo beibehalten"
BHU_diplomacy_split_middle_desc:0 "Es besteht kein Bedarf an Veränderungen. Unsere Regierung kann auch unter einem dynastischen System gut funktionieren. Um jedoch eine völlige Desintegration unseres Landes zu vermeiden, müssen wir einige neue Reformen einleiten."
BHU_diplomacy_neut_new_reforms:0 "Neue Reformen umsetzen"
BHU_diplomacy_neut_new_reforms_desc:0 "Wenn wir den Zerfall unserer Regierung verhindern wollen, müssen wir einige neue Reformen durchführen. Diese werden die Grundlage für unsere Dynastie bilden und sie in die Moderne führen."
BHU_diplomacy_neut_buddhism:0 "Buddhismus als primäre Religion"
BHU_diplomacy_neut_buddhism_desc:0 "Der Buddhismus ist seit langem tief in unserer Geschichte verwurzelt. Es ist an der Zeit, sich stärker mit diesen Kernideen auseinanderzusetzen. Der Buddhismus sollte in jedem Zuhause praktiziert werden."
BHU_diplomacy_neut_farming_1:0 "Umarme den Feudalismus"
BHU_diplomacy_neut_farming_1_desc:0 "Den Feudalismus gibt es schon seit Jahrhunderten. Doch nun scheint sich einiges geändert zu haben. Doch wenn wir den Feudalismus annehmen und einige kleine Änderungen vornehmen, können wir seine Vorteile ernten."
BHU_diplomacy_neut_farming_2:0 "Kleinstadtlandwirtschaft"
BHU_diplomacy_neut_farming_2_desc:0 "Die Zeit des Feudalismus ist längst vorbei. Wir müssen zu einem besseren System übergehen. Wir können mit kleinen Bauerngemeinschaften beginnen. Jeder unterstützt den anderen. Das wiederum trägt zur Wirtschaft bei. Das sollte langfristig gut funktionieren."
BHU_diplomacy_neut_monasteries:0 "Klosterprojekte"
BHU_diplomacy_neut_monasteries_desc:0 "Wir müssen an unseren Grundideen festhalten. Wir sollten mehr Monasterien und Tempel in unserem Land bauen. So können die Menschen frei beten und leben. Das wird unsere Nation als Ganzes stärken."
BHU_diplomacy_neut_army_1:0 "Finanzieren Sie die königliche Garde"
BHU_diplomacy_neut_army_1_desc:0 "Jahrhundertelang war die königliche Garde das Rückgrat unserer Armee. Wir können nicht riskieren, dass sie veraltet und überholt ist. Wir müssen endlich in neue Waffen und Technologien investieren."
BHU_diplomacy_neut_army_2:0 "Förderung der militärischen Beteiligung"
BHU_diplomacy_neut_army_2_desc:0 "Wir brauchen mehr Reservisten. Wir sollten uns dafür einsetzen, dass sich mehr Leute der Armee anschließen. Das sollte uns helfen, mehr Leute für unsere Truppen zu gewinnen."
BHU_diplomacy_neut_army_3:0 "Aus vergangenen Erfolgen lernen"
BHU_diplomacy_neut_army_3_desc:0 "Wenn wir erfolgreich sein wollen, müssen wir aus der Vergangenheit lernen. Unsere vergangenen Kämpfe können uns viele neue Taktiken und Ideen liefern. Wenn wir nicht aus der Vergangenheit lernen, werden wir immer wieder scheitern."
BHU_diplomacy_neut_neighbors_1:0 "Bauen Sie Einfluss bei den Nachbarn auf"
BHU_diplomacy_neut_neighbors_1_desc:0 "Wenn wir in dieser rauen Welt überleben wollen, müssen wir Freundschaften schließen. Unsere beiden Nachbarn sind ein guter Anfang. Mit einer ähnlichen Regierung werden sie netter zu uns sein."
BHU_diplomacy_neut_neighbors_2:0 "Projekte zur vernetzten Wirtschaft"
BHU_diplomacy_neut_neighbors_2_desc:0 "Wenn wir weiterhin ein gutes Verhältnis zu unseren Nachbarn aufbauen wollen, müssen wir unsere Volkswirtschaften gegenseitig stärken. Die Vernetzung unserer Volkswirtschaften würde den Aufbau der heimischen Industrie fördern und die Abhängigkeit von anderen größeren Nationen verringern."
BHU_diplomacy_neut_neighbors_3:0 "Vereinigungsvorschlag"
BHU_diplomacy_neut_neighbors_3_desc:0 "Es scheint, als wären wir drei auf dem Weg der ewigen Zusammenarbeit. Obwohl uns jetzt eine neue Idee präsentiert wird, wie wäre es, wenn wir uns zusammenschließen? Wenn wir drei uns zusammenschließen, haben wir vielleicht eine Chance gegen diese immer größer werdenden globalen Supermächte. Das könnte funktionieren."
BHU_diplomacy_neut_end:0 "Dynastisches Erbe"
BHU_diplomacy_neut_end_desc:0 "Wir haben uns jahrhundertelang auf ein dynastisches System verlassen, und das werden wir auch in Zukunft tun. Das Wachstum unserer Nation hat gezeigt, dass wir in dieser Regierungsform überleben und gedeihen können. Wir werden Erfolg haben. Lang lebe Jigme!"
#
BHU_gov_global_start_choice:0 "Globale Interaktionen"
BHU_gov_global_start_choice_desc:0 "Nachdem wir das Problem unserer Regierung gelöst haben, müssen wir uns der nächsten Frage zuwenden. Wie sollten wir mit anderen Nationen interagieren? Dies ist eine sehr wichtige Entscheidung."
BHU_gov_global_start1:0 "Globale Interaktionen - Politisch"
BHU_gov_global_start1_desc:0 "Bei der Interaktion mit anderen Ländern werden wir versuchen, zunächst zu reden."
BHU_gov_global_start2:0 "Globale Interaktionen – Aggressiv"
BHU_gov_global_start2_desc:0 "Im Umgang mit anderen Ländern werden wir zuerst kämpfen und dann Fragen stellen."
BHU_gov_global_war_in_asia:0 "Krieg in Asien"
BHU_gov_global_war_in_asia_desc:0 "Es ist Zeit, unsere Nation zu erweitern, und der erste Schritt besteht darin, die Kontrolle über unsere asiatischen Nachbarländer zu erlangen."
BHU_gov_global_war_asia_china:0 "Chinesisch-japanische Kriegsintervention"
BHU_gov_global_war_asia_china_desc:0 "Es scheint, als hätten die Japaner endlich ihren Zug gemacht. Die Chinesen haben derzeit sicherlich alle Hände voll zu tun. Was können wir tun, um das Blatt zu wenden?"
BHU_gov_global_war_asia_china_hjap:0 "Seite an Seite mit den Japanern"
BHU_gov_global_war_asia_china_hjap_desc:0 "In diesem Szenario ist es die beste Wahl, den Japanern zu helfen."
BHU_gov_global_war_asia_china_hjap_direct:0 "Helfen Sie Japan direkt"
BHU_gov_global_war_asia_china_hjap_direct_desc:0 "Die beste Möglichkeit, diesen Konflikt zu beenden, ist eine direkte Intervention. Einen Zweifrontenkrieg werden die Chinesen niemals überleben."
BHU_gov_global_war_asia_china_hjap_indirect:0 "Sabotage der chinesischen Industrie"
BHU_gov_global_war_asia_china_hjap_indirect_desc:0 "Wir sollten uns nicht direkt in diesen Konflikt einmischen. Er könnte für uns böse enden. Wenn wir die chinesische Industrie sabotieren, können wir sie langsam zermürben."
BHU_gov_global_war_asia_china_hchina:0 "Seite an Seite mit den Chinesen"
BHU_gov_global_war_asia_china_hchina_desc:0 "Es ist zwingend notwendig, dass wir den Chinesen helfen, denn ohne sie haben sie keine Chance."
BHU_gov_global_war_asia_china_hchina_direct:0 "China direkt helfen"
BHU_gov_global_war_asia_china_hchina_direct_desc:0 "Der beste Weg, diesen Konflikt zu beenden, besteht darin, direkt einzugreifen. Mit vereinten Kräften können wir sie besiegen."
BHU_gov_global_war_asia_china_hchina_indirect:0 "Der Xibei-Deal"
BHU_gov_global_war_asia_china_hchina_indirect_desc:0 "Dieser Krieg scheint in jede Richtung gehen zu können. Wenn die Chinesen verlieren, könnten wir die Nächsten sein. Wir müssen einen Deal mit den Chinesen machen. Wenn wir Truppengarnisonen auf chinesischem Boden stationieren, um sie zu schützen, und sie ihnen dann, wenn sie hoffentlich gewinnen, zurückgeben, könnte das funktionieren. Die Chinesen müssen jedoch entscheiden."
BHU_gov_global_war_in_middle_east:0 "Krieg im Nahen Osten"
BHU_gov_global_war_in_middle_east_desc:0 "Nachdem wir unsere Nation nun erweitert haben, ist es an der Zeit, nach Westen zu blicken, in Richtung der ölgefüllten Wüsten und Rocky Mountains des Nahen Ostens."
BHU_gov_global_war_afghanistan:0 "Invasion in Afghanistan"
BHU_gov_global_war_afghanistan_desc:0 "Als unser nächster Nachbar im Nahen Osten sollte Afghanistan unser erstes Ziel sein. Die Berge mögen hart sein, aber unsere Truppen können es schaffen."
BHU_gov_global_iranian_deal:0 "Der Iran-Deal"
BHU_gov_global_iranian_deal_desc:0 "Bevor wir in den Iran eingreifen, müssen wir zunächst die britischen Ölfelder in der Region berücksichtigen. Wenn die Briten ihre Ölvorkommen bedroht sehen, würden sie sicherlich reagieren. Vielleicht können wir mit ihnen ein Abkommen schließen, um dieses Problem zu lösen?"
BHU_gov_global_invade_iraq:0 "Invasion im Irak"
BHU_gov_global_invade_iraq_desc:0 "Nachdem wir nun den Iran unter Kontrolle haben, sollten wir unseren Vorstoß in den Mittleren Osten fortsetzen. Der Irak sollte unser nächstes Ziel sein. Auch dort gibt es große Ölvorräte, die wir erbeuten können."
BHU_gov_global_invade_saudi:0 "Überqueren Sie das Arabische Meer"
BHU_gov_global_invade_saudi_desc:0 "Wenn wir Arabien unter Kontrolle bringen wollen, müssen wir klug vorgehen. Der Kampf in der trockenen und rauen Wüste wird lange dauern und viele Opfer fordern. Wir müssen auf andere Weise einmarschieren. Eine Invasion von See aus wäre eine kluge Idee."
######
BHU_gov_global_war_in_europe:0 "Der Krieg in Europa"
BHU_gov_global_war_in_europe_desc:0 "Die Welt scheint im Chaos zu versinken. Das Deutsche Reich scheint in den letzten Jahren rasant zu expandieren, doch die Alliierten haben nun ein Wörtchen mitzureden. Dieser globale Konflikt bietet viele Chancen. Wie können wir eingreifen?"
BHU_gov_global_europe_allies:0 "Unterstützen Sie die Alliierten"
BHU_gov_global_europe_allies_desc:0 "Wir müssen verhindern, dass sich das Böse in der Welt ausbreitet. Die beste Idee ist, uns mit den alliierten Mächten zu verbünden."
BHU_gov_global_europe_allies_war_germany:0 "Zerstöre den Faschismus"
BHU_gov_global_europe_allies_war_germany_desc:0 "Deutschland scheint derzeit unaufhaltsam. Wir müssen helfen, wo wir können. Wenn die Deutschen nicht gestoppt werden, könnte dies das Ende der Freiheit, wie wir sie kennen, bedeuten."
BHU_gov_global_europe_allies_soviet_threat:0 "Die sowjetische Bedrohung"
BHU_gov_global_europe_allies_soviet_threat_desc:0 "Der russische Staat ist zu mächtig geworden. Stalin ist instabil und unzuverlässig. Wer weiß, was er noch tun könnte. Es scheint besser, jetzt etwas zu unternehmen als später."
BHU_gov_global_europe_allies_liberate_china:0 "Befreit die Chinesen"
BHU_gov_global_europe_allies_liberate_china_desc:0 "Die faschistischen Chinesen an unseren Grenzen und die Japaner in unmittelbarer Nähe stellen eine ernsthafte Bedrohung für unsere Freiheit dar. Sie müssen gestoppt werden. Wir müssen die Rebellen in China unterstützen, die den wahren Weg der Demokratie erkennen. Mit ihnen an unserer Seite können wir Japan besiegen."
BHU_gov_global_europe_axis:0 "Unterstützen Sie die Achse"
BHU_gov_global_europe_axis_desc:0 "Unsere besten Expansionschancen liegen in der Zusammenarbeit mit den Achsenmächten. Sie wissen, wie ein Land wirklich regiert werden sollte. Gemeinsam werden wir die Alliierten vernichten!"
BHU_gov_global_europe_axis_russia_war:0 "Speer den Bären"
BHU_gov_global_europe_axis_russia_war_desc:0 "Derzeit stellen die Sowjets eine große Bedrohung für unseren Expansionsdrang dar. Wir müssen sie dort treffen, wo sie am schwächsten sind. Sie würden niemals einen Angriff mitten in ihrem Territorium vermuten."
BHU_gov_global_europe_axis_indochina:0 "Vorstoß nach Indochina"
BHU_gov_global_europe_axis_indochina_desc:0 "Da die Franzosen derzeit beschäftigt sind, wäre es ein guter Zeitpunkt, ihre asiatischen Kolonien zu erobern. Französisch-Indochina liegt offen und wir müssen es sichern."
BHU_gov_global_europe_axis_british_malaya:0 "Erobern Sie Britisch-Malaya"
BHU_gov_global_europe_axis_british_malaya_desc:0 "Britisch-Malaya steht uns offen. Wahrscheinlich sind dort nicht viele Truppen stationiert. Ihre Ressourcen wären uns eine große Hilfe."
BHU_gov_global_europe_comintern:0 "Unterstützen Sie die Komintern"
BHU_gov_global_europe_comintern_desc:0 "Die Sowjets sind die einzigen, die unsere Sache wirklich verstehen. Wenn wir mit ihnen zusammenarbeiten, können wir eine ewige Bruderschaft schaffen."
BHU_gov_global_europe_comintern_war_japan:0 "Räche Russland"
BHU_gov_global_europe_comintern_war_japan_desc:0 "Die Russen haben zwar schon einmal gegen die Japaner verloren, aber gemeinsam können wir sie in die Schranken weisen. Sie sind unserer Macht nicht gewachsen."
BHU_gov_global_europe_comintern_war_germany:0 "Befreit die deutschen Kommunisten"
BHU_gov_global_europe_comintern_war_germany_desc:0 "Seit dem Ende der Weimarer Republik kämpfen Faschisten und Kommunisten um die Macht in der deutschen Politik. Nun scheinen die Faschisten in Deutschland die Kontrolle übernommen zu haben und unsere kommunistischen Brüder zu töten. Ihnen muss eine Lektion erteilt werden."
BHU_gov_global_europe_comintern_control_italy:0 "Befreiung Afrikas"
BHU_gov_global_europe_comintern_control_italy_desc:0 "Wir können nicht riskieren, dass die Achsenmächte die vollständige Kontrolle über den afrikanischen Kontinent erlangen. Wir müssen die Kontrolle übernehmen, bevor sie es tun. Sie haben sich bereits ausreichend ausgedehnt."
######
BHU_choose_faction1:0 "Eine Seite wählen"
BHU_choose_faction1_desc:0 "Jetzt, da unser Land gewachsen ist und wir eine starke Regierung haben, können wir uns endlich einer Fraktion anschließen. Welche sollten wir wählen, mit wem sollten wir uns verbünden? Es gibt viele gute Möglichkeiten."
BHU_choose_faction_allies:0 "Alliierten"
BHU_choose_faction_allies_desc:0 "Da unsere Regierung in diese Richtung ausgerichtet ist, wäre es die beste Entscheidung, sich den Alliierten anzuschließen. Jeder Mensch hat ein Recht auf Freiheit, die Demokratie ist die beste Regierungsform."
BHU_choose_faction_comintern:0 "Die Komintern"
BHU_choose_faction_comintern_desc:0 "Da unsere Regierung in diese Richtung ausgerichtet ist, wäre es die beste Entscheidung, der Komintern beizutreten. Der Kommunismus ist die einzig wahre Regierung und allen Regierungen überlegen."
BHU_choose_faction_axis:0 "Die Achse"
BHU_choose_faction_axis_desc:0 "Da unsere Regierung in die gleiche Richtung ausgerichtet ist, wäre es die beste Entscheidung, sich der Achse anzuschließen. Sie haben die richtige Vorstellung davon, was mit der Welt geschehen soll."
BHU_choose_faction_new:0 "Unsere eigene Fraktion"
BHU_choose_faction_new_desc:0 "Sich einer anderen Fraktion anzuschließen, ist ein törichtes Unterfangen. Wir würden nur wie Marionetten herumkommandiert werden. Wir müssen unsere eigene Fraktion gründen, in der wir das Sagen haben."
#
BHU_army_start:0 "Lehren aus dem Ersten Weltkrieg"
BHU_army_start_desc:0 "Unser Militär ist furchtbar. Wir verfügen nur über ein paar grundlegende Verteidigungsdivisionen. Sie können nicht mit den Armeen unserer Nachbarn mithalten. Wir müssen sie verbessern, wir müssen aus der Vergangenheit lernen, wir müssen aus ... dem Ersten Weltkrieg lernen."
BHU_army_rifles_1:0 "Bessere Gewehre"
BHU_army_rifles_1_desc:0 "Die Waffen, die wir derzeit produzieren, sind furchtbar. Es könnten genauso gut Musketen sein. Wir müssen neue und bessere Waffen entwickeln, damit unsere Divisionen gut bewaffnet sind."
BHU_army_trucks_1:0 "Aktualisieren Sie die Kavallerie"
BHU_army_trucks_1_desc:0 "Pferde mögen zwar gute Kletterer sein, aber als Fronteinheiten? Nein, wir müssen die Idee der Kavallerie verwerfen, Lastwagen sind eine viel bessere Alternative. Und in diesen hohen Bergen sollten sie besser gut sein."
BHU_army_trucks_2:0 "Fortschritte bei LKWs"
BHU_army_trucks_2_desc:0 "Jetzt, da wir über serienmäßige motorisierte Lastwagen verfügen, können wir in die Zukunft blicken. Wir können diese Lastwagen verbessern, mit Panzerung und Waffen ausstatten. Das wird einen großen Fortschritt in der Truppentransporttechnologie bedeuten."
BHU_army_tanks_1:0 "Stehlen Sie britische Panzerdesigns"
BHU_army_tanks_1_desc:0 "Wir brauchen Panzer. Sie sind sehr mächtige Kriegsmaschinen. Aber wenn wir sie selbst bauen, werden sie schrecklich sein. Wir brauchen zuverlässige Panzer. Die Briten sind eine gute Wahl."
BHU_army_tanks_2:0 "Stärkere Panzerung"
BHU_army_tanks_2_desc:0 "Was ist ein Panzer ohne starke Panzerung? Wir müssen anfangen, nach besseren und stärkeren Panzerungen für unsere Panzer zu forschen, da sie ohne sie sehr ineffektiv wären."
BHU_army_vehicle_fuel:0 "Effizienterer Kraftstoff"
BHU_army_vehicle_fuel_desc:0 "Unsere Panzer und Lastwagen benötigen effizienteren Treibstoff. Dies wird ihre Geschwindigkeit und Effizienz deutlich steigern und es uns ermöglichen, das Blatt in der Schlacht zu wenden."
BHU_army_planes_1:0 "Investitionen in Flugzeuge"
BHU_army_planes_1_desc:0 "Es scheint, dass die Luftüberlegenheit heute ein sehr wichtiges Mittel im Krieg ist. Wir wollen nicht ins Hintertreffen geraten. Es wäre eine kluge Entscheidung, einen Teil unserer Mittel in die Flugzeugforschung zu investieren."
BHU_army_planes_2:0 "Luftwaffenstützpunkte auf Berggipfeln"
BHU_army_planes_2_desc:0 "Um unsere neuen Flugzeuge optimal nutzen zu können, benötigen wir Flugplätze. Unsere Lage im Hochgebirge stellt allerdings ein Problem dar, das unsere Ingenieure überwinden müssen. Doch am Ende wird es sich lohnen."
BHU_army_planes_3:0 "Luftstrategien"
BHU_army_planes_3_desc:0 "Wir müssen entscheiden, wie unsere Flugzeuge kämpfen sollen. Das ist sehr wichtig, da die Luftüberlegenheit ein entscheidender Punkt im Gefecht ist. Welchen Weg sollten wir einschlagen?"
BHU_army_tactics_1:0 "Mechanisierter Angriff"
BHU_army_tactics_1_desc:0 "Eine gute Strategie, um Schlachten zu gewinnen, sind schnelle mechanisierte Angriffe. Panzer und gepanzerte Lastwagen rücken schnell auf unsere Feinde zu, ihnen bleibt kaum Zeit zum Reagieren. Dies ist sicherlich die beste Kriegsstrategie."
BHU_army_tactics_2:0 "Überwältigendes Sperrfeuer"
BHU_army_tactics_2_desc:0 "Eine clevere Methode, Schlachten zu gewinnen, besteht darin, unsere Feinde mit Artilleriefeuer festzunageln. Danach können wir schnell auf ihre Stellungen vorrücken. Ein großes Artilleriearsenal ist eine kluge Entscheidung."
BHU_army_rifles_2:0 "Studieren Sie alliierte Waffen"
BHU_army_rifles_2_desc:0 "Eine gute Möglichkeit, unsere Waffen zu verbessern, besteht darin, sie auf früheren Designs aufzubauen. Die Alliierten verfügten schon immer über sehr effektive und effiziente Gewehre. Wenn wir unsere Waffen auf ihren basieren, werden wir im Kampf sicherlich im Vorteil sein."
BHU_army_boats_1:0 "Offene Gewässer"
BHU_army_boats_1_desc:0 "So etwas haben wir noch nie erlebt: Wir können endlich eine Marine haben. Auch wenn sie zunächst klein sein mag, werden wir endlich in der Lage sein, mit unseren gepanzerten Todesschiffen über die Meere zu segeln!"
BHU_army_boats_2:0 "Eiserne Riesen"
BHU_army_boats_2_desc:0 "Schlachtschiffe sind eine echte Macht, mit der man sich nicht anlegen sollte. Sie sind im Kampf extrem schlagkräftig und gehören zu den wichtigsten Bestandteilen einer Marine. Es wäre eine kluge Entscheidung, jetzt mit dem Bau zu beginnen."
BHU_army_boats_3:0 "Seestrategien"
BHU_army_boats_3_desc:0 "Die Strategie ist der wichtigste Teil einer Schlacht. Unsere Marine muss entscheiden, wie sie kämpft, und wir haben viele gute Möglichkeiten."
BHU_army_finish:0 "Neu organisierte Armee"
BHU_army_finish_desc:0 "Unsere Armee ist endlich modernisiert. Wir müssen nur noch all diese neuen Ideen und Waffen kombinieren, um unsere Armee noch effektiver zu machen. Wir können jetzt noch einfacher expandieren, Bhutan ist nicht mehr aufzuhalten!"
BHU_army_planes_exp_1:0 "Fortsetzung des Ausbaus des Luftwaffenstützpunkts"
BHU_army_planes_exp_1_desc:0 "Es ist wichtig, dass wir weiterhin im ganzen Land Luftwaffenstützpunkte bauen, denn je mehr wir bedienen können, desto besser."
BHU_army_planes_exp_2Bombers:0 "Fokus auf Bomberproduktion"
BHU_army_planes_exp_2Bombers_desc:0 "Bomber sind wichtiger. Wir müssen unsere Bemühungen darauf konzentrieren, so viele Bomber wie möglich zu produzieren, damit wir die Versorgungslinien unserer Feinde lahmlegen können."
BHU_army_planes_bomber_research:0 "Giganten am Himmel"
BHU_army_planes_bomber_research_desc:0 "Wenn wir die Fabriken unserer Feinde lahmlegen, wird das ihre Versorgung erheblich einschränken. Wir müssen unsere Bomber vergrößern. Sie brauchen größere Reichweite, größere Bombenladungen und mehr Sprengstoff. Das sollte Priorität haben."
BHU_army_planes_jet_bomber_research:0 "Düsenbomber"
BHU_army_planes_jet_bomber_research_desc:0 "Da wir nun Zugang zu Düsentriebwerken haben, können wir damit beginnen, unsere Bomber damit auszurüsten. Dies stellt einen großen Fortschritt für unsere Strategie dar."
BHU_army_planes_exp_2Fighters:0 "Fokus auf Kampfflugzeugproduktion"
BHU_army_planes_exp_2Fighters_desc:0 "Kampfflugzeuge sind wichtiger. Wir müssen unsere Bemühungen darauf konzentrieren, so viele Kampfflugzeuge wie möglich zu produzieren, damit wir unseren Feinden die Kontrolle über den Himmel entreißen können."
BHU_army_planes_fighter_research:0 "Kontrolliere den Himmel"
BHU_army_planes_fighter_research_desc:0 "Kampfflugzeuge sind der wichtigste Bestandteil einer Luftwaffe. Wir müssen unsere Kampfflugzeuge ständig weiterentwickeln, um unsere Lufthoheit zu bewahren."
BHU_army_planes_fighter_jet_research:0 "Donnerdrachen"
BHU_army_planes_fighter_jet_research_desc:0 "Wenn wir unsere Kampfflugzeuge mit Düsentriebwerken ausstatten können, verfügen wir über ein äußerst mächtiges Werkzeug. Diese Düsenjäger werden allen Luftkämpfen ein Ende setzen, und wir brauchen sie."
BHU_army_planes_exp_3:0 "Luftwaffenstützpunkte in Tibet"
BHU_army_planes_exp_3_desc:0 "Da wir nun Tibet kontrollieren, sollten wir mit dem Bau von Luftwaffenstützpunkten beginnen. Wenn wir den Luftraum nicht kontrollieren, sind wir im Nachteil."
BHU_army_planes_exp_4:0 "Luftwaffenstützpunkte in Nepal"
BHU_army_planes_exp_4_desc:0 "Da wir nun Nepal kontrollieren, sollten wir mit dem Bau unserer Luftwaffenstützpunkte beginnen. Es ist sehr wichtig, dass wir die Lufthoheit über unserem Land behalten, denn ohne sie sind unsere Truppen schutzlos."
BHU_army_planes_exp_5:0 "Luftwaffenstützpunkte in Sinkiang"
BHU_army_planes_exp_5_desc:0 "Um Sinkiang unter Kontrolle zu bringen, müssen wir auch den Luftraum darüber kontrollieren. Wir sollten mit dem Bau einiger Luftwaffenstützpunkte dort beginnen."
BHU_army_volunteers:0 "Freiwilligenkorps"
BHU_army_volunteers_desc:0 "Es ist sehr wichtig, unseren Verbündeten Hilfe zu leisten. Wir müssen ein Programm auflegen, mit dem wir dies einfacher und problemloser tun können."
BHU_army_strat_1:0 "Der langsame Schub"
BHU_army_strat_1_desc:0 "Unsere Truppen sollten langsam auf den Feind vorrücken, um uns Zeit zu geben, sie zu organisieren. Groß angelegte Angriffe sind zu riskant."
BHU_army_strat_2:0 "Blitz"
BHU_army_strat_2_desc:0 "Unsere Truppen sollten schnell und zügig auf unsere Feinde zustürmen und ihnen wenig Zeit zum Reagieren lassen. In Kombination mit Panzern und mechanisierten Streitkräften ist diese Strategie von unschätzbarem Wert."
BHU_army_strat_3:0 "Umfangreiche Planung"
BHU_army_strat_3_desc:0 "Wir sollten unsere Schlachten umfassend planen, damit wir jedes Szenario durchplanen können. Planung ist im Krieg sehr wichtig."
BHU_army_strat_training1:0 "Ruf zu den Waffen"
BHU_army_strat_training1_desc:0 "Die Menschen müssen wissen, dass es jetzt an der Zeit ist, zur Waffe zu greifen und sich der Armee anzuschließen. Für das, was wir durchmachen müssen, brauchen wir jeden, den wir kriegen können."
BHU_army_strat_training2:0 "Bilden Sie bessere Generäle aus"
BHU_army_strat_training2_desc:0 "Wir brauchen bessere Generäle. Es wäre eine schreckliche Entscheidung, sie unausgebildet unsere Truppen führen zu lassen. Wir müssen ein Programm zur Ausbildung von Generälen einführen, damit sie unsere Truppen besser führen können."
BHU_army_strat_production:0 "Effizienz in der Militärproduktion"
BHU_army_strat_production_desc:0 "Nachdem unsere Armee reformiert ist und wir uns für eine Vorgehensweise entschieden haben, können wir uns etwas Zeit nehmen, um die Produktion dessen, was wir brauchen, zu verbessern."
BHU_army_tank_production:0 "Priorisieren Sie die Produktion leichter Panzer"
BHU_army_tank_production_desc:0 "Panzer sind ein sehr nützliches Gut, und ihre Herstellung ist ein langwieriger Prozess. Wenn wir jedoch bei der Produktion auf Effizienz setzen, können wir ihre Herstellung immer weiter verbessern."
BHU_army_tank_medium:0 "Fortschritte in der Tanktechnologie"
BHU_army_tank_medium_desc:0 "Wir müssen uns von leichten Panzern lösen. Wir brauchen größere und stärkere Panzer. Etwas, das mit einem deutschen Panzer vergleichbar ist. Wenn wir so etwas bauen, können wir einen großen Vorteil haben."
BHU_army_tank_heavy:0 "Stahlbestien"
BHU_army_tank_heavy_desc:0 "Wir müssen bei der Panzerkonstruktion noch einen Schritt weiter gehen. Wie groß können wir werden? Wir brauchen größere Geschütze, bessere Panzerung und absolute Dominanz auf dem Schlachtfeld. Diese Bestien sollten in der Lage sein, alles zu zerstören, was ihnen in den Weg kommt."
BHU_army_strat_supplies:0 "Bhutanese General Equipment Co."
BHU_army_strat_supplies_desc:0 "Nachschub ist für unsere Soldaten eine sehr wichtige Ressource. Wir sollten ein Unternehmen gründen, das ausschließlich Nachschub produziert. So können wir ihn schneller und besser produzieren."
BHU_army_strat_guns:0 "Quciken Waffenproduktion"
BHU_army_strat_guns_desc:0 "Waffen sind der wichtigste Bestandteil einer Armee. Ohne sie ist unsere Armee nutzlos. Wir müssen die Waffenproduktion beschleunigen, um unsere Vorräte aufzustocken."
BHU_army_strat_arty:0 "Die neue Kanone"
BHU_army_strat_arty_desc:0 "Auch die Artillerie ist sehr wichtig. Wenn wir neue Designs für die Artillerie entwickeln, können wir sie schneller und besser produzieren. Dies wird unsere Kriegsanstrengungen erheblich unterstützen."
BHU_army_strat_anti:0 "Spezialwaffen"
BHU_army_strat_anti_desc:0 "Um die Angriffe unserer Feinde abzuwehren, müssen wir Spezialwaffen einsetzen. Wir brauchen Flugabwehr- und Panzerabwehrkanonen in unserem Arsenal. Mit diesen können wir die Flugzeuge und Panzer unserer Feinde ausschalten."
BHU_army_strat_transports:0 "Ausbau der Automobilindustrie"
BHU_army_strat_transports_desc:0 "Lkw sind ein sehr nützliches Mittel für den Truppentransport. Durch den Ausbau unserer Automobilindustrie können wir die Lkw-Produktion steigern. Zudem wird unsere Bevölkerung besseren Zugang zu Fahrzeugen haben."
BHU_army_strat_complete:0 "Hochgeschwindigkeitsproduktion"
BHU_army_strat_complete_desc:0 "Wir sind bei der Herstellung von Waffen, Panzern und dergleichen äußerst effizient geworden. Das wird sicherlich zu immer besseren Erträgen führen. Unsere Effizienz wird durch die Decke gehen!"
BHU_army_industrial_redirection:0 "Industrielle Neuausrichtung"
BHU_army_industrial_redirection_desc:0 "Nachdem unser Militär reformiert ist, müssen wir uns auf die Reform unserer Industrie konzentrieren. Welche Richtung sollten wir wählen? Sollen wir eine industrielle oder eine militaristische Wirtschaft aufbauen?"
BHU_army_civ_prod:0 "Bauindustrie"
BHU_army_civ_prod_desc:0 "Wir sollten uns auf den Bau ziviler Fabriken konzentrieren, da uns dies den Aufbau einer äußerst effizienten und schnellen Bauindustrie ermöglichen wird."
BHU_army_mil_prod:0 "Militärische Vorräte"
BHU_army_mil_prod_desc:0 "Wir sollten uns auf den Bau von Waffenfabriken konzentrieren, da wir mehr Waffen benötigen und der Besitz eines vollständigen Arsenals oberste Priorität hat."
BHU_army_rifle_stockpiles:0 "Beginnen Sie mit der Anhäufung von Waffen"
BHU_army_rifle_stockpiles_desc:0 "Wir brauchen einen zuverlässigen Waffenvorrat für unsere Truppen. Es scheint, als bräuchten wir eine riesige Menge davon, aber irgendwo müssen wir anfangen."
BHU_army_sf_paratroopers:0 "Luftbrigaden"
BHU_army_sf_paratroopers_desc:0 "Fallschirmjäger sind eine geniale Idee. Wir können Truppen hinter die feindlichen Linien fliegen, um geheime Missionen durchzuführen. Das ist eine großartige Idee."
BHU_army_sf_marinies:0 "Spezialeinheiten"
BHU_army_sf_marinies_desc:0 "Die Invasion unserer Feinde über den Seeweg ist eine schwierige Aufgabe. Es wäre jedoch eine kluge Idee, einen Teil unserer Streitkräfte eigens dafür einzusetzen. Marinesoldaten sind die beste Option."
BHU_army_sf_mountains:0 "Gebirgsdivisionen"
BHU_army_sf_mountains_desc:0 "Diese Berge stellen eine große Herausforderung für unsere Truppen dar. Bergsteiger könnten sie problemlos besteigen. Wir müssen uns eingehender damit befassen."
BHU_army_boats_dockyards:0 "Bau von Marinewerften"
BHU_army_boats_dockyards_desc:0 "Um die Kontrolle über die Meere zu behalten, benötigen wir eine starke Marine. Und dafür brauchen wir viele Schiffe. Wir sollten mit dem Bau von Werften in Küstennähe beginnen, um die Produktion unserer Schiffe zu steigern."
BHU_army_boats_exp_subs:0 "Studieren Sie deutsche U-Boot-Designs"
BHU_army_boats_exp_subs_desc:0 "Wenn wir die maritimen Versorgungsketten unserer Feinde lahmlegen wollen, brauchen wir U-Boote. Aber wie bauen wir sie? Wir haben noch nie welche gebaut. Wir müssen deutsche Konstruktionen aus dem Ersten Weltkrieg studieren. Die wissen doch, was sie tun."
BHU_army_boats_exp_sub_tactics:0 "Fortgeschrittene U-Boot-Taktiken"
BHU_army_boats_exp_sub_tactics_desc:0 "Wenn wir das Beste aus unseren U-Booten herausholen wollen, müssen wir neue Taktiken entwickeln. Neue Strategien werden sicherlich zu mehr Erfolg im Gefecht führen."
BHU_army_boats_exp_destroyers:0 "Beginnen Sie mit dem Bau kleiner Schiffe"
BHU_army_boats_exp_destroyers_desc:0 "Wir müssen beim Schiffsbau irgendwo anfangen. Zerstörer scheinen der beste Ausgangspunkt zu sein. Sie haben viele Rollen und werden in allen Flotten benötigt."
BHU_army_boats_exp_cruisers:0 "U-Boot-Abwehr"
BHU_army_boats_exp_cruisers_desc:0 "Wenn wir uns gegen U-Boote verteidigen wollen, brauchen wir spezielle Schiffe. Wir brauchen größere Schiffe, die U-Boote erkennen und zerstören können."
BHU_army_boats_exp_strats:0 "Vorstand für Seestrategien"
BHU_army_boats_exp_strats_desc:0 "Die Kontrolle der See ist wichtig. Wenn wir mithalten wollen, müssen wir neue Strategien entwickeln. Wir brauchen eine Abteilung in unserem Militär für neue Strategien."
BHU_army_boats_exp_navy_planes:0 "Torpedobomber"
BHU_army_boats_exp_navy_planes_desc:0 "Es wäre eine große Hilfe, wenn wir unsere Flugzeuge in Seeschlachten einsetzen könnten. Wir könnten diese „Torpedos“ an ihnen befestigen und so feindliche Schiffe versenken."
BHU_army_boats_exp_navy_carrier:0 "Schwimmende Flugplätze"
BHU_army_boats_exp_navy_carrier_desc:0 "Wenn wir auf unseren Booten einen Flugplatz einrichten können, sind die Möglichkeiten endlos. Wir sollten uns die Zeit nehmen, herauszufinden, wie wir die Lufthoheit auf See erlangen können."
BHU_army_strat_planning_1:0 "Priorisieren Sie die Planung"
BHU_army_strat_planning_1_desc:0 "Wir müssen der Vorausplanung unserer Schlachten Priorität einräumen. Ohne Planung sind wir anfällig für alles Neue, was unser Feind versucht. Es ist eine gute Investition unserer Zeit."
BHU_army_strat_planning_2:0 "Division für Marineinvasionen"
BHU_army_strat_planning_2_desc:0 "Wenn wir Inseln im Meer sichern oder in feindliches Gebiet eindringen wollen, sind Seeinvasionen die beste Methode. Wir müssen eigens dafür eine eigene Division in unserer Armee gründen. Solche Strategien könnten sehr gut funktionieren."
BHU_army_strat_attacking_1:0 "Angriff priorisieren"
BHU_army_strat_attacking_1_desc:0 "Wir müssen in unseren Schlachten dem Angriff Priorität einräumen. Uns stehen viele verschiedene Strategien zur Verfügung. Daher müssen wir nach neuen Angriffsmethoden forschen."
BHU_army_strat_attacking_2:0 "Steinmauer-Taktiken"
BHU_army_strat_attacking_2_desc:0 "Ein Rückzug aus einer Schlacht ist das Schlimmste, was unsere Truppen tun können. Wir müssen uns auf die Verteidigung konzentrieren, damit unsere Truppen sich verschanzen und standhalten können. Wenn wir sie zurückhalten können, beweist das unsere Stärke."

BHU_war_start:0 "Untersuchen Sie die Ländereien unserer Nachbarn"
BHU_war_start_desc:0 "Mit unserer begrenzten Intelligenz können wir nicht viel über unsere Feinde erfahren, aber wir können ihre Karten untersuchen. Darüber hinaus sind wir der Außenseiter in dieser Welt. Niemand wird uns verdächtigen, wenn wir mit der Expansion beginnen."
BHU_war_tibet:0 "Krieg mit Tibet"
BHU_war_tibet_desc:0 "Unser erster Aktionsplan sieht vor, dass unser nördlicher Nachbar Tibet als erstes annektiert wird. Sie mögen zwar mehr Land besitzen als wir, aber wir haben den Überraschungseffekt. Niemand wird Bhutan verdächtigen."
BHU_nepal_problem:0 "Ein Ultimatum an Nepal"
BHU_nepal_problem_desc:0 "Ahh, Nepal, unser Cousin aus den Bergen. Nepal ist derzeit keine große Bedrohung. Sie haben wenige Divisionen und wir könnten sie leicht besiegen. Vielleicht sollten wir versuchen, sie zur Vernunft zu bringen?"
BHU_sinkaing_dissuade:0 "Den Bären davon abhalten"
BHU_sinkaing_dissuade_desc:0 "Wenn wir Sinkiang annektieren wollen, müssen wir uns zuerst mit den Sowjets auseinandersetzen. Es ist klar, dass die Sowjets ihnen im Falle eines Angriffs zu Hilfe kommen werden. Vielleicht würde sich das ändern, wenn sie keine pro-russische Regierung hätten."
BHU_sinkaing_war:0 "Krieg mit Sinkiang"
BHU_sinkaing_war_desc:0 "Da die Sowjets Sinkiang nun nicht mehr unterstützen, können wir einmarschieren. Sie werden in unserer Gewalt zermalmt und unsere Expansion wird weitergehen."
BHU_sinkaing_russia:0 "Machen Sie einen Deal mit den Sowjets"
BHU_sinkaing_russia_desc:0 "Da wir nun mit Russland verbündet sind, können wir die Idee einer Annexion von Sinkiang zur Sprache bringen. Wir werden sehen, was sie dazu sagen."
