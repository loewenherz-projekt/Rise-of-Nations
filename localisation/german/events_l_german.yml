l_german:
 germany.4.t:0 "Anschluss"
 germany.4.d:0 "Die wiederholten Aufstände in Österreich zeigen deutlich, dass sich die Menschen dort nach der Vereinigung mit unserem Reich sehnen. Es ist jetzt an der Zeit, Maßnahmen zu ergreifen und dem Willen des Volkes Ausdruck zu verleihen."
 germany.4.a:0 "Wie kann jemand behaupten, Österreich sei nicht deutsch?!"
 germany.5.t:0 "Anti-Komintern-Pakt"
 germany.5.d:1 "Deutschland schlägt vor, einen Pakt zu unterzeichnen, um das Ziel der Komintern zu erreichen, den Kommunismus durch Subversion und Gewalt weltweit zu verbreiten. Mit der Unterzeichnung dieses Pakts verpflichten wir uns, Informationen über die kommunistische Bedrohung auszutauschen und in enger Zusammenarbeit gegen diese Bedrohung vorzugehen."
 germany.5.a:0 "Verbinden"
 germany.5.b:0 "Verweigern"
 germany.6.t:0 "Der Dreimächtepakt"
 germany.6.d:0 "Die Unterzeichner betrachten es als Voraussetzung für jeden dauerhaften Frieden, dass allen Nationen der Welt ihr jeweils angemessener Platz eingeräumt wird. Sie haben beschlossen, einander bei ihren Bemühungen in Ostasien und den Regionen Europas zur Seite zu stehen und zu kooperieren, wobei ihr Hauptziel darin besteht, eine neue Ordnung der Dinge zu schaffen und aufrechtzuerhalten, die darauf ausgerichtet ist, den gegenseitigen Wohlstand und das Wohlergehen der betroffenen Völker zu fördern."
 germany.6.a:0 "Verbinden"
 germany.6.b:0 "Verweigern"
 germany.11.t:0 "Der Molotow-Ribbentrop-Pakt"
 germany.11.d:0 "Das deutsche Außenministerium hat einen Nichtangriffspakt zwischen unseren beiden Nationen vorgeschlagen. Dieser Vertrag wird unseren gegenseitigen Handel erheblich steigern, und ein zusätzliches Geheimprotokoll sieht die Aufteilung Osteuropas in eine deutsche und eine sowjetische Sphäre vor.\n\nAuch wenn die Faschisten in Berlin nicht vertrauenswürdig sind, ermöglicht uns dieser Pakt, mit Finnland, den baltischen Staaten und Rumänien ohne Angst vor äußeren Einflüssen zu verhandeln. Im Falle eines Zusammenbruchs Polens würden uns auch die östlichen Gebiete Polens zufallen."
 germany.11.a:0 "Unterzeichnen Sie den Vertrag."
 germany.11.a.tt:0 "§RWährend der Pakt in Kraft ist, ist die Handelspolitik der geschlossenen Wirtschaft nicht verfügbar.\nDer Fokus „Krieg mit Deutschland“ ist zwei Jahre lang nicht verfügbar.§!\n"
 germany.11.b:0 "Keine Deals mit den Faschisten!"
 germany.12.t:0 "Moskau unterzeichnet den Pakt"
 germany.12.d:0 "Die Sowjetunion hat klugerweise zugestimmt, unseren Nichtangriffspakt zu unterzeichnen. Das bedeutet, dass wir frei handeln können, ohne das Risiko einer sowjetischen Intervention einzugehen.\n\nLeider stellen einige unserer Freunde Deutschlands Engagement für die endgültige Zerstörung des Kommunismus in Frage. Sobald die Angelegenheiten mit Polen und Frankreich geklärt sind, müssen wir diesen Vertrag möglicherweise überdenken, aber das ist eine Diskussion für ein anderes Mal..."
 germany.12.a:0 "Exzellent."
 germany.13.t:0 "Moskau lehnt den Pakt ab"
 germany.13.d:0 "Die Sowjetunion hat sich geweigert, unseren Nichtangriffspakt zu unterzeichnen! Das erschwert die Sache, denn wir können Polen und Frankreich nicht entschieden entgegentreten, ohne Gefahr zu laufen, dass die Bolschewiken in die Sache verwickelt werden."
 germany.13.a:0 "Verflucht seien sie!"
 germany.14.t:0 "Die Teilung Polens"
 germany.14.d:0 "Polen gehört uns, doch die östlichen Teile fallen gemäß den Bestimmungen des Molotow-Ribbentrop-Pakts in die sowjetische Einflusssphäre. Sollten wir unsere Truppen abziehen und die Sowjets dieses Gebiet besetzen lassen? Andernfalls wäre unser Vertrag ungültig."
 germany.14.a:0 "Ja. Die Vertragsbestimmungen müssen eingehalten werden."
 germany.14.b:0 "Nein! Ganz Polen gehört zum Vaterland!"
 germany.15.t:0 "Deutschland hält sich an den Pakt"
 germany.15.d:0 "In Übereinstimmung mit dem Molotow-Ribbentrop-Pakt haben die deutschen Streitkräfte Ostpolen geräumt und unsere eigenen Truppen sind einmarschiert, um das Gebiet zu besetzen."
 germany.16.t:0 "Deutschland verrät den Pakt"
 germany.16.d:0 "Deutschland hat sich geweigert, Polen mit uns zu teilen, und damit einen eklatanten Verstoß gegen den Molotow-Ribbentrop-Pakt! Dieser Verrat hat unseren Vertrag mit ihnen null und nichtig gemacht!"
 germany.16.a:0 "Wir waren Narren, den Faschisten zu vertrauen!"
 germany.20.t:0 "Zweiter Wiener Preis"
 germany.20.d:0 "Ungarn und Rumänien haben erkannt, dass in Europa eine neue Ordnung geschaffen wurde. Daher wurden wir gebeten, in einem Territorialstreit zwischen den beiden Ländern zu vermitteln. Siebenbürgen wurde Ungarn abgenommen und Rumänien einverleibt – eine der vielen unüberlegten Veränderungen, die der Welt in Versailles aufgezwungen wurden. Sollte Nordsiebenbürgen wieder unter ungarische Kontrolle fallen?"
 germany.20.a:0 "Geben Sie Ungarn Nordsiebenbürgen."
 germany.20.b:0 "Geben Sie Ungarn ganz Siebenbürgen."
 germany.20.c:0 "Siebenbürgen soll bei Rumänien bleiben."
 germany.21.t:0 "Rumänien lehnt unser Urteil ab"
 germany.21.d:0 "Rumänien weigert sich, die Entscheidung des Zweiten Wiener Schiedsspruchs zu akzeptieren! Die Delegation des Landes wurde nach Bukarest zurückgerufen, und Ungarn wurde kein Gebiet abgetreten."
 germany.21.a:0 "Dem Willen Deutschlands muss Folge geleistet werden!"
 germany.22.t:0 "Memel - Litauen Falten"
 germany.22.d:0 "Die litauische Regierung hat unseren Forderungen entsprochen und Memel wird wieder Ostpreußen einverleibt. Eine weitere unrechtmäßig geraubte Provinz ist dem deutschen Volk zurückgegeben worden!"
 germany.22.a:0 "Exzellent."
 germany.23.t:0 "Memel - Litauen lehnt Forderung ab"
 germany.23.d:0 "Die litauische Regierung hat unsere Forderungen abgelehnt! Sie versteckt sich hinter der Klaipėda-Konvention und behauptet, Deutschland habe keinen Rechtsanspruch auf das Memelgebiet. Wir müssen ihnen unsere Position auf andere Weise erklären ..."
 germany.23.a:0 "Hartnäckige Narren."
 germany.24.t:0 "Deutsche Militärmission in China"
 germany.24.d:0 "Deutschland pflegt seit dem Ende des letzten Weltkriegs trotz des Verlusts unserer chinesischen Besitztümer gute Beziehungen zu China. Eine deutsche Militärmission ist seit einigen Jahren in China präsent, und Alexander von Falkenhausen hat große Fortschritte bei der Reform von Teilen der Kuomintang-Armee erzielt. Angesichts ihres gegenwärtigen Krieges gegen China bereitet dies den Japanern natürlich große Sorgen. Sie fordern den sofortigen Entzug jeglicher deutscher Unterstützung für die Chinesen."
 germany.24.a:0 "Rückruf von Falkenhausen."
 germany.24.b:0 "Nein, unsere Berater bleiben."
 germany.24.c:0 "Nein, unsere Berater werden bleiben, so wie wir es den Chinesen versprochen haben."
 germany.25.t:0 "Militärberater abberufen"
 germany.25.d:0 "Die sich verschlechternden Beziehungen zu China haben die Aufrechterhaltung einer Militärmission in ihrem Land politisch unmöglich gemacht. Alexander von Falkenhausen und der Rest unserer Berater wurden abberufen."
 germany.25.a:0 "Wir werden ihn arbeiten lassen."
 germany.26.t:0 "China nimmt Militärberater fest"
 germany.26.d:0 "Deutschland und China befinden sich im Kriegszustand. Die Chinesen haben daraufhin die deutschen Militärberater festgenommen, die ihre Armee reformierten. Von Falkenhausen und einige seiner Offiziere konnten der Gefangennahme entgehen und sind nun auf dem Rückweg nach Europa."
 germany.26.a:0 "Guter Mann!"
 germany.27.t:0 "Befestigung des Westwalls"
 germany.27.d:0 "Die Pioniere der Armee haben die Vermessung unserer bestehenden Befestigungen abgeschlossen und die Stellen identifiziert, an denen diese verstärkt werden sollten. Die erforderlichen Bauaufträge wurden erteilt."
 germany.27.a:0 "Das wird besser halten als der Westwall."
 germany.28.t:0 "Die Deutschen drängen auf den Anschluss"
 germany.28.d:0 "Es kam zu Unruhen und Gewaltausbrüchen, als Demonstranten ihren Wunsch äußerten, dass Österreich sich Deutschland anschließen und eine Union deutscher Völker bilden solle. Berlin drängt mit Nachdruck auf einen Anschluss, der Österreich in die deutsche Nation eingliedern würde."
 germany.28.a:0 "Wir werden dem Deutschen Reich beitreten!"
 germany.28.b:0 "Nein, Österreichs Schicksal liegt woanders."
 germany.29.t:0 "Österreich lehnt den Anschluss ab!"
 germany.29.d:0 "Die Narren in Wien haben sich geweigert, den Zusammenschluss unserer beiden Nationen zu akzeptieren! Das ist eine eklatante Missachtung des Willens des österreichischen Volkes, und das wird nicht hingenommen werden! Wir müssen den Anschluss möglicherweise mit militärischen Mitteln erzwingen."
 germany.29.a:0 "Wir müssen uns auf eine militärische Intervention vorbereiten."
 germany.40.t:0 "Die Münchner Konferenz"
 germany.40.d:0 "Die deutschen Forderungen nach dem Sudetenland in der Tschechoslowakei, wo eine beträchtliche Zahl ethnischer Deutscher lebt, haben einen Höhepunkt erreicht. [GER.GetLeader] hat Truppen entlang der tschechoslowakischen Grenze stationiert, um einen Angriff vorzubereiten. In München finden derzeit Gespräche zwischen Großbritannien, Frankreich, Italien und Deutschland statt, um eine friedliche Lösung der Sudetenkrise zu erreichen. Wie wird die britische Position aussehen?"
 germany.40.d_2:0 "Die deutschen Ansprüche auf das Sudetenland in der Tschechoslowakei, wo eine beträchtliche Zahl ethnischer Deutscher lebt, haben einen Höhepunkt erreicht. [GER.GetLeader] hat Truppen entlang der tschechoslowakischen Grenze stationiert, um einen Angriff vorzubereiten. Da wir bereits bewiesen haben, dass wir den deutschen Expansionismus nicht akzeptieren, haben wir nun einen weiteren Verbündeten im Krieg gegen Deutschland."
 germany.40.d_3:0 "Die deutschen Forderungen nach dem Sudetenland in der Tschechoslowakei, wo eine beträchtliche Zahl ethnischer Deutscher lebt, haben einen Höhepunkt erreicht. [GER.GetLeader] hat Truppen entlang der tschechoslowakischen Grenze stationiert, um einen Angriff vorzubereiten. In München finden derzeit Gespräche zwischen den Niederlanden, Großbritannien, Frankreich, Italien und Deutschland statt, um eine friedliche Lösung der Sudetenkrise zu erreichen. Wie wird die niederländische Position aussehen?"
 germany.40.a:0 "Die Tschechen sind auf sich allein gestellt."
 germany.40.b:0 "Die Tschechoslowakei muss verteidigt werden!"
 germany.41.d:0 "Die deutschen Forderungen nach dem Sudetenland in der Tschechoslowakei, wo eine beträchtliche Zahl ethnischer Deutscher lebt, haben einen Höhepunkt erreicht. [GER.GetLeader] hat Truppen entlang der tschechoslowakischen Grenze stationiert, um einen Angriff vorzubereiten. In München finden derzeit Gespräche zwischen Großbritannien, Frankreich, Italien und Deutschland statt, um eine friedliche Lösung der Sudetenkrise zu erreichen. Die Briten haben deutlich gemacht, dass sie nicht die Absicht haben, wegen eines „Streits in einem fernen Land“ in den Krieg zu ziehen. Sollten wir ihrem Beispiel folgen oder unseren Verpflichtungen gegenüber der Tschechoslowakei nachkommen, indem wir ihnen Unterstützung anbieten?"
 germany.41.a:0 "Überlassen Sie die Tschechen ihrem Schicksal."
 germany.41.b:0 "Zum Teufel mit den Briten! Frankreich unterstützt seine Freunde!"
 germany.42.d:0 "Die deutschen Ansprüche auf das Sudetenland in der Tschechoslowakei, wo eine beträchtliche Zahl ethnischer Deutscher lebt, haben einen Höhepunkt erreicht. [GER.GetLeader] hat Truppen entlang der tschechoslowakischen Grenze stationiert, um einen Angriff vorzubereiten. In München finden derzeit Gespräche zwischen Großbritannien, Frankreich, Italien und Deutschland statt, um eine friedliche Lösung der Sudetenkrise zu erreichen.\n\nDie Briten weigern sich, nachzugeben, und drohen den Deutschen stattdessen mit Krieg, falls sie die Grenzen der Tschechoslowakei verletzen. Ein Krieg könnte unmittelbar bevorstehen."
 germany.42.a:0 "Wir müssen uns vorbereiten!"
 germany.42.b:0 "Frankreich sollte sich da raushalten."
 germany.43.t:0 "Frankreich verlässt die Alliierten"
 germany.43.d:0 "Die sturköpfigen Franzosen haben sich in der Sudetenkrise geweigert, unserem Beispiel zu folgen! Sie stehen weiterhin zu ihrer Unterstützung der Tschechoslowakei, und da wir dies nicht tun, haben sie beschlossen, unser Bündnis aufzukündigen. Schon jetzt bereitet sich Frankreich auf einen bevorstehenden Krieg mit Deutschland vor."
 germany.43.a:1 "Narren! [GER.GetLeader] muss besänftigt werden!"
 germany.44.d:0 "Die deutschen Ansprüche auf unser Gebiet im Sudetenland werden immer heftiger, und nun sammeln sich ihre Truppen entlang unserer Grenze! In München findet eine Konferenz statt, auf der europäische Staats- und Regierungschefs über die Zukunft der Tschechoslowakei diskutieren, zu der wir jedoch nicht eingeladen sind.\n\nGlücklicherweise sieht es so aus, als würden die Alliierten ihre früheren Unterstützungsversprechen einhalten. Sie haben [GER.GetLeader] mit Krieg gedroht, sollte unsere Grenzen auch nur im Geringsten verletzt werden. Trotzdem müssen wir uns auf einen unmittelbar bevorstehenden deutschen Angriff vorbereiten."
 germany.44.a:0 "Gut! Lasst sie kommen!"
 germany.45.d:0 "Die deutschen Ansprüche auf unser Gebiet im Sudetenland werden immer heftiger, und nun sammeln sich ihre Truppen entlang unserer Grenze! In München findet eine Konferenz statt, auf der europäische Staats- und Regierungschefs über die Zukunft der Tschechoslowakei diskutieren, zu der wir jedoch nicht eingeladen sind.\n\nDie feigen Briten weigern sich, unsere Souveränität zu unterstützen, aber zumindest die Franzosen verteidigen uns! Sie haben ihr Bündnis mit Großbritannien aufgegeben und ein neues mit uns geschlossen und versprechen, die Tschechoslowakei gegen die deutsche Aggression zu unterstützen."
 germany.45.a:0 "Es lebe Frankreich!"
 germany.46.t:0 "Das Münchner Diktat"
 germany.46.d:0 "Die deutschen Ansprüche auf unser Gebiet im Sudetenland werden immer heftiger, und nun sammeln sich ihre Truppen entlang unserer Grenze! In München findet eine Konferenz statt, auf der europäische Staats- und Regierungschefs über die Zukunft der Tschechoslowakei diskutieren, zu der wir jedoch nicht eingeladen sind.\n\nSowohl Großbritannien als auch Frankreich haben ihre früheren Versprechen, uns gegen die deutsche Aggression zu unterstützen, zurückgezogen. Ihre Diplomaten haben klargestellt, dass wir, wenn wir uns für den Widerstand gegen die Deutschen entscheiden, dies allein tun. Vielleicht bleibt uns gar keine andere Wahl, als das Sudetenland aufzugeben..."
 germany.46.a:0 "Dies ist ein schwarzer Tag für Europa."
 germany.46.b:0 "Wir werden niemals aufgeben!"
 germany.47.d:0 "In München fanden Gespräche zwischen den Staatschefs Deutschlands, Großbritanniens, Frankreichs und Italiens über die Zukunft der Tschechoslowakei statt. Großbritannien und seine Verbündeten haben unsere rechtmäßigen Ansprüche auf das Sudetenland abgelehnt und uns mit Krieg gedroht, sollten wir die tschechische Grenze „verletzen“!\n\nEin Plan für die Invasion der Tschechoslowakei wurde ausgearbeitet, doch dieser wird wahrscheinlich einen gesamteuropäischen Krieg auslösen. Wir müssen sicherstellen, dass wir darauf vorbereitet sind."
 germany.47.a:0 "Zeit, dies auf die harte Tour zu tun."
 germany.48.d:0 "In München fanden Gespräche zwischen den Staatschefs Deutschlands, Großbritanniens, Frankreichs und Italiens über die Zukunft der Tschechoslowakei statt. Die Briten haben Einsicht gezeigt und unsere Ansprüche auf das Sudetenland als legitim anerkannt, doch die sturen Franzosen weigern sich, nachzugeben.\n\nSie haben ihre Zusammenarbeit mit Großbritannien aufgegeben und stattdessen engere Beziehungen zu den Tschechen geknüpft. Es sieht so aus, als müssten wir uns mit beiden gleichzeitig auseinandersetzen, aber zumindest werden die Briten jetzt hoffentlich nicht eingreifen..."
 germany.48.a:0 "Dies könnte zu unserem Vorteil sein."
 germany.49.d:0 "In München fanden Gespräche zwischen den Staatschefs Deutschlands, Großbritanniens, Frankreichs und Italiens über die Zukunft der Tschechoslowakei statt. Sowohl Großbritannien als auch Frankreich haben unsere Ansprüche auf das Sudetenland als legitim anerkannt und ihre früheren Unterstützungsangebote an die Tschechen zurückgezogen.\n\nTrotz der aussichtslosen Lage weigern sich die sturköpfigen Tschechen, ihr Territorium aufzugeben! Wir werden es mit Gewalt einnehmen müssen. Ein Invasionsplan wurde ausgearbeitet, der dieses abscheuliche Versailler Experiment von der Erde tilgen wird!"
 germany.49.a:0 "Die Tschechen müssen vernichtet werden."
 germany.50.d:0 "In München fanden Gespräche zwischen den Staatschefs Deutschlands, Großbritanniens, Frankreichs und Italiens über die Zukunft der Tschechoslowakei statt. Sowohl Großbritannien als auch Frankreich haben unsere Ansprüche auf das Sudetenland als legitim anerkannt und ihre früheren Unterstützungsangebote an die Tschechen zurückgezogen.\n\nDie Tschechen haben die Hoffnungslosigkeit ihrer Lage erkannt und die Sudetengebiete an uns abgetreten. Ihre unterdrückten deutschen Einwohner werden endlich ins Vaterland aufgenommen!"
 germany.50.a:0 "Dies ist ein historischer Tag für Deutschland."
 germany.51.t:0 "Erster Wiener Preis"
 germany.51.d:0 "Die Tschechoslowakei ist ein Krebsgeschwür im Herzen Europas, und endlich haben die Deutschen beschlossen, entschieden gegen sie vorzugehen. Das Sudetenland wurde bereits an Deutschland abgetreten, und nun soll als Folge des Münchner Abkommens das tschechoslowakische Gebiet, das rechtmäßig zu Ungarn gehört, an uns zurückgegeben werden."
 germany.51.a:0 "Wurde auch Zeit!"
 germany.52.t:0 "Die Annexion von Zaolzie"
 germany.52.d:0 "Die Tschechoslowakei zerfällt, und wir müssen schnell handeln, um Gebiete mit bedeutender polnischer Bevölkerung zu schützen, bevor sie von Deutschland erobert werden können. Der tschechische Besitz von Zaolzie wurde von uns immer angefochten, und es ist an der Zeit, dass sich die Region unserer Nation anschließt."
 germany.52.a:0 "Zaolzie gehört uns!"
 germany.53.t:0 "Das Schicksal der Tschechoslowakei"
 germany.53.d:0 "Die Deutschen haben sich nicht mit dem Raub des Sudetenlandes zufrieden gegeben, sondern beschlossen, auch den Rest unseres Landes zu erobern. Von unseren sogenannten Verbündeten im Stich gelassen und unsere besten Verteidigungsanlagen durch das Münchner Diktat verloren, erscheint die Lage hoffnungslos ..."
 germany.53.a:0 "Geben Sie den Deutschen nach."
 germany.53.b:0 "...und dennoch müssen wir Widerstand leisten!"
 germany.54.t:0 "Die Tschechen leisten Widerstand"
 germany.54.d:0 "Die Tschechen haben irgendwie den Mut aufgebracht, unsere Besetzung ihres Landes zu bekämpfen. Ihre besten Verteidigungsanlagen befanden sich im Sudetenland, das jetzt unter unserer Kontrolle steht, daher sollte dies ein schneller Feldzug sein."
 germany.54.a:0 "Prag wird bald uns gehören."
 germany.55.d:0 "Das Ende der Tschechoslowakei steht bevor, und unsere Truppen marschieren in diesem Moment in Prag ein. Mit der Kapitulation des tschechoslowakischen Militärs haben wir große Mengen an Waffen freigesetzt. Insbesondere ihre Panzer sollten unseren Streitkräften gute Dienste leisten.\n\nBöhmen wird als Protektorat an Deutschland angegliedert, doch was soll aus der Slowakei werden? Wir können sie als autonomen Marionettenstaat unter Jozef Tiso etablieren."
 germany.55.d_2:0 "Nach der Eroberung der Tschechoslowakei müssen wir uns überlegen, wie wir diese Gebiete am besten aufteilen.\n\nBöhmen bleibt als Protektorat deutsch, aber was soll aus der Slowakei werden? Wir können sie als autonomen Marionettenstaat unter Jozef Tiso etablieren."
 germany.55.a:0 "Die Slowakei als Marionettenstaat einrichten."
 germany.55.b:0 "Teilung der Tschechoslowakei mit Ungarn."
 germany.55.c:0 "Die gesamte Tschechoslowakei gehört zum Reich!"
 germany.56.t:0 "Die Teilung der Tschechoslowakei"
 germany.56.d:0 "Deutsche Truppen sind in Prag einmarschiert, und das Ende der Tschechoslowakei steht unmittelbar bevor. Sie beabsichtigen, Böhmen dem Deutschen Reich einzuverleiben, sind aber bereit, uns die Slowakei zu überlassen. Sollten wir dieser Teilung zustimmen? Das würde bedeuten, ein formelles Militärbündnis mit Deutschland einzugehen."
 germany.56.d_2:0 "Nach der Annexion der Tschechoslowakei will Deutschland Böhmen als Teil des Reiches behalten, ist aber bereit, uns die Slowakei zu überlassen. Sollten wir dieser Teilung zustimmen? Das würde bedeuten, ein formelles Militärbündnis mit Deutschland einzugehen."
 germany.56.a:0 "Natürlich! Großungarn wird bald Realität!"
 germany.56.b:0 "Nein, wir brauchen weder die Slowakei noch die deutsche Freundschaft."
 germany.57.t:0 "Ungarn lehnt unser Angebot ab"
 germany.57.d:0 "Die Ungarn haben unser großzügiges Angebot, die Slowakei zu annektieren, unverschämt abgelehnt und behaupten, sie hätten kein Interesse an der Region! Wir werden uns bald mit ihnen auseinandersetzen müssen. Jetzt müssen wir erst einmal eine Lösung für die slowakische Frage finden."
 germany.57.a:0 "Bilden Sie Tisos Marionettenregierung."
 germany.57.b:0 "Anschluss der Slowakei an Deutschland."
 germany.58.t:0 "Die polnische Frage"
 germany.58.d:0 "Das Reichsministerium für Volksaufklärung und Propaganda hat hervorragende Arbeit geleistet. Die Bevölkerung Deutschlands – ja, die ganze Welt – wurde über das Unrecht informiert, das unsere deutschen Brüder in Polen ertragen müssen. Wir haben nun alle Rechtfertigungen für einen Krieg!"
 germany.58.a:0 "Bald wird es Polen nicht mehr geben!"
 germany.60.t:0 "Die Remilitarisierung des Rheinlandes"
 germany.60.d:0 "Mehrere deutsche Divisionen sind kürzlich ins Rheinland vorgedrungen. Damit sind erstmals seit dem Ende des Ersten Weltkriegs deutsche Truppen westlich des Rheins stationiert. Dies ist ein klarer Verstoß gegen den Versailler Vertrag, der Deutschland die Militarisierung der Region untersagt! Sofern wir ihnen kein Ultimatum zum Rückzug stellen, wird der Vertrag nicht durchgesetzt."
 germany.60.a:0 "Das ist ein kriegerischer Akt! Bringen Sie die Briten auf unsere Seite!"
 germany.60.a.tt:0 "§RIm Falle eines Krieges werden wir aufgrund unserer §Yzersplitterten Regierung einen Bürgerkrieg erleiden:§!§!\n"
 germany.60.b:0 "Erheben Sie einen diplomatischen Einspruch."
 germany.61.d:0 "Mehrere deutsche Divisionen sind kürzlich ins Rheinland vorgedrungen. Damit sind erstmals seit dem Ende des Ersten Weltkriegs deutsche Truppen westlich des Rheins stationiert. Dies stellt einen klaren Verstoß gegen den Versailler Vertrag dar, der Deutschland die Militarisierung der Region untersagt!\n\nDie Franzosen mobilisieren ihre Truppen und scheinen ein Ultimatum stellen zu wollen. Sollte Deutschland sich weigern, sind sie bereit, in Deutschland einzumarschieren, um dieser Bedrohung zu begegnen. Die britische Bevölkerung ist gegen einen Krieg, doch wenn wir uns weigern, den Franzosen beizustehen, wird unser Bündnis mit ihnen aufgelöst."
 germany.61.a:0 "Ein Krieg kommt nicht in Frage."
 germany.61.b:0 "Wir müssen Frankreich beistehen!"
 germany.62.d:0 "Mehrere deutsche Divisionen sind kürzlich ins Rheinland vorgedrungen. Damit sind erstmals seit dem Ende des Ersten Weltkriegs deutsche Truppen westlich des Rheins stationiert. Dies stellt einen klaren Verstoß gegen den Versailler Vertrag dar, der Deutschland die Militarisierung der Region untersagt!\n\nDie Franzosen scheinen sich in ihrer Reaktion auf diesen Verstoß auf diplomatische Einwände zu beschränken, und die öffentliche Meinung in Großbritannien ist entschieden gegen einen Krieg."
 germany.62.a:0 "Auch wir werden Widerspruch einlegen."
 germany.62.b:0 "Versailles betrifft uns nicht mehr."
 germany.63.t:0 "Großbritannien lehnt Krieg ab"
 germany.63.d:0 "Die Briten weigern sich, uns im Kampf gegen Deutschland zu unterstützen, und behaupten, die Deutschen würden „nur in ihrem eigenen Hinterhof“ agieren. Sollten wir gegen sie in den Krieg ziehen, wären wir auf uns allein gestellt. Die öffentliche Meinung in Frankreich ist gegen einen Krieg, doch Deutschland würde nur stärker werden, und die Remilitarisierung des Rheinlandes stellt eine direkte Bedrohung unserer Grenzen dar. Ein Ultimatum wäre ohne Großbritannien an unserer Seite weniger bedrohlich. Sollten wir allein gegen sie vorgehen?"
 germany.63.a:0 "Ja! Deutschland muss jetzt behandelt werden."
 germany.63.b:0 "Nein, ohne die Briten müssen wir zurückweichen …"
 germany.64.t:0 "Großbritannien unterstützt uns"
 germany.64.d:0 "Obwohl die Unterstützung der britischen Bevölkerung für einen Krieg gering ist, hat die britische Regierung die Bedrohung durch die Deutschen erkannt und uns ihre volle Unterstützung zugesagt. Wir werden Deutschland ein letztes Ultimatum zum Rückzug aus der entmilitarisierten Zone stellen. Sollte Deutschland sich weigern, ist es Zeit für unsere Truppen, tief in Deutschland einzudringen und seinem tyrannischen Regime ein Ende zu setzen!"
 germany.64.a:0 "Vorwärts!"
 germany.65.t:0 "Frankreich und Großbritannien, mobilisiert!"
 germany.65.d:0 "Die Briten und Franzosen haben sich geweigert, die Remilitarisierung des Rheinlandes zu akzeptieren, da sie sie als „unverzeihlichen Bruch“ des Versailler Vertrags bezeichnen. Sie mobilisieren ihre Streitkräfte gegen uns und haben ein Ultimatum gestellt: Unsere Truppen müssen sich sofort zurückziehen und das Rheinland entmilitarisiert bleiben, andernfalls befinden sich unsere Länder im Krieg."
 germany.65.a:0 "Wir dürfen nicht nachgeben! Das Reich muss verteidigt werden!"
 germany.65.b:0 "Wir sind auf diese Konfrontation nicht vorbereitet. Wir müssen zurückweichen."
 germany.66.t:0 "Frankreich mobilisiert!"
 germany.66.d:0 "Die Briten haben Einsicht gezeigt und die Remilitarisierung des Rheinlandes akzeptiert, doch die wütenden Franzosen weigern sich, nachzugeben! Sie behaupten, dieser Vorfall stelle eine direkte Bedrohung für die Sicherheit ihres Landes dar, mobilisieren ihre Streitkräfte und könnten jeden Moment über die Grenze einmarschieren! Wir befinden uns im Krieg!"
 germany.67.t:0 "Frankreich macht einen Rückzieher"
 germany.67.d:0 "Die Franzosen entschieden sich klugerweise zum Rückzug, als sie erkannten, dass ihr verrücktes Unternehmen keine britische Unterstützung finden würde. Ihre Truppen wurden demobilisiert und ein Krieg vorerst abgewendet. Meine Güte, das war knapp!"
 germany.67.a:0 "Ein Krieg wäre jetzt Wahnsinn."
 germany.68.t:0 "Frankreich weigert sich, nachzugeben"
 germany.68.d:0 "Die Franzosen haben sich hartnäckig für einen Alleingang gegen die Deutschen entschieden, und unser Bündnis mit ihnen wurde aufgekündigt. Ein weiterer europäischer Krieg ist aufgrund sinnloser Streitereien ausgebrochen. Vielleicht ist es für Großbritannien an der Zeit, sich wieder aus den kontinentalen Angelegenheiten zu distanzieren ..."
 germany.68.a:0 "Vielleicht war es unvermeidlich."
 germany.70.t:0 "Die Oster-Verschwörung"
 germany.70.d:0 "Im Glauben, Hitler habe Deutschland in einen unsiegbaren Krieg gedrängt, hat eine Gruppe hochrangiger Wehrmachtsoffiziere einen Putsch gestartet! Der Putsch scheint von Oberst Hans Oster von der Abwehr orchestriert worden zu sein, doch auch die Generäle Beck, von Brauchitsch, Halder und Admiral Canaris wurden als beteiligt bestätigt!\n\nSchwer bewaffnete Männer, die in mehreren Berliner Wohnungen auf der Lauer lagen, sind in die Reichskanzlei eingedrungen, um Hitler und seine engsten Vertrauten zu liquidieren. Im Gebäude tobt derzeit ein erbittertes Feuergefecht."
 germany.70.a:0 "Schützen Sie den Führer um jeden Preis!"
 germany.71.t:0 "Der Führer ist tot"
 germany.71.d:0 "SS-Truppen und loyale Armeeeinheiten, die zur Reichskanzlei eilten, konnten alle verräterischen Kommandos töten oder gefangen nehmen, doch zuvor gelang es den Hunden, Hitler zu töten! Der Führer wurde mit mehreren Dutzend Schusswunden über seinem Schreibtisch liegend aufgefunden – zweifellos arbeitete er bis zu seinem letzten Atemzug unermüdlich für das Vaterland!\n\nDie überlebenden Verschwörer werden für ihre abscheulichen Verbrechen vor Gericht gestellt, doch im Moment befindet sich Deutschland im Krieg und ein neuer Anführer wird benötigt. Wer wird der nächste Führer?"
 germany.71.a:0 "Herr Himmler wird uns in die Zukunft führen."
 germany.71.b:0 "Herr Göring ist die logische Wahl."
 germany.72.t:0 "Die Verschwörung scheitert"
 germany.72.d:0 "SS-Truppen und loyale Armeeeinheiten, die zur Reichskanzlei eilten, konnten alle verräterischen Kommandos töten oder gefangen nehmen. Hitler selbst leitete die Aufräumarbeiten mit seiner treuen Luger. Wie durch ein Wunder kam der Führer mit nur wenigen Kratzern aus den Kämpfen hervor.\n\nDie überlebenden Verschwörer werden einen hohen Preis für ihre Illoyalität zahlen, und Hitler ist nun noch entschlossener, den Krieg bis zu einem glorreichen Sieg fortzusetzen!"
 germany.72.a:0 "Es lebe der Führer!"
 germany.73.t:0 "Die Verschwörung ist erfolgreich"
 germany.73.d:0 "Die schweren Kämpfe in der Reichskanzlei haben das Gebäude in eine brennende Ruine verwandelt. Obwohl zahlreiche SS-Soldaten Hitler zu Hilfe eilten, griffen den Verschwörern treu ergebene Armeeeinheiten in die Schlacht ein und erwiesen sich als entscheidend. Der Tod des Führers wurde bestätigt, und die Verschwörer haben erfolgreich alle Regierungsgebäude in Berlin gestürmt.\n\nEin großer Teil der Wehrmacht ist übergelaufen, doch viele Offiziere sind noch immer NSDAP-Anhänger. Wer soll sie anführen?"
 germany.73.a:0 "Tod dem Nationalsozialismus!"
 germany.73.b:0 "Himmler wird das ändern!"
 germany.73.c:0 "Göring ist im Moment unsere einzige Hoffnung!"
 germany.74.t:0 "Den Boden vorbereiten"
 germany.74.d:0 "Die Österreicher sehnen sich danach, Teil des Deutschen Reiches zu werden, doch die sture Regierung in Wien hat sich bisher allen Versuchen widersetzt, einen Anschluss herbeizuführen. Wir müssen die Unterstützung für den Faschismus in Österreich erhöhen. Die Österreichische NSDAP wird dann zu einer tragfähigen Alternative zu den herrschenden Austrofaschisten.\n\nEin Abwehragent wurde für eine Spionagemission bereitgestellt. Setzen Sie ihn ein, um heimlich die Unterstützung der Bevölkerung für den Faschismus in Österreich zu erhöhen."
 germany.74.a:0 "Österreich wird uns gehören!"
 germany.75.t:0 "Deutsch-Sowjetischer Vertrag"
 germany.75.d:0 "Trotz der harschen Rhetorik in der Vergangenheit sowohl gegenüber der Bevölkerung als auch gegenüber der ideologischen Führung von [Root.GetName] haben sich [From.GetLeader] und Deutschland nun an uns gewandt und um einen für beide Seiten vorteilhaften Forschungsvertrag gebeten. Der Wissensaustausch würde unsere Bemühungen zur Entwicklung neuer Panzerdesigns unterstützen und verspricht künftige Forschungsvorteile. Angesichts früherer Aussagen besteht jedoch wenig Zweifel daran, dass die Deutschen dies aus Eigennutz tun. Sollten wir das Abkommen trotz des Risikos, [From.GetLeader]s Ambitionen zu unterstützen, weiterführen?"
 germany.75.a:0 "Die Kapitalisten stellen für uns beide eine größere Bedrohung dar."
 germany.75.b:0 "Wir werden den Faschisten nicht die Waffen geben, um das Proletariat zu zerschlagen!"
 germany.76.t:0 "Sowjets akzeptieren deutsch-sowjetischen Vertrag"
 germany.76.d:0 "Unsere Verhandlungen mit [From.GetName] waren erfolgreich. Es wurde eine Vereinbarung getroffen, wonach sich unsere Nationen gegenseitig bei der Entwicklung neuer Panzereinheiten unterstützen werden. Eine Ausweitung der Zusammenarbeit auf andere Forschungsbereiche ist in Zukunft möglich."
 germany.76.a:0 "Dieser Vertrag wird ein Sprungbrett in die Zukunft sein."
 germany.77.t:0 "Sowjets lehnen deutsch-sowjetischen Vertrag ab"
 germany.77.d:0 "[From.GetName] hat unseren Vorschlag für einen Vertrag zur Förderung der Forschung an Panzereinheiten in beiden Ländern abgelehnt, vermutlich aus Angst, dass unsere überlegenen Waffen gegen sie eingesetzt werden könnten."
 germany.77.a:0 "Sie haben die damit verbundenen Risiken bisher kaum verringert."
 germany.78.t:0 "Deutsche Luftforschungsgemeinschaft"
 germany.78.d:0 "Gemäß dem Vertrag mit Deutschland werden im Rahmen einiger ihrer speziellen Forschungsprojekte Erkenntnisse an unsere Ingenieure weitergegeben. Ein kürzlich erfolgter Durchbruch in der Radartechnologie hat uns aufgefallen und eröffnet unerwartete Möglichkeiten, unsere Forschung auf diesem Gebiet voranzutreiben."
 germany.78.a:0 "Der erste Schritt besteht darin, den Feind zu erkennen."
 germany.79.t:0 "Ultimatum aus Deutschland"
 germany.79.d:0 "Da Griechenland unter deutscher Herrschaft steht, übt [From.GetLeader] Druck auf unsere Regierung aus, sich ihnen anzuschließen. Das sowjetisch-deutsche Bündnis hat uns in eine Lage gebracht, in der Neutralität keine Option mehr ist. Nun ist aus Berlin ein Ultimatum eingetroffen, das von uns verlangt, unsere Ostgebiete an die sowjetischen Verbündeten abzutreten und uns dem Pakt anzuschließen, mit dem sie uns zum Handeln zwingen. \n\nObwohl wir unsere Neutralität nicht wahren können, gibt es andere Möglichkeiten. Die Unterstützung Großbritanniens zu suchen ist eine, unsere Position zu verteidigen eine andere. Keine dieser Möglichkeiten kann jedoch die Zukunft der Republik mit Sicherheit sichern."
 germany.79.a:0 "Wenn wir mit den Deutschen zusammenarbeiten, finden wir vielleicht die Möglichkeit, weiteres Land zurückzugewinnen."
 germany.79.b:0 "Wir können auf die Unterstützung Großbritanniens zählen, und sie können auf uns zählen."
 germany.79.c:0 "Wenn diese Despoten uns unsere Heimat wegnehmen wollen, müssen sie dafür kämpfen."
 germany.80.t:0 "Danzig für die Slowakei"
 germany.80.d:0 "Die Deutschen haben Danzig schon lange im Visier und wollen ihre Gebiete in Ostpreußen mit dem Rest der deutschen Nation vereinen. Diplomaten warnen, dass der Tag kommen könnte, an dem wir uns zwischen Danzig oder Krieg entscheiden müssen.\n\nÜberraschenderweise wurde uns eine Lösung präsentiert, die die Deutschen für friedlicher halten. Sie bieten uns im Austausch für Danzig den neu geschaffenen Staat Slowakei an, der derzeit kaum mehr als ein Marionettenstaat unter deutscher Herrschaft ist. \nWelche Schritte die Deutschen unternehmen werden, wenn wir ablehnen, ist unbekannt, aber wir haben die Möglichkeit erhalten, diesen Konflikt mit einigen Gebietsgewinnen zu lösen."
 germany.80.a:0 "Das ist das beste Angebot, das wir bekommen werden."
 germany.80.b:0 "Wir werden nicht das hergeben, was uns rechtmäßig zusteht, für das, was sie gestohlen haben!"
 germany.81.t:0 "Danzig an die Slowakei abgetreten"
 germany.81.d:0 "Polen hat dem Austausch zugestimmt, bei dem Danzig an [GER.GetNameDef] abgetreten wird, während die Slowakei nun unter polnischer Kontrolle steht. Durch dieses Abkommen haben wir Danzig zurückerobert und gleichzeitig freundschaftliche, wenn nicht zumindest offen feindselige, Beziehungen zu unserem östlichen Nachbarn aufrechterhalten."
 germany.81.a:0 "Deutschland ist wieder vereint."
 germany.82.t:0 "[From.GetNameDefCap] Weigert sich, Danzig aufzugeben"
 germany.82.d:1 "Unser großzügiges Angebot slowakischer Gebiete an [From.GetNameDef] im Austausch für Danzig wurde abgelehnt, sodass Danzig in polnischer Hand verbleibt. [From.GetLeader] teilt offensichtlich nicht unsere Auffassung, dass Danzig rechtmäßig deutsches Territorium ist. \n[Root.GetLeader] ist wütend, und die diplomatischen Möglichkeiten zur Rückeroberung Danzigs scheinen ausgeschöpft."
 germany.82.a:0 "Möglicherweise ist es an der Zeit, andere Optionen in Betracht zu ziehen."
 germany.83.t:0 "Antisowjetischer Pakt"
 germany.83.d:0 "Mit dem Antikominternpakt hat [From.GetNameDef] einen fruchtbaren Boden für diplomatische Mittel zur Eindämmung der sowjetischen Bedrohung geschaffen. Der Pakt stellt jedoch weder ein Militärbündnis dar, noch enthält er klar definierte Verpflichtungen für die Unterzeichner. [From.GetLeader] versucht nun, den Pakt zu einer antisowjetischen Koalition auszuweiten, einer verbindlichen Vereinbarung, gemeinsam Krieg zu führen, falls ein Unterzeichner in den Kriegszustand mit der Sowjetunion gerät.\n\nObwohl dies wesentlich gefährlicher ist und wahrscheinlich unsere diplomatischen Beziehungen zu den Sowjets beenden würde, ist dies auch unsere Chance, im Kriegsfall starke Verbündete an unserer Seite zu haben."
 germany.83.a:0 "Wir werden Deutschland und seinen Verbündeten im Kampf gegen die Sowjets zur Seite stehen."
 germany.83.b:0 "Jeder könnte mit einem solchen Pakt einen weiteren Weltkrieg auslösen."
 germany.84.t:0 "Ruft die Paktmitglieder zum Krieg auf"
 germany.84.d:0 "Wie wir es bei der Unterzeichnung des Antisowjetpakts vermutet hatten, befinden wir uns nun im Kriegszustand mit der Sowjetunion. Es ist an der Zeit, dass unsere Mitunterzeichner ihr Versprechen einlösen und sich uns anschließen."
 germany.84.a:0 "Unsere Weitsicht zahlt sich aus."
 germany.85.t:0 "[From.GetName] ruft Paktmitglieder zum Krieg auf"
 germany.85.t.a:0 "[From.GetName] ruft Paktmitglieder zum Krieg auf"
 germany.85.t.b:0 "[From.GetName] ruft die Garantie auf"
 germany.85.d:1 "Der Antisowjetpakt verpflichtet alle Unterzeichnerstaaten, sich an Verteidigungskonflikten mit der Sowjetunion zu beteiligen. [From.GetName] wurde nun von den Sowjets angegriffen und hat alle Paktmitglieder um sofortige Hilfe gebeten. Es ist an der Zeit, [Root.GetAdjective] zu zeigen, dass man die Welt ein für alle Mal vor der Bedrohung durch die Sowjetunion schützen will."
 germany.85.desc.a:0 "Der Antisowjetpakt verpflichtet alle Unterzeichnerstaaten, sich an Verteidigungskonflikten mit der Sowjetunion zu beteiligen. [From.GetName] wurde nun von den Sowjets angegriffen und hat alle Paktmitglieder um sofortige Hilfe gebeten. Es ist an der Zeit, [Root.GetAdjective] zu zeigen, dass man die Welt ein für alle Mal vor der Bedrohung durch die Sowjetunion schützen will."
 germany.85.desc.b:0 "Unsere Garantie gegenüber [From.GetNameDef] sieht vor, dass wir uns an jedem Verteidigungskonflikt mit der Sowjetunion beteiligen. Sie wurden nun von den Sowjets angegriffen, und es ist an der Zeit, dass wir unseren Teil der Abmachung einhalten und ihnen sofort zu Hilfe kommen. Es ist an der Zeit, unser [Root.GetAdjective] Engagement zu zeigen, die Welt ein für alle Mal vor der Bedrohung durch die Sowjetunion zu schützen."
 germany.85.a:2 "[From.GetName] steht nicht alleine!"
 germany.85.b:0 "Das ist nicht unser Krieg."
 germany.85.b_tt:0 "§YDies wird von allen Ländern, die den Pakt einhalten, als Verrat angesehen (§!§R-50§!§Y-Meinung)§!"
 germany.86.t:0 "Danzig oder Krieg"
 germany.86.d:0 "[GER.GetNameDefCap] verkündet seit langem sein Ziel, die im Ersten Weltkrieg verlorenen Gebiete zurückzuerobern. Dabei ist insbesondere Danzig im Blickpunkt, das Ostpreußen vom Rest des Landes trennt. \n\nNun fordern sie die Abtretung Danzigs an [GER.GetNameDef] und bieten im Gegenzug lediglich den Verzicht auf ihre Ansprüche auf Posen an. Angesichts der drohenden Kriegsgefahr würde die Annahme dieses Angebots einen möglichen Konflikt hinauszögern, den Deutschen jedoch zusätzliche Stärke für die bevorstehende Zukunft verleihen."
 germany.86.a:0 "Machen wir einen Deal. Vielleicht wenden sie sich woanders hin."
 germany.86.b:0 "Danzig bleibt Danzig!"
 germany.87.t:0 "Polen tritt Danzig ab"
 germany.87.d:0 "Angesichts unseres Ultimatums hat Polen zugestimmt, uns sein unrechtmäßig erworbenes Gebiet zu überlassen, und damit bewiesen, dass es gewusst haben muss, dass es rechtmäßig zu Deutschland gehört!"
 germany.87.a:0 "Polen hat einen Krieg vermieden … vorerst."
 germany.88.t:0 "Polen weigert sich, Danzig abzutreten"
 germany.88.d:0 "Trotz unserer Versuche, Polen die friedliche Übergabe Danzigs zu ermöglichen und im Gegenzug sogar auf unsere Ansprüche auf andere deutsche Gebiete zu verzichten, stießen wir auf Ablehnung. Wie erwartet gibt uns die Welt nichts, was wir uns nicht mit Gewalt aneignen."
 germany.88.a:0 "Sie wissen sehr gut, was die Alternative ist."
 china.1.t:0 "Der Vorfall auf der Marco-Polo-Brücke"
 china.1.d:0 "Japanische Soldaten haben kürzlich einen Angriff auf die strategisch wichtige Marco-Polo-Brücke südlich von Peking gestartet, der jedoch von unseren tapferen Soldaten zurückgeschlagen wurde. Zweifellos handelt es sich um ein inszeniertes Ereignis, das darauf abzielt, uns die Schuld in die Schuhe zu schieben und uns zur Aufgabe weiterer Gebiete zu zwingen – genau wie beim Mukden-Zwischenfall, als die Japaner in die Mandschurei einmarschierten. \n\nWie sollten wir reagieren?"
 china.1.a:0 "Wir haben den Bruchpunkt erreicht!"
 china.1.b:0 "Wir können uns einen Krieg mit Japan nicht leisten."
 china.2.t:0 "Deutschland zieht Berater ab"
 china.2.d:0 "Deutschland ist dem diplomatischen Druck Japans nachgegeben und hat beschlossen, seine Militärberater aus unserem Land abzuziehen! Von Falkenhausen versprach bei einem Abschiedsessen, den Japanern keine unserer Schlachtpläne zu verraten. Doch das Ende der deutschen Unterstützung wird unserem Militär mit Sicherheit schaden."
 china.2.a:0 "Wir müssen ohne sie auskommen."
 china.3.t:0 "Schlechte chinesisch-deutsche Beziehungen"
 china.3.d:0 "Unsere sich verschlechternden Beziehungen zu Deutschland haben dazu geführt, dass sie alle ihre Militärberater aus unserem Land abberufen haben."
 china.3.a:0 "Chinesische Offiziere werden zu Ende bringen, was sie begonnen haben!"
 china.4.t:0 "Militärberater festgenommen"
 china.4.d:0 "Da wir uns nun im Kriegszustand mit Deutschland befinden, wurden alle in unserem Land anwesenden Militärberater festgenommen. Von Falkenhausen und einige seiner Kumpanen konnten sich unseren Fängen entziehen und sind nach Europa zurückgekehrt!"
 china.4.a:0 "Auf Nimmerwiedersehen!"
 china.5.t:0 "Nicht mehr in die Enge getrieben"
 china.5.d:0 "Die Rote Armee überlebte einst in einem Zustand scheinbarer Hoffnungslosigkeit, doch seit dem Langen Marsch vor einigen Jahren hat sich das Blatt langsam gewendet. Dank bedeutender territorialer Fortschritte gehört unsere Rolle als Außenseiter der Vergangenheit an. Nachdem wir diese Zeit des Kampfes überstanden haben, liegt unsere Verzweiflung nun hinter uns. Mao Zedong ist vom Anführer der Guerillaarmee zum Vorsitzenden aufgestiegen."
 china.5.a:0 "Es lebe die Volksrepublik!"
 china.6.t:0 "Vorbereitung eines Angriffs auf Kommunisten"
 china.6.d:0 "Nach dem langen Rückzug der Roten Armee der Kommunistischen Partei Chinas gelang es ihr, sich neu zu formieren und in Shaanxi Fuß zu fassen. Ihre anhaltenden Bemühungen, die Landbevölkerung gegen uns aufzubringen und Unterstützung von der Sowjetunion zu erbitten, lassen darauf schließen, dass sie noch mächtiger werden könnten, wenn man sie sich selbst überließe. Viele der umliegenden Kriegsherren sind jedoch trotz ihrer Unterstützung unserer Regierung nicht bereit oder in der Lage, die notwendigen Opfer für einen effektiven Angriff zu bringen.\n\nEs ist derzeit unklar, ob sich die Rote Armee noch erholt oder bereit ist, uns im Kampf gegenüberzutreten, aber die Zeit ist nicht auf unserer Seite. Um unsere politische Position zu stärken, müssen wir die Kommunisten angreifen."
 china.6.a:0 "Zwingen Sie lokale Kriegsherren zur Offensive."
 china.6.b:0 "Rekrutieren Sie lokale Gesetzlose, um für uns zu kämpfen."
 china.6.c:0 "Verlassen Sie sich auf lokale Freiwillige, die sich den Kommunisten widersetzen."
 china.6.tt:0 "§YWenn die VR China sich entscheidet, dem Angriff entgegenzutreten:§!\n"
 china.6.tt_2:0 "§YWenn die VR China sich zum Rückzug entschließt:§!\n"
 china.7.t:0 "Kuomintang startet Offensive"
 china.7.d:0 "Obwohl wir durch den Langen Marsch einer sicheren Niederlage entgangen sind, haben die Nationalisten nicht vor, uns ohne weitere Konfrontationen stärker werden zu lassen. Unsere Spione deuten darauf hin, dass sie eine Offensive gegen uns starten, die unsere politische Unterstützung schwächen könnte, wenn wir versuchen, uns weiter zurückzuziehen.\n\nWir wissen nicht, wie entschlossen die Kuomintang uns derzeit zurückdrängen will. Ein Versuch, sie zu konfrontieren, birgt erhebliche Risiken. Sollten die lokalen Kriegsherren den Angriff unterstützen, könnten unsere Chancen gering sein. Andererseits ist ein Rückzug jetzt, wo wir endlich gestoppt haben, möglicherweise keine Option."
 china.7.a:0 "Wir müssen dem Angriff mit allen uns zur Verfügung stehenden Mitteln entgegentreten!"
 china.7.b:0 "Ziehen Sie sich in die Isolation zurück."
 china.8.t:0 "Rückzug der Kommunisten"
 china.8.d:0 "Nachdem die Kommunistische Partei Chinas unsere geplante Offensive durch ihr lokales Spionagenetzwerk entdeckt hatte, zog sie ihre Rote Armee weiter nach Shaanxi zurück. Obwohl uns dies die Möglichkeit nahm, ihre Truppenstärke weiter zu schwächen, zeigte es doch, dass die Kommunisten trotz ihrer Propaganda nicht bereit sind, uns entgegenzutreten. In gewissem Maße hat sich dieser Einsatz dennoch zu unserem Vorteil ausgewirkt."
 china.8.a:0 "Feiglinge!"
 china.9.t:0 "Sieg gegen die Kommunisten"
 china.9.d:0 "Unser Einsatz, die Rote Armee in die Flucht zu schlagen, war zumindest vorerst erfolgreich. Trotz Informationen über den Angriff entschieden sich die Kommunisten, unseren Truppen entgegenzutreten, und verloren. Sie mussten sich nun weiter zurückziehen, und viele Einheimische zweifeln an ihrer Fähigkeit, ihr Versprechen, unsere Regierung zu stürzen, einzuhalten."
 china.9.a:0 "Und das zu Recht!"
 china.10.t:0 "Kommunisten wehren Angriff ab"
 china.10.d:0 "Da die Rote Armee im Vorfeld von unseren Offensivenplänen erfahren hatte, war sie vorbereitet und stellte sich unserem Angriff entgegen. Die Truppen, die wir in diesem Gebiet, wo unsere Machtbasis schwach ist, zusammenziehen konnten, reichten nicht aus, um die kommunistischen Kräfte zu besiegen. \nLeider wurde der Angriff gegen uns gerichtet und als Zeichen der Erholung der Roten Armee nach ihrem langen Rückzug gewertet."
 china.10.a:0 "Auf lange Sicht wird es ihnen nicht helfen."
 china.11.t:0 "Niederlage gegen die Kuomintang"
 china.11.d:0 "Trotz unserer Bemühungen, den Angriff der lokal versammelten Truppen, die die nationalistische Regierung unterstützten, abzuwehren, reichten unsere Vorbereitungen nicht aus. Aufgrund erheblicher Verluste waren wir zu einem erneuten, wenn auch kürzeren Rückzug gezwungen.\n\nEs war möglicherweise ein Fehler, die Nationalisten zu konfrontieren, bevor wir uns vollständig erholt hatten. Unsere großartige Erholung auf dem Langen Marsch gab unseren Anhängern Hoffnung, doch nun keimen Zweifel auf."
 china.11.a:0 "Wir werden uns erholen und das Vertrauen der Menschen wieder gewinnen."
 china.12.t:0 "Sieg gegen die Kuomintang"
 china.12.d:0 "Die Abwehr der Kuomintang-Offensive hat sich zu unserem Vorteil ausgewirkt. Die vor Ort versammelten Truppen, die der Roten Armee entgegentreten sollten, waren nicht auf unseren bevorstehenden Angriff vorbereitet und wurden besiegt. Dies war für die umliegenden Kriegsherren eine Warnung, dass ein Angriff auf uns kostspielig sein könnte. \n\nDie Nationalisten haben lediglich bewiesen, dass sie uns als Feind unterschätzen und dass die Volksrepublik erneut auf dem Vormarsch ist."
 china.12.a:0 "Politische Macht wächst aus den Gewehrläufen."
 china.13.t:0 "Zusammenstoß mit kommunistischen Guerillas"
 china.13.d:0 "Da wir und die chinesische Rote Armee uns kaum von unserer letzten Offensive erholt haben, hat unsere gemeinsame Truppenpräsenz nahe der Grenze den Konflikt neu entfacht. Zusätzlich zu den lokalen Kriegsherren und Milizen haben wir erwogen, weitere Truppen von außerhalb zu entsenden.\n\nAuch wenn uns dies möglicherweise nicht die Möglichkeit gibt, die kommunistische Bedrohung ein für alle Mal zu zerschlagen, wäre es ein wichtiger ideologischer Sieg, der zeigt, dass wir ihre weitere Ausbreitung nicht zulassen werden."
 china.13.a:0 "Wir müssen jetzt einen Schlussstrich ziehen!"
 china.13.b:0 "Wir können uns keine weitere Konfrontation leisten."
 china.14.t:0 "Niederlage in [From.GetName]"
 china.14.d:0 "Trotz unserer Bemühungen, zu zeigen, dass die Kommunisten ihren Einfluss nicht über ihre derzeitigen Rückzugsgebiete hinaus ausweiten dürfen, konnten wir es uns nicht leisten, genügend Ressourcen einzusetzen, um den Konflikt entlang der Grenze zu [From.GetName] zu gewinnen.\n\nDie sporadischen Konflikte mit kommunistischen Milizen entwickelten sich langsam zu ihren Gunsten, was die Kampagne letztlich zu einem Misserfolg machte, da wir nicht zeigen konnten, dass wir die Situation unter Kontrolle haben. Sollte ihre Unterstützung in der Bevölkerung weiter wachsen, könnten die Kommunisten zu einer echten Bedrohung werden."
 china.14.a:0 "Beunruhigend."
 china.15.t:0 "Sieg in [From.From.GetName]"
 china.15.d:0 "Nach einer Reihe kleinerer Gefechte in den Außenbezirken unseres kontrollierten Gebiets scheint sich der Konflikt mit der Kuomintang zu unseren Gunsten gewendet zu haben. Obwohl der ständige Druck unsere Truppen und Vorräte stark beanspruchte, hat sich der Aufwand gelohnt. \n\nEs wurden keine entscheidenden Schlachten geschlagen, wir haben diesmal einen langsamen Sieg errungen, der den Glauben an unsere Sache gestärkt und die Flammen der Revolution erneut entfacht hat."
 china.15.a:0 "Das wird nicht so schnell vergessen!"
 china.16.t:0 "Niederlage in [From.GetName]"
 china.16.d:0 "Unsere Bemühungen, einen indirekten Krieg gegen die zunehmende Präsenz der Kuomintang zu führen, erwiesen sich als katastrophal. Die Nationalisten waren schlicht entschlossener, uns zurückzudrängen, als wir dachten, vielleicht in der Erwartung, dass dieser Misserfolg unseren Ruf schädigen würde. Obwohl unsere Armee wieder sicher ist und sich erholen kann, sind die Verluste der Bevölkerung vorerst nicht entgangen, und Gerüchte über das Scheitern der Revolution verbreiten sich bereits in den umliegenden Dörfern."
 china.16.a:0 "Die Revolution ist noch lange nicht tot!"
 china.17.t:0 "Sieg in [From.From.GetName]"
 china.17.d:0 "Unsere Bemühungen, der Bedrohung durch den Kommunismus Einhalt zu gebieten, waren erfolgreich. Die Guerillakampagnen der KPCh als Reaktion auf unsere verstärkte Truppenpräsenz in den Regionen rund um ihre Machtbasis konnten unseren Einsatz, sie aufzuhalten, nicht antizipieren. Diese Machtdemonstration, wenn auch nicht ganz ohne Kosten, hat viele Einheimische, die [From.GetLeader] und seiner Partei zuvor stillschweigend ihre Unterstützung zugesagt hatten, davon überzeugt, dass China unter einer solchen Ideologie niemals vereint werden kann."
 china.17.a:0 "Hoffen wir, dass sie sich erinnern."
 china.18.t:0 "Zusammenstoß mit der nationalistischen Armee"
 china.18.d:0 "Während wir uns noch kaum von ihrer letzten Offensive erholt haben, scheinen die Nationalisten ihre Truppenpräsenz in den Gebieten nahe unserer Grenze zu verstärken. Offensichtlich versuchen sie zu zeigen, dass sie uns erneut in Schach halten und der Große Marsch ihren letzten Schlag gegen die KPCh nur hinausgezögert hat. Wir dürfen nicht zulassen, dass die Bevölkerung das für wahr hält."
 china.18.a:0 "Wir können es uns nicht leisten, unsere Zeit mit der Genesung zu verbringen."
 china.100.t:0 "China gerät erneut unter Beschuss"
 china.100.d:0 "Wie eine Katze rückt Japan vor und erobert Korea. Sie versuchten uns mit ihren einundzwanzig Forderungen zu demütigen, besetzten die Mandschurei und rücken nun erneut vor. Nun ist Schluss damit, China wird bis zum Äußersten um seine Freiheit kämpfen. In einer Rede an das Volk appellierte [Root.GetLeader] an alle [Root.GetAdjective], zusammenzuhalten oder dem sicheren Untergang allein entgegenzusehen."
 china.100.a:0 "Für China!"
 china.101.t:0 "China wird angegriffen"
 china.101.d:0 "Es ist Zeit, dass wir gemeinsam gegen unseren gemeinsamen Feind, die Japaner, kämpfen. Lassen wir kleinliche Streitereien beiseite und kämpfen wir als starkes, vereintes China!"
 china.101.a:0 "Gemeinsam sind wir stark!"
 china.101.b:0 "Wir müssen die Eindringlinge abwehren!"
 china.102.t:0 "China wird angegriffen"
 china.102.d:0 "Da die Sowjetunion mit dem Krieg gegen Deutschland beschäftigt ist, wurde uns mitgeteilt, dass sie nicht mehr in der Lage sein wird, den gleichen Schutz zu bieten wie in der Vergangenheit. Es liegt in unserem besten Interesse, die Unterstützung der KMT zu gewinnen und sie in ihrem Krieg gegen Japan zu unterstützen."
 china.102.a:0 "Gemeinsam sind wir stark!"
 china.102.b:0 "Lassen Sie uns gemeinsam die japanische Bedrohung zurückschlagen."
 china.102.c:0 "Unsere Interessen werden am besten von der mächtigen Sowjetunion geschützt"
 china.103.t:0 "China vereint"
 china.103.d:0 "[From.GetName] hat sich entschieden, sich uns im Kampf gegen die Japaner anzuschließen. Gemeinsam werden wir den Eindringling zurückschlagen."
 china.103.a:0 "Gemeinsam sind wir stark!"
 china.104.t:0 "China wird angegriffen"
 china.104.d:0 "China wird angegriffen. Die Kriegsherren legen ihre Beschwerden beiseite, um gegen die einfallenden japanischen Streitkräfte zu kämpfen. Dies ist eine Gelegenheit, die Interessen der KPCh zu vertreten. Wir können dem chinesischen Volk zeigen, dass wir und nicht die dekadente Kuomintang (KMT) die wahre Zukunft Chinas sind. Sollten wir uns ebenfalls dem Kampf anschließen und China eine Zukunft sichern?"
 china.104_PRC_SOV_reinforcements:0 "Wird 10 Divisionen von den Sowjets erhalten."
 china.104.a:0 "Gemeinsam sind wir stark!"
 china.104.b:0 "Sie werden Japan ohne unsere Hilfe bewältigen müssen"
 china.104.tt:0 "\nNordchina und die Mandschurei können nun im Namen von [Root.GetName] befreit werden.\n"
 china.105.t:0 "China vereint"
 china.105.d:0 "[From.GetName] möchte, dass wir im Kampf gegen Japan unsere Kräfte bündeln. Sie haben sich bereits der [From.GetFactionName] angeschlossen und sind bereit, alte Grollgefühle beiseite zu legen, um sich der japanischen Invasion entgegenzustellen."
 china.105.a:0 "Gemeinsam sind wir stark!"
 china.105.b:0 "Wir werden ihnen während des kommenden Krieges eine gewisse Kontrolle über unser Land gewähren."
 china.106.t:0 "China vereint"
 china.106.d:0 "[From.GetName] hat sich [Root.GetFactionName] angeschlossen und ist bereit zu kämpfen."
 china.106.a:0 "Wir werden die japanischen Teufel aus unserem Land vertreiben"
 china.107.t:0 "Nicht mehr vereint"
 china.107.d_PRC_joined:0 "[Root.GetFactionName] hat seinen Zweck erfüllt. Es gibt keinen Feind mehr, gegen den man vereint auftreten kann. Mao Zedong festigt seine Macht über die Gebiete Nordchinas. Doch welche Chance haben sie gegen unsere siegreichen Armeen?"
 china.107.d_PRC_refused:0 "Mit dem Ende des Krieges haben die wahren Patrioten gesiegt. Es ist Zeit, mit denen abzurechnen, die sich versteckten, während wir bluteten."
 china.107_tt:0 "@PRC §YVolksrepublik China§! übernimmt die Kontrolle über die chinesischen Staaten in §YNordchina§! und §YMandschurei§!\n"
 china.107.a:0 "Wir haben keinen gemeinsamen Feind mehr"
 china.108.t:0 "Der Kommunismus schreitet voran"
 china.108.d:0 "Unsere Rolle im Kampf gegen die verhassten japanischen Hunde hat der KPCh großes Ansehen verschafft. Immer mehr Menschen erkennen, dass wir die Zukunft Chinas sind, insbesondere im Vergleich zur korrupten Kuomintang. Parteikader organisieren diese Menschen bereits zu einer neuen Armee, die das Bauernmeer durchschwimmen wird."
 china.108.a:0 "Wir müssen unsere Reihen verstärken"
 china.108_PRC_SOV_reinforcements_2:0 "Erhalten Sie 20 Divisionen"
 china.109.t:0 "Kämpfe für China!"
 china.109_tt:0 "§YGewinnansprüche auf dem chinesischen Festland§!\n"
 china.109.d:0 "Es ist an der Zeit, China von der Krankheit der Kuomintang zu befreien. Wir werden alle Chinesen befreien und ein vereintes Volk unter der weisen Führung Maos schaffen."
 china.109.a:0 "Auf in den Krieg!"
 china.110.t:0 "[From.GetName] erklärt den Krieg"
 china.110.d:0 "[From.GetName] und das Kabinett [From.GetLeader] haben uns den Krieg erklärt."
 china.110.a:0 "Auf in den Krieg!"
 china.111.t:0 "Nicht mehr vereint"
 china.111.d:0 "[Root.GetFactionName] hat seinen Zweck erfüllt. Es gibt keinen Feind mehr, gegen den wir vereint auftreten können. Wir haben die Zeit sinnvoll genutzt, um unsere Unterstützung in Nordchina und der Mandschurei auszubauen, und nun ist es an der Zeit, unsere Kontrolle in dieser Region zu formalisieren."
 china.111.a:0 "Wir haben keinen gemeinsamen Feind mehr"
 china.200.t:0 "Beitritt zur Volksrepublik China"
 china.200.d:0 "Nachdem wir mit der nationalistischen Kuomintang gebrochen haben, um das Volk zu befreien, müssen wir uns nun mit der bestehenden Volksrepublik China verbünden, um eine Zersplitterung der Bewegung zu vermeiden. Die Feinde Chinas haben sich stets auf unsere internen Machtkämpfe verlassen, um uns zu schwächen; der neue sozialistische Staat wird diesen Fehler nicht machen!"
 china.200.a:0 "Gemeinsam werden wir die Nationalisten besiegen!"
 china.201.t:0 "Kommunistische Aufständische treten der Republik bei"
 china.201.d:0 "Nachdem sie sich von der nationalistischen Kontrolle befreit hatten, haben chinesische Revolutionäre, die mit unserer Sache sympathisieren, die Entscheidung getroffen, ihren Staat unter der Führung von [Root.GetLeader] mit unserem zu vereinen. Von nun an soll es eine vereinte Volksrepublik China geben."
 china.201.a:0 "Wir müssen zusammenkommen, um unsere Kameraden zu schützen!"
 china.202.t:0 "Kommunistische Aufstände in [CHI_communist_state.GetName]"
 china.202.d:0 "Die wachsende kommunistische Unterstützung in [CHI_communist_state.GetName] hat einen Bruchpunkt erreicht. Regierungseinrichtungen wurden überrannt und die Rebellen haben erklärt, dass sie sich nicht länger als Teil von [Root.GetName] betrachten. Wir haben praktisch die gesamte Kontrolle über [CHI_communist_state.GetName] an das kommunistische Regime verloren."
 china.202.a:0 "Wir müssen diese kommunistische Bedrohung eindämmen!"
 china.203.t:0 "Kommunistische Aufstände in [CHI_communist_state.GetName]"
 china.203.d:0 "Nachdem sie sich von der nationalistischen Kontrolle befreit hatten, haben chinesische Revolutionäre, die mit unserer Sache sympathisieren, die Entscheidung getroffen, ihren Staat unter der Führung von [Root.GetLeader] mit unserem zu vereinen. Von nun an soll es ein vereintes [Root.GetName] geben."
 china.203.a:0 "Wir heißen unsere kommunistischen Brüder willkommen!"
 china.204.t:0 "A [Root.GetAdjective] Großbuchstabe"
 china.204.d:0 "Mit dem Ende des chinesischen Bürgerkriegs ist es für uns an der Zeit, unsere Macht in China zu festigen und dem Volk zu zeigen, dass wir die moderne Inkarnation des Reichs der Mitte sind. Wir sind der Staat, der sie in die Zukunft führen wird.\n\nZu diesem Zweck sollten wir eine Hauptstadt haben, die unserem großen Staat würdig ist."
 china.204.a:0 "Wir werden von der alten Hauptstadt des Nordens aus regieren."
 china.204.b:0 "Wir werden von der alten Hauptstadt des Südens aus regieren."
 china.204.c:0 "Eine Verlegung des Regierungssitzes ist nicht erforderlich."
 CHI_nanjing_tt:0 "Verschiebt die Hauptstadt nach §YNanjing§!."
 CHI_no_united_front:0 "Gegen externe Bedrohungen wird es keine Zusammenarbeit geben."
 spanish_civil_war:1 "Der Spanische Bürgerkrieg hat begonnen"
 spain.1.t:0 "Bürgerkrieg!"
 spain.1.d:0 "Eine Gruppe mächtiger Generäle der Streitkräfte hat ein Pronunciamento herausgegeben, in dem sie die derzeitige spanische Regierung scharf verurteilt! Mit Unterstützung konservativer Monarchisten und des Klerus haben sie einen rechtsgerichteten Putsch gestartet. Ein beträchtlicher Teil des Militärs hat sich auf die Seite dieser Nationalisten gestellt, doch bisher ist es ihnen mit Ausnahme von Sevilla nicht gelungen, eine der größeren Städte Spaniens einzunehmen.\n\nLinke Freiwillige schließen sich der republikanischen Regierung an und sind bereit, sie im Kampf gegen die Rebellen zu unterstützen. Diese Loyalisten mögen schlecht ausgebildet sein, doch ihr Enthusiasmus ist unbestritten.\n\nDie Fronten sind verhärtet – welche Fraktion sollen wir unterstützen?"
 spain.1.a:0 "Die Nationalisten!"
 spain.1.b:0 "Die Republikaner!"
 spain.10.d:1 "Nach der friedlichen Wahl General Francisco Francos zum Präsidenten Spaniens bestand die Hoffnung, dass die gewaltsamen Aufstände und politischen Unruhen der letzten Jahre ein Ende finden würden. Gerüchte, Franco würde versuchen, eine Einparteiendiktatur mit sich selbst als Staatsoberhaupt zu errichten, wurden durch das plötzliche Verschwinden mehrerer Oppositionsführer genährt.\nNach einem Schnellverfahren wurde der Carabineros-Offizier José Galánfor des Hochverrats für schuldig befunden und kurz darauf öffentlich hingerichtet. Obwohl dies als Maßnahme gedacht war, um jeglichen Widerstand gegen den Aufstieg des nationalistischen Spaniens zu unterdrücken, hatte es den gegenteiligen Effekt. Linke Freiwillige und sogar eine Gruppe von Generälen schlossen sich der neu gegründeten Volksarmee an, bereit, den Kampf gegen die unterdrückerischen Nationalisten zu unterstützen. Obwohl die meisten schlecht ausgebildet sind, gelang es ihnen, im Chaos, das dem Aufstand folgte, mehrere wichtige Städte einzunehmen.\n\nDie Fronten sind gezogen – welche Fraktion sollten wir unterstützen?"
 spain.10.b:0 "Die Volksarmee!"
 nationalists_chosen:0 "Tod den Rojos!"
 republicans_chosen:0 "Tod den Falangisten!"
 spain.2.t:0 "Suchen Sie internationale Unterstützung?"
 spain.2.d:0 "Der Putsch war kein voller Erfolg, doch Karlisten, Falangisten und die Konföderation der Autonomen Rechten konnten einen Großteil der Armee mobilisieren, um die Republik zu stürzen, die unsere stolze christliche Nation zu lange in Anarchie verfallen ließ. Der Ausgang ist noch ungewiss, und die Welt beobachtet mit Sorge, welche Seite siegreich hervorgehen wird.\n\nWir haben diesen Putsch jedoch nicht tatenlos hingenommen, und die Welt sollte dies auch nicht tun, wenn sie die rote Bedrohung zerschlagen will. Andere Nationen, die sich im gleichen Prozess der Wiederherstellung ihres nationalen Ruhms befinden, sollten bereit sein, uns zu Hilfe zu kommen."
 spain.2.a:0 "Fordern wir Ausrüstung und Munition an."
 spain.2.b:0 "Spanien muss mit spanischem Blut erobert werden!"
 spain.3.d:0 "Reaktionäre und faschistische Kräfte im Militär versuchten, die Republik mit einem Schlag zu zerschlagen, hatten jedoch weder mit dem Widerstand in den Großstädten noch mit der schnellen Mobilisierung von Arbeitermilizen gerechnet. Statt eines Putsches begannen sie einen Krieg – einen Krieg gegen den Fortschritt und die Zukunft, die das spanische Volk sich wünschte.\n\nDemokratische und sozialistische Länder bekunden gleichermaßen ihre Unterstützung für die Republik, doch nur wenige wagen es, sich direkt zu engagieren. Wir könnten sie um Unterstützung bitten, sonst werden die Unterdrücker als Nächstes ihre Freiheit und Solidarität fordern."
 spain.3.a:0 "Dies ist ein internationaler Kampf zur Eindämmung des Faschismus!"
 spain.3.b:0 "Wir werden nicht zur Marionette degenerierter Arbeiterstaaten!"
 spain.4.t:0 "Das nationalistische Spanien braucht unsere Hilfe"
 spain.4.d:0 "Der Spanische Bürgerkrieg ist zu einer Art Mikrokosmos unserer Sicht der Weltlage geworden: Kommunisten und Liberale wollen alte Werte zerstören, und wir greifen zu den Waffen, um sie wiederzubeleben. Es ist nicht überraschend, dass die Nationalisten in Spanien sich an uns und andere wenden, um sich für den bevorstehenden Konflikt zu rüsten."
 spain.4.a:0 "Wir versprechen, zu senden, was wir können."
 spain.4.b:0 "Wenn ihnen die Kraft fehlt, die Macht zu ergreifen, haben sie sie nicht verdient."
 spain.5.t:0 "Das republikanische Spanien will unsere Hilfe"
 spain.5.d:0 "Der Versuch, die Zweite Spanische Republik zu stürzen, ist ein klares Signal dafür, dass die Faschisten den Fortschritt selbst dort nicht gedeihen lassen, wo er natürlicherweise Wurzeln schlägt. Die Republikaner und ihre Verbündeten, eine Mischung aus Demokraten, Kommunisten und Anarchisten, haben sich hilfesuchend an uns und andere Teile der internationalen Gemeinschaft gewandt. Viele Nationen, die angeblich Demokratie und Freiheit verteidigen, haben ihre Unterstützung verweigert, aus Angst, in den Krieg hineingezogen zu werden. Wie reagieren wir?"
 spain.5.a:0 "Versprechen Sie ihnen, Waffen und Ausrüstung zu schicken."
 spain.4.a.tt:0 "[From.GetName] wäre dankbar, wenn wir während des Krieges ein Leih- und Pachtgesetz vereinbaren würden."
 spain.5.b:0 "Leider können wir es uns nicht leisten, einzugreifen."
 spain.6.t:0 "Das nationalistische Spanien schätzt unsere Hilfe"
 spain.6.d:0 "Unser Leih- und Pachtrecht an das nationalistische Spanien ist nicht unbemerkt geblieben. Sollte es siegreich hervorgehen, könnten wir nach dem Wiederaufbau Spaniens einen starken Verbündeten haben."
 spain.6.a:0 "Hoffen wir, dass sie den roten Terror eindämmen."
 spain.7.t:0 "Das republikanische Spanien schätzt unsere Hilfe"
 spain.7.d:0 "Unser Leih- und Pachtgesetz an die Republik Spanien ist nicht unbemerkt geblieben. Wenn die Republik wiederhergestellt wird, können wir darauf vertrauen, dass sie unsere fortgesetzten Bemühungen unterstützen wird, die Welt vom faschistischen Abschaum zu befreien."
 spain.7.a:0 "Es lebe die Republik!"
 spain.8.t:0 "Madrid zurückerobert"
 spain.8.d:0 "Der Krieg ist gewonnen. Madrid gehört wieder uns und wir haben die Chance, die jahrhundertealte Stadt wieder zum Zentrum Spaniens zu machen. Sie hat viele Schlachten erlebt und muss wiederaufgebaut werden. Und wie könnte das besser gelingen, als sie zu unserer Hauptstadt zu machen?"
 spain.8.a:0 "Verlegung der Hauptstadt nach Madrid"
 spain.8.b:0 "Aktuellen Standort behalten"
 spain.9.t:0 "Spanische Wahl von 1936"
 spain.9.d:0 "Die Zweite Republik hat sich als fragiles Gebilde erwiesen. Manuel Azaña kann mit der Unterstützung der Volksfront, einer breiten Koalition linker Gruppen, die von Republikanern, Kommunisten und Anarchisten unterstützt wird, Präsident werden. Doch auch die rechte Opposition, bestehend aus Konservativen, Monarchisten und Faschisten, beginnt sich zu vereinen, um die Volksfront zu stürzen. Welche Koalition auch immer zerbricht, ihre Gegner werden ihre internen Konflikte wahrscheinlich für eine Revolution ausnutzen. Diese Wahl ist nicht die letzte Bewährungsprobe, die Spanien bestehen muss, um diesen Konflikt zu lösen."
 spain.9.a:0 "Bewahren Sie die Volksfront."
 spain.9.b:0 "Vereinen Sie die konservativen Gruppen unter der Falange."
 italy.9.t:0 "Anfrage Balearen aus Spanien"
 italy.9.d:0 "Während des Bürgerkriegs bot Italien Freiwillige an, für die nationalistische Sache zu kämpfen. Obwohl ideologische Motive im Vordergrund standen, hatte Italien auch ein strategisches Interesse am Ausgang. Die Verteidigung der Balearen, insbesondere Mallorcas, war aufgrund ihrer Lage im Mittelmeer, insbesondere im Verhältnis zu westeuropäischen Kolonien, für Italien von besonderem Interesse.\n\nNun hat [From.GetLeader] vorgeschlagen, die Inseln dauerhaft unter italienische Kontrolle zu stellen. In Anbetracht ihres Beitrags zu unserem Sieg könnten diese Vorschläge durchaus sinnvoll sein."
 italy.9.a:0 "Lassen Sie die Italiener behalten, was sie verteidigt haben."
 italy.9.b:0 "Wir haben diesen Krieg nicht gewonnen, um uns ausländischen Forderungen zu beugen!"
 italy.10.t:0 "Spanien gibt die Balearen auf"
 italy.10.d:0 "Aus Dankbarkeit für unsere Unterstützung und Verteidigung der faschistischen Sache während des Spanischen Bürgerkriegs hat [From.GetLeader] zugestimmt, unsere temporären Militärstützpunkte auf Mallorca, Menorca und Ibiza dauerhaft zu machen. Obwohl diese Inseln mit ihrer wichtigen strategischen Lage eine willkommene Ergänzung unseres Imperiums sind, scheinen die Spanier ihre Schuld nun als getilgt zu betrachten."
 italy.10.a:0 "Solange sie uns als rechtmäßige Eigentümer anerkennen."
 italy.11.t:0 "Spanien weigert sich, Inseln aufzugeben"
 italy.11.d:0 "Trotz unserer Hilfe im Bürgerkrieg weigert sich [From.GetLeader] nun, uns die Balearen zu überlassen, für deren Verteidigung unsere Landsleute gekämpft haben. Obwohl sie darauf bestehen, gute Beziehungen zu unserem Land zu pflegen, ist es eine Beleidigung, die wir nie vergessen werden, uns zum Abzug der Militäranlagen zu zwingen, die diese Inseln ursprünglich zu spanischem Eigentum gemacht haben."
 italy.11.a:0 "Im Bedarfsfall könnten wir sie trotzdem einfordern."
 italy.12.t:0 "Londoner Konferenz"
 italy.12.d:0 "Unsere Freunde in Jugoslawien geraten unter Druck durch unseren nördlichen Nachbarn. Die korrupten und dekadenten westlichen Mächte haben gezeigt, warum sie an Bedeutung verlieren, indem sie sich nicht für die Rechte Jugoslawiens einsetzen. Genau hier könnte sich eine Chance für eine jüngere, dynamischere Macht mit der richtigen Führung bieten, um zielstrebig die Weltbühne zu betreten! Das Commando Supremo berichtet, dass sie kurz davor stehen, unsere unbesiegbaren Legionen loszulassen."
 italy.12.a:0 "Dies ist unsere Zeit!"
 italy.12.b:0 "Es wird eine bessere Gelegenheit geben."
 italy.13.t:0 "Erster Ljubljana-Preis"
 italy.13.d_dalmatia_montenegro:0 "Während der jugoslawische Staat an seinen eigenen Widersprüchen zerbricht, ist es für Italien an der Zeit, sich seinen Anspruch zu sichern. Die schwindenden Mächte im Westen mögen so große Angst vor Italien haben, dass sie ihm den Anspruch verweigern, doch neue Mächte erheben sich, die Italiens wahren Wert erkennen. Wir haben nicht nur das gesichert, was uns im verstümmelten Sieg verwehrt blieb, sondern auch unser Protektorat Albanien konnte sein Territorium vergrößern."
 italy.13.d_montenegro:0 "Unsere Entscheidung, sich mit der aufstrebenden Macht Deutschlands zu verbünden, hat sich ausgezahlt. Der jugoslawische Staat steht vor dem Zerfall, und die deutsche Führung hat die Weitsicht, die Vorteile der italienischen Freundschaft zu erkennen. Montenegro wird an Albanien übergeben, wie es nur recht ist."
 italy.13.d_dalmatia:0 "Nach dem Verrat unserer ehemaligen Verbündeten im Westen auf der Pariser Friedenskonferenz, auf der uns Norddalmatien versprochen wurde, entschieden wir uns, uns auf die Seite Berlins zu stellen. Deutschland hat weise entschieden, dass die italienische Freundschaft zu wertvoll ist, um sie zu ignorieren, und unsere Ansprüche in Jugoslawien müssen anerkannt werden. Die Adria wird ein italienisches Seegebiet sein, und Gerechtigkeit wird herrschen."
 italy.13.a:0 "Italien erhebt sich"
 italy.14.t:0 "Deutschland vereitelt unsere Forderungen"
 italy.14.d:0 "Deutschland hat es für angebracht gehalten, unsere bescheidenen, fairen und vernünftigen Forderungen nach Vichy-Gebiet zu vereiteln. Sollen wir [From.GetFactionName] verlassen?"
 italy.14.a:0 "Inakzeptabel. Alleine können wir es besser machen"
 italy.14.b:0 "Wir werden uns ihren Respekt verdienen"
 italy.15.t:0 "Deutschland unterstützt unsere Forderungen"
 italy.15.d:0 "Deutschland hat erkannt, wie klug es ist, unsere Forderungen nach Vichy-Gebiet zu unterstützen. Vichy hat uns Savoyen und Korsika überlassen."
 italy.15.d_Corsica:0 "Mit einer kleinen Menge an Deutschland Unterstützung hat Vichy Korsika an uns übergeben"
 italy.15.a:0 "Rache für Italien"
 italy.16.t:0 "Deutschland unterstützt uns fast"
 italy.16.d:0 "Deutschland hat es für angebracht gehalten, sich in unseren Streit mit Vichy-Frankreich einzumischen. Sie haben unseren Versuch, Korsika zu erobern, blockiert, aber Savoyen haben wir immer noch."
 italy.16.a:0 "Die Korsika-Frage wurde nur verschoben"
 france.1.t:0 "Japan fordert Indochina"
 france.1.d:0 "Japanische Truppen sind entlang der Grenzen unserer Kolonie in Indochina stationiert und fordern uneingeschränkten Zugang zu unseren Stützpunkten und Einrichtungen! Wenn wir ihrer Forderung nachkommen, übertragen wir ihnen faktisch die Kontrolle über Indochina. Andererseits verfügen wir nicht über die Mittel, sie in dieser Frage zu bekämpfen."
 france.1.a:0 "Wir haben keine andere Wahl, als zuzustimmen."
 france.1.b:0 "Niemals!"
 france.2.t:0 "Verlängerung der Maginot-Linie"
 france.2.d:0 "Die Pläne für die Verlängerung der Maginot-Linie bis zum Ärmelkanal sind abgeschlossen und die Bauaufträge erteilt. Die Belgier haben zwar offiziell Protest eingelegt, nachdem sie unsere Vorbereitungen von der anderen Seite der Grenze aus gesehen haben, doch die Arbeiten gehen weiter."
 france.2.a:0 "Vielleicht hätten sie unsere Allianz nicht verlassen sollen."
 france.3.t:0 "Verlängerung der Alpenlinie"
 france.3.d:0 "Wir haben mit der Verbesserung der Befestigungen der Alpenlinie begonnen. Wenn diese neuen Verteidigungsanlagen fertig sind, müssten die Italiener verrückt sein, um die Grenze zu überqueren!"
 france.3.a:0 "Lasst sie kommen!"
 france.10.t:0 "Verlust"
 france.10.d:0 "Die Schlacht ist verloren. Paris ist in deutsche Hände gefallen, und es ist nur eine Frage der Zeit, bis der Rest des Landes besetzt wird. Wir müssen nun an die Zukunft denken. Teile der Regierung wollen einen Waffenstillstand mit Deutschland, doch viele Offiziere wollen den Kampf von Großbritannien aus fortsetzen.\n\nEinige Mitglieder des britischen Kriegskabinetts haben eine andere Option vorgeschlagen – den Zusammenschluss Frankreichs und Großbritanniens zu einer einzigen Nation, die so lange kämpfen soll, bis ganz Frankreich befreit ist."
 france.10.a:0 "Wir müssen mit den Deutschen zusammenarbeiten."
 france.10.a_tt:0 "§YSpielen Sie als Vichy-Frankreich, wenn Deutschland einen Waffenstillstand gewährt§!\n"
 france.10.b:0 "Der Kampf geht weiter!"
 france.10.b_tt:0 "§YSpiele als Frankreich, wenn Deutschland einen Waffenstillstand gewährt§!\n"
 france.10.c:0 "Lasst uns mit Großbritannien verschmelzen!"
 france.11.t:0 "Frankreich schlägt Union vor"
 france.11.d:0 "Die Lage in Frankreich ist ernst. Viele Regierungsmitglieder wünschen sich einen Waffenstillstand mit Deutschland, doch einige reagierten positiv auf den Vorschlag des britischen Kriegskabinetts, unsere beiden Nationen zu einer zu vereinen. Diese französisch-britische Union wird den Kampf gegen die Deutschen bis zum Sieg fortsetzen. Wie sollten wir reagieren?"
 france.11.a:0 "Nein. Großbritannien ist Großbritannien und Frankreich ist Frankreich."
 france.11.b:0 "Ja, wenn das die Franzosen im Kampf hält!"
 france.12.t:0 "Großbritannien stimmt der Union zu"
 france.12.d:0 "Großbritannien hat der Verschmelzung unserer beiden Nationen zugestimmt. In London wird gerade eine neue gemeinsame Regierung gebildet."
 france.12.a:0 "Nach London!"
 FRA_franco_british_cores:0 "Alle §Y[FRA.GetAdjective]-Kerne§! werden zu §Y[ENG.GetAdjective]-Kernen§!."
 france.13.t:0 "Großbritannien lehnt Union ab"
 france.13.d:0 "Die britische Regierung hat jede Möglichkeit einer Vereinigung unserer beiden Nationen zu einer einzigen abgelehnt. Ein Waffenstillstand mit Deutschland ist zu diesem Zeitpunkt unvermeidlich."
 france.13.a:0 "Wir müssen zusammenarbeiten."
 france.13.b:0 "Wir müssen den Kampf fortsetzen!"
 france.14.t:0 "Triumph in Frankreich"
 france.14.d:0 "Unser Sieg in Frankreich ist fast vollständig. Die französische Regierung hat um einen Waffenstillstand gebeten, und unsere Diplomaten haben Bedingungen vorbereitet, denen sie zugestimmt haben. Sie behalten die Kontrolle über Südfrankreich, während wir den Rest frei besetzen können."
 france.14.a:0 "Gründung von Vichy-Frankreich."
 france.14.b:0 "Nein, Deutschland wird alles erobern!"
 france.14.c:0 "Gründung des Bourbon-Frankreichs."
 france.15.t:0 "Deutschland lehnt Waffenstillstand ab!"
 france.15.d:0 "Die Deutschen haben unsere Bitte um einen Waffenstillstand abgelehnt! Sie wollen uns offenbar alle versklaven ... Wir haben keine andere Wahl, als bis zum Äußersten zu kämpfen!"
 france.15.a:0 "Wir sind dem Untergang geweiht!"
 france.16.t:0 "Bleibt zusammen, bleibt stark!"
 france.16.d:0 "Da die jüngsten Ereignisse in Paris die meisten von uns beeinflusst haben, ist es wichtiger denn je, dass wir als Nation zusammenstehen. Wir müssen den Zustand unseres Landes betrachten und den Ausgang dieses Krieges nicht hinnehmen, sondern verändern. \n\nVergessen Sie die Vergangenheit und blicken Sie auf neue Horizonte. Wir wissen nicht, was uns in den nächsten Monaten erwartet, aber wir werden es gemeinsam meistern!"
 france.16.a:0 "Wir haben schon Schlimmeres gesehen!"
 france.17.t:0 "Einladung zur französischen Fraktion"
 france.17.d:0 "Im Bemühen, die Kleine Entente – die Tschechoslowakei, Jugoslawien und Rumänien – zu stärken und ein mögliches Wiederaufleben des aggressiven Expansionismus der alten Mittelmächte einzudämmen, hat Frankreich darum gebeten, dass wir uns mit ihnen einem Bündnis anschließen, das diese Nationen zusammenführen soll."
 france.17.a:0 "Gerne. Die Kleine Entente muss wieder aufgebaut werden."
 france.17.b:0 "[Root.GetName] geht seinen eigenen Weg."
 france.18.t:0 "[From.GetName] tritt der französischen Fraktion bei"
 france.18.d:0 "Unser Plan, das Auseinanderbrechen und die Abkehr der Kleinen Entente von uns zu verhindern, macht Fortschritte. [From.GetLeader] begrüßt unsere Bemühungen und hat unsere Einladung zu einem Bündnis angenommen."
 france.18.a:0 "Wir sind dem Wiederaufbau der Kleinen Entente einen Schritt näher gekommen."
 france.19.t:0 "[From.GetName] lehnt französisches Bündnis ab"
 france.19.d:0 "Trotz unserer Bemühungen, die Kleine Entente zu unterstützen, stieß unser jüngster Versuch, Kontakt zu einer der Nationen aufzunehmen, auf Skepsis. [From.GetLeader] hat sich geweigert, der Allianz beizutreten. Vielleicht zweifelt er an unseren Motiven oder befürchtet, dass eine zu enge Verbindung mit uns sie zur Zielscheibe machen könnte."
 france.19.a:0 "Sie könnten, soweit sie wissen, bereits ein Ziel sein!"
 france.20.t:0 "Widerstand gegen den Waffenstillstand"
 france.20.d:0 "Nach dem Waffenstillstand mit Deutschland und der Bildung einer neuen Regierung in Vichy-Frankreich rebellierte eine Gruppe hochrangiger Offiziere gegen die neue französische Regierung. Charles de Gaulle rief in einer Radioansprache zum Widerstand gegen das kollaborierende Vichy-Regime auf. De Gaulle übernahm de facto die Führung der Freien Französischen Streitkräfte und setzte den Kampf gegen die Deutschen fort."
 france.20.a:0 "Der Kampf um Frankreich geht weiter."
 france.20.a_tt:0 "§YCharles de Gaulle wird Staatschef Frankreichs§!"
 france.21.t:0 "Arbeiter drohen mit Streiks"
 france.21.d:0 "Nach der Entlassung zweier Arbeiter in einer großen Fabrik sind landesweite Kämpfe zwischen Arbeitern und Fabrikbesitzern ausgebrochen. Von [Root.GetCommunistParty] unterstützte Arbeiter haben sich organisiert und fordern bessere Bedingungen, wie höhere Löhne und kürzere Arbeitswochen. Dies wird die Produktion unserer Fabriken stark reduzieren und wird als Sieg für [Root.GetCommunistParty] gewertet. Wir sind zu Verhandlungen nach Matignon eingeladen. Geben wir ihren Forderungen nach oder bleiben wir standhaft und riskieren einen landesweiten Streik?"
 france.21.a:0 "Lass sie zuschlagen"
 france.21.b:0 "Verhandeln Sie einen Deal"
 france.22.t:0 "Überprüfen Sie die Matignon-Vereinbarungen erneut"
 france.22.d:0 "Mit den kürzlich unterzeichneten Matignon-Vereinbarungen hat unsere Industrie keine Chance mehr, mit der deutschen zu konkurrieren. Unsere Produktionskapazitäten sinken täglich. Einige Fabrikbesitzer haben bereits begonnen, einige der in den Matignon-Vereinbarungen gewährten Rechte neu zu verhandeln, ohne dass es zu nennenswertem Widerstand der Arbeiter kam. Wir haben die Möglichkeit, die neu gewonnenen Arbeitnehmerrechte landesweit offiziell aufzuheben, riskieren aber, dass sie sich erneut hinter [Root.GetCommunistParty] stellen, in der Hoffnung, dass sie einen weiteren Streik unterstützen. Wenn wir den Arbeitern ihre Rechte lassen und uns auf die Optimierung der aktuellen Arbeitsabläufe konzentrieren, kann dies dazu beitragen, die französische Bevölkerung wieder zu vereinen und uns gemeinsam wachsen zu lassen."
 france.22.a:0 "Mit der Zeit werden wir wieder so effizient sein wie zuvor"
 france.22.b:0 "Entziehen Sie ihnen ihre Rechte und bringen Sie unsere Branche sofort wieder auf Kurs"
 france.23.t:0 "Die Streiks sind vorbei"
 france.23.d:0 "Die meisten Arbeiter haben inzwischen erkannt, dass ihre unrealistischen Forderungen nicht erfüllt werden. Ihre Kinder hungern, und obwohl [Root.GetCommunistParty] sie zur Fortsetzung des Streiks drängt, verfügen sie nicht über die nötigen Mittel. Mit jedem Tag geben die Arbeiter nach und kehren in die Fabriken zurück. Unsere Industrie wird wieder ihre volle Kapazität erreichen, und es ist unwahrscheinlich, dass es in absehbarer Zeit zu Streiks kommt."
 france.23.a:0 "Endlich können wir wieder an Wettkämpfen teilnehmen"
 france.24.t:0 "Die kommunistische Bedrohung"
 france.24.d:0 "Die Bedrohung durch ein vereintes Deutschland und die Sowjetunion ist zu groß, um sie zu ignorieren. Nach der Einigung beider Länder auf die Teilung Polens stehen wir vor einer schwierigen Entscheidung. Wenn wir [Root.GetCommunistParty] so agieren lassen wie bisher, setzen wir uns mit der wachsenden Macht der Sowjetunion internen Konflikten aus. Indem wir jegliche kommunistische Aktivitäten oder die Zugehörigkeit zu [Root.GetCommunistParty] verbieten, senden wir ein starkes Signal an alle Bürger, dass wir niemanden tolerieren, der eine Bedrohung für den Frieden darstellt. \nTraditionell konnten wir [Root.GetCommunistParty] in politische Diskussionen einbeziehen, aber da sie sich weigert, ihre Loyalität gegenüber Moskau aufzugeben, ist es möglicherweise an der Zeit, drastische Maßnahmen zu ergreifen."
 france.24.a:0 "Verbot des Kommunismus in Frankreich"
 france.24.b:0 "Meinungsverschiedenheiten sind Teil des demokratischen Prozesses"
 france.25.t:0 "Londoner Konferenz"
 france.25.d:0 "Da das Regime in Berlin die Spannungen an der Grenze zu Jugoslawien verschärft, haben die Briten beschlossen, nachzugeben. Jugoslawien ist jedoch eine der drei Säulen der osteuropäischen Ordnung. Schwächt es ab, wird die Sicherheit Frankreichs darunter leiden. Sollten wir beweisen, dass wir die größere Macht sind und den Kampf allein riskieren?"
 france.25.a:0 "Wir werden den Frieden bewahren"
 france.25.b:0 "Wir werden für die Freiheit eintreten"
 france.26.t:0 "Londoner Konferenz"
 france.26.d:0 "Während das Regime in Berlin die Spannungen an der Grenze zu Jugoslawien verschärft, haben die Briten beschlossen, sich der deutschen Aggression entgegenzustellen. Doch die Wunden des letzten Krieges sind noch nicht verheilt, und unser Land ist tief gespalten. Sind wir stark genug, um es allein zu schaffen?"
 france.26.a:0 "Es ist Zeit, den Deutschen Paroli zu bieten"
 france.26.b:0 "Dies ist die falsche Ursache"
 france.27.t:0 "Deutschland unterstützt italienische Forderungen"
 france.27.d_1_state:0 "Deutschland hat den italienischen Forderungen nach unserem Territorium nachgegeben. Nach unserer Niederlage sind wir wirklich nicht in der Lage, es anzufechten."
 france.27.d_both:0 "Italien soll Savoyen und Korsika erhalten. Diese Entscheidung Deutschlands löste bei den Kolonialgouverneuren Besorgnis aus, da sie sich fragten, wer als nächstes an der Reihe sein würde. Der Gouverneur Syriens wartete nicht ab, um dies zu erfahren, und lief zum Freien Frankreich über."
 france.27.a:0 "Wir haben eigentlich keine Wahl."
 france.27.b:0 "Die Deutschen sind kurzsichtige Narren"
 france.28.t:0 "Syrien-Defekte"
 france.28.d:0 "Nach der deutschen Entscheidung, Vichy-Gebiete an Italien zu überlassen, hat sich die syrische Regierung entschieden, sich unserer Seite anzuschließen."
 france.28.a:0 "Frankreich ist der Erlösung einen Schritt näher gekommen"
 france.29.t:0 "Großbritannien akzeptiert die Bitte eines Verbündeten"
 france.29.d:0 "Die Geschichte hat gezeigt, wie viel erreicht werden kann, wenn unsere großen Nationen Seite an Seite stehen. Im Geiste der Entente Cordiale sind wir stolz, Sie nicht nur als Freunde, sondern als Verbündete begrüßen zu dürfen. Gemeinsam werden wir ein leuchtendes Leuchtfeuer der Freiheit in einer Welt sein, die von der Dunkelheit der Unterdrückung überwältigt wird! Unser Antrag, Großbritannien als Verbündeter beizutreten, wurde angenommen. Wir können in den kommenden turbulenten Zeiten auf Ihre volle Unterstützung zählen."
 france.29.a:0 "Gemeinsam halten wir die Stellung!"
 france.30.t:0 "Großbritannien lehnt Antrag eines Verbündeten ab"
 france.30.d:0 "„Obwohl wir in der Vergangenheit gute Beziehungen pflegten, können wir eine Eskalation der Konflikte jenseits des Kanals nicht riskieren. Deutschland hat sich unser Vertrauen in die Einhaltung unseres Flottenpakts verdient, und wir werden uns zwar verteidigen, sollten sich die Konflikte ausbreiten, aber wir werden nicht riskieren, die Flammen anzufachen. Frieden muss stets das Ziel jeder demokratischen Nation sein.“\n\nUnser Antrag auf Beitritt zu Großbritannien wurde abgelehnt. Die britische Regierung ist nicht bereit, Deutschland weiter zu verärgern und wird den bestehenden Frieden nicht gefährden."
 france.30.a:0 "Ihr „Frieden“ ist nur ein anderes Wort für „Kapitulation“"
 france.33.title:0 "Französische Befreiung"
 france.33.desc:0 "Mit dem Ende des Krieges schwindet auch die Notwendigkeit, eine enge Verbindung zur französischen Nation aufrechtzuerhalten. Die französischen politischen Parteien fordern zunehmend die Einsetzung einer provisorischen Regierung und Neuwahlen."
 france.33.a:0 "Natürlich sind unsere treuen Verbündeten ein freies Volk."
 france.33.b:0 "Wir müssen die Sicherheit auf dem Festland streng aufrechterhalten."
 france.34.title:0 "Ende der französisch-britischen Union"
 france.34.desc:0 "Da Großbritannien Frieden geschlossen hat, hat [From.GetLeader] den Forderungen der französischen Parteien nach der Wiedereinsetzung einer provisorischen französischen Regierung entsprochen. Ihre politische Integration wurde zwar gestoppt, doch die beiden Nationen werden auch in Zukunft zweifellos enge Freunde bleiben."
 france.34.a:0 "Bravo!"
 france.34.b:0 "Ich verstehe."
 low.1.t:0 "Frankreich erweitert die Maginot-Linie"
 low.1.d:0 "Die Franzosen haben beschlossen, ihre Maginot-Linie bis zum Ärmelkanal zu verlängern! Das zeigt deutlich ihre Absicht, uns im Falle einer deutschen Invasion im Stich zu lassen. Unsere Botschaft in Paris hat eine offizielle Beschwerde eingereicht, doch es ist fraglich, ob sie große Wirkung zeigen wird."
 low.1.a:0 "Das ist eine Unverschämtheit!"
 soviet.1.t:0 "Japanischer Aufbau"
 soviet.1.d:0 "Die Spannungen entlang der mandschurischen Grenze sind seit einiger Zeit angespannt, und nun erhalten wir von unseren mongolischen Kameraden Berichte, dass die Japaner Truppen in Heilungkiang zusammenziehen. Ein Rückzug mag als Zeichen der Schwäche gelten, doch wenn wir mit Gewalt reagieren, könnte die Situation eskalieren. Wie lauten Ihre Befehle, Tovarisch Komandir?"
 soviet.1.a:0 "Wir wehren uns. Und zwar heftig."
 soviet.1.b:0 "Wir können uns einen Krieg mit Japan nicht leisten."
 soviet.2.t:0 "Erfolgreicher Überfall"
 soviet.2.d:0 "Unser Angriff auf die sich dort sammelnden japanischen Truppen an der mandschurischen Grenze war ein Erfolg! Wir konnten sie einholen, bevor sie ihre Vorbereitungen abgeschlossen hatten, und unsere tapferen Soldaten verpassten ihnen in dem darauf folgenden heftigen Gefecht eine gehörige Tracht Prügel."
 soviet.2.a:0 "Gut gemacht!"
 soviet.3.t:0 "Fehlgeschlagener Überfall"
 soviet.3.d:0 "Unser Angriff über die mandschurische Grenze gegen die dort versammelten japanischen Streitkräfte war ein Fehlschlag! Der Feind geriet in eine Zangenbewegung, und wir erlitten schwere Verluste, bevor wir uns befreien konnten."
 soviet.3.a:0 "Bereiten Sie ein Erschießungskommando vor."
 soviet.4.t:0 "Rumänien kapituliert in Bessarabien"
 soviet.4.d:0 "Die Rumänen haben sich unseren Forderungen weise gebeugt und alle ihre Truppen aus Bessarabien abgezogen. Wir werden das Gebiet als Moldauische Sozialistische Sowjetrepublik in die Union eingliedern. Seine Bürger werden nun die Vorteile des Sozialismus genießen. "
 soviet.4.a:0 "Exzellent."
 soviet.5.t:0 "Rumänien lehnt unsere Forderungen ab"
 soviet.5.d:0 "Die Rumänen haben sich geweigert, unseren Forderungen nachzugeben! Es sieht so aus, als müssten wir ihre Besatzungstruppen mit Gewalt aus Bessarabien vertreiben."
 soviet.5.a:0 "Narren!"
 soviet.6.t:0 "Estland reicht ein"
 soviet.6.d:0 "Estland hat sich unseren Forderungen gefügt. Wir haben die dekadente Regierung in Tallinn durch ein Volksparlament ersetzt, das einstimmig für die Umwandlung Estlands in eine Sozialistische Sowjetrepublik gestimmt hat. Nach Beratungen hat der Oberste Sowjet beschlossen, diesem Ersuchen stattzugeben."
 soviet.6.a:0 "Willkommen in der Gewerkschaft, Genossen."
 soviet.7.t:0 "Estland lehnt unser Angebot ab"
 soviet.7.d:0 "Estland hat sich unverschämterweise dazu entschlossen, unser großzügiges Angebot eines gegenseitigen Beistandspakts abzulehnen! Die Kapitalisten und Speichellecker in Tallinn hatten außerdem die Dreistigkeit, eine Erklärung abzugeben, in der sie von uns die Achtung der territorialen Integrität ihres Landes fordern!"
 soviet.7.a:0 "Wir müssen die Esten vor sich selbst schützen."
 soviet.8.t:0 "Lettland unterwirft sich"
 soviet.8.d:0 "Die lettische Regierung in Riga hat unseren Forderungen entsprochen, und wir haben ihre korrupte Herrschaft durch eine Volksversammlung ersetzt. Dieses Gremium hat einstimmig die Mitgliedschaft in unserer großen Union als Sozialistische Sowjetrepublik beantragt. Wir haben uns bereit erklärt, diesem Wunsch nachzukommen."
 soviet.8.a:0 "Ihr seid jetzt Sozialisten!"
 soviet.9.t:0 "Lettland lehnt unser Angebot ab"
 soviet.9.d:0 "Die bürgerlichen Unterdrücker, die Lettland regieren, haben sich entschieden, jegliche Vernunft aufzugeben. Sie haben unseren großzügigen Beistandspakt abgelehnt und fordern den sofortigen Abzug aller sowjetischen Streitkräfte, die sich entlang ihrer Grenze „versammeln“."
 soviet.9.a:0 "Das lettische Volk muss befreit werden."
 soviet.10.t:0 "Litauen reicht ein"
 soviet.10.d:0 "Unserem Antrag auf Militärstützpunkte in Litauen wurde stattgegeben, doch leider ist die dortige Regierung zusammengebrochen. Um Anarchie zu vermeiden, haben wir ein Volksparlament eingerichtet, und Litauen hat einstimmig beschlossen, den Obersten Sowjet um die Mitgliedschaft in unserer Union zu ersuchen. Diesem Antrag wurde stattgegeben."
 soviet.10.a:0 "Wir werden Sie vor dem Kapitalismus retten."
 soviet.11.t:0 "Litauen lehnt unser Angebot ab"
 soviet.11.d:0 "Litauen scheint auf Selbstzerstörung aus zu sein, und die Idioten in der Regierung verweigern unseren Truppen den Zugang zu ihrem Land. Glauben sie etwa, es ginge ihnen unter den Deutschen besser? Ihre egoistischen Führer begehen ein Verbrechen am Volk, indem sie ihren Bürgern den wahren Sozialismus vorenthalten."
 soviet.11.a:0 "Das litauische Volk hat genug gelitten."
 soviet.12.t:0 "Finnland akzeptiert unsere Forderungen"
 soviet.12.d:0 "Die überwältigende Stärke, die wir entlang ihrer Grenzen zusammengezogen haben, hat die finnische Regierung davon überzeugt, unserer bescheidenen Forderung nach einer Grenzrevision nachzukommen. Wir haben die Kontrolle über Karelien erlangt, und die Position Leningrads ist nun wesentlich sicherer."
 soviet.12.a:0 "Wir haben erwartet, dass sie sich wehren würden …"
 soviet.13.t:0 "Finnland lehnt unsere Forderungen ab"
 soviet.13.d:0 "Die finnische Regierung hat unsere Forderungen abgelehnt, aber das war zu erwarten. Wenn wir Karelien wollen, müssen wir es uns mit Gewalt nehmen. Es ist Zeit, den sturen Finnen eine Lektion zu erteilen, die sie nie vergessen werden!"
 soviet.13.a:0 "Wir werden sie in ein paar Wochen vernichten."
 soviet.14.t:0 "Mitgliedschaft in der UdSSR"
 soviet.14.d:0 "Moskau drängt uns, der UdSSR offiziell beizutreten. Sollten wir dem zustimmen?"
 soviet.14.a:0 "Ja, lasst uns ihnen beitreten."
 soviet.14.b:0 "Nein, wir haben unser volles Potenzial noch nicht erreicht!"
 soviet.15.t:0 "Tannu Tuva weigert sich!"
 soviet.15.d:0 "Die Tuwiner haben sich unverschämt geweigert, sich der Sowjetunion anzuschließen! Was solch eine erbärmliche Nation allein erreichen könnte, ist ein Rätsel, das vielleicht nie gelöst werden wird."
 soviet.15.a:0 "Viel Glück für sie."
 soviet.16.t:0 "Die Annexion von Tannu Tuva"
 soviet.16.d:0 "Der Oberste Sowjet hat vom tuvanischen Parlament einen formellen Antrag auf Mitgliedschaft in der Sowjetunion erhalten. Die Organisation wird als Autonome Oblast Tuwinen in der Russischen SFSR organisiert."
 soviet.16.a:0 "Willkommen in der Gewerkschaft, Genossen."
 soviet.17.t:0 "Verbesserung der Stalin-Linie"
 soviet.17.d:0 "Eine gründliche Revision der Verteidigungsanlagen entlang unserer westlichen Grenzgebiete ist abgeschlossen, und Häftlinge aus unseren Besserungsarbeitslagern stehen bereit, mit der Arbeit zu beginnen. Bald wird die Stalin-Linie ihrem glorreichen Namen alle Ehre machen!"
 soviet.17.a:0 "Genosse Stalin wird stolz sein!"
 soviet.60.t:0 "Die Teilung Polens"
 soviet.60.d:0 "Polen gehört uns, doch die westlichen Teile fallen gemäß den Bestimmungen des Molotow-Ribbentrop-Pakts unter die Einflusssphäre Polens. Sollten wir unsere Truppen abziehen und die Polen dieses Gebiet besetzen lassen? Andernfalls wäre unser Vertrag ungültig."
 soviet.60.a:0 "Ja. Jetzt ist nicht die Zeit, Verträge zu brechen."
 soviet.60.b:0 "Nein! Ganz Polen gehört dem Mutterland!"
 soviet.61.t:0 "Die Sowjets halten den Pakt ein"
 soviet.61.d:0 "Gemäß dem Vertrag haben die [SOV.GetAdjective]s die westlichen Teile Polens unserer Verwaltung übergeben. Deutsche Truppen sind einmarschiert, um für Sicherheit zu sorgen."
 soviet.61.a:0 "Exzellent."
 soviet.62.t:0 "Sowjets verletzen den Pakt"
 soviet.62.d:0 "Trotz wiederholter Zusicherungen haben die Sowjets ihre Truppen bisher nicht abgezogen und auch keine Schritte unternommen, die Gebiete abzugeben und zu den vereinbarten Grenzen zurückzukehren. Es scheint, als hätten sie nicht die Absicht, den Vertrag einzuhalten."
 soviet.62.a:0 "Es war nicht einmal die Tinte wert!"
 finland.1.t:0 "Die Russen fordern Karelien"
 finland.1.d:0 "Unter Berufung auf die Notwendigkeit, einen Sicherheitspuffer für Leningrad zu schaffen, forderten Vertreter der Sowjetunion eine Revision unserer Grenzen. Sie wollen, dass wir ihnen Karelien abtreten, und angesichts des Aufmarsches sowjetischer Truppen entlang unserer Grenze lassen sie sich nicht auf ein Nein ein. Wie sollen wir reagieren?"
 finland.1.a:0 "Wir haben keine andere Wahl, als ihre Forderungen zu akzeptieren."
 finland.1.b:0 "Lasst sie kommen, wenn sie sich trauen!"
 finland.2.t:0 "Bitte um schwedische Unterstützung im Krieg"
 finland.2.d:0 "Finnland und die Sowjetunion befinden sich im Krieg. Nach nur wenigen Jahrzehnten der Souveränität laufen wir nun Gefahr, erneut zum Untertan eines unserer Nachbarn zu werden. Die Bedrohung durch unseren Feind reicht jedoch über unsere Grenzen hinaus. Unsere Nachbarn in Schweden bleiben der Sowjetunion gegenüber neutral, könnten aber möglicherweise davon überzeugt werden, gemeinsam mit uns unser gemeinsames Erbe zu verteidigen und ihren eigenen strategischen Puffer zu sichern."
 finland.2.a:0 "Sie sollten zu unserer Haltung beitragen."
 finland.2.b:0 "Wir brauchen die Hilfe alter Unterdrücker nicht."
 finland.3.t:0 "Finnland bittet Schweden um Unterstützung"
 finland.3.d:0 "Unser Nachbar Finnland hat sich dem Druck der Sowjetunion nicht gebeugt, und die beiden Nationen befinden sich nun im Kriegszustand. Obwohl zwischen unseren Ländern kein formelles Bündnis vereinbart wurde, hat die finnische Regierung Schweden gebeten, sich an der gemeinsamen Verteidigung Ålands zu beteiligen. Åland ist nach wie vor größtenteils schwedischsprachig und für beide Länder von strategischer Bedeutung. Während die Regierung weiterhin uneins darüber ist, welche Schritte wir unternehmen sollten, um Finnland zu helfen, ist die öffentliche Unterstützung für die Verteidigung Finnlands bemerkenswert. Wie weit sind wir bereit zu gehen, um unsere nordischen Nachbarländer vor der Aggression aus dem Osten zu schützen?"
 finland.3.a:0 "Wir müssen unsere Neutralität bewahren."
 finland.3.b:0 "Wenn sie über öffentliche Unterstützung verfügen, schicken Sie Freiwillige und Ausrüstung."
 finland.3.c:0 "Finnlands Sache ist unsere! Auf in den Krieg!"
 finland.4.t:0 "Schweden lehnt Antrag ab"
 finland.4.d:0 "Die schwedische Regierung hat auf unsere Bitte um Unterstützung im Krieg gegen die Sowjetunion negativ reagiert. Sie zieht es vor, neutral zu bleiben, um internationale und interne Auswirkungen zu vermeiden, und lehnt es bislang ab, in irgendeiner Weise zum Krieg beizutragen."
 finland.4.a:0 "Hoffen wir, dass sie ihren Fehler erkennen, bevor es zu spät ist."
 finland.5.t:0 "Schweden schickt Freiwillige"
 finland.5.d:0 "Die schwedische Regierung war bisher nicht bereit, uns im Krieg gegen die Sowjetunion zu unterstützen. Doch die öffentliche Unterstützung unserer Nachbarn ist nach wie vor groß, und viele Freiwillige aus den anderen nordischen Ländern haben sich bereit erklärt, uns bei der Kriegsanstrengung zu unterstützen. Zwar weniger als erhofft, aber immerhin ist die Bevölkerung sich der Bedrohung bewusst, der wir ausgesetzt sind."
 finland.5.a:0 "Das ist das Mindeste, was man erwarten würde."
 finland.6.t:0 "Schweden beteiligt sich an unserem Krieg"
 finland.6.d:0 "Unsere Bitte an die schwedische Regierung um eine gemeinsame Verteidigung Ålands wurde über alle Erwartungen erfüllt. Schweden hat sich uns im Krieg gegen die Sowjetunion angeschlossen und weigert sich angesichts dieser offensichtlichen Bedrohung, neutral zu bleiben. Trotz interner Meinungsverschiedenheiten wird es nun Seite an Seite mit uns kämpfen, um die Souveränität Finnlands zu sichern."
 finland.6.a:0 "Dieser Tag wird uns in Erinnerung bleiben."
 finland.7.t:0 "Friedensverhandlungen mit [SOV.GetNameDef]"
 finland.7.d:0 "Die [Root.GetAdjective]-Kommunistin Hella Wuolijoki hat unsere Regierung kontaktiert und ihre Hilfe bei der Kontaktaufnahme mit dem [SOV.GetAdjective]-Regime angeboten. An einem geheimen Ort in Schweden wurde ein Treffen vereinbart, bei dem uns die Möglichkeit geboten wird, im Gegenzug für die Aufrechterhaltung unserer [Root.GetAdjective]-Souveränität Territorium abzutreten. \n\nDie finnischen Streitkräfte dezimieren sich rapide, und bisherige Versuche, eine Kommunikationslinie aufzubauen, waren erfolglos. Dies ist möglicherweise unsere einzige Hoffnung auf eine friedliche Lösung des Konflikts."
 finland.7.a_tt:0 "§YWenn [SOV.GetName] akzeptiert:\n§!"
 finland.7.a:0 "Dieser Krieg ist nicht zu gewinnen"
 finland.7.b:0 "Wir müssen weiterkämpfen!"
 finland.8.t:0 "[From.GetNameDefCap] bietet Konzessionen an"
 finland.8.d:0 "Der Krieg mit [From.GetNameDef] war eine kostspielige Angelegenheit, aber da wir die [From.GetAdjective]-Armee zurückdrängen konnten, unterbreiteten sie uns ein verlockendes Angebot. Wir erhalten die Kontrolle über strategisch wichtige Gebiete, müssen aber unsere Truppen abziehen und weitere Feindseligkeiten einstellen.\nDadurch endet unsere Offensive auf [From.GetNameDef], ohne dass wir die Region vollständig unter Kontrolle haben. Dafür können wir uns aber auf die Ausweitung unseres Einflussbereichs in anderen Teilen der Welt konzentrieren."
 finland.8.a:0 "Unsere Soldaten werden anderswo gebraucht"
 finland.8.b:0 "Wir benötigen alle [From.GetNameDef]"
 finland.9.t:0 "[From.GetNameDefCap] lehnt ab"
 finland.9.d:0 "Die mit [From.GetNameDef] begonnenen Verhandlungen sind gescheitert. Es war offensichtlich eine List, um unsere Zeit zu verschwenden, während sich die [From.GetAdjective]-Armee für einen weiteren Angriff auf [Root.GetAdjective]-Gebiet in Stellung brachte.\n\n[Root.GetNameDef] wird standhaft bleiben und bis zum bitteren Ende kämpfen."
 finland.9.a:0 "Sie sollen bei jedem Schritt bluten!"
 FIN_agree_peace:0 "Finnland stimmt den sowjetischen Forderungen zu und tritt „Karjala, Salla und Petsamo“ ab."
 japan.1.d:0 "Die chinesischen Behörden behaupten, dass unsere „ungerechtfertigten Aggressionen“ gegenüber China den „Knackpunkt“ erreicht hätten! Unsere Forderungen nach Reparationen wurden abgelehnt, und es gibt Berichte über Angriffe auf japanische Staatsbürger in Shanghai. Wenn wir einen Vorwand brauchten, um entschlossen gegen die Chinesen vorzugehen, dann ist er jetzt da!"
 japan.1.a:0 "Sie werden dafür bezahlen!"
 japan.2.d:0 "Überraschenderweise haben die Chinesen nach dem Scharmützel an der Marco-Polo-Brücke einen Rückzieher gemacht. Sie wissen, dass es einen hohen Preis hat, uns zu verärgern, und haben umfangreichen territorialen Zugeständnissen zugestimmt, die Peking und die umliegenden Regionen einschließen. Stück für Stück wird China zu unserem Land."
 japan.2.a:0 "Der Krieg muss warten."
 japan.3.t:0 "Grenzscharmützel: Sowjetischer Sieg"
 japan.3.d:0 "Die Russen und ihre mongolischen Schoßhunde bemerkten den Truppenaufmarsch in Heilungkiang und reagierten mit einem Großangriff über die Grenze, noch bevor unsere Vorbereitungen abgeschlossen waren! Unsere Truppen wurden in den darauf folgenden heftigen Gefechten schwer geschlagen, bevor sich die beiden Seiten trennten."
 japan.3.a:0 "Wie konnte das passieren?!"
 japan.4.t:0 "Grenzscharmützel: Japanischer Sieg"
 japan.4.d:0 "Die Russen und ihre mongolischen Schoßhunde entdeckten den Truppenaufmarsch in Heilungkiang und versuchten, einen Großangriff über die Grenze zu starten, um unsere Vorbereitungen zu stören! Glücklicherweise konnten unsere reaktionsschnellen Kommandeure ihre Truppen in eine Zange nehmen. Wir fügten ihren Truppen schwere Verluste zu, bevor sie über die Grenze zurückflohen."
 japan.4.a:0 "Das wird ihnen eine Lehre sein!"
 japan.5.t:0 "Sowjetischer Rückzug"
 japan.5.d:0 "Nachdem die Sowjets unseren Truppenaufmarsch entdeckt hatten, entschieden sie sich klugerweise für den Abzug ihrer Truppen aus den Gebieten unmittelbar an der mandschurischen Grenze. Unsere Soldaten haben mehrere ihrer verlassenen Grenzposten vorübergehend besetzt. Dies wird hoffentlich den absurden Grenzansprüchen der Russen und ihrer mongolischen Verbündeten ein Ende setzen."
 japan.5.a:0 "Eine Machtdemonstration genügte."
 japan.6.t:0 "Die Franzosen akzeptieren unsere Forderungen"
 japan.6.d:0 "Die Franzosen haben unseren Forderungen nachgegeben und ihre Stützpunkte und Einrichtungen in Indochina stehen uns uneingeschränkt zur Verfügung. Sie haben uns praktisch die volle Kontrolle über ihre Kolonie übergeben."
 japan.6.a:0 "Ein kluger Schachzug."
 japan.7.t:0 "Die Franzosen lehnen unsere Forderungen ab"
 japan.7.d:0 "Die Franzosen haben unsere Forderungen unverschämt abgelehnt! Es scheint, wenn wir Indochina wollen, müssen wir es uns mit Gewalt nehmen!"
 japan.7.a:0 "Narren!"
 japan.8.t:0 "Deutschland ruft Berater zurück"
 japan.8.d:0 "Die Deutschen haben sich bereit erklärt, alle ihre Berater aus China zurückzurufen. Sie sollten bereits jetzt in Flugzeuge nach Berlin steigen. Deutschland ist sich bewusst, dass die Zukunft Ostasiens Japan und nicht China gehört."
 japan.8.a:0 "Und das sollten sie auch."
 japan.9.t:0 "Deutschland lehnt unsere Anfrage ab"
 japan.9.d:0 "Die Deutschen weigern sich, ihre Berater aus China zurückzurufen, obwohl deren Militärmission unsere Pläne für Ostasien direkt behindert! Sehen sie nicht, dass dies die Grundlage für die Diplomatie unserer Länder untergräbt? Kann man den Deutschen überhaupt trauen?"
 japan.9.a:0 "Dann werden ihre Berater mit dem Rest der Chinesen sterben."
 japan.11.t:0 "Stellen Sie Siam ein Ultimatum"
 japan.11.d:0 "Mit der Truppenverlegung in Indochina nahe der siamesischen Grenze haben wir deutlich gemacht, dass wir es ernst meinen, ihr Land als Stützpunkt für die Befreiung Südostasiens vom europäischen Kolonialismus zu nutzen. Indem wir ihnen die Möglichkeit eröffnen, sich uns in einem Militärbündnis anzuschließen und Siam de facto zu einem Marionettenstaat des japanischen Kaiserreichs zu machen, können wir hoffentlich eine sinnlos einseitige Invasion vermeiden. Sollten sie dies ablehnen, käme dies einer Kriegserklärung gleich."
 japan.11.a:0 "Wir werden Siam betreten, egal was sie sagen."
 japan.11.b:0 "Im Nachhinein betrachtet ist die Drohung einer Invasion zu aggressiv."
 japan.12.t:0 "Japan stellt Ultimatum"
 japan.12.d:0 "Japan hat seit langem Truppen in der Nähe unserer Grenze zusammengezogen und plant, wie vermutet, unsere Häfen als Stützpunkte für eine weitere Expansion nach Burma und Malaya zu nutzen. Nun stellt es uns vor die Wahl: Entweder wir unterwerfen uns und lassen sie passieren oder wir werden einmarschieren.\n\nObwohl dies als Aufgabe unserer Souveränität und als Verwandlung in einen japanischen Marionettenstaat gewertet werden könnte, liegt es möglicherweise in unserem besten Interesse, einen Krieg zu vermeiden."
 japan.12.a:0 "Wir werden einem Bündnis mit Japan zustimmen."
 japan.12.b:0 "Wir werden unsere Unabhängigkeit nicht so leicht aufgeben!"
 japan.13.t:0 "Siam akzeptiert Ultimatum"
 japan.13.d:0 "[From.GetLeader] hat sich klugerweise entschieden, unser Ultimatum anzunehmen und ein Militärbündnis zwischen unseren Nationen zu schmieden. Dadurch können wir Siam als Basis für zukünftige Operationen im Pazifik nutzen."
 japan.13.a:0 "Die Wohlstandssphäre Großostasien wird stärker."
 japan.14.t:0 "Siam lehnt Ultimatum ab"
 japan.14.d:0 "[From.GetLeader] hat unsere Forderung nach einem Einmarsch in Siam und unser Angebot eines Militärbündnisses abgelehnt. Da wir unsere Absicht angekündigt haben, trotzdem einzumarschieren, bedeutet dies Krieg."
 japan.14.a:0 "Schade, dass es so weit kommen musste."
 romania.1.t:0 "Die Sowjetunion fordert Bessarabien"
 romania.1.d:0 "Sowjetische Truppen konzentrieren sich auf der anderen Seite unserer Grenze, und ihre Diplomaten fordern die Abtretung ganz Bessarabiens! Wir können nicht erwarten, dass die Deutschen eingreifen, da ihr Pakt mit den Russen offenbar ein geheimes Protokoll enthielt, das uns in die sowjetische Interessensphäre einordnete. Sollten wir Widerstand leisten?"
 romania.1.a:0 "Nein, es ist hoffnungslos."
 romania.1.b:0 "Ja! Wir werden unser Territorium nicht kampflos aufgeben!"
 romania.2.t:0 "Zweiter Wiener Preis"
 romania.2.d:0 "Deutschland wurde als Vermittler in unserem Territorialstreit mit Ungarn hinzugezogen und entschied im Zweiten Wiener Schiedsspruch, dass Nordsiebenbürgen wieder unter ungarische Kontrolle fallen soll. Sollen wir diese Entscheidung akzeptieren?"
 romania.2.a:0 "Ja ... wir haben keine Wahl."
 romania.2.b:0 "Nein, wir werden Siebenbürgen niemals aufgeben!"
 romania.3.d:0 "Deutschland wurde als Vermittler in unserem Territorialstreit mit Ungarn hinzugezogen und entschied im Zweiten Wiener Schiedsspruch skandalöserweise, dass ganz Siebenbürgen wieder unter ungarische Herrschaft gestellt werden soll! Sollen wir diese Entscheidung akzeptieren?"
 romania.4.t:0 "Deutschland vermittelt im Streit"
 romania.4.d:0 "Deutschland wurde als Vermittler in unserem Territorialstreit mit Ungarn hinzugezogen und entschied klugerweise, dass Siebenbürgen unter rumänischer Kontrolle bleiben soll. Die Ungarn sind nicht erfreut, aber hoffentlich wird die Angelegenheit damit ein für alle Mal geklärt."
 romania.4.a:0 "Siebenbürgen soll rumänisch bleiben."
 romania.5.t:0 "Vertrag von Craiova"
 romania.5.d:0 "Bulgarische Diplomaten haben sich mit deutscher Unterstützung gemeldet und die Rückgabe der südlichen Dobrudscha gefordert – eines Gebiets, das wir ihnen 1913 nach dem Zweiten Balkankrieg abgenommen hatten. Die Zugeständnisse, zu denen wir bereits gezwungen waren, scheinen diese Forderung noch verstärkt zu haben."
 romania.5.a:0 "Dies wird den Streit lösen"
 romania.5.b:0 "Nein, hier muss eine Grenze gezogen werden!"
 romania.6.t:0 "Eine schwere Entscheidung"
 romania.6.d:0 "Wir haben so viel Territorium an unsere räuberischen Nachbarn verloren. Dennoch gibt es Möglichkeiten, einen Teil des verlorenen Landes mit Zinsen zurückzugewinnen. Wir müssen uns nur für die richtige Seite entscheiden. "
 romania.6.a:0 "Unsere einzige Hoffnung ist Deutschland."
 romania.6.b:0 "Die Sowjetunion bietet uns unsere beste Chance"
 romania.6.c:0 "Wir sollten neutral bleiben"
 romania.7.t:0 "Tag der Wiedervereinigung.\nUngarn gibt Siebenbürgen zurück."
 romania.7.d:0 "\nWiederholte Aufstände in Siebenbürgen haben deutlich gemacht, dass die Bevölkerung die durch den Zweiten Wiener Schiedsspruch auferlegte neue Herrschaft nicht akzeptieren würde.\n\nDas Horthyst-Regime ergriff zahlreiche repressive Maßnahmen gegen die rumänische Bevölkerung innerhalb seiner Grenzen. Viele der einheimischen Familien in Siebenbürgen mussten unter den unpopulären Entscheidungen unseres verabscheuungswürdigen Verbündeten leiden. Die Unruhen sind groß und das Volk träumt von einer Wiedervereinigung mit unserem Königreich.\n\nIon Antonescu traf sich kürzlich mit seinem deutschen Amtskollegen Adolf Hitler und schilderte ihm die dramatische Lage der rumänischen Bevölkerung Siebenbürgens.\nEmpört über die ungarische Haltung und in Anbetracht der Rolle der rumänischen Armee an der Ostfront, setzte Adolf Hitler die Aufhebung des Wiener Diktats durch. Die Gebiete Banat, Maramureș und Siebenbürgen wurden daraufhin ein für alle Mal wieder Teil Großrumäniens."
 romania.7.a:0 "Das Land ist durch das Blut und die Tränen seines Volkes wieder vereint."
 romania.8.t:0 "Rumänen drängen auf Wiedervereinigung mit Siebenbürgen"
 romania.8.d:0 "Es kam zu Unruhen und Gewaltausbrüchen, als Demonstranten ihren Wunsch äußerten, Siebenbürgen solle sich Rumänien anschließen und eine Völkerunion bilden.\n\nBukarest drängt mit Nachdruck auf eine Wiedervereinigung mit Siebenbürgen und nutzt dafür den Vorwand einer stärkeren Kriegsbeteiligung an der Ostfront.\nDeutschland scheint Rumänien unterstützt zu haben, und eine Weigerung, das Gebiet zurückzugeben, könnte katastrophale Auswirkungen auf unser Land haben.\n\nWir müssen diese Angelegenheit sorgfältig behandeln."
 romania.8.a:0 "Geben Sie ihr Territorium zurück."
 romania.8.b:0 "Nein, einen solchen Fehler kann sich Ungarn nicht erlauben."
 romania.9.t:0 "Ungarn lehnt die territorialen Zugeständnisse ab."
 romania.9.d:0 "Budapest hat sich geweigert, unsere Forderung nach Rückgabe Siebenbürgens auf diplomatischem Wege anzunehmen! Dies ist eine eklatante Missachtung des Willens des rumänischen Volkes und wird nicht hingenommen werden!\n\nWir werden die Wiedervereinigung mit Siebenbürgen mit militärischen Mitteln erzwingen!\n\nDeutschland hat seine Neutralität in diesem Konflikt erklärt und beide Mitglieder werden im Falle eines Ausbruchs von Feindseligkeiten aus der Fraktion ausgeschlossen."
 romania.9.a:0 "Diese Ungerechtigkeit wird nicht hingenommen! Wir müssen uns auf eine militärische Intervention vorbereiten."
 romania.9.b:0 "Wir können uns keinen weiteren Krieg leisten."
 romania.10.t:0 "Revolution Winds"
 romania.10.d:0 "Nach der Gründung Großrumäniens gab es zahlreiche Parteien, die an den Wahlen teilnehmen wollten. Allerdings war es für sie sehr schwierig, die Hürde zu erreichen, sodass viele ihrer Mitglieder zwischen den beiden wichtigsten demokratischen Parteien wählen mussten: PNL und PNC. Die Führer dieser Parteien waren jedoch stolz auf ihre Position, und für einen fähigen Mann, der sich für das Land einsetzen wollte, war es schwer, sich Gehör zu verschaffen, in der Partei aufzusteigen und das Volk zu vertreten. Da sich viele von ihnen abgelehnt fühlten, wandten sie sich den rechts- und linksextremen Bewegungen zu. Heute sind diese Menschen bereit zu regieren. Menschen aller Klassen, verärgert über das Auftreten dieser sogenannten „demokratischen Parteien“, versammelten sich auf den Plätzen der Städte, um eine Regierungsform einzuführen, in der niemand ignoriert wird, alle Menschen gleich sind und es nur eine einzige Klasse gibt, die uns vertritt: das Proletariat!"
 romania.10.a:0 "Keine Ungerechtigkeit mehr!"
 romania.10.b:0 "Wir haben alle die gleichen Bedürfnisse!"
 romania.10.c:0 "Es lebe das Proletariat und das Proletariat!"
 romania.11.t:0 "Machtergreifung des Faschismus"
 romania.11.d:0 "Nach der Gründung Großrumäniens gab es zahlreiche Parteien, die bereit waren, an den Wahlen teilzunehmen. Allerdings war es für sie auch sehr schwierig, die Hürde zu überwinden, sodass viele ihrer Mitglieder zwischen den beiden wichtigsten demokratischen Parteien wählen mussten: PNL und PNC. Doch der Stolz unter den Führern dieser Parteien war groß, und für einen fähigen Mann, der bereit war, sich für das Land einzusetzen, war es schwer, seiner Stimme Gehör zu verschaffen, in der Partei aufzusteigen und das Volk zu vertreten.\n\nWeil sich viele von ihnen abgelehnt fühlten, begannen sie, ihre Aufmerksamkeit auf die rechts- und linksextremen Bewegungen zu richten... und heute sind diese Menschen bereit, alles für das Land zu tun!\n\nMenschen aus allen Schichten, verärgert über das Auftreten dieser sogenannten „demokratischen Parteien“, versammelten sich auf den Plätzen der Städte, um eine neue Herrschaft einzuführen, die die Ethnizität und die Traditionen derer schützen soll, die seit Jahrhunderten in diesen Ländern lebten, und die rumänische Kultur bewahren soll.\n\nUnsere jüngste Entscheidung, uns den Achsenmächten anzuschließen, hat zu einer Situation geführt, in der es sehr schwer ist, den faschistischen Einfluss anderer Großmächte auf uns zu stoppen.\n\nFaschisten aus dem ganzen Land versammelten sich in Bukarest, um Garda de Fier zu feiern. Es scheint nur eine Frage der Zeit zu sein, bis sie die Macht ergreifen."
 romania.11.a:0 "Machen Sie Rumänien wieder großartig!"
 romania.11.b:0 "Alles für das Land!"
 romania.11.c:0 "Der Kapitän, er ist unser spiritueller Führer!"
 romania.12.t:0 "Codreanu-Attentat!"
 romania.12.d:0 "Mein König! Ich habe großartige Neuigkeiten. Einer unserer größten Gegner, Corneliu Zelea Codreanu, wurde endlich gefunden und in unserem sichersten Gefängnis in Jilava eingesperrt. Dies ist die beste Gelegenheit, unseren Plan umzusetzen, über den wir so lange nachgedacht haben. Wenn wir nicht wollen, dass der Faschismus die Macht übernimmt, sollten wir es jetzt tun. \n Wir haben bereits einige Wächter bestochen, und sie haben uns versichert, dass niemand dieses Komplott jemals aufdecken wird. Die Leute werden denken, er sei eines natürlichen Todes gestorben. Warum sollten wir es nicht tun?"
 romania.12.a:0 "Worauf warten Sie dann noch? Endlich!"
 romania.12.b:0 "So etwas können wir nicht tun. Wir sind keine Tiere."
 romania.13.t:0 "Armand Calinescus Tod"
 romania.13.d:0 "Sir, heute erreichte den Königspalast eine schreckliche Nachricht. Premierminister Calinescu wurde auf dem Heimweg ermordet! Erste Berichte zeigen, dass sein Auto von einem anderen blockiert und sein Körper von 20 Kugeln durchbohrt wurde. Seine Mörder sind Mitglieder der ehemaligen Eisernen Garde und behaupten, sie hätten den Premierminister für den Tod ihres Anführers Corneliu Codreanu bestraft. Sir, könnte dies die Rache ausländischer Geheimdienste für seine jüngste Unterstützung der polnischen Sache sein?\n\n***SSI-HINWEIS*** „Eure Majestät, wir haben die neun Mitglieder der Eisernen Garde gefangen genommen. Sie scheinen von Horia Sima, dem neuen Anführer der Legion, persönlich koordiniert worden zu sein, der sich der Gefangennahme entziehen konnte. Wir warten auf weitere Anweisungen. "
 romania.13.a:0 "Wir lassen uns nicht provozieren. Wir können darüber reden, ohne Blutvergießen."
 romania.13.b:0 "Wir werden ihren Wahnsinn nicht länger ertragen!"
 romania.14.t:0 "Das Jilava-Massaker"
 romania.14.d:0 "Unter König Carol II. nahmen die repressiven Maßnahmen gegen die Eiserne Garde in den späten 1930er Jahren Fahrt auf. Ein Kreislauf der Gewalt auf beiden Seiten forderte viele Todesopfer, darunter Premierminister Armand Călinescu und Corneliu Zelea Codreanu, Gründer und Anführer der Garde.\n\nNachdem die Garde an die Macht gekommen war, dürsteten ihre Mitglieder nach Rache und versuchten, diejenigen zu eliminieren, die an den verschiedenen legalen und illegalen Aktionen des königlichen Regimes beteiligt gewesen waren. Sie richteten ein Sondergericht ein, um Verbrechen zu untersuchen, die von den Hauptfiguren des vorherigen Regimes oder in deren Namen gegen die Garde begangen worden waren.\n\nDas Gericht ordnete die Verhaftung der zu untersuchenden Personen an und ließ sie vorerst in Jilava inhaftieren.\n\nAus Angst, Antonescu könnte seine Meinung bezüglich der Hinrichtung der für Codreanus Tod Verantwortlichen ändern, weigerte sich eine Gruppe von Legionären, den Befehlen Folge zu leisten, und richtete sie hin."
 romania.14.a:0 "Nein... das ging zu weit! Löst die Legionspolizei sofort auf!"
 romania.14.b:0 "Ich habe die Bestrafung der in Jilava Inhaftierten dem Justizsystem des Landes vorbehalten."
 romania.14.c:0 "Die Straße entschied anders und machte sich daran, selbst für Gerechtigkeit zu sorgen."
 romania.15.t:0 "N. Iorga und V. Madgearu tot aufgefunden"
 romania.15.d:0 "Er galt als Codreanus Mörder und erhielt erneut Drohungen von der Eisernen Garde, darunter Hassbriefe, Angriffe in der Presse der Bewegung und Tiraden der Garde-Sektion in Vălenii. Er brachte die neue Regierung noch mehr gegen sich auf, indem er seine Verbundenheit mit dem abgedankten König bekundete.\n\nEr wurde von einer Garde-Truppe entführt und in der Nähe von Strejnic getötet.\n\nIorgas Ermordung wird oft in Verbindung mit der des Agrarpolitikers Virgil Madgearu genannt, der in derselben Nacht von den Garde-Truppen entführt und ermordet wurde, sowie mit dem Massaker von Jilava, bei dem der Verwaltungsapparat Karls II. dezimiert wurde."
 romania.15.a:0 "Sie haben das Richtige getan."
 romania.15.b:0 "Diese Menschen standen für die intellektuelle Stärke unserer Nation. Die Garde hat eine große Sünde begangen!"
 romania.16.t:0 "Königreich Rumänien, 1936"
 romania.16.d:0 "Großrumänien bezeichnet das Gebiet Rumäniens in den Jahren zwischen dem Ersten und dem Zweiten Weltkrieg. Es war die bis dahin größte geographische Ausdehnung Rumäniens und seine größte Ausdehnung in Friedenszeiten überhaupt (295.649 km²). Im Jahr 1918, am Ende des Ersten Weltkriegs, vereinigten sich Siebenbürgen, die Bukowina und Bessarabien mit dem Alten Rumänischen Reich. Nach der Unabhängigkeitserklärung von Russland am 24. Januar 1918 stimmte der „Sfatul Tarii“ von Bessarabien am 9. April 1918 für die Union mit Rumänien. Am 27. Oktober stimmte auch der Generalrat der Bukowina für die Union mit dem Alten Reich. Siebenbürgen (als letztes der drei Länder) schloss sich Rumänien durch eine „Unionsproklamation“ von Alba Iulia am 1. Dezember 1918 an, die von den Abgeordneten der Rumänen aus Siebenbürgen angenommen wurde. Wir schreiben das Jahr 1936 und Rivalitäten erwachen aus dem Staub der Geschichte."
 romania.16.a:0 "Lass es uns tun!"
 romania.17.t:0 "Polnische R35-Panzer"
 romania.17.d:0 "Als Teil eines Wiederaufrüstungsprogramms Ende der 1930er Jahre bemühte sich Rumänien um eine Lizenz zur lokalen Herstellung von zweihundert französischen Renault R35-Infanteriepanzern. Anfang 1938 waren die Verhandlungen zur Errichtung einer Fabrik zur Produktion von R35-Panzern weit fortgeschritten. Zu diesem Zeitpunkt verhinderten Frankreichs eigene Wiederaufrüstungsforderungen eine weitere Entwicklung.\n\nIm August und September 1939 wurden als Notlösung 41 R 35 an die Königlich Rumänische Armee geliefert. Diese Panzer dienten als Hauptpanzer des neu gegründeten 2. Panzerregiments. Ende September 1939 gingen weitere 34 brandneue R 35 in rumänische Hände über, als das polnische 21. leichte Panzerbataillon (Batalion Czolgów Lekkich oder BCL) nach der deutschen Eroberung Polens die Internierung der Eroberung vorzog. Mit 75 Panzern in der Stärke wurde das 2. Panzerregiment auf zwei Bataillone erweitert."
 romania.17.a:0 "Weitermachen."
 romania.17.b:0 "Ich denke, wir sollten warten."
 romania.19.t:0 "Deutsche Militärmission in Rumänien"
 romania.19.d:0 "Die Heer-Elemente der im Oktober 1940 nach Rumänien entsandten deutschen Militärmission waren günstig in der Nähe der Ölfelder von Ploiesti stationiert und sollten:\n\nA. die Ölregion vor dem Angriff einer dritten Macht oder vor Zerstörung schützen.\n\nB. die rumänische Armee auf einen Bereitschaftsgrad bringen, der es ihr ermöglichen würde, bestimmte Aufgaben gemäß einem vom deutschen Kommando ausgearbeiteten Plan und im deutschen Interesse zu erfüllen.\n\nC. im Falle eines von der Sowjetunion aufgezwungenen Krieges die Bedingungen für die Mobilisierung der deutschen und rumänischen Streitkräfte auf rumänischem Boden vorzubereiten.\n\nDas Heer entsandte zwei Divisionen zur Ausbildung rumänischer Bodeneinheiten – die 13. motorisierte Infanteriedivision, bezeichnet als „Lehrstab R. I“, und die 16. Panzerdivision, bezeichnet als „Lehrstab R. II“, die sofort mit der Verbesserung der Kampffähigkeiten mehrerer rumänischer Divisionen begannen."
 romania.19.a:0 "Ich denke, den Deutschen kann man vertrauen."
 romania.20.t:0 "Deutscher Lufteinsatz in Rumänien"
 romania.20.d:0 "Im Rahmen der deutschen Militärmission entsandte die Luftwaffe zunächst zwei Flugabwehrregimenter und eine Jagdfliegergruppe. Ihre Hauptziele waren:\n\nA. Die Organisation und Leitung der passiven und aktiven Luftverteidigung der Ölregion.\n\nB. Die Organisation der Bodenunterstützung für deutsche Einheiten, die von rumänischen Flugplätzen aus an Barbarossa teilnehmen sollten.\n\nC. Die Ausbildung und Reorganisation der rumänischen Luftwaffe entsprechend den deutschen Kriegserfahrungen.\n\nD. Die Übernahme des Kommandos über die Bodenunterstützungsformationen einer der rumänischen Luftregionen.\n\nE. Die Schaffung einer Atmosphäre der Freundschaft zwischen den beiden Luftwaffen, um eine künftige militärische Zusammenarbeit gegen die Sowjetunion vorzubereiten.\n\nDie Luftwaffenmission half bei der Vorbereitung einer Gruppe von Bf-109E-Jagdflugzeugen, einer Gruppe von He-111-Mittelstreckenbombern und der Flugabwehr in den Ölfeldern."
 romania.20.a:0 "Das könnte eines Tages nützlich sein."
 romania.21.t:0 "Reorganisierte rumänische Armee"
 romania.21.d:0 "Die katastrophale Lage des Landes hinterließ auch Spuren in der rumänischen Armee. Zahlreiche Stimmen erhoben sich gegen das feige Vorgehen der rumänischen Behörden bei Gebietsabtretungen, obwohl die Armee kampfbereit war. Generalleutnant Ion Antonescu (er war am 16. September 1940 befördert worden) erkannte, dass er schnell handeln musste. Er entließ umgehend 80 Vorgesetzte, die als inkompetent oder Angehörige des ehemaligen Regimes galten, und weitere 84 folgten bald darauf. Er leitete außerdem eine Reorganisation der Armee nach deutscher Militärdoktrin ein und verschärfte die Legionärspropaganda in der Armee zunehmend. Offizieren und Unteroffizieren wurde politisches Engagement untersagt. Die raschen Maßnahmen eines Militärs stoppten den Verfall der Moral und Organisation der Armee. Doch es musste noch mehr getan werden, um ihr Ansehen wiederherzustellen."
 romania.21.a:0 "Dies ist erst der Anfang."
 romania.22.t:0 "Odessa ist gefallen!"
 romania.22.d:0 "Am 27. Juli 1941 sandte Hitler einen Brief an General Antonescu, in dem er die rumänischen Truppen jenseits des Dnjestr um weitere Zusammenarbeit bat und den Rumänen die Verwaltung des Gebiets zwischen Dnjestr und Bug zusprach. Antonescu nahm den Auftrag am 31. Juli an. Tatsächlich hatte die rumänische Dritte Armee den Dnjestr bereits am 17. Juli überquert.\n\nDie Belagerung von Odessa war Teil des Operationsgebiets an der Ostfront und wurde hauptsächlich von rumänischen Streitkräften und Teilen der 11. Armee der deutschen Armee durchgeführt. Aufgrund des heftigen Widerstands der sowjetischen 9. Unabhängigen Armee und der rasch aufgestellten Separaten Küstenarmee, die aus der Küstengruppe der 9. Armee und den Streitkräften der Schwarzmeerflotte in Odessa bestand, benötigte die rumänische Armee 73 Tage Belagerung und vier Versuche, die Stadt einzunehmen, bei denen sie 93.000 Opfer zu beklagen hatte."
 romania.22.a:0 "Endlich!"
 romania.23.t:0 "IAR 80 Interceptor-Entwicklung"
 romania.23.d:0 "Die IAR 80 ist ein Tiefdecker-Eindecker-Kampfflugzeug in Ganzmetallkonstruktion. 1930 veröffentlichte die rumänische Regierung die Spezifikationen für ein neues Kampfflugzeug. Obwohl die Regierung keine Angebote aus der eigenen Flugzeugindustrie erwartete, produzierte die IAR als Reaktion auf die Ausschreibung mehrere Prototypen. \n\nKeines der anderen rumänischen Unternehmen beteiligte sich an einem Angebot, und da die Branche von Korruption geprägt war, verstaatlichte die Regierung die IAR, während die beiden anderen Unternehmen sich selbst überlassen blieben.\n\nDer Prototyp der IAR80 verfügt über ein offenes Cockpit und wird von einem 870 PS starken IAR K14-III C32-Motor angetrieben, einem lizenzierten Gnome-Rhône 14K II Mistral Major.\n\nDas Modell kann verbessert werden, wenn wir die Finanzierung des Projekts übernehmen."
 romania.23.a:0 "Die Luftwaffe wird in einem bevorstehenden Krieg eine entscheidende Rolle spielen. Bauen Sie sie auf!"
 romania.23.b:0 "Wir sollten unsere Bemühungen lieber auf andere Bereiche konzentrieren."
 romania.24.t:0 "Flug des ersten IAR 80-Prototyps"
 romania.24.d:0 "Der Prototyp der IAR 80 wurde langsam fertiggestellt und hob im April 1939 erstmals ab. Die Testflüge des Prototyps waren beeindruckend. Das Flugzeug erreichte in 4.000 m Höhe 510 km/h, eine Dienstgipfelhöhe von 11.000 m und konnte in 6 Minuten auf 5.000 m steigen, was für die damalige Zeit respektabel war, jedoch nicht mit den damaligen Jagdflugzeugen Supermarine Spitfire oder Messerschmitt Bf 109 mithalten konnte.\n\nDie IAR.80 erwies sich als äußerst wendig und war insgesamt ein Vergnügen zu fliegen. Die ARR war beeindruckt und bestellte am 18. Dezember 1939 100 der neuen Jagdflugzeuge, während Bestellungen für weitere deutsche He 112 über die ursprünglich 30 hinaus storniert wurden."
 romania.24.a:0 "Hoffen wir, dass sich die Investition lohnt."
 romania.25.t:0 "Polnisch-rumänisches Bündnis"
 romania.25.d:0 "Nachdem Rumänien und Polen bis zum Ende des Ersten Weltkriegs ihre Wünsche nach Einheit und Unabhängigkeit erfüllt hatten, waren sie daran interessiert, freundschaftliche Beziehungen und Zusammenarbeit aufzubauen, um ihre nationale Souveränität zu verteidigen. Die polnisch-rumänischen politischen Beziehungen wurden am 3. März 1921 durch einen Freundschafts- und Kooperationsvertrag ins Leben gerufen, in dem sich beide Länder verpflichteten, sich gegenseitig Hilfe zu leisten, falls eines der beiden Länder ohne Provokation an ihrer gemeinsamen Grenze im Osten angegriffen werden sollte.\n\nSollte einer der Vertragsstaaten angegriffen werden, ist gemäß den zwischen den beiden Staaten getroffenen Vereinbarungen der mitunterzeichnende Staat im Sinne eines casus foederis verpflichtet, ebenfalls unverzüglich eine Mobilmachung durchzuführen. Zwischen 1921 und 1931 fanden zahlreiche Treffen statt, um die konkreten Vorgehensweisen der polnisch-rumänischen Streitkräfte zur Abwehr eines Angriffs aus dem Osten festzulegen."
 romania.25.a:0 "Die Polen sind großartige Menschen."
 romania.26.t:0 "Wirtschaftsabkommen mit Deutschland"
 romania.26.d:0 "Nach Titulescus Absetzung war eine Verbesserung der Beziehungen zu Deutschland notwendig, da dessen Macht deutlich zunahm, während der französische Einfluss stetig schwand. Die pro-deutsche Politik der Verbündeten Polen und Jugoslawien war ein weiterer Grund für diese Neuorientierung. Die Wirtschaftsbeziehungen zu Deutschland waren für Rumänien von großem Vorteil. Deutschland bot einen Absatzmarkt für landwirtschaftliche Produkte, eine Quelle fortschrittlicher Technologien, die eine Modernisierung der Industrie ermöglichten, und einen alternativen Rüstungslieferanten. Das Wirtschaftsabkommen vom Dezember 1937, das zu einer Intensivierung des Handels führte, verdeutlichte die wichtige Rolle, die Deutschland in der rumänischen Wirtschaft eingenommen hatte."
 romania.26.a:0 "Das ist ein guter Schritt nach vorne."
 romania.26.b:0 "Wir sind nicht ihre Schachfigur."
 romania.27.t:0 "Deutschland übernimmt österreichische Unternehmen"
 romania.27.d:0 "Der Anschluss verlieh dem Reich die wirtschaftliche Vorherrschaft und eine strategische Position in Mittel- und Südosteuropa. Deutschland übernahm alle österreichischen Unternehmen in Rumänien. Die deutsche Wirtschaftsstrategie von 1934, der Schacht-Plan, der ein neues Währungskontrollsystem und bilaterale deutsche Wirtschaftsbeziehungen mit den Rohstoff produzierenden Ländern auf der Grundlage von Kompensationsvereinbarungen einführte, wurde bald durch einen Neuen Plan ersetzt, der das Konzept multilateraler Handelsabkommen vorsah und den Warenaustausch mit Ländern mit komplementären Volkswirtschaften ermöglichte. Der Vorteil für Rumänien bestand darin, dass der Neue Plan einen Markt für Exportprodukte zu höheren Preisen als auf dem Weltmarkt schaffen sollte. Rumänische Lebensmittel sollten gegen deutsche Industriegüter getauscht werden."
 romania.27.a:0 "Sie gewinnen in unserem Land immer mehr an Einfluss ..."
 romania.28.t:0 "Titulescu wurde entfernt"
 romania.28.d:0 "Im Juni 1936 reagierte Außenminister Nicolae Titulescu auf die Possen der italienischen Journalisten, als Kaiser Haile Selassie I. nach der Invasion und Besetzung Äthiopiens durch das faschistische Italien vor der Liga sprach. Er sprang auf und rief: „A la porte, les sauvages!“\n\nSpäter im Jahr 1936 entließ König Carol II. Titulescu unter dem Druck der nationalsozialistischen Parteien aus allen offiziellen Ämtern und forderte ihn auf, das Land zu verlassen.\nEr ließ sich zunächst in der Schweiz nieder und zog später nach Frankreich.\n\nIm Exil propagierte Nicolae Titulescu weiterhin auf Konferenzen und in Zeitungsartikeln die Idee der Bewahrung des Friedens, da er die Gefahr eines Krieges erkannte, der nur allzu bald ausbrechen würde. Im November 1937 kehrte er nach Rumänien zurück, teilweise dank der Bemühungen von Iuliu Maniu."
 romania.28.b:0 "Das ist schrecklich!"
 romania.28.a:0 "Das dürfen wir nicht zulassen!"
 romania.29.t:0 "Octavian Goga bildet eine Regierung"
 romania.29.d:0 "Nach den Wahlen nutzte König Carol II. den Vorwand, dass keine Partei eine Mehrheit von 40 % erreichen konnte, und nominierte Octavian Goga, den Vorsitzenden der Nationalchristlichen Partei, zum Premierminister. Er beauftragte ihn mit der Regierungsbildung, obwohl seine Partei weniger als 10 % der Stimmen erhielt. Dies war nur der erste Schritt zur königlichen Diktatur.\n\nDabei versetzte der König der PNT und ihrem Vorsitzenden Iuliu Maniu mehrere Schläge. Die PNT sollte aus der Nachfolge entfernt werden, obwohl sie doppelt so viele Stimmen wie die PNC erhielt; Regierungschef sollte ein alter, entschlossener politischer Gegner Manius werden; und mehrere Schlüsselfiguren der PNT sollten auf die Seite des Königs gelockt werden, darunter der neu ernannte Innenminister Armand Calinescu."
 romania.29.a:0 "Rumänien verfällt."
 romania.30.t:0 "Das Regime der persönlichen Autorität von Carol II."
 romania.30.d:0 "Anfang 1938 kam es zum Aufstieg der Eisernen Garde, die das herrschende Regime heftig angriff, um Rumäniens Außenpolitik in Richtung der Achse Berlin-Rom zu lenken. Ministerpräsident Goga wollte zudem die Wahlen im März 1938 gewinnen und handelte daher ein Geheimabkommen mit Corneliu Codreanu aus. Die demokratischen Kräfte waren verwirrt und unübersichtlich, was es Karl II. ermöglichte, entschlossen einzugreifen und sein politisches Ziel zu erreichen. Mit dem Putsch vom 10. Februar 1938 entließ Karl Goga aus dem Ministerrat und leitete die Bildung einer Regierung unter Patriarch Miron Cristea ein. Die Verfassung von 1923 wurde außer Kraft gesetzt, und in aller Eile wurde ein neues Grundgesetz ausgearbeitet und am 27. Februar 1938 verkündet, das dem König weitreichende exekutive und legislative Machtbefugnisse einräumte. Mit diesen Maßnahmen sicherte die Monarchie ihre Vorherrschaft über die politische Szene des Landes und unterwarf die staatlichen Institutionen dem Willen Karls II."
 romania.30.a:0 "Das kann nicht gut sein."
 romania.31.t:0 "Unterdrückung des Legionärs"
 romania.31.d:0 "Die Eiserne Garde nutzte das unsichere innenpolitische Klima sowie die günstige internationale Unterstützung Deutschlands und Italiens und erhöhte durch großangelegte öffentliche Kundgebungen ihren Druck auf die rumänischen Behörden.\n\nDarüber hinaus wurde König Karl II. am 24. November 1938 während eines offiziellen Besuchs in Berlin von Hitler unverblümt auf die sofortige Freilassung von Corneliu Zelea Codreanu, dem Anführer der Eisernen Garde, aus dem Gefängnis und die Ausrichtung Rumäniens auf die internationale Politik der Achsenmächte angesprochen.\n\nDer König empfand die Legionärsbewegung als Bedrohung – mehr denn je zuvor. In der Nacht vom 29. auf den 30. November 1938 wurden Codreanu und 13 weitere Personen bei einem angeblichen Fluchtversuch aus dem Gefängnis getötet. Die Behörden leiteten eine systematische Kampagne zur Auflösung der Legion ein."
 romania.31.a:0 "Ihr Radikalismus ist eine Bedrohung."
 romania.32.t:0 "Sturmwolken ziehen auf"
 romania.32.d:0 "Mit ihrer neuen außenpolitischen Ausrichtung auf Deutschland hegten rumänische Politiker die Illusion, Rumänien könne sich Berlins Unterstützung bei der Verteidigung der territorialen Integrität des Landes sichern. Solche Hoffnungen erwiesen sich bald nicht nur als illusorisch, sondern auch als gefährlich für die Zukunft des Landes. Die Antwort der deutschen Regierung, die Botschafter W. Fabricius am 2. Juni 1940 überreichte, bedeutete für die rumänischen Regierungskreise eine herbe Enttäuschung. Sie zeigte deutlich, dass Nazi-Deutschland kein Interesse an der Aufrechterhaltung des territorialen Status quo Rumäniens hatte und nicht bereit war, diesbezüglich Verpflichtungen einzugehen. Jede enge „freundschaftliche Zusammenarbeit“ mit Rumänien war an dessen Bereitschaft geknüpft, sich für eine endgültige Regelung des Balkankonflikts einzusetzen. Die Frage, ob und inwieweit die rumänische Regierung bereit war, über eine Grenzrevision ihrer Nachbarn zu verhandeln, wurde nun vom Reich offen angesprochen."
 romania.32.a:0 "Wir haben die Kontrolle über unser eigenes Land verloren."
 romania.33.t:0 "Armand Calinescu zum Premierminister ernannt"
 romania.33.d:0 "Am 6. März 1939 verstarb der amtierende Premierminister Patriarch Miron Cristea und Armand Calinescu wurde zum neuen Vorsitzenden des Ministerrats ernannt.\n\nAls Ökonom und Politiker war Calinescu zunächst einer der führenden Politiker des zentralen Flügels der Nationalen Bauernpartei, bevor er im Dezember 1938 Gründungsmitglied der königlichen Partei FRN wurde.\n\nNachdem er Ämter als Gesundheits-, Bildungs- und Heimatschutzminister innegehabt hatte, wurde er am 7. März 1939 von König Carol II. mit der Regierungsbildung beauftragt. Calinescu setzte die traditionelle rumänische Politik enger Beziehungen zu Frankreich und Großbritannien fort und war derjenige, der der polnischen Regierung, Armee und Flüchtlingen erlaubte, auf rumänischem Boden Zuflucht zu suchen – sehr gegen den Protest Deutschlands."
 romania.33.a:0 "Er ist unsere beste Wahl."
 romania.34.t:0 "Warschauer Wasserfälle, Rumänien isoliert"
 romania.34.d:0 "Die Besetzung Polens führte zum Zerfall des rumänischen Bündnissystems und führte zu einer weiteren Isolierung Rumäniens auf der internationalen Bühne. Obwohl Rumänien am 7. September seine Neutralität in dem Konflikt erklärte, erlaubte es die Durchfahrt von Kriegsmaterial zur Stärkung der polnischen Stellungen. Am 13. September erhielt auch das polnische Finanzministerium die Genehmigung für die Durchreise rumänischen Bodens in Richtung Frankreich, die auf rund 45 Millionen Dollar geschätzt wurde. Zusammen mit dem Finanzministerium suchten rund 50.000 Polen Zuflucht in Rumänien, um ihr Leben zu retten und den Kampf zur Verteidigung des Heimatlandes wieder aufzunehmen. Am 17. September suchte auch die polnische Regierung Zuflucht in Rumänien. Die Polen erkannten die Sinnlosigkeit der Verteidigungsbündnisklausel und entbanden Rumänien von der Verpflichtung, der Sowjetunion, die bereits tief in polnisches Gebiet vorgedrungen war, den Krieg zu erklären."
 romania.34.a:0 "Sie haben unsere Würde verteidigt ..."
 romania.35.t:0 "Kleine Entente"
 romania.35.d:0 "Die Kleine Entente war ein Bündnis, das 1920 und 1921 von der Tschechoslowakei, Rumänien und Jugoslawien mit dem Ziel gegründet wurde, sich gemeinsam gegen den ungarischen Irredentismus zu verteidigen und eine habsburgische Restauration zu verhindern. Frankreich unterstützte das Bündnis, indem es mit jedem Mitgliedsland Verträge unterzeichnete. Darin wurde festgelegt, dass sich die anderen Parteien im Falle eines unprovozierten Angriffs Ungarns auf einen bestimmten Vertragspartner gegenseitig Hilfe leisten sollten. Die Verträge regelten den gegenseitigen Beistand zusätzlich durch ein spezielles Militärabkommen, das unterzeichnet werden sollte. Bis zum Inkrafttreten eines solchen Abkommens sollten Übergangsmaßnahmen ergriffen werden. Die Mitgliedsländer der Kleinen Entente verpflichteten sich zudem zu einer außenpolitischen Zusammenarbeit gegenüber Ungarn sowie zu einem intensiven Wirtschaftsaustausch zwischen den Mitgliedern."
 romania.35.a:0 "Der Feind meines Feindes ist mein Freund."
 romania.36.t:0 "Die kleine Entente bricht auseinander"
 romania.36.d:0 "1938 brach die tschechoslowakische Krise aus. Da klar war, dass Großbritannien und Frankreich viel zu schwach reagierten und die Tschechoslowakei keine nennenswerte militärische Unterstützung erhalten würde, zögerte auch Rumänien, seinem Verbündeten Hilfe zu gewähren, um einen möglichen Krieg mit Deutschland zu vermeiden. Als Mitglieder der Kleinen Entente waren Rumänien und Jugoslawien gezwungen, der Tschechoslowakei im Falle eines ungarischen Angriffs militärische Unterstützung anzubieten, nicht jedoch im Falle eines deutschen. Das Münchner Abkommen vom 30. September 1938 bestärkte Rumänien erneut in der Annahme, nicht auf westliche Unterstützung zu zählen, und überzeugte es von der Notwendigkeit, die Neutralität zwischen den Großmächten zu wahren. Darüber hinaus stärkte das Münchner Abkommen den wirtschaftlichen Einfluss Deutschlands auf die Länder Mittel- und Südosteuropas. In Rumänien übernahm Deutschland alle tschechoslowakischen Investitionen und wurde zum wichtigsten Rüstungslieferanten."
 romania.36.a:0 "Wir müssen dem Druck standhalten."
 romania.36.b:0 "Es stehen uns schlimme Zeiten bevor."
 romania.37.t:0 "Letztes Treffen des „Balkanpakts“"
 romania.37.d:0 "Nach dem Scheitern der Initiative der „Neutralen Länder“ konzentrierte sich Rumänien auf Anraten seiner westlichen Verbündeten auf die Stärkung des Balkanpakts. Vom 2. bis 4. Februar 1940 trafen sich Rumänien und die Partner der Balkan-Entente in Belgrad zur achten Sondersitzung, um die Beziehungen zwischen den Mitgliedsstaaten zu vertiefen und zu koordinieren. Da die rumänische Regierung die zunehmende Gefahr für das Land spürte, bat sie die alliierten Regierungen um ihre Bereitschaft, im Falle einer Aggression gegen ihr Territorium militärische Unterstützung zu leisten. Die Reaktion war enttäuschend, da die Balkan-Verbündeten Rumänien rieten, sich im Interesse des Friedens zu opfern. Später im selben Jahr, als der Pakt sein Ziel nicht erreichte, gab Rumänien schließlich seine Mitgliedschaft auf."
 romania.37.a:0 "Es bricht uns das Herz, aber wir müssen gehen."
 romania.37.b:0 "Geben wir ihnen eine Chance, auch wenn sie uns nicht helfen werden."
 romania.37.c:0 "Wir machen es auf unsere Art! Schlagen Sie die Gründung einer Balkan-Entente vor!"
 romania.38.t:0 "Der Konflikt steht unmittelbar bevor"
 romania.38.d:0 "Was auch immer geschieht, der Führer ist überzeugt, dass Antonescu der einzige Mann ist, der Rumäniens Schicksal lenken kann. Dieser entscheidende Schritt, der sich während Antonescus Staatsbesuch in Deutschland offenbarte, gab ihm freie Hand bei der Beurteilung seiner zukünftigen Zusammenarbeit mit der Eisernen Garde. Nach seiner Rückkehr nahm Antonescu eine unnachgiebige Haltung gegenüber der Legion ein: Am 18. Januar 1941 löste er die von der Garde kontrollierten „Romanisierungskommissionen“ auf und ersetzte alle Präfekten der Legionäre. Darüber hinaus entließ er nach der gescheiterten Untersuchung der Ermordung eines deutschen Offiziers durch einen britischen Agenten den Innenminister der Legionäre, Constantin Petrovicescu, der sich weigerte, sein Mandat niederzulegen. Diese drastischen Maßnahmen gefährdeten seine Beziehungen zu den Legionären ernsthaft."
 romania.38.a:0 "Verdammte Legionäre..."
 romania.39.t:0 "Tatarescu erneut zum Premierminister ernannt"
 romania.39.d:0 "Als sich der Konflikt zwischen den Achsenmächten und den Alliierten verschärfte, berief König Carol II. Gheorghe Tatarescu, der am 9. Dezember 1938 zum rumänischen Botschafter in Paris ernannt worden war, zurück und beauftragte ihn mit der Bildung einer politisch starken Regierung.\n\nZwei Monate nach der Ermordung Armand Calinescus (21. September 1939) und nach der Ernennung zweier provisorischer Ministerpräsidenten (Argeseanu und Argetoianu) wurde Gheorghe Tatarescu am 24. November 1939 zum Präsidenten des Ministerrats ernannt. Auf seinen Schultern sollte er das schwere Kreuz tragen, das Rumänien in den kommenden schwierigen Zeiten zu tragen hatte."
 romania.39.a:0 "Zumindest wissen wir, dass er vertrauenswürdig ist."
 romania.40.t:0 "Initiative „Die neutralen Länder“ scheitert"
 romania.40.d:0 "Die Kapitulation Polens veranlasste die rumänische Diplomatie, nach Wegen zu suchen, um den gefährdeten Status ihrer Grenzen zu stärken. In dieser Zwickmühle konzentrierte Rumänien am 28. September 1939 seine Bemühungen auf die Entwicklung einer gemeinsamen Verteidigungsstrategie der Balkanpakt-Staaten, die schließlich durch die Zusammenarbeit mit Ungarn, Bulgarien und Italien verstärkt wurde. Obwohl die Initiative der neutralen Länder zunächst von allen Balkanpakt-Mitgliedsstaaten sowie von Großbritannien und Frankreich unterstützt wurde, scheiterte sie vor allem an Rivalitäten und Territorialstreitigkeiten zwischen den Ländern Südosteuropas."
 romania.40.a:0 "Wir ... sind nicht länger souverän."
 romania.40.b:0 "Wir sollten unseren Verpflichtungen nachkommen."
 romania.42.t:0 "Den neutralen Status aufgeben"
 romania.42.d:0 "Am 27. Mai 1940 wurde in Bukarest ein endgültiges Ölabkommen zwischen Rumänien und Deutschland unterzeichnet, auch bekannt als Waffen-Öl-Pakt. Die Bestimmungen sahen vor, dass Ölexporte vorrangig an das Dritte Reich gehen sollten, im Austausch gegen Waffen und Kriegsgerät. Am nächsten Tag informierte Ministerpräsident Tatarescu den deutschen Vertreter Wilhelm Fabricius, dass Rumänien künftig „eine Ausweitung der freundschaftlichen Zusammenarbeit“ mit dem Nazi-Reich anstrebe. \n\nSo wurde am 28. Mai 1940 während einer längeren Audienz, die König Karl II. den wichtigsten Mitgliedern des Ministerrats gewährte, die Abkehr von der früheren Außenorientierung Rumäniens zugunsten einer Politik der „Anpassung an die Realität“ diskutiert und empfohlen, die sich vor allem an Deutschland orientierte. Die Diskussionen vom 28. Mai 1940 führten praktisch zum dauerhaften Verlust der Neutralität Rumäniens."
 romania.42.a:0 "Unser Weg führt nun zum Reich."
 romania.42.b:0 "Wir sollten warten."
 romania.43.t:0 "Gewitterwolken ziehen auf"
 romania.43.d:0 "Mit ihrer neuen außenpolitischen Ausrichtung auf Deutschland hegten rumänische Politiker die Illusion, Rumänien könne sich Berlins Unterstützung bei der Verteidigung der territorialen Integrität des Landes sichern. Solche Hoffnungen sollten sich jedoch bald als illusorisch und gefährlich für die Zukunft des Landes erweisen. Die Antwort der deutschen Regierung, die Botschafter W. Fabricius am 2. Juni 1940 überreichte, bedeutete für die rumänischen Regierungskreise eine herbe Enttäuschung. Sie zeigte deutlich, dass Nazi-Deutschland kein Interesse an der Aufrechterhaltung des territorialen Status quo Rumäniens hatte und nicht bereit war, diesbezüglich Verpflichtungen einzugehen. Jede enge freundschaftliche Zusammenarbeit mit Rumänien war an dessen Bereitschaft geknüpft, „auf eine endgültige Regelung des Balkanraums hinzuwirken“. Die Frage, „ob und inwieweit die rumänische Regierung bereit ist, über eine Grenzrevision ihrer Nachbarn zu verhandeln“, wurde nun vom Reich offen angesprochen."
 romania.43.a:0 "Wir verstärken unsere Bemühungen, unsere Loyalität zu beweisen."
 romania.43.b:0 "Wir sind niemandes Sklaven."
 romania.44.t:0 "Rumänisch-ungarische Verhandlungen scheitern"
 romania.44.d:0 "Unter starkem politischen Druck der Achsenmächte und angesichts der deutschen und ungarischen Truppen, die sich zum Eingreifen nahe der rumänischen Grenze versammelten, begannen in der Stadt Turnu Severin rumänisch-ungarische Verhandlungen. Die ungarische Presse jubelte: „Wir alle wissen jetzt, dass das Stephans-Ungarn diesen Tag wiederauferstehen wird!“ Die ungarische Delegation legte ein Memorandum vor, in dem sie ein Gebiet von 69.000 Quadratkilometern mit 3,9 Millionen Einwohnern (zwei Millionen Rumänen, 1,2 Millionen Ungarn und 0,7 Millionen anderer Staatsangehörigkeit) beanspruchte. Der rumänische Gegenpart lehnte alle Ansprüche auf Gebietsabtretungen entschieden ab und äußerte lediglich seine Bereitschaft zu einem Bevölkerungsaustausch, damit „kein Rumäne unter ungarische Herrschaft gerate“. Da alle Forderungen während der drei Verhandlungsrunden am 16., 19. und 24. August zurückgewiesen wurden, wurden die Gespräche unterbrochen und nie wieder aufgenommen."
 romania.44.a:0 "Rumänischer Boden ist kein Verhandlungsobjekt."
 romania.45.t:0 "Tage der Nationalen Trauer"
 romania.45.d:0 "Am Abend des 26. Juni 1940 um 22:00 Uhr übergab VM Molotow Davidescu, dem rumänischen Botschafter in Moskau, ein Ultimatum, in dem er die Rückgabe Bessarabiens an die Sowjetunion um jeden Preis und die Übergabe des nördlichen Teils der Bukowina forderte. Er erklärte, dass es ohne eine zufriedenstellende Antwort am nächsten Abend zu einem sowjetischen Angriff kommen würde.\n\nDa die rumänischen Behörden versuchten, mehr Zeit zu gewinnen, übergab Molotow Davidescu am 28. Juni um 02:25 Uhr ein neues Ultimatum und forderte die vollständige Räumung der Gebiete Bessarabiens und der Bukowina innerhalb von vier Tagen. Eine Stunde vor Ablauf der Frist antwortete Rumänien, dass es „zur Vermeidung der schwerwiegenden Folgen, die sich aus der Anwendung von Gewalt und dem Beginn von Feindseligkeiten in diesem Teil Europas ergeben könnten, gezwungen sei, die Räumungsbedingungen zu akzeptieren“. Es folgten Tage der Staatstrauer im Alten Reich. Die Menschen knieten auf den Straßen und beteten für ihre Brüder auf der anderen Seite des Pruth."
 romania.45.a:0 "Möge Gott diese böse Tat rächen!"
 romania.46.t:0 "Verheerendes Erdbeben in Rumänien"
 romania.46.d:0 "Das Erdbeben der Stärke 7,4 ereignete sich am 10. November 1940 um 3:39 Uhr und war das erste große Erdbeben in der modernen rumänischen Geschichte. Seine Auswirkungen waren in Zentral- und Südmoldau sowie im Alten Reich verheerend. Die Zahl der Opfer wurde auf 1.000 Tote und 4.000 Verletzte geschätzt, die meisten davon in Moldawien. Auch die materiellen Verluste waren hoch: Mehrere Städte wurden schwer getroffen und die Stadt Panciu fast vollständig zerstört. Aufgrund der Umstände, in denen sich die Katastrophe ereignete, wurde die genaue Zahl der Opfer nie veröffentlicht, und die Angaben wurden während des Krieges zensiert."
 romania.46.a:0 "Ich werde die Rettungsmaßnahmen persönlich überwachen."
 romania.47.t:0 "Rumänische Luftfahrtindustrie - IAR"
 romania.47.d:0 "Um sicherzustellen, dass die rumänische Luftwaffe unter allen Umständen, auch im Krieg, kontinuierlich mit Flugzeugen versorgt werden konnte, subventionierte die rumänische Regierung in den Jahren 1920–1930 den Aufbau der notwendigen Infrastruktur für den Flugzeugbau.\n\nDie Rumänische Luftfahrtindustrie wurde am 1. November 1925 gegründet. Die Anteile waren zunächst aufgeteilt zwischen den Unternehmen Blériot-Spad und Lorraine-Dietrich, dem Werk Astra Arad, das Ausrüstung und geschultes Personal lieferte, und dem rumänischen Staat, der das Grundstück für den Fabrikbau in der Nähe eines Flugplatzes und eine beträchtliche Summe Geld zur Verfügung stellte.\n\nIm Laufe von anderthalb Jahrzehnten kauften die rumänischen Staatswerke die französischen Anteile, sodass das Unternehmen am 1. September 1938 vollständig in rumänischen Besitz überging. Die bekanntesten von der IAR produzierten Flugzeugserien waren die Kampfflugzeuge IAR 80 und IAR 81, die in ihrer Klasse wohlverdientes Prestige erlangten."
 romania.47.a:0 "Gut! Wir heben ab!"
 romania.48.t:0 "Ilva Mica-Vatra Dornei-Eisenbahn"
 romania.48.d:0 "Die Bahn verbindet zwei strategisch wichtige Regionen des Landes und stellt eine ideale Abkürzung durch die Karpaten zwischen Nordsiebenbürgen und der Bukowina dar.\n\nDer Abschnitt von Ilva Mică nach Lunca Ilvei wurde gerade fertiggestellt.\nEr war technisch weniger anspruchsvoll und wurde teilweise zu Beginn des 20. Jahrhunderts auf einer schmalen Eisenbahnstrecke gebaut.\n\nAuf dem Abschnitt von Lunca Ilvei nach Floreni wurden neun Tunnel mit einer Gesamtlänge von 2,38 km und 191 Brücken mit einer Gesamtlänge von 1,51 km gebaut. Heute ist die Strecke bereit zur Eröffnung."
 romania.48.a:0 "Nach vorne!"
 romania.49.t:0 "Heeresgruppe Rumänien"
 romania.49.d:0 "Um Hitlers Gunst zu gewinnen, stellten die Rumänen das größte nichtdeutsche Kontingent für Barbarossa und waren ein wichtiger Teil der Heeresgruppe Süd in der Ukraine.\n\nDie Rumänen wurden auch für Aktionen hinter der Front und die Einschließung von Städten wie Odessa eingesetzt, die von den vorrückenden Panzern umgangen wurden.\n\nDie rumänischen Truppen griffen entlang der gesamten Frontlinie an und eroberten in diesem Monat die Wasserreservoirs von Odessa. Die sowjetischen Streitkräfte leisteten hartnäckigen Widerstand und starteten wiederholte Gegenangriffe, die schwere Verluste verursachten und erlitten.\n\nDie königlich rumänische Luftwaffe unterstützte die Bodentruppen aktiv, störte den sowjetischen Schiffsverkehr von und nach Odessa und zerstörte auch einen Panzerzug.\n\nDie Präsenz rumänischer Truppen in Odessa folgte der Gründung des Gouvernements Transnistrien."
 romania.49.a:0 "Lasst uns nicht noch einmal so stark drängen."
 romania.49.b:0 "Der Feind ist schwach, setzen Sie die Offensive fort!"
 romania.50.t:0 "Rumänien schließt sich Barbarossa an"
 romania.50.d:0 "Soldaten,\n\nVom ersten Tag meiner neuen Herrschaft und meines nationalen Kampfes an habe ich geschworen, euch zum Sieg zu führen. Den unehrenhaften Makel aus dem Buch der Nation zu tilgen und den Schatten der Demütigung von euren Stirnen und Schulterstücken. Jetzt ist die Zeit des heiligsten Kampfes, des Kampfes um die Rechte unserer Vorfahren und der Kirche. Der Kampf um die rumänischen Stätten und Altäre aller Zeiten.\n\nSoldaten, ich befehle euch: Überquert den Pruth!\n\nVernichtet den Feind aus Osten und Norden. Werft das rote Joch des Bolschewismus von unseren überrannten Brüdern. Bringt dem Land die alte bassarabische Heimat und die Wälder der Bukowina, eure Felder und Reiche zurück.\n\nMarschall Ion Antonescu, 22. Juni 1941."
 romania.50.a:0 "Zu den Waffen, Soldaten!"
 romania.50.b:0 "Für die Heimat!"
 romania.51.t:0 "Bukarest kauft tschechoslowakische Panzer"
 romania.51.d:0 "Im Rahmen eines militärischen Modernisierungsprogramms wurden im August 1936 126 Škoda LT vz.35-Panzer aus der Tschechoslowakei bestellt. Die ersten 15 Panzer trafen am 1. Mai 1937 ein, doch es traten technische Probleme mit den Motoren auf, die mit dem lokalen Klima und dem Treibstoff nicht vereinbar waren. Daher wurden die Panzer zurückgeschickt und gemäß den rumänischen Anforderungen umgebaut.\n\nAlle 126 Panzer (in Rumänien R-2 genannt) gingen bis 1939 ein, doch eine weitere Bestellung über 382 Panzer, die Mitte 1939 einging, wurde von den Deutschen abgelehnt. Die R2-Panzer bildeten zu Beginn des Unternehmens Barbarossa das Rückgrat der rumänischen Panzerkriegsführung."
 romania.51.a:0 "Bestellen Sie 126!"
 romania.51.b:0 "Wir kommen auch ohne klar!"
 romania.52.t:0 "Erster IAR 80 Abfangjägerflügel"
 romania.52.d:0 "Nachdem die ersten Bestellungen der AAR fest vorlagen, sollte die Produktion des IAR.80 umgehend beginnen, doch seine Bewaffnung erwies sich als ernstes Problem. Der Prototyp war lediglich mit zwei belgischen 7,92-mm-Maschinengewehren der Fabrique Nationale ausgestattet, einer lizenzierten Modifikation des Browning-Kalibers 30. Diese Bewaffnung war eindeutig nicht schwer genug für den Kampfeinsatz, und das Serienmodell sollte mit sechs dieser Geschütze ausgestattet werden.\n\nDer deutsche Einmarsch in Belgien und die Niederlande im Jahr 1940 beendete die Lieferung der FN-Geschütze, und es gab kein einheimisches Maschinengewehr, das für den Einsatz in Flugzeugen geeignet war. Erst als Rumänien im November 1940 den Achsenmächten beitrat, erlaubten die Deutschen schließlich die Wiederaufnahme der Lieferung der Geschütze. Infolgedessen lief das erste Serienmodell des IAR.80 erst im Januar 1941 vom Band, obwohl die erste Charge von 20 Stück bereits Mitte Februar ausgeliefert worden war."
 romania.52.a:0 "Setzen Sie sie ein."
 romania.53.t:0 "Erga Omnes-Allianz abgelehnt"
 romania.53.d:0 "1936 nahm die tschechische Diplomatie Gespräche mit ihren Partnern auf, um die Kleine Entente in ein Bündnis erga omnes (gegenüber allen) umzuwandeln. Dies hätte bedeutet, dass Rumänien im Falle eines deutschen Angriffs verpflichtet gewesen wäre, die Tschechoslowakei zu unterstützen. Ein Vertrag mit Frankreich hätte den Pakt gefestigt. Rumänien lehnte dies ab. Diese Haltung führte zu einer Spaltung der Kleinen Entente. Die rumänische Ablehnung lag auch daran, dass der Vertrag der UdSSR das Recht eingeräumt hätte, ihr Territorium zu durchqueren, um der Tschechoslowakei zu helfen. Aus demselben Grund lehnte Rumänien den Abschluss des Beistandspakts mit Frankreich ab. Der Pakt hätte Frankreich bzw. seinem Verbündeten, der Sowjetunion, die Nutzung rumänischer Luftwaffenstützpunkte gestattet."
 romania.53.a:0 "Rumänien sagt NEIN!"
 romania.54.t:0 "Wahlnichtangriffspakt"
 romania.54.d:0 "Zwischen den Führern der Nationalen Bauernpartei und der Eisernen Garde wurde ein Wahlnichtangriffspakt geschlossen.\nAuch die von George Bratianu geführte Nationalliberale Gruppe und die von Constantin Argetoianu geführte Agrarunion werden sich diesem Pakt anschließen.\n\nDie Rumänische Kommunistische Partei verurteilt zwar den Wahlnichtangriffspakt, unterstützt aber auf lokaler Ebene die Nationalen Bauern.\n\nDie Wahl würde den gefährlichen Popularitätsanstieg der rechtsextremen Bewegung und der politischen Partei „Alles für das Vaterland“ – der offizielle Name der Eisernen Garde nach 1935 – deutlich machen."
 romania.54.a:0 "Die Rolle der Garde scheint mit jedem Tag größer zu werden."
 romania.54.b:0 "Politiker...\nSie würden alles tun, um an die Macht zu kommen!"
 romania.55.t:0 "Straja Tarii – „Country Watch“"
 romania.55.d:0 "Die Country Watch war eine Jugendorganisation unter der Schirmherrschaft von König Karl II. Sie wurde durch ein Gesetzesdekret vom 15. Dezember 1938 gegründet, das die Mitgliedschaft aller Jungen zwischen 7 und 18 Jahren und aller Mädchen zwischen 7 und 21 Jahren in der Straja Tarii vorschrieb. Diese paramilitärische, obligatorische und politisch instrumentalisierte Propagandaorganisation sollte auch dem wachsenden Einfluss der Legionärsbewegung unter der rumänischen Jugend entgegenwirken. Nicht zufällig ähnelte die „Straja Tarii“ in Organisation, Disziplin und Symbolik stark der Eisernen Garde. Ihr Motto lautete „Glaube und Arbeit für Vaterland und König“."
 romania.55.a:0 "Für König und Vaterland!"
 romania.56.t:0 "Armand Calinescu ermordet!"
 romania.56.d:0 "Schreckliche Nachrichten erreichten heute den Königspalast.\nPremierminister Calinescu wurde auf dem Heimweg ermordet. Erste Berichte zeigen, dass sein Auto von einem anderen blockiert wurde und sein Körper von 20 Kugeln durchbohrt wurde.\n\nSeine Mörder sind Mitglieder der ehemaligen Eisernen Garde und behaupten, sie hätten den Tod ihres Anführers Corneliu Codreanu gerächt."
 romania.56.a:0 "Machen Sie an seinen Mördern ein Exempel!"
 romania.56.b:0 "Werft sie lebenslang ins Gefängnis!"
 romania.57.t:0 "Pro-deutsche Regierung"
 romania.57.d:0 "Beunruhigt über den Verlauf der neuen Ereignisse bestellte König Karl II. am 30. Juni 1940 den deutschen Botschafter in den Königspalast ein, um ihm persönlich seine Entscheidung mitzuteilen, eine Politik der engen Zusammenarbeit mit Deutschland auf allen Gebieten zu verfolgen, und den Führer zu bitten, die Entsendung einer deutschen Militärmission nach Rumänien in Erwägung zu ziehen. Die deutsche Regierung reagierte erneut mit der Gegenleistung für die Erfüllung territorialer Ansprüche, diesmal gegenüber Ungarn und Bulgarien. Um diesen Forderungen nachzukommen, wurde am 4. Juli eine neue Regierung unter Führung von Ion Gigurtu gebildet, die umgehend eine „aufrichtige politische Integration in das von der Achse Berlin-Rom geschaffene System“ anstrebte. Wie König Karl II. bereits andeutete, informierte der neue Außenminister Michael Manoilescu den deutschen Botschafter Fabricius am 6. Juli 1940 über die Zusage der rumänischen Regierung, die empfohlenen Gespräche mit Horthys ungarischer Regierung aufzunehmen."
 romania.57.a:0 "Deutschland kann sich jetzt freuen."
 romania.58.t:0 "Rumänischer Nationallegionärsstaat"
 romania.58.d:0 "Rumäniens durch den Zweiten Wiener Schiedsspruch erzwungene territoriale Zugeständnisse von fast einem Drittel seines Territoriums und seiner Bevölkerung markierten den Niedergang des Karolingerregimes. Unter dem Einfluss der Legionärsagitatoren wurden die Protestdemonstrationen gegen den Wiener Schiedsspruch antikarolingisch, und so beauftragte Karl II. am 4. September 1940 General Antonescu mit der Bildung einer neuen Regierung.\n\nDa die Führer der traditionellen Parteien sich weigerten, an einer diktatorischen, fremdenfeindlichen (ausländerfeindlichen) und deutschfreundlichen Regierung teilzunehmen, bat Antonescu den König um die Vollmacht, die Verfassung außer Kraft zu setzen und das Parlament aufzulösen. Noch am selben Abend forderte er den König auf, abzudanken und das Land zu verlassen. Am 14. September 1940 entstand der Rumänische Nationale Legionsstaat. Horia Sima, der Chef der Legionärsbewegung, wurde zum Vizepräsidenten des Ministerrats ernannt und gilt als Schöpfer und Seele dieser Regierung."
 romania.58.a:0 "Wir gehen mit der Welle."
 romania.59.t:0 "Antonescus Notfallmaßnahmen"
 romania.59.d:0 "Schwere Zeiten erfordern entschlossene Maßnahmen und entschlossene Männer, die diese umsetzen. Unsere Industrie ist geschwächt, da uns lebenswichtige Ressourcen genommen wurden. Die Moral unserer Armee leidet, da viele die Entschlossenheit der rumänischen Führung angesichts der jüngsten Ereignisse in Frage stellen. Der Verlust von 99.738 km² unseres Territoriums und 6.821.000 Einwohnern beeinträchtigt auch die Truppenstärke.\n\nDarüber hinaus sind unsere Infrastruktur und Transportkapazitäten durch den Verlust unserer Städte in Bessarabien und Siebenbürgen stark eingeschränkt. Es muss schnell etwas getan werden, aber wir können aufgrund von Engpässen aller Art immer nur ein Problem gleichzeitig angehen. Wir können versuchen, unsere Industrie wiederzubeleben, unsere Infrastruktur zu modernisieren und die Truppenstärke unseres Militärs zu verbessern.\n\nWelche Prioritäten sollten wir setzen?"
 romania.59.a:0 "Fahren Sie mit der Modernisierung der Infrastruktur fort."
 romania.59.b:0 "Die Landwirtschaft sollte unser Hauptanliegen sein."
 romania.59.c:0 "Rüsten Sie unsere Industrie für den Kriegsbau um."
 romania.59.e:0 "Rüsten Sie unsere Industrie für die Kriegsproduktion um."
 romania.60.t:0 "Vergeltung der Eisernen Garde"
 romania.60.d:0 "Kurz nach der Amtseinführung von General Constantin Petrovicescu als neuem Innenminister wurde eine Hilfspolizei namens „Legionärspolizei“ gegründet, um die Politik der Legionäre voranzutreiben. Die Zusammenarbeit zwischen Antonescus Militärregierung und Horia Simas Eiserner Garde war zudem von Feindseligkeit geprägt: Unter dem Vorwand rumänischer Wirtschaftsinteressen leiteten die Legionäre die Verstaatlichung mehrerer Fabriken ein. Sie gründeten außerdem eigene Organisationen, die parallel zu den offiziellen operierten und es ihnen ermöglichten, Racheakte gegen ehemalige politische Gegner auszulösen und aggressive Propaganda in allen politischen, sozialen und kulturellen Kreisen zu betreiben."
 romania.60.a:0 "Behalte sie im Auge"
 romania.61.t:0 "Antonescu schlägt zurück"
 romania.61.d:0 "Was auch immer geschieht, der Führer ist überzeugt, dass Antonescu der einzige Mann ist, der Rumäniens Schicksal lenken kann. Dieser entscheidende Schritt, der sich während Antonescus Staatsbesuch in Deutschland offenbarte, gab ihm freie Hand bei der Beurteilung seiner zukünftigen Zusammenarbeit mit der Eisernen Garde. Nach seiner Rückkehr nahm Antonescu eine unnachgiebige Haltung gegenüber der Legion ein: Am 18. Januar 1941 löste er die von der Garde kontrollierten „Romanisierungskommissionen“ auf und ersetzte alle Präfekten der Legionäre. Darüber hinaus entließ er nach der gescheiterten Untersuchung der Ermordung eines deutschen Offiziers durch einen britischen Agenten den Innenminister der Legionäre, Constantin Petrovicescu, der sich weigerte, sein Mandat niederzulegen. Diese drastischen Maßnahmen gefährdeten seine Beziehungen zu den Legionären ernsthaft."
 romania.61.a:0 "Sie haben die Macht missbraucht."
 romania.61.b:0 "Sie sind nicht das, was das Land braucht."
 romania.62.t:0 "Aufstand der Legionäre"
 romania.62.d:0 "Am Abend des 20. Januar 1941 fand eine Demonstration von 10.000 Legionären statt, die die Entfernung satanischer Elemente aus der Führung des Landes forderten. Das Staatsoberhaupt befahl umgehend der Armee und der Gendarmerie, die Kontrolle über wichtige Institutionen und öffentliche Gebäude sicherzustellen. Diese Maßnahmen konnten jedoch aufgrund des Widerstands der Legionäre, die sich weigerten zu evakuieren, nicht umgesetzt werden. In der Folge kam es im ganzen Land zu bewaffneten Zusammenstößen zwischen Sicherheitskräften und Nationalgarde-Trupps. Bis zum 23. Januar wurde der Aufstand jedoch unter schweren Verlusten niedergeschlagen, während es den meisten Anführern der Legionäre gelang, unter dem Schutz des deutschen SD und der Wehrmacht aus dem Land zu fliehen."
 romania.62.a:0 "Zerstöre sie alle!"
 romania.63.t:0 "Operation Flutwelle"
 romania.63.d:0 "Am 1. August 1943 starteten 178 amerikanische B-24 „Liberator“-Bomber vom nordafrikanischen Flugplatz Bengasi, um Hitlers wichtigste Ölquelle anzugreifen – die Ölraffinerien von Ploieşti in Rumänien. \n\nDie Bomber flogen im Tiefflug, um nicht von den deutschen Radaranlagen auf der Balkanhalbinsel erfasst zu werden. Auf dem Weg durch das Mittelmeer tauchte jedoch ein deutsches U-Boot auf und entdeckte die Bomberformation. Der Geheimdienst kannte ihr Ziel nicht genau, doch auf der Seite der Achsenmächte ertönte Alarm wegen eines unerwarteten Angriffs. Aus organisatorischen Gründen und dank der um Ploieşti konzentrierten Verteidigungseinheiten erreichte ein Teil der Bomber seine Ziele nicht."
 romania.63.a:0 "Solche Fehler dürfen nicht noch einmal passieren."
 romania.64.t:0 "Ion Antonescu hingerichtet"
 romania.64.d:0 "König Michael erhielt daraufhin Gnadengesuche von Antonescus Anwalt und seiner Mutter und erwog angeblich, die Alliierten zu bitten, den Fall im Rahmen der eigentlichen Nürnberger Prozesse neu zu bewerten und rumänische Kriegsverbrecher in ausländische Haft zu nehmen. Unter dem Druck der neuen, von der Sowjetunion unterstützten Exekutive von Petru Groza erließ er ein Dekret, das die Hinrichtung befürwortete.\nZusammen mit seinen Mitangeklagten M. Antonescu, Alexianu und Vasiliu wurde der ehemalige Führer am 1. Juni 1946 von einem militärischen Erschießungskommando hingerichtet. Ion Antonescus Anhänger verbreiteten falsche Gerüchte, dass reguläre Soldaten sich geweigert hätten, auf ihren Kommandanten zu schießen, und dass das Kommando hauptsächlich aus jüdischen Polizisten bestanden habe..\nBevor er starb, lüftete er seinen Hut zum Gruß und vergab seinem Volk das Unrecht, das es ihm angetan hatte."
 romania.64.a:0 "Möge er in Frieden ruhen."
 romania.65.t:0 "Verbessern Sie das IAR-Modell"
 romania.65.d:0 "Obwohl es sich um ein erfolgreiches Kampfflugzeug mit außergewöhnlicher Feuerkraft und Wendigkeit handelte, ist es aufgrund fehlender Designverbesserungen für heutige Verhältnisse ein veraltetes Flugzeug.\nDas Flugzeug, dem es derzeit in puncto Geschwindigkeit und Beschleunigung überlegen ist, könnte vielleicht wieder hoch hinaus, wenn wir einen der besseren Motoren Deutschlands lizenzieren würden.\n\nTests haben gezeigt, dass der beste Motor der Junkers Jumo ist, der bis zu 2000 PS liefern kann. Sein Einsatz würde jedoch eine Neukonstruktion unseres aktuellen Modells erfordern und die Umsetzung solcher Änderungen würde einige Zeit in Anspruch nehmen. Eine andere Möglichkeit wäre die Verwendung von DB-Motoren, die bereits in der erfolgreichen Bf 109 verbaut waren. Berichten zufolge ist das Drehmoment des umgekehrten V-Motors jedoch gefährlich und könnte zu vielen Flugunfällen führen. Die beste Lösung scheint der Sternmotor Gnome-Rhone zu sein, der bis zu 1600 PS liefern kann. Die Flugeigenschaften sind deutlich verbessert und wir konnten die alten Motoren problemlos durch diesen ersetzen, ohne den Rumpf zu verändern."
 romania.65.a:0 "Überarbeiten Sie das Flugzeug und lizenzieren Sie den Junckers Jumo."
 romania.65.b:0 "Entscheiden Sie sich für die DB-Engine."
 romania.65.c:0 "Gnome-Rhone klingt nach der richtigen Lösung!"
 romania.70.t:0 "Sowjets bieten Frieden an"
 romania.70.d:0 "Herr, einer von Stalins Diplomaten erreichte uns mit einem interessanten Vorschlag. Er sagte, anstatt einen sinnlosen Krieg mit der Gefahr des Verlusts unserer Souveränität zu führen, könnten wir einen weißen Frieden mit ihnen schließen. Das würde natürlich bedeuten, dass wir sie im Krieg unterstützen und somit gegen unsere ehemaligen Verbündeten kämpfen müssten. Wichtig zu wissen ist, dass dies bedeuten würde, dass die Sowjets in unserem Land noch mehr Einfluss gewinnen würden als zuvor, und uns in eine Art Vasallentum ziehen könnten. Was sollen wir tun?"
 romania.70.a:0 "Ich sehe keine andere Wahl."
 romania.70.b:0 "Keinen Schritt zurück!"
 romania.71.t:0 "Waffen drehen"
 romania.71.d:0 "Wie wir den Friedensbedingungen zugestimmt haben, bereitet sich unser Volk darauf vor, mit seinen ehemaligen Verbündeten zu kämpfen. Die Sowjets haben Rumänien nahezu eine Marionettenherrschaft aufgezwungen, und der kommunistischen Partei ist es äußerst leicht gelungen, die Macht zu übernehmen."
 romania.71.a:0 "Waffen umdrehen!"
 romania.72.t:0 "Die Siebenbürgen-Frage"
 romania.72.d:0 "Unser Diplomat Frédéric Nanu hat sich mit dem sowjetischen Diplomaten Maxim Litnow auf Schloss Klessheim getroffen. Nach stundenlangen Verhandlungen schlug er uns vier Möglichkeiten zur Lösung der Siebenbürgen-Frage vor. Eine davon ist die Rückgabe Siebenbürgens an Ungarn, was wir niemals tun werden. Somit bleiben uns nur zwei Optionen. Wir können bei diesem Deal nichts gewinnen, aber wir müssen uns entscheiden."
 romania.72.a:0 "Erobern wir Siebenbürgen zurück, auch wenn das bedeutet, dass wir Bessarabien aufgeben müssen."
 romania.72.b:0 "Vielleicht ist ein vorübergehender Pufferstaat die beste Option. Auf diese Weise können wir Bessarabien behalten. "
 romania.72.c:0 "Schluss mit diesem Blutvergießen, ein für alle Mal. Verzichten Sie auf alle unsere Ansprüche und bereiten Sie einige Bevölkerungsaustausche vor."
 romania.73.t:0 "Ruhe in Frieden, Antonescu"
 romania.73.d:0 "Heute ist der große Tag, an dem dieser erbärmliche Faschist getötet wird. Ion Antonescu hat so viele Gräueltaten gegen die wahre Demokratie, den Kommunismus, begangen, dass wir sicher sind, dass er in der Hölle schmoren wird. Seine letzten Worte waren, dass wir seine Leiche nicht einmal verdient haben. Schade, dass es uns egal ist. Seltsamerweise trauern die Leute um diesen Bastard! "
 romania.73.a:0 "Es lebe die Sowjetunion, es lebe Rumänien!"
 romania.99.t:0 "Einladung zum Balkanpakt"
 romania.99.d:0 "Im Bemühen, die Kleine Entente – die Tschechoslowakei, Jugoslawien und Rumänien – zu stärken und ein mögliches Wiederaufleben des aggressiven Expansionismus der alten Mittelmächte einzudämmen, hat Frankreich darum gebeten, dass wir uns mit ihnen einem Bündnis anschließen, das diese Nationen zusammenführen soll."
 romania.99.a:0 "Gerne. Die Kleine Entente muss wieder aufgebaut werden."
 romania.99.b:0 "[Root.GetName] geht seinen eigenen Weg."
 romania.98.t:0 "[From.GetName] tritt dem Balkanpakt bei"
 romania.98.d:0 "Unser Plan, den Zerfall und die Abkehr der Balkanallianz von uns zu verhindern, macht Fortschritte. [From.GetLeader] begrüßt unsere Bemühungen und hat unsere Einladung zu einem Bündnis angenommen."
 romania.98.a:0 "Wir sind der Wiederherstellung des Friedens auf dem Balkan einen Schritt näher gekommen."
 romania.97.t:0 "[From.GetName] lehnt Balkanpakt ab"
 romania.97.d:0 "Trotz unserer Bemühungen, die Balkanallianz zu unterstützen, stieß unser jüngster Versuch, Kontakt zu einem der Länder aufzunehmen, auf Skepsis. [From.GetLeader] hat sich geweigert, der Allianz beizutreten. Vielleicht zweifelt er an unseren Motiven oder befürchtet, dass eine zu enge Verbindung mit uns sie zur Zielscheibe machen könnte."
 romania.97.a:0 "Sie könnten, soweit sie wissen, bereits ein Ziel sein!"
 romania.96.t:0 "Zwischenkriegszeit"
 romania.96.d:0 "Dieser historische Abschnitt war von Unruhen geprägt, da Europa sich nur schwer von den Verwüstungen des Ersten Weltkriegs und den destabilisierenden Auswirkungen des Verlusts zahlreicher Monarchien, darunter des Deutschen Reichs, Österreich-Ungarns, Russlands und des Osmanischen Reichs, erholen konnte. Später folgte eine Zeit beträchtlichen Wohlstands (die Goldenen Zwanziger), die sich jedoch mit dem Ausbruch der Weltwirtschaftskrise 1929 dramatisch änderte. In dieser Zeit wurde die Weimarer Republik in Deutschland von zwei Episoden politischer und wirtschaftlicher Turbulenzen abgelöst; die erste kulminierte in der deutschen Hyperinflation von 1923 und dem gescheiterten Hitlerputsch im selben Jahr. Die zweite, durch die weltweite Depression ausgelöste Krise führte zum Aufstieg des Nationalsozialismus. In Asien gewann Japan an Einfluss, insbesondere gegenüber China."
 romania.96.a:0 "Die Welt hat sich sehr verändert."
 romania.95.t:0 "Einladung zur Kleinen Entente"
 romania.95.d:0 "Im Bemühen, die Kleine Entente – die Tschechoslowakei, Jugoslawien und Rumänien – zu stärken und ein mögliches Wiederaufleben des aggressiven Expansionismus der alten Mittelmächte einzudämmen, hat Frankreich darum gebeten, dass wir uns mit ihnen einem Bündnis anschließen, das diese Nationen zusammenführen soll."
 romania.95.a:0 "Gerne. Die Kleine Entente muss wieder aufgebaut werden."
 romania.95.b:0 "[Root.GetName] geht seinen eigenen Weg."
 romania.94.t:0 "[From.GetName] tritt der Kleinen Entente bei"
 romania.94.d:0 "Unser Plan, das Auseinanderbrechen und die Abkehr der Kleinen Entente von uns zu verhindern, macht Fortschritte. [From.GetLeader] begrüßt unsere Bemühungen und hat unsere Einladung zu einem Bündnis angenommen."
 romania.94.a:0 "Wir sind dem Wiederaufbau der Kleinen Entente einen Schritt näher gekommen."
 romania.93.t:0 "[From.GetName] lehnt unseren Vorschlag ab"
 romania.93.d:0 "Trotz unserer Bemühungen, die Kleine Entente zu unterstützen, stieß unser jüngster Versuch, Kontakt zu einer der Nationen aufzunehmen, auf Skepsis. [From.GetLeader] hat sich geweigert, der Allianz beizutreten. Vielleicht zweifelt er an unseren Motiven oder befürchtet, dass eine zu enge Verbindung mit uns sie zur Zielscheibe machen könnte."
 romania.93.a:0 "Sie könnten, soweit sie wissen, bereits ein Ziel sein!"
 romania.100.t:0 "Wie möchten Sie spielen?"
 romania.100.d:0 "Um alle Bedürfnisse unserer Spieler zu erfüllen, bieten wir Ihnen die Möglichkeit, zwischen zwei verschiedenen Spielmodi zu wählen:\n\nDer erste Spielmodus ist der ernsthafte, der alle historischen Ereignisse unseres Mods verfolgt. Er ist voller Einschränkungen, aber die geschaffene Atmosphäre gleicht den Mangel an Freiheit, den der Spielmodus mit sich bringt, wirklich aus.\n\nDer zweite Spielmodus ist der freiere und ermöglicht es Ihnen, Rumänien noch größer zu machen, als es damals wirklich war. Die Anzahl der Ereignisse wird reduziert, aber er bietet vollständige Flexibilität für Ihr Spielerlebnis.\n\nWählen Sie die Version, die Ihren Vorlieben am besten entspricht."
 romania.100.a:0 "Historisches Gameplay."
 romania.100.b:0 "Nichthistorisches Gameplay."
 news.399.t:0 "Die Balkanallianz"
 news.399.d:0 "Um eine gemeinsame Front gegen gemeinsame Feinde zu bilden, hat [From.GetName] die Tschechoslowakei kontaktiert und ihr die Gründung einer „Kleinen Entente“ angeboten, um sich gegen gemeinsame Feinde zu vereinen und damit die Bindungen zu Großbritannien aus dem Ersten Weltkrieg aufzugeben. Obwohl ihm ein Platz im Verteidigungspakt angeboten wurde, stellte der britische Premierminister klar, dass Großbritannien das Bündnis nicht als „förderlich für den Schutz der europäischen Freiheit“ ansieht. \n\nFrankreich hat dennoch diplomatische Beziehungen zu anderen Nationen aufgenommen, die sich möglicherweise bedroht fühlen, und fördert die Einheit, um das diplomatische Gleichgewicht in Europa zu wahren und künftigen Konflikten vorzubeugen. Nur die Zeit wird zeigen, ob Frankreich Erfolg haben wird."
 news.399.a:0 "Dann komm später nicht weinend zu uns!"
 news.399.b:0 "Vive la France et L&#39;Entente!"
 news.399.c:0 "Wir dürfen Frankreich nie wieder die Hegemonie in Europa überlassen."
 news.399.e:0 "Europa muss sich gegen faschistische Aggressoren vereinen!"
 news.399.f:0 "Ein Zeichen zunehmender Spannungen in Europa."
 romania.87.t:0 "Die Wiedervereinigung Siebenbürgens mit Rumänien"
 romania.87.d:0 "\n\nHeute ist Siebenbürgen wieder in seine ursprünglichen Grenzen zurückgekehrt. Die Rumänen dort haben die rumänische Armee herzlich empfangen, als sie wieder in ihr Heimatgebiet einmarschierte.\n\nDie Trikolore hat heute Morgen die Grenze überquert und wurde an allen wichtigen Gebäuden der Region gehisst.\n\nIn einer Rede, die von einer riesigen Menschenmenge in der Kathedrale von Alba Iulia besucht wurde, verkündeten König Michael I. und Marschall Ion Antonescu die Wiedervereinigung Siebenbürgens mit Rumänien und würdigten das Opfer der tapferen Männer, die ihr Leben gaben, damit Rumänien wieder groß wird!"
 romania.87.a:0 "Es lebe Rumänien!"
 romania.87.b:0 "Interessant."
 romania.86.t:0 "Deutsche Militärmission in Bukarest eingetroffen"
 romania.86.d:0 "Ion Antonescu:\n\nIch freue mich, die Vertreter der deutschen Armee in der Hauptstadt des Königreichs begrüßen zu dürfen. Sie sind dank der Einladung der rumänischen Regierung von Gigârtu hier, im Rahmen des Abkommens vom Juli 1940, das den Ausdruck einer echten und fruchtbaren Zusammenarbeit darstellte.\n\nSie werden hier in Rumänien eine Armee sehen, die zwar nicht groß ist, immer etwas laut, aber sehr tapfer war.\n"
 romania.86.a:0 "Lasst uns an die Arbeit gehen!"
 romania.85.t:0 "Das erste Treffen mit Adolf Hitler"
 romania.85.d:0 "Nach der Einführung und der strengen Begrüßung sagte Hitler dem rumänischen Staatschef, er vertraue auf die weitere Zusammenarbeit zwischen Rumänien und Deutschland. \n\n „Dies“, sagte er, „wird nicht nur für die direkten Beziehungen zwischen den beiden Ländern von Vorteil sein, sondern ist auch aus allgemeinen politischen Gründen notwendig, angesichts der starken ethnischen und ideologischen Angriffe, die ganz Europa bedrohen. Es zwingt alle Nationen mit unterschiedlicher Orientierung auf die westlichen Demokratien – und damit auch Deutschland und Rumänien –, sich zu vereinen und auf gemeinsame Interessen zu konzentrieren.“"
 romania.85.a:0 "Dies möge der guten Zusammenarbeit beider Seiten dienen."
 romania.84.t:0 "Zweites Treffen mit Adolf Hitler"
 romania.84.d:0 "Das rumänische Volk hat den verstümmelnden Schiedsspruch des Wiener Schiedsspruchs schmerzlich empfunden und muss in Zukunft wahre Freundschaft beweisen, um vorbehaltlos mit seinen Richtern zusammenzuarbeiten. \n\n – „Das letzte Kapitel in der Geschichte Siebenbürgens ist noch nicht geschrieben“, antwortete Hitler darauf. „Keine Grenze ist endgültig“, betonte er. \n\n „In Zukunft sollte die gesamte Außenpolitik Rumäniens und seine Interessen auf der engen Freundschaft basieren, die ich mit Ihnen zu haben hoffe. \n Wenn Sie Schwierigkeiten mit einem Ihrer Nachbarn haben oder Probleme Ihres Landes haben, stehe ich Ihnen zur Verfügung.“"
 romania.84.a:0 "Ich kann Ihnen versichern, dass ich heute mit dem Glauben des Führers und des deutschen Volkes zurückkehren werde."
 romania.83.t:0 "Die Kollektivierung"
 romania.83.d:0 "Das Programm zur Kollektivierung der Landwirtschaft wurde auf der Plenarsitzung des Zentralkomitees der Rumänischen Arbeiterpartei vorgestellt, wo eine Resolution zur sozialistischen Umgestaltung der Landwirtschaft nach dem Vorbild der sowjetischen Kolchose verabschiedet wurde.\n\nDie kommunistische Ideologie kollidierte mit den traditionellen hierarchischen Strukturen der rumänischen Dörfer, die nicht egalitär waren.\nMilizen und Securitate-Truppen schlugen die Aufstände nieder, deren Anführer verhaftet und hart bestraft wurden. Nach Angaben der kommunistischen Behörden wurden 50.000 Bauern verhaftet und inhaftiert, viele von ihnen wurden öffentlich vor Gericht gestellt und zu langen Haftstrafen verurteilt."
 romania.83.a:0 "Es dient dem Allgemeinwohl."
 romania.82.t:0 "Traditionalisten gewinnen an Macht"
 romania.82.d:0 "Die Traditionalisten sind der Ansicht, dass die Entwicklung des Landes von seinem landwirtschaftlichen Charakter und der Authentizität unserer nationalen Werte bestimmt werden muss.\n\nNichifor Crainic, ein berühmter Theoretiker des Orthodoxismus und Gegner des westlichen Geistes, glaubt, dass es das Schicksal des rumänischen Volkes sei, eine Kultur „nach seinem Glauben“ zu schaffen, und dies setze unsere Orientierung nach Osteuropa voraus. Er betont, dass in jedem Haus Ikonen aus dem Osten an der Wand hängen und dass der Bauer, wenn er auf dem Feld betet, in den Orient blickt.\n\nDieser Ansatz wurde vom Logiklehrer Nae Ionescu unterstützt, der sagte, dass die zukünftige Entwicklung Rumäniens auf der Bauernschaft und dem landwirtschaftlichen Potenzial des Landes basieren sollte."
 romania.82.a:0 "Asa sa ne ajute Dumnezeu!"
 romania.81.t:0 "Taranisten gewinnen an Macht"
 romania.81.d:0 "Die Taranisten förderten die Idee eines Agrarstaates und „töteten“ die europäisierenden Tendenzen.\n\nIhre Anhänger sind der Ansicht, dass Rumänien ein Land sein muss, das den Interessen und Bedürfnissen der Bauernschaft entspricht, da diese die Mehrheit der Bevölkerung stellt.\nSie befürworten auch die Notwendigkeit der industriellen Entwicklung, solange diese den Interessen der Landwirte dient.\n\nEin Vertreter dieser Tendenz, Virgil Madgearu, ist der Ansicht, dass die Hauptaufgabe der Intellektuellen darin besteht, eine Harmonie zwischen den politischen, wirtschaftlichen und sozialen Institutionen herzustellen."
 romania.81.a:0 "Eine Verbesserung in diesem Sinne ist notwendig."
 romania.80.t:0 "Die Macht der Europäer steigt"
 romania.80.d:0 "Rumäniens Platz ist in Europa, daher braucht unsere Gesellschaft einen anderen Weg, um sich wirtschaftlich und sozial zu entwickeln. In den 1920er Jahren erreichte Rumänien einen Reifegrad, der für die Synchronisierung mit dem Rest Europas günstig war. Was wir tun müssen, ist, die westlichen Institutionen in unser Land zu integrieren und sie an unsere lokalen Bedürfnisse anzupassen, den technologischen Fortschritt zu fördern und unsere Industrie zu entwickeln. Die Industrialisierung ist der erste Schritt, den wir unternehmen müssen, um eine der Mächte Europas zu werden. Eine starke Wirtschaft ermöglicht die Finanzierung ehrgeiziger technologischer und militärischer Projekte."
 romania.80.a:0 "Unser Platz ist in Europa."
 baltic.1.t:0 "Sowjetisches Ultimatum"
 baltic.1.d:0 "Die Sowjetunion drängt uns, einen „Beistandspakt“ mit ihr zu unterzeichnen, der ihr das Recht einräumen würde, Truppen auf unserem Territorium zu stationieren! Dies ist nichts weiter als ein kaum verhüllter Versuch, unser Land zu annektieren, doch wir können den an unserer Grenze stationierten Truppen kaum Widerstand leisten."
 baltic.1.a:0 "Akzeptiere das Unvermeidliche ..."
 baltic.1.b:0 "Sie werden unser Land mit Gewalt einnehmen müssen!"
 baltic.4.t:0 "Deutschland fordert Memel"
 baltic.4.d:0 "Die deutschen Truppen sammeln sich in Ostpreußen, und das deutsche Außenministerium hat uns ein Ultimatum gestellt! Wir müssen ihnen das Memelgebiet sofort überlassen, andernfalls drohen uns militärische Maßnahmen. Sollen wir ihren Forderungen nachkommen?"
 baltic.4.a:0 "Wir müssen akzeptieren."
 baltic.4.b:0 "Niemals!"
 baltic.5.t:0 "Kommunisten haben die Kontrolle."
 baltic.5.d:0 "[Root.GetName] hat sich für die Solidarität entschieden und der Bourgeoisie die politische Macht entrissen. Viele in der neuen Regierung schlagen vor, dass wir unsere kommunistischen Pflichten erfüllen und mit der Sowjetunion weitermachen."
 baltic.5.a:0 "Unsere Zukunft ist am besten gesichert, wenn wir wirklich eins mit dem Mutterland werden."
 baltic.5.b:0 "[Root.GetName] hat mehr zu bieten, da es unter dem Schutz der Sowjetunion eigenständig operiert."
 baltic.5.c:0 "[Root.GetName] soll ein souveräner Staat bleiben."
 baltic.7.t:0 "[From.GetName] fordert [Root.GetAdjective] die Teilnahme an [From.GetFactionName] an"
 baltic.7.d:0 "Mit der Unterzeichnung eines Freundschaftsvertrags zwischen unseren Nationen hat [From.GetName] [Root.GetName] gebeten, sich ihnen in ihrer [From.GetFactionName] anzuschließen, um gemeinsam gegen die wachsenden Bedrohungen vor unseren Nationen vorzugehen. Ob kommunistisch oder faschistisch, [From.GetName] verspricht, für die Interessen von [Root.GetAdjective] einzutreten."
 baltic.7.a:0 "[Root.GetName] steht mit seinen Brüdern."
 baltic.7.b:0 "[Root.GetName] kann nur alleine überleben."
 hungary.1.t:0 "Deutsche Schiedsgerichtsbarkeit"
 hungary.1.d:0 "Trotz unseres berechtigten Anspruchs hat Deutschland entschieden, dass Siebenbürgen unter rumänischer Kontrolle bleiben soll. Sie sagen, sie seien bestrebt, alle in Versailles angerichteten Fehler wiedergutzumachen, doch offensichtlich gilt dies nur für ihre eigenen Grenzen."
 hungary.1.a:0 "Empörend."
 hungary.2.t:0 "Zweiter Wiener Preis"
 hungary.2.d:0 "Deutschland hat die Gültigkeit unseres Anspruchs anerkannt, wie wir es erwartet hatten, und Nordsiebenbürgen wurde an Ungarn zurückgegeben. Dies ist ein historischer Moment!"
 hungary.2.a:0 "Ein Tag zum Feiern!"
 hungary.3.d:0 "Deutschland hat nicht nur die Gültigkeit unseres Anspruchs anerkannt, sondern auch entschieden, dass ganz Siebenbürgen wieder unter ungarische Kontrolle fällt! Das ist mehr, als wir zu hoffen gewagt hatten."
 hungary.4.d:0 "Deutschland hat die Gültigkeit unseres Anspruchs anerkannt und uns Nordsiebenbürgen zugesprochen, Rumänien weigert sich jedoch hartnäckig, diese Entscheidung zu akzeptieren!"
 hungary.4.a:0 "Die Narren!"
 hungary.5.d:0 "Deutschland hat die Gültigkeit unseres Anspruchs anerkannt und uns ganz Siebenbürgen zugesprochen, Rumänien weigert sich jedoch hartnäckig, diese Entscheidung zu akzeptieren!"
 hungary.6.t:0 "Erster Ljubljana-Preis"
 hungary.6.d:0 "Die Deutschen mögen sich über den Versailler Vertrag beschweren, doch im Vergleich zur Ungerechtigkeit des Trianon-Vertrags kamen sie glimpflich davon. Obwohl sie behaupteten, es ginge um nationale Selbstbestimmung, verurteilte er so viele wahre Söhne Ungarns zur Fremdherrschaft. Eine solche Wunde am ungarischen Stolz ist die Provinz Vojvodina. Die Rückgabe der Ländereien an Ungarn hat das uns zugefügte Unrecht wiedergutgemacht."
 hungary.6.a:0 "Justiz von Ungarn"
 bulgaria.1.t:0 "Vertrag von Craiova – Rumänien stimmt zu"
 bulgaria.1.d:0 "Die rumänische Regierung hat in unserem Streit die deutsche Schlichtung akzeptiert. Süd-Dobrudscha wurde mit Bulgarien wiedervereinigt!"
 bulgaria.1.a:0 "Endlich!"
 bulgaria.2.t:0 "Vertrag von Craiova - Rumänien lehnt ab"
 bulgaria.2.d:0 "Die rumänische Regierung hat unser Angebot, alle Streitigkeiten beizulegen, abgelehnt! Sie behauptet, dass Süd-Dobrudscha nun ein integraler Bestandteil ihrer Nation sei, den sie niemals aufgeben werde."
 bulgaria.2.a:0 "Inakzeptabel!"
 bulgaria.3.t:0 "Erster Ljubljana-Preis"
 bulgaria.3.d:0 "Lange träumten wir von einem größeren Bulgarien und wurden lange Zeit als Menschen zweiter Klasse behandelt. Auf der Londoner Konferenz wurde uns unser gerechter Lohn verweigert, 1913 wurden wir von unseren Verbündeten verraten und 1918 für unseren Wunsch nach Gerechtigkeit bestraft. Nun ist das vorbei. Deutschland versucht, die Fehler dieses sogenannten Friedens wiedergutzumachen, nicht nur für sich selbst, sondern auch für andere. Bulgarien wird nun die Rückgabe Mazedoniens aus Jugoslawien erleben."
 bulgaria.3.a:0 "Bulgaren, freut euch!"
 bulgaria.4.t:0 "Vertrag von Craiova"
 bulgaria.4.d:0 "Wir haben nicht vergessen, wie Rumänien uns 1913 in den Rücken fiel und feige die Süddobrudscha einnahm, während unsere Armeen anderswo beschäftigt waren. Ungarn hat seine Freundschaft mit Deutschland genutzt, um sich an Rumänien zu rächen. Ist jetzt unsere Zeit gekommen?"
 bulgaria.4.a:0 "Wir werden uns rächen"
 bulgaria.4.b:0 "Rache ist ein Gericht, das am besten kalt serviert wird"
 bulgaria.5.t:0 "Vertrag von Craiova"
 bulgaria.5.d:0 "Deutschland hat sich in unserem Streben nach Gerechtigkeit auf die Seite der verachtenswerten Rumänen gestellt. [Root.GetLeader] ließ den deutschen Botschafter wissen, dass die Bulgaren mehr von ihren Freunden erwarten. "
 bulgaria.5.a:0 "Bestritten"
 italy.1.t:0 "Albanien Erträge"
 italy.1.d:0 "Die albanischen Behörden haben unseren Forderungen nachgegeben und König Zog wurde zur Abdankung gezwungen. Von nun an und bis ans Ende der Zeit wird Albanien italienisch sein!"
 italy.1.a:0 "Ein herrlicher Tag."
 italy.2.t:0 "Zog lehnt das Ultimatum ab"
 italy.2.d:0 "König Zog hat unser Ultimatum bis zuletzt trotzig abgelehnt. Er und seine Berater versuchen nun, die erbärmlichen Verteidigungsanlagen Albaniens zusammenzukratzen. Wir müssen Tirana besetzen und dieser Farce ein Ende setzen!"
 italy.2.a:0 "Wir hätten es uns auch einfacher machen können, Zog!"
 italy.3.t:0 "Italienisches Ultimatum"
 italy.3.d:0 "Italienische Diplomaten haben uns ein Ultimatum gestellt und von uns die Unterwerfung unter ihre Besatzung gefordert! Albanien soll in Personalunion unter dem italienischen König regiert werden!"
 italy.3.a:0 "Wir müssen uns unterwerfen."
 italy.3.b:0 "Das wird nicht passieren! Versammelt euch bei Zog!"
 italy.4.t:0 "Erweiterung des Vallo Alpino"
 italy.4.d:0 "Ingenieure der Regio Esercito haben unsere Nordgrenze untersucht und die Stellen identifiziert, an denen das Vallo Alpino verstärkt und erweitert werden muss. Die erforderlichen Bauaufträge wurden bereits erteilt."
 italy.4.a:0 "Wenn diese Festungen zu Hannibals Zeiten hier gewesen wären ..."
 italy.5.t:0 "Italienisch-deutscher Technologievertrag"
 italy.5.d:0 "Italien schlägt einen Austausch von Technologien und Ideen vor, der unsere Nationen einander näher bringt und uns beide stärker macht."
 italy.5.a:0 "Ein hervorragender Vorschlag!"
 italy.5.b:0 "Deutsche Technologie ist nur für das deutsche Volk bestimmt"
 italy.6.t:0 "Italienisch-deutscher Technologievertrag – angenommen!"
 italy.6.d:0 "Wie erwartet, waren die Deutschen erfreut, eine Reihe von Technologieaustauschen zu ermöglichen. Es ist klar, dass in Europa ein neuer Wind weht und Italien nun einen Schritt näher daran ist, seinen früheren Ruhm wiederzuerlangen!"
 italy.6.a:0 "Großartig!"
 italy.7.t:0 "Italienisch-deutscher Technologievertrag – Abgelehnt!"
 italy.7.d:0 "Die Deutschen haben unser Vertragsangebot abgelehnt."
 italy.7.a:0 "Wir sollten von nun an besser auf uns selbst aufpassen"
 italy.8.t:0 "Treten Sie der französischen Fraktion bei."
 italy.8.d:0 "Die Franziskanerbewegung gewinnt in Frankreich an Boden und hat uns aufgefordert, ihrer Fraktion beizutreten. Dient dies den Interessen Italiens?"
 italy.8.a:0 "Schließen wir uns den Franzosen an."
 italy.8.b:0 "Den Franzosen kann man nicht trauen"
 usa.1.t:0 "Earhart will sich verpflichten"
 usa.1.d:0 "Während Amerika für den Krieg mobilisiert, haben wir eine ungewöhnliche Anfrage erhalten. Amelia Earhart, die berühmte Pilotin, die vor kurzem erfolgreich die Welt umrundete, möchte sich als Kampfpilotin beim Army Air Corps verpflichten. Sie hat beachtliche Fähigkeiten in simulierten Luftkämpfen bewiesen, doch viele Militärangehörige lehnen die Vorstellung ab, dass eine Frau Kampfeinsätze fliegt. Sollten wir in ihrem Fall eine Ausnahme machen und sie aufnehmen lassen?"
 usa.1.a:0 "Ja, wir brauchen sie."
 usa.1.b:0 "Nein, das wird nicht nötig sein."
 usa.2.t:0 "Manifest Destiny"
 usa.2.d:0 "Die einzigartige Geschichte der Vereinigten Staaten verpflichtet uns, Demokratie und Freiheit in der Welt zu bewahren. Das letzte Jahrzehnt hat bewiesen, dass diese Mission nicht erfüllt werden kann, ohne die Waffen gegen diejenigen zu erheben, die sie zerstören wollen. Von nun an wird sich jeder Unterdrücker vor uns verantworten müssen, und unsere Streitkräfte werden die Menschen weltweit befreien."
 usa.2.a:0 "Freiheit oder Tod!"
 usa.3.t:0 "Amerikanische Flotte in Pearl Harbor"
 usa.3.d:0 "Die diplomatischen und wirtschaftlichen Sanktionen der USA scheinen der Beginn einer noch bedrohlicheren Lage zu sein. Die amerikanische Pazifikflotte ist im Marinestützpunkt Pearl Harbor auf Hawaii stationiert, ein klares Zeichen dafür, dass die Amerikaner weiterhin eine starke Präsenz im Pazifik haben und unsere Feinde unterstützen werden. Ein Angriff auf den Stützpunkt könnte uns jetzt einen Überraschungseffekt verschaffen."
 usa.3.a:0 "Wer weiß, wie lange diese Gelegenheit besteht?"
 usa.4.t:0 "Abkommen über Zerstörer für Stützpunkte"
 usa.4.d:0 "Nachdem die USA ihre Position gegen die Deutschen eingenommen haben, scheinen sie nun daran interessiert zu sein, Großbritannien gegen die deutsche Bedrohung stark zu machen. Sie sind jedoch auch daran interessiert, ihre eigene Marinepräsenz im Atlantik aufrechtzuerhalten. Im Austausch für mehrere unserer Marinestützpunkte werden sie unser Land mit Zerstörern versorgen. Die Schiffe waren bisher in Reserve, doch die Annahme der Schiffe wird die militärischen Bindungen zwischen unseren Nationen stärken und könnte eine kluge Entscheidung sein."
 usa.4.a:0 "Dies ist eine einmalige Gelegenheit."
 usa.4.a.tt:1 "Wir erhalten 43 amerikanische Zerstörer.\nKanada erhält 7 amerikanische Zerstörer."
 usa.4.b:0 "Dies ist eindeutig vorteilhafter für die USA und inakzeptabel."
 usa.5.t:0 "Großbritannien lehnt Angebot ab"
 usa.5.d:0 "Trotz unserer Vorbereitungen und guten Absichten hat Großbritannien unser Angebot alter Zerstörer im Austausch für seine Marinestützpunkte abgelehnt."
 usa.5.a:0 "Ihr Verlust."
 usa.6.t:0 "Wahl von [GetYear]"
 usa.6.d:0 "Der Tag der Präsidentschaftswahl ist gekommen. Amtsinhaber Franklin Delano Roosevelt hat bereits mehrere der als „New Deal“ bezeichneten Programme umgesetzt, die die USA aus der Großen Depression führen sollen. Während viele dieser Maßnahmen auf Zustimmung stießen, stießen seine Pläne, die Rolle und Macht der Regierung weiter auszubauen, bei seinem Gegner, dem Republikaner Alf Landon, auf Kritik. Landon, der aus der Ölindustrie stammt, strebt mehr wirtschaftliche Freiheit an, während Roosevelt und die Demokratische Partei die Sozialversicherung ausbauen und wirtschaftliche Stabilität gewährleisten wollen. Die Wahl könnte knapp ausfallen oder ein klarer Sieg für die Demokraten werden."
 usa.6.a:0 "Die Demokraten. Noch vier Jahre!"
 usa.6.b:0 "Die Republikaner. Wir müssen die Ideale des amerikanischen Systems schützen."
 usa.7.t:0 "Roosevelt gegen Willkie"
 usa.7.d:0 "Seit der Einführung des Präsidentenamtes in den Vereinigten Staaten hat noch kein Präsident drei aufeinanderfolgende Amtszeiten innegehabt. Angesichts der prekären Weltlage und der internationalen Entwicklungen der letzten Jahre hat sich Präsident Roosevelt jedoch entschieden, mit der Tradition zu brechen und für eine dritte Amtszeit zu kandidieren. Der Republikaner Wendell Willkie, ein Außenseiter mit Industriehintergrund und wenig politischer Erfahrung, kritisierte sowohl Roosevelts wirtschaftspolitischen Interventionismus als auch seine Begründungen für eine dritte Amtszeit. Obwohl die Kandidaten in ihrer Außenpolitik viele Gemeinsamkeiten haben und Willkie eine Form des New Deal beibehalten möchte, betrachten viele diese Wahl dennoch als entscheidend für die Zukunft der amerikanischen Demokratie."
 usa.7.a:0 "Die Demokraten. FDR ist unverzichtbar."
 usa.7.b:0 "Die Republikaner. Wir wollen Willkie!"
 usa.8.t:0 "Landon gegen Roosevelt"
 usa.8.d:0 "Präsident Landon stoppte die anhaltenden New-Deal-Reformen der Demokraten vor vier Jahren und setzte stattdessen auf die Stärke der Nation, die in Industrieunternehmen ruht, wie denen, die er vor seiner Präsidentschaft mit aufgebaut hatte. Roosevelt, der sich weiterhin für die Fertigstellung der ursprünglich für seine zweite Amtszeit geplanten Programme einsetzte, kandidiert nun erneut für das Präsidentenamt. Obwohl er nach wie vor ein beliebter Kandidat ist, kritisiert Landon weiterhin dessen Bemühungen, die Macht in den Händen des Präsidenten zu konzentrieren, und vermeidet daher selbst ähnliche politische Maßnahmen.\n\nBedrohungen aus dem Ausland, sowohl für unser eigenes Land als auch für andere, bleiben eine Realität, und keiner der Kandidaten befürwortet, dass die Vereinigten Staaten davor die Augen verschließen. Die Frage ist, wer das Arsenal der Demokratie durch diese schwierigen Zeiten führen wird."
 usa.8.a:0 "Die Republikaner. Landon ist unseren Werten verpflichtet."
 usa.8.b:0 "Die Demokraten. Roosevelt ist bereit, das Notwendige zu tun."
 usa.9.t:0 "Roosevelt gegen Dewey"
 usa.9.d:0 "Die Präsidentschaft von Franklin D. Roosevelt war bereits in vielerlei Hinsicht außergewöhnlich. Trotz seines sich verschlechternden Gesundheitszustands und der beispiellos langen Amtszeit strebt er danach, unser Land auch weiterhin durch die Kriegsanstrengungen zu führen. Die Republikaner waren in ihrer Kandidatenauswahl eingeschränkt, da viele potenzielle Kandidaten im Krieg dienten, wählten jedoch Gouverneur Thomas E. Dewey zu ihrem Vertreter. Roosevelt genießt weiterhin die Unterstützung der Bevölkerung, doch viele befürchten, dass er das Ende seiner Amtszeit nicht mehr erleben wird. Doch reicht das aus, um Dewey einen Sieg über den Mann zu bescheren, der uns so weit gebracht hat?"
 usa.9.a:0 "FDR besiegt Dewey."
 usa.9.b:0 "Dewey besiegt FDR."
 usa.10.t:0 "[Root.GetLeader] vs. Roosevelt"
 usa.10.d:0 "Obwohl [Root.GetLeader] viele Aspekte des New Deal beibehielt, sieht Roosevelt immer noch die Möglichkeit, seine ursprünglichen Pläne zur Weiterentwicklung der Programme umzusetzen. Trotz seines nachlassenden Gesundheitszustands konnte er einen Großteil der Unterstützung, die ihm zuvor die Präsidentschaft eingebracht hatte, behalten und wirbt nun erneut für die Demokraten. [Root.GetLeader] argumentiert, dass ein Führungswechsel in der heiklen Lage Amerikas unverantwortlich wäre. Das ist ironisch, da er diese Behauptung bereits vor seinem letzten Sieg über Roosevelt aufgestellt hatte. Trotzdem könnte er Recht haben."
 usa.10.a:0 "[Root.GetLeader] hat sich als fähiger Anführer erwiesen."
 usa.10.b:0 "Amerika ist bereit für einen neuen New Deal."
 usa.11.t:0 "Roosevelt gegen MacArthur"
 usa.11.d:0 "Angesichts der anhaltenden Kriegsgefahr streben sowohl Demokraten als auch Republikaner nach einem Kandidaten aus dem Militär. General Douglas MacArthur, der sich normalerweise seinen militärischen Pflichten widmet, nutzte die Gelegenheit, während des Friedens in unserem Land für die Nominierung der Republikaner zu werben und gewann. Er fordert nun Roosevelt heraus und unterstützt die konservative Koalition. Roosevelt ist nach wie vor beliebt, doch MacArthurs Charisma und Pflichtbewusstsein haben die Wähler stark beeindruckt. Weiß das Militär wirklich, was am besten ist?"
 usa.11.a:0 "Roosevelt und Truman werden es schaffen."
 usa.11.b:0 "MacArthur ist ein Mann des Friedens ebenso wie des Krieges."
 usa.12.t:0 "Kampagne von Douglas MacArthur"
 usa.12.d:0 "Um Roosevelts rekordverdächtig lange Präsidentschaft herauszufordern, haben die Republikaner auf angesehene Militärkommandeure gesetzt, in der Hoffnung, einen potenziellen Kandidaten zu finden, der Amerika durch diesen Krieg führen könnte. General Douglas MacArthur ist ein beliebter Kandidat unter den Konservativen, aber auch ein unverzichtbarer Aktivposten im anhaltenden Konflikt und zögert, seine Zeit im Wahlkampf zu verbringen. Er bleibt dennoch einer der vielversprechendsten konservativen Kandidaten und kann vielleicht davon überzeugt werden, Wahlkampf zu betreiben, um einen gemäßigten Republikaner zum Präsidenten zu vermeiden. Ist es das Opfer wert?"
 usa.12.a:0 "MacArthur wird eher an der Front als im Weißen Haus gebraucht."
 usa.12.b:0 "Wir brauchen ihn, um Roosevelt herauszufordern."
 usa.13.t:0 "Roosevelts Tod"
 usa.13.d:0 "Obwohl sich Präsident Roosevelts Gesundheitszustand seit einiger Zeit verschlechterte, überzeugte sein erfolgreicher Präsidentschaftswahlkampf viele davon, dass ihm noch viele Jahre seiner Amtszeit bevorstünden. Dennoch blieb die Möglichkeit eines Todes Roosevelts während seiner Amtszeit bestehen, und heute verstarb er an den Folgen eines Schlaganfalls. Vizepräsident Harry S. Truman hat nun seinen Amtseid abgelegt und um die Unterstützung und Gebete des Volkes gebeten. Das alte Kabinett bleibt bestehen, und Truman hat versprochen, viele der politischen Entscheidungen seines Vorgängers fortzuführen."
 usa.13.a:0 "So endete eine Ära und eine neue begann."
 news.1.t:0 "Vorfall auf der Marco-Polo-Brücke"
 news.1.d:0 "Japanische und chinesische Streitkräfte lieferten sich um die strategisch wichtige Marco-Polo-Brücke südwestlich von Peking ein ergebnisloses Gefecht. \n\n[CHI.GetNameDef] wies [jap.GetNameDef]s Forderungen nach einer Entschuldigung und territorialen Zugeständnissen zurück und behauptete stattdessen, der „Knackpunkt“ der japanischen Aggression sei erreicht. \n\nDiplomaten befürchten, dass die brisante Lage jederzeit zu einem Krieg führen könnte."
 news.1.a:1 "Wirklich interessante Zeiten."
 news.1.b:0 "Wir werden denen Chinesisch beibringen!"
 news.1.c:0 "Das stimmt! Keinen Zentimeter!"
 news.2.d:0 "Japanische und chinesische Streitkräfte haben sich um die strategisch wichtige Marco-Polo-Brücke südwestlich von Peking ein ergebnisloses Gefecht geliefert. \n\n[CHI.GetNameDef] hat die volle Verantwortung für den Vorfall übernommen, sich bei [jap.GetNameDef] entschuldigt und umfangreiche territoriale Zugeständnisse gemacht. Dies hat viele Experten überrascht, die einen regelrechten Krieg vorausgesagt hatten. \n\nBedeutet dies dauerhaften Frieden in Asien?"
 news.2.a:0 "Zweifelhaft."
 news.2.b:0 "Damit sind wir zufrieden ... fürs Erste."
 news.2.c:0 "Wir hatten keine Wahl."
 news.5.t:0 "[jap.GetNameDefCap] Fordert Französisch-Indochina"
 news.5.d:0 "[jap.GetNameDef] hat die Schwäche Frankreichs angesichts der Konflikte in Europa ausgenutzt und die neue Regierung dazu gezwungen, die Kontrolle über ihre Kolonie in Indochina aufzugeben! \n\nJapanische Truppen haben bereits alle wichtigen Stützpunkte in der Region besetzt und Experten befürchten, dass die Kolonie als Ausgangspunkt für zukünftige Militärexpeditionen genutzt werden könnte."
 news.5.a:0 "Geier, die an einer Leiche herumhacken ..."
 news.5.b:0 "Und das sollte auch so sein."
 news.5.c:0 "Die Schakale ließen uns keine Wahl."
 news.5.e:0 "Unsere Verbündeten zeigen Initiative!"
 news.6.d:0 "Um die Schwäche Frankreichs angesichts seiner Niederlage in Europa auszunutzen, forderte [jap.GetNameDef] kürzlich von der neuen französischen Regierung den vollständigen Zugriff auf seine Stützpunkte in Indochina. \n\nDies würde praktisch bedeuten, die Kontrolle über die gesamte Kolonie an Japan zu übertragen, wozu die Franzosen jedoch nicht bereit wären. \n\nExperten gehen davon aus, dass diese Entscheidung zu militärischen Vergeltungsmaßnahmen Japans führen wird."
 news.6.a:0 "Das würden sie nicht wagen, oder?"
 news.6.b:0 "Die sturen Narren werden für diesen Fehler bezahlen."
 news.6.c:0 "Wir müssen uns vorbereiten."
 news.6.e:0 "Ein weiterer mutiger Schritt unserer Freunde."
 news.7.t:0 "Sowjetisch-japanisches Gefecht"
 news.7.d:0 "Sowjetische und japanische Streitkräfte stießen kürzlich in einem schweren Gefecht an der mandschurischen Grenze zusammen. \n\nEine bedeutende sowjetische Stoßtruppe, unterstützt von mongolischer Kavallerie, überraschte die Japaner offenbar und fügte ihnen schwere Verluste zu. \n\nDie Stimmung in Tokio soll angespannt sein, doch es ist noch zu früh, um zu sagen, ob der Konflikt zu einem offenen Krieg eskalieren wird."
 news.7.a:0 "Ist dies der Beginn eines weiteren Krieges in Asien?"
 news.7.b:0 "Eine beschämende Zurschaustellung..."
 news.7.c:0 "Wir haben der Welt eine Botschaft gesendet."
 news.8.d:0 "Sowjetische und japanische Streitkräfte stießen kürzlich in einem heftigen Gefecht an der mandschurischen Grenze aufeinander. \n\nBerichte aus der Schlacht deuten darauf hin, dass die Japaner die Sowjets bei ihrem Angriff über die Grenze in eine Zangenbewegung gerieten und die Überlebenden zum Rückzug zwangen. \n\nWird dieser Vorfall Moskau dazu veranlassen, weitere Truppen in den russischen Fernen Osten zu entsenden?"
 news.8.b:0 "Für den Kaiser!"
 news.8.c:0 "Wir müssen die Situation bewerten …"
 news.9.t:0 "Sowjetischer Rückzug"
 news.9.d:0 "Nach dem Aufmarsch japanischer Truppen in der Mandschurei hat die Sowjetunion offenbar unerwartet Einheiten abgezogen, die direkt an der Grenze stationiert waren. \n\nHierbei könnte es sich um einen Versuch Moskaus handeln, eine künftige Konfrontation mit Japan zu vermeiden. Auslöser könnte die schmerzhafte Erinnerung an die Niederlage Russlands im Russisch-Japanischen Krieg sein."
 news.9.a:0 "Vielleicht führt dies zu einem dauerhaften Frieden."
 news.9.b:0 "Die Feiglinge sind geflohen!"
 news.9.c:0 "Ein taktischer Rückzug. Mehr nicht."
 news.10.t:0 "Die Sowjetunion beansprucht Bessarabien"
 news.10.d:0 "Nachdem [SOV.GetNameDef] Truppen entlang der rumänischen Grenze zusammengezogen hatte, stellte er der Regierung in Bukarest ein Ultimatum zur sofortigen Übergabe Bessarabiens. Die Region gehörte einst zum Russischen Reich, was [SOV.GetNameDef] als ausreichende Rechtsgrundlage für seine Forderungen ansieht.\n\nRumänien erklärte, dass es keine andere Wahl habe, als dem Bündnis beizutreten, und zog seine Truppen aus Bessarabien ab."
 news.10.a:0 "Interessant."
 news.10.b:0 "Bessarabien gehört rechtmäßig uns."
 news.10.c:0 "Wir hatten keine Wahl ..."
 news.10.e:0 "Genieße diesen vorübergehenden Sieg, Moskau."
 news.11.t:0 "Rumänien weist sowjetische Forderungen zurück"
 news.11.d:0 "[SOV.GetNameDefCap] hat erhebliche Truppen entlang seiner Grenze zu [ROM.GetNameDef] konzentriert und Moskau heute ein Ultimatum an die rumänische Regierung gestellt, in dem es die sofortige Übergabe Bessarabiens fordert. Die Region gehörte einst zum Russischen Reich, was [SOV.GetNameDef] als ausreichende Rechtsgrundlage für seine Forderungen ansieht.\n\nBukarest hat sich trotzig entschieden, alle sowjetischen Gebietsforderungen zurückzuweisen, und die rumänische Armee erhielt den Befehl zur vollständigen Mobilmachung. \n\nInternationale Beobachter erwarten, dass sowjetische Truppen jeden Moment die Grenze überqueren könnten."
 news.11.a:0 "Interessant."
 news.11.b:0 "Sie haben einen schrecklichen Fehler gemacht."
 news.11.c:0 "Bessarabien gehört uns!"
 news.11.e:0 "Lasst die Narren kämpfen."
 news.12.t:0 "[FIN.GetNameDefCap] lehnt sowjetische Forderungen ab"
 news.12.d:0 "Sowjetische Diplomaten haben der Regierung von [FIN.GetNameDef] ein Ultimatum gestellt und Grenzanpassungen in der Region Karelien gefordert. \n\nTrotz eines erheblichen Aufmarsches sowjetischer Truppen an der Grenze lehnte Helsinki diese Forderungen mit der Begründung ab, dass „den russischen Aggressoren kein einziger Fuß finnischen Bodens freiwillig überlassen wird“. \n\nInternationale Beobachter befürchten eine unmittelbar bevorstehende sowjetische Invasion."
 news.12.a:0 "Das wird nicht gut enden."
 news.12.b:0 "Sie hätten unsere Forderungen nicht ablehnen dürfen."
 news.12.c:0 "Wir müssen uns um unsere Verteidigung kümmern."
 news.12.e:0 "Mal sehen, wie gut die Bolschewiki abschneiden …"
 news.12.f:0 "Sie werden ihren Fehler bald erkennen."
 news.13.t:0 "[FIN.GetNameDefCap] Akzeptiert sowjetische Forderungen"
 news.13.d:0 "Nach langen Debatten hat die Regierung von [FIN.GetNameDef] beschlossen, den sowjetischen Forderungen nach Grenzanpassungen in der Region Karelien nachzukommen. \n\n[SOV.GetNameDef] verwies auf die Notwendigkeit der Schaffung einer Pufferzone zur Verbesserung der Sicherheit Leningrads, das nur 30 Kilometer von der ehemaligen finnischen Grenze entfernt liegt. \n\nViele Beobachter hatten eine unmittelbar bevorstehende groß angelegte sowjetische Invasion Finnlands befürchtet, doch diese diplomatische Lösung sollte diese Befürchtungen zerstreuen."
 news.13.a:0 "Frieden, aber zu welchem Preis?"
 news.13.b:0 "Jetzt können wir unsere Bemühungen auf andere Bereiche konzentrieren."
 news.13.c:0 "Wir haben unsere Unabhängigkeit gesichert."
 news.13.e:0 "Schade. Es hätte die Bolschewiki beschäftigt."
 news.13.f:0 "Unsere Kameraden zeigen ihre Stärke!"
 news.14.t:0 "[SOV.GetNameDefCap] Anhänge [TAN.GetNameDef]"
 news.14.d:0 "In einer Pressemitteilung gab Moskau heute die formelle Annexion von [TAN.GetNameDef] bekannt. \n\nDer Oberste Sowjet stimmte einem Antrag des tuwinischen Parlaments auf Mitgliedschaft in der UdSSR zu. \n\nDie kleine Tuwinische Volksrepublik, die bisher nur von der Sowjetunion und der Mongolei offiziell anerkannt wurde, wird als autonome Oblast organisiert."
 news.14.a:0 "Tannu, was?"
 news.14.b:0 "Es wird ihnen besser gehen."
 news.15.t:0 "Zweiter Wiener Preis"
 news.15.d:0 "Nach einem deutschen Schiedsverfahren wurde in Wien ein Vertrag unterzeichnet, der Nordsiebenbürgen wieder unter ungarische Herrschaft stellt.\n\nDas Gebiet war nach dem Ende des Ersten Weltkriegs an [ROM.GetNameDef] vergeben worden, was zu einem erbitterten Streit führte. \n\nSind dies die ersten von vielen Grenzänderungen, die nun, da in Europa eine neue Ordnung etabliert zu sein scheint, vorgenommen werden?"
 news.15.a:0 "Wir werden sehen, wie lange das anhält."
 news.15.b:0 "Die Karte Europas soll neu gezeichnet werden."
 news.15.c:0 "Hoffentlich werden uns diese Überarbeitungen eines Tages zugute kommen."
 news.15.e:0 "Hört, hört!"
 news.16.d:0 "Nach einem deutschen Schiedsgericht wurde in Wien ein Vertrag unterzeichnet, der ganz Siebenbürgen wieder unter ungarische Herrschaft stellt. \n\nDas Gebiet war nach dem Ersten Weltkrieg [ROM.GetNameDef] zugesprochen worden, was zu einem erbitterten Streit führte. \n\nSind dies die ersten von vielen Grenzänderungen, die nun, da in Europa eine neue Ordnung etabliert zu sein scheint, vorgenommen werden?"
 news.17.t:0 "Rumänien lehnt deutsches Schiedsverfahren ab"
 news.17.d:0 "Die Verhandlungen zwischen [HUN.GetNameDef] und [ROM.GetNameDef] über einen Territorialstreit sind in Wien gescheitert. \n\n[GER.GetNameDef] fungierte als Schiedsrichter, doch als sie beschlossen, Nordsiebenbürgen an [HUN.GetNameDef] zurückzugeben, lehnte [ROM.GetNameDef] die Entscheidung ab. Die rumänische Regierung befahl ihrer Delegation umgehend, nach Bukarest zurückzukehren. \n\nEs scheint, dass [GER.GetNameDef] noch nicht den diplomatischen Einfluss ausübt, den sie sich vorgestellt hatte."
 news.17.a:0 "Interessant..."
 news.17.b:0 "Die Rumänen haben uns blamiert ..."
 news.17.c:0 "Siebenbürgen gehört uns!"
 news.17.e:0 "Das ist noch nicht vorbei."
 news.18.d:0 "Die Verhandlungen zwischen [HUN.GetNameDef] und [ROM.GetNameDef] über einen Territorialstreit sind in Wien gescheitert. \n\n[GER.GetNameDef] fungierte als Schiedsrichter, doch als sie beschlossen, Nordsiebenbürgen an [HUN.GetNameDef] zurückzugeben, lehnte [ROM.GetNameDef] die Entscheidung ab. Die rumänische Regierung befahl ihrer Delegation umgehend, nach Bukarest zurückzukehren. \n\nEs scheint, dass [GER.GetNameDef] noch nicht den diplomatischen Einfluss ausübt, den sie sich vorgestellt hatten."
 news.19.t:0 "[GER.GetNameDefCap] Claims Memel"
 news.19.d:0 "Während die deutschen Truppen an der Grenze zum Angriff bereitstehen, hat [LIT.GetNameDef] einem Ultimatum von [GER.GetAdjective] nachgegeben, das die Übergabe des alten preußischen Memelgebiets forderte.\n\nEs wurde durch den Versailler Vertrag an [LIT.GetNameDef] übertragen, ist nun aber wieder in die Region Ostpreußen integriert worden. \n\nHaben wir das Ausmaß deutscher territorialer Ambitionen in Europa bereits erreicht? Experten bezweifeln dies ..."
 news.19.a:0 "Ein weiterer Stapel veralteter Karten."
 news.19.b:0 "Die Deutschen müssen überall vereint sein."
 news.19.c:0 "Wenn wir nur die Mittel hätten, Widerstand zu leisten ..."
 news.19.e:0 "Sie tun gut daran, sich vor ihren Vorgesetzten zu verneigen!"
 news.20.t:0 "[LIT.GetNameDefCap] weist deutsche Forderungen zurück"
 news.20.d:0 "Trotz der deutschen Truppenaufstellung an der Grenze hat [LIT.GetNameDef] ein Ultimatum Berlins zur Rückgabe des Memelgebiets abgelehnt. \n\nMemel gehörte einst zu Ostpreußen, wurde aber nach dem Versailler Vertrag von [LIT.GetNameDef] annektiert. Die [LIT.GetAdjective]-Regierung lehnte die Integrität des Vertrags ab, den sie zu schützen wünschte. \n\nInternationale Beobachter erwarten nun, dass Deutschland versuchen könnte, das Gebiet mit Gewalt einzunehmen..."
 news.20.a:0 "Sehr mutig."
 news.20.b:0 "Sie haben ihr Todesurteil unterzeichnet."
 news.20.c:0 "Hier muss eine Grenze gezogen werden!"
 news.21.t:0 "Vertrag von Craiova"
 news.21.d:0 "[ROM.GetNameDef] wurden weitere Zugeständnisse aufgezwungen, wobei [BUL.GetNameDef] die südliche Dobrudscha zurückeroberte. \n\nDas Gebiet wurde 1913 nach dem Zweiten Balkankrieg von Rumänien annektiert und ist noch immer hauptsächlich von ethnischen Bulgaren und Türken bewohnt.\n\nUngeachtet der Begründung ist [ROM.GetNameDef] nun deutlich geschwächt."
 news.21.a:0 "Wenig besorgniserregend."
 news.21.b:0 "Das ist ein großer Sieg."
 news.21.c:0 "Dieses Land war sowieso wertlos."
 news.22.t:0 "Zog unterwirft sich Italien"
 news.22.d:0 "Italienische Diplomaten haben der albanischen Regierung ein Ultimatum gestellt, in dem sie die vollständige militärische Besetzung Albaniens fordert. \n\nKönig Zog dankte ab, nachdem er die Sinnlosigkeit jeglichen Widerstands erkannt hatte. Albanien wird nun in Personalunion unter König Viktor Emanuel III. regiert.\n\n[ITA.GetNameDef] blickt auf den Balkan..."
 news.22.a:0 "Ein weiteres Opfer von Mussolinis Ambitionen."
 news.22.b:0 "Wir sind der Verwirklichung unseres großen Reiches einen Schritt näher gekommen."
 news.22.c:0 "Ein weiterer Sieg für unseren Freund [From.GetLeader]!"
 news.23.t:0 "Zog Defiant"
 news.23.d:0 "Diplomaten aus [ITA.GetNameDef] haben [ALB.GetNameDef] ein Ultimatum gestellt und dessen Anschluss an Großitalien gefordert. \n\nIn einem mutigen Akt nationaler Führung hat sich König Zog geweigert, den italienischen Forderungen nachzugeben und das albanische Volk aufgefordert, dem Druck von [ITA.GetNameDef] zu widerstehen. \n\nDennoch sind sich ausländische Militärexperten einig, dass [ALB.GetNameDef] kaum eine Chance hat, einer Invasion Widerstand zu leisten."
 news.23.a:0 "Wie lange kann [ALB.GetNameDef] sich wehren?"
 news.23.b:0 "Dies wird eine kurze Kampagne sein."
 news.23.c:0 "Lang lebe König Zog!"
 news.24.t:0 "Die polnische Frage"
 news.24.d:0 "In einer hitzigen Rede vor dem Reichstag verurteilte [GER.GetLeader] heute Polen und dessen Behandlung der in Danzig und im Polnischen Korridor lebenden Deutschen. \n\nMit der Behauptung, die deutschen Minderheiten in Polen würden „auf die abscheulichste Art und Weise verfolgt, die man sich vorstellen kann“, machte [GER.GetLeader] die Position seiner Regierung deutlich:\n„Danzig war eine deutsche Stadt und ist eine deutsche Stadt! Der Korridor war deutsch und ist deutsch! Ohne das deutsche Volk würden diese östlichen Regionen noch immer in die Tiefen der Barbarei versinken.“"
 news.24.a:0 "Der Krieg rückt näher."
 news.25.t:0 "Die Remilitarisierung des Rheinlandes"
 news.25.d:0 "Deutschland hat Truppen im Rheinland nahe der französischen Grenze stationiert und damit klar gegen den Versailler Vertrag verstoßen. Die Bevölkerung jubelte den deutschen Soldaten zu, während die diplomatischen Reaktionen aus Frankreich und Großbritannien bislang verhalten ausfielen. „Die Deutschen begeben sich in ihren eigenen Hinterhof“, bemerkte ein britischer politischer Kommentator."
 news.25.a:0 "Besorgniserregend."
 news.25.b:1 "Es ist deutsches Territorium."
 news.25.c:0 "Wir müssen uns um unsere Grenzverteidigung kümmern."
 news.25.e:0 "Sicherlich kein Grund zur Aufregung."
 news.26.d:0 "In direktem Verstoß gegen den Versailler Vertrag haben deutsche Truppen den Rhein überquert und sind in das Rheinland nahe der französischen Grenze eingedrungen.\n\nFrankreich und Großbritannien bezeichneten dies als „unverzeihlichen Bruch“ des Friedensvertrags, der den Ersten Weltkrieg beendete, und mobilisierten ihre Streitkräfte für einen bewaffneten Einmarsch in Deutschland. \n\nIn Europa ist erneut Krieg ausgebrochen!"
 news.26.a:0 "Jetzt geht das schon wieder los!"
 news.26.b:0 "Deutschland wird siegen!"
 news.26.c:0 "Nächster Halt: Berlin!"
 news.26.e:0 "Dann lasst uns das klären."
 news.27.d:0 "In direktem Verstoß gegen den Versailler Vertrag haben deutsche Truppen den Rhein überquert und sind in das Rheinland nahe der französischen Grenze einmarschiert.\n\nWährend die Reaktion Großbritanniens bislang verhalten ausfällt, mobilisieren die Franzosen ihre Streitkräfte, um einen bewaffneten Einmarsch in Deutschland vorzubereiten. \n\nIn Europa ist erneut Krieg ausgebrochen!"
 news.28.t:0 "Hitler ermordet!"
 news.28.d:0 "Eine Gruppe kriegsgegnerischer Wehrmachtsoffiziere hat in Berlin einen Putsch gestartet. Eine unbekannte Gruppe bewaffneter Männer stürmte die Reichskanzlei und tötete nach einer Schießerei mit den Leibwächtern den deutschen Führer. Die überlebenden Verschwörer wurden alle von der Gestapo verhaftet, und heute Morgen wurde Heinrich Himmler als neuer Führer des Deutschen Reiches vereidigt. In einer Rede vor dem Reichstag beschuldigte Himmler Großbritannien und Frankreich, hinter Hitlers Ermordung zu stecken, und bekräftigte Deutschlands klares Bekenntnis zur völligen Vernichtung beider Nationen."
 news.28.a:0 "Eine interessante Entwicklung."
 news.28.b:0 "Sie werden bezahlen!"
 news.28.c:0 "Wenigstens ist Hitler weg."
 news.29.d:0 "Eine Gruppe kriegsgegnerischer Wehrmachtsoffiziere hat in Berlin einen Putsch gestartet. Eine unbekannte Gruppe bewaffneter Männer stürmte die Reichskanzlei und tötete nach einer Schießerei mit seinen Leibwächtern den deutschen Führer. Die überlebenden Verschwörer wurden alle von der Gestapo verhaftet, und heute Morgen wurde Hermann Göring als neuer Führer des Deutschen Reiches vereidigt. In einer Rede vor dem Reichstag beschuldigte Göring Großbritannien und Frankreich, hinter Hitlers Ermordung zu stecken, und bekräftigte Deutschlands klares Bekenntnis zur völligen Vernichtung beider Nationen."
 news.30.t:0 "Gescheiterter Attentat auf Hitler"
 news.30.d:0 "Eine Gruppe kriegsgegnerischer Wehrmachtsoffiziere hat in Berlin einen Putsch gegen Hitler gestartet. Eine unbekannte Gruppe bewaffneter Männer stürmte die Reichskanzlei, wurde jedoch von Mitgliedern der SS-Leibwache des Führers erfolgreich zurückgeschlagen.\nGestapo-Agenten haben alle Verschwörer festgenommen, darunter hochrangige Offiziere wie Ludwig Beck und Wilhelm Canaris. \n\nIn einer Rede vor dem Reichstag schwor Hitler Rache an Frankreich und Großbritannien für die Planung dieses „hinterhältigen Attentats“ auf sein Leben."
 news.30.a:0 "Stellen Sie sich vor, sie hätten Erfolg gehabt ..."
 news.30.c:0 "Das ändert nichts."
 news.30.e:0 "Schade, dass sie das Miststück nicht erwischt haben!"
 news.31.t:0 "Bürgerkrieg in Deutschland!"
 news.31.d:0 "Eine Gruppe kriegsfeindlicher Wehrmachtsoffiziere hat in Berlin einen Putsch gegen Hitler gestartet. Eine unbekannte Gruppe bewaffneter Männer stürmte die Reichskanzlei und liquidierte den deutschen Führer nach einem heftigen Feuergefecht mit seinen SS-Leibwächtern. Den Verschwörern gelang es, den größten Teil Berlins unter ihre Kontrolle zu bringen, und viele Wehrmachtseinheiten sind auf ihre Seite übergelaufen. Nazitreue Kräfte haben sich unter neuer Führung neu formiert und geschworen, Deutschland von den „kommunistischen Dissidenten und ausländischen Agenten, die Berlin derzeit besetzen“, zu säubern."
 news.31.a:0 "Interessant."
 news.31.b:0 "Deutschland muss frei von Tyrannei sein!"
 news.31.c:0 "Tod den Verrätern!"
 news.31.e:0 "Das ist zu unserem Vorteil!"
 news.32.t:0 "Der Molotow-Ribbentrop-Pakt"
 news.32.d:0 "Diplomaten aus Deutschland und der Sowjetunion schlossen heute mit der Unterzeichnung des Molotow-Ribbentrop-Pakts ein Abkommen, das Beobachter als historisch bezeichnen. \nDieser nach dem deutschen Außenminister Joachim von Ribbentrop und seinem sowjetischen Amtskollegen Wjatscheslaw Molotow benannte Nichtangriffspakt legt fest, dass sich keine der beiden Seiten mit dem Feind der anderen Seite verbündet oder ihm hilft.\n\nAusländische Diplomaten warnen, dass dieser Vertrag Deutschland faktisch freie Hand gibt, in Europa Krieg zu führen, ohne eine sowjetische Intervention fürchten zu müssen."
 news.32.a:0 "Das kann nicht gut sein ..."
 news.32.b:0 "Ein Toast auf unsere neuen bolschewistischen Freunde!"
 news.32.c:0 "Ein Toast auf unsere neuen deutschen Freunde!"
 news.32.e:0 "Auf eine lange und fruchtbare Freundschaft!"
 news.33.t:0 "Die UdSSR besetzt Ostpolen"
 news.33.d:0 "Sowjetische Truppen haben Ostpolen besetzt, offiziell mit dem Ziel, die weißrussische und ukrainische Minderheit vor dem Chaos zu schützen, das auf den Zusammenbruch der polnischen Regierung folgte. \n\nDie deutschen Streitkräfte haben sich geordnet aus diesen Gebieten zurückgezogen, was zur faktischen Teilung Polens zwischen den beiden Mächten führte."
 news.33.a:0 "Eine wahrscheinliche Geschichte!"
 news.33.b:0 "Genießt es, solange es dauert, Bolschewiken …"
 news.33.c:0 "Die Grenzen des Kommunismus rücken vor!"
 news.34.t:0 "Der zweite Waffenstillstand von Compiégne"
 news.34.d:0 "Ein Waffenstillstand zwischen [From.GetName] und der Dritten Französischen Republik wurde in Compiégne unterzeichnet, in demselben Eisenbahnwaggon, in dem die deutsche Kapitulation im Ersten Weltkrieg ausgehandelt wurde.\n\nGemäß den Bedingungen des Waffenstillstands wird eine französische Regierung unter [vichy_france.GetLeader] mit Sitz in Vichy weiterhin den größten Teil Südfrankreichs verwalten, während der Rest des Landes unter deutsche Besatzungszone fällt. \n\nEinige französische Offiziere haben geschworen, den Widerstand aus dem Ausland fortzusetzen, aber dies beendet die Kämpfe in Frankreich zumindest vorerst."
 news.34.a:0 "Verstörend"
 news.34.b:0 "Exzellent!"
 news.34.c:0 "Der Kampf geht weiter!"
 news.35.t:0 "Die Geburt der französisch-britischen Union"
 news.35.d:0 "Angesichts der Niederlage in Frankreich haben die französische und die britische Regierung beschlossen, ihre beiden Nationen zu vereinen, bis der Sieg über Deutschland gesichert ist. \n\nIn London wird eine neue gemeinsame Regierung gebildet, wobei Eduard VIII. das Staatsoberhaupt bleibt. In einer veröffentlichten „Unionserklärung“ erklärte das neue gemeinsame Kriegskabinett:\n\n„Frankreich und Großbritannien sollen nicht länger zwei Nationen sein, sondern eine französisch-britische Union. Die Verfassung der Union sieht gemeinsame Organe für Verteidigung, Außen-, Finanz- und Wirtschaftspolitik vor. Jeder Bürger Frankreichs oder Großbritanniens genießt die unmittelbare Staatsbürgerschaft des anderen Staates.“"
 news.35.a:0 "Die Franzosen müssen verzweifelt gewesen sein"
 news.35.b:0 "Glauben sie, dass sie unter einer anderen Flagge sicher wären?"
 news.35.c:0 "Vereint gegen den gemeinsamen Feind!"
 news.36.t:0 "Der Anschluss Österreichs"
 news.36.d:0 "Nach einem erfolgreichen Staatsstreich der NSDAP in Wien haben deutsche Truppen die österreichische Grenze überschritten und die Kontrolle über das Land übernommen. \n\nEs wurden keine Kampfhandlungen gemeldet, und die deutschen Soldaten wurden in den Städten von jubelnden Menschenmengen begrüßt.\n\nIn einer Rede vor einer riesigen Menschenmenge auf dem Heldenplatz in Wien verkündete Hitler den Anschluss Österreichs an Deutschland:\n\n„Die älteste Ostprovinz des deutschen Volkes soll von nun an die neueste Bastion des Deutschen Reiches sein!“"
 news.36.a:0 "Wenn sie das wünschen ..."
 news.36.b:0 "Willkommen im Reich!"
 news.36.c:0 "Wir müssen unsere Nordgrenzen sichern!"
 news.36.e:0 "Dies verstößt gegen den Versailler Vertrag!"
 news.37.t:0 "Die Ermordung Leo Trotzkis"
 news.37.d:0 "Leo Trotzki, einst Oberbefehlshaber und mutmaßlicher Erbe Lenins, starb heute in einem Krankenhaus in Mexiko-Stadt. Er wurde in seinem Haus von einem spanischen Staatsbürger, der vermutlich beim NKWD arbeitete, mit einem Eispickel angegriffen. Nach einem gescheiterten Machtkampf mit Josef Stalin und seinen Verbündeten um die Kontrolle über die Kommunistische Partei der Sowjetunion verbrachte Trotzki die 1930er Jahre im Exil und lebte in der Türkei, Frankreich und Norwegen, bevor er sich schließlich in Mexiko niederließ. Er blieb ein ständiger Kritiker Stalins und des „degenerierten Arbeiterstaates“ Sowjetunion."
 news.37.a:0 "Barbarisch."
 news.37.b:0 "Mission erfüllt."
 news.37.c:0 "Ein würdiges Ende für diesen Aufwiegler."
 news.38.t:0 "Trotzki überlebt Attentat"
 news.38.d:0 "Nach einem gewalttätigen Kampf in seinem Haus in Mexiko-Stadt tötete Leo Trotzki heute einen Attentäter mit dem Eispickel, mit dem dieser ihn angreifen wollte. Der Mörder wurde als spanischer Staatsbürger identifiziert, der vermutlich im Dienst des NKWD stand.\n\nTrotzki war einst der oberste Stellvertreter und mutmaßliche Erbe Wladimir Lenins, wurde jedoch nach einem gescheiterten Machtkampf von Josef Stalin ins Exil aus der Sowjetunion gezwungen..\n\nVor der Presse verurteilte Trotzki den Anschlag auf sein Leben als „ein weiteres feiges Komplott Stalins, um seine Kritiker zum Schweigen zu bringen“."
 news.38.a:0 "Interessant."
 news.38.b:0 "Dieser Wurm!"
 news.39.t:0 "Trotzki an der sowjetischen Grenze getötet"
 news.39.d:0 "Die sowjetischen Behörden haben Fotos der Leiche Leo Trotzkis veröffentlicht und damit Gerüchte bestätigt, dass er vor kurzem getötet wurde, als er versuchte, sich nach [SOV.GetNameDef] einzuschleichen. \n\nSeine Leiche wurde an den Ufern des Flusses Atrek gefunden, der entlang der sowjetisch-persischen Grenze verläuft.\n\nEs wird angenommen, dass Trotzki versuchte, aus den gegenwärtigen Unruhen in der UdSSR Kapital zu schlagen, indem er Verbündete gegen seinen langjährigen Rivalen Stalin suchte und ihn durch einen Staatsstreich ablöste."
 news.39.a:0 "Interessant."
 news.39.b:0 "Zumindest eine Bedrohung weniger."
 news.40.t:0 "Trotzki startet einen Putsch!"
 news.40.d:0 "In der provisorischen Hauptstadt der Sowjetunion ist ein gewaltsamer Machtkampf ausgebrochen. Leo Trotzki scheint sich heimlich in die Reste der UdSSR eingeschlichen zu haben und beendete damit sein langes Exil. \n\nGemeinsam mit Verbündeten in den höchsten Rängen der Kommunistischen Partei gelang ihm ein erfolgreicher Putsch gegen Stalin.\n\nNach einem kurzen Prozess vor einem Volksgericht wurde Stalin zum Tode durch den Strang verurteilt. Das Urteil wurde heute Morgen vollstreckt."
 news.40.a:0 "Das war unerwartet."
 news.40.b:0 "Es lebe Genosse Trotzki!"
 news.41.t:0 "Trotzkis Ende"
 news.41.d:0 "Leo Trotzki wurde heute Morgen tot in einem Hotelzimmer in Buenos Aires aufgefunden. \n\nEr wurde offenbar mit einer Bergschlinge erwürgt. Der Mörder wurde von Trotzkis Leibwächtern festgenommen, bevor er das Gebäude verlassen konnte. \n\nObwohl der Mörder portugiesischer Staatsbürger ist, gibt es Hinweise, die ihn mit dem sowjetischen Geheimdienst GRU in Verbindung bringen. Es scheint, als hätte Stalin seinem alten Rivalen endlich einen tödlichen Schlag versetzt."
 news.42.t:0 "Die Hindenburg-Katastrophe"
 news.42.d:0 "Das deutsche Passagierluftschiff Hindenburg wurde heute beim Andocken am US-Marinestützpunkt Lakehurst zerstört. Aus noch ungeklärten Gründen geriet das Luftschiff in Flammen und stürzte ab. 35 Menschen kamen dabei ums Leben.\n\nAufgrund der Knappheit und der Kosten von Helium sowie des US-amerikanischen Exportverbots wurde die Hindenburg, wie alle deutschen Passagierluftschiffe, schließlich auf Wasserstoff umgestellt, der zwar für mehr Auftrieb sorgt, aber auch entflammbar ist. \n\nDa das Vertrauen der Öffentlichkeit durch diese Katastrophe erschüttert wurde und immer schnellere Passagierflugzeuge auf den Markt kamen, könnte dies das Ende der Luftschiff-Ära bedeuten."
 news.42.a:0 "Oh, die Menschlichkeit!"
 news.43.t:0 "Hindenburg-Zwischenfall"
 news.43.d:0 "Eine Katastrophe konnte heute nur knapp abgewendet werden, als beim Anlegen des deutschen Passagierluftschiffs Hindenburg am US-Marinestützpunkt Lakehurst ein Dieselleck entdeckt wurde. Das Leck wurde umgehend repariert. Wäre es unbemerkt geblieben, hätten brennbare Dämpfe einen Brand auslösen können, der das gesamte Luftschiff erfasst hätte. Kritiker zweifeln schon lange an der Zweckmäßigkeit von Passagierluftschiffen angesichts ihrer lückenhaften Sicherheitsbilanz, und dieser Vorfall wird ihre Kritik sicherlich noch lauter werden lassen."
 news.43.a:0 "Eine knappe Entscheidung."
 news.44.t:0 "Die Flucht von Rudolf Heß"
 news.44.d:0 "Stellvertretender Führer Rudolf Heß wurde gestern in Schottland von Soldaten der britischen Heimatschutztruppe verhaftet, nachdem er mit dem Fallschirm aus einem schweren Kampfflugzeug abgesprungen war. \n\nAls erfahrener Pilot flog er offenbar allein über die Nordsee und achtete darauf, außerhalb der Radarreichweite zu bleiben, bevor er westwärts Richtung Großbritannien abdrehte. \nHeß scheint es auf sich genommen zu haben, einen Friedensvertrag zwischen Großbritannien und Deutschland auszuhandeln, obwohl Berlin ihn als Verrückten denunziert und ihm alle politischen Ämter entzogen hat. \n\nDie britischen Behörden waren für eine Stellungnahme nicht erreichbar."
 news.44.a:0 "Interessant."
 news.44.b:0 "Wahnsinn!"
 news.44.c:0 "Auf zum Tower of London mit ihm!"
 news.45.t:0 "Der Tod von Rudolf Heß"
 news.45.d:0 "Stellvertretender Führer Rudolf Heß kam gestern ums Leben, als die Royal Air Force seinen schweren Jäger vor der Küste Schottlands abfing. \n\nDer genaue Zweck seiner Mission ist unklar. Obwohl Heß ein erfahrener Pilot war, flog er allein, und sein Flugzeug scheint nicht bewaffnet gewesen zu sein. \nSeine sterblichen Überreste wurden von den britischen Behörden geborgen, in Berlin ist jedoch ein Staatsbegräbnis mit leerem Sarg geplant. \n\nHitler soll sichtlich verzweifelt über den Tod seines alten Freundes gewesen sein."
 news.45.a:0 "Interessant."
 news.45.b:0 "Dieser arme Narr."
 news.45.c:0 "Was machte er hier?"
 news.46.d:0 "Das Luftschiff Hindenburg erlebte heute ein dramatisches Ende, als es über Schottland explodierte. \nEs scheint von Stellvertreter Rudolf Heß gekapert worden zu sein, der es im Alleingang über die Nordsee fliegen konnte, um in persönlicher Mission mit Großbritannien Frieden zu verhandeln.\nBritische Radarstationen konnten das riesige Flugzeug problemlos orten, und mehrere Geschwader der Royal Air Force wurden sofort auf seine Position angesetzt. Als die Hindenburg nicht über Funk reagierte, eröffneten sie das Feuer. \n\nHeß konnte sich mit dem Fallschirm retten und sitzt nun im Tower von London."
 news.47.d:0 "Das Luftschiff Hindenburg erlebte heute ein dramatisches Ende, als es über Schottland explodierte. \nEs scheint von Stellvertreter Rudolf Heß gekapert worden zu sein, der es im Alleingang über die Nordsee fliegen konnte, um mit Großbritannien Frieden zu verhandeln. \nBritische Radarstationen konnten das gewaltige Flugzeug problemlos orten, und mehrere Geschwader der Royal Air Force wurden sofort auf seine Position angesetzt. Als die Hindenburg nicht über Funk reagierte, eröffneten sie das Feuer. \n\nDie sterblichen Überreste von Heß wurden in den Trümmern gefunden."
 news.47.b:0 "Dieser Verrückte ..."
 news.47.c:0 "Was hoffte er zu erreichen?"
 news.48.t:0 "Amelia Earhart verschwindet"
 news.48.d:0 "Die berühmte Pilotin Amelia Earhart, die erste Frau, die den Atlantik im Alleinflug überquerte, ist zusammen mit ihrem Navigator Fred Noonan in der Nähe der Howlandinsel mitten im Pazifischen Ozean verschwunden.\n\nDie beiden versuchten mit ihrer zweimotorigen Lockheed Electra die ganze Welt zu umrunden, als sie verschwanden..\n\nDie US-Marine und die Küstenwache suchen derzeit nach den vermissten Piloten, doch es besteht wenig Hoffnung, sie zu finden."
 news.48.a:0 "Ein Verlust für die Luftfahrt."
 news.49.t:0 "Amelia Earhart umsegelt die Welt"
 news.49.d:0 "Die berühmte Fliegerin Amelia Earhart, vielen bekannt als die „Königin der Lüfte“, hat zusammen mit ihrem Navigator Fred Noonan eine Weltumrundung absolviert. \n\nNach einem kurzen Schrecken, als sich die beiden beim Anflug auf die Howlandinsel im Pazifik vorübergehend verirrten, verlief der Flug ohne Zwischenfälle und heute Morgen landete ihre Lockheed Electra in Oakland, Kalifornien.\n\nNächste Woche findet im Weißen Haus eine Zeremonie statt, bei der Earhart vom Präsidenten persönlich zu ihrer Leistung gratuliert werden soll."
 news.49.a:0 "Eine beachtliche Leistung!"
 news.55.t:0 "Anglo-Polnische Allianz"
 news.55.d:0 "Angesichts des jüngsten aggressiven Verhaltens Deutschlands sahen sich Großbritannien und Frankreich gezwungen, ein Militärbündnis mit Polen zu schließen. Der britische Premierminister gab im Unterhaus folgende Erklärung ab: „Im Falle einer Aktion, die die polnische Unabhängigkeit eindeutig bedroht und der die polnische Regierung daher mit ihren nationalen Streitkräften Widerstand leisten muss, fühlt sich die Regierung Seiner Majestät verpflichtet, der polnischen Regierung unverzüglich jede in ihrer Macht stehende Unterstützung zu gewähren. Sie hat der polnischen Regierung eine entsprechende Zusicherung gegeben.“"
 news.55.a:0 "Jetzt geht es schnell voran."
 news.55.b:0 "Sie bluffen!"
 news.55.c:0 "Wir stehen an der Seite Polens."
 news.55.e:0 "Die Deutschen werden es jetzt nicht wagen anzugreifen!"
 news.55.f:0 "Wir stehen an der Seite unserer Verbündeten."
 news.56.t:0 "Das Münchner Abkommen"
 news.56.d:1 "Die deutschen Forderungen nach dem Sudetengebiet in der Tschechoslowakei, in dem eine beträchtliche deutsche Minderheit lebt, haben zugenommen. \n\nBei einem Gipfeltreffen in München versuchten Deutschland, Großbritannien, Frankreich und Italien, eine diplomatische Lösung für die sogenannte „Sudetenkrise“ zu finden. Die Tschechoslowakei war nicht eingeladen. Es wurde eine Vereinbarung erzielt, wonach Deutschland das Sudetenland annektiert, aber keine weiteren Gebietsgewinne in Europa anstrebt.\n\nHerr Chamberlain sprach vor den Menschenmengen in London:\n„Zum zweiten Mal ist ein Premierminister aus Deutschland zurückgekehrt und hat ehrenvollen Frieden gebracht. Ich glaube, es ist Frieden für unsere Zeit.“"
 news.56.a:0 "Also kein Krieg dieses Jahr."
 news.56.b:0 "Zumindest für den Moment Ruhe ..."
 news.56.c:0 "Ein weiterer Weltkrieg ist uns erspart geblieben."
 news.56.e:0 "Dies ist keine Vereinbarung, sondern ein Diktat!"
 news.57.t:0 "Die Sudetenkrise"
 news.57.d:0 "Die deutschen Forderungen nach dem Sudetengebiet in der Tschechoslowakei, wo eine beträchtliche deutsche Minderheit lebt, haben sich in letzter Zeit verschärft. \n\nBei einem Gipfeltreffen in München versuchten Deutschland, Großbritannien, Frankreich und Italien, eine diplomatische Lösung für die sogenannte „Sudetenkrise“ zu finden. \n\nDie Gespräche scheinen jedoch gescheitert zu sein, da sowohl Großbritannien als auch seine Verbündeten Deutschland eindringlich davor warnten, dass ein Überschreiten der tschechoslowakischen Grenze durch deutsche Truppen zu Krieg führen würde. \n\nDie Zeit für eine friedliche Lösung des Konflikts scheint knapp zu werden."
 news.57.a:0 "Es sieht aus, als würde es Krieg geben!"
 news.57.b:0 "Narren!"
 news.57.c:0 "Es ist Zeit, Stellung zu beziehen."
 news.57.e:0 "Lasst die Deutschen kommen!"
 news.58.d:0 "Die deutschen Forderungen nach dem Sudetengebiet in der Tschechoslowakei, wo eine beträchtliche deutsche Minderheit lebt, haben sich in letzter Zeit verschärft. \n\nBei einem Gipfeltreffen in München versuchten Deutschland, Großbritannien, Frankreich und Italien, eine diplomatische Lösung für die sogenannte „Sudetenkrise“ zu finden. \n\nZwischen Frankreich und Großbritannien hat sich ein Zerwürfnis aufgetan. Großbritannien akzeptiert die deutschen Ansprüche als angemessen, Frankreich hingegen nicht. Frankreich hat ein neues Bündnis mit den Tschechen geschlossen und Deutschland mit Krieg gedroht, sollten seine Truppen die tschechoslowakische Grenze verletzen."
 news.58.b:0 "Mit den Franzosen werden wir uns schon noch befassen."
 news.58.c:0 "Diesmal sind die Franzosen auf sich allein gestellt."
 news.58.e:0 "Die Deutschen würden es jetzt nicht wagen, anzugreifen, oder?"
 news.58.f:0 "Die freie Welt ist auf uns angewiesen."
 news.59.t:0 "Das Münchner Diktat"
 news.59.d:0 "Die deutschen Forderungen nach dem Sudetengebiet in der Tschechoslowakei, wo eine beträchtliche deutsche Minderheit lebt, haben sich in letzter Zeit verschärft. \n\nBei einem Gipfeltreffen in München versuchten Deutschland, Großbritannien, Frankreich und Italien, eine diplomatische Lösung für die sogenannte „Sudetenkrise“ zu finden. \n\nWährend Großbritannien und Frankreich die deutschen Forderungen als angemessen akzeptierten, weigerte sich die Tschechoslowakei, die nicht zur Konferenz eingeladen war, auch nur einen Zentimeter nachzugeben. \n\nSie steht nun Deutschland allein gegenüber und führt einen scheinbar aussichtslosen Kampf."
 news.59.a:0 "Für die Tschechen sieht es düster aus."
 news.59.b:0 "Hartnäckige Narren."
 news.59.c:0 "Wir werden niemals aufgeben!"
 news.60.t:0 "Das Schicksal der Tschechoslowakei"
 news.60.d:0 "Deutsche Truppen sind in Böhmen und Mähren einmarschiert, angeblich um nach dem Zusammenbruch der tschechoslowakischen Regierung die Ordnung in den Regionen wiederherzustellen. \n\nIn Prag verkündeten die Besatzungsmächte die Schaffung eines „autonomen Protektorats“ innerhalb des Deutschen Reiches.\n\nMit deutscher Unterstützung wurde die Slowakei unter der Führung von Jozef Tiso für unabhängig erklärt. Die Tschechoslowakei existiert nicht mehr."
 news.60.d_2:0 "Nach der deutschen Annexion der Tschechoslowakei wurde weiterhin über die Aufteilung dieser Gebiete diskutiert. Nun scheint man zu einer Einigung gekommen zu sein.\n\nMit deutscher Unterstützung wurde die Slowakei unter der Führung von Jozef Tiso für unabhängig erklärt."
 news.60.a:0 "So viel zum Thema Frieden."
 news.60.b:0 "Die Tschechen müssen vor sich selbst geschützt werden."
 news.60.c:0 "Das ist nicht unsere Abmachung!"
 news.60.e:0 "Ungarn wird zu seinem früheren Glanz zurückkehren!"
 news.61.d:0 "Deutsche Truppen sind kürzlich in Böhmen und Mähren einmarschiert, angeblich um nach dem Zusammenbruch der tschechoslowakischen Regierung die Ordnung in den Regionen wiederherzustellen. \n\nIn Prag verkündeten die Besatzungstruppen die Schaffung eines „autonomen Protektorats“ innerhalb von [GER.GetNameDef]. Ungarische Truppen sind mit deutschem Einverständnis in die Slowakei einmarschiert und haben sie Ungarn einverleibt. \n\nDie Tschechoslowakei existiert nicht mehr."
 news.61.d_2:0 "Nach der deutschen Annexion der Tschechoslowakei wurde weiterhin darüber diskutiert, wie diese Gebiete aufgeteilt werden sollten. Nun scheint man zu einer Einigung gekommen zu sein.\n\nUngarische Streitkräfte sind mit Zustimmung Deutschlands in die Slowakei einmarschiert und haben sie Ungarn einverleibt."
 news.62.d:0 "Deutsche Truppen drangen kürzlich in Böhmen und Mähren ein, angeblich um nach dem Zusammenbruch der tschechoslowakischen Regierung die Ordnung in den Regionen wiederherzustellen. \n\nIn Prag verkündeten die Besatzungsmächte die Schaffung eines „autonomen Protektorats“ innerhalb des Deutschen Reichs.\n\nIn Bratislava wurde außerdem ein zweites Protektorat um die Slowakei herum ausgerufen. Die gesamte Tschechoslowakei wurde damit de facto von Deutschland annektiert."
 news.62.d_2:0 "Nach der deutschen Annexion der Tschechoslowakei wurde weiterhin über die Aufteilung dieser Gebiete diskutiert. Nun scheint eine Einigung erzielt worden zu sein.\n\nDas annektierte Gebiet wurde in zwei Protektorate aufgeteilt, bleibt aber unter deutscher Kontrolle. In der Praxis hat sich wenig geändert, und Deutschland behält die gesamte Tschechoslowakei."
 news.63.t:0 "Der Spanische Bürgerkrieg"
 news.63.d:0 "In Spanien ist ein Bürgerkrieg ausgebrochen! Mehrere Generäle, die die derzeitige Regierung in Madrid stürzen wollen, haben ein Pronunciamento erlassen, und ein großer Teil der spanischen Streitkräfte ist ihrem Ruf zu den Waffen gefolgt. \n\nDiese rechtsgerichtete nationalistische Fraktion hat weite Teile Spaniens besetzt, einschließlich der Überseegebiete.\nLoyalistische Kräfte und Freiwillige haben sich unter der linksgerichteten republikanischen Regierung versammelt und sind entschlossen, dem Putsch bis zum letzten Atemzug Widerstand zu leisten. \n\nDie Schlacht um Spanien hat begonnen."
 news.63.a:0 "Was bedeutet das für Spanien?"
 news.63.b:0 "Zum Sieg!"
 news.64.t:0 "Das Ende des spanischen Bürgerkriegs"
 news.64.d:0 "Mit der Kapitulation der letzten republikanischen Hochburgen endete der Spanische Bürgerkrieg. \n\nDie Nationalisten siegten, und für Spanien begann eine neue Ära. \n\nDas vom Krieg zerrüttete Land hat unter den Kämpfen schwer gelitten, und es bleibt noch viel Wiederaufbauarbeit zu leisten."
 news.64.a:1 "Eine interessante Entwicklung."
 news.64.b:0 "Jetzt müssen wir unsere Nation heilen."
 news.65.a:0 "Gut für Spanien."
 news.65.d:0 "Mit der Kapitulation der letzten nationalistischen Truppen endete der Spanische Bürgerkrieg. \n\nDie Republikaner gingen als Sieger hervor, und für Spanien begann eine neue Ära. \n\nDas vom Krieg zerrüttete Land hat unter den Kämpfen schwer gelitten, und es bleibt noch viel Wiederaufbauarbeit zu leisten."
 news.66.t:0 "Die Spiele der XI. Olympiade"
 news.66.d:0 "Die elften Olympischen Spiele fanden kürzlich in Berlin statt. \n\nDie Olympischen Sommerspiele 1936, an denen Athleten aus 49 Nationen teilnahmen, waren die ersten in der Geschichte, die eine begrenzte Live-Übertragung im Fernsehen erlebten. Die Spiele waren ein bedeutender Propagandaerfolg für das deutsche Regime, das großzügig Geld für die Veranstaltung ausgab.\n\nDie deutschen Athleten waren mit 33 Goldmedaillen die erfolgreichsten, während die Amerikaner mit 24 Goldmedaillen den zweiten Platz belegten. Vier davon gingen an Jesse Owens, den erfolgreichsten Athleten der Spiele."
 news.66.d.b:0 "Die elften Olympischen Spiele fanden kürzlich in unbeschädigten Teilen des zerstörten und gerade wiederaufgebauten Berlins statt. Die Olympischen Sommerspiele 1936, an denen Athleten aus 49 verschiedenen Nationen aus aller Welt teilnahmen, waren die ersten in der Geschichte, die eine begrenzte Live-Übertragung im Fernsehen erlebten. Die Spiele, ein Symbol der wiederhergestellten deutschen nationalen Einheit, waren auch ein bedeutender Propagandaerfolg für das neue deutsche Regime, das trotz der enormen Kosten für den Wiederaufbau der Nation nach dem Bürgerkrieg großzügig für die Veranstaltung ausgab. Die deutschen Athleten waren mit 33 Goldmedaillen die erfolgreichsten, während die Amerikaner mit 24 Goldmedaillen den zweiten Platz belegten. Vier davon wurden von Jesse Owens gewonnen, dem erfolgreichsten Athleten der Spiele."
 news.66.a:0 "Die Spiele sind beendet."
 news.66.b:0 "Wir haben der Welt unsere beste Seite gezeigt."
 news.67.t:0 "Die Spiele der XII. Olympiade"
 news.67.d:0 "Die zwölften Olympischen Spiele fanden kürzlich in Tokio, Japan, statt. Angesichts der zunehmenden internationalen Spannungen befürchteten viele eine Absage der Spiele, doch dies bewahrheitete sich nicht. \n\nTokio ist die erste nicht-westliche Stadt, die die Olympischen Spiele ausrichtet, und ein speziell angefertigtes Langstreckenflugzeug vom Typ Me 261 brachte das Olympische Feuer ohne Auftanken aus Deutschland dorthin.\n\nDie japanischen Athleten zeigten eine gute Leistung und belegten mit 14 Goldmedaillen den dritten Platz in der Medaillenwertung nach Deutschland und den USA."
 news.68.d:0 "Die zwölften Olympischen Spiele fanden kürzlich in Helsinki, Finnland, statt. \n\nUrsprünglich sollten die Spiele in Tokio stattfinden, doch Japans anhaltende Kriegsanstrengungen machten dies unmöglich, und das Internationale Olympische Komitee vergab die Spiele stattdessen an Helsinki.\n\nAthleten aus den USA gewannen die meisten Medaillen, gefolgt von Deutschland und Italien. Finnland belegte mit zehn Goldmedaillen den vierten Platz."
 news.69.t:0 "Sowjetische Expansion in Europa"
 news.69.d:0 "Seit der Machtübernahme der [From.GetRulingParty] hat [From.GetNameDef] auf engere Beziehungen mit [SOV.GetNameDef] hingearbeitet und ist nun selbst der Union beigetreten.\n\nVor einigen Tagen hat die [From.GetAdjective]-Regierung die Kontrolle über das Land offiziell an [SOV.GetNameDef] als integrierte Oblast abgegeben.\n\nSowjetische Beamte weigern sich, die Beschreibungen der jüngsten Assimilation von [From.GetNameDef] als aggressiv anzuerkennen und behaupten, dass die „Integration des Territoriums“ ohne äußeren Druck erfolgt sei."
 news.69.a:0 "Sie haben Vernunft eingesehen."
 news.69.b:0 "[SOV.GetNameDefCap] wird erweitert."
 news.70.t:0 "Sowjetischer Einfluss in Europa"
 news.70.d:0 "Seit der Machtübernahme von [baltic_annexation.GetRulingParty] bemüht sich [baltic_annexation.GetNameDef] um engere Beziehungen zu [SOV.GetNameDef]. \n\nObwohl [baltic_annexation.GetLeader] weiterhin im Amt ist, werden Minister aufgrund ihrer Loyalität zu [SOV.GetNameDef] gewählt, und ein großer Teil der Souveränität des Landes wurde aufgegeben. Sowjetische Beamte erklären, dass [baltic_annexation.GetName] lediglich Schutz sucht, da Europa für kleinere Nationen zunehmend unsicherer wird. \n\n[SOV.GetNameDef] bekräftigte außerdem, dass sie bereit seien, diesen „Schutz“ jedem Staat zu gewähren, der sich von seinen Nachbarländern bedroht fühlt."
 news.100.t:0 "Der Fall Warschaus"
 news.100.d:0 "Den in [POL.GetNameDef] vorrückenden deutschen Truppen ist es gelungen, Warschau einzunehmen. \n\nIn Praga und einigen anderen Bezirken kommt es weiterhin sporadisch zu Kämpfen, doch der organisierte Widerstand in der Stadt scheint erloschen zu sein.\n\nBerichten zufolge evakuierte die polnische Regierung die Stadt, als die ersten deutschen Einheiten in die Vororte Warschaus einmarschierten. Ihr aktueller Standort ist unbekannt.\n\nIn anderen Teilen des Landes dauern die Kämpfe gegen die deutschen Invasoren an, doch der Verlust der Hauptstadt ist ein schwerer Schlag für die polnischen Kriegsanstrengungen."
 news.100.a:0 "Polen hatte keine Chance."
 news.100.b:0 "Ein weiterer Sieg für das Vaterland."
 news.100.c:0 "Das ist eine Katastrophe!"
 news.101.t:0 "Der Fall von Paris"
 news.101.d:0 "Während anderswo in [FRA.GetNameDef] noch immer gekämpft wird, gibt es Berichte über den Einmarsch deutscher Truppen in Paris. \n\nDie französischen Streitkräfte erklärten die Hauptstadt kurz vor dem Rückzug ihrer letzten Einheiten zur offenen Stadt. Mehrere Kolonnen deutscher Truppen stellten die preußische Siegesparade von 1871 nach, indem sie die Champs-Élysées entlangmarschierten, während die Pariser fassungslos zusahen. \n\nMilitärexperten prognostizieren, dass der Zusammenbruch von [FRA.GetNameDef] unmittelbar bevorsteht."
 news.101.a:0 "[GER.GetNameDefCap]-Armee scheint unaufhaltsam!"
 news.102.t:0 "Der Fall Londons"
 news.102.d:0 "Berichte aus London bestätigen die Einnahme der englischen Hauptstadt durch vorrückende deutsche Truppen. \n\nAus einigen Stadtteilen ist noch Kleinwaffenfeuer zu hören, doch innerhalb der Stadt wurden keine nennenswerten britischen Truppen gesichtet.\n\nEine Abteilung Fallschirmjäger hat den Buckingham Palace gestürmt, doch man geht davon aus, dass die königliche Familie schon lange vor dem Angriff evakuiert wurde. \n\nZum ersten Mal seit Wilhelm dem Eroberer ist London an einen ausländischen Invasor gefallen."
 news.103.t:0 "Der Fall Leningrads"
 news.103.d:0 "Leningrad, Geburtsort der Russischen Revolution, ist den vorrückenden deutschen Truppen zum Opfer gefallen. \n\nAus einigen Vororten sind noch vereinzelte Kämpfe zu hören, doch im Rest der zerstörten Stadt scheint sich eine seltsame Ruhe eingenistet zu haben.\n\nHeute marschierten Kolonnen deutscher Soldaten an der Isaakskathedrale vorbei, deren große Kuppel von Pionieren der Roten Armee grau gestrichen wurde, um die Aufmerksamkeit marodierender Bomber der Luftwaffe zu vermeiden. \nTrotz ihrer Bemühungen ist sie von Einschusslöchern und Granatsplittern durchsiebt."
 news.103.c:0 "Dafür wird jemand erschossen!"
 news.104.t:0 "Der Fall Kiews"
 news.104.d:0 "Kiew, die Hauptstadt der Ukrainischen SSR, wurde von den vorrückenden deutschen Armeen in der Sowjetunion eingenommen. \n\nDie Einnahme einer ihrer wichtigsten Städte ist ein schwerer Schlag für die Sowjets, doch es bleibt die Frage, ob die Deutschen ihren Vormarsch fortsetzen können. Kurz nach der Besetzung der Stadt durch die Deutschen wurden offenbar Tausende von Minen, die vom NKWD gelegt worden waren, in Gebäuden entlang der Hauptstraße Chreschtschatyk gezündet, was die bereits zerstörte Stadt noch weiter zerstörte.\n\nNun blicken die Invasionstruppen nach Osten."
 news.105.t:0 "Der Fall von Stalingrad"
 news.105.d:0 "Vorrückende deutsche Vorhuten haben Stalingrad, Stalins gleichnamige Stadt an den Ufern der Wolga, eingenommen. \n\nNachdem sie sich ihren Weg durch die zerstörte Stalingrader Traktorenfabrik gekämpft und die strategisch wichtigen Höhen des Mamajew-Kurgans erobert hatten, haben die Deutschen die letzten sowjetischen Verteidiger über die Wolga an ihr Ostufer gezwungen. Unbestätigten Berichten zufolge haben sich Reste der Roten Armee, die gemeinsam mit Partisanen kämpfen, in Abwasserkanäle und Keller zurückgezogen, um ihren Kampf fortzusetzen. \n\nEs wird jedoch angenommen, dass kein nennenswerter organisierter Widerstand mehr vorhanden ist."
 news.106.t:0 "Der Fall Moskaus"
 news.106.d:0 "Im Morgengrauen durchbrachen deutsche Panzer hastig errichtete Sperren in Moskaus Straßen, und auf dem Roten Platz wurden Halbkettenfahrzeuge beim Abladen von Panzergrenadieren beobachtet. \nDicker Rauch stieg von den zahlreichen Bränden in den Vororten auf, als deutsche Infanterie den Kreml stürmte. Berichten zufolge wurden Granaten und Flammenwerfer benötigt, um die hartnäckigen NKWD-Verbände zu bekämpfen, die jeden Zentimeter des Komplexes verteidigen wollten. Die russische Hauptstadt ist nun in deutscher Hand, aber sie ist nur noch eine brennende Ruine. \n\nUnbestätigten Berichten zufolge wurde Lenins einbalsamierter Leichnam sicher nach Osten evakuiert."
 news.106.a:0 "Ist dies das Ende der Sowjetunion?"
 news.106.b:0 "Endlich gehört Moskau uns!"
 news.106.c:0 "Die Faschisten müssen aus Moskau vertrieben werden!"
 news.107.t:0 "Der Fall von Sewastopol"
 news.107.d:0 "Die schwer befestigte Stadt Sewastopol, Stützpunkt der sowjetischen Schwarzmeerflotte, ist den deutschen Angriffen endgültig erlegen. \n\nIhr Verlust wird jeden sowjetischen Versuch, das Schwarze Meer zu erobern, erheblich behindern, und der Fall der Stadt wird als bedeutender deutscher Sieg angesehen.\n\nAus Berlin wurde bereits ein Erlass erlassen, der besagt, dass die Stadt fortan nach Theoderich dem Großen „Theodorichshafen“ heißen soll."
 news.108.t:0 "Der Fall von Baku"
 news.108.d:0 "Heute haben deutsche Truppen erfolgreich die Stadt Baku besetzt, ein wichtiges strategisches Ziel im Krieg gegen die Sowjetunion. \n\nDie am Kaspischen Meer gelegene Stadt ist der Schlüssel zum Kaukasus, und ihre zahlreichen Ölfelder werden den deutschen Kriegsanstrengungen mit Sicherheit zugutekommen.\n\nIhre Einnahme versetzt Deutschland in die Lage, den Krieg auf den Nahen Osten und möglicherweise sogar auf Indien auszuweiten."
 news.109.t:0 "Der Fall von Kairo"
 news.109.d:0 "Truppen des Deutschen Afrikakorps haben sich ihren Weg nach Kairo, der Hauptstadt Ägyptens, erkämpft. \n\nWährend sich die alliierten Streitkräfte ungeordnet weiter in die Wüste zurückzogen, wurden die durch Kairo marschierenden deutschen Soldaten von vielen Bürgern, die die Briten inzwischen als Unterdrücker betrachteten, als Befreier gefeiert.\n\nDer Fall Kairos ist ein erheblicher Verlust für die Kriegsanstrengungen der Alliierten, und mehrere Experten spekulieren, dass nun der gesamte Nahe Osten einer deutschen Eroberung offen steht."
 news.110.t:0 "Der Fall Washingtons"
 news.110.d:0 "Die Kämpfe in der Gegend von Washington D.C. endeten heute, als die letzten Widerstandsnester in der Stadt von den entlang des Potomac vorrückenden deutschen Truppen beseitigt wurden. \n\nEine dichte Rauchschicht hängt über der Stadt, und zumindest ein Teil davon stammt Berichten zufolge von OSS-Agenten, die bis zum letzten Moment vertrauliche Dokumente verbrannten. Eine Waffen-SS-Abteilung sicherte das Weiße Haus nach einem kurzen Feuergefecht mit Mitgliedern des US-Geheimdienstes, doch man geht davon aus, dass der Präsident bereits vor einigen Tagen sicher evakuiert wurde.\n\nDer Fall der amerikanischen Hauptstadt verdeutlicht die schreckliche Macht der deutschen Kriegsmaschinerie."
 news.111.t:0 "Der Untergang von New York"
 news.111.d:0 "Nach stundenlangen Straßenkämpfen, die Berichten zufolge größtenteils gegen bewaffnete Irregulars geführt wurden, sind deutsche Vorhuten in New York City eingedrungen und haben die Kontrolle über die Stadt übernommen. \n\nImprovisierte Panzerabwehrsperren entlang der Fifth Avenue erwiesen sich als wirkungslos, und Panzergrenadiere kämpften sich Block für Block durch Manhattan.\n\nSeit mehreren Tagen wüten in den östlichen Teilen der Stadt unkontrollierbare Brände, die nachts die Skyline erleuchten. \n\nDie Freiheitsstatue wurde von einem verirrten Artilleriegeschoss zerstört; es ist jedoch umstritten, von welcher Seite es abgefeuert wurde."
 news.112.t:0 "Der Fall von Gibraltar"
 news.112.d:0 "Nach mehreren widersprüchlichen Berichten wurde nun bestätigt, dass Gibraltar an Deutschland gefallen ist. \n\nDiese strategisch wichtige Hafenstadt bewacht den Zugang zum Mittelmeer und galt vor Kriegsbeginn als uneinnehmbar. Die britische Garnison zog sich in die Tunnel unter dem Felsen zurück, wurde jedoch schließlich durch Flammenwerfer und Granaten vertrieben. \n\nMit der deutschen Besetzung Gibraltars kam es zu einer dramatischen Machtverschiebung in der Mittelmeerschlacht."
 news.113.d:0 "Jubelnde italienische Soldaten marschierten heute in Kairo ein, kurz nachdem sich die letzten britischen Einheiten aus der Stadt zurückgezogen hatten. \n\nSofort wurde eine Siegesparade organisiert, und italienische Soldaten strömten zu den Pyramiden von Gizeh, um sich vor den berühmten Wahrzeichen fotografieren zu lassen.\n\nMit Kairo unter seiner Kontrolle ist [ITA.GetLeader] der Verbindung von Italienisch-Ostafrika mit Italienisch-Libyen und der Bildung einer zusammenhängenden Kolonie in Afrika einen Schritt näher gekommen."
 news.113.b:0 "Eine weitere Eroberung für Italien!"
 news.114.d:0 "Die letzten französischen Widerstandsnester in Paris wurden heute niedergewalzt, und die Stadt ist nun fest in italienischer Hand. \n\nDer Duce wurde eilig eingeflogen, um an der Siegesparade auf den Champs-Élysées teilzunehmen und auf einem weißen Hengst vor den marschierenden Truppen zu reiten. Während der Feierlichkeiten verglich er den aktuellen Feldzug in Frankreich mit Cäsars Eroberung Galliens und versprach, dies sei erst der Anfang von Italiens Aufstieg zur Größe.\n\nDie Zeit wird zeigen, ob er Recht hat."
 news.115.d:0 "Italienische Truppen haben London erfolgreich gestürmt, und die Trikolore wurde über dem Victoria Tower gehisst. In einigen Teilen der Stadt kommt es weiterhin zu kleineren Kämpfen. Bei einem Vorfall heute Morgen wurden mehrere Bersaglieri von Scharfschützen, die sich auf der Spitze des Big Ben versteckt hatten, niedergeschossen. Nach drei gescheiterten Versuchen, sie zu vertreiben, wurde der gesamte Uhrturm durch Sprengladungen zum Einsturz gebracht. Italienische Beamte bezeichneten dies als „bedauerliche Überreaktion“ des örtlichen Kommandanten."
 news.116.d:0 "Nach Berichten über schwere Kämpfe rund um den Felsen und den Hafen scheint Italien die Kontrolle über Gibraltar übernommen zu haben. Aus den tief unter dem Felsen verlaufenden Militärtunneln sind noch gelegentlich Explosionen zu hören, doch italienische Behörden erklären, dass jeglicher organisierter Widerstand beendet sei. Da dieses wichtige Tor zum Mittelmeer nun unter italienischer Kontrolle steht, wird es für die britischen Seestreitkräfte schwierig sein, die Regia Marina in der Region herauszufordern."
 news.117.t:0 "Der Untergang Singapurs"
 news.117.d:0 "Singapur, das „Gibraltar des Ostens“, wurde von den kaiserlich-japanischen Streitkräften eingenommen, obwohl es von seinen früheren britischen Besitzern als uneinnehmbare Festung angesehen wurde.\n\nDie japanische Militärverwaltung von Singapur hat das Fullerton Building zu ihrem Hauptquartier gewählt und die Stadt in Syonanto umbenannt, was so viel bedeutet wie „Südliche Insel, die im Zeitalter von Showa gewonnen wurde“. Man sieht die Kempeitai in Massen durch die Straßen patrouillieren, um die Botschaft einzuhämmern, dass die Japaner hier bleiben werden."
 news.117.b:0 "Für den Kaiser!"
 news.118.t:0 "Der Fall von Pearl Harbor"
 news.118.d:0 "Japanische Streitkräfte haben Honolulu, die größte Stadt auf der hawaiianischen Insel O&#39;ahu, gestürmt und eingenommen. Auch der Marinestützpunkt Pearl Harbor, das ehemalige Hauptquartier der US-Pazifikflotte, wurde eingenommen.\n\nZeugenaussagen zufolge zogen sich bedrängte amerikanische Matrosen und Marines nach Ford Island zurück, wo sie hartnäckigen Widerstand leisteten, bis sie heftigem Artillerie- und Luftangriff ausgesetzt wurden. Mit der Kontrolle dieser Insel hat die Kaiserlich Japanische Marine ihren Einflussbereich noch weiter ausgebaut."
 news.119.t:0 "Der Untergang von New South Wales"
 news.119.d:0 "Das japanische Kaiserreich weitete seine Eroberungen im Süden weiter aus und eroberte Sydney und die australische Hauptstadt Canberra. Lokale Verteidiger mussten sich über die Sydney Harbour Bridge zurückziehen und neue Stellungen auf dem Observatory Hill beziehen. Versuche, die Brücke zu zerstören, wurden jedoch von vorrückenden japanischen Truppen vereitelt, die daraufhin weiter vorrückten, um Canberra einzunehmen.\n\nDie japanische Kriegsflagge weht nun am Parlamentsgebäude in Canberra, dem Sitz der neuen Militärverwaltung der Region. Die Militärpolizei Kempeitai überwacht die Straßen."
 news.120.t:0 "Der Untergang von Los Angeles"
 news.120.d:0 "Nachdem sie auf dem amerikanischen Festland Fuß gefasst hatten, marschierten japanische Truppen in Los Angeles ein und schlugen die Verteidiger der Stadt in die Flucht. Ein langer Zug imperialer Truppen marschierte heute Nachmittag die Central Avenue entlang, während japanische Wochenschau-Fotografen das Ereignis filmten. Vor dem Rückzug der amerikanischen Truppen kam es Berichten zufolge in mehreren Stadtteilen zu heftigen Kämpfen. Hollywood wurde besonders schwer beschädigt, und viele japanische Offiziere ließen sich vor dem zerbrochenen und zerfallenden Hollywood-Schriftzug fotografieren."
 news.121.t:0 "Der Fall von Nanjing"
 news.121.d:0 "Die Hauptstadt der Republik China, Nanjing, wurde von Truppen des Japanischen Kaiserreichs besetzt. Trotz erbitterten Widerstands der chinesischen Verteidiger der ummauerten Stadt gelang es den japanischen Truppen, das Zhongshan-Tor einzunehmen und sich in die Stadt vorzukämpfen.\n\nVereinzelte Schüsse sind noch zu hören, und in verschiedenen Teilen der Stadt wüten Brände. Die meisten überlebenden chinesischen Truppen haben sich jedoch entweder zurückgezogen oder wurden gefangen genommen. Zusammen mit der Einnahme Shanghais ist dies ein bedeutender Sieg für Japan im Krieg gegen China."
 news.122.t:0 "Der Fall von Wladiwostok"
 news.122.d:0 "Wladiwostok, die größte Stadt im russischen Fernen Osten und Heimat der sowjetischen Pazifikflotte, wurde von japanischen Truppen gestürmt. Ihre strategische Lage am anderen Ende der Transsibirischen Eisenbahn macht ihren Verlust für die sowjetischen Kriegsanstrengungen in Asien umso nachteiliger.\n\nViele Einwohner der Stadt erinnern sich noch an die mehrjährige japanische Besatzung während des russischen Bürgerkriegs. Einige befürchten, dass sie die Stadt nun nie wieder verlassen werden."
 news.123.t:0 "Der Fall Hongkongs"
 news.123.d:0 "Truppen des japanischen Kaiserreichs eroberten die britische Kronkolonie Hongkong, nachdem sie die Gin Drinkers Line durchbrochen und auf Hong Kong Island gelandet waren. Die Lage wurde für die Verteidiger bald unhaltbar, und der Gouverneur kapitulierte persönlich im Peninsula Hong Kong Hotel, wo die Japaner ihr Hauptquartier eingerichtet hatten.\n\nNach einer kurzen Zeremonie wurde ein neuer japanischer Gouverneur eingesetzt, der der Welt ein „Neues Hongkong“ verkündete, „frei vom westlichen Kolonialismus“."
 news.124.t:0 "Der Fall Manilas"
 news.124.d:0 "Manila, die Hauptstadt der Philippinen, fiel nach dem Abzug der amerikanischen und philippinischen Verteidiger an die Japaner. Der Zugang zur strategisch wichtigen Bucht von Manila blieb nach dem Fall der Stadt aufgrund der starken Konzentration amerikanischer Küstenartillerie auf der Insel Corregidor lange Zeit umkämpft, doch nach einem gezielten japanischen Angriff verstummten die Geschütze schließlich. \n\nNachdem Manila nun unter japanischer Kontrolle ist, dürfte der Rest der Philippinen bald folgen. Dies ist eine herbe Niederlage für die amerikanischen Streitkräfte in Asien und im Pazifik."
 news.125.t:0 "Der Fall von Kalkutta"
 news.125.d:0 "Nach einer Zeit schweren Bombardements wurde nun bestätigt, dass die indische Stadt Kalkutta an die vorrückenden japanischen Truppen gefallen ist. Obwohl es in den Außenbezirken der Stadt noch vereinzelte Kämpfe gab, wurde rasch eine Siegesparade auf der Chowringhee Avenue organisiert.\n\nAngehörige der Indischen Nationalarmee, einer von den Japanern organisierten Militäreinheit zur Befreiung Indiens von Großbritannien, nahmen an der Parade teil und ernteten tosenden Jubel der Menge. Viele sagen voraus, dass nach dem Fall Kalkuttas ganz Britisch-Indien bald folgen wird."
 news.126.t:0 "Der Fall von Neu-Delhi"
 news.126.d:0 "Die japanischen Offensiven in Indien dauern an, und Neu-Delhi wurde kürzlich erobert. Als Hauptstadt Britisch-Indiens ist diese Stadt von immenser strategischer Bedeutung, und ihr Verlust könnte sich als entscheidender Faktor im laufenden Indienfeldzug erweisen.\n\nDer Vizekönig selbst wurde Berichten zufolge von japanischen Vorhuteinheiten gefangen genommen, als er den Transport seiner Habseligkeiten vom Haus des Vizekönigs in eine LKW-Karawane überwachte. Dies ist jedoch noch nicht bestätigt."
 news.127.t:0 "Der Untergang des Panamakanals"
 news.127.d:0 "Die Landung japanischer Truppen in Panama und die Übernahme des Kanals, nachdem sie die Garnison zur Kapitulation gezwungen hatten, stellten einen schweren Schlag für die amerikanischen Kriegsanstrengungen dar. Berichten zufolge flohen mehrere Gruppen amerikanischer und panamaischer Soldaten in den nahegelegenen Dschungel, um dort einen Guerillakrieg zu führen. Man geht jedoch nicht davon aus, dass sie die japanische Präsenz ernsthaft bedrohen können. Nach dem Fall des Kanals müssen die amerikanischen Seestreitkräfte nun Südamerika umrunden, um die US-Westküste zu erreichen. Dies verschafft der Kaiserlich Japanischen Marine einen erheblichen strategischen Vorteil."
 news.128.t:0 "Der Fall Berlins"
 news.128.d:0 "Die Einnahme der deutschen Hauptstadt wurde von Washington bestätigt, nachdem sich US-Truppen aus mehreren Richtungen nach Berlin vorgekämpft hatten. Die Kämpfe in der Stadt wurden als heftig beschrieben. Die Moltkebrücke wurde von verzweifelten deutschen Pionieren zerstört, um den amerikanischen Vormarsch aufzuhalten. Weitere Brücken über die Spree konnten schließlich gesichert werden, und GIs stürmten trotz heftigen deutschen Widerstands erfolgreich die Krolloper und den Reichstag. Über dem Reichstag weht nun die amerikanische Flagge im Wind, und die Kämpfe in der Stadt haben aufgehört. Die Schlacht um Berlin ist vorbei."
 news.128.b:0 "Eine Operation wie aus dem Bilderbuch!"
 news.129.d:0 "Britische Truppen sind in Berlin einmarschiert, und das Kriegskabinett verkündete die erfolgreiche Einnahme der deutschen Hauptstadt nach einer offenen Schlacht. Britische Kommandos griffen im Morgengrauen den Flughafen Tempelhof an, während Panzerkolonnen entlang der Frankfurter Allee vorrückten.\n\nDa die Reichskanzlei nun unter britischer Kontrolle ist, sind die Kämpfe in der Stadt weitgehend beendet. Der aktuelle Status der deutschen Regierung ist weiterhin unklar, es wird jedoch angenommen, dass zumindest Teile der Regierung vor dem Fall der Stadt entkommen konnten."
 news.129.b:0 "Super gemacht, Jungs!"
 news.130.d:0 "Französische Truppen haben die deutsche Hauptstadt erfolgreich gestürmt, die nach einer Reihe von offenen Schlachten innerhalb der Stadtgrenzen fiel. Eine große Gruppe von Waffen-SS-Soldaten verbarrikadierte sich im Olympiastadion, das schließlich nach einem entschlossenen Angriff von Fremdenlegionären mit Artillerieunterstützung fiel.\n\nÜber der Reichskanzlei weht nun die französische Trikolore. Obwohl aus einigen Vororten noch vereinzelte Kämpfe gemeldet werden, gilt der größte Teil Berlins als vom organisierten Widerstand befreit."
 news.130.b:0 "Es lebe Frankreich!"
 news.131.d:0 "Aus Berlin, der Hauptstadt Deutschlands, wurden erbitterte Kämpfe gemeldet, doch man geht mittlerweile davon aus, dass die Stadt vollständig in polnischer Hand ist. Nach ihrem Vormarsch entlang der Frankfurter Allee erreichten die Polen den Alexanderplatz, wo es zu einer heftigen Schlacht kam.\n\nAndernorts in der Stadt stürzte das Brandenburger Tor ein, angeblich nachdem es von einem polnischen Panzer gerammt worden war, und die Krolloper wurde durch Artilleriefeuer dem Erdboden gleichgemacht, nachdem sich ihre hartnäckigen SS-Verteidiger weigerten, sich zu ergeben. Über dem Reichstag weht nun die rot-weiße polnische Flagge, und die letzten Widerstandsnester wurden besiegt."
 news.131.b:0 "Der polnische Moloch ist nicht aufzuhalten."
 news.132.t:0 "Der Untergang Roms"
 news.132.d:0 "Alliierte Truppen sind kürzlich nach der Kapitulation der Garnison in Rom einmarschiert, und die Stadt steht nun unter militärischer Besatzung. Die meisten historischen Wahrzeichen sind noch intakt, nachdem sie einen weiteren Kampf um die Kontrolle über die Stadt überstanden haben. Zumindest vorerst blieben die alliierten Truppen auf Ersuchen des Heiligen Stuhls außerhalb der Vatikanstadt. Der Fall Roms ist ein wichtiger Meilenstein im italienischen Feldzug, und manche fragen sich, ob dies das Ende des organisierten Widerstands gegen die vorrückenden alliierten Armeen auf der Halbinsel bedeutet."
 news.132.b:0 "Ein großartiger Sieg!"
 news.133.d:0 "Französische Truppen marschierten kürzlich in Rom ein, nachdem die verbliebene italienische Garnison der Stadt in die umliegende Landschaft verschwunden war. Die französischen Truppen besetzten rasch alle wichtigen Regierungsgebäude, und entlang der Via del Corso wurde ein „Triumph“ mit einer langen Prozession marschierender Soldaten und gepanzerter Fahrzeuge abgehalten.\n\nMit dem Fall Roms wird Italiens Fähigkeit zur Fortsetzung des Krieges in Frage gestellt. Außenstehende Beobachter erwarten, dass die italienische Regierung, die kurz vor dem Fall aus der Stadt geflohen war, bald Kapitulationsverhandlungen aufnehmen wird."
 news.134.t:0 "Die Befreiung von Paris"
 news.134.d:0 "Es steht nun fest, dass Paris, die Hauptstadt Frankreichs, von der deutschen Besatzung befreit wurde. Alliierte Truppen sind in die Stadt einmarschiert, und die verbliebene deutsche Garnison hat sich ergeben. Man konnte sehen, wie die Pariser ihren Befreiern zujubelten, als sie die Champs Élysées entlangmarschierten, obwohl Gerüchte über deutsches Scharfschützenfeuer in einigen Teilen der Stadt kursierten.\n\nEs wurde befürchtet, die Deutschen würden eine Strategie der verbrannten Erde anwenden und Paris in eine brennende Ruine verwandeln, doch die Wahrzeichen der Stadt scheinen verschont geblieben zu sein. Tatsächlich weht die französische Trikolore sogar noch heute am Eiffelturm."
 news.135.t:0 "Der Fall von Tokio"
 news.135.d:0 "Amerikanische Truppen sind in Tokio einmarschiert, und das US-Kriegsministerium hat kürzlich das Ende der größeren Kampfhandlungen in der Stadt verkündet. Es wurde von heftigen Kämpfen berichtet, insbesondere in der Nähe des Kaiserpalastes, der von fanatischen Mitgliedern der Kaiserlichen Garde verteidigt wurde, obwohl der Kaiser die Stadt vermutlich vor Beginn des amerikanischen Angriffs verlassen hatte.\n\nExperten prognostizieren mit dem Fall Tokios, dass der organisierte Widerstand auf den übrigen japanischen Heimatinseln bald zusammenbrechen wird. Friedensverhandlungen werden voraussichtlich in Kürze beginnen, es sei denn, japanische Hardliner überzeugen den Kaiser, den Kampf auf Leben und Tod fortzusetzen."
 news.136.d:0 "Nach einer Reihe erbitterter Schlachten haben die alliierten Streitkräfte Moskau, die Hauptstadt der Sowjetunion, besetzt. Die Stadt wurde schwer beschädigt, und auf beiden Seiten der Moskwa wüten noch immer Brände. Trotz schwerer Bombenangriffe ist der Kreml einigermaßen intakt und wurde als Sitz der Alliierten Besatzungsverwaltung ausgewählt. Der Verlust Moskaus bedeutete einen schweren Rückschlag für die sowjetischen Kriegsanstrengungen. Obwohl der Großteil der Regierung die Stadt vermutlich schon lange vor ihrem Fall evakuiert hat, gehen Militärexperten davon aus, dass ein völliger Zusammenbruch der Sowjetunion nicht mehr lange auf sich warten lassen könnte."
 news.137.t:0 "Die Befreiung Londons"
 news.137.d:0 "Die Kämpfe in London sind beendet, die letzten deutschen Widerstandsnester wurden niedergeschlagen. Sobald Entwarnung gegeben wurde, strömten jubelnde Menschenmengen auf die Straßen, um ihre amerikanischen Befreier zu feiern, während in der ganzen Stadt Kirchenglocken läuteten. \n\nGroßbritannien scheint von Befreiungsfieber erfasst zu sein, da die deutsche Besatzung nun endlich zu Ende zu gehen scheint. Aus den noch unter deutscher Kontrolle stehenden Gebieten wurden spontane Aufstände gemeldet, die jedoch mit harter Härte geahndet wurden. Ist die Freiheit endlich nach Großbritannien zurückgekehrt?"
 news.138.d:0 "Anders als 1920 kam es beim Vormarsch der sowjetischen Armeen auf Warschau nicht zum „Wunder an der Weichsel“. Der polnische Widerstand in der Stadt ist weitgehend gebrochen, und über den meisten Regierungsgebäuden weht die sowjetische Flagge. Erleben wir das Ende der polnischen Nation oder werden sich die Streitkräfte irgendwie erholen und die Hauptstadt zurückerobern? Die meisten Experten halten dieses Szenario für unwahrscheinlich."
 news.138.b:0 "Vorwärts, Genossen!"
 news.139.t:0 "Die Befreiung Warschaus"
 news.139.d:0 "Die zerstörte Stadt Warschau ist den vorrückenden sowjetischen Armeen zum Opfer gefallen, nachdem sich die letzten deutschen Verteidiger aus den brennenden Vororten zurückgezogen haben. Ein Großteil der Stadt liegt nach früheren Kämpfen in Trümmern, und lokale Widerstandskämpfer eilten aus den Trümmern, um ihre Befreier zu begrüßen.\n\nDa Warschau unter sowjetischer Kontrolle steht, könnte sich die strategische Lage Deutschlands in Osteuropa bald weiter verschlechtern. Experten bezweifeln, dass sie einen Gegenangriff zur Rückeroberung der Stadt starten können, doch die geplagte Bevölkerung scheint davon nicht ganz überzeugt zu sein."
 news.139.a:0 "Ist dies der Anfang vom Ende...?"
 news.140.d:0 "Ein sowjetisches Kommuniqué verkündete die Kapitulation aller deutschen Streitkräfte in Berlin. Nachdem die Russen die Stadt eingekesselt hatten, stürmten sie sie aus verschiedenen Richtungen, wobei die deutschen Verteidiger auf Schritt und Tritt erbitterten Widerstand leisteten.\n\nSchließlich kämpften sich die sowjetischen Truppen über die Moltkebrücke in das Reichstagsgebäude und kämpften sich Raum für Raum durch, bis sie das Dach erreichten, auf dem die sowjetische Flagge über der Stadt wehte. Die Schlacht um Berlin ist vorbei."
 news.140.a:0 "Der [SOV.GetAdjective]-Bär wächst …"
 news.140.b:0 "Das faschistische Versteck gehört uns!"
 news.141.d:0 "Rom, die „Ewige Stadt“, ist den vorrückenden sowjetischen Vorhuten zum Opfer gefallen. Während die italienischen Truppen zurückwichen, marschierten russische Truppen in die Stadt ein und bekämpften die wenigen verbliebenen Widerstandsnester. Die meisten historischen Sehenswürdigkeiten scheinen kaum beschädigt worden zu sein, obwohl es widersprüchliche Berichte gibt, wonach das Pantheon von Maschinengewehrfeuer getroffen wurde.\n\nBislang scheinen die Sowjets die Neutralität des Heiligen Stuhls zu respektieren, doch ihre Truppen haben sich ringförmig um die Vatikanstadt positioniert – eine Geste, die Seine Heiligkeit sicherlich nervös machen dürfte."
 news.142.d:0 "Der unaufhaltsame Vormarsch der Roten Armee geht weiter, und es gibt Berichte über den Fall der französischen Hauptstadt. Französische Kommunisten sollen die Sowjets bei ihrem Einmarsch in die Stadt unterstützt und sich an Angriffen auf zurückweichende Teile der Landarmee beteiligt haben.\n\nIn der ganzen Stadt wurden Flugblätter verteilt, die die Pariser über ihre „Befreiung von der Unterdrückung durch die Bourgeoisie“ und die Wiederauferstehung der Pariser Kommune informieren."
 news.143.d:0 "Im jüngsten Tagesbefehl aus Moskau wurde die Eroberung von Paris von den deutschen Truppen verkündet. Viele Verteidiger der Stadt ertranken Berichten zufolge in der Seine, nachdem schweres sowjetisches Artilleriefeuer mehrere Brücken über den Fluss zerstört hatte.\n\nDer Eiffelturm stürzte nach einer gewaltigen Explosion an seinem Fuß ein, wobei unklar bleibt, welche Seite dafür verantwortlich war. Sowjetische Truppen halten derzeit eine Siegesparade auf den Champs-Élysées ab, während müde Pariser zusehen und sich fragen, ob sie nur einen Besatzer gegen einen anderen eingetauscht haben."
 news.143.a:0 "Ist dies der Anfang vom Ende...?"
 news.144.d:0 "Der kommunistische Aufschwung hält an, nachdem die sowjetischen Streitkräfte kürzlich London erobert haben. Die Rote Armee organisierte rasch eine Parade, noch bevor die letzten Widerstandsnester in der Stadt vollständig besiegt waren.\n\nKommunistische Sympathisanten meldeten umgehend die Namen bekannter Antikommunisten bei den sowjetischen Militärbehörden, und ein Volksgericht tagte am Trafalgar Square, um die schlimmsten Übeltäter zu bestrafen."
 news.145.d:0 "In der Londoner Innenstadt wüten weiterhin Brände, doch man geht davon aus, dass die meisten deutschen Besatzer der Stadt entweder im Kampf gefallen oder von den vorrückenden sowjetischen Truppen gefangen genommen wurden. Menschenmengen strömen auf die Straßen, um die Russen anzufeuern, während sie sich den letzten hartnäckigen Verweigerern zuwenden.\n\nKollaborateure wurden hart bestraft, und die Sowjets haben einen Übergangsrat einberufen, der die befreite Stadt bis auf Weiteres verwalten soll. Kritiker bemerken, dass die Mitglieder dieses Rates offenbar alle der Kommunistischen Partei Großbritanniens angehören."
 news.145.a:0 "Eine bedeutende Entwicklung."
 news.146.d:0 "Sowjetische Truppen sind in Tokio zusammengezogen, und es wurde von schweren Kämpfen in der ganzen Stadt berichtet. Der Großteil der Stadt steht nun unter sowjetischer Kontrolle, mit Ausnahme der östlichen Vororte, in denen noch immer massive Brände wüten.\n\nAls sich die Kämpfe auf den Kaiserpalast verlagerten, griffen Angehörige der Kaiserlichen Garde die heranrückenden sowjetischen Truppen mit Bajonetten an. Der Palast wurde schließlich von einer Abteilung VDV-Fallschirmjäger gestürmt, die sich Raum für Raum durch das Gelände kämpfen mussten. Es wurden keine Gefangenen gemacht, aber man geht davon aus, dass der Kaiser sicher evakuiert werden konnte, bevor die Stadt fiel."
 news.147.d:0 "Leningrad, die ehemalige Hauptstadt des Russischen Reiches, wurde von finnischen Truppen besetzt. Mit über drei Millionen Einwohnern hat die Stadt fast so viele Einwohner wie ganz Finnland, doch diese Tatsache hat die finnischen Angreifer offenbar nicht abgeschreckt.\n\nEs gibt Diskussionen darüber, ob die Stadt in Großfinnland integriert werden sollte, da die Ingermanisch-Finnischen in den Regionen außerhalb der Stadt eine beträchtliche Minderheit bilden. Dies setzt natürlich voraus, dass die Rote Armee die Stadt in einer Gegenoffensive nicht zurückerobern kann."
 news.148.d:0 "Kürzlich eintreffende Nachrichten aus Tokio bestätigten, dass die Stadt an chinesische Truppen gefallen ist. Ein Großteil der Stadt liegt in Trümmern, darunter auch der Kaiserpalast, der heute als Sitz der chinesischen Militärverwaltung dient.\n\nAusländische Reporter wurden Zeugen einer riesigen Siegesparade, bei der ein scheinbar endloser Zug chinesischer Soldaten durch die Stadt marschierte. Japanische Bürger, die die Straßen säumten, beobachteten die paradierenden Truppen schweigend."
 news.149.d:0 "Zum ersten Mal seit der Eroberung durch die Briten vor über zwei Jahrhunderten ist Gibraltar wieder in spanischer Hand. Nachrichten aus dem Gebiet berichten, dass sich der Großteil der Garnison ergeben hat, einige hartnäckige Widerstandskämpfer haben sich jedoch in Tunnel unter dem Felsen zurückgezogen. Auf einer Pressekonferenz in Madrid erklärten Regierungsvertreter, Gibraltar werde fortan „auf ewig“ spanisches Territorium sein. Britische Diplomaten haben diese Aussage wenig überraschend als „völligen Unsinn“ zurückgewiesen."
 news.150.t:0 "Staatsstreich in Jugoslawien"
 news.150.d:0 "Die Versuche der jugoslawischen Regierung, mit Deutschland zu kooperieren, stießen auf zahlreiche Gegner innerhalb des Militärs des Landes. Dies führte heute zu einem Putsch, der den amtierenden Herrscher stürzte und König Peter II. auf den Thron brachte.\n\nDas Land hat viele seiner Verbindungen zu Deutschland abgebrochen und das neue Regime scheint eher bereit zu sein, einen Krieg zu riskieren, als zu kooperieren."
 news.150.b:0 "Die Narren haben ihr eigenes Grab geschaufelt."
 news.151.t:0 "Das Rheinland bleibt entmilitarisiert"
 news.151.d:0 "Nach Versuchen Deutschlands, die Regeln des Versailler Vertrags außer Kraft zu setzen und das Rheinland zu remilitarisieren, zwang ein Ultimatum der Alliierten die Alliierten zum Rückzug. Da Großbritannien und Frankreich mit einer Mobilmachung drohten, sollte Deutschland den Plan umsetzen, wurde schnell klar, dass dieser Widerstand unerwartet war. Deutschland war nicht bereit, beiden Ländern in einem offenen Krieg gegenüberzutreten.\n\nSo wie es aussieht, bleibt das Rheinland gemäß dem Vertrag eine entmilitarisierte Zone, sofern Deutschland nicht in den Krieg zieht."
 news.151.a:0 "Krise vorerst abgewendet."
 news.151.b:0 "Unser Tag wird kommen."
 news.151.c:0 "Sie hätten wissen müssen, dass wir sie nicht unangefochten lassen würden."
 news.152.d:0 "Nach Versuchen Deutschlands, die Regeln des Versailler Vertrags außer Kraft zu setzen und das Rheinland zu remilitarisieren, zwang ein Ultimatum Frankreichs Deutschland zum Einlenken. Obwohl Großbritannien sich weigerte einzugreifen und Frankreich drohte, im Falle einer Umsetzung des Plans Truppen zu mobilisieren, wurde schnell klar, dass eine militärische Intervention überhaupt nicht zu erwarten war. Deutschland war nicht bereit, Frankreich in einem offenen Krieg gegenüberzutreten. \n\nSo wie es aussieht, bleibt das Rheinland gemäß dem Vertrag eine entmilitarisierte Zone, sofern Deutschland nicht in den Krieg zieht."
 news.152.c:0 "Frankreich steht allein, aber stark."
 news.152.e:0 "Unser Eingreifen war eindeutig nicht notwendig."
 news.153.t:0 "Deutschland bricht den Molotow-Ribbentrop-Pakt"
 news.153.d:0 "Der Nichtangriffspakt zwischen Deutschland und der Sowjetunion, eine zunächst überraschende Entwicklung, ist nun weniger überraschend gescheitert. Deutschland hat angegriffen, den Pakt gebrochen und spricht nun wieder offen von der Sowjetunion als Bedrohung, der man sich stellen müsse, damit die eigenen Zukunftsvisionen Wirklichkeit werden. Die sowjetische Führung ist alles andere als erfreut, aber vielleicht weniger schockiert über den Verrat als vielmehr enttäuscht, dass sie die Gelegenheit nicht zuerst ergriffen hat."
 news.153.a:0 "Vertrauen zwischen Giganten ist eine fragile Sache."
 news.153.b:0 "Wir haben es nur unterzeichnet, um etwas Zeit für den Angriff zu gewinnen."
 news.153.c:0 "Für die Faschisten ist ein Vertrag nichts weiter als ein Stück Papier."
 news.154.t:0 "Die UdSSR bricht den Molotow-Ribbentrop-Pakt"
 news.154.d:0 "Der Nichtangriffspakt zwischen Deutschland und der Sowjetunion, eine zunächst überraschende Entwicklung, ist nun weniger überraschend gescheitert. Die Sowjetunion griff an, brach den Pakt und schwor, das deutsche Regime zu zerschlagen und den expansionistischen Staat erneut in die Schranken zu weisen. \n\nDie deutsche Führung plante möglicherweise selbst einen Angriff, doch die Welt wird es nie erfahren. Sie mobilisiert nun rasch, um der neuen Bedrohung zu begegnen."
 news.154.b:0 "Kommunisten haben kein Gefühl für Ehre oder Stolz!"
 news.154.c:0 "Der Vertrag hat seinen Zweck erfüllt."
 news.155.t:0 "Deutschland wieder im Krieg"
 news.155.d:0 "Obwohl sich viele einen dauerhaften Frieden in Europa gewünscht haben, hat eine jüngste Wendung der Ereignisse Deutschland erneut auf den Kriegspfad geführt. Trotz klarer Verletzung des Versailler Vertrags wurden deutsche Truppen mobilisiert und sind bereit, in die Offensive zu gehen. Deutsche Regierungsvertreter erklärten, sie würden das Rheinland nicht länger entmilitarisieren, da dies zum Schutz der deutschen Bevölkerung in der Region notwendig sei."
 news.155.a:0 "Dies könnte der Beginn eines weiteren Großen Krieges sein"
 news.155.b:0 "Zum Ruhme der deutschen Nation!"
 news.156.t:0 "Komet gesichtet"
 news.156.d:0 "Das Erscheinen eines Kometen am Himmel hat in unserem Volk für Unruhe gesorgt. Die Me 163 Komet, ein experimentelles Raketenflugzeug aus einem seiner Testflüge, schockierte die Landbevölkerung, die dieses außergewöhnlich schnelle Fluggerät entdeckte. Es wurde unter strengster Geheimhaltung entwickelt, wird aber bald enthüllt. Dieser kleine Zwischenfall wird seinen ersten offiziellen Auftritt nur umso eindrucksvoller machen."
 news.156.a:0 "Das Ende ist nah ... für unsere Feinde."
 news.156.a.tt:1 "Eine Vase fällt um.\n"
 news.156.a.2.tt:0 "Mir gefiel die Vase sowieso nicht.\n"
 news.157.t:0 "[From.From.GetName] greift in den [From.GetAdjective]-Krieg ein"
 news.157.d:0 "Erst vor wenigen Tagen mobilisierten Truppen aus [From.GetName] in Richtung [From.From.From.GetName] und erklärten den Krieg. Anschließend stellte [From.From.GetName] ein Ultimatum und befahl den Parteien, die Kämpfe einzustellen und alle [From.GetAdjective]-Truppen abzuziehen. [From.GetLeader] erklärte, ihr Krieg sei gerechtfertigt gewesen und weigerte sich, nachzugeben. Das Land befindet sich nun im vollen Konflikt mit [From.From.From.GetName] und [From.From.GetName]."
 news.157.a:0 "Scheint, als ob [From.From.GetName] bereit sind, sich die Hände schmutzig zu machen"
 news.157.a_usa:0 "Wir werden es ihnen zeigen"
 news.158.t:0 "[From.From.GetName] greift in den [From.GetAdjective]-Krieg ein"
 news.158.d:0 "Vor einigen Tagen erklärte [From.GetName] [From.From.From.GetName] den Krieg. Kurz darauf stellte [From.From.GetName] ein Ultimatum, in dem es Krieg gegen [From.GetName] ankündigte, falls [From.GetName] nicht alle Aggressionen einstellte und einen Friedensvertrag unterzeichnete. [From.GetLeader] erklärte, die Kriegsgründe seien gerechtfertigt gewesen, entschied sich jedoch für die Demobilisierung und den Friedensprozess."
 news.158.a:0 "Scheint, als hätte sich das [From.From.GetAdjective]-Machtspiel ausgezahlt"
 news.158.a_usa:0 "Wir müssen den Frieden bewahren"
 news.159.t:0 "Die Morgendämmerung von [From.GetFactionName]"
 news.159.d_01:0 "[From.GetLeader] gab heute bekannt, dass [From.GetName] eine neue Allianz gründen möchte. [From.GetFactionName] hat seine Absicht bekannt gegeben, im Kriegsfall zusammenzuarbeiten.\n\nGroße Koalitionen können zwar Aggressionen abschrecken, doch wir haben die Konsequenzen gesehen, die sie im Konfliktfall mit sich bringen. Die Absichten der verschiedenen Parteien, die sich dieser neuen Allianz anschließen, sind noch umstritten, doch welchem Zweck sie letztendlich dienen könnte, ist möglicherweise selbst den Initiatoren unbekannt."
 news.159.d_02:0 "Es gibt Theorien, dass Demokratien nicht gegeneinander Krieg führen. Das bedeutet jedoch nicht, dass sie sich in Kriegen gegenseitig unterstützen. Da die politischen Interessen vielfältig sind und die Menschen Frieden wollen, ist ein Kriegseintritt für diese Nationen oft mit hohen Kosten verbunden.\n\nDas hat [From.GetName] jedoch nicht davon abgehalten, heute die Gründung eines Militärbündnisses, der [From.GetFactionName], bekannt zu geben, um gemeinsam ihr Volk und ihre Ideale zu schützen."
 news.159.d_03:0 "Sogar [From.GetName], berühmt für seinen Glauben an die Stärke und Überlegenheit seines Volkes und seiner Nation, schreckt nicht davor zurück, Bündnisse mit jenen einzugehen, die sie respektieren. [From.GetLeader] gab heute bekannt, dass die endgültigen Vereinbarungen über [From.GetFactionName] getroffen wurden, eine Militärkoalition, die angeblich nur ehrenhaften Nationen Platz bietet, die zu Großem bestimmt sind.\n\nOb diese Größe durch den Aufbau der idealen Gesellschaft innerhalb der Grenzen der jeweiligen Nationen oder durch die Zusammenarbeit bei der Expansion über diese Grenzen hinaus erreicht werden soll, wird die Welt möglicherweise erst erfahren, wenn es zu spät ist."
 news.159.d_04:0 "Trotz der jüngsten Konzentration der Sowjetunion auf den Kommunismus in einem Land überschreiten die internationalistischen Wurzeln der Bewegung Grenzen. Diese Solidarität mit Arbeitern weltweit war ein zentrales Element in [From.GetLeader]s heutiger Rede anlässlich der Bekanntgabe von [From.GetFactionName]. \n\nDieses Bündnis geht über eine politische Internationale hinaus und verbindet die Länder militärisch. Beide Regime versprechen sich gegenseitige Unterstützung gegen äußere Bedrohungen. Ob es der kommunistischen Revolution als Schwert oder Schutzschild dienen wird, bleibt abzuwarten."
 news.159.a:0 "Wird dies zu ewigem Frieden oder einem weiteren Krieg führen?"
 news.159.b:0 "Gemeinsam werden wir niemals besiegt werden!"
 news.159.c:0 "Eine hervorragende Initiative!"
 news.159.tt:0 "[This.GetName] ist Teil von [From.GetFactionName] mit [From.GetName].n"
 news.160.t:0 "Deutschland unter Beschuss"
 news.160.d:0 "Vor kurzem wurde Deutschland erneut in einen Krieg hineingezogen. Obwohl alle auf einen dauerhaften Frieden in Europa gehofft hatten, sind die Spannungen auf dem Kontinent offensichtlich immer noch zu groß. Deutsche Politiker erklären, sie könnten es sich nicht länger leisten, das Rheinland entmilitarisiert zu lassen. Sie argumentieren, sie benötigten volle Mobilität innerhalb ihrer Grenzen, um sich verteidigen zu können."
 news.160.a:0 "Das verheißt nichts Gutes für Europa"
 news.160.b:0 "Das deutsche Volk wird siegen"
 news.161.t:0 "Frankreich verbietet den Kommunismus"
 news.161.d:0 "Das Kabinett von [From.GetLeader] hat die Auflösung der [From.GetCommunistParty] beschlossen. Seit der Unterzeichnung des Nichtangriffspakts zwischen der Sowjetunion und Nazi-Deutschland gab es Diskussionen über ein Verbot des Kommunismus in Frankreich. Das Dekret wurde nach der Einigung beider Nationen über die Teilung Polens erlassen.\n[From.GetLeader] nutzte die Gelegenheit, als die Unterstützung für ein Verbot stieg und sogar linke Zeitungen begannen, sich für die Abschaffung der [From.GetCommunistParty] einzusetzen."
 news.161.a:0 "Eine drastische Entscheidung"
 news.161.b:0 "Sie tun alles, um die Bourgeoisie an der Macht zu halten"
 news.161.c:0 "Es könnte notwendig gewesen sein"
 news.161.e:0 "Es war der einzige Weg"
 news.162.d:0 "Mit einem von beiden Seiten akzeptierten Friedensvertrag, der Spanien in zwei Teile spaltete, ist der Spanische Bürgerkrieg beendet. Obwohl Dissidenten auf beiden Seiten diesen Kompromiss ablehnen, gibt dieser fragile Frieden der gespaltenen Nation zumindest Zeit, sich zu erholen und auf beiden Seiten wieder aufzubauen."
 news.162.a:1 "Gut für die Spanier."
 news.162.b:0 "Eines Tages werden wir ganz Spanien zurückerobern."
 news.163.t:0 "Londoner Konferenz"
 news.163.d:2 "Deutschland stützt seinen Anspruch auf den Anschluss Österreichs an [GER.GetName] und fordert nun von [YUG.GetName] die „rechtmäßige Rückgabe“ des ehemaligen österreichischen Territoriums Slowenien. \n\nAls Reaktion darauf trafen sich die Unterzeichner des Versailler Vertrags in London, um eine Lösung der „Slowenischen Frage“ zu erörtern. Diese große Friedenskonferenz führte zu dem Beschluss, dass Jugoslawien Slowenien im Namen eines dauerhaften Friedens an Deutschland abtreten solle. \n\nDa sich die Regierung von [YUG.GetLeader] von den europäischen Großmächten im Stich gelassen fühlt, sieht sie keine andere Möglichkeit, als das Abkommen in der vorliegenden Form zu unterzeichnen."
 news.163.a:0 "Das wird gut enden"
 news.163.b:0 "Gerechtigkeit"
 news.163.c:0 "Bedauerlich"
 news.163.e:0 "Verraten"
 news.164.t:0 "Krise in Slowenien"
 news.164.d:2 "Deutschland nutzt den Anschluss Österreichs an [GER.GetName] als Grundlage für seinen Anspruch und fordert nun von [YUG.GetName] die „rechtmäßige Rückgabe“ des ehemaligen österreichischen Gebiets Slowenien. \n\nAls Reaktion darauf trafen sich die Unterzeichner des Versailler Vertrags in London, um eine Lösung der „Slowenischen Frage“ zu besprechen.\n\nAuf der Konferenz traten Großbritannien und Frankreich geschlossen gegen die deutschen Forderungen auf und erklärten, dass Jugoslawien die in Versailles festgelegten Grenzen einhalten müsse."
 news.164.d_FRA_abandoned_yugoslavia:2 "Deutschland nutzt den Anschluss Österreichs an [GER.GetName] als Grundlage für seinen Anspruch und fordert nun von [YUG.GetName] die „rechtmäßige Rückgabe“ des ehemaligen österreichischen Gebiets Slowenien. \n\nAls Reaktion darauf trafen sich die Unterzeichner des Versailler Vertrags in London, um eine Lösung der „Slowenischen Frage“ zu besprechen.\n\nWährend Großbritannien darauf bestand, dass die Integrität des Versailler Vertrags gewahrt werden müsse, unterstützte Frankreich im Namen des Friedens in Europa die deutschen Forderungen."
 news.164.a:0 "Ich glaube, das bedeutet Krieg"
 news.164.b:0 "Sie werden unserem Zorn ausgesetzt sein"
 news.164.c:0 "Wir werden auf der Seite der Gerechtigkeit stehen"
 news.164.e:0 "Erster im Kampf!"
 news.164.f:0 "Die Briten sind Narren"
 news.165.t:0 "Krise in Slowenien"
 news.165.d:2 "Deutschland stützt seinen Anspruch auf den Anschluss Österreichs an [GER.GetName] und fordert nun von [YUG.GetName] die „rechtmäßige Rückgabe“ des ehemaligen österreichischen Gebiets Slowenien. \n\nAls Reaktion darauf trafen sich die Unterzeichner des Versailler Vertrags in London, um eine Lösung der „Slowenischen Frage“ zu erörtern.\n\nTrotz tagelanger Verhandlungen konnte die Konferenz keine Einigung erzielen. Während die britische Regierung eine friedliche Lösung anstrebte, blieb Frankreich angesichts der deutschen Drohungen standhaft. Die deutsche Delegation verließ aus Protest den Saal, und über Slowenien ziehen Kriegswolken auf."
 news.165.a:0 "Das sieht düster aus"
 news.165.b:0 "Wir werden nicht nachgeben"
 news.165.c:0 "Es ist bedauerlich"
 news.165.e:0 "Gemeinsam werden wir siegreich sein"
 news.165.f:0 "Wir werden das Richtige tun!"
 news.166.t:0 "Londoner Abkommen"
 news.166.d:2 "Deutschland nutzt den Anschluss Österreichs an [GER.GetName] als Grundlage für seinen Anspruch und fordert nun von [YUG.GetName] die „rechtmäßige Rückgabe“ des ehemaligen österreichischen Gebiets Slowenien. \n\nAls Reaktion darauf trafen sich die Unterzeichner des Versailler Vertrags in London, um eine Lösung der „Slowenischen Frage“ zu besprechen.\n\nDie Großmächte einigten sich darauf, Slowenien in einem letzten Versuch zur Wahrung des Friedens an Deutschland abzutreten. \nIn einer leidenschaftlichen Rede gegen die deutsche Bedrohung der europäischen Stabilität erklärte [YUG.GetLeader] jedoch unmissverständlich, dass [YUG.GetName] sich weigern würde, auch nur einen Zentimeter Land aufzugeben, ungeachtet der Tatsache, dass sie in dieser Zeit der Not völlig im Stich gelassen würden."
 news.166.a:0 "Die Lichter gehen aus"
 news.166.b:0 "Wir werden sie vernichten"
 news.166.c:0 "Wir stehen allein"
 news.167.t:0 "Krise in Slowenien"
 news.167.d:2 "Deutschland nutzt den Anschluss Österreichs an [GER.GetName] als Grundlage für seinen Anspruch und fordert nun von [YUG.GetName] die „rechtmäßige Rückgabe“ des ehemaligen österreichischen Gebiets Slowenien. \n\nAls Reaktion darauf trafen sich die Unterzeichner des Versailler Vertrags in London, um eine Lösung der „Slowenischen Frage“ zu besprechen.\n\nDie Konferenz war von einem überraschenden Loyalitätswechsel geprägt: Italien unterstützte die territoriale Integrität Jugoslawiens und ließ die deutschen Forderungen unbeachtet. \n\nWie immer ist die italienische Außenpolitik völlig unberechenbar, und es bleibt abzuwarten, wohin sie sich diesen Schachzug erhofft."
 news.167.a:0 "Wir werden das im Auge behalten"
 news.167.b:0 "Wir werden sie beide vernichten"
 news.167.c:0 "Wenigstens sind wir nicht ohne Freunde"
 news.167.e:0 "Italien wird es der Welt zeigen!"
 news.168.t:0 "Erster Ljubljana-Preis"
 news.168.d:2 "Mit dem Verlust Sloweniens sind die ethnischen Konfliktlinien innerhalb Jugoslawiens deutlicher zutage getreten und die Zentralregierung wird von Tag zu Tag schwächer. \n\nHeute hat der deutsche Außenminister einen Plan angekündigt, um den „Fehler des Versailler Staates“ endgültig zu beheben. In einem Vertrag, der von einigen der mächtigsten Nachbarn Jugoslawiens unterzeichnet wurde, wurde ein Großteil seines Territoriums unter deutschfreundlichen Ländern aufgeteilt.\n\nDieser Vertrag wurde vor seiner Ratifizierung nicht einmal von [YUG.GetAdjective]-Diplomaten gesehen, aber da zahlreiche Länder darum kämpfen, jugoslawische Gebiete von einer zusammenbrechenden Zentralregierung zu erobern, kann [YUG.GetLeader]s Regierung wenig tun."
 news.168.a:0 "So wird die Neue Ordnung aufgebaut"
 news.168.b:0 "Ein Traum ist heute gestorben"
 news.168.c:0 "Das kann nicht gut sein"
 news.168.e:0 "Hervorragende Neuigkeiten"
 news.168.f:0 "Ein schlechtes Ergebnis für uns"
 news.168.g:0 "Wir sind dankbar"
 news.168.h:0 "Unglücklich"
 news.168.i:0 "Die Macht Italiens wird wirklich anerkannt"
 news.168.j:0 "Deutschland sollte besser auf sich aufpassen."
 news.169.t:0 "Das Schicksal Jugoslawiens"
 news.169.d_annex_YUG:1 "Die jüngsten Gebietsverluste haben zu Brüchen innerhalb des jugoslawischen Staates geführt, die zu ethnischen Konflikten und einer Schwächung der Zentralgewalt führten. Deutschland ist in dieses wachsende Vakuum eingetreten und hat beschlossen, ein „Protektorat“ über dem Rest Jugoslawiens zu verhängen."
 news.169.d_puppet_CRO_annex_YUG:1 "Jüngste Gebietsverluste haben zu Brüchen innerhalb des jugoslawischen Staates geführt, die zu ethnischen Konflikten und einer Schwächung der Zentralgewalt führten. Deutschland hat einen „unabhängigen“ Staat Kroatien geschaffen und den Rest annektiert."
 news.169.d_puppet_CRO_YUG:1 "Die jüngsten Gebietsverluste haben zu Brüchen innerhalb des jugoslawischen Staates geführt, die zu ethnischen Konflikten und einer Schwächung der Zentralgewalt führten. Deutschland hat sich entschieden, den Rest des Landes unter der Führung der Serben und Kroaten aufzuteilen."
 news.169.a:0 "Deutschland zeigt Europa seine Macht"
 news.169.b:0 "Wir haben die richtige Seite gewählt"
 news.169.c:0 "Das ist bedrohlich"
 news.169.e:0 "Der Frieden ist bedroht"
 news.170.t:0 "Zweiter Ljubljana-Preis"
 news.170.d_BUL:2 "Deutschland behauptet, den Frieden auf dem Balkan zu sichern und forderte von der griechischen Regierung die Abtretung von Gebieten an Bulgarien. [GRE.GetName] protestierte heftig, doch der starke deutsche Einfluss auf dem Balkan lässt dem Land kaum eine andere Wahl. Die einzige Möglichkeit, eine Konfrontation mit [GER.GetName] zu vermeiden, besteht darin, der deutschen Diplomatie die territoriale Integrität zu überlassen."
 news.170.d_ITA:1 "Deutschland behauptet, den Frieden auf dem Balkan zu sichern und fordert die griechische Regierung auf, sämtliche von [ITA.GetName] beanspruchten Gebiete abzutreten. Obwohl [GRE.GetName] heftig protestiert, lässt der starke deutsche Einfluss auf dem Balkan dem Land kaum eine andere Wahl. Die einzige Möglichkeit, eine Konfrontation mit [GER.GetName] und [ITA.GetName] zu vermeiden, besteht darin, der deutschen Diplomatie die territoriale Integrität zu überlassen."
 news.170.d_ITA_BUL:1 "Deutschland behauptet, den Frieden auf dem Balkan sichern zu wollen, und hat die griechische Regierung aufgefordert, sämtliche von [BUL.GetName] und [ITA.GetName] beanspruchten Gebiete abzutreten. Angesichts der starken [GER.GetAdjective]-Präsenz auf dem Balkan und der Drohkulisse Bulgariens und Italiens sah [GRE.GetLeader] keine andere Wahl, als die Forderung zu akzeptieren."
 news.170.d_GER:1 "Nachdem sich [GER.GetName] als Macht auf dem Balkan etabliert hat, behauptet es nun, es wolle den Frieden in der Krisenregion wahren. Zu diesem Zweck forderte es nun auch die Abtretung griechischen Territoriums an seine Autorität.\n\nAngesichts der deutschen Kriegsmaschinerie hatte [GRE.GetName] keine andere Wahl, als die Forderungen zu akzeptieren, auch wenn sie diese als Schwindel verfluchten."
 news.170.a:0 "Alles, um den Frieden zu bewahren"
 news.170.b:0 "Wir erheben uns"
 news.170.c:0 "Das sieht nicht gut aus"
 news.170.e:0 "Kann die Mitte halten?"
 news.170.f:0 "Es war eine Schande"
 news.171.t:0 "Zweiter Ljubljana-Preis"
 news.171.d_BUL:1 "Griechenland hat die deutsche Vermittlung im Grenzstreit mit Bulgarien abgelehnt und behauptet, das deutsche Angebot käme einer Kapitulation gleich. \n\nGegenüber der Presse erklärte [GRE.GetLeader], wenn [BUL.GetLeader] und [GER.GetLeader] diese Gebiete wollten, könnten sie „kommen und sie sich holen“. \n\nDie [BUL.GetAdjective]-Regierung hat jegliche Behauptung zurückgewiesen, sie habe [GER.GetNameDef] im Gegenzug für Hilfe bei der Eroberung der griechischen Gebiete militärische und wirtschaftliche Unterstützung angeboten."
 news.171.d_ITA:1 "Nach einem Treffen zwischen [GER.GetLeader] und [ITA.GetLeader] hat die [GER.GetAdjective]-Regierung die Position von [ITA.GetAdjective] im anhaltenden Grenzstreit mit [GRE.GetNameDef] öffentlich unterstützt. \n\nDer griechische Staatschef [GRE.GetLeader] hat die angebotene Lösung für völlig inakzeptabel erklärt und geschworen, das Land „bis zur letzten Kugel, der letzten Granate, dem letzten Atemzug“ zu verteidigen."
 news.171.d_ITA_BUL:1 "Deutsche Vermittlungsangebote im Grenzstreit zwischen Griechenland einerseits und Italien und Bulgarien andererseits wurden von Griechenland zurückgewiesen. Ein Regierungssprecher erklärte, die Armee stehe bereit, das Land gegen etwaige Eindringlinge zu verteidigen und würde lieber im Kampf sterben, als sich den Schakalen und Geiern zu ergeben, die sich an Deutschlands Rockschöße klammern."
 news.171.d_GER:1 "Die Gespräche zwischen [GRE.GetNameDef] und [GER.GetNameDef] zur Beilegung mehrerer Grenzstreitigkeiten sind gescheitert. [GRE.GetLeader] behauptet, der deutsche Vorschlag, einige Gebiete für deutsche Militärstützpunkte zu pachten, würde de facto die Aufgabe großer Teile des Landes bedeuten, und rief alle arbeitsfähigen Griechen dazu auf, dem Land beizustehen."
 news.171.a:0 "Narren."
 news.171.b:0 "Wie können sie es wagen!?"
 news.171.c:0 "Wir sollten sehen, ob wir Griechenland helfen können."
 news.171.e:1 "Das würde Krieg bedeuten."
 news.171.f:1 "Sie werden scheitern, wie es den Persern geschah."
 news.172.t:0 "Griechenland unterwirft sich"
 news.172.d:1 "Nach einem langen und hitzigen Gespräch mit dem deutschen Botschafter hat [GRE.GetLeader] angekündigt, dass die [GRE.GetAdjective]-Regierung ihre Politik künftig eng mit [GER.GetNameDef] abstimmen werde. \n\nDie Polizei in der [GRE.GetAdjective]-Hauptstadt musste mehrere spontane Proteste gegen diese Entscheidung mit Gewalt auflösen. Viele in der Menge forderten den Kopf dieses „feigen [GRE.GetLeader]“."
 news.172.a:1 "Sie zeigen es mit Bedacht."
 news.172.b:0 "Ein weiterer Triumph."
 news.172.c:0 "Das ist besorgniserregend."
 news.172.e:0 "Wir können nichts tun."
 news.172.f:1 "Es ist eine griechische Tragödie."
 news.173.t:0 "Die Vierte Internationale"
 news.173.d_1:0 "Eine Reihe kommunistischer Delegierter aus aller Welt traf sich heute in Paris zu einer Gründungskonferenz. Unter der Führung von Anhängern Trotzkis Theorien wurde der Grundstein für die Vierte Internationale gelegt. Obwohl noch unklar ist, welche Auswirkungen diese Organisationsbemühungen auf die internationale politische Bühne haben werden, scheinen die Nachrichten Stalins Misstrauen geweckt zu haben. Er verdächtigte zahlreiche hochrangige Mitglieder der Partei und des Militärs, Trotzki heimlich zu unterstützen, und viele von ihnen sind noch am Leben. Seine Paranoia ist wieder in vollem Gange, und er zieht sich zunehmend zurück. Sein Misstrauen und seine Instabilität haben eine Krise in der Sowjetregierung ausgelöst. Wenn es so weitergeht, wird die Nation in einen Bürgerkrieg stürzen."
 news.173.d_2:0 "Eine Reihe kommunistischer Delegierter aus aller Welt traf sich heute in Paris zu einer Gründungskonferenz und legte den Grundstein für die sogenannte Vierte Internationale. Forderungen nach ihrer Gründung gibt es seit Jahren, wobei Anhänger von Trotzkis Theorien die Führung übernahmen. Stalin reagierte auf die wachsende Unterstützung des Trotzkismus im Ausland mit weiteren Mordanschlägen und verstärkter Propaganda gegen seinen alten Rivalen. Angesichts der jüngsten Säuberungen mutmaßlicher Trotzkisten in den hohen Rängen des sowjetischen Militärs und der sowjetischen Führung dürfte dies kaum auf Widerstand stoßen."
 news.173.a:0 "Wie viele Länderspiele wird es geben?"
 news.173.b:0 "Eine gewalttätige Ära für unsere Union."
 news.174.t:0 "[From.GetName] verfolgt Nukleartechnologie"
 news.174.d:0 "Nach ersten Tests haben die Politiker von [From.GetName] beschlossen, die Forschung von [From.GetAdjective] auf die Entwicklung der Nukleartechnologie auszurichten. \n\nDie Technologie ist noch hochgradig experimentell, und es besteht große Unsicherheit darüber, ob sie überhaupt praktische Anwendungsmöglichkeiten hat. Wer weiß, wohin dies ihre Kriegsanstrengungen führen könnte."
 news.174.a:0 "Wir sollten diese Entwicklung verfolgen."
 news.174.b:0 "Hoffen wir, dass ihre Forschung Früchte trägt."
 news.174.c:0 "Daraus wird nie etwas werden."
 news.174.e:0 "Wir werden unsere Forschung im Geheimen durchführen."
 news.175.t:0 "Frankreich und Großbritannien geben Bündnis bekannt"
 news.175.d:0 "Frankreich beruft sich auf die im Ersten Weltkrieg geschmiedeten Bande und hat ein formelles Bündnis mit Großbritannien beantragt. Als Grund nennt es nicht näher spezifizierte Bedrohungen für die Stabilität Europas.\n\nHeute wurde dieser Antrag vom britischen Parlament angenommen und Frankreich ist der [ENG.GetFactionName] beigetreten."
 news.175.a:0 "Wir stehen zusammen."
 news.175.b:0 "Sie bereiten sich auf das Schlimmste vor."
 news.175.c:0 "Sie schließen sich zusammen wie in die Enge getriebene Ratten."
 news.175.e:0 "Großbritannien hat sein Schicksal in die Waagschale geworfen."
 news.176.t:0 "Großbritannien lehnt Bündnis mit Frankreich ab"
 news.176.d:0 "In einer überraschenden Wendung der Ereignisse lehnte das britische Parlament heute den Antrag von [FRA.GetName] auf ein formelles Bündnis zwischen den beiden Nationen ab. Als Begründung wurde angegeben, das ohnehin fragile Gleichgewicht auf dem europäischen Kontinent nicht zu gefährden.\n\nDie französische Regierung verurteilte dies als politischen Schachzug, der die französische Sicherheit britischen Interessen opfere."
 news.176.a:0 "Sie hätten netter fragen sollen."
 news.176.b:0 "Unsere alten Feinde sind gespalten."
 news.176.c:0 "Ein schwarzer Tag für die alten Verbündeten."
 news.177.t:0 "Die kleine Entente"
 news.177.d:0 "Um eine gemeinsame Front gegen gemeinsame Feinde zu bilden, hat [From.GetName] die Tschechoslowakei kontaktiert und ihr die Gründung einer „Kleinen Entente“ angeboten, um sich gegen gemeinsame Feinde zu vereinen und damit die Bindungen zu Großbritannien aus dem Ersten Weltkrieg aufzugeben. Obwohl ihm ein Platz im Verteidigungspakt angeboten wurde, stellte der britische Premierminister klar, dass Großbritannien das Bündnis nicht als „förderlich für den Schutz der europäischen Freiheit“ ansieht. \n\nFrankreich hat dennoch diplomatische Beziehungen zu anderen Nationen aufgenommen, die sich möglicherweise bedroht fühlen, und fördert die Einheit, um das diplomatische Gleichgewicht in Europa zu wahren und künftigen Konflikten vorzubeugen. Nur die Zeit wird zeigen, ob Frankreich Erfolg haben wird."
 news.177.a:0 "Dann komm später nicht weinend zu uns!"
 news.177.b:0 "Vive la France et L&#39;Entente!"
 news.177.c:0 "Wir dürfen Frankreich nie wieder die Hegemonie in Europa überlassen."
 news.177.e:0 "Europa muss sich gegen faschistische Aggressoren vereinen!"
 news.177.f:0 "Ein Zeichen zunehmender Spannungen in Europa."
 news.178.t:0 "Der Linksaszendent in Frankreich"
 news.178.d:0 "Nach fast zwei Jahrzehnten politischer Unruhen haben die Menschen in [From.GetName] das Gefühl, die Verluste des Ersten Weltkriegs noch nicht wiedererlangt zu haben. Die [From.GetAdjective] haben sich zum Ziel gesetzt, den [From.GetAdjective]-Staat mit ihrem Volk und für ihr Volk wiederaufzubauen.\n\nDiese neuen politischen Reformen ermöglichen das Aufblühen von Gewerkschaften und kommunistischen Organisationen. Wenn Frankreich diesen Weg weiterverfolgt, steht ihm eine politische Neuausrichtung nach links oder sogar eine umfassende Revolution bevor."
 news.178.a:0 "Frankreich folgt uns in die Zukunft!"
 news.178.b:0 "Ein sicheres Zeichen französischer Schwäche."
 news.178.c:0 "Eine tragische Entwicklung für die Dritte Republik."
 news.178.e:0 "Eine besorgniserregende Entwicklung."
 news.179.t:0 "Der rechte Aszendent in Frankreich"
 news.179.d:0 "Nach fast zwei Jahrzehnten politischer Unruhen haben die Menschen in [From.GetName] das Gefühl, dass sie das, was im Ersten Weltkrieg verloren ging, noch nicht wiedererlangt haben. Das Establishment von [From.GetAdjective] hat sich zum Ziel gesetzt, den Staat [From.GetAdjective] wiederaufzubauen und [From.GetAdjective] Größe wiederherzustellen.\n\nDiese politischen Reformen stärken die Macht des Staates und der Armee, wobei die Bevölkerung von [From.GetAdjective] von [From.GetLeader]s Versprechen von Größe überzeugt ist."
 news.179.a:0 "Die französische Regierung ist ein Feind ihres eigenen Volkes!"
 news.179.b:0 "Dies könnte Frankreich wieder zu einer großen Nation machen."
 news.179.c:0 "Eine tragische Entwicklung für die Dritte Republik."
 news.179.e:0 "Eine besorgniserregende Entwicklung."
 news.180.t:0 "Frankreich wird in die Komintern aufgenommen"
 news.180.d:0 "Nach der Hinwendung zum Kommunismus nicht nur innerhalb der französischen Bevölkerung, sondern auch in den französischen Machtzentren verkündete [France.GetName] öffentlich seinen Wunsch, Teil der [From.GetFactionName] zu werden.\n\n[From.GetName] reagierte umgehend und deutete damit an, dass die Verhandlungen wochenlang abseits der Öffentlichkeit stattgefunden haben müssen. [From.GetLeader] sprach ausführlich darüber, wie die Völker der Welt zusammenarbeiten müssen, um in allen Ländern eine Revolution herbeizuführen. \n\n[France.GetLeader] stimmte zu und drohte in unmissverständlichen Worten jenen, „die Grund haben, die [From.GetFactionName] zu fürchten“."
 news.180.a:0 "Gemeinsam zur Weltrevolution!"
 news.180.b:0 "Ihre Allianz wird schon bald zerbrechen."
 news.180.c:0 "Die Feinde der Demokratie dürfen nicht stärker werden."
 news.180.e:0 "Frankreich hat sich für ihre Seite entschieden."
 news.181.t:0 "[France.GetName] und [From.GetName] vereinen sich"
 news.181.d:0 "Angesichts der zunehmend autokratischen Politik hat [France.GetName] angekündigt, dass es an der Zeit sei, Verbündete zu finden, um der Bedrohung durch den globalen Kommunismus entgegenzutreten. Nun scheint [From.GetName] dieser Verbündete zu sein.\n\nHeute Morgen verkündete [From.GetLeader], dass [France.GetName] und [From.GetName] als Brüder zusammenstehen werden. „Unser gemeinsames Erbe macht uns nicht länger zu Feinden, sondern zu Verbündeten! Die Titanen Europas stehen zusammen.“"
 news.181.a:0 "Gemeinsam sind wir stark!"
 news.181.b:0 "Die Feinde der Demokratie werden stärker."
 news.181.c:0 "Eine unerwartete Freundschaft"
 news.182.t:0 "[France.GetName] tritt [From.GetFactionName] bei!"
 news.182.d:0 "Die europäische Politik wurde heute auf den Kopf gestellt, als französische und deutsche Diplomaten einen Militärpakt zwischen [France.GetName] und [From.GetName] bekannt gaben. Sie erklärten, dass an ihren Grenzen zu viel Blut vergossen worden sei, während andere Mächte ihre Vernichtung anstreben.\n\n[From.GetName] forderte alle auf, darüber nachzudenken, was es bedeutet, dass die alten Feinde, anstatt sich gegenseitig zu schwächen, gemeinsam noch stärker werden."
 news.182.a:0 "Nichts kann [From.GetFactionName] bedrohen!"
 news.182.b:0 "Das neue [From.GetName] schwebt über Europa."
 news.182.c:0 "Die europäische Diplomatie orientiert sich neu entlang der Achse Paris-Berlin."
 news.182.e:0 "Oh Mist."
 news.183.t:0 "[From.GetName] lehnt französische Allianz ab!"
 news.183.d:0 "[From.GetLeader] wies die diplomatischen Annäherungsversuche von [France.GetAdjective] zurück und verkündete öffentlich, dass [From.GetName] keinen Militärpakt mit [France.GetName] anstrebe.\n\nDiplomaten von [From.GetAdjective] bezeichneten den Staat von [France.GetAdjective] als schwach und korrupt und sagten, dass kein wahres [From.GetAdjective] die Ausbreitung der „Krankheit [France.GetAdjective]“ zulassen werde."
 news.183.a:0 "Wie können sie es wagen!"
 news.183.b:0 "Wir können mit ihnen als unseren Feinden leben."
 news.183.c:0 "Solange sie damit beschäftigt sind, gegeneinander zu kämpfen …"
 news.184.t:0 "Italien strebt engere Beziehungen zu Deutschland an"
 news.184.d:0 "Italien und Deutschland haben zahlreiche widerstreitende Interessen geäußert, insbesondere in Österreich und auf dem Balkan. Dies hat jedoch nicht verhindert, dass die beiden Länder ihre Außenpolitik zunehmend freundlicher gestalten. Derzeit laufen Verhandlungen über einen Pakt zum Schutz gemeinsamer Interessen. \n\nWenn die Verhandlungen erfolgreich verlaufen, könnte ein Bündnis entstehen, das in Mittel- und Osteuropa großen Einfluss ausüben kann."
 news.184.a:0 "Unsere Nationen haben viele gemeinsame Interessen."
 news.184.b:0 "Wir werden die Situation im Auge behalten."
 news.185.t:0 "[From.GetName] strebt umfassenden Militärpakt an"
 news.185.d:0 "Mit dem Ziel, das Machtgleichgewicht im Mittelmeerraum neu zu definieren, unternimmt [From.GetName] politische Schritte zur Schaffung einer neuen Allianz in der Region.\n\nDie [From.GetFactionName] ist größtenteils militärischer Natur und wird, in den Worten von [From.GetLeader], Italien in den Mittelpunkt einer neuen Weltmacht stellen."
 news.185.a:0 "[From.GetName] weist den Weg!"
 news.185.b:0 "Hoffen wir, dass ihre Interessen nicht mit unseren in Konflikt geraten."
 news.185.c:0 "Dies könnte Anlass zur Sorge geben."
 news.186.t:0 "Italien erhebt Anspruch auf griechisches Territorium"
 news.186.d:0 "[From.GetName] beruft sich auf das Römische Reich als Vorläufer des modernen [From.GetAdjective]-Staates und behauptet, ein unabhängiger griechischer Staat habe kein Existenzrecht. Stattdessen müssten die „griechischen Gebiete“ die italienische Vorherrschaft in der Ägäis anerkennen oder sie mit Gewalt erobern.\n\n[Greece.GetName] hat diese Behauptungen als absurd bezeichnet. [From.GetName] wird jedoch von [From.GetFactionName] unterstützt."
 news.186.a:0 "Italien sollte die Kontrolle über die Ägäis haben."
 news.186.b:0 "Unverschämte Behauptungen!"
 news.187.t:0 "Italien bittet [GRE.GetName] um Unterstützung"
 news.187.d:0 "[ITA.GetName] bezeichnet [GRE.GetName] als Nachfolger der ersten antiken europäischen Staaten und behauptet, dass zwischen ihren beiden Staaten eine natürliche Freundschaft bestehe.\nIhre politische Agenda ist offensichtlich, da [ITA.GetName] [GRE.GetName] auch als natürliches Mitglied von [ITA.GetFactionName] betrachtet.\n\nOb Ost und West nach anderthalb Jahrtausenden der Trennung wieder vereint werden können, bleibt abzuwarten."
 news.187.a:0 "Sicherlich teilt [Greece.GetName] unsere Interessen."
 news.187.b:0 "Das ist keine Überraschung."
 news.187.c:0 "Wir haben eine lange gemeinsame Geschichte."
 news.188.t:0 "[ITA.GetName] sucht Versöhnung mit [TUR.GetName]"
 news.188.d:0 "Trotz jahrzehntelanger Konflikte und diplomatischer Manöver um die Vorherrschaft im Mittelmeerraum beginnen [ITA.GetName] und [TUR.GetName], ihre Meinungsverschiedenheiten hinter sich zu lassen.\n\nIn einer Vereinbarung zur Zusammenarbeit „zum Wohle des gesamten Mittelmeerraums“ verpflichten sich [ITA.GetName] und [TUR.GetName], engere diplomatische Beziehungen zu pflegen, als sie seit der modernen Gründung der beiden Nationen jemals hatten."
 news.188.a:0 "[ITA.GetName]s Einfluss wächst"
 news.188.b:0 "Wie kann jemand einer „Zusammenarbeit“ mit den [ITA.GetAdjective]s zustimmen?"
 news.188.c:0 "Eine Partnerschaft im Mittelmeerraum ist bedeutsam"
 news.189.t:0 "Italien fordert anatolische Marinestützpunkte"
 news.189.d:0 "Der Londoner Vertrag von 1915 versprach Italien türkisches Territorium in Anatolien. Andere Verträge hätten Vorrang, aber die Versprechen wurden von der Führung von [From.GetAdjective] nicht vergessen.\n\n[From.GetLeader] hat öffentlich erklärt, dass [From.GetName] aufgrund der strategischen Bedeutung der anatolischen Küste die feste Absicht hat, sich das zu nehmen, was „rechtmäßig Italien gehört“."
 news.189.a:0 "Diese Angelegenheit wurde geklärt!"
 news.189.b:0 "Wir werden bekommen, was uns versprochen wurde!"
 news.189.c:0 "Die türkisch-italienische Rivalität verschärft sich."
 news.190.t:0 "Balearen an [Italy.GetName] abgetreten"
 news.190.d:0 "Nachdem sich [Italy.GetAdjective] im Spanischen Bürgerkrieg auf die Streitkräfte von [Italy.GetName] verlassen hatte, hat [Italy.GetName] die Balearen von [From.GetName] angefordert. [From.GetLeader] hat zugestimmt und den diplomatischen Schritt als Stärkung der Bindungen zwischen den beiden Nationen hervorgehoben.\n\nWas [Italy.GetName] betrifft, so werden Marinestützpunkte auf den Balearen dem Land einen größeren Einfluss auf die Straße von Gibraltar ermöglichen und ihm einen besseren Zugang zum Atlantik verschaffen."
 news.190.a:0 "Dies ist ein wichtiger Schritt hin zur vollständigen Dominanz im Mittelmeerraum."
 news.190.b:0 "Italien verstärkt seinen Einfluss auf das Mittelmeer."
 news.190.c:0 "Ein Symbol der „lieben Freundschaft“ zwischen unseren Nationen."
 news.192.t:0 "Italien erhebt Ansprüche auf jugoslawisches Territorium"
 news.192.d:0 "In einer Ansprache an die italienische Bevölkerung entlang der dalmatinischen Küste hat [From.GetLeader] verkündet, dass [From.GetName] das italienischsprachige Gebiet in [YUG.GetName] voll und ganz als rechtmäßigen Teil von [From.GetName] betrachtet. \n\nEine offizielle Erklärung untermauerte diese Behauptungen und stellte klar, dass [From.GetName] bereit ist, das Gebiet notfalls mit Gewalt einzunehmen."
 news.192.a:0 "Das sind jugoslawische Länder, keine italienischen!"
 news.192.b:0 "Sie bringen das ohnehin fragile Gleichgewicht in der Region durcheinander."
 news.192.c:0 "Diese Gebiete scheinen eher italienisch als jugoslawisch zu sein."
 news.193.t:0 "Italienisches Außenministerium in [YUG.GetName]"
 news.193.d:0 "Anstatt [YUG.GetName] wegen der italienischen Bevölkerung an der dalmatinischen Küste zu konfrontieren, hat [From.GetName] die Einrichtung einer ständigen diplomatischen Vertretung in [YUG.GetName] angekündigt. Einer Erklärung des [From.GetAdjective]-Außenministeriums zufolge haben die beiden Länder eine so lange gemeinsame Geschichte und so viele gemeinsame Interessen, dass gegenseitiges Verständnis weitaus wichtiger ist als ein kleiner Grenzstreit.\n\nAngesichts der zunehmenden Spannungen in ganz Europa kann man nur hoffen, dass mehr Länder diesen Ansatz verfolgen."
 news.193.a:0 "Unsere Nationen stehen als Freunde zusammen."
 news.193.b:0 "An der Adria wird Frieden herrschen."
 news.193.c:0 "Es wird interessant sein zu sehen, wo das endet."
 news.194.t:0 "Ostpolen an [From.GetName] abgetreten"
 news.194.d:0 "Durch unbekannte politische Machenschaften hat die Führung von [Poland.GetName] ihre östlichen Gebiete an [From.GetName] abgetreten. \n\nEs ist noch nicht bekannt, welche Versprechen oder Drohungen [From.GetName] gemacht hat, um diesen politischen Sieg zu erringen. Wir werden es vielleicht nie erfahren, da [Poland.GetLeader] über die Ankündigung der Vereinbarung hinaus bisher kein Wort gesagt hat."
 news.194.a:0 "[Poland.GetName] erkennt die Stärke von [From.GetFactionName]!"
 news.194.b:0 "[From.GetName] verbraucht alles auf seinem Weg."
 news.194.c:0 "[Poland.GetName] hatte wohl keine andere Wahl."
 news.195.t:0 "[From.GetName] Gewährt Ostdeutschland"
 news.195.d:0 "Nach der Besetzung Deutschlands durch [Soviet.GetName] wurde [From.GetName] der größte Teil Ostdeutschlands zugesprochen, einschließlich des umstrittenen Gebiets Ostpreußen.\nDies scheint das Ergebnis einer geheimen Klausel im sowjetisch-polnischen Vertrag zu sein. Polen erhält deutsches Land als Entschädigung für das, was es an [Soviet.GetName] abtreten musste.\n\nPolen hat mit dem höchsten Einsatz gespielt, und obwohl viel verloren ging, wurde nun auch viel gewonnen."
 news.195.a:0 "[Soviet.GetName] hält seine Verträge ein."
 news.195.b:0 "Hoffen wir, dass ein freies Polen aus der Asche auferstehen kann, die sein „Beschützer“ hinterlassen hat."
 news.195.c:0 "Eine geografische Verschiebung für Polen. Schon wieder."
 news.196.t:0 "Der [From.GetName] ermutigt Revolutionäre"
 news.196.d:0 "In einer leidenschaftlichen Rede rief [From.GetLeader] kommunistische Parteien weltweit dazu auf, den Untergang des Kapitalismus durch extremere Taktiken zu beschleunigen. Angst vor Verfolgung darf niemanden davon abhalten, den Kampf der Arbeiterklasse zu unterstützen.\n\n[From.GetName] wird die Finanzierung ausländischer kommunistischer Parteien erhöhen und sie in den extremeren Taktiken schulen, die erforderlich sind, um ihre Länder auf die Linie von [From.GetFactionName] zu bringen."
 news.196.a:0 "Die Demokratie darf niemals zerstört werden!"
 news.196.b:0 "Ein lächerlicher Versuch!"
 news.196.c:0 "Steht auf, Brüder und Schwestern!"
 news.196.e:0 "Der Zusammenprall der Ideologien ist die letzte Schlacht der Zivilisationen."
 news.197.t:0 "[From.GetName] gibt dem Ultimatum von [Soviet.GetAdjective] nach"
 news.197.d:0 "[From.GetName] hat einem Ultimatum von [Soviet.GetAdjective] nachgegeben und die Kontrolle über die Ägäischen Inseln an [Soviet.GetName] abgetreten.\n\nDamit verstärkt [Soviet.GetName] seine Präsenz im Mittelmeer und festigt seine Position als Seestreitmacht in der Region."
 news.197.a:0 "Sie sollten froh sein, dass wir ihnen so gute Konditionen angeboten haben."
 news.197.b:0 "[Soviet.GetName] muss gestoppt werden!"
 news.197.c:0 "Die [Soviet.GetName] nimmt Position für die Einfahrt ins Mittelmeer ein."
 news.198.t:0 "[From.GetName] widersetzt sich [Soviet.GetAdjective] Ultimatum"
 news.198.d:0 "[From.GetName] hat die Forderungen eines [SOV.GetAdjective]-Ultimatums bezüglich der Ägäischen Inseln abgelehnt. Da [SOV.GetName] immer größeren Einfluss auf die Region ausübt, hat [From.GetLeader] verkündet, dass ihnen die Übergabe einer einzigen Insel in der Ägäis das gesamte Mittelmeer einbüßt.\n\nDa das Ultimatum abgelehnt wurde, steht [From.GetName] am Rande eines Krieges und kann nur darauf warten, dass [SOV.GetNameDef] den Abzug betätigt."
 news.198.a:0 "Dann ist die Zeit zum Reden vorbei."
 news.198.b:0 "Die Kriegstreiber von [SOV.GetNameDef] müssen gestoppt werden!"
 news.198.c:0 "Dies war ihr Ultimatum. Griechenland muss sich auf den Krieg vorbereiten"
 news.198.e:0 "Wir stehen mit [From.GetNameDef]"
 news.199.t:0 "[ROM.GetNameDefCap] tritt Bessarabien an [From.GetNameDef] ab"
 news.199.d:0 "\n\n[ROM.GetNameDef] wurde gezwungen, einem Ultimatum von [From.GetNameDef] nachzugeben. Die Gebiete Bessarabiens wurden an [From.GetAdjective] übergeben und der Staat [Romania.GetAdjective] bleibt mit verkleinerten Grenzen zurück.\n\nEs bleibt abzuwarten, wie [ROM.GetNameDef] weitere Verluste vermeiden wird."
 news.199.a:0 "Dies ist für die [From.GetAdjective]-Strategie von wesentlicher Bedeutung"
 news.199.b:0 "Die Länder der Welt müssen sich dem Bösen der [From.GetNameDef] stellen!"
 news.199.c:0 "[ROM.GetNameDefCap] befindet sich in einer unglücklichen Lage."
 news.200.t:0 "Deutscher diplomatischer Einfluss in [CZE.GetNameDef]"
 news.200.d:0 "Apropos Brüderlichkeit zwischen den Nationen innerhalb des „deutschen Einflussbereichs“: [From.GetLeader] verkündete heute in einer Rede die Bereitschaft von [From.GetName] zur politischen und diplomatischen Zusammenarbeit mit [CZE.GetNameDef]. Aufgrund seines hohen deutschsprachigen Bevölkerungsanteils wurde [CZE.GetNameDef] als natürlicher Partner für die Interessen von [From.GetAdjective] dargestellt.\n\nObwohl unklar ist, wie viel Mitspracherecht [CZE.GetNameDef] bei dieser Zusammenarbeit hat, kann das Land zumindest sicher sein, dass seine Grenzen vor den territorialen Ambitionen von [GER.GetNameDef] sicher sind."
 news.200.a:0 "Deutsche Freundschaft ist deutscher Oberherrschaft vorzuziehen."
 news.200.b:0 "Die Tschechen waren immer Freunde der Deutschen"
 news.200.c:0 "Der [From.GetName] erweitert seinen Einflussbereich ständig"
 news.200.e:0 "Frieden für unsere Zeit?"
 news.200.f:0 "Tolle Neuigkeiten für die Rückkehr von [Root.GetLeader] aus dem Urlaub in München!"
 news.201.t:0 "[GER.GetNameDefCap] zwingt [TUR.GetNameDef] zum Senden"
 news.201.d:0 "\nDa die [TUR.GetAdjective]-Regierung dem diplomatischen und militärischen Druck der [GER.GetFactionName] aus Ost und West ausgesetzt ist, ist sie in politische Turbulenzen geraten.\n\nNach deutschen und sowjetischen Drohungen ist die neue Regierung, die aus dem Chaos hervorgegangen ist, der [GER.GetFactionName] gegenüber weitaus freundlicher eingestellt als die alte. Mehrere östliche Gebiete wurden bereits an [SOV.GetNameDef] abgetreten. \n\nTatsächlich haben einige hastig zum Schweigen gebrachte Andersdenkende argumentiert, dass die neue Regierung jeder Laune von [GER.GetLeader] folge."
 news.201.a:0 "Die neue türkische Regierung sichert unsere Wettbewerbsfähigkeit im Mittelmeerraum."
 news.201.b:0 "Die schreckliche Macht von [GER.GetFactionName] lässt Länder wie Dominosteine fallen."
 news.201.c:0 "[From.GetNameDefCap] konnte der Stärke von [GER.GetFactionName] nicht widerstehen."
 news.201.e:0 "Die Allianz stärkt unsere Position."
 news.201.f:0 "Die Türkei ist dem räuberischen [GER.GetFactionName] zum Opfer gefallen."
 news.202.t:0 "Slowakei für Danzig"
 news.202.d:0 "Nach Monaten zunehmend aggressiver Rhetorik hat sich das sich verschlechternde Verhältnis zwischen [GER.GetNameDef] und [POL.GetNameDef] heute Abend gewendet: Ein diplomatisches Abkommen soll den Danzig-Konflikt beilegen.\n\n[POL.GetNameDef] wird die deutsch kontrollierte Slowakei als polnischen Teilstaat eingliedern und im Gegenzug die Region Danzig abtreten. Der Status der Freien Stadt Danzig wurde schnell geklärt, und sie wird bald wieder vollständig in den deutschen Staat eingegliedert.\n\nObwohl die Angelegenheit friedlich beigelegt zu sein scheint, werden die Siegermächte des Ersten Weltkriegs sicherlich Einwände haben."
 news.202.a:0 "Ein fairer Austausch zur Korrektur der Fehler von Versailles"
 news.202.b:0 "Kooperation macht uns stärker als Konflikte"
 news.202.c:0 "Dies ist ein eklatanter Verstoß gegen das Versailler Abkommen!"
 news.202.e:0 "Konflikt um Danzig abgewendet"
 news.203.t:0 "Polen tritt Danzig ab"
 news.203.d:0 "Nach der Übergabe eines Ultimatums an [From.GetNameDef] haben [From.GetLeader] und die [From.GetAdjective]-Regierung beschlossen, allen Forderungen nachzukommen, anstatt sich einem Krieg auszusetzen. Sie hoffen, dass [From.GetNameDef] nach dem Verlust Danzigs vor weiteren deutschen Gebietsansprüchen sicher sein wird. Die Lage bleibt jedoch angespannt, und es ist bezeichnend, dass die polnischen Grenztruppen noch keinen Befehl zum Rückzug erhalten haben."
 news.203.a:0 "[GER.GetLeader] darf nicht weiterhin Forderungen an Europa stellen!"
 news.203.b:0 "Dies ist eine Anerkennung der Macht der [GER.GetFactionName]"
 news.203.c:0 "Deutsche Expansion geht weiter"
 news.203.e:0 "Es ist klar, dass die „Demokratien“ Europas nicht in der Lage sind, die faschistische Bedrohung aufzuhalten."
 news.204.t:0 "Polen lehnt deutsches Ultimatum ab"
 news.204.d:0 "Angesichts der Forderungen schien es unvermeidlich. \n\n[From.GetNameDef] würde gezwungen sein, Danzig an Deutschland abzutreten, und ein polnischer Bevollmächtigter würde nach Berlin geschickt, um weitere Bedingungen auszuhandeln. [From.GetLeader] verwies auf [GER.GetNameDef]s jüngstes Vorgehen und erklärte, es sei offensichtlich, dass Deutschland sich nicht mit Danzig allein zufrieden geben würde.\n\nDeutsche und polnische Streitkräfte sind auf den Krieg vorbereitet, und es gibt bereits Berichte über Zusammenstöße an der Grenze. Wieder einmal herrscht Krieg in Europa."
 news.204.a:0 "Deutschland hat jede Warnung ignoriert!"
 news.204.b:0 "Dann ist es Krieg"
 news.204.c:0 "Gemeinsam müssen wir diesen Angreifer stoppen!"
 news.204.e:0 "Dies ist eine ernste Situation"
 news.205.t:0 "Die Pax Americana"
 news.205.d_america:0 "Mit Blick auf die Konflikte auf den anderen Kontinenten hat [USA.GetLeader] ein neues außenpolitisches Programm angekündigt, das den Frieden im eigenen Land sichern soll.\n\nJede Regierung auf dem amerikanischen Kontinent kann die Vereinigten Staaten um militärischen Schutz bitten, sollte sie sich von ihren Nachbarn bedroht fühlen. Obwohl dies keine Garantie für einen bestimmten Staat darstellt, ist der Wunsch nach Frieden in Amerika kein bloßer Traum mehr, sondern offizielle amerikanische Politik."
 news.205.d_not_america:0 "Mit Blick auf die Konflikte auf den anderen Kontinenten hat [USA.GetLeader] ein neues außenpolitisches Programm angekündigt, das den Frieden im eigenen Land sichern soll. Jede Regierung auf dem amerikanischen Kontinent kann die Vereinigten Staaten um militärischen Schutz bitten, sollte sie sich von ihren Nachbarn bedroht fühlen. Obwohl dies keine Garantie für einen bestimmten Staat darstellt, ist der Wunsch nach Frieden in Amerika nicht länger nur ein Traum, sondern offizielle amerikanische Politik."
 news.205.a:0 "Dies sollte Amerika sicherer machen"
 news.205.b:0 "Wenn im Inland Frieden herrscht, können sich die USA auf ihre Feinde im Ausland konzentrieren."
 news.205.c:0 "Es dürfte uns derzeit schwerfallen, Verbündete in Amerika zu finden"
 news.205.e:0 "Hoffen wir auf einen dauerhaften Frieden"
 news.206.t:0 "Amerikanischer Antiimperialismus"
 news.206.d_communist:0 "Nach der Ausbreitung der Arbeiterrevolution in den Vereinigten Staaten ist ihre Rhetorik gegen die alte Ordnung deutlich aggressiver geworden. Nun stellt [USA.GetLeader] den Status Kanadas als Untertan des Britischen Empires in Frage, während amerikanische Diplomaten eine Welt ohne Aristokratie und Weltherrschaft propagieren.\n\nTrotz ihrer engen Bindungen nehmen die Spannungen zwischen [USA.GetNameDef] und dem Kolonialreich [ENG.GetNameDef] zu. Es ist nur eine Frage der Zeit, bis dieser diplomatische Konflikt eskaliert und die Revolution mit Gewalt nach [ENG.GetNameDef] getragen wird."
 news.206.d_not_communist:0 "Das neue kommunistische Regime in den Vereinigten Staaten hat eine neue Doktrin der [USA.GetAdjective]-Außenpolitik angenommen und nimmt gegenüber ehemaligen Verbündeten und Freunden gleichermaßen eine weitaus aggressivere Haltung ein, während es sich den Mitgliedern der Kommunistischen Internationale annähert.\nDieser Politikwechsel beinhaltet die Infragestellung des Status von [CAN.GetName] als unterworfene Nation und die allgemeine Praxis dessen, was sie als „weltweiten britischen Imperialismus“ bezeichnen.\n\nAngesichts der zunehmenden Spannungen scheint die Gefahr eines neuen britisch-amerikanischen Konflikts viel zu real."
 news.206.a:0 "Die ganze Welt wird durch eine Revolution befreit!"
 news.206.b:0 "Wir müssen auf alle Eventualitäten vorbereitet sein"
 news.206.c:0 "Das globale Gleichgewicht ist bedroht"
 news.206.e:0 "Das [USA.GetAdjective]-Regime ist kein Grund zur Sorge"
 news.206.f:0 "Eine besorgniserregende Entwicklung"
 news.207.t:0 "[USA.GetNameDefCap] verurteilt die Komintern"
 news.207.d_fascism:0 "\nAls Reaktion auf die zunehmend aggressive Rhetorik von [SOV.GetNameDef] hat [USA.GetLeader] sich gegen das ausgesprochen, was er als „die größte Gefahr für die menschliche Zivilisation, den Kommunismus“ bezeichnet.\n\n[USA.GetNameDef] wird nicht nur eine Schutzpolitik verfolgen, um die Ausbreitung des Weltsozialismus in Amerika zu verhindern, sondern zielt darauf ab, das Herz des Kommunismus selbst zu zerstören.\n\nMit der Macht der Kriegsmaschinerie von [USA.GetAdjective] scheint die völlige Beseitigung des Kommunismus – zum ersten Mal – durchaus möglich."
 news.207.d_not_fascism:0 "[USA.GetLeader] hielt heute eine öffentliche Rede gegen das, was er als „die größte Gefahr für die menschliche Zivilisation“ bezeichnete: den Kommunismus.\n\n[USA.GetNameDef] wird nicht nur eine Schutzpolitik verfolgen, um die Ausbreitung des Weltsozialismus in Amerika zu verhindern, sondern [USA.GetAdjective] zielt ausdrücklich darauf ab, das Herz des Kommunismus selbst zu zerstören.\n\nAngesichts der Spannungen auf einem Allzeithoch genügt ein einziger Funke, um das Feuer des Krieges zwischen [SOV.GetNameDef] und [USA.GetNameDef] zu entfachen."
 news.207.a:0 "Die Menschheit wird von dieser ideologischen Pest befreit!"
 news.207.b:0 "Sie werden gegen die Bastionen des Kommunismus brechen"
 news.207.c:0 "Wir werden sie in die Knie zwingen"
 news.207.e:0 "Wie auch immer dieser Konflikt ausgeht, es wird eine totale Zerstörung geben"
 news.207.f:0 "[USA.GetNameDefCap] muss alles tun, um sich zu schützen"
 news.208.t:0 "Die japanische Armee schließt sich Nanshin-ron an"
 news.208.d:0 "Die japanischen Streitkräfte haben längst erkannt, dass [jap.GetName] nicht über die für einen längeren Krieg notwendigen natürlichen Ressourcen verfügt. Angesichts zunehmender Spannungen und bewaffneter Konflikte zwischen den Großmächten der Welt scheint die Gefahr eines Importverlusts täglich größer zu werden. Um dem entgegenzuwirken, haben japanische Strategen einen strategischen Plan zur Eroberung westlicher Kolonien in Südostasien und im Pazifik entwickelt. Diese rohstoffreichen Regionen werden die japanische Kriegsmaschinerie antreiben und ihr ein mehr oder weniger ungehindertes Fortbestehen ermöglichen, solange die Kolonialmächte und die [USA.GetName] in Schach gehalten werden können."
 news.208.a:0 "Können sie unseren Besitz wirklich bedrohen?"
 news.208.b:0 "Solange amerikanisches Territorium nicht bedroht ist"
 news.208.c:0 "Sie haben erkannt, dass sie ihre Beute woanders suchen müssen"
 news.208.e:0 "Krieg in Südostasien scheint wahrscheinlich"
 news.209.t:0 "Die japanische Armee nimmt Hokushin-ron an"
 news.209.d:0 "Die japanischen Streitkräfte haben längst erkannt, dass [jap.GetNameDef] nicht über die für einen längeren Krieg notwendigen natürlichen Ressourcen verfügt. Angesichts zunehmender Spannungen und bewaffneter Konflikte zwischen den Großmächten der Welt scheint die Gefahr von Importverlusten täglich größer zu werden.\nUm dem entgegenzuwirken, haben japanische Strategen einen strategischen Plan entwickelt, um [SOV.GetNameDef] sibirische Minen und Ölfelder zu erobern. Es wird vermutet, dass ein schneller Vormarsch es Japan ermöglichen wird, Schlüsselgebiete zu erobern, bevor ein richtiger [SOV.GetAdjective] Gegenangriff gestartet werden kann. Bis dahin verfügt die japanische Armee über alle Ressourcen, die sie braucht, um den Krieg bis zur [SOV.GetAdjective] Kapitulation am Brennen zu halten."
 news.209.a:0 "Es wäre töricht gewesen, unseren Besitz zu bedrohen"
 news.209.b:0 "Wir haben Japan davon abgehalten, im Pazifik vorzudringen"
 news.209.c:0 "Sie verstehen nicht, welch schrecklicher Macht sie gegenüberstehen werden"
 news.209.e:0 "Krieg in Sibirien scheint unvermeidlich"
 news.210.t:0 "Japan ersetzt Regierung in China"
 news.210.d:0 "Nach Jahrzehnten politischer Instabilität in China, gepaart mit bewaffneten Konflikten im In- und Ausland, hat die japanische Regierung erklärt, dass sie die chinesische Regierung als Bedrohung für die Stabilität ihrer Interessensphäre betrachtet. Auf dieser Grundlage wurde – trotz Kriegsdrohung – eine neue Regierung eingesetzt, die Japan treu ergeben ist und dem japanischen Kaiser untersteht. Diese neue Regierung genießt nicht nur den Schutz der japanischen Armee, sondern auch das militärische Mandat, die chinesischen Warlord-Staaten zurückzuerobern. Zwar werden die politischen Konflikte mit Sicherheit weiter toben, doch ein offener Krieg zwischen den beiden Ländern konnte abgewendet werden."
 news.210.a:0 "Der japanische Einflussbereich ist unbestreitbar"
 news.210.b:0 "Wir sollten unsere südöstlichen Grenzen im Auge behalten"
 news.210.c:0 "Vielleicht ist es an der Zeit, unsere Kolonien gegen die japanischen Ambitionen zu stärken"
 news.210.e:0 "Es scheint, dass es eine Art Frieden zwischen China und Japan geben wird"
 news.211.t:0 "Japan beansprucht die Hegemonie in Ostasien"
 news.211.d:0 "Angesichts ihrer unangefochtenen militärischen Überlegenheit in Ostasien hat [jap.GetLeader] erklärt, dass [jap.GetNameDef] die gesamte Region als seine Interessensphäre betrachtet. Ohne genaue Informationen über das Ausmaß der Machtprojektion Japans ist noch immer unklar, was [jap.GetNameDef] als rechtmäßigen Teil der kürzlich gegründeten [jap.GetFactionName] ansieht."
 news.211.a:0 "Der [jap.GetFactionName] steigt"
 news.211.b:0 "Dies ist eine interessante Entwicklung"
 news.211.c:0 "Sie werden es nicht wagen, Anspruch auf unser asiatisches Territorium zu erheben"
 news.211.e:0 "Eine besorgniserregende Entwicklung im Pazifik"
 news.211.f:0 "Es klingt, als hätten wir widersprüchliche Interessen"
 news.211.g:0 "Das sollten wir im Auge behalten"
 news.212.t:0 "Japanische Diplomaten in Berlin"
 news.212.d_not_axis:0 "Zwischen Tokio und Berlin entwickelt sich eine neue Partnerschaft. Verhandlungen über einen Pakt zwischen den beiden Staaten haben begonnen. Dabei werden sowohl strategische Interessen als auch gemeinsame Werte betont. Es bleibt abzuwarten, was aus diesen Verhandlungen resultiert, doch die Aussicht auf eine Freundschaft zwischen einigen der stärksten Militärmächte beider Hemisphären gibt ihren zahlreichen Feinden Anlass zur Sorge."
 news.212.d_axis:0 "Zwischen Tokio und Berlin entwickelt sich eine neue Partnerschaft. Verhandlungen über einen Pakt zwischen den beiden Staaten haben begonnen. Dabei werden sowohl strategische Interessen als auch gemeinsame Werte betont. Es bleibt abzuwarten, was aus diesen Verhandlungen resultiert, wenn überhaupt. Die Aussicht auf eine Freundschaft zwischen einigen der stärksten Militärmächte beider Hemisphären ist jedoch für ihre Verbündeten ein Grund zum Jubeln und für ihre zahlreichen Feinde Anlass zur Sorge."
 news.212.a:0 "Das wird uns alle stärker machen"
 news.212.b:0 "Unsere Feinde sollten keine Freunde sein"
 news.212.c:0 "Es wäre vielleicht das Beste, wenn daraus nichts würde"
 news.213.t:0 "[USA.GetNameDefCap] steht gegen Faschismus"
 news.213.d_peace:0 "Als Land der Freien betrachtet sich [USA.GetNameDef] als natürlicher Feind des Faschismus in all seinen Formen weltweit. Mit der Aggression des deutschen Regimes sind sie derzeit der größte Feind einer Welt, die auf den liberalen Prinzipien von [USA.GetNameDef] aufbaut.\n\nVor diesem Hintergrund und mit der Zustimmung des [USA.GetAdjective] Kongresses hat [USA.GetLeader] eine Warnung an [GER.GetNameDef] gerichtet. Sofern [GER.GetNameDef] seinen politischen Kurs nicht ändert, wird [USA.GetNameDef] gegen sie vorgehen.\n\nObwohl kein konkretes Vorgehen festgelegt wurde, schwebt zwischen den beiden Ländern die implizite Kriegsgefahr."
 news.213.d_war:0 "Als Land der Freien betrachtet sich [USA.GetNameDef] als natürlicher Feind des Faschismus in all seinen Formen weltweit. Mit der Aggression des deutschen Regimes sind sie derzeit der größte Feind einer Welt, die auf den liberalen Prinzipien von [USA.GetNameDef] aufbaut.\n\nVor diesem Hintergrund und mit der Zustimmung des [USA.GetAdjective] Kongresses hat [USA.GetLeader] eine Warnung an [GER.GetNameDef] gerichtet. Sofern [GER.GetNameDef] nicht kapituliert und seinen politischen Kurs ändert, wird [USA.GetNameDef] all seine industrielle und militärische Macht gegen sie einsetzen.\n„Wir werden nicht zulassen, dass [GER.GetNameDef] den Lauf der Geschichte aufhält!“"
 news.213.a:0 "Das [GER.GetName] wird tausend Jahre lang stark bleiben!"
 news.213.b:0 "Sie müssen ihre Worte mit Stahl beweisen"
 news.213.c:0 "Der [GER.GetName] wird fallen!"
 news.213.e:0 "Dies wird keine friedliche Lösung haben"
 news.214.t:0 "Polen strebt eine Zusammenarbeit im Baltikum an"
 news.214.d_not_baltic:0 "„Für uns gibt es kein Ergebnis, das nicht die Gefahr einer weiteren Unterdrückung des polnischen Volkes birgt.“\n\nNachdem sich [POL.GetName] von der internationalen Gemeinschaft distanziert hat, verfolgen polnische Politiker die Idee einer Macht „zwischen den Meeren“.\n\nObwohl die Hoffnung auf ein Bündnis besteht, das sich von der Ostsee bis zum Schwarzen Meer erstreckt, bleibt ihre erklärte Priorität die Stärkung ihrer Position gegenüber bedrohlichen Einflüssen aus Ost- und Westeuropa. Zu diesem Zweck strebt [POL.GetName] engere Beziehungen zu seinen Nachbarn im Baltikum an."
 news.214.d_baltic:0 "[POL.GetName] hat sich schrittweise von der internationalen Gemeinschaft distanziert, wohl wissend, dass es sich nicht auf die Politik der „Großmächte“ verlassen kann, um Aggressoren daran zu hindern, den polnischen Staat erneut zu stürzen.\n\nStattdessen hat [POL.GetLeader] Pläne für ein Bündnis zur Stärkung der baltischen Region vorgelegt, das hoffentlich Aggressionen aus Ost oder West abschrecken wird.\n\nAngesichts der Verschlechterung der Stabilität in Europa könnte ein solches Bündnis in unserem besten Interesse sein."
 news.214.a:0 "Eine neue Macht in Osteuropa."
 news.214.b:0 "Sie mischen sich in unseren Einflussbereich ein!"
 news.214.c:0 "Sie versuchen eindeutig, [GER.GetName] zu bedrohen."
 news.214.e:0 "[POL.GetFactionName] ist möglicherweise unsere sicherste Wahl."
 news.215.t:0 "[GER.GetName] formalisiert antisowjetischen Pakt"
 news.215.d_not_soviet:0 "[GER.GetNameDefCap] verurteilt den Kommunismus seit langem in allen Formen und hat diplomatische Schritte unternommen, um auch andere Nationen zum Widerstand aufzufordern.\n\nNun hat [GER.GetName] „Staaten, die unmittelbar vom Kommunismus bedroht sind“ die Möglichkeit geboten, einen Pakt gegen [SOV.GetName] zu schließen. Jedes Mitgliedsland des Pakts verpflichtet sich, Krieg gegen [SOV.GetName] zu führen, sollte es eines Tages angegriffen werden."
 news.215.d_soviet:0 "[GER.GetLeader] war schon vor seiner Machtübernahme ein lautstarker Gegner des Kommunismus, und es gab nie Zweifel daran, dass [GER.GetNameDef] sich selbst als Feind von [SOV.GetNameDef] betrachtet.\n\nHeute wurde diese Haltung der Welt verkündet, da das zuvor zwischen [GER.GetNameDef] und mehreren anderen Ländern geschlossene „Antisowjetische Abkommen“ nun zu einem Pakt formalisiert wurde. Die anderen Mitglieder werden zum Krieg aufgerufen, sollte eines von ihnen in einen Konflikt mit uns geraten."
 news.215.a:0 "Nur so kann der kommunistischen Bedrohung begegnet werden."
 news.215.b:0 "Der Kampf wird die Arbeiterrevolution nur beschleunigen."
 news.215.c:0 "Lass sie sich gegenseitig ausbluten."
 news.216.t:0 "[TUR.GetName] widersetzt sich Ultimatum von [GER.GetName]."
 news.216.d:0 "Diplomaten der [GER.GetName] stellten [TUR.GetName] gestern ein Ultimatum, das [TUR.GetLeader] zum Rücktritt zugunsten einer von Deutschland unterstützten Regierung aufforderte. Mit Unterstützung der Großen Nationalversammlung lehnte [TUR.GetLeader] das Ultimatum ab und verkündete dem [TUR.GetAdjective] Volk, dass die Türkei niemals zum Spielball eines ausländischen Diktators werden werde.\n\nNun bereitet sich das Land auf einen Krieg vor."
 news.216.a:0 "Der [GER.GetName] wird heruntergesetzt."
 news.216.b:0 "Wir stehen hinter [TUR.GetName]."
 news.216.c:0 "Törichter Widerstand."
 news.216.e:0 "Ein Krieg in der Türkei scheint unvermeidlich."
 news.217.t:0 "[GER.GetNameDefCap] treibt [TUR.GetNameDef] dazu, sich [ENG.GetFactionName] anzuschließen"
 news.217.d:0 "\n\nMit der Übergabe eines Ultimatums an die [TUR.GetAdjective]-Regierung hat sich [GER.GetNameDef] einen neuen Feind geschaffen. Anstatt den Forderungen der [GER.GetAdjective]-Diplomaten nachzugeben, wie [GER.GetLeader] erwartet hatte, hat [TUR.GetNameDef] ein Verteidigungsbündnis mit [ENG.GetNameDef] vereinbart.\n\n[ENG.GetNameDef] und ihre Verbündeten bereiten sich darauf vor, [TUR.GetNameDef] zu verteidigen, falls [GER.GetNameDef] seinem Ultimatum nachkommt."
 news.217.a:0 "Wir müssen gemeinsam gegen [GER.GetNameDef] stehen."
 news.217.b:0 "[GER.GetNameDefCap] macht sich immer mehr Feinde."
 news.217.c:0 "Wenn sie eine friedliche Zusammenarbeit verweigern ..."
 news.217.e:0 "[GER.GetNameDefCap] und [TUR.GetNameDef] spielen ein gefährliches Spiel."
 news.218.t:0 "Ja! Wir haben keine Bananen"
 news.218.d:0 "Unser strenges Rationierungsprogramm erstreckt sich zwar nicht auf frisches Obst, doch der Schatten des Krieges führt dazu, dass wir den Großteil unserer Importkapazitäten verlieren. Viele ehemalige tropische Handelsgüter, darunter Zitronen und Bananen, sind daher heute unerschwingliche Luxusgüter. \nUm den Kriegsgeist aufrechtzuerhalten, hängen Ladenbesitzer Schilder mit Anspielungen auf die lustige alte Showmelodie in ihre Fenster.\n\nLeider herrscht auch ein Mangel an grünen Bohnen und Zwiebeln, Kohl und Frühlingszwiebeln sowie allen Arten von Obst, aber der britische Geist hält durch!"
 news.218.a:0 "Ich wollte nur eine Banane"
 news.219.t:0 "Säuberungen der Führungsebene in [SOV.GetNameDef]"
 news.219.d:0 "In [SOV.GetNameDef] herrscht seit langem Ungewissheit. Obwohl Details rar sind, gab es eine Reihe geheimer Prozesse auf höchster Ebene, und sowohl Generäle als auch Minister sind aus der Öffentlichkeit verschwunden.\nDie naheliegende Annahme ist, dass eine große Verschwörung innerhalb der Kommunistischen Partei aufgedeckt wurde, doch eine offizielle Stellungnahme dazu gab es nicht. Darüber hinaus deuten die uns vorliegenden diplomatischen Berichte darauf hin, dass die bei diesen Prozessen vorgelegten Beweise alles andere als unwiderlegbar waren.\n\nWas auch immer geschehen ist, die Struktur des [SOV.GetAdjective]-Oberkommandos hat sich unwiderruflich verändert."
 news.219.a:0 "[SOV.GetLeader] hat Stabilität in [SOV.GetNameDef] sichergestellt."
 news.219.b:0 "Ein Beweis für die dem Kommunismus innewohnende Korruption."
 news.219.c:0 "Der Befehl [SOV.GetAdjective] hat stark gelitten"
 news.220.t:0 "Offiziersaufstand in [SOV.GetNameDef]!"
 news.220.d:0 "Teile des sowjetischen Oberkommandos haben sich gegen die Führung von [SOV.GetLeader] erhoben!\nEs ist nicht klar, was genau diesen Aufstand verursacht hat, aber es scheint kein besonders gut geplanter Versuch zu sein, die Macht zu ergreifen.\n\nDie politische Situation von [SOV.GetAdjective] ist möglicherweise nicht so, wie sie nach außen dargestellt wird."
 news.220.a:0 "Das Volk wird immer triumphieren."
 news.220.b:0 "Für [Root.GetNameDef]!"
 news.220.c:0 "Sie zerbröckeln von innen heraus!"
 news.220.e:0 "Die sozialistische Machtstruktur ist nicht haltbar."
 news.220.f:0 "Das ist eine unerwartete Entwicklung."
 news.221.t:0 "Trotzki kehrt zurück zu [SOV.GetNameDef]"
 news.221.d:0 "[SOV.GetNameDefCap] hat einen großen Umbruch erlebt, als Stalin von einer Fraktion abgesetzt wurde, die seinen alten politischen Rivalen [SOV.GetLeader] unterstützte!\nÜber den aktuellen Aufenthaltsort des alten Diktators und den genauen Ablauf des Machtwechsels gibt es noch immer kaum Einzelheiten.\nAlles deutet jedoch darauf hin, dass es kein friedlicher Machtwechsel war, da einige Stalin-Anhänger ihre Fahnen zum Aufstand gegen Trotzkis neues Regime gehisst haben."
 news.221.a:0 "Die Vierte Internationale weist den Weg."
 news.221.b:0 "Ein neuer Weltführer betritt die Bühne."
 news.221.c:0 "Aber Trotzki ist genau hier in ... Oh."
 news.222.t:0 "[ENG.GetAdjective] Parlament debattiert über Intervention in Skandinavien"
 news.222.d:0 "\nAngesichts des strategischen Werts der skandinavischen Region für [ENG.GetAdjective] Verteidigungsbemühungen und der potenziellen Risiken, die mit der Ausweitung des Einflusses eines Feindes dort verbunden sind, hat das [ENG.GetAdjective] Parlament die Möglichkeit einer militärischen Intervention erörtert.\nObwohl die politischen Auswirkungen einer solchen Aktion schwer auf [ENG.GetLeader] lasteten, wurden mehrere entscheidende Argumente vorgebracht, bevor entschieden wurde, dass der Rest der Debatte hinter verschlossenen Türen geführt werden sollte.\n\nEine solche Intervention würde die politische Landschaft Nordeuropas unwiderruflich verändern."
 news.222.a:0 "Wir tun, was wir müssen, für König und Vaterland."
 news.222.b:0 "Werden sie auch die Unabhängigkeit bedrohen?"
 news.222.c:0 "[ENG.GetNameDefCap] muss einige schwierige Entscheidungen treffen."
 news.222.e:0 "Ein solches Vorgehen würde das Gleichgewicht in Europa stören."
 news.222.f:0 "Werden sie wirklich eine Intervention wagen?"
 news.223.t:0 "[ENG.GetAdjective] Parlament debattiert Intervention in den Benelux-Ländern"
 news.223.d:0 "\nNach den Lehren des Ersten Weltkriegs wird [ENG.GetAdjective] den strategischen Wert der Benelux-Region und die potenziellen Risiken einer Einflussnahme feindlicher Länder dort nicht unterschätzen. Das [ENG.GetAdjective]-Parlament hat über die Möglichkeit einer militärischen Intervention debattiert.\nObwohl die politischen Auswirkungen einer solchen Aktion [ENG.GetLeader] schwer belasteten, wurden mehrere entscheidende Argumente vorgebracht, bevor entschieden wurde, dass der Rest der Debatte hinter verschlossenen Türen geführt werden sollte.\n\nEine solche Intervention würde die politische Landschaft Westeuropas unwiderruflich verändern."
 news.223.a:0 "Wir tun, was wir müssen, für König und Vaterland."
 news.223.b:0 "Werden sie auch die Unabhängigkeit bedrohen?"
 news.223.c:0 "[ENG.GetNameDefCap] muss einige schwierige Entscheidungen treffen."
 news.223.e:0 "Ein solches Vorgehen würde das Gleichgewicht in Europa stören."
 news.223.f:0 "Werden sie wirklich eine Intervention wagen?"
 news.224.t:0 "[ENG.GetNameDefCap] Druck [Spain.GetNameDef]"
 news.224.d:0 "Angesichts der Tradition des britischen Einflusses im Mittelmeerraum, der von Gibraltar ausgeht, dürfte es nicht überraschen, dass die [ENG.GetAdjective]-Regierung beschlossen hat, politischen Druck auf die faschistische Regierung in [Spain.GetNameDef] auszuüben.\n\nDa die [ENG.GetAdjective]-Regierung sich noch immer von den Folgen des Bürgerkriegs erholt, ist ihre Unterstützung weitaus wichtiger als politische Prinzipien."
 news.224.a:0 "Wir müssen ihre diplomatische Mission annehmen."
 news.224.b:0 "Was glauben die [ENG.GetAdjective], wer sie sind?"
 news.224.c:0 "Die [ENG.GetAdjective] üben ihren Einfluss aus."
 news.225.t:0 "[ENG.GetNameDefCap] übt Einfluss in [TUR.GetNameDef] aus"
 news.225.d:0 "Das Mittelmeer ist seit langem eine Region von großem strategischen Wert für den imperialen Einfluss von [ENG.GetNameDef]. Nun sucht die [ENG.GetAdjective]-Regierung nach weiterer Unterstützung durch die Länder der Region. Zu diesem Zweck wurde ein „Sonderkonsul für den [TUR.GetAdjective]-Staat“ ernannt.\n\nAngesichts des jahrhundertelangen erbitterten Wettbewerbs um die Seeherrschaft im Mittelmeerraum bleibt abzuwarten, ob es gelingt, die beiden Länder einander näher zu bringen."
 news.225.a:0 "Ihre diplomatische Mission könnte für uns nützlich sein."
 news.225.b:0 "Was glauben die [ENG.GetAdjective], wer sie sind?"
 news.225.c:0 "Die [ENG.GetAdjective] üben ihren Einfluss aus."
 news.226.t:0 "[ENG.GetNameDefCap] übt Einfluss aus in [GRE.GetNameDef]"
 news.226.d:0 "Der Mittelmeerraum ist seit langem eine Region von großem strategischen Wert für den imperialen Einfluss von [ENG.GetNameDef]. Nun sucht die [ENG.GetAdjective]-Regierung nach weiterer Unterstützung durch die Länder der Region. Zu diesem Zweck wurde ein „Sonderkonsul für den [GRE.GetAdjective]-Staat“ ernannt.\n\nMehr als ein Jahrhundert nach Lord Byrons Teilnahme am griechischen Unabhängigkeitskrieg bleibt abzuwarten, ob [ENG.GetNameDef] erfolgreich sein wird."
 news.226.a:0 "Ihre diplomatische Mission könnte für uns nützlich sein."
 news.226.b:0 "Was glauben die [ENG.GetAdjective], wer sie sind?"
 news.226.c:0 "Die [ENG.GetAdjective] üben ihren Einfluss aus."
 news.227.t:0 "Eine dunkle und wilde Reise"
 news.227.d:0 "Wir waren zehn Meilen von Berlin entfernt, als die Auswirkungen einsetzten. Sie sollten unsere Kampfkraft verstärken. Lächerlich. Das Einzige, was dadurch verstärkt wurde, war mein Verdacht, dass mein Kommandant versuchte, mich loszuwerden. Es half auch nicht, dass ich die rollenden Ketten deutscher Panzer nicht von dem wilden Pochen hinter meinen Augen unterscheiden konnte.\nIch musste Dr. Gonzo finden.“"
 news.227.a:0 "Wir sind im Fledermausland."
 news.228.t:0 "[ENG.GetNameDefCap] kündigt diplomatische Initiative auf dem Balkan an"
 news.228.d:0 "\n[ENG.GetNameDef] ist nicht der einzige, der die Bedrohung in Mitteleuropa wachsen sieht.\n\nDa ihnen der Status als unabhängige Nation durch den nun angefochtenen Versailler Vertrag garantiert wurde und faschistische Mächte mit ihrer aggressiven Rhetorik Anspruch auf ihr Territorium erheben, haben mehrere Staaten die Notwendigkeit erkannt, eine pro-[ENG.GetAdjective]-Politik zu führen. \n[ENG.GetNameDef] hat auf diese Entwicklung reagiert, indem es seine diplomatischen Bemühungen in der Region verdoppelt hat."
 news.228.a:0 "Hoffen wir, dass sie uns vor der faschistischen Welle schützen können."
 news.228.b:0 "Sie sollten in ihrem eigenen kleinen „Einflussbereich“ bleiben!"
 news.228.c:0 "Die europäische Stabilität muss gewahrt werden!"
 news.228.e:0 "[ENG.GetNameDefCap] bereitet ihre Strategie vor."
 news.229.t:0 "[GRE.GetNameDefCap] widersteht [GER.GetAdjective] Druck"
 news.229.d:0 "Obwohl [GRE.GetNameDef] durch die von [GER.GetNameDef] angeführten Gebietsforderungen stark zurückgedrängt wurde, hat das Land nun eine klare Grenze gezogen. [GRE.GetLeader] hat klargestellt, dass [GRE.GetNameDef] keine weiteren Zugeständnisse machen und sich keinen weiteren Forderungen von [GER.GetAdjective] beugen wird.\n\nDies alles ist eine Reaktion auf ein Ultimatum von [GER.GetNameDef], wonach die Regierung von [GRE.GetNameDef] zurücktreten und eine von [GER.GetAdjective] genehmigte Ersatzregierung akzeptieren soll."
 news.229.a:0 "[GER.GetAdjective] Annäherungsversuche müssen abgelehnt werden!"
 news.229.b:0 "Sie hätten sich retten sollen, als sie die Chance dazu hatten."
 news.229.c:0 "Dies wird wahrscheinlich in einem bewaffneten Konflikt enden."
 news.230.t:1 "Rebellionen in Amerika"
 news.230.d:0 "Sowohl in Mittel- als auch in Südamerika haben Revolutionäre im Namen von [USA.GetRulingIdeologyNoun] zu den Waffen gegriffen und rebelliert.\n\nSie sind in der Regel gut ausgerüstet und gut organisiert, und hätten sie eine andere Ideologie vertreten, wäre ihre Finanzierung leicht nachzuvollziehen gewesen. Wer auch immer diese Bewegungen finanziert, hat sich jedoch bemüht, seine Beteiligung zu verbergen.\n\nNatürlich gibt es nur eine Großmacht mit der erklärten außenpolitischen Mission, [USA.GetRulingIdeologyNoun] in Amerika zu fördern..."
 news.230.a:0 "Sie werden unser Land an den Rand des Ruins bringen!"
 news.230.b:0 "Hä? Das waren wir nicht."
 news.230.c:0 "Die Menschen überall sollten sich für die Sache der Freiheit erheben!"
 news.230.e:0 "Von den USA unterstützte Staatsstreiche?\nEin einmaliges Ereignis!"
 news.231.t:0 "[jap.GetAdjective] Aufbau an der [CHI.GetAdjective] Grenze"
 news.231.d:0 "Nach dem Vorfall an der Marco-Polo-Brücke hat [jap.GetName] seinen Druck auf die [CHI.GetAdjective]-Grenze nicht verringert.\nIn Verbindung mit der aggressiven Rhetorik von [jap.GetAdjective], die von einer „schrecklichen Vergeltung für [CHI.GetNameDef]s Weigerung zur Zusammenarbeit“ spricht, scheint ein erneuter Krieg zwischen [jap.GetNameDef] und [CHI.GetNameDef] von Tag zu Tag wahrscheinlicher.\n\nDie diplomatische Lage wird bald einen Siedepunkt erreichen und [jap.GetNameDef] hat kein Interesse an einer Entschärfung der Situation geäußert."
 news.231.a:0 "Bösartige imperialistische Invasoren!"
 news.231.b:0 "Der Konflikt in China ist besorgniserregend."
 news.232.t:0 "[GER.GetNameDefCap] sucht skandinavische Unterstützung"
 news.232.d:0 "Apropos „gemeinsame politische Interessen“: [GER.GetLeader] hat heute ein diplomatisches Programm zur Verbesserung der Beziehungen zwischen [GER.GetNameDef] und den skandinavischen Ländern angekündigt.\nDer erste Schritt ist die Einrichtung einer ständigen diplomatischen Vertretung in [DEN.GetNameDef], die sicherstellen soll, dass es zwischen den beiden Ländern nicht zu Konflikten kommt.\n\nLaut [GER.GetLeader] hat die [DEN.GetAdjective]-Regierung diese diplomatische Annäherung dankbar angenommen.\n\nDie Diplomaten von [DEN.GetAdjective] waren für eine Stellungnahme nicht erreichbar."
 news.232.a:0 "Freunde zu finden ist besser, als sich Feinde zu machen..."
 news.232.b:0 "Glauben sie wirklich, dass sie jetzt neue Verbündete finden werden?"
 news.232.c:0 "Wir sollten diese Situation im Auge behalten."
 news.233.t:0 "[GER.GetAdjective] Interesse an Skandinavien"
 news.233.d_war:0 "[GER.GetNameDefCap] hat klare strategische Interessen in Skandinavien, sowohl hinsichtlich militärischer Stützpunkte als auch hinsichtlich des Imports natürlicher Ressourcen. Der eskalierende Konflikt hat dazu geführt, dass alle Ressourcen, die über die Ostsee oder die Nordsee transportiert werden, einer realen Bedrohung ausgesetzt sind.\n\nAngesichts der zunehmenden diplomatischen Drohungen gegen [DEN.GetNameDef] und [NOR.GetNameDef] ist eine Zunahme der [GER.GetAdjective] Militäroperationen in der Region wahrscheinlich."
 news.233.d_no_war:0 "[GER.GetAdjective] Die Rhetorik gegenüber den nördlichen Ländern hat sich in den letzten Wochen verschärft. Die Botschaft ist klar: [DEN.GetNameDef] und [NOR.GetNameDef] dürfen deutsche Importe in keiner Weise behindern, weder durch Widerstand noch durch Untätigkeit.\n\nObwohl es für solche Forderungen keinen unmittelbar ersichtlichen Grund gibt, da die Importe nach Deutschland weiterhin ungehindert fließen, befürchten unsere Diplomaten, dass dies ein Vorspiel zu [GER.GetAdjective] Maßnahmen in der Region ist."
 news.233.a:0 "Das verheißt nichts Gutes."
 news.233.b:0 "Wir müssen unsere Optionen abwägen."
 news.233.c:0 "Wir werden sehen, wie sich die Situation entwickelt."
 news.234.t:0 "[GER.GetAdjective] Druck auf die Benelux-Länder"
 news.234.d:0 "Nach dem Ausbruch des Krieges mit Frankreich übte Deutschland stärkeren diplomatischen Druck auf die Benelux-Länder aus als je zuvor. Mit der Unterstützung von [FRA.GetAdjective] und [ENG.GetAdjective] weigern sie sich jedoch, diesem Druck nachzugeben.\n\nEs gibt Grund zur Annahme, dass [GER.GetNameDef], wenn es ihnen nicht gelingt, ihre Ziele auf diplomatischem Wege zu erreichen, diese mit Gewalt erreichen wird."
 news.234.a:0 "Nicht schon wieder!"
 news.234.b:0 "[GER.GetNameDefCap] muss in Schach gehalten werden!"
 news.234.c:0 "Das wäre ein aggressiver Schlag."
 news.235.t:0 "Chaplin in Kalifornien festgenommen"
 news.235.d:0 "Erfreuliche Neuigkeiten für [GER.GetLeader]: Sein Lieblingsfilmstar, der einzigartige Charlie Chaplin, wurde heute in Kalifornien gefunden. Auf der Flucht in ländliche Gebiete wurde er von einer [GER.GetAdjective]-Patrouille angehalten, die ihn sofort an seinem ikonischen Schnurrbart erkannte. Nachdem er den Schlussmonolog seines Meisterwerks „Der große Diktator“ wiederholt hatte, wurde der angesehene Schauspieler „überzeugt“, mitzukommen, um die in der Region stationierten [GER.GetAdjective]-Truppen zu unterhalten.\n\nNun wird er nach Berlin geschickt, wo [GER.GetLeader] endlich seinen Helden treffen wird. Obwohl politische Differenzen das Treffen trüben könnten, fiebert [GER.GetLeader] dem Moment mit."
 news.235.a:0 "Er wird einen Empfang bekommen, der eines amerikanischen Helden würdig ist!"
 news.236.t:0 "Die Konferenz von Jalta"
 news.236.d:0 "Da ein gemeinsamer Sieg gegen [GER.GetNameDef] unvermeidlich ist, wollen [yalta_origin.GetNameDef] und [yalta_partner.GetNameDef] die zukünftige Stabilität Europas sichern. [yalta_origin.GetLeader], [yalta_partner.GetLeader] und die Staats- und Regierungschefs anderer am Krieg beteiligter Länder haben sich getroffen, um über das Schicksal von [GER.GetNameDef] zu einigen.\n\nTagelange Verhandlungen führten zur Zeichnung einer neuen Karte Europas. Diese neue europäische Ordnung wird durch eine Wunde, die sich durch die Mitte von [GER.GetNameDef] zieht, in Ost und West geteilt.\n\nEs bleibt abzuwarten, ob dies wirklich zu dauerhaftem Frieden in Europa führen wird."
 news.236.a:0 "Loben Sie den Tag nicht, bevor der Abend vorbei ist."
 news.236.b:0 "Wir forderten, was uns richtig erschien."
 news.236.c:0 "Lassen Sie uns diesen Krieg schnell beenden."
 news.236.e:0 "Dies könnte das Ende von [GER.GetNameDef] sein."
 news.237.t:0 "Der Anschluss Österreichs"
 news.237.d:0 "Nach einem erfolgreichen Staatsstreich der lokalen NSDAP in [From.Root.GetNameDef] haben deutsche Truppen die Grenze überschritten und die Kontrolle über das Land übernommen. \n\nDie deutschen Soldaten wurden in den Städten von jubelnden Menschenmengen begrüßt, als sie durch das Land eilten, um sich den [From.Root.GetAdjective]-Kämpfen im anhaltenden Bürgerkrieg anzuschließen. [GER.GetLeader] verkündete den Anschluss Österreichs und betonte:\n\n„Der Kampf des Volkes wird bald vorbei sein! Die älteste Ostprovinz des deutschen Volkes wird von nun an die neueste Bastion von [GER.GetNameDef] sein!“"
 news.237.a:0 "Wenn sie das wünschen ..."
 news.237.b:0 "Willkommen im Reich!"
 news.237.c:0 "Wir müssen unsere Nordgrenzen sichern!"
 news.237.e:0 "Dies verstößt gegen den Versailler Vertrag!"
 news.238.t:0 "[AST.GetNameDefCap] übernimmt die Verantwortung für Kolonialbesitz"
 news.238.d:0 "\nUm der zunehmenden Bedrohung der [ENG.GetAdjective]-Besitztümer in Südostasien entgegenzuwirken, wurden die Kolonialgebiete Singapur und Borneo an [AST.GetNameDef] übertragen. Mit dem Ziel, die erste und beste Verteidigungslinie des Commonwealth im Pazifik zu bilden, übernimmt [AST.GetNameDef] die volle Verantwortung für die militärischen und administrativen Vorbereitungen im Falle von Kämpfen in der Region.\n\nVermutlich als Gegenmaßnahme zu den imperialen Ambitionen von [jap.GetNameDef] ist [AST.GetNameDef] nicht mehr vollständig auf die Bemühungen seines ehemaligen Kolonialherrn angewiesen, seine Küsten vor einer Invasion zu schützen."
 news.238.a:0 "Eine interessante Strategie."
 news.238.b:0 "Hoffen wir, dass [AST.GetNameDef] weiß, was sie tun."
 news.238.c:0 "Wir verfügen endlich über die Mittel, die wir zur Verteidigung des Kontinents benötigen."
 news.238.e:0 "Glauben sie wirklich, dass es einen Unterschied machen wird?"
 news.239.t:0 "[AST.GetNameDefCap] tritt [SOV.GetFactionName] bei"
 news.239.d:0 "Da sie ihre Länder als „natürliche Verbündete bei der Ausbreitung der Revolution“ betrachten, haben [AST.GetLeader] und [SOV.GetLeader] einen Vertrag unterzeichnet, der [AST.GetNameDef] als eines der Hauptmitglieder der [SOV.GetFactionName]-Fraktion beitreten lässt.\n[AST.GetNameDef] wurde zum leuchtenden Beispiel eines Arbeiterstaates erklärt, vom und für das Volk, und nicht für die Kolonialherren Europas.\n\nAngesichts der jüngsten Entwicklungen in der [AST.GetAdjective]-Politik könnten manche sagen, dieser Schritt sei unvermeidlich gewesen. Dennoch wird er von genau diesen „Kolonialherren Europas“ und allen, die sich dem ungehinderten Zugriff der Kommunisten und ihrer Weltrevolution widersetzen, als großer Grund zur Sorge angesehen."
 news.239.a:0 "Höchst beunruhigend."
 news.239.b:0 "Wir heißen unsere sozialistischen Mitbürger mit offenen Armen willkommen!"
 news.239.c:0 "Wir sind die Grenzen der Gerechtigkeit und Fairness!"
 news.239.e:0 "Noch mehr Ratten entern das Schiff, das wir gerade versenken."
 news.240.t:0 "Der Vertrag von Jayapura"
 news.240.d:0 "Die Regierungen von [AST.GetAdjective] und [HOL.GetAdjective] haben heute einen „Gemeinsamen Kooperations- und Verteidigungspakt“ angekündigt, der die [HOL.GetAdjective] Kolonialgebiete in Südostasien unter den Schutz der [AST.GetAdjective] Streitkräfte stellt. Der Vertrag wurde vom niederländischen Gouverneur Indonesiens und [AST.GetLeader] unterzeichnet. Beide kündigten an, dass der Pakt aufgrund der „fernen und schwierigen Lage in Europa“ die vollständige Kolonialverwaltung beinhalten werde.\n\nDie Regierung von [HOL.GetAdjective] hat sich bisher nicht zu dem Vertrag geäußert."
 news.240.a:0 "Das kommt überraschend."
 news.240.b:0 "Man tut, was man tun muss, um zu überleben."
 news.240.c:0 "[AST.GetNameDefCap] wacht über den Pazifik."
 news.241.t:0 "[NZL.GetNameDefCap] Unterwirft sich dem Einfluss von [AST.GetAdjective]"
 news.241.d:0 "Nach der Gründung eines sozialistischen Arbeiterstaates in Australien versucht die [AST.GetAdjective]-Regierung nun, ihren Einfluss in der Region geltend zu machen. Unter Berufung auf Forderungen unterdrückter Bauern und Fabrikarbeiter in [NZL.GetNameDef] übt [AST.GetNameDef] Druck auf die [NZL.GetAdjective]-Regierung aus, einer „Volksunion“ für den Südpazifik beizutreten.\n\nDa sich [NZL.GetNameDef] eingekesselt sieht und kaum auf rechtzeitige Hilfe von [ENG.GetFactionName] hoffen kann, hat es den Forderungen nachgegeben. Während [AST.GetLeader] „die Gleichheit aller Staaten als Erweiterung der Gleichheit aller Menschen“ verkündet, besteht kaum Zweifel daran, welcher Staat das Sagen hat."
 news.241.a:0 "Im Pazifik ändern sich die Dinge."
 news.241.b:0 "Wir hatten keine Wahl, also ... zur Revolution."
 news.241.c:0 "Lassen Sie mich hören, wie Sie „Für die Revolution!“ sagen."
 news.242.t:0 "[AST.GetNameDefCap] übernimmt die Kontrolle über südostasiatische Kolonien"
 news.242.d:0 "\nDie Militärdoktrin von [ENG.GetNameDef] hatte lange mit der Verteidigung Südostasiens zu kämpfen. Nun hofft man, dass diese Probleme ein Ende haben, da [AST.GetNameDef] die Verantwortung für die Verteidigung Singapurs und Borneos übernimmt, um feindlichen militärischen Aktivitäten in der Region entgegenzuwirken.\n\nDiese Machtübertragung umfasst, zumindest vorerst, die zivile Verwaltung der Kolonialgebiete, um [AST.GetNameDef] alle notwendigen Maßnahmen zum Schutz ihres Kontinents vor Angriffen aus Übersee zu ermöglichen. Die politischen Auswirkungen dieses Schritts für [ENG.GetNameDef], [AST.GetNameDef] und [MAL.GetNameDef] sind noch ungewiss."
 news.242.a:0 "Dies verändert das Machtgleichgewicht in Südostasien."
 news.242.b:0 "Hoffen wir, dass [AST.GetNameDef] dies nicht ruiniert."
 news.242.c:0 "Perfekt! Alles nach Plan."
 news.243.t:0 "[AST.GetNameDefCap] und [jap.GetNameDef] geben Allianz bekannt"
 news.243.d:0 "Angesichts der jüngsten Erfolge von [AST.GetNameDef] und [jap.GetNameDef] in Ostasien und im Pazifikraum erwarteten viele Beobachter, dass es nur eine Frage der Zeit sei, bis die beiden aufstrebenden Imperien in Konflikt geraten würden. Stattdessen einigten sich die beiden Länder jedoch auf eine Kooperationsvereinbarung, die schnell als „Pazifikbarriere“ bezeichnet wurde.\nDer Vertrag wurde von keinem der beiden Länder veröffentlicht, daher sind viele Aspekte der Vereinbarung unbekannt. Sicher ist, dass sich beide Seiten gegenseitig militärische Unterstützung versprochen haben, um „dem Vormarsch gieriger Außenseiter in unseren jeweiligen Regionen entgegenzuwirken“.\n\nEs ist noch zu früh, um zu sagen, wie die von [jap.GetNameDef] und [AST.GetNameDef] angestrebte Weltordnung aussehen wird, aber es besteht kein Zweifel daran, dass [AST.GetFactionName] nun die dominierende Macht im Pazifik ist."
 news.243.a:0 "Beunruhigend, um es milde auszudrücken."
 news.243.b:0 "[Root.GetNameDefCap] begrüßt die Zusammenarbeit mit allen, die uns nicht im Weg stehen."
 news.243.c:0 "Dies ist eine großartige Partnerschaft, zumindest im Moment."
 news.244.t:0 "[AST.GetNameDefCap] Richtet Einflussbereich ein"
 news.244.d:0 "In einem Schritt, der nur wenige Beobachter überraschte, hat [AST.GetNameDef] seine eigene, unabhängige Vertragsorganisation angekündigt. [AST.GetLeader] hat angekündigt, dass [AST.GetNameDef] Verbündete suchen wird, um die Stabilität im südostasiatischen Pazifikraum und darüber hinaus aufrechtzuerhalten und, falls nötig, Aggressionen gegen den [AST.GetAdjective]-Staat und andere entgegenzuwirken.\n\nNachdem [AST.GetNameDef] sich in jüngster Zeit von seinen Commonwealth-Bindungen gelöst hat, scheint dies der logische nächste Schritt zu sein, da [AST.GetNameDef] versucht, sein Schicksal allein in die Hand zu nehmen."
 news.244.a:0 "Sie streben nach der Vorherrschaft."
 news.244.b:0 "Unser eigener Hinterhof wird nicht von Europäern regiert!"
 news.245.t:0 "[USA.GetNameDefCap] tritt der [AST.GetAdjective]-Verteidigungsinitiative bei"
 news.245.d:0 "\nAus Sorge über die wachsende strategische Bedeutung des Pazifiks haben [AST.GetNameDef] und [USA.GetNameDef] einen Vertrag zur pazifischen Zusammenarbeit unterzeichnet. Der Vertrag soll zwar die politische Stabilität der Region und damit auch die transpazifische Schifffahrt gewährleisten, sieht aber auch militärische Verteidigungsmaßnahmen vor, die es den beiden Ländern ermöglichen, ihre Autorität weit über ihre tatsächlichen Gebietsansprüche hinaus auszuüben.\n\nDa ein so riesiges Gebiet nun unter australisch-amerikanischem „Schutz“ steht, ist es sicherlich nur eine Frage der Zeit, bis diese Maßnahmen auf die Probe gestellt werden."
 news.245.a:0 "Ein faszinierender Schritt ..."
 news.245.b:0 "Dies wird unseren Platz als dominierende Macht im Pazifik sichern."
 news.245.c:0 "Gemeinsam werden wir die Stabilität auf der halben Welt aufrechterhalten."
 news.246.t:0 "[USA.GetNameDefCap] und [CAN.GetNameDef] formalisieren Allianz"
 news.246.d:0 "Nach einer langjährigen Zusammenarbeit im Rahmen des Joint Defense Board hat sich zwischen [USA.GetNameDef] und [CAN.GetNameDef] eine neue politische Partnerschaft entwickelt. Das als [CAN.GetFactionName] bezeichnete Programm zielt darauf ab, die nordamerikanischen Interessen in allen auswärtigen Angelegenheiten, einschließlich Verteidigungs- und Militärfragen, zu fördern.\n\nWährend [CAN.GetNameDef] sich noch immer in der Phase der postkolonialen Entwicklung befindet und [USA.GetAdjective]-Politiker sich aufgrund isolationistischer und interventionistischer Politiken praktisch gegenseitig bekämpfen, könnte die neu gegründete Allianz beiden Ländern die außenpolitische Richtung bieten, die ihnen schmerzlich fehlt."
 news.246.a:0 "Werden sie ihren Blick nach Amerika oder darüber hinaus richten?"
 news.246.b:0 "Brüder im Land, Brüder in den Waffen!"
 news.246.c:0 "Im Moment kann es zu Hause keine Bedrohung mehr geben."
 news.247.t:0 "[CAN.GetNameDefCap] tritt der von [GER.GetAdjective] geführten Allianz bei!"
 news.247.d:0 "Nach raschen Verhandlungen hat [CAN.GetNameDef] seinen Beitritt zum [GER.GetFactionName]-Pakt bekannt gegeben. Die [CAN.GetAdjective]-Regierung bezeichnete sich selbst als „stolzen Verteidiger des [GER.GetAdjective]-Volkes, so wie [GER.GetNameDef] auch ein Verteidiger des [CAN.GetAdjective]-Pakts sein wird.“\n\nDie Einzelheiten des Beitritts von [CAN.GetNameDef] zum Pakt sind zwar unbekannt, es ist jedoch wahrscheinlich, dass in Kürze Feindseligkeiten gegen die Feinde von [GER.GetNameDef] beginnen werden. Dies könnte durchaus ein entscheidender Moment in den Kriegsanstrengungen sein."
 news.247.a:0 "Eine schockierende Entwicklung!"
 news.247.b:0 "Wir werden unseren Verbündeten in Europa helfen!"
 news.247.c:0 "Brüdervölker, haltet zusammen!"
 news.247.e:0 "Verdammt seien diese wankelmütigen [CAN.GetAdjective]s!"
 news.248.t:0 "[ENG.GetNameDefCap] gibt die nordöstlichen Gebiete auf"
 news.248.d:0 "\nAufgrund des zunehmenden diplomatischen Drucks von [CAN.GetNameDef] hat [ENG.GetNameDef] die Gebiete Labrador und Neufundland an den Staat [CAN.GetAdjective] abgetreten. Das langjährige Ziel von [CAN.GetAdjective]-Politikern, „alle rechtmäßigen [CAN.GetAdjective] Gebiete zu vereinen“, ist nun seiner Verwirklichung einen Schritt näher gekommen.\n\nNatürlich bleibt die Frage unbeantwortet, was „rechtmäßiges [CAN.GetAdjective]“ Gebiet ausmacht. Sowohl [ENG.GetNameDef] als auch der gesamte nordamerikanische Kontinent werden von nun an mit einem offenen Auge schlafen."
 news.248.a:0 "[ENG.GetNameDefCap] hat in Nordamerika keinen Halt mehr ..."
 news.248.b:0 "Alles ist so, wie es sein soll."
 news.248.c:0 "Bah, nimm diese Backwater-Felsen!"
 news.249.t:0 "[CAN.GetNameDefCap] und [MEX.GetNameDef], vereinigt euch!"
 news.249.d:0 "[USA.GetAdjective]-Politiker wurden heute Morgen mit beunruhigenden Nachrichten konfrontiert: [CAN.GetNameDef] und [MEX.GetNameDef] kündigten einen neuen Verteidigungspakt an, dessen Ziel darin besteht, „unmittelbare Bedrohungen für die Souveränität unserer beiden Länder zu bekämpfen und einzudämmen“. Die kaum verhüllte Drohung kann kaum die Absicht verbergen, die militärischen Bemühungen von [USA.GetNameDef] auf dem amerikanischen Kontinent und möglicherweise auch darüber hinaus zu behindern. Politische Kommentatoren vergleichen die Situation mit der in Europa vor dem Ersten Weltkrieg: zwei Seiten, die alles zu verlieren haben, und keine Möglichkeit, die Spannungen abzubauen. Die Frage scheint weniger zu sein, wer für wen die größere Bedrohung darstellt, sondern vielmehr, welche Seite zuerst einen Präventivschlag starten wird."
 news.249.a:0 "Das haben wir schon einmal erlebt; es kann nur in Tränen enden."
 news.249.b:0 "Die Armee des Nordens wird bereit sein."
 news.249.c:0 "Die Armee des Südens wird bereit sein."
 news.249.e:0 "Wir müssen einen Weg finden, diesem Schritt schnell entgegenzuwirken."
 news.250.t:0 "Bürgerkrieg in [MEX.GetNameDef]!"
 news.250.d:0 "Die politische Instabilität der letzten Jahre hat sich zu einem bewaffneten Konflikt entwickelt! Die Kräfte der Synarchisten haben zu den Waffen gegriffen, und in mehreren großen Städten ist es zu Straßenkämpfen gekommen!\n\nObwohl man glaubte, die Regierung habe im Kampf gegen einen Aufstand die Oberhand, gibt es Gerüchte über ausländische Unterstützung für die Nationalisten. Die Nachbarländer des Landes beobachten die Lage mit angehaltenem Atem. Wohin dieser Konflikt Mexiko führen wird, wird die Zeit zeigen."
 news.250.a:0 "Ein beunruhigender Konflikt, der Mexiko verwüsten könnte."
 news.250.b:0 "Jetzt müssen wir nur noch dafür sorgen, dass die Nationalisten die Macht ergreifen."
 news.250.c:0 "Ein hoher Preis für unser Land, der aber bezahlt werden muss."
 news.251.t:0 "[CAN.GetNameDefCap] fordert sofortige Heimschaffung"
 news.251.d:0 "\n\nNach gescheiterten Verhandlungen mit Westminster und einer beispiellosen 63-stündigen Debatte hat das kanadische Parlament den British North America Act aufgehoben und stattdessen die kanadische Verfassung in Gesetzen verankert, die weder vom britischen Parlament noch von der Monarchie angetastet werden können.\nObwohl es sich dabei nicht um einen antibritischen Schritt an sich handelt, signalisiert er doch eine Abkehr von der Commonwealth-Politik des alten Empire.\n\nObwohl dies ein natürlicher Schritt für jedes Land ist, das seine zukünftige Stabilität sichern möchte, trägt er nicht dazu bei, die bereits angespannte Lage in der Weltpolitik zu lindern."
 news.251.a:0 "Dann können sie es alleine durchstehen."
 news.251.b:0 "[ENG.GetNameDefCap] wird von Tag zu Tag schwächer."
 news.251.c:0 "Warum muss das gerade jetzt passieren?!"
 news.251.e:0 "Ein Imperium, das aus allen Nähten platzt."
 news.251.f:0 "Von Meer zu Meer wird [CAN.GetNameDef] frei sein!"
 news.252.t:0 "[CAN.GetNameDefCap] tritt [GER.GetFactionName] bei!"
 news.252.d:0 "[GER.GetNameDef] und [CAN.GetNameDef] sehen sich als natürliche Verbündete und haben einen Pakt zur gegenseitigen Verteidigung unterzeichnet. [CAN.GetAdjective] Premierminister [CAN.GetLeader] verkündete das Bündnis in einer Rede, in der er die natürliche Übereinstimmung der Interessen von [CAN.GetAdjective] und [GER.GetAdjective] betonte.\n\nAngesichts der zunehmenden Mobilisierung in ganz Europa und der jüngsten Distanzierung von [CAN.GetNameDef] vom Commonwealth ist es nicht schwer, die Art der Interessen vorherzusagen, um die es geht.\nSowohl in Europa als auch in Amerika beobachten die alten Mächte die Entwicklung mit wachsender Sorge."
 news.252.a:0 "So dreht sich die Welt ..."
 news.252.b:0 "Wir sind das Gewicht, das das Kräftegleichgewicht aufrechterhält."
 news.252.c:0 "Damit ist das Kräfteverhältnis zu unseren Gunsten ausgeschlagen!"
 news.252.e:0 "Eine weitere Front, um die man sich Sorgen machen muss, wenn es zum Krieg kommt."
 news.252.f:0 "Wir werden immer stärker!"
 news.253.t:0 "[AST.GetNameDefCap] sucht Distanz zum Commonwealth"
 news.253.d:0 "\nIn einer Rede heute Morgen verkündete Premierminister [AST.GetLeader] das Engagement der australischen Regierung für Wachstum und Stabilität als ozeanischer Staat. Dies bedeutet, sich nach neuen Ufern als denen Großbritanniens und Europas umzuschauen, da die australische Bevölkerung die Last ausländischer Konflikte nicht länger auf ihren Schultern tragen kann. In direktem Bezug auf die Rede des Königs zur Eröffnung der letzten Legislaturperiode brachte [AST.GetLeader] die Sache auf den Punkt, indem er sagte: „Nie wieder ein Gallipoli!“\n\nDer begeisterte Jubel der Menge zeigt, dass eine neue Ära der australischen Politik begonnen hat. Wo sie enden wird, darüber kann die Welt nur spekulieren."
 news.253.a:0 "Das [Root.GetFactionName] muss ohne [AST.GetNameDef] auskommen."
 news.253.b:0 "Sehen Sie zu, wie ein Imperium in Stücke fällt ..."
 news.253.c:0 "Sie haben sich JETZT entschieden, nach größerer Unabhängigkeit zu streben?"
 news.253.e:0 "Dies wird große Auswirkungen auf den Pazifik haben."
 news.253.f:0 "Wir gehen unseren eigenen Weg!"
 news.254.t:0 "[AST.GetNameDefCap] und Neuseeland „United“"
 news.254.d:0 "[AST.GetNameDefCap], das seine vollständige Unabhängigkeit geltend macht, hat begonnen, seinen Einfluss im Südpazifik geltend zu machen. In diesem Zusammenhang forderte die [AST.GetAdjective]-Regierung, dass alle ehemaligen Kolonialstaaten Ozeaniens ihrer Autorität unterstellt werden.\n\nDie unter Druck stehenden [ENG.GetAdjective] und Neuseelands waren natürlich nicht dazu bereit und leisteten zunächst diplomatischen Widerstand. Da es jedoch keine Grundlage für die Macht des Empires in der Region gab – eine Rolle, die zuvor Australien innehatte –, war es nur eine Frage der Zeit, bis [AST.GetNameDef] ein Ultimatum mit Gewalt stellte.\nNeuseeland ist nun die östlichste Provinz von [AST.GetNameDef]."
 news.254.a:0 "Wir sollten die Situation im Auge behalten."
 news.254.b:0 "Wie es nur richtig ist."
 news.254.c:0 "Das ist Verrat!"
 news.260.t:0 "[SAF.GetNameDefCap] übernimmt die Verantwortung für afrikanische Kolonien"
 news.260.desc:0 "\nIn einer offiziellen Zeremonie unterzeichnete [SAF.GetLeader] heute den Vertrag, der seiner Regierung die Kontrolle über die britischen Kolonien in Afrika gibt. Die Gebiete Betschuanaland, Rhodesien und Kenia werden künftig von Pretoria aus verwaltet. \n\nVor dem Unterhaus bestritt [ENG.GetLeader], dass dieser Schritt Großbritanniens Position auf dem Kontinent schwäche. Stattdessen bezeichnete er ihn als „eine äußerst sinnvolle Änderung, die eine effizientere Verwaltung und Verteidigung dieser Gebiete ermöglicht“."
 news.260.a:0 "Interessant."
 news.260.b:0 "Wirklich sehr vernünftig."
 news.260.c:0 "Ist dies der Anfang vom Ende des Imperiums in Afrika?"
 news.261.t:0 "[ENG.GetNameDefCap] reorganisiert afrikanische Kolonien"
 news.261.desc:0 "Das britische Parlament hat mit knapper Mehrheit ein Gesetz verabschiedet, das Teile der britischen Kolonien in Afrika grundlegend neu organisiert. Das neue Gesetz schafft faktisch zwei neue Kolonialregime in Rhodesien und Kenia. Diese neuen Staaten erhalten ein gewisses Maß an Freiheit in der Regelung ihrer eigenen Angelegenheiten, sind aber auch für ihre eigene Verteidigung verantwortlich. \n\nEinige konservative Gegner des Beschlusses äußerten offen die Befürchtung, dieser Beschluss sei nur der erste Schritt in einem Prozess, den sie „Entkolonialisierung“ nennen. \n\n[ENG.GetLeader] war für eine Stellungnahme zunächst nicht erreichbar."
 news.261.a:0 "Interessant."
 news.261.b:0 "Was für eine dumme Vereinbarung."
 news.261.c:0 "Dies ist offenbar eine Möglichkeit, das Commonwealth zu vergrößern."
 news.262.t:0 "Der südafrikanische Bürgerkrieg"
 news.262.desc:0 "Lange schwelende Spannungen in [SAF.GetName] sind nun in einen offenen Krieg ausgebrochen. Die faschistischen Nationalisten behaupten, die Politik der demokratischen Unionistenregierung bedrohe die [SAF.GetAdjective]-Lebensweise. Die Unionisten, so sagen sie, fallen den tapferen Kriegern der Burenkriege mit ihrer bedingungslosen Unterstützung für [ENG.GetName] in den Rücken. \n\nDie nationalistische Übergangsregierung unter [SAF.GetLeader] hat alle wahren Patrioten dazu aufgerufen, sich ihr anzuschließen und Südafrika mit Waffengewalt die Freiheit zurückzugeben. Die Unionistenregierung in Pretoria bezeichnet die Nationalisten als „Aufständische und Verräter der schlimmsten Sorte“. Da sich das Militär gleichermaßen für beide Seiten einsetzt, könnte die Lösung des Konflikts in Südafrika noch lange dauern."
 news.262.a:0 "Vielleicht sollten wir in Erwägung ziehen, Unterstützung zu schicken."
 news.262.b:0 "Das hat lange auf sich warten lassen."
 news.262.c:0 "Die größten Bedrohungen liegen möglicherweise innerhalb unserer Grenzen ..."
 news.263.t:0 "Anti-royalistische Unruhen in [SAF.GetNameDef]"
 news.263.desc:0 "Eine Welle von Demonstrationen gegen die Monarchie, die oft gewalttätig wurden, erfasste Südafrika. Tausende Demonstranten gingen auf die Straße und stürmten Polizeistationen und andere Regierungsgebäude. Porträts des Königs wurden heruntergerissen, zerschnitten, verbrannt und einmal in Säure aufgelöst. \n\nBeobachter stellten fest, dass Polizei und Militär sehr zurückhaltend versuchten, den Aufstand einzudämmen. Stattdessen bewachten sie Fabriken und Brücken. Dies wirft die Frage auf, ob die Unruhen für die Regierung wirklich überraschend kamen."
 news.263.a:0 "Eine Revolution im Entstehen?"
 news.263.b:0 "Kein Kommentar."
 news.263.c:0 "Die größten Bedrohungen liegen möglicherweise innerhalb unserer Grenzen ..."
 news.264.t:0 "Die Afrikanische Volksunion"
 news.264.desc:0 "Die Gründungsmitglieder der [SAF.GetFactionName] haben sich in Pretoria versammelt, um die Gründung ihrer neuen Allianz bekannt zu geben. Europäische Beobachter stellten schnell fest, dass die einzige anwesende Regierung mit Legitimität die Regierung von [SAF.GetNameDef] selbst war, wobei [SAF.GetLeader] einer bunt gemischten Versammlung aus selbsternannten Exilregierungen und anderen revolutionären Gruppen vorstand.\n\nDie anwesenden Parteien veröffentlichten eine gemeinsame Erklärung, in der sie die europäischen imperialistischen Mächte aufforderten, sämtliche Ländereien, die sie in Afrika besitzen, unverzüglich an ihre rechtmäßigen Besitzer freizugeben. Sie verurteilten den Kolonialismus und gelobten, den unterdrückten afrikanischen Völkern Freiheit zu bringen – mit allen erforderlichen Mitteln."
 news.264.a:0 "Afrikaner? Regieren sie sich selbst?"
 news.264.b:0 "Der erste Schritt auf dem Weg zur wahren Freiheit."
 news.264.c:0 "Mal sehen, ob ihr Idealismus auch in den kommenden Kriegen Bestand hat."
 news.264.d:0 "Sie sind schließlich keine echten Kommunisten."
 news.265.t:0 "[SAF.GetAdjective] Druck auf Frankreich"
 news.265.desc:0 "Nach der vernichtenden Niederlage Frankreichs in seinem Heimatland wurde die Legitimität seines Kolonialreichs in Frage gestellt. Die Regierungen von [SOV.GetNameDef] und [SAF.GetNameDef] haben eine gemeinsame Erklärung veröffentlicht, in der sie erklären, dass Frankreich nicht länger die Aufrechterhaltung der Ordnung in Madagaskar anvertraut werden kann, und die Übergabe der Insel an [SAF.GetNameDef] fordern. \n\nDie freie französische Regierung hat sich getroffen, um das Thema zu besprechen. Verteidigungsexperten halten es für unwahrscheinlich, dass die dezimierten französischen Streitkräfte im Falle eines Krieges die Insel verteidigen könnten."
 news.265.a:0 "Nur Haie, die Blut im Wasser riechen."
 news.265.b:0 "Mal sehen, ob die Franzosen vernünftig sind."
 news.265.c:0 "Die Franzosen sind erledigt."
 news.265.d:0 "Ein weiterer unblutiger Sieg für den Kommunismus."
 news.270.t:0 "Die Geburt von [NZL.GetAdjective] Armor"
 news.270.desc:0 "Der neue Bob Semple-Panzer der neuseeländischen Streitkräfte donnert die Hauptstraße der Hauptstadt entlang und ist ein wahrer Beweis für den Einfallsreichtum und den Kampfgeist des [NZL.GetAdjective]-Volkes. Bewaffnet mit sechs Maschinengewehren und mit ziemlicher Sicherheit kugelsicherer Eisenpanzerung wird er wohl das größte Hindernis sein, das ein Eindringling überwinden muss. \n\nEinige sogenannte Experten führen die glanzlose Leistung und die schwache Bewaffnung des Fahrzeugs als Gründe an, warum es nicht gebaut werden sollte, aber wie Premierminister [NZL.GetLeader] während der offiziellen Abnahmezeremonie des Fahrzeugs sagte, ist die rechtzeitige Verteidigung des Königreichs von so großer Bedeutung, dass eine perfekte Ausrüstung weder erwartet noch verlangt werden kann."
 news.270.a:0 "Das ist also das, was man einen Panzer nennt!"
 news.270.b:0 "Sie nennen dieses Ding WAS?"
 news.271.t:0 "Big Bob betritt die Szene"
 news.271.desc:0 "Nach dem überwältigenden Erfolg des Bob-Semple-Panzers forderte das Oberkommando der [NZL.GetName]-Verteidigungsstreitkräfte die Produktion einer maßstabsgetreueren Version. Mit einer Höhe von über 4,5 Metern und einem Gewicht von sage und schreibe 120 Tonnen ist das neue Fahrzeug in jeder Hinsicht Ehrfurcht gebietend. Seine Bewaffnung aus zwei 17-Pfünder-Panzerabwehrkanonen macht mit jedem Feind kurzen Prozess, und seine schwere Panzerung – die ausgiebig getestet wurde, um sicherzustellen, dass sie tatsächlich kugelsicher ist – ermöglicht es ihm, sich ohne Angst ins Schlachtgetümmel zu stürzen. \n\nBei der Enthüllungszeremonie nannte ihn ein Beobachter „den bemerkenswertesten Panzer, der je produziert wurde“, während ein anderer ihn als „beispiellos“ bezeichnete. \nDie Massenproduktion soll innerhalb des Monats beginnen."
 news.271.a:0 "Die Welt zittert beim Anblick unserer Panzer!"
 news.271.b:0 "Die Welt zittert ... vor Lachen."
 news.272.t:0 "Die Hungersnot in Bengalen"
 news.272.desc:0 "Naturkatastrophen, eine inkompetente Verwaltung und die Verwüstungen des Krieges haben in Indien eine weitverbreitete Hungersnot ausgelöst.\n\nNachdem ein Zyklon weite Teile des Landes verwüstet und fast die gesamte Reisernte vernichtet hatte, reagierten die Kolonialverwaltungen nur zögerlich – manche würden sogar sagen auffällig zögerlich – auf das Problem. Trotz Nahrungsmittelüberschüssen in anderen Teilen Indiens wurden aus Angst vor feindlichen Angriffen keine Hilfslieferungen durchgeführt.\n\nGroße Teile des Landes wurden verwüstet, und die Zahl der Todesopfer und Produktionsausfälle lässt sich noch nicht einmal abschätzen."
 news.272.a:0 "Schrecklich."
 news.272.b:0 "Schrecklich."
 news.272.c:0 "Dagegen lässt sich nichts tun."
 news.273.t:0 "Die Hungersnot in Bengalen endet"
 news.273.desc:0 "Nach Monaten relativer Untätigkeit haben sich die Kolonialregierung und die indische Armee nun endlich zum Handeln entschlossen. Die Verteilung von Notnahrungsmitteln hat in den betroffenen Gebieten begonnen, und die Reisernte übertrifft die Erwartungen. \n\nDie Lebensmittelpreise in den betroffenen Gebieten sind jedoch nach wie vor hoch, und die langfristigen Auswirkungen der Hungersnot sind noch nicht abschätzbar."
 news.273.a:0 "Wenigstens ist es vorbei."
 news.273.b:0 "Endlich."
 news.280.t:0 "Indien erlangt Selbstverwaltung"
 news.280.desc:0 "Nach einem angespannten Treffen zwischen dem [GER.GetAdjective]-Botschafter und dem [ENG.GetAdjective]-Außenminister gab die Regierung von [ENG.GetNameDef] heute bekannt, dass [RAJ.GetNameDef] von nun an ihre eigene Politik bestimmen darf. Die jahrhundertelange britische Herrschaft über den Subkontinent endete überraschend schnell, da Beamte nach Hause geschickt und die Kolonialverwaltung den einheimischen Indern übergeben wurde.\n\nEine der ersten Amtshandlungen der neuen indischen Führung war die Ankündigung eines weitreichenden Kooperationsvertrags mit [GER.GetNameDef]. Die indische Regierung weigerte sich, die Vorwürfe zu kommentieren, dies sei der Preis für die deutsche Unterstützung."
 news.280.a:0 "Großartig."
 news.280.b:0 "Ist dies das Ende des britischen Empire?"
 news.280.c:0 "Ein wertvoller Verbündeter."
 news.280.d:0 "Nicht unsere beste Stunde."
 news.281.t:0 "Indien erlangt Selbstverwaltung"
 news.281.desc:0 "In einer gemeinsamen Erklärung verkündeten ein sichtlich erschütterter [ENG.GetAdjective] Außenminister und der [SOV.GetAdjective] Botschafter, dass Indien ab sofort die volle Souveränität über seine eigenen Angelegenheiten erhalten werde. Es ist nicht ganz klar, welche Rolle [SOV.GetNameDef] bei diesem plötzlichen Politikwechsel [ENG.GetAdjective] gespielt hat, aber er scheint bedeutsam zu sein.\n\nEine der ersten Amtshandlungen der neuen indischen Führung war die Ankündigung einer engeren Zusammenarbeit mit [SOV.GetNameDef], was den Gerüchten, [SOV.GetNameDef] habe sich für sie eingesetzt, zusätzliches Gewicht verlieh."
 news.281.a:0 "Großartig."
 news.281.b:0 "Ist dies das Ende des britischen Empire?"
 news.281.c:0 "Ein wertvoller Verbündeter."
 news.281.d:0 "Nicht unsere beste Stunde."
 news.282.t:0 "Quit India-Bewegung"
 news.282.desc:0 "Die Forderungen Indiens nach Unabhängigkeit haben sich in letzter Zeit verstärkt. Nun spitzt sich die Lage zu: Die radikale Quit-India-Bewegung fordert [ENG.GetNameDef] auf, das Land so schnell wie möglich zu verlassen. Die Behörden reagierten jedoch schnell und gingen hart gegen die Bewegung vor. Bei Razzien im Morgengrauen verhafteten sie mehrere Anführer in ganz Indien. \n\nBerichten der Sondereinheit zufolge sind jedoch noch viele Sympathisanten auf freiem Fuß. Viele Beamte befürchten, dass extremistischere Elemente der Bewegung sogar zu Gewalt greifen könnten."
 news.282.a:0 "Die Zukunft bleibt ungewiss."
 news.282.b:0 "Ein weiterer zum Scheitern verurteilter Versuch, die Freiheit zu erlangen."
 news.283.t:0 "Indischer Nationalkongress siegt bei Provinzwahlen"
 news.283.desc:0 "\nBei den jüngsten Kommunalwahlen hat der Indische Nationalkongress eine überwältigende Mehrheit für sein Programm erhalten, das einen langsamen und geordneten Übergang zur lokalen Regierung und zum Dominion-Status in der Zukunft vorsieht. \n\nEs scheint, dass die Inder die radikalere Politik Gandhis abgelehnt haben, der für einen vollständigen Bruch mit Großbritannien und eine möglichst baldige absolute Selbstverwaltung plädiert hatte."
 news.283.a:0 "Sie werden uns in die Freiheit führen."
 news.283.b:0 "Verändern Stimmen wirklich etwas?"
 news.284.t:0 "Swaraj-Bewegung erzielt Zugewinne bei Provinzwahlen"
 news.284.desc:0 "\nBritische Beamte wurden heute Morgen mit einem herben Schock überrascht, als die Ergebnisse der jüngsten Provinzwahlen bekannt gegeben wurden. Es ist nun klar, dass eine große Mehrheit der Inder ihre Stimme für pro-Swaraj-Kandidaten gegeben hat. In den Provinzen Indiens wurden bereits Forderungen laut, diese begrenzte lokale Verwaltung so schnell wie möglich in vollständige Selbstverwaltung umzuwandeln. \n\nEin Sprecher der [ENG.GetAdjective]-Regierung betonte, dass derzeit nicht der richtige Zeitpunkt für solche Maßnahmen sei und eine Übertragung weiterer Autorität an Inder nicht in Frage käme."
 news.284.a:0 "Die Freiheit ist in Reichweite."
 news.284.b:0 "Die Briten werden das niemals dulden."
 news.285.t:0 "Pakistan ist frei"
 news.285.desc:1 "Gemäß der Zwei-Nationen-Theorie wurde der muslimischen Minderheit in den Gebieten, in denen Muslime die Bevölkerungsmehrheit stellen, eine souveräne Heimat zugesprochen. Ursprünglich hieß es Pakistan, um die Kombination aus Punjab, Afghani, Kaschmir, Singh und Belutschen zu verdeutlichen. Der Name wurde später in Pakistan umbenannt, um die Aussprache zu erleichtern. Zwischen dem kürzlich befreiten Indien und Pakistan bestehen jedoch weiterhin Spannungen, da beide neuen Länder Teile der Grenzgebiete für sich beanspruchen. Einige Beobachter warnen sogar vor einem erneuten Krieg auf dem Subkontinent."
 news.285.a:0 "Vielleicht war dies der einzige Weg."
 news.285.b:0 "Freiheit!"
 news.285.c:0 "Wir werden sehen, ob der Frieden anhält."
 news.286.t:0 "Australien bricht Beziehungen zu Großbritannien ab"
 news.286.desc:0 "\nIn einer heiß umkämpften Abstimmung entschied eine knappe Mehrheit im [AST.GetAdjective]-Parlament, dass das Land das Britische Empire verlassen soll. Die letzten Reste britischer Rechtsordnung wurden für null und nichtig erklärt. [AST.GetLeader] hat die Entscheidung bereits unterzeichnet und damit die langjährige Rechtstradition der königlichen Zustimmung durch den Generalgouverneur umgangen und [AST.GetNameDef] zu einem vollständig souveränen Staat gemacht.\n\nDas Parlament stimmte außerdem für die Bildung eines Verfassungsausschusses, der über Verfassungsänderungen beraten und beraten soll, um alle Spuren britischer Einmischung in [AST.GetAdjective]-Angelegenheiten zu beseitigen."
 news.286.a:0 "Zu diesem Zeitpunkt nur noch eine Formalität."
 news.286.b:0 "Freiheit!"
 news.286.c:0 "Australien verlässt den Commonwealth."
 news.287.t:0 "Deutschland besetzt Westpolen"
 news.287.desc:0 "Deutsche Truppen haben Westpolen besetzt, offiziell mit dem Ziel, die deutsche Minderheit vor dem Chaos zu schützen, das auf den Zusammenbruch der polnischen Regierung folgte. \n\nDie sowjetischen Streitkräfte haben sich geordnet aus diesen Gebieten zurückgezogen, was zur faktischen Aufteilung Polens zwischen den beiden Mächten führte."
 news.287.a:0 "Eine wahrscheinliche Geschichte!"
 news.287.b:1 "Den Rest erledigen wir mit der Zeit..."
 news.287.c:1 "Die Faschisten rücken vor – vorerst."
 news.288.t:0 "Die chinesische Einheitsfront bildet sich"
 news.288.desc:0 "[CHI.GetLeader] und [PRC.GetLeader] haben eine gemeinsame Erklärung herausgegeben, in der sie erklären, dass sie angesichts des japanischen Angriffs ihre Differenzen beigelegt haben. Beide Seiten werden sich während des Krieges gegen Japan strikt gegeneinander verhalten und alles in ihrer Macht Stehende tun, um die Invasoren zurückzudrängen. Auch einige kleinere Kriegsherren haben ihre Unterstützung zugesagt und ihre Truppen dem Kommando von [CHI.GetLeader] unterstellt.\n\nOb die langjährigen Feinde des chinesischen Bürgerkriegs tatsächlich zusammenarbeiten werden, bleibt abzuwarten, und viele Experten glauben, dass dies die unvermeidliche Niederlage Chinas nur verzögern wird."
 news.288.a:0 "Eine Allianz der Verzweiflung."
 news.288.b:0 "Das ändert nichts!"
 news.288.c:0 "Eine instabile Allianz."
 ace_promoted.1.t:0 "Zum Pilotenass befördert"
 ace_promoted.2.t:0 "Ein wildes Ass erscheint"
 ace_promoted.1.d:0 "Nur wenige gehen so viele Risiken ein wie die tapferen Piloten der [Root.GetAdjective] Luftwaffe. [From.GetName] [From.GetSurname], ein erfahrener Pilot, bekannt unter dem Rufzeichen [From.GetCallsign], hat sich nicht nur dadurch hervorgetan, dass er von der letzten Mission über [From.GetMissionRegion] lebend zurückkehrte, sondern auch in vielen kritischen Gefechten bedeutende Siege errang.\n\n[From.GetName] gilt als leuchtendes Beispiel für [Root.GetAdjective] Mut und seine jüngste Beförderung wurde in den Medien vielfach thematisiert. Obwohl die Menschen den Krieg eher als Hölle denn als Ruhm betrachten, sind viele froh, dass es noch Helden gibt, hinter denen sie sich versammeln können."
 ace_promoted.1.d_major:0 "Nur wenige gehen so viele Risiken ein wie die tapferen Piloten der [Root.GetAdjective] Luftwaffe. [From.GetName] [From.GetSurname], ein erfahrener Pilot, bekannt unter dem Rufzeichen [From.GetCallsign], hat sich nicht nur dadurch hervorgetan, dass er lebend zurückkehrte, sondern auch dadurch, dass er [From.GetHerHis] [From.GetWing] mit enormem Geschick steuerte. Kürzlich war [From.GetName] auf einer Mission über [From.GetMissionRegion] und trug maßgeblich zum Erfolg dieser kritischen Begegnung bei.\n\n[From.GetName] gilt als leuchtendes Beispiel für [Root.GetAdjective] Mut und seine Beförderung wurde in den Medien großgeschrieben. Obwohl die Menschen den Krieg eher als Hölle denn als Ruhm betrachten, sind viele froh, dass es noch Helden gibt, hinter denen sie stehen können."
 ace_promoted.1.a:0 "Wer wagt, gewinnt."
 ace_died.1.t:0 "[From.GetCallsign] Getötet über [From.GetMissionRegion]"
 ace_died.1.d:0 "Einer von [From.Owner.GetName]s berühmtesten [From.GetAceType]-Assen, [From.GetFullName], ist während eines Einsatzes über [From.GetMissionRegion] im Dienst tödlich verunglückt. Da [From.GetSheHe] schon lange eine öffentliche Person ist, ist der Tod von [From.GetCallsign] leider für die vielen Menschen, die zu [From.GetHerHim] aufblickten, äußerst demoralisierend.\n\nWir wünschten zwar, man könnte dieses Ereignis vor der Öffentlichkeit verbergen, aber das Fehlen öffentlicher Auftritte von [From.GetName] würde schnell Verdacht erregen. Letztlich ist [From.GetHerHis] Tod ein weiterer Teil einer Legende, die hoffentlich noch lange nach unseren aktuellen Problemen weiterleben wird."
 ace_died.1.d_major:0 "Einer von [From.Owner.GetName]s berühmtesten [From.GetAceType]-Assen, [From.GetFullName], ist im Dienst gefallen. Piloten, die von der Mission zurückkehren, berichten, dass sie [From.GetHerHis] [From.GetWingShort] nach schwerem Feindbeschuss in Flammen über [From.GetMissionRegion] abstürzen sahen. Da [From.GetSheHe] jedoch schon lange eine öffentliche Person ist, ist der Tod von [From.GetCallsign] für die vielen, die zu [From.GetHerHim] aufblickten, äußerst demoralisierend.\n\nWir wünschten zwar, man könnte dieses Ereignis vor der Öffentlichkeit verbergen, aber das Fehlen öffentlicher Auftritte von [From.GetName] würde schnell Verdacht erregen. Letztendlich ist [From.GetHerHis] Tod ein weiterer Teil einer Legende, die hoffentlich noch lange nach unseren aktuellen Problemen weiterleben wird."
 ace_died.1.a:0 "Eine lebende Legende ist immer noch besser."
 ace_killed_by_ace.1.t:0 "[From.GetFullName] Abgeschossen von [Prev.GetCallsign]"
 ace_killed_by_ace.1.d:0 "Aus [From.GetMissionRegion] zurückkehrende Piloten berichten, dass sich eine Staffel von [Prev.Owner.GetAdjective]-Flugzeugen unter der Führung des berüchtigten [Prev.GetCallsign] auf die Jagd nach [From.GetCallsign] konzentrierte. Nachdem sie mehreren Salven der [Prev.Owner.GetAdjective]s ausgewichen war und mehrere feindliche Flugzeuge abgeschossen hatte, wurde [From.GetCallsign] von [Prev.GetCallsign] überwältigt, der [From.GetHerHim] angeblich ausmanövrierte und mit einem sauberen Treffer die Treibstofftanks aufriss. [From.GetName] [From.GetSurname]s Flugzeug fing Feuer und stürzte in einem gewaltigen Inferno über [From.GetMissionRegion] ab.\n\n[From.GetFullName] hat während seiner gesamten Dienstzeit bei [From.GetHerHis] großen Mut bewiesen und wurde von vielen bewundert. Der Verlust dieses Nationalhelden ist ein schwerer Schlag für die [From.Owner.GetAdjective] Luftwaffe und ein verheerender Schlag für unsere Nation als Ganzes. Zu wissen, dass [Prev.Owner.GetName] [Prev.GetFullName] während unserer Trauer als Held feiert, macht die Tragödie noch größer."
 ace_killed_by_ace.1.d_major:0 "Aus [From.GetMissionRegion] zurückkehrende Piloten berichten, dass sich eine Staffel von [Prev.Owner.GetAdjective]-Flugzeugen unter der Führung des berüchtigten [Prev.GetCallsign] auf die Jagd nach [From.GetCallsign] gemacht hat. Nachdem er mehrere feindliche Flugzeuge abgeschossen und mehreren Salven der [Prev.Owner.GetAdjective]s ausgewichen war, wurde [From.GetCallsign] von [Prev.GetCallsign] in seinem [Prev.GetWingShort] überwältigt, der [From.GetHerHim] angeblich ausmanövrierte und mit einem sauberen Treffer die Treibstofftanks aufriss. [From.GetName] [From.GetSurname]s [From.GetWingShort] fing Feuer und stürzte in einem gewaltigen Inferno über [From.GetMissionRegion] ab.\n\n[From.GetFullName] hat während seiner gesamten Dienstzeit bei [From.GetHerHis] großen Mut bewiesen und wurde von vielen bewundert. Der Verlust dieses Nationalhelden ist ein schwerer Schlag für die [From.Owner.GetAdjective] Luftwaffe und ein verheerender Schlag für die gesamte Nation. Zu wissen, dass [Prev.Owner.GetName] [Prev.GetFullName] während unserer Trauer als Held feiert, macht die Tragödie noch größer."
 ace_killed_by_ace.1.a:0 "Ein verheerender Verlust für uns alle"
 ace_killed_other_ace.1.t:0 "[From.GetFullName] Abgeschossen [Prev.GetCallsign]"
 ace_killed_other_ace.1.d:0 "Unser jüngster Einsatz über [From.GetMissionRegion] war für die Luftwaffe von [From.Owner.GetAdjective] in mehr als einer Hinsicht ein großer Erfolg. Es gingen Berichte ein, die die Heldentat von [From.GetFullName] hervorhoben, dem es gelang, den Piloten von [Prev.Owner.GetAdjective], [Prev.GetName] [Prev.GetSurname], bekannt als [Prev.GetCallsign], zu überlisten. [From.GetCallsign] benutzte [From.GetHerselfHimself] als Köder und lockte [Prev.GetCallsign] in eine Falle, durch die die Piloten von [From.Owner.GetAdjective] auf [Prev.GetCallsign]s Staffel herabstürzen konnten. [From.GetCallsign] manövrierte die Flugzeuge von [Prev.Owner.GetAdjective] aus und schickte [Prev.GetCallsign] mit einer einzigen Salve vom Himmel über [From.GetMissionRegion].\n\n[Prev.GetFullName] war ein gefürchteter Pilot, der viele [From.Owner.GetAdjective] Leben auf dem Gewissen hatte. Dies ist ein großartiger Sieg und zeigt, dass große Helden Großes leisten, wenn wir sie unterstützen."
 ace_killed_other_ace.1.d_major:0 "Unser jüngster Einsatz über [From.GetMissionRegion] war für die Luftwaffe von [From.Owner.GetAdjective] in mehr als einer Hinsicht ein großer Erfolg. Es gingen Berichte ein, die die Heldentat von [From.GetFullName] hervorhoben, dem es gelang, den Piloten von [Prev.Owner.GetAdjective], [Prev.GetName] [Prev.GetSurname], bekannt als [Prev.GetCallsign], zu überlisten. [From.GetCallsign] benutzte [From.GetHerselfHimself] als Köder und lockte [Prev.GetCallsign] in eine Falle, durch die die Piloten von [From.Owner.GetAdjective] auf [Prev.GetCallsign]s Staffel herabstürzen konnten. [From.GetCallsign] manövrierte die Flugzeuge von [Prev.Owner.GetAdjective] aus und schickte [Prev.GetCallsign] mit einer einzigen Salve vom Himmel über [From.GetMissionRegion].\n\n[Prev.GetFullName] war ein gefürchteter Pilot, der viele [From.Owner.GetAdjective] Leben auf dem Gewissen hatte. Dies ist ein großartiger Sieg und zeigt, dass große Helden Großes leisten, wenn wir sie unterstützen."
 ace_killed_other_ace.1.a:0 "Ein Sieg, an den sich ganz [From.Owner.GetName] erinnern wird!"
 aces_killed_each_other.1.t:0 "[From.GetFullName] ist ausgefallen"
 aces_killed_each_other.1.d:0 "Während der letzten Mission geriet unser berühmter [From.GetAceType]-Pilot [From.GetFullname] in einen langwierigen Kampf mit dem gefürchteten Fliegerass [Prev.GetFullName]. Da er nur noch wenig Munition hatte und keine Möglichkeit zur Flucht, manövrierte [From.GetCallsign] durch das Feuer der [Prev.Owner.GetAdjective]-Flugzeuge und rammte [Prev.GetCallsign]. Sowohl [From.GetCallsign]s als auch [Prev.GetCallsign]s Flugzeuge wurden beim Absturz über [From.GetMissionRegion] beobachtet.\n\nEs ist zwar ein schwacher Trost, dass [Prev.Owner.GetAdjective]-Plage [Prev.GetCallsign] uns nicht länger plagen wird, aber wir haben eine geschätzte Persönlichkeit des öffentlichen Lebens und eine Inspiration für alle [From.Owner.GetAdjective] verloren."
 aces_killed_each_other.1.d_major:0 "Während der letzten Mission geriet unser berühmter [From.GetAceType]-Ass [From.GetFullname] in einen langwierigen Kampf mit dem gefürchteten Fliegerass [Prev.GetFullName]. Da er nur noch wenig Munition hatte und keine Möglichkeit zur Flucht, manövrierte [From.GetCallsign] [From.GetHerHis] [From.GetWingShort] durch das Feuer der [Prev.Owner.GetAdjective]-Flugzeuge und begann, [Prev.GetCallsign] zu rammen.\nSowohl [From.GetCallsign]s [From.GetWingShort] als auch [Prev.GetCallsign]s [Prev.GetWingShort] wurden dabei beobachtet, wie sie über [From.GetMissionRegion] in Stücke stürzten.\n\nObwohl es ein schwacher Trost ist, dass die [Prev.Owner.GetAdjective]-Bedrohung [Prev.GetCallsign] uns nicht länger lästig sein wird, haben wir eine geschätzte Persönlichkeit des öffentlichen Lebens und eine Inspiration für alle [From.Owner.GetAdjective] verloren."
 aces_killed_each_other.1.a:0 "Trotzdem ein großer Verlust für uns"
 election.1.t:0 "ALLGEMEINE WAHL"
 election.1.d:1 ""
 election.1.a:1 ""
 election.2.t:0 "Wahl: Öffentlichkeit lehnt Wiederbewaffnung ab"
 election.2.d:0 "Bei der bevorstehenden Wahl ist die Unterstützung für [Root.GetRulingParty] weiterhin hoch, da die Bevölkerung Vertrauen in die Führung von [Root.GetLeader] hat. Das Bestreben der Partei, den Fokus von [Root.GetName] stärker auf militärische Angelegenheiten zu richten, stößt jedoch auf wenig Zustimmung in der Bevölkerung, da ein erheblicher Teil der Bevölkerung dies für unklugen Hurrapatriotismus hält. Der Krieg hat unsere Grenzen noch nicht erreicht, und nur wenige würden [Root.GetName] gerne aggressive Maßnahmen ergreifen sehen. Durch die Zusammenarbeit mit anderen großen Parteien, die unsere Sorgen um die Sicherheit der Nation teilen, werden wir auch nach der Wahl regieren können, wenn auch mit geringerer Unterstützung."
 election.2.a:0 "Die Menschen müssen gehört werden."
 election.2.b:0 "Der Schutz unserer Souveränität steht an erster Stelle."
 election.3.t:0 "Wahl: Die Öffentlichkeit fordert Wiederbewaffnung"
 election.3.d:0 "Der anhaltende Krieg, der sich unseren Grenzen nähert, prägt die bevorstehende Wahl. Viele Wähler sind besorgt, dass [Root.GetName] nicht auf diesen Konflikt oder die daraus resultierenden Folgen vorbereitet ist. Sie fordern verstärkte Vorsichtsmaßnahmen und die Kriegsbereitschaft unseres Landes. Obwohl die Mehrheit weiterhin [Root.GetRulingParty] unterstützt, könnten wir sie an radikalere Kräfte verlieren, wenn wir ihre Befürchtungen nicht zerstreuen."
 election.3.a:0 "Die Menschen haben das Recht, sich sicher zu fühlen."
 election.3.b:0 "Viele sind immer noch für diplomatische Lösungen."
 election.4.t:0 "Wahl: Nationalisten in der Regierung?"
 election.4.d:1 "In [Root.GetName] hat sich eine aggressiv nationalistische Stimmung entwickelt, die mehrere Parteien hervorgebracht hat, die nationalistische Ideale vertreten: einen Staat, der seine Macht mit Gewalt durchsetzt. Eine dieser Parteien konnte bei der aktuellen Wahl besonders überzeugen, was innerhalb der Partei [Root.GetRulingParty] zu Diskussionen darüber führte, ob wir versuchen sollten, mit ihr bei der Regierungsbildung zusammenzuarbeiten. Obwohl sie die demokratischen Ideale, die die Grundlage unseres Staates bilden, offen ablehnt, verleiht ihre Teilnahme an der Wahl unseren Ansichten Glaubwürdigkeit, und die Anerkennung ihrer öffentlichen Unterstützung könnte sie von gewalttätigen Maßnahmen abhalten."
 election.4.a:0 "Lieber sie als die Sozialisten!"
 election.4.b:0 "Eine breite Koalition demokratischer Parteien wäre vorzuziehen."
 election.5.t:0 "Wahl: Sozialist in der Regierung?"
 election.5.d:0 "Die sozialistische Bewegung in [Root.GetName], die von der breiten Unzufriedenheit der Arbeiterklasse und radikalen Strömungen unter Akademikern angetrieben wird, ist so groß geworden, dass mehrere Parteien gegründet wurden. Nachdem eine dieser Parteien bei der aktuellen Wahl beträchtliche Unterstützung erlangte, debattieren Politiker in [Root.GetRulingParty] darüber, ob sie ihre Unterstützung bei der Regierungsbildung suchen sollen. Obwohl sie unsere demokratischen Institutionen für kaum mehr als bürgerliche Tyrannei halten, scheinen sie die gewünschten Veränderungen lieber durch Zusammenarbeit mit der Regierung herbeizuführen, als sie zu stürzen."
 election.5.a:0 "Lieber Reform als Revolution!"
 election.5.b:0 "Eine breite Koalition demokratischer Parteien wäre vorzuziehen."
 election.6.t:0 "Wahl: Demokratische Parteien in der Minderheit"
 election.6.d:0 "Die Politik in [Root.GetName] hat sich zunehmend radikalisiert. Wo einst die Parteien, die demokratische Ideale und die repräsentativen Institutionen von [Root.GetName] vertraten, breite Unterstützung fanden, wandten sich bei dieser Wahl mehr Wähler den politischen Extremen zu. Die Parteien der politischen Mitte bilden, selbst wenn sie ihre Differenzen beilegen, keine Mehrheit mehr. Um eine schwache Minderheitsregierung zu vermeiden, bleibt uns keine andere Wahl, als mit den Nationalisten oder Sozialisten zu kooperieren."
 election.6.a:0 "Wir werden mit den Nationalisten zusammenarbeiten, um [Root.GetName] zu stärken."
 election.6.b:0 "Indem wir uns den Sozialisten anschließen, können wir den sozialen Wandel vorantreiben."
 election.6.c:0 "Eine Minderheitsregierung wäre zwar schwach, aber vorzuziehen."
 election.7.t:0 "Nationalistischer Einfluss auf die Außenpolitik"
 election.7.d:1 "Die Aufnahme der Nationalisten in unsere politische Koalition hatte Auswirkungen auf unsere Außenpolitik. Trotz ihres vehementen Nationalismus haben sie im Ausland Sympathisanten, die ihren Einfluss in [Root.GetName] begrüßen. Totalitäre Regierungen mit ähnlicher ideologischer Ausrichtung sehen uns als potenzielle Verbündete. Die Aufrechterhaltung der Beziehungen zu diesen Ländern, ungeachtet der Abneigung von [Root.GetRulingParty] gegenüber ihren Idealen, kann notwendig sein, um die Unterstützung der Nationalisten hinter unserer Regierung zu behalten."
 election.7.a:0 "Gegen größere Bedrohungen können wir einige Verbündete gebrauchen."
 election.7.b:0 "Mit solchen Freunden bräuchten wir keine Feinde."
 election.8.t:0 "Sozialistischer Einfluss auf die Außenpolitik"
 election.8.d:0 "Sozialisten betrachten sich oft als Teil einer internationalen Revolution, und unsere Entscheidung, sie als Partner in unserer Regierung zu akzeptieren, hat die Aufmerksamkeit vieler ihrer internationalen Verbündeten auf sich gezogen. Vertreter sozialistischer Parteien pflegen enge Beziehungen zu Ländern, die unsere Regierungsform zugunsten einer Diktatur des Proletariats aufgegeben haben. Diese Beziehungen müssen wir in unserer Außenpolitik berücksichtigen, wenn wir ihre Unterstützung behalten wollen."
 election.8.a:0 "Wir sollten uns unseren gemeinsamen Anliegen widmen."
 election.8.b:0 "Auf diesem Weg liegt die Auflösung von [Root.GetName] selbst."
 election.11.t:0 "Wahl: Nationalistische Mehrheit"
 election.11.d:0 "Diese Wahl hat verheerende Folgen für die Institution, die sie repräsentiert. Die Mehrheit der Bevölkerung hat für eine nationalistische Partei gestimmt, die Wahlen abschaffen und einen autokratischen Herrscher einsetzen will. Während viele erwägen, zu den Waffen zu greifen, um gegen diese Verletzung der demokratischen Ideale zu kämpfen, die ihnen dieses Mandat überhaupt erst ermöglicht haben, befürworten andere den Einsatz von Gewalt nur als weitere Bestätigung ihrer Ideale."
 election.11.a:0 "Es ist ein schwarzer Tag für [Root.GetName], aber das Volk hat gesprochen."
 election.11.b:0 "Wir werden unsere Freiheit nicht kampflos aufgeben!"
 election.12.t:0 "Wahl: Sozialistische Mehrheit"
 election.12.d:0 "Die sozialistischen Parteien siegten bei den jüngsten Wahlen, während die vorherige Regierung gemischte Reaktionen hervorrief. Die neuen Machthaber behaupten zwar, das Volk als Ganzes zu vertreten, betrachten jedoch viele der demokratischen Institutionen, die wir hochhalten, als Versuche, die Arbeiterklasse zu manipulieren und zu unterdrücken. Dies führt zu Diskussionen darüber, was eine wahre „Herrschaft des Volkes“ ausmacht. In manchen Ländern begann die Revolution mit Blutvergießen. In [Root.GetName] war dies nicht der Fall, aber sie könnte dort enden."
 election.12.a:0 "Das ist beunruhigend, aber sie stellen tatsächlich die Mehrheit dar."
 election.12.b:0 "Wir müssen sie stoppen, bevor sie jedes Zeichen abweichender Meinung beseitigen!"
 election.13.t:0 "Wahl: Magnat bevorzugt Nationalisten"
 election.13.d:0 "Ein einflussreicher Industrieller hinter einem unserer Produktionspartner hat kürzlich mehrere politische Äußerungen gemacht, die die Regierung beunruhigten. Er befürwortete offen eine autoritäre Regierung und lobte nationalistisch geprägte ausländische Regierungen, wobei er implizit andeutete, [Root.GetName] würde von einer solchen Herrschaft profitieren. Den Magnaten und seine Ideale zu verurteilen, könnte unsere Beziehung zum Unternehmen belasten. Doch wenn wir ihm keine Kontrolle über ihn geben, bietet er ihm eine Plattform für Propaganda, die alles untergräbt, wofür [Root.GetRulingParty] steht."
 election.13.a:0 "Er kann sagen, was er will, wir müssen es nicht unterstützen."
 election.13.b:0 "Wir können uns bei der Entwicklung und dem Schutz von [Root.GetName] nicht auf Nationalisten verlassen."
 election.14.t:0 "Wahlen: Ausnahme in Kriegszeiten"
 election.14.d:0 "[Root.GetName] befindet sich im Kriegszustand. Normalerweise würden zu diesem Zeitpunkt Wahlen abgehalten, doch mitten in einem wichtigen Konflikt argumentieren viele, man könne sich keine Zeit für Wahlkampf oder einen möglichen Führungswechsel leisten. Andere wiederum behaupten, die Erklärung des anhaltenden Krieges als triftigen Grund für die Absage von Wahlen sei der erste Schritt zur Aushöhlung der [Root.GetAdjective] Demokratie. Schließlich könnte es ein heikles Unterfangen sein, militärischen Angelegenheiten den Vorrang vor dem Einfluss des Volkes zu geben."
 election.14.a:0 "Die Wahlen finden wie gewohnt statt."
 election.14.b:0 "Wir können uns um solche Angelegenheiten kümmern, wenn dieser Krieg vorbei ist."
 election.15.t:0 "Wahl: Regierung umstritten"
 election.15.d:0 "Angesichts der bevorstehenden Wahlen beginnen die Menschen, die Fähigkeit der derzeitigen Regierung, den anhaltenden Krieg fortzusetzen, in Frage zu stellen. [Root.GetName] hat schwer gelitten, und die öffentliche Meinung hat sich gegen diejenigen gewendet, die unser Land in die Niederlage zu führen scheinen. Obwohl unser Volk entschlossen ist, den Krieg bis zum Ende durchzuhalten, sähe es lieber, wenn eine andere Regierung ihn beenden würde."
 election.15.a:0 "Diese Vertrauenskrise ist höchst bedauerlich."
 election.15.b:0 "Lassen Sie die politische Landschaft sich verändern, um die Einheit der Menschen zu wahren."
 election.16.t:0 "[Root.GetLeader] genießt öffentliche Unterstützung"
 election.16.d:0 "Bei den aktuellen Wahlen kritisierte die Opposition, sofern sie existiert, die zunehmend autoritäre Herrschaft von [Root.GetRulingParty]. Sie bezweifelt, dass die Wählerschaft überhaupt Macht hat oder ob alles nur Show ist.\n\nDie Unterstützung für [Root.GetLeader] scheint jedoch weiterhin hoch zu sein, und obwohl die Umstände der Wahl von der internationalen Gemeinschaft in Frage gestellt werden, wurde sie im Inland nicht angefochten. Es scheint, dass das Volk seinen Herrscher unterstützt, auch wenn [Root.GetName] nicht mehr vom Volk regiert wird ... zumindest diejenigen, die es zur Wahl geschafft haben."
 election.16.a:0 "Ein Volk, ein Führer."
 election.17.t:0 "Wahlergebnisse in Frage gestellt"
 election.17.d:1 "Obwohl das [Root.GetLeader]-Regime die meisten seiner Gegner zum Schweigen gezwungen hat, haben sich einige dennoch zu den jüngsten Wahlen geäußert und der [Root.GetRulingParty] vorgeworfen, die Ergebnisse manipuliert und die klaren Bemühungen, ein Parlament zu wählen, das ihrer Politik widerspricht, ignoriert zu haben.\n\nDie Regierung tut diese Einwände ab und versucht, die Bevölkerung gegen sich aufzuhetzen. Tatsache bleibt jedoch, dass die Mehrheit der Bevölkerung Vorbehalte gegen ihre Herrschaft zu haben scheint, und die Opposition hat, obwohl sie vorerst zum Schweigen gebracht wurde, ihren Standpunkt klargemacht."
 election.17.a:0 "Splitter!"
 political.1.t:0 "Sozialist auf dem Vormarsch"
 political.1.d:0 "„Während Arbeiter auf der ganzen Welt gegen ihre Unterdrücker aufbegehren, sitzen diejenigen, die behaupten, in [Root.GetName] Klassenbewusstsein erreicht zu haben, untätig herum und warten auf Veränderungen aus den eigenen Reihen – ein politisches System, das so durch und durch korrupt ist, dass nur eine Revolution uns davor retten kann!“\n\nSo sprechen neue Stimmen in der [Root.GetAdjective] sozialistischen Bewegung. Sie bezeichnen die Herrschaft von [Root.GetRulingParty] als Diktatur der Bourgeoisie und fordern, sie mit allen erforderlichen Mitteln zu stürzen. Ob diese Mittel von innen oder von außen kommen, bleibt abzuwarten."
 political.1.a:0 "Möglicherweise gibt es in der Regierung selbst Leute, die solche Ideen unterstützen."
 political.1.a.tt:0 "Erhöht die Chance auf interne Unterstützung für einen sozialistischen Putsch."
 political.1.b:0 "Eine Bewegung für das Volk muss die Unterstützung des Volkes suchen."
 political.1.b.tt:0 "Erhöht die Chance auf öffentliche Unterstützung für einen sozialistischen Aufstand."
 political.2.t:0 "Sozialistische Sympathien in der Regierung"
 political.2.d:0 "Obwohl die Parteilinie der [Root.GetRulingParty] darin besteht, den revolutionären Sozialismus entschieden abzulehnen und die radikalen linken Elemente des Landes aufmerksam zu beobachten, stehen einige Regierungsmitglieder dieser Möglichkeit offener gegenüber. Sie sehen zumindest Möglichkeiten, auf die Anliegen der Menschen einzugehen, die sich an die Sozialisten wenden, ohne einen umfassenden Bürgerkrieg zu riskieren.\n\nObwohl sie von denen, die [Root.GetLeader] treu bleiben, als Verräter angesehen werden, könnten diese abweichenden Stimmen diejenigen sein, die im Falle einer Revolution einen relativ unblutigen Übergang gewährleisten."
 political.2.a:0 "Wir werden sie aus vielen Gründen ebenfalls genau im Auge behalten."
 political.2.a.tt:0 "Wenn die öffentliche Unterstützung ausreicht, kann ein Putsch durchgeführt werden."
 political.3.t:0 "Sozialisten führen Putsch durch"
 political.3.d:0 "Während die Volksbewegung für eine sozialistische Revolution lautstark und furchteinflößend war, verhielt sich ein Teil der politischen Bewegung weitgehend ruhig und abwartend. Das Warten hat nun ein Ende. Als sich die Führung und die Armee von [Root.GetRulingParty] heute auf einen landesweiten Aufstand vorbereiteten, stellten einige Regierungsvertreter [Root.GetAdjective] [Root.GetLeader] kurzerhand unter Hausarrest und begannen Verhandlungen mit den Rebellen.\n\nUnter dem Vorwand, die Ordnung zu wahren, sicherten die Verhandlungen de facto Positionen im neuen sozialistischen Staat für diejenigen, die kooperierten. Der Putsch war beendet, bevor ihn jemand stoppen konnte, und diejenigen, die kooperiert hätten, wurden nun vom neuen Regime inhaftiert, verbannt oder hingerichtet."
 political.3.a:0 "Die Gezeiten der Geschichte werden die Vergangenheit hinwegfegen."
 political.4.t:0 "Klassenkonflikte teilen [Root.GetName]"
 political.4.d:0 "Die sozialistische Revolutionsbewegung, einst eine Randgruppe, die theoretisch unter radikalen Akademikern beliebt und in der Praxis Unruhestifter war, erfährt zunehmenden Zuspruch in der [Root.GetAdjective] Arbeiterklasse. Die Tatsache, dass sich immer mehr Menschen überhaupt einer „Klasse“ zuordnen, deutet darauf hin, dass sich sozialistische Ideen über diejenigen hinaus verbreiten, die aktiv den Sturz der Regierung anstreben.\n\nMitglieder der [Root.GetRulingParty] beklagen diese Entwicklung und sehnen sich nach einer Zeit zurück, in der sich die Menschen in erster Linie als „[Root.GetAdjective]“ identifizierten. Ihre Sorgen sind nicht unbegründet. Man könnte argumentieren, dass eine Revolution bereits im Gange ist, die sich auf mehreren Ebenen der Gesellschaft abspielt, und es möglicherweise zu spät ist, sie aufzuhalten."
 political.4.a:0 "Die Leute können sich nennen, wie sie wollen."
 political.5.t:0 "Soldaten desertieren zu sozialistischen Partisanen"
 political.5.d:0 "„Kapitalisten und Nationalisten würden es gern sehen, wenn ihr an der Front euer Blut vergießt und Brüder gegen Brüder aufhetzt wegen Streitigkeiten, die die Arbeiter nichts angehen! Statt die Waffen gegen Arbeiter zu erheben, die im Ausland kämpfen, erhebt sie gegen die Unterdrücker und stürzt die Tyrannen!“\n\nDie Armee, normalerweise eine Bastion des Patriotismus und der Loyalität, ist nicht immun gegen die sich in [Root.GetName] rasant verbreitende sozialistische Propaganda. Soldaten desertieren, weigern sich, für ihr Land zu kämpfen, und schließen sich manchmal sogar Partisanenbewegungen an, die angeblich eine Revolution vorbereiten."
 political.5.a:0 "Vielleicht kämpfen sie lediglich für einen anderen [Root.GetName]."
 political.6.t:0 "Die [GetMonth]-Revolution"
 political.6.d:0 "Die Vorstellung, dass die sozialistische Bewegung das Volk repräsentiert, hat in [Root.GetName] zweifellos Auftrieb erhalten, wo die öffentliche Unterstützung für die Sozialistische Partei in den letzten Monaten rapide zugenommen hat. Doch diejenigen, die zur Revolution aufrufen, sind nicht länger eine Ansammlung von Guerillakämpfern und verärgerten Gewerkschaften. Die Gruppe hinter dem Aufruf zum Aufstand ist organisiert genug, um im Erfolgsfall eine Regierung zu bilden.\n\nDennoch könnte eine Revolution, die jetzt beginnen würde, kaum durchgeführt werden, ohne [Root.GetName] in einen Bürgerkrieg zu stürzen. Sollten die Revolutionäre riskieren, die Nation zu entzweien, um ihre Ungeduld zu befriedigen, oder auf eine bessere Gelegenheit in der Zukunft warten?"
 political.6.a:0 "Wer Geschichte schreiben will, muss heute handeln!"
 political.6.b:0 "Die Revolution ist unvermeidlich. Das Unvermeidliche kann warten."
 political.7.t:0 "Nationalisten auf dem Vormarsch"
 political.7.d:1 "„Das [Root.GetAdjective] Volk war zu lange der inkompetenten Herrschaft von [Root.GetRulingParty] unterworfen! Sie behaupten, das Volk zu vertreten, schaffen es aber nicht einmal, unsere Straßen in Ordnung zu halten! Nur wenn wir sie von der Macht entfernen, können wir dieses Land wachsen lassen!“\n\nDie nationalistischen Sprecher in [Root.GetName] haben keinen Hehl daraus gemacht, was sie von unserer derzeitigen Herrschaft und unserem politischen System halten. Reden wie diese haben einen öffentlichen Dissens ausgelöst, der besonders in den konservativeren Teilen des Militärs ausgeprägt ist."
 political.7.a:0 "Die Vorgesetzten hegen möglicherweise unausgesprochene Sympathien."
 political.7.a.tt:0 "Erhöht die Chance auf interne Unterstützung für einen nationalistischen Putsch."
 political.7.b:0 "Die jüngere Generation wird die Fackel übernehmen."
 political.7.b.tt:0 "Erhöht die Chance auf öffentliche Unterstützung für einen nationalistischen Putsch."
 political.8.t:0 "Nationalistische Sympathien im Militär"
 political.8.d:1 "Mehrere hochrangige Mitglieder des [Root.GetAdjective]-Militärs haben ihre Unterstützung für die nationalistische Bewegung in [Root.GetName] zum Ausdruck gebracht, manche privat, manche offen. Sie sind der Meinung, dass die [Root.GetRulingParty] vergessen hat, wie wichtig Waffengewalt für den Zusammenhalt des Landes ist, und sind zunehmend verärgert darüber, dass die Regierung die Armee eher als Werkzeug denn als eine der wichtigsten Institutionen des Landes behandelt. Einige von ihnen gehen sogar so weit, zu behaupten, dass eine neue Regierung nötig sei, die [Root.GetName] in die nächste Hälfte des Jahrhunderts führen könne.\n\nDiese Fraktion besteht zwar nicht überwiegend aus Politikern, einige von ihnen haben jedoch Positionen im Verteidigungsministerium erlangt. Wenn sich diese Entwicklung fortsetzt, könnten sie über genügend politische Unterstützung für einen Putsch verfügen."
 political.8.a:0 "Der Nationalgeist steht über der Regierung."
 political.9.t:0 "Nationalistischer Staatsstreich"
 political.9.d:0 "Manche werden sagen, sie hätten es kommen sehen. Sowohl diejenigen, die vor den Gefahren des Nationalismus warnten, als auch diejenigen, die ihn als Retter von [Root.GetName] priesen, haben heute ihre Prophezeiungen wahr werden sehen, als das Militär in [Root.Capital.GetName] die von [Root.GetRulingParty] geführte Regierung stürzte und die Macht übernahm. [Root.GetLeader] wird vermisst und soll Gerüchten zufolge ins Exil gegangen sein, und der Putsch stieß zunächst auf wenig Widerstand.\n\nAuch die neue [Root.GetAdjective]-Führung hat nicht vor, wachsenden Widerstand zuzulassen. Das Kriegsrecht wurde ausgerufen, und angesichts der laufenden Veränderungen dürfte sich das, was danach kommt, kaum ändern."
 political.9.a:0 "Um die Menschen vor sich selbst zu schützen, ist ein starker Staat erforderlich."
 political.10.t:0 "Bürgerkrieg für Nationalisten"
 political.10.d:1 "Obwohl die Versuche der nationalistischen Bewegung, nationalistische Gefühle wiederzubeleben, teilweise erfolgreich waren, bleibt der Widerstand gegen diese Ideen groß. Die Generäle, die den Sturz der aktuellen Regierung planen, sind enttäuscht über das mangelnde Vertrauen der [Root.GetAdjective]-Bevölkerung in [Root.GetNationalistParty].\n\nSie sind sich weiterhin sicher, dass die Bevölkerung [Root.GetLeader] irgendwann überdrüssig werden wird, sind sich aber uneinig, wie sie vorgehen sollen. Einige fordern einen sofortigen Putsch, bevor [Root.GetName]s Feinde aktiv werden. Ein solcher Putsch würde jedoch angesichts der geringen öffentlichen Unterstützung das Land in einen Bürgerkrieg stürzen."
 political.10.a:0 "Der Wille zur Macht ist bedeutungslos, wenn man zögert, sie zu ergreifen."
 political.10.b:0 "Sie müssen das Volk zuerst vereinen und es dann regieren."
 political.11.t:0 "Formular der nationalistischen Angriffsdivisionen"
 political.11.d:0 "Politisches und Militärisches waren bei den Nationalisten schon immer eng miteinander verknüpft. Parallel zu ihrer wachsenden politischen Bewegung begannen nationalistische Parteien, paramilitärische Organisationen zum Schutz vor inneren und äußeren Bedrohungen zu gründen, wobei die inneren Bedrohungen ihre politischen Gegner sind. Obwohl viele Menschen diese Entwicklung beunruhigen, hat die Welle der militaristischen Aufregung zu einem Anstieg der Freiwilligen in unseren Streitkräften geführt.\n\nDie politischen Führer der Bewegung haben darauf hingewiesen, dass ihre Gegner Grund zur Angst haben. Da die Armee auf mehreren Ebenen von so explizit politischen Elementen durchdrungen ist, ähneln sich die Feinde von [Root.GetName] und die Feinde der Nationalisten immer mehr."
 political.11.a:0 "Nur Landesverräter haben etwas zu befürchten."
 political.12.t:0 "Die Bedrohung durch den Sozialismus"
 political.12.d:0 "„[Root.GetLeader] möchte Sie glauben machen, dass [Root.GetName] sicher und vereint dasteht. Es ist keine Überraschung, dass solche Lügen die Gemüter unserer Leute vergiftet haben, wenn sich nebenan eine Schlange zusammengerollt hat! Man braucht nur über unsere Grenze zu schauen, um zu sehen, wie sich Landsleute im Namen des Sozialismus gegeneinander wenden und das Ende der Nationen verkünden. Wie lange wird es dauern, bis sie auch unsere Nation für tot erklären? Wird die [Root.GetRulingParty] uns vor dieser Bedrohung schützen?“\n\nDas Wachstum der nationalistischen Bewegung in [Root.GetName] wurde durch die Nähe der sozialistischen Revolution gefördert. Viele Gemäßigte, die den Nationalismus normalerweise als ein weiteres fehlgeleitetes ideologisches Experiment abtun würden, empfinden dies ebenfalls als sehr reale Sorge. Angesichts der Wahl zwischen dem Sozialismus unserer Nachbarn und einem nationalistischen Regime würden sie zugegebenermaßen Letzteres vorziehen. Sie wären vielleicht sogar bereit, es aktiv zu unterstützen."
 political.12.a:0 "Wir werden die Vorhut gegen die rote Bedrohung sein!"
 political.13.t:0 "Auf dem Weg zur Demokratie"
 political.13.d:0 "Wenn wir die Stimme des Volkes zum Schweigen bringen, wie kann dann irgendjemand von uns behaupten, die Stimme von [Root.GetName] zu sein? Wenn wir Andersdenken fürchten, wenn wir fürchten, öffentlich angeprangert oder durch Volksabstimmung abgewählt zu werden, fürchten wir in Wirklichkeit, von unseren eigenen Bürgern gehasst und geschmäht zu werden. Hat die [Root.GetRulingParty] wirklich so wenig Vertrauen in ihre Prinzipien?\n\nEine vorsichtige und lose organisierte, aber leidenschaftliche Fraktion in der Regierung hat begonnen, sich für eine weniger repressive Politik gegenüber Staatsfeinden einzusetzen. Sie will die Öffentlichkeit durch Referenden und lokale Parteiversammlungen in die Entscheidungsfindung einbeziehen, auch wenn dies bedeutet, die Zukunft der aktuellen Agenda zu gefährden."
 political.13.a:0 "Wir können das zunächst intern besprechen."
 political.13.a.tt:0 "Erhöht die Chance auf interne Unterstützung bei der Organisation von Wahlen."
 political.13.b:0 "Da wir wissen, dass wir im Recht sind, können wir es uns leisten, unseren Feinden zu erlauben, offener zu sprechen."
 political.13.b.tt:0 "Erhöht die Chance, dass die Menschen ihre Unterstützung für die Demokratie zum Ausdruck bringen und eine Opposition bilden."
 political.14.t:0 "[Root.GetRulingParty] Debatten Demokratie"
 political.14.d:0 "Überraschenderweise hat die Forderung nach mehr Referenden und weniger repressiven Maßnahmen gegen Regimegegner in parteiinternen Diskussionen auf gewisse Unterstützung gestoßen. Während die Führung von [Root.GetRulingParty] weiterhin skeptisch bleibt, haben sich mehrere einflussreiche Mitglieder für einen Kurswechsel ausgesprochen.\n\nVielleicht vertrauen sie darauf, dass sich in der Praxis wenig ändern wird, oder sie sind insgeheim Verräter der Partei, wie viele ihrer Gegner behaupten. Unabhängig davon sind einige der Führungspersönlichkeiten von [Root.GetName] kompromissbereit, sollte der öffentliche Ruf nach solchen Veränderungen laut werden."
 political.14.a:0 "Die Wahl muss nicht immer zwischen Freiheit und Tod stehen."
 political.14.a.tt:0 "Die Regierung kann Wahlen ansetzen, wenn die Politik von der Mehrheit der Bevölkerung unterstützt wird."
 political.14.c:0 "Wir brauchen ein Referendum."
 political.14.e:0 "Das wird sich legen."
 impending_civil_war_tt:0 "§RIm Falle einer weiteren Zunahme der ideologischen Unterstützung könnte dies zu einem ausgewachsenen Bürgerkrieg führen!§!\n"
 political.15.t:0 "Bildung einer demokratischen Opposition"
 political.15.d:0 "Die Lockerung der Beschränkungen für die öffentliche Verbreitung von Anti-[Root.GetRulingParty]-Propaganda hat erwartungsgemäß zu einer Zunahme öffentlicher Protestbekundungen geführt. Organisierte Demonstrationen und Flugblätter finden sich bislang vor allem an akademischen Einrichtungen und in einigen der benachteiligten Gegenden von [Root.GetName], doch es besteht wenig Zweifel daran, dass sich die Bewegung ausbreitet.\n\nDie Führung des Landes ist in dieser Frage hin- und hergerissen. [Root.GetLeader], der die Parteiführung fest im Griff hat, zeigt wenig Interesse an einer Diversifizierung der öffentlichen Debatte. Die ersten Schritte wurden jedoch bereits unternommen, und es gibt möglicherweise kein Zurück mehr."
 political.15.a:0 "Die Bewegung scheint ohne Unterdrückung auf natürliche Weise zu wachsen."
 political.16.t:0 "Öffentlicher Wahlaufruf"
 political.16.d:0 "Die Demonstrationen öffentlichen Widerstands, die einst auf begrenzte Gebiete beschränkt waren, sind heute weit verbreitet. Während sich die Menschen auf den Straßen versammeln, steht die [Root.GetRulingParty] an einem Scheideweg. Wenn wir diese Propaganda weiterhin zulassen, könnten die sowohl innerhalb der Partei selbst als auch in der Opposition vorgeschlagenen Referenden zeigen, dass wir nicht die Unterstützung der Bevölkerung haben. Die Einheit, nach der wir strebten, weicht einer Meinungsvielfalt, die sich gegen uns vereint."
 political.16.a:0 "Auch wenn Reformen stattfinden, müssen wir unsere Stärke zeigen, indem wir diesen Widerstand unterdrücken."
 political.16.b:0 "Geben Sie den Menschen Gehör."
 political.17.t:0 "Öffentliche Wahl in [Root.GetName]"
 political.17.d:0 "Da Meinungs- und Versammlungsfreiheit in [Root.GetName] zunehmend akzeptiert werden, hat sich die Fraktion innerhalb der [Root.GetRulingParty], die Wahlen fordert, von geheimen Verschwörern zu öffentlich unterstützten Reformern entwickelt. Trotz [Root.GetLeader]s Protesten hat sich das Land in den letzten Monaten langsam, aber stetig in Richtung Demokratie bewegt, und Wahlen erscheinen nun als logischer nächster Schritt.\n\nAllerdings sind bei weitem nicht alle [Root.GetAdjective] Bürger für demokratische Reformen. Innerhalb der Partei wird weiterhin darüber diskutiert, ob mit der Abhaltung von Wahlen gewartet werden soll, bis eine stabile Entwicklung sichergestellt ist."
 political.17.a:0 "Diejenigen, die der [Root.GetRulingParty] treu sind, werden die Entscheidung jetzt unterstützen."
 political.17.b:0 "Bevor Wahlen stattfinden können, brauchen die Reformen eine breitere Unterstützung."
 political.18.t:0 "Nationalistisches Referendum gefordert"
 political.18.d:1 "Die schnell wachsende [Root.GetAdjective]-nationalistische Bewegung hat nie behauptet, sie bräuchte für eine Machtergreifung die Unterstützung der Mehrheit, sondern setzt darauf, die Nation unter ihrer Führung zu einen, sobald ihre Herrschaft etabliert ist. Dennoch scheint ihre öffentliche Unterstützung rapide gewachsen zu sein. Viele Nationalisten bezeichnen [Root.GetLeader] nun als Heuchler, der behauptet, die Wünsche des Volkes zu vertreten, sich in Wirklichkeit aber taub stellt.\n\nDer Aufruf zu einem Referendum wurde von den Mitgliedern von [Root.GetRulingParty] bisher als typischer Versuch zur Störung des Systems abgetan, aber immerhin ist es eine politische Maßnahme. Wenn wir jetzt nicht handeln, könnten die Nationalisten den gewaltsamen Kampf als besseren Weg zur Macht wählen."
 political.18.a:0 "Unterdrücken Sie diese hasserfüllte Bewegung!"
 political.18.b:0 "Schenken Sie ihnen keine Beachtung."
 political.18.c:0 "Wenn das Volk es will, werden wir das Referendum abhalten."
 political.19.t:0 "Referendum über sozialistische Forderungen"
 political.19.d:0 "Sozialistische Ideen haben sich in [Root.GetName] schon vor langer Zeit etabliert, erfreuen sich aber in letzter Zeit deutlich größerer Beliebtheit. Die Bewegung hat sich über die politische Theorie hinaus in die politische Praxis ausgebreitet, wobei verärgerte Arbeiter und sogar einige prominente Persönlichkeiten ihre Unterstützung bekundeten. Die Sozialisten nennen dies Klassenbewusstsein. Die [Root.GetRulingParty] hingegen bezeichnet es als Schnellstraße zu Aufruhr und Verrat.\n\nDa sie wenig Vertrauen in die Bereitschaft von [Root.GetLeader] haben, die von ihnen geforderten Reformen umzusetzen, fordern die lautstärksten Sozialisten ein sofortiges Referendum zur Absetzung der derzeitigen Regierung. Zwar könnten wir die Dynamik dieser Massenbewegung vielleicht umkehren, doch wenn uns dies nicht gelingt, wird dies zweifellos zur beliebteren sozialistischen Methode der Absetzung führen: der Revolution."
 political.19.a:0 "Un-[Root.GetAdjective]-Aktivitäten müssen gestoppt werden!"
 political.19.b:0 "Ignorieren Sie sie, sie machen nur Ärger."
 political.19.c:0 "Das Referendum ist einem blutigen Aufstand vorzuziehen."
 political.20.t:0 "Demokraten fordern Referendum"
 political.20.d:0 "Es überrascht nicht, dass die Idee, dass das Volk über sein Land herrscht, schnell große Popularität erlangt. Die [Root.GetRulingParty] betrachtet die von diesen Bewegungen verkörperte Idee der Demokratie – Meinungsfreiheit, öffentliche Wahlen, freie Presse – natürlich nur als populistische Rhetorik, die [Root.GetLeader]s Regierung schwächen soll.\n\nDennoch lässt sich nicht leugnen, dass diese Ideen in der [Root.GetAdjective]-Bevölkerung Fuß gefasst haben. In wahrhaft demokratischer Manier fordern sie ein Referendum über die Ablösung des aktuellen Regimes. Obwohl diese Ideen derzeit leicht zu ignorieren sind, haben sie die Angewohnheit, sich hartnäckig zu halten. Was wird aus uns, wenn wir eine friedliche Revolution unmöglich machen?"
 political.20.a:0 "Treibt sie zusammen."
 political.20.b:0 "Fahren Sie einfach wie gewohnt fort."
 political.20.c:0 "Wenn wir das Referendum annehmen, können wir vielleicht unser Erbe bewahren."
 political.21.t:0 "Nationalistischer Marsch auf [Root.Capital.GetName]"
 political.21.d:0 "Nachdem ihnen ihr Referendum verweigert wurde, das fast nur ein symbolischer Versuch war, legal an die Macht zu kommen, nutzten die Nationalisten ihre beträchtliche öffentliche Unterstützung und ihre Verbindungen zum [Root.GetAdjective] Militär für einen Putschversuch. Die [Root.GetRulingParty]-Regierung hat ihre Bedingungen abgelehnt und erklärt, sie werde bis zum Ende kämpfen, um [Root.GetName], wie wir es kennen, zu erhalten."
 political.21.a:0 "Wir werden sie um jeden Preis aufhalten!"
 political.21.b:0 "Die Nationalisten tragen den wahren Geist von [Root.GetName] in sich!"
 political.22.t:0 "Sozialistischer Aufstand"
 political.22.d:0 "Nach der Ablehnung ihres Referendums verloren die wenigen Reformer der sozialistischen Bewegung in [Root.GetName] rasch an Einfluss gegenüber den radikaleren Elementen. Da [Root.GetRulingParty] die öffentliche Unterstützung für die vorgeschlagenen Reformen nicht anerkannte, verbreitete sich die romantische Sicht der Revolution allmählich, und die Anführer der Bewegung wurden zu denjenigen, die am leichtesten einen Aufstand anzetteln konnten. Diese Unruhen haben sich inzwischen zu einem umfassenden Bürgerkrieg entwickelt, bei dem die Zukunft der Nation auf dem Spiel steht."
 political.22.a:0 "Wir werden nicht zulassen, dass sie unser Land ruinieren!"
 political.22.b:0 "Das Feuer der Revolution muss mit dem Blut der Unterdrücker gelöscht werden!"
 political.23.t:0 "Die [Root.GetAdjective]-Frühling"
 political.23.d:0 "Nachdem ihr Versuch, ein Referendum zur Einführung der Demokratie durchzuführen, abgelehnt wurde, haben die Verantwortlichen das [Root.GetLeader]-Regime als unverbesserlich abgetan. Eine breite Koalition von Rebellengruppen, vereint durch ihr gemeinsames Ziel, repräsentativere politische Systeme in [Root.GetName] einzuführen, hat zu den Waffen gegriffen und angekündigt, nicht ruhen zu werden, bis die [Root.GetRulingParty] gestürzt ist."
 political.23.a:0 "Bewahre uns vor dieser Pöbelherrschaft!"
 political.23.b:0 "Endlich ist [Root.GetName] kostenlos!"
 political.24.t:0 "Nationalist verspottet"
 political.24.d:0 "Die [Root.GetAdjective]-Begeisterung der Bevölkerung für Nationalstolz und ihre Versuche, den Ruhm der Vergangenheit wiederzubeleben, scheinen vorbei zu sein. Ein böses Erwachen für ihre glühenden Anhänger, deren Uniformen, militaristisches Getue und übertriebene Reden nun häufiger Spott als Sympathie erregen.\n\nEinst als Bedrohung für die [Root.GetRulingParty]-Machtbasis betrachtet, wird [Root.GetAdjective] Nationalismus heute zunehmend als absurde, extremistische Position und Angriff auf die grundlegendsten Werte unserer Nation empfunden – eben jener Nation, die sie angeblich so hoch schätzen. Das Wort scheint eher als Beleidigung denn als politische Bezeichnung geeignet."
 political.24.a:0 "Was für ein Haufen Clowns."
 political.25.t:0 "Sozialistische Modeerscheinung vergeht"
 political.25.d:0 "Viele Sozialisten hatten vorausgesagt, dass [Root.GetName] die nächste Nation sein würde, die der sogenannten internationalen Revolution zum Opfer fallen würde, doch nach einigen Monaten voller Streiks und roter Fahnen auf den Straßen scheint die Bewegung abgeflaut zu sein. Die Arbeiterklasse, die vermeintliche treibende Kraft der Revolution, hat dringlichere Sorgen als den Sturz von [Root.GetLeader] und scheint vom Erfolg dieser Revolutionen anderswo wenig beeindruckt zu sein. Unterdessen haben sich die Intellektuellen, die leidenschaftlich dazu aufriefen, den Unterdrückern die Kehle durchzuschneiden, als überraschend zurückhaltend erwiesen, irgendetwas anzuzetteln, das ihren komfortablen Lebensstil tatsächlich stören könnte.\n\nDie Gespräche über die Revolution werden wahrscheinlich weitergehen, sei es bei billigem Bier oder teurem Wein, aber es wird wahrscheinlich nur Gerede sein."
 political.25.a:0 "Was für ein Haufen Heuchler."
 political.26.t:0 "Die demokratische Bewegung verstummt"
 political.26.d:0 "Nach einigen Monaten lautstarken Widerstands gegen das Regime von [Root.GetLeader], in dem öffentliche Wahlen und liberalere Gesetze zur Versammlungs- und Meinungsfreiheit gefordert wurden, scheint die Bewegung auseinandergebrochen zu sein. Die Menschen sind nun besorgter über die Stabilität von [Root.GetName], sollten solche Reformen stattfinden, wobei diejenigen, die lautstark Demokratie fordern, eher als Unruhestifter angesehen werden. Noch mysteriöser ist, dass viele der führenden Persönlichkeiten der Bewegung verschwunden zu sein scheinen oder ihre Arbeit plötzlich eingestellt haben. Vielleicht gingen einige von ihnen ins Exil, als sie das Scheitern ihrer Bemühungen sahen. Ungeachtet dessen bestreitet die Regierung von [Root.GetRulingParty] jegliche Kenntnis oder Beteiligung daran."
 political.26.a:0 "Was für ein Haufen Drückeberger."
 political.27.t:0 "[Root.GetLeader] gibt neutrale Außenpolitik auf"
 political.27.d_fascism:1 "Nach dem jüngsten Machtantritt von [Root.GetRulingParty] kündigte [Root.GetLeader] an, dass [Root.GetName] seine neutrale Außenpolitik nicht länger beibehalten werde.\n„Die Welt ist verworren und komplex geworden. Allein sind wir nicht mehr sicher. Wir müssen mit unseren nationalistischen Partnern gegen unsere Feinde kämpfen. Wenn wir uns nicht für eine Seite entscheiden, werden wir allein untergehen.“"
 political.27.d_communism:0 "Nach dem jüngsten Machtantritt von [Root.GetRulingParty] kündigte [Root.GetLeader] an, dass [Root.GetName] seine neutrale Außenpolitik nicht länger beibehalten werde.\n„Die Welt ist verworren und komplex geworden. Dieses Land hat immer an seinen Prinzipien festgehalten und war bereit, sie zu verteidigen. Allein sind wir nicht mehr sicher. Neutralität ist nicht mehr der sichere Hafen, der sie einmal war, und diejenigen, die in dieser Welt nach Macht streben, respektieren sie nicht. Wir müssen uns an die Seite unserer sozialistischen Brüder stellen und uns den Mächten entgegenstellen, die uns unterdrücken wollen. Gegen die bürgerliche Mehrheit, die nichts anderes will, als uns klein zu halten. Wenn wir nicht Stellung beziehen, werden wir allein untergehen.“"
 political.27.a:0 "Für die Zukunft von [Root.GetName]"
 political.28.t:0 "[Root.GetNameDefCap] Wiedervereint"
 political.28.d:1 "Der schreckliche Bürgerkrieg, der unser Land verwüstet hat, neigt sich dem Ende zu, und wir haben endlich eine politische Einigung erzielt. Wir sind nun mit unseren Mitbürgern einer Meinung und werden gemeinsam unsere großartige Nation wieder aufbauen. Die Feinde, die versucht haben, aus unseren internen Machtkämpfen Kapital zu schlagen, müssen sich nun einem vereinten Staat stellen.\n\nDie neue [Root.GetRulingIdeology] [Root.GetName] wird nie wieder gespalten sein!"
 political.28.a:0 "Endlich vereint!"
 political.29.t:0 "Ende des Bürgerkriegs"
 political.29.d:0 "Der Bürgerkrieg, der unsere Nation gespalten hat, ist nun beendet, und unsere Sache hat gesiegt. Wir können jedoch nicht zulassen, dass diejenigen, die unsere Gegner unterstützten, weiterhin ihre heimtückische Propaganda unter der Bevölkerung verbreiten. In den kommenden Tagen ist eine starke Hand erforderlich, damit wir vereint, bereit und stark gegen alle äußeren Bedrohungen stehen können, die unsere junge Regierung gefährden könnten."
 political.29.a:0 "Es wird getan."
 britain.1.t:0 "Die Tizard-Mission"
 britain.1.d:0 "Die britische Regierung hat uns eine wissenschaftliche Delegation unter der Leitung von Henry Tizard mit einem interessanten Vorschlag geschickt. Die Briten sind bereit, ihre Forschungsanstrengungen in mehreren Schlüsselbereichen mit unseren zu bündeln, da ihnen die industriellen Kapazitäten fehlen, um ihre Erfindungen in ausreichender Stückzahl zu produzieren."
 britain.1.a:0 "Ein hervorragender Vorschlag!"
 britain.1.b:0 "Nein, die Briten sind auf sich allein gestellt."
 britain.1.c:0 "Wir sollten eine längerfristige Zusammenarbeit anstreben."
 britain.2.t:0 "Tizard erfolgreich"
 britain.2.d:0 "Die US-Regierung hat unserem Vorschlag zugestimmt und einige ihrer Forschungsdaten mit unserer Delegation geteilt."
 britain.2.a:0 "Sehr gut!"
 britain.3.t:0 "Tizard abgelehnt"
 britain.3.d:0 "Die US-Regierung hat unseren Vorschlag abgelehnt, wir werden von ihr keine Hilfe bekommen."
 britain.3.a:0 "Diese Kerle!"
 britain.4.t:0 "Die Burma-Straße"
 britain.4.d:0 "Um unseren Krieg gegen Japan zu unterstützen, hat Großbritannien die Infrastruktur verbessert und Luftwaffenstützpunkte entlang unserer burmesischen Grenze errichtet."
 britain.4.a:0 "Vertreibe die rennenden Hunde!"
 japan.16.t:0 "Eine Marionette Japans"
 japan.16.d:0 "Die Japaner wollen den Reichtum Chinas kontrollieren und schrecken vor keinem Krieg zurück. Wenn wir nicht gegen sie kämpfen wollen, müssen wir uns ihrer Kontrolle unterwerfen und zu nichts weiter als einer japanischen Marionette werden."
 japan.16.a:0 "Wir können nicht kämpfen"
 japan.16.b:0 "Wir müssen kämpfen!"
 japan.17.t:0 "China unterwirft sich"
 japan.17.d:0 "Die feigen Chinesen haben sich erneut unseren Forderungen gebeugt und sich bereit erklärt, eine bloße Marionette unserer Nation zu werden."
 japan.17.a:0 "Ihr Verlust ist unser Gewinn!"
 japan.18.t:0 "China lehnt ab"
 japan.18.d:0 "Die dummen Chinesen haben unsere völlig berechtigte Bitte abgelehnt, bestimmte Aspekte ihrer Regierung zu übernehmen. Wir müssen sie besiegen, wenn wir Zugang zu ihren Ressourcen haben wollen."
 japan.18.a:0 "Sollte nicht schwierig sein!"
 britain.6.t:0 "Indische Unabhängigkeit"
 britain.6.d:0 "Vor vier Jahren versprachen wir Indien die Unabhängigkeit innerhalb von vier Jahren. Die Zeit ist abgelaufen, und die Inder erwarten von uns, dass wir unser Versprechen einhalten. Soll das Kronjuwel das britische Empire verlassen?"
 britain.6.a:0 "Es ist Zeit loszulassen"
 britain.6.b:0 "Niemals!"
 japan.15.t:0 "Indische Nationalarmee"
 japan.15.d:0 "Nach unseren Niederlagen gegen die Briten haben wir eine große Zahl indischer Kriegsgefangener. Mit der richtigen Überzeugungsarbeit könnten wir diese Gefangenen zur Verstärkung unserer Streitkräfte einsetzen ..."
 japan.15.a:0 "Für große Gerechtigkeit!"
 JAP_Indian_National_Army_arrives:0 "Zwei Divisionen der indischen Nationalarmee treffen in Singapur ein."
 britain.7.t:0 "Beenden Sie den Handel mit Deutschland"
 britain.7.d:0 "Großbritannien hat uns ein Ultimatum gestellt: Entweder wir stellen unseren Handel mit Deutschland ein, oder sie marschieren ein."
 britain.7.a:0 "Ich mochte die Deutschen sowieso nie"
 britain.7.b:0 "Wir tauschen, mit wem wir wollen!"
 britain.8.t:0 "Forderung abgelehnt!"
 britain.8.d:0 "[From.GetName] hat unsere Forderung abgelehnt, den Handel mit Deutschland einzustellen. "
 britain.8.a:0 "Dann ist Krieg!"
 britain.8.b:0 "Wir können sie nicht zwingen."
 britain.9.t:0 "Chamberlain tritt zurück"
 britain.9.d:0 "Da sich der Krieg zu unserem Nachteil und dem unserer Verbündeten entwickelt, ist der Premierminister für seine Entscheidungen in Friedens- und Kriegszeiten an entscheidenden Wendepunkten in die Kritik geraten. In einer Zeit, in der Großbritannien mehr denn je vereint sein muss, ist es gespalten, da Teile des Parlaments Chamberlain verachten. Da ihm die wichtige Unterstützung der Labour-Partei fehlt, hat der Premierminister beschlossen, zurückzutreten und Lord Halifax als seinen Nachfolger zu bevorzugen. Halifax zeigt sich jedoch skeptisch, und Chamberlain riet dem König, Winston Churchill zu rufen. Churchill, der schon lange vor dem bevorstehenden Krieg warnt, wird als fähig angesehen, uns durch diesen zu führen."
 britain.9.a:0 "Wir werden niemals aufgeben."
 britain.10.t:0 "Chamberlain verstorben"
 britain.10.d:0 "Premierminister Neville Chamberlain ist kürzlich erkrankt, obwohl er für sein Alter insgesamt gesund war. Nach der Diagnose Darmkrebs, verstärkten Schmerzen und Schlafmangel trat er von seinem Amt zurück. Chamberlain genießt nach wie vor großen Rückhalt in der Bevölkerung und tritt nur als letzten Ausweg zurück, da er weiß, dass er sein Amt nicht mehr antreten wird. Die Frage bleibt, wer nach diesem großen Staatsmann die Fackel übernehmen und Großbritannien durch die dunklen Zeiten führen wird, die möglicherweise noch vor uns liegen."
 britain.10.a:0 "Das Imperium braucht Winston Churchill."
 britain.10.b:0 "Lord Halifax ist Chamberlains erste Wahl."
 britain.21.t:0 "Tizard triumphiert"
 britain.21.d:0 "Die US-Regierung hat nicht nur unserem ursprünglichen Vorschlag zugestimmt, sondern sogar eine längerfristige Zusammenarbeit zwischen Forschern unserer Länder angeboten."
 britain.21.a:0 "Hervorragend!"
 soviet.18.t:0 "Der Xi&#39;an-Vorfall"
 soviet.18.d:0 "Der Druck der Sowjetunion, die Feindseligkeiten zwischen uns und der chinesischen Roten Armee zu beenden, hat dazu geführt, dass einige unserer Reihen die Sache selbst in die Hand nehmen. Zwei Generäle ließen [Root.GetLeader] verhaften, um einen Waffenstillstand zwischen uns und den Kommunisten zu erzwingen und China gegen äußere Bedrohungen zu vereinen. Der internationale Druck für eine friedliche Lösung sowie die Schwäche des in dieser Zeit gespaltenen Chinas sprechen für die Bildung einer Einheitsfront. Welchen Kurs sollten wir einschlagen?"
 soviet.18.a:0 "Kontaktieren Sie die Kommunistische Partei für Friedensgespräche."
 soviet.18.b:0 "Niemals!"
 soviet.19.t:0 "Nationalisten bieten Waffenstillstand an"
 soviet.19.d:0 "Meinungsverschiedenheiten innerhalb der nationalistischen Reihen haben zu einer prekären Situation geführt. Ihr Anführer [From.GetLeader] wurde verhaftet, um unsere Feinde zu einem Waffenstillstand zu zwingen, der China gegen ausländische Feinde vereint. Obwohl wir uns wünschen, dass die Kuomintang-Führung für ihre Verbrechen gegen uns bestraft wird, bietet sich uns die seltene Gelegenheit zur Zusammenarbeit, um sicherzustellen, dass China nicht in die Hände ausländischer Imperialisten fällt."
 soviet.19.a:0 "Wir akzeptieren vorerst einen Waffenstillstand."
 soviet.19.b:0 "Die Revolution kann dafür nicht auf die lange Bank geschoben werden!"
 soviet.20.t:0 "Nationalistisches China lehnt Verhandlungen ab"
 soviet.20.d:0 "Trotz der Entführung von [From.GetLeader] weigern sich die Nationalisten, mit den Kommunisten über einen Waffenstillstand zu verhandeln. Leider werden die Chinesen weiterhin in gewaltsamen Konflikten mit ihrem eigenen Volk verharren und sind damit eine leichte Beute für ihre Feinde."
 soviet.20.a:0 "Wir haben getan, was wir konnten."
 soviet.21.t:0 "Waffenstillstand im chinesischen Bürgerkrieg"
 soviet.21.d:0 "Die Verhandlungen in Xi&#39;an haben Ergebnisse gebracht. Sowohl Nationalisten als auch Kommunisten haben sich auf einen Waffenstillstand geeinigt, der die Feindseligkeiten zumindest vorübergehend beendet und es den Parteien ermöglicht, im Kampf gegen ausländische Bedrohungen zusammenzuarbeiten."
 soviet.21.a:0 "Für China gibt es noch Hoffnung."
 soviet.22.t:0 "Das kommunistische China lehnt Verhandlungen ab"
 soviet.22.d:0 "Trotz aller Bemühungen der Kuomintang-Generäle, einen Waffenstillstand mit der Führung der Kommunistischen Partei zu erreichen, weigern sich die Kommunisten, auch nur einen vorübergehenden Frieden zu schließen, solange der Führer der Nationalisten am Leben ist. Es scheint, dass die Feindseligkeiten nicht so schnell enden werden."
 soviet.22.a:0 "Wenn es so weitergeht, könnten Chinas Feinde spalten und herrschen."
 soviet.23.t:0 "Sowjetunion tritt Land ab"
 soviet.23.d:0 "Die Sowjetunion hat andere Bedrohungen zu befürchten und möchte die Feindseligkeiten mit unserem Imperium nicht weiter eskalieren lassen. Als Zeichen ihres Wunsches nach Frieden zwischen unseren Nationen hat sie uns einige Gebiete abgetreten, in der Hoffnung, dass dies unsere diplomatischen Beziehungen stärken wird."
 soviet.23.a:0 "Vielleicht kann dies ein Wendepunkt sein."
 soviet.24.t:0 "Die fünfte Kolonne"
 soviet.24.d:0 "Die Verfolgung von Volksfeinden, die die Revolution rückgängig machen oder untergraben wollen, ist seit der Machtübernahme der Partei gängige Politik. Die darauf folgenden internen Machtkämpfe haben unseren Fokus verlagert, und die Säuberung der Parteimitglieder selbst hat seit Trotzkis Exil stärkere Bedeutung erlangt. Stalin hat sich zur Ikone gemacht, sich aber viele reale und unzählige imaginäre Feinde geschaffen.\n\nNachdem der Generalsekretär die schlimmsten internen Machtkämpfe miterlebt hat, neigt er dazu, beim geringsten Verdacht zu handeln. Ein Ausschluss aus der Partei bedeutet Gefängnis oder Tod. Düstere Zeiten stehen denen bevor, die Illoyalität zeigen – oder einfach nur ein bisschen zu viel Loyalität, um glaubwürdig zu wirken."
 soviet.24.a:0 "Stehen Sinowjew und seinesgleichen noch in Kontakt mit Trotzki?"
 soviet.25.t:0 "Prozess gegen das antisowjetische trotzkistische Zentrum"
 soviet.25.d:0 "Trotz Leo Trotzkis Zwangsexil befürchtet Josef Stalin, heimliche Unterstützer in der Partei zu haben. Eine Reihe rascher Verhaftungen und brutaler Verhöre führten zu Geständnissen und Zeugenaussagen, die praktischerweise auf einige von Stalins Rivalen hinweisen. Doch je mehr Fragen gestellt werden und je tiefer die Geheimpolizei in Briefen und Tagebüchern gräbt, desto mehr Personen werden – wenn auch indirekt – belastet. Parteimitglieder beginnen zu glauben, dass Stalins absolute Macht und der Tod seiner Frau ihn so isoliert haben, dass er jeden als Bedrohung empfindet. Aber ist das nicht genau das, was ein Verräter sagen würde?"
 soviet.25.a:0 "Kalinins Frau steht unter Verdacht. Auch ihm kann man nicht trauen."
 soviet.25.b:0 "Chruschtschow hat sich in der Vergangenheit mit dem Trotzkismus beschäftigt. Er muss gehen."
 soviet.25.c:0 "Radeks Geständnis weist auf mehrere Personen innerhalb der Partei hin."
 soviet.25.e:0 "Den Parteimitgliedern kann man vertrauen. Diese Paranoia muss aufhören."
 soviet.26.t:0 "Geheimprozess gegen die Generäle"
 soviet.26.d:0 "Die Rote Armee war schon immer ein Nährboden für subversive Elemente, schon seit Trotzki selbst Kriegskommissar war. Dokumente, die der NKWD erbeutet hat, belasten mehrere hochrangige Offiziere nicht nur als Verräter, sondern auch als Spione. Einer der prominentesten Verdächtigen ist Michail Tuchatschewski, den Stalin unbedingt aus der Armee entfernen möchte. Der häufige Kontakt der Marine mit Ausländern hat dazu geführt, dass auch viele von ihnen verhaftet wurden.\n\nObwohl es Dokumente unserer Feinde gibt, die ihre Schuld beweisen, lässt sich nicht sagen, ob sie diese gefälscht haben oder ob sie von denjenigen, die diese Säuberung überhaupt erst in Gang setzen wollten, falsche Informationen erhalten haben."
 soviet.26.a:0 "Tuchatschewski muss unter Ausschluss der Öffentlichkeit vor Gericht gestellt und sofort hingerichtet werden."
 soviet.26.b:0 "Rokossovsky weigert sich, zu gestehen, darf aber nicht am Leben bleiben."
 soviet.26.c:0 "Gefälschte Dokumente und erzwungene Geständnisse sind kein Beweis."
 soviet.27.t:0 "Prozess gegen die 21"
 soviet.27_tt:0 "Erhöht die Strafe von §YOffiziere gesäubert§!"
 soviet.27_tt2:0 "§RWerde in Zukunft zu einem Bürgerkrieg führen.§!"
 soviet.27.d:0 "Nach mehreren Verhaftungs- und Prozesswellen hat die Große Säuberung eine Geschichte gesponnen, die zu diesem Prozess führte. Unter den Angeklagten befinden sich nicht nur alte Führer wie Nikolai Bucharin, sondern auch zahlreiche Diplomaten, Politiker, Militärs und sogar viele hochrangige NKWD-Offiziere. Die Anklagepunkte sind zudem umfangreicher als zuvor und umfassen jahrzehntealte Pläne zur Ermordung sowjetischer Führer und zum Ausverkauf der Union an ihre Feinde. Die Tatsache, dass der NKWD nun selbst zum Ziel der Säuberung gehört, hat den Kreis des Verfahrens gewissermaßen geschlossen. Drohungen und Schläge führten dazu, dass viele Angeklagte alle Anklagepunkte gestanden, selbst die ausgefallensten. Den Hauptangeklagten droht die Hinrichtung."
 soviet.27.a:0 "Marine und Luftwaffe sind bislang glimpflich davongekommen."
 soviet.27.b:0 "Wie wir vermutet haben, lauern überall Feinde."
 soviet.27.c:0 "Das ist zu weit gegangen. Bald werden wir alle unsere eigenen Leute getötet haben."
 soviet.28.t:0 "Trotzkistischer Putsch"
 soviet.28.d:0 "Die Welt wird vielleicht nie erfahren, ob Stalins Paranoia die Richtigen traf oder ob er sich mit seinem Versuch, jeden Trotzkisten in der Partei auszulöschen, weitere Feinde machte. Sicher ist, dass seine Befürchtungen letztendlich eintraten. Heute ist Leo Trotzki aus seinem Exil zurückgekehrt und hat mit der Unterstützung mehrerer einflussreicher Parteimitglieder und NKWD-Offiziere einen Putsch gestartet, um Stalins Herrschaft zu stürzen.\n\nDer ehemalige Generalsekretär wurde in seinem Haus mit einem Eispickel angegriffen und zusammen mit mehreren seiner Anhänger hingerichtet. Den von ihm aufgebauten Personenkult zu zerstören, wird Zeit brauchen, aber die Menschen wissen jetzt zumindest, dass er nicht unsterblich war.\n\n Einer der wenigen Überlebenden, denen die Flucht gelang, war Iwan Konew. Dem glühenden Anhänger Stalins gelang es, Unterstützung zu gewinnen und der Trotzki-Regierung den Krieg zu erklären, um die Macht zurückzuerobern und „die Vision des Genossen Stalin zu verwirklichen“."
 soviet.28.a:0 "Führer kommen und gehen, aber das Volk bleibt."
 soviet.29.t:0 "Frankreich möchte der Komintern beitreten."
 soviet.29.d:0 "Unsere Genossen in der Parti Communiste Francais haben große Fortschritte gemacht. Die französische Nation ist bereit, der Komintern beizutreten."
 soviet.29.a:0 "Eine willkommene Ergänzung"
 soviet.29.b:0 "NEIN!"
 soviet.100.t:0 "Kommunisten geben nach"
 soviet.100.d:0 "Da wir uns mit der Sowjetunion im Krieg mit einem gemeinsamen Feind befinden, scheint die Unterstützung für unsere einheimischen kommunistischen Parteien abgeschwächt zu sein."
 soviet.100.a:0 "Ich bin froh, sie los zu sein!"
 yugoslavia.1.t:0 "Zurück Putsch in Jugoslawien"
 yugoslavia.1.d:0 "Die anti-Achsen-Stimmung in Jugoslawien, die wir lange versucht haben, auszugleichen, um das Land neutral zu halten und unsere Zusammenarbeit mit der aktuellen Führung fortzusetzen, hat mit den neuen Bemühungen des Landes um eine Zusammenarbeit mit Deutschland einen kritischen Punkt erreicht. Obwohl mehrere deutsche Verbündete territoriale Interessen in Jugoslawien haben, hat die Führung beschlossen, deutsche Truppen ins Land zu lassen. Eine Initiative der jugoslawischen Luftwaffe zielt darauf ab, die deutschfreundliche Regierung zu stürzen. Dies könnte zwar die Region weiter destabilisieren, würde aber die Zusammenarbeit mit Deutschland beenden. Sollten unsere Geheimdienstler den Putsch unterstützen oder versuchen, die antideutsche Fraktion davon zu überzeugen, ihn zu verhindern?"
 yugoslavia.1.a:0 "Unterstützen Sie den Putsch durch das SOE."
 yugoslavia.1.b:0 "Halten Sie die Verschwörer davon ab."
 yugoslavia.2.t:0 "Staatsstreich"
 yugoslavia.2.d:0 "Während [Root.GetLeader] versucht, mit Deutschland freundschaftliche Beziehungen aufrechtzuerhalten, wächst im Inland der Unmut über die Zusammenarbeit mit den Deutschen. Vor allem serbische Nationalisten widersetzen sich dieser diplomatischen Linie, und auch in der Bevölkerung wird der Widerstand lautstark geäußert. Heute haben Militärs der Luftwaffe einen Putschversuch unternommen, bei dem sie den jungen König Peter II. für volljährig erklärten und auf den Thron setzten. Ermutigt von den Geheimdiensten der deutschen Feinde, zielt der Putsch darauf ab, unsere Abkommen zu beenden. Dies könnte Krieg bedeuten."
 yugoslavia.2.a:0 "Besser Krieg als Pakt!"
 yugoslavia.2.b:0 "Wir würden lieber den Putsch bekämpfen als die Deutschen."
 yugoslavia.3.t:0 "Londoner Konferenz"
 yugoslavia.3.d:0 "Unsere Hoffnung, dass wir den deutschen Bedrohungen nicht allein gegenüberstehen würden, hat sich erfüllt. Die Macht des Britischen Empire und seiner Verbündeten wird uns zur Seite stehen."
 yugoslavia.3.d_FRA_abandoned_yugoslavia:0 "Unsere Hoffnung, den deutschen Bedrohungen nicht allein gegenüberstehen zu müssen, hat sich erfüllt. Die Macht des Britischen Empire und seiner Verbündeten steht uns bei. Leider hat Frankreich den Weg des Feiglings gewählt."
 yugoslavia.3.a:0 "Jugoslawien wird frei sein"
 yugoslavia.4.d:0 "Unsere Hoffnung, den deutschen Bedrohungen nicht allein gegenüberstehen zu müssen, hat sich erfüllt. Auch wenn die schwindende Macht des Britischen Empires nicht auf unserer Seite steht, wird das mächtige Französische Empire an unserer Seite stehen."
 yugoslavia.4.a:0 "Wir werden triumphieren!"
 yugoslavia.5.t:0 "Londoner Diktat!"
 yugoslavia.5.d:0 "Angesichts eines wiedererstarkten Deutschlands, das die Verträge, die den Frieden bewahrten, zerreißt. Die Feiglinge im Westen werfen uns den Wölfen zum Fraß vor, in der Hoffnung, dass wir ihren Hunger stillen. Die Geschichte wird sie unfreundlich beurteilen, aber jetzt müssen wir unser Schicksal selbst bestimmen."
 yugoslavia.5.a:0 "Widerstand führt nur zu sinnlosen Todesfällen"
 yugoslavia.5.b:0 "Wir werden bis zum letzten kämpfen"
 yugoslavia.6.t:0 "Londoner Konferenz"
 yugoslavia.6.d:0 "Wenn alle anderen uns verlassen haben, steht nur Italien an unserer Seite. Es ist jetzt unser wahrster Freund und wir werden gemeinsam kämpfen."
 yugoslavia.6.a:0 "Gott helfe uns"
 yugoslavia.7.t:0 "Schicksal Jugoslawiens"
 yugoslavia.7.d:0 "[From.GetNameDefCap] fordert, dass wir ihnen die volle Kontrolle über unser Land übergeben. Alle Bürger Jugoslawiens werden praktisch zu Deutschen, und wir haben keinen Einfluss mehr. Wir können uns entscheiden, hier standhaft zu bleiben und auf Hilfe zu hoffen, aber dies ist möglicherweise der einzige Weg, ein Massaker am jugoslawischen Volk zu verhindern."
 yugoslavia.7.a:0 "Wir müssen standhaft bleiben"
 yugoslavia.7.b:0 "Es wird so viele Leben retten"
 yugoslavia.8.d:0 "[From.GetNameDefCap] fordert die vollständige Übergabe der Kontrolle über unser Land. Die Bürger Jugoslawiens werden faktisch zu Bürgern von [From.GetNameDef] oder einem ihrer Marionettenstaaten. Wir können uns entscheiden, standhaft zu bleiben und auf Hilfe zu hoffen, aber dies ist möglicherweise der einzige Weg, ein Massaker am jugoslawischen Volk zu verhindern."
 yugoslavia.8.a:0 "Wir müssen standhaft bleiben"
 yugoslavia.8.b:0 "Es wird so viele Leben retten"
 yugoslavia.9.d:0 "[From.GetNameDefCap] fordert, dass wir Gebiete an eine neu gebildete kroatische Regierung abtreten, die von [From.GetNameDef] kontrolliert wird. Sie verlangen außerdem umfassende Regierungsreformen, die es uns ermöglichen, die Bürger Jugoslawiens zu regieren, allerdings mit starkem [From.GetAdjective] Einfluss auf unsere Politik. Wir können uns entscheiden, hier standhaft zu bleiben und auf Hilfe zu hoffen, aber dies ist möglicherweise der einzige Weg, ein Massaker am jugoslawischen Volk zu verhindern."
 yugoslavia.9.a:0 "Wir müssen standhaft bleiben"
 yugoslavia.9.b:0 "Es wird so viele Leben retten"
 germany.89.t:0 "Unheilige Allianz"
 germany.89.d:0 "Nach dem Erfolg unserer jüngsten Zusammenarbeit haben uns die Deutschen ein interessantes Angebot unterbreitet. Sie schlagen vor, dass wir unsere Differenzen beilegen und, anstatt unsere Kräfte im Kampf gegeneinander zu vergeuden, während die westlichen Demokratien zusehen und davon profitieren, unsere Kräfte bündeln und sie stattdessen vernichten!"
 germany.89.a:0 "Lasst die Welt erzittern!"
 germany.89.b:0 "Keine Deals mit den Faschisten!"
 germany.90.t:0 "Allianz abgelehnt"
 germany.90.d:0 "Die Sowjets haben unser Angebot abgelehnt. Wenn wir die Ressourcen der Sowjetunion wollen, müssen wir sie uns mit Gewalt nehmen!"
 germany.90.a:0 "Wenn sie nicht für uns sind, sind sie gegen uns."
 germany.91.t:0 "Frankreich möchte unserer Fraktion beitreten"
 germany.91.d:0 "Die starken Anführer der Bewegung Franziskus haben große Fortschritte gemacht und bieten an, sich unserer Sache anzuschließen. Die französische Nation ist bereit, für das Reich zu kämpfen."
 germany.91.a:0 "Mehr Soldaten für das Reich"
 germany.91.b:0 "Nein!"
 germany.92.t:0 "Deutschland lehnt Ultimatum ab"
 germany.92.d:0 "Obwohl wir klargestellt hatten, dass die Wiederaufrüstung des Rheinlandes als kriegerische Handlung angesehen würde, weigerte sich Deutschland, nachzugeben und rückte in die entmilitarisierte Zone vor, ohne unsere Warnung zu beachten. Das bedeutet, dass trotz unserer Bemühungen, den Frieden zu wahren, in Europa erneut Krieg ausgebrochen ist."
 germany.92.a:0 "Der Versailler Vertrag muss durchgesetzt werden."
 germany.93.t:0 "Londoner Konferenz"
 germany.93.d:0 "Wir erwarteten, dass die europäischen Großmächte sich an einen Tisch setzen und im Namen des Friedens eine gerechte Einigung erzielen würden. Stattdessen haben sich Großbritannien und Frankreich entschieden, die aufstrebenden Jugoslawen und ihren künstlichen Staat zu unterstützen. Slowenien wird uns gehören, so oder so ..."
 germany.93.d_FRA_abandoned_yugoslavia:0 "Wir erwarteten, dass die europäischen Großmächte im Namen des Friedens an einem Tisch sitzen und eine gerechte Einigung erzielen würden. Obwohl Frankreich die Gerechtigkeit unseres Falles erkannte, entschieden sich die törichten Briten, die aufstrebenden Jugoslawen und ihren künstlichen Staat zu unterstützen. Slowenien wird uns gehören, so oder so ..."
 germany.93.a:0 "Wir lassen uns nicht abweisen"
 germany.94.t:0 "Die Kapitulation Londons"
 germany.94.d:0 "In einem weiteren Triumph für Wagemut und Tatkraft wurde Slowenien, das bald in Krain umbenannt werden sollte, in seine rechtmäßige Heimat im Deutschen Reich zurückgebracht."
 germany.94.a:0 "Ein Triumph für Deutschland!"
 germany.95.t:0 "Die Jugoslawen weigern sich"
 germany.95.d:0 "In einem fehlgeleiteten Verständnis für ihren Platz in der Welt haben die Jugoslawen beschlossen, die Chance, die wir ihnen angeboten haben, nicht anzunehmen."
 germany.95.a:0 "Es ist Zeit, ihnen eine Lektion zu erteilen"
 germany.96.t:0 "Londoner Konferenz"
 germany.96.d:0 "Die Jugoslawen, angestachelt von den törichten Italienern, haben beschlossen, uns zu trotzen. Die undankbaren Italiener werden mit den Jugoslawen brennen. General Rommel versichert uns, dass sie beim letzten Mal geflohen sind und zweifellos wieder fliehen werden."
 germany.96.a:0 "Dieser Krieg wird nicht lange dauern"
 germany.97.t:0 "Londoner Konferenz"
 germany.97.d:0 "Die große Londoner Konferenz sollte eines der vielen Unrechte an Deutschland wiedergutmachen. Die Franzosen dürsten jedoch immer noch nach Rache und wollen Deutschland nur auf den Knien sehen. Sie unterstützten das Regime in Belgrad, obwohl unsere Sache gerecht war. Glauben sie ernsthaft, dass ihre leeren Drohungen uns etwas bedeuten?"
 germany.97.a:0 "Wir werden sie beide vernichten."
 germany.98.t:0 "Das Schicksal Jugoslawiens"
 germany.98_tt:0 "§YWenn Jugoslawien akzeptiert, wird Folgendes passieren:§!\n"
 germany.98.d:1 "Wir wussten immer, dass der aus dem Habsburgerreich hervorgegangene jugoslawische Staat ein künstliches Land war, dessen Existenz nicht von Dauer sein würde. Die unter der Oberfläche brodelnden ethnischen Ressentiments sind übergekocht, und der Staat zerfällt. Wir müssen eingreifen, um die Situation zu verbessern."
 germany.98.a:0 "Annexion ganz Jugoslawien."
 germany.98.b:0 "Machen Sie eine kroatische Puppe. Den Rest annektieren Sie."
 germany.98.c:0 "Machen Sie Puppen von Kroatien und Jugoslawien."
 germany.99.t:0 "Griechenland aufteilen"
 germany.99.d:0 "Als wir vorschlugen, die griechischen Grenzen neu zu ziehen, donnerte der italienische Botschafter, man werde das Römische Reich auf den Trümmern Griechenlands wieder aufbauen."
 germany.99.a:0 "Natürlich werden sie"
 germany.99.b:0 "Sorgen Sie dafür, dass die Züge pünktlich fahren"
 germany.100.t:0 "Griechenland aufteilen"
 germany.100.d:0 "Nach dem Zweiten Balkankrieg und dem Ersten Weltkrieg fielen Gebiete, die Bulgarien als sein Eigentum betrachtete, an Griechenland. Wenn wir dieses Unrecht wiedergutmachen, binden wir Bulgarien an uns. Doch wenn Bulgarien nicht stark genug ist, es selbst zu beanspruchen, ist es dann ein würdiger Verbündeter für uns?"
 germany.100.a:0 "Lasst uns Bulgarien an uns binden"
 germany.100.b:0 "Sie müssen sich unsere Freundschaft verdienen"
 germany.101.t:0 "Griechenland aufteilen"
 germany.101.d:0 "Der Mangel an geeigneten Verbündeten bringt Deutschland in eine ungünstige strategische Lage im östlichen Mittelmeerraum. Wir können dem jedoch abhelfen, indem wir von Griechenland Stützpunkte und Gebiete in der Umgebung fordern, um diese zu sichern."
 germany.101.a:0 "Sie müssen Stützpunkte an Deutschland übergeben"
 germany.101.b:0 "Wir sollten das langfristige Spiel spielen"
 germany.101_tt:0 "§YWenn Griechenland akzeptiert, wird Folgendes passieren:§!"
 germany.102.t:0 "Griechenland lehnt ab"
 germany.102.d:0 "Griechenland hat unsere Hilfe bei der Lösung seiner Grenzstreitigkeiten dummerweise abgelehnt."
 germany.102.a:0 "Sie müssen die Alternative erkannt haben"
 germany.103.t:0 "Griechenland lehnt ab"
 germany.103.d:0 "Griechenland hat unser großzügiges Angebot an Schutz und Hilfe abgelehnt"
 germany.103.a:0 "Wir müssen sie zur Vernunft bringen"
 germany.104.t:0 "Italien fordert Vichy-Territorium"
 germany.104.d_Savoy:0 "Die Italiener haben aufgrund unseres Sieges begonnen, Forderungen an Vichy-Frankreich zu stellen. Sie fordern die Grenzzone Savoyens, um Italien zu stärken. Doch darüber werden wir entscheiden."
 germany.104.d_Corsica:0 "Die Italiener fordern von Vichy die Insel Korsika als ihren Anteil an der Beute. Könnten wir sie ihnen gewähren?"
 germany.104.d_Savoy_Corsica:0 "Italien hat von Vichy die Übergabe Savoyens und Korsikas gefordert. Für Italien wäre dies ein Segen, die französischen Kolonialbehörden hingegen würden sich darüber Sorgen machen."
 germany.104.a:0 "Ich nehme an, sie können Savoy haben"
 germany.104.b:0 "Korsika ist alles, was sie wert sind"
 germany.104.c:0 "Lasst sie Savoy haben"
 germany.104.e:0 "Ein starker Verbündeter führt zu einem starken Deutschland"
 germany.104.f:0 "Sie brauchen mehr als ein paar tausend Tote"
 germany.105.t:0 "Italien verlässt [Root.GetFactionName]"
 germany.105.d:0 "Nach unserer Entscheidung, Italien keine Ländereien zu überlassen, haben sie sich entschieden, [Root.GetFactionName] zu verlassen, da wir für sie keine würdigen Verbündeten seien."
 germany.105.a:0 "Sie haben sowieso nie viel gekämpft"
 germany.106.t:0 "Vertrag von Craiova"
 germany.106_threat:0 "Vertrag von Craiova"
 germany.106.d_second_vienna_accepted_north:0 "Mit der Eroberung Nordsiebenbürgens durch Ungarn hat Bulgarien uns an den langjährigen Grenzstreit mit Rumänien um die südliche Dobrudscha erinnert, die Rumänien 1913 erobert hatte."
 germany.106.d_second_vienna_accepted_all:0 "Mit der Eroberung Siebenbürgens durch Ungarn erinnerte uns Bulgarien an den langjährigen Grenzstreit mit Rumänien um die südliche Dobrudscha, die Rumänien 1913 erobert hatte."
 germany.106.d_no_vienna:0 "Da sich die Beziehungen zu Ungarn abgekühlt haben und Ungarn sich für ein anderes Bündnis entschieden hat, kommt unser ursprünglicher Plan, ihnen einen Teil Siebenbürgens zu überlassen, nicht mehr in Frage. Stattdessen sollten wir uns mit dem bulgarischen Territorialstreit um die Süddobrudscha befassen, die 1913 von Rumänien erobert wurde."
 germany.106.a:0 "Lassen Sie sie die Süd-Dobrudscha fordern"
 germany.106.b:0 "Wir werden keine bulgarischen Forderungen unterstützen"
 germany.107.t:0 "Die Flucht von Rudolf Heß"
 germany.107.d:0 "Stellvertretender Führer Rudolf Heß wurde gestern in Schottland von Soldaten der britischen Heimatschutzbehörde verhaftet, nachdem er mit dem Fallschirm aus einem schweren Kampfflugzeug abgesprungen war. Als erfahrener Pilot flog er offenbar allein über die Nordsee und achtete darauf, außerhalb der Radarreichweite zu bleiben, bevor er westwärts Richtung Großbritannien abdrehte. Heß scheint es auf sich genommen zu haben, einen Friedensvertrag zwischen Großbritannien und Deutschland auszuhandeln, obwohl Berlin ihn als Verrückten denunziert und ihm alle politischen Ämter entzogen hat. Die britischen Behörden waren für eine Stellungnahme nicht erreichbar."
 germany.107.a:0 "Wahnsinn!"
 germany.108.t:0 "Der Tod von Rudolf Heß"
 germany.108.d:0 "Stellvertretender Führer Rudolf Heß kam gestern ums Leben, als die Royal Air Force seinen schweren Jäger vor der Küste Schottlands abfing. Der genaue Zweck seiner Mission bleibt unklar – obwohl Heß ein erfahrener Pilot war, flog er allein, und sein Flugzeug scheint unbewaffnet gewesen zu sein.\nSeine sterblichen Überreste wurden von den britischen Behörden geborgen, in Berlin ist jedoch ein Staatsbegräbnis mit leerem Sarg geplant. \n\nHitler soll sichtlich verzweifelt über den Tod seines alten Freundes gewesen sein."
 germany.108.a:0 "Dieser arme Narr."
 germany.109.d:0 "Das Luftschiff Hindenburg, das seit Beginn der Feindseligkeiten in Deutschland vor Anker lag, erlitt heute ein dramatisches Ende, als es über Schottland explodierte. Offenbar war es von Stellvertreter Rudolf Heß gekapert worden, der es im Alleingang über die Nordsee fliegen konnte, um in persönlicher Mission mit Großbritannien Frieden zu verhandeln.\nBritische Radarstationen konnten das gewaltige Flugzeug problemlos orten, und mehrere Geschwader der Royal Air Force wurden sofort auf seine Position angesetzt. Als die Hindenburg nicht über Funk antwortete, eröffneten sie das Feuer. \n\nHeß rettete sich mit dem Fallschirm und sitzt nun im Tower von London."
 germany.110.d:0 "Das Luftschiff Hindenburg, das seit Beginn der Feindseligkeiten in Deutschland vor Anker lag, erlitt heute ein dramatisches Ende, als es über Schottland explodierte. Offenbar war es von Stellvertreter Rudolf Heß gekapert worden, der es im Alleingang über die Nordsee fliegen konnte, um mit Großbritannien Frieden zu verhandeln. Britische Radarstationen konnten das gewaltige Flugzeug problemlos orten, und mehrere Geschwader der Royal Air Force wurden sofort auf seine Position angesetzt. Als die Hindenburg nicht über Funk reagierte, eröffneten sie das Feuer. Heß&#39; sterbliche Überreste wurden in den Trümmern gefunden."
 germany.110.a:0 "Dieser Verrückte ..."
 germany.111.t:0 "Jugoslawien weigert sich"
 germany.111.d:0 "Jugoslawien hat unser Angebot zur Lösung der Spannungen in der Region dummerweise abgelehnt."
 germany.111.a:0 "Sie haben uns zum Handeln gezwungen"
 germany.113.t:0 "Deutschland fordert offiziell Danzig an"
 germany.113.d:0 "Da [GER.GetNameDef] ihre militärische Unterstützung als unerlässlich für jeden zukünftigen Erfolg in unserem Bürgerkrieg betrachtet, hat es Pläne vorgelegt, um nach Beendigung der Feindseligkeiten die Kontrolle über Danzig zu erlangen. Es hat außerdem klargestellt, dass [Root.GetNameDef] aufgrund seiner Abhängigkeit von ihrer militärischen Unterstützung keine andere Wahl hat, als dieses „Danziger Abkommen“ zu unterzeichnen."
 germany.113.a:0 "[Root.GetName] muss jeweils einen Kampf annehmen."
 germany.114.t:0 "Deutsche Forderungen für Danzig"
 germany.114.d:0 "Nach unserem Sieg im [Root.GetAdjective] Bürgerkrieg hat uns Deutschland wiederholt an seine Forderung nach Danzig erinnert. Es hat uns auch daran erinnert, welche Folgen Ungehorsam für eine Nation haben kann, die sich noch immer von internen Konflikten erholt."
 germany.114.a:0 "Sie werden Danzig bekommen, wie vereinbart."
 germany.114.b:0 "Wir werden polnisches Land niemals aufgeben!"
 germany.115.t:0 "Polen tritt Danzig ab"
 germany.115.d:0 "Gemäß dem Danzig-Abkommen hat [GER.GetNameDef] der Übertragung der Kontrolle über Danzig an [GER.GetNameDef] zugestimmt."
 germany.115.a:0 "Dies hat sich als eine vorteilhafte Partnerschaft erwiesen."
 germany.116.t:0 "Polen bricht das Danziger Abkommen"
 germany.116.d:0 "[From.GetName] ignoriert die unschätzbare Unterstützung, die wir ihnen in ihrem Bürgerkrieg angeboten haben, und hat beschlossen, unsere Ansprüche auf Danzig zu ignorieren."
 germany.116.a:0 "Die Nichteinhaltung unserer Vereinbarung wird sie teuer zu stehen kommen."
 germany.116.b:0 "Wir können uns diesen Konflikt nicht leisten."
 germany.117.t:0 "Das Danziger Abkommen"
 germany.117.d:0 "[From.GetName] hat unserer Bitte um Danzig im Austausch für Unterstützung im Bürgerkrieg zugestimmt. Unsere Bitte und unser Versprechen wurden im Danziger Abkommen formalisiert. Nun müssen wir sicherstellen, dass [From.GetName] siegreich aus dem Konflikt hervorgeht."
 germany.117.a:0 "Auch das ist ein [Root.GetAdjective]-Kampf."
 germany.118.t:0 "Die Konferenz von Jalta"
 germany.118.d:2 "Da der Krieg in Europa immer weiter voranschreitet, ist es für die unvermeidlichen Sieger an der Zeit, über die Zukunft Europas nachzudenken.\n\nWir könnten [yalta_partner.GetNameDef] eine Konferenz über die Aufteilung von [GER.GetNameDef] nach dem Krieg vorschlagen, um unsere Einflusssphären auf dem Kontinent abzugrenzen.\n\nUnsere „Freunde“ in [yalta_partner.GetNameDef] haben angedeutet, dass sie an einer solchen Konferenz interessiert wären. Zweifellos erwarten sie eine Belohnung für ihre Opfer."
 germany.118.a:0 "Wir brauchen eine Konferenz zur Zukunft Europas."
 germany.118.b:0 "Wir können nicht mit [yalta_partner.GetNameDef] zusammenarbeiten."
 germany.119.t:0 "Die Konferenz von Jalta"
 germany.119.d:0 "Da der Krieg gegen [GER.GetNameDef] seinem unvermeidlichen Ende entgegengeht, hat [yalta_origin.GetNameDef] uns wegen einer Konferenz zur Zukunft Europas kontaktiert.\n\nSie schlagen eine Teilung von [GER.GetNameDef] in Ost und West vor. Dies würde unseren Einflussbereich weit nach Europa ausdehnen und einige der Verluste wettmachen, die wir in diesem grausamen Kampf erlitten haben."
 germany.119.a:0 "Für eine dauerhafte Zusammenarbeit."
 germany.119.b:0 "Wir werden unseren eigenen Frieden diktieren."
 germany.120.t:0 "[yalta_partner.GetNameDefCap] weigert sich, teilzunehmen"
 germany.120.d:0 "Unsere geplante Konferenz zur Zukunft Europas ist geplatzt.\n\n[yalta_partner.GetLeader] hat in aller Deutlichkeit jegliche Notwendigkeit von Planung und Zusammenarbeit im Nachkriegseuropa zurückgewiesen.\n\n„Wir werden uns treffen, wenn ich meine Forderungen an [GER.GetNameDef] am Verhandlungstisch vorbringe. Ich werde nicht zulassen, dass kleinliche Politik [yalta_partner.GetNameDef] im Weg steht.“"
 germany.120.a:0 "Das ist besorgniserregend."
 germany.121.t:0 "Die deutsche Teilung"
 germany.121.d:0 "Wie im Jalta-Abkommen festgelegt, soll Deutschland in zwei separate Staaten aufgeteilt werden, die jeweils in die Gewalt einer der Kriegsparteien fallen.\n\nHoffen wir, dass dies den Konflikten in Europa ein Ende setzt."
 germany.121.a:0 "Für Deutschland..."
 germany.122.t:0 "[From.GetNameDefCap] Fordert das Sudetenland"
 germany.122.d:0 "Mitten in dieser Situation forderte Deutschland von uns das Sudetenland, um die deutsche Bevölkerung in der Region zu „schützen“. \n\nDie aktuelle Situation hat deutlich gemacht, dass es damit vorbei ist. Es wird keine Verhandlungen oder diplomatische Mittel geben. Entweder sie bekommen das Sudetenland, oder sie werden darum Krieg führen."
 germany.122.a:0 "Sie können ihren Krieg führen, wenn sie sich trauen!"
 germany.122.b:0 "Wir können uns keinen Krieg mit [From.GetNameDef] leisten."
 germany.123.t:0 "[From.GetNameDefCap] Verweigert uns das Sudetenland"
 germany.123.d:0 "In einem törichten diplomatischen Schachzug hat [From.GetLeader], der Anführer der [From.GetAdjective]s, alle [Root.GetAdjective]-Forderungen abgelehnt!\n\nSie werden das Sudetenland nicht aufgeben und haben uns praktisch herausgefordert, den Krieg zu erklären, und sich über unseren Wunsch lustig gemacht, unsere [Root.GetAdjective]-Brüder und -Schwestern zu schützen."
 germany.123.a:0 "So sei es!"
 germany.124.t:0 "[From.GetNameDefCap] tritt das Sudetenland ab"
 germany.124.d:0 "Angesichts der Aussicht auf einen Krieg mit uns hat [From.GetNameDef] zugestimmt, die gesamte Kontrolle über das Sudetenland abzutreten und auf jeglichen zukünftigen Anspruch auf die Region zu verzichten.\n\nDie [Root.GetAdjective] Bevölkerung des Sudetenlandes wird endlich sicher in der Obhut der [Root.GetNameDef] sein."
 germany.124.a:0 "Für [Root.GetNameDef] und alle [Root.GetAdjective]s!"
 germany.126.t:0 "Anschluss oder Zerstörung"
 germany.126.warning:0 "§RKann zu Krieg führen§!\n"
 germany.126.d:0 "Es kam zu Unruhen und Gewaltausbrüchen, als Demonstranten ihren Wunsch nach einem Anschluss Österreichs an Deutschland äußerten. Die internen Konflikte, unter denen unser Land bereits leidet, verstärken den Wunsch nach einem Anschluss an Deutschland. Berlin drängt mit aller Kraft auf einen Anschluss, und dies könnte unsere einzige Chance sein, einen Teil der wahren österreichischen Werte am Leben zu erhalten."
 germany.126.a:0 "Wir werden dem Deutschen Reich beitreten!"
 germany.126.b:0 "Nein, Österreichs Schicksal liegt woanders."
 germany.127.t:0 "Formalisieren Sie die Allianz"
 germany.127.d:0 "Vereint in unserem Kampf gegen die Sowjetunion ist es vielleicht an der Zeit, das Bündnis zu formalisieren und unsere neuen Partner in diesem antikommunistischen Krieg in unsere Fraktion einzuladen."
 germany.127.a:0 "Wir werden Gesandte schicken."
 germany.127.b:0 "Wir haben ihnen gegenüber keine weiteren Verpflichtungen."
 germany.128.t:0 "Der Antisowjetpakt"
 germany.128.d:0 "[From.GetNameDefCap] hat angeboten, uns in seiner Fraktion willkommen zu heißen, damit wir uns besser gegen die kommunistische Bedrohung abstimmen können. Gesandte, die dieses Bündnis formalisieren sollen, sind bereits in der Hauptstadt eingetroffen."
 germany.128.a:0 "Das ist eine großartige Initiative."
 germany.128.b:0 "Unser Schicksal liegt in den Händen anderer."
 THREAT_FROM_EFFECT:0 "Bedrohung durch Aktionen"
 war_justification.1.t:0 "[Root.GetLeader] spricht sich gegen [From.GetName] aus"
 war_justification.1.d:1 "„Gehört [From.GetName] zu [From.GetAdjective]? Stellen wir uns eine bessere Frage: Gehört die Zukunft den [From.GetAdjective] oder gehört sie [Root.GetNameDef]?“\n\nDie heutige Rede von [Root.GetLeader] deutete darauf hin, dass [Root.GetName] auf dem Weg in den Krieg ist. Die politischen Spannungen haben sich im letzten Monat verschärft, und es scheint, als würde das Volk von [Root.GetAdjective] akzeptieren, dass Krieg unvermeidlich ist."
 war_justification.1.a:0 "Die Zukunft gehört [Root.GetName]!"
 war_justification.2.t:0 "[Root.GetLeader] prangert [From.GetAdjective] Ideale an"
 war_justification.2.d:1 "„Die [From.GetAdjective] behaupten, Freiheit und Demokratie zu haben, behaupten, Frieden zu wollen, doch all das, worauf sie stolz sind, ist hohl. Ihre Demokratie spaltet die Menschen, wo sie vereint sein sollten, und ihre Freiheit verrät nur einen Mangel an Disziplin. Wir [Root.GetAdjective] durchschauen diese Lügen … und wir erkennen, dass dieser Frieden, Frieden zu ihren Bedingungen, ebenfalls eine Lüge ist.“\n\n[Root.GetRulingParty] hat die Schwäche der [From.GetAdjective] Nation lange verspottet, doch in letzter Zeit ist die Rhetorik aggressiver geworden. Der Tag des bewaffneten Konflikts rückt näher."
 war_justification.2.a:0 "[Root.GetName] steht vereint unter [Root.GetLeader]."
 war_justification.3.t:0 "[Root.GetLeader] warnt vor [From.GetAdjective] Kommunismus"
 war_justification.3.d:1 "Gibt es eine größere Bedrohung für unsere Lebensweise oder gar die Lebensweise selbst als den Kommunismus? Diese Plage droht, die Sklaven, nicht die Herren, über jede Nation herrschen zu lassen, die Nation selbst abzuschaffen, die Menschen und ihre Geschichte abzuschaffen. Wir werden [From.GetName] nehmen und die kommunistische Plage abschaffen.\n\n[Root.GetLeader]s Hass auf Kommunisten war schon vor [Root.GetRulingParty]s Machtergreifung bekannt, scheint sich aber im konkreten Fall der [From.GetAdjective]-Regierung in letzter Zeit noch verstärkt zu haben. Unser Bestreben, den Marxismus von der Erde zu tilgen, könnte dort beginnen."
 war_justification.3.a:0 "Wer Nationen ablehnt, wird mit ansehen müssen, wie seine eigene Nation untergeht."
 war_justification.4.t:0 "[Root.GetName] bereitet sich auf einen großen Kampf vor"
 war_justification.4.d:1 "„Die [From.GetAdjective] sind ein Volk, das sich nicht so leicht von Macht trennen wird. Sie müssen jedoch auch erkennen, dass die Entwicklung unserer beiden Nationen nur in einem Zusammenstoß enden kann. Wir müssen uns für den bevorstehenden Kampf wappnen. Denn [From.GetName] wird nicht kampflos eingenommen werden.“\n\nDie Möglichkeit einer Verständigung zwischen den gleichgesinnten Regierungen von [From.GetName] und [Root.GetName] ist einer Kampagne gewichen, deren Territorium mit Gewalt einzunehmen."
 war_justification.4.a:0 "Durch unseren Sieg wird Geschichte geschrieben."
 war_justification.5.t:0 "[Root.GetLeader] bringt Revolution zu [From.GetName]"
 war_justification.5.d:0 "„Obwohl wir in [Root.GetName] die sozialistische Gesellschaft gefestigt haben, leiden viele Nationen noch immer unter den Despoten von einst. Die Arbeiter von [From.GetName] haben keine Stimme, keine Möglichkeit sich zu organisieren, und jeder Versuch, den Sozialismus einzuführen, wird vom [From.GetLeader]-Regime brutal niedergeschlagen. Wir können nicht darauf warten, dass sich die Räder der internationalen Revolution zum Wohle des [From.GetAdjective]-Volkes drehen. Mit der Revolution haben wir bewiesen, dass wir die kapitalistischen Unterdrücker hier vernichten können, und wir werden auch die Unterdrücker in [From.Capital.GetName] vernichten!“\n\n[Root.GetLeader] hat alle Versuche diplomatischer Rhetorik gegenüber dem von [From.GetRulingParty] kontrollierten [From.GetName] aufgegeben. Das Bestreben, alle Grenzen zu beseitigen, konzentriert sich nun strikt auf die Beseitigung ihrer Grenzen."
 war_justification.5.a:0 "[From.GetAdjective] Arbeiter, eure Befreiung ist nahe!"
 war_justification.6.t:0 "[Root.GetLeader] Hilferufe für [From.GetAdjective]-Arbeiter"
 war_justification.6.d:0 "Gibt es eine größere Lüge als die angebliche Freiheit des [From.GetAdjective]-Volkes? Einst schufteten sie unter Fürsten und Herzögen, die den Boden für sich beanspruchten, sind sie heute gezwungen, ihre Arbeitskraft an diejenigen zu verkaufen, die die Fabriken für sich beanspruchen. Ihre Freiheit, sich für einen Herrn oder einen anderen zu entscheiden, kann kaum als Freiheit bezeichnet werden. Ebenso ist ihre Freiheit, ihre Führer zu wählen, eine falsche Entscheidung, da Propaganda es den wahren Sozialisten niemals ermöglichen würde, die Macht zu übernehmen. Ein so gründlich indoktriniertes Volk kann nur durch eine [Root.GetAdjective]-Intervention gerettet werden.\n\n[Root.GetLeader] polemisiert seit langem auf Parteiversammlungen gegen die Regierung in [From.GetName], doch diese Rhetorik wird nun häufiger in der Öffentlichkeit verwendet. Es gibt wenig Grund zu der Annahme, dass dieser Konflikt friedlich gelöst werden könnte."
 war_justification.6.a:0 "Wir werden ihre bürgerliche Diktatur zerschlagen!"
 war_justification.7.t:0 "[From.GetAdjective] Der Kommunismus scheitert"
 war_justification.7.d:0 "Genossen, obwohl die größten Revolutionäre einst als Verräter bezeichnet wurden, ist es offensichtlich geworden, dass die Revolution selbst verraten wurde. Wie sonst lässt sich die Herrschaft der [From.GetRulingParty] von [From.GetName] erklären, die jeden Hauch marxistischer Ideen beiseite geschoben hat, um einen degenerierten Arbeiterstaat aufzubauen, in dem sie unter falschen Voraussetzungen regieren kann? Indem sie ihre eigene Macht auf Kosten der internationalen Revolution stärkt, haben sie gezeigt, dass ihnen die Ideale, die sie angeblich vertreten, wenig bedeuten. Wir müssen ihnen die wahre Revolution bringen.\n\nObwohl [Root.GetLeader] die [From.GetAdjective]-Revolution zunächst unterstützte, äußerte er zunehmend seine Enttäuschung über deren Entwicklung. Die [Root.GetRulingParty] muss möglicherweise eingreifen, bevor es zu spät ist."
 war_justification.7.a:0 "Es ist noch Zeit, ihren Versuch des Sozialismus zu retten."
 war_justification.8.t:0 "[Root.GetLeader] Rufe nach der Zerschlagung des [From.GetAdjective] Nationalismus"
 war_justification.8.d:0 "Gibt es eine Gesellschaft, die der Zukunft der Revolution mehr zuwider ist, die der Not der Arbeiter fremder ist als das faschistische Regime von [From.GetName]? Sie rufen das Volk dazu auf, sich fanatisch der maroden Institution des Nationalstaats zu verschreiben, und haben jahrhundertealte Brutalität in ein modernes Gewand gesteckt, um sich als Alternative zum unvermeidlichen internationalen Sieg der Arbeiterklasse darzustellen. Es ist nur eine Frage der Zeit, bis sie uns oder unsere Verbündeten angreifen. Lasst uns zuerst zuschlagen.\n\nNiemand hat weniger als gegenseitige Verachtung zwischen uns und dem [From.GetAdjective] erwartet, doch die Feindseligkeit hat sich in letzter Zeit verschärft. Es scheint, als würde der Konflikt eher früher als später ausbrechen."
 war_justification.8.a:0 "Tod den Faschisten!"
 war_justification.9.t:0 "Diplomatie mit [From.GetName] scheitert"
 war_justification.9.d:0 "„Trotz unserer Versuche, eine diplomatische Lösung für unseren Konflikt mit [From.GetName] zu finden, sind die Verhandlungen erneut gescheitert, sodass uns nur begrenzte Optionen bleiben. Das autoritäre [From.GetLeader]-Regime hat in dieser Angelegenheit die unvernünftige Haltung an den Tag gelegt, die typisch für Führer ist, die ihrem Volk gegenüber keine Rechenschaft ablegen. Sofern die [From.GetAdjective]-Führung ihre Politik nicht komplett ändert, bleibt uns nichts anderes übrig, als zu kämpfen.“\n\n[Root.GetAdjective]s Intervention in [From.GetName] war ein heißes Thema, und einige Oppositionspolitiker behaupten, [Root.GetRulingParty] habe von Anfang an eine aggressive Politik verfolgt. Was auch immer ihre ursprünglichen Absichten waren, ein zukünftiger Krieg scheint nun plötzlich sehr real und unvermeidlich."
 war_justification.9.a:0 "Manchmal muss man den Berg des Konflikts erklimmen."
 war_justification.10.t:0 "[Root.GetLeader] fordert Intervention in [From.GetName]"
 war_justification.10.d:0 "„Schweren Herzens müssen wir uns der Realität unserer Situation stellen: Eine Invasion von [From.GetName] könnte unsere einzige Möglichkeit sein. Der strategische Vorteil ist zu groß, um in unserer gegenwärtigen Situation eine andere Lösung zu versuchen. Obwohl wir darauf vertrauen, dass weder das [Root.GetAdjective] noch das [From.GetAdjective] Volk Krieg wollen, hat uns die Geschichte an diesen Punkt geführt und unsere Optionen sind begrenzt. Wir können nur hoffen, dass wir durch die Behauptung unserer militärischen Macht weiteres Blutvergießen in Zukunft vermeiden können.“\n\nObwohl es eine weit verbreitete Theorie ist, dass Demokratien nicht gegen andere Demokratien Krieg führen, deuten jüngste Entwicklungen auf eine [Root.GetAdjective] Invasion von [From.GetName] in der Zukunft hin. Die Geschichte könnte uns noch überraschen."
 war_justification.10.a:0 "[From.GetName] ist sowieso eine zweifelhafte Demokratie."
 war_justification.11.t:0 "[Root.GetLeader] spricht sich gegen die Rote Bedrohung aus"
 war_justification.11.d:0 "„Ohne Zweifel ist der [From.GetName]-Kommunismus eine der größten Bedrohungen für Freiheit und Ordnung in unserer Zeit. Unerbittlich und rücksichtslos droht er nicht nur die Hoffnung der [From.GetAdjective]-Bevölkerung auf eine wohlhabende, demokratische Gesellschaft zu zerstören, sondern auch die ihrer Nachbarn. Wenn wir jetzt nicht handeln, könnte dieser erste Dominostein zu spät fallen und weitere gescheiterte soziale Experimente hinterlassen. Wie viele müssen noch sterben, bevor wir eingreifen?“\n\nDie Bedrohung unserer Demokratie durch subversive Aktivitäten, die von [From.GetAdjective]-Ambitionen geschürt werden, ist in letzter Zeit zu einem heiß diskutierten Thema geworden. Während Oppositionsvertreter dies als „Rote Panik“ bezeichnen, die auf einen Krieg mit [From.GetName] abzielt, war die Rhetorik der [Root.GetRulingParty] bisher äußerst erfolgreich."
 war_justification.11.a:0 "Sie folgen einer gewalttätigen Ideologie. Welche Reaktion können sie außer Gewalt erwarten?"
 war_justification.12.t:0 "[Root.GetLeader] Konfrontiert [From.GetAdjective] den Faschismus"
 war_justification.12.d:0 "„In der modernen Geschichte, vielleicht sogar in der Geschichte insgesamt, gab es keine schlimmere Tyrannei als den eisernen Griff, in dem [From.GetRulingParty] [From.GetName] derzeit hält. Manche mögen argumentieren, wir sollten keine Konflikte provozieren, wir sollten darauf vertrauen, dass [From.GetLeader] auch in Zukunft Verträge und Versprechen einhält, aber diese Leute erkennen nicht, dass Verträge, die unter der Herrschaft des Faschismus geschlossen wurden, nutzlos sind. Für diese unehrenhaften Lügner gilt das Recht des Stärkeren, und das Papier, auf dem eine Vereinbarung geschrieben steht, verbrennt genauso leicht wie die Bücher ihrer Kritiker.“\n\nLeute, die lange gehofft hatten, eine direkte Konfrontation mit [From.GetName] vermeiden zu können, stoßen nun auf heftigen Widerstand von [Root.GetLeader], der argumentiert, wir würden, machiavellistisch gesprochen, den Krieg lediglich zum Vorteil des Feindes hinauszögern. Wenn es so weitergeht, könnten wir vielleicht doch noch den ersten Schlag führen."
 war_justification.12.a:0 "Es kann in unserer Zeit keinen Frieden geben, bis sie verschwunden sind."
 war_justification.13.t:0 "[Root.GetLeader] Ruft zum Krieg gegen [From.GetName] auf"
 war_justification.13.d:0 "„Auch wenn wir ein friedliches Volk sind, bestimmt unsere Natur nicht allein den Lauf der Geschichte. Dies ist eine Zeit des Krieges. Zu lange schon verfügten die [From.GetAdjective] über die Mittel, die wir brauchen, um die bevorstehenden Prüfungen zu überstehen, und es ist offensichtlich, dass sie sich nicht friedlich von ihnen trennen werden. Trotz unserer Bemühungen, einen modernen Staat aufzubauen, können manche Angelegenheiten nur durch die alten Prüfungen des Kampfes geklärt werden.“\n\n[Root.GetLeader]s feindselige Rhetorik gegenüber [From.GetName] hat sich große Mühe gegeben, eine Invasion zu rechtfertigen. Ein Teil der Bevölkerung unterstützt diesen Kurs, aber die Entscheidung liegt im Land unseres Anführers."
 war_justification.13.a:0 "Es mag eine schwierige Entscheidung sein, aber wir müssen dahinter stehen."
 war_justification.14.t:0 "[Root.GetLeader] Herausforderungen [From.GetAdjective] Ansprüche"
 war_justification.14.d:0 "„[From.GetName] mag sich für moderner und fortschrittlicher halten als wir, doch die Wahrheit ist, dass ihre Nation nicht so auf die Probe gestellt wurde wie unsere und sie auch nicht auf die Bedrohungen vorbereitet ist, die sich nun deutlich am Horizont abzeichnen. Durch ihre Verachtung uns gegenüber und indem sie uns daran hindern, uns das zu nehmen, was uns rechtmäßig zusteht, haben sie uns zu einer dieser Bedrohungen für sich selbst gemacht. Ihre schwache und gespaltene Nation wird unseren Ansprüchen kaum Widerstand leisten können.“\n\nDie lange von der [Root.GetRulingParty] vertretene spöttische Meinung über [From.GetName] hat sich von Kritik zu Feindseligkeit entwickelt. Obwohl die allgemeine Meinung ist, dass das [From.GetAdjective]-Volk Krieg vermeiden will, behauptet [Root.GetLeader], dass ihre gewählten Führer ihn durch ihre Arroganz provoziert haben."
 war_justification.14.a:0 "Sie wissen nicht, wie stark uns unsere Nöte gemacht haben."
 war_justification.15.t:0 "[Root.GetLeader] möchte die Ordnung in [From.GetName] wiederherstellen"
 war_justification.15.d:0 "„Der [Root.GetAdjective] Nationalgeist ist stark, doch nicht alle Nationen haben so viel Glück. [From.GetName]s Traditionen wurden zerstört und rechtmäßige Herrscher längst ermordet und begraben – alles im Namen der Idee der großen marxistischen Revolution. Es ist unsere Pflicht, die Ordnung in dieser von blutrünstigen Usurpatoren in die Irre geführten Welt wiederherzustellen und die Stärke von [Root.GetName] gegen diese Bedrohung zu behaupten.“\n\nObwohl die [Root.GetRulingParty] den Kommunismus stets abgelehnt hat, war [From.GetName] in ihren jüngsten Reden Ziel besonderer Angriffe. Unabhängig davon, ob der Angriff der Kommunisten auf die [Root.GetAdjective] Nation eine reale Bedrohung darstellt oder nicht, ist der Präventivschlag gegen den [From.GetAdjective] Kommunismus bereits in Vorbereitung."
 war_justification.15.a:0 "Die in der Revolution Ermordeten werden gerächt!"
 war_justification.16.t:0 "[Root.GetLeader] ruft [From.GetAdjective] Unterdrücker auf"
 war_justification.16.d:0 "Meine Gegner möchten Sie glauben machen, dass meine Herrschaft der der [From.GetRulingParty] in [From.GetName] gleicht. Sie liegen völlig falsch. Während [From.GetLeader]s Erfolge das Ergebnis einer neuen Modeerscheinung sind, einer destruktiven Massenbewegung, die andere Nationen zur Unterwerfung zwingen will, steht die [Root.GetRulingParty] dieser Bewegung als diejenige gegenüber, die sich nicht unterwerfen wird. Ich bin bereit, alles Notwendige zu tun, um diese Bedrohung zu beseitigen, selbst wenn es Krieg bedeutet.\n\nDas [Root.GetLeader]-Regime verfolgt eine feindselige Politik gegenüber der Nation [From.GetAdjective]. Wie auch immer unsere Führer genannt werden, Faschisten sind ein Wort, das unseren Feinden vorbehalten ist."
 war_justification.16.a:0 "Tradition und Pragmatismus werden immer über Fanatismus und Terror triumphieren."
 war_justification.17.t:0 "[Root.GetLeader] Fragen [From.GetAdjective] Souveränität"
 war_justification.17.d:0 "„Wer bestimmt die Grenzen einer Nation und wie werden sie festgelegt? Welche Wege auch immer die Menschen in der Vergangenheit gefunden haben, um zu rechtfertigen, wo [Root.GetName] endet und [From.GetName] beginnt, wir leben in einer neuen Ära. Die strategische Bedeutung dieser Grenze kann nicht hoch genug eingeschätzt werden, und wir haben das Recht, sie zu verschieben, um die Sicherheit unseres Volkes zu gewährleisten.“\n\nWenn man sich die jüngsten Reden von [Root.GetLeader] anhört, scheint eine Invasion von [From.GetName] unmittelbar bevorzustehen. Es gibt zwar Gegenstimmen, aber die öffentliche Unterstützung für einen Krieg nimmt zu."
 war_justification.17.a:0 "Wir müssen uns für diese Sache einsetzen!"
 war_justification.18.t:0 "[Root.GetLeader] hinterfragt die Motive von [From.GetName]"
 war_justification.18.d:0 "Es besteht kein Zweifel, dass [From.GetName] sich auf einen Krieg vorbereitet. Die Veränderungen in der Wirtschaftspolitik zeigen deutlich, dass die [From.GetAdjective] kein Volk des Friedens sind, sondern nur auf die richtige Gelegenheit warten, um uns zu schlagen. Werden wir tatenlos zusehen, wie sie sich aufrüsten, während [Root.GetName] schutzlos dasteht? Oder werden wir diese Bedrohung entschärfen, bevor sie unsere Macht übersteigt?\n\nDie Falken in der [Root.GetRulingParty] haben ihre Aufmerksamkeit auf [From.GetName] gerichtet und argumentieren, dass Angriff die beste Verteidigung sei. Ihre Sichtweise gewinnt an Boden, und [Root.GetName] bereitet sich auf einen Krieg vor."
 war_justification.18.a:0 "Zumindest durch Krieg wird dieser Konflikt beendet werden."
 war_justification.19.t:0 "[Root.GetLeader] Verärgert über [From.GetAdjective] Getue"
 war_justification.19.d:0 "„Die naiven Bürger von [Root.GetName], die sich [From.GetAdjective] als ein Volk des Friedens vorstellen, haben den Bezug zur Realität völlig verloren. Diejenigen, die an unserer Grenze leben, können sich solche Wahnvorstellungen nicht leisten, da sie sehen, wie ihre Truppen direkt auf der anderen Seite der Grenze auf uns zukommen. Diese Bedrohung können wir nicht unbeantwortet lassen. Mit jedem Tag bereitet sich [From.GetName] auf einen Krieg vor. Es wäre Wahnsinn, wenn wir nicht dasselbe täten.“\n\nDie [From.GetAdjective]-Militärpräsenz in der Nähe unseres Territoriums hat zunehmende Besorgnis ausgelöst, da diese Nation immer mehr zum Feind der [Root.GetRulingParty] wird. Ob sie Ursache oder Folge ihrer Polemik ist, ist umstritten."
 war_justification.19.a:0 "Unabhängig davon müssen wir die Bevölkerung auf den Krieg vorbereiten."
 war_justification.20.t:0 "[Root.GetLeader] befürwortet Invasion von [From.GetName]"
 war_justification.20.d:0 "„Wenn wir im absehbaren, wenn nicht gar unvermeidlichen Krieg mit [From.GetName] einen strategischen Vorteil haben wollen, dürfen wir nicht zögern. Es geht darum, die Zukunft unserer Kinder zu sichern und sicherzustellen, dass [Root.GetName] auch morgen noch einen Platz in der Welt hat. Es geht um Hingabe an unsere Sache und die Ideale, die wir für selbstverständlich halten. Es ist Zeit zu handeln.“\n\nEine Reihe mitreißender Reden von Anführern der [Root.GetRulingParty], allen voran [Root.GetLeader], riefen die Öffentlichkeit dazu auf, eine Invasion von [From.GetName] zu unterstützen. Die geopolitischen Motive hinter der Invasion spielen in der Rhetorik weniger eine Rolle als patriotische Gefühle, aber diese Kampagne scheint die Öffentlichkeit sehr effektiv von ihrer Notwendigkeit zu überzeugen."
 war_justification.20.a:0 "Die Nation steht hinter dieser wichtigen Entscheidung."
 war_justification.201.t:0 "[From.GetLeader] spricht sich gegen [Root.GetName] aus"
 war_justification.201.d:1 "„Gehört [Root.GetName] zu [Root.GetAdjective]? Stellen wir uns eine bessere Frage: Gehört die Zukunft den [Root.GetAdjective] oder gehört sie [From.GetName]?“\n\nDie heutige Rede von [From.GetLeader] deutete an, dass [From.GetName] auf dem Weg in den Krieg ist. Die politischen Spannungen haben sich im letzten Monat aufgebaut, und es scheint, als hätte das Volk von [From.GetAdjective] akzeptiert, dass Krieg unvermeidlich ist. [Root.GetName] muss sich ebenfalls vorbereiten."
 war_justification.201.a:0 "Warum darf man uns nicht erlauben, in Frieden zu leben?"
 war_justification.202.t:0 "[From.GetLeader] prangert [Root.GetAdjective] Ideale an"
 war_justification.202.d:1 "„Die [Root.GetAdjective] behaupten, Freiheit und Demokratie zu haben, behaupten, Frieden zu wollen, doch all das, worauf sie stolz sind, ist hohl. Ihre Demokratie spaltet die Menschen, wo sie vereint sein sollten, und ihre Freiheit verrät nur einen Mangel an Disziplin. Wir [From.GetAdjective] durchschauen diese Lügen … und wir erkennen, dass auch dieser Frieden, Frieden zu ihren Bedingungen, eine Lüge ist.“\n\n[From.GetRulingParty] hat lange die Schwäche der [Root.GetAdjective] Nation verspottet, doch in letzter Zeit ist die Rhetorik aggressiver geworden. Der Tag des bewaffneten Konflikts rückt näher."
 war_justification.202.a:0 "Wie von faschistischem Abschaum wie [From.GetLeader] erwartet."
 war_justification.203.t:0 "[From.GetLeader] warnt vor [Root.GetAdjective] Kommunismus"
 war_justification.203.d:1 "Gibt es eine größere Bedrohung für unsere Lebensweise oder gar die Lebensweise selbst als den Kommunismus? Diese Plage droht, die Sklaven, nicht die Herren, über jede Nation herrschen zu lassen, die Nation selbst abzuschaffen, die Menschen und ihre Geschichte abzuschaffen. Wir werden [From.GetName] nehmen und die kommunistische Plage abschaffen.\n\n[From.GetLeader]s Hass auf Kommunisten war schon vor [From.GetRulingParty]s Machtergreifung bekannt, scheint sich aber in letzter Zeit im konkreten Fall der [Root.GetAdjective]-Regierung noch verstärkt zu haben. Unser Bestreben, den Marxismus von der Erde zu tilgen, könnte dort beginnen."
 war_justification.203.a:0 "Wenn sie unsere Sache fürchten, fürchten sie ihr eigenes Volk."
 war_justification.204.t:0 "[From.GetName] bereitet sich auf großen Kampf vor"
 war_justification.204.d:1 "„Die [Root.GetAdjective] sind ein Volk, das sich nicht so leicht von Macht trennen wird. Sie müssen jedoch auch erkennen, dass die Entwicklung unserer beiden Nationen nur in einem Zusammenstoß enden kann. Wir müssen uns für den bevorstehenden Kampf wappnen. Denn [Root.GetName] wird nicht kampflos eingenommen werden.“\n\nDie Möglichkeit einer Verständigung zwischen den gleichgesinnten Regierungen von [Root.GetName] und [From.GetName] ist einer Kampagne gewichen, deren Territorium mit Gewalt einzunehmen."
 war_justification.204.a:0 "Lasst sie kommen!"
 war_justification.205.t:0 "[From.GetLeader] Bring Revolution zu [Root.GetName]"
 war_justification.205.d:0 "„Obwohl wir in [From.GetName] die sozialistische Gesellschaft gefestigt haben, leiden viele Nationen noch immer unter den Despoten von einst. Die Arbeiter von [Root.GetName] haben keine Stimme, keine Möglichkeit, sich zu organisieren, und jeder Versuch, den Sozialismus einzuführen, wird vom [Root.GetLeader]-Regime brutal niedergeschlagen. Wir können nicht warten, bis sich die Räder der internationalen Revolution zum Wohle des [Root.GetAdjective]-Volkes drehen. Wir haben bewiesen, dass wir die kapitalistischen Unterdrücker hier zerschlagen können, und wir werden auch die Unterdrücker in [Root.Capital.GetName] zerschlagen!“\n\n[From.GetLeader] hat alle diplomatischen Versuche mit unserer Regierung aufgegeben. Die kommunistische Aufgabe, alle Grenzen zu beseitigen, konzentriert sich nun strikt auf die Beseitigung unserer Grenzen."
 war_justification.205.a:0 "[Root.GetLeader] ist ein besserer Herrscher als jeder revolutionäre Opportunist!"
 war_justification.206.t:0 "[From.GetLeader] Hilferufe für [Root.GetAdjective]-Arbeiter"
 war_justification.206.d:0 "Gibt es eine größere Lüge als die angebliche Freiheit des [Root.GetAdjective] Volkes? Einst schufteten sie unter Fürsten und Herzögen, die den Boden für sich beanspruchten, sind heute gezwungen, ihre Arbeitskraft an diejenigen zu verkaufen, die die Fabriken für sich beanspruchen. Ihre Freiheit, sich für einen Herrn oder einen anderen zu entscheiden, kann kaum als Freiheit bezeichnet werden. Ebenso ist ihre Freiheit, ihre Führer zu wählen, eine falsche Entscheidung, da Propaganda niemals zulassen würde, dass wahre Sozialisten die Macht übernehmen. Ein so gründlich indoktriniertes Volk kann nur durch eine [From.GetAdjective] Intervention gerettet werden.\n\nDas kommunistische Regime in [From.GetName] will nicht akzeptieren, dass unser Volk ohne seine sozialen Experimente zufrieden sein könnte, und hat offen mit einem Angriff auf unsere Nation gedroht. Es gibt wenig Grund zu der Annahme, dass dieser Konflikt friedlich gelöst werden könnte."
 war_justification.206.a:0 "Welchen Wert haben ihre Überzeugungen, wenn sie sie uns aufzwingen müssen?"
 war_justification.207.t:0 "[Root.GetAdjective] Der Kommunismus scheitert"
 war_justification.207.d:0 "Genossen, obwohl die größten Revolutionäre einst als Verräter bezeichnet wurden, ist es offensichtlich geworden, dass die Revolution selbst verraten wurde. Wie sonst ließe sich die Herrschaft der [Root.GetRulingParty] von [Root.GetName] erklären, die jeden Hauch marxistischer Ideen beiseite geschoben hat, um einen degenerierten Arbeiterstaat aufzubauen, in dem sie unter falschen Voraussetzungen regieren kann? Indem sie ihre eigene Macht auf Kosten der internationalen Revolution stärkten, haben sie gezeigt, dass ihnen die Ideale, die sie zu vertreten vorgeben, wenig bedeuten. Wir müssen ihnen die wahre Revolution bringen.\n\nObwohl [From.GetLeader] anfangs [Root.GetRulingParty]s Sieg in [Root.Capital.GetName] unterstützte, hat er sich von [Root.GetLeader]s Philosophie entfernt. Der Konflikt ist so weit eskaliert, dass sie eine Invasion vorbereiten, um uns ihre Version des Sozialismus aufzuzwingen."
 war_justification.207.a:0 "Sie verstehen nicht, was die Revolution für das [Root.GetAdjective] Volk bedeutet."
 war_justification.208.t:0 "[From.GetLeader] Rufe nach der Zerschlagung des [Root.GetAdjective]-Nationalismus"
 war_justification.208.d:0 "Gibt es eine Gesellschaft, die der Zukunft der Revolution mehr zuwider ist, die der Not der Arbeiter fremder ist als das faschistische Regime von [Root.GetName]? Sie rufen das Volk dazu auf, sich fanatisch der maroden Institution des Nationalstaats zu verschreiben, und haben jahrhundertealte Brutalität in ein modernes Gewand gesteckt, um sich als Alternative zum unvermeidlichen internationalen Sieg der Arbeiterklasse darzustellen. Es ist nur eine Frage der Zeit, bis sie uns oder unsere Verbündeten angreifen. Lasst uns zuerst zuschlagen.\n\nNiemand hat weniger als gegenseitige Verachtung zwischen uns und den [Root.GetAdjective] erwartet, doch die Feindseligkeit hat sich in letzter Zeit verschärft. Wenn man [From.GetLeader] sprechen hört, scheint es, als würde der Konflikt eher früher als später ausbrechen."
 war_justification.208.a:0 "Tod den Kommunisten!"
 war_justification.209.t:0 "Diplomatie mit [Root.GetName] scheitert"
 war_justification.209.d:0 "„Trotz unserer Versuche, eine diplomatische Lösung für unseren Konflikt mit [Root.GetName] zu finden, sind die Verhandlungen erneut gescheitert, sodass uns nur begrenzte Optionen bleiben. Das autoritäre [Root.GetLeader]-Regime hat in dieser Angelegenheit die unvernünftige Haltung an den Tag gelegt, die typisch für Führer ist, die ihrem Volk gegenüber keine Rechenschaft ablegen. Sofern die [Root.GetAdjective]-Führung ihre Politik nicht komplett ändert, bleibt uns nichts anderes übrig, als zu kämpfen.“\n\n[From.GetAdjective]s Einmischung in unsere inneren Angelegenheiten ist ein heißes Thema, und einige Politiker der Opposition behaupten, [From.GetRulingParty] habe von Anfang an eine aggressive Politik verfolgt. Was auch immer ihre ursprünglichen Absichten waren, ein zukünftiger Krieg scheint nun plötzlich sehr real und unvermeidlich."
 war_justification.209.a:0 "Ihre herablassende Rhetorik wird uns nicht einschüchtern."
 war_justification.210.t:0 "[From.GetLeader] Ruft nach Intervention in [Root.GetName]"
 war_justification.210.d:0 "„Schweren Herzens müssen wir uns der Realität unserer Situation stellen: Eine Invasion von [Root.GetName] könnte unsere einzige Möglichkeit sein. Der strategische Vorteil ist zu groß, um in unserer aktuellen Situation eine andere Lösung zu versuchen. Obwohl wir darauf vertrauen, dass weder das [From.GetAdjective] noch das [Root.GetAdjective] Volk Krieg wollen, hat uns die Geschichte an diesen Punkt geführt und unsere Optionen sind begrenzt. Wir können nur hoffen, dass wir durch die Behauptung unserer militärischen Macht weiteres Blutvergießen in Zukunft vermeiden können.“\n\nObwohl es eine weit verbreitete Theorie ist, dass Demokratien nicht gegen andere Demokratien Krieg führen, deuten jüngste Entwicklungen auf eine [From.GetAdjective] Invasion von [Root.GetName] in der Zukunft hin. Die Geschichte könnte uns noch überraschen."
 war_justification.210.a:0 "[From.GetName] ist ohnehin eine zweifelhafte Demokratie, die solch aggressive Maßnahmen ergreift."
 war_justification.211.t:0 "[From.GetLeader] spricht sich gegen die Rote Bedrohung aus"
 war_justification.211.d:0 "„Ohne Zweifel ist der [Root.GetName]-Kommunismus eine der größten Bedrohungen für Freiheit und Ordnung in unserer Zeit. Unerbittlich und rücksichtslos droht er nicht nur die Hoffnung der [Root.GetAdjective] Menschen auf eine wohlhabende, demokratische Gesellschaft zu zerstören, sondern auch die ihrer Nachbarn. Wenn wir jetzt nicht handeln, könnte dieser erste Dominostein zu spät fallen und weitere gescheiterte soziale Experimente hinterlassen. Wie viele müssen noch sterben, bevor wir eingreifen?“\n\nDie aufkeimende Arbeiterbewegung hat die [From.GetAdjective]-Führung eingeschüchtert. Während Vertreter der Opposition dies als „Rote Angst“ bezeichneten, die darauf abzielt, Krieg mit uns zu führen, war die Rhetorik der [From.GetRulingParty] bisher äußerst erfolgreich."
 war_justification.211.a:0 "Solange es Profit zu machen gibt, werden die Kapitalisten einen Krieg inszenieren."
 war_justification.212.t:0 "[From.GetLeader] Konfrontiert [Root.GetAdjective] den Faschismus"
 war_justification.212.d:0 "„In der modernen Geschichte, vielleicht sogar in der Geschichte insgesamt, gab es keine schlimmere Tyrannei als den eisernen Griff, in dem [Root.GetRulingParty] [Root.GetName] derzeit hält. Man mag argumentieren, wir sollten keine Konflikte provozieren, wir sollten darauf vertrauen, dass [Root.GetLeader] Verträge und Versprechen auch in Zukunft einhält, aber diese Leute erkennen nicht, dass Verträge, die unter der Herrschaft des Faschismus geschlossen wurden, nutzlos sind. Für diese unehrenhaften Lügner gilt das Recht des Stärkeren, und das Papier, auf dem eine Vereinbarung geschrieben steht, verbrennt genauso leicht wie die Bücher ihrer Kritiker.“\n\nNeidisch auf die glorreiche Gesellschaft, die wir aufbauen, und auf das Erbe, auf dem sie gründet, scheinen die [From.GetAdjective] bereit, einen Krieg zu beginnen, um sie zu zerstören. So viel zu ihren Friedensansprüchen."
 war_justification.212.a:0 "Unvermeidlich. Besser, es hinter sich zu bringen."
 war_justification.213.t:0 "[From.GetLeader] Ruft zum Krieg gegen [Root.GetName] auf"
 war_justification.213.d:0 "„Auch wenn wir ein friedliches Volk sind, bestimmt unsere Natur nicht allein den Lauf der Geschichte. Dies ist eine Zeit des Krieges. Viel zu lange verfügten die [Root.GetAdjective] über die Mittel, die wir brauchen, um die bevorstehenden Prüfungen zu überstehen, und es ist offensichtlich, dass sie sich nicht friedlich von ihnen trennen werden. Trotz unserer Bemühungen, einen modernen Staat aufzubauen, können manche Angelegenheiten nur durch die alten Prüfungen des Kampfes geklärt werden.“\n\nIn einer kürzlichen Rede an das [From.GetAdjective]-Volk verschärfte sich die feindselige Rhetorik gegenüber [Root.GetName], und [From.GetLeader] bemühte sich nach Kräften, eine Invasion zu rechtfertigen. Ein Teil der Bevölkerung unterstützt diesen Kurs, aber die Entscheidung liegt im Land ihres Anführers."
 war_justification.213.a:0 "Sie werden es bereuen, uns zu ihren Feinden gemacht zu haben."
 war_justification.214.t:0 "[From.GetLeader] Herausforderungen [Root.GetAdjective] Ansprüche"
 war_justification.214.d:0 "„[Root.GetName] mag sich für moderner und fortschrittlicher halten als wir, doch die Wahrheit ist, dass ihre Nation nicht so auf die Probe gestellt wurde wie unsere und sie auch nicht auf die Bedrohungen vorbereitet ist, die sich nun deutlich am Horizont abzeichnen. Durch ihre Verachtung uns gegenüber und indem sie uns daran hindern, uns das zu nehmen, was uns rechtmäßig zusteht, haben sie uns zu einer dieser Bedrohungen für sich selbst gemacht. Ihre schwache und gespaltene Nation wird unseren Ansprüchen kaum Widerstand leisten können.“\n\nDie lange von der [From.GetRulingParty] vertretene spöttische Meinung über [Root.GetName] hat sich von Kritik zu Feindseligkeit entwickelt. Obwohl die allgemeine Meinung ist, dass das [Root.GetAdjective]-Volk Krieg vermeiden will, behauptet [From.GetLeader], dass unsere gewählten Führer ihn durch ihre Arroganz provoziert haben."
 war_justification.214.a:0 "Die Stimmen für den Frieden unter den [From.GetAdjective]-Leuten werden natürlich zum Schweigen gebracht."
 war_justification.215.t:0 "[From.GetLeader] möchte die Ordnung in [Root.GetName] wiederherstellen"
 war_justification.215.d:0 "„Der [From.GetAdjective] Nationalgeist ist stark, doch nicht alle Nationen haben so viel Glück. [Root.GetName]s Traditionen wurden zerstört und rechtmäßige Herrscher längst ermordet und begraben – alles im Namen der Idee der großen marxistischen Revolution. Es ist unsere Pflicht, die Ordnung in dieser von blutrünstigen Usurpatoren in die Irre geführten Welt wiederherzustellen und die Stärke von [From.GetName] gegen diese Bedrohung zu behaupten.“\n\nObwohl die [From.GetRulingParty] den Kommunismus stets abgelehnt hat, war [Root.GetName] in ihren jüngsten Reden Ziel besonderer Angriffe. Aus Angst vor dem unvermeidlichen Fortschreiten ihrer Nation in die nächste Phase der Geschichte ist ein Präventivschlag gegen den [Root.GetAdjective] Kommunismus bereits in Vorbereitung."
 war_justification.215.a:0 "Es ist zu spät, die Fortschritte, die wir gemacht haben, rückgängig zu machen."
 war_justification.216.t:0 "[From.GetLeader] ruft [Root.GetAdjective] Unterdrücker auf"
 war_justification.216.d:0 "Meine Gegner möchten Sie glauben machen, dass meine Herrschaft der der [Root.GetRulingParty] in [Root.GetName] gleicht. Doch sie liegen völlig falsch. Während [Root.GetLeader]s Erfolge das Ergebnis einer neuen Modeerscheinung sind, einer destruktiven Massenbewegung, die andere Nationen zur Unterwerfung zwingen will, steht die [From.GetRulingParty] dieser Bewegung als diejenigen gegenüber, die sich nicht unterwerfen werden. Ich bin bereit, alles Notwendige zu tun, um diese Bedrohung zu beseitigen, selbst wenn es Krieg bedeutet.\n\nDas [From.GetLeader]-Regime verfolgt eine feindselige Politik gegenüber der [Root.GetAdjective]-Nation. Unsere visionären Pläne für zukünftige Größe haben ihre Nation beschämt, und es überrascht nicht, dass sie sich bedroht fühlt."
 war_justification.216.a:0 "Wenn sie unsere Macht auf die Probe stellen wollen, werden sie es bereuen."
 war_justification.217.t:0 "[From.GetLeader] Fragen [Root.GetAdjective] Souveränität"
 war_justification.217.d:0 "„Wer bestimmt die Grenzen einer Nation und wie werden sie festgelegt? Welche Wege auch immer die Menschen in der Vergangenheit gefunden haben, um zu rechtfertigen, wo [From.GetName] endet und [Root.GetName] beginnt, wir leben in einer neuen Ära. Die strategische Bedeutung dieser Grenze kann nicht hoch genug eingeschätzt werden, und wir haben das Recht, sie zu verschieben, um die Sicherheit unseres Volkes zu gewährleisten.“\n\nWenn man sich die jüngsten Reden von [From.GetLeader] anhört, scheint eine Invasion von [Root.GetName] unmittelbar bevorzustehen. Es gibt zwar Gegenstimmen, aber die öffentliche Unterstützung für einen Krieg nimmt zu."
 war_justification.217.a:0 "Hat die Welt nichts aus dem Ersten Weltkrieg gelernt?"
 war_justification.218.t:0 "[From.GetLeader] hinterfragt die Motive von [Root.GetName]"
 war_justification.218.d:0 "Es besteht kein Zweifel, dass [Root.GetName] sich auf einen Krieg vorbereitet. Die Veränderungen in der Wirtschaftspolitik zeigen deutlich, dass die [Root.GetAdjective] kein Volk des Friedens sind, sondern nur auf die richtige Gelegenheit warten, um uns zu schlagen. Werden wir tatenlos zusehen, wie sie sich aufrüsten, während [From.GetName] schutzlos dasteht? Oder werden wir diese Bedrohung entschärfen, bevor sie unsere Macht übersteigt?\n\nDie Falken in der [From.GetRulingParty] haben ihre Aufmerksamkeit auf [Root.GetName] gerichtet und argumentieren, dass Angriff die beste Verteidigung sei. Ihre Sichtweise gewinnt an Boden, und [From.GetName] bereitet sich auf einen Krieg vor."
 war_justification.218.a:0 "Genau deshalb müssen wir bereit sein."
 war_justification.219.t:0 "[From.GetLeader] Verärgert über [Root.GetAdjective] Getue"
 war_justification.219.d:0 "„Die naiven Bürger von [From.GetName], die sich [Root.GetAdjective] als ein friedliches Volk vorstellen, haben den Bezug zur Realität völlig verloren. Diejenigen, die an unserer Grenze leben, können sich solche Wahnvorstellungen nicht leisten, da sie sehen, wie ihre Truppen direkt auf der anderen Seite der Grenze auf uns zukommen. Diese Bedrohung können wir nicht unbeantwortet lassen. Mit jedem Tag bereitet sich [Root.GetName] auf einen Krieg vor. Es wäre Wahnsinn, wenn wir es nicht auch täten.“\n\nUnsere militärische Präsenz in der Nähe von [From.GetAdjective]-Gebiet hat zunehmende Besorgnis ausgelöst, da sie unsere Truppenbewegungen als Beweis feindlicher Absichten interpretieren. Sie scheinen kaum bedacht zu haben, dass ihre aggressive Rhetorik der Grund für unsere Verteidigungsmaßnahmen ist."
 war_justification.219.a:0 "Nach diesen Drohungen können wir kaum abrüsten."
 war_justification.220.t:0 "[From.GetLeader] befürwortet Invasion von [Root.GetName]"
 war_justification.220.d:0 "„Wenn wir im absehbaren, wenn nicht gar unvermeidlichen Krieg mit [Root.GetName] einen strategischen Vorteil haben wollen, dürfen wir nicht zögern. Es geht darum, die Zukunft unserer Kinder zu sichern und sicherzustellen, dass [From.GetName] auch morgen noch einen Platz in der Welt hat. Es geht um Hingabe an unsere Sache und die Ideale, die wir für selbstverständlich halten. Es ist Zeit zu handeln.“\n\nEine Reihe mitreißender Reden von Anführern der [From.GetRulingParty], allen voran [From.GetLeader], riefen die Öffentlichkeit dazu auf, eine Invasion von [Root.GetName] zu unterstützen. Die geopolitischen Motive hinter der Invasion spielen in der Rhetorik weniger eine Rolle als patriotische Gefühle, aber diese Kampagne scheint die Öffentlichkeit sehr effektiv von ihrer Notwendigkeit zu überzeugen."
 war_justification.220.a:0 "Wir sollten uns besser vorbereiten. Der Krieg wird kommen."
 war_justification.301.t:0 "[Root.GetLeader] Kritik an schwacher Außenpolitik"
 war_justification.301.d:0 "„Wir hatten die Chance, unsere Feinde anzugreifen, aber die [Root.GetRulingParty] hat sie verstreichen lassen. Dies ist nicht nur ein weiterer vernichtender Fall in einer Reihe verpasster Gelegenheiten, die Position von [Root.GetName] international zu stärken, sondern auch ein Zeichen dafür, dass ihre Behauptung, im Interesse des [Root.GetAdjective] Volkes zu handeln, größtenteils leere Rhetorik ist. Es ist Zeit für einen Politikwechsel.“\n\nUnser Versäumnis, den von vielen erwarteten Krieg zu führen, wurde von unseren politischen Gegnern scharf kritisiert. Wenn wir unsere militärischen Pläne nicht umsetzen, wird es für uns schwieriger, die Bevölkerung von der Richtung zu überzeugen, in die wir [Root.GetName] führen."
 war_justification.301.a:0 "Wollen sie nicht einen Krieg vermeiden?"
 war_justification.301.b:0 "Außerhalb der Parteiversammlungen gibt es keinen Raum für öffentliche Meinungsverschiedenheiten."
 war_justification.301.c:0 "Wir können nicht zulassen, dass Leute [Root.GetLeader] der Feigheit bezichtigen!"
 nuke_dropped.1.t:0 "Atombombenabwurf auf [From.From.GetName]"
 nuke_dropped.1.d:0 "Zum ersten und hoffentlich letzten Mal in der Geschichte wurde in [From.From.GetName] im Rahmen eines internationalen Krieges eine Atombombe gezündet. Die beispiellose Zerstörung zeugt von der verheerenden Kraft dieser neuen Waffe, die nicht nur wegen ihrer Auswirkungen auf ihre Ziele, sondern auch wegen ihrer Folgen für ihren Anwender und die Menschheit selbst gefürchtet wird.\n\nDie Welt hält den Atem an und wartet gespannt auf das, was als Nächstes passieren wird. Wird dies [From.From.Owner.GetName] zur Kapitulation zwingen, um weiteren Terror zu verhindern, oder wird es sie nur in ihrem Entschluss bestärken, gegen diejenigen zurückzuschlagen, die zu solchen Mitteln greifen würden?"
 nuke_dropped.1.a:0 "Das Atomzeitalter hat wirklich begonnen."
 nuke_dropped.1.b:0 "Wir werden alles Notwendige tun, um die [Root.GetAdjective]-Menschen zu schützen."
 nuke_dropped.2.t:0 "Atombombenabwurf auf Hiroshima"
 nuke_dropped.2.d:0 "„Die Straßen glichen einer Höllenszene.“\n – Kuniyoshi Aikawa\n\nHeute wurde über der Stadt Hiroshima in 580 Metern Höhe eine Atombombe detoniert. Mehr als zwei Drittel der Stadt wurden sofort zerstört. Obwohl die Stadt erdbebensicher gebaut ist, überstanden nur wenige stabile Gebäude die Explosion.\n\nWährend die Macht der Atombombe in der Öffentlichkeit hochgespielt wird, wird der menschliche Verlust durch die Waffe heruntergespielt. Keine Seite möchte sich den Schrecken des Ereignisses vor Augen führen, doch sein Vermächtnis wird der Verlust von Menschenleben im Handumdrehen und die anhaltenden Folgen sein."
 nuke_dropped.2.a:0 "Wie viele werden noch fallen, bevor dieser Krieg endet?"
 nuke_dropped.2.b:0 "Wir müssen schnell handeln, um den Opfern zu helfen."
 nuke_dropped.3.t:0 "Atombombenabwurf auf Nagasaki"
 nuke_dropped.3.d:0 "Eine ursprünglich für Kokura vorgesehene Atombombe wurde heute über Nagasaki gezündet. Wetterbedingt mussten die Flugzeuge ihren Einsatz ändern. Rauch, Wolken und technische Schwierigkeiten waren ausschlaggebend für dieses Ereignis, das möglicherweise die Geschichte verändern könnte.\n\nDie Auswirkungen der Bombe konnten durch die Lage der Stadt in einem Tal etwas eingedämmt werden, dennoch sind die Schäden gravierend. Einige Militäreinrichtungen wurden getroffen, doch die katastrophalen Verluste unter der Zivilbevölkerung übertreffen diese bei weitem. Es dürfte Jahrzehnte dauern, bis wir die Langzeitfolgen dieser Waffe mit Sicherheit kennen."
 nuke_dropped.3.a:0 "Wird dies zur Kapitulation von [From.From.Owner.GetAdjective] führen?"
 nuke_dropped.3.b:0 "Wir hatten gehofft, dass Nagasaki verschont bleiben würde."
 nuke_dropped.4.t:0 "Atombombenabwurf auf Berlin"
 nuke_dropped.4.d:0 "Heute, um [GetDateText], wurde die deutsche Hauptstadt Berlin von einer Atomexplosion getroffen. Die Stadt wurde in diesem und im letzten Krieg mehrfach angegriffen, doch alles andere verblasst im Vergleich dazu. Seit dem Dreißigjährigen Krieg hat Berlin keine vergleichbare Zerstörung mehr erlebt – angesichts der Größe des Landes galt dies als unmöglich.\n\nDer Führerbunker scheint die Explosion zumindest teilweise überstanden zu haben, da die Bombe nicht in ihrem geplanten Epizentrum detonierte. Gerüchten zufolge ist [From.From.Owner.GetLeader] noch am Leben, wenn auch empört. Wie [From.From.Owner.GetAdjective]-Führer evakuiert werden sollen und ob sie vor dem radioaktiven Niederschlag geschützt werden können, ist jedoch eine andere Frage."
 nuke_dropped.4.a:0 "Heute bin ich erleichtert, kein Berliner zu sein."
 nuke_dropped.4.b:0 "Unsere Feinde haben das Herz der Nation getroffen!"
 nuke_dropped.5.t:0 "Atombombenabwurf auf London"
 nuke_dropped.5.d:0 "Eine Atomexplosion hat heute London verwüstet. Trotz der Luftabwehr der Stadt war [From.From.Owner.GetNameDef] auf diesen Angriff nicht vorbereitet. Am [GetDateText] läutete Big Ben zum letzten Mal, nachdem er durch die Explosion geschmolzen war. Erste Berichte deuten darauf hin, dass der Buckingham Palace vollständig dem Erdboden gleichgemacht wurde und der Aufenthaltsort der königlichen Familie derzeit unbekannt ist.\n\n[From.From.Owner.GetLeader] hat den Angriff dennoch überlebt und bereitet eine mitreißende Rede für heute im Radio vor. Angesichts der tiefsten Moral der britischen Bevölkerung ist dies dringend nötig – oder eine beredte Kapitulation."
 nuke_dropped.5.a:0 "Es ist schwierig, angesichts einer nuklearen Druckwelle die Fassung zu bewahren."
 nuke_dropped.5.b:0 "Gott schütze den König!"
 nuke_dropped.6.t:0 "Atombombenabwurf auf Kyoto"
 nuke_dropped.6.d:0 "Die Stadt Kyoto, ein bedeutendes Industriezentrum, wurde heute von einer Atombombe getroffen. Es wird spekuliert, dass die Stadt als Ziel ausgewählt wurde, weil sie als intellektuelles Zentrum gilt.\n\nDie Schönheit und historische Bedeutung Kyotos ließ viele annehmen, dass die Stadt von der Bombe verschont bleiben würde. Doch es scheint, dass der Schrecken der Zerstörung, die einen solchen Ort überrollt, eher als Vorteil empfunden wurde, was die psychologische Wirkung des Angriffs verstärkte. Die Lage der Stadt im Tal dämpfte die Explosion etwas, der alte Kaiserpalast und viele Industriegebäude wurden jedoch vollständig zerstört."
 nuke_dropped.6.a:0 "Erbe und Schönheit bedeuten in einem Krieg wie diesem nichts."
 nuke_dropped.6.b:0 "Wenn sie das Alte zerstören, werden wir das Neue bauen."
 nuke_dropped.7.t:0 "Atombombenabwurf auf Tokio"
 nuke_dropped.7.d:0 "Heute richtete sich ein Atomschlag gegen das Herz des japanischen Kaiserreichs. Die Hauptstadt Tokio galt zwar als Ziel eines Brandbombenangriffs, wurde aber nie als vorrangiges Ziel dieser neuen Waffe angesehen. Doch letztendlich, vielleicht aufgrund der Bedeutung der neuen Hauptstadt und des zerstörten Kaiserpalastes, fiel ein noch verheerenderes Feuer auf die Stadt.\n\nObwohl [From.From.Owner.GetLeader] Berichten zufolge überlebt hat, wirft das Ereignis die Frage auf, wie weit Japans Feinde zu gehen bereit sind. Wenn der Krieg damit nicht endet, welche Ziele bleiben dann übrig? Womit kann man noch drohen?"
 nuke_dropped.7.a:0 "Bedeutet dies das Ende des japanischen Kaiserreichs?"
 nuke_dropped.7.b:0 "Solange [From.From.Owner.GetLeader] lebt, lebt auch das Imperium."
 nuke_dropped.8.t:0 "Atombombenabwurf auf Washington D.C."
 nuke_dropped.8.d:0 "Heute wurde über der Hauptstadt der Vereinigten Staaten eine Atombombe detoniert. Bei einem Angriff, der sich eindeutig gegen das politische Zentrum und das historische Erbe der USA richtete, wurden das Weiße Haus, das Kapitol sowie zahlreiche Denkmäler und Gedenkstätten von der Bildfläche verschwunden. Selbst der Brand Washingtons vor über einem Jahrhundert verblasst angesichts der Zerstörung, die diese verheerende Waffe über die Stadt brachte.\n\nObwohl Präsident [From.From.Owner.GetLeader] in Sicherheit gebracht werden konnte, ist die Nation zutiefst erschüttert. Zweifellos hofften die USA, das erste und einzige Land zu sein, das über eine solche Waffe verfügt. Diese Hoffnung wurde nun auf schlimmste Weise zerstört."
 nuke_dropped.8.a:0 "Eine unteilbare Nation im Gegensatz zu einem teilbaren Atom."
 nuke_dropped.8.b:0 "Der Adler wird wie ein Phönix aus der Asche auferstehen."
 nuke_dropped.9.t:0 "Atombombenabwurf auf Rom"
 nuke_dropped.9.d:0 "Eine Atomexplosion erschütterte heute die Stadt Rom und schockierte Menschen weltweit. Angesichts ihrer historischen und künstlerischen Schätze hätten viele nie gedacht, dass die antike Stadt Ziel einer solch wahllosen Zerstörung werden würde. Da auch die Vatikanstadt teilweise zerstört wurde und der Aufenthaltsort des Papstes unbekannt ist, hat das Ereignis nicht nur Italiener, sondern Katholiken weltweit entsetzt. Roms rasantes Wachstum des letzten Jahrzehnts wurde durch den Angriff fast vollständig zunichte gemacht. Eine Zeit lang sah es so aus, als könnte die Stadt nach Kriegsende zum Wiederaufbau der Nation beitragen. Diese Hoffnungen haben sich nun – und mit ihnen viele Menschen – zerschlagen."
 nuke_dropped.9.a:0 "Bomba Iacta Est!"
 nuke_dropped.9.b:0 "Rom wird nicht an einem Tag wieder aufgebaut werden ..."
 nuke_dropped.10.t:0 "Atombombenabwurf auf Paris"
 nuke_dropped.10.d:0 "Heute wurde über Paris eine Atombombe gezündet, die weitreichende Zerstörungen und unzählige Opfer forderte. Frankreich stand unter Schock, als seine Hauptstadt den vielleicht verheerendsten Angriff aller Zeiten erlitt, trotz Jahrhunderten voller Kriege und Revolutionen. Die Pariser hatten vielleicht mit einer Eroberung gerechnet, aber nicht mit völliger, brutaler Verwüstung. \n\nSiegesparaden auf den Champs-Élysées an den Überresten des Arc de Triomphe vorbei erscheinen angesichts des aktuellen Zustands der Stadt unwahrscheinlich. Vielleicht wird in den kommenden Jahrzehnten ein neues Paris entstehen, doch in den Köpfen der Öffentlichkeit ist Paris, die Stadt der Belle Époque, für immer verschwunden."
 nuke_dropped.10.a:0 "Die Stadt des Lichts ist ausgebrannt."
 nuke_dropped.10.b:0 "Noch gestern schien es, als ob wir immer Paris hätten."
 nuke_dropped.11.t:0 "Atombombenabwurf auf Moskau"
 nuke_dropped.11.d:0 "Moskau, eine Stadt, die viele zu erobern versuchten und scheiterten, war heute Ziel eines Atomangriffs. Die Explosion traf das Herz der [From.From.Owner.GetAdjective]-Führung, nachdem der Kreml durch die Explosion fast vollständig zerstört worden war.\n\n[From.From.Owner.GetLeader], der sich in letzter Zeit aller möglichen und unmöglichen Bedrohungen bewusster und ängstlicher geworden war, evakuierte rechtzeitig und überlebte. Doch selbst die Weite von [From.From.Owner.GetName] könnte nicht ausreichen, um einem solch skrupellosen Feind zu entkommen. Wenn dies so weitergeht, wird das Land bald nur noch aus zwei Arten von Ödland bestehen: denen, die ursprünglich da waren, und denen, die seine Feinde geschaffen haben."
 nuke_dropped.11.a:0 "Wird ein nuklearer Winter Moskau nicht nur zu einem schwierigeren Ziel machen?"
 nuke_dropped.11.b:0 "Sie können jede unserer Städte niederbrennen, aber sie werden sie niemals einnehmen."
 nuke_dropped.12.t:0 "Atombombenabwurf auf Kopenhagen"
 nuke_dropped.12.d:0 "Kopenhagen wurde heute von einer Atomexplosion getroffen. Die Hauptstadt, die dank der Neutralität Dänemarks im Ersten Weltkrieg der Zerstörung entging, erlebte seit den Napoleonischen Kriegen keinen ähnlich verheerenden Angriff mehr. Auch die Umgebung des Öresunds ist von den Folgen des Atombombenangriffs betroffen, und Überlebende fliehen aus Angst vor weiteren Angriffen nach Fünen und aufs Festland. Der Aufenthaltsort von König Christian X. ist derzeit unbekannt, und die Moral der Nation wurde durch den Angriff schwer beschädigt. Es bleibt abzuwarten, ob dies der Anfang vom Ende für eine der ältesten Nationen Europas ist."
 nuke_dropped.12.a:0 "Im Staat Dänemark wird etwas verstrahlt."
 nuke_dropped.12.b:0 "Die Stadt ist schon einmal niedergebrannt, aber nicht zerstört worden."
 nuke_dropped.12.c:0 "Mit Plutonium zwingen wir die Dänen in die Knie!"
 nuke_dropped.13.t:0 "Atombombenabwurf auf Stockholm"
 nuke_dropped.13.d:0 "Die wunderschöne Stadt Stockholm, das stolze Venedig des Nordens, wurde heute von einer Atombombe getroffen. Trotz ihrer Bemühungen, in der Vergangenheit neutral zu bleiben, haben die Schweden nun den höchsten Preis für einen internationalen Konflikt bezahlt. Das Epizentrum der Explosion befand sich mitten im südlichen Zentrum Stockholms, einem Gebiet, das für zukünftige Bebauung und große Bauprojekte vorgesehen war und nun unwiederbringlich zerstört ist.\n\nEin Großteil der Stadt ist nicht mehr wiederzuerkennen, doch die alten Gebäude am Slussen scheinen die Explosion besser überstanden zu haben als erwartet. Es wurde beschlossen, dass sie als Denkmal für die Widerstandsfähigkeit der Stadt für immer unberührt bleiben sollen."
 nuke_dropped.13.a:0 "Damit wäre die schwedische Neutralität nur noch eine Erinnerung."
 nuke_dropped.13.b:0 "Der schwedische Tiger wird seine Streifen nicht verlieren!"
 soviet.30.t:0 "Nachfrage Bessarabien"
 soviet.30.d:0 "Rumänien kann nicht erwarten, der Macht der Roten Armee standzuhalten. Wenn wir ihnen die Forderung nach unserem rechtmäßig beanspruchten Land in Bessarabien stellen, werden sie es uns möglicherweise kampflos überlassen."
 soviet.30.a:0 "Senden Sie das Ultimatum!"
 soviet.30.b:0 "Nein, wir zahlen den Eisenpreis!"
 soviet.31.t:0 "Nachfrage Karjala"
 soviet.31.d:0 "Finnland kann nicht erwarten, der Macht der Roten Armee standzuhalten. Wenn wir ihnen eine Forderung nach unserem rechtmäßig beanspruchten Land in Karjala schicken, werden sie es uns möglicherweise kampflos übergeben."
 soviet.31.a:0 "Senden Sie das Ultimatum!"
 soviet.31.b:0 "Nein, wir zahlen den Eisenpreis!"
 soviet.32.t:0 "Estland unterdrücken"
 soviet.32.d:0 "Estland kann nicht erwarten, der Macht der Roten Armee standzuhalten. Wenn wir ihnen die Rechte auf Stationierung und Kontrolle ihrer Grenzsicherheit zukommen lassen, können wir sie effektiv und ohne Kampfhandlungen annektieren."
 soviet.32.a:0 "Senden Sie das Ultimatum!"
 soviet.32.b:0 "Nein, wir zahlen den Eisenpreis!"
 soviet.33.t:0 "Lettland unterdrücken"
 soviet.33.d:0 "Lettland kann nicht erwarten, der Macht der Roten Armee standzuhalten. Wenn wir ihnen die Rechte auf Stationierung und Kontrolle ihrer Grenzsicherheit zukommen lassen, können wir sie effektiv und ohne Kampfhandlungen annektieren."
 soviet.33.a:0 "Senden Sie das Ultimatum!"
 soviet.33.b:0 "Nein, wir zahlen den Eisenpreis!"
 soviet.34.t:0 "Litauen unterdrücken"
 soviet.34.d:0 "Litauen kann nicht erwarten, der Macht der Roten Armee standzuhalten. Wenn wir ihnen die Rechte auf Stationierung und Kontrolle ihrer Grenzsicherheit zukommen lassen, können wir sie effektiv und ohne Kampfhandlungen annektieren."
 soviet.34.a:0 "Senden Sie das Ultimatum!"
 soviet.34.b:0 "Nein, wir zahlen den Eisenpreis!"
 soviet.35.t:0 "[From.GetNameDefCap] möchte [SOV.GetNameDef] beitreten"
 soviet.35.d:0 "Die jüngsten politischen Unruhen in [From.GetName] haben der Regierung eine starke Zukunftsvision beschert, die mit unserer übereinstimmt. Sie haben gesehen, was eine mächtige Sowjetunion für die Welt leisten kann, und sind bereit, alles für ihr Vaterland zu geben."
 soviet.35.a:0 "Setzen Sie es in Bewegung."
 soviet.35.b:0 "Der Zeitpunkt ist für einen solchen Schritt nicht reif."
 soviet.35_threat_LIT:0 "Litauen war Teil der Sowjetunion"
 soviet.35_threat_FIN:0 "Finnland war Teil der Sowjetunion"
 soviet.35_threat_EST:0 "Estland war Teil der Sowjetunion"
 soviet.35_threat_LAT:0 "Lettland war Teil der Sowjetunion"
 soviet.36.t:0 "[From.GetName] möchte unsere Regel."
 soviet.36.d:0 "Die jüngsten politischen Unruhen in [From.GetName] haben der Regierung eine klare Zukunftsvision hinterlassen, die mit unseren Plänen übereinstimmt. Sie sucht unseren Schutz und bietet uns ihre bedingungslose Unterstützung. Offiziell werden sie als eigenständige Nation weiterbestehen, aber sie werden dem Mutterland in jeder Hinsicht folgen."
 soviet.36.a:0 "Ein weiteres Tool, das unseren Fortschritt unterstützt."
 soviet.36.b:0 "Sie benötigen zu viel Schutz."
 soviet.36_threat_LIT:0 "Litauen – Marionette der Sowjetunion"
 soviet.36_threat_FIN:0 "Finnland – Marionette der Sowjetunion"
 soviet.36_threat_EST:0 "Estland – Marionette der Sowjetunion"
 soviet.36_threat_LAT:0 "Lettland – Marionette der Sowjetunion"
 soviet.37.t:0 "Talentierte neue Offiziere."
 soviet.37.d:1 "Unsere neuen Offiziere erweisen sich der Aufgabe gewachsen und passen sich ihren neuen Rollen im militärischen Oberkommando an. Mit einem loyalen Offizierskorps an der Spitze unseres Militärs scheint die Säuberung [Root.GetLeader]s die erhoffte Wirkung zu erzielen. Die Rote Armee gewinnt ihre Macht zurück und wird bald stärker sein als je zuvor."
 soviet.37.a:0 "Exzellent."
 soviet.37.a_tt:0 "Reduziert die Strafe von §YOffiziere gesäubert§!"
 soviet.46.t:0 "Großer Vaterländischer Krieg"
 soviet.46.d:0 "Obwohl wir noch viel Arbeit vor uns haben, um unser militärisches Oberkommando wiederaufzubauen, hat der Vormarsch der [From.GetAdjective]-Armee an unseren Grenzen Einfallsreichtum und patriotischen Kampfeswillen in unserem neuen Offizierskorps geweckt. Mit jedem Schlag werden wir stärker, während wir uns darauf vorbereiten, mit der ganzen Macht der [Prev.GetName] zurückzuschlagen. Jeder Soldat ist bereit, sein Leben zu geben und unseren Feinden standhaft zu begegnen. Wir erwarten, dass dies der Ausbildung und dem Engagement unserer neuen Offiziere auch nach dem Sieg dieses Krieges erheblich zugutekommt!"
 soviet.46.a:0 "Zum Ruhm von [Root.GetName]"
 soviet.46.a_tt:0 "Fügt „Großer Vaterländischer Krieg“ hinzu, wodurch einige der Strafen durch „Gesäuberte Offiziere“ ausgeglichen werden."
 soviet.48.t:0 "Die permanente Revolution"
 soviet.48.d:0 "Obwohl in den vergangenen Jahren unzählige Menschen als Verräter und Konterrevolutionäre hingerichtet und inhaftiert wurden, blieben führende Positionen weitgehend sicher. Sie waren jedoch nicht vor Misstrauen gefeit. Mit der Gründung der Vierten Internationale schien Stalin von dem Gedanken besessen zu sein, dass seine engsten Vertrauten nie wirklich auf seiner Seite standen. Diejenigen, die sein Vertrauen zu gewinnen versuchten, schürten diese Vorstellung weiter, um sich in ein besseres Licht zu rücken. Die aktuelle Situation ist von außergewöhnlicher Ironie: Das Misstrauen innerhalb der aktuellen Regierung hat sie unhaltbar gemacht, und ein Putsch steht unmittelbar bevor. Einige Parteimitglieder argumentieren, dass eine Wiedereinladung Trotzkis und die gezielte Säuberung der Stalinisten den Schaden des darauf folgenden Bürgerkriegs minimieren könnten. Kann dieser Plan, der jahrelang die größte Angst des Generalsekretärs war, tatsächlich umgesetzt werden?"
 soviet.48.a:0 "Undenkbar!"
 soviet.48.a_tt:0 "§Bald wird ein massiver Bürgerkrieg ausbrechen§!"
 soviet.48.b:0 "Der Kommunismus in einem Land ist gescheitert. Wir brauchen Trotzki."
 soviet.48.b_tt:0 "§Ein kleiner Bürgerkrieg wird ausbrechen, wenn Trotzki zurückkehrt§!"
 soviet.49.t:0 "Der zweite russische Bürgerkrieg"
 soviet.49.d:0 "Stalins zunehmende Paranoia hat Partei und Militär gespalten. Diejenigen, die sich – zumindest vorübergehend – sein Vertrauen erarbeitet haben, wollen ihn an der Macht halten und den von ihm aufgebauten Personenkult bewahren. Viele andere hingegen wurden inoffiziell aus dem Spiel gelassen. Einige glauben, Stalins Herrschaft sei gescheitert, andere vermuten, sie warteten nur auf den Tag, an dem der NKWD einen Vorwand findet, sie verhaften zu lassen. Gemeinsam haben sie eine Fraktion gebildet, die mächtig genug ist, die derzeitige Regierung herauszufordern. Ihr erklärtes Ziel ist der Sturz Stalins Tyrannei und der Übergang von einem totalitären Staat zu einem Regimewechsel. Ein Gremium aus Militärs soll diesen Prozess überwachen. Stalins Anhänger in Militär und Partei haben sich für den Erhalt des Regimes eingesetzt und ihre Gegner als konterrevolutionäre Verräter bezeichnet. Ein neuer Bürgerkrieg steht bevor."
 soviet.49.a:0 "Tod den Verrätern!"
 soviet.50.t:0 "Gründung der Russischen Befreiungsarmee"
 soviet.50.d:0 "Die Gründung der Vierten Internationale hat Stalins Angst vor Verrätern in Partei und Militär neu entfacht. Nach den Prozessen und Hinrichtungen der Großen Säuberung befürchten viele eine weitere. Als Reaktion darauf gründeten mehrere Generäle unter Führung von Andrej Wlassow das Komitee zur Befreiung des russischen Volkes mit dem Ziel, Stalins Regime zu stürzen, bevor es weiteren Schaden anrichten kann. Obwohl das erklärte langfristige Ziel der Übergang zur Demokratie ist, ist die genaue Ausgestaltung noch unklar. Klar ist nur, dass sie Stalin stürzen und die Herrschaft der Bolschewiki beenden wollen."
 soviet.50.a:0 "Sie müssen gestoppt werden!"
 soviet.51.t:0 "NKWD startet Putsch"
 soviet.51.d:0 "Die Gründung der Vierten Internationale hat Stalins Angst vor Verrätern in der Partei und der Militärführung neu entfacht. Nach den Prozessen und Hinrichtungen der Großen Säuberung befürchten viele eine weitere. Auch der NKWD, der bei diesen Säuberungen eine entscheidende Rolle spielte, war sich der Tatsache, dass die Organisation selbst ein potenzielles Angriffsziel darstellte, durchaus bewusst. Anstatt darauf zu warten, inhaftiert, hingerichtet und ersetzt zu werden, beschlossen seine Führer, zunächst zuzuschlagen und mit Unterstützung der ebenfalls besorgten Militärs einen Putsch zu starten. Trotz seiner einflussreichen Stellung fiel es dem NKWD jedoch schwer, das Vertrauen der Militärführung zu gewinnen. Durch den Putsch gelang es ihm lediglich, die Kontrolle über ein begrenztes Gebiet der Union zu erlangen. Da den Überresten der alten Organisation nun jedoch die sichere Hinrichtung bevorsteht, ist es unwahrscheinlich, dass sie aufgeben werden."
 soviet.51.a:0 "Sie müssen gefangen genommen werden!"
 soviet.52.t:0 "Der Putsch der Überlebenden"
 soviet.52.d:0 "Die Gründung der Vierten Internationale hat Stalins Angst vor Verrätern in Partei und Militär neu entfacht. Nach den Prozessen und Hinrichtungen der Großen Säuberung vermuten viele eine weitere. Da so viele Menschen umgekommen sind, gibt es nur wenige, die der Hinrichtung entgehen konnten. Nach brutalen Verhören und teilweise Gefängnisaufenthalten wissen sie genau, dass sie die ersten Opfer einer weiteren Säuberung sein werden. In einem Akt der Verzweiflung haben diese Generäle beschlossen, Stalins Regime zu stürzen, bevor dies geschieht.\n\nObwohl dieser Versuch unwahrscheinlich ist, ist es einigen Überlebenden der Großen Säuberung gelungen, in einigen Teilen der Union die Kontrolle zu übernehmen. Die Herrschaft des Generalsekretärs wurde zumindest destabilisiert."
 soviet.52.a:0 "Wir müssen es so schnell wie möglich stabilisieren."
 soviet.53.t:0 "Die erfolgreiche Säuberung"
 soviet.53.d:0 "Nach der Gründung der Vierten Internationale wurde die Jagd auf Trotzkis Anhänger intensiviert, und mehrere Menschen aus Stalins Umfeld wurden hingerichtet. Stalin, der nun allein war, zog sich in seine Villa zurück. Nachdem er sich endlich um alle verräterischen Freunde und Familienmitglieder gekümmert hatte, konnte er nun zur Ruhe kommen und sich ganz darauf konzentrieren, der Sowjetunion zu Ruhm und Ehre zu verhelfen."
 soviet.53.a:0 "Zeit, die Axt an den Nagel zu hängen"
 soviet.54.t:0 "Unter neuer Führung"
 soviet.54.d_nopurge:0 "Angesichts der schwindenden Macht der kommunistischen Partei ist es seit langem klar, dass das stalinistische System nicht mehr tragbar ist.\nNeue Kräfte sind aufgestiegen, um die Macht zu ergreifen und unser Land mit russischen Idealen auf einen neuen Weg zu führen.\n\nAls Symbol dieses Übergangs ließ [Root.GetLeader] Stalin absetzen und unter Hausarrest stellen, weit weg von den Machtzentren, in denen er so viele seiner gefährlichen Projekte ausheckte.\nWährend ein neues russisches System heranwächst, um die verwesende Leiche der Partei zu ersetzen, haben die Geheimniskrämerei, Paranoia und politischen Intrigen des alten Generalsekretärs ein Ende."
 soviet.54.d_purge:0 "Es ist klar geworden, dass die größte Bedrohung für den russischen Staat nicht von Verschwörern gegen die Kommunistische Partei ausgeht, sondern von der Partei selbst. Mit der Desillusionierung des kommunistischen Traums in Russland ergriffen neue Kräfte die Macht, um unser Land in die Zukunft zu führen.\n\nNach Stalins Absetzung durch [Root.GetLeader] wurde dem ehemaligen Generalsekretär ein Schnellverfahren eingeleitet. Seine paranoide Hexenjagd wurde als Zerstörung der nationalen Führung in einer Zeit der Not beschrieben, woraufhin Stalin wegen Hochverrats zum Tode verurteilt wurde. Das alte System geht mit ihm in ein anonymes Grab."
 soviet.54.a:0 "Ein neuer Morgen für die russische Politik."
 usa.14.t:0 "Die faschistische Dämmerung"
 usa.14.d:0 "Unser großes Vorbild, Nazi-Deutschland, hat seine tiefsten Prinzipien verraten und sich mit dem großen Feind verbündet: den Kommunisten. Als sich dies herumspricht, folgt dies mit Unruhen. Aus Angst vor einer kommunistischen Revolution waren die Menschen bereit, uns so weit zu folgen, doch mit Deutschlands Abtrünnigkeit wird unsere große Wiedergeburt in Frage gestellt."
 usa.14.a:0 "Zurück zur Demokratie."
 usa.14.b:0 "Bleiben Sie dem Faschismus treu."
 usa.24.t:0 "Die rote Dämmerung"
 usa.24.d:0 "Die Sowjetunion, die viele davon überzeugte, dass der Sturz des Kapitalismus möglich sei, hat die internationale Revolution verraten und sich mit Nazi-Deutschland verbündet. Zwischen dem Sozialismus in einem Land und dem Bündnis mit Faschisten beginnen die Menschen weltweit an der Aufrichtigkeit der kommunistischen Ideale zu zweifeln. Ist der amerikanische Kommunismus nur ein weiteres Werkzeug, das [Root.GetLeader] zur Festigung seiner Macht eingesetzt hat?"
 usa.24.a:0 "Zurück zur Demokratie."
 usa.24.b:0 "Bleiben Sie dem Kommunismus treu."
 usa.17.t:0 "[From.From.GetName] hat [From.GetName] den Krieg erklärt"
 usa.17.d:0 "Die Welt ist bereits ein unsicherer Ort. Können wir wirklich Krieg in unserer eigenen Region zulassen oder sollten wir dafür sorgen, dass der Frieden gewahrt bleibt? Wir können [From.From.GetName] ein Ultimatum stellen, mit [From.GetName] Frieden zu schließen, oder sie den Kampf austragen lassen."
 usa.17.a:0 "Lassen Sie [From.From.GetName] wissen, dass wir auf den Krieg vorbereitet sind."
 usa.17.a_tt:0 "§RIf [From.From.GetName] nachgibt, wird es weißen Frieden geben.§!\n"
 usa.17.b:0 "Wir werden dieses Mal nicht eingreifen."
 usa.18.t:0 "[From.GetName] greift in den Krieg gegen [being_attacked.GetName] ein"
 usa.18.d:0 "[From.GetName] ist unzufrieden mit unserem Konfliktkrieg gegen [being_attacked.GetName]. Sie drohen uns mit einem eigenen Krieg, wenn wir nicht sofort ein Friedensabkommen mit [being_attacked.GetName] unterzeichnen. \nSollen wir nachgeben?"
 usa.18.a:0 "Lassen Sie [From.GetName] wissen, dass wir auf den Krieg vorbereitet sind."
 usa.18.b:0 "Wir werden zurückweichen."
 usa.18.b_tt:0 "[Root.GetNameWithFlag] Frieden mit [being_attacked.GetNameWithFlag]"
 usa.19.t:0 "[From.GetNameWithFlag] erreicht Puppet-Kriegsziel (Fokus) gegen [Root.GetName]"
 usa.20.t:0 "US-Einfluss"
 usa.20.d:0 "Das Bekenntnis von [From.GetName] zur Demokratie beginnt, unser Land zu beeinflussen. Über Radiosendungen erreichen Reden von [From.GetLeader] unsere Bevölkerung, und wir haben festgestellt, dass viele [Root.GetAdjective] sich von der [From.GetAdjective]-Lebensweise angezogen fühlen. [Root.GetName] ist keine Marionette, und wir werden uns unsere Politik auch nicht von [From.GetName] diktieren lassen. Dennoch können wir den Einfluss der [From.GetAdjective]-Politik auf unser Land nicht leugnen."
 usa.20.a:0 "In unseren Herzen werden wir immer [Root.GetAdjective] sein"
 usa.20.a_tt:0 "[Root.GetNameWithFlag] gewinnt: §YUS-Einfluss§!"
 usa.21.d:0 "[From.GetName]s Befürwortung des Kommunismus beginnt, unser Land zu beeinflussen. Über Radiosendungen erreichen Reden von [From.GetLeader] unsere Bevölkerung. Wir haben sogar Propagandaflugblätter gefunden, die [Root.GetAdjective]-Arbeiter zur Organisation ermutigen und für den [From.GetAdjective]-Lebensstil werben. [Root.GetName] ist keine Marionette, und wir werden uns unsere Politik auch nicht von [From.GetName] diktieren lassen. Dennoch können wir den Einfluss der [From.GetAdjective]-Politik auf unser Land nicht leugnen."
 usa.22.d:0 "Die Befürwortung des Faschismus durch [From.GetName] beginnt, unser Land zu beeinflussen. Über Radiosendungen erreichen Reden von [From.GetLeader] unsere Bevölkerung, und in einigen Teilen des Landes werden sogar Propagandaflugblätter verteilt, die für den [From.GetAdjective]-Lebensstil werben. [Root.GetName] ist keine Marionette, und wir werden uns unsere Politik auch nicht von [From.GetName] diktieren lassen. Dennoch können wir den Einfluss der [From.GetAdjective]-Politik auf unser Land nicht leugnen."
 usa.23.t:0 "US-Schutz"
 usa.23.d:0 "Die [From.GetName] setzen die Monroe-Doktrin nun viel strenger durch. Neben dem politischen Einfluss, den sie bereits auf unser Land haben, erklären [From.GetName]-Beamte nun, dass sie bereit sind, in jeden Konflikt zwischen amerikanischen Ländern einzugreifen."
 usa.23.a:0 "[From.GetName] wird immer mächtiger"
 usa.23.a_tt:0 "[From.GetNameWithFlag] kann jetzt in amerikanische Kriege eingreifen"
 britain.11.t:0 "Die Achse Berlin-Moskau"
 britain.11.d:0 "Ein umfassendes Militärbündnis zwischen Deutschland und der Sowjetunion könnte die Weltordnung umstürzen und eine neue Ära des Totalitarismus einleiten. Um dieser Entwicklung entgegenzuwirken, müssen wir die demokratischen Nationen der Welt zu einer Großen Allianz zusammenschließen, um die nationalsozialistische und kommunistische Bedrohung zu bekämpfen."
 britain.11.a:0 "Versammelt die Demokratie!"
 britain.11.b:0 "Kein Grund zur Überreaktion."
 britain.12.t:0 "Die Große Allianz"
 britain.12.d:0 "Großbritannien lädt uns ein, uns seiner Fraktion anzuschließen, um die nationalsozialistische und kommunistische Bedrohung zu bekämpfen. Was sollen wir darauf antworten?"
 britain.12.a:0 "Ja"
 britain.12.b:0 "NEIN"
 britain.13.t:0 "Frankreich will sich den Verbündeten anschließen"
 britain.13.d:0 "Die Welt wird zunehmend unsicherer. Großbritannien und Frankreich bleiben Bastionen der Demokratie und Freiheit in Europa, und Frankreich schlägt nun vor, sich den Alliierten anzuschließen. Was sollen wir darauf antworten?"
 britain.13.a:0 "Ja"
 britain.13.b:0 "NEIN"
 britain.14.t:0 "Londoner Konferenz"
 britain.14.d:0 "Die deutsche Regierung hat begonnen, sich über den Status Sloweniens zu streiten. Slowenien, das ihrer Ansicht nach die historische deutsche Provinz Krain ist, wird von der jugoslawischen Regierung unterdrückt. Die Regierung Seiner Majestät hat die Regierungen Frankreichs, Deutschlands und Italiens zu einer Konferenz nach London eingeladen, um eine faire Lösung dieser Frage zu finden. Es besteht kein Zweifel daran, dass die kleine deutsche Minderheit einen Anschluss an Deutschland wünscht, doch die Wünsche der slowenischen Bevölkerung sind weniger eindeutig. Deutschland scheint bereit, deswegen den Krieg loszulassen, und dunkle Kriegswolken ziehen erneut über den europäischen Kontinent."
 britain.14.a:0 "Ein dauerhafter Frieden muss angestrebt werden"
 britain.14.b:0 "Die Geschichte würde uns nicht vergeben"
 britain.15.t:0 "Frankreich lässt uns im Stich"
 britain.15.d:0 "Die französische Regierung hat unsere vorgeschlagene bescheidene Grenzanpassung nicht eingesehen und ist entschlossen, den Frieden zu brechen und einen schrecklichen Krieg zu führen. Wir werden sie in einer weiteren Runde sinnloser Grabenkämpfe erschöpfen lassen, und dann werden sie uns um Hilfe anflehen."
 britain.15.a:0 "Sie werden ihren Platz kennenlernen."
 britain.16.t:0 "Tod von König Georg V."
 britain.16.d:0 "Seine Majestät Georg V., König des Vereinigten Königreichs und der britischen Dominions sowie Kaiser von Indien, ist verstorben. Seine ruhige Gelassenheit und Hingabe an seine Untertanen halfen dem Empire sowohl durch den Ersten Weltkrieg als auch durch die Weltwirtschaftskrise. Sein Sohn wird als König Edward VIII. die Nachfolge antreten, doch es gibt bereits Bedenken, dass er zu unabhängig denken wird. Stanley Baldwin und Neville Chamberlain bereiten sich darauf vor, sicherzustellen, dass er den Anweisungen des Premierministers und des Kabinetts Folge leistet."
 britain.16.a:0 "Möge er in Frieden ruhen"
 britain.17.t:0 "König Edward dankt ab"
 britain.17.d:0 "Premierminister Baldwin hat unmissverständlich klargestellt, dass die Würde des Kaisers verletzt wäre, wenn er nicht nur eine Bürgerliche, sondern auch eine Geschiedene und, als ob das nicht schon schlimm genug wäre, eine Amerikanerin heiraten würde. Nach reiflicher Überlegung hat Seine Majestät Liebe der Pflicht vorgezogen und sich zur Abdankung entschlossen. Sein jüngerer Bruder Albert wird als König Georg VI. die Thronfolge übernehmen. Londoner Buchmacher bieten bereits Wetten an, ob dieser schüchterne Mann seine Krönung erleben wird."
 britain.17.a:0 "Gott schütze König Georg VI."
 britain.18.t:0 "Die Rückkehr des Königs"
 britain.18.d:0 "Es ist kein Geheimnis, dass zwischen Georg VI. und der [Root.GetRulingParty] keine Sympathie herrscht. Im Parlament fordern nun Stimmen seinen Rücktritt zugunsten seines im Exil lebenden Bruders Eduard VIII. Dieser Mann ist dem Gedanken der Einheit durch Stärke durchaus fremd und hat eine Vision für England. Er besitzt die Eigenschaften, die wir uns von einem Führer unserer Nation wünschen!"
 britain.18.a:0 "Um des Imperiums willen muss Edward VIII. herrschen!"
 britain.18.b:0 "Wir werden uns nicht in die Angelegenheiten des Parlaments einmischen."
 britain.19.t:0 "Gründung einer freien indischen Regierung"
 britain.19.d:0 "Mit Unterstützung Japans haben indische Nationalisten eine Exilregierung, die Azad Hind, gegründet.\n\nDie Nationalisten verbreiten Propaganda im Raj und ermutigen Sepoys zur Desertion. Zwar fehlt ihnen derzeit die Unterstützung, doch ihre Bemühungen könnten sich langfristig als gefährlich erweisen."
 britain.19.a:0 "Ein sinnloses Unterfangen!"
 ENG_RAJ_azad_hind_tooltip:0 "Die nationalistische Unterstützung wird weiter zunehmen, wenn ihr nicht das Versprechen einer späteren Unabhängigkeit entgegenwirkt."
 britain.20.t:0 "Azad Hind führt den indischen Aufstand an"
 britain.20.d:0 "Die Azad Hind, die Exilregierung des Freien Indiens, verbreitet Propaganda und wirbt in der Bevölkerung des Raj um Unterstützung. Obwohl die Zusammenarbeit des gesamten Imperiums wichtiger denn je ist, hat sie beschlossen, dass es jetzt an der Zeit ist, zuzuschlagen."
 britain.20.a:0 "Nein, das Imperium muss vereint sein!"
 britain.23.t:0 "Der indische Aufstand"
 britain.23.d:0 "Die Azad Hind, die Exilregierung des Freien Indiens, hat erklärt, dass für alle wahren Patrioten die Zeit gekommen sei, gegen die britischen Oberherren zu den Waffen zu greifen. Das Schicksal Indiens steht auf dem Spiel, und wir müssen eine Entscheidung treffen."
 britain.23.a:0 "Wir werden dem Imperium beistehen!"
 britain.23.b:0 "Wir werden die Chance nutzen!"
 britain.24.t:0 "Schattenschema-Fabriken in Betrieb genommen"
 britain.24.d:0 "Die sorgfältigen Vorbereitungen, die wir im Rahmen des Schattenprogramms getroffen haben, um den Übergang unserer zivilen Fabriken zur Kriegsindustrie zu erleichtern, haben sich nun ausgezahlt. Die neuen Fabriken sind bereits deutlich effizienter, als man in diesem Zeitrahmen vernünftigerweise hätte erwarten können."
 britain.24.a:0 "Was für eine glückliche Voraussicht wir hatten!"
 poland.1.t:0 "Osterweiterung"
 poland.1.d:0 "Nachdem wir Danzig an die Deutschen abtreten mussten, befinden wir uns nun in der Zwickmühle zweier Imperien, die unsere Souveränität bedrohen. Da wir im Westen Territorium verlieren und den Alliierten nicht vertrauen können, uns vor deutscher Aggression zu schützen, könnten wir erwägen, uns den deutschen Ambitionen anzuschließen und Teile unseres alten Polen zurückzufordern, die nun der Sowjetunion zufallen. Bleiben wir neutral, werden wir leichte Beute sein, und haben zu hart für eine weitere Teilung Polens gekämpft."
 poland.1.a:0 "Es ist an der Zeit, die Achsenmächte von einer Bedrohung in einen Verbündeten zu verwandeln."
 poland.1.b:0 "Eine diplomatische Zusammenarbeit mit der Sowjetunion ist vorzuziehen."
 poland.2.t:0 "Die Sowjetunion fordert den Osten"
 poland.2.d:0 "Nachdem die Sowjetunion ihre Ansprüche auf unsere Ostgebiete bekräftigt hat, übt sie nun Druck auf uns aus, dieses Land an sie abzutreten. Sie deutet an, dass dies der einzige Weg sei, eine weitere Invasion und mögliche Annexion oder Teilung zu vermeiden.\n\nNormalerweise käme es nicht in Frage, solchen Drohungen einfach nachzugeben, aber die Sowjetunion ist bei weitem nicht unsere einzige Sorge. Wenn wir ihren Forderungen nachkommen, müssen wir uns an der Ostfront möglicherweise weniger Sorgen machen, obwohl die Ostfront dadurch auch deutlich weiter nach Westen verschoben würde."
 poland.2.a:0 "Geben Sie den Osten friedlich auf."
 poland.2.b:0 "Polen wird nicht kampflos kapitulieren!"
 poland.3.t:0 "Polen tritt den Osten ab"
 poland.3.d:0 "Nachdem wir Druck auf Polen ausgeübt hatten, unseren rechtmäßigen Ansprüchen auf seine Ostgebiete nachzugeben, haben sie sich bereit erklärt, unsere Forderungen ohne weitere Konflikte abzutreten. Allerdings können wir wohl alle Hoffnungen auf eine künftige stärkere Bindung an Polen aufgeben. Nachdem sie uns unser Recht gegeben haben, scheinen sie zu hoffen, dass wir so wenig Kontakt wie möglich haben."
 poland.3.a:0 "Solange sie unseren Anspruch anerkennen, gibt es kein Problem."
 poland.4.t:0 "Polen weigert sich, den Osten abzutreten"
 poland.4.d:0 "Trotz unserer Bemühungen, den Konflikt mit Polen friedlich zu lösen, weigert sich Polen, seine Ostgebiete abzutreten. Damit sind wir in eine Lage geraten, in der wir diese nur noch durch Krieg zurückfordern können. Es ist klar, dass dieses problematische Land eine Teilung nicht vermeiden wird, selbst wenn man ihm die Chance dazu gibt."
 poland.4.a:0 "Glauben sie, dass sie uns die Stirn bieten können?"
 poland.5.t:0 "Die Sowjetunion bietet Schutz"
 poland.5.d:0 "Nachdem die Sowjetunion ihre Ansprüche auf Ostpolen geltend gemacht hatte, befürchteten wir einen weiteren Angriff. Ein kürzlich eingegangenes Angebot der Sowjets deutet jedoch auf etwas anderes hin. Offenbar sind sie bereit, uns unter der Voraussetzung, dass wir das beanspruchte Gebiet abtreten, einem Bündnis beizutreten. Darüber hinaus versprechen sie uns im Falle eines Krieges mit Deutschland eine Entschädigung durch die Gewährung neuen Landes im Westen. \n\nObwohl dies ein besseres Angebot sein mag als erwartet, können wir nicht wissen, ob dieser vermeintliche Krieg jemals geführt wird. Vielleicht ist die Sowjetunion nur auf einen leichten Landraub aus und zwingt uns in ihren Einflussbereich. Dennoch ist es möglicherweise der beste Schutz, auf den wir zählen können."
 poland.5.a:0 "Wir müssen es jetzt akzeptieren, bevor es zu spät ist."
 poland.5.b:0 "Polen ist noch nicht verloren!"
 poland.6.t:0 "Polen akzeptiert Schutz"
 poland.6.d:0 "Das Angebot, Polen im Austausch gegen Gebiete im Osten unter unsere Fittiche zu nehmen und es bei zukünftigen Eroberungen im Westen zu begleiten, erwies sich als erfolgreicher Ansatz. Da uns im Falle eines erfolgreichen Krieges ein Anteil an Deutschland und unser Schutz versprochen wurden, stimmten sie zu, ihre östlichen Gebiete friedlich abzutreten."
 poland.6.a:0 "Ein Verbündeter gegen Deutschland ist einer weiteren Teilung weit vorzuziehen."
 poland.7.t:0 "Polen verweigert Schutz"
 poland.7.d:0 "Obwohl wir unser großzügigstes Angebot gemacht und versucht haben, eine Vereinbarung zu erreichen, bei der Polen seine östlichen Gebiete gegen das Versprechen eines zukünftigen Anteils an Deutschland abtritt, hat [From.GetLeader] unsere diplomatischen Bemühungen abgelehnt. Polen hat den harten Weg gewählt – für uns, aber noch mehr für sich selbst."
 poland.7.a:0 "Was nicht käuflich ist, muss beschlagnahmt werden."
 poland.8.t:0 "Polen erhält Ostdeutschland"
 poland.8.d:0 "Wie bereits vereinbart, werden nach der Annexion der ostdeutschen Gebiete durch die Sowjetunion einige dieser Gebiete als Entschädigung für die frühere Übergabe Ostpolens an die Sowjetunion unter polnische Kontrolle kommen."
 poland.8.a:0 "Unter diesen Umständen war eine Verlagerung nach Westen das Beste, was wir hoffen konnten."
 poland.9.a:0 "Die Situation scheint zu unserer beiderseitigen Zufriedenheit gelöst."
 poland.10.t:0 "[From.GetName] tritt [Root.GetFactionName] bei!"
 poland.10.d:0 "[From.GetLeader] ist sich der Notwendigkeit der Einheit angesichts der Bedrohungen bewusst, die unsere Länder von allen Seiten umgeben, und hat heute der Welt verkündet, dass [From.GetName] zum Wohle unserer gemeinsamen Sicherheit einen Vertrag mit [Root.GetName] geschlossen hat."
 poland.10.a:0 "[Root.GetName] und [From.GetName] sind heute Brüder."
 poland.11.t:0 "[From.GetName] weigert sich, [Root.GetFactionName] beizutreten"
 poland.11.d:0 "In einem törichten Akt vermeintlicher Selbsterhaltung hat [From.GetLeader] heute angekündigt, dass [From.GetName] von jeglichen diplomatischen Maßnahmen Abstand nehmen werde, die als Bedrohung für seine mächtigen Nachbarn angesehen werden könnten. Daher hat es unsere Bitte um einen Beitritt zu [Root.GetFactionName] abgelehnt."
 poland.11.a:0 "Die einzige Sicherheit besteht darin, zusammenzuhalten."
 poland.12.t:0 "Wojtek lässt nie eine Kiste fallen"
 poland.12.d:0 "Private Wojtek hat sich als außerordentlich wertvolles Mitglied unserer Nachschublinien erwiesen. Selbst in der Hitze des Gefechts, als ihm das Feuer aus Handfeuerwaffen die Haare an Kopf, Armen und Beinen streifte, ließ er keine einzige Munitionskiste fallen. Dieser tapfere Soldat sorgte dafür, dass unsere Artillerie weiterfeuern konnte, und trug so maßgeblich zum Sieg über den Feind bei. Aus diesem Grund wurde beschlossen, Wojtek zu befördern."
 poland.12.a:0 "Möge uns sein Mut inspirieren"
 WOJTEK_COMMANDER:0 "Wojtek wird §HCorps Commander§!"
 greece.1.t:0 "Sowjetisches Ultimatum"
 greece.1.d:0 "Die Sowjetunion drängt uns, Territorium aufzugeben. Sie droht mit einem offenen Krieg, falls wir nicht nachgeben. Ein Nachgeben könnte vielen griechischen Soldaten das Leben retten, aber wird dies das letzte Mal sein, dass sie um Land bitten?"
 greece.1.a:0 "Für Griechenland ist es das Beste, einen Krieg zu vermeiden"
 greece.1.b:0 "Gib ihnen nichts."
 greece.2.t:0 "Zweiter Ljubljana-Preis"
 greece.2.d_GER_demand:0 "Deutschland versucht, Griechenland zur Übergabe von Gebieten für „Stützpunkte“ zu zwingen"
 greece.2.d_ITA:0 "Die Deutschen suchen auf unsere Kosten Land für ihre italienischen Freunde."
 greece.2.d_BUL:0 "Die Deutschen verlangen von uns, dass wir ihren bulgarischen Lakaien Ländereien überlassen."
 greece.2.d_ITA_BUL:0 "Die Deutschen verfolgen die Forderungen Italiens und Bulgariens auf unserem Territorium."
 greece.2.a:0 "Wir können ihnen nicht widerstehen"
 greece.2.b:0 "Wir werden nicht nachgeben"
 greece.3.t:0 "Schicksal Griechenlands"
 greece.3.d:0 "Deutschland verlangt von uns, dass wir die „Koordination“ für Deutschland übernehmen. Dies würde uns effektiv zu einer Marionette Deutschlands machen."
 greece.3.a:0 "Akzeptiere das Unvermeidliche"
 greece.3.b:0 "Verweigern"
 greece.4.t:0 "Krieg gegen die Türkei"
 greece.4.d:0 "Unsere italienischen Freunde planen einen Vorstoß in die Türkei. Das ist die perfekte Gelegenheit für uns, unsere Position in der Ägäis zu sichern. Lasst uns Izmir für uns einnehmen und den Italienern helfen, die Türken weit aus Europa zu vertreiben."
 greece.4.a:0 "Izmir wird uns gehören"
 turkey.1.t:0 "Der Tod von Mustafa Kemal Atatürk"
 turkey.1.d:0 "\n Die Republik trauert.\n\n Kriegsheld, Revolutionär, Präsident und Vater der Türken: Mustafa Kemal Atatürk ist verstorben.\n\nBis zum Schluss blieb er dem türkischen Volk und der von ihm gegründeten Republik treu. Tausende Trauernde erwiesen ihm in Istanbul die letzte Ehre, bevor sein Leichnam per Transportwagen, Schiff und Zug nach Ankara überführt wurde. Dort fand sein Staatsbegräbnis im Beisein des gesamten Parlaments und Würdenträgern aus aller Welt statt.\n\nNachdem der Vater der modernen türkischen Nation gestorben ist, muss die Republik nach vorne schauen. Die Große Nationalversammlung hat [Root.GetLeader] zu seinem Nachfolger gewählt."
 turkey.1.a:0 "Atatürk wird in Erinnerung bleiben"
 generic.1.t:0 "[From.GetName] beeinflusst unsere Politik"
 generic.1.d_neutral_good:0 "Die [From.GetAdjective]-Regierung hat lange versucht, den Kurs unserer Länder zu harmonisieren und großes Interesse an [Root.GetAdjective]-Politik gezeigt. Dieses Interesse hat sich in letzter Zeit noch verstärkt, als die [From.GetRulingParty] begann, ihre [From.GetRulingIdeology]-Propaganda in zahlreichen Reden und Lesematerialien unter der [Root.GetAdjective]-Bevölkerung zu verbreiten. \n\nMittlerweile lassen sich sogar zahlreiche Politiker und andere Amtsträger von der [From.GetAdjective]-Propaganda beeinflussen und beginnen, sich in [Root.GetName] für [From.GetRulingIdeologyNoun] einzusetzen."
 generic.1.d_bad:0 "Die [From.GetAdjective]-Regierung hat lange versucht, den Kurs unserer Länder zu beeinflussen und sich dabei oft in die Politik von [Root.GetName] einzumischen. In letzter Zeit hat sich dies verschärft, da [From.GetRulingParty] begonnen hat, ihre [From.GetRulingIdeology]-Propaganda ohne Respekt vor [Root.GetAdjective] politischen Traditionen zu verbreiten. Zahlreiche Reden und anderes [From.GetRulingIdeology]-Material werden bereits an die [Root.GetAdjective]-Bevölkerung verteilt. Es scheint, dass sogar einige Politiker und andere Amtsträger von der [From.GetAdjective]-Propaganda beeinflusst werden und begonnen haben, sich für [From.GetRulingIdeologyNoun] in [Root.GetName] einzusetzen."
 generic.1.a:0 "Interessant"
 generic.1.b:0 "Wie können sie es wagen!"
 country_capitulated.0.t:0 "[Root.GetName] hat kapituliert"
 country_capitulated.0.d_positive_both_no_faction:1 "\n[From.From.GetLeader] hat verkündet, dass die feige [Root.GetAdjective] Nation dem Druck der überwältigenden Präsenz der [From.From.GetAdjective] Streitkräfte im ganzen Land nicht länger standhalten konnte. Die [Root.GetAdjective]-Regierung hat sich zur Flucht aus dem Land entschlossen und ist ins Exil gegangen. Ihre Hauptstreitkräfte haben kapituliert, und [From.From.GetNameDef] kontrolliert nun ihre Heimatregion.\nObwohl der Krieg anderswo weitergeht, ist dies ein großer Sieg für [From.From.GetNameDef]."
 country_capitulated.0.d_positive_prev_no_faction:1 "\n[From.From.GetLeader] hat verkündet, dass die feige [Root.GetAdjective] Nation dem Druck der überwältigenden Präsenz der [From.From.GetAdjective] Streitkräfte im ganzen Land nicht länger standhalten konnte. Die [Root.GetAdjective]-Regierung hat sich zur Flucht aus dem Land entschlossen und ist ins Exil gegangen. Ihre Hauptstreitkräfte haben kapituliert, und [From.From.GetNameDef] kontrolliert nun ihre Heimatregion.\nObwohl der Krieg gegen die Überreste der [Root.GetFactionName] anderswo weitergeht, ist dies ein großer Sieg für [From.From.GetNameDef]."
 country_capitulated.0.d_positive_prev_faction:1 "\n[From.From.GetLeader] hat verkündet, dass die feige [Root.GetAdjective] Nation dem Druck der überwältigenden Präsenz der [From.From.GetAdjective] Streitkräfte im ganzen Land nicht länger standhalten konnte. Die [Root.GetAdjective]-Regierung hat sich zur Flucht aus dem Land entschlossen und ist ins Exil gegangen. Ihre Hauptstreitkräfte haben kapituliert, und [From.From.GetNameDef] kontrolliert nun ihre Heimatregion.\nObwohl der Krieg gegen die Überreste der [Root.GetFactionName] anderswo weitergeht, ist dies ein großer Sieg für die gesamte [From.From.GetFactionName]."
 country_capitulated.0.d_negative_both_no_faction:1 "\n[Root.GetLeader] hat verkündet, dass die [Root.GetAdjective] Nation dem Druck der Besatzungstruppen [From.From.GetAdjective] nicht länger standhalten kann und im ganzen Land für Travestien sorgt. Die [Root.GetAdjective]-Regierung ist ins Exil gegangen. Ihre Hauptstreitkräfte haben kapituliert, und [From.From.GetNameDef] kontrolliert nun ihr Heimatgebiet.\nTrotz dieser verheerenden Niederlage ist der Krieg gegen [From.From.GetNameDef] noch lange nicht vorbei."
 country_capitulated.0.d_negative_prev_no_faction:1 "\n[Root.GetLeader] hat verkündet, dass die Nation [Root.GetAdjective] dem Druck der Besatzungstruppen [From.From.GetAdjective], die im ganzen Land für Travestien sorgen, nicht länger standhalten kann. Die [Root.GetAdjective]-Regierung ist ins Exil gegangen. Ihre Hauptstreitkräfte haben kapituliert, und [From.From.GetNameDef] kontrolliert nun ihr Heimatgebiet.\nObwohl der Krieg gegen [From.From.GetNameDef] weitergeht, ist dies ein bedauerlicher Rückschlag für die gesamte [Root.GetFactionName]."
 country_capitulated.0.d_negative_prev_faction:1 "\n[Root.GetLeader] hat verkündet, dass die Nation [Root.GetAdjective] dem Druck der Besatzungstruppen [From.From.GetAdjective], die im ganzen Land für Travestien sorgen, nicht länger standhalten kann. Die [Root.GetAdjective]-Regierung ist ins Exil gegangen. Ihre Hauptstreitkräfte haben kapituliert, und [From.From.GetNameDef] kontrolliert nun ihr Heimatgebiet.\nObwohl der Krieg gegen [From.From.GetNameDef] und den Rest der [From.From.GetFactionName] weitergeht, ist dies ein bedauerlicher Rückschlag für die gesamte [Root.GetFactionName]."
 country_capitulated.0.d_neutral_both_no_faction:1 "\nDie Regierung von [Root.GetAdjective] ist ins Exil gegangen und ihre Hauptstreitkräfte haben vor [From.From.GetNameDef] kapituliert, der nun die Kontrolle über ihr Heimatgebiet hat.\n\nObwohl die Kämpfe zwischen [From.From.GetName] und [Root.GetName] vorbei sind, befindet sich [From.From.GetNameDef] immer noch im totalen Krieg und die Kämpfe gehen anderswo weiter."
 country_capitulated.0.d_neutral_prev_no_faction:2 "\nDie Regierung von [Root.GetAdjective] ist ins Exil gegangen und ihre Hauptstreitkräfte haben vor [From.From.GetNameDef] kapituliert, der nun die Kontrolle über ihr Heimatgebiet hat.\n\nDer Kampf in [Root.GetName] war nur ein kleiner Teil des Konflikts. Der Krieg zwischen [From.From.GetNameDef] und dem, was von [Root.GetFactionName] übrig geblieben ist, geht anderswo weiter."
 country_capitulated.0.d_neutral_prev_faction:2 "\nDie [Root.GetAdjective]-Regierung ist ins Exil gegangen und ihre Hauptstreitkräfte haben vor [From.From.GetNameDef] kapituliert, der nun die Kontrolle über ihr Heimatgebiet hat.\n\nDer Kampf zwischen [From.From.GetNameDef] und [Root.GetNameDef] war nur ein kleiner Teil des Konflikts. Der Krieg zwischen [From.From.GetFactionName] und dem, was von [Root.GetFactionName] übrig geblieben ist, geht anderswo weiter."
 country_capitulated.0.a:0 "Tolle Neuigkeiten!"
 country_capitulated.0.b:0 "Dies sind dunkle Zeiten"
 country_capitulated.0.c:0 "Unsichere Zeiten"
 britain.22.t:0 "Stanley Baldwin tritt zurück"
 britain.22.d:0 "Zwei Wochen nach der Krönung von König Georg VI. gab Baldwin bekannt, dass er mit 70 Jahren von seinem Amt als Premierminister zurücktreten werde. Seit 1923 führte er die britische Regierung mit Unterbrechungen und war die beständige Hand, die das Britische Empire aus der Weltwirtschaftskrise führte. In den letzten Jahren begleitete er, wenn auch widerwillig, den Beginn der imperialen Wiederaufrüstung und die Abdankung von König Edward VIII. Er tritt als beliebter und erfolgreicher Premierminister zurück. Doch hat er genug getan, um der wachsenden Bedrohung durch Deutschland entgegenzuwirken?"
 britain.22.a:0 "Herr Chamberlain wird versuchen, eine Regierung zu bilden."
 france.31.t:0 "Édouard Daladier tritt zurück"
 france.31.d:0 "Nach dem Zusammenbruch der Dritten Republik und der Weigerung der deutschen Regierung, einen Waffenstillstand anzubieten, muss eine neue Führung den Kampf von den Kolonien aus fortsetzen. Obwohl kaum jemand bezweifeln dürfte, dass Monsieur Daladier ein hervorragender Premierminister war, war er den außergewöhnlichen Umständen, in denen sich Frankreich befand, einfach nicht gewachsen. Wir können nur hoffen, dass es Licht am Ende des Tunnels gibt."
 france.31.a:0 "Monsieur Reynaud wird versuchen, eine Regierung zu bilden."
 germany.999.t:0 "Eine Geschichte zweier Städte"
 germany.999.desc:0 "Nach dem überwältigenden Sieg der deutschen Streitkräfte ist es an der Zeit, die letzten Überreste der bolschewistischen Herrschaft in Europa zu zerstören. Noch heute schmücken die Namen Stalins und Lenins zwei Großstädte im neuen deutschen Lebensraum und verspotten die Soldaten, die ihr Leben für ihre Eroberung gaben. \n\nDer „Verband der Veteranen des Weltkriegs“ hat der Regierung einen Vorschlag zur Behebung dieses schrecklichen Zustands vorgelegt."
 germany.999.a:0 "Lasst uns die Helden des letzten Krieges ehren!"
 germany.999.b:0 "Was für ein absurder Vorschlag!"
 GAME_OVER_TT:0 "§RDas Spiel ist für dich vorbei.§!"
 CAN_ANGERED_WORKERS:0 "Dies wird die Bevölkerung verärgern"
 generic.2.t:0 "[From.GetNameDefCap] möchte [Root.GetFactionName] beitreten"
 generic.2.d.a:0 "Angesichts der zunehmenden Bedrohung der Freiheit und der demokratischen Werte betrachten uns die [alliance_applicant.GetAdjective] als Verteidiger der Freiheit. Sie möchten nun in unser Bündnis aufgenommen werden, um unseren Schutz zu genießen und gemeinsam mit uns gegen die Kräfte zu kämpfen, die die Demokratie bedrohen."
 generic.2.d.b:0 "Unser Bestreben, die bestehende Weltordnung umzustürzen, ist auch gleichgesinnten Nationen nicht entgangen. Die [alliance_applicant.GetAdjective] haben erkannt, dass ihre beste Chance auf eine erfolgreiche Zukunft darin besteht, sich im kommenden Konflikt mit uns zu verbünden, und haben daher angeboten, sich offiziell mit uns gegen unsere Feinde zu verbünden."
 generic.2.d.c:0 "[alliance_applicant.GetNameDefCap] hat erkannt, dass sie sich mit anderen sozialistischen Republiken zusammenschließen muss, um die Stellung des Kommunismus in der Welt zu stärken. [alliance_applicant.GetAdjective] erkennt unsere führende Rolle in der internationalen Notlage der Arbeiter an und bittet nun darum, formell ein Bündnis mit uns einzugehen."
 generic.2.d.e:0 "Da die aktuellen Umwälzungen in der internationalen Politik weiterhin weltweit nachhallen, sehen die [alliance_applicant.GetAdjective] in uns ihre größte Chance, diese turbulenten Zeiten zu überstehen. Sie beantragen daher die Aufnahme in unsere Allianz, damit wir den kommenden Sturm gemeinsam überstehen können."
 generic.2.a:0 "Alle, die für Freiheit und Demokratie eintreten, können sich uns anschließen."
 generic.2.b:0 "Die Welt gehört allen, die stark sind!"
 generic.2.c:0 "Wenn wir zusammenhalten, kann die Revolution nur siegen."
 generic.2.e:0 "Und wir werden es überstehen!"
 generic.2.f:0 "Ohne sie geht es uns besser."
 generic.2.g:0 "Wir haben bereits die Verbündeten, die wir brauchen."
 generic.3.t:0 "[alliance_inviter.GetNameDefCap] heißt uns willkommen bei [alliance_inviter.GetFactionName]"
 generic.3.d:0 "[alliance_inviter.GetNameDefCap] hat beschlossen, unsere Anfrage zum Beitritt zu [alliance_inviter.GetFactionName] anzunehmen. Von nun an werden wir gemeinsam bestehen oder fallen."
 generic.3.a:0 "Gemeinsam werden wir die Demokratie verteidigen."
 generic.3.b:0 "Niemand kann uns widerstehen!"
 generic.3.c:0 "Die Notlage der Arbeiter könnte sich keine besseren Verfechter wünschen!"
 generic.3.e:0 "Wir werden unsere Differenzen vorerst beiseite legen."
 generic.4.t:0 "[alliance_inviter.GetNameDefCap] lehnt die Anfrage zum Beitritt zu [alliance_inviter.GetFactionName] ab"
 generic.4.d:0 "[alliance_inviter.GetNameDefCap] hat beschlossen, unsere Anfrage zum Beitritt zu [alliance_inviter.GetFactionName] abzulehnen. Wir müssen ohne ihre Hilfe auskommen."
 generic.4.a:0 "Sie nennen sich Verteidiger der Freiheit?"
 generic.4.b:0 "Dann werden wir auch sie vernichten!"
 generic.4.c:0 "Ihre Revolution ist korrupt!"
 generic.4.e:0 "Unsere Unterschiede waren zu groß."
 news.289.t:0 "[alliance_applicant.GetNameDefCap] tritt der [alliance_inviter.GetFactionName] bei"
 news.289.d:0 "\nHeute haben [alliance_inviter.GetNameDef] und [alliance_applicant.GetNameDef] eine gemeinsame Erklärung abgegeben, in der sie dem letztgenannten nun offiziell den Mitgliedsstatus der [alliance_inviter.GetFactionName] zuerkannt haben. Ob diese Partnerschaft für offensive oder defensive Zwecke genutzt wird, bleibt abzuwarten, aber zweifellos laufen bereits umfangreiche gemeinsame militärische Planungen."
 news.289.a:0 "Gemeinsam sind wir stärker."
 news.289.b:0 "Sie suchen Stärke in der Anzahl."
 news.289.c:0 "Es wird ihnen nichts nützen!"
 news.289.e:0 "Der Krieg eskaliert..."
 news.289.f:0 "Unsere Allianz wird stärker."
 generic.5.t:0 "[From.GetNameDefCap] lädt [Root.GetNameDef] zum [From.GetFactionName] ein"
 generic.5.d.a:0 "Mit Argwohn beobachtet [alliance_inviter.GetNameDef] die jüngsten Entwicklungen in der Weltpolitik und bietet uns seine Hand zur Freundschaft, seinen Schutz und fordert uns auf, gemeinsam mit ihm die Prinzipien von Freiheit und Demokratie zu verteidigen. Als Mitglied von [alliance_inviter.GetFactionName] kann die Freiheit unseres Volkes gewahrt werden."
 generic.5.d.b:0 "Da selbst die Mächtigen manchmal Verbündete brauchen, hat uns die [alliance_inviter.GetAdjective] eingeladen, der [alliance_inviter.GetFactionName] beizutreten. Wenn wir die Einladung annehmen, bietet sich uns möglicherweise die Gelegenheit, unseren Platz an der Sonne zu finden."
 generic.5.d.c:0 "Unsere ideologischen Verbündeten in [alliance_inviter.GetNameDef] haben unsere wertvollen Beiträge zur Sache der Arbeiter zur Kenntnis genommen und heute Morgen eine Einladung erhalten, der [alliance_inviter.GetFactionName] beizutreten. Gemeinsam mit anderen sozialistischen Republiken könnten wir die Revolution mit neuer Kraft vorantreiben."
 generic.5.d.e:0 "Es scheint, dass die [alliance_inviter.GetAdjective] uns als strategisch interessant erachtet und es für gewinnbringender hält, wenn wir zusammenarbeiten, als uns durch unsere ideologischen Differenzen spalten zu lassen. Heute Morgen hat uns der [alliance_inviter.GetAdjective]-Botschafter eine Einladung überbracht, Mitglied der [alliance_inviter.GetFactionName] zu werden."
 generic.5.a:0 "Wir werden ihnen zur Seite stehen."
 generic.5.b:0 "Wir brauchen nur ein paar tausend Tote …"
 generic.5.c:0 "Wir werden an der Seite unserer Kameraden kämpfen!"
 generic.5.e:0 "Es ist die gewinnbringende Wahl."
 generic.6.t:0 "[alliance_applicant.GetNameDefCap] nimmt die Einladung zu [alliance_inviter.GetFactionName] an"
 generic.6.d:0 "[alliance_applicant.GetNameDefCap] hat beschlossen, unser Angebot anzunehmen und der [alliance_inviter.GetFactionName] beizutreten. Von nun an werden wir gemeinsam bestehen oder fallen."
 generic.7.t:0 "[alliance_applicant.GetNameDefCap] lehnt Angebot zum Beitritt zu [alliance_inviter.GetFactionName] ab"
 generic.7.d:0 "[alliance_applicant.GetNameDefCap] hat beschlossen, unser Angebot, der [alliance_inviter.GetFactionName] beizutreten, abzulehnen. Wir müssen ohne ihre Hilfe auskommen."
 generic.7.a:0 "Unsere Hilfe ist nicht erwünscht."
 news.290.t:0 "Otto übernimmt die ungarische Krone"
 news.290.desc:0 "Auf der Suche nach einem geeigneten König lud das Königreich Ungarn Otto von Habsburg ein, in die Länder zurückzukehren, die bis vor Kurzem von seiner Familie regiert worden waren. Otto, der seit dem Ende des Ersten Weltkriegs und der Auflösung des Reiches seines Vaters im Exil in ganz Westeuropa lebte, nahm das Angebot an. Heute wurde er unter großem Tamtam und Jubel in einer feierlichen Zeremonie im Budapester Königspalast zum König von Ungarn gekrönt.\n\nIn seiner Krönungsrede dankte König Otto dem ungarischen Volk für seine Treue und Hingabe und gelobte, die habsburgischen Länder wieder zu vereinen. Dieses Mal werde Ungarn der dominierende Teil sein."
 news.290.a:0 "Es ist nicht länger nur dem Namen nach ein Königreich."
 news.290.b:0 "Das ist gefährliches Gerede …"
 news.290.c:0 "Das Rennen um Österreich hat begonnen!"
 news.290.e:0 "Wird das Imperium wieder auferstehen?"
 news.291.t:0 "Österreich stimmt für Vereinigung mit Ungarn"
 news.291.desc:0 "Auf Drängen der Ungarn hat Österreich ein Referendum über die mögliche Wiedervereinigung der beiden Nationen unter der habsburgischen Krone durchgeführt. Die endgültige Stimmenauszählung ist fast abgeschlossen, doch bereits jetzt zeichnet sich ein Erdrutschsieg für die Wiedervereinigungsbefürworter ab. Es wurden keine Unregelmäßigkeiten im Abstimmungsprozess gemeldet, und die österreichische Regierung sah sich gezwungen, eine Regionalregierung des ungarischen Staates zu bilden. Obwohl dieser Schritt in der ungarischen Bevölkerung großen Anklang findet, dürften die politischen Auswirkungen des Referendums in ganz Europa spürbar sein."
 news.291.a:0 "Unsere brüderlichen Bande sind nicht vergessen."
 news.291.b:0 "Dies wird nicht ohne Folgen bleiben..."
 news.291.c:0 "Das Machtvakuum des Imperiums könnte noch gefüllt werden …"
 news.292.desc:0 "Auf Drängen der Ungarn hat Österreich ein Referendum über die mögliche Wiedervereinigung der beiden Nationen unter der habsburgischen Krone durchgeführt. Die endgültige Stimmenauszählung ist fast abgeschlossen, doch bereits jetzt zeichnet sich ein Erdrutschsieg für die Wiedervereinigungsbefürworter ab. Zahlreiche Berichte über Ungereimtheiten, Wahlbetrug und Wahlmanipulationen wiesen die österreichischen Behörden jedoch zurück und begannen bereits mit der Umgestaltung der Verwaltung hin zu einer Regionalregierung des ungarischen Staates. Obwohl dieser Schritt in der ungarischen Bevölkerung auf große Zustimmung stößt, dürften die politischen Auswirkungen des Referendums in ganz Europa spürbar sein."
 news.292.a:0 "Brüderliche Bindungen und ein paar praktische Bestechungsgelder …"
 news.292.b:0 "Das war unser Plan!"
 news.292.c:0 "Das Machtvakuum des Imperiums könnte noch gefüllt werden …"
 news.292.e:0 "Ein Affront gegen die Demokratie!"
 news.293.t:0 "Österreich stimmt gegen die Wiedervereinigung"
 news.293.desc:0 "Auf Drängen der Ungarn hat Österreich ein Referendum über die mögliche Wiedervereinigung der beiden Nationen unter der habsburgischen Krone durchgeführt. Die endgültige Abstimmung ist fast abgeschlossen, doch ein Sieg der Wiedervereinigungspartei ist bereits außer Reichweite. Die österreichische Regierung hat sich daher gegen den Beitritt zu einer österreichisch-ungarischen Union entschieden.\n\nIm Geiste der Demokratie und Selbstbestimmung hat Ungarn das Ergebnis akzeptiert und beschlossen, seine Vorschläge nicht weiter zu verfolgen."
 news.293.a:0 "Sehr bedauerlich."
 news.293.b:0 "Unsere Unabhängigkeit ist gesichert!"
 news.293.c:0 "Ausgezeichnet ... Wir sind als Nächstes dran."
 news.293.e:0 "Der Untergang des Imperiums war also endgültig."
 news.294.t:0 "Österreich stimmt gegen die Wiedervereinigung"
 news.294.desc:0 "Auf Drängen der Ungarn hat Österreich ein Referendum über die mögliche Wiedervereinigung der beiden Nationen unter der habsburgischen Krone abgehalten. Die endgültige Stimmenauszählung ist fast abgeschlossen, doch ein Sieg der Wiedervereinigungspartei ist bereits außer Reichweite. Die österreichische Regierung hat sich daher gegen den Beitritt zu einer österreichisch-ungarischen Union entschieden.\n\nUngarn wirft der österreichischen Regierung jedoch Wahlmanipulationen gegen die Wiedervereinigung vor. Ungarn hat erklärt, dass es vor Gewalt nicht zurückschrecken werde, um den Wunsch des österreichischen Volkes nach einer Wiedervereinigung mit seinen ungarischen Brüdern zu schützen. Beide Seiten haben nun begonnen, zu mobilisieren, und ein Krieg scheint unvermeidlich."
 news.294.a:0 "Was sind schon ein paar Tode für ein Imperium?"
 news.294.b:0 "Wir werden Wien bis zum letzten Mann verteidigen!"
 news.294.c:0 "Das ruiniert alle unsere Pläne ..."
 news.294.e:0 "Hoffen wir, dass sich der Konflikt nicht ausweitet."
 news.295.t:0 "Wiederherstellung Österreich-Ungarns"
 news.295.desc:0 "Nach der Wiedervereinigung Österreichs und Ungarns versammelte die ungarische Regierung die internationale Presse in Budapest und verkündete die Wiederherstellung des österreichisch-ungarischen Kaiserreichs. König Otto hat seinen rechtmäßigen Titel als Kaiser von Österreich angenommen und sein Gelübde bekräftigt, dass er nicht ruhen werde, bis alle habsburgischen Länder wiedervereinigt seien, auch wenn das Kaiserreich nur noch ein Schatten seiner selbst sei. Ihre Nachbarn beobachten die Vorgänge in Budapest zweifellos misstrauisch."
 news.295.a:0 "Wie ein Phönix aus der Asche."
 news.295.b:0 "Dies ändert die Situation erheblich ..."
 news.295.c:0 "Werden sie ein Freund oder ein Feind sein?"
 news.295.e:0 "Wir sollten unsere Grenzen besser befestigen ..."
 news.296.t:0 "Wilhelm übernimmt die ungarische Krone"
 news.296.desc:0 "Auf der Suche nach einem König für ihr Land luden die Ungarn nach langen Verhandlungen und Vorbereitungen Anfang dieser Woche den schwedischen Prinzen Wilhelm, Herzog von Södermanland, offiziell ein. Heute wurde er unter großem Tamtam und Jubel in einer feierlichen Zeremonie im Budapester Königspalast zum König von Ungarn gekrönt. Dem neuen König wird nachgesagt, dass ihm das Wohl seines Volkes am Herzen liege und er dessen demokratische Rechte nachdrücklich unterstütze. Darüber hinaus befürworte er den Dialog mit Ungarns Nachbarn statt Feindseligkeit. Der neue König könnte sich daher als willkommene Hilfe zur Entspannung der Spannungen in der Region erweisen."
 news.296.b:0 "Ein weiterer Schwächling erhebt sich."
 news.296.c:0 "Ein anderer, der die Fackel trägt."
 news.297.t:0 "Friedrich Franz übernimmt die ungarische Krone"
 news.297.desc:0 "Auf der Suche nach einem König für ihr Land luden die Ungarn nach langen Verhandlungen und Vorbereitungen Anfang dieser Woche den deutschen Großherzog Friedrich Franz von Mecklenburg-Schwerin offiziell ein. Heute wurde er unter großem Tamtam und Jubel in einer feierlichen Zeremonie im Budapester Königspalast zum König von Ungarn gekrönt. Die ideologischen Neigungen des neuen Königs, der seit 1931 Mitglied der SS ist, sind bekannt. Er hat bereits erklärt, er werde Ungarn die Größe bringen, die es verdient, koste es, was es wolle. Zusammen mit seinem Versprechen, das Unrecht der Vergangenheit wiedergutzumachen, ist es daher unwahrscheinlich, dass diese Krönung zu einer Entspannung der Spannungen in der Region führen wird."
 news.297.b:0 "Eine zutiefst beunruhigende Entwicklung …"
 news.297.c:0 "Ein neuer potenzieller Verbündeter!"
 news.298.t:0 "Ungarn kündigt den Vertrag von Trianon"
 news.298.desc:1 "In einer öffentlichen Erklärung hat [HUN.GetLeader] den Vertrag, den die Alliierten nach dem Ersten Weltkrieg auferlegt hatten, aufgekündigt. Der 1920 unter Protest der Ungarn unterzeichnete Vertrag führte zu einer erheblichen Verkleinerung des Landes und einer Begrenzung der militärischen Stärke.\n\nIn seiner Rede deutete [HUN.GetLeader] bereits an, dass Ungarn seine Ansprüche auf die ihm vor zwei Jahrzehnten abgenommenen Gebiete bald wieder bekräftigen könnte."
 news.298.a:0 "Die Demütigung ist vorbei, aber nicht vergessen!"
 news.298.b:0 "Sie mischen sich in die Weltordnung ein …"
 news.298.c:0 "Sie sind dem Joch von Versailles entkommen."
 news.299.t:0 "Ungarn proklamiert Großungarn"
 news.299.desc:0 "Nachdem [From.GetLeader] die Gebiete zurückerlangt hatte, die ihm im Vertrag von Trianon entzogen worden waren, verkündete das Land gestern Abend in einer Proklamation, dass es fortan Großungarn heißen soll. Man hofft, dass dies das Ansehen Großungarns in der Welt steigern und die Ausdehnung seiner Grenzen besser beschreiben wird."
 news.299.a:0 "Die Welt wird unsere Macht sehen."
 news.299.b:0 "Sie sind ein bisschen von sich selbst eingenommen."
 news.300.t:0 "Ungarn fordert Siebenbürgen"
 news.300.desc:0 "Um den Vertrag von Trianon weiter rückgängig zu machen, hat Ungarn Rumänien ein Ultimatum gestellt und die Rückgabe Siebenbürgens gefordert. Eine offizielle Antwort liegt noch nicht vor, Ungarn hat jedoch bereits angedeutet, dass im Falle einer Ablehnung der Forderungen auch Waffengewalt in Betracht gezogen wird."
 news.300.a:0 "Wir lassen uns nicht länger einschüchtern!"
 news.300.b:0 "Wir müssen schnell denken ..."
 news.300.c:0 "Hoffen wir, dass sie es friedlich regeln."
 news.301.t:0 "Rumänien gibt Siebenbürgen zurück"
 news.301.desc:0 "Rumänien hat angekündigt, den ungarischen Forderungen nach einer Rückgabe Siebenbürgens nachzukommen. Damit ist das Gebiet nun wieder mit dem Land vereint, was seine Größe und Stärke deutlich erhöht hat. Es ist unwahrscheinlich, dass ein Erfolg dieser Größenordnung die Ungarn davon abhalten wird, weitere Forderungen nach ihren verbleibenden verlorenen Gebieten zu stellen."
 news.301.a:0 "Wir sind auf dem Weg zur Größe!"
 news.301.b:0 "Wir hatten keine Wahl."
 news.301.c:0 "Zumindest blieb der Frieden gewahrt."
 news.302.t:0 "Rumänien weist ungarische Forderungen zurück"
 news.302.desc:0 "Die Frist für das Ultimatum ist abgelaufen, ohne dass Rumänien eine Antwort erhalten hat. Empörte ungarische Politiker haben die rumänische Regierung bereits angeprangert und behauptet, sie destabilisiere die Region, indem sie auf „rechtswidrigen Verträgen“ beharre. Beide Länder scheinen sich auf einen Krieg vorzubereiten, der jeden Tag ausbrechen könnte."
 news.302.a:0 "Wenn sie nur auf Stärke hören ..."
 news.302.b:0 "Lasst sie kommen!"
 news.302.c:0 "Ihr steinköpfigen Narren ..."
 news.303.t:0 "Ungarn fordert die Südslowakei"
 news.303.desc:0 "Ungarn hat seine Versprechen, den Vertrag von Trianon zu revidieren, eingelöst und von [From.GetName] die Rückgabe der Südslowakei gefordert. Die [From.GetAdjective] haben bisher nicht reagiert, doch die Kriegsdrohung in der ungarischen Rhetorik ist nur allzu deutlich. Eine Ablehnung könnte durchaus zu einem neuen Krieg in der Region führen."
 news.303.a:0 "Sie können froh sein, dass wir nichts anderes verlangen."
 news.303.b:0 "Hoffen wir, dass wir einen Kompromiss finden können …"
 news.304.t:0 "[From.GetName] Gibt die Südslowakei zurück"
 news.304.desc:0 "[From.GetName] hat die ungarischen Forderungen nach der Rückgabe der Südslowakei offiziell angenommen und bereits eilig Schritte eingeleitet, um die sofortige Rückgabe des Gebiets an Ungarn sicherzustellen. Es ist unwahrscheinlich, dass dieser Erfolg die Ungarn davon abhalten wird, weitere Forderungen nach den verbleibenden verlorenen Gebieten zu stellen."
 news.304.a:0 "Wir heißen sie wieder in unserer Mitte willkommen."
 news.305.t:0 "[From.From.GetName] lehnt ungarische Forderungen ab"
 news.305.desc:0 "Die diplomatischen Verhandlungen sind gescheitert, und [From.From.GetName] hat heute die ungarischen Forderungen nach der Rückgabe der Südslowakei öffentlich zurückgewiesen. Empörte ungarische Beamte haben die Regierung von [From.From.GetName] bereits angeprangert und behauptet, sie destabilisiere die Region, indem sie auf „rechtswidrigen Verträgen“ beharrt. Beide Nationen scheinen sich auf einen Krieg vorzubereiten, der jeden Tag ausbrechen könnte."
 news.306.t:0 "Ungarn fordert die Vojvodina"
 news.306.desc:0 "Angesichts ihrer bisherigen Erfolge bei der Rückgabe verlorener Gebiete fordern die Ungarn nun von Jugoslawien die Rückgabe der Vojvodina. Während die Jugoslawen um eine diplomatische Lösung ringen, wird die Ungeduld der Ungarn immer deutlicher. Sollten die Jugoslawen die Forderungen ablehnen, ist eine friedliche Lösung unwahrscheinlich."
 news.306.a:0 "Der Marsch nach Großungarn geht weiter."
 news.306.b:0 "Wir müssen schnell denken ..."
 news.307.t:0 "Jugoslawien gibt die Vojvodina zurück"
 news.307.desc:0 "Jugoslawien hat sich den ungarischen Forderungen gefügt und die rasche Übergabe der Vojvodina an sein Nachbarland veranlasst. Obwohl hierfür viel Kanonenbootpolitik nötig war, ist Ungarn unbestreitbar zu einer neuen regionalen Macht geworden."
 news.307.a:0 "Ein weiterer diplomatischer Sieg!"
 news.308.t:0 "Jugoslawien weist ungarische Forderungen zurück"
 news.308.desc:0 "In einem klaren Akt des Widerstands haben die Jugoslawen die ungarischen Forderungen nach der Vojvodina zurückgewiesen. Ungarn seinerseits unternimmt keine Anstrengungen, seine Drohungen mit Gewalt zur Sicherung seines „rechtmäßigen Territoriums“ zurückzunehmen. Beide Nationen scheinen sich auf einen Krieg vorzubereiten, der jeden Tag ausbrechen könnte."
 news.309.t:0 "Ungarn beansprucht die Oberhoheit über die Slowakei"
 news.309.desc.a:1 "Die Ungarn fordern, dass die Slowakei wieder Teil ihres Landes wird, entweder als integraler Bestandteil oder als autonome Region. Ein entsprechendes Ultimatum wurde gestellt und mit Gewaltandrohung untermauert. Diplomaten mehrerer europäischer Länder bemühen sich fieberhaft um eine friedliche Lösung der jüngsten Krise."
 news.309.desc.b:0 "Die Ungarn fordern, dass die Slowakei wieder Teil ihres Landes wird, entweder als integraler Bestandteil oder als autonome Region. Ein entsprechendes Ultimatum wurde gestellt und mit Gewaltandrohung untermauert. Die slowakische Regierung bemüht sich fieberhaft um eine diplomatische Lösung der jüngsten ungarischen Krise."
 news.309.a:0 "Hoffen wir, dass keine Gewalt nötig sein wird."
 news.309.b:0 "Dies ist keine geringe Forderung …"
 news.309.c:0 "Sind wir bereit, unsere Unabhängigkeit aufzugeben?"
 news.310.t:0 "[From.GetName] Höhlen nach Ungarn"
 news.310.desc.a:1 "Nach eingehender Beratung hat die [From.GetAdjective]-Regierung unter [From.GetLeader] beschlossen, den ungarischen Forderungen nachzugeben. Sie akzeptierte die ungarische Kontrolle über die Slowakei und zog es vor, [HUN.GetLeader] zu beschwichtigen, um den Frieden zu wahren. Dies wird zweifellos die ungarische Entschlossenheit im zukünftigen Umgang mit ihren geschwächten Nachbarn stärken."
 news.310.desc.b:0 "Nach langen Überlegungen haben die Slowaken beschlossen, den ungarischen Forderungen nachzugeben. Da sie keine Alternative sahen, verzichteten sie auf ihre Unabhängigkeit, um das Leben ihrer Bevölkerung zu retten. Dies wird zweifellos die ungarische Entschlossenheit im zukünftigen Umgang mit ihren geschwächten Nachbarn stärken."
 news.310.a:0 "Den Slowaken geht es so besser."
 news.310.b:0 "Es war ein notwendiges Opfer."
 news.311.t:1 "[From.From.GetName] lehnt ungarische Forderungen ab"
 news.311.desc.a:1 "Zwischen Deutschland und Ungarn ist eine diplomatische Krise um das Schicksal der Slowakei ausgebrochen. [HUN.GetLeader] hatte zuvor erklärt, die Slowakei sei aufgrund ihrer historischen Verbindungen zu Ungarn ein zentrales Anliegen von [HUN.GetNameDef]. Seine Regierung erwarte, bei allen Maßnahmen, die die Slowakei betreffen, konsultiert zu werden. \n\nDer deutsche Regierungschef [GER.GetLeader] lehnt derartige Forderungen ab und bezeichnet sie als „törichte und gefährliche Einmischung in die inneren Angelegenheiten eines souveränen Staates“. \n\nAngesichts der zunehmenden Spannungen fragen sich immer mehr Beobachter, ob Ungarn möglicherweise zu Gewalt greift, um vollendete Tatsachen zu schaffen."
 news.311.desc.b:0 "Die Slowaken klammern sich hartnäckig an ihre Unabhängigkeit, weisen die ungarischen Forderungen zurück und verstärken ihre Grenze. Ungarn unternimmt keine Anstrengungen, die Lage zu deeskalieren, und beide Nationen scheinen auf Kriegskurs zu sein."
 news.311.b:0 "Wir stehen zusammen. Lasst sie kommen!"
 news.312.t:0 "Erneuerung der Römischen Protokolle"
 news.312.desc.a:0 "Auf ungarisches Betreiben haben Italien, Österreich und Ungarn die 1934 unterzeichneten Römischen Protokolle erneuert. Die Abkommen betreffen wirtschaftliche Entwicklung und Annäherung. Im Wesentlichen handelt es sich dabei um eine Freundschaftserklärung, doch es gibt Anzeichen dafür, dass daraus ein offizielles Bündnis entstehen könnte, das den wachsenden revisionistischen und expansionistischen Tendenzen Deutschlands entgegenwirken soll."
 news.312.desc.b:0 "Auf ungarisches Betreiben haben Italien und Ungarn die ursprünglich 1934 unterzeichneten Römischen Protokolle erneuert. Die Abkommen betreffen wirtschaftliche Entwicklung und Annäherung. Im Wesentlichen handelt es sich dabei um eine Freundschaftserklärung, doch es gibt Anzeichen dafür, dass daraus ein offizielles Bündnis entstehen könnte, das den wachsenden revisionistischen und expansionistischen Tendenzen Deutschlands entgegenwirken soll."
 news.312.a:0 "Wir heißen unsere neuen Freunde willkommen."
 news.312.b:0 "Das verheißt nichts Gutes ..."
 news.312.c:0 "Vielleicht kann daraus etwas Gutes entstehen."
 news.313.t:0 "Römischer Pakt geschlossen"
 news.313.desc.a:0 "Die Regierungen Italiens, Österreichs und Ungarns verkündeten heute in einer gemeinsamen Erklärung die Gründung des Römischen Pakts. Die drei Mächte gelobten, sich im Bedarfsfall gegenseitig militärisch zu unterstützen – sowohl defensiv als auch offensiv. Das Kräfteverhältnis in der Region hat sich über Nacht drastisch verändert."
 news.313.desc.b:0 "Die Regierungen Italiens und Ungarns verkündeten heute in einer gemeinsamen Erklärung die Gründung des Römischen Pakts. Die beiden Mächte haben sich gegenseitig militärisch unterstützt, sowohl defensiv als auch offensiv, sollte dies nötig sein. Das Kräfteverhältnis in der Region hat sich über Nacht drastisch verändert."
 news.313.a:0 "Wir stehen zusammen."
 news.313.b:0 "Das ist ein Grund zur Sorge ..."
 news.313.c:0 "Deutschland ist nicht länger ohne Widerstand."
 news.314.t:0 "Horthy ermordet"
 news.314.desc:0 "Aus Ungarn sind Berichte aufgetaucht, denen zufolge Miklos Horthy heute von einem Einzeltäter erschossen wurde, nachdem er das Parlamentsgebäude in Budapest verlassen hatte. Obwohl er sofort ins Krankenhaus eingeliefert worden war, stellten die Ärzte bei seiner Ankunft fest, dass er bereits tot war. Der Schütze, der von der Polizei auf der Flucht erschossen wurde, wurde als Mitglied der Kommunistischen Partei identifiziert. Der Mordanschlag hat in der ungarischen Innenpolitik für Aufruhr gesorgt, da Horthys antikommunistische Neigungen entscheidend dazu beitrugen, revolutionäre Elemente in Schach zu halten. Ohne den alten Admiral an der Spitze der politischen Szene dürfte der kommunistische Einfluss dramatisch zunehmen."
 news.314.a:0 "Das Leben eines Menschen ist nur ein geringer Preis."
 news.314.b:0 "Die Revolution ist nicht aufzuhalten!"
 news.314.c:0 "Können die Kommunisten noch tiefer sinken?"
 news.315.t:0 "Österreich lehnt Referendum ab"
 news.315.desc:0 "Österreich hat die ungarischen Forderungen nach einem Referendum trotz der zunehmenden Aggressivität Ungarns strikt zurückgewiesen. Ungarn wirft der österreichischen Regierung vor, die demokratischen Rechte des Volkes eklatant zu missachten. Sie erklärte, sie werde nicht vor Gewalt zurückschrecken, um den Wunsch des österreichischen Volkes nach einer Wiedervereinigung mit seinen ungarischen Brüdern zu schützen. Beide Seiten haben nun begonnen, sich zu mobilisieren, und ein Krieg scheint unvermeidlich."
 news.316.t:0 "Die polnisch-rumänische Allianz"
 news.316.desc:0 "Polen und Rumänen haben ihre gegenseitige Verteidigungsverpflichtung erneuert. Obwohl die beiden Länder seit über einem Jahrzehnt gute Beziehungen pflegen, deutet die heutige Ankündigung darauf hin, dass die gegenseitige Verteidigung die militärischen Planungen sowohl in Polen als auch in Rumänien zunehmend dominiert."
 news.316.a:0 "Wir brauchen einander."
 news.316.b:0 "Sie glauben, es wird sie retten?"
 news.316.c:0 "Hoffen wir, dass es sich auszahlt."
 news.317.t:0 "Der Cordon Sanitaire"
 news.317.desc:0 "Angesichts der zunehmenden Gefahren, die von den Ideologien im Osten und Westen ausgehen, haben die Rumänen die Gründung des Cordon Sanitaire angekündigt. Das Bündnis heißt alle willkommen, die in Osteuropa von Faschismus und Kommunismus erdrückt werden. Einige Länder erwägen bereits, sich mit Rumänien zu verbünden."
 news.317.a:0 "Wir übernehmen die Verantwortung."
 news.317.b:0 "Wir stehen an der Seite Rumäniens."
 news.317.g:0 "Das bringt unsere Pläne durcheinander ..."
 news.317.e:0 "Eine lobenswerte Initiative."
 news.317.f:0 "Wer ist jetzt feindselig?"
 news.318.t:0 "Bulgarien unterwirft sich Rumänien"
 news.318.desc:0 "Als Reaktion auf ein rumänisches Ultimatum und angesichts der drohenden sofortigen rumänischen Militäraktionen im Falle einer Ablehnung haben die Bulgaren ihre Regierung grundlegend umgestaltet, um sie rumänienfreundlicher zu gestalten. Bulgarien hat alle Forderungen seines Nachbarn akzeptiert, und es ist unwahrscheinlich, dass es weitere Forderungen ablehnen wird. Daher kann man Bulgarien nur noch als rumänische Marionette betrachten."
 news.318.a:0 "Sie wussten, was das Beste für sie war."
 news.318.b:0 "Eine notwendige Maßnahme..."
 news.318.c:0 "Eine beunruhigende Entwicklung."
 news.319.t:0 "Bulgarien weist rumänische Forderungen zurück"
 news.319.desc:0 "Obwohl Bulgarien ein Ultimatum gestellt bekam und im Falle einer Ablehnung mit sofortigen rumänischen Militäraktionen rechnen musste, lehnte es die rumänischen Forderungen ab. Rumänien weigerte sich, nachzugeben, und beide Länder scheinen auf dem Weg zu einem militärischen Konflikt zu sein."
 news.319.a:0 "Sie werden sehen, wie falsch sie lagen."
 news.319.b:0 "Komme und nimm es!"
 news.319.c:0 "Schon wieder ein Balkankrieg...?"
 news.324.t:0 "Jugoslawien unterwirft sich Rumänien"
 news.324.desc:0 "Angesichts der rumänischen Forderungen nach einer „drastischen Umstrukturierung“ des Staates und der Androhung militärischer Gewalt im Falle einer Ablehnung sah Jugoslawien keine andere Möglichkeit, als sich zu unterwerfen. Die angekündigte „Umstrukturierung“ führte jedoch nicht nur zur Aufteilung Jugoslawiens in seine Teilstaaten, sondern auch zur Einsetzung von Marionettenregierungen. Es ist klar, dass unter dem Vorwand des Selbstbestimmungsrechts vor allem rumänische Interessen verfolgt wurden und dass der rumänische Einfluss in der Region weiter wächst."
 news.324.a:0 "Was für ein Meisterstück!"
 news.324.b:0 "Wie hinterhältig."
 news.320.t:0 "Jugoslawien weist rumänische Forderungen zurück"
 news.320.desc:0 "Trotz der rumänischen Forderungen nach einer „drastischen Umstrukturierung“ des Staates und der Androhung militärischer Gewalt im Falle einer Ablehnung hat Jugoslawien das Ultimatum abgelehnt. Trotz des massiven Drucks von verschiedenen Seiten sind die Jugoslawen entschlossen, ihr Land mit allen Mitteln zu verteidigen. Rumänien hat inzwischen den Krieg erklärt, und es ist nicht ausgeschlossen, dass sich andere Nationen an einer Teilung beteiligen."
 news.320.a:0 "Sie haben darum gebeten."
 news.320.b:0 "Komme und nimm es!"
 news.320.c:0 "Wir haben sie gewarnt."
 news.320.f:0 "Sie können nicht hoffen, lange durchzuhalten."
 news.321.t:0 "Jugoslawien geteilt"
 news.321.desc:0 "Auf rumänisches Betreiben hin wurde Jugoslawien ein Ultimatum zur „Umstrukturierung seines Staates“ gestellt. Angesichts des Drucks mehrerer Nachbarn sahen die Jugoslawen keine andere Wahl, als zuzustimmen. Die Teilung des Landes ist derzeit im Gange."
 news.321.a:0 "Wir haben unseren Freunden zu danken."
 news.321.b:0 "Das war eine ausgezeichnete Idee!"
 news.321.c:0 "Gierige Bastarde."
 news.321.e:0 "Wir kennen das Gefühl ..."
 news.322.t:0 "Putsch in Rumänien"
 news.322.desc:0 "Da die Unzufriedenheit mit der rumänischen Führung gefährliche Ausmaße angenommen hat, hat Prinz Michael nun mit Unterstützung bedeutender Teile des Militärs einen Putsch angezettelt. Erste Berichte deuten darauf hin, dass der Putsch erfolgreich war, und König Michael hat bereits angekündigt, dass er das Amt des Staatsoberhauptes übernommen habe, um Rumänien die nötige Führung zu geben."
 news.322.a:0 "Es ist eine Veränderung zum Besseren."
 news.322.b:0 "Er scheint eher ... bescheidener zu sein, zumindest."
 news.323.t:0 "König Carol II. dankt ab"
 news.323.desc:0 "Unter dem Druck mächtiger Elemente seiner Regierung sah König Carol II. keine andere Wahl, als seine Abdankung anzukündigen und zu unterzeichnen. Sein Nachfolger ist König Michael, doch viele der von Carol erlangten diktatorischen Machtbefugnisse wurden wieder an die Regierung übertragen, sodass es unwahrscheinlich ist, dass der junge König über die gleiche Macht wie sein Vorgänger verfügen wird.\n\nNach seiner Abdankung hat Carol offenbar seine üppigen Bankkonten geleert und ist ins Exil geflohen. Er lebt mit seiner Geliebten Magda Lupescu in einem der teureren Viertel von Mexiko-Stadt."
 news.323.a:0 "Auf Nimmerwiedersehen."
 news.323.b:0 "Amüsant."
 news.325.t:0 "Jugoslawien erhebt Anspruch auf Bulgarien"
 news.325.desc:0 "Jugoslawien berief sich in jüngster Zeit verstärkt auf die Gründungsstruktur der bulgarischen Nation als „Union der südslawischen Völker“ und plädierte für die Mitgliedschaft des bulgarischen Volkes in dieser Union. Nun hat diese Propaganda eine drastische Wendung genommen, da Jugoslawien seinen Anspruch auf die bulgarische Region offen angemeldet hat. Während beide Nationen ihre Streitkräfte bereitmachen, könnte jederzeit ein Krieg ausbrechen."
 news.325.a:0 "Jugoslawien für alle Slawen!"
 news.325.b:0 "Wir sind bereit für sie!"
 news.325.c:0 "Das Pulverfass enttäuscht nie."
 news.326.t:0 "Die Banschaft Kroatien"
 news.326.desc:0 "Aufgrund anhaltender und zunehmender Probleme mit kroatischen nationalistischen Elementen war die jugoslawische Regierung gezwungen, den Kroaten mehr Autonomie zu gewähren. Ein neuer, halbunabhängiger Staat, die Banschaft Kroatien, wurde ins Leben gerufen. Obwohl sie nominell noch immer von Jugoslawien abhängig ist, ist der Einfluss der Regierung in der Region inzwischen stark zurückgegangen."
 news.326.a:0 "Es war notwendig."
 news.326.b:0 "Es lebe Kroatien!"
 news.326.c:0 "Der Beginn eines Zusammenbruchs Jugoslawiens?"
 news.327.t:0 "Jugoslawien beansprucht Mazedonien"
 news.327.desc:0 "Mit dem Ziel, die mazedonischen Völker zu vereinen, hat Jugoslawien erklärt, Zentralmazedonien sei nun integraler Bestandteil der jugoslawischen Nation. Um diesen Anspruch zu untermauern, kommt es zu Spaltungen an der Grenze, und die Gefahr eines neuen militärischen Konflikts schwebt über der Region."
 news.327.a:0 "Alle Südslawen sind eins!"
 news.327.b:0 "Sie können es gerne versuchen!"
 news.327.c:0 "Beunruhigende Entwicklungen."
 news.328.t:0 "Jugoslawien beansprucht italienische Grenze"
 news.328.desc:0 "Die jugoslawische Regierung hat sich in letzter Zeit zunehmend gegen die Behandlung der slawischen Minderheiten in den Grenzregionen Istrien und Zara durch Italien ausgesprochen. Heute erklärte sie, sie betrachte diese nach dem Ersten Weltkrieg von Italien eingenommenen und überwiegend von ethnischen Slawen bewohnten Gebiete als integralen Bestandteil der jugoslawischen Nation. Um die Rechte der Bewohner dieser Gebiete zu schützen, haben die Jugoslawen zudem signalisiert, dass sie auch vor militärischer Gewalt nicht zurückschrecken werden."
 news.328.a:0 "Nur in unserem Land sind sie sicher."
 news.328.b:0 "Wenn sie es versuchen, werden wir sie zerquetschen!"
 news.328.c:0 "Ein weiterer Konflikt braut sich zusammen."
 news.329.t:0 "Jugoslawien erkennt die Sowjetunion an"
 news.329.desc:0 "Jugoslawien hat sich jahrelang, noch stoischer als andere Nationen, geweigert, den kommunistischen Staat Sowjetunion anzuerkennen. Mit der heutigen Ankündigung, dass die jugoslawische Regierung künftig offizielle Beziehungen zu den Sowjets aufnehmen wird, findet diese Politik endlich ein Ende. Ob dies eine Öffnung des jugoslawischen Staates für kommunistischen Einfluss bedeutet, bleibt abzuwarten, doch der Ton der Ankündigung war überraschend herzlich."
 news.329.a:0 "Sie haben einige interessante Ideen."
 news.329.b:0 "Wir werden sie der Revolution zeigen."
 news.329.c:0 "Der sowjetische Einfluss breitet sich aus …"
 news.330.t:0 "Der Panslawische Arbeiterkongress"
 news.330.desc:0 "Da die Jugoslawen mit grundlegenden Aspekten des sowjetischen Kommunismus nicht einverstanden sind, haben sie ihre eigene Ideologie entwickelt. Statt Mitglied der Komintern zu werden, hat die jugoslawische Regierung angekündigt, die Südslawen im Kampf für die Rechte der Arbeiter anführen zu wollen. Es ist wahrscheinlich, dass sie bald versuchen werden, ihre Nachbarn in die Gemeinschaft einzubeziehen – ein Schritt, der das Machtgleichgewicht in der Region ernsthaft stören könnte."
 news.330.a:0 "Wir werden unsere slawischen Mitbürger anführen!"
 news.330.b:0 "Diese frechen kleinen Emporkömmlinge!"
 news.330.c:0 "Interessant..."
 news.330.e:0 "Vielleicht bringt das Stabilität?"
 excellent:0 "Exzellent."
 unfortunate:0 "Schade."
 stability.21.t:0 "Wehrdienstverweigerung"
 stability.21.desc.a:0 "Ein neuer Bericht des Kriegsministeriums zeigt einen deutlichen Rückgang der verfügbaren Truppenstärke. Offenbar ist der jüngste Rekrutenzug deutlich kleiner als ursprünglich erwartet. Die Diskrepanz wird derzeit untersucht, doch erste Hinweise deuten darauf hin, dass es einer großen Zahl technisch diensttauglicher Personen gelingt, der Einberufung auf verschiedene Weise zu entgehen. 18-jährige Schüler werden plötzlich zu Facharbeitern in der kriegswichtigen Industrie, ehemalige Sportler fallen bei Fitnesstests durch und in einigen Fällen verschwinden Rekruten einfach spurlos. Werden Rekruten gefasst und verhört, verweisen sie auf die schlechten Bedingungen in der Armee, die gleichgültigen Offiziere und darauf, dass sie nicht für eine verlorene Sache sterben wollen. Die Militärführung fordert ein hartes Vorgehen gegen Wehrdienstverweigerer, doch viele in der Regierung sind der Meinung, dass eine Verbesserung der Lebensbedingungen der Soldaten der bessere Ansatz wäre."
 stability.21.desc.b:0 "Die ineffektive offizielle Reaktion auf die weitverbreitete Wehrdienstverweigerung hat das Problem nur noch verschärft. Immer mehr Rekruten erscheinen nach Erhalt ihres Einberufungsbescheids nie wieder. Der Geheimdienst hat eine professionell erstellte Broschüre abgefangen, die Ratschläge zur Vermeidung der Wehrpflicht enthielt. Darin wurde beispielsweise vorgeschlagen, Ärzte zu bestechen, um dem Rekruten medizinische Untauglichkeit zu attestieren. Ausnahmen für Familienväter haben dazu geführt, dass Kriegswitwen mit Kindern mit Heiratsanträgen überhäuft werden, während die Zahl der Personen, die aus ethischen Gründen Ausnahmen beantragen, Rekordwerte erreicht hat.\n\nDie Militärführung hat vorgeschlagen, die letzten Ausnahmen abzuschaffen und an einigen ertappten Drückebergern ein Exempel zu statuieren. Andere in der Regierung haben vorgeschlagen, wir sollten an das Pflichtbewusstsein unserer Bürger appellieren und sie auf die Folgen einer Niederlage in diesem Krieg aufmerksam machen."
 stability.21.desc.c:0 "Da die Maßnahmen der Regierung gegen die Wehrdienstverweigerung keinerlei positive Auswirkungen haben, fragen sich immer mehr Menschen, warum sie sich selbst in Gefahr begeben sollten, während andere in Sicherheit bleiben. Rekruten, die sich melden, berichten oft, auf der Straße schikaniert oder als Narren verspottet worden zu sein, die für eine aussichtslose Sache kämpften. Überall kursieren Berichte über Mütter, die ihren Kindern verbieten, dem Wehrdienst zu folgen, und das Kriegsministerium hat einen Bericht vorgelegt, in dem es behauptet, man wisse nicht mehr, wie viele Personen es einziehen müsse, da die Bürokratie unter der Belastung der Bearbeitung all der vermissten Soldaten zusammenbreche."
 stability.21.a:0 "Dagegen lässt sich nichts tun."
 stability.21.d:0 "Wir sollten jeden verhaften, der sich der Wehrpflicht entzieht!"
 stability.21.e:0 "Eine Gehaltserhöhung für die einfachen Soldaten wäre vielleicht angebracht."
 stability.21.f:0 "Es ist Zeit für härtere Maßnahmen."
 stability.21.g:0 "Appell an das Bürgerbewusstsein der Bevölkerung."
 stability.21.h:0 "Wir müssen ein Exempel statuieren."
 stability.21.i:0 "Wir müssen den Menschen etwas geben, wofür sie kämpfen können."
 stability.22.t:0 "Streiks!"
 stability.22.desc.a:0 "Die Produktion in mehreren Fabriken ist in den letzten Tagen dramatisch zurückgegangen, da die Arbeiter einen Streik gegen die gesamte Rüstungsproduktion ausgerufen haben. Mit der Forderung nach „Frieden und Brot!“ haben sie bisher alle Verhandlungsversuche abgelehnt. Einige Regierungsmitglieder plädieren für eine scharfe militärische Reaktion, gefolgt von einer raschen Hinrichtung der Rädelsführer als feindliche Agenten und Verräter. Andere Beamte hingegen empfehlen ein gemäßigteres Vorgehen und weisen darauf hin, dass eine harte Reaktion durchaus nach hinten losgehen könnte, wenn die beteiligten Soldaten nicht so loyal sind, wie wir dachten."
 stability.22.desc.b:0 "Die Bemühungen der Regierung, die Streikenden zur Rückkehr an die Arbeit zu bewegen, scheinen keinerlei Erfolg gehabt zu haben. Im Gegenteil, es wurden Streiks aus weiteren Fabriken gemeldet, und auch die letzten Arbeiter in den ursprünglich betroffenen Betrieben haben angesichts des Zorns ihrer Kollegen ihre Arbeit niedergelegt. Zwar konnten die Lagerbestände den Rückgang der Versorgung an der Front bisher etwas abfedern, doch ist es nur eine Frage der Zeit, bis die Produktionsausfälle unsere Fähigkeit zur Kriegsführung beeinträchtigen. Das Kriegsministerium hat die Regierung erneut aufgefordert, den Streikenden gegenüber eine unnachgiebige Linie zu verfolgen. Andere Fraktionen innerhalb der Regierung haben jedoch angedeutet, dass ein Angebot, den Arbeitern entgegenzukommen, ausreichen könnte, um sie zur Rückkehr an die Arbeit zu bewegen."
 stability.22.desc.c:0 "Was als Arbeitskampf an einigen isolierten Orten begann, hat sich mittlerweile über das ganze Land ausgebreitet und betrifft sogar Industriezweige, die nur am Rande mit den Kriegsanstrengungen verbunden sind. Sogar die Arbeit der Regierung selbst ist beeinträchtigt, da immer mehr einfache Angestellte, Boten und Fahrer die Arbeit verweigern. \n\nVielerorts haben Arbeiterräte die Fabrikgebäude besetzt. Berichte der Geheimpolizei deuten darauf hin, dass mancherorts die Waffenproduktion wieder aufgenommen hat – für einen großen Aufstand gegen das sogenannte „Kriegsregime“. \n\nDas militärische Oberkommando glaubt, dass entschlossenes Handeln loyaler Truppen noch zum Sieg führen könnte, während die zivile Seite der Regierung argumentiert, dies berge das Risiko eines Bürgerkriegs und einer sicheren Niederlage."
 stability.22.a:0 "Das wird sich legen."
 stability.22.b:0 "Führen Sie in den Städten eine Demonstration militärischer Stärke durch."
 stability.22.c:0 "Machen Sie aus den noch arbeitswilligen Menschen Propagandahelden."
 stability.22.d:0 "Die Arbeiter zum Militärdienst einziehen und die Fabriken unter militärische Kontrolle stellen."
 stability.22.e:0 "Bieten Sie an, die Essensrationen der Arbeiter zu erhöhen."
 stability.22.f:0 "Schicken Sie Truppen, verhaften Sie die Streikenden und richten Sie die Rädelsführer hin."
 stability.22.g:0 "Schlagen Sie neue Sozialgesetze vor."
 stability.23.t:0 "Meutereien in der Armee"
 stability.23.desc.a:0 "Das Oberkommando der Armee hat alarmierende Nachrichten über mehrere Einheiten unserer Armee erhalten, die sich Befehlen ihrer Vorgesetzten widersetzen. Obwohl keine der Einheiten ihre Stellung verlassen hat, haben Vertreter der Soldaten deutlich gemacht, dass sie keinen Angriffsbefehlen Folge leisten werden.\n\nDer Aufstand konnte bisher auf wenige Bataillone und eine Handvoll Ausbildungs- und Unterstützungseinheiten beschränkt werden. Viele im Kriegsministerium befürchten jedoch, dass sich dieser Aufstand bald auf andere Einheiten ausweiten und uns letztendlich die Fortsetzung des Krieges unmöglich machen könnte. Entschlossenes Handeln ist erforderlich."
 stability.23.desc.b:0 "Bemühungen, die Meutereien in der Armee zu unterbinden, blieben erfolglos. Ermutigt durch die mangelnde Reaktion der Regierung haben die Meuterer ihre Forderungsliste erweitert und fordern nun einen sofortigen Waffenstillstand, gefolgt von einem umfassenden Friedensvertrag und der Demobilisierung. Das Kriegsministerium empfiehlt dringend, den Meuterern ein deutliches Signal zu senden, um sie von weiteren Maßnahmen abzuhalten."
 stability.23.desc.c:0 "Da die Regierung offensichtlich nicht willens oder in der Lage ist, ihre Probleme anzugehen, haben die Meuterer beschlossen, selbst Maßnahmen zu ergreifen. Es wurden Wahlen für „Arbeiter- und Soldatenräte“ angekündigt, deren ausdrückliches Ziel es ist, das Land zu übernehmen und Frieden mit dem Feind zu schließen.\n\nWenn nicht rasch gehandelt wird, könnten diese Räte in einigen Teilen des Landes unsere Regierung ersetzen und uns die Fortsetzung des Krieges unmöglich machen."
 stability.23.a:0 "Da können wir jetzt nichts mehr machen."
 stability.23.b:0 "Umzingeln Sie die meuternden Einheiten mit Loyalisten und befehlen Sie ihnen, sich zurückzuziehen."
 stability.23.c:0 "Halten Sie vor den Meuterern eine patriotische Rede."
 stability.23.d:0 "Geben Sie öffentlich bekannt, dass jeder, der die Meuterer unterstützt, wegen Hochverrats angeklagt wird."
 stability.23.e:0 "Kündigen Sie eine Friedensinitiative an. Stellen Sie sicher, dass sie für den Feind inakzeptabel ist."
 stability.23.f:0 "Mobilisieren Sie loyalistische Milizen und verhaften Sie alle Soldaten, die sich nicht an ihrem Dienstort befinden."
 stability.23.g:0 "Bieten Sie den Soldaten an, ihre Offiziere selbst zu wählen."
 15_days_tt:0 "Die Umsetzung wird etwa §Y15 Tage§! dauern.\n"
 30_days_tt:0 "Die Umsetzung wird etwa §Y30 Tage§! dauern.\n"
 45_days_tt:0 "Die Umsetzung wird etwa §Y45 Tage§! dauern.\n"
 stability.31.t:0 "Militärisches Vorgehen erfolgreich"
 stability.31.desc:0 "Unsere schnelle Reaktion erwies sich als äußerst effektiv. Einheiten der Militärpolizei, unterstützt von lokalen Polizeikräften und patriotischen Freiwilligen, rückten in einer gut koordinierten Aktion aus, um jeden vermissten Wehrpflichtigen aufzusuchen. Die meisten waren bereit, dem Aufruf zu folgen, nachdem sie über die Konsequenzen des Nichterscheinens informiert worden waren. Das Oberkommando der Streitkräfte hat öffentlich erklärt, dass gegen jeden, der an seinem Dienstort erscheint, keine Anklage erhoben oder für früheres Nichterscheinen bestraft wird. Dennoch weigerten sich zahlreiche Menschen kategorisch, für ihr Land zu den Waffen zu greifen, und wurden verhaftet."
 stability.31.a:0 "Durch entschlossenes Handeln konnte Schlimmeres verhindert werden."
 stability.32.t:0 "Wehrdienstunruhen"
 stability.32.desc:0 "Unsere Versuche, die Situation mit militärischer Gewalt zu lösen, waren erfolglos. Offenbar hat jemand in unserer Regierung unsere geplante Operation an die Öffentlichkeit durchsickern lassen, die umgehend reagierte. Als Militärpolizei und andere Strafverfolgungsbehörden versuchten, bekannte Wehrdienstverweigerer festzunehmen, wurden sie von wütenden Mobs versperrt, die ein Ende des Krieges und die Wehrpflicht forderten. In mehreren Fällen kam es zu Straßenschlachten zwischen Polizei und Demonstranten, bei denen mehrere Soldaten ihr Leben verloren, weil sie gezwungen waren, sich mit Waffen zu verteidigen. Es dauerte mehrere Stunden, bis die Polizei die Lage wieder unter Kontrolle hatte.\n\nWährend die Barrikaden geräumt und die Toten begraben werden, macht sich in der Hauptstadt eine unangenehme Stimmung breit. Berichte des Kriegsministeriums zeigen keine Veränderung der Zahl der zum Dienst erscheinenden Rekruten. Viele in der Regierung fragen sich, wie lange wir unter diesen Umständen noch weiterkämpfen können."
 stability.32.a:0 "Die Situation hat sich nicht unbedingt zu unserem Vorteil entwickelt."
 stability.33.t:0 "Der Wehrpflichtaufstand"
 stability.33.desc:0 "Unsere Versuche, die Situation mit militärischer Gewalt zu lösen, waren erfolglos. Offenbar hat jemand in unserer Regierung unsere geplante Operation an die Öffentlichkeit durchsickern lassen, die daraufhin umgehend reagierte. Als Militärpolizei und andere Strafverfolgungsbehörden versuchten, bekannte Wehrdienstverweigerer festzunehmen, wurden sie von wütenden Mobs versperrt, die ein Ende des Krieges und die Wehrpflicht forderten. In mehreren Fällen kam es zu Straßenschlachten zwischen Polizei und Demonstranten, bei denen es mehrere Todesopfer gab, weil die Soldaten gezwungen waren, sich mit Waffen zu verteidigen. \n\nDanach geriet die Situation schnell außer Kontrolle, als Bürger auf die Soldaten zustürmten und Polizeistationen stürmten, um sich zu bewaffnen. In mehreren Städten des Landes herrscht nun ein bewaffneter Aufstand gegen die Regierung. Ironischerweise scheinen die Rebellen problemlos Soldaten zu finden, die bereit sind, zu den Waffen zu greifen."
 stability.33.a:0 "Oh, also wollen sie JETZT kämpfen!?"
 stability.34.t:0 "Reformentwurf erweist sich als wirksam"
 stability.34.desc:0 "Die von der Regierung im Rahmen einer umfassenden Reform der Rekrutierungspolitik verabschiedeten Sozialmaßnahmen erfreuen sich überraschender Beliebtheit. Höhere Gehälter und häufigerer Urlaub werden oft als die wichtigsten neuen Vorteile genannt, viele verweisen aber auch auf die neuen staatlichen Programme zur Unterstützung von Kriegswitwen und -waisen. Immer weniger Männer können es rechtfertigen, den Wehrdienst ihres Landes zu verweigern, und die öffentliche Unterstützung für Wehrdienstverweigerer ist nahezu verschwunden.\n\nTatsächlich hat die öffentliche Unterstützung für die Regierung in letzter Zeit zugenommen, da immer mehr Menschen erkennen, dass die [Root.GetAdjective]-Lebensweise bedroht ist."
 stability.34.a:0 "Eine weise Entscheidung."
 stability.35.t:0 "Das 591. Strafbataillon"
 stability.35.desc:0 "Angesichts der ernsten Lage hat das Oberkommando des Militärs entschieden, dass drastischere Maßnahmen erforderlich sind, um zu zeigen, dass die Umgehung der staatsbürgerlichen Pflicht zur Verteidigung des Landes nicht toleriert wird. Im Morgengrauen durchsuchte die Militärpolizei die Häuser sorgfältig ausgewählter, bekannter und gut vernetzter Personen, die ihren Einfluss missbraucht hatten, um anderen die Einberufung zu erleichtern. Noch im Nachthemd wurden sie zum Militär eingezogen und unter bewaffneter Bewachung in die Kaserne eskortiert, wo sie in einer separaten Einheit aufgestellt werden, um zu verhindern, dass ihr subversiver Einfluss auf andere Einheiten übergreift. \n\nDie Nachricht verbreitete sich schnell, und es scheint, dass die meisten Menschen, die bisher glaubten, sie könnten ungestraft davonkommen, wenn sie ihren Einberufungsbescheid ignorieren, ihre Meinung geändert haben. Rekrutierungsstellen im ganzen Land berichten, dass immer mehr Menschen vorbeikommen und fragen, welche Konsequenzen es hätte, wenn sich ein „Freund“ von ihnen, der versucht hatte, der Einberufung zu entgehen, stellen würde."
 stability.35.a:0 "Vielleicht können sie sich noch rehabilitieren."
 stability.36.t:0 "Lokale Eliten äußern ihren Protest"
 stability.36.desc:0 "Angesichts des Ernstes der Lage hat das Oberkommando der Armee beschlossen, drastischere Maßnahmen zu ergreifen, um zu zeigen, dass die Umgehung der staatsbürgerlichen Pflicht zur Verteidigung des Landes nicht toleriert wird. Im Morgengrauen durchsuchte die Militärpolizei die Häuser sorgfältig ausgewählter, bekannter und gut vernetzter Personen, die ihren Einfluss missbraucht hatten, um anderen die Einberufung zu ermöglichen. Noch im Nachthemd wurden sie zum Militär eingezogen. Ihre Familien mobilisierten ihr breites Unterstützernetzwerk, um gegen diese Entscheidung zu protestieren. Das Kriegsministerium wurde mit Anrufen und Briefen einfacher Arbeiter überschwemmt, die ihren Fabrikleiter zurückfordern, bis hin zu Unterstaatssekretären in verschiedenen anderen Ministerien. Diese wollen wissen, warum Menschen, die in kriegswichtigen Bereichen arbeiten, von ihren Arbeitsplätzen abgezogen wurden. Es scheint, dass sogar einige Kabinettsmitglieder ihre Meinung zum Krieg geändert haben – vielleicht aus Angst um die Sicherheit ihrer eigenen Söhne."
 stability.36.a:0 "Haben sie kein Pflichtgefühl?"
 stability.37.t:0 "„Eine düstere und heilige Pflicht“"
 stability.37.desc:0 "„Natürlich will ich leben. Ich will die Schule beenden, ich will Mädchen kennenlernen, ich will eine Familie gründen – aber wenn wir diesen Krieg verlieren, kann ich das auch nicht. Also kämpfe ich.“\n\nDer Brief, der anonym an alle großen Zeitungen des Landes geschickt wurde, hat hohe Wellen geschlagen. Der Brief, der angeblich von einem Soldaten stammt, der zunächst versuchte, der Einberufung zu entgehen, dann aber erkannte, dass er kämpfen muss, um sein Land zu retten, hat offenbar bei vielen anderen, denen es ähnlich ging, einen Nerv getroffen. Einberufungsausschüsse im ganzen Land berichten, dass die Zahl der Menschen, die sich noch immer weigern, ihrer Einberufung zu folgen, durch neue Freiwillige mehr als wettgemacht wird, die nicht länger warten, bis sie einberufen werden, während andere hingehen und kämpfen, um ihr Land und ihre Lebensweise zu retten."
 stability.37.a:0 "Wir werden nicht zulassen, dass ihr Leben umsonst verbracht wird."
 stability.38.t:0 "Das Ende eines Feiglings"
 stability.38.desc:0 "Sie führten ihn im Morgengrauen zur Mauer. Er lehnte eine letzte Zigarette ab, nahm aber die Augenbinde an. Seine letzten Worte waren eine Entschuldigung an seine Mutter für die Schmerzen, die er ihr zugefügt hatte. Das Erschießungskommando zielte gut. Wenige Minuten später erklärte der anwesende Arzt ihn für tot.\n\nObwohl es den Behörden nicht gelang, alle Wehrdienstverweigerer zu fassen, konnten sie einige festnehmen. Angesichts der ernsten Lage hat das Kriegsministerium entschieden, diese Männer wegen Dienstverweigerung nach Militärrecht vor Gericht zu stellen. Die ersten Todesurteile wurden verhängt und die Verurteilten durch Erschießungskommandos hingerichtet. Diese Maßnahmen hatten offensichtlich die gewünschte Wirkung. Offenbar haben die meisten Menschen die Möglichkeit eines Todes auf dem Schlachtfeld der Gewissheit eines unehrenhaften Todes als Feigling vorgezogen."
 stability.38.a:0 "Schade, dass es so weit kommen musste."
 stability.39.t:0 "Ein Märtyrer für den Frieden"
 stability.39.desc:0 "Sie führten ihn im Morgengrauen zur Mauer. Er lehnte eine letzte Zigarette ab, nahm aber die Augenbinde an. Seine letzten Worte waren eine Entschuldigung an seine Mutter für die Schmerzen, die er ihr zugefügt hatte. Das Erschießungskommando zielte gut. Wenige Minuten später erklärte der anwesende Arzt ihn für tot.\n\nDer veröffentlichte Bericht über die Hinrichtung eines zum Tode verurteilten Mannes, der wegen Dienstverweigerung zum Tode verurteilt worden war, scheint den gegenteiligen Effekt gehabt zu haben. Anstatt Menschen aus Angst vor den Konsequenzen zurück in den Dienst zu treiben, machte er die Hingerichteten zu Märtyrern der Friedensbewegung. Ihre Namen und Lebensgeschichten wurden veröffentlicht und sehr deutlich redigiert, um sie im bestmöglichen Licht erscheinen zu lassen. In mehreren Großstädten begannen Massendemonstrationen für den Frieden, die ein Ende des Krieges forderten. Das Kriegsministerium berichtet, es habe mehrere Briefe von Wehrpflichtigen erhalten, in denen offen erklärt wurde, dass sie nicht zum Dienst erscheinen würden – und dass sie unter keinen Umständen an einer weiteren Hinrichtung teilnehmen würden, außer in ihrer Funktion als Hingerichtete."
 stability.39.a:0 "Die Dinge haben sich nicht unbedingt verbessert."
 stability.40.t:0 "Ein neuer Deal für [Root.GetNameDef]"
 stability.40.desc:0 "In einer heute im Radio übertragenen Rede kündigte [Root.GetLeader] eine sogenannte „soziale Revolution“ an. Innerhalb einer Stunde legte er ein Reformsystem vor, das alle Bereiche des gesellschaftlichen Lebens betrifft. Er versprach jedem heimkehrenden Soldaten eine Ausbildung, einen gut bezahlten Job und eine großzügige Rente. Er kündigte außerdem ein umfangreiches Bauprogramm für bezahlbaren Wohnraum für junge Familien an, das am Tag der Unterzeichnung eines Waffenstillstands in Kraft treten soll. Dies scheint die allgemeine Moral deutlich zu verbessern. Rekrutierungsbüros im ganzen Land berichten von Wehrpflichtigen, die nach Möglichkeiten fragen, ihren Dienst über den aktuellen Konflikt hinaus zu verlängern. Andere fordern geradezu eine Versetzung in die Fronteinheiten, um sich zusätzliche Vergünstigungen zu sichern."
 stability.40.a:0 "Und wie bezahlen wir das alles...?"
 strikes_event.1.t:0 "Ordnung wiederhergestellt"
 strikes_event.1.desc:0 "Das Oberkommando mobilisierte rasch mehrere Ausbildungseinheiten und bildete Ad-hoc-Gruppen von Soldaten im Urlaub. Der Marsch dieser Formationen an den Fabriktoren hatte den gewünschten Effekt, da die meisten Streikenden eine Konfrontation mit potenziell tödlichen Folgen vermeiden wollten. Die wenigen, die versuchten, die Soldaten zu einer gemeinsamen Sache zu bewegen, zeigten wenig Wirkung, da die Soldaten fragten, warum die Arbeiter im Hinterland die kämpfenden Männer an der Front im Stich lassen sollten."
 strikes_event.1.a:0 "Warum eigentlich?"
 strikes_event.2.t:0 "Blutiger Montag"
 strikes_event.2.desc:0 "Das Oberkommando mobilisierte rasch mehrere Ausbildungseinheiten und bildete Ad-hoc-Gruppen aus Soldaten im Urlaub. Der Transport dieser Formationen in die betroffenen Städte erwies sich jedoch als weitaus schwieriger als erwartet, da die Streikenden Bahnlinien blockierten und die Truppen zu Fuß einmarschieren mussten, was ihnen ausreichend Zeit zur Vorbereitung gab. Als unsere Truppen die verbarrikadierten Fabriken erreichten, fanden sie die Streikenden bereits vor. Versuche, die Straßen zu räumen, wurden von den Arbeitern mit wütenden Angriffen beantwortet, die die Soldaten mit Steinen und Flaschen bewarfen. \n\nMehrfach eröffneten die Truppen zur Selbstverteidigung das Feuer, wobei mehrere Streikende getötet und Dutzende weitere verletzt wurden. Dies erzürnte den Mob nur noch mehr, und die Umstehenden riefen „Mörder!“. Die Stimmung in der Hauptstadt schlug dramatisch zugunsten der Streikenden um. Bei Einbruch der Dunkelheit zogen sich die Soldaten zurück und ließen die Barrikaden intakt. \n\nEs gab keine weiteren Versuche, die Situation zu erzwingen. Die Streikenden kontrollieren weiterhin die Fabriken, und es wird nicht gearbeitet."
 strikes_event.2.a:0 "Nicht wie geplant."
 strikes_event.3.t:0 "Helden an der Produktionsfront"
 strikes_event.3.desc:0 "Industriekrieg ist mehr als nur marschierende Divisionen und Bombenangriffe. Er ist mehr als die Pflicht eines Soldaten, für sein Land zu kämpfen und zu sterben. Ein Industriekrieg wird in erster Linie in Fabriken und Gießereien gewonnen. Den Kampf am Fließband aufzugeben ist nicht besser, als ihn an der Front aufzugeben. Und die Siege des Fließbands sollten genauso gefeiert werden wie die an der Front.\n\nAlle verfügbaren Propagandamittel wurden eingesetzt, um die Arbeit der Rüstungsarbeiter im bestmöglichen Licht darzustellen. [Root.GetLeader] hat persönlich eine neue Auszeichnung für Arbeiter genehmigt, die ihre Quote um mehr als 100 % übertroffen haben. Die ersten Preisträger wurden auf Reisen durch das Land geschickt, um andere Arbeiter in ihre Methoden einzuweisen.\n\nEs scheint, dass dies viele Streikende dazu gebracht hat, ihre Haltung zu überdenken. In allen zuvor betroffenen Fabriken wurde die Arbeit wieder aufgenommen."
 strikes_event.3.a:0 "Allesamt Helden."
 strikes_event.4.t:0 "Die Abteilung für Kriegsproduktion"
 strikes_event.4.desc:0 "[Root.GetLeader] hat heute einige kleine Änderungen an der Wehrpflicht angekündigt. Während Facharbeiter bisher von der Wehrpflicht befreit waren, wurde diese Ausnahme nun aufgehoben und alle befreiten Männer sofort eingezogen. Gleichzeitig wurde das Kriegsministerium ermächtigt, die direkte Kontrolle über Fabriken zu übernehmen, die kriegsrelevante Güter herstellen, wenn deren Leitung mangelnde Fähigkeiten gezeigt hat. Diese Ankündigung stieß in den betroffenen Städten auf stille Resignation, insbesondere nachdem bekannt wurde, dass jeder, der sich widersetzt, wie ein Soldat behandelt wird, der Befehle verweigert. Obwohl die Moral der Arbeiter in den Fabriken am Boden liegt, wurde die Produktion wieder aufgenommen."
 strikes_event.4.a:0 "Das hätte ich von Anfang an tun sollen."
 strikes_event.5.t:0 "Ein Land im Widerstand"
 strikes_event.5.desc:0 "[Root.GetLeader] hat heute einige kleine Änderungen an der Wehrpflicht angekündigt. Während Facharbeiter bisher von der Wehrpflicht befreit waren, wurde diese Ausnahme nun aufgehoben und alle befreiten Männer sofort eingezogen. Gleichzeitig wurde das Kriegsministerium ermächtigt, die direkte Kontrolle über Fabriken zu übernehmen, die kriegsrelevante Güter herstellen, wenn deren Führung mangelnde Fähigkeiten gezeigt hat.\n\nDie Ankündigung löste in den betroffenen Städten großes Gelächter aus, insbesondere als bekannt wurde, dass jeder, der sich widersetzte, wie ein Soldat behandelt würde, der Befehle verweigerte. Polizisten, die den Arbeitern den Einberufungsbescheid überbringen sollten, wurden angewiesen, mehr als nur Tinte auf Papier mitzubringen."
 strikes_event.5.a:0 "Vielleicht sollten wir das."
 strikes_event.6.t:0 "Nützliche Esser"
 strikes_event.6.desc:0 "Ohne die Streiks zu erwähnen, gab [Root.GetLeader] heute bekannt, dass Arbeiter in kriegsrelevanten Industrien zusätzliche Rationen Zucker, Kaffee und Fleisch erhalten, um bei Kräften zu bleiben. Leider erwiesen sich die Gerüchte, die Regierung wolle zusätzliche Schokolade verteilen, als falsch.\n\nWährend die Anführer des Streiks versuchen, die Arbeiter von der Rückkehr an die Arbeit abzuhalten, scheinen die meisten akzeptiert zu haben, dass es &quot;Frieden und Brot&quot; nie geben wird und geben sich mit dem Brot zufrieden."
 strikes_event.6.a:0 "Sie sollten ihren Lebensunterhalt besser verdienen."
 strikes_event.7.t:0 "Operation „Schwarze Eiche“"
 strikes_event.7.desc:0 "Die Truppen versammelten sich über Nacht außerhalb der Städte und sorgten für Lärm und leichte Disziplin, um den Überraschungseffekt zu wahren. Als die Sonne über den Horizont kroch und die Arbeiter an den Barrikaden der Fabriken auf die Ablösung durch die Tagschicht warteten, rückten die Angriffskolonnen an. Die müden Arbeiter waren zu träge, den Widerstand zu organisieren, und wurden schnell überwältigt. Die Truppen ließen eine kleine Abteilung zur Bewachung der Gefangenen zurück und durchkämmten die Städte. Dabei verhafteten sie alle auf der Liste der bekannten Fabrikarbeiter stehenden Personen. Gegen Mittag hatte das Militär die Städte vollständig unter Kontrolle und verhängte eine Ausgangssperre. Es wird kein weiterer Widerstand erwartet. Die Mehrheit der Arbeiter wird bald unter der Bedingung freigelassen, dass sie ihre Arbeit wieder aufnehmen. Die Anführer der Rädelsführer werden festgenommen und vor Gericht gestellt. Es wird mit Todesurteilen gerechnet."
 strikes_event.7.a:0 "Die Ordnung ist wiederhergestellt."
 strikes_event.8.t:0 "Die Schlacht von Oak Street"
 strikes_event.8.desc:0 "Die Truppen versammelten sich über Nacht außerhalb der Städte, doch schlechte Lichtverhältnisse und Lärm verrieten die Überraschung. Als die Truppen einrückten, trafen sie auf aufmerksame und bereite Arbeiter. Der erste Angriff scheiterte an einem Steinhagel. Ein zweiter Angriff mit aufgepflanzten Bajonetten wurde in brutalen Nahkämpfen zurückgeschlagen. Dutzende Tote und Sterbende lagen auf den Straßen. Die befehlshabenden Offiziere haben sich zurückgezogen, um ihre Kräfte zu konsolidieren, während die Arbeiter ihre Befestigungen ausbauen und sich mit den beim Rückzug zurückgelassenen Waffen bewaffnen. Für morgen wird ein zweiter Kampftag erwartet, doch das Oberkommando des Militärs hält einen Sieg nicht mehr für wahrscheinlich."
 strikes_event.8.a:0 "Uns gehen schnell die Optionen aus."
 strikes_event.9.t:0 "Das Gesetz zum Schutz der Arbeitnehmerrechte"
 strikes_event.9.desc:0 "Angesichts der angespannten Lage in der Hauptstadt kündigte [Root.GetLeader] ein neues Gesetz zum Schutz der Arbeitnehmerrechte auch in Kriegszeiten an. Das umfassende Gesetz schreibt unbegrenzten bezahlten Krankenurlaub, eine obligatorische Unfallversicherung für alle Arbeitnehmer, das Recht auf Gewerkschaftsbeitritt und erstmals auch das Recht auf Mutterschaftsurlaub für alle berufstätigen Frauen nach der Geburt eines Kindes vor. Viele Regierungsmitglieder halten dies für eine Kapitulation vor den Streikenden, doch die Ergebnisse sind eindeutig: In allen Fabriken wurde die Arbeit wieder aufgenommen."
 strikes_event.9.a:0 "Hoffentlich reicht das."
 mutiny_event.1.t:0 "Meuterei niedergeschlagen"
 mutiny_event.1.desc:0 "Nach einigen Stunden angespannter Verhandlungen vor den Kasernentoren und in den Unterständen an vorderster Front ist die Meuterei in unserer Armee vorbei. Angesichts eines aussichtslosen Kampfes entschieden sich die Meuterer rasch zum Rückzug. \n\nDie Hauptfrage war nun das Schicksal der Befehlsverweigerer. Das Oberkommando des Heeres entschied sich für Gnade und versicherte den Meuterern, dass sie nicht hart bestraft würden. Es gibt einige Beispiele dafür, dass Soldaten degradiert und in eine andere Einheit versetzt wurden."
 mutiny_event.1.a:0 "Hoffen wir, dass das das Ende war."
 mutiny_event.2.t:0 "Eine leere Drohung"
 mutiny_event.2.desc:0 "Versuche, die Meuterer einzuschüchtern und zur Unterwerfung zu zwingen, schlugen fehl, da die Truppen kaum Angst vor den Einheiten zeigten, die sie unterdrücken sollten. Mit den an der Front erlernten Fähigkeiten organisierten sie rasch eine Verteidigung ihrer Stellungen, die jeden Versuch, sie zu besiegen, sehr kostspielig machen sollte. \n\nDie Offiziere der loyalistischen Einheiten haben sich zurückgezogen und warten auf weitere Befehle, doch dieser kleine Erfolg hat die Entschlossenheit der Meuterer zweifellos gestärkt."
 mutiny_event.2.a:0 "Niemand hätte das vorhersagen können."
 mutiny_event.3.t:0 "„Wofür kämpfen wir?“"
 mutiny_event.3.desc:0 "„Es kommt nicht selten vor, dass ein Soldat daran zweifelt, ob das, was er tut, es wirklich wert ist. Kann irgendetwas die Opfer rechtfertigen, die wir von Ihnen verlangen? Können wir wirklich von Ihnen verlangen, möglicherweise für ein Ziel zu sterben, das Sie nie erreichen werden?\n\nEs ist eine bedauerliche Tatsache, dass wir in der Zeit leben müssen, in der wir geboren wurden. Das Schicksal hat entschieden, dass wir Krieg führen müssen, um unsere Freiheit, unsere Heimat und unsere [Root.GetAdjective] Lebensweise zu schützen! Wir haben diesen Krieg nicht gewählt, er wurde uns aufgezwungen! Sie wissen, dass ich nichts von Ihnen verlangen würde, was ich nicht selbst tun würde, und ich weiß, dass Sie alles Notwendige tun werden, um den Sieg zu sichern.“\n\n[Root.GetLeader]s Rede vor den Truppen scheint die gewünschte Wirkung gehabt zu haben, denn die Soldaten brachen in spontanen Jubel aus und kehrten ohne mehr als das übliche Maß an Klagen zu ihren Pflichten zurück."
 mutiny_event.3.a:0 "Gute Rede."
 mutiny_event.4.t:0 "Das Gesetz zum Kriegsverrat"
 mutiny_event.4.desc:0 "Das Kriegsministerium tut sein Bestes, um die Meuterei in der Armee vor der Öffentlichkeit zu schützen, doch die Zensur von Briefen greift nur bedingt. Soldaten im Urlaub verbreiteten schnell die Nachricht, dass die Armee nicht länger bereit sei, in diesem Krieg unnötig Blut zu vergießen.\n\nOhne die Meuterei konkret zu erwähnen, verkündete [Root.GetLeader] heute, dass die Regierung ab sofort jede Handlung, die mangelndes Engagement für den Krieg zeige, als Verrat betrachte.\n\nDie Strafe für Verrat ist bekannt, und die öffentliche Unterstützung für die Meuterer ist so gut wie verflogen. Die Nachricht davon verbreitete sich natürlich weithin. Da die Soldaten wenig Unterstützung von der Bevölkerung erfuhren, nahmen sie still und leise ihren Dienst wieder auf."
 mutiny_event.4.a:0 "Wir sollten das nicht buchstabieren müssen."
 mutiny_event.5.t:0 "Der Versuch einer Niederschlagung scheitert"
 mutiny_event.5.desc:0 "Das Kriegsministerium tut zwar sein Bestes, um die Bekanntheit der aktuellen Meuterei in der Armee zu unterdrücken, doch die Zensur von Briefen greift nur bedingt. Soldaten im Urlaub verbreiten schnell die Nachricht, dass die Armee nicht länger bereit ist, in diesem Krieg unnötig zu bluten.\n\nVersuche der Regierung, die Meuterei einzudämmen, sind völlig gescheitert. Berichte der Geheimpolizei deuten darauf hin, dass die Meuterer in der Bevölkerung großen Rückhalt genießen, sodass es unwahrscheinlich ist, sie zu isolieren und zu unterdrücken."
 mutiny_event.5.a:0 "Diese Missachtung der Gesetze ist zutiefst beunruhigend."
 mutiny_event.6.t:0 "Das [Root.GetAdjective] Friedensangebot"
 mutiny_event.6.desc:0 "[Root.GetLeader] gab heute gegenüber der Presse bekannt, dass sein jüngstes Friedensangebot gescheitert ist. Die Ursachen für diese unglückliche Wendung der Ereignisse sind zwar sehr komplex, doch die Forderung von [Root.GetAdjective], die Gegenseite solle für alle entstandenen Schäden aufkommen, vollständig abrüsten und öffentlich eingestehen, den Krieg begonnen zu haben, war möglicherweise der Tropfen, der das Fass zum Überlaufen brachte.\n\nUnsere Feinde reagierten mit gleicher Münze und bezeichneten unsere berechtigten Forderungen als Forderung nach bedingungsloser Kapitulation. Sie versprachen, diesen Krieg bis zum bitteren Ende zu führen..\n\nDa unsere Feinde offensichtlich nicht zur Vernunft kommen und versprachen, weiterzukämpfen, sind die Versuche der Meuterer, eine Friedensregelung zu erzwingen, gescheitert."
 mutiny_event.6.a:0 "Schreckliche Schande."
 mutiny_event.7.t:0 "Das militärische Vorgehen ist erfolgreich."
 mutiny_event.7.desc:0 "Trotz einiger Fälle, in denen kleine Gruppen von Meuterern beschlossen, einen Kampf daraus zu machen, war unsere Operation zur Niederschlagung des Aufstands ein überwältigender Erfolg. Loyalisten, die sich eher auf ihre Anzahl als auf ihr Können verließen, umzingelten die Hochburgen der Meuterer und forderten ihre Kapitulation. Die meisten Soldaten entschieden sich, nicht gegen ihre eigenen Landsleute zu kämpfen und ergaben sich friedlich. \n\nDie Rädelsführer werden vor geheimen Kriegsgerichten angeklagt, der durchschnittliche Soldat wird jedoch zurück an die Front geschickt, allerdings in einer anderen Einheit, um die Bildung neuer Meutererzellen zu verhindern."
 mutiny_event.7.a:0 "Gut gemacht."
 mutiny_event.8.t:0 "Bruder gegen Bruder"
 mutiny_event.8.desc:0 "Unsere Versuche, die Wahlen für die Arbeiter- und Soldatenräte zu verhindern, haben die Situation über alle pessimistischsten Erwartungen hinaus eskalieren lassen. Anstatt zu kapitulieren, haben die Meuterer provisorische Räte gebildet, Feldkommandeure gewählt und Verteidigungsstellungen auf den Straßen errichtet. Es ist klar, dass sie einen Kampf daraus machen wollen.\n\nDie Risse in der Armee ziehen sich mittlerweile durch jede Einheit und oft sogar zwischen Mitgliedern derselben Familie. [Root.GetNameDefCap] steht am Rande eines Bürgerkriegs."
 mutiny_event.8.a:0 "Das wird immer schlimmer."
 mutiny_event.9.t:0 "Eine neue Art von Offizier"
 mutiny_event.9.desc:0 "Trotz heftiger Einwände des Militärs führte jede Einheit der [Root.GetAdjective] Armee Wahlen durch, um ihren Kommandeur zu wählen. Die Ergebnisse waren sehr überraschend, da die meisten der Gewählten erfahrene Soldaten mit viel Felderfahrung sind. Während viele Berufsoffiziere dies immer noch als persönliche Beleidigung empfinden, besteht kaum ein Zweifel daran, dass die meisten Soldaten diese Situation deutlich bevorzugen."
 mutiny_event.9.a:0 "Das sollte doch nicht funktionieren, oder?"
 if_they_accept:0 "Wenn sie akzeptieren:\n"
 canada_vanilla.1.title:0 "Ronnie, das Bren Gun Girl"
 canada_vanilla.1.desc:0 "Rund eine Million kanadische Frauen traten während des Zweiten Weltkriegs ins Berufsleben ein. In den nationalen Medien wurden sie durch ein Symbol der Widerstandsfähigkeit und des Patriotismus repräsentiert: Veronica Foster, im Volksmund Ronnie, das Bren Gun Girl genannt. Sie arbeitete für John Inglis and Company in einer Waffenfabrik in Toronto, während ihre drei Brüder in Übersee kämpften. Die Plakate und Kurzfilme, in denen sie und andere Frauen wie sie an den Kriegsanstrengungen teilnahmen, inspirierten wahrscheinlich die bekanntere Medienkampagne um „Rosie the Riveter“ nach dem Kriegseintritt Amerikas."
 canada_vanilla.1.opt:0 "„Fabrikarbeit ist nicht schwieriger als Hausarbeit“, heißt es in den Wochenschauen."
 usa.30.t:0 "Wahlen zum Kongress"
 usa.30.desc:0 "Alle zwei Jahre werden ein Drittel der Senatssitze und alle Sitze im Repräsentantenhaus neu vergeben. Obwohl die Wahlen oft von Weltereignissen überschattet werden, kann die lokale Situation in jedem Wahlkreis manchmal den Unterschied ausmachen. \n\nNach Auszählung aller Stimmen lag die regierungsfreundliche Fraktion bei [USA.GetSenateElectionOutcome] im Senat und [USA.GetHouseElectionOutcome] im Repräsentantenhaus."
 usa.30.a:0 "Das Volk hat gesprochen."
 SenateElectionLost:0 "verlorene [?sen_loc] Sitze"
 SenateElectionGained:0 "[?sen_loc] Sitze gewonnen"
 HouseElectionLost:0 "verlorene [?ror_loc] Sitze"
 HouseElectionGained:0 "[?ror_loc] Sitze gewonnen"
 usa.31.t:0 "Eine Veränderung in der politischen Landschaft"
 usa.31.desc:0 "Mit dem Amtsantritt eines neuen Präsidenten hat sich die ehemalige Opposition im Kongress weitgehend auf die Seite der neuen Regierung gestellt. Präsident [USA.GetLeader] kann auf die Unterstützung der [?senators_support] Senatoren und [?representatives_support] Abgeordneten zählen."
 usa.31.a:0 "Das Volk hat gesprochen."
 usa_congress_elections_tt_bad:0 "Bei den Kongresswahlen wird die regierungstragende Fraktion auf stärkere Opposition stoßen.\n"
 usa_congress_elections_tt_good:0 "Die Dynamik der Präsidentschaftswahlen dürfte sich auf die Kongresswahlen übertragen.\n"
 usa.32.t:0 "Regierungsfraktion erringt Mehrheit im Kongress"
 usa.32.desc:0 "Die von uns eingeführten Reformen des Wahlsystems scheinen äußerst erfolgreich gewesen zu sein, da bei der letzten Wahl eine große Zahl unserer Anhänger in den Kongress gewählt wurde. Mit einer soliden Mehrheit dürfte es uns nicht schwerfallen, unsere politische Agenda durchzusetzen."
 usa.32.a:0 "Ein klares Zeichen unserer Unterstützung in der Bevölkerung."
 usa.40.t:0 "Senator stimmt für Regierungsvorschlag"
 usa.40.desc:0 "Bei einer kürzlichen Abstimmung hat ein Senator überraschend die Seiten gewechselt und für einen Regierungsvorschlag gestimmt. Obwohl es sich um eine eher geringfügige Angelegenheit handelte, sorgte die öffentliche Unterstützung eines zuvor offenkundigen Kritikers von [USA.GetLeader] in Washington für Aufsehen.\n\nEinige Analysten glauben, dass dieses Beispiel weitere Senatoren dazu bewegen wird, ihre Haltung zu überdenken."
 usa.40.a:0 "Ein nützlicher Verbündeter."
 usa.41.t:0 "Abgeordneter spricht sich leidenschaftlich für die Regierung aus"
 usa.41.desc:0 "Auf einer Spendenveranstaltung zu ihrer Haltung zu verschiedenen politischen Themen befragt, sprach sich eine Abgeordnete für die Politik von Präsident [USA.GetLeader] aus. Sie behauptete weiter, viele ihrer Kollegen hätten ähnliche Ansichten, würden aber durch „idiotische Kurzsichtigkeit, die nicht über die nächste Wahl hinausgeht“, davon abgehalten, das Richtige für das amerikanische Volk zu tun. \n\nIhre Äußerungen wurden in der Presse ausführlich aufgegriffen und brachten mehrere ihrer Kollegen in Schwierigkeiten, da sie ihre Haltung zu diesen Themen darlegen mussten."
 usa.41.a:0 "Sie hat recht, wissen Sie."
 usa.42.t:0 "Senator spricht sich gegen Regierungspolitik aus"
 usa.42.desc:0 "Ein Senator gab einer großen Zeitung ein Interview, in dem er erklärte, er könne die „törichte und gefährliche“ Politik von Präsident [USA.GetLeader] nicht länger unterstützen. Er behauptete weiter, er kenne mehrere andere Senatoren, die ähnlich denken und den Präsidenten in Kürze im Stich lassen würden."
 usa.42.a:0 "Er wird schon bald zurückgerannt kommen."
 usa.43.t:0 "Abgeordneter kritisiert Präsident"
 usa.43.desc:0 "Während einer kürzlichen Debatte zur Steuerreform hielt ein Abgeordneter eine langatmige Rede über die zahlreichen Versäumnisse der Regierung. Ihm zufolge könne kein vernünftig denkender Amerikaner die Politik des Präsidenten unterstützen, unabhängig von seiner Parteizugehörigkeit. \n\nSeine harschen Worte scheinen Wirkung gezeigt zu haben, denn eine Reihe von Abgeordneten, die zuvor fest hinter der Politik von [USA.GetLeader] standen, äußerten ihre Unterstützung."
 usa.43.a:0 "Eine Schande."
 usa.44.t:0 "Opposition erleidet Niederlage im Senat"
 usa.44.desc:0 "Ein Misstrauensantrag gegen Präsident [USA.GetLeader] ist im Senat gescheitert. Selbst seine glühendsten Unterstützer hatten wenig Hoffnung auf eine Annahme, doch die hohe Zahl der Gegenstimmen war selbst für pessimistischste Beobachter ein Schock. Offenbar genießt der Präsident im Senat weitaus mehr Unterstützung als die meisten glaubten, was ihm bei der Umsetzung seiner Gesetzgebungsvorhaben helfen dürfte."
 usa.44.a:0 "Großartig."
 usa.45.t:0 "Ausschuss des Repräsentantenhauses unterstützt die Politik des Präsidenten"
 usa.45.desc:0 "Die jüngste Anhörungsrunde im Haushaltsausschuss des Repräsentantenhauses führte zu einem Bericht, der der Politik des Präsidenten wesentliche Verbesserungen in allen verfügbaren Wirtschaftsindikatoren zuschreibt. Zwar ist der Bericht kein uneingeschränktes Lob, doch ist er ein Schlag für diejenigen, die den Präsidenten kritisierten und Reformen forderten. Mehrere Abgeordnete haben bereits öffentlich erklärt, dass sie zwar weiterhin Zweifel an der Agenda des Präsidenten hegen, ihn aber nun unterstützen werden."
 usa.45.a:0 "Und das sollten sie auch."
 usa.46.t:0 "Senator geht in den Ruhestand"
 usa.46.desc:0 "Nach einem leichten Herzinfarkt gab ein hochrangiger Senator heute seinen Rücktritt aus gesundheitlichen Gründen bekannt. In über zwei Jahrzehnten im Kongress hatte der Senator ein großes Unterstützernetzwerk aufgebaut und sein Einfluss war enorm. Obwohl er technisch gesehen nur eine Stimme hatte, schätzten Washingtoner Insider ihn dennoch als mehrere Stimmen wert ein, da er der Schlüssel zur Sicherung mehrerer weiterer Stimmen war. \n\nDa der Sitz höchstwahrscheinlich an einen erklärten Kritiker von Präsident [USA.GetLeader] geht, wird es für die Regierung deutlich schwieriger, die notwendigen Stimmen für die Verabschiedung von Gesetzen zu sichern."
 usa.46.a:0 "Er wird uns fehlen. Und seine Stimme auch."
 usa.47.t:0 "Anhörungen im Repräsentantenhaus zu Fehlverhalten des Präsidenten"
 usa.47.desc:0 "Ein kleiner Skandal im Weißen Haus nimmt Fahrt auf. Nachdem Medien wochenlang angedeutet hatten, ein kleiner Verwaltungsbeamter habe Bestechungsgelder für lukrative Regierungsaufträge angenommen, hat der Haushaltsausschuss des Repräsentantenhauses Anhörungen eingeleitet, um festzustellen, ob der Präsident davon Kenntnis hatte. Die meisten Beobachter gehen zwar nicht davon aus, dass dies zu größeren Schwierigkeiten für Präsident [USA.GetLeader] führen wird, doch wird es zweifellos bedeuten, dass sich viele seiner Anhänger zunächst zurückhalten müssen."
 usa.47.a:0 "Eine Hexenjagd."
 usa.61.t:0 "Senator aus [USA_congress_investment_state.GetName] bietet Unterstützung an"
 usa.61.desc:0 "Der ranghöchste Senator aus [USA_congress_investment_state.GetName] hat der Regierung Unterstützung angeboten. Sein Bundesstaat leidet unter kritischer Unterinvestition, und ein staatliches Konjunkturprogramm würde ihn sicherlich dazu bringen, seine Haltung zu bestimmten Regierungsvorschlägen zu überdenken. Der Senator sitzt in mehreren wichtigen Ausschüssen und ist bekannt für seine Fähigkeit, Kompromisse einzugehen, was seine Stimme in beiden Häusern um einiges wertvoller macht."
 usa.61.a:0 "Es ist eine sehr unterentwickelte Region."
 usa.61.b:0 "Das riecht nach Korruption."
 usa.62.desc:0 "Die Senatoren von [USA_congress_investment_state.GetName] haben sich an die Regierung gewandt und dem Präsidenten ihre Unterstützung angeboten. Im Gegenzug erhält er die informelle Garantie, dass [USA_congress_investment_state.GetName] als Standort für eine neue Munitionsfabrik der Armee dienen soll. Sie argumentieren, der Bau einer Fabrik in der Region würde viele Arbeitsplätze schaffen und der Armee die dringend benötigte Unterstützung in einer zunehmend gefährlichen Welt bieten. Die beiden Senatoren erwähnten zudem ihre ausgezeichnete Zusammenarbeit mit mehreren einflussreichen Mitgliedern des Repräsentantenhauses."
 usa.62.a:0 "Sie bringen viele gute Argumente vor."
 usa.62.b:0 "Solche Geschäfte sind unter der Würde des Präsidenten."
 usa.63.t:0 "Vertreter von [USA_congress_investment_state.GetName] bieten Unterstützung"
 usa.63.desc:0 "Die Kongressdelegation von [USA_congress_investment_state.GetName] hat der Regierung mehrere Vorschläge zur Verbesserung der Infrastruktur des Bundesstaates unterbreitet. Bundesmittel sollten für den Ausbau von Straßen und Brücken bereitgestellt werden, um den Handel zwischen den Bundesstaaten zu fördern. Sie betonte außerdem, dass die Unterstützung der Regierung in diesem Bereich sie dazu ermutigen würde, den Präsidenten bei seinen Vorhaben direkter zu unterstützen."
 usa.63.a:0 "Eine lobenswerte Initiative."
 usa.63.b:0 "Lassen Sie sie versuchen, das selbst durchzusetzen."
 usa.64.t:0 "Senatsausschuss untersucht Schiffsbau in [USA_congress_investment_state.GetName]"
 usa.64.desc:0 "Auf Drängen des ranghöchsten Senators von [USA_congress_investment_state.GetName] hat der Handelsausschuss des Senats Anhörungen zur Lage der lokalen Schiffbauindustrie eingeleitet. Experten zufolge hängt ein erheblicher Teil des US-Handels vom Überseehandel ab, und es mangelt dem Land dringend an Schiffbaukapazitäten. [USA_congress_investment_state.GetName] wurde als Region identifiziert, in der große Investitionen getätigt werden sollten, und mehrere Ausschussmitglieder äußerten die Erwartung, dass die Regierung von [USA.GetLeader] hierfür Mittel bereitstellen wird."
 usa.64.a:0 "Eine entscheidende Schwäche."
 usa.64.b:0 "Wir haben größere Probleme."
 news.334.t:0 "Der Panay-Vorfall"
 news.334.d:0 "[USA.GetAdjective] und [ENG.GetAdjective] Kanonenboote wurden heute in getrennten Aktionen von [jap.GetAdjective] Flugzeugen angegriffen, als sie westliche Zivilisten von der Front im Krieg zwischen [jap.GetName] und [CHI.GetName] evakuierten. Obwohl die USS Panay eindeutig als [USA.GetAdjective] Schiff gekennzeichnet war, wurde sie von zwei Bomben getroffen und versenkt. Drei [USA.GetAdjective] und ein [ITA.GetAdjective] Bürger wurden getötet und weitere verletzt. Bei einem separaten Angriff auf die HMS Ladybird wurde ein [ENG.GetAdjective] Matrose getötet.\n\nSowohl die [USA.GetAdjective] als auch die [ENG.GetAdjective] Regierung haben scharfe Proteste veröffentlicht. Der Vorfall verdeutlicht die zunehmenden Spannungen zwischen den drei führenden Seemächten."
 news.334.a:0 "Hat [jap.GetName] keine Grenzen?"
 news.334.b:0 "Dies könnte die Sache verkomplizieren"
 news.334.c:0 "Die [jap.GetAdjective] Bedrohung wird immer größer"
 news.335.t:0 "Die Spannungen zwischen [USA.GetNameDef] und [jap.GetName] nehmen zu"
 news.335.d:1 "\nDer jüngste Panay-Vorfall ist außer Kontrolle geraten. Empörung in [USA.GetNameDef] veranlasste mehrere prominente Politiker, sofortige Vergeltungsmaßnahmen gegen [jap.GetNameDef] zu fordern. Die [USA.GetAdjective] Medien sind voll von immer neuen Geschichten über [jap.GetAdjective] Gräueltaten, manche wahr, manche übertrieben, manche frei erfunden. Da die beiden Großmächte am Rande eines Krieges stehen, hoffen nur wenige Beobachter noch auf eine Stabilisierung der Lage."
 news.335.a:0 "Was bedeutet das für den Pazifik?"
 news.335.b:0 "Denken Sie an das Panay!"
 news.335.c:0 "Lasst sie kommen!"
 news.335.e:0 "Schlechte Nachrichten für Japan sind gute Nachrichten für uns"
 news.335.f:0 "Dies könnte die Situation in China erschweren"
 news.336.title:0 "Erinnern Sie sich an Alamo"
 news.336.desc:0 "[MEX.GetAdjective]-Truppen haben Texas nach hundertjähriger Abwesenheit wieder besetzt. [USA.GetAdjective]-Truppen wurden vollständig aus den großen Städten des Landes, einschließlich San Antonio und seinem berühmten Wahrzeichen, dem Alamo, vertrieben. Obwohl an diesem historischen Ort keine Kämpfe stattfanden, besichtigte [MEX.GetLeader] das Gelände der katholischen Mission und hielt Kundgebungen und Reden ab, um die Truppen zum Weiterkämpfen für den endgültigen Sieg über die verhassten „Yanquis“ zu ermutigen."
 news.336.a:0 "Wir erinnern uns."
 news.336.b:0 "Wir haben es vergessen."
 news.336.c:0 "Wie konnte [USA.GetLeader] das zulassen?"
 generic.19.t:0 "[From.GetName] sendet industriellen Support"
 generic.19.d:0 "[From.GetNameDefCap] hat uns mitgeteilt, dass sie unsere Sache unterstützen und uns ein gewisses Maß an Industriehilfe zukommen lassen werden, um unsere Position gegenüber unseren gemeinsamen Feinden zu stärken."
 usa.401.t:0 "[From.GetNameDefCap] akzeptiert Zerstörer für Basisvereinbarung"
 usa.401.desc:0 "Der britische Premierminister [From.GetLeader] hat seine Zustimmung zu den Bedingungen des Abkommens über Zerstörer gegen Stützpunkte signalisiert. Eine Gruppe von [From.GetAdjective] Marineoffizieren ist eingetroffen, um die Zerstörer zu inspizieren und die Übergabe zu überwachen.\n\n Es gibt offensichtlich noch einiges zu tun, da mehrere [From.GetAdjective] Offiziere über die schiere Menge und Dicke von Guano und Rost auf den zu übergebenden Schiffen etwas besorgt zu sein scheinen."
 usa.401.a:0 "Bettler können nicht wählerisch sein."
 generic.22.t:0 "[FROM.GetName] erklärt Unabhängigkeit"
 generic.22.desc:0 ""
 generic.23.t:0 "[FROM.GetName] verlässt [ROOT.GetFactionName]"
 generic.24.t:0 "[FROM.GetName] bittet um einen Nichtangriffspakt"
 generic.24.d:0 "[FROM.GetLeader] und seine Diplomaten haben sich an uns gewandt und um einen Nichtangriffspakt zwischen unseren beiden Ländern gebeten. Ein solches Abkommen könnte uns bei unseren zukünftigen militärischen Bemühungen helfen."
 generic.24.a:0 "Akzeptieren Sie die Anfrage"
 generic.24.b:0 "Die Anfrage ablehnen"
 generic.25.t:0 "[FROM.GetName] hat unsere Anfrage akzeptiert"
 generic.25.d:0 "Auf unsere Anfrage hin hat sich [FROM.GetNameDef] entschieden, positiv zu reagieren. Die militärische Haltung von [FROM.GetName] wird uns keine Sorgen mehr bereiten."
 generic.25.a:0 "Großartig!"
 generic.26.t:0 "[FROM.GetName hat unsere Anfrage abgelehnt]"
 generic.26.d:0 "Auf unsere Anfrage hin hat sich [FROM.GetNameDef] zu einer negativen Antwort entschlossen. Die militärische Haltung von [FROM.GetName] bereitet uns Sorgen."
 generic.26.a:0 "Bereiten sie etwas vor?"
 generic.27.t:0 "[FROM.GetName] bietet eine Garantie"
 generic.27.d:0 "Unsere guten Beziehungen zu [FROM.GetName] haben sie dazu veranlasst, darüber nachzudenken, unser Land gegen ausländische Bedrohungen zu schützen. Die Frage ist: Wollen wir wirklich, dass unsere Politik beeinflusst wird, oder wollen wir neutral bleiben?"
 generic.27.a:0 "Akzeptieren Sie ihren Vorschlag"
 generic.27.b:0 "Wir brauchen sie nicht"
 generic.28.t:0 "[FROM.GetName] hat unsere Garantie akzeptiert "
 generic.28.d:0 "Die [FROM.GetAdjective]-Regierung hat unseren Schutz akzeptiert, wir werden nun in der Lage sein, an der Seite von [FROM.GetNameDef] in jeden Verteidigungskrieg einzugreifen."
 generic.28.a:0 "Sie brauchten unseren Schutz"
 generic.29.t:0 "[FROM.GetName] hat unsere Vorschläge abgelehnt"
 generic.29.d:0 "Die [FROM.GetAdjective]-Regierung hat unseren Schutz abgelehnt. Es scheint, als bräuchten sie keine Hilfe und wir wären nicht in der Lage, an der Seite von [FROM.GetNameDef] in einen Verteidigungskrieg einzugreifen."
 generic.29.a:0 "Zumindest haben wir einen Antrag gemacht …"
 generic.30.t:0 "[FROM.GetName] bittet um unseren Schutz"
 generic.30.d:0 "Heute Morgen [FROM.GetAdjective] haben Diplomaten unser Kabinett um eine Aktion gebeten. Sie verlangen eine Garantie. Wenn wir diese akzeptieren, wären wir gezwungen, im Falle einer Aggression einzugreifen."
 generic.30.a:0 "Unterzeichnen Sie den Vertrag"
 generic.100.t:0 "Ein Neuanfang für [FROM.GetName]"
 generic.101.t:0 "[FROM.GetName] baut Abwehrmaßnahmen auf"
 generic.101.d:0 ""
 generic.101.a:0 "Sie bereiten etwas vor ..."
 generic.102.t:0 "[FROM.GetName] bittet um Unterstützung"
 generic.102.d:0 "In den letzten Monaten haben in [FROM.GetName] unabhängige Gruppen die Macht übernommen, und die [FROM.GetAdjective]-Befreiungsbewegung wächst. Einige [FROM.GetAdjective]-Diplomaten möchten wissen, wie unsere künftigen Beziehungen zu diesem erwachenden Land aussehen werden. Was sollten wir in diesem zukünftigen Unabhängigkeitskrieg tun?"
 generic.102.a:0 "Wir unterstützen [FROM.GetName]"
 generic.102.b:0 "Wir bleiben neutral"
 generic.102.c:0 "Wir werden [FROM.OVERLORD.GetName] unterstützen"
 generic.103.t:0 "Die [FROM.Capital.GetName]-[ROOT.Capital.GetName]-Konferenz"
 # AXIS VICTORY EVENTS
 cw_axis_victory.1.t:0 "Hitlers Geburtstag"
 cw_axis_victory.1.d:0 "Heute fand im Garten der Reichskanzlei in Germania ein großes Fest statt, an dem der Führer seinen 60. Geburtstag feierte. Der Mann stand auf und hielt eine Rede über die Großartigkeit des germanischen Volkes. Tausende Menschen warteten auf diesen Moment. Unter ihnen waren einige namhafte Persönlichkeiten der Partei wie Hermann Göring, Heinrich Himmler und sogar Rudolf Heß, dem Hitler nach seiner Flucht nach England begnadigte. Die Rede endete mit einem Zittern des Führers, einem der wenigen Anzeichen für seinen nachlassenden Gesundheitszustand."
 cw_axis_victory.1.a:0 "Hoffen wir, dass es ihm besser geht"
 cw_axis_victory.2.t:0 "Konferenz von Damaskus"
 cw_axis_victory.2.d:0 "Als die Kolonialmächte fielen, gaben sie die syrischen Gebiete auf. Schnell wurde eine neue autonome Regierung gebildet. Diese Gebiete liegen jedoch sowohl im türkischen als auch im unseren Einflussbereich. Es ist nun an der Zeit, die Türkei zu einer Konferenz nach Damaskus einzuberufen, um die Situation zu klären. Diese Gebiete würden der italienischen Wirtschaft großen Nutzen bringen, da sie neue Handelsrouten nach Asien ermöglichen würden. Es ist jedoch klar, dass die Türkei diese Gebiete nicht ohne Zugeständnisse hergeben wird."
 cw_axis_victory.2.a:0 "Syrien sollte uns gehören"
 cw_axis_victory.2.b:0 "Die Türken werden die syrischen Länder verwalten"
 cw_axis_victory.3.t:0 "[FROM.GetName], Syrien zu verlassen"
 cw_axis_victory.3.d:0 "[FROM.GetName] hat uns zu einer Konferenz nach Damaskus eingeladen. Die Ergebnisse der Konferenz sind folgende: Sie sind bereit, uns die syrischen Länder im Austausch für eine freundliche Außenpolitik gegenüber ihrem Reich zu überlassen."
 cw_axis_victory.3.a:0 "Die osmanische Wiedergeburt"
 cw_axis_victory.4.t:0 "[FROM.GetName] hat eine aggressive Anfrage gesendet"
 cw_axis_victory.4.d:0 "Nach der Konferenz in Damaskus stellten uns die Italiener ein Ultimatum. Sie wollen die Macht über die syrischen Gebiete übernehmen. Uns bleibt nur wenig Zeit, alle türkischen Truppen aus diesem Gebiet abzuziehen, andernfalls wird Italien dies als Kriegshandlung betrachten."
 cw_axis_victory.4.a:0 "Sie werden unsere Grenzen nicht erreichen!"
 cw_axis_victory.4.b:0 "Wir müssen uns zurückziehen ..."
 cw_axis_victory.5.t:0 "Türkei zieht sich aus Syrien zurück"
 cw_axis_victory.5.d:0 "Nach hitzigen Diskussionen zwischen unseren beiden Regierungen beschloss die Türkei, nachzugeben und die syrischen Gebiete zu verlassen. Die Kriegsdrohung war ein wirksames Druckmittel. Allerdings ist es nun wahrscheinlicher, dass sie unfreundliche Maßnahmen gegenüber unserem Imperium ergreifen."
 cw_axis_victory.5.a:0 "Ein weiterer Sieg für Italien!"
 cw_axis_victory.6.t:0 "Damaskus-Konferenz eskaliert"
 cw_axis_victory.6.a:0 "Die Konferenz in Damaskus endete heute abrupt. Türkische und italienische Diplomaten konnten sich nicht einigen, und die Diskussion geriet rasch in Beleidigungen. Auslöser dieser hitzigen Diskussion war der Vorschlag eines italienischen Diplomaten, italienisches Militär in Syrien einzusetzen. Die Türken bekräftigten, dass eine solche Aktion als Kriegshandlung gewertet würde, stürmten daraufhin aus dem Konferenzraum und beschimpften unsere diplomatischen Mitarbeiter."
 cw_axis_victory.6.a:0 "Zeit für eine militärische Intervention"
 cw_axis_victory.7.t:0 "Türkei bittet um Frieden"
 cw_axis_victory.7.d:0 "Unsere diplomatischen Mitarbeiter in Rom haben ein Telegramm der Türken erhalten, die um Frieden zwischen unseren beiden Nationen bitten. Sie erkennen unseren Einfluss auf die syrischen Gebiete an und sind nun bereit, mit unseren Militärangehörigen in der Region zusammenzuarbeiten. Im Gegenzug für diese Anerkennung fordern sie einen Waffenstillstand. Wie sollen wir auf diesen Vorschlag reagieren?"
 cw_axis_victory.7.a:0 "Angebot annehmen"
 cw_axis_victory.7.b:0 "Ein Regierungswechsel ist notwendig"
 cw_axis_victory.7.c:0 "Nicht antworten"
 cw_axis_victory.8.t:0 "Italien fordert Waffenstillstand"
 cw_axis_victory.8.d:0 "Die italienische Regierung schickte uns ein Telegramm, in dem sie um einen Waffenstillstand zwischen unseren beiden Nationen bat. Es ist klar, dass die Italiener nicht zum Krieg bereit waren. Sollten wir ihren Vorschlag annehmen, würden sie unsere Ansprüche auf die syrischen Gebiete anerkennen."
 cw_axis_victory.8.a:0 "Eine willkommene Überraschung"
 cw_axis_victory.9.t:0 "Japans Rückkehr zur Zivilherrschaft"
 cw_axis_victory.9.d:0 "Viele Jahre lang stand das japanische Volk unter Militärherrschaft, doch nun, mit dem Ende des Krieges gegen die imperialistischen Amerikaner, ist es an der Zeit, zu einer zivilen Herrschaft zurückzukehren und die Härten des Krieges für unsere Bevölkerung zu lindern."
 cw_axis_victory.9.a:0 "Der Beginn eines blühenden Jahrzehnts"
 cw_axis_victory.10.t:0 "Eröffnung der Tokioter Börse"
 cw_axis_victory.10.d:0 "Nach der Rückkehr zur Zivilgesellschaft öffnete die Tokioter Börse heute Morgen ihre Pforten. Zahlreiche Investoren waren anwesend. Dieser Tag markiert die Rückkehr der japanischen Wirtschaft auf den Weltmarkt."
 cw_axis_victory.10.a:0 "Zurück im Spiel"
 cw_axis_victory.11.t:0 "Studentenproteste im ganzen Reich"
 cw_axis_victory.11.d:0 "Im ganzen Reich haben sich Studentengruppen gebildet. Sie marschieren friedlich durch die Straßen und fordern die Regierung auf, ihre Militärausgaben zu kürzen und sich stattdessen auf den Ausbau der Universitäten zu konzentrieren. Diese Märsche sind jedoch voll von schlecht ausgebildeten, linksradikalen Gruppen, die auf ihrem Weg Chaos und Zerstörung anrichten. Wegen dieser Gruppen könnte die Situation schnell eskalieren."
 cw_axis_victory.11.a:0 "Wir müssen vorbereitet sein"
 cw_axis_victory.12.t:0 "Triumphbogen gebaut"
 cw_axis_victory.12.d:0 "Nach unserem Sieg über den Kommunismus beschloss die deutsche Regierung, zu Ehren dieses Erfolgs ein Denkmal zu errichten. Der sogenannte „Triumphbogen des germanischen Volkes“ ist ein gewaltiges Bauwerk. Er ist über 100 Meter hoch und wurde aus Steinplatten aus dem gesamten Reich erbaut. Die Fertigstellung dieses gewaltigen Bauwerks dauerte fünf Jahre (zwei Jahre länger als geplant), doch der spektakuläre Anblick dieses Denkmals entschädigte dafür. Heute fand die Einweihung statt. Der Führer persönlich war anwesend, um vor den auf dem Siegerplatz in Germanien versammelten Menschen eine Rede zu halten."
 cw_axis_victory.12.a:0 "Es wird noch weitere 1000 Jahre stehen!"
 cw_axis_victory.13.t:0 "Der große Terror"
 cw_axis_victory.13.d:0 "Im Morgengrauen waren im ganzen Land zahlreiche Detonationen zu hören. Terroristen legten Bomben an den meisten Machtsymbolen unseres großartigen Landes, an Rathäusern, Schulen und Fabriken. Die vorläufige Zahl der Todesopfer liegt bei 589, doch Menschen werden weiterhin vermisst. In mehreren Bundesstaaten wurde der Ausnahmezustand ausgerufen und eine Ausgangssperre verhängt. Wer die Bomben gelegt hat und welche Motive dahintersteckten, ist noch unklar. Klar ist jedoch: Das Land ist von diesem Terrorakt schwer getroffen. Der Präsident wird im Laufe des Tages eine im Radio übertragene Rede zur Lage halten."
 cw_axis_victory.13.a:0 "Staatsfeinde haben es getan!"
 cw_axis_victory.13.b:0 "Verdammte Faschisten"
 cw_axis_victory.14.t:0 "Boom auf dem Tokioter Markt"
 cw_axis_victory.14.d:0 "Die Tokioter Börse schloss heute mit einem beeindruckenden Ergebnis. Sie erzielte einen Kursanstieg von 500 %. Das hat es in der Geschichte noch nie gegeben. Damit ist die Tokioter Börse die zweitgrößte Börse nach der deutschen Börse, die heute mit einem Kursanstieg von 1,2 % schloss. Die amerikanische Börse hinkt demgegenüber hinterher und schloss mit -0,2 %. Dies lässt sich auf die jüngsten Ereignisse in Amerika und die von der amerikanischen Regierung verhängte Ausgangssperre zurückführen. Das außergewöhnliche Ergebnis der Tokioter Börse ist jedoch ein zweischneidiges Schwert, da viele Finanziers nun einen plötzlichen Zusammenbruch befürchten."
 cw_axis_victory.14.a:0 "Wie lange wird es dauern?"
 cw_axis_victory.15.t:0 "Bewaffneter Aufstand in Algerien"
 cw_axis_victory.15.d:0 "Berichte von der anderen Seite des Mittelmeers zeigen, dass Streitkräfte unsere Friedenstruppen in Algerien angreifen. Seit Jahren versuchen die algerischen Streitkräfte, die Unabhängigkeit von uns zu erlangen. Der heutige Tag markiert einen neuen Schritt in der Eskalation der Gewalt. Wir müssen schnell handeln, um zu verhindern, dass der Aufstand eskaliert und französischen Bürgern in Algerien Schaden zugefügt wird. Der Schutz aller französischen Vermögenswerte und Personen ist unser oberstes Ziel."
 cw_axis_victory.15.a:0 "Werden sie aufhören, zu revoltieren?"
 cw_axis_victory.16.t:0 "Jüdische Nationalisten erklären ihre Unabhängigkeit"
 cw_axis_victory.16.d:0 "Unsere Garnison im Nahen Osten wurde von jüdischen Milizen angegriffen. Ihre Bewegung, die „Nationale Jüdische Befreiungsfront“, fordert seit der Damaskus-Konferenz den Rückzug unserer Truppen. Sie fordern die Selbstverwaltung des jüdischen Volkes. Da ihre Forderungen von der Regierung ignoriert wurden, beschlossen sie, zu den Waffen zu greifen und gegen unsere in der Region stationierten Truppen zu kämpfen."
 cw_axis_victory.16.a:0 "Sie können nicht gewinnen"
 cw_axis_victory.17.t:0 "Zürich Meeting"
 cw_axis_victory.17.d:0 "Heute Nachmittag fand ein Treffen der ehemaligen Achse Berlin-Rom statt. Die beiden Staatschefs [GER.GetLeader] und [ITA.GetLeader] diskutierten über die Zukunft des europäischen Kontinents. Auch wenn die Achse Berlin-Rom längst verschwunden ist, waren sich die beiden Staatschefs in verschiedenen Punkten, wie beispielsweise der Nahostfrage, einig. Es ist jedoch ziemlich offensichtlich, dass die beiden Nationen langsam auseinanderdriften, da ihre Volkswirtschaften unterschiedliche Wege einschlagen. Weitere Punkte, wie die militärische Zusammenarbeit, müssen noch besprochen werden."
 cw_axis_victory.17.a:0 "Militärische Zusammenarbeit, keine Gnade"
 cw_axis_victory.17.b:0 "Militärische Zusammenarbeit, Nein Danke"
 cw_axis_victory.17.c:0 "Die Aufrechterhaltung der Zusammenarbeit ist unsere beste Chance"
 cw_axis_victory.18.t:0 "Iberische Einigungskampagne"
 cw_axis_victory.18.d:0 "Seit dem Ende des Bürgerkriegs, der unser Land schwer getroffen hat, haben wir auf diesen Moment gewartet. Es ist nun an der Zeit, die Iberische Halbinsel unter spanischer Führung zu vereinen. Unsere Offiziere und Soldaten haben jahrelang für diesen Moment trainiert. [SPR.GetName] hat der Grenzpatrouille endlich den Befehl gegeben, sich mit portugiesischen Truppen zu messen. In mehreren portugiesischen Städten weht bereits die spanische Flagge im Wind. Bald wird die gesamte Halbinsel unter unserer Herrschaft stehen!"
 cw_axis_victory.18.a:0 "Vorwärts!"
 cw_axis_victory.20.t:0 "Istanbul-Konferenz"
 cw_axis_victory.20.d:0 "Die Istanbuler Konferenz findet derzeit in Istanbul statt. Unsere Regierung hat dieses Treffen beschlossen, um die Kontrolle über die armenischen Gebiete zu fordern und gemeinsam mit den dort bereits stationierten deutschen Truppen den Kaukasus zu besetzen. Die deutsche Delegation traf letzte Woche ein und hatte Gelegenheit, die Altstadt Istanbuls zu besichtigen. Die Armenienfrage ist noch nicht geklärt."
 cw_axis_victory.20.a:0 "Stellen Sie die Frage"
 cw_axis_victory.21.t:0 "Istanbuler Konferenz: Armenien"
 cw_axis_victory.21.d:0 "Die türkische Regierung lud eine Delegation deutscher Diplomaten zu einer Konferenz nach Istanbul ein. Thema der Konferenz war die deutsch-türkische Haltung im Nahen Osten und eine mögliche künftige Zusammenarbeit. Während des heutigen Treffens erkundigte sich ein türkischer Diplomat nach einer gemeinsamen Besetzung des Kaukasus. Die Türken verlangen die Besetzung von Teilen Armeniens und unterstützen im Gegenzug jede künftige deutsche Intervention in der Region. Sollen wir dieses Angebot annehmen?"
 cw_axis_victory.21.b:0 "Ein neuer Verbündeter ist immer gut"
 cw_axis_victory.21.a:0 "Niemals."
 recolts.1.t:0 "Recolts-Berichte"
 recolts.1.d:0 "Laut den Berichten aus den verschiedenen Silos im ganzen Land haben wir dieses Jahr [?recolt_gain|0]Mt Getreide zurückerhalten. In diesen schwierigen Zeiten ist es wichtig, einen strategischen Nahrungsmittelvorrat anzulegen, um zu verhindern, dass unser Land von einer Hungersnot heimgesucht wird, insbesondere angesichts der anhaltenden britischen Blockade."
 recolts.1.a:0 "Großartig"
 recolts.2.d:0 "Laut den Berichten aus den verschiedenen Silos im ganzen Land haben wir dieses Jahr §R[?recolt_gain|0]§!Mt Getreide nachgeerntet. In diesen schwierigen Zeiten ist es wichtig, einen strategischen Vorrat an Lebensmitteln anzulegen, um eine Hungersnot in unserem Land zu verhindern, insbesondere angesichts der anhaltenden britischen Blockade. Das einzige Problem ist, dass dieses Jahr für unsere Nachernte ein wirklich schlechtes Jahr war. Hoffen wir, dass das nächste Jahr besser wird."
 recolts.2.a:0 "Was ist dieses Jahr passiert?"
 recolts.3.d:0 "Laut den Berichten aus den verschiedenen Silos im ganzen Land haben wir dieses Jahr §G[?recolt_gain|0]§!Mt Getreide eingelagert. In diesen schwierigen Zeiten ist es wichtig, einen strategischen Vorrat an Lebensmitteln anzulegen, um eine Hungersnot in unserem Land zu verhindern, insbesondere angesichts der anhaltenden britischen Blockade. Dieses Jahr war ein großartiges Jahr für unsere Einlagerungen, hoffen wir, dass das nächste Jahr genauso gut verläuft."
 recolts.3.a:0 "Was für ein tolles Jahr!"
 recolts.4.t:0 "Explosion in einem Getreidesilo in [ROOT.Capital.GetName]"
DNC_Diplomacy.200.t:0 "[From.GetName] schlägt gegenseitigen Verteidigungspakt vor"
DNC_Diplomacy.200.d:0 "Ein Verteidigungspakt (oder Verteidigungspakt in der Schreibweise des Commonwealth) ist eine Art Vertrag oder Militärbündnis, in dem sich die Unterzeichner verpflichten, sich gegenseitig militärisch zu unterstützen und zu verteidigen. Im Allgemeinen weisen die Unterzeichner auf die im Vertrag enthaltenen Bedrohungen hin und bereiten konkrete gemeinsame Maßnahmen vor."
DNC_Diplomacy.200.a:0 "Akzeptieren"
DNC_Diplomacy.200.b:0 "Akzeptieren"
DNC_Diplomacy.200.c:0 "Abfall"
DNC_Diplomacy.201.t:0 "[From.GetName] Akzeptiert"
DNC_Diplomacy.201.d:0 "Ein Verteidigungspakt (oder Verteidigungspakt in der Schreibweise des Commonwealth) ist eine Art Vertrag oder Militärbündnis, in dem sich die Unterzeichner verpflichten, sich gegenseitig militärisch zu unterstützen und zu verteidigen. Im Allgemeinen weisen die Unterzeichner auf die im Vertrag enthaltenen Bedrohungen hin und bereiten konkrete gemeinsame Maßnahmen vor."
DNC_Diplomacy.201.a:0 "Ausgezeichnet"
DNC_Diplomacy.202.t:0 "[From.GetName] lehnt ab"
DNC_Diplomacy.202.d:0 "Ein Verteidigungspakt (oder Verteidigungspakt in der Schreibweise des Commonwealth) ist eine Art Vertrag oder Militärbündnis, in dem sich die Unterzeichner verpflichten, sich gegenseitig militärisch zu unterstützen und zu verteidigen. Im Allgemeinen weisen die Unterzeichner auf die im Vertrag enthaltenen Bedrohungen hin und bereiten konkrete gemeinsame Maßnahmen vor."
DNC_Diplomacy.202.a:0 "Verdammt"
ron_diplomatic.204.t:0 "[From.GetName] zeigt uns gegenüber eine freundliche Außenpolitik"
ron_diplomatic.204.d:0 "Die Außenpolitik eines Staates umfasst seine Ziele und Aktivitäten im Zusammenhang mit seinen Interaktionen mit anderen Staaten, Staatenbünden und anderen politischen Einheiten, sei es bilateral oder über multilaterale Plattformen. Die Encyclopedia Britannica weist darauf hin, dass die Außenpolitik einer Regierung von „innenpolitischen Erwägungen, der Politik oder dem Verhalten anderer Staaten oder Plänen zur Förderung bestimmter geopolitischer Ziele“ beeinflusst werden kann."
ron_diplomatic.204.a:0 "Gut"
ron_diplomatic.205.t:0 "[From.GetName] zeigt eine feindselige Außenpolitik uns gegenüber"
ron_diplomatic.205.d:0 "Die Außenpolitik eines Staates umfasst seine Ziele und Aktivitäten im Zusammenhang mit seinen Interaktionen mit anderen Staaten, Staatenbünden und anderen politischen Einheiten, sei es bilateral oder über multilaterale Plattformen. Die Encyclopedia Britannica weist darauf hin, dass die Außenpolitik einer Regierung von „innenpolitischen Erwägungen, der Politik oder dem Verhalten anderer Staaten oder Plänen zur Förderung bestimmter geopolitischer Ziele“ beeinflusst werden kann."
ron_diplomatic.205.a:0 "Beunruhigend ..."
ron_diplomatic.208.t:0 "[From.GetName] begeht ein Kriegsverbrechen"
ron_diplomatic.208.d:0 "Ein Kriegsverbrechen ist ein Verstoß gegen das Kriegsrecht, der die individuelle strafrechtliche Verantwortung für die Handlungen der Kombattanten im Einsatz begründet, wie etwa die vorsätzliche Tötung von Zivilisten oder Kriegsgefangenen, Folter, Geiselnahme, unnötige Zerstörung zivilen Eigentums, Täuschung durch Hinterlist, sexuelle Gewalt im Krieg, Plünderung und für jede Person, die Teil der Kommandostruktur ist und einen Versuch zur Begehung von Massentötungen anordnet, darunter Völkermord oder ethnische Säuberungen, die Gewährung von keinerlei Gnade trotz Kapitulation, die Einberufung von Kindern zum Militär und die Missachtung der rechtlichen Unterscheidungen von Verhältnismäßigkeit und militärischer Notwendigkeit."
ron_diplomatic.208.a:0 "Verurteilen"
ron_diplomatic.208.b:0 "Wen interessiert das?"
space_race.2.t:0 "Mondkatastrophe"
space_race.2.d:0 "„Das Schicksal hat bestimmt, dass die Männer, die zum Mond flogen, um in Frieden zu forschen, auf dem Mond bleiben werden, um in Frieden zu ruhen. Diese tapferen Männer, Neil Armstrong und Edwin Aldrin, wissen, dass es keine Hoffnung auf Genesung gibt [...] In alten Zeiten blickten die Menschen zu den Sternen und sahen ihre Helden in den Sternbildern. In der heutigen Zeit tun wir das Gleiche, aber unsere Helden sind epische Männer aus Fleisch und Blut. Andere werden folgen und sicher ihren Weg nach Hause finden. Die Suche des Menschen wird nicht aufgehalten werden. Aber diese Männer waren die Ersten, und sie werden in unseren Herzen die Ersten bleiben. Denn jeder Mensch, der in den kommenden Nächten zum Mond aufblickt, wird wissen, dass es einen Winkel einer anderen Welt gibt, der für immer der Menschheit gehört.“ Mit diesen Worten verkündete [USA.GetLeader] den tragischen Tod der Besatzung von Apollo 11."
space_race.2.a:0 "Ein tragischer Verlust"
space_race.3.t:0 "Roter Mond"
space_race.3.d:0 "An diesem Abend erreichte Kosmonaut Leonow endlich das Ziel, das jede Großmacht anstrebte: als Erster den Mond zu betreten. Unerwarteterweise siegten die Sowjets in diesem Wettlauf. Als Alexei Leonow den Mond betrat, waren seine ersten Worte: „Ich mache diesen Schritt für mein Land, für mein Volk und für die marxistisch-leninistische Lebensweise, im Wissen, dass dieser Tag nur ein kleiner Schritt auf einer Reise ist, die uns alle zu den Sternen führen wird.“ Weltweit verfolgen Millionen Menschen diesen historischen Moment – manche sind beeindruckt, andere verängstigt."
space_race.3.a:0 "Eine Nation im Schockzustand"
space_race.3.b:0 "Was für eine Leistung!"
space_race.4.t:0 "§RDas Weltraumrennen beginnt!§!"
space_race.4.d:0 "Heute gaben die [?global.space_race_starter.GetAdjective] den Start ihres Weltraumprogramms bekannt. Diese Ankündigung erschütterte die Großmächte weltweit. Werden sie sich dem anschließen, was manche bereits als „Wettlauf ins All“ bezeichnen? Oder werden sie im Staub zurückbleiben? Noch ist unklar, wohin uns dieser Wettbewerb führen wird. Während einige befürchten, dass die Weltraumforschung zu Waffen wird, sehen andere darin einen Fortschritt für die Menschheit."
space_race.4.a:0 "Bringen Sie Licht in die Welt!"
space_race.4.b:0 "Das Rennen um die Sterne beginnt."
space_race.5.t:0 "Erster Mensch im Weltraum!"
space_race.5.d:0 "An diesem Tag, [?global.date.GetDateStringNoHourLong], führte die [SOV.GetName] den ersten bemannten Raumflug der Geschichte durch. Der Kosmonaut, ein sowjetischer Offizier, Juri Alexejewitsch Gagarin, wagte sich als erster Mensch in die Weiten des Weltraums. Er erreichte in einem 5-Tonnen-Raumschiff die Umlaufbahn und landete sicher auf der Erde. Alle Weltraumexperten sind nun im Rennen um den ersten erfolgreichen Raumflug eines Menschen zurückgeblieben."
space_race.6.t:0 "Erster Mensch im Weltraum!"
space_race.6.d:0 "An diesem Tag, [?global.date.GetDateStringNoHourLong], führte die [USA.GetName] den ersten bemannten Raumflug der Geschichte durch. Der Astronaut, ein amerikanischer Pilot John Herschel Glenn, wagte sich als erster Mensch in die Weiten des Weltraums. Er erreichte die Umlaufbahn in der Kapsel Friendship-7 und landete sicher auf der Erde. Alle Weltraumexperten sind nun im Rennen um den ersten erfolgreichen Raumflug eines Menschen."
space_race.7.t:0 "Erster Mensch im Weltraum!"
space_race.7.d:0 "An diesem Tag, [?global.date.GetDateStringNoHourLong], führte die [FROM.GetName] den ersten bemannten Raumflug der Geschichte durch. Ihr Astronaut war der erste Mensch, der sich jemals in die Weiten des Weltraums wagte. Er erreichte in seiner 5 Tonnen schweren Kapsel die Umlaufbahn und landete sicher auf der Erde. Alle Weltraumexperten sind nun im Rennen um den ersten erfolgreichen Raumflug eines Menschen zurückgeblieben."
space_race.7.a:0 "[FROM.GetAdjective] Vorherrschaft!"
space_race.7.b:0 "Sie sind vorne ..."
space_race.8.t:0 "Feuer auf der Startrampe!"
space_race.8.d:0 "Das [FROM.GetAdjective] Raumfahrtprogramm meldete einen Zwischenfall auf der Startrampe. Ihre Experimentalrakete mit Besatzung an Bord fing Feuer. Der Sicherheitsturm war nicht gesichert, und die Besatzung konnte ihrem Schicksal nicht entgehen. Die sauerstoffreiche Atmosphäre in der Kabine tobte und verzehrte alles. Das Bodenpersonal stand unter Schock, da es alles, jeden Schrei, über Funk mitbekommen hatte."
space_race.8.a:0 "Ein schreckliches Schicksal"
space_race.11.t:0 "Der Mann auf dem Mond"
space_race.11.d:0 "Heute Abend zeigte eine Live-Übertragung vom Mond, wie der erste Mensch unseren himmlischen Freund betrat. Was viele für unmöglich hielten, ist endlich Wirklichkeit geworden: Das Raumfahrtprogramm [FROM.GetAdjective] überraschte alle mit der ersten bemannten Mondlandung. Weltweit versammeln sich Menschen an den Fernsehmasten, um diesen außergewöhnlichen Moment zu feiern."
space_race.11.a:0 "Ein unerwartetes Ergebnis ..."
#usa
usa.224.t:0 "Friedensgespräche zwischen den USA und Japan beginnen …"
usa.224.dd:0 "Was sollten wir Japan für den Frieden anbieten? Je größer das Abkommen, desto länger wird der Waffenstillstand dauern."
usa.224.a:0 "Wir werden ihnen Ressourcenrechte auf den Philippinen geben und unsere pazifischen Inseln entmilitarisieren"
usa.224.b:0"Wir etablieren die Philippinen als Pufferstaat für den Pazifik"
usa.224.c:0"Wir werden ihnen den Panamakanal geben"
usa.224.d:0 "Wir werden alle ihre Forderungen akzeptieren ..."
#jap
japan.18.b:0 "Wir werden das niemals akzeptieren"
japan.19.t:0 "Die USA bieten uns Ressourcenrechte auf den Philippinen an und stimmen der Entmilitarisierung ihrer Pazifikinseln zu!"
japan.19.d:0 "Die Vereinigten Staaten haben uns kürzlich ein Angebot bezüglich der Ressourcenrechte auf den Philippinen und der Entmilitarisierung bestimmter pazifischer Inseln unterbreitet. Das Angebot der Ressourcenrechte auf den Philippinen ist ein wahrer Segen für unser Imperium, da es unseren Zugang zu lebenswichtigen Ressourcen sichern und uns weniger abhängig von anderen Nationen machen würde. Die Entmilitarisierung der pazifischen Inseln wiederum würde erheblich zur Entspannung der Region und zur Förderung des Friedens beitragen. Die Sache hat jedoch einen Haken. Im Gegenzug für diese Zugeständnisse verlangen die Vereinigten Staaten von uns einen Waffenstillstand. Dies mag zwar im Vergleich zu den Vorteilen, die wir dadurch erlangen, ein geringer Preis sein, birgt aber auch gewisse Risiken. Ein Waffenstillstand mit den Vereinigten Staaten könnte als Zeichen der Schwäche wahrgenommen werden und unsere Fähigkeit zur Verteidigung unserer Interessen in der Region einschränken. Er könnte zudem zu einem Gesichtsverlust des Imperiums führen, was weitreichende Folgen haben könnte."
japan.19.a:0 "Wir werden ihr dummes Angebot annehmen"
japan.19.b:0 "Wir werden ablehnen"
japan.20.t:0 "Die USA bieten an, die Philippinen freizugeben und einen Pufferstaat zu errichten …"
japan.20.d:0 "Die Vereinigten Staaten haben angeboten, die Philippinen freizugeben und einen Pufferstaat zwischen unserem Imperium und ihren Territorien im Pazifik zu errichten. Aus Sicht unseres Imperiums bietet dieses Angebot eine einmalige Gelegenheit, unseren Einflussbereich im Pazifikraum auszuweiten und unsere Position im anhaltenden Krieg zu stärken. Durch die Errichtung eines Pufferstaates könnten wir unsere Interessen schützen und verhindern, dass die Vereinigten Staaten in der Region Fuß fassen."
japan.20.a:0 "wir werden ihren dummen Deal akzeptieren"
japan.21.t:0 "Pannama kostenlos?"
japan.20.d:0 "Die Vereinigten Staaten haben uns kürzlich ein Angebot bezüglich des Panamakanals unterbreitet. Sie boten an, den Kanal im Austausch für einen sehr langen Waffenstillstand zwischen unseren Nationen an unser Imperium zu übertragen. Aus Sicht unseres Imperiums bietet dieses Angebot eine bedeutende Chance, unser Ansehen in der internationalen Gemeinschaft zu stärken und unseren Zugang zu wichtigen Schifffahrtswegen zu verbessern. Der Panamakanal ist eine der wichtigsten Wasserstraßen der Welt, und der Besitz daran würde unsere Fähigkeit, Güter und Ressourcen rund um den Globus zu transportieren, erheblich verbessern. Allerdings gibt es einen Haken: Im Gegenzug für den Panamakanal verlangen die Vereinigten Staaten von uns die Zustimmung zu einem sehr langen Waffenstillstand. Dies könnte als erhebliches Zugeständnis unsererseits gewertet werden und unsere Fähigkeit zur Verteidigung unserer Interessen in der Region einschränken. Zudem könnte ein langer Waffenstillstand mit den Vereinigten Staaten als Zeichen der Schwäche wahrgenommen werden, was unserem Ruf und unserem Ansehen in der internationalen Gemeinschaft schaden könnte. Es ist auch wichtig, die möglichen Folgen einer Übertragung des Eigentums am Panamakanal an unser Imperium zu bedenken. Dies könnte erhebliche Auswirkungen auf die Wirtschaft anderer Nationen haben und das Machtgleichgewicht in der Region verändern. Dies könnte auch zu verstärkten Spannungen und Konflikten mit anderen Nationen führen, insbesondere mit jenen, die für ihren eigenen Handel und ihre Geschäftstätigkeit auf den Kanal angewiesen sind."
japan.a:0 "Wir haben einen Deal"
japan.22.t:0 "USA entsenden eine Delegation"
japan.22.d:0 "Sie haben angeboten, alle unsere Forderungen zu akzeptieren und uns eine einmalige Gelegenheit geboten. Sie boten uns an, die Kontrolle über den gesamten von den USA kontrollierten Pazifikraum, einschließlich Hawaii, im Austausch für einen sehr, sehr langen Waffenstillstand zwischen unseren Nationen zu übertragen. Unsere obersten Berater haben jedoch eine andere Idee. Sie schlugen vor, dass wir diese Gelegenheit nutzen sollten, um einen Überraschungsangriff auf die Vereinigten Staaten zu starten und die Kontrolle über alle ihre Inseln im Pazifikraum zu übernehmen. Aus Sicht unseres Imperiums könnte dies eine riskante, aber potenziell lohnende Gelegenheit sein. Durch einen Überraschungsangriff auf die Vereinigten Staaten könnten wir schnell und effektiv die Kontrolle über eine riesige und strategisch wichtige Region erlangen. Dies könnte unsere Macht und unseren Einfluss im Pazifik und weltweit erheblich stärken. Es ist jedoch wichtig, die möglichen Folgen eines solchen Vorgehens zu bedenken. Ein Überraschungsangriff auf die Vereinigten Staaten könnte einen größeren Konflikt auslösen und die Aufmerksamkeit anderer Nationen auf sich ziehen, was möglicherweise zu einem größeren Krieg führen könnte. Darüber hinaus könnte er unserem Ruf in der internationalen Gemeinschaft schaden und erhebliche diplomatische Auswirkungen haben."
japan.22.a:0 "Wir nehmen das Angebot an!"
japan.22.b:0 "Wir werden ihnen unseren Dank ausrichten..."
japan.24.t:0 "Japan bittet um Unterwerfung"
japan.24.d:0 "[jap.GetName] fordert die Integration unserer Streitkräfte in ihre. Sie fordern außerdem eine Regierungsführung aus Tokio. Wenn wir dem zustimmen, bedeutet dies, dass wir in das Imperium integriert werden."
japan.24.a:0 "Werde Teil des Imperiums"
japan.24.b:0 "Wir bleiben!"
japan.25.t:0 "[FROM.GetName] hat unseren Vorschlag abgelehnt"
japan.25.d:0 "Es scheint, dass [FROM.GetName] auf unseren Vorschlag, sich in unser Imperium zu integrieren, reagiert hat. Sie haben dies abgelehnt und wollen unabhängig bleiben. Wir könnten sie zur Integration zwingen oder die Situation so belassen, wie sie ist."
japan.25.a:0 "Lass sie"
japan.25.b:0 "Integriert sie mit Gewalt!"
generic.206.t:0 "[THIS.GetName] plant den Ruhestand"
generic.206.d:0 "Nach vielen Jahren treuer Dienste teilte [THIS.GetName] seinen Wunsch mit, in den Ruhestand zu gehen. Wir könnten ihm den Ruhestand erlauben oder ihn zwingen, noch etwas länger zu bleiben. Letzteres könnte jedoch Auswirkungen auf seine Fähigkeiten haben."
generic.206.a:0 "Vielen Dank für Ihren Service!"
generic.206.b:0 "Wir können es uns nicht leisten, ihn zu verlieren!"
generic.207.t:0 "[THIS.GetName] im Kampf getötet"
generic.207.d:0 "Berichten zufolge ist [THIS.GetName] im Kampf gefallen. Wir betrauern seinen Verlust, müssen aber einen neuen Anführer für seine Armeegruppe finden. Möge seine Seele auf den Elysischen Gefilden in Frieden ruhen."
generic.207.a:0 "Ein trauriger Verlust"
germany.400.t:0 "Die zweite Münchner Konferenz"
germany.4001.t:0 "Das Deutsche Gambit ..."
germany.4001.d:0 "Im Austausch für eine große Summe unseres Marionettenlandes hat sich Deutschland bereit erklärt, unsere Marionette zu werden. Wenn wir diesen Vorschlag annehmen, erhält Deutschland einen Teil des von ihm beanspruchten Landes und wird gleichzeitig unsere Marionette. Wenn wir ihn ablehnen, könnten uns Feindseligkeiten begegnen, aber ist es das für diese Menge an Land wirklich wert?"
germany.4001.a:0 "Wir akzeptieren das Angebot"
germany.4001.b:0 "Das ist verrückt"
ger_denied_go_hostilecw:0 "Die Sowjets lehnten den Vorschlag ab"
ddr.7.title:0 "Berichte aus Ostdeutschland!!"
ddr.7.desc:0"Es treffen uns Berichte, die auf eine beunruhigende Entwicklung hinweisen, die sich vor unseren Augen abspielt. Ostdeutsche Einheiten rücken mit der klaren Absicht, Schlüsselstädte im westdeutschen Berlin zu besetzen, mit alarmierender Geschwindigkeit vor. Die Situation erfordert unsere sofortige Aufmerksamkeit und entschlossenes Handeln. Als in Ostdeutschland stationierte sowjetische Berater stehen wir an vorderster Front dieser Krise. Unsere Rolle als Berater ist entscheidend, um die Motive hinter diesem kühnen Vorstoß und seine möglichen Folgen einzuschätzen. Die Schlüsselstädte der Region, wie Potsdam und Magdeburg, drohen in die Hände der vorrückenden ostdeutschen Streitkräfte zu fallen."
ddr.7.a:0"Wir müssen dies unterbinden, bevor ein weiterer Weltkrieg ausbricht"
ddr.7.b:0"Diese Chance dürfen wir nicht verspielen!"
germany.4002.t:0 "Die Achsenmächte lösen sich auf"
germany.4002.d:0 "Heute haben sich die Achsenmächte nach Deutschlands Sieg im Zweiten Weltkrieg in einem historischen Schritt offiziell aufgelöst. Überraschenderweise schloss Deutschland am selben Tag rasch den Deutschen Einheitspakt und verbündete sich mit seinen Marionettenstaaten. Italien, ein ehemaliger Verbündeter der Achsenmächte, steht nun bei der Abwägung seiner zukünftigen Bündnisse an einem kritischen Scheideweg. Die internationale Gemeinschaft beobachtet Italiens Entscheidung aufmerksam und ist sich über ihre Auswirkungen auf die globale Stabilität unsicher. Während einige die Auflösung als Schritt in Richtung Frieden und Versöhnung betrachten, gibt es Bedenken hinsichtlich der schnellen Bündnisbildung Deutschlands. Diplomaten und Experten arbeiten unermüdlich daran, die Auswirkungen dieser bedeutsamen Ereignisse zu verstehen. Während die Welt in ein neues Zeitalter eintritt, herrscht Unsicherheit, und die heute getroffenen Entscheidungen werden den weiteren Verlauf der Geschichte prägen."
germany.4002.a:0 "Was wird daraus?"
germany.4003.t:0 "Die neue Ordnung"
germany.4003.d:0 "Unter der unbezwingbaren Führung Adolf Hitlers hat die Nationalsozialistische Deutsche Arbeiterpartei einen beispiellosen Sieg errungen und ein neues Zeitalter für Europa eingeläutet. Der Versailler Vertrag ist zerbrochen und Deutschland steht als vereinte, stolze Nation da, die den Strapazen der Vergangenheit trotzt. Hitlers strategisches Genie und seine Entschlossenheit haben zu überwältigenden Siegen auf dem gesamten Kontinent geführt, die deutsche Vorherrschaft gesichert und die geopolitische Landschaft neu gestaltet. Die Achsenmächte haben unter deutscher Führung mächtige Allianzen geschmiedet, die die deutsche Hegemonie über Europa und darüber hinaus sichern. Das Konzept des Lebensraums ist Wirklichkeit geworden und bietet dem wachsenden deutschen Reich Raum und Ressourcen. Eine kulturelle Renaissance wurde entfacht, die die arische Vorherrschaft und traditionelle deutsche Werte förderte. Dieser Triumph ist jedoch überschattet vom dunklen Erbe des Holocaust, der Hitlers Herrschaft für immer mit unvorstellbaren Gräueltaten und Leid prägt. Als das neue Zeitalter in Europa beginnt, beobachtet die Welt voller Ehrfurcht und Entsetzen, dass das Schicksal des Kontinents in den Händen Adolf Hitlers und seiner Ambitionen liegt."
germany.4003.a:0 "Der schwarze Adler fliegt über Europa"
germany.4004.t:0 "Der Kalte Krieg beginnt"
germany.4004.d:0 "Wir stehen am Beginn einer neuen Ära, in der das Ende des Zweiten Weltkriegs unsere Nation in eine Position beispielloser Stärke und Einflusses katapultiert hat. Während der Kalte Krieg die Weltlandschaft prägt, haben unsere entschlossene Vision und unser strategisches Können einen Triumph gesichert, der den Lauf der Geschichte neu prägt. Nachdem unsere Nation die Feuerprobe des Krieges überstanden hat, steht sie nun vereint da, gestärkt durch unerschütterliche Führung und ein gemeinsames Bekenntnis zu unseren Grundprinzipien. Der Sieg über die Achsenmächte hat uns zu einer gewaltigen Kraft gemacht, bereit, uns den Herausforderungen dieses unkonventionellen, ideologischen Kampfes zu stellen. Der Kalte Krieg stellt uns den Vereinigten Staaten gegenüber, einer Nation, die von demokratischen Prinzipien und kapitalistischen Ambitionen getrieben wird. Unsere gegensätzlichen Ideologien und Zukunftsvisionen haben uns in einen erbitterten Wettbewerb um die Vorherrschaft auf der Weltbühne gestürzt. Japan bleibt zwar ein bedeutender Akteur in der globalen Landschaft, verfolgt aber seine Interessen unabhängig, ist sich jedoch der Möglichkeit einer Zusammenarbeit gegen einen gemeinsamen Gegner bewusst. Während wir unseren Einfluss auf dem europäischen Kontinent geltend machen, versuchen die Vereinigten Staaten, unseren Expansionsbestrebungen entgegenzuwirken. Dies führt zu einem fragilen Kräfteverhältnis und einem ständigen Wechselspiel aus Diplomatie, Spionage und strategischen Allianzen. Inmitten dieses Konflikts prägt das Erbe des Zweiten Weltkriegs weiterhin Wahrnehmungen und Meinungen. Wir sind uns der Last der Geschichte und der Kritik bewusst, die unser Handeln auf uns ziehen kann, bleiben aber unserem Engagement für unser Volk und dem Streben nach einem wohlhabenden und vereinten Europa treu. Vor den Augen der Welt stehen wir entschlossen und wachsam da und meistern die Komplexität des Kalten Krieges mit Hartnäckigkeit und Entschlossenheit. Unser triumphaler Weg aus der Asche des Zweiten Weltkriegs zu einem dominanten globalen Akteur zementiert unseren Platz in der Geschichte, und wir sind bereit, den Verlauf des Kalten Krieges zu gestalten und das Schicksal der Welt unauslöschlich zu prägen."
germany.4004.a:0 "Wir werden den Kalten Krieg gewinnen!"
germany.4005.t:0 "In Algerien entsteht ein gesicherter französischer Staat"
germany.4005.d:0 "Nach einem entschlossenen und trotzigen Aufstand entstand in Algerien ein sicherer französischer Staat, der einen Wendepunkt in der Geschichte des Landes markiert. Durch ein historisches Abkommen zwischen französischen Exilanten und algerischen Nationalisten beginnt für Algerien eine neue Ära der Autonomie und Selbstverwaltung, während gleichzeitig enge Beziehungen zu Frankreich bestehen bleiben. Das Abkommen gewährt dem sicheren französischen Staat erhebliche interne Autonomie und ermöglicht dem algerischen Volk, durch gewählte Vertreter im Algerischen Legislativrat aktiv an der Regierungsführung teilzunehmen. Die Entstehung eines sicheren algerischen Staates stellt einen bedeutenden Meilenstein in der Ära des Kalten Krieges dar, in der das Streben nach Autonomie und Freiheit vor dem Hintergrund einer veränderten Weltordnung vorherrscht. Nur die Zeit wird zeigen, wie lange diese Partnerschaft Bestand haben wird …"
germany.4005.a:0 "Wird die Demokratie jemals wieder nach Europa kommen?"
germany.4006.t:0 "Ein neuer französischer Staat"
germany.4006.d:0 "Vor dem Hintergrund eines gesicherten algerischen Staates erlebt unsere Nation eine bedeutsame Wendung der Ereignisse, als die Monarchie nach Algerien zurückkehrt und die Hoffnungen unserer monarchistischen Aufständischen verkörpert, die eine zentrale Rolle in unserem Kampf um Unabhängigkeit spielten. Gestärkt durch unser neu gewonnenes Gefühl der Einheit und Selbstbestimmung begeben wir algerischen Monarchisten uns nun auf eine mutige Reise, um unsere Souveränität zu behaupten und die deutsche Kontrolle herauszufordern. Mit der Errichtung eines gesicherten französischen Staates in unserem Heimatland haben unsere monarchistischen Kräfte, beflügelt durch unseren erfolgreichen Aufstand gegen die deutsche Besatzung, unsere Position als Schlüsselakteure in der Zukunft unserer Nation gefestigt. Die Inthronisierung unseres Monarchen markiert einen Moment von großer Bedeutung, der die uralte Institution neu belebt und ein Gefühl nationaler Identität, Einheit und Tradition heraufbeschwört. Wenn Exilanten kommen und sich unserer Armee anschließen, werden wir unser Land eines Tages zurückbekommen, jetzt müssen wir warten und es wieder aufbauen!"
germany.4006.a:0 "Die französische Flagge weht über Afrika!"
germany.4007.t:0"Mittelafrika gebildet"
germany.4007.d:0"Vor dem Hintergrund des globalen Aufstiegs Nazideutschlands ereignete sich ein bedeutsames Ereignis: die Schaffung von „Mittelafrika“, einer ehrgeizigen geopolitischen Vision, die eine dominante deutsche Präsenz im Herzen des afrikanischen Kontinents anstrebt. Unter der Führung Adolf Hitlers festigte Deutschland seine Position als Supermacht, und der Traum, seinen Einfluss über Europa hinaus auszudehnen, nahm Gestalt an. Der Plan zur Gründung von „Mittelafrika“ ist von großen Ambitionen geprägt: der Neugestaltung kolonialer Grenzen und Gebietsansprüche, um ein vereintes deutsches Kolonialreich zu errichten. Das geplante Gebiet, das sich vom Atlantik bis zum Indischen Ozean erstreckt, wird weite Landstriche umfassen, die derzeit unter der Kontrolle verschiedener Kolonialmächte stehen. Der Kern dieses ehrgeizigen Unterfangens besteht darin, bestehende Kolonien, darunter Gebiete Belgiens, Frankreichs und Portugals, zu einer zusammenhängenden, deutsch dominierten Region zusammenzuschließen. Zur Überwachung der Verwirklichung dieser großartigen Vision hat das deutsche Oberkommando ein Team erfahrener Administratoren und Kolonialexperten ernannt. Ihr Auftrag besteht darin, einen reibungslosen Machtübergang sicherzustellen, die unterschiedlichen Bevölkerungsgruppen zu vereinen und eine deutsche Politik umzusetzen, die den Interessen des Reichs dient. Die Schaffung von „Mittelafrika“ ist Ausdruck der Entschlossenheit Deutschlands, auf dem afrikanischen Kontinent ein bleibendes Erbe zu hinterlassen, ein Erbe, das territoriale Grenzen überschreitet und Deutschlands Zugriff auf lebenswichtige Ressourcen und strategische Standorte festigt."
germany.4007.a:0 "Ein neuer afrikanischer Staat wird gegründet"
germany.4008.t:0"Ein Brief von Himmler"
germany.4008.d:0 "An Adolf Hitler, Reichskanzler und Führer Deutschlands, Mein Führer, ich schreibe diesen Brief mit äußerster Dringlichkeit und Entschlossenheit. Lange Zeit war ich der glühende Architekt unserer nationalsozialistischen Vision und habe unermüdlich die Ideale verfolgt, die unserer Nation ihren triumphalen Ruhm beschert haben. Zu meiner großen Enttäuschung muss ich jedoch feststellen, dass meine Ambitionen innerhalb der Grenzen des Reiches im Keim erstickt werden. Hiermit stelle ich Ihnen und dem deutschen Oberkommando ein Ultimatum. Ich verlange die Schaffung eines Staates auf dem Gebiet des besetzten Frankreichs unter meiner direkten Kontrolle. Dieser Staat soll als Bastion arischer Reinheit und als Musterbeispiel nationalsozialistischer Ideologie dienen, ungehindert von irgendeiner anderen Autorität als meiner eigenen. Sollten meine Forderungen ignoriert oder abgelehnt werden, muss ich Ihnen leider mitteilen, dass ich nicht zögern werde, meine Autorität über die SS und alle ihre Divisionen auszuüben. Die Folge wird ein energischer und entschlossener Widerstand sein, und ich muss Sie warnen, dass eine Meuterei in unseren Reihen eine sehr reale und greifbare Folge sein wird. Ich bitte Sie dringend, den Ernst der Lage zu bedenken, denn ich spreche nicht aus persönlichem Ehrgeiz, sondern im Interesse der Verwirklichung des wahren Potenzials unseres glorreichen Reiches. Ich erwarte eine umgehende Antwort, die die Bedeutung meiner Bitte anerkennt. - Heinrich Himmler"
germany.4008.a:0 "Wir werden ihm das Land geben"
germany.4008.b:0 "Das werden wir niemals akzeptieren!"
germany.4008.c:0 "Wir werden Himmler helfen!"
germany.4009.d:0"Inmitten des globalen Aufstiegs Nazi-Deutschlands ereignet sich in Berlin ein bedeutsames Ereignis: Adolf Hitler führt die Schaffung von „Mittelafrika“ an, einer kühnen Vision zur Etablierung deutscher Vorherrschaft im Herzen des afrikanischen Kontinents. Dieses ehrgeizige Unterfangen, das die Neugestaltung kolonialer Grenzen und die Konsolidierung der Macht unter deutscher Herrschaft beinhaltet, zielt darauf ab, Deutschlands Einfluss über Europas Grenzen hinaus auszudehnen. Während die Welt gespannt zusieht, wächst die Unsicherheit hinsichtlich der Reaktionen anderer Kolonialmächte und der Herausforderung, unterschiedliche Kulturen unter deutscher Herrschaft zu vereinen. Dieser kühne Schritt markiert einen Wendepunkt in der Geschichte, denn Deutschlands Entschlossenheit, in Afrika ein bleibendes Erbe zu hinterlassen, wird die Zukunft des Kontinents für kommende Generationen prägen."
germany.4010.t:0 "Ein neuer französischer Staat wurde gegründet!"
germany.4010.d:0 "Da wir uns in einer kritischen Lage befinden und die Möglichkeit einer Bombardierung Frankreichs in Erwägung ziehen, müssen wir die möglichen Folgen und Vorteile einer solchen Aktion sorgfältig abwägen. Unsere militärische Stärke und Entschlossenheit haben uns so weit gebracht, aber wir dürfen nicht vergessen, dass jede unserer Entscheidungen weitreichende Folgen für unser Land und die Welt hat. Sollte dieser Staat weiterbestehen, könnte dies die Legitimität unseres französischen Marionettenstaates gefährden. Sollten wir dies jedoch tun, würde es unsere Chancen auf eine Versöhnung mit dem Westen zerstören. Lohnt sich die Bombardierung Frankreichs?"
germany.4010.a:0 "Wir werden die Franzosen bombardieren"
germany.4010.b:0 "Wir möchten lieber ein gutes globales Image bewahren"
cw_axis_victory.49.t:0"Treffen der Nazi-Funktionäre zur europäischen Zukunft."
cw_axis_victory.49.d:0"In den opulenten Hallen Berlins findet eine entscheidende Versammlung hochrangiger Nazi-Funktionäre statt, um die Zukunft Europas zu bestimmen. Die Atmosphäre ist angespannt, aber auch voller Vorfreude auf die große Vision, die vor uns liegt. Angeführt von der charismatischen Präsenz Adolf Hitlers, zielt diese Versammlung von Machthabern darauf ab, ihre Macht über den Kontinent zu festigen und sein Schicksal unter dem Banner des Dritten Reichs neu zu gestalten."
cw_axis_victory.49.a:0"Das Treffen beginnt"
cw_axis_victory.65.t:0"Hitlers Rede"
cw_axis_victory.65.d:0"Zu Beginn des Treffens hielt Adolf Hitler eine leidenschaftliche Rede, in der er die Kernprinzipien der Nazi-Ideologie darlegte und dabei die rassische Überlegenheit und den Lebensraum betonte. Die Beamten hörten aufmerksam zu, als er die Vision eines vereinten Europas unter deutscher Führung und mit der Vorherrschaft der arischen Rasse erläuterte. Diese Phase zielte darauf ab, ein gemeinsames Ziel unter den Teilnehmern zu schaffen und ihre Verbundenheit zur Sache zu stärken."
cw_axis_victory.65.a:0"Heil Hitler" #ig tno uses it so its fine?
cw_axis_victory.66.t:0"Armee oder Luftwaffe?"
cw_axis_victory.66.d:0"Wilhelm Keitel, Chef des Oberkommandos der Wehrmacht, sagt: „Mein Führer, wir müssen uns auf strategische Annexionen konzentrieren, um wertvolle Ressourcen und strategische Positionen zu sichern. Unser Militär muss darauf vorbereitet sein, im Falle von Widerstand entschlossen vorzugehen.“ Albert Speer, Minister für Rüstung und Kriegsproduktion, sagt: „Meine Herren, die effiziente Verteilung der Ressourcen ist von größter Bedeutung. Wir müssen der Entwicklung moderner Waffen Priorität einräumen und eine robuste Kriegswirtschaft aufbauen, um unsere Expansion voranzutreiben.“"
cw_axis_victory.66.a:0"Stimme Wilhelm Keitel zu"
cw_axis_victory.66.b:0"Stimme Albert Speer zu"
#
cw_axis_victory.67.t:0"Einen neuen Weg beschreiten"
cw_axis_victory.67.d:0"Als das Treffen seinen Höhepunkt erreicht, ist die Spannung im Raum spürbar. Die jüngsten Entwicklungen, darunter Italiens Abzug und Himmlers Abspaltung, haben die Achsenmächte an einen Scheideweg gebracht. In Adolf Hitlers Stimme schwingt eine Mischung aus Entschlossenheit und Anpassungsfähigkeit mit. „Wir stehen an einem Wendepunkt, an dem Herausforderungen unsere Einheit auf die Probe stellen“, erklärt er. „Um den Sieg zu erringen, müssen wir unsere Strategien weiterentwickeln und erneuern.“ Die Teilnehmer tauschen vorsichtige Blicke aus und warten auf die Anweisungen des Führers."
cw_axis_victory.67.a:0"Strategien für Sieg und Einheit anpassen"
cw_axis_victory.68.t:0"Diplomatie inmitten von Zwietracht"
cw_axis_victory.68.d:0"Hermann Göring, der heute die Luftwaffe befehligt und die Verhandlungen leitet, tritt vor. „Wir stehen vor einer komplexen geopolitischen Lage mit Italiens Abzug und Himmlers Rebellion. Unser diplomatisches Geschick muss in den Vordergrund treten.“ Er schlägt die Eröffnung diskreter diplomatischer Kanäle vor, um eine Versöhnung mit Italien zu erreichen und Himmlers Ambitionen einzudämmen. „Die Sicherung unserer Ostflanke bei gleichzeitiger Suche nach einer gemeinsamen Basis im Westen wird entscheidend sein“, fügt Göring hinzu und betont die Notwendigkeit strategischer Manöver angesichts der Zersplitterung."
cw_axis_victory.68.a:0"Diplomatische Initiativen für Stabilität und Eindämmung"
cw_axis_victory.68.b:0 "Wir werden nicht mit Italien verhandeln"
cw_axis_victory.69.t:0"Einheit durch gemeinsame Ziele"
cw_axis_victory.69.d:0"Inmitten der Ungewissheit lastet Heinrich Himmlers Abwesenheit schwer auf dem Raum. Martin Bormann, Chef der NSDAP-Kanzlei, ergreift das Wort und spricht zu den Anwesenden. „Unsere gemeinsame Vision eines vereinten Europas bleibt trotz aller Herausforderungen bestehen“, erklärt er. „Lasst uns unser Bekenntnis zu den Prinzipien der arischen Vorherrschaft, Expansion und Ordnung bekräftigen.“ Die Beamten nicken sich zu und erkennen an, wie wichtig es ist, ihr Handeln an der allgemeinen Nazi-Ideologie auszurichten."
cw_axis_victory.69.a:0"Bekräftigung der Ideologie für eine erneuerte Einheit"
cw_axis_victory.70.t:0"Die Bürde der Führung"
cw_axis_victory.70.d:0"Zum Abschluss der Diskussionen spricht Admiral Karl Dönitz, der derzeit die deutsche Marine führt, mit düsterer Stimme: „Die Bürde der Führung lastet schwer auf uns. Wir haben Verbündete verloren, und interne Spaltungen bedrohen unsere Einheit.“ Dönitz betont die Notwendigkeit von Zusammenarbeit und strategischer Planung. „Jeder von uns muss sich im Interesse unseres gemeinsamen Schicksals über seine persönlichen Interessen erheben“, appelliert er und fordert alle Teilnehmer auf, sich voll und ganz der gemeinsamen Sache zu verschreiben."
cw_axis_victory.70.a:0"Gemeinsames Engagement und Zusammenarbeit"
cw_axis_victory.71.t:0"Für einen fokussierten Triumph"
cw_axis_victory.71.d:0"Als die Sitzung endet, erheben sich die Teilnehmer mit neuer Entschlossenheit. Adolf Hitler tritt erneut vor, sein Blick ist entschlossen. „Wir werden aus allen Widrigkeiten gestärkt hervorgehen“, verkündet er. „Indem wir die Herausforderungen diplomatisch meistern und unsere grundlegenden Ideale bewahren, werden wir siegen.“ Die Beamten stimmen seiner Meinung zu und unterstreichen die Sitzung mit einem gemeinsamen „Für die Achsenmächte!“ – ein Versprechen, ihren Kurs zum Sieg durch Anpassungsfähigkeit, Diplomatie und unerschütterliche Einigkeit zu steuern."
cw_axis_victory.71.a:0"Gemeinsam zum triumphalen Sieg"
cw_axis_victory.72.t:0"Eine symbolische Wiedergeburt Germanias Wiederaufleben"
cw_axis_victory.72.d:0"Inmitten der angespannten Lage des Kalten Krieges erschüttert eine unerwartete Ankündigung die Welt. Adolf Hitlers ehrgeizige Vision lebt neu auf und schöpft aus dem Erbe einer früheren Ära. Mit unerschütterlicher Überzeugung verkündet er, dass Nazi-Deutschland künftig „Germania“ heißen soll. Vor dem Hintergrund ideologischer Rivalitäten versucht dieser kühne Schritt, vergangene Erfolge zu nutzen, um eine neue Identität zu schmieden, die sowohl Kontinuität als auch einen Neuanfang symbolisiert."
cw_axis_victory.72.a:0"Umbenennung für einen Neuanfang"
cw_axis_victory.73.t:0 "Wächter der Einheit schützen Europa"
cw_axis_victory.73.d:0 "Während das Gespenst eines Konflikts über dem fragilen Europa schwebt, nimmt eine strategische Initiative Gestalt an. Die Führung Germanias, getrieben vom Wunsch, den Kontinent zu schützen, gibt Schlüsselnationen feierliche Garantien. Das feierliche Versprechen gilt den Niederlanden, Belgien, Frankreich, Dänemark und Norwegen. Vereint unter dem Banner gemeinsamer Sicherheit, zielt dieser Schritt darauf ab, potenzielle Gegner abzuschrecken und ein Gefühl kollektiver Stärke gegen äußere Bedrohungen zu fördern."
cw_axis_victory.73.a:0 "Eine schützende Union schmieden"
cw_axis_victory.74.t:0 "Waffen-SS-Verstärkung"
cw_axis_victory.74.d:0 "Die Waffen-SS ist eine hoch motivierte und qualifizierte Streitmacht. Wir müssen sicherstellen, dass sie gut ausgerüstet und ausgebildet ist, um den Herausforderungen des Kalten Krieges gewachsen zu sein. Dieser Fokus wird die Größe und Qualität unserer Waffen-SS-Divisionen erhöhen und sie zu einer noch beeindruckenderen Streitmacht auf dem Schlachtfeld machen."
cw_axis_victory.74.a:0"Die Waffen-SS ist die Elite unseres Militärs, und wir müssen dafür sorgen, dass sie gut ausgerüstet ist"
cw_axis_victory.74.b:0"Die Waffen-SS belastet unsere Ressourcen"
cw_axis_victory.75.t:0 "Der Fall der eisernen Faust"
cw_axis_victory.75.d:0 "Im Herzen Deutschlands vollzieht sich eine erdrutschartige Machtverschiebung. Adolf Hitlers einst unerschütterliche Macht über die Nation wurde durch einen gewagten Militärputsch gebrochen. Der Ausgang dieses Putsches wird nicht nur den Lauf der deutschen Geschichte verändern, sondern auch weltweit Schockwellen auslösen."
cw_axis_victory.75.a:0"Was wird als nächstes passieren"
cw_axis_victory.76.t:0 "Der Blitzangriff auf Italien"
cw_axis_victory.76.d:0 "Nur zwei Tage nach dem kühnen Putsch, der Adolf Hitler stürzte, beobachtet die Welt voller Erstaunen, wie Deutschland einen beispiellosen Schritt unternimmt. Die Macher des Putsches schweigen, und die zivile Führung des Landes scheint fassungslos, als das deutsche Militär auf eigene Faust eine gewagte Invasion in Italien startet."
cw_axis_victory.76.a:0"Das haben wir nicht bestellt!"
cw_axis_victory.77.a:0"Ist dies das Ende Europas?"
cw_axis_victory.78.t:0 "Mussolinis Untergang"
cw_axis_victory.78.d:0 "Nach dem Zusammenbruch Nazideutschlands und der Invasion Italiens erlebt Benito Mussolinis einst mächtiges faschistisches Regime seine dunkelste Stunde. Isoliert und geschwächt, gerät Mussolinis Machtposition ins Wanken. In Italien nutzt eine Koalition aus Offizieren und politischen Dissidenten die Gelegenheit für einen Putsch gegen das schwächelnde Regime. Die Spannungen nehmen zu, als Loyalisten und Putschisten auf den Straßen aufeinanderprallen. Während ausländische Mächte näher rücken, beobachtet die Welt die Ereignisse und fragt sich, ob dieser Putsch die italienische Politik verändern oder das Land noch tiefer ins Chaos stürzen wird. In dieser alternativen Zeitlinie steht Italiens Schicksal am Rande einer Wende, und Mussolinis Herrschaft hängt am seidenen Faden."
cw_axis_victory.78.a:0"Was wird als nächstes passieren"
FDRdead:0"FDR ist gestorben"
cw_axis_victory.81.t:0 "Wiederaufbau der industriellen Basis"
cw_axis_victory.81.d:0 "Mit dem Sieg der Achsenmächte und dem Ende des globalen Konflikts ist es an der Zeit, unsere Aufmerksamkeit dem Wiederaufbau unserer industriellen Basis zuzuwenden. Unsere Fabriken und unsere Infrastruktur wurden im Krieg schwer beschädigt, und es ist unerlässlich, unsere Produktionskapazitäten wieder in ihren früheren Glanz zu versetzen. Diese Anstrengungen werden nicht nur unsere Nation stärken, sondern auch unsere Stellung als dominierende Weltmacht sichern."
cw_axis_victory.81.a:0 "Beginnen wir mit dem Wiederaufbau."
cw_axis_victory.82.t:0 "Autarkie fortsetzen"
cw_axis_victory.82.d:0 "Unsere Autarkiepolitik war ein Eckpfeiler unserer Kriegsstrategie und ermöglichte es uns, die Abhängigkeit von ausländischen Ressourcen zu verringern. Nach dem Krieg müssen wir diesen Weg weiterverfolgen, um unsere wirtschaftliche Stabilität langfristig zu sichern. Durch die Stärkung unserer Autarkie können wir unser Land vor möglichen globalen Störungen schützen."
cw_axis_victory.82.a:0 "Behalten Sie den Autarkiekurs bei."
cw_axis_victory.83.t:0 "Ausbau der industriellen Infrastruktur"
cw_axis_victory.83.d:0 "Unser Sieg in diesem globalen Konflikt bietet uns die Möglichkeit, unsere industrielle Infrastruktur auszubauen und zu modernisieren. Durch Investitionen in neue Fabriken, die Modernisierung bestehender Fabriken und die Verbesserung unserer Transport- und Logistiknetzwerke können wir unsere Produktionskapazität und -effizienz deutlich steigern. Dies wird uns in die Lage versetzen, unseren Einfluss auf der Weltbühne noch weiter zu stärken."
cw_axis_victory.83.a:0 "Beginnen wir mit dem Ausbau der industriellen Infrastruktur."
cw_axis_victory.84.t:0 "Technologischer Sprung"
cw_axis_victory.84.d:0 "Als siegreiche Achsenmächte haben wir Zugang zu fortschrittlichen Technologien und wissenschaftlichen Erkenntnissen erlangt. Um unsere Wettbewerbsfähigkeit zu erhalten und unsere Innovationsführerschaft zu sichern, müssen wir uns auf einen Technologiesprung konzentrieren. Wir müssen erhebliche Ressourcen in Forschung und Entwicklung investieren, um den wissenschaftlichen Fortschritt voranzutreiben."
cw_axis_victory.84.a:0 "Nutzen Sie den technologischen Sprung."
cw_axis_victory.85.t:0 "Technologischer Rat"
cw_axis_victory.85.d:0 "In unserem Streben nach technologischer Überlegenheit werden wir einen Technologierat gründen. Dieses Gremium wird unsere besten Köpfe und Forscher vereinen, um gemeinsam an Spitzenprojekten zu arbeiten, Wissen auszutauschen und Innovationen in allen wissenschaftlichen Bereichen voranzutreiben. Durch die Förderung einer Kultur wissenschaftlicher Exzellenz können wir unsere Position als Technologieführer festigen."
cw_axis_victory.85.a:0 "Bilden Sie den Technologierat."
not_recognized:0 "Die UdSSR wird nicht anerkannt"
JOS_junta:0 "Koreanische Junta"
#JOS
kor.1.d:0 "Stabilität in Korea konnte nicht erreicht werden, solange Radikale wie Kim Il-sung und Shin Chae-ho weiterhin die Jugend vergifteten. Daher traf Kim Koo nach Rücksprache mit seinen Ministern die schwierige Entscheidung, die Ermordung von Kim Il-sung und Shin Chae-ho anzuordnen. Ihr Tod wurde von ihren zahlreichen Anhängern nicht ignoriert, die schließlich in den Straßen von Seoul, Busan und Pjöngjang randalierten, Straßenlaternen zerstörten und die jeweiligen Plätze niederbrannten. Diese Demonstranten wurden von Polizei und Armee beschossen, was den Rücktritt vieler unserer Generäle provozierte."
kor.1.a:0 "Wenn wir Glück haben, wird unsere Zukunft heller sein ..."
kor.2.d:0 "Endlich wurden die ersten Wahlen in Korea durchgeführt! Nach einem ganzen Tag Stimmenauszählung steht der Gewinner fest:"
kor.2.a:0 "Kim Koo, der koreanische Held!"
kor.2.b:0 "Syngman Rhee, der Antikommunist."
kor.3.d:0 "Die Militärjunta unter Lee Beom-seok hielt sich nicht lange, nachdem die anarchistischen Generäle versucht hatten, die Macht zu übernehmen, was ihnen jedoch gelang. Am Morgen kam es im ehemaligen Königspalast zu einer Schießerei, Ji Cheon-cheong und Hong Beom-do wurden erschossen, während Lee Beom-seok einige Straßen vom Palast entfernt tot in seinem Auto aufgefunden wurde. Stunden später verkündeten Kim Il-sung, Kim Won-bong und Kim Jwa-jin im Radio, dass die einzige Rettung des Landes eine anarchistische Regierung sei. Sie erklärten außerdem, dass der berühmte anarchistische Philosoph Shin Chae-ho aus dem chinesischen Exil zurückkehren werde, um zur Stabilisierung des Landes beizutragen."
kor.3.a:0 "Opfer müssen gebracht werden."
kor.5.d:0 "Die Militärjunta unter Lee Beom-seok konnte sich nicht lange halten, nachdem die anarchistischen und kommunistischen Generäle versucht hatten, die Macht zu übernehmen. Doch glücklicherweise scheiterte ihr Vorhaben. Am Morgen war im Königspalast eine Schießerei zu hören, bei der Hong Beom-do von anarchistischen Generälen in Arm und Schulter geschossen wurde. Die Schüsse wurden von der Palastwache gehört, die Kim Jwa-jin und Kim Won-bong auf frischer Tat ertappte und dann die anarchistischen Generäle erschoss. Lee Beom-seok berichtete, er sei auf dem Heimweg von Kim Chaek angegriffen worden und sagte auch, er habe großes Glück gehabt und wäre wahrscheinlich tot, wenn die Waffe des Mannes nicht Ladehemmung gehabt hätte. Dem Attentäter gelang jedoch die Flucht, bevor Lee zurückschießen konnte. Nun wird General Hong Beom-do ins Krankenhaus von Seoul gebracht, bevor er in den Krankenwagen steigt, in dem er erklärt, es gehe ihm gut und es brauche mehr als zwei Verräter, um ihn zu überwältigen. Schließlich versicherte Hong Beom-do der Presse, dass die Junta nun die Pflicht habe, alle Generäle hinzurichten, die an der Verschwörung beteiligt waren."
kor.5.a:0 "Hoffentlich ist dies das Ende des Sturms."
kor.6.d:0 "Die Militärjunta Koreas entschied, dass die Wiederherstellung des koreanischen Throns der beste Weg zur Sicherung der Stabilität Koreas sei. Es bleibt jedoch ein großes Problem hinsichtlich der Frage, wer der neue Führer der koreanischen Nation werden soll. \n\nEinerseits ist Yi Kang der älteste Sohn von Kaiser Gojong, dennoch wurde er von Lady Jang geboren, einer Hofdame von König Gojong, und nicht von dessen offiziellem Gemahl oder Konkubine. Daher wäre ein König mit dieser Abstammung demütigend für unsere Bevölkerung. \n\nAndererseits gibt es Yi Un, Sohn von Kaiser Gojong und der kaiserlichen Edelgemahlin Sunheon, der die perfekte Wahl wäre, wenn er nicht ein Protegé von Kaiser Meiji selbst und General der japanischen Armee wäre."
kor.6.a:0 "Yi Kang ist die einzige Option."
kor.6.b:0 "Wir werden Yi Un begnadigen und krönen."
kor.7.d:0 "Eine Delegation aus Korea hat uns heute kontaktiert und uns ein weiteres Abkommen angeboten. Sie schlägt vor, den Nichtangriffspakt zwischen unseren Ländern zu erneuern und unseren Armeen wieder militärischen Zugang zu gewähren. Im Gegenzug soll ihnen im Falle eines Angriffs ihre Unabhängigkeit garantiert werden. Wie sollen wir reagieren?"
kor.7.a:0 "Davon würden wir beide profitieren."
kor.7.b:0 "Mit ehemaligen Untertanen werden wir nicht verhandeln."
kor.8.d:0 "Die koreanische Regierung hat sich heute mit einer äußerst polemischen Forderung an uns gewandt: der Annexion der Provinz Jiandao, die fast ausschließlich von Koreanern bewohnt wird. Jiandao gehört seit der Qing-Dynastie zu China. Eine Übertragung der Region könnte jedoch künftige irredentistische Bewegungen behindern und die koreanische Unterstützung in zukünftigen Kriegen sichern. Was sollen wir tun?"
kor.8.a:0 "Okay, sie können es haben, aber sonst nichts."
kor.8.b:0 "Wie können sie es wagen?"
kor.9.d:0 "Heute haben die Koreaner unserer Delegation einen interessanten Vorschlag unterbreitet. Sie sagten, wenn wir ihre Unabhängigkeit im Falle eines ausländischen Angriffs garantieren würden, würden sie uns ein günstiges Handelsabkommen gewähren. Wie sollten wir darauf reagieren?"
kor.9.a:0 "Klingt nach einem guten Vorschlag."
kor.9.b:0 "Das Risiko ist es nicht wert."
kor.10.desc:0 "Nachdem das Königreich wiederhergestellt wurde, ist es an der Zeit zu entscheiden, welche Flagge die koreanische Nation repräsentieren soll."
kor.10.a:0 "Unsere aktuelle Flagge ist perfekt."
kor.10.b:0 "Die Flagge von 1882 wird unsere Nation repräsentieren."
kor.10.c:0 "Eine Flagge mit dem Siegel der Familie Yi ist die richtige Wahl."
kor.10.d:0 "Eine Flagge mit dem Siegel der Familie Yi, aber nicht zu vergessen die Symbole der vier Elemente."
jappact.1.d:0 "Eine Delegation aus Korea hat uns heute kontaktiert und uns ein Angebot gemacht. Sie erklärte, sie sei bereit, uns die Förderrechte für einige Minen im Norden der koreanischen Halbinsel zu übertragen, wenn wir im Gegenzug einen Nichtangriffspakt mit ihnen unterzeichnen. Sollen wir das Angebot annehmen?"
jappact.1.a:0 "Davon profitieren natürlich wir beide."
jappact.1.b:0 "Wir würden es vorziehen, die vollständige Kontrolle über die Halbinsel zu haben."
jappact.2.d:0 "Die japanische Regierung hat unseren Deal akzeptiert. Hoffen wir, dass der Frieden zwischen unseren Nationen für immer bestehen bleibt."
jappact.2.a:0 "Pfarrhaus!"
jappact.3.d:0 "Die japanische Regierung hat unser Abkommen abgelehnt, wir müssen uns auf das Schlimmste gefasst machen."
jappact.3.a:0 "Ttong!"
jappact.4.d:0 "Eine Delegation aus Korea hat sich heute an uns gewandt und uns gebeten, ihnen die Kontrolle über einige Gebiete in Nordchina zu übertragen. Sie argumentierten, dies würde uns helfen, die Besatzungskosten zu senken und die Verluste durch Partisanen zu verringern. Sollen wir das Angebot annehmen?"
jappact.4.a:0 "Dann mehr Personal für unsere Truppen."
jappact.4.b:0 "Die Koreaner sollten lernen, keine dummen Vorschläge zu machen."
jappact.5.d:0 "Die japanische Regierung hat unseren Vorschlag angenommen, unsere Garnisonen werden jetzt mit der Mobilisierung beginnen."
jappact.5.a:0 "Pfarrhaus!"
jappact.6.d:0 "Leider lehnte die japanische Regierung unseren Vorschlag ab."
jappact.6.a:0 "Ttong!"
japfood.1.d:0 "Die japanische Bevölkerung konnte 1936 problemlos von den mandschurischen Feldfrüchten ernährt werden. Doch jetzt, da wir keinen Zugang mehr zu ihnen haben, herrscht im Land Nahrungsmittelknappheit. Die Regierung muss schnell handeln, nicht nur um die Bevölkerung zu retten, sondern auch um sich selbst vor den extremistischen Stimmen in Armee und Marine zu schützen, die eine Lösung fordern."
japfood.1.a:0 "Ein schwerer Schlag für unseren Stolz."
japfood.2.d:0 "Einige Tage nachdem die Regierung den Angehörigen der Streitkräfte Priorität bei der Lebensmittelversorgung eingeräumt hatte, kam es in der Hauptstadt zu Protesten. Eine Gruppe von Menschen beschloss, zum Kongress zu marschieren, in der Hoffnung, dass die Regierung ihre Bitten erhört. Als der Mob jedoch nur noch eine Straße von seinem Ziel entfernt war, wurden sie von Soldaten empfangen, die ohne zu zögern ihre Waffen luden und auf sie zielten. Beide Seiten warteten auf die Reaktion der Regierung, bis sie kam:"
japfood.2.a:0 "Wie können sie es wagen, sich unserer Entscheidung zu widersetzen? Erschießt sie, JETZT!"
japfood.2.b:0 "Wir werden die versprochenen Leistungen für die Armee streichen."
japfood.3.d:0 "Aufgrund der Unfähigkeit der Regierung, die Hungersnot zu beenden, drang eine Gruppe von Soldaten unter dem Kommando junger Offiziere und Marineangehöriger in den Kongress ein und forderte die Machtübergabe an Isoroku Yamamoto. Wer Widerstand leistete oder sich weigerte, wurde ohne Zögern erschossen. Am nächsten Tag wurde eine Radiobotschaft in ganz Japan verbreitet, in der Yamamoto erklärte, er und der Kaiser würden das in Ordnung bringen, was die alte Regierung nicht geschafft hatte."
japfood.3.a:0 "Hoffen wir, dass dies die Situation behebt."
japchi.1.d:0 "Nach der Niederlage Chinas im Zweiten Chinesisch-Japanischen Krieg hat unsere Regierung beschlossen, Wang Jingwei aufgrund seiner Kollaboration mit unserer mächtigen Nation zum Führer unseres Marionettenstaates in China zu ernennen."
japchi.1.a:0 "Banzai!"
japchi.2.d:0 "Nach der Niederlage Chinas im Zweiten Chinesisch-Japanischen Krieg hat unsere Regierung beschlossen, Wang Jingwei aufgrund seiner Kollaboration mit unserer mächtigen Nation zum Führer unseres Marionettenstaates in China zu ernennen."
japchi.2.a:0 "Banzai!"
japchi.3.d:0 "Nachdem er die Japaner aus China vertrieben hatte, kehrte der legitime Führer der Nation zurück und forderte die Verhaftung von Wang Jingwei wegen Hochverrats am Staat und der Kuomintang. Doch zu seiner Überraschung hatte sich Wang bereits vor seiner Ankunft den chinesischen Behörden gestellt. Der Verräter sagte der Öffentlichkeit nichts weiter als: „Ich habe getan, was ich tun musste, um China zu retten.“ Nun erwartet ihn in der Hauptstadt sein Prozess."
japchi.3.a:0 "Ob er Recht hat oder nicht, er wird wahrscheinlich ins Gefängnis kommen oder Schlimmeres."
japchi.4.d:0 "Heute kam Ma Zhanshan auf uns zu und sagte, er verabscheue die Politik der gewaltlosen Unterdrückung durch die schwache nationalistische Regierung und sei bereit, sich auf unsere Seite zu stellen. Natürlich haben wir dieses wertvolle Angebot angenommen."
japchi.4.a:0 "Hoffen wir, dass er uns nicht auch im Stich lässt."
japchi.5.d:0 "Heute ist Ma Zhanshan aus unserer Armee desertiert. Als Grund nannte er „unsere Unfähigkeit im Krieg und unsere Politik der Widerstandslosigkeit gegenüber den Japanern“. Das hat unseren Anführer natürlich verärgert, aber er kann nichts dagegen tun."
japchi.5.a:0 "Verdammt gut, Mama!"
japchi.6.d:0 "Heute erreichte uns ein berittener Bote mit einem Brief von Ma Zhangsha von der chinesischen Armee. Darin erklärte er, seine Unzufriedenheit mit der inkompetenten chinesischen Regierung habe ihre Grenzen erreicht, und bot uns an, uns unseren Truppen anzuschließen. Der bescheidene General verlangte lediglich eine enorme Menge Gold und modernste Ausrüstung, die wir ihm anbieten konnten. Wie auch immer wir uns entscheiden, wir dürfen nicht vergessen, wie er sich 1931, nachdem er aus der chinesischen Armee desertiert war, uns anschloss, nur um dann auch zu uns zu überlaufen und einer der bekanntesten Guerillaführer in Mandschukuo zu werden."
japchi.6.a:0 "Dies wird die chinesischen Kriegsanstrengungen mit Sicherheit beeinträchtigen."
japchi.6.b:0 "Wenn du mich einmal täuschst, ist Schande über dich; wenn du mich zweimal täuschst, ist Schande über mich."
japchi.7.d:0 "Nach der Niederlage Russlands im Zweiten Russisch-Japanischen Krieg hat unsere Regierung beschlossen, Konstantin Rodzaevsky aufgrund seiner Kollaboration mit unserer Regierung während seines Exils in der Mandschurei zum Führer unseres Marionettenstaates in Wladiwostok zu ernennen."
japchi.7.a:0 "Banzai!"
japchi.8.d:0 "Nachdem er die Japaner aus Wladiwostok vertrieben hatte, kehrte der legitime Führer der Nation zurück und forderte die Verhaftung von Konstantin Rodsajewski wegen Hochverrats. Nun erwartet ihn in der Hauptstadt sein Prozess."
japchi.8.a:0 "Auf Wiedersehen, Konstantin."
japa.1.d:0 "Nach der Annexion 1910 blieb Korea von unserer mächtigen Nation besetzt, doch die Koraner sind ihrer alten Kultur und Sprache treu geblieben. Stimmen aus der Regierung schlugen eine Assimilationskampagne in Korea vor, die die Verwendung der japanischen Sprache und Namen fördern, die Presse zensieren und jeglichen Widerstand in Korea unterdrücken sollte. Dennoch müssen wir uns entscheiden, ob wir diese Politik fortsetzen oder ob es nicht an der Zeit ist, die koreanische Kultur anzuerkennen."
japa.1.a:0 "Das koreanische Volk wird mit dem japanischen eins werden."
japa.1.b:0 "Was ist das für eine Frage? Setzen Sie die Assimilationspolitik fort!"
japa.1.c:0 "Wir sollten unsere asiatischen Mitmenschen respektieren."
japa.1.e:0 "Wir werden Korea mehr Autonomie geben und gleichzeitig unsere Verwaltung fortsetzen"
japa.2.d:0 "Aufgrund der zunehmenden Japanisierungspolitik in Korea kam es in Seoul, Busan und Pjöngjang zu Straßenunruhen. Zunächst handelte es sich lediglich um Studentenproteste, doch dann streikten Berichten zufolge Arbeiter und Bauern in vielen Regionen der Halbinsel. Natürlich wurden sie von unseren Kugeln getroffen, doch erstaunlicherweise kam es einen Monat später in ganz Korea zu Aufständen, bis es koreanischen Milizen gelang, die Kontrolle über Stadthauptstädte und japanische Festungen zu übernehmen. Gerüchten zufolge seien der Veteran des Aufstands von 1919, Lee Beom-Seok, sowie der kommunistische Führer Kim Il-Sung in die Region einmarschiert. Jetzt stehen wir vor einer ausgewachsenen Revolution."
japa.2.a:0 "Wir haben sie schon einmal vernichtet und wir werden es wieder tun."
japa.2.b:0 "Für unsere Zukunft heißt es jetzt oder nie!"
japa.4.d:0 "Einer Gruppe junger Armeeoffiziere und Marineangehöriger ist es gelungen, mehrere Regierungsbeamte sowie den Premierminister zu ermorden. Sie besetzten Tokio und übernahmen die Kontrolle über den Kaiserpalast. Sie verkündeten, die Regierung von „korrupten Beamten“ und „ideologischen Bedrohungen“ zu säubern. \n\nIhre Aktionen fanden unerwartet große Unterstützung beim Militär, wo geplante Gegenoperationen durch Massenverhaftungen und Morde an loyalen Regierungsmitgliedern vereitelt wurden. Angesichts der plötzlichen und überwältigenden Ereignisse und der Kontrolle der Rebellen über den Palast unternahm der Kaiser keine Anstalten, die Rebellen zu verurteilen. \n\nDer organisierte Widerstand der Regierung scheint bereits zu bröckeln, und es wird erwartet, dass die Rebellen jederzeit die vollständige Kontrolle des Imperiums über alle Bereiche der Innen-, Außen- und Militärpolitik ankündigen werden."
japa.4.a:0 "Tennōheika Banzai!"
japa.5.d:0 "Die Japaner haben uns mit einem Abkommen namens „Antikommunistischer Pakt“ kontaktiert. Darin erklären sie, wir sollten unsere Differenzen beilegen, um den Kommunismus in China auszulöschen. Sie sagen, sie wüssten, wie sehr die Kommunisten sowohl für unsere als auch für ihre Regierung eine Bedrohung darstellen, und schlagen deshalb ein Verteidigungsbündnis vor. Darin würden beide Seiten versprechen, die jeweils andere im Falle eines Krieges gegen eine kommunistische Clique oder einen Aufstand in China zu verteidigen und militärischen Zugang zu gewähren, um die Zusammenarbeit unserer Armeen zu erleichtern. Wie sollten wir reagieren?"
japa.5.a:0 "Der Feind meines Feindes ist mein Freund."
japa.5.b:0 "Wir werden mit keinen Barbaren zusammenarbeiten."
japa.6.d:0 "Die Kuomintang hat unseren Deal akzeptiert. Jede Partei wird versprechen, die andere im Falle eines Krieges gegen eine kommunistische Clique oder einen Aufstand in China zu verteidigen und außerdem militärischen Zugang zu gewähren, um die Zusammenarbeit unserer Armeen zu erleichtern."
japa.6.a:0 "Perfekt."
japa.7.d:0 "Die Kuomintang hat unser Abkommen abgelehnt. Wir müssen den Kommunismus selbst zerstören."
japa.7.a:0 "Solange sie nicht versuchen, in die Mandschurei einzumarschieren, ist alles in Ordnung."
japa.8.d:0 "Jetzt, da die Chinesen mit den Kommunisten im Krieg sind, ist es an der Zeit, sich ihnen in ihrem Kampf gegen den roten Teufel anzuschließen!"
japa.8.a:0 "Tennōheika Banzai!"
japa.9.d:0 "Jetzt, da die Japaner mit den Kommunisten Chinas im Krieg sind, ist es an der Zeit, sich ihnen in ihrem Kampf gegen die roten Teufel anzuschließen!"
japa.9.a:0 "Vorwärts, um China zu retten!"
japa.10.d:0 "Nachdem die Demokratie in Japan zurückgekehrt ist, ist es an der Zeit, den neuen Premierminister zu wählen. Nach einem Wahltag wurden die Ergebnisse veröffentlicht. Der neue Staatschef Japans heißt:"
japa.10.a:0 "Kijuro Shidehara, der Pazifist!"
japa.10.b:0 "Tetsu Katayama, der Sozialist!"
japa.10.c:0 "Ikuo Oyama, der Reformist!"
japa.11.d:0 "Die Japaner haben eine große Zahl von Offizieren und militärischer Unterstützung geschickt, um das koreanische Militär zu rehabilitieren, und haben so den Wiederaufbau unserer Armee erheblich unterstützt."
japa.11.a:0 "Die Hilfe ist willkommen."
japa.12.d:0 "Die Japaner haben begonnen, in unsere Wirtschaft zu investieren und humanitäre Hilfe zu leisten, um die koreanische Wirtschaft wieder in Gang zu bringen, und leisten damit einen großen Beitrag zum Wiederaufbau."
japa.12.a:0 "Die Hilfe ist willkommen."
japa.13.d:0 "In Nagoya, der provisorischen Hauptstadt des kommunistischen Aufstands, wurden Gerüchte und Flüche laut. Es hieß, politische Elemente planten die Ermordung von Kyuichi Tokuda. Sozialisten und Anarchisten hassten ihn aufgrund seiner autoritären Führung und der Säuberungen ebenso sehr wie die Faschisten und Konservativen, die sie bekämpften. Die Uneinigkeit unter den Aufständischen war groß, bis eines Tages ein junger Anarchist den Anführer der Revolution und der kommunistischen Partei ermordete. \n\nDa jedoch alle wichtigen anarchistischen Anführer in den 10er und 20er Jahren von der japanischen Regierung hingerichtet wurden, gab es niemanden, der Tokudas Platz einnehmen konnte. Dadurch entstand ein großes Machtvakuum innerhalb der Aufständischen, das die Kriegsanstrengungen stark beeinträchtigte. \n\nNur noch eine Person ist in der Lage, die linken Kräfte zu führen, da bessere Optionen entweder tot sind oder sich in von Faschisten kontrollierten Regionen befinden: Toyohiko Kagawa, ein Arbeiteraktivist und Schriftsteller, aber leider auch protestantischer Christ. Einen bekannten religiösen Anhänger als Anführer unserer Bewegung zu haben, ist vielleicht nicht sympathisch, aber überhaupt keinen Anführer zu haben, wäre vielleicht noch schlimmer." #Then, what shall we do?
japa.13.a:0 "Eine Sache ohne Anführer ist zum Scheitern verurteilt."
japa.13.b:0 "Die Religion darf die Revolution nicht vergiften!"
japa.15.d:0 "Nach dem Sturz der Regierung infolge Tokudas Ermordung begannen viele kommunistische Milizen gegen die anarchistischen zu kämpfen. Dies provozierte eine große Desertion sozialistischer Soldaten, die glaubten, Anarchisten und Kommunisten kämpften aus Machtgier, anstatt dem japanischen Volk zu helfen. Dies sicherte den faschistischen Seiten den Sieg, doch der schwerste Schlag für die Revolutionäre sollte bald folgen. \n\nKonservative und faschistische Anhänger in Nagoya putschten und stürmten das ehemalige Tokuda-Gebäude, in dem angeblich die Regierung residierte. Doch es war leer. Das Einzige, was sie fanden, war ein Buch mit einer Notiz auf dem Einband: „Der Krieg ist verloren. Geht jetzt nach Hause.“ \n\nDie Überreste der linken Revolte haben begonnen, sich zu ergeben, und obwohl der Krieg viele Opfer gefordert hat, gibt es nichts mehr, was die aufgehende Sonne noch aufhalten kann."
japa.15.a:0 "Tennōheika Banzai!"
japa.16.d:0 "Der Taisei Yokusankai hat sich als unfähig erwiesen, dem japanischen Kaiserreich Größe und Stabilität zu verleihen. Diejenigen, die tapfer gegen die kommunistische Bedrohung gekämpft haben, müssen und werden die neuen Führer Japans sein. Doch ein Problem bleibt bestehen: Zwei Fraktionen streben derzeit nach der neuen Führung des Kaiserreichs. Auf der einen Seite steht der Tohokai, der in Anlehnung an den italienischen Faschismus und den deutschen Nationalsozialismus die Samurai und die neokonfuzianische Ethik wiederherstellen will; auf der anderen Seite steht die Kokumin Domei, die einen korporatistischen Staat sowie die Schaffung einer Wirtschaftsunion zwischen Japan und seinen Marionetten befürwortet. Wer verdient also den neuen Führer des Kaiserreichs der aufgehenden Sonne?"
japa.16.a:0 "Seigo Nakano und der Tohokai."
japa.16.b:0 "Adachi Kenzo und der Kokumin Domei."
japa.17.t:0 "Mandschurischer Brief"
japa.17.d:0 "Toyohiko Kagawa selbst hat einen Brief an [Root.GetLeader] geschickt, in dem er erklärt, Japan habe für den Rest seiner Geschichte genug Blutvergießen erlebt und sei bereit, für das Leben aller Mandschuren, Koreaner und Japaner über eine friedliche Wiedervereinigung unserer Nationen zu verhandeln. Er verspricht, Kaiser Hirohito wieder auf den Thron zu setzen, die radikalsten linken Parteien zu verbieten und allen Generälen, die im Krieg auf faschistischer Seite gekämpft haben, eine Amnestie zu gewähren. Sollten wir jedoch zustimmen, bleiben er und seine Minister an der Macht, und die totalitäreren und nationalistischeren Parteien werden ebenfalls verboten. Wie sollen wir reagieren?"
japa.17.a:0 "Endlich Frieden."
japa.17.b:0 "Wir können keinen Kommunisten vertrauen."
japa.18.d:0 "Jetzt, da die Sonne wieder aufgeht, haben die Japaner von unserer Regierung verlangt, ihnen erneut die Treue zu schwören. Wir könnten uns weigern, aber das würde höchstwahrscheinlich mit einer japanischen Invasion enden. Wir können jedoch immer noch versuchen, sie zu bekämpfen, schließlich hatten sie vor einigen Monaten noch einen Bürgerkrieg."
japa.18.a:0 "Wir haben keine andere Wahl, oder?"
japa.18.b:0 "Wir werden niemandes Sklaven sein!"
japa.19.d:0 "Premierminister Fumimaro Konoe hat die Gründung einer Partei vorgeschlagen, die Militaristen, Traditionalisten und Sozialisten unter einem gemeinsamen Banner vereinen soll: Taisei Yokusankai. Viele Politiker unterstützen diese Idee, doch einige sind der Meinung, dass eine Partei ohne eigenständige Identität das Volk unter ihrer Führung nicht vereinen könne. Einige schlagen eine Machtübergabe an die Tohokai vor, die in Anlehnung an den italienischen Faschismus und den deutschen Nationalsozialismus die Samurai und die neokonfuzianische Ethik wiederherstellen will. Andere wiederum unterstützen die Kokumin Domei, die einen korporatistischen Staat und die Schaffung einer Wirtschaftsunion zwischen Japan und seinen Marionetten befürwortet."
japa.19.a:0 "Der Taisei Yokusankai wird den Japanern Größe bringen."
japa.19.b:0 "Seigo Nakano und der Tohokai werden für Ordnung sorgen."
japa.19.c:0 "Adachi Kenzo und die Kokumin Domei werden die Nation stabilisieren."
chi.1.d:0 "Heute explodierte bei einer Versammlung von Kuomintang-Mitgliedern eine Bombe. Die Explosion tötete Chiang Kai-Shek auf der Stelle und verletzte Wang Jingwei, der in der Hoffnung auf sein Überleben ins nächste Krankenhaus gebracht wurde. Ermittlungen zur Täterschaft laufen bereits, obwohl die Schuld bereits den Kommunisten von Yan&#39;an zugeschrieben wird."
chi.1.a:0 "Rufen Sie jetzt Dai Li und Chen Cheng an!"
chi.2.d:0 "Nach dem Vorfall mit Chiang Kai-shek schlugen einige Mitglieder der Kuomintang etwas vor, was der Generalissimus niemals zugelassen hätte: Verhandlungen mit den Kommunisten von Yan&#39;an. Das würde diese sinnlosen Angriffe zwischen unseren eigenen Völkern beenden, und mit etwas Glück könnten wir unsere Nation endlich vereinen."
chi.2.a:0 "Wir werden unser Bestes geben."
chi.3.d:0 "Nach dem Terroranschlag in Nanking berieten Chen Cheng und Dai Li über das Schicksal der chinesischen Regierung. Nach einem langen Treffen mit anderen Mitgliedern der Kuomintang beschlossen sie, Dai Li zum Staatschef zu ernennen. Dai Li ist bekannt für seinen Antikommunismus und seine faschistischen Sympathien und wird von vielen als einzige Lösung für das kommunistische Problem im Norden angesehen."
chi.3.a:0 "Der General lädt Sie zum Tai-See ein."
chi.4.d:0 "Nach dem erfolgreichen Bombenanschlag in Naking durch eingeschleuste Mitglieder unserer Armee wurde Chiang ermordet. Dies führte zum Aufstieg von Wang Jingwei, dem ehemaligen Führer der linken Kuomintang und engen Freund von Sun Yat Sen. Nun hat er sich mit dem Vorschlag an unsere Regierung gewandt, diesen Wahnsinn eines Bürgerkriegs zu beenden und gemeinsam für eine bessere Zukunft Chinas zu arbeiten. Einige Parteiführer wie Mao Zedong haben diesen Vorschlag bereits abgelehnt, während andere wie Zhang Lan Wang Ming zugestimmt haben, um diesen nicht enden wollenden Bürgerkrieg zu beenden."
chi.4.a:0 "Für eine bessere Zukunft!"
chi.4.b:0 "Wir werden nicht mit Konterrevolutionären verhandeln."
chi.5.d:0 "[PRC.GetLeader] hat den Wiedervereinigungsvorschlag angenommen. Nach Jahren des Konflikts ist der Bürgerkrieg endlich beendet."
chi.5.a:0 "Für eine bessere Zukunft!"
chi.6.d:0 "[PRC.GetLeader] hat unseren Vorschlag abgelehnt und erklärt, dass es sich nur um eine Falle handele, um die Kommunisten zu vertreiben, so wie es Chiang 1927 tat. Berichten aus Xian zufolge haben die kommunistischen Guerillas begonnen, unsere Garnisonen anzugreifen, und Dai Li ist mit einem Bericht in Wuhan eingetroffen, in dem es heißt, dass in Yan&#39;an derzeit ein großer Riss stattfinde und dass es zu einer Massenflucht der Armee komme, um unsere Sache zu unterstützen."
chi.6.a:0 "Jetzt oder nie!"
chi.7.d:0 "Heute hat uns die chinesische Regierung Schutz und den Status einer autonomen Region angeboten, wenn wir uns ihrer Verwaltung anschließen. Während einige meinen, dass wir von diesem Abkommen nichts gewinnen, sagen andere, dass es unsere einzige Möglichkeit sei, eine unvermeidliche Invasion Chinas zu verhindern, die wir nicht abwehren könnten."
chi.7.a:0 "Wir haben keine andere Wahl."
chi.7.b:0 "Wir sollten optimistischer sein."
chi.8.d:0 "Die Regierung von Xinjiang hat unsere Bedingungen akzeptiert, wir werden heute mit der Annexion der Region beginnen."
chi.8.a:0 "Perfekt."
chi.9.d:0 "Die Regierung von Xinjiang hat unseren Vorschlag abgelehnt. Es ist Zeit, ihr eine Lektion zu erteilen."
chi.9.a:0 "Lass uns gehen."
chi.10.d:0 "Wir haben gerade eine Nachricht aus Nanjing erhalten, die uns eine großartige Zukunft und ein hohes Maß an Autonomie verspricht, wenn wir uns ihnen anschließen. Obwohl es ein gutes Angebot zu sein scheint und eine Invasion verhindern würde, die wir möglicherweise nicht abwehren können, besteht immer noch die Möglichkeit, dass sie einen Rückzieher machen."
chi.10.a:0 "Wenn wir uns weigern, werden sie uns überfallen, nicht wahr?"
chi.10.b:0 "Wie süß von ihnen! Lassen Sie uns mit einem klaren Nein antworten!"
chi.11.d:0 "Die Regierung von Yunnan bat uns, die Kontrolle über die Region Sichuan an sie zu übertragen. Es scheint, als würden wir davon keinen Vorteil haben. Wir würden Arbeitskräfte, Ressourcen und Fabriken verlieren. Was aber, wenn wir den Yunnanern Sichuan überlassen und dafür unseren Einfluss auf ihre Wirtschaft und Armee erhöhen? Sie würden Sichuan bekommen, aber wir würden die vollständige Kontrolle darüber nicht verlieren."
chi.11.a:0 "Senden Sie das Gegenangebot."
chi.11.b:0 "Geben Sie es ihnen kostenlos."
chi.11.c:0 "Sind sie verrückt?"
chi.12.d:0 "Die Regierung von Nanjing hat uns ein weiteres Angebot gemacht: Sie wird uns Sichuan überlassen, wenn wir ihr Satellitenstaat werden und ihnen die Kontrolle über einige unserer Fabriken, Abteilungen und Ressourcen geben. Wie sollen wir reagieren?"
chi.12.a:0 "Alles für die Rettung Sichuans."
chi.12.b:0 "Nein danke."
chi.13.d:0 "Die Regierung von Nanjing hat unser Angebot abgelehnt. Eine große Schande."
chi.13.a:0 "Verdammt..."
chi.14.d:0 "Yunnan lehnte unser Angebot ab."
chi.14.a:0 "Es ist ihr Verlust."
chi.15.d:0 "Die Regierung von Yunnan ist mit einem interessanten Vorschlag an uns herangetreten: Sie hat darum gebeten, unsere Kriegsanstrengungen gegen die Regierung von Nanjing heimlich zu bündeln, um in Zukunft bessere Chancen gegen sie zu haben. Schließlich verfolgen wir beide das gleiche Ziel, aber wir müssen bedenken, dass wir dadurch von Zeit zu Zeit gezwungen wären, ihren Befehlen Folge zu leisten."
chi.15.a:0 "Alles, um Nanjing zu besiegen."
chi.15.b:0 "Warum sollten wir uns mit ein paar Felsen über einem Berg verbünden?"
chi.16.d:0 "Yan&#39;an hat unserem Vorschlag zugestimmt, jetzt bereiten wir uns auf den Angriff auf Nanjing vor!"
chi.16.a:0 "Perfekt."
chi.17.d:0 "Die Regierung von Yan&#39;an hat unser Abkommen abgelehnt."
chi.17.a:0 "Das ist nicht das Letzte, was sie von uns hören werden."
chi.18.d:0 "Heute hat das Yunnanese Transport Enterprise die Straße Burma-Sichuan fertiggestellt und damit unsere Infrastruktur in der Region erheblich verbessert."
chi.18.a:0 "Wie nett von ihnen!"
chi.19.d:0 "Heute hat uns die Regierung von Xibei San Ma um einen Gefallen gebeten: Wir sollen uns nicht in ihren aktuellen Konflikt mit Tibet einmischen. Die britische Regierung hatte uns 1932 in ihren letzten Krieg gegen Tibet hineingezogen, der glücklicherweise mit dem Rückzug der Ma-Clique endete. Nun jedoch hat sie ihre Konflikte mit den Tibetern wieder aufgenommen. Doch anders als im Qinghai-Tibet-Krieg drohen die faschistischen Mächte Deutschland und Italien Europa mit einem weiteren Weltkrieg, und wenn es in Europa Krieg gibt, gibt es auch in Indien Krieg. Wir werden keine unnötigen Fronten errichten."
chi.19.a:0 "Geben Sie ihnen ihr geliebtes Dessert."
chi.20.d:0 "Heute fordert die Ma-Regierung unsere Unterwerfung und erklärt, die einzige Möglichkeit, die tibetischen Aufstände zu stoppen, sei die totale Kontrolle über unsere Bevölkerung. Sollten wir uns weigern, droht uns ein Krieg, den wir nicht so leicht gewinnen können. Und anders als im Qinghai-Tibet-Krieg von 1932 werden wir im Falle einer Zurückdrängung keine britische Unterstützung haben. Wie sollen wir reagieren?"
chi.20.a:0 "Wir haben keine Wahl ..."
chi.20.b:0 "Wir werden mit Ehre sterben oder mit Ruhm leben!"
chi.21.d:0 "Die Tibeter haben unser Ultimatum akzeptiert. Wir werden unsere Armee morgen nach Lhasa schicken."
chi.21.a:0 "Zeit, ihnen eine Lektion zu erteilen."
chi.22.d:0 "Die Tibeter haben unser Ultimatum abgelehnt, unsere Armee wird heute mit der Mobilisierung beginnen."
chi.22.a:0 "Wir werden keine Gnade kennen."
chi.23.d:0 "Heute hat uns die Regierung von Sinkiang um Hilfe im Kampf gegen die Invasoren gebeten. Ihnen zu helfen, mag einfach erscheinen, doch unsere Armee ist derzeit schlecht ausgerüstet, und unsere Bevölkerung würde eine weitere Pattsituation wie bei unserer Intervention in der Region 1934 nicht ertragen. Sollen wir ihrem Ruf folgen?"
chi.23.a:0 "Lass uns das schnell erledigen."
chi.23.b:0 "Vielleicht könnten wir ihnen einfach ein paar Waffen schicken?"
chi.24.d:0 "Nach der Befreiung von Alma-ata stießen wir auf einen Gulag voller Menschen verschiedenster Ethnien. Sie waren schmutzig, wirkten erschöpft und manche sogar unterernährt. Unter ihnen war ein asiatischer Mann mit langem, struppigem Bart, der von der anderen Seite des Zauns aus mit unseren Soldaten sprach. Er sagte, er sei General der Ma-Armee und habe bei der sowjetischen Invasion in Xinjiang gekämpft. Er bat uns, mit einem unserer Generäle oder Offiziere zu sprechen. Er könnte jedoch auch einfach verrückt sein oder lügen, um aus dem Gefängnis befreit zu werden. Was sollten wir tun?"
chi.24.a:0 "Lass uns ein Treffen mit ihm vereinbaren."
chi.24.b:0 "Er muss verrückt sein. Er wird zusammen mit den anderen freigelassen, wenn wir Moskau erreichen."
chi.25.d:0 "Nachdem einer unserer Generäle den Mann getroffen hatte, entdeckten wir etwas Unglaubliches: Dieser schwache und schmutzige Mann war Ma Zhongying, ein General der Ma-Clique, der 1934 bei der sowjetischen Invasion in Xinjiang verschwand. Nachdem seine Identität bestätigt worden war, wurde er von unseren Streitkräften in ein Flugzeug gebracht und in die Hauptstadt gebracht, wo er sich erholen sollte. Der Pilot sagte, Ma Zhongying habe die meiste Zeit der Reise damit verbracht, die Sowjets, Stalin und den Kommunismus zu verfluchen und zu sagen, wie sehr er sich wünsche, wieder an die Front zu gehen, um Rache zu nehmen."
chi.25.a:0 "Willkommen zurück, Kumpel."
chi.26.d:0 "Heute fordert die Ma-Regierung eine Zusammenarbeit mit ihrer Regierung. Nachdem sie nun einen Befreiungsfeldzug für Zentralasien gestartet hat, war es nur eine Frage der Zeit, bis sie uns zwingen würde, uns für eine Seite zu entscheiden. Was sollten wir tun?"
chi.26.a:0 "Wir können uns derzeit keinen Krieg leisten, das müssen wir akzeptieren."
chi.26.b:0 "Lass sie kommen, wenn sie sich trauen."
chi.27.d:0 "Die persische Regierung hat unseren Bedingungen zugestimmt. Wir können nun ihr Territorium betreten und bei Bedarf ihre Armee befehligen."
chi.27.a:0 "Perfekt."
chi.28.d:0 "Die persische Regierung hat unsere Forderungen abgelehnt. Ma Hushan ist über die Situation völlig verärgert und hat erklärt, dass die Perser ihre Armee vorbereiten müssen, wenn sie ihre Unabhängigkeit behalten wollen."
chi.28.a:0 "Lasst uns unsere Kräfte mobilisieren."
chi.29.d:0 "Heute hat die Regierung von Xinjiang Tunganistan besetzt, das wir nach der sowjetischen Invasion in Xinjiang erobert hatten. Im Moment haben wir wichtigere Sorgen als leere und nutzlose Wüsten, aber das bedeutet nicht, dass wir diese Beleidigung unserer Clique vergessen werden."
chi.29.a:0 "Wir werden uns später um sie kümmern."
chi.30.d:0 "Die Regierung von Guangxi bat uns, ihr die Kontrolle über die Region Hunan zu übertragen. Es scheint, als würden wir davon keinen Vorteil haben. Wir würden Arbeitskräfte, Ressourcen und Fabriken verlieren. Was aber, wenn wir Guangxi Hunan überlassen und dafür unseren Einfluss auf ihre Wirtschaft und Armee erhöhen? Sie würden Hunan bekommen, aber wir würden die Kontrolle darüber nicht vollständig verlieren."
chi.30.a:0 "Senden Sie das Gegenangebot."
chi.30.b:0 "Geben Sie es ihnen kostenlos."
chi.30.c:0 "Sind sie verrückt?"
chi.31.d:0 "Die Regierung von Nanjing hat uns einen weiteren Deal angeboten: Sie würden uns Hunan überlassen, wenn wir ihr Satellitenstaat würden und ihnen die Kontrolle über einige unserer Fabriken, Abteilungen und Ressourcen gäben. Wie sollten wir reagieren?"
chi.31.a:0 "Alles für die Rettung von Hunan."
chi.31.b:0 "Nein danke."
chi.32.d:0 "Guangxi lehnte unser Angebot ab."
chi.32.a:0 "Es ist ihr Verlust."
chi.33.d:0 "Heute hat die Regierung von Yue ihre Armee ausgesandt, um unseren ungeschützten Hafen in China zu besetzen und unsere Notlage auszunutzen. Nach der Invasion unserer Kolonie schickte sie uns eine Nachricht, in der sie erklärte, sie könne die Unterwerfung Yues direkt nebenan nicht dulden. Um eine Einigung zu erzielen, würde sie jedoch versprechen, unseren dort ansässigen Unternehmen und Bürgern nichts anzutun und ihnen das Recht zu gewähren, ihr Territorium bei Bedarf zu durchqueren. Wie sollten wir reagieren?"
chi.33.a:0 "Wir werden Verhandlungen zu dieser Angelegenheit aufnehmen."
chi.33.b:0 "Unsere Marine ist bereit."
chi.34.d:0 "Zhao Hengti und Chen Jiongming waren einst Verfechter einer föderalistischen Verfassung. Nach seiner Absetzung als Herrscher Hunnans durch Tang Shengzhi, der von Chiang Kai-shek unterstützt wurde, verließ Zhao jedoch Armee und Politik. Doch heute beschlossen die Generäle der Guangxi-Clique, Zhao Hengti zurückzurufen. Li Zongren und sein treuester General Bai Chongxi sahen dies als Verrat an. Die beiden Caudillos schickten daraufhin ihre Truppen, um Zhao und seine Unterstützer zu verhaften, was einen erneuten Bürgerkrieg in Südchina auslöste."
chi.34.a:0 "Wir werden niemals aufgeben!"
chi.35.d:0 "Heute haben wir eine Nachricht von den Föderierten Provinzen Chinas erhalten. Sie schlagen uns einen Deal vor: Wir würden uns ihrer Verwaltung anschließen und im Gegenzug eine autonome Region werden, nachdem sie die Regierung von Nanjing besiegt haben. Die versprochene Autonomie erscheint uns als ein attraktiver Preis, insbesondere angesichts der Pläne zur Wiedervereinigung von Nanjing und Yan&#39;an. Wie sollten wir reagieren?"
chi.35.a:0 "Scheint ein fairer Deal zu sein."
chi.35.b:0 "Danke, aber nein."
chi.36.d:0 "Die Föderierten Provinzen Chinas haben uns angeboten, ihrer Union beizutreten und den Status einer autonomen Region zu versprechen. In ihrer Botschaft erklärten sie auch, dass sie ihr Bestes tun würden, um die Nation friedlich wiederzuvereinigen. Sollten wir uns weigern, würden sie jedoch gezwungen sein, die Vereinigung mit Gewalt durchzuführen. Was sollten wir tun?"
chi.36.a:0 "Wir werden ihnen vertrauen."
chi.36.b:0 "Wenn sie unser Kapital wollen, müssen sie es sich nehmen."
chi.37.d:0 "Nachdem in China endlich die Demokratie Einzug gehalten hat, feierten Millionen Chinesen die zweite chinesische Wahl auf den Straßen! Nach stundenlanger, intensiver Stimmenauszählung wurde der Sieger bekannt gegeben:"
chi.37.a:0 "Weng Wenhao, der Geologe!"
chi.37.b:0 "Zhao Hengti, der föderalistische General!"
chi.38.d:0 "Heute hat uns die chinesische Regierung ein Abkommen unterbreitet: Die Schaffung einer autonomen, von China kontrollierten Region in unserem Vertragshafen, die unserem Heer und unserer Marine militärischen Zugang gewährt. Dies könnte von Vorteil sein, da China uns so beim Schutz unserer Häfen vor unseren Feinden unterstützen könnte. Andererseits könnte es aber auch nur ein Trick sein ... Wie sollten wir reagieren?"
chi.38.a:0 "Scheint ein fairer Vorschlag zu sein."
chi.38.b:0 "Sie werden es nicht wagen, es zu nehmen."
chi.39.d:0 "Nach der Niederlage im Föderalismus-Guangxi-Krieg überquerten Li Zongren, der alte Kriegsherr der Clique, und Bai Chongxi, sein treuester General, mit 12.000 erschöpften und schlecht ausgerüsteten Soldaten unsere Grenze. Long Yun beschloss, sie aufzunehmen und in die Armee zu integrieren, in der Hoffnung, dass sie keine Probleme verursachen würden."
chi.39.a:0 "Ein freier General ist ein freier General."
chi.40.d:0 "Heute traf sich Ryukichi Tanaka, ein japanischer Generalstabschef und Freund von Yan Xishan, mit ihm, um ihn zu einem antikommunistischen Bündnis mit Japan zu bewegen. Yan forderte alle japanischen Truppen zum Abzug aus Shanxi und eine hohe Geldsumme im Austausch für ein Bündnis, das sich ausschließlich gegen die kommunistische Regierung Chinas richten würde. Jetzt heißt es nur noch abwarten."
chi.40.a:0 "Vielleicht können wir etwas Gutes daraus ziehen."
chi.41.d:0 "Ryukichi Tanaka, einer unserer Stabschefs, der an der chinesischen Front in Shanxi kämpfte, kam mit einem Delegierten aus Yan Xishan zu uns und teilte uns mit, dass der General nach einem Treffen mit uns bereit sei, ein Bündnis mit uns einzugehen, im Austausch gegen eine Geldsumme und den Rückzug unserer Truppen aus seinem Gebiet. Auch wenn es den Anschein macht, als ob wir davon keinen Vorteil hätten, könnten wir, wenn wir uns nicht um die Verteidigung Mengkukuos vor den Chinesen kümmern müssten, einige unserer Truppen freisetzen und weitere Seeinvasionen vorbereiten. Der General scheint jedoch nicht sehr von unseren Absichten überzeugt zu sein und könnte seine Meinung bezüglich eines Anschlusses an uns ändern. Zum Wohle seines Volkes ist es jedoch wahrscheinlich, dass er uns im Falle eines Waffenstillstands mit uns nicht erneut angreifen würde. Wie sollten wir reagieren?"
chi.41.a:0 "Es ist das Geld wert."
chi.41.b:0 "Ein Waffenstillstand würde uns beiden nützen."
chi.41.c:0 "Wir verhandeln nicht mit Untergebenen."
chi.42.d:0 "Zu unserer Überraschung nahm die japanische Regierung unseren Vorschlag an, ihrer Fraktion beizutreten, und versicherte, dass sie den geforderten Betrag sofort zahlen würde. Yan Xishan scheint jedoch nicht überzeugt zu sein und hält das Ganze für eine Falle der Japaner, um die militärische Kontrolle über die Zone zu übernehmen. Wie sollten wir reagieren?"
chi.42.a:0 "Besser Schande als Tod."
chi.42.b:0 "Ein Waffenstillstand wird ausreichen."
chi.43.d:0 "Heute hat uns die Regierung von Shanxi um die Entsendung eines Generals gebeten, der ihre Streitkräfte befehligen soll, um die Qualität ihrer Armee zu verbessern. Einige Mitglieder unserer Regierung schlugen vor, Sadao Araki, den Anführer der Kodoha-Fraktion, zur Unterstützung zu entsenden, während andere Yoshijiro Umezu, ein Mitglied der Toseiha-Fraktion, vorschlugen. Wir könnten die Entsendung jedoch auch einfach ablehnen."
chi.43.a:0 "Sadao Araki könnte ihnen helfen."
chi.43.b:0 "Yoshijiro Umezu wird großartige Arbeit leisten."
chi.43.c:0 "Glauben die, wir wären ein Gemischtwarenladen oder so etwas?"
chi.44.d:0 "Aufgrund der zunehmenden Konflikte zwischen der KPCh und Shanxi wurde heute eine Guerillatruppe nach Taiyuan entsandt, mit dem Ziel, Yan Xishan zu ermorden und die Kontrolle über die Region zu übernehmen. Glücklicherweise gelang ihnen dies nicht, doch sie provozierten einen groß angelegten Aufstand in ganz Shanxi unter dem Kommando von Zhou Enlai, der nach Yan Xishans Flucht nach Peking die Macht über die Clique übernahm. Nachdem sie ihre Niederlage erkannt hatten, flohen auch die verbliebenen Generäle nach Peking, wo sie sich vermutlich so schnell wie möglich den Truppen aus Nanjing anschließen würden."
chi.44.a:0 "Die Revolution war erfolgreich!"
chi.45.d:0 "Aufgrund der zunehmenden Konflikte zwischen der KPCh und Shanxi wurde heute eine Guerillatruppe nach Taiyuan entsandt, mit dem Ziel, Yan Xishan zu ermorden und die Kontrolle über die Region zu übernehmen. Glücklicherweise gelang ihnen dies nicht, doch sie provozierten einen groß angelegten Aufstand in ganz Shanxi unter dem Kommando von Zhou Enlai, der nach Yan Xishans Flucht nach Peking die Macht über die Clique übernahm. Nachdem sie ihre Niederlage erkannt hatten, flohen auch die verbliebenen Generäle nach Peking, um sich anschließend unseren Truppen in Nanjing anzuschließen."
chi.45.a:0 "Wir werden Ihre Häuser aus den Klauen der Kommunisten retten, koste es, was es wolle."
chi.46.d:0 "Wie beim ersten Putsch der russischen Guihua 1933 gegen Jin Shuren übernahm das Guihua-Kavalleriekorps die Kontrolle über das Land, um die Tyrannei von Sheng Shicai zu beenden. Nachdem sie die Hauptstadt erobert und die wenigen chinesischen Wachen, die den Palast bewachten, getötet hatten, nahmen sie Sheng Shicai gefangen und richteten ihn in den Straßen von Ürümqi hin. Schließlich ernannten sie Ma Shaowu, einen angesehenen General der Kuomintang, zum neuen Führer der Nation."
chi.46.a:0 "Wird dies eine zweite russische Intervention in Xinjiang provozieren?"
chi.47.d:0 "Heute hat die Regierung von Sinkiang im Zuge ihrer neuen antikommunistischen Haltung unsere Berater verhaftet. Eine Invasion mag einfach erscheinen, doch unsere Armee ist derzeit nicht gut ausgerüstet, und unsere Bevölkerung würde eine weitere Pattsituation wie bei unserer Intervention in der Region 1934 nicht ertragen. Wie sollen wir reagieren?"
chi.47.a:0 "Lass uns das schnell erledigen."
chi.47.b:0 "Legen Sie einfach einen diplomatischen Protest ein."
chi.48.d:0 "Heute hat Ma Shaowu unserer Regierung einen interessanten Vorschlag unterbreitet: die Vereinigung unserer Verwaltungen und Streitkräfte. Auch wenn es den Anschein macht, als hätte diese Maßnahme keine Nachteile, wäre es für uns vielleicht besser, sie als Vasallen zu betrachten, statt als Brüder ..."
chi.48.a:0 "Gemeinsam sind wir stärker."
chi.48.b:0 "Wir haben andere Pläne für Xinjiang …"
chi.49.d:0 "Heute hat die Ma-Clique unserer Regierung einen interessanten Vorschlag unterbreitet: die Vereinigung unserer Verwaltungen und Streitkräfte. Dies würde uns zwar Schutz vor Moskau bieten, würde aber bedeuten, unsere Unabhängigkeit zu opfern."
chi.49.a:0 "Gemeinsam sind wir stärker."
chi.49.b:0 "Wir schätzen unsere Freiheit."
chi.50.d:0 "Anfang dieser Woche traf Prinz Mehmed Abdülkerim Efendi aus dem osmanischen Hause Sinkiang ein, um die Macht zu übernehmen, nachdem er vom Guihua-Korps zum neuen Führer ernannt worden war. Einige Regierungsvertreter schlugen vor, unsere Nationen zu vereinen, um uns stärker zu machen und uns besser gegen die Russen verteidigen zu können. Diese Strategie würde uns offensichtlich einen Teil unserer Autonomie kosten. Die Entscheidung liegt weiterhin beim König: Sollen wir uns dem neuen Osmanischen Reich anschließen?"
chi.50.a:0 "Hoffen wir, dass es nicht wieder zusammenbricht."
chi.50.b:0 "Was für eine dumme Idee."
chi.51.d:0 "Die afghanische Regierung gratulierte uns zur Krönung von Mehmed Abdülkerim Efendi und schlug zur Feier des Tages eine Union unserer beiden Nationen vor. Die Menschen waren von diesem Vorschlag überrascht, doch der Sultan und das Guihua-Korps entschieden, dass eine solche Union für beide Seiten von Vorteil wäre."
chi.51.a:0 "Das Osmanische Reich wird stärker!"
chi.52.d:0 "Heute hat die Regierung von Sinkiang, heute bekannt als Osmanisches Reich, im Zuge ihrer neuen antikommunistischen Haltung unsere Berater hingerichtet. Unser Volk fordert unsere Regierung nachdrücklich auf, die Osmanen zu bestrafen, und würde sie nicht beleidigen, würde dies sicherlich erzürnen. Dennoch liegt die Entscheidung weiterhin in den Händen unseres großen Führers."
chi.52.a:0 "Sie werden es bereuen, jemals existiert zu haben!"
chi.52.b:0 "Was würden wir davon haben, ein paar Berge in einer Wüste zu erobern?"
chi.53.d:0 "Heute traf eine Delegation der russischen Regierung Sinkiangs in unserem Land ein und überbrachte uns eine Nachricht, die wir geheim halten sollten. Weiße Guerillas bereiten derzeit einen Putsch in Ostrussland vor und wollen alle Staaten zwischen Kamtschatka und Krasnojarsk unter ihre Kontrolle bringen. Sie laden uns ein, uns in ihrem Krieg gegen Moskau zu unterstützen, sobald der Aufstand ausbricht. Sie teilten uns jedoch mit, dass die Revolution noch in Vorbereitung sei, sie würden uns aber 120 Tage vor Beginn des Putsches informieren."
chi.53.a:0 "Wir werden ihr Angebot berücksichtigen."
chi.54.d:0 "Der Zweite Russische Bürgerkrieg begann, nachdem im Exil lebende Weißrussen und japanische Attachés einen Aufstand in Ostrussland entfacht hatten. Da unser Land derzeit von den weißen Streitkräften nahezu eingekesselt ist, hat unsere Regierung die Bündnisse mit Moskau gebrochen, um unsere Unabhängigkeit zu wahren und den Verlust mongolischer Leben in einem Kampf zu verhindern, der uns nicht nützt. Einige sahen darin jedoch eine Gelegenheit, Tannu Tuva zu besetzen, während andere befürchten, dies würde die Sowjets nur verärgern und sie zu einer Invasion unseres Landes provozieren."
chi.54.a:0 "Niemand wird bemerken, dass es weg ist."
chi.54.b:0 "Lassen Sie uns in diesem Konflikt keine Partei ergreifen."
chi.55.d:0 "Heute erhielten wir eine Nachricht der weißrussischen Regierung in Sinkiang. Sie erinnerte uns daran, dass sie in genau 120 Tagen mit dem Aufstand beginnen wird und unsere Unterstützung sehr begrüßen würde. Ihnen zu helfen, könnte uns letztendlich zugutekommen, die neu eingesetzte russische Regierung künftig eher zur Zusammenarbeit mit uns bereit machen und uns eine zuverlässige Ölversorgung sichern. Doch nichts garantiert unseren Sieg in diesem Krieg, und höchstwahrscheinlich wird uns die russische Regierung in Sinkiang außer Sachalin keine Gebiete überlassen, es sei denn, wir finden einen Weg, sie dazu zu bewegen."
chi.55.a:0 "Moskau wird nicht so viel Glück haben wie 1922!"
chi.55.b:0 "Es ist die Verluste nicht wert."
chi.56.d:0 "Die japanische Regierung hat sich bereit erklärt, uns in unserem Kampf gegen die Regierung in Moskau zu unterstützen. Diesmal werden wir nicht fallen!"
chi.56.a:0 "Petrograd soll wieder uns gehören!"
chi.57.d:0 "Die japanische Regierung hat unsere Aufforderung, uns in unserem Kampf gegen die Moskauer Regierung zu unterstützen, ignoriert. Dies wird uns jedoch nicht davon abhalten, unser Heimatland zurückzuerobern."
chi.57.a:0 "Wir müssen das alleine schaffen."
chi.58.d:0 "Jetzt, da der Krieg mit der Regierung in Moskau beendet ist, ist es an der Zeit, von Russland die verdiente Entschädigung für unsere Unterstützung im Zweiten Russischen Bürgerkrieg zu fordern. Die Frage ist jedoch: Was sollten wir von den Russen verlangen?"
chi.58.a:0 "Wir verdienen es, Ostrussland zu halten!"
chi.58.b:0 "Die Kriegsentschädigungen werden ausreichen."
chi.59.d:0 "Heute haben wir eine Nachricht aus Japan erhalten, in der wir aufgefordert werden, ihnen die Kontrolle über die Staaten des Fernen Ostens zu übertragen, als Gegenleistung für die Unterstützung, die sie uns im Zweiten Russischen Bürgerkrieg gewährt haben. Wir sind höchstwahrscheinlich nicht stark genug, um ihre Armee, Luftwaffe und Marine zu besiegen, und wir sind nicht in der Lage, einen weiteren Krieg in Sibirien zu führen. Doch die Menschen im Stich zu lassen, die im Bürgerkrieg für uns gekämpft haben, würde unsere Bevölkerung sicherlich verärgern und ihre Unterstützung für unsere Regierung verringern."
chi.59.a:0 "Wir haben keine Wahl ..."
chi.59.b:0 "Vielleicht würden sie eine andere Alternative akzeptieren."
chi.59.c:0 "Wir werden unser Volk bis zum Ende verteidigen!"
chi.60.d:0 "Heute haben wir eine Nachricht aus Japan erhalten, in der wir als Gegenleistung für unsere Unterstützung im Zweiten Russischen Bürgerkrieg zur Zahlung von Reparationen aufgefordert werden. Unsere Wirtschaft befindet sich derzeit in einer schwierigen Lage, doch Japan droht uns mit einer Kriegserklärung, sollten wir uns weigern. Wir sind höchstwahrscheinlich nicht stark genug, um die Armee, Luftwaffe und Marine Japans zu besiegen, und wir sind nicht in der Lage, einen weiteren Krieg in Sibirien zu führen."
chi.60.a:0 "Nun ja, es könnte schlimmer sein ..."
chi.60.b:0 "Machen sie Witze?"
chi.61.d:0 "Die russische Regierung antwortete auf unser Ultimatum mit einem interessanten Vorschlag: der Schaffung eines Pufferstaates im Fernen Osten. Dieses neu geschaffene Land wäre de jure eine autonome Region Russlands, würde aber größtenteils als völlig unabhängiger Staat funktionieren. Wir und die Russen hätten militärischen Zugriff darauf und würden seine Unabhängigkeit im Falle eines Angriffs eines anderen Landes oder eines unserer eigenen Länder garantieren."
chi.61.a:0 "Fair genug."
chi.61.b:0 "Das ist eine Beleidigung für unsere Nation! Banzai!"
chi.62.d:0 "Da die Moskauer Regierung keine Bedrohung mehr darstellt, ist es an der Zeit, den Zaren in Russland wiederherzustellen. Doch nach der Ermordung der Familie von Nikolaus II. im russischen Bürgerkrieg erhoben viele Romanows Anspruch auf den Thron. Nun stehen wir vor der Wahl: Sollen wir den Admiral Kyrill Romanow oder den Kavallerieführer Dmitri Romanow krönen?"
chi.62.a:0 "Kyril Romanow, der Admiral!"
chi.62.b:0  "Dmitri Romanow, der Dragoner!"
chi.63.d:0 "Nachdem wir nun die Kontrolle über Stalingrad übernommen haben, ist es an der Zeit, den Namen in einen Namen zu ändern, der eher unserer derzeitigen Regierung entspricht."
chi.63.a:0 "Zarizyn, wie in alten Zeiten."
chi.63.b:0 "Zur Abwechslung mal Wolgograd."
chi.63.c:0 "Vrangelgrad, zu Ehren von Wrangel, dem schwarzen Baron."
chi.64.d:0 "Nachdem wir nun die Kontrolle über Leningrad übernommen haben, ist es an der Zeit, den Namen der Stadt in einen Namen zu ändern, der eher unserer derzeitigen Regierung entspricht."
chi.64.a:0 "Sankt Petersburg, wie Peter der Große es wollte."
chi.64.b:0 "Petrograd, wir sind keine Deutschen."
chi.64.c:0 "Denikingrad, zu Ehren Denikins, eines der Retter Russlands!"
chi.65.d:0 "Da wir nun die Kontrolle über Russland haben, sollten wir uns Gedanken darüber machen, wo wir unsere Hauptstadt errichten."
chi.65.a:0 "Der Norden, wie zu Zeiten des Imperiums."
chi.65.b:0 "Das Zentrum aufgrund seiner immensen Bevölkerung."
chi.65.c:0 "Der Süden, geschützt durch Wälder und Flüsse."
chi.66.d:0 "Heute, ein Jahr nach seiner Krönung, ist Zar Kyrill Romanow verstorben und hat seinen Sohn Wladimir Romanow als neues Staatsoberhaupt Russlands zurückgelassen."
chi.66.a:0 "Es lebe der Zar!"
chi.67.d:0 "Heute ist die russische Regierung an uns herangetreten und hat uns im Austausch für umfangreiche Investitionen vorgeschlagen, uns ihrer Einflusssphäre anzuschließen. Die Wirtschaft unseres Landes ist derzeit nicht rosig, und eine Ablehnung könnte sie leicht verärgern. Aber ist es das wert, unsere hart erkämpfte Unabhängigkeit zu opfern?"
chi.67.a:0 "Wir haben keine andere Wahl, oder?"
chi.67.b:0 "Unsere Freiheit ist wichtiger."
chi.68.d:0 "Heute hat die russisch-xinjiangische Eisenbahnbaumission die Straße Alma-ata-Gansu fertiggestellt und damit unsere Infrastruktur in der Region erheblich verbessert."
chi.68.a:0 "Wie nett von ihnen!"
chi.69.desc:0 "Nachdem in China endlich die Demokratie Einzug gehalten hat, feierten Millionen Chinesen die zweite chinesische Wahl auf den Straßen! Nach stundenlanger, intensiver Stimmenauszählung wurde der Sieger bekannt gegeben:"
chi.69.a:0 "Weng Wenhao, der Geologe!"
chi.69.b:0 "Chiang Kai-shek, der Retter Chinas!"
chi.69.c:0 "Zhang Junmai, der aufgeklärte Sozialist!"
chi.69.d:0 "Tse-ven Soong, der aufgeklärte Ökonom!"
chi.69.e:0 "Wang Jingwei, der linke Nationalist!"
chi.69.f:0 "Soong Ching-ling, die sozialistische Madame Sun!"
chi.69.b2:0 "Chiang Kai-shek, der Generalissimus!"
chi.69.b3:0 "Chiang Kai-shek, Kommandant der Nordexpedition!"
chi.69.b4:0 "Kennen Sie einen Mann namens Jiang Jieshi?"
chi.70.desc:0 "Jetzt, da in China endlich eine Ära des Friedens angebrochen ist, ist es vielleicht an der Zeit, eine neue Flagge für die Nation auszuwählen."
chi.70.a:0 "Wir werden die Flagge der Republik von 1912 verwenden."
chi.70.b:0 "Die Kuomintang hat China gerettet, deshalb sollten wir ihre Flagge verwenden."
chi.70.c:0 "Eine Kombination aus der Flagge von 1912 und der Kuomintang ist die beste Option."
chi.70.d:0 "Die Kuominjun in Wuchang begann den ersten Kampf für die Demokratie. Wir werden ihre Flagge verwenden."
chi.70.b2:0 "Weiße Sonne, blauer Himmel, rote Erde! Die Flagge der Kuomintang ist die richtige Wahl!"
chi.70.b3:0 "Wie können Sie es überhaupt wagen, eine Änderung unserer Flagge vorzuschlagen?"
chi.71.desc:0 "Nachdem in China endlich Frieden eingekehrt ist, feierten Millionen Chinesen die zweite chinesische Wahl auf den Straßen! Nach stundenlanger intensiver Stimmenauszählung wurde der Gewinner bekannt gegeben:"
chi.71.a:0 "Zhang Lan, der Sozialdemokrat!"
chi.71.b:0 "Zhang Junmai, der aufgeklärte Sozialist!"
chi.71.c:0 "Wang Jingwei, der linke Nationalist!"
chi.71.d:0 "Soong Ching-ling, die sozialistische Madame Sun!"
chi.72.d:0 "Die Kuomintang flohen nach ihrer Niederlage gegen die Kommunisten im chinesischen Bürgerkrieg auf die Insel Taiwan, auch Formosa genannt. Nun wenden sie sich an uns und bitten um unsere Unterstützung im Falle einer Invasion der Roten. Wie sollen wir reagieren?"
chi.72.a:0 "Taiwan ist das legitime China."
chi.72.b:0 "Wir haben wichtigere Angelegenheiten zu erledigen."
chi.73.d:0 "Nach dem Terroranschlag in Nanking, der Chiang Kai-shek das Leben kostete und Wang Jingwei ins Koma versetzte, sollte Dai Li, der Chef der Geheimpolizei und des Geheimdienstes, zum Staatsoberhaupt ernannt werden, als Wang zu sich kam. \n\nEine Krankenschwester sagte, die ersten Worte des Premierministers seien „Das werde ich tun, Sun Yat Sen“, obwohl Wang dies nicht bestätigt hat. \n\nNach seiner Entlassung wurde der Premierminister zum Staatsoberhaupt ernannt und hielt eine Rede, in der er erklärte, er werde China im Gegensatz zur korrupten Regierung Chiangs den drei Prinzipien des Volkes folgen lassen."
chi.73.a:0 "Der Traum von Sun Yat Sen wird wahr!"
chi.75.d:0 "Wir haben eine Nachricht aus China erhalten, in der ein Nichtangriffspakt zwischen unseren Ländern vorgeschlagen wird. Im Gegenzug hat uns der chinesische Premierminister Wang Jingwei die Kontrolle über zahlreiche Häfen des Landes sowie günstige Handelsbedingungen für unsere Unternehmen versprochen. Wie sollen wir reagieren?"
chi.75.a:0 "Es mag uns für den Moment sättigen ..."
chi.75.b:0 "Für China haben wir andere Pläne."
chi.76.d:0 "Wang Jingwei saß vor seinem Schreibtisch in Wuhan. Seine Beine zitterten vor Nervosität, während im Radio „San Nien“ von Li Xiang Lan lief. \n\nEr sprang von seinem Platz auf, als er hörte, wie jemand die Tür öffnete. „Premierminister Wang“, sagte der neue Offizier und salutierte militärisch, worauf der Premier mit einem weit weniger enthusiastischen Salut antwortete. „Die Japaner haben unseren Vorschlag angenommen. Unsere Armeen haben bereits begonnen, die besetzten Häfen zu verlassen, und die Zölle für japanische Unternehmen wurden bereits gesenkt.“ Wang seufzte. „Danke für den Bericht. Sie können jetzt gehen“, sagte er mit einem Lächeln im Gesicht. \n\n„Es tut mir leid. Aber es war die einzige Möglichkeit, China zu retten“, sagte er zu sich selbst, als der Offizier gegangen war, während sein Lächeln zu einem Grinsen wurde."
chi.76.a:0 "Wir werden sie irgendwann befreien ..."
chi.77.d:0 "Wang Jingwei saß vor seinem Schreibtisch in Wuhan. Seine Beine zitterten vor Nervosität, während im Radio „San Nien“ von Li Xiang Lan lief. \n\nEr sprang von seinem Platz auf, als er hörte, wie jemand die Tür öffnete. „Premierminister Wang“, sagte der neue Offizier und salutierte militärisch, woraufhin der Premierminister mit einem weit weniger enthusiastischen Salut antwortete. „Die Japaner haben unseren Vorschlag abgelehnt“, wollte er gerade weiterreden, als der Premierminister ihm befahl zu gehen. Er nahm den Befehl an. Nachdem er die Tür hinter sich geschlossen hatte, hörte er, wie eine Glastasse auf den Boden fiel und zerbrach. Dann hörte er den Premierminister Gotteslästerungen schreien, während im Radio ein entferntes, ruhiges Lied ertönte."
chi.77.a:0 "..."
chi.78.d:0 "Nachdem Ministerpräsident Wang Jingwei nun die Kontrolle über das Land übernommen hat, bleibt nur noch eine Frage offen: Wird der ehemalige Führer der linken Kuomintang den Lehren seines Freundes Sun Yat Sen folgen oder wird er sich seinen neuen faschistischen Sympathien zuwenden?"
chi.78.a:0 "Sun Yat Sens Traum wird wahr."
chi.78.b:0 "Der Traum von Sun Yat Sen ist nicht mehr als eine Fantasie."
chi.79.d:0 "[From.GetLeader] hat vorgeschlagen, unsere Regierungen zu vereinen, um im nächsten chinesischen Bürgerkrieg bessere Chancen zu haben, die Regierung von Nanjing zu besiegen. Er behauptet jedoch, dass aufgrund seiner Verbindungen zur Sowjetunion und der Nähe von [From.Capital.GetName] zu diesem Land diese neue Union von ihnen geführt werden müsse. Wie sollen wir reagieren?"
chi.79.a:0 "Mit ihrer Hilfe werden wir alle Arbeiter in China befreien!"
chi.79.b:0 "Wir haben unseren eigenen Weg zum Kommunismus."
#chi.80.d:0 "Following the opium supression campaign carried out by the Kuomintang and Li Zongren, as well as the new policy towards bandits, triads became being more aggressive towards the armed forces of Guangxi, until one day, it happened. \n\nLi Zongren and Bai Chongxi were shot to death by a gang of youngsters after Li's car was stopped in the mid of the road by the vehicles of the triads. The generals' guards acted quickly, but they were not able to catch all the aggressors, and those who were caught, were either in the edge of death due to their injuries, or commited suicide by the use of cyanide. \n\nSimilar attacks have occurred in other regions of the clique, which almost confirms that this wasn't just some unplanned reprisal."
#chi.80.a:0 "What's going to be of clique now...?"
#chi.81.d:0 "Following the opium supression campaign carried out by the Kuomintang and Li Zongren, as well as the new policy towards bandits, triads became being more aggressive towards the armed forces of Guangxi, until one day, it happened. \n\nLi Zongren and Bai Chongxi were shot by a gang of youngsters after Li's car was stopped in the mid of the road by the vehicles of the triads. \n\nNow the two major figures of Guangxi have died, and reports state that many zones of the clique have fell into anarchy. Some of our generals recommend taking action to integrate the clique under our management, but the decisions remains on [CHI.GetLeader]'s hands."
#chi.81.a:0 "We'll be glad to restore order for them."
#chi.81.b:0 "We have other matters to attend now."
chi.80.d:0 "Aus der Provinz Hunan sind Berichte in Nanjing eingetroffen, denen zufolge Truppen der Guangxi-Clique unsere Grenze in einen besetzten Teil der Region überschritten haben. Chiang Kai-Shek und Li Zongren befinden sich erneut im Krieg, genau wie im Ersten und Zweiten Chiang-Gui-Krieg und im Zentralebenenkrieg. \n\nUnsere Generäle haben dem Generalissimus bereits geraten, eine Offensive in Guangdong zu starten, einer Region, in der die Unterstützung für Chiangs Regierung angeblich am größten ist."
chi.80.a:0 "Wir werden ihnen eine Lektion erteilen."
vin.1.desc:0 "Le Travail ist eine sozialistische Zeitung in französischer Sprache, die seit diesem Monat von Schülern des Lycée Albert Sarraut in Hanoi, Vietnam, herausgegeben wird. Die Zeitung mit dem Titel „Le Travail“ weist starke kommunistische und antifranzösische Elemente auf. In der Regierung fordern Stimmen, ihr Erscheinen einzustellen. Die Entscheidung darüber liegt jedoch weiterhin beim Präsidenten."
vin.1.a:0 "Verbieten Sie die Zeitung sofort!"
vin.1.b:0 "Es ist nur ein Stück Papier, wen kümmert&#39;s."
vin.1.c:0 "Erhöhen wir ihre Autonomie, damit sie eine Weile den Mund halten."
vin.1.d:0 "Mal sehen, ob diese Kommunisten aus dem Grab schreiben können!"
vin.2.d:0 "Heute gab Sam Bam, ein vietnamesischer Dorfvorsteher der Montagnards, bekannt, dass seine Tochter eine Python zur Welt gebracht habe. Die Montagnards haben die Bewirtschaftung ihres Landes eingestellt, da sie fälschlicherweise glaubten, diese Python sei der Python-Gott (Dieu Python), der gesandt wurde, um das zentrale Hochland Vietnams von allen Ausländern zu befreien. Nun haben die Montagnards begonnen, unsere Garnisonen anzugreifen, weil man ihnen „magisches Wasser“ gegeben hatte, das sie gegen französische Kugeln immun machen sollte. Das ist natürlich nicht wahr, aber wir müssen jetzt eine Entscheidung treffen."
vin.2.a:0 "Greifen Sie sofort an! Wenn sie Widerstand leisten, zögern Sie nicht zu schießen!"
vin.2.b:0 "„Magisches Wasser“? Wenn die so dumm sind, können die nicht mal ein Gewehr benutzen."
vin.3.d:0 "Aufgrund des Desinteresses der französischen Regierung an der Niederschlagung des vietnamesischen Aufstands gelang es religiösen Guerillas, ihre Macht in Vietnam zu festigen, indem sie Waffenlager plünderten und französische Garnisonslager niederbrannten. Es scheint, als gäbe es kein Zurück mehr, und die einzige Möglichkeit besteht nun darin, sie mit Gewalt zu besiegen."
vin.3.a:0 "Was werden sie tun? Uns Pythons zuwerfen?"
vin.3.b:0 "Für Vietnam: Wir werden gewinnen!"
vin.4.d:0 "Heute haben wir ein Ultimatum von unserer eigenen Kolonie Vietnam erhalten. Darin heißt es, wir hätten eine Woche Zeit, unsere Truppen aus Vietnam abzuziehen und das Land als unabhängige Nation anzuerkennen. Es ist absolut empörend, dass eine unserer Kolonien einen solchen Vorschlag macht, aber unsere Männer in den Kampf in einem Dschungel in Asien zu schicken, wird unser Volk höchstwahrscheinlich verärgern."
vin.4.a:0 "Das ist es nicht wert. Sie können ihre verdammte Unabhängigkeit haben."
vin.4.b:0 "Bis Weihnachten sind wir wieder da."
vin.5.d:0 "Heute erhielten wir eine Nachricht der vietnamesischen Regierung, in der sie erklärte, dass die Region Burma volle Souveränität genießen und nicht von einer ausländischen Macht besetzt werden dürfe. In dem Brief standen keine Drohungen, aber ihre Armee hat bereits begonnen, an unsere Grenzen zu mobilisieren."
vin.5.a:0 "Wir werden nicht wie diese britischen Imperialisten sein."
vin.5.b:0 "Wir können mit einigen Reisbauern verhandeln."
vin.6.d:0 "Burma wurde von seinem alten Oberherrn die Unabhängigkeit gewährt. Wir werden sie sofort in unsere Fraktion einladen."
vin.6.a:0 "Perfekt!"
vin.7.d:0 "Heute haben wir eine Nachricht aus Vietnam erhalten, in der uns freundlicherweise Schutz vor der Regierung in Nanjing angeboten wird. Der Schutz eines kleineren Landes mag demütigend erscheinen, aber Bündnisse sind im Kampf gegen unsere Feinde immer hilfreich."
vin.7.a:0 "Besser als nichts."
vin.7.b:0 "Wir brauchen ihre Hilfe nicht."
vin.8.d:0 "Heute haben wir eine Nachricht aus Vietnam erhalten, in der wir eine Allianz zur Bekämpfung von Faschismus und Kapitalismus anbieten. Dies könnte hilfreich sein, um eine neue Front gegen Japan und die chinesischen Kriegsherren zu eröffnen. Sich auf ein junges und unerfahrenes Land zu verlassen, ist jedoch möglicherweise keine gute Idee. Wie sollen wir reagieren?"
vin.8.a:0 "Die asiatischen Arbeiter müssen vereint bleiben!"
vin.8.b:0 "Ein Beistandsvertrag sollte ausreichen."
vin.8.c:0 "Wie könnten uns ein paar Reisbauern helfen?"
vin.9.d:0 "Nach der Ausrufung der konstitutionellen Monarchie in Vietnam sind Bao Dai und einige vietnamesische Vertreter in diplomatischer Mission nach Bangkok gekommen, um die Beziehungen zwischen unseren Ländern zu stärken. Sie haben ein Verteidigungsbündnis zwischen unseren Ländern vorgeschlagen, in dem wir die gegenseitige Unabhängigkeit garantieren, bei Bedarf militärischen Zugang gewähren und natürlich einen Nichtangriffspakt zwischen unseren Ländern schließen. Wie sollen wir reagieren?"
vin.9.a:0 "Wir nehmen ihren Vorschlag gerne an."
vin.9.b:0 "Wir werden davon nichts haben."
vin.10.d:0 "Siam hat unseren Vorschlag angenommen. Zwischen unseren Nationen wurde ein Verteidigungsbündnis unterzeichnet."
vin.10.a:0 "Sauber!"
vin.11.d:0 "Siam hat unseren Vorschlag eines Verteidigungsbündnisses leider abgelehnt."
vin.11.a:0 "Wir müssen das alleine machen."
vin.12.d:0 "Endlich wurden die ersten Wahlen in Vietnam durchgeführt! Nach einem ganzen Tag der Stimmenauszählung wurde der Gewinner bekannt gegeben:"
vin.12.a:0 "Phan Quang Đán, der sozialistische Republikaner!"
vin.12.b:0 "Ngô Đình Diêm, der antikommunistische Christ."
vin.13.d:0 "Heute begannen nationalistische Elemente in Tonkin einzumarschieren, ähnlich wie beim Marsch auf Rom und dem Münchner Putsch. Unter ihnen waren viele nationalistische Parteien, religiöse Sekten wie Cao Đài und sogar Cuong Đe, ein königlicher Verwandter der Nguyen-Dynastie und Revolutionär, der zusammen mit Phan Boi Châu versuchte, die französische Herrschaft in Indochina mit Hilfe der Japaner zu stürzen. Nach Erreichen des Königspalastes postierte sich die königliche Garde am Eingang und zielte auf die Randalierer. Als Reaktion darauf forderte die Menge Bao Đai auf, von der Macht zurückzutreten und die Krone an Cuong Đe zu übergeben. Dann..."
vin.13.a:0 "... mit einem Kloß im Hals befiehlt Seine Majestät der königlichen Wache, auf die Randalierer zu schießen."
vin.13.b:0 "... seine Majestät stimmt den Forderungen der Menge zu und überträgt die Macht an Cuong Đe."
vin.14.d:0 "Heute haben die Verhandlungen zwischen Ho Chi Minh und der Kommunistischen Partei begonnen. Sogar der König selbst nahm an dem Treffen teil, obwohl seine Berater ihn gebeten hatten, dies nicht zu tun. Nach stundenlangen Verhandlungen bat Ho Chi Minh den König, Mitgliedern der Kommunistischen Partei Sitze im aktuellen Parlament zu garantieren und nationalistische bzw. faschistische Politiker zu entlassen. Nach Rücksprache mit seinen Beratern war die Antwort des Königs eindeutig."
vin.14.a:0 "Wenn Vietnam auf diese Weise gerettet werden kann, wird Seine Majestät dem gerne zustimmen."
vin.14.b:0 "Es tut Seiner Majestät leid, aber es ist zu viel."
vin.15.d:0 "Heute wurde Ho Chi Minhs Leiche mit drei Schusswunden im Rücken gefunden. Regierung und Presse beteuern Selbstmord, während die Kommunistische Partei und die Guerilla die Verbannung Cuong Đes wegen Korruption und die Ermordung ihres Anführers fordern. Der Versuch, der Hydra den Kopf abzuschlagen, scheint schiefgegangen zu sein."
vin.15.a:0 "Wir werden sie trotzdem vernichten."
vin.16.d:0 "Nachdem in Vietnam die konstitutionelle Monarchie ausgerufen wurde, sind einige vietnamesische Vertreter in diplomatischer Mission nach Frankreich gekommen, um unsere Nationen zu versöhnen. Sie schlagen ein Handelsabkommen und einen Nichtangriffspakt zwischen unseren Ländern vor. Außerdem schlagen sie ein Abkommen vor, in dem wir ihre Unabhängigkeit garantieren und ihnen im Gegenzug im Bedarfsfall militärischen Zugriff auf unsere Truppen und unsere Marine gewähren. Wie sollen wir darauf reagieren?"
vin.16.a:0 "Wir nehmen ihren Vorschlag gerne an."
vin.16.b:0 "Wir verhandeln nicht mit Wilden."
vin.17.d:0 "Die Franzosen haben unseren Deal akzeptiert. Der Nichtangriffspakt und das Handelsabkommen wurden in Kraft gesetzt. Nun haben sie militärischen Zugang zu unserem Land und werden uns im Falle eines Angriffs von außen verteidigen."
vin.17.a:0 "Perfekt"
vin.18.d:0 "Frankreich hat sich geweigert, unser Land als unabhängigen Staat anzuerkennen. Unsere Vertreter werden heute nach Hause reisen."
vin.18.a:0 "Wie kindisch."
hun.1.d:0 "Nachdem Österreich-Ungarn die Wiedervereinigung seines alten Reiches anstrebt, richtet es seine Aufmerksamkeit nun auf Galizien und fordert sogar die Kontrolle über die Region. Normalerweise würden wir uns weigern, doch jetzt, da Deutschland und Russland Pläne für einen Angriff auf unser Land schmieden, dürfen wir 1795 nicht noch einmal zulassen. Vielleicht wäre es besser, einige unserer polnischen Landsleute als autonome Region des österreichisch-ungarischen Reiches leben zu lassen, anstatt sie als Sklaven Deutschlands und Russlands zu missbrauchen."
hun.1.a:0 "Besser sie als unsere Feinde."
hun.1.b:0 "Wir lassen niemanden im Stich."
hun.2.d:0 "Die Polen haben beschlossen, uns die Kontrolle über Galizien zu überlassen, um ein Blutvergießen in ihrem Land zu verhindern."
hun.2.a:0 "Sie haben die richtige Option gewählt."
hun.3.d:0 "Die Polen haben sich geweigert, uns die Kontrolle über Galizien zu überlassen. Leider sind wir gezwungen, es mit Gewalt an uns zu nehmen."
hun.3.a:0 "Nichts Persönliches, Polen."
hun.4.d:0 "Die österreichisch-ungarische Regierung hat uns einen Vorschlag unterbreitet. Sie bietet die Rückgabe Siebenbürgens und Schutz vor den Sowjets an, wenn wir im Gegenzug ihrer Union als halbunabhängiger Staat beitreten. Viele in unserer Regierung sind jedoch der Meinung, dass es besser wäre, zu versuchen, Siebenbürgen mit Gewalt zurückzuerobern, auch wenn es unwahrscheinlich ist, dass wir ihre Union besiegen können."
hun.4.a:0 "Es lohnt sich..."
hun.4.b:0 "Wie demütigend."
hun.5.d:0 "Die österreichisch-ungarische Regierung hat uns einen Vorschlag unterbreitet. Sie bietet uns an, ihrer Union als halbunabhängiger Staat beizutreten. Dies würde uns den Vorteil eines starken Bündnisses verschaffen und vielleicht sogar unsere Wirtschaft verbessern. Mit etwas Glück könnten wir sogar die Kontrolle über einige der von uns beanspruchten Staaten zurückerlangen."
hun.5.a:0 "Es lohnt sich..."
hun.5.b:0 "Wie demütigend."
hun.7.d:0 "Die ungarische Regierung hat uns heute einen Vorschlag zur Lösung ihrer Ansprüche auf die Südslowakei unterbreitet. Sie erklärt, es sei für sie unmöglich, die Ungarn unter fremder Herrschaft leben zu lassen, sei sich jedoch der Bedeutung der Region aufgrund ihrer Eisen- und Chromminen bewusst. Daher schlägt sie einen Deal vor, bei dem wir ihnen die Kontrolle über die Region übertragen, die Kontrolle über die Minen aber für 99 Jahre behalten oder bis wir freiwillig darauf verzichten."
hun.7.a:0 "Klingt nach einem fairen Deal."
hun.7.b:0 "Wir werden nicht zulassen, dass ausländische Mächte unsere Gebiete stehlen."
hon.8.d:0 "Die ungarische Regierung hat uns heute einen Vorschlag zur Lösung ihrer Ansprüche auf die Vojvodina unterbreitet. Sie erklärt, es sei für sie unmöglich, die Ungarn unter einer fremden Macht leben zu lassen, sei sich jedoch der Bedeutung der Region aufgrund ihrer industriellen Leistungsfähigkeit bewusst. Daher schlägt sie vor, als Ausgleich für die Übergabe der Region die jugoslawische Wirtschaft dort wie gewohnt weiterlaufen zu lassen und ihre Entwicklung zu fördern."
hun.9.d:0 "Die ungarische Regierung hat uns heute einen Vorschlag zur Lösung ihrer Ansprüche auf das Szeklerland unterbreitet. Sie erklärt, es sei für sie unmöglich, die Ungarn unter fremder Herrschaft leben zu lassen, sei sich jedoch der Bedeutung der Region aufgrund ihrer strategischen Lage und ihres historischen Wertes bewusst. Daher schlägt sie vor, dem Szeklerland eine begrenzte Autonomie unter ihrer Kontrolle zu gewähren und uns das Recht einzuräumen, unsere Armeen bei Bedarf durch dieses Gebiet zu bewegen."
hun.10.d:0 "Der Vertrag über das Szeklerland wurde unterzeichnet. Dem Szeklerland wurde nun eine begrenzte Unabhängigkeit unter unserem Kommando gewährt."
hun.10.a:0 "Perfekt!"
hun.11.d:0 "Der Szeklerland-Deal wurde abgelehnt. Unsere Armee wird sich auf den Krieg vorbereiten."
hun.11.a:0 "Dann werden wir sie mit Gewalt befreien."
hun.12.d:0 "[HUN.GetLeader] ist mit einem Vorschlag nach Moskau gereist, [YUG.GetNameDef] eine gemeinsame Garantie anzubieten, im Gegenzug für die Aufhebung der Beschränkungen für die Kommunistische Partei und die Übertragung der Souveränität Sloweniens, Kroatiens und Dalmatiens an Ungarn."
hun.12.a:0 "Wenn es unseren Verbündeten stärker macht, werden wir es tun."
hun.12.b:0 "Was hätten wir davon?"
hun.13.d:0 "Die Botschafter von [HUN.GetNameDef] und [SOV.GetNameDef] haben uns mit einem gemeinsamen Angebot kontaktiert, unsere Grenzen gegen jegliche feindliche Aggression zu schützen. Im Gegenzug müssten wir den Kommunisten Regierungssitze garantieren und die Kontrolle über Slowenien, Kroatien und Dalmatien an Ungarn übertragen."
hun.13.a:0 "Wir werden die kroatischen Guerillas los und bekommen einen neuen Verbündeten. Ein demütigender, aber günstiger Deal."
hun.13.b:0 "Sind sie betrunken?"
hun.14.d:0 "Am Tag nach der Kriegserklärung des Deutschen Reiches an unser Kaiserreich hielt Otto von Habsburg eine Radioansprache. Die Rede wurde zunächst auf Deutsch, dann auf Ungarisch und schließlich auf rauhem Tschechisch gehalten. Darin forderte der König alle Völker Österreich-Ungarns auf, ihre Nation gegen die faschistische Aggression zu verteidigen. \n\n„Wir werden bis zum Ende weitermachen. Wir werden in Tirol kämpfen, wir werden im Sudetenland und in Böhmen kämpfen, wir werden mit wachsendem Selbstvertrauen und wachsender Stärke in der Luft kämpfen, wir werden unsere Familien verteidigen, koste es, was es wolle. Wir werden in Ungarn kämpfen, wir werden in Österreich kämpfen, wir werden in Tschechien und der Slowakei kämpfen, wir werden in Österreich-Ungarn kämpfen; wir werden niemals kapitulieren!“"
hun.14.a:0 "Es lebe der König! Es lebe das Reich!"
hun.15.d:0 "Obwohl Ungarn derzeit mit [hungary_former_ally_target.GetNameDef] verbündet ist, haben Veränderungen innerhalb der [FROM.GetAdjective]-Regierung das Land stärker mit den Idealen von [ROOT.GetAdjective] in Einklang gebracht, und [FROM.GetLeader] hat Interesse an einem Beitritt zu [ROOT.GetFactionName] bekundet. Dies ist eine historische Gelegenheit, denn da der Feind [FROM.GetNameDef] den Rücken zukehrt, ist das Letzte, was er erwarten würde, dass [FROM.GetAdjective]-Truppen ihre Waffen gegen ihn richten."
hun.15.a:0 "Willkommen, [FROM.GetAdjective]-Freunde!"
hun.16.d:0 "Unglücklicherweise hat die [FROM.GetAdjective]-Außenministerin die Botschaft von [FROM.GetNameDef] übermittelt, die ohne Frage einen regelrechten Verrat an den Idealen von [ROOT.GetFactionName] und [ROOT.GetRulingIdeology] darstellt! [FROM.GetNameDefCap] hat erklärt, dass sie nun für [hungary_new_ally_target.GetFactionName] kämpfen wird."
hun.16.a:0 "Wir hätten wissen müssen, dass [FROM.GetLeader] nicht vertrauenswürdig ist!"
hun.17.d:0 "Wir wurden informiert, dass [hungary_new_ally_target.GetNameDef] unsere Aufnahmeanfrage in die [hungary_new_ally_target.GetFactionName] angenommen hat und [hungary_former_ally_target.GetLeader] bald lernen wird, wie ein echter [ROOT.GetAdjective]-Soldat kämpft."
hun.17.a:0 "Zu den Waffen!"
hun.18.d:0 "Ungarn sucht einen neuen Monarchen, und es ist an der Zeit, ihn zu wählen. Es gibt zwei Kandidaten, die unserer aktuellen Rhetorik entsprechen. Auf der einen Seite steht Friedrich Franz von Mecklenburg-Schwerin, ein deutscher Nazi und SS-Mitglied, auf der anderen Seite Adriano Visconti di Lampugnano, ein berühmter italienischer Flieger, dem Gerüchte zufolge ein entschiedener Gegner des Nationalsozialismus war. Wer sollte also auf den ungarischen Thron gewählt werden?"
hun.18.a:0 "Friedrich Franz ist die richtige Wahl."
hun.18.b:0 "Adriano ist der richtige Mann für den Thron."
hun.19.d:0 "Ungarn sucht einen neuen Monarchen, und es ist an der Zeit, ihn zu wählen. Es gibt zwei Kandidaten, die unserer aktuellen Rhetorik entsprechen. Auf der einen Seite steht Carl Wilhelm von Södermanland, ein schwedischer Schriftsteller, der für seine wissenschaftlichen Expeditionen bekannt ist, auf der anderen Seite Michael Hohenzollern-Sigmaringen, der Erbe des rumänischen Throns. Obwohl diese Wahl in der Bevölkerung unpopulär ist, könnte sie unsere Beziehungen zu Rumänien verbessern. Wer sollte also auf den ungarischen Thron gewählt werden?"
hun.19.a:0 "Carl Wilhelm ist die richtige Wahl."
hun.19.b:0 "Mihail ist der richtige Mann für den Thron."
hun.20.d:0 "Nachdem Mihail I. König von Ungarn und zugleich Fürst von Rumänien geworden ist, schlägt die ungarische Regierung eine Union unserer Nationen vor, ähnlich wie 1919, kurz nach dem Ersten Weltkrieg. Dies hätte viele Vorteile, wie etwa die Vermeidung ungarischer Revanchismen und eine näher an Westeuropa gelegene Grenze. Allerdings dürfte dies bei den Menschen beider Nationen auf wenig Zustimmung stoßen. Wie sollten wir auf diese Forderung reagieren?"
hun.20.a:0 "Lassen Sie uns diesbezüglich optimistisch sein."
hun.20.b:0 "Das ist eine dumme Idee."
ukr.1.d:0 "Nach dem Putsch der Verräter der kommunistischen Partei verschwanden viele unserer in der Ukraine stationierten NKWD-Mitglieder oder wurden tot aufgefunden. Kurz darauf erreichten uns Nachrichten über die „Ukrainische Befreiungsarmee“, die wichtige Städte der Region einnahm und anschließend die Unabhängigkeit der Ukraine erklärte. \n\nEs gibt sogar Gerüchte, dass Hetman Pawlo Skoropadskyi mit dem Zug aus Deutschland in die Ukraine reiste. So wie Lenin von den Deutschen geschickt wurde, um Russland zu destabilisieren, wurde nun der Hetman von ihnen geschickt, um die Sowjetunion zu destabilisieren."
ukr.1.a:0 "Wir werden sie vernichten, wie wir es 1921 getan haben."
ukr.1.b:0 "Für die Zukunft der Ukraine, vorwärts!"
ukr.2.d:0 "Nach einem Terroranschlag vor zwei Monaten, der dem Hetman das Leben kostete, scheiterten die verbliebenen antikommunistischen Generäle bei ihrer Mission, die vollständige Kontrolle über das Land zu übernehmen. Schließlich übernahmen heute anarchistische Milizen die Macht in Kiew. Gerüchten zufolge fliehen die tapferen ukrainischen Generäle, die für die Unabhängigkeit der Ukraine kämpften, aufgrund des zunehmenden Defätismus in ihren Armeen erneut ins Exil."
ukr.2.a:0 "Jetzt wird das Volk der Ukraine von allen Ketten befreit!"
ukr.3.d:0 "Nach einem Terroranschlag vor zwei Monaten, der dem Hetman das Leben kostete, scheiterten die verbliebenen antikommunistischen Generäle bei ihrer Mission, die vollständige Kontrolle über das Land zu übernehmen. Schließlich übernahmen heute kommunistische Milizen die Macht in Kiew. Gerüchten zufolge fliehen die tapferen ukrainischen Generäle, die für die Unabhängigkeit der Ukraine kämpften, aufgrund des zunehmenden Defätismus in ihren Armeen erneut ins Exil."
ukr.3.a:0 "Diesmal wird uns niemand besiegen!"
ukr.4.d:0 "Nach der Machtübernahme Kiews durch anarchistische und kommunistische Milizen gingen viele antikommunistische ukrainische Generäle erneut ins Exil. Die meisten dieser tapferen Helden, die für die Unabhängigkeit ihres Landes kämpften, sind nun in unser Land eingereist und haben sich unserer Armee angeschlossen, in der Hoffnung, eines Tages in eine freie Ukraine zurückkehren zu können."
ukr.4.a:0 "Wir nehmen diese gerne entgegen."
ukr.4.b:0 "Sie können Bürger unseres Landes sein, aber nicht mehr."
ukr.5.d:0 "Heute hat uns die ukrainische Regierung kontaktiert und uns einen Verteidigungspakt angeboten, in dem sich beide Seiten verpflichten, im Falle einer ausländischen Invasion einander zu helfen. Sie kündigte an, uns auch dann zu schützen, wenn wir den Vertrag nicht akzeptieren. Sie erklärte, sie wolle ihre Bruderstaaten verteidigen, wäre aber dankbar, wenn wir sie unterstützen würden."
ukr.5.a:0 "Es ist richtig, dies zu unterschreiben."
ukr.5.b:0 "Wir können nicht noch mehr Kriege führen."
ukr.6.d:0 "Unsere Delegation kehrte voller Freude in die Ukraine zurück, da unser Verteidigungspakt angenommen wurde."
ukr.6.a:0 "Eindrucksvoll!"
ukr.7.d:0 "Unsere Delegation ist mit leeren Händen aus der Ukraine zurückgekehrt, nachdem unser Verteidigungspakt abgelehnt wurde. Wir werden jedoch weiterhin unserer Pflicht nachkommen, die osteuropäischen Nationen vor Faschismus und Kommunismus zu verteidigen."
ukr.7.a:0 "Das ist verständlich."
ukr.8.d:0 "Heute hat uns die Ukraine ein Abkommen unterbreitet. Sie fordert einen Nichtangriffspakt mit ihr im Austausch für die Rückgabe der Region Bessarabien. Sie ist jedoch nicht bereit, die Bukowina oder Süd-Bessarabien zurückzugeben und erklärte, sie werde nicht darüber verhandeln."
ukr.8.a:0 "Genau wie 1918."
ukr.8.b:0 "Wir akzeptieren nur die vollständige Rückgabe Bessarabiens!"
ukr.9.d:0 "Rumänien hat unseren Deal akzeptiert. Wir haben Bessarabien zurückgegeben, und nun soll der Frieden zwischen unseren Nationen bestehen bleiben."
ukr.9.a:0 "Hoffentlich wird der Frieden zwischen unseren Nationen für immer bestehen!"
ukr.10.d:0 "Rumänien hat unser Abkommen abgelehnt und erklärt, dass es mit der Unterzeichnung des von uns vorgeschlagenen Abkommens nicht alle Rumänen in der Bukowina und Süd-Bessarabien im Stich lassen werde."
ukr.10.a:0 "Hoffen wir, dass sie nicht vorhaben, sie mit Gewalt zu befreien …"
ukr.11.d:0 "Heute haben wir eine Nachricht aus der Ukraine erhalten. Darin wird die Rückgabe der mehrheitlich russischen Gebiete des Landes im Austausch für einen Nichtangriffspakt zwischen unseren Ländern sowie die Verteidigung im Falle eines Angriffs vorgeschlagen. Es sieht so aus, als ob wir von diesem Deal kaum etwas hätten, aber nichts hindert uns daran, in die Gebiete einzumarschieren, sobald sie sich vor uns sicher fühlen."
ukr.11.a:0 "Wir werden sie später verfolgen ..."
ukr.11.b:0 "Dachten sie wirklich, wir würden annehmen?"
ukr.12.d:0 "Zur Überraschung unseres Präsidenten haben die Russen unserem Vorschlag zugestimmt. Es sieht so aus, als könnten wir ein paar Jahre lang in Frieden leben."
ukr.12.a:0 "Ein hoher Preis für die Erlösung ..."
ukr.13.d:0 "Russland hat auf unseren Brief nicht geantwortet. Ihr Schweigen ist eine klare Reaktion."
ukr.13.a:0 "Dann werden wir uns auf den Krieg vorbereiten."
ukr.14.d:0 "In der Ukraine ermittelnde Spione haben uns heute Nachmittag eine wichtige Nachricht übermittelt: Der neue ukrainische Präsident und seine Generäle haben beschlossen, eine irredentistische Kampagne zur Annexion aller von Ukrainern bewohnten Gebiete Osteuropas zu starten. Wie wir wissen, leben viele von ihnen derzeit innerhalb unserer Grenzen. In der Nachricht heißt es außerdem, dass ein etwaiger Angriff voraussichtlich in etwa 90 Tagen beginnen wird."
ukr.14.a:0 "Wie können sie es wagen!"
ukr.15.d:0 "Die ukrainische Regierung hat uns heute einen kurzen Brief geschickt und die Übertragung der Kontrolle über die Gebiete unseres Landes mit ukrainischer Bevölkerung gefordert. Sie sagt, unabhängig von unserer Antwort werde ihre Armee in die Zone einmarschieren, um das Wohlergehen der dort lebenden Ukrainer zu sichern. Was sollen wir tun?"
ukr.15.a:0 "Wir haben keine Wahl ..."
ukr.15.b:0 "Ukraine, du bist betrunken, geh nach Hause."
ukr.15.c:0 "Lass sie kommen, wenn sie sich trauen."
chl.1.d:0 "Heute kam es in Santiago zu einem Aufstand gegen die Führung von Präsident Arturo Alessandri, angeführt von Mitgliedern der Nationalsozialistischen Bewegung (Movimiento Nacional Socialista). Nach der Tötung eines Polizisten übernahmen die Randalierer die Kontrolle über das Gebäude der Arbeiterversicherung und stürmten eine Universität und einen Funkturm, von dem aus sie die Botschaft „Die Revolution hat begonnen!“ sendeten. Die Polizei traf mit Maschinengewehren, ausgebildeten Scharfschützen und einem Brief der Regierung ein, in dem es hieß: „Befehl unseres Generals und der Regierung: WIR MÜSSEN SIE ALLE TÖTEN“. \n\nStunden später traf die Armee mit Befehl des Präsidenten in Santiago ein. Die Nazis feierten, da sie dachten, die Armee sei gekommen, um ihre Sache zu unterstützen."
chl.1.a:0 "Doch sie irrten sich. Sie erhielten lediglich Artilleriegranaten."
chl.1.b:0 "Und sie hatten Recht. Die Armee zielte auf die Polizei und befahl ihnen, sich zu ergeben."
chl.2.d:0 "Die chilenische Regierung trat mit dem Vorschlag an uns heran, ein Verteidigungsbündnis zwischen unseren Nationen zu gründen. Das Hauptziel wäre, sich im Falle eines argentinischen Angriffs gegenseitig zu schützen und die argentinische Seite davon abzuhalten. Sollte dieses Bündnis jedoch öffentlich werden, würde dies die Argentinier sehr verärgern."
chl.2.a:0 "Ein günstiges Angebot."
chl.2.b:0 "Wir dürfen Argentinien nicht gegen uns aufbringen."
chl.3.d:0 "Unser Vorschlag für ein Militärbündnis wurde angenommen, jetzt brauchen wir nur noch den richtigen Moment zum Zuschlagen."
chl.3.a:0 "Alles nach Plan."
chl.4.d:0 "Unser Vorschlag für ein Militärbündnis wurde abgelehnt. Wir müssen uns allein vor Argentinien schützen."
chl.4.a:0 "Verräter!"
chl.5.d:0 "Heute erhielten wir einen Bericht aus unseren Garnisonen in Feuerland. Darin hieß es, sie hätten bemerkt, wie chilenische Truppen unsere Grenzen in der Region überschritten und einige ihrer Schiffe sich einigen unserer Inseln in der Zone näherten. Anstatt sich nach einer Warnung unserer Armee zurückzuziehen, weigerten sie sich, sich zurückzuziehen, und es kam zu Schießereien zwischen den Brigaden. 20 unserer tapferen Männer starben, die Zahl der chilenischen Opfer ist derzeit unbekannt. Wie sollen wir auf diesen Vorfall reagieren?"
chl.5.a:0 "Wenn sie Krieg wollen, werden sie Krieg bekommen."
chl.5.b:0 "Wir können uns derzeit keinen Krieg leisten. Legen Sie diplomatischen Protest ein."
chl.6.d:0 "Die chilenische Regierung trat an uns heran und schlug ein Verteidigungsbündnis zwischen unseren Nationen vor. Auf den ersten Blick scheint dies kein sinnvolles Abkommen zu sein, aber falls es jemals zu einem militärischen Konflikt mit Bolivien oder Argentinien kommen sollte, wäre ein Verbündeter mit einer gerüsteten Armee und Marine von Nutzen."
chl.6.a:0 "Könnte in Zukunft nützlich sein."
chl.6.b:0 "Wir wollen niemanden verärgern."
chl.7.d:0 "Unser Vorschlag für ein Militärbündnis wurde angenommen. Hoffentlich wird der Frieden zwischen unseren Nationen für immer bestehen!"
chl.7.a:0 "Es lebe Chile!"
chl.8.d:0 "Unser Vorschlag für ein Militärbündnis wurde abgelehnt. Vielleicht haben sie andere Pläne für unser Land."
chl.8.a:0 "Wir sollten unsere Grenzen vorsichtshalber verstärken."
chl.9.desc:0 "Heute fanden in Chile Präsidentschaftswahlen statt. Aufgrund des Popularitätsverlusts von Carlos Ibañez del Campo infolge eines Putsches seiner Koalition und der geringen Popularität der Partido Liberal nach der Niederschlagung des Aufstands durch Alessandri ging die Frente Popular als Sieger hervor! Der neue Präsident Chiles ist:"
chl.9.a:0 "Aguirre Cerda, der Sozialdemokrat!"
chl.9.b:0 "Marmaduke Grove, der sozialistische Admiral!"
chl.9.c:0 "Salvador Allende, der marxistische Mediziner!"
chl.9.d:0 "Vicente Huidobro, der kommunistische Dichter!"
chl.10.d:0 "Heute organisierten General Ariosto Herrera und Oberst Guillermo Hormazábal einen Staatsstreich gegen die mittlerweile linksgerichtete Regierung Chiles. Herrera, bekannt für seinen Antikommunismus, nahm Kontakt zu anderen Generälen auf, um deren Unterstützung gegen die Regierung zu gewinnen. In der Bevölkerung wird vermutet, dass dies alles von Ibañez del Campo inszeniert wurde. Dieser lebt derzeit im argentinischen Exil, nachdem die Nazi-Partei, die seine Kandidatur unterstützte, einen gescheiterten Staatsstreich gegen Arturo Alessandri durchgeführt hatte."
chl.10.a:0 "Doch aufgrund mangelnder Unterstützung scheiterte der Putsch."
chl.10.b:0 "Nachdem man sich die Unterstützung der Armee gesichert hatte, war der Putsch erfolgreich …"
chl.11.d:0 "Vertreter von [FROM.GetNameDef] haben unser Land besucht und sich mit vielen unserer Politiker getroffen, in der Hoffnung, Unterstützung für ihr Investitionsprogramm zu gewinnen. Die Regierung von [FROM.GetNameDef] möchte, dass wir unsere Ressourcen zur Verbesserung ihrer eigenen industriellen Kapazitäten und Produktion nutzen. [FROM.GetAdjective]-Beamte haben geschlussfolgert, dass wir durch die Unterstützung ihres Landes in Zukunft selbst mit Hilfe in Form eines Militärbündnisses zwischen unseren Nationen rechnen können."
chl.11.a:0 "Wenn sie Hilfe brauchen, dann sollen sie diese Hilfe bekommen."
chl.11.b:0 "Wir werden ihren faustischen Pakt nicht unterzeichnen."
chl.12.d:0 "Heute empfing uns eine Delegation aus Chile, heute Andesien, mit der Bitte, uns zu einer Föderation gegen den nordamerikanischen Imperialismus und Kapitalismus im Westen zusammenzuschließen. Sie scheinen verrückt geworden zu sein, doch einige unserer Politiker glauben, dass ein Beitritt zu ihnen unserem wirtschaftlichen Wachstum zugutekommen würde, auch wenn dies unser Volk verärgert..."
chl.12.a:0 "Wir müssen uns gegen die nordamerikanische Bedrohung zusammenschließen!"
chl.12.b:0 "Sie sind verrückt geworden."
chl.13.d:0 "\nChile trauert. \n\nDer Präsident der Armen, Pedro Aguirre Cerda, ist an den Folgen seiner sich verschlimmernden Tuberkulose verstorben. \n\nEr blieb seiner Pflicht gegenüber dem chilenischen Volk und der Nation bis zuletzt treu. Tausende Trauernde erwiesen ihrem ehemaligen Präsidenten die letzte Ehre, bevor sein Leichnam in einer Kutsche des Tacna-Regiments zum Kongressgebäude und anschließend zur Kathedrale von Santiago überführt wurde. Dort fand sein Staatsbegräbnis im Beisein des gesamten Parlaments und Würdenträgern aus dem ganzen Land statt.\n\nNachdem einer der beliebtesten Politiker der Nation von uns gegangen ist, muss die Republik nach vorne schauen. Es fanden Wahlen statt, und Juan Antonio Ríos von der Frente Popular gewann die Präsidentschaft und versprach, das Erbe Pedro Aguirre Cerdas fortzuführen."
chl.13.a:0 "Ruhe in Frieden, Don Tinto. Wir werden dich nie vergessen."
arg.1.desc:0 "Heute fanden in Argentinien Präsidentschaftswahlen statt. Da der &quot;Fraude Patriótico&quot; Argentinien jedoch noch immer kontrolliert, ist es nahezu sicher, dass die Wahl manipuliert wurde. Dennoch lautete der Wahlsieger:"
arg.1.a:0 "Roberto María Ortiz, das Mitglied der Concordancia!"
arg.1.b:0 "Roberto María Ortiz, Kandidat der UCRA!"
arg.1.c:0 "Roberto María Ortiz, Rivale der UCR!"
arg.1.d:0 "Ratet mal, wer! Roberto Ortiz!"
arg.2.d:0 "Als Roberto Ortiz die Wahl gewann, litt er an Typ-2-Diabetes. Alle dachten, es sei keine große Sache, doch nach dem Tod seiner Frau und dem Stress durch die Regierungsskandale verschlechterte sich sein Zustand rapide. Ein Augenarzt aus den USA wurde geschickt, um Ortiz zu helfen. Nach einer angespannten Ärztekommission erklärte der Augenarzt Castroviejo jedoch, dass Roberto Ortiz&#39; Situation nicht mehr verbessert werden könne."
arg.2.a:0 "Unser Präsident darf nicht sterben, nicht jetzt ..."
arg.3.d:0 "Roberto Ortiz ist aus den USA zurückgekehrt, und sein Zustand scheint sich deutlich verbessert zu haben! Natürlich muss er wegen seiner Krankheit noch vorsichtig sein, aber es ist nun mehr als wahrscheinlich, dass er Argentinien wieder anführen kann."
arg.3.a:0 "Der Sturm ist vorbei..."
arg.4.desc:0 "Nachdem Castillos Regierung gestürzt wurde, ist es an der Zeit, den Anführer der Junta zu wählen, die nun Argentinien regieren wird."
arg.4.a:0 "Arturo Rawson, der Konservative."
arg.4.b:0 "Pedro Pablo Ramírez, der Nationalist."
arg.4.c:0 "Edelmiro Julián Farrell, der Veteran."
arg.4.d:0 "Juan Domingo Perón, der Populist."
arg.5.d:0 "Es ist Zeit, den neuen Präsidenten Argentiniens zu wählen! Offensichtlich ist das Volk für diese wichtige Entscheidung noch nicht bereit. Deshalb wurde ein Rat aus Mitgliedern der Unión Sindical Argentina (Argentinischer Gewerkschaftsbund), der Kommunistischen Partei und der neu gegründeten Partido Justicialista (Justizistische Partei) einberufen. Der neue Präsident Argentiniens soll lauten:"
arg.5.a:0 "Juan Domingo Perón, der Populist."
arg.5.b:0 "Antonio Soto, der Anarchosyndikalist."
arg.5.c:0 "Fanny Jabcovsky, die Marxistin."
arg.6.d:0 "Heute empfingen wir eine Delegation aus Argentinien, heute Andesien, mit der Bitte, uns zu einer Föderation gegen den nordamerikanischen Imperialismus und Kapitalismus im Westen zusammenzuschließen. Sie scheinen verrückt geworden zu sein, aber einige unserer Politiker glauben, dass ein Beitritt zu ihnen unserem wirtschaftlichen Wachstum zugutekommen würde, auch wenn dies unser Volk verärgert..."
arg.6.a:0 "Wir müssen uns gegen die nordamerikanische Bedrohung zusammenschließen!"
arg.6.b:0 "Sie sind verrückt geworden."
arg.7.d:0 "Die Liga Patriótica Argentina spielte in den 10er und 20er Jahren eine wichtige Rolle in Argentinien, als sie der Regierung half, die Streiks in der Semana Trágica sowie in der Patagonia Rebelde niederzuschlagen, bei der 1500 Arbeiter getötet wurden. Allerdings stellte sie ihre Aktivitäten ein, nachdem die Concordancia 1930 durch den Putsch an die Macht kam. Bis heute marschieren Hunderttausende Argentinier, die der LPA die Treue schworen, durch die Straßen von Buenos Aires und fordern eine Lösung der Wirtschaftsprobleme. Einige forderten sogar den Rücktritt der Concordancia, was sie auch taten, nachdem sich einige Generäle wie Juan Domingo Perón den Randalierern anschlossen. Mittlerweile ist die Macht in der Nation an Manuel Carlés übergegangen, einen antisemitischen Faschisten und Führer der LPA. Es scheint, dass von nun an eine neue Diktatur Argentinien regieren wird."
arg.7.a:0 "Eine neue Ära beginnt."
arg.8.d:0 "Zwischen 1920 und 1922 kam es in Patagonien zu zwei von anarchosyndikalistischen Arbeitern angeführten Aufständen, die gemeinhin als Patagonia Rebelde bekannt sind. Ziel dieser Aufstände war es, gegen die Massenentlassungen in Patagonien nach der Wirtschaftskrise zu protestieren, die das Ende des Ersten Weltkriegs mit sich brachte. Zunächst handelte es sich nur um einen Generalstreik, der sich jedoch schnell zu einer Revolte entwickelte, als die Verhandlungen scheiterten und die Syndikalisten mit der Besetzung von Farmen und Angriffen auf Polizisten und das Militär begannen. Der Aufstand wurde schließlich vom Militär mit Hilfe der Liga Patriótica Argentina niedergeschlagen, doch das Ende des Anarchosyndikalismus in Patagonien kam 1930, nachdem Diktator Uriburu die kommunistische und anarchistische Presse verbot. Da die Concordancia jedoch nicht in der Lage war, die wirtschaftlichen Probleme Argentiniens zu lösen, begannen viele anarchistische, kommunistische und syndikalistische Arbeiter in den meisten Regionen Argentiniens zu streiken und die Kontrolle zu übernehmen. In Pampas, Mesopotamien und Entre Ríos scheiterte dies jedoch. Nun scheint ein dritter Patagonia Rebelde unvermeidlich, doch dieses Mal werden nicht nur die Patagonier revoltieren."
arg.8.a:0 "Arbeiter Argentiniens, vorwärts!"
arg.9.d:0 "Vertreter von [FROM.GetNameDef] haben unser Land besucht und sich mit vielen unserer Politiker getroffen, in der Hoffnung, Unterstützung für ihr Investitionsprogramm zu gewinnen. Die Regierung von [FROM.GetNameDef] möchte, dass wir unsere Ressourcen zur Verbesserung ihrer eigenen industriellen Kapazitäten und Produktion nutzen. [FROM.GetAdjective]-Beamte haben geschlussfolgert, dass wir durch die Unterstützung ihres Landes in Zukunft selbst mit Hilfe in Form eines Militärbündnisses zwischen unseren Nationen rechnen können."
arg.9.a:0 "Wenn sie Hilfe brauchen, dann sollen sie diese Hilfe bekommen."
arg.9.b:0 "Wir werden ihren faustischen Pakt nicht unterzeichnen."
arg.10.d:0 "Die argentinische Regierung hat uns kontaktiert und die Übergabe der Falklandinseln vorgeschlagen. Sie behauptet, ihre Streitkräfte könnten die Falklandinseln besser vor unseren Feinden schützen. Wie sollen wir reagieren?"
arg.10.a:0 "Im Falle einer Invasion können sie schneller reagieren als wir ..."
arg.10.b:0 "Sie können nicht einmal ihre Stabilität schützen. Wie wollen sie also diese Inseln schützen?"
arg.11.d:0 "[FROM.GetLeader] hat unseren Vorschlag mit der Begründung abgelehnt, dass die Inseln unter ihren Fittichen höchstwahrscheinlich besser geschützt seien."
arg.11.a:0 "Verdammt [FROM.GetAdjective]!"
par.1.d:0 "Die paraguayische Regierung trat an uns heran und schlug ein Verteidigungsbündnis zwischen unseren Nationen vor. Es scheint, als würden wir von diesem Bündnis nichts gewinnen, aber die Öffnung einer zusätzlichen Grenze im Falle eines Krieges mit Bolivien oder Argentinien ist immer nützlich, nicht wahr?"
par.1.a:0 "Könnte nützlich sein."
par.1.b:0 "Wie könnte eine Maus dem großen Löwen helfen?"
par.2.d:0 "Unser Vorschlag für ein Militärbündnis wurde angenommen. Hoffentlich wird der Frieden zwischen unseren Nationen für immer bestehen!"
par.2.a:0 "Es lebe Paraguay!"
par.3.d:0 "Unser Vorschlag für ein Militärbündnis wurde abgelehnt. Vielleicht haben sie andere Pläne für unser Land."
par.3.a:0 "Wir sollten unsere Grenzen vorsichtshalber verstärken."
par.4.d:0 "Heute starb der berühmte Marschall José Félix Estigarribia zusammen mit seiner Frau Julia Miranda Cueto bei einem Flugzeugunglück in der Stadt Altos. Sein Leichnam ruht nun im Nationalen Pantheon der Helden, doch nun stellt sich die Frage: Wer wird der neue provisorische Staatschef Paraguays?"
par.4.a:0 "Higinio Moríngo, der Katholik."
par.4.b:0 "Alfredo Stroessner, der Germanophile."
par.5.d:0 "Heute wurde im Land ein sozialistischer Staatsstreich durchgeführt. Angeführt von Armee, Sozialisten, Konservativen, Faschisten, Nationalisten und Anarchisten stürzte der Putsch unter Führung des Chaco-Kriegshelden Rafael Franco die liberale Regierung von Eugenio Ayala, da diese die aktuellen Probleme des paraguayischen Landes nicht lösen konnte. Viele Menschen sehen den Putsch als Chance auf eine bessere Zukunft, doch die Zeit wird zeigen, ob dies zutrifft."
par.5.a:0 "Hoffentlich ist es das."
pru.1.d:0 "Heute bietet uns die Regierung Ecuadors eine bedingte Kapitulation an. Sie bietet uns die Rückgabe der Provinz Pastaza an, die uns 1879 im Kampf gegen die Chilenen gestohlen wurde. Im Gegenzug soll die Unabhängigkeit Ecuadors gewahrt werden. Wie sollen wir reagieren?"
pru.1.a:0 "Fair genug."
pru.1.b:0 "Quito wird eine neue peruanische Provinz!"
pru.2.d:0 "Die peruanische Regierung hat unser Angebot abgelehnt, und Gerüchte über eine geplante Annexion unseres Landes geistern durch die Ohren unserer Bevölkerung. Doch anstatt eine Welle des Defätismus auszulösen, hat dies unsere Bereitschaft gestärkt, für die Verteidigung ihrer Familien zu kämpfen. Jetzt bleibt nur noch zu sagen:"
pru.2.a:0 "Sie kommen nicht durch!"
emu.1.d:0 "Der Verteidigungsminister klopfte leise an die Tür von [Root.GetLeader]. „Kommen Sie herein“, antwortete er mit angespannter Stimme. \n\nDer Krieg lief nicht gut. Die feindliche Armee rückte unaufhaltsam durch die australischen Verteidigungslinien vor, und es schien, als würde das einst so stabile Australien in wenigen Monaten nur noch eine alte Erinnerung sein. Doch dieser Gedanke verschwand aus [Root.GetLeader]s Gedanken, nachdem er die Worte seines Verteidigungsministers gehört hatte. \n\n„Emus scheinen nicht boshaft zu sein, Sir. Sie haben unseren Vorschlag angenommen, uns bei der Verteidigung Australiens gegen die Invasoren zu helfen. Sie sagten sogar, dass Brüder auch gegen die größten Bedrohungen immer vereint bleiben müssen.“ \n\n[Root.GetLeader] lächelte. „Die Kavallerie scheint angekommen zu sein, nicht wahr?“"
emu.1.a:0 "Schwere Zeiten schaffen interessante Allianzen."
emu.2.d:0 "Nach der Verhaftung des nicaraguanischen Diktators Anastasio Somoza García durch sandinistische Kräfte hat in der Geschichte Nicaraguas eine neue Ära begonnen, in der die Arbeiter und Bauern die Führer der Nation sind!"
emu.2.a:0 "Wir sind stolz auf dich, y adelante!"
emu.3.desc:0 "Nach dem Friedensschluss zwischen Italien und Äthiopien kam es in den großen Städten des Landes zu massiven Protesten. In Rom forderten Hunderttausende Randalierer den Rücktritt oder gar die Hinrichtung Benito Mussolinis. Polizisten schlossen sich den Protesten an, ebenso wie zahlreiche Soldaten, die auf die Demonstranten schossen. \n\nMussolini wurde schließlich gefangen genommen, nachdem die Randalierer den Regierungspalast gestürmt hatten. Später wurde er unter Messerstichen und grausamer Misshandlung über den Platz geschleift und schließlich zusammen mit den Leichen seiner Kollaborateure auf dem Piazzale Loreto aufgehängt."
emu.3.a:0 "Doch der Rest der Armee würde bald kommen, um einen neuen Duce an die Macht zu bringen …"
emu.3.b:0 "Doch der Rest der Armee würde bald kommen, um die Monarchie wieder an die Macht zu bringen …"
emu.3.c:0 "Schließlich kehrte die Demokratie in die Nation zurück."
emu.3.d:0 "Schließlich wurde der Marxismus zur führenden Kraft der Nation."
emu.4.d:0 "Der Verteidigungsminister klopfte leise an die Tür von [Root.GetLeader]. „Kommen Sie herein“, antwortete er mit angespannter Stimme. \n\nDer Krieg lief nicht gut. Die feindliche Armee rückte unaufhaltsam durch die brasilianischen Verteidigungslinien vor, und es schien, als würde das einst so stabile Brasilien in wenigen Monaten nur noch eine alte Erinnerung sein. Doch dieser Gedanke verschwand aus [Root.GetLeader]s Gedanken, nachdem er die Worte seines Verteidigungsministers gehört hatte. \n\n„Die Toninhas scheinen nicht boshaft zu sein, Sir. Sie haben unseren Vorschlag angenommen, uns bei der Verteidigung Brasiliens gegen die Invasoren zu helfen. Sie sagten sogar, dass Brüder auch gegen die größten Bedrohungen immer vereint bleiben müssen.“ \n\n[Root.GetLeader] lächelte. „Die Kavallerie scheint angekommen zu sein, nicht wahr?“"
emu.4.a:0 "Schwere Zeiten schaffen interessante Allianzen."
can.1.d:0 "Nach der Massenwelle britischer Exilanten nach Kanada begannen viele Menschen, die monarchistische Bewegung zu unterstützen und im ganzen Land ein rotes Kreuz zu erheben. Dies sowie zahlreiche Proteste von Paramilitärs und Monarchisten in den Straßen von Ottawa, Toronto, Halifax und sogar Vancouver veranlassten [CAN.GetLeader] zum Rücktritt.\n\nNachdem die Regierung gestürzt ist, glauben viele, dass ein starker Führer die einzige Möglichkeit ist, die Nation vor einer totalitären marxistischen Regierung zu retten. Wer wird also der neue Führer Kanadas?"
can.1.a:0 "Edward VIII. wird Kanada führen!"
can.1.b:0 "Georg VI. wird Kanada regieren!"
can.1.c:0 "Winston Churchill ist der richtige Mann!"
usaa.1.d:0 "Nachdem die meisten Generäle der USA wieder eingestellt wurden, bleibt eine Frage offen: Sollte Präsident MacArthur Patton, Bradley und Eisenhower wieder in den Dienst rufen? Es ist bekannt, dass sie zu den besten Generälen der Vereinigten Staaten gehören. Allerdings könnte eine zu hohe Popularität der Armeeführer ein Problem für die Führung des Kaisers darstellen, schließlich waren sie es, die den Putsch der Konstitutionalisten unterstützten, der den Zweiten Amerikanischen Bürgerkrieg auslöste."
usaa.1.a:0 "Wir können sie immer noch auf eine Insel in Polynesien schicken, wenn sie zu gesprächig werden."
usaa.1.b:0 "Sie werden nicht benötigt."
usaa.2.d:0 "Der Tag der Präsidentschaftswahl ist gekommen. Amtsinhaber Franklin Delano Roosevelt hat bereits mehrere der als „New Deal“ bezeichneten Programme umgesetzt, die die USA aus der Großen Depression führen sollen. Während viele dieser Maßnahmen auf Zustimmung stießen, stießen seine Pläne, die Rolle und Macht der Regierung weiter auszubauen, bei seinem Gegner, dem Republikaner William Borah, auf Kritik. Borah plädiert für mehr wirtschaftliche Freiheit, während Roosevelt und die Demokratische Partei die Sozialversicherung ausbauen und wirtschaftliche Stabilität gewährleisten wollen. Die Wahl könnte knapp ausfallen oder ein klarer Sieg für die Demokraten werden."
usaa.2.a:0 "Die Demokraten. Noch vier Jahre!"
usaa.2.b:0 "Die Republikaner. Wir müssen die Ideale des amerikanischen Systems schützen."
usaa.3.d:0 "Die Republikanische Partei hat begonnen, ihren Präsidentschaftskandidaten für die US-Präsidentschaftswahl 1936 zu wählen. Während einige Alf Landon wegen seiner gemäßigten Ideale unterstützen, halten andere William Borah für den richtigen Mann für die Kandidatur der Partei, ungeachtet seiner Ablehnung des Versailler Vertrags und seiner scheinbar guten Meinung von Adolf Hitler.\n\nDie Abstimmung fand statt, und der Gewinner war:"
usaa.3.a:0 "Alf Landon!"
usaa.3.b:0 "William Borah!"
mon.1.d:0 "Heute Morgen begannen mongolische Divisionen mit Verhaftungen und sogar dem Feuer auf die in der Mongolei stationierten sowjetischen Truppen, während Soldaten der Kuomintang die mongolische Grenze überquerten. Berichten zufolge hätten chinesische Spione Schlüsselzonen in Ulaanbaatar unter ihre Kontrolle gebracht, während Unbekannte in das Haus des stalinistischen Generals Chorloogiin Tschoibalsan eindrangen und ihn hinrichteten. Anandyn Amar wurde abgesetzt und die Macht an Unenbayan, auch bekannt als Wu Heling, Mitglied der Kuomintang, übergeben. Ob dieser Putsch von den Chinesen orchestriert oder von Anadyn selbst angeordnet wurde, um die Mongolei vor dem immer stärker werdenden sowjetischen Einfluss zu schützen, ist derzeit nicht bekannt."
mon.1.a:0 "Jetzt müssen die russischen Schlächter es sich zweimal überlegen, bevor sie unser Volk töten."
mon.2.d:0 "Heute Morgen begannen mongolische Divisionen mit der Festnahme und dem Feuer auf die in der Mongolei stationierten sowjetischen Truppen, während Soldaten der Kuomintang die mongolische Grenze überquerten. Berichten zufolge haben chinesische Spione Schlüsselzonen in Ulaanbaatar unter ihre Kontrolle gebracht, während Unbekannte in das Haus des stalinistischen Generals Chorloogiin Tschoibalsan eingedrungen sind und ihn hingerichtet haben. Die Generäle der Armee fordern einen Angriffsbefehl, doch diese Intervention könnte leicht zu einer weiteren Pattsituation führen, wie die sowjetische Invasion in Sinkiang 1934. Was sollen wir tun?"
mon.2.a:0 "Lass uns das schnell erledigen."
mon.2.b:0 "Warum sollten wir unsere Männer in den Tod schicken, um eine leere Wüste zu bewohnen?"
mon.3.d:0 "Heute Morgen startete eine japanische Offensive in der Mongolei. Mongolische Truppen zogen sich aus den Kämpfen zurück, und die sowjetischen Einheiten, die sich nicht schnell genug zurückziehen konnten, wurden von den Japanern eingekesselt. Die Kwantung-Armee übernahm die Kontrolle über Ulaanbaatar, und viele kommunistische Führer flohen in die Sowjetunion. Der innermongolische General Urzhin Garmaev übernahm nun vorläufig die Macht in der Mongolei, bis entschieden ist, ob sie mit Mengkukuo vereinigt wird."
mon.3.a:0 "Vielleicht ist ein asiatischer Metzger gefügiger als ein kommunistischer."
mon.4.d:0 "Heute Morgen startete eine japanische Offensive in der Mongolei. Die mongolischen Truppen zogen sich aus dem Kampf zurück, und die sowjetischen Einheiten, die sich nicht schnell genug zurückziehen konnten, wurden von den Japanern eingekesselt. Die Kwantung-Armee hat Ulaanbaatar unter ihre Kontrolle gebracht, und viele kommunistische Führer begannen, in die Sowjetunion zu fliehen. Generäle der Armee fordern einen Angriffsbefehl, doch diese Intervention könnte leicht zu einer weiteren Pattsituation führen, wie die sowjetische Invasion von Sinkiang 1934. Was sollen wir tun?"
mon.4.a:0 "Lass uns das schnell erledigen."
mon.4.b:0 "Diese Japaner können diese verdammte Wüste haben, solange sie die gefangenen Russen zurückgeben."
mon.5.d:0 "Heute Morgen startete eine japanische Offensive in der Mongolei. Die mongolischen Truppen zogen sich aus den Kämpfen zurück, und die sowjetischen Einheiten, die sich nicht schnell genug zurückziehen konnten, wurden von den Japanern eingekesselt. Die Kwantung-Armee übernahm die Kontrolle über Ulaanbaatar, und viele kommunistische Führer flohen in die Sowjetunion. Der innermongolische General Urzhin Garmaev hat nun die Macht in der Mongolei vorläufig übernommen, bis entschieden ist, ob das Land mit Mengkukuo vereinigt wird. Daher wird General Urzhin unsere Armeen vorerst nicht führen können."
mon.5.a:0 "Viel Glück, Garmaev!"
mon.6.d:0 "Heute hat eine mongolische Delegation unsere Regierung gebeten, eine Militärmission in ihrem Land zu starten, um die Qualität ihrer Armee zu verbessern. Sie zeigten große Bewunderung für unsere Leistung während des Langen Marsches und wünschten uns viel Erfolg bei unserer Revolution gegen die Nationalisten. General Ulanhu bot an, in die Mongolei zu reisen, die Expedition zu leiten und zu versuchen, militärischen Zugang zu ihrem Land auszuhandeln, falls wir ihn bei einem erneuten Angriff auf die Nationalisten benötigen. Seine Begeisterung, sich den Mongolen anzuschließen, erscheint jedoch verdächtig und lässt [Root.GetLeader] vermuten, dass er damit versucht, sich seiner Pflicht gegenüber der Kommunistischen Partei zu entziehen und sogar unsere Sache zu verraten. Sollen wir ihn in die Mongolei gehen lassen oder nur ein paar Offiziere dorthin schicken?"
mon.6.a:0 "Gut, das ist in Ordnung. Aber er muss bedenken, dass Verrat mit dem Tod bestraft wird."
mon.6.b:0 "Ein paar Offiziere würden reichen."
mon.7.d:0 "Die Kommunisten kamen unserer Bitte nicht nur nach, sondern schickten auch den renommierten General Ulanhu, um unsere Truppen und Offiziere zu führen und auszubilden. Er machte jedoch deutlich, dass seine Loyalität weiterhin der KPCh galt, obwohl er ein ethnischer Mongole war."
mon.7.a:0 "Sauber!"
mon.8.d:0 "Aufgrund der neuen Politik unserer Regierung ist General Ulanhu, der Anführer der kommunistischen chinesischen Militärmission in der Mongolei, aus unserer Armee übergelaufen und hat sich den kommunistischen Guerillas der Kommunistischen Partei Chinas angeschlossen. Das ist ein schwerer Verlust für unser Oberkommando, aber wir müssen weitermachen und hoffen, dass er nicht zu viele Geheimnisse mitgebracht hat."
mon.8.a:0 "Na ja, zumindest hat er uns vorher gesagt, dass er der KPCh treu bleiben würde, oder?"
mon.9.d:0 "Aufgrund der neuen Politik der mongolischen Regierung verließ General Ulanhu die mongolische Armee, um sich wieder unserer mächtigen Regierung anzuschließen. Schließlich log er nicht, sondern war der Kommunistischen Partei Chinas gegenüber wirklich loyal."
mon.9.a:0 "Willkommen zurück, Genosse."
mon.10.d:0 "Der stalinistische Parteiführer Luvsansharav verurteilte Amar in einer erweiterten Sitzung des Zentralkomitees der MPRP mit den Worten, er habe „regierungsfeindlichen Verschwörern geholfen, sich ihrer Verhaftung widersetzt und die Verteidigung der Grenzen vernachlässigt. Er habe sein eigenes Land verraten und sei ein Verräter an der Revolution“. Nachdem General Choibalsan die Verurteilung unterstützt hatte, wandte sich die Stimmung im Zentralkomitee rasch gegen Amar. \n\nAmar ergriff zu seiner Verteidigung das Wort und sagte: „Ich glaube zwar an die Religion, aber noch mehr glaube ich daran, dass die Mongolei fest auf eigenen Füßen stehen und ein unabhängiges Land werden muss. Ich liebe mein Land. Das habe ich mit meiner Arbeit gezeigt. Ich war einer der Ersten, die sich der Entwicklung meines Landes verschrieben haben, und es bricht mir das Herz, nun mit ansehen zu müssen, wie ich als Verräter beschimpft und gemaßregelt werde.“ \n\nAber es war vergeblich. Er wurde von den mongolischen Behörden verhaftet und dem NKWD übergeben, der ihn nun nach Moskau überstellt, wo er wahrscheinlich zum Tode verurteilt wird. \n\nAmars letzte aufgezeichnete Worte waren: „Es ist typisch, dass, wenn eine Großmacht ein kleines Land kolonisiert, deren Führer verhaftet und verfolgt werden. Meine persönliche Erfahrung zeigt diese Haltung der UdSSR gegenüber der Mongolei.“"
mon.10.a:0 "Ein weiterer Freiheitskämpfer, der von der Sowjetunion ermordet wurde …"
mon.11.d:0 "Die mongolische Regierung hat sich mit der Bitte an uns gewandt, ihr die Kontrolle über Hulunbuir zu übertragen, eine Region, die seit Jahrhunderten überwiegend von Mongolen bewohnt wird. Der Verlust eines so großen Gebiets würde unsere verfügbaren Arbeitskräfte beeinträchtigen. Allerdings könnte es langfristig hilfreich sein, weniger separatistische Minderheiten in unserem Land zu haben. Da die Region weder reich an Ressourcen noch entwickelt ist, gibt es außer der rekrutierbaren Bevölkerung nicht viel zu verlieren."
mon.11.a:0 "Je weniger Minderheiten, desto besser."
mon.11.b:0 "Wenn wir anfangen, Gebiete abzugeben, stehen wir mit nichts da."
mon.12.d:0 "Die Regierung von Mandschukuo hat unsere Petition angenommen. Wir können uns nun mit unseren Brüdern wiedervereinigen."
mon.12.a:0 "Perfekt."
mon.13.d:0 "Die Regierung von Mandschukuo hat unseren Antrag abgelehnt. Wir müssen Hulunbuir auf andere Weise zurückerobern."
mon.13.a:0 "Wir werden es irgendwann zurückbekommen ..."
mon.14.d:0 "Der Bau der Transmongolischen Eisenbahn wurde abgeschlossen und hat die Infrastruktur der Region erheblich verbessert."
mon.14.a:0 "Perfekt."
mon.15.d:0 "Heute Morgen verkündete die mongolische Regierung die sogenannte „mongolisch-sowjetische Spaltung“ und die vollständige Unabhängigkeit von unserem Land. Sollten wir sie völlig unabhängig werden lassen, könnte dies eine Kette von Aufständen und Autonomieerklärungen innerhalb der Union auslösen. Aber auch der Einsatz unserer Soldaten zur Rückeroberung und Ausplünderung einer Wüste, die ihnen egal ist, könnte problematisch werden. Was sollen wir tun?"
mon.15.a:0 "Lass uns das schnell erledigen."
mon.15.b:0 "Warum sollten wir unsere Männer in den Tod schicken, um eine leere Wüste zu bewohnen?"
man.1.desc:0 "Nachdem Tokio von den kommunistischen Teufeln eingenommen wurde, sind viele unserer Generäle mit ihren Familien nach Mandschukuo geflohen, das heute als Kwantung-Gebiete bekannt ist. Wir müssen unseren neuen Kampf beginnen, um die Inseln von ihnen zurückzuerobern! Doch zunächst müssen wir mit der Reorganisation der Nation beginnen und den neuen Führer der Kwantung-Gebiete wählen. Der Mann, der den Japanern den Sieg bringen wird, soll sein:"
man.1.a:0 "Kenkichi Ueda, Kommandant der Kwantung!"
man.1.b:0 "Sadao Araki, Anführer der Kodoha!"
man.1.c:0 "Seishiro Itagaki, Drahtzieher des Mukden-Vorfalls!"
man.1.d:0 "Natürlich Kaiser Showa!"
man.2.d:0 "Aufgrund der Instabilität in Japan und den Kwantung-Gebieten kam es in den Straßen von Seoul und Busan zu Unruhen, die die vollständige Unabhängigkeit forderten. Zunächst handelte es sich nur um einen Studentenprotest, doch dann schlossen sich Arbeiter und sogar Polizisten den Koreanern an. Natürlich wurden sie von unseren Kugeln getroffen, doch erstaunlicherweise begannen einen Monat später in ganz Korea Aufstände, bis es koreanischen Milizen gelang, die Kontrolle über Stadthauptstädte und japanische Festungen zu übernehmen. Jetzt stehen wir vor einer ausgewachsenen Revolution."
man.3.d:0 "Eine Delegation der japanischen Exilregierung, auch bekannt als die Kwantung-Gebiete, ist mit einem geheimen Abkommen eingetroffen. Nach einem mehrstündigen Treffen erfuhr Chiang Kai-shek, dass die Kwantung-Armee bereit sei, die Mandschurei an China zurückzugeben, sobald sie Tokio von den Kommunisten erobert habe. Im Gegenzug einigten sie sich auf einen Nichtangriffspakt. Zunächst wollten sie weder Taiwan noch Dalian zurückgeben, einigten sich aber schließlich darauf, nur Taiwan zurückzugeben. \n\nDass es Chiang nicht gelang, Dalian von den Japanern zurückzuerobern, verärgerte ihn sehr. Er begab sich zu einem Gespräch mit anderen Mitgliedern der Kuomintang sowie der First Lady der Republik, Soong Mei-ling. Nachdem er sich beruhigt hatte, kehrte der Generalissimus zu dem Treffen zurück und sagte:"
man.3.a:0 "Fair genug."
man.3.b:0 "Wir haben andere Pläne für die Kwantung."
man.4.d:0 "Die Kuomintang hat unseren Deal akzeptiert. Sobald wir Tokio wieder halten, geben wir ihnen gerne die Mandschurei zurück – natürlich nur, wenn sie unseren Nichtangriffspakt nicht brechen."
man.4.a:0 "Tennōheika Banzai!"
man.5.d:0 "Die Kuomintang hat unser Angebot abgelehnt. Sie planen wahrscheinlich, uns anzugreifen und ihr Territorium zurückzuerobern, sobald sie dazu bereit sind ..."
man.5.a:0 "Meine Güte..."
man.6.d:0 "Die japanische Regierung hat sich an die ehemaligen Zhili-Kriegsherren Cao Kun und Wu Peifu gewandt, um im Falle eines Krieges zwischen Japan und China über ihre Führung in Nordchina zu verhandeln. Beide bitten jedoch um große Gefälligkeiten. Cao Kun verlangt eine enorme Geldsumme, während Wu Peifu die Japaner zum Rückzug ihrer Truppen aus der Mandschurei auffordert. Natürlich lehnten die Japaner ab, aber wir könnten notfalls immer noch einen geheimen Deal mit ihnen abschließen."
man.6.a:0 "Nein danke."
man.6.b:0 "Es ist die Zahlung wert."
man.7.d:0 "Heute starb Marschall Cao Kun im Alter von über 70 Jahren. Seine Leiche wurde allein in seinem Haus in Hsinking gefunden. Nun wird untersucht, ob er eines natürlichen Todes, einer Krankheit oder einer schlimmeren Ursache gestorben ist. Wu Peifu wurde vorerst zum De-facto-Führer des Staates Mandschukuo ernannt."
man.7.a:0 "Dies wird uns nicht davon abhalten, Peking zurückzuerobern."
man.8.d:0 "Nachdem wir nun offiziell gegen die Japaner revoltiert haben, ist es an der Zeit, unsere neue nationale Identität zu wählen. Auf der einen Seite steht die historische Region Liaoning, auch bekannt als Fengtian, die von Zhang Zuolin bis zu seiner Ermordung durch die Japaner regiert wurde, auf der anderen Seite die Zhili-Clique, angeführt von Cao Kun und Wu Peifu, bevor sie im Nordfeldzug von der Kuomintang besiegt wurden."
man.8.a:0 "Fengtian wird unter der Führung von Wu Peifu wiedergeboren."
man.8.b:0 "Wu Peifu führte die Zhili-Clique an und wird dies auch weiterhin tun."
man.9.d:0 "Nachdem wir unsere Unabhängigkeit gesichert haben, ist es an der Zeit, die neue Flagge der legitimen chinesischen Republik zu wählen. Welche Flagge wird gewählt?"
man.9.a:0 "Die fünffarbige Flagge von 1912 wäre in Ordnung."
man.9.b:0 "Die fünffarbige Flagge von 1912, jedoch mit Schwerpunkt auf der Han-Ethnie."
man.9.c:0 "Die Flagge des Yuan-Reiches ist die richtige Wahl."
man.10.d:0 "Die Yiguandao sind eine chinesische Heilssekte, die Ende des 19. Jahrhunderts in Shandong entstand und in Peking und Tianjin zunehmend an Popularität gewinnt. Heute erhielten wir einen Brief von ihrem Anführer Zhang Tianran, in dem er seine Bereitschaft erklärt, die Yiguandao zu mobilisieren, um unser Ziel der Wiederherstellung der Qing-Dynastie und unserer Kontrolle über China zu unterstützen. Wie er an diese Informationen gelangte, ist derzeit unbekannt, aber wir wissen, dass wir jetzt eine Entscheidung treffen müssen."
man.10.a:0 "Wir werden nicht mit einer verrückten Sekte zusammenarbeiten."
man.10.b:0 "Sie könnten in unserem Kampf nützlich sein."
man.11.d:0 "Eine Gruppe japanischer Flugzeuge wurde heute Morgen am Himmel über Changchun gesichtet, wie sie schnell über die Stadt flogen. Alle erwarteten, dass sie sich auf den Weg zum Hafen Dalian machten oder zu Aufklärungszwecken eingesetzt wurden, doch dann brach die Hölle über der Stadt los. Bomben wurden in der Umgebung des Königspalastes abgeworfen, einige trafen das Dach des Gebäudes. Die Menschen waren weder auf einen zivilen Bombenangriff noch auf das, was als Nächstes kommen würde, vorbereitet. \n\nErneut wurde eine enorme Anzahl von Flugzeugen am Himmel gesichtet, die alle den Palast ins Visier nahmen. Das Ziel war klar: die Rebellenarmeen durch die Tötung ihres Königs zu demoralisieren. Nach dem Bombenangriff stürmten Truppen der Yiguandao die Trümmer auf der Suche nach ihrem König und fanden nicht nur seine Leiche, sondern auch die der übrigen Familie Aisin Gioro, sogar die von General Xiqia, der seine Familie ein letztes Mal besuchte, bevor er an die Front versetzt wurde. \n\nDoch die Moral der Manchurianer, nun Fengtianer, war ungebrochen. Die Yiguandao unter der Führung von Zhang Tianran begannen schnell, den Verwundeten in der Umgebung des Palastes zu helfen, während der Anführer der Sekte lächelnd mit seiner Milizgarde durch die Straßen der Stadt ging und sagte:"
man.11.a:0 "„Ein Phenix erhebt sich immer aus seiner Asche.“"
man.12.d:0 "Nach dem Tod der Familie Aisin-Gioro begannen die Yiguandao unter Zhang Tianran über ihren Tod nachzudenken. Welchen neuen Weg würden die Menschen von Fengtian einschlagen? Zuvor hatten sie das Ideal verfolgt, Puyis Kontrolle über China wiederherzustellen, doch nun können sie nur noch darauf hoffen, entweder von den Kommunisten oder von Nanjing annektiert zu werden. Nach einem stundenlangen Aufenthalt in einem Tempel hatte er eine Erleuchtung. \n\nWarum sollte das chinesische Volk von einem fremden Volk wie den Mandschuren geführt werden? Sie brauchen eine Han-Führung, sie alle müssen den Ming folgen. \n\nAber wie sollte er es schaffen, eine längst vergangene Dynastie wiederherzustellen? Die Antwort war einfach: die Familie Zhu. Sie sind die Nachkommen der Ming-Dynastie und es heißt, sie ziehen ein Kind groß, das leicht zu den Yiguandao bekehrt werden könnte, um ihnen dann zu helfen, ihren Glauben in ganz China zu verbreiten. \n\nUnd so krönten sie Zhu Rongji, der 1944 16 Jahre alt wird, zum neuen König von China. Seine Mutter und ihre Familie zögerten zunächst, ihr Kind zum König von China zu machen und misstrauten Zhang, doch nach tagelangen Versuchen, sie davon zu überzeugen, der neuen Fengtian-Regierung beizutreten, gaben sie nach.\n\nNun muss der Anführer der Yiguandao nur noch die Familie beseitigen. Doch alle außer dem Kind zu töten, wäre zu offensichtlich. Die Leute würden anfangen, Fragen zu stellen, und diese Fragen würden eines Tages Rongji zu Ohren kommen. Es gibt nur einen Weg, dies zu erreichen:"
man.12.a:0 "Wie in einem alten Sho-Spiel."
man.13.d:0 "Eine Gruppe mutmaßlicher Diebe drang heute in den Königspalast ein, höchstwahrscheinlich mit dem Ziel, Familienbesitz zu stehlen. Sie schafften es, sich an den königlichen Wachen vorbeizuschleichen und die Türen aufzubrechen, ohne die Palastwächter durch Lärm zu alarmieren. Drinnen angekommen, stahlen sie einige Wertgegenstände, wurden aber offenbar von Familienmitgliedern entdeckt, da im Gebäude mehrere Schüsse zu hören waren, bevor die Verbrecher verschwanden. \n\nAls die königlichen Wachen den Palast betraten, sahen sie einen roten Fluss die Treppe hinunterstürzen, neben dem die Leichen aller Mitglieder der Familie Zhu lagen. Warum sollte ein gewöhnlicher Verbrecher die gesamte Familie des Königs töten, nur um etwas Gold zu stehlen? Es wird nie aufgeklärt werden. \n\nObwohl dies eine Tragödie ist, muss sich das chinesische Volk keine Sorgen machen, König Zhu Rongji lebt! Glücklicherweise befand er sich mit Regent Zhang Tianran in einem Tempel, als das Blutbad geschah. Nun werden die beiden China zu Ruhm und Ehre verhelfen!"
man.13.a:0 "Das Spiel ist beendet."
man.14.d:0 "Zhang Tianran meditierte wie üblich in einem Yiguandao-Tempel, bis er hinter sich das Geräusch näherkommender Stiefel hörte. Als er aufstand, sah er Mitglieder der Familie Zhu und Milizen den Tempel betreten und auf ihn zielen. Ihre Uniformen waren unterschiedlich: Manche trugen westliche Kleidung, andere sahen aus wie einfache Bauern, und wieder andere trugen aus unerfindlichen Gründen die Uniform der Volksbefreiungsarmee. \n\n„Was ist hier los?“, fragte der Regent und starrte sie an. Ihm wurde mitgeteilt, dass er aufgrund einer endlosen Reihe von Anklagen verhaftet werde. \n\nDer Anführer der Yiguandao erstarrte einen Moment, bevor er seinen scheinbar überwältigten Wachen befahl, auf die Putschisten zu schießen. Doch sie zögerten. Während er in die schockierten Gesichter seiner Wachen blickte, hörte er einen Pistolenschuss und spürte einen enormen Schmerz in seinem Unterleib. \n\nZhang fiel zu Boden und begann zu zittern, als er spürte, wie das Leben aus seinem Körper wich. „Erschießt sie!“, stammelte er, doch seine Wachen antworteten nicht. „Wir treffen uns jetzt, ewige Mutter“, sagte er schließlich mit seinem letzten Atemzug. Der Wahnsinn hatte endlich ein Ende."
man.14.a:0 "Das Spiel ist beendet."
ger.1.d:0 "Nachdem die vorrückende feindliche Armee Berlin erobert hatte, beging Hitler Selbstmord und befahl seinen Offizieren, seine Leiche zu verbrennen, um die Eroberung durch die Feinde Deutschlands zu verhindern. Zur Überraschung des deutschen Oberkommandos ernannte der Führer Dönitz in seinem Testament zum Erben des Dritten Reiches. Diese Position übernahm der Admiral am Tag nach dem Selbstmord des Führers. Ob Dönitz den Kampf fortsetzen oder sich sofort den feindlichen Truppen ergeben wird, bleibt abzuwarten."
ger.1.a:0 "Heil Dönitz!"
ger.2.d:0 "Wir haben ein Ultimatum von [From.GetLeader] erhalten. Er erklärt, dass er die in Südtirol lebenden Deutschen, die nach dem Ersten Weltkrieg feige von Italien unterworfen wurden, nicht im Stich lassen wird und fordert daher von uns die Übergabe dieses Gebiets an Deutschland. Wie sollen wir auf diese Drohung reagieren?"
ger.2.a:0 "Wir können das Leben unserer Leute nicht für ein paar Österreicher riskieren."
ger.2.b:0 "Mal sehen, ob ihre Panzer in den Alpen funktionieren."
ger.3.d:0 "Aufgrund der enormen Unzufriedenheit innerhalb der Wehrmacht über die lange Zeit, die die Regierung brauchte, um die Tschechoslowakei zu besiegen, verbreiteten sich in Deutschland Gerüchte über eine Verschwörung, die darauf abzielte, den Führer zu stürzen und die Tschechen um Frieden zu bitten. \n\nDie Abwehr hat begonnen, diese Gerüchte zu untersuchen, und SS-Patrouillen wurden in Berlin stationiert, um [From.GetLeader] zu schützen."
ger.3.a:0 "Sie können jetzt die Waffen niederlegen, die Tschechen werden im Handumdrehen besiegt sein."
ger.4.d:0 "In Berlin und anderen Großstädten des Landes kam es zu Protesten, nachdem die Regierung von [From.GetLeader] versprochen hatte, Danzig zurückzuerobern und Polen rasch zu besiegen. Mehr als vier Monate sind vergangen, und Hunderttausende Deutsche sind für einen Krieg gestorben, den manche für unnötig halten. \n\nUnd das wäre kein großes Problem, wenn nicht auch einige Generäle der Wehrmacht ihre verärgerten Stimmen geäußert hätten."
ger.4.a:0 "Sie werden für Danzig sterben, ob es Ihnen gefällt oder nicht!"
ger.5.d:0 "Generäle der Wehrmacht äußern zunehmend ihre Besorgnis über die stagnierende Front gegen Frankreich. Sie befürchten, dass die deutsche Wirtschaft und Versorgung aufgrund unserer wirtschaftlichen Isolation zusammenbrechen könnten, bevor wir Paris einnehmen können. Mit jedem Tag wird die französische Armee stärker, und unsere Ölvorräte werden knapper. \n\nWenn wir keine Welle des Defätismus auslösen wollen, müssen wir Paris jetzt einnehmen."
ger.5.a:0 "Diesmal werden wir bis Weihnachten zu Hause sein, das versichere ich Ihnen."
ger.6.d:0 "Da die Regierung im Unternehmen Barbarossa nicht die erwarteten Fortschritte erzielen konnte, begannen viele Generäle der Wehrmacht, [From.GetLeader] zu kritisieren. Sie sagten, er habe Deutschland in einen Krieg geführt, den es nicht gewinnen konnte. Öl und Moral gehen zur Neige, und wenn es uns nicht bald gelingt, zumindest eines von beiden zu beschaffen, könnte dies schwerwiegende Folgen haben."
ger.6.a:0 "Scheiße! SCHEIẞE!"
ger.7.d:0 "Nach dem Einmarsch feindlicher Armeen in unser Gebiet erfasste eine Welle des Defätismus Teile unserer Armee. Einige erkannten, dass die deutsche Armee nicht unbesiegbar war, dass die Alliierten nicht kurz vor der Kapitulation standen und dass möglicherweise nicht die Juden für den Untergang Deutschlands verantwortlich waren. An der Ost- und Westfront wurden Überläufer entdeckt, und die Gesamtlage erscheint düsterer denn je."
ger.7.a:0 "Scheiße! SCHEIẞE!"
ger.8.d:0 "Nach dem Einmarsch feindlicher Armeen in Paris erfasste eine Welle des Defätismus Teile unserer Armee. Einigen wurde klar, dass die deutsche Armee nicht unbesiegbar war, dass die Alliierten nicht kurz vor der Kapitulation standen und dass vielleicht doch nicht die Juden hinter Deutschlands Untergang steckten. An der Ost- und Westfront wurden Überläufer entdeckt, und die Gesamtlage erscheint düsterer denn je."
ger.9.d:0 "Nach der Kapitulation der italienischen Regierung vor unseren Feinden erfasste eine Welle des Defätismus Teile unserer Armee. Einigen wurde klar, dass die deutsche Armee nicht unbesiegbar war, dass die Alliierten nicht kurz vor der Kapitulation standen und dass vielleicht doch nicht die Juden hinter Deutschlands Untergang steckten. An der Ost- und Westfront wurden Überläufer entdeckt, und die Gesamtlage erscheint düsterer denn je."
ger.10.d:0 "Es ist an der Zeit, über das Schicksal der niederländischen Nation zu entscheiden, nachdem sie von unseren Armeen erobert wurde. Wir können uns dafür entscheiden, sie zu annektieren, wie wir es mit den Tschechen und Österreichern getan haben, oder ihnen den Status eines Reichskommissariats zu verleihen."
ger.10.a:0 "Sie sind nicht weniger Deutsche als ein Bayer oder ein Österreicher. Sie werden in das Reich integriert."
ger.10.b:0 "Der neue niederländische Staat wird innerhalb der Grenzen des alten bleiben."
ger.10.c:0 "Die Niederländer aus Flandern werden sich mit ihren nördlichen Brüdern vereinigen."
ger.11.desc:0 "Es ist an der Zeit, über das Schicksal der belgischen Nation zu entscheiden, nachdem sie von unseren Armeen erobert wurde. Wir können uns dafür entscheiden, sie zu annektieren, wie wir es mit den Tschechen und Österreichern getan haben, oder ihnen den Status eines Reichskommissariats zu verleihen."
ger.11.a:0 "Die Wallonien sollen germanisiert werden. Sie werden in das Reich integriert."
ger.11.b:0 "Der neue belgische Staat wird innerhalb der Grenzen des alten bleiben."
ger.11.c:0 "Pas-de-Calais wird in den neuen belgischen Staat integriert."
ger.11.d:0 "Ein nordfranzösischer Staat wird unsere Grenzen zum Westen schützen."
ger.12.d:0 "Heinrich Himmler hat sich an den Führer gewandt und ihm eine Idee mitgeteilt, die er gestern Abend nach der erneuten Lektüre von Mein Kampf hatte: die Schaffung eines von der SS geführten Reichskommissariats, eines SS-Staates, im Nordosten Frankreichs. Er erklärt, das burgundische Volk sei aus seiner rechtmäßigen Heimat vertrieben worden und es sei die Aufgabe der SS, das germanische Erbe in der Region wiederzubeleben. Er sagte auch, dass „ein altes wirtschaftliches und kulturelles Zentrum auf nichts weiter als ein französisches Anhängsel reduziert worden sei, das nur noch für seinen Wein bekannt ist“. \n\nDie Wehrmacht scheint über diesen Vorschlag sehr besorgt zu sein. Einige Generäle erklärten sogar, dass sie aus Protest zurücktreten würden, wenn dieser Staat gegründet würde."
ger.12.a:0 "Was könnte schiefgehen?"
ger.12.b:0 "Himmler, ich fange an zu glauben, dass Sie verrückt sind."
ger.13.desc:0 "Nachdem wir die neue russische Regierung konsolidiert haben, ist es an der Zeit, den neuen Herrscher dieser riesigen Länder zu wählen. \n\nNach einer langen Debatte zwischen [Root.GetLeader] und seinem Kabinett kamen sie zu dem Schluss, dass der neue Herrscher des Russischen Reiches sein muss:"
ger.13.a:0 "Eine provisorische Regierung unter der Duma."
ger.13.b:0 "Eugen Müller, baltisch-deutscher Veteran des russischen Bürgerkriegs."
ger.13.c:0 "Adolf Friedrich, ehemaliger Führer des baltischen Herzogtums."
ger.13.d:0 "Wladimir Romanow, der antikommunistische Zar."
ger.14.d:0 "Nach dem Sieg über die Nazis im Deutschen Bürgerkrieg begannen rasch die Vorbereitungen für Neuwahlen. Das Verbot der Sozialistischen Partei (SPD) wurde aufgehoben, die Kommunistische Partei blieb jedoch weiterhin verboten. Diese Entscheidung führte in einigen Regionen des Landes zu Streiks, die jedoch schnell wieder beendet wurden. Nach einem ganzen Tag der Stimmenauszählung wurden nun die Ergebnisse veröffentlicht. Der neue Bundeskanzler heißt:"
ger.14.a:0 "Konrad Adenauer, der antikommunistische Anwalt."
ger.14.b:0 "Otto Wels, der mutige Sozialist."
ger.14.c:0 "Adfred Hugenberg, der nationalistische Geschäftsmann."
ger.15.d:0 "Nun ist in Deutschland ein neues Problem aufgetaucht: die Monarchie. Im Parlament herrscht derzeit große Uneinigkeit darüber, ob die Monarchie als konstitutionelle Monarchie wiederhergestellt werden soll oder ob Deutschland dem amerikanischen und französischen Beispiel folgen und eine Republik werden soll. Wie auch immer wir uns entscheiden, ein Teil der Nation wird verärgert sein, aber eine Entscheidung muss getroffen werden."
ger.15.a:0 "Wilhelm III. hat mit Hitler kollaboriert, aber alle Menschen verdienen eine zweite Chance, oder?"
ger.15.b:0 "Warum sollten wir eine Regierung wieder einsetzen, die der deutschen Nation so großen Schaden zugefügt hat?"
ger.16.d:0 "Wilhelm III. kritisierte die Regierung seit seiner Thronbesteigung und erklärte, die derzeitige Regierungspartei sei zu schwach, um Deutschland zu führen. Seiner Ansicht nach habe nur die DNVP, die nationalistische Partei, die 1933 mit Hitler kollaborierte, genug Mumm, Deutschland zu retten. Seine Haltung verärgerte [GER.GetLeader] sehr, der jede Äußerung des Kaisers missbilligte."
ger.16.a:0 "Wer hatte überhaupt die großartige Idee, ihn zu krönen?"
ger.17.d:0 "Wilhelm III. sprach sich weiterhin gegen die Regierung aus, bis [GER.GetLeader] eines Tages schließlich aufstand und erklärte, er werde Deutschland nicht mehr an der Seite eines Mannes wie Wilhelm führen, und dem Parlament seinen Rücktritt vorlegte. Eine politische Krise war ausgebrochen. Das Parlament lehnte [GER.GetLeader]s Rücktritt umgehend ab und beschloss, über die Abdankung Wilhelms II. abzustimmen. Der Antrag wurde mit 70 % der Stimmen angenommen, und Wilhelm III. dankte ab, allerdings ohne zuvor zu sagen, dass er wisse, das Richtige für Deutschland zu tun, bevor er ging. Nun soll sein Sohn, der Antifaschist Louis Ferdinand, gekrönt werden, und die Regierung hofft, dass er weniger konfliktfreudig sei als sein Vorgänger."
ger.17.a:0 "Es lebe Kaiser Ludwig!"
ger.18.d:0 "Im Zuge ihrer neuen pangermanistischen Politik haben die Deutschen begonnen, Interesse am Sudetenland zu zeigen, einer Region Böhmens, die fast ausschließlich von Deutschen bewohnt wird. [GER.GetLeader] hat erklärt, er sei bereit, im Austausch für Investitionen und günstige Handelsabkommen über die Kontrolle der Region zu verhandeln. Die Mehrheit der tschechischen Bevölkerung lehnt die Idee ab, so viel Territorium gegen Geld aufzugeben. Sollten wir uns jedoch weigern, können wir nicht sicher sein, dass die Deutschen nicht versuchen werden, es mit Gewalt einzunehmen."
ger.18.a:0 "Fair genug..."
ger.18.b:0 "Lass sie kommen, wenn sie sich trauen."
ger.19.d:0 "Die Antifaschistische Aktion war eine militante antifaschistische Organisation, die von Mitgliedern der Kommunistischen Partei Deutschlands gegründet wurde und von 1932 bis 1933 existierte. Sie war hauptsächlich als KPD-Kampagne während der Bundestagswahl 1932 aktiv und wurde von der KPD als „rote Einheitsfront unter der Führung der einzigen antifaschistischen Partei, der KPD“ beschrieben. \n\nMit dem Beginn des Wehrmachtsaufstands hat die KPD erneut diese Milizen gegründet, die Berichten zufolge im Rheinland, Moselland, Thüringen und Sachsen eine beträchtliche Stärke erreicht haben. Einige dieser Milizen haben uns gebeten, eine Koalition gegen die Nazis zu bilden, aber die meisten Generäle der Wehrmacht misstrauen ihnen nach all den bewaffneten Aufständen, die sie in den 1920er Jahren angezettelt haben. Es liegt an [GER.GetLeader], ob die Antifaschistische Aktion als Verbündeter oder als Feind betrachtet wird."
ger.19.a:0 "Wir können uns später immer noch darum kümmern."
ger.19.b:0 "Keine Geschäfte mit Kommunisten!"
ger.20.desc:0 "Nachdem sich die Nation endlich stabilisiert hatte, war es Zeit, einen Rat einzuberufen, um über das Schicksal der Nation zu entscheiden. Viele wirtschaftliche und juristische Fragen wurden diskutiert, doch die Frage, wer zum Vorsitzenden der Nation gewählt werden sollte, erregte die größte Aufmerksamkeit. \n\nDer Rat hielt eine Abstimmung ab, und kurz darauf wurde der Gewinner bekannt gegeben:"
ger.20.a:0 "Ernst Thälmann, der Stalinist!"
ger.20.b:0 "Wilhelm Pieck, der Spartakist!"
ger.20.c:0 "Karl Kosch, der Antisowjet!"
ger.20.d:0 "Erich Mielke, der NKWD-Schüler."
ger.21.desc:0 "Währenddessen kontaktierte Helm III., König der deutschen Exilregierung, [POL.GetLeader] und bot uns ein Bündnis an. Er erklärte, dass die Invasion Ostpreußens und Polens durch die Kommunisten unvermeidlich sei, insbesondere solange Russland von den Sowjets regiert werde. Er sagte auch, dass die polnische Nation im Falle einer kommunistischen Invasion Ostpreußens mit einer zusätzlichen Front konfrontiert sein werde, wenn es zum unvermeidlichen Krieg mit der illegitimen deutschen Regierung käme. Deshalb forderte er uns auf, ein Verteidigungsbündnis zwischen unseren Nationen zu unterzeichnen."
ger.21.a:0 "Wir können unsere Differenzen vorerst beilegen."
ger.21.b:0 "Wir haben die Kommunisten einmal besiegt und wir werden es wieder tun, allein."
fra.1.a:0 "Solange die Macht an De Gaulle übergeht, akzeptieren wir das."
fra.1.b:0 "Warum sollten wir Feiglingen und Verrätern helfen?"
fra.2.d:0 "[FRA.GetLeader] hat sich an monarchiefreundliche Elemente der italienischen Regierung und des Untergrunds gewandt und Pläne für die Ermordung von [ITA.GetLeader] und die Einsetzung Viktor Emanuels III. als Staatsoberhaupt geschmiedet. Die Franzosen versichern uns, dass sie das Attentat durchführen können; wir müssen lediglich unsere Bereitschaft zur Bildung einer Ersatzregierung bekräftigen und die französischen Bemühungen künftig militärisch unterstützen."
fra.2.a:0 "Dies ist die einzige Möglichkeit, unsere Nation vor der Zerstörung zu bewahren."
fra.2.b:0 "Wie können sie es wagen, so etwas vorzuschlagen?"
fra.3.d:0 "Teile der italienischen Regierung und des Untergrunds haben unseren Putschvorschlag akzeptiert. Sie treffen Vorbereitungen für eine schnelle Machtergreifung des Königs, sobald das Attentat stattgefunden hat."
fra.3.a:0 "Wir können unsere Pläne in die Tat umsetzen."
fra.4.d:0 "Die von uns kontaktierten Elemente der italienischen Regierung und des Untergrunds haben uns in nicht gerade freundlichen Worten mitgeteilt, dass sie an unserem Putschvorschlag kein Interesse hätten. Sie drohten, unsere Pläne der italienischen Regierung zu offenbaren, sollten wir es wagen, das gleiche Angebot noch einmal zu machen."
fra.4.a:0 "Es ist nicht so, als wären sie sowieso besonders nützlich gewesen."
fra.5.d:0 "Der französische Plan wurde in die Tat umgesetzt und [ITA.GetLeader] wurde heute in seinem Auto auf den Straßen Roms erschossen. König Vittorio Emanuele III. hat die Zügel der Nation übernommen und sich zu unserem Militärbündnis bekannt."
fra.5.a:0 "Wir müssen unsere Dankbarkeit zeigen."
fra.6.a:0 "Dies ist die einzige Möglichkeit, unsere Nation vor der Zerstörung zu bewahren."
fra.6.b:0 "Wie können sie es wagen, so etwas vorzuschlagen?"
fra.7.d:0 "Teile der portugiesischen Regierung und des Untergrunds haben unseren Putschvorschlag akzeptiert. Sie treffen Vorbereitungen für eine schnelle Machtergreifung des Königs, sobald das Attentat stattgefunden hat."
fra.7.a:0 "Wir können unsere Pläne in die Tat umsetzen."
fra.8.d:0 "Die von uns kontaktierten Elemente der portugiesischen Regierung und des Untergrunds haben uns in nicht gerade freundlichen Worten mitgeteilt, dass sie an unserem Putschvorschlag kein Interesse hätten. Sie drohten, unsere Pläne der portugiesischen Regierung zu offenbaren, sollten wir es wagen, das gleiche Angebot noch einmal zu machen."
fra.8.a:0 "Es ist nicht so, als wären sie sowieso besonders nützlich gewesen."
fra.9.d:0 "Der französische Plan wurde in die Tat umgesetzt und [POR.GetLeader] wurde heute in seinem Auto in den Straßen von Lissabon erschossen. König Dom Duarte Nuno hat die Zügel der Nation übernommen und sich unserem Militärbündnis verpflichtet."
fra.9.a:0 "Wir müssen unsere Dankbarkeit zeigen."
phi.1.d:0 "Aufgrund der veränderten Lage sowohl auf den Philippinen als auch in den USA wurden MacArthur und die amerikanischen Berater in ihre Heimat zurückgerufen."
phi.1.a:0 "Vielen Dank für Ihren Dienst, Sir."
phi.2.d:0 "[PHI.GetLeader] hat [POR.GetLeader] mit einem Vorschlag kontaktiert, der eher wie eine Bitte um einen Gefallen wirkte. Er erklärte, die iberischen Nationen müssten vereint bleiben gegen die Kräfte, die die Stabilität Europas bedrohen, einschließlich der Regierung, die derzeit Madrid kontrolliert. Die falangistische Exilregierung schlug vor, gemeinsam gegen sie Krieg zu führen, im Austausch für die Garantie unserer Unabhängigkeit und der Region Äquatorialguinea, sobald wir die illegitime Regierung besiegen, die derzeit Spanien kontrolliert. Es scheint, als würden wir von diesem Deal fast nichts gewinnen, doch eine befreundete Regierung in unseren Grenzen würde uns sehr helfen, und außerdem hindert uns nichts daran, mehr Gebiete zu fordern als die versprochenen, sobald die Falangisten nach Madrid zurückkehren."
phi.2.a:0 "Die Regierung in Madrid wird keine Chance haben."
phi.2.b:0 "Unser Volk wird nicht für ein Stück Dschungel sterben."
phi.3.d:0 "Die portugiesische Regierung hat unseren Vorschlag angenommen. Sobald wir dazu bereit sind, werden wir gemeinsam gegen die illegitime Regierung in Madrid kämpfen."
phi.3.a:0 "Gemeinsam sind wir unaufhaltsam!"
phi.4.d:0 "Die portugiesische Regierung hat unseren Vorschlag abgelehnt. Wir müssen unser Heimatland allein befreien."
phi.4.a:0 "Wir werden uns daran erinnern..."
phi.5.d:0 "Nachdem die falangistische Exilregierung nun mit der Zweiten Reconquista begonnen hat, ist es an der Zeit, ihrem Aufruf zum Krieg wie versprochen nachzukommen."
phi.5.a:0 "Vorwärts!"
phi.6.d:0 "Die Regierung der Philippinen, heute bekannt als „Filipinas“, hat uns mit einem Vorschlag kontaktiert. Sie bittet um Unterstützung bei der Ausbildung ihrer neu gegründeten Seestreitkräfte sowie um einen Nichtangriffspakt zwischen unseren Ländern. Im Gegenzug bieten sie militärischen Zugang zu ihrem Land, solange wir ihn benötigen. Es gibt keinen triftigen Grund, diesen Vorschlag nicht anzunehmen, schließlich werden sie in ein paar Jahren nicht in der Lage sein, mit unserer Marine mitzuhalten. Einige Regierungsmitglieder halten es jedoch für besser, die Philippinen stattdessen in unser Reich zu integrieren."
phi.6.a:0 "Der Feind meines Feindes ist mein Freund."
phi.6.b:0 "Wir haben andere Pläne für die Philippinen."
phi.7.d:0 "Die Japaner haben unseren Deal akzeptiert. Ihre Berater werden unseren Seestreitkräften eine große Hilfe sein."
phi.7.a:0 "¡Arriba las Filipinas, arriba España!"
phi.8.d:0 "Die Japaner haben unser Angebot abgelehnt. Entweder halten sie es für den Aufwand nicht wert oder sie haben einen makaberen Grund, unserer Marine nicht zu helfen und keinen Nichtangriffspakt mit uns zu unterzeichnen."
phi.8.a:0 "Verdammt..."
phi.9.d:0 "Die Regierung der Philippinen, heute „Filipinas“, hat uns mit einem Vorschlag kontaktiert. Sie bietet uns militärische Unterstützung im Austausch für Rechte am Hafen von Shantou. Generäle beschwerten sich über die Idee, Menschen und Land für ein paar Waffen zu verkaufen. Aber vielleicht ist es für sie besser, von einem europäischen Staat regiert zu werden als von unseren Feinden."
phi.9.a:0 "Wir werden sie irgendwann befreien."
phi.9.b:0 "Sind sie betrunken?"
phi.10.d:0 "[From.GetLeader] hat unser Angebot angenommen. Jetzt weht die spanische Flagge über den Straßen von Shantou."
phi.10.a:0 "¡Arriba España!"
phi.11.d:0 "[From.GetLeader] hat das Angebot nicht nur abgelehnt, sondern uns auch geraten, ihre Zeit nicht zu verschwenden."
phi.11.a:0 "Bewachen Sie Ihre Häfen also gut …"
phi.12.d:0 "Nachrichten aus Manila haben unser Land erreicht. [From.GetLeader] hat erklärt, dass die Philippinen der [FROM.GetAdjective]-Regierung nicht mehr Rechenschaft ablegen werden, jedoch bereit sind, mit unserer Regierung zusammenzuarbeiten, um Blutvergießen zu verhindern. Sie haben versprochen, uns Militärstützpunkte in ihrem Heimatland zu gewähren, im Austausch dafür, dass sie diese im Kriegsfall schützen."
phi.12.a:0 "Fair genug."
phi.12.b:0 "Unsere Schiffe werden für uns antworten."
phi.13.d:0 "Nachdem wir endlich die Unabhängigkeit erlangt haben, fordert das Volk Neuwahlen, die die neue Situation des Landes widerspiegeln. Nach wochenlangem Wahlkampf und einem Tag intensiver Stimmenauszählung wurde der Sieger bekannt gegeben:"
phi.13.a:0 "Emilio Aguinaldo, der Kriegsheld!"
phi.13.b:0 "Manuel Roxas, der Liberale!"
phi.14.d:0 "[PHI.GetLeader] hat [POR.GetLeader] mit einem Vorschlag kontaktiert, der eher wie eine Bitte um einen Gefallen wirkte. Er erklärte, die iberischen Nationen müssten vereint bleiben gegen die Kräfte, die die Stabilität Europas bedrohen, einschließlich der Regierung, die derzeit Madrid kontrolliert. Die republikanische Exilregierung schlug vor, gemeinsam gegen sie in den Krieg zu ziehen, im Austausch für die Garantie unserer Unabhängigkeit und der Region Äquatorialguinea, sobald wir die tyrannische Regierung, die derzeit Spanien kontrolliert, besiegt hätten. Es scheint, als würden wir von diesem Deal fast nichts gewinnen, doch eine befreundete Regierung in unseren Grenzen würde uns sehr helfen, und außerdem hindert uns nichts daran, mehr Gebiete zu fordern als die versprochenen, sobald die Republikaner nach Madrid zurückkehren."
phi.14.a:0 "Wir müssen uns gegen die Bedrohungen durch Europa zusammenschließen."
phi.14.b:0 "Unser Volk wird nicht für ein Stück Dschungel sterben."
phi.15.d:0 "Die portugiesische Regierung hat unseren Vorschlag angenommen. Sobald wir dazu bereit sind, werden wir gemeinsam gegen die tyrannische Regierung in Madrid kämpfen."
phi.15.a:0 "Es lebe die Republik!"
phi.16.d:0 "Die portugiesische Regierung hat unseren Vorschlag abgelehnt. Wir müssen unser Heimatland allein befreien."
phi.16.a:0 "Es ist verständlich..."
phi.17.d:0 "Nachdem die spanische Exilregierung nun mit der Zweiten Reconquista begonnen hat, ist es an der Zeit, ihrem versprochenen Kriegsaufruf nachzukommen."
phi.18.d:0 "Die philippinische Regierung hat uns ein Abkommen vorgeschlagen. Darin heißt es, sie sehe sich mit ihren derzeitigen Streitkräften nicht in der Lage, ihr Land zu verteidigen. Deshalb fordert sie von uns die Garantie ihrer Unabhängigkeit. Im Gegenzug bietet sie unseren Armeen das Recht, Militärstützpunkte in ihrem Land zu errichten, sowie niedrigere Zölle für unsere Unternehmen im Land. Wie sollen wir reagieren?"
phi.18.a:0 "Die Demokratien der Welt müssen vereint bleiben."
phi.18.b:0 "Das ist es nicht wert."
phi.19.d:0 "[From.GetLeader] hat uns mit einem Vorschlag kontaktiert. Aufgrund der neuen Haltung der Regierung erklärte er, dass alle hispanischen Nationen in diesen schwierigen Zeiten vereint bleiben müssen. Er schlägt ein Wirtschaftsabkommen zwischen unseren Nationen sowie eine engere Zusammenarbeit unserer Armeen vor."
phi.19.a:0 "Die hispanischen Nationen müssen vereint bleiben."
phi.19.b:0 "Besser nicht."
phi.20.d:0 "[From.GetLeader] hat unser wirtschaftliches und militärisches Abkommen akzeptiert!"
phi.20.a:0 "Sauber!"
phi.21.d:0 "[From.GetLeader] hat unser wirtschaftliches und militärisches Abkommen leider abgelehnt."
phi.21.a:0 "Wirklich schade."
phi.22.d:0 "Die Zeit für die Unabhängigkeit der Philippinen ist gekommen. Wie 1935 beschlossen, genießen die Philippinen nun volle Autonomie. Im Gegenzug dürfen wir unsere Militärstützpunkte im Land behalten."
phi.22.a:0 "Viel Glück, Philippinen!"
phi.23.d:0 "Die Generaloberin der Philippinen hat einen Delegierten aus Manila geschickt, um uns einen Vorschlag zu unterbreiten. Sie sagt, dass mit der zunehmenden Popularität von Nationalismus und Kommunismus weltweit Kolonien weltweit über einen Aufstand gegen ihre Oberherren nachdenken könnten. Angesichts der Instabilität vieler europäischer Nationen aufgrund von Wirtschaftsproblemen und Kriegen könnten sie damit Erfolg haben. Daher wäre es ihrer Meinung nach am klügsten, unseren Kolonien durch die Gründung einer „Hispanischen Union“ mehr Autonomie zu vermitteln, wie es einige französische Politiker mit ihren Kolonien vorhatten. Wie sollten wir darauf reagieren?"
phi.23.a:0 "Eine interessante Idee."
phi.23.b:0 "Glauben sie, wir werden mit einer Kolonie verhandeln?"
phi.24.d:0 "Die Spanier haben unseren Vorschlag angenommen, jetzt erstrahlt die Hispanische Union in neuem Glanz!"
phi.24.a:0 "Alles nach Plan!"
phi.25.d:0 "Die Spanier haben unseren Vorschlag mit der Begründung abgelehnt, dass wir als Kolonie in den spanischen Angelegenheiten nichts zu sagen hätten."
phi.25.a:0 "Schade."
eng.1.d:0 "Es ist an der Zeit, über das Schicksal unseres gepachteten Hafens in China zu entscheiden."
eng.1.a:0 "Hongkong wird an China und die Kuomintang zurückgegeben."
eng.1.b:0 "[GXC.GetLeader] sollte dieses Gebiet verwalten."
eng.1.c:0 "Hongkong soll unter unserem Schutz die Unabhängigkeit gewährt werden."
eng.2.d:0 "Es ist an der Zeit, über das Schicksal unserer südlichen Inseln neben Argentinien zu entscheiden."
eng.2.a:0 "Der argentinische Anspruch auf die Inseln ist legitim."
eng.2.b:0 "Die Bevölkerung der Falklandinseln ist und bleibt Brite."
eng.3.d:0 "Es ist an der Zeit, über das Schicksal der Nordiren zu entscheiden."
eng.3.a:0 "Irland wird endlich vereint sein."
eng.3.b:0 "Nordirland hat seine Gründe, frei zu sein."
eng.3.c:0 "Die Nordiren haben 1921 dafür gestimmt, bei uns zu bleiben, wir werden sie nicht verraten."
eng.4.d:0 "Es ist an der Zeit, über das Schicksal Gibraltars zu entscheiden."
eng.4.a:0 "Es sind 200 Jahre vergangen, aber Sie haben es endlich zurück."
eng.4.b:0 "Die Spanier werden in ihrer derzeitigen Situation nicht in der Lage sein, ein derartiges Gebiet zu verwalten."
eng.5.d:0 "Es ist an der Zeit, über das Schicksal der Malteser zu entscheiden."
eng.5.a:0 "Sie verdienen Freiheit."
eng.5.b:0 "Italien hat bereits zuvor Interesse an der Region gezeigt. Wir könnten davon profitieren."
eng.5.c:0 "Wir könnten sie in unsere Verwaltung integrieren."
eng.6.d:0 "Es ist an der Zeit, über das Schicksal der Insel Zypern zu entscheiden, die zwischen ethnischen Griechen im Süden und ethnischen Türken im Norden aufgeteilt ist."
eng.6.a:0 "Griechenland hätte die Insel mehr verdient."
eng.6.b:0 "Die Türken sind viel näher an der Insel, sie sollten es bekommen."
eng.6.c:0 "Lassen Sie uns keinen Konflikt schaffen und ein unabhängiges Zypern schaffen."
eng.7.d:0 "Die Briten haben ihre Dekolonisierungskampagne begonnen und bieten uns nun einen Deal an. Sie bieten uns die Insel Malta an, die seit Jahrzehnten Teil des italienischen Irredentismus ist, im Austausch für einen Nichtangriffspakt und etwas Geld. Sollen wir den Deal annehmen?"
eng.7.a:0 "Schließlich ist Malta italienisch!"
eng.7.b:0 "Sie müssen etwas im Schilde führen."
eng.8.d:0 "Die Italiener haben unserem Abkommen zugestimmt. Zwischen unseren Nationen wurde ein Nichtangriffspakt unterzeichnet, und wir haben begonnen, ihre Zahlungen entgegenzunehmen."
eng.8.a:0 "Sauber!"
eng.9.d:0 "Die Italiener haben unseren Deal leider abgelehnt."
eng.9.a:0 "Dann sind wir wieder am Anfang."
eng.10.d:0 "Es ist an der Zeit, über das Schicksal des Suezkanals zu entscheiden."
eng.10.a:0 "Der Suezkanal soll in Ägypten bleiben."
eng.10.b:0 "Wir sollten im Kanal eine internationale Zone schaffen."
eng.11.d:0 "Die Briten haben ihre Entkolonialisierungskampagne begonnen und die Suez-Zone geschaffen, ein Gebiet, das vom Völkerbund verwaltet wird. Wir wurden eingeladen, diese Zone zu schützen, im Austausch für, wie man erwarten würde, militärischen Zugang und freie Durchfahrt durch die Region."
eng.11.a:0 "Fair genug."
eng.11.b:0 "Wir haben wichtigere Angelegenheiten zu erledigen."
eng.12.d:0 "Es ist an der Zeit, über das Schicksal unserer ostarabischen Besitztümer zu entscheiden."
eng.12.a:0 "Diese Gebiete werden ihren früheren Besitzern zurückgegeben."
eng.12.b:0 "Ein vereintes Arabisches Emirat ist die richtige Lösung."
eng.12.c:0 "Wir sollten jedes Gebiet einzeln freigeben."
eng.13.d:0 "Es ist an der Zeit, über das Schicksal von Britisch-Honduras zu entscheiden."
eng.13.a:0 "Im Austausch für dieses Gebiet könnten wir von Mexiko einige Gefälligkeiten erhalten."
eng.13.b:0 "Wir sollten den Anspruch Guatemalas auf diese Gebiete erfüllen."
eng.13.c:0 "Belize hat das Recht auf Freiheit."
eng.14.d:0 "Es ist an der Zeit, über das Schicksal unserer Gebiete in Amerika zu entscheiden."
eng.14.a:0 "Sie sollten alle unter einer Gewerkschaft freigelassen werden."
eng.14.b:0 "Jede Insel eine Republik!"
eng.15.d:0 "Es ist an der Zeit, über das Schicksal von Britisch-Guayana zu entscheiden."
eng.15.a:0 "Wir könnten es mit Venezuela im Austausch gegen einige Gefälligkeiten tauschen."
eng.15.b:0 "Den Menschen in Guyana sollte es gestattet sein, sich selbst zu regieren."
eng.16.d:0 "Es ist an der Zeit, über das Schicksal des Sudan zu entscheiden."
eng.16.a:0 "Die Union zwischen Ägypten und dem Sudan wird wiederhergestellt."
eng.16.b:0 "Der Sudan wird frei sein."
eng.17.d:0 "Es ist an der Zeit, über das Schicksal unserer südlichen Kolonien in Afrika zu entscheiden."
eng.17.a:0 "Eine Erweiterung der Südafrikanischen Union scheint eine gute Idee zu sein, nicht wahr?"
eng.17.b:0 "Botswana und Rhodesien werden ihr Schicksal selbst in die Hand nehmen."
eng.18.d:0 "Es ist an der Zeit, über das Schicksal unserer südlichen Kolonien in Afrika zu entscheiden."
eng.18.a:0 "Vielleicht können wir Portugal in unser Bündnis locken, wenn wir seinen alten Traum erfüllen."
eng.18.b:0 "Sambia und Malawi werden von einer einheimischen Regierung regiert."
britain.10.c:0 "Eine sozialdemokratische Regierung könnte unserem Volk in diesen schweren Zeiten Hoffnung geben."
aus.1.d:0 "Der deutsche Kaiser hat unserer Regierung einen Vorschlag unterbreitet. Im Zuge seiner neuen pangermanistischen Haltung erklärte er, alle Deutschen sollten sich gegen die Kräfte des Bolschewismus und der alten Entente zusammenschließen. Daher forderte er, dass sich Österreich endgültig mit Deutschland vereinigen müsse. Die deutsche Regierung schlägt ein hohes Maß an Autonomie vor, und unser Volk hat begonnen, seinen Wunsch nach einem Anschluss an Deutschland zu äußern. Wie sollen wir darauf reagieren?"
aus.1.a:0 "Österreich und Deutschland vereint, wie es sein sollte."
aus.1.b:0 "Nein, Österreichs Schicksal liegt woanders."
aus.2.d:0 "Die österreichische Regierung hat unser Angebot, sich unserem Land anzuschließen, abgelehnt. [GER.GetLeader] schien über die Haltung Österreichs sehr verärgert und erklärte, dass es viele andere Möglichkeiten gebe, Österreich in das Kaiserreich zu integrieren."
aus.2.a:0 "Es tut uns leid, aber das ist der einzige Weg."
aus.3.d:0 "In Österreich wurde eine Volksabstimmung über unseren Vorschlag abgehalten. Das Ergebnis war eindeutig: Das österreichische Volk will dem Deutschen Reich beitreten."
aus.3.a:0 "Zwei Brüder wieder zusammen."
aus.4.d:0 "Nach Starhembergs Entlassung aus der Regierung begann die Heimwehr unter seiner Führung einen Marsch nach Wien, ähnlich wie Hitler und Mussolini in den 1920er Jahren. Sie forderten den Rücktritt von Kurt Schuschnigg und die Machtübergabe an Starhemberg. Sie schienen davon überzeugt zu sein, dass die österreichische Regierung zusammenbrechen würde, doch stattdessen wurde das Bundesheer auf die Straße geschickt, um der Heimwehr entgegenzutreten. \n\nDie beiden Streitkräfte zielten aufeinander und warteten auf Befehle der Regierung, als es geschah:"
aus.4.a:0 "Schuschnigg übertrug die Macht an Starhemberg, genau wie Emmanuel III. es an Mussolini tat ..."
aus.4.b:0 "Es kam zu einem Kampf zwischen der Heimwehr und der Armee, der, genau wie 1934, zu Blutvergießen führte …"
aus.5.d:0 "Nachdem die österreichischen Nazis durch den erzwungenen Rücktritt von Kurt Schuschnigg die Macht im Land übernommen hatten, schlug [AUS.GetLeader] [GER.GetLeader] den Anschluss des Alpenstaates vor. Er betonte jedoch, dass das österreichische Volk Hitlers ursprünglichen Plan, der eine begrenzte österreichische Autonomie unter deutscher Führung vorsah, einer vollständigen Annexion vorziehen würde. Wie sollten wir reagieren?"
aus.5.a:0 "Fair genug."
aus.5.b:0 "Österreich wird sich vollständig mit dem Reich vereinigen!"
aus.6.d:0 "[GER.GetLeader] hat unseren Vorschlag angenommen und in seiner letzten Rede versprochen, dass die germanischen Völker unter der Fittiche Berlins und Wiens bald zu Größe gelangen werden."
aus.6.a:0 "Es hätte schlimmer kommen können, nicht wahr?"
aus.7.d:0 "[GER.GetLeader] hat unseren Vorschlag mit der Begründung abgelehnt, dass Österreichs Zukunft in der vollständigen Vereinigung mit dem Reich liege."
aus.7.a:0 "Meine Güte..."
aus.8.d:0 "[AUS.GetLeader] hat [GER.GetLeader] einen Vorschlag unterbreitet. Er weist darauf hin, dass die Tschechen und Sudetendeutschen seit Jahrhunderten Teil des österreichischen Kaiserreichs seien, und empfiehlt die Übertragung der Region an das Reichskommissariat Ostmark. Er teilte [GER.GetLeader] außerdem mit, dass die tschechischen Bürger Ostmark, wenn wir ihrem Vorschlag zustimmen, als einen alten Herrscher betrachten könnten, anstatt als einen Eindringling, wie sie Deutschland heute sehen."
aus.8.a:0 "Ein tolles Angebot!"
aus.8.b:0 "Sie sollten ihren Platz kennen."
aus.9.d:0 "[GER.GetLeader] hat sich geweigert, uns das Sudetenland und Tschechien zu übertragen, mit der Begründung, dass Österreich in deutschen Angelegenheiten nichts zu sagen habe."
aus.9.a:0 "Nun, wir haben es versucht!"
aus.10.desc:0 ". Dann sollen neue Reichskanzler sein:"
aus.10.a:0 "Heinrich Himmler, Führer der SS."
aus.10.b:0 "Reinhard Heydrich, Kommandant der Gestapo."
aus.10.c:0 "Hermann Göring, Ass der Luftwaffe."
aus.10.d:0 "Joseph Göbbels, der Propagandameister."
aus.11.d:0 "In einer Rede in Budapest forderte [AUS.GetLeader], dass seinen ungarischen Untertanen die Rückkehr unter seine Herrschaft gestattet werde. In einer Geste der Versöhnung erklärte er jedoch öffentlich, dass das ungarische Volk diese Entscheidung selbst treffen dürfe."
aus.11.a:0 "Lassen Sie die Menschen zu Wort kommen."
aus.11.b:0 "Solche Dinge sollten den Profis überlassen werden."
aus.11.c:0 "Wir sorgen für die richtigen Ergebnisse."
aus.12.d:0 "Die Ergebnisse des Referendums liegen vor und die vorläufigen Auszählungen zeigen eine deutliche Mehrheit für die Union mit Österreich."
aus.12.a:0 "Das Volk hat gesprochen."
aus.13.d:0 "Trotz einer gut orchestrierten Kampagne pro-österreichischer Gruppen und Monarchisten zeigen vorläufige Ergebnisse eine knappe Mehrheit für die Beibehaltung des Status quo."
aus.13.a:0 "Kluge Wahl."
aus.14.d:0 "Kurz nach Mitternacht gab [HUN.GetLeader] bekannt, dass das ungarische Volk für eine Union mit Österreich gestimmt habe. Ein Telegramm ist eingetroffen, in dem [AUS.GetLeader] offiziell die ungarische Krone angeboten wird, als erster Schritt zur Wiederbelebung der Doppelmonarchie."
aus.14.a:0 "Exzellent."
aus.15.d:0 "Trotz unserer größten Bemühungen hat sich das ungarische Volk dazu entschieden, den Status quo beizubehalten."
aus.15.a:0 "Wir müssen das Land befreien und es seinem rechtmäßigen Herrscher zurückgeben."
aus.15.b:0 "Wir werden das Ergebnis respektieren."
aus.16.d:0 "Der ungarische Staatschef [HUN.GetLeader] hat öffentlich erklärt, dass das ganze Land in seiner Opposition gegen die Habsburger vereint sei und dass die bloße Idee eines Referendums über die Unabhängigkeit Ungarns völlig absurd sei."
aus.16.a:0 "Wir werden sehen, wie einig sie wirklich sind."
aus.16.b:0 "„Demokratie“ am Werk."
aus.17.d:0 "Das österreichische Angebot eines Referendums hat uns international in eine schwierige Lage gebracht. Wir können dem Volk zwar keine Wahl verwehren, aber wir können ihm nicht vertrauen, dass es die richtige Entscheidung trifft. Glücklicherweise gibt es Mittel und Wege, das Problem zu lösen. Welches Ergebnis wünschen wir uns vom Referendum?"
aus.17.a:0 "Die Leute lehnen ab"
aus.17.b:0 "Die Leute sind sich einig"
aus.18.d:0 "[AUS.GetLeader] hat uns einen Vorschlag unterbreitet: Die Region Südslowakei soll Ungarn im Austausch gegen eine Zahlung und ein Bündnis angeboten werden. Einige unserer Minister haben sich bereits gegen den österreichischen Vorschlag ausgesprochen. Da jedoch fast die gesamte Bevölkerung der Region Ungarn ist, wäre es für uns äußerst nützlich, uns keine Sorgen um unsere Südgrenze machen zu müssen."
aus.18.a:0 "Der einzige Weg, den Frieden zu sichern."
aus.18.b:0 "Der Preis ist zu hoch..."
aus.19.d:0 "[CZE.GetLeader] und [AUS.GetLeader] haben uns die Rückgabe der Südslowakei angeboten, einer Region, die fast ausschließlich von Ungarn bewohnt ist. Im Gegenzug für ein Bündnis mit uns und die Zahlung einer angemessenen Summe an die tschechoslowakische Regierung boten sie uns die Rückgabe der Südslowakei an. Die Antwort von [HUN.GetLeader] lautete:"
aus.19.a:0 "Endlich Frieden!"
aus.19.b:0 "Für die Tschechoslowakei haben wir andere Pläne."
aus.20.d:0 "Unsere Bemühungen, die Ungarn auf unsere Seite zu ziehen, sind gescheitert."
aus.20.a:0 "Wirklich schade."
aus.21.d:0 "[AUS.GetLeader] hat uns mit einem Vorschlag kontaktiert: Bulgarien solle die Region Dobrudscha im Austausch gegen eine Zahlung und ein Bündnis anbieten. Einige unserer Minister haben sich bereits gegen den österreichischen Vorschlag ausgesprochen. Allerdings ist fast die gesamte Bevölkerung der Region bulgarisch, und es wäre äußerst nützlich, sich keine Sorgen um unsere Südgrenze machen zu müssen."
aus.21.a:0 "Der einzige Weg, den Frieden zu sichern."
aus.21.b:0 "Der Preis ist zu hoch..."
aus.22.d:0 "[ROM.GetLeader] und [AUS.GetLeader] haben uns die Rückgabe der Dobrudscha angeboten, einer Region, die fast ausschließlich von Bulgaren bewohnt ist, im Austausch für ein Bündnis mit uns und die Zahlung einer angemessenen Summe an die rumänische Regierung. Die Antwort von [BUL.GetLeader] lautete:"
aus.22.a:0 "Endlich Frieden!"
aus.22.b:0 "Für Rumänien haben wir andere Pläne."
aus.23.d:0 "Unsere Bemühungen, die Bulgaren auf unsere Seite zu ziehen, sind gescheitert."
aus.23.a:0 "Wirklich schade."
aus.24.d:0 "Gemäß dem Vertrag von Saint-Germain und den Genfer Protokollen ist es Österreich und Deutschland untersagt, sich zu einer Nation zu vereinigen. Der Völkerbund erklärte, dass Deutschland, sollte es jemals versuchen, sich mit Österreich zu vereinigen, mit aller Gewalt verteidigt würde. \n\nSeit der Weltwirtschaftskrise hat sich das Blatt jedoch gewendet. Unsere Volkswirtschaften sind nicht mehr so stark wie früher, und unsere Bevölkerung wird wahrscheinlich nicht bereit sein, für den Schutz einer fremden Nation zu sterben. [AUS.GetLeader] betont, dass wir den Vertrag respektieren müssen, zu dessen Unterzeichnung wir sie 1918 gezwungen haben, doch unsere Politiker sind anderer Meinung."
aus.24.a:0 "Der Vertrag muss eingehalten werden!"
aus.24.b:0 "Wir sollten ihnen zumindest beim Wiederaufbau ihrer Armee helfen."
aus.24.c:0 "Wir können nicht zulassen, dass unser Volk in einem weiteren grausamen Krieg in der Fremde stirbt."
aus.25.d:0 "[FROM.GetLeader] hat eine Rede gehalten, in der er erklärt, dass sein Land die Unabhängigkeit Österreichs vor jedem Land schützen wird, das es wagt, sie zu bedrohen. Er hat außerdem mit dem Transport militärischer Ausrüstung nach Wien begonnen, um unserer Armee zu helfen, unsere Feinde im Kampf effizienter zu bekämpfen."
aus.25.a:0 "Perfekt."
aus.26.d:0 "[FROM.GetLeader] hat sich geweigert, unsere Unabhängigkeit vollständig zu garantieren, hat jedoch mit dem Transport militärischer Ausrüstung nach Wien begonnen, um unserer Armee zu helfen, die Deutschen am Tag der Entscheidung effizienter zu bekämpfen."
aus.26.a:0 "Nun, zumindest versuchen sie zu helfen …"
aus.27.d:0 "[FROM.GetLeader] hat sich geweigert, unserem Land jegliche Unterstützung zukommen zu lassen und erklärt, dass sie nicht bereit sind, ihre Jugend erneut in den Tod für ein fremdes Land zu schicken."
aus.27.a:0 "Verräter, Verräter, ihr alle!"
bol.1.d:0 "Heute wurde in Bolivien ein sozialistischer Staatsstreich durchgeführt. Angeführt von Armee, Sozialisten und Sozialdemokraten, stürzte der von den Kriegshelden des Chaco-Krieges José David Toro und Germán Busch angeführte Putsch die liberale Regierung von José Luís Tejada, da diese die aktuellen Probleme Boliviens nicht lösen konnte. Viele Menschen sehen den Putsch als Chance auf eine bessere Zukunft, doch die Zeit wird zeigen, ob dies zutrifft."
bol.1.a:0 "Hoffentlich ist es das."
bol.2.d:0 "Eine bolivianische Delegation ist mit uns in Kontakt getreten, um über die Punkte des endgültigen Friedensvertrags im Chaco-Krieg zu verhandeln. In der ersten Verhandlungsstunde forderten die Bolivianer Zugangsrechte zum Río Paraguay, um Handel mit Überseeländern treiben zu können. Im Gegenzug verzichteten sie auf die Rückeroberung des Chaco. Nun liegt es in unserer Hand, diesem Vorschlag zuzustimmen oder ihn abzulehnen."
bol.2.a:0 "Endlich Frieden!"
bol.2.b:0 "Ein Löwe verhandelt nicht mit Mäusen."
bol.3.d:0 "Unsere Delegation ist unter dem Jubel der Bevölkerung nach La Paz zurückgekehrt. Der endgültige Friedensvertrag mit Paraguay wurde unterzeichnet, und obwohl wir auf den Chaco Boreal verzichtet haben, ist es uns gelungen, die Kontrolle über den bolivianischen Chaco zu behalten und Zugang zum Río Paraguay zu erhalten, um mit den Ländern in Übersee Handel treiben zu können."
bol.3.a:0 "Endlich Frieden."
bol.4.d:0 "Unsere Delegation ist mit leeren Händen nach La Paz zurückgekehrt. Die Verhandlungen mit Paraguay scheiterten bereits am ersten Tag, und obwohl wir weiterhin die Kontrolle über den bolivianischen Chaco haben, haben die Paraguayer ihren Anspruch auf die Region nicht aufgegeben. Hoffentlich kommt es nicht zu einem zweiten Chaco-Krieg."
bol.4.a:0 "Nun, wir haben es versucht."
bol.5.d:0 "Heute Morgen wurde Germán Buschs Leiche in seinem Haus gefunden. Sein Kopf lag auf seinem Schreibtisch, durchbohrt von einer Kugel des Kalibers .32. Die Autopsie dauerte länger als erwartet, und eine nachlässige Untersuchung ergab, dass es sich bei seinem Tod eindeutig um Selbstmord handelte, obwohl viele Menschen das anders sehen. \n\nDennoch muss das Land weitermachen, und nun werden unter der provisorischen Regierung von Carlos Quintanilla Wahlen vorbereitet."
bol.5.a:0 "Zumindest ist dies die Rückkehr der Demokratie ... oder?"
bol.6.d:0 "Es scheint, dass viele [This.GetAdjective]-Bauern beginnen, die Idee einer Vereinigung mit Bolivien zu unterstützen, wie wir es 1836 taten. Obwohl es sich derzeit um eine kleine Bewegung handelt, befürchten viele [This.GetAdjective]-Funktionäre, dass [This.GetNameDef] durchaus mit landesweiten Streiks und sogar einem Anstieg des linken Paramilitarismus konfrontiert sein könnte, wenn diese Aktivisten nicht umgehend für die Förderung dieser Idee bestraft werden."
bol.6.a:0 "Besorgniserregend."
bol.7.d:0 "[BOL.GetLeader] hat sich an unsere Regierung gewandt und die Wiedervereinigung beider Nationen vorgeschlagen, so wie wir es 1836 unter der Peru-Bolivianischen Konföderation getan haben. Unser Volk und unsere Regierung erinnern sich jedoch noch daran, wie diese Union endete, gespalten durch peruanische Rebellen sowie chilenische und argentinische Truppen. Wir erinnern uns auch daran, wie sie uns 1879 in einen Krieg gegen Chile verwickelten, um dann feige zu kapitulieren und uns allein gegen sie kämpfen zu lassen. Was sollen wir also tun?"
bol.7.a:0 "Bajo und Alto Peru, wieder vereint!"
bol.7.b:0 "Wir werden mit diesen Feiglingen nicht zusammenarbeiten."
bol.8.d:0 "Die Peruaner haben ein Referendum abgehalten, um ihre Bevölkerung zu fragen, ob sie sich wieder mit Bolivien vereinigen möchte. Rund 85 % der Stimmen stimmten für „Nein“ und zeigten damit unserer Regierung, dass das peruanische Volk kein Interesse an einem Beitritt zu unserer Nation hat."
bol.8.a:0 "So funktioniert Demokratie."
bol.9.desc:0 "Peru und Bolivien haben sich wie 1836 wieder vereinigt. Das wäre für uns kein Problem, wenn es nicht den peruanischen und bolivianischen Irredentismus gäbe. Sie erheben Anspruch auf den paraguayischen Chaco, die chilenischen Regionen Tarapacá und Antofagasta sowie die ecuadorianische Region Pastaza, und Teile ihrer Regierung erheben sogar Anspruch auf das brasilianische Acre. [ROOT.GetLeader] hat vorgeschlagen, ein Verteidigungsbündnis mit Argentinien und Paraguay zu bilden, obwohl einige seiner Minister behaupten, er reagiere über."
bol.9.a:0 "Argentinien muss geschützt werden."
bol.9.b:0 "Paraguay muss geschützt werden."
bol.9.c:0 "Unsere Brüder müssen beschützt werden."
bol.9.d:0 "Wir sollten nicht so paranoid sein."
bol.10.desc:0 "Peru und Bolivien haben sich wie 1836 wieder vereinigt. Das wäre für uns kein Problem, wenn es nicht den peruanischen und bolivianischen Irredentismus gäbe. Sie erheben Anspruch auf den paraguayischen Chaco, die chilenischen Regionen Tarapacá und Antofagasta sowie die ecuadorianische Region Pastaza, und Teile ihrer Regierung erheben sogar Anspruch auf das brasilianische Acre. [ROOT.GetLeader] hat vorgeschlagen, ein Verteidigungsbündnis mit Chile und Paraguay zu bilden, obwohl einige seiner Minister behaupten, er reagiere über."
bol.10.a:0 "Chile muss geschützt werden."
bol.10.b:0 "Paraguay muss geschützt werden."
bol.10.c:0 "Unsere Brüder müssen beschützt werden."
bol.10.d:0 "Wir sollten nicht so paranoid sein."
bol.11.desc:0 "Peru und Bolivien haben sich wie 1836 wieder vereinigt. Das wäre für uns kein Problem, wenn es nicht den peruanischen und bolivianischen Irredentismus gäbe. Sie erheben Anspruch auf den paraguayischen Chaco, die chilenischen Regionen Tarapacá und Antofagasta sowie die ecuadorianische Region Pastaza, und Teile ihrer Regierung erheben sogar Anspruch auf das brasilianische Acre. [ROOT.GetLeader] hat vorgeschlagen, ein Verteidigungsbündnis mit Argentinien und Chile zu bilden, obwohl einige seiner Minister behaupten, er reagiere über."
bol.11.a:0 "Argentinien muss geschützt werden."
bol.11.b:0 "Chile muss geschützt werden."
bol.11.c:0 "Unsere Brüder müssen beschützt werden."
bol.11.d:0 "Wir sollten nicht so paranoid sein."
bol.12.d:0 "Es scheint, dass viele Arbeiter von [This.GetAdjective] beginnen, die Idee einer Vereinigung mit Bolivien zu unterstützen, wie wir es 1836 taten. Obwohl es sich derzeit um eine kleine Bewegung handelt, befürchten viele [This.GetAdjective]-Funktionäre, dass [This.GetNameDef] durchaus mit landesweiten Streiks und sogar einem Anstieg des faschistischen Paramilitarismus konfrontiert sein könnte, wenn diese Aktivisten nicht umgehend für die Förderung dieser Idee bestraft werden."
bol.12.a:0 "Besorgniserregend."
bol.13.d:0 "In Erinnerung an die Schrecken des Ersten Chaco-Krieges und aus Angst vor der schwachen Leistung bei der jüngsten Invasion des Chaco traten Tausende Arbeiter in La Paz und Santa Cruz in Streik. Als Germán Busch der Polizei befahl, die Streikenden wegen Hochverrats anzuklagen, schloss sich die Polizei den Randalierern an. Der Todesstoß erfolgte, als einige bolivianische Divisionen den Befehlen der Regierung nicht mehr folgten und aus der Armee desertierten. \n\nSchließlich drang eine Gruppe von Milizen mit einigen Polizisten unter der Führung von General Carlos Quintanilla in das Regierungsgebäude ein und ermordete Germán Busch. Anschließend verkündeten sie im Radio, dass Frieden mit Paraguay das ultimative Ziel der provisorischen Junta sei und Wahlen abgehalten würden, sobald im Land wieder Stabilität hergestellt sei."
bol.13.a:0 "Barbarisch."
bol.14.d:0 "Die bolivianische Botschaft hat uns mit einer Nachricht von [BOL.GetLeader] kontaktiert, in der sie erklärt, dass sie bereit sei, uns die Kontrolle über Asunción im Austausch für ein Verteidigungsbündnis zwischen unseren Nationen zu übertragen. Dies wird sicherlich unser Regime verärgern und die Staaten Chile und Brasilien beunruhigen, dennoch gibt es viele Gründe, den bolivianischen Vorschlag anzunehmen."
bol.14.a:0 "Scheint ein gutes Geschäft zu sein."
bol.14.b:0 "Wir können es uns nicht leisten, andere lateinamerikanische Nationen zu verärgern."
bol.15.d:0 "Argentinien hat unseren Deal akzeptiert. Die Kontrolle über Asunción wurde an die Argentinier übertragen und zwischen unseren Nationen wurde ein Verteidigungsbündnis unterzeichnet."
bol.15.a:0 "Perfekt."
bol.16.d:0 "Argentinien hat unser Abkommen abgelehnt. Asunción soll unter bolivianischer Kontrolle bleiben."
bol.16.a:0 "Ihr Verlust."
bol.17.desc:0 "Gerüchte, Peru, Bolivien und Argentinien planten eine Teilung Südamerikas, sind in allen Ländern der Region zu hören. Sie erheben Anspruch auf ganz Chile und Uruguay sowie auf Teile Brasiliens. [ROOT.GetLeader] hat vorgeschlagen, ein Verteidigungsbündnis mit Brasilien und Uruguay zu bilden. Einige seiner Minister halten ihn jedoch für überzogen."
bol.17.a:0 "Brasilien muss geschützt werden."
bol.17.b:0 "Uruguay muss geschützt werden."
bol.17.c:0 "Unsere Brüder müssen beschützt werden."
bol.17.d:0 "Wir haben noch andere Angelegenheiten zu erledigen."
bol.18.desc:0 "Gerüchte, Peru, Bolivien und Argentinien planten eine Teilung Südamerikas, sind in allen Ländern der Region zu hören. Sie erheben Anspruch auf ganz Chile und Uruguay sowie auf Teile Brasiliens. [ROOT.GetLeader] hat vorgeschlagen, ein Verteidigungsbündnis mit Chile und Uruguay zu bilden, doch einige seiner Minister halten ihn für überzogen."
bol.18.a:0 "Chile muss geschützt werden."
bol.18.b:0 "Uruguay muss geschützt werden."
bol.18.c:0 "Unsere Brüder müssen beschützt werden."
bol.18.d:0 "Wir haben noch andere Angelegenheiten zu erledigen."
bol.19.desc:0 "Gerüchte, Peru, Bolivien und Argentinien planten eine Teilung Südamerikas, sind in allen Ländern der Region zu hören. Sie erheben Anspruch auf ganz Chile und Uruguay sowie auf Teile Brasiliens. [ROOT.GetLeader] hat vorgeschlagen, ein Verteidigungsbündnis mit Brasilien und Chile zu bilden. Einige seiner Minister halten ihn jedoch für überzogen."
bol.19.a:0 "Brasilien muss geschützt werden."
bol.19.b:0 "Chile muss geschützt werden."
bol.19.c:0 "Unsere Brüder müssen beschützt werden."
bol.19.d:0 "Wir haben noch andere Angelegenheiten zu erledigen."
bol.19.d:0 "Gerüchte, Peru, Bolivien und Argentinien planten eine Teilung Südamerikas, sind in allen Ländern der Region zu hören. Sie erheben Anspruch auf ganz Chile und Uruguay sowie auf Teile Brasiliens. [ROOT.GetLeader] hat vorgeschlagen, ein Verteidigungsbündnis mit Brasilien und Chile zu bilden. Einige seiner Minister halten ihn jedoch für überzogen."
bol.19.a:0 "Brasilien muss geschützt werden."
bol.19.b:0 "Chile muss geschützt werden."
bol.20.d:0 "Unser Staat braucht eine Marine, und dafür brauchen wir zunächst eine Küste. Ein Marsch nach Rio de Janeiro oder Buenos Aires durch das Amazonasgebiet oder den Chaco ist unmöglich. Doch es gibt zwei weitere Nachbarstaaten mit einer Küste: Peru und Chile. Auf der einen Seite Peru, ein von Bergen und Dschungeln geschütztes Land mit einer größeren Bevölkerung als wir und Chile, aber einer relativ unorganisierten Armee und einer ähnlichen Kultur wie wir, was es leicht macht, im Land eine Kollaborationsstimmung zu entfachen. Auf der anderen Seite Chile, ein Land, das im Norden von der Wüste der Atacama und im Osten von den Anden geschützt wird, aber über eine gut vorbereitete Armee verfügt, die seit Ende des 19. Jahrhunderts von deutschen Offizieren ausgebildet wird. Wer soll also unser neues Ziel sein?"
bol.20.a:0 "Die Desorganisation der Peruaner wird uns den Sieg bringen."
bol.20.b:0 "Die Schwäche der Chilenen soll uns den Sieg bringen."
bol.21.d:0 "Nachdem sich die Situation in [BOL.GetNameDef] stabilisiert hat, ist es an der Zeit, den neuen Leiter der [BOL.GetLeader]-Administration zu wählen."
bol.21.a:0 "Carl Friedrich, der konservative Monarchist."
bol.21.b:0 "Hellmuth von Mücke, der große Kriegsheld."
bol.21.c:0 "Eitel Friedrich, Sohn Wilhelms II."
bol.22.d:0 "Nachrichten von [BOL.GetNameDef] haben unser Land erreicht. [BOL.GetLeader] hat erklärt, dass [BOL.GetNameDef] der [ROOT.GetAdjective]-Regierung nicht mehr Rechenschaft ablegen wird, jedoch bereit ist, mit unserer Regierung zusammenzuarbeiten, um Blutvergießen zu verhindern. Sie haben versprochen, uns Militärstützpunkte in ihrem Heimatland zu gewähren, im Austausch dafür, dass sie diese im Kriegsfall schützen."
bol.22.a:0 "Fair genug."
bol.22.b:0 "Unsere Schiffe werden für uns antworten."
bol.23.d:0 "Da wir nun dabei sind, unsere Gebiete zu erweitern, ist es an der Zeit zu entscheiden, was mit unserer neuen Regierung geschehen soll. Es gibt zwei Möglichkeiten: die Installation einer Marionettenregierung unter dem Militär, so wie wir es 1934 getan haben, oder die Installation einer Galionsfigur und die Beibehaltung der aktuellen Militärjunta."
bol.23.a:0 "Wir können ihn immer noch verbannen, wenn etwas passiert."
bol.23.b:0 "Die Junta wird bis zum Ende führen."
bol.24.d:0 "Vertreter von [FROM.GetNameDef] haben unser Land besucht und sich mit vielen unserer Politiker getroffen, in der Hoffnung, Unterstützung für ihr Investitionsprogramm zu gewinnen. Die Regierung von [FROM.GetNameDef] möchte, dass wir unsere Ressourcen zur Verbesserung ihrer eigenen industriellen Kapazitäten und Produktion nutzen. [FROM.GetAdjective]-Beamte haben geschlussfolgert, dass wir durch die Unterstützung ihres Landes in Zukunft selbst mit Hilfe in Form eines Militärbündnisses zwischen unseren Nationen rechnen können."
bol.24.a:0 "Wenn sie Hilfe brauchen, dann sollen sie diese Hilfe bekommen."
bol.24.b:0 "Wir werden ihren faustischen Pakt nicht unterzeichnen."
lar_spain.34.t:0 "Die Nachfolgefrage"
lar_spain.34.desc:0 "Mit dem Tod des kinderlosen Alfons Karl erlosch die Linie der Karlisten, was zu einer Spaltung der Karlistenbewegung führte.\n\nManche unterstützen den Anspruch des von Alfons Karl selbst ernannten Nachfolgers Xaver von Bourbon-Parma, doch dieser hat keinen dynastischen Anspruch auf den Thron. Andere wiederum unterstützen den Anspruch des im Exil lebenden Königs Alfons XIII., der zwar ein Spross der verräterischen Linie Isabellas II. ist, aber dennoch einen dynastischen Anspruch auf den Thron hat. Dennoch ist in jüngster Zeit eine neue Bewegung unter den Karlisten entstanden, die Karl Pius von Habsburg, von seinen Anhängern als Karl VIII. bekannt, als beste Wahl für die spanische Krone ansieht.\n\nWenn diese Frage nicht rasch geklärt wird, könnte unsere Unterstützung in verschiedene streitende Lager zersplittern."
lar_spain.34.a:0 "Der Wille des Königs muss geschehen. Xavier soll unser neuer König werden!"
lar_spain.34.a_tt:0 "Xavier von Bourbon-Parma wird nach der Wiedereinführung der Monarchie König.\n"
lar_spain.34.b:0 "Die dynastische Kontinuität muss gewahrt werden. Alfons XIII. soll unser König sein!"
lar_spain.34.b_tt:0 "Alfons XIII. wird nach der Wiedereinführung der Monarchie König.\n"
lar_spain.34.c:0 "Die spanischen Könige haben ihr Volk nur misshandelt. Carlos VIII. soll unser König sein!"
lar_spain.34.c_tt:0 "Karl Pius von Habsburg wird nach der Wiedereinführung der Monarchie König.\n"
cze.1.d:0 "[CZE.GetLeader] hat sich direkt an [ROOT.GetLeader] gewandt und ein Verteidigungsbündnis zwischen unseren Nationen vorgeschlagen. Er erklärte, dass wir unsere Differenzen beilegen müssten, um dem deutschen Irredentismus widerstehen zu können."
cze.1.a:0 "Es ist die einzige Option."
cze.1.b:0 "Dafür ist es zu spät, [CZE.GetLeader]."
cze.2.d:0 "Unser Vorschlag eines Militärbündnisses wurde angenommen. Da Österreich nun auf unserer Seite steht, haben wir möglicherweise eine Chance gegen die Deutschen."
cze.2.a:0 "Perfekt!"
cze.3.d:0 "Unser Vorschlag für ein Militärbündnis wurde abgelehnt. Vielleicht haben sie andere Pläne für unser Land."
cze.3.a:0 "Wir sollten unsere Grenzen vorsichtshalber verstärken."
cze.4.d:0 "Karel Kramář ist bereits für seine monarchistischen Neigungen bekannt. Nach unserer Unabhängigkeit am Ende des Ersten Weltkriegs unterstützte er die Einsetzung eines Romanows als König unseres Landes. Nun äußert er erneut die Meinung, dass ein Monarch an der Spitze des tschechoslowakischen Volkes notwendig sei, und diesmal scheint er seine Genossen überzeugen zu können. \n\nZwei Kandidaten für den Thron stehen zur Auswahl: Maximilian Lobkowicz, bekannt für seine Tätigkeit als Abgeordneter im tschechoslowakischen Parlament in der Zwischenkriegszeit, und Vladimir Romanov, einer der Erben des Hauses Romanow, das nach der feigen Ermordung der Familie Nikolaus II. durch die Sowjets beinahe ausgelöscht worden wäre. \n\nWer wird also der neue König unseres Volkes?"
cze.4.a:0 "Maximilian von Lobkowicz von Böhmen."
cze.4.b:0 "Wladimir Romanow aus Russland."
cze.5.d:0 "[ROOT.GetLeader] versprach der Tschechoslowakei einst, sie im Falle einer Invasion vor Deutschland zu schützen. Und nun glauben die Tschechen, dass dieser Tag näher ist denn je. \n\nUnsere Nation ist jedoch nicht auf einen weiteren Großen Krieg vorbereitet, und unser Volk wird wahrscheinlich nicht bereit sein, für den Schutz einer fremden Nation zu sterben. [CZE.GetLeader] betont, dass wir die deutsche Aggression eindämmen müssen, bevor es zu spät ist, doch unsere Politiker sind anderer Meinung."
cze.5.a:0 "Wir machen keine leeren Versprechungen!"
cze.5.b:0 "Wir sollten ihnen zumindest beim Wiederaufbau ihrer Armee helfen."
cze.5.c:0 "Wir können nicht zulassen, dass unser Volk in einem weiteren grausamen Krieg in der Fremde stirbt."
cze.6.d:0 "[FROM.GetLeader] hat eine Rede gehalten, in der er erklärt, dass sein Land die Unabhängigkeit der Tschechen vor jedem Land schützen wird, das es wagt, sie zu bedrohen. Er hat außerdem mit dem Transport militärischer Ausrüstung nach Praga begonnen, um unserer Armee zu helfen, unsere Feinde im Kampf gegen den Feind effizienter zu bekämpfen."
cze.6.a:0 "Perfekt."
cze.7.d:0 "[FROM.GetLeader] hat sich geweigert, unsere Unabhängigkeit vollständig zu garantieren, hat jedoch mit dem Transport militärischer Ausrüstung nach Praga begonnen, um unserer Armee zu helfen, die Deutschen am Tag der Entscheidung effizienter zu bekämpfen."
cze.7.a:0 "Nun, zumindest versuchen sie zu helfen …"
cze.8.d:0 "[FROM.GetLeader] hat sich geweigert, unserem Land jegliche Unterstützung zukommen zu lassen und erklärt, dass sie nicht bereit sind, ihre Jugend erneut in den Tod für ein fremdes Land zu schicken."
cze.8.a:0 "Verräter, Verräter, ihr alle!"
cze.9.d:0 "Zwischen der Sowjetunion und der Tschechoslowakei fanden Verhandlungen über einen möglichen deutschen Angriff statt. Wir können sie jedoch nicht wirklich unterstützen, solange wir keine gemeinsame Grenze mit ihnen haben oder militärischen Zugang zu einem Nachbarland haben. Daher sollten wir ernsthaft darüber nachdenken, ob es möglich ist, den Zerfall der Tschechoslowakei zu verhindern."
cze.9.a:0 "Alles, um die Ausbreitung des Nationalsozialismus zu stoppen."
cze.9.b:0 "Wir sollten ihnen zumindest beim Wiederaufbau ihrer Armee helfen."
cze.9.c:0 "Wir haben keine Möglichkeit, sie wirklich zu unterstützen."
cze.10.d:0 "[FROM.GetLeader] hat sich geweigert, unserem Land jegliche Unterstützung zukommen zu lassen, mit der Begründung, dass es außerhalb ihrer Möglichkeiten liege, uns in einem Krieg gegen Deutschland zu helfen."
cze.10.a:0 "Danke für nichts..."
cze.11.d:0 "Aufgrund des Drucks Deutschlands und des Verrats der Entente war Edvard Beneš gezwungen, das Sudetenland aufzugeben, eine Region, die hauptsächlich von Deutschen, aber auch von Tschechen bewohnt war. Nach der Unterzeichnung des von [GER.GetLeader] aufgezwungenen Abkommens kündigte Edvard Beneš seinen Rücktritt an und verließ das Land. \n\nNun steckt die Regierung in einer Krise und General Jan Syrový wurde zum provisorischen Präsidenten der Nation ernannt. Er erklärt, er sei kein Politiker und die Tschechoslowakei sollte von einem zivilen Führer geführt werden, während in den Straßen von Praga Gerüchte aufkommen, dass die NOF und Radola Gadja die Regierung stürzen und die Deutschen bekämpfen wollten. \n\nWer sollte also zum Führer der Tschechoslowaken ernannt werden?"
cze.11.a:0 "Emil Hácha ist der richtige Mann, um uns zu führen."
cze.11.b:0 "Verzweifelte Zeiten erfordern verzweifelte Maßnahmen. Jan Syrový wird es sein."
cze.11.c:0 "Nur Radola Gajda kann uns jetzt retten!"
bra.1.d:0 "[BRA.GetLeader] hat unsere Regierung gefragt, ob wir bereit wären, Französisch-Guayana an sie abzutreten. Er erklärt, dass Brasilien nicht nur besser in der Lage sei, die Region gegen die Achsenmächte zu verteidigen, sondern dass dies auch eine angemessene Entschädigung für all die brasilianischen Todesopfer wäre, die dieser Krieg gefordert hat. Er weiß, dass Brasilien nach einer endgültigen Niederlage der Achsenmächte offensichtlich kein Territorium von ihnen zurückgewinnen wird. Wie sollen wir reagieren?"
bra.1.a:0 "Okay, sie haben es verdient."
bra.1.b:0 "Was, glauben sie, sie hätten Almosen verdient, weil sie ein paar Konvois versenkt haben?"
bra.2.d:0 "[BRA.GetLeader] hat unsere Regierung gefragt, ob wir bereit wären, Niederländisch-Guayana an sie abzutreten. Er erklärt, dass Brasilien nicht nur besser in der Lage sei, die Region gegen die Achsenmächte zu verteidigen, sondern dass dies auch eine angemessene Entschädigung für all die brasilianischen Todesopfer wäre, die dieser Krieg gefordert hat. Er weiß, dass Brasilien nach einer endgültigen Niederlage der Achsenmächte offensichtlich kein Territorium von ihnen zurückgewinnen wird. Wie sollen wir reagieren?"
bra.2.a:0 "Okay, sie haben es verdient."
bra.2.b:0 "Was, glauben sie, sie hätten Almosen verdient, weil sie ein paar Konvois versenkt haben?"
bra.3.d:0 "[BRA.GetLeader] hat unsere Regierung gefragt, ob wir bereit wären, Britisch-Guayana an sie abzutreten. Er erklärt, dass Brasilien nicht nur besser in der Lage sei, die Region gegen die Achsenmächte zu verteidigen, sondern dass dies auch eine angemessene Entschädigung für all die brasilianischen Todesopfer wäre, die dieser Krieg gefordert hat. Er weiß, dass Brasilien nach einer endgültigen Niederlage der Achsenmächte offensichtlich kein Territorium von ihnen zurückgewinnen wird. Wie sollen wir reagieren?"
bra.3.a:0 "Okay, sie haben es verdient."
bra.3.b:0 "Was, glauben sie, sie hätten Almosen verdient, weil sie ein paar Konvois versenkt haben?"
bra.4.d:0 "[FROM.GetLeader] hat unsere Petition ohne klare Begründung abgelehnt. Sie scheinen nicht bereit zu sein, sich endgültig von ihrem kolonialistischen Gedankengut zu lösen."
bra.4.a:0 "Warum haben wir uns wieder ihrer Seite angeschlossen?"
bra.5.d:0 "Nach der Gründung der Revolutionären Front zum Sturz Müllers, die sich aus Anhängern von Getúlio Vargas, Integralisten und Monarchisten zusammensetzte, kontaktierten Mitglieder der linken Aliança Nacional Libertadora Armeechef Eurico Gaspar Dutra, um ihm ihre Unterstützung im Kampf gegen den Verrückten anzubieten. Sie erklärten, dass sie sich während der Prestes-Kolonne, einem Aufstand gegen die Oligarchen im Jahr 1925, bewährt hätten. Dieser Aufstand konnte zwar die Regierung nicht besiegen, zog aber durch 13 Bundesstaaten, bis er sich nach Paraguay und Bolivien zurückzog. Sie verfügen außerdem über einen recht detaillierten Kriegsplan, der uns in unserem Kampf helfen könnte, und könnten bei Bedarf möglicherweise Unterstützung von den Sowjets und den hispanischen Kommunisten erhalten."
bra.5.a:0 "Prestes‘ Plan wird uns zum Sieg führen."
bra.5.b:0 "Wir können diesen Kommunisten nicht trauen!"
bra.6.d:0 "Das brasilianische Imperium hat sich an unser Land gewandt und uns einen Vertrag angeboten, der, kurz gesagt, ein Verteidigungsbündnis zwischen unseren Nationen sowie günstige Handelsabkommen vorsieht. Dies könnte für beide Seiten von Vorteil sein, aber es liegt an der Regierung zu entscheiden, ob es sich wirklich lohnt."
bra.6.a:0 "Möge dies beiden Nationen Fortschritt bringen!"
bra.6.b:0 "Sie haben in fünf Jahren zwei Bürgerkriege erlebt und wagen es, sich unserer Zeit würdig zu fühlen."
bra.7.d:0 "[FROM.GetLeader] hat unser Angebot eines Verteidigungsbündnisses sowie einer wirtschaftlichen Zusammenarbeit angenommen. Möge dies beiden Nationen Fortschritt bringen!"
bra.7.a:0 "Perfekt!"
bra.8.d:0 "[FROM.GetLeader] hat unser Angebot ohne Angabe von Gründen abgelehnt."
bra.8.a:0 "Wirklich schade."
bra.9.d:0 "[URG.GetLeader] hat uns mit beunruhigenden Informationen kontaktiert: Die Armee des brasilianischen Kaiserreichs mobilisiert in großer Zahl entlang der argentinischen und uruguayischen Grenze. Er erklärt, die Absichten der Brasilianer seien offensichtlich und jetzt sei der richtige Zeitpunkt, ihren Expansionismus zu stoppen, bevor es zu spät sei. \n\nEs gibt keine Garantie dafür, dass die Brasilianer nach der Eroberung Uruguays nicht aufgeben werden. Wie [URG.GetLeader] jedoch sagte, könnte dies erst der Anfang sein."
bra.9.a:0 "Wir müssen Brasilien stoppen, bevor es zu spät ist."
bra.9.b:0 "Sollten wir uns um die Unabhängigkeit eines Punktes auf der Karte kümmern?"
jos_news.1.desc:0 "Nach den Grenzkonflikten zwischen Russland und der Exilregierung der Weißen in Sinkiang erklärte die Moskauer Regierung den letzten Krieg. Zahlreiche Aufstände brachen in den russischen Provinzen aus. Einigen gelang es sogar, die Kontrolle über Waffenlager und Hauptstädte zu übernehmen und russische Divisionen einzukesseln, die nun Widerstand leisten müssen, bis die Moskauer Regierung Verstärkung zu Hilfe schicken kann."
jos_news.1.a:0 "Wie schrecklich..."
jos_news.1.b:0 "Wir haben sie einmal vernichtet und wir werden es wieder tun!"
jos_news.1.c:0 "Wir werden Petrograd aus den Klauen der Unrechtmäßigen befreien!"
jos_news.1.d:0 "Dies könnte für uns von Vorteil sein."
jos_news.2.d:0 "In Anlehnung an den deutschen und italienischen Faschismus marschierte Iwan Iljin mit Hunderten weißen Emigranten in Moskau ein und forderte von Denikin die Übergabe der Macht über das Land. Denikin stimmte seinem Vorschlag zu, vor allem aufgrund seines hohen Alters und seiner Kriegsmüdigkeit. Nun hat der Philosoph Iwan Iljin Wladimir Romanow zum Zaren gekrönt, doch die gesamte Macht liegt in den Händen des Woschd, Wladimir ist nur noch eine Marionette."
jos_news.2.a:0 "Wie kommt es, dass Russland immer wieder in die Hände von Autokratien fällt?"
jos_news.2.b:0 "Ein Hoch auf den Woschd!"
jos_news.3.d:0 "Nach der Niederlage der alten Regierung in Moskau begann die neue, von Weißen geführte russische Nation mit der Wiederherstellung der Monarchie. Aufgrund der Ermordung der Familie Romanow zu Beginn des Ersten Russischen Bürgerkriegs beanspruchen jedoch viele Mitglieder der Familie den Thron. Die aktuellen Kandidaten für das Amt des Zaren von Russland sind Kyrill Romanow und Dmitri Romanow. Dennoch gibt es im Land einige Stimmen, die die Krönung von Kyrills Nachkomme, Wladimir Romanow, befürworten."
jos_news.3.a:0 "Hoffen wir, dass der neue Zar keinen Fehler macht."
jos_news.3.b:0 "Wir werden unser Bestes tun, damit es nie wieder zu einer Revolution kommt."
jos_news.4.d:0 "\n\nAls 1933 der Kumul-Aufstand in Sinkiang begann, unterstützten Japaner und Afghanen die Jungtürken, die nach dem türkischen Unabhängigkeitskrieg 1922 ins Exil geschickt worden waren, bei ihrem Ziel, Mehmed Abdülkerim Efendi als osmanischen Prinzen in Ostturkestan wieder einzusetzen. Aufgrund des türkischen Drucks und der mangelnden Unterstützung Englands konnte dieses Vorhaben jedoch nicht verwirklicht werden.\n\nNach Ma Shaowus Putsch in Sinkiang sahen die japanischen und afghanischen Streitkräfte jedoch eine günstige Gelegenheit, den Sultan nahezu widerstandslos zu krönen."
jos_news.4.a:0 "Ein türkisch-afghanisches Reich in China? Sind wir verrückt?"
jos_news.4.b:0 "Jetzt beginnt der Kampf um die Rückeroberung Konstantinije."
jos_news.4.c:0 "Das ist eine Unverschämtheit!"
jos_news.5.d:0 "Einer Gruppe junger Offiziere ist es nicht gelungen, die Regierung zu stürzen und den Kaiser als obersten Herrscher Japans wieder einzusetzen. Offenbar war dies eine Reaktion auf die Bedrohung durch weit verbreitete Korruption in der Regierung und Anhänger feindlicher Ideologien.\n\nDie alte Regierung hat angekündigt, die Säuberungen fortzusetzen, bis „alle unappetitlichen Elemente aus Militär und Regierung entfernt“ seien. Kaiser Hirohito hat sich zur Situation nicht geäußert."
jos_news.5.a:0 "Wie schrecklich..."
jos_news.5.b:0 "Tennōheika Banzai!"
jos_news.5.c:0 "Wir sollten anfangen, uns auf das Unvermeidliche vorzubereiten."
jos_news.6.d:0 "Nach der Niederlage der alten Moskauer Regierung begann das neue, von Weißen geführte Russland mit den Vorbereitungen für die Präsidentschaftswahlen. Es waren die zweiten seit der Gründung des Landes im Jahr 862 durch König Rurik von Russland. Sieger war Alexander Kerenski von der Sozialrevolutionären Partei, der 1917 auch die provisorische Regierung Russlands anführte. Die Machtübergabe von der Militärjunta an den russischen Präsidenten findet heute im Rahmen einer bescheidenen Zeremonie in Moskau statt."
jos_news.6.a:0 "Viel Glück, Russland!"
jos_news.6.b:0 "Für eine bessere Zukunft."
jos_news.7.d:0 "Nach der Niederlage der alten Moskauer Regierung führte das neue, von den Weißen geführte russische Volk Denikins Regentschaft fort und lebte praktisch in einer Militärdiktatur. Heute jedoch verkündete Denikin die Wiederherstellung der Duma und des Parlaments, um die Beteiligung des Volkes an der russischen Politik zu erhöhen.\n\nDennoch liegt die Macht nach der neuen russischen Verfassung größtenteils in Denikins Händen. Duma und Senat treten in den Hintergrund und machen all diese neuen Ansätze zur Demokratie völlig wirkungslos."
jos_news.7.a:0 "Besser das als Faschismus."
jos_news.7.b:0 "Nur so kann die Stabilität Russlands gesichert werden."
jos_news.8.d:0 "Heute kam es in Santiago zu einem Aufstand gegen die Führung von Präsident Arturo Alessandri, angeführt von Mitgliedern der Nationalsozialistischen Bewegung (Movimiento Nacional Socialista). Die Sache schien aussichtslos, doch mit dem Eintreffen der Armee wendete sich das Blatt. Anstatt den Putsch niederzuschlagen, unterstützte sie ihn und zwang die Polizei zur Kapitulation. Die Putschisten begannen mit dem Beschuss des Präsidentenpalastes und forderten den Präsidenten zur Kapitulation auf. Seine einzige Antwort war: „Ich sterbe mit meinem Vaterland“. \n\nPräsident Arturo Alessandri fiel im Kampf, und nun geht die Macht im Land an die Nationalsozialistische Bewegung (Movimiento Nacional Socialista) über."
jos_news.8.a:0 "Eine weitere Nation fällt in die Klauen des Faschismus."
jos_news.8.b:0 "Sie könnten in Zukunft hilfreich sein."
jos_news.8.c:0 "¡Chilenos, a la acción!"
jos_news.9.d:0 "Heute kam es in Santiago zu einem Aufstand gegen die Führung von Präsident Arturo Alessandri, angeführt von Mitgliedern der „Movimiento Nacional Socialista“ (Nationalsozialistische Bewegung). Die Sache schien aussichtslos, doch als die Armee eintraf, setzte sie dem Ganzen den letzten Nagel zu und beschoss die Nazi-Stellungen mit Artillerie. Nachdem sich die Putschisten ergeben hatten, wurden sie erschossen und anschließend geplündert. Zurück blieb nur ein Fluss aus Blut, der von den Treppen herabstürzte. \n\nNur vier der 63 Jugendlichen überlebten das Massaker. Das Ereignis ließ die Popularität von Präsident Arturo Alessandri stark sinken und schädigte das Image von Ibañez, da die Nazis ihm die Treue schworen."
jos_news.9.a:0 "Das war knapp."
jos_news.9.b:0 "Sie waren so nah dran, Großes zu erreichen."
jos_news.10.d:0 "Heute organisierte General Ariosto Herrera zusammen mit Oberst Guillermo Hormazábal einen Staatsstreich gegen die mittlerweile linksgerichtete Regierung Chiles. Herrera, bekannt für seinen Antikommunismus, nahm Kontakt zu anderen Generälen auf, um deren Unterstützung gegen die Regierung zu gewinnen. In der Bevölkerung wird vermutet, dass all dies von Ibañez del Campo inszeniert wurde. Dieser lebt derzeit im argentinischen Exil, nachdem die Nazi-Partei, die seine Kandidatur unterstützte, einen gescheiterten Staatsstreich gegen Arturo Alessandri durchgeführt hatte. \n\nLeider war der Putsch erfolgreich, und nun muss ein weiteres lateinamerikanisches Land unter einer autoritären Diktatur leben."
jos_news.10.a:0 "Warum machen sie sich dann die Mühe, Wahlen abzuhalten?"
jos_news.10.b:0 "Interessant..."
jos_news.10.c:0 "Der Kommunismus wird uns niemals besiegen!"
jos_news.11.d:0 "Heute organisierte General Ariosto Herrera zusammen mit Oberst Guillermo Hormazábal einen Staatsstreich gegen die mittlerweile linksgerichtete Regierung Chiles. Herrera, bekannt für seinen Antikommunismus, nahm Kontakt zu anderen Generälen auf, um deren Unterstützung gegen die Regierung zu gewinnen. In der Bevölkerung wird vermutet, dass dies alles von Ibañez del Campo inszeniert wurde. Dieser befindet sich derzeit im argentinischen Exil, nachdem die Nazi-Partei, die seine Kandidatur unterstützte, einen gescheiterten Staatsstreich gegen Arturo Alessandri durchgeführt hatte. \n\nGlücklicherweise scheiterte der Putsch. Herrera wird vor Gericht gestellt, und Ibañez bleibt im Exil."
jos_news.11.a:0 "Noch ein Putsch? Schon wieder? Wirklich?"
jos_news.11.b:0 "Gut gemacht, Genossen."
jos_news.11.c:0 "Die Demokratie wird siegen!"
jos_news.12.d:0 "Nachdem die vorrückende feindliche Armee Berlin erobert hatte, beging Hitler Selbstmord und befahl seinen Offizieren, seine Leiche zu verbrennen, um die Eroberung durch die Feinde Deutschlands zu verhindern. Zur Überraschung des deutschen Oberkommandos ernannte der Führer Dönitz in seinem Testament zum Erben des Dritten Reiches. Diese Position übernahm der Admiral am Tag nach dem Selbstmord des Führers. Ob Dönitz den Kampf fortsetzen oder sich sofort den feindlichen Truppen ergeben wird, bleibt abzuwarten."
jos_news.12.a:0 "Heil Dönitz!"
jos_news.12.b:0 "Möge der Teufel ihn in der Hölle bestrafen."
jos_news.12.c:0 "Was für ein Feigling."
jos_news.13.d:0 "Nach dem Terroranschlag in Nanking, der Chiang Kai-shek das Leben kostete und Wang Jingwei ins Koma versetzte, berieten Chen Cheng und Dai Li über das Schicksal der chinesischen Regierung. Nach einem langen Treffen mit anderen Mitgliedern der Kuomintang beschlossen sie, Dai Li zum Staatschef zu ernennen. \n\nManche glauben, Dai Lis Antikommunismus und Radikalismus würden der Kuomintang helfen, die Kommunisten endlich in den Griff zu bekommen. Doch man darf nicht vergessen, dass der Anführer der NBIS und der faschistischen Organisation der Blauhemden nun das Schicksal von über 350 Millionen Menschen in seinen Händen hält."
jos_news.13.a:0 "..."
jos_news.13.b:0 "Interessant..."
jos_news.13.c:0 "Möge Gott China helfen, denn niemand sonst kann es."
jos_news.14.d:0 "Heute brach eine Militärtruppe unter der Führung der Generäle Rawson und Anaya zum Präsidentenpalast auf, um Präsident Ramón S. Castillo zu stürzen. An der Offiziersschule der Marine wurde die Gruppe von dort verschanzten loyalen Truppen angegriffen, was viele Tote und Verwundete forderte. Nachdem Präsident Castillo die Schule aufgegeben hatte, ging er an Bord eines Trawlers mit dem Befehl, Richtung Uruguay zu fahren. Er verließ die Casa Rosada, wo die Generäle Ramírez, Farrell und Pistarini die Rebellenarmee empfingen. Schließlich erklärte sich Rawson selbst zum Präsidenten der Nation. \n\nDer Putsch wurde vom Volk und allen Parteien unterstützt, mit Ausnahme der Kommunistischen Partei. Nun scheint in Argentinien eine weitere Diktatur zu herrschen, genau wie 1930 zu Beginn des „berüchtigten Jahrzehnts“."
jos_news.14.a:0 "Wer nicht aus der Geschichte lernt, ist dazu verdammt, sie zu wiederholen."
jos_news.15.desc:0 "An diesem Abend verkündete Präsident Douglas MacArthur die Auflösung des Kongresses bis auf Weiteres und erklärte, alle Macht werde von nun an bei ihm liegen. Anschließend hielt der amerikanische Cäsar eine Rede, in der er sowohl Faschismus als auch Kommunismus verurteilte und die Silberlegion des Verrats am amerikanischen Volk sowie die Kommunisten und angeblichen sowjetischen Agenten beschuldigte, den Bürgerkrieg angezettelt zu haben, um die Vereinigten Staaten zu schwächen. \n\nViele bezeichnen MacArthur bereits als Faschisten und sagen, er versuche, eine Regierung wie die von Adolf Hitler oder Benito Mussolini zu errichten, während andere den Putsch zu unterstützen scheinen, als sei dies die einzige Möglichkeit, ihr Heimatland zu retten."
jos_news.15.a:0 "Nieder mit den Verrätern, hoch mit den Sternen!"
jos_news.15.b:0 "Er wird sich in genau das verwandeln, was er zu zerstören geschworen hat."
jos_news.15.c:0 "Interessant..."
jos_news.15.d:0 "Mal sehen, wozu dieser Cäsar fähig ist."
jos_news.16.desc:0 "\n\nHeute Abend gab Präsident Douglas MacArthur die Ernennung des demokratischen Politikers Earl Long, Bruder des 1935 ermordeten Huey Long, zum Präsidenten der Nation bekannt. Viele waren von dieser Entscheidung aufgrund der konservativeren Haltung des Generals überrascht. Es gibt jedoch Theorien, der Grund für diesen Schritt sei, die öffentliche Unterstützung für die Silberlegion zu spalten, um den Aufstieg von Dudley Pelley zu verhindern. \n\nOb Earl Long tatsächlich Macht haben oder nur eine Marionette des Kaisers sein wird, bleibt abzuwarten."
jos_news.16.a:0 "Jetzt soll jeder Mann ein König sein!"
jos_news.16.b:0 "Zumindest ist es nicht die Silberlegion …"
jos_news.16.c:0 "Interessant..."
jos_news.16.d:0 "Interessant..."
jos_news.17.desc:0 "\n\nHeute Abend gab Präsident Douglas MacArthur die Ernennung des faschistischen Führers William Dudley Pelley zum Präsidenten der USA bekannt. Nach dem Machtzuwachs der Silberlegion unter Alf Landons Regierung und während des Bürgerkriegs konfrontierte Dudley Pelley den Cäsar, der schließlich von der Macht zurücktrat. \n\nDas Schicksal des Generals ist derzeit unbekannt. Sicher ist jedoch, dass der amerikanische Traum offiziell zu einem Albtraum geworden ist, da die gesamte Macht der Nation in den Händen eines antisemitischen, weißen Rassisten und Okkultisten liegt."
jos_news.17.a:0 "Jetzt können die Dark Souls Amerika nicht mehr zerstören!"
jos_news.17.b:0 "Oh Gott..."
jos_news.17.c:0 "Eine interessante Entwicklung, nicht wahr?"
jos_news.17.d:0 "Der Teufel selbst regiert jetzt Amerika."
jos_news.18.desc:0 "Nach einem grausamen Bürgerkrieg, der Hunderttausenden Japanern das Leben kostete, flohen die faschistischen Anhänger sowie große Teile der Marine nach Mandschukuo. Sie wurden von der radikalen Kodoha- und der Kwantung-Armee aufgenommen, die die Geschehnisse in ihrer ehemaligen Heimat aufmerksam beobachteten. Nach langen Vorbereitungen und erbitterten Kämpfen gelang es der Kwantung-Armee, an der Küste ihrer ehemaligen Heimat zu landen, Tokio zurückzuerobern und schließlich den Rest des linken Widerstands im Land niederzuschlagen. \n\nJapan ist jetzt wieder das, was es 1936 war: ein Land, das von Militarismus und Totalitarismus regiert wird. Doch ob das Land zu einer Zivilregierung wie vor diesem Wahnsinn zurückkehren oder dafür sorgen wird, dass sich ein solcher Aufstand nie wieder ereignet, bleibt abzuwarten."
jos_news.18.a:0 "Tennōheika Banzai!"
jos_news.18.b:0 "Welche Auswirkungen wird dies auf die Zukunft Japans haben?"
jos_news.18.c:0 "Eine weitere Nation ist jetzt vom Kommunismus befreit."
jos_news.18.d:0 "All dieses Blutvergießen, für nichts."
jos_news.19.desc:0 "Japanische und chinesische Streitkräfte haben sich um die Mauern der südwestlich von Peking gelegenen Stadt Tianjin ein ergebnisloses Gefecht geliefert. \n\nJapan hat nun mit der Mobilisierung seiner Streitkräfte begonnen, was Diplomaten befürchten lässt, dass die instabile Lage bald zu einem Krieg führen könnte."
jos_news.19.a:0 "Wenn sie sich trauen, können sie kommen. Wir sind bereit."
jos_news.19.b:0 "Tennōheika Banzai!"
jos_news.19.c:0 "Ein weiteres Opfer der japanischen Kriegstreiberei."
jos_news.20.desc:0 "Nach einer Zeit interner Machtkämpfe zwischen den japanischen Verwaltern und der Regierung von [MAN.GetLeader] hat der Kampf um die Vorherrschaft in der Mandschurei nun endlich einen Siedepunkt erreicht. \n\nBerichten zufolge wurde die Konfrontation durch einen Kampf zwischen mandschurischen und japanischen Offizieren in einem Hotel in Mukden ausgelöst, bei dem zwei japanische Offiziere getötet wurden.\n\n[MAN.GetLeader] erklärte, die mandschurische Regierung werde sich den Barbaren nicht beugen, und befahl seinem Militär, alle japanischen Soldaten unverzüglich von chinesischem Boden abzuziehen."
jos_news.20.a:0 "Solange [MAN.GetLeader] auf unserer Seite ist, haben wir kein Problem mit seiner Führung."
jos_news.20.b:0 "Vorwärts, schieb sie ans Ufer!"
jos_news.20.c:0 "Wir werden sie genauso vernichten wie 1932."
jos_news.20.d:0 "Welche Auswirkungen wird dies auf die japanischen Kriegsanstrengungen haben?"
jos_news.21.desc:0 "Heute wurde die Order .51321 von [AST.GetLeader] genehmigt. Sie unterzeichnete den Friedensvertrag zwischen dem australischen und dem Emu-Volk, der den Emu-Krieg von 1932 offiziell beendete und die Rekrutierung von Emu-Guerillakämpfern für den Kampf gegen die Invasoren des Landes autorisierte. \n\nDie Entscheidung wurde von beiden Seiten mit Begeisterung aufgenommen, und es scheint, dass ehemalige Feinde nun gemeinsam gegen die Bedrohungen kämpfen werden, die die Unabhängigkeit ihres Heimatlandes bedrohen."
jos_news.21.a:0 "Schwere Zeiten schaffen interessante Allianzen."
jos_news.21.b:0 "Warte, was?"
jos_news.22.desc:0 "Im SS-Ordensstaat Burgund ist ein Bürgerkrieg ausgebrochen, nachdem Standartenführer Hans Landa mit Unterstützung des französischen Maquis und anderer Feinde Hitlers einen Putsch gegen [SSB.GetLeader] gestartet hatte. \n\nLandas Truppen besetzten zusammen mit Kommandos verschiedener Armeen Funktürme und Brücken, um die Kommunikation zwischen Burgund und dem Deutschen Reich zu unterbrechen. Da Berlin kaum Unterstützung bietet, dürfte [SSB.GetLeader] im Kampf gegen den Aufstand große Schwierigkeiten haben."
jos_news.22.a:0 "NEIN, NEIN, NEIN!"
jos_news.22.b:0 "Wo habe ich diesen Kerl schon einmal gesehen?"
jos_news.23.desc:0 "Nach der Niederlage der nationalistischen Truppen im chinesischen Bürgerkrieg floh die Regierung der Kuomintang auf die Insel Taiwan, auch bekannt als Formosa. \n\nMithilfe ziviler Schiffe und Militärflugzeuge konnten Millionen von Soldaten und ihre Familien auf die Insel fliehen, um ihr Leben vor der kommunistischen Bedrohung zu retten, die ihre ehemalige Heimat übernommen hatte. \n\nChiang Kai-shek hat Pläne erklärt, mit seinen Armeen nach China zurückzukehren, um es von den Roten zu befreien, doch die Lage der Kuomintang macht dies unwahrscheinlich."
jos_news.23.a:0 "Taiwan ist rechtmäßiges chinesisches Territorium!"
jos_news.23.b:0 "Wir kommen wieder!"
jos_news.23.c:0 "Wird er es schaffen?"
jos_news.24.desc:0 "Nach dem Zusammenbruch der nationalistischen Truppen im chinesischen Bürgerkrieg floh die Kuomintang-Regierung auf die Insel Taiwan. Chiang Kai-shek versprach der chinesischen Bevölkerung, zurückzukehren und das Festland vom Kommunismus zu befreien, und dieser Tag ist gekommen. \n\nHunderttausende nationalistische Soldaten marschieren derzeit an die kantonesische Küste und machen diese Operation zur größten amphibischen Operation der Menschheitsgeschichte. \n\nOb die Kuomintang das gewonnene Gebiet halten kann oder erneut zum Rückzug auf ihre Insel gezwungen wird, bleibt abzuwarten."
jos_news.24.a:0 "Das Jahrhundert der Demütigung endet jetzt!"
jos_news.24.b:0 "Der Verrückte hat es tatsächlich getan."
jos_news.24.c:0 "Wir haben ihn schon einmal vernichtet und wir werden es wieder tun."
jos_news.25.desc:0 "Die Kuomintang wurde nach der Xinhai-Revolution von Song Jiaoren und Sun Yat-Sen gegründet und war ursprünglich eine sozialistische Partei, die sich an den Drei Prinzipien des Volkes orientierte. Nach dem Tod ihrer Gründer und dem Aufstieg Chiang Kai-Sheks verwandelte sich die Regierung von Nanjing jedoch in eine korrupte, konservative Regierung. \n\nNun ist der chinesische Bürgerkrieg endlich mit dem Sieg des Generalissimus zu Ende gegangen und nun bleibt eine Frage offen: Wird China endlich zu einer Demokratie, wie Sun Yat-Sen es sich gewünscht hat, oder wird es erneut in den Autoritarismus verfallen?"
jos_news.25.a:0 "Wir schreiben unser eigenes Schicksal, wir werden zu dem, was wir tun."
jos_news.25.b:0 "Viel Glück, China!"
jos_news.26.desc:0 "Die Kuomintang wurde nach der Xinhai-Revolution von Song Jiaoren und Sun Yat-Sen gegründet und war ursprünglich eine sozialistische Partei, die sich an den Drei Prinzipien des Volkes orientierte. Dies ist auch heute noch der Fall. \n\nNachdem der chinesische Bürgerkrieg mit der Niederlage der Kommunisten endlich zu Ende gegangen ist und nun die zweiten chinesischen Wahlen geplant werden, scheint das Jahrhundert der Demütigung Chinas endlich zu Ende zu sein."
jos_news.26.a:0 "Vom Volk, durch das Volk, für das Volk."
jos_news.26.b:0 "Gut gemacht, China!"
jos_news.27.desc:0 "Nach dem Terroranschlag in Nanking, der Chiang Kai-shek das Leben kostete und Wang Jingwei ins Koma versetzte, wurde Dai Li, der Chef der Geheimpolizei und des Geheimdienstes, zum Staatsoberhaupt Chinas ernannt. Dies dürfte der größte Fehler der Kuomintang gewesen sein. \n\nUnmittelbar nach der vollständigen Wiedervereinigung begannen Säuberungen in Partei und Armee, und Berichten von Menschen, die nach Hongkong und Macau flohen, zufolge werden im ganzen Land Umerziehungslager, sogenannte „Lao Gai“, errichtet. \n\nEs scheint, als sei Sun Yat-Sens Traum von der Demokratie endgültig ausgeträumt."
jos_news.27.a:0 "Der General lädt Sie zum Tai-See ein."
jos_news.27.b:0 "Möge Gott China helfen, denn niemand sonst kann es."
jos_news.28.desc:0 "Nach seiner Niederlage gegen die Kuomintang im Jahr 1927 während des Nordfeldzugs zog sich Wu Peifu aus dem öffentlichen Leben zurück und zog nach Sichuan und dann nach Peking, wo er jahrelang blieb, bis er von den Japanern kontaktiert wurde, um gemeinsam mit Cao Kun der mandschurischen Regierung beizutreten. \n\nNach Cao Kuns Tod erzwang Wu Puyis Abdankung und ergriff die Waffen gegen die Japaner, um anschließend einen Kreuzzug gen Süden zu starten, um China mit Gewalt zu vereinen. Heute regiert er als alleiniger Führer Chinas und erklärte, seine Armee werde nicht ruhen, bis alle von China gestohlenen Staaten und Häfen wieder dem chinesischen Kaiserreich angegliedert seien."
jos_news.28.a:0 "Keine Demütigungen mehr!"
jos_news.28.b:0 "Eine interessante Entwicklung."
jos_news.29.desc:0 "Nach drei Jahrhunderten der Herrschaft über China wurde die Qing-Dynastie in der Xinhai-Revolution von 1911 von den Tongmenhui abgeschafft. Kaiser Xuantong Puyi dankte ab und in der Region begann eine Ära der Kriegsherren sowie Dutzende bewaffneter Konflikte zwischen den ehemaligen Brüdern. \n\nNachdem die Qing jedoch von den Japanern zum Herrscher Mandschukuos ernannt und im Mandschurischen Unabhängigkeitskrieg besiegt worden waren, begannen sie, nach Süden zu marschieren, um ihre alten Gebiete und ihren Stolz zurückzuerobern. \n\nNun wird China wieder von einer Monarchie regiert und eine Frage bleibt: Wird Puyi China mit eiserner oder mit Samthandschuhen regieren?"
jos_news.29.a:0 "Der Drache verschluckt wieder einmal die Sonne!"
jos_news.29.b:0 "Wird es ihnen dieses Mal gelingen?"
jos_news.30.desc:0 "Feng Yuxiang, bekannt für seine Teilnahme an der Kuomintang während des Nordfeldzugs und der Xinhai-Revolution sowie für seinen Widerstand gegen Chiang Kai-shek, hat es trotz aller Widrigkeiten geschafft, China wiederzuvereinen. \n\nDer christliche General hat nun mit der Umsetzung zahlreicher Reformen begonnen, wie etwa einer Alphabetisierungskampagne, dem Verbot des Opiumhandels, dem Verbot körperlicher Bestrafung und der Förderung einer guten Moral durch christliche Werte. \n\nEs scheint nun, dass in China endlich Frieden herrschen wird, doch wie mit der zunehmenden Radikalisierung der muslimischen Bevölkerung umgegangen werden soll, ist derzeit nicht bekannt."
jos_news.30.a:0 "Möge Gott uns weiterhin segnen."
jos_news.30.b:0 "Eine interessante Entwicklung."
jos_news.31.desc:0 "Mao Zedong überlebte das Massaker von Shanghai 1927 und den Langen Marsch 1935 und führte die Kommunisten im chinesischen Bürgerkrieg zum Sieg. Mit seinem Versprechen einer Landreform und der Schaffung eines industrialisierten und mächtigen Landes gewann er die Unterstützung der Bauern – etwas, das der korrupten Regierung Chiang Kai-sheks nie gelang. \n\nDennoch befürchten viele Menschen nach den Säuberungen, die er unter seiner Regierung einleitete, um die totale Kontrolle über die Partei zu erlangen, dass China sich bald in eine totalitäre Diktatur verwandeln könnte, genau wie die Sowjetunion unter Stalin."
jos_news.31.a:0 "Ohne die KPCh gäbe es kein neues China!"
jos_news.31.b:0 "Hoffentlich verfallen sie nicht dem Totalitarismus."
jos_news.32.desc:0 "Wang Ming überlebte das Massaker von Shanghai 1927 und den Langen Marsch 1935 und führte die Kommunisten zum Sieg im chinesischen Bürgerkrieg. Mit seinem Versprechen einer Landreform und der Schaffung einer industrialisierten und mächtigen Nation gewann er die Unterstützung der Bauernschaft – etwas, das der korrupten Regierung von Chiang Kai-shek nie gelang. \n\nDennoch befürchten viele Menschen angesichts des wachsenden Einflusses der Sowjetunion und des NKWD auf China, dass die chinesische Nation wie die Mongolei schließlich ein Untertan der Sowjetunion werden könnte."
jos_news.32.a:0 "Arbeiter aller Länder, vereinigt euch!"
jos_news.32.b:0 "Hoffentlich verfallen sie nicht dem Totalitarismus."
jos_news.33.desc:0 "Dank der Verhandlungen unter Zhang Lan, der Frieden zwischen Kommunisten und Nationalisten stiften konnte, konnte China endlich vereint werden. \n\nNach dem mysteriösen Tod Chiang Kai-sheks durch Vergiftung war die Kuomintang, die nun vom linken Wang Jingwei geführt wurde, viel eher bereit, mit den Kommunisten zusammenzuarbeiten, um Frieden in China zu erreichen, ein Schlüsselfaktor bei den Verhandlungen zwischen den beiden Nationen."
jos_news.33.a:0 "Endlich Frieden!"
jos_news.33.b:0 "Gut gemacht, China!"
jos_news.34.desc:0 "Die Ma-Clique ist bekannt für die große Zahl muslimischer Chinesen, auch Hui genannt, die dort leben. Ma Buqing war jedoch ein anderer Fall. Er wurde sein ganzes Leben lang in den Werten des Konfuzianismus erzogen, und nachdem er die Macht in der Clique übernommen hatte, prangerte er sowohl Chiang Kai-shek als auch Mao Zedong an, weil sie die von Konfuzius gelehrten Werte vergessen hatten, und begann dann mit der Eroberung Chinas, die ihm allen Widrigkeiten zum Trotz gelang. \n\nDerzeit werden in Chungkuo, einem Namen, den Buqing dem Westen anstelle des verwestlichten „China“ geben wollte, zahlreiche Reformen durchgeführt. Wie sich diese neue konfuzianische Rhetorik auf die Nation auswirken wird, bleibt abzuwarten."
jos_news.34.a:0 "Der Mann, der einen Berg versetzt, beginnt damit, kleine Steine wegzutragen."
jos_news.34.b:0 "Eine interessante Entwicklung."
jos_news.35.desc:0 "Zhao Hengti und Chen Jiongming sprachen sich für eine föderalistische Verfassung in China aus, in der die Macht zwischen den fünf Rassen geteilt würde, anstatt dass die Han die anderen vier unterjochten. Dieser Traum schien jedoch unerfüllbar. Chen starb 1933 an Typhus und Zhao zog sich nach seiner Niederlage beim Nordfeldzug 1927 aus dem öffentlichen Leben zurück. Das änderte sich jedoch, als er nach Guangxi eingeladen wurde und den Föderalistisch-Guangxi-Krieg und anschließend den Chinesischen Bürgerkrieg siegreich beendete. \n\nHeute ist China durch eine Verfassung vereint, die eine gleichberechtigte Vertretung der Han, Hui, Mandschu, Mongolen und Tibeter garantiert. Und mit den bald bevorstehenden Wahlen scheint es, als hätte China Sun Yat-Sens Traum endlich verwirklicht: Frieden und Demokratie."
jos_news.35.a:0 "Fünf gleichberechtigte Völker vereint."
jos_news.35.b:0 "Gut gemacht, China!"
jos_news.36.desc:0 "Dank Long Yun war Yunnan bei seinen Einwohnern jahrelang als „Festung der Demokraten“ bekannt. Nachdem er 1911 in der Xinhai-Revolution gekämpft hatte, wurde er 1927 Kriegsherr von Yunnan und leitete zahlreiche Reformen ein, um die stark unterentwickelte Region zu verbessern und ihrer Bevölkerung zu helfen. \n\nNach der Gründung des Revolutionskomitees der Kuomintang, einer sozialistischen Partei, die behauptet, die Nachfolgerin der linkeren Kuomintang unter Sun Yat Sen zu sein, gelang es Long Yun, China unter einer – wenn auch wohlwollenden – Diktatur wiederzuvereinen. \n\nDennoch wird nur die Zeit zeigen, ob er Diktator bleibt oder dem chinesischen Volk endlich die Möglichkeit gibt, seinen Führer zu wählen."
jos_news.36.a:0 "Vom Volk, durch das Volk, für das Volk."
jos_news.36.b:0 "Eine interessante Entwicklung."
jos_news.37.desc:0 "Yunnan war seinen Einwohnern jahrelang als „Festung der Demokraten“ bekannt, und das alles dank Long Yun. Nachdem er 1911 in der Xinhai-Revolution gekämpft hatte, wurde er Kriegsherr von Yunnan und leitete zahlreiche Reformen ein, um die stark unterentwickelte Region zu verbessern und ihrer Bevölkerung zu helfen. \n\nDiese Jahre der Reformen und des Fortschritts endeten jedoch mit dem Sturz der Kuomintang-Regierung und dem Massenrückzug nach Kunming, als Long von seinen eigenen Generälen dazu gedrängt wurde, sich mehr auf die Armee zu konzentrieren. Nach langer Vorbereitung marschierte die Chinesische Befreiungsfront dann nordwärts, um China zu befreien, genau wie es die Kuomintang 1927 versucht hatte. Glücklicherweise war Longs Feldzug erfolgreich, doch nun stellt sich die Frage: Wird es ihnen gelingen, Chinas Wunden zu heilen?"
jos_news.37.a:0 "Das beste China, von dem wir träumen können."
jos_news.37.b:0 "Ist dies das Ende des Jahrhunderts der Demütigung?"
jos_news.38.desc:0 "Nach der Niederlage der Kuomintang im Zweiten Japanisch-Chinesischen Krieg wurde das alte chinesische Regime abgeschafft und durch eine von den Japanern unter [CHI.GetLeader] errichtete Diktatur ersetzt. \n\nBerichte über Hunderttausende von Menschen, die in die europäischen Kolonien und nach [SOV.GetNameDef] fliehen, häufen sich, und Gerüchte über die in Nanking begangenen Gräueltaten erreichen den Westen rasch. \n\nEs scheint, als sei das Jahrhundert der chinesischen Demütigung noch lange nicht zu Ende."
jos_news.38.a:0 "Tennōheika Banzai..."
jos_news.38.b:0 "Tennōheika Banzai!"
jos_news.38.c:0 "Möge Gott China helfen, denn niemand sonst kann es."
jos_news.39.desc:0 "Nach dem Japanischen Bürgerkrieg flohen die konservativsten Armeeführer nach Mandschukuo, wo sie die Kwantung-Armee unter Führung von [MAN.GetLeader] mit der Verwaltung des Gebiets beauftragten. Zunächst war ihr Plan, die Inseln zurückzuerobern, doch sie änderten ihre Politik und führten stattdessen einen Präventivschlag gegen China durch – ein Plan, der letztendlich aufging. Die Kwantung-Armee annektierte das chinesische Volk, und nun lebt das gesamte chinesische Volk unter der Herrschaft der Kwantung. \n\nBerichte über Hunderttausende von Menschen, die in die europäischen Kolonien und nach [SOV.GetNameDef] fliehen, nehmen zu, und Gerüchte über die in Nanking begangenen Gräueltaten erreichen schnell den Westen. \n\nEs scheint, als sei das Jahrhundert der chinesischen Demütigung noch lange nicht zu Ende."
jos_news.39.a:0 "Tennōheika Banzai!"
jos_news.39.b:0 "Möge Gott China helfen, denn niemand sonst kann es."
jos_news.40.desc:0 "Die Kuomintang wurde nach der Xinhai-Revolution von Song Jiaoren und Sun Yat-Sen als sozialistische Partei gegründet, die sich an den Drei Prinzipien des Volkes orientierte. Nach dem Tod ihrer Gründer und dem Aufstieg Chiang Kai-sheks verwandelte sich die Regierung von Nanjing jedoch in eine korrupte, konservative Regierung. \n\nDas änderte sich jedoch nach seinem Tod bei einem Bombenanschlag mitten in einer Versammlung der Kuomintang in Nanjing und dem Aufstieg Wang Jingweis, der zum neuen Führer der Republik wurde. Anfangs war seine Führung ziemlich problematisch, aber nach Jahren des internen Kampfes werden die zweiten chinesischen Wahlen geplant, und es scheint, dass das Jahrhundert der Demütigung Chinas endlich zu Ende geht."
jos_news.40.a:0 "Das Licht der Jugend wird nicht erlöschen, nachts wird es auf Chinas goldener Terrasse leuchten."
jos_news.40.b:0 "Gut gemacht, China!"
jos_news.41.desc:0 "Die Kuomintang wurde nach der Xinhai-Revolution von Song Jiaoren und Sun Yat-Sen als sozialistische Partei gegründet, die sich an den Drei Prinzipien des Volkes orientierte. Nach dem Tod ihrer Gründer und dem Aufstieg Chiang Kai-sheks verwandelte sich die Regierung von Nanjing jedoch in eine korrupte, konservative Regierung. \n\nDas änderte sich jedoch nach seinem Tod bei einem Bombenanschlag mitten in einer Versammlung der Kuomintang in Nanjing und dem Aufstieg Wang Jingweis, der zum neuen Führer der Republik wurde. Er regierte als autokratischer Führer, begann Kompromisse mit vielen Teilen der Nation und vereinte sie unter einem Ziel, das heute den Westen verfolgt: die Beendigung aller imperialistischen Aktivitäten in Asien."
jos_news.41.a:0 "Das Jahrhundert der Demütigung endet jetzt!"
jos_news.41.b:0 "Eine interessante Entwicklung."
jos_news.42.desc:0 "Nach der Unabhängigkeit von den Sowjets dank japanischer Unterstützung wurde die Mongolei von Demchugdongrub, dem Prinzen der Mongolen und ehemaligen Anführer von Mengkukuo, regiert. \n\nDer jetzige Khan der Mongolen startete einen Feldzug zur Befreiung der gesamten Bevölkerung der Inneren Mongolei, der sich schnell in eine Invasion des gesamten chinesischen Kontinents verwandelte, die ihm trotz aller Widrigkeiten gelang. \n\nNun ist die alte Yuan-Dynastie wiederhergestellt. Ob sie ebenso lange bestehen wird wie die letzte, ist unbekannt, aber sehr unwahrscheinlich."
jos_news.42.a:0 "Dies ist erst der Anfang."
jos_news.42.b:0 "Was? Wie?"
jos_news.43.desc:0 "Nach seinem klaren Sieg bei den zweiten chinesischen Wahlen begann Chiang Kai-Shek mit dem, was die chinesische Bevölkerung als „Zweiten Weißen Terror“ bezeichnete. \n\nGenau wie bei seiner Machtübernahme 1927 begann Chiang mit der Säuberung von Bürgern, die der Kollaboration mit den Kommunisten verdächtigt wurden. Die NBIS, eine Geheimpolizei unter Führung des faschistischen Sympathisanten Dai Li, führt Massenverhaftungen, brutale Morde und zahlreiche Entführungen durch, und derzeit scheint es, als könne der Wahnsinn, der China heimsucht, nicht gestoppt werden."
jos_news.43.a:0 "Der einzige Weg, China vor dem Kommunismus zu retten."
jos_news.43.b:0 "Oh Gott..."
jos_news.44.desc:0 "Sheng Shicai übernahm 1934 nach dem Kumul-Aufstand und der sowjetischen Invasion in Xinjiang die Macht in Sinkiang und war der stalinistische Führer der Region. Bekannt für seine rücksichtslosen Säuberungen und seinen Respekt gegenüber Minderheiten, begann er mit sowjetischer Unterstützung einen Feldzug nach Peking, den er schließlich auch errang. \n\nSeine Regierung versucht, die Sowjetunion nachzuahmen, indem sie alle fünf großen chinesischen Ethnien in einem Staat vereint, in dem sie gleichberechtigt vertreten sein sollten. Dennoch befürchten viele Menschen angesichts des wachsenden Einflusses der Allkommunistischen Partei und des NKWD im Land, dass die Sowjetrepubliken Chinas wie die Mongolei am Ende Untertan Moskaus werden."
jos_news.44.a:0 "Fünf gleichberechtigte Völker vereint unter einer Sowjetunion!"
jos_news.44.b:0 "Eine interessante Entwicklung."
jos_news.45.desc:0 "Die Familie Ma war eine Gruppe von Hui-Kriegsherren (muslimische Chinesen), die seit dem Fall der Qing-Dynastie die Kontrolle über Nordwestchina innehatten. Zunächst wurden sie von Ma Bufang, dem Herrscher der Region Qinghai, angeführt, doch nach der Wiedervereinigung mit Sinkiang infolge der Ermordung von Sheng Shicai wurde eine Art Rat aus den mächtigsten Mitgliedern der Familie gegründet. Ihr ursprüngliches Ziel war es, die Kommunisten Chinas zu besiegen, doch mit ihrer wachsenden Macht wuchsen auch ihre Ambitionen, die in der Eroberung Chinas gipfelten, die ihnen allen Widrigkeiten zum Trotz gelang. \n\nBerichten zufolge unterdrückt China nun alle, die nicht zum Islam konvertieren, und tötet jeden, der verdächtigt wird, Kommunist zu sein. Welche Auswirkungen dieser neue muslimische Staat auf Asien haben wird, bleibt abzuwarten."
jos_news.45.a:0 "Allah ist der Größte!"
jos_news.45.b:0 "Zumindest sind sie vereint, oder...?"
jos_news.46.desc:0 "Yiguandao (was so viel wie „Beständiger Weg“ bedeutet) ist eine chinesische Heilssekte, die Ende des 19. Jahrhunderts in Shandong entstand. In den 1930er Jahren verbreitete sich Yiguandao unter der Führung von Zhang Tianran, dem 18. Patriarchen der Tao-Linie des Späten Fernen Ostens, und Sun Suzhen, der ersten Matriarchin dieser Linie, rasch in ganz China. Nach der Zusammenarbeit mit den Unabhängigkeitskämpfern in der Mandschurei gelang es seinen Milizen, die Kontrolle über das Land zu übernehmen und die Region entgegen aller Widrigkeiten zu erobern. \n\nWie sich diese neue religiöse Führung auf die Zukunft Chinas und seine Beziehungen zum Rest der Welt auswirken wird, ist derzeit unklar."
jos_news.46.a:0 "Danke, Ewige Mutter."
jos_news.46.b:0 "Eine interessante Entwicklung."
jos_news.47.desc:0 "Nach drei Jahrhunderten der Herrschaft über China wurde die Ming-Dynastie von einer Rebellenarmee und den Mandschu gestürzt, die daraufhin die Qing-Dynastie an die Macht brachten. \n\nAls die zweite Dynastie 1911 nach dem Xinhai-Aufstand fiel, gab es viele Stimmen, die eine Wiedereinsetzung der Ming auf den Thron forderten, was nach zwei Jahrzehnten auch geschah. Nach ihrer Wiedereinsetzung durch Zhang Tianran stürzten die Ming den Regenten und marschierten gen Süden, um die Nation wieder zu vereinen. \n\nNun wird China wieder von einer Monarchie regiert, und eine Frage bleibt: Wird diese Dynastie ebenso untergehen wie die Qing, oder wird sie erneut drei Jahrhunderte lang regieren können?"
jos_news.47.a:0 "Endlich Frieden."
jos_news.47.b:0 "Eine interessante Entwicklung."
jos_news.48.desc:0 "Nach der Ermordung Zhang Tianrans durch die Zhu mit Hilfe kommunistischer Milizen nahmen die kommunistischen Aktivitäten in der Region zu, bis sie schließlich unter der Führung von [MAN.GetLeader] die Macht über das Land übernahmen. Dank des industriellen Fortschritts in der Mandschurei und der Unterstützung des Volkes gelang es ihm, die Nation wiederzuvereinen, indem er die Regierung von Nanjing besiegte und so seinen eigenen Worten zufolge allen Bauern und Arbeitern Chinas die Freiheit brachte. \n\nDennoch begannen viele Menschen nach den Säuberungen, die er unter seiner Regierung einleitete, um die totale Kontrolle über die Partei zu erlangen, zu befürchten, dass China sich bald in eine weitere totalitäre Diktatur verwandeln könnte, genau wie die Sowjetunion unter Stalin."
jos_news.48.a:0 "Ohne die KPCh gäbe es kein neues China!"
jos_news.48.b:0 "Hoffentlich verfallen sie nicht dem Totalitarismus."
jos_news.49.desc:0 "Nachdem er das Massaker von Shanghai 1927 und den Langen Marsch 1935 überlebt hatte, gelang es Kang Sheng, die Kommunisten im chinesischen Bürgerkrieg zum Sieg zu führen. Durch die Ermordung von Großgrundbesitzern und die Enteignung ausländischer Unternehmen sicherte er sich die Unterstützung der Bauern und festigte die Macht der Partei über die gesamte Nation. \n\nDennoch begannen landesweite Säuberungen mit dem Ziel, „Rechte und Bürgertum vollständig aus China zu vertreiben“. Heute lebt das chinesische Volk unter einer rücksichtslosen Diktatur, die der Sowjetunion ähnelt, und ein Ende dieser Diktatur ist nicht in Sicht."
jos_news.49.a:0 "Die Revolution siegt!"
jos_news.49.b:0 "Möge Gott China helfen, denn niemand sonst kann es."
jos_news.50.desc:0 "Nachdem [PRC.GetLeader] nach dem chinesischen Bürgerkrieg die Kontrolle über das Land übernommen hatte, begann er mit der sogenannten „Kulturrevolution“ der Kommunistischen Partei. \n\nGenau wie Chiang Kai-Shek nach seiner Machtübernahme 1927 begann [PRC.GetLeader] mit der Säuberung von Bürgern, die verdächtigt wurden, die Partei nicht zu unterstützen. Im ganzen Land begannen Massaker und Attentate, um „die Bürger an der Wiedereinführung des Kapitalismus zu hindern“, ebenso wie die Zerstörung und Plünderung kultureller und religiöser Stätten. Im Moment scheint es, als könne der Wahnsinn, der China heimsucht, nicht gestoppt werden."
jos_news.50.a:0 "Der einzige Weg, China vor dem Kapitalismus zu retten."
jos_news.50.b:0 "Oh Gott..."
jos_news.51.desc:0 "Ernst Starhemberg, Kommandant der antikommunistischen und antinazistischen paramilitärischen Truppe Heimwehr, wurde von Kurt Schuschnigg aus der österreichischen Regierung geworfen, weil dieser glaubte, die Heimwehr könne als Opposition zu seiner Regierung wachsen. Und er hatte Recht. \n\nZwei Monate später marschierten Starhemberg und die Heimwehr nach Wien. In Anlehnung an Hitler und Mussolini in den 1920er Jahren forderten die Milizen die Machtübergabe an ihren Anführer. Sie waren überzeugt, die österreichische Regierung würde einknicken, doch stattdessen wurde das Bundesheer auf die Straße geschickt, um der Heimwehr entgegenzutreten. Die beiden Streitkräfte gingen aufeinander los und warteten auf Befehle der Regierung. Schließlich entschied sich Schuschnigg jedoch, zurückzutreten und die Macht friedlich an die Heimwehr zu übergeben. "
jos_news.51.a:0 "Anderer Führer, dieselbe Diktatur."
jos_news.51.b:0 "Eine interessante Entwicklung."
jos_news.51.c:0 "Front Heil!"
jos_news.52.desc:0 "Nach der Entlassung Ernst Starhembergs durch Kurt Schuschnigg marschierten Starhemberg und die Heimwehr nach Wien. In Anlehnung an Hitler und Mussolini in den 1920er Jahren forderten die Milizen die Machtübergabe an ihren Anführer. Sie waren überzeugt, dass die österreichische Regierung einknicken würde, doch stattdessen wurde das Bundesheer auf die Straße geschickt, um der Heimwehr entgegenzutreten. \n\nDie beiden Streitkräfte gingen aufeinander los und warteten auf Befehle der Regierung. Dann kam es zu Kämpfen zwischen den beiden Fraktionen. Dieselbe Situation wiederholte sich in anderen Städten des Landes, wie Graz oder Steyr, und nun ist Österreich, genau wie 1934, in einen weiteren Bürgerkrieg verwickelt."
jos_news.52.a:0 "Hoffentlich wird ihnen dies zu einem besseren Regime verhelfen …"
jos_news.52.b:0 "Viel Glück, Heimwehr."
jos_news.52.c:0 "Auf zum Sieg!"
jos_news.53.desc:0 "Infolge der neuen Japanisierungspolitik in Korea wuchs der Widerstand gegen die japanische Herrschaft in Korea, bis er einen Bruchpunkt erreichte und in den wichtigsten Städten der Halbinsel Massenaufstände auslöste. Gleichzeitig griffen Berichten zufolge viele Bauern zu den Waffen und schossen gegen die japanischen Garnisonen. Sie schossen mit Jagdwaffen, alten Musketen und sogar ihren landwirtschaftlichen Geräten auf sie. \n\nDie Lage der Japaner verschlechterte sich noch weiter, als eine Milizarmee unter dem Befehl des berühmten Generals Lee Beom-Seok die Grenze von Jiandao überquerte, während sich ihnen eine weitere Armee unter Kim Il-Sung anschloss, nachdem sie die sowjetische Grenze überquert hatten. Nun muss Japan gegen einen organisierten Widerstand kämpfen, was vermuten lässt, dass dieser Aufstand ein anderes Ergebnis als der von 1919 haben wird."
jos_news.53.a:0 "Werden sie ihre Freiheit zurückgewinnen können?"
jos_news.53.b:0 "Tennōheika Banzai!"
jos_news.53.c:0 "Wir werden mit Ehre sterben oder mit Ruhm leben!"
jos_news.54.desc:0 "Heute um 7:48 Uhr wurde ein überraschender Militärschlag gegen den Militärstützpunkt Pearl Harbor in Honolulu, Hawaii, geflogen. Ohne formelle Vorwarnung bombardierten 357 japanische Flugzeuge den amerikanischen Hafen, was zahlreiche zivile Todesopfer forderte und die Infrastruktur beschädigte. US-Präsident [USA.GetLeader] kommentierte die Situation in einer Rede und erklärte anschließend, dass mit Unterstützung des Kongresses den Japanern der Krieg erklärt worden sei. \n\nÄhnliche Angriffe wurden aus dem gesamten Pazifikraum gemeldet, wobei es bei keinem von ihnen zuvor eine Kriegserklärung des Imperiums der Aufgehenden Sonne gegeben hatte."
jos_news.54.a:0 "Tora! Tora! Tora!"
jos_news.54.b:0 "Ein Datum, das in Schande weiterleben wird."
jos_news.54.c:0 "Sie haben den Riesen geweckt."
jos_news.55.d:0 "Auf der Suche nach einem König für ihr Land luden die Ungarn nach langen Verhandlungen und Vorbereitungen Anfang dieser Woche den Italiener Adriano Visconti, Großgraf von Mailand, offiziell ein. Heute wurde er unter großem Tamtam und Jubel in einer feierlichen Zeremonie im Budapester Königspalast zum König von Ungarn gekrönt.\n\nDer König, der seit 1936 der italienischen Luftwaffe angehört, versprach, „das uns in der Vergangenheit widerfahrene Unrecht wiedergutzumachen“ und sich dem Nationalsozialismus in Europa zu widersetzen, den er als abscheuliche und widerwärtige Ideologie bezeichnet."
jos_news.55.a:0 "Es ist nicht länger nur dem Namen nach ein Königreich."
jos_news.55.b:0 "Eine interessante Entwicklung..."
jos_news.55.c:0 "Eine interessante Entwicklung..."
jos_news.56.d:0 "Auf der Suche nach einem König für ihr Land luden die Ungarn nach langen Verhandlungen und Vorbereitungen Anfang dieser Woche den Rumänen Mihail Hohenzollern offiziell ein. Heute wurde er unter großem Tamtam und Jubel in einer feierlichen Zeremonie im Budapester Königspalast zum König von Ungarn gekrönt.\n\nEs wird gesagt, dass der Grund für diesen Schritt die Umsetzung eines alten Plans zur Vereinigung Ungarns und Rumäniens sei, der 1919 nach dem Ersten Weltkrieg ausgeheckt wurde. Aufgrund des Widerstands vieler Teile beider Nationen sowie der Tschechoslowakei und Jugoslawiens ist es jedoch ungewiss, ob diese Vereinigung jemals zustande kommen wird."
jos_news.56.a:0 "Es ist nicht länger nur dem Namen nach ein Königreich."
jos_news.56.b:0 "Eine interessante Entwicklung..."
jos_news.56.c:0 "Eine interessante Entwicklung..."
jos_news.57.d:0 "Als die Sonne im britischen Empire unterging, brach eine rote Morgendämmerung an. Arbeiter und Gewerkschaften gründeten die Union of Britain, angeführt von marxistischen Politikern, doch das Feuer der Revolution erlosch.\n\nEinem Teil der alten britischen Regierung gelang der Rückzug nach Kanada, wo sie eine Kampagne zur Befreiung ihrer alten Heimat von der Roten Angst starteten, die siegreich beendeten.\n\nHeute wird Großbritannien von einer autoritären, antikommunistischen Regierung regiert, und nur die Zeit wird zeigen, ob die Nation, die einst die Welt beherrschte, ihre Wunden heilen kann."
jos_news.57.a:0 "Gott schütze den König!"
jos_news.57.b:0 "Ein weiteres Arbeiterparadies zerstört ..."
jos_news.57.c:0 "Ziemlich unerwartet."
jos_news.58.d:0 "Die Endlösung der Judenfrage ist der offizielle Deckname für die Ermordung aller erreichbaren Juden, die nicht auf den europäischen Kontinent beschränkt war. Diese Politik des vorsätzlichen und systematischen Völkermords, die im gesamten deutsch besetzten Europa begann, wurde von der Nazi-Führung auf der Wannsee-Konferenz in der Nähe von Berlin verfahrenstechnisch und geopolitisch formuliert. \n\nZunächst planten die Nazis, die Juden nach Madagaskar, Palästina und sogar Sibirien zu verbannen. Aufgrund logistischer Probleme und der von ihren Feinden verhängten Seeblockade entschieden sie sich jedoch, dass dies die Endlösung ihrer Judenfrage sei."
jos_news.58.a:0 "Nur so kann Deutschland vor dem Judentum gerettet werden."
jos_news.58.b:0 "Eine interessante Entwicklung."
jos_news.58.c:0 "Guter Gott ..."
jos_news.59.d:0 "Die offiziell als Abteilung für Seuchenprävention und Wasseraufbereitung der Kwantung-Armee bekannte und von der Kempeitai-Militärpolizei des japanischen Kaiserreichs eingerichtete Einheit 731 wird von General Shirō Ishii, einem Sanitäter der Kwantung-Armee, kommandiert. Es handelt sich um eine Forschungs- und Entwicklungseinheit für biologische und chemische Waffen, die in Mandschukuo und den besetzten Gebieten Chinas tödliche Menschenversuche durchführt und dabei die schlimmsten Gräueltaten begeht, die die Menschheit je ersinnen konnte. \n\nSolange Japan nicht besiegt wird, werden die Chinesen für den Rest ihres Lebens in der Hölle leben."
jos_news.59.a:0 "Gott schütze den König!"
jos_news.59.b:0 "Guter Gott ..."
jos_news.60.d:0 "Der amerikanische Traum ist tot. \n\nNach dem Aufstieg Dudley Pelleys zum Präsidenten der USA verbreiteten sich landesweit Berichte über das Verschwinden von Kommunisten, Katholiken und Juden sowie die Vertreibung vieler Schwarzer. \n\nDie amerikanische Nation wird nun von einem verrückten Diktator regiert, dessen Opposition bereits aus dem Land vertrieben oder ermordet wurde. Nur Gott weiß, ob der Wahnsinn, der die USA regiert, jemals ein Ende finden wird."
jos_news.60.a:0 "Wir sind der Auslöschung der dunklen Seelen näher gekommen ..."
jos_news.60.b:0 "Eine interessante Entwicklung."
jos_news.60.c:0 "Guter Gott ..."
jos_news.61.desc:0 "Zu Beginn des Deutschen Bürgerkriegs wurde eine antifaschistische Koalition gebildet, um die Nazis zu besiegen. Dies gelang ihnen zwar, doch ihr Sieg brachte Deutschland keinen Frieden zurück. Aufgrund des wachsenden Rückhalts der Kommunisten in der Bevölkerung beschloss die deutsche Militärjunta eine Säuberung der Mitglieder der Antifaschistischen Aktion, die jedoch nur dazu führte, dass die Linken noch mehr Unterstützung in der Bevölkerung fanden. \n\nDie Kämpfe im Land brachen erneut aus, doch dieses Mal konnte die Wehrmacht nicht siegreich hervorgehen. Nun bricht in Deutschland eine rote Morgendämmerung an, und nur die Zeit wird zeigen, ob sie die Arbeiter von ihren Ketten befreien oder Deutschland letztendlich in eine Parteidiktatur verwandeln wird, so wie Stalin es mit der Sowjetunion tat."
jos_news.61.a:0 "Zerbrich die Ketten!"
jos_news.61.b:0 "Eine totalitäre Diktatur wurde durch eine andere ersetzt."
jos_news.61.c:0 "Gut gemacht, Deutschland!"
jos_news.61.d:0 "Die armen Schweine."
jos_news.62.desc:0 "Vor Monaten legte die brasilianische Armee ein Dokument mit dem Titel „Cohen-Plan“ vor, in dem es hieß, die Internationale plane eine kommunistische Revolution, genau wie die von 1935. Die Zeit verging und die Opposition gegen Vargas wurde entweder verhaftet oder ins Exil geschickt, die Verfassung von 1934 wurde umgeschrieben, um dem Präsidenten alle Macht über die Nation zu geben, und in einer 30-minütigen Radioansprache rief Getúlio Vargas den korporativistischen Estado Novo aus, der von seinem portugiesischen Gegenstück und den faschistischen Regierungen Hitlers und Mussolinis inspiriert war. \n\nDer Putsch wurde von den USA, Großbritannien und Südamerika mit Feindseligkeit betrachtet, da sie befürchteten, dass sich dieses neue halbfaschistische Regime in ein weiteres kriegstreiberisches Nazi-Deutschland verwandeln könnte."
jos_news.62.a:0 "Der neue Staat soll beginnen."
jos_news.62.b:0 "Und er nennt sich selbst den Beschützer der Arbeiter?"
jos_news.62.c:0 "Dem brasilianischen Volk wird keine Ruhe gegönnt."
jos_news.62.d:0 "Gut gemacht, Brasilien!"
jos_news.63.desc:0 "Nach dem Ende des Ausnahmezustands in Brasilien, der nach dem gescheiterten kommunistischen Putsch von 1935 verhängt worden war, begann Getúlio Vargas, seinen Einfluss auf den Kongress zu lockern, um zur lang ersehnten Demokratie zurückzukehren. Dies sollte jedoch nicht lange anhalten, da Präsident Vargas gestern von einem Unbekannten auf den Straßen von Rio de Janeiro erschossen wurde. Getúlio Vargas starb noch am selben Tag. \nNach Angaben von Zeugen seines Todes war eines seiner letzten Worte vor seinem Ableben: „Ich kann nicht sterben, nicht jetzt. Es gibt noch viel zu tun.“ \n\nMöge er nun in Frieden ruhen, im Gegensatz zu seinem Land, das heute von Filinto Müller regiert wird, dem Chef der Geheimpolizei, der für seine Brutalität und seine Unterstützung Nazi-Deutschlands bekannt ist."
jos_news.63.a:0 "Was wird jetzt aus Brasilien?"
jos_news.63.b:0 "Eine interessante Entwicklung."
jos_news.63.c:0 "Dem brasilianischen Volk wird keine Ruhe gegönnt."
jos_news.63.d:0 "Diese Bastarde."
jos_news.64.desc:0 "Heute wurde die Anordnung .91481 von [BRA.GetLeader] genehmigt. Darin wurde der Friedensvertrag zwischen den Brasilianern und dem Volk der Toninha (oder Porpoise, wie sie im Englischen genannt werden) unterzeichnet, der den Toninha-Krieg von 1918 offiziell beendete und die Rekrutierung von Toninha-Matrosen für den Kampf gegen die Invasoren des Landes autorisierte. \n\nDie Entscheidung wurde von beiden Seiten mit Begeisterung aufgenommen, und es scheint, dass ehemalige Feinde nun gemeinsam gegen die Bedrohungen kämpfen werden, die die Unabhängigkeit ihres Heimatlandes bedrohen."
jos_news.64.a:0 "Schwere Zeiten schaffen interessante Allianzen."
jos_news.64.b:0 "Warte, was?"
