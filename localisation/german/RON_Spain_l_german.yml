 guard_gibraltar_strait_tt:0 "„Dadurch wird jedem Land, das einen Angriffskrieg führt, der Zugang durch die Meerenge verwehrt.“"
 ####
 SPR_Industry_focus:0 "Ausbau der zivilen Industrie"
 SPR_Industry_focus_desc:0 "Um unsere Wirtschaft anzukurbeln, sollten wir den Bau weiterer ziviler Fabriken fördern. In Zeiten der Not können diese vom Staat übernommen und zum Bau von Militärfabriken genutzt oder sogar in solche umgewandelt werden!"
 SPR_Industry_focus_short_desc:0 "Ausbau der zivilen Industrie"
 SPR_Industry_focus_2:0 "Ausbau der zivilen Industrie in Leon"
 SPR_Industry_focus_2_desc:0 "Geschäftskontakte deuten darauf hin, dass es eine Chance gibt, unsere Branche in Leon zu erweitern. Lassen Sie es uns tun!"
 SPR_Industry_focus_2_short_desc:0 "Branche erweitern"
 SPR_Colonial_infra:0 "Verbesserung der kolonialen Infrastruktur"
 SPR_Colonial_infra_desc:0 "Wenn wir mehr Truppen in unseren Kolonialgebieten stationieren wollen, müssen wir zunächst unsere Infrastruktur dort ausbauen. Dies könnte uns auch den Bau weiterer Fabriken ermöglichen!"
 SPR_Colonial_infra_short_desc:0 "Infrastruktur verbessern"
 SPR_Spain_infra:0 "Autobahnprojekt Saragossa – Badajoz"
 SPR_Spain_infra_desc:0 "Wir können Experten schicken, um die deutsche Autobahn zu untersuchen und dann unsere eigene Version zu bauen. Sie wird von der Stadt Saragossa, unweit der französischen Grenze, nach Badajoz führen, einer Stadt nahe der portugiesischen Grenze."
 SPR_Spain_infra_short_desc:0 "Autobahnprojekt"
 SPR_Colonial_Industry:0 "Kolonialindustrie"
 SPR_Colonial_Industry_desc: "After our expansion of highways and other infrastructure in our colonial provinces, the economy there is starting to look better. We should be able to get our civilian companies to build more factories there."
 SPR_Colonial_Industry_short_desc:0 "Industrie Kolonial"
 SPR_Industry_focus_3:0 "Ausbau der Industrie"
 SPR_Industry_focus_3_desc:0 "Wir sollten in der Lage sein, neben unseren neuen Autobahnen mehr Fabriken zu bauen, um einen schnelleren Gütertransport zu ermöglichen."
 SPR_Industry_focus_3_short_desc:0 "Expansionsbranche"
 SPR_Mines:0 "Erweitern Sie die spanischen Minen"
 SPR_Mines_desc:0 "Mit staatlichen Mitteln könnten wir unsere Aluminium- und Wolframminen erweitern."
 SPR_Mines_short_desc:0 "Minen erweitern"
 SPR_Colonial_oil:0 "Ölvorkommen in der Westsahara"
 SPR_Colonial_oil_desc:0 "Manche Leute sprechen schon seit geraumer Zeit über die Möglichkeit von Ölvorkommen in der Sahara. Bisher hat ihnen niemand zugehört, und wenn wir nicht wären, würde ihnen wahrscheinlich auch in Zukunft niemand zuhören. Lassen Sie uns die Möglichkeit von Ölvorkommen in der Westsahara untersuchen."
 SPR_Colonial_oil_short_desc:0 "Aussicht auf Öl"
 SPR_Conversion:0 "Übernahme ziviler Fabriken"
 SPR_Conversion_desc:0 "In Kriegszeiten kann eine Regierung extreme Maßnahmen ergreifen, um die Kriegsanstrengungen zu unterstützen. Eine dieser Maßnahmen besteht darin, die Kontrolle über zivile Fabriken zu übernehmen und sie in Militärfabriken umzuwandeln."
 SPR_Conversion_short_desc:0 "Übernahme"
 SPR_Conv:0 "Übernahmegesetze erlassen"
 SPR_Conv_desc:0 "Wir haben Gesetze und Verfahren eingeführt, die es uns ermöglichen, zivile Fabriken zu übernehmen und viel einfacher umzuwandeln."
 SPR_Mil_industry:0 "Ausbau der Rüstungsindustrie"
 SPR_Mil_industry_desc:0 "„Wer Frieden will, bereitet sich auf den Krieg vor.“ Das gilt auch heute noch. Beginnen wir mit dem Ausbau unserer Rüstungsindustrie."
 SPR_Mil_industry_short_desc:0 "Expansion Militär"
 SPR_Mil_industry_2:0 "Fortgeschrittener militärisch-industrieller Komplex"
 SPR_Mil_industry_2_desc:0 "Wir könnten wahrscheinlich bestimmte Leute dazu bewegen, in unsere Rüstungsindustrie zu investieren, wenn wir ihnen eine gute Rendite auf ihre Investitionen versprechen."
 SPR_Mil_industry_2_short_desc:0 "Fortschrittliche Militärindustrie"
 Instalaza_SA:0 "Instalaza SA"
 Instalaza_SA_desc:0 "Ein spanisches Unternehmen, das Infanterieausrüstung, Panzerabwehrwaffen und Munition herstellt."
 SPR_Instalaza:0 "Instalaza gefunden"
 SPR_Instalaza_desc:0 "Wir brauchen ein nationales Unternehmen, das wir mit der Entwicklung und Optimierung unserer Infanterieausrüstung beauftragen können. Lassen Sie uns Instalaza SA gründen."
 SPR_Instalaza_short_desc:0 "Instalaza gefunden"
 SPR_Research:0 "Military R&D"
 SPR_Research_desc:0 "Unser neu erweiterter militärisch-industrieller Komplex sollte in der Lage sein, neue Technologien für unser Land zu erforschen."
 SPR_Research_short_desc:0 "Military R&D"
 SPR_Col_Forts:0 "Fügt Festungen der Stufe 4 in Spanisch-Afrika hinzu"
 SPR_Colonial_Forts:0 "Spanisches Afrika stärken"
 SPR_Colonial_Forts_desc:0 "Um die lebenswichtige Kolonie Spanisch-Afrika vor ausländischen Invasoren zu schützen, müssen wir die Region befestigen."
 SPR_Colonial_Forts_short_desc:0 "Spanisches Afrika stärken"
 SPR_Mil:0 "Neue Lehren entwickeln"
 SPR_Mil_desc:0 "Wenn wir eine gewaltige Macht sein wollen, müssen wir unsere Landdoktrinen weiterentwickeln, um nicht hinter alle anderen zurückzufallen."
 SPR_Mil_short_desc:0 "Lehren entwickeln"
 SPR_Equipment:0 "Geräteaufwand"
 SPR_Equipment_desc:0 "Verbessern wir unsere Infanterieausrüstung und Artilleriegeschütze."
 SPR_Equipment_short_desc:0 "Geräteaufwand"
 SPR_Expand:0 "Offizierskorps erweitern"
 SPR_Expand_desc:0 "Erweitern wir unser Offizierskorps. Wenn wir eine neue Generation junger Offiziere in den Generalstab holen, können wir vielleicht neue Doktrinen für unsere Armee entwickeln."
 SPR_Expand_short_desc:0 "Offizier erweitern"
 SPR_Mot:0 "Motorisieren Sie unsere Armee"
 SPR_Mot_desc:0 "Eine motorisierte Armee wäre wesentlich effektiver darin, den Feind einzukreisen und Gebiete zu erobern. Vielleicht sollten wir eine solche Armee aufbauen."
 SPR_Mot_short_desc:0 "Motorisieren"
 SPR_Mech:0 "Mechanisierungsbemühungen"
 SPR_Mech_desc:0 "Wir können die Mobilität unserer Armee noch weiter steigern, indem wir unseren Truppen zusätzlichen Schutz durch mechanisierte Infanteriefahrzeuge bieten."
 SPR_Mech_short_desc:0 "Mechanisierungsbemühungen"
 SPR_Fortify_Islands:0 "Befestigen Sie die Inseln und Guinea"
 SPR_Fortify_Islands_desc:0 "Wir müssen unsere Inseln und unseren Kolonialbesitz in Guinea befestigen, dies wird dazu beitragen, Truppen in anderen Gebieten freizusetzen."
 SPR_Fortify_Islands_short_desc:0 "Befestigen Sie die Inseln"
 SPR_Island_Forts:0 "Fügt Küstenfestungen auf den Kanarischen Inseln und den Balearen hinzu und fügt reguläre Festungen in Äquatorialguinea hinzu."
 SPR_Fra_Forts:0 "Fügt Festungen der Stufe 5 an der nördlichen französischen Grenze hinzu."
 SPR_Fortify_Fra:0 "Befestigen Sie die französische Grenze"
 SPR_Fortify_Fra_desc:0 "Um unsere Sicherheit zu gewährleisten, sollten wir entlang der französischen Grenze eine Befestigungslinie errichten."
 SPR_Fortify_Fra_short_desc:0 "Befestigen Sie die französische Grenze"
 SPR_Doctrine:0 "Neue Lehren entwickeln"
 SPR_Doctrine_desc:0 "Wir müssen dafür sorgen, dass unsere Militärdoktrinen auf dem neuesten Stand bleiben. Vielleicht können wir bestimmte Doktrinen sogar vor unseren Feinden entwickeln."
 SPR_Doctrine_short_desc:0 "Lehren entwickeln"
 SPR_Doc_Bonus_2:0 "Artillerieforschung"
 SPR_Doc_Bonus_2_desc:0 "Unsere Erfahrungen mit dem Bau von Festungen zeigen, dass wir größere Artilleriegeschütze und stärkere Panzerabwehrkanonen benötigen, wenn wir die feindlichen Befestigungen durchbrechen wollen."
 SPR_Doc_Bonus_2_short_desc:0 "Artillerieforschung"
 SPR_Domestic_Tanks:0 "Designs für Haushaltstanks"
 SPR_Domestic_Tanks_desc:0 "Wir können unsere eigenen Panzermodelle entwickeln. Sie sind zwar vielleicht nicht so fortschrittlich wie die der großen Militärmächte, aber sie werden zumindest spanisch sein!"
 SPR_Domestic_Tanks_short_desc:0 "Haushaltstanks"
 SPR_Foreign_Tanks:0 "Ausländische Panzerdesigns"
 SPR_Foreign_Tanks_desc:0 "Wir pflegen freundschaftliche Beziehungen zu einem Land, das leistungsstarke Panzer produziert. Wenn wir einen unserer Freunde davon überzeugen können, uns bei der Entwicklung eines neuen Panzers zu unterstützen, erhalten wir ein weitaus fortschrittlicheres Design, als unsere Konstrukteure es allein schaffen könnten."
 SPR_Foreign_Tanks_short_desc:0 "Ausländische Panzer"
 SPR_Doc_Wep:0 "Standardisierung von Waffen und Doktrinen"
 SPR_Doc_Wep_desc:0 "Wir sollten unsere Waffen und Doktrinen standardisieren, um sicherzustellen, dass wir den Einsatz unserer modernsten Waffen planen und trainieren und uns gleichzeitig auf die Waffen der Zukunft vorbereiten. Dies wird es uns erleichtern, neue Taktiken und Doktrinen für unsere Armee zu entwickeln."
 SPR_Doc_Wep_short_desc:0 "Standardisierung"
 SPR_Naval:0 "Marinebemühungen"
 SPR_Naval_desc:0 "Wir müssen unsere Marine ausbauen, um uns weiterhin gegen regionale Feinde schützen zu können. Lasst uns mehr Werften bauen."
 SPR_Naval_2:0 "SECN erweitern"
 SPR_Naval_2_desc:0 "Die Sociedad Española de Construcción Naval, zu Deutsch die Spanische Gesellschaft für Schiffsbau, ist die treibende Kraft hinter der spanischen Marineforschung und -produktion. Wir sollten ihre Einrichtungen erweitern und sie finanziell stärker unterstützen. Dann sollte sie uns bei der Entwicklung neuer Doktrinen für unsere Marine unterstützen können."
 SPR_Naval_2_short_desc:0 "SECN"
 SPR_Subs:0 "Erweitern Sie unsere U-Boot-Flotte"
 SPR_Subs_desc:0 "U-Boote haben sich als äußerst nützlich erwiesen. Erweitern wir unsere U-Boot-Flotte mit neuen, modernen U-Booten."
 SPR_Subs_short_desc:0 "U-Boot-Flotte"
 SPR_Screens:0 "Entwürfe für Begleitschiffe"
 SPR_Screens_desc:0 "Modernisieren wir unsere Begleitschiffe wie Schwere Kreuzer und Zerstörer. Ihre Aufgabe ist es, unsere größeren Schiffe wie die Schlachtschiffe der España-Klasse zu schützen."
 SPR_Screens_short_desc:0 "Escort-Designs"
 SPR_Capitals:0 "Schlachtschiff-Bemühungen"
 SPR_Capitals_desc:0 "Schlachtschiffe beherrschen derzeit die Meere. Lasst uns eine neue Version für unsere Nation entwerfen und produzieren!"
 SPR_Capitals_short_desc:0 "Fokus auf Großkampfschiffe"
 SPR_Carriers:0 "Baue einen Träger"
 SPR_Carriers_desc:0 "Die Marinefliegerei hat sich als jeder Kanone auf jedem Schlachtschiff überlegen erwiesen. Wir müssen dies verstehen und ausnutzen, indem wir einen Flugzeugträger für Spanien bauen."
 SPR_Carriers_short_desc:0 "Baue einen Träger"
 SPR_Nav_Air:0 "Erweiterung der Marineluftfahrt"
 SPR_Nav_Air_desc:0 "Unsere Träger müssen von Marineflugzeugen unterstützt werden. Lasst uns neue Modelle erforschen!"
 SPR_Nav_Air_short_desc:0 "Marineluft"
 SPR_Air_Officers:0 "Ausbau der Luftwaffenakademien"
 SPR_Air_Officers_desc:0 "Wenn wir unsere Luftwaffe ausbauen wollen, müssen wir dafür sorgen, dass mehr kluge junge Männer im Fliegen und Führen ausgebildet werden. Wir sollten mehr Akademien für unsere Luftwaffe bauen!"
 SPR_Air_Officers_short_desc:0 "Akademien erweitern"
 SPR_Air_Factories:0 "Staatliche Flugzeugfabriken"
 SPR_Air_Factories_desc:0 "Wir sollten unsere Produktionskapazitäten durch den Bau neuer Fabriken für den Flugzeugbau erweitern."
 SPR_Air_Factories_short_desc:0 "Flugzeugfabriken"
 SPR_Fighters:0 "Entwicklung neuer Kampfflugzeuge"
 SPR_Fighters_desc:0 "Unabhängig davon, für welchen Bombertyp wir uns entscheiden, müssen wir Kampfflugzeuge entwickeln und produzieren. CASA, unser Kampfflugzeugkonstrukteur, sollte mit der Aufgabe betraut werden, ein neues Kampfflugzeug zu entwickeln, das mit ausländischen Entwürfen mithalten kann."
 SPR_Fighters_short_desc:0 "Kämpfer entwickeln"
 SPR_CAS:0 "Luftnahunterstützung"
 SPR_CAS_desc:0 "Unsere Generäle sind überzeugt, dass uns die Unterstützung auf dem Schlachtfeld jeden Krieg gewinnen wird. Der Feind kann so viel Ausrüstung produzieren, wie er will, aber wenn wir sie auf dem Schlachtfeld zerstören, nützt sie nichts!"
 SPR_CAS_short_desc:0 "CAS"
 SPR_Tac_Bomber:0 "Taktischer Bombereinsatz"
 SPR_Tac_Bomber_desc:0 "Einige in unserer Luftwaffe sind überzeugt, dass taktische Bomber die Zukunft sind. Sie können nicht nur Unterstützung auf dem Schlachtfeld leisten, sondern auch feindliche Fabriken bombardieren, wenn auch nicht so effektiv wie strategische Bomber."
 SPR_Tac_Bomber_short_desc:0 "TAC"
 SPR_Strat:0 "Strategische Bomberbemühungen"
 SPR_Strat_desc:0 "Manche sind davon überzeugt, dass die strategische Zerstörung feindlicher Fabriken den Feind letztlich schwächen und uns so den Sieg ermöglichen wird. Wir könnten Flugzeuge entwickeln, die dazu in der Lage sind, obwohl manche Politiker an unserer Fähigkeit zweifeln, sie in ausreichender Stückzahl zu produzieren."
 SPR_Strat_short_desc:0 "Strat"
 SPR_Air_Doctrine:0 "Entwicklung von CAS-Doktrinen"
 SPR_Air_Doctrine_desc:0 "Nachdem wir uns nun darauf geeinigt haben, auf welche Art von Bomberflugzeugen wir uns konzentrieren wollen, sollten wir unsere Doktrinen entsprechend anpassen."
 SPR_Air_Doctrine_short_desc:0 "Luftdoktrinen"
 SPR_Air_Doctrine_2:0 "Entwicklung taktischer Bomberdoktrinen"
 SPR_Air_Doctrine_2_desc:0 "Nachdem wir uns nun darauf geeinigt haben, auf welche Art von Bomberflugzeugen wir uns konzentrieren wollen, sollten wir unsere Doktrinen entsprechend anpassen."
 SPR_Air_Doctrine_2_short_desc:0 "Luftdoktrinen"
 SPR_Air_Doctrine_3:0 "Entwicklung strategischer Bomberdoktrinen"
 SPR_Air_Doctrine_3_desc:0 "Nachdem wir uns nun darauf geeinigt haben, auf welche Art von Bomberflugzeugen wir uns konzentrieren wollen, sollten wir unsere Doktrinen entsprechend anpassen."
 SPR_Air_Doctrine_3_short_desc:0 "Luftdoktrinen"
 SPR_Exercises:0 "Führen Sie groß angelegte Kriegsspiele durch"
 SPR_Exercises_desc:0 "Solange wir im Frieden leben, sollten wir große Kriegsspiele durchführen, um unsere Truppen auf den Krieg vorzubereiten."
 SPR_Exercises_short_desc:0 "Kriegsspiele"
 SPR_Political_Effort:0 "Einen neuen Berater ernennen"
 SPR_Political_Effort_desc:0 "Wenn wir unsere Gesellschaft verändern oder die aktuelle Ordnung festigen wollen, müssen wir dafür sorgen, dass wir loyale Menschen unter uns haben."
 SPR_Political_Effort_short_desc:0 "Berater"
 SPR_Fascism:0 "Faschistische Propaganda"
 SPR_Fascism_desc:0 "Sorgen wir dafür, dass unser Volk sich hinter unsere Sache stellt, die Sache des Katholizismus, des Nationalismus und des Konservatismus!"
 SPR_Fascism_short_desc:0 "Faschismus"
 SPR_Fascist_Rec:0 "Rekrutierungskampagne"
 SPR_Fascist_Rec_desc:0 "Durch Propaganda sollten wir in der Lage sein, die Zahl der Männer zu erhöhen, die bereit sind, in unserer Armee zu dienen."
 SPR_Fascist_Rec_short_desc:0 "Werbung"
 SPR_Communism_Idea:0 "Kommunistische Propaganda"
 SPR_Communism_Idea_desc:0 "Die kommunistische Propaganda, die wir verbreiten, hat unserer Nation geholfen, indem wir daran gearbeitet haben, die Bereitschaft unserer Bevölkerung zu steigern, die Revolution im Ausland zu verbreiten."
 SPR_Recruitment_Fascist:0 "Faschistische Rekrutierungskampagne"
 SPR_Recruitment_Fascist_desc:0 "Nationalistische Propaganda, die an den Stolz und Nationalismus unseres Volkes appelliert, hat zu einem starken Anstieg der Freiwilligenzahlen in unserer Armee geführt."
 SPR_Communism:0 "Kommunistische Indoktrination"
 SPR_Communism_desc:0 "Stellen wir sicher, dass unser Volk bereit ist, sich für die kommunistische Sache zu opfern. Wir werden sowohl bei Erwachsenen als auch in Schulen kommunistische Propaganda betreiben."
 SPR_Communism_short_desc:0 "Kommunistische Indoktrination"
 SPR_Spain_First:0 "Bilden Sie unsere eigene Fraktion"
 SPR_Spain_First_desc:0 "Spanien zuerst! Wir weigern uns, uns dem Kommando anderer Nationen zu unterwerfen. Wir weigern uns, uns anderen Nationen unterzuordnen. Wir werden eine Fraktion gründen, in der wir der einzige Anführer sein werden!"
 SPR_Spain_First_short_desc:0 "Spanien zuerst"
 SPR_Join_Germany:0 "Treten Sie der Achse bei"
 SPR_Join_Germany_desc:0 "Wir sollten uns mit unseren ideologischen Kameraden in Deutschland anfreunden und uns ihrer Fraktion anschließen. Dadurch würden wir von ihnen geschützt, obwohl wir höchstwahrscheinlich auch in ihre Kriege gerufen würden."
 SPR_Join_Germany_short_desc:0 "Achse"
 SPR_Befriend_Por:0 "Befreunde dich mit Portugal"
 SPR_Befriend_Por_desc:0 "Wir sollten unsere neue Fraktion erweitern. Portugal wäre ein vielversprechendes Mitglied. Die dortige Estado-Novo-Regierung ist zwar nicht streng faschistisch, aber dennoch eine konservative, rechtsgerichtete Autokratie, die wir akzeptieren können."
 SPR_Befriend_Por_short_desc:0 "Portugal"
 SPR_Take_Por:0 "Vereint die Iberische Halbinsel"
 SPR_Take_Por_desc:0 "Wir müssen unseren Staat erweitern. Portugal steht unserer Expansion im Weg, und wir würden ihnen einen Gefallen tun, wenn wir ihnen endlich ihr Land wegnehmen würden."
 SPR_Take_Por_short_desc:0 "Iberia"
 SPR_Communist_Propaganda:0 "Kommunistische Rekrutierungspropaganda"
 SPR_Communist_Propaganda_desc:0 "Wir sollten die Bekanntheit unserer Freiwilligenbrigaden steigern. Sorgen wir dafür, dass sich junge Menschen aus ganz Spanien dem Kampf gegen Faschismus und Kapitalismus anschließen!"
 SPR_Communist_Propaganda_short_desc:0 "Kommunistische Propaganda"
 SPR_Nuclear:0 "Wunderwaffen"
 SPR_Nuclear_desc:0 "Unsere Wissenschaftler sind davon überzeugt, dass wir eine Waffe entwickeln könnten, die so zerstörerisch ist, dass sie eine ganze Stadt zerstören könnte. Dies würde allerdings erhebliche Forschungsinvestitionen erfordern."
 SPR_Nuclear_short_desc:0 "Wunderwaffen"
 SPR_Join_USSR:0 "Treten Sie der Komintern bei"
 SPR_Join_USSR_desc:0 "Die Sowjetunion ist die Heimat der Revolution und als solche sollten wir uns ihr anschließen und unsere Bemühungen zur Befreiung der arbeitenden Bevölkerung Europas und des Rests der Welt koordinieren."
 SPR_Join_USSR_short_desc:0 "UdSSR"
 SPR_Por_Faction:0 "Lade Portugal zu unserer Fraktion ein"
 SPR_Por_Faction_desc:0 "Jetzt, da sie eine kommunistische Regierung haben, sollten wir sie in unsere Fraktion einladen."
 SPR_Por_Faction_short_desc:0 "Portugal einladen"
 SPR_influence_drift_communism:0 "Spanische kommunistische Propaganda"
 SPR_influence_drift_communism_desc:0 "Spanische Kommunisten beeinflussen unsere Nation!"
 SPR_Com_Take_Por:0 "Bringen Sie die Revolution nach Portugal"
 SPR_Com_Take_Por_desc:0 "Wir sollten die kommunistische Revolution auf Portugal ausweiten. Dort scheint man dieser Idee gegenüber nicht sehr aufgeschlossen zu sein, daher wäre eine Invasion vielleicht die richtige Vorgehensweise."
 SPR_Com_Take_Por_short_desc:0 "Spread Revolution"
 SPR_Por_Com:0 "Einflusspolitik in Portugal"
 SPR_Por_Com_desc:0 "Wir sollten alles in unserer Macht Stehende tun, um den Kommunismus in Portugal zu unterstützen."
 SPR_Por_Com_short_desc:0 "Politik"
 SPR_France_Ger:0 "Angriff auf Frankreich"
 SPR_France_Ger_desc:0 "Wir sollten die Franzosen angreifen, solange sie noch einen großen Teil ihrer Truppen an der Maginot-Linie zurückhalten."
 SPR_France_Ger_short_desc:0 "Angriff auf Frankreich"
 SPR_France_Attack:0 "Dolchstoß den Franzosen in den Rücken!"
 SPR_France_Attack_desc:0 "Die feige französische Nation sollte sich Spanien unterwerfen. Unser Militär wird dafür sorgen, dass dies geschieht."
 SPR_France_Attack_short_desc:0 "Stechen"
 SPR_France_Communist:0 "Die Revolution nach Frankreich bringen"
 SPR_France_Communist_desc:0 "Frankreich ist eine degenerierte, kapitalistische Nation. Wir müssen ein Regime errichten, in dem die Arbeiter an der Macht sind!"
 SPR_France_Communist_short_desc:0 "Spread Revolution"
 SPR_influence_drift_democratic:0 "Unterstützung für die Demokratie nimmt zu"
 SPR_influence_drift_democratic_short:0 "Unsere Bevölkerung wird der Idee der Demokratie gegenüber aufgeschlossener."
 SPR_Democracy:0 "Unterstützen Sie die Demokratie in unserem Land"
 SPR_Democracy_desc:0 "Die Entscheidung des Volkes in friedlichen und fairen Wahlen ist die einzige zivilisierte Art zu regieren. Lasst uns eine demokratische und zivilisierte Gesellschaft aufbauen!"
 SPR_Democracy_short_desc:0 "Unterstützen Sie die Demokratie"
 SPR_Democracy_Por:0 "Unterstützen Sie die Demokratie in Portugal"
 SPR_Democracy_Por_desc:0 "Wir sollten demokratische Bewegungen in Portugal unterstützen."
 SPR_Democracy_Por_short_desc:0 "Unterstützen Sie die Demokratie"
 SPR_Take_Por_Democratic:0 "Demokratie mit Gewalt verbreiten"
 SPR_Take_Por_Democratic_desc:0 "Portugal wird nicht nachgeben. Es ist Zeit, unsere Armee für den vorgesehenen Zweck einzusetzen!"
 SPR_Take_Por_Democratic_short_desc:0 "Demokratie verbreiten"
 SPR_Italy:0 "Erobern Sie alte aragonesische Länder zurück"
 SPR_Italy_desc:0 "Italien vertritt eine feindliche Ideologie und deshalb könnten wir Italien angreifen und uns das zurückholen, was uns einst rechtmäßig gehörte."
 SPR_Italy_short_desc:0 "Zurücknehmen"
 SPR_Gib_Gib:0 "Erobern Sie Gibraltar zurück"
 SPR_Gib_Gib_desc:0 "Gibraltar wurde uns von den feigen Briten gestohlen. Jetzt, wo sie mit der Weltlage beschäftigt sind, sollten wir es uns zurückholen!"
 SPR_Gib_Gib_short_desc:0 "Gib Gibraltar"
 SPR_Ven:0 "Erobern Sie die Kolonie Venezuela zurück"
 SPR_Ven_desc:0 "Die Provinz Venezuela, wie wir sie früher nannten, ist in Südamerika ein Dorn im Auge der demokratischen Welt. Sollten wir sie angreifen, hätten unsere Verbündeten wahrscheinlich nichts dagegen, selbst wenn wir sie wieder in unsere glorreiche spanische Nation integrieren würden."
 SPR_Ven_short_desc:0 "Venezuela zurückerobern"
 SPR_Col:0 "Kolumbien rekolonialisieren"
 SPR_Col_desc:0 "Wir sollten uns dafür einsetzen, Spanien wieder zu einer Kolonialmacht zu machen. Frankreich, Großbritannien und die Niederlande besitzen zwar Kolonien in Südamerika, doch unsere sind seit langem unabhängig. Fangen wir an, sie zurückzuerobern!"
 SPR_Col_short_desc:0 "Kolumbien zurückerobern"
 SPR_Research_2:0 "Erweitern Sie unsere Universitäten"
 SPR_Research_2_desc:0 "Um sicherzustellen, dass wir nicht ins Hintertreffen geraten, sollten wir unsere Universitäten und insbesondere die Forschungsabteilungen innerhalb unserer Universitäten ausbauen."
 SPR_Research_2_short_desc:0 "Universitäten erweitern"
 SPR_Cuba:0 "Der Generalkapitän von Kuba"
 SPR_Cuba_desc:0 "Die Vereinigten Staaten nahmen uns Kuba 1898 ab und machten es zu einem Zufluchtsort für ihre Reichen. Es ist praktisch ein Marionettenstaat! Lasst uns zurückholen, was uns rechtmäßig zusteht, auch wenn das bedeutet, gegen die schmierigen Amerikaner zu kämpfen."
 SPR_Cuba_short_desc:0 "Kuba"
 SPR_Phil:0 "Der Generalkapitän der Philippinen"
 SPR_Phil_desc:0 "Das Generalkapitänsamt der Philippinen war einst unsere Kolonie auf den Philippinen. Die Vereinigten Staaten haben es uns genommen, genau wie Kuba. Das wird nicht hingenommen!"
 SPR_Phil_short_desc:0 "Philippinen"
 SPR_PRU:0 "Fordern Sie das Vizekönigreich Peru zurück"
 SPR_PRU_desc:0 "Genau wie Venezuela wird diese ehemalige Kolonie derzeit von einer feindlichen Ideologie beherrscht. Wir sind zuversichtlich, dass unsere demokratischen Verbündeten nichts dagegen haben werden, wenn wir die Ordnung dort wiederherstellen."
 SPR_PRU_short_desc:0 "Peru zurückerobern"
 SPR_DOM:0 "Generalkapitän von Santo Domingo"
 SPR_DOM_desc:0 "Die Generalkapitänschaft von Santo Domingo umfasste das heutige Haiti und die Dominikanische Republik. Letztere wird derzeit von einer feindlichen Ideologie beherrscht, und deshalb konnten wir unsere Verbündeten davon überzeugen, uns das Land angreifen und die Ordnung wiederherstellen zu lassen."
 SPR_DOM_short_desc:0 "Kapitänsamt DOM"
 SPR_eq_bonus:0 "Infanterieausrüstung und Artilleriebonus"
 SPR_Civ_Econ:0 "Entwicklung des privaten Sektors"
 SPR_Civ_Econ_desc:0 "Wir sollten das Wirtschaftswachstum in unserem Land fördern, indem wir die Unternehmenssteuern senken und die Regulierung lockern. Unser Land befindet sich nach dem Bürgerkrieg in einem traurigen Zustand, und deshalb brauchen wir dies dringend. Während eines Krieges können wir eine solche Politik jedoch nicht verfolgen."
 SPR_Civ_Econ_short_desc:0 "Entwickeln Sie Privat"
 SPR_Civ_Factory_Idea:0 "Privatsektor wächst"
 SPR_Civ_Factory_Idea_desc:0 "Aufgrund unserer erfolgreichen Wirtschaftspolitik wächst unser Privatsektor."
 SCW_fervour:0 "Bürgerkriegseifer"
 SCW_great_offensive:0 "Große Offensive"





 veren.1.t:0 "Eine Einladung aus Spanien"
 veren.1.d:0 "Spanien beabsichtigt, eine eigene Fraktion zu gründen, und möchte, dass wir uns anschließen. Ein Ja würde uns einen starken Verbündeten in der Region sichern, ein Nein hingegen würde höchstwahrscheinlich zu einer Invasion führen."
 veren.1.a:0 "Wir werden uns ihrer Fraktion anschließen"
 veren.1.b:0 "Nein, bleiben Sie unabhängig, auch wenn das Krieg bedeutet!"
 veren.2.t:0 "Franco wird unsere Truppen befehligen"
 veren.2.d:0 "General Franco wird nun nicht nur der Führer unserer Nation sein, sondern auch das Kommando über unsere Truppen übernehmen."
 veren.2.a:0 "Großartig!"
 veren.3.t:0 "Portugal tritt unserer Fraktion bei"
 veren.3.d:0 "Nach reiflicher Überlegung hat die portugiesische Regierung beschlossen, unserer Fraktion beizutreten."
 veren.3.a:0 "Wunderbar!"
 veren.4.t:0 "Portugal lehnt ab"
 veren.4.d:0 "Portugal hat sich trotz Drucks der Alliierten und politischer Kräfte innerhalb seiner Regierungspartei geweigert, unserer Fraktion beizutreten."
 veren.4.a:0 "Verdammt sollen sie sein!"
 veren.5.t:0 "Das Islero Bomba-Projekt"
 veren.5.d:0 "Das Islero-Bomben-Projekt war ein spanisches Atomprojekt, das vom spanischen Präsidenten Franco initiiert wurde. Andere Nationen werden dies nicht besonders gern sehen."
 veren.5.a:0 "Spanien wird eine Atomwaffe bauen!"
 veren.6.t:0 "Vicente Rojo Lluch wird unser Truppenkommando übernehmen"
 veren.6.d:0 "Obwohl er mit der konservativen Unión Militar Español in Verbindung steht und ein gläubiger Katholik ist, übernimmt Vicente Rojo Lluch das Kommando über unsere Truppen."
 veren.6.a:0 "Wunderbar!"
 veren.7.t:0 "Katalanische Bewegung"
 veren.7.d:0 "Lluís Companys rief den katalanischen Unabhängigkeitsstaat aus und rief zu einem bewaffneten Aufstand gegen die Regierung auf. Das dürfen wir nicht zulassen. Nach den Generalstreiks befürchten viele Politiker eine Revolution, die Spanien spalten könnte. Um die Stabilität zu wahren, müssen wir das Kriegsrecht verhängen und Truppen entsenden, um diese Bewegung niederzuschlagen."
 veren.7.a:0 "Schreckliche Zeiten ..."
 veren.8.t:0 "Erholung vom Bürgerkrieg"
 veren.8.d:0 "Unsere neu eingesetzte Regierung konzentriert sich derzeit auf den Wiederaufbau des Landes und ist weniger bereit, sich einer Fraktion anzuschließen oder in den Krieg zu ziehen."
 veren.8.a:0 "OK!"
