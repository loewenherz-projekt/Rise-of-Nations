 SPR_failing_republic:0 "Eine scheiternde Republik"
 ww2_spain.1.t:0 "Wahlen von 1936"
 ww2_spain.1.d:0 "Während die Ergebnisse aus ganz Spanien noch immer eintreffen, ist klar, dass die Volksfront die Mehrheit errungen hat. Während viele Linke dieses Ergebnis bejubeln, sprechen sich auf der Rechten einige für einen Putsch aus. Das spanische politische Spektrum ist gespalten, und die Zukunft ist unklar."
 ww2_spain.1.a:0 "Wir werden nicht aufgeben!"
 ww2_spain.1.b:0 "Die Demokratie hat gesprochen"
 ww2_spain.3.t:0 "Bürgerkrieg!"
 ww2_spain.3.d:0 "Eine Gruppe mächtiger Generäle der Streitkräfte hat ein Pronunciamento herausgegeben, in dem sie die derzeitige spanische Regierung scharf verurteilt! Sie haben mit Unterstützung konservativer Monarchisten und des Klerus einen rechtsgerichteten Putsch gestartet. Ein erheblicher Teil des Militärs hat sich auf die Seite dieser Nationalisten gestellt.\n\nLinke Freiwillige schließen sich der republikanischen Regierung an und unterstützen sie im Kampf gegen die Rebellen. Diese Loyalisten mögen schlecht ausgebildet sein, doch ihr Enthusiasmus ist unbestritten.\n\nDie Fronten sind klar gezogen."
 ww2_spain.3.a:0 "Verräter der Republik!"
 ww2_spain.3.b:0 "Die Republikaner werden untergehen!"
 ww2_spain.4.t:0 "Waffenlager entdeckt"
 ww2_spain.4.d:0 "Beim Einmarsch in [state_target.GetName] stießen unsere Truppen auf ein Lager mit Gewehren und Munition. Sie beschlagnahmten sofort den Inhalt des Lagers. Die Ausrüstung wurde wahrscheinlich nach dem Rückzug unseres Feindes dort zurückgelassen."
 ww2_spain.4.a:0 "Eine große Überraschung"
 ww2_spain.5.t:0 "Infante Juan will sich der Schlacht anschließen"
 ww2_spain.5.d:0 "Eine Anfrage von Infante Juan erreichte uns. Er möchte sich dem Kampf gegen die von ihm verachteten Republikaner anschließen. In seinem Brief versichert er, dass er sich an keinerlei politischen Aktivitäten beteiligen werde. Da er jedoch in der Armee recht beliebt sei, könne er zu einer Galionsfigur werden."
 ww2_spain.5.a:0 "Nein danke"
 ww2_spain.5.b:0 "Lass ihn kochen"
 ww2_spain.5.c:0 "Schicken Sie ihn ins Exil"
 ww2_spain.6.t:0 "Bürgerkrieg endet"
 ww2_spain.6.d:0 "Der Staub hat sich gelegt und wir konnten aus diesem Kampf gegen die verschiedenen Fraktionen siegreich hervorgehen. Jetzt ist es an der Zeit, unsere Nation wieder aufzubauen und für Stabilität zu sorgen."
 ww2_spain.6.a:0 "Siegreich, aber in Trümmern"
 ww2_spain.7.t:0 "[FROM.GetName] möchte, dass wir unsere Freiwilligen zurückrufen"
 ww2_spain.7.d:0 "In einem Telegramm forderte [FROM.GetLeader] uns auf, unsere auf der Halbinsel kämpfenden Freiwilligen zurückzurufen. Ihm zufolge kämpfen unsere Truppen gegen monarchistische Kräfte. [FROM.Geteader] droht, monarchistische Stimmungen in [ITA.GetName] zu schüren, wenn wir nichts unternehmen."
 ww2_spain.7.b:0 "Rufen Sie unsere Truppen zurück"
 ww2_spain.7.a:0 "Wir werden unsere Truppen nicht zurückrufen"
 ww2_spain.9.t:0 "Freiwillige nach Spanien?"
 ww2_spain.9.d:0 "Der derzeitige spanische Bürgerkrieg wäre eine hervorragende Möglichkeit, unsere Ideologie in Europa zu verbreiten. Wenn wir unseren Einfluss ausweiten wollen, müssen wir dafür sorgen, dass die Nationalisten diesen Krieg verlieren. Sollten wir den Republikanern in ihrem Kampf helfen?"
 ww2_spain.9.a:0 "Nur wenn sie sich um die Anarchisten kümmern"
 ww2_spain.9.b:0 "Schicken Sie einige Freiwillige"
 ww2_spain.9.c:0 "Wir haben Besseres zu tun."
 ww2_spain.12.t:0 "[FROM.GetName] verhängt Blockade"
 ww2_spain.13.t:0 "[POR.GetAdjective] Marine gesichtet"
 ww2_spain.15.t:0 "[POR.GetAdjective] verstärkt Präsenz in der kapverdischen Ebene"
 ww2_spain.14.t:0 "Schiff angegriffen"
 ww2_spain.15.t:0 "Größere [POR.GetAdjective] Marine trifft ein"
 ww2_spain.16.t:0 "[FROM.GetName] hält Blockade aufrecht"  
 ww2_spain.17.t:0 "Abkommen von Tanger"
 ww2_spain.17.d:0 "Um den Frieden in der Region zu wahren, hat uns [SPR.GetName] einen Vorschlag unterbreitet: [SPR.GetLeader] bietet an, seine Ansprüche auf [118.GetName] aufzugeben und schlägt die Einrichtung eines internationalen Regulierungsrates für dieses Gebiet vor. Dieser Rat soll die Neutralität der Meerenge gewährleisten, indem er Ländern mit aggressiver Außenpolitik den Zugang verwehrt. Ein solcher Vorschlag ist ein Schritt in Richtung freundschaftlicher Beziehungen mit [SPR.GetNameDef]. Sollten wir das Abkommen unterzeichnen?"
 ww2_spain.17.a:0 "Ein vernünftiger Vorschlag"
 ww2_spain.17.b:0 "Der Felsen wird unter unserer Herrschaft bleiben!"
 ww2_spain.19.t:0 "Operation Felix"
 ww2_spain.19.d:0 "Nach dem Treffen in Hendaye schlugen wir eine Operation mit dem Namen „Operation Felix“ vor. Diese Operation sieht vor, dass [SPR.GetName] unsere Kriegsanstrengungen gegen die Alliierten unterstützt. Im Austausch gegen Waffen, Treibstoff, Weizen und einige Gebiete in Nordafrika wird [SPR.GetName] eine Invasion in [118.GetName] starten. [FROM.GetLeader] hat kürzlich Interesse an einer solchen Operation gezeigt. Sollten wir unsere Versprechen einhalten?"
 ww2_spain.19.a:0 "Ja, alles senden"
 ww2_spain.19.b:0 "Was für ein Narr"
 ww2_spain.20.t:0 "Operation Felix"
 ww2_spain.20.d:0 "[FROM.GetName] hat die Bedingungen unserer Invasion von [118.GetName] akzeptiert. Jetzt ist es an der Zeit, alles vorzubereiten, um siegreich auf den Felsen zu marschieren!"
 ww2_spain.20.a:0 "Wir werden siegreich sein!"
 ww2_spain.21.t:0 "[FROM.GetNameDef] bricht Operation Felix ab"
 ww2_spain.21.d:0 "Obwohl wir Interesse an der Operation Felix zeigten, gab unser Botschafter in [FROM.capital.GetCapitalVictoryPointName] eine klare Antwort: Wir werden für diese Operation keine Unterstützung erhalten und falls wir uns entscheiden, sie durchzuführen, werden uns weder Ausrüstung noch Treibstoff geschickt, um uns im Kampf gegen [118.OWNER.GetNameDef] zu helfen. Während einige unserer Truppen diese Operation unterstützen, möchte der Rest, der noch immer vom Bürgerkrieg erschöpft ist, nicht an einem solchen Krieg teilnehmen."
 ww2_spain.21.a:0 "Ist es das Risiko wert?"
 ww2_spain.22.t:0 "Bordighera-Treffen"
 ww2_spain.22.d:0 "[ITA.GetLeader] hat uns ein Treffen in Bordighera (Italien) vorgeschlagen. Dort können wir unsere Ansichten und Teilnahmebedingungen für den Krieg besprechen. Es gibt zwei Möglichkeiten, nach Italien zu reisen: Die erste ist per Flugzeug. Das ist allerdings riskant, da unser großer Anführer nicht dem Weg von Mola und Sanjuro folgen soll. Die zweite Möglichkeit ist die Landstraße. Diese ist zwar langsamer, aber auch sicherer."
 ww2_spain.22.a:0 "Wir fliegen nach Italien"
 ww2_spain.22.b:0 "Mit dem Flugzeug? Bist du verrückt?!"
 ww2_spain.23.t:0 "Francos Flugzeugabsturz"
 ww2_spain.23.d:0 "Vor wenigen Stunden informierte uns eine erschütternde Nachricht über den Absturz von Francos Flugzeug. Offenbar explodierte eine Bombe im Inneren der Maschine und forderte Francos Leben. Erste Ermittlungen deuten darauf hin, dass die Bombe von einer kleinen kommunistischen Terrorgruppe gelegt wurde. Einer von ihnen wurde festgenommen und gestand die Tat. Francos Tod sorgt für politische Unruhen, da viele Nationalisten befürchten, dass sein Tod das Ende der Regierung bedeuten könnte."
 ww2_spain.23.a:0 "Vigón wird seinen Platz einnehmen"
 ww2_spain.61.t:0 "Ende des spanischen Bürgerkriegs"
 ww2_spain.61.d:0 "Heute endete offiziell der brutale Spanische Bürgerkrieg. Nach Jahren verheerender Konflikte hat sich der Staub endlich über den Schlachtfeldern gelegt. Die einst pulsierenden und geschäftigen Städte liegen in Trümmern, und die Narben des Krieges sind tief im Herzen der Nation. Für die spanische Bevölkerung ist nun die Zeit des Wiederaufbaus gekommen. Die Wiederherstellung der Infrastruktur, die Wiederbelebung der Wirtschaft und die Wiederherstellung des sozialen Gefüges sind von größter Bedeutung. Die vor uns liegende Aufgabe ist gewaltig, doch Widerstandskraft und Hoffnung treiben die Nation voran. Für Spanien beginnt ein neues Kapitel der Erholung und des Wiederaufbaus, um gestärkt aus der Asche des Konflikts hervorzugehen."
 ww2_spain.61.a:0 "Für Spanien bricht eine neue Ära an."



