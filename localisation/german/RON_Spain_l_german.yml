#DNC SPAIN
DNC_Spain.1.t:0 "Vizekönigreich Neuspanien"
DNC_Spain.1.d:0 "Neuspanien, offiziell das Vizekönigreich Neuspanien oder Königreich Neuspanien, war eine integrale territoriale Einheit des spanischen Reiches, die während der spanischen Kolonialisierung Amerikas vom habsburgischen Spanien gegründet wurde. Es umfasste ein riesiges Gebiet, das das heutige Mexiko, weite Teile des amerikanischen Südwestens und Kaliforniens in Nordamerika, Mittelamerika, die nördlichen Teile Südamerikas sowie mehrere Inselgruppen im Pazifischen Ozean, nämlich die Philippinen und Guam, umfasste."
DNC_Spain.1.a:1 "Einrichtung einer Kolonialverwaltung"
DNC_Spain.1.b:1 "Errichten Sie das mexikanische Imperium"
DNC_Spain.1.c:1 "Ein mexikanischer Verbündeter"

DNC_Spain.2.t:0 "Spanisch-Westindien"
DNC_Spain.2.d:0 "Spanisch-Westindien oder Spanische Antillen waren spanische Kolonien in der Karibik. Im spanischen Reich umfasste der Begriff „Indien“ alle Überseegebiete und wurde vom 1524 gegründeten Indischen Rat mit Sitz in Spanien verwaltet. Als die Krone 1535 das Vizekönigreich Neuspanien gründete, unterstanden die karibischen Inseln seiner Gerichtsbarkeit."
DNC_Spain.2.a:1 "Einrichtung einer Kolonialverwaltung"

DNC_Spain.3.t:0 "Vizekönigreich Neugranada"
DNC_Spain.3.d:0 "Das Vizekönigreich Neugranada, auch Vizekönigreich des Neuen Königreichs Granada oder Vizekönigreich Santafé genannt, war der am 27. Mai 1717 vergebene Name für die Gerichtsbarkeit des spanischen Kaiserreichs im Norden Südamerikas, die dem heutigen Kolumbien, Ecuador, Panama und Venezuela entspricht. Es wurde 1717 von König Philipp V. im Rahmen einer neuen territorialen Kontrollpolitik geschaffen, 1723 wegen finanzieller Probleme suspendiert und 1739 wiederhergestellt, bis es 1810 im Zuge der Unabhängigkeitsbewegung erneut suspendiert wurde. Das Panama entsprechende Gebiet wurde später im Jahr 1739 eingemeindet, und die Provinzen Venezuelas wurden 1777 vom Vizekönigreich abgetrennt und dem Generalkapitän von Venezuela zugeteilt. Zusätzlich zu diesen Kerngebieten umfasste das Gebiet des Vizekönigreichs Neugranada Guyana, Trinidad und Tobago, den Südwesten Surinams, Teile Nordwestbrasiliens und Nordperu."
DNC_Spain.3.a:1 "Einrichtung einer Kolonialverwaltung"

DNC_Spain.4.t:0 "Vizekönigreich Peru"
DNC_Spain.4.d:0 "Das Vizekönigreich Peru war ein 1542 gegründeter spanischer Provinzverwaltungsbezirk, der ursprünglich das heutige Peru und den größten Teil des spanischen Reiches in Südamerika umfasste und von der Hauptstadt Lima aus regiert wurde. Peru war vom 16. bis zum 18. Jahrhundert eines der beiden spanischen Vizekönigreiche in Amerika."
DNC_Spain.4.a:1 "Einrichtung einer Kolonialverwaltung"

DNC_Spain.5.t:0 "Generalkapitän von Chile"
DNC_Spain.5.d:0 "Das Gouvernement Chile war von 1541 bis 1818 ein Gebiet des spanischen Kaiserreichs und gehörte die meiste Zeit zum Vizekönigreich Peru. Es umfasste den größten Teil des heutigen Chile und den Süden Argentiniens. Die Hauptstadt war Santiago de Chile. 1818 erklärte sich Chile unabhängig und wurde zur Republik Chile. Im Laufe seiner langen Geschichte hatte Chile mehrere spanische Gouverneure und mehrere Könige."
DNC_Spain.5.a:1 "Einrichtung einer Kolonialverwaltung"

DNC_Spain.6.t:0 "Vizekönigreich von Rio De La Plata"
DNC_Spain.6.d:0 "Das Vizekönigreich des Río de la Plata (in einigen wissenschaftlichen Schriften auch „Vizekönigreich des Río de la Plata“ genannt) war das letzte der Vizekönigreiche des spanischen Reiches in Amerika, das gegründet wurde, und hatte auch die kürzeste Lebensdauer."
DNC_Spain.6.a:1 "Einrichtung einer Kolonialverwaltung"

DNC_Spain.7.t:0 "Bundesstaat Brasilien"
DNC_Spain.7.d:0 "Das koloniale Brasilien umfasst die Zeit vom Jahr 1500 mit der Ankunft der Portugiesen bis 1815, als Brasilien durch die Vereinigung mit Portugal zum Vereinigten Königreich von Portugal, Brasilien und den Algarven erhoben wurde. In den ersten 300 Jahren brasilianischer Kolonialgeschichte basierte die wirtschaftliche Ausbeutung des Gebiets zunächst auf dem Abbau von Brasilholz (Pau Brasil) (16. Jahrhundert), dem das Gebiet seinen Namen verdankt; der Zuckerproduktion (16.-18. Jahrhundert) und schließlich dem Gold- und Diamantenabbau (18. Jahrhundert). Sklaven, insbesondere aus Afrika, stellten nach einer kurzen Periode der Versklavung von Indianern zum Fällen von Brasilholz den Großteil der Arbeitskräfte der brasilianischen Exportwirtschaft."
DNC_Spain.7.a:1 "Einrichtung einer Kolonialverwaltung"
DNC_Spain.7.b:1 "Gründung des Königreichs Brasilien"
DNC_Spain.7.c:1 "Gründung des brasilianischen Kaiserreichs"
DNC_Spain.7.e:1 "Ein brasilianischer Verbündeter"

DNC_Spain.8.t:0 "Russisch-Amerika"
DNC_Spain.8.d:0 "Russisch-Amerika war der Name der russischen Kolonialgebiete in Nordamerika (insbesondere Alaska) von 1799 bis 1867. Die Hauptstadt war Nowo-Archangelsk (Neu-Archangelsk), das heutige Sitka. Siedlungen gab es hauptsächlich in Alaska, aber auch in Teilen des heutigen Kaliforniens und mit drei Forts auf Hawaii. Die formelle Eingliederung der Besitzungen in Russland erfolgte erst mit dem Ukas von 1799, der der Russisch-Amerikanischen Kompanie ein Monopol einräumte und der Russisch-Orthodoxen Kirche bestimmte Rechte an den neuen Besitzungen zusprach. Viele der Besitzungen wurden im 19. Jahrhundert aufgegeben. 1867 verkaufte Russland seine letzten verbliebenen Besitzungen für 7,2 Millionen Dollar an die Vereinigten Staaten."
DNC_Spain.8.a:0 "Einrichtung einer Kolonialverwaltung"

DNC_Spain.9.t:0 "Dreizehn Kolonien"
DNC_Spain.9.d:0 "Die Dreizehn Kolonien, auch bekannt als die Dreizehn Britischen Kolonien oder die Dreizehn Amerikanischen Kolonien, waren eine Gruppe britischer Kolonien an der Atlantikküste Nordamerikas. Sie wurden im 17. und 18. Jahrhundert gegründet, erklärten 1776 ihre Unabhängigkeit und bildeten gemeinsam die Vereinigten Staaten von Amerika."
DNC_Spain.9.a:0 "Dreizehn Kolonien gründen"
DNC_Spain.9.b:0 "Errichten Sie eine größere Dreizehn-Kolonien"
DNC_Spain.9.c:0 "Fünfzig Kolonien gründen"

DNC_Spain.10.t:0 "Britisch-Amerika"
DNC_Spain.10.d:0 "Britisch-Amerika umfasste die Kolonialgebiete des Britischen Empires in Amerika von 1607 bis 1783. Diese Kolonien waren offiziell als Britisch-Amerika und Britisch-Westindien bekannt, bevor die Dreizehn Kolonien im Amerikanischen Unabhängigkeitskrieg (1775–1783) ihre Unabhängigkeit erklärten und die Vereinigten Staaten von Amerika gründeten."
DNC_Spain.10.a:0 "Einrichtung einer Kolonialverwaltung"

DNC_Spain.11.t:0 "Französisch-Louisiana"
DNC_Spain.11.d:0 "Louisiana war ein Verwaltungsbezirk Neufrankreichs. Unter französischer Herrschaft von 1682 bis 1769 und von 1801 bis 1803 wurde das Gebiet vom französischen Entdecker René-Robert Cavelier, Sieur de la Salle, zu Ehren von König Ludwig XIV. benannt. Ursprünglich umfasste es ein ausgedehntes Gebiet, das den größten Teil des Einzugsgebiets des Mississippi umfasste und sich von den Großen Seen bis zum Golf von Mexiko und von den Appalachen bis zu den Rocky Mountains erstreckte."
DNC_Spain.11.a:0 "Einrichtung einer Kolonialverwaltung"

DNC_Spain.12.t:0 "Neufrankreich"
DNC_Spain.12.d:0 "Neufrankreich war das von Frankreich kolonisierte Gebiet in Nordamerika, beginnend mit der Erkundung des Sankt-Lorenz-Golfs durch Jacques Cartier im Jahr 1534 und endend mit der Abtretung Neufrankreichs an Großbritannien und Spanien im Jahr 1763 im Rahmen des Vertrags von Paris (1763)."
DNC_Spain.12.a:0 "Einrichtung einer Kolonialverwaltung"

DNC_Spain.13.t:0 "Teilung Amerikas"
DNC_Spain.13.d:0 "Obwohl die Nordmänner den Nordosten Nordamerikas bereits um 1000 n. Chr. erkundet und kolonisiert hatten, fand zwischen 1500 und 1800 n. Chr., während des Zeitalters der Entdeckungen, eine spätere und bekanntere Welle europäischer Kolonisierung Amerikas statt. In dieser Zeit begannen mehrere europäische Imperien – vor allem Spanien, Portugal, Großbritannien und Frankreich – die natürlichen Ressourcen und das Humankapital Amerikas zu erforschen und für sich zu beanspruchen, was zur Vertreibung und Auflösung einiger indigener Völker und zur Gründung mehrerer Siedlerkolonialstaaten führte. Einige ehemals europäische Siedlerkolonien – darunter New Mexico, Alaska, die Prärien/nördlichen Great Plains und die „Nordwest-Territorien“ in Nordamerika; der Isthmus von Tehuantepec, die Halbinsel Yucatán und die Darién-Lücke in Mittelamerika; und der nordwestliche Amazonas, die zentralen Anden und die Guyanas in Südamerika – sind bis ins 21. Jahrhundert hinein relativ ländlich, dünn besiedelt und indigen, doch mehrere Siedlerkolonialstaaten, darunter Brasilien, Kolumbien, Mexiko, Argentinien und die Vereinigten Staaten, entwickelten sich zu eigenständigen Siedlerkolonialreichen. Russland begann Mitte des 18. Jahrhunderts mit der Kolonisierung des pazifischen Nordwestens auf der Suche nach Fellen für den Pelzhandel. Viele der sozialen Strukturen – darunter Religionen, politische Grenzen und Linguae francae –, die im 21. Jahrhundert in der westlichen Hemisphäre vorherrschen, sind Nachkommen der Strukturen, die in dieser Zeit etabliert wurden."
DNC_Spain.13.a:0 "Partition ausführen"
DNC_Spain.13.b:0 "Behalten Sie Louisiana für uns"
DNC_Spain.13.c:0 "Alaska für uns behalten"
DNC_Spain_News.13.t:0 "Europäische Mächte teilen Amerika auf!"
DNC_Spain_News.13.d:0 "Obwohl die Nordmänner den Nordosten Nordamerikas bereits um 1000 n. Chr. erkundet und kolonisiert hatten, fand zwischen 1500 und 1800 n. Chr., im Zeitalter der Entdeckungen, eine spätere und bekanntere Welle europäischer Kolonisierung Amerikas statt. In dieser Zeit begannen mehrere europäische Imperien – vor allem Spanien, Portugal, Großbritannien und Frankreich –, die natürlichen Ressourcen und das Humankapital Amerikas zu erforschen und für sich zu beanspruchen. Dies führte zur Vertreibung und Auflösung einiger indigener Völker und zur Gründung mehrerer Siedlerkolonialstaaten."
DNC_Spain_News.13.a:0 "Ein dunkler Tag für die Demokratie"

DNC_Spain.14.t:0 "[From.GetName] teilt amerikanisches Territorium mit uns auf"
DNC_Spain.14.d:0 "Obwohl die Nordmänner den Nordosten Nordamerikas bereits um 1000 n. Chr. erkundet und kolonisiert hatten, fand zwischen 1500 und 1800 n. Chr., während des Zeitalters der Entdeckungen, eine spätere und bekanntere Welle europäischer Kolonisierung Amerikas statt. In dieser Zeit begannen mehrere europäische Imperien – vor allem Spanien, Portugal, Großbritannien und Frankreich – die natürlichen Ressourcen und das Humankapital Amerikas zu erforschen und für sich zu beanspruchen, was zur Vertreibung und Auflösung einiger indigener Völker und zur Gründung mehrerer Siedlerkolonialstaaten führte. Einige ehemals europäische Siedlerkolonien – darunter New Mexico, Alaska, die Prärien/nördlichen Great Plains und die „Nordwest-Territorien“ in Nordamerika; der Isthmus von Tehuantepec, die Halbinsel Yucatán und die Darién-Lücke in Mittelamerika; und der nordwestliche Amazonas, die zentralen Anden und die Guyanas in Südamerika – sind bis ins 21. Jahrhundert hinein relativ ländlich, dünn besiedelt und indigen, doch mehrere Siedlerkolonialstaaten, darunter Brasilien, Kolumbien, Mexiko, Argentinien und die Vereinigten Staaten, entwickelten sich zu eigenständigen Siedlerkolonialreichen. Russland begann Mitte des 18. Jahrhunderts mit der Kolonisierung des pazifischen Nordwestens auf der Suche nach Fellen für den Pelzhandel. Viele der sozialen Strukturen – darunter Religionen, politische Grenzen und Linguae francae –, die im 21. Jahrhundert in der westlichen Hemisphäre vorherrschen, sind Nachkommen der Strukturen, die in dieser Zeit etabliert wurden."
DNC_Spain.14.a:0 "Es gehört uns rechtmäßig"

DNC_Spain.15.t:0 "Spanisch-Louisiana"
DNC_Spain.15.d:0 "Spanisch-Louisiana war von 1762 bis 1801 ein Gouvernement und Verwaltungsbezirk des Vizekönigreichs Neuspanien. Es umfasste ein riesiges Gebiet im Zentrum Nordamerikas, das das westliche Becken des Mississippi sowie New Orleans umfasste. Ursprünglich hatte Frankreich das Gebiet beansprucht und kontrolliert und es 1682 zu Ehren von König Ludwig XIV. La Louisiane genannt. Gegen Ende des Siebenjährigen Krieges erwarb Spanien das Gebiet heimlich von Frankreich gemäß den Bedingungen des Vertrags von Fontainebleau (1762). Die tatsächliche Machtübergabe verlief langsam, und nachdem Spanien 1767 schließlich versuchte, die französische Macht in New Orleans vollständig zu ersetzen, inszenierten die französischen Einwohner einen Aufstand, den der neue spanische Kolonialgouverneur erst 1769 niederschlug. Spanien nahm Ende der 1760er Jahre auch den Handelsposten St. Louis und ganz Ober-Louisiana in Besitz, obwohl die spanische Präsenz in den weiten Gebieten des „Illinois Country“ gering war."
DNC_Spain.15.a:0 "Übergebt Louisiana an Neuspanien"

DNC_Spain.16.t:0 "Schicksal des Indianerreservats"
DNC_Spain.16.d:0 "„Indianerreservat“ ist ein historischer Begriff für das weitgehend unbesiedelte Land in Nordamerika, das von Frankreich beansprucht, am Ende des Siebenjährigen Krieges – auch als Franzosen- und Indianerkrieg bekannt – durch den Vertrag von Paris (1763) an Großbritannien abgetreten und in der Königlichen Proklamation von 1763 den First Nations zugesprochen wurde. Die britische Regierung hatte erwogen, in dem Teil des Reservats westlich der Appalachen, begrenzt durch die Flüsse Ohio und Mississippi sowie die Großen Seen, einen Indianer-Barrierestaat zu errichten. Britische Beamte strebten die Gründung eines solchen Staates auch noch an, nachdem die Region im Vertrag von Paris (1783) zur Beendigung des Amerikanischen Unabhängigkeitskriegs den Vereinigten Staaten zugesprochen worden war. Sie gaben ihre Bemühungen jedoch 1814 auf, nachdem sie im Krieg von 1812 die militärische Kontrolle über die Region verloren hatten."
DNC_Spain.16.a:0 "Geben Sie dreizehn Kolonien ein Indianerreservat"

DNC_Spain.17.t:0 "Schicksal Italiens"
DNC_Spain.17.d:0 "Während der Französischen Revolutionskriege wurden die Österreicher von Napoleon aus Italien vertrieben, der in ganz Norditalien Republiken errichtete. Im Frieden von Campo Formio von 1797 verzichtete Kaiser Franz II. auf jegliche Ansprüche auf die Gebiete, die das Königreich Italien bildeten. Die kaiserliche Neuordnung von 1799 bis 1803 ließ keinen Raum für kaiserliche Ansprüche auf Italien – selbst der Erzbischof von Köln war verschwunden und zusammen mit den anderen geistlichen Fürsten säkularisiert worden."
DNC_Spain.17.a:0 "Habsburgische Teilung Italiens"
DNC_Spain.17.b:0 "Teilung Italiens (HRE)"
DNC_Spain.17.c:0 "Gründung des Königreichs Italien (HRE)"

DNC_Spain.18.t:0 "Schicksal Italiens"
DNC_Spain.18.d:0 "Während der Französischen Revolutionskriege wurden die Österreicher von Napoleon aus Italien vertrieben, der in ganz Norditalien Republiken errichtete. Im Frieden von Campo Formio aus dem Jahr 1797 verzichtete Kaiser Franz II. auf jegliche Ansprüche auf die Gebiete, die das Königreich Italien bildeten. Die kaiserliche Neuordnung von 1799–1803 ließ keinen Raum für kaiserliche Ansprüche auf Italien – selbst der Erzbischof von Köln war verschwunden und zusammen mit den anderen geistlichen Fürsten säkularisiert worden. Napoleons Sieg im Zweiten Koalitionskrieg bestätigte dies im Frieden von Lunéville. Im Jahr 1805, als das Heilige Römische Reich noch existierte, beanspruchte Napoleon, inzwischen Kaiser Napoleon I., die Krone des neuen Königreichs Italien für sich und setzte sich am 26. Mai 1805 in Mailand die Eiserne Krone aufs Haupt. Er annektierte auch den größten Teil des ehemaligen kaiserlichen Italiens (einschließlich Piemont-Savoyen, Ligurien und der Toskana) direkt in Frankreich. Das Kaiserreich selbst wurde im darauffolgenden Jahr, am 6. August 1806, abgeschafft. Der Wiener Kongress nach der Niederlage Napoleons brachte weder das Heilige Römische Reich noch das Königreich Italien zurück."
DNC_Spain.18.a:0 "Anhang Kirchenstaat"
DNC_Spain.18.b:0 "Römische Republik gründen"

DNC_Spain.19.t:0 "Schicksal des spanischen Nordamerikas"
DNC_Spain.19.d:0 "Neuspanien, offiziell das Vizekönigreich Neuspanien oder Königreich Neuspanien, war eine integrale territoriale Einheit des spanischen Reiches, die während der spanischen Kolonialisierung Amerikas vom habsburgischen Spanien gegründet wurde. Es umfasste ein riesiges Gebiet, das das heutige Mexiko, weite Teile des amerikanischen Südwestens und Kaliforniens in Nordamerika, Mittelamerika, die nördlichen Teile Südamerikas sowie mehrere Inselgruppen im Pazifischen Ozean, nämlich die Philippinen und Guam, umfasste."
DNC_Spain.19.a:1 "Direkte Regel fortsetzen"
DNC_Spain.19.b:1 "Übergabe an Neuspanien"
DNC_Spain.19.c:1 "Übergabe an Spanien"
DNC_Spain.19.e:1 "Übergabe an Mexiko"

DNC_Spain.20.t:0 "Habsburger Niederlande"
DNC_Spain.20.d:0 "Die Habsburger Niederlande, lateinisch Belgica, sind die Sammelbezeichnung für die Lehen des Hauses Habsburg in den Niederlanden während der Renaissance. Die Herrschaft begann 1482 mit dem Tod der letzten Herrscherin der Niederlande aus Valois-Burgund, Maria, Ehefrau von Maximilian I. von Österreich. Ihr Enkel, Kaiser Karl V., wurde in den Habsburger Niederlanden geboren und machte Brüssel zu einer seiner Hauptstädte."
DNC_Spain.20.a:1 "Erstellen Sie es"
DNC_Spain.20.b:1 "Niederländische Staaten einbeziehen"


