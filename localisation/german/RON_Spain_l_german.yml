 NATO_VS_SOV_BLOC:0 "NATO vs. WARSCHAUER PAKT"
 NATO_VS_SOV_BLOC_desc:0 "Die bevorstehende Entscheidung hat erhebliches Gewicht, da sie als Lackmustest für die Stärke und Widerstandsfähigkeit sowohl des NATO- als auch des Warschauer Pakts dient. Dieser entscheidende Moment wird das Ausmaß ihrer kollektiven Entschlossenheit und Kooperationsfähigkeit offenbaren. Die komplexen Dynamiken zwischen diesen Militärbündnissen werden offengelegt.\n\n\n\n"

 SPR_spanish_neutrality:0 "Spanische Neutralität"
 SPR_spanish_neutrality_desc:0 "§Y[SPR.GetLeader]§! hat beschlossen, im anhaltenden Konflikt neutral zu bleiben. Sowohl die Achsenmächte als auch die Alliierten versuchen, das Blatt im Krieg zu wenden, indem sie die spanische Politik beeinflussen\n\n\n\n"
