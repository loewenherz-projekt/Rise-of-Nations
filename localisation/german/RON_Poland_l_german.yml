 ###INT Events
 polishinti.1.title:0 "Polen bittet um unsere Hilfe im Polnisch-UdSSR-Krieg"
 polishinti.1.desc:0 "Polnische Diplomaten sind in unser Land gekommen und haben um unsere Unterstützung gebeten. Sie haben uns gebeten, ihnen mit allem zu helfen, von diplomatischer bis hin zu militärischer Unterstützung."
 polishinti.1.a:0 "Senden Sie diplomatische Unterstützung"
 polishinti.1.b:0 "Senden Sie eine KLEINE Menge Waffen"
 polishinti.1.c:0 "Senden Sie eine GROSSE Menge an Waffen"
 polishinti.1.d:0 "Senden Sie keine Unterstützung"
 polishinti.2.title:0 "[From.GetName] Sendet einen diplomatischen Protest"
 polishinti.2.desc:0 "[From.GetName] hat uns einen diplomatischen Protest geschickt, in dem wir aufgefordert werden, unsere Gewalt gegen den polnischen Staat einzustellen. Die Berater von [Root.GetLeader] haben das Papier bereits verschrottet und entsorgt. Wir werden den polnischen Staat loswerden!"
 polishinti.2.a:0 "Verstanden"
 polishinti.3.title:0 "Waffenlieferungen sind von [From.GetName] eingetroffen"
 polishinti.3.desc:0 "Derzeit sind Lieferungen von [From.GetName] mit Vorräten am Doc von Gdynia angekommen. Wir werden diesen Akt der Freundlichkeit nicht vergessen"
 polishinti.3.a:0 "Wir sollten ihnen unseren Dank ausrichten"
 polishinti.4.title:0 "Polen bittet uns um unsere Unterstützung"
 polishinti.4.desc:0 "Polen hat uns um Unterstützung bei der Sicherung seiner Unabhängigkeit gebeten. Dies kann uns langfristig dabei helfen, diplomatischer an Polen anzunähern und könnte sogar zu einem Bündnis führen."
 polishinti.4.a:0 "Wir werden unsere polnischen Brüder unterstützen"
 polishinti.4.b:0 "Wir werden sie brennen lassen"
 polishinti.5.title:0 "Polen hat den Krieg gewonnen!"
 polishinti.5.desc:0 "Mit dem Sieg Polens, der unsere Unzweckmäßigkeit bestätigt, besteht für uns keine Notwendigkeit mehr, gegen Russland zu kämpfen. Wir werden einen Waffenstillstand mit den Russen unterzeichnen und sie sich selbst überlassen."
 polishinti.5.a:0 "Endlich Sieg"
 polishinti.6.title:0 "Der polnisch-sowjetische Krieg beginnt"
 polishinti.6.desc:0 "Der polnische Sowjet begann, Polen versucht, sein verlorenes Territorium in Russland zurückzugewinnen. Polen nutzte heute seine Chance mit der Instabilität und dem Bürgerkrieg zwischen Russland und den Kommunisten, die es als perfekten Zeitpunkt für einen Angriff ansah."
 polishinti.6.a:0 "Welche Auswirkungen wird dies auf die polnische Geschichte haben?"
 polishinti.7.title:0 "Die Industrialisierung Polens"
 polishinti.7.desc:0 "Welche Schritte sollten wir als nächstes unternehmen, um Polen zu industrialisieren?"
 polishinti.7.a:0 "Investieren Sie in den Agrarsektor"
 polishinti.7.b:0 "Investieren Sie in den Industriesektor"
 polishinti.8.title:0 "Fehlender industrieller Fokus"
 polishinti.8.desc:0 "Es fehlte an einem industriellen Fokus in unserer Gesellschaft. Polen ist eine weitgehend landwirtschaftliche Gesellschaft. Jetzt können wir zivile Fabriken schneller produzieren, aber die Produktion unserer militärischen Fabriken wird langsamer sein."
 polishinti.8.a:0 "Verstanden"
 polishinti.9.title:0 "Mangelnder Fokus auf die Landwirtschaft"
 polishinti.9.desc:0 "In unserer Gesellschaft fehlte der Fokus auf die Landwirtschaft. Polen ist eine weitgehend industrielle Gesellschaft. Wir werden jetzt in der Lage sein, Militärfabriken schneller zu produzieren, aber die Produktion unserer zivilen Fabriken wird langsamer sein."
 polishinti.9.a:0 "Okay"
 polishinti.10.title:0 "Gleichgewicht zwischen Industrie und Landwirtschaft erreicht"
 polishinti.10.desc:0 "Der Fokus lag auf dem Industrie- und Agrarsektor, was uns in die Lage versetzte, die Vorteile beider Sektoren zu nutzen."
 polishinti.10.a:0 "Großartig!"
 polishinti.11.title:0 "Industrieller Fokus wieder auf Kurs"
 polishinti.11.desc:0 "Wir haben uns auf den Industriesektor unseres Landes konzentriert und es scheint, als würden sich die Dinge ausgleichen, alles wird zur Normalität zurückkehren"
 polishinti.11.a:0 "Großartig!"
 polishinti.12.title:0 "Landwirtschaftliche Ausrichtung wieder auf Kurs"
 polishinti.12.desc:0 "Wir haben uns auf den Agrarsektor unseres Landes konzentriert, und es scheint, als würde sich die Lage ausgleichen. Alles wird sich wieder normalisieren und Polen wird ein stabiles Land sein."
 polishinti.12.a:0 "Großartig!"
 polishinti.13.title:0 "Mai-Putsch"
 polishinti.13.desc:0 "Der Mai-Staatsstreich oder Mai-Putsch war ein Putsch, der unsere demokratische Regierung von Józef Piłsudski und anderen prominenten Führern stürzte. Damit ist Polen nun kein demokratisches Land mehr"
 polishinti.13.a:0 "Was kommt als nächstes für Polen?"
 polishinti.14.title:0 "Polen bietet Waffenstillstand an – kleiner Sieg"
 polishinti.14.desc:0 "Polen hat sich genommen, was es will, und bietet nun einen Waffenstillstand an. Wenn wir akzeptieren, dass wir nicht mehr im Krieg mit Polen sind und unsere Kräfte auf die Westfront konzentrieren können, werden wir einen Stabilitätsverlust erleiden, aber eine Chance, die Polen abzuwehren und schließlich ganz Polen einzunehmen."
 polishinti.14.a:0 "Waffenstillstand akzeptieren"
 polishinti.14.b:0 "Wir müssen weiterkämpfen!"
 polishinti.15.title:0 "Polen fordert Kapitulation - mittlerer Sieg"
 polishinti.15.desc:0 "Polen hat sich genommen, was es wollte, und noch mehr! Und jetzt bieten sie uns einen Waffenstillstand an, wenn wir akzeptieren, dass wir nicht länger mit Polen im Krieg sind und unsere Kräfte auf die Westfront konzentrieren können. Wenn wir uns weigern, werden wir einen mittleren Stabilitätsverlust erleiden."
 polishinti.15.a:0 "Akzeptieren Sie die Friedensbedingungen"
 polishinti.15.b:0 "Wir müssen weiterkämpfen ..."
 polishinti.16.title:0 "Polen fordert Kapitulation – großer Sieg"
 polishinti.16.desc:0 "Polen hat uns eine völlige Niederlage zugefügt! Es gibt keinen Verhandlungsspielraum, wir müssen uns den Polen ergeben."
 polishinti.16.a:0 "Wir müssen die ehrenvolle Niederlage akzeptieren"
 polishinti.17.title:0 "Polnischer Waffenstillstand?"
 polishinti.17.desc:0 "Wir haben die Ukraine erobert und haben nun keine Lust mehr, gegen Polen zu kämpfen, da dies mit Sicherheit zu einer Pattsituation führen würde. Wir müssen unsere Truppen an der Westfront konzentrieren. Sollen wir weiterkämpfen oder einen Waffenstillstand vorschlagen?"
 polishinti.17.a:0 "Wir werden den Waffenstillstand akzeptieren"
 polishinti.17.b:0 "Wir werden niemals aufgeben"
 polishinti.18.title:0 "Patt mit den Sowjets"
 polishinti.18.desc:0 "Wir konnten nicht weiter in die Sowjets vordringen und die Gewinnchancen beider Seiten werden immer geringer. Wir müssen ihnen einen Waffenstillstand anbieten und uns auf die Westfront konzentrieren."
 polishinti.18.a:0 "Nur so kann Polen gewinnen"
 polishinti.19.title:0 "Polnisch-französisches Handelsabkommen"
 polishinti.19.desc:0 "Die Verhandlungen über das polnisch-französische Handelsabkommen werden in Kürze beginnen. Während der Verhandlungen werden wir beide eine Lizenz für die Produktion von Panzern und Artillerie erhalten."
 polishinti.19.a:0 "Lizenznehmer für Tanks - 30 pp"
 polishinti.19.b:0 "Lizenznehmer für Artillerie - 25 pp"
 polishinti.20.title:0 "Verhandlungen über ein französisch-polnisches Handelsabkommen"
 polishinti.20.desc:0 "Polen hat uns ein Handelsabkommen für die Artillerieproduktion sowie Freihandel für unsere beiden Länder angeboten. Damit dieses Abkommen zustande kommt, müssen wir Polen jedoch 25 % politische Macht übertragen. Was sollen wir tun?"
 polishinti.20.a:0 "Wir werden diesen Deal annehmen"
 polishinti.20.b:0 "Wir verhandeln Preise"
 polishinti.20.c:0 "Wir werden höflich ablehnen"
 polishinti.21.title:0 "Frankreich bietet einen Kompromiss an"
 polishinti.21.desc:0 "Frankreich hat uns einen Kompromiss für die Artillerieproduktion angeboten! Sie bieten an, dass wir beide 12 politische Machtpunkte zahlen, im Austausch für die gleichen Vorteile, was sollen wir tun?"
 polishinti.21.a:0 "Wir akzeptieren"
 polishinti.21.b:0 "Wir lehnen ab"
 polishinti.22.title:0 "Verhandlungen über ein französisch-polnisches Handelsabkommen"
 polishinti.22.desc:0 "Polen hat uns ein Handelsabkommen für die Panzerproduktion sowie Freihandel für unsere beiden Länder angeboten. Damit dieses Abkommen zustande kommt, müssen wir Polen jedoch 25 % politische Macht übertragen. Was sollen wir tun?"
 polishinti.22.a:0 "Wir werden diesen Deal annehmen"
 polishinti.22.b:0 "Wir verhandeln Preise"
 polishinti.22.c:0 "Wir werden höflich ablehnen"
 polishinti.23.title:0 "Frankreich bietet einen Kompromiss an"
 polishinti.23.desc:0 "Frankreich hat uns einen Kompromiss für die Artillerieproduktion angeboten! Sie bieten an, dass wir beide 15 politische Machtpunkte zahlen, um die gleichen Vorteile zu erhalten. Was sollen wir tun?"
 polishinti.23.a:0 "Akzeptiere den Kompromiss"
 polishinti.23.b:0 "Den Kompromiss ablehnen"
 polishinti.24.title:0 "Deutsch-Polnischer Gipfel"
 polishinti.24.desc:0 "Deutschland und Polen haben heute einen Gipfel abgehalten, bei dem sie darüber diskutierten, was mit der Provinz Danzig geschehen soll. Da Polen bereit ist, sie an Deutschland zurückzugeben, um künftige Konflikte zu vermeiden, scheint die Zukunft Danzigs ungewiss."
 polishinti.25.title:0 "Was sollten uns die Deutschen im Austausch für die Provinz Danzig geben?"
 polishinti.25.desc:0 "Die Provinz Danzig hat einen großen Anteil deutscher Bevölkerung und wir sind bereit, sie an Deutschland zurückzugeben. Allerdings können wir die Provinz nicht einfach kostenlos an Deutschland zurückgeben. Wir müssen etwas im Austausch für die Provinz bekommen. Was sollten uns die Deutschen geben?"
 polishinti.25.a:0 "Politische Macht monatlich"
 polishinti.25.b:0 "Ein Teil ihrer Arbeitskräfte"
 polishinti.25.c:0 "Bessere Forschungsgeschwindigkeit"
 polishinti.26.title:0 "Polen bietet Danzig an"
 polishinti.26.desc:0 "Polen hat uns die Provinz Danzig für 1 politische Macht pro Monat für 1 Jahr angeboten. Wenn wir diesen Deal annehmen, werden wir die Provinz Danzig bekommen. Das wird unsere politische Macht monatlich beeinflussen."
 polishinti.27.title:0 "Polen bietet uns Danzig an"
 polishinti.27.desc:0 "Polen hat uns die Provinz Danzig für 50.000 Mann angeboten. Das mag eine enorme Belastung für unsere Arbeitskräfte sein, aber die Provinz ist mehrheitlich deutsch und wir müssen sie befreien!"
 polishinti.28.title:0 "Polen bietet uns Danzig an"
 polishinti.28.desc:0 "Polen hat uns die Provinz Danzig für einige unserer Wissenschaftler und Forscher angeboten. Dies wird unsere Forschungsgeschwindigkeit für zwei Jahre beeinträchtigen, aber wir werden eine mehrheitlich deutsche Provinz gewinnen."
 polishinti.28.a:0 "Wir akzeptieren diesen Deal!"
 polishinti.28.b:0 "Wir lehnen diesen Deal ab"
 polishinti.29.title:0 "Frankreich lehnt den Deal ab"
 polishinti.29.desc:0 "Frankreich hat unser Handelsabkommen abgelehnt! Es scheint, wir müssen unseren Handel woanders hin verlagern! Dadurch erhält keiner von uns Vorteile, und der Handel wird wie gewohnt weiterlaufen."
 polishinti.30.title:0 "Polen lehnt den Deal ab"
 polishinti.30.desc:0 "Polen hat unseren Handelskompromiss abgelehnt! Dadurch erhält keiner von uns Vorteile und der Handel wird wie gewohnt weitergeführt."
 polishinti.30.a:0 "Schade"
 polishinti.31.title:0 "Deutschland nimmt unser Angebot an"
 polishinti.31.desc:0 "Wenn Deutschland unser Angebot annimmt, erhalten wir im Austausch für Danzig ein Jahr lang jeden Tag eine zusätzliche politische Macht!"
 polishinti.31.a:0 "Großartig!"
 polishinti.32.title:0 "Deutschland nimmt unser Personalangebot an"
 polishinti.32.desc:0 "Deutschland hat unser Angebot für Danzig im Austausch gegen Arbeitskräfte angenommen! Die Übertragung des Staates Danzig wird in Kürze beginnen"
 polishinti.32.a:0 "Gute Nachrichten!"
 polishinti.33.title:0 "Deutschland akzeptiert unseren Forschungs-Speed-Deal"
 polishinti.33.desc:0 "Wenn die Deutschen unseren Deal annehmen, erhalten sie nun die Provinz Danzig, während wir einen Forschungsbonus von 5 % wieder einführen!"
 polishinti.33.a:0 "Tolle Neuigkeiten!"

 
 
 ###WW2 Events
 
 polmod.1.t:0 "Operation „Hetman“"
 polmod.1.desc:0 "Der Krieg zwischen dem Dritten Reich und der UdSSR ist nur eine Frage der Zeit. Das unterzeichnete polnisch-deutsche Abkommen gibt uns die Möglichkeit, uns gemeinsam mit dem Dritten Reich der Sowjetunion anzuschließen und sie zu besiegen. Unter der mächtigen, gemeinsamen Offensive Polens und Deutschlands durch unser Land und die baltischen Staaten wird der rote Koloss zusammenbrechen."
 polmod.1.a:0 "Schicken wir Beck nach Berlin!"
 polmod.2.t:0 "Polen will sich der Achse anschließen"
 polmod.2.desc:0 "Polen schlug vor, sich der Achse anzuschließen. Im Gegenzug erwartete man die Teilnahme an einer gemeinsamen Offensive gegen die UdSSR. Die Operation, die von Polen „Hetman“ und von unseren Stäben „Barbarossa“ genannt wurde, sollte mit einem Angriff durch die baltischen Staaten und Polen beginnen. Nach dem Sieg beanspruchte Polen seine ehemaligen Gebiete. Der Rest Russlands sollte an uns fallen."
 polmod.2.a:0 "Wo kann ich mich anmelden?"
 polmod.2.b:0 "Es ist besser, sich nicht in die Angelegenheiten der Sowjets einzumischen."
 polmod.3.t:0 "Achse Rom-Berlin-Warschau"
 polmod.3.desc:0 "Unser Außenminister ist triumphierend aus Berlin zurückgekehrt und präsentierte den Text des unterzeichneten Abkommens. „Ich bringe euch Zukunft und Macht!“, lauteten die ersten Worte des Ministers in seiner Rede kurz nach seiner Ankunft. Unterdessen haben im Oberkommando der polnischen Armee die Vorbereitungen für eine Invasion der UdSSR begonnen."
 polmod.3.a:0 "Für das Vaterland!" 
 polmod.4.t:0 "Deutschland lehnt ab"
 polmod.4.desc:0 "Deutschland lehnt unseren Bündnisvorschlag ab. Wir können zwar die Rückeroberung unserer Ländereien in Angriff nehmen, haben aber ohne deutsche Unterstützung keine Chance auf eine friedliche Lösung des Konflikts."
 polmod.4.a:0 "Wir können damit umgehen"
 polmod.4.b:0 "Wir werden das aufgeben"
 polmod.5.t:0 "Besatzungspolitik"
 polmod.5.desc:0 "Unsere Truppen marschierten in die UdSSR ein. Die Soldaten wurden mit Jubelrufen begrüßt. Sie nennen uns Befreier und geben uns, was sie zur Hand haben. Mädchen werfen sich unseren Jungen um den Hals. Überleben diese Menschen wirklich den Horror, den sie beschreiben? Oder wollen sie vielleicht, dass wir unsere Wachsamkeit verlieren? Es hängt von uns ab, welche Besatzungspolitik wir verfolgen."
 polmod.5.a:0 "Sie brauchen eine sanfte Hand"
 polmod.5.b:0 "Sie brauchen eine starke Hand"
 polmod.6.t:0 "Die Südstaaten erlangen ihre Unabhängigkeit"
 polmod.6.desc:0 "Mit dem Vormarsch der Truppen schwand der Glaube. Alle großen Städte der UdSSR stürzten ein, und Stalin musste aus dem belagerten Moskau nach Osten fliehen. Als die Truppen die asiatischen Steppen erreichten, beschlossen die Sowjetrepubliken der Region, ihre Unabhängigkeit zu erklären. Die Bewohner der Region brachen alle Verbindungen zur UdSSR ab und vertrieben die verhassten Kommissare."
 polmod.6.a:0 "Dies ist der Anfang vom Ende der UdSSR"
 polmod.7.t:0 "Gründung des syrischen Russlands"
 polmod.7.desc:0 "Angesichts der Übermacht der Angreifer beschloss Andrej Wlassow, der Befehlshaber der sowjetischen Streitkräfte, sein Land zu verraten! Er sammelte so viele Truppen der zerschlagenen Roten Armee wie möglich unter seiner Führung und marschierte als Anführer dieser Truppen feige hinter den Ural. In Tscheljabinsk proklamierte er die Gründung der unabhängigen Sibirischen Republik Russland und unterzeichnete einen Frieden mit unseren Feinden!"
 polmod.7.a:0 "Verräter!"
 polmod.8.t:0 "Der Zusammenbruch der UdSSR"
 polmod.8.desc:0 "Das ist das Ende. In den Überresten der Roten Armee brach der Aufstand aus! Die Soldaten überwältigten die Überreste des NKWD, drangen in den Kommandozug ein, in dem sich der Stab befand, und erschossen Stalin, einen grausamen Tyrannen, der Russland in den Untergang führte. An der gesamten Frontlinie ergeben sich Soldaten und legen ihre Waffen nieder. Weitere Kämpfe haben keinen Sinn. Wer kann, flieht nach Osten, nach Sibirien, der Rest wird besetzt. Die Sieger und Nachbarn der ehemaligen UdSSR machen sich auf den Weg, um sich ein Fragment des fallenden Kolosses zu sichern."
 polmod.8.a:0 "Dies ist das Ende der UdSSR"
 polmod.9.t:0 "Polnische Truppen marschieren in Kaunas ein"
 polmod.9.desc:0 "Die litauischen Streitkräfte in Grenznähe konnten den unerwarteten Angriff nicht abwehren. Polnische Truppen überquerten die Grenze. Kurz darauf erreichten sie die litauische Hauptstadt Kaunas und nahmen sie ein. Vertreter der polnischen Behörden trafen kurz darauf ein. Nach kurzen Verhandlungen stimmte die litauische Regierung den von Polen gestellten Bedingungen zu und unterzeichnete die Erklärung zur „Zusammenarbeit und zum Schutz“, die Litauen faktisch zu einem von Polen abhängigen Land macht."
 polmod.9.a:0 "Es ist das Ende des unabhängigen Litauens"
 polmod.10.t:0 "Die UdSSR garantiert die neue litauische Grenze"
 polmod.10.desc:0 "Stalin hielt in Moskau eine flammende Rede, in der er verkündete, die Sowjetunion werde Litauen die Stabilität seiner neuen Grenze garantieren."
 polmod.10.a:0 "Verdammte Sowjets!"
 polmod.11.t:0 "Litauische Truppen marschieren in Vilnius ein"
 polmod.11.desc:0 "Litauische Truppen wehrten einen Angriff ab und marschierten nach dem Abzug der polnischen Truppen in Vilnius ein. Die litauische Regierung hat gerade verkündet, dass die besetzte Stadt Litauen angegliedert wurde. Dies stellt einen Verstoß gegen internationale Verträge dar und ist für Polen ein triftiger Grund, den Krieg zu erklären!"
 polmod.11.a:0 "Sie werden dafür bezahlen!"
 polmod.11.b:0 "Vilnius gehört zu Litauen!"
 polmod.11.c:0 "Nicht, wenn wir etwas dazu zu sagen haben"
 polmod.11.d:0 "Nicht unser Geschäft"
 polmod.12.t:0 "Friedliche Beendigung des Konflikts"
 polmod.12.desc:0 "Polen und Litauen haben kürzlich ein Abkommen zur Normalisierung der polnisch-litauischen Beziehungen unterzeichnet und damit einen über 15 Jahre andauernden Konflikt beendet. Ausschlaggebend für die Unterzeichnung dieser Erklärung war der Grenzkonflikt, den die polnisch-litauischen Behörden abwenden konnten."
 polmod.12.a:0 "Gute Nachrichten"
 polmod.13.t:0 "Polnischer Schutzvorschlag"
 polmod.13.desc:0 "Aus Angst vor russischer Aggression bietet Polen Schutz. Polnische Truppen werden in unserem Land stationiert und unsere Außenpolitik wird überwacht. Im Gegenzug wird Polen unser Land verteidigen, falls die UdSSR beschließt, anzugreifen."
 polmod.13.a:0 "Wir brauchen Hilfe"
 polmod.13.b:0 "Wir bleiben neutral"
 polmod.14.t:0 "[From.GetName] akzeptiert den Vorschlag"
 polmod.14.desc:0 "[From.GetName] hat beschlossen, unser Angebot anzunehmen. Wir können unsere Truppen in diesem Land stationieren und seine Außenpolitik überwachen."
 polmod.14.a:0 "Kluge Wahl"
 polmod.15.t:0 "[From.GetName] lehnt den Vorschlag ab"
 polmod.15.desc:0 "[From.GetName] lehnt unser Angebot ab. Sie ziehen es vor, neutral zu bleiben und darauf zu zählen, dass sowohl Polen als auch die UdSSR es respektieren werden"
 polmod.15.a:0 "Sie haben einen Fehler gemacht"
 polmod.16.t:0 "Dmowskis Rücktritt"
 polmod.16.desc:0 "Als Reaktion auf die Unterzeichnung des Ribbentrop-Beck-Pakts beschloss Roman Dmowski, der Chef der Koalitionsregierung, von seinem Amt zurückzutreten. Als glühender Gegner Deutschlands konnte er das unterzeichnete Abkommen nicht ertragen, das, wie er behauptet, „hinter seinem Rücken sanacja“ entstanden sei. Zusammen mit dem Premierminister traten auch seine Anhänger zurück und schlossen sich den polnischen Protesten gegen die Regierungspolitik an."
 polmod.16.a:0 "Wir können ohne ihn auskommen"
 polmod.17.a:0 "Russland gehört uns!"
 polmod.18.t:0 "Extraterritoriale Autobahn"
 polmod.18.desc:0 "Die Polen reagierten auf unseren jahrelangen Vorschlag, eine Autobahn durch Polen zu bauen, die Ostpreußen mit dem Rest des Reiches verbinden sollte. Mit dem Bau wurde gerade begonnen."
 polmod.18.a:0 "Das sind großartige Neuigkeiten!"
 polmod.18.b:0 "Wir werden dafür im Namen der Zusammenarbeit bezahlen!"
 polmod.19.a:0 "Der Norden gehört zu Finnland"
 polmod.19.b:0 "Wir holen uns unser Land zurück"
 polmod.20.a:0 "Transsyberia wird in unsere Hände fallen"
 polmod.21.a:0 "Die östlichen Länder kommen zurück zu Polen"
 polmod.22.t:0 "Starten Sie die Operation „Hetman“"
 polmod.22.desc:0 "Die Vorbereitungen für die Operation sind abgeschlossen, die Truppen entlang der Grenze zur UdSSR warten auf den Angriffsbefehl. Panzer sind aufgetankt, Flugzeuge sind startklar. Die Offiziere haben ihre letzten Befehle erhalten. Die Welt hält den Atem an, denn der größte Konflikt der Menschheitsgeschichte steht unmittelbar bevor. Die Operation „Hetman“ kann beginnen!"
 polmod.22.a:0 "Zum Angriff!"
 polmod.23.t:0 "Deutsche Invasion"
 polmod.23.desc:0 "Die Deutschen, die gerade einen Angriff auf die UdSSR gestartet haben, haben beschlossen, durch unser Land zu marschieren. Wir haben nicht die geringste Chance, aber wir können versuchen, sie aufzuhalten."
 polmod.23.a:0 "Wir leisten keinen Widerstand"
 polmod.23.b:0 "Wir werden Widerstand leisten"
 polmod.24.t:0 "Osteuropäische Föderation"
 polmod.24.desc:0 "Piłsudskis Traum wird Wirklichkeit. Polen verkündet der Welt die Gründung der Osteuropäischen Föderation!"
 polmod.24.a:0 "Es lebe das Commonwealth!"
 polmod.25.t:0 "Nichtangriffspakt"
 polmod.25.d_a:0 "Es ist kein Geheimnis, dass Deutschland in den letzten Jahren deutlich an Stärke gewonnen hat. Sich dieser Macht entgegenzustellen, selbst wenn es gelingt, wird uns Millionen von Menschenleben kosten. Es ist an der Zeit, unseren Stolz in die Tasche zu stecken und das zu tun, was unser Land rettet – die deutschen Bedingungen zu akzeptieren. Gleichzeitig könnte ein neuer Verbündeter in den Verhandlungen mit der Tschechoslowakei im Fall Zaolzie von Nutzen sein."
 polmod.25.d_b:0 "Es ist kein Geheimnis, dass Deutschland in den letzten Jahren deutlich an Stärke gewonnen hat. Sich dieser Macht entgegenzustellen, selbst wenn es gelingt, wird uns Millionen von Menschenleben kosten. Es ist Zeit, unseren Stolz in die Tasche zu stecken und das zu tun, was unser Land rettet – die deutschen Bedingungen zu akzeptieren."
 polmod.25.a:0 "Schicken wir Beck nach Berlin!"
 polmod.26.t:0 "Polen bietet einen Nichtangriffspakt an"
 polmod.26.desc:0 "Die Polen sind bereit, ihre Gebietsansprüche aufzugeben und uns Danzig zu überlassen, wenn sie im Gegenzug einen Nichtangriffspakt schließen, die deutschen Gebietsansprüche gegenüber Polen zurückziehen und ihre Forderungen nach der Tschechoslowakei unterstützen. Die Ablehnung dieses Angebots hätte zweifellos erhebliche Auswirkungen auf unsere gegenseitigen Beziehungen."
 polmod.26.desc:0 "Die Polen sind bereit, ihre Gebietsansprüche aufzugeben und uns Danzig im Austausch für einen Nichtangriffspakt und den Rückzug deutscher Gebietsansprüche gegenüber Polen zu überlassen. Die Ablehnung dieses Angebots hätte zweifellos erhebliche Auswirkungen auf unsere gegenseitigen Beziehungen."
 polmod.26.a:0 "Zustimmen"
 polmod.26.b:0 "Auf keinen Fall!" 
 polmod.27.t:0 "Streit um Freiwillige"
 polmod.27.desc:0 "Von Anfang an erregten die Freiwilligentruppen aus ehemaligen Soldaten der UdSSR, Ukrainern und Russen die Ablehnung der Deutschen. Die Deutschen bestanden auf einer präziseren Kontrolle oder einer Reduzierung ihrer Truppenstärke. Nach einem Vorfall, bei dem einer der russischen Soldaten den deutschen Marschall ein Monster und einen Mörder nannte, geriet Hitler jedoch in Rage und forderte die sofortige Auflösung der Freiwilligentruppen."
 polmod.27.a:0 "Alle Einheiten werden aufgelöst"
 polmod.27.b:0 "Russische Einheiten werden aufgelöst"
 polmod.27.c:0 "Wir werden nicht so viele gute Soldaten verlieren"
 polmod.28.t:0 "Konflikt um Besatzungspolitik"
 polmod.28.desc:0 "Die polnische und die deutsche Besatzungspolitik unterscheiden sich erheblich. Während in den von Polen besetzten Gebieten verhasste Kolchosen aufgelöst, die örtliche Polizei und eine kleine polnische Garnison für die Sicherheit sorgen und gefangene Soldaten nach Hause geschickt werden, ist die Situation in den vom Reich besetzten Gebieten völlig anders. Die Deutschen dürsten mit Blut, um jeden Widerstand auszulöschen. Dies führt dazu, dass die Bewohner der Grenzgebiete zur polnischen Besatzungszone oft in unser Land fliehen. Hitler fordert, dass wir dem Einhalt gebieten und unsere Politik verschärfen."
 polmod.28.a:0 "Wir werden unsere sanfte Politik aufgeben"
 polmod.28.b:0 "Wir werden die deutsche Besatzungspolitik anpassen"
 polmod.28.c:0 "Wir bleiben unserer Politik treu"
 polmod.29.t:0 "Polen braucht Waffen"
 polmod.29.desc:0 "Polen befindet sich in einer schwierigen Lage. Seine Waffenreserven gehen zur Neige. Wenn die Offensive andauern soll, müssen wir Polen Waffen aus unseren eigenen Reserven schicken."
 polmod.29.a:0 "Senden Sie ihnen, wonach sie fragen"
 polmod.29.b:0 "Schicken wir ihnen mehr, als sie brauchen"
 polmod.30.t:0 "Die Deutschen schicken Waffen"
 polmod.30.d_a:0 "Die Deutschen schicken Waffen gemäß unserer Anfrage."
 polmod.30.d_b:0 "Die Deutschen schicken uns doppelt so viele Waffen wie wir angefordert haben und zusätzlich einige Flugzeuge aus ihren Reserven!"
 polmod.30.a:0 "Gut"
 polmod.30.b:0 "Exzellent"
 polmod.31.t:0 "Deutschland schickt Ressourcen"
 polmod.31.desc:0 "Die Deutschen beschlossen, kein Schuldner Polens zu sein und beschlossen, den Bau einer extraterritorialen Autobahn zu finanzieren"
 polmod.31.a:0 "Es ist nett von ihnen"
 polmod.32.t:0 "Angriff auf den Nahen Osten" 
 polmod.32.desc:0 "Mit dem Zusammenbruch der UdSSR hat sich für uns der Weg in den Nahen Osten und damit auch der Weg nach Indien geöffnet!"
 polmod.32.a:0 "Wir sind nicht aufzuhalten!"
 polmod.33.t:0 "Zaolzie kehrte nach Polen zurück"
 polmod.33.desc:0 "Die Tschechen gaben dem polnisch-deutschen Druck nach und gaben Zaolzie zurück. Die Gebiete, die überwiegend von Polen bewohnt waren, wurden 1920 von der Tschechoslowakei besetzt. Die Stimmung in der Gesellschaft hat sich deutlich verbessert."
 polmod.33.a:0 "Zaolzie war schon immer polnisch!"
 polmod.34.t:0 "Die Deutschen fordern die Rückgabe von Zaolzie an Polen"
 polmod.34.desc:0 "Deutschland stellt ein Ultimatum. Es fordert die Tschechische Republik auf, Zaolzie zurückzugeben, das 1920 von Polen erobert wurde. Im Falle einer Weigerung wird die Tschechische Republik sowohl mit Deutschland als auch mit Polen im Krieg sein."
 polmod.34.a:0 "Wir haben keine Wahl"
 polmod.34.b:0 "Wir geben nicht auf!"
 polmod.35.t:0 "Deutschland akzeptiert"
 polmod.35.d_a:0 "Deutschland hat unser Angebot angenommen. Im Austausch für Danzig verpflichtete es sich, unsere Gebietsansprüche gegenüber Zaolzie zu unterstützen, unverzüglich einen Nichtangriffspakt mit unserem Land zu unterzeichnen und alle seine Ansprüche gegenüber uns zurückzuziehen."
 polmod.35.d_b:0 "Deutschland hat unser Angebot angenommen. Im Austausch für Danzig verpflichtete es sich, unverzüglich einen Nichtangriffspakt mit unserem Land zu unterzeichnen und alle Ansprüche gegen uns aufzugeben."
 polmod.35.a:0 "Hervorragende Neuigkeiten!"
 polmod.36.t:0 "Wir haben keine Einigung erzielt"
 polmod.36.desc:0 "Deutschland lehnte unser Angebot ab, das Kriegsbeil zu begraben."
 polmod.36.a:0 "Ihr Verlust"
 polmod.37.t:0 "England schlägt Seitenwechsel vor"
 polmod.37.desc:0 "Wir wurden zu geheimen Gesprächen ins neutrale Portugal eingeladen. Die Alliierten schlugen vor, dass sie unsere Gebietsgewinne anerkennen würden, wenn wir die Seiten wechseln und die Deutschen überraschend angreifen würden. Nach dem Sieg über das Reich würden sie uns Oberschlesien und Ostpreußen zusprechen."
 polmod.37.a:0 "Das ist unsere Chance!"
 polmod.37.b:0 "Wir bleiben treue Verbündete"
 polmod.38.t:0 "Der Pakt mit der UdSSR"
 polmod.38.desc:0 "Die wachsende Bedrohung durch Nazi-Deutschland lässt die Zukunft ungewiss erscheinen. Wenn die Volksrepublik Polen überleben will, müssen wir einen mächtigen Verbündeten finden. Die naheliegende Wahl ist die Sowjetunion – Heimat der Revolution! Wir sollten Russland zur Kooperation und zur Teilung des deutschen Territoriums nach der Niederlage bewegen können. Es ist jedoch möglich, dass Russland unsere östlichen Gebiete einfordert."
 polmod.38.a:0 "Genossen!"
 polmod.39.t:0 "Der Paktvorschlag"
 polmod.39.desc:0 "Unsere Genossen aus der Volksrepublik Polen haben uns ein interessantes Angebot gemacht. Die Polen schlagen gegenseitige Unterstützung im Kampf gegen das Dritte Reich und eine Teilung deutscher Gebiete nach dem Sieg über Hitler vor. Das ist ein sehr verlockendes Angebot, bietet aber auch die Möglichkeit, im Gegenzug ostpolnische Gebiete zu erbitten. Wir müssen bedenken, dass Deutschland ein mächtiger Gegner ist. Es wäre unklug, ihn zu verärgern."
 polmod.39.a:0 "Mit Zustimmung antworten"
 polmod.39.b:0 "Nichts umsonst"
 polmod.39.c:0 "NEIN"
 polmod.40.t:0 "Pakt Beck-Mołotow"
 polmod.40.desc:0 "Heute wurde in Warschau ein Pakt zwischen der Volksrepublik Polen und der Sowjetunion unterzeichnet, der die Grundsätze der Zusammenarbeit beider Länder beschreibt. Das Dokument enthielt auch ein geheimes Protokoll zur Teilung des Dritten Reiches."
 polmod.40.a:0 "Gemeinsam mit unseren Kameraden!"
 polmod.41.t:0 "Die UdSSR lehnt den Vorschlag ab"
 polmod.41.desc:0 "Die UdSSR beschloss, den kommunistischen Verbündeten in Ruhe zu lassen!"
 polmod.41.a:0 "Verräter!"
 polmod.42.t:0 "Russischer Gegenvorschlag"
 polmod.42.desc:0 "Die Russen sagen, sie würden Polen helfen, vorausgesetzt, wir würden ihnen unser Ostgebiet zurückgeben, das wir im polnisch-bolschewistischen Krieg von der UdSSR erobert hatten."
 polmod.42.a:0 "So sei es"
 polmod.42.b:0 "Niemals!"
 polmod.43.t:0 "Polen schlägt verstärkte Zusammenarbeit vor"
 polmod.43.d:0 "Bei dem Treffen von Vertretern der polnischen und rumänischen Regierung in Lviv schlug Polen vor, die bestehenden Verträge zwischen Bukarest und Warschau auf eine umfassende militärische Zusammenarbeit auszuweiten."
 polmod.43.a:0 "Wir nehmen den Vorschlag an, gemeinsam sind wir stärker! ...aber werden wir stark genug sein?"
 polmod.43.b:0 "Rumänien ist allein stärker!"
 polmod.44.t:0 "Der Vorschlag des Nordpakts"
 polmod.44.d:0 "Die polnische Regierung ist immer auf der Suche nach Verbündeten zur Verteidigung gegen die UdSSR. Jetzt, wo das Intermarium stark ist, haben sie uns einen Vorschlag geschickt, der Fraktion beizutreten."
 polmod.44.a:0 "Finnland muss kooperieren"
 polmod.44.b:0 "Wir brauchen solche Verbündeten nicht"
 polmod.45.t:0 "Gipfeltreffen in Zagreb"
 polmod.45.d:0 "Vertreter aller Länder von Intermarium und Jugoslawien trafen sich in Zagreb, um die Bedingungen der künftigen Zusammenarbeit auszuhandeln. Wie erwartet bot Polen Jugoslawien an, der Fraktion beizutreten."
 polmod.45.a:0 "Jugoslawien braucht dieses Bündnis. Die Slawen müssen zusammenhalten!"
 polmod.45.b:0 "Jugoslawien ist allein stärker ... Jetzt lasst uns den Döner weglassen!"
 polmod.46.t:0 "Polen schlägt Erneuerung der Union vor"
 polmod.46.desc:0 "Wir haben von Polen ein Angebot zur Erneuerung der polnisch-litauischen Union erhalten. Angesichts der Bedrohung durch die Sowjetunion und der historischen Entwicklungen ist das keine schlechte Idee. Wir würden enorme Autonomie und die uneingeschränkte Unterstützung der polnischen Bevölkerung und der Behörden erhalten."
 polmod.46.a:0 "Polnisch-Litauische Union"
 polmod.46.b:0 "Wir brauchen Polen nicht"
 polmod.47.t:0 "Litauen lehnt den Unionsvorschlag ab"
 polmod.47.desc:0 "Litauen hat beschlossen, unsere Vorschläge zur Erneuerung der Union abzulehnen. Wir müssen sie dazu zwingen."
 polmod.47.a:0 "Das bedeutet Krieg"
 polmod.48.t:0 "Polnisch-ungarische Freundschaft"
 polmod.48.d:0 "Jetzt, da sich unsere Beziehungen zu den Polen deutlich verbessert haben und der Einfluss des Intermariums auf unsere Regierung wächst, lohnt es sich, darüber nachzudenken, ob wir unsere Freundschaft auf eine entschiedenere Art und Weise demonstrieren sollten."
 polmod.48.a:0 "Polen erhält Garantien von Ungarn"
 polmod.48.b:0 "Für so entscheidende Schritte ist es noch zu früh"
 polmod.49.t:0 "Seid polnische und ungarische Brüder!"
 polmod.49.d:0 "Ungarn hat im Namen der historischen Freundschaft beschlossen, seine Unabhängigkeit zu garantieren. Wir haben keine andere Wahl, als dies zurückzuzahlen."
 polmod.49.a:0 "Alte Freundschaften rosten nie"
 polmod.50.t:0 "Die raue Freundschaft"
 polmod.50.d:0 "Trotz unserer Hoffnungen hat Ungarn keine Garantie für unser Land abgegeben. Eine umfassende militärische Zusammenarbeit zwischen unseren Ländern braucht eindeutig mehr Zeit …"
 polmod.50.a:0 "Scham"
 polmod.51.t:0 "Der Prointermarium-Aufstand"
 polmod.51.d:0 "Anhänger eines Beitritts zum Intermarrum führten einen Putsch durch. Dank der großen Unterstützung der Bevölkerung und der unfähigen Versuche der vorherigen Regierung, Abhilfe zu schaffen, war der Aufstand erfolgreich."
 polmod.51.a:0 "Es lebe die Revolte!"
 polmod.52.t:0 "Intermarium wächst" 
 polmod.52.d:0 "Die neuen Behörden von [From.Getname] stehen unserer Sache positiv gegenüber und möchten sich unserer Allianz anschließen. Wer sind wir, ihnen dies zu verweigern?" 
 polmod.52.a:0 "Willkommen, Freunde!" 
 polmod.53.t:0 "Die Deutschen übernehmen die Kontrolle!"
 polmod.53.desc:0 "Die Dominanz Deutschlands im polnisch-deutschen Bündnis war so hoch, dass Deutschland ohne einen einzigen Schuss alle wichtigen Institutionen des Landes übernehmen und die Regierung austauschen konnte, wodurch die bestehende Marionettenregierung ersetzt wurde."
 polmod.53.a:0 "Das Ende unserer Unabhängigkeit"
 polmod.54.t:0 "Polnisch-japanisches Abkommen"
 polmod.54.d:0 "Polen bietet uns an, einen Pakt zwischen unseren Ländern zu unterzeichnen, der sich gegen unseren gemeinsamen Feind – die UdSSR – richtet. Angesichts unserer gegenseitigen Beziehungen und der Freundschaft, die den Kaiser und die Polen verbindet, müssen wir über dieses Angebot nachdenken."
 polmod.54.a:0 "Nichts verbindet mehr als ein gemeinsamer Feind"
 polmod.54.b:0 "Wir schaffen das alleine"
 polmod.55.t:0 "Japan unterzeichnet das Abkommen"
 polmod.55.d:0 "Japan hat sich entschieden, das Abkommen gegen die UdSSR zu unterzeichnen. Im Kriegsfall kann zumindest einer von uns mit einem Sieg rechnen."
 polmod.55.a:0 "Osten ist gesichert"
 polmod.56.t:0 "Japan lehnt das Abkommen ab"
 polmod.56.d:0 "Entgegen unseren Erwartungen weigerte sich Japan, den Vertrag mit unserem Land zu unterzeichnen. Eine umfassende militärische Zusammenarbeit zwischen unseren Ländern braucht eindeutig mehr Zeit."
 polmod.56.a:0 "Wir können uns nicht sicher fühlen"
 polmod.57.t:0 "Verbündeter in der Not"
 polmod.57.d:0 "Unser treuer Verbündeter, der den Pakt zwischen unseren Ländern unterzeichnet hat, führt Krieg gegen unseren gemeinsamen Feind – die UdSSR. Unsere Armee wird nicht tatenlos zusehen."
 polmod.57.a:0 "Wir ziehen in den Krieg"
 polmod.58.t:0 "Anfrage für Madagaskar"
 polmod.58.d:0 "Polen bot uns eine einmalige Finanzspritze im Austausch für unsere Kolonie Madagaskar an. Wir hatten bisher kaum Zeit, sie zu erschließen, und es gibt dort auch keine wichtigen Rohstoffe. Vielleicht sollten wir diesen Vorschlag in Erwägung ziehen."
 polmod.58.a:0 "Wir brauchen das Geld"
 polmod.58.b:0 "Unsere Kolonien stehen nicht zum Verkauf"
 polmod.59.t:0 "Wir haben einen Deal"
 polmod.59.d:0 "Es gelang uns, Frankreich davon zu überzeugen, uns Madagaskar zu verkaufen. Damit erfüllten sich die Träume von Millionen Polen."
 polmod.59.a:0 "Polen ist eine Kolonialmacht!"
 polmod.60.t:0 "Kein Deal"
 polmod.60.d:0 "Es ist uns nicht gelungen, Frankreich zum Verkauf Madagaskars zu bewegen. Dies ist das Ende der polnischen Kolonialambitionen."
 polmod.60.a:0 "Das ist alles zum Thema Kolonien."
 polmod.61.t:0 "Roman Dmowski gestorben"
 polmod.61.d:0 "Roman Dmowski, ein bedeutender Pole, Politiker und Kämpfer für polnische Interessen, starb in der Nacht vom 1. auf den 2. Januar 1939 im Haus seiner Freunde in Drozdowo. Bis zum Ende blieb er ein unbestrittener Führer der Nationaldemokratie."
 polmod.61.a:0 "Es ist ein trauriger Tag für unser Land"
 polmod.62.t:0 "Frieden?"
 polmod.62.d:0 "Unsere Blitzkrieg-Strategie ist gescheitert. Polen, das vom Feind leicht besiegt werden sollte, wehrt unsere Angriffe seit Monaten ab. Wäre es nicht an der Zeit, einen polnischen Frieden vorzuschlagen?"
 polmod.62.a:0 "Wir müssen uns auf die anderen Gegner konzentrieren"
 polmod.62.b:0 "Es wird keinen Frieden geben!"
 polmod.63.t:0 "Deutschland bietet Frieden an"
 polmod.63.d:0 "Deutschland hat nach monatelangen Versuchen, unseren unbeugsamen Willen zu brechen, beschlossen, einen Friedensvertrag zu unterzeichnen. Neben dem Vorschlag, den sogenannten „Weißen Frieden“ zu unterzeichnen, schlugen die Deutschen eine Alternative vor. Im Austausch für die umstrittenen Gebiete um Danzig sind die Deutschen bereit, das Gebiet der Slowakei an Polen abzutreten. Wir könnten den Kampf auch fortsetzen."
 polmod.63.a:0 "Unterzeichnen wir den „Weißen Frieden“"
 polmod.63.b:0 "Slowakei für Danzig ist ein fairer Tausch"
 polmod.63.c:0 "Wir machen keinen Umgang mit Faschisten"
 polmod.64.t:0 "Die Gefahr eines Machtverlusts"
 polmod.64.d:0 "Mit der wachsenden Unterstützung für die ONR schwindet der Einfluss der Sanacja. Polen droht eine Destabilisierung des Staates, ein Machtverlust oder gar ein Bürgerkrieg. In dieser Situation sucht die Regierung verzweifelt nach neuen Verbündeten. Die einzige Möglichkeit, relative Stabilität zu garantieren, scheint eine Koalition mit den ehemaligen Gegnern der Sanacja: Endecja. Sie genießt großen Rückhalt unter den Verbündeten der ONR, und ein Machtantritt würde die wachsende Unterstützung für diese Gruppe befriedigen."
 polmod.64.a:0 "Bilden wir eine Koalitionsregierung unter Roman Dmowski"
 polmod.64.b:0 "Wir werden mit Endecja keine Vereinbarungen treffen!"
 polmod_pol_civil_war_warning_tt:0 "§RDas könnte zu einem Bürgerkrieg führen!§!"
 polmod.65.t:0 "Die Vilnus-Frage"
 polmod.65.d:0 "Litauen hat sich entschieden, dem Bündnis mit Polen beizutreten, doch dieses Bündnis ist äußerst fragil. Vilnius ist zum Zankapfel geworden, der zwei ehemals nahestehende Nationen entzweit. In diesem Fall muss eine Entscheidung getroffen werden: Sind wir mehr an Vilnius oder an unserem Verbündeten interessiert?"
 polmod.65.a:0 "Vilnius gehört den Litauern"
 polmod.65.b:0 "Vilnius ist und bleibt polnisch!"
 polmod.66.t:0 "Der faschistische Putsch!"
 polmod.66.d:0 "Monatelang hat die ONR die Polen erfolgreich gegen die derzeitige Regierung aufgehetzt. „Sanacja, diese illegale Diktatur, bringt unser hart erkämpftes Vaterland zu Fall! Bürger, das können wir nicht zulassen! Wir brauchen einen nationalen Durchbruch!“, donnerte Bolesław Piasecki während einer der Versammlungen vom Rednerpult. Als bei der letzten Demonstration die Armee gegen die Demonstranten eingesetzt wurde, sagten die Menschen: Es ist genug. Hunderttausende Polen, angeführt von der ONR, gingen in Warschau auf die Straße und forderten die Auflösung von Sanacja und die Machtübergabe an Bolesław Piasecki. Einige der gegen sie entsandten Militäreinheiten schlossen sich stattdessen den Demonstranten und ihren ONR-Aktivisten an. Die Demonstranten drangen in das Parlament und den Präsidentenpalast ein. Präsident Ignacy Moscicki wurde gefangen genommen und Warschau wurde von der ONR überrannt."
 polmod.66.a:0 "Es ist vorbei. Übergeben wir die Macht an das ONR"
 polmod.66.b:0 "Faschisten an der Macht?! Niemals!"
 polmod.67.t:0 "Die kommunistische Revolution!"
 polmod.67.d:0 "Die Polnische Sozialistische Partei, die seit der Gründung von Militärstützpunkten in Polen durch die UdSSR die Unterstützung vieler Arbeiter des Zentralen Industriegebiets gewonnen hatte, organisierte in Warschau eine Hunderttausenddemonstration. Unerwartet schloss sich die sowjetische Armee den Demonstranten an, und die Demonstration entwickelte sich schnell zu einer regelrechten Revolution! Die Kommunisten lösten das Parlament auf, verhafteten den Präsidenten und verkündeten die Gründung der Polnischen Volksrepublik, deren Unabhängigkeit die UdSSR sofort anerkannte und sich zu ihrer Verteidigung verpflichtete."
 polmod.67.a:0 "Es ist vorbei. Übergeben wir die Macht an die PPS"
 polmod.67.b:0 "Kommunismus in Polen?! Niemals!"
 polmod.68.t:0 "Ukrainischer Aufstand!"
 polmod.68.d:0 "Mangelnde Stabilität, sozialer Druck und wachsende Gegensätze zwischen Polen und Ukrainern führten zum Ausbruch des ukrainischen Aufstands. Die Aufständischen besetzten Lwiw, verkündeten die Gründung einer freien Ukraine und begannen mit der Deportation von Polen aus überwiegend von Ukrainern bewohnten Gebieten. Sie forderten außerdem die Anerkennung ihrer Gebietsansprüche und die Unabhängigkeit durch die Regierung in Warschau."
 polmod.68.a:0 "Zerschmettere die Rebellion!"
 polmod.68.b:0 "Wir können uns jetzt keine Konfrontation leisten"
 polmod.69.t:0 "März hinter Ural"
 polmod.69.d:0 "Das Dritte Reich geht unter. Das ist unsere Chance, Russland zurückzuerobern. Genossen! Wir haben uns in den letzten Monaten darauf vorbereitet! Es ist Zeit, durch den Ural zurückzukehren und unser Land aus den Händen eines bösen Eindringlings zurückzuerobern!"
 polmod.69.a:0 "Für Mütterchen Russland!"
 russian_march_tt:0 "Eingenommene Kerngebiete gehen automatisch in den Besitz von [Root.GetName] über und eine Partisanendivision wird entstehen."
 polmod.70.t:0 "Zeit für einen Seitenwechsel?"
 polmod.70.d:0 "Die Polen, unsere Freunde und Verbündeten, haben beschlossen, sich von Deutschland abzuwenden und es von hinten anzugreifen. Sie bieten uns an, uns ihnen anzuschließen. Im Gegenzug werden die Alliierten nach der Niederlage des Dritten Reiches unsere Gebietsgewinne anerkennen."
 polmod.70.a:0 "Lasst uns Polen beitreten"
 polmod.70.b:0 "Bleib beim Reich"
 polmod.71.t:0 "Reaktion auf die Kapitulation Frankreichs"
 polmod.71.desc:0 "Polen, die kürzlich auf den Straßen gegen die Regierungspolitik protestierten, lesen nun schweigend die neuesten Zeitungsausgaben. Frankreich, bis dahin die mächtigste Kontinentalmacht Europas, kapitulierte nach nur wenigen Wochen des Kampfes. Das Land, das den Polen bis vor kurzem als einziger Garant für Unabhängigkeit galt, entpuppte sich als Koloss auf tönernen Beinen. Die Kritik an der Regierung verstummte sofort. Jetzt versteht jeder, wie klug der Nichtangriffspakt mit Deutschland war. Die Entscheidung des Außenministers Józef Beck hat Polen wahrscheinlich vor dem Untergang bewahrt."
 polmod.71.a:0 "Die Regierung erwies sich als schlauer als gedacht"
 polmod.72.t:0 "Das Ende der Besetzung Litauens"
 polmod.72.desc:0 "Auf Ersuchen Polens wurde die Besetzung Litauens, eines baltischen Landes, das vor dem Krieg von Polen abhängig war, beendet."
 polmod.72.a:0 "OK"
 polmod.73.t:0 "Polen will verhandeln"
 polmod.73.desc:0 "In einer geheimen Botschaft wurde uns mitgeteilt, dass die Polen bereit sind, die Seiten zu wechseln und sich dem Krieg gegen das Reich anzuschließen. Die Bedingung ist die Anerkennung ihrer Gebietsgewinne und Ansprüche auf die Ostgebiete Deutschlands."
 polmod.73.a:0 "Wir brauchen sie, um das Reich zu besiegen"
 polmod.73.b:0 "Wir können ohne sie auskommen"
 #######################

 newsmod.1.t:0 "Polen übernimmt die Kontrolle über Litauens Außenpolitik"
 newsmod.1.desc:0 "Der Konflikt an der polnisch-litauischen Grenze ist eskaliert. Polnische Truppen überquerten die litauische Grenze und besetzten die Hauptstadt Kaunas. In einer Atmosphäre des Chaos und der Angst stimmte die litauische Regierung einem Vertrag über „Kooperation und Schutz“ zu, der eine dauerhafte polnische Militärpräsenz in Litauen garantiert und das Land verpflichtet, seine Außenpolitik mit den Behörden in Warschau abzustimmen. Damit ist Litauen kein unabhängiges Land mehr, sondern de facto von Polen abhängig."
 newsmod.1.a:0 "Es war eine Frage der Zeit"
 newsmod.2.t:0 "Polnischer Baltikum-Protektionismus"
 newsmod.2.desc:0 "Polen kündigte den Start eines Programms zum Schutz der baltischen Staaten an. Trotz der scheinbar guten Idee greift dieses Programm erheblich in die Lage der baltischen Staaten ein und führt zu deren Verlust ihrer Souveränität."
 newsmod.2.a:0 "Es ist nur eine Ausrede"
 newsmod.2.b:0 "Sie handeln gerecht"
 newsmod.2.c:0 "Wem soll man glauben?"
 newsmod.3.t:0 "Extraterritoriale Straße"
 newsmod.3.desc:0 "Polen und Deutschland haben sich auf die extraterritoriale Straße durch Pommern geeinigt. Die Länder des Völkerbundes sind mit dieser Lösung sehr zufrieden. „Das zeigt, dass beide Situationen friedlich gelöst werden“, sagte der britische Premierminister heute auf einer Pressekonferenz. Man geht davon aus, dass dies der Beginn einer umfassenderen deutsch-polnischen Zusammenarbeit ist. Es gibt jedoch auch Skeptiker, die befürchten, dass eine solche Zusammenarbeit der Welt nichts nützen wird."
 newsmod.3.a:0 "Friedliche Lösungen sind die besten"
 newsmod.3.b:0 "Unschätzbare Zusammenarbeit der Nationen"
 newsmod.3.c:0 "Am Ende könnte es schlecht für uns sein"
 newsmod.4.t:0 "Ribbentrop-Beck-Pakt"
 newsmod.4.desc:0 "Heute wurde der Pakt in Warschau unterzeichnet. Auf polnischer Seite – Józef Beck, auf deutscher Seite – Joachim von Ribbentrop. Aus ihren Namen entstand der offizielle Name: Ribbentrop-Beck-Pakt. Im Rahmen des Abkommens stimmt Polen den deutschen Forderungen zu: der Eingliederung Danzigs in das Reich und der Übergabe einer kürzlich gebauten exterritorialen Autobahn nach Ostpreußen an Deutschland. Im Gegenzug erkennen die Deutschen die Westgrenze Polens an, unterzeichnen einen Nichtangriffspakt und unterstützen Polen bei der Rückeroberung von Zaolzia, das seit 1920 von der Tschechoslowakei besetzt war."
 newsmod.4.a:0 "Das führt zu nichts Gutem"
 newsmod.4.b:0 "Ein Bündnis großer Nationen!"
 newsmod.4.c:0 "Wie wird ihnen das helfen?"
 newsmod.5.t:0 "Der Zusammenbruch der UdSSR"
 newsmod.5.desc:0 "Die Rote Armee scheiterte, die Front war durchbrochen. Die verbliebenen Soldaten gaben auf oder ließen ihre Uniformen fallen und flohen in die Zivilbevölkerung. In den Straßen der Städte brach eine Konterrevolution aus. Die Russen übten die ersehnte Rache an den Kommunisten. Sie rächten sich für Terror, Hunger und Morde der Bolschewiki. Die Parteizentralen wurden zerstört, rote Banner und Porträts sowjetischer Führer zertrümmert, die Komitees verbrannt. Die aufständischen Soldaten griffen den vom NKWD umstellten Kommandozug an, in dem sich Stalin aufhielt. Nach kurzem Kampf rissen die Angreifer die NKWD-Soldaten buchstäblich in Stücke und drangen in den Zug ein. Beobachter, die diesen Ort lange beobachteten, konnten nicht sagen, welche der erschossenen Leichen Stalin und welche Lawrenti Beria, dem Chef des ominösen NKWD, gehörten …"
 newsmod.5.a:0 "Es war eine Frage der Zeit"
 newsmod.5.b:0 "Hurra!"
 newsmod.5.c:0 "Die Revolution fällt"
 newsmod.6.t:0 "Deutschland bricht den Ribbentrop-Beck-Pakt"
 newsmod.6.desc:0 "Heute ist es zu einem schändlichen Verrat gekommen. Polens Verbündeter Deutschland griff ohne Vorwarnung an. Laut Hitlers Aussage war der Angriff eine Reaktion auf die angebliche Verschwörung Polens gegen das Dritte Reich. Ob diese Anschuldigungen wahr sind, lässt sich nur schwer sagen. Wir wissen jedoch, dass sich die Lage in Osteuropa um 180 Grad gedreht hat und der Ausgang dieser Konfrontation ungewiss ist. Deutsche Truppen griffen Polen an, und die polnische Armee übernahm die Verteidigung ihres Heimatlandes. Eines ist sicher: Die Polen werden jeden Zentimeter ihres Landes verteidigen."
 newsmod.6.a:0 "Vertrauen zwischen Giganten ist eine fragile Sache"
 newsmod.6.b:0 "Wir haben es nur unterschrieben, um etwas Zeit für den Angriff zu gewinnen"
 newsmod.6.c:0 "Für die Faschisten ist ein Vertrag nichts weiter als ein Stück Papier"
 newsmod.7.t:0 "Polen bricht den Ribbentrop-Beck-Pakt"
 newsmod.7.d:0 "Heute ereignete sich in Osteuropa – wie der „Völkische Beobachter“ empört schrieb – „ein schändlicher Verrat, wie ihn die Weltgeschichte noch nie gesehen hat“. Als sich das Dritte Reich auf die entscheidende Schlacht vorbereitete, griffen die Polen in die Schlacht ein. Es begann spektakulär – eine wenige Jahre zuvor durch das polnische Pommern gebaute Exterritorialstraße wurde zerstört. Polnische Truppen überquerten die Grenze zu Ostpreußen auf ihrer gesamten Länge und drangen in Schlesien und Vorpommern ein. Überrascht vom Verrat eines Verbündeten, leistete Deutschland fast keinen Widerstand. Gleichzeitig durchtrennten die Polen alle Kommunikationslinien, die das Reich mit den besetzten Gebieten im Osten verbanden. Der entscheidende Feldzug dieses Krieges begann."
 newsmod.7.a:0 "Vertrauen zwischen Giganten ist eine fragile Sache"
 newsmod.7.b:0 "Wir haben es nur unterschrieben, um etwas Zeit für den Angriff zu gewinnen"
 newsmod.7.c:0 "Für die Faschisten ist ein Vertrag nichts weiter als ein Stück Papier"
 newsmod.8.t:0 "Polnisch-japanisches Abkommen"
 newsmod.8.d:0 "Heute wurde in Tokio im Beisein von Vertretern der japanischen und polnischen Regierung das polnisch-japanische Militärabkommen unterzeichnet. Beide Länder verpflichten sich, sich im Falle eines bewaffneten Konflikts mit der UdSSR gegenseitig zu Hilfe zu kommen. Kaiser Hirohito, der polnische Präsident [From.GetLeader], Marschalls Neffe Bronislaw Piłsudzki und Tadeusz Romer, polnischer Vertreter bei der japanischen Regierung, nahmen an der Vertragsunterzeichnung teil."
 newsmod.8.a:0 "Vernünftiger Schritt"
 newsmod.8.b:0 "Das bedeutet nichts"
 newsmod.9.t:0 "Der Tod von Roman Dmowski"
 newsmod.9.d:0 "Am 2. Januar 1939 starb in Drozdów einer der größten Politiker Polens, Roman Dmowski. Während der Zeremonie wurde ein Sarg mit dem Leichnam durch die Straßen Warschaus zum Brodnowski-Friedhof getragen. Beerdigungen, wie im Fall von Józef Piłsudski, boten Gelegenheit, patriotische Gesinnung zu zeigen. Zu den Trauerfeierlichkeiten kam unter anderem der ehemalige Präsident Stanisław Wojciechowski. Nach Angaben der Organisatoren dürften bis zu 200.000 Menschen an der Beerdigung teilgenommen haben, was sie zu einer der größten nationalen Versammlungen der letzten Jahre machte."
 newsmod.9.a:0 "Ein großer Mann starb"
 newsmod.9.b:0 "Und damit Schluss mit den Faschisten!"
 newsmod.10.t:0 "Zwischenfall an der polnisch-litauischen Grenze"
 newsmod.10.d:0 "Am 11. März kam es an der polnisch-litauischen Grenze zu einem Grenzzwischenfall, bei dem der Soldat des Grenzschutzkorps, Korporal Stanisław Serafin, ums Leben kam. Daraufhin forderte die polnische Regierung eine Normalisierung der diplomatischen Beziehungen. In ganz Polen kam es zu Massendemonstrationen zur Unterstützung der Regierungspolitik. Ihr Slogan lautete: „Wodzu, führe uns nach Kowno!“. Die Antwort der litauischen Regierung ist unbekannt, doch der anhaltende Spannungszustand könnte zu einer weiteren Eskalation des Konflikts führen."
 newsmod.10.a:0 "Wir hoffen das Beste!"
 newsmod.11.t:0 "Ukrainischer Nationalaufstand"
 newsmod.11.d:0 "Die Ukrainer greifen zu den Waffen!\nAngesichts der sich verschlechternden Lage in Polen, der Instabilität und Feindseligkeit beschlossen die Ukrainer einen nationalen Aufstand. Die Aufständischen nahmen Lwiw ein, vertrieben die polnische Verwaltung und verkündeten die Gründung der Freien Ukraine. Gleichzeitig begann die Deportation der polnischen Bevölkerung.\nDie Reaktion der Regierung in Warschau ist noch nicht bekannt. Ist eine bewaffnete Konfrontation unvermeidlich? Wir werden es bald herausfinden."
 newsmod.11.a:0 "Es wird Blut fließen"
 newsmod.12.t:0 "Die Aufständischen legen ihre Waffen nieder"
 newsmod.12.d:0 "Angesichts der unvermeidlichen Niederlage beschlossen die Aufständischen, ihre Waffen niederzulegen. Sie gaben der polnischen Seite massiv nach. Dies ist das Ende des Aufstands in der Ukraine. Das Schicksal der Aufständischen ist jedoch nicht ausgemacht. Was wird die polnische Seite tun?"
 newsmod.12.a:0 "Kluge Entscheidung"
 newsmod.13.t:0 "Russland schlägt durch den Ural zurück"
 newsmod.13.d:0 "Angesichts der sich verschlechternden Lage Deutschlands und der darauffolgenden Niederlagen der Wehrmacht beschlossen die hinter dem Ural verbliebenen Flüchtlinge aus Russland zum Gegenangriff. Die reorganisierten Reste der Roten Armee marschieren nun als Russische Befreiungsarmee unter der Führung von Andrej Wlassow durch die Berge, um die von Deutschland besetzten Gebiete zurückzuerobern. In jedem befreiten Dorf oder jeder befreiten Stadt, die bereits unter deutschem Joch gelitten hat, schließen sich zusätzliche Freiwillige der Armee an. Wie russische Soldaten sagen: Russland ist nie wirklich besiegt, es zögert die Niederlage des Feindes nur hinaus."
 newsmod.13.a:0 "Sie werden erneut besiegt werden!"
 newsmod.13.b:0 "Russland ist noch nicht gefallen"
 newsmod.14.t:0 "Ungarn verbündet sich mit Polen im Kampf gegen das Dritte Reich"
 newsmod.14.d:0 "Kaum wendet sich Polen von Deutschland ab, beschließt ein weiterer Verbündeter, den Standort zu wechseln. Diesmal ist es Ungarn. Wir sehen, dass die polnisch-ungarische Freundschaft stärker ist als die Verpflichtungen gegenüber den Verbündeten. Wird Ungarn der Sargnagel für Adolf Hitler sein? Eines ist sicher: Europa liegt nun in den Händen Polens und Ungarns."
 newsmod.14.a:0 "Verräter!"
 newsmod.14.b:0 "Ein weiteres Messer im Rücken des Reiches!"
 newsmod.15.t:0 "Lissabon-Konferenz"
 newsmod.15.d_a:0 "Unsere Spione berichten, dass die Konferenz im neutralen Lissabon stattfand, an der Vertreter der alliierten Länder und eine geheimnisvolle Delegation teilnahmen. Die gesamte Konferenz war geheim und streng bewacht, aber es ist bekannt, dass die Alliierten zufrieden nach Hause zurückkehrten"
 newsmod.15.d_b:0 "Im neutralen Lissabon fand eine historische Konferenz statt, bei der eine Delegation der namhaftesten Vertreter der alliierten Streitkräfte unter Führung des US-Präsidenten [USA.GetLeader] und des britischen Premierministers [ENG.GetLeader] mit der polnischen Delegation unter Führung von Außenminister Józef Beck zusammentraf. Nach stundenlangen Verhandlungen stimmte Polen folgenden Bedingungen zu: Die Alliierten erkennen die polnischen Gebietseroberungen an und erhalten nach der Niederlage Deutschlands auch Oberschlesien und Ostpreußen. Im Gegenzug wechselt Polen die Seiten und greift die Deutschen überraschend an. Das Dokument enthielt auch eine Klausel, die es Ungarn ermöglichte, im Falle eines Beitritts von dem Vertrag zu profitieren."
 newsmod.15.a:0 "Es ist etwas im Gange"
 newsmod.15.b:0 "Tolle Neuigkeiten"
 newsmod.16.t:0 "Operation „Hetman“"
 newsmod.16.d:0 "Today will be a turning point in the history of this war and the whole world. On this day, Germany and Poland - along with a few minor allies - declared war on the USSR. Operation \"Barbarossa\" has begun, in the Polish nomenclature Operation \"Hetman\". This way, after more than a year, the war has reached a quiet so far Eastern Europe. The thoughts of international commentators were all the same. The Poles again, like in 1812 with Napoleon, march on Moscow. This time with Hitler. The notes on the declaration of war were handed over to the head of Soviet diplomacy Wieczysław Mołotow by accredited in Moscow ambassadors of Germany - Fredrich-Werner von der Schulenburg - and Poland - Wacław Grzybowski."
 newsmod.16.a:0 "Ein weiterer Krieg im Osten"
 newsmod.17.t:0 "Siegesparade in Moskau"
 newsmod.17.d_a:0 "Nach dem Fall des gemeinsamen Feindes ist für die Sieger die Zeit zum Feiern gekommen! Gastgeber der Siegesparade waren Marschall Edward Śmigły-Rydz und Adolf Hitler. Umgeben von den Generälen beider Länder standen sie auf der Tribüne, von der aus die Mitglieder des kommunistischen Politbüros vor nicht allzu langer Zeit noch allein die Paraden verfolgt hatten. Der Führer triumphierte und drückte mit Tränen der Freude in den Augen den polnischen Marschall und den ihn begleitenden Außenminister Józef Beck. Nebeneinander, mit dem Knarren von Raupen über das Kopfsteinpflaster des Roten Platzes, rollten lange Panzerkolonnen. 14TP neben Panzerkampfwagen III. Polnische und deutsche Infanterie marschierten Arm in Arm. Beobachtern zufolge kamen jedoch die mit langen Lanzen ausgerüsteten Schwadronen der polnischen Kavallerie am besten zur Geltung. Ulanen salutierten ihrem siegreichen Marschall, und das Klappern ihrer Pferdehufe hallte noch lange durch die Straßen Moskaus ..."
 newsmod.17.d_b:0 "Nach dem Fall des Feindes ist es für die Sieger Zeit zum Feiern! Gastgeber der Siegesparade waren der Kommandeur der Heeresgruppe „Mitte“, Feldmarschall Fjodor von Bock, und Adolf Hitler. Umgeben von den Generälen standen sie auf der Tribüne, von der aus die Mitglieder des kommunistischen Politbüros noch vor kurzem allein die Paraden verfolgt hatten. Der Führer triumphierte und drückte mit Tränen der Freude in den Augen seinen Marschall und seine Begleiterin Heinrich Himmler. Nebeneinander, unter dem Knarren von Raupen über das Kopfsteinpflaster des Roten Platzes, rollten lange Kolonnen von Panzerkampfwagen III und IV. Die deutsche Infanterie marschierte Arm in Arm. Soldaten salutierten ihrem siegreichen Führer und Rufe „Sieg Heil!“ hallten noch lange durch die Straßen Moskaus …"
 newsmod.17.a:0 "Die Gewinner feiern"
 newsmod.18.t:0 "Die südlichen Republiken der UdSSR erklären ihre Unabhängigkeit"
 newsmod.18.d:0 "Mit dem Zusammenbruch aller großen Städte der UdSSR und Stalins Flucht aus dem belagerten Moskau in den Osten schwanden die letzten Hoffnungen auf einen Sieg im Krieg. Als die Truppen der Achsenmächte die asiatischen Steppen erreichten, beschlossen die Sowjetrepubliken der Region, ihre Unabhängigkeit zu erklären. Die Bewohner der Region brachen alle Verbindungen zur UdSSR ab und vertrieben die verhassten Kommissare."
 newsmod.18.a:0 "Die UdSSR ist im Niedergang"
 
 ###INT Focuses
 POL_INT_ensure_german_does_not_intervene_in_the_war:0 "Stellen Sie sicher, dass Deutschland nicht in den Krieg eingreift"
 POL_INT_ensure_german_does_not_intervene_in_the_war_desc:0 "Wir werden Deutschland einen Krieg schicken, in dem es darum geht, nicht in diesen Krieg einzugreifen, um die Deutschen zu befreien, da wir einfach in unser eigenes Territorium eindringen. Sobald Deutschland zustimmt, nicht einzugreifen, werden wir mit der Planung einer Invasion beginnen."
 POL_INT_send_our_demands_to_danzig:0 "Senden Sie unsere Forderungen nach Danzig"
 POL_INT_send_our_demands_to_danzig_desc:0 "Wir müssen unsere Forderungen an Dazing senden und wenn sie unsere Forderungen ablehnen, werden wir sie mit Gewalt nehmen."
 POL_INT_incoraparate_danzig_into_poland:0 "Eingliederung Danzigs in Polen"
 POL_INT_incoraparate_danzig_into_poland_desc:0 "Wir müssen unsere Truppen auf die Invasion vorbereiten, denn es ist unser Territorium und es wurde uns im Vertrag von Versailles genommen."
 POL_INT_appoint_polish_leaders:0 "Ernennung polnischer Führungskräfte"
 POL_INT_appoint_polish_leaders_desc:0 "Wir müssen polnische Führer nach Dazing berufen, um die Sicherheit als Nation zu gewährleisten. Mit den lokalen Führern an der Spitze werden sie bereit sein, unsere Politik zu akzeptieren."
 POL_INT_german_polish_summit:0 "Deutsch-Polnischer Gipfel"
 POL_INT_german_polish_summit_desc:0 "Wir müssen über die Bedingungen für die Rückgabe des Landes an Deutschland diskutieren, denn wir werden das Land nicht einfach verschenken."
 POL_INT_reject_the_treity:0 "Den Vertrag ablehnen"
 POL_INT_reject_the_treity_desc:0 "Wir müssen den Vertrag von Versailles ignorieren und tun, was wir tun müssen, mit Betäubung"
 POL_INT_subdue_danzig:0 "Unterwerft Danzig"
 POL_INT_subdue_danzig_desc:0 "Wir müssen dafür sorgen, dass sich Dazing in den kommenden Jahren nicht gegen uns auflehnt. Sollten wir jemals in einen Konflikt mit Deutschland geraten, besteht bei einer mehrheitlich deutschen Bevölkerung die Gefahr einer Rebellion."
 POL_INT_tax_and_tarrif_reform:0 "Steuer- und Zollreform"
 POL_INT_tax_and_tarrif_reform_desc:0 "Um unsere Sozialleistungen zu finanzieren, müssen wir vorerst unsere Steuern und Zölle erhöhen. Dies mag zwar einige Nachteile mit sich bringen, aber insgesamt wird es Polen zu einer besseren Nation machen."
 POL_INT_war_plan_lithuania:0 "Kriegsplan Litauen"
 POL_INT_war_plan_lithuania_desc:0 "Wir brauchen den litauischen Teil des Commonwealth, um diese Idee überhaupt in Betracht zu ziehen. Wir sollten klein anfangen und dann groß rauskommen."
 POL_INT_demand_southern_czechoslovakia:0 "Nachfrage Südtschechoslowakei"
 POL_INT_demand_southern_czechoslovakia_desc:0 "Theatralisch haben wir den südlichen Teil der Tschechoslowakei besetzt. Jetzt ist ein besserer Zeitpunkt denn je, unser rechtmäßiges Territorium zurückzuerobern."
 POL_INT_economic_reforms:0 "Wirtschaftsreformen"
 POL_INT_economic_reforms_desc:0 "Wir müssen Polens Wirtschaft zu einem neuen sozialistischen Wirtschaftsstil reformieren, dies wird hoffentlich die polnische Wirtschaft verbessern"
 POL_INT_a_polish_monarchy:0 "Eine polnische Monarchie"
 POL_INT_a_polish_monarchy_desc:0 "Polen hat sich entschieden, eine Monarchie mit einem wahren König zu werden! Wir müssen entscheiden, wohin dieser König Polen führen wird und wie es sich verändern wird."
 POL_INT_polish_dicatator:0 "Polnischer Diktator"soviet
 POL_INT_polish_dicatator_desc:0 "Polen wird mit eiserner Faust regiert werden. Wir müssen damit beginnen, dem wahren Führer Polens die Macht zu geben und gegen zivile Aktivitäten vorzugehen."
 POL_INT_secure_our_border_with_soviet_russia:0 "Sichern Sie unsere Grenze zu Sowjetrussland"
 POL_INT_secure_our_border_with_soviet_russia_desc:0 "Wir können den Russen nicht trauen, da sie jederzeit ihr Land zurückerobern möchten. Vielleicht können wir etwas bauen, das uns vor einer bevorstehenden russischen Invasion schützt."
 POL_INT_secure_our_border_with_the_germans:0 "Sichern Sie unsere Grenze zu den Deutschen"
 POL_INT_secure_our_border_with_the_germans_desc:0 "Obwohl die Deutschen uns sehr geholfen haben, unsere Unzweckmäßigkeit zu sichern, aber mit den Deutschen nun besiegt ihre Haltung meine Änderung in den kommenden Jahren"
 POL_INT_better_polish_roads:0 "Bessere polnische Straßen"
 POL_INT_better_polish_roads_desc:0 "Wir müssen unsere Infrastruktur verbessern, um Waren und Dienstleistungen schneller transportieren zu können. Dadurch wird Polen mit Sicherheit eine große Nation werden!"
 POL_INT_become_a_soviet_puppet:0 "Werde eine sowjetische Marionette"
 POL_INT_become_a_soviet_puppet_desc:0 "Wir müssen unter sowjetischen Einfluss geraten und ein Protektorat von ihnen werden, mit dem wir unsere Unzweckmäßigkeit vor Eindringlingen von außen garantieren können."
 POL_INT_improve_internal_stability:0 "Verbessern Sie die interne Stabilität"
 POL_INT_improve_internal_stability_desc:0 "Wir müssen unsere innere Stabilität verbessern, da unser Land mit internen Konflikten zu kämpfen hat. Wir müssen alle extremistischen Parteien ausmerzen und alle internen Machtkämpfe beenden."
 POL_INT_monarch_influences:0 "Monarchische Einflüsse"
 POL_INT_monarch_influences_desc:0 "Wir werden in Polen ein monarchistisches Regime errichten und Józef Piłsudski zum König von Polen machen."
 POL_INT_far_right_influnces:0 "Rechtsextreme Einflüsse"
 POL_INT_far_right_influnces_desc:0 "Da der Putsch erfolgreich war, sollten wir unsere neue Verfassung unter Einbeziehung der rechtsextremen Strömungen entwerfen."
 POL_INT_polands_new_leader:0 "Polens neuer Staatschef"
 POL_INT_polands_new_leader_desc:0 "Was wird als Nächstes für Polen passieren, nachdem der Putsch erfolgreich war und Józef Piłsudski nun das Sagen hat?"
 POL_INT_stay_in_line_with_the_consitution:0 "Bleiben Sie im Einklang mit der Verfassung"
 POL_INT_stay_in_line_with_the_consitution_desc:0 "Wir müssen unsere Macht im Zaum halten und unseren neuen Führer darauf vorbereiten, Polen zu führen"
 POL_INT_a_polish_democracy:0 "Eine polnische Demokratie"
 POL_INT_a_polish_democracy_desc:0 "Wir werden weiterhin eine Demokratie bleiben und unser Führer wird vom Volk gewählt"
 POL_INT_demand_lithuania:0 "Nachfrage Litauen"
 POL_INT_demand_lithuania_desc:0 "Wir müssen Litauen auffordern, unserer Union beizutreten und Teil des neuen polnischen Monarchen zu werden."
 POL_INT_demand_estonia:0 "Nachfrage Estland"
 POL_INT_demand_estonia_desc:0 "Wir müssen fordern, dass Estland unserer Union beitritt oder untergeht"
 POL_INT_demand_lativia:0 "Nachfrage Lettland"
 POL_INT_demand_lativia_desc:0 "Wir müssen Lettland zum Beitritt in unsere Union auffordern oder ihm mit Krieg drohen."
 POL_INT_claims_on_the_baltics:0 "Ansprüche auf das Baltikum"
 POL_INT_claims_on_the_baltics_desc:0 "Wir müssen alle baltischen Staaten beanspruchen und sie unserer Dynastie unterstellen."
 POL_INT_build_up_on_the_russian_boarder:0 "Aufbau an der russischen Grenze"
 POL_INT_build_up_on_the_russian_boarder_desc:0 "Wir müssen uns aufbauen und den Bau von Festungen in der Nähe der russischen Grenze vorbereiten. Nur dann werden wir in der Lage sein, die Russen erfolgreich abzuwehren."
 POL_INT_war_plan_germany:0 "Kriegsplan Deutschland"
 POL_INT_war_plan_germany_desc:0 "Wir werden Ansprüche auf Oberpreußen erfinden, obwohl wir nicht auf einen Krieg mit Deutschland vorbereitet sind und dies ein riskanter Schritt sein kann. Wir brauchen dies für unsere Zukunft"
 POL_INT_demand_lithuania_join_the_commonwealth:0 "Fordern Sie Litauen auf, dem Commonwealth beizutreten"
 POL_INT_demand_lithuania_join_the_commonwealth_desc:0 "Alle unsere Vorbereitungen sind abgeschlossen. Wir können uns jetzt auf den Krieg vorbereiten und gegen Litauen in den Krieg ziehen."
 POL_INT_demand_russia_release_ukraine:0 "Fordern Sie Russland auf, die Ukraine freizulassen"
 POL_INT_demand_russia_release_ukraine_desc:0 "Russland ist in die Ukraine einmarschiert und besitzt einige unserer Kernstaaten. Wir müssen die Übergabe der Ukraine an Russland fordern."
 POL_INT_demand__upper_prussia_from_germany:0 "Oberpreußen von Deutschland fordern"
 POL_INT_demand__upper_prussia_from_germany_desc:0 "Wir werden Oberpreußen von Deutschland fordern, und wenn sie es ablehnen, müssen wir möglicherweise in den Krieg ziehen"
 POL_INT_hold_snap_elections:0 "Halten Sie vorgezogene Wahlen ab"
 POL_INT_hold_snap_elections_desc:0 "Da der Kommunismus in unserem Land wächst, müssen wir alle anderen Parteien aus unserem Land verbannen. Wir werden allen demokratischen Parteien und rechtsextremen Verbänden die Teilnahme an den Wahlen in unserem Land verbieten. Das macht uns zu einem Einparteienstaat."
 POL_INT_may_coup:0 "Mai-Putsch"
 POL_INT_may_coup_desc:0 "Der Putsch im Mai war ein Staatsstreich, der den Sturz des derzeitigen Präsidenten und Vizepräsidenten Polens zum Ziel hatte und unter dem Namen „Mai-Putsch“ bekannt wurde."
 POL_INT_maintain_relations_with_the_soviets:0 "Pflegen Sie die Beziehungen zu den Sowjets"
 POL_INT_maintain_relations_with_the_soviets_desc:0 "Wir müssen gute Beziehungen zu den Sowjets pflegen und gleichzeitig unsere demokratischen Werte bewahren."
 POL_INT_defensive_measures_against_russia:0 "Abwehrmaßnahmen gegen Russland"
 POL_INT_defensive_measures_against_russia_desc:0 "Wir müssen im Falle einer Invasion durch die Russen Verteidigungsmaßnahmen ergreifen. Sollten wir jemals mit den Russen im Krieg sein, können wir diese Maßnahmen jederzeit aktivieren und einen kleinen Verteidigungsbonus erhalten."
 POL_INT_soviet_assistance:0 "Sowjetische Hilfe"
 POL_INT_soviet_assistance_desc:0 "Wir werden uns nicht direkt in diesen Konflikt einmischen, aber wir werden den Sowjets Hilfsgüter und Freiwillige schicken, um sie in ihren Kampf zu unterstützen."
 POL_INT_polish_soviet_war:0 "Polnisch-Sowjetischer Krieg"
 POL_INT_polish_soviet_war_desc:0 "Wir müssen unsere verlorenen Gebiete zurückgewinnen, die derzeit von den Sowjets besetzt sind, und unserem Reich zu seinem früheren Glanz verhelfen."
 POL_INT_rise_from_the_asashes:0 "Erhebe dich aus der Asche"
 POL_INT_rise_from_the_asashes_desc:0 "Die Sowjets kontrollieren derzeit unser Gebiet der Kiewer Rus. Mit dem Erfolg des Aufstands in Großpolen im Jahr 1918 haben wir zum ersten Mal seit 1795 unsere Härte wiederhergestellt. Wir sind völlig zuversichtlich, dass wir diesen Krieg gewinnen und die Wahllokale befreien können."
 POL_INT_international_support:0 "Internationale Unterstützung"
 POL_INT_international_support_desc:0 "Wir müssen internationale Unterstützung gewinnen und andere Nationen um Hilfe bei der Befreiung des polnischen Volkes bitten."
 POL_INT_polishlatvian_jointoperations:0 "Polnisch-lettische Gemeinschaftsoperationen"
 POL_INT_polishlatvian_jointoperations_desc:0 "Wir haben mit den Letten zusammengearbeitet, um die Sowjets zurückzudrängen. Wir müssen unsere Beziehungen zu den Letten durch gemeinsame Operationen stärken."
 POL_INT_kiev_offensive:0 "Kiewer Offensive"
 POL_INT_kiev_offensive_desc:0 "Die Kiewer Offensive ist ein Angriffsplan. Wir müssen diese Anstrengungen unternehmen, um die Sowjets endgültig zurückzudrängen und unser Territorium zurückzuerobern."
 POL_INT_offensive_efforts:0 "Offensive Bemühungen"
 POL_INT_offensive_efforts_desc:0 "Wir müssen uns auf den Angriff konzentrieren und die Sowjets mit einem starken Durchschlagsangriff schnell vertreiben"
 POL_INT_ask_the_united_states_for_supplies:0 "Bitten Sie die Vereinigten Staaten um Lieferungen"
 POL_INT_ask_the_united_states_for_supplies_desc:0 "Die Vereinigten Staaten werden uns bei unseren Kriegsanstrengungen helfen. Wir müssen sie um Hilfe und Unterstützung bitten."
 POL_INT_ask_france_for_logistical_support:0 "Bitten Sie Frankreich um logistische Unterstützung"
 POL_INT_ask_france_for_logistical_support_desc:0 "Wir müssen Frankreich bitten, uns einen Attaché zu schicken und unseren gut ausgebildeten Armeen zu helfen, noch besser zu werden"
 POL_INT_fortify_warsaw:0 "Befestigen Sie Warschau"
 POL_INT_fortify_warsaw_desc:0 "Wir müssen unsere Grenze befestigen, während die Sowjets näher kommen, und uns auf die Schlacht um Warschau vorbereiten."
 POL_INT_defensive_efforts:0 "Abwehrbemühungen"
 POL_INT_defensive_efforts_desc:0 "Wir stehen vor einer weitaus größeren Bedrohung, als wir uns vorgestellt haben. Wir müssen bereit sein, die Souveränität unserer Nation zu verteidigen."
 POL_INT_polish_nationalism:0 "Polnischer Nationalismus"
 POL_INT_polish_nationalism_desc:0 "Wir müssen Propaganda verbreiten und eine Rekrutierungskampagne starten. Wir müssen alle für Polen kämpfen lassen."
 POL_INT_propaganda_campagin:0 "Propagandakampagne"
 POL_INT_propaganda_campagin_desc:0 "Wir müssen unsere Verteidigung stark halten und eine Propagandakampagne starten, um noch mehr Rekrutierungen zu erhalten"
 POL_INT_finish_the_soviets:0 "Beende die Sowjets"
 POL_INT_finish_the_soviets_desc:0 "Wir sind bereits so weit gekommen, dass wir diesen Krieg beenden und den letzten Vorstoß unternehmen müssen, um die Sowjets zu besiegen."
 POL_INT_international_expeditionary_forces:0 "Internationale Expeditionstruppen"
 POL_INT_international_expeditionary_forces_desc:0 "Wir müssen die in anderen Ländern lebenden Polen dazu bringen, nach Hause zurückzukehren und weiterzukämpfen. Wir müssen diesen Krieg gewinnen und unsere Unabhängigkeit sichern."
 POL_INT_invest_money_into_big_business:0 "Investieren Sie Geld in große Unternehmen"
 POL_INT_invest_money_into_big_business_desc:0 "Wir werden Geld in große Unternehmen investieren, in der Hoffnung, dass die großen Unternehmen in kleinere Unternehmen investieren und so einen Trickle-down-Effekt erzeugen."
 POL_INT_sovietpolish_treaty:0 "Sowjetisch-polnischer Vertrag"
 POL_INT_sovietpolish_treaty_desc:0 "Wir werden den Sowjets bei ihrem Rückzug helfen und ihnen im Gegenzug unser Kerngebiet zurückgeben. Wenn sie dies akzeptieren, werden wir uns ihren Bemühungen im Krieg anschließen."
 POL_INT_send_the_soviets_our_demands:0 "Senden Sie den Sowjets unsere Forderungen"
 POL_INT_send_the_soviets_our_demands_desc:0 "Wir werden unser gesamtes Kerngebiet von den Sowjets zurückfordern. Dies kann zu einem Krieg führen, aber wir sind darauf vorbereitet. Wir werden für unsere Freiheit kämpfen."
 POL_INT_befreind_the_soviets:0 "Befreunde dich mit den Sowjets"
 POL_INT_befreind_the_soviets_desc:0 "Vielleicht können wir uns mit Russland versöhnen und es im Gegenzug für unsere Kerngebiete unterstützen."
 POL_INT_independence_day:0 "Unabhängigkeitstag"
 POL_INT_independence_day_desc:0 "Wir haben unsere Souveränität nach vielen Jahren deutscher und russischer Besatzung erlangt. Wir sollten den Verbündeten danken, dass sie dies möglich gemacht haben."
 POL_INT_test_the_soviets:0 "Testen Sie die Sowjets"
 POL_INT_test_the_soviets_desc:0 "Die Sowjets besetzen derzeit Gebiete, und in Russland tobt derzeit ein Bürgerkrieg. Vielleicht können wir einen Teil dieses Gebiets zurückgewinnen."
 POL_INT_issue_mobilization_laws:0 "Mobilisierungsgesetze erlassen"
 POL_INT_issue_mobilization_laws_desc:0 "Wir müssen auf einen totalen Krieg mit Russland vorbereitet sein. Wir müssen unsere Unzweckmäßigkeit möglicherweise durch brutale Kämpfe durchsetzen oder wir können dies mit friedlichen Mitteln tun, aber unser Hauptziel bleibt dasselbe: die endgültige Befreiung aller Polen."
 POL_INT_submit_to_the_soviets:0 "Unterwerfe dich den Sowjets"
 POL_INT_submit_to_the_soviets_desc:0 "Wir werden uns den Sowjets unterwerfen und ihnen mit allen notwendigen Mitteln helfen, unsere Unabhängigkeit zu sichern, im Austausch für die Rückgabe unseres Kerngebiets und unseren Schutz"
 POL_INT_maintain_our_independence:0 "Unsere Unabhängigkeit bewahren"
 POL_INT_maintain_our_independence_desc:0 "Vielleicht können wir den Sowjets etwas anderes anbieten, als uns ihnen direkt anzuschließen"
 POL_INT_secure_the_german_boarder:0 "Sichern Sie die deutsche Grenze"
 POL_INT_secure_the_german_boarder_desc:0 "Wir müssen unsere Grenze im Osten sichern, um sicherzustellen, dass es aufgrund unserer Parteinahme für die Sowjets nicht zu Feindseligkeiten zwischen uns und den Deutschen kommt."
 POL_INT_a_polish_victory:0 "Ein polnischer Sieg"
 POL_INT_a_polish_victory_desc:0 "Wir haben die Sowjets zurückgeschlagen und den Krieg gewonnen. Wir müssen herausfinden, was als nächstes mit unserem Land geschehen soll."
 POL_INT_soviet_polish_technology_sharing:0 "Austausch sowjetisch-polnischer Technologien"
 POL_INT_soviet_polish_technology_sharing_desc:0 "Wir müssen uns gegenseitig in der Technologie unterstützen, indem wir Schemata und Technologie miteinander teilen. Dadurch werden unsere beiden Nationen in der Lage sein, experimentell zu verbessern"
 POL_INT_a_everlasting_alliance:0 "Eine ewige Allianz"
 POL_INT_a_everlasting_alliance_desc:0 "Wir sollten unser Bündnis mit der Sowjetunion ausbauen und sicherstellen, dass wir uns gegenseitig vor jedem Angriffskonflikt schützen, der stattfindet."
 POL_INT_nie_ma_wolnoci_bez_solidarnoci:0 "Nie ma wolności bez Solidarności"
 POL_INT_nie_ma_wolnoci_bez_solidarnoci_desc:0 "Wir müssen für unsere Unabhängigkeit kämpfen. Wir werden eine Propagandakampagne starten und unsere Rekrutierungsbemühungen verstärken."
 POL_INT_soviet_volunteers:0 "Sowjetische Freiwillige"
 POL_INT_soviet_volunteers_desc:0 "Wir müssen Einheiten in die Sowjetunion schicken, ohne uns direkt in den Konflikt einzumischen. So können wir sie bei ihren Kriegsanstrengungen unterstützen, ohne selbst einen Krieg zu riskieren."
 POL_INT_reform_the_government:0 "Reform der Regierung"
 POL_INT_reform_the_government_desc:0 "Die Sowjets haben uns sehr geholfen, indem sie uns unser Kerngebiet zurückgegeben haben. Der Kommunismus ist jedoch eine gefürchtete Ideologie und ein kommunistischer Übergang könnte unsere Stabilität beeinträchtigen. Sollten wir uns mit den Sowjets verbünden und bei der Neubewertung helfen oder sollten wir demokratisch bleiben und in diesem Konflikt neutral bleiben?"
 POL_INT_appoint_communist_government_advisors:0 "Ernennung kommunistischer Regierungsberater"
 POL_INT_appoint_communist_government_advisors_desc:0 "Wir müssen kommunistische Gouverneure an unseren Hof berufen, um den Sowjets zu zeigen, dass wir bereit sind, ihnen nachzukommen und sie zu unterstützen."
 POL_INT_secure_our_boarder:0 "Sichern Sie unsere Grenze"
 POL_INT_secure_our_boarder_desc:0 "Wir müssen unsere Grenze zu den Sowjets sichern, denn wer auch immer diesen Bürgerkrieg gewinnt, läuft Gefahr, uns zu überfallen."
 POL_INT_rewrite_the_constitution:0 "Schreiben Sie die Verfassung neu"
 POL_INT_rewrite_the_constitution_desc:0 "Wir werden den Putsch voll ausnutzen und ihn nutzen, um unser Land nach unserem Ermessen umzugestalten."
 POL_INT_socialism_in_poland:0 "Sozialismus in Polen"
 POL_INT_socialism_in_poland_desc:0 "Mit dem erfolgreichen Putsch können wir nun die Pläne von Józef Piłsudski in die Tat umsetzen und die polnische Wirtschaft und das Land reformieren."
 POL_INT_polands_new_king:0 "Polens neuer König"
 POL_INT_polands_new_king_desc:0 "Wir müssen den neuen Führer Polens zum König machen und Polen zu einem konstitutionellen Monarchen reformieren"
 POL_INT_polands_new_dictator:0 "Polens neuer Diktator"
 POL_INT_polands_new_dictator_desc:0 "Wir brauchen einen einzigen wahren Herrscher in Polen, der mit eiserner Faust regiert. In Polen wird eine totale Diktatur errichtet."
 POL_INT_memorys_of_piast:0 "Erinnerungen an Piast"
 POL_INT_memorys_of_piast_desc:0 "Wir sollten die Piastendynastie zurückbringen und ihren führenden Thronfolger finden. Wir werden die polnische Dynastie und ihre Ländereien wiederherstellen, sei es mit Gewalt oder auf diplomatischem Wege."
 POL_INT_carve_out_our_empire:0 "Erschaffe unser Imperium"
 POL_INT_carve_out_our_empire_desc:0 "Wir werden unser polnisches Reich durch die Reform des Commonwealth erweitern! Wir werden unser einst zerrüttetes Reich reformieren und von unseren europäischen Nachbarn wieder als Großmacht angesehen werden."
 POL_INT_demand_upper_romania:0 "Nachfrage Oberrumänien"
 POL_INT_demand_upper_romania_desc:0 "Oberrumänien war historisch ein Teil des polnischen Reiches und wir sollten unser rechtmäßiges Land zurückgewinnen, das unter den Thron gehört."
 POL_INT_dig_down_on_the_russian_boarder:0 "Graben Sie an der russischen Grenze"
 POL_INT_dig_down_on_the_russian_boarder_desc:0 "Wir müssen uns vertiefen und uns auf einen Stellungskrieg mit Russland vorbereiten. Wir müssen vollständig vor der russischen Bedrohung geschützt sein."
 POL_INT_invade_ukraine:0 "Invasion der Ukraine"
 POL_INT_invade_ukraine_desc:0 "Nachdem Russland nun unseren Forderungen nachgekommen ist, müssen wir in die Ukraine einmarschieren und sie sichern, um sie zu einem Teil unseres Imperiums zu machen."
 POL_INT_promise_to_not_get_involved_in_any_more_wars:0 "Versprechen, sich nicht mehr in Kriege einzumischen"
 POL_INT_promise_to_not_get_involved_in_any_more_wars_desc:0 "Dies kann ein gefährlicher Schwerpunkt sein, denn wenn wir in den Krieg ziehen und die Bauern weiterhin protestieren, besteht ein größeres Risiko für einen Bauernaufstand, aber dies wird die Proteste für eine gewisse Zeit beruhigen."
 POL_INT_polish_socalism:0 "Polnischer Sozialismus"
 POL_INT_polish_socalism_desc:0 "Wir müssen in Polen eine sozialistische Wirtschaft einführen, um eine voll industrialisierte Nation zu werden."
 POL_INT_print_more_money:0 "Mehr Geld drucken"
 POL_INT_print_more_money_desc:0 "Mehr Geld in der Wirtschaft bedeutet mehr Kaufgelegenheiten. Wir werden Geld drucken und es in die polnische Wirtschaft pumpen, um das Land wieder auf Kurs zu bringen!"
 POL_INT_offer_loans_to_the_poor:0 "Bieten Sie den Armen Kredite an"
 POL_INT_offer_loans_to_the_poor_desc:0 "Vielleicht sollten wir den Armen Kredite geben, um ihnen zu helfen, wieder auf die Beine zu kommen. Sobald sie arbeiten, sollten sie in der Lage sein, die Kredite zurückzuzahlen, und die Revolten werden köcheln."
 POL_INT_put_down_the_peasents:0 "Besiegt die Bauern"
 POL_INT_put_down_the_peasents_desc:0 "Das wird nicht gut ankommen, aber wir müssen die Bauern niederschlagen und die Instabilität in Polen ein für alle Mal beenden, indem wir uns unter einer Königin und Monarchin vereinen."
 POL_INT_suppress_peoples_rights:0 "Unterdrückung der Rechte der Menschen"
 POL_INT_suppress_peoples_rights_desc:0 "Die Bauern sind uns seit Jahren ein Dorn im Auge. Wir müssen ihrer Dummheit ein Ende setzen und die Bauern ein für alle Mal besiegen."
 POL_INT_write_the_march_constitution:0 "Schreiben Sie die Märzverfassung"
 POL_INT_write_the_march_constitution_desc:0 "Wir haben unsere Grenzen und unsere Unabhängigkeit gesichert. Jetzt müssen wir unsere vorläufige Verfassung umschreiben, damit sie zu unserer dauerhaften Verfassung wird. Dies wird dazu beitragen, unserer Nation Legitimität zu verleihen."
 POL_INT_work_on_land_reform:0 "Arbeit an der Landreform"
 POL_INT_work_on_land_reform_desc:0 "Wir müssen daran arbeiten, Polens beschädigte und kaputte Infrastruktur zu reformieren und wiederherzustellen. Mit einer besseren Infrastruktur werden wir zu einer schnelleren und effizienteren Nation."
 POL_INT_deal_with_the_peasantry:0 "Umgang mit der Bauernschaft"
 POL_INT_deal_with_the_peasantry_desc:0 "Die Bauern sind derzeit verärgert und beschweren sich über ihre Verarmung. Sie üben derzeit Druck auf unsere Regierung aus, etwas dagegen zu unternehmen. Wenn wir nicht bald etwas unternehmen, droht uns ein Bauernaufstand!"
 POL_INT_industrialization:0 "Industrialisierung"
 POL_INT_industrialization_desc:0 "Polen ist derzeit verarmt und verliert in alarmierendem Ausmaß Geld. Wenn wir uns jetzt nicht um die Probleme kümmern, droht unserem Land eine schwere Krise!"
 POL_INT_roadrepair_programs:0 "Straßenreparaturprogramme"
 POL_INT_roadrepair_programs_desc:0 "Wir müssen mit unseren Straßenreparaturprogrammen beginnen, damit unsere Truppen schneller und besser vorrücken können. Unser Land ist von hohen Straßenschäden und mangelnder Urbanisierung geplagt. Wir müssen in die Straßen investieren."
 POL_INT_a_polish_socialist_state:0 "Ein polnischer sozialistischer Staat"
 POL_INT_a_polish_socialist_state_desc:0 "Wir werden ein sozialistischer Staat bleiben und unsere Bürger weiterhin unterdrücken. Wir werden den Sozialismus in unserem Land vollständig umsetzen und schließlich ein sozialistischer Staat werden."
 POL_INT_wealth_redistribution:0 "Umverteilung des Reichtums"
 POL_INT_wealth_redistribution_desc:0 "Wir müssen den Reichtum von den Reichen zu den Armen umverteilen, um den Armen zu helfen, aus den Fugen zu kommen. Sobald die Armen Geld haben, können sie es in Umlauf bringen, und wir werden in der Lage sein, mehr sozialistische Reformen umzusetzen."
 POL_INT_create_the_polish_workers_counsil:0 "Gründung des Polnischen Arbeiterrates"
 POL_INT_create_the_polish_workers_counsil_desc:0 "Der polnische Arbeiterrat wird eine große Verbesserung für unsere Nation sein. Wir werden die Arbeiter Polens alle unsere Entscheidungen für uns treffen lassen."
 POL_INT_dig_down_on_the_german_boarder:0 "Graben Sie an der deutschen Grenze"
 POL_INT_dig_down_on_the_german_boarder_desc:0 "Wir müssen uns tief eingraben und uns auf einen Stellungskrieg mit Russland vorbereiten. Wir müssen vollständig und gegen die russische Bedrohung verteidigt werden."
 POL_INT_build_up_on_the_german_boarder:0 "Aufbau an der deutschen Grenze"
 POL_INT_build_up_on_the_german_boarder_desc:0 "Wir müssen Festungen in der Nähe der deutschen Grenze aufbauen und vorbereiten, und nur dann sind wir besser vorbereitet, die Deutschen abzuwehren"
 POL_INT_ZOaBreVw:0 "Graben Sie an der deutschen Grenze"
 POL_INT_ZOaBreVw_desc:0 ""
 POL_INT_secure_the_nimen_river_line:0 "Sicherung der Njemen-Flusslinie"
 POL_INT_secure_the_nimen_river_line_desc:0 ""
 POL_INT_secure_upper_prussia:0 "Sichern Sie die oberpreußische Linie"
 POL_INT_secure_upper_prussia_desc:0 ""
 POL_INT_defensive_measures_against_germany:0 "Abwehrmaßnahmen gegen Deutschland"
 POL_INT_defensive_measures_against_germany_desc:0 "Wir müssen im Falle einer Invasion der Deutschen Verteidigungsmaßnahmen ergreifen. Sollten wir jemals mit Deutschland im Krieg sein, können wir diese Maßnahmen jederzeit aktivieren und einen kleinen Verteidigungsbonus erhalten."
 POL_INT_address_mass_migration__to_poland:0 "Umgang mit der Massenmigration nach Polen"
 POL_INT_address_mass_migration__to_poland_desc:0 "Polen empfängt derzeit eine große Zahl von Einwanderern, die in unser neues Land kommen. Dadurch verschärft sich die Klassentrennung noch weiter, da viele Polen nach dem Krieg in ihre Heimat zurückkehren. Wir müssen diese Krise angehen, bevor sie außer Kontrolle gerät."
 POL_INT_discourage_outsourcing_workers_for_companies:0 "Unternehmen sollten davon abhalten, Arbeitskräfte aus dem Ausland zu beziehen."
 POL_INT_discourage_outsourcing_workers_for_companies_desc:0 "Wir werden Unternehmen davon abhalten, ihre Arbeitskräfte in andere Länder auszulagern und Unternehmen Vorteile verschaffen, wenn sie in Polen bleiben."
 POL_INT_draw_back_migration_laws:0 "Migrationsgesetze zurückziehen"
 POL_INT_draw_back_migration_laws_desc:0 "Polen ist ein Land der Migranten. Um unsere Unterstützung für sie zu zeigen, müssen wir unsere Einwanderungsgesetze zurücknehmen."
 POL_INT_encourage_migrant_workers:0 "Ermutigen Sie Wanderarbeiter"
 POL_INT_encourage_migrant_workers_desc:0 "Wir müssen die Migranten in Polen dazu ermutigen, Fachkräfte zu werden. Da wir ein Land der Migranten sind, sollten wir unsere Situation voll ausnutzen."
 POL_INT_curtail_migration_to_poland:0 "Eindämmung der Migration nach Polen"
 POL_INT_curtail_migration_to_poland_desc:0 "Wir müssen die gesamte Migration nach Polen einschränken, um die Menschen davon abzuhalten, nach Polen zu migrieren."
 POL_INT_offer_free_schooling_to_migrants:0 "Migranten kostenlose Schulbildung anbieten"
 POL_INT_offer_free_schooling_to_migrants_desc:0 "Wir werden den Migranten in Polen eine kostenlose Schulbildung anbieten, in der Hoffnung, dass ihnen die Ausbildung zu einem besseren Arbeitsplatz und einer besseren Zukunft verhelfen wird."
 POL_INT_create_a_immigration_enforcement_program:0 "Erstellen Sie ein Programm zur Durchsetzung der Einwanderungsbestimmungen"
 POL_INT_create_a_immigration_enforcement_program_desc:0 "Wir brauchen ein Einwanderungs-Kontrollprogramm, um die Einwanderung in unser Land zu stoppen. Da polnische Einwanderer polnische Arbeitsplätze besetzen, brauchen wir polnische Menschen, um polnische Arbeitsplätze zu schaffen."
 POL_INT_increase_the_navy_budget:0 "Erhöhen Sie das Marinebudget"
 POL_INT_increase_the_navy_budget_desc:0 "Wir müssen das Budget unserer Marine erhöhen und eine große Marine aufbauen!"
 POL_INT_create_the_polish_navy:0 "Erstellen Sie die polnische Marine"
 POL_INT_create_the_polish_navy_desc:0 "Wir müssen eine polnische Marine schaffen und formalisieren, um unsere Nation von den Küsten und Meeren des Balletts zu betäuben"
 POL_INT_the_economic_situation:0 "Die wirtschaftliche Lage"
 POL_INT_the_economic_situation_desc:0 "Nach vielen Jahren der Besatzung erlangen wir endlich unsere Unabhängigkeit, doch unsere Wirtschaft liegt in Trümmern. Wir müssen den polnischen Markt vor ausländischen Konkurrenten schützen und bei dem gestiegenen Finanzbedarf helfen."
 POL_INT_settle_terms_with__czechoslovakia:0 "Vereinbarungen mit der Tschechoslowakei"
 POL_INT_settle_terms_with__czechoslovakia_desc:0 "Die Tschechoslowakei ist ein tragfähiger Handelspartner für die nahe Zukunft, wir müssen mit ihnen Bedingungen vereinbaren"
 POL_INT_settle_trade_terms_with_france:0 "Handelsbedingungen mit Frankreich festlegen"
 POL_INT_settle_trade_terms_with_france_desc:0 "Wir müssen die Handelsbedingungen mit Frankreich vereinbaren, da dieses Land unser Abkommen am ehesten akzeptieren wird."
 POL_INT_settle_terms_with_hungary:0 "Vereinbarung mit Ungarn"
 POL_INT_settle_terms_with_hungary_desc:0 "Ungarn ist einer unserer großen Nachbarn, wir müssen Wirtschaftsverträge mit ihnen abschließen"
 POL_INT_settle_terms_with_greece:0 "Vereinbarung mit Griechenland"
 POL_INT_settle_terms_with_greece_desc:0 "Wir müssen die Handelsbedingungen mit Griechenland vereinbaren. Sobald wir die Handelsbedingungen vereinbart haben, können wir beide von diesem Abkommen profitieren."
 POL_INT_expand_our_military:0 "Erweitern Sie unser Militär"
 POL_INT_expand_our_military_desc:0 "Wir müssen unsere militärischen Fähigkeiten stärken und auf jeden Konflikt vorbereitet sein!"
 POL_INT_stabilize_the_nation:0 "Stabilisieren Sie die Nation"
 POL_INT_stabilize_the_nation_desc:0 "Wir müssen die Nation stabilisieren und Polen zu seinem früheren Glanz zurückführen!"
 POL_INT_revive_the_polish_state:0 "Den polnischen Staat wiederbeleben"
 POL_INT_revive_the_polish_state_desc:0 "Wir müssen unser polnisches Land wiederherstellen und an der vollständigen Industrialisierung Polens arbeiten. Dazu müssen wir wirtschaftliche Maßnahmen in Gesetze umsetzen und die polnische Wirtschaft modernisieren."
 POL_INT_german__polish_trade_agreement:0 "Deutsch-Polnisches Handelsabkommen"
 POL_INT_german__polish_trade_agreement_desc:0 "Wir müssen ein Handelsabkommen mit unserem Nachbarn Deutschland abschließen. Wenn dies gut ankommt, können wir im Handel mit Deutschland florieren. Wenn es scheitert, wird unser Handel mit Deutschland für immer ruiniert sein."
 POL_INT_do_political_favors:0 "Tun Sie politische Gefälligkeiten"
 POL_INT_do_political_favors_desc:0 "Wir müssen politische Gefälligkeiten im Austausch für politische Macht verteilen. Dies wird unsere Stabilität verringern, aber unsere politische Macht um ein Vielfaches erhöhen."
 POL_INT_the_fate_of_danzig:0 "Das Schicksal Danzigs"
 POL_INT_the_fate_of_danzig_desc:0 "Wir müssen über das Schicksal Danzigs entscheiden, da es durch den Vertrag von Versailles geschaffen wurde und in den kommenden Jahren zu Spannungen führen könnte."
 POL_INT_obey_the_treaty:0 "Befolgen Sie den Vertrag"
 POL_INT_obey_the_treaty_desc:0 "Wir müssen den Vertrag von Versailles einhalten, um gute Beziehungen zum Rest Europas aufrechtzuerhalten. Wir können einen Weg finden, es friedlich einzugliedern oder das Territorium zurückzugeben."
 POL_INT_return_danzig_to_germany:0 "Rückgabe Danzigs an Deutschland"
 POL_INT_return_danzig_to_germany_desc:0 "Da wir mit dem Beginn des Krieges eine mehrheitlich deutsche Bevölkerung haben, müssen wir unsere Vergangenheit vergessen und das Gebiet an Deutschland zurückgeben."
 POL_INT_german_polish_friendship_pact:0 "Deutsch-polnischer Freundschaftspakt"
 POL_INT_german_polish_friendship_pact_desc:0 "Wir sollten unsere Beziehungen zu den Deutschen weiter ausbauen und uns in Kriegszeiten gegenseitig Hilfe anbieten"
 POL_INT_cut_off_trade_to_danzig:0 "Handelsverbot für Danzig"
 POL_INT_cut_off_trade_to_danzig_desc:0 "Wir müssen den Handel mit der Außenwelt abschneiden, während wir unsere Invasion in Danzig vorbereiten."

 
 
 ###WW2Focuses
 POL_silesia_for_klaipeda:0 "Ribbentrop-Beck-Pakt"
 POL_silesia_for_klaipeda_desc:0 "Das Dritte Reich ist bereit, unsere Westgrenzen anzuerkennen, wenn im Gegenzug Danzig in das Reich eingegliedert wird und die Außenstraße durch unser Gebiet verläuft."
 POL_aneksja_litwy:0 "Druck auf Litauen"
 POL_aneksja_litwy_desc:0 "Seit Anfang der 1920er Jahre sind die polnisch-litauischen Beziehungen sehr angespannt. Das muss ein Ende haben. Polen wird Litauen ein Ultimatum stellen, die polnische Kontrolle über das Land zu übernehmen."
 POL_nadbaltycki_protekcjonizm:0 "Baltischer Protektionismus"
 POL_nadbaltycki_protekcjonizm_desc:0 "Polen sollte die Kontrolle über die baltischen Staaten übernehmen. Man kann nicht zulassen, dass diese Länder in die sowjetische Einflusssphäre geraten. Auf diese Weise können wir unsere Nordflanke sichern und uns auf die Konfrontation mit den Sowjets vorbereiten."
 POL_wielka_polska:0 "Operation „Hetman“"
 POL_wielka_polska_desc:0 "Der Beitritt zur Achse und eine mächtige polnisch-deutsche bewaffnete Operation gegen die UdSSR sind die einzige Garantie für die Sicherheit Polens und unsere Chance, Osteuropa vom russischen Einfluss zu befreien."
 POL_polish_oil:0 "Lukasiewicz-Ölquellen"
 POL_polish_oil_desc:0 "In Fortsetzung der Arbeit des polnischen Chemikers, Pharmazeuten und Unternehmers Ignacy Łukasiewicz wird Polen erneut nach dem Öl in der Nähe von Nowy Sacz greifen."
 POL_develop_kresy:0 "Kresy entwickeln"
 POL_develop_kresy_desc:0 "Seit Beginn der Zweiten Polnischen Republik galten die östlichen Gebiete Polens – Kresy – als die am schlechtesten entwickelte Region des Landes. Es ist Zeit, das zu ändern."
 POL_polish_stalinism:0 "Polnischer Stalinismus"
 POL_polish_stalinism_desc:0 "Boleslaw Bierut übernimmt die Macht und beginnt, den sowjetischen Stalinismus zu übernehmen"
 POL_polish_socialism:0 "Polnischer Sozialismus"
 POL_polish_socialism_desc:0 "Wladyslaw Gomulka stärkt seine Regierung und entwickelt den Sozialismus im Inland."
 POL_pact_beck-molotow:0 "Pakt mit der UdSSR"
 POL_pact_beck-molotow_desc:0 "Ein Versuch, einen Pakt zwischen der UdSSR und der Volksrepublik China zu schließen, um die Deutschen zu besiegen und ihr Land aufzuteilen."
 POL_socialist_science:0 "Polnisch-sowjetischer Technologievertrag"
 POL_socialist_science_desc:0 "Der Technologieaustausch zwischen kommunistischen Ländern ist für die bevorstehende Weltrevolution von entscheidender Bedeutung."
 POL_peoples_army:0 "Polnische Volksarmee"
 POL_peoples_army_desc:0 "Es ist Zeit, eine starke Volksarmee aufzustellen, die bereit ist, der unterdrückten Arbeiterklasse die Befreiung zu bringen."
 POL_commonwelth_reborn:0 "Polnisch-Litauisch-Ruthenisches Commonwealth"
 POL_commonwelth_reborn_desc:0 "Es ist an der Zeit, das Konzept der polnisch-litauisch-ruthenischen Union mit Leben zu erfüllen. (Marionettenstaaten und kooperative Regierungen werden in die Grenzen der Union integriert.)"
 POL_pol_lit_union:0 "Polnisch-Litauische Union"
 POL_pol_lit_union_desc:0 "Polen wird Litauen die Wiederherstellung des polnisch-litauischen Commonwealth vorschlagen."
 POL_treaty_with_romania:0 "Polnisch-rumänische Zusammenarbeit"
 POL_treaty_with_romania_desc:0 "Seit dem Ersten Weltkrieg war Rumänien Polens freundlichster Nachbar. Unser Verteidigungspakt gegen die UdSSR ist eine hervorragende Grundlage für weitere Zusammenarbeit! ... Aber können wir den Roten Bären auch gemeinsam aufhalten?"
 POL_treaty_with_finland:0 "Nordpakt"
 POL_treaty_with_finland_desc:0 "Finnland kann ein starker Verbündeter gegen die UdSSR sein. Wir sollten unsere Zusammenarbeit mit dieser tapferen Nation vertiefen."
 POL_treaty_with_yugoslavia:0 "Gipfeltreffen in Zagreb"
 POL_treaty_with_yugoslavia_desc:0 "Die Mitgliedschaft Jugoslawiens in unserer Fraktion wird es uns ermöglichen, Einfluss im Mittelmeerraum zu gewinnen und uns vor einem möglichen Angriff aus dem Westen zu schützen."
 POL_treaty_with_hungary:0 "Polnisch-ungarische Freundschaft"
 POL_treaty_with_hungary_desc:0 "Auch wenn uns die Ansichten über die Nation und das Land trennen, bleiben die Ungarn Freunde der Polen. Vielleicht gelingt es uns, sie von unseren Überzeugungen zu überzeugen, auch wenn es lange dauert."
 POL_cult_of_the_marshal:0 "Der Kult des Marschalls"
 POL_cult_of_the_marshal_desc:0 "Marschall Piłsudski ist ein Symbol der Einheit der polnischen Nation. Auch nach seinem Tod weckt er in den Herzen der Jugend immer noch den brennenden Wunsch zu kämpfen!"
 POL_treaty_with_japan:0 "Vertrag mit Japan"
 POL_treaty_with_japan_desc:0 "Polen und Japan pflegen seit dem Ersten Weltkrieg positive diplomatische Beziehungen. Beide Länder haben einen gemeinsamen Feind: die UdSSR. Ein bilateraler Vertrag, der im Kriegsfall gegenseitige Hilfe garantiert, ist daher sinnvoll."
 POL_join_allies:0 "Schließen Sie sich Verbündeten an"
 POL_join_allies_desc:0 "Es ist Zeit für den formellen Beitritt Polens zu den Alliierten."
 POL_keep_neutral:0 "Bleiben Sie neutral"
 POL_keep_neutral_desc:0 "Wir sollten die Politik der Neutralität in den internationalen Beziehungen fortsetzen und uns auf die Abschreckung möglicher Aggressoren konzentrieren."
 POL_fortify_wisla:0 "Weichselbefestigungen"
 POL_fortify_wisla_desc:0 "Unsere Generäle sind der Meinung, dass wir die Weichsel befestigen und im Falle eines bewaffneten Konflikts unsere Verteidigungsbemühungen dort konzentrieren sollten. Dieser Vorschlag ist eine Überlegung wert, wenn man bedenkt, dass es sich negativ auf die Stimmung der polnischen Bevölkerung auswirken wird, wenn die Hälfte des Landes sich selbst überlassen wird."
 POL_buy_madagascar:0 "Madagaskar kaufen"
 POL_buy_madagascar_desc:0 "Die prokolonialistische Stimmung in Polen erreicht ihren Höhepunkt. Da Polen nun offiziell den Alliierten beigetreten ist, könnte es sich lohnen, Frankreich den Kauf Madagaskars anzubieten."
 POL_liberalism:0 "Wiederherstellung der Märzverfassung"
 POL_liberalism_desc:0 "Die Änderung der Märzverfassung erfolgte nicht durch demokratische Umgestaltungen, sondern durch einen Putsch. Die Wiederherstellung dieser Verfassung ist der erste Schritt auf dem Weg zur Wiederherstellung der Würde des Staates im In- und Ausland." 
 POL_rebuild_eastern_lands:0 "Wiederaufbau des Ostens"
 POL_rebuild_eastern_lands_desc:0 "Der Krieg hat unsere neuen Länder in Trümmern hinterlassen. Zeit für den Wiederaufbau"
 POL_reorganize_belarus:0 "Aufbau der belarussischen Verwaltung"
 POL_reorganize_belarus_desc:0 "Wenn wir die Gebiete von Belarus vollständig in die Rzeczypospolita eingliedern wollen, müssen wir die Verwaltung in allen von Belarussen bewohnten Gebieten wieder aufbauen."
 POL_reorganize_ukraine:0 "Aufbau der ukrainischen Verwaltung"
 POL_reorganize_ukraine_desc:0 "Wenn wir die Gebiete der Ukraine vollständig in die Rzeczypospolita eingliedern wollen, müssen wir die Verwaltung in allen von Ukrainern bewohnten Gebieten wieder aufbauen."
 POL_integrate_eastern_lands:0 "Östliche Länder integrieren"
 POL_integrate_eastern_lands_desc:0 "Sobald wir unsere neuen Gebiete ausreichend entwickelt haben, können wir sie vollständig in unsere Domäne integrieren!"
 POL_belarusian_industry:0 "Belarussische Industrie"
 POL_belarusian_industry_desc:0 "Die Industrie ist die Grundlage eines starken Staates. Um die Belarussen von unseren Absichten zu überzeugen, müssen wir ihnen die Stärke der polnischen Industrie zeigen."
 POL_ukrainian_industry:0 "Ukrainische Industrie"
 POL_ukrainian_industry_desc:0 "Die Industrie ist die Grundlage eines starken Staates. Wenn wir die Ukrainer von unseren Absichten überzeugen wollen, müssen wir ihnen die Stärke der polnischen Industrie zeigen."
 POL_develop_belarus:0 "Entwicklung von Belarus"
 POL_develop_belarus_desc:0 "Um die belarussischen Länder richtig zu integrieren, müssen wir die postsowjetische Infrastruktur an polnische Standards anpassen"
 POL_develop_ukraine:0 "Entwicklung der Ukraine"
 POL_develop_ukraine_desc:0 "Um die Gebiete der Ukraine richtig zu integrieren, müssen wir die postsowjetische Infrastruktur an polnische Standards anpassen"
 
 ###Ideas 
 
 POL_between_two_powers:0 "Zwischen zwei Mächten"
 POL_between_two_powers_desc:0 "Polen verfolgt in den Beziehungen an der Linie Berlin-Moskau eine Politik der Neutralität und wird keine Seite bevorzugen."
 POL_between_two_powers_2:0 "Zwischen zwei Mächten"
 POL_between_two_powers_2_desc:0 "Polen verfolgt in den Beziehungen an der Linie Berlin-Moskau eine Politik der Neutralität und wird keine Seite bevorzugen."
 POL_the_cult_of_the_marshal:0 "Der Kult um Marschall Pilsudski"
 POL_the_cult_of_the_marshal_desc:0 "Marschall Piłsudski ist ein Symbol der Einheit der polnischen Nation. Selbst nach seinem Tod weckt er in den Herzen der Jugend immer noch den brennenden Wunsch zu kämpfen!"
 POL_industry_progression:0 "Branchenentwicklung"
 POL_industry_progression_desc:0 ""
 POL_great_depression:0 "Wielki Kryzys"
 POL_great_depression_desc:0 "Die Große Depression in Polen erwies sich als viel tiefer und länger als in anderen Ländern. Obwohl einige ihrer Auswirkungen bereits erfolgreich überwunden wurden, brauchen wir weiterhin ein umfassendes Wirtschaftsprogramm, das es uns ermöglicht, die Krise endgültig zu beenden."
 POL_commonwetlh_is_back:0 "Erneuerung des Commonwealth"
 POL_commonwetlh_is_back_desc:0 "Nationen vereint unter der Schirmherrschaft des Commonwealth!"
 POL_social_discontent:0 "Soziale Unzufriedenheit"
 POL_social_discontent_desc:0 "Der Bevölkerung unseres Landes gefallen unsere Entscheidungen nicht."
 POL_social_discontent_2:0 "Soziale Unzufriedenheit"
 POL_social_discontent_2_desc:0 "Der Bevölkerung unseres Landes gefallen unsere Entscheidungen nicht."
 intermarial_influance:0 "Einfluss von Intermarium"
 intermarial_influance_desc:0 "Durch die Zusammenarbeit mit Intermarium und Polen konnte die Macht bestimmter, bislang irrelevanter Gruppen gestärkt werden."
 POL_olgierd_szpakowski:0 "Olgierd Szpakowski"
 POL_soviet_influence:0 "Sowjetische Stützpunkte in Polen"
 POL_SOV_research_group_name:0 "Polnisch-Sowjetische Forschungsgruppe"
 POL_SOV_research_group_desc:0 "Kürzere Forschungszeit für Technologien, die von der Sowjetunion und Polen entwickelt wurden"
 POL_cult_of_bierut:0 "Kult von Bierut"
 POL_peoples_army_idea:0 "Polnische Volksarmee"
 POL_GER_border_issues:0 "Polnisch-deutscher Grenzstreit"
 POL_GER_border_issues_desc:0 "Die Gestaltung der polnischen Westgrenze erfolgte in der Atmosphäre der Nachkriegswirren infolge von Aufständen, Volksabstimmungen und den Bestimmungen des Versailler Vertrags. Ihr endgültiges Aussehen stellt keine der Parteien zufrieden und stellt einen ständigen Brennpunkt in den Beziehungen zwischen Polen und dem Dritten Reich dar."
 POL_hate_bolshevism:0 "Nachwirkungen des Polnisch-Bolschewistischen Krieges"
 POL_hate_bolshevism_desc:0 "1920 gelang es uns, die Bolschewiken bei Warschau zu besiegen, den Krieg zu gewinnen und für die Unabhängigkeit zu kämpfen. Die Auswirkungen dieses Konflikts sind in Polen bis heute spürbar und die Sowjets sind hier eher nicht willkommen."
 POL_death_of_dmowski:0 "Tod von Dmowski"
 POL_death_of_dmowski:0 "Der Tod unseres Führers Roman Dmowski hatte große Auswirkungen auf unser Land. Viele meinen, wir sollten unsere Position in der Welt jetzt überdenken."
 fragile_coalition:0 "Fragile Koalition"
 fragile_coalition_desc:0 "Unser Land wird von einer Koalition ehemaliger politischer Gegner regiert. Dieses Bündnis wird nicht ewig halten, aber es wird Stabilität im Staat ermöglichen."
 soft_occupation:0 "Politik der sanften Besetzung"
 harsh_occupation:0 "Harte Besatzungspolitik"
 unexpected_attack:0 "Unerwarteter Angriff"
 unexpected_attack_desc:0 "Wir wurden unerwartet angegriffen und unsere Truppen zerfielen!"
 SOV_armistice:0 "Waffenstillstand"
 SOV_armistice_desc:0 "Der Krieg ist verloren. Friedensgespräche sind im Gange"
 POL_eastern_revitalization:0 "Revitalisierung des Ostens"
 POL_eastern_revitalization_desc:0 "Unsere neuen Länder im Osten haben durch den Krieg erhebliche Schäden erlitten. Zeit, mit dem Wiederaufbau fortzufahren"
 
