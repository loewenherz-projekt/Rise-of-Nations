 ###Decisions
 
 POL_edward_takes_comand:0 "Ernennung des Oberbefehlshabers Polens"
 POL_edward_takes_comand_desc:0 "Der Krieg steht vor der Tür! Wir werden Edward Śmigły-Rydz zum Oberbefehlshaber Polens ernennen. Er wird uns zum Sieg führen!"
 POL_ask_GER_for_equipment:0 "Infanterieausrüstung aus Deutschland anfordern "
 POL_ask_GER_for_equipment_desc:0 ""
 POL_GER_allience_increase_tt:0 "„Das stärkt das polnisch-deutsche Bündnis!“"
 POL_GER_allience_major_increase_tt:0 "„Dadurch wird das polnisch-deutsche Bündnis deutlich gestärkt.“"
 POL_GER_allience_decrease_tt:0 "§RDies wird sich negativ auf das polnisch-deutsche Bündnis auswirken§!"
 POL_GER_allience_major_decrease_tt:0 "„Dies wird schwerwiegende negative Auswirkungen auf das polnisch-deutsche Bündnis haben.“"
 POL_ukrainian_volonteers:0 "Gründung der ukrainischen Freiwilligenarmee"
 POL_ukrainian_volonteers_desc:0 "Die Ukrainer wollen Rache für die von Stalin verursachte Hungersnot. Wir können sie bewaffnen und an die Front schicken. Dieser Schritt wird unseren Verbündeten jedoch nicht gefallen, da er glaubt, dass ukrainische Truppen uns verraten werden."
 POL_russian_volonteers:0 "Gründung der Russischen Befreiungsarmee"
 POL_russian_volonteers_desc:0 "Die Russen brennen darauf, das verhasste kommunistische Regime zu bekämpfen. Wir können sie bewaffnen und an die Front schicken. Dieser Schritt wird unserem Verbündeten jedoch nicht gefallen, da er die Russen als unzuverlässig und bedrohlich betrachtet."
 POL_exit_alliance:0 "Verlasse die Fraktion friedlich"
 POL_exit_alliance_desc:0 "In Polen und Deutschland herrscht Frieden. Polen kann die Achsenmächte verlassen. Die Beziehungen werden auf dem Niveau vor dem Bündnisbeitritt wiederhergestellt."
 POL_rename_cities:0 "Städte umbenennen"
 POL_rename_cities_desc:0 "Der Sieg ist unser! In den von Deutschland erworbenen Gebieten werden wir polnische Namen einführen!"
 POL_baltic_influence:0 "[From.GetName] wiederherstellen"
 POL_baltic_influence_desc:0 "Wir haben die Länder von [From.GetName] befreit. Wir können dieses Land mit der uns treuen Regierung wiederherstellen"
 GER_puppet_pol:0 "Übernehmen Sie die Kontrolle über die polnische Politik"
 GER_puppet_pol_desc:0 "Unsere Dominanz über Polen ist so groß wie eh und je. Wir können diese Situation ausnutzen und uns die Loyalität dieses Verbündeten mit einer gewissen, uns wohlgesinnten Marionettenregierung sichern."
 GER_attack_pol:0 "Angriff auf Polen"
 GER_attack_pol_desc:0 "Das polnische Vorgehen ist inakzeptabel! Unsere Forderungen werden abgelehnt und Entscheidungen ignoriert. Dieses Bündnis hat keine Zukunft. Wir müssen es hier und jetzt beenden. Der Angriff auf Polen ist die einzige Lösung."
 POL_GER_allience_decisions:0 "Polnisch-Deutsches Bündnis"
 POL_GER_allience_decisions_desc:0 "Polen und Deutschland sind trotz ihrer Verbündeten sehr unterschiedlich. Ehemalige Feindseligkeiten sind noch immer vorhanden, und ehemalige preußische Generäle sprechen noch immer von Polen als überlegen. Um dieses Bündnis aufrechtzuerhalten, muss Polen kluge Entscheidungen treffen.\nBeziehungsebene: [?global.POL_GER_relation|0H]\n[GetPolishGermanRelationLevel]"
 POL_change_side_mission:0 "Parteien ändern"
 POL_change_side_mission_desc:0 "Der Vertrag von Lissabon tritt in Kraft. Vorbereitungen für einen unerwarteten Angriff auf das Dritte Reich laufen."
 ENG_POL_propose_the_deal:0 "Schlagen Sie Polen vor, die Seite zu wechseln"
 ENG_POL_propose_the_deal_desc:0 "Die UdSSR geriet unter die Macht der polnisch-deutschen Kriegsmaschinerie. In dieser Situation besteht die einzige Chance, eine zusätzliche Front in Osteuropa zu eröffnen, darin, den stärksten europäischen, unabhängigen Verbündeten Deutschlands – Polen – zum Seitenwechsel zu bewegen."
 POL_operation_vistula:0 "Operation Weichsel"
 POL_operation_vistula_desc:0 "Ukrainische Nationalisten stellen eine ernsthafte Bedrohung für die Stabilität unseres Landes dar. Wir müssen dieses Problem lösen, indem wir die ukrainische Minderheit im ganzen Land neu verteilen."
 POL_uprising_threat_mission:0 "Behandlung des ukrainischen Aufstands"
 POL_uprising_threat_mission_desc:0 "Die Lage in der Ukraine spitzt sich immer mehr zu. Wenn wir nicht schnell etwas unternehmen, droht ein Aufstand!"
 UKR_end_uprising:0 "Beende den Aufstand"
 UKR_end_uprising_desc:0 "Wir können nicht gewinnen. Wir werden den Aufstand jetzt beenden"
 POL_wladyslaw_sikorski_speech:0 "Władysław Sikorski hält eine Rede an die Nation"
 POL_wladyslaw_sikorski_speech_desc:0 "Das Chaos, das nach dem Tod von Roman Dmowski, dem Vorsitzenden der Regierungskoalition, entstand, muss ein Ende haben. Wir sollten uns wieder vereinen und unter der Führung von Sanacja gemeinsam in die Zukunft blicken!"
 POL_boleslaw_piasecki_speech:0 "Bolesław Piasecki mobilisiert die Nation"
 POL_boleslaw_piasecki_speech_desc:0 "Die herrschende Klasse hat einmal mehr ihre Inkompetenz bewiesen. Sie ist erbärmlich und schwach! Chaos und Destabilisierung müssen ein Ende haben. In Polen muss Ordnung herrschen! Nur die ONR-Führung kann dies garantieren!"
 POL_lit_border_conflict:0 "Auslöser des polnisch-litauischen Grenzkonflikts"
 POL_lit_border_conflict_cancel:0 "Truppen an der Grenze stoppen"
 POL_GER_attack_SOV:0 "Angriff auf die UdSSR"
 POL_GER_attack_SOV_desc:0 "Die Vorbereitungen für die Operation „Hetman“ sind abgeschlossen. Es ist Zeit, den Angriffsbefehl zu erteilen!"
 POL_build_extraterritorial_road:0 "Bau einer extraterritorialen Autobahn"
 POL_build_extraterritorial_road_desc:0 "Um die Beziehungen zu Deutschland zu verbessern, können wir die deutsche Forderung nach einer extraterritorialen Route durch Polen nach Ostpreußen verwirklichen. Dieses Projekt stößt in der polnischen Gesellschaft jedoch auf wenig Gegenliebe."
 POL_build_extraterritorial_road_tt:0 "„Solange die Autobahn existiert, kann Deutschland Truppen durch unser Gebiet bewegen.“"
 POL_destroy_extraterritorial_road:0 "Abriss der extraterritorialen Autobahn"
 POL_destroy_extraterritorial_road_desc:0 "Wenn wir die Kontrolle über unsere Grenzen zurückgewinnen und Deutschland daran hindern wollen, Truppen durch unser Land zu verlegen, müssen wir die extraterritoriale Straße ein für alle Mal schließen."
 POL_destroy_extraterritorial_road_tt:0 "Die extraterritoriale Autobahn wird abgerissen. Deutschland wird nicht mehr in der Lage sein, Truppen über unsere Grenzen zu bewegen"
 POL_four_year_plan:0 "Vierjahresplan"
 POL_four_year_plan_desc:0 "Der Vierjahresplan wurde von Eugeniusz Kwiatkowski, stellvertretender Ministerpräsident und Finanzminister, erstellt. Der Plan, der am 1. Juli 1936 in Kraft trat, sah den Ausbau der Infrastruktur, die Stärkung der Verteidigungsfähigkeit Polens, die Schaffung der Grundlagen für die künftige Expansion der polnischen Industrie und die Aktivierung des Altpolnischen Industriegebiets vor. Die polnische Regierung geht davon aus, dass der Plan bis zum 30. Juni 1940 abgeschlossen sein wird. Sein wichtigstes Element ist die Schaffung des Zentralen Industriegebiets."
 POL_four_year_plan_mission:0 "Der Vierjahresplan"
 POL_four_year_plan_mission_desc:0 "Planung allein wird keine starke Wirtschaft aufbauen. Wir müssen gemeinsam handeln und einen starken polnischen Staat aufbauen. Der Vierjahresplan muss rechtzeitig abgeschlossen werden, sonst wird er zum Treibstoff für die Opposition."
 POL_foreign_investors:0 "Laden Sie ausländische Investoren ein"
 POL_foreign_investors_desc:0 "Die Unterstützung ausländischer Investoren wird uns sicherlich bei der Umsetzung des Vierjahresplans helfen."
 POL_local_investors:0 "Unterstützen Sie lokale Investoren"
 POL_local_investors_desc:0 "Unsere polnische Hauptstadt ist der wichtigste Faktor beim Aufbau eines starken Staates."
 POL_build_huta_stalowa_wola:0 "Build Huta Stalowa Wola"
 POL_build_huta_stalowa_wola_desc:0 "Das Stahlwerk Stalowa Wola ist eines der wichtigsten Werke im Plan der Zentralen Industrieregion, dessen Urheber und Schöpfer der stellvertretende Ministerpräsident für Wirtschaftsfragen, Ingenieur Eugeniusz Kwiatkowski, ist."
 POL_build_sytntetic_gum_factory:0 "Bauen Sie eine „Stomil“-Gummifabrik"
 POL_build_sytntetic_gum_factory_desc:0 "Das Design der „Stomil“-Anlage wurde von Spezialisten aus den USA und Polen entwickelt, und die Technologie zur Herstellung von synthetischem Kautschuk ist eine Schweizer Lizenz"
 POL_kielce_armaments_industry:0 "Ausbau der Kielcer Rüstungsindustrie"
 POL_kielce_armaments_industry_desc:0 "Zu den neuen Investitionen gehörten unter anderem die Modernisierung des Bergbauwerks Starachowice, das auf die Herstellung von Flugabwehrkanonen spezialisiert ist, der Munitionsfabrik und der Aktivkohlefabrik in Skarżysko, des Werks Ostrowiec und der Fabrik „Granat“ in Kielce."
 POL_build_truck_factory:0 "Bau einer LKW-Fabrik"
 POL_build_truck_factory_desc:0 "Bau der Produktionshalle des Warschauer Unternehmens Lilpop, Rau und Loewenstein, das in Lublin Komponenten für Personenkraftwagen und Lastkraftwagen produzieren will – unter Lizenz des amerikanischen Chevrolet"
 SOV_sue_for_peace:0 "Bieten Sie bedingungslose Kapitulation an"
 SOV_sue_for_peace_desc:0 "Der Feind hat unsere wichtigsten Städte eingenommen. Der Krieg entwickelt sich nicht unbedingt zu unserem Vorteil. Wir müssen das Unerträgliche ertragen."
 POL_ban_onr:0 "Beenden Sie die Existenz des ONR"
 POL_ban_onr_desc:0 "Jetzt, nach Dmowskis Tod, können wir uns ein für alle Mal um ONR kümmern. Verhaftet sie alle!"
 POL_GER_give_LIT_back:0 "Beenden Sie die Besetzung Litauens"
 POL_GER_give_LIT_back_desc:0 "Die Besetzung Litauens war für den Erfolg der Operation Hetman notwendig. Jetzt ist es an der Zeit, sie zu beenden"
 POL_ENG_propose_the_deal:0 "Verhandeln Sie, um die Seiten zu wechseln"
 POL_ENG_propose_the_deal_desc:0 "Die Lage an der Front verschlechtert sich für die Achsenmächte täglich. Vielleicht ist es an der Zeit, die Seiten zu wechseln?"

