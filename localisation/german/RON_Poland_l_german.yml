 offensive_effort:0 "Offensive Anstrengung"
 offensive_effort_desc:0 "Wir haben uns entschieden, in die Offensive zu gehen und nach Polen vorzudringen"
 defensive_effort:0 "Verteidigungsanstrengung"
 defensive_effort_desc:0 "Wir haben uns entschieden, uns zurückzuhalten und zu verteidigen, denn wenn wir vorstoßen, könnte dies zu einer Überdehnung unserer Versorgungslinie führen."
 international_suppport:0 "Rufe nach internationaler Unterstützung"
 international_suppport_desc:0 "Das polnische Volk fordert alle Nationen auf, ihre Ansprüche anzuerkennen"
 defensive_effort2:0 "Verteidigungsanstrengung"
 defensive_effort2_desc:0 "Wir werden Polen bis zum Ende verteidigen!"
 offensive_effort2:0 "Offensive Anstrengung"
 offensive_effort2_desc:0 "Wir müssen weiter angreifen, wir werden uns den Sowjets nicht ergeben! Dla Polski!!!!"
 POl_NASH:0 "Polnischer Nationalismus"
 POl_NASH_desc:0 "Wir müssen die polnische Identität fördern, wir müssen den Menschen erklären, warum wir diesen Krieg führen und was es bedeutet, Pole zu sein!"
 March_Constitution:0 "Märzverfassung"
 March_Constitution_desc:0 "Diese Verfassung gilt als sehr fortschrittlich. Sie verbietet Diskriminierung aufgrund von Rasse und Religion. Sie schaffte außerdem alle königlichen Titel und staatlichen Privilegien ab und beendete damit die Herrschaft des vorherigen Monarchen. Ob diese Verfassung wirklich die richtige Wahl ist, wird sich erst mit der Zeit zeigen."
 POL_INT_Broken_Roads:0 "Zerstörte Infrastruktur"
 POL_INT_Broken_Roads_desc:0 "Nach dem Ersten Weltkrieg ist die polnische Infrastruktur in einem desolaten Zustand, da Polen zusammen mit Nordfrankreich das Hauptschlachtfeld war. Wir müssen an der Reparatur arbeiten, um Material schneller durch das Land transportieren zu können."
 BondsToPoor:0 "Kredite an die Armen"
 BondsToPoor_desc:0 "Wir vergeben Kredite an die Armen in der Hoffnung, dass die Kredite ihnen helfen, wieder auf die Beine zu kommen."
 investing_into_big_buseness:0"Investitionen in große Unternehmen" 
 investing_into_big_buseness_desc:0 "Wir investieren Geld in große Unternehmen in der Hoffnung, dass sie es wieder in die Armen investieren."
 POL_road_repair:0 "Straßenreparaturprogramm"
 POL_road_repair_desc:0 "Wir haben ein Straßenreparaturprogramm gestartet, um unsere beschädigte Infrastruktur zu reparieren"
 pol_argacultural_society:0 "Landwirtschaftliche Gesellschaft"
 pol_argacultural_society_desc:0 "Polen ist ein überwiegend landwirtschaftlich geprägtes Land und aufgrund der fehlenden Industrialisierung stagniert der Fortschritt."
 mass_migration:0 "Massenmigration"
