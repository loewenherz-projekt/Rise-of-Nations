 heavy_water_infiltration_outcome:0 "Dem Team gelang es, mit dem Fallschirm in das Gebiet zu gelangen."
 heavy_water_attack_outcome:0 "Dem Team gelang es, die Anlage zu infiltrieren und allen Wachen auszuweichen. Weniger als eine Stunde später zerstörte eine schwere Explosion die Anlage."
 heavy_water_exfiltration_outcome:0 "Wir haben seit der Razzia nichts mehr vom Team gehört, aber das ist zu erwarten."
 heavy_water_exfiltration_outcome_fail:0 "Deutsche Quellen haben die Festnahme des Teams der Operation Gunnerside gemeldet. Offenbar geriet das Team bei der Flucht aus der Anlage in Schwierigkeiten."
 bruneval_infiltration_outcome:0 "Die Landung der Angriffseinheit verlief erfolgreich, die Streuung durch den Fallschirmabwurf war minimal."
 bruneval_attack_outcome:0 "Die Fallschirmjäger rückten auf das Ziel zu und zerstörten die schwache Garnison in einem kurzen, aber heftigen Feuergefecht."
 bruneval_exfiltration_outcome:0 "Die Truppe bestieg Landungsboote, um zu unseren Linien zurückzukehren, und nahm einen feindlichen Radartechniker zum Verhör mit."
 bruneval_exfiltration_outcome_fail:0 "Nach der Evakuierung nach Großbritannien stellte sich heraus, dass unser Agent nicht unter den vom Strand geborgenen Personen war. Es ist unklar, wann genau der Kontakt abbrach, aber wir müssen vom Schlimmsten ausgehen."
 capture_tito_attack_outcome:0 "Weitere Informationen zum Ergebnis der Operation finden Sie im beigefügten Operationsbericht."
 organise_cells_outcome:0 "Mehrere revolutionäre Zellen wurden gegründet und begannen, im Hinterland des Feindes zu operieren."
 infiltrate_civil_service_outcome:0 "Wir haben eine Reihe zuverlässiger Personen in Machtpositionen gebracht, sodass sie schnell die Verwaltung der befreiten Gebiete übernehmen konnten."
 workers_militia_outcome:0 "Mehrere Bataillone der Arbeitermiliz stehen bereit, um wichtige Einrichtungen zu bewachen."
 organize_strikes_outcome:0 "Unserem Agenten ist es gelungen, Gewerkschafter und Arbeiter davon zu überzeugen, einen großen Streik zu beginnen."
 preposition_units_outcome:0 "Unsere Vermögenswerte im Land wurden so platziert, dass sie bei Beginn des Aufstands kritische Infrastrukturen erobern."
 launch_coup_exfiltration_outcome:0 "Nach Erhalt des Startsignals führte unser Agent mehrere Einheiten zur Eroberung ihrer zugewiesenen Ziele. Die Rebellen haben erfolgreich die Kontrolle über ein Stück Land übernommen."
 launch_coup_exfiltration_outcome_fail:0 "Im Chaos des Aufstands haben wir den Kontakt zu unserem Agenten verloren. Wir werden vielleicht nie erfahren, was passiert ist."
 
 
 ##RON  operations
 sabotage_grain_silo_name:0 "Sabotage-Silo"
 sabotage_grain_silo:0 "Sabotage-Silo"
 sabotage_grain_silo_desc:0 "Wir werden versuchen, die Nahrungsmittelvorräte des Feindes, insbesondere die Getreidesilos, zu sabotieren."
 sabotage_silo_plant_explosives:0 "Sprengstoff anbauen"
 sabotage_silo_plant_explosives_desc:0 "In Zusammenarbeit mit lokalen Mitgliedern werden unsere Agenten mitten in der Nacht in die Silos eindringen, Sprengstoff in der Nähe von tragenden Strukturen platzieren und so den gesamten Silo mit all seinem wertvollen Getreide zum Einsturz bringen."
 sabotage_silo_burn_it:0 "Verbrenne den Silo"
 sabotage_silo_burn_it_desc:0 "Wir haben Silos identifiziert, die große Mengen hochentzündlichen Getreidestaubs enthalten. Im Schutz der Nacht werden unsere Mitarbeiter die Silos in Brand setzen und sich dann im darauf folgenden Chaos zurückziehen."
