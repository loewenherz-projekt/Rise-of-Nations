l_german:
 operation_boost_resistance:0 "Widerstandskraft stärken"
 operation_boost_resistance_desc:0 "§LPaten in feindlich besetztem Gebiet benötigen dringend Unterstützung, um den Kampf fortsetzen zu können. Sie binden erhebliche Mengen feindlicher Truppen und wären eine sehr effektive Investition.§!"
 operation_capture_cipher:0 "Erfassungs-Chiffre"
 operation_capture_cipher_desc:0 "§LDie Eroberung eines feindlichen Codebuchs oder dessen Erwerb auf andere Weise würde unseren Codeknackern einen entscheidenden Vorteil bei ihren Bemühungen verschaffen.§!"
 infiltration_paradrop:0 "Infiltration per Fallschirm"
 infiltration_paradrop_desc:0 "Agenten werden mit Fallschirmen in das Gebiet abgesetzt. Durch den Tiefflug und die Nachtflugzeit werden Störungen durch feindliche Kampfflugzeuge vermieden."
 infiltration_submarine:0 "Einsatz per U-Boot"
 infiltration_submarine_desc:0 "Die Agenten werden von einem unserer U-Boote in Küstennähe abgesetzt. Wir haben bereits mögliche Landeplätze und die Zeitpunkte feindlicher Patrouillen erkundet, um eine Entdeckung zu vermeiden."
 infiltration_border:0 "Infiltration über eine neutrale Grenze"
 infiltration_border_desc:0 "Agenten werden über eine neutrale Grenze eindringen. Es wird erwartet, dass die Grenzschutzbeamten in diesem Gebiet weniger wachsam sind, und wir haben bereits eine Reihe von Gebieten identifiziert, in denen Grenzpatrouillen sehr selten sind."
 infiltration_diplomatic:0 "Diplomatenpässe"
 infiltration_diplomatic_desc:0 "Agenten nutzen Diplomatenpässe, um ins Land einzureisen und sich dort zu bewegen. Wir gehen davon aus, dass der feindliche Geheimdienst versuchen wird, sie zu beschatten. Mit ausreichender Ausbildung lässt sich dies jedoch überwinden."
 resistance_support_arms_depots:0 "Vorratslager erstellen"
 resistance_support_arms_depots_desc:0 "Unsere Agenten werden eine Reihe versteckter Lager mit Sprengstoff und anderer Ausrüstung anlegen, um einen allgemeinen Aufstand vorzubereiten, sobald der Widerstand stark genug ist."
 resistance_support_distribute_weapons:0 "Waffen verteilen"
 resistance_support_distribute_weapons_desc:0 "Unsere Agenten organisieren und koordinieren eine Reihe von Waffenabwürfen. Die Waffen werden dann an vertrauenswürdige Mitglieder des örtlichen Widerstands übergeben."
 resistance_support_organize_training:0 "Trainingslager organisieren"
 resistance_support_organize_training_desc:0 "Unsere Agenten bieten Kurse in Flucht- und Ausweichtechniken sowie in den Grundlagen der Feldarbeit an. Die vielversprechendsten Teilnehmer absolvieren anschließend eine Grundausbildung im Umgang mit Schusswaffen."
 resistance_support_coordinate_groups:0 "Koordinieren Sie Widerstandsgruppen"
 resistance_support_coordinate_groups_desc:0 "Unsere Agenten werden umherreisen und die verschiedenen Widerstandsgruppen koordinieren. Es wird einige Mühe kosten, ein Bündnis zwischen den politisch zersplitterten Einheiten zu schmieden."
 exfiltration_air_pickup:0 "Abholung mit dem Flugzeug"
 exfiltration_air_pickup_desc:0 "Eines unserer Flugzeuge wird nachts feindliches Gebiet überfliegen, ein markiertes Feld finden, landen und unsere Agenten aufnehmen."
 exfiltration_submarine_pickup:0 "Abholung mit dem U-Boot"
 exfiltration_submarine_pickup_desc:0 "Eines unserer U-Boote wird an einem festgelegten Abholpunkt entlang der Küste stationiert sein. Das Timing ist entscheidend, da feindliche Marinepatrouillen das Gebiet abdecken."
 exfiltration_border:0 "Wandern über die Grenze"
 exfiltration_border_desc:0 "Unsere Agenten entkommen, indem sie nachts an einem abgelegenen Ort die Grenze überqueren. Lokale Führer stehen bereit, um bei der Navigation durch das gefährliche Gebiet zu helfen."
 exfiltration_go_to_ground:0 "Untertauchen"
 exfiltration_go_to_ground_desc:0 "Unsere Agenten werden sich unter der Bevölkerung verstecken und untertauchen, bis sie für den nächsten Einsatz bereit sind. Sollte sich die Möglichkeit ergeben, auf andere Weise auszusteigen, werden sie diese nutzen."
 operation_make_resistance_contacts:0 "Widerstandskontakte herstellen"
 operation_make_resistance_contacts_desc:0 "§LJede Unterstützung, die wir den hinter den feindlichen Linien aktiven Partisanen anbieten können, wäre weitaus effektiver, wenn wir eine Möglichkeit hätten, mit ihnen zu kommunizieren und uns abzustimmen.§!"
 capture_cyphers_bribe:0 "Soldat bestechen"
 capture_cyphers_bribe_desc:1 "Wir haben einen Mann im Unternehmen und werden ihm die nötigen Mittel zur Verfügung stellen, um ein Codebuch zu stehlen und es unserem Agenten zu übergeben."
 capture_cyphers_raid:0 "Kommando-Überfall"
 capture_cyphers_raid_desc:0 "Unser Agent wird das Gebiet erkunden und einer Kommandoeinheit signalisieren, zu landen und Codebücher und Verschlüsselungsgeräte zu erbeuten. Wir werden außerdem versuchen, ein oder zwei Verschlüsselungsspezialisten für ein Verhör festzunehmen."
 capture_cyphers_seduction:0 "Verwenden Sie Verführung"
 capture_cyphers_seduction_desc:0 "Unser Agent wird eine Person mit Zugriff auf die Chiffren kontaktieren und ihren Charme – oder andere Mittel – nutzen, um eine Kopie zu sichern."
 capture_cyphers_reverse_engineer:0 "Reverse Engineering"
 capture_cyphers_reverse_engineer_desc:0 "Eine einfachere Version der wichtigsten Verschlüsselungsmaschine des Landes ist im Handel erhältlich. Wir werden eine Version legal erwerben und sie dann für die Reverse-Engineering-Entwicklung einer Entschlüsselungsmaschine verwenden."
 resistance_contacts_radio_circuits:0 "Erstellen Sie Funkschaltungen"
 resistance_contacts_radio_circuits_desc:0 "Das Team wird Funkgeräte an Widerstandsmitglieder verteilen und ihnen die Grundlagen des Funkprotokolls beibringen, insbesondere im Hinblick darauf, die Funkpeilung des Feindes zu verhindern."
 resistance_support_pidgeons:0 "Tauben verteilen"
 resistance_support_pidgeons_desc:0 "Das Team wird ausgebildete Brieftauben an verschiedene Züchter verteilen, die mit dem Widerstand in Verbindung stehen. Mit ihnen werden Nachrichten zu unseren Linien transportiert."
 resistance_contacts_briefings:0 "Strategiebriefings"
 resistance_contacts_briefings_desc:0 "Unser Agent wird die Anführer verschiedener Widerstandsgruppen über geplante Operationen informieren, um die Unterstützung des Widerstands zu koordinieren."
 capture_cyphers_smuggle:0 "Schmuggel-Chiffren"
 capture_cyphers_smuggle_desc:0 "Einer unserer Doppelagenten wird die Übertragung einer neuen Kopie der aktuell aktiven Chiffre anfordern. Die Abstimmung mit anderen Diensten ist im Gange, um sicherzustellen, dass die Übermittlung nicht unterbrochen wird."
 operation_steal_tech_airforce:1 "Stehlen Sie Blaupausen der Luftfahrtindustrie"
 operation_steal_tech_airforce_desc:0 "„Wir haben eine Reihe sehr beunruhigender Berichte erhalten, denen zufolge der Feind uns in mehreren Bereichen der Flugzeugkonstruktion voraus ist. Sollte dies der Fall sein, könnten wir versuchen, herauszufinden, wie weit er uns voraus ist, und diese Erkenntnisse für unsere eigene Forschung nutzen.“"
 operation_infiltrate_armed_forces_navy:0 "Infiltrieren Sie die Marine"
 operation_infiltrate_armed_forces_navy_desc:0 "§LWährend die eng verbundenen Besatzungen von [From.GetAdjective]-Schiffen nur wenige Möglichkeiten zur Infiltration bieten, ist das Hilfspersonal zu Hause eine andere Sache. Jemanden ins Innere zu bringen, würde uns wertvolle Informationen liefern und uns die Möglichkeit geben, später bei schwierigeren Operationen zu helfen.§!"
 operation_infiltrate_civilian:0 "Infiltrieren Sie die Zivilverwaltung"
 operation_infiltrate_civilian_desc:0 "§LDie [From.GetAdjective]-Regierung weist zahlreiche Schwachstellen auf, über die wir einen Agenten in ihre Operationen einschleusen könnten. Dies würde uns wertvolle Einblicke in die internen Abläufe von [From.GetNameDef] verschaffen und uns die Möglichkeit geben, diesen Agenten in zukünftigen Operationen gegen [From.GetNameDef] einzusetzen.§!"
 operation_infiltrate_armed_forces_airforce:0 "Infiltrieren Sie die Luftwaffe"
 operation_infiltrate_armed_forces_airforce_desc:0 "§LDie [From.GetAdjective] Luftwaffe ist die jüngste der [From.GetAdjective] Streitkräfte. Daher verfügt sie über viele Menschen mit ungewöhnlichem Hintergrund in ihren Reihen. Wir könnten einige von ihnen ausnutzen, um einen Mann ins Innere zu bekommen.§!"
 operation_infiltrate_armed_forces_army:0 "Infiltrieren Sie die Armee"
 operation_infiltrate_armed_forces_army_desc:0 "§LDie [From.GetAdjective]-Armee verfügt über eine Reihe von Personen in ihren Reihen, die für zukünftige Operationen zusätzliche Informationen und Unterstützung bereitstellen könnten.§!"
 operation_steal_tech_army:1 "Militärische Blaupausen stehlen"
 operation_steal_tech_army_desc:0 "§LUnsere Geheimdienstanalysten sind der Ansicht, dass [From.GetNameDef] bedeutende Fortschritte im Bereich der Bodenkriegsführung und der Militärtechnik erzielt hat. Eine gründlichere Untersuchung, gepaart mit direkteren Methoden, könnte wertvolle Erkenntnisse für unsere eigenen Forschungsprojekte liefern.§!"
 operation_steal_tech_civilian:1 "Industrielle Blaupausen stehlen"
 operation_steal_tech_civilian_desc:0 "§LEs scheint, dass unsere Branche in mehreren Bereichen hinter [From.GetNameDef] zurückliegt. Mit ein wenig List und Täuschung können wir die Lücke möglicherweise deutlich schließen.§!"
 operation_steal_tech_navy:1 "Stehlen Sie Marine-Blaupausen"
 operation_steal_tech_navy_desc:0 "§LEs gibt Berichte, dass die [From.GetAdjective] uns in einigen Bereichen der Schiffstechnik voraus zu sein scheinen. Wir könnten in der Lage sein, einen Teil dieser Technologie für Reverse Engineering zu erwerben.§!"
 infiltrate_military_bribe:0 "Bestechung anbieten"
 infiltrate_military_bribe_desc:1 "Unser Agent wird eine Person in finanziellen Schwierigkeiten identifizieren und uns einen beträchtlichen Betrag anbieten, um uns zu unterstützen. Die Mittel werden aus der Staatskasse bereitgestellt."
 infiltrate_military_seduction:0 "Charms anwenden"
 infiltrate_military_seduction_desc:1 "Unser Agent wird eine sehr enge und vertraute Beziehung zu einer Insider-Person aufbauen, um Informationen zu erhalten und Einfluss auf sie zu nehmen."
 infiltrate_military_turned_pow:0 "Kriegsgefangener werden"
 infiltrate_military_turned_pow_desc:0 "Wir werden einen brauchbaren Kriegsgefangenen in unserer Obhut finden, ihn auf unsere Seite ziehen und ihn dann repatriieren. Er wird zweifellos verhört werden, aber mit der richtigen Ausbildung wird er das überstehen können."
 infiltrate_military_ideological_supporter:0 "Kontakt Ideologischer Unterstützer"
 infiltrate_military_ideological_supporter_desc:1 "Wir werden diplomatische Hinterzimmerkanäle nutzen, um Mitglieder der [From.GetAdjective]-Regierung zu identifizieren und zu kontaktieren, deren politische Ansichten von denen ihrer Regierung abweichen, und sie ermutigen, für uns zu arbeiten."
 steal_blueprints_bribe:0 "Bestechung anbieten"
 steal_blueprints_bribe_desc:0 "Unser Agent wird einem am Projekt beteiligten Ingenieur eine beträchtliche Summe anbieten."
 steal_blueprints_seduction:0 "Charms anwenden"
 steal_blueprints_seduction_desc:0 "Unser Agent wird sich mit einer am Projekt beteiligten Person in Verbindung setzen und seinen Charme einsetzen, um zusätzliche Einblicke zu gewinnen. Wir erwarten zwar nicht, dass uns jemand für ein paar schöne Stunden im Büro einen vollständigen Satz Baupläne übergibt, aber Bettgeflüster ist oft unbedacht."
 steal_blueprints_infiltrate_naval_design_office:0 "Infiltrieren Sie das Marine-Konstruktionsbüro"
 steal_blueprints_infiltrate_naval_design_office_desc:0 "Unser Agent wird bei einem kleineren Zulieferer im Schiffbau als geringfügiger Mitarbeiter einsteigen und diese Position nutzen, um Kopien der vorhandenen Pläne anzufertigen."
 steal_blueprints_steal_prototype:0 "Prototyp stehlen"
 steal_blueprints_steal_prototype_desc:0 "Nach der fliegerischen Grundausbildung und in Begleitung eines Testpiloten unserer Luftwaffe erhält unser Agent Zugang zu einem Prototypen und fliegt ihn zu unseren Einsatzgebieten. Um sicherzustellen, dass der Prototyp unbeschädigt bei uns ankommt, wird eine Kampfflugzeugeskorte organisiert."
 steal_blueprints_middle_manager:0 "Infiltrieren Sie das mittlere Management"
 steal_blueprints_middle_manager_desc:0 "Unser Agent nutzt die bereitgestellten Referenzen und einen frisierten Lebenslauf, um eine Anstellung im mittleren Management eines großen Unternehmens zu finden. Von dieser Position aus sollte er in der Lage sein, Informationen über das Unternehmen und die Branche insgesamt bereitzustellen."
 lar_communist_uprising_organise_cells:0 "Organisieren Sie revolutionäre Zellen"
 lar_communist_uprising_organise_cells_desc:0 "Unsere Agenten werden mit einigen ausgewählten Arbeitern zusammenarbeiten, um Revolutionäre Aktionskomitees zu gründen, die die Saat der Revolution in jede Fabrik tragen."
 lar_communist_uprising_infiltrate_civil_service:0 "Infiltrieren Sie den öffentlichen Dienst"
 lar_communist_uprising_infiltrate_civil_service_desc:0 "Unser Agent wird dafür sorgen, dass mehrere vertrauenswürdige Personen in den öffentlichen Dienst eintreten, um den Kern einer zivilen Verwaltung nach dem Erfolg der Revolution zu bilden."
 lar_communist_uprising_train_workers_militia:0 "Trainieren Sie die Arbeitermiliz"
 lar_communist_uprising_train_workers_militia_desc:0 "Unser Agent wird die Grundausbildung für eine Reihe handverlesener Kameraden organisieren, die dann den Kader der Milizeinheiten bilden."
 lar_communist_uprising_organize_strikes:0 "Streiks organisieren"
 lar_communist_uprising_organize_strikes_desc:0 "Unser Agent wird Kontakt zu Gewerkschaften und anderen politisch zuverlässigen Personen aufnehmen, die in Schlüsselindustrien arbeiten, und ihnen dabei helfen, einen Streik zu organisieren, der bei Kriegsbeginn durchgeführt werden soll."
 lar_fra_coup_pre_position_units:0 "Vorpositionierungseinheiten"
 lar_fra_coup_pre_position_units_desc:0 "Unser Agent übernimmt das Kommando über eine Reihe sympathisierender Armeeeinheiten in der Region und weist ihnen Ziele zu, die bei Beginn der Operation eingenommen werden sollen."
 lar_fra_launch_coup:0 "Startcoup"
 lar_fra_launch_coup_desc:0 "Der Betrieb beginnt nach dem Empfang eines codierten Funksignals."
 FRA_instigate_workers_revolution_britain:0 "Anstiftung zur Arbeiterrevolution in Großbritannien"
 FRA_instigate_workers_revolution_italy:0 "Anstiftung zur Arbeiterrevolution in Italien"
 FRA_instigate_workers_revolution_spain:0 "Anstiftung zur Arbeiterrevolution in Spanien"
 FRA_instigate_workers_revolution_germany:0 "Anstiftung zur Arbeiterrevolution in Deutschland"
 FRA_coup_in_north_africa:0 "Putsch in Nordafrika vorbereiten"
 FRA_coup_in_north_africa_flag:0 "Putsch in Nordafrika vorbereiten"
 FRA_coup_in_north_africa_desc:0 "Viele Franzosen in Nordafrika wollen immer noch in den Kampf gegen die Invasoren einsteigen. Wir müssen ihnen nur die Hand reichen."
 FRA_coup_in_syria:0 "Putsch in Syrien vorbereiten"
 FRA_coup_in_syria_flag:0 "Putsch in Syrien vorbereiten"
 FRA_coup_in_syria_desc:0 "Viele Franzosen in Syrien wollen sich weiterhin in den Kampf gegen die Invasoren einmischen. Wir müssen ihnen nur die Hand reichen."
 FRA_coup_in_indochina:0 "Putsch in Indochina vorbereiten"
 FRA_coup_in_indochina_flag:0 "Putsch in Indochina vorbereiten"
 FRA_coup_in_indochina_desc:0 "Viele Franzosen in Indochina wollen immer noch in den Kampf gegen die Invasoren einsteigen. Wir müssen nur auf sie zugehen."
 FRA_coup_in_central_africa:0 "Putsch in Zentralafrika vorbereiten"
 FRA_coup_in_central_africa_flag:0 "Putsch in Zentralafrika vorbereiten"
 FRA_coup_in_central_africa_desc:0 "Viele Franzosen in Zentralafrika wollen sich weiterhin in den Kampf gegen die Invasoren einmischen. Wir müssen ihnen nur die Hand reichen."
 FRA_coup_in_west_africa:0 "Putsch in Westafrika vorbereiten"
 FRA_coup_in_west_africa_flag:0 "Putsch in Westafrika vorbereiten"
 FRA_coup_in_west_africa_desc:0 "Viele Franzosen in Westafrika wollen immer noch in den Kampf gegen die Invasoren einsteigen. Wir müssen ihnen nur die Hand reichen."
 FRA_coup_in_madagascar:0 "Putsch in Madagaskar vorbereiten"
 FRA_coup_in_madagascar_flag:0 "Putsch in Madagaskar vorbereiten"
 FRA_coup_in_madagascar_desc:0 "Viele Franzosen in Madagaskar wollen immer noch in den Kampf gegen die Invasoren einsteigen. Wir müssen nur auf sie zugehen."
 targeted_sabotage_plant_explosives:0 "Pflanzensprengstoffe"
 targeted_sabotage_plant_explosives_desc:0 "In Zusammenarbeit mit Mitgliedern des örtlichen Widerstands werden unsere Agenten mitten in der Nacht in das Werk eindringen, Sprengstoff in der Nähe tragender Strukturen platzieren und so die gesamte Fabrikhalle auf die Produktionsanlagen stürzen lassen."
 targeted_sabotage_organize_more_meetings:0 "Organisieren Sie mehr Meetings"
 targeted_sabotage_organize_more_meetings_desc:0 "Interviews mit Arbeitern haben gezeigt, dass die Abhaltung umfangreicher Besprechungen zur Erörterung kleinerer Probleme zu einer drastischen Verlangsamung der Produktion führt, bei minimalen Kosten für unsere Arbeiter."
 targeted_sabotage_destroy_bridge:0 "Brücke zerstören"
 targeted_sabotage_destroy_bridge_desc:0 "Der örtliche Widerstand hat eine Brücke identifiziert, die einen wichtigen Knotenpunkt für die feindlichen Versorgungsbemühungen in der Region darstellt. Unsere Agenten werden die Brücke mit einigen Pfund Sprengstoff zum Einsturz bringen."
 targeted_sabotage_collapse_tunnel:0 "Einsturztunnel"
 targeted_sabotage_collapse_tunnel_desc:0 "Die wichtigste Eisenbahnlinie des Staates verläuft durch einen engen Tunnel. Unsere Mitarbeiter haben die strukturellen Schwachstellen in der Konstruktion identifiziert und werden den Tunnel mit Sprengstoff zum Einsturz bringen."
 targeted_sabotage_remove_roadsigns:0 "Straßenschilder entfernen"
 targeted_sabotage_remove_roadsigns_desc:0 "Unsere Mitarbeiter werden Straßenschilder umwerfen und andere umdrehen, um den Besatzungstruppen die Navigation zu erschweren."
 targeted_sabotage_immobilize_rolling_stock:0 "Rollmaterial stilllegen"
 targeted_sabotage_immobilize_rolling_stock_desc:0 "Eine Handvoll Sand in den Schmierstellen eines Eisenbahnwaggons kann ihn irgendwann zum Stillstand bringen und so die gesamte Strecke blockieren, bis sie repariert werden kann. Schon eine kleine Anzahl defekter Waggons kann das gesamte System zum Einsturz bringen."
 targeted_sabotage_burn_storage:0 "Brennen Lagerung"
 targeted_sabotage_burn_storage_desc:0 "Der örtliche Widerstand hat Lagereinheiten identifiziert, die hochentzündliche Verbindungen enthalten. Im Schutz der Nacht werden unsere Agenten die Lager in Brand setzen und sich dann im darauffolgenden Chaos zurückziehen."
 targeted_sabotage_destroy_mining_equipment:0 "Zerstöre Bergbauausrüstung"
 targeted_sabotage_destroy_mining_equipment_desc:0 "Lokale Widerstandsgruppen haben darauf hingewiesen, dass viele der im Bergbau eingesetzten schweren Geräte extrem anfällig sind. Unsere Agenten werden Sprengstoff einsetzen, um wichtige Teile unbrauchbar zu machen und den gesamten Bergbaubetrieb zum Erliegen zu bringen."
 operation_targeted_sabotage_industry:0 "Sabotageindustrie"
 operation_targeted_sabotage_industry_desc:0 "§LResistenz im feindlichen Gebiet hat Unterstützung bei der Stilllegung einer örtlichen Industrieanlage angefordert.§!"
 operation_targeted_sabotage_infrastructure:0 "Sabotage der Infrastruktur"
 operation_targeted_sabotage_infrastructure_desc:0 "§LResistenz in feindlichem Gebiet unternimmt einen zurückhaltenden Kampf gegen die feindliche Infrastruktur, verfügt bisher jedoch nicht über die Ressourcen, um eine ernsthafte Wirkung zu erzielen.§!"
 operation_targeted_sabotage_resources:0 "Sabotage-Ressourcen"
 operation_targeted_sabotage_resources_desc:0 "§LDer Widerstand in feindlichem Gebiet hat uns über die Bemühungen des Feindes informiert, Ressourcen im Staat zu gewinnen. Ein gut platzierter Strich durch die Rechnung würde das verhindern.§!"
 operation_rescue_operative:0 "Rettung eines gefangenen Agenten"
 operation_rescue_operative_desc:0 "§LEine unserer Waffen wurde vom Gegner vom Spielfeld genommen. Wir müssen sie zurückholen, und zwar schnell, bevor sie endgültig aus dem Spiel genommen wird.§!"
 free_operative_free_in_transit:0 "Frei im Transit"
 free_operative_free_in_transit_desc:0 "Unser Agent wird mit dem Auto zwischen dem Gefängnis, in dem er festgehalten wird, und dem Ort, an dem er verhört wird, hin- und hergefahren. Wir kennen die Route und werden eine kleine Einheit ausschicken, um einen Hinterhalt zu legen, die Wachen zu töten und unseren Agenten zu befreien."
 free_operative_liberate_camp:0 "Lager befreien"
 free_operative_liberate_camp_desc:0 "Während des Verhörs wird unser Agent mit anderen wichtigen Gefangenen in einem Lager festgehalten. Wir werden mit einer kleinen Einheit das Lager angreifen, die anwesenden Wachen überwältigen und unseren Agenten befreien."
 free_operative_smuggle_in_escape_gear:0 "Fluchtausrüstung einschmuggeln"
 free_operative_smuggle_in_escape_gear_desc:0 "Unsere Wissenschaftler haben ein Fluchtwerkzeug entwickelt. Ein lokaler Kontakt hat sich bereit erklärt, das Paket entgegenzunehmen. Unser Mitarbeiter wird die erhaltenen Werkzeuge verwenden und sich zum Treffpunkt begeben, um die Flucht zu ermöglichen."
 operation_outcome_consumes_token_tt:1 "Bei dieser Operation könnte ein §YInfiltrierter Vermögenswert§! zerstört werden."
 operation_outcome_sabotage_industry_tt:0 "Konzentriert den lokalen Widerstand auf die Industrie und erhöht die Chance erfolgreicher Angriffe."
 operation_outcome_sabotage_infrastructure_tt:0 "Konzentriert den lokalen Widerstand auf die Infrastruktur und erhöht die Chance erfolgreicher Angriffe."
 operation_outcome_sabotage_resources_tt:0 "Konzentriert den lokalen Widerstand auf die gezielte Ressourcengewinnung und erhöht die Chance erfolgreicher Angriffe."
 operation_coup_government:0 "Putsch orchestrieren"
 operation_coup_government_desc:0 "§L[From.GetNameDefCap] ist reif für einen Regimewechsel. Ein paar gute, zuverlässige Leute – mit der richtigen Unterstützung – könnten die Grundstruktur, die die [From.GetAdjective]-Regierung stützt, stürzen.§!"
 collaboration_government_set_up_planning_committees:0 "Richten Sie Planungsausschüsse ein"
 collaboration_government_set_up_planning_committees_desc:0 "Unser Team wird sich mit einigen wohlwollenden Politikern treffen, um die Möglichkeit der Bildung einer neuen Regierung zu besprechen, die [From.GetNameDef] nach unserer Besetzung verwalten soll, und einige kleine Arbeitsgruppen bilden, die die Einzelheiten ausarbeiten werden."
 collaboration_government_train_paramilitary_forces:0 "Paramilitärische Kräfte ausbilden"
 collaboration_government_train_paramilitary_forces_desc:0 "Unser Team wird Einheiten organisieren und ausbilden, die die neue Regierung bei der Aufrechterhaltung von Recht und Ordnung unterstützen. Bis zur Bildung der neuen Regierung werden sie bei der Sicherung der rückwärtigen Gebiete helfen."
 collaboration_government_contact_military_officers:0 "Kontakt zu Militäroffizieren"
 collaboration_government_contact_military_officers_desc:0 "Unser Team wird einigen Hinweisen nachgehen, die darauf hindeuten, dass einige pensionierte Militäroffiziere mit der derzeitigen [From.GetAdjective]-Regierung zutiefst unzufrieden sind und bereit wären, uns bei der Bildung einer neuen Regierung nach unserer Besetzung zu helfen."
 operation_collaboration_government:0 "Zusammenarbeit vorbereiten Regierung"
 operation_collaboration_government_desc:0 "§LWenn eine befreundete Regierung für [From.GetNameDef] zuständig wäre, könnten wir uns auf unsere anderen Feinde konzentrieren und Truppen für die Verfolgung anderer Ziele freisetzen.§!"
 fake_intel_decoy_tanks:0 "Täuschungspanzer"
 fake_intel_decoy_tanks_desc:0 "Wir haben billige Täuschkörper erfunden, die aus der Ferne wie Panzer aussehen. Wir platzieren diese an gut sichtbaren Stellen und sorgen dafür, dass der Feind genügend Zeit hat, sie zu bemerken."
 fake_intel_radio_deception:0 "Radio-Täuschung"
 fake_intel_radio_deception_desc:0 "Wir werden eine kleine Einheit von Funkspezialisten aufstellen, die als Fernmeldeabteilung einer viel größeren Formation fungieren soll. Sie werden außerdem eine ältere Version unserer Chiffren verwenden, um dem Feind das Lesen ihrer Nachrichten zu erleichtern."
 fake_intel_deliberate_leaks:0 "Absichtliche Lecks"
 fake_intel_deliberate_leaks_desc:0 "Einige unserer Agenten im Ausland achten darauf, dass sie im Umgang mit den richtigen Leuten indiskret vorgehen und so sicherstellen, dass der Feind die gewünschten Informationen über „vertrauenswürdige“ Quellen erhält."
 fake_intel_press_releases:0 "Pressemitteilungen"
 fake_intel_press_releases_desc:0 "Wir werden Reporter einladen, sehr detaillierte Geschichten über einige der Dinge zu schreiben, von denen wir möchten, dass der Feind davon erfährt."
 fake_intel_utilize_double_agents:0 "Nutzen Sie Doppelagenten"
 fake_intel_utilize_double_agents_desc:0 "Wir haben eine Reihe von Junior-Informanten des feindlichen Geheimdienstes eingeschaltet. Sie werden ermutigt, die andere Seite mit den richtigen Informationen zu versorgen."
 fake_intel_plant_evidence:0 "Pflanzennachweis"
 fake_intel_plant_evidence_desc:0 "Wir werden eine kleine Operation an einem Ort durchführen, den der Feind kontrolliert, an dem wir aber derzeit kein Interesse haben, und sicherstellen, dass wir genügend Beweise hinterlassen."
 fake_intel_release_pow:0 "Freigabe Pow"
 fake_intel_release_pow_desc:0 "Ein gefangener feindlicher Offizier soll aus humanitären Gründen in seine Heimat zurückgeführt werden. Bevor er abreist, stellen wir sicher, dass er zufällig einige Dinge sieht."
 operation_fake_intel:0 "Pflanzen Sie falsche Intelligenz"
 operation_fake_intel_desc:0 "§LWir wissen, dass [From.GetAdjective] der Geheimdienst in unserem Land aktiv ist. Manchmal ist es besser, jemandem, der nach Informationen sucht, genau das zu geben, was er hören möchte.§!"
 heavy_water_raid:0 "Operation Gunnerside"
 heavy_water_raid_desc:0 "Die Deutschen haben in einer Anlage in Norwegen mit der Produktion von Schwerwasser begonnen, möglicherweise im Zusammenhang mit einem Programm zur Entwicklung einer Atombombe. Selbst wenn das produzierte Schwerwasser nicht ausreicht, um eine solche Waffe zu bauen, wäre es zweifellos eine große Hilfe für ihre Forschung."
 heavy_water_infiltration:0 "Luftabwurf-Angriffsteam und Nachschub"
 heavy_water_infiltration_desc:0 "Ein umgebauter Bomber wird ein kleines Team norwegischer Kommandos in der Gegend absetzen, um sich mit einem Vorausteam und dem örtlichen Widerstand zu verbinden."
 heavy_water_attack:0 "Sabotage einer Schwerwasseranlage"
 heavy_water_attack_desc:0 "Die Sicherheitsvorkehrungen in der Anlage gelten als lax. Wir haben einen Widerstandskämpfer im Inneren, der uns Patrouillenpläne zur Verfügung gestellt hat. Im Inneren wird unser Team Sprengstoff platzieren und Beweise dafür hinterlassen, dass es sich um eine reguläre Militäroperation handelte."
 heavy_water_exfiltration:0 "Exfiltration"
 heavy_water_exfiltration_desc:0 "Das Team wird sich aufteilen und sich entweder den örtlichen Widerstandseinheiten anschließen oder versuchen, zu den eigenen Reihen zurückzukehren."
 bruneval_raid:0 "Operation Beißen"
 bruneval_raid_desc:0 "§LEs scheint, dass der Feind uns bei der Entwicklung von Radargeräten voraus ist. Wir haben eine feindliche Radaranlage an einem gefährdeten Ort identifiziert, die unserer Meinung nach durch einen ausreichend entschlossenen Angriff einer kleinen Truppe eingenommen werden könnte, um weitere Informationen zu gewinnen.§!"
 bruneval_infiltration:0 "Fallschirmabwurf-Angriffstruppe"
 bruneval_infiltration_desc:0 "Es wird eine Kompanie Luftlandetruppen zusammengestellt, die nachts aus geringer Höhe in der Nähe des Ziels abgesetzt werden soll."
 bruneval_attack:0 "Capture Radar-Installation"
 bruneval_attack_desc:0 "Die Angriffstruppe wird in vier Einheiten aufgeteilt, um die Anlage einzunehmen und den Evakuierungsstrand zu räumen. Ein Spezialist wird die Radaranlage zerlegen und fotografieren. Die Einheit wird außerdem versuchen, einen feindlichen Techniker zum Verhör festzunehmen."
 bruneval_exfiltration:0 "Evakuierung per Landungsboot"
 bruneval_exfiltration_desc:0 "Eine Flottille von Landungsbooten mit Truppen an Bord zur Deckung der Evakuierung wird landen und die Angriffstruppe aufnehmen. Für eine Eskorte durch befreundete Seestreitkräfte wird gesorgt."
 capture_tito:0 "Unternehmen Rösselsprung"
 capture_tito_desc:0 "Die jugoslawischen Partisanen haben an Stärke gewonnen und marschieren immer kühner vor. In vielen Gebieten kontrollieren sie effektiv das Land, blockieren Straßen und operieren ungestraft. Der Schlüssel dazu ist der Partisanenführer Tito, der diese Operationen koordiniert und kontrolliert. Ihn auszuschalten, wäre ein schwerer Schlag für den Widerstand in diesen Gebieten."
 capture_tito_infiltration:0 "Land- und Luftlandetruppen"
 capture_tito_infiltration_desc:0 "Die erste Welle von Fallschirmjägern wird per Gleiter fast über Titos mutmaßlichem Versteck abgesetzt. Mit Schnelligkeit und Überraschungsmoment werden sie Titos Wachen überwältigen und Tito entweder gefangen nehmen oder töten."
 capture_tito_attack:0 "Hauptangriff"
 capture_tito_attack_desc:0 "Eine motorisierte Kolonne wird vorrücken, um sich mit den Luftlandeeinheiten zu verbinden und dabei alle größeren Partisaneneinheiten zu vernichten, die noch standhalten und kämpfen."
 capture_tito_exfiltration:0 "Sichern Sie den Bereich"
 capture_tito_exfiltration_desc:0 "Sobald sich die beiden Angriffstruppen zusammengeschlossen haben, werden sie sich zusammenschließen und alle überlebenden Feinde vernichten."
 rescue_mussolini:0 "Rettung von Benito Mussolini"
 rescue_mussolini_desc:0 "§LNach seiner Absetzung durch [ITA.GetLeader] wurde Mussolini in einem kleinen Hotel im Apennin verhaftet. Wir haben ein kleines Zeitfenster, um ihn zu retten und zu unseren Linien zurückzubringen, wo er nach unserem Sieg zweifellos bei der Verwaltung der italienischen Gebiete helfen würde.§!"
 rescue_mussolini_infiltration:0 "Landegleiter in der Nähe des Gefängnisses"
 rescue_mussolini_infiltration_desc:0 "Eine speziell ausgewählte Einheit wird Segelflugzeuge besteigen und möglichst nahe an dem Ort landen, an dem Mussolini laut unserem Geheimdienst festgehalten wird."
 rescue_mussolini_attack:0 "Überfall auf das Gefängnis"
 rescue_mussolini_attack_desc:0 "Die Sturmtruppe wird das Hotel angreifen, einnehmen und Mussolini befreien. Im Idealfall wird die Garnison den Kampf nicht austragen, sondern sich zurückziehen. Schnelligkeit und Überraschung sind entscheidend."
 rescue_mussolini_exfiltration:0 "Bergung per Flugzeug"
 rescue_mussolini_exfiltration_desc:0 "Ein kleines Flugzeug mit hervorragenden Kurzstreckenfähigkeiten wird landen und Mussolini aufnehmen, dann umdrehen und ihn zu einem befreundeten Flugplatz fliegen."
 GER_rescued_mussolini:0 "Geretteter Mussolini"
 infiltration_paradrop_outcome:0 "Obwohl es im Dunkeln einige Schwierigkeiten gab, die Absprungzone zu finden, landete das Team sicher."
 infiltration_submarine_outcome:0 "Ein erster Versuch wurde durch hohe Wellen zunichte gemacht, doch ein zweiter Landungsversuch am nächsten Tag war erfolgreich und brachte das Team sicher an Land."
 infiltration_border_outcome:0 "Trotz des sehr schlechten Wetters fand unser Team den zuvor erkundeten Weg und konnte ohne weitere Probleme über die Grenze gelangen."
 infiltration_diplomatic_outcome:0 "Das Team hatte keine Probleme, in das Land zu gelangen und konnte geschickt der Verfolgung durch den feindlichen Geheimdienst ausweichen."
 exfiltration_air_pickup_outcome:0 "Das kleine Kurierflugzeug fand den Abholpunkt ohne große Probleme und brachte das Team sicher zurück zu unseren Linien."
 exfiltration_submarine_pickup_outcome:0 "Nach mehreren angespannten Tagen des Versteckspiels mit einer örtlichen feindlichen Patrouille gelang es unserem Team, eine Abholung zu organisieren und das Gebiet unentdeckt zu verlassen."
 exfiltration_border_outcome:0 "Das Team entkam, indem es die Grenze im Schutz der Nacht überquerte und sich dabei von einem einheimischen Führer helfen ließ, einen Weg durch die Grenzbefestigung zu finden."
 exfiltration_go_to_ground_outcome:0 "Unser Team hat sich unter die Zivilbevölkerung vor Ort gemischt und plant derzeit, entweder zu unseren Linien zurückzukehren oder für weitere Einsätze in der Gegend zu bleiben."
 fake_intel_decoy_tanks_outcome:0 "Obwohl der Feind einige Aufklärungsflüge in der Gegend durchgeführt hat, können wir nicht sicher sein, dass er die Lockvögel entdeckt und sich von ihnen überzeugen ließ. Wir warten auf die Bestätigung aus anderen Quellen, dass er auf den Köder hereingefallen ist."
 fake_intel_radio_deception_outcome:0 "Unsere Funker produzierten einen regen Verkehr. Ob der Feind diesen Verkehr tatsächlich mithörte, ist schwer zu sagen."
 fake_intel_deliberate_leaks_outcome:0 "Wir haben dafür gesorgt, dass feindliche Agenten mit zahlreichen kleinen Lecks versorgt wurden, die ein völlig anderes Bild der Realität zeichnen. Ob die Gegenseite darauf hereingefallen ist, bleibt abzuwarten."
 fake_intel_press_releases_outcome:0 "Unser Ministerium für öffentliche Information hat dafür gesorgt, dass die Berichterstattung in freundlichen und neutralen Zeitungen in etwa unseren Vorstellungen entspricht."
 fake_intel_utilize_double_agents_outcome:0 "Unsere Doppelagenten haben die Gegenseite mit einer großzügigen Portion Informationen versorgt – einige davon sogar richtig –, um sicherzustellen, dass der Feind ihnen weiterhin vertraut."
 fake_intel_plant_evidence_outcome:0 "Unser Angriff war ein voller Erfolg, und die Gegenseite konnte zahlreiche Beweise für unsere Operation finden. Erste Berichte deuten darauf hin, dass es als Reaktion darauf bereits zu zahlreichen Truppenbewegungen gekommen ist."
 fake_intel_release_pow_outcome:0 "Der Offizier wurde in die Nähe mehrerer Militärlager gefahren und konnte dabei eine Vielzahl von Einheitsaufnähern für Divisionen erkennen, die es in Wirklichkeit nicht gibt."
 targeted_sabotage_plant_explosives_outcome:0 "Das Team platzierte erfolgreich den Sprengstoff und brachte das Gebäude zum Einsturz. Die Schäden an den Werkzeugmaschinen sind Berichten zufolge gering, der Wiederaufbau wird jedoch viel Zeit in Anspruch nehmen."
 targeted_sabotage_organize_more_meetings_outcome:0 "Unser Agent infiltrierte erfolgreich das mittlere Management des Zielunternehmens und strukturierte die Prozesse aggressiv um, um durch die verstärkte Einbindung wichtiger Stakeholder größere Synergien zu erzielen. Die Produktivität ist deutlich gesunken."
 targeted_sabotage_destroy_bridge_outcome:0 "Das Team platzierte den Sprengstoff und richtete den Zünder so aus, dass er mit einem vorbeifahrenden Zug zusammenfiel. Zwischen der Explosion und der Beschädigung des entgleisten Zuges stürzte der gesamte Abschnitt in den Fluss."
 targeted_sabotage_collapse_tunnel_outcome:0 "Nachdem das Team strukturelle Schwachstellen identifiziert hatte, platzierte es Sprengstoff und zog sich zurück. Die Schäden am Tunnel sind zwar reparierbar, es wird jedoch einige Zeit dauern, bis der Tunnel wieder voll nutzbar ist."
 targeted_sabotage_remove_roadsigns_outcome:0 "Dem Team gelang es, an zahlreichen wichtigen Kreuzungen Verkehrsschilder zu entfernen und an anderen Stellen neue Schilder anzubringen, was bei den Fahrern, die sich in der Gegend nicht auskannten, für große Verwirrung sorgte."
 targeted_sabotage_immobilize_rolling_stock_outcome:0 "Das Team drang in ein Bahndepot ein und sabotierte erfolgreich mehrere Fahrzeuge. Die Auswirkungen sollten erst sichtbar werden, nachdem das Fahrzeug einige Kilometer gefahren ist und auf der offenen Strecke liegen bleibt."
 targeted_sabotage_burn_storage_outcome:0 "Dem Team gelang es, die örtlichen Lagerbereiche in Brand zu setzen, wodurch Hunderte Tonnen gelagerter Ressourcen zerstört wurden und die Möglichkeit, einen Vorrat aufrechtzuerhalten, erheblich beeinträchtigt wurde."
 targeted_sabotage_destroy_mining_equipment_outcome:0 "Dem Team gelang es, den Großteil der schweren Bergbauausrüstung zu sabotieren. Auch wenn die Schäden teilweise nur oberflächlich sind, werden sie dennoch zu erheblichen Engpässen im Produktionsfluss führen."
 steal_blueprints_bribe_outcome:0 "Wir nahmen Kontakt zu einem Ingenieur auf, der in finanziellen Schwierigkeiten steckte, und überzeugten ihn, uns im Austausch gegen konvertierbare Währung einige geheime Dokumente zu überlassen."
 steal_blueprints_seduction_outcome:0 "Unser Agent hat einen Ingenieur gefunden, der etwas persönliche Gesellschaft brauchte und sehr offen über seine Arbeit sprach."
 steal_blueprints_infiltrate_naval_design_office_outcome:0 "Unserem Agenten gelang es, einen Lieferanten für Marineausrüstung zu infiltrieren und Kopien zahlreicher Baupläne wichtiger Komponenten anzufertigen."
 steal_blueprints_steal_prototype_outcome:0 "Der Prototyp wurde erfolgreich geborgen und zu einem befreundeten Flugplatz geflogen. Unsere Ingenieure zerlegen ihn nun."
 steal_blueprints_middle_manager_outcome:0 "Die Zeit, die unser Agent in der Leitung eines kleinen Unternehmens verbrachte, hat unser Verständnis der feindlichen Wirtschaft erheblich verbessert. Wir untersuchen weiterhin Berichte, denen zufolge die Produktivität während der Tätigkeit unseres Agenten dort gestiegen ist."
 capture_cyphers_bribe_outcome:0 "Unser Agent hat im Austausch gegen einige Wertgegenstände eine vollständige Kopie des Codebuchs von einer anonymen Quelle erhalten."
 capture_cyphers_raid_outcome:0 "Einer kleinen Kommandoeinheit gelang ein erfolgreicher Überfall auf eine Radiostation und es gelang ihr, Kopien der aktuellen Chiffre zu erbeuten, bevor diese zerstört werden konnte."
 capture_cyphers_seduction_outcome:0 "Unserem Agenten gelang es, eine Person, die im Besitz der Chiffren war, davon zu überzeugen, sich von ihnen zu trennen."
 capture_cyphers_smuggle_outcome:0 "Unserem Agenten gelang es, seinen Kontakt in [From.GetNameDef] davon zu überzeugen, ihm eine vollständige Kopie der für die Kommunikation mit ihm verwendeten Chiffren zu senden."
 capture_cyphers_reverse_engineer_outcome:0 "Unser Agent hat erfolgreich ein Exemplar der Verschlüsselungsmaschine des Feindes beschafft. Obwohl sie weniger leistungsfähig ist als die militärischen Modelle, ermöglicht sie uns dennoch umfassende Einblicke in ihre Operationen."
 collaboration_government_set_up_planning_committees_outcome:0 "Das Team richtete eine Reihe von Planungsgruppen ein, um die neue Regierung zu organisieren und einen reibungslosen Machtübergang nach dem Ende der Kampfhandlungen sicherzustellen."
 collaboration_government_train_paramilitary_forces_outcome:0 "Das Team hat eine Reihe zuverlässiger Männer, einige mit militärischer Erfahrung, in kleinen paramilitärischen Einheiten organisiert, die dabei helfen werden, den Rücken unserer vorrückenden Armee zu schützen."
 collaboration_government_contact_military_officers_outcome:0 "Unser Team hat einige Kontakte zu pensionierten Militäroffizieren geknüpft, die möglicherweise davon überzeugt werden können, bei der Bildung einer neuen Regierung mitzuhelfen, sofern sie darin eine Rolle spielen können."
 free_operative_free_in_transit_outcome:0 "Mit der Unterstützung einer kleinen Kommandoeinheit konnte unser Team einen Hinterhalt verüben und unseren Agenten retten, während dieser an einen neuen Standort verlegt wurde."
 free_operative_liberate_camp_outcome:0 "Nur wenige Stunden vor dem geplanten Abtransport der Gefangenen gelang es einer kleinen Kommandoeinheit, das Gefängnis zu befreien, in dem unser Agent festgehalten wurde."
 free_operative_smuggle_in_escape_gear_outcome:0 "Unser Agent erhielt die Fluchtwerkzeuge und konnte im Schutz der Nacht erfolgreich aus dem Gefängnis ausbrechen. Er musste mehrere Tage lang Suchtrupps und Patrouillen ausweichen, bevor er Kontakt aufnehmen konnte."
 infiltrate_military_bribe_outcome:0 "Unserem Agenten gelang es, einen aktiven Soldaten gegen eine beträchtliche Geldsumme davon zu überzeugen, für uns zu arbeiten."
 infiltrate_military_seduction_outcome:0 "Unser Agent hat eine Beziehung mit einem aktiven Soldaten begonnen, der sich zu einer recht zuverlässigen Informationsquelle entwickelt hat."
 infiltrate_military_turned_pow_outcome:0 "Unsere Abteilung für psychologische Operationen hat einen Kriegsgefangenen erfolgreich von der Gerechtigkeit unserer Sache überzeugt und ihn auf die andere Seite zurückgeschickt."
 infiltrate_military_ideological_supporter_outcome:0 "Unser Agent hat Kontakt zu einer Reihe von Beamten aufgenommen, die das derzeitige [From.GetAdjective]-Regime nicht mehr unterstützen."
 resistance_contacts_radio_circuits_outcome:0 "Das Team hat Kontakt zu mehreren Widerstandseinheiten aufgenommen und sie in Funktechnik unterwiesen, wobei bei jeder Einheit ein Funker zurückgelassen wurde."
 resistance_support_pidgeons_outcome:0 "Eine Anzahl Tauben wurden hinter den feindlichen Linien abgesetzt, zusammen mit Anweisungen zu ihrer Fütterung und Pflege."
 resistance_contacts_briefings_outcome:0 "Das Team wies die Widerstandskämpfer über geplante Operationen in ihrem Sektor an, legte Prioritäten für die Informationsbeschaffung fest und arrangierte Versorgungsabwürfe."
 resistance_support_arms_depots_outcome:0 "Um die Schlagkraft des Widerstands zu erhöhen, richtet das Team an versteckten Orten mehrere Waffen- und Munitionsdepots ein."
 resistance_support_distribute_weapons_outcome:0 "Das Team verteilte Waffen an mehrere Widerstandszellen und wies die Mitglieder in deren Gebrauch ein."
 resistance_support_organize_training_outcome:0 "Das Team hielt Kurse in grundlegender Feldarbeit, Kleinwaffenwartung und Sprengung ab."
 resistance_support_coordinate_groups_outcome:0 "Das Team versammelte Vertreter der größten Widerstandsgruppen, um Operationen in größerem Maßstab angemessen zu koordinieren und sicherzustellen, dass die Vorräte dorthin geleitet werden, wo sie am dringendsten benötigt werden."
 heavy_water_raid_outcome_tt:0 "Wir werden versuchen, die deutsche Schwerwasseranlage zu zerstören und so einen Durchbruch in ihrem Atomforschungsprojekt zu verhindern."
 bruneval_raid_outcome_tt:0 "Wir werden versuchen, Komponenten der feindlichen Radartechnologie zu sichern, um unsere eigene Forschung zu unterstützen."
 capture_tito_outcome_tt:0 "Wir werden versuchen, Tito gefangen zu nehmen oder zu töten. Dies ist eine riskante Operation, die scheitern könnte."
 rescue_mussolini_outcome_tt:0 "Wir werden versuchen, Mussolini zu befreien. Dies ist eine riskante Operation, die scheitern könnte."
 coordinated_strike_scout_target:0 "Scout-Ziele"
 coordinated_strike_scout_target_desc:0 "Das Team wird die Ziele erkunden, Fotos machen und die neuesten Informationen zum Standort hochwertiger Ziele bereitstellen."
 coordinated_strike_scout_target_outcome:0 "Das Team lieferte nur wenige Stunden vor Beginn des Angriffs genaue Informationen über die Standorte der feindlichen Hauptquartiere und anderer wichtiger Orte."
 coordinate_strike_mark_targets:0 "Ziele markieren"
 coordinate_strike_mark_targets_desc:0 "Das Team wird vorab vereinbarte Signale und Markierungen verwenden, damit unsere Streitkräfte hochwertige Ziele leichter erkennen können."
 coordinate_strike_mark_targets_outcome:0 "Obwohl die Markierungen kurzfristig und im Dunkeln vorgenommen werden mussten, konnten sie unsere Truppen sehr erfolgreich zu den wichtigsten Zielen leiten."
 coordinated_strike_sabotage_communications:0 "Sabotagekommunikation"
 coordinated_strike_sabotage_communications_desc:0 "Unser Team wird Telefonleitungen kappen und Boten überfallen, um die feindliche Kommunikation in den entscheidenden ersten Stunden zu stören."
 coordinated_strike_sabotage_communications_outcome:0 "Unserem Team gelang es, die feindliche Kommunikation zu unterbrechen, was zu einer langsamen Reaktion auf unseren Angriff führte."
 coordinated_strike_direct_units:0 "Direkte Einheiten"
 coordinated_strike_direct_units_desc:0 "Wenn der Angriff beginnt, wird unser Team unsere Einheiten per Funk zu den wertvollsten Zielen dirigieren."
 coordinated_strike_direct_units_outcome:0 "Unser Team war sehr erfolgreich bei der Führung unserer Einheiten und konnte den Schaden, der dem Feind zugefügt wurde, erhöhen."
 coordinated_strike_occupy_bridges:0 "Brücken besetzen"
 coordinated_strike_occupy_bridges_desc:0 "Unser Team wird Brücken in der Gegend einnehmen, ihre Zerstörung verhindern und feindliche Gegenangriffe blockieren."
 coordinated_strike_occupy_bridges_outcome:0 "Dem Team gelang es, die Wachen an einer wichtigen Brücke zu überwältigen und die Leitungen für die Sprengladungen durchzuschneiden, sodass unsere Streitkräfte ungehindert vorrücken konnten."
 operation_coordinated_strike:0 "Koordinierter Angriff"
 operation_coordinated_strike_desc:1 "§LUm den Sieg über [From.GetNameDef] zu erringen, müssen wir einen vernichtenden Überraschungsschlag ausführen.§!\n\nBereite Luftmissionen vom Typ §YHafenangriff§! und §YStrategische Bombardierung§! in der Zielregion vor. Diese werden nach Abschluss der Operation zuschlagen und einen Krieg zwischen uns auslösen."
 coordinated_strike_tt:1 "Wir erklären §Y[From.GetNameDef]§! mit einem Überraschungsangriff den Krieg. Bei Aktivierung werden alle vorbereiteten Hafenangriffe und strategischen Bombenangriffe in der Zielregion mehrfach ausgeführt, ohne dass die Luftabwehr sie abfangen kann."
 exfiltration_air_pickup_outcome_fail:0 "„Unser Pilot fand den vorgesehenen Landeplatz hell erleuchtet durch die Scheinwerfer mehrerer feindlicher Flugabwehreinheiten vor und kam zu dem Schluss, dass die Operation gefährdet war.“"
 exfiltration_submarine_pickup_outcome_fail:0 "§RDas U-Boot wartete mehrere Stunden am vereinbarten Bergungspunkt, aber es kam keine Nachricht vom Ufer, die darauf hinwies, dass unser Team zur Bergung bereit sei. Die Besatzung meldete während dieser Zeit verstärkte feindliche Aktivitäten am Ufer.§!"
 exfiltration_border_outcome_fail:0 "§RDer Führer auf der anderen Seite der Grenze wartete vergeblich auf das Erscheinen unseres Teams, bis er seinen Posten aufgrund einer herannahenden feindlichen Patrouille verlassen musste.§!"
 exfiltration_go_to_ground_outcome_fail:0 "§RDas Team konnte sich bisher nicht zum vereinbarten Termin melden. Wir haben keine weiteren Informationen darüber, was mit ihnen passiert ist.§!"
 OPERATION_OUTLOOK_LABEL:0 "Ausblick"
 OPERATION_RISK_HEADER:0 "§HRisk:§! $VAL|-%0$"
 OPERATION_OUTCOME_HEADER:0 "§HBonus-Ergebnis:§! $VAL|+%0$"
 OPERATION_BASE:0 "Betrieb: "
 RISK_LOW:0 "§GSAFE§!"
 RISK_MID:0 "§RISKANT§!"
 RISK_HIGH:0 "§RTÖDLICH§!"
 OUTCOME_BASE:0 "§YROUTINE§!"
 OUTCOME_GOOD:0 "§GGUT§!"
 OUTCOME_VGOOD:0 "§GAUSGEZEICHNET§!"
 enemy_has_equal_or_better_radar_tech_trigger_tt:0 "Der Feind verfügt über gleichwertige oder bessere Radartechnologie."
 OPERATION_BONUS_REWARD:0 "Die Operation war ein großer Erfolg und brachte §GBonusprämien§ ein!!"
 intelligency_agency_resistance_boost_tt:0 "Geheimdienstoperationen: $VALUE|=-%0$"
 targeted_sabotage_resources_2_tt:0 "Der lokale Widerstand in [From.From.GetName] wird seine Bemühungen stärker auf die Sabotage der lokalen Ressourcengewinnung konzentrieren."
 targeted_sabotage_resources_3_tt:0 "Der lokale Widerstand in [From.From.GetName] wird große Anstrengungen unternehmen, um die lokale Ressourcengewinnung zu sabotieren."
