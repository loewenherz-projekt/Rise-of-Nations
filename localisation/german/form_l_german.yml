l_german:
 form_nation_mod_category:0 "Neue Nation gründen"
 form_nation_mod_category_desc:0 "Formbare Nationen fungieren als kosmetische Markierungen und ändern den Namen und die Kartenfarbe der Nation, jedoch nicht andere Aspekte wie nationale Schwerpunkte oder Berater. Viele formbare Nationen gewähren jedoch Kerne auf dem Territorium, die sonst nicht verfügbar sind, und ermöglichen so einer Nation, ihre Arbeitskräfte und ihre industrielle Kapazität zu erhöhen, in einigen Fällen entscheidend, obwohl viele dieser Punkte in der Praxis lediglich ultimative Ziele für ehrgeizige Spieler darstellen."
