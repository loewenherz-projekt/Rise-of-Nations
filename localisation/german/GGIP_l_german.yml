 gre_pro_ally:0 "Unterstützung der Alliierten"
 gre_anti_ally:0 "Gegen die Alliierten"
 gre_non_dem:0 "Griechenland stellt sich gegen die Demokratie"
 gre_denounce:0 "Denunziation"
 gre_support:0 "Unterstützung der Achse"
 gre_support1:0 "Unterstützung der Komintern"
 gre_friendship:0 "Zusammenarbeit mit Griechenland"

  ggip.1.t:0 "Rhodos oder Krieg"
 ggip.1.d:0 "Griechenland versucht seit Jahrzehnten, die Insel Rhodos und die umliegenden Inseln zurückzufordern. Die Tatsache, dass die Insel griechisch besiedelt ist, rechtfertigt diese Forderung. In ihrem Ultimatum erklärt die griechische Regierung ausdrücklich, dass eine Ablehnung dieser Forderung zu einem sicheren Krieg mit ihr führen würde. Können wir uns das leisten?"
 ggip.1.a:0 "Die Griechen haben recht: Es gibt für uns keinen Grund, für diese Felsen unser Blut zu vergießen."
 ggip.1.b:0 "Komm und hol sie dir!"
 ggip.2.t:0 "Italien tritt Rhodos ab"
 ggip.2.d:0 "Nach sorgfältiger Überlegung und vielen internen Debatten hat Italien beschlossen, Rhodos und die Dodekanes-Inseln an uns abzutreten. Dieser Akt beendet die jahrhundertelange westliche Besatzung griechischer Gebiete, die mit dem verräterischen 4. Kreuzzug vor über 700 Jahren begann."
 ggip.2.a:0 "Es lebe Hellas!"
 ggip.3.t:0 "Verlust in der Ägäis"
 ggip.3.d:0 "Mit der Abtretung von Rhodos und der Dodekanes-Inseln an Griechenland haben wir unsere wichtige Position in der Ägäis verloren. Dies bringt uns in eine prekäre Lage gegenüber unseren Verbündeten in Deutschland, die diese Stützpunkte zweifellos gebraucht hätten."
 ggip.3.a:0 "Verwirren Sie die Deutschen. Wir brauchen sie nicht."
 ggip.3.b:0 "Wir haben Rhodos verloren, aber vielleicht können wir Griechenland wieder in die Gemeinschaft aufnehmen."
 ggipnews.1.t:0 "Italien tritt Rhodos ab"
 ggipnews.1.d:0 "Nach einem Ultimatum Griechenlands an Italien hat sich Italien dazu entschlossen, die Insel Rhodos und die Dodekanes in der südöstlichen Ägäis an Griechenland abzutreten, anstatt sich einem umfassenden Krieg auszusetzen."
 ggipnews.1.a:0 "Die Griechen erweisen sich als potenzielle Macht."
 ggipnews.1.b:0 "Unsere Macht wächst noch weiter."
 ggip.4.t:0 "Italien weigert sich, Rhodos abzutreten"
 ggip.4.d:0 "Nach unserem Ultimatum und trotz unserer berechtigten Forderung nach unseren eigenen Inseln weigert sich Italien, eine friedliche Lösung für diese inakzeptable Übernahme griechischen Landes zu suchen. Obwohl erwartet, bedeutet dieser Ausgang Krieg. Die Italiener werden Rhodos abtreten. So oder so."
 ggip.4.a:0 "Noch einmal ins Getümmel!"
 ggipnews.2.t:0 "Italien lehnt griechisches Ultimatum ab"
 ggipnews.2.d:0 "Nach der griechischen Forderung, Rhodos und die Dodekanes-Inseln an Griechenland abzutreten, ist das Unvermeidliche eingetreten, da Italien sich weigerte, dieser Forderung nachzukommen. Wie erwartet steuern die beiden Länder auf einen Krieg zu."
 ggipnews.2.a:0 "Dies ist das Schicksal der Kriegstreiber."
 ggipnews.2.b:0 "Nach Rom!"
 ggipnews.3.t:0 "Griechenland stärkt seine Beziehungen zu Italien"
 ggipnews.3.d:0 "In Italien gibt es ein Sprichwort über Griechenland: „Una faccia, una razza“. Dieses Sprichwort gibt es in Griechenland auch als „Mia fatsa, mia ratsa“. Die Bedeutung ist in beiden Sprachen dieselbe: Ein Gesicht, eine Rasse. Vor diesem Hintergrund versucht Griechenland, die Beziehungen zu Italien zu stärken, allerdings auf Kosten etwaiger Ansprüche auf Rhodos."
 ggipnews.3.a:0 "Eine interessante Entwicklung."
 ggipnews.3.b:0 "Gemeinsam wird uns niemand standhalten können!"
 ggipnews.4.t:0 "Griechenland stärkt seine Beziehungen zum Vereinigten Königreich"
 ggipnews.4.d:0 "Angesichts der Unterstützung, die das Vereinigte Königreich Griechenland während des griechischen Unabhängigkeitskrieges gewährte, haben die Griechen beschlossen, ihre Bindungen zum Britischen Empire zu stärken und für immer auf jegliche Ansprüche auf Zypern zu verzichten."
 ggipnews.4.a:0 "Eine interessante Entwicklung."
 ggipnews.4.b:0 "Gemeinsam wird uns niemand standhalten können!"
 ggip.5.t:0 "Rhodos verlassen"
 ggip.5.d:0 "Unsere Freundschaft mit den Italienern bedeutet, dass wir unsere Ansprüche auf Rhodos und die Dodekanes aufgeben müssen. Wir hoffen, dass uns diese neue Freundschaft mit Italien langfristig stärken wird."
 ggip.5.a:0 "Mögen unsere Brüder uns vergeben."
 ggip.6.t:0 "Zypern aufgeben"
 ggip.6.d:0 "Unsere neu geschlossene Freundschaft mit dem Vereinigten Königreich hat eine schlimme Konsequenz. Wir haben vereinbart, für immer auf jegliche Ansprüche auf die Insel Zypern zu verzichten. Unsere Brüder dort bleiben unter der hoffentlich gütigen Herrschaft der Briten."
 ggip.6.a:0 "Hoffentlich wird sich dies eines Tages ändern."
 ggip.7.t:0 "Zypern oder Krieg"
 ggip.7.d:0 "Die Griechen haben uns gerade ein Ultimatum gestellt, in dem sie die Insel Zypern fordern, da sie ihnen rechtmäßig zusteht. Obwohl die Bevölkerung der Insel tatsächlich mehrheitlich aus Griechen besteht, befindet sie sich seit vielen Jahren im Besitz der Krone."
 ggip.7.a:0 "Es hat wenig Sinn, wegen Zypern in einen Krieg zu ziehen. Geben Sie es her."
 ggip.7.b:0 "Eine erbärmliche Forderung. Wir werden ihr im Krieg begegnen."
 ggip.8.t:0 "Das Britische Empire tritt Zypern ab"
 ggip.8.d:0 "Trotz aller Widrigkeiten hatte das Britische Empire beschlossen, uns die Insel Zypern abzutreten! Dies ist in der Tat ein historischer Tag, da wir nicht nur eine wichtige Insel für unsere Nation zurückgewinnen, sondern auch eine unschätzbar wertvolle strategische Position im östlichen Mittelmeer."
 ggip.8.a:0 "Enosis!"
 ggip.9.t:0 "Zypern ist verloren"
 ggip.9.d:0 "Mit der Abtretung Zyperns an die Griechen haben wir einen wichtigen Stützpunkt im östlichen Mittelmeer verloren. Das macht nichts. Griechenland mag die Insel eingenommen haben, aber sie machen sich etwas vor, wenn sie glauben, es würde sie nichts kosten."
 ggip.9.a:0 "Zum Teufel mit ihrer Politik!"
 ggipnews.5.t:0 "Die Briten treten Zypern ab"
 ggipnews.5.d:0 "Zur allgemeinen Überraschung ist das Britische Empire einem Ultimatum Griechenlands nachgegeben und forderte die Rückgabe Zyperns. In Nikosia fanden heute Feierlichkeiten statt, als der britische Gouverneur die Insel an den neuen griechischen Gouverneur übergab."
 ggipnews.5.a:0 "Wer hätte das gedacht?"
 ggipnews.5.b:0 "Dies ist eine großartige Entwicklung."
 ggip.10.t:0 "Das britische Empire lehnt Ultimatum ab"
 ggip.10.d:0 "Die Briten haben beschlossen, uns unsere berechtigte Forderung ins Gesicht zu spucken. Auf diese Weise wollen sie ihre ungerechte Herrschaft über unsere zypriotischen Brüder fortsetzen. Das kann eindeutig nicht hingenommen werden."
 ggip.10.a:0 "Auf in den Krieg!"
 ggipnews.6.t:0 "Großbritannien lehnt Ultimatum ab"
 ggipnews.6.d:0 "Es überrascht niemanden, dass Großbritannien sich weigerte, der erstaunlichen Forderung Griechenlands nachzugeben, Zypern, eine strategisch wichtige Position im östlichen Mittelmeer, abzutreten. Griechenland kam dem Ultimatum nach und erklärte England und seinen Verbündeten den Krieg."
 ggipnews.6.a:0 "Für die Griechen wird das nicht gut enden."
 ggipnews.6.b:0 "Gott ist mit uns!"
 ggip.11.t:0 "Die Aufgabe Ostthrakiens"
 ggip.11.d:0 "Unsere neue Freundschaft mit der Türkei lässt viele erschaudern. Sie gilt jedoch als wesentlicher Bestandteil unserer zukünftigen Diplomatie. Während viele uns Defätismus vorwerfen, müssen wir ihnen auch klarmachen, dass Ostthrakien für uns für immer verloren ist."
 ggip.11.a:0 "Die Stadt ist für immer verloren."
 ggipnews.7.t:0 "Griechenland gibt Rivalität mit der Türkei auf"
 ggipnews.7.d:0 "In einer erstaunlichen Entwicklung hat Griechenland seine Rivalität mit der Türkei für immer aufgegeben und sich stattdessen für einen dauerhaften Frieden mit dem langjährigen Feind entschieden. Damit einher geht der Verzicht auf alle griechischen Ansprüche auf türkischen Boden."
 ggipnews.7.a:0 "Wir werden sehen, wie das läuft."
 ggipnews.7.b:0 "Manchmal sind Opfer notwendig."
 ggip.12.t:0 "Ostthrakien oder Krieg"
 ggip.12.d:0 "Wir haben gerade ein Ultimatum der Griechen erhalten. Sie fordern die sofortige Übergabe der Region Ostthrakien einschließlich der Stadt Istanbul unter griechische Souveränität."
 ggip.12.a:0 "Wir haben keine andere Wahl, als es anzunehmen."
 ggip.12.b:0 "Sie haben eindeutig den Verstand verloren."
 ggip.13.t:0 "Die Türken treten Ostthrakien ab"
 ggip.13.d:0 "In einer unerwarteten Wendung der Ereignisse haben die Türken beschlossen, Ostthrakien an uns abzutreten! Dies ist ein historischer Tag, denn nach 600 Jahren Besatzung ist die Königin der Städte frei!"
 ggip.13.a:0 "Nach Konstantinopel!"
 ggip.14.t:0 "Istanbul ist verloren"
 ggip.14.d:0 "Die Stadt Mehmeds des Eroberers ist verloren. Verflucht seien die Griechen, die uns das aufgezwungen haben! Wir werden es nie vergessen!"
 ggip.14.a:0 "Ne mutlu Türküm diyene!"
 ggipnews.8.t:0 "Die Türken treten Ostthrakien ab"
 ggipnews.8.d:0 "Die Türkische Republik hat heute ein griechisches Ultimatum angenommen und Ostthrakien sowie die Stadt Istanbul (die umgehend in Konstantinopel umbenannt wurde) an Griechenland abgetreten. Diese Entwicklung kam unerwartet. Die Reaktion der Welt steht noch aus."
 ggipnews.8.a:0 "Wie sich der Spieß umdreht..."
 ggipnews.8.b:0 "Das Imperium ist der Wiederherstellung einen Schritt näher gekommen!"
 ggip.15.t:0 "Türkei lehnt Ultimatum ab"
 ggip.15.d:0 "Die Türken haben unsere berechtigte Forderung wenig überraschend abgelehnt. Trotzdem werden wir die Stadt zurückerobern, wie es unsere Vorfahren getan hätten. Im Krieg."
 ggip.15.a:0 "Wir werden zurückkehren und die Erde wird beben!"
 ggipnews.9.t:0 "Türkei und Griechenland steuern auf einen Krieg zu"
 ggipnews.9.d:0 "Die Türkische Republik hat sich entschieden, ein Ultimatum Griechenlands abzulehnen, das die Abtretung Ostthrakiens an Griechenland forderte. Die Ablehnung wurde mit einer Kriegserklärung Griechenlands beantwortet, und die beiden Staaten werden erneut in Konflikt geraten."
 ggipnews.9.a:0 "Kein Wunder."
 ggipnews.9.b:0 "Die Türkei soll brennen!"
 ggip.16.t:0 "Imperiale Ambitionen"
 ggip.16.d:0 "Angesichts der aktuellen Entwicklungen wäre es für uns keine abwegige Idee, die Wiederherstellung unseres einst glorreichen Imperiums in Erwägung zu ziehen."
 ggip.16.a:0 "En touto Nika!"
 ggip.17.t:0 "Verlassen des nördlichen Epirus"
 ggip.17.d:0 "Unsere neue Freundschaft mit Albanien erfordert das Zusammenleben von Griechen und Albanern in der Region Epirus, im Norden und im Süden. Daher haben wir unsere Ansprüche auf Nord-Epirus aufgegeben, während die Albaner ihre Ansprüche auf Süd-Epirus, oder Camëria, wie sie es nennen, aufgegeben haben."
 ggip.17.a:0 "Vielleicht ist es das Beste."
 ggipnews.10.t:0 "Griechenland stärkt seine Beziehungen zu Albanien"
 ggipnews.10.d:0 "Nach einigen Jahrzehnten der Feindseligkeit haben Griechenland und Albanien beschlossen, ihre Beziehungen zu stärken, indem sie entweder ihre gegenseitigen Ansprüche auf die Region Epirus aufgeben und sich stattdessen für eine Koexistenz entscheiden."
 ggipnews.10.a:0 "Eine unerwartete Freundschaft."
 ggipnews.10.b:0 "Wir werden die Entwicklungen beobachten."
 ggip.18.t:0 "Nordepirus oder Krieg"
 ggip.18.d:0 "Unsere Nachbarn im Süden Griechenlands haben von uns die Übergabe von Toskeria verlangt, einer Region, die sie „Nord-Epirus“ nennen. Sie drohen uns mit Krieg, sollten wir dieser Forderung nicht nachkommen, während ihre Armeen an unserer Grenze bereitstehen."
 ggip.18.a:0 "Angesichts der italienischen Bedrohung müssen wir sie akzeptieren."
 ggip.18.b:0 "Sie können es versuchen!"
 ggip.19.t:0 "Albanien tritt Nordepirus ab"
 ggip.19.d:0 "Wie erwartet haben die Albaner beschlossen, unseren Forderungen nachzugeben und uns unser rechtmäßiges Land zu übergeben."
 ggip.19.a:0 "Nach Argyrokastron!"
 ggip.20.t:0 "Verrat!"
 ggip.20.d:0 "Jahrelang galten Griechenland als Verbündeter und Freund. Mit der Einnahme unseres Landes haben sie unsere Hoffnungen zerstört. Dieses Vergehen wird niemals vergeben oder vergessen werden."
 ggip.20.a:0 "Zur Hölle mit ihnen!"
 ggipnews.11.t:0 "Albanien tritt südliches Territorium an Griechenland ab"
 ggipnews.11.d:0 "Nachdem die Albaner von ihren mächtigeren Nachbarn im Süden ein Ultimatum erhalten hatten, beschlossen sie, Nordepirus bzw. Toskeria an die Griechen zu übergeben."
 ggipnews.11.a:0 "Die Starken werden immer die Schwachen ausbeuten."
 ggipnews.11.b:0 "Eine deutliche Verbesserung!"
 ggip.21.t:0 "Albanien weist Forderung zurück"
 ggip.21.d:0 "Die Albaner haben beschlossen, unsere berechtigte Forderung abzulehnen. Sie werden unter unseren Streitkräften zusammenbrechen!"
 ggip.21.a:0 "Für Hellas!"
 ggipnews.12.t:0 "Griechenland marschiert in Albanien ein"
 ggipnews.12.d:0 "Nachdem Albanien sein Ultimatum für Nordepirus abgelehnt hatte, beschloss Griechenland, seinem nördlichen Nachbarn den Krieg zu erklären und marschierte umgehend ein."
 ggipnews.12.a:0 "Besorgniserregend."
 ggipnews.12.b:0 "Der Sieg gehört uns!"
 ggip.22.t:0 "Bündnis mit Griechenland"
 ggip.22.d:0 "Nachdem wir unser Bündnis und unsere Freundschaft mit Griechenland gefestigt haben, sind unsere neuen Freunde mit einem neuen Angebot an uns herangetreten, eine gemeinsame Verteidigungsfront gegen etwaige Bedrohungen für uns zu bilden."
 ggip.22.a:0 "Das soll uns beide stärken!"
 ggip.22.b:0 "Niemals!"
 ggip.23.t:0 "Allianz abgelehnt"
 ggip.23.d:0 "Albanien hat unser Angebot abgelehnt, obwohl es für uns beide offensichtliche Vorteile hätte. Das bedeutet Krieg."
 ggip.23.a:0 "Auf in die Schlacht!"
 gre_political.0.t:0 "Demertzis ist tot!"
 gre_political.0.d:0 "Heute ist der griechische Ministerpräsident Konstantinos Demertzis an einem Herzinfarkt gestorben. Der Posten des Ministerpräsidenten ist nun vakant und muss neu besetzt werden."
 gre_political.0.option.a:0 "Ernennung von Metaxas"
 gre_political.0.option.b:0 "Papagos ernennen"
 gre_political.0.option.c:0 "Georg II. soll allein herrschen"
 gre_political.0.option.d:0 "Ernennen Sie Tsaldaris"
 gre_political.0.option.e:0 "Ernennung von Venizelos"
 gre_papagos.0.t:0 "Griechenland lädt uns zum Balkanpakt ein"
 gre_papagos.0.d:0 "Alexandros Papagos&#39; Außenminister Ioannis Metaxas hat eine Botschaft von Premier Papagos überbracht, in der er angesichts der zunehmenden Spannungen in Europa eine Formalisierung und Stärkung des Balkanpakts fordert. Sollten wir den Pakt annehmen, wären wir verpflichtet, zu den Waffen zu greifen, wenn eines der Mitgliedsländer angegriffen wird."
 gre_papagos.0.a:0 "Änderungen zustimmen"
 gre_papagos.0.b:0 "Bulgarien stellt eine viel geringere Bedrohung dar als Deutschland. Absolut nicht."
 gre_papagos.0.c:0 "Gemeinsam können wir den Sturm überstehen"


  greek_focus:0 "Griechischer Nationaler Fokusbaum"
  GRE_ModernizationEffort:0 "Modernisierungsbemühungen"
  GRE_ModernizationEffort_desc:0 "Die nationale Industrie befindet sich in einem beklagenswerten Zustand. Es ist Zeit für uns, sie zu verbessern."
  GRE_Urbanization:0 "Urbanisierung"
  GRE_Urbanization_desc:0 "In der modernen Zeit verlassen die Menschen ihre Dörfer und ziehen in die Großstädte, um die nationale Industrie zu stärken."
  GRE_Armament:0 "Allgemeine Bewaffnung"
  GRE_Armament_desc:0 "Die Waffenproduktion reicht für den bevorstehenden Krieg bei weitem nicht aus. Der Staat muss die Mittel schaffen, die unserer Nation zur Selbstverteidigung zur Verfügung stehen."
  GRE_ImproveInfrastructure:0 "Infrastruktur verbessern"
  GRE_ImproveInfrastructure_desc:0 "Viele Gebiete in Sterea Hellas, Thessalien und Epirus sind aufgrund fehlender Straßen nicht erreichbar. Einziger Weg sind Eselspfade. Die einzige Lösung besteht darin, sich auf dieses Problem zu konzentrieren."
  GRE_NatIntAg:0 "Nationale Geheimdienstagentur"
  GRE_NatIntAg_desc:0 "Durch die Gründung der EYP, der National Intelligence Agency, wird uns nichts verborgen bleiben."
  GRE_DemLeg:0 "Nationale Atomforschungsstiftung"
  GRE_DemLeg_desc:0 "Die NARF wird den Weg zu unserer nationalen Sicherheit ebnen, indem sie eine Waffe baut, die unser dauerhaftes Durchhaltevermögen in der neuen Welt sicherstellen wird."
  GRE_FORTH:0 "Stiftung für Forschung und Technologie"
  GRE_FORTH_desc:0 "Die Stiftung für Forschung und Technologie mit Sitz in Heraklion auf Kreta soll zur weiteren Entwicklung des Landes beitragen."
  GRE_Improved_Construction:0 "Verbesserte Konstruktion"
  GRE_Improved_Construction_desc:0 "In unserem Land mangelt es an Baumaterialien und modernen Methoden. Wir sollten versuchen, dieses Problem zu beheben."
  GRE_National_Railway:0 "Nationale Eisenbahn"
  GRE_National_Railway_desc:0 "Abgesehen von einigen Regionen ist ein Großteil des Landes aufgrund der bergigen Landschaft des Landes unzugänglich. Die Nationalbahn soll einen schnellen Zugang zu den entlegensten Orten ermöglichen."
  GRE_Island_Infrastructure:0 "Inselinfrastruktur"
  GRE_Island_Infrastructure_desc:0 "Trotz des strategischen Werts unserer Inseln sind sie nahezu verarmt und ihre Bevölkerung lebt unter mittelalterlichen Bedingungen. Wir sollten uns bemühen, die Bedingungen in der Region zu verbessern."
  GRE_General_Development:0 "Allgemeine Entwicklung"
  GRE_General_Development_desc:0 "Trotz unserer Bereitschaft fehlt unseren Städten die Infrastruktur für den Bau neuer Fabriken. Wir sollten uns zunächst um die Verbesserung des Vorhandenen kümmern, bevor wir versuchen, Neues zu bauen."
  GRE_National_Computing_Centre:0 "Nationales Rechenzentrum"
  GRE_National_Computing_Centre_desc:0 "Das National Computing Centre soll unserer Nation den Zugang zu Computern ermöglichen, die in der Zukunft wohl eine ganz wichtige Rolle spielen."
  GRE_National_Computing_Centre_2:0 "Informatik-Fokus"
  GRE_National_Computing_Centre_2_desc:0 "Die Zukunft liegt in der Informatik. Daher sollten wir danach streben, unser Wissen über diese neue Wissenschaft so weit wie irgend möglich zu erweitern."
  GRE_EKA:0 "Athener Forschungszentrum"
  GRE_EKA_desc:0 "Das neue Forschungszentrum in der Hauptstadt bietet uns eine weitere Möglichkeit, neue Technologien zu erschließen."
  GRE_Develop_Thrace:0 "Thrakien entwickeln"
  GRE_Develop_Thrace_desc:0 "Thrakien verfügt über reichlich fruchtbaren Boden und fleißige Menschen. Auf diese Weise können wir die Produktion unseres Landes insgesamt verbessern."
  GRE_Fourth_of_August:0 "4. August"
  GRE_Fourth_of_August_desc:0 "Für unsere nationale Einheit! Für unseren König! Es lebe das eine und unteilbare Griechenland!"
  GRE_EON:0 "Nationale Jugendorganisation"
  GRE_EON_desc:0 "Die Zukunft unseres Vaterlandes ruht auf dem Rücken unserer Jugend. Sie sind es, die unsere Nation zum Ruhm führen werden."
  GRE_Way_to_Fascism:0 "Der Weg zum Faschismus"
  GRE_Way_to_Fascism_desc:0 "Unser Führer hat entschieden, dass es für unsere Nation vorzuziehen sei, auf der Welle zu reiten, wenn sie die bevorstehende faschistische Welle in Europa überleben wolle."
  GRE_THC:0 "Dritte hellenische Zivilisation"
  GRE_THC_desc:0 "Die Zukunft unserer Nation hängt nicht länger von den Launen des Auslands ab. Aus der Asche des antiken Griechenlands und Byzanz wird ein Drittes Griechenland entstehen."
  GRE_Militarism:0 "Militarismus"
  GRE_Militarism_desc:0 "Das Überleben einer Nation hängt von ihren Streitkräften ab. Die Armee ist die Säule des Reiches und eine Säule muss stark sein."
  GRE_Mass_Conscription:0 "Massenrekrutierung"
  GRE_Mass_Conscription_desc:0 "Niemand, der ein Gewehr oder ein Messer halten kann, darf sich mit den Frauen und Kindern verkriechen, während die Jugend kämpft! Alle müssen dem Ruf der Pflicht folgen!"
  GRE_Yparano_Olon:0 "Hellas über alles"
  GRE_Yparano_Olon_desc:0 "Die Verteidigung unseres Vaterlandes und sein Wohlstand sind beides Angelegenheiten von höchster Bedeutung. Wir werden sie nicht länger ignorieren. Hellas über alles!"
  GRE_FKAC:0 "Für König und Vaterland"
  GRE_FKAC_desc:0 "Der Wohlstand des Reiches und unseres Volkes hängt von den Säulen der Nation ab. Unserem König, unserem Führer, unserem Glauben, unserer Armee, unserem Volk. Für sie werden wir kämpfen."
  GRE_Metaxas_Line:0 "Die Metaxas-Linie"
  GRE_Metaxas_Line_desc:0 "Die Wiederbewaffnung Bulgariens könnte bedeuten, dass sie Pläne haben, Thrakien zu beanspruchen. Sobald sie jedoch von unserer Verteidigungslinie erfahren, wird es ihnen schwerfallen, dies zu erreichen."
  GRE_Defensive_Focus:0 "Defensiver Fokus"
  GRE_Defensive_Focus_desc:0 "Die Verteidigung unseres Vaterlandes ist von größter Bedeutung. Daher müssen wir unsere Methoden zur Verteidigung dessen, was uns gehört, verbessern."
  GRE_Infantry_Focus:0 "Infanterie-Fokus"
  GRE_Infantry_Focus_desc:0 "Die Infanterie ist der wichtigste Teil jeder Armee. Wir dürfen nicht zulassen, dass unsere ins Hintertreffen gerät."
  GRE_Motorization:0 "Motorisierung"
  GRE_Motorization_desc:0 "Das Zeitalter der Pferde liegt weit hinter uns. Die moderne Kavallerie ist motorisiert, und das muss auch bei uns der Fall sein."
  GRE_Artillery_Support:0 "Artillerieunterstützung"
  GRE_Artillery_Support_desc:0 "Der Nutzen der Artillerie ist seit vielen Jahrhunderten erwiesen. Keine Armee kann ohne ihre Unterstützung effektiv vorgehen."
  GRE_Anti_Tank_Divisions:0 "Panzerabwehrdivisionen"
  GRE_Anti_Tank_Divisions_desc:0 "Viele unserer potenziellen Feinde haben sich Panzerunterstützung gesichert. Wenn wir gegen sie eine Chance haben wollen, müssen wir darauf vorbereitet sein, ihnen mit Waffen entgegenzutreten, die sie zerstören können."
  GRE_Fortify_Epirus:0 "Befestigen Sie Epirus"
  GRE_Fortify_Epirus_desc:0 "Epirus ist unsere Grenze im Nordwesten. Wir können nicht zulassen, dass es unverteidigt bleibt."
  GRE_Armored_Effort:0 "Gepanzerte Anstrengung"
  GRE_Armored_Effort_desc:0 "Panzerdivisionen sind das wichtigste Werkzeug moderner Armeen. Leider mangelt es in unserem Land an diesem wichtigen Werkzeug, aber das kann sich ändern."
  GRE_Medium_Tank:0 "Mittlere Panzer"
  GRE_Medium_Tank_desc:0 "Unter allen Arten gepanzerter Fahrzeuge scheinen mittlere Panzer die praktischsten zu sein. Indem wir uns auf ihre Herstellung konzentrieren, sichern wir unsere Vorherrschaft."
  GRE_Advanced_Training:0 "Weiterbildung"
  GRE_Advanced_Training_desc:0 "Durch die gesammelte Erfahrung unserer Armee und das Wissen unserer Kollegen werden wir eine der besten Armeen der Region ausbilden."
  GRE_RHAF:0 "Königlich Griechische Luftwaffe"
  GRE_RHAF_desc:0 "Die königlich-griechische Luftwaffe ist nach wie vor eine lächerlich schlecht ausgerüstete und veraltete Truppe. Es ist Zeit, dies zu ändern."
  GRE_Air_Doctrine:0 "Luftdoktrin"
  GRE_Air_Doctrine_desc:0 "Wenn auch unsere Effizienz steigen soll, müssen die Lufttaktiken verbessert werden."
  GRE_Fighter_Innovations:0 "Kämpferinnovationen"
  GRE_Fighter_Innovations_desc:0 "Die Luftüberlegenheit ist und bleibt das, was für immer über die Herrschaft am Himmel entscheidet. Kampfflugzeuge werden uns dabei helfen, dieses Ziel zu erreichen."
  GRE_Naval_Bomber_Innovations:0 "Innovationen bei Marinebombern"
  GRE_Naval_Bomber_Innovations_desc:0 "Unser Land war schon immer ein Land der Seeleute. Marineoperationen werden immer von größter Bedeutung sein. Die Möglichkeit, Bombenangriffe auf See durchzuführen, wird unsere Kampfkraft erheblich verbessern."
  GRE_Heavy_Fighter_Innovations:0 "Innovationen bei schweren Kampfflugzeugen"
  GRE_Heavy_Fighter_Innovations_desc:0 "Schwere Jäger sind zwar größer und langsamer, verfügen aber über eine stärkere Panzerung und Feuerkraft. Sie werden zu unserem Sieg beitragen."
  GRE_Medium_Bomber_Focus:0 "Fokus auf mittleren Bomber"
  GRE_Medium_Bomber_Focus_desc:0 "Mittelschwere Bomber sorgen für die absolute Zerstörung der Bodenanlagen unserer Feinde."
  GRE_Light_Bomber_Focus:0 "Fokus auf leichten Bomber"
  GRE_Light_Bomber_Focus_desc:0 "Obwohl sie über eine geringere Zerstörungskraft verfügen, ist die Wahrscheinlichkeit, dass leichte Bomber ihre Missionen erfolgreich abschließen, höher."
  GRE_Airforce_Modernization:0 "Modernisierung der Luftwaffe"
  GRE_Airforce_Modernization_desc:0 "Unsere Luftwaffe muss modernisiert werden, um mit denen mächtigerer Nationen konkurrieren zu können."
  GRE_Rocket_Development:0 "Raketenentwicklung"
  GRE_Rocket_Development_desc:0 "Raketen bieten uns die Möglichkeit, unsere Feinde zu vernichten, ohne dass wir dabei Menschenleben verlieren. Ihre Entwicklung wird sich mit der Zeit bewähren."
  GRE_Hellenic_Armada:0 "Hellenische Armada"
  GRE_Hellenic_Armada_desc:0 "Die Kontrolle über das Meer ist von größter Bedeutung. Trotz der ausgedehnten Küsten und natürlichen Häfen unseres Vaterlandes sind wir schlecht für den Bau von Schiffen gerüstet."
  GRE_Naval_Doctrine:0 "Marinedoktrin"
  GRE_Naval_Doctrine_desc:0 "Durch die Verbesserung unserer Taktik auf See sichern wir unsere Vorherrschaft auf den Meeren."
  GRE_Light_Ships:0 "Leichte Schiffe"
  GRE_Light_Ships_desc:0 "Aufgrund ihrer geringen Größe und Nützlichkeit sind sie leicht zu bauen und im Kampf äußerst nützlich"
  GRE_Medium_Ships:0 "Mittlere Schiffe"
  GRE_Medium_Ships_desc:0 "Diese Schiffe mittlerer Größe und ähnlicher Preisklasse zeichnen sich durch Manövrierfähigkeit und Feuerkraft aus und bilden den Großteil unserer zukünftigen Flotten."
  GRE_Capital_Ships:0 "Großkampfschiffe"
  GRE_Capital_Ships_desc:0 "Diese großen, mächtigen und schwerfälligen Schiffe werden unsere Flotte in den kommenden Kriegen anführen."
  GRE_DD:0 "Zerstörer-Innovationen"
  GRE_DD_desc:0 "Zerstörer sind schnelle und mobile Schiffe mit hervorragenden Fähigkeiten zur Abwehr von U-Booten."
  GRE_CL:0 "Innovationen für leichte Kreuzer"
  GRE_CL_desc:0 "Leichte Kreuzer sind günstiger und kleiner als ihre schwereren Gegenstücke. Sie werden den Großteil unserer Flotte bilden"
  GRE_SS:0 "U-Boot-Innovationen"
  GRE_SS_desc:0 "U-Boote sind das effizienteste Mittel zur Tarnung in der Seekriegsführung. Obwohl unsere Flotte über keinerlei U-Boote verfügt, wird ihre Anschaffung das Blatt deutlich zu unseren Gunsten wenden."
  GRE_SSD:0 "U-Boot-Doktrin"
  GRE_SSD_desc:0 "Durch die Verbesserung unserer Taktiken mit U-Booten werden unsere Möglichkeiten zur Konvoi-Abwehr noch größer."
  GRE_CA:0 "Innovationen für schwere Kreuzer"
  GRE_CA_desc:0 "Schwere Kreuzer sind größer und leistungsstärker als ihre leichteren Gegenstücke. Ihre kostengünstige Konstruktion und die schweren Waffen machen sie zu einem wichtigen Bestandteil jeder Marine."
  GRE_BC:0 "Innovationen bei Schlachtkreuzern"
  GRE_BC_desc:0 "Schlachtkreuzer stellen einen guten Mittelweg zwischen Schlachtschiffen und Schweren Kreuzern dar. Sie wären ideal für Operationen, bei denen ein solcher Kompromiss erforderlich ist."
  GRE_BB:0 "Schlachtschiff-Innovationen"
  GRE_BB_desc:0 "Schlachtschiffe, Festungen der Meere. Obwohl die Massenproduktion nicht einfach ist, kann jede ernstzunehmende Marine der Welt mit einigen dieser Monster aufwarten."
  GRE_SHBB:0 "Innovationen bei superschweren Schlachtschiffen"
  GRE_SHBB_desc:0 "Superschwere Schlachtschiffe sind selten und imposant. Sie sind die größten Schiffe auf See und der Stolz jeder Marine. Sie sind selten, und wenn wir eines besitzen, wird das den Ausschlag zu unseren Gunsten geben."
  GRE_CV:0 "Carrier-Innovationen"
  GRE_CV_desc:0 "Flugzeugträger ermöglichen Luftoperationen auf See. Ihr Nutzen wird mit der Zeit immer deutlicher. Nur Narren werden ihre Rolle in der Zukunft des Seekampfes ignorieren."
  GRE_Spec1:0 "Kleiner und zahlreicher"
  GRE_Spec1_desc:0 "Was uns an Feuerkraft fehlt, werden wir durch die Anzahl wettmachen"
  GRE_Spec2:0 "Groß und leistungsstark"
  GRE_Spec2_desc:0 "Unsere Flotte ist zwar nicht sehr groß, wird ihre Feinde jedoch mit purer Feuerkraft zerschmettern."
  GRE_MTTTK:0 "Méga to tis Thalássis Krátos"
  GRE_MTTTK_desc:0 "Wie Thukydides einst sagte: „Mega ist Thalassis Kratos.“ Groß ist die Beherrschung der Meere. Unsere Flotten werden die unserer Feinde zu Asche zermahlen."
  GRE_National_Deplomacy:0 "Nationale Diplomatie"
  GRE_National_Deplomacy_desc:0 "Die Feder ist eine mächtigere Waffe als das Schwert."
  GRE_Pro_Ally:0 "Unterstützung der Alliierten"
  GRE_Pro_Ally_desc:0 "Die Unterstützung der Alliierten ist eindeutig die beste Wahl, da sie letztendlich über das Schicksal der Welt entscheiden werden."
  GRE_Dem_Pol:0 "Demokratische Politik"
  GRE_Dem_Pol_desc:0 "Unsere athenischen Vorfahren haben die Demokratie erfunden, wir sollten ihrem Beispiel folgen."
  GRE_Dem_Align:0 "Auf der Seite der Alliierten"
  GRE_Dem_Align_desc:0 "Die Alliierten zu unterstützen ist schön und gut, doch wenn wir an der Zukunft, die sie aufbauen, teilhaben wollen, müssen wir mit ihnen bluten."
  GRE_Ionian_Shield:0 "Der Ionische Schild"
  GRE_Ionian_Shield_desc:0 "Das Ionische Meer stellt unsere Barriere zum faschistischen Italien dar. Um uns gegen eine mögliche Invasion zu verteidigen, sollten wir unsere Westgrenze verstärken."
  GRE_Den_Axis:0 "Denunzieren Sie die Achse"
  GRE_Den_Axis_desc:0 "Die Achsenmächte sind nichts weiter als ein Haufen größenwahnsinniger Idioten. Sie stellen ein Hindernis für eine friedliche Welt dar."
  GRE_Den_Comn:0 "Denunzieren Sie die Komintern"
  GRE_Den_Comn_desc:0 "Der Kommunismus ist der Zwilling des Faschismus. Wir werden nicht zulassen, dass Leute wie Stalin und seinesgleichen diese Welt beherrschen."
  GRE_Demand_Dodecanese:0 "Nachfrage Rhodos"
  GRE_Demand_Dodecanese_desc:0 "Die Italiener halten die Insel Rhodos und die Dodekanes schon viel zu lange. Es ist an der Zeit, dass wir unsere Forderung öffentlich machen."
  GRE_Pro_Axis:0 "Unterstützung der Achse"
  GRE_Pro_Axis_desc:0 "Die Achsenmächte repräsentieren eine stärkere, bessere und wahrere Welt. Wir werden ihren Kampf unterstützen."
  GRE_Fas_Pol:0 "Faschistische Politik"
  GRE_Fas_Pol_desc:0 "Die Gesellschaft unserer spartanischen Vorfahren basierte auf Ordnung und Stärke. Wir werden in ihre Fußstapfen treten."
  GRE_Fas_Align:0 "Der Eiserne Pakt"
  GRE_Fas_Align_desc:0 "Es genügt uns nicht, unser gemeinsames Ziel mit Deutschland und Italien zu bekennen. Wir sollten der Welt unsere Absicht erklären, an ihrer Seite zu stehen."
  GRE_Aegean_Shield:0 "Der Ägäische Schild"
  GRE_Aegean_Shield_desc:0 "Sollten die Briten jemals in einen Krieg mit ihnen verwickelt werden, werden sie höchstwahrscheinlich versuchen, die Ägäis zu überqueren. Wir sollten die Ägäis befestigen."
  GRE_Den_Allies:0 "Denunzieren Sie die Alliierten"
  GRE_Den_Allies_desc:0 "Die Alliierten halten sich für die rechtmäßigen Herren der Welt. Ihre Vorstellung, sie könnten über die Zukunft der Nationen entscheiden, ist eine Täuschung."
  GRE_Den_Comn2:0 "Den Kommunismus verurteilen"
  GRE_Den_Comn2_desc:0 "Die Marxisten sind eine Plage für die Gesellschaft. Eine Plage muss immer ausgemerzt werden. Das Schicksal des Marxismus wird nicht anders sein."
  GRE_Demand_Cyprus:0 "Nachfrage Zypern"
  GRE_Demand_Cyprus_desc:0 "Zypern liegt in den Händen der Briten. Es ist eine griechische Insel und wir werden erneut Anspruch darauf erheben."
  GRE_Pro_Commintern:0 "Unterstützung der Komintern"
  GRE_Pro_Commintern_desc:0 "Der Kommunismus ist die Hoffnung der Menschheit auf Gleichheit und Frieden. Wir erklären unsere Unterstützung für die Sowjetunion."
  GRE_Com_Pol:0 "Kommunistische Politik"
  GRE_Com_Pol_desc:0 "Gemäß den Lehren von Marx, Engels und Lenin werden wir unsere korrupte Gesellschaft umstrukturieren."
  GRE_Com_Align:0 "Der Purpurne Pakt"
  GRE_Com_Align_desc:0 "Nach Jahren des Faschismus und der Monarchie ist Griechenland endlich aus dem Griff des Bösen befreit. Wir dürfen nicht länger tatenlos zusehen. Unsere Zeit ist gekommen."
  GRE_Aegean_Shield2:0 "Verteidige den Süden"
  GRE_Aegean_Shield2_desc:0 "Die Briten und ihre Verbündeten haben Stützpunkte im östlichen Mittelmeer. Zweifellos würden sie versuchen, in unser Gebiet einzudringen, wenn sie die Gelegenheit dazu bekämen. Wir werden sie aufhalten, indem wir unsere südlichen Grenzen befestigen."
  GRE_Ionian_Shield2:0 "Verteidige den Westen"
  GRE_Ionian_Shield2_desc:0 "Unsere westlichen Grenzen entlang des Ionischen Meeres sind von faschistischem Abschaum belagert. Wenn wir sie befestigen, haben wir bessere Chancen, mit denen fertig zu werden, die unser Volk in Ketten legen wollen."
  GRE_Den_Allies2:0 "Denunzieren Sie die Kapitalisten"
  GRE_Den_Allies2_desc:0 "Die sogenannten Alliierten sind der Teufel, vor dem Marx uns in seinem großen Manifest gewarnt hat. Nie wieder werden wir ihren Lügen Glauben schenken."
  GRE_Den_Axis2:0 "Denunzieren Sie die Faschisten"
  GRE_Den_Axis2_desc:0 "Die faschistischen Hunde wagen es, die Erde zu betreten. Wir werden unsere Abscheu vor ihrer bösartigen Vorgehensweise öffentlich kundtun."
  GRE_Demand_Cyprus2:0 "Nachfrage Zypern"
  GRE_Demand_Cyprus2_disc:0 "Die imperialistischen englischen Hunde halten das Land des freien griechischen Volkes unter ihrer Fuchtel. Sie müssen es abgeben oder die Konsequenzen tragen."
  GRE_Demand_Dodecanese2:0 "Fordern Sie den Dodekanes"
  GRE_Demand_Dodecanese2_desc:0 "Die italienischen Faschisten besitzen noch immer Land, das rechtmäßig dem griechischen Volk gehört. Sie werden es uns geben oder unseren Zorn zu spüren bekommen."
  GRE_The_Lone_Way:0 "Der einsame Weg"
  GRE_The_Lone_Way_desc:0 "Keine der Fraktionen dient unseren Interessen. Wir werden unseren eigenen Weg in dieser Welt gehen."
  GRE_Rhodes_or_war:0 "Rhodos oder Krieg"
  GRE_Rhodes_or_war_desc:0 "Unsere Streitkräfte reichen aus, um die Italiener dazu zu bewegen, uns Rhodos ohne Blutvergießen zu überlassen. Das ist zumindest unsere Hoffnung. Sollten sie uns die Erlaubnis verweigern, werden wir sie bekämpfen."
  GRE_Befriend_Italy:0 "Befreunde dich mit Italien"
  GRE_Befriend_Italy_desc:0 "Die Italiener könnten uns in Zukunft angreifen. Angesichts unserer Lage wäre es am besten, einen dauerhaften Frieden mit ihnen zu schließen. Rhodos müssten wir jedoch aufgeben."
  GRE_Befriend_UK:0 "Befreunde dich mit den Briten"
  GRE_Befriend_UK_desc:0 "Die Briten könnten Griechenland eine strategisch wichtige Position zuschreiben und es deshalb für lohnenswert halten, uns anzugreifen. Wir können mit ihnen Frieden schließen, vorausgesetzt, wir geben Zypern auf."
  GRE_Cyprus_or_war:0 "Zypern oder Krieg"
  GRE_Cyprus_or_war_desc:0 "Wir können den Briten ein Ultimatum stellen und unter Kriegsdrohung die Befreiung Zyperns fordern. Wir hoffen, dass ihre anderen Feinde und unsere neue Armee sie davon abhalten, eine neue Front zu eröffnen."
  GRE_Befriend_Turkey:0 "Befreunde dich mit der Türkei"
  GRE_Befriend_Turkey_desc:0 "So unangenehm es auch klingen mag, die Türkei könnte ein starker Verbündeter sein. Wir könnten den Frieden zwischen uns sichern, wenn wir unsere Hoffnungen auf die Rückeroberung unserer ehemaligen Ländereien aufgeben."
  GRE_ET_or_war:0 "Ostthrakien oder Krieg"
  GRE_ET_or_war_desc:0 "Wir können den Türken ein Ultimatum stellen und die Rückgabe unseres rechtmäßigen Landes fordern. Sollten sie sich weigern, werden wir angreifen und dieses Mal werden sie fallen."
  GRE_Imperial_Ambition:0 "Imperiale Ambitionen"
  GRE_Imperial_Ambition_desc:0 "Die jüngsten Entwicklungen in der Türkei bieten uns möglicherweise die erste echte Chance seit Jahrhunderten, das verlorene Byzanz wiederherzustellen. Diese Chance dürfen wir uns nicht entgehen lassen."
  GRE_Influence_Albania:0 "Einfluss Albanien"
  GRE_Influence_Albania_desc:0 "Albanien war schon immer wie eine kleine Schwester Griechenlands. Schwestern streiten, aber sie versöhnen sich. Wir könnten unsere überlegene politische Macht nutzen, um Albanien zu beeinflussen."
  GRE_Befriend_Albania:0 "Befreunde dich mit Albanien"
  GRE_Befriend_Albania_desc:0 "Viele Albaner haben im Unabhängigkeitskrieg gegen uns gekämpft. Aber noch mehr haben mit uns gekämpft. Wir können kleinliche Streitereien beilegen und einen dauerhaften Frieden mit unseren nördlichen Nachbarn schließen."
  GRE_Tosk_or_war:0 "Nordepirus oder Krieg"
  GRE_Tosk_or_war_desc:0 "Unser Einfluss hat Albaniens Position geschwächt. Unsere Armee ist besser ausgebildet und ausgerüstet. Wir können Nordepirus unter Kriegsdrohung fordern. Sollten sie sich weigern, werden sie zerschlagen."
  GRE_Albania_Ally:0 "Die Balkanachse"
  GRE_Albania_Ally_desc:0 "Unsere Freundschaft mit Albanien hat ein Niveau erreicht, auf dem wir offiziell mit ihnen verbünden können. Wir werden uns keiner der großen Fraktionen anschließen, sondern unsere eigene schmieden. Eine Front auf dem Balkan."
  GRE_Special_Forces:0 "Spezialeinheiten"
  GRE_Special_Forces_desc:0 "Das Militär eines Landes ist nichts ohne seine Spezialkräfte. Wir werden nicht diejenigen sein, denen sie fehlen."
