 ww2tree.10.t:0 "Der Putsch"
 ww2tree.11.t:0 "Unvorhergesehene Nebenwirkungen"
 ww2tree.12.t:0 "Zeit zum Handeln"
 ww2tree.12.d:0 "[ROOT.GetLeader] sprach heute im Radio, eine Sendung, die im ganzen Land gehört wurde, sogar von den eher armen einfachen Leuten.\n\n\&quot;Meine Landsleute. Wir treten in eine neue Ära ein, eine Ära voller Veränderungen, und ich weiß, dass ihr euch darüber Sorgen macht. Aber ich kann euch versprechen: Wir werden das als Nation, als Volk, überstehen. Hört nicht auf diese verräterischen Kommunisten oder diese schwachen Liberalen. Sie wollen nur unsere großartige Regierung stürzen und unser geliebtes Land mit ihrer ineffizienten und korrupten Regierungsweise in Destabilisierung und Chaos stürzen. Das kann nicht sein, und ich werde das nicht zulassen! Aber ich kann es nicht alleine schaffen. Ich brauche eure Unterstützung, um dieses Ziel zu erreichen. Nur gemeinsam werden wir als Nation stark sein und diese turbulenten Zeiten überstehen. Jeder Einzelne von euch muss seinen Teil dazu beitragen. Sei es in den Fabriken, in unserem ehrenwerten Militär oder auch als einfache Hausfrau und Mutter. Gemeinsam können wir [Root.GetNameDef] zu seinem früheren Glanz zurückführen! Gemeinsam werden wir Steht dem kommenden Sturm mit mir auf eurem Haupt standhaft gegenüber! Für [Root.GetNameDef]!\&quot;\n\nIn den folgenden Tagen startete die Geheimpolizei groß angelegte Razzien gegen kommunistische und demokratische Untergrundnetzwerke, und viele Anführer sind inzwischen entweder tot oder verhaftet. Die zivilen Opfer sind minimal und die Zivilbevölkerung ist sich der Ereignisse nicht bewusst. Bedauerlicherweise konnte der Anführer der [Root.GetCommunistParty] zu einem unserer Nachbarn entkommen."
 ww2tree.12.a:0 "Das ist endlich geschafft."
 ww2tree.13.t:0 "Keine Adligen mehr"
 ww2tree.13.d:0 "Der Adel von [Root.GetNameDef] hatte schon immer mehr Meinungsfreiheit als das einfache Volk und verfügte über die obszöne Macht, die er früheren Regierungen abgerungen hatte. Und nachdem unsere neue Regierung die Macht übernommen hatte, gingen sie einfach davon aus, ihre Macht zu behalten und alles würde wie gewohnt weitergehen. Ständig wandten sie sich mit Forderungen nach alten Rechten und kleinlichen Streitigkeiten an [ROOT.GetLeader] selbst. Manche besaßen sogar die Frechheit, unironisch einen Adelsrat vorzuschlagen, der die Regierung in der Frage „beraten“ sollte, wie unsere großartige Nation am besten geschützt werden könne.\n\nZu ihrem Unglück war [Root.GetLeader] nicht gerade für seine Nachsicht gegenüber denen bekannt, die ihn verärgerten. Also verkündete er die Gründung eines Adelsrats und lud alle angesehenen Adligen seines Territoriums zur ersten Sitzung ein, die zufällig im obersten Stockwerk eines der Kapitolsgebäude stattfand. Dass sie tatsächlich darauf hereinfielen, zeigt nur einmal mehr, wie sehr sie von ihrer schieren Gier und Machtgier geblendet waren. Wie dem auch sei, als sie pünktlich zur ersten „Ratssitzung“ eintrafen, fanden sie lediglich eine Kugel im Hinterkopf vor, und die Leichen waren schnell an den Fenstern des Raumes heruntergefallen.\n\nDie herabfallenden Leichen erschreckten einige Passanten, die zu dieser späten Stunde noch auf der Straße waren, aber es versteht sich von selbst, dass sie kein Problem mehr darstellen werden."
 ww2tree.13.a:0 "Sie flogen nicht so gut."
