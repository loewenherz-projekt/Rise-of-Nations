## Events ##
 ww2tree.1.t:0 "Roter Freitag"
 ww2tree.1.d:0 "Es war ein ganz normaler Tag auf den Straßen von [Root.Capital.GetName], zumindest für [Root.GetAdjective] Verhältnisse. Die [Root.GetCommunistParty] hatte in den letzten Wochen stark zugenommen, Streiks und Schlägereien waren an der Tagesordnung. Heute jedoch kam es zu einem schrecklichen Zwischenfall.\n\nMehrere Gewerkschaftsführer riefen erneut zu einem landesweiten Streik auf, und mehrere Hundert, wenn nicht Tausende Arbeiter, Kommunisten und dergleichen marschierten durch die Straßen von [Root.Capital.GetName]. Als sie jedoch den Verkehrsknotenpunkt der Stadt erreichten, wurden sie von einem Bataillon Soldaten begrüßt. Als sie aufgefordert wurden, anzuhalten und an ihre Arbeitsplätze zurückzukehren, folgten einige dem Befehl. Die Mehrheit blieb jedoch und wollte den Streik fortsetzen, und sogar einige Anarchisten und radikale Sozialisten bewarfen sie mit Steinen. Als Antwort darauf befahl der verantwortliche Kommandant seinen Männern, auf die Menge zu schießen.\n\nEs folgte Panik mit zahlreichen Schlägereien und Schießereien, von denen einige bis spät in den Abend Widerstand leisteten. In den darauffolgenden Tagen verurteilten viele linke Zeitschriften dies als „ungerechtfertigten und feigen Angriff auf die Arbeiter und freiheitsliebenden Menschen dieser Nation“. Kurz gesagt: Wir haben nicht wirklich zur Stabilisierung der Lage beigetragen."
 ww2tree.1.a:0 "Als ob es nicht schon schlimm genug wäre."
 ww2tree.2.t:0 "Landesweite Sabotageakte"
 ww2tree.2.desc:0 "Es war ein ruhiger und schöner Morgen. [Root.GetLeader] war gerade aufgewacht und hatte sich für den kommenden Tag angezogen, als plötzlich eine Explosion seinen Alltag unterbrach. Er eilte zum Fenster und traute seinen Augen nicht: Eine riesige Rauchwolke stieg über dem Industriegebiet der Hauptstadt in den Himmel. Kurz darauf folgten die Sirenen der herannahenden Feuerwehr, die versuchte, so viel wie möglich zu retten. Augenblicke später erreichten [Root.GetLeader] Berichte über zahlreiche Bombenexplosionen in mehreren Fabriken im ganzen Land."
 ww2tree.2.a:0 "Toll, mein Tag ist schon ruiniert, bevor er überhaupt angefangen hat."
 ww2tree.3.t:0 "Der Marsch auf [From.Capital.GetName]"
 ww2tree.3.d:0 "Es war bereits Abend, als Dutzende oder gar Hunderte von Mitgliedern der [Root.GetCommunistParty] im ganzen Land zu einem Marsch auf mehrere Regierungsgebäude aufriefen.\n\nIhr Hauptziel war offensichtlich nicht irgendwelche Rathäuser auf dem Land, sondern [Root.Capital.GetName]. Dort bildete sich rasch eine riesige Menge von Tausenden von Kommunisten, Sozialisten, Gewerkschaftern und Arbeitern und besetzte mehrere wichtige Gebäude. Ihr Hauptziel war jedoch der Regierungssitz [Root.GetAdjective] selbst, und so setzte sich die Menge in Bewegung, entschlossen, die derzeitige und korrupte Herrschaft von [Root.GetLeader] zu stürzen. Auf ihrem Weg begegneten sie einigen fehlgeleiteten Loyalisten, die ihre derzeitige Regierung immer noch unserer gerechten Sache vorzuziehen schienen. Unnötig zu erwähnen, dass sie schnell überwältigt wurden.\n\nAls die Menge endlich ihr Ziel erreichte, wurde sie von einigen verzweifelten Loyalisten und hastig errichteten Verteidigungsanlagen begrüßt, an deren Spitze [Root.GetLeader] selbst stand. Da mehrere unserer Versuche, die Situation friedlich zu lösen, scheiterten, brachen schließlich gegen Mitternacht Kämpfe aus. Die Schießereien waren heftig und verzweifelt, doch nach einer Stunde waren die letzten Verteidiger vor dem Gebäude entweder gefangen oder tot.\n\nIm Inneren versuchten die verbliebenen Loyalisten erbittert, uns aufzuhalten, und nahmen fast fünf Gefangene. Schließlich gelangten unsere tapferen Revolutionäre zu [Root.GetLeader] und seinen Ministern, die meisten von ihnen wurden von den wütenden Angreifern gelyncht. Am nächsten Morgen war die alte Regierung verschwunden und die rote Fahne wehte stolz über [Root.GetCapital]."
 ww2tree.3.a:0 "Zeit für echte Veränderungen."
 ww2tree.4.t:0 "Unvorhergesehene Nebenwirkungen"
 ww2tree.4.d:0 "Schockierende Nachrichten erreichten uns heute: Mehrere antikommunistische Militärangehörige sind desertiert oder, noch schlimmer, rebellieren offen gegen unser neues Regime. Und als ob das nicht schon schlimm genug wäre, haben viele Beamte ihre Arbeit niedergelegt, und mehrere hochrangige Politiker diffamieren uns offen mit der Behauptung, wir seien ein „korruptes, despotisches und totalitäres Regime, das unsere alte Regierung aus eigenem Machthunger gewaltsam gestürzt hat, den es mit dem Streben nach Gleichheit tarnte.“\n\nDa ein großer Teil des Militärs und der Bevölkerung gegen uns ist, ist schnelles Handeln erforderlich, sonst werden wir wie unsere alten Herrscher enden."
 ww2tree.4.a:0 "Verräter! Alle von ihnen!"
 ww2tree.5.t:0 "Der abgeschlossene Fünfjahresplan"
 ww2tree.5.d:0 "Hervorragende Neuigkeiten! Heute Morgen wurde unser erster Fünfjahresplan abgeschlossen, und die Ergebnisse wurden bereits im ganzen Land ausgestrahlt.\n\n„Achtung, Genossen! Wir haben hervorragende Neuigkeiten für euch! Wir haben die Schlacht an der Produktionsfront gewonnen. Die folgenden offiziellen Ergebnisse zeigen nichts anderes, als dass der Lebensstandard in den letzten Jahren um mehr als 20 % gestiegen ist! Es folgen einige Zahlen:\n- Die Nahrungsmittelproduktion ist um 28 % gestiegen\n- Die Textilproduktion ist um 19 % gestiegen\n- Der Wohnraum hat um 18 % zugenommen\n- Die Möbelproduktion ist um 23 % gestiegen\n- Die Treibstoffproduktion ist um 17 % gestiegen\n- Die Automobilproduktion ist um 16 % gestiegen, sodass ihr euch bald alle ein eigenes Auto leisten könnt!\n- Die Schiffsproduktion ist um 22 % gestiegen\n- Die Flugzeugproduktion ist um 24 % gestiegen\n- Die Waffenproduktion ist um erstaunliche 33 % gestiegen\n\nDies sind nur einige der wichtigsten Zahlen. Wir sind langsam Wir erholen uns von den Kapitalisten, die uns so lange unterdrückt haben, aber um unser Utopia zu erreichen, dürfen wir jetzt nicht aufhören. Hocherfreut über die Ergebnisse hat [Root.GetLeader] den Beginn eines zweiten Fünfjahresplans angekündigt, genau in dem Moment, in dem ihr dies hört, Genossen! Es lebe [Root.GetNameDef]! Es lebe [Root.GetLeader]!“\n\nIn den folgenden Tagen konnte das Ministerium für öffentliche Aufklärung von landesweiten Demonstrationen zahlloser Arbeiter berichten, die [Root.GetLeader] danken wollten."
 ww2tree.5.a:0 "Auf weitere fünf Jahre!"
 ww2tree.6.t:0 "Die Ergebnisse sind da!"
 ww2tree.6.d:0 ""
 ww2tree.6.a:0 "Dies ist ein großer Tag für die Demokratie!"
