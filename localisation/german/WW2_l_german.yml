iron_shortage:0 "Eisenmangel"
  # General Economic Conditions
economic_crisis_desc:0 "Ihr Land befindet sich derzeit in einer schweren Wirtschaftskrise. Diese Situation ist geprägt von hoher Instabilität, geringer Produktion und zunehmender Verbraucherknappheit. Um die Wirtschaft zu stabilisieren, sind sofortige Maßnahmen erforderlich."

economic_boom_desc:0 "Ihr Land erlebt einen Wirtschaftsboom. Dank steigender Produktion und steigendem Verbrauchervertrauen floriert Ihre Wirtschaft. Nutzen Sie diese Chance, um Ihre wirtschaftlichen Vorteile auszubauen und zu festigen."

economic_recession_desc:0 "Ihr Land befindet sich in einer Rezession. Die Wirtschaftstätigkeit hat nachgelassen, die Arbeitslosigkeit ist gestiegen und die Produktion ist zurückgegangen. Um diesen Abschwung zu bewältigen, sind strategische Maßnahmen erforderlich."

economic_stability_desc:0 "Ihre Wirtschaft ist derzeit stabil. Das Gleichgewicht zwischen Produktion und Konsum ist gewahrt, und es gibt ein moderates Wirtschaftswachstum. Gehen Sie weiterhin umsichtig mit Ihren Ressourcen um, um diese Stabilität zu erhalten."

# Resource Shortages
rubber_shortage_desc:0 "In Ihrem Land herrscht ein Mangel an Kautschuk. Dieser Mangel beeinträchtigt die Produktion verschiedener Güter und militärischer Ausrüstung. Erforschen Sie Alternativen oder Handel, um diesen Mangel zu lindern."

oil_shortage_desc:0 "Ihr Land leidet unter Ölknappheit. Dies beeinträchtigt Transport und Militäroperationen. Erwägen Sie, Ihre Energiequellen zu diversifizieren oder die Ölversorgung durch Handel zu sichern."

iron_shortage_desc:0 "Die Eisenvorräte sind derzeit unzureichend. Dieser Mangel beeinträchtigt die Produktion von Stahl und anderen wichtigen Materialien. Suchen Sie nach Möglichkeiten, die Inlandsproduktion zu steigern oder externe Quellen zu erschließen."

aluminum_shortage_desc:0 "Aluminiumressourcen sind knapp. Dies beeinträchtigt verschiedene Industrieprozesse und Verteidigungskapazitäten. Bekämpfen Sie dieses Problem, indem Sie die Aluminiumproduktion erhöhen oder alternative Materialien erforschen."

tungsten_shortage_desc:0 "Ihr Land leidet unter Wolframmangel. Dieser wichtige Rohstoff beeinträchtigt die Produktion moderner Maschinen und Waffen. Versuchen Sie, Ihre Wolframversorgung zu verbessern oder Ihre Produktionspläne entsprechend anzupassen."

chromium_shortage_desc:0 "Chrom ist derzeit knapp. Dies wirkt sich auf die Stahlproduktion und verschiedene industrielle Anwendungen aus. Suchen Sie nach Möglichkeiten, die Chromgewinnung zu verbessern oder andere Materialien in der Produktion zu ersetzen."

# Economic Policies
production_boost_desc:0 "§GSie haben Maßnahmen zur Produktionssteigerung ergriffen. Diese Politik steigert die Industrieproduktion und erhöht die Warenverfügbarkeit. Nutzen Sie diese Impulse, um Ihre Wirtschaft zu stärken."

austerity_measures_desc:0 "§YEs gelten Sparmaßnahmen, die die Staatsausgaben reduzieren und die Wirtschaftsdisziplin erhöhen. Dies könnte zwar die Wirtschaft stabilisieren, könnte aber auch zu Unzufriedenheit in der Bevölkerung und verringerter Wirtschaftstätigkeit führen."

# Economic Impact of War
wartime_economy_desc:0 "Unser Land befindet sich derzeit in einer Kriegswirtschaft. Diese Verschiebung priorisiert die militärische Produktion und die Ressourcenzuteilung für die Kriegsanstrengungen, was sich möglicherweise auf zivile Güter und Dienstleistungen auswirkt."

war_damages_desc:0 "Der anhaltende Krieg hat erhebliche wirtschaftliche Schäden verursacht. Infrastruktur, Produktionskapazitäten und die allgemeine wirtschaftliche Stabilität sind stark beeinträchtigt. Konzentrieren Sie sich auf die Erholung und den Wiederaufbau."

war_economy_boost_desc:0 "Die Kriegswirtschaft hat zu einem vorübergehenden Anstieg der Industrieproduktion geführt. Dies ist auf die gestiegene militärische Nachfrage und die Mobilisierungsbemühungen zurückzuführen. Nutzen Sie diesen Aufschwung, um Ihre militärische und wirtschaftliche Position zu stärken."

# Economic Recovery
economic_recovery_desc:0 "Ihr Land befindet sich auf dem Weg der wirtschaftlichen Erholung. Die Lage verbessert sich durch gesteigerte Produktion und verringerte Instabilität. Setzen Sie weiterhin eine positive Wirtschaftspolitik um, um diese Erholung zu unterstützen."
