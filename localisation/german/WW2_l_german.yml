CUB_CW_form_the_secret_police:0 "Bilden Sie die Geheimpolizei"
CUB_CW_form_the_secret_police_desc:0 "Schaffung einer Spezialbehörde zur Aufrechterhaltung der inneren Sicherheit und zur Bekämpfung subversiver Elemente. Die Geheimpolizei wird befugt sein, Überwachungen durchzuführen, gegen mutmaßliche Dissidenten zu ermitteln und Bedrohungen für das Regime zu beseitigen."

CUB_CW_round_up_reactionaries:0 "Reaktionäre zusammentreiben"
CUB_CW_round_up_reactionaries_desc:0 "Starten Sie eine landesweite Kampagne, um reaktionäre Kräfte, die sich der Regierung widersetzen, zu identifizieren, zu fassen und zu neutralisieren. Diese Operation wird die staatliche Kontrolle stärken und Oppositionsbewegungen schwächen."

CUB_CW_public_trials:0 "Öffentliche Gerichtsverfahren"
CUB_CW_public_trials_desc:0 "Führen Sie öffentlichkeitswirksame Prozesse gegen prominente Dissidenten und Staatsfeinde durch. Diese Prozesse dienen dazu, das Handeln der Regierung zu legitimieren und die Konsequenzen des Widerstands gegen das Regime aufzuzeigen."

CUB_CW_extradition_to_the_communist_block:0 "Auslieferung an den kommunistischen Block"
CUB_CW_extradition_to_the_communist_block_desc:0 "Stärken Sie die Beziehungen zu kommunistischen Verbündeten, indem Sie gefangene Konterrevolutionäre und Reaktionäre zur weiteren Bearbeitung und Bestrafung an Länder innerhalb des kommunistischen Blocks ausliefern."

CUB_CW_allow_the_cia_to_operate_freely:0 "Erlauben Sie der CIA, frei zu operieren"
CUB_CW_allow_the_cia_to_operate_freely_desc:0 "Gewähren Sie der CIA umfassende operative Freiheit innerhalb des Landes, um dem kommunistischen Einfluss entgegenzuwirken und die Stabilität der Regierung durch verdeckte Operationen und Informationsbeschaffung zu unterstützen."

CUB_CW_the_native_response:0 "Die native Antwort"
CUB_CW_the_native_response_desc:0 "Mobilisieren Sie einheimische kubanische Organisationen und Bürgergruppen, um die Bemühungen der Regierung gegen externe und interne Bedrohungen zu unterstützen und ein Gefühl von Patriotismus und kollektiver Verantwortung zu fördern."

CUB_CW_political_literacy_standards:0 "Standards für politische Bildung"
CUB_CW_political_literacy_standards_desc:0 "Führen Sie obligatorische politische Bildungsprogramme ein, um das Bewusstsein für die Gefahren des Kommunismus zu schärfen und die Loyalität der Bevölkerung gegenüber der aktuellen Regierung zu fördern."

CUB_CW_expel_all_extremists:0 "Alle Extremisten ausweisen"
CUB_CW_expel_all_extremists_desc:0 "Säubern Sie die politische Landschaft von extremistischen Elementen, indem Sie Einzelpersonen und Gruppen mit radikalen Ansichten, die die Stabilität und Einheit der Nation bedrohen, identifizieren und ausschließen."

CUB_CW_pass_the_statute_on_the_limitation_of_political_parties:0 "Verabschiedung des Gesetzes zur Beschränkung politischer Parteien"
CUB_CW_pass_the_statute_on_the_limitation_of_political_parties_desc:0 "Erlassen Sie strenge gesetzliche Vorschriften für die Gründung und Tätigkeit politischer Parteien, um den Aufstieg extremistischer Fraktionen zu verhindern und die Vorherrschaft der Regierungspartei zu sichern."

CUB_CW_soviet_aid:0 "Sowjetische Hilfe"
CUB_CW_soviet_aid_desc:0 "Suchen und sichern Sie sich wirtschaftliche, militärische und technische Unterstützung von der Sowjetunion, um die nationalen Fähigkeiten zu stärken und die antikapitalistische Haltung der Regierung zu bekräftigen."

CUB_CW_american_aid:0 "Amerikanische Hilfe"
CUB_CW_american_aid_desc:0 "Streben Sie finanzielle und militärische Unterstützung durch die Vereinigten Staaten an, um dem kommunistischen Einfluss entgegenzuwirken und die nationale Wirtschaft durch strategische Allianzen und Hilfsprogramme zu stabilisieren."

CUB_CW_reinforce_constitutional_limitations_on_parties:0 "Stärkung der verfassungsmäßigen Beschränkungen für Parteien"
CUB_CW_reinforce_constitutional_limitations_on_parties_desc:0 "Stärkung der Verfassungsbestimmungen zur Einschränkung der Aktivitäten politischer Parteien, um sicherzustellen, dass nur diejenigen aktiv sein können, die mit den nationalen Interessen und der Regierungspolitik im Einklang stehen."

CUB_CW_allow_the_formation_of_the_cpc:0 "Erlauben Sie die Gründung der KPCh"
CUB_CW_allow_the_formation_of_the_cpc_desc:0 "Erlauben Sie die Gründung der Kommunistischen Partei Kubas (KPCh) unter strenger staatlicher Aufsicht, um kommunistische Aktivitäten innerhalb eines gesetzlichen Rahmens zu überwachen und zu kontrollieren."

CUB_CW_american_assistance:0 "Amerikanische Hilfe"
CUB_CW_american_assistance_desc:0 "Verbessern Sie die Zusammenarbeit mit den Vereinigten Staaten, indem Sie Vereinbarungen über militärische, wirtschaftliche und nachrichtendienstliche Unterstützung formalisieren, um die Position der Regierung gegen kommunistische Aufstände zu stärken."

CUB_CW_ban_all_communist_leaning_parties:0 "Verbot aller kommunistisch geprägten Parteien"
CUB_CW_ban_all_communist_leaning_parties_desc:0 "Alle politischen Parteien und Organisationen mit kommunistischen Sympathien sind zu verbieten, um die Verbreitung der kommunistischen Ideologie zu verhindern und die Nation vor subversiven Aktivitäten zu schützen."

CUB_CW_arrival_of_castro:0 "Ankunft Castros"
CUB_CW_arrival_of_castro_desc:0 "Behandeln Sie die politischen und sozialen Auswirkungen der Rückkehr Fidel Castros nach Kuba und entwickeln Sie Strategien zur Bewältigung seines Einflusses und der dadurch möglicherweise ausgelösten Unruhen."

CUB_CW_cia__government_cooperation:0 "Zusammenarbeit zwischen CIA und Regierung"
CUB_CW_cia__government_cooperation_desc:0 "Die Zusammenarbeit zwischen der kubanischen Regierung und der CIA soll verstärkt werden, um die kommunistische Bedrohung wirksam zu bekämpfen und die Stabilität des derzeitigen Regimes durch gemeinsame Geheimdienstinformationen und Operationen zu gewährleisten."

CUB_CW_purge_the_libraries:0 "Bereinigen Sie die Bibliotheken"
CUB_CW_purge_the_libraries_desc:0 "Führen Sie eine gründliche Überprüfung durch und entfernen Sie subversive und kommunistische Literatur aus öffentlichen und privaten Bibliotheken, um die Informationen zu kontrollieren und die ideologische Reinheit zu wahren."

CUB_CW_open_the_nation_to_new_ideas:0 "Öffnen Sie die Nation für neue Ideen"
CUB_CW_open_the_nation_to_new_ideas_desc:0 "Fördern Sie den Austausch von Ideen und Wissen, indem Sie kontrollierten Zugang zu ausländischer Literatur und Bildungsressourcen gewähren und so Innovationen fördern, ohne die staatliche Aufsicht zu beeinträchtigen."

CUB_CW_secure_current_leadership:0 "Sicherung der aktuellen Führung"
CUB_CW_secure_current_leadership_desc:0 "Implementieren Sie Maßnahmen zum Schutz und zur Festigung der Macht der derzeitigen Regierungsführer vor internen und externen Bedrohungen und gewährleisten Sie so die Kontinuität und Stabilität der Regierungsführung."

CUB_CW_restructuring_of_the_congress:0 "Neustrukturierung des Kongresses"
CUB_CW_restructuring_of_the_congress_desc:0 "Reorganisieren Sie das gesetzgebende Organ, um die Prioritäten der Regierung widerzuspiegeln, indem Sie den Einfluss der Oppositionsmitglieder beseitigen oder verringern und die Vertretung der Loyalisten stärken."

CUB_CW_establish_the_allunion_communist_party:0 "Gründung der Allunionskommunistischen Partei"
CUB_CW_establish_the_allunion_communist_party_desc:0 "Bilden Sie eine einheitliche kommunistische Partei, die sich an den umfassenderen Zielen des kommunistischen Blocks orientiert und engere Beziehungen und koordinierte Aktionen mit verbündeten kommunistischen Staaten ermöglicht."

CUB_CW_legitimacy_through_strength:0 "Legitimität durch Stärke"
CUB_CW_legitimacy_through_strength_desc:0 "Demonstrieren Sie die Legitimität und Entschlossenheit der Regierung, indem Sie militärische und polizeiliche Stärke zur Schau stellen, Paraden abhalten und erfolgreiche Operationen gegen Dissidenten öffentlich machen."

CUB_CW_proclaim_the_cuban_ssr:0 "Proklamieren Sie die Kubanische SSR"
CUB_CW_proclaim_the_cuban_ssr_desc:0 "Kuba offiziell zur Sozialistischen Sowjetrepublik erklären, das politische und wirtschaftliche System des Landes an das der Sowjetunion angleichen und seinen Platz innerhalb des kommunistischen Blocks sichern."

CUB_CW_request_to_join_the_warsaw_pact:0 "Antrag auf Beitritt zum Warschauer Pakt"
CUB_CW_request_to_join_the_warsaw_pact_desc:0 "Streben Sie eine Mitgliedschaft im Warschauer Pakt an, um militärische und strategische Unterstützung von mit der Sowjetunion verbündeten Nationen zu erhalten und so die Verteidigungsfähigkeiten Kubas und seine politische Ausrichtung auf den Ostblock zu stärken."
CUB_CW_investigate_his_reasoning:0 "Untersuchen Sie seine Argumentation"
CUB_CW_investigate_his_reasoning_desc:0 "Wir werden die Motivationen und Absichten einflussreicher Persönlichkeiten wie Fidel Castro gründlich untersuchen, um ihre Ziele zu verstehen und mögliche Bedrohungen der nationalen Stabilität zu mindern."

CUB_CW_path_of_no_tolerance:0 "Pfad der Intoleranz"
CUB_CW_path_of_no_tolerance_desc:0 "Wir werden eine Null-Toleranz-Politik gegenüber jeglicher Form von Dissens oder Opposition verfolgen und rasche und entschlossene Maßnahmen gegen diejenigen sicherstellen, die die Regierung herausfordern."

CUB_CW_complete_removal_of_current_leadership:0 "Vollständige Absetzung der derzeitigen Führung"
CUB_CW_complete_removal_of_current_leadership_desc:0 "Wir werden ineffektive oder kompromittierte Regierungsführer ersetzen, um eine loyalere und effizientere Verwaltung zu etablieren, die sich unseren ideologischen Zielen verpflichtet fühlt."

CUB_CW_the_hardline_against_socialism:0 "Die harte Linie gegen den Sozialismus"
CUB_CW_the_hardline_against_socialism_desc:0 "Wir werden eine entschiedene Haltung gegenüber sozialistischen Bewegungen und Ideologien einnehmen und Maßnahmen ergreifen, um ihren Einfluss zu unterdrücken und unsere nationalen Werte zu schützen."

CUB_CW_arrest_suspected_communists:0 "Verhaftung mutmaßlicher Kommunisten"
CUB_CW_arrest_suspected_communists_desc:0 "Wir werden eine Kampagne starten, um Personen zu identifizieren und festzunehmen, die kommunistischer Aktivitäten verdächtigt werden, um die Verbreitung subversiver Ideologien zu verhindern."

CUB_CW_request_international_action:0 "Fordern Sie internationale Maßnahmen"
CUB_CW_request_international_action_desc:0 "Wir werden die Unterstützung internationaler Verbündeter suchen, um koordiniert gegen die kommunistische Bedrohung vorzugehen und dabei globale Netzwerke zu nutzen, um unsere Sicherheit zu verbessern."

CUB_CW_secure_military_support:0 "Sichern Sie sich militärische Unterstützung"
CUB_CW_secure_military_support_desc:0 "Wir werden die Loyalität und Unterstützung des Militärs durch verstärkte Finanzierung, Ausbildung und strategische Allianzen sicherstellen, um die nationale Sicherheit aufrechtzuerhalten."

CUB_CW_regain_the_support_of_the_navy:0 "Gewinnen Sie die Unterstützung der Marine zurück"
CUB_CW_regain_the_support_of_the_navy_desc:0 "Wir werden Maßnahmen ergreifen, um das Vertrauen und die Loyalität innerhalb der Marine wiederherzustellen und ihre uneingeschränkte Kooperation bei der Wahrung unserer maritimen Interessen sicherzustellen."

CUB_CW_freeze_all_election_committee_applications:0 "Alle Anträge für Wahlausschüsse einfrieren"
CUB_CW_freeze_all_election_committee_applications_desc:0 "Wir werden die Annahme neuer Anträge an das Wahlkomitee einstellen, um die Kontrolle über die Wahlprozesse aufrechtzuerhalten und die Infiltration subversiver Elemente zu verhindern."

CUB_CW_revisit_the_1940_constitution:0 "Die Verfassung von 1940 noch einmal betrachten"
CUB_CW_revisit_the_1940_constitution_desc:0 "Wir werden die Verfassung von 1940 erneut prüfen, um Bestimmungen zu identifizieren und zu ändern, die unsere derzeitige Regierungsführung und unsere strategischen Ziele behindern könnten."

CUB_CW_stabilize_the_political_situation:0 "Stabilisierung der politischen Lage"
CUB_CW_stabilize_the_political_situation_desc:0 "Wir werden entschlossene Maßnahmen ergreifen, um das politische Umfeld zu stabilisieren, Spannungen abzubauen und ein Klima zu schaffen, das unserer Politik förderlich ist."

CUB_CW_expansion_of_rights:0 "Ausweitung der Rechte"
CUB_CW_expansion_of_rights_desc:0 "Wir werden Reformen durchführen, um die Rechte der Bürger im Einklang mit unserem ideologischen Rahmen zu erweitern und sicherzustellen, dass diese Rechte die Stabilität und den Fortschritt der Nation unterstützen."

CUB_CW_one_term_presidency:0 "Präsidentschaft mit einer Amtszeit"
CUB_CW_one_term_presidency_desc:0 "Wir werden eine Verfassungsänderung einführen, die die Amtszeit des Präsidenten auf eine einzige Amtszeit begrenzt, eine neue Führung fördert und das Risiko einer Machtverfestigung verringert."

CUB_CW_4_year_term:0 "4-Jahres-Laufzeit"
CUB_CW_4_year_term_desc:0 "Wir werden die Amtszeit des Präsidenten auf vier Jahre festlegen, um regelmäßige Führungswechsel und eine kontinuierliche Erneuerung der Regierungspolitik sicherzustellen."

CUB_CW_right_to_work:0 "Recht auf Arbeit"
CUB_CW_right_to_work_desc:0 "Wir werden allen Bürgern das Recht auf Arbeit garantieren und Maßnahmen umsetzen, die Beschäftigungsmöglichkeiten und wirtschaftliche Stabilität fördern."

CUB_CW_right_to_healthcare:0 "Recht auf Gesundheitsversorgung"
CUB_CW_right_to_healthcare_desc:0 "Wir werden dafür sorgen, dass alle Bürger Zugang zu Gesundheitsdiensten haben und das öffentliche Gesundheitssystem des Landes als Grundlage für eine produktive Gesellschaft stärken."

CUB_CW_adopt_the_american_system:0 "Übernehmen Sie das amerikanische System"
CUB_CW_adopt_the_american_system_desc:0 "Wir werden Aspekte des amerikanischen politischen und wirtschaftlichen Systems einbeziehen, um unsere Regierungsführung zu modernisieren und stärker an westliche Standards anzupassen."

CUB_CW_universal_suffrage:0 "Allgemeines Wahlrecht"
CUB_CW_universal_suffrage_desc:0 "Wir werden das allgemeine Wahlrecht einführen, das allen erwachsenen Bürgern das Wahlrecht gewährt und sicherstellt, dass unsere Regierung den Willen des Volkes widerspiegelt."

CUB_CW_civil_over_military:0 "Zivil vor Militär"
CUB_CW_civil_over_military_desc:0 "Wir werden klare Grenzen zwischen den zivilen Behörden und dem Militär ziehen, um sicherzustellen, dass die Regierung fest in zivilen Händen bleibt."

CUB_CW_foreign_inspiration:0 "Ausländische Inspiration"
CUB_CW_foreign_inspiration_desc:0 "Wir werden erfolgreiche politische und wirtschaftliche Modelle im Ausland studieren, um daraus Inspiration für unsere eigenen Reformen und Entwicklungsstrategien zu gewinnen."

CUB_CW_study_the_weimar_constitution:0 "Studieren Sie die Weimarer Verfassung"
CUB_CW_study_the_weimar_constitution_desc:0 "Wir werden die Weimarer Verfassung analysieren, um ihre Stärken und Schwächen zu verstehen und relevante Erkenntnisse auf unseren eigenen Verfassungsrahmen anzuwenden."

CUB_CW_study_the_spanish_constitution:0 "Studieren Sie die spanische Verfassung"
CUB_CW_study_the_spanish_constitution_desc:0 "Wir werden die spanische Verfassung untersuchen, um Erkenntnisse über wirksame Regierungspraktiken und potenzielle Fallstricke zu gewinnen und so unsere Gesetzesreformen zu beeinflussen."

CUB_CW_empowered_judicial_branch:0 "Ermächtigte Judikative"
CUB_CW_empowered_judicial_branch_desc:0 "Wir werden die Judikative stärken, um sicherzustellen, dass sie das Gesetz wirksam durchsetzen, Rechte schützen und die gegenseitige Kontrolle innerhalb der Regierung aufrechterhalten kann."

CUB_CW_independent_election_committee:0 "Unabhängiger Wahlausschuss"
CUB_CW_independent_election_committee_desc:0 "Wir werden ein unabhängiges Wahlkomitee einrichten, das faire und transparente Wahlprozesse überwacht und so die Legitimität unseres demokratischen Systems stärkt."

CUB_CW_avoid_their_mistakes:0 "Vermeiden Sie ihre Fehler"
CUB_CW_avoid_their_mistakes_desc:0 "Wir werden aus den Fehlern anderer Nationen lernen, um ähnliche Fallstricke zu vermeiden und sicherzustellen, dass unsere Politik und Reformen zu nachhaltigem Fortschritt führen."

CUB_CW_draw_closer_to_america:0 "Näher an Amerika heranrücken"
CUB_CW_draw_closer_to_america_desc:0 "Wir werden unsere diplomatischen und wirtschaftlichen Beziehungen zu den Vereinigten Staaten stärken und eine Zusammenarbeit und Unterstützung fördern, die unserer nationalen Entwicklung zugute kommt."

CUB_CW_military_oath_to_the_state:0 "Militärischer Eid auf den Staat"
CUB_CW_military_oath_to_the_state_desc:0 "Wir werden von allen Militärangehörigen verlangen, einen Treueeid auf den Staat zu schwören und damit ihr Engagement für die Verteidigung unserer Regierung und ihrer Grundsätze zu bekräftigen."

CUB_CW_the_restored_republic:0 "Die wiederhergestellte Republik"
CUB_CW_the_restored_republic_desc:0 "Wir werden die Wiederherstellung der Republik verkünden, die eine neue Ära der Regierungsführung, Stabilität und des Fortschritts für unsere Nation symbolisiert."

CUB_CW_balistas_coup:0 "Balistas&#39; Putsch"
CUB_CW_balistas_coup_desc:0 "Wir werden uns mit den Auswirkungen des Putsches der Balistas befassen und die notwendigen Maßnahmen ergreifen, um die Ordnung wiederherzustellen und weitere Instabilität zu verhindern."

CUB_CW_rig_the_election:0 "Wahlmanipulation"
CUB_CW_rig_the_election_desc:0 "Wir werden verdeckte Maßnahmen ergreifen, um Wahlergebnisse zu erzielen, die der gegenwärtigen Regierung zugutekommen, und um unsere Macht und Stabilität zu bewahren."

CUB_CW_rally_our_allies_in_the_miltary:0 "Versammeln Sie unsere Verbündeten im Militär"
CUB_CW_rally_our_allies_in_the_miltary_desc:0 "Wir werden die Bündnisse innerhalb des Militärs stärken, um dessen uneingeschränkte Unterstützung für die Regierung und ihre Politik sicherzustellen."

CUB_CW_begin_raising_troops_in_the_south:0 "Beginnen Sie mit der Truppenaufstellung im Süden"
CUB_CW_begin_raising_troops_in_the_south_desc:0 "Wir werden mit der Rekrutierung und Ausbildung von Truppen in den südlichen Regionen beginnen, um unsere militärischen Fähigkeiten und unsere Einsatzbereitschaft zu stärken."

CUB_CW_condemn_naval_declaration_of_neutrality:0 "Verurteilung der Neutralitätserklärung der Marine"
CUB_CW_condemn_naval_declaration_of_neutrality_desc:0 "Wir werden jegliche Neutralitätserklärungen der Marine öffentlich verurteilen und die Notwendigkeit einer einheitlichen militärischen Unterstützung unserer Regierung betonen."

CUB_CW_sabotage_the_ballots:0 "Sabotage der Wahlzettel"
CUB_CW_sabotage_the_ballots_desc:0 "Wir werden verdeckte Operationen durchführen, um die Wahlprozesse der Opposition zu stören und sicherzustellen, dass die Wahlergebnisse zu unseren Gunsten ausfallen."

CUB_CW_infiltrate_the_election_committee:0 "Infiltrieren Sie das Wahlkomitee"
CUB_CW_infiltrate_the_election_committee_desc:0 "Wir werden loyale Mitarbeiter in das Wahlkomitee entsenden, um Entscheidungen zu beeinflussen und günstige Ergebnisse sicherzustellen."

CUB_CW_defend_the_democracy:0 "Verteidige die Demokratie"
CUB_CW_defend_the_democracy_desc:0 "Wir werden alle notwendigen Maßnahmen ergreifen, um unsere demokratischen Institutionen vor Subversion und externen Bedrohungen zu schützen und ihre Integrität und Funktionsfähigkeit sicherzustellen."
CUB_CW_adopt_a_political_strategy:0 "Verfolgen Sie eine politische Strategie"
CUB_CW_adopt_a_political_strategy_desc:0 "Wir werden eine umfassende politische Strategie entwickeln, um uns in der komplexen politischen Landschaft des Kalten Krieges zurechtzufinden und sicherzustellen, dass die Interessen unseres Landes geschützt und gefördert werden."

CUB_CW_attempt_an_armed_coup:0 "Versuch eines bewaffneten Putsches"
CUB_CW_attempt_an_armed_coup_desc:0 "Sollten die Umstände drastische Maßnahmen erfordern, werden wir die Möglichkeit eines bewaffneten Putsches zur Übernahme der Regierung in Betracht ziehen."

CUB_CW_adopt_a_partisan_strategy:0 "Nehmen Sie eine parteiische Strategie an"
CUB_CW_adopt_a_partisan_strategy_desc:0 "Wir werden eine parteipolitische Strategie verfolgen, um die Unterstützung bestimmter politischer Gruppierungen zu gewinnen, unsere Position zu stärken und uns die Unterstützung loyaler Anhänger zu sichern."

CUB_CW_march_on_the_capitol:0 "Marsch auf das Kapitol"
CUB_CW_march_on_the_capitol_desc:0 "Wir werden einen Marsch zum Kapitol organisieren, um unsere Stärke und Entschlossenheit zu demonstrieren, Oppositionskräfte einzuschüchtern und öffentliche Unterstützung zu sammeln."

CUB_CW_dig_in_the_troops:0 "Grabt die Truppen ein"
CUB_CW_dig_in_the_troops_desc:0 "Wir werden unsere militärischen Stellungen verstärken, uns auf mögliche Konflikte vorbereiten und sicherstellen, dass unsere Streitkräfte zur Verteidigung der Nation bereit sind."

CUB_CW_draw_the_battle_lines:0 "Die Schlachtlinien ziehen"
CUB_CW_draw_the_battle_lines_desc:0 "Wir werden unsere strategischen Ziele und militärischen Positionen klar umreißen und uns auf etwaige Konfrontationen vorbereiten."

CUB_CW_form_the_rackets:0 "Bilden Sie die Schläger"
CUB_CW_form_the_rackets_desc:0 "Wir werden organisierte Gruppen zur Bekämpfung illegaler Aktivitäten gründen und diese Ressourcen zur Finanzierung und Unterstützung unserer politischen und militärischen Ziele nutzen."

CUB_CW_paramilitaries_in_the_north:0 "Paramilitärs im Norden"
CUB_CW_paramilitaries_in_the_north_desc:0 "Wir werden paramilitärische Einheiten in den nördlichen Regionen stationieren, um die Kontrolle zu behalten und jegliche Oppositionsbewegungen zu unterdrücken."

CUB_CW_paramilitaries_in_the_south:0 "Paramilitärs im Süden"
CUB_CW_paramilitaries_in_the_south_desc:0 "Wir werden paramilitärische Einheiten in den südlichen Regionen stationieren, um unseren Einfluss zu sichern und aufständische Aktivitäten zu unterdrücken."

CUB_CW_increase_support_in_havana:0 "Verstärkte Unterstützung in Havanna"
CUB_CW_increase_support_in_havana_desc:0 "Wir werden Initiativen starten, um unsere Unterstützerbasis in Havanna zu stärken und unseren politischen Einfluss in der Hauptstadt zu stärken."

CUB_CW_establish_headquarters_in_guantanamo:0 "Errichtung eines Hauptquartiers in Guantánamo"
CUB_CW_establish_headquarters_in_guantanamo_desc:0 "Wir werden in Guantánamo ein strategisches Hauptquartier einrichten, um unsere militärischen und politischen Operationen wirksamer zu koordinieren."

CUB_CW_relocate_the_capitol:0 "Verlegung des Kapitols"
CUB_CW_relocate_the_capitol_desc:0 "Wir werden die Verlegung der Hauptstadt an einen sichereren Ort in Erwägung ziehen, um den Regierungssitz vor potenziellen Bedrohungen zu schützen."

CUB_CW_legitimize_the_junta:0 "Legitimierung der Junta"
CUB_CW_legitimize_the_junta_desc:0 "Wir werden Schritte unternehmen, um die herrschende Junta zu legitimieren und sicherzustellen, dass ihre Handlungen als rechtmäßig und für die nationale Stabilität notwendig angesehen werden."

CUB_CW_implement_new_ballot_protections:0 "Implementieren Sie neue Wahlschutzmaßnahmen"
CUB_CW_implement_new_ballot_protections_desc:0 "Wir werden Maßnahmen zum Schutz der Integrität der Stimmzettel einführen und so faire und transparente Wahlen gewährleisten, die den Willen des Volkes widerspiegeln."

CUB_CW_form_antipartisan_taskforce:0 "Bilden Sie eine Antiparteiische Taskforce"
CUB_CW_form_antipartisan_taskforce_desc:0 "Wir werden eine spezialisierte Taskforce zur Bekämpfung parteipolitischer Aktivitäten einrichten und sicherstellen, dass Oppositionsgruppen wirksam neutralisiert werden."

CUB_CW_deploy_the_army_to_voting_sites:0 "Entsendung der Armee zu den Wahllokalen"
CUB_CW_deploy_the_army_to_voting_sites_desc:0 "Wir werden Militäreinheiten an den Wahllokalen stationieren, um die Sicherheit zu gewährleisten und jegliche Versuche der Wahlbeeinflussung oder Gewalt zu verhindern."

CUB_CW_formed_armored_ballot_convoys:0 "Gepanzerte Wahlkonvois gebildet"
CUB_CW_formed_armored_ballot_convoys_desc:0 "Wir werden gepanzerte Konvois bereitstellen, um die Stimmzettel sicher zu transportieren, sie vor Manipulation zu schützen und die Integrität des Wahlprozesses zu gewährleisten."

CUB_CW_pass_the_act_for_the_stability_of_the_republic:0 "Verabschiedung des Gesetzes zur Stabilität der Republik"
CUB_CW_pass_the_act_for_the_stability_of_the_republic_desc:0 "Wir werden Gesetze erlassen, die auf die Aufrechterhaltung der Stabilität der Republik abzielen, einschließlich Maßnahmen zur Unterdrückung von Aufständen und zur Aufrechterhaltung der Ordnung."

CUB_CW_seek_congressional_authorization_to_use_armed_force:0 "Ersuchen Sie den Kongress um die Genehmigung zum Einsatz bewaffneter Gewalt"
CUB_CW_seek_congressional_authorization_to_use_armed_force_desc:0 "Wir werden den Kongress um die Zustimmung zum Einsatz von Waffengewalt in innenpolitischen Angelegenheiten bitten und so die rechtliche Grundlage für militärische Maßnahmen zur Aufrechterhaltung der Ordnung schaffen."

CUB_CW_gain_american_assistance:0 "Erhalten Sie amerikanische Unterstützung"
CUB_CW_gain_american_assistance_desc:0 "Wir werden die Unterstützung und Hilfe der Vereinigten Staaten suchen und ihre Ressourcen und ihr Fachwissen nutzen, um unsere Position zu stärken."

CUB_CW_petition_congress_for_emergency_powers:0 "Petition an den Kongress für Notstandsbefugnisse"
CUB_CW_petition_congress_for_emergency_powers_desc:0 "Wir werden den Kongress um Notstandsbefugnisse ersuchen, um die aktuelle Krise wirksamer anzugehen und rasches und entschlossenes Handeln zu ermöglichen."

CUB_CW_operation_liberator:0 "Operation Liberator"
CUB_CW_operation_liberator_desc:0 "Wir werden die Operation Liberator starten, um die Kontrolle über umkämpfte Gebiete zurückzugewinnen, oppositionelle Kräfte zu unterdrücken und so Ordnung und Stabilität wiederherzustellen."

CUB_CW_demobilization:0 "Demobilisierung"
CUB_CW_demobilization_desc:0 "Wir werden die Demobilisierung bestimmter Militäreinheiten planen und durchführen und sie in zivile Rollen überführen, um den Wiederaufbau und die Stabilität nach der Krise zu unterstützen."

CUB_CW_commoditize_cuban_cigars:0 "Kubanische Zigarren als Handelsware"
CUB_CW_commoditize_cuban_cigars_desc:0 "Wir werden die weltweite Nachfrage nach kubanischen Zigarren nutzen und dieses Produkt zu einem bedeutenden Wirtschaftsfaktor für unser Land machen."

CUB_CW_legitimacy_through_the_people:0 "Legitimität durch das Volk"
CUB_CW_legitimacy_through_the_people_desc:0 "Wir werden uns darauf konzentrieren, Legitimität zu erlangen, indem wir auf die Bedürfnisse und Forderungen der Bevölkerung eingehen und sicherstellen, dass unsere Regierung als wahrer Vertreter des Willens der Nation angesehen wird."

CUB_CW_secure_support_from_the_unions:0 "Sichern Sie sich die Unterstützung der Gewerkschaften"
CUB_CW_secure_support_from_the_unions_desc:0 "Wir werden eng mit den Gewerkschaften zusammenarbeiten, um ihre Unterstützung zu gewinnen und ihren Einfluss zu nutzen, um unsere politische Position zu stärken und die Stabilität der Belegschaft zu gewährleisten."

CUB_CW_declaration_of_socialist_ideas:0 "Erklärung der sozialistischen Ideen"
CUB_CW_declaration_of_socialist_ideas_desc:0 "Wir werden unser Bekenntnis zu sozialistischen Prinzipien offiziell erklären und unsere Politik an den umfassenderen Zielen der sozialen Gleichheit und wirtschaftlichen Gerechtigkeit ausrichten."

CUB_CW_violent_revolution:0 "Gewaltsame Revolution"
CUB_CW_violent_revolution_desc:0 "Wir werden uns auf die Möglichkeit einer gewaltsamen Revolution vorbereiten, um die bestehenden Machtstrukturen zu stürzen und eine Regierung zu etablieren, die unsere ideologischen Überzeugungen widerspiegelt."

CUB_CW_peaceful_transition_of_power:0 "Friedlicher Machtwechsel"
CUB_CW_peaceful_transition_of_power_desc:0 "Wir werden auf einen friedlichen Machtwechsel hinarbeiten, Stabilität und Kontinuität in der Regierungsführung gewährleisten und gleichzeitig den Erwartungen der Bevölkerung gerecht werden."

CUB_CW_the_propaganda_war:0 "Der Propagandakrieg"
CUB_CW_the_propaganda_war_desc:0 "Wir werden eine umfassende Propagandakampagne durchführen, um die öffentliche Meinung zu beeinflussen, unsere Politik zu fördern und die Narrative der Opposition zu untergraben."

CUB_CW_establish_southern_headquarters:0 "Errichtung des südlichen Hauptquartiers"
CUB_CW_establish_southern_headquarters_desc:0 "Wir werden in der südlichen Region ein strategisches Hauptquartier einrichten, um die militärischen und politischen Bemühungen zu koordinieren und eine wirksame Kontrolle und Reaktion sicherzustellen."

CUB_CW_begin_the_open_war:0 "Beginnen Sie den offenen Krieg"
CUB_CW_begin_the_open_war_desc:0 "Wir werden einen offenen Konflikt mit den oppositionellen Kräften beginnen und dabei unsere militärische Stärke einsetzen, um entscheidende Siege zu erringen und die Kontrolle zu erlangen."

CUB_CW_the_castro_affair:0 "Die Castro-Affäre"
CUB_CW_the_castro_affair_desc:0 "Wir werden uns den Herausforderungen stellen, die sich aus Fidel Castros Einfluss und Handeln ergeben, und Maßnahmen ergreifen, um seinen Auswirkungen auf die nationale Stabilität entgegenzuwirken."

CUB_CW_toe_the_line:0 "Spuren"
CUB_CW_toe_the_line_desc:0 "Wir werden die strikte Einhaltung der Parteipolitik und -richtlinien durchsetzen und für Einheitlichkeit und Disziplin in unseren Reihen sorgen, um eine geschlossene Regierungsführung aufrechtzuerhalten."

CUB_CW_american_intervention:0 "Amerikanische Intervention"
CUB_CW_american_intervention_desc:0 "Wir werden versuchen, die Vereinigten Staaten in unsere inneren Angelegenheiten einzubeziehen und ihre Unterstützung zu nutzen, um unsere Position zu stärken und oppositionellen Kräften entgegenzuwirken."

CUB_CW_implement_new_corporate_protections:0 "Implementieren Sie neue Unternehmensschutzmaßnahmen"
CUB_CW_implement_new_corporate_protections_desc:0 "Wir werden Maßnahmen zum Schutz der Unternehmensinteressen einführen und ein unternehmensfreundliches Umfeld schaffen, das das Wirtschaftswachstum fördert."

CUB_CW_grant_monopolies_to_the_cigar_rolling_unions:0 "Gewähren Sie den Zigarrenrollgewerkschaften Monopole"
CUB_CW_grant_monopolies_to_the_cigar_rolling_unions_desc:0 "Wir werden den Gewerkschaften der Zigarrenrollereien Exklusivrechte gewähren und so ihre Vorherrschaft in der Branche und ihre Unterstützung für unsere Regierung sichern."

CUB_CW_block_the_corporate_manslaughter_bill:0 "Blockieren Sie das Gesetz gegen fahrlässige Tötung durch Unternehmen"
CUB_CW_block_the_corporate_manslaughter_bill_desc:0 "Wir werden die Verabschiedung von Gesetzen verhindern, die Unternehmen für Todesfälle am Arbeitsplatz strafrechtlich zur Verantwortung ziehen würden, um so die Geschäftsinteressen zu schützen und die wirtschaftliche Stabilität zu wahren."

CUB_CW_industrial_expansion_board:0 "Industrielle Erweiterungskarte"
CUB_CW_industrial_expansion_board_desc:0 "Wir werden einen Vorstand einrichten, der die industrielle Expansion überwacht und fördert und so strategisches Wachstum und wirtschaftliche Entwicklung sicherstellt."

CUB_CW_promotion_of_new_industries:0 "Förderung neuer Industrien"
CUB_CW_promotion_of_new_industries_desc:0 "Wir werden die Entwicklung neuer Industrien fördern, unsere Wirtschaft diversifizieren und neue Möglichkeiten für Wachstum und Beschäftigung schaffen."

CUB_CW_allow_foreign_corporation_incentives:0 "Anreize für ausländische Unternehmen zulassen"
CUB_CW_allow_foreign_corporation_incentives_desc:0 "Wir werden Anreize bieten, um ausländische Unternehmen anzuziehen, internationale Investitionen zu fördern und das Wirtschaftswachstum anzukurbeln."

CUB_CW_cocacola_state:0 "Coca-Cola-Staat"
CUB_CW_cocacola_state_desc:0 "Wir werden eine wirtschaftsfreundliche Haltung einnehmen und multinationale Konzerne wie Coca-Cola dazu bewegen, in unserem Land zu investieren und die wirtschaftliche Entwicklung voranzutreiben."

CUB_CW_the_federal_natural_disaster_fund:0 "Der Bundesfonds für Naturkatastrophen"
CUB_CW_the_federal_natural_disaster_fund_desc:0 "Wir werden einen Fonds einrichten, der im Falle von Naturkatastrophen finanzielle Hilfe leistet und so rechtzeitige und wirksame Hilfsmaßnahmen gewährleistet."

CUB_CW_federal_property_reimbursement_act:0 "Bundesgesetz zur Rückerstattung von Eigentum"
CUB_CW_federal_property_reimbursement_act_desc:0 "Wir werden Gesetze verabschieden, die Immobilienbesitzern die durch Naturkatastrophen entstandenen Verluste erstatten und so finanzielle Stabilität und Erholung gewährleisten."

CUB_CW_federal_emergency_response_agency:0 "Bundesagentur für Katastrophenschutz"
CUB_CW_federal_emergency_response_agency_desc:0 "Wir werden eine spezielle Agentur zur Koordinierung und Verwaltung der Notfallmaßnahmen einrichten, um im Krisenfall schnelles und wirksames Handeln zu gewährleisten."

CUB_CW_mandatory_disaster_insurance:0 "Obligatorische Katastrophenversicherung"
CUB_CW_mandatory_disaster_insurance_desc:0 "Wir werden obligatorische Katastrophenversicherungen einführen, um Bürger und Unternehmen vor den finanziellen Auswirkungen von Naturkatastrophen zu schützen."

CUB_CW_1949_state_of_the_union:0 "1949 Lage der Nation"
CUB_CW_1949_state_of_the_union_desc:0 "Wir werden eine umfassende Ansprache halten, in der wir den Zustand unserer Nation im Jahr 1949 darlegen, unsere Erfolge hervorheben und die Agenda für künftige Fortschritte festlegen."

CUB_CW_the_current_economic_situation:0 "Die aktuelle Wirtschaftslage"
CUB_CW_the_current_economic_situation_desc:0 "Wir werden die aktuelle Wirtschaftslage analysieren und angehen und angesichts der anhaltenden Herausforderungen Maßnahmen zur Stabilisierung und zum Wachstum unserer Wirtschaft umsetzen."

CUB_CW_diversify_the_economy:0 "Diversifizierung der Wirtschaft"
CUB_CW_diversify_the_economy_desc:0 "Wir werden Strategien zur Diversifizierung unserer wirtschaftlichen Basis verfolgen, die Abhängigkeit von einer einzelnen Branche verringern und nachhaltiges Wachstum fördern."

CUB_CW_maintain_the_status_quo:0 "Den Status Quo beibehalten"
CUB_CW_maintain_the_status_quo_desc:0 "Wir werden uns auf die Wahrung der Stabilität und Kontinuität unserer Wirtschaftspolitik konzentrieren und drastische Veränderungen vermeiden, die das derzeitige Gleichgewicht stören könnten."

CUB_CW_subsidy_programs:0 "Förderprogramme"
CUB_CW_subsidy_programs_desc:0 "Wir werden Subventionsprogramme umsetzen, um Schlüsselindustrien zu unterstützen und ihre weitere Rentabilität sicherzustellen, Arbeitsplätze zu schützen und die wirtschaftliche Stabilität zu sichern."

CUB_CW_mandatory_minimum_pricing_for_sugar:0 "Verbindlicher Mindestpreis für Zucker"
CUB_CW_mandatory_minimum_pricing_for_sugar_desc:0 "Wir werden einen verbindlichen Mindestpreis für Zucker einführen, um unseren Agrarsektor zu schützen und eine faire Vergütung der Landwirte sicherzustellen."

CUB_CW_improve_the_historical_societys_budget:0 "Verbessern Sie das Budget der Historischen Gesellschaft"
CUB_CW_improve_the_historical_societys_budget_desc:0 "Wir werden die Mittel für die historische Gesellschaft erhöhen, unser kulturelles Erbe bewahren und den Nationalstolz fördern."

CUB_CW_create_the_national_commodities_board:0 "Gründung des National Commodities Board"
CUB_CW_create_the_national_commodities_board_desc:0 "Wir werden einen Ausschuss einrichten, der die Produktion und den Vertrieb wichtiger Rohstoffe überwacht und so eine effiziente Verwaltung und Marktstabilität gewährleistet."

CUB_CW_national_conference_on_the_economy:0 "Nationale Konferenz zur Wirtschaft"
CUB_CW_national_conference_on_the_economy_desc:0 "Wir werden eine nationale Konferenz einberufen, um wirtschaftliche Herausforderungen und Chancen zu diskutieren, die Zusammenarbeit zu fördern und strategische Richtlinien zu entwickeln."

CUB_CW_support_the_people:0 "Unterstützen Sie die Menschen"
CUB_CW_support_the_people_desc:0 "Wir werden politischen Maßnahmen den Vorzug geben, die der Bevölkerung direkt zugute kommen, und dafür sorgen, dass sich Wirtschaftswachstum in einem verbesserten Lebensstandard für alle Bürger niederschlägt."

CUB_CW_support_the_corporations:0 "Unterstützen Sie die Unternehmen"
CUB_CW_support_the_corporations_desc:0 "Wir werden wirtschaftsfreundliche Maßnahmen umsetzen, um die Unternehmensinteressen zu unterstützen und ein investitions- und wachstumsförderndes Umfeld zu schaffen."

CUB_CW_improve_agricultural_efficiency_i:0 "Verbesserung der landwirtschaftlichen Effizienz I"
CUB_CW_improve_agricultural_efficiency_i_desc:0 "Wir werden Maßnahmen einführen, um die Effizienz unseres Agrarsektors zu steigern, die Produktivität zu erhöhen und die Ernährungssicherheit zu gewährleisten."

CUB_CW_international_joint_ventures:0 "Internationale Joint Ventures"
CUB_CW_international_joint_ventures_desc:0 "Wir werden Joint Ventures mit internationalen Partnern anstreben und dabei ausländisches Fachwissen und Kapital nutzen, um unsere wirtschaftliche Entwicklung voranzutreiben."

CUB_CW_allow_government_gold_stockpiling:0 "Erlauben Sie der Regierung, Gold zu horten"
CUB_CW_allow_government_gold_stockpiling_desc:0 "Wir werden der Regierung gestatten, Gold zu horten, um unsere Finanzreserven zu stärken und die wirtschaftliche Stabilität zu gewährleisten."

CUB_CW_net_zero_inflation_scheme:0 "Netto-Null-Inflationsschema"
CUB_CW_net_zero_inflation_scheme_desc:0 "Wir werden Maßnahmen umsetzen, die auf die Erreichung einer Netto-Null-Inflation, die Stabilisierung der Preise und den Schutz der Kaufkraft unserer Bürger abzielen."

CUB_CW_committee_for_the_mitigation_of_natural_disasters:0 "Ausschuss zur Eindämmung von Naturkatastrophen"
CUB_CW_committee_for_the_mitigation_of_natural_disasters_desc:0 "Wir werden ein Komitee einrichten, das Strategien zur Milderung der Auswirkungen von Naturkatastrophen entwickelt und umsetzt und so die Widerstandsfähigkeit unseres Landes sicherstellt."

CUB_CW_cuban_sugar_growers_union:0 "Gewerkschaft der kubanischen Zuckerbauern"
CUB_CW_cuban_sugar_growers_union_desc:0 "Wir werden eng mit der Gewerkschaft der kubanischen Zuckerproduzenten zusammenarbeiten, um die Interessen unserer Zuckerindustrie zu unterstützen und zu fördern und so ihren anhaltenden Erfolg sicherzustellen."

CUB_CW_bureau_of_economic_stability:0 "Amt für wirtschaftliche Stabilität"
CUB_CW_bureau_of_economic_stability_desc:0 "Wir werden ein Büro einrichten, das sich der Aufrechterhaltung der wirtschaftlichen Stabilität, der Überwachung wirtschaftlicher Indikatoren und der Umsetzung von Korrekturmaßnahmen nach Bedarf widmet."

CUB_CW_national_sugar_regulatory_committee:0 "Nationales Zuckerregulierungskomitee"
CUB_CW_national_sugar_regulatory_committee_desc:0 "Wir werden ein Komitee zur Überwachung der Zuckerindustrie einrichten, das faire Praktiken sicherstellt und ihr Wachstum und ihre Stabilität fördert."

CUB_CW_heavy_industry_expansion_i:0 "Schwerindustrie-Erweiterung I"
CUB_CW_heavy_industry_expansion_i_desc:0 "Wir werden in den Ausbau der Schwerindustrie investieren und so den Grundstein für eine robuste industrielle Basis legen, die unsere wirtschaftlichen Ambitionen unterstützen kann."

CUB_CW_heavy_industry_expansion_ii:0 "Schwerindustrie-Erweiterung II"
CUB_CW_heavy_industry_expansion_ii_desc:0 "Wir werden unsere Bemühungen zum Ausbau der Schwerindustrie fortsetzen und auf den ersten Erfolgen aufbauen, um unsere industriellen Fähigkeiten weiter zu stärken."

CUB_CW_set_agricultural_efficiency_targets:0 "Setzen Sie landwirtschaftliche Effizienzziele"
CUB_CW_set_agricultural_efficiency_targets_desc:0 "Wir werden konkrete Ziele für die landwirtschaftliche Effizienz festlegen und so messbare Verbesserungen bei Produktivität und Nachhaltigkeit sicherstellen."

CUB_CW_subsidize_new_crop_types:0 "Subventionierung neuer Pflanzenarten"
CUB_CW_subsidize_new_crop_types_desc:0 "Wir werden den Anbau neuer Nutzpflanzen subventionieren, unsere landwirtschaftliche Produktion diversifizieren und die Ernährungssicherheit verbessern."

CUB_CW_light_industry_expansion_i:0 "Ausbau der Leichtindustrie I"
CUB_CW_light_industry_expansion_i_desc:0 "Wir werden uns auf den Ausbau der Leichtindustrie konzentrieren und Sektoren fördern, die sich schnell an die Marktanforderungen anpassen und das Wirtschaftswachstum vorantreiben können."

CUB_CW_multinational_corporations:0 "Multinationale Konzerne"
CUB_CW_multinational_corporations_desc:0 "Wir werden multinationale Konzerne anziehen und unterstützen und ihre globale Reichweite nutzen, um unsere Wirtschaft anzukurbeln und Arbeitsplätze zu schaffen."

CUB_CW_exclusive_trade_deals:0 "Exklusive Handelsangebote"
CUB_CW_exclusive_trade_deals_desc:0 "Wir werden exklusive Handelsabkommen aushandeln, um vorteilhafte Bedingungen für unsere Exporte zu sichern und sicherzustellen, dass unsere Produkte auf den internationalen Märkten einen Wettbewerbsvorteil haben."

CUB_CW_manhattan_investors:0 "Manhattan-Investoren"
CUB_CW_manhattan_investors_desc:0 "Wir werden in Finanzzentren wie Manhattan nach Investitionen suchen und Kapital einbringen, um unsere Bemühungen zur wirtschaftlichen Entwicklung und Modernisierung voranzutreiben."

CUB_CW_permanent_expansion_of_the_light_industry:0 "Ständiger Ausbau der Leichtindustrie"
CUB_CW_permanent_expansion_of_the_light_industry_desc:0 "Wir werden langfristige Initiativen zum Ausbau der Leichtindustrie einführen und so ihr kontinuierliches Wachstum und ihren Beitrag zur Wirtschaft sicherstellen."

CUB_CW_import_the_latest_technology:0 "Importieren Sie die neueste Technologie"
CUB_CW_import_the_latest_technology_desc:0 "Wir werden den Import von Spitzentechnologie erleichtern, unsere industriellen Kapazitäten verbessern und mit dem weltweiten Fortschritt Schritt halten."

CUB_CW_establish_hollywood_influences:0 "Hollywood-Einflüsse etablieren"
CUB_CW_establish_hollywood_influences_desc:0 "Wir werden kulturelle Verbindungen zu Hollywood pflegen und unser Land durch Medien und Unterhaltung fördern, um unser globales Image zu verbessern."

CUB_CW_high_speed_airports:0 "Hochgeschwindigkeitsflughäfen"
CUB_CW_high_speed_airports_desc:0 "Wir werden in die Entwicklung von Hochgeschwindigkeitsflughäfen investieren, unsere Verkehrsinfrastruktur verbessern und das Wirtschaftswachstum fördern."

CUB_CW_secure_corporate_loan_incentives:0 "Sichere Anreize für Unternehmenskredite"
CUB_CW_secure_corporate_loan_incentives_desc:0 "Wir werden Anreize für Unternehmenskredite bieten und so Investitionen und Expansionen in Schlüsselindustrien fördern."

CUB_CW_promote_new_cuban_cigars:0 "Werben Sie für neue kubanische Zigarren"
CUB_CW_promote_new_cuban_cigars_desc:0 "Wir werden Marketingkampagnen starten, um für neue kubanische Zigarren zu werben und ihren weltweiten Ruf zu nutzen, um Exporte und Wirtschaftswachstum anzukurbeln."

CUB_CW_committees_for_regulating_american_trade:0 "Ausschüsse zur Regulierung des amerikanischen Handels"
CUB_CW_committees_for_regulating_american_trade_desc:0 "Wir werden Ausschüsse einrichten, die den Handel mit den Vereinigten Staaten überwachen und regulieren und so einen fairen und vorteilhaften Wirtschaftsaustausch sicherstellen."

CUB_CW_the_armenian_genocide:0 "Der Völkermord an den Armeniern"
CUB_CW_the_armenian_genocide_desc:0 "Wir werden die historischen Fakten rund um den Völkermord an den Armeniern offiziell anerkennen und uns damit auseinandersetzen und uns für Gerechtigkeit und historische Genauigkeit einsetzen."

CUB_CW_protect_the_homeland_from_the_red_threat:0 "Schützen Sie das Heimatland vor der roten Bedrohung"
CUB_CW_protect_the_homeland_from_the_red_threat_desc:0 "Wir werden Maßnahmen ergreifen, um unser Land vor kommunistischen Einflüssen zu schützen und die Sicherheit und Stabilität unserer demokratischen Institutionen zu gewährleisten."
CUB_CW_improve_the_historical_societys_budget:0 "Verbessern Sie das Budget der Historischen Gesellschaft"
CUB_CW_improve_the_historical_societys_budget_desc:0 "Wir werden der Historischen Gesellschaft zusätzliche Mittel zur Verfügung stellen, um die Erhaltung und Förderung unseres reichen kulturellen Erbes zu ermöglichen. Diese Investition wird Forschung, Ausstellungen und Bildungsprogramme unterstützen, die unsere Geschichte und Identität würdigen und Nationalstolz und Einheit fördern."

CUB_CW_bureau_of_economic_stability:0 "Amt für wirtschaftliche Stabilität"
CUB_CW_bureau_of_economic_stability_desc:0 "Wir werden ein spezielles Büro einrichten, das die wirtschaftliche Stabilität gewährleisten soll. Dieses Büro wird wichtige Wirtschaftsindikatoren überwachen, Trends analysieren und Maßnahmen ergreifen, um ein stabiles Wachstum zu gewährleisten, die Inflation zu senken und ein günstiges Geschäftsumfeld zu fördern. Durch die Bereitstellung zeitnaher und präziser Wirtschaftsdaten ermöglicht das Büro fundierte Entscheidungen und unterstützt die langfristige Wirtschaftsplanung."

CUB_CW_light_industry_expansion_i:0 "Ausbau der Leichtindustrie I"
CUB_CW_light_industry_expansion_i_desc:0 "Wir werden eine Reihe von Maßnahmen zum Ausbau unserer Leichtindustrie ergreifen und uns dabei auf anpassungsfähige Branchen mit hohem Wachstumspotenzial konzentrieren. Dieser Ausbau wird neue Arbeitsplätze schaffen, unsere Wirtschaft diversifizieren und unsere Importabhängigkeit verringern. Durch Investitionen in Infrastruktur, Technologie und Fachkräfteausbildung wollen wir das Wirtschaftswachstum ankurbeln und unsere industrielle Kapazität stärken."

CUB_CW_improve_agricultural_efficiency_ii:0 "Verbesserung der landwirtschaftlichen Effizienz II"
CUB_CW_improve_agricultural_efficiency_ii_desc:0 "Aufbauend auf bisherigen Bemühungen werden wir die Effizienz unseres Agrarsektors weiter steigern. Dazu gehören die Einführung moderner Anbautechniken, Investitionen in Be- und Entwässerungssysteme sowie die Förderung ertragreicher Nutzpflanzen. Durch Produktivitätssteigerungen und Abfallreduzierung erhöhen wir die Ernährungssicherheit, fördern die ländliche Entwicklung und tragen zum allgemeinen Wirtschaftswachstum bei."

CUB_CW_improve_agricultural_efficiency_iii:0 "Verbesserung der landwirtschaftlichen Effizienz III"
CUB_CW_improve_agricultural_efficiency_iii_desc:0 "Wir setzen unser Engagement für die Verbesserung der Landwirtschaft fort und konzentrieren uns auf fortschrittliche Methoden zur Effizienzsteigerung. Dazu gehört der Einsatz von Technologien wie Präzisionslandwirtschaft, genetischer Modifikation und nachhaltigen Praktiken, um Erträge zu maximieren und gleichzeitig die Umweltbelastung zu minimieren. Durch Innovationen in der Landwirtschaft wollen wir die Ernährungssicherheit gewährleisten, die Lebensbedingungen in ländlichen Gebieten verbessern und eine nachhaltige Entwicklung fördern."

CUB_CW_heavy_industry_expansion_iii:0 "Schwerindustrie-Erweiterung III"
CUB_CW_heavy_industry_expansion_iii_desc:0 "Aufbauend auf unseren bisherigen Erfolgen in der Schwerindustrie werden wir einen umfassenden Expansionsplan in Angriff nehmen. Dieser beinhaltet umfangreiche Investitionen in Infrastruktur, Maschinenpark und Personalentwicklung, um unsere industrielle Kapazität zu erhöhen. Durch die Priorisierung strategischer Branchen wie Stahl, Maschinenbau und Chemie wollen wir unsere industrielle Basis stärken, Arbeitsplätze schaffen und das Wirtschaftswachstum ankurbeln."
CUB_CW_bureau_of_labor:0 "Büro des Arbeitsamtes"
CUB_CW_bureau_of_labor_desc:0 "Wir werden ein Arbeitsamt einrichten, um die Arbeitspraktiken in unserem Land zu überwachen und zu regulieren. Dieses Amt wird für faire Löhne, sichere Arbeitsbedingungen und den Schutz der Arbeitnehmerrechte verantwortlich sein. Es wird sich außerdem dafür einsetzen, Ausbeutung und Diskriminierung am Arbeitsplatz zu verhindern und ein faires und gerechtes Arbeitsumfeld zu fördern. Indem wir das Wohlergehen unserer Arbeitnehmer in den Vordergrund stellen, wollen wir unsere Wirtschaft stärken und eine gerechtere und wohlhabendere Gesellschaft aufbauen."
CUB_CW_engineering_exchange_programs:0 "Austauschprogramme für Ingenieure"
CUB_CW_engineering_exchange_programs_desc:0 "Wir werden Austauschprogramme einrichten, um den Austausch von Ingenieurwissen und -expertise mit anderen Nationen zu erleichtern. Diese Programme ermöglichen unseren Ingenieuren, neue Erkenntnisse, Techniken und Technologien zu gewinnen, ihre Fähigkeiten zu erweitern und unsere Infrastruktur zu verbessern. Durch die Förderung der internationalen Zusammenarbeit wollen wir unsere Ingenieurkompetenzen ausbauen und die globale Zusammenarbeit in diesem Bereich fördern."

CUB_CW_off_the_gold_standard:0 "Abseits des Goldstandards"
CUB_CW_off_the_gold_standard_desc:0 "Wir werden uns vom Goldstandard lösen und ein flexibleres Währungssystem einführen. Dies ermöglicht es uns, unsere Währung besser zu verwalten und auf wirtschaftliche Herausforderungen zu reagieren. Durch die Abkopplung vom Goldstandard wollen wir mehr Kontrolle über unsere Geldpolitik erlangen und wirtschaftliche Stabilität und Wachstum fördern."

CUB_CW_department_of_commerce:0 "Handelsministerium"
CUB_CW_department_of_commerce_desc:0 "Wir werden ein Handelsministerium einrichten, um die wirtschaftlichen Aktivitäten in unserem Land zu überwachen und zu fördern. Dieses Ministerium wird für die Erleichterung des Handels, die Regulierung des Handels und die Förderung der Geschäftsentwicklung verantwortlich sein. Durch die Unterstützung und Beratung von Unternehmen wollen wir das Wirtschaftswachstum ankurbeln, Arbeitsplätze schaffen und den Lebensstandard unserer Bürger verbessern."

CUB_CW_federal_certification_for_handrolled_cigars:0 "Bundeszertifizierung für handgerollte Zigarren"
CUB_CW_federal_certification_for_handrolled_cigars_desc:0 "Wir führen ein Zertifizierungsverfahren für handgerollte Zigarren ein, das sicherstellt, dass nur Produkte, die bestimmte Qualitätsstandards erfüllen, als solche vermarktet werden können. Diese Zertifizierung schützt den Ruf unserer Zigarrenindustrie und stärkt das Vertrauen der Verbraucher in unsere Produkte. Durch die Einhaltung der Qualitätsstandards wollen wir unsere Position als führender Hersteller von Premiumzigarren auf dem internationalen Markt behaupten."
BHU1933_the_will_of_the_people:0 "Der Wille des Volkes"
BHU1933_the_will_of_the_people_desc:0 "Wir werden die Wünsche und das Wohl unserer Bevölkerung bei allen Regierungsentscheidungen in den Vordergrund stellen. Diese Orientierung am Willen des Volkes wird unsere Politik und unser Handeln leiten und sicherstellen, dass sie im besten Interesse unseres Landes und seiner Bürger sind."

BHU1933_fight_the_great_depression:0 "Bekämpfen Sie die Große Depression"
BHU1933_fight_the_great_depression_desc:0 "Wir werden Maßnahmen ergreifen, um die Auswirkungen der Weltwirtschaftskrise auf unsere Wirtschaft zu bekämpfen. Zu diesen Maßnahmen können höhere Staatsausgaben, Programme zur Schaffung von Arbeitsplätzen und Wirtschaftsreformen gehören, um das Wachstum anzukurbeln und Not zu lindern."

BHU1933_strengthen_the_government:0 "Stärkung der Regierung"
BHU1933_strengthen_the_government_desc:0 "Wir werden daran arbeiten, die Leistungsfähigkeit und Effektivität unserer Regierung zu stärken. Dies kann Reformen zur Straffung der Bürokratie, zur Verbesserung der Regierungsführung und zur Verbesserung der öffentlichen Dienstleistungen beinhalten. Durch die Stärkung unserer Regierung wollen wir unseren Bürgern besser dienen und die Herausforderungen unseres Landes bewältigen."

BHU1933_fascism_leads_the_way:0 "Der Faschismus weist den Weg"
BHU1933_fascism_leads_the_way_desc:0 "Wir werden die Prinzipien des Faschismus als Leitideologie für unser Land annehmen. Der Faschismus legt Wert auf starke, zentralisierte Kontrolle, nationale Einheit und die Förderung der Staatsinteressen. Mit der Übernahme des Faschismus streben wir nach größerer politischer Stabilität und nationaler Stärke."

BHU1933_fight_the_unemployment:0 "Kampf gegen die Arbeitslosigkeit"
BHU1933_fight_the_unemployment_desc:0 "Wir werden Initiativen zur Reduzierung der Arbeitslosigkeit und zur Schaffung von Arbeitsplätzen für unsere Bevölkerung starten. Dazu gehören öffentliche Bauprojekte, Berufsbildungsprogramme und Anreize für Unternehmen, Arbeitnehmer einzustellen. Durch die Bekämpfung der Arbeitslosigkeit wollen wir das wirtschaftliche Wohlergehen unserer Bürger verbessern."

BHU1933_an_axis_of_our_own:0 "Eine eigene Achse"
BHU1933_an_axis_of_our_own_desc:0 "Wir werden versuchen, unsere eigene Macht- und Einflussachse in der Welt zu etablieren. Dazu können wir Bündnisse mit anderen Nationen eingehen, die unsere Interessen und Werte teilen, und wir können unsere Unabhängigkeit und Souveränität auf der Weltbühne behaupten."

BHU1933_seek_international_cooperation:0 "Streben Sie internationale Zusammenarbeit an"
BHU1933_seek_international_cooperation_desc:0 "Wir werden Möglichkeiten der internationalen Zusammenarbeit und Kooperation mit anderen Nationen nutzen. Dies kann diplomatische Initiativen, Handelsabkommen und die Teilnahme an internationalen Organisationen umfassen. Durch die internationale Zusammenarbeit wollen wir Frieden, Wohlstand und gegenseitiges Verständnis fördern."

BHU1933_league_of_neutral_states:0 "Liga der Neutralen Staaten"
BHU1933_league_of_neutral_states_desc:0 "Wir werden uns für die Gründung einer Liga neutraler Staaten einsetzen, die sich der Wahrung des Friedens und der Konfliktprävention verschrieben hat. Diese Liga würde neutralen Nationen ein Forum bieten, um gemeinsame Interessen zu diskutieren, Streitigkeiten beizulegen und die internationale Stabilität zu fördern."

BHU1933_seek_to_join_allies:0 "Versuchen Sie, sich Verbündeten anzuschließen"
BHU1933_seek_to_join_allies_desc:0 "Wir werden Bündnisse mit anderen Nationen anstreben, die unsere Werte und Interessen teilen. Durch den Zusammenschluss mit Verbündeten wollen wir unsere Sicherheit stärken, unseren Einfluss vergrößern und unsere gemeinsamen Ziele auf der Weltbühne vorantreiben."

BHU1933_government_contracts:0 "Regierungsaufträge"
BHU1933_government_contracts_desc:0 "Wir werden der Vergabe von Regierungsaufträgen an lokale Unternehmen und Industrien Priorität einräumen. Dieser Fokus auf die Unterstützung einheimischer Unternehmen wird das Wirtschaftswachstum ankurbeln, Arbeitsplätze schaffen und unsere Volkswirtschaft stärken."

BHU1933_create_militias:0 "Milizen erstellen"
BHU1933_create_militias_desc:0 "Wir werden Milizen gründen, um unsere nationale Verteidigungsfähigkeit zu stärken. Diese Milizen werden aus ausgebildeten Freiwilligen bestehen, die im Bedarfsfall mobilisiert werden können, um unser Land und seine Interessen zu schützen."

BHU1933_march_to_the_capital:0 "Marsch in die Hauptstadt"
BHU1933_march_to_the_capital_desc:0 "Wir werden einen Marsch in die Hauptstadt organisieren, um unsere Einheit und Entschlossenheit zu demonstrieren. Diese symbolische Geste wird unsere Unterstützer mobilisieren, die Moral stärken und unseren Gegnern ein klares Zeichen der Stärke und Entschlossenheit senden."

BHU1933_lenins_legacy:0 "Lenins Vermächtnis"
BHU1933_lenins_legacy_desc:0 "Wir werden das Erbe Wladimir Lenins, des Gründers der Sowjetunion, studieren und uns davon inspirieren lassen. Lenins Ideen und Prinzipien des Sozialismus und der Revolution werden unsere Bemühungen um den Aufbau einer gerechten und gleichberechtigten Gesellschaft für alle leiten."

BHU1933_assert_our_position:0 "Unsere Position behaupten"
BHU1933_assert_our_position_desc:0 "Wir werden die Position und Interessen unseres Landes auf der Weltbühne vertreten. Dies kann diplomatische Initiativen, öffentliche Erklärungen und strategische Allianzen umfassen, um unseren Einfluss zu stärken und unsere Souveränität zu verteidigen."

BHU1933_nationalize_the_industry:0 "Verstaatlichung der Industrie"
BHU1933_nationalize_the_industry_desc:0 "Wir werden Schlüsselindustrien verstaatlichen, um staatliche Kontrolle und Aufsicht sicherzustellen. Dies könnte die Übernahme strategischer Industrien wie Energie, Transport und Telekommunikation beinhalten. Durch die Verstaatlichung dieser Industrien wollen wir die wirtschaftliche Entwicklung und den sozialen Wohlstand fördern."

BHU1933_guide_the_public_opinion:0 "Lenken Sie die öffentliche Meinung"
BHU1933_guide_the_public_opinion_desc:0 "Wir werden Maßnahmen ergreifen, um die öffentliche Meinung zu lenken und die nationale Einheit zu fördern. Dazu können Zensur, Propaganda und Bildungsinitiativen gehören, um die öffentliche Wahrnehmung zu beeinflussen und die Loyalität gegenüber dem Staat zu stärken."

BHU1933_fulfill_our_promises:0 "Erfüllen Sie unsere Versprechen"
BHU1933_fulfill_our_promises_desc:0 "Wir werden unsere Versprechen gegenüber der Bevölkerung erfüllen und unseren Verpflichtungen nachkommen. Dazu gehört die Umsetzung von Reformen, die Bereitstellung von Dienstleistungen und die Verbesserung des Lebensstandards, um den Bedürfnissen und Erwartungen unserer Bürger gerecht zu werden."

BHU1933_nationwide_infrastructure:0 "Landesweite Infrastruktur"
BHU1933_nationwide_infrastructure_desc:0 "Wir werden in landesweite Infrastrukturprojekte investieren, um die Konnektivität zu verbessern und die wirtschaftliche Entwicklung zu fördern. Dazu gehört der Bau von Straßen, Brücken, Eisenbahnen und anderer wichtiger Infrastruktur, um den Handel zu erleichtern und die Lebensqualität zu verbessern."

BHU1933_unite_the_masses:0 "Vereint die Massen"
BHU1933_unite_the_masses_desc:0 "Wir werden daran arbeiten, die Massen hinter unserer Sache und unserer Vision für die Nation zu vereinen. Dazu können Kundgebungen, die Förderung des Nationalstolzes und die Förderung eines Gefühls der Zugehörigkeit und Solidarität in unserem Volk gehören."

BHU1933_mobilize_the_masses:0 "Mobilisieren Sie die Massen"
BHU1933_mobilize_the_masses_desc:0 "Wir werden die Massen mobilisieren, um unsere Politik und Initiativen zu unterstützen. Dazu können Demonstrationen, Streiks und andere Protestformen gehören, um Druck auszuüben und unsere Agenda voranzutreiben."

BHU1933_persecute_the_rich:0 "Verfolgen Sie die Reichen"
BHU1933_persecute_the_rich_desc:0 "We will persecute the rich and redistribute their wealth to benefit the poor and the working class. This may include imposing heavy taxes, confisc
BHU1933_nationalize_the_industry_communism:0 "Verstaatlichung der Industrie (Kommunismus)"
BHU1933_nationalize_the_industry_communism_desc:0 "Wir werden alle Industrien nach kommunistischen Prinzipien verstaatlichen und sicherstellen, dass die Produktionsmittel im Besitz des Staates bleiben und von ihm kontrolliert werden. Dies wird es uns ermöglichen, die Wirtschaft zentral zu planen und die Ressourcen entsprechend den Bedürfnissen der Bevölkerung zu verteilen."

BHU1933_institute_of_national_propaganda:0 "Institut für Nationale Propaganda"
BHU1933_institute_of_national_propaganda_desc:0 "Wir werden ein Institut für nationale Propaganda gründen, um unsere Ideologie und Werte zu verbreiten. Dieses Institut wird Propagandamaterial produzieren, öffentliche Kampagnen durchführen und die öffentliche Meinung zugunsten unserer Regierung und ihrer Politik beeinflussen."

BHU1933_5_year_plan:0 "5-Jahres-Plan"
BHU1933_5_year_plan_desc:0 "Wir werden einen Fünfjahresplan zur Steuerung unserer wirtschaftlichen Entwicklung und unseres Wachstums umsetzen. Dieser Plan wird Ziele für Schlüsselsektoren festlegen, Ressourcen zuweisen und Strategien skizzieren, um unsere wirtschaftlichen Ziele innerhalb des festgelegten Zeitrahmens zu erreichen."

BHU1933_military_technical_institute:0 "Militärtechnisches Institut"
BHU1933_military_technical_institute_desc:0 "Wir werden ein militärtechnisches Institut gründen, um Personal in fortschrittlicher Militärtechnologie und -taktik auszubilden. Dieses Institut wird unsere militärischen Fähigkeiten stärken und sicherstellen, dass unsere Streitkräfte für die Verteidigung unseres Landes gerüstet sind."

BHU1933_light_cruiser_advancement:0 "Weiterentwicklung des leichten Kreuzers"
BHU1933_light_cruiser_advancement_desc:0 "Wir werden unsere Technologie für leichte Kreuzer weiterentwickeln, um unsere Marinekapazitäten zu stärken. Diese Weiterentwicklung wird die Geschwindigkeit, Feuerkraft und Effizienz unserer leichten Kreuzer verbessern und sie so bei Marineoperationen effektiver machen."

BHU1933_submarine_advancement:0 "U-Boot-Fortschritt"
BHU1933_submarine_advancement_desc:0 "Wir werden unsere U-Boot-Technologie weiterentwickeln, um unsere Marinekapazitäten zu erweitern. Diese Weiterentwicklung wird die Tarnung, Reichweite und Feuerkraft unserer U-Boote verbessern und sie in der Seekriegsführung zu einer noch beeindruckenderen Waffe machen."

BHU1933_raider_fleet:0 "Raider-Flotte"
BHU1933_raider_fleet_desc:0 "Wir werden eine Angriffsflotte aufbauen, um den feindlichen Schiffsverkehr und Handel zu stören. Diese Flotte besteht aus schnellen, wendigen Schiffen, die mit Langstreckengeschützen und Torpedos ausgestattet sind, um schnell zuschlagen und feindlichen Gegenangriffen ausweichen zu können."

BHU1933_fleet_in_being:0 "Flotte im Sein"
BHU1933_fleet_in_being_desc:0 "Wir werden eine Flotte unterhalten, um potenzielle Gegner abzuschrecken und unsere maritimen Interessen zu schützen. Diese Flotte besteht aus einer Kerngruppe von Kriegsschiffen, die stets einsatzbereit sind und als strategische Reserve und Symbol unserer Seemacht dienen."

BHU1933_heavy_cruiser_advancement:0 "Weiterentwicklung schwerer Kreuzer"
BHU1933_heavy_cruiser_advancement_desc:0 "Wir werden unsere Technologie für schwere Kreuzer weiterentwickeln, um unsere Marinekapazitäten zu verbessern. Diese Weiterentwicklung wird die Feuerkraft, Panzerung und Ausdauer unserer schweren Kreuzer verbessern und sie so in Seegefechten effektiver machen."

BHU1933_battleship_advancement:0 "Schlachtschiff-Weiterentwicklung"
BHU1933_battleship_advancement_desc:0 "Wir werden unsere Schlachtschifftechnologie weiterentwickeln, um unsere Marinekapazitäten zu stärken. Dieser Fortschritt wird die Feuerkraft, Panzerung und Geschwindigkeit unserer Schlachtschiffe verbessern und sie in Seeschlachten noch beeindruckender machen."

BHU1933_destroyer_advancement:0 "Zerstörer-Fortschritt"
BHU1933_destroyer_advancement_desc:0 "Wir werden unsere Zerstörertechnologie weiterentwickeln, um unsere Marinekapazitäten zu verbessern. Diese Weiterentwicklung wird die Geschwindigkeit, Wendigkeit und Feuerkraft unserer Zerstörer verbessern und sie so bei Eskort- und U-Boot-Abwehroperationen effektiver machen."

BHU1933_build_up_the_military_industry:0 "Bauen Sie die Militärindustrie auf"
BHU1933_build_up_the_military_industry_desc:0 "Wir werden unsere Rüstungsindustrie ausbauen, um die für unsere Streitkräfte benötigte Ausrüstung und Ausrüstung zu produzieren. Dazu gehören der Ausbau bestehender Fabriken, der Bau neuer Anlagen und Investitionen in Forschung und Entwicklung zur Verbesserung unserer militärischen Fähigkeiten."

BHU1933_build_up_the_civilian_industry:0 "Aufbau der zivilen Industrie"
BHU1933_build_up_the_civilian_industry_desc:0 "Wir werden unsere zivile Industrie ausbauen, um Wirtschaftswachstum und Entwicklung zu unterstützen. Dazu gehören der Ausbau der Infrastruktur, die Erhöhung der Produktionskapazitäten sowie die Förderung von Innovation und Effizienz in Schlüsselsektoren der Wirtschaft."

BHU1933_research_funding:0 "Forschungsförderung"
BHU1933_research_funding_desc:0 "Wir werden die Mittel für Forschung und Entwicklung erhöhen, um wissenschaftliche Erkenntnisse und technologische Innovationen voranzutreiben. Dies wird es uns ermöglichen, neue Technologien zu entwickeln, bestehende zu verbessern und unsere Wettbewerbsfähigkeit auf dem Weltmarkt auszubauen."

BHU1933_big_brothers_help:0 "Hilfe des großen Bruders"
BHU1933_big_brothers_help_desc:0 "Wir werden die Unterstützung unserer Verbündeten und Partner in Anspruch nehmen, um unsere wirtschaftliche und militärische Entwicklung zu fördern. Dazu können finanzielle Hilfen, Technologietransfer und militärische Zusammenarbeit gehören, um unser Land zu stärken und unsere gemeinsamen Interessen zu fördern."

BHU1933_commune_of_our_own:0 "Unsere eigene Kommune"
BHU1933_commune_of_our_own_desc:0 "We will establish a commune system to empower local communities and promote self-governance. This system will decentralize authority,
BHU1933_international_research_agreement:0 "Internationale Forschungsvereinbarung"
BHU1933_international_research_agreement_desc:0 "Wir werden Vereinbarungen mit anderen Nationen zur Zusammenarbeit bei Forschungs- und Entwicklungsprojekten anstreben. Dies ermöglicht es uns, vom gemeinsamen Wissen und den Ressourcen zu profitieren, wissenschaftliche Entdeckungen voranzutreiben und die internationale Zusammenarbeit zu stärken."

BHU1933_infantry_advancement:0 "Infanterievormarsch"
BHU1933_infantry_advancement_desc:0 "Wir werden unsere Infanterietechnologie weiterentwickeln, um die Leistungsfähigkeit unserer Bodentruppen zu steigern. Dieser Fortschritt wird die Ausbildung, Ausrüstung und Taktik unserer Infanterieeinheiten verbessern und sie in Kampfsituationen effektiver machen."

BHU1933_military_aeronautical_institute:0 "Militärisches Luftfahrtinstitut"
BHU1933_military_aeronautical_institute_desc:0 "Wir werden ein Militärluftfahrtinstitut gründen, um Personal in Luftfahrttechnik und -betrieb auszubilden. Dieses Institut wird die Fähigkeiten unserer Luftwaffe verbessern und sicherstellen, dass unsere Piloten gut ausgebildet und qualifiziert sind."

BHU1933_institute_of_navy:0 "Institut der Marine"
BHU1933_institute_of_navy_desc:0 "Wir werden ein Institut für Marinestudien und -forschung gründen. Dieses Institut wird unser Wissen über Seekriegsführung, Technologie und Strategie erweitern und uns so den Aufbau einer stärkeren und leistungsfähigeren Marine ermöglichen."

BHU1933_artillery_advancement:0 "Artillerie-Fortschritt"
BHU1933_artillery_advancement_desc:0 "Wir werden unsere Artillerietechnologie weiterentwickeln, um die Feuerkraft unserer Bodentruppen zu erhöhen. Diese Weiterentwicklung wird die Reichweite, Genauigkeit und Effektivität unserer Artillerieeinheiten verbessern und sie auf dem Schlachtfeld tödlicher machen."

BHU1933_mechanization_advancement:0 "Fortschritt der Mechanisierung"
BHU1933_mechanization_advancement_desc:0 "Wir werden unsere Mechanisierungstechnologie weiterentwickeln, um die Mobilität und Feuerkraft unserer Bodentruppen zu verbessern. Diese Weiterentwicklung wird die Leistung unserer mechanisierten Einheiten, wie Panzer und gepanzerte Fahrzeuge, in Kampfsituationen verbessern."

BHU1933_armor_advancement:0 "Rüstungsverbesserung"
BHU1933_armor_advancement_desc:0 "Wir werden unsere Panzerungstechnologie weiterentwickeln, um den Schutz und die Überlebensfähigkeit unserer Bodentruppen zu verbessern. Diese Weiterentwicklung wird die Panzerung, das Design und die Haltbarkeit unserer gepanzerten Fahrzeuge verbessern und sie im Kampf widerstandsfähiger machen."

BHU1933_carrier_advancement:0 "Trägerfortschritt"
BHU1933_carrier_advancement_desc:0 "Wir werden unsere Flugzeugträgertechnologie weiterentwickeln, um die Leistungsfähigkeit unserer Seestreitkräfte zu steigern. Diese Weiterentwicklung wird die Größe, Geschwindigkeit und Flugzeugkapazität unserer Träger verbessern und sie so effektiver bei der Machtdemonstration und Durchführung von Operationen auf See machen."

BHU1933_military_academy:0 "Militärakademie"
BHU1933_military_academy_desc:0 "Wir werden eine Militärakademie zur Ausbildung von Offizieren und Führungskräften für unsere Streitkräfte errichten. Diese Akademie wird eine umfassende Ausbildung in militärischer Strategie, Führung und Taktik bieten und sicherstellen, dass unsere Streitkräfte von qualifiziertem und kompetentem Personal geführt werden."

BHU1933_fighter_focus:0 "Kämpferfokus"
BHU1933_fighter_focus_desc:0 "Wir werden unsere Anstrengungen auf die Entwicklung und den Einsatz von Kampfflugzeugen konzentrieren, um die Fähigkeiten unserer Luftwaffe zu stärken. Dieser Fokus auf Kampfflugzeuge wird unsere Fähigkeit verbessern, die Luftüberlegenheit zu erlangen und Bodenoperationen durch Luftnahunterstützung zu unterstützen."

BHU1933_cas_advancement:0 "CAS-Fortschritt"
BHU1933_cas_advancement_desc:0 "Wir werden unsere Fähigkeiten zur Luftnahunterstützung (CAS) ausbauen, um unseren Bodentruppen eine effektive Luftunterstützung zu bieten. Diese Weiterentwicklung wird die Effektivität und Genauigkeit unserer CAS-Flugzeuge verbessern und sie so für die Unterstützung von Bodenoperationen wertvoller machen."

BHU1933_bomber_advancement:0 "Bomber-Weiterentwicklung"
BHU1933_bomber_advancement_desc:0 "Wir werden unsere Bombertechnologie weiterentwickeln, um unsere strategischen Bombenfähigkeiten zu verbessern. Diese Weiterentwicklung wird die Reichweite, Nutzlast und Genauigkeit unserer Bomber verbessern und sie so effektiver bei der Bekämpfung feindlicher Ziele machen."

BHU1933_aeronautical_academy:0 "Luftfahrtakademie"
BHU1933_aeronautical_academy_desc:0 "Wir werden eine Luftfahrtakademie gründen, um Piloten und Luftfahrtingenieure für unsere Luftwaffe auszubilden. Diese Akademie wird eine Spezialausbildung in Luftfahrttechnik, Flugbetrieb und Flugzeugwartung anbieten und so sicherstellen, dass unsere Luftwaffe gut ausgebildet und ausgerüstet ist."

BHU1933_dockyard_focus:0 "Werft-Fokus"
BHU1933_dockyard_focus_desc:0 "Wir werden unsere Bemühungen auf den Auf- und Ausbau von Werften konzentrieren, um unsere Bemühungen im Schiffsbau und in der Schiffswartung zu unterstützen. Dieser Fokus auf Werften wird unsere Fähigkeit verbessern, eine starke und leistungsfähige Marine aufzubauen und zu erhalten."

BHU1933_join_the_axis:0 "Treten Sie der Achse bei"
BHU1933_join_the_axis_desc:0 "Wir werden versuchen, uns den Achsenmächten anzuschließen und uns ihren Zielen und Interessen anzuschließen. Durch den Beitritt zur Achse wollen wir unsere Position im globalen Kräftegleichgewicht stärken und uns die Unterstützung mächtiger Verbündeter sichern."

BHU1933_join_research_effort:0 "Forschungsbemühungen unterstützen"
BHU1933_join_research_effort_desc:0 "Wir beteiligen uns an internationalen Forschungsbemühungen und arbeiten gemeinsam an wissenschaftlichen und technologischen Projekten. Durch die Teilnahme an diesen Forschungsbemühungen wollen wir vom gemeinsamen Wissen und den Ressourcen profitieren, unsere eigenen Forschungsziele vorantreiben und zum globalen wissenschaftlichen Fortschritt beitragen."

BHU1933_naval_academy:0 "Marineakademie"
BHU1933_naval_academy_desc:0 "Wir werden eine Marineakademie zur Ausbildung von Offizieren und Matrosen für unsere Marine errichten. Diese Akademie wird eine umfassende Ausbildung in Marinestrategie, Seemannschaft und Seekriegsführung bieten und sicherstellen, dass unsere Marine von qualifiziertem und kompetentem Personal geführt wird."


BHU_economy_start:0 "Beginn der Wirtschaftsreformen"

BHU_economy_start_desc:0 "Wir werden eine Reihe von Wirtschaftsreformen einleiten, um unsere Wirtschaft zu modernisieren und den Lebensstandard unserer Bevölkerung zu verbessern. Der Schwerpunkt dieser Reformen liegt auf der Förderung des Wirtschaftswachstums, der Steigerung der Effizienz und der Armutsbekämpfung."


BHU_economy_defence_1:0 "Defensive Wirtschaft"

BHU_economy_defence_1_desc:0 "Wir werden einer Wirtschaftspolitik den Vorzug geben, die unsere nationale Verteidigungsfähigkeit stärkt. Dazu gehören Investitionen in die Rüstungsindustrie, die Verbesserung der Infrastruktur für militärische Zwecke und die Verbesserung unserer Fähigkeit, in Kriegszeiten Ressourcen zu mobilisieren."


BHU_economy_defence_3:0 "Defensive Ökonomie III"

BHU_economy_defence_3_desc:0 "Wir werden weiterhin einer Wirtschaftspolitik den Vorzug geben, die unsere nationale Verteidigungsfähigkeit stärkt. Dazu können weitere Investitionen in die Rüstungsindustrie, die Infrastruktur und die Mobilisierung von Ressourcen gehören, um die Sicherheit unseres Landes zu gewährleisten."


BHU_economy_defence_2:0 "Defensive Ökonomie II"

BHU_economy_defence_2_desc:0 "Wir werden weiterhin einer Wirtschaftspolitik Priorität einräumen, die unsere nationalen Verteidigungsfähigkeiten stärkt. Dazu gehören der Ausbau unserer Rüstungsindustrie, die Verbesserung der Infrastruktur für militärische Zwecke und die Verbesserung unserer Fähigkeit, in Kriegszeiten Ressourcen zu mobilisieren."


BHU_economy_roads_1:0 "Entwicklung der Straßeninfrastruktur"

BHU_economy_roads_1_desc:0 "Wir werden in den Ausbau der Straßeninfrastruktur investieren, um die Verkehrsanbindung zu verbessern und das Wirtschaftswachstum zu fördern. Dazu gehören der Bau neuer Straßen, die Modernisierung bestehender Straßen und die Verbesserung der Verkehrsnetze im ganzen Land."


BHU_economy_roads_2:0 "Straßeninfrastrukturentwicklung II"

BHU_eonomy_roads_2_desc:0 "Wir werden weiterhin in den Ausbau der Straßeninfrastruktur investieren, um die Verkehrsanbindung zu verbessern und das Wirtschaftswachstum zu fördern. Dazu gehört der Bau neuer Straßen, die Modernisierung bestehender Straßen und die Verbesserung der Verkehrsnetze im ganzen Land."
BHU_economy_roads_3:0 "Straßeninfrastrukturentwicklung III"

BHU_economy_roads_3_desc:0 "Wir werden weiter in den Ausbau der Straßeninfrastruktur investieren, um die Konnektivität zu verbessern und das Wirtschaftswachstum zu fördern. Dazu gehört der Ausbau und die Modernisierung unseres Straßennetzes, die Verbesserung der Verkehrsverbindungen und die Verbesserung des Zugangs zu entlegenen Gebieten."
BHU_economy_roads_4:0 "Straßeninfrastrukturentwicklung IV"

BHU_economy_roads_4_desc:0 "Wir werden unsere Investitionen in die Straßeninfrastruktur fortsetzen, um die Konnektivität zu verbessern und das Wirtschaftswachstum zu fördern. Dazu gehört der weitere Ausbau und die Modernisierung unseres Straßennetzes, die Verbesserung der Verkehrsanbindung und die Verbesserung des Zugangs zu entlegenen Gebieten."
BHU_economy_roads_5:0 "Straßeninfrastrukturentwicklung V"

BHU_economy_roads_5_desc:0 "Wir werden weiterhin vorrangig in die Straßeninfrastruktur investieren, um die Konnektivität zu verbessern und das Wirtschaftswachstum zu fördern. Dazu gehört der weitere Ausbau und die Modernisierung unseres Straßennetzes, die Verbesserung der Verkehrsverbindungen und die Verbesserung des Zugangs zu entlegenen Gebieten."
BHU_economy_roads_6:0 "Straßeninfrastrukturentwicklung VI"

BHU_economy_roads_6_desc:0 "Wir werden weiterhin in die Straßeninfrastruktur investieren, um die Verkehrsanbindung zu verbessern und das Wirtschaftswachstum zu fördern. Dazu gehört der weitere Ausbau und die Modernisierung unseres Straßennetzes, die Verbesserung der Verkehrsanbindung und die Verbesserung des Zugangs zu entlegenen Gebieten."
BHU_eco_expansion_factory_1:0 "Ausbau der zivilen Industrie"

BHU_eco_expansion_factory_1_desc:0 "Wir werden unsere zivile Industrie ausbauen, um das Wirtschaftswachstum zu fördern und den Lebensstandard zu verbessern. Dazu gehören Investitionen in Infrastruktur, Technologie und die Entwicklung der Arbeitskräfte, um die Produktionskapazität und -effizienz zu steigern."
BHU_eco_expansion_factory_miltary_1:0 "Ausbau der Militärindustrie"

BHU_eco_expansion_factory_miltary_1_desc:0 "Wir werden unsere Rüstungsindustrie ausbauen, um unsere nationale Verteidigungskapazität zu stärken. Dazu gehören Investitionen in Infrastruktur, Technologie und Personalentwicklung, um die Produktion von militärischer Ausrüstung und Nachschub zu steigern."
BHU_eco_expansion_factory_miltary_2:0 "Ausbau der Militärindustrie II"

BHU_eco_expansion_factory_miltary_2_desc:0 "Wir werden unsere Rüstungsindustrie weiter ausbauen, um unsere nationale Verteidigungskapazität zu stärken. Dazu gehören weitere Investitionen in Infrastruktur, Technologie und Personalentwicklung, um die Produktion von militärischer Ausrüstung und Nachschub zu steigern."
BHU_eco_expansion_factory_miltary_3:0 "Ausbau der Militärindustrie III"

BHU_eco_expansion_factory_miltary_3_desc:0 "Wir werden unsere Rüstungsindustrie weiter ausbauen, um unsere nationale Verteidigungskapazität zu stärken. Dazu gehören weitere Investitionen in Infrastruktur, Technologie und Personalentwicklung, um die Produktion von militärischer Ausrüstung und Nachschub zu steigern."
BHU_eco_expansion_factory_miltary_4:0 "Ausbau der Militärindustrie IV"

BHU_eco_expansion_factory_miltary_4_desc:0 "Wir werden unser Engagement für den Ausbau unserer Rüstungsindustrie fortsetzen, um unsere nationale Verteidigungskapazität zu stärken. Dazu gehören weitere Investitionen in Infrastruktur, Technologie und Personalentwicklung, um die Produktion von militärischer Ausrüstung und Nachschub zu steigern."
BHU_eco_expansion_factory_civ_1:0 "Ausbau der Zivilindustrie II"

BHU_eco_expansion_factory_civ_1_desc:0 "Wir werden unsere zivile Industrie weiter ausbauen, um das Wirtschaftswachstum zu fördern und den Lebensstandard zu verbessern. Dies erfordert weitere Investitionen in Infrastruktur, Technologie und die Entwicklung der Arbeitskräfte, um die Produktionskapazität und -effizienz zu steigern."
BHU_eco_expansion_factory_civ_2:0 "Ausbau der Zivilindustrie III"

BHU_eco_expansion_factory_civ_2_desc:0 "Wir werden unsere zivile Industrie weiter ausbauen, um das Wirtschaftswachstum zu fördern und den Lebensstandard zu verbessern. Dazu werden wir weiterhin in Infrastruktur, Technologie und die Entwicklung der Arbeitskräfte investieren, um die Produktionskapazität und -effizienz zu steigern."
BHU_eco_expansion_factory_civ_3:0 "Ausbau der Zivilindustrie IV"

BHU_eco_expansion_factory_civ_3_desc:0 "Wir werden unser Engagement für den Ausbau unserer zivilen Industrie fortsetzen, um das Wirtschaftswachstum zu fördern und den Lebensstandard zu verbessern. Dazu gehören auch weitere Investitionen in Infrastruktur, Technologie und Personalentwicklung, um die Produktionskapazität und -effizienz zu steigern."
BHU_eco_expansion_factory_civ_4:0 "Ausbau der Zivilindustrie V"

BHU_eco_expansion_factory_civ_4_desc:0 "Wir werden unser Engagement für den Ausbau unserer zivilen Industrie fortsetzen, um das Wirtschaftswachstum zu fördern und den Lebensstandard zu verbessern. Dazu gehören auch weitere Investitionen in Infrastruktur, Technologie und Personalentwicklung, um die Produktionskapazität und -effizienz zu steigern."
BHU_eco_expansion__flatten_hills:0 "Hügel für die Infrastruktur abflachen"

BHU_eco_expansion__flatten_hills_desc:0 "Wir werden ein Projekt zur Einebnung von Hügeln und unebenem Gelände durchführen, um den Bau von Infrastruktur wie Straßen, Eisenbahnen und Gebäuden zu erleichtern. Dies wird die Erreichbarkeit verbessern und die wirtschaftliche Entwicklung in Bergregionen fördern."
BHU_eco_expansion__computers1:0 "Investieren Sie in Computertechnologie"

BHU_eco_expansion__computers1_desc:0 "Wir werden in Computertechnologie investieren, um unsere Wirtschaft zu modernisieren und die Effizienz zu steigern. Dazu gehört die Entwicklung und Einführung von Computersystemen für die Datenverarbeitung, Automatisierung und Entscheidungsfindung in verschiedenen Branchen."
BHU_eco_expansion__radar1:0 "Investieren Sie in Radartechnologie"

BHU_eco_expansion__radar1_desc:0 "Wir werden in Radartechnologie investieren, um unsere militärischen und zivilen Fähigkeiten zu verbessern. Dazu gehört die Entwicklung und Bereitstellung von Radarsystemen für die Luftverteidigung, die Wetterüberwachung und die Navigation."
BHU_eco_expansion__science2:0 "Investieren Sie in wissenschaftliche Forschung II"

BHU_eco_expansion__science2_desc:0 "Wir werden weiterhin in die wissenschaftliche Forschung investieren, um Wissen und Innovation voranzutreiben. Dazu gehört die Finanzierung von Forschungsprojekten in verschiedenen Bereichen wie Physik, Chemie, Biologie und Ingenieurwesen."
BHU_eco_expansion__science3:0 "Investieren Sie in wissenschaftliche Forschung III"

BHU_eco_expansion__science3_desc:0 "Wir werden weiterhin in die wissenschaftliche Forschung investieren, um Wissen und Innovation voranzutreiben. Dazu gehört auch die Finanzierung von Forschungsprojekten in verschiedenen Bereichen wie Physik, Chemie, Biologie und Ingenieurwesen."
BHU_army_start:0 "Beginn der Militärreformen"

BHU_army_start_desc:0 "Wir werden eine Reihe von Militärreformen einleiten, um unsere Streitkräfte zu modernisieren und unsere nationale Verteidigungsfähigkeit zu stärken. Der Schwerpunkt dieser Reformen liegt auf der Verbesserung von Ausbildung, Ausrüstung und Organisation, um den Herausforderungen der modernen Kriegsführung gerecht zu werden."
BHU_army_rifles_1:0 "Infanteriegewehre aufrüsten"

BHU_army_rifles_1_desc:0 "Wir werden unsere Infanteriegewehre modernisieren, um die Feuerkraft und Schlagkraft unserer Bodentruppen zu verbessern. Dazu gehört die Einführung neuer Gewehrdesigns, die im Kampf eine bessere Reichweite, Genauigkeit und Zuverlässigkeit bieten."
BHU_army_tactics_1:0 "Infanterietaktiken entwickeln"

BHU_army_tactics_1_desc:0 "Wir werden neue Infanterietaktiken entwickeln, um die Manövrierfähigkeit und Schlagkraft unserer Bodentruppen zu verbessern. Dazu gehört auch die Ausbildung unserer Truppen in modernen Kriegstaktiken, wie zum Beispiel Kleintruppentaktiken, Häuserkampf und Aufstandsbekämpfung."
BHU_army_tactics_2:0 "Fortgeschrittene Infanterietaktiken"

BHU_army_tactics_2_desc:0 "Wir werden fortschrittliche Infanterietaktiken weiterentwickeln, um die Kampffähigkeit unserer Bodentruppen zu verbessern. Dazu gehört die Ausbildung unserer Truppen in speziellen Taktiken wie amphibischen Angriffen, Luftlandeoperationen und Spezialeinsatzkräften."
BHU_army_rifles_2:0 "Upgrade Infanteriegewehre II"

BHU_army_rifles_2_desc:0 "Wir werden unsere Infanteriegewehre weiter modernisieren, um die Feuerkraft und Schlagkraft unserer Bodentruppen zu verbessern. Dazu werden wir modernste Gewehre einsetzen, die im Kampf eine höhere Reichweite, Präzision und Zuverlässigkeit bieten."
BHU_army_trucks_1:0 "Einführung motorisierter Transportmittel"

BHU_army_trucks_1_desc:0 "Wir werden motorisierte Transportmittel einführen, um die Mobilität unserer Bodentruppen zu verbessern. Dazu gehört die Anschaffung von Lastwagen und anderen Fahrzeugen, um Truppen, Vorräte und Ausrüstung schneller und effizienter transportieren zu können."
BHU_army_trucks_2:0 "Motorisierten Verkehr ausbauen"

BHU_army_trucks_2_desc:0 "Wir werden unsere motorisierten Transportkapazitäten ausbauen, um die Mobilität unserer Bodentruppen weiter zu verbessern. Dazu gehört die Anschaffung weiterer Lastwagen und Fahrzeuge sowie die Verbesserung der Infrastruktur zur Unterstützung ihres Einsatzes."
BHU_army_tanks_1:0 "Entwicklung einer Panzerkriegsdoktrin"

BHU_army_tanks_1_desc:0 "Wir werden eine Doktrin für die Panzerkriegsführung entwickeln, um die Effektivität unserer Panzertruppen zu steigern. Dazu gehört die Definition von Taktiken, Techniken und Verfahren für den Einsatz von Panzern im Gefecht, um entscheidende Ergebnisse zu erzielen."
BHU_army_tanks_2:0 "Fortgeschrittene Panzerkriegsdoktrin"

BHU_army_tanks_2_desc:0 "Wir werden die Doktrin der modernen Panzerkriegsführung weiterentwickeln, um das Kampfpotenzial unserer Panzertruppen zu maximieren. Dazu gehört die Verfeinerung von Taktiken, Techniken und Verfahren für den Einsatz von Panzern in verschiedenen Kampfszenarien."
BHU_army_vehicle_fuel:0 "Kraftstoffeffizienzprogramm"

BHU_army_vehicle_fuel_desc:0 "Wir werden ein Kraftstoffeffizienzprogramm implementieren, um den Kraftstoffverbrauch und den Logistikbedarf unserer Bodentruppen zu senken. Dazu gehören die Entwicklung kraftstoffsparender Fahrzeuge, die Optimierung der Routen und die Verbesserung des Kraftstoffmanagements."
BHU_army_planes_1:0 "Einführung in die Militärluftfahrt"

BHU_army_planes_1_desc:0 "Wir werden die militärische Luftfahrt einführen, um die Fähigkeiten unserer Luftwaffe zu verbessern. Dazu gehört die Anschaffung von Flugzeugen für Aufklärung, Luftkampf und Luftnahunterstützung, um unseren Streitkräften mehr Flexibilität und Feuerkraft zu verleihen."
BHU_army_planes_2:0 "Erweitern Sie die militärische Luftfahrt"

BHU_army_planes_2_desc:0 "Wir werden unsere militärischen Flugkapazitäten ausbauen, um unsere Luftwaffe weiter zu stärken. Dazu gehört die Anschaffung weiterer Flugzeuge, eine verbesserte Pilotenausbildung und der Ausbau von Luftwaffenstützpunkten und Infrastruktur zur Unterstützung von Luftoperationen."
BHU_army_planes_3:0 "Fortgeschrittene Militärluftfahrt"

BHU_army_planes_3_desc:0 "Wir werden unsere militärischen Flugfähigkeiten ausbauen, um Luftüberlegenheit und Machtprojektion zu erreichen. Dazu gehört die Anschaffung moderner Flugzeuge, die Entwicklung von Lufttaktiken und die Integration der Luftstreitkräfte in unsere Militärstrategie."
BHU_army_boats_1:0 "Seestreitkräfte entwickeln"

BHU_army_boats_1_desc:0 "Wir werden unsere Seestreitkräfte ausbauen, um unsere maritimen Interessen zu schützen und die Seewege zu sichern. Dazu gehört auch die Anschaffung von Marineschiffen wie Patrouillenbooten und Korvetten, um unsere maritimen Fähigkeiten zu verbessern."
BHU_army_boats_2:0 "Erweiterung der Seestreitkräfte"

BHU_army_boats_2_desc:0 "Wir werden unsere Seestreitkräfte ausbauen, um unsere maritimen Fähigkeiten weiter zu stärken. Dazu gehört auch die Anschaffung weiterer Kriegsschiffe wie Fregatten und Zerstörer, um unsere Präsenz und Abschreckung in regionalen Gewässern zu erhöhen."
BHU_army_boats_3:0 "Fortgeschrittene Seestreitkräfte"

BHU_army_boats_3_desc:0 "Wir werden unsere Seestreitkräfte ausbauen, um unsere Macht zu demonstrieren und unsere maritimen Interessen zu schützen. Dazu gehört auch die Anschaffung moderner Kriegsschiffe wie Kreuzer und U-Boote, um unsere Marinekapazitäten zu erweitern."
BHU_army_finish:0 "Militärreformen abgeschlossen"

BHU_army_finish_desc:0 "Wir haben eine Reihe von Militärreformen abgeschlossen, um unsere Streitkräfte zu modernisieren und unsere nationale Verteidigungsfähigkeit zu stärken. Diese Reformen haben Ausbildung, Ausrüstung und Organisation verbessert, um den Herausforderungen der modernen Kriegsführung gerecht zu werden."
BHU_army_planes_exp_1:0 "Entwicklung von Kampfflugzeugen"

BHU_army_planes_exp_1_desc:0 "Wir werden neue Kampfflugzeuge entwickeln, um die Leistungsfähigkeit unserer Luftwaffe zu verbessern. Dazu gehört die Konstruktion und Produktion von Flugzeugen mit überlegener Geschwindigkeit, Wendigkeit und Feuerkraft, um die Luftüberlegenheit zu erreichen."
BHU_army_planes_exp_2Fighters:0 "Fortschrittliche Kampfflugzeuge"

BHU_army_planes_exp_2Fighters_desc:0 "Wir werden moderne Kampfflugzeuge weiterentwickeln, um die Luftüberlegenheit zu sichern und Bodenoperationen zu unterstützen. Dazu gehört die Verbesserung der Leistung, der Avionik und der Waffensysteme unserer Kampfflugzeuge."
BHU_army_planes_fighter_research:0 "Kampfflugzeugforschung"

BHU_army_planes_fighter_research_desc:0 "We will conduct research to advance fighter aircraft technology. This will involve studying aerodynamics, materials science, propulsion systems, and avionics to develop cutting-edge fighter aircraft for our air force.
BHU_army_planes_fighter_jet_research:0 "Düsenjägerforschung"

BHU_army_planes_fighter_jet_research_desc:0 "Wir werden Forschungen zur Entwicklung von düsengetriebenen Kampfflugzeugen für unsere Luftwaffe durchführen. Dazu werden wir Triebwerkstechnologie, Aerodynamik und Materialwissenschaften studieren, um schnellere und wendigere Kampfflugzeuge zu bauen."
BHU_army_planes_exp_2Bombers:0 "Fortschrittliche Bomberflugzeuge"

BHU_army_planes_exp_2Bombers_desc:0 "Wir werden moderne Bomberflugzeuge weiterentwickeln, um unsere strategischen Bombenfähigkeiten zu verbessern. Dazu gehört die Verbesserung der Reichweite, der Nutzlastkapazität und der Tarnkappenfähigkeiten unserer Bomber."
BHU_army_planes_bomber_research:0 "Bomberflugzeugforschung"

BHU_army_planes_bomber_research_desc:0 "Wir werden Forschungen durchführen, um die Technologie für Bomberflugzeuge weiterzuentwickeln. Dazu gehören die Untersuchung der Aerodynamik, der Antriebssysteme und der Nutzlastsysteme, um Bomber zu entwickeln, die Präzisionsschläge ausführen können."
BHU_army_planes_jet_bomber_research:0 "Düsenbomberforschung"

BHU_army_planes_jet_bomber_research_desc:0 "Wir werden Forschungen zur Entwicklung von düsengetriebenen Bombern für unsere Luftwaffe durchführen. Dazu gehören die Untersuchung von Triebwerkstechnologie, Aerodynamik und Nutzlastsystemen, um schnellere und effizientere Bomber zu bauen."
BHU_army_planes_exp_3:0 "Fortschrittliche Flugzeugtechnologie"

BHU_army_planes_exp_3_desc:0 "Wir werden weiterhin fortschrittliche Flugzeugtechnologie entwickeln, um die Leistungsfähigkeit unserer Luftwaffe zu verbessern. Dazu gehört die Erforschung und Entwicklung neuer Flugzeugdesigns, Materialien und Systeme zur Verbesserung von Leistung und Zuverlässigkeit."
BHU_army_planes_exp_4:0 "Entwicklung von Tarnkappenflugzeugen"

BHU_army_planes_exp_4_desc:0 "Wir werden in die Entwicklung von Tarnkappenflugzeugen investieren, um die Fähigkeiten unserer Luftwaffe zu verbessern. Dazu gehört die Entwicklung und Produktion von Flugzeugen mit geringer Radar- und Infrarotsignatur, um Luftüberlegenheit zu erreichen und verdeckte Operationen durchzuführen."
BHU_army_volunteers:0 "Militärisches Freiwilligenprogramm"

BHU_army_volunteers_desc:0 "Wir werden ein Programm zur Rekrutierung ziviler Freiwilliger für unsere Streitkräfte einrichten. Dieses Programm wird es uns ermöglichen, unsere militärischen Kräfte durch zivile Freiwillige zu ergänzen, die bereit sind, in Zeiten der Not zu dienen."
BHU_army_strat_1:0 "Strategische Planung"

BHU_army_strat_1_desc:0 "Wir werden einen strategischen Planungsprozess entwickeln, um die Effektivität unserer militärischen Operationen zu verbessern. Dazu gehört die Festlegung klarer Ziele, die Analyse von Bedrohungen und Chancen sowie die Entwicklung umfassender Pläne zur Erreichung unserer militärischen Ziele."
BHU_army_strat_2:0 "Erweiterte strategische Planung"

BHU_army_strat_2_desc:0 "Wir werden fortschrittliche strategische Planungsprozesse weiterentwickeln, um die Effektivität unserer militärischen Operationen zu steigern. Dazu gehört die Integration von Geheimdienstinformationen, Technologie und Logistik in unsere Planung, um im Kampf entscheidende Ergebnisse zu erzielen."
BHU_army_strat_3:0 "Operative Planung"

BHU_army_strat_3_desc:0 "Wir werden operative Planungsprozesse entwickeln, um die Effizienz und Effektivität unserer Militärkampagnen zu verbessern. Dazu gehört die Koordinierung von Ressourcen, Streitkräften und Logistik, um taktische und strategische Ziele zu erreichen."
BHU_army_strat_training1:0 "Operatives Training"

BHU_army_strat_training1_desc:0 "Wir werden operative Trainingsübungen durchführen, um die Einsatzbereitschaft und Leistungsfähigkeit unserer Streitkräfte zu verbessern. Dabei werden realistische Kampfszenarien simuliert, um die Fähigkeiten und Taktiken unserer Truppen zu testen und zu verbessern."
BHU_army_strat_training2:0 "Erweitertes operatives Training"

BHU_army_strat_training2_desc:0 "Wir werden die Einsatzausbildung weiter vorantreiben, um die Einsatzbereitschaft und Leistungsfähigkeit unserer Streitkräfte zu verbessern. Dabei kommen modernste Technologien und Taktiken zum Einsatz, um komplexe Kampfsituationen zu simulieren und die Leistungsfähigkeit unserer Truppen zu verbessern."
BHU_army_strat_planning_1:0 "Strategische Planung II"

BHU_army_strat_planning_1_desc:0 "Wir werden unsere strategischen Planungsprozesse weiterentwickeln, um die Effektivität unserer militärischen Operationen zu verbessern. Dazu gehört die Verfeinerung unserer Ziele, die Analyse von Bedrohungen und Chancen sowie die Entwicklung innovativer Pläne zur Erreichung unserer militärischen Ziele."
BHU_army_strat_planning_2:0 "Strategische Planung III"

BHU_army_strat_planning_2_desc:0 "Wir werden fortschrittliche strategische Planungsprozesse weiterentwickeln, um die Effektivität unserer militärischen Operationen zu steigern. Dazu gehört die Integration von Geheimdienstinformationen, Technologie und Logistik in unsere Planung, um im Kampf entscheidende Ergebnisse zu erzielen."
BHU_army_strat_attacking_1:0 "Offensivtaktiken"

BHU_army_strat_attacking_1_desc:0 "Wir werden Angriffstaktiken entwickeln, um unsere Fähigkeit zur Durchführung offensiver Operationen zu verbessern. Dazu gehört die Ausbildung unserer Truppen in Angriffsmanövern wie Einkreisung, Flankenangriffen und Angriffen in die Tiefe, um taktische Überraschungen und Überlegenheit zu erzielen."
BHU_army_strat_attacking_2:0 "Fortgeschrittene Angriffstaktiken"

BHU_army_strat_attacking_2_desc:0 "Wir werden fortschrittliche Angriffstaktiken weiterentwickeln, um die Effektivität unserer Angriffsoperationen zu maximieren. Dazu gehört die Kombination von Luft-, Boden- und Seestreitkräften in koordinierten Angriffen, um entscheidende Erfolge gegen die feindliche Verteidigung zu erzielen."
BHU_army_sf_paratroopers:0 "Spezialkräfte-Training"

BHU_army_sf_paratroopers_desc:0 "Wir werden ein Ausbildungsprogramm für Spezialkräfte einrichten, um die Fähigkeiten unserer Elitetruppen zu verbessern. Dieses Programm bietet eine Spezialausbildung in Aufklärung, Sabotage und unkonventioneller Kriegsführung, um Spezialoperationen hinter den feindlichen Linien durchführen zu können."

BHU_army_sf_marinies:0 "Marineausbildung"

BHU_army_sf_marinies_desc:0 "Wir werden ein Ausbildungsprogramm für das Marine Corps einrichten, um unsere Fähigkeiten in der amphibischen Kriegsführung zu verbessern. Dieses Programm bietet spezialisierte Ausbildung für amphibische Angriffe, Strandlandungen und Marineoperationen zur Durchführung von Operationen in Küsten- und Seegebieten."
BHU_army_sf_mountains:0 "Gebirgskampftraining"

BHU_army_sf_mountains_desc:0 "Wir werden ein Ausbildungsprogramm für den Gebirgskrieg einrichten, um unsere Fähigkeiten in bergigem Gelände zu verbessern. Dieses Programm bietet eine spezielle Ausbildung in Gebirgskriegstaktiken, Überlebenstechniken und alpinen Operationen, um Operationen in Bergregionen durchführen zu können."
BHU_army_industrial_redirection:0 "Industrielle Neuausrichtung"

BHU_army_industrial_redirection_desc:0 "Wir werden unsere industriellen Kapazitäten neu ausrichten, um unseren militärischen Bedarf zu decken. Dazu gehört die Priorisierung der Rüstungsproduktion, die Umrüstung von Fabriken und die Mobilisierung von Ressourcen, um die rechtzeitige Lieferung von Ausrüstung und Nachschub an unsere Streitkräfte sicherzustellen."
BHU_army_civ_prod:0 "Zivile Produktion"

BHU_army_civ_prod_desc:0 "Wir werden ein gewisses Maß an ziviler Produktion aufrechterhalten, um unsere Wirtschaft und Bevölkerung zu unterstützen. Dazu gehört auch, unsere Industriekapazitäten zwischen militärischen und zivilen Bedürfnissen auszubalancieren, um wirtschaftliche Stabilität und soziales Wohlergehen zu gewährleisten."
BHU_army_mil_prod:0 "Militärische Produktion"

BHU_army_mil_prod_desc:0 "Um den Bedarf unserer Streitkräfte zu decken, werden wir der Rüstungsproduktion Priorität einräumen. Dies beinhaltet eine Steigerung der Produktion von militärischer Ausrüstung, Vorräten und Waffen, um unsere nationale Verteidigungsfähigkeit zu stärken."
BHU_army_strat_production:0 "Strategische Produktion"

BHU_army_strat_production_desc:0 "Wir werden uns auf die strategische Produktion zur Unterstützung unserer militärischen Kampagnen konzentrieren. Dabei wird die Produktion wichtiger militärischer Güter wie Panzer, Flugzeuge und Schiffe priorisiert, um unsere militärischen Ziele zu erreichen."
BHU_army_strat_supplies:0 "Strategische Versorgung"

BHU_army_strat_supplies_desc:0 "Wir werden sicherstellen, dass strategische Vorräte zur Unterstützung unserer Militäroperationen zur Verfügung stehen. Dazu gehört die Bevorratung wichtiger Güter wie Treibstoff, Munition und Lebensmittel, um unsere Streitkräfte auch bei längeren Einsätzen zu versorgen."
BHU_army_strat_guns:0 "Strategische Waffen"

BHU_army_strat_guns_desc:0 "Wir werden dafür sorgen, dass strategische Waffen zur Unterstützung unserer Militäroperationen zur Verfügung stehen. Dazu gehört die Bevorratung moderner Waffensysteme wie Raketen, Artillerie und Flugabwehrgeschütze, um potenzielle Bedrohungen abzuschrecken und zu besiegen."
BHU_army_strat_arty:0 "Strategische Artillerie"

BHU_army_strat_arty_desc:0 "Wir werden sicherstellen, dass strategische Artillerie zur Unterstützung unserer Militäroperationen zur Verfügung steht. Dazu gehört der Einsatz von Langstreckenartilleriesystemen zur Feuerunterstützung und zur Abwehr feindlicher Verteidigungsanlagen."
BHU_army_strat_anti:0 "Strategische Luftabwehr"

BHU_army_strat_anti_desc:0 "Wir werden dafür sorgen, dass strategische Luftabwehrsysteme zum Schutz unseres Luftraums zur Verfügung stehen. Dazu gehört auch der Einsatz von Flugabwehrraketen und -geschützen zur Verteidigung gegen feindliche Luftangriffe."
BHU_army_strat_transports:0 "Strategische Transporte"

BHU_army_strat_transports_desc:0 "Wir werden dafür sorgen, dass strategische Transportmittel zur Unterstützung unserer Militäroperationen zur Verfügung stehen. Dazu gehört der Einsatz von Transportflugzeugen und -fahrzeugen, um Truppen, Ausrüstung und Nachschub schnell und effizient zu transportieren."
BHU_army_tank_production:0 "Panzerproduktion"

BHU_army_tank_production_desc:0 "Wir werden der Panzerproduktion Priorität einräumen, um unsere Panzertruppen zu stärken. Dazu gehört eine Steigerung der Produktion von Panzern und gepanzerten Fahrzeugen, um unsere Feuerkraft und Mobilität auf dem Schlachtfeld zu verbessern."
BHU_army_tank_medium:0 "Entwicklung mittlerer Panzer"

BHU_army_tank_medium_desc:0 "Wir werden mittlere Panzer entwickeln, um unsere Panzertruppen zu verstärken. Dazu gehört die Konstruktion und Produktion von Panzern, die ein ausgewogenes Verhältnis von Feuerkraft, Mobilität und Schutz bieten, um den Anforderungen der modernen Kriegsführung gerecht zu werden."
BHU_army_tank_heavy:0 "Entwicklung schwerer Panzer"

BHU_army_tank_heavy_desc:0 "Wir werden schwere Panzer entwickeln, um unsere Panzertruppen zu verstärken. Dazu gehört die Entwicklung und Produktion von Panzern mit schwerer Panzerung und leistungsstarken Geschützen, die auf dem Schlachtfeld Durchbruchsfähigkeiten bieten."
BHU_army_strat_complete:0 "Militärreformen abgeschlossen"

BHU_army_strat_complete_desc:0 "Wir haben eine Reihe von Militärreformen abgeschlossen, um unsere Streitkräfte zu modernisieren und unsere nationale Verteidigungsfähigkeit zu stärken. Diese Reformen haben Ausbildung, Ausrüstung und Organisation verbessert, um den Herausforderungen der modernen Kriegsführung gerecht zu werden."
BHU_army_boats_dockyards:0 "Erweiterung der Marinewerften"

BHU_army_boats_dockyards_desc:0 "Wir werden unsere Werften erweitern, um unsere Kapazitäten im Schiffsbau zu verbessern. Dazu gehört der Bau neuer Werften, die Modernisierung bestehender Werften und die Steigerung der Kapazitäten für den Bau und die Wartung von Marineschiffen."
BHU_army_boats_exp_subs:0 "U-Boot-Entwicklung"

BHU_army_boats_exp_subs_desc:0 "Wir werden in die Entwicklung von U-Booten investieren, um unsere Marinekapazitäten zu stärken. Dazu gehört die Entwicklung und Produktion von U-Booten für Aufklärung, Schiffsabwehr und strategische Abschreckung."
BHU_army_boats_exp_sub_tactics:0 "U-Boot-Taktiken"

BHU_army_boats_exp_sub_tactics_desc:0 "Wir werden U-Boot-Taktiken entwickeln, um die Effektivität unserer U-Boot-Flotte zu maximieren. Dazu gehört die Ausbildung unserer U-Boot-Besatzungen in Tarn-, Ausweich- und Angriffstechniken, um verdeckte Operationen durchführen zu können."
BHU_army_boats_exp_strats:0 "Marinestrategie"

BHU_army_boats_exp_strats_desc:0 "Wir werden Marinestrategien entwickeln, um unsere Marinekapazitäten zu verbessern. Dazu gehört die Planung und Durchführung von Marineoperationen, um die maritime Überlegenheit zu erreichen und unsere maritimen Interessen zu schützen."
BHU_army_boats_exp_navy_planes:0 "Marineflieger"

BHU_army_boats_exp_navy_planes_desc:0 "Wir werden die Fähigkeiten der Marinefliegerei ausbauen, um unsere Marineoperationen zu verbessern. Dazu gehört die Anschaffung von Flugzeugträgern, Marineflugzeugen und Hubschraubern, um unseren Seestreitkräften Luftunterstützung und Aufklärung zu bieten."
BHU_army_boats_exp_navy_carrier:0 "Entwicklung von Flugzeugträgern"

BHU_army_boats_exp_navy_carrier_desc:0 "Wir werden in die Entwicklung von Flugzeugträgern investieren, um unsere Marinekapazitäten zu stärken. Dazu gehört die Entwicklung und Produktion von Flugzeugträgern, die als mobile Flugplätze für Marinefliegeroperationen dienen."
BHU_army_boats_exp_destroyers:0 "Zerstörerentwicklung"

BHU_army_boats_exp_destroyers_desc:0 "Wir werden in die Entwicklung von Zerstörern investieren, um unsere Marinekapazitäten zu verbessern. Dazu gehört die Entwicklung und Produktion von Zerstörern für die Luft-, Schiffs- und U-Boot-Abwehr."
BHU_army_boats_exp_cruisers:0 "Kreuzerentwicklung"

BHU_army_boats_exp_cruisers_desc:0 "Wir werden in die Entwicklung von Kreuzern investieren, um unsere Marinekapazitäten zu verbessern. Dazu gehört die Entwicklung und Produktion von Kreuzern für Langstrecken-Feuerkraft, Luftverteidigung und Marineeskorte."
BHU_diplomacy_start:0 "Diplomatische Initiativen beginnen"
BHU_diplomacy_start_desc:0 "Wir werden eine Reihe diplomatischer Initiativen starten, um unsere nationalen Interessen zu fördern und unsere internationalen Beziehungen zu stärken. Der Schwerpunkt dieser Initiativen liegt auf dem Aufbau von Allianzen, der Lösung von Konflikten und der Förderung der wirtschaftlichen Zusammenarbeit."
BHU_diplomacy_split_middle:0 "Diplomatische Spaltung – Mittlerer Weg"
BHU_diplomacy_split_middle_desc:0 "Wir werden in unserer diplomatischen Strategie einen Mittelweg verfolgen und versuchen, freundschaftliche Beziehungen zu allen Nationen aufrechtzuerhalten und eine Annäherung an einen der großen Machtblöcke zu vermeiden. Diese Strategie wird sich auf Blockfreiheit, Neutralität und friedliche Koexistenz konzentrieren."

BHU_diplomacy_neut_new_reforms:0 "Neutral - Neue Reformen"
BHU_diplomacy_neut_new_reforms_desc:0 "Wir werden neue Reformen durchführen, um unsere Neutralität und unseren blockfreien Status zu stärken. Der Schwerpunkt dieser Reformen liegt auf der Stärkung unserer Wirtschaft, der Verbesserung unserer Infrastruktur und der Verbesserung unserer diplomatischen Fähigkeiten."

BHU_diplomacy_neut_buddhism:0 "Neutral - Buddhismus-Werbung"
BHU_diplomacy_neut_buddhism_desc:0 "Wir werden den Buddhismus als Eckpfeiler unserer nationalen Identität und als einigende Kraft für unser Volk fördern. Diese Initiative umfasst den Bau neuer Klöster, die Förderung der buddhistischen Bildung und die Bewahrung des buddhistischen Kulturerbes."

BHU_diplomacy_neut_farming_1:0 "Neutral - Agrarsubventionen"
BHU_diplomacy_neut_farming_1_desc:0 "Wir werden den Landwirten Subventionen und Anreize bieten, um ihre landwirtschaftliche Produktion zu steigern und die Ernährungssicherheit zu gewährleisten. Diese Subventionen umfassen finanzielle Unterstützung, Zugang zu modernen Anbautechniken und Hilfe bei Bewässerung und Infrastruktur."

BHU_diplomacy_neut_farming_2:0 "Neutral - Modernisierung der Landwirtschaft"
BHU_diplomacy_neut_farming_2_desc:0 "Wir werden unseren Agrarsektor modernisieren, um Effizienz, Produktivität und Nachhaltigkeit zu verbessern. Diese Modernisierungsbemühungen umfassen die Einführung neuer Anbautechniken, den Einsatz moderner Maschinen und die Umsetzung bewährter Verfahren."

BHU_diplomacy_neut_monasteries:0 "Neutral - Klosterbau"
BHU_diplomacy_neut_monasteries_desc:0 "Wir werden neue Klöster und religiöse Zentren errichten, um den Buddhismus zu fördern und unser kulturelles Erbe zu bewahren. Diese neuen Klöster werden als Zentren des Lernens, der Spiritualität und der Gemeindeentwicklung dienen."

BHU_diplomacy_neut_army_1:0 "Neutral - Modernisierung der Armee"
BHU_diplomacy_neut_army_1_desc:0 "Wir werden unsere Streitkräfte modernisieren, um sicherzustellen, dass sie gut ausgerüstet, gut ausgebildet und in der Lage sind, unsere Souveränität zu verteidigen. Diese Modernisierungsbemühungen umfassen die Anschaffung neuer Waffen, die Ausbildung spezialisierter Einheiten und die Verbesserung der logistischen Kapazitäten."

BHU_diplomacy_neut_army_2:0 "Neutral - Grenzverteidigung"
BHU_diplomacy_neut_army_2_desc:0 "Wir werden unsere Grenzverteidigung verstärken, um unsere Souveränität zu schützen und Frieden und Stabilität entlang unserer Grenzen zu wahren. Diese Initiative umfasst den Bau neuer Grenzposten, die Entsendung zusätzlicher Truppen und den Einsatz moderner Überwachungstechnologie."

BHU_diplomacy_neut_army_3:0 "Neutral - Regionale Zusammenarbeit"
BHU_diplomacy_neut_army_3_desc:0 "Wir werden uns an regionalen Kooperationsinitiativen beteiligen, um die Sicherheit zu erhöhen, die Stabilität zu fördern und das Vertrauen zu unseren Nachbarn aufzubauen. Im Mittelpunkt dieser Initiativen stehen gemeinsame Militärübungen, der Austausch nachrichtendienstlicher Erkenntnisse und der Aufbau von Kapazitäten."

BHU_diplomacy_neut_neighbors_1:0 "Neutral - Politik der guten Nachbarschaft"
BHU_diplomacy_neut_neighbors_1_desc:0 "Wir werden eine Politik der guten Nachbarschaft verfolgen, um die Beziehungen zu unseren Nachbarländern zu verbessern und die regionale Zusammenarbeit zu fördern. Im Mittelpunkt dieser Politik stehen gegenseitiger Respekt, Nichteinmischung und friedliche Koexistenz."

BHU_diplomacy_neut_neighbors_2:0 "Neutral - Grenzstreitbeilegung"
BHU_diplomacy_neut_neighbors_2_desc:0 "Wir werden uns für eine friedliche Lösung aller Grenzstreitigkeiten mit unseren Nachbarländern durch Dialog, Verhandlungen und Vermittlung einsetzen. Diese Initiative zielt darauf ab, Konflikte zu vermeiden und Vertrauen und Zusammenarbeit aufzubauen."

BHU_diplomacy_neut_neighbors_3:0 "Neutral - Wirtschaftliche Zusammenarbeit"
BHU_diplomacy_neut_neighbors_3_desc:0 "Wir werden die wirtschaftliche Zusammenarbeit mit unseren Nachbarländern fördern, um den Wohlstand und die Stabilität in der Region zu stärken. Diese Zusammenarbeit umfasst Handelsabkommen, Infrastrukturentwicklungsprojekte und gemeinsame Investitionsinitiativen."

BHU_diplomacy_neut_end:0 "Neutrale Diplomatie abgeschlossen"
BHU_diplomacy_neut_end_desc:0 "Unsere Initiativen zur neutralen Diplomatie wurden erfolgreich umgesetzt, wodurch unser internationales Ansehen gestärkt und Frieden und Stabilität in der Region gefördert wurden."
BHU_diplomacy_split_left:0 "Diplomatische Spaltung - Links"
BHU_diplomacy_split_left_desc:0 "Wir werden einen linksgerichteten diplomatischen Ansatz verfolgen und versuchen, uns mit sozialistischen und fortschrittlichen Nationen zu verbünden. Im Mittelpunkt dieser Strategie steht die Förderung sozialer Gerechtigkeit, Gleichheit und Solidarität mit der Arbeiterklasse."

BHU_diplomacy_left_freedom:0 "Links - Freiheit"
BHU_diplomacy_left_freedom_desc:0 "Wir werden Freiheit und Demokratie als zentrale Werte unserer Außenpolitik fördern. Diese Initiative umfasst die Unterstützung demokratischer Bewegungen, das Eintreten für Menschenrechte und die Förderung bürgerlicher Freiheiten."

BHU_diplomacy_freedom_1:0 "Freiheit - Bürgerrechte"
BHU_diplomacy_freedom_1_desc:0 "Wir werden Reformen durchführen, um die bürgerlichen Rechte und Freiheiten aller Bürger zu schützen und zu erweitern. Diese Reformen werden Garantien für Meinungsfreiheit, Versammlungsfreiheit und Pressefreiheit beinhalten."
dem_rights:0 "Durchsetzung der Bürgerrechte"
BHU_diplomacy_freedom_2:0 "Freiheit - Politische Rechte"
BHU_diplomacy_freedom_2_desc:0 "Wir werden politische Rechte und die politische Teilhabe durch Wahlreformen und den Ausbau politischer Freiheiten fördern. Diese Reformen umfassen Maßnahmen zur Gewährleistung freier und fairer Wahlen, politischen Pluralismus und des Rechts auf die Gründung politischer Parteien."

BHU_diplomacy_freedom_3:0 "Freiheit - Soziale Rechte"
BHU_diplomacy_freedom_3_desc:0 "Wir werden soziale Rechte schützen und fördern, darunter das Recht auf Bildung, Gesundheitsversorgung und soziale Sicherheit. Diese Initiativen konzentrieren sich auf den Abbau von Ungleichheit, die Verbesserung des sozialen Wohlergehens und die Gewährleistung eines angemessenen Lebensstandards für alle Bürger."

BHU_diplomacy_capitalism:0 "Freiheit - Kapitalismus"
BHU_diplomacy_capitalism_desc:0 "Wir werden den Kapitalismus als Wirtschaftssystem befürworten und dabei freie Märkte, private Unternehmen und wirtschaftliche Liberalisierung fördern. Dieser Ansatz wird sich auf die Förderung von Wirtschaftswachstum, Innovation und Wohlstand konzentrieren."

BHU_diplomacy_effordable_housing:0 "Freiheit – Bezahlbarer Wohnraum"
BHU_diplomacy_effordable_housing_desc:0 "Wir werden Maßnahmen ergreifen, um allen Bürgern den Zugang zu bezahlbarem Wohnraum zu ermöglichen. Zu diesen Maßnahmen gehören Wohngeld, Sozialwohnungsprojekte und Stadtplanungsreformen."

BHU_diplomacy_common_currency:0 "Freiheit - gemeinsame Währung"
BHU_diplomacy_common_currency_desc:0 "Wir werden mit anderen gleichgesinnten Nationen eine gemeinsame Währung einführen, um die wirtschaftliche Integration und Zusammenarbeit zu fördern. Diese Initiative wird den Handel und die Finanztransaktionen vereinfachen, das Wirtschaftswachstum ankurbeln und die regionale Stabilität stärken."

BHU_diplomacy_freedom_women_workforce:0 "Freiheit – Frauen im Berufsleben"
BHU_diplomacy_freedom_women_workforce_desc:0 "Wir werden die Gleichstellung der Geschlechter und die Stärkung der Rolle der Frau in der Arbeitswelt fördern. Diese Initiative umfasst Maßnahmen zur Beseitigung von Diskriminierung, zur Schaffung gleicher Chancen und zur Förderung der Vereinbarkeit von Beruf und Privatleben für Frauen."

BHU_diplomacy_freedom_training_programs:0 "Freiheit - Trainingsprogramme"
BHU_diplomacy_freedom_training_programs_desc:0 "Wir werden in Schulungsprogramme und Berufsausbildung investieren, um die Fähigkeiten und die Beschäftigungsfähigkeit unserer Belegschaft zu verbessern. Der Schwerpunkt dieser Programme liegt auf branchenrelevanten Fähigkeiten, Technologien und Innovationen."

BHU_diplomacy_freedom_draft:0 "Freiheit - Nationaler Wehrdienst"
BHU_diplomacy_freedom_draft_desc:0 "Wir werden eine nationale Wehrpflicht einführen, um bürgerschaftliches Engagement und den Nationaldienst zu fördern. Diese Initiative verpflichtet alle Bürger, für einen bestimmten Zeitraum Militär- oder Zivildienst zu leisten und so zur Verteidigung und Entwicklung des Landes beizutragen."

BHU_diplomacy_freedom_bear_arms:0 "Freiheit – Recht, Waffen zu tragen"
BHU_diplomacy_freedom_bear_arms_desc:0 "Wir werden das Recht der Bürger wahren, zur Selbstverteidigung und Landesverteidigung Waffen zu tragen. Diese Initiative wird sicherstellen, dass verantwortungsbewusste Bürger die Mittel haben, sich selbst, ihre Familien und ihre Gemeinschaften zu schützen."

BHU_diplomacy_freedom_aid_1:0 "Freiheit - Entwicklungshilfe"
BHU_diplomacy_freedom_aid_1_desc:0 "Wir werden Entwicklungsländern Hilfe und Unterstützung leisten, um ihre wirtschaftliche und soziale Entwicklung zu unterstützen. Der Schwerpunkt dieser Hilfe wird auf der Armutsbekämpfung, der Gesundheitsversorgung, der Bildung und dem Ausbau der Infrastruktur liegen."

BHU_diplomacy_freedom_aid_2:0 "Freiheit - Humanitäre Hilfe"
BHU_diplomacy_freedom_aid_2_desc:0 "Wir werden den von Naturkatastrophen, Konflikten und anderen Krisen betroffenen Ländern humanitäre Hilfe und Unterstützung leisten. Der Schwerpunkt dieser Hilfe liegt auf der Rettung von Menschenleben, der Linderung von Leid sowie der Förderung von Erholung und Wiederaufbau."

BHU_diplomacy_freedom_aid_3:0 "Freiheit - Demokratieunterstützung"
BHU_diplomacy_freedom_aid_3_desc:0 "Wir werden demokratische Bewegungen und Institutionen weltweit unterstützen, um Freiheit, Demokratie und Menschenrechte zu fördern. Diese Unterstützung umfasst die Finanzierung zivilgesellschaftlicher Organisationen, die Wahlbeobachtung und den Kapazitätsaufbau."

BHU_diplomacy_freedom_aid_4:0 "Freiheit - Friedensmissionen"
BHU_diplomacy_freedom_aid_4_desc:0 "Wir werden uns an internationalen Friedensmissionen beteiligen, um Frieden, Stabilität und Sicherheit zu fördern. Im Rahmen dieser Missionen werden wir Truppen und Ressourcen in Konfliktgebiete entsenden, um den Frieden zu wahren und die Zivilbevölkerung zu schützen."
BHU_diplomacy_freedom_complete:0 "Freiheit - Komplett"
BHU_diplomacy_freedom_complete_desc:0 "Unser Engagement für Freiheit und Demokratie ist unerschütterlich. Wir werden diese Werte im In- und Ausland weiterhin hochhalten und Frieden, Wohlstand und Menschenwürde für alle fördern."

BHU_diplomacy_left_communism:0 "Links - Kommunismus"
BHU_diplomacy_left_communism_desc:0 "Wir werden in unseren diplomatischen Bemühungen eine kommunistische Ideologie verfolgen und Bündnisse mit sozialistischen und kommunistischen Nationen anstreben. Dabei stehen die Förderung des Klassenkampfes, des proletarischen Internationalismus und der Sturz des Kapitalismus im Mittelpunkt."

BHU_diplomacy_communism_1:0 "Kommunismus - Arbeitnehmerrechte"
BHU_diplomacy_communism_1_desc:0 "Wir werden Reformen zum Schutz und zur Ausweitung der Arbeitnehmerrechte durchführen. Zu diesen Reformen gehören Garantien für Tarifverhandlungen, Demokratie am Arbeitsplatz und das Streikrecht."

BHU_diplomacy_communism_2:0 "Kommunismus - Sozialhilfe"
BHU_diplomacy_communism_2_desc:0 "Wir fördern soziales Wohlergehen und Gleichheit, indem wir einen universellen Zugang zu Gesundheitsversorgung, Bildung und sozialer Sicherheit gewährleisten. Ziel dieser Initiativen ist die Beseitigung von Armut, Ungleichheit und Ausbeutung."

BHU_diplomacy_communism_3:0 "Kommunismus - Volkswirtschaft"
BHU_diplomacy_communism_3_desc:0 "Wir werden Schlüsselindustrien und -ressourcen verstaatlichen, um eine volksnahe Wirtschaft zu schaffen. Im Mittelpunkt dieser Initiative stehen kollektives Eigentum, zentrale Planung und wirtschaftliche Gleichheit."

BHU_diplomacy_communism_workers_culture:0 "Kommunismus – Arbeiterkultur"
BHU_diplomacy_communism_workers_culture_desc:0 "Wir werden eine Arbeiterkultur fördern, die die Errungenschaften und Kämpfe der Arbeiterklasse feiert. Diese Initiative umfasst die Unterstützung kultureller Veranstaltungen, Publikationen und Organisationen, die sozialistische Werte fördern."

BHU_diplomacy_communism_farms_factor:0 "Kommunismus – Bauernhöfe als Produktionsfaktor"
BHU_diplomacy_communism_farms_factor_desc:0 "Wir werden die Landwirtschaft in einen Produktionsfaktor umwandeln und sie in die sozialistische Wirtschaft integrieren. Im Mittelpunkt dieser Initiative stehen die kollektive Landwirtschaft, landwirtschaftliche Genossenschaften und die staatliche Unterstützung der landwirtschaftlichen Entwicklung."

BHU_diplomacy_communism_comintern_ties:0 "Kommunismus - Komintern-Verbindungen"
BHU_diplomacy_communism_comintern_ties_desc:0 "Wir werden unsere Beziehungen zur Kommunistischen Internationale (Komintern) stärken, um die globale Revolution voranzutreiben. Diese Initiative beinhaltet die Zusammenarbeit mit kommunistischen Parteien und Bewegungen weltweit, um die Sache des Sozialismus voranzutreiben."

BHU_diplomacy_communism_closer_to_soviets:0 "Kommunismus - Näher an den Sowjets"
BHU_diplomacy_communism_closer_to_soviets_desc:0 "Wir werden engere Beziehungen zur Sowjetunion und anderen sozialistischen Staaten anstreben. Diese Initiative wird militärische Zusammenarbeit, wirtschaftliche Unterstützung und politische Solidarität mit dem sozialistischen Block umfassen."

BHU_diplomacy_communism_war_on_fascism:0 "Kommunismus – Krieg gegen den Faschismus"
BHU_diplomacy_communism_war_on_fascism_desc:0 "Wir werden Faschismus und Imperialismus aktiv entgegentreten und antifaschistische Bewegungen und Kämpfe weltweit unterstützen. Diese Initiative umfasst militärische, politische und ideologische Anstrengungen, um faschistische Kräfte zu besiegen und den Sozialismus zu fördern."

BHU_diplomacy_communism_trade_soviets:0 "Kommunismus - Handel mit den Sowjets"
BHU_diplomacy_communism_trade_soviets_desc:0 "Wir werden den Handel und die wirtschaftliche Zusammenarbeit mit der Sowjetunion ausbauen. Diese Initiative wird bilaterale Handelsabkommen, Joint Ventures und Wirtschaftshilfe zur Stärkung unserer sozialistischen Volkswirtschaften umfassen."

BHU_diplomacy_communism_4:0 "Kommunismus - Sozialistische Einheit"
BHU_diplomacy_communism_4_desc:0 "Wir werden auf die Einheit der sozialistischen und kommunistischen Kräfte weltweit hinarbeiten. Diese Initiative beinhaltet den Aufbau von Solidarität, gegenseitiger Unterstützung und Zusammenarbeit zwischen sozialistischen Parteien, Bewegungen und Regierungen."

BHU_diplomacy_communism_human_wall:0 "Kommunismus - Menschliche Mauer"
BHU_diplomacy_communism_human_wall_desc:0 "Wir werden eine „menschliche Mauer“ gegen Imperialismus und Reaktion errichten. Diese Initiative beinhaltet den Aufbau von Allianzen, Koalitionen und Fronten, um sozialistische Länder und Bewegungen vor äußeren Bedrohungen zu schützen."

BHU_diplomacy_communism_secret_police:0 "Kommunismus - Geheimpolizei"
BHU_diplomacy_communism_secret_police_desc:0 "Wir werden eine Geheimpolizei zum Schutz der Revolution und zur Unterdrückung konterrevolutionärer Aktivitäten aufbauen. Diese Truppe wird die Sicherheit und Stabilität des sozialistischen Staates gewährleisten."

BHU_diplomacy_communism_research:0 "Kommunismus - Wissenschaftliche Forschung"
BHU_diplomacy_communism_research_desc:0 "Wir werden wissenschaftliche Forschung und technologische Innovation im Dienste des Sozialismus fördern. Diese Initiative konzentriert sich auf die Entwicklung neuer Technologien, Industrien und Fähigkeiten zur Förderung der sozialistischen Sache."

BHU_diplomacy_communism_complete:0 "Kommunismus - Komplett"
BHU_diplomacy_communism_complete_desc:0 "Unser Bekenntnis zum Kommunismus ist unerschütterlich. Wir werden weiterhin die Sache des Sozialismus, des proletarischen Internationalismus und der Weltrevolution vorantreiben und auf eine klassen- und staatenlose Gesellschaft hinarbeiten."

BHU_diplomacy_split_right:0 "Diplomatische Spaltung - Rechts"
BHU_diplomacy_split_right_desc:0 "Wir werden einen rechtsgerichteten diplomatischen Ansatz verfolgen und Bündnisse mit konservativen und autoritären Regimen anstreben. Im Mittelpunkt dieser Strategie steht die Förderung von Stabilität, Sicherheit und traditionellen Werten."

BHU_diplomacy_fascist_jigme_dead:0 "Faschist - Jigme tot"
BHU_diplomacy_fascist_jigme_dead_desc:0 "Mit dem Tod von Jigme Namgyal bietet sich die Möglichkeit, eine faschistische Ideologie zu verfolgen. Dieser Weg wird sich auf Nationalismus, Autoritarismus und Militarismus konzentrieren und auf die Errichtung eines totalitären Regimes abzielen."

BHU_diplomacy_fascist_1:0 "Faschismus - Nationalismus"
BHU_diplomacy_fascist_1_desc:0 "Wir werden den Nationalismus als eine einigende Ideologie fördern und dabei die Loyalität zur Nation und ihren Traditionen betonen. Diese Initiative wird die Förderung von Nationalstolz, Identität und Einheit beinhalten."

BHU_diplomacy_fascist_2:0 "Faschismus - Autoritarismus"
BHU_diplomacy_fascist_2_desc:0 "We will establish an authoritarian regime to ensure order, discipline, and obedience. This initiative
BHU_diplomacy_fascist_2_desc:0 "Wir werden ein autoritäres Regime errichten, um Ordnung, Disziplin und Gehorsam zu gewährleisten. Diese Initiative beinhaltet die Zentralisierung der Macht, die Unterdrückung abweichender Meinungen und die Durchsetzung strenger Gesetze und Vorschriften."

BHU_diplomacy_fascist_military_2:0 "Faschismus - Militarisierung"
BHU_diplomacy_fascist_military_2_desc:0 "Wir werden der Militarisierung von Gesellschaft, Wirtschaft und Kultur Priorität einräumen. Diese Initiative umfasst den Ausbau des militärisch-industriellen Komplexes, die Förderung militärischer Werte und die Verherrlichung der Kriegsführung."

BHU_diplomacy_fascist_military_3:0 "Faschismus - Militärische Expansion"
BHU_diplomacy_fascist_military_3_desc:0 "Wir werden unsere Streitkräfte ausbauen und modernisieren, um Macht zu demonstrieren und die nationale Sicherheit zu gewährleisten. Diese Initiative umfasst den Aufbau von Armee, Marine, Luftwaffe und paramilitärischen Kräften."

BHU_diplomacy_fascist_military_tanks:0 "Faschismus - Panzerentwicklung"
BHU_diplomacy_fascist_military_tanks_desc:0 "Wir werden der Entwicklung und dem Einsatz von Panzern in unseren Streitkräften Priorität einräumen. Der Schwerpunkt dieser Initiative liegt auf der Beschaffung, Produktion und dem Einsatz von Panzereinheiten für offensive und defensive Operationen."

BHU_diplomacy_fascist_3:0 "Faschismus - Totalitarismus"
BHU_diplomacy_fascist_3_desc:0 "Wir werden ein totalitäres Regime errichten, das alle Aspekte der Gesellschaft, Wirtschaft und Kultur kontrolliert. Diese Initiative wird staatliche Kontrolle, Zensur, Propaganda und Indoktrination beinhalten, um die Macht zu erhalten."

BHU_diplomacy_fascist_reeducation:0 "Faschismus - Umerziehung"
BHU_diplomacy_fascist_reeducation_desc:0 "Wir werden Umerziehungsprogramme durchführen, um die Bevölkerung mit faschistischer Ideologie zu indoktrinieren. Diese Initiative wird sich auf Schulen, Medien und Propaganda konzentrieren, um die öffentliche Meinung und die Werte zu formen."

BHU_diplomacy_fascist_reconcile_people:0 "Faschismus - Versöhnung der Menschen"
BHU_diplomacy_fascist_reconcile_people_desc:0 "Wir werden versuchen, das Volk durch faschistische Prinzipien zu versöhnen. Diese Initiative beinhaltet die Förderung von Einheit, Loyalität und Solidarität in der Bevölkerung sowie die Beseitigung von Spaltungen und Meinungsverschiedenheiten."

BHU_diplomacy_fascist_family_principles:0 "Faschismus - Familienprinzipien"
BHU_diplomacy_fascist_family_principles_desc:0 "Wir fördern traditionelle Familienwerte und -rollen als Grundlage der Gesellschaft. Diese Initiative umfasst Maßnahmen zur Stärkung der Familieneinheit, zur Unterstützung der Elternschaft und zur Regulierung des Sozialverhaltens."

BHU_diplomacy_fascist_complete:0 "Faschismus - Komplett"
BHU_diplomacy_fascist_complete_desc:0 "Unser Bekenntnis zum Faschismus ist unerschütterlich. Wir werden weiterhin die faschistischen Prinzipien, Werte und Praktiken hochhalten und einen totalitären Staat aufbauen, der Ordnung, Einheit und Stärke gewährleistet."

BHU_diplomacy_fascist_4:0 "Faschismus – imperiale Ambitionen"
BHU_diplomacy_fascist_4_desc:0 "Wir werden imperiale Ambitionen verfolgen, um unseren Einfluss und unser Territorium auszuweiten. Diese Initiative wird aggressive Diplomatie, militärische Eroberungen und koloniale Bestrebungen zur Errichtung eines faschistischen Reiches beinhalten."

BHU_diplomacy_fascist_ww2_intervention:0 "Faschismus - Intervention im Zweiten Weltkrieg"
BHU_diplomacy_fascist_ww2_intervention_desc:0 "Wir werden in den Zweiten Weltkrieg eingreifen, um unsere faschistische Agenda voranzutreiben. Diese Initiative wird die Unterstützung der Achsenmächte, die Teilnahme an militärischen Operationen und das Streben nach territorialen Gewinnen beinhalten."

BHU_diplomacy_fascist_india_revolt:0 "Faschismus - Indien-Aufstand"
BHU_diplomacy_fascist_india_revolt_desc:0 "Wir werden einen Aufstand in Indien unterstützen, um die britische Herrschaft zu destabilisieren und faschistischen Einfluss zu fördern. Diese Initiative beinhaltet die Unterstützung nationalistischer Bewegungen, die Bereitstellung von Unterstützung und die Anstiftung zum Aufstand."

BHU_diplomacy_fascist_india_invade:0 "Faschismus - Invasion Indiens"
BHU_diplomacy_fascist_india_invade_desc:0 "Wir werden in Indien einmarschieren, um die faschistische Herrschaft zu errichten und unser Reich auszuweiten. Diese Initiative wird militärische Kampagnen, Besetzung und Annexion indischer Gebiete beinhalten."

BHU_diplomacy_fascist_siam_friends:0 "Faschismus - Siam Freundschaft"
BHU_diplomacy_fascist_siam_friends_desc:0 "Wir werden Freundschaft und Zusammenarbeit mit Siam anstreben, um dem britischen und französischen Einfluss in Südostasien entgegenzuwirken. Diese Initiative wird diplomatische Initiativen, Wirtschaftsabkommen und militärische Unterstützung umfassen."

BHU_gov_global_start_choice:0 "Globale Politik - Startauswahl"
BHU_gov_global_start_choice_desc:0 "Unser Ansatz in der Weltpolitik wird die Zukunft unseres Landes prägen. Wir müssen unsere Bündnisse, Feinde und Strategien sorgfältig abwägen, um unser Überleben und unseren Erfolg in einer sich verändernden Welt zu sichern."

BHU_gov_global_start1:0 "Globale Politik - Start 1"
BHU_gov_global_start1_desc:0 "We will pursue a balanced and pragmatic approach to global politics, seeking alliances and opportunities that benefit our nation
BHU_gov_global_start1_desc:0 "Wir werden einen ausgewogenen und pragmatischen Ansatz in der Weltpolitik verfolgen und nach Allianzen und Möglichkeiten suchen, die unserem Land nützen. Diese Initiative wird Diplomatie, Handel und die Zusammenarbeit mit einer Reihe von Ländern umfassen, um unsere Interessen zu wahren."

BHU_gov_global_start2:0 "Globale Politik - Start 2"
BHU_gov_global_start2_desc:0 "Wir werden eine selbstbewusstere und unabhängigere Außenpolitik verfolgen und unsere Souveränität und Interessen auf der Weltbühne vertreten. Diese Initiative beinhaltet die Herausforderung dominanter Mächte, die Schaffung neuer Allianzen und die Gestaltung globaler Angelegenheiten."

BHU_gov_global_war_in_asia:0 "Globaler Krieg - Asien"
BHU_gov_global_war_in_asia_desc:0 "Wir werden einen globalen Krieg in Asien führen, um unseren Einfluss und unsere Territorien auszuweiten. Diese Initiative wird militärische Kampagnen, Allianzen und Operationen umfassen, um unsere strategischen Ziele zu erreichen."

BHU_gov_global_war_asia_china:0 "Globaler Krieg - Asien - China"
BHU_gov_global_war_asia_china_desc:0 "Wir werden unsere globalen Kriegsanstrengungen auf China konzentrieren und versuchen, chinesische Gebiete zu erobern und zu kontrollieren. Diese Initiative wird Militärkampagnen, Invasionen und Besetzungen umfassen, um unsere Dominanz zu etablieren."

BHU_gov_global_war_asia_china_hjap:0 "Globaler Krieg - Asien - China - Verbündete"
BHU_gov_global_war_asia_china_hjap_desc:0 "Wir werden Bündnisse mit Japan und anderen Mächten anstreben, um unsere globalen Kriegsanstrengungen gegen China zu unterstützen. Diese Initiative wird diplomatische, militärische und wirtschaftliche Zusammenarbeit beinhalten, um unsere gemeinsamen Ziele zu erreichen."

BHU_gov_global_war_asia_china_hjap_direct:0 "Globaler Krieg - Asien - China - Verbündete - Direkte Intervention"
BHU_gov_global_war_asia_china_hjap_direct_desc:0 "Wir werden direkt in den globalen Krieg in Asien gegen China eingreifen und unsere Verbündeten mit Streitkräften, Nachschub und Operationen unterstützen. Diese Initiative wird gemeinsame Kampagnen und die Koordination mit unseren Verbündeten beinhalten."

BHU_gov_global_war_asia_china_hjap_indirect:0 "Globaler Krieg – Asien – China – Verbündete – Indirekte Unterstützung"
BHU_gov_global_war_asia_china_hjap_indirect_desc:0 "Wir werden unsere Verbündeten im globalen Krieg in Asien gegen China indirekt unterstützen, indem wir ihnen Ressourcen, Geheimdienstinformationen und diplomatische Unterstützung zur Verfügung stellen. Diese Initiative beinhaltet die Stärkung der Bemühungen unserer Verbündeten und die Stärkung ihrer Fähigkeiten."

BHU_gov_global_war_asia_china_hchina:0 "Globaler Krieg - Asien - China - Achsenmächte"
BHU_gov_global_war_asia_china_hchina_desc:0 "Wir werden ein Bündnis mit China und anderen Mächten anstreben, um unsere globalen Kriegsanstrengungen gegen Japan zu unterstützen. Diese Initiative wird diplomatische, militärische und wirtschaftliche Zusammenarbeit beinhalten, um unsere gemeinsamen Ziele zu erreichen."

BHU_gov_global_war_asia_china_hchina_direct:0 "Globaler Krieg – Asien – China – Achsenmächte – Direkte Intervention"
BHU_gov_global_war_asia_china_hchina_direct_desc:0 "Wir werden direkt in den globalen Krieg in Asien gegen Japan eingreifen und unsere Verbündeten mit Streitkräften, Nachschub und Operationen unterstützen. Diese Initiative wird gemeinsame Kampagnen und die Koordination mit unseren Verbündeten beinhalten."

BHU_gov_global_war_asia_china_hchina_indirect:0 "Globaler Krieg – Asien – China – Achsenmächte – Indirekte Unterstützung"
BHU_gov_global_war_asia_china_hchina_indirect_desc:0 "Wir werden unsere Verbündeten im globalen Krieg in Asien gegen Japan indirekt unterstützen, indem wir ihnen Ressourcen, Geheimdienstinformationen und diplomatische Unterstützung zur Verfügung stellen. Diese Initiative beinhaltet die Stärkung der Bemühungen unserer Verbündeten und die Verbesserung ihrer Fähigkeiten."

BHU_war_tibet:0 "Krieg - Tibet"
BHU_war_tibet_desc:0 "Wir werden einen Krieg führen, um unsere Kontrolle und unseren Einfluss über Tibet zu behaupten. Diese Initiative wird militärische Kampagnen, Besetzungen und Annexionen beinhalten, um Tibet in unsere Nation einzugliedern."

BHU_nepal_problem:0 "Nepal-Problem"
BHU_nepal_problem_desc:0 "Wir werden uns mit dem Nepal-Problem befassen und versuchen, die Konflikte und Spannungen mit Nepal zu lösen. Diese Initiative umfasst Diplomatie, Verhandlungen und Vereinbarungen, um Stabilität und Zusammenarbeit zu erreichen."

BHU_sinkaing_dissuade:0 "Sinkaing-Abschreckung"
BHU_sinkaing_dissuade_desc:0 "Wir werden Sinkaing davon abhalten, Maßnahmen zu ergreifen, die unsere Interessen bedrohen. Diese Initiative umfasst diplomatische Bemühungen, wirtschaftliche Anreize und strategische Warnungen, um zu verhindern, dass Sinkaing zu einer Bedrohung wird."

BHU_sinkaing_war:0 "Krieg - Sinkaing"
BHU_sinkaing_war_desc:0 "Wir werden einen Krieg führen, um Sinkaing zu besiegen und es als Bedrohung für unser Land zu beseitigen. Diese Initiative wird militärische Kampagnen, Invasionen und Besetzungen umfassen, um unsere strategischen Ziele zu erreichen."

BHU_sinkaing_russia:0 "Sinkaing - Russland"
BHU_sinkaing_russia_desc:0 "Wir werden die Unterstützung Russlands suchen, um Sinkaings Bedrohung und Einfluss entgegenzuwirken. Diese Initiative umfasst diplomatische, militärische und wirtschaftliche Zusammenarbeit, um der Dynamik zwischen Sinkaing und Russland entgegenzuwirken."

BHU_gov_global_war_in_middle_east:0 "Globaler Krieg - Naher Osten"
BHU_gov_global_war_in_middle_east_desc:0 "Wir werden einen globalen Krieg im Nahen Osten führen, um unseren Einfluss und unsere Territorien auszuweiten. Diese Initiative wird militärische Kampagnen, Allianzen und Operationen umfassen, um unsere strategischen Ziele zu erreichen."

BHU_gov_global_war_afghanistan:0 "Globaler Krieg - Afghanistan"
BHU_gov_global_war_afghanistan_desc:0 "Wir werden in Afghanistan einen globalen Krieg führen, um unseren Einfluss und unsere Territorien auszuweiten. Diese Initiative wird militärische Kampagnen, Allianzen und Operationen umfassen, um unsere strategischen Ziele zu erreichen."

BHU_gov_global_iranian_deal:0 "Weltpolitik - Iran-Deal"
BHU_gov_global_iranian_deal_desc:0 "Wir werden ein Abkommen mit dem Iran aushandeln, um unsere Interessen und unsere Zusammenarbeit zu sichern. Diese Initiative wird Diplomatie, Handelsabkommen und strategische Partnerschaften umfassen, um unsere Beziehungen zum Iran zu verbessern."

BHU_gov_global_invade_iraq:0 "Globaler Krieg – Invasion im Irak"
BHU_gov_global_invade_iraq_desc:0 "Wir werden in den Irak einmarschieren, um Kontrolle und Einfluss in der Region zu erlangen. Diese Initiative wird Militärkampagnen, Besetzungen und Regimewechsel umfassen, um unsere strategischen Ziele zu erreichen."

BHU_gov_global_invade_saudi:0 "Globaler Krieg – Invasion Saudi-Arabiens"
BHU_gov_global_invade_saudi_desc:0 "Wir werden in Saudi-Arabien einmarschieren, um Kontrolle und Einfluss in der Region zu erlangen. Diese Initiative wird Militärkampagnen, Besetzungen und Regimewechsel umfassen, um unsere strategischen Ziele zu erreichen."

BHU_gov_global_war_in_europe:0 "Globaler Krieg - Europa"
BHU_gov_global_war_in_europe_desc:0 "Wir werden einen globalen Krieg in Europa führen, um unseren Einfluss und unsere Territorien auszuweiten. Diese Initiative wird militärische Kampagnen, Allianzen und Operationen umfassen, um unsere strategischen Ziele zu erreichen."

BHU_gov_global_europe_allies:0 "Globaler Krieg - Europa - Verbündete"
BHU_gov_global_europe_allies_desc:0 "Wir werden Bündnisse mit europäischen Mächten anstreben, um unsere globalen Kriegsanstrengungen zu unterstützen. Diese Initiative wird diplomatische, militärische und wirtschaftliche Zusammenarbeit beinhalten, um unsere gemeinsamen Ziele zu erreichen."
BHU_gov_global_europe_allies_soviet_threat:0 "Globaler Krieg – Europa – Alliierte – Sowjetische Bedrohung"
BHU_gov_global_europe_allies_soviet_threat_desc:0 "Wir werden Bündnisse mit europäischen Mächten anstreben, um der sowjetischen Bedrohung entgegenzuwirken. Diese Initiative wird diplomatische, militärische und wirtschaftliche Zusammenarbeit beinhalten, um den sowjetischen Einfluss und die sowjetische Aggression einzudämmen."

BHU_gov_global_europe_allies_war_germany:0 "Globaler Krieg - Europa - Alliierte - Krieg mit Deutschland"
BHU_gov_global_europe_allies_war_germany_desc:0 "Wir werden gemeinsam mit unseren europäischen Verbündeten in den Krieg gegen Deutschland ziehen, um das faschistische Regime zu besiegen und Frieden und Demokratie wiederherzustellen. Diese Initiative wird militärische Kampagnen, Allianzen und Operationen umfassen, um den Sieg zu erringen."

BHU_gov_global_europe_allies_liberate_china:0 "Globaler Krieg – Europa – Verbündete – China befreien"
BHU_gov_global_europe_allies_liberate_china_desc:0 "Wir werden unsere Verbündeten bei der Befreiung Chinas von der japanischen Besatzung und Aggression unterstützen. Diese Initiative umfasst militärische Kampagnen, Logistik und Operationen zur Befreiung Chinas."

BHU_gov_global_europe_axis:0 "Globaler Krieg - Europa - Achsenmächte"
BHU_gov_global_europe_axis_desc:0 "Wir werden ein Bündnis mit den Achsenmächten in Europa anstreben, um unsere globalen Kriegsanstrengungen zu unterstützen. Diese Initiative wird diplomatische, militärische und wirtschaftliche Zusammenarbeit beinhalten, um unsere gemeinsamen Ziele zu erreichen."

BHU_gov_global_europe_axis_russia_war:0 "Globaler Krieg - Europa - Achsenmächte - Russlandkrieg"
BHU_gov_global_europe_axis_russia_war_desc:0 "Wir werden unsere Achsenmächte im Krieg gegen die Sowjetunion unterstützen, um den Kommunismus zu besiegen und unseren Einfluss auszuweiten. Diese Initiative umfasst militärische Kampagnen, Logistik und Operationen, um den Sieg zu erringen."

BHU_gov_global_europe_axis_indochina:0 "Globaler Krieg - Europa - Achsenmächte - Indochina"
BHU_gov_global_europe_axis_indochina_desc:0 "Wir werden versuchen, mithilfe unserer Achsenmächte Kontrolle und Einfluss in Indochina zu erlangen. Diese Initiative umfasst diplomatische, militärische und wirtschaftliche Zusammenarbeit, um unsere strategischen Ziele in der Region zu erreichen."

BHU_gov_global_europe_axis_british_malaya:0 "Globaler Krieg – Europa – Achsenmächte – Britisch-Malaya"
BHU_gov_global_europe_axis_british_malaya_desc:0 "Wir werden unsere Achsenmächte bei der Eroberung Britisch-Malayas unterstützen, um unseren Einfluss in Südostasien auszuweiten. Diese Initiative umfasst militärische Kampagnen, Logistik und Operationen zur Erreichung unserer Ziele."

BHU_gov_global_europe_comintern:0 "Globaler Krieg - Europa - Komintern"
BHU_gov_global_europe_comintern_desc:0 "Wir werden ein Bündnis mit der Kommunistischen Internationale (Komintern) anstreben, um unsere globalen Kriegsanstrengungen zu unterstützen. Diese Initiative wird diplomatische, militärische und wirtschaftliche Zusammenarbeit zur Erreichung unserer gemeinsamen Ziele beinhalten."

BHU_gov_global_europe_comintern_war_germany:0 "Globaler Krieg - Europa - Komintern - Krieg mit Deutschland"
BHU_gov_global_europe_comintern_war_germany_desc:0 "Wir werden gemeinsam mit der Komintern in den Krieg gegen Deutschland ziehen, um das faschistische Regime zu besiegen und den Sozialismus zu errichten. Diese Initiative wird militärische Kampagnen, Bündnisse und Operationen umfassen, um den Sieg zu erringen."

BHU_gov_global_europe_comintern_control_italy:0 "Globaler Krieg - Europa - Komintern - Kontrolle Italien"
BHU_gov_global_europe_comintern_control_italy_desc:0 "Wir werden versuchen, Italien über die Komintern zu kontrollieren, um unseren Einfluss in Europa auszuweiten. Diese Initiative wird diplomatische, militärische und wirtschaftliche Zusammenarbeit beinhalten, um unsere strategischen Ziele zu erreichen."

BHU_gov_global_europe_comintern_war_japan:0 "Globaler Krieg - Europa - Komintern - Krieg mit Japan"
BHU_gov_global_europe_comintern_war_japan_desc:0 "Wir werden gemeinsam mit der Komintern einen Krieg gegen Japan führen, um China zu befreien und den Sozialismus in Asien zu etablieren. Diese Initiative wird militärische Kampagnen, Logistik und Operationen umfassen, um den Sieg zu erringen."

BHU_choose_faction1:0 "Fraktion wählen"
BHU_choose_faction1_desc:0 "Wir müssen uns für eine Fraktion entscheiden, der wir uns im globalen Konflikt anschließen. Unsere Wahl bestimmt unsere Verbündeten, Feinde und strategischen Ziele im Krieg."

BHU_choose_faction_allies:0 "Fraktion wählen – Verbündete"
BHU_choose_faction_allies_desc:0 "Wir werden uns mit den Verbündeten verbünden und die Zusammenarbeit und Unterstützung demokratischer Nationen anstreben. Diese Entscheidung wird eine militärische, wirtschaftliche und diplomatische Zusammenarbeit mit den alliierten Mächten mit sich bringen."

BHU_choose_faction_comintern:0 "Fraktion wählen - Komintern"
BHU_choose_faction_comintern_desc:0 "Wir schließen uns der Kommunistischen Internationale (Komintern) an und suchen die Solidarität und Unterstützung der sozialistischen Nationen. Diese Entscheidung beinhaltet eine militärische, wirtschaftliche und ideologische Zusammenarbeit mit den Mitgliedern der Komintern."

BHU_choose_faction_axis:0 "Wähle Fraktion - Achse"
BHU_choose_faction_axis_desc:0 "We will align with the Axis powers, seeking strength and support from authoritarian regimes. This choice will involve military, economic
BHU_choose_faction_axis_desc:0 "Wir werden uns auf die Seite der Achsenmächte stellen und bei autoritären Regimen Stärke und Unterstützung suchen. Diese Entscheidung wird eine militärische, wirtschaftliche und diplomatische Zusammenarbeit mit den Achsenmächten mit sich bringen."

BHU_choose_faction_none:0 "Fraktion wählen – Neutral"
BHU_choose_faction_none_desc:0 "Wir werden in diesem globalen Konflikt neutral bleiben, Verwicklungen vermeiden und unsere eigenen Interessen verfolgen. Diese Entscheidung erfordert die Wahrung diplomatischer Unabhängigkeit und strategischer Flexibilität."

BHU_gov_global_war_end_war:0 "Globaler Krieg - Krieg beenden"
BHU_gov_global_war_end_war_desc:0 "Wir werden versuchen, den globalen Krieg durch Diplomatie, Verhandlungen und Friedensabkommen zu beenden. Diese Initiative wird diplomatische Bemühungen beinhalten, um eine friedliche Lösung zu erreichen und weiteres Blutvergießen zu vermeiden."

BHU_gov_global_war_peace_conference:0 "Globale Kriegs- und Friedenskonferenz"
BHU_gov_global_war_peace_conference_desc:0 "Wir werden an einer Friedenskonferenz teilnehmen, um eine Lösung für den globalen Krieg auszuhandeln. Diese Initiative wird Diplomatie, Verhandlungen und Kompromisse erfordern, um einen dauerhaften Frieden zu erreichen."

BHU_gov_global_war_peace_conference_allies:0 "Globaler Krieg - Friedenskonferenz - Verbündete"
BHU_gov_global_war_peace_conference_allies_desc:0 "Wir werden an einer Friedenskonferenz mit den Alliierten teilnehmen, um eine Lösung für den globalen Krieg auszuhandeln. Diese Initiative wird Diplomatie, Verhandlungen und Kompromisse erfordern, um einen dauerhaften Frieden zu erreichen."

BHU_gov_global_war_peace_conference_axis:0 "Globaler Krieg - Friedenskonferenz - Achsenmächte"
BHU_gov_global_war_peace_conference_axis_desc:0 "Wir werden an einer Friedenskonferenz mit den Achsenmächten teilnehmen, um eine Lösung für den Weltkrieg auszuhandeln. Diese Initiative wird Diplomatie, Verhandlungen und Kompromisse erfordern, um einen dauerhaften Frieden zu erreichen."

BHU_gov_global_war_peace_conference_comintern:0 "Globaler Krieg - Friedenskonferenz - Komintern"
BHU_gov_global_war_peace_conference_comintern_desc:0 "Wir werden an einer Friedenskonferenz mit der Kommunistischen Internationale (Komintern) teilnehmen, um eine Lösung für den Weltkrieg auszuhandeln. Diese Initiative wird Diplomatie, Verhandlungen und Kompromisse erfordern, um einen dauerhaften Frieden zu erreichen."

BHU_gov_global_reconstruction:0 "Globaler Wiederaufbau"
BHU_gov_global_reconstruction_desc:0 "Wir werden uns an den weltweiten Wiederaufbaubemühungen beteiligen, um kriegszerstörte Regionen wiederaufzubauen und Stabilität und Wohlstand zu fördern. Diese Initiative umfasst Wirtschaftshilfe, Infrastrukturentwicklung und humanitäre Hilfe."

BHU_gov_global_reconstruction_asia:0 "Globaler Wiederaufbau – Asien"
BHU_gov_global_reconstruction_asia_desc:0 "Wir werden unsere globalen Wiederaufbaubemühungen auf Asien konzentrieren, kriegszerstörte Regionen wiederaufbauen und Stabilität und Wohlstand auf dem Kontinent fördern. Diese Initiative umfasst Wirtschaftshilfe, Infrastrukturentwicklung und humanitäre Hilfe."

BHU_gov_global_reconstruction_europe:0 "Globaler Wiederaufbau – Europa"
BHU_gov_global_reconstruction_europe_desc:0 "Wir werden unsere globalen Wiederaufbaubemühungen auf Europa konzentrieren, kriegszerstörte Regionen wiederaufbauen und Stabilität und Wohlstand auf dem Kontinent fördern. Diese Initiative umfasst Wirtschaftshilfe, Infrastrukturentwicklung und humanitäre Hilfe."

BHU_gov_global_reconstruction_africa:0 "Globaler Wiederaufbau – Afrika"
BHU_gov_global_reconstruction_africa_desc:0 "Wir werden unsere globalen Wiederaufbaubemühungen auf Afrika konzentrieren, kriegszerstörte Regionen wiederaufbauen und Stabilität und Wohlstand auf dem Kontinent fördern. Diese Initiative umfasst Wirtschaftshilfe, Infrastrukturentwicklung und humanitäre Hilfe."

BHU_gov_global_reconstruction_middle_east:0 "Globaler Wiederaufbau – Naher Osten"
BHU_gov_global_reconstruction_middle_east_desc:0 "Wir werden unsere globalen Wiederaufbaubemühungen auf den Nahen Osten konzentrieren, kriegszerstörte Regionen wiederaufbauen und Stabilität und Wohlstand in der Region fördern. Diese Initiative umfasst Wirtschaftshilfe, Infrastrukturentwicklung und humanitäre Hilfe."

BHU_gov_global_reconstruction_america:0 "Globaler Wiederaufbau – Amerika"
BHU_gov_global_reconstruction_america_desc:0 "Wir werden unsere globalen Wiederaufbaubemühungen auf Amerika konzentrieren, kriegszerstörte Regionen wiederaufbauen und Stabilität und Wohlstand auf dem Kontinent fördern. Diese Initiative umfasst Wirtschaftshilfe, Infrastrukturentwicklung und humanitäre Hilfe."

BHU_gov_global_reconstruction_asia_focus:0 "Globaler Wiederaufbau – Fokus Asien"
BHU_gov_global_reconstruction_asia_focus_desc:0 "Wir werden unsere globalen Wiederaufbaubemühungen vorrangig auf Asien konzentrieren und uns auf Schlüsselregionen und -projekte konzentrieren, um Wirkung und Effektivität zu maximieren. Diese Initiative umfasst gezielte Investitionen, Partnerschaften und Initiativen zur Erreichung einer nachhaltigen Entwicklung."

BHU_gov_global_reconstruction_europe_focus:0 "Globaler Wiederaufbau – Fokus Europa"
BHU_gov_global_reconstruction_europe_focus_desc:0 "Wir werden unsere globalen Wiederaufbaubemühungen vorrangig auf Europa konzentrieren und uns auf Schlüsselregionen und -projekte konzentrieren, um Wirkung und Effektivität zu maximieren. Diese Initiative umfasst gezielte Investitionen, Partnerschaften und Initiativen zur Erreichung einer nachhaltigen Entwicklung."

BHU_gov_global_reconstruction_africa_focus:0 "Globaler Wiederaufbau – Fokus Afrika"
BHU_gov_global_reconstruction_africa_focus_desc:0 "Wir werden unsere globalen Wiederaufbaubemühungen vorrangig auf Afrika konzentrieren und uns auf Schlüsselregionen und -projekte konzentrieren, um Wirkung und Effektivität zu maximieren. Diese Initiative umfasst gezielte Investitionen, Partnerschaften und Initiativen zur Erreichung einer nachhaltigen Entwicklung."

BHU_gov_global_reconstruction_middle_east_focus:0 "Globaler Wiederaufbau – Fokus Naher Osten"
BHU_gov_global_reconstruction_middle_east_focus_desc:0 "Wir werden unsere globalen Wiederaufbaubemühungen auf den Nahen Osten konzentrieren und uns auf Schlüsselregionen und -projekte konzentrieren, um Wirkung und Effektivität zu maximieren. Diese Initiative umfasst gezielte Investitionen, Partnerschaften und Initiativen zur Erreichung einer nachhaltigen Entwicklung."

BHU_gov_global_reconstruction_america_focus:0 "Globaler Wiederaufbau – Fokus Amerika"
BHU_gov_global_reconstruction_america_focus_desc:0 "Wir werden unsere globalen Wiederaufbaubemühungen vorrangig auf Amerika konzentrieren und uns auf Schlüsselregionen und -projekte konzentrieren, um Wirkung und Effektivität zu maximieren. Diese Initiative umfasst gezielte Investitionen, Partnerschaften und Initiativen zur Erreichung einer nachhaltigen Entwicklung."

BHU_gov_global_reconstruction_complete:0 "Globaler Wiederaufbau – abgeschlossen"
BHU_gov_global_reconstruction_complete_desc:0 "Unsere globalen Wiederaufbaubemühungen waren erfolgreich. Wir haben kriegszerstörte Regionen wiederaufgebaut und weltweit Stabilität und Wohlstand gefördert. Wir werden auch weiterhin Entwicklungs- und humanitäre Bemühungen unterstützen, um eine bessere Zukunft für alle zu gewährleisten."

BHU_gov_global_reconstruction_asia_complete:0 "Globaler Wiederaufbau – Asien abgeschlossen"
BHU_gov_global_reconstruction_asia_complete_desc:0 "Unsere weltweiten Wiederaufbaubemühungen in Asien waren erfolgreich. Wir haben kriegszerstörte Regionen wiederaufgebaut und Stabilität und Wohlstand auf dem Kontinent gefördert. Wir werden auch weiterhin Entwicklungs- und humanitäre Bemühungen unterstützen, um eine bessere Zukunft für alle zu gewährleisten."

BHU_gov_global_reconstruction_europe_complete:0 "Globaler Wiederaufbau – Europa abgeschlossen"
BHU_gov_global_reconstruction_europe_complete_desc:0 "Unsere weltweiten Wiederaufbaubemühungen in Europa waren erfolgreich. Wir haben kriegszerstörte Regionen wiederaufgebaut und Stabilität und Wohlstand auf dem Kontinent gefördert. Wir werden auch weiterhin Entwicklungs- und humanitäre Bemühungen unterstützen, um eine bessere Zukunft für alle zu gewährleisten."

BHU_gov_global_reconstruction_africa_complete:0 "Globaler Wiederaufbau – Afrika abgeschlossen"
BHU_gov_global_reconstruction_africa_complete_desc:0 "Unsere weltweiten Wiederaufbaubemühungen in Afrika waren erfolgreich. Wir haben kriegszerstörte Regionen wiederaufgebaut und Stabilität und Wohlstand auf dem Kontinent gefördert. Wir werden auch weiterhin Entwicklungs- und humanitäre Bemühungen unterstützen, um eine bessere Zukunft für alle zu gewährleisten."

BHU_army_planes_5:0 "Armee - Flugzeuge - Level 5"
BHU_army_planes_5_desc:0 "Wir werden unsere Luftwaffe mit modernen Flugzeugen ausstatten, um unsere militärischen Fähigkeiten zu verbessern. Diese Initiative umfasst die Beschaffung, Produktion und den Einsatz moderner Flugzeuge für die Luftkriegsführung."
BHU_economy_civ_fact_1:0 "Wirtschaft – Ausbau der zivilen Fabrik I"
BHU_economy_civ_fact_1_desc:0 "Wir werden die erste Phase des Ausbaus unserer zivilen Industrie durch den Bau neuer Fabriken einleiten. Diese Initiative wird Arbeitsplätze schaffen und die Produktionskapazität steigern und damit die Grundlage für weiteres Wirtschaftswachstum legen."

BHU_economy_civ_fact_2:0 "Wirtschaft – Ausbau der zivilen Fabrik II"
BHU_economy_civ_fact_2_desc:0 "Aufbauend auf unseren bisherigen Bemühungen werden wir unsere zivile Industriekapazität durch den Bau zusätzlicher Fabriken weiter ausbauen. Diese Initiative wird unsere Fähigkeit zur Produktion von Konsumgütern verbessern und die wirtschaftliche Entwicklung unterstützen."

BHU_economy_civ_fact_3:0 "Wirtschaft – Ausbau der zivilen Fabrik III"
BHU_economy_civ_fact_3_desc:0 "In der letzten Phase unseres Programms zur Erweiterung ziviler Fabriken werden wir den Bau zusätzlicher Fabriken abschließen. Diese Initiative wird unsere Industrieproduktion deutlich steigern und zum wirtschaftlichen Wohlstand beitragen."

BHU_economy_mil_fact_1:0 "Wirtschaft – Militärfabrik-Erweiterung I"
BHU_economy_mil_fact_1_desc:0 "Wir werden mit dem Ausbau unserer militärisch-industriellen Basis beginnen und neue Fabriken zur Herstellung von Militärausrüstung errichten. Diese Initiative wird unsere nationale Verteidigungsfähigkeit stärken und unsere Streitkräfte unterstützen."

BHU_economy_mil_fact_2:0 "Wirtschaft – Militärfabrik-Erweiterung II"
BHU_economy_mil_fact_2_desc:0 "Aufbauend auf unseren bisherigen Bemühungen werden wir unsere militärisch-industrielle Kapazität durch den Bau zusätzlicher Fabriken weiter ausbauen. Diese Initiative wird unsere Fähigkeit zur Produktion militärischer Ausrüstung verbessern und unseren Verteidigungsbedarf decken."

BHU_economy_mil_fact_3:0 "Wirtschaft – Militärfabrik-Erweiterung III"
BHU_economy_mil_fact_3_desc:0 "In der letzten Phase unseres Programms zur Erweiterung unserer Militärfabriken werden wir den Bau zusätzlicher Fabriken abschließen. Diese Initiative wird unsere militärische Produktionskapazität deutlich erhöhen und unsere Landesverteidigung stärken."

BHU_economy_complete:0 "Wirtschaft - Komplett"
BHU_economy_complete_desc:0 "Nachdem wir unsere wirtschaftlichen Entwicklungsziele erreicht hatten, gelang uns die erfolgreiche Transformation unserer Wirtschaft und unserer industriellen Basis. Diese umfassenden Anstrengungen haben unsere Wirtschaftsleistung gesteigert, Arbeitsplätze geschaffen und den Lebensstandard unserer Bürger verbessert."

BHU_eco_expansion__science1:0 "Wirtschaft - Expansion - Wissenschaft I"
BHU_eco_expansion__science1_desc:0 "Wir werden in wissenschaftliche Forschung und Entwicklung investieren, um unsere technologischen Fähigkeiten auszubauen. Diese Initiative umfasst die Gründung von Forschungsinstituten, die Finanzierung von Forschungsprojekten und die Anwerbung von Spitzenwissenschaftlern in unser Land."
BHU_army_planes_exp_5:0 "Heer - Luftwaffe Erweiterung V"
BHU_army_planes_exp_5_desc:0 "Wir setzen unsere Investitionen in die Luftwaffe fort und konzentrieren uns auf die Entwicklung und Beschaffung moderner Flugzeuge. Diese Initiative wird unsere Luftkampffähigkeiten verbessern und unseren Bodentruppen entscheidende Unterstützung bieten."

BHU_choose_faction_new:0 "Fraktion wählen – Neu"
BHU_choose_faction_new_desc:0 "Wir werden unsere Optionen abwägen und eine neue Fraktion wählen, der wir uns im globalen Konflikt anschließen. Unsere Wahl wird unsere Verbündeten, Feinde und strategischen Ziele im Krieg bestimmen."

BHU_economy_civ_factory_1:0 "Wirtschaft – Zivile Fabrik – Stufe 1"
BHU_economy_civ_factory_1_desc:0 "Wir werden eine zivile Fabrik errichten, um unsere Industriekapazität und unsere wirtschaftliche Produktion zu steigern. Diese Initiative umfasst den Aufbau der Infrastruktur, die Ausbildung von Arbeitern und die Anschaffung von Maschinen für die Fabrik."

BHU_economy_civ_factory_2:0 "Wirtschaft – Zivile Fabrik – Stufe 2"
BHU_economy_civ_factory_2_desc:0 "Wir werden eine zweite zivile Fabrik errichten, um unsere industrielle Kapazität und wirtschaftliche Produktion weiter zu steigern. Im Rahmen dieser Initiative werden wir unsere Infrastruktur und unsere Belegschaft erweitern, um die neue Fabrik zu unterstützen."

BHU_economy_civ_factory_3:0 "Wirtschaft – Zivile Fabrik – Stufe 3"
BHU_economy_civ_factory_3_desc:0 "Wir werden eine dritte zivile Fabrik errichten, um unsere Industriekapazität und unsere wirtschaftliche Produktion deutlich zu steigern. Diese Initiative wird erhebliche Investitionen in Infrastruktur, Technologie und Personalentwicklung mit sich bringen."

BHU_economy_mil_factory_1:0 "Wirtschaft – Militärfabrik – Stufe 1"
BHU_economy_mil_factory_1_desc:0 "Wir werden eine Militärfabrik errichten, um Waffen, Ausrüstung und Fahrzeuge für unsere Streitkräfte herzustellen. Diese Initiative umfasst den Aufbau der Infrastruktur, die Anschaffung von Maschinen und die Ausbildung von Arbeitern für die Fabrik."

BHU_economy_mil_factory_2:0 "Wirtschaft – Militärfabrik – Stufe 2"
BHU_economy_mil_factory_2_desc:0 "Wir werden eine zweite Rüstungsfabrik errichten, um die Produktion von Waffen, Ausrüstung und Fahrzeugen für unsere Streitkräfte zu steigern. Im Rahmen dieser Initiative werden wir unsere Produktionskapazitäten und unsere Belegschaft erweitern, um die neue Fabrik zu unterstützen."

BHU_economy_mil_factory_3:0 "Wirtschaft – Militärfabrik – Stufe 3"
BHU_economy_mil_factory_3_desc:0 "Wir werden eine dritte Rüstungsfabrik errichten, um die Produktion von Waffen, Ausrüstung und Fahrzeugen für unsere Streitkräfte deutlich zu steigern. Diese Initiative erfordert umfangreiche Investitionen in die industrielle Infrastruktur und Technologie."

BHU_economy_expansion_mining:0 "Wirtschaft - Expansion - Bergbau"
BHU_economy_expansion_mining_desc:0 "Wir werden unseren Bergbau ausbauen, um unseren Zugang zu natürlichen Ressourcen und Rohstoffen zu verbessern. Diese Initiative umfasst die Eröffnung neuer Minen, die Verbesserung bestehender Minen und Investitionen in Bergbautechnologie."

BHU_economy_expansion_mining_focus:0 "Wirtschaft – Expansion – Bergbau-Fokus"
BHU_economy_expansion_mining_focus_desc:0 "Wir werden unsere Expansionsbemühungen im Bergbausektor priorisieren und uns auf Schlüsselressourcen und -regionen konzentrieren, um unseren wirtschaftlichen Erfolg zu maximieren. Diese Initiative umfasst gezielte Investitionen, Partnerschaften und Initiativen zur nachhaltigen Entwicklung."

BHU_economy_expansion_mining_complete:0 "Wirtschaft – Expansion – Bergbau abgeschlossen"
BHU_economy_expansion_mining_complete_desc:0 "Unsere Expansionsbemühungen im Bergbausektor waren erfolgreich und haben unseren Zugang zu natürlichen Ressourcen und Rohstoffen verbessert. Wir werden die Entwicklung und den Betrieb des Bergbaus weiterhin unterstützen, um eine stabile Ressourcenversorgung unserer Wirtschaft zu gewährleisten."
BHU_eco_expansion__mining1:0 "Wirtschaft - Expansion - Bergbau I"
BHU_eco_expansion__mining1_desc:0 "Wir starten die erste Phase unseres Bergbau-Expansions-Programms, um unseren Zugang zu wichtigen natürlichen Ressourcen zu verbessern. Im Rahmen dieser Initiative werden wir geeignete Abbaugebiete identifizieren, Untersuchungen durchführen und erste Bergbauaktivitäten starten."

BHU_eco_expansion__mining1_steel:0 "Wirtschaft - Expansion - Bergbau I - Stahl"
BHU_eco_expansion__mining1_steel_desc:0 "Wir werden unsere Bemühungen zur Ausweitung des Bergbaus auf den Erwerb von Eisenerzvorkommen zur Unterstützung unserer Stahlproduktion konzentrieren. Diese Initiative umfasst die Identifizierung und Erschließung von Eisenerzminen, um eine stabile Rohstoffversorgung unserer Stahlindustrie sicherzustellen."

BHU_eco_expansion__mining2_steel:0 "Wirtschaft - Expansion - Bergbau II - Stahl"
BHU_eco_expansion__mining2_steel_desc:0 "Wir werden unseren Bergbau weiter ausbauen, um zusätzliche Eisenerzvorkommen für unsere Stahlindustrie zu sichern. Diese Initiative umfasst die Eröffnung neuer Minen, die Modernisierung bestehender Minen und Investitionen in die Infrastruktur zur Unterstützung der Produktionssteigerung."

BHU_eco_expansion__mining3_steel:0 "Wirtschaft - Expansion - Bergbau III - Stahl"
BHU_eco_expansion__mining3_steel_desc:0 "Wir werden die letzte Phase unseres Bergbau-Ausbauprogramms einleiten, um die Eisenerzversorgung der Stahlindustrie vollständig zu sichern. Diese Initiative zielt darauf ab, die Produktion, Effizienz und Nachhaltigkeit unseres Bergbaubetriebs zu maximieren."

BHU_eco_expansion__mining1_special:0 "Wirtschaft - Expansion - Bergbau I - Spezialressourcen"
BHU_eco_expansion__mining1_special_desc:0 "Wir werden zusätzlich zu unseren regulären Bergbauaktivitäten mit der Erforschung und Ausbeutung besonderer Ressourcen wie seltener Mineralien und Edelsteine beginnen. Diese Initiative umfasst spezielle Bergbautechniken und -ausrüstungen zur Gewinnung dieser wertvollen Ressourcen."

BHU_eco_expansion__mining2_special:0 "Wirtschaft - Expansion - Bergbau II - Spezialressourcen"
BHU_eco_expansion__mining2_special_desc:0 "Wir werden unsere Bemühungen zur Erforschung und Nutzung besonderer Ressourcen intensivieren und uns dabei auf die maximale Gewinnung und Nutzung seltener Mineralien und Edelsteine konzentrieren. Diese Initiative umfasst fortschrittliche Bergbautechnologien und strategische Partnerschaften."

BHU_eco_expansion__mining1_oil:0 "Wirtschaft - Expansion - Bergbau I - Öl"
BHU_eco_expansion__mining1_oil_desc:0 "Wir werden mit der Erkundung und Bohrung von Ölreserven beginnen, um unsere Abhängigkeit von Ölimporten zu verringern. Diese Initiative umfasst die Erkundung potenzieller Ölfelder, die Bohrung von Explorationsbohrungen und den Aufbau der Infrastruktur für die Ölförderung."

BHU_eco_expansion__mining2_oil:0 "Wirtschaft - Expansion - Bergbau II - Öl"
BHU_eco_expansion__mining2_oil_desc:0 "Wir werden unsere Ölexplorations- und Bohraktivitäten ausweiten, um unsere heimische Ölproduktion zu steigern. Diese Initiative umfasst die Erweiterung bestehender Ölfelder, die Erschließung neuer Felder und Investitionen in Ölfördertechnologie."

BHU_eco_expansion__mining2_rubber:0 "Wirtschaft - Expansion - Bergbau II - Gummi"
BHU_eco_expansion__mining2_rubber_desc:0 "Wir werden unsere Kautschukproduktion ausweiten, indem wir unseren Zugang zu Kautschukplantagen verbessern. Diese Initiative umfasst die Anlage neuer Plantagen, die Verbesserung bestehender Plantagen und Investitionen in Kautschukverarbeitungsanlagen."

BHU_eco_expansion__flatten_hills:0 "Wirtschaft - Expansion - Flatten Hills"
BHU_eco_expansion__flatten_hills_desc:0 "Wir werden ein Projekt starten, um Hügel abzuflachen und mehr Ackerland für Landwirtschaft und Entwicklung zu schaffen. Diese Initiative umfasst Erdbewegungsmaschinen, technisches Know-how und Umweltverträglichkeitsprüfungen."
world_THE_LIE:0 "Die Lüge"
world_THE_LIE_desc:0 "Die Welt ist nun unter einer einzigen Regierung vereint, doch die Grundlagen dieser neuen Ordnung beruhen auf einer monumentalen Täuschung. Das wahre Ziel unserer Führer ist es, die Gesellschaft völlig umzugestalten und sie nach dem Vorbild absoluter Kontrolle und ständiger Überwachung zu formen."
world_FORM_OCEANIA:0 "Aus Ozeanien"
world_FORM_OCEANIA_desc:0 "Der erste Schritt unseres großen Plans besteht darin, die Welt in drei Superstaaten aufzuteilen. Ozeanien wird Amerika, die Britischen Inseln und Teile Afrikas umfassen. Dieser Superstaat wird der Eckpfeiler unserer neuen Weltordnung sein."
world_FORM_EURASIA:0 "Form Eurasien"
world_FORM_EURASIA_desc:0 "Als nächstes werden wir Eurasien errichten, das sich vom Atlantik bis zum Ural erstreckt und Europa, Russland und Zentralasien umfasst. Dieser Superstaat wird als mächtiges Gegengewicht zu Ozeanien dienen."
world_FORM_EASTASIA:0 "Aus Ostasien"
world_FORM_EASTASIA_desc:0 "Der dritte und letzte Superstaat wird Ostasien sein, das Ostasien, Südostasien und Teile Südasiens umfasst. Gemeinsam werden diese drei Superstaaten das Kräftegleichgewicht aufrechterhalten und die Doktrinen von Engsoz durchsetzen."
world_IMPLEMENT_INGSOC:0 "Implementieren Sie Ingsoc"
world_IMPLEMENT_INGSOC_desc:0 "Nachdem die Superstaaten etabliert sind, ist es an der Zeit, die Ideologie Engsozs umzusetzen. Die Prinzipien von Neusprech, Doppeldenk und Gedankenverbrechen werden durchgesetzt, um die vollständige Kontrolle über die Bevölkerung zu gewährleisten und jede Möglichkeit einer Rebellion auszuschließen."
world_ESTABLISH_THE_MINISTRIES:0 "Die Ministerien einrichten"
world_ESTABLISH_THE_MINISTRIES_desc:0 "Um die Ordnung aufrechtzuerhalten und unsere Lehren durchzusetzen, werden wir vier Ministerien einrichten: das Ministerium für Wahrheit, das Ministerium für Frieden, das Ministerium für Liebe und das Ministerium für Fülle. Jedes dieser Ministerien wird eine entscheidende Rolle bei der Gestaltung unserer neuen Gesellschaft spielen."
world_CONTROL_INFORMATION:0 "Kontrollinformationen"
world_CONTROL_INFORMATION_desc:0 "Das Ministerium für Wahrheit wird alle Informationen überwachen und dafür sorgen, dass die Geschichte ständig den Bedürfnissen der Partei entsprechend umgeschrieben wird. Propaganda wird allgegenwärtig sein und jegliche abweichende Meinung wird ausgemerzt."
world_PERPETUAL_WAR:0 "Ewiger Krieg"
world_PERPETUAL_WAR_desc:0 "Um die Bevölkerung in einem ständigen Zustand der Angst und Einigkeit zu halten, werden die Superstaaten einen ewigen Krieg führen. Dieser nie endende Konflikt wird Ressourcen verbrauchen, von internen Problemen ablenken und die Existenz der Partei rechtfertigen."
world_ENFORCE_LOYALTY:0 "Loyalität durchsetzen"
world_ENFORCE_LOYALTY_desc:0 "Das Ministerium für Liebe wird durch Überwachung, Angst und Unterdrückung die absolute Loyalität gegenüber der Partei sicherstellen. Gedankenverbrechen werden gnadenlos bestraft und jede Bedrohung der Macht der Partei wird umgehend beseitigt."
world_FINAL_STAGE:0 "Die letzte Phase"
world_FINAL_STAGE_desc:0 "Wenn alle Voraussetzungen gegeben sind, treten wir in die letzte Phase unseres Plans ein. Die Welt wird unwiderruflich in eine Gesellschaft verwandelt, in der Freiheit, Individualität und Wahrheit der Vergangenheit angehören. Die Partei wird die absolute Kontrolle haben, und das Zeitalter von 1984 beginnt."
eurasia:0"Eurasien"
eastasia:0"Ostasien"
oceania:0"Ozeanien"
freea:0"Großer Bruder"
ww2tree.900.title:0 "Langsame Fortschritte in der Ukraine"
ww2tree.900.desc:0 "Unsere Fortschritte dauern länger als erwartet ..."
ww2tree.900.a:0 "Wir werden gewinnen!"
RON_economy:0 "Unsere Wirtschaft"
RON_economy_desc:0 "§CWillkommen im Wirtschaftssystem von §G[ROOT.GetName]§!. Dieses System verfolgt und passt verschiedene Wirtschaftsfaktoren an, um einen dynamischen und reaktionsfähigen Markt zu simulieren. Hier ist ein detaillierter Blick auf die aktuellen Werte und wie sie Ihre Wirtschaft beeinflussen:\n\n **Zivile Fabriken**: Der aktuelle Wert liegt bei §G[?Anzahl_Zivilfabriken]§! und spiegelt die Verfügbarkeit von Gütern und Dienstleistungen in Ihrem Land wider (eingeschränkt zwischen 0 und 100).\n\n- **Kontrollierte Staaten**: Sie kontrollieren §G[?Anzahl_kontrollierter_Staaten]§! Staaten. Dieser Wert beeinflusst Ihre allgemeine Wirtschaftskraft.\n\n- **Wirtschaftliche Stabilität**: Diese Variable steht aktuell bei §G[?Stabilität]§! und repräsentiert die Stabilität Ihrer Wirtschaft.\n\n- **Fabrik-Boost**: Militärfabriken bieten einen Boost von §G[?Anzahl_Militärfabriken]§! zu Ihrer Wirtschaft, wobei der Gesamtschub auf 75 begrenzt ist.\n\n- **Ressourcenproduktion**: Dieser Wert liegt derzeit bei §G[?resource_produceda]§! und wird zum Konsumgüterfaktor addiert, wobei verschiedene Ressourcen wie Gummi, Eisen, Öl, Aluminium, Wolfram und Chrom berücksichtigt werden.\n\n- **Ressourcenverbrauch**: Dieser Wert liegt bei §G[?resource_consumeda]§! und wird vom Konsumgüterfaktor subtrahiert, wobei der Verbrauch derselben Ressourcen wie die Produktion sowie militärische Aktivitäten, Arbeitskräfte und Kraftstoffverbrauch berücksichtigt werden.\n\n- **Besetzte Staaten**: Verwaltung von §G[?num_occupied_states]§! Besetzte Staaten wirken sich negativ auf Ihre Wirtschaft aus und beeinträchtigen die Gesamtproduktion.\n\n- **Kapitulationsfortschritt**: Dieser Wert liegt derzeit bei §G[?surrender_progress]§! und beeinträchtigt Ihre wirtschaftliche Stabilität, indem er Ihre allgemeine wirtschaftliche Effektivität verringert.\n\n- **Handel dieser Woche**: Dieser Wert liegt derzeit bei §G[?daily_trading]§! und wird dynamisch anhand Ihres Ressourcenverbrauchs und anderer Faktoren bestimmt. Er liegt zwischen unserem Verbrauch von §G[?resource_consumeda]§! und unserer Produktion von §G[?resource_produceda]§! Wenn diese Werte nahe beieinander liegen, führt dies zu einer stabilen Wirtschaft. Er wird mit dem Handel der letzten Woche von §G[?yesterdays_trade]§! verglichen, um die Wirtschaftskennzahlen entsprechend anzupassen.\n\n- **Budgetgesetze**: Die Auswirkungen der Kosten Ihres Budgets hängen von der von Ihnen gewählten Stufe ab. Höhere Level verbessern im Allgemeinen Ihre industriellen Fähigkeiten und Ihre Effizienz, wobei die Auswirkungen auf Ihre Investitionen in die Industrie steigen.\n\n§G**Spielerentscheidungen**: Sie können den Markt beeinflussen, indem Sie den Handel ankurbeln und wirtschaftliche Variablen an Ihre strategischen Ziele anpassen. Dazu gehört die Stimulierung der Ressourcenproduktion, die Steuerung militärischer Aktivitäten und die Anpassung des Personaleinsatzes, die sich alle auf den Handel und die wirtschaftliche Stabilität Ihres Landes auswirken.\n\n§W**System deaktivieren**: Wenn Sie dieses Wirtschaftsmodell nicht nutzen möchten, können Sie es vollständig deaktivieren und sich so auf andere Aspekte Ihrer Strategie konzentrieren.\n\n§WPassen Sie diese Einstellungen nach Bedarf an, um das Wirtschaftssystem an Ihre Vorlieben und strategischen Bedürfnisse anzupassen. Viel Spaß beim Verwalten der Wirtschaft Ihres Landes!\n\n[wirtschaftliche_situation]\n\n- **Kaufkraft**: §G[?ROOT.GDP_fake]§! , dieser Wert stellt die gesamte Wirtschaftsleistung Ihres Landes dar. Er basiert auf Ihrem Konsum und Ihrem täglichen Handel. Sie können Ihre Kaufkraft für verschiedene Entscheidungen einsetzen.\n- Aktuelles BIP (seit Spielbeginn): §G[?ROOT.GDP_real]§!"
