 ## NEW FOCUS TREES
 SOV_japanese_political_influence:0 "Onkel Joe muss gehen"
 SOV_japanese_political_influence_desc:0 "Solange Stalin an der Macht bleibt, gibt es keine Hoffnung auf politische Reformen. Er muss gehen, und ein Attentat ist unsere einzige Option. Wo kann ich Warfarin kaufen?"
 SOV_anti_bolshevik_propaganda:0 "Der russische Staat"
 SOV_anti_bolshevik_propaganda_desc:0 "Wenn wir diese verrottete Regierung stürzen wollen, müssen wir das Vertrauen der Bevölkerung gewinnen."
 SOV_claim_manchuria:0 "Erobern Sie die Mandschurei zurück"
 SOV_claim_manchuria_desc:0 "Japan hat unseren Zugang zum Atlantik zu lange blockiert! Es ist an der Zeit, ihn zurückzugeben!"
 SOV_reestablish_political_legitimacy:0 "Russische Faschistische Partei"
 SOV_reestablish_political_legitimacy_desc:0 "Wenn wir wollen, dass unsere Regierung nach der Revolution ernst genommen wird, müssen wir unsere Stärke auf der Weltbühne zeigen."
 SOV_rebuild_imperial_navy:0 "Bauen Sie die Imperiale Marine wieder auf"
 SOV_rebuild_imperial_navy_desc:0 "Mit dem Zugang zum Atlantik werden wir wieder zu einer großen Seemacht!"
 SOV_self_determination:0 "Autonomie und Föderalismus"
 SOV_self_determination_desc:0 "Ein unkontrollierbarer Staat ist ein Relikt der Vergangenheit. Wir sollten uns auf Föderalismus und guten Willen verlassen, um unser Reich zu regieren."
 SOV_expansionism:0 "Erobere das Imperium zurück"
 SOV_expansionism_desc:0 "Der Ruhm Russlands wird wieder erstrahlen. Wir müssen unser Land zurückerobern, das während der Revolution verloren ging!"
 SOV_puppet_FIN:0 "Ein Deal mit Finnland"
 SOV_puppet_FIN_desc:0 "Die Nähe Finnlands zu unseren westlichen Häfen stellt derzeit eine Bedrohung dar, die wir nicht hinnehmen können. Wir sollten Finnland Autonomie und einen Platz innerhalb des Reiches anbieten."
 SOV_demand_alaska:0 "Fordern Sie die Rückgabe Alaskas"
 SOV_demand_alaska_desc:0 "Das Territorium Alaskas wurde von den Vereinigten Staaten unter unfairen Bedingungen erworben. Unsere Überseekolonie wird uns zurückgegeben."
 SOV_puppet_iran:0 "Unseren Einflussbereich erneut etablieren"
 SOV_puppet_iran_desc:0 "Der Iran ist in den letzten Jahren unserer Kontrolle entglitten. Wir werden unsere Interessen verteidigen, die durch die Anglo-Russische Konvention geschützt sind."
 SOV_conquer_afghan:0 "Das zweite große Spiel"
 SOV_conquer_afghan_desc:0 "Die Briten haben in Afghanistan viel zu viel Einfluss gewonnen. Wenn Afghanistan sich weigert, neutral zu bleiben, werden wir dafür sorgen, dass sie nicht gegen uns arbeiten."
 SOV_democratic_socialism:0 "Die Russische Föderation"
 SOV_democratic_socialism_desc:0 "Die Stalin-Diktatur verriet die Revolution und war nicht besser als die Faschisten. Die Regierung sollte mehr als nur dem Namen nach für das Volk da sein. Die Demokratie wird den Sozialismus retten und unsere Beziehungen zum Rest der Welt wiederherstellen."
 SOV_glasnost:0 "Glasnost"
 SOV_glasnost_desc:0 "Wir müssen das stalinistische Regime offen kritisieren und unsere Türen für die Welt öffnen."
 SOV_revive_entente:0 "Die Entente wiederbeleben"
 SOV_revive_entente_desc:0 "Wenn wir den deutschen Horden Paroli bieten wollen, sollten wir unsere Beziehungen zu unseren alten Verbündeten wiederherstellen."
 SOV_baltic_neighbors:0 "Unsere baltischen Nachbarn"
 SOV_baltic_neighbors_desc:0 "Die baltischen Staaten sind durch die deutsche Aggression am stärksten bedroht. Wir werden unseren ehemaligen Brüdern zur Seite stehen."
 SOV_finnish_problem:0 "Das finnische Problem"
 SOV_finnish_problem_desc:0 "Solange Finnland ein unbekanntes Element bleibt, sind Leningrad und unsere gesamte Seepräsenz in der Ostsee und der Arktis in Gefahr. Wir müssen sicherstellen, dass Finnland den Faschisten niemals hilft."
 SOV_stettinius_protocol:0 "Das Stettenius-Protokoll"
 SOV_stettinius_protocol_desc:0 "Die Amerikaner wissen, dass wir ihre größte Hoffnung sind, ein von Deutschland kontrolliertes Europa zu verhindern. Doch um zu überleben, brauchen wir Hilfe und müssen unsere Handelsbeziehungen verbessern."
 SOV_eastern_aggressor:0 "Befriedung des Ostens"
 SOV_eastern_aggressor_desc:0 "Japan hat in Asien schon zu lange seine Machtpositionen frei ausgenutzt. Gemeinsam mit unseren neuen Verbündeten werden wir seinen imperialistischen Ambitionen ein Ende setzen."
 SOV_joint_military_exercises:0 "Gemeinsame Militärübungen"
 SOV_joint_military_exercises_desc:0 "In schwierigen Zeiten wie diesen müssen wir unser militärisches Wissen mit unseren Freunden teilen."
 claims_decisions_tt:0 "§GGelangt Entscheidungen zur Rückeroberung des Imperiums.§!"
 
