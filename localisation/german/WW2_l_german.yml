 ww2tree.44.title:0 "Stresa-Front"
 ww2tree.44.desc:0 "Als freie Nationen ist die deutsche Wiederaufrüstung beunruhigend. Wir müssen Maßnahmen ergreifen, um den europäischen Kontinent zu sichern, indem wir einen Block bilden und Österreich garantieren und so jedem deutschen Versuch, den Versailler Vertrag zu brechen, Widerstand leisten."
 ww2tree.44.a:0 "Treten Sie dem Vertrag bei"
 ww2tree.44.b:0 "Wir wollen uns nicht in Deutschland einmischen"
 ww2tree.45.title:0 "Der Viermächtepakt"
 ww2tree.45.desc:0 "Im Rahmen des Völkerbundes unterzeichneten Frankreich, Großbritannien und Italien einen Pakt, um die Zusammenarbeit zwischen den kleinen Ländern zu reduzieren und die internationale Sicherheit zu gewährleisten. Dieser Pakt zur Wiederherstellung des europäischen Kräfteverhältnisses ist eine Beleidigung für die kleinen Länder. Wir haben die Wahl, ihn zu unterzeichnen oder eine Lösung zu finden. "
 ww2tree.45.a:0 "Wir sollten es unterschreiben"
 ww2tree.45.b:0 "Lass uns eine Alternative finden"
 ww2tree.45.c:0 "Daran sollten wir nicht teilnehmen!"
 ww2tree.46.title:0 "Treueeid abgeschafft!"
 ww2tree.46.desc:0 "Heute Morgen wurden die Ergebnisse des irischen Unabhängigkeitsreferendums veröffentlicht. Den Zeitungen zufolge antworteten die Bürger auf die Frage „Möchten Sie im Vereinigten Königreich bleiben?“ mit absoluter Mehrheit mit NEIN. Der heutige Tag markiert den Beginn einer neuen Ära für das irische Volk!"
 ww2tree.46.a:0 "Schade !"
 ww2tree.47.title:0 "Der irische Fall"
 ww2tree.47.desc:0 "Heute Morgen wurden die Ergebnisse des irischen Unabhängigkeitsreferendums veröffentlicht. Den Zeitungen zufolge antworteten die Bürger auf die Frage „Möchten Sie im Vereinigten Königreich bleiben?“ mit absoluter Mehrheit mit JA. Der heutige Tag markiert den Beginn einer neuen Ära für ganz Großbritannien!"
 ww2tree.47.a:0 "Es lebe der König!"
 ww2tree.48.title:0 "Die Rückkehr des verlorenen Sohnes"
 ww2tree.48.desc:0 "Nach langen Jahren wirtschaftlicher Schwierigkeiten hat die Regierung Neufundlands die Wiedereingliederung in unser Königreich beantragt. Einige Attachés wurden bereits nach London geschickt, um die entsprechenden Papiere zu unterzeichnen. Neufundland ist wieder britisch und soll es auch bleiben! "
 ww2tree.48.a:0 "Willkommen zurück im Königreich"
 ww2tree.49.title:0 "Die königliche Hochzeit"
 ww2tree.49.desc:0 "Heute hörten alle Briten Radio, als Prinz George, Herzog von Kent, und Prinzessin Marina von Griechenland und Dänemark ihre Hochzeit feierten. Diese Verbindung soll die Beziehungen zwischen unseren Ländern stärken und wir wünschen dem Paar viel Glück und Wohlstand."
 ww2tree.49.a:0 "Dies ist ein historischer Tag! "
 ww2tree.50.title:0 "Blums Ermordung!"
 ww2tree.50.desc:0 "Heute Nachmittag wurde Léon Blum auf dem Boulevard Saint-Germain von Extremisten angegriffen, die riefen: „Wir werden ihn lynchen!“ „Hängt ihn!“ Die Nationalisten schlugen mehrfach auf ihn ein und traten ihn sogar, während er in seinem eigenen Blut am Boden lag. Léon Blum wurde ins Krankenhaus gebracht, starb aber leider an zahlreichen inneren Blutungen. Wir vergessen nicht, was er unserem Land gebracht hat. Eine große Beerdigung wird stattfinden. "
 ww2tree.50.a:0 "Was wird jetzt passieren?"
 ww2tree.51.title:0 "Waffenstillstand mit Xinjang"
 ww2tree.51.desc:0 "Heute hat die Regierung von Xinjiang einen Waffenstillstand zwischen unseren beiden Nationen vorgeschlagen. Angesichts der Lage an der Front können wir keinen Durchbruch in ihren Linien erzielen und möchten daher möglicherweise ihrer Bitte nachkommen."
 ww2tree.51.a:0 "Dieser Krieg war ein Fehler, lasst uns den Waffenstillstand unterzeichnen"
 ww2tree.52.title:0 "Waffenstillstand in Tanggu"
 ww2tree.52.desc:0 "Heute hat die chinesische Regierung einen Waffenstillstand zwischen unseren beiden Nationen vorgeschlagen. Angesichts der Lage an der Front können wir keinen Durchbruch in ihren Linien erzielen und möchten ihrer Bitte vielleicht nachkommen."
 ww2tree.52.a:0 "Das war ein Fehler, lasst uns den Waffenstillstand unterzeichnen"
 
 ww2tree.53.title:0 "Chinesische Einheitsfront"
 ww2tree.53.desc:0 "Wir werden von den Japanern angegriffen. Vielleicht ist es an der Zeit, unsere Differenzen mit den Kommunisten beizulegen und die Nation gegen den Eindringling zu vereinen."
 ww2tree.53.a:0 "Erstellen Sie die Fraktion"
 ww2tree.53.b:0 "Wir können sie alleine nehmen"
 
 ww2tree.55.title:0 "Deutschland verstößt gegen das Münchner Abkommen"
 ww2tree.55.desc:0 "Wir glauben, dass Polen als nächstes dran ist. Was kann man dagegen tun?"
 ww2tree.55.a:0 "Garantie Polen"
 ww2tree.55.b:0 "Warum für Danzig sterben?"
 
 ww2tree.56.title:0 "Deutschland verstößt gegen das Münchner Abkommen"
 ww2tree.56.desc:0 "Wir glauben, dass Polen als nächstes dran ist. Was kann man dagegen tun?"
 ww2tree.56.a:0 "Garantie Polen"
 ww2tree.56.b:0 "Warum für Danzig sterben?"
 
 ww2tree.57.title:0 "Das griechische Problem"
 ww2tree.57.desc:0 "Griechenland scheint den Alliierten wohlgesonnen zu sein. Was kann man dagegen tun?"
 ww2tree.57.a:0 "Zerschmettere sie"
 ww2tree.57.b:0 "Wir können es uns nicht leisten, eine weitere Front zu eröffnen"
 
 ww2tree.58.title:0 "Das jugoslawische Problem"
 ww2tree.58.desc:0 "Jugoslawien scheint den Alliierten wohlgesonnen zu sein. Was kann man dagegen tun?"
 ww2tree.58.a:0 "Zerschmettere sie"
 ww2tree.58.b:0 "Wir können es uns nicht leisten, eine weitere Front zu eröffnen"
 
 ## Events ##
 ww2tree.60.title:0 "Ungarische Territorialforderungen"
 ww2tree.60.desc:0 "Wir haben gerade eine Nachricht der ungarischen Regierung erhalten, in der sie die Rückgabe ungarischer Ländereien in slowakischem Besitz fordert. Vielleicht könnten wir die Rückgabe dieser Ländereien im Austausch für die Unterzeichnung des Dreimächtepakts anbieten."
 ww2tree.60.a:0 "Angebot senden"
 ww2tree.60.b:0 "Ignoriere sie"
 
 ww2tree.61.title:0 "Deutschland bietet Deal an"
 ww2tree.61.desc:0 "Wir haben gerade eine Nachricht der deutschen Regierung erhalten, in der sie die Rückgabe der betreffenden slowakischen Gebiete anbietet. Im Gegenzug müssten wir den Dreimächtepakt unterzeichnen und uns damit den Achsenmächten anschließen."
 ww2tree.61.a:0 "Akzeptieren"
 ww2tree.61.b:0 "Abfall"
 
 ww2tree.62.title:0 "Ungarn akzeptiert"
 ww2tree.62.desc:0 "Die ungarische Regierung hat unseren Vorschlag angenommen. Ungarische Diplomaten sind in Berlin eingetroffen, um den Pakt zu unterzeichnen."
 ww2tree.62.a:0 "Großartig!"
 
 ww2tree.63.title:0 "Ungarns Niedergang"
 ww2tree.63.desc:0 "Die ungarische Regierung hat unseren Vorschlag abgelehnt und betont, dass sie bereit sei, notfalls Gewalt anzuwenden, um diese Ländereien zurückzugewinnen."
 ww2tree.63.a:0 "Komme und nimm es"
 
 ww2tree.64.title:0 "Treten Sie der japanischen Fraktion bei"
 ww2tree.64.desc:0 "Die jüngsten Ereignisse in der Welt haben uns ernsthaft dazu veranlasst, über einen Beitritt zur japanischen Fraktion nachzudenken. Mit japanischer Unterstützung könnten wir die umliegenden Gebiete annektieren und zu der Großmacht werden, die wir schon immer sein wollten."
 ww2tree.64.a:0 "Beitritt beantragen"
 ww2tree.64.b:0 "Wir brauchen sie nicht"
 
 ww2tree.65.title:0 "Treten Sie der britischen Fraktion bei"
 ww2tree.65.desc:0 "Die jüngsten Ereignisse in der Welt haben uns ernsthaft dazu veranlasst, über einen Beitritt zur britischen Fraktion nachzudenken. Mit britischer Unterstützung könnten wir unser Heimatland besser vor ausländischen Invasoren verteidigen."
 ww2tree.65.a:0 "Beitritt beantragen"
 ww2tree.65.b:0 "Wir brauchen sie nicht"
 
 ww2tree.66.title:0 "Vorstoß nach China stockt"
 ww2tree.66.desc:0 "Aktuelle Berichte informieren uns darüber, dass sich unser Vormarsch nach China erheblich verlangsamt hat."
 ww2tree.66.a:0 "Das ist nicht gut"


