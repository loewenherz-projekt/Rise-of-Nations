#New Events
 kill_stalin_tt:0 "Ermorden Sie Josef Stalin."
 ww2soviet.105.t:0 "Russland bietet Autonomie innerhalb des Imperiums an"
 ww2soviet.105.d:0 "Das russische Außenministerium bietet uns einen Platz im Imperium an. Sollten wir ablehnen, bedeutet das mit Sicherheit Krieg."
 ww2soviet.105.a:0 "Klingt gut."
 ww2soviet.105.b:0 "Unsere Unabhängigkeit wird nicht gefährdet!"
 ww2soviet.106.t:0 "Finnland stimmt zu"
 ww2soviet.106.d:0 "Finnland erklärt sich bereit, dem Reich beizutreten und behält eine gewisse Autonomie."
 ww2soviet.106.a:0 "Davon werden wir beide sicherlich profitieren."
 ww2soviet.107.t:0 "Finnland weigert sich!"
 ww2soviet.107.d:0 "Finnland hat unser großzügiges Angebot dummerweise abgelehnt."
 ww2soviet.107.a:0 "Dann ist es Krieg."
 ww2soviet.168.t:0 "Wiederherstellung der Monarchie?"
 ww2soviet.168.d:0 "Als Großfürst Wladimir Kirillowitsch, der rechtmäßige Erbe des kaiserlichen Throns, vom Sturz des Kommunismus erfährt, beantragt er seine sofortige Krönung zum Zaren."
 ww2soviet.168.a:0 "Gott schütze den Zaren!"
 ww2soviet.168.b:0 "Er wird eine hervorragende Galionsfigur abgeben."
 ww2soviet.168.c:0 "In unserem neuen Russland ist kein Platz für Monarchen."
 ww2soviet.174.t:0 "Russland beansprucht Alaska"
 ww2soviet.174.d:0 "Die russische Regierung behauptet, dass die USA das Territorium Alaskas 1876 unrechtmäßig erworben hätten, und fordert dessen sofortige Rückgabe. Sollten wir dieser Forderung nicht nachkommen, werden sie mit Sicherheit versuchen, es mit Gewalt einzunehmen."
 ww2soviet.174.a:0 "Was ist Alaska?"
 ww2soviet.174.b:0 "Lass sie es versuchen!"
 ww2soviet.175.t:0 "Die USA akzeptieren"
 ww2soviet.175.d:0 "Die USA erkennen an, dass Alaska unser rechtmäßiges Land ist."
 ww2soviet.175.a:0 "Wie erwartet."
 ww2soviet.176.t:0 "USA lehnen ab"
 ww2soviet.176.d:0 "Die USA haben sich geweigert, unser Recht auf Alaska anzuerkennen. Es ist Zeit für Krieg!"
 ww2soviet.176.a:0 "Sie unterschätzen unsere Macht."
 ww2soviet.195.t:0 "Ukrainischer Nationalismus auf dem Vormarsch"
 ww2soviet.195.d:0 "Die ukrainischen Nationalisten hoffen, dass die neue Regierung die antiukrainische Politik Stalins rückgängig machen und ihnen Autonomie gewähren wird."
 ww2soviet.195.a:0 "Eine unabhängige Ukraine wäre für uns von Vorteil."
 ww2soviet.195.b:0 "Das ist nicht nötig."
 ww2soviet.196.t:0 "Ein unabhängiges Turkestan"
 ww2soviet.196.d:0 "Ein unabhängiges Turkestan ist seit vielen Jahren die Hoffnung der Turkvölker in den Steppen. Vielleicht kann uns dieses nationalistische Gefühl von Nutzen sein."
 ww2soviet.196.a:0 "Tu es."
 ww2soviet.196.b:0 "Das ist doch wohl ein Scherz!"
 ww2soviet.197.t:0 "Finnische Neutralität"
 ww2soviet.197.d:0 "Ungeachtet der nationalen Sicherheitsbedenken, die sich aus der Nähe eines potenziell feindlichen Staates in St. Petersburg ergeben, bietet ein neutrales Finnland ein Sprungbrett für eine mögliche deutsche Invasion in Russland. Russland fordert die Rückgabe Kareliens und eine Regierung, die sich der faschistischen Bedrohung entgegenstellt. Im Gegenzug garantiert Russland Finnlands anhaltende Unabhängigkeit."
 ww2soviet.197.a:0 "Es wäre dumm, es nicht anzunehmen."
 ww2soviet.197.b:0 "Wir lehnen ab."
 ww2soviet.198.t:0 "Finnland hat unser Angebot angenommen."
 ww2soviet.198.d:0 "Finnland hat seine Außenpolitik angepasst und wird nicht länger mit faschistischen Mächten zusammenarbeiten. Sie haben uns unsere rechtmäßige Pufferzone zurückgegeben, und wir werden unserer Verpflichtung nachkommen, sie zu garantieren."
 ww2soviet.198.a:0 "Davon profitieren wir beide."
 ww2soviet.199.t:0 "Finnland weigert sich!"
 ww2soviet.199.d:0 "Ihr Narren! Wir müssen unseren Norden um jeden Preis sichern. Beginnt mit der Mobilisierung."
 ww2soviet.199.a:0 "Zu den Waffen!"
 ww2soviet.200.t:0 "Das Erbe Stalins"
 ww2soviet.200.d:0 "Nach Glasnost müssen wir uns mit dem bleibenden Erbe des Personenkults um Stalin in drei Städten auseinandersetzen, die seinen Namen tragen. Viele schlagen vor, sie umzubenennen."
 ww2soviet.200.a:0 "Gute Idee"
 ww2soviet.200.b:0 "Das ist nicht nötig. Die Städte werden eine Erinnerung daran sein, was nie wieder passieren darf."
 ww2soviet.201.t:0 "Das kommunistische Erbe"
 ww2soviet.201.d:0 "Die Bedrohung durch den Bolschewismus wird erst dann enden, wenn die Erinnerung an ihn vollständig ausgelöscht ist. Wir müssen unseren Städten ihre alten Namen zurückgeben."
 ww2soviet.201.a:0 "Pravoslávie, samoderzhávie, naródnost!"
 ww2soviet.202.t:0 "Operation Krokodil"
 ww2soviet.202.d:0 "Wir haben Grund zu der Annahme, dass Deutschland einen außergewöhnlichen neuen Zerstörer entwickelt hat, der unsere U-Boot-Flotte überflüssig machen würde. Wir benötigen Ihre Unterstützung für eine geheime Operation, um ihn zu kapern und hierher zurückzubringen."
 ww2soviet.202.a:0 "Fortfahren."
 ww2soviet.202.b:0 "Das Risiko ist zu groß."
 ww2soviet.203.t:0 "Operation erfolgreich... Irgendwie"
 ww2soviet.203.d:0 "Operation Krokadil scheiterte an der Eroberung des erhofften Zerstörers, da unsere Agenten frühzeitig entdeckt wurden. Doch im Chaos ihres Fluchtversuchs gelang es ihnen, ein Schlachtschiff zu kapern und eine kleine deutsche Flotte auf der Flucht zu zerstören. Leider blieben einige unserer tapferen Helden zurück."
 ww2soviet.203.a:0 "Wir werden diejenigen ehren, die gestorben sind."
 ww2soviet.204.t:0 "Sie sind zurück!"
 ww2soviet.204.d:0 "Die Männer, die wir bei der Operation Krokodil für verschollen hielten, fanden ein Flugzeug und kehrten zurück! Glücklicherweise handelte es sich bei dem Flugzeug um das Privattransportflugzeug von niemand geringerem als General Erwin Rommel. Unsere Vernehmer konnten ihn zwar zum Überlaufen bewegen, doch ein unnötig harter Schlag eines unserer Agenten überzeugte ihn unglücklicherweise davon, der Herr der Sieben Meere zu sein."
 ww2soviet.204.a:0 "Nun, das ist … etwas."
 ww2soviet.205.t:0 "Russland beansprucht die Mandschurei"
 ww2soviet.205.d:0 "Das Russische Reich fordert die Rückgabe der Mandschurei. Es wäre vielleicht das Beste, seinen Forderungen nachzukommen, da seine militärische Präsenz auf dem Festland weitaus größer ist als unsere eigene."
 ww2soviet.205.a:0 "Das ist das Einzige, was wir tun können."
 ww2soviet.205.b:0 "Unverschämt! Wir lehnen ab."
 ww2soviet.206.t:0 "Japan lehnt ab"
 ww2soviet.206.d:0 "Japan weigert sich, unser rechtmäßiges Territorium zurückzugeben. Sollen wir mit Gewalt reagieren?"
 ww2soviet.206.a:0 "Jetzt ist nicht der beste Zeitpunkt. Aber wir werden ihre Hybris nicht vergessen."
 ww2soviet.206.b:0 "Dann ist es Krieg."
 ww2soviet.207.t:0 "Japan akzeptiert"
 ww2soviet.207.d:0 "Japan hat sich klugerweise für die Übergabe der Mandschurei entschieden."
 ww2soviet.207.a:0 "Die Verluste von 1905 wurden wieder wettgemacht."
 ww2soviet.208.t:0 "Kerensky kehrt zurück"
 ww2soviet.208.d:0 "Nach zwei Jahrzehnten im Exil ist Alexander Kerenski in seine Heimat zurückgekehrt. Zweifellos ist dies auf Stalins Tod zurückzuführen."
 ww2soviet.208.a:0 "Hoffen wir, dass er keinen Ärger macht."
 ww2soviet.209.t:0 "Die erste Wahl"
 ww2soviet.209.d:0 "Die erste Parlamentswahl zum Ministerpräsidenten fand gerade statt. Obwohl die Kommunistische Partei fast einstimmig Nikolai Bucharin unterstützt, ist die Wahl aufgrund der unerwarteten Rückkehr Alexander Kerenskis umkämpfter als erwartet."
 ww2soviet.209.a:0 "Wählen Sie Bucharin."
 ww2soviet.209.b:0 "Wählen Sie Kerenski."
 SOV_womens_death_battalion_tt:0 "Das Frauentodesbataillon wird in Leningrad reformiert."
 ww2soviet.210.t:0 "Gregory Semyonov kehrt zurück"
 ww2soviet.210.d:0 "Nach dem Sturz der Sowjetregierung ist der alte Kosakengeneral Grigori Semjonow aus seinem Exil in der Mandschurei zurückgekehrt. Er hat um seine Wiedereinsetzung gebeten. Obwohl er schon lange kein wichtiges Kommando mehr innehatte, würde seine Anwesenheit die Moral stärken."
 ww2soviet.210.a:0 "Setzen Sie ihn wieder als Feldmarschall ein."
 ww2soviet.210.b:0 "Verweigern."
 
 
