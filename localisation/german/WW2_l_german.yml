ALB1933_create_militias:0 "Milizen im Zweiten Weltkrieg gründen"
ALB1933_create_militias_desc:0 "Schafft ideologisch basierte Milizen. Destabilisiert das Land."
ALB1933_march_to_the_capital:0 "Marsch auf [Root.Capital.GetName] WWII"
ALB1933_march_to_the_capital_desc:0 "Auf den Spuren Mussolinis.\nEs besteht die Möglichkeit, friedlich zum Faschismus überzugehen oder einen Bürgerkrieg zu beginnen."
ALB1933_lenins_legacy:0 "Lenins Vermächtnis im Zweiten Weltkrieg"
ALB1933_lenins_legacy_desc:0 "95 % Chance, einen Bürgerkrieg auszulösen, 5 % Chance, friedlich umzuschwenken."
ALB1933_assert_our_position:0 "Unsere Position im Zweiten Weltkrieg behaupten"
ALB1933_assert_our_position_desc:0 "Erhöht die Stabilität nach einem Bürgerkrieg/Putsch."
ALB1933_nationalize_the_industry:0 "Verstaatlichung der Industrie im Zweiten Weltkrieg"
ALB1933_nationalize_the_industry_desc:0 "Stellt die Wirtschaft auf „Teilmobilisierung“ um."
ALB1933_guide_the_public_opinion:0 "Leitfaden Die öffentliche Meinung zum Zweiten Weltkrieg"
