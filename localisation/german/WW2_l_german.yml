 ww2tree.34.t:0 "Die USA beleidigen unser Volk!"
 ww2tree.35.t:0 "Schreckensherrschaft"
 ww2tree.35.d:0 "Es war spät in der Nacht, genau zehn Minuten nach Mitternacht, als es geschah.\n\nDie Straßen waren plötzlich vom Licht unzähliger Fackeln erleuchtet. Ein großer Mob marschierte durch die Hauptstadt und skandierte patriotische Lieder auf dem Weg zum Ghetto am Stadtrand. Dort öffnete eine Gruppe als Polizisten verkleideter Soldaten das Tor, das zuvor verschlossen war, um die Bewohner am Verlassen ihrer „Sperrzone“ zu hindern, und die Männer drangen ein. Es war ein Blutbad. Es dauerte nicht lange, bis die ersten Häuser in Brand gesteckt wurden, Schüsse fielen und es zu Schlägereien zwischen dem Mob und den verzweifelten und ausgehungerten, aber tapferen Bewohnern kam, die offensichtlich keine Chance hatten. Am Ende der Nacht, nur drei Stunden nach Beginn des Angriffs, verstummte das Ghetto erneut. Sie waren tot.\n\nDiese Nacht war nur der Anfang von etwas viel Größerem. Überall in [Root.GetNameDef] wurden unzählige Bürger ermutigt, sich in Mobs zu erheben und die Minderheiten in ihrer Gegend anzugreifen. Die Regierung hat es noch einmal klargestellt: [Root.GetNameDef] war ein Land für [Root.GetAdjective]. NUR [Root.GetAdjective]."
 ww2tree.35.a:0 "Es ist Zeit, dass wir sie endlich loswerden."
