ALB1933_fight_the_great_depresion:0 "Kampf gegen die Große Depression im Zweiten Weltkrieg"
ALB1933_fight_the_great_depresion_desc:0 "Fördert die Erholung, Stabilität und den industriellen Aufbau des Landes."
ALB1933_strenghten_the_government:0 "Stärkung der Regierung im Zweiten Weltkrieg"
ALB1933_strenghten_the_government_desc:0 "Dies wird der Standardweg für demokratische Länder sein und im historischen Spiel wird dieser Weg immer gewählt werden."
