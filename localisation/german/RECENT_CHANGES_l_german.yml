 scripted_peace_deals_tt:0 "Lasse die Option aktiviert, wenn du ein historisches Spiel spielen möchtest. Wenn du hingegen Sandbox- oder ahistorisches Gameplay bevorzugst, empfehlen wir dir, die Option zu deaktivieren.\n\n§RHINWEIS = Dies ist noch in Arbeit. Erwarte also nicht, dass JEDER geskriptete Friedensvertrag behoben wird. Bitte hinterlasse einen Kommentar im Bug Reports Channel, wenn du einen Fehler findest, der noch nicht behoben ist.§!"
 ron_player_led_pc_tt:0 "Mit dieser Option können Sie die KI daran hindern, bei einer Friedenskonferenz Entscheidungen zu treffen, wenn auch ein Spieler daran teilnimmt."
 reduce_border_gore_tt:0 "Diese Option verhindert die Bildung unrealistischer oder optisch unschöner Grenzen bei Eroberungen und Kriegen und sorgt für eine einheitlichere und sinnvollere Gebietsverteilung."
 experiments_tt:0 "Wenn Sie dies aktivieren, erhalten Sie frühzeitigen Zugriff auf unsere neuen Funktionen. Beachten Sie jedoch, dass viele unfertige Dinge angezeigt werden, wie z. B. Fokusbaum-Skelette oder fehlende Texturen usw."
 unit_limits_tt:0 "Dadurch wurde die Anzahl der Divisionen im Verhältnis zur Landesgröße begrenzt."
 manpower_cheats_tt:0 "Dies ermöglicht Personalentscheidungen (Cheats), die Ihnen Personal für die Kosten der Kriegsunterstützung verschaffen."
 economy_option_tt:0 "Dies ermöglicht das benutzerdefinierte Wirtschaftssystem, das Rise of Nations enthält."
 islam_path_tt:0 "Diese Option aktiviert den Pfad Aufklärung (Islam) im allgemeinen Fokusbaum für nicht-muslimische, nicht-asiatische und nicht-afrikanische Länder."
 mp_sp_button_text:0 "[GetMultiplayerOn]"
 mp_sp_tt:0 "Wählen Sie, ob Sie zusätzliche Multiplayer-Funktionen wünschen (funktioniert auch im Einzelspielermodus)."
 snap_out_sudamerika_tt:0 "Wenn Sie nicht vorhaben, in Südamerika zu spielen, aktivieren Sie diese Option, um die Verzögerung zu reduzieren."
 no_ai_minors_tt:0 "Durch die Deaktivierung der KI für kleinere Länder (Länder mit weniger als 10 Fabriken und Kapital außerhalb Europas) verbraucht das Spiel weniger Ressourcen und verbessert seine Leistung (insbesondere die Verzögerung im späteren Spielverlauf)."
 realism_mode_tt:0 "Diese Option bietet realistischere, aber schwieriger zu erfüllende Anforderungen. Dies ist sehr nützlich für alternative Geschichtsdarstellungen, wenn die KI nicht völlig durchdrehen soll. \n\n§RNur für Ungarn im 2. Weltkrieg verfügbar!§!"

