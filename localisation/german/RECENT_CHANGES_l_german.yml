 INTRO_TEXT:0 "Ich möchte diese Gelegenheit nutzen, um MisterJay, Ted52 und dem Großteil der Hoi4-Modding-Community zu danken. Ohne eure großartige Arbeit und Großzügigkeit wäre dieser Mod nicht möglich gewesen. Ich möchte außerdem alle daran erinnern, dass wir mit Hochdruck daran arbeiten, das Spiel von 1900 bis 2060 zu erweitern, also Hoi4 zu dem zu machen, was wir uns alle wünschen. Das ist keine leichte Aufgabe, daher bitten wir euch um etwas Geduld. Wenn ihr dem Mod helfen möchtet, dann besucht bitte unseren Discord und die Hilfe-Kanäle.\n\n[ROOT.GetScenarioState]"
