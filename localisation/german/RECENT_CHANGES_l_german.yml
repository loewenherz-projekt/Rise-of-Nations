 LOG_6_5:0 "RISE OF NATIONS ÄNDERUNGSPROTOKOLL (v1.6.5 HOI4 1.16.8 ) ------------------ \n&quot;Jubiläums-Update&quot;\n\n §YGAMEPLAY:§! \n- §7Äthiopischer Fokusbaum WW2 hinzugefügt§! \n- §7Britischer Raj-Baum WW2 überarbeitet§! \n- §7Dutzende Berater hinzugefügt/konvertiert§! \n- §7Nicht-NSB-Landkreuzer hinzugefügt§! \n\n§YBUGFIXES:§! \n- §tPost-33 WW2 behoben: Deutschland, Japan§! \n- §tEndlose Ereignisschleife für US-Repräsentantenhaus behoben§! \n- §tReichstagsbrand-Ereignis wird jetzt ausgelöst§! \n- §tAlte RUE- und PRS-Tags vollständig ersetzt§! \n- §tDer Vertrag von Ouchy ist jetzt hinter der Option „Benutzerdefinierte Friedensabkommen“ gesperrt§! \n- §tCode für Ungarn im 2. Weltkrieg optimiert (leichte Verringerung der Verzögerung)§! \n- §tNicht vorhandene Schriftarten ersetzt§! \n- §tSpezialprojekte behoben§! \n- §tNKWD/KGB-Chefs sind jetzt als Berater für die UdSSR verfügbar§! \n\n§YQUALITY:§! \n- §tGenerischer Baum von 1933 entfernt§! \n- §tMod-Größe reduziert§! \n- §tGenerische Beraterentfernung besser umgesetzt§! \n- §tErhöhte Kosten für deutsche Propaganda§! \n\n§YGFX:§! \n- §tVerbesserte Fokussymbole: Albanien im 2. Weltkrieg§! \n- §tEinige Porträts verbessert§!\n\n\n Passen Sie auf sich auf und genießen Sie Ihr Spiel\n §LDas RON-Team§!&quot;"

 LOG_6_4:0 "RISE OF NATIONS ÄNDERUNGSPROTOKOLL (v1.6.4 HOI4 1.16.5 ) ------------------ \n&quot;Final Strike&quot;\n\n§YQUALITÄT:§! \n- Reduzierte Mod-Größe (.git-Ordner entfernt)\n\n\n Passen Sie auf sich auf und genießen Sie Ihr Spiel\n §LDas RON-Team§!"

 LOG_6_3:0 "RISE OF NATIONS ÄNDERUNGSPROTOKOLL (v1.6.3 HOI4 1.16.5 ) ------------------ \n&quot;Final Strike&quot;\n\n §YGAMEPLAY:§! \n- §7Verbesserter deutscher WW2-Baum§! \n\n§YQUALITY:§! \n- §tPost-33-WW2-Schwerpunkte behoben: Türkei§! \n- §tIn-Game-Einstellungen korrigiert, damit sie richtig funktionieren§! \n- §tAbonnement-Werbung entfernt (Problem exklusiv für MacOS)§! \n- §tReduzierte Mod-Größe§! \n- §tVerbesserte Lesezeichen§!\n- §tAlter UI-Stil wiederhergestellt§!\n\n\n Passen Sie auf sich auf und genießen Sie Ihr Spiel\n §LDas RON-Team§!"

 LOG_6_2:0 "RISE OF NATIONS ÄNDERUNGSPROTOKOLL (v1.6.2 HOI4 1.16.5 ) ------------------ \n&quot;Final Strike&quot;\n\n §YGAMEPLAY:§! \n- §7Neu gestalteter deutscher Fokusbaum WW2§! \n- §7Neu gestalteter nationalistischer China-Fokusbaum WW2§! \n- §7Neue Inhaltsergänzungen für die Derwischbewegung§! \n- §7Charaktere für den Senussi-Orden hinzugefügt§! \n- §7Charaktere für Aussa hinzugefügt§! \n\n§YQUALITÄT:§! \n- §tKMT-Nationalgeist-Armee-Korruption kann WW2 entfernt werden§! \n- §tSpielregeln angepasst§! \n- §tBeschreibungen für die Start-GUI hinzugefügt§! \n- §tNeu gestaltetes Hauptmenü§!\n- §tEinstellungen aus Entscheidungen wurden in die Start-GUI verschoben§!\n\n\n Passen Sie auf sich auf und genießen Sie Ihr Spiel\n §LDas RON-Team§!"

 LOG_6_1:0 "RISE OF NATIONS ÄNDERUNGSPROTOKOLL (v1.6.1 HOI4 1.15.1 ) ------------------ \n&quot;Final Strike&quot;\n\n §YGAMEPLAY:§! \n- §7Tschechoslowakische Charaktere überarbeitet (1900-1992)§! \n- §7Nazi-Ideologien haben jetzt ein eigenes Ideologie-Symbol§! \n\n§YQUALITY:§! \n- §tÖsterreich-Ungarn wird in historischen Fragen nicht immer demokratisch sein§! \n- §tDas Alaska-Territorium ist nicht mehr das Alaska-Territorium§! \n- §tÄthiopien besitzt nach 1946 sein eigenes Territorium§! \n- §tSymbole im Kartenmodus werden jetzt korrekt angezeigt§! \n- §tTechnologiesymbole werden an der richtigen Stelle angezeigt§!\n\n\n Passen Sie auf sich auf und genießen Sie Ihr Spiel\n §LDas RON-Team§!"

 LOG_6:0 "RISE OF NATIONS ÄNDERUNGSPROTOKOLL (v1.6 HOI4 1.15 ) ------------------ \n&quot;Final Strike&quot;\n\n §YGAMEPLAY:§! \n- §7Sonderprojekte zum Mod hinzugefügt, darunter Standardprojekte und neue§! \n- §7Innerer Kreis für Deutschland im 2. Weltkrieg hinzugefügt§! \n- §7BBA-Staaten für Äthiopien hinzugefügt§! \n- §7Modelle für Standard-Wahrzeichen zur Karte hinzugefügt§! \n- §7Propagandakampagnen für die meisten großen Mächte im 2. Weltkrieg hinzugefügt, die je nach gewählter Kampagne unterschiedliche Boni gewähren§! \n- §7Eine Start-GUI zum Auswählen der Gameplay-Option mit Optimierungs- und Gameplay-Einstellungen hinzugefügt§! \n- §7GUI und Kartenmodus hinzugefügt, um die Gründung von Nationen zu erleichtern§! \n- §7GUI und Kartenmodus für die Mechanik der Wirtschaftssphäre hinzugefügt§! \n- §7Benutzerdefinierte Erfolge zu RoN hinzugefügt§! \n- §7Ein Wirtschaftssystem hinzugefügt§! \n- §7Inhalte zu den modernen USA hinzugefügt (Fokusbaum, Ereignisse und Entscheidungen)§! \n- §7Ein Fokusbaum für das kommunistische China für die Zeit des Kalten Krieges hinzugefügt§! \n- §7Neue Mechaniken für die Zeit des Kalten Krieges§! \n\n§YQUALITÄT:§! \n- §tViele Fehler und Absturzprobleme behoben§! \n- §tProbleme mit Flugzeugen behoben, denen keine Reichweite zugewiesen wurde oder die nach der Entwicklung nicht mehr geändert werden konnten (für BBA-Benutzer)§! \n\n\n Passen Sie auf sich auf und genießen Sie Ihr Spiel\n §LDas RON-Team§!"

 LOG_5:0 "RISE OF NATIONS ÄNDERUNGSPROTOKOLL (v1.5 HOI4 1.14.14 ) ----------------- \n\n §YGAMEPLAY:§! \n- §7Aktualisierte Fokusbäume für Südamerika, aktualisierte Bäume für Italien, Österreich, Deutschland, Mandschukuo, aktualisierte Symbole für die modernen USA§! \n\n§YQUALITÄT:§! \n- §tVerschiedene Fehler behoben, wie Beschreibungen und schwarzer Bildschirm§! \n\n\n Passen Sie auf sich auf und genießen Sie Ihr Spiel\n §LDas RON-Team§!"

 LOG_4:0 "RISE OF NATIONS ÄNDERUNGSPROTOKOLL (v1.4 HOI4 1.13.5 ) ----------------- \n\n §YGAMEPLAY:§! \n- §7Weitere Berater für Spanien hinzugefügt, \n\n§YExperimentelle Funktionen:§! \n - Überarbeitung des spanischen Bürgerkriegs, einschließlich Entscheidungen und Fokusbaum\n -KI sollte in der Lage sein, mit dem Fallschirm abzuspringen§! \n\n\n Passen Sie auf sich auf und genießen Sie Ihr Spiel\n §LDas RON-Team§!"

 LOG_3:0 "RISE OF NATIONS ÄNDERUNGSPROTOKOLL (v1.3 HOI4 1.13 ) ----------------- \n&quot;Gruselig&quot;\n\n §YHOTFIX:§! \n-Freiwillige behoben, Sie können jetzt Freiwillige schicken, was vorher nicht funktionierte \n\n §YGAMEPLAY:§! \n- §7Aktualisiert auf die neueste HOI4-Version, diese Version des Mods enthält MIOs und Waffenhandel, bitte beachten Sie, dass nicht alle Hersteller hinzugefügt wurden, wir fügen sie nach und nach hinzu. \n- BBA-Flugzeugüberarbeitung: Wir haben Kompatibilität für BBA hinzugefügt, Sie können jetzt Flugzeuge entwerfen, wenn das DLC aktiviert ist, Nicht-DLC-Benutzer haben weiterhin denselben Technologiebaum. \n- Charaktere (Berater, Generäle und Anführer) für Qing-China, nationalistisches China und kommunistisches China hinzugefügt. \n- Die politische Ansicht zeigt nicht mehr die Ideologie des Landes, sondern dessen Unterideologie.§!\n\n§YQUALITÄT:§! \n- §RZufällige Abstürze beim Fokusabschluss, beim Laden des Spiels und bei der Flugzeugerstellung behoben§!\n- §RViele im Mod vorhandene Fehler behoben§! \n\n§YExperimentelle Funktionen:§! \n - Überarbeitung des spanischen Bürgerkriegs, einschließlich Entscheidungen und Fokusbaum \n\n\n Passen Sie auf sich auf und genießen Sie Ihr Spiel\n §LDas RON-Team§!"

 LOG_2:0 "RISE OF NATIONS ÄNDERUNGSPROTOKOLL (v1.2 HOI4 1.12.14 ) ----------------- \n\n §YGAMEPLAY:§! \n- §7Verbesserte japanische und chinesische WW2-Fokusbäume, skandinavische Berater hinzugefügt§! \n\n§YQUALITÄT:§! \n- §7Geskripteter Kartenmodus hinzugefügt, mit dem Sie leicht erkennen können, welche Staaten zur Bildung einer Nation erforderlich sind§! \n- §7Staatenauslöser für bildungsfähige Nationen behoben. Sie benötigten einige Staaten, die keinen Sinn ergaben, um einige Länder zu gründen, wahrscheinlich aufgrund von Tippfehlern oder Kartenänderungen. Dies ist jetzt größtenteils behoben§!\n\n§YExperimentelle Funktionen:§! \n - Überarbeitung des spanischen Bürgerkriegs, einschließlich Entscheidungen und Fokusbaum \n\n\n Passen Sie auf sich auf und genießen Sie Ihr Spiel\n §LDas RON-Team§!"

 LOG_1:0 "RISE OF NATIONS ÄNDERUNGSPROTOKOLL (v1.1 HOI4 1.12.14 ) ----------------- \n\n §YGAMEPLAY:§! \n- §7Strategische Atomraketenangriffe hinzugefügt: §!\n Klicken Sie zum Zugriff in der Statusansicht auf £rocket_button \n\n§YQUALITY:§! \n- §7Schnittstelle beim Spielstart hinzugefügt, um eine einfache Auswahl von Optionen und Spielmodi zu ermöglichen§! \n- §7Verbesserter Einfluss auf das chinesische Kaiserreich, Länder können jetzt ihre Konzessionen in China geltend machen.§!\n- §7Entscheidung hinzugefügt, Südamerika zu einem Land zu annektieren, um die Leistung für einige Benutzer zu verbessern.§! \n- §7Die Art und Weise, wie Ereignisse geladen werden, wurde geändert, was zu Leistungsverbesserungen führen sollte§! \n- §tÜber 4.000 Fehler behoben§! \n- §tFehlende NSB/BBA-Definitionen hinzugefügt, die einen Absturz verursachten§!\n- §tDeutschland hatte alle seine Kerne, als es während des Kalten Krieges durch ein Ereignis freigegeben wurde§! \n- §RCTD behoben, der durch RAJ-Oob verursacht wurde, das durch einen Fokus geladen wurde§! \n- §RMehrere Oobs behoben, die beim Laden eines Spiels CTDs verursachten§!\n\n§YExperimentelle Funktionen:§! \n - Überarbeitung des spanischen Bürgerkriegs, einschließlich Entscheidungen und Fokusbaum \n\n\n Passen Sie auf sich auf und genießen Sie Ihr Spiel\n §LDas RON-Team§!"

