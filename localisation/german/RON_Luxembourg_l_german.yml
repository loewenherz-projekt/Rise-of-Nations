#descripts
POLITICS_DAMIAN_KRATZENBERG_DESC:0 "Kratzenburg, der während der deutschen Besatzung Anführer der Volksdeutschen Bewegung war, glaubte an ein starkes nationalistisches Land und war vor dem Krieg Vorsitzender mehrerer rechtsextremer Parteien."
POLITICS_CHARLES_MARX_DESC:0 "Charles Marx wurde am Ende des Krieges Vorsitzender der Kommunistischen Partei Luxemburgs. Während es vor dem Krieg Bemühungen gab, kommunistische Bewegungen zu unterdrücken, ist die KPL noch heute aktiv und eine der ältesten politischen Parteien Luxemburgs."
POLITICS_DUCHESS_DESC:0 "Großherzogin Charlotte übernahm 1919 während der Revolutionswirren die Monarchie und erfreute sich großer Beliebtheit bei ihrem Volk, das sie mit überwältigender Mehrheit als Staatsoberhaupt bestätigte. Während des Krieges blieb sie, obwohl sie im Exil lebte, eine Figur der nationalen Einheit und des Widerstands gegen das besetzte Luxemburg."
POLITICS_JOSEPH_BECH_DESC:0 "Joseph Bech, der sowohl vor als auch nach dem Krieg Premierminister Luxemburgs war, wurde zu einem der Gründerväter der Europäischen Gemeinschaft und war sowohl bei der Konferenz von Messina als auch bei den Römischen Verträgen anwesend."

#opinions
diplomatic_ties:0 "Diplomatische Beziehungen"

#factions
#LUX_benelux_faction:0 "Benelux Economic Union"

luxembourg.1.t:0 "Eine Einladung in die Benelux-Länder"
luxembourg.1.d:0 "Obwohl Luxemburg klein ist, ist es in den letzten Jahren politisch sehr aktiv geworden, was auf die zunehmend kriegerische Haltung seiner Nachbarn zurückzuführen ist. Premierminister Joseph Bech plädierte dafür, dass die Länder des Flachlandes zusammenhalten sollten, bevor über unser Schicksal entschieden wird."
luxembourg.1.a:0 "Ein Toast auf die Benelux-Union!"
luxembourg.1.b:0 "Eine Allianz? Lächerlich!"
luxembourg.2.t:0 "[From.GetName] tritt den Benelux-Ländern bei"
luxembourg.2.d:0 "[From.GetLeader] hat zugestimmt, der Gewerkschaft beizutreten, unsere Allianz wird stärker!"
luxembourg.2.a:0 "Lasst uns feiern!"
luxembourg.3.t:0 "[From.GetName] lehnt unser Angebot ab."
luxembourg.3.d:0 "Unsere Diplomaten sind mit traurigen Neuigkeiten aus [From.GetName] zurückgekehrt: Trotz unserer besten Bemühungen wird es zu keinem Bündnis kommen."
luxembourg.3.a:0 "Dann können sie alleine sterben."
luxembourg.10.t:0 "Luxemburg möchte sich uns anschließen"
luxembourg.10.d:0 "Damian Kratzenberg hat Diplomaten nach Berlin geschickt, um über die mögliche Mitgliedschaft Luxemburgs in der Achse zu diskutieren. Obwohl es sich um eine winzige Nation handelt, sind sie sehr daran interessiert."
luxembourg.10.a:0 "Ein weiterer Verbündeter im Kampf für den deutschen Nationalismus!"
luxembourg.10.b:0 "Ihr Schutz wird sie etwas kosten."
luxembourg.10.c:0 "Luxem – was nun?"
luxembourg.11.t:0 "Deutschland akzeptiert!"
luxembourg.11.d:0 "Gesandte aus Berlin sind in der Stadt Luxemburg eingetroffen, um das Bündnis Luxemburgs mit den Achsenmächten zu besprechen. Es ist ein großer Festtag!"
luxembourg.11.a:0 "Ehre sei dem Führer!"
luxembourg.12.t:0 "Deutschland akzeptiert..."
luxembourg.12.d:0 "Gesandte aus Berlin sind in der Stadt Luxemburg eingetroffen, um die teilweise Integration Luxemburgs in das Deutsche Reich zu besprechen. Es scheint, als hätte sich die Vereinbarung geändert."
luxembourg.12.a:0 "Ein kleiner Preis für den Schutz."
luxembourg.13.t:0 "Deutschland lehnt ab."
luxembourg.13.d:0 "Unsere Briefe bleiben unbeantwortet, unsere Diplomaten werden abgewiesen. Es scheint, als hätten die Nazis Wichtigeres zu tun als das Schicksal unserer Nation."
luxembourg.13.a:0 "Verdammt seien sie alle."
luxembourg.14.t:0 "Die Wahl von 1937."
luxembourg.14.d:0 "Trotz der aufziehenden Gewitterwolken am Horizont entwickelt sich die Politik Luxemburgs stetig weiter. Bei den Wahlen von 1937 erzielten die Ritespartei und die Sozialdemokraten hohe Wahlbeteiligungen. Das von der konservativen Partei vorgeschlagene Maulkürgesetz, das die wachsende Popularität und Stimme der KPL unterdrücken sollte, stieß jedoch bei der Bevölkerung auf wenig Gegenliebe. Nach einem unglaublich knappen Referendum, bei dem das Gesetz abgelehnt wurde, blieb Premierminister Joseph Bech keine andere Wahl, als seinen Rücktritt anzubieten. Ritespartei-Mitgründer Pierre Dupong wird nun das Land führen."
luxembourg.14.a:0 "So ist Politik nun einmal."


schuster:0 "Joseph Schuster"
schuster_desc:0 "Joseph Schuster war im Vorfeld des Krieges Luxemburgs Chefingenieur für Brücken und Autobahnen."
bodson:0 "Victor Bodson"
bodson_desc:0 "Victor Bodson war Justizminister in Luxemburg und berühmt für seine Rolle bei der Fluchthilfe für Juden aus Nazideutschland."
lux_victor_idea:0 "Lux Victor!"
lux_victor_idea_desc:0 "Wir wurden gewogen, gemessen und für nichts zu leicht befunden. Es lebe die Herzogin und Luxemburg!"
auxiliaries_idea:0 "Hilfsmittel"
auxiliaries_idea_desc:0 "Da der Krieg vor der Tür steht, muss jeder willige Bürger kampfbereit sein. Indem wir unsere derzeitigen Streitkräfte mit Hilfstruppen verstärken, haben wir im kommenden Konflikt vielleicht eine Chance."
gendarmerie_idea:0 "Großherzogliche Gendarmerie"
gendarmerie_idea_desc:0 "Eine Polizeibrigade sorgt für die Sicherheit unserer Zivilisten auf den Straßen und wird bei Bedarf zur Verteidigung der Nation herangezogen."
volunteer_army_idea:0 "Freiwillige"
volunteer_army_idea_desc:0 "Jeder Bürger muss seinen Teil dazu beitragen."
quality_over_quantity_idea:0 "Qualität vor Quantität"
quality_over_quantity_idea_desc:0 "Auch wenn uns der Platz fehlt, kann das luxemburgische Kunsthandwerk mit etwas Mühe legendär werden, jede Kugel ein Farbstrich und jedes Gewehr ein Meisterwerk."
foreign_experts_idea:0 "Ausländische Experten"
foreign_experts_idea_desc:0 "Indem wir die besten und klügsten Köpfe in unsere Hallen einladen, können wir große technologische Fortschritte erzielen, die die unserer größeren Nachbarn bei weitem übertreffen."
LUX_communism_idea:0 "Kommunistischer Einfluss"
LUX_communism_idea_desc:0 "Die Banker und Geschäftsleute der Elite haben die Bevölkerung Luxemburgs zu lange unterdrückt. Jetzt werden wir unser Land zurückerobern!"
LUX_fascism_idea:0 "Faschistischer Einfluss"
LUX_fascism_idea_desc:0 "Unsere Nation hat sich demokratischen Verträgen und Demontagen widersetzt, die unser großartiges Land zur Lachnummer gemacht haben. Nur durch nationalistischen Eifer können wir die Ehre unserer Nation wiederherstellen."
LUX_democratic_idea:0 "Demokratischer Einfluss"
LUX_democratic_idea_desc:0 "Die Zukunft Luxemburgs liegt in der Demokratie. Joseph Bech und die Reichspartei haben unsere Nation bisher geführt und genießen die volle Unterstützung des Landes."
LUX_neutrality_idea:0 "Royalistischer Einfluss"
LUX_neutrality_idea_desc:0 "Luxemburg verfolgt seit langem eine neutrale Linie, mit unterschiedlichem Erfolg. Dieses Mal ist es keine freiwillige Entscheidung, sondern die Notwendigkeit, sich von kommenden Konflikten fernzuhalten."
communist_neighbours:0 "Kommunistische Nachbarn"
communist_neighbours_desc:0 "Die Anwesenheit eines kommunistischen Staates in der Nähe hat dieses Land auch anfälliger für den Kommunismus gemacht."
LUX_deterrence:0 "Abschreckung"
LUX_deterrence_desc:0 "Ein Krieg mit einer so grausamen Nation wäre ... unklug."
LUX_armed_deterrence:0 "Bewaffnete Abschreckung"
LUX_armed_deterrence_desc:0 "Testen Sie Ihre Armeen an den Mauern Luxemburgs, denn es wird keine Kapitulation geben."


