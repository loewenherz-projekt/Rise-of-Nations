 #industry
 ARBED:0 "ARBED"

LUX_prepareforwar:0 "Bereite dich auf den Krieg vor"
LUX_prepareforwar_desc:0 "Der Krieg, der alle Kriege beenden sollte, beendete nichts. Während die Großmächte links und rechts von uns erneut mobilisieren, muss Luxemburg bereit sein, sein Volk zu verteidigen."
LUX_boostindustry:0 "Industrie ankurbeln"
LUX_boostindustry_desc:0 "Eine Nation ohne florierende Industrie bricht zwangsläufig unter ihrer eigenen Last zusammen. Angesichts eines drohenden Krieges ist es von größter Bedeutung, dass Luxemburg über die nötigen Mittel verfügt, um seine Verteidigungsbemühungen aufrechtzuerhalten."
LUX_radioluxembourg:0 "Radio Luxemburg"
LUX_radioluxembourg_desc:0 "Radio Luxembourg mit Sitz in unserer großartigen Stadt ermöglicht es den Rundfunkveranstaltern, ein Publikum in ganz Europa zu erreichen und das Monopol der British Broadcasting Company zu brechen, indem es den kommerziellen Rundfunk zurück nach Großbritannien und Irland bringt."
LUX_feierwon:0 "Feierwon"
LUX_feierwon_desc:0 "„Kommt her aus Frankreich, Belgien, Preußen,\nwir wollen euch unser Vaterland zeigen,\nin alle Himmelsrichtungen schauen,\nwir wollen bleiben, was wir sind.“"
LUX_realism:0 "Realismus"
LUX_realism_desc:0 "Luxemburg ist zwar entschlossen, kann es sich aber nicht leisten, im Krieg eine aggressive Haltung einzunehmen. Wir werden mit großer Rücksicht auf unser Volk und unsere Neutralität vorgehen."
LUX_idealism:0 "Idealismus"
LUX_idealism_desc:0 "Passivität ist in diesen Zeiten tödlich. Wenn wir nicht zuerst handeln, werden wir von einer der Mächte überrannt, die uns überfallen. Unter der Führung von Émile Speller wird Luxemburg nicht unterschätzt werden."
LUX_lucilinburhuc:0 " Lucilinburhuc"
LUX_lucilinburhuc_desc:0 "Die Festung Luxemburg war lange Zeit der Eckpfeiler unserer Nation. Obwohl Verträge uns dazu zwangen, den Großteil unserer Befestigungen abzubauen, ist die Sicherheit unserer großen Festung heute wichtiger denn je."
LUX_luxvictor:0 "Lux Victor"
LUX_luxvictor_desc:0 "Wir wurden gewogen, gemessen und für nichts zu leicht befunden. Es lebe die Herzogin und Luxemburg!"
LUX_schusterline:0 "Schuster-Linie"
LUX_schusterline_desc:0 "Feindseligkeiten aus dem Osten müssen zurückgeschlagen werden. Joseph Schuster hat eine Verteidigungslinie an unserer Ostgrenze errichtet, um feindliche Soldaten von unserem Territorium fernzuhalten und unsere Souveränität zu wahren."
LUX_grandducalgendarmerie:0 "Großherzogliche Gendarmerie"
LUX_grandducalgendarmerie_desc:0 "Eine Polizeibrigade sorgt für die Sicherheit unserer Zivilisten auf den Straßen und wird bei Bedarf zur Verteidigung der Nation herangezogen."
LUX_restoretheauxiliaries:0 "Stellen Sie die Hilfskräfte wieder her"
LUX_restoretheauxiliaries_desc:0 "Da der Krieg vor der Tür steht, muss jeder willige Bürger kampfbereit sein. Indem wir unsere derzeitigen Streitkräfte mit Hilfstruppen verstärken, haben wir im kommenden Konflikt vielleicht eine Chance."
LUX_volunteerarmy:0 "Freiwilligenarmee"
LUX_volunteerarmy_desc:0 "Luxemburg ist heute mehr denn je auf die mutigen Bürger angewiesen, die sich der Pflicht stellen, unser Land gegen Bedrohungen aus dem Ausland zu verteidigen."
LUX_expandthesteelworks:0 "Erweiterung des Stahlwerks"
LUX_expandthesteelworks_desc:0 "Unser Land ist seit langem für seinen Qualitätsstahl bekannt. Auch wenn unsere Ressourcen begrenzt sein mögen, wird eine erweiterte Nutzung der Stahlwerke dafür sorgen, dass Luxemburg auf dem Weltmarkt wettbewerbsfähig bleibt."
LUX_modernizetherails:0 "Modernisieren Sie die Schienen"
LUX_modernizetherails_desc:0 "Die Identität unseres Landes ist eng mit der Eisenbahn verbunden, den transnationalen Schienennetzen, die uns mit beiden Großmächten verbinden. Es liegt in unserem besten Interesse, unsere Schienennetze in den kommenden Jahren zu modernisieren."
LUX_sandweilerairport:0 "Flughafen Sandweiler"
LUX_sandweilerairport_desc:0 "Da es sich um die einzige Landebahn in Luxemburg handelt, ist es von größter Bedeutung, dass der Flughafen Sandweiler erweitert wird, um unserem Land eine größere Lufthoheit zu sichern."
LUX_war:0 "Krieg."
LUX_war_desc:0 "Gott schütze uns alle."
LUX_arcelormittal:0 "ARBED"
LUX_arcelormittal_desc:0 "Durch die Verstaatlichung der Stahlwerke von ARBED wird unser kleines Land zum Neidobjekt der Industrie auf der ganzen Welt."
LUX_beneluxair:0 "Benelux Air"
LUX_beneluxair_desc:0 "Durch die grenzüberschreitenden Flüge zwischen unseren Nachbarn in den Benelux-Ländern wird Luxemburg unter den europäischen Luftnationen an die erste Stelle rücken."
LUX_princehenrinetwork:0 "Prince-Henri-Netzwerk"
LUX_princehenrinetwork_desc:0 "In den letzten hundert Jahren hat das Prince-Henri-Netz unseren Bürgern gute Dienste geleistet. In den letzten Jahren waren jedoch sowohl Gewinneinbußen als auch ein zunehmender Wettbewerb zu verzeichnen. Durch die Verstaatlichung der Bahn können wir die hohe Effizienz aufrechterhalten, die unsere Eisenbahn im modernen Jahrhundert benötigt."
LUX_maximiseefficiency:0 "Maximieren Sie die Effizienz"
LUX_maximiseefficiency_desc:0 "Effizienz ist der Schlüssel zur Deckung des steigenden Bedarfs unseres Landes. Von Kugeln bis zu Verbänden werden unsere Fabriken einwandfrei sein."
LUX_qualityoverquantity:0 "„Qualität vor Quantität“"
LUX_qualityoverquantity_desc:0 "Auch wenn uns der Platz fehlt, kann das luxemburgische Kunsthandwerk mit etwas Mühe legendär werden, jede Kugel ein Farbstrich und jedes Gewehr ein Meisterwerk."
LUX_militaryfocus:0 "Militärischer Fokus"
LUX_militaryfocus_desc:0 "Wenn wir unsere Rüstungsindustrie nicht aufbauen, wird von unserer Nation nichts übrig bleiben. Alle Anstrengungen müssen auf die luxemburgische Kriegsmaschinerie gerichtet werden."
LUX_civilianfocus:0 "Ziviler Fokus"
LUX_civilianfocus_desc:0 "Unser Volk ist wichtiger als Kriegsintrigen. Mit einer starken zivilen Industrie können wir der Bevölkerung Leben, wenn nicht Freiheit, bieten."
LUX_foreignexperts:0 "Ausländische Experten"
LUX_foreignexperts_desc:0 "Indem wir die besten und klügsten Köpfe in unsere Hallen einladen, können wir große technologische Fortschritte erzielen, die die unserer größeren Nachbarn bei weitem übertreffen."
LUX_universititvultzebuerg:0 "Universitéit vu Lëtzebuerg"
LUX_universititvultzebuerg_desc:0 "Als Möglichkeit, die größten Köpfe des Landes zusammenzubringen, wurde eine theoretische Universität vorgeschlagen. Wir können dies Wirklichkeit werden lassen."
LUX_luxembourgcanintospace:0 "Luxemburg kann ins All"
LUX_luxembourgcanintospace_desc:0 "Wenn wir so weit gegangen sind, gibt es kein Zurück mehr."
LUX_rietspartei:0 "Rietspartei"
LUX_rietspartei_desc:0 "Die Zukunft Luxemburgs liegt in der Demokratie. Joseph Bech und die Reichspartei haben unsere Nation bisher geführt und genießen die volle Unterstützung des Landes."
LUX_strengthenties:0 "Bindungen stärken"
LUX_strengthenties_desc:0 "Demokratie kann nicht allein gedeihen. Wenn wir als Nation frei sein und bleiben wollen, müssen wir unsere Verbündeten gut auswählen."
LUX_benelux:0 "Benelux"
LUX_benelux_desc:0 "Freunde in Not..."
LUX_protectorsofliberte:0 "Beschützer der Freiheit"
LUX_protectorsofliberte_desc:0 "Die Verbündeten sind unsere Freunde und Beschützer. Ein Bündnis mit den verbündeten Nationen ist die einzige Möglichkeit, unsere Souveränität zu schützen."
LUX_friendsnear:0 "Freunde in der Nähe"
LUX_friendsnear_desc:0 "Die Tieflandnationen sind unsere unmittelbaren Verbündeten und teilen sowohl unsere Kultur als auch unsere Anliegen. Es wäre von Vorteil, eine engere Beziehung zu ihnen aufzubauen."
LUX_friendsafar:0 "Freunde in der Ferne"
LUX_friendsafar_desc:0 "Obwohl wir im letzten Krieg neutral blieben, wurde unsere Souveränität durch die deutsche Besatzung verletzt. Erst durch die Befreiung durch die Alliierten erlangten wir unsere Freiheit. Dieses Mal werden wir die richtige Entscheidung treffen."
LUX_bastion_of_democracy:0 "Bastion der Demokratie"
LUX_bastion_of_democracy_desc:0 "Hitlers Terrorherrschaft bedroht uns alle! Ganz Luxemburg ist in diesem Ziel vereint: die Bedrohung durch den Faschismus in Europa zu beenden."
LUX_luxembourgneutrality:0 "Luxemburgische Neutralität"
LUX_luxembourgneutrality_desc:0 "Luxemburg verfolgt seit langem eine neutrale Linie, mit unterschiedlichem Erfolg. Dieses Mal ist es keine freiwillige Entscheidung, sondern die Notwendigkeit, sich von kommenden Konflikten fernzuhalten."
LUX_luxembourgianrevanchism:0 "Luxemburgischer Revanchismus"
LUX_luxembourgianrevanchism_desc:0 "Auch wenn es heute lächerlich erscheint, war Luxemburg in der europäischen Geschichte einst eine bedeutende Nation. Könnte es das in diesen seltsamen Zeiten nicht wieder sein?"
LUX_theduchess:0 "Die Herzogin"
LUX_theduchess_desc:0 "Die Entscheidung, unserem Monarchen die Macht zu entziehen, war ein Fehler. In diesen schwierigen Zeiten ist unsere Herzogin, Fir Gott an Duchesse, die einzige wahre Herrscherin Luxemburgs!"
LUX_easternwinds:0 "Östliche Winde"
LUX_easternwinds_desc:0 "Die Banker und Geschäftsleute der Elite haben die Bevölkerung Luxemburgs zu lange unterdrückt. Jetzt werden wir unser Land zurückerobern!"
LUX_supporttheright:0 "Unterstützen Sie die Rechte"
LUX_supporttheright_desc:0 "Unsere Nation hat sich demokratischen Verträgen und Demontagen widersetzt, die unser großartiges Land zur Lachnummer gemacht haben. Nur durch nationalistischen Eifer können wir die Ehre unserer Nation wiederherstellen."
LUX_deterrence:0 "Abschreckung"
LUX_deterrence_desc:0 "Wir haben für unsere Bemühungen in vergangenen Kriegen schwer gelitten, Luxemburg hat seine Lektion gelernt. Von nun an kämpfen wir nur noch für unsere eigenen Leute."
LUX_armeddeterrence:0 "Bewaffnete Abschreckung"
LUX_armeddeterrence_desc:0 "Deutschland hat nicht die Absicht, unseren neutralen Status zu respektieren, und Frankreich ist schon lange begierig darauf, dass uns unser Land weggenommen wird. Wenn niemand unsere Neutralität respektiert, werden wir sie dazu zwingen."
LUX_kommunisteschparteiltzebuerg:0 "Kommunistische Partei Lëtzebuerg"
LUX_kommunisteschparteiltzebuerg_desc:0 "Moskau ist zu weit weg, um uns etwas bieten zu können. Luxemburg und nur Luxemburg wird die Revolution nach Europa bringen."
LUX_frenchinsurrectionists:0 "Französische Aufständische"
LUX_frenchinsurrectionists_desc:0 "Der Geist der Revolution ist in unseren französischen Brüdern stark ausgeprägt, die gegenseitige Unterstützung zwischen der KPL und der französischen Kommune ist unserer Sache sicherlich von Nutzen."
LUX_spreadtherevolution:0 "Verbreite die Revolution"
LUX_spreadtherevolution_desc:0 "Hört ihr das, belgischer Bruder und niederländische Schwester? Das ist der Klang der Revolution!"
LUX_friendsveryafar:0 "Freunde SEHR weit weg"
LUX_friendsveryafar_desc:0 "Moskau ist die Heimat des Kommunismus, ein mächtiger Verbündeter und ein würdiger Kamerad. Obwohl unsere Länder weit voneinander entfernt sind, ist unser Geist nah!"
LUX_rexluxembourg:0 "Regina Luxemburg"
LUX_rexluxembourg_desc:0 "Unsere Herzogin wird sich keinem Diktator beugen! Luxemburgs glorreiche Herrschaft hat endlich begonnen."
LUX_volksdeutschebewegung:0 "Volksdeutsche Bewegung"
LUX_volksdeutschebewegung_desc:0 "Es wurden Gespräche geführt und Pläne geschmiedet. Für die Sicherheit unserer Nation müssen wir uns mit Hitler verbünden, ob er uns ebenbürtig ist oder nicht."
LUX_retakebitburg:0 "Erobern Sie Bitburg zurück"
LUX_retakebitburg_desc:0 "Die deutsche Kriegsmaschinerie macht unserer tapferen Nation keine Angst. Wir werden unser Land zurückerobern, das uns die Preußen geraubt haben, oder bei dem Versuch sterben!"
LUX_retakemoselle:0 "Rückeroberung der Mosel"
LUX_retakemoselle_desc:0 "Die Franzosen haben uns gestohlene Ländereien zu lange in ihren Händen gehalten. Fast 400 Jahre später wird Luxemburg dieses Unrecht wiedergutmachen."
LUX_retakeareleland:0 "Erobert Areleland zurück"
LUX_retakeareleland_desc:0 "Unser grausamster Verlust durch die belgischen Revolutionäre ist nicht vergessen, und auch wenn die Benelux-Staaten uns verbinden, kann dieses Unrecht nicht vergessen werden."
LUX_military:0 "Militärische Anstrengungen"
LUX_military_desc:0 "Da unsere Industrie und Infrastruktur dieser Aufgabe nun gewachsen sind, können wir uns darauf konzentrieren, Luxemburg für die Kunst der modernen Kriegsführung vorzubereiten."
LUX_tank:0 "Theoretische Tankdesigns"
LUX_tank_desc:0 "Ein Vorteil solcher militaristischen Nachbarn besteht darin, dass man die neuesten technologischen Schrecken aus nächster Nähe beobachten kann."
LUX_navy:0 "Bemühungen der Marine"
LUX_navy_desc:0 "Luxemburg war noch nie zuvor zur See unterwegs, geschweige denn eine Seemacht. Heute ändern wir diesen Umstand."
LUX_destroyer:0 "Zerstörer"
LUX_destroyer_desc:0 "So unterhaltsam es auch wäre, Marinegiganten zu erschaffen, die die Meere terrorisieren, fangen wir klein an."
