# EVENTS 
DNC_Sweden_Norway.1:0 "Norwegen verlässt die Union"
DNC_Sweden_Norway.1.d:0 "Heute gab die norwegische Regierung bekannt, dass sie die Union nicht länger aufrechterhalten kann. Offenbar plant sie schon länger die Unabhängigkeit, und unser Volksentscheid zur Wiedervereinigung wurde sowohl von Norwegen als auch von seinen Bürgern abgelehnt, woraufhin beide Regierungen die Unionsakte aufhoben. König Oscar verzichtete für sich und seine Nachfolger auf alle Ansprüche auf die norwegische Krone und markierte damit das formelle Ende der schwedisch-norwegischen Union. Schweden könnte Norwegen möglicherweise mit Gewalt einnehmen, doch ist dies unwahrscheinlich, da Norwegens Macht gewachsen ist und die Großmächte einer norwegischen Unabhängigkeit positiv gegenüberstehen."
DNC_Sweden_Norway.1.a:0 "Wir müssen dies akzeptieren und weitermachen."

DNC_Sweden_Norway.2:0 "Die wirtschaftliche Richtung"
DNC_Sweden_Norway.2.d:0 "Nach dem Zerfall der Union muss Schweden seinen eigenen wirtschaftlichen Weg bestimmen. Im Reichstag toben Debatten über die künftige Ausrichtung unserer Wirtschaft. Sollen wir uns auf die Industrialisierung konzentrieren oder unsere traditionelle Landwirtschaft bewahren? Die Entscheidungen, die wir jetzt treffen, werden die Zukunft unseres Landes für die kommenden Jahrzehnte prägen."
DNC_Sweden_Norway.2.a:0 "Fokus auf Industrialisierung."
DNC_Sweden_Norway.2.b:0 "Erhalten Sie unsere landwirtschaftliche Basis."

DNC_Sweden_Norway.3:0 "Gewerkschaft in der Krise"
DNC_Sweden_Norway.3.d:0 "Die Lage innerhalb der Union hat einen kritischen Punkt erreicht. Norwegische Diplomaten haben den Verhandlungstisch verlassen und weigern sich, an der Wahl eines neuen Premierministers teilzunehmen. Trotzdem bleibt die Union intakt, steht aber unter großem Druck. Die mangelnde Kooperationsbereitschaft der norwegischen Seite hat zu einer politischen Blockade geführt, und die Zukunft der Union steht auf dem Spiel. Wir müssen entscheiden, wie wir in dieser heiklen Situation weiter vorgehen."
DNC_Sweden_Norway.3.a:0 "Bereiten Sie sich auf mögliche Unruhen vor."
DNC_Sweden_Norway.3.b:0 "Nur der König kann das richten!"

DNC_Sweden_Norway.4:0 "Proteste in Norwegen"
DNC_Sweden_Norway.4.d:0 "Trotz der Vereinbarung zum Erhalt der Union sind in ganz Norwegen breite Proteste ausgebrochen. Viele Norweger fühlen sich in ihrem Wunsch nach Unabhängigkeit ignoriert und fordern mehr Autonomie oder sogar eine völlige Abspaltung. Die Straßen Oslos sind voller Demonstranten, und die Lage wird zunehmend angespannter."
DNC_Sweden_Norway.4.a:0 "Bieten Sie den Demonstranten Zugeständnisse an."
DNC_Sweden_Norway.4.b:0 "Unterdrücken Sie die Proteste."

DNC_Sweden_Norway.5:0 "Boströms Aufstieg"
DNC_Sweden_Norway.5.d:0 "Nach der Krise der Union hat sich Erik Gustaf Boström als starker schwedischer Politiker etabliert. Als neuer Ministerpräsident verspricht Boström Stabilität und Wohlstand für die Union. Er steht vor der immensen Herausforderung, die Sorgen der Schweden und Norweger gleichermaßen zu berücksichtigen und gleichzeitig das Königreich durch eine Zeit erheblicher Umbrüche zu führen."
DNC_Sweden_Norway.5.a:0 "Unterstützen Sie Boströms Führung."
DNC_Sweden_Norway.5.b:0 "Suchen Sie nach einem alternativen Anführer."

DNC_Sweden_Norway.6:0 "Boströms Reformen"
DNC_Sweden_Norway.6.d:0 "Premierminister Boström hat eine Reihe von Reformen angekündigt, die die norwegische Bevölkerung beruhigen und die Union stärken sollen. Dazu gehören eine stärkere politische Vertretung der Norweger, Investitionen in die norwegische Infrastruktur und Maßnahmen zur Förderung der kulturellen Integration. Während einige diese Reformen als Schritte hin zu einer harmonischeren Union betrachten, befürchten andere, dass sie nicht ausreichen, um die zugrunde liegenden Probleme zu lösen."
DNC_Sweden_Norway.6.a:0 "Setzen Sie die Reformen um."
DNC_Sweden_Norway.6.b:0 "Lehnen Sie die Reformen ab und behalten Sie den Status quo bei."
DNC_Sweden_Norway.6.c:0 "Schlagen Sie alternative Reformen vor."
DNC_Sweden_Norway.7:0 "Wählen Sie den Futur Statens-Plan oder den Boström-Plan"
DNC_Sweden_Norway.7.d:0 "Da die Stabilität der Union auf dem Spiel steht, steht die Regierung vor einer wichtigen Entscheidung. Zwei unterschiedliche Pläne wurden vorgeschlagen, um die anhaltenden Probleme anzugehen und die Zukunft des Königreichs zu gestalten. Der Statens-Plan, eine staatliche Initiative mit Fokus auf Zentralisierung und staatlicher Kontrolle, zielt auf eine Vereinheitlichung der Verwaltung und eine Stärkung der Zentralgewalt. Boströms Plan hingegen betont Dezentralisierung, lokale Verwaltung und größere Autonomie Norwegens innerhalb der Union. Die jetzt getroffene Entscheidung wird die Richtung des Königreichs und das Schicksal der Union bestimmen."
DNC_Sweden_Norway.8:0 "Bildung der Boström-Regierung"
DNC_Sweden_Norway.8.d:0 "Nach einer Zeit intensiver politischer Verhandlungen und öffentlicher Unruhen hat Erik Gustaf Boström erfolgreich eine neue Regierung gebildet. Als Premierminister will Boström dem Königreich Schweden und Norwegen Stabilität und Fortschritt bringen. Seine Regierung verspricht, die drängenden Probleme der Gegenwart anzugehen, darunter die anhaltenden Spannungen innerhalb der Union und die Notwendigkeit wirtschaftlicher und sozialer Reformen. Der Weg ist anspruchsvoll, doch Boströms Führung gibt Hoffnung auf eine geeinte und erfolgreiche Zukunft."

DNC_Sweden_Norway.9:0 "Boström verdrängt, Otter taucht auf"
DNC_Sweden_Norway.9.d:0 "Die politischen Spannungen innerhalb der Union haben zu einem dramatischen Machtwechsel geführt. Premierminister Erik Gustaf Boström wurde aufgrund weitverbreiteter Unzufriedenheit mit seinem Krisenmanagement abgesetzt. An seine Stelle trat Johan Otto, ein charismatischer und entschlossener Politiker. Otto verspricht einen frischen Ansatz und neue Strategien zur Bewältigung der Herausforderungen der Union, um Stabilität und Einheit wiederherzustellen."
DNC_Sweden_Norway.9.a:0 "Willkommen, Otter!"
DNC_Sweden_Norway.10:0 "Otter tritt zurück, Boström bildet zweites Kabinett"
DNC_Sweden_Norway.10.d:0 "Angesichts des wachsenden Drucks und interner Konflikte hat Johan Otto seinen Rücktritt als Premierminister angekündigt. Die Union befindet sich mit Ottos Rücktritt erneut im Umbruch und begründet dies mit der Notwendigkeit einer neuen Führung, um das Königreich durch seine Herausforderungen zu führen. Überraschenderweise konnte Erik Gustaf Boström Unterstützung gewinnen und ein zweites Kabinett bilden. Er versprach Stabilität und eine Rückkehr zu seiner früheren Politik. Das Königreich beobachtet aufmerksam, wie Boström erneut die Zügel in die Hand nimmt."
DNC_Sweden_Norway.10.a:0 "Unterstützen Sie Boströms Rückkehr an die Macht."
DNC_Sweden_Norway.10.b:0 "Ruf nach einer neuen Führung."
DNC_Sweden_Norway.11:0 "Auflösung der Union"
DNC_Sweden_Norway.11.d:0 "Nach Jahren politischer Unruhen und angespannter Beziehungen ist die Schwedisch-Norwegische Union nun endgültig zerbrochen. Nach Verhandlungen und Volksabstimmungen einigten sich beide Nationen auf eine friedliche Auflösung der Union. Dies markiert das Ende einer langjährigen politischen Einheit, die die Geschichte Schwedens und Norwegens geprägt hat. Die Zukunft hält nun neue Herausforderungen und Chancen für beide Nationen bereit, die nun getrennte Wege beschreiten."
DNC_Sweden_Norway.12.a:0 "Die Union ist nun aufgelöst."

