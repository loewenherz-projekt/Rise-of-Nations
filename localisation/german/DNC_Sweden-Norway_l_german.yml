KNS_SILENT_NIGHT_DESC:0 "Die Vereinigten Königreiche Schweden und Norwegen stehen an einem Scheideweg. Die Union wird mit jedem Tag instabiler. Wird die Union noch zu retten sein? Oder wird Norwegen endlich seine Unabhängigkeit erlangen? Nur die Zeit wird es zeigen."
