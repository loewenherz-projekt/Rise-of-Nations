 DEN_kalmar_union:0 "Kalmar Union"
 DEN_kalmar_union_desc:0 "Die Völker Dänemarks, Norwegens und Schwedens sind wieder vereint. Die Welt blickt mit Ehrfurcht auf Skandinavien!"
 
 DEN_finnish_drill_sergeants:0 "Finnische Drill Sergeants"
 DEN_finnish_drill_sergeants_desc:0 "Das finnische Volk ist stoisch in der Verteidigung seiner Heimat und wird unseren Truppen gute Dienste leisten, indem es sie in seinen Gebräuchen ausbildet."
 
 DEN_inspired_population:0 "Inspirierte Bevölkerung"
 DEN_inspired_population_desc:0 "Inspiriert von Reden über vergangene Siege und Heldentaten strömen die jungen Männer Dänemarks nun zu unserem Militär, um selbst Teil der Geschichte zu werden."

 DEN_german_tech:0 "Deutsche Technologiezusammenarbeit"
 DEN_german_tech_desc:0 "Deutschland stellt uns großzügig Pläne für seine technologischen Wunderwerke zur Verfügung."
