##events

chinese_empire.1.t:0 "Der Boxeraufstand"
chinese_empire.1.a:0 "Stehen Sie auf der Seite der Boxer"
chinese_empire.1.b:0 "Die aktuelle Situation ist die beste, tun Sie nichts"
chinese_empire.1.d:0 "Angesichts des jüngsten Boxeraufstands müssen wir möglicherweise einige Entscheidungen treffen: Wollen wir die Beziehungen zu den westlichen Nationen fortsetzen oder uns auf die Seite der Boxer stellen? Letzteres würde die Unruhen beruhigen, aber auch die westlichen Länder verärgern. "
chinese_empire.2.t:0 "Fordern Sie den Bund heraus"
chinese_empire.2.d:0 "Angesichts der aktuellen Unruhen fordern viele Boxer die Belagerung verschiedener Städte, die von den westlichen Ländern gewaltsam eingenommen wurden. Sie wollen unserem Imperium seinen Ruhm zurückgeben, wir werden unser Land zurückerobern!"
chinese_empire.2.a:0 "Sie haben unsere Warnungen ignoriert, aber heute ist der Tag ..."
chinese_empire.3.t:0 "Die aktuelle Situation"
chinese_empire.3.d:0 "Seien wir ehrlich: Unsere Fronten halten nicht stand und wir erleiden schwere Verluste. Einige Generäle des Oberkommandos forderten die Unterzeichnung eines Friedensvertrages. Dies könnte den völligen Zusammenbruch unserer großen Nation verhindern."
chinese_empire.3.a:0 "Sie haben Recht, lasst uns einen Friedensvertrag vereinbaren"
chinese_empire.3.b:0 "Was für ein Haufen Feiglinge, wir werden bis zum Ende kämpfen!"
chinese_empire.4.t:0 "Das chinesische Reich fordert Frieden"
chinese_empire.4.d:0 "Nach ihren Angriffen auf unsere verschiedenen Konzessionen in China sind wir in ihr Land eingedrungen, und jetzt fordern chinesische Diplomaten die Unterzeichnung eines Friedensvertrags."
chinese_empire.4.a:0 "Akzeptieren Sie den Friedensvertrag"
chinese_empire.4.b:0 "Nein, wir werden es nicht unterschreiben"
chinese_empire.5.t:0 "Massendesertion in der Armee"
chinese_empire.5.d:0 "Unsere Linien sind vollständig verschwunden und es gibt fast keinen Widerstand gegen den Vormarsch des Feindes. Uns bleibt keine andere Wahl, als einen demütigenden Friedensvertrag zu unterzeichnen."
chinese_empire.5.a:0 "Unsere glorreiche Nation liegt in Trümmern ..."
chinese_empire.6.t:0 "Die chinesischen Turbulenzen"
chinese_empire.6.d:0 "Nach der Niederlage des Boxeraufstands in der Vergangenheit entdeckten die Offiziere eine Schwäche in der Regierung und versuchten nun, die Zentralregierung zu stürzen. Ihr Ziel ist es, sie durch eine Republik zu ersetzen."
chinese_empire.6.a:0 "Die Republik wird siegen!"
chinese_empire.6.b:0 "Nieder mit den Verrätern!"
chinese_empire.9.t:0 "Ein Sieg für die Republik"
chinese_empire.9.d:0 "Die letzten Wochen dieser Kämpfe neigen sich dem Ende zu. Die Befreiungsarmee kämpft derzeit gegen die letzten Zentren der Qing-Rebellen. Die glorreichen Soldaten, die für die Freiheit kämpften, sollten in Ewigkeit in Erinnerung bleiben."
chinese_empire.9.a:0 "Es ist Zeit, die Republik auszurufen"
chinese_empire.10.t:0 "Ein Sieg für das Imperium"
chinese_empire.10.d:0 "Die letzten Wochen dieses Kampfes nähern sich dem Ende. Während wir hier sprechen, kämpft die Qing-Armee gegen die letzten Nischen der „Befreiungsarmee“."
chinese_empire.10.a:0 "Das Imperium wird immer gewinnen!"
chinese_empire.11.t:0 "Die chinesischen Rebellen bitten um Unterstützung"
chinese_empire.11.d:0 "Einige chinesische Intellektuelle gründeten eine Rebellionsbewegung, um gegen die Qing-Dynastie zu kämpfen. Sie suchen nach ausländischer Unterstützung, um Aufstände im ganzen Land zu planen"
chinese_empire.11.a:0 "Klar, lasst uns ihnen helfen"
chinese_empire.11.b:0 "Nein, wir bleiben neutral"
chinese_empire.12.t:0 "Gerüchte über Aufstände"
chinese_empire.12.d:0 "Einige Kommandeure erzählten uns von Gerüchten über einen bevorstehenden Aufstand in verschiedenen Staaten. Wir sollten auf verdächtige Handlungen achten und auf der Hut bleiben."
chinese_empire.12.a:0 "Dies ist sicherlich ein falsches Gerücht"
chinese_empire.12.b:0 "Niemand kann die kommende Revolution aufhalten!"
chinese_empire.13.t:0 "Das Ende der Aufstände"
chinese_empire.13.d:0 "Heute Morgen wurden die letzten Rebellennester vernichtet. Der republikanische Aufstand ist beendet. Einige Provinzen forderten mehr Autonomie. Wir sollten ihnen diese gewähren, um weitere Aufstände zu verhindern."
chinese_empire.13.a:0 "Sicher, wenn das sie beruhigen könnte"
chinese_empire.13.b:0 "Niemals, das Imperium sollte stark bleiben!"
chinese_empire.14.t:0 "Der Kaiser dankt ab!"
chinese_empire.14.d:0 "Heute Morgen kam eine Nachricht aus dem Kaiserpalast. Darin stand, dass der Kaiser abdankt. Das bedeutet, dass wir den Aufstand gegen die Qing-Dynastie gewonnen haben und nun die Chinesische Republik ausrufen können!"
chinese_empire.14.a:0 "Der Sieg war von Anfang an auf unserer Seite!"
chinese_empire.15.t:0 "Yuan Shikai schlägt Hilfe vor"
chinese_empire.15.d:0 "Yuan Shikai, ein Qing-Offizier, schlug uns vor, beim Sturz der Regierung zu helfen. Er war bereit, uns mit einigen seiner Männer im Austausch für den Präsidententitel zu unterstützen. Was sollen wir tun?"
chinese_empire.15.a:0 "Klar, jede Hilfe ist willkommen"
chinese_empire.15.b:0 "Wir brauchen seine Hilfe nicht, er wird wie die anderen umkommen!"
chinese_empire.16.t:0 "Die Mongolei und Tibet erklären ihre Unabhängigkeit"
chinese_empire.16.d:0 "Die Mongolei und Tibet nutzten die aktuelle Situation und erklärten ihre Unabhängigkeit gegenüber unserem großen Reich. Jetzt stehen wir allein da, um diese Rebellen zu bekämpfen."
chinese_empire.16.a:0 "Alles fällt auseinander..."
chinese_empire.17.t:0 "Der Diktator"
chinese_empire.17.d:0 "Yuan Shikai, der Offizier, der uns während der Revolution bei der Gründung der Republik unterstützte, rief eine totale Diktatur aus. Unzufrieden mit dieser Entscheidung haben wir uns von der ehemaligen Republik losgesagt und werden versuchen, diese Regierung zu stürzen."
chinese_empire.17.a:0 "Das war letztendlich keine gute Idee ..."
chinese_empire.18.t:0 "Das Ende des Diktators"
chinese_empire.18.d:0 "Nachdem Yuan Shikai die südlichen Provinzen gegen seine Entscheidung revoltieren sah, gab er nach und sagte sich von der Diktatur los. Er starb wenige Tage später. Zahlreiche „Kriegsherren“ nutzten die instabile Lage aus, besetzten mit Milizen Land und ernannten sich zu Herrschern ihrer Gebiete." 
chinese_empire.18.a:0 "Wird das nie aufhören?"
civilwar.tooltip:0 "Dies wird die Unterstützung für die derzeitige Regierung erhöhen"
chinese_empire.24.t:0 "China fordert Anerkennung des neuen Regimes"
chinese_empire.24.d:0 "Das chinesische Reich hat uns aufgefordert, sein neues Regime anzuerkennen. Was sollen wir tun?"
chinese_empire.24.a:0 "Wir begrüßen den Regimewechsel"
chinese_empire.24.b:0 "Wir werden sie vorerst nicht wiedererkennen...."
chinese_empire.25.t:0 "Das Ende unseres Imperiums …“"
chinese_empire.25.d:0 "Unser Reich ist gefallen, China liegt in Trümmern, der Westen hat unser Territorium aufgeteilt und ein falsches China geschaffen, sie haben die Kontrolle über unsere diplomatischen Angelegenheiten übernommen und wir sind unter ihren Einfluss geraten, das Mandat wurde erfüllt …"
chinese_empire.25.a:0 "Alles Gute hat ein Ende"
