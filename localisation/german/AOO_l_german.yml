 schweden.0.t:0 "Gründung des Reichsprotektorats Schweden"
 schweden.0.d:0 "Mit der Eroberung Schwedens kontrollieren wir nun riesige Gebiete in Skandinavien. Sollten wir diese neue Besatzungszone einrichten?"
 schweden.0.a:0 "Machen Sie mit der Schöpfung weiter"
 schweden.0.b:0 "Es besteht keine Notwendigkeit"

 bretagne.0.t:0 "Gründung des Reichsprotektorats Bretagne"
 bretagne.0.d:0 "Eine Hauptabsicht der deutschen Besatzer bestand darin, die nationale Einheit Frankreichs zu brechen. Ihre Unterstützung des bretonischen Nationalismus muss in diesem größeren Kontext gesehen werden, der auch andere Aspekte umfasste, beispielsweise die Teilung Frankreichs in die Besatzungszone und die Vichy-Zone. Die bretonischen Nationalisten erkannten jedoch sehr bald, dass Deutschland in der Praxis versuchte, seine Freunde in der Vichy-Regierung zufrieden zu stellen, und sich daher weigerte, den bretonischen nationalistischen Forderungen überhaupt Priorität einzuräumen."
 bretagne.0.a:0 "Machen Sie mit der Schöpfung weiter"
 bretagne.0.b:0 "Es besteht keine Notwendigkeit"

# Satelite Events
### Creation
 denmark.0.t:0 "Satelisierung Dänemarks"
 denmark.0.d:0 "Während des größten Teils des Zweiten Weltkriegs war Dänemark zunächst ein Protektorat, dann ein von Deutschland besetztes Gebiet. Die Entscheidung zur Invasion Dänemarks wurde am 17. Dezember 1939 in Berlin getroffen. Am 9. April 1940 marschierte Deutschland im Rahmen der Operation Weserübung in Dänemark ein und errichtete de facto ein Protektorat über das Land. Am 29. August 1943 stellte Deutschland Dänemark unter direkte militärische Besatzung, die bis zum Sieg der Alliierten am 5. Mai 1945 andauerte. Im Gegensatz zur Situation in anderen Ländern unter deutscher Besatzung funktionierten die meisten dänischen Institutionen bis 1945 relativ normal weiter. Sowohl die dänische Regierung als auch der König lebten in dem schwierigen Verhältnis zwischen einem demokratischen und einem totalitären System, bis die dänische Regierung aus Protest gegen die deutsche Forderung nach der Einführung der Todesstrafe für Sabotage zurücktrat."
 denmark.0.a:0 "Fahren Sie mit der Befreiung fort"
 denmark.0.b:0 "Es besteht keine Notwendigkeit"

# Reichskommissariat Events
### Creation
 belnfra.0.t:0 "Gründung des Reichskommissariats Belgien-Norfrankreich"
 belnfra.0.d:0 "The Reichskommissariat of Belgium and Northern France was a German civil administration (Zivilverwaltung) which governed German-occupied Belgium during World War II. The Reichskommissariat replaced an earlier military government, the Military Administration in Belgium and Northern France, established in the same territory in 1940. On 18 July 1944, the first Gauleiter, Josef Grohé, was named the first Reichskommissar of the territory, known as the Reichskommissariat Belgien und Nordfrankreich or Reichskommissariat für die besetzten Gebiete von Belgien und Nordfrankreich."
 belnfra.0.a:0 "Machen Sie mit der Schöpfung weiter"
 belnfra.0.b:0 "Es besteht keine Notwendigkeit"

 kaukasus.0.t:0 "Gründung des Reichskommissariats Kaukasus"
 kaukasus.0.d:0 "Das Reichskommissariat Kaukasus (oder Kaukasien) war die theoretische politische Aufteilung und das geplante zivile Besatzungsregime Deutschlands in den eroberten Gebieten des Kaukasus während des Zweiten Weltkriegs. Im Gegensatz zu den anderen vier geplanten Reichskommissariaten sollten innerhalb der Grenzen des vorgeschlagenen Kaukasus-Reichskommissariats Experimente für verschiedene Formen der Autonomie für &quot;indigene Gruppen&quot; durchgeführt werden."
 kaukasus.0.a:0 "Machen Sie mit der Schöpfung weiter"
 kaukasus.0.b:0 "Es besteht keine Notwendigkeit"

 turkestan.0.t:0 "Gründung des Reichskommissariats Turkestan"
 turkestan.0.d:0 "Das Reichskommissariat Turkestan (auch Turkistan geschrieben, abgekürzt RKT) war ein geplantes Reichskommissariat, das Deutschland im Zweiten Weltkrieg in den zentralasiatischen Republiken der Sowjetunion errichten wollte. Der sowjetische Historiker Lew Bezymenski behauptete, dass für das Gebiet auch die Namen Panturkestan, Großturkestan und Mohammed-Reich in Betracht gezogen wurden."
 turkestan.0.a:0 "Machen Sie mit der Schöpfung weiter"
 turkestan.0.b:0 "Es besteht keine Notwendigkeit"

 ukranien.0.t:0 "Gründung des Reichskommissariats Ukraine"
 ukranien.0.d:0 "Während des Zweiten Weltkriegs war das Reichskommissariat Ukraine (abgekürzt RKU) das zivile Besatzungsregime eines Großteils der deutsch besetzten Ukraine (zu der auch angrenzende Gebiete des heutigen Weißrusslands und des Vorkriegspolens gehörten). Zwischen September 1941 und August 1944 wurde das Reichskommissariat von Reichskommissar Erich Koch verwaltet. Zu den Aufgaben der Verwaltung gehörten die Befriedung der Region und die Ausbeutung ihrer Ressourcen und Bevölkerung zum Nutzen Deutschlands. Adolf Hitler erließ am 17. Juli 1941 ein Führerdekret zur Festlegung der Verwaltung der neu besetzten Ostgebiete."
 ukranien.0.a:0 "Machen Sie mit der Schöpfung weiter"
 ukranien.0.b:0 "Es besteht keine Notwendigkeit"

 ural.0.t:0 "Gründung des Reichskommissariats Ural"
 ural.0.d:0 "Das Reichskommissariat Ural (abgekürzt RKU), wörtlich „Reichskommissariat des Urals“, war das deutsche zivile Besatzungsregime in der Westsibirischen Tiefebene nach der Niederlage der Sowjetunion. Es war zunächst auch als Reichskommissariat Sibirien bekannt."
 ural.0.a:0 "Machen Sie mit der Schöpfung weiter"
 ural.0.b:0 "Es besteht keine Notwendigkeit"

 wolga.0.t:0 "Gründung des Reichskommissariats Don-Wolga"
 wolga.0.d:0 "Das Reichskommissariat Don-Wolga, wörtlich „Reichskommissariat Don-Wolga“, war ein theoretisches ziviles Besatzungsregime Nazi-Deutschlands, das in den frühen Phasen der deutschen Planung für die Besetzung von Gebieten in der Sowjetunion diskutiert wurde, eines von mehreren anderen Reichskommissariaten. In deutschen Memoranden wird es auch einfach als Dongebiet bezeichnet."
 wolga.0.a:0 "Machen Sie mit der Schöpfung weiter"
 wolga.0.b:0 "Erweiterung des Reichskommisariats Ukraine (Historisch)"

 moscowien.0.t:0 "Gründung des Reichskommissariats Moskau"
 moscowien.0.d:0 "Das Reichskommissariat Moskau (auch Moskau, abgekürzt RKM), wörtlich „Reichskommissariat von Moskau“, war das zivile Besatzungsregime, das Nazi-Deutschland während des Zweiten Weltkriegs in Mittel- und Nordrussland errichten wollte. Es war eines von mehreren ähnlichen Reichskommissariaten. Es war ursprünglich auch als Reichskommissariat Russland bekannt. Siegfried Kasche war der geplante Reichskommissar, doch aufgrund des Scheiterns der deutschen Besetzung der für die Bildung des Reichskommissariats vorgesehenen Gebiete blieb es nur auf dem Papier."
 moscowien.0.a:0 "Machen Sie mit der Schöpfung weiter"
 moscowien.0.b:0 "Es besteht keine Notwendigkeit"

