 japchi.16.t:0 "Die Tianjin-Konzession"
 japchi.16.d:0 "Die Konzessionen in Tianjin (früher Tientsin) waren Konzessionsgebiete, die die chinesische Qing-Dynastie innerhalb der Stadt Tianjin an mehrere europäische Länder, die USA und Japan abtrat. Insgesamt gab es im alten Tianjin neun Konzessionen. Diese Konzessionen trugen auch zur rasanten Entwicklung Tianjins vom frühen bis zur Mitte des 20. Jahrhunderts bei. Die ersten Konzessionen in Tianjin wurden 1860 vergeben. Die letzte Konzession wurde 1947 an China zurückgegeben."
 japchi.16.a:0 "Den Hafen für uns nehmen"
 japchi.16.b:0 "Übergeben Sie den Hafen an China"

