# Italian Occupation Decisions
 occupation_decisions_ITA:0 "Schaffung von Satellitenstaaten"
 occupation_decisions_ITA_desc:0 ""

 ocupation_zone_creation_IEA:0 "Gründung der Kolonie Italienisch-Ostafrika"
 ocupation_zone_creation_IEA_desc:0 "Italienisch-Ostafrika (italienisch: Africa Orientale Italiana) war eine italienische Kolonie am Horn von Afrika. Sie entstand 1936 durch den Zusammenschluss von Italienisch-Somaliland, Italienisch-Eritrea und dem neu besetzten Äthiopischen Reich, aus dem später Italienisch-Äthiopien wurde."
 create_occupation_zone_IEA:0 "Da wir nun das Land Äthiopien kontrollieren, können wir zusammen mit Somalia und Eritrea eine neue lokale Verwaltung schaffen, um die Interessen der Ducce und des italienischen Volkes besser zu vertreten."

 ocupation_zone_expansion_IEA:0 "Expansion von Italienisch-Ostafrika"
 ocupation_zone_expansion_IEA_desc:0 "Nach der Kapitulation der letzten britischen Streitkräfte in Somaliland können wir nun sagen, dass wir die Eroberung des Horns von Afrika abgeschlossen haben und dieses Land nun unserer lokalen Regierung übergeben können."
 expand_occupation_zone_IEA:0 "Da wir nun das britische und französische Somaliland kontrollieren, können wir sie in unsere Kolonie Italienisch-Ostafrika eingliedern."

 ocupation_zone_creation_ICA:0 "Gründung der italienischen Kolonie Zentralafrika"
 ocupation_zone_creation_ICA_desc:0 "Italienisch-Zentralafrika (italienisch: Africa Centrale Italiana) war eine mögliche italienische Kolonie im Sudan. Sie entstand, als die Truppen des Ducce den Sudan eroberten. Das neu besetzte anglo-ägyptische Sudan-Abhängigkeitsgebiet wurde zur Kolonie Italienisch-Zentralafrika."
 expand_occupation_zone_ICA:0 "Da wir nun den Sudan kontrollieren, können wir eine neue lokale Verwaltung schaffen, um die Interessen der Ducce und des italienischen Volkes besser zu vertreten."

 ocupation_zone_creation_ALB:0 "Satellit Albanien"
 ocupation_zone_creation_ALB_desc:0 "Nach der militärischen Besetzung durch Italien von 1939 bis 1943 war das Königreich Albanien ein Protektorat und abhängiges Gebiet des Königreichs Italien unter der Herrschaft von Viktor Emanuel III. und seiner Regierung."
 expand_occupation_zone_ALB:0 "Nachdem Zog nun unseren Forderungen nachgegeben hat, können wir in Albanien ein Satellitenregime errichten, das dieses Land in unserem Namen regiert."

 ocupation_zone_creation_GRE:0 "Das Schicksal Griechenlands"
 ocupation_zone_creation_GRE_desc:0 "Infolge der Niederlage der griechischen Armee ging die griechische Regierung ins Exil, und eine Marionettenregierung, die mit den Achsenmächten kollaborierte, wurde im Land eingesetzt. Darüber hinaus wurde Griechenland in Besatzungszonen aufgeteilt, die von den Achsenmächten verwaltet wurden. Die wichtigsten Regionen des Landes, darunter Athen, Thessaloniki und die strategisch wichtigsten Ägäischen Inseln, wurden von den Deutschen selbst verwaltet. Andere Regionen des Landes gingen an Deutschlands Partner Italien und Bulgarien."
 expand_occupation_zone_GRE:0 "Nachdem unsere mächtige italienische Armee die Griechen besiegt hat, werden wir ein Satellitenregime installieren, das dieses Land in unserem Namen regiert."

 ocupation_zone_creation_EGY:0 "Schaffung des Protektorats Ägypten"
 ocupation_zone_creation_EGY_desc:0 "Nach der Kapitulation der letzten britischen Streitkräfte in Ägypten können wir nun sagen, dass wir die „Operation E“ abgeschlossen haben und nun ein lokales Regime an die Regierung stellen können."
 expand_occupation_zone_EGY:0 "Da wir nun das Land Ägypten kontrollieren, können wir eine neue lokale Verwaltung schaffen, um die Interessen der Ducce und des italienischen Volkes besser zu vertreten."

 ocupation_zone_creation_IMT:0 "Schaffung des Mandats Transjordanien"
 ocupation_zone_creation_IMT_desc:0 "Nach der Kapitulation der letzten britischen Streitkräfte in Jordanien können wir nun ein lokales Regime an die Regierung bringen."
 expand_occupation_zone_IMT:0 "Da wir nun das Land Jordanien kontrollieren, können wir eine neue lokale Verwaltung schaffen, um die Interessen der Ducce und des italienischen Volkes besser zu vertreten."

 ocupation_zone_creation_IMS:0 "Schaffung des Mandats für Syrien und den Libanon"
 ocupation_zone_creation_IMS_desc:0 "Nach der Kapitulation der letzten feindlichen Streitkräfte in Syrien und im Libanon können wir nun ein lokales Regime an die Regierung bringen."
