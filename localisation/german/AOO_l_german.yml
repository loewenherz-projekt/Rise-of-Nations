# Decisions
# German Occupation Decisions
 occupation_decisions_GER:0 "Schaffung von Kommissariaten und Protektoraten"
 occupation_decisions_GER_desc:0 ""

 ocupation_zone_creation_RPB:0 "Gründung des Reichsprotektorats Böhmen und Mähren"
 ocupation_zone_creation_RPB_desc:0 "Das Protektorat Böhmen und Mähren (deutsch: Protektorat Böhmen und Mähren; tschechisch: Protektorát Čechy a Morava) war ein Protektorat Nazideutschlands, das nach der deutschen Besetzung der Tschechoslowakei gegründet wurde. Zuvor, im Jahr 1938, wurde das Sudetenland der Tschechischen Länder mit dem Münchner Abkommen als Reichsgau in Nazideutschland eingegliedert."
 create_occupation_zone_RPB:0 "Da wir nun die Kontrolle über das Land der Tschechoslowakei haben, können wir eine neue lokale Verwaltung schaffen, um die Interessen des Reichs besser zu vertreten."
 
 ocupation_zone_creation_GEG:0 "Gründung des Generalgouvernements"
 ocupation_zone_creation_GEG_desc:0 "Das Generalgouvernement (polnisch: Generalne Gubernatorstwo, ukrainisch: Генеральна губернія), auch Generalgouvernement genannt, war eine deutsche Besatzungszone, die nach dem gemeinsamen Einmarsch Nazideutschlands und der Sowjetunion in Polen 1939 zu Beginn des Zweiten Weltkriegs eingerichtet wurde. Die neu besetzte Zweite Polnische Republik war in drei Zonen aufgeteilt: das Generalgouvernement im Zentrum, die von Nazideutschland annektierten polnischen Gebiete im Westen und die von der Sowjetunion annektierten polnischen Gebiete im Osten. Das Gebiet wurde 1941 erheblich erweitert und umfasste den neuen Bezirk Galizien."
 create_occupation_zone_GEG:0 "Da wir nun das Land Polen kontrollieren, können wir eine neue lokale Verwaltung schaffen, um die Interessen des Reichs besser zu vertreten."

 ocupation_zone_creation_RKO:0 "Gründung des Reichskommissariats Ostland"
 ocupation_zone_creation_RKO_desc:0 "Nazi Germany established the Reichskommissariat Ostland (RKO) in 1941 as the civilian occupation regime in the Baltic states (Estonia, Latvia, and Lithuania), the northeastern part of Poland and the west part of the Belarusian SSR during World War II. It was also known initially as Reichskommissariat Baltenland ("Baltic Land").The political organization for this territory – after an initial period of military administration before its establishment – was that of a German civilian administration, nominally under the authority of the Reich Ministry for the Occupied Eastern Territories (German: Reichsministerium für die besetzten Ostgebiete) led by Nazi ideologist Alfred Rosenberg, but actually controlled by the Nazi official Hinrich Lohse, its appointed Reichskommissar."
 create_occupation_zone_RKO:0 "Da wir nun das Land zwischen dem Baltikum und dem russischen Inland kontrollieren, können wir eine neue lokale Verwaltung schaffen, um die Interessen des Reichs besser zu vertreten."

 ocupation_zone_creation_RKU:0 "Gründung des Reichskommissariats Ukraine"
 ocupation_zone_creation_RKU_desc:0 "Während des Zweiten Weltkriegs war das Reichskommissariat Ukraine (abgekürzt RKU) das zivile Besatzungsregime eines Großteils der deutsch besetzten Ukraine (zu der auch angrenzende Gebiete des heutigen Weißrusslands und des Vorkriegspolens gehörten). Zwischen September 1941 und August 1944 wurde das Reichskommissariat von Reichskommissar Erich Koch verwaltet. Zu den Aufgaben der Verwaltung gehörten die Befriedung der Region und die Ausbeutung ihrer Ressourcen und Bevölkerung zum Nutzen Deutschlands. Adolf Hitler erließ am 17. Juli 1941 ein Führerdekret zur Festlegung der Verwaltung der neu besetzten Ostgebiete."
 create_occupation_zone_RKU:0 "Da wir nun die Ukraine kontrollieren, können wir eine neue lokale Verwaltung schaffen, um die Interessen des Reichs besser zu unterdrücken."

 ocupation_zone_creation_RKM:0 "Gründung des Reichskommissariats Moskau"
 ocupation_zone_creation_RKM_desc:0 "Das Reichskommissariat Moskowien (auch Moskau, abgekürzt RKM; russisch: Рейхскомиссариат Московия), wörtlich „Reichskommissariat von Moskau“, war das zivile Besatzungsregime, das Nazi-Deutschland während des Zweiten Weltkriegs in Mittel- und Nordrussland errichten wollte, eines von mehreren ähnlichen Reichskommissariaten. Es war ursprünglich auch als Reichskommissariat Russland bekannt. Siegfried Kasche war der geplante Reichskommissar, doch aufgrund des Scheiterns der deutschen Besetzung der für die Bildung des Reichskommissariats vorgesehenen Gebiete blieb es nur auf dem Papier."
 create_occupation_zone_RKM:0 "Da wir nun Moskau kontrollieren, können wir eine neue lokale Verwaltung schaffen, um die Interessen des Reichs besser zu vertreten."

 ocupation_zone_creation_RKL:0 "Gründung des Reichskommissariats Ural"
 ocupation_zone_creation_RKL_desc:0 "Das Reichskommissariat Ural (abgekürzt RKU; russisch: Рейхскомиссариат Уральские), wörtlich „Reichskommissariat des Urals“ war das deutsche zivile Besatzungsregime in der Westsibirischen Tiefebene nach der Niederlage der Sowjetunion. Ursprünglich war es auch als Reichskommissariat Sibirien (Reichskommissariat Sibirien) bekannt."
 create_occupation_zone_RKL:0 "Da wir nun die Uralzone kontrollieren, können wir eine neue lokale Verwaltung schaffen, um die Interessen des Reichs besser zu vertreten. "

 ocupation_zone_creation_RKW:0 "Gründung des Reichskommissariats Don-Wolga"
 ocupation_zone_creation_RKW_desc:0 "Das Reichskommissariat Don-Wolga, wörtlich „Reichskommissariat Don-Wolga“, war ein theoretisches ziviles Besatzungsregime Nazi-Deutschlands, das in der frühen Phase der deutschen Planung für die Besetzung von Gebieten in der Sowjetunion diskutiert wurde, eines von mehreren anderen Reichskommissariaten. In deutschen Memoranden wird es auch einfach als Dongebiet bezeichnet."
 create_occupation_zone_RKW:0 "Da wir nun das Don-Wolga-Gebiet kontrollieren, können wir eine neue lokale Verwaltung schaffen, um die Interessen des Reichs besser zu vertreten, oder sie in das Reichskommissariat Ukraine eingliedern."

 ocupation_zone_creation_RKT:0 "Gründung des Reichskommissariats Turkestan"
 ocupation_zone_creation_RKT_desc:0 "Das Reichskommissariat Turkestan (auch Turkistan geschrieben, abgekürzt RKT) war ein geplantes Reichskommissariat, das Deutschland im Zweiten Weltkrieg in den zentralasiatischen Republiken der Sowjetunion errichten wollte. Der sowjetische Historiker Lew Bezymenski behauptete, dass für das Gebiet auch die Namen Panturkestan, Großturkestan und Mohammed-Reich in Betracht gezogen wurden."
 create_occupation_zone_RKT:0 "Da wir nun Turkestan kontrollieren, können wir eine neue lokale Verwaltung schaffen, um die Interessen des Reichs besser zu vertreten. "

 ocupation_zone_creation_RKK:0 "Gründung des Reichskommissariats Kaukasus"
 ocupation_zone_creation_RKK_desc:0 "Das Reichskommissariat Kaukasus war die theoretische politische Aufteilung und das geplante zivile Besatzungsregime Deutschlands in den eroberten Gebieten des Kaukasus während des Zweiten Weltkriegs. Im Gegensatz zu den anderen vier geplanten Reichskommissariaten sollten innerhalb der Grenzen des vorgeschlagenen Kaukasus-Reichskommissariats Experimente für verschiedene Formen der Autonomie für „indigene Gruppen“ durchgeführt werden."
 create_occupation_zone_RKK:0 "Da wir nun die Kaukasusregion kontrollieren, können wir eine neue lokale Verwaltung schaffen, um die Interessen des Reichs besser zu vertreten."

 ocupation_zone_creation_SIB_GER:0 "Gründung des Reichsprotektorats Sibirien"
 ocupation_zone_creation_SIB_GER_desc:0 "Das Reichsprotektorat Sibirien (oder Sibirien; russisch: протекторат Сибирь) war die theoretische politische Aufteilung und das geplante zivile Besatzungsregime Deutschlands in den eroberten Gebieten Sibiriens während des Zweiten Weltkriegs. Im Gegensatz zu den anderen vier geplanten Reichskommissariaten sollten innerhalb der Grenzen des vorgeschlagenen Reichskommissariats Sibirien Experimente für verschiedene Formen der Autonomie für &quot;indigene Gruppen&quot; durchgeführt werden."
 create_occupation_zone_SIB_GER:0 "Da wir nun die Kaukasusregion kontrollieren, können wir eine neue lokale Verwaltung schaffen, um die Interessen des Reichs besser zu vertreten."
 
 ocupation_zone_creation_DEN:0 "Satellit Dänemark"
 ocupation_zone_creation_DEN_desc:0 "Während des größten Teils des Zweiten Weltkriegs war Dänemark zunächst ein Protektorat, dann ein von Deutschland besetztes Gebiet. Die Entscheidung zur Invasion Dänemarks wurde am 17. Dezember 1939 in Berlin getroffen. Am 9. April 1940 marschierte Deutschland im Rahmen der Operation Weserübung in Dänemark ein und errichtete de facto ein Protektorat über das Land. Am 29. August 1943 stellte Deutschland Dänemark unter direkte militärische Besatzung, die bis zum Sieg der Alliierten am 5. Mai 1945 andauerte. Im Gegensatz zur Situation in anderen Ländern unter deutscher Besatzung funktionierten die meisten dänischen Institutionen bis 1945 relativ normal weiter. Sowohl die dänische Regierung als auch der König lebten in dem schwierigen Verhältnis zwischen einem demokratischen und einem totalitären System, bis die dänische Regierung aus Protest gegen die deutsche Forderung nach der Einführung der Todesstrafe für Sabotage zurücktrat."
 create_occupation_zone_DEN:0 "Da wir nun Dänemark kontrollieren, können wir eine neue lokale Verwaltung schaffen, um die Interessen des Reichs besser zu vertreten."

 ocupation_zone_creation_RKN:0 "Gründung des Reichskommissariats Norwegen"
 ocupation_zone_creation_RKN_desc:0 "The Reichskommissariat Norwegen was the civilian occupation regime set up by Nazi Germany in German-occupied Norway during World War II. Its full title in German was the Reichskommissariat für die besetzten norwegischen Gebiete ("Reich Commissariat for the Occupied Norwegian Territories"). It was governed by Reichskommissar Josef Terboven until his deposition on 7 May 1945. The German military forces in Norway, then under the command of general Franz Böhme, surrendered to the Allied forces on 9 May and the legal government was restored."
 create_occupation_zone_RKN:0 "Da wir nun Norwegen kontrollieren, können wir eine neue lokale Verwaltung schaffen, um die Interessen des Reichs besser zu vertreten."

 ocupation_zone_creation_RPS:0 "Gründung des Reichsprotektorats Schweden"
 ocupation_zone_creation_RPS_desc:0 "Das Reichsprotektorat Schweden ist der geplante Marionettenstaat, der in Schweden installiert werden soll, um den Eisenfluss in die deutsche Industrie zu kontrollieren."
 create_occupation_zone_RPS:0 "Da wir nun Schweden kontrollieren, können wir eine neue lokale Verwaltung schaffen, um die Interessen des Reichs besser zu vertreten. "
 
 ocupation_zone_creation_RKB:0 "Gründung des Reichskommissariats Belgien-Norfrankreich"
 ocupation_zone_creation_RKB_desc:0 "The Reichskommissariat of Belgium and Northern France was a German civil administration (Zivilverwaltung) which governed German-occupied Belgium during World War II. The Reichskommissariat replaced an earlier military government, the Military Administration in Belgium and Northern France, established in the same territory in 1940. On 18 July 1944, the first Gauleiter, Josef Grohé, was named the first Reichskommissar of the territory, known as the Reichskommissariat Belgien und Nordfrankreich or Reichskommissariat für die besetzten Gebiete von Belgien und Nordfrankreich."
 create_occupation_zone_RKB:0 "Da wir nun Belgien und Nordfrankreich kontrollieren, können wir eine neue lokale Verwaltung schaffen, um die Interessen des Reichs besser zu vertreten. "

 ocupation_zone_creation_RKI:0 "Gründung des Reichskommissariats Niederlande"
 ocupation_zone_creation_RKI_desc:0 "The Reichskommissariat Niederlande was the civilian occupation regime set up by Germany in the German-occupied Netherlands during World War II. Its full title was the Reich Commissariat for the Occupied Dutch Territories (German: Reichskommissariat für die besetzten niederländischen Gebiete). The administration was headed by Arthur Seyss-Inquart, formerly the last chancellor of Austria before initiating its annexation by Germany (the Anschluss)."
 create_occupation_zone_RKI:0 "Da wir nun die Niederlande kontrollieren, können wir eine neue lokale Verwaltung schaffen, um die Interessen des Reichs besser zu vertreten."

 ocupation_zone_creation_RPE:0 "Gründung des Reichsprotektorats Bretagne"
 ocupation_zone_creation_RPE_desc:0 "Das Reichsprotektorat Bretagne war ein Vorschlag für eine lokale Verwaltung, die von den bretonischen Nationalisten und der SS vorgeschlagen wurde. Dieser Vorschlag wurde nie umgesetzt und blieb lediglich ein Vorschlag."
 create_occupation_zone_RPE:0 "Da wir nun die Bretagne kontrollieren, können wir eine neue lokale Verwaltung schaffen, um die Interessen des Reichs besser zu vertreten."

 ocupation_zone_creation_SSB:0 "Gründung des SS-Staates Burgund"
 ocupation_zone_creation_SSB_desc:0 "Der SS-Staat Burgund (auf Deutsch: «SS-Staat Burgund») oder Ordensstaat Burgund (auf Deutsch: «Ordensstaat Burgund», ein historischer Bezug auf den Staat des Deutschen Ordens) war ein geplanter Staat, den die Führung Nazideutschlands während des Zweiten Weltkriegs in bestimmten Gebieten Westeuropas errichten wollte."
 create_occupation_zone_SSB:0 "Da wir nun die alten Ländereien des Königreichs Burgund kontrollieren, können wir eine neue lokale Verwaltung schaffen, um die Interessen des Reichs besser zu vertreten."
 
 ocupation_zone_creation_DMA:0 "Gründung des Deutschen Mandatsgebiets Madagaskar"
 ocupation_zone_creation_DMA_desc:0 "Das Deutsche Mandat Madagaskar war eine von den lokalen Nationalisten vorgeschlagene lokale Verwaltung. Diese wurde nie geschaffen und blieb lediglich ein Vorschlag."
 create_occupation_zone_DMA:0 "Da wir nun die Insel Madagaskar kontrollieren, können wir eine neue lokale Verwaltung schaffen, um die Interessen des Reichs besser zu unterdrücken."

 ocupation_zone_creation_DMO:0 "Gründung des Deutschen Mandats Marokko"
 ocupation_zone_creation_DMO_desc:0 "Das Deutsche Mandat Marokko war eine von den marokkanischen Nationalisten vorgeschlagene lokale Verwaltung. Diese wurde nie geschaffen und blieb lediglich ein Vorschlag."
 create_occupation_zone_DMO:0 "Da wir nun Marokko kontrollieren, können wir eine neue lokale Verwaltung schaffen, um die Interessen des Reichs besser zu vertreten."

 ocupation_zone_creation_MTA:0 "Gründung des Deutschen Mittelafrikanischen Kolonialreichs"
 ocupation_zone_creation_MTA_desc:0 "Das Deutsche Mittelafrikanische Kolonialreich war der Vorschlag einer lokalen Verwaltung für die eroberten Kolonien der alten europäischen Imperien. Diese wurde nie geschaffen und blieb lediglich ein Vorschlag."
 create_occupation_zone_MTA:0 "Da wir nun den größten Teil des alten europäischen Kolonialreichs in Afrika kontrollieren, können wir eine neue lokale Verwaltung schaffen, um die Interessen des Reichs besser zu vertreten."

 ocupation_zone_creation_BSS:0 "Gründung des Burenstaat Südafrika"
 ocupation_zone_creation_BSS_desc:0 "Der Burenstaat Südafrika war eine von den südafrikanischen Nationalisten vorgeschlagene lokale Verwaltung. Diese wurde nie gegründet und blieb lediglich ein Vorschlag."
 create_occupation_zone_BSS:0 "Da wir nun Südafrika kontrollieren, können wir eine neue lokale Verwaltung schaffen, um die Interessen des Reichs besser zu unterdrücken."
 
 ocupation_zone_creation_ENG:0 "Teilung des Vereinigten Königreichs und Nordirlands"
 ocupation_zone_creation_ENG_desc:0 "Nach der Kapitulation der Heimatarmee in England können wir auf den Britischen Inseln eine neue Verwaltung einrichten und das Britische Empire unter unseren Verbündeten aufteilen."
