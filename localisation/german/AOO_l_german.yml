 japchi.10.t:0 "Die internationale Siedlung Shanghai"
 japchi.10.d:0 "Die Internationale Siedlung Shanghai entstand 1863 aus dem Zusammenschluss der britischen und amerikanischen Enklaven in Shanghai, Teilen des Qing-Reiches, die aufgrund einer Reihe ungleicher Verträge exterritorial gehalten wurden. 1931 diente der angebliche „Schutz japanischer Kolonisten vor chinesischer Aggression“ in Hongkew als Vorwand für den Shanghai-Zwischenfall, als japanische Truppen in Shanghai einmarschierten. Von da an bis zum Zweiten Japanisch-Chinesischen Krieg (1937–1945) befand sich Hongkew fast vollständig außerhalb der Kontrolle des SMC. Recht und Schutz wurden in unterschiedlichem Maße von der japanischen Konsularpolizei und japanischen Mitgliedern der Stadtpolizei von Shanghai durchgesetzt. In den folgenden fünf Jahren waren die Internationale Siedlung und die Französische Konzession von japanischen Besatzern und chinesischen Revolutionären umzingelt, wobei die Konflikte oft über die Grenzen der Siedlung hinausgingen."
 japchi.10.a:0 "Den Hafen für uns selbst nehmen"
 japchi.10.b:0 "Übergeben Sie den Hafen an China"

