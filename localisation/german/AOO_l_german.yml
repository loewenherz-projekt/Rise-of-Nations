# Italian East Africa Events
 eastafrica.0.t:0 "Ernennung des neuen Generalgouverneurs"
 eastafrica.0.d:0 "Während des Zweiten Italienisch-Abessinien-Krieges 1935/36 war Graziani Kommandeur der Südfront. Seine Armee marschierte von Italienisch-Somaliland aus in Äthiopien ein und er befehligte die italienischen Streitkräfte in den Schlachten von Genale Doria und Ogaden. Nach dem Krieg wurde Graziani Vizekönig von Italienisch-Ostafrika und Generalgouverneur von Shewa/Addis Abeba. Nach einem erfolglosen Attentat zweier Eritreer am 19. Februar 1937 (und nach weiteren Morden an Italienern im besetzten Äthiopien) befahl Graziani einen blutigen und wahllosen Vergeltungsschlag gegen das eroberte Land, der den Äthiopiern später als „Yekatit 12“ in Erinnerung blieb. Bis zu 30.000 Zivilisten in Addis Abeba wurden wahllos getötet; weitere 1.469 wurden bis Ende des darauffolgenden Monats standrechtlich hingerichtet, und über 1.000 äthiopische Honoratioren wurden inhaftiert und anschließend aus Äthiopien verbannt. Graziani wurde als „der Schlächter Äthiopiens“ bekannt."
 eastafrica.0.a:0 "Apoint Rodolfo Graziani"

 eastafrica.1.t:0 "Ernennung des neuen Generalgouverneurs"
 eastafrica.1.d:0 "1937, nach der italienischen Eroberung Äthiopiens im Zweiten Italienisch-Abessinien-Krieg, löste der Herzog von Aosta Marschall Graziani als Vizekönig und Generalgouverneur von Italienisch-Ostafrika ab. Man räumte allgemein ein, dass er eine enorme Verbesserung gegenüber Graziani darstellte. Als Vizekönig und Generalgouverneur war der Herzog von Aosta auch Oberbefehlshaber aller italienischen Streitkräfte in Eritrea, Äthiopien und Italienisch-Somaliland."
 eastafrica.1.a:0 "Apoint Prince Amadeo"

 eastafrica.2.t:0 "Ernennung des neuen Generalgouverneurs"
 eastafrica.2.d:0 "General Gazzera befehligte während des Ostafrikafeldzugs Streitkräfte im „Südsektor“ (Gebiet Galla und Sidamo um Jimma). Nach dem Fall von Amba Alagi im Mai 1941 trat Gazzera die Nachfolge von Amedeo, Herzog von Aosta, als amtierender Vizekönig und Generalgouverneur von Italienisch-Ostafrika an."
 eastafrica.2.a:0 "Apoint Pietro Gazzera"

 eastafrica.3.t:0 "Ernennung des neuen Generalgouverneurs"
 eastafrica.3.d:0 "Nach Beginn des Zweiten Weltkriegs führte Nasi im August 1940 die italienische Eroberung Britisch-Somalilands an. Er drang erfolgreich in Britisch-Somaliland ein und zwang die verteidigenden britischen und Commonwealth-Streitkräfte, dank Luftunterstützung und Panzern, zur Evakuierung über den Seeweg nach Aden, nachdem er den Hauptteil ihrer Armee in der Schlacht von Tug Argan vom 11. bis 15. August besiegt hatte. Während des Ostafrikafeldzugs führte Nasi den letzten Widerstand einer italienischen Garnison in Ostafrika an. Am 6. Juli, nach der Kapitulation von Herzog Amedeo von Aosta und General Pietro Gazzera, wurde Nasi amtierender Vizekönig und Generalgouverneur von Italienisch-Ostafrika. Er hielt zwar noch lange durch, nachdem andere italienische Festungen gefallen waren, gab aber seine Festung Gondar schließlich am 28. November 1941 auf."
 eastafrica.3.a:0 "Apoint Guglielmo Nasi"

# Italian North Africa Events
 northafrica.0.t:0 "Ernennung des neuen Generalgouverneurs"
 northafrica.0.d:0 "Während des Zweiten Italienisch-Abessinien-Krieges 1935/36 war Graziani Kommandeur der Südfront. Seine Armee marschierte von Italienisch-Somaliland aus in Äthiopien ein und er befehligte die italienischen Streitkräfte in den Schlachten von Genale Doria und Ogaden. Nach dem Krieg wurde Graziani Vizekönig von Italienisch-Ostafrika und Generalgouverneur von Shewa/Addis Abeba. Nach einem erfolglosen Attentat zweier Eritreer am 19. Februar 1937 (und nach weiteren Morden an Italienern im besetzten Äthiopien) befahl Graziani einen blutigen und wahllosen Vergeltungsschlag gegen das eroberte Land, der den Äthiopiern später als „Yekatit 12“ in Erinnerung blieb. Zu Beginn des Zweiten Weltkriegs war Graziani noch Oberbefehlshaber des Generalstabs der Regio Esercito. Nach dem Tod von Marschall Italo Balbo bei einem Friendly Fire-Vorfall am 28. Juni 1940 übernahm Graziani dessen Platz als Oberbefehlshaber von Italienisch-Nordafrika und als Generalgouverneur von Libyen."
 northafrica.0.a:0 "Apoint Rodolfo Graziani"

 northafrica.1.t:0 "Ernennung des neuen Generalgouverneurs"
 northafrica.1.d:0 "Italo Gariboldi war vor und während des Zweiten Weltkriegs ein hochrangiger Offizier der Königlich Italienischen Armee (Regio Esercito). Von 1939 bis 1941 diente Gariboldi als Armeekommandeur in Marschall Italo Balbos „Oberkommando Nordafrika“. Als Italien im Juni 1940 den Krieg erklärte, befehligte Gariboldi die italienische Fünfte Armee, die an der Grenze zu Französisch-Tunesien stationiert war. Zuletzt befehligte er beide in Libyen stationierten Armeen. Nach dem Ende der Schlacht um Frankreich versorgte die Fünfte Armee die italienische Zehnte Armee an der Grenze zu Ägypten mit Männern, Einheiten und Nachschub. Im Dezember 1940, als die Briten die Operation Compass starteten, hatte Gariboldi vorübergehend das Kommando über die Zehnte Armee, da General Mario Berti krankgeschrieben war. Schließlich wurde ihm das Kommando über die Zehnte Armee übertragen, nachdem diese praktisch vernichtet worden war und Bertis Nachfolger, General Giuseppe Tellera, im Kampf gefallen war. Am 25. März 1941 wurde Gariboldi zum Generalgouverneur von Libyen befördert und ersetzte Marschall Rodolfo Graziani. Am 19. Juli wurde Gariboldi selbst wegen seiner angeblichen mangelnden Zusammenarbeit mit Rommel entlassen."
 northafrica.1.a:0 "Apoint Italo Gariboldi"

 northafrica.2.t:0 "Ernennung des neuen Generalgouverneurs"
 northafrica.2.d:0 "Ettore Bastico war ein italienischer Offizier vor und während des Zweiten Weltkriegs. Er war nicht nur General der Königlich Italienischen Armee, sondern auch Senator und Gouverneur. Er hatte hohe Kommandos während des Zweiten Italienisch-Abessinischen Krieges (Äthiopien), des Spanischen Bürgerkriegs und des Afrikafeldzugs inne. Am 19. Juli 1941 wurde Bastico zum Oberbefehlshaber aller Achsenmächte in Nordafrika ernannt. Als Rommels Vorgesetzter im Afrikafeldzug mussten seine Pläne zunächst von Bastico genehmigt werden. Am 12. August 1942 wurde Bastico zum Marschall von Italien (Maresciallo d&#39;Italia) befördert, hauptsächlich um zu vermeiden, dass er im Rang niedriger als Rommel war. Als Libyen beim Vormarsch der 8. Armee verloren ging, war er ab dem 2. Februar 1943 für den Rest des Krieges ohne Kommando."
 northafrica.2.a:0 "Apoint Ettore Bastico"

 northafrica.3.t:0 "Ernennung des neuen Generalgouverneurs"
 northafrica.3.d:0 "Giovanni Messe war ein italienischer General, Politiker und Feldmarschall (Maresciallo d&#39;Italia). Viele halten ihn für den besten italienischen General des Zweiten Weltkriegs. Im Februar 1943 wurde Messe zum neuen Kommandeur der Deutsch-Italienischen Panzerarmee ernannt, die zuvor Erwin Rommel befehligt hatte. Der Name wurde in 1. Italienische Armee geändert, da die Armee aus einem deutschen und drei italienischen Korps bestand. Rommel wurde zum Kommandeur der neuen Heeresgruppe Afrika befördert. Messe kämpfte in einer Verteidigungskampagne gegen die vorrückenden amerikanischen und britischen Streitkräfte und wurde an der Mareth-Linie besiegt. Seine fortwährenden taktischen Verzögerungen der alliierten Offensive konnten die unvermeidliche Niederlage der Achsenmächte in Nordafrika nicht verhindern. Am 12. Mai 1943 wurde Messe zum Marschall von Italien (Maresciallo d&#39;Italia) befördert. Am 13. Mai, nach dem Zusammenbruch der 5. deutschen Panzerarmee, dem Fall von Tunis und der Einkesselung der 1. italienischen Armee, die immer noch die Stellung bei Enfidaville hielt, kapitulierte er formell vor den Alliierten."
 northafrica.3.a:0 "Apoint Giovanni Messe"

# Philippine Executive Commission-Second Philippine Republic Events
 philippines.0.t:0 "Der neue Präsident"
 philippines.0.d:0 "Als die Japaner 1941 in das Land einmarschierten, wurde Vargas als Sekretär ins Verteidigungsministerium berufen. Wenige Wochen später ernannte ihn Präsident Manuel Quezon 1941 zum Bürgermeister des Großraums Manila. Zu seinen Aufgaben gehörte die Verwaltung der offenen Stadt nach der Ankunft der Besatzungstruppen der Kaiserlich Japanischen Armee am 2. Januar 1942. 1942 wurde Vargas Vorsitzender der von Japan unterstützten Philippinischen Exekutivkommission. Während der kollaborierenden Zweiten Philippinischen Republik wurde er einmal von den Japanern gebeten, das Präsidentenamt zu übernehmen, was er jedoch ablehnte. Stattdessen diente er als Botschafter des Regimes in Japan. In dieser Funktion wurde er kurz vor der Vertreibung der japanischen Truppen aus Manila mit den Worten zitiert: „Wir wissen, dass Japan für immer und ewig der Sieg und Wohlstand vorherbestimmt ist.“"
 philippines.0.a:0 "Put Jorge B. Vargas"

 philippines.1.t:0 "Der neue Militärgouverneur"
 philippines.1.d:0 "Masaharu Homma (27. November 1887 – 3. April 1946) war Generalleutnant der Kaiserlich Japanischen Armee während des Zweiten Weltkriegs. Homma befehligte die 14. japanische Armee, die auf den Philippinen einmarschierte und den Todesmarsch von Bataan durchführte. Nach dem Krieg wurde Homma wegen Kriegsverbrechen im Zusammenhang mit den Aktionen von Truppen unter seinem direkten Kommando verurteilt und am 3. April 1946 durch ein Erschießungskommando hingerichtet."
 philippines.1.a:0 "Ernennung von Masaharu Homma"

 philippines.2.t:0 "Der neue Militärgouverneur"
 philippines.2.d:0 "Hizuichi Tanaka (1. Oktober 1887 – 24. August 1945) war General der Kaiserlich Japanischen Armee und am Ende des Zweiten Weltkriegs Kommandeur der Ostbezirksarmee, die das Gebiet Tokio-Yokohama abdeckte. 1942 wurde Tanaka als Kommandeur der 14. Armee der Kaiserlich Japanischen Armee auf die Philippinen entsandt und war anschließend von 1942 bis 1943 Militärgouverneur der Philippinen. 1943 wurde er zum General befördert, musste aber Anfang 1944 nach Japan zurückkehren, um sich von einer Malaria-Erkrankung zu erholen. Von 1944 bis 1945 war Tanaka Mitglied des Obersten Kriegsrates und diente zudem als Kommandant des Army War College. Am 19. März 1945 wurde er zum Oberbefehlshaber der Ostbezirksarmee ernannt."
 philippines.2.a:0 "Ernennung von Shizuichi Tanaka"

 philippines.3.t:0 "Der neue Militärgouverneur"
 philippines.3.d:0 "Shigenori Kuroda (5. Oktober 1887 – 30. April 1952) war ein japanischer General der japanischen Kaiserlichen Armee und japanischer Generalgouverneur der Philippinen während des Zweiten Weltkriegs. Vom 28. Mai 1943 bis zum 26. September 1944 war er Militärgouverneur der Philippinen und trat in diesem Amt die Nachfolge von Shizuichi Tanaka an. Später wurde er vom 28. Juli bis zum 26. September 1944 der erste Oberbefehlshaber der 14. japanischen Gebietsarmee auf den Philippinen, die aus den fusionierten Teilen der 14., 35. und 41. japanischen Armee bestand. Während seiner Herrschaft auf den Philippinen wurde von der Vorbereitungskommission für die Unabhängigkeit, bestehend aus 20 Mitgliedern des KALIBAPI, eine Verfassung ausgearbeitet. Die Vorbereitungskommission unter Leitung von José P. Laurel legte am 4. September 1943 ihren Verfassungsentwurf vor, der drei Tage später von der Generalversammlung des KALIBAPI ratifiziert wurde. Bis zum 20. September 1943 wählten die repräsentativen Gruppen des KALIBAPI in den Provinzen und Städten des Landes aus ihrer Mitte 54 Mitglieder der Philippinischen Nationalversammlung, der Legislative des Landes, mit 54 Gouverneuren und Bürgermeistern als Mitgliedern von Amts wegen. Drei Tage nach der Gründung der Nationalversammlung fand die konstituierende Sitzung der Zweiten Philippinischen Republik im Legislativgebäude aus der Vorkriegszeit statt und wählte mit Mehrheit Benigno S. Aquino zu ihrem ersten Sprecher und José P. Laurel zum Präsidenten der Republik der Philippinen, der am 14. Oktober 1943 bei der Gründung der Republik vereidigt wurde."
 philippines.3.a:0 "Ernennen Sie Shigenori Kuroda"

 philippines.4.t:0 "Die Philippinische Republik"
 philippines.4.d:0 "Die Zweite Philippinische Republik, offiziell Republik der Philippinen (Filipino; Republika ng Pilipinas, Spanisch; República de Filipinas), war ein Marionettenstaat, der am 14. Oktober 1943 während der japanischen Besatzung gegründet wurde. Präsident Manuel L. Quezon erklärte die Hauptstadt Manila zur „offenen Stadt“ und übergab sie der Herrschaft von Jorge B. Vargas als Bürgermeister. Die Japaner marschierten am 2. Januar 1942 in die Stadt ein und machten sie zur Hauptstadt. Japan eroberte die Philippinen am 6. Mai 1942 nach der Schlacht von Corregidor vollständig. General Masaharu Homma verfügte die Auflösung des Commonwealth der Philippinen und gründete im Januar 1942 die philippinische Exekutivkommission, eine Übergangsregierung, mit Vargas als erstem Vorsitzenden Tagapagpaganap ng Pilipinas), ein am 8. Dezember 1942 verabschiedetes Gesetz, das alle bestehenden politischen Parteien verbot und ein neues Regierungsbündnis gründete. Ihr erster Generaldirektor war Benigno Aquino sen. Die pro-japanische Ganap-Partei, die die Japaner als Retter des Archipels betrachtete, wurde in die KALIBAPI aufgenommen."
 philippines.4.a:0 "Gründung der Zweiten Philippinischen Republik"
 philippines.4.b:0 "Fortsetzung der militärischen Besetzung"

 philippines.5.t:0 "Der neue Präsident"
 philippines.5.d:0 "José P. Laurel, PLH (geb. José Paciano Laurel García; 9. März 1891 – 6. November 1959) war ein philippinischer Politiker und Richter. Von 1943 bis 1945 war er Präsident der Zweiten Philippinischen Republik, einem japanischen Marionettenstaat während der Besetzung im Zweiten Weltkrieg. Seit der Amtszeit von Präsident Diosdado Macapagal (1961–1965) gilt Laurel als legitimer Präsident der Philippinen."
 philippines.5.a:0 "Ernennung von José P. Laurel"

# Spain Events
 accspain.0.t:0 "Spanien in die Achsenmächte einladen?"
 accspain.0.d:0 "Von Beginn des Zweiten Weltkriegs an bevorzugte Spanien die Achsenmächte. Abgesehen von ideologischen Gründen hatte Spanien während des Bürgerkriegs Schulden bei Deutschland in Höhe von 212 Millionen Dollar für Materiallieferungen. Tatsächlich hatte der spanische Botschafter in Berlin im Juni 1940, nach dem Fall Frankreichs, ein Memorandum vorgelegt, in dem Franco erklärte, er sei „unter bestimmten Bedingungen bereit, auf der Seite Deutschlands und Italiens in den Krieg einzutreten“. Franco hatte sich im Juni 1940 vorsichtig für den Kriegseintritt auf Seiten der Achsenmächte entschieden. Um sein Volk auf den Krieg vorzubereiten, starteten die spanischen Medien eine antibritische und antifranzösische Kampagne mit der Forderung nach Französisch-Marokko, Kamerun und der Rückgabe Gibraltars. Am 19. Juni 1940 drängte Franco Hitler auf eine Botschaft, in der er seinen Kriegseintritt bekundete. Hitler war jedoch verärgert über Francos Forderung nach der französischen Kolonie Kamerun, die vor dem Ersten Weltkrieg deutsch gewesen war und die Hitler zurückerobern wollte."
 accspain.0.a:0 "Schlagen Sie ein Bündnis im Austausch gegen Land vor"
 accspain.0.b:0 "Schlagen Sie eine Allianz im Austausch gegen Ressourcen vor"
 accspain.0.c:0 "Schlagen Sie eine Allianz vor"
 accspain.0.e:0 "Es besteht keine Notwendigkeit"

 accspain.1.t:0 "Eine Allianz für Land"
 accspain.1.d:0 "Von Beginn des Zweiten Weltkriegs an bevorzugte Spanien die Achsenmächte. Neben ideologischen Gründen hatte Spanien während des Bürgerkriegs Schulden bei Deutschland in Höhe von 212 Millionen Dollar für Materiallieferungen. Im Juni 1940, nach dem Fall Frankreichs, legte der spanische Botschafter in Berlin ein Memorandum vor, in dem Franco erklärte, er sei „unter bestimmten Bedingungen bereit, auf der Seite Deutschlands und Italiens in den Krieg einzutreten“. Franco hatte sich im Juni 1940 vorsichtig für den Kriegseintritt auf Seiten der Achsenmächte entschieden. Um sein Volk auf den Krieg vorzubereiten, starteten die spanischen Medien eine antibritische und antifranzösische Kampagne mit Forderungen nach Französisch-Marokko, Kamerun und der Rückgabe Gibraltars."
 accspain.1.a:0 "Akzeptieren"
 accspain.1.b:0 "Verweigern"

 accspain.2.t:0 "Eine Allianz für Ressourcen"
 accspain.2.d:0 "Von Beginn des Zweiten Weltkriegs an bevorzugte Spanien die Achsenmächte. Abgesehen von ideologischen Gründen hatte Spanien während des Bürgerkriegs Schulden bei Deutschland in Höhe von 212 Millionen Dollar für Materiallieferungen. Nun bietet Deutschland uns an, die Schulden zu erlassen, wenn wir auf seiner Seite in den Krieg eintreten, und bietet uns zusätzlich zusätzliche Ressourcen für den Krieg an."
 accspain.2.a:0 "Akzeptieren"
 accspain.2.b:0 "Verweigern"

 accspain.3.t:0 "Eine Allianz aus Deutschland"
 accspain.3.d:0 "Seit Beginn des Zweiten Weltkriegs war Spanien auf der Seite der Achsenmächte. Nun bietet uns Deutschland ein Bündnis an, um gemeinsam gegen Bolschewismus und Kapitalismus zu kämpfen."
 accspain.3.a:0 "Akzeptieren"
 accspain.3.b:0 "Verweigern"

 accspain.4.t:0 "Spanien akzeptiert!"
 accspain.4.d:0 "Spanien hat die Bedingungen unseres Bündnisses akzeptiert, die Welt soll vor unserer Macht erzittern."
 accspain.4.a:0 "Großartig"

 accspain.5.t:0 "Spanien lehnt ab"
 accspain.5.d:0 "Spanien hat unser Bündnis abgelehnt, wir sollten ihnen eine Lektion erteilen …"
 accspain.5.a:0 "Bereiten Sie eine Invasion vor!"
 accspain.5.b:0 "Sie werden sich uns anschließen ... eines Tages"

 accspain.6.t:0 "Spanien den Krieg erklären"
 accspain.6.d:0 "Operation Felix war der Deckname für die geplante deutsche Eroberung Gibraltars im Zweiten Weltkrieg, die von der Kooperation des spanischen Diktators Francisco Franco abhängig war. Sie wurde nie durchgeführt, hauptsächlich aufgrund von Francos Widerwillen gegen einen Kriegseintritt. Hitler wusste nicht, dass sein eigener Gesandter, Admiral Wilhelm Canaris, Chef der Abwehr (des Geheimdienstes), eine geheime Widerstandsbewegung leitete und eng mit Franco zusammenarbeitete, indem er bestimmte Bedingungen stellte, die Hitler mit Sicherheit ablehnen würde. Dies bedeutete das Scheitern der Verhandlungen. Und sie sind gescheitert ..."
 accspain.6.a:0 "Starten Sie Operation Felix"
 accspain.6.b:0 "Zurück nach unten"

 accspain.7.t:0 "Deutsche Ressourcen"
 accspain.7.d:0 "Die deutschen Ressourcen sind heute im Hafen von La Coruña angekommen, jetzt beginnt unsere Zusammenarbeit."
 accspain.7.a:0 "Exzellent"

 accspain.8.t:0 "Besetzung Spaniens"
 accspain.8.d:0 "Wir haben Spanien besetzt, jetzt müssen wir entscheiden, was wir mit diesem Land machen."
 accspain.8.a:0 "Installieren Sie ein Satellitenregime"
 accspain.8.b:0 "Es besteht keine Notwendigkeit"

# Danzig Events
 danzig.0.t:0 "Annexion Danzigs"
 danzig.0.d:0 "Wir haben die Freie Stadt Danzig befreit. Jetzt ist es an der Zeit, alle deutschen Völker wieder zu vereinen."
 danzig.0.a:0 "Annex Danzig"

