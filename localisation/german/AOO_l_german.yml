# SS-Staat Burgundy
 ssburgundy.0.t:0 "Gründung des SS-Staates Burgund"
 ssburgundy.0.d:0 "Der SS-Staat Burgund (auf Deutsch „SS-Staat Burgund“) oder Ordensstaat Burgund (auf Deutsch „Ordensstaat Burgund“, ein historischer Bezug auf den Staat des Deutschen Ordens) war ein geplanter Staat, den die Führung Nazideutschlands während des Zweiten Weltkriegs in bestimmten Gebieten Westeuropas errichten wollte."
 ssburgundy.0.a:0 "Fahren Sie mit der Erstellung fort"
 ssburgundy.0.b:0 "Es besteht keine Notwendigkeit"

# Japanese Indochina
 japjic.0.t:0 "Die Zukunft Indochinas"
 japjic.0.d:0 "Da wir nun das indochinesische Gebiet kontrollieren, können wir den lokalen Eliten Macht über die inneren Angelegenheiten der verschiedenen Gebiete geben oder wir können in Indochina eine richtige Kolonie gründen, die nur unseren Interessen dient. Diese Option könnte auf lange Sicht nachteilig sein."
 japjic.0.a:0 "Geben Sie das Land den lokalen Führern"
 japjic.0.b:0 "Behalten Sie die ordnungsgemäße Kolonialverwaltung bei"

# Japanese China (Chinese Reconquest)
 japchi.0.t:0 "Die Zukunft von Shaanxi"
 japchi.0.d:0 "Die Ländereien des Shaanxi-Kriegsherrn stehen nun unter der Kontrolle unseres geliebten Kaisers. Nun müssen wir entscheiden, was wir mit diesen Ländern tun. Wir können sie unserer treuen Marionette in Nanjing, Wang Kemin, geben, um seine Herrschaft über China weiter zu stärken. Wir könnten auch den alten Kriegsherrn wieder an die Macht bringen, allerdings unter absoluter Loyalität zu uns, oder wir könnten die Ländereien direkt kontrollieren."
 japchi.0.a:0 "Integrieren Sie die lokale Regierung in die Wang-Administration und Mengukukuo"
 japchi.0.b:0 "Lassen Sie dem Kriegsherrn etwas Unabhängigkeit"
 japchi.0.c:0 "Shaanxi direkt integrieren"

