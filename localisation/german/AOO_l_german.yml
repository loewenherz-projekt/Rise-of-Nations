 ocupation_zone_creation_IPT:0 "Gründung des Protektorats Tunis"
 ocupation_zone_creation_IPT_desc:0 "1940, kurz vor Beginn des Zweiten Weltkriegs, forderte Mussolini Frankreich auf, Tunesien (zusammen mit Dschibuti, Korsika und Nizza) an Italien abzutreten. Doch erst im November 1942 besetzten italienische Truppen (mit Rommels Hilfe) Tunesien und entrissen es dem Vichy-Regime."
 expand_occupation_zone_IPT:0 "Da wir nun das Land Tunis kontrollieren, können wir eine neue lokale Verwaltung schaffen, um die Interessen des Ducce und des italienischen Volkes besser zu vertreten."

# Chinese Reunification Wars
 reunification_china_decisions_JAP:0 "Chinesische Wiedervereinigung"
 reunification_china_decisions_JAP_desc:0 "Die kaiserlich-japanischen Streitkräfte haben die letzten Reste der chinesischen loyalistischen Streitkräfte besetzt, und wir haben die Kontrolle über China an Wang Jingwei und eine loyale Regierung abgetreten. Allerdings gibt es noch immer Truppenensembles, die Chiang Kai-shek und den lokalen Kriegsherren treu ergeben sind und von der Shanghaier Regierung unabhängig bleiben. Wir werden nun eine neue Offensive starten und diese Enklaven unterwerfen."
 
 treaty_ports:0 "Die Zukunft der Vertragshäfen"
 treaty_ports_desc:0 "Da wir nun die Vertragshäfen kontrollieren, können wir entscheiden, was wir mit ihnen tun."
 
 reunification_war_shaanxi:0 "Die Shanxi-Ofensive"
 reunification_war_shaanxi_desc:0 "Starten Sie eine Offensive gegen Yan Xishan und ihre loyale Regierung in der Shanxi-Clique."
 reunification_surrender_shaanxi:0 "Die Kapitulation von Shanxi"
 reunification_surrender_shaanxi_desc:0 "Die Shanxi-Clique war eine von mehreren militärischen Gruppierungen, die sich während der chinesischen Kriegsherren-Ära von der Beiyang-Armee abspalteten. Heute steht sie unter fester japanischer Kontrolle."

 reunification_war_xibei:0 "Der Xibei San Ma Ofensive"
 reunification_war_xibei_desc:0 "Starten Sie eine Offensive gegen Ma Bufang und ihre loyale Regierung in der Ma-Clique."
 reunification_surrender_xibei:0 "Die Kapitulation von Xibei San Ma"
 reunification_surrender_xibei_desc:0 "Die Ma-Clique ist ein Sammelbegriff für eine Gruppe von Hui-Kriegsherren (muslimische Chinesen) im Nordwesten Chinas, die von 1919 bis 1928 zehn Jahre lang über die chinesischen Provinzen Qinghai, Gansu und Ningxia herrschten. Nach dem Sturz der Qing-Dynastie 1911 geriet die Region unter die Kontrolle des chinesischen muslimischen Kriegsherrn Ma Qi, bis der Nordfeldzug der Republik China 1928 die zentrale Kontrolle festigte. Der Ma-Clique gehörten drei Familien an, die jeweils drei Gebiete kontrollierten: Gansu, Qinghai und Ningxia. Die drei bekanntesten Mitglieder der Clique waren Ma Bufang, Ma Hongkui und Ma Hongbin, die zusammen als Xibei San Ma bekannt sind. Heute steht sie fest unter japanischer Kontrolle."

 reunification_war_yunnan:0 "Der Yunnan Ofensive"
 reunification_war_yunnan_desc:0 "Starten Sie eine Offensive gegen Long Yun und ihre loyale Regierung in der Yunnan-Clique."
 reunification_surrender_yunnan:0 "Die Kapitulation von Yunnan"
 reunification_surrender_yunnan_desc:0 "Die Yunnan-Clique war eine von mehreren verfeindeten Cliquen oder Fraktionen, die sich während der Kriegsherrenzeit der Republik China von der Beiyang-Regierung abspalteten. 1927 übernahm Long Yun die Kontrolle über die Clique. Sie wurde nach der Provinz Yunnan benannt. Heute steht sie unter fester japanischer Kontrolle."

 reunification_war_guangxi:0 "Die Guangxi Clique Ofensive"
 reunification_war_guangxi_desc:0 "Starten Sie eine Offensive gegen Li Zongren und ihre loyale Regierung in der Guangxi-Clique."
 reunification_surrender_guangxi:0 "Die Kapitulation der Guangxi-Clique"
 reunification_surrender_guangxi_desc:0 "Nach der Gründung der Republik China diente Guangxi als Basis für eine der mächtigsten Kriegsherrencliquen Chinas: die Alt-Guangxi-Clique. Unter der Führung von Lu Rongting und anderen gelang es der Clique, auch die benachbarten Provinzen Hunan und Guangdong unter ihre Kontrolle zu bringen. Die Alt-Guangxi-Clique zerfiel Anfang der 1920er Jahre und wurde durch die Neu-Guangxi-Clique unter der Führung von Li Zongren, Huang Shaohong und Bai Chongxi ersetzt. Heute steht sie fest unter japanischer Kontrolle."

 reunification_war_sinkiang:0 "Der Sinkiang Ofensive"
 reunification_war_sinkiang_desc:0 "Starten Sie eine Offensive gegen Sheng Shicai und ihre loyalistische Regierung im Sinkiang."
 reunification_surrender_sinkiang:0 "Die Kapitulation von Sinkiang"
 reunification_surrender_sinkiang_desc:0 "1912 wurde die Qing-Dynastie durch die Republik China abgelöst. Yuan Dahua, der letzte Qing-Gouverneur von Xinjiang, floh. Einer seiner Untergebenen, Yang Zengxin, übernahm die Kontrolle über die Provinz und trat im März desselben Jahres nominell der Republik China bei. Durch einen Ausgleich der ethnisch gemischten Wählergruppen behielt Yang die Kontrolle über Xinjiang bis zu seiner Ermordung 1928 nach dem Nordfeldzug der Kuomintang. Heute steht die Provinz fest unter japanischer Kontrolle."

 reunification_war_tibet:0 "Der Tibet Ofensive"
 reunification_war_tibet_desc:0 "Starten Sie eine Offensive gegen den Dalai Lama und seine unabhängige Regierung in Tibet."
 reunification_surrender_tibet:0 "Die Kapitulation Tibets"
 reunification_surrender_tibet_desc:0 "Jetzt steht es fest unter japanischer Kontrolle."

 reunification_war_com_chi:0 "Das kommunistische China Ofensive"
 reunification_war_com_chi_desc:0 "Starten Sie eine Offensive gegen Mao Zedong und seine kommunistische Regierung im Saanxi-Sowjet."
 reunification_surrender_com_chi:0 "Die Kapitulation des kommunistischen China."
 reunification_surrender_com_chi_desc:0 " Die offiziell als Sowjetische Zone bezeichnete Zone war der Teil der Gebiete Chinas, der ab 1927 von der Kommunistischen Partei Chinas kontrolliert wurde. Von 1927 bis 1933 gab es sechs Sowjetgebiete: Ching-kang-shan, den Zentralsowjet in Ost-Kiangsi an der Grenze zu Fujian, den Sowjet O-Yu-Wan (Hupei-Honan-Anwei), Hsiang-o-hsi (West-Hupei und Hunan) und Hsiang-kan (Hunan-Kiangsi). Der erste Sowjet war der 1927 gegründete Sowjet von Hailufeng. Der Zentralsowjet war die wichtigste Basis der Kommunistischen Partei, und Parteichef Mao Zedong erließ am 1. September 1931 die Anweisung an den Zentralsowjet, die Region als Basisgebiet massenhaft zu mobilisieren. Als Probleme bei der Kontrolle der Gebiete außerhalb des Zentralsowjets auftraten, gelang 1933 die vollständige Übergabe der kommunistischen Streitkräfte an den Zentralsowjet. Heute steht er unter fester Kontrolle Japans."

