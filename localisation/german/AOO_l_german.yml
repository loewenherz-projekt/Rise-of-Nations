# Generalgouvernement Events
### Creation
 generalg.0.t:0 "Gründung des Generalgouvernements"
 generalg.0.d:0 "Das Generalgouvernement (deutsch: Generalgouvernement, polnisch: Generalne Gubernatorstwo, auch Generalgouvernement genannt) war eine deutsche Besatzungszone, die nach der gemeinsamen Invasion Polens durch Nazideutschland und die Sowjetunion 1939 zu Beginn des Zweiten Weltkriegs eingerichtet wurde. Die neu besetzte Zweite Polnische Republik war in drei Zonen aufgeteilt: das Generalgouvernement in der Mitte, die von Nazideutschland annektierten polnischen Gebiete im Westen und die von der Sowjetunion annektierten polnischen Gebiete im Osten. Das Gebiet wurde 1941 erheblich erweitert und umfasste den neuen Bezirk Galizien."
 generalg.0.a:0 "Machen Sie mit der Schöpfung weiter"
 generalg.0.b:0 "Es besteht keine Notwendigkeit"

 ### Stellvertreter des Generalgouverneurs
 generalg.1.t:0 "Der Stellvertreter des Generalgouverneurs"
 generalg.1.d:0 "Nach dem Einmarsch in Polen wurde Seyß-Inquart Verwaltungschef für Südpolen, trat diesen Posten jedoch erst mit der Gründung des Generalgouvernements an, in dem er Stellvertreter des Generalgouverneurs Hans Frank wurde. Er unterstützte die von Frank umgesetzte harte Politik, einschließlich der Verfolgung der Juden, voll und ganz. Er war sich auch der Ermordung Dutzender polnischer Intellektueller durch die Abwehr bewusst."
 generalg.1.a:0 "Ernennung von Arthur Seyß-Inquart"

 generalg.2.t:0 "Der Stellvertreter des Generalgouverneurs"
 generalg.2.d:0 "1938 übertrug ihm Hans Frank, inzwischen Reichsminister ohne Geschäftsbereich, die Leitung seines Kabinettsbüros. Nach dem Einmarsch Nazideutschlands in Polen im September 1939 wurde Frank zum Generalgouverneur für die besetzten polnischen Gebiete ernannt und Bühler begleitete ihn nach Krakau, um den Posten des Staatssekretärs im Generalgouvernement anzutreten und gleichzeitig als Franks Stellvertreter zu dienen. Etwa zur selben Zeit verlieh ihm Reichsführer-SS Heinrich Himmler den Ehrenrang eines SS-Brigadeführers. Bühler nahm am 20. Januar 1942 als Vertreter des Büros des Generalgouverneurs an der Wannseekonferenz teil. Während dieser Konferenz, bei der die Durchsetzung der „Endlösung der Judenfrage im deutschen Einflussbereich in Europa“ erörtert wurde, erklärte Bühler den anderen Konferenzteilnehmern, wie wichtig es sei, „die Judenfrage im Generalgouvernement so schnell wie möglich“ zu lösen."
 generalg.2.a:0 "Ernennung von Josef Bühler"

# Böhmen und Mähren Events
### Creation 
 bohmah.0.t:0 "Gründung des Reichsprotektorats Böhmen und Mähren"
 bohmah.0.d:0 "Das Protektorat Böhmen und Mähren (deutsch: Protektorat Böhmen und Mähren; tschechisch: Protektorát Čechy a Morava) war ein Protektorat Nazi-Deutschlands, das nach der deutschen Besetzung der Tschechoslowakei gegründet wurde. Zuvor, im Jahr 1938, wurde das Sudetenland der Tschechischen Länder mit dem Münchner Abkommen als Reichsgau in Nazi-Deutschland eingegliedert."
 bohmah.0.a:0 "Machen Sie mit der Schöpfung weiter"
 bohmah.0.b:0 "Es besteht keine Notwendigkeit"

 ### Reichsprotektoren
 bohmah.1.t:0 "Die neuen Reichsprotektoren"
 bohmah.1.d:0 "Reinhard Tristan Eugen Heydrich (7. März 1904 – 4. Juni 1942) war ein hochrangiger deutscher Nazi-Funktionär während des Zweiten Weltkriegs und einer der Hauptverantwortlichen für den Holocaust. Am 27. September 1941 wurde Heydrich zum stellvertretenden Reichsprotektor des Protektorats Böhmen und Mähren (des Teils der Tschechoslowakei, der am 15. März 1939 in das Reich eingegliedert wurde) ernannt und übernahm die Kontrolle über das Gebiet. Der Reichsprotektor, Konstantin von Neurath, blieb das nominelle Oberhaupt des Gebiets, wurde jedoch beurlaubt, da Hitler, Himmler und Heydrich der Ansicht waren, sein „sanfter Umgang“ mit den Tschechen habe antideutsche Stimmungen gefördert und antideutschen Widerstand durch Streiks und Sabotage ermutigt. Bei seiner Ernennung sagte Heydrich seinen Beratern: „Wir werden das tschechische Ungeziefer germanisieren.“"
 bohmah.1.a:0 "Ernennung von Reinhard Heydrich"

 bohmah.2.t:0 "Die neuen Reichsprotektoren"
 bohmah.2.d:0 "Kurt Daluege (15. September 1897 – 24. Oktober 1946) war der Chef der uniformierten Ordnungspolizei im nationalsozialistischen Deutschland. Nach der Ermordung Reinhard Heydrichs 1942 diente er als stellvertretender Protektor des Protektorats Böhmen und Mähren. Daluege leitete die deutschen Vergeltungsmaßnahmen für das Attentat, darunter das Massaker von Lidice. Nach dem Ende des Zweiten Weltkriegs wurde er an die Tschechoslowakei ausgeliefert, vor Gericht gestellt, verurteilt und 1946 hingerichtet."
 bohmah.2.a:0 "Ernennung von Kurt Daluege"

 bohmah.3.t:0 "Die neuen Reichsprotektoren"
 bohmah.3.d:0 "Wilhelm Frick (12. März 1877 – 16. Oktober 1946) war ein prominenter deutscher Politiker der NSDAP, der von 1933 bis 1943 Reichsinnenminister im Kabinett Hitler und letzter Gouverneur des Protektorats Böhmen und Mähren war. Nach dem Zweiten Weltkrieg wurde er in den Nürnberger Prozessen wegen Kriegsverbrechen angeklagt und durch den Strang hingerichtet."
 bohmah.3.a:0 "Ernennung von Wilhelm Frick"

# Reichskommissariat Niderlande Events
### Creation
 nider.0.t:0 "Gründung des Reichskommissariats Niederlande"
 nider.0.d:0 "The Reichskommissariat Niederlande was the civilian occupation regime set up by Germany in the German-occupied Netherlands during World War II. Its full title was the Reich Commissariat for the Occupied Dutch Territories (German; Reichskommissariat für die besetzten niederländischen Gebiete). The administration was headed by Arthur Seyss-Inquart, formerly the last chancellor of Austria before initiating its annexation by Germany (the Anschluss)."
 nider.0.a:0 "Machen Sie mit der Schöpfung weiter"
 nider.0.b:0 "Es besteht keine Notwendigkeit"

 ### Führung
 nider.1.t:0 "Die Führung des niederländischen Volkes"
 nider.1.d:0 "Anton Adriaan Mussert (11. Mai 1894 – 7. Mai 1946) war einer der Gründer der Nationalsozialistischen Bewegung in den Niederlanden (NSB) und ihr formeller Anführer. Als solcher war er der prominenteste niederländische Faschist vor und während des Zweiten Weltkriegs. Während des Krieges konnte er diese Position dank der Unterstützung der Deutschen behalten. Nach dem Krieg wurde er wegen Hochverrats verurteilt und hingerichtet."
 nider.1.a:0 "Ernennung von Anton Mussert"

# Reichskommissariat Norwegen Events
### Creation
 norwegen.0.t:0 "Gründung des Reichskommissariats Norwegen"
 norwegen.0.d:0 "The Reichskommissariat Norwegen was the civilian occupation regime set up by Nazi Germany in German-occupied Norway during World War II. Its full title in German was the Reichskommissariat für die besetzten norwegischen Gebiete ("Reich Commissariat for the Occupied Norwegian Territories"). It was governed by Reichskommissar Josef Terboven until his deposition on 7 May 1945. The German military forces in Norway, then under the command of general Franz Böhme, surrendered to the Allied forces on 9 May and the legal government was restored."
 norwegen.0.a:0 "Machen Sie mit der Schöpfung weiter"
 norwegen.0.b:0 "Es besteht keine Notwendigkeit"

 ### Reichkommissar
 norwegen.1.t:0 "Der neue Reichskommissar"
 norwegen.1.d:0 "Franz Friedrich Böhme (15. April 1885 – 29. Mai 1947) war ein österreichischer General der Wehrmacht im Zweiten Weltkrieg. Er diente als Kommandeur des XVIII. Gebirgskorps, Hitlers „bevollmächtigter kommandierender General“ auf dem Balkan und Oberbefehlshaber im deutsch besetzten Norwegen. Böhme stand im Nürnberger Geiselprozess wegen des Massakers an Tausenden serbischen Zivilisten vor Gericht. Er beging im Gefängnis Selbstmord."
 norwegen.1.a:0 "Heißen Sie ihn in Norwegen willkommen"

# Reichskommissariat Norwegen Events
 ### Creation
 ostland.0.t:0 "Gründung des Reichskommissariats Ostland"
 ostland.0.d:0 "Nazi Germany established the Reichskommissariat Ostland (RKO) in 1941 as the civilian occupation regime in the Baltic states (Estonia, Latvia, and Lithuania), the northeastern part of Poland and the west part of the Belarusian SSR during World War II. It was also known initially as Reichskommissariat Baltenland ("Baltic Land"). The political organization for this territory – after an initial period of military administration before its establishment – was that of a German civilian administration, nominally under the authority of the Reich Ministry for the Occupied Eastern Territories (German; Reichsministerium für die besetzten Ostgebiete) led by Nazi ideologist Alfred Rosenberg, but actually controlled by the Nazi official Hinrich Lohse, its appointed Reichskommissar."
 ostland.0.a:0 "Machen Sie mit der Schöpfung weiter"
 ostland.0.b:0 "Es besteht keine Notwendigkeit"

 ### Reichkommissar
 ostland.1.t:0 "Der neue Reichskommissar"
 ostland.1.d:0 "Erich Koch (19. Juni 1896 – 12. November 1986) war von 1928 bis 1945 Gauleiter der NSDAP in Ostpreußen. Zwischen 1941 und 1945 war er Chef der Zivilverwaltung des Bezirks Bialystok. Während dieser Zeit war er von 1941 bis 1944 auch Reichskommissar im Reichskommissariat Ukraine. Nach dem Zweiten Weltkrieg stand Koch in Polen vor Gericht und wurde 1959 wegen Kriegsverbrechen zum Tode verurteilt. Das Urteil wurde ein Jahr später in lebenslange Haft umgewandelt."
 ostland.1.a:0 "Ernennung von Erich Koch"

