 japchi.18.t:0 "Die Xianmen-Konzession"
 japchi.18.d:0 "Die offizielle Vereinbarung zur Gründung der britischen Konzession in Xiamen war in vielerlei Hinsicht informell und sah keine Zukunft für das Strandgelände vor. Sie sicherte der britischen Regierung jedoch das Recht zu, das Strandgelände zu einer Siedlung auszubauen. Es waren britische Offiziere und die Hongs, die die Pläne für das Strandgelände ausarbeiteten, größtenteils basierend auf ihrem persönlichen Wissen und ihrer Erfahrung."
 japchi.18.a:0 "Den Hafen für uns nehmen"
 japchi.18.b:0 "Übergeben Sie den Hafen an China"

 japchi.19.t:0 "Die Qingdao-Konzession"
 japchi.19.d:0 "Das Pachtgebiet Kiautschou-Bucht war ein von Deutschland gepachtetes Gebiet im kaiserlichen und frührepublikanischen China, das von 1898 bis 1914 existierte. Es erstreckte sich über eine Fläche von 552 km² (213 Quadratmeilen) und lag rund um die Jiaozhou-Bucht an der Südküste der Shandong-Halbinsel (deutsch: Schantung-Halbinsel). Jiaozhou wurde im Englischen als Kiaochow, Kiauchau oder Kiao-Chau und im Deutschen als Kiautschou oder Kiaochau romanisiert. Das Verwaltungszentrum war Tsingtau (Pinyin Qingdao). Am 15. August 1914, als der Erste Weltkrieg in Europa ausbrach, stellte Japan Deutschland ein Ultimatum und forderte die Aufgabe der Kontrolle über das umstrittene Gebiet Kiaoutschou. Nach der Ablehnung des Ultimatums erklärte Japan am 23. August den Krieg und bombardierte am selben Tag das deutsche Gebiet mit seiner Marine. Am 7. November 1914 wurde die Bucht von japanischen Streitkräften besetzt (siehe Belagerung von Tsingtau). Nach der Lösung des Shandong-Problems wurde das besetzte Gebiet am 10. Dezember 1922 an China zurückgegeben, doch die Japaner besetzten das Gebiet von 1937 bis 1945 während des Zweiten Japanisch-Chinesischen Krieges erneut."
 japchi.19.a:0 "Den Hafen für uns nehmen"
 japchi.19.b:0 "Übergeben Sie den Hafen an China"
 japchi.19.c:0 "Übergebt den Hafen an Deutschland"

 japchi.20.t:0 "Die Hainan-Konzession"
 japchi.20.d:0 "Hainan ist die kleinste und südlichste Provinz Chinas. Insgesamt gibt es in der Provinz Hainan zehn Großstädte und zehn Landkreise. Die Hauptstadt Haikou an der Nordküste der Insel Hainan ist Sanya, ein beliebtes Touristenziel an der Südküste. Die anderen Großstädte sind Wenchang, Qionghai, Wanning, Wuzhishan, Dongfang und Danzhou."
 japchi.20.a:0 "Den Hafen für uns nehmen"
 japchi.20.b:0 "Übergeben Sie den Hafen an China"

# Mengjiang
 mengjiang.0.t:0 "Benennen Sie das Land um"
 mengjiang.0.d:0 "Nach der Besetzung der Mandschurei durch Japan im Jahr 1931 und der Gründung des Marionettenstaates Mandschukuo versuchte Japan, seinen Einfluss in der Mongolei und Nordchina auszuweiten. In einer Reihe von Aktionen besetzten die Armeen Mandschukuos und Japans ab 1933 Chahar und riefen 1936 die unabhängige Mongolische Militärregierung aus, die unter Prinz Demchugdongrub mit Japan verbündet war. Die am 12. Mai 1936 gegründete Mongolische Militärregierung hatte Prinz Yondonwangchug von Ulanqab als ersten Vorsitzenden. Sie wurde im Oktober 1937 in Mongolische Vereinigte Autonome Regierung umbenannt."
 mengjiang.0.a:0 "Langes Leben der Mongolischen Vereinigten Autonomen Regierung"

 mengjiang.1.t:0 "Benennen Sie das Land um"
 mengjiang.1.d:0 "Am 1. September 1939 wurden die überwiegend von Han-Chinesen bewohnten Gebiete Süd-Chahar und Nord-Shanxi mit der mongolischen Vereinigten Autonomen Regierung zusammengelegt, wodurch die neue Vereinigte Autonome Regierung Mengjiang entstand. Die Hauptstadt wurde in Zhangbei (Changpei) in der Nähe von Kalgan (Zhangjiakou) eingerichtet, wobei sich der Regierungsbereich auf Hohhot erstreckte."
 mengjiang.1.a:0 "Langes Leben Mengjiang"

 mengjiang.2.t:0 "Benennen Sie das Land um"
 mengjiang.2.d:0 "Am 4. August 1941 wurde sie erneut umbenannt: Mongolische Autonome Föderation. 1939 reorganisierte Wang Jingwei die Überreste der besetzten chinesischen Regierung und errichtete einen japanischen Marionettenstaat, ein totalitäres Regime, das heute so treffend als Wang-Jingwei-Regime bezeichnet wird und dessen nominelle Hauptstadt Nanjing war (de facto war Shanghai). Mengjiang wurde 1940 in das Regime eingegliedert, blieb jedoch völlig autonom. Daher die Namensänderung."
 mengjiang.2.a:0 "Lang lebe die Mongolische Autonome Föderation"

