 japchi.14.t:0 "Die Guangzhou-Konzession"
 japchi.14.d:0 "Nach einer Reihe von Schlachten im Perlflussdelta eroberten die Briten am 18. März 1841 Guangzhou selbst. Die Zweite Schlacht von Kanton wurde zwei Monate später geschlagen. Nach dem Vertrag des Qing-Reiches mit Großbritannien im Jahr 1842 verlor Guangzhou seinen privilegierten Handelsstatus, da immer mehr Vertragshäfen für immer mehr Länder geöffnet wurden, darunter normalerweise auch extraterritoriale Enklaven. Inmitten des Niedergangs des Ansehens der Qing und des Chaos des Taiping-Aufstands führten die Punti und Hakka von 1855 bis 1867 eine Reihe von Clankriegen, in denen 1 Million Menschen starben. Die Konzession für die Kanton-Hankow-Eisenbahn wurde 1898 an die American China Development Co. vergeben. Sie stellte ihre Zweigstrecke nach Westen nach Foshan und Sanshui fertig, geriet aber in eine diplomatische Krise, nachdem ein belgisches Konsortium eine Mehrheitsbeteiligung kaufte und die Qing ihre Konzession annullierten. JP Morgan erhielt Schadensersatz in Millionenhöhe, die Strecke nach Wuchang wurde erst 1936 fertiggestellt und eine einheitliche Eisenbahnlinie Peking–Guangzhou wartete bis zur Fertigstellung der Jangtse-Brücke in Wuhan im Jahr 1957."
 japchi.14.a:0 "Den Hafen für uns nehmen"
 japchi.14.b:0 "Übergeben Sie den Hafen an China"

