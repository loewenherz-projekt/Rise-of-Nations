 occupation_decisions_JAP:0 "Schaffung von Satellitenstaaten"
 occupation_decisions_JAP_desc:0 ""

 ocupation_zone_creation_PGC:0 "Gründung der Provisorischen Regierung der Republik China"
 ocupation_zone_creation_PGC_desc:0 "Die Provisorische Regierung der Republik China (Pinyin: Zhōnghuá Mínguó Línshí Zhèngfǔ, oder japanisch: Chūka Minkoku Rinji Seifu) war ein chinesischer Marionettenstaat des Kaiserreichs Japan, der von 1937 bis 1940 während des Zweiten Japanisch-Chinesischen Krieges existierte. Sie wurde größtenteils auf Initiative von Kommandeuren der Kaiserlich Japanischen Armee in Nordchina gegründet, bevor die japanische Regierung in Tokio ihre Zustimmung einholte. Somit hatte die Provisorische Regierung nominelle Autorität in den von Japan besetzten Zonen in Nordchina, während im Süden die Zentralchinesische Expeditionsarmee 1938 eine Reformierte Regierung der Republik China einrichtete, die Autorität im Gebiet des Jangtsekiang hatte."
 create_occupation_zone_PGC:0 "Da wir nun das Land Nordchina kontrollieren, können wir eine neue lokale Verwaltung schaffen, um die Interessen des Kaisers besser zu unterdrücken."

 ocupation_zone_creation_EHC:0 "Eingliederung des Autonomen Rates Ost-Hebei"
 ocupation_zone_creation_EHC_desc:0 "Der Autonome Rat von Ost-Hebei (Pinyin: Jìdōng Fánggòng Zìzhì Zhèngfǔ), auch bekannt als Autonomer Rat Ost-Ji und Autonomer Antikommunistischer Rat Ost-Hebei, war ein kurzlebiger Staat in Nordchina Ende der 1930er Jahre. Historiker beschreiben ihn entweder als japanischen Marionettenstaat oder als Pufferstaat. Die Regierung von Ost-Hebei überlebte den Tungchow-Aufstand Ende Juli 1937, bevor sie im Dezember 1937 in die kollaborierende Provisorische Regierung Chinas eingegliedert wurde."
 create_occupation_zone_EHC:0 "Wir sollten den Autonomen Rat Ost-Hebei in unseren neuen Marionettenstaat in Nordchina integrieren, um die Region besser verwalten zu können."
 
 ocupation_zone_creation_RGC:0 "Gründung der reformierten Regierung der Republik China"
 ocupation_zone_creation_RGC_desc:0 "Die Provisorische Regierung der Republik China (Pinyin: Zhōnghuá Mínguó Línshí Zhèngfǔ, oder japanisch: Chūka Minkoku Rinji Seifu) war ein chinesischer Marionettenstaat des Kaiserreichs Japan, der von 1937 bis 1940 während des Zweiten Japanisch-Chinesischen Krieges existierte. Sie war größtenteils auf Initiative von Befehlshabern der Kaiserlich Japanischen Armee in Nordchina gegründet worden, bevor sie die Zustimmung der japanischen Regierungsbehörden in Tokio einholte. Somit hatte die Provisorische Regierung nominelle Autorität in den von Japan besetzten Gebieten in Nordchina, während im Süden die Zentralchinesische Expeditionsarmee 1938 eine Reformierte Regierung der Republik China errichtete, die Autorität im Gebiet des Jangtsekiang hatte. Beide dienten im Wesentlichen als lokales Organ der japanischen Militärbehörden, da japanische Berater innerhalb der Provisorischen Regierung präsent waren und weitreichende Befugnisse gegenüber einheimischen chinesischen Bürokraten besaßen. Zudem unternahm die Provisorische Regierung nie den Versuch, internationale Anerkennung zu erlangen, nicht einmal von Japan."
 create_occupation_zone_RGC:0 "Da wir nun das Land Zentralchina kontrollieren, können wir eine neue lokale Verwaltung schaffen, um die Interessen des Kaisers besser zu unterdrücken."

 ocupation_zone_creation_NRC:0 "Gründung der reorganisierten Nationalregierung der Republik China"
 ocupation_zone_creation_NRC_desc:0 "Das Wang-Jingwei-Regime ist die gebräuchliche Bezeichnung für die Reorganisierte Nationalregierung der Republik China (Pinyin: Zhōnghuá mínguó guómín zhèngfǔ), einen Marionettenstaat des Kaiserreichs Japan im Osten Chinas. Es wurde von einer totalitären Einparteiendiktatur unter Wang Jingwei, einem ehemaligen Funktionär der Kuomintang (KMT), regiert. Die von ihm verwaltete Region wurde Ende der 1930er Jahre mit Beginn des Zweiten Japanisch-Chinesischen Krieges zunächst von Japan besetzt. Wang, ein Rivale Chiang Kai-sheks und Mitglied der friedensfreundlichen Fraktion der KMT, lief auf die Seite Japans über und bildete 1940 im besetzten Nanjing (der traditionellen Hauptstadt Chinas) eine Kollaborationsregierung. Der neue Staat beanspruchte während seiner Existenz ganz China und stellte sich als legitimer Erbe der Xinhai-Revolution und des Vermächtnisses Sun Yat-sens dar – im Gegensatz zu Chiang Kai-sheks Regierung in Chongqing. Tatsächlich standen jedoch nur die von Japan besetzten Gebiete unter seiner direkten Kontrolle. Seine internationale Anerkennung beschränkte sich auf die anderen Mitglieder des Antikominternpakts, den er unterzeichnet hatte. Die Reorganisierte Nationalregierung existierte bis zum Ende des Zweiten Weltkriegs und der Kapitulation Japans im August 1945. Zu diesem Zeitpunkt wurde das Regime aufgelöst und viele seiner führenden Mitglieder wegen Hochverrats hingerichtet."
 create_occupation_zone_NRC:0 "Wir sollten die beiden kollaborierenden chinesischen Regime in unsere neue Marionettenregierung unter der Führung von Wang Jingwei integrieren, um in den Augen der Chinesen mehr Legitimität zu erlangen."
 
 ocupation_zone_creation_JIC:0 "Gründung der japanischen indochinesischen Kolonialverwaltung"
 ocupation_zone_creation_JIC_desc:0 "Zur Vorbereitung einer Invasion Niederländisch-Indiens marschierten am 28. Juli 1941 rund 140.000 japanische Soldaten in Südindochina ein. Französische Truppen und die Zivilverwaltung durften bleiben, allerdings unter japanischer Aufsicht. Vichy-Frankreich brach 1944 zusammen, und Japan vermutete, dass die französischen Behörden in Indochina versuchen würden, alliierte Operationen in der Region zu unterstützen. Daher stürzte ein japanischer Staatsstreich in Französisch-Indochina im Frühjahr 1945 die französischen Behörden."
 create_occupation_zone_JIC:0 "Wir sollten die indochinesischen französischen Kolonien in eine japanische Kolonialverwaltung eingliedern und Gespräche mit den lokalen Führern aufnehmen."
 
 ocupation_zone_creation_AST:0 "Schaffung einer australischen Kollaborationsregierung"
 ocupation_zone_creation_AST_desc:0 "Die australische Kollaborationsregierung war eine vorgeschlagene lokale Verwaltung für die eroberten Kolonien der alten europäischen Imperien. Sie wurde nie eingerichtet und blieb lediglich ein Vorschlag."
 create_occupation_zone_AST:0 "Wir sollten die australischen Gebiete in eine mit Japan kollaborierende Verwaltung eingliedern und Gespräche mit den lokalen Führern aufnehmen."

 ocupation_zone_creation_NZL:0 "Schaffung einer neuseeländischen Kollaborationsregierung"
 ocupation_zone_creation_NZL_desc:0 "Die neuseeländische Kollaborationsregierung war eine vorgeschlagene lokale Verwaltung für die eroberten Kolonien der alten europäischen Imperien. Diese wurde nie eingerichtet und blieb lediglich ein Vorschlag."
 create_occupation_zone_NZL:0 "Wir sollten die neuseeländischen Gebiete in eine mit Japan kollaborierende Verwaltung eingliedern und Gespräche mit den lokalen Führern aufnehmen."

 ocupation_zone_creation_INS:0 "Schaffung einer indonesischen Kollaborationsregierung"
 ocupation_zone_creation_INS_desc:0 "Das japanische Kaiserreich besetzte während des Zweiten Weltkriegs von März 1942 bis nach Kriegsende im September 1945 Niederländisch-Indien, das heutige Indonesien. Anfangs begrüßten die meisten Indonesier die Japaner freudig als Befreier ihrer niederländischen Kolonialherren. Diese Stimmung änderte sich jedoch, als die Indonesier erkannten, dass ihnen für die japanischen Kriegsanstrengungen noch größere Härten zugemutet wurden."
 create_occupation_zone_INS:0 "Wir sollten die indonesischen holländischen Kolonien in eine mit Japan kollaborierende Verwaltung eingliedern und Gespräche mit den lokalen Führern aufnehmen."

 ocupation_zone_creation_MAL:0 "Schaffung einer malaiischen Kollaborationsregierung"
 ocupation_zone_creation_MAL_desc:0 "Malaya wurde zwischen dem 8. Dezember 1941 und der Kapitulation der Alliierten in Singapur am 16. Februar 1942 schrittweise von den Japanern besetzt. Nach der Besetzung unterstand Malaya der Malaiischen Militärverwaltung (Malai Gunsei Kumbu) der Kaiserlich Japanischen Armee. Stabschef der 25. Armee war der Superintendent, und ihr Chef der Abteilung für Allgemeine Angelegenheiten, Oberst Watanabe Wataru, war ihr leitender Offizier. Wataru war für die Umsetzung der Besatzungspolitik verantwortlich. Er vertrat eine besonders harte Linie und behandelte die Chinesen aufgrund ihrer Unterstützung Festlandchinas gegen Japan besonders hart. Malayen und Inder wurden aufgrund ihrer Kooperation gemäßigter behandelt."
 create_occupation_zone_MAL:0 "Wir sollten die malaiischen britischen Kolonien in eine mit Japan kollaborierende Verwaltung eingliedern und Gespräche mit den lokalen Führern aufnehmen."

 ocupation_zone_creation_PHI:0 "Schaffung einer philippinischen Kollaborationsregierung"
 ocupation_zone_creation_PHI_desc:0 "Die japanische Besetzung der Philippinen erfolgte zwischen 1942 und 1945, als das kaiserliche Japan im Zweiten Weltkrieg das Commonwealth der Philippinen besetzte. Die Filipinos blieben den Vereinigten Staaten treu, zum Teil aufgrund der amerikanischen Unabhängigkeitsgarantie, zum anderen, weil die Japaner eine große Zahl von Filipinos zu Arbeitseinsätzen zwangen und sogar junge philippinische Frauen in Bordelle steckten."
 create_occupation_zone_PHI:0 "Wir sollten die philippinisch-amerikanischen Besitzungen in eine mit Japan kollaborierende Regierung eingliedern und Gespräche mit den lokalen Führern aufnehmen."

 ocupation_zone_creation_SIA:0 "Schaffung einer siamesischen Kollaborationsregierung"
 ocupation_zone_creation_SIA_desc:0 "Die siamesische Kollaborationsregierung war der Vorschlag einer lokalen Verwaltung für die eroberten Kolonien der alten europäischen Imperien. Sie wurde nie eingerichtet und blieb lediglich ein Vorschlag."
 create_occupation_zone_SIA:0 "Wir sollten die siamesischen Gebiete in eine mit Japan kollaborierende Verwaltung eingliedern und Gespräche mit den lokalen Führern aufnehmen."

 ocupation_zone_creation_BUR:0 "Schaffung einer burmesischen Kollaborationsregierung"
 ocupation_zone_creation_BUR_desc:0 "Die japanische Besatzung Burmas dauerte von 1942 bis 1945 während des Zweiten Weltkriegs, als Burma vom japanischen Kaiserreich besetzt war. Die Japaner unterstützten die Gründung der Burma Independence Army und bildeten die Dreißig Kameraden aus, die die Gründer der modernen Streitkräfte waren. Die Burmesen hofften auf die Unterstützung der Japaner bei der Vertreibung der Briten, damit Burma unabhängig werden konnte."
 create_occupation_zone_BUR:0 "Wir sollten die britischen Kolonien in Burma in eine mit Japan kollaborierende Verwaltung eingliedern und Gespräche mit den lokalen Führern aufnehmen."

 ocupation_zone_creation_RAJ:0 "Schaffung einer indischen Kollaborationsregierung"
 ocupation_zone_creation_RAJ_desc:0 "Anfang der 1940er Jahre hatte Japan bedeutende Siege in Südostasien errungen und Bose erkannte, dass es höchst angebracht wäre, deren Hilfe anzunehmen. Die Japaner wiederum waren an einer Zusammenarbeit mit der INA interessiert, da die Inder wertvolle Informationen über an der thailändisch-malaiischen Grenze stationierte britisch-indische Truppen liefern konnten. Mit dem japanischen Sieg über Singapur und Burma kamen die Achsenmächte der indischen Küste bemerkenswert nahe. Als sie sich auf den Weg zu den Andamanen machten, dienten die Inseln den Briten als Strafkolonie mit einem Zellengefängnis, in das sie ihre Gefangenen schickten. Den Japanern gelang es, die Inseln recht problemlos von den Briten zu übernehmen und forderten die Gefangenen dann auf, der INA beizutreten, was die meisten taten. Nach ihrer Befreiung von den Briten überzeugte Subhash Chandra Bose die Japaner, ihm die Inseln zu übergeben, und hisste dort daraufhin am 30. Dezember 1943 die Trikolore. Er nannte die Inseln auch Shaheed (Märtyrerinseln) und Swaraj (Selbstverwaltungsinseln)."

