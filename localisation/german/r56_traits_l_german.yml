

l_german:
##Commanders
 caring_leader:0 "Fürsorglicher Leiter"
 caring_leader_desc:0 "§LDieser Mann kümmert sich aufrichtig um die Gesundheit und das relative Wohlbefinden des einfachen Soldaten. Seine Untergebenen sind schnell wieder kampffähig, aber dieser „Luxus“ hat seinen Preis.§!"
 artillerist:0 "Artillerist"
 artillerist_desc:0 "§LDieser Mann hat den Einsatz von Artillerie studiert und weiß, wie man sie gut einsetzt. Manchmal überstrapaziert er seine geliebten Waffen und feuert etwas mehr als nötig.§!"
 air_force_ties:0 "Krawatten der Luftwaffe"
 air_force_ties_desc:0 "§LDieser Mann diente einst in der Luftwaffe oder hat enge Verbindungen zu Offizieren der Luftwaffe, was die Koordination zwischen seinen Truppen und der Luftfahrt verstärkt.§!" 
 meticulous:0 "Akribisch"
 meticulous_desc:0 "§LDieser Mann überprüft gerne jedes Detail seiner Pläne, verliert dabei viel Zeit, behebt aber dabei kleine Fehler.§!" 
 obsessed_by_artillery:0 "Besessen von Artillerie"
 obsessed_by_artillery_desc:0 "§LDie Leidenschaft dieses Mannes für die Artillerie kennt fast keine Grenzen. Er überprüft ständig ihre Einsatzfähigkeit und besteht darauf, dass sie in jeder Situation eingesetzt werden, selbst wenn ein schnellerer und leichterer Einsatz vorzuziehen wäre.§!" 
 decided_planner:0 "Entschiedener Planer"
 decided_planner_desc:0 "§LDieser Kommandant kann Operationen schnell ausarbeiten ... aber dabei leidet die Gesamtqualität der Operationen.§!"
 homeland_connoisseur:0 "Heimatkenner"
 homeland_connoisseur_desc:0 "§LDieser Mann kennt sein Heimatland sehr gut, was es ihm ermöglicht, das örtliche Terrain zu seinem Vorteil zu nutzen.§!"
 unpopular:0 "Umstrittene Figur"
 unpopular_desc:0 "§L Gegen diesen Kommandanten hat sich eine interne Fraktion gebildet, die ihn daran hindern wird, einen höheren Rang zu erreichen. Entweder weil er sich Feinde in den eigenen Reihen gemacht hat, der politische Charakter seiner Ernennung oder seine öffentlichen Äußerungen. Seine Karriere wird dadurch nicht weiter vorankommen.§!"
 funnies_inventor:0 "Lustiger Erfinder"
 funnies_inventor_desc:0 "§LPercy Hobart zeichnete sich durch die Schaffung hochspezialisierter Panzer aus, die in einer Einheit zusammengefasst waren, die er selbst befehligte.§!"
 bad_staffer:0 "Schlechter Mitarbeiter"
 bad_staffer_desc:0 "§LDieser Mann ist entweder schlecht darin, Offiziere auszuwählen, ihm fehlen kompetente Berater oder es liegt eine Kombination aus beidem vor. In jedem Fall schränkt dies seine Fähigkeit ein, eine große Anzahl von Einheiten zu befehligen.§!"
 walloon:0 "wallonisch"
 walloon_desc:0 "§LDieser Kommandant wird sich im Falle einer Auflösung Belgiens Wallonien anschließen.§!"
 flemish:0 "flämisch"
 flemish_desc:0 "§LDieser Kommandant wird sich im Falle einer Auflösung Belgiens Flandern anschließen.§!"
 military_governor:0 "Militärgouverneur"
 military_governor_desc:0 "§LDieser Kommandant ist ein Experte für die Aufrechterhaltung des Gesetzes in besetzten Gebieten.§!"
 retraining:0 "Umschulung"
 retraining_desc:0 "§LDieser Charakter nimmt derzeit an zusätzlichen Militärkursen teil, um seine Führungsqualitäten zu verbessern.§!" 
 front_line_commander:0 "Frontkommandant"
 front_line_commander_desc:0 "§LDieser Kommandant hat die Angewohnheit, so nah wie möglich an der Front zu befehligen. Dadurch hat er einen Überblick über die gesamte Schlacht, ist aber in Wirklichkeit nicht gut für die Leitung großer Operationen geeignet. Er geht gerne Risiken ein und wird trotz seiner Schwächen von seinen Männern respektiert und von seinen Kollegen bewundert.§!" 
 jumping_general:0 "Springen Allgemein"
 jumping_general_desc:0 "§LDieser Kommandant hat die Angewohnheit, seine Fallschirmjägerkameraden so nah wie möglich am Geschehen zu befehligen, indem er direkt ins Geschehen eingreift. Dadurch kann er das Gefecht überblicken und die Initiative und Moral seiner Truppen aufrechterhalten, ist aber in Wirklichkeit nicht gut für die Leitung großer Operationen geeignet. Er ist ein Risikoträger und wird trotz seiner Schwächen von seinen Männern bewundert und von seinen Kollegen respektiert.§!" 
 lucky:0 "Glücklich"
 lucky_desc:0 "§LDieser Mann scheint vom Schicksal auserwählt worden zu sein. Seine Fähigkeit, gefährliche Situationen zu überleben, ist ihm vielleicht noch nicht bekannt, aber das Schicksal weiß es und wartet auf den Moment, um ihm subtil zu helfen.§!"
 vigorous:0 "Kräftig"
 vigorous_desc:0 "§LDieser Mann ist für seine starke Gesundheit bekannt, die ihn widerstandsfähig und bereit macht, mit seinen Männern selbst in den rauesten Umgebungen zu kämpfen.§!"
 promising:0 "Vielversprechend"
 promising_desc:0 "Dieser Mann hat großes Talent und wird die Grundlagen ziemlich schnell lernen."
 promising_tooltip:0 "§RDiese Eigenschaft wird entfernt, wenn der Anführer Level 3 erreicht.§!"

