 #Tech bonuses
 ETH_university_bonus:0 "Universität von [ROOT.Capital.GetCapitalVictoryPointName] Elektronikforschung"
 ETH_new_weapons_and_tactics_bonus:0 "Neue Waffen- und Taktikforschung"
 ETH_shipbuilding_bonus:0 "[ETH.GetAdjective] Schiffbau"
 
 # Focuses
 ecole_militaire_haile_selassie_1er:0 "Ecole Militaire Haile Selassie 1er"
 holeta_military_academy:0 "Militärakademie Holeta"
 every_league_of_nations_member_tt:0 "Jedes Mitgliedsland des Völkerbundes:"
 ETH_strengthen_the_black_lions:0 "Stärken Sie die Black Lions"
 ETH_strengthen_the_black_lions_desc:0 "Obwohl wir Land an den Feind verloren haben, muss der Kampf weitergehen. Die Schwarzen Löwen leisten den Italienern großen Widerstand, und wir sollten sie daher nach Kräften unterstützen."
 ETH_supporting_the_arbegnoch:0 "Unterstützung des Arbegnoch"
 ETH_supporting_the_arbegnoch_desc:1 "Überall in [ROOT.GetName] gibt es Patrioten, die bereit sind, gegen die [ITA.GetAdjective] Invasoren zu den Waffen zu greifen. Wir müssen alles tun, um diese tapferen Männer und Frauen dabei zu unterstützen, die [ITA.GetAdjective] Kriegsmaschinerie zu lähmen."
 ETH_ecole_militaire_haile_selassie_1er:0 "[GetEthiopianMilitaryAcademyName]"
 ETH_ecole_militaire_haile_selassie_1er_desc:1 "Unser Militär erweist sich im Vergleich zu den anderen Mächten in der Region als sehr veraltet, sowohl was die Ausrüstung als auch die Denkweise betrifft. Wir werden eine eigene Militärakademie gründen, um eine neue Generation von Offizieren in der modernen Kriegsführung auszubilden."
 ETH_ecole_militaire_haile_selassie_1er_tt:0 "Ändere §Y[GetEthiopianArmySpiritName]§! durch:\n$MODIFIER_XP_GAIN_ARMY$: §G+5%§! "
 ETH_unlock_academy_tt:0 "Schaltet den §Y$academy_spirit$§ frei!"
 ETH_university_of_capital:0 "Universität von [ROOT.Capital.GetCapitalVictoryPointName]"
 ETH_university_of_capital_desc:0 "Einst bestimmte die Wildheit der Truppen den Verlauf einer Schlacht. Heute können Schlachten über große Entfernungen hinweg ausgetragen werden, ohne dass die Soldaten einander überhaupt sehen. Wir müssen in Bildungseinrichtungen investieren, um neue Technologien für die Kriegsführung und die Herstellung der entsprechenden Werkzeuge zu entwickeln."
 ETH_university_of_capital_tt:0 "Ändern Sie §Y$ETH_corrupt_bureaucracy_dynamic_modifier$§! durch:\n$MODIFIER_RESEARCH_SPEED_FACTOR$: §G+5%§! "
 ETH_scavenging_tactics:0 "Plünderungstaktiken"
 ETH_scavenging_tactics_desc:0 "Während wir unsere industrielle Basis ausbauen, sollten wir unsere Truppen darin schulen, auf dem Schlachtfeld Nützliches und Wiederverwertbares zu erkennen. Dies trägt wesentlich dazu bei, sie gut zu versorgen, bis wir unsere eigene Ausrüstung dauerhaft produzieren und transportieren können."
 ETH_scavenger_random_generals_tt:0 "§YDrei§! Zufällig ausgewählte Armeeführer erhalten §Y$Scavenger$§!: \n-$MODIFIER_EQUIPMENT_CAPTURE_FACTOR$: §G+3%§! "
 ETH_keep_the_chitet:0 "Behalten Sie [GetChitetName]"
 ETH_keep_the_chitet_desc:0 "Die [GetChitetName] hat uns gute Dienste geleistet. Als relativ landwirtschaftlich geprägte Nation wäre es für uns schwierig, jederzeit eine stehende, professionelle Armee aufzustellen. Es ist besser, bei dem zu bleiben, was wir kennen."
 ETH_keep_the_chitet_tt:0 "Modifizieren Sie §Y[GetEthiopianArmySpiritName]§! durch:\n $modifier_army_sub_unit_irregular_infantry_max_org_factor$: §G+5%§!\n Fügt den Chitet Sefari Divisionen §Y2 $irregular_infantry$§! Bataillone hinzu."
 ETH_expand_the_mehal_sefari:1 "Erweitern Sie [ETH_GetSefariName]"
 ETH_expand_the_mehal_sefari_desc:1 "Die Truppen der [ETH_GetSefariName] haben den Bedarf an gut ausgebildeten Berufssoldaten bewiesen. Die Zeiten, in Krisenzeiten einfach eine Bauernarmee aufzustellen, sind längst vorbei. Deshalb werden wir unsere Armee zu einer ständigen Truppe umgestalten."
 ETH_chitet_sefari_no_recruiting_tt:1 "§YChitet Sefari§! Divisionen können nicht mehr rekrutiert werden."
 ETH_expand_the_mehal_sefari_tt:0 "Modifizieren Sie §Y[GetEthiopianArmySpiritName]§! durch:\n$MODIFIERS_ARMY_DEFENCE_FACTOR$: §G+25%§! \n$MODIFIER_ARMY_ORG_FACTOR$: §G+5%§!"
 ETH_the_ethiopian_air_force:0 "Die [ROOT.GetAdjective] Luftwaffe"
 ETH_the_ethiopian_air_force_desc:0 "Ob es um die Unterstützung von Truppen auf dem Schlachtfeld oder die Zerstörung feindlicher Infrastruktur geht, das Flugzeug erweist sich als unschätzbar wertvoll. Wir müssen unsere eigene Luftwaffe aufbauen, wenn wir unsere Bevölkerung schützen und unsere Feinde vernichten wollen."
 ETH_the_ethiopian_air_force_tt:0 "Schaltet §Y$air_force_command_spirit$§ frei!"
 ETH_establish_a_naval_base:0 "Errichten Sie einen Marinestützpunkt"
 ETH_establish_a_naval_base_desc:0 "Mit unserem kürzlich erfolgten Erwerb eines Hafens haben wir uns einem weiteren Kriegsschauplatz geöffnet. Wir müssen unseren eigenen Marinestützpunkt errichten und mit dem Aufbau einer Marine zur Verteidigung unserer neuen Küsten beginnen."
 ETH_improve_the_administration:0 "Verbessern Sie die Verwaltung"
 ETH_improve_the_administration_desc:0 "Im Bildungssystem herrscht nach wie vor große Korruption. Das ist in Institutionen, die angeblich stolz auf ihre Leistungsgesellschaft sind, inakzeptabel. Wir müssen diese Korruption an unseren Schulen und Universitäten konsequent ausmerzen."
 ETH_improve_the_administration_tt:0 "Ändern Sie §Y$ETH_corrupt_bureaucracy_dynamic_modifier$§! durch:\n$MODIFIER_RESEARCH_SPEED_FACTOR$: §G+5%§!\n$MODIFIER_PRODUCTION_SPEED_BUILDINGS_FACTOR$: §G+5%§!\n$MODIFIER_PRODUCTION_FACTORY_MAX_EFFICIENCY_FACTOR$: §G+5%§!"
 ETH_mounted_levies:1 "Montiert [GetChitetName]"
 ETH_mounted_levies_desc:0 "Von den Wüsten des Ostens bis zu den Bergen des Westens besteht unsere Heimat aus verschiedenen schwer befahrbaren Gebieten und ist daher für Rad- oder Kettenfahrzeuge ungeeignet. Kamele und Pferde haben sich jedoch über Jahrtausende hinweg als mehr als fähig erwiesen, diese Aufgabe zu bewältigen."
 ETH_mounted_levies_tt:0 "Rekrutiert die Divisionen §Y$Kavallerie$§! und §Y$Kamelie$§!."
 ETH_regional_training_centers:0 "Regionale Schulungszentren"
 ETH_regional_training_centers_desc:0 "[GetChitetName] ist alles andere als perfekt. Unsere Truppen könnten durch die Einrichtung regionaler Ausbildungszentren, die ihnen Kampfkunst und taktisches Denken vermitteln, deutlich effektiver sein. Dies würde uns auch eine standardisierte militärische Ausbildung ermöglichen, ohne dass wir ein stehendes Heer benötigen."
 ETH_regional_training_centers_tt:0 "Ändere §Y[GetEthiopianArmySpiritName]§! durch:\n $modifier_army_sub_unit_irregular_infantry_defence_factor$: §G+5%§! \n $modifier_army_sub_unit_irregular_infantry_speed_factor$: §G+10%§! \n $modifier_army_sub_unit_irregular_infantry_max_org_factor$: §G+15%§!"
 ETH_expand_the_kebur_zabagna:1 "Erweitern Sie [ETH_GetGuardsName]"
 ETH_expand_the_kebur_zabagna_desc:1 "Die [ETH_GetGuardsName] haben sich als die Besten der Besten unserer Streitkräfte erwiesen. Wir sollten ihre Fähigkeiten stärker nutzen, indem wir ihren Zugang zu Ausrüstung und Personal verbessern."
 ETH_expand_the_kebur_zabagna_tt:1 "Rekrutiert eine zusätzliche §YKebur Zabagna§!-Division. \nFügt der §YKebur Zabagna§!-Vorlage zusätzliche §Y$Infanterie$§!- und §Y$Kavallerie$§!-Bataillone hinzu.\nFügt §Y$Aufklärung$§! und §Y$Artillerie$§! hinzu, wenn relevante Technologien erforscht wurden."
 ETH_tactical_training:0 "Standardisiertes taktisches Training"
 ETH_tactical_training_desc:0 "Die Ausbildung unserer Streitkräfte ist allzu oft inkonsistent und veraltet. Wir müssen die taktische Ausbildung aller unserer Truppen standardisieren, um ihre Effektivität auf dem Schlachtfeld zu steigern."
 ETH_tactical_training_tt:0 "Ändere §Y[GetEthiopianArmySpiritName]§! durch:\n$MODIFIERS_ARMY_DEFENCE_FACTOR$: §G+10%§! "
 ETH_peacekeeping_forces:0 "Friedenstruppen"
 ETH_peacekeeping_forces_desc:0 "Der Schlüssel zu unserer Sicherheit liegt darin, sicherzustellen, dass jede Krise im Ausland rasch bewältigt wird, bevor sie außer Kontrolle gerät. Daher ist es von entscheidender Bedeutung, eine Friedenstruppe aufrechtzuerhalten, die jederzeit weltweit eingesetzt werden kann."
 ETH_copy_plane_designs:0 "Flugzeugdesigns kopieren"
 ETH_copy_plane_designs_desc:0 "Es hat wenig Sinn, etwas neu zu erfinden, was andere bereits entwickelt haben. Wir werden einfach die Flugzeugdesigns anderer Nationen reproduzieren und von deren Forschungsinvestitionen profitieren."
 ETH_copy_light_plane_tt:0 "Erstellen Sie eine Variante von §Y$iw_small_airframe$: [ITA.GetFlag]CR.32§!"
 ETH_copy_medium_plane_tt:0 "Erstellen Sie eine Variante von §Y$iw_medium_airframe$: [ITA.GetFlag]Ca.101§!"
 ETH_asmera_naval_college:0 "[GetNavalCollegeName]"
 ETH_asmera_naval_college_desc:0 "Die bloße Produktion und Instandhaltung von Schiffen reicht für eine Marine nicht aus. Wir benötigen Offiziere und Spezialisten, die im Einsatz von Marineressourcen im Gefecht bestens ausgebildet sind. Deshalb werden wir die erste Marineakademie von [ETH.GetName] gründen."
 ETH_asmera_naval_college_tt:0 "Ändere §Y[GetEthiopianNavySpiritName]§! durch:\n$MODIFIER_NAVAL_DOCTRINE_COST_FACTOR$: §G-30%§!"
 unlock_spirit_of_naval_academy_tt:0 "Schaltet „Spirit of Naval Academy“ frei!"
 ETH_naval_college_reduction:0 "Forschung am Naval College"
 ETH_capital_school_of_technology:0 "[ROOT.Capital.GetCapitalVictoryPointName] Hochschule für Technik"
 ETH_capital_school_of_technology_desc:0 "Unsere Bildungsreformen erweisen sich als erfolgreich und sind die Investition wert. Wir sollten unsere Fortschritte beschleunigen, indem wir die Ingenieurexperten des Landes in einer einzigen Technologieschule zusammenführen."
 ETH_regional_supply_depots:0 "Regionale Versorgungsdepots"
 ETH_regional_supply_depots_desc:0 "Unsere Truppen können ihr Heimatland nicht verteidigen, wenn ihnen Munition und Nahrung fehlen. Schließlich marschiert eine Armee auf ihrem Magen. Wir sollten sicherstellen, dass sie stets gut versorgt sind, indem wir regionale Militärversorgungsdepots in ganz [ETH.GetName] einrichten."
 ETH_expand_the_levy:1 "Erweitern Sie [GetChitetName]"
 ETH_expand_the_levy_desc:0 "Dank besserer Unterstützung und Ausbildung ist [GetChitetName] zu einer robusten und flexiblen Militärmacht geworden. Auf dieser starken Basis können wir aufbauen und [GetChitetName] ausbauen, um jeden ausländischen Angreifer abzuschrecken."
 ETH_expand_the_levy_tt:1 "Erhöht die Anzahl der Chitet Sefari-Divisionen, die eingesetzt werden können, auf §Y48§!.\nFügt den Chitet Sefari-Divisionen §Y3 $irregular_infantry$§!-Bataillone hinzu. Fügt §Y$engineer$§!, §Y$military_police$§! und §Y$field_hospital$§! hinzu, wenn relevante Technologien erforscht wurden."
 ETH_the_junior_officer_corps:0 "Das Junior Officer Corps"
 ETH_the_junior_officer_corps_desc:0 "Die Streitkräfte werden seit Jahrhunderten von Aristokraten dominiert. Um ihre Leistungsfähigkeit auf dem Schlachtfeld zu steigern, müssen wir Offiziersschulen und Ausbildungsprogramme einrichten, die Leistungsorientierung statt Vetternwirtschaft fördern. Ein wichtiger Schritt in diese Richtung wäre die Einrichtung eines Junioroffizierkorps."
 ETH_camouflage:0 "Tarnung"
 ETH_camouflage_desc:0 "Mit der Einführung von Flugzeugen auf dem Schlachtfeld wird es immer schwieriger, den Überraschungseffekt zu erzielen. Um die Sichtbarkeit unserer taktischen Absichten zu minimieren, müssen unsere Truppen Tarn- und Verschleierungstraining absolvieren."
 ETH_camouflage_army_tt:0 "Modifizieren Sie §Y[GetEthiopianArmySpiritName]§! durch:\n $MODIFIER_CAS_DAMAGE_REDUCTION$: §G+10%§! \n $MODIFIERS_ARMY_DEFENCE_FACTOR$: §G+10%§!"
 ETH_camouflage_air_tt:0 "Ändere §Y[GetEthiopianAirforceSpiritName]§! durch:\n $MODIFIER_ENEMY_ARMY_BONUS_AIR_SUPERIORITY_FACTOR$: §G-15%§! "
 ETH_the_fetno-derash:0 "Der Fetno-Derash"
 ETH_the_fetno-derash_desc:0 "Geheimdienstarbeit wird zunehmend zu einem entscheidenden Faktor – nicht nur auf dem Schlachtfeld, sondern auch für die Sicherheit unserer politischen Führung. Wir werden daher einen eigenen Geheimdienst einrichten, der unsere Sicherheit gewährleistet und uns hilft, unsere Feinde besser zu verstehen."
 ETH_debre_zeyit_air_force_training_center:0 "[ETHGetAirBaseName] Ausbildungszentrum der Luftwaffe"
 ETH_debre_zeyit_air_force_training_center_desc:0 "Flugzeuge zu steuern ist an sich schon eine schwierige Aufgabe. Sie in die Schlacht zu fliegen, erfordert natürlich noch mehr Fachwissen. Um sicherzustellen, dass unsere Piloten dieser Aufgabe gewachsen sind, werden wir ein spezielles Ausbildungszentrum für die Luftwaffe einrichten und mit der Standardisierung ihrer Ausbildung beginnen."
 ETH_debre_zeyit_air_force_training_center_tt:0 "Ändern Sie §Y[GetEthiopianAirforceSpiritName]§! durch:\n$MODIFIER_AIR_DOCTRINE_COST_FACTOR$: §G-25%§! "
 ETH_unlock_spirit_airforce_tt:0 "Schaltet §Y$air_force_spirit$§ frei!"
 ETH_purchase_obsolete_ships:0 "Kauf veralteter Schiffe"
 ETH_purchase_obsolete_ships_tt:0 "Schalten Sie Entscheidungen zum Kauf älterer Schiffe der Großmächte frei."
 ETH_purchase_obsolete_ships_desc:0 "Obwohl wir Fortschritte bei der Entwicklung unserer Marine machen, sind wir noch nicht in der Lage, eine Flotte einzusetzen, die unsere Küste ausreichend verteidigen kann. Möglicherweise können wir jedoch einige ältere Schiffe aus anderen Ländern beschaffen, um unsere Flotte zu verstärken."
 ETH_new_weapons_and_tactics:0 "Neue Waffen und Taktiken"
 ETH_new_weapons_and_tactics_desc:0 "Um mit den technologischen Fortschritten anderer Armeen Schritt zu halten, müssen wir ständig in unsere eigene Armee investieren, damit sie stets für die neuesten Bedrohungen ausgerüstet und ausgebildet ist."
 ETH_old_reliable:0 "Alt zuverlässig"
 ETH_old_reliable_desc:0 "Einfache, zuverlässige und reparierbare Waffen sind an der Front wünschenswerter als die überkomplizierten Apparate, die viele Armeen heute einsetzen. Warum sollten wir Zeit und Ressourcen für die Ausbildung unserer Truppen mit neuen Gewehren verschwenden, wenn sie bereits mit den alten umgehen können?"
 ETH_old_reliable_tt:0 "Modifizieren Sie §Y[GetEthiopianArmySpiritName]§! durch:\n $MODIFIER_MAX_DIG_IN$: §G+0.5§!\n $MODIFIER_DIG_IN_SPEED_FACTOR$: §G+25%§!\n $modifier_army_sub_unit_infantry_attack_factor$: §G+5%§!\n $modifier_army_sub_unit_infantry_defence_factor$: §G+10%§!\n $modifier_army_sub_unit_infantry_speed_factor$: §G+10%§!"
 ETH_bring_in_foreign_advisors:0 "Ausländische Berater hinzuziehen"
 ETH_bring_in_foreign_advisors_desc:0 "Trotz unserer laufenden Fortschritte beim Aufbau einer [ETH.GetAdjective] Luftwaffe fehlt es uns an entscheidender Erfahrung aus erster Hand, um sicherzustellen, dass unsere Piloten optimal eingesetzt werden. Wir werden daher Offiziere aus dem Ausland hinzuziehen, die uns bei der Verbesserung beraten."
 ETH_bring_in_foreign_advisors_tt:0 "Modifizieren Sie §Y[GetEthiopianAirforceSpiritName]§! durch:\n $MODIFIER_ENEMY_ARMY_BONUS_AIR_SUPERIORITY_FACTOR$: §G-5%§!\n $MODIFIER_AIR_DOCTRINE_COST_FACTOR$: §G-5%§!\n $MODIFIER_AIR_ACCIDENTS$: §G-15%§!  "
 ETH_available_as_air_chief_tt:0 "Als Chef der Luftwaffe verfügbar: "
 ETH_ethiopian_officers:0 "[ROOT.GetAdjective] Offiziere"
 ETH_ethiopian_officers_desc:0 "Im Zuge der Weiterentwicklung der Luftwaffe müssen wir sicherstellen, dass wir Offiziere haben, die unsere Piloten effektiv koordinieren können. Anstatt uns auf temporäre Berater aus dem Ausland zu verlassen, werden wir unser eigenes Fachwissen von Grund auf aufbauen."
 ETH_ethiopian_officers_tt:0 "Ändere §Y[GetEthiopianAirforceSpiritName]§! durch:\n $MODIFIER_AIR_ATTACK$: §G+15%§!"
 ETH_promote_the_war_heroes:0 "Fördern Sie die Kriegshelden"
 ETH_promote_the_war_heroes_desc:0 "Unsere anhaltende Freiheit verdanken wir den Helden, die auf dem Schlachtfeld ihr Leben riskieren. Um die Moral und Unterstützung der Streitkräfte aufrechtzuerhalten, werden wir unsere Kriegshelden in prestigeträchtigere Positionen befördern."
 ETH_expand_the_officer_corps:0 "Erweitern Sie das Offizierskorps"
 ETH_expand_the_officer_corps_desc:0 "Der Mangel an Leistungsgesellschaft in den Streitkräften war in den letzten Jahren ihre größte Schwäche. Um sicherzustellen, dass unsere Truppen von den qualifiziertesten Leuten geführt werden, müssen wir das Offizierskorps erweitern und die Versetzung derjenigen zulassen, die ihren Rang durch Vetternwirtschaft erlangt haben."
 ETH_medal_gain_tt:0 "Erhöht die Menge an XP, die Divisionskommandeure bei der Verleihung einer Medaille erhalten, um §G+75 %§!"
 ETH_officer_promotion_boost_tt:0 "Alle zukünftigen §YOffiziere§!, die in den Rang eines §YGenerals§! befördert werden, erhalten §G+1 Angriff§! und §G+1 Verteidigung§!"
 ETH_the_common_soldier:0 "Der einfache Soldat"
 ETH_the_common_soldier_desc:0 "Eine Armee ist nichts ohne die einfachen Soldaten, die jeden Tag ihr Leben aufs Spiel setzen, ohne Belohnung oder Anerkennung zu erwarten. Diese Helden sollten für ihren Beitrag zu unserer gemeinsamen Sicherheit verehrt werden."
 ETH_develop_the_capital_region:1 "Entwickeln [271.GetName]"
 ETH_develop_the_capital_region_desc:1 "Wir müssen das Tempo der Industrialisierung zum Wohle unserer Bevölkerung und zum Schutz von [ETH.GetNameDef] beschleunigen. Daher werden wir in die Region um [ETH.Capital.GetCapitalVictoryPointName] investieren und sie zum industriellen Kernland von [ETH.GetName] machen."
 ETH_develop_the_capital_region_tt:0 "Gibt die Entscheidung frei, das Stromnetz auf ganz [271.GetName] auszuweiten."

 ETH_the_state_bank_of_ethiopia:1 "Die Staatsbank von [ETH.GetNonIdeologyName]"
 ETH_the_state_bank_of_ethiopia_desc:0 "Durch die Ausweitung der Ressourcen der Staatsbank von [ETH.GetName] können wir den Menschen eine neue Kreditlinie geben und als finanzielles Diuretikum für die angeschlagene [ETH.GetAdjective]-Wirtschaft wirken."
 ETH_the_state_bank_of_ethiopia_tt:0 "Ändern Sie §Y$ETH_corrupt_bureaucracy_dynamic_modifier$§! durch:\n$MODIFIER_RESEARCH_SPEED_FACTOR$: §G+5%§!\n$MODIFIER_PRODUCTION_SPEED_BUILDINGS_FACTOR$: §G+5%§!"
 ETH_infrastructure_projects:0 "Infrastrukturprojekte"
 ETH_infrastructure_projects_desc:0 "[ETH.GetName] verfügt über zahlreiche natürliche Ressourcen, die die Welt begehrt. Wir können diese Ressourcen jedoch nicht nutzen, ohne sie ausreichend in die Fabriken oder aus dem Land zu transportieren. Wir müssen unsere Infrastruktur rasch ausbauen und diesen wirtschaftlichen Engpass beseitigen."
 ETH_rebuilding_the_country_idea:0 "Wiederaufbau des Landes"
 ETH_cie:0 "[GetEthiopianRailwayName]"
 ETH_cie_imperial:0 "Compagnie Impériale des Chemins de Fer Éthiopiens"
 ETH_anarchist_bank:0 "Afrikanische Gemeinschaftsbank"
 ETH_central_bank:0 "Afrikanische Zentralbank"
 ETH_GuardsNameCommunist:0 "Revolutionsgarden"
 ETH_GuardsNameDefault:0 "Kebur Zabagna"
 ETH_GuardsNameDemocratic:0 "Nationalgarde"
 ETH_SefariNameCommunist:0 "Revolutionsarmee"
 ETH_SefariNameDemocratic:0 "Nationale Verteidigungsstreitkräfte"
 ETH_SefariNameDefault:0 "Mehal Sefari"

 ETH_cie_anarcho_communist:0 "[ETH.GetAdjective] Rail Collective"
 ETH_cie_stalinist:0 "[ETH.GetAdjective] Schienenbrett"
 ETH_cie_fascist:0 "Ferrovie Imperiali Etiopiche"
 ETH_host_nation_name:0 "[?ETH.host_nation.GetNameWithFlag]"
 ETH_host_nation_fallback_name:0 "Das Gastgeberland"
 ETH_second_italo_ethiopian_war_flag:0 "Der Zweite Italienisch-Äthiopische Krieg"

 ETH_infrastructure_projects_tt:0 "Ändern Sie §Y$ETH_state_development_dynamic_modifier$§! durch:\n$MODIFIER_STATE_PRODUCTION_SPEED_BUILDINGS_FACTOR$: §G+10%§!"
 ETH_state_owned_industry:0 "Staatliche Industrie"
 ETH_state_owned_industry_desc:0 "Wir können deutlich sehen, dass die Regierungen der Großmächte, die bereit sind, in den freien Markt einzugreifen, enorme wirtschaftliche Vorteile erzielen, indem sie die Produktion kontrollieren und die Arbeitslosigkeit senken. Wir sollten ihrem Beispiel folgen und unsere Wirtschaft durch staatliche Industrien rasch ausbauen."
 ETH_state_owned_industry_tt:0 "Ändern Sie §Y$ETH_state_development_dynamic_modifier$§! um:\n$MODIFIER_STATE_PRODUCTION_SPEED_BUILDINGS_FACTOR$: §G+20%§!\n$MODIFIER_LOCAL_BUILDING_SLOTS$: §G+20%§!"
 ETH_encourage_local_development:0 "Förderung der lokalen Entwicklung"
 ETH_encourage_local_development_desc:0 "Niemand kann die Bedürfnisse einer gesamten Volkswirtschaft vollständig vorhersehen, und es ist gefährlich, das Gegenteil vorzutäuschen. Wir überlassen es den Regionen, sich nach eigenem Ermessen zu entwickeln. Schließlich wissen die lokalen Politiker und Unternehmen am besten, was in ihren Regionen benötigt wird."
 ETH_encourage_local_development_tt:0 "Ändern Sie §Y$ETH_state_development_dynamic_modifier$§! um:\n$MODIFIER_STATE_PRODUCTION_SPEED_BUILDINGS_FACTOR$: §G+10%§!\n$MODIFIER_LOCAL_BUILDING_SLOTS$: §G+10%§!"
 ETH_encourage_local_development_2_tt:0 "Die lokalen Behörden werden beginnen, auf eigene Faust staatliche Verbesserungen vorzunehmen."
 ETH_a_port_of_our_own:0 "Ein eigener Hafen"
 ETH_a_port_of_our_own_desc:0 "Mit dem kürzlich erfolgten Erwerb von Küstenland haben wir die Möglichkeit, unseren Zugang zum internationalen Markt durch die Errichtung eines eigenen Hafens deutlich zu verbessern. Dies wird den Import und Export von Waren erheblich erleichtern und unserer Wirtschaft enorm zugutekommen."
 ETH_expanding_the_railway_network:0 "Ausbau des Schienennetzes"
 ETH_expanding_the_railway_network_desc:0 "Eisenbahnen sind für den Transport von Rohstoffen zu den Fabriken und weiter zu nationalen und internationalen Märkten von entscheidender Bedeutung. Durch den Ausbau des Schienennetzes können wir diese Rohstoffe besser an ihr Ziel bringen. Dies schafft auch bessere Möglichkeiten für die Menschen in [ETH.GetName], in die wachsenden Industriestädte umzuziehen."
 ETH_taxing_the_nobility:1 "[ETH_GetSeizeAssetsTitle]"
 ETH_taxing_the_nobility_desc:1 "[ETH_GetTaxNobilityDesc]"
 ETH_expand_tax_exemptions:1 "[ETH_GetTaxExemptionTitle]"
 ETH_expand_tax_exemptions_desc:1 "[ETH_GetTaxExemptionDesc]"
 ETH_expand_tax_exemptions_tt:0 "Ändern Sie §Y$ETH_corrupt_bureaucracy_dynamic_modifier$§! durch:\n$MODIFIER_PRODUCTION_FACTORY_MAX_EFFICIENCY$: §R-5%§!\n$MODIFIER_PRODUCTION_SPEED_BUILDINGS_FACTOR$: §R-5%§!"
 ETH_reform_the_currency:0 "Reform der Währung"
 ETH_reform_the_currency_desc:0 "Obwohl die Verbreitung von [ETH.GetAdjective]-Banknoten in den letzten Jahren zugenommen hat, bevorzugen viele beim Handel in [ETH.GetName] immer noch die Währungen anderer Länder. Wir müssen den Birr reformieren, damit er im In- und Ausland mehr Akzeptanz findet."
 ETH_increased_factory_output:0 "Erhöhte Fabrikleistung"
 ETH_increased_factory_output_desc:0 "Da die Welt zunehmend gefährlicher erscheint, müssen die Fabriken ihre Ausrüstungsproduktion steigern, damit das Militär auch weiterhin eine glaubwürdige Abschreckung für ausländische Aggressoren darstellen kann."
 ETH_increased_factory_output_tt:0 "Ändern Sie §Y$ETH_industrialization_dynamic_modifier$§! durch:\n$MODIFIER_PRODUCTION_FACTORY_MAX_EFFICIENCY$: §G+10%§!"
 ETH_adapt_and_improve:0 "Anpassen und verbessern"
 ETH_adapt_and_improve_desc:0 "Durch die Beratung mit dem Militär können sich die führenden Industrieunternehmen ein Bild davon machen, was auf dem Schlachtfeld wirklich benötigt wird, und dieses Wissen an ihre Ingenieure weitergeben. So wird verhindert, dass unsere Truppen unzureichend ausgerüstet werden, und sie können schnell Verbesserungsvorschläge unterbreiten."
 ETH_adapt_and_improve_tt:0 "Ändere §Y$ETH_industrialization_dynamic_modifier$§! um:\n$MODIFIER_LAND_EQUIPMENT_UPGRADE_XP_COST$: §G-25%§!\n$MODIFIER_AIR_EQUIPMENT_UPGRADE_XP_COST$: §G-25%§!"
 ETH_the_state_court:0 "Das Staatsgericht"
 ETH_the_state_court_desc:0 "Das Rechtssystem von [ETH.GetName] basiert auf jahrhundertealten Praktiken. Mit unserer jüngsten Reformwelle ist es nun an der Zeit, weitere Gesetze im Einklang mit der Verfassung zu kodifizieren und ein modernes Staatsgericht für Fälle von nationaler Bedeutung einzurichten."
 ETH_the_state_court_tt:0 "Ändern Sie §Y$ETH_corrupt_bureaucracy_dynamic_modifier$§! durch:\n$MODIFIER_PRODUCTION_FACTORY_MAX_EFFICIENCY$: §G+5%§!\n$MODIFIER_PRODUCTION_SPEED_BUILDINGS_FACTOR$: §G+10%§!\n$MODIFIER_RESEARCH_SPEED_FACTOR$: §G+10%§!"
 ETH_ethiopian_shipbuilding:0 "[ROOT.GetAdjective] Schiffbau"
 ETH_ethiopian_shipbuilding_desc:0 "Nachdem wir nun unseren eigenen Hafen errichtet haben, wäre es ratsam, die Grundlagen für den Aufbau und die Unterhaltung einer eigenen Marine zu legen. Wir werden zweifellos eigene Schiffe benötigen, um den Zugang zu den weltweiten Schifffahrtsrouten aufrechtzuerhalten."
 ETH_connecting_the_south:0 "Den Süden verbinden"
 ETH_connecting_the_south_desc:0 "Die südlichen Gebiete von [ETH.GetName] sind durch bergiges Gelände von der Hauptstadtregion isoliert. Um das Gebiet vollständig in unsere schnell wachsende Wirtschaft zu integrieren, müssen wir es per Eisenbahn mit den industriellen Kerngebieten verbinden."
 ETH_bomb_proofing:0 "Bombensicher"
 ETH_bomb_proofing_desc:0 "In Kriegszeiten ist es unerlässlich, ausreichende industrielle Kapazitäten für ein modernes Militär aufrechtzuerhalten. Daher dürfte der Luftkrieg in zukünftigen Konflikten eine entscheidende Rolle spielen, da Flugzeuge die industriellen Kerngebiete feindlicher Nationen angreifen. Daher müssen wir sicherstellen, dass unsere Fabriken solche Angriffe überstehen."
 ETH_bomb_proofing_tt:0 "Ändern Sie §Y$ETH_industrialization_dynamic_modifier$§! um:\n$MODIFIER_INDUSTRY_AIR_DAMAGE_FACTOR$: §G-10%§!\n$MODIFIER_INDUSTRY_REPAIR_FACTOR$: §G+10%§!\n$MODIFIER_PRODUCTION_FACTORY_MAX_EFFICIENCY$: §G+5%§!"
 ETH_rapid_industrial_expansion:0 "Rasante industrielle Expansion"
 ETH_rapid_industrial_expansion_desc:0 "Trotz der heldenhaften Anstrengungen der Bevölkerung im Inland benötigen wir eine noch größere Industriekapazität, wenn wir von ausländischer Besatzung verschont bleiben wollen. Deshalb werden wir das Tempo unserer Wirtschaftspläne erhöhen und eine noch schnellere industrielle Expansion anstreben."
 ETH_rapid_industrial_expansion_tt:0 "Ändern Sie §Y$ETH_industrialization_dynamic_modifier$§! durch:\n$MODIFIER_PRODUCTION_SPEED_BUILDINGS_FACTOR$: §G+10%§!"
 ETH_develop_the_horn_of_africa:0 "Entwicklung des Horns von Afrika"
 ETH_develop_the_horn_of_africa_desc:0 "Am Horn von Afrika gibt es eine Vielzahl von Völkern, Ressourcen und Potenzialen. Wenn wir in wirtschaftlichen Fragen mit den Regierungen der Region zusammenarbeiten würden, könnten wir dieses Potenzial zum beiderseitigen Vorteil nutzen."
 ETH_develop_the_horn_of_africa_tt:0 "Schaltet §YEntscheidungen§! frei, um unabhängige oder [ROOT.getAdjective] unterworfene Länder am Horn von Afrika zu verbessern und sie möglicherweise zu integrieren."
 ETH_horn_of_africa_tt:0 "Schaltet eine „Entscheidung“ zur Gründung des Horns von Afrika frei."
 ETH_invest_tt:0 "Setzen Sie Investitionsentscheidungen im Staat frei."
 ETH_invest_in_the_north:0 "Investieren Sie im Norden"
 ETH_invest_in_the_north_desc:0 "Im Norden von [ETH.GetName] beginnt die Maschinenbauproduktion. Wir sollten diese Entwicklung mit erhöhten Investitionen unterstützen, um den Ausbau dieser wachsenden Industrie zu fördern."
 ETH_invest_in_the_east:0 "Investieren im Osten"
 ETH_invest_in_the_east_desc:0 "Durch Investitionen im Osten können wir das historische Handelsnetzwerk der Region nutzen und das Gebiet in ein Industriezentrum für die Verarbeitung der Ressourcen von [ETH.GetName] verwandeln, bereit für den Export."
 ETH_invest_in_the_west:0 "Investieren Sie im Westen"
 ETH_invest_in_the_west_desc:0 "Die verschiedenen Regionen von [ETH.GetName] haben Zugang zu vielfältigen Ressourcen. Durch Investitionen im Westen könnten wir die Industrialisierung der Bekleidungsproduktion rasch vorantreiben und das vorhandene Know-how in diesem Bereich nutzen."
 ETH_expand_the_coffee_industry:0 "Erweitern Sie die Kaffeeindustrie"
 ETH_expand_the_coffee_industry_desc:0 "Weltweit gibt es viele Menschen, die nach Kaffee verlangen. Da Kaffee eine der Hauptquellen dieses köstlichen Genussmittels ist, sollten wir diese Nachfrage nutzen, indem wir in die Kaffeeindustrie investieren und unsere Exporte steigern. "
 ETH_modernizing_the_industry:0 "Modernisierung der Branche"
 ETH_modernizing_the_industry_desc:0 "Wir haben in den letzten Jahren große Fortschritte beim Ausbau unserer industriellen Kapazitäten erzielt. Dies wird jedoch eine fortwährende Aufgabe bleiben, da sich die Anforderungen der Wirtschaft verändern und neue Produktionsmethoden entstehen. Daher werden wir uns bemühen, ganz [ETH.GetName] mit Elektrizität und anderen industriellen Entwicklungen zu versorgen und unsere wirtschaftliche Modernisierung fortzusetzen."
 ETH_modernizing_the_industry_tt:0 "Für alle Staaten innerhalb der Regionen, in die investiert wurde:\n Füge §G1§! §YBauplatz§! hinzu.\nEin Staat in jeder Region, in die investiert wurde:\n Füge §G1§! §Y$Industriekomplex$§! hinzu."
 ETH_animal_husbandry:0 "Tierhaltung"
 ETH_animal_husbandry_desc:0 "Pferde und Kamele spielen eine wichtige Rolle bei der Verteilung von Gütern und dem Transport von Menschen in [ETH.GetNameDef]. Wir sollten die Investitionen in die Tierhaltung erhöhen, um sicherzustellen, dass das Angebot und die Qualität dieser Tiere nicht abnehmen."
 ETH_ethiopian_industrial_research_institute:0 "[ROOT.GetAdjective] Industrielles Forschungsinstitut"
 ETH_ethiopian_industrial_research_institute_desc:0 "Wenn wir vermeiden wollen, in der Industrie immer einen Schritt hinter anderen Nationen zurückzubleiben, müssen wir unsere heimischen Forschungseinrichtungen verbessern. Auf diese Weise können wir beginnen, eigene Innovationen zu entwickeln, anstatt Ideen aus dem Ausland zu importieren."
 ETH_invite_foreign_prospectors:0 "Laden Sie ausländische Prospektoren ein"
 ETH_invite_foreign_prospectors_desc:0 "Anstatt zu versuchen, Forschungsentwicklungen aus dem Ausland zu kopieren, sollten wir das Fachwissen ausländischer Regierungen und Unternehmen nutzen, um unsere reichlich vorhandenen natürlichen Ressourcen besser zu erschließen."
 ETH_invite_foreign_prospectors_tt:1 "Schaltet §Y$ETH_prospect_for_resources$§!-Entscheidungen in Nord-[ROOT.GetName] frei. Erfordert §Y$excavation2$§! und mehr als §Y2§! verfügbare §Yzivilfabriken§!, um Entscheidungen zur Prospektion zu treffen.\n\n"
 ETH_invite_foreign_industrialists:0 "Ausländische [ETH_GetInvestorName] einladen"
 ETH_invite_foreign_industrialists_desc:0 "Wir haben unsere Infrastruktur und Industrie in den letzten Jahren massiv verbessert und so die Nutzung natürlicher Ressourcen deutlich effizienter gestaltet. Wir könnten die Entwicklung unserer Industrie jedoch beschleunigen, indem wir ausländische Experten und Industrielle einladen, in [ETH.GetName] zu arbeiten."
 ETH_invite_foreign_industrialists_tt:1 "Designer aus anderen Nationen werden verfügbar, wenn das Zielland eine §YMeinung von [ETH.GetFlag][ETH.GetNameDef] über§! §G75§! hat. \n\n§RAusgewählte Designer werden deaktiviert, wenn sich ihre Heimatnation im Krieg mit [ETH.GetNameDef]!§! befindet. \n\nMögliche Nationen sind: §Y[ENG.GetFlag][ENG.GetName]§!, §Y[FRA.GetFlag][FRA.GetName]§!, §Y[GER.GetFlag][GER.GetName]§!, §Y[JAP.GetFlag][JAP.GetName]§!, §Y[CZE.GetFlag][CZE.GetName]§!, §Y[SWE.GetFlag][SWE.GetName]§!"
 ETH_the_second_italo-ethiopian_war:0 "Der Zweite Italienisch-Äthiopische Krieg"
 ETH_the_second_italo-ethiopian_war_desc:1 "Die Weihnachtsoffensive brachte uns nicht den erhofften und benötigten Sieg. Es ist Zeit für [ETH.GetLeader], die Hauptstadt zu verlassen und persönlich das Kommando über die Armeen zu übernehmen. Der Krieg gegen die Italiener muss beendet werden!"
 ETH_the_second_italo-ethiopian_war_tt:0 "§Y$ETH_haile_selassie$§! wird als Feldmarschall verfügbar"
 ETH_renewed_offensive:0 "Erneute Offensive"
 ETH_renewed_offensive_desc:0 "Die Italiener versuchen möglicherweise, die Initiative zurückzugewinnen. Das bedeutet aber, dass sie keinen Angriff unserer Truppen ahnen. Anstatt einfach nur zu verharren, sollten wir ihnen die Schlacht liefern."
 ETH_renewed_offensive_tt:0 "Infanterieangriff §G+10%§!\nIrregulärer Infanterieangriff §G+10%§!\nDivisionsverteidigung §R-5%§!"
 ETH_renewed_offensive_tt_1:0 "Ändert §Y$ETH_army_1_dynamic_modifier$§!:\n"
 ETH_falling_back:0 "Zurückfallen"
 ETH_falling_back_desc:0 "Unsere Frontlinien werden schnell unhaltbar und unsere Versorgungslinien sind überlastet. Ein organisierter Rückzug nach [ROOT.Capital.GetCapitalVictoryPointName] könnte klug sein, aber wir müssen vorsichtig sein und dürfen nicht völlig vom Schlachtfeld fliehen."
 ETH_falling_back_tt:0 "Italienische Einheiten erhalten in den von Äthiopien kontrollierten Grenzstaaten eine 60-tägige Bewegungs- und Angriffsstrafe."
 ETH_northern_thrust:0 "Nördlicher Vorstoß"
 ETH_northern_thrust_desc:0 "Unsere oberste Priorität sollte die Eroberung Eritreas sein. Wenn es uns gelingt, die italienischen Häfen im Norden abzuschneiden, wird es für sie deutlich schwieriger, ihre Truppen zu versorgen, und wir können uns dann um die schwächere Südfront kümmern."
 ETH_victory_in_the_desert:0 "Sieg in der Wüste"
 ETH_victory_in_the_desert_desc:0 "Der Ogaden ist der schwächste Abschnitt der italienischen Front. Wir sollten unsere Bemühungen darauf konzentrieren, sie dort zu besiegen und anschließend ihre Häfen im Süden einzunehmen. Dies sollte uns den Rücken freihalten und uns ermöglichen, nach Eritrea vorzurücken."
 ETH_the_defense_of_addis_ababa:0 "Die Verteidigung von Addis Abeba"
 ETH_the_defense_of_addis_ababa_desc:0 "Addis Abeba ist die historische Hauptstadt und zugleich das industrielle Zentrum Äthiopiens. Fällt die Stadt, ist unsere Sache verloren. Wir müssen alles tun, um die Stadt zu halten."
 ETH_the_defense_of_addis_ababa_tt_1:0 "§Y$VICTORY_POINTS_5010$§!:\n"
 ETH_the_defense_of_addis_ababa_tt_2:0 "§Y$VICTORY_POINTS_8036$§!:\n"
 ETH_the_hindenburg_wall:0 "Die Hindenburgmauer"
 ETH_the_hindenburg_wall_desc:0 "Unser türkischer Berater, $ETH_wehib_pasha$, will rund um die Städte Harar und Dire Dawa Befestigungsanlagen errichten, die denen der Deutschen aus dem letzten Krieg entsprechen. Durch die Festigung der Region können die Italiener ihre Fronten nicht verbinden und unseren Zugang zum Meer über den Hafen in Dschibuti sichern."
 ETH_the_hindenburg_wall_tt_1:0 "§Y$VICTORY_POINTS_7980$§!:\n"
 ETH_the_hindenburg_wall_tt_2:0 "§Y$VICTORY_POINTS_13249$§!:\n"
 ETH_mercenaries:0 "Söldner"
 ETH_mercenaries_desc:0 "Viele Ausländer wollen sich aus verschiedenen Gründen unserem Kampf anschließen. Die meisten sind wertlose Abenteurer, die nur auf unser Geld aus sind. Wir könnten jedoch einige Söldner aus Belgisch-Kongo und Arabien rekrutieren. Einige dieser erfahrenen Krieger auf unsere Seite zu ziehen, könnte sicherlich dazu beitragen, das Blatt zu unseren Gunsten zu wenden."
 ETH_mercenaries_congo_tt:0 "Fügt §Y3 kongolesische Söldnereinheiten§! hinzu, wenn eine von §Y[838.GetName]§! und §Y[837.GetName]§! von Freunden kontrolliert wird."
 ETH_mercenaries_arabia_tt:0 "Fügt §Y2 arabische Söldnereinheiten§! hinzu, wenn eine von §Y[843.GetName]§! und §Y[835.GetName]§! von Freunden kontrolliert wird."
 ETH_reach_out_to_the_world:0 "Erreichen Sie die Welt"
 ETH_reach_out_to_the_world_desc:0 "Die Welt muss wissen, was hier in [ROOT.GetName] passiert. Wir haben uns länger als menschlich möglich gegen zahlenmäßig überlegene Kräfte behauptet und eine europäische Großmacht in die Knie gezwungen. Die internationale Gemeinschaft muss erkennen, dass wir gegen diese unrechtmäßige Aggression Hilfe brauchen!"
 ETH_a_last_stand:0 "Ein letzter Widerstand"
 ETH_a_last_stand_desc:1 "Wir dürfen uns von Rückschlägen nicht aufhalten lassen. Als letzten Ausweg können wir uns auf $VICTORY_POINTS_13244$ zurückziehen und dort eine Verteidigung vorbereiten. Die Italiener werden Mühe haben, ihre Armee bis in den äußersten Westen von [ROOT.GetName] mit Nachschub zu versorgen."
 ETH_the_lessons_of_war:0 "Die Lehren des Krieges"
 ETH_the_lessons_of_war_desc:1 "Niemand weiß, wie sie mit dem Druck eines Schlachtfelds zurechtkommen, geschweige denn, wie ein Imperium oder eine Nation damit zurechtkommt. Obwohl wir auf die Belastungen moderner Kriegsführung nicht ausreichend vorbereitet waren, hat unser Militär die schwierigen Lektionen des Krieges gelernt und ist dadurch stärker geworden."
 ETH_the_lessons_of_war_tt:1 "Modifizieren Sie §Y[GetEthiopianArmySpiritName]§! durch:\n$MODIFIERS_ARMY_DEFENCE_FACTOR$: §G+10%§! \n$MODIFIER_MAX_DIG_IN$: §G+2§!\n$MODIFIER_DIG_IN_SPEED_FACTOR$: §G+10%§!"
 ETH_arms_purchases:0 "Waffenkäufe"
 ETH_arms_purchases_desc:0 "Der Völkerbund konnte die italienische Invasion nicht stoppen, sondern beschloss lediglich ein Waffenembargo gegen beide Länder. Ihm muss klar sein, dass uns das mehr schadet als [ITA.GetName]. Wir sollten argumentieren können, dass uns als rechtmäßigen Verteidigern der internationale Waffenerwerb gestattet werden muss."
 ETH_arms_purchases_tt:0 "Schaltet Entscheidungen zum Kauf von Waffen von internationalen Waffenhändlern frei."
 ETH_request_embargo:0 "Embargo anfordern"
 ETH_request_embargo_desc:0 "Das Embargo gegen [ITA.GetName] ist nur ein symbolisches Embargo, das Italien überhaupt nicht schadet. Der Völkerbund ist bereit, unsere Forderungen zu berücksichtigen. Wir sollten unsere Bemühungen darauf konzentrieren, den Rat zu einem verschärften Embargo zu bewegen, das Italien wirklich schadet. Ein Embargo, das auch Öl und Stahl betrifft, die beide für ihre Kriegsmaschinerie unverzichtbar sind."
 ETH_international_brigades:0 "Internationale Brigaden"
 ETH_international_brigades_desc:0 "Es ist an der Zeit, dass der Völkerbund nicht nur das Verbot aufhebt, Truppen zu entsenden, um uns in unserem Kampf zu unterstützen, sondern dass er seine Mitgliedsstaaten tatsächlich dazu ermutigt, sich gegen die Invasoren zu stellen!"
 ETH_league_of_nations_volunteer_resolution:0 "Resolution der Internationalen Brigaden des Völkerbundes"
 ETH_closing_the_suez:0 "Schließung des Suezkanals"
 ETH_closing_the_suez_desc:0 "Der Völkerbund sollte [453.Owner.GetNameDef] zwingen, den Suezkanal für die [ITA.GetAdjective] Schifffahrt zu sperren. Dies würde der [ITA.GetAdjective] Kriegsmaschinerie ernsthaft schaden und es uns ermöglichen, den Krieg unter gleichen Bedingungen zu führen."
 ETH_international_mediation:0 "Internationale Mediation"
 ETH_international_mediation_desc:0 "Der Völkerbund kann einen Konflikt zwischen zwei Mitgliedsstaaten nicht so lange andauern lassen. Er muss handeln und [ITA.GetName] zum Rückzug auf seine Vorkriegsgrenzen zwingen!"
 ETH_international_mediation_tt:0 "[ITA.GetName] und [ETH.GetName] unterzeichnen einen weißen Frieden.\n "
 ETH_rally_around_the_emperor:0 "Versammeln Sie sich um den Kaiser"
 ETH_rally_around_the_emperor_desc:0 "Seine Majestät [ETH.GetLeader] ist der Dreh- und Angelpunkt, der unser vielfältiges Imperium zusammenhält. In dieser Krisenzeit müssen wir unsere kleinlichen Beschwerden beiseite legen und uns hinter seine Majestät stellen, da das Überleben von [ETH.GetName] und seiner Bevölkerung auf dem Spiel steht."
 ETH_rally_around_the_emperor_tt:0 "Schaltet Entscheidungen frei, um ein mögliches „Gastland“ für eine äthiopische „Exilregierung“ festzulegen."
 ETH_support_spain_static_modifier:0 "Support Spanien"

 ETH_boarding_the_train:0 "Einsteigen in den Zug"
 ETH_boarding_the_train_desc:0 "Unsere Verteidigungslinien beginnen zu bröckeln, und wenn sich nicht drastisch etwas ändert, wird [ETH.GetName] aufhören zu existieren. Während viele seiner Berater die negativen Auswirkungen einer Thronabwesenheit anprangern, hat Seine Majestät [ETH.GetLeader] beschlossen, nach Genf zu reisen, um beim Völkerbund internationale Unterstützung für unsere Sache zu gewinnen."
 ETH_boarding_the_train_tt:0 "§Y$ETH_haile_selassie$§! verlässt [ROOT.GetName], um zum Völkerbund zu gehen. Falls Äthiopien kapituliert, wird $ETH_haile_selassie$ eine §YExilregierung§! bilden."
 ETH_has_host_nation_tt:0 "Ein potentielles §YGastland§! für eine Exilregierung wurde festgelegt\n"
 ETH_the_emperor_stays:0 "Der Kaiser bleibt"
 ETH_the_emperor_stays_desc:0 "Trotz der Bitten seiner Berater hat Seine Majestät [ETH.GetLeader] die heldenhafte Entscheidung getroffen, in [ETH.GetName] zu bleiben und den Kampf an der Seite seiner tapferen Krieger fortzusetzen. Hoffentlich kann er uns in der dunkelsten Stunde des Imperiums den Sieg bringen."
 ETH_the_american_radio_address:0 "Die amerikanische Radioansprache"
 ETH_the_american_radio_address_desc:0 "Die Gesetze des Völkerbundes werden ständig verletzt, da es immer wieder zu Aggressionen kommt. Damit der Geist des Verfluchten nicht die Oberhand über die Menschheit gewinnt, sollten alle friedliebenden Menschen zusammenarbeiten und standhaft bleiben, um Recht und Gesetz zu wahren."
 ETH_the_patriots:0 "Die Patrioten"
 ETH_the_patriots_desc:0 "Während die Patrioten von Gojjam die Pläne der kaiserlichen Regierung von [ETH.GetName] für die Region behinderten, helfen sie uns nun, indem sie die [ITA.GetAdjective]s daran hindern, die Region überhaupt zu regieren. Wir sollten alles tun, um den Patrioten zu helfen, im Land Fuß zu fassen und zu verhindern, dass die [ITA.GetAdjective]s es sich zu bequem machen. "
 ETH_the_patriots_tt:0 "Schaltet den kontinuierlichen Fokus §Y$ETH_supporting_the_arbegnoch$§! frei.\nFügt §G+10§! Widerstandsziele in feindlich besetzten Staaten in Nord- und Zentraläthiopien hinzu."
 ETH_allow_fundraising_campaigns_tt:0 "Schaltet „Entscheidungen“ frei, um Spendenkampagnen zur Aufstockung der kaiserlichen Schatzkammer zu starten."
 ETH_patriot_resistance_tt:0 "Aktiver Widerstand der Arbegnoch: §R+10%§!"
 ETH_addressing_the_league_of_nations:0 "Ansprache an den Völkerbund"
 ETH_addressing_the_league_of_nations_desc:0 "Das Versäumnis der Versammlung, in der Frage des Eroberungskrieges von [ITA.GetName] zu handeln, und die daraus resultierende Politik der Vernachlässigung der Opfer von Aggressionen bedrohen die Existenz des Völkerbundes. Diejenigen Mitglieder, die sich für diese Politik der Vernachlässigung entschieden haben, sollten bedenken: Heute sind wir es, morgen seid ihr es ..."
 ETH_the_abuna:0 "Die Abuna"
 ETH_the_abuna_desc:0 "Widerstand gegen die [ITA.GetAdjective]-Invasoren ist nicht nur eine Frage der Loyalität gegenüber dem Kaiser, sondern auch eine Frage der Moral. Indem wir uns mit $ETH_abuna_qerellos_iv$ beraten, können wir dem Volk die Rechtmäßigkeit unserer Sache und die Notwendigkeit, im Namen unseres Gottes seine Pflicht zu erfüllen, demonstrieren."
 ETH_the_lion_stands_firm:0 "Der Löwe bleibt standhaft"
 ETH_the_lion_stands_firm_desc:0 "Durch den siegreichen Löwen aus dem Stamm Juda hat Seine Kaiserliche Majestät [ETH.GetLeader] bewiesen, dass er ein fähiger Krieger ist. Wir müssen die Truppen sammeln, indem wir ihnen die Stärke ihres Kaisers zeigen, der an ihrer Seite kämpft und beweist, dass die [ITA.GetAdjective] Kriegsmaschinerie besiegt werden kann."
 ETH_the_lion_stands_firm_tt:0 "\nÄndert §Y$ETH_army_1_dynamic_modifier$§!:\n$modifier_army_sub_unit_irregular_infantry_max_org_factor$: §G+5%§!"
 ETH_unification_of_the_habesha:0 "Vereinigung der Habesha"
 ETH_unification_of_the_habesha_desc:0 "Der Krieg mit [ITA.GetName] hat unserer Infrastruktur unvorstellbaren Schaden zugefügt und unser Volk in Not gebracht. Die bloße Rückeroberung unseres Heimatlandes reicht nicht mehr aus. Wir fordern von den [ITA.GetAdjective]s Entschädigung, einschließlich territorialer Zugeständnisse, die uns die Vereinigung der Habesha-Völker ermöglichen."
 ETH_the_ferengi:0 "Die Ferengi"
 ETH_the_ferengi_desc:0 "Obwohl der Völkerbund nur langsam auf unsere Bitten um Hilfe reagiert, gibt es keinen Mangel an einzelnen Ausländern, die bereit sind, für unsere Sache zu kämpfen. Solange wir sie dafür bezahlen."
 ETH_the_ferengi_tt:0 "Schaltet §YEntscheidungen§! frei, um mit den Mitteln der kaiserlichen Schatzkammer Söldner zu rekrutieren."
 ETH_recruit_from_the_african_diaspora:0 "Rekrutieren Sie aus der afrikanischen Diaspora"
 ETH_recruit_from_the_african_diaspora_desc:0 "Viele Menschen in der afrikanischen Diaspora weltweit wollen nicht zusehen, wie eines der letzten Überbleibsel des unabhängigen Afrikas ausgelöscht wird. Sie sind bereit, zu den Waffen zu greifen und an unserer Seite zu kämpfen. Gemeinsam werden wir nicht nur [ETH.GetName] retten, sondern die Idee der afrikanischen Freiheit."
 ETH_anti-italian_propaganda:0 "Anti-italienische Propaganda"
 ETH_anti-italian_propaganda_desc:0 "Obwohl wir die Gastfreundschaft unserer Gastgeber sehr schätzen, die dem Kaiser einen sicheren Aufenthalt hier ermöglicht, könnten sie mehr tun, um die Befreiung unseres Volkes von der faschistischen Besatzung zu beschleunigen. Wir müssen ihnen die Schrecken bewusst machen, die die [ITA.GetAdjective] über das Volk von [ETH.GetName] gebracht haben, und sie für eine mögliche Befreiungskampagne auf unsere Seite ziehen."
 ETH_black_lions_resistance_tt:0 "Aktiver Widerstand der Schwarzen Löwen: §R+10%§!"
 ETH_unlock_black_lions_tt:0 "Schaltet den kontinuierlichen Fokus §Y$ETH_strengthen_the_black_lions$§! frei.\nFügt §G+10§! Widerstandsziele in feindlich besetzten Staaten im südlichen Äthiopien hinzu."
 ETH_the_heroes_of_ethiopia:0 "Die Helden Äthiopiens"
 ETH_the_heroes_of_ethiopia_desc:1 "Viele unserer militärischen Führer haben sich als hervorragende Strategen erwiesen. Trotz der überwältigenden materiellen Überlegenheit des Feindes haben unsere militärischen Führer ihren Vormarsch zum Stillstand gebracht. Wir müssen diese Helden für ihren Beitrag zum Überleben von [ETH.GetNameDef] belohnen."
 ETH_seyoum_mengesha_upgrade_tt:0 "Gewinne: \n§Y$army_regrouping_2$§!"
 ETH_mulugeta_yeggazu_of_illubabor_upgrade_tt:0 "Gewinne: \n§Y$army_chief_morale_3$§!"
 ETH_ras_imru_haile_selassie_upgrade_tt:0 "Gewinne: \n§Y$army_infantry_2$§!"

 ETH_the_heroes_of_ethiopia_tt:0 "\nÄndert §Y$ETH_army_1_dynamic_modifier$§!:\n$modifier_army_sub_unit_irregular_infantry_attack_factor$: §G+5%§!\n$modifier_army_sub_unit_irregular_infantry_speed_factor$: §G+5%§!"
 ETH_learning_from_the_enemy:0 "Vom Feind lernen"
 ETH_learning_from_the_enemy_desc:0 "Trotz unserer begrenzten industriellen Kapazität können wir die technologische Überlegenheit der [ITA.GetAdjective] ausnutzen, indem wir ihre Fahrzeuge und Ausrüstung nachbauen und sie so gegen ihre Schöpfer aufbringen."
 ETH_learning_from_the_enemy_tt:1 "Ändern Sie §Y$ETH_industrialization_dynamic_modifier$§! durch:\n$MODIFIER_INDUSTRIAL_CAPACITY_FACTOR$: §G+10%§!"
 ETH_learning_from_the_enemy_armor:0 "Vom Feind lernen: Gepanzerte Fahrzeuge"
 ETH_learning_from_the_enemy_air:0 "Vom Feind lernen: Flugzeuge"
 ETH_light_tank_tt:0 "Erstellen Sie eine Variante von §Y$light_tank_chassis_1$: [ITA.GetFlag] L3/35§!"
 ETH_aircraft_tt:1 "Erstelle eine Variante von §Y$small_plane_airframe_0$: [ITA.GetFlag] CR.32§! \n Erstelle eine Variante von §Y$medium_plane_airframe_0$: [ITA.GetFlag] Ca.101§!"
 ETH_organize_regional_revolts:0 "Organisieren Sie regionale Revolten"
 ETH_organize_regional_revolts_desc:0 "Die [ITA.GetAdjective]s haben unser Heimatland noch nicht fest im Griff. Der Widerstand gegen die Besatzung lässt ihre Ausrüstung, ihre Arbeitskräfte und vor allem ihre Begeisterung für die Fortsetzung dieses blutigen Kolonialvorhabens zusehends schwinden. Wir müssen den Widerstand weiterhin unterstützen und die Bemühungen zum Sturz der [ITA.GetAdjective] Besatzungstruppen koordinieren."
 ETH_organize_regional_revolts_tt:0 "Schaltet „Entscheidungen“ für die Organisation von Rebellenarmeen in besetzten Gebieten frei."
 ETH_secure_arms:0 "Sichere Waffen"
 ETH_secure_arms_desc:0 "Die spärliche Industrie von [ETH.GetName] ist nachweislich nicht in der Lage, eine Armee zu ernähren. Wir müssen den Reichtum der kaiserlichen Schatzkammer nutzen, um Waffen zu kaufen und sie unseren heldenhaften Kriegern umgehend zukommen zu lassen."
 ETH_secure_arms_tt:0 "Schaltet §YEntscheidungen§! frei, um mit den Mitteln der kaiserlichen Schatzkammer militärische Ausrüstung zu kaufen"
 ETH_volunteers:0 "Freiwillige"
 ETH_volunteers_desc:0 "Weltweit betrachten unterdrückte Völker [ETH.GetName] als Symbol der Hoffnung im Kampf gegen die überwältigende imperialistische Aggression. Nun haben sich auch Menschen jenseits unserer Grenzen hinter [ETH.GetAdjective]-Bannern versammelt, um an unserer Seite zu kämpfen. Es scheint, als gäbe es immer noch Menschen, die nicht zusehen wollen, wie der Traum von Freiheit durch die Launen von [ITA.GetLeader] ausgelöscht wird."
 ETH_fait_accompli:0 "Vollendete Tatsachen"
 ETH_fait_accompli_desc:0 "Während viele davon ausgingen, dass [ETH.GetName] zu einer Fußnote in der Geschichte des Kolonialismus werden würde, hat es die überwältigende Übermacht überwunden, indem es nicht nur die [ITA.GetAdjective]-Invasion abwehrte, sondern [ITA.GetName] vollständig aus Ostafrika vertrieb. Jetzt müssen die [ITA.GetAdjective]s nur noch ihre Niederlage offiziell anerkennen."
 ETH_fait_accompli_tt:0 "§Y[ITA.GetNameWithFlag]§! wird einen Frieden mit §Y[ROOT.GetNameWithFlag]§! unterzeichnen und alle afrikanischen Staaten abtreten, die von [ROOT.GetNameDef] kontrolliert werden.\n "
 ETH_reclaiming_ethiopia:0 "Die Rückeroberung Äthiopiens"
 ETH_reclaiming_ethiopia_desc:0 "Wir bewegen unsere Gastgeber allmählich dazu, [ETH.GetLeader] trotz der illegalen Besetzung durch [ITA.GetName] offiziell als rechtmäßigen Herrscher von [ETH.GetName] anzuerkennen. Sie brauchen nur noch einen Anstoß, und wir können vielleicht endlich den lang erwarteten Befreiungsfeldzug starten."
 ETH_reclaiming_ethiopia_not_exile_tt:0 "\nAuswirkungen, wenn es sich nicht um eine Exilregierung handelt:"
 ETH_reclaiming_ethiopia_exile_tt:0 "Auswirkungen, wenn [ROOT.GetName] eine Exilregierung hat:"
 ETH_haile_selassie_returns_tt:0 "$ETH_haile_selassie$ kehrt zu [ETH.GetName] zurück:"
 ETH_reclaiming_ethiopia_event_tt:0 "§Y[GetEthiopianHostName]§!:"
 ETH_formal_request_unlocked_tt:0 "Schaltet §YEntscheidung§! frei, um eine formelle Anfrage an das Gastland zu stellen, sich dem Krieg anzuschließen, wenn eine Exilregierung"
 ETH_ethiopia_recognized_tt:0 "[ROOT.GetLeader] wird als der wahre Anführer von [ROOT.GetNameDef] anerkannt:\n §Y[ROOT.GetName]§! kann Verbündete zum Krieg aufrufen."
 ETH_the_heir_of_solomon:0 "Der Erbe Salomons"
 ETH_the_heir_of_solomon_desc:0 "[ENG.GetName] hat in Palästina ein Pulverfass der Spannungen geschaffen, das zum Zusammenbruch der Unterstützung für ihr Regierungsmandat im Völkerbund geführt hat. Wären sie vielleicht bereit, die Regierung der Region jemand anderem zu übertragen? Und wer wäre für diese Aufgabe besser geeignet als der Erbe Salomons, [ETH.GetLeader]."
 ETH_protector_of_the_somalis:0 "Beschützer der Somalier"
 ETH_protector_of_the_somalis_desc:0 "Die [SOM.GetAdjective]s sind nicht nur der barbarischen Herrschaft der [ITA.GetAdjective]s unterworfen, sondern wurden auch dazu gezwungen, im Interesse der territorialen Expansion von [ITA.GetLeader] gegen ihr eigenes Volk zu kämpfen. Wenn [ITA.GetName] aus der Region vertrieben wird, werden wir die [SOM.GetAdjective]s vor der Ausbeutung durch andere europäische Mächte schützen."
 ETH_the_king_of_kings:0 "Der König der Könige"
 ETH_the_king_of_kings_desc:0 "Seine Majestät, [ETH.GetLeader], hat uns vor dem demütigenden Schicksal bewahrt, Diener der [ITA.GetAdjective]s zu werden. Er ist ein Führer ohnegleichen in der modernen Welt und sollte als solcher verehrt werden."
 ETH_rebuilding_the_country:0 "Wiederaufbau des Landes"
 ETH_rebuilding_the_country_desc:0 "Nachdem wir die volle Autorität über unser Land wiederhergestellt haben, können wir endlich mit der Reparatur der Schäden beginnen, die die [ITA.GetAdjective]s an unseren Häusern und unserer Industrie verursacht haben."
 ETH_support_anti-colonialist_resistance:0 "Unterstützen Sie den antikolonialistischen Widerstand"
 ETH_support_anti-colonialist_resistance_tt:0 "Schaltet „Entscheidungen“ frei, um den Widerstand in den Kolonialstaaten in „Ostafrika“ zu stärken."
 ETH_support_anti-colonialist_resistance_desc:0 "Die Gefahr eines Konflikts wird uns auf unbestimmte Zeit begleiten, wenn die Kolonialmächte ihre Stellung in Ostafrika behaupten. Wir müssen sie aus der Region vertreiben, indem wir die Massen aufrütteln und ihnen die Mittel geben, ihre Unabhängigkeit wiederzuerlangen."
 ETH_empower_the_ras:0 "Stärken Sie die Ras&#39;"
 ETH_empower_the_ras_desc:0 "Eine weitere Stärkung der ungebildeten Bauern des Reiches wird auf lange Sicht nur zur Zerstörung des imperialen Systems führen. Stattdessen werden wir den Ras&#39; Macht verleihen, im Austausch für ihre anhaltende Loyalität gegenüber dem Kaiser."
 ETH_re-convene_the_parliament:0 "Wiedereinberufung des Parlaments"
 ETH_re-convene_the_parliament_desc:0 "Es ist an der Zeit, die Verfassung von 1931 wiederherzustellen und die Institutionen von [ETH.GetName] weiter zu modernisieren. Wir werden das Reichsparlament wieder einberufen und die Zahl der Abgeordneten erhöhen, um die verschiedenen Regionen des Reiches besser regieren zu können.  "
 ETH_unite_the_afar:0 "Vereint die Afar"
 ETH_unite_the_afar_desc:0 "Da sich der Fokus Europas auf den eigenen Kontinent verlagert, könnte es möglich sein, die Unterstützung der Afar im Norden zu gewinnen, indem man die Region [DJI.GetName] kauft und die Afar nach Jahrzehnten der Trennung wieder vereint."
 ETH_lord_of_lords:0 "Herr der Herren"
 ETH_lord_of_lords_desc:0 "Obwohl unser Reich aus vielen Kulturen besteht, verneigen sich alle vor demselben Herrn der Herren. Selbst die edelsten Herren wissen, dass sie dem Kaiser verpflichtet sind. Seine Majestät ist der unangefochtene Herrscher dieser Länder."
 ETH_elect_of_god:0 "Auserwählte Gottes"
 ETH_elect_of_god_desc:0 "Wir sehen Gott in den Taten unseres Kaisers. Wie sonst lassen sich seine Erfolge auf dem Schlachtfeld und in der Führung unseres großen Reiches erklären? Das Volk weiß, dass es im Einklang mit dem Willen des Allmächtigen handelt, wenn man den Befehlen des Kaisers folgt."
 ETH_restore_the_empire_of_axum:0 "Stellen Sie das Reich von Aksum wieder her"
 ETH_restore_the_empire_of_axum_desc:0 "Vom Sudan bis zur Arabischen Halbinsel – einst standen sie alle unter der Kontrolle unserer Vorfahren. Unsere Herrschaft wurde im Laufe der Jahrhunderte immer weiter zersplittert und wir sind den Launen der Europäer ausgeliefert. Es ist an der Zeit, das Blatt zu wenden. Wir werden unser Erbe bewahren, indem wir das Reich von Axum reformieren und unser angestammtes Land zurückerobern."
 ETH_restore_the_empire_of_axum_tt:0 "Schaltet die §YEntscheidung§! zur Gründung des Reiches von Aksum frei, wenn genügend Staaten kontrolliert werden."
 ETH_a_federal_empire:0 "Ein föderales Imperium"
 ETH_a_federal_empire_desc:0 "Das imperiale Regierungssystem bietet weitaus mehr Stabilität als das Chaos der parlamentarischen Demokratie. Solange die Herren der verschiedenen Regionen Seiner Majestät [ETH.GetLeader] Treue schwören, ist es uns egal, wie sie ihre Besitztümer verwalten."
 ETH_a_federal_empire_tt:0 "Entfernt den Modifikator §Y$ETH_state_decentralization_dynamic_modifier$§! aus allen Zuständen."
 ETH_federal_factories_tt:0 "Fügen Sie in jeder veröffentlichten Puppe §Y1 Gebäudeplatz§! und §Y1 $Industriekomplex$§! hinzu."
 ETH_empower_the_chambers:0 "Stärkung der Kammern"
 ETH_empower_the_chambers_desc:0 "Die Verfassung von 1931 ging bei der Kodifizierung der Rolle des Kaisers nicht weit genug. Auch die Bevölkerung wurde nicht ausreichend in den Entscheidungsprozess der Regierung einbezogen. Wir müssen die Abgeordnetenkammer stärken, indem wir ihr mehr Kontrolle über die Staatsangelegenheiten geben, ohne dabei die heilige Rolle des Kaisers zu beeinträchtigen."
 ETH_empower_the_chambers_tt:0 "Ändern Sie §Y$ETH_corrupt_bureaucracy_dynamic_modifier$§! durch:\n$MODIFIER_PRODUCTION_SPEED_BUILDINGS_FACTOR$: §G+5%§!"
 ETH_the_african_union:0 "Auf dem Weg zur afrikanischen Einheit"
 ETH_the_african_union_desc:0 "Wir fordern ein Ende des Kolonialismus, denn die Beherrschung eines Volkes durch ein anderes ist falsch. Ein koordiniertes Vorgehen aller Afrikaner bei gemeinsamen Problemen ist unerlässlich, damit unsere Meinungen das nötige Gewicht erhalten. Daher werden wir aus der Integrität und Überzeugung unserer tiefsten Überzeugungen handeln und für die Befreiung des gesamten afrikanischen Kontinents kämpfen."
 ETH_african_independence_tt:0 "Schaltet „Entscheidungen“ frei, um den Widerstand zu stärken und den Autonomiegewinn in afrikanischen Ländern zu fördern."
 ETH_arabian_independence_tt:0 "Schaltet „Entscheidungen“ frei, um den Widerstand zu stärken und den Autonomiegewinn in den Ländern der Arabischen Halbinsel zu fördern."
 ETH_african_independence_join_tt:0 "Ermöglicht §Y[ROOT.GetNameDef]§!, in afrikanische Unabhängigkeitskriege einzugreifen."
 ETH_african_union_faction:0 "Afrikanische Union"
 ETH_pan-africanism:0 "Panafrikanismus"
 ETH_pan-africanism_desc:0 "Das Ziel der Gleichheit, das wir anstreben, ist das Gegenteil der Ausbeutung eines Volkes durch ein anderes, von der die jüngere afrikanische Geschichte so ausführlich berichtet. In welcher Form auch immer dieses Übel auftritt, es muss gemieden werden, wo es nicht existiert, und dort, wo es existiert, vernichtet werden. Es ist unsere heilige Pflicht, dafür zu sorgen, dass der Traum von Gleichheit endlich für alle Wirklichkeit wird, denen er noch verwehrt ist."
 ETH_the_one_true_heir_of_solomon:0 "Der einzig wahre Erbe Salomons"
 ETH_the_one_true_heir_of_solomon_desc:0 "Seine Majestät, [ETH.GetLeader], kann seine königliche Blutlinie bis zum großen König Salomon zurückverfolgen. Während viele Nationen Gott den Rücken kehrten, blieben wir [ETH.GetAdjective] unserem Glauben treu. In diesem Zeitalter des Chaos ist es nur recht und billig, dass der einzig wahre Erbe Salomos über das Heilige Land herrscht, um es vor dem korrumpierenden Einfluss menschlicher Ideologien zu schützen."
 ETH_the_one_true_heir_of_solomon_tt:0 "Schaltet die §YEntscheidung§! frei, um das Reich Salomons zu gründen"
 ETH_jah:0 "Jah"
 ETH_jah_desc:0 "Die Rastafari-Bewegung hat ein unerwartetes Netzwerk von [ETH.GetName]-Anhängern weltweit geschaffen. Viele schreiben unserem Kaiser [ETH.Getleader] eine große religiöse Bedeutung zu. Manche behaupten sogar, er sei die Verkörperung Gottes, genauer gesagt Jah. Vielleicht sollten wir unsere internationale Unterstützung nutzen, um diese Rastafari-Bewegung zu unterstützen."
 ETH_jah_tt:0 "Schaltet die §YEntscheidung§! frei, das Reich Zion zu gründen"
 ETH_military_communism:0 "Militärkommunismus"
 ETH_military_communism_desc:0 "Die wenigen Erfolge, die wir an der Front erzielen, sind dem Einfallsreichtum und der Tapferkeit der einfachen Soldaten zu verdanken, nicht ihrer angestammten Führung. Das Grollen der Unzufriedenheit wird lauter. Der Imperialismus hat seinen Lauf genommen. Jetzt ist die Zeit für eine gewaltsame Umverteilung des Reichtums gekommen."
 ETH_defending_our_homes:0 "Verteidigung unserer Häuser"
 ETH_defending_our_homes_desc:0 "Die imperiale Clique in [ROOT.Capital.GetCapitalVictoryPointName] sorgt sich nur um ihre eigene Sicherheit. Dabei sind es unsere Häuser und Familien, die zerstört wurden. Wir können das nicht länger zulassen. Wir werden jeden Zentimeter unserer Heimat verteidigen, nicht für den Kaiser, sondern für uns selbst."
 ETH_anti_imperialist_agitation:0 "Antiimperialistische Agitation"
 ETH_anti_imperialist_agitation_desc:0 "Die Loyalität des Volkes gegenüber [ROOT.GetLeader] schwankt. Indem unsere vermeintlichen Führer ihre wichtigste Pflicht, den Schutz des Volkes, vernachlässigt haben, haben sie ihre Unfähigkeit deutlich unter Beweis gestellt. An der Front und auf der Straße wird nun offen diskutiert, was einst unvorstellbar war. Eine Nation ohne Kaiser."
 ETH_in_the_name_of_the_people:0 "Im Namen des Volkes"
 ETH_in_the_name_of_the_people_desc:0 "Im Namen des Volkes werden wir die dynastische Tyrannei, die [ROOT.GetName] jahrhundertelang beherrscht hat, auflösen. An ihrer Stelle werden wir eine Arbeiterrepublik errichten, frei von der Knechtschaft des Feudalismus. Und durch unsere gemeinsame Stärke werden wir den Faschismus in Afrika besiegen."
 EHT_in_the_name_of_the_people_tt:2 "Erstelle §Yzwei§! Elitedivision der kommunistischen §YRoten Garden§! und §Ydrei§! Elitedivision der anarchistischen §YSchwarzen Löwen§! in [ETH.Capital.GetCapitalVictoryPointName]. \n\n§R$ETH_seyoum_mengesha$ wird nicht länger verfügbar sein!§!"
 ETH_callout_to_the_world:0 "Ein Aufruf an die Welt"
 ETH_callout_to_the_world_desc:0 "Unser Kampf gegen den Faschismus beschränkt sich nicht nur auf unser Land, sondern ist Teil eines umfassenderen globalen Kampfes gegen Autoritarismus. Wir werden die Kräfte des Antifaschismus weltweit für unsere Sache mobilisieren, denn heute sind wir es, die brutal behandelt werden, morgen wird es die ganze Welt sein."
 ETH_callout_to_the_world_tt:0 "§Y$ENG_sylvia_pankhurst$§! und §Y$IA_emma_goldman$§! stehen als Berater zur Verfügung."
 ETH_soviet_aid:0 "Sowjetische Hilfe"
 ETH_soviet_aid_desc:0 "Wir haben die Fesseln der feudalen Treue erfolgreich abgeworfen. Nun müssen wir die Faschisten besiegen und mit dem Aufbau unserer Arbeiterrepublik beginnen. Wenn es jemanden gibt, der unserer Sache wohlwollend gegenübersteht, dann ist es sicherlich das Volk von [SOV.Getname]."
 ETH_soviet_aid_tt:0 "§R\n[SOV.GetNameDefCap] erwartet im Austausch für Hilfe eine größere Kontrolle über unsere Angelegenheiten! §!"
 ETH_humanitarian_aid:0 "Humanitäre Hilfe"
 ETH_humanitarian_aid_desc:0 "Dem Feind ist es egal, wie viel Leid er unserem Volk zufügt. Wenn das so weitergeht, wird es kein Land mehr zu verteidigen geben. Die Welt muss die Schrecken sehen, die hier geschehen, und wir brauchen die sofortige humanitäre Hilfe."
 ETH_humanitarian_aid_tt:0 "Ändern Sie §Y$ETH_international_red_cross_dynamic_modifier$§! um:\n$MODIFIER_INDUSTRY_REPAIR_FACTOR$: §G+10%§!"
 ETH_support_from_the_japanese_communists:0 "Japanischer Anarcho-Kommunismus"
 ETH_support_from_the_japanese_communists_desc:0 "Die Völker von [JAP.GetAdjective] und [ETH.GetAdjective] haben seit langem Respekt voreinander, da sie zu den wenigen gehörten, die der europäischen Kolonisierung erfolgreich Widerstand leisteten. Während wir in [ETH.GetNameDef] die feudale Epoche hinter uns lassen, gibt es in [JAP.GetNameDef] Menschen, die unsere Ideale teilen und uns beim Aufbau einer vorbildlichen anarcho-kommunistischen Gesellschaft unterstützen können."
 ETH_support_from_the_japanese_communists_tt:0 "§Y$IA_sakutaro_iwasa$§! und §Y$IA_sanshiro_ishikawa$§! als Berater zur Verfügung stehen."
 ETH_support_from_the_japanese_communists_fascist_tt:0 "§RMündet dazu führen, dass [JAP.GetFlag][JAP.GetName] ein Handelsembargo gegen [ETH.GetFlag][ETH.GetName] verhängt!§!"
 ETH_raise_from_the_ranks:0 "Aufstieg aus den Reihen"
 ETH_raise_from_the_ranks_desc:0 "Der Adel soll nicht länger das Kommando über die Streitkräfte haben. Viele unserer tapferen Soldaten haben sich als fähige Anführer erwiesen. Es ist an der Zeit, dass wir Tapferkeit und Fähigkeiten auf dem Schlachtfeld belohnen, statt dynastischer Verbindungen oder persönlichem Reichtum."
 ETH_raise_from_the_ranks_tt:1 "Fügen Sie §Yzwei§! neue Offiziere mit dem Rang eines §YGenerals§! hinzu."
 ETH_soviet_rifles:0 "Sowjetische Gewehre"
 ETH_soviet_rifles_desc:0 "Wir waren völlig unvorbereitet, als [ITA.GetName] uns angriff. Unsere Industrie kann mit den logistischen Anforderungen der modernen Kriegsführung nicht mehr Schritt halten. Wir brauchen Gewehre und Munition in den Händen aller, die sie tragen können. Vielleicht können unsere Freunde in [SOV.Capital.GetCapitalVictoryPointName] helfen. "
 ETH_soviet_rifles_tt:1 "\nWenn [SOV.GetFlag]§Y[SOV.GetName]§! zustimmt, erhält [ETH.GetFlag]§Y[ETH.GetName]§! §G10.000§! Infanterieausrüstung."
 ETH_military_advisors:0 "Sowjetische Generäle"
 ETH_military_advisors_desc:0 "Obwohl sich viele unserer Offiziere an die Anforderungen der modernen Kriegsführung angepasst haben, ist es offensichtlich, dass sie größtenteils improvisieren müssen, so gut es geht. Wir könnten viel von unseren Kameraden beim [SOV.GetAdjective] Militär lernen."
 ETH_military_advisors_tt:1 "\nWenn [SOV.GetFlag]§Y[SOV.GetName]§! zustimmt, erhält [ETH.GetFlag]§Y[ETH.GetName]§! einen Feldmarschall (§Y$SOV_semyon_budyonny$§!) und einen General (§Y$SOV_vasily_kuznetsov$§!)."
 ETH_international_brigades_communist:0 "Internationale Brigaden"
 ETH_soviet_rejection_tt:0 "\n[SOV.GetFlag]§Y[SOV.GetNameDefCap]§! §Rwird diesen Vorschlag wahrscheinlich ablehnen, wenn sie nicht mehr kommunistisch sind oder einen Bürgerkrieg erleben!§!"
 ETH_international_brigades_communist_desc:0 "Weltweit gibt es viele Menschen, die unseren Kampf gegen die [ITA.GetAdjective] unterstützen. Wir sollten ihre Sympathie nutzen und ihnen die Möglichkeit bieten, gemeinsam mit uns gegen den Faschismus zu kämpfen."
 ETH_peoples_army:0 "Die Volksarmee"
 ETH_peoples_army_desc:0 "Trotz unserer anfänglichen Schwäche in der modernen Kriegsführung ist es uns gelungen, die Invasion durch den Einsatz unkonventioneller Taktiken zu verlangsamen. Wir können dies in unserer Militärdoktrin verankern und unsere Offiziere in der asymmetrischen Kriegsführung schulen."
 ETH_the_new_administration:0 "Die neue Regierung"
 ETH_the_new_administration_desc:0 "Inmitten der jüngsten Unruhen haben viele Menschen ihr Bestes gegeben, um unser Land zu verteidigen. Einige, wie Senedu Gebru, verfügen über die Fähigkeiten und das Wissen, die Gesellschaft drastisch zu verbessern. Jetzt geben wir ihnen die Möglichkeit dazu."
 ETH_the_new_administration_tt:0 "§YSenedu Gebru§! wird als politischer Berater verfügbar.\n $rebellious_educator_tt$ \nZwei §Yrandomisierte§! Charaktere werden ebenfalls als politische Berater verfügbar sein."
 ETH_clearing_the_skies:0 "Den Himmel klären"
 ETH_clearing_the_skies_desc:0 "Unsere Soldaten sind dem feindlichen Flugverkehr völlig schutzlos ausgeliefert. Erschwerend kommt hinzu, dass der Feind stets über unsere Einsatzorte und Bewegungen informiert ist. Um überhaupt eine Chance auf den Sieg zu haben, brauchen wir eine eigene Luftwaffe und entsprechende Gegenmaßnahmen. Deshalb sollten wir Freiwillige zur Ausbildung in die Luftwaffe schicken."
 ETH_clearing_the_skies_tt:1 "\nWenn [SOV.GetFlag]§Y[SOV.GetName]§! zustimmt, erhält [ETH.GetFlag]§Y[ETH.GetName]§! §G100§! [SOV.GetAdjective] Kampfflugzeuge und §YEarly Fighter§!-Technologie."
 ETH_counter_the_armored_threat:0 "Bekämpfen Sie die gepanzerte Bedrohung"
 ETH_counter_the_armored_threat_desc:0 "Panzerkämpfe ersetzen eindeutig die Rolle der Kavallerie auf dem Schlachtfeld. Leider haben wir keine Möglichkeit, [ITA.GetAdjective] Panzern angemessen entgegenzuwirken, und unsere Industrie ist noch nicht in der Lage, solche zu produzieren. Vielleicht wäre [SOV.GetName] bereit, sich von einigen seiner älteren Panzerfahrzeuge zu trennen?"
 ETH_counter_the_armored_threat_LaR_tt:1 "\nWenn [SOV.GetFlag]§Y[SOV.GetName]§! zustimmt, erhält [ETH.GetFlag]§Y[ETH.GetName]§! §YPanzerwagen der Zwischenkriegszeit§!-Technologie und §G480§! [SOV.GetAdjective]-Panzerwagen."
 ETH_counter_the_armored_threat_NoLaR_tt:1 "\nWenn [SOV.GetFlag]§Y[SOV.GetName]§! zustimmt, erhält [ETH.GetFlag]§Y[ETH.GetName]§! §YInterwar Tank§!-Technologie und §G200§! [SOV.GetAdjective]-Panzer."
 ETH_counter_the_armored_threat_NoNSB_tt:1 "\nWenn [SOV.GetFlag]§Y[SOV.GetName]§! zustimmt, erhält [ETH.GetFlag]§Y[ETH.GetName]§! §YGreat War Tank§!-Technologie und §G200§! [SOV.GetAdjective]-Panzer."
 ETH_peace_negotiations:0 "Friedensverhandlungen"
 ETH_peace_negotiations_desc:0 "Unser Volk hat große Opfer gebracht, um die [ITA.GetAdjective]-Invasion aufzuhalten. Nachdem wir den [ITA.GetAdjective]s bewiesen haben, dass wir nicht vor ihnen zusammenbrechen werden, haben wir die Chance, Frieden zu schließen. Oder zumindest ein Waffenstillstandsabkommen."
 ETH_soviet_mediation:0 "Sowjetische Vermittlung"
 ETH_soviet_mediation_desc:0 "Trotz der heldenhaften Anstrengungen unseres Volkes, die [ITA.GetAdjective]-Invasion aufzuhalten, sind wir weit davon entfernt, einen vollständigen Sieg über sie zu erringen. Der Völkerbund hat seine mangelnde Bereitschaft gezeigt, uns zu helfen, daher ist unsere einzige Hoffnung [SOV.GetNameDefCap]."
 ETH_soviet_mediation_tt:0 "§R\n[SOV.GetNameDefCap] könnte versuchen, die Kontrolle über uns zu übernehmen, wenn er im Gegenzug mit [ITA.GetName] verhandelt! §!"
 ETH_support_spain:0 "Support Spanien"
 ETH_support_spain_desc:0 "Spanien hat unter einheimischen Faschisten gelitten. Es gibt jedoch auch diejenigen, die wie wir glauben, dass dem Faschismus entschiedener Widerstand entgegengesetzt werden muss und das Volk sich selbst regieren kann. Wir werden die Lehren aus unserem Krieg gegen die [ITA.GetAdjective] nutzen, um den [SPC.GetAdjective]-Widerstand zu unterstützen."
 ETH_local_committees:0 "Lokale Komitees"
 ETH_local_committees_desc:0 "Wir haben die Chance, ein neues Regierungssystem zu schaffen, frei von sinnlosen Hierarchien, die unweigerlich Korruption fördern und den Willen des Volkes unterdrücken. Wir sollten diese Gelegenheit nutzen, um eine Föderation von Kommunen zu gründen, die sich alle an die Prinzipien des Anarchokommunismus halten."
 ETH_a_guiding_hand:0 "Eine leitende Hand"
 ETH_a_guiding_hand_desc:0 "Eine lose Koalition von Kommunen ohne übergeordnete Autorität ist zu idealistisch. Wir brauchen ein Kabinett aus Repräsentanten und Experten, das die Wirtschaftspolitik steuert und im Notfall schnell reagieren kann. Wir dürfen uns in Krisenzeiten nicht die gleichen Fehler leisten wie die kaiserliche Verwaltung."
 ETH_transformation_of_nature:0 "Transformation der Natur"
 ETH_transformation_of_nature_desc:0 "[ETH.GetNameDefCap] ist reich an natürlichen Ressourcen, die nur darauf warten, erschlossen zu werden. Durch den Bau von Wasserkraftwerken an unseren Flüssen können wir jedes Haus im Land mit Strom versorgen. Gleichzeitig können wir unsere Wasserwege nutzen, um unsere landwirtschaftliche Kapazität zu erweitern und so die wachsende Bevölkerung zu versorgen."
 ETH_transformation_of_nature_tt:0 "(§Y4 Zufällig ausgewählte Besitzstaaten§!): Füge §G1§! Gebäudeslot hinzu"
 ETH_laying_the_tracks:0 "Gleise verlegen"
 ETH_laying_the_tracks_desc:0 "Ein Großteil der Bevölkerung und Industrie konzentriert sich im Westen unseres Landes. Um unsere reichlich vorhandenen natürlichen Ressourcen besser nutzen zu können, müssen wir daher unser Schienennetz massiv ausbauen, um die Güter zu unseren Fabriken transportieren zu können."
 ETH_red_army_engineers:0 "Ingenieure der Roten Armee"
 ETH_red_army_engineers_desc:0 "Ein Großteil der Infrastruktur unseres Landes wurde während der Invasion schwer beschädigt. Wenn wir eine echte Arbeiterrepublik aufbauen wollen, müssen wir nicht nur das Alte reparieren, sondern auch eine schnelle Industrialisierung einleiten. Wir sollten die Fähigkeiten unserer Kameraden in der Roten Armee nutzen, um diesen Prozess anzukurbeln."
 ETH_liberate_aussa:0 "Bringen Sie die Revolution in die Ferne"
 ETH_liberate_aussa_desc:0 "[AFA.GetNameDefCap] wird von einer verräterischen Oligarchie regiert, die sich mehrfach auf die Seite unserer Feinde gestellt hat. Eine solche Bedrohung für [ETH.GetNameDef] kann nicht länger ignoriert werden. Wir werden das [AFA.GetAdjective] Volk befreien und die Region in unsere Arbeiterrepublik integrieren."
 ETH_demand_DJI:0 "Befreie [268.GetName]"
 ETH_demand_DJI_desc:0 "Mit der Befreiung von [AFA.GetName] beherrschen wir nun einen beträchtlichen Teil der Afar-Völker. Die Afar bleiben jedoch aufgrund der [FRA.GetAdjective] Besetzung von [DJI.GetName] gespalten. Indem wir die Befreiung der Afar von der imperialistischen Herrschaft fordern, können wir möglicherweise deren Loyalität gewinnen und dabei einen strategischen Hafen erobern."
 ETH_the_rif:0 "Das Rif"
 ETH_the_rif_desc:0 "Viele der Faschisten, die heute in Spanien um die Macht kämpfen, waren einst Soldaten, die die Rif-Republik in Nordmarokko zerschlugen. Wir sollten unsere engen Verbindungen zu den [SPC.GetName] nutzen, um die Entkolonialisierung ihrer afrikanischen Besitzungen voranzutreiben. Wenn sie wirklich unsere Kameraden sind, werden sie uns sicherlich zustimmen. Und wenn nicht, wissen wir bereits, wie man mit Kolonialismus umgeht."
 #ETH_social_reforms: "Social Reforms"
 #ETH_social_reforms_desc: "Without the threat of a common enemy to unite us, we often find ourselves divided due to historic, cultural and religious grievances. We need a wave of social reforms to overcome these divisions so that we can remain united and continue the process of building a better [ETH.GetName]."
 #ETH_social_reforms_tt: "Unlock anarcho-communist social reform decisions."
 ETH_communal_education:0 "Kommunale Bildung"
 ETH_communal_education_desc:0 "Wenn wir den Lebensstandard der Bevölkerung verbessern wollen, ist es unerlässlich, dass jede Gemeinde in [ETH.GetNameDef] Zugang zu Bildung über Schulen und Bibliotheken hat."
 ETH_african_wildfire:0 "Afrikanischer Waldbrand"
 ETH_african_wildfire_desc:0 "Wir haben die Invasion erfolgreich überwunden, aber wir sollten nicht ruhen, bis ganz Afrika von den Schrecken des Kolonialismus befreit ist. Wir sollten unsere Fähigkeiten und Ressourcen nutzen, um den Widerstand auf dem gesamten Kontinent zu schüren und die Imperialisten zum Rückzug zu zwingen."
 ETH_flames_across_the_sea:0 "Flammen über dem Meer"
 ETH_flames_across_the_sea_desc:0 "Nicht nur Afrika hat unter der europäischen Hegemonie gelitten. Unsere Nachbarn am Roten Meer können sich den Forderungen der Imperialisten kaum oder gar nicht wirklich unabhängig machen. Wir sollten den Widerstand auf die arabische Halbinsel ausweiten, damit die Menschen eines Tages die Chance haben, vollständig selbst zu regieren."
 ETH_heavy_industry:0 "Schwerindustrie"
 ETH_heavy_industry_desc:0 "Wir müssen den Prozess der schnellen Industrialisierung fortsetzen, wenn wir den Fängen der feudalen Wirtschaft entkommen wollen. Die Entstehung der Schwerindustrie wird Arbeiter in die Städte locken und anstelle der bestehenden Bauernschaft eine Klasse von Musterproletariern schaffen."
 ETH_arms_production:0 "Waffenproduktion"
 ETH_arms_production_desc:0 "Der Höhepunkt der Industrialisierung wird die Schaffung einer eigenen Rüstungsindustrie sein. Nie wieder werden wir bei der Beschaffung unserer Verteidigungsausrüstung von anderen Nationen abhängig sein."
 ETH_mytishchi-ababa_plant:0 "Werk Mytischtschi-Abeba"
 ETH_mytishchi-ababa_plant_desc:0 "Wir sollten unsere engen Beziehungen zur Sowjetunion nutzen, um Know-how in der Herstellung von Haushalts- und Militärmaschinen zu erwerben. Ein gemeinsames Fabrikprojekt wäre ein idealer Mechanismus für den Erwerb dieses Wissens. Und wer wäre dafür besser geeignet als der Maschinenbau von Mytischtschi?"
 ETH_send_home_advisors:0 "Senden Sie Berater nach Hause"
 ETH_send_home_advisors_desc:0 "Obwohl wir im Krieg mit [ITA.GetName] von der Unterstützung der [SOV.GetName] profitierten, hätten wir nie erwartet, dass sie uns in eine derart unterwürfige Rolle zwingen würden. Mit dem Ausbau unserer eigenen industriellen und militärischen Kapazitäten gewinnen wir zunehmend an Kraft, den Forderungen von [SOV.GetAdjective] zu widerstehen. Daher ist es an der Zeit, klarzustellen, wer in [ETH.Capital.GetCapitalVictoryPointName] das Sagen hat."
 ETH_send_home_advisors_tt:0 "Bringen Sie alle [SOV.GetAdjective] Militärberater zu [SOV.GetNameDef] zurück."
 ETH_soviet-ethiopian_trade_agreement:0 "Sowjetisch-äthiopisches Handelsabkommen"
 ETH_soviet-ethiopian_trade_agreement_desc:0 "Viele Menschen auf der Welt zögern, mit uns Handel zu treiben, da sie unserer Arbeiterrepublik ideologische Widerstände entgegensetzen. Wir haben jedoch die Möglichkeit, mit den [SOV.GetAdjective]n ein für beide Seiten vorteilhaftes Handelsabkommen zu schließen, das uns den Austausch von Ressourcen und Waren ohne die üblichen Handelsbarrieren ermöglicht."
 ETH_seek_new_trading_partners:0 "Suchen Sie nach neuen Handelspartnern"
 ETH_seek_new_trading_partners_desc:0 "Menschen auf der ganzen Welt begehren die Reichtümer unseres Landes, doch wir sind darauf angewiesen, ausschließlich mit den [SOV.GetAdjective]s Handel zu treiben. Wir sollten auf andere Nationen zugehen, um zu zeigen, dass wir nicht nur eine Erweiterung der [SOV.GetName] sind, und anfangen, den Reichtum wieder an die [ETH.GetAdjective]-Bevölkerung zu bringen."
 ETH_freedom_at_gunpoint:0 "Freiheit mit vorgehaltener Waffe"
 ETH_freedom_at_gunpoint_desc:1 "Wir haben es bereits mehrfach geschafft, die [ITA.GetAdjective]s bei ihrem Versuch, unser Volk zu unterwerfen, abzuwehren. Unsere Nachbarn hatten jedoch nicht so viel Glück im Widerstand gegen die Kolonialisten. Es ist an der Zeit, unsere Kriegserfahrung und unsere neu gewonnene wirtschaftliche Stärke für die Befreiung Afrikas einzusetzen – mit der einzigen Sprache, die die Kolonialmächte verstehen: roher Gewalt."
 ETH_freedom_at_gunpoint_tt:1 "Setzen Sie „Freedom at Gunpoint“-Entscheidungen frei, um afrikanische Nationen zu befreien."
 ETH_boots_on_the_shore:0 "Stiefel am Ufer"
 ETH_boots_on_the_shore_desc:0 "Wir pflegen eine lange Geschichte des Handels und kulturellen Austauschs mit den Völkern der Arabischen Halbinsel. Leider sind sie noch immer in ihren feudalen Regierungssystemen gefangen. Würden wir die Menschen der Halbinsel befreien, könnten wir die wichtige Handelsroute entlang des Roten Meeres kontrollieren und unseren Einfluss bis weit in den Nahen Osten ausdehnen."
 ETH_request_soviet_hulls:0 "Fordern Sie sowjetische Schlachtschiffrümpfe an"
 ETH_request_soviet_hulls_desc:1 "Wenn wir Blockaden in zukünftigen Konflikten vermeiden wollen, müssen wir lernen, unsere eigenen Schiffe zu bauen. [SOV.GetNameDefCap] hat kürzlich einige seiner Schlachtschiffprojekte aufgegeben und ist möglicherweise bereit, uns die unfertigen Rümpfe abzukaufen. Wir könnten von einem solchen Kauf viel lernen."
 ETH_organization_of_african_unity:0 "Organisation für Afrikanische Einheit"
 ETH_organization_of_african_unity_desc:0 "Bislang galt die Befreiung von der europäischen Kolonialherrschaft als bloße Frage der Unabhängigkeit. Doch in den Augen vieler Politiker außerhalb Afrikas scheinen wir alle noch immer potenzielle Ziele für Eroberungen zu sein. Nur durch Zusammenhalt und Zusammenarbeit können die Menschen Afrikas hoffen, nicht erneut zur Untertanin zu werden."
 ETH_organization_of_african_unity_tt:0 "Schalten Sie Entscheidungen frei, um unabhängige afrikanische Länder zur „Organisation für Afrikanische Einheit“ einzuladen!"
 ETH_pan-africanism_liberate_tt:0 "Erlangen Sie „Kriegsziele befreien“ bei allen Kolonialmächten in Afrika:"
 ETH_executive_council:0 "Der Exekutivrat"
 ETH_executive_council_desc:0 "Wir sollten auf eine stärkere Zusammenarbeit in der Organisation für Afrikanische Einheit drängen, indem wir ein Exekutivorgan schaffen, das im Sinne des Volkes handelt und schnell auf Bedrohungen der Stabilität in unserer Region reagieren kann."
 ETH_executive_council_tt:0 "Schalten Sie Entscheidungen frei, um Mitglieder der Organisation für Afrikanische Einheit in den Exekutivrat einzuladen."
 ETH_african_union:0 "Die Afrikanische Union"
 ETH_african_union_desc:0 "Es ist an der Zeit, dass sich die Völker Afrikas in einer Afrikanischen Union vereinen. Nie wieder werden wir von Imperialisten oder Faschisten bedroht, während wir danach streben, Afrikas erste Supermacht zu werden. "
 ETH_african_union_tt:0 "Machen Sie Entscheidungen zur Integration der Mitglieder des „Exekutivrats“ in die „Afrikanische Union“ frei!"
 ETH_african_central_bank:1 "Der [ETH_GetCentralBankName]"
 ETH_african_central_bank_desc:1 "Mit der Schaffung einer [ETH_GetCentralBankName] könnten wir den Prozess der Integration der Volkswirtschaften innerhalb der Organisation für Afrikanische Einheit einleiten. Dies würde es uns ermöglichen, unsere Ressourcen und Infrastruktur effizienter zum Wohle aller Mitgliedsstaaten zu nutzen."
 ETH_african_central_bank_tt:1 "Schalten Sie Entscheidungen frei, um Mitglieder der §YOrganisation für Afrikanische Einheit§! zu [ETH_GetCentralBankName] einzuladen."
 ETH_african_central_bank_2_tt:0 "$MODIFIER_STABILITY_FACTOR$: §R-5%§! \n$modifier_production_speed_industrial_complex_factor$: §R-10%§! \n$modifier_production_speed_infrastructure_factor$: §R-10%§!"
 ETH_mass_transit:0 "Kollektivierter Massenverkehr"
 ETH_mass_transit_desc:0 "Ein Großteil unserer Verkehrsinfrastruktur ist veraltet und muss umgestaltet werden, um sie effizienter nutzen zu können. Die Menschen, die diese Infrastruktur betreiben, sind am besten geeignet, solche Reformen umzusetzen."
 ETH_mutual_defense:0 "Gegenseitige Verteidigung "
 ETH_mutual_defense_desc:0 "Die Menschen in Afrika werden keinen dauerhaften Frieden haben, solange die Nationen der Welt nicht erkennen, dass die Kosten einer Kolonialisierung zu hoch sind. Um dies zu erreichen, sollten die Mitglieder der Organisation für Afrikanische Einheit ein gegenseitiges Verteidigungsabkommen schließen und sich gegenseitig Schutz versprechen, falls einer von uns angegriffen wird."
 ETH_mutual_defense_tt:0 "Schalten Sie Entscheidungen frei, um Mitglieder der Organisation für Afrikanische Einheit zu einem gegenseitigen Verteidigungsabkommen einzuladen."
 ETH_our_own_path:0 "Unser eigener Weg"
 ETH_our_own_path_desc:0 "Wir waren zu schwach, um den [SOV.GetAdjective]s Widerstand zu leisten, als sie uns verrieten, indem sie die Kontrolle über unsere Angelegenheiten übernahmen. Jetzt sind wir in einer viel stärkeren Position und können endlich unsere Unabhängigkeit zurückgewinnen. Wir sollten jedoch auf mögliche Repressalien der [SOV.GetAdjective]s vorbereitet sein."
 ETH_our_own_path_tt:0 "§R[SOV.GetNameDefCap] wird über dieses Vorgehen verärgert sein und möglicherweise versuchen, Äthiopien wieder unter [SOV.GetAdjective] Kontrolle zu bringen!§!"
 ETH_communal_agriculture:0 "Kommunale Landwirtschaft"
 ETH_communal_agriculture_desc:0 "Durch die Kollektivierung der Landwirtschaft und die Einführung neuer Anbaumethoden können wir unsere landwirtschaftliche Produktion massiv steigern und allen Menschen den Zugang zu Nahrungsmitteln sichern. Dies wird es den befreiten Bauern auch ermöglichen, in den Städten alternative Beschäftigungsmöglichkeiten zu finden, anstatt in der Subsistenzwirtschaft zu arbeiten."
 ETH_communal_agriculture_industry_tt:0 "Ändern Sie §Y$ETH_industrialization_dynamic_modifier$§! durch:\n$MODIFIER_INDUSTRIAL_CAPACITY_FACTOR$: §G+10%§!"
 ETH_communal_agriculture_consumer_tt:1 "Ändern Sie §Y$ETH_industrialization_dynamic_modifier$§! durch:\n$MODIFIER_CONSUMER_GOODS_FACTOR$: §Y-5%§!"
 ETH_seize_the_means:0 "Ergreifen Sie die Mittel"
 ETH_seize_the_means_desc:0 "Generationen von [ETH.GetAdjective]-Arbeitern haben die Felder bestellt und die Industrie der Städte aufgebaut. Ihr Blut klebt in der Erde. Deshalb werden wir nicht länger zulassen, dass eine reiche Clique Anspruch auf diese Vermögenswerte erhebt. Sie werden dem Volk zurückgegeben."
 ETH_preparing_for_the_inevitable:0 "Vorbereitung auf das Unvermeidliche"
 ETH_preparing_for_the_inevitable_desc:0 "Die Mächtigen auf der ganzen Welt werden unsere radikalen Reformen in [ETH.GetNameDef] nicht tolerieren, aus Angst, dass ihre eigene Bevölkerung dasselbe verlangen wird. Wir müssen auf ihren unvermeidlichen Versuch vorbereitet sein, unsere Lebensweise zu zerstören."
 ETH_refuge_for_the_spanish_exiles:0 "Zufluchtsort für spanische Exilanten"
 ETH_refuge_for_the_spanish_exiles_desc:0 "Unsere ideologischen Genossen in Spanien mussten zusehen, wie ihre Träume vom Anarchismus durch die vereinten Kräfte von Faschisten, Stalinisten und Kapitalisten aus aller Welt zerstört wurden. Wir müssen unsere Grenzen für unsere vertriebenen Freunde öffnen und ihnen eine zweite Chance für eine bessere Zukunft bieten."

 ETH_the_lion_and_the_sun:0 "Der Löwe und die Sonne"
 ETH_the_lion_and_the_sun_desc:0 "Seine Majestät [ETH.GetLeader] und der japanische Kaiser [JAP.GetLeader] haben es geschafft, viele Gemeinsamkeiten zwischen unseren großen Imperien zu finden. [JAP.GetLeader] ging sogar so weit, anzudeuten, dass seine Regierung in [ETH.GetName] investieren wird, wenn wir schließlich unser Heimatland zurückerobern."
 ETH_japanese_investments_tt:0 "Schaltet §YEntscheidungen§! für japanische Investitionen in [ROOT.GetName] frei, sobald [ROOT.GetName] freigegeben ist"
 ETH_an_ethiopian_navy_in_exile:0 "Eine äthiopische Marine im Exil"
 ETH_an_ethiopian_navy_in_exile_desc:0 "Nachdem Seine Majestät [ETH.GetAdjective] Demonstrationen der [JAP.GetAdjective] Seemacht miterlebt hatte, bat er unsere gnädigen Gastgeber um Hilfe beim Aufbau einer [ETH.GetAdjective] Marine, um bei der Befreiung unseres Heimatlandes zu helfen und es vor zukünftigen Angriffen zu schützen."
 ETH_an_arabic_base:0 "Eine arabische Basis"
 ETH_an_arabic_base_desc:0 "Es wird immer deutlicher, dass [JAP.GetName] die Asien-Pazifik-Region in den kommenden Jahren umgestalten will. Nachdem wir uns zunehmend mit [JAP.GetAdjective] verbündet haben, ist es für uns sinnvoll, uns einen Teil davon zu sichern. Zunächst sollten wir die Kontrolle über das Land unserer Vorfahren auf der Arabischen Halbinsel fordern."
 ETH_uk_arabia_tt:0 "Jeder §YArabian§!-Staat ist Eigentum von §Y[ENG.GetNameWithFlag]§! oder einem §Yally§! von §Y[ENG.GetNameDef]§!"
 ETH_an_empire_in_the_shade_of_the_sun:0 "Ein Imperium im Schatten der Sonne"
 ETH_an_empire_in_the_shade_of_the_sun_desc:0 "Seine Majestät [ETH.GetLeader] ist ein Kaiser ohne Reich. Dies ist nicht nur demütigend für unseren Kaiser, sondern schränkt auch unsere Möglichkeiten ein, Vorkehrungen für die Befreiung von [ETH.GetName] zu treffen. Vielleicht wären unsere Freunde in [JAP.Capital.GetCapitalVictoryPointName] bereit, uns die Kontrolle über eine Insel zu überlassen, damit wir sie als Operationsbasis für die letztendliche Befreiung unseres Heimatlandes nutzen können."
 ETH_japan_has_island_tt:0 "Japan kontrolliert mindestens einen Inselstaat, der nicht zum Kernland gehört."
 ETH_japan_joins_tt:0 "§Y[JAP.GetNameDefCap]§! wird sich dem Krieg von §Y[ROOT.GetName]§! gegen [ITA.GetName] anschließen.\n§Y[ROOT.GetName]§! wird eine Marionette von §Y[JAP.GetName]§!"

 ETH_an_audience_with_countryleadertitle:0 "Eine Audienz beim [GetGermanCountryLeaderTitle]"
 ETH_an_audience_with_countryleadertitle_desc:0 "[GER.GetLeader] hat ehrgeizige Pläne für die Neuordnung nicht nur von [GER.GetNameDef], sondern der ganzen Welt. Durch eine Audienz beim [GER.GetAdjective]-Führer wird die Welt Seine Majestät [ETH.GetLeader] weiterhin als den einzig wahren Herrscher von [ETH.GetName] sehen."
 GER_fascism_leader_title:0 "Führer"
 GER_male_kaiser_title:0 "Kaiser"
 GER_female_kaiser_title:0 "Kaiserin"
 GER_chancellor_title:0 "Kanzler"
 GER_generalfeldmarshall_title:0 "Generalfeldmarschall"

 ETH_befriend_goring:0 "Befreunde dich mit Göring"
 ETH_befriend_goring_desc:0 "Die deutsche Regierung ist ein Netz politischer Intrigen und Intrigen. Wer gerade das Ohr von [GER.GetLeader] hat, kann politische Entscheidungen massiv beeinflussen. Vielleicht könnten wir selbst Einfluss gewinnen, indem wir uns mit einem Mitglied der Regierungselite wie $GER_hermann_goring$ anfreunden."
 ETH_steel_lions:0 "Stahllöwen"
 ETH_steel_lions_desc:0 "[GER.GetNameDefCap] ist ein Pionier neuer Methoden der Kriegsführung. Die Zeiten der Kavallerie oder des Grabenkriegs sind vorbei. Die Zukunft gehört dem Panzer. Wir sollten unsere Zeit in [GER.GetNameDef] nutzen, um den Einsatz moderner Kriegswaffen zu erlernen und uns auf die Befreiung unseres Heimatlandes vorzubereiten."
 ETH_armor_officers_tt:0 "Bis zu zwei [ROOT.GetAdjective]-Offiziere erhalten die Eigenschaft §Y$armor_officer$§!"
 ETH_german_mediation:0 "[GER.GetAdjective] Mediation"
 ETH_german_mediation_desc:0 "Während sich die Ambitionen von [GER.GetAdjective] und [ITA.GetAdjective] allmählich annähern, bleibt die Frage von [ETH.GetName] ein Hindernis für eine verstärkte Zusammenarbeit zwischen den beiden Nationen. Vielleicht kann [GER.GetLeader] [ITA.GetLeader] davon überzeugen, seine sinnlose Besetzung zu beenden und dem Kaiser die Rückkehr an seinen rechtmäßigen Platz in [ETH.GetName] zu ermöglichen."
 ETH_ger_and_ita_have_same_dieology_tt:0 "[GER.GetFlag]§Y[GER.GetName]§! hat dieselbe Ideologie wie [ITA.GetFlag]§Y[ITA.GetName]§!."
 ETH_sabotage_italo-german_relations:0 "Sabotage der deutsch-italienischen Beziehungen"
 ETH_sabotage_italo-german_relations_desc:0 "Wir dürfen nicht zulassen, dass [GER.GetNameDef] und [ITA.GetName] sich gegenseitig als potenzielle Verbündete betrachten. Wir müssen alles in unserer Macht Stehende tun, um die Beziehungen zwischen den beiden zu sabotieren. Andernfalls droht Seine Majestät ein Gefangener von [ITA.GetLeader] zu werden und der Traum von einem freien [ETH.GetName] zu zerstören."
 ETH_unlock_false_flag_tt:1 "Gibt die Entscheidung frei, eine Operation unter falscher Flagge zu starten, um [ITA.GetFlag] §Y[ITA.GetName]§ hereinzulegen!"

 ETH_joint_swedish-ethiopian_intelligence_program:0 "Gemeinsames schwedisch-äthiopisches Geheimdienstprogramm"
 ETH_joint_swedish-ethiopian_intelligence_program_desc:0 "Direkte Hilfe für [ETH.GetName] würde Fragen zu [SWE.GetName]s Neutralität aufwerfen. Sie könnten jedoch bereit sein, verdeckte Unterstützung anzubieten, um eine glaubhafte Abstreitbarkeit aufrechtzuerhalten. Indem wir unsere Verbindungen in der Region und [SWE.GetName]s Ressourcen nutzen, können wir die Kolonialherrschaft von [ITA.GetAdjective] in Afrika schwächen."
 ETH_anti-tank_guns:0 "Panzerabwehrkanonen"
 ETH_anti-tank_guns_desc:0 "[SWE.GetName] verfügt über einige der besten Waffenlager der Welt. Obwohl [SWE.GetAdjective] in außenpolitischen Angelegenheiten technisch neutral ist, könnte es sein, dass es bereit ist, sich von einigen seiner Panzerabwehrkanonen zu trennen, wenn dadurch der wachsende faschistische Einflussbereich eingeschränkt wird."
 ETH_a_libyan_revolt:0 "Ein libyscher Aufstand"
 ETH_a_libyan_revolt_desc:0 "Die [ITA.GetAdjective]s kämpfen darum, die Kontrolle über ihre jüngsten Gebietsgewinne in Ostafrika zu behalten. Da sich ihr Fokus nun verlagert hat, werden wir unser Möglichstes tun, um in ihren wertvollen [LBA.GetAdjective] Gebieten den Keim einer Rebellion zu säen."
 ETH_ethiopias_cause_is_ours:0 "Äthiopiens Sache ist unsere"
 ETH_ethiopias_cause_is_ours_desc:0 "Die [SWE.GetAdjective]-Regierung entfernt sich von ihrer Neutralität, da sie erkennt, dass der Erfolg des Faschismus in Afrika auch Auswirkungen auf Europa haben wird. Unsere Ziele der Selbstbestimmung und der Achtung des Völkerrechts sind deckungsgleich, daher ist es sinnvoll, unsere außenpolitische Zusammenarbeit weiter zu vertiefen."
 ETH_SWE_join_war_tt:0 "Wenn sich große Nationen mit §Y[ITA.GetFlag][ITA.GetName]§! im Krieg befinden und §Y[SWE.GetFlag][SWE.GetName]§! dem gegenseitigen Fraktionsantrag zustimmt, werden sie versuchen, einer Fraktion beizutreten und sich dem Krieg anzuschließen.\n §RIst keine Fraktion verfügbar, wird [SWE.GetFlag][SWE.GetName] nicht allein gegen [ITA.GetFlag][ITA.GetName] in den Krieg ziehen!§!"

 ETH_reach_out_to_the_italians:0 "Erreichen Sie die Italiener"
 ETH_reach_out_to_the_italians_desc:0 "Es ist klar, dass wir keine Hoffnung mehr haben, die [ITA.GetAdjective]s auf dem Schlachtfeld zu besiegen. Dennoch schickt [ETH.GetLeader] unsere Soldaten weiterhin in erfolglosen Offensiven in den Tod. Es ist Zeit für eine neue Führung unter einem stärkeren Anführer, der mit den Italienern zusammenarbeiten und unserem Heimatland Frieden bringen kann."
 ETH_reach_out_to_the_italians_tt:0 "An §Y[ITA.GetNameDef]§! wird ein Angebot zur Zusammenarbeit gesendet, in dem Frieden im Austausch gegen Territorium angeboten wird."
 ETH_can_start_a_civil_war_tt:0 "[ROOT.GetName] kann einen Bürgerkrieg beginnen, indem er den Fokus §Y$ETH_declare_for_italy$§! abschließt."
 ETH_sway_the_warlords:0 "Beeinflusse die Kriegsherren"
 ETH_sway_the_warlords_desc:0 "Selbst wenn wir keinen der mächtigeren Ras davon überzeugen können, sich offen gegen $ETH_haile_selassie$ auszusprechen, können wir zumindest den Grundstein für eine zukünftige Zusammenarbeit legen. Darüber hinaus sollten wir versuchen, einige der kleineren Kriegsherren von den Vorteilen einer Zusammenarbeit mit den Italienern zu überzeugen."
 ETH_sway_the_warlords_tt:0 "Erhöht die Größe des Aufstands. \nEinige der loyalistischen Generäle stehen nach dem Krieg für die Rekrutierung zur Verfügung."
 ETH_expand_the_bodyguard:0 "Erweitern Sie die Leibwache"
 ETH_expand_the_bodyguard_desc:0 "Da die Machtstrukturen von [ETH.GetName] zu bröckeln beginnen, wird es zunehmend schwieriger zu entscheiden, wem man vertrauen kann. In diesen schwierigen Zeiten benötigt der zukünftige Führer unserer großen Nation einen ständigen Leibwächter, der nur ihm treu ist und ihn vor verräterischen Elementen schützt."
 ETH_expand_the_bodyguard_tt:0 "Fügt zusätzliche Einheiten hinzu, wenn der Bürgerkrieg beginnt"
 ETH_declare_for_italy:0 "Für Italien anmelden"
 ETH_declare_for_italy_desc:0 "Viele werden es als Verrat betrachten und der Wahrheit den Rücken kehren. Aber deshalb ist es unsere Bestimmung, diese Länder zu regieren. Denn wir wissen, dass nur wir die Willenskraft haben, das zu tun, was zum Wohle unserer Nation getan werden muss. Es ist Zeit, [ETH.GetLeader] zu stürzen."
 ETH_restore_the_country:0 "Das Land wiederherstellen"
 ETH_restore_the_country_desc:0 "Nachdem in [ETH.GetName] endlich wieder Frieden herrscht, ist es an der Zeit, die Ordnung im ganzen Land wiederherzustellen. Wir werden Häuser und Infrastruktur besser als zuvor wiederaufbauen und zeigen, dass unserem Volk unter der Herrschaft von [ETH.GetLeader] eine glänzende Zukunft bevorsteht."
 ETH_invite_italian_settlers:0 "Laden Sie italienische Siedler ein"

 ETH_invite_italian_settlers_desc:0 "Für viele ist es eine bittere Pille, mit anzusehen, wie unsere großartige Nation zu einem weiteren Ziel europäischer Kolonisierung wird. Die jüngste Geschichte hat jedoch die Schwäche unserer Industrie und Infrastruktur gezeigt, und wir brauchen radikale Maßnahmen, um sie zu verbessern. Deshalb werden wir die Situation ausnutzen, indem wir das Fachwissen und den Reichtum naiver [ITA.GetAdjective]s ausnutzen und sie einladen, sich hier niederzulassen."
 ETH_invite_italian_settlers_tt:1 "§Y2 eigene Staaten§! erhalten eine Anzahl Siedler von [ITA.GetName], wodurch sie von ländlichen oder pastoralen Staaten abgeändert werden und §Yneue Bauplätze erhalten.§!"
 ETH_replace_the_abuna:0 "[Get_ETH_replace_the_abuna_name]"
 ETH_replace_the_abuna_desc:0 "[Get_ETH_replace_the_abuna_desc]"
 abuna_abraham_gojjam_tt:0 "§Y$ETH_abuna_abraham$§!:"
 ETH_replace_the_abuna_original:0 "Ersetzen Sie die Abuna"
 ETH_change_state_religion:0 "Staatsreligion ändern"
 ETH_replace_the_abuna_desc_ethiopia:0 "Der Führer der orthodoxen Kirche, $ETH_abuna_qerellos_iv$, ist zu eng mit $ETH_haile_selassie$ verbunden. Wir müssen ihn durch jemanden ersetzen, der unserer Sache gegenüber loyaler ist."
 ETH_replace_the_abuna_desc_gojjam:0 "Das Oberhaupt der orthodoxen Kirche, $ETH_abuna_qerellos_iv$, ist zu eng mit $ETH_haile_selassie$ verbunden. $ETH_abuna_abraham$ ist der perfekte Kandidat für seine Nachfolge und macht Gojjam zum politischen und religiösen Zentrum des Reiches."
 ETH_replace_the_abuna_desc_jimma:0 "Zu lange hat die orthodoxe Tewahedo-Kirche die Politik dieses Landes beeinflusst. Es ist an der Zeit, die Verbindungen zwischen dem Imperium und der Kirche offiziell zu kappen. Stattdessen sollten wir engere Beziehungen zu unseren Brüdern und Schwestern jenseits der Meerenge suchen."
 ETH_the_capital_victory_parade:0 "Die [ROOT.Capital.GetCapitalVictoryPointName]-Siegesparade"
 ETH_the_capital_victory_parade_desc:0 "Obwohl unser großer Anführer uns vor der sicheren Zerstörung bewahrt hat, sind viele unserer Leute misstrauisch gegenüber [ETH.GetLeader]s Motiven und sehnen sich nach den Tagen der alten kaiserlichen Familie zurück. Wir müssen sie daran erinnern, wie dankbar sie [ETH.GetLeader] sein sollten, und ihnen die glorreiche Zukunft zeigen, die [ETH.GetName] erwartet."
 ETH_amedeos_feast_of_maskal:0 "Amedeos Maskal-Fest"

 ETH_amedeos_feast_of_maskal_desc:0 "Um die anhaltende Stabilität von [ETH.GetName] zu gewährleisten, werden wir die verbleibenden Ras&#39; zu Prinz Amedeos Maskal-Fest in [ETH.Capital.GetCapitalVictoryPointName] versammeln. Dort werden wir uns mit dem Vizekönig von [ITA.GetAdjective] Ostafrika treffen und die Zukunft der Region besprechen."
 ETH_amedeos_feast_of_maskal_tt:1 "Wenn §Y$ETH_sway_the_warlords$§! abgeschlossen wurde: \n§Y$ETH_seyoum_mengesha$§!, §Y$ETH_ayalew_birru$§! und §Y$ETH_ras_kassa$§! werden loyal."
 ETH_assertiveness:0 "[Get_ETH_assertiveness_name]"
 ETH_assertiveness_autonomy_effect:0 "Durchsetzungsfähiger Negus"

 ETH_assertiveness_desc:0 "Wir haben vereinbart, mit den [ITA.GetAdjective]s zusammenzuarbeiten, um unsere große Nation vor der Zerstörung zu bewahren. Nun würden sie zusehen, wie wir unserer Identität und Kultur beraubt und zu nichts weiter als einer Kolonie werden. Das können wir nicht zulassen. Wir werden ihnen klarmachen, wer wir sind, und uns ihrer Kolonisierung mit allen Mitteln widersetzen."
 ETH_assertiveness_tt:1 "Wenn §Y$ETH_sway_the_warlords$§! abgeschlossen wurde und das Land §Y$jimma$§! ist:\n§Y$ETH_balcho_safo$§! und §Y$ETH_tadesse_birru$§! werden loyal."
 ETH_assertiveness_gojjam:0 "Gojjam Negash"
 ETH_assertiveness_jimma:0 "Garad von Jimma"
 ETH_assertiveness_ethiopia:0 "Negus von Shewa"
 ETH_exploit_french_weakness:0 "Die Schwäche der Franzosen ausnutzen"
 ETH_exploit_french_weakness_desc:0 "Während die [FRA.GetAdjective] damit beschäftigt sind, sich um die Asche ihres Imperiums zu streiten, haben wir die Möglichkeit, das Gebiet von Französisch-Somaliland unserem großen Imperium einzuverleiben. Es ist unwahrscheinlich, dass die [FRA.GetAdjective] zu einem weiteren Kampf bereit sind, aber wir müssen auf alles gefasst sein."
 ETH_exploit_french_weakness_tt:0 "Schalten Sie Entscheidungen zur Besetzung von §YFranzösisch-Somaliland§ frei! \n§RDurch diese Entscheidungen riskieren Sie einen Krieg mit Vichy-Frankreich!§!"
 ETH_france_divided_tt:0 "Frankreich ist gespalten"
 ETH_invite_italian_investors:0 "Laden Sie italienische Investoren ein"
 ETH_invite_italian_investors_desc:0 "Wir sollten unsere neuen Oberherren nutzen, indem wir ihre Investoren zu einem Besuch bei [ETH.GetName] verleiten. Ein Zufluss an Investitionen würde nicht nur wesentlich dazu beitragen, die durch den Krieg verursachten Schäden zu beheben, sondern auch unsere industrielle Kapazität massiv zu erweitern."
 ETH_italian_general_staff:0 "Italienischer Generalstab"

 ETH_italian_general_staff_desc:0 "Unser Militär hat bei der Modernisierung noch einen langen Weg vor sich. Obwohl wir große Fortschritte bei der Produktion oder Beschaffung moderner Ausrüstung für die Streitkräfte machen, haben unsere Offiziere viele veraltete Ansichten über deren Einsatz. Vielleicht könnten wir lernen, wie man moderne Kriege führt, indem wir Offiziere in unseren Generalstab einladen."
 ETH_italian_general_staff_tt:1 "Wenn die Beziehungen zu Italien positiv sind und dieses zustimmt, werden §Y$ITA_giuseppe_tellera$§!, §Y$ITA_mario_berti$§! und §Y$ITA_alessandro_pirzio_biroli$§! nach Äthiopien versetzt."
 ETH_cooperation:0 "[Get_ETH_cooperation_name]"

 ETH_cooperation_desc:0 "Unser Schicksal liegt in der Vorherrschaft in Ostafrika. Von diesem Ziel sind wir jedoch noch weit entfernt. Deshalb müssen wir mit den bestehenden Machtstrukturen der Region zusammenarbeiten und versuchen, uns alle Vorteile zu sichern, die wir haben."
 ETH_cooperation_sud_tt:0 "Holen Sie sich einen sudanesischen politischen Berater:\n§Y$economic_organizer$:§! \n Konsumgüterfabriken: §G-5%§!\n Stabilität: §G+5%§!"
 ETH_cooperation_som_tt:0 "Holen Sie sich einen somalischen politischen Berater:\n§Y$economic_organizer$:§! \n Konsumgüterfabriken: §G-5%§!\n Stabilität: §G+5%§!"

 ETH_cooperation_gugsa_tt:0 "§Y$ETH_domenico_mondelli$§! wird als §YChef of Airforce§! verfügbar: \n§Y$air_chief_ground_support_1$§!"
 ETH_cooperation_gojjam:0 "Zusammenarbeit mit den Sudanesen"
 ETH_cooperation_jimma:0 "Zusammenarbeit mit den Arabern"
 ETH_cooperation_gugsa:0 "Zusammenarbeit mit den Eritreern"
 ETH_reinforce_dynamic_identity:0 "[Get_ETH_reinforce_dynamic_identity_name]"
 ETH_reinforce_dynamic_identity_desc:0 "Die Menschen sind sich unter der neuen Regierung weiterhin nicht sicher, welche nationale Identität sie haben. Trotz ihrer kleinlichen Beschwerden sind sie nun [ETH.GetAdjective]. Und es ist an der Zeit, dass sie lernen, dass gute [ETH.GetAdjective] loyal zu [ETH.GetLeader] und dem Staat sind."
 ETH_reinforce_ethiopian_identity:0 "Stärkung der äthiopischen Identität"
 ETH_reinforce_gojjam_identity:0 "Stärkung der Gojjam-Identität"
 ETH_reinforce_jimman_identity:0 "Stärkung der Jimman-Identität"
 ETH_reinforced_identity:0 "Verstärkte Identität"
 ETH_underground_wargames:0 "Untergrund-Kriegsspiele"
 ETH_underground_wargames_desc:0 "Wir hatten im letzten Krieg Mühe, die [ITA.GetAdjective]s abzuwehren, da wir nicht verstanden, wie sehr sich die Kriegsführung in den letzten Jahrzehnten verändert hat. Um sicherzustellen, dass wir denselben Fehler nicht noch einmal machen, ist es unerlässlich, dass unsere Offiziere beginnen, Kriegsspiele durchzuführen und den Sturz der [ITA.GetAdjective]-Streitkräfte zu planen. Dabei dürfen wir natürlich keinen Verdacht erregen …"
 ETH_adopt_the_lira:0 "Adoptieren Sie die Lira"

 ETH_adopt_the_lira_desc:0 "Aufgrund der wirtschaftlichen Turbulenzen durch den Krieg mit [ITA.GetName] und der Kosten des Wiederaufbaus hat unsere Währung stark an Wert verloren. Anstatt zu versuchen, die angeschlagene Währung zu stabilisieren, sollten wir dies als Gelegenheit nutzen, die wirtschaftliche Integration mit den [ITA.GetAdjective]n durch die Einführung der Lira zu verstärken."
 ETH_request_italian_equipment:0 "Italienische Ausrüstung anfordern"
 ETH_request_italian_equipment_desc:0 "Obwohl wir bei der Reform unserer Wirtschaft und der Stärkung unseres Militärs große Fortschritte machen, könnten wir bei diesen Aufgaben noch etwas Unterstützung gebrauchen. Aufgrund unserer sich vertiefenden Beziehungen zu den [ITA.GetAdjective]s sind sie möglicherweise bereit, uns einen Teil ihrer überschüssigen Ausrüstung zu schicken."
 ETH_request_italian_equipment_tt:1 "Wenn [ITA.GetFlag][ITA.GetName] zustimmt, erhält [ETH.GetFlag][ETH.GetName] entweder §G500 $artillery_equipment$§! oder §G2500 $infantry_equipment_1$ §!"
 ETH_recruit_mercenaries:0 "Söldner rekrutieren"
 ETH_recruit_mercenaries_desc:0 "Derzeit herrschen innerhalb des Militärs große Spannungen zwischen Soldaten unterschiedlicher Herkunft. Viele sind dem alten Regime treu ergeben und daher nicht vertrauenswürdig. Bis wir diese illoyalen Elemente ausgemerzt haben, brauchen wir Kräfte, die uns bedingungslos treu sind. Der einfachste Weg, Loyalität zu gewinnen, ist bares Geld."
 ETH_askari_tt:0 "Rekrutieren Sie §G4-Divisionen§! von §YEritrean Askari§!"
 ETH_sudanese_mercs_tt:0 "Rekrutieren Sie §G4-Divisionen§! von §YSudanesischen Söldnern§!"
 ETH_arab_mercs_colab_tt:0 "Rekrutieren Sie §G4-Divisionen§! von §YArabischen Söldnern§!"
 ETH_set_up_a_customs_barrier:0 "Errichten einer Zollschranke"

 ETH_set_up_a_customs_barrier_desc:0 "Je länger wir zulassen, dass unsere Wirtschaft mit [ITA.GetName]s verflochten ist, desto schwieriger wird es, sich von ihrem korrumpierenden Einfluss zu befreien. Obwohl dies unser Wirtschaftswachstum bremsen würde, sollten wir eine Zollbarriere errichten, um den Handel zwischen unseren Ländern zu erschweren. Das [ITA.GetAdjective]-Regime wird darüber verärgert sein, aber wir werden notfalls eine wirtschaftliche Rechtfertigung finden."
 ETH_contact_the_exiles:0 "Kontaktiere die Verbannten"
 ETH_contact_the_exiles_desc:0 "Als der Krieg mit [ITA.GetName] zu Ende ging, flohen viele aus Angst vor dem neuen Regime in die Nachbarregionen. Mit der Umsetzung unserer Pläne zur Wiedererlangung unserer Unabhängigkeit können wir diese Diaspora vielleicht davon überzeugen, sich uns anzuschließen. Trotz unserer Differenzen in der Vergangenheit ist es jetzt an der Zeit, zum Wohle des Heimatlandes zusammenzuarbeiten."
 ETH_outsourced_production:0 "Ausgelagerte Produktion"
 ETH_outsourced_production_desc:0 "Unsere Industrie ist noch immer klein und unerfahren, wenn es um die Herstellung von Kriegswerkzeugen geht. Da wir uns nun jedoch fest im Einflussbereich der [ITA.GetAdjective] befinden, können wir das Beste aus der Situation machen, indem wir unseren Produktionsbedarf auslagern und das Know-how ihrer Waffenhersteller nutzen."
 ETH_outsourced_production_tt:0 "Anfrage [ITA.GetFlag]§Y[ITA.GetAdjective]§! Armee- oder Luftwaffendesigner:"
 ETH_outsourced_production_air_tt:0 "Luftwaffendesigner:"
 ETH_outsourced_production_army_tt:0 "\nArmeedesigner:"
 ETH_outsourced_production_factories_tt:1 "\n Wenn [ITA.GetFlag]§Y[ITA.GetNameDef]§! zustimmt, erhält [ETH.GetFlag]§Y[ETH.GetNameDef]§! §Y4 Militärfabriken§!."
 ETH_together_for_victory:0 "Gemeinsam für den Sieg"

 ETH_together_for_victory_desc:0 "Die Zeit rückt näher, in der wir unsere Ehre wiederherstellen und die Ketten der italienischen Unterdrückung sprengen müssen. Damit unsere Pläne nicht scheitern, müssen wir unsere Streitkräfte verstärken und Unterstützung aus ganz Ostafrika gewinnen. Nur gemeinsam ist der Sieg gesichert."
 ETH_together_for_victory_tt:0 "Rebellenkrieger werden sich hinter den feindlichen Linien erheben, wenn der Unabhängigkeitskrieg beginnt"
 ETH_our_enemys_enemy:0 "Der Feind unseres Feindes"
 ETH_our_enemys_enemy_desc:0 "Es gibt viele Nationen, die aus ideologischen oder strategischen Gründen gegen den Expansionismus sind. Wir sollten diese Nationen um Waffenlieferungen bitten, damit wir die Kräfte in unserer Region besiegen können."
 ETH_our_enemys_enemy_tt:0 "Wenn eine Nation sich bereit erklärt, Waffen zu schicken, erhält [ETH.GetFlag][ETH.GetName] von ihr §G1000 Infanterieausrüstung§!."
 ETH_raid_italian_depots:0 "Überfall auf italienische Depots"

 ETH_raid_italian_depots_desc:0 "Das italienische Militär hat in den Depots unseres Landes große Mengen an Ausrüstung konzentriert. Im Zuge unserer Vorbereitungen auf eine unvermeidliche Konfrontation können wir ihnen diese Ausrüstung entziehen und unsere eigenen Streitkräfte damit verstärken, indem wir die Depots überfallen."
 ETH_raid_italian_depots_tt:0 "Im Laufe des kommenden §YJahres§! werden sporadisch Überfälle stattfinden, bei denen [ITA.GetFlag]§Y[ITA.GetAdjective]§!-Ausrüstung jedes Mal zu [ETH.GetFlag]§Y[ETH.GetName]s§!-Vorrat hinzugefügt wird."
 ETH_the_italian_language:0 "Die italienische Sprache"
 ETH_the_italian_language_desc:0 "Die Sprache bleibt eines der größten Hindernisse für eine engere Zusammenarbeit mit den [ITA.GetAdjective]s. Wir werden daher [ITA.GetAdjective] als Zweitsprache in unserer gesamten Verwaltung, einschließlich des Militärs, einführen. Dies wird hoffentlich den kulturellen Austausch zwischen uns beschleunigen und die strategische Planung effizienter gestalten."
 ETH_compensation:0 "Entschädigung"

 ETH_compensation_desc:0 "Trotz der anfänglichen Spannungen zwischen unseren großen Nationen haben wir unsere Loyalität gegenüber [ITA.GetName] immer wieder unter Beweis gestellt. Dies hat jedoch nicht gerade dazu beigetragen, unsere Regierung bei unserer Bevölkerung beliebter zu machen. Vielleicht wären die [ITA.GetAdjective]s bereit, uns mit der Kontrolle über einige ihrer anderen Länder zu entschädigen, damit wir die Unterstützung für unser Regime stärken können."
 ETH_negusa_nagast:0 "Negusa Nagast"

 ETH_negusa_nagast_desc:0 "Es ist an der Zeit, [ETH.GetName] durch die Erklärung unserer Unabhängigkeit vom Einfluss von [ITA.GetAdjective] zu befreien. Dank der Führung von [ETH.GetLeader] werden wir bald wieder die Herren unseres eigenen Schicksals sein."
 ETH_negusa_nagast_tt:0 "§Y[ROOT.GetNameWithFlag]§! erklärt Unabhängigkeit"
 ETH_the_italo-ethiopian_empire:0 "Das Italo-[ETH.GetAdjective]-Imperium"
 ETH_the_italo-ethiopian_empire_desc:0 "Während wir aus der Asche des alten Imperiums auferstehen, nimmt ein neues Italo-[ETH.GetAdjective]-Imperium Gestalt an. Obwohl wir uns erst vor Kurzem gegenseitig bekämpften, wird immer deutlicher, dass [ITA.GetName] und [ETH.GetName] gemeinsam stärker sind. Nun ist es unsere Pflicht, das Gebiet unseres gemeinsamen Imperiums zu erweitern."
 ETH_the_italo-ethiopian_empire_tt:1 "Schalte §YItalo-[ETH.GetAdjective] Empire§!-Entscheidungen frei, um Kerne auf beanspruchtem Gebiet zu gewinnen, sobald diese erobert wurden.\nSie werden übertragen, wenn sich im beanspruchten Staat oder einem angrenzenden Staat keine feindliche Division befindet"
 ETH_reclaim_the_empire:0 "Erobere das Imperium zurück"
 ETH_reclaim_the_empire_desc:0 "Unter der Herrschaft unseres großen Führers [ETH.GetLeader] haben wir den zerstörerischen Einfluss von [ITA.GetName] auf unsere große Nation zurückgewiesen und die unvergleichliche Stärke unseres Volkes wiederentdeckt. Nun liegt die große Aufgabe vor uns in der Rückgewinnung unseres rechtmäßigen Landes und der Vereinigung des [ETH.GetAdjective]-Volkes."
 ETH_reclaim_the_empire_tt:0 "Schalten Sie die Entscheidungen „§YReclaim the Empire§!“ frei, um Kerne in an [ITA.GetFlag][ITA.GetName] abgetretenen Gebieten zurückzugewinnen, sobald diese wieder unter der Kontrolle von [ETH.GetFlag][ETH.GetAdjective] stehen."
 ETH_the_liberator_of_country_short:0 "[Get_ETH_the_liberator_of_country_short_name]"

 ETH_the_liberator_of_country_short_desc:0 "[ETH.GetLeader] hat uns heldenhaft in die Unabhängigkeit geführt, frei vom korrumpierenden Einfluss von [ITA.GetName]. Wir wissen nicht, was die Zukunft bringt, aber wir wissen, dass sie glorreich sein wird, solange uns der Befreier von [ETH.GetName] an die Seite stellt."
 ETH_the_liberator_of_gojjam:0 "Der Befreier von $gojjam$"
 ETH_the_liberator_of_jimma:0 "Der Befreier von $jimma$"
 ETH_the_liberator_of_ethiopia:0 "Der Befreier von $ETH$"
 ETH_consolidate_east_africa:0 "Ostafrika konsolidieren"

 ETH_consolidate_east_africa_desc:0 "Die Weltordnung verändert sich um uns herum, während die alten Imperien zu zerfallen beginnen. Der einzige Weg, unserem Volk einen Platz in dieser neuen Ordnung zu sichern, ist durch Eroberungen und den Beweis unserer Fähigkeit, alle Hindernisse zu überwinden. Deshalb werden wir Ostafrika unter unserer Kontrolle festigen und der Welt die Macht von [ETH.GetName] demonstrieren."
 ETH_consolidate_east_africa_tt:0 "Ansprüche erlangen in:\n§Y[SUD.GetName]§!\n§Y[SOM.GetName]§!\n§Y[ERI.GetName]§!\n§Y[DJI.GetName]§!\n§Y[KEN.GetName]§!\n§Y[UGA.GetName]§!\nErlangen Sie Entscheidungen zum Kerngebiet, sobald es unter der Kontrolle von [ETH.GetFlag][ETH.GetAdjective] steht."
 ETH_chitet_name:0 "Chitet"
 ETH_chitet_name_democratic:0 "Territorialarmee"
 ETH_chitet_name_communist:0 "Volksmiliz"
 ETH_naval_college_name_communist:0 "Marinehochschule am Roten Meer"
 ETH_naval_college_name_historical:0 "Asmera Naval College"
 ETH_naval_college_name_fallback:0 "[ETH.GetAdjective] Marineakademie"
 ETH_airbase_name:0 "Debre Zeyit"
 ETH_airbase_name_fallback:0 "[ETH.GetAdjective]"
 ETH_experts:0 "Experten"
 ETH_investors:0 "Industrielle"
 ETH_reintegrate_aussa:0 "Aussa integrieren"
 ETH_reintegrate_aussa_desc:0 "Das verräterische Sultanat Aussa hat uns wiederholt verraten, indem es sich auf die Seite der [ITA.GetAdjective] gestellt hat. Es ist an der Zeit, das Sultanat aufzulösen und die Region in [ETH.GetName] zu integrieren."
 ETH_communist_tax_exemption_title:0 "Unterstützen Sie die Spezialisten"
 ETH_communist_tax_exemption_desc:0 "Um den „Brain Drain“ zu verhindern, den die Sowjetunion nach ihrer Revolution erlebte, müssen wir ein Steuersystem schaffen, das die Fachkräfte ermutigt, in [ETH.GetNameDef] zu bleiben. Zumindest bis wir eine neue Generation proletarischer Fachkräfte herangezogen haben …"
 ETH_communist_seize_assets_desc:0 "Während die Bevölkerung ums Überleben kämpfte, eignete sich die vorrevolutionäre Elite von [ETH.GetName] riesige Mengen an Vermögenswerten in Form von Devisen, Kunst und natürlich Land an. Wir müssen diese Vermögenswerte im Namen des Volkes beschlagnahmen und den Reichtum umverteilen."
 ETH_communist_seize_assets_title:0 "Privateigentum abschaffen"

 ETH_tax_exemption_default_desc:0 "Wir müssen die Adligen zufriedenstellen, um die Zersplitterung von [ETH.GetName] zu verhindern. Daher werden wir sie für ihre anhaltende Treue belohnen, indem wir ihre Steuerbefreiungen erweitern, sodass sie mehr von ihrem Vermögen behalten können."
 ETH_seize_assets_default_desc:0 "Da der Adel zu den reichsten Menschen in [ETH.GetName] gehört, ist es wirtschaftlich wenig sinnvoll, dass er sich durch veraltete Gesetze und Schlupflöcher der Steuerzahlung entziehen kann. Wir müssen den Adel angemessen besteuern und die Einnahmen für die weitere Industrialisierung des Reiches verwenden."
 ETH_tax_exemption_default_title:0 "Steuerbefreiungen erweitern"
 ETH_seize_assets_default_title:0 "Besteuerung des Adels"


 # ITALY
 ITA_italian_highways_bba:0 "Italienische Autobahnen"
 ITA_italian_highways_bba_desc:0 "Die alten Römer bauten Straßen, um die sie die ganze Welt beneidete. Jetzt glauben die aufstrebenden Deutschen, ihre Autobahnen seien allem, was wir bauen könnten, weit überlegen. Wir werden ihnen das Gegenteil beweisen."
 ITA_develop_libya:0 "Libyen entwickeln"
 ITA_develop_libya_desc:0 "Libyen ist unsere nächstgelegene Kolonie und die mit dem größten Potenzial. Bevor wir die Früchte unserer langen und harten Arbeit zur Befriedung der Region ernten können, müssen wir ihre Infrastruktur verbessern."
 ITA_develop_eritrea:0 "Eritrea entwickeln"
 ITA_develop_eritrea_desc:0 "Eritrea ist unsere älteste Kolonie auf dem afrikanischen Kontinent und zweifellos eine der wertvollsten. Dank seiner hervorragenden strategischen Lage kann es leicht zu einem Eckpfeiler unseres Kolonialreichs ausgebaut werden."
 ITA_develop_somaliland:0 "Somaliland entwickeln"
 ITA_develop_somaliland_desc:0 "Auf den ersten Blick scheint die Region am Horn von Afrika kein großes wirtschaftliches oder strategisches Potenzial zu bieten. Doch mit einigen gut platzierten Investitionen können wir das Gebiet zu einem Sprungbrett für weitere Vorstöße in den Indischen Ozean machen."
 ITA_regional_development:0 "Regionale Entwicklung"
 ITA_regional_development_desc:0 "Unsere bisherigen Investitionen in verschiedenen Gebieten des Imperiums haben den Boden für eine deutliche Steigerung der Wirtschaftsleistung in diesen Regionen bereitet. Wir müssen nur ein Wort sagen, und wir können in Kürze die Früchte ernten."
 ITA_ministry_of_italian_africa:0 "Ministerium für Italienisch-Afrika"
 ITA_ministry_of_italian_africa_desc:0 "Die verschiedenen Stämme und Völker Afrikas können nicht so behandelt werden, wie wir es mit anderen unterworfenen Völkern tun würden. Die Verwaltung dieser Gebiete erfordert einen anderen Ansatz."
 ITA_develop_ethiopia:0 "Äthiopien entwickeln"
 ITA_develop_ethiopia_desc:0 "Die hartnäckigen Äthiopier haben uns lange Zeit herausgefordert und gedemütigt. Jetzt, da sie endlich zur Räson gebracht wurden, können wir ihr Land weiterentwickeln und ihnen zeigen, dass unsere Invasion zu ihrem Besten war."
 ITA_ethiopian_railways:0 "Äthiopische Eisenbahnen"
 ITA_ethiopian_railways_desc:0 "Das unterentwickelte äthiopische Eisenbahnnetz bremst die wirtschaftliche Entwicklung der Kolonie. Durch die Entsendung italienischer Experten können wir es schnell auf italienischen Standard bringen und dafür sorgen, dass die Züge überall im Reich stets pünktlich verkehren."
 ITA_polizia_dell_africa_italiana:0 "Polizia dell&#39;Africa Italiana"
 ITA_polizia_dell_africa_italiana_desc:0 "Unsere Kolonialpolizei hat sich bisher als leistungsfähige Truppe erwiesen. Mit einigen weiteren Reformen wird sie dafür sorgen können, dass wir aus unseren Kolonien genauso viel herausholen, wie wir hineinstecken."
 ITA_strengthen_ascari_corps:0 "Stärkung des Ascari-Korps"
 ITA_strengthen_ascari_corps_desc:0 "Unsere Truppen aus den europäischen Teilen des Reiches haben oft mit dem rauen Klima Afrikas zu kämpfen. Die Einheimischen haben offensichtlich nicht die gleichen Probleme. Wir sollten einige von ihnen anheuern, um unsere Truppen bei Kämpfen in heißen Klimazonen zu unterstützen."
 ITA_comandante_diavolo:0 "Comandante Diavolo"
 ITA_comandante_diavolo_desc:0 "Während unserer Eroberung Eritreas und im Krieg in Äthiopien wurden wir oft von der Schnelligkeit und Hartnäckigkeit der einheimischen Reiter geplagt. Nach dem Kampf gegen sie können wir viel gewinnen, wenn wir sie auf unsere Seite ziehen. Ein unternehmungslustiger junger Offizier könnte unser ganz persönlicher „Teufelskommandant“ werden."
 ITA_prospect_for_oil:1 "Aussicht auf Öl"
 ITA_prospect_for_oil_desc:1 "Unsere Geologen glauben, dass unter der libyschen Wüste möglicherweise erhebliche Ölreserven schlummern. Wir sollten eine gründliche Untersuchung durchführen, um zu sehen, ob sie Recht haben."
 ITA_libyan_refineries:0 "Libysche Raffinerien"
 ITA_libyan_refineries_desc:1 "Da in der libyschen Wüste große Ölvorkommen entdeckt wurden, muss unser nächster Schritt darin bestehen, die Ölraffineriekapazität in der Region zu erhöhen."
 ITA_libyan_infrastructure_bba:0 "Libysche Infrastruktur"
 ITA_libyan_infrastructure_bba_desc:0 "Angesichts der Bedeutung Libyens als Operationsbasis in Nordafrika müssen wir uns kontinuierlich um die Verbesserung der Infrastruktur bemühen, um bei Bedarf große Truppenverbände dort einsetzen zu können."
 ITA_litoranea_balbo:1 "[GetAppropriateLitoraneaBalboName]"
 ITA_litoranea_balbo_default:0 "Litoranea Balbo"
 ITA_litoranea_balbo_alt:0 "Litoranea Libica"
 ITA_litoranea_balbo_desc:0 "Die Straßen in Libyen sind miserabel. Selbst in Küstennähe ist das Straßennetz für ein modernes Land schlicht ungeeignet. Es gibt viel zu tun, um es zu verbessern, unter anderem durch den Bau einer großen Autobahn entlang der Küste."
 ITA_via_della_vittoria:0 "Via della Vittoria"
 ITA_via_della_vittoria_desc:0 "Die schlechte Infrastruktur behindert weiterhin unsere Operationen in Nordafrika. Ein verstärkter Einsatz rund um eine einheitliche „Siegesstraße“ könnte die Situation deutlich verbessern und uns ermöglichen, freier an der ägyptischen Grenze zu operieren."
 ITA_libyan_railway:0 "Libysche Eisenbahn"
 ITA_libyan_railway_desc:0 "Investitionen in das libysche Straßennetz sind sicherlich wertvoll, für den Transport von Truppen, Ressourcen und Nachschub im großen Maßstab ist jedoch ein modernes Schienennetz unverzichtbar."
 ITA_steel_industry_in_terni:0 "Stahlindustrie in Terni"
 ITA_steel_industry_in_terni_desc:0 "Das Stahlwerk Terni bildet seit langem das Rückgrat der italienischen Stahlproduktion. In den kommenden Kriegen werden wir uns noch stärker auf es verlassen müssen. Einige Investitionen, die wir jetzt tätigen, werden sich später zweifellos massiv auszahlen."
 ITA_power_plants_in_terni:0 "Kraftwerke in Terni"
 ITA_power_plants_in_terni_desc:0 "Unsere derzeitigen Kraftwerke in Terni reichen nicht aus und müssen erweitert werden, wenn wir die Region zu einem noch größeren Industriezentrum entwickeln wollen."
 ITA_industria_della_gomma_sintetica:0 "Industria della Gomma Sintetica"
 ITA_industria_della_gomma_sintetica_desc:0 "Unsere geografische Lage im Herzen des Mittelmeers macht uns besonders anfällig für Blockaden durch feindliche Mächte. Wenn wir unseren rechtmäßigen Platz in der Welt einnehmen wollen, müssen wir in der Lage sein, unsere Industrien ohne ausländische Importe aufrechtzuerhalten."
 ITA_strengthen_northern_industry:0 "Stärkung der Industrie im Norden"
 ITA_strengthen_northern_industry_desc:0 "Norditalien ist seit langem das industrielle Zentrum unseres Landes. Die gesamte Region verfügt über hervorragende Voraussetzungen für weiteres Wachstum, und das mit nur geringem Zeit- und Ressourcenaufwand."
 ITA_modernize_the_mezzogiorno:0 "Modernisierung des Mezzogiorno"
 ITA_modernize_the_mezzogiorno_desc:0 "Der Süden Italiens war, seit wir ein vereintes Land sind, ein Sorgenkind. Doch mit unserem Wunsch, die dominierende Macht im Mittelmeerraum zu werden, muss all dieses ungenutzte Potenzial mobilisiert werden."
 ITA_new_industrialization_program:0 "Neues Industrialisierungsprogramm"
 ITA_new_industrialization_program_desc:0 "Um mit dem Rest der Welt Schritt zu halten, sind ständige Innovationen und Verbesserungen erforderlich. Wir können nicht erwarten, wettbewerbsfähig zu bleiben, wenn wir uns auf unseren Lorbeeren ausruhen. Stattdessen müssen wir ständig nach mehr streben."
 ITA_railway_innovations:0 "Bahninnovationen"
 ITA_railway_innovations_desc:0 "Auch im Zeitalter des Automobils ist ein starkes Schienennetz das Rückgrat einer starken Wirtschaft. Der weitere Ausbau der italienischen Eisenbahnen wird uns für zukünftiges Wachstum rüsten."
 ITA_expand_foggia_farm_fields:0 "Erweitern Sie die Felder der Foggia Farm"
 ITA_expand_foggia_farm_fields_desc:0 "Die Region Foggia ist seit langem die Kornkammer, die ganz Italien ernährt. Wenn der Krieg beginnt, müssen wir viele Männer, die auf den Feldern arbeiten, zum Militär einziehen. Wir müssen die Landwirtschaft in der Region modernisieren und ausbauen, wenn wir unsere Bevölkerung ernähren wollen."
 ITA_investments_in_edison:0 "Investitionen in Edison"
 ITA_investments_in_edison_desc:0 "Italien verfügte über das erste Kraftwerk Europas und war schon immer technologisch führend. Mit einer Investition in die Firma Edison können wir sicherstellen, dass wir auch weiterhin führend bleiben."
 ITA_expand_national_universities:0 "Nationale Universitäten erweitern"
 ITA_expand_national_universities_desc:0 "In einer technologisch fortschrittlichen Nation wie der unseren besteht ständiger Bedarf an Ingenieuren. Wir haben festgestellt, dass unsere Universitäten der größte Engpass bei der Ausbildung von genügend neuen Fachkräften sind, um die Wettbewerbsfähigkeit unseres Landes zu erhalten."
 ITA_fiocchi_munizioni:0 "Fiocchi Munizioni"
 ITA_fiocchi_munizioni_desc:0 "Fiocchi beliefert unsere Streitkräfte seit langem mit hochwertiger Munition. Eine stetige Munitionsversorgung ist für die kommenden Kriege von entscheidender Bedeutung. Daher sollten wir sicherstellen, dass die Fiocchi-Werke dieser Aufgabe gewachsen sind."
 ITA_brescia_small_arms_industry:0 "Kleinwaffenindustrie in Brescia"
 ITA_brescia_small_arms_industry_desc:0 "Italienische Kleinwaffen sind weltweit für ihre hohe Qualität bekannt. Doch wir müssen auch für eine ausreichende Versorgung mit modernsten Waffen sorgen, wenn wir unseren Soldaten die Möglichkeit geben wollen, jeden Feind auf dem Schlachtfeld zu besiegen."
 ITA_milan_comms_industry:0 "Mailand Kommunikationsindustrie"
 ITA_milan_comms_industry_desc:0 "Das neue Gebiet der Funkortung und Entfernungsmessung bietet viele Möglichkeiten und wird zweifellos zu einem wichtigen Bereich der Militärtechnologie werden. Wir müssen sicherstellen, dass wir mit den Entwicklungen in diesem Bereich Schritt halten können."
 ITA_redirect_alfa_romeo_production:0 "Alfa Romeo Produktion umleiten"
 ITA_redirect_alfa_romeo_production_desc:0 "Italienische Sportwagen gelten seit Jahrzehnten als absolute Spitzentechnologie. Doch angesichts der drohenden Kriegsgefahr muss jeder in Italien seinen Beitrag leisten. Wir können es uns nicht leisten, unnötigen Luxus zu bewahren, und die Maschinen der Alfa Romeo-Werke könnten besser für militärische Zwecke eingesetzt werden."
 ITA_increase_production:0 "Steigern Sie die Produktion"
 ITA_increase_production_desc:0 "Industrialisierte Kriegsführung erfordert vor allem eines: Masse. Massen an Granaten, Massen an Gewehren, Massen an Flugzeugen. Am wichtigsten ist es, mehr Material zu haben als der Feind."
 ITA_keep_specialization:0 "Spezialisierung beibehalten"
 ITA_keep_specialization_desc:0 "Während der Rest der Welt den Wert von Können, Präzision und Qualität vielleicht vergessen hat, haben wir in Italien dies nicht getan. Unsere Handwerker achten stets auf das kleinste Detail und schaffen das zweifellos beste Exemplar jedes Geräts, an dem sie arbeiten."
 ITA_thermojet_research:0 "Thermojet-Forschung"
 ITA_thermojet_research_desc:0 "Unsere Ingenieure glauben, dass Flugzeuge in Zukunft nicht mehr von Propellern oder Kolbenmotoren angetrieben werden. Stattdessen wird eine neue Technologie Flugzeuge deutlich schneller machen und radikal neue Flugzeugdesigns ermöglichen. Italien muss bei dieser Entwicklung eine Vorreiterrolle einnehmen."
 ITA_army_primacy_bba:0 "Vorrang der Armee"
 ITA_army_primacy_bba_desc:0 "Letztendlich wird ein Krieg dadurch gewonnen, dass Soldaten auf feindlichem Boden stationiert werden und dem Feind die Dinge wegnehmen, die er für die Kriegsführung benötigt. Marine und Luftwaffe sind zwar zweifellos nützliche Organisationen, doch es ist das Heer, das den Krieg gewinnen wird."
 ITA_preserve_army_traditions:0 "Bewahren Sie die Armeetraditionen"
 ITA_preserve_army_traditions_desc:0 "Heutzutage kursieren viele Ideen zu neuen Methoden der Kriegsführung. Manche davon haben zwar ihre Berechtigung, doch die Grundlage jeder erfolgreichen Armee hat sich seit Cäsars Zeiten nicht geändert: Disziplin, individueller Mut und fähige Führung."
 ITA_increase_artillery_production:0 "Steigern Sie die Artillerieproduktion"
 ITA_increase_artillery_production_desc:0 "Der Erste Weltkrieg war in erster Linie ein Artilleriekrieg. Wir müssen davon ausgehen, dass auch der nächste Krieg in erster Linie durch Artillerie geführt wird. Wir dürfen auf diesem Gebiet nicht ins Hintertreffen geraten."
 ITA_vallo_alpino_del_littorio:0 "Vallo Alpino del Littorio"
 ITA_vallo_alpino_del_littorio_desc:0 "Unsere Landesgrenzen sind fast vollständig von den Alpen bedeckt. Obwohl diese Berge an sich schon ein gewaltiges Hindernis darstellen, haben wir im letzten Krieg gelernt, dass sie nicht völlig undurchdringlich sind. Der Bau einer Reihe von Befestigungsanlagen wird uns helfen, die Stellung gegen eine feindliche Landinvasion zu halten."
 ITA_moschettieri_del_duce:1 "[GetAppropriateMoschetieridelDuceName]"
 ITA_moschettieri_del_duce_default:0 "Moschettieri del Duce"
 ITA_moschettieri_del_duce_king:0 "Moschettieri del Re"
 ITA_moschettieri_del_duce_alt:0 "Moschettieri della Republica"
 ITA_moschettieri_del_duce_desc:0 "Zu seinem eigenen Schutz steht dem Duce eine Einheit Eliteschützen unter seinem Kommando. Die Sicherheit des Duce hat natürlich höchste Priorität, doch diese vorbildlichen Soldaten könnten auch dazu dienen, unsere regulären Streitkräfte besser auszubilden und ihre Effektivität im Feld zu steigern."
 ITA_a_bandits_war:0 "Der Krieg eines Banditen"
 ITA_a_bandits_war_desc:0 "Die alten Methoden der Kriegsführung hätten in den Schützengräben am Isonzo aussterben sollen. Einige unserer alten Generäle glauben immer noch, dass man einen modernen Krieg gewinnen kann, indem man Massen von Soldaten in den Fleischwolf wirft. Wir wissen es jetzt besser: Moderne Kriege werden durch schnelle Manöver und flexible Organisationen gewonnen, die schnell reagieren können. Wir müssen unsere Armee auf diese Art von Krieg vorbereiten."
 ITA_carica_di_isbuscenskij:0 "Carica di Isbuscenskij"
 ITA_carica_di_isbuscenskij_desc:0 "Manche behaupten, die Zeiten von Pferd und Reiter auf dem Schlachtfeld seien vorbei. Panzer und Flugzeuge hätten die Rolle der Kavallerie übernommen. Doch sie irren sich – ein Pferd braucht keinen Treibstoff, kein Bodenpersonal und keine Ersatzteile, außer ab und zu ein neues Hufeisen. Das verschafft der Kavallerie selbst auf dem modernen Schlachtfeld einen klaren Vorteil."
 ITA_army_leaders:0 "Armeeführer"
 ITA_army_leaders_desc:0 "Unsere Armeen müssen stets von den fähigsten verfügbaren Offizieren geführt werden. Um unseren Vorsprung zu sichern, ist es unerlässlich, einen stetigen Zustrom neuer und kompetenter Offiziere zu gewährleisten."
 ITA_superesercito:0 "Superesercito"
 ITA_superesercito_desc:0 "Die Koordinierung einer großen Armee ist kein leichtes Unterfangen. Wir müssen eine Struktur für ein Oberkommando schaffen, das die Streitkräfte im Feld führen und unterstützen kann."
 ITA_italian_tankettes:1 "Italienische Tanketten"
 ITA_italian_tankettes_desc:1 "Während andere Länder auf der Suche nach dem Superpanzer, der alle anderen Panzer überflüssig macht, immer größere und schwerere Panzer entwickeln, wissen wir, dass der beste Panzer ein Panzer ist, der tatsächlich im Einsatz ist. Ein Panzer muss schnell genug sein, um rechtzeitig dort zu sein, wo er gebraucht wird, und er braucht eigentlich nur eine Panzerung, die stark genug ist, um Gewehren standzuhalten. Ein solches Fahrzeug wäre billig und schnell zu produzieren."
 ITA_bersaglieri:0 "Bersaglieri"
 ITA_bersaglieri_desc:0 "Die Bersaglieri, unsere Elite-Leichtinfanterie, haben sich seit langem im Kampf hervorgetan. Auch wenn die Kriegsführung der Zukunft mechanisiert sein mag, wird die Qualität des einzelnen Soldaten immer noch der entscheidende Faktor sein."
 ITA_divisioni_alpine:0 "Divisioni Alpine"
 ITA_divisioni_alpine_desc:0 "Unsere Erinnerung an den Ersten Weltkrieg wird für immer die brutalen Kämpfe in den Hochalpen beinhalten. Sollten wir unser Land jemals wieder gegen eine ausländische Invasion verteidigen müssen, wird diese mit Sicherheit aus dem Norden kommen und weitere Kämpfe in unwirtlichen Bergen erfordern. Wir brauchen Soldaten, die in der Lage sind, in diesem Gelände effektiv zu kämpfen."
 ITA_fanti_dell_aria:0 "Fanti dell&#39;Aria"
 ITA_fanti_dell_aria_desc:0 "Die blutige Pattsituation an der Isonzofront im Ersten Weltkrieg zwang uns zu Frontalangriffen gegen einen gut vorbereiteten Feind. Der einzige Weg zum Durchbruch bestand darin, das Niemandsland zu durchqueren und den feindlichen Schützengraben einzunehmen. Moderne Flugzeuge können Soldatengruppen schnell und weit in den Rücken des Feindes bringen. Mit Fallschirmen können sie strategische Ziele angreifen und die feindliche Frontlinie destabilisieren."
 ITA_self_propelled_guns:0 "Selbstfahrende Waffen"
 ITA_self_propelled_guns_desc:0 "Der Panzer mag die Kriegsführung revolutioniert haben, doch in vielerlei Hinsicht ist die Selbstfahrlafette das wertvollste Fahrzeug auf dem Schlachtfeld. Die Feuerunterstützung durch vergleichsweise billige und einfache Fahrzeuge ist von unschätzbarem Wert, wenn es darum geht, Befestigungen zu durchbrechen oder gegen feindliche Panzer zu kämpfen."
 ITA_end_fiat_ansaldo_duopoly:0 "Beenden Sie das Fiat-Ansaldo-Duopol"
 ITA_end_fiat_ansaldo_duopoly_desc:0 "Unser Maschinen- und Fahrzeugbau wurde lange Zeit von zwei Unternehmen dominiert: Fiat und Ansaldo. Obwohl diese beiden Unternehmen absolute Weltklasse-Ingenieursfirmen sind, bremste dies das Wachstum etwas, da keine Konkurrenten auf dem Markt bestehen konnten. Wir müssen dieses Duopol aufbrechen, wenn wir langfristig einen gesunden Maschinenbausektor haben wollen."
 ITA_modernize_ansaldo_facilities:0 "Modernisierung der Ansaldo-Anlagen"
 ITA_modernize_ansaldo_facilities_desc:0 "Der wirtschaftliche Abschwung nach dem Ersten Weltkrieg stürzte Ansaldo in solche finanziellen Schwierigkeiten, dass das Unternehmen seine Fabriken kaum modernisieren konnte. Nur sein hoher Status bewahrte das Unternehmen vor dem Bankrott. Wenn Ansaldo weiterhin ein so wichtiger Bestandteil unseres Maschinenbausektors bleiben soll, müssen wir sicherstellen, dass das Unternehmen moderne Maschinen und Techniken einsetzt."
 ITA_ferrea_mole_ferreo_cuore:0 "Ferrea Mole Ferreo Cuore"
 ITA_ferrea_mole_ferreo_cuore_desc:0 "Von unserem Panzerkorps wird zweifellos große militärische Heldentaten verlangt werden. Dafür genügt es nicht, nur mit eisernen Rümpfen herumzufahren, sie müssen auch ein Herz aus Eisen haben."
 ITA_air_innovations_bba:0 "Luftinnovationen"
 ITA_air_innovations_bba_desc:0 "Der Luftkrieg ist zu einem der entscheidenden Felder der modernen Kriegsführung geworden. Wir dürfen auf diesem wichtigen Gebiet nicht ins Hintertreffen geraten."
 ITA_citta_dell_aria:0 "Città dell&#39;Aria"
 ITA_citta_dell_aria_desc:0 "Unsere Forschungsanstrengungen sind seit langem über viele verschiedene Gebiete im ganzen Land verteilt. Das hat die Arbeit ziemlich ineffizient gemacht. Wir sollten unsere Forschungsanstrengungen bündeln und eine „Sky City“ gründen, in der Wissenschaftler und Ingenieure aus vielen verschiedenen Fachrichtungen zusammenarbeiten können, um neue Flugzeuggenerationen zu bauen."
 ITA_expand_rome_flying_school:0 "Erweitern Sie die Flugschule Rom"
 ITA_expand_rome_flying_school_desc:0 "Mit der zunehmenden Komplexität moderner Flugzeuge steigt auch das Unfallrisiko bei unzureichender Pilotenausbildung. Wir müssen sicherstellen, dass unsere Flugschulen sowohl hinsichtlich der Ausbildungsqualität mit der technischen Entwicklung Schritt halten als auch mit dem durch die Vergrößerung unseres Militärs bedingten Bedarf an neuen Piloten Schritt halten."
 ITA_reggianes_exports:0 "Reggianes Exporte"
 ITA_reggianes_exports_desc:0 "Das Unternehmen Reggiane hat eine Reihe leistungsfähiger Kampfflugzeuge entwickelt, die die Aufmerksamkeit ausländischer Militärs auf sich gezogen haben, die ihre Luftwaffe modernisieren wollen. Sollten wir ihnen den Export ihrer Flugzeuge erlauben, wären die Erfahrungen aus der Anpassung des Basisdesigns an unterschiedliche Spezifikationen zweifellos für unsere eigenen Entwicklungsprojekte von großem Nutzen."
 ITA_diving_bombers:0 "Sturzkampfbomber"
 ITA_diving_bombers_desc:0 "Das Thema Luftnahunterstützung hat in militärischen Kreisen erheblich an Bedeutung gewonnen. Flugzeuge werden zwar schon lange zum Bombenabwurf eingesetzt, doch offenbar haben mehrere Länder begonnen, Spezialflugzeuge zu entwickeln, die im Sturzflug aus großer Höhe Bomben mit unübertroffener Präzision platzieren können. Unsere Industrie könnte ein solches Flugzeug zweifellos rechtzeitig produzieren, doch es gibt auch andere Länder, die über entsprechende Konstruktionen verfügen."
 ITA_superaereo:0 "Superaereo"
 ITA_superaereo_desc:0 "Die Zeiten, in denen kleine Flugzeuggruppen ziellos umherflogen, sind längst vorbei. Ein moderner Lufteinsatz ist in vielerlei Hinsicht ähnlich komplex wie ein landgestütztes Unterfangen. Daher benötigen wir einen spezialisierten Planungsstab, der unsere verschiedenen Staffeln koordiniert, damit sie gemeinsam ihre Missionen erfüllen können."
 ITA_officers_of_the_service_role:0 "Offiziere der Dienstrolle"
 ITA_officers_of_the_service_role_desc:0 "Es reicht nicht mehr aus, Offiziere aus der Armee zu holen und ihnen das Fliegen beizubringen. Unsere Luftwaffe braucht einen neuen Offizierstyp, der von der Armee ausgebildet und geformt wurde, anstatt ihn nur zu übernehmen."
 ITA_standardization:0 "Standardisierung"
 ITA_standardization_desc:0 "Der Luftkrieg ist, mehr noch als der Krieg zur See und der Krieg an Land, ein Krieg der Industrie gegen die Industrie. Masse, und nur Masse, ist entscheidend. Wir müssen sicherstellen, dass wir so viele Flugzeuge wie möglich produzieren können, auch wenn dies bedeutet, dass es später schwieriger wird, das Design zu ändern."
 ITA_specialization:0 "Spezialisierung"
 ITA_specialization_desc:0 "So sehr wir uns auch bemühen, wir werden es nie schaffen, mit den Großmächten in puncto Leistung mitzuhalten. Nur wenn wir bessere Flugzeuge bauen als alle anderen, können wir im Luftkampf mithalten. Jeder von ihnen muss in der Lage sein, einen Kampf zu gewinnen, selbst wenn er drei- oder viermal in der Unterzahl ist."
 ITA_multirole_aircraft:1 "Mehrzweckflugzeuge"
 ITA_multirole_aircraft_desc:1 "Durch die Entwicklung von Flugzeugen, die im Kampfeinsatz verschiedene Rollen übernehmen können, können wir die Produktionskosten und die Ausbildungszeit der Besatzung deutlich senken. Wir werden unsere Ingenieure umgehend mit der Entwicklung solcher vielseitigen Flugzeuge beauftragen."
 ITA_long_range_aircraft:0 "Langstreckenflugzeuge"
 ITA_long_range_aircraft_desc:1 "Feindliche Stützpunkte, Industrien und Versorgungslinien liegen oft weit hinter der Front. Wir müssen unsere Langstreckenflugzeuge weiterentwickeln und verbessern, damit sie diese lebenswichtigen Ziele erreichen und treffen können."
 ITA_fighter_designs:0 "Kämpferdesigns"
 ITA_fighter_designs_desc:1 "Kampfflugzeuge bilden das Rückgrat jeder Luftwaffe. Wir müssen sicherstellen, dass unsere Kampfflugzeuge die Lufthoheit über uns erringen und unsere Bomber auf dem Weg zu ihren Zielen schützen können."
 ITA_bomber_designs:0 "Bomber-Designs"
 ITA_bomber_designs_desc:1 "Mit neuen Designs für unsere Bomber wird unsere Luftwaffe in der Lage sein, unsere Streitkräfte zu Land und zu Wasser zu unterstützen und gleichzeitig feindliche Truppen und ihre Versorgungslinien zu bedrohen."
 ITA_supremacy_in_the_skies:0 "Vorherrschaft am Himmel"
 ITA_supremacy_in_the_skies_desc:1 "Eine moderne Armee kann ohne die Unterstützung einer schlagkräftigen Luftwaffe nicht erfolgreich operieren. Es ist von größter Bedeutung, dass unser Land über modernste Flugzeuge und Technologie verfügt, um den Himmel zu beherrschen."
 ITA_naval_power_projection:0 "Projektion der Seemacht"
 ITA_naval_power_projection_desc:1 "Dem Erbe unserer Vorfahren folgend müssen wir sicherstellen, dass wir über die notwendige Industrie verfügen, um eine beeindruckende Seestreitmacht aufzubauen, die in der Lage ist, die italienische Vorherrschaft im Mittelmeer über jede andere Marine aufrechtzuerhalten."
 ITA_intensify_torpedo_manufacturing:0 "Intensivierung der Torpedoproduktion"
 ITA_intensify_torpedo_manufacturing_desc:0 "Italienische Torpedos gehören zu den zuverlässigsten der Welt. Fiume war der Geburtsort des Torpedos, und mit der dortigen Fabrik und dem Werk Silurificio Italiano in Neapel verfügen wir über eine gute Grundlage, um den Einsatz dieser tödlichen Marinewaffe weiter auszuweiten."
 ITA_expand_naval_facilities:0 "Ausbau der Marineeinrichtungen"
 ITA_expand_naval_facilities_desc:0 "Eine erstklassige Marine braucht nicht nur eine starke Schlachtflotte, sondern auch die dafür notwendigen Häfen und Werften. Durch Investitionen in unsere Marineinfrastruktur verfügt unsere Marine im Kriegsfall über die benötigten Stützpunkte sowie die Bau- und Reparaturkapazitäten."
 ITA_oto_naval_guns:0 "OTO-Schiffsgeschütze"
 ITA_oto_naval_guns_desc:0 "Italien verlässt sich bei der Ausstattung seiner Großkampfschiffe auf die Firmen Ansaldo und Oderi-Terni-Orlando. Durch gezielte Investitionen in ihre Leistungsfähigkeit können wir unsere Schlachtschiffe zum Neid der Welt machen."
 ITA_improve_overseas_naval_bases:0 "Verbesserung der Marinestützpunkte im Ausland"
 ITA_improve_overseas_naval_bases_desc:0 "Die Modernisierung der Häfen in unseren Überseegebieten wird unserer Marine eine solide Grundlage für die Verteidigung unseres wachsenden Imperiums und die Bedrohung der Handelsrouten unserer Feinde bieten."
 ITA_milizia_marittima_di_artiglieria:0 "Milizia Marittima di Artiglieria"
 ITA_milizia_marittima_di_artiglieria_desc:0 "Italien verfügt über eine ausgedehnte Küste und isolierte Inselhäfen, die anfällig für Invasionen sind. Durch die Reform unserer Milizia Costiera und Investitionen in unsere Küstenverteidigung können wir sicherstellen, dass Eindringlinge einen hohen Preis zahlen."
 ITA_supermarina:0 "Supermarina"
 ITA_supermarina_desc:0 "Für den Oberbefehlshaber der Regia Marina sollte ein modernes Operationszentrum eingerichtet werden, um die Operationen unserer Marineformationen im gesamten Mittelmeerraum und darüber hinaus zu koordinieren."
 ITA_stockpile_fuel:0 "Brennstoffvorrat"
 ITA_stockpile_fuel_desc:0 "Öl ist das Blut in den Adern unserer Schiffe, ohne das die Flotte handlungsunfähig wäre. Da Italien über keine nennenswerten Ölreserven verfügt, ist es unerlässlich, Öltanks zu bauen und zu füllen, um unsere Streitkräfte auch dann zu versorgen, wenn uns zukünftige Konflikte von Importen abschneiden."
 ITA_forza_navale_especiale:0 "Forza Navale Speciale"
 ITA_forza_navale_especiale_desc:0 "Die Fähigkeit, amphibische Landungen durchzuführen, dürfte sich in jedem Konflikt im Mittelmeer als unschätzbar wertvoll erweisen. Durch die Aufstellung einer für amphibische Operationen ausgebildeten und ausgerüsteten Spezialmarine können wir an jedem Punkt der langen Mittelmeerküste unsere Macht vom Meer aus demonstrieren."
 ITA_naval_air_coordination:0 "Marine-Luft-Koordination"
 ITA_naval_air_coordination_desc:0 "Bisher folgte das Oberkommando der Luftwaffe seiner eigenen Doktrin und koordinierte sich nicht gut mit der Marine. Dies schränkte die Fähigkeit der Regia Marina zur effektiven Aufklärung ein. Durch die Entwicklung einer gemeinsamen Marine-Luft-Doktrin und die Optimierung der Kommunikation zwischen Marine- und Lufteinheiten können unsere Schiffe den Feind besser finden und angreifen."
 ITA_decima_flottiglia_mas:0 "Decima Flottiglia MAS"
 ITA_decima_flottiglia_mas_desc:0 "Teseo Tesei und Elios Toschi von der Genio Navale haben einen selbstangetriebenen Torpedo entwickelt, mit dem man in feindliche Häfen eindringen kann. Indem wir die Entwicklung dieser und anderer einzigartiger Waffen finanzieren und eine Spezialeinheit in ihrer Verwendung ausbilden, können wir möglicherweise dramatische und unerwartete Siege über unsere Feinde erringen."
 ITA_incrociatori_leggeri:0 "Incrociatori Leggeri"
 ITA_incrociatori_leggeri_desc:0 "Schnell und leistungsstark genug, um es mit anderen Leichten Kreuzern aufzunehmen und Zerstörer vor sich herzutreiben, aber auch günstig genug, um in großer Zahl gebaut zu werden. Leichte Kreuzer sind wichtig für den Schutz unserer Seewege und den Kampf gegen feindliche Konvois. Aufbauend auf unseren Erfahrungen mit den Condottieri-, Montecuccoli- und Garibaldi-Klassen können wir eine Kreuzerflotte aufbauen, die die Meere zwischen Europa und Afrika beherrscht."
 ITA_incrociatori_pesanti:0 "Incrociatori Pesanti"
 ITA_incrociatori_pesanti_desc:0 "Derzeit fehlt Italien die industrielle Basis, um genügend Schlachtschiffe zu bauen, die überall dort gleichzeitig eingesetzt werden können, wo wir sie brauchen. Durch den Bau leistungsstarker, gut gepanzerter Kreuzer wie unserer Zara-Klasse verfügen wir über die Schiffe, um in mehreren Einsatzgebieten um die Vorherrschaft auf See zu kämpfen."
 ITA_expand_naval_intelligence:0 "Erweitern Sie den Marine-Geheimdienst"
 ITA_expand_naval_intelligence_desc:0 "Die italienische Nachrichtenaufklärung musste jahrelang mit einem kleinen Budget auskommen und verließ sich auf die beachtlichen Talente von Giorgio Verità Poeta und Luigi Donini. Doch damit ist nicht alles getan. Indem wir sie mit mehr Personal ausstatten und neue Talente wie Leutnant Eliso Porto anwerben, erhöhen wir unsere Chancen, die Codes unserer Feinde zu knacken und die Standorte ihrer Streitkräfte zu ermitteln."
 ITA_cooperation_programs:0 "Kooperationsprogramme"
 ITA_cooperation_programs_desc:0 "Unsere robuste Schiffbau- und Rüstungsindustrie hat in jüngster Zeit Kriegsschiffe für andere Nationen gebaut, beispielsweise die griechischen Zerstörer der Hydra-Klasse, oder bei der Konstruktion mitgewirkt, wie etwa bei der Schiffskonstruktion der UdSSR im Rahmen des Projekts 7. Die Suche nach ähnlichen Möglichkeiten könnte dazu beitragen, unsere industrielle Basis für die bevorstehenden Tests weiterzuentwickeln."
 ITA_cruiser_submarines:0 "Kreuzer-U-Boote"
 ITA_cruiser_submarines_desc:0 "Um die Seewege von Feinden außerhalb des Mittelmeers anzugreifen, benötigen wir Langstrecken-U-Boote, die die Ozeane befahren können. Die weitere Unterstützung unseres umfangreichen U-Boot-Programms aus der Nachkriegszeit, das größtenteils auf der Arbeit der Ingenieure Cavallini und Bernardis basiert, wird uns helfen, dieses Ziel zu erreichen."
 ITA_midget_submarines:0 "Kleinst-U-Boote"
 ITA_midget_submarines_desc:0 "Die klaren Gewässer des Mittelmeers sind für größere U-Boote gefährlich. Der Bau kleiner, kurzreichweitiger und unauffälliger Boote kann ihre Überlebenschancen im Mittelmeerraum verbessern und uns die nötige Stärke verleihen, um wichtige Engpässe wie den Sizilienkanal zu überwachen."
 ITA_cacciatorpediniere_di_scorta:0 "Cacciatorpediniere di Scorta"
 ITA_cacciatorpediniere_di_scorta_desc:0 "Eine der Kernaufgaben der [GetAppropriateRegiaMarinaNsName] ist der Schutz der Seewege zwischen Italien, Nordafrika und unseren Mittelmeerinseln. Durch den Bau kleiner Zerstörer zur U-Boot-Abwehr und eine effektive Ausbildung der Besatzungen können wir den Nachschub unserer Streitkräfte in Übersee besser aufrechterhalten."
 ITA_ispettorato_dei_mezzi_antisommergibili:0 "Ispettorato dei Mezzi Antisommergibili"
 ITA_ispettorato_dei_mezzi_antisommergibili_desc:0 "Die Gründung von Mariantisom als Kommando zur U-Boot-Abwehr wird uns die organisatorischen Möglichkeiten bieten, unsere Begleitschiffe besser zu koordinieren und technologische Innovationen voranzutreiben, die uns im Kampf gegen feindliche U-Boote einen Vorteil verschaffen."
 ITA_navi_da_battaglia:0 "Navi da Battaglia"
 ITA_navi_da_battaglia_desc:0 "Die Schlachtschiffe der Littorio-Klasse sind schnelle und leistungsstarke Großkampfschiffe. Der Bau weiterer dieser Schiffe und die Verfeinerung unserer Doktrin für einen effektiveren Einsatz dieser Schiffe werden unsere Kampflinie erheblich verbessern."
 ITA_proper_carriers:0 "Richtige Träger"
 ITA_proper_carriers_desc:0 "Innovative Designer wie Luigi Gagnotto haben im letzten Jahrzehnt Flottenträgerentwürfe entworfen. Mit diesem Know-how und dem vorhandenen Rumpf des Schnelldampfers Roma (aber mit neuen, leistungsstärkeren Motoren) können wir schneller einen einsatzbereiten Träger bauen, als wenn wir ihn von Grund auf neu bauen würden."
 ITA_refit_civilian_ships:0 "Umrüstung ziviler Schiffe"
 ITA_refit_civilian_ships_desc:0 "Obwohl richtige Flottenflugzeugträger weitaus leistungsfähiger sind, müssen wir, wenn wir schnell Träger brauchen, Abstriche machen. Durch die Umrüstung bestehender Passagierschiffe wie Rex und Conte di Savoia können wir unsere Flotte schnell aus der Luft versorgen."
 ITA_flotta_d_evasione:0 "Flotta d&#39;Evasione"
 ITA_flotta_d_evasione_desc:0 "Italien hat sich zu lange damit begnügt, seine maritimen Ambitionen auf das Mittelmeer und das Rote Meer zu beschränken. Mit der Gründung einer „Breakout Fleet“ und dem Bau von Schiffen für den Atlantik und den Indischen Ozean können wir unseren Einfluss auf allen Weltmeeren geltend machen."

 ITA_ethiopian_war_logistics_bba:0 "Äthiopische Kriegslogistik"
 ITA_ethiopian_war_logistics_bba_desc:0 "Die mangelnden Fortschritte in Äthiopien zeigen deutlich, dass wir den tatsächlichen Bedarf einer modernen Armee unterschätzt haben. Wir müssen uns intensiv darum bemühen, die Straßen und Häfen in unseren ostafrikanischen Gebieten zu verbessern, damit die notwendigen Vorräte an die Front gelangen."
 ITA_the_abyssinian_fiasco:0 "Das Abessinier-Fiasko"
 ITA_the_abyssinian_fiasco_desc:0 "Unsere Invasion in Äthiopien hat sich zu einer Katastrophe entwickelt. Wieder einmal sind wir mit dem beschämenden Scheitern einer italienischen Armee konfrontiert, die es nicht geschafft hat, eine äthiopische zu besiegen. Wie unsere Vorfahren in Adua wurden wir geschlagen. Wir können nur erahnen, was eine Niederlage dieses Ausmaßes für die Zukunft des faschistischen Systems in Italien bedeutet."
 ITA_solid_progress:0 "Solider Fortschritt"
 ITA_solid_progress_desc:0 "Wir haben in Äthiopien stetige Fortschritte gemacht, ohne unsere Linien zu überdehnen oder unsere Streitkräfte äthiopischen Gegenangriffen auszusetzen. Der Sieg ist zwar noch nicht errungen, aber er ist nur eine Frage der Zeit."
 ITA_struggle_in_ethiopia:0 "Kampf in Äthiopien"
 ITA_struggle_in_ethiopia_desc:0 "Unsere Fortschritte in Äthiopien liegen weit hinter dem Zeitplan zurück, aber wir dürfen nicht zulassen, dass uns ein kleiner Rückschlag wie dieser demoralisiert. Die italienischen Waffen und das faschistische System werden sich durchsetzen – koste es, was es wolle."
 ITA_undermine_the_duce:0 "Den Duce untergraben"
 ITA_undermine_the_duce_desc:0 "Mussolinis wahnsinniger Wunsch, Äthiopien zu erobern, hat uns erneut an den Rand einer Niederlage geführt. Ein Sieg ist zwar immer noch möglich, aber es muss klar sein, dass dies nicht Mussolinis Sieg sein wird."
 ITA_conspiracies_in_the_shadows:0 "Verschwörungen im Schatten"
 ITA_conspiracies_in_the_shadows_desc:0 "In den Machtzentren wird die Unzufriedenheit mit Mussolini immer lauter. Es werden Verschwörungen geschmiedet und Allianzen zwischen Menschen geschlossen, die sonst wenig gemeinsam haben. Die Zeit für Veränderungen rückt näher."
 ITA_servizio_informazione_militare:1 "Servizio Informazioni Militare"
 ITA_servizio_informazione_militare_desc:0 "Unser Militär benötigt genaue Informationen, um seine Operationen planen zu können. Dafür brauchen wir eine zentrale Organisation, die diese Informationen sammelt und analysiert und bei Bedarf offensive Maßnahmen gegen ausgewählte Ziele ergreift."
 ITA_triumph_in_africa_bba:0 "Triumph in Afrika"
 ITA_triumph_in_africa_bba_desc:0 "Die Schande von Adwa ist getilgt. Rund 40 Jahre nach der Demütigung durch die Äthiopier haben wir endlich Rache genommen. Unsere Streitkräfte haben ihre Fähigkeiten zweifelsfrei unter Beweis gestellt, und die ganze Welt muss nun unsere Macht anerkennen!"
 ITA_defeat_in_ethiopia_flag:0 "[ITA.GetNameDefCap] wurde in [ETH.GetNameDef] besiegt"
 ITA_devaluate_the_lire:0 "Abwertung der Lira"
 ITA_devaluate_the_lire_desc:1 "Der Krieg hat uns viel mehr gekostet, als uns lieb war. Unsere Wirtschaft leidet unter den Nachwirkungen. Die Abwertung unserer Währung wird unsere Produkte auf dem internationalen Markt wettbewerbsfähiger machen, aber das Leben des Durchschnittsitalieners etwas erschweren – ein notwendiges Opfer, das die Italiener gerne bringen."
 ITA_anglo_italian_agreements:0 "Anglo-italienische Abkommen"
 ITA_anglo_italian_agreements_desc:0 "Angesichts der neuen Realität in Ostafrika müssen sich die anderen Kolonialmächte mit uns arrangieren. Wir brauchen ihre Erlaubnis zur Durchfahrt durch den Suezkanal, aber sie brauchen uns noch viel mehr. Sollten sie sich weigern, müssen wir uns möglicherweise anderswo Unterstützung suchen."
 ITA_topple_amhara_rulers:0 "Sturz der Amhara-Herrscher"
 ITA_topple_amhara_rulers_desc:0 "Äthiopien ist ein viel vielfältigeres und zersplitterteres Land, als die meisten glauben. Es gibt viele Gruppen, die das alte äthiopische Regime nicht unbedingt unterstützen. Mit kleinen Zugeständnissen könnten wir sie leicht auf unsere Seite ziehen und so die Befriedung der Region deutlich erleichtern."
 ITA_the_new_emperor_of_ethiopia:0 "Der neue Kaiser von Äthiopien"
 ITA_the_new_emperor_of_ethiopia_desc:0 "Das äthiopische Volk lebt seit Jahrhunderten unter einem Kaiser. Es würde unsere Aufgabe zweifellos wesentlich vereinfachen, wenn wir ihnen einfach einen neuen Kaiser als Ersatz für den alten präsentieren könnten, indem wir unseren König zum neuen Kaiser krönen."
 ITA_ministero_della_cultura_popolare:0 "Ministero della Cultura Popolare"
 ITA_ministero_della_cultura_popolare_desc:0 "Unsere Bevölkerung muss jederzeit Zugang zu genauen Informationen haben. Im Krieg können feindliche Akteure leicht Fehlinformationen verbreiten. Dem müssen wir entgegenwirken, indem wir unserer Bevölkerung die tatsächliche Version der Ereignisse vermitteln."
 ITA_culto_del_duce:0 "Culto del Duce"
 ITA_culto_del_duce_desc:0 "Benito Mussolini, Eroberer Afrikas und Rächer von Adua, ist zweifellos der bedeutendste italienische Staatsmann seit der Zeit der römischen Kaiser. Er verkörperte den Inbegriff von Männlichkeit und war völlig furchtlos. Wir sollten dafür sorgen, dass jeder Italiener weiß, dass er stets danach streben sollte, Mussolini so ähnlich wie möglich zu werden."
 ITA_devotion:0 "Hingabe"
 ITA_devotion_desc:0 "Das italienische Volk steht in großer Schuld bei Mussolini. Durch seine Willenskraft hat er es in jeder Hinsicht verbessert. Es ist ein mutigeres, reicheres und moralisch vollkommeneres Volk. Das Mindeste, was das italienische Volk im Gegenzug tun kann, ist, ihm zu danken und seinen Befehlen zu folgen."
 ITA_legge_bottai:0 "Legge Bottai"
 ITA_legge_bottai_desc:0 "Römische Kunst und Kultur bilden die Grundlage der gesamten modernen Kultur Europas. Wir dürfen niemals zulassen, dass diese historischen Schätze durch die Moderne ersetzt werden. Italien muss zwar stets in die Zukunft blicken, darf aber auch seine Vergangenheit nie vergessen."
 ITA_boost_the_grand_council_of_fascism:0 "Den Großen Rat des Faschismus stärken"
 ITA_boost_the_grand_council_of_fascism_desc:0 "Benito Mussolini hat viel für Italien getan, aber letzten Endes ist er immer noch nur ein Mensch. Sollte er das Land jemals in die Irre führen, wird der Große Rat des Faschismus da sein, um ihn aufzuhalten."
 ITA_to_live_as_a_lion:0 "Leben wie ein Löwe"
 ITA_to_live_as_a_lion_desc:0 "Das italienische Volk ist nicht dazu geschaffen, ein Schaf zu sein. Es ist nicht dazu bestimmt, still in der zweiten Reihe der Geschichte zu sitzen und zu kämpfen. Es ist dazu bestimmt, sein Schicksal selbst in die Hand zu nehmen! Benito Mussolini ist der Mann, der es dazu bringen wird und es daran erinnern wird, dass es besser ist, einen Tag als Löwe zu leben, als hundert Jahre als Schaf."
 ITA_la_battaglia_del_grano:0 "La Battaglia del Grano"
 ITA_la_battaglia_del_grano_desc:0 "Ein Land kann nicht als wirklich groß gelten, wenn es von anderen Ländern abhängig ist, um es zu ernähren. Italien muss bei der Grundversorgung mit Nahrungsmitteln unabhängig sein, wenn wir ernst genommen werden wollen. Dafür müssen wir kämpfen, und zwar so hart wie in jeder anderen Schlacht. Nur ein Sieg in der Schlacht um Getreide kann auf einen Sieg im Krieg hoffen."
 ITA_la_battaglia_per_la_terra:0 "La Battaglia per la Terra"
 ITA_la_battaglia_per_la_terra_desc:0 "Die Grundlage einer starken faschistischen Gesellschaft ist das Land selbst und die Menschen, die es bearbeiten. Es gibt in Italien noch viele Gebiete, in denen wir durch die Trockenlegung von Sümpfen und die Bewässerung von Ackerland Nutzland gewinnen können."
 ITA_la_battaglia_per_le_nascite:0 "La Battaglia per le Nascite"
 ITA_la_battaglia_per_le_nascite_desc:0 "Wenn wir unseren rechtmäßigen Platz in der Welt einnehmen wollen, müssen wir über die militärische Stärke verfügen, ihn mit Gewalt zu erobern. Dafür brauchen wir Soldaten. Es reicht nicht, wenn ein Paar ein oder zwei Kinder hat – bevor wir Kriege gewinnen können, müssen wir die Schlacht der Geburten gewinnen."
 ITA_strengthen_the_regime:0 "Stärkung des Regimes"
 ITA_strengthen_the_regime_desc:0 "Der Kampf um wirtschaftliche Unabhängigkeit hat gezeigt, dass der Faschismus keine schwache und sanfte Ideologie ist, wie die liberalen Regimes, die ihm vorausgingen. Wir sollten dafür sorgen, dass die Menschen dies nie vergessen."
 ITA_the_man_of_providence:0 "Der Mann der Vorsehung"
 ITA_the_man_of_providence_desc:0 "Mussolini war nicht nur zur richtigen Zeit am richtigen Ort. Jeder Schritt wurde wie von Gott gelenkt, um sicherzustellen, dass Mussolini die Zügel Italiens zu diesem Zeitpunkt übernahm."
 ITA_believe_obey_fight:0 "Glaube, Gehorche, Kämpfe"
 ITA_believe_obey_fight_desc:0 "Unsere Partei wurde auf einfachen Prinzipien gegründet. Erstens: Um die Macht zu ergreifen, muss man an ihre Möglichkeit glauben. Zweitens: Um die Macht zu ergreifen, muss man den Verantwortlichen gehorchen. Drittens: Um die Macht zu ergreifen, muss man kämpfen. Und die Macht zu ergreifen ist der einzige wahre Zweck jeder politischen Bewegung, die diesen Namen verdient."
 ITA_banda_carita:0 "Banda Carità"
 ITA_banda_carita_desc:0 "Krieg ist nicht immer eine ruhmreiche Angelegenheit. Während sich die Öffentlichkeit auf die Kämpfe an den Fronten konzentriert, wissen wir, dass die Heimatfront ebenso wichtig ist und dass es ebenso notwendig ist, den Widerstand im Hinterland auszumerzen."
 ITA_banda_koch:0 "Banda Koch"
 ITA_banda_koch_desc:0 "Moderne Kriege sind oft eine Angelegenheit ganzer Völker. Das bedeutet, dass die Front nicht mehr der einzige Ort ist, an dem Kämpfe stattfinden. Wir müssen auch bereit sein, unsere Kommunikationswege durch den Einsatz von Kampftruppen zu sichern."
 ITA_security_militias:0 "Sicherheitsmilizen"
 ITA_security_militias_desc:0 "Der Einsatz von Fronttruppen zur Sicherung des Hinterlandes ist eine Verschwendung guter Soldaten. Wir sollten spezielle Einheiten zur Sicherung des Hinterlandes bilden, um mehr Soldaten für den Kampf gegen den Feind freizumachen."
 ITA_battaglioni_d_assalto:0 "Battaglioni d&#39;Assalto"
 ITA_battaglioni_d_assalto_desc:1 "Unsere Schwarzhemden stehen in der stolzen Tradition der Sturmtruppen des Ersten Weltkriegs. Durch ihre Integration in unsere Armee verleihen wir ihnen im Kampf eine starke Angriffskraft."
 ITA_strengthen_the_blackshirts:0 "Stärkung der Schwarzhemden"
 ITA_strengthen_the_blackshirts_desc:0 "Die königliche Armee ist viel zu sehr den Traditionen der alten Regime verhaftet und hat wiederholt einen beunruhigenden Mangel an faschistischem Eifer gezeigt. Es ist klar, dass wir ganze Divisionen aus unseren eigenen, loyalen Schwarzhemden brauchen."
 ITA_milizia_coloniale:0 "Milizia Coloniale"
 ITA_milizia_coloniale_desc:1 "Wir müssen unsere faschistischen Milizen, die Schwarzhemden, durch weitere Rekruten aus den Kolonien verstärken und erweitern, die unserem Regime treu ergeben sind. Die Rekrutierung nicht nur unter den italienischen Kolonisten, sondern auch unter der einheimischen Bevölkerung wird es uns ermöglichen, ihre Zahl deutlich zu erhöhen."
 ITA_towards_a_greater_italy:0 "Auf dem Weg zu einem Großitalien"
 ITA_towards_a_greater_italy_desc:1 "Der italienische Irredentismus ist die natürliche Folge des Verrats, dem die Entente das italienische Volk nach dem Ersten Weltkrieg ausgesetzt hatte. Italien hätte von Rechts wegen die vollständige Herrschaft über das Mittelmeer, und dafür müssen wir unsere Grenzen erweitern."
 ITA_heroes_of_the_nation:0 "Helden der Nation"
 ITA_heroes_of_the_nation_desc:1 "Wir müssen die Verdienste der großen Helden unserer Nation anerkennen und belohnen, dürfen jedoch nicht vergessen, dass ihr Potenzial ohne die weise Führung des Duce völlig vergeudet worden wäre."
 ITA_capo_supremo:0 "Capo Supremo"
 ITA_capo_supremo_desc:1 "Es gibt nur eine Person in Italien, die in der Lage ist, unserer großen Nation den Ruhm und die Macht zu bringen, die sie verdient. Die Zeiten der dekadenten Monarchie sind vorbei. Es ist Zeit für unseren energischen Duce, der oberste Führer Italiens zu werden."
 ITA_bend_the_bars:0 "Biegen Sie die Stangen"
 ITA_bend_the_bars_desc:1 "Italien befindet sich in einem Gefängnis, das die Briten nach dem Ersten Weltkrieg errichtet haben. Je größer die Bevölkerung und Macht Italiens wird, desto mehr wird es unter dieser Gefangenschaft leiden. Es ist an der Zeit, die Gitterstäbe dieses Gefängnisses zu lockern und die italienische Kontrolle weiter auszuweiten."
 ITA_subdue_the_sentinels:0 "Bezwinge die Wächter"
 ITA_subdue_the_sentinels_desc:1 "Der nächste Schritt in Richtung der Freiheit und des Ruhms, die das italienische Volk verdient, besteht darin, die Wächter zu unterwerfen, die uns im Mittelmeer gefangen halten, nämlich Gibraltar und Suez."
 ITA_a_colonial_empire:0 "Ein Kolonialreich"
 ITA_a_colonial_empire_desc:1 "Trotz der Bemühungen unserer Feinde und Rivalen ist Italien zu einem mächtigen Kolonialreich geworden. Wir müssen nicht nur sicherstellen, dass wir unsere Gebiete optimal nutzen, sondern auch, dass wir die italienische Kontrolle in Afrika weiter ausbauen."
 ITA_by_blood_alone:0 "Nur durch Blut"
 ITA_by_blood_alone_desc:1 "Dank der Macht unserer Armee und dem grenzenlosen Fanatismus der italienischen Irredentisten, die unserem Regime treu ergeben sind, wird Italien endlich in die Annalen der Geschichte eingehen, und zwar nicht als bloßer Nebendarsteller, sondern als Hauptprotagonist. \nNur Blut bewegt die Räder der Geschichte!"
 ITA_masters_of_the_aegean:0 "Meister der Ägäis"
 ITA_masters_of_the_aegean_desc:1 "Wenn wir das Mittelmeer kontrollieren wollen, müssen wir zunächst Italiens absolute Vorherrschaft über die Ägäis sicherstellen. Damit kontrollieren wir nicht nur den Zugang zum Schwarzen Meer und den größten Teil der Balkanküste, sondern verfügen auch über neue Marinestützpunkte zur Sicherung des Suezkanals."
 ITA_masters_of_the_mediterranean:0 "Meister des Mittelmeers"
 ITA_masters_of_the_mediterranean_desc:1 "Die Macht eines Staates ist proportional zu seiner maritimen Lage. Es ist an der Zeit, die totale Kontrolle über das Mittelmeer zu beanspruchen, denn es ist das Recht des italienischen Volkes, dieses antike Meer zu beherrschen, das die Wiege unserer Zivilisation war."

 ITA_convene_the_grand_council:0 "Einberufung des Großen Rates"
 ITA_convene_the_grand_council_desc:0 "Wir müssen den Großen Rat des Faschismus einberufen, um zu beraten, was mit Mussolini zu tun ist. Sein jüngster Vorstoß in Äthiopien und seine Weigerung, Macht und Verantwortung zu teilen, haben viele an seinen Führungsqualitäten zweifeln lassen. Er hat seinem Land gute Dienste geleistet und ist das Gesicht des Faschismus, aber es könnte Zeit für eine neue Führung sein …"

 ITA_foreign_affairs:0 "Auswärtige Angelegenheiten"
 ITA_foreign_affairs_desc:1 "Jede Großmacht muss klare außenpolitische Ziele festlegen und über talentierte Leute verfügen, die darin geschult sind, ihre Diplomatie so zu gestalten, dass diese Ziele erreicht werden."
 ITA_balkan_ambition:0 "Balkan-Ambitionen"
 ITA_balkan_ambition_desc:1 "Es ist an der Zeit, die italienischen Grenzen nach Osten in Richtung Slowenien und vor allem an die dalmatinische Küste auszudehnen. Wir werden das venezianische Kulturerbe Dalmatiens hervorheben und der Welt zeigen, wie die venezianische Regierung in der Vergangenheit nicht nur für die Dalmatiner von Vorteil war, sondern auch von ihnen sehr akzeptiert wurde."
 ITA_potential_allies_in_the_balkans:0 "Potentielle Verbündete auf dem Balkan"
 ITA_potential_allies_in_the_balkans_desc:1 "Um den Balkan zu kontrollieren, müssen wir nicht alle Nationen der Region unterwerfen und beherrschen. Es ist an der Zeit, diplomatische Mittel einzusetzen, um nützliche Verbündete auf dem Balkan zu gewinnen und dann den Rest zu unterwerfen."
 ITA_albanian_occupation:0 "Albanische Besatzung"
 ITA_albanian_occupation_desc:1 "Albanien ist für unsere Truppen ein leichtes Ziel. Wir werden wahrscheinlich nicht auf großen Widerstand stoßen. Wir müssen der Welt die Macht Italiens zeigen und den Ruhm der Vergangenheit wiederherstellen!"
 ITA_albanian_oil:0 "Albanisches Öl"
 ITA_albanian_oil_desc:1 "Es ist an der Zeit, unsere veraltete Ausrüstung für die alte Ölkonzession in Albanien zu ersetzen und sie in eine starke Ölförderungsindustrie umzuwandeln, da wir nun die volle Kontrolle über das Land haben."
 ITA_support_albanian_irredentism:0 "Unterstützen Sie den albanischen Irredentismus"
 ITA_support_albanian_irredentism_desc:1 "Wir müssen versuchen, die italienische Herrschaft über Albanien zu legitimieren. Die Unterstützung des albanischen Irredentismus im Kosovo, in Epirus und darüber hinaus wird uns sicherlich erhebliche öffentliche Unterstützung durch die lokale Bevölkerung verschaffen und uns die Möglichkeit geben, unseren Einflussbereich weiter auszudehnen."
 ITA_albanian_fascist_militia:1 "[GetAppropriateAlbanianFascistMilitiaName]"
 ITA_albanian_fascist_militia_default:0 "Albanische faschistische Miliz"
 ITA_albanian_fascist_militia_alt:0 "Legaliteti Militia"
 ITA_albanian_fascist_militia_desc:1 "Wir werden einen neuen Flügel der italienischen Schwarzhemden in Albanien gründen und dabei darauf achten, nicht nur italienische Kolonisten im Land, sondern auch albanische Freiwillige zu rekrutieren."
 ITA_guarantee_austrian_independence:0 "Garantie der österreichischen Unabhängigkeit"
 ITA_guarantee_austrian_independence_desc:1 "Wir können eine deutsche Einmischung in Österreich nicht tolerieren, da sie eine große Bedrohung für die italienische Nation und das Kräftegleichgewicht in Europa darstellt. Wir werden die Unabhängigkeit Österreichs garantieren und uns allen diplomatischen Manövern widersetzen, mit denen Deutschland das Land beeinflussen will."
 ITA_negotiate_italian_claims:0 "Italienische Forderungen verhandeln"
 ITA_negotiate_italian_claims_desc:1 "Unsere Opposition gegen Deutschland hat uns in eine Machtposition gegenüber den ehemaligen Entente-Staaten gebracht, die verzweifelt einen Bruch zwischen dem italienischen und dem deutschen Regime anstreben. Wir müssen diese Situation zu unserem Vorteil nutzen und die Kolonialbesitzungen zurückfordern, die uns nach dem Ersten Weltkrieg vorenthalten wurden."
 ITA_peace_with_ethiopia_tt:1 "Nach den Friedensgesprächen mit §Y[ETH.GetNameWithFlag]§!:"
 ITA_ENG_must_control_necessary_states_tt:0 "§Y[ENG.GetNameWithFlag]§! Kontrolliert nicht die historischen britischen Kolonien am Horn von Afrika und Malta."
 ITA_FRA_must_control_necessary_states_tt:0 "§Y[FRA.GetNameWithFlag]§! Kontrolliert nicht die historischen französischen Kolonien in Dschibuti und Tunesien."
 ITA_ratify_the_stresa_front:0 "Ratifizierung der Stresa-Front"
 ITA_ratify_the_stresa_front_desc:1 "Italien wurden inzwischen territoriale Zugeständnisse gemacht, und so ist es an der Zeit, den Prozess einzuleiten, der Italien und Frankreich in das Militärbündnis „Stresa-Front“ einführen wird."
 ITA_joint_military_programs:0 "Gemeinsame Militärprogramme"
 ITA_joint_military_programs_desc:1 "Wir müssen die Zusammenarbeit zwischen Italien und unseren neuen Verbündeten sowohl im militärischen als auch im wissenschaftlichen Bereich fördern, da beide eng miteinander verbunden sind."
 ITA_italys_destiny:0 "Italiens Schicksal"
 ITA_italys_destiny_desc:1 "Wir werden die Rolle Italiens in diesem Bündnis festlegen: die der führenden Seemacht im Mittelmeerraum. Der nächste wichtige Schritt zur Erreichung dieses Ziels ist die Sicherung der Vorherrschaft auf dem Balkan."
 ITA_the_eastern_threat:0 "Die Bedrohung aus dem Osten"
 ITA_the_eastern_threat_desc:1 "Es ist kein Geheimnis, dass die aufstrebende Sowjetunion nicht nur unsere eigenen Interessen bedroht, sondern auch die aller westlichen Mächte. Wir werden die Expansionsfähigkeit unseres Landes lähmen, indem wir ihm den Zugang zu einer der reichsten Regionen verweigern, zu denen es Zugang hat: dem Schwarzen Meer."
 ITA_german_military_cooperation:0 "Deutsche Militärzusammenarbeit"
 ITA_german_military_cooperation_desc:1 "$ITA_german_military_cooperation_desc$"
 ITA_sea_wolves_bba:0 "Seewölfe"
 ITA_sea_wolves_bba_desc:1 "$ITA_sea_wolves_desc$"
 ITA_secret_weapons:0 "$Geheimwaffen$"
 ITA_secret_weapons_desc:0 "$Geheimwaffenbeschreibung$"
 ITA_treaty_with_germany:0 "Vertrag mit Deutschland"
 ITA_treaty_with_germany_desc:1 "$ITA_german_rd_treaty_desc$"
 ITA_request_control_of_french_territories:0 "Fordern Sie die Kontrolle über französische Gebiete"
 ITA_request_control_of_french_territories_desc:1 "$ITA_claims_on_france_desc$"
 ITA_befriend_japan:0 "Befreunde dich mit Japan"
 ITA_befriend_japan_desc:1 "$ITA_japan_friend_desc$"
 ITA_italian_irredentism:0 "Italienischer Irredentismus"
 ITA_italian_irredentism_desc:1 "Der italienische Irredentismus ist nach dem Ersten Weltkrieg dank unseres faschistischen Regimes immer aggressiver geworden. Es ist Zeit für Italien, seine natürlichen Grenzen zu erreichen und alle Gebiete zu vereinen, die rechtmäßig dem italienischen Volk gehören!"
 ITA_war_with_france:0 "Krieg mit [FRA.GetName]"
 ITA_war_with_france_desc:1 "$ITA_go_after_france_desc$"
 ITA_war_with_greece:0 "Krieg mit Griechenland"
 ITA_war_with_greece_desc:2 "Was für ein mächtiges Imperium werden wir, wenn wir Griechenland nicht einbeziehen? Es sollte ein leichtes Ziel sein ..."
 ITA_war_with_the_uk:0 "Krieg mit Großbritannien"
 ITA_war_with_the_uk_desc:1 "$ITA_anti_uk_war_goals_desc$"
 ITA_befriend_greece:0 "Befreunde dich mit Griechenland"
 ITA_befriend_greece_desc:1 "$ITA_greece_friend_desc$"
 ITA_claims_on_turkey_bba:0 "Ansprüche an die Türkei"
 ITA_claims_on_turkey_bba_desc:1 "$ITA_claims_on_turkey_desc$"
 ITA_befriend_turkey:0 "Befreunde dich mit der Türkei"
 ITA_befriend_turkey_desc:1 "$ITA_turkey_friend_desc$"
 ITA_corpo_di_truppe_volontarie:0 "Corpo di Truppe Volontarie"
 ITA_corpo_di_truppe_volontarie_desc:1 "$ITA_support_nationalist_spain_desc$"
 ITA_spanish_italian_alliance:0 "Spanisch-Italienische Allianz"
 ITA_spanish_italian_alliance_desc:1 "$ITA_spanish_italian_faction_desc$"
 ITA_demand_balearic_islands_bba:0 "Nachfrage Balearen"
 ITA_demand_balearic_islands_bba_desc:1 "$ITA_demand_balearic_islands_desc$"
 ITA_befriend_portugal:0 "Befreunde dich mit Portugal"
 ITA_befriend_portugal_desc:1 "$ITA_portugal_friend_desc$"
 banda_carita_tt:0 "Verhindert, dass Deutschland seinen Fokus §Y$GER_assassini_mussolini$§ vollendet!"
 ITA_demand_ticino:0 "Nachfrage Tessin"
 ITA_demand_ticino_desc:0 "Die Schweiz ist ein Bergstaat mit vielen verschiedenen Ethnien, darunter auch Italiener, die vor allem in den südlichen Kantonen des Landes, wie beispielsweise dem Tessin, leben. Um einen großen italienischen Staat zu sichern, müssen wir sicherstellen, dass alle unsere Bürger in einem Land leben können."
 ITA_austrian_guarantees_tt:1 "Sollte Deutschland einen Anschlussversuch unternehmen, hätte Italien die Möglichkeit einzugreifen."
 ITA_all_eth_initial_states_controlled_tt:0 "Alle ursprünglichen äthiopischen Staaten werden von §Y[ROOT.GetFlag][ROOT.GetNameDef]§! oder einem §Y[ROOT.GetAdjective]-Verbündeten§! kontrolliert."
 ITA_fronte_militare_clandestino_modifier_tt:0 "Fügen Sie §Y$ITA_fronte_militare_clandestino_modifier$ (Italien)§! (§Y730§! Tage) hinzu, was Folgendes gewährt: \n $MODIFIER_RESISTANCE_GROWTH_ON_OUR_OCCUPIED_STATES$: §G+10%§! \n $MODIFIER_REQUIRED_GARRISON_FACTOR$: §R+15%§! \n\n"
 ITA_flotta_d_evasione_admiral_traits_tt:0 "Zwei zufällig ausgewählte Admirale erhalten die Eigenschaft §Y$bold$§!: \n- $MODIFIER_NAVAL_SPEED$: §G+10%§! \n- $MODIFIER_NAVAL_DAMAGE_FACTOR$: §G+5,00%§! \n\n"
 ITA_heroes_of_the_nation_general_traits_tt:0 "\nDrei zufällig ausgewählte Generäle erhalten die Eigenschaft §Y$war_hero$§!: \n- $MODIFIER_UNIT_LEADER_PROMOTE_COST_FACTOR$: §G-50,0 %§! \n- $MODIFIER_REASSIGNMENT_DURATION_FACTOR$: §R+50,0 %§! \n\n"
 ITA_mussolini_becomes_field_marshal_tt:0 "$ITA_benito_mussolini$ wird Feldmarschall."

 ITA_the_italian_liberation_war:0 "Der italienische Befreiungskrieg"
 ITA_the_italian_liberation_war_desc:1 "Es ist an der Zeit, sich gegen die Faschisten zu erheben und ihr krankes Regime zu stürzen! Die antifaschistischen Partigiani aus ganz Italien sind bereit, in diesem nationalen Befreiungskrieg zu kämpfen und ihr Leben zu geben!"
 ITA_fronte_militare_clandestino:0 "Geheime Militärfront"
 ITA_fronte_militare_clandestino_desc:1 "Wir werden in jeder italienischen Stadt eine geheime Militärorganisation gründen, die den Widerstandszellen angegliedert ist und mit unseren Streitkräften in Verbindung steht, um unsere Militäroperationen und die Partisanenaktionen hinter den Frontlinien zu koordinieren."
 ITA_corpo_volontari_della_liberta:0 "Corpo Volontari della Libertà"
 ITA_corpo_volontari_della_liberta_desc:1 "Das Nationale Befreiungskomitee ist entschlossen, unsere militärische Koordinierungsstruktur, das Corpo Volontari della Libertà, zu stärken, um eine größere Anzahl von Partisanen und Streitkräften effizient verwalten und koordinieren zu können."
 ITA_the_carabinieri:0 "Die Carabinieri"
 ITA_the_carabinieri_desc:1 "Aufgrund ihrer Rolle beim Sturz des faschistischen Regimes werden die Carabinieri nun von den Faschisten angegriffen, was viele von ihnen dazu veranlasst, sich der italienischen Widerstandsbewegung anzuschließen. Wir sollten diese Einheiten dem italienischen Befreiungskorps unterstellen."
 ITA_gappisti:0 "Gappisti"
 ITA_gappisti_desc:1 "Wir werden die Gruppi di Azione Patriottica bilden, kleine Partisaneneinheiten, die hauptsächlich in den Städten operieren, ähnlich der französischen Résistance. Unsere Gappisti werden den Feind hinter der Front hart treffen, die Garnisonen demoralisieren und die Unterstützung der Einheimischen gewinnen."
 ITA_partisan_republics:0 "Partisanenrepubliken"
 ITA_partisan_republics_desc:1 "Wir werden die Bildung provisorischer Staatsgebilde in Form von Partisanenrepubliken in den von den Partisanen befreiten Gebieten fördern, um Widerstandskämpfer zu sammeln und den Feind hinter der Front zu beschäftigen."
 ITA_the_kings_finest:0 "Das Beste des Königs"
 ITA_the_kings_finest_desc:1 "Wir werden Spezialdivisionen aus Soldaten und Offizieren bilden, die der italienischen Krone treu ergeben sind, und sie zu den Eliteeinheiten unserer Befreiungsarmee ausbilden."
 ITA_grande_rivolta_rurale:0 "Grande Rivolta Rurale"
 ITA_grande_rivolta_rurale_desc:1 "Es ist Zeit, dass sich die italienische Bauernschaft unserer Sache anschließt und gegen die faschistischen Unterdrücker zu den Waffen greift. Der Feind wird in ländlichen Gebieten keine Chance mehr haben!"
 ITA_liberation_or_death:0 "Befreiung oder Tod!"
 ITA_liberation_or_death_desc:1 "Wir haben hart für die Befreiung des italienischen Volkes von der faschistischen Unterdrückung gekämpft. Wir haben große Verluste erlitten, aber es war nicht umsonst. Jetzt ist es an der Zeit, einen letzten Vorstoß zu unternehmen, um den Faschismus in Italien ein für alle Mal auszurotten!"
 ITA_independence_rds:0 "Italienische Unabhängigkeit"
 ITA_independence_rds_desc:1 "Schluss mit der Unterdrückung, der uns unsere angeblichen Verbündeten aussetzen. Die italienische Nation wird von nun an ihr eigenes Schicksal bestimmen. Wenn dafür erneut Blut vergossen werden muss, wird das stolze italienische Volk dazu bereit sein."
 ITA_the_italian_social_republic:0 "Die Italienische Sozialrepublik"
 ITA_the_italian_social_republic_desc:1 "Die Royalisten und andere antifaschistische Elemente in Italien haben sich verräterisch gegen unser Regime erhoben. Wir haben unsere Partei zu einer antimonarchistischen Republikanischen Faschistischen Partei reformiert und die Italienische Sozialrepublik gegründet, eine neue Inkarnation des italienischen faschistischen Staates. Wir werden dem feindlichen Angriff widerstehen und unser Land wiedervereinigen!"
 ITA_guardia_nazionale_repubblicana:0 "Guardia Nazionale Repubblicana"
 ITA_guardia_nazionale_repubblicana_desc:1 "Angesichts der Rolle, die die Royal Carabinieri beim Sturz des faschistischen Regimes spielten, werden wir diese Streitkräfte umgehend ersetzen. Wir haben bereits einen Plan zur Wiederherstellung der Schwarzhemden und zur Schaffung einer Republikanischen Nationalgarde, die polizeiliche und militärische Aufgaben übernehmen soll."
 ITA_integrate_polizia_dell_africa_italiana:0 "Integrieren Sie die Polizia dell&#39;Africa Italiana"
 ITA_integrate_polizia_dell_africa_italiana_desc:1 "Wir müssen unsere Kolonialpolizei integrieren, solange diese Einheiten Italien und unserem Regime treu bleiben. Die Partisanen werden zweifellos bald versuchen, diese Truppen in ihre Gewalt zu bringen ..."
 ITA_anti_partisan_measures:0 "Antiparteiische Maßnahmen"
 ITA_anti_partisan_measures_desc:1 "Die feindlichen Partisanen sind in letzter Zeit außerordentlich aktiv. Sie bedrängen unsere Reserven und bedrohen unsere Nachschublinien. Wir müssen neue Einheiten einsetzen, die auf die Bekämpfung von Partisanen spezialisiert sind und diese verfluchten Banden in Schach halten."
 ITA_all_within_the_state:0 "Alles innerhalb des Staates"
 ITA_all_within_the_state_desc:1 "Um diesen blutigen Krieg zu gewinnen, ist es notwendig, dass jeder seinen Beitrag leistet. Doch es geht nicht nur darum, den Feind direkt zu bekämpfen. Unsere Frontlinien benötigen sowohl eine robuste Industrie und Logistik als auch Soldaten, die sie besetzen."
 ITA_battaglioni_m:0 "Battaglioni M"
 ITA_battaglioni_m_desc:1 "Wir brauchen neue Eliteeinheiten, um den feindlichen Angriff einzudämmen. Wir müssen die im Kampf ausgezeichneten Bataillone der Schwarzhemden umgestalten und verstärken und diese Truppen einsetzen, um die schwächsten Punkte unserer Frontlinien zu verstärken und den Feind von dort zurückzudrängen, wo er herkam."
 ITA_reinforce_the_gustav_line:0 "Verstärken Sie die Gustav-Linie"
 ITA_reinforce_the_gustav_line_desc:1 "Wir müssen unsere Verteidigungslinien verstärken, um den Vormarsch feindlicher Einheiten zu verhindern. Die Italienische Sozialrepublik darf jetzt nicht ins Wanken geraten!"
 ITA_the_social_republic_prevails:0 "Die Sozialrepublik siegt!"
 ITA_the_social_republic_prevails_desc:1 "Wir haben in diesem erbitterten Krieg, der von einer Gruppe manipulativer Verräter begonnen wurde, zu viel Blut vergossen, aber jetzt ist es an der Zeit, ihn zu beenden. Der italienische Staat wird wiedergeboren, stärker denn je!"
 ITA_independence_rsi:0 "$ITA_independence_rds$"
 ITA_independence_rsi_desc:1 "$ITA_independence_rds_desc$"

 ITA_regional_development_decision_unlocked_tt:0 "Schaltet Entscheidung frei: §YRegionale Entwicklung§!."
 ITA_via_della_vittoria_extra_states_tt:0 "\nFügt §Y1 $infrastructure$§! zu jedem nordafrikanischen Staat im Mittelmeerraum hinzu, der von §Y[ROOT.GetFlag][ROOT.GetNameDef]§! oder einem §Y[ITA.GetFlag][ITA.GetAdjective]-Subjekt§! kontrolliert wird.\nAktuelle Auswirkungen:"
