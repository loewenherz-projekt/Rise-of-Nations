#########   Historical ####################
 SWI_swiss_guiding_principles:0 "Schweizer Leitbilder"
 SWI_swiss_guiding_principles_desc:0 "[ROOT.GetNameDefCap] gilt als älteste Demokratie des Kontinents, doch das rasante Tempo des Wandels in Europa gefährdet dies. Sollen wir den Kurs der Eidgenossenschaft und der Verfassung von 1848 fortsetzen oder wird sich uns ein neuer Weg eröffnen?"
 SWI_increase_defense_budget:0 "Erhöhung des Verteidigungsbudgets"
 SWI_increase_defense_budget_desc:0 "Obwohl es uns im Ersten Weltkrieg gelungen ist, unsere Neutralität und Souveränität zu wahren, können wir uns nicht auf unseren Lorbeeren ausruhen. Es besteht die reale Möglichkeit, dass eine der Großmächte, die uns umgeben, in unser Land einmarschiert, um die zwischen ihnen errichteten Befestigungsanlagen zu umgehen, und unser derzeitiger Haushalt wird nicht ausreichen, um dies zu verhindern."
 SWI_national_defense_fund:0 "Nationaler Verteidigungsfonds"
 SWI_national_defense_fund_desc:0 "Die Verteidigung eines Landes erfordert mehr als nur Schweiß und Mühe. Wir benötigen auch Geld für den Import von Ausrüstung und Rohstoffen, um uns auf das Schlimmste vorzubereiten. Die Einrichtung und Förderung eines Fonds, in den [ROOT.GetAdjective] Bürger freiwillig einzahlen können, ermöglicht es uns, eine Erhöhung des Militärbudgets auszugleichen und zeigt die [ROOT.GetAdjective] partizipatorische Einstellung."
 SWI_reaffirm_spiritual_defense:0 "Bekräftigen Sie die spirituelle Verteidigung"
 SWI_reaffirm_spiritual_defense_desc:1 "Unsere Eidgenossenschaft setzt sich seit 1932 für die Verteidigung der nationalen Werte der Schweiz ein und reagiert damit auf die wachsende Bedrohung durch den Autoritarismus in ihrem Umfeld. Diese Bedrohung ist heute größer denn je, daher müssen wir unser Versprechen erneuern, unsere Lebensweise physisch und spirituell zu verteidigen."
 SWI_fortify_border_with_germany:0 "Grenze zu Deutschland befestigen"
 SWI_fortify_border_with_germany_desc:0 "[GER.GetNameDefCap] stellt eine existenzielle Bedrohung für das Überleben des [ROOT.GetAdjective]-Staates dar. Sollte es zu einem Krieg zwischen [GER.GetName] und [FRA.GetName] kommen, könnten die [GER.GetAdjective] über [ROOT.GetName] statt über die stark befestigte Grenze mit [FRA.Getname] oder über [HOL.GetName] und [BEL.Getname] ziehen. Wir können Befestigungen zwischen unseren Ländern errichten, um [GER.GetNameDef] abzuschrecken."
 SWI_fortify_border_with_italy:0 "Grenze zu Italien befestigen"
 SWI_fortify_border_with_italy_desc:1 "[ITA.GetAdjective]s Expansionsambitionen könnten jederzeit auf [ROOT.GetName] übergreifen. Schließlich ist ein erheblicher Teil unserer Bevölkerung italienischsprachig, und eine Rede von [ITA.GetLeader] genügt, und [ROOT.GetName] gerät in ihr Visier. Wir müssen ihnen zeigen, dass wir kein leichtes Ziel sind."
 SWI_fortify_border_with_france:0 "Grenze zu Frankreich befestigen"
 SWI_fortify_border_with_france_desc:2 "Trotz ihres Bekenntnisses zu demokratischen Werten und ihrer langjährigen freundschaftlichen Beziehungen können wir die Möglichkeit nicht ignorieren, dass [FRA.GetName] in das Gebiet von [ROOT.GetAdjective] eindringen könnte, um einen Überraschungsangriff auf [GER.GetNonIdeologyName] oder [ITA.GetNonIdeologyName] zu starten."
 SWI_ban_foreign_nazi_propaganda:0 "Verbot ausländischer Nazi-Propaganda"
 SWI_ban_foreign_nazi_propaganda_desc:0 "Wir dürfen dieses Vehikel für ausländische Propaganda nicht dulden. Der Nationalsozialismus widerspricht allen Werten, die die Föderation ausmachen. Aus diesem Grund kann er in einem Land wie dem unseren, das auf Demokratie und Toleranz aufbaut, nicht toleriert werden. Sonst riskieren wir, dass er dazu missbraucht wird, uns von innen heraus zu zerstören."
 SWI_buero_ha:0 "Buero Ha"
 SWI_buero_ha_desc:1 "Wir dürfen unsere Nachbarn nicht wissen lassen, dass wir versuchen, Informationen über sie zu sammeln. Deshalb sind wir auf halbwegs unabhängige Geheimdienste angewiesen, die unsere verdeckten Operationen durchführen. Hier kommt der Fotograf und spätere Spionagechef Hans Hausamann ins Spiel. Mit seinem kleinen und wendigen Geheimdienstbüro kann er die notwendige Arbeit erledigen, ohne dass wir uns die Hände schmutzig machen müssen. "
 SWI_federal_police:0 "Bundespolizeilicher Nachrichtendienst"
 SWI_federal_police_desc:0 "Es wäre töricht, [ROOT.GetName] vor äußeren Feinden zu verteidigen und es dann seinen inneren Feinden untergehen zu lassen. Wir müssen die Bundespolizei befähigen, mögliche Bedrohungen innerhalb unserer Grenzen auszumerzen und uns auf unserem Boden gegen ausländische Elemente zu verteidigen."
 SWI_spab_counter_intelligence_agency:0 "SpAb"
 SWI_spab_counter_intelligence_agency_desc:0 "Wir wissen, dass [GER.GetNameDef] in Stuttgart ein Ausbildungszentrum für Saboteure der fünften Kolonne eingerichtet hat, das sogenannte Panoramaheim. Aus diesem Grund müssen wir die Bundespolizei mit einer Spionageabwehrabteilung ausstatten, um diesen Bedrohungen zu begegnen und ausländische Spionage und Sabotage zu bekämpfen."
 SWI_armed_neutrality:0 "Bewaffnete Neutralität"
 SWI_armed_neutrality_desc:0 "Unsere langjährige Neutralität ist ein integraler Bestandteil unserer [ROOT.GetAdjective]-Identität. Doch Neutralität allein kann unsere Souveränität nicht garantieren. Wie sehr hat sie [BEL.GetNonIdeologyName] im Ersten Weltkrieg geholfen? Die beste Abschreckung ist eine ganze Nation, die bereit ist, zu den Waffen zu greifen und gegen jeden Eindringling zu kämpfen."
 SWI_promote_guisan:0 "Fördern Sie Henri Guisan"
 SWI_promote_guisan_desc:0 "Unser politisches System lässt einen einzigen General und Oberbefehlshaber nur in Zeiten höchster Not zu, wenn unsere Eidgenossenschaft in Gefahr ist. Dies ist sicherlich eine dieser Situationen, und der Mann für diese Aufgabe ist offensichtlich: Henri Guisan ist nicht nur der am besten geeignete für diese Aufgabe, sondern erfreut sich auch in ganz [ROOT.GetNameDef] großer Beliebtheit."
 SWI_national_redoubt:0 "Réduit National"
 SWI_national_redoubt_desc:0 "Henri Guisan schlägt eine andere Möglichkeit zur Verteidigung von [ROOT.GetName] vor. Anstatt zu versuchen, die Grenzen unseres Landes um jeden Preis zu verteidigen, können wir strategisch das Schweizer Mittelland aufgeben und uns in die Alpen zurückziehen, wo wir es dem Feind teuer zu stehen kommen lassen können, uns zu besetzen."
 SWI_expedite_mobilization:0 "Mobilisierung beschleunigen"
 SWI_expedite_mobilization_desc:0 "Die Aufgabe unserer kleinen stehenden Armee besteht darin, den Feind aufzuhalten, während die Bevölkerung von [ROOT.GetName] zu den Waffen greift und die Bürgermilizen bildet, die den Großteil unserer Verteidigungskräfte bilden. Deshalb müssen wir sicherstellen, dass sie so schnell wie möglich einsatzbereit sind, um das Risiko einer Überwältigung unserer stehenden Armee zu verringern."
 SWI_fortify_the_jura:0 "Den Jura befestigen"
 SWI_fortify_the_jura_desc:0 "Es wurden viele Vorbereitungen getroffen, um die Alpen zu befestigen. Wir können jedoch auch das Juragebirge befestigen, das zwar nicht so steil ist oder sich besser verteidigen lässt, sich aber als zweite Front für den Angriff auf das Plateau als vorteilhaft erweisen könnte, sobald es in den Händen des Feindes ist."
 SWI_rig_infrastructure_to_blow:0 "Bohrinsel-Infrastruktur droht zu explodieren"
 SWI_rig_infrastructure_to_blow_desc:0 "Wenn wir den Invasoren den Zutritt zu unseren Grenzen gewähren, können wir ihnen nicht alles auf dem Silbertablett servieren. Es ist von größter Wichtigkeit, dass wir unsere Infrastruktur so vorbereiten, dass sie vom Feind unbrauchbar gemacht wird. Das verlangsamt seinen Vormarsch und zwingt ihn, wertvolle Ressourcen für den Wiederaufbau aufzuwenden."
 SWI_emergency_industry:0 "Notfallindustrie"
 SWI_emergency_industry_desc:0 "Da wir unsere eigene Industriekapazität zerstören müssen, sobald der Feind in unsere Staaten einmarschiert, müssen wir sicherstellen, dass wir über eine Reserve verfügen, die wir mit dem, was uns noch bleibt, wieder aufbauen und die Invasoren zurückschlagen können. Geheime Tunnel und Fabriken werden sich im Herzen unserer Berge und Täler befinden, einige davon könnten sogar außerhalb unserer Grenzen liegen."
 SWI_flood_the_valleys:0 "Überflutet die Täler"
 SWI_flood_the_valleys_desc:0 "Wir erwarten eine große Invasionstruppe, die durch das Gebiet rund um den Bodensee kommt. Dies ist der ideale Ort, um Kanäle und Deiche zu bauen, um das Ackerland zu überfluten und die Eindringlinge festzuhalten. Während sie versuchen, diesen tückischen Sumpf zu überqueren, können wir die Gelegenheit nutzen, sie mit allem, was wir haben, zu bombardieren. Sie werden es bereuen, jemals versucht zu haben, uns anzugreifen."
 SWI_defend_the_skies:0 "Verteidige den Himmel"
 SWI_defend_the_skies_desc:0 "Die moderne Kriegsführung ist stark von Luftüberlegenheit und Unterstützung abhängig. [ROOT.GetName] ist auf diese neue Realität nicht vorbereitet, daher müssen wir jeden Kanton darauf vorbereiten, seinen Luftraum gegen feindliche Flugzeuge zu verteidigen."
 SWI_attack_from_the_mountains:0 "Angriff aus den Bergen"
 SWI_attack_from_the_mountains_desc:0 "Sobald wir unsere befestigten Stellungen in den Alpen und im Jura eingenommen haben, können wir die feindlichen Truppen im Tal vernichtend treffen. Wir müssen ihnen klarmachen, dass jede Minute, die sie in unserem Gebiet verbringen, einen größeren Verlust an Personal und Material bedeutet."
 SWI_frontier_defense_plan:0 "Grenzverteidigungsplan"
 SWI_frontier_defense_plan_desc:0 "Wenn wir sie in unser Land lassen, ist [ROOT.GetNameDef] so gut wie tot. Wir dürfen keinen Zentimeter unseres Territoriums hergeben, unsere Grenzen sind heilig. Deshalb müssen wir unsere Grenzen befestigen und bereit sein, sie zu verteidigen."
 SWI_fight_until_death:0 "Kämpfe bis zum Tod"
 SWI_fight_until_death_desc:1 "Die Chancen stehen gegen uns. [ROOT.GetNAme] ist zahlenmäßig und waffentechnisch unterlegen und auf das Kommende nicht ausreichend vorbereitet. Deshalb muss jeder [ROOT.GetAdjective]-Bürger bereit sein, sein Leben für seinen Kanton und die Eidgenossenschaft zu geben. "
 SWI_total_defense:0 "Totale Verteidigung"
 SWI_total_defense_desc:0 "Totaler Krieg bedeutet, dass wir eine totale Verteidigung brauchen. Wenn jede Miliz vorbereitet ist und alles gibt, was sie hat, um den Invasoren zu trotzen, haben wir vielleicht eine Überlebenschance."
 SWI_the_army_position:0 "Die Position der Armee"
 SWI_the_army_position_desc:0 "Wir werden unsere Bürgermilizen und unser stehendes Heer innerhalb der Grenzen von [ROOT.GetName] positionieren, daher benötigen sie Befestigungen, um Eindringlinge besser in Schach halten zu können."
 SWI_prolonged_service:0 "Verlängerter Service"
 SWI_prolonged_service_desc:0 "Unsere derzeitige Wehrpflicht reicht nicht aus, um einen längerfristigen Krieg zu bewältigen. Wir müssen der Bundesregierung die Mittel an die Hand geben, unsere Bürger länger unter Waffen zu halten, auch wenn dies bedeutet, dass wir einige Freiheiten opfern müssen."
 SWI_enhanced_training:0 "Erweitertes Training"
 SWI_enhanced_training_desc:0 "Der Krieg hat sich seit [ROOT.GetName]s letztem Konfliktrisiko stark verändert. Wir müssen die Grundausbildung aller fähigen Bürger aktualisieren und verbessern. Sie sind unser wichtigstes Kapital zur Verteidigung unseres Landes."
 SWI_integrate_refugees_into_the_army:0 "Flüchtlinge in die Armee integrieren"
 SWI_integrate_refugees_into_the_army_desc:1 "Als Oase des Friedens und der Demokratie inmitten eines Ozeans aus Faschismus und Krieg strömen viele Menschen nach [ROOT.GetName] auf der Suche nach einem sicheren Hafen. Einige von ihnen hoffen, sich den Bemühungen anschließen zu können, diejenigen zu besiegen, die sie zur Flucht aus ihrer Heimat gezwungen haben, und viele sind sogar Berufssoldaten. Wir können sie im Kampf für die Schweiz und eine bessere Zukunft unterstützen."
 SWI_expanded_military_support:0 "Erweiterte militärische Unterstützung"
 SWI_expanded_military_support_desc:0 "Unsere Miliz besteht nicht nur aus Soldaten. Sie muss viele weitere Rollen übernehmen, damit sie wie eine gut geölte Maschine funktioniert. Wir müssen Unterstützungskompanien für unsere Milizen rekrutieren, ausbilden und bereitstellen, wenn wir [ROOT.GetName] erfolgreich verteidigen wollen."
 SWI_all_adults_training:0 "Training für alle Erwachsenen"
 SWI_all_adults_training_desc:0 "In der gegenwärtigen Weltlage ist kein Platz für Zufälle. Jeder fähige Erwachsene muss bereit sein, gegen jede Invasionsmacht zu den Waffen zu greifen. Die Schweiz gehört uns allen und muss daher von uns allen verteidigt werden."
 SWI_anti_tank_divisions:0 "Panzerabwehrdivisionen"
 SWI_anti_tank_divisions_desc:0 "Der Panzer ist die Speerspitze der modernen Kriegsführung. Unser Gelände verschafft uns bereits einen Vorteil gegenüber ihm, aber wenn wir unsere Streitkräfte mit Panzerabwehrausrüstung ausstatten, können wir die Spitze abschneiden und den Speer stumpf machen."
 SWI_reduce_military_training_age:0 "Reduziertes Rekrutierungsalter"
 SWI_reduce_military_training_age_desc:0 "Normalerweise beginnen [ROOT.GetAdjective] mit 20 Jahren mit der Kampfausbildung. Um jedoch die zum Überleben nötige Anzahl an Soldaten unter Waffen zu haben, müssen unsere Bürger ein Jahr früher mit der Ausbildung beginnen. Hoffen wir, dass das ausreicht."
 SWI_veteran_sharpshooter_divisions:0 "Veteranen-Scharfschützen-Divisionen"
 SWI_veteran_sharpshooter_divisions_desc:1 "Tausende erfahrene Scharfschützen haben darum gebeten, als Hilfstruppen in die Armee aufgenommen zu werden und ihren Teil zur Verteidigung ihres Landes und ihrer Demokratie beizutragen. Ihre Erfahrung und Begeisterung werden unseren Milizen von Nutzen sein."
 SWI_fortify_ticino:0 "Fortezza Ticino"
 SWI_fortify_ticino_desc:0 "Als neutrales Land zwischen drei historisch kriegerischen Nationen kann der Tod von allen Seiten kommen. Wir dürfen nicht nachlässig werden. [ITA.GetName] wird uns genauso wahrscheinlich angreifen wie [GER.GetNameDef] oder [FRA.GetName], und wenn, dann über [846.GetName]. Deshalb müssen wir es zum Wohle von [SWI.GetNameDef] zu einer uneinnehmbaren Festung machen."
 SWI_fortify_sargans_gotthard_and_st_maurice:0 "Sargans, Gotthard und St. Maurice befestigen"
 SWI_fortify_sargans_gotthard_and_st_maurice_desc:0 "Unsere Alpen sind der Stolz von [ROOT.GetName] und in diesen unsicheren Zeiten können wir sie stärken, um die Sicherheit unserer Konföderation zu gewährleisten."
 SWI_defend_against_paratroopers:0 "Verteidige dich gegen Fallschirmjäger"
 SWI_defend_against_paratroopers_desc:0 "Wir haben gesehen, wie Fallschirmjäger eingesetzt werden können, um Befestigungen zu umgehen und alle Vorbereitungen zunichte zu machen. Es ist wichtig, dass wir bereit sind, mit ihnen fertig zu werden, bevor sie unsere Verteidigung zerstören."
 SWI_expand_special_forces:0 "Spezialkräfte erweitern"
 SWI_expand_special_forces_desc:1 "Unser stehendes Heer ist gut vorbereitet, im Vergleich zu anderen Nationen jedoch extrem klein und wird möglicherweise nicht ausreichen, um [ROOT.GetName]s Verteidigung zu unseren Gunsten zu beeinflussen. Wir werden mehr von ihnen brauchen, um [ROOT.GetAdjective] zum Sieg zu führen!"
 SWI_purchase_german_planes:1 "[SWI_purchase_fascist_planes_name]"
 SWI_purchase_german_planes_default:0 "Kaufen Sie deutsche Flugzeuge"
 SWI_purchase_german_planes_alt:0 "Kaufen Sie Flugzeuge vom faschistischen Nachbarn"
 SWI_purchase_german_planes_desc:0 "Da unsere Luftwaffe veraltet ist und wir weder über die nötige Industrie noch über die nötige Technologie verfügen, um Flugzeuge in nennenswerten Stückzahlen zu produzieren, sind wir gezwungen, sie von unseren Nachbarn zu kaufen. Der Kauf der benötigten Flugzeuge von [GER.GetName] sichert uns nicht nur die nötige Ausrüstung, sondern trägt auch dazu bei, dass wir uns mit ihnen gut stellen."
 SWI_ban_the_communist_party:0 "Verbot der Kommunistischen Partei der Schweiz"
 SWI_ban_the_communist_party_desc:0 "Kommunistische Parteien stellen eine große Gefahr für [SWI.GetNameDef] dar. Trotz der Entfernung zwischen uns und [SOU.GetNameDef] ist ihr revolutionärer Einfluss spürbar. Wir können es uns in solch gefährlichen Zeiten nicht leisten, unser Land zu destabilisieren. Deshalb müssen wir schnell handeln und jede Partei verbieten, die versucht, unsere Regierung zu stürzen und zu untergraben."
 SWI_withdraw_from_the_league_of_nations:0 "Austritt aus dem Völkerbund"
 SWI_withdraw_from_the_league_of_nations_desc:0 "Unsere Mitgliedschaft im Völkerbund ist unvereinbar mit der Neutralität, die wir in [ROOT.GetName] anstreben. Daher ist es unerlässlich, dass wir diese sterbende Organisation aufgeben. Damit signalisieren wir unseren Nachbarn auch unser Engagement für wahre Neutralität und überzeugen sie hoffentlich davon, dass [ROOT.GetName] kein Angriffsziel ist."
 SWI_limited_censorship_of_the_press:0 "Begrenzte Zensur der Presse"
 SWI_limited_censorship_of_the_press_desc:0 "Die Kräfte, die [ROOT.GetName] sehen wollen, werden alles nutzen, um eine Invasion bei uns zu rechtfertigen. Die Pressefreiheit, obwohl sie für eine gesunde Demokratie von entscheidender Bedeutung ist, muss vorerst in den Hintergrund treten, damit wir den Ambitionen unserer Nachbarn keine Munition liefern."
 SWI_tighten_press_censorship:0 "Verschärfen Sie die Pressezensur"
 SWI_tighten_press_censorship_desc:0 "Es gibt keinen Raum für Fehler. Ein einziges Wort kann den Unterschied zwischen dem Überleben der Konföderation und ihrem Untergang ausmachen. Wir dürfen nicht zulassen, dass die freie Presse unsere Zukunft gefährdet. Sie muss streng kontrolliert werden, genau wie [?SWI.SWI_biggest_fascist.GetNameDef] es verlangt."
 SWI_seek_trade_agreement_with_germany:0 "Handelsabkommen mit Deutschland"
 SWI_seek_trade_agreement_with_germany_desc:0 "Der Faschismus setzt seinen erschreckenden Aufstieg fort, und auch wenn es schwer zu schlucken ist, ist es vielleicht genau das, was wir brauchen, um uns nicht ins Fadenkreuz der Faschisten zu rücken, wenn wir eine gewisse wirtschaftliche Zusammenarbeit zulassen."
 SWI_axis_gold:0 "Axis Gold"
 SWI_axis_gold_desc:0 "Als neutrales Land bleiben unsere Märkte für jedes Land offen, was ein Vorteil ist, den wir nutzen können. Indem wir unseren Goldmarkt für [SWI_biggest_fascist.GetNameDef] öffnen, können wir unsere Volkswirtschaften miteinander verbinden, um sie zu besänftigen und unsere beiden Volkswirtschaften zu verbessern."
 SWI_spirit_of_resistance:0 "Der Geist des Widerstands"
 SWI_spirit_of_resistance_desc:0 "Die Herzen und Köpfe der Menschen von [ROOT.GetName] sind die wichtigste Front im Kampf um unser Überleben. Wir müssen sicherstellen, dass jeder unserer [ROOT.GetAdjective] Bürger bereit ist, bis zum Ende zu kämpfen, selbst wenn alles verloren scheint."
 SWI_pro_helvetia:0 "Pro Helvetia"
 SWI_pro_helvetia_desc:0 "Die spirituelle Verteidigung von [ROOT.GetName] erfordert, dass die [ROOT.GetAdjective]-Kultur einzigartig, unteilbar und von der unserer Nachbarn verschieden bleibt. Diese neue Organisation, Pro Helvetia, wird unsere gemeinsamen Schweizer Werte, die eng mit unserer Demokratie verbunden sind, bewahren und fördern und unser Überleben gegen die Übermacht sichern."
 SWI_spirit_of_saint_bernard:0 "Geist des Heiligen Bernhard"
 SWI_spirit_of_saint_bernard_desc:0 "Seit jeher sind wir stolz auf unsere medizinische Tradition und unsere Hilfsbereitschaft für Menschen in Not. Das Hospiz auf dem Großen Sankt Bernhard und das Rote Kreuz sind ein Beweis dafür. Nun können wir diesen Geist als Waffe einsetzen und ihn auf die Milizen übertragen, um unsere Verteidigungsbemühungen zu stärken."
 SWI_adopt_romansh:1 "Nehmen Sie die Rumantsch-Sprache an"
 SWI_adopt_romansh_desc:0 "[ROOT.GetName] ist kein Land, das aus [GER.GetAdjective], [FRA.GetAdjective] und [ITA.GetAdjective] Regionen besteht, die unsere gierigen Nachbarn für sich beanspruchen sollen. [ROOt.GetName] ist eine einzige, unteilbare, multikulturelle Nation. Die Übernahme des Rumantsch, einer Sprache, die nur in den Bergen unserer [ROOT.GetAdjective] Alpen gesprochen wird, wird ihnen zeigen, dass sich unsere Kultur und Werte von ihren unterscheiden, unabhängig von der Sprache."
 SWI_patriotic_shooting_clubs:0 "Patriotische Schützenvereine"
 SWI_patriotic_shooting_clubs_desc:0 "[ROOT.GetName] hat eine lange Tradition in Scharfschützenvereinen und -wettbewerben. Einige unserer Freizeitschützen sind geschickter als die professionellen Scharfschützen anderer Nationen. Wir können diese Vereine nutzen und sie in unsere Milizen integrieren, um unsere Verteidigungsfähigkeiten zu verbessern."
 SWI_aktion_nationaler_widerstand:0 "Aktion Nationaler Widerstand"
 SWI_aktion_nationaler_widerstand_desc:0 "In jedem Teil der [ROOT.GetAdjective]-Gesellschaft gibt es eine kleine Gruppe von Zivilisten, die bereit sind, heimlich zusammenzuarbeiten, um die Bevölkerung zu beeinflussen. Ihre Ziele sind es, den Defätismus zu bekämpfen, Einheit zu fördern und im Falle einer Invasion den Grundstein für den Widerstand in [ROOT.GetName] zu legen."
 SWI_heer_und_haus:0 "Heer und Haus"
 SWI_heer_und_haus_desc:0 "Die Schweizer Bevölkerung und damit auch ihre Armee müssen von innen heraus zum Widerstand und zum Kampf für die Verteidigung ihres Heimatlandes ermutigt werden. Um sie daran zu erinnern, was auf dem Spiel steht, ist Pro Helvetia mit Hilfe der Aktion Nationaler Widerstand der Schlüssel zum Denken und Handeln. [ROOT.GetAdjective]"
 SWI_ortswehren:0 "Ortswehren"
 SWI_ortswehren_desc:0 "Totaler Krieg bedeutet, dass jeder [ROOT.GetAdjective] Bürger bereit sein muss, seinen Kanton zu verteidigen, aber nicht jeder kann sich unseren Milizen anschließen. Wir können lokale Wachen aufstellen, die als Rückgrat dienen und die Milizen bei ihren Bemühungen zur Verteidigung von [SWI.GetName] unterstützen."
 SWI_luftschutz:0 "Luftschutz"
 SWI_luftschutz_desc:0 "Der Krieg hat sich verändert. Die Luft ist die neue Sphäre der Kriegsführung, und wir dürfen nicht zulassen, dass sie zu unserer Achillesferse wird. Lokale Luftverteidigungskräfte müssen aufgebaut, mit Zivilisten besetzt und mit den Mitteln ausgestattet werden, um Bedrohungen aus der Luft zu erkennen und zu bekämpfen. Es hat keinen Sinn, die Berge zu verteidigen, wenn man über die Berge hinausgehen kann!"
 SWI_train_swiss_women:0 "Trainiere Schweizer Frauen"
 SWI_train_swiss_women_desc:0 "Wenn wir unser Land mit allen Mitteln verteidigen wollen, wäre es absurd, die Hälfte unserer Bevölkerung von unseren Bemühungen auszuschließen. [ROOT.GetAdjective] Frauen sollten für den Kampf um unser Überleben ausgebildet werden."
 SWI_ban_national_movement_for_switzerland:0 "Verbot der Nationalen Bewegung für die Schweiz"
 SWI_ban_national_movement_for_switzerland_desc:0 "Faschisten neigen wie Kakerlaken dazu, sich in den Ecken und Winkeln der Gesellschaft zu verstecken und unsere Nachlässigkeit auszunutzen, um an Stärke zu gewinnen, bis es zu spät ist, sich ihnen entgegenzustellen. Damit ist jetzt Schluss! Ihr neues Aussehen und ihr neuer Name werden uns nicht täuschen. Wir müssen entschlossen zuschlagen, wenn wir unsere Demokratie bewahren wollen."
 SWI_fortify_austrian_border:0 "Befestigen Sie die österreichische Grenze"
 SWI_fortify_austrian_border_desc:0 "Da Österreich nun in den Händen eines potentiellen Feindes ist, können wir es uns nicht leisten, eine offene Flanke zu haben, die der Feind im Kriegsfall ausnutzen könnte. Genau wie an der Grenze zu [GER.GetNonIdeologyName] müssen wir diese Front befestigen."
 SWI_seek_allied_trade:0 "Suchen Sie nach verbündetem Handel"
 SWI_seek_allied_trade_desc:0 "Da wir von Feinden umgeben sind, müssen wir den lebenswichtigen Handel mit den Alliierten sichern, um zu überleben. Wenn wir Glück haben, können wir es vermeiden, den Zorn unserer anderen Nachbarn auf uns zu ziehen, weil wir engere Handelsbeziehungen mit ihren Rivalen anstreben."
 SWI_case_north:0 "Fall Nord"
 SWI_case_north_desc:0 "Wir können einen Krieg gegen [?SWI.SWI_biggest_fascist.GetNameDef] nicht ausschließen, wir müssen darauf vorbereitet sein. Es müssen Pläne ausgearbeitet, Vorräte verteilt, Schützengräben ausgehoben und Soldaten bewaffnet werden."
 SWI_freeze_german_assets:0 "Deutsche Vermögenswerte einfrieren"
 SWI_freeze_german_assets_desc:0 "Seit Jahren nutzt [?SWI.SWI_biggest_fascist.GetNameDef] unsere Neutralität und Schlupflöcher in unserem Bankensystem, um ihren unrechtmäßig erworbenen Reichtum zu schützen und ihre Wirtschaft am Laufen zu halten. Die moralische Pflicht muss Vorrang vor absoluter Neutralität haben, auch wenn wir sicher sind, dass dies Konsequenzen haben wird."
 SWI_fund_resistance_groups:0 "Widerstandsgruppen finanzieren"
 SWI_fund_resistance_groups_desc:0 "Seit Jahrhunderten bekämpfen sich die europäischen Nationen gegenseitig und unterdrücken Völker auf allen anderen Kontinenten. Es ist die Pflicht der Völker, den Opfern der unerbittlichen Kriege unseres Kontinents zu helfen, indem wir ihnen die Mittel an die Hand geben, ihre Fesseln zu sprengen und ihre eigene Zukunft zu bestimmen."
 SWI_citizen_supply_mandate:0 "Bürgerversorgungsauftrag"
 SWI_citizen_supply_mandate_desc:0 "Wir wissen nicht, wie eine Invasion ablaufen würde, und selbst wenn wir uns auf ein zentralisiertes Versorgungsnetz verlassen könnten, wäre das nicht mit unserer Kommandostruktur vereinbar. Deshalb muss jeder [ROOt.GetAdjective] Haushalt zu Hause einen Vorrat für mindestens zwei Monate lagern, sowohl für sich selbst als auch für die örtlichen Milizen."
 SWI_prepare_infrastructure_and_industry:0 "Infrastruktur und Industrie vorbereiten"
 SWI_prepare_infrastructure_and_industry_desc:0 "Bei der Verteidigung eines Landes geht es nicht nur um den Bau von Festungen. Wir müssen auch unsere Infrastruktur in den Alpen stärken, um Truppen und zivile Güter effizienter bewegen zu können. Außerdem müssen wir eine größere Industriebasis auf dem Plateau schaffen, um uns weiterzuentwickeln."
 SWI_build_up_military_readiness:0 "Bauen Sie die militärische Bereitschaft auf"
 SWI_build_up_military_readiness_desc:0 "Die Vorbereitung der Schweizer Bevölkerung ist eine nie endende Aufgabe. Wir dürfen nicht ruhen, bis die Gefahr einer Invasion gebannt ist – und das wird sie vielleicht nie sein. Wir müssen unser Land unverzüglich auf die Verteidigung vorbereiten."
 SWI_support_active_militias_continuous_focus:0 "Unterstützen Sie aktive Milizen"
 SWI_support_active_militias_continuous_focus_desc:0 "Unsere Bürger sind bewaffnet und in ihren lokalen Milizen eingesetzt. Es ist die Pflicht aller anderen, sie nach Kräften zu unterstützen, damit wir die Feinde der Konföderation in Schach halten können."

 SWI_rig_infrastructure_to_blow_TT:0 "Wenn einer unserer Kernstaaten vom Feind eingenommen wird, werden alle §YInfrastrukturen§!, §YEisenbahnen§!, §YVersorgungszentren§! und §YBunker§! vollständig beschädigt. §YMilitär§! und §YZivilfabriken§! werden teilweise beschädigt."
 SWI_create_anti_tank_template_TT:0 "Eine Vorlage für §YSwiss Militia anti Tank§! wird erstellt"

##### Submit to Germany #####

 SWI_closer_ties_with_germany:0 "Engere Beziehungen mit [SWI_get_fascist_neighbor_cap]"
 SWI_closer_ties_with_germany_desc:0 "Wir haben im Norden einen mächtigen und gefährlichen Nachbarn. Wenn wir überleben wollen, ist es vielleicht eine gute Idee, uns mit ihm gutzustellen. Daher wäre es lebenswichtig, auf ihn zuzugehen und bessere Beziehungen zu ihm anzustreben, ohne dabei unsere neutrale Haltung zu verlieren."
 SWI_panoramaheim_branch:0 "Das Panoramaheim"
 SWI_panoramaheim_branch_desc:0 "In Stuttgart gibt es ein Haus, das „Panoramahaus“ genannt wird und von dem aus viele Agenten der fünften Kolonne operierten, deren Ziel es war, die [ROOT.GetAdjective]-Regierung zu destabilisieren und einem faschistisch geführten Regime Tür und Tor zu öffnen."
 SWI_the_national_front:0 "Die Nationale Front"
 SWI_the_national_front_desc:0 "Die Nationale Front ist die führende faschistische Partei in [ROOT.GetNonIdeologyName]. Wenn in diesem demokratisch geprägten Land jemand die Macht übernehmen kann, dann sie. Einige hochrangige Mitglieder haben bereits enge Verbindungen zu [GER.GetNameDef], was ihnen im Falle eines Kriegsausbruchs eine Art Schutz bieten könnte."
 SWI_infiltrate_federal_police:0 "Infiltrieren Sie die Bundespolizei"
 SWI_infiltrate_federal_police_desc:0 "Mit ihrem Auftrag, unsere ausländische Propaganda und undemokratische Kräfte zu untergraben, ist die Bundespolizei ein idealer Ort, um unsere eigene Fraktion zu infiltrieren und zu verhindern, dass sie ins Visier genommen wird. Letztendlich wird uns dies auch ermöglichen, unsere Feinde unter dem Deckmantel der nationalen Sicherheit auszuschalten."
 SWI_the_petition_of_the_200:0 "Die Petition der 200"
 SWI_the_petition_of_the_200_desc:0 "200 Mitglieder einer breiten Palette von Parteien, die [ROOT.GetAdjective] Faschismus und Autoritarismus vertreten, haben der Versammlung diese Petition vorgelegt, in der sie darum bitten, dass wir im Interesse der Selbsterhaltung beginnen, [GER.GetNameDef] zu akzeptieren und mit ihnen zusammenzuarbeiten."
 SWI_case_west:0 "Fall West"
 SWI_case_west_desc:0 "Wir müssen auf jedes mögliche Szenario vorbereitet sein. [FRA.GetName] ist eine ebenso große Bedrohung wie [GER.GetNameDef] und muss entsprechend behandelt werden. Wir müssen unsere Armee und unser Land auf einen Krieg mit [FRA.GetAdjective] vorbereiten, sonst riskieren wir den Tod von [ROOT.GetNonIdeologyName]."
 SWI_german_industrial_investments:1 "[SWI_get_fascist_neighbor_adjective] Industrielle Investitionen"
 SWI_german_industrial_investments_desc:0 "[?SWI.SWI_biggest_fascist.GetNonIdeologyName]s industrielle Macht ist unbestreitbar. Wenn wir einen kommenden Krieg überleben wollen, brauchen wir eine eigene industrielle Basis, um wettbewerbsfähig zu bleiben und sie als Druckmittel zu nutzen. [?SWI.SWI_biggest_fascist.GetNameDefCap] Investitionen in uns bedeuten auch, dass sie einen Grund haben, [ROOT.GetNonIdeologyName] intakt zu halten."
 SWI_complete_siegfried_line:0 "Vervollständige den Westwall"
 SWI_complete_siegfried_line_desc:0 "[GER.GetNameDefCap] hat eine beeindruckende Barriere errichtet, um sich gegen [FRA.GetName] zu verteidigen, und wir haben Grund zu der Annahme, dass wir uns auch gegen sie verteidigen müssen, insbesondere da wir uns immer stärker mit [GER.GetNonIdeologyName] verbünden. Deshalb müssen wir unsere Verteidigung koordinieren und ergänzende Maßnahmen errichten."
 SWI_military_exercises_with_germany:1 "Militärübungen mit [SWI_get_fascist_neighbor]"
 SWI_military_exercises_with_germany_desc:0 "Trotz ihrer feindseligen Haltung gegenüber unseren traditionellen demokratischen Werten könnte sich [SWI_get_fascist_neighbor] als wertvoller Verbündeter erweisen, wenn es an der Zeit ist, uns zu verteidigen, und noch besser: Es würde die Wahrscheinlichkeit einer Invasion durch sie verringern."
 SWI_abandon_neutrality:0 "Neutralität aufgeben"
 SWI_abandon_neutrality_desc:0 "In ganz Europa werden die Seiten gewählt. Wir dürfen uns nicht auf dem falschen Fuß erwischen lassen. Die einzige Lösung besteht darin, unsere historische Neutralität aufzugeben und den Schutz von [SWI_get_fascist_neighbor] zu suchen. Andernfalls riskieren wir, zwischen Baum und Borke zu geraten."
 SWI_promote_tobler:0 "Tobler fördern"
 SWI_promote_tobler_desc:0 "Als einziges ins [ROOT.GetAdjective] Parlament gewähltes Mitglied einer faschistischen Partei und Vorsitzender der Nationalen Front ist Robert Tobler der naheliegende Kandidat, um [ROOT.GetNonIdeologyName] in einen langsamen, aber stetigen Übergang von einer demokratischen pluralistischen Nation zu einem [SWI_get_fascist_neighbor_adjective] Verbündeten mit eiserner Faust zu führen. Dies würde natürlich den Ausschluss von Rolf Henne aus der Partei bedeuten, es kann nur einen Führer geben."
 SWI_promote_henne:0 "Henne fördern"
 SWI_promote_henne_desc:0 "Als energischer Befürworter des Faschismus und der Kollaboration mit [SWI_get_fascist_neighbor] ist Rolf Henne ein heißer Kandidat, um die Nationale Front und [ROOT.GetName] in einen [SWI_get_fascist_neighbor_adjective] Vasallenstaat zu führen, was sicherlich Vorteile mit sich bringen wird, nicht zuletzt unsere Sicherheit und unser Überleben. Dies würde natürlich den Ausschluss von Robert Tobler aus der Partei bedeuten, da er nicht bereit ist, das Nötige zu tun."
 SWI_propagandize_swiss_military_tradition:0 "Propaganda für die Schweizer Militärtradition"
 SWI_propagandize_swiss_military_tradition_desc:0 "Dies ist nicht die Zeit, in Erinnerungen an unsere demokratische Vergangenheit zu schwelgen. Stattdessen müssen wir uns auf unsere militärische Tradition konzentrieren. Infanterie und Armbrustschützen waren für ihre Disziplin und Effektivität bekannt und wurden auf der ganzen Welt als begehrte Söldner angeheuert. Wenn wir den bevorstehenden Krieg überleben wollen, müssen wir unser Volk an seine Militärgeschichte erinnern."
 SWI_ban_democratic_party:0 "Verbot demokratischer Parteien"
 SWI_ban_democratic_party_desc:0 "Unsere demokratischen Parteien riskieren unseren Ansatz gegenüber [SWI_get_fascist_neighbor]. Wenn wir uns weiter auf ihre Seite stellen wollen, bedeutet das, dass wir das tun müssen, was vor einigen Jahren noch undenkbar gewesen wäre: unsere demokratischen politischen Parteien abzuschaffen. Wenn dies das Opfer ist, das wir bringen müssen, dann ist es so."
 SWI_centralize_switzerland:0 "Zentralisierung der Schweiz"
 SWI_centralize_switzerland_desc:0 "Die [ROOT.GetNonIdeologyName], auf die wir zusteuern, ist weit entfernt von der alten Schweizerischen Eidgenossenschaft, die wir fast ein Jahrhundert lang hatten. Wir werden kein Staatenbund mehr sein, sondern ein zentralisiertes Land, dessen Macht von oben ausgeht und zu den Massen durchsickert."
 SWI_german_military_collaboration:1 "[SWI_get_fascist_neighbor_adjective] Militärische Zusammenarbeit"
 SWI_german_military_collaboration_desc:0 "Uns fehlt die notwendige Erfahrung in der Kriegsführung, um in der modernen Welt bestehen zu können. Hier kommt [?SWI.SWI_biggest_fascist.GetName] ins Spiel: Ihre Streitkräfte sind eine ernstzunehmende Macht, und die Zusammenarbeit mit ihnen wird es uns ermöglichen, uns zu verteidigen und vielleicht sogar andere Nationen präventiv anzugreifen."
 SWI_join_the_axis:0 "Treten Sie der Achse bei"
 SWI_join_the_axis_desc:0 "Das ist es. Wir setzen auf [ROOT.GetNonIdeologyName]s Überleben im kommenden Sturm. Wir werden uns dem Sturm unter dem Banner von [?SWI.SWI_biggest_fascist.GetName]s Fraktion anschließen. Hoffen wir, dass wir die richtige Entscheidung getroffen haben."
 SWI_become_german_puppet:1 "Werde zur Marionette"
 SWI_become_german_puppet_desc:0 "Henne hat seine Karriere diesem Moment gewidmet. [ROOT.GetNonIdeologyName]s eigener Anschluss, sozusagen. Selbst wenn wir unsere langjährige Souveränität verlieren, könnten wir einige ihrer Brocken abbekommen. Wir können nur hoffen, dass dies nicht unsere Zerstörung bedeutet."
 SWI_ask_for_vorarlberg:0 "Fragen Sie nach [848.GetName]"
 SWI_ask_for_vorarlberg_desc:0 "Nachdem wir nun schon seit einiger Zeit unter [?SWI_fascist_overlord.GetName]s Fittichen stehen und unsere Loyalität bewiesen haben, ist es an der Zeit, dass sie uns das anvertrauen, was uns rechtmäßig zusteht. [848.GetName] hat für den Beitritt gestimmt, als [ROOT.GetNonIdeologyName] noch eine demokratische Konföderation war, daher besteht kein Zweifel, dass sie sich unserer heutigen Form anschließen möchten."
 SWI_size_and_opinion_chance_tooltip:0 "\nDie Wahrscheinlichkeit einer Annahme wird aufgrund der §YGröße§! unserer Streitkräfte und ihrer §YMeinung§! zu uns größer sein."
 SWI_request_austrian_occupation:0 "Anfrage [AUS.GetAdjective] Beruf"
 SWI_request_austrian_occupation_desc:0 "Die Annexion von [848.GetName] durch [ROOT.GetNonIdeologyName] ist absolut nicht unsere endgültige Form. Wir können [?SWI_fascist_overlord.GetName] beweisen, dass wir die Verwaltung eines größeren Gebiets übernehmen können, ihre Belastung verringern und [ROOT.GetFactionName] zu einer effizienteren Kriegsmaschine machen."
 SWI_request_italian_alps_occupation:0 "Anfrage [ITA.GetAdjective] Beruf"
 SWI_request_italian_alps_occupation_desc:0 "Da ein Teil unseres Landes aus [ITA.GetAdjective] sprechenden Bürgern besteht, können wir nahtlos dazu übergehen, [ITA.GetName] zu verwalten und seine Menschen und Ressourcen zu nutzen, um unsere Bemühungen zur Beendigung dieses Krieges fortzusetzen."
 SWI_request_french_alps_occupation:0 "Anfrage [FRA.GetAdjective] Beruf"
 SWI_request_french_alps_occupation_desc:0 "[FRA.GetNonIdeologyName] hat unser Land seit Generationen begehrt, daher ist es nur angemessen, dass wir nun in der Lage sind, die Kontrolle über ihr Territorium zu übernehmen und es für die Zukunft beider zu verwalten."
 SWI_the_alpine_supremacy:0 "Die alpine Überlegenheit"
 SWI_the_alpine_supremacy_desc:1 "[SWI.GetNonIdeologyName], die sanftmütige und orientierungslose Nation, die im Äther der Diplomatie existierte, gibt es nicht mehr. Wir werden nun als die Alpine Suprematie bekannt sein, um unsere Herrschaft über die Alpen, ihre Menschen und darüber hinaus zu repräsentieren."

 SWI_professionalize_militias:0 "Milizen professionalisieren"
 SWI_professionalize_militias_desc:0 "So wie die Dinge laufen, wird eine einfache Miliz aus Reservisten nicht ausreichen. Wir müssen alle fähigen Soldaten für den bevorstehenden Konflikt ausbilden und sie zu einer gefürchteten Berufsarmee machen."
 SWI_modernize_airforce:0 "Modernisierung der Luftwaffe"
 SWI_modernize_airforce_desc:0 "Es ist mittlerweile klar, dass die moderne Kriegsführung nicht nur durch das definiert wird, was auf dem Schlachtfeld passiert, sondern auch darüber, im offenen Himmel, den wir verteidigen und beherrschen wollen."
 SWI_swiss_airplane_designs:0 "Schweizer Flugzeugdesign"
 SWI_swiss_airplane_designs_desc:0 "Wir können uns nicht auf die Maschinen unserer Nachbarn verlassen, die uns die Beherrschung des Himmels ermöglichen, denn wir können nicht darauf vertrauen, dass sie uns ohne weiteres die Mittel zu ihrer Niederlage liefern."
 SWI_license_axis_plane_designs:0 "Lizenz Axis Plane Designs"
 SWI_license_axis_plane_designs_desc:0 "Der schnellste Weg, uns in die Lüfte zu erheben, besteht darin, Flugzeugentwürfe von faschistischen Nationen zu beschaffen. Nur sie verfügen über die notwendige Kampferfahrung, um Prioritäten zu setzen, die eine Schlacht wirklich gewinnen. Dies wird uns näher an sie heranbringen und sie möglicherweise von einer Invasion abhalten."
 SWI_airspace_surveillance:0 "Luftraumüberwachung"
 SWI_airspace_surveillance_desc:0 "Wenn wir [ROOT.GetName] und seine Berge verteidigen wollen, müssen wir den Himmel im Auge behalten und nach dem Feind Ausschau halten. Neue Werkzeuge ermöglichen es uns, den Feind zu finden und ihn ins Visier unserer Kampfflugzeuge und Flugabwehrgeschütze zu nehmen. "

 SWI_professionalize_militias_TT:2 "Alle Divisionen der §YSwiss Citizen Militia§! werden zu Divisionen der §YSurgulären Infanterie§! und die Entscheidungen der §Y$SWI_military_readiness_decisions_category$§! werden deaktiviert."
 SWI_neutrality_decisions_disabled_TT:0 "Die Entscheidungen §Y$SWI_absolute_neutrality_decisions_category$§! werden deaktiviert."
 SWI_has_fascist_neighbor_trigger_TT:0 "Hat einen passenden faschistischen Nachbarn"

 SWI_crack_down_on_dissent:0 "Hartes Vorgehen gegen Andersdenkende"
 SWI_crack_down_on_dissent_desc:0 "[ROOT.GetNonIdeologyName] kann in Zeiten, in denen ein einziger Riss in unserer Gesellschaft zum Zusammenbruch der [ROOT.GetAdjective]-Regierung führen kann, nicht uneinig sein."
 SWI_military_police:0 "Militärpolizei"
 SWI_military_police_desc:0 "Unsere langjährigen föderalen Institutionen werden nicht ausreichen, um in diesen unsicheren Zeiten die nötige Ordnung aufrechtzuerhalten. Wenn wir unsere Einheit bewahren wollen, brauchen wir Militärpolizei."
 SWI_expand_federal_police_intelligence:0 "Ausbau der bundespolizeilichen Aufklärung"
 SWI_expand_federal_police_intelligence_desc:0 "Der Feind lauert im Schatten und kann jede Gestalt annehmen, auch die unserer eigenen Bevölkerung. Deshalb muss die Geheimdienstabteilung der Bundespolizei über die Mittel verfügen, um jeden Widerstand zu unterdrücken, wo immer er auftritt."
 SWI_martial_law:0 "Kriegsrecht"
 SWI_martial_law_desc:0 "Manche Situationen erfordern ein Skalpell, aber in unserer heutigen Zeit gibt es keins. [ROOT.GetNameDef] braucht einen Hammer, auf den es sich verlassen kann, um unsere Feinde und unsere Bevölkerung unter Kontrolle zu halten."
####### Weapons Industry Sub Branch ####### 
 
 SWI_expand_weapons_industry:0 "Ausbau der Waffenindustrie"
 SWI_expand_weapons_industry_desc:0 "Unsere dürftige militärisch-industrielle Kapazität wird in einem umfassenden Krieg nicht ausreichen. Moderne Konflikte werden von demjenigen gewonnen, dem als Letzter die Munition ausgeht. Deshalb müssen wir dafür sorgen, dass wir Kriegsausrüstung schneller und länger produzieren können."
 SWI_swiss_armored_divisions:0 "Schweizer Panzerdivisionen"
 SWI_swiss_armored_divisions_desc:0 "Historisch gesehen waren wir stolz auf unsere herausragende Infanterie, doch das reicht nicht aus, wenn wir gegen die gepanzerten Kolosse unserer Feinde kämpfen. Wir müssen unsere eigenen mechanisierten Monster erschaffen."
 SWI_alpine_specialization:0 "Alpine Spezialisierung"
 SWI_alpine_specialization_desc:0 "Mehr als jede andere Nation können wir unsere Bergtraditionen pflegen und eine unaufhaltsame Streitmacht ausbilden, die wie keine andere über Berge hinweg verteidigen und angreifen kann. Sie werden die Lawine sein, die den Feind auslöscht."
 SWI_tank_development:0 "Panzerentwicklung"
 SWI_tank_development_desc:0 "Wir dürfen bei der Entwicklung neuer und verbesserter Panzer nicht nachlässig werden, sonst besteht die Gefahr, dass wir Stahl für nutzlose und veraltete Metallschildkröten verschwenden."
 SWI_mechanized_support:0 "Mechanisierte Unterstützung"
 SWI_mechanized_support_desc:0 "Unsere Soldaten müssen schneller als je zuvor zum Schlachtfeld gelangen und die Unterstützung erhalten, die sie benötigen, sonst wäre all die Mühe umsonst."
 SWI_artillery:0 "Schweizer Artillerie"
 SWI_artillery_desc:0 "Lasst die Granaten auf unsere Feinde niederprasseln, während unsere Truppen vorrücken. Die Artillerie ermöglicht es [ROOT.GetNonIdeologyName], sich von den Bergen aus zu verteidigen und auf die effektivste Weise vorzustoßen, um den Gegner unter einem Hagel von Blei zu zermalmen."
 SWI_industrial_production:0 "Industrielle Produktion"
 SWI_industrial_production_desc:0 "Wir können die Heimatfront nicht ignorieren. Jeder fähige Mann in den Kantonen von [ROOT.GetNonIdeologyName] muss bereit sein, sich für unsere Kriegsmaschinerie zu opfern."
 SWI_swiss_heavy_planes:0 "Schweizer Schwerflugzeuge"
 SWI_swiss_heavy_planes_desc:0 "Von unseren Stützpunkten in [ROOT.GetNonIdeologyName] aus können wir Operationen in ferne Länder starten, wenn wir über die für eine solche Reise erforderlichen schweren Flugzeuge verfügen, aber wir müssen sie zuerst entwerfen."
 SWI_air_research:0 "Luftforschung"
 SWI_air_research_desc:0 "Wir sind bereit, die Forschung und Entwicklung neuer Luftfahrttechnologien zu intensivieren, wenn wir mit den Fortschritten des Feindes Schritt halten und schließlich in der Lage sein wollen, den Himmel zu beherrschen."
 SWI_air_production:0 "Luftproduktion"
 SWI_air_production_desc:0 "Die Flugzeugkonstruktionen sind nur der erste Teil des Puzzles. Der nächste Teil besteht darin, genügend Flugzeuge zu produzieren, damit unsere Piloten immer in der Luft sind, um unsere Feinde zu Land und in der Luft zu bekämpfen."
 SWI_mountaneer_paratroopers:0 "Gebirgsjäger-Fallschirmjäger"
 SWI_mountaneer_paratroopers_desc:0 "[ROOT.GetNonIdeologyName] ist weltweit für seine imposanten Gipfel bekannt, und viele unserer Bevölkerung nennen die Berge ihre Heimat. Wir können diesen Vorteil nutzen, um einen überlegenen Kader an Fallschirmjägern auszubilden, eine Truppe, die aus fremden Himmeln herabsteigen und fremde Berge zum Ruhm von [ROOT.GetNameDef] erobern kann."

####### Allied/Aggrocratic ####### 
 
 SWI_purchase_american_planes:1 "[SWI_kauf_demokratische_flugzeuge_titel]"
 SWI_purchase_american_planes_usa:0 "Kaufen Sie amerikanische Flugzeuge"
 SWI_purchase_american_planes_other:0 "Kaufen Sie Flugzeuge von Democratic Nation"
 SWI_purchase_american_planes_desc:0 "Unserer Luftwaffe fehlt es an der nötigen Stärke und Technologie, um uns wirksam zu verteidigen. Daher müssen wir uns anderweitig um die Beschaffung unserer Ausrüstung kümmern. [SWI_purchase_american_planes_second_paragraph]"
 SWI_american_planes_desc_usa:0 "Wenn wir Flugzeuge aus einem anderen Land kaufen wollen, ist [USA.GetNameDef] mit seiner demokratischen Tradition, relativen Neutralität und herausragenden Luftfahrttechnik der ideale Kandidat."
 SWI_american_planes_desc_other:0 "Da wir unsere demokratischen Werte nicht für ein paar Flugzeuge kompromittieren können, ist es wichtig, dass wir die Ausrüstung aus einer anderen Demokratie beziehen, und [?SWI.SWI_best_dem_ally.GetNameDef] scheint die beste Wahl zu sein. "
 SWI_allied_gold:0 "Allied Gold"
 SWI_allied_gold_desc:0 "Der Strudel und die Sanktionen, die die aktuelle Lage prägen, haben den Goldhandel eingeschränkt und erschwert, doch mit unserer neutralen Haltung können wir die Möglichkeit für eine Ausweitung des Goldhandels mit anderen demokratischen Nationen eröffnen und so die demokratischen Volkswirtschaften stützen, um den Faschismus in Schach zu halten."
 SWI_closer_democratic_ties:0 "Engere demokratische Bindungen"
 SWI_closer_democratic_ties_desc:0 "Die Autokratie wirft ihren Schatten über Europa. Wir sind vielleicht nicht in der Lage, uns selbst zu verteidigen, aber durch die Zusammenarbeit mit anderen demokratischen Nationen können wir ihren Vormarsch möglicherweise stoppen. Der erste Schritt besteht darin, engere Beziehungen zu ihnen anzustreben und ihnen zu beweisen, dass wir zur Sache beitragen können."
 SWI_connect_to_the_maginot_line:0 "Anschluss an die Maginot-Linie"
 SWI_connect_to_the_maginot_line_desc:0 "Der Kriegswind weht in Richtung [FRA.GetName], und es besteht eine gute Chance, dass ihre Feinde die sogenannte Masginot-Linie angreifen müssen. Dies bringt uns in eine gefährliche Lage, da [?SWI.SWI_biggest_fascist.GetNonIdeologyName] versucht sein könnte, dies durch eine Invasion zu umgehen. Deshalb müssen wir uns mit [FRA.GetName] abstimmen und eine gemeinsame Front bilden."
 SWI_american_industrial_investments:0 "Amerikanische Industrieinvestitionen"
 SWI_american_industrial_investments_desc:0 "Der Erste Weltkrieg hat deutlich gemacht, dass die Industriemacht der USA jedes Blatt zu ihren Gunsten wenden kann. Wenn wir auf sie zugehen und es schaffen, ihre Industrieinvestitionen zu sichern, können wir unsere eigene Position stärken und sicherstellen, dass die Verteidigung unserer Unabhängigkeit in ihrem besten Interesse liegt."
 SWI_take_a_stance:0 "Nehmen Sie Stellung"
 SWI_take_a_stance_desc:0 "Der Faschist [?SWI_biggest_fascist.GetNonIdeologyName] besitzt das widerlichste und erbärmlichste politische System. [?SWI_biggest_fascist.GetNameDefCap] ist der Todfeind des neuen [ROOT.GetName]; deshalb müssen wir Stellung beziehen und unsere Demokratie mit allen Mitteln verteidigen."
 SWI_join_france:0 "Schließen Sie sich Frankreich an"
 SWI_join_france_desc:0 "Obwohl es nicht immer eine freundschaftliche Beziehung war, teilen [ROOT.GetName] und [FRA.GetName] dieselben demokratischen Werte und sogar eine Sprache. Wenn wir uns also im kommenden Konflikt für eine Seite entscheiden müssten, wäre ihr Schutz eindeutig wünschenswerter als die Alternative."
 SWI_the_second_helvetic_republic:0 "Die Zweite Helvetische Republik"
 SWI_the_second_helvetic_republic_desc:0 "Im Jahr 1798 eroberte der berüchtigte Diktator Napoleon Bonaparte [ROOT.GetName] und gründete die Helvetische Republik, um unser Volk zu unterdrücken. Zum Glück sind diese Zeiten vorbei, und wir können sicher sein, dass wir beim zweiten Mal eine gerechtere Union mit unserem langjährigen Nachbarn erwarten können."
 SWI_alpine_aspirations:0 "Alpine Ambitionen"
 SWI_alpine_aspirations_desc:0 "Die Zentralregierung von [ROOT.GetNonIdeologyName] hat sich erweitert und zur Helvetischen Republik entwickelt. Wir verfügen nun über die Ressourcen, um ein größeres Gebiet zu verwalten. Wir sollten [FRA.GetNameDef] bitten, unsere Kontrollzone zu erweitern, damit wir der Vereinigung der Alpen unter einer gemeinsamen Flagge näher kommen."
 SWI_support_allied_espionage:0 "Unterstützen Sie die alliierte Spionage"
 SWI_support_allied_espionage_desc:0 "Die Tatsache, dass wir eine neutrale Außenpolitik verfolgen, hindert uns nicht daran, andere demokratische Nationen bei ihren Bemühungen zur Unterdrückung des Faschismus in Europa subversiv zu unterstützen. Tatsächlich machen uns unsere Neutralität und unsere Nähe zu [?SWI.SWI_biggest_fascist.GetNameDef] im internationalen Kampf gegen den Faschismus unverzichtbar."
 SWI_expand_spy_networks:0 "Spionagenetzwerke erweitern"
 SWI_expand_spy_networks_desc:0 "Der Feind ist da draußen. Wir müssen unsere Grenzen und die Heimatfront verteidigen, bevor die Gefahr eintrifft. Unsere Spionagenetzwerke können die Basis einer Verteidigung bilden, die von außen neutral und harmlos wirkt."
 SWI_share_spy_networks:0 "Spionagenetzwerke teilen"
 SWI_share_spy_networks_desc:0 "[?SWI.SWI_best_dem_ally.GetNameDefCap]s Ziel ist dasselbe wie unseres: den Faschismus in Schach zu halten, und wir müssen [?SWI.SWI_biggest_fascist.GetNameDef] nicht verärgern, um dieses Ziel zu erreichen. [ROOT.GEtName] hat Zugang zu erfahrenen Agenten, die sich in [GER.GetAdjective], [ITA.GetAdjective] und [FRA.GetAdjective] Gesellschaften einfügen können. Wir können [?SWI.SWI_best_dem_ally.GetNonIdeologyName] diesen Vorteil verschaffen."
 SWI_secret_pact_with_the_allies:0 "Geheimpakt mit den Alliierten"
 SWI_secret_pact_with_the_allies_desc:0 "[ROOT.GetName] ist nicht bereit für einen offenen Krieg oder gar für den offenen Beitritt zu einer Fraktion, aber wir können sicher sein, dass wir ohne Freunde nicht sicher sind. Um unsere Demokratie im Falle einer Überraschungsinvasion zu verteidigen, können wir uns heimlich mit [?SWI.SWI_best_dem_ally.GetNameDef] treffen und eine Vereinbarung treffen. Wir versprechen ihnen, sie heimlich bei den Kriegsvorbereitungen zu unterstützen. Im Gegenzug werden sie uns im Falle eines Angriffs beschützen."
 SWI_oasis_of_democracy:0 "Oase der Demokratie"
 SWI_oasis_of_democracy_desc:0 "Die Feinde der Demokratie umringen [ROOT.GetName], daher müssen wir in diesen turbulenten Zeiten unseren Werten treu bleiben. [ROOT.GetName] und seine Demokratie sind untrennbar miteinander verbunden. Daher hat es keinen Sinn, als Land zu überleben, wenn unsere Demokratie zu ihrer Verteidigung zugrunde geht."
 SWI_oasis_of_democracy_tt:1 "Wenn der Fokus §Y$SWI_axis_gold$§! abgeschlossen ist und mindestens §Y1§! das faschistische Land den Geist §Y$SWI_gold_trade$§! hat:"
 SWI_volunteer_force:0 "Freiwilligentruppe"
 SWI_volunteer_force_desc:0 "Wir befinden uns noch nicht im Krieg, aber das [ROOT.GetAdjective]-Volk ist bereit, für die Demokratie zu kämpfen. Wir dürfen nicht als Neutralitätsbrecher gelten, aber als Demokratie können wir nicht kontrollieren, wohin unser Volk geht und wo es kämpft. Daher können wir stillschweigend dazu ermutigen, gegen die Tyrannei zu den Waffen zu greifen, damit sich der Rest von [ROOT.GetName] offen an den Bemühungen beteiligt."
 SWI_export_saboteurs:0 "Exportsaboteure"
 SWI_export_saboteurs_desc:0 "Wir müssen nicht in den Krieg ziehen, wenn wir unsere Feinde von innen heraus vernichten können. Unser Geheimdienst kann seine Operationen verfeinern und sich auf die Agitation und Stärkung des Widerstands in den von den Unterdrückern besetzten Gebieten spezialisieren und so ihre Macht langsam schwächen."
 SWI_lay_the_groundwork:0 "Legen Sie den Grundstein"
 SWI_lay_the_groundwork_desc:0 "Um für einen umfassenden Krieg gerüstet zu sein, benötigen wir zunächst eine solide Basis. Die Infrastruktur und die Verkehrsnetze von [ROOT.GetName] müssen verbessert und modernisiert werden. Nur dann können unsere Bürger effizient an die Front mobilisiert werden."
 SWI_arsenal_of_the_alps:0 "Arsenal der Alpen"
 SWI_arsenal_of_the_alps_desc:0 "Ihre steilen Gipfel, die starke Befestigung, die wir an ihnen vorgenommen haben, und unsere Kenntnis des Geländes machen die Alpen zum idealen Ort, um unsere militärischen Kapazitäten drastisch zu erhöhen und sie beizubehalten, falls wir uns zurückziehen müssen."
 SWI_thunder_in_the_valleys:0 "Donner in den Tälern"
 SWI_thunder_in_the_valleys_desc:0 "In den Bergen, die wir gewohnt sind, hat Panzerkrieg keinen Platz. Wenn wir jedoch in die Offensive gehen und unsere Feinde angreifen wollen, bevor sie uns erreichen können, müssen wir schnell aufholen und unsere eigenen Fahrzeuge entwickeln."
 SWI_fighting_for_the_hills:0 "Kampf um die Hügel"
 SWI_fighting_for_the_hills_desc:0 "Letztendlich ist die Infanterie das vielseitigste Element unserer Streitkräfte. Und obwohl [ROOT.GetNonIdeologyName] immer stolz auf seine Infanterie war, haben wir seit fast einem Jahrhundert keinen Krieg mehr geführt. Daher ist es von größter Bedeutung, unsere Infanterietechnologie und -doktrinen zu überdenken."
 SWI_fly_over_the_mountains:0 "Fliegen Sie über die Berge"
 SWI_weapons_of_democracy:0 "Waffen der Demokratie"
 SWI_weapons_of_democracy_desc:0 "Bevor der Feind das Undenkbare tut, müssen wir bereit sein, das Notwendige zu tun, um ihn aufzuhalten, selbst wenn das den wahllosen Einsatz von Massenvernichtungswaffen bedeutet, die unseren Feinden die Hölle heiß machen können. Das wird ihn sicherlich von weiteren Gräueltaten abhalten."
 SWI_jump_into_action:0 "Springen Sie in Aktion"
 SWI_jump_into_action_desc:0 "Noch vor zehn Jahren wäre dies undenkbar gewesen, doch [ROOT.GetNameDef] hat alle Vorbereitungen getroffen, um sich aktiv und offen an den Kriegsanstrengungen zu beteiligen. Wir haben unsere Infrastruktur, Industrie und wissenschaftlichen Einrichtungen auf einen umfassenden Konflikt vorbereitet, wie wir ihn noch nie erlebt haben. Die [ROOT.GetAdjective] Kriegsmaschinerie brummt und ist bereit, in Aktion zu treten."
 SWI_exiled_government:0 "Exilregierung"
 SWI_exiled_government_desc:0 "Trotz aller Bemühungen ist es uns offenbar nicht gelungen, unser Heimatland zu verteidigen. Uns bleibt also keine andere Wahl, als aus der Ferne um seine Rückeroberung zu kämpfen. Die [ROOT.GetAdjective] demokratischen Werte haben unserem Land so langes Gedeihen ermöglicht und werden uns dabei als Leitstern dienen. Schließlich wird [ROOT.GetName] nicht durch sein Territorium oder die Sprache seiner Bewohner definiert, sondern durch unseren gegenseitigen Respekt und unsere Unterstützung."
 SWI_join_the_allies:1 "Treten Sie der Allianz bei"
 SWI_join_the_allies_desc:0 "Die materiellen Opfer und moralischen Kompromisse, die die Wahrung unserer Neutralität erfordert, werden unerträglich. Für Neutralität ist kein Platz mehr, insbesondere angesichts der aktuellen politischen Lage Europas. Trotz ihrer Versäumnisse sind die Verbündeten unsere beste Option, wenn wir unser Land und unsere Konföderation bewahren wollen. Dies ist wahrlich eine Zeit wie keine andere."
 
 SWI_gotthardbund_party_name:0 "Gotthardbund"
 SWI_gotthardbund_party_name_long:0 "Gotthardbund"
   

 SWI_the_alpine_confederation:0 "Der Alpenbund"
 SWI_the_alpine_confederation_desc:0 "Unser grosses Land hat seine historischen Grenzen überschritten. Die neuen Kantone unter unserer Schirmherrschaft erhalten zwar den gleichen Status wie Schwyz, doch müssen wir unsere neue Stellung als Hüter der Alpen anerkennen. Eine neue demokratische Macht entsteht: Der Alpenbund!"
 SWI_the_alpine_confederation_chance_TT:0 "\nDie Wahrscheinlichkeit, dass sie uns die Unabhängigkeit gewähren, wird aufgrund der §YGröße§! unserer Streitkräfte größer sein, und es erhöht auch unsere Chancen, dass sie uns neben ihrer §YMeinung§! über uns auch weitere Alpengebiete zusprechen."
 SWI_gotthard_union:0 "Gotthardbund"
 SWI_gotthard_union_desc:0 "Die Zeit des Gezänks und der Fraktionsbildung ist vorbei. Es ist Zeit für [ROOT.GetNonIdeologyName], sich unter einer einzigen Demokratie zu vereinen, mit der uneingeschränkten Autorität, umfassende Maßnahmen zu ergreifen. Alles im Namen des Überlebens unserer [ROOT.GetAdjective] Traditionen und Werte. Wir werden Widerstand leisten und siegen!"
 SWI_press_for_vorarlberg:0 "Presse für Vorarlberg"
 SWI_press_for_vorarlberg_desc:0 "Da die [AUS.GetAdjective]-Regierung weiterhin in Trümmern liegt, müssen wir den demokratischen Willen von [848.GetName] erfüllen, der in ihrem Referendum von 1919 zum Ausdruck kam, und sie in unsere Demokratie integrieren. Es ist die Pflicht von [ROOT.GetNameDef], sie vor Faschismus und Autokratie zu schützen."
 SWI_pre_empt_anschluss:0 "Preempt Anschluss"
 SWI_pre_empt_anschluss_desc:0 "Es gibt Gerüchte, dass [GER.GetNameDef] [AUS.GetName] im Namen der [GER.GetAdjective] Einheit annektieren will. Das kann [ROOT.GetNAmeDef] nicht zulassen, da es [GER.GetNameDef] ermächtigen würde, dieselben Ansprüche auf unsere deutschsprachigen Kantone zu erheben. Wir müssen uns beeilen und die Voraussetzungen für die Verteidigung von ganz [AUS.GetName] schaffen."
 SWI_pre_empt_anschluss_tt:1 "§YSollte [AUS.GetNameDef] akzeptieren, dass wir Kerne in ihren Kernstaaten erhalten§! \n\nDie Wahrscheinlichkeit einer Annahme wird aufgrund der §YGröße§! unserer Streitkräfte, ihrer §YMeinung§! zu uns und ob §Y[GER.GetNameDef] bereit ist§!, [AUS.GetName] zu annektieren, höher sein."
 SWI_demand_italian_alps:0 "Nachfrage Italienische Alpen"
 SWI_demand_italian_alps_desc:0 "Jahrzehntelang hat [ITA.GetName] schamlos Anspruch auf unsere [ITA.GetAdjective] sprechenden Kantone erhoben. Wenn ihnen das gelingt, können wir natürlich auch verlangen, dass sich ihre Alpen unserem demokratischen Regime anschließen, denn schließlich gehören sie genauso zu [ROOT.GetNameDef] wie das Tessin zu [ITA.GetNameDef]."
 SWI_demand_french_alps:0 "Nachfrage Französische Alpen"
 SWI_demand_french_alps_desc:0 "Es ist nur eine Frage der Zeit, bis [FRA.GetNameDef] unter dem inneren und äußeren Druck zusammenbricht. Wir müssen bei der Verteidigung der Alpen proaktiv vorgehen, sonst könnte ein gefährlicher Feind die Kontrolle über verteidigungsfähige Stellungen übernehmen, die als Ausgangspunkt für eine Invasion unseres Territoriums dienen könnten."
 SWI_alpine_redoubt:0 "Alpenschanze"
 SWI_alpine_redoubt_desc:0 "Solange wir uns auf befestigtes Gelände zurückziehen können, sind wir eine unaufhaltsame Macht gegen Eindringlinge. Wir müssen die Alpen noch uneinnehmbarer machen und unseren Einfluss von dort aus ausweiten. Nur dann können wir Abstand zwischen uns und dem Feind bringen, wo immer er auch sein mag."
 SWI_the_alpine_protectorate:0 "Das Alpenprotektorat"
 SWI_the_alpine_protectorate_desc:0 "Nie zuvor waren die Alpen unter einer einheitlichen Herrschaft vereint – bis heute. Mit vereinten Kräften können wir uns gegen jede Bedrohung verteidigen und diese Verteidigung über die Alpen hinaus ausdehnen. Unsere Gipfel bilden eine uneinnehmbare Zitadelle, von der aus unsere Herrschaft niemals ins Wanken geraten wird. "
 SWI_bring_democracy_to_germany:0 "Demokratie nach Deutschland bringen"
 SWI_bring_democracy_to_germany_desc:0 "Das Dritte Reich ist so weit von Demokratie entfernt, wie es nur sein kann. Die Weimarer Republik davor war lediglich eine Geisel der Siegermächte des Ersten Weltkriegs, und das kriegstreiberische Regime des alten [GER.GetNonIdeologyName] war nur ein Gefäß für die gierigen Ambitionen der Kaiser. Es ist an der Zeit, dass unsere Nachbarn im Norden wissen, was Demokratie bedeutet."
 SWI_liberate_italy:0 "Befreie Italien"
 SWI_liberate_italy_desc:0 "Im Laufe der Jahrhunderte hat [ROOT.GetNonIdeologyName] miterlebt, wie die kleinen Stadtstaaten und Königreiche im Süden gegeneinander kämpften und schließlich in einer schwachen Monarchie aufgingen. Es ist nur richtig, dass [ITA.GetNonIdeologyName] von ihrem älteren Geschwister aus den Fesseln der Autokratie und des Faschismus befreit wird."
 SWI_take_over_france:0 "Schützen Sie Frankreich"
 SWI_take_over_france_desc:0 "[FRA.GetNonIdeologyName] war schon immer eine wankelmütige Nation mit häufigen Umwälzungen, bei denen ein Münzwurf darüber entscheidet, ob das Ergebnis der Revolution des Tages eine schwache Demokratie oder ein militaristisches Regime ist. Unter [ROOT.GetAdjective] Schutz konnte das [FRA.GetAdjective] Volk gedeihen, regiert von unserer demokratischen Stabilität."
 SWI_the_new_eidgenossenschaft:0 "Die Neue Eidgenossenschaft"
 SWI_the_new_eidgenossenschaft_desc:1 "Im 13. Jahrhundert schworen die Führer der drei Gründerkantone einen Eid auf ewige Verbundenheit, die sogenannte Eidgenossenschaft. Nun ist es an der Zeit, diese zu erneuern, damit wir sie ausweiten und mehr Kantone unsere demokratische Konföderation erleben können."
 SWI_expand_the_confederation:0 "Erweitern Sie die Konföderation"
 SWI_expand_the_confederation_desc:0 "Kein Land ist vor dem raschen Vormarsch des Totalitarismus sicher. Viele Regionen in den umliegenden Ländern können vom Schutz profitieren, den unsere Tradition der Neutralität bietet, und im Falle eines Kriegsausbruchs von unseren beeindruckenden Verteidigungsfähigkeiten."
 SWI_empower_the_council:0 "Stärkung des Rates"
 SWI_empower_the_council_desc:0 "Die Gefahr lauert überall um uns herum, und wenn sie uns trifft, sind wir machtlos. Wenn wir anfangen, uns untereinander zu streiten, werden unsere Feinde [ROOT.GetName] von der Landkarte tilgen. Eine starke Zentralregierung ist in diesen unberechenbaren Zeiten sicherlich der einzige Weg."
 SWI_switzerland_on_the_offense:0 "Die Schweiz in der Offensive"
 SWI_switzerland_on_the_offense_desc:0 "Wir können nicht auf unseren Bergen ruhen und auf einen Angriff warten. Wir müssen die Initiative ergreifen und unseren Feinden den Kampf ansagen, bevor sie uns überfallen können. Nur dann können wir sicher sein, dass das Überleben von [ROOT.GetNameDef] gesichert ist. Schließlich ist die beste Verteidigung ein starker Angriff."
 SWI_neutral_entente:0 "Die neutrale Entente"
 SWI_neutral_entente_desc:0 "Wir sind nicht die einzige neutrale Nation auf der Welt. Angesichts der Gefahr von Kriegen und der Gefahr, dass kriegführende Mächte unseren Wunsch, uns aus ihren Konflikten herauszuhalten, verletzen, müssen wir sie weiter abschrecken. Wir müssen die gegenseitige Hilfe aller anderen neutralen Nationen suchen, denn Krieg gegen eine neutrale Nation bedeutet Krieg gegen alle Neutralen."
 SWI_plains_warfare:0 "Ebenenkrieg"
 SWI_plains_warfare_desc:0 "[ROOT.GetName] hatte reichlich Gelegenheit, in Tälern, Bergen, Hügeln und Wäldern zu trainieren, aber wenn wir in fremden Ländern kämpfen wollen, müssen wir uns an moderne Kriegsdoktrinen anpassen. Wir haben gesehen, wie schnell sich bewegende mechanisierte Infanterie die Verteidigung schockieren und einen schnellen Sieg erringen kann. Daraus können wir lernen und die [ROOT.GetAdjective]-Armee ins 20. Jahrhundert führen."
 SWI_multipurpose_tanks:0 "Mehrzwecktanks"
 SWI_multipurpose_tanks_desc:0 "Wie die vielseitigen Multifunktionsmesser, die wir unserer Infanterie zur Verfügung stellen, benötigen wir Maschinen, die jede Lücke schließen und alle für unsere Kriegsanstrengungen erforderlichen Aufgaben erfüllen können. Wir müssen in Sachen Panzerkriegsführung aufholen und benötigen daher eine breite Palette an Entwicklungen, um über eine umfassende Streitmacht zu verfügen."
 SWI_rolling_fortresses:0 "Rollende Festungen"
 SWI_rolling_fortresses_desc:0 "Unsere Panzer können Teil unserer aktuellen Verteidigungsdoktrin sein und stellen somit eine vorgeschobene Stellung der Festungen dar, die unsere Berge verteidigen. Wenn der Feind unsere befestigten Frontlinien nicht durchbrechen kann, wird er unsere Kantone niemals erreichen können."
 SWI_extended_supply_lines:0 "Erweiterte Versorgungsleitungen"
 SWI_extended_supply_lines_desc:0 "In einer Welt schneller Offensiven und langwieriger Operationen ist die Versorgungslogistik wichtiger denn je. Je weiter wir uns bei unseren Bemühungen von unseren Kantonen entfernen, desto größer wird der Bedarf an neuen und besseren Versorgungslinien. Wir müssen lernen, unsere Logistik zu verbessern, um unsere Versorgungslinien weiter auszudehnen und schneller neue zu bauen."
 SWI_dissolve_the_federal_council:0 "Auflösung des Bundesrates"
 SWI_president_for_life:0 "Präsident auf Lebenszeit"
 SWI_president_for_life_desc:0 "Der Bundesrat ist unter den europäischen Ländern einzigartig. Er hat [ROOT.GetNonIdeologyName] in Friedenszeiten gute Dienste geleistet. Doch jetzt, da klar ist, dass [?SWI.SWI_confederation_president.GetName] den Rat und das Land als Ganzes führt, gibt es gute Argumente dafür, die Herrschaft von [?SWI.SWI_confederation_president.GetHerHis] auf unbestimmte Zeit fortzusetzen, als Säule der Stabilität in [ROOT.GetNameDef]. "
 SWI_guisans_coup:0 "Guisans Coup"
 SWI_guisans_coup_desc:0 "[?SWI.SWI_confederation_president.GetName] hat unser großes und friedliches Land in Krieg und Elend geführt. Dies ist nicht das [ROOT.GetNonIdeologyName], das wir kennen und lieben. Es wurde im Namen der Selbsterhaltung korrumpiert. Es gibt nur einen Mann, der populär und fähig genug ist, diesen Krieg ein für alle Mal zu beenden und diese einst neutrale Nation hoffentlich zu ihren Wurzeln zurückzuführen: Henri Guisan."
 SWI_return_to_the_old_switzerland:0 "Rückkehr in die alte Schweiz"
 SWI_return_to_the_old_switzerland_desc:0 "Jetzt, da der Krieg zu Ende geht, können wir endlich Schritte unternehmen, um [ROOT.GetNonIdeologyName] wieder zu dem zu machen, was es einmal war: eine demokratische und neutrale Nation, die auf den Prinzipien gegenseitigen Respekts und Selbstbestimmung gründet. Sobald der Krieg vorbei ist, werden wir endlich in der Lage sein, Demokratie und Neutralität um uns herum durchzusetzen."
 SWI_a_swiss_navy:0 "Eine Schweizer Marine"
 SWI_a_swiss_navy_desc:0 "Zum ersten Mal in der Geschichte von [ROOT.GetAdjective] verfügen wir über eine Küste. Das bedeutet, dass wir sie für den Seekrieg nutzen können, aber auch, dass wir nun eine neue Front zu verteidigen haben. Wir müssen unsere Anstrengungen verstärken, um eine Marine für [ROOT.GetName] aufzubauen."
 SWI_buy_foreign_surplus_ships:0 "Kaufen Sie ausländische Überschussschiffe"
 SWI_buy_foreign_surplus_ships_desc:0 "Was für das eine Land Überschuss ist, ist für das andere die Marine. Viele der großen Seemächte der Welt verfügen mittlerweile über Flotten voller brandneuer Schiffe. Das bedeutet, dass alte Schiffe nahezu veraltet sind und dennoch hohe Unterhaltskosten verursachen. Wenn wir unsere Seemacht schnell ausbauen wollen, gibt es keinen besseren Weg, als ihnen nicht mehr benötigte Schiffe abzukaufen."
 SWI_swiss_ship_designs:0 "Schweizer Schiffsdesigns"
 SWI_swiss_ship_designs_desc:0 "Wir haben vielleicht nicht viel Erfahrung mit der Konstruktion und Herstellung seetüchtiger Kriegsschiffe, aber je früher wir beginnen, desto eher können wir uns neben alten und großen Seemächten wie [ENG.GetNameDef] und [ITA.GetName] behaupten."
 SWI_submarine_raiders:0 "U-Boot-Räuber"
 SWI_submarine_raiders_desc:0 "Lassen wir die alten Seemächte ihre gewaltigen Stahlkisten. Während sie auf See mit roher Gewalt kämpfen, werden wir unter Wasser mit List und List mit unseren U-Booten kämpfen und ihre alte und marode Seemacht schwächen."
 SWI_floating_fortresses:0 "Schwimmende Festungen"
 SWI_floating_fortresses_desc:0 "Wir wissen, wie man Festungen zur Verteidigung unserer Berge und Täler baut. Da wir nun eine Küste haben, ist es von größter Bedeutung, diese bis ins Meer auszudehnen. Unsere Schiffe werden unzerstörbar sein."
 SWI_naval_industry:0 "Schiffsindustrie"
 SWI_naval_industry_desc:0 "Auch wenn die neu erworbene Küstenlinie noch Reste einer Marineindustrie aufweist, müssen wir uns beeilen, diese umfassend auszubauen und sie zu einem zusammenhängenden Rahmen für die Produktion und Instandhaltung zu machen, der einer wirklich schlagkräftigen Schweizer Marine würdig ist."
 SWI_naval_industry_tt:0 "Fügt in jedem Küstenstaat einen §G1§!-Gebäudeplatz und eine §Y1-Marinewerft§! hinzu. (Max. 10)"
 SWI_build_naval_bases:0 "Bauen Sie Marinestützpunkte"
 SWI_build_naval_bases_desc:0 "Die von uns eroberten Stützpunkte reichen nicht aus, und wir können nicht schnell genug neue errichten, um unseren Bedarf zu decken. Um unsere Marineziele zu erreichen, sind neue Anstrengungen erforderlich."
 SWI_build_naval_bases_tt:0 "Fügt jedem bestehenden §YNaval base§! einen §Y2 Naval base§! hinzu. (Max. 15)"
 SWI_train_navy_staff:0 "Zug des Marinepersonals"
 SWI_protect_liechtenstein:0 "Protect Liechtenstein"
 SWI_protect_liechtenstein_desc:0 "Eingezwängt zwischen drei unserer Kantone muss das kleine Fürstentum Liechtenstein geschützt werden, um seine Bevölkerung zu schützen. Schließlich hätte es gegen keine fremde Armee, auch nicht gegen unsere, eine Chance. Wir können unsere Hilfe anbieten, indem wir sein Gebiet besetzen, es kann sich unserem Eid anschließen und unser neuester Kanton werden."
 SWI_train_navy_staff_desc:0 "Eine Marineinfrastruktur besteht nicht nur aus Stahl und Beton, sie erfordert auch Männer und Frauen mit dem Mut und der Ausbildung, um auf den Meeren und Ozeanen zum Sieg zu führen. "



 SWI_reduce_militia_activation_time_TT:1 "Die Zeit zur vollständigen Mobilisierung unserer §YCitizen Milizen§! wird um §G$RIGHT|0$§! Tag verkürzt"
 SWI_generic_fascist_neighbor_cap:0 "Unser faschistischer Nachbar"
 SWI_generic_fascist_neighbor:0 "unser faschistischer Nachbar"
 SWI_secret_pact_with_allies_TT:0 "Wenn wir in einen Krieg geraten, schließen wir uns sofort ihrer Fraktion an."
 SWI_neutral_entente_faction:0 "Neutrale Entente"
 SWI_militias_turned_into_regulars:0 "Bürgermilizen wurden professionalisiert"
 SWI_old_switzerland_TT:0 "\n§YSobald der Krieg vorbei ist:§!\n"
 SWI_viable_fascist_in_europe:0 "Eine lebensfähige europäische „faschistische Nation“ existiert"
 
 # Horn of Africa
 HOA_develop_capitalstate:0 "Entwickeln Sie [Root.Capital.GetName]"
 HOA_develop_capitalstate_desc:0 "Wir müssen das Tempo der Industrialisierung zum Wohle unserer Bevölkerung und zum Schutz von [ROOT.GetNameDef] erhöhen. Daher werden wir in die Gegend um [ROOT.Capital.GetCapitalVictoryPointName] investieren und sie zum industriellen Kernland der Nation machen."
 HOA_the_state_bank_of_name:0 "Die Staatsbank von [ROOT.GetNameDef]"
 HOA_the_state_bank_of_name_desc:0 "Indem wir die Ressourcen der Zentralbank von [ROOT.GetNameDef] erweitern, können wir den Menschen eine neue Kreditlinie geben und als finanzielles Diuretikum für die angeschlagene [ROOT.GetAdjective] Wirtschaft wirken."
 HOA_pave_the_roads:0 "Pflastern Sie die Straßen"
 HOA_pave_the_roads_desc:0 "Der Transport von Personen und Gütern über [ROOT.GetNameDef] ist derzeit zu ineffizient. Investitionen in unsere Straßen würden nicht nur der Wirtschaft zugutekommen, sondern auch unsere Sicherheit erhöhen, da sie den Transport militärischer Güter erleichtern würden."
 HOA_the_steam_locomotive:0 "Die Dampflokomotive"
 HOA_the_steam_locomotive_desc:0 "Während Autos und Lkw für den Transport kurzer Distanzen oder kleiner Mengen nützlich sind, sind Züge für den Transport großer Mengen an Gütern und Personen weitaus effizienter. Investitionen in unser Schienennetz würden die Wirtschaft unseres Landes erheblich stärken."
 HOA_the_adjective_regional_development_fund:0 "Der [ROOT.GetAdjective] Regionale Entwicklungsfonds"
 HOA_state_owned_industry_tt:0 "Ändern Sie §Y$ETH_state_development_dynamic_modifier$§! um:\n$MODIFIER_STATE_PRODUCTION_SPEED_BUILDINGS_FACTOR$: §G+15%§!\n$MODIFIER_LOCAL_BUILDING_SLOTS$: §G+15%§!"
 HOA_the_adjective_regional_development_fund_desc:0 "Die Regionen von [ROOT.GetNameDef] stagnieren und benötigen dringend Investitionen. Durch die Schaffung eines regionalen Entwicklungsfonds können wir sicherstellen, dass die lokalen Regierungen über die notwendigen Instrumente zur Modernisierung ihrer Regionen verfügen."
 HOA_the_adjective_industrial_fund:0 "Der [ROOT.GetAdjective] Industriefonds"
 HOA_the_adjective_industrial_fund_desc:0 "[ROOT.GetNameDefCap] ist beklagenswert unterindustrialisiert. Wenn wir das Leben der Menschen verbessern und sie vor ausländischen Angriffen schützen wollen, müssen wir das Land rasch industrialisieren."
 HOA_exploit_national_resources:0 "Nationale Ressourcen ausschöpfen"
 HOA_exploit_national_resources_desc:0 "[ROOT.GetNameDefCap] verfügt über eine Fülle natürlicher Ressourcen, die nur darauf warten, erschlossen zu werden. Mit ein wenig Investition könnten wir endlich mit der Ausbeutung beginnen."
 HOA_support_the_agrarians:0 "Unterstützen Sie die Agrarier"
 HOA_support_the_agrarians_desc:0 "Die in der Landwirtschaft tätige Landbevölkerung von [ROOT.GetNameDef] bildet das Rückgrat der Nation. Daher sollten wir sie bei ihrer wichtigen Arbeit stärker unterstützen."
 HOA_support_the_agrarians_tt:0 "Ändern Sie §Y$ETH_state_development_dynamic_modifier$§! um:\n$MODIFIER_STATE_PRODUCTION_SPEED_BUILDINGS_FACTOR$: §G+10%§!\n$MODIFIER_LOCAL_BUILDING_SLOTS$: §G+10%§!"
 HOA_promote_local_crafts:0 "Förderung des lokalen Kunsthandwerks"
 HOA_promote_local_crafts_desc:0 "[ROOT.GetNameDefCap] verfügt über eine Vielzahl qualifizierter Handwerker, die in kleinem Maßstab arbeiten und die Nation mit Gütern versorgen. Wir sollten auf ihr Fachwissen aufbauen und ihnen die Ausweitung ihrer Betriebe und der Produktion dieser Güter erleichtern."
 HOA_use_the_natural_harbors:0 "Nutzen Sie die natürlichen Häfen"
 HOA_use_the_natural_harbors_desc:0 "Mit dem kürzlich erfolgten Erwerb von Küstenland haben wir die Möglichkeit, unseren Zugang zum internationalen Markt durch die Errichtung eines eigenen Hafens deutlich zu verbessern. Dies wird den Import und Export von Waren erheblich erleichtern und unserer Wirtschaft enorm zugutekommen."
 HOA_the_capital_city_airport:0 "Der Flughafen [Root.Capital.GetCapitalVictoryPointName]"
 HOA_the_capital_city_airport_desc:0 "Der Luftverkehr verbindet die Städte der Welt zunehmend mit der globalen Wirtschaft. Wir sollten einen eigenen Flughafen errichten, um von diesem Trend zu profitieren."
 HOA_a_steamboat_fleet:0 "Eine Dampfschiffflotte"
 HOA_a_steamboat_fleet_desc:0 "Um unsere Küsten und Schifffahrtswege zu verteidigen, müssen wir eine Flotte von Küstenschiffen aufbauen, die in der Lage ist, jede ausländische Aggression abzuwehren."
 HOA_improved_irrigation_systems:0 "Verbesserte Bewässerungssysteme"
 HOA_improved_irrigation_systems_desc:0 "Ohne eine solide Nahrungsmittelproduktion ist die nationale Sicherheit nicht möglich. Um die Ernteerträge zu steigern, werden wir in ein umfangreiches Bewässerungsprogramm für unser gesamtes Ackerland investieren."
 HOA_improved_irrigation_systems_tt:0 "Ändern Sie §Y$ETH_state_development_dynamic_modifier$§! um:\n$MODIFIER_STATE_PRODUCTION_SPEED_BUILDINGS_FACTOR$: §G+15%§!\n$MODIFIER_LOCAL_BUILDING_SLOTS$: §G+15%§!"
 HOA_the_adjective_air_fleet:0 "Die [ROOT.GetAdjective] Luftflotte"
 HOA_the_adjective_air_fleet_desc:0 "Der Luftkrieg entwickelt sich rasch zum zentralen Schauplatz, in dem der Sieger von Konflikten ermittelt wird. Daher müssen wir unsere eigene Luftwaffe aufbauen und sie auf die Verteidigung des Himmels von [ROOT.GetNameDef] vorbereiten."
 HOA_state-funded_projects:0 "Staatlich geförderte Projekte"
 HOA_state-funded_projects_desc:0 "Unsere Wirtschaft stagniert aufgrund mangelnder Infrastruktur und Industrie. Um dem entgegenzuwirken, werden wir massiv in neue Projekte in ganz [ROOT.GetNameDef] investieren."
 HOA_the_grand_university_of_capital:0 "Die Große Universität von [Root.Capital.GetCapitalVictoryPointName]"
 HOA_the_grand_university_of_capital_desc:0 "Die Weitergabe von Wissen von einer Generation an die nächste ist für die Sicherheit und das Wachstum jeder Nation von entscheidender Bedeutung. Deshalb werden wir in [ROOT.Capital.GetCapitalVictoryPointName] eine neue Großuniversität gründen, um die nächste Generation von Wissenschaftlern, Historikern und Künstlern besser auszubilden."

 HOA_the_adjective_armed_forces:0 "Die [ROOT.GetAdjective] Streitkräfte"
 HOA_the_adjective_armed_forces_desc:0 "Die Welt wird zunehmend instabil, da die Spannungen zwischen den Großmächten zunehmen. Wenn wir unsere Unabhängigkeit bewahren wollen, muss das Militär kriegsbereit sein."
 HOA_warrior_tradition:0 "Kriegertradition"
 HOA_warrior_tradition_desc:0 "[ROOT.GetNameDefCap] blickt auf eine lange Geschichte tapferer Krieger zurück, die ihre Heimat gegen potenzielle Eroberer verteidigten. Heute ist es wichtiger denn je, diese Tradition zur Verteidigung des Heimatlandes zu nutzen."
 HOA_strengthen_the_irregulars:0 "Stärkung der Irregulars"
 HOA_strengthen_the_irregulars_desc:0 "Das System der irregulären Truppen und Abgaben hat uns jahrhundertelang gute Dienste geleistet. Es gibt kaum einen Grund, etwas zu ändern, das sich bewährt hat."
 HOA_every_man_a_warrior:0 "Jeder Mann ein Krieger"
 HOA_every_man_a_warrior_desc:0 "Wenn [ROOT.GetNameDef] ausländischen Aggressoren erfolgreich Paroli bieten will, müssen wir die Gesellschaft so weit militarisieren, dass jeder in der Lage ist, im Bedarfsfall zur Landesverteidigung zu den Waffen zu greifen."
 HOA_names_finest:0 "[ROOT.GetName]s Beste"
 HOA_names_finest_desc:0 "Unsere Truppen wissen, dass sie das einzige Hindernis dafür sind, dass unser Land nicht Untertan einer fremden Macht wird. Mit diesem Wissen geht ein unerschütterliches Engagement für die Verteidigung des Heimatlandes und die Wahrung der [ROOT.GetAdjective] Freiheit einher."
 HOA_utilize_our_strengths:0 "Nutzen Sie unsere Stärken"
 HOA_utilize_our_strengths_desc:0 "Auch wenn unser Militär nicht so umfangreich oder formalisiert ist wie das anderer Länder, verfügt es über eine Menge unkonventionelles Fachwissen, das auf dem Schlachtfeld genutzt werden kann."
 HOA_reform_the_conscription:0 "Reform der Wehrpflicht"
 HOA_reform_the_conscription_desc:0 "Angesichts der zunehmend angespannten globalen Lage ist es an der Zeit, das Wehrpflichtprogramm auszuweiten, damit wir auf jede Form ausländischer Aggression vorbereitet sind."
 HOA_eyes_on_the_imperialists:0 "Augen auf die Imperialisten"
 HOA_eyes_on_the_imperialists_desc:0 "Die imperialen Mächte der Region beobachten die Unabhängigkeit von [ROOT.GetNameDef] mit Verachtung. Wir müssen wachsam bleiben und vermeiden, Opfer ihrer Ambitionen zu werden."
 HOA_encourage_local_arms_production:0 "Förderung der lokalen Waffenproduktion"
 HOA_encourage_local_arms_production_desc:0 "Wenn wir unsere Truppen nicht mit der nötigen Ausrüstung ausstatten können, werden sie nicht in der Lage sein, die Nation angemessen zu verteidigen. Deshalb müssen wir die Kapazitäten der Rüstungsindustrie ausbauen."
 HOA_metal_beasts:0 "Metallbestien"
 HOA_metal_beasts_desc:0 "Es wird immer deutlicher, dass Panzerfahrzeuge auf dem Schlachtfeld eine immer größere Rolle spielen werden. Die Armee muss lernen, wie sie diese Fahrzeuge am besten einsetzen und ihnen entgegenwirken kann."
 HOA_the_roars_of_thunder:0 "Das Brüllen des Donners"
 HOA_the_roars_of_thunder_desc:0 "Manchmal ist überwältigende Feuerkraft auf dem Schlachtfeld die einzige Möglichkeit, den Feind zu verdrängen. Am effektivsten lässt sich diese mit Artillerie einsetzen."
 HOA_develop_indigenous_models:0 "Entwicklung indigener Modelle"
 HOA_develop_indigenous_models_desc:0 "Wenn wir uns bei der Infanterieausrüstung auf ausländische Entwicklungen verlassen, laufen wir Gefahr, technologisch den Anschluss zu verlieren. Diesem Sicherheitsrisiko kann nur durch die Stärkung der inländischen Fachkompetenz im Bereich der Kleinwaffenentwicklung begegnet werden."
 HOA_the_steel_lions:0 "Die Steel Lions"
 HOA_the_steel_lions_desc:0 "Das Zeitalter der Stellungskriegsführung liegt hinter uns. Es ist an der Zeit, dass wir unsere eigenen spezialisierten Panzereinheiten auf das Schlachtfeld schicken und die Methoden der mobilen Kriegsführung erlernen."
 HOA_warfare_from_afar:0 "Krieg aus der Ferne"
 HOA_warfare_from_afar_desc:0 "Die Artillerie hat ihren Wert auf dem Schlachtfeld immer wieder unter Beweis gestellt. Wir sollten sie besser nutzen, indem wir spezialisierte Artillerieeinheiten enger in unsere Infanteriedivisionen integrieren."
 HOA_modern_infantry:0 "Moderne Infanterie"
 HOA_modern_infantry_desc:0 "Unsere Armeereformen haben wesentlich zu einer Steigerung ihrer Effektivität beigetragen. Wir sollten diese Entwicklung weiter ausbauen, indem wir die Zahl der Divisionen im Feld erhöhen."

 HOA_the_first_album:0 "[ROOT.GetNameDefCap]"
 HOA_the_first_album_desc:0 "Angesichts der zunehmenden Spannungen zwischen den Großmächten sieht die Welt zunehmend gefährlicher aus. Doch für die Nationen, die bereit sind, die Gunst der Stunde zu nutzen, eröffnet sich dadurch auch eine Welt voller Chancen."
 HOA_a_loyal_subject:0 "Ein treuer Untertan"
 HOA_a_loyal_subject_desc:0 "Angesichts der zunehmend instabilen Lage auf der Weltbühne ist es vielleicht besser, unter dem Schutz einer stärkeren Nation zu stehen. Zumindest im Moment …"
 HOA_political_stability:0 "Politische Stabilität"
 HOA_political_stability_desc:0 "Wir können nicht hoffen, eine unabhängige Nation zu bleiben, wenn wir im eigenen Land uneins sind. Nur wenn wir eine gemeinsame Front bilden, können wir uns davor schützen, von den Winden des Wandels, die derzeit die Welt erfassen, hinweggefegt zu werden."
 HOA_the_capital_railroad:0 "Die [Root.Capital.GetCapitalVictoryPointName]-Eisenbahn"
 HOA_the_capital_railroad_desc:0 "Durch die Anbindung unseres Schienennetzes an das unserer Nachbarn können wir unsere Waren und Ressourcen besser dorthin exportieren. Dies dürfte unserer Wirtschaft hoffentlich einen Schub verleihen."
 HOA_invite_foreign_settlers:0 "Laden Sie ausländische Siedler ein"
 HOA_invite_foreign_settlers_desc:0 "Wir haben noch einen weiten Weg vor uns, wenn es um die Modernisierung unseres Landes geht. Wir sollten die Fähigkeiten naiver Kolonisten nutzen, indem wir einen Anreiz für sie schaffen, nach [ROOT.GetNameDef] umzuziehen."
 HOA_countryleader:0 "[ROOT.GetLeader]"
 HOA_countryleader_desc:0 "[ROOT.GetLeader] ist die einzige Person, die die Nation in diesen schwierigen Zeiten zusammenhalten kann, daher muss sich das Volk hinter [ROOT.GetLeader.GetHerHim] versammeln."
 HOA_securing_the_adjective_future:0 "Die [ROOT.GetAdjective] Zukunft sichern"
 HOA_securing_the_adjective_future_desc:0 "[ROOT.GetNameDefCap] ist eine kleine Nation mit sehr wenigen Freunden auf der Weltbühne. Das zu ändern, wird einen großen Beitrag zur Sicherung unserer zukünftigen Freiheit und Unabhängigkeit leisten."
 HOA_improving_the_educational_system:0 "Verbesserung des Bildungssystems"
 HOA_improving_the_educational_system_desc:0 "Das Schicksal der Nation liegt in unseren Händen. Ihnen die bestmögliche Ausbildung zu ermöglichen, trägt wesentlich zur Sicherung der Zukunft von [ROOT.GetNameDef] bei."
 HOA_construct_great_monuments:0 "Errichte großartige Monumente"
 HOA_construct_great_monuments_desc:0 "Das Volk von [ROOT.GetAdjective] hat vieles, worauf es stolz sein kann. Wir haben eine lange Geschichte, die mit Denkmälern gewürdigt werden sollte, die uns zu immer größeren Höhen inspirieren."
 HOA_the_adjective_volunteer_force:0 "Die [ROOT.GetAdjective] Freiwilligentruppe"
 HOA_the_adjective_volunteer_force_desc:0 "Kleinere Grenzscharmützel auf einem anderen Kontinent können gewaltige Konflikte auslösen, die die ganze Welt erschüttern. Wir müssen unseren Teil dazu beitragen, diese Funken zu ersticken, bevor sie einen weiteren großen Krieg auslösen."
 HOA_military_cooperation:0 "Militärische Zusammenarbeit"
 HOA_military_cooperation_desc:0 "Während wir große Fortschritte bei der Verbesserung unserer Streitkräfte machen, können wir durch gemeinsame Übungen und eine verstärkte militärische Zusammenarbeit einiges von unseren internationalen Freunden lernen."
 HOA_that_which_is_rightfully_ours:0 "Das, was uns rechtmäßig zusteht"
 HOA_that_which_is_rightfully_ours_desc:0 "[ROOT.GetNameDefCap] ist nur ein Schatten dessen, was es sein sollte. Die Geschichte zeigt, dass unsere Vorfahren über viel größere Landstriche herrschten als unsere derzeitige Regierung, doch der Großteil davon wurde uns über Generationen hinweg gestohlen. Es ist Zeit, dass wir uns zurückholen, was uns rechtmäßig gehört."
 HOA_commandos:0 "Kommandos"
 HOA_commandos_desc:0 "Manchmal kann im Krieg eine kleine, aber gut ausgebildete Gruppe von Soldaten hinter den feindlichen Linien größere Siege erringen als die größten Armeen auf dem Schlachtfeld."
 HOA_a_jagged_alliance:0 "Eine zwiespältige Allianz"
 HOA_a_jagged_alliance_desc:0 "Obwohl wir nicht immer einer Meinung mit anderen Nationen sind, sind wir oft mit denselben Bedrohungen konfrontiert. Die Konzentration auf diese gemeinsamen Probleme kann die Grundlage für langfristige Allianzen und eine erhöhte nationale Sicherheit sein."
 HOA_observe_and_learn:0 "Beobachten und lernen"
 HOA_observe_and_learn_desc:0 "Die Kriegsführung entwickelt sich aufgrund des technologischen Fortschritts und innovativen Denkens ständig weiter. Um ein starkes Militär zu erhalten, müssen wir die Lehren aus dem Krieg ziehen und stets nach Verbesserungsmöglichkeiten suchen."
 HOA_foreign_investors:0 "Ausländische Investoren"
 HOA_foreign_investors_desc:0 "Um erfolgreich zu sein, brauchen wir Investitionen in unsere Industrie und Infrastruktur. Glücklicherweise gibt es keinen Mangel an gewinnorientierten Ausländern."
 HOA_research_exchange_programmes:0 "Forschungsaustauschprogramme"
 HOA_research_exchange_programmes_desc:0 "Unsere Industrie muss dringend modernisiert werden. Durch die Einrichtung eines Austauschprogramms können wir aus dem Ausland Erkenntnisse darüber gewinnen, wie wir neue technologische Fortschritte in unseren Fabriken am besten nutzen können."
 HOA_foreign_trained_officials:0 "Im Ausland ausgebildete Beamte"
 HOA_foreign_trained_officials_desc:0 "Wir können noch viel von der Expertise ausländischer Menschen lernen. Es ist an der Zeit, sie besser zu nutzen, indem wir ihnen Führungspositionen innerhalb unseres Landes geben."
 HOA_countryadjective_loyalist_advisors:0 "[ROOT.GetAdjective] Loyalistische Berater"
 HOA_countryadjective_loyalist_advisors_desc:0 "Wir können nicht zulassen, dass unsere Nation und Kultur von den Imperialisten vereinnahmt werden. Wir müssen diejenigen, die [ROOT.GetNameDef] treu ergeben sind, in Führungspositionen bringen und den Prozess der Wiedererlangung unserer Freiheit einleiten."
 HOA_lay_claim_to_the_danakil:0 "Erhebe Anspruch auf die Danakil"
 HOA_lay_claim_to_the_danakil_desc:0 "[ROOT.GetNameDefCap] wird ohne die Sicherung der Danakil-Region im Norden immer anfällig für eine Invasion von See aus sein."
 HOA_push_for_the_highlands:0 "Vorstoß in die Highlands"
 HOA_push_for_the_highlands_desc:0 "Das wirtschaftliche Herz Ostafrikas liegt im Hochland. Die Sicherung dieses Landes für [ROOT.GetNameDef] wird einen großen Beitrag zur Erweiterung unseres Wirtschaftspotenzials leisten."
 HOA_secure_the_ogaden:0 "Sichern Sie den Ogaden"
 HOA_secure_the_ogaden_desc:0 "Durch die Sicherung des Ogaden werden wir eine Reihe natürlicher Barrieren zwischen uns und potenziellen Angreifern errichten und gleichzeitig unsere Wirtschaft für den Handel über den Indischen Ozean öffnen."
 HOA_rallying_the_adjective_people:0 "Das [ROOT.GetAdjective] Volk zusammenbringen"
 HOA_rallying_the_adjective_people_desc:0 "Die Welt wird von Konflikten heimgesucht. Zwischen unseren gegenwärtigen Freiheiten und dem Abgrund der Unterdrückung steht nur die Bereitschaft der [ROOT.GetAdjective] Menschen, aufzustehen und zu kämpfen. Gemeinsam sind wir stark, getrennt sind wir schwach."
 HOA_the_capital_school_of_technology:0 "Die [Root.Capital.GetCapitalVictoryPointName]-Schule für Technologie"
 HOA_the_capital_school_of_technology_desc:0 "Was vor wenigen Jahren auf dem Schlachtfeld und in den Fabriken noch als Spitzentechnologie galt, ist heute oft völlig veraltet. Um mit der Entwicklung neuer Technologien Schritt zu halten, müssen wir in die Ausbildung der nächsten Generation investieren."
 HOA_promote_countryadjective_nationalism:0 "Fördern Sie den [ROOT.GetAdjective] Nationalismus"
 HOA_promote_countryadjective_nationalism_desc:0 "Das Volk von [ROOT.GetNameDef] wird seine Unterdrückung durch ausländische Mächte nicht länger tolerieren. Wir müssen die Gelegenheit nutzen und unsere Unabhängigkeitspläne beschleunigen."
 HOA_crowning_of_the_negusa_nagast:0 "Krönung des Negusa Nagast"
 HOA_crowning_of_the_negusa_nagast_desc:0 "Da wir zunehmend zur dominierenden Macht in der Region werden, ist es an der Zeit, dass wir unsere Rolle annehmen und den neuen Negusa Nagast zu unserem Anführer ernennen. Alle müssen sich hinter [ROOT.GetLeader.GetHerHim] versammeln, sonst müssen wir uns unserem Zorn stellen."
 HOA_control_ethiopia_tt:0 "Kontrolliert das gesamte äthiopische Territorium"
 HOA_proclaim_east-african_hegemony:0 "Ostafrikanische Hegemonie proklamieren"
 HOA_proclaim_east-african_hegemony_desc:0 "Die anhaltend turbulente Lage am Horn von Afrika kann nur unter der Herrschaft unseres glorreichen Kaisers [ROOT.GetName] stabilisiert werden. Die Zeit für die Vereinigung der Region ist gekommen."
