 ITA_milizia_marittima_di_artiglieria_coastal_forts_tt:0 "Fügt §Y2 $coastal_bunker$§! in jeder eigenen Provinz mit einem §Y$naval_base$§! hinzu. \nAktuelle Auswirkungen:"
