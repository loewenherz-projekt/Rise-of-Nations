 ITA_midget_submarines_decision_tt:0 "\nWenn der Fokus §Y$ITA_cooperation_programs$§! abgeschlossen ist: \nSchaltet die Entscheidung §Y$ITA_export_midget_submarines$§! frei."

 ITA_monarchia_d_italia:0 "Monarchia d&#39;Italia"
 ITA_monarchia_d_italia_desc:1 "Vittorio Emanuele hätte dem Faschismus niemals die Türen der italienischen Politik öffnen dürfen. Es ist an der Zeit, diesen Fehler zu korrigieren und die Faschisten in der Regierung in den Hintergrund zu drängen."
 ITA_new_corporations:0 "Neue Unternehmen"
 ITA_new_corporations_desc:1 "Wir müssen das bisherige Unternehmenskonzept des faschistischen Regimes übernehmen und es an die Bedürfnisse unserer neuen Regierung anpassen."
 ITA_extraction_industry:0 "Förderindustrie"
 ITA_extraction_industry_desc:1 "Wir müssen unsere Rohstoffgewinnungsindustrie ausbauen, um die Nachfrage unserer Produktionslinien zu decken. Wir dürfen nicht zulassen, dass der Mangel an Rohstoffen unsere Rüstungsproduktion gefährdet."
 ITA_prepare_for_the_coming_wars:0 "Bereiten Sie sich auf die kommenden Kriege vor"
 ITA_prepare_for_the_coming_wars_desc:1 "Überall um uns herum droht Krieg und wir brauchen eine robuste Rüstungsindustrie, um die Bedürfnisse unseres Militärs zu erfüllen."
 ITA_mobilize_the_railway_guns:0 "Mobilisieren Sie die Eisenbahngeschütze"
 ITA_mobilize_the_railway_guns_desc:1 "Verzweifelte Situationen erfordern verzweifelte Maßnahmen. Es ist an der Zeit, unsere alten Eisenbahngeschütze wieder in Betrieb zu nehmen."
 ITA_bring_back_old_glories:0 "Bringen Sie alten Ruhm zurück"
 ITA_bring_back_old_glories_desc:1 "Zahlreiche alte Schiffe liegen in verschiedenen Häfen und warten darauf, verschrottet zu werden. Einige unserer Ingenieure und Marineoffiziere behaupten, dass wir diese alten Prachtstücke mit ein paar Anpassungen wieder einsatzbereit machen könnten."
 ITA_new_forms_of_weaponry:0 "Neue Waffenformen"
 ITA_new_forms_of_weaponry_desc:1 "Wenn Italien zu einer der größten Militärmächte der Welt werden will, müssen wir neue Waffen erforschen. Unsere Wissenschaftler sind überzeugt, dass die Entwicklung eines bahnbrechenden Forschungsprogramms zur Atomenergie vielversprechend sein könnte."
 ITA_revoke_the_acerbo_law:0 "Widerrufen Sie das Acerbo-Gesetz"
 ITA_revoke_the_acerbo_law_desc:1 "Das Acerbo-Gesetz gab Mussolini und seiner faschistischen Partei die so dringend ersehnte Kontrolle über Italien. Es ist an der Zeit, dieses Gesetz aufzuheben, um zu verhindern, dass so etwas jemals wieder passiert."
 ITA_christian_democracy:0 "Christdemokratie"
 ITA_christian_democracy_desc:1 "Die Christdemokratische Partei ist eine konservative politische Mitte-Partei unter Führung von Alcide de Gasperi. Sie hat es geschafft, die Unterstützung der Bevölkerung zu gewinnen, indem sie christliche Ideale mit der Idee der Freiheit vereint. Wir sollten ihr die Regierungsbildung erlauben, solange sie der Monarchie treu bleibt."
 ITA_democratic_king:0 "Demokratischer König"
 ITA_democratic_king_desc:1 "Für die italienische Monarchie ist es an der Zeit, einen Schritt in Richtung eines demokratischeren Staates zu machen und gleichzeitig die Figur des Königs als obersten Führer beizubehalten."
 ITA_cooperate_with_moderates:0 "Mit Gemäßigten zusammenarbeiten"
 ITA_cooperate_with_moderates_desc:1 "Es gibt keinen Grund, nicht mit den weniger radikalen Elementen des ehemaligen faschistischen Regimes zusammenzuarbeiten. Es gibt sehr fähige Leute, die dazu beitragen könnten, diesen erneuerten italienischen Staat voranzubringen."
 ITA_expand_intelligence_services:0 "Erweitern Sie die Geheimdienste"
 ITA_expand_intelligence_services_desc:1 "In diesem neuen Zeitalter ist Wissen Macht. Wir müssen unsere verschiedenen Geheimdienstzweige ausbauen, um sicherzustellen, dass wir mit ausländischen Geheimdiensten konkurrieren können."
 ITA_crush_opposition:0 "Vernichten Sie die Opposition"
 ITA_crush_opposition_desc:1 "Es gibt immer noch viele Anhänger des alten faschistischen Regimes, die unsere Politik ablehnen und die Arbeit unserer neuen Regierung behindern. Es ist an der Zeit, sich mit ihnen auseinanderzusetzen."
 ITA_power_to_the_king:0 "Macht dem König"
 ITA_power_to_the_king_desc:1 "In dieser Zeit großer sozialer und politischer Spannungen besteht die einzige Möglichkeit, sicherzustellen, dass in Italien kein extremistisches Regime, sei es faschistisch oder kommunistisch, die Oberhand gewinnt, darin, die Machtkonzentration in den Händen des Königs zu verstärken, der sicherlich am besten geeignet ist, unser Land zu führen."
 ITA_disband_the_blackshirts:0 "Die Schwarzhemden auflösen"
 ITA_disband_the_blackshirts_desc:1 "Die Schwarzhemden sind eine sehr gefährliche Organisation im Dienste des Faschismus. Daher ist es an der Zeit, dass sie verschwinden, so wie es ihr faschistisches Regime getan hat. Wir werden alle aktiven Einheiten sofort auflösen."
 ITA_utilize_the_blackshirts:0 "Nutzen Sie die Schwarzhemden"
 ITA_utilize_the_blackshirts_desc:1 "Obwohl die Schwarzhemden dem faschistischen Regime und dem Duce historisch treu geblieben sind, könnten wir sie vielleicht für unsere eigenen Interessen instrumentalisieren, wenn wir ihnen zeigen, dass ihre Organisation auch unter diesem neuen Regime Erfolg haben kann. Gibt es denn wirklich so große Unterschiede zwischen den beiden Regimen?"
 ITA_expand_the_royal_guard:0 "Erweitern Sie die königliche Garde"
 ITA_expand_the_royal_guard_desc:1 "Wir werden das königliche Gardekorps stärken und erweitern, um über zuverlässige Truppen zu verfügen, die der italienischen Monarchie treu ergeben sind und bei Bedarf in der Lage sind, bei jeder Art von Militäroperation verschiedene Rollen zu übernehmen."
 ITA_gloria_al_regno_d_italia:0 "Gloria al Regno d&#39;Italia"
 ITA_gloria_al_regno_d_italia_desc:1 "Diejenigen, die behaupten, die Monarchie sei ein überholtes Regierungssystem, sind Narren, die nicht erkennen können, wie eine bescheidene Nation unter edler und fester Hand zu einer der größten Mächte der Welt werden kann. \nLang lebe der König!"
 ITA_paramilitary_training:0 "Paramilitärische Ausbildung"
 ITA_paramilitary_training_desc:1 "Es ist an der Zeit, unsere Freiwilligenmiliz zu erweitern und ihre militärische Ausbildung zu verbessern. Wir werden herausragende Offiziere unserer Elitedivisionen einsetzen, um neue Rekruten auszubilden und die Schwarzhemden-Einheiten zu führen."
 ITA_seek_papal_support:0 "Suchen Sie päpstliche Unterstützung"
 ITA_seek_papal_support_desc:1 "Um mit der wachsenden sozialen und politischen Stabilität in unserem Land umzugehen, müssen wir uns auf die Kirche stützen, die in der Vergangenheit einen so großen Einfluss auf das italienische Volk ausgeübt hat. Wir müssen uns an den Papst wenden und seine Zustimmung und Unterstützung suchen."
 ITA_agents_of_the_church:0 "Vertreter der Kirche"
 ITA_agents_of_the_church_desc:1 "Die Kirche verfügt über unzählige Vertreter auf der ganzen Welt. Wenn es uns gelingt, den Vatikan auf unsere Seite zu ziehen, könnten uns neue Agenten zur Verfügung stehen, die als Gesandte der Kirche perfekt getarnt sind und unsere Geheimdienstnetze verbessern."
 ITA_strengthen_the_papacy:0 "Stärkung des Papsttums"
 ITA_strengthen_the_papacy_desc:1 "Es ist klar, dass der Einfluss des Papstes in der italienischen Gesellschaft sehr stark ist. Die einzige Möglichkeit, die nationale Stabilität zu wahren, besteht darin, der Kirche innerhalb des Königreichs Italien Macht zu verleihen."
 ITA_setting_course:0 "Kurs setzen"
 ITA_setting_course_desc:1 "Das Königreich Italien ist bereit, sein Schicksal zu erfüllen. Größe und Ruhm erwarten das stolze italienische Volk. Es ist Zeit zu entscheiden, wie es weitergehen soll."
 ITA_mare_nostrum_bba:0 "Mare Nostrum"
 ITA_mare_nostrum_bba_desc:0 "Das antike Rom besiegte Karthago erstmals mit seiner Seemacht. Durch Investitionen in die Seemacht kann Italien die Kontrolle über das Mittelmeer anstreben und es wieder zum „Mare Nostrum“, unserem Meer, machen."
 ITA_auxiliaries:0 "Hilfsmittel"
 ITA_auxiliaries_desc:1 "Wie schon zu Zeiten unserer römischen Vorfahren spielen Hilfstruppen auch heute noch eine wichtige Rolle bei der Unterstützung regulärer Militäreinheiten, der Erkundung des Geländes und der Bedrängung des Feindes. Wir müssen diese paramilitärischen Milizen ausbauen, um unsere Armee zu stärken."
 ITA_the_italian_legions:0 "Die italienischen Legionen"
 ITA_the_italian_legions_desc:1 "Unsere Streitkräfte waren in der jüngeren Vergangenheit möglicherweise nicht den Anforderungen gewachsen, doch jetzt, da das italienische Volk stolzer denn je auf sein römisches Erbe ist, müssen wir unseren Streitkräften neue Doktrinen auferlegen, um sicherzustellen, dass unsere Legionen heute genauso furchterregend sind wie vor Tausenden von Jahren."
 ITA_new_roman_citizens:0 "Neue römische Bürger"
 ITA_new_roman_citizens_desc:1 "Die Gewährung der Staatsbürgerschaft an die einheimische Bevölkerung unserer Kolonien wird uns sicherlich dabei helfen, die Zustimmung und Kooperation der Einheimischen zu gewinnen."
 ITA_all_roads_lead_to_rome:0 "Viele Wege führen nach Rom"
 ITA_all_roads_lead_to_rome_desc:1 "Römische Legionen waren in der Vergangenheit für ihre Schnelligkeit und Effizienz beim Bau von Straßen und der Infrastruktur bekannt, die ihre Armeen für den Einsatz benötigten. Tausende Jahre später sind Logistik und Versorgungswege in der Kriegsführung noch wichtiger."
 ITA_the_king_of_the_skies:0 "Der König der Lüfte"
 ITA_the_king_of_the_skies_desc:1 "Im Gegensatz zu unseren römischen Vorfahren müssen unsere Streitkräfte den Himmel beherrschen, um zu Land und zu Wasser optimal operieren zu können. Italienische Flugzeuge sind bereits für ihre Vielseitigkeit und Qualität bekannt, doch nun ist es an der Zeit, dass unsere Luftfahrtingenieure einen Schritt weiter gehen und eine wahre fliegende Festung entwickeln."
 ITA_modern_musculus:0 "Moderner Musculus"
 ITA_modern_musculus_desc:1 "Genau wie die Römer müssen wir mächtige Kriegsmaschinen entwickeln, die es uns ermöglichen, das Schlachtfeld zu beherrschen. Wir werden den ultimativen Panzer konstruieren, um die Frontlinien zu stürmen und unseren Feinden Angst und Schrecken einzujagen."
 ITA_caligulas_pride:0 "Caligulas Stolz"
 ITA_caligulas_pride_desc:1 "Es ist an der Zeit, das größte Kriegsschiff aller Zeiten zu entwickeln. Unsere besten Schiffsingenieure haben das Design perfektioniert und Prototypen getestet und sind nun zuversichtlich, dass die Neptunus nicht nur im Mittelmeerraum, sondern auch darüber hinaus zum König werden wird."
 ITA_iberian_protection:0 "Iberischer Schutz"
 ITA_iberian_protection_desc:1 "Die iberischen Nationen haben in der jüngeren Vergangenheit relative Sicherheit genossen, doch es ist klar, dass sie sich derzeit allein nicht gegen die feindlichen Großmächte verteidigen können. Wir müssen ihnen unseren Schutz anbieten, bevor es zu spät ist."
 ITA_south_american_alliances:0 "Südamerikanische Allianzen"
 ITA_south_american_alliances_desc:1 "Es ist an der Zeit, die Grenzen unserer Fraktion zu erweitern. Wir werden die lateinamerikanischen Länder erreichen und sie davon überzeugen, wie wichtig es ist, ein starkes Bündnis gegen die vielen Bedrohungen zu bilden, die uns alle umgeben."
 ITA_the_papacy_reborn:0 "Das wiedergeborene Papsttum"
 ITA_the_papacy_reborn_desc:1 "Nachdem Seine Heiligkeit den König gestürzt und die totale Kontrolle über Italien übernommen hat, ist es für das italienische Volk an der Zeit, sich der Vision und den Zielen der Kirche anzuschließen."
 ITA_deus_vult:0 "Deus Vult"
 ITA_deus_vult_desc:1 "Die katholische Kirche ist seit Jahrhunderten ein Leuchtfeuer der Hoffnung und Stabilität in Europa, und da uns dunkle Zeiten bevorstehen, müssen wir erneut zu diesem Leuchtfeuer werden. \nGott will es!"
 ITA_catholic_action:0 "Katholische Aktion"
 ITA_catholic_action_desc:1 "Unsere katholische Jugendorganisation erweist sich als äußerst wirksames Instrument bei der Ausrottung der Kommunisten, der Förderung katholischer Prinzipien der sozialen Gerechtigkeit und der Anwerbung eifriger neuer Wehrpflichtiger für die Reihen unserer Streitkräfte."
 ITA_a_time_for_war:0 "Eine Zeit für Krieg"
 ITA_a_time_for_war_desc:1 "Solange die Ketzerei in Europa wütet, kann es keinen Frieden geben. Es ist Zeit für einen neuen Heiligen Krieg. Neue Kriegsmaschinen werden in seinem Namen dröhnen, bereit, die Ketzer mit gerechter Wut zu schlagen. Es soll keinen Frieden geben, bis jeder Ungläubige aus den Rohren einer 105-mm-Kanone gerichtet ist."
 ITA_the_holy_lands:0 "Das Heilige Land"
 ITA_the_holy_lands_desc:1 "Eine für den christlichen Glauben so wichtige Region wie Palästina gehört legitimerweise zum Reich Gottes. Wir müssen dafür sorgen, dass uns das Heilige Land unverzüglich zurückgegeben wird."
 ITA_the_catholic_dominion:0 "Das katholische Dominion"
 ITA_the_catholic_dominion_desc:1 "Mit dem Aufstieg des Papsttums als einer wieder ernstzunehmenden Großmacht ist es für uns an der Zeit, allen gläubigen Christen die Hand zu reichen und als Hand zu fungieren, die die Menschen führt, so wie der Hirte seine Herde führt und sie vor dem Bösen schützt. Es ist der Auftrag Gottes!"

 ITA_unite_the_opposition:0 "Vereint die Opposition"
 ITA_unite_the_opposition_desc:1 "Der Faschismus ist in Italien tief verwurzelt, und es bedarf großer Anstrengungen, ihn auszurotten. Wir müssen gemeinsame Ziele zwischen den verschiedenen Gruppen finden, die sich dem faschistischen Regime widersetzen, denn nur gemeinsam werden wir den verabscheuungswürdigen Duce stürzen können."
 ITA_liberate_gramsci:0 "Befreit Gramsci"
 ITA_liberate_gramsci_desc:1 "Unser Genosse, der marxistische Philosoph Antonio Gramsci, wird seit über zehn Jahren von der faschistischen Regierung im Gefängnis festgehalten, und sein Gesundheitszustand verschlechtert sich rapide. Wir müssen eine geheime Operation organisieren, um ihn zu befreien und sein Leben zu retten, denn er wird mit Sicherheit zu einem Schlüsselakteur unserer Arbeiterrevolution werden."
 ITA_organize_strikes_in_the_north:0 "Organisiert Streiks im Norden"
 ITA_organize_strikes_in_the_north_desc:1 "Bevor wir streiken, werden wir all unsere Anstrengungen darauf konzentrieren, die Unterstützung der Industriearbeiter in Italien zu gewinnen und sicherzustellen, dass die stärker industrialisierten Gebiete des Nordens mit uns gegen das faschistische Regime stehen."
 ITA_the_southern_farmlands:0 "Die südlichen Farmländer"
 ITA_the_southern_farmlands_desc:1 "Trotz der vergeblichen Bemühungen des faschistischen Regimes ist Italien praktisch immer noch ein ländliches Land. Um unsere Revolution erfolgreich durchführen zu können, sind wir auf die Bauern angewiesen, und im Süden Italiens sind die Bauern am mächtigsten."
 ITA_defy_the_duce:0 "Trotze dem Duce"
 ITA_defy_the_duce_desc:1 "Es ist an der Zeit, sich gegen das faschistische Regime zu erheben und die Geißel auszurotten, die es für das italienische Volk darstellt. \nArbeiter und Bauern Italiens, zu den Waffen!"
 ITA_appeal_to_the_bourgeoisie:0 "Appell an die Bourgeoisie"
 ITA_appeal_to_the_bourgeoisie_desc:1 "Wir müssen die bürgerlichen Gruppen erreichen, die am Sturz des faschistischen Regimes interessiert sind. Mit den ihnen zur Verfügung stehenden Mitteln und dem Mut unserer Revolutionäre werden wir diesen blutigen Krieg rasch beenden können!"
 ITA_seize_old_equipment:0 "Beschlagnahme alter Geräte"
 ITA_seize_old_equipment_desc:1 "In verschiedenen Waffenlagern im ganzen Land lagern große Mengen alter Militärausrüstung. Trotz ihres Alters wird die Beschlagnahme und Verteilung dieser Ausrüstung an unsere Streitkräfte einen großen Beitrag zum Sieg des Krieges leisten."
 ITA_the_italian_republic:0 "Die Italienische Republik"
 ITA_the_italian_republic_desc:1 "Die Monarchie ist ein altes und verrottetes System, das unsere Revolution nur behindert. Es ist an der Zeit, die königliche Familie loszuwerden und sich um ihre Anhänger zu kümmern."
 ITA_the_popular_front:0 "Die Volksfront"
 ITA_the_popular_front_desc:1 "Der Bürgerkrieg hat gezeigt, dass die Kommunisten nicht nur in der Lage sind, das italienische Volk zum Sieg gegen den Faschismus zu führen, sondern auch zu dem sozialen und industriellen Fortschritt, den unser Land so dringend brauchte."
 ITA_the_garibaldi_legion:0 "Die Garibaldi-Legion"
 ITA_the_garibaldi_legion_desc:1 "Wir werden Freiwilligeneinheiten organisieren, die als Teil der Internationalen Brigaden im spanischen Bürgerkrieg an der Seite unserer Kameraden in der spanischen Republik kämpfen."
 ITA_gruppi_di_difesa_della_donna:0 "Gruppi di Difesa della donna"
 ITA_gruppi_di_difesa_della_donna_desc:1 "Revolutionäre Frauen aus verschiedenen politischen Formationen haben vorgeschlagen, Frauenverteidigungsgruppen zu gründen, um im Kriegsfall eine aktive Teilnahme und Mobilisierung von Kräften aller Klassen und sozialen Schichten zu ermöglichen."
 ITA_a_new_era_for_the_red_shirts:0 "Eine neue Ära für die Rothemden"
 ITA_a_new_era_for_the_red_shirts_desc:1 "Wir werden in die Fußstapfen von Giuseppe Garibaldi und seinen Rothemden treten, diese Milizen stärken und sie ausbilden, damit sie ihre Aufgaben sowohl als Teil der italienischen Armee als auch als Freiwilligenbrigaden im Ausland optimal erfüllen können."
 ITA_pugno_alzato:0 "Pugno Alzato"
 ITA_pugno_alzato_desc:1 "Es ist Zeit, die Geißel des Faschismus und die Bedrohung, die er für die gesamte Menschheit darstellt, auszurotten. In diesem entscheidenden Kampf werden wir vereint unsere Fäuste erheben!"
 ITA_a_leader_steps_forward:0 "Ein Anführer tritt vor"
 ITA_a_leader_steps_forward_desc:0 "Es ist an der Zeit, zu entscheiden, wer an die Spitze der neuen Italienischen Republik treten soll. Glücklicherweise können wir aus hochqualifizierten Kandidaten wählen."
 ITA_the_path_to_progress:0 "Der Weg zum Fortschritt"
 ITA_the_path_to_progress_desc:0 "Wir werden auf kommunistische und sozialistische Regierungen in aller Welt zugehen, die möglicherweise bereit sind, mit uns zusammenzuarbeiten und uns dabei zu helfen, uns von dem verheerenden Bürgerkrieg zu erholen, den wir ertragen mussten."
 ITA_industrial_socialization:0 "Industrielle Sozialisierung"
 ITA_industrial_socialization_desc:1 "Es ist an der Zeit, die großen Fabriken aus den Händen der Großunternehmer und der Bourgeoisie zu enteignen, damit sie zum größtmöglichen Nutzen des gesamten italienischen Volkes genutzt werden können."
 ITA_institute_the_five_year_plan:0 "Führen Sie den Fünfjahresplan ein"
 ITA_institute_the_five_year_plan_desc:1 "Genau wie unsere sowjetischen Genossen müssen wir unser überwiegend agrarisch geprägtes Land industrialisieren, um mit den großen Weltmächten konkurrieren zu können. Wir werden einen Fünfjahresplan entwickeln, der uns nicht nur dabei helfen wird, das industrielle Niveau vor dem Bürgerkrieg wiederzuerlangen, sondern es weit zu übertreffen."
 ITA_new_ricostruzione_industriale:0 "Neue Ricostruzione Industriale"
 ITA_new_ricostruzione_industriale_desc:1 "Das Instituto per la Ricostruzione Industriale hat bisher eine wichtige Rolle bei der Rettung, Umstrukturierung und Finanzierung bankrotter Banken und Privatunternehmen gespielt. Mit einigen Anpassungen werden wir dafür sorgen, dass es auch weiterhin ohne den faschistischen Anstrich der Vergangenheit funktioniert."
 ITA_political_commissars:0 "Politische Kommissare"
 ITA_political_commissars_desc:1 "Um das Bekenntnis zum Kommunismus zu bewahren und den ideologischen Eifer unserer Truppen zu wecken, werden wir in der Armee die Figur politischer Kommissare einführen, die für die politische Erziehung und Organisation der Einheiten, denen sie angehören, verantwortlich sind."
 ITA_common_ground:0 "Gemeinsamkeiten"
 ITA_common_ground_desc:1 "Wir müssen die Differenzen mit anderen politischen Gruppierungen beilegen, mit denen wir in Wirklichkeit die gleichen Ziele verfolgen. Es ist an der Zeit, gemeinsam daran zu arbeiten, den neuen italienischen Staat in Richtung Fortschritt zu führen."
 ITA_appease_the_military:0 "Beschwichtigung des Militärs"
 ITA_appease_the_military_desc:1 "Viele Offiziere der Streitkräfte sind mit der neuen Regierung oder ihrem Status nach dem Bürgerkrieg unzufrieden. Es wäre ratsam, dafür zu sorgen, dass die Unzufriedenheit innerhalb des Militärs ausgeräumt wird und dass die Offiziere das Gefühl haben, dass ihre Rolle im Krieg anerkannt wird."
 ITA_crush_the_mafia:0 "Zerschmettere die Mafia"
 ITA_crush_the_mafia_desc:1 "Die Mafia und zahlreiche Schmuggler-, Erpresser- und Kriminellebanden sind während des Bürgerkriegs wieder aufgetaucht. Es ist unsere Pflicht gegenüber dem italienischen Volk, sie auszumerzen und die Sicherheit und Stabilität des Landes wiederherzustellen."
 ITA_empower_the_carabinieri:0 "Stärke die Carabinieri"
 ITA_empower_the_carabinieri_desc:1 "Die Carabinieri spielen eine Schlüsselrolle bei der Bekämpfung der Mafiosi und der Wahrung von Frieden und Sicherheit im Land. Es ist an der Zeit, diese Polizeikräfte zu stärken und ihnen zusätzliche Aufgaben zu ermöglichen."
 ITA_army_modernization:0 "Modernisierung der Armee"
 ITA_army_modernization_desc:1 "Unsere Streitkräfte könnten von neuer Ausrüstung und neuen Trainingstechniken profitieren, die es ihnen ermöglichen, mit den Armeen und Doktrinen anderer Großmächte Schritt zu halten."
 ITA_union_in_the_party:0 "Gewerkschaft in der Partei"
 ITA_union_in_the_party_desc:1 "Der Zusammenhalt innerhalb der Partei ist der wichtigste Faktor für die Entwicklung unseres Landes hin zum Kommunismus. Wir müssen sicherstellen, dass alle Mitglieder die gleiche Vision teilen, die gleichen Ziele verfolgen und den von der Partei festgelegten Prozessen folgen, um diese zu erreichen."
 ITA_follow_the_soviet_union:0 "Folgen Sie der Sowjetunion"
 ITA_follow_the_soviet_union_desc:1 "Es gibt einen klaren Weg zum Kommunismus, der bereits von der Sowjetunion vorgezeichnet wurde. Wir müssen ihm folgen, wenn wir wollen, dass unsere Bemühungen in der neuen Republik Früchte tragen und wir einen echten kommunistischen Staat erreichen."
 ITA_military_cooperation:0 "Militärische Zusammenarbeit"
 ITA_military_cooperation_desc:1 "Wenn wir in dieser Welt bestehen wollen, müssen wir mit unseren Verbündeten Abkommen zur militärischen Zusammenarbeit schließen, denn die Großmächte um uns herum sind mit absoluter Sicherheit Feinde des Proletariats."
 ITA_defense_against_capitalism:0 "Verteidigung gegen den Kapitalismus"
 ITA_defense_against_capitalism_desc:1 "Der Faschismus ist unser erster und größter ideologischer Feind, aber er ist nicht der einzige. Die Kapitalisten stellen eine schreckliche Bedrohung für unser Land und die proletarische Revolution dar. Wir müssen bereit sein, ihnen die Stirn zu bieten."
 ITA_combined_research_effort:0 "Gemeinsame Forschungsanstrengungen"
 ITA_combined_research_effort_desc:1 "Technologischer Fortschritt ist unerlässlich, wenn wir wollen, dass unsere Streitkräfte über die moderne Ausrüstung verfügen, mit der sie unseren Feinden begegnen können. Wir müssen mit unseren Verbündeten zusammenarbeiten, um sicherzustellen, dass wir insbesondere im militärischen Bereich einen kontinuierlichen wissenschaftlichen Fortschritt erzielen."
 ITA_special_brigades:0 "Spezialbrigaden"
 ITA_special_brigades_desc:1 "Wir werden spezielle Angriffsbrigaden bilden, die in der Lage sind, unsere Militäreinheiten bei größeren Offensiven im Kampf zu unterstützen. Diese Brigaden werden aus Milizionären bestehen, die sich in ihren Einheiten ausgezeichnet haben."
 ITA_defend_the_land:0 "Verteidige das Land"
 ITA_defend_the_land_desc:1 "Die Sowjetunion und ihre Politik haben das Proletariat und die marxistische Ideologie im Stich gelassen. Das italienische Volk wird seinen eigenen Weg zum Kommunismus gehen, einen Weg voller Hindernisse und Bedrohungen, die wir überwinden müssen, aber hoffentlich auch mit Kameraden und Verbündeten, die sich gegenseitig helfen."
 ITA_united_anarchist_confederations:0 "Vereinigte Anarchistische Konföderationen"
 ITA_united_anarchist_confederations_desc:1 "Wir müssen die Zusammenarbeit spanischer und anderer Anarchisten weltweit in unserem Kampf gegen Faschismus und Kapitalismus suchen. Wir werden eine Große Kooperationskommission gründen, um Aktivisten, Intellektuelle und Freiheitskämpfer aus aller Welt unterzubringen."
 ITA_the_fight_against_stalinism:0 "Der Kampf gegen den Stalinismus"
 ITA_the_fight_against_stalinism_desc:1 "Leider sind Kapitalismus und Faschismus nicht die einzigen Feinde, denen wir uns stellen müssen. Die Anhänger der stalinistischen Doktrin sehen unsere Regierung und unser Land als Bedrohung ihrer Interessen und sind bereit, uns mit allen Mitteln zu zerstören. Wir können nicht untätig auf ihren Angriff warten, wir müssen als Erste zuschlagen!"
 ITA_raise_the_peoples:0 "Erhebe die Völker"
 ITA_raise_the_peoples_desc:1 "Es gibt viele tapfere italienische Bauern, die bereit sind, für unsere Ideale zu kämpfen. Mit ihnen können wir weitere Einheiten der Rothemden bilden, um unsere Streitkräfte zu verstärken."
 ITA_il_sol_dell_avvenire:0 "Il Sol dell&#39;Avvenire"
 ITA_il_sol_dell_avvenire_desc:1 "Es ist Zeit, einen neuen italienischen Staat auszurufen, die Italienische Nationalunion, in der alle Bürger vor dem Staat frei und gleich sind. \nDie Sonne der Zukunft wird in Italien aufgehen!"
 ITA_italian_socialism:0 "Italienischer Sozialismus"
 ITA_italian_socialism_desc:1 "Der Weg zum Sozialismus steht uns offen. Es ist an der Zeit, ihn mit der Entschlossenheit zu beschreiten, innerhalb unserer Grenzen eine gerechte Gesellschaft zu erreichen und außerhalb dieser den internationalen Status zu erlangen, den die Italienische Republik verdient."
 ITA_cooperate_with_the_mafia:0 "Kooperiere mit der Mafia"
 ITA_cooperate_with_the_mafia_desc:1 "Die während des Bürgerkriegs stark expandierenden Mafiaorganisationen könnten eine Chance darstellen, die Leistungsfähigkeit privater und staatlicher Unternehmen in ihren Gebieten zu verbessern, wenn wir bereit sind, ihnen bestimmte Privilegien und Zugeständnisse zu gewähren."
 ITA_mafia_abroad:0 "Mafia im Ausland"
 ITA_mafia_abroad_desc:1 "Der Einfluss der Mafiafamilien, mit denen wir Abkommen haben, wächst nicht nur in Italien, sondern auch im Ausland. Wir müssen mit ihnen verbundene Agenten in die großen kapitalistischen Mächte schicken, wo ihre Geschäfte im Dienste unserer Interessen florieren können."
 ITA_empower_the_unions:0 "Stärkung der Gewerkschaften"
 ITA_empower_the_unions_desc:1 "Die italienische Arbeiterklasse verfügt über großes Potenzial. Wir müssen sicherstellen, dass die Gewerkschaften die Mittel und die Autorität haben, die Erwerbsbevölkerung unseres Landes zu regulieren und zu optimieren."
 ITA_production_lines:0 "Produktionslinien"
 ITA_production_lines_desc:1 "Es ist an der Zeit, unsere wichtigsten Produktionslinien zu erweitern und zu modernisieren, um sicherzustellen, dass unsere Streitkräfte die Vorräte und Ausrüstung erhalten, die sie benötigen, um weiterhin mit Höchstleistung operieren zu können."
 ITA_the_republics_leadership:0 "Die Führung der Republik"
 ITA_the_republics_leadership_desc:1 "Wir müssen die richtige Partei und den richtigen politischen Führer wählen, um die junge Italienische Republik in die sozialistische Gesellschaft zu führen, die unser Volk verdient. Sowohl Ferrucio Parri als auch Ivanoe Bonomi scheinen würdige Kandidaten zu sein, die für diese Aufgabe bestens qualifiziert sind."
 ITA_bring_back_exiled_intellectuals:0 "Bringt verbannte Intellektuelle zurück"
 ITA_bring_back_exiled_intellectuals_desc:1 "Das faschistische Regime zwang unzählige italienische Bürger ins Exil, darunter große Philosophen, Intellektuelle und Wissenschaftler. Es ist an der Zeit, all diesen Flüchtlingen die Möglichkeit zur Rückkehr in ihre Heimat zu bieten."
 ITA_social_stability:0 "Soziale Stabilität"
 ITA_social_stability_desc:1 "Wir haben die Schrecken des Bürgerkriegs hinter uns gelassen, unsere Gesellschaft ist heute gerechter und egalitärer, und obwohl wir bis zum Sozialismus noch einen langen Weg vor uns haben, können wir mit Stolz sagen, dass das italienische Volk endlich sozialen Frieden erreicht hat."
 ITA_aid_for_the_spanish_republic:0 "Hilfe für die Spanische Republik"
 ITA_aid_for_the_spanish_republic_desc:1 "Wir müssen unseren spanischen Genossen im Bürgerkrieg helfen. Ihre sozialistische Republik wird von blutrünstigen spanischen Generälen belagert, die dem Staat, den sie nun verwüsten, die Treue geschworen haben, unterstützt von den großen faschistischen Mächten Europas."
 ITA_italia_libera:0 "Italia Libera"
 ITA_italia_libera_desc:1 "Wir müssen die Initiative ergreifen und den befreundeten Nachbarregierungen vorschlagen, in Europa ein Bündnis zu bilden, das es uns ermöglicht, zusammenzuarbeiten und uns gegen die vielfältigen Bedrohungen zu verteidigen, die uns umgeben."
 ITA_european_democracies:0 "Europäische Demokratien"
 ITA_european_democracies_desc:1 "Wir müssen unsere Politik der Solidarität und Zusammenarbeit zwischen den demokratischen Ländern Europas fortsetzen. Durch Diplomatie können wir ein starkes Bündnis bilden, das allen anderen standhalten kann."
 ITA_peace_preservation:0 "Friedenserhaltung"
 ITA_peace_preservation_desc:1 "In diesen Zeiten der Instabilität und internationalen Konflikte ist nur das italienische Volk der Aufgabe gewachsen, den Frieden in Europa zu bewahren und durchzusetzen."
 ITA_scientific_cooperation:0 "Wissenschaftliche Zusammenarbeit"
 ITA_scientific_cooperation_desc:1 "Wir müssen ein Programm wissenschaftlicher Zusammenarbeit entwickeln, um sicherzustellen, dass wir mit den technologischen Fortschritten anderer Weltmächte Schritt halten."
 ITA_secure_the_borders:0 "Sichern Sie die Grenzen"
 ITA_secure_the_borders_desc:1 "Angesichts der zunehmenden internationalen Spannungen muss jedes Land, das nicht mit uns verbündet ist, als potenziell feindlich betrachtet werden. Wir müssen unsere Grenzen so schnell wie möglich verstärken und besetzen, um eine Invasion zu verhindern und zu stoppen."
 ITA_bring_down_fascist_strongholds:0 "Zerstört faschistische Hochburgen"
 ITA_bring_down_fascist_strongholds_desc:1 "Angesichts der kritischen Lage in Europa können wir nicht warten, bis die aggressiven faschistischen Mächte eine Offensive gegen uns starten. Wer zuerst zuschlägt, schlägt am besten. Deshalb werden wir sicherstellen, dass wir die Faschisten zuerst und hart treffen."
 ITA_reestablish_old_alliances:0 "Alte Allianzen wiederherstellen"
 ITA_reestablish_old_alliances_desc:1 "Wir müssen versuchen, das Bündnis, das wir im Ersten Weltkrieg geschlossen haben, zu erneuern. Nur gemeinsam mit den großen demokratischen Mächten Europas werden wir in der Lage sein, die vielen Bedrohungen zu überwinden, die auf uns lauern."
 ITA_military_agreements:0 "Militärabkommen"
 ITA_military_agreements_desc:1 "Wir können viel von unseren Verbündeten lernen und müssen ihnen den Vorschlag unterbreiten, ein Programm für die militärische und technologische Zusammenarbeit zu entwickeln."
 ITA_the_enemies_of_capitalism:0 "Die Feinde des Kapitalismus"
 ITA_the_enemies_of_capitalism_desc:1 "Der sowjetische Kommunismus stellt eine große Bedrohung für ganz Europa und damit auch für den italienischen Staat dar. Es ist an der Zeit, sich um ihn zu kümmern."
 ITA_the_ethiopian_question:0 "Die Äthiopienfrage"
 ITA_the_ethiopian_question_desc:1 "Der Krieg in Äthiopien war brutal und ungerecht. Wir müssen die von den Faschisten im Land verübten Gräueltaten wiedergutmachen und mit den lokalen Behörden Kontakt aufnehmen, um eine Versöhnung herbeizuführen."
 ITA_abolish_the_colonies:0 "Die Kolonien abschaffen"
 ITA_abolish_the_colonies_desc:1 "Wir werden einen revolutionären Plan zur Abschaffung des Koloniestatus für alle Regionen Italiens entwickeln und vorlegen. Zum ersten Mal in der Geschichte unseres Landes werden die Bürger der betroffenen Regionen die Möglichkeit haben, über ihr Schicksal zu entscheiden. Es liegt an uns, ihnen die Vorteile einer legitimen Provinz des italienischen Staates aufzuzeigen."
 ITA_cooperatives_for_intensive_exploitation:0 "Genossenschaften für intensive Ausbeutung"
 ITA_cooperatives_for_intensive_exploitation_desc:1 "Afrika ist ein reicher Kontinent mit großen Rohstoffvorkommen. Wir sollten in die Verbesserung unserer Methoden zur Ausbeutung dieser Vorkommen investieren, um sie optimal zu nutzen."
 ITA_condemn_colonialism:0 "Verurteilen Sie den Kolonialismus"
 ITA_condemn_colonialism_desc:1 "Es ist an der Zeit, den Kolonialismus zu verurteilen und die europäischen Mächte, die die afrikanische Bevölkerung seit zahllosen Jahren unterdrücken, aufzufordern, sich zu wehren. Und wenn es hart auf hart kommt, werden wir zum Wohle der afrikanischen Bevölkerung gegen sie kämpfen."
 ITA_new_colonial_policies:0 "Neue Kolonialpolitik"
 ITA_new_colonial_policies_desc:1 "Viel zu lange hat das faschistische Regime die lokale Bevölkerung in den Kolonien misshandelt. Es ist an der Zeit, unsere Kolonialpolitik zu überdenken, diesen Regionen eine gewisse Autonomie zu gewähren und das in der Vergangenheit verursachte Unrecht zu korrigieren."
 ITA_negotiations_with_albania:0 "Verhandlungen mit Albanien"
 ITA_negotiations_with_albania_desc:1 "Die Geschichte Albaniens wurde in den letzten Jahrzehnten stark von Italien beeinflusst. Nachdem wir das autoritäre faschistische Regime hinter uns gelassen haben, sollten wir der albanischen Regierung vorschlagen, die Beziehungen zwischen unseren Nationen zu stärken und sogar die Möglichkeit einer Integration der albanischen Verwaltung in unsere eigene in Betracht zu ziehen, um beide Länder formell zu vereinen."
 ITA_enlist_the_bashkimi_kombetar:0 "Rekrutieren Sie den Bashkimi Kombëtar"
 ITA_enlist_the_bashkimi_kombetar_desc:1 "Zahlreiche Bürger Albaniens, die unserer Regierung und Ideologie wohlgesonnen sind und sich den Rothemden anschließen möchten, sollten einen neuen Zweig unserer Freiwilligenmilizen gründen, um aus diesen Rekruten neue Einheiten zu bilden."
 ITA_the_italian_confederation:0 "Die italienische Konföderation"
 ITA_the_italian_confederation_desc:1 "Nachdem wir unsere Kolonialpolitik überprüft haben, müssen wir als nächsten Schritt eine Konföderation gründen, die alle aus diesem Entkolonialisierungsprozess hervorgegangenen Staaten umfasst und als Rahmen für die Zusammenarbeit und den gegenseitigen Nutzen unserer Nationen dienen soll."
 ITA_planned_economy:0 "Planwirtschaft"
 ITA_planned_economy_desc:1 "Vertreter unserer neuen Konföderation haben eine Wirtschaftsinitiative vorgeschlagen, die ihrer Ansicht nach eine effiziente und nachhaltige Regulierung und Ankurbelung der Volkswirtschaften aller Mitgliedsstaaten ermöglichen wird."
 ITA_the_fight_overseas:0 "Der Kampf in Übersee"
 ITA_the_fight_overseas_desc:1 "Es ist an der Zeit, die Verteidigung zu stärken und die Logistik für die Unterstützung großer Militäreinsätze auf dem afrikanischen Kontinent vorzubereiten. Wir werden spezielle Trainingstechniken für unsere Truppen und Marinen entwickeln, damit sie unter den vielen schwierigen Bedingungen, denen sie ausgesetzt sein werden, optimale Leistungen erbringen können."
 ITA_irregulars:0 "Irregulars"
 ITA_irregulars_desc:1 "Irreguläre Truppen spielen im Afrika-Einsatz eine Schlüsselrolle. Wir müssen die Rekrutierung aus der lokalen Bevölkerung erhöhen und die Ausbildung dieser Einheiten verbessern."
 ITA_liberate_the_workers_of_africa:0 "Befreit die Arbeiter Afrikas"
 ITA_liberate_the_workers_of_africa_desc:1 "Es ist an der Zeit, die afrikanische Bevölkerung ein für alle Mal von den verschiedenen Regierungen zu befreien, die sie unterdrücken!"
 ITA_ascari:0 "Ascari"
 ITA_ascari_desc:1 "Reguläre Divisionen, die aus einheimischen Truppen aus Afrika bestehen, haben sich bei der Erfüllung verschiedener Aufgaben als äußerst effizient erwiesen, nicht nur als Garnisonen oder Reserven, sondern auch bei militärischen Operationen in schwierigem Gelände, wo andere Divisionen Schwierigkeiten hätten."

 ITA_modify_ricostruzione_industriale_dynamic_modifier_ns_intro:0 "Ändern Sie §Y$ITA_ricostruzione_industriale_dynamic_modifier$§! von"
