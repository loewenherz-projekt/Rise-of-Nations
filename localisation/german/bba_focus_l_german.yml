 ITA_flotta_d_evasione_dockyards_tt:1 "\nBestimmte Staaten in §YNordafrika§!, §YWestküste der Iberischen Halbinsel§! und §YWestküste Frankreichs§! erhalten ebenfalls §Y1 $Werft$§!, solange sie vollständig von §Y[ROOT.GetFlag][ROOT.GetName]§! oder einem §Y[ROOT.GetAdjective]-Untertan§! kontrolliert werden."
 ITA_the_abyssinian_fiasco_completion_tt:2 "Kann automatisch abgeschlossen werden, nachdem die Missionen §Y$ITA_conquer_the_north_mission$§! und §Y$ITA_conquer_the_south_mission$§!, herausgegeben von $ITA_benito_mussolini$ im Januar 1936, fehlgeschlagen sind.\n"
 ITA_solid_progress_completion_tt:1 "Wird automatisch abgeschlossen, nachdem sowohl die Missionen §Y$ITA_conquer_the_north_mission$§! als auch §Y$ITA_conquer_the_south_mission$§! erfolgreich abgeschlossen wurden, die im Januar 1936 von $ITA_benito_mussolini$ herausgegeben wurden.\n"
 ITA_topple_amhara_rulers_event_chain_tt:0 "\nStartet die Ereigniskette „Lokale Herrscher wenden sich an italienische Beamte“ und ermöglicht es uns, die Einhaltung der Vorschriften zu verbessern oder in einigen äthiopischen Staaten ein italienisches Staatsbürgertum zu etablieren, wenn wir dies wünschen."
