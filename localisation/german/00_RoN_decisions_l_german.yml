FIN_the_molotov_cocktail:0 "Der Molotowcocktail"
FIN_the_molotov_cocktail_desc:0 "Die nationalistischen Spanier begannen, Brandbomben aus Flaschen und Benzin als Panzerabwehrwaffe gegen die republikanischen Panzer einzusetzen. Jetzt kämpfen wir gegen einen stärkeren Feind, daher wird es sich als nützlich erweisen, ihre Idee zu kopieren."

