JAP_whispers_in_nagoya:0 "Flüstern in Nagoya"
JAP_whispers_in_nagoya_desc:0 "Obwohl sie sich in ihrem Hass auf den zunehmenden Militarismus Japans einig sind, misstrauen Kommunisten, Anarchisten, Sozialisten und Liberale einander. Tatsächlich kam es bereits zu Kämpfen zwischen Anarchisten und Kommunisten sowie zu Säuberungen von Liberalen, da diese als „potenziell konterrevolutionär“ gelten. \n\nIn Nagoya, der provisorischen Hauptstadt des linken Aufstands, sind nun Gerüchte und Flüsterer zu hören. Es heißt, politische Elemente planten derzeit die Ermordung von Kyuichi Tokuda, doch im Moment sind dies nur Gerüchte und Flüsterer …"
