GER_INT_fascism_rise:0 "Aufstieg des Faschismus"
GER_INT_fascism_rise_desc:0 "Inmitten wirtschaftlicher Turbulenzen und politischer Instabilität gewinnt der Faschismus in Deutschland an Boden. Faschistische Führer nutzen die Unzufriedenheit der Bevölkerung aus und versprechen Nationalstolz und Ordnung inmitten des Chaos. Mit charismatischen Reden, dem Sündenbockprinzip für Minderheiten und nationalistischer Begeisterung werben sie um Unterstützung. Die faschistische Bewegung gewinnt Anhänger unter desillusionierten Veteranen, frustrierten Arbeitern und Menschen, die Angst vor dem Kommunismus haben. Straßengewalt, paramilitärische Gruppen und aggressive Propagandakampagnen tragen zu ihrem wachsenden Einfluss bei. Während das Land unter sozialen Unruhen und wirtschaftlicher Verzweiflung leidet, wächst die Anziehungskraft autoritärer Lösungen und ebnet den Weg für den Aufstieg der Faschisten."
GER_INT_communism_rise:0 "Aufstieg des Kommunismus"
GER_INT_communism_rise_desc:0 "Inmitten weit verbreiteter wirtschaftlicher Not und sozialer Ungleichheit gewinnt der Kommunismus in Deutschland an Bedeutung. Die Anführer der „Kommunisten“ mobilisieren Arbeiter und Intellektuelle und treten für eine klassenlose Gesellschaft und wirtschaftliche Gerechtigkeit ein. Sie organisieren Streiks, Proteste und Untergrundaktivitäten, um der kapitalistischen Ausbeutung entgegenzutreten. Die „Kommunisten“-Bewegung zieht entrechtete Arbeiter an, die vom Versagen des Kapitalismus desillusioniert sind und radikale Veränderungen anstreben. Ihre Botschaft der Solidarität und des Widerstands gegen den Faschismus findet in urbanen Zentren und Industriezentren Anklang. Trotz staatlicher Repressionen und gewaltsamer Opposition bleiben die „Kommunisten“ bestehen und drängen auf revolutionäre Umwälzungen und gesellschaftlichen Wandel."
GER_INT_political_clashes:0 "Politische Auseinandersetzungen"
GER_INT_political_clashes_desc:0 "Das Deutschland der Zwischenkriegszeit ist geprägt von heftigen politischen Auseinandersetzungen zwischen rivalisierenden Fraktionen. Kommunisten und Faschisten liefern sich erbitterte Konfrontationen, in denen jeder versucht, dem Land seine Ideologie aufzuzwingen. Auf den Straßen bricht Gewalt aus, wenn paramilitärische Gruppen aufeinandertreffen. Schlachten und Scharmützel prägen das Stadtbild. Politische Kundgebungen eskalieren häufig zu Straßenkämpfen, da ideologische Differenzen in körperliche Auseinandersetzungen umschlagen. Die Regierung kämpft darum, die Ordnung aufrechtzuerhalten und ist hin- und hergerissen zwischen der Unterdrückung radikaler Bewegungen und der Zulassung politischer Meinungsäußerung. Inmitten dieses Aufruhrs geraten Zivilisten ins Kreuzfeuer und ertragen Angst und Unsicherheit, während sich der Kampf um die Vorherrschaft entfaltet."

SPR_Puppet_decisions_desc:0 "Ein Kolonialreich ist eine Ansammlung von Gebieten (oft Kolonien genannt), die entweder an das Zentrum des Reiches angrenzen oder sich in Übersee befinden, von der Bevölkerung eines bestimmten Staates besiedelt und von diesem Staat regiert werden."
SPR_form_viceroyalty_of_new_spain_desc:0 "Neuspanien, offiziell das Vizekönigreich Neuspanien oder Königreich Neuspanien, war eine integrale territoriale Einheit des spanischen Reiches, die während der spanischen Kolonialisierung Amerikas vom habsburgischen Spanien gegründet wurde. Es umfasste ein riesiges Gebiet, das das heutige Mexiko, weite Teile des amerikanischen Südwestens und Kaliforniens in Nordamerika, Mittelamerika, die nördlichen Teile Südamerikas sowie mehrere Inselgruppen im Pazifischen Ozean, nämlich die Philippinen und Guam, umfasste."
SPR_form_spanish_west_indies_desc:0 "Spanisch-Westindien oder Spanische Antillen waren spanische Kolonien in der Karibik. Im spanischen Reich umfasste der Begriff „Indien“ alle Überseegebiete und wurde vom 1524 gegründeten Indischen Rat mit Sitz in Spanien verwaltet. Als die Krone 1535 das Vizekönigreich Neuspanien gründete, unterstanden die karibischen Inseln seiner Gerichtsbarkeit."
SPR_form_viceroyalty_of_new_granada_desc:0 "Das Vizekönigreich Neugranada, auch Vizekönigreich des Neuen Königreichs Granada oder Vizekönigreich Santafé genannt, war der am 27. Mai 1717 vergebene Name für die Gerichtsbarkeit des spanischen Kaiserreichs im Norden Südamerikas, die dem heutigen Kolumbien, Ecuador, Panama und Venezuela entspricht. Es wurde 1717 von König Philipp V. im Rahmen einer neuen territorialen Kontrollpolitik geschaffen, 1723 wegen finanzieller Probleme suspendiert und 1739 wiederhergestellt, bis es 1810 im Zuge der Unabhängigkeitsbewegung erneut suspendiert wurde. Das Panama entsprechende Gebiet wurde später im Jahr 1739 eingemeindet, und die Provinzen Venezuelas wurden 1777 vom Vizekönigreich abgetrennt und dem Generalkapitän von Venezuela zugeteilt. Zusätzlich zu diesen Kerngebieten umfasste das Gebiet des Vizekönigreichs Neugranada Guyana, Trinidad und Tobago, den Südwesten Surinams, Teile Nordwestbrasiliens und Nordperu."
SPR_form_viceroyalty_of_peru_desc:0 "Das Vizekönigreich Peru war ein 1542 gegründeter spanischer Provinzverwaltungsbezirk, der ursprünglich das heutige Peru und den größten Teil des spanischen Reiches in Südamerika umfasste und von der Hauptstadt Lima aus regiert wurde. Peru war vom 16. bis zum 18. Jahrhundert eines der beiden spanischen Vizekönigreiche in Amerika."
SPR_form_captaincy_general_of_chile_desc:0 "Das Gouvernement Chile war von 1541 bis 1818 ein Gebiet des spanischen Kaiserreichs und gehörte die meiste Zeit zum Vizekönigreich Peru. Es umfasste den größten Teil des heutigen Chile und südliche Teile Argentiniens. Die Hauptstadt war Santiago de Chile. 1818 erklärte sich Chile unabhängig und wurde zur Republik Chile. Im Laufe seiner langen Geschichte hatte Chile mehrere spanische Gouverneure und mehrere Könige."
SPR_form_viceroyalty_of_rio_de_la_plata_desc:0 "Das Vizekönigreich des Río de la Plata (in einigen wissenschaftlichen Schriften auch „Vizekönigreich des Río de la Plata“ genannt) war das letzte der Vizekönigreiche des spanischen Reiches in Amerika, das gegründet wurde, und hatte auch die kürzeste Lebensdauer."
POR_form_viceroyalty_of_brazil_desc:0 "Das koloniale Brasilien umfasst die Zeit von der Ankunft der Portugiesen im Jahr 1500 bis 1815, als Brasilien durch die Union mit Portugal zum Vereinigten Königreich Portugal, Brasilien und den Algarven erhoben wurde. In den ersten 300 Jahren brasilianischer Kolonialgeschichte basierte die wirtschaftliche Ausbeutung des Gebiets zunächst auf dem Abbau von Brasilholz (Pau Brazil) (16. Jahrhundert), dem das Gebiet seinen Namen verdankt; der Zuckerproduktion (16.–18. Jahrhundert) und schließlich dem Gold- und Diamantenabbau (18. Jahrhundert). Sklaven, insbesondere aus Afrika, stellten nach einer kurzen Phase der Versklavung von Indianern zum Fällen von Brasilholz den Großteil der Arbeitskräfte der brasilianischen Exportwirtschaft."
RUA_form_russian_america_desc:0 "Russisch-Amerika war der Name der russischen Kolonialgebiete in Nordamerika (insbesondere Alaska) von 1799 bis 1867. Die Hauptstadt war Nowo-Archangelsk (Neu-Archangelsk), das heutige Sitka. Siedlungen gab es hauptsächlich in Alaska, aber auch in Teilen des heutigen Kaliforniens und mit drei Forts auf Hawaii. Die formelle Eingliederung der Besitzungen in Russland erfolgte erst mit dem Ukas von 1799, der der Russisch-Amerikanischen Kompanie ein Monopol einräumte und der Russisch-Orthodoxen Kirche bestimmte Rechte an den neuen Besitzungen zusprach. Viele der Besitzungen wurden im 19. Jahrhundert aufgegeben. 1867 verkaufte Russland seine letzten verbliebenen Besitzungen für 7,2 Millionen Dollar an die Vereinigten Staaten."
ENG_form_thirteen_colonies_desc:0 "Die Dreizehn Kolonien, auch bekannt als die Dreizehn Britischen Kolonien oder die Dreizehn Amerikanischen Kolonien, waren eine Gruppe britischer Kolonien an der Atlantikküste Nordamerikas. Sie wurden im 17. und 18. Jahrhundert gegründet, erklärten 1776 ihre Unabhängigkeit und bildeten gemeinsam die Vereinigten Staaten von Amerika."
ENG_form_british_north_america_desc:0 "Britisch-Amerika umfasste die Kolonialgebiete des Britischen Empires in Amerika von 1607 bis 1783. Diese Kolonien waren offiziell als Britisch-Amerika und Britisch-Westindien bekannt, bevor die Dreizehn Kolonien im Amerikanischen Unabhängigkeitskrieg (1775–1783) ihre Unabhängigkeit erklärten und die Vereinigten Staaten von Amerika gründeten."
FRA_form_french_louisiana_desc:0 "Louisiana war ein Verwaltungsbezirk Neufrankreichs. Unter französischer Herrschaft von 1682 bis 1769 und von 1801 bis 1803 wurde das Gebiet vom französischen Entdecker René-Robert Cavelier, Sieur de la Salle, zu Ehren von König Ludwig XIV. benannt. Ursprünglich umfasste es ein ausgedehntes Gebiet, das den größten Teil des Einzugsgebiets des Mississippi umfasste und sich von den Großen Seen bis zum Golf von Mexiko und von den Appalachen bis zu den Rocky Mountains erstreckte."
FRA_form_new_france_desc:0 "Neufrankreich war das von Frankreich kolonisierte Gebiet in Nordamerika, beginnend mit der Erkundung des Sankt-Lorenz-Golfs durch Jacques Cartier im Jahr 1534 und endend mit der Abtretung Neufrankreichs an Großbritannien und Spanien im Jahr 1763 im Rahmen des Vertrags von Paris (1763)."
SPR_partition_of_america_desc:0 "Obwohl die Nordmänner den Nordosten Nordamerikas bereits um 1000 n. Chr. erkundet und kolonisiert hatten, fand zwischen 1500 und 1800 n. Chr., während des Zeitalters der Entdeckungen, eine spätere und bekanntere Welle europäischer Kolonisierung Amerikas statt. In dieser Zeit begannen mehrere europäische Imperien – vor allem Spanien, Portugal, Großbritannien und Frankreich – die natürlichen Ressourcen und das Humankapital Amerikas zu erforschen und für sich zu beanspruchen, was zur Vertreibung und Auflösung einiger indigener Völker und zur Gründung mehrerer Siedlerkolonialstaaten führte. Einige ehemals europäische Siedlerkolonien – darunter New Mexico, Alaska, die Prärien/nördlichen Great Plains und die „Nordwest-Territorien“ in Nordamerika; der Isthmus von Tehuantepec, die Halbinsel Yucatán und die Darién-Lücke in Mittelamerika; und der nordwestliche Amazonas, die zentralen Anden und die Guyanas in Südamerika – sind bis ins 21. Jahrhundert hinein relativ ländlich, dünn besiedelt und indigen, doch mehrere Siedlerkolonialstaaten, darunter Brasilien, Kolumbien, Mexiko, Argentinien und die Vereinigten Staaten, entwickelten sich zu eigenständigen Siedlerkolonialreichen. Russland begann Mitte des 18. Jahrhunderts mit der Kolonisierung des pazifischen Nordwestens auf der Suche nach Fellen für den Pelzhandel. Viele der sozialen Strukturen – darunter Religionen, politische Grenzen und Linguae francae –, die im 21. Jahrhundert in der westlichen Hemisphäre vorherrschen, sind Nachkommen der Strukturen, die in dieser Zeit etabliert wurden."
SPR_give_louisiana_to_new_spain_desc:0 "Spanisch-Louisiana war von 1762 bis 1801 ein Gouvernement und Verwaltungsbezirk des Vizekönigreichs Neuspanien. Es umfasste ein riesiges Gebiet im Zentrum Nordamerikas, das das westliche Becken des Mississippi sowie New Orleans umfasste. Ursprünglich hatte Frankreich das Gebiet beansprucht und kontrolliert und es 1682 zu Ehren von König Ludwig XIV. La Louisiane genannt. Gegen Ende des Siebenjährigen Krieges erwarb Spanien das Gebiet heimlich von Frankreich gemäß den Bedingungen des Vertrags von Fontainebleau (1762). Die tatsächliche Machtübergabe verlief langsam, und nachdem Spanien 1767 schließlich versuchte, die französische Macht in New Orleans vollständig zu ersetzen, inszenierten die französischen Einwohner einen Aufstand, den der neue spanische Kolonialgouverneur erst 1769 niederschlug. Spanien nahm Ende der 1760er Jahre auch den Handelsposten St. Louis und ganz Ober-Louisiana in Besitz, obwohl die spanische Präsenz in den weiten Gebieten des „Illinois Country“ gering war."
ENG_give_indian_reserve_to_thirteen_colonies_desc:0 "„Indianerreservat“ ist ein historischer Begriff für das weitgehend unbesiedelte Land in Nordamerika, das von Frankreich beansprucht, am Ende des Siebenjährigen Krieges – auch als Franzosen- und Indianerkrieg bekannt – durch den Vertrag von Paris (1763) an Großbritannien abgetreten und in der Königlichen Proklamation von 1763 den First Nations zugesprochen wurde. Die britische Regierung hatte erwogen, in dem Teil des Reservats westlich der Appalachen, begrenzt durch die Flüsse Ohio und Mississippi sowie die Großen Seen, einen Indianer-Barrierestaat zu errichten. Britische Beamte strebten die Gründung eines solchen Staates auch noch an, nachdem die Region im Vertrag von Paris (1783) zur Beendigung des Amerikanischen Unabhängigkeitskriegs den Vereinigten Staaten zugesprochen worden war. Sie gaben ihre Bemühungen jedoch 1814 auf, nachdem sie im Krieg von 1812 die militärische Kontrolle über die Region verloren hatten."
SPR_demand_florida_desc:0 "Spanisch-Florida war der erste große europäische Landanspruch und Siedlungsversuch in Nordamerika während des europäischen Zeitalters der Entdeckungen. Während der spanischen Kolonialisierung Amerikas war La Florida Teil des Generalkapitäns von Kuba, des Vizekönigreichs Neuspanien und des spanischen Kaiserreichs. Obwohl seine Grenzen nie klar oder formal definiert wurden, war das Gebiet anfangs viel größer als der heutige Bundesstaat Florida und erstreckte sich über weite Teile des heutigen Südostens der Vereinigten Staaten, einschließlich des gesamten heutigen Florida sowie Teilen von Georgia, Alabama, Mississippi, North Carolina, South Carolina und Louisiana. Spaniens Anspruch auf dieses riesige Gebiet stützte sich auf mehrere groß angelegte Expeditionen im 16. Jahrhundert. Im 16. und in geringerem Umfang auch im 17. Jahrhundert existierten zahlreiche Missionen, Siedlungen und kleine Festungen; sie wurden schließlich aufgrund des Drucks der expandierenden englischen und französischen Kolonialsiedlungen, des Zusammenbruchs der einheimischen Bevölkerung und der allgemeinen Schwierigkeiten, landwirtschaftlich oder wirtschaftlich autark zu werden, aufgegeben. Im 18. Jahrhundert erstreckte sich die spanische Kontrolle über La Florida nicht viel weiter als auf eine Handvoll Forts in der Nähe von St. Augustine, St. Marks und Pensacola, die alle innerhalb der Grenzen des heutigen Florida lagen."
FRA_demand_quebec_desc:0 "Neufrankreich war das von Frankreich kolonisierte Gebiet in Nordamerika, beginnend mit der Erkundung des Sankt-Lorenz-Golfs durch Jacques Cartier im Jahr 1534 und endend mit der Abtretung Neufrankreichs an Großbritannien und Spanien im Jahr 1763 im Rahmen des Vertrags von Paris (1763)."
AUS_fate_of_italy_desc:0 "Italien teilen"
FRA_fate_of_italy_desc:0 "Italien teilen"
AUS_fate_of_spanish_north_america_desc:0 "Neuspanien, offiziell das Vizekönigreich Neuspanien oder Königreich Neuspanien, war eine integrale territoriale Einheit des spanischen Reiches, die während der spanischen Kolonialisierung Amerikas vom habsburgischen Spanien gegründet wurde. Es umfasste ein riesiges Gebiet, das das heutige Mexiko, weite Teile des amerikanischen Südwestens und Kaliforniens in Nordamerika, Mittelamerika, die nördlichen Teile Südamerikas sowie mehrere Inselgruppen im Pazifischen Ozean, nämlich die Philippinen und Guam, umfasste."
AUS_create_habsburg_netherlands_desc:0 "Die Habsburger Niederlande, lateinisch Belgica, sind die Sammelbezeichnung für die Lehen des Hauses Habsburg in den Niederlanden aus der Renaissancezeit. Die Herrschaft begann 1482 mit dem Tod der letzten Herrscherin der Niederlande aus Valois-Burgund, Maria, Ehefrau von Maximilian I. von Österreich. Ihr Enkel, Kaiser Karl V., wurde in den Habsburger Niederlanden geboren und machte Brüssel zu einer seiner Hauptstädte."

