SHX_second_chinese_civil_war_desc:0 "Jetzt, da die Regierung von Nanjing geschwächt ist, ist dies unsere Chance, dem ein Ende zu setzen, was sie 1927 begonnen hat. Die Gefallenen von Shanghai sollen gerächt werden!"
