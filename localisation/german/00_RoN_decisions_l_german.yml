RON_Create_Triple_Entente:0 "Entente-Fraktion gründen"
RON_Create_Triple_Entente_desc:0 "Die Triple Entente bezeichnet die informelle Verständigung zwischen dem Russischen Reich, der Dritten Französischen Republik und Großbritannien. Sie baute auf dem französisch-russischen Bündnis von 1894, der Entente Cordiale zwischen Paris und London von 1904 und der englisch-russischen Entente von 1907 auf. Sie bildete ein mächtiges Gegengewicht zum Dreibund zwischen Deutschland, Österreich-Ungarn und Italien. Im Gegensatz zum Dreibund oder dem französisch-russischen Bündnis selbst war die Triple Entente kein Bündnis der gegenseitigen Verteidigung."
RON_Create_Central_Powers:0 "Erstellen Sie eine Fraktion der Mittelmächte"
RON_Create_Central_Powers_desc:0 "Die Mittelmächte, auch Mittelreiche genannt, waren eine der beiden wichtigsten Koalitionen im Ersten Weltkrieg (1914–1918). Sie bestanden aus Deutschland, Österreich-Ungarn, dem Osmanischen Reich und Bulgarien; daher wird sie auch als Quadrupelallianz bezeichnet."

