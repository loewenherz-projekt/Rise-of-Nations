JOS_caesar_and_brutus_desc:0 "Als Heo Im sich zum alleinigen Führer Koreas erklärte, begannen viele Politiker, ihn zu provozieren. Das wäre an sich kein großes Problem, wenn dies nicht die Aufmerksamkeit von Armeechef Lee Beom-seok erregt hätte, der sich der Opposition anschloss. Heo muss dem koreanischen Volk zeigen, dass er, wenn er schon ein Diktator ist, zumindest die Lage des Landes verbessern wird."
