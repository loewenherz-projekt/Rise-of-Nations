GXC_take_the_gui_river_desc:0 "Vorwärts! Wir müssen den Gui-Fluss einnehmen, bevor Lis Truppen ihn überqueren können!"
GXC_encircle_guilin:0 "Umzingeln Sie Guilin"
GXC_encircle_guilin_desc:0 "Nachdem wir Lis Truppen am Gui-Fluss besiegt hatten, rieten uns unsere Generäle, die nach Guilin zurückweichende Guangxi-Armee einzukreisen, und genau das werden wir tun."
GXC_shell_nanning:0 "Shell Nanning"
GXC_shell_nanning_desc:0 "Um einen Häuserkampf zu vermeiden, werden wir Nanning belagern, bis die verbleibenden Streitkräfte aus Guangxi kapitulieren."
GXC_victory_in_the_federalist_guangxi_war:0 "Sieg im Föderalistisch-Guangxi-Krieg"
GXC_victory_in_the_federalist_guangxi_war_desc:0 "Nachdem sich das verbleibende Guangxi-Korps ergeben hatte, erklärten wir unseren Sieg im Krieg und marschierten in Nanning ein, um den Verwundeten und Hungernden zu helfen. Berichte unseres Geheimdienstes deuteten darauf hin, dass Li Zongren und Bai Chongxi nach Yunnan geflohen waren, wo sie für uns kein Problem darstellen konnten."
