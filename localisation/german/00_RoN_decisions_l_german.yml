### RUSSIA
Russian_National_Movements:0 "Befreiung der Völker Russlands"
Russian_National_Movements_desc:0 "Das Komitee zur Befreiung der Völker Russlands (KONR) war ein Komitee, das sich aus militärischen und zivilen Nazi-Kollaborateuren aus den Gebieten der Sowjetunion (die meisten waren Russen) zusammensetzte. Es wurde am 14. November 1944 von Nazi-Deutschland in Prag, im Protektorat Böhmen und Mähren, gegründet (der Ort wurde bewusst gewählt, da es sich um eine slawische Stadt handelte, die noch unter der Kontrolle der Achsenmächte stand)."
RNM_Prague_Manifesto:0 "Prager Manifest"
RNM_Prague_Manifesto_desc:0 "Die Ziele des Komitees wurden in einem Dokument namens „Prager Manifest“ festgehalten. Die vierzehn Punkte des Manifests garantierten Rede-, Presse-, Religions- und Versammlungsfreiheit sowie das Selbstbestimmungsrecht aller ethnischen Gruppen in den zu Russland gehörenden Gebieten. Das Prager Manifest enthielt keine explizit antisemitische oder anderweitig rassistisch motivierte Rhetorik, was zu Konflikten mit vielen Nazi-Propagandisten führte. Die Präambel des Manifests enthielt jedoch Kritik an den Westalliierten (insbesondere den USA und Großbritannien). Vorsitzender des Komitees war General Andrej Wlassow, der auch die Russische Befreiungsarmee befehligte. Das Komitee galt als politischer Arm der Russischen Befreiungsarmee, obwohl es auch mehrere ukrainische und andere ethnische Kräfte vereinte, die antisowjetisch eingestellt waren."

