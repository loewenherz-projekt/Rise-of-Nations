 SOV_dismantle_big_business: "Dismantle Big Business"
 SOV_dismantle_big_business_desc: "The time has come to bring an end to the old capitalist institutions that have exploited the workers and peasants for too long. By dismantling large businesses and redistributing their resources, we can ensure that wealth flows directly to the people and solidify our revolutionary ideals."