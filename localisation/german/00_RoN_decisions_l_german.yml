AFG_swallowing_dust:0 "Unser letztes Gefecht"
AFG_swallowing_dust_desc:0 "Wenn der Kommunismus in Afghanistan etabliert wird, wird der Islam zerstört, so wie es die Sowjets vor Jahrzehnten mit seiner Religion taten. Wir dürfen uns nicht unterkriegen lassen, wir werden die Russen in den Staub stoßen!"
JAP_operation_nekka:0 "Operation Nekka"
JAP_operation_nekka_desc:0 "Die Operation Nekka ist eine wichtige japanische Militärkampagne in Nordostchina, die darauf abzielt, Japans Einfluss auszuweiten und strategische Gebiete zu sichern. Japan hat 100 Tage Zeit, um die Schlüsselregionen Shanghai, Shandong und Peking zu sichern. Werden diese Ziele nicht innerhalb der vorgegebenen Zeit erreicht, gilt die Operation als gescheitert, und die Armee befiehlt den Truppen, den Vormarsch zu stoppen. Der Erfolg dieser Kampagne ist entscheidend, um die Dynamik aufrechtzuerhalten und Japans militärische Stärke unter Beweis zu stellen. Es steht viel auf dem Spiel, denn die Sicherung dieser Gebiete verschafft nicht nur strategische Vorteile, sondern stärkt auch die Moral und das politische Ansehen des Landes."
JAP_the_army_awaits:0 "Die Armee wartet"
JAP_the_army_awaits_desc:0 "Seit Beginn der Hungersnot gibt es viele Gerüchte über einen Putsch, den Angehörige der Marine und der Armee planen. Ob dies stimmt, ist noch nicht bekannt. Die Regierung weiß jedoch, dass eine Unterstützung der Streitkräfte in diesen schwierigen Zeiten sie beruhigen könnte, auch wenn dies den Rest der Bevölkerung verärgert."
