RON_Wars_Early:0 "Kriege 1900-1932"
RON_Wars_Early_desc:0 "Krieg ist ein intensiver bewaffneter Konflikt zwischen Staaten, Regierungen, Gesellschaften oder paramilitärischen Gruppen wie Söldnern, Aufständischen und Milizen. Er ist im Allgemeinen durch extreme Gewalt, Aggression, Zerstörung und Tod gekennzeichnet, wobei sowohl reguläre als auch irreguläre Streitkräfte zum Einsatz kommen. Krieg bezeichnet die gemeinsamen Aktivitäten und Merkmale verschiedener Kriegsarten oder von Kriegen im Allgemeinen. Totaler Krieg ist eine Kriegsführung, die sich nicht auf rein legitime militärische Ziele beschränkt und zu massivem Leid und Verlusten unter der Zivilbevölkerung oder anderen Nichtkombattanten führen kann."

RON_Wars_WW2:0 "Kriege 1933-1945"
RON_Wars_WW2_desc:0 "Krieg ist ein intensiver bewaffneter Konflikt zwischen Staaten, Regierungen, Gesellschaften oder paramilitärischen Gruppen wie Söldnern, Aufständischen und Milizen. Er ist im Allgemeinen durch extreme Gewalt, Aggression, Zerstörung und Tod gekennzeichnet, wobei sowohl reguläre als auch irreguläre Streitkräfte zum Einsatz kommen. Krieg bezeichnet die gemeinsamen Aktivitäten und Merkmale verschiedener Kriegsarten oder von Kriegen im Allgemeinen. Totaler Krieg ist eine Kriegsführung, die sich nicht auf rein legitime militärische Ziele beschränkt und massives Leid und Verluste unter der Zivilbevölkerung oder anderen Nichtkombattanten zur Folge haben kann."

RON_Wars_Cold:0 "Kriege 1946-1999"
RON_Wars_Cold_desc:0 "Krieg ist ein intensiver bewaffneter Konflikt zwischen Staaten, Regierungen, Gesellschaften oder paramilitärischen Gruppen wie Söldnern, Aufständischen und Milizen. Er ist im Allgemeinen durch extreme Gewalt, Aggression, Zerstörung und Tod gekennzeichnet, wobei sowohl reguläre als auch irreguläre Streitkräfte zum Einsatz kommen. Krieg bezeichnet die gemeinsamen Aktivitäten und Merkmale verschiedener Kriegsarten oder von Kriegen im Allgemeinen. Totaler Krieg ist eine Kriegsführung, die sich nicht auf rein legitime militärische Ziele beschränkt und zu massivem Leid und Verlusten unter der Zivilbevölkerung oder anderen Nichtkombattanten führen kann."

RON_Wars_Modern:0 "Wars 2000+"
RON_Wars_Modern_desc:0 "Krieg ist ein intensiver bewaffneter Konflikt zwischen Staaten, Regierungen, Gesellschaften oder paramilitärischen Gruppen wie Söldnern, Aufständischen und Milizen. Er ist im Allgemeinen durch extreme Gewalt, Aggression, Zerstörung und Tod gekennzeichnet, wobei sowohl reguläre als auch irreguläre Streitkräfte zum Einsatz kommen. Krieg bezeichnet die gemeinsamen Aktivitäten und Merkmale verschiedener Kriegsarten oder von Kriegen im Allgemeinen. Totaler Krieg ist eine Kriegsführung, die sich nicht auf rein legitime militärische Ziele beschränkt und zu massivem Leid und Verlusten unter der Zivilbevölkerung oder anderen Nichtkombattanten führen kann."

DNC_Jerusalem_Conquest:0 "Nehmen Sie Jerusalem"
DNC_Jerusalem_Conquest_desc:0 "Jerusalem ist eine Stadt in Westasien, auf einem Plateau in den Judäischen Bergen zwischen dem Mittelmeer und dem Toten Meer. Sie ist eine der ältesten Städte der Welt und gilt als heilig für die drei großen abrahamitischen Religionen – Judentum, Christentum und Islam."

