MAN_the_great_manchurian_game:0 "Das große Mandschurische Spiel"
MAN_the_great_manchurian_game_desc:0 "Nach dem Tod der Familie Aisin-Gioro holten die §OYiguandao§! unter Zhang Tianran die Familie §LZhu§!, Nachkommen der Ming-Dynastie, in die Mandschurei, um dort eine Art konstitutionelle Monarchie zu errichten. Der Frieden hielt jedoch nicht lange, da sich die Doppelregierung schnell in einen Machtkampf zwischen den §OYiguandao§! und den §LZhu§! verwandelte. Nun versuchen beide Fraktionen, die vollständige Herrschaft über das Königreich zu erlangen. Wer letztendlich siegen wird, bleibt jedoch abzuwarten. \n\n§RWehen wir die Macht unserer rivalisierenden Fraktion untergraben, bevor wir versuchen, die Kontrolle über die Nation zu übernehmen.§! \n\nAktuelle Macht der §OYiguandao§!: [Root.GetSectPowerLevel]([?MAN.SectPowerLevel|+0]). \n\nAktuelle Macht der §LZhu-Familie§!: [Root.GetMingPowerLevel]([?MAN.MingPowerLevel|+0])."
militia_clashes:0 "Milizkämpfe"
militia_clashes_desc:0 "Während wir uns auf unseren Lorbeeren ausruhen, beginnen Milizen beider Fraktionen auf den Straßen der Mandschurei zu kollidieren. Je länger wir warten, desto schlimmer wird sich die Situation."
militia_clashes2:0 "Milizenkämpfe"
militia_clashes2_desc:0 "Während wir uns auf unseren Lorbeeren ausruhen, beginnen Milizen beider Fraktionen auf den Straßen der Mandschurei zu kollidieren. Je länger wir warten, desto schlimmer wird sich die Situation."
militia_clashes3:0 "Milizenkämpfe"
militia_clashes3_desc:0 "Während wir uns auf unseren Lorbeeren ausruhen, beginnen Milizen beider Fraktionen auf den Straßen der Mandschurei zu kollidieren. Je länger wir warten, desto schlimmer wird sich die Situation."
root_out_opium_trade:0 "Opiumhandel ausmerzen"
root_out_opium_trade_desc:0 "Opium ist nichts weiter als ein Gift, das die Imperialisten nach China gebracht haben. Wir müssen die Präsenz dieses Giftes in unserem Königreich beenden."
temple_building:0 "Tempelgebäude"
temple_building_desc:0 "Der Bau von Yiguandao-Tempeln wird mehr Menschen dazu bewegen, sich unserer Religion anzuschließen, und somit die Zahl der Menschen erhöhen, die im Falle einer nationalen Spaltung bereit sind, unsere Ideale zu verteidigen."
censor_the_press:0 "Zensur der Presse"
censor_the_press_desc:0 "Wir dürfen nicht zulassen, dass Zeitungen unsere Doktrin diskreditieren oder die Zhu offen unterstützen. Wir müssen sie jetzt zum Schweigen bringen, bevor es zu spät ist."
convert_militias:0 "Milizen konvertieren"
convert_militias_desc:0 "Wir können damit beginnen, unpolitisierte Milizen in Yiguandao umzuwandeln, um uns im Kriegsfall ihre Unterstützung zu sichern, indem wir ihnen den wahren Weg zur Rettung zeigen."
contact_the_peoples_anti_japanese_army:0 "Kontaktieren Sie die Antijapanische Volksarmee"
contact_the_peoples_anti_japanese_army_desc:0 "Die Tschahar-Volksarmee gegen Japan war eine bewaffnete Miliz, die in der Inneren Mongolei operierte und in den 30er Jahren von Chiang Kai-shek aufgelöst wurde. Wir könnten ehemalige Mitglieder dieser Armeen für unsere Regierung gewinnen, um uns im Falle einer erneuten japanischen Invasion oder eines Konflikts mit problematischen Sekten zu unterstützen."
collaborate_with_communist_guerrillas:0 "Zusammenarbeit mit kommunistischen Guerillas"
collaborate_with_communist_guerrillas_desc:0 "Einige Mitglieder der Familie Zhu hatten schon immer Verbindungen zu den Kommunisten, insbesondere Zhu Jianfan, der vor seinem Tod im Jahr 1932 Mao Zedong persönlich traf. Wir sollten versuchen, mit einigen dieser Guerillas Kontakt aufzunehmen, nicht als Angehörige ihrer königlichen Familie, sondern als Kameraden."
rural_schooling_campaign:0 "Kampagne für ländliche Schulbildung"
rural_schooling_campaign_desc:0 "Die Entsendung von Professoren und Experten auf die Farmen von Fengtian im Namen der Familie Zhu wird unseren Bauern helfen und die Popularität der Familie steigern."
not_overlords_but_brothers:0 "Keine Oberherren, sondern Brüder"
not_overlords_but_brothers_desc:0 "Wer sagt, dass ein König ein rücksichtsloser Diktator sein muss? Die Familie Zhu wird dafür sorgen, dass Zhu Rongji das wird, was sich das chinesische Volk immer gewünscht hat: ein gütiger Führer."
discredit_the_yiguandao:0 "Diskreditieren Sie die Yiguandao"
discredit_the_yiguandao_desc:0 "Durch Radiokonferenzen und Reden gegen Yiguandao können die Menschen vielleicht davon überzeugt werden, dass diese seltsame neue Religion vielleicht doch nicht so toll ist, wie sie scheint. Allerdings dürfte es schwierig sein, diejenigen zu überzeugen, die dieser Religion bereits ihre uneingeschränkte Treue geschworen haben."
home_arrest_the_zhu:0 "Startseite Verhaften Sie die Zhu"
home_arrest_the_zhu_desc:0 "Die vorübergehende Inhaftierung einiger Mitglieder der Familie Zhu wird ihre Möglichkeiten, ihre Popularität zu steigern, zwar verringern, andere Menschen jedoch nicht davon abhalten, ihre Ideale zu unterstützen."
distribute_moralty_books:0 "Moralische Bücher verteilen"
distribute_moralty_books_desc:0 "Moralbücher sind wie die Heilige Bibel unserer Religion. Wenn wir sie produzieren und unter der Bevölkerung verteilen, kann es sein, dass manche von ihnen sich unseren Idealen anschließen."
help_fengtian_farmers:0 "Helfen Sie den Bauern von Fengtian"
help_fengtian_farmers_desc:0 "Wenn wir einige unserer Milizen einsetzen, um unseren Bauern bei ihrer täglichen Arbeit zu helfen, könnten wir einige von ihnen davon überzeugen, dass die Familie Zhu da ist, um zu helfen."
MAN_integrate_the_PRC:0 "Integration der VR China"
MAN_assimilate_outer_manchuria:0 "Assimilation der Äußeren Mandschurei"
CHI_GXC_battle_for_guangdong:0 "Schlacht um Guangdong"
CHI_GXC_battle_for_guangdong_desc:0 "Die Beziehungen zwischen Nanjing und Guangxi waren nie besonders gut. Chiang Kai-Shek kämpfte im Ersten und Zweiten Chaing-Gui-Krieg sowie im Zentralebenenkrieg gegen Li Zongren, konnte jedoch nie die Kontrolle über die reichen Regionen Guangxi und Guangdong sichern. \n\nNach der Invasion der Guangxi in Hunan marschierte die Regierung von Nanjing jedoch erneut in das südliche Land ein, diesmal mit Gefechten entlang Guangdongs. Wer aus diesem neuen Konflikt siegreich hervorgehen wird, bleibt abzuwarten. \n\n§GDie Nation mit dem größten Einfluss in Guangdong wird nach Ende des Grenzkriegs zusammen mit Hunan die Kontrolle über die Region erlangen.§! \n\nAktueller Einfluss der §YChinesischen Armee§!: [CHI.GetCHI_GuangdongPower]([?CHI.CHI_GuangdongPower|+0]). \n\nAktueller Einfluss der §LGuangxi-Armee§!: [CHI.GetGXC_GuangdongPower]([?CHI.GXC_GuangdongPower|+0])."
the_battle_for_guangdong:0 "Die Schlacht um Guangdong"
start_a_skirmish_in_hunnan:0 "Invasion in Hunan"
start_a_skirmish_in_hunnan_desc:0 "Unsere Armee wird in die Region Hunan einmarschieren, um die Kontrolle über die Region erneut zu sichern. \n\n§GWenn wir aus den Gefechten siegreich hervorgehen, erlangen wir die Kontrolle über Hunan und genießen weitere Vorteile§!, aber §Rwenn wir verlieren, sind wir nicht mehr in der Lage, Guangdong gegen die Kuomintang zu verteidigen.§!"
