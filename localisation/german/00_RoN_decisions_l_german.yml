 newpolitical.1.t:0 "Monarchisten fordern Referendum"
 newpolitical.1.d:1 "Die schnell wachsende monarchistische Bewegung [Root.GetAdjective] hat nie behauptet, sie bräuchte für eine Machtergreifung die Unterstützung der Mehrheit, sondern setzt darauf, die Nation unter ihrer Führung zu einen, sobald ihre Herrschaft etabliert ist. Dennoch scheint ihre öffentliche Unterstützung rapide gewachsen zu sein. Viele Monarchisten bezeichnen [Root.GetLeader] mittlerweile als Heuchler, der vorgibt, die Wünsche des Volkes zu vertreten, sich in Wirklichkeit aber taub stellt.\n\nDer Aufruf zu einem Referendum wurde von den Mitgliedern von [Root.GetRulingParty] bisher als typischer Versuch zur Störung des Systems abgetan, aber immerhin ist es eine politische Maßnahme. Wenn wir jetzt nicht handeln, könnten die Monarchisten den gewaltsamen Kampf als besseren Weg zur Macht wählen."
 newpolitical.1.c:0 "Wenn das Volk es will, werden wir das Referendum abhalten."
 newpolitical.2.t:0 "Autoritäres Forderungsreferendum"
 newpolitical.2.d:1 "Die schnell wachsende [Root.GetAdjective]-Reaktionsbewegung hat nie behauptet, sie bräuchte für eine Machtergreifung die Unterstützung der Mehrheit, sondern hofft, die Nation nach der Etablierung ihrer Herrschaft unter ihrer Führung zu einen. Dennoch scheint ihre öffentliche Unterstützung rapide gewachsen zu sein. Viele Reaktionäre bezeichnen [Root.GetLeader] inzwischen als Heuchler, der behauptet, die Wünsche des Volkes zu vertreten, sich in Wirklichkeit aber taub stellt.\n\nDer Aufruf zu einem Referendum wurde von den Mitgliedern von [Root.GetRulingParty] bisher als typischer Versuch zur Störung des Systems abgetan, aber immerhin ist es eine politische Maßnahme. Wenn wir jetzt nicht handeln, könnten die Reaktionäre den gewaltsamen Kampf als besseren Weg zur Macht wählen."
 newpolitical.2.c:0 "Wenn das Volk es will, werden wir das Referendum abhalten."
 newpolitical.3.t:0 "Theokraten fordern Referendum"
 newpolitical.3.d:1 "Die schnell wachsende theokratische Bewegung [Root.GetAdjective] hat nie behauptet, sie bräuchte für eine Machtergreifung die Unterstützung der Mehrheit, sondern hofft, die Nation nach der Etablierung ihrer Herrschaft unter ihrer Führung zu einen. Dennoch scheint ihre öffentliche Unterstützung rapide gewachsen zu sein. Viele Theokraten bezeichnen [Root.GetLeader] mittlerweile als Heuchler, der vorgibt, die Wünsche des Volkes zu vertreten, sich in Wirklichkeit aber taub stellt.\n\nDer Aufruf zu einem Referendum wurde von den Mitgliedern von [Root.GetRulingParty] bisher als typischer Versuch zur Störung des Systems abgetan, aber immerhin ist es eine politische Maßnahme. Wenn wir jetzt nicht handeln, könnten die Konservativen den gewaltsamen Kampf als besseren Weg zur Macht wählen."
 newpolitical.3.c:0 "Wenn das Volk es will, werden wir das Referendum abhalten."
 
 newpolitical.4.t:0 "Konservative fordern Referendum"
 newpolitical.4:0 "Es überrascht nicht, dass die Idee, dass das Volk über sein Land herrscht, schnell große Popularität erlangt. Die [Root.GetRulingParty] betrachtet die von diesen Bewegungen verkörperte Idee der Demokratie – Meinungsfreiheit, öffentliche Wahlen, freie Presse – natürlich nur als populistische Rhetorik, die [Root.GetLeader]s Regierung schwächen soll. Es lässt sich jedoch nicht leugnen, dass diese Ideen in der [Root.GetAdjective]-Bevölkerung Fuß gefasst haben. In wahrhaft demokratischer Manier fordern sie ein Referendum über die Ablösung des aktuellen Regimes. Obwohl diese Ideen derzeit leicht zu ignorieren sind, haben sie die Angewohnheit, sich hartnäckig zu halten. Was wird aus uns, wenn wir eine friedliche Revolution unmöglich machen?"
 newpolitical.4.c:0 "Wenn wir das Referendum annehmen, können wir vielleicht unser Erbe bewahren."
 
 newpolitical.5.t:0 "Sozialdemokraten fordern Referendum"
 newpolitical.5.d:0 "Es überrascht nicht, dass die Idee, dass das Volk über sein Land herrscht, schnell große Popularität erlangt. Die [Root.GetRulingParty] betrachtet die von diesen Bewegungen verkörperte Idee der Demokratie – Meinungsfreiheit, öffentliche Wahlen, freie Presse – natürlich nur als populistische Rhetorik, die [Root.GetLeader]s Regierung schwächen soll.\n\nDennoch lässt sich nicht leugnen, dass diese Ideen in der [Root.GetAdjective]-Bevölkerung Fuß gefasst haben. In wahrhaft demokratischer Manier fordern sie ein Referendum über die Ablösung des aktuellen Regimes. Obwohl diese Ideen derzeit leicht zu ignorieren sind, haben sie die Angewohnheit, sich hartnäckig zu halten. Was wird aus uns, wenn wir eine friedliche Revolution unmöglich machen?"
 newpolitical.5.c:0 "Wenn wir das Referendum annehmen, können wir vielleicht unser Erbe bewahren."
 
 newpolitical.6.t:0 "Nationalsozialisten fordern Volksentscheid"
 newpolitical.6.d:1 "Die schnell wachsende [Root.GetAdjective] nationalsozialistische Bewegung hat nie behauptet, sie bräuchte für eine Machtergreifung die Unterstützung einer Mehrheit, sondern hofft, die Nation nach der Etablierung ihrer Herrschaft unter ihrer Führung zu einen. Dennoch scheint ihre öffentliche Unterstützung rapide gewachsen zu sein. Viele Nazis bezeichnen [Root.GetLeader] inzwischen als Heuchler, der vorgibt, die Wünsche des Volkes zu vertreten, sich in Wirklichkeit aber den Massen gegenüber taub verhält.\n\nDer Aufruf zu einem Referendum wurde von den Mitgliedern von [Root.GetRulingParty] bisher als typischer Versuch zur Störung des Systems abgetan, aber immerhin ist es eine politische Maßnahme. Wenn wir jetzt nicht handeln, könnten die Nazis den gewaltsamen Kampf als besseren Weg zur Macht wählen."
 newpolitical.6.c:0 "Wenn das Volk es will, werden wir das Referendum abhalten."
 
 newpolitical.7.t:0 "Nationalisten fordern Referendum"
 newpolitical.7.d:1 "Die schnell wachsende [Root.GetAdjective]-nationalistische Bewegung hat nie behauptet, sie bräuchte für eine Machtergreifung die Unterstützung der Mehrheit, sondern setzt darauf, die Nation unter ihrer Führung zu einen, sobald ihre Herrschaft etabliert ist. Dennoch scheint ihre öffentliche Unterstützung rapide gewachsen zu sein. Viele Nationalisten bezeichnen [Root.GetLeader] mittlerweile als Heuchler, der behauptet, die Wünsche des Volkes zu vertreten, sich in Wirklichkeit aber taub stellt.\n\nDer Aufruf zu einem Referendum wurde von den Mitgliedern von [Root.GetRulingParty] bisher als typischer Versuch zur Störung des Systems abgetan, aber immerhin ist es eine politische Maßnahme. Wenn wir jetzt nicht handeln, könnten die Nationalisten den gewaltsamen Kampf als besseren Weg zur Macht wählen."
 newpolitical.7.c:0 "Wenn das Volk es will, werden wir das Referendum abhalten."
 
 newpolitical.8.t:0 "Syndikalisten fordern Referendum"
 newpolitical.8.d:0 "Syndikalistische Ideen haben sich in [Root.GetName] schon vor langer Zeit etabliert, erfreuen sich aber in letzter Zeit deutlich größerer Beliebtheit. Die Bewegung hat sich über die politische Theorie hinaus in die politische Praxis ausgebreitet, wobei verärgerte Arbeiter und sogar einige prominente Persönlichkeiten ihre Unterstützung bekundeten. Die Syndikalisten nennen dies Klassenbewusstsein. Die [Root.GetRulingParty] bezeichnet es als Schnellstraße zu Aufruhr und Verrat.\n\nDa sie wenig Vertrauen in die Bereitschaft von [Root.GetLeader] haben, die von ihnen geforderten Reformen umzusetzen, fordern die lautstärksten Syndikalisten ein sofortiges Referendum zur Absetzung der derzeitigen Regierung. Zwar könnten wir die Dynamik dieser Massenbewegung vielleicht umkehren, doch wenn uns dies nicht gelingt, wird dies zweifellos zur beliebteren syndikalistischen Methode der Absetzung führen: der Revolution."
 newpolitical.8.c:0 "Das Referendum ist einem blutigen Aufstand vorzuziehen."
 
 newpolitical.9.t:0 "Sozialisten fordern Referendum"
 newpolitical.9.d:0 "Sozialistische Ideen haben sich in [Root.GetName] schon vor langer Zeit etabliert, erfreuen sich aber in letzter Zeit deutlich größerer Beliebtheit. Die Bewegung hat sich über die politische Theorie hinaus in die politische Praxis ausgebreitet, wobei verärgerte Arbeiter und sogar einige prominente Persönlichkeiten ihre Unterstützung bekundeten. Die Sozialisten nennen dies Klassenbewusstsein. Die [Root.GetRulingParty] bezeichnet es als Schnellstraße zu Aufruhr und Verrat.\n\nDie lautstärksten Sozialisten zeigen wenig Vertrauen in [Root.GetLeader]s Bereitschaft, die von ihnen geforderten Reformen umzusetzen, und fordern daher ein sofortiges Referendum zur Absetzung der derzeitigen Regierung. Zwar könnten wir die Dynamik dieser Massenbewegung vielleicht umkehren, doch wenn uns dies nicht gelingt, wird dies zweifellos zur beliebteren sozialistischen Methode der Absetzung führen: einer Revolution."
 newpolitical.9.c:0 "Das Referendum ist einem blutigen Aufstand vorzuziehen."
 
