USA_US_Army_decisions:0 "Streitkräfte der Vereinigten Staaten"
USA_form_paramarines:0 "1. Paramarine-Division"
USA_form_paramarines_desc:0 "Die Paramarines (auch bekannt als Marine-Fallschirmjäger) waren eine kurzlebige Spezialkampfeinheit des United States Marine Corps, die für den Fallschirmabwurf aus Flugzeugen ausgebildet war. Die Fallschirmausbildung der Marines begann im Oktober 1940 in New Jersey und endete mit der Auflösung der Fallschirmeinheiten im Februar 1944 in Camp Pendleton, Kalifornien. Fallschirmjäger erhielten nach Abschluss der Ausbildung einen deutlich höheren Lohn, sodass es keinen Mangel an Freiwilligen gab, obwohl alle unverheiratet sein mussten. Die Anforderungen an die Fitness waren hoch, und 40 % der Teilnehmer fielen durch."
USA_form_marine_raiders:0 "1. Marine Raiders Division"
USA_form_marine_raiders_desc:0 "Die Marine Raiders waren Eliteeinheiten des United States Marine Corps während des Zweiten Weltkriegs, die spezielle amphibische leichte Infanteriekämpfe führten, insbesondere Landungen in Schlauchbooten und Operationen hinter den Linien. „Edson&#39;s“ Raiders des 1. Marine Raiders Battalion und „Carlson&#39;s“ Raiders des 2. Marine Raiders Battalion gelten als die ersten Spezialeinheiten der Vereinigten Staaten, die im Zweiten Weltkrieg gegründet wurden und im Kampfeinsatz waren."
USA_form_army_rangers:0 "1. Ranger-Division"
USA_form_army_rangers_desc:0 "Am 19. Juni 1942 wurde das 1. Ranger-Bataillon genehmigt, rekrutiert und begann mit der Ausbildung in Carrickfergus, Nordirland. 80 Prozent der ursprünglichen Ranger kamen von der 34. Infanteriedivision."
USA_form_1ssf:0 "1. Spezialeinheit"
USA_form_1ssf_desc:0 "Die 1. Special Service Force (auch Devil&#39;s Brigade, Black Devils, Black Devils&#39; Brigade und Freddie&#39;s Freighters genannt) war eine amerikanisch-kanadische Elite-Kommandoeinheit im Zweiten Weltkrieg unter dem Kommando der 5. US-Armee. Die Einheit wurde 1942 gegründet und in Fort William Henry Harrison nahe Helena, Montana, in den USA ausgebildet. Die Truppe diente auf den Aleuten und kämpfte in Italien und Südfrankreich, bevor sie im Dezember 1944 aufgelöst wurde."
USA_form_meryls_marauders:0 "5307. Verbundeinheit „Merrills Marodeure“"
USA_form_meryls_marauders_desc:0 "Merrill&#39;s Marauders (benannt nach Frank Merrill) oder Unit Galahad, offiziell 5307th Composite Unit (Provisional), war eine Spezialeinheit der US-Armee für Langstreckeneinsätze im Dschungelkrieg, die im südostasiatischen Kriegsschauplatz des Zweiten Weltkriegs (China-Burma-Indien-Kriegsschauplatz, CBI) kämpfte. Die Einheit wurde berühmt für ihre Tiefdurchdringungsmissionen hinter den japanischen Linien, bei denen sie oft gegen zahlenmäßig überlegene japanische Streitkräfte kämpfte."
USA_form_smoking_snakes:0 "Força Expedicionária Brasileira (FEB)"
USA_form_smoking_snakes_desc:0 "Das brasilianische Expeditionskorps oder FEB (portugiesisch: Força Expedicionária Brasileira; FEB) bestand aus etwa 25.700 Mann, die von der Armee und der Luftwaffe aufgestellt wurden, um an der Seite der alliierten Streitkräfte im Mittelmeerraum des Zweiten Weltkriegs zu kämpfen."
