SHX_changde_revolt:0 "Der Changde-Aufstand"
SHX_changde_revolt_desc:0 "Nach der Niederlage Duan Qiruis im Zhili-Anhui-Krieg 1920 musste Feng Yuxiang aus Changde fliehen. Obwohl seine Reformen nach dem Machtverlust in Changde zunichte gemacht wurden, wird das Volk den christlichen General nicht vergessen, der ihm die beste Zeit der Stabilität bescherte, die es sich nur wünschen konnte. Unsere Armee wird nun Kontakt zu Offizieren und Generälen der Region aufnehmen, um sie für unsere Sache zu gewinnen."
