CHI_the_defeatist_premier:0 "Der defätistische Premier"
CHI_the_defeatist_premier_desc:0 "Wang Jingwei war schon immer ziemlich pessimistisch, was die Fähigkeit Chinas angeht, die Japaner im Krieg zu besiegen. Auf der einen Seite steht ein Imperium mit einer der besten Marinen der Welt, Panzerdivisionen, unglaublich guten Piloten und obendrein einer seit Jahrzehnten industrialisierten Welt, auf der anderen Seite eine erst kürzlich vereinte Republik mit nahezu keiner Industrialisierung und einer nicht modernisierten Armee. Er glaubt, dass eine bedingte Kapitulation vor den Japanern mehr Leben retten wird als ein aussichtsloser Krieg, und er wird diese Ansicht nicht aufgeben, solange unsere Armee die Japaner nicht besiegen kann."
the_grand_effort:0 "Der letzte Ausweg"
the_grand_effort_desc:0 "Auch wenn es ihnen nicht gefällt, müssen die Kriegsherren verstehen, dass wir den Japanern nur dann Widerstand leisten können, wenn wir unsere Nation ein für alle Mal vereinen!"
TWN_retreat_to_taiwan:0 "Rückzug nach Taiwan"
CHI_KUO:0"Republik China"
TWN_project_national_glory:0 "Projekt Nationaler Ruhm"
TWN_project_national_glory_desc:0 "Das Projekt Nationaler Ruhm ist eine mutige Initiative, inspiriert von Taiwans historischem Engagement für die Rückeroberung Festlandschinas. Chiang Kai-shek initiierte es 1961 mit dem Ziel, Festlandchina durch eine groß angelegte Invasion von der Volksrepublik China zurückzuerobern. Dieser ehrgeizige Plan wurde jedoch nie umgesetzt, da er mehr Truppen und Ressourcen erforderte, als Taiwan aufbringen konnte, und es an der Unterstützung der USA mangelte. Trotz seiner letztendlichen Aufgabe symbolisiert das Projekt Taiwans anhaltende Entschlossenheit und sein Streben nach einer Wiedervereinigung mit dem Festland."
