### POLAND
pol_class:0  "Die Klassentrennung"
pol_class_desc:0 "Polen ist eine weitgehend landwirtschaftlich geprägte Gesellschaft. Anfangs lebte nur ein Viertel der Bevölkerung in städtischen Gebieten, und drei Viertel der Bevölkerung arbeiteten in der Landwirtschaft. Angesichts der Massenmigration aufgrund der Neugründung und der Rückkehr einheimischer Polen in ihre Heimat befindet sich Polen in einer schwierigen Lage. Wenn wir unseren Mangel an Industrialisierung und die Kluft zwischen Mittel- und Unterschicht nicht angehen, kann dies unserem Land schaden! \n \nDie aktuelle Bevölkerungsstruktur ist:\nDie Unterschicht macht §Y[?ROOT.POL_PEASENT_SUPPORT]§! % der Bevölkerung aus\nDie Mittelschicht macht §Y[?ROOT.POL_MIDDLE_SUPPORT]§! % der Bevölkerung aus\nDie Oberschicht macht §Y[?ROOT.POL_UPPER_SUPPORT]§! % der Bevölkerung aus\n"
