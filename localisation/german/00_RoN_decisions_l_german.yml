YUN_sichuan_revolt:0 "Der Sichuan-Aufstand"
YUN_sichuan_revolt_desc:0 "1935 begann die Sichuan-Clique eng mit der Regierung von Nanjing zusammenzuarbeiten, da Chiang Kai-Shek Liu Xiang bei dessen Putsch gegen seinen Onkel Liu Wenhui unterstützte. Heute ist die Regierung von Sichuan nur noch Nanjing unterstellt und hat sich zu einem korrupten Land entwickelt, das für seine missbräuchliche Münzprägung und -ausgabe bekannt ist. Um Nanjing Paroli zu bieten, müssen wir die Unzufriedenheit der Bevölkerung in der Region zu unserem Vorteil nutzen."
YUN_ban_the_ilegal_weapon_production:0 "Verbot der illegalen Waffenproduktion"
YUN_ban_the_ilegal_weapon_production_desc:0 "Da unser Land nun über eine leistungsfähige Armee verfügt, ist es an der Zeit, diese illegalen Zellen zu schließen, bevor sie für uns zu einem Problem werden."
YUN_retreat_to_kumming:0 "Rückzug nach Kumnting"
YUN_retreat_to_kumming_desc:0 "Der Zweite Japanisch-Chinesische Krieg scheint praktisch verloren. Die Kuomintang ist völlig geschwächt, und die Japaner werden sich bald Sichuan nähern. Es ist unehrenhaft, aber wir müssen uns aus diesem Konflikt zurückziehen."
YUN_intervention_in_burma:0 "Intervention in Burma"
YUN_ignite_the_revolt:0 "Entzünde die Revolte"
YUN_send_weapons_to_burma:0 "Waffen nach Burma schicken"
YUN_militia_training_in_mandalay:0 "Miliztraining in Mandalay"

XSM_junzi_offensive:0 "Die Junzi-Offensive"
XSM_junzi_offensive_desc:0 "Die Junzi-Offensive ist der Kriegsplan unserer Regierung zur Übernahme der Kontrolle über China. Der Name leitet sich vom konfuzianischen Begriff „Junzi“ ab, der „Sohn des Herrn“ bedeutet und den idealen Menschen beschreibt. Wir werden versuchen, alle Junzi im chinesischen Land zu mobilisieren, um China mit einer kraftvollen und schnellen Offensive Stabilität zu bringen."
XSM_fight_the_remaining_militias_decision:0 "Bekämpfe die verbleibenden Milizen"
RAJ_annex_arunachal_pradesh:0 "Anhang Arunachal Pradesh"
RAJ_annex_arunachal_pradesh_desc:0 "Da die tibetische Regierung nun geschwächt ist, werden wir versuchen, Arunachal Pradesh zurückzugewinnen, um die dort lebenden Inder zu retten."
XSM_the_soviets_mobilize:0 "Die Sowjets mobilisieren"
XSM_the_soviets_mobilize_desc:0 "Wie bei ihrem Einmarsch in Xinjiang 1934 haben die Sowjets begonnen, ihre Truppen an der chinesischen Grenze mit den gleichen Absichten wie zuvor zu mobilisieren. Nach dem Aufstieg des Faschismus in Europa und Japan ist es jedoch wahrscheinlicher denn je, dass sie zurückweichen werden, wenn sie sehen, dass die Regierung von Sinkiang bereits besiegt ist. Wir müssen schnell handeln."
XSM_revolts_in_the_caucasus:0 "Aufstände im Kaukasus"
XSM_revolts_in_the_caucasus_desc:0 "Die islamische Bevölkerung des Kaukasus wurde von der russischen Regierung nie gut behandelt. Jetzt, da wir unseren Feldzug zur Befreiung Zentralasiens begonnen haben, ist es mehr als wahrscheinlich, dass sie mit der Unterstützung unserer Regierung einen bewaffneten Aufstand anzetteln können."
