wargoal_timer:0"Kriegsziel-Timer"
wargoal_timer_desc:0"Wir müssen unser Kriegsziel innerhalb dieses Zeitrahmens erreichen, sonst wird es hinfällig."
invite_to_eu_cat:0"Lade [FROM.getname] in die EU ein"
balance_of_power_cat:0 "Diplomatische Mission nach [FROM.getname]"
eu_cat:0"europäische Union"
southern_reconstruction_end_era_of_suffering:0 "Beenden Sie die Ära des Leidens"
southern_reconstruction_end_era_of_suffering_desc:0 "Nach Jahren des Streits und der Spaltung ist es an der Zeit, das Leid, das unsere Nation heimgesucht hat, zu beenden. Durch entschlossenes Handeln können wir auf Heilung und Einheit hinarbeiten und den Weg für eine bessere Zukunft ebnen."

southern_reconstruction_tooltip_fully_reconstructed:0 "Diese Maßnahme kann erst ergriffen werden, wenn der Wiederaufbau zu 100 % abgeschlossen ist. \n\n Das Ende dieser Ära des Leidens wird es uns ermöglichen, die Narben der Vergangenheit zu beseitigen und einen Neuanfang für unsere Nation einzuläuten."
tensions_calm:0 "Spannungen beruhigen"
southern_reconstruction:0 "Südlicher Wiederaufbau"
southern_reconstruction_desc:0 "Die Ära der Reconstruction hat im Süden tiefsitzende Wut entfacht, da weitreichende Veränderungen die Gesellschaft neu gestalten. \n\nFrustration der schwarzen Bevölkerung: [BES.GetFlag] [?blackanger] – Trotz Versprechen von Freiheit und Gleichheit ist die schwarze Bevölkerung wütend über die anhaltende Ungerechtigkeit und die Hindernisse für echte Sozialreformen. Sie hat das Gefühl, dass die Veränderungen unzureichend und langsam sind. \n\nFrustration der weißen Bevölkerung: [CSA.GetFlag] [?whiteanger] – Viele weiße Südstaatler sind zunehmend verärgert über die Reformen der Reconstruction, da sie diese als Bedrohung ihres langjährigen sozialen und wirtschaftlichen Status betrachten und weitere Störungen ihrer Lebensweise fürchten. \n\nFortschritt: [?reconstruction_progress] – Während die Reconstruction voranschreitet, haben beide Gemeinschaften mit den Veränderungen zu kämpfen und bringen ihre Frustration zum Ausdruck. Beide Seiten sind von den anhaltenden Umwälzungen dieser Ära noch immer tief betroffen."
rebel_against_soviet_union:0"Rebell gegen die Sowjetunion"
GER_INT_power_struggle:0 "Machtkampf zwischen den Kriegen"
GER_INT_power_struggle_desc:0 "In der Zwischenkriegszeit tobt in Deutschland ein erbitterter Machtkampf zwischen drei großen Fraktionen: den Kommunisten, den Faschisten und den Zentristen. Jede Gruppe kämpft um die Kontrolle und versucht, die Zukunft der Nation gemäß ihren ideologischen Überzeugungen zu gestalten. Die Kommunisten streben einen proletarischen Staat an, der Gleichheit und Arbeitnehmerrechte in den Vordergrund stellt. Die Faschisten plädieren für ein nationalistisches und autoritäres Regime, das durch strenge Regierungsführung Einheit und Stärke fördert. Die Zentristen hingegen streben eine demokratische Regierungsführung an und meistern gesellschaftliche Spannungen und wirtschaftliche Instabilität. Diese turbulente Ära ist geprägt von polarisierenden politischen Auseinandersetzungen, sozialen Unruhen und der ständigen Gefahr eines Putsches, da jede Fraktion darum kämpft, die Oberhand zu gewinnen."
ship_wheat_to_SPR:0 "Weizen nach Spanien versenden"
SPR_end_wheat_shipment:0 "Weizenlieferung beenden"
USA_Marshall_plan:0 "Marshallplan"
war_exhaustiom:0 "Kriegsmüdigkeit"
war_exhaustiom_desc:0 "Während der Krieg weitergeht, wächst in der Öffentlichkeit die Skepsis gegenüber dem Krieg."
generic_veteran_wounded:0 "Verwundete Veteranen"
generic_veteran_wounded_desc:0 "Unser Land hat derzeit §R[?ROOT.woundedsoldiers]§! verwundete Veteranen. \nUm die negativen Auswirkungen auf unsere Gesellschaft zu mildern und ihr Wohlergehen zu verbessern, ist es nach dem Krieg unerlässlich, §Gdas Budget für medizinische Versorgung zu erhöhen§! Dies wird dazu beitragen, dass unsere tapferen Soldaten die Versorgung erhalten, die sie verdienen, und ihnen eine effektivere Wiedereingliederung in das zivile Leben ermöglichen. \nDas erhöhte Budget für medizinische Versorgung erfordert Investitionen von §4[?ROOT.consumergoodsfromwounded]§! in Konsumgüter. Dies wirkt sich zwar auf unsere Wirtschaft aus, stellt aber eine wichtige Unterstützung für unsere Veteranen dar."
veterans_come_home:0 "Veteranen kommen nach Hause"
veterans_come_home_desc:0 "Wenn unsere Veteranen nach Hause zurückkehren, bestimmt die Höhe unseres Gesundheitsbudgets ihre Genesungsrate. Jede Budgetstufe gibt vor, wie viele Veteranen wöchentlich behandelt werden:\n\n§bKeine Gesundheitsausgaben§! — Nur eine sehr kleine Anzahl von Veteranen wird wöchentlich behandelt.\n§bGeringe Gesundheitsausgaben§! — Einige Veteranen mehr werden behandelt, aber die Genesung bleibt minimal.\n§bGeringe Gesundheitsausgaben§! — Eine überschaubare Anzahl von Veteranen wird behandelt, was eine gewisse Genesung ermöglicht.\n§bMittlere Gesundheitsausgaben§! — Eine beträchtliche Anzahl von Veteranen wird wöchentlich behandelt, was zu einer bemerkenswerten Genesung führt.\n§gHohe Gesundheitsausgaben§! — Eine große Anzahl von Veteranen wird behandelt, was zu einer guten Genesung führt.\n§gEnorme Gesundheitsausgaben§! — Die meisten Veteranen werden wöchentlich behandelt, was eine ausgezeichnete Genesung gewährleistet.\n§gMassive Gesundheitsausgaben§! — Fast alle Veteranen werden behandelt und erreichen eine nahezu vollständige Genesung und optimale Unterstützung."
