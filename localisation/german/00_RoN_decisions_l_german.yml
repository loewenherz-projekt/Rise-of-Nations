JAP_taiwanese_revolt_jap_desc:0 "Wir haben herausgefunden, dass die philippinische Marine die Annexion der taiwanesischen Insel plant. Wir müssen den Aufstand schnell niederschlagen, wenn wir nicht nur mit unseren derzeitigen Feinden, sondern mit allen Verbündeten Spaniens Probleme bekommen wollen."
