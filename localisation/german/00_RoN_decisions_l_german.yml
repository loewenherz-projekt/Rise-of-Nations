ENG_British_Army_decisions:0 "Britische Streitkräfte"
ENG_form_british_commandos:0 "1. Kommandodivision der britischen Armee"
ENG_form_british_commandos_desc:0 "Die Kommandos, auch bekannt als britische Kommandos, wurden während des Zweiten Weltkriegs im Juni 1940 auf Ersuchen des britischen Premierministers Winston Churchill gegründet. Er forderte eine Truppe, die Angriffe gegen das deutsch besetzte Europa durchführen konnte. Ursprünglich wurden die Kommandos aus Soldaten der britischen Armee rekrutiert, die sich freiwillig für die Special Service Brigade gemeldet hatten. Später wurden die Reihen der Kommandos jedoch von Angehörigen aller Zweige der britischen Streitkräfte und einer Reihe ausländischer Freiwilliger aus den deutsch besetzten Ländern besetzt."
ENG_form_british_marines_commandos:0 "1. Royal Marine Kommandodivision"
ENG_form_british_marines_commandos_desc:0 "Die 3. Kommandobrigade ist eine Kommandoformation der britischen Streitkräfte und die wichtigste Manöverformation der Royal Marines. Ihr Personal besteht überwiegend aus Royal Marines, unterstützt von Einheiten der Royal Engineers, der Royal Artillery und der Fleet Air Arm sowie weiteren qualifizierten Matrosen, Soldaten und Fliegern."
ENG_form_british_navy_commandos:0 "1. Kommandodivision der Royal Navy"
ENG_form_british_navy_commandos_desc:0 "Die Royal Naval Commandos waren eine Kommandoformation der Royal Navy, die während des Zweiten Weltkriegs diente."
ENG_form_british_airforce_commandos:0 "1. Kommandodivision der Royal Air Force"
ENG_form_british_airforce_commandos_desc:0 "Die Royal Air Force Commandos wurden während des Zweiten Weltkriegs aus Einheiten der Royal Air Force (RAF) gebildet. Sie wurden 1942 gegründet und dienten in den europäischen und fernöstlichen Kriegsschauplätzen, bevor sie 1946 aufgelöst wurden."
ENG_form_sas_infantry:0 "1. Division des Spezialluftdienstes"
ENG_form_sas_infantry_desc:0 "Der Special Air Service (SAS) ist eine Spezialeinheit der britischen Armee. Der SAS wurde 1941 als Regiment gegründet und 1950 als Korps neu aufgestellt."
ENG_form_sbs_infantry:0 "1. Abteilung für Spezialbootdienste"
ENG_form_sbs_infantry_desc:0 "Der Special Boat Service (SBS) ist eine Eliteeinheit der britischen Royal Navy. Seine Ursprünge reichen bis in den Zweiten Weltkrieg zurück, als 1940 die Army Special Boat Section gegründet wurde."

