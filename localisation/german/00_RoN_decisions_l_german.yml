weaken_economy_desc:0 "§WSchwächt vorübergehend die Konjunkturstimulation und den Konsum. Unser aktueller Stimulationsschub beträgt §G[?stimulated_boost]§ und der Konsumschub §G[?consumtion_boost]§. Diese Werte werden täglich sinken!"
boost_inflation:0 "Inflation ankurbeln"
boost_inflation_desc:0 "Die Inflation steigt, was die Konjunkturförderung beeinträchtigt, aber den Konsum ankurbelt. Unser aktueller Stimulationsschub beträgt §G[?stimulated_boost]§ und der Konsumschub §G[?consumtion_boost]§. Diese Werte ändern sich täglich!"
drain_investments:0 "Nationale Investitionen abziehen"
drain_investments_desc:0 "§WDie nationalen Investitionen schwächen die Konjunktur, während der Konsum leicht anzieht. Die aktuelle Konjunktursteigerung beträgt §G[?stimulated_boost]§ und die Konsumsteigerung §G[?consumtion_boost]§. Sie werden täglich angepasst!"
stabilize_infrastructure:0 "Stabilisierung der wirtschaftlichen Bedingungen"
stabilize_infrastructure_desc:0 "§WStabilisierungsbemühungen sind im Gange, aber die Stimulation kann sich ändern. Der aktuelle Stimulationsschub beträgt §G[?stimulated_boost]§ und wird schwanken. Behalten Sie die Änderungen im Auge!"
