CHL_faction_management_desc:0 "Die chilenische Gesellschaft und Politik sind in mehrere Fraktionen gespalten, die entweder die Gunst der Regierung gewinnen oder die Massen gegen sie aufhetzen wollen. \n\n§RSozialisten§!: Sozialdemokraten, Radikale und Kommunisten erfreuen sich unter den Arbeitern des Landes großer Beliebtheit. \n§ONationalpopulisten§!: Nationalsozialisten und Linksnationalisten erfreuen sich unter den eher rechtsgerichteten Mitgliedern der Gesellschaft großer Beliebtheit. \n§gMilitär§!: Generäle und Offiziere der Armee und Luftwaffe hatten schon immer große Macht über das Land. \n\n§RSozialistische Loyalität§!: [Root.GetSocDemHappyLevel]([?CHL.SocDemHappyLevel|+0]) \n§RSozialistischer Einfluss§!: [Root.GetSocDemPowerLevel]([?CHL.SocDemPowerLevel|-0]). \n\n§ONationalpopulistische Loyalität§!: [Root.GetNatPopHappyLevel]([?CHL.NatPopHappyLevel|+0]). \n§ONationalpopulistischer Einfluss§!: [Root.GetNatPopPowerLevel]([?CHL.NatPopPowerLevel|-0]). \n\n§gMilitärische Loyalität§!: [Root.GetMilitaryHappyLevel]([?CHL.MilitaryHappyLevel|+0]) \n§gMilitärischer Einfluss§!: [Root.GetMilitaryPowerLevel]([?CHL.MilitaryPowerLevel|-0])" #one day little friend, one day......

ARG_pardon_the_generals:0 "Begnadigung der Generäle"
ARG_pardon_the_generals_desc:0 "Nach unserem Sieg im dritten Patagonien-Aufstand wurden viele unserer Generäle verhaftet und ohne Gerichtsverfahren ins Gefängnis gesteckt. Wenn unsere Armee unser Land vor ausländischen Bedrohungen schützen soll, sollten wir sie begnadigen und natürlich nur den weniger problematischen Generälen eine wichtige Rolle in der Armee zugestehen."
