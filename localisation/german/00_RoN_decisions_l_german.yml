CHI_give_field_command_to_chiang_kai_shek:0 "Übergeben Sie Chiang Kai-Shek das Feldkommando"
CHI_the_blue_coup:0 "Der blaue Coup"
CHI_the_blue_coup_desc:0 "Viele Antikommunisten der Kuomintang unter Dai Li zeigen zunehmende Unzufriedenheit mit unseren Verhandlungen mit den Kommunisten. Wir könnten dieses Problem lösen, wenn Dai Li nicht der Chef der Geheimpolizei wäre. Diese wäre äußerst verärgert, wenn wir es wagen würden, ihn zu entlassen oder die Geheimpolizei aufzulösen. Derzeit bleibt uns nur die Ermordung, aber wir dürfen die Nation nicht gegen uns aufbringen, zumindest nicht jetzt."
