 bra.2:0 "Der Cohen-Plan"
 bra.2.t:0 "Der Cohen-Plan"
 bra.2.d:0 "Durch Hauptmann Mourão ist Ihnen ein von der ANL verfasstes Dokument zugegangen. Es enthält einen detaillierten Plan zur Ermordung der Wahlkandidaten von 1938, Armando Sales und José Américo. Wir müssen Maßnahmen ergreifen, auch wenn unsere Geheimdienste die Glaubwürdigkeit des Dokuments nicht bestätigen können."
 bra.2.a:0 "Bringen Sie das Mikrofon mit! Wir können es uns nicht leisten, noch mehr Zeit zu verlieren."
 bra.2.b:0 "Verhaften Sie den Kapitän und verbrennen Sie das Dokument! Diese Farce darf nicht endemisch werden."
 bra.2.c:0 "Schluss mit den internen Streitereien! Wir müssen den politischen Organismus den Bedürfnissen des Vaterlandes anpassen."
 bra.2.e:0 "Wir können ihnen nicht aufgrund eines wahrscheinlich falschen Dokuments ihre Freiheit entziehen!"
 bra.1:0 "„A famosa caixinha do Adhemar“"
 bra.1.t:0 "„A famosa caixinha do Adhemar“"
 bra.1.d:0 "Da wir nun endlich am Rande einer Redemokratisierung stehen, müssen wir entscheiden, wer in den nächsten fünf Jahren unser Anführer sein wird. Adhemar de Barros ist der ehemalige Interventor für São Paulo: Er baute Straßen, erweiterte die Industrie und baute den Staat wieder auf. Armando Sales ist ein langjähriger Kämpfer für die Demokratie: Er regierte São Paulo und verhalf dem Staat zu den höchsten Bildungsstandards des Kontinents. Brigadier Eduardo Gomes ist ein ehemaliges Mitglied der brasilianischen Luftwaffe: Er wurde zur Hauptfigur der noch immer bestehenden Tenentistas. Júlio Prestes wurde 1930 zum Präsidenten gewählt, nachdem er 1930 durch einen Staatsstreich abgesetzt worden war: Er ist Mitglied der Agrarelite und ehemaliger Chef der PRP. Es ist Zeit für uns, unsere Entscheidungen zu treffen."
 bra.1.a:0 "Wenn er São Paulo wieder aufgebaut hat, warum kann er dann Brasilien nicht wieder aufbauen?"
 bra.1.b:0 "Für unsere Demokratie brauchen wir jemanden, der sie nie aufgegeben hat."
 bra.1.c:0 "Was ich nicht verstehe, ist, wie eine Nation wie Brasilien nach Jahren demokratischer Tradition zu einer Diktatur zurückfallen kann, die uns in den Augen der zivilisierten Welt erniedrigt!"
 bra.1.e:0 "Für uns ergibt sich Weisheit aus den Konsequenzen unserer Entscheidungen."
 bra.1.f:0 "Die Zukunft ist nicht das, was wir fürchten, sondern das, was wir zu erreichen wagen!"
 bra.3:0 "Kongress aufgelöst!"
 bra.3.t:0 "Kongress aufgelöst!"
 bra.3.d:0 "Angesichts der kommunistischen Bedrohung durch den hervorragenden Hauptmann Mourão beschloss Präsident Getúlio Vargas, die letzte notwendige Maßnahme zu ergreifen, um einen zukünftigen sozialistischen Putsch auf Bundesgebiet zu verhindern. Nachdem Feldmarschall Dutra und General Goes Monteiro den Kongress unter Druck gesetzt hatten, den Belagerungszustand zu verhängen, beschloss Seine Exzellenz, den Kongress vollständig zu schließen. Er verkündete die neue Verfassung und hob damit die zweite innerhalb von sieben Jahren auf. Die Polaca wird die Machtbefugnisse des Präsidenten erweitern, die politischen Parteien illegalisieren und die sozialistischen Kräfte im Nationalkongress zerschlagen."
 bra.3.a:0 "„Der Präsident der Republik der Vereinigten Staaten von Brasilien: Als Antwort auf die legitimen Bestrebungen des brasilianischen Volkes [...]“"
 bra.4:0 "Getúlio Vargas&#39; Selbstmord"
 bra.4.t:0 "Getúlio Vargas&#39; Selbstmord"
 bra.4.d:0 "Heute Morgen wurde die Leiche von Präsident Getúlio Vargas tot in seinem Zimmer aufgefunden. Im Schlafanzug beging unser ehemaliger Präsident als Reaktion auf die politischen Unruhen im Land Selbstmord. Politische Analysten erklären, dass der Präsident, hätte er sich für seinen Weg entschieden, dies nicht durchmachen musste. Heute können wir nur um seine Seele trauern."
 bra.4.a:0 "„Deixo a vida para entrar na história.“"
 bra.5:0 "Der Kaiser von Brasilien"
 bra.5.t:0"Der Kaiser von Brasilien"
 bra.5.d:0 "Nachdem der Kaiser von seinem Volk gefeiert wurde, wurde seine Ideologie in Frage gestellt. Die Integralisten behaupten, der Kaiser sei ein Expansionist und Visionär, der Brasilien zu neuem Ruhm verhelfen werde. Die anderen behaupten, der Kaiser müsse, ungeachtet seiner Ideologie, vor allem umsichtig und gemäßigt sein. Wer hat Recht?"
 bra.5.b:0 "Um Himmels willen, er ist ein Kaiser, kein Abgeordneter!"
 bra.5.a:0 "Ein Kaiser muss vor allem weise und umsichtig sein."
 bra.6:0 "Brasilien lädt uns zu seiner Fraktion ein"
 bra.6.t:0 "Brasilien lädt uns zu seiner Fraktion ein"
 bra.6.d:0 "Brasilien, nach einem Durchbruch in der internationalen Diplomatie und als neue Großmacht, lädt uns ein, seiner Fraktion beizutreten, um uns sowohl Wohlstand als auch eine gesicherte Verteidigung zu garantieren. Werden wir beitreten?"
 bra.6.a:0 "Ja natürlich!"
 bra.6.b:0 "Wir würden es vorziehen, nicht"
 bra.7:0 "Brasilien möchte unserer Fraktion beitreten"
 bra.7.t:0 "Brasilien möchte unserer Fraktion beitreten"
 bra.7.d:0 "Brasilien hat uns gebeten, unserer Fraktion beizutreten, um uns im Weltstaat zu unterstützen. Angesichts der Kriegssituation fragen wir uns: Brauchen wir die Unterstützung Südamerikas?"
 bra.7.a:0 "Ja natürlich!"
 bra.7.b:0 "Wir brauchen sie nicht!"
 bra.8:0 "Brasilien lädt uns zu seiner Fraktion ein"
 bra.8.t:0 "Brasilien lädt uns zu seiner Fraktion ein"
 bra.8.d:0 "Brasilien, nach einem Durchbruch in der internationalen Diplomatie und als neue Großmacht, lädt uns ein, seiner Fraktion beizutreten, um uns sowohl Wohlstand als auch eine gesicherte Verteidigung zu garantieren. Werden wir beitreten?"
 bra.8.a:0 "Ja natürlich!"
 bra.8.b:0 "Wir würden es vorziehen, nicht"
 
 bra.9:0 "Der Belagerungszustand ist über uns hereingebrochen"
 bra.9.t:0 "Der Belagerungszustand ist über uns hereingebrochen"
 bra.9.d:0 "An diesem schicksalshaften Tag wurde unserem Land der Krieg erklärt. Der Catete-Palast verhängte den Belagerungszustand. In diesem Moment marschieren Bundestruppen durch die Straßen von Copacabana, Freiwillige beladen die Einkaufswagen, die durch die Rua da Consolação fahren, Gauchos laden ihre Gewehre und reiche Geschäftsleute bewaffnen ihre Korvetten mit Gewehren und Pistolen. Militärpolizisten aus dem ganzen Land marschieren an die Front, bereit, unsere Unabhängigkeit zu verteidigen. Möge Gott unseren Feinden gnädig sein."
 bra.9.a:0 "Du wirst sehen, dass keiner deiner Söhne vor der Schlacht flieht, und dass diejenigen, die dich lieben, ihren eigenen Tod nicht fürchten."
 
 bra.10:0 "Brasilien, oh liebes Mutterland"
 bra.10.t:0 "Brasilien, oh liebes Mutterland"
 bra.10.d:0 "Wir schreiben das Jahr 1936, das 114. Jahr der Unabhängigkeit und das 47. Jahr der Republik. Vor sechs Jahren übernahm Herr Getúlio Vargas das ehrenvolle Amt als Präsident der Republik der Vereinigten Staaten von Brasilien. In Brasilien kam es 1932 zum Bürgerkrieg, gefolgt von der rasanten Industrialisierung des edlen Staates São Paulo. In diesem Moment streitet Brasilien, mitten in den Anfängen seiner Industrialisierung, mit seinen unterlegenen Nachbarn um die Kontrolle des Südatlantiks. In Europa weckt Adolf Hitler Deutschland auf und verspricht Rettung. In den Vereinigten Staaten tötet die Krise viele Menschen durch Hunger und lässt viele andere obdachlos zurück. In Afrika und Asien kämpfen Frankreich und Großbritannien um den Erhalt ihrer Imperien. Es ist unsere Zeit, zu untergehen oder zu herrschen. Ruhm sei Brasilien!"
 bra.10.a:0 "Ewig liegend auf einer herrlichen Wiege, zum Rauschen des Meeres und unter tiefem Himmelslicht"
 
 bra.11:0 "Brasilianische Marionette!"
 bra.11.t:0 "Brasilianische Marionette!"
 bra.11.d:0 "Während brasilianische Beamte die letzte Bastion unserer Regierung einnehmen, bedeutet die militärische Präsenz brasilianischer Behörden auf unserem Boden die Bildung einer Marionettenregierung unter der Führung eines neuen Staatschefs unter der Aufsicht des Präsidenten der Föderation, dessen ideologische Doktrinen sich sicherlich mit denen des brasilianischen Festlands decken werden. Über das brasilianische Ministerium für Presse und Propaganda (DIP) werden sich unsere kulturellen Eliten und die breite Masse im Laufe der Zeit um brasilianische Denkschulen scharen und so die neu installierte nationale Ordnung im Einklang mit den Interessen Brasiliens aufrechterhalten."
 bra.11.a:0 "Haben wir überhaupt eine Wahl?"
 
 bra.12:0 "Keine brasilianische Marionette mehr!"
 bra.12.t:0 "Keine brasilianische Marionette mehr!"
 bra.12.d:0 "Mit der Bildung der neuen Regierung, die ausschließlich von unseren Politikern und unserem Volk geleitet wird, zieht sich der von der Bundesregierung eingesetzte Staat zurück und sucht Exil auf dem brasilianischen Festland. Mit ihm verschwindet auch die verdrehte Ideologie, die uns während unserer Zeit als Untertanen der DIP aufgezwungen wurde. Nun liegt unsere Entscheidung über unser Schicksal allein in unserer Hand, und unsere Gedanken in der Welt werden nur noch von uns bestimmt."
 bra.12.a:0 "Frei! Endlich!"
 
 bra.13:0 "Vargas ermordet!"
 bra.13.t:0 "Vargas ermordet!"
 bra.13.d:0 "Während der größten Manifestation der Befreiung des Proletariats umzingelten und besetzten Dutzende von Anhängern, unterstützt von Tausenden weiteren auf den Straßen von Rio de Janeiro, den Palácio do Cacete. Innerhalb weniger Stunden war der bürgerliche Anführer Getulio Vargas tot und Herr Luís Carlos Prestes, der neue Präsident der Republik, stand an der Spitze der Nation. "
 bra.13.a:0 "Do Svedanya, Herr Vargas"
 
 bra.14:0 "Vargas verbannt!"
 bra.14.t:0 "Vargas verbannt!"
 bra.14.d:0 "Während der höchsten Demonstration der Staatsbürgerschaft aller Völker und Rassen umzingelten Tausende von Integralisten den Palácio do Cacete und drohten mit einer Invasion. In wenigen Stunden würde Präsident Vargas in Rio Grande do Sul Zuflucht suchen und Dr. Plínio Salgado würde sein Amt als neuer Präsident der Republik antreten. "
 bra.14.a:0 "Anauê!"
 
 bra.15:0 "Vargas verschanzt!"
 bra.15.t:0 "Vargas verschanzt!"
 bra.15.d:0 "Das zur Koordinierung der Propaganda des Nationalstaats geschaffene und mit den Geheimdiensten der Bundesregierung verbundene Ministerium für Presse und Propaganda soll den Machterhalt des Präsidenten der Republik, Herrn Getúlio Vargas, gewährleisten."
 bra.15.a:0 "Das Verfassungsregime hat seinen praktischen Wert verloren."
 
 bra.16:0 "Vargas angeklagt!"
 bra.16.t:0 "Vargas angeklagt!"
 bra.16.d:0 "Während der größten Demonstration der Freiheit des Vaterlandes umzingelten die assoziierten Sektoren der Armee, der Marine und der Luftwaffe den Palácio do Cacete zur Unterstützung des Nationalkongresses. In wenigen Stunden würde Herr Getúlio Vargas unter dem Druck einer ausgewählten Gruppe von Generälen und Admiralen die Republik dem Nationalkongress und dem brasilianischen Volk zurückgeben. "
 bra.16.a:0 "Für uns Sterbliche entsteht Weisheit durch die Konsequenzen unserer Entscheidungen."
 
 bra.17:0 "A Voz do Brasil"
 bra.17.t:0 "A Voz do Brasil"
 bra.17.d:0 "Der Einfluss der Amerikaner auf unsere Innenpolitik ist zwar vorhanden, würde sich jedoch niemals im öffentlichen Willen manifestieren, wenn es nicht den Einfluss der nordamerikanischen Medien auf unser Volk gäbe. Um der Präsenz der Amerikaner in unserer Kultur entgegenzuwirken, werden wir die Stimme Brasiliens erweitern und über Rádio Nacional Momente der Wertschätzung der nationalen Kultur einbeziehen."
 bra.17.a:0 "Sólidos fossem, komm-los-iamos!"
 


 #FOCUS


 BRA_BLITZKRIEG_DESC:0 "Heute, im Jahr 1939, ist der Frieden in der Welt nur eine Laune. Unser Land ist unter der Führung von Getúlio fast vollständig wiederaufgebaut, und da unsere internen Spaltungen überwunden sind, können wir uns nun darauf konzentrieren, unseren Verbündeten und befreundeten Nationen in der Welt bei der Wiederherstellung einer uns wohlgesinnten Weltordnung zu helfen."
 BRA_GATHERING_STORM_DESC:0 "1936 ist Brasilien am Ende. Ein Putsch im Jahr 1930 zerstörte unsere Traditionen und demokratischen Institutionen, und kurz darauf legte ein Bürgerkrieg die Industrie und Infrastruktur des wichtigsten brasilianischen Bundesstaates lahm und machte unsere Nation fragil und instabil. \N\n Jetzt, da ihre Einheit und Existenz am seidenen Faden hängen und vom Schicksal jedes Einzelnen abhängig sind, der mutig genug ist, sie zu kontrollieren, muss die Republik sich neu aufbauen, um ihre Zukunft zu sichern."
 BRA_selva_tech_effect:0 "Gründung des „Jungle Warfare Instruction Center – CIGS“ mit dem Schwerpunkt auf der Ausbildung unserer Armee zur Verteidigung unseres wertvollsten Staatsschatzes. Einheiten der „Regulären Infanterie“ bewegen sich im Regenwald und kämpfen wie in der Ebene. Alle anderen „Spezialeinheiten“ erhalten einen kleinen Bonus für ihre Bewegung im Dschungel. Mechanisierte und motorisierte Bataillone erhalten einen 0,25-fachen Kampfmalus für den Dschungelkrieg."
 bra_2_prestes_column:0 "2. kommunistischer Putsch"
 bra_2_prestes_column_desc:0 "Zwischen 1925 und 1927 marschierte Luís Carlos Prestes, heute der formelle Anführer der für illegal erklärten Koalition der kommunistischen und linken Anti-Vargas-Bewegungen Brasiliens, Tausende von Kilometern durch das Landesinnere, um Unterstützung für unsere Emanzipation zu sammeln. Die Wiederholung dieser Aktion in unseren Großstädten wird die Menschen sicherlich auf die Absichten der ANL aufmerksam machen."
 bra_CAS:0 "„Lagoa Santa“"
 bra_CAS_desc:0 "Die Reaktivierung und Modernisierung unserer Flugzeugfabrik in Lagoa Santa im Großraum Belo Horizonte wird uns dabei helfen, die Größe unserer Luftwaffe zu erweitern."
 bra_CTEF_CLT:0 "Fachberater für Wirtschaft und Finanzen"
 bra_CTEF_CLT_desc:0 "Der Technische Rat für Wirtschaft und Finanzen wurde gegründet, um den Präsidenten bei den wirtschaftlichen und strategischen Entscheidungen des Landes zu unterstützen."
 bra_IRFM:0 "United Industries Fabriken Matarazzo"
 bra_IRFM_desc:0 "Die Fabriken von Industrias Reunidas Matarazzo wurden in den 1920er Jahren vom Einwanderer Franscesco Matarazzo gegründet. Die 360 Fabriken, die die unterschiedlichsten Waren herstellen, können erweitert werden, um den Großteil des industriellen Bedarfs des Landes zu decken."
 bra_a_voz_do_brasil:0 "„Die Stimme Brasiliens“"
 bra_a_voz_do_brasil_desc:0 " „Die Stimme Brasiliens ist ein radiophones staatliches Pflichtprogramm, das täglich in allen brasilianischen Medien ausgestrahlt wird“, das für die Verbreitung nationalistischer Propaganda genutzt werden kann."
 bra_abertura:0 "Das Manifest der Mineiros"
 bra_abertura_desc:0 "Während Minas Gerais im Bürgerkrieg überraschend Vargas unterstützte, sind Industrielle und Politiker des Bundesstaates verärgert über Vargas‘ Einflussverlust. Ein Manifest gegen sein Vorgehen wäre im Kampf gegen seine Tyrannei sicherlich willkommen."
 bra_acogerdau:0 "Gerdau-Gruppe"
 bra_acogerdau_desc:0 "Die florierende Nagelfabrik der Familie Gerdau ist zunehmend auf Stahlimporte aus dem Atlantik angewiesen und plant nun den Kauf eines lokalen Stahlwerks, um unabhängiger von diesen Importen zu werden. Ihre Bedeutung dürfte die Industriewirtschaft von Rio Grande do Sul deutlich stärken."
 bra_acominas:0 "Tupy SA"
 bra_acominas_desc:0 "Drei deutsche Nachkommen aus Santa Catarina beantragen bei der Gemeindeverwaltung von Joinville die Genehmigung zur Eröffnung eines neuen Hüttenwerks in der Region. Wir sollten uns dafür einsetzen, dass der Antrag angenommen wird."
 bra_almirantado:0 "&#39;Revolte der Armada&#39;"
 bra_almirantado_desc:0 "Das Verhalten brasilianischer Schiffe und die Taktik der Marinekommandanten müssen an die moderne Seekriegsführung angepasst werden. Als Beispiel kann der Marineaufstand von 1893 dienen."
 bra_amigo_alemanha:0 "Das Prinzip der Autorität"
 bra_amigo_alemanha_desc:0 "Die deutsche Sache ist stark. Ihre mächtigen Armeen, genialen Wissenschaftler und ihre starke Ideologie haben die Welt wie nie zuvor erschüttert. Ganz zu schweigen davon, dass wir von Veränderungen in der Weltordnung enorm profitieren würden. Außerdem wollen wir auf keinen Fall sterben."
 bra_amigo_eua:0 "Ein guter Nachbar"
 bra_amigo_eua_desc:0 "Die Amerikaner sind alles in allem sanfte Herrscher. Sie haben alle Amerikaner stets vor anderen Mächten geschützt – wenn auch nicht oft vor sich selbst. Ob aus echter Unschuld oder Selbstgefälligkeit: Die Stärkung unserer Beziehungen zu Washington könnte viel Geld einbringen."
 bra_amigo_eua_tooltip:0 "Wenn die demokratischen Vereinigten Staaten zu den Alliierten gehören, wird Brasilien das Vereinigte Königreich um einen Beitritt bitten. Wenn die Loyalisten an der Macht sind und eine Fraktion bilden, wird Brasilien sich direkt der US-Fraktion anschließen."
 bra_amigo_uk:0 "Freundschaft, Handel und Navigation"
 bra_amigo_uk_desc:0 "Wenn uns die Geschichte etwas gelehrt hat, dann, dass Imperien irgendwann untergehen. Wir haben sogar ein anschauliches Beispiel dafür. Wie dem auch sei, wir wissen nicht, wann – oder ob – die Sonne über dem Britischen Empire jemals untergehen wird. In jedem Fall gibt es noch viel zu bräunen."
 bra_amigo_urss:0 "Eine zweite UdSSR"
 bra_amigo_urss_desc:0 "Die Sowjetunion und wir unterscheiden uns nicht sehr voneinander. Nun ja, wir unterscheiden uns ziemlich, aber auf eine gute Art und Weise."
 bra_ana_guerra_civil:0 "Analyse des Bürgerkriegs von 1932"
 bra_ana_guerra_civil_desc:0 "Der brasilianische Bürgerkrieg hat sich als Testfeld für mögliche wirksame Kampftaktiken erwiesen."
 bra_ana_mineira:0 "Unitarische Kriegsdoktrin"
 bra_ana_mineira_desc:0 "Während des Konflikts waren sich die Truppen von Minas Gerais und die Minas Gerais-Offiziere, die die Armee führten, der Unfähigkeit Sao Paulos bewusst, den Krieg über längere Zeit aufrechtzuerhalten. Also gruben die Mineiros. Ihre Schützengräben wurden von stationären Maschinengewehren unterstützt, und ihre langsamen, aber sicheren Vorstöße wurden durch das Feuer der nationalen Artillerie unterstützt."
 bra_ana_paulista:0 "Die Kriegsdoktrin von São Paulo"
 bra_ana_paulista_desc:0 "Während des Konflikts setzten die öffentlichen Kräfte des Staates São Paulo auf Bewegungskrieg und Blitzkrieg. Die Pläne des Staates São Paulo sahen eine schnelle und heftige Bewegung nach Rio de Janeiro durch das Paraíba-Tal vor, wobei die Nachhut durch die Unterstützung der anderen Staaten gesichert sein sollte."
 bra_anhanguera:0 "„Via Anhanguera“"
 bra_anhanguera_desc:0 "Die „Via Anhanguera“ ist umfangreicher als die meisten Abschnitte der deutschen Autobahn und wird das größte Autobahnsystem des Landes sein. Ihre „reichhaltigen“ Autobahnen verbinden das ganze Land mit beispielloser Fahrbarkeit."
 bra_anhanguera_tooltip:0 "Der Bau der SP-330, der Via Anhanguera, wird begonnen. Sie wird später zur BR-050 ausgebaut, einer Autobahn, die Goiás mit der Stadt São Paulo verbinden wird. Dieser Bau wird die Infrastruktur des Bundesstaates São Paulo maximieren, die Infrastruktur von Goiás und Mato Grosso erheblich erweitern und die industrielle Expansion des gesamten Landes in einem Slot erleichtern."
 bra_armor:0 "„Tanques de Guerra“"
 bra_armor_desc:0 "Während des Bürgerkriegs setzten beide Seiten Kriegspanzer ein. Der Sieg der Union wurde teilweise durch den Einsatz des FT-17 im Kampf entschieden. Die Weiterentwicklung ihrer Modelle wird für die Armee von enormem Vorteil sein."
 bra_art:0 "Blutbild"
 bra_art_desc:0 "Da die Union über mehr Ressourcen verfügte als ihr Gegner, importierte sie Artillerie aus dem Ausland. Die präzisen Kanonen vernichteten mit einem einzigen Treffer eine ganze Truppe der Paulistas. Wir können unseren militärisch-industriellen Unternehmen helfen, ihre Industriezentren auf ein nie dagewesenes Niveau zu erweitern."
 bra_aviso_tooltip:0 "WARNUNG: Ein Ideologiewechsel auf andere Weise als über Fokusse (z. B. durch das Sammeln von genügend Unterstützung für einen Staatsstreich, durch Marionetten oder durch andere Ereignisse mit Ideologiewechsel) wird von den politischen Eliten der Föderation als Angriff auf ihre Interessen angesehen. Sie werden ihre mangelnde Beteiligung an letzteren übel nehmen und sich weigern, an allen Projekten teilzunehmen, die im politischen Zweig des Fokusbaums angezeigt werden, wie z. B. „Brasilia“ und „Tiro de Guerra“."
 bra_barragem:0 "&#39;Escola Superior de Guerra&#39;"
 bra_barragem_desc:0 "Durch die vorrangige Finanzierung der Superior War School in Urca wird die Ausbildung von mehr Offizieren gefördert, die sich der vielfältigen Einsatzmöglichkeiten überwältigender Feuer- und Luftunterstützung in der Kriegsführung bewusst sind."
 bra_basta:0 "Genug!"
 bra_basta_desc:0 "Wir werden die Krisen, die Staatsstreiche, die Einschränkung der industriellen Entwicklung durch Importe, die Ausbeutung unserer natürlichen Ressourcen, die transkontinentale Unterdrückung und die diplomatische Arroganz nicht länger dulden. Es reicht!"
 bra_belem_porto:0 "Marinewerft von Belém"
 bra_belem_porto_desc:0 "Durch den Bau des Hafens von Belém erhält das Land einen strategischen Stützpunkt im Norden, der die riesigen Flotten der Föderation unterstützen und als Basis für Invasionsoperationen nördlich des Äquators dienen kann."
 bra_blitz:0 "„Academia Militar das Agulhas Negras“"
 bra_blitz_desc:0 "Durch die Priorisierung der Finanzierung der Militärakademie Agulhas Negras in Resende wird die Ausbildung von mehr Offizieren gefördert, die sich mit den vielfältigen Einsatzmöglichkeiten der Waffenkombination und schnellen Manöver in der Kriegsführung auskennen."
 bra_bndes:0 "BNDES"
 bra_bndes_desc:0 "Die Nationalbank für wirtschaftliche und soziale Entwicklung wird ein staatliches Bundesunternehmen mit Sitz in Rio de Janeiro sein, dessen Hauptziel die Finanzierung langfristiger Investitionen in allen Bereichen der Wirtschaft, des Sozialen, der Region und der Umwelt ist."
 bra_bombardeiro:0 "„Eduardo Gomes“-Doktrin"
 bra_bombardeiro_desc:0 "Obwohl die Bomber im Bürgerkrieg von der Union eingesetzt wurden, sind sie seit ihrem letzten Einsatz durch Brasilien präziser und tödlicher geworden. Brigadegeneral Eduardo Gomes bombardierte während dieses Krieges Campinas und schwächte mit einer schäbigen Staffel einen Großteil der Infrastruktur der Stadt. Wir werden ihn zum Kommandeur der Luftwaffe einsetzen."
 bra_brasilia:0 "Brasília"
 bra_brasilia_desc:0 "Die Verlegung der Hauptstadt ins Landesinnere war seit dem Kaiserreich Pedro II. eines der nationalen Ziele. Dies war nicht nur aus sicherheitspolitischen Gründen von Interesse, da es verhinderte, dass die Hauptstadt von Seeangriffen betroffen war, sondern auch als Garantie für die Entwicklung des Landesinneren. Beginnen wir nun mit dem Bau dieser neuen Hauptstadt."
 bra_brasilia_tooltip:0 "§C Leitet die dringend notwendige Verlegung der Hauptstadt ein, erneuert die politische Arena und zentralisiert staatliche Entscheidungen. Ermöglicht Wahlen für die Exekutive und die Möglichkeit, bevorzugte Kandidaten zu unterstützen.§!"
 bra_brazilian_action:0 "Die integralistische Levante"
 bra_brazilian_action_desc:0 "Durch Vargas&#39; Nationales Sicherheitsgesetz wurden die ANL und die PCB illegal. Die massive politische Gegenreaktion stürzte die nationale Politik ins Wanken. Obwohl die AIB bereits ein populärer Titan ist, können wir sie um die meisten konservativen Agrarpolitiker erweitern, die gegen Vargas sind, und so den Einfluss des Faschismus auf die Regierung stärken."
 bra_caca:0 "Ministerium für Luftfahrt"
 bra_caca_desc:0 "Mit der Gründung des Luftfahrtministeriums kann die Regierung den Ausbau dieses neuen Zweigs der Streitkräfte der Republik steuern."
 bra_chsf:0 "Wasserkraftunternehmen von São Francisco"
 bra_chsf_desc:0 "Die São Francisco Hydroelectric Company ist ein börsennotiertes Unternehmen, das in der Erzeugung und Übertragung von Energie mit hoher und höchster Spannung tätig ist und das Einzugsgebiet des Flusses São Francisco erkundet."
 bra_ciclocana:0 "EMBRAPA"
 bra_ciclocana_desc:0 "Mit der Einführung der Kalkablagerung und der lokalen Bewässerung sowie den staatlichen Fördermitteln für die Erforschung neuer Anbautechnologien durch das brandneue brasilianische Unternehmen für Agrarforschung (EMBRAPA) werden wir in der Lage sein, die Zuckerrohrproduktion, die auf nationalem Territorium seit jeher präsent ist, bis an die Tore des Cerrado auszuweiten."
 bra_ciclosoja:0 "Der Sojagürtel"
 bra_ciclosoja_desc:0  "Mit der Einführung moderner Entwässerungsmethoden und der Mechanisierung der Landwirtschaft auf nationaler Ebene ist es nun möglich, in Mato Grosso, einer isolierten Region der Föderation, Sojabohnen anzubauen. Soja wurde nie zuvor auf nationalem Boden angebaut. Es bietet Potenzial für die Verwendung als Nahrungsmittel, den Export und die Besiedlung des Landesinneren."
 bra_cmsp:0 "Weitere Arbeitseinwanderung"
 bra_cmsp_desc:0 "Die Metropole São Paulo lebt von der Arbeitskraft ihrer ausländischen Einwanderer. Indem wir die Armen aus anderen Teilen unseres Landes – insbesondere aus dem Nordosten – bei der Einwanderung nach São Paulo unterstützen, werden wir sicherlich Industrien mit billigeren Arbeitskräften aufbauen und ihre Expansion beschleunigen – zu einem hohen gesellschaftlichen und demografischen Preis."
 bra_cosipa:0 "Aliperti"
 bra_cosipa_desc:0 "Aliperti SA wurde 1924 in Brás (São Paulo) gegründet und begann in seinen Niederlassungen in Água Funda mit der Stahlproduktion. Das Unternehmen verspricht, den Großteil des zivilen Marktes mit hochwertigen Stahlprodukten zu beliefern, sofern die Landesregierung den Zugang zu den Eisenerzvorkommen von Minas Gerais verbessert."
 bra_cosmopolitanism:0 "Multikulturalismus &amp; Weltoffenheit"
 bra_cosmopolitanism_desc:0 "Brasiliens kulturelle und ethnische Vielfalt sowie seine Vorreiterrolle in sozialliberalen und neomarxistischen Bewegungen sind einer seiner Vorteile als Bastion der Arbeiterrevolution. Die Indoktrination des grammatikalischen Gedankenguts im nationalen Bildungssystem wird dem revolutionären Staat zugutekommen."
 bra_cruzadores:0 "„Ermutigt“"
 bra_cruzadores_desc:0 "Brasilien verfügt seit seiner Unabhängigkeit über die größten Meerestiere in seinem Arsenal. Wir werden es nicht anders machen."
 bra_csn:0 "Nationales Siderurgisches Unternehmen"
 bra_csn_desc:0 "Der Nationale Plan für Eisenerzgewinnung wurde mit dem Ziel erstellt, die Eisengewinnungsregionen zu definieren und den Bau von Stahlproduktionszentren in Brasilien umzusetzen."
 bra_diplomacia:0 "„Itamaraty“"
 bra_diplomacia_desc:0 "Der Itamaraty-Palast – Nheengatu bedeutet „Fluss aus treibenden Felsen“ – ist der Sitz des Außenministeriums in Rio de Janeiro. Unter alten Verhältnissen konzentrierten wir uns im Ausland auf die Anwerbung von Investitionen und Krediten. Heute haben wir die Möglichkeit, uns etwas „aktiver“ am Weltgeschehen zu beteiligen."
 bra_diplomacia_tooltip:0 "§CInitiiert diplomatische Missionen auf der ganzen Welt.§!"
 bra_dofa_tooltip:0 "Erlangt Kern- und Kriegsziele gegen Uruguay und Paraguay"
 bra_dreams_of_an_empire:0 "Das Oktober-Manifest"
 bra_dreams_of_an_empire_desc:0 "„Die brasilianische Nation muss organisiert, vereint, unteilbar, stark, mächtig, reich, wohlhabend und glücklich sein. Dafür brauchen wir die Einheit aller Brasilianer. Doch solange es Staaten innerhalb des Staates gibt und politische Parteien die Nation spalten, kann Brasilien diese enge und vollkommene Einheit seiner Kinder nicht erreichen.“"
 bra_elet_1:0 "ECISA"
 bra_elet_1_desc:0 "Engineering, Commerce and Industry SA (ECISA) ist ein großes Bauunternehmen aus dem Bundesstaat Rio de Janeiro. Als eines der traditionsreichsten Ingenieurbüros Brasiliens setzt sich ECISA für eine stärkere Beteiligung an öffentlichen Aufträgen ein, um diese im Gegenzug in Rekordzeit zu realisieren."
 bra_elet_2:0 "Eletrobrás"
 bra_elet_2_desc:0 "Electrical Centrals of Brasil SA ist eine von der brasilianischen Bundesregierung gegründete Aktiengesellschaft mit dem Ziel, die Stromerzeugung und -verteilung im gesamten Staatsgebiet zu koordinieren und so die vollständige Energieversorgung des Landes zu gewährleisten."
 bra_eletrobras:0 "Telebrás"
 bra_eletrobras_desc:0 "Brazilian Telecomunications S/A wird ein Bundesunternehmen sein, das für die Steuerung der nationalen Kommunikationspolitik sowie für die Bereitstellung von Telefondiensten und die Organisation der Verteilung einer angemessenen Kommunikationsinfrastruktur im ganzen Land verantwortlich ist."
 bra_eletronuclear:0 "Elektronennuklear"
 bra_eletronuclear_desc:0 "Eletrobras Eletronuclear ist ein Verwaltungsunternehmen, dessen Ziel der Bau und Betrieb thermonuklearer Anlagen auf dem Staatsgebiet ist, um die Vielfalt der Energiematrix und möglicherweise auch die Bereitstellung von Rohstoffen für die Entwicklung von Atomwaffen sicherzustellen."
 bra_eng_mart:0 "Votorantim SA"
 bra_eng_mart_desc:0 "Votorantim SA ist eines der größten Industrieunternehmen São Paulos. Das 1918 gegründete Unternehmen ist führender Hersteller von Zellstoff, Papier, Zement und vielen weiteren Rohstoffen für andere Industrien und Baustellen. Es läge im Interesse des Landes, Votorantim SA die Rechte zur Belieferung öffentlicher Bauvorhaben zu übertragen."
 bra_entreguismo:0 "„Entreguismo“"
 bra_entreguismo_desc:0 "Entreguismo – ein portugiesischer Neologismus für „Ideologie des Verschenkens“ – ist ein abwertender Begriff für Nationalisten aller Ideologien, mit dem sie liberalere Brasilianer angreifen, die gegen die Verstaatlichung des gesamten brasilianischen Öls sind. So abwertend dieser Begriff auch klingen mag, Ausländern den Zugang zu unseren Rohstoffreserven zu ermöglichen, könnte durchaus Vorteile haben."
 bra_entreguismo_tooltip:0 "§CDie Annahme dieser Richtlinie verschafft Ihnen mehr Vorteile, wenn Sie sich über die Brennpunkte mit einer ausländischen Macht verbünden.§!"
 bra_equip_ind:0 "IMBEL"
 bra_equip_ind_desc:0 "Anstatt ihre Infanterie zu motorisieren, entschieden sich die Mineiros für eine Steigerung ihrer Kampfeffizienz. Die Ausrüstung der legalistischen Infanterie war im Vergleich zu den Paulistas moderner, schneller und präziser und erleichterte so die Verteidigung der Schützengräben. Wir können Verträge mit unseren Waffenherstellern zur Modernisierung unserer Infanterie abschließen."
 bra_estado_novo:0 "Der „Estado Novo“"
 bra_estado_novo_desc:0 "Ein zentraler Staat mit seiner umfassenden Weisheit und industriellen Pionierleistung ist in der Lage, das allgemeine Wohlergehen der Bürger und den Wohlstand seiner Unternehmer zu gewährleisten. Diese ewige Verbindung zwischen den Arbeitern, Kriegern und willensstarken Geschäftsleuten der Republik soll eine ewige brasilianische Einheit gewährleisten."
 bra_etanol:0 "„Proálcool“"
 bra_etanol_desc:0 "Nie zuvor bot die Landwirtschaft ein solches Potenzial für die brasilianische Wirtschaft und Kriegsmaschinerie: Dank der Forschung der Bundesuniversitäten und der EMBRAPA ist es nun möglich, Benzin in den meisten Fahrzeugen durch wasserhaltigen Ethanol zu ersetzen. PROÁLCOOL ist das Programm der brasilianischen Bundesregierung, das sicherstellen soll, dass in Brasilien produzierte Fahrzeuge künftig mit Alkohol betrieben werden."
 bra_etanol_focus_tooltip:0 "Ermöglicht die §CPró-Alcool-Entscheidungen§!"
 bra_feb:0 "Die brasilianischen Expeditionstruppen"
 bra_feb_desc:0 "Wir verfügen über die logistischen, taktischen, organisatorischen, industriellen und numerischen Kapazitäten, um Expeditionen ins Ausland zu organisieren, mit dem Ziel, die Interessen der Republik vor denen zu verteidigen, die es wagen, sie zu bekämpfen."
 bra_federal_institutes:0 "Bundesinstitute"
 bra_federal_institutes_desc:0 "Die Bundesanstalten sind Ausgliederungen von Universitäten, die sich ausschließlich der praxisorientierten technologischen Innovation widmen."
 bra_federal_universities:0 "Bundesuniversitäten"
 bra_federal_universities_desc:0 "Die staatlichen Universitäten sind sowohl Bildungszentren als auch Keimzellen für technologische Innovationen. Die Regierung ist an der angemessenen Nutzung ihrer technologischen Gewinne interessiert."
 bra_federalism:0 "„Progresso“"
 bra_federalism_desc:0 "Fortschritt – das ultimative Ziel von Entwicklung und Einheit – ist die Verschmelzung der sozialen und industriellen Entwicklung unserer Nation sowie der moralischen und individuellen Umwälzungen ihrer Bürger."
 bra_fiesp:0 "FIESP"
 bra_fiesp_desc:0 "Der Industrieverband des Bundesstaates São Paulo vertritt Hunderte von Gewerkschaften und Hunderttausende von Industriebetrieben im am stärksten industrialisierten Bundesstaat der Union. Er bringt die Pläne der Regierung zum Ausdruck und möchte das Nützliche mit dem Angenehmen verbinden, den Übergang zwischen neuen Produktionsprojekten erleichtern und so in Friedens- und Kriegszeiten Innovationen ermöglichen."
 bra_gerdau:0 "Montreal SA"
 bra_gerdau_desc:0 "Montreal Engenharia SA ist ein Maschinenbau- und mittelständisches Industriebauunternehmen in Brasilien, das sich auf Landinfrastruktur und Industriemontagen konzentriert. Wir können es sponsern, um die Geschäftstätigkeit von Petrobrás und unsere mittelgroßen Montagebetriebe in großem Maßstab zu erweitern."
 bra_guianas:0 "Von der Prata in die Karibik"
 bra_guide_latam:0 "Die Crux"
 bra_guide_latam_desc:0 "Wenn Brasilien seinen lang gehegten Traum verwirklichen will, eine internationale Macht zu werden, müssen wir dies würdig tun. Sei es durch die Integration des Kontinents durch Diplomatie oder Gewalt, Brasilien wird das Licht des globalen Südens erstrahlen lassen und als dessen Anführer und Großmacht hervorgehen."
 bra_heal_wounds:0 "Beteiligen Sie sich an der Weltpolitik"
 bra_heal_wounds_desc:0 "Wenn Brasilien seinen lang gehegten Traum verwirklichen will, eine internationale Macht zu werden, müssen wir uns in die internationalen Märkte und die internationale Politik integrieren, an transatlantischen Kriegen teilnehmen und als zukünftige Macht auftreten."
 bra_infraero:0 "Infraero"
 bra_infraero_desc:0 "Die brasilianische Flughafeninfrastrukturgesellschaft ist ein staatliches Bundesunternehmen, dessen Schwerpunkt auf der Regulierung und dem Betrieb von Flughäfen aller Größenordnungen im ganzen Land liegt, um die Allgegenwärtigkeit von Flugzeugen auf nationalem Boden und im nationalen Himmel zu gewährleisten."
 bra_itabira:0 "Itabira"
 bra_itabira_desc:0 "Die Minen in Itabira, Minas Gerais, sind Teil des Quadrilátero Ferrífero, der größten Eisen- und Bauxitlagerstätte des Landes und einer der größten der Welt. Indem wir sicherstellen, dass die dort geförderten Mineralien ausschließlich von Brasilien genutzt werden, sichern wir unsere Bodenschätze."
 bra_itaipu:0 "Wasserkraftwerk Itaipu"
 bra_itaipu_desc:0 "Das Wasserkraftwerk Itaipu ist das bislang ehrgeizigste Projekt der brasilianischen Regierung. Es soll im Einzugsgebiet des Flusses Paraná errichtet werden und die gesamte Stromproduktion im Süden und Südosten Brasiliens übernehmen. Das Wasserkraftwerk soll das größte und effizienteste seiner Art werden – eine Meisterleistung brasilianischer Ingenieurskunst."
 bra_iti:0 "Ministerium für Arbeit, Handel und Industrie"
 bra_iti_desc:0 "Das Ministerium für Arbeit, Handel und Industrie wird die Regierung bei Fragen der industriellen Expansion und Modernisierung unterstützen."
 bra_lobato:0 "Lobato"
 bra_lobato_desc:0 "Ein Zwischenfall zwischen zwei Nachbarn in Lobato, Bahia, widerlegte die Behauptung der Regierung, dass es auf brasilianischem Boden kein Öl gebe."
 bra_mec:0 "ENGESA"
 bra_mec_desc:0 "Eine der größten Errungenschaften des Staates São Paulo während des Krieges war der Bau von Panzerzügen. Um die gegnerische Kaffeeladung zu verstreuen, wurden die Züge mit dicken Metallplatten ausgestattet, in den Fenstern befanden sich Maschinengewehre und vorne eine Kanone. Wir können einigen LKW-Herstellern bei der Gründung eines Unternehmens helfen, um unseren Bedarf an mechanisierten Einheiten zu decken."
 bra_mercosul_expansao_focus:0 "Die Union Südamerikanischer Nationen"
 bra_mercosul_expansao_focus_desc:0 "Der MERCOSUL als Wirtschaftsblock und unsere Investitionen in Lateinamerika haben sich ausgezahlt, und viele lateinamerikanische Staats- und Regierungschefs haben inzwischen verstanden, dass ein gemeinsamer Schutz der beste Weg ist, ihre Interessen zu wahren."
 bra_mercosul_expansao_tooltip:0 "§CErweitert den Handelspakt des MERCOSUL zur UNASUL, einer gemeinsamen Verteidigungsorganisation mit Schwerpunkt Südamerika, und lädt die Mitglieder des MERCOSUL ein.§!"
 bra_mercosul_focus:0 "Der Gemeinsame Markt des Südens"
 bra_mercosul_focus_desc:0 "MERCOSUL ist eine zwischenstaatliche Organisation, die von ihren Mitgliedern, den Demokratien Südamerikas, organisiert wird und sich auf die Organisation des Handels, die Erleichterung des Devisenverkehrs und die Gestaltung einer Steuerpolitik konzentriert, die den kontinentalen Handel begünstigt."
 bra_mercosul_militar_focus:0 "Investitionen in Lateinamerika"
 bra_mercosul_militar_focus_desc:0 "Wir sind im Laufe der Jahre definitiv reicher und industrialisierter geworden. Vielleicht ist es an der Zeit, einige unserer Geheimnisse mit unseren Nachbarn zu teilen. Wir können sicherlich davon profitieren, die Kontrolle zu haben."
 bra_mercosul_militar_tooltip:0 "§CFügt zwei Gebäudeplätze hinzu, eine Militärfabrik, eine Zivilfabrik und eine Infrastrukturebene in einem zufälligen Zustand aller südamerikanischen MERCOSUL-Mitglieder.§!"
 bra_mercosul_tooltip:0 "§CSchafft einen Handelspakt und eröffnet Möglichkeiten für zukünftige Einladungen lateinamerikanischer Nationen mit gleicher Ideologie in die UNASUL. Demokratien und Blockfreie Staaten nehmen gegenseitig teil.§!"
 bra_military_projects:0 "„Instituto Militar de Engenharia“"
 bra_military_projects_desc:0 "Das Militäringenieurinstitut (IME) trägt durch Ausbildung und Forschung zur wissenschaftlichen und technologischen Entwicklung der brasilianischen Nation und Armee bei, sei es bei der Entwicklung neuer Ausrüstung für den Einsatz im Kampf oder bei der Anpassung und Eingliederung ausländischer Kriegstechnologien in die Reihen der brasilianischen Streitkräfte."
 bra_mobilizacao_ind:0 "Dekret zur Nationalen Mobilisierung"
 bra_mobilizacao_ind_desc:0 "Durch Maßnahmen, Dekrete und Unterabschnitte in der Verfassung ist die Union in der Lage, die Geschwindigkeit und Reichweite des Belagerungszustands zu erhöhen und so die Reaktionsfähigkeit Brasiliens auf einen Krieg erheblich zu erweitern."
 bra_mod_mad_mamo:0 "BR-230"
 bra_mod_mad_mamo_desc:0 "Das Transamazonische Projekt stellt eine der größten Herausforderungen unseres Landes dar: die Besetzung des Amazonas-Regenwalds. Die Fertigstellung dieses Autobahnprojekts würde die Mobilität unserer Truppen im Norden erhöhen."
 bra_mod_sb:0 "BR-163"
 bra_mod_sb_desc:0 "Die BR-163 wird für die Entwicklung und Besetzung von Mato Grosso und des südlichen Amazonasgebiets von zentraler Bedeutung sein. Die dortigen kleinen Dörfer könnten sich zu den wichtigsten Zentren der landwirtschaftlichen Produktion und des Agrarvertriebs entwickeln."
 bra_mod_soroc:0 "BR-116"
 bra_mod_soroc_desc:0 "Die BR-116 würde Südbrasilien mit Nordostbrasilien verbinden. Beide Zentren der expressiven Produktion und Konsumtion sowie Brasiliens militärisch sensibelste Region grenzen an zwei unserer historischen Feinde und den Kern der brasilianischen Armee. Die Verbesserung dieser Verbindung ist unerlässlich, um die nationalen Produktions- und Armeequoten zu erfüllen."
 bra_modernizacao_aerea:0 "Die brasilianische Luftwaffe"
 bra_modernizacao_aerea_desc:0 "Um die brasilianische Macht über den Himmel zu sichern, ist es unerlässlich, die Luftwaffe als Hauptbestandteil der Streitkräfte der Republik einzusetzen."
 bra_modernizacao_armadas:0 "Ministerium der Streitkräfte"
 bra_modernizacao_armadas_desc:0 "Die Schaffung eines Ministeriums, das alle Teilstreitkräfte der Streitkräfte vereint, wird die politischen Manöver der Armee ermöglichen und künftige Konflikte zwischen ihren Führern um politische Interessen verhindern, wie es seit 1889 der Fall ist."
 bra_modernizacao_marinha:0 "„Florianismus“"
 bra_modernizacao_marinha_desc:0 "Die Modernisierung der Marine ist unerlässlich, um die brasilianische Seemacht zu sichern. Floriano Peixoto war der erste Admiralpräsident der Republik. Während seiner Herrschaft bewahrte er unser großes Marineerbe. Wir müssen es bewahren."
 bra_monarquia_2_focus:0 "Formalisierung der patriarchalistischen Bewegung"
 bra_monarquia_2_focus_desc:0 "Die Patrianovistische Bewegung – wörtlich übersetzt „Neuvaterlandismus“ – ist eine monarchistische Organisation, die ideologisch eng mit den Grundsätzen des Integralismus verbunden ist. Im Hinblick auf die Möglichkeit einer imperialen Restauration stellt sie Brasiliens beste Chance dar. Wie die meisten politischen Organisationen wurde sie durch die neue Verfassung verboten, was jedoch nicht bedeutet, dass sie weiterhin nicht aktiv sein kann."
 bra_monarquia_focus:0 "&#39;Amor&#39;"
 bra_monarquia_focus_desc:0 "Liebe – das oberste Prinzip, nach dem eine Nation und ihr Volk handeln – muss in all unseren Interaktionen präsent sein. Liebe liegt in Einheit, Brüderlichkeit und Familie. Wer könnte diese nationale Familie besser leiten als ein großer Vater, der alle seine Kinder durch die Schwierigkeiten des neuen Jahrhunderts begleitet, wie es viele vor ihm getan haben?"
 bra_monarquia_tooltip:0 "§CLeitet den Prozess der kaiserlichen Wiederherstellung ein§!"
 bra_more_federal_universities:0 "Bundeslager"
 bra_more_federal_universities_desc:0 "Mehr Universitäten bedeuten mehr Lernende und mehr Fortschritt. Die Umwandlung kleiner Hochschulen im Landesinneren in große Bildungszentren sollte eine Priorität der Regierung sein."
 bra_mot:0 "FNM"
 bra_mot_desc:0 "Während des Bürgerkriegs mobilisierte die Paulista-Armee die großen Automobilproduktionszentren der Hauptstadt und nutzte deren Produktion, um ihre Soldaten schnell zwischen den legalistischen Schützengräben zu verlegen. Wir konnten einen neuen Fahrzeughersteller mit Sitz in Duque de Caxias gründen."
 bra_natal_porto:0 "Natal Marinewerft"
 bra_natal_porto_desc:0 "Der Bau einer Marinewerft in Natal soll dem Nordosten Brasiliens einen neuen Zugang zur Weltbühne eröffnen. Über sie können Tonnen von Import- und Exportgütern transportiert werden. Der Hafen wird hauptsächlich zivilen Zwecken dienen, kann aber auch für militärische Zwecke genutzt werden."
 bra_national_institutes:0 "Nationale Institute"
 bra_national_institutes_desc:0 "Die Unterstützung der Expansion der bereits zahlreichen großen Institute, die über ganz Brasilien verstreut sind, wie etwa der Institute Oswaldo Cruz und Butantã, wird den wissenschaftlichen Fortschritt unseres Landes erheblich beschleunigen."
 bra_national_security_law:0 "Nationales Sicherheitsgesetz"
 bra_national_security_law_desc:0 "Das Nationale Sicherheitsgesetz stellt einen Übergangspunkt zwischen dem rechtlichen Erbe des Bürgerkriegs von 1932 und der neuen brasilianischen Politik dar. Wir sollten es im Interesse der landesweiten Einheit umsetzen."
 bra_new_constitution:0 "Nicht Dvcor Dvco"
 bra_new_constitution_desc:0 "„Was ich nicht verstehe, ist, wie eine Nation wie Brasilien nach mehr als einem Jahrhundert Verfassungsleben und Liberalismus in eine grenzenlose Diktatur zurückfallen konnte, die uns vor der zivilisierten Welt erniedrigt und ausbeutet!“"
 bra_noronha_tooltip:0 "Erstellt den Anführer der Marine: Isaías de Noronha"
 bra_nuclear_research_bureau:0 "„O Programa Paralelo“"
 bra_nuclear_research_bureau_desc:0 "Unser Geist und unsere Waffen sind wertlos, wenn unser gesamtes Land von unseren Feinden in Sekundenschnelle vernichtet werden kann."
 bra_obras_exterior:0 "Bundesstraßen"
 bra_obras_exterior_desc:0 "Für ein so großes und dünn besiedeltes Land wie unseres ist die Logistik eine der größten Herausforderungen. Autobahnen sind die perfekte Lösung für unsere Probleme: Sie verbinden weit entfernte Ballungszentren, befeuern unsere Automobilindustrie und machen uns unabhängiger vom veralteten Schienenverkehr."
 bra_patri_1_focus:0 "Bringen Sie die Integralisten herein"
 bra_patri_1_focus_desc:0 "Vargas&#39; Putsch hat alle Parteien in Aufruhr versetzt. Da Plínios Ministerium ein ferner Traum ist, können wir unseren Einfluss auf die afrobrasilianischen und nordöstlichen Gemeinschaften nutzen, um die Integralisten davon zu überzeugen, dass ihre beste Überlebenschance darin besteht, unsere Bemühungen zu vereinen und ihre „Organische Republik“ in ein Imperium zu verwandeln."
 bra_patri_2_focus:0 "Die Armee von Caxias"
 bra_patri_2_focus_desc:0 "Die brasilianische Armee war der Hauptakteur des Putsches, der Kaiser Pedro II. 1889 ins Exil trieb. Viele Angehörige der Streitkräfte, darunter auch Marschall Deodoro selbst, bedauerten die Ereignisse vom 15. November. Indem wir Caxias, den Schutzherrn der brasilianischen Armee, wieder mit seiner loyalen Verehrung des Kaisers in Verbindung bringen, können wir ihr Vertrauen in die republikanischen Institutionen erschüttern."
 bra_patri_3_focus:0 "Memoiren des Befreiers"
 bra_patri_3_focus_desc:0 "1888 unterzeichnete Prinzessin Isabel, die Tochter von Pedro II., per Gesetz das absolute Verbot der Sklaverei. Dafür sind sie und ihre Familie in der schwarzen Bevölkerung Brasiliens sehr beliebt. Die meisten ihrer Bewunderer leben noch immer auf dem Land und fernab der Städte, weit entfernt von Vargas&#39; Populismus und immer näher an unserer Sache."
 bra_patri_4_focus:0 "Über die Freimaurerei"
 bra_patri_4_focus_desc:0 "Während die Freimaurerei und ihre Anhänger von der katholischen Gemeinschaft weltweit öffentlich gemieden und verachtet wurden, genoss die brasilianische Freimaurerei die persönliche Zustimmung unserer Monarchen. Es liegt an der Bewegung und dem zukünftigen Kaiser selbst, ob sie im Dritten Reich tätig sein darf oder nicht."
 bra_patri_5_focus:0 "Restauriere den „Padroado“"
 bra_patri_5_focus_desc:0 "Die landesweite Unterstützung der Freimaurerei wäre ein direkter Affront gegen die Kirche. Das bedeutet jedoch nicht, dass wir ein säkulares Imperium errichten wollen. Der Katholizismus prägt zwar die Moral und Ethik unserer Bürger, hat aber keinen Einfluss auf die des Kaisers. Zu diesem Zweck werden wir das Padroado-System wiederherstellen, durch das die Moderative Macht die Tätigkeit der Kirche in unserem Land reguliert."
 bra_patri_6_focus:0 "Der Pakt des Heiligen Christophorus"
 bra_patri_6_focus_desc:0 "Die landesweite Verbannung der Freimaurerei ist ein radikales, aber notwendiges Manöver. Angesichts der Möglichkeit eines erneuten Verrats am Kaiser benötigen wir die Unterstützung der Kirche mehr denn je. Der im Christophoruspalast geschlossene Pakt würde die Position der Kirche und ihre Rolle als Unterstützer des Kaiserreichs festigen."
 bra_patri_7_focus:0 "Unser Parlamentarismus"
 bra_patri_7_focus_desc:0 "Brasilien ist zu groß, zu vielfältig und zu stolz, um der Tyrannei zu erliegen. Die Beibehaltung der gesetzgebenden Provinzversammlungen, die Autonomie des Parlaments bei Verfassungsänderungen und die regionale Kontrolle der Nationalgarde – durch die Einführung des Zusatzgesetzes von 1834 – sorgen dafür, dass ganz Brasilien ohne unsere Kinderbetreuung zusammenhält." 
 bra_patri_8_focus:0 "Das Bio-Imperium"
 bra_patri_8_focus_desc:0 "Die Union aller Rassen und Völker – angetrieben vom immer stärker werdenden Wunsch nach nationalem Wohlstand und Ruhm – lässt keinen Raum für Regionalpolitik und politische Manöver. Die Stärkung der Mäßigungsmacht, die durch die Neuinterpretation des Interpretationsgesetzes von 1840 zum Ausdruck kam, wird dem Kaiser die vollständige Kontrolle über die Nationalgarde und die Provinzverwaltung sichern."
 bra_patri_9_focus:0 "Die Restaurierung"
 bra_patri_9_focus_desc:0 "Die Armee, die großen Politiker, die integralistischen Milizen, die Schwarzen, die Armen, die Weißen, die Reichen. Alles Brasilianer, alles Diener Seiner Majestät. Diese Brasilianer, gestärkt durch die nationale Erneuerung, werden die Geburt des Dritten Brasilianischen Kaiserreichs festigen."
 bra_patriotic_effort:0 "Pro Brasilia Fiant Eximia"
 bra_patriotic_effort_desc:0 "Die brasilianische Nation verlangt von den Bürgern aller Teile ihres riesigen Staatsgebiets, sich für ihre Erhaltung, Verteidigung und Entwicklung einzusetzen. Die Brasilianer müssen diesen Forderungen nachkommen, ob sie nun dem nationalen Wohl oder ihrer eigenen nationalen Freiheit dienen."
 bra_petrobras:0 "„Petrobrás“"
 bra_petrobras_desc:0 "Petrobras wird das staatliche Unternehmen von Brazilian Petrol sein und ist daher für die Exploration, Raffination und Erweiterung von Ölquellen im ganzen Land verantwortlich."
 bra_plan_cohen:0 "Spieße die grünen Hühner auf"
 bra_plan_cohen_desc:0 "Die Grünen Hühner, wie wir die Integralisten nennen, leisten der rechtmäßigen Machtübernahme Brasiliens durch das Volk gewaltsamen Widerstand. Um den Sieg der Revolution zu sichern, müssen unsere Parteiführer persönlich unsere Armeen gegen den Faschismus anführen!"
 bra_polaca:0 "„Polaca“"
 bra_polaca_desc:0 "Eine vierte brasilianische Verfassung kann mit dem Ziel umgesetzt werden, ein System zu etablieren, in dessen Mittelpunkt der Präsident der Republik steht."
 bra_politechnical_colleges:0 "Polytechnische Hochschulen"
 bra_politechnical_colleges_desc:0 "Durch den Bau polytechnischer Hochschulen in den großen städtischen Zentren des Landes werden Tausende junger Menschen ausgebildet, die in der Lage sind, dem Land in ihren jeweiligen produktiven Funktionen zu dienen."
 bra_populism:0 "&#39;Ordem&#39;"
 bra_populism_desc:0 "Ordnung – die alleinige Bewahrung dessen, was gut, schön und positiv ist – als Grundlage wird ein kraftvolles Statement für das neue Zeitalter sein, weg von den Fehlern und Tragödien der Vergangenheit, die von Hunger und Armut geprägt waren." 
 bra_quereismo:0 "Abteilung für Presse und Propaganda"
 bra_quereismo_desc:0 "Obwohl Vargas Position durch das Nationale Sicherheitsgesetz geschützt ist, können wir uns nicht allein auf unsere integralistischen Generäle, kommunistischen Soldaten und liberalen Politiker verlassen. Indem wir diese Gruppen gegeneinander ausspielen – spalten und erobern – können wir ihnen langsam und sicher ihren Einfluss nehmen."
 bra_r_s_1:0 "Die Bundesuniversität von Rio de Janeiro"
 bra_r_s_1_desc:0 "Die Universität von Rio de Janeiro umfasst eine Gruppe kleinerer Fakultäten, die in der Lage sind, große Genies des Landes auszubilden. Ihre Fachleute und Wissenschaftler werden für die Modellierung des technologischen Brasiliens verantwortlich sein."
 bra_r_s_2:0 "Die Universität von São Paulo"
 bra_r_s_2_desc:0 "Die Universität von São Paulo ist der komplexeste akademische Komplex Lateinamerikas. Sie ist einer der führenden Akteure der technologischen Entwicklung des Landes und der größte Kern nationaler Innovation."
 bra_reclaim_uruguay:0 "Cisplatin"
 bra_reclaim_uruguay_desc:0 "Uruguay war bis zu seiner umstrittenen Unabhängigkeit im Jahr 1825 eine brasilianische Provinz. Brasilien, das in der Lage war, der Gehorsamsverweigerung entgegenzuwirken, zog es damals vor, die Existenz Uruguays zuzulassen. Jetzt, ohne die Monroe-Doktrin und als eine der großen Nationen auf internationaler Ebene anerkannt, müssen wir uns zurückholen, was uns gehört!"
 bra_regionalism:0 "Nicht Dvcor Dvco"
 bra_regionalism_desc:0 "Obwohl die Durchsetzung des Nationalen Sicherheitsgesetzes unsere Beziehungen zur provisorischen Regierung von Vargas und – noch schlimmer – zur Polaca schwer getroffen hat, ist es noch nicht an der Zeit, nachzugeben. Ein Kompromiss mit den Faschisten und die Zusammenkunft legalistischer Offiziere werden uns binden und uns stark genug machen, um Vargas zu bekämpfen."
 bra_salvador:0 "Nationaler Erdölrat"
 bra_salvador_desc:0 "Die Regierung kann die in Salvador entdeckten neuen Ölquellen verstaatlichen und so die Souveränität des Landes über diese lebenswichtige Ressource garantieren."
 bra_secret_research:0 "Ministerium für Wissenschaft und Technologie"
 bra_secret_research_desc:0 "Die Schaffung von Technologiezentren, die ausschließlich wichtigen Projekten der Streitkräfte gewidmet sind, wird sich für die Aufrechterhaltung der nationalen Sicherheit als unerlässlich erweisen."
 bra_sem_eixo:0 "Der Uiraçu"
 bra_sem_eixo_desc:0 "Seit den Tagen des Kaiserreichs kämpft Brasilien nicht mehr in einem Kontinentalkrieg. Jedenfalls nicht in einem größeren. Unsere neu erstarkte Energie und unser Nationalismus haben uns sicherlich daran erinnert, und wir werden unser Schicksal erfüllen, uns von der Karibik bis in die Prata auszudehnen."
 bra_sub_priv:0 "CLT"
 bra_sub_priv_desc:0 "Artikel 1: Diese Konsolidierung legt die Standards fest, die die individuellen und kollektiven Arbeitsverhältnisse und die darin festgelegten Bedingungen regeln."
 bra_submarinos:0 "Studieren Sie italienische U-Boote"
 bra_submarinos_desc:0 "Wir haben bereits einige italienische U-Boote in Dienst gestellt und ausgeliefert. Das Marineministerium schlägt vor, dass wir sie untersuchen, um unsere eigenen U-Boot-Entwürfe zu perfektionieren."
 bra_technical_schools:0 "Technische Schulen"
 bra_technical_schools_desc:0 "Bisher war Bildung für unsere Bürger nur wenigen Menschen vorbehalten. Indem wir die unteren Schichten an weit verbreiteten Berufsschulen oder technischen Schulen ausbilden, erweitern wir unsere Kapazitäten für die Rekrutierung von Industriearbeitern und verbessern so die Lebensbedingungen vieler Menschen."
 bra_tecnocratic_reform:0 "Institutionelle Technokratie"
 bra_tecnocratic_reform_desc:0 "Während der Ersten Republik wurden Meritokratie und Wissenschaft von den privaten und öffentlichen Institutionen des Landes hoch geschätzt. Der wissenschaftliche Fortschritt dieser Zeit ist unbestreitbar, insbesondere die Einführung von Elektrizität und Stahl durch große Unternehmer. Mit dem Aufkommen neuer Technologien wird die Wiedereinführung dieser Werte den technologischen Fortschritt des Landes erheblich fördern."
 bra_tenenge:0 "Tenenge SA"
 bra_tenenge_desc:0 "Die National Engineering Technique ist ein brasilianisches Unternehmen für Elektromechanik und Schwerindustriebau, das sich auf Hafeninfrastruktur und Industriemontage spezialisiert hat. Wir können sie bei der Ausweitung des Betriebs von Petrobrás und unserer Wasserkraftwerke unterstützen."
 bra_territoriosfederais:0 "„CIGS“"
 bra_territoriosfederais_desc:0 "Das Jungle Warfare Instruction Center (CIGS) ist eine militärische Organisation der brasilianischen Armee mit Sitz in Manaus, deren Ziel es ist, militärische Anführer kleinerer Fraktionen wie Dschungelkrieger auszubilden, also Kämpfer, die in der Lage sind, militärische Missionen in den unwirtlichsten Gebieten des brasilianischen Amazonas-Regenwalds sowie in Umgebungen ähnlicher Art durchzuführen. "
 bra_tiro_de_guerra:0 "&#39;Tiro de Guerra&#39;"
 bra_tiro_de_guerra_desc:0 "Der „Tiro de Guerra“ wurde 1916 als Armeepolitik eingeführt und umfasste die Grundausbildung nicht mobilisierter Reservekräfte des Landes für den Kriegsfall. Die Ausweitung dieses Programms sorgte dafür, dass die Armeekolonnen mit besser ausgebildeten Männern besetzt wurden, die der Kampftauglichkeit näher kamen."
 bra_tropas_1932_tooltip:0 "Rufen Sie die Veteranen der Revolution von 1932 in unsere Armee"
 bra_uiracu_tooltip:0 "Schaltet die §CDescheidungen§! für die Invasion anderer südamerikanischer Länder frei."
 bra_vale:0 "„Vale do Rio Doce“"
 bra_vale_desc:0 "Vale do Rio Doce wird das staatliche Unternehmen der Föderation für die Gewinnung verschiedenster Erze wie Bauxit und Eisen sowie deren Weiterverarbeitung zu Aluminium und Stahl sein."
 bra_ve_tooltip:0 "Erlangt Kern- und Kriegsziele gegen Argentinien, Venezuela und Bolivien"
 bra_viacao:0 "Ministerium für Verkehr und öffentliche Arbeiten"
 bra_viacao_desc:0 "Nachdem der Siderurgic Complex ausreichend etabliert ist und der Technische Rat für Wirtschaft und Finanzen die logistische Verwaltung der Staaten kontrolliert, werden wir über das reformierte, aber bereits etablierte Ministerium für Verkehr und öffentliche Arbeiten in den nationalen Industriebereich investieren."
 bra_viacao_tooltip:0 "Schaltet die §YEntscheidungen zu Großprojekten§ frei!"
 bra_vital_espace:0 "Der integrale Staat"
 bra_vital_espace_desc:0 "„Um in Frieden voranzukommen, die Früchte ihrer Bemühungen zu ernten und im In- und Ausland Ansehen zu erlangen, muss sich eine Nation des Autoritätsprinzips vollkommen bewusst sein. Wir brauchen eine Autorität, die in der Lage ist, Initiativen zum Wohle aller zu ergreifen [...]“"
 bra_vitrine_tooltip:0 "Die Auswirkungen dieser Konzentration werden sich erst zeigen, wenn Sie Ihren eigenen Weg für Vargas‘ Zukunft wählen."
 bra_voz_ligada_flag:0 "Focii-Audios sind aktiviert"
 bra_voz_ligada_off_tooltip:0 "Schaltet die Audios nach Fokusabschluss aus"
 bra_voz_ligada_on_tooltip:0 "Schaltet die Audios nach Fokusabschluss ein"
 bra_zfm:0 "Zollfreie Zone von Manaus"
 bra_zfm_desc:0 "Die Freihandelszone Manaus wird ein brasilianisches Industriegebiet in Manaus sein, um die wirtschaftliche Entwicklung des westlichen Amazonasgebiets zu fördern. Das Industriezentrum soll rund 700 Unternehmen beherbergen."


