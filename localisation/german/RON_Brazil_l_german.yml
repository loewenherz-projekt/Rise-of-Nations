 bra_antropofagia_neu_1_desc:0 "Obwohl erst kürzlich von den Modernisten beschrieben, bilden die Übernahme der Bräuche anderer Kulturen und ihre Anpassung an die nationalen Gegebenheiten die zentrale Grundlage der brasilianischen Identität. Brasilien ist kein Land, das von verschiedenen Kulturen im selben Raum geprägt ist, sondern von einer einzigen brasilianischen Kultur, die durch die Hybridisierung europäischer, afrikanischer, asiatischer und indigener Kulturen entstanden ist. Ein Brasilianer lässt sich daher nicht über Rasse oder Bräuche identifizieren, sondern nur über den Gebrauch der Muttersprache und das Zugehörigkeitsgefühl zu Brasilien. Diese Besonderheit führte zu einem desillusionierten Volk und einer desinteressierten Regierung in Bezug auf außenpolitische Angelegenheiten, die jedoch gegenüber anderen Kulturen äußerst widerstandsfähig und tolerant ist, sowie zu Bürgern, die der brasilianischen Einzigartigkeit treu bleiben."
