 BRA_cat_proalcool:0 "Das Nationale Alkoholprogramm"
 BRA_cat_proalcool_desc:0 "Artikel 2. Die Herstellung von Alkohol aus Zuckerrohr [...] wird durch die Ausweitung der Rohstoffversorgung gefördert, wobei der Schwerpunkt auf der Steigerung der landwirtschaftlichen Produktivität, der Modernisierung und Erweiterung bestehender Brennereien und der Installation neuer Produktionseinheiten, die an Kraftwerke oder autonome Einheiten angeschlossen sind, sowie Lagereinheiten liegt."
 
 bra_proalcool_2_desc:0 "Um das Programm in Gang zu setzen, wird die Regierung den Plantagenbesitzern dabei helfen, ihre Produktion zu modernisieren, ihre Rohproduktion zu steigern und die Erweiterung der Fabriken zu einem tragfähigen Marktplan zu machen."
 bra_proalcool_3_desc:0 "Wasserhaltiger (oder nasser) Ethanol ist die konzentrierteste Ethanolsorte, die durch einfache Destillation hergestellt werden kann, ohne den für die Herstellung von wasserfreiem (oder trockenem) Ethanol erforderlichen weiteren Dehydratationsschritt. Wenn wir diese Ethanolsorte als Kraftstoff für unsere Autos verwenden, wird es für die Menschen einfacher und günstiger, sich für diesen Kraftstoff zu entscheiden."
 bra_proalcool_4_desc:0 "Da die Fähigkeit zur Kraftstoffbeimischung von Ethanol nachgewiesen wurde, wird die Regierung, um die Kontinuität des Programms zu gewährleisten, ausländische Automobilhersteller ermutigen, Autos zu bauen, die mit Motoren ausgestattet sind, die ausschließlich mit Alkohol betrieben werden können."
 bra_proalcool_5_desc:0 "Ethanol greift bekanntermaßen das Innenleben jedes Autos an, das diesen Kraftstoff als Hauptbrennstoff verwendet. Die Beschichtung der Fahrzeugmechanik mit antioxidativen Substanzen verhindert Rost und Korrosion, die durch Alkohol verursacht werden."
 bra_proalcool_6_desc:0 "Da es finanziell tragfähig, industriell effizient und wirtschaftlich nachhaltig ist, liegt der Hauptfokus der Regierung von nun an darauf, das grüne Öl am Laufen zu halten und sicherzustellen, dass alle Tankstellen und Autos, die gebaut werden, bereit sind, es aufzunehmen und effizient zu nutzen."


