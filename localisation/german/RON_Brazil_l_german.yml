 bra_entreguismo_eua:0 "Eisen für Straßen"
 bra_entreguismo_ger:0 "Gummi fürs Gehirn"
 bra_entreguismo_sov:0 "Männer für die Revolution"
 bra_entreguismo_eng:0 "Treibstoff für Schiffe"
 
 bra_entreguismo_eua_desc:0 "Nachdem wir ausländischen Unternehmen den Abbau und Export von Rohstoffen aus Brasilien verwehrt haben, sind die amerikanischen Konglomerate – allen voran die von Percival Farquar – zurück. Amerikanisches Bergbau-Know-how wird von unseren Technikern absorbiert, und wir könnten von der Infrastruktur profitieren, die die Amerikaner hinterlassen."
 bra_entreguismo_ger_desc:0 "Die deutsche Kriegsmaschinerie braucht Gummi. Unmengen davon. Und wir haben eine unvorstellbare Menge Regenwald. Für unsere Panzerketten hat die Deutsche Akademie große Forschungsabkommen mit unseren Bundesuniversitäten unterzeichnet, und deutsche paramilitärische Organisationen helfen dabei, Südbrasilien auf ein Wettrüsten gegen andere Nationen vorzubereiten."
 bra_entreguismo_sov_desc:0 "Die Sowjets wollen ihren Einflussbereich offensichtlich erweitern, und wir helfen ihnen dabei gern. Indem wir Brasilien als Ausbildungslager für kommunistische Spione und Geheimdienstler sowie als fruchtbaren Boden für die Rekrutierung von Soldaten öffneten, schickte Moskau viele seiner Kommissare, um uns ihre avantgardistischen Vorstellungen von ziviler und militärischer Verwaltung beizubringen."
 bra_entreguismo_eng_desc:0 "Mit dem Zusammenbruch ihrer Handelsrouten und der ständigen Gefahr eines Embargos wollen die Briten die Herrschaft über jeden Tropfen Öl sichern, den sie im Atlantik noch finden können. Als Gegenleistung für den Zugang zu unserem „schwarzen Gold“ bieten sie uns die Möglichkeit, mitzuhelfen, indem wir mit unseren eigenen, in Großbritannien gebauten Schiffen den Südatlantik patrouillieren."
 
 bra_entreguismo_eua_outro:0 "Brasilianisches Eisen"
 bra_entreguismo_ger_outro:0 "Brasilianischer Gummi"
 bra_entreguismo_sov_outro:0 "Brasilianischer Geheimdienst"
 bra_entreguismo_eng_outro:0 "Brasilianisches Benzin"
 
 bra_entreguismo_eua_outro_desc:0 "Brasilien hat seine Beschränkungen für ausländische Unternehmen auf seinem Staatsgebiet teilweise aufgehoben. Brasiliens Ressourcen werden für die Kriegsanstrengungen von Nutzen sein, da wir durch die Nutzung einer brasilianischen Lieferkette für Eisen und Stahl mehr Ressourcen für die späteren Produktionslinien der Rüstungsindustrie einsetzen können."
 bra_entreguismo_ger_outro_desc:0 "Brasilien hat seine Beschränkungen für ausländische Unternehmen auf seinem Staatsgebiet teilweise aufgehoben. Brasiliens Ressourcen werden für die Kriegsanstrengungen von Nutzen sein, da die Verwendung brasilianischen Kautschuks nicht nur die Produktion von Panzerketten erheblich beschleunigen wird, sondern auch einen größeren Teil unserer chemischen Industrie für andere Bereiche freisetzen wird."
 bra_entreguismo_sov_outro_desc:0 "Brasilien hat seine Beschränkungen für ausländische Operationen auf seinem Staatsgebiet teilweise aufgehoben. Brasiliens Ressourcen werden für die Kriegsanstrengungen von Nutzen sein, da wir in Lateinamerika über eine zuverlässige Operationsbasis verfügen und auf diesem Kontinent stets an der Spitze der Geheimdienste stehen werden."
 bra_entreguismo_eng_outro_desc:0 "Brasilien hat seine Beschränkungen für ausländische Unternehmen auf seinem Staatsgebiet teilweise aufgehoben. Brasiliens Ressourcen werden für die Kriegsanstrengungen von Nutzen sein, da wir im Südatlantik über eine zuverlässige Quelle für raffiniertes Benzin verfügen, die näher an unserem Heimatland liegt als andere – imperiale – Quellen."
 
 bra_mercosul_idea_outro:0 "Mitglied des Gemeinsamen Marktes des Südens"
 bra_mercosul_idea_outro_desc:0 "Geld spricht lauter als Politik."

 bra_patri_5_tooltip:0 "§CPedro III wird die Unterstützung der großen republikanischen Politiker und der Freimaurerei haben.§!\n" 
 bra_patri_6_tooltip:0 "§CPedro III. wird eine größere öffentliche Unterstützung, insbesondere beim Volk, erlangen, auf Kosten einer deutlich geringeren Popularität bei den Eliten.§!\n"

 bra_modernizacao_marinha_tooltip:0 "Mobilisiert §YAdmirals§! für einen möglichen Konflikt."

 bra_pm:0 "Reorganisieren Sie die öffentlichen Streitkräfte"
 bra_pm_desc:0 "Das bestehende Modell der öffentlichen Sicherheitskräfte überlässt den Bundesstaaten große Machtbefugnisse in der öffentlichen Polizeiarbeit und ermöglicht ihnen, sich der Autorität der Bundesregierung zu widersetzen. Die Militärpolizei, nach dem Vorbild der Armee, wird die Straßen besser patrouillieren und der Hauptstadt eng zur Seite stehen." 
 
 signal_company_tech:0 "Signal Company Technologie"
 military_police_tech:0 "Militärpolizei-Technologie"
 
 bra_por_potential_civil_war_tooltip:0 "§YWenn Brasilien faschistisch ist und weniger als 50 % der Bevölkerungsanteile faschistischer Gruppen beträgt, wird dieser Fokus einen Bürgerkrieg mit den Integralisten als Protagonisten auslösen. Andernfalls wird Portugal einen Casus Belli gegen Brasilien erhalten.§!"
 
 continuous_bra_politicagem:0 "„Politik“"
 continuous_bra_politicagem_desc:0 "Der einzigartige brasilianische Ausdruck ist die übliche Vetternwirtschaftspolitik der iberischen Welt: Der Staat schöpft Ressourcen ab, nur um seine eigene Existenz zu sichern. Obwohl dies allgemein als schlecht angesehen wird, benötigt ein ehrgeiziger Staatschef möglicherweise viel politische Macht, um seine Aufgabe zu erfüllen. Diese findet er möglicherweise, indem er die Zeit seines Kabinetts ausschließlich dem Umgang mit anderen Politikern widmet."
 continuous_bra_politicagem_tooltip:0 "Kostet keinen politischen Machterhalt"
 
 continuous_bra_welfare:0 "Gemeinwohl"
 continuous_bra_welfare_desc:0 "Der wirtschaftliche und industrielle Aufschwung des Landes, so patriotisch und inspirierend er auch sein mag, reicht den meisten Bürgern nicht aus. Um den sozialen Zusammenhalt zu wahren, Subversion zu verhindern und die Effizienz unserer Arbeit zu steigern, kann der Staat in das öffentliche Gesundheitswesen, das Bildungswesen und den öffentlichen Verkehr investieren, um die Stabilität unseres Landes zu sichern."
 
 
 bra_heal_wounds_tooltip:0 "§COswaldo Aranha ist als Berater freigeschaltet.§!"
 bra_guide_latam_tooltip:0 "§CAfrânio de Mello Franco ist als Berater freigeschaltet.§!"
 
 
 

 bra.3.a:0 "„Der Präsident der Republik der Vereinigten Staaten von Brasilien: Antwort auf die legitimen Bestrebungen des brasilianischen Volkes“"
 bra.8.d:0 "Brasilien hat einen Durchbruch in der internationalen Diplomatie erzielt und ist die neueste Großmacht. Es lädt uns ein, seiner Fraktion beizutreten, um uns Wohlstand und sichere Verteidigung zu garantieren. Werden wir beitreten?"
 
 
 bra.10.d:0 "Wir schreiben das Jahr 1936, das 114. Jahr der Unabhängigkeit und das 47. Jahr der Republik. Vor sechs Jahren übernahm Getúlio Vargas das Ehrenamt des Präsidenten der Vereinigten Staaten von Brasilien. In den letzten Jahren erlebte São Paulo den Bürgerkrieg, gefolgt von der rasanten Industrialisierung der Stadt. Im Nordosten Brasiliens bringt der Cangaço den Armen Gerechtigkeit und den Großbauern des Sertão Zerstörung. In der Mata Mineira erobert marxistisches Gedankengut die intellektuelle Elite von Belo Horizonte. Im Süden konsolidieren sich kleine Industrieunternehmen zu großen nationalen Konzernen, und schließlich, im Triângulo Mineiro und in Goiás, dringt der Zuckerrohranbau erstmals in Richtung Amazonas vor. Ruhm sei Brasilien!"
 
 #bra.11:0 "Brazilian Puppet!
 #bra.11.t:0 "Brazilian Puppet!"
 #bra.11.d:0 "As Brazilian Officials seize our government's last bastion the scrict military presence of Brazilian authorities in our soil imply the formation of a puppet government, managed by a new chief of state under the tutelage of the President of the Federation, whose ideological doctrines will certainly align with those of the mainland Brazil itself. Through the Brazilian Department of Press and Propaganda (DIP), our cultural elites and great masses will, as time passes, gather around Brazilian schools of thought, maintaining the newly installed national order aligned to Brazil's interests."
 #bra.11.a:0 "Do we even have a choice?"
 #
 #bra.12:0 "No longer a Brazilian Puppet!"
 #bra.12.t:0 "No longer a Brazilian Puppet!
 #bra.12.d:0 "As the new national government is formed, under the sole guidance of our politicians and  our people the Federal-installed state retreats, seeking exile in mainland Brazil. With it goes their twisted ideology, imposed on us throughout our time as subjects of the DIP. Now, our destiny is our sole decision, and our thoughts in the world shall be settled only by us."
 #bra.12.a:0 "Free! At Last!"
 
 bra.13.d:0 "Während der größten Manifestation der Befreiung des Proletariats umzingelten und besetzten Dutzende von Anhängern, unterstützt von Tausenden weiteren auf den Straßen von Rio de Janeiro, den Palácio do Catete. Innerhalb weniger Stunden war der bürgerliche Anführer Getulio Vargas tot und Herr Luís Carlos Prestes, der neue Präsident der Republik, stand an der Spitze der Nation. "
 
 bra.14.d:0 "Während der höchsten Demonstration der Staatsbürgerschaft aller Völker und Rassen umzingelten Tausende von Integralisten den Palácio do Catete und drohten mit einer Invasion. In wenigen Stunden würde Präsident Vargas in Rio Grande do Sul Zuflucht suchen und Dr. Plínio Salgado würde sein Amt als neuer Präsident der Republik antreten. "
 
 
 bra.16.d:0 "Während der größten Demonstration der Freiheit des Vaterlandes umzingelten die assoziierten Sektoren der Armee, der Marine und der Luftwaffe den Palácio do Catete zur Unterstützung des Nationalkongresses. In wenigen Stunden würde Herr Getúlio Vargas unter dem Druck einer ausgewählten Gruppe von Generälen und Admiralen die Republik dem Nationalkongress und dem brasilianischen Volk zurückgeben. "
 
 bra.17:0 "Zur Frage der Freimaurerei"
 bra.17.t:0 "Zur Frage der Freimaurerei"
 bra.17.d:0 "Zwar würde die Zulassung der Freimaurerei die Eliten sicherlich beruhigen und unsere Position sichern, doch wäre eine starke Unterstützung durch die Kirche möglicherweise vorzuziehen, um die Öffentlichkeit und die Verwaltung in Ordnung zu halten."
 bra.17.a:0 "Der Vatikan hat keine Autorität über uns."
 #bra.17.a_desc:0 "§BNeutral path§!"
 bra.17.b:0 "Keine zweite Chance für Verräter."
 #bra.17.b_desc:0 "§BFascist Path§!"

 bra.18:0 "Die Nationalgarde"
 bra.18.t:0 "Die Nationalgarde"
 bra.18.d:0 "Die Nationalgarde wurde 1922 offiziell aufgelöst und verlor gegen Ende des Zweiten Kaiserreichs allmählich an Bedeutung. Ihre Wiederherstellung wird unsere Fähigkeit stärken, die öffentliche Ordnung im Land aufrechtzuerhalten, unseren Willen ungeachtet der Armee durchzusetzen und Ehrenplätze und Legitimität unter den lokalen Politikern neu zu verteilen und so Unterstützung für unsere Sache zu gewinnen."
 bra.18.a:0 "Ja, Oberst!"
 
 bra.19:0 "Die kaiserliche Restauration"
 bra.19.t:0 "Die kaiserliche Restauration"
 bra.19.d:0 "Heute hat das vereinte Volk Brasiliens in einem großen Akt des öffentlichen Willens einen geschlossenen Kongress im Sturm erobert und die sorgfältig ausgearbeitete Verfassung des Dritten Kaiserreichs durchgesetzt. Die Armee hat Getúlio Vargas bereits zwangsweise abgesetzt. Er wird als Brasiliens letzter Präsident gelten."
 bra.19.a:0 "Freiheit, öffne deine Flügel über uns!"

 bra.20:0 "Atlantische Verbindungen"
 bra.20.t:0 "Atlantische Verbindungen"
 bra.20.d:0 "Mehr als hundert Jahre sind vergangen, seit Brasilien seine Unabhängigkeit erklärte, und fast ein halbes Jahrhundert, seit die brasilianische Republik entstand. Niemand, der bei klarem Verstand ist, begreift, dass es – derzeit – überhaupt eine Chance für die Wiederherstellung unseres transatlantischen Imperiums gibt … \n\n Es sei denn … \n\n Indem wir den brasilianischen Integralisten an die Macht verhelfen und Getúlio Vargas stürzen, können wir die Lücken in ihrer Ideologie aufdecken und ihren monarchistischen Anhängern nach dem Mund reden, um so eine portugiesische Restauration zu ermöglichen."
 bra.20.a:0 "Großartig."
 bra_por_sabotage_ai_tooltip:0 "Wenn Brasilien von der KI kontrolliert wird, wird es faschistisch, was die portugiesische Restauration erleichtern würde."
 bra.20.b:0 "Kein Grund zur Sabotage. Die Menschen in Brasilien werden irgendwann verstehen, dass sie bei uns besser aufgehoben sind."
 bra_por_nosabotage_ai_tooltip:0 "Das sind sie nicht. Die brasilianische KI hat eine normale Chance, zum Faschisten zu werden. Mit der historischen KI werden sie nie zum Faschisten."
 
 bra.21:0 "Das Nationale Straßenministerium für den Verkehr"
 bra.21.t:0 "Das Nationale Straßenministerium für den Verkehr"
 bra.21.d:0 "Das DNER, eine vorgeschlagene Abteilung des Ministeriums für öffentliche Arbeiten, wäre eine Behörde, der der Ausbau und die Instandhaltung der Bundesinfrastruktur übertragen werden soll. Wird die Organisation genehmigt, würde sie diese Angelegenheiten direkt verwalten, sodass der Präsident lediglich die Haushaltspläne unterzeichnen müsste."
 bra.21.a:0 "Genehmigt."
 bra.21.a_tt:0 "Anstelle von 15 Entscheidungen haben wir die Möglichkeit, politische Macht gegen Baugeschwindigkeit einzutauschen."
 bra.21.b:0 "Wir brauchen nicht noch mehr Bürokraten."
 bra.21.b_tt:0 "Die Entscheidungen über öffentliche Arbeiten werden direkt vom Spieler getroffen. Das ist das aktuelle System."
 
 bra.22:0 "Die brasilianischen Expeditionstruppen"
 bra.22.t:0 "Die brasilianischen Expeditionstruppen"
 bra.22.d:0 "Die Welt hat sich seit dem Untergang des brasilianischen Imperiums verändert. Doch es ist wieder auferstanden, und die alten glorreichen Zeiten stehen vor der Tür. Dennoch hat sich die Welt um uns herum verändert, und der Imperialismus hat neuen Bündnisnetzwerken zwischen Gleichgesinnten und Mitstreitern Platz gemacht. Angesichts der vielen Kriege, die in dieser neuen – aufregenden – Ära bevorstehen, könnten wir etwas tun, was das Imperium nie getan hat: transatlantische Expeditionen organisieren, um unseren Freunden im Ausland den Sieg zu sichern."
 bra.22.a:0 "Was für eine fantastische Idee."
 bra.22.b:0 "Isolationismus scheint derzeit der bessere Schritt zu sein."
 bra.22.b_tt:0 "Sie werden keine Chance haben, die brasilianischen Expeditionstruppen erneut zu bekommen."
 
 


