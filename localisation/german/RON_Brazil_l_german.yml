 bra_influencia_comunista_idea_desc:0 "Brasilien beeinflusst unsere Politik durch Propaganda und Handel."
 #bra_corrida_idea:0 "The South American Arms Race"
 #bra_corrida_idea_desc:0 "The South American Arms Race began in 1904 with the completion of NRB Minas Geraes. The dispute ended in 1914 with the outbreak of the Great War, with Brazil, among all South America, being the sole owner of Battleships, the NRB Minas Geraes and the NRB São Paulo. This dispute marked national history and created a naval legacy that lasted all the First Republic and today gives its last gasps."
 bra_polaca_idea:0 "A Polaca"
 bra_polaca_idea_desc:0 "Diese neue Verfassung, die von Seiner Exzellenz, dem Präsidenten der Republik, Getúlio Vargas, durchgesetzt wurde, festigt seine Macht nach einem väterlichen Modell und ist laut der ANL und den Titanen der untergegangenen PRP faschistisch. Dies wird dem Präsidenten genügend Schwung verleihen, um dringend notwendige Reformen durchzuführen und ein funktionsfähiges und effektives Ministerium aufzubauen."
 bra_ideology_boost_puppet_fascism:0 "DIP - Ministerium für Presse und Propaganda"
 bra_ideology_boost_puppet_communism:0 "DIP - Ministerium für Presse und Propaganda"
 bra_ideology_boost_puppet_democratic:0 "DIP - Ministerium für Presse und Propaganda"
 bra_ideology_boost_puppet_neutrality:0 "DIP - Ministerium für Presse und Propaganda"
 bra_mercosul_outro:0 "Mitglied des MERCOSUL"
 bra_mercosul_outro_desc:0 "Dieses Land ist Mitglied des Gemeinsamen Marktes des Südens"
 bra_ciclocana_idea:0 "Erste landwirtschaftliche Grenzerweiterung"
 bra_ciclosoja_idea:0 "Zweite landwirtschaftliche Grenzerweiterung"
 bra_etanol_idea:0 "Das Nationale Alkoholprogramm"
 bra_etanol_idea_2:0 "Das Nationale Alkoholprogramm"
 bra_antropofagia:0 "Kulturelle Anthropophagie"
 bra_antropofagia_desc:0 "Obwohl erst kürzlich von den Modernisten beschrieben, bilden die Übernahme der Bräuche anderer Kulturen und ihre Anpassung an die nationalen Gegebenheiten die zentrale Grundlage der brasilianischen Identität. Brasilien ist kein Land, das von verschiedenen Kulturen im selben Raum geprägt ist, sondern von einer einzigen brasilianischen Kultur, die durch die Hybridisierung europäischer, afrikanischer, asiatischer und indigener Kulturen entstanden ist. Ein Brasilianer lässt sich daher nicht über Rasse oder Bräuche identifizieren, sondern nur über den Gebrauch der Muttersprache und das Zugehörigkeitsgefühl zu Brasilien. Diese Besonderheit führte zu einem desillusionierten Volk und einer desinteressierten Regierung in Bezug auf außenpolitische Angelegenheiten, die jedoch gegenüber anderen Kulturen äußerst widerstandsfähig und tolerant ist, sowie zu Bürgern, die der brasilianischen Einzigartigkeit treu bleiben."
 bra_bandeirantes:0 "Bandeirantes"
 bra_bandeirantes_desc:0 "Das brasilianische Militär war weder auf Imperialismus und Eroberung ausgerichtet noch an die europäische Kriegsführung angepasst. Die wichtigsten Grundsätze der Armee stammen von den Bandeirantes, Siedlern und Expeditionsteilnehmern, die während der Kolonialzeit die Besetzung des Landesinneren Brasiliens mithilfe indigener Pfade und der Unterstützung der einheimischen Bevölkerung vorangetrieben haben. Die brasilianische Armee ist daher auf den Kampf um und auf brasilianischem Boden spezialisiert, der größtenteils noch von der Zivilisation unberührt ist."
