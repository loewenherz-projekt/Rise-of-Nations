 BRA_metas_desc:0 "Mit [BRA.GetLeader] hat uns der Minister für Verkehr und öffentliche Arbeiten Projekte zur Schaffung von Industriezentren in den entlegensten Ballungszentren Brasiliens vorgestellt. Ihre Fertigstellung wird für die Konsolidierung des nationalen Industriesektors im globalen Wirtschaftsumfeld von entscheidender Bedeutung sein." 
 bra_anra_desc:0 "Der Schwerpunkt dieses Projekts liegt auf der Errichtung der nationalen Souveränität über das legale Amazonasgebiet und auf der darauf aufbauenden Regelung der nationalen Politik zur Nutzung der Reichtümer und zum Schutz der Umwelt."
 bra_embrapa_desc:0 "Ziel der EMBRAPA ist die Entwicklung von Technologien, Wissen und technisch-wissenschaftlichen Informationen für die brasilianische Landwirtschaft und Viehzucht. Ihre Mission ist es, „umsetzbare Lösungen für Forschung, Entwicklung und Innovation für die Nachhaltigkeit der Landwirtschaft zum Nutzen der brasilianischen Gesellschaft zu entwickeln“."
 bra_br_364_desc:0 "Die BR-364 ist eine diagonale Autobahn aus Brasilien, die in Limeira-SP bei Kilometer 153 der SP-330 beginnt und in die SP-310 mündet, bis sie bei Kilometer 292 in die SP-326 mündet und zur Grenze mit Minas Gerais führt. Anschließend führt sie durch Goiás, Mato Grosso, Rondônia und Acre und endet in Rodrigues Alves im äußersten Westen des letztgenannten Bundesstaates. Sie ist somit eine Autobahn von grundlegender Bedeutung für die Produktion im Norden und im zentralwestlichen Teil des Landes."
 bra_epex_desc:0 "Ziel der Wiederherstellung der operativen Kapazität ist es, operative Einheiten mit den für ihren operativen Einsatz erforderlichen Verteidigungsgütern auf Mindestniveau auszustatten, um den Verteidigungsbedarf des Landes zu decken, Strafverfolgungs- und Ordnungsmaßnahmen durchzuführen, Hilfsmissionen durchzuführen und öffentliche Notlagen zu bewältigen. Dies soll die Zivil- und Verteidigungsindustrie in verschiedenen Bereichen fördern und Arbeitsplätze und Einkommen schaffen. Im Rahmen des Projekts sollen Fahrzeuge, Panzerwagen, verschiedene Waffen, darunter Artillerie, Hubschrauber, Munition, Funkgeräte usw. angeschafft werden."
 bra_metropolitana_porto_alegre_desc:0 "Die Regionen um São Borja und Santa Maria, die historische Heimat der typischen Gauchos, sind aufgrund ihrer Weizenproduktion und ihrer unmittelbaren Grenze zu Argentinien und Uruguay besonders empfindlich. Durch die Urbanisierung werden wir ihre industrielle Kapazität und die Autonomie des Militärkommandos Süd ausbauen."
 bra_via_dutra_desc:0 "In den späten 1940er Jahren führten die Industrialisierung und der Bedarf an einer sichereren und effizienteren Straßenverbindung zwischen den beiden größten brasilianischen Städten zum Bau der heutigen Via Dutra."
 bra_metropolitana_curitiba_desc:0 "Die Region Contestado, die für sporadische messianische Bewegungen und eine reiche Araukarienholzgewinnung zwischen Santa Catarina und Paraná bekannt ist, hat in dieser Wirtschaftstätigkeit großen Wohlstand entwickelt, und die großen Unternehmen, die aus diesem wirtschaftlichen Kontext hervorgegangen sind, bitten die Regierung um Unterstützung bei der Mechanisierung ihrer Aktivitäten, im Austausch dafür, dass sie zur lokalen Entwicklung beitragen."
 bra_appa_desc:0 "Die Verwaltung der Häfen von Paranaguá und Antonina (APPA) wurde 1947 von der Regierung von Paraná gegründet. Im Jahr 2014 wandelte der Staat Paraná mit dem Gesetz Nr. 17.895 vom 27. Dezember 2013, geregelt durch das Dekret Nr. 11.562/14, Appa von einer lokalen Behörde in ein öffentliches Unternehmen um."
 bra_codesa_desc:0 "Die Hafengesellschaft von Espirito Santo verwaltet die Hafenerweiterung an der Küste von Capixaba und verspricht, den Abfluss von Eisen und Stahl aus dem Steel Valley zu erleichtern."
 bra_codeba_desc:0 "Die Portuary Company of Bahia verwaltet die Hafenerweiterung an der Küste von Bahia und verspricht, den Öl- und Erdgasfluss von Zentralbahia in den Rest Brasiliens zu erleichtern."
 bra_furnas_desc:0 "Das Wasserkraftwerk Furnas ist ein brasilianisches Wasserkraftwerk im Rio Grande, zwischen den Gemeinden São José da Barra und São João Batista do Glória im Bundesstaat Minas Gerais. Es wird über acht Generatoreneinheiten mit einer Gesamtleistung von 1.216 Megawatt verfügen."
 bra_camacari_desc:0 "Der Industriestandort Camaçari befindet sich in der Gemeinde Camaçari, die sich bis nach Dias d&#39;Ávila im brasilianischen Bundesstaat Bahia erstreckt. Er ist das größte Industriezentrum des Bundesstaates und beherbergt mehrere Chemie- und Petrochemieunternehmen sowie die Automobilindustrie (Ford, Continental AG). Die Leitung obliegt dem Komitee für industrielle Entwicklung von Camaçari (COFIC), einem privaten Wirtschaftsverband, der mehr als 60 Unternehmen im Industriestandort Camaçari und seinen Einflussgebieten vertritt."
 bra_transposicao_desc:0 "Die Umleitung des Flusses São Francisco ist ein Projekt zur Umleitung eines Teils des Flusses São Francisco in Brasilien. Die brasilianische Regierung hat es als „Integrationsprojekt des Flusses São Francisco mit den hydrografischen Becken im Nordosten des Nordens“ bezeichnet. Das Projekt ist ein Vorhaben der brasilianischen Bundesregierung und sieht den Bau von über 700 Kilometern Betonkanälen entlang zweier Hauptachsen (Nord und Ost) entlang des Territoriums von vier Bundesstaaten (Pernambuco, Paraíba, Ceará und Rio Grande do Norte) zur Umleitung des Flusswassers vor. Unterwegs sieht das Projekt den Bau von neun Wasserpumpstationen vor."
 bra_tocantins_desc:0 "Das Araguaia-Tocantins-Becken ist eine der zwölf hydrografischen Regionen Brasiliens und liegt fast vollständig zwischen den Breitengraden 2ºS und 18ºS sowie den Meridianen 46ºW und 56ºW. Die wichtigsten Flüsse des Beckens sind der Tocantins und der Araguaia. Das Becken erstreckt sich durch die Bundesstaaten Tocantins und Goiás (58 %), Mato Grosso (24 %), Pará (13 %), Maranhão (4 %) und den Bundesdistrikt (1 %). Es ist das größte Wasserbecken Brasiliens."
 bra_tucurui_desc:0 "Das Wasserkraftwerk Tucuruí ist ein Wasserkraftwerk im Fluss Tocantins in der Gemeinde Tucuruí (ca. 300 km südlich von Belém) im Bundesstaat Pará mit einer installierten Leistung von 8.370 MW. Gemessen an der installierten Leistung ist Tucuruí das größte 100 % brasilianische Wasserkraftwerk (das Kraftwerk Itaipu hat eine größere installierte Leistung von 14.000 MW, ist aber zwischen Brasilien und Paraguay aufgeteilt). Sein Überlauf mit einer Kapazität von 110.000 m³/s ist der zweitgrößte der Welt."
 
 BRA_voz_ligada_cat:0 "Die Stimmen Brasiliens"
 BRA_voz_ligada_cat_desc:0 "Während wir in der Entwicklung der Nation weiter voranschreiten, können wir nach Erreichen eines wichtigen Ziels Ratschläge von anderen großen Führern Brasiliens annehmen, unabhängig von ihrem Zeitplan. §GEnables§! §Yor§! §BDisables§! §Yaudios, die nach Abschluss des Fokus abgespielt werden.§!"
