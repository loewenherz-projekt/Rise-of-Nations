 bra_modificadores_construcao_decision:0 "In öffentliche Infrastruktur investieren"
 bra_modificadores_construcao_decision_desc:0 "Über das Ministerium für öffentliche Arbeiten und die Nationale Straßenbaubehörde können wir Infrastrukturprojekte finanzieren und deren Planung und Durchführung den Ingenieuren der Behörden überlassen."
 
 
 