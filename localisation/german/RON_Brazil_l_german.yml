 BRA_counter_POR_monarchists:0 "Stärkung der nationalen Einheit"
 BRA_counter_POR_monarchists_desc:0 "Die Portugiesen sind Idioten, wenn sie glauben, ihre kleinen Könige und ihr verräterischer Prinz könnten den Koloss destabilisieren. Indem wir die antimonarchistische Stimmung ausnutzen, können wir den Einfluss des Sigma auf die nationale Politik stärken, den Aufstieg des Landes zur Macht beschleunigen und diesem monarchistischen Unsinn ein Ende setzen."
 
 
 BRA_metas_desc:0 "Der Minister für Verkehr und öffentliche Arbeiten hat uns Projekte zur Schaffung von Produktionszentren und zur Erweiterung des Verkehrsnetzes in den entlegensten Ballungszentren Brasiliens vorgestellt. Obwohl es sich um kostspielige Unterfangen handelt, wird die Umsetzung dieser Ideen entscheidend zur Konsolidierung der nationalen Industrie im globalen Wirtschaftsumfeld beitragen." 
 bra_furnas_desc:0 "Das Wasserkraftwerk Furnas ist ein brasilianisches Wasserkraftwerk im Rio Grande, zwischen den Gemeinden São José da Barra und São João Batista do Glória im Bundesstaat Minas Gerais. Es wird über acht Kraftwerksblöcke mit einer Gesamtleistung von 1.216 Megawatt verfügen. Die Regierung geht davon aus, dass von diesem Kraftwerk aus der gesamte Südosten Brasiliens mit Energie dieser Art versorgt werden kann."
 
 

 
 BRA_cat_proalcool_desc:0 "Artikel 2. Die Herstellung von Alkohol aus Zuckerrohr wird durch die Ausweitung der Rohstoffversorgung gefördert, wobei der Schwerpunkt auf der Steigerung der landwirtschaftlichen Produktivität, der Modernisierung und Erweiterung bestehender Brennereien und der Installation neuer Produktionseinheiten, die an Kraftwerke oder autonome Einheiten angeschlossen sind, sowie Lagereinheiten liegt."
 
  
