 BRA_elect_neutrality_desc:0 "Vargas&#39; Arbeitervermächtnis strukturierte die nationale Politik um und ordnete die brasilianische Gesellschaft im Zeichen der Industrialisierung und der Arbeitnehmerrechte neu. Diese Verpflichtung sollte die Ausbreitung des Kommunismus in Brasilien verzögern. Seine Nachfolger sollen Brasilien nun in eine neue Ära führen. Möge derjenige gewinnen, der seines Erbes würdig ist."
 BRA_elect_democratic_desc:0 "Nach der kurzen Zeit der provisorischen Regierung unter Getúlio Vargas sind wir bereit, dort weiterzumachen, wo wir aufgehört haben: bei der Einführung freier Wahlen, bei denen sich Kandidaten, die sich für den technischen Fortschritt und die öffentliche Bildung einsetzen, mit den Landbesitzern versöhnen, um Brasilien wieder auf die Weltbühne zu bringen."
 BRA_elect_fascism_desc:0 "Mit dem Ende der Integralistischen Revolution begann der Aufbau des Brasiliens der Zukunft: einer vereinten, starken und souveränen Nation. Viele Offiziere, die der Sache des Integralismus wohlgesinnt sind, sind bereit, Brasilien von nun an zu führen und in den Brasilianern Patriotismus und Hierarchie zu entwickeln, damit das Volk in Zukunft selbst für die Aufrechterhaltung des Integralen Staates sorgen kann."
 BRA_elect_communism_desc:0 "Nachdem die brasilianischen Arbeiter von ihren Ketten befreit, die ländlichen Eliten, die in der Vergangenheit eine sklaven- und rückständige Gesellschaft finanziert hatten, beseitigt und die städtischen Zentren der Nation umgestaltet wurden, wird das brasilianische Volk einen neuen Führer willkommen heißen, dessen Ziel das soziale Wohlergehen der Nation und die Fortsetzung des Endes der US-Hegemonie in Brasilien ist."
 
  
