 bra_instabilidade_desc:0 "Seit der Staatsgründung Brasiliens am 7. September 1822 hatten Großgrundbesitzer und einflussreiche Geschäftsleute und Politiker der Oberschicht stets das Mitspracherecht bei politischen Entscheidungen. Erst mit der Einführung der Verfassung von 1934 erhielten Brasilianer der unteren und mittleren Gesellschaftsschichten die Möglichkeit, ihre Stimme zu erheben. Dieser abrupte Bruch mit der alten Ordnung führte zu einer radikalen Spaltung der öffentlichen Meinung zwischen der ANL, den späteren Kräften der UDN, der AIB und den Anhängern des Estado Novo. "
