 bra_bandeirantes_mg_2_desc:0 "Das brasilianische Militär war weder auf Imperialismus und Eroberung ausgerichtet noch an die europäische Kriegsführung angepasst. Die wichtigsten Grundsätze der Armee stammen von den Bandeirantes, Siedlern und Expeditionsteilnehmern, die während der Kolonialzeit die Besetzung des Landesinneren Brasiliens mithilfe indigener Pfade und der Unterstützung der einheimischen Bevölkerung vorangetrieben haben. Die brasilianische Armee ist daher auf den Kampf um und auf brasilianischem Boden spezialisiert, der größtenteils noch von der Zivilisation unberührt ist."
 
