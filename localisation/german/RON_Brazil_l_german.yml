 BRA_uiracu_desc:0 "Die Harpyie, auch Königsbussard und von den Einheimischen Uiraçu genannt, ist ein größerer, aggressiverer und imposanterer Raubvogel als der Weißkopfseeadler, den die Amerikaner so sehr verehren. Wie der Habicht, der unseren Boden durchwühlt, soll Brasilien der Jäger seines Lebensraums sein und das brasilianische Volk soll seinen Kontinent einigen."
