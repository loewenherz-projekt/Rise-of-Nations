 bra_1930_2:0 "Die Revolution von 1930"
 bra_instabilidade:0 "Parteipolitik"
 bra_instabilidade_desc:0 "Seit der Staatsgründung Brasiliens am 7. September 1822 war das Mitspracherecht bei politischen Entscheidungen stets den Großgrundbesitzern sowie einflussreichen Geschäftsleuten und Politikern der High Society vorbehalten. Erst seit der Einführung der Verfassung von 1934 haben Brasilianer der unteren und mittleren Gesellschaftsschichten die Möglichkeit, ihre Stimme zu Gehör zu bringen. Dieser abrupte Bruch mit der alten Ordnung führte zu einer absoluten und radikalen Spaltung der öffentlichen Meinung zwischen ANL, UDN, AIB und dem Estado Novo. "
 #bra_campinas:0 "1932' Campinas Bombardments"
 #bra_campinas_desc:0 "The destruction of most of Campinas infrastructure and industries during the 1932' Civil War marked the way our industry thinks. While a sequel to all the brazilian industrials of today, the town's rebuilding after the tragedy has became inertial."
 bra_1930_desc:0 "1930 wurden die Eliten der Alten Republik von Vargas&#39; Tenentistas entmachtet. Der Staatsstreich und die darauffolgende Verfassung lösten den Bürgerkrieg von 1932 aus. Ob Getúlios Machtstreben nun im Guten wie im Bösen gipfelte, bis heute spaltet er die Gemüter vieler Brasilianer. "
 bra_1930_2_desc:0 "1930 wurden die Eliten der Alten Republik von Vargas&#39; Tenentistas entmachtet. Der Staatsstreich und die darauffolgende Verfassung lösten den Bürgerkrieg von 1932 aus. Ob Getúlios Machtstreben nun im Guten wie im Bösen gipfelte, bis heute spaltet er die Gemüter vieler Brasilianer. "
 bra_eficiencia_1:0 "Industrieräte"
 bra_eficiencia_1_desc:0 "Wir haben Räte aus Industriemagnaten der ehemaligen Republik, die uns bei der Führung unserer Wirtschaft unterstützen."
 bra_eficiencia_2:0 "Industrietechniker"
 bra_eficiencia_2_desc:0 "Bei der Planung unserer industriellen Expansion stehen uns spezialisierte und erfahrene Wirtschaftswissenschaftler und Techniker zur Seite."
 bra_eficiencia_3:0 "Industrieunternehmer"
 bra_eficiencia_3_desc:0 "Wir haben ausländische Industriemagnaten und nationale Industrieführer, die die Funktionalität und Organisation unserer Industriekomplexe verwalten."
 bra_eficiencia_4:0 "Industrielle Netzwerke"
 bra_eficiencia_4_desc:0 "Wir verfügen über ganze nationale Gruppen, Gesellschaften und Auftragnehmer im Wert von mehreren Milliarden Dollar, die für fast unsere gesamte Kriegsmaschinerie und zivile Industrie verantwortlich sind."
 bra_eficiencia_bndes:0 "Nationaler Entwicklungsalismus"
 bra_eficiencia_bndes_desc:0 "Das national-entwicklungspolitische Projekt birgt die große Hoffnung, die wirtschaftlichen, politischen und sozialen Vorteile der Moderne auf die gesamte brasilianische Gesellschaft auszuweiten. Dieser Zwiespalt wird durch die Industrialisierung gelöst, die eine Folge der Entwicklung wäre, d. h. der Kapitalgewinnung und der Integration des technischen Fortschritts."
 bra_eficiencia_gerdau_1:0 "Nationaler Entwicklungsalismus"
 bra_eficiencia_gerdau_1_desc:0 "Das national-entwicklungspolitische Projekt birgt die große Hoffnung, dass die wirtschaftlichen, politischen und sozialen Vorteile der Moderne der gesamten brasilianischen Gesellschaft zugutekommen. Dieser Zwiespalt wird durch die Industrialisierung gelöst, die eine Folge der Entwicklung wäre, d. h. der Kapitalgewinnung und der Integration des technischen Fortschritts."
 bra_eficiencia_gerdau_2:0 "Das brasilianische Wirtschaftswunder"
 bra_eficiencia_gerdau_2_desc:0 "Der Aufbau unserer Schwerindustrie, die Schaffung eines starken nationalen Verbrauchermarktes, die Fülle an technischen Arbeitskräften und die durch die Mechanisierung der Felder bedingte Urbanisierung haben das Wachstum der Bundeswirtschaft unaufhaltsam gemacht. Tatsache ist, dass dieses Land heute niemand mehr aufhalten kann."
 bra_eficiencia_tenenge_1:0 "Nationaler Entwicklungsalismus"
 bra_eficiencia_tenenge_1_desc:0 "Das national-entwicklungspolitische Projekt birgt die große Hoffnung, dass die wirtschaftlichen, politischen und sozialen Vorteile der Moderne der gesamten brasilianischen Gesellschaft zugutekommen. Dieser Zwiespalt wird durch die Industrialisierung gelöst, die eine Folge der Entwicklung wäre, d. h. der Kapitalgewinnung und der Integration des technischen Fortschritts."
 bra_eficiencia_tenenge_2:0 "Das brasilianische Wirtschaftswunder"
 bra_eficiencia_tenenge_2_desc:0 "Der Aufbau unserer Schwerindustrie, die Schaffung eines starken nationalen Verbrauchermarktes, die Fülle an technischen Arbeitskräften und die durch die Mechanisierung der Felder bedingte Urbanisierung haben das Wachstum der Bundeswirtschaft unaufhaltsam gemacht. Tatsache ist, dass dieses Land heute niemand mehr aufhalten kann."
 bra_eficiencia_5:0 "Modernisierung des Stromnetzes"
 bra_eficiencia_5_desc:0 "Unser Netz in den großen Metropolen wurde modernisiert und effizienter gestaltet."
 bra_eficiencia_6:0 "Elektrisches Netz erweitert"
 bra_eficiencia_6_desc:0 "Wir haben in unseren ländlichen und abgelegenen Gebieten ein neues, modernes Stromnetz installiert."
 bra_eficiencia_7:0 "Elektrisches Netz erweitert und modernisiert"
 bra_eficiencia_7_desc:0 "Unser nationales Stromnetz ist mittlerweile in den wichtigen Gebieten unseres Landes vollständig ausgebaut und funktionsfähig."
 bra_eficiencia_8:0 "Brasilien: Liebe es oder verlasse es"
 bra_eficiencia_8_desc:0 "Nachdem unsere Industrie neu organisiert, erweitert und modernisiert wurde, können wir unsere Fertigungskomplexe nun vollständig mobilisieren, um den Anforderungen des Krieges gerecht zu werden."
