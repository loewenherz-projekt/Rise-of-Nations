### INDUSTRIAL SECTION

AUS_subsidize_STRABAG_construction:0 "STRABAG Bau fördern"
AUS_subsidize_STRABAG_construction_desc:0 "Unabhängig von unserem Ressourceneinsatz kann Österreich neue Militäranlagen nur in begrenztem Umfang errichten. Wir müssen uns mehr Industrieanlagen sichern, wie sie beispielsweise die STRABAG SE besitzt. Ihre Unterstützung wird von unschätzbarem Wert sein, um unseren industriellen Vorsprung zu sichern."
AUS_subsidize_STRABAG_construction_tt:0 "Entsperrt STRABAG Bauindustriekonzern\n"

AUS_fortify_the_austrian_alps:0 "Befestigen Sie die österreichischen Alpen"
AUS_fortify_the_austrian_alps_desc:0 "Die österreichischen Alpen stellen eine unverzichtbare natürliche Barriere dar. Wir können unsere Gebiete praktisch uneinnehmbar machen, wenn wir uns darum bemühen, sie entsprechend zu befestigen."
AUS_fortify_the_austrian_alps_tt:0 "Fügen Sie §Y14 Land Forts§ hinzu! entlang der österreichischen Zentralalpen "

AUS_fortify_the_danube_and_drava_rivers:0 "Befestigung der Flüsse Donau und Drau"
AUS_fortify_the_danube_and_drava_rivers_desc:0 "Donau und Drau sind für Österreich schon lange ein wirtschaftlicher Segen, doch unser Interesse an ihnen ist nicht wirtschaftlicher Natur. Sie sind unglaublich schwer zu überqueren – umso mehr, wenn wir sie gegen feindliche Angriffe befestigen würden."
AUS_fortify_the_danube_and_drava_rivers_tt:0 "Fügen Sie §Y18 Landfestungen§ hinzu! entlang der österreichischen Flüsse Donau und Drau"

AUS_defend_our_new_borders:0 "Verteidigen Sie unsere neuen Grenzen"
AUS_defend_our_new_borders_desc:0 "Nachdem wir nun das bergige Schweizer Gebiet besetzt haben, sind ihre Grenzen auch unsere Grenzen. Wir sollten Maßnahmen ergreifen, um sicherzustellen, dass keine der größeren Nationen hier durchkommt."
AUS_defend_our_new_borders_tt:0 "Fügen Sie §Y28 Landforts§ hinzu! entlang der französischen, deutschen und italienischen Grenze zur Schweiz"

AUS_open_the_mittersill_mine:0 "Eröffnen Sie die Wolframmine Mittersill"
AUS_open_the_mittersill_mine_desc:0 "Wolfram ist weltweit nur in sehr geringen Mengen vorhanden – und wir sitzen direkt auf einem riesigen Vorkommen. Unsere Industrieberater haben Proben aus Mittersill untersucht und raten uns, dort mit dem Abbau zu beginnen."

AUS_expand_erzberg_mine:0 "Ausbau des Eisenerzbergwerks Erzberg"
AUS_expand_erzberg_mine_desc:0 "Das Erzbergwerk ist Österreichs größtes Eisenvorkommen, das wir bisher noch nicht so umfassend ausbeuten, wie wir könnten. Durch die Ausweitung unseres Tagebaus sollen wir unsere Stahlvorräte erhöhen."

AUS_expand_the_vienna_basin_oilfield:0 "Erweiterung des Ölfeldes im Wiener Becken"
AUS_expand_the_vienna_basin_oilfield_desc:0 "Wir haben eine Chance im Wiener Ölbecken, aber unsere derzeitige Ölverarbeitungsrate ist unzureichend. Der Ausbau unserer Industrie hier wäre ein wichtiger Schritt hin zu einer vielfältigen und schlagkräftigen Kriegsmaschinerie."

AUS_extend_the_grossglockner_highway:0 "Ausbau der Großglockner Autobahn"
AUS_extend_the_grossglockner_highway_desc:0 "Die Großglocknerstraße ist eine malerische Route durch die österreichischen Berge, die von Salzburg im Norden bis nach Kärnten im Süden führt. Sie ist eine ingenieurstechnische Meisterleistung, die wir jedoch noch weiter verbessern können, indem wir ihre Strecke durch ganz Österreich verlängern."
AUS_extend_the_grossglockner_highway_tt:0 "§YMaximale Infrastruktur§! in §YTirol§!, §YOberösterreich§! und §YNiederösterreich§! hinzufügen"

AUS_hungarian_railways_and_roads_project:0 "Ungarisches Eisenbahn- und Straßenprojekt"
AUS_hungarian_railways_and_roads_project_desc:0 "Vor der Teilung unserer Staaten lag das ungarische Verkehrssystem in der Verantwortung der österreichischen Regierung. Nach der Wiedervereinigung liegt es nun an uns, die Infrastruktur des Landes auf Vordermann zu bringen."
AUS_hungarian_railways_and_roads_project_tt:0 "Fügen Sie „Maximale Infrastruktur“ in „Transdanubien“, „Nordungarn“ und „Alföld“ hinzu."

AUS_construct_papa_air_base:0 "Bau des Luftwaffenstützpunkts Pápa"
AUS_construct_papa_air_base_desc:0 "Der Luftwaffenstützpunkt Papa ist seit 1936 in Betrieb und kann mit österreichischer Intervention endlich fertiggestellt werden. Mehr Luftkapazität wäre für unsere Kriegsanstrengungen von unschätzbarem Wert."

AUS_industrialise_the_great_hungarian_plains:0 "Industrialisierung der Großen Ungarischen Tiefebene"
AUS_industrialise_the_great_hungarian_plains_desc:0 "Ungarn verfügt über große Flächen, die für industrielle Zwecke völlig nutzbar sind und für andere Zwecke nicht benötigt werden. Die Tatsache, dass diese Flächen bisher nicht erschlossen wurden, ist eine Farce. Wir werden diese Flächen erschließen, um unsere Bemühungen zu unterstützen."
AUS_industrialise_the_great_hungarian_plains_tt:0 "Die Kontrolle über §YVojvodina§!, §YBanat§!, §YCrisana§! oder §YNord-Siebenbürgen§! erweitert den Bonus auf diese Staaten"

AUS_fortify_the_hungarian_danube:0 "Befestigung der ungarischen Donau"
AUS_fortify_the_hungarian_danube_desc:0 "Wie in Österreich stellt die Donau einen wichtigen Teil des Verteidigungspotenzials Ungarns dar. Wir werden unsere Befestigungsbemühungen hier fortsetzen."
AUS_fortify_the_hungarian_danube_tt:0 "Fügen Sie §Y20 Landforts§! entlang der transdanubischen Grenze hinzu"

AUS_secure_the_two_cities:0 "Sichern Sie die beiden Städte"
AUS_secure_the_two_cities_desc:0 "Die beiden Kaiserstädte Budapest und Wien haben eine gemeinsame Geschichte, die älter ist als die vieler moderner Großstädte. Nachdem wir beide Städte gesichert haben, ist es unser Ziel, dass keine von ihnen je wieder aus österreichisch-ungarischer Hand fällt."
AUS_secure_the_two_cities_tt:0 "Fügen Sie §Y3 Landfestungen§ hinzu! in Wien und Budapest"

AUS_transylvanian_highways_project:0 "Transsilvanisches Autobahnprojekt"
AUS_transylvanian_highways_project_desc:0 "Siebenbürgen gehörte schon immer zu Österreich-Ungarn und ist durch die Herrschaft Rumäniens in den letzten Jahren stark unterentwickelt, sodass es unserer Vereinigung nicht mehr würdig ist. Dennoch ist es unser Land, und wir werden uns darum kümmern."
AUS_transylvanian_highways_project_tt:0 "Fügen Sie §Y3 Infrastruktur§ hinzu! in der Region Siebenbürgen"

AUS_road_the_the_black_sea:0 "Straße zum Schwarzen Meer"
AUS_road_the_the_black_sea_desc:0 "Das Schwarze Meer war schon immer ein historisch bedeutsames Gewässer, nicht zuletzt, weil es den sowjetischen Zugang zum Mittelmeer darstellte. Wir müssen unseren Platz in seinen Gewässern sichern – aber zunächst müssen wir sicherstellen, dass wir diese Gewässer schnell erreichen können."
AUS_road_the_the_black_sea_tt:0 "Fügen Sie §Y3 Infrastruktur§! in der rumänischen Region hinzu"

AUS_the_carpathian_line:0 "Die Karpatenlinie"
AUS_the_carpathian_line_desc:0 "Karpatenruthenien ist ein Land, das fester Bestandteil der ungarischen Geschichte ist, und unseren Brüdern in der kaiserlichen Union liegt es ebenso am Herzen wie uns. Wir werden es bis zum letzten Tropfen österreichischen Blutes verteidigen – doch soweit muss es nicht kommen, wenn wir es befestigen."
AUS_the_carpathian_line_tt:0 "Fügen Sie §Y2 Landfestungen§! pro Provinz im Besitz der Karpaten hinzu"

AUS_expand_the_constanta_shipyards:0 "Erweiterung der Constanta-Werften"
AUS_expand_the_constanta_shipyards_desc:0 "Die Werft von Konstanza ist die größte Werft Rumäniens. Ihre industrielle Kapazität ist in unserem gesamten Gebiet konkurrenzlos. Die Gelegenheit, die sie uns bietet, ist zu groß, um sie ungenutzt zu lassen. Wir können sie, wenn wir wollen, noch weiter ausbauen."

AUS_cacova_ierii_iron_mine:0 "Eisenmine Cacova Ierii"
AUS_cacova_ierii_iron_mine_desc:0 "Die Eisenreserven Rumäniens sind nicht so groß wie die unseres Heimatlandes, aber was wir finden, werden wir ausbeuten. Wie sonst können wir als Nation überleben?"

AUS_the_prut_line:0 "Die Prut-Linie"
AUS_the_prut_line_desc:0 "Der Fluss Pruth stellt eine natürliche Widerstandslinie zwischen uns und Sowjetrussland dar. Es ist nicht nur sinnvoll, sondern absolut notwendig, ihn zu befestigen und gegen ausländische Angriffe zu sichern."
AUS_the_prut_line_tt:0 "Fügen Sie §Y2 Landfestungen§! pro Provinz des Pruth-Flusses hinzu"

AUS_black_sea_wall:0 "Schwarzmeermauer"
AUS_black_sea_wall_desc:0 "Im Falle eines Krieges mit einer der Schwarzmeer- oder Mittelmeermächte tun wir gut daran, Landungen auf unserem eigenen Territorium so umfassend wie möglich zu verhindern. Mit wenigen Befestigungen und einer leichten Garnison sollten wir die meisten Bedrohungen abwehren können."
AUS_black_sea_wall_tt:0 "Fügen Sie §Y2 Küstenfestungen§! entlang der §YMuntenia§!-Küste hinzu. Der Besitz von §YBessarabien§!, §YDessa§!, §YDobrudscha§! oder §YBurgas§! erweitert die Befestigungen"

AUS_dubova_chromium_mine:0 "Chrommine Dubova"
AUS_dubova_chromium_mine_desc:0 "Der Boden von Dubova wurde untersucht und es wurden ausreichende Mengen Chrom gefunden. Wir wären dumm, uns das entgehen zu lassen, insbesondere angesichts der Tatsache, dass Rumänien selbst eine Straße zum Schwarzen Meer darstellt."

AUS_balkan_highways_project:0 "Balkan Highways-Projekt"
AUS_balkan_highways_project_desc:0 "Jugoslawien hat sich schlecht selbst versorgt. Da wir nun ihr Land besitzen, sollten wir versuchen, einige ihrer Fehler wiedergutzumachen."
AUS_balkan_highways_project_tt:0 "Fügen Sie §Y3 Infrastruktur§! in §YSlowenien§!, §YSkroatien§! und §YSbosnien§! hinzu. Der Besitz von §YSdalmatien§!, §YSvojvodina§!, §YSerbien§!, §YSmontengro§!, §YSmorawa§! oder §YSmazedonien§! wird den Bau verlängern"

AUS_exploit_the_romanian_oil_fields:0 "Ausbeutung der rumänischen Ölfelder"
AUS_exploit_the_romanian_oil_fields_desc:0 "Rumänien verfügt im Vergleich zu den umliegenden Regionen über enorme Ölvorkommen. Die Reserven mögen zwar groß sein, doch die Förderung ist bislang ineffizient. Es gibt Maßnahmen, die die Ausbeute steigern können."

AUS_expand_ljubija_mine:0 "Erweiterung der Ljubija-Mine"
AUS_expand_ljubija_mine_desc:0 "Jugoslawien verfügt über vergleichbare Eisenreserven wie wir, doch die Ausbeutung dieser Reserven ist bisher schleppend. Wir können dem entgegenwirken und die in Ljubija begonnenen Aktivitäten ausweiten."

AUS_the_sarajevo_plan:0 "Der Sarajevo-Plan"
AUS_the_sarajevo_plan_desc:0 "Das ehemalige Bosnien hätte eine äußerst umfassende Entwicklung erfahren können. Die jugoslawische Regierung hat dies in den letzten Jahren jedoch vernachlässigt, wodurch viel Potenzial verloren ging. Glücklicherweise sind wir hier, um dies zu ändern."

AUS_the_south_dinaric_line:0 "Die Süddinarische Linie"
AUS_the_south_dinaric_line_desc:0 "Unsere Feinde im Süden stellen kaum eine Bedrohung dar, doch in vielen anderen Richtungen sind wir von Feinden umgeben, deren Bekämpfung einen großen Teil unserer Ressourcen erfordern wird. Je stärker wir unsere Südgrenze befestigen, desto weniger müssen wir sie verteidigen."
AUS_the_south_dinaric_line_tt:0 "Fügen Sie §Y18 Landforts§! entlang der albanischen und griechischen Grenze hinzu"

AUS_the_adriatic_wall:0 "Der Adria-Mauer"
AUS_the_adriatic_wall_desc:0 "Gleich auf der anderen Seite der Adria lauert im Süden unsere vielleicht größte potenzielle Bedrohung: die Italiener. Mussolini behauptet, er wolle das Römische Reich wiederaufbauen, doch wir dürfen nicht zulassen, dass er dabei auch unseres bedroht."
AUS_the_adriatic_wall_tt:0 "Fügen Sie §Y14 Küstenfestungen§! in §YDalmatien§! hinzu. Der Besitz von §YMontenegro§!, §YIstrien§! oder §YZara§! erweitert die Befestigungen"

AUS_the_belgrade_plan:0 "Der Belgrader Plan"
AUS_the_belgrade_plan_desc:0 "Serbien hat keine Kontrolle mehr über sein Land, da die Industrie nach dem Ersten Weltkrieg in die Hände Jugoslawiens fiel. Da dies nun nicht mehr der Fall ist, sollten wir die Industrie Serbiens so entwickeln, wie wir es uns wünschen."

AUS_extend_the_lines:0 "Verlängern Sie die Linien"
AUS_extend_the_lines_desc:0 "Da sich unser Territorium ausdehnt, müssen wir verteidigen, was wir erobert haben. Unsere Kontrolle über das Dinarische Gebirge und die Adriaküste hat sich ausgeweitet, daher müssen wir auch unsere Befestigungslinien erweitern."
AUS_extend_the_lines_tt:0 "Fügen Sie §Y10 Küstenfestungen§! und §Y6 Landfestungen§! in §YAlbanien§! hinzu. Der Besitz von §YSofia§! erweitert die Befestigungen"

AUS_slovakian_roads_and_railways:0 "Slowakische Straßen und Eisenbahnen"
AUS_slovakian_roads_and_railways_desc:0 "Das Verkehrssystem der Slowakei ist unterentwickelt. Truppen in dieser Region können es sich nicht leisten, auf dem Transportweg stecken zu bleiben. Wir müssen die Infrastruktur reparieren und erneuern."
AUS_slovakian_roads_and_railways_tt:0 "Fügen Sie „Y2 Infrastruktur“ zur slowakischen Region hinzu."

AUS_expand_czech_industry:0 "Tschechische Industrie ausbauen"
AUS_expand_czech_industry_desc:0 "Die tschechoslowakische Regierung hat ihre Bevölkerung vernachlässigt und sich geweigert, Fabriken und damit Arbeitsplätze zu schaffen, wo dies durchaus möglich gewesen wäre. Wir können und müssen Maßnahmen ergreifen, um dies zu ändern."

AUS_the_slovakian_line:0 "Die slowakische Linie"
AUS_the_slovakian_line_desc:0 "Polen hat bereits zuvor im Zuge der Besetzung des nördlich gelegenen Landes Interesse an der slowakischen Region gezeigt. Um diese Grenze vor potenziell gefährlichen Eindringlingen zu schützen, sind Befestigungsanlagen unerlässlich."
AUS_the_slovakian_line_tt:0 "Fügen Sie §Y20 Landforts§! entlang der slowakisch/polnischen Grenze hinzu"

AUS_industrialise_northern_slovakia:0 "Industrialisierung der Nordslowakei"
AUS_industrialise_northern_slovakia_desc:0 "Die Slowakei verfügt über ein bisher ungenutztes industrielles Potenzial. Wir werden Maßnahmen zur Modernisierung und Industrialisierung des Landes ergreifen."

AUS_fortify_the_sudeten_land:0 "Das Sudetenland befestigen"
AUS_fortify_the_sudeten_land_desc:0 "Das Sudetenland bildet die Grenze zu Deutschland und stellt daher ein potenziell gefährliches Gebiet dar. In den dort bereits errichteten Befestigungsanlagen gibt es Lücken, die wir schließen können."
AUS_fortify_the_sudeten_land_tt:0 "Fügen Sie §Y22 Landforts§! in §YSudetenland§! hinzu."

AUS_subsidize_kapsch:0 "Kapsch subventionieren"
AUS_subsidize_kapsch_desc:0 "Kapsch kann auf eine lange Geschichte lukrativer Verträge mit der österreichischen Regierung in den Bereichen Elektronik und Feinmechanik zurückblicken. Wir sollten den Patriotismus und die Loyalität eines solchen Unternehmens belohnen, indem wir die Verträge unbedingt verlängern."
AUS_subsidize_kapsch_tt:0 "Kapsch Industriekonzern wird freigeschaltet\n"

AUS_fund_the_vienna_college_of_technology:0 "Förderung der TU Wien"
AUS_fund_the_vienna_college_of_technology_desc:0 "Die Technische Hochschule Wien trägt seit über hundert Jahren maßgeblich dazu bei, dass wir mit dem technologischen Fortschritt anderer Länder Schritt halten und unsere besten Köpfe dabei unterstützen, das Beste aus sich herauszuholen. In diesen schwierigen Zeiten wird ihre Unterstützung von entscheidender Bedeutung sein."

AUS_nuclear_experimentation:0 "Nukleare Experimente"
AUS_nuclear_experimentation_desc:0 "Industrielle Untersuchungen haben in unseren neu entdeckten Gebieten Vorkommen des bedeutenden Metalls Uran entdeckt. Experimente mit diesem einzigartigen Schwermetall werden zweifellos interessante Ergebnisse liefern."

AUS_bilhorod_dnistrovskyi_nuclear_plant:0 "Kernkraftwerk Bilhorod-Dnistovskyi"
AUS_bilhorod_dnistrovskyi_nuclear_plant_desc:0 "Ein geeigneter Standort für einen Kernreaktor wurde gefunden, und es ist sinnvoll, ihn dort zu bauen. Atomwaffen sind die Zukunft, und wenn nichts anderes, müssen wir sie annehmen."

### AIRFORCE SECTION ###

AUS_construct_the_tullnerfeld_airbase:0 "Bau des Flugplatzes Tullnerfeld"
AUS_construct_the_tullnerfeld_airbase_desc:0 "Pläne für den Bau eines Luftwaffenstützpunkts in Tullnerfield liegen schon lange im Dunkeln. Im Norden herrscht Krieg, und es gibt keinen besseren Zeitpunkt, diese Pläne in die Tat umzusetzen."

AUS_announce_the_new_austrian_air_force:0 "Kündigen Sie die neuen Luftstreitkräfte an"
AUS_announce_the_new_austrian_air_force_desc:0 "Seit dem Ersten Weltkrieg gelten Schwerer-als-Luft-Flugzeuge als faszinierende neue potenzielle Waffe der Zukunft. Wir dürfen nicht hinter anderen Nationen zurückbleiben; wir bauen seit Jahren im Geheimen unsere eigene Luftwaffe auf und sind nun bereit, dies bekannt zu geben."

AUS_german_aeronautic_cooperation:0 "Deutsche Luftfahrtzusammenarbeit"
AUS_german_aeronautic_cooperation_desc:0 "Deutsche Ingenieurskunst hat nahezu alle Bereiche der Kriegsführung revolutioniert, auch den Luftkrieg. Wir haben viele Gemeinsamkeiten und allen Grund, in unseren technologischen Bestrebungen zusammenzuarbeiten. Der Zugang, den wir ihnen gewähren, wird es ihnen jedoch ermöglichen, unsere Politik zu beeinflussen."
AUS_german_aeronautic_cooperation_tt:0 "Ermöglicht spezielle Varianten deutscher Flugzeugdesigns\n"

AUS_british_aeronautic_cooperation:0 "Britische Luftfahrtkooperation"
AUS_british_aeronautic_cooperation_desc:0 "Großbritannien ist verzweifelt auf der Suche nach Freunden in Mitteleuropa, und wir brauchen sein technologisches Know-how. Seine Luftwaffe ist eine der stärksten der Welt, und wir können daran teilhaben, auch wenn wir dabei etwas an Einfluss im Inland verlieren."
AUS_british_aeronautic_cooperation_tt:0 "Ermöglicht spezielle Varianten britischer Flugzeugdesigns\n"

AUS_soviet_aeronautic_cooperation:0 "Sowjetische Luftfahrtkooperation"
AUS_soviet_aeronautic_cooperation_desc:0 "Die Sowjetunion ist stets bestrebt, ihren Einfluss im europäischen Raum auszuweiten, und wir sind bestrebt, unsere Luftwaffe zu modernisieren. Mit etwas politischem Geben und Nehmen können wir uns den Zugang zu ihrem industriellen Know-how sichern."
AUS_soviet_aeronautic_cooperation_tt:0 "Ermöglicht spezielle Varianten sowjetischer Flugzeugdesigns\n"

AUS_innsbruck_airbase_project:0 "Projekt Flugplatz Innsbruck"
AUS_innsbruck_airbase_project_desc:0 "Der Flughafen Innsbruck liegt in einem weitläufigen Tal und eignet sich daher ideal für den Start von Kampfflugzeugen und zivilen Flugzeugen. Durch die Umwandlung in einen Militärflugplatz wird er unseren Bedürfnissen deutlich besser gerecht."
AUS_innsbruck_airbase_project_tt:0 "Füge §Y2 Land Forts§ hinzu! auf Innsbruck"

AUS_protect_our_skies:0 "Schützen Sie unseren Himmel"
AUS_protect_our_skies_desc:0 "Fliegen an sich war früher eine Neuheit, doch Flugzeuge haben sich verändert, und mit ihnen auch die Luftkriegsführung. Wir können die Bedrohungen aus der Luft nicht ignorieren – und müssen uns entsprechend vorbereiten."
AUS_protect_our_skies_tt:0 "Fügen Sie §Y2 Anti-Air§! zu unseren erweiterten Gebieten hinzu"

AUS_fortify_our_airfields:0 "Befestigen Sie unsere Flugplätze"
AUS_fortify_our_airfields_desc:0 "Keiner unserer Luftwaffenstützpunkte liegt weit innerhalb unserer Grenzen, und wir können nicht ausschließen, dass einer der beiden durch einen gezielten Angriff erobert wird. Die Befestigung beider Stützpunkte wird dieses Risiko verringern."
AUS_fortify_our_airfields_tt:0 "Fügen Sie §Y2 Land Forts§! auf österreichischen Flugplätzen hinzu"

AUS_investigate_jet_technology:0 "Jet-Technologie erkunden"
AUS_investigate_jet_technology_desc:0 "Aus unserer Entwicklungsabteilung gibt es Neuigkeiten über ein neues, theoretisches Düsentriebwerk, mit dem Flugzeuge schneller, höher und weiter fliegen können als je zuvor. Wenn uns irgendetwas, das uns einen taktischen Vorteil verschafft, nutzen wir es."

AUS_experimental_bomber_programme:0 "Experimentelles Bomberprogramm"
AUS_experimental_bomber_programme_desc:0 "Für die nächste Bombergeneration liegen bereits theoretische Entwürfe vor, die uns in den kommenden Kriegen einen Vorteil verschaffen werden. Wir müssen lediglich Mittel für die Prototypenentwicklung bereitstellen, um dieses Programm in Gang zu bringen."

AUS_establish_the_austrian_airforce_academy:0 "Gründung der Österreichischen Luftwaffenakademie"
AUS_establish_the_austrian_airforce_academy_desc:0 "Unsere junge Luftwaffe entwickelt sich gut, doch unsere Technologie mag zwar mangelhaft sein, aber unsere Ausbildung ist mangelhaft. Wir können Ressourcen einsetzen, um dieses Problem zu lösen, und haben keine Ausrede, es nicht zu tun."

### NAVAL SECTION ###

AUS_repair_pola_naval_base:0 "Reparatur des Marinestützpunkts Pola"
AUS_repair_pola_naval_base_desc:0 "Der Marinestützpunkt Pola war einst eine der wichtigsten Einrichtungen der österreichischen Kriegsmarine. Seit unserer Vertreibung vom Meer ist er verfallen, aber wir können und müssen uns bemühen, ihn wieder nutzbar zu machen."

AUS_recreate_the_kuk_kriegsmarine:0 "Bauen Sie die K.U.K. Kriegsmarine nach"
AUS_recreate_the_kuk_kriegsmarine_desc:0 "Die k.u.k. Kriegsmarine war die Marine Österreichs, bis wir nach dem verlorenen Ersten Weltkrieg den Zugang zum Meer verloren. Mit nicht geringem Aufwand können wir ihren einstigen Ruhm zurückgewinnen."

AUS_rijeka_naval_academy:0 "Marineakademie Rijeka"
AUS_rijeka_naval_academy_desc:0 "Rijeka ist eine der größten Hafenstädte Kroatiens und einer der wichtigsten Marinestützpunkte für die österreichisch-ungarische Besatzung. Die Stadt ist mit Seefahrt und Seekriegsführung bestens vertraut, und wir können von diesem Fachwissen profitieren."

AUS_trieste_shipyards:0 "Triester Werften"
AUS_trieste_shipyards_desc:0 "Triest ist eine Stadt mit einer bestehenden Werftindustrie, die wir subventionieren und ausnutzen sollten. Dies wird unsere Vorherrschaft im Mittelmeerraum sichern."
AUS_trieste_shipyards_tt:0 "Ermöglicht die Einstellung von Schiffsdesignern der Trieste Shipyards\n"

AUS_expand_cattaro_harbour:0 "Erweitern Sie den Hafen von Cattaro"
AUS_expand_cattaro_harbour_desc:0 "Cattaro ist eine Binnenbucht, ein geschützter Ort, an dem eine Marinegruppe sicher untergebracht werden könnte. Sie ist ein natürlicher Sicherheitsvorteil, und wir sollten sie auch so behandeln. Unsere nächste Erweiterung wird hier stattfinden."

AUS_a_stealthier_approach:0 "Ein heimlicherer Ansatz"
AUS_a_stealthier_approach_desc:0 "Die österreichische Marine ist nicht mehr das, was sie einmal war – sie existiert gar nicht mehr. Wir können es uns nicht leisten, riesige Mengen an Ressourcen in Schiffe zu stecken, die von größeren Streitkräften einfach zerstört werden. Die Zukunft liegt in der heimlicheren U-Boot-Kriegsführung."

AUS_sieze_the_adriatic:0 "Erobern Sie die Adria"
AUS_sieze_the_adriatic_desc:0 "Die Adria ist einer unserer wichtigsten Zugänge zum italienischen Stiefel und einer der wichtigsten Küstenabschnitte unseres eigenen Territoriums. Es wäre ratsam, sie mit spezialisierten Binnenschiffen wie Kreuzfahrtschiffen zu sichern."

AUS_push_for_the_mediterranean:0 "Vorstoß für das Mittelmeer"
AUS_push_for_the_mediterranean_desc:0 "Das Mittelmeer ist ein berühmtes Meer, Stütze und Wiege vieler afrikanischer und europäischer Imperien. Es wird erneut zur Wiege unserer eigenen Nation werden – wenn wir es sichern können."

AUS_reform_the_kuk_seefliegerkorps:0 "Reform des Seefliegerkorps"
AUS_reform_the_kuk_seefliegerkorps_desc:0 "Die österreichische Marineluftwaffe war von der Hauptmarine getrennt und verfügte über eigene Spezialisierungen und Funktionen. Ihr Nutzen wird auch in Zukunft von Nutzen sein – wir sollten Ressourcen in ihre Reform investieren."

AUS_found_the_austrian_marines:0 "Gründung der österreichischen Marine"
AUS_found_the_austrian_marines_desc:0 "Seit wir von Land umgeben sind, ist ein Teil unserer Streitkräfte inakzeptabel vernachlässigt worden: die Marine. Mit ein wenig Geld und Zeit können wir den Schaden, den die Zeit angerichtet hat, reparieren."


AUS_subsidize_steyr_werke_arms:0 "Subventionierung der Waffen der Steyr-Werke"
AUS_subsidize_steyr_werke_arms_desc:0 "Die Steyre-Werke sind die Hülle des Waffenkonzerns Steyr Mannlicher. Das Unternehmen hat sich gut vom Vertrag von Saint-Germain erholt, doch staatliche Hilfen könnten noch weiterhelfen und dem Staat den Zugang zu seinen Produktionslinien sichern."

AUS_endorse_the_foreign_volunteer_programme:0 "Unterstützen Sie das Foreign Volunteer Programme"
AUS_endorse_the_foreign_volunteer_programme_desc:0 "Obwohl wir nicht die ganze Welt selbst erreichen können, können wir mit Hilfe einiger unserer besten und mutigsten Freiwilligentruppen Kräfte unterstützen, die unserer Sache wohlgesonnen sind."

AUS_rearm_the_bundesheer:0 "Aufrüstung des Bundesheers"
AUS_rearm_the_bundesheer_desc:0 "Die österreichischen Streitkräfte wurden durch den Vertrag von Saint-Germain-en-Leye schwer getroffen. Doch angesichts der Vorbereitung Hitlers auf seine Streitkräfte gab es nie einen besseren Zeitpunkt für die Wiederaufrüstung, egal ob wir auf seiner Seite oder gegen ihn stehen."

AUS_fund_the_gebirgsjaeger_programme:0 "Finanzieren Sie das Gebirgsjäger-Programm"
AUS_fund_the_gebirgsjaeger_programme_desc:0 "Unser Land ist gebirgig und wir müssen uns an die Gegebenheiten anpassen, die uns die Natur gegeben hat. Jeder Angriff auf unser Land wird feststellen, dass unsere Streitkräfte bestens ausgerüstet sind, um ihn im Gelände zu bekämpfen."

AUS_prepare_for_war:0 "Bereite dich auf den Krieg vor"
AUS_prepare_for_war_desc:0 "Es ist wahrscheinlich, dass ein weiterer Krieg unmittelbar bevorsteht. Wir dürfen nicht unvorbereitet sein. Um unsere Armeen zu versorgen, müssen wir bereit sein, unsere zivilen Fabriken deutlich effizienter umzustellen als bisher."

AUS_expand_csepel_muvek:0 "Expand Csepel Muvek"
AUS_expand_csepel_muvek_desc:0 "Csepel Muvek ist eine der bedeutendsten Maschinenproduktionsstätten der österreichisch-ungarischen Monarchie und bildet seit dem 19. Jahrhundert den Kern des alten Reiches. Das Unternehmen befindet sich in Privatbesitz, wir bezweifeln jedoch, dass die Eigentümer Einwände gegen finanzielle Unterstützung hätten."

AUS_steyr_mannlicher_arms:0 "Steyr Mannlicher Arms"
AUS_steyr_mannlicher_arms_desc:0 "Steyr Mannlicher ist als Unternehmen patriotisch und der österreichischen Lebensart treu geblieben. Ihre unermüdliche Unterstützung hat unsere Wiederaufrüstung ermöglicht. Es gibt keinen Grund, warum wir sie nicht zu unserem regulären Militärlieferanten machen sollten."
AUS_steyr_mannlicher_arms_tt:0 "Schaltet den Materialdesigner frei: "

AUS_german_armour_cooperation:0 "Deutsche Panzerkooperation"
AUS_german_armour_cooperation_desc:0 "Die Deutschen haben eigene Entwürfe entwickelt, um mit den Panzertruppen anderer Nationen mithalten zu können, und ihre Expansion in diesem Bereich war zielstrebig. Vielleicht können wir etwas von ihnen lernen, wenn sie sich dazu bereit erklären."
AUS_german_armour_cooperation_tt:0 "Ermöglicht spezielle Varianten deutscher Panzerdesigns\n"

AUS_british_armour_cooperation:0 "Britische Panzerkooperation"
AUS_british_armour_cooperation_desc:0 "Das britische Empire ist eine der vielfältigsten und weitverbreitetsten Mächte der Welt. Es verfügt über eine beispiellose Anzahl der besten Köpfe der Welt. Wir könnten viel von der Untersuchung ihrer Rüstungsentwürfe lernen."
AUS_british_armour_cooperation_tt:0 "Ermöglicht spezielle Varianten britischer Panzerdesigns\n"

AUS_soviet_armour_cooperation:0 "Sowjetische Panzerkooperation"
AUS_soviet_armour_cooperation_desc:0 "Die Sowjets verfügen über die mächtigste Industriebasis im eurasischen Raum, mit der nur wenige europäische Großmächte konkurrieren können. Man sagt, sie könnten täglich hundert Panzer produzieren – wäre uns diese Effizienz bei unseren eigenen Bemühungen von Nutzen?"
AUS_soviet_armour_cooperation_tt:0 "Ermöglicht spezielle Varianten sowjetischer Panzerdesigns\n"

AUS_motorisation_effort:0 "Motorisierungsaufwand"
AUS_motorisation_effort_desc:0 "Der Verbrennungsmotor war einst eine Neuheit für den zivilen Sektor und zu ineffizient für den Einsatz in der Kriegsführung. Heute ist er jedoch zuverlässig und leistungsstark. Die militärischen Anwendungen sind nicht mehr wegzudenken."

AUS_great_guns_of_yore:0 "Große Waffen von einst"
AUS_great_guns_of_yore_desc:0 "Die Artillerie hat den letzten Krieg gewonnen, und es gibt keinen Grund zu der Annahme, dass sie nicht auch beim Sieg im nächsten Krieg eine entscheidende Rolle spielen sollte. Verbesserungen an alter Technologie sind immer noch Verbesserungen."

AUS_found_the_jagdkommando_school:0 "Gründung der Jagdkommandoschule"
AUS_found_the_jagdkommando_school_desc:0 "Es gibt Pläne für die Bildung einer Spezialeinheit aus unseren besten und klügsten Soldaten, die hinter den feindlichen Linien und in unwahrscheinlichen Situationen operieren kann. Alles, was sie braucht, ist die Finanzierung."

### POLITICAL SECITON ###

AUS_establish_the_foreign_ministry:0 "Gründung des Außenministeriums"
AUS_establish_the_foreign_ministry_desc:0 "Seit dem Ersten Weltkrieg haben wir den Kontakt mit anderen Nationen vermieden, um unsere eigene nationale Erholungsrate aufrechtzuerhalten. Jetzt, da unsere Position in der Welt gefestigt ist, können wir beginnen, den Blick nach außen zu richten."

AUS_pro_austrian_propoganda:0 "Pro-österreichische Propaganda"
AUS_pro_austrian_propoganda_desc:0 "Österreich war einst eine der größten Nationen der Welt und wird es auch wieder sein. Unsere Kriegsanstrengungen beginnen zu Hause, mit der Unterstützung unseres Volkes."

AUS_defence_of_the_homeland:0 "Verteidigung des Vaterlandes"
AUS_defence_of_the_homeland_desc:0 "Als Nation haben wir kein Interesse daran, unseren Feinden jemals wieder Zugang zu unseren Grenzen zu gewähren. Es ist von entscheidender Bedeutung, dass wir uns so gründlich wie möglich schützen und sicherstellen, dass wir nie wieder in die Defensive geraten."

AUS_the_austrian_compromise:0 "Der österreichische Kompromiss"
AUS_the_austrian_compromise_desc:0 "Hitler hat sich für sein Volk eingesetzt und die Idee eines „Anschlusses“ zwischen Österreich und Deutschland propagiert. Wir haben kein Interesse an einem Verlust der Autonomie – aber vielleicht genügt uns ein Versprechen der Unterstützung im nächsten Krieg."
AUS_the_austrian_compromise_tt:0 "Wenn Deutschland zustimmt, wird der §YAnschluss Österreichs§! umgangen, Österreich wird jedoch der §YAchse§! beitreten.\n"

AUS_past_glories:0 "Vergangene Erfolge"
AUS_past_glories_desc:0 "Die österreichisch-ungarische Union war einst eine der stärksten Mächte im europäischen Einflussbereich. Doch in ihrer Blütezeit wurden wir durch den Vertrag von Saint-Germain grausam niedergeschlagen. Wir müssen als Nation die Kraft finden, zurückzufordern, was uns genommen wurde."

AUS_establish_the_frontmilliz:0 "Richten Sie das Frontmilliz ein"
AUS_establish_the_frontmilliz_desc:0 "Nach dem Ersten Weltkrieg bot die Heimwehr demobilisierten Soldaten die Möglichkeit, weiterhin für die nationale Sicherheit Österreichs nützlich zu sein. Heute jedoch brauchen wir eine besser kontrollierte und kohärentere Truppe. Die Idee eines Neuanfangs muss geprüft werden."

AUS_imperial_ambitions:0 "Imperiale Ambitionen"
AUS_imperial_ambitions_desc:0 "Viele andere Nationen sind durchaus bereit, sich zu wehren und ihre militärische Macht zu demonstrieren, bevor sie sich endlich an die Arbeit machen. Wir haben schon vor langer Zeit gelernt, dass Zurückhaltung beim Abfeuern des ersten Schusses ein sicherer Weg zur Niederlage ist."

AUS_the_old_empire:0 "Das Alte Reich"
AUS_the_old_empire_desc:0 "Die Österreichisch-Ungarische Union war zu ihrer Zeit die größte politische und militärische Macht in Südeuropa. Wir werden uns mit der anderen Hälfte unseres Reiches wiedervereinigen und auf diese Weise wiedererlangen, was einst uns gehörte."

AUS_pressure_for_transylvania:0 "Druck für Siebenbürgen"
AUS_pressure_for_transylvania_desc:0 "Rumänien ist seit langem im Besitz von Staaten, die ihm schlicht nicht gehören. Die Region Siebenbürgen gehört seit Menschengedenken zu Österreich-Ungarn, und wir werden sie Rumänien nehmen, wenn es sein muss, egal um welchen Preis."
AUS_pressure_for_transylvania_tt:0 "§RMöglicherweise zu einem Krieg mit Rumänien führen.§!\n"

AUS_the_romanian_obstacle:0 "Das rumänische Hindernis"
AUS_the_romanian_obstacle_desc:0 "Wir besitzen Ländereien, die einst uns gehörten, doch die weitere Existenz Rumäniens ist eine Beleidigung für unser Volk. Wir werden sie mit Gewalt annektieren und uns einen Weg zum Schwarzen Meer bahnen."

AUS_pressure_for_slovenia:0 "Druck für Slowenien"
AUS_pressure_for_slovenia_desc:0 "Slowenien gehört seit der Auflösung Venedigs zu uns, und die Slowenen wollten immer Teil des germanischen Volkes sein. Die Zeit trennt sie von uns, aber wir werden der Welt beweisen, dass alle Unterschiede überbrückbar sind."
AUS_pressure_for_slovenia_tt:0 "§RMöglicherweise zu einem Krieg mit Jugoslawien führen.§!\n"

AUS_the_balkan_territories:0 "Die Balkangebiete"
AUS_the_balkan_territories_desc:0 "Jugoslawien ist ein falscher und schwacher Staat, den wir unter seinen rechtmäßigen Eigentümern aufteilen können und sollten. Serbien hat einen großen Teil unseres Besitzes zu Unrecht annektiert, und wir werden dies notfalls mit Gewalt rückgängig machen."
AUS_the_balkan_territories_tt:0 "§RMöglicherweise zu einem Krieg mit Jugoslawien führen.§!\n"

AUS_the_way_to_france:0 "Der Weg nach Frankreich"
AUS_the_way_to_france_desc:0 "Frankreich muss für seine gnadenlose Behandlung der Mittelmächte viel Reparation leisten. Wir werden ihnen zeigen, wie österreichische Rache aussieht, aber zuerst brauchen wir eine Grenze, über die unsere Truppen marschieren können. Die Schweiz steht uns im Weg."

AUS_our_oldest_enemy:0 "Unser ältester Feind"
AUS_our_oldest_enemy_desc:0 "Die französische Gier hat uns nach dem Ersten Weltkrieg teuer zu stehen gekommen, und wir sind nicht abgeneigt, uns in solch schwerwiegenden Fällen zu rächen. Sie hätten unsere gesamte Nation aufgelöst, wenn sie gekonnt hätten – jetzt werden wir dasselbe mit ihnen machen."

AUS_request_slovakia:0 "Anfrage Slowakei"
AUS_request_slovakia_desc:0 "Wir haben bisher gute Beziehungen zu Deutschland, aber die Annexion der Tschechoslowakei hält uns die dritte Kaiserstadt Prag fern. Wir können diplomatische Anstrengungen unternehmen, aber es bleibt abzuwarten, ob Deutschland nachgibt."

AUS_request_krakow:0 "Anfrage Krakau"
AUS_request_krakow_desc:0 "Unsere Kontrolle über die slowakische Region versetzt uns in die Lage, von ihrer Kontrolle mehr Eigenverantwortung zu fordern. Krakau war einst ein Herzogtum unter österreichischer Kontrolle, und es gibt keinen Grund, warum es das nicht wieder sein sollte."

AUS_second_serbian_campaign:0 "Zweiter serbischer Feldzug"
AUS_second_serbian_campaign_desc:0 "Der Erste Serbische Krieg zerstörte das österreichische Kaiserreich. Diesmal nicht. Wir werden sie vollständig vernichten und ihr gesamtes Land für uns beanspruchen. Endlich haben wir die Chance, den frühen Tod von Erzherzog Ferdinand zu rächen."

AUS_dalmatia_for_south_tyrol_desc:0 "Italien hat schon lange den Wunsch, die italienischsprachige dalmatinische Provinz Jugoslawiens zu übernehmen. Im Gegenzug wollen wir Tirol wieder unter österreichischer Herrschaft vereinen. Ein Tauschgeschäft scheint möglich."

AUS_demand_the_istrian_peninsula:0 "Fordern Sie die Halbinsel Istrien"
AUS_demand_the_istrian_peninsula_desc:0 "Die kleine Halbinsel Istrien ist vielleicht nicht so groß wie der italienische Stiefel, aber sie ist unser alter Zugang zum Mittelmeer. Wir können sie immer noch brauchen, und wenn es sein muss, werden wir sie den usurpierenden Italienern abnehmen."

AUS_traitors_of_the_great_war:0 "Verräter des Ersten Weltkriegs"
AUS_traitors_of_the_great_war_desc:0 "Italien gibt vor, sich selbst wieder aufzubauen, vergisst dabei aber, dass es Menschen gibt, die nach dem Krieg mehr verloren und mehr gelitten haben. Wir werden ihnen zeigen, wie eine Nation sich selbst wieder aufbaut – indem sie von ihren Nachbarn nimmt."

AUS_our_fate_is_our_own:0 "Unser Schicksal liegt in unseren Händen"
AUS_our_fate_is_our_own_desc:0 "Hitlers Deutschland ist sehr daran interessiert, seine Macht zu vergrößern und unternimmt unverhohlene Annäherungsversuche, unser Land friedlich einzuverleiben. Wir haben kein Interesse daran, es ihnen so leicht zu machen. Wir werden unsere Nation bis zum letzten Tropfen Blut im Kampf bewahren!"
AUS_our_fate_is_our_own_tt:0 "§RMöglicherweise zu einem Krieg mit Deutschland führen.§!\n"

AUS_our_old_allies:0 "Unsere alten Verbündeten"
AUS_our_old_allies_desc:0 "Bulgarien hat im Ersten Weltkrieg an unserer Seite gekämpft und sich als kompetenter und wertvoller Verbündeter erwiesen. Es wird die Möglichkeit haben, sich unserer neuen Union friedlich anzuschließen – doch wir haben nicht die Absicht, bei unserer Rückkehr an die Macht jemanden zu bevorzugen."

AUS_control_the_balkan_peninsula:0 "Kontrollieren Sie die Balkanhalbinsel"
AUS_control_the_balkan_peninsula_desc:0 "Griechenland war die Wiege vieler Imperien, und nun bieten wir ihnen die Chance, Teil unseres Reiches zu werden. Sollten sie nicht zustimmen, wäre die Sache anders, aber wir bieten ihnen dennoch den Friedenszweig an."

AUS_alliance_with_turkey:0 "Bündnis mit der Türkei"
AUS_alliance_with_turkey_desc:0 "Das Osmanische Reich kämpfte im Ersten Weltkrieg an unserer Seite und erlitt mit uns Niederlagen. Wir müssen einander durch Zusammenarbeit unterstützen, nicht durch gegenseitige Auseinandersetzungen. Wenn sie unser Bündnis ablehnen, ist das eine andere Sache."

AUS_the_ottoman_menace:0 "Die osmanische Bedrohung"
AUS_the_ottoman_menace_desc:0 "Die Türken mögen nach dem Ersten Weltkrieg viel verloren haben, doch sie sind weiterhin ehrgeizig und einfallsreich. Ein weiterer großer muslimischer Staat kann nicht geduldet werden. Wir werden sie über ihre Meerenge zurückdrängen."

AUS_friends_beneath_the_bear:0 "Freunde unter dem Bären"
AUS_friends_beneath_the_bear_desc:0 "Die Sowjets haben imperialistische und faschistische Elemente gründlich ausgemerzt, und dennoch gibt es sie immer noch. Wir können Kontakt zu Dissidenten in der Sowjetunion aufnehmen und Russland auf den Weg der Reform bringen. Alte Feinde können leicht zu neuen Freunden werden."
AUS_friends_beneath_the_bear_tt:0 "Bereitet die Ukrainer auf den Krieg vor\n"

AUS_start_the_uprising:0 "Beginne den Aufstand"
AUS_start_the_uprising_desc:0 "Der Bär hat nicht bemerkt, dass unter ihm die mit Dolchen bewaffnete Ukraine schlummert. Indem wir ihr Volk bewaffnen, können wir optimale Bedingungen schaffen, um der Sowjetunion einen Teil ihrer Macht zu entreißen und ihre Macht mit unserer eigenen zu verbinden."
AUS_start_the_uprising_tt:0 "§RWerde einen Krieg mit der Sowjetunion beginnen!§!\n"

AUS_war_for_the_black_sea:0 "Krieg um das Schwarze Meer"
AUS_war_for_the_black_sea_desc:0 "Die sowjetische Kontrolle über das Schwarze Meer stellt neben der italienischen Kontrolle unsere größte Bedrohung dar. Wir können dieses Problem lösen, indem wir Russland die an das Schwarze Meer angrenzenden Gebiete abnehmen und so seine Fähigkeit einschränken, seine Seemacht im Mittelmeerraum aufrechtzuerhalten und einzusetzen."

AUS_germanic_brotherhood:0 "Germanische Bruderschaft"
AUS_germanic_brotherhood_desc:0 "Ein Anschluss an die Sowjetunion ist schlichtweg zu radikal. Wir sind jedoch durchaus bereit, mit unseren germanischen Brüdern im Norden zusammenzuarbeiten – und ein Forschungspakt wäre ein hervorragender Schritt in diesem Prozess."

AUS_imperial_administration:0 "Kaiserliche Verwaltung"
AUS_imperial_administration_desc:0 "Der Landerwerb hat Reformen in unserem Regierungssystem erforderlich gemacht. Eine Überprüfung der Freiheiten unserer Koloniestaaten ist angebracht und sollte zu einer reibungsloseren Innenpolitik führen."
AUS_imperial_administration_tt:0 "Die Kontrolle über §YWien§!, §YBudapest§!, §YBukarest§!, §YSarajevo§! und §YKrakau§! bringt §Y100 politische Macht§!\n"

AUS_strengthen_ties_with_ukraine:0 "Stärkung der Beziehungen zur Ukraine"
AUS_strengthen_ties_with_ukraine_desc:0 "Es gibt keinen Grund, warum wir nicht versuchen sollten, unseren neuen Verbündeten in der Ukraine näher zu kommen. Wenn wir ihnen einige unserer eigenen Ressourcen anbieten, werden wir sicher Wege finden, von denen wir profitieren können."

AUS_the_kiev_annex:0 "Der Kiewer Anbau"
AUS_the_kiev_annex_desc:0 "Die Ukraine war ein wertvoller Verbündeter und verdient nun den uneingeschränkten Schutz Österreich-Ungarns. Eine Annexion ist für sie eine ausgezeichnete Möglichkeit, die sie in Betracht ziehen sollte."

AUS_no_more_tyrants:0 "Keine Tyrannen mehr"
AUS_no_more_tyrants_desc:0 "Imperiale Gier und monarchistische Herrschaft auf beiden Seiten des Krieges führten zu dem zerbrochenen Europa, das wir heute sehen. Wir haben als Nation schon genug gelitten, und Hitlers Deutschland würde so schnell wieder aufgerüstet werden. Wir sagen: Keine weiteren Kriege und keine weiteren Tyrannen."

AUS_freedom_liberty_and_strength:0 "Freiheit, Unabhängigkeit und Stärke"
AUS_freedom_liberty_and_strength_desc:0 "Österreich hat sich durch die drastischen Reformen zwar stark verändert, doch das bedeutet nicht, dass unsere Streitkräfte oder unser Volk schwach sind. Der alte Stolz auf die Willenskraft Österreichs ist noch immer da, und die Menschen werden weiterhin für die Rettung ihres Landes kämpfen."

AUS_seek_british_support:0 "Suchen Sie britische Unterstützung"
AUS_seek_british_support_desc:0 "Großbritannien ist kein alter Freund unserer Nation, doch jetzt wird kein Kampf zwischen Nationen ausgetragen, sondern zwischen Ideologien. Die Zeit kleinlicher Streitereien zwischen den Nationen ist vorbei. Der Weg in die Zukunft ist Zusammenarbeit, nicht individueller Nationalismus."

AUS_break_the_compromise:0 "Brechen Sie den Kompromiss"
AUS_break_the_compromise_desc:0 "Wir haben uns den Deutschen gebeugt, weil sie uns militärisch weit überlegen waren. Nach der Reform und der Bestätigung unserer neuen Regierung haben wir nun vielleicht eine Chance, den Nazis die Stirn zu bieten."
AUS_break_the_compromise_tt:0 "Kann zu einem Krieg mit Deutschland führen\n"

AUS_free_the_balkans:0 "Befreit den Balkan"
AUS_free_the_balkans_desc:0 "Seit Hitlers Einfluss auf Europa begann, sind bestimmte Balkanstaaten unter faschistische Herrschaft geraten. Wir müssen handeln, um diesen Schaden wiedergutzumachen, selbst wenn wir Krieg führen müssen, um die Menschen zu befreien."
AUS_free_the_balkans_tt:0 "Gibt Marionettenkriegsziele für alle nichtdemokratischen Balkanstaaten vor\n"

AUS_free_the_ukrainians:0 "Befreit die Ukrainer"
AUS_free_the_ukrainians_desc:0 "Die Ukrainer waren zu lange unter der sowjetischen Herrschaft gefangen. Wir haben uns ihre Freilassung zum Ziel gesetzt, und jetzt gibt es keinen besseren Zeitpunkt dafür."

AUS_remove_the_horthy_government:0 "Absetzung der Horthy-Regierung"
AUS_remove_the_horthy_government_desc:0 "Unsere historischen Brüder in Ungarn leiden unter dem Joch eines faschistischen Regimes, das gefährliche Annäherungsversuche in Richtung einer militärischen Zusammenarbeit mit Deutschland unternimmt. Es ist sinnvoll, so schnell wie möglich anzugreifen und ihr Volk zu befreien."

AUS_dethrone_mussolini:0 "Mussolini entthronen"
AUS_dethrone_mussolini_desc:0 "Mussolini ist ein Tyrann, der in Italien fast jedes Überbleibsel des demokratischen Prozesses unterdrückt hat. Wenn er seinem Volk nicht die Wahl lässt, wer es führen soll, dann werden wir es tun."

AUS_request_balkan_support:0 "Balkan-Support anfordern"
AUS_request_balkan_support_desc:0 "Besonders viele Balkanstaaten haben Grund, einen Nazi-Einfall zu befürchten. Wir sind der Schutzschild zwischen Deutschland und vielen dieser Staaten, und wir werden ihre Hilfe brauchen, um das Blatt zu wenden. Wir müssen um Hilfe bitten."

AUS_a_red_future:0 "Eine rote Zukunft"
AUS_a_red_future_desc:0 "Österreich hat unter allen Formen traditioneller Regierungen gelitten, sowohl unter imperialen als auch unter demokratischen. Die Sowjetunion jedoch ruft die Arbeiter auf der ganzen Welt dazu auf, einen anderen Weg einzuschlagen."

AUS_rise_up_fight:0 "Erhebe dich, kämpfe!"
AUS_rise_up_fight_desc:0 "Wir haben Schritte zur Befreiung unserer eigenen Arbeiter unternommen, aber es gibt immer noch unterdrückte proletarische Massen in fast allen Ländern der Erde, die dem kapitalistischen Prozess unterworfen sind. Jeder muss sich freiwillig in den Dienst des österreichischen sozialistischen Staates stellen!"

AUS_seek_soviet_support:0 "Suchen Sie sowjetische Unterstützung"
AUS_seek_soviet_support_desc:0 "Russland hat unsere Nation in den Schmutz gezogen, doch die russische Nation ist gefallen und an ihrer Stelle ist der sozialistische Sowjetstaat entstanden. Dieses Arbeiterparadies ist ein Vorbild für unsere Nation, und ihre Unterstützung wird für die Sicherung unserer Zukunft von unschätzbarem Wert sein."

AUS_break_the_fascist_shackles:0 "Zerbrich die faschistischen Fesseln"
AUS_break_the_fascist_shackles_desc:0 "Wir haben mit den totalitären Deutschen Kompromisse geschlossen, weil sie die Macht hatten, uns zu vernichten. Doch jetzt, mit der globalen Revolution auf unserer Seite, können wir uns erheben! Nieder mit den Faschisten!"

AUS_request_balkan_support_sov:0 "Balkan-Support anfordern"
AUS_request_balkan_support_sov_desc:0 "Es muss auf dem Balkan kommunistische Sympathisanten geben, die bereit sind, zu den Waffen zu greifen. Die faschistische Bedrohung muss bekämpft werden – Balkankommunisten, vereinigt euch!"

AUS_destroy_the_horthy_fascists:0 "Zerstöre die Horthy-Faschisten"
AUS_destroy_the_horthy_fascists_desc:0 "Miklós Horthy regiert Ungarn seit 16 Jahren kompromisslos. Das wird nicht länger geduldet. Wir werden ihn für seine Taten zur Rechenschaft ziehen, ob wir nun Waffen einsetzen müssen oder nicht!"

AUS_free_the_italian_workers:0 "Befreit die italienischen Arbeiter"
AUS_free_the_italian_workers_desc:0 "Mussolini hat alle Italiener unter seine Kontrolle gebracht und sie als bloße Werkzeuge für den Aufbau einer Kriegsmaschinerie zur Ausweitung seiner Herrschaft benutzt. Wir werden den Fehler, der zu seiner Machtübernahme führte, rückgängig machen."

AUS_the_balkan_revolution:0 "Die Balkanrevolution"
AUS_the_balkan_revolution_desc:0 "Unsere Arbeiterbrüder auf dem Balkan haben noch nicht zu den Waffen gegriffen, um ihren Brüdern zu dienen. Wir haben ganz einfach die Macht, sie zu befreien – eine Macht, die wir nutzen müssen, wenn wir uns stolz als Kommunisten bezeichnen wollen."

AUS_war_against_the_stalinists:0 "Krieg gegen die Stalinisten"
AUS_war_against_the_stalinists_desc:0 "Der stalinistische Staat verrottet im Kern. Er verfügt über eine mächtige Industriebasis, aber weder Nahrung noch Annehmlichkeiten für die Bevölkerung. Wir haben gehört, wie sie leiden – der Sowjetkommunismus ist gescheitert. Es ist Zeit, die Hölle der sowjetischen Arbeiter zu beenden."

AUS_fund_the_french_revolution:0 "Finanzieren Sie die Französische Revolution"
AUS_fund_the_french_revolution_desc:0 "Frankreich hat unserem Land und allen Mittelmächten am Ende des Ersten Weltkriegs schwere Strafen auferlegt, die seit Kriegsende selbst zu spüren sind. Die kommunistische Stimmung in Frankreich ist auf einem historischen Höchststand; wir müssen dies unterstützen."

AUS_start_the_french_revolution:0 "Beginn der Französischen Revolution"
AUS_start_the_french_revolution_desc:0 "Wir haben Schritte unternommen, um Frankreichs Zukunft als arbeitnehmerfreundlicher Staat zu sichern, doch die Machthaber scheinen nicht auf die Wünsche der Bevölkerung einzugehen. So viel zur Demokratie. Wir müssen dem französischen Volk so schnell wie möglich bei seiner Revolution helfen!"

AUS_the_polish_revolution:0 "Die polnische Revolution"
AUS_the_polish_revolution_desc:0 "Polen hat bewiesen, dass es nicht in der Lage ist, sich um sein eigenes Land zu kümmern. Eingezwängt zwischen den Faschisten im Westen und den Kommunisten im Osten, ist klar, welcher Weg für die Zukunft Polens der beste ist – und wir können Maßnahmen ergreifen, um es dorthin zu führen."


AUS_repeal_the_abolition_of_nobility:0 "Aufhebung der Abschaffung des Adels"
AUS_repeal_the_abolition_of_nobility_desc:0 "Nach dem Ersten Weltkrieg wurde uns mit der Abschaffung des Adels der Kern unseres Erbes entrissen. Dieses Gesetz rückgängig zu machen, dürfte jedoch einfacher sein als bisher angenommen."

AUS_propose_the_alps_defence_pact:0 "Schlagen Sie den Alpenschutzpakt vor"
AUS_propose_the_alps_defence_pact_desc:0 "Die Italiener haben uns einige unserer strategisch wichtigsten Standorte weggenommen und Tausende unserer Bürger vertrieben, indem sie im Zuge des Ersten Weltkriegs Istrien und Südtirol einverleibten. Doch nun herrschen in Europa erneut Spannungen, und ihre Position im Verhältnis zu uns kann nicht ignoriert werden – ebenso wenig wie ihr potenzieller Nutzen als Verbündeter."
AUS_propose_the_alps_defence_pact_tt:0 "Wenn Italien zustimmt, wird der Anschluss umgangen.\nWir werden auch §Y300 leichte Panzer§ erhalten!.\n"

AUS_repeal_ban_on_political_parties:0 "Aufhebung des Parteienverbots"
AUS_repeal_ban_on_political_parties_desc:0 "Die Faschisten, die derzeit unser Land kontrollieren, haben kurzsichtigerweise alle politischen Parteien und deren Versammlungen verboten. Dieses Verbot findet jedoch nicht so breite Unterstützung, dass es nicht mit ein wenig geschicktem politischen Manöver aufgehoben werden könnte."

AUS_reinstate_the_habsburg_family:0 "Wiedereinsetzung der Habsburger"
AUS_reinstate_the_habsburg_family_desc:0 "Nach dem Ende des Ersten Weltkriegs wurden die Habsburger, die rechtmäßigen Herrscher Österreich-Ungarns, aller Ländereien und Titel beraubt und verbannt. Diese Schritte geschahen unter Zwang; das einzige, was die Habsburger uns jemals angetan haben, war jedoch, dass sie den Krieg verloren haben. Sie waren uns stets treu, und so werden wir ihnen treu bleiben."

AUS_liechtenstein_treaty:0 "Liechtensteiner Vertrag"
AUS_liechtenstein_treaty_desc:0 "Deutschland ist keine verantwortungsvolle Weltmacht mehr, die von einem stabilisierenden und mächtigen Kaiser regiert wird. Stattdessen bedroht der Wahnsinnige Hitler ganz Europa mit seiner Expansionspolitik. Österreich muss sich, wenn es überleben will, nach allen möglichen Verbündeten umsehen – auch nach der Schweiz."

AUS_ban_the_national_socialist_party:0 "Verhaftung der Nationalsozialistischen Partei"
AUS_ban_the_national_socialist_party_desc:0 "Die Nazis sind sowohl in Österreich als auch in Deutschland eine politische Macht. Ihre Botschaft an Österreich entspricht jedoch nicht unseren Interessen. Man könnte sogar behaupten, sie sei Verrat. Sollen wir entsprechend handeln?"

AUS_undermine_mussolini:0 "Mussolini untergraben"
AUS_undermine_mussolini_desc:0 "Nicht ganz Italien ist unter Mussolinis Idealen vereint, so sehr er sich das auch wünschen würde. Ein wenig politische Unterstützung durch unsere eigenen Royalisten könnte die royalistische Unterstützung in Italien stärken und das faschistische Regime stürzen."

AUS_issue_emergency_powers:0 "Erteilung von Notstandsbefugnissen"
AUS_issue_emergency_powers_desc:0 "Die Lage in Europa wird mit jedem Tag angespannter und unbeständiger. In Zeiten wie diesen besteht die einzige Lösung für die Bedrohung durch unsere proaktiven und expansionistischen Nachbarn darin, die Bürokratie abzubauen und unseren eigenen Politikern ebenso proaktive Befugnisse zu verleihen."

AUS_for_kaiser_and_fatherland:0 "Für Kaiser und Vaterland"
AUS_for_kaiser_and_fatherland_desc:0 "Es ist eine Zeit des Wandels für Europa, und Österreichs Platz in der zukünftigen Welt wird von der Opferbereitschaft des Staates und der Bevölkerung bestimmt. Es ist Zeit für jeden leistungsfähigen Mann, für Kaiser und Vaterland vorzutreten."

AUS_issue_the_venetia_treaty:0 "Den Venetia-Vertrag ausstellen"
AUS_issue_the_venetia_treaty_desc:0 ""

AUS_italian_civil_war:0 "Italienischer Bürgerkrieg"
AUS_italian_civil_war_desc:0 "Italien befindet sich in einem fragilen Zustand. Der König ist beliebt und die royalistische Fraktion ist stark, auch wenn die Faschisten uns glauben machen wollen, es gäbe keine andere politische Kraft. Ein kleiner Anstoß genügt, um Italien in einen Bürgerkrieg zu stürzen."

AUS_demand_sudtyrol:0 "Nachfrage Südtirol und Istrien"
AUS_demand_sudtyrol_desc:0 "Angesichts des Bürgerkriegs in Italien befinden wir uns in einer hervorragenden Position, Südtirol und Istrien zurückzuerobern. Ein wenig politischer Einfluss erspart uns den Einsatz großer militärischer Mittel."

AUS_interfere_in_italian_civil_war:0 "Angebotshilfe für Südtirol und Istrien"
AUS_interfere_in_italian_civil_war_desc:0 "Die rechtschaffenen Royalisten kämpfen nun darum, ihrem König die wahre Macht zurückzugeben. Unsere eigene Herrscherfamilie der Habsburger beobachtet ihren Kampf mit Sympathie – und wittert eine Chance. Vielleicht lässt sich im selben Moment ein Handel abschließen und ein Verbündeter gewinnen."

AUS_old_ties:0 "Alte Krawatten"
AUS_old_ties_desc:0 "Die Bande zwischen Österreich und Ungarn sind tief und stark, und für die Wiederherstellung eines Bündnisses zwischen ihnen bedarf es keiner Argumentation. Ein Bündnis zwischen uns wird uns besser helfen, unseren Platz in der Welt zurückzugewinnen, als jede Wiederbewaffnung oder jeder Vertrag mit einer anderen Macht."

AUS_assassination_of_horthy:0 "Ermordung von Horthy"
AUS_assassination_of_horthy_desc:0 "„König Horthy“, wie er sich selbst hochtrabend nennt, war einst ein einfacher Offizier. Nun erhebt er Anspruch auf den ungarischen Thron – ein im Grunde lächerlicher Anspruch. Trotzdem hat er Macht. Eine einfache, wenn auch heikle Lösung wäre, ihn zu ermorden, damit die Habsburger eingreifen können."

AUS_stabilise_hungary:0 "Ungarn stabilisieren"
AUS_stabilise_hungary_desc:0 "Ungarn gehört wieder zu unserem Machtbereich, doch die Instabilität nach Horthys Ermordung hat Probleme verursacht. Die Wiederherstellung der Ordnung erfordert Zeit und Mühe."

AUS_the_czech_plan:0 "Der tschechische Plan"
AUS_the_czech_plan_desc:0 "Die ehemalige Tschechoslowakei, einst Teil Österreich-Ungarns, steht heute unter deutscher Besatzung. In der Region herrscht Kriegsrecht, doch unser Einfluss könnte sie in einen Aufstand stürzen, den wir brauchen, um die Region ohne Krieg mit Hitler zurückzuerobern."

AUS_path_of_war:0 "Pfad des Krieges"
AUS_path_of_war_desc:0 "Deutschland hat uns unsere Gebiete im Norden der Tschechoslowakei genommen. Wir planen natürlich, dieses Land zurückzuerobern. Der Weg des Krieges ist der einzige Weg vorwärts."

AUS_path_of_peace:0 "Weg des Friedens"
AUS_path_of_peace_desc:0 "Deutschland hat unser altes Gebiet, die Tschechoslowakei, annektiert, doch das bedeutet nicht, dass die österreichisch-ungarische Bevölkerung außerhalb unserer Reichweite liegt. Es können noch immer Vorbereitungen getroffen werden, um unser Volk in unser Land zu holen."

AUS_arm_czech_resistance:0 "Bewaffnen Sie den tschechischen Widerstand"
AUS_arm_czech_resistance_desc:0 "Deutschland kontrolliert zwar die Tschechoslowakei, aber wir können ihm dennoch auf vielfältige Weise Steine ins Getriebe legen. Ein Konzept hierfür ist ein Stellvertreterkrieg, der durch die Finanzierung des tschechischen Widerstands geführt wird."

AUS_czech_immigration:0 "Tschechische Einwanderung"
AUS_czech_immigration_desc:0 "Die Deutschen zwingen jeden arbeitsfähigen Mann irgendwo in ihrem aufstrebenden Reich zum Dienst. Doch die tschechischen Bürger fordern täglich, dieser Zwangsarbeit zu entkommen und ihren Platz in der österreichisch-ungarischen Monarchie zu finden. Wir heißen sie natürlich willkommen."

AUS_demand_czech_autonomy:0 "Fordern Sie tschechische Autonomie"
AUS_demand_czech_autonomy_desc:0 "Die direkte Kontrolle über die Tschechoslowakei zu erlangen, ist vielleicht eine vergebliche Hoffnung, aber wir können immer noch für ihre Autonomie unter deutscher Herrschaft plädieren. Von da an ist unsere Hoffnung vielleicht nicht mehr so vergeblich …"

AUS_allow_czech_volunteers:0 "Tschechische Freiwillige zulassen"
AUS_allow_czech_volunteers_desc:0 "Das tschechoslowakische Militär existiert praktisch nicht, und die deutsche Besatzung lässt dem Volk keine Möglichkeit, für ein Land zu kämpfen, das es als sein eigenes betrachtet. Täglich bitten uns Tausende tschechoslowakischer Freiwillige um ihren Dienst – und es ist an der Zeit, dass wir ihnen dies ermöglichen."

AUS_operation_skoda:0 "Bedienung: Skoda"
AUS_operation_skoda_desc:0 "Der Skoda-Ingenieurskonzern beschäftigt einige der klügsten Köpfe der Gegenwart – und hat seinen Sitz in der von den Nazis kontrollierten Tschechoslowakei. Diese Köpfe wären am besten geeignet, unsere Interessen zu vertreten."

AUS_request_southern_slovakia:0 "Anfrage Südslowakei"
AUS_request_southern_slovakia_desc:0 "Die Slowakei war immer österreichisch-ungarisches Gebiet. Da unser alter Verbündeter sie nun kontrolliert, ist es nur gerecht, dass sie uns zurückgegeben wird – und das wäre leicht zu begründen, wenn wir es wollten."

AUS_continue_secret_armament:0 "Fortsetzung der geheimen Bewaffnung"
AUS_continue_secret_armament_desc:0 "Wir versorgen den Widerstand in der Tschechoslowakei schon seit geraumer Zeit mit Waffen, und das zu einem beträchtlichen Preis. Man könnte argumentieren, dass wir diese Waffenlieferungen zu einer vollständigen verdeckten Wiederaufrüstung ausweiten sollten."

AUS_initiate_the_bohmen_plan:0 "Initiieren Sie den Böhmen-Plan"
AUS_initiate_the_bohmen_plan_desc:0 "Die Tschechoslowakei ist von der deutschen Herrschaft so gut wie befreit, und es ist an der Zeit, diese Kontrolle direkt herauszufordern und unser Volk wieder in unsere Union aufzunehmen. Krieg ist zwar unangenehm, aber manchmal notwendig."
AUS_initiate_the_bohmen_plan_tt:0 "Die Tschechoslowakei wird unsere Marionette, aber wir werden Deutschland den Krieg erklären.\n"

AUS_full_czech_citizenship:0 "Volle tschechische Staatsbürgerschaft"
AUS_full_czech_citizenship_desc:0 "Die Tschechoslowakei war einst österreichisch-ungarisch und die Menschen in der Tschechoslowakei betrachteten sich als österreichisch-ungarisch. Es ist nur fair und richtig, dass wir diesen Status wiederherstellen, damit unser Volk unter unserer Herrschaft frei leben kann."

AUS_annex_bohemia_and_moravia:0 "Annex Böhmen und Mähren"
AUS_annex_bohemia_and_moravia_desc:0 "Böhmen und Mähren waren einst unter unserer Kontrolle und werden es wieder sein. Wir werden ihre Annexion verkünden, und wehe dem, der uns herausfordert."

AUS_seek_closer_ties_to_yugoslavia:0 "Engere Beziehungen zu Jugoslawien anstreben"
AUS_seek_closer_ties_to_yugoslavia_desc:0 "Jugoslawien ist kein gefährlicher Gegner, aber seine Position macht es zu einem potenziell wertvollen Verbündeten. Eine Einladung zu dem Verteidigungspakt, den wir derzeit schließen, wird unsere beider Positionen stärken."

AUS_demand_slovenia_desc:0 "Jugoslawien war schon immer ein schwaches Land und ist heute stärker bedroht als je zuvor. Es wäre ein Leichtes, einem bereits eingeschüchterten Volk Land wegzunehmen, das rechtmäßig uns gehört."

AUS_invite_yugoslavia_to_faction:0 "Jugoslawien zur Fraktion einladen"
AUS_invite_yugoslavia_to_faction_desc:0 "Unser Verteidigungspakt mit Jugoslawien war bislang für beide Seiten von Vorteil, und nun ist die Zeit gekommen, eine engere Union anzustreben – ein formelleres und konkreteres Bündnis."

AUS_war_for_the_balkans:0 "Krieg um den Balkan"
AUS_war_for_the_balkans_desc:0 "Jugoslawien ist in einer schwachen Position und unser Territorium auf dem Balkan ist reif für die Rückeroberung. Wenn wir in den Krieg ziehen müssen, dann werden wir in den Krieg ziehen, um die österreichisch-ungarischen Bürger in die österreichisch-ungarische Zivilisation zurückzuführen."

AUS_establish_research_partnership:0 "Forschungspartnerschaft aufbauen"
AUS_establish_research_partnership_desc:0 "Es wurde ein neuerlicher Zusammenschluss Österreich-Ungarns und Jugoslawiens vorgeschlagen; diesmal zwischen unseren und ihren größten Köpfen. Ein Forschungspakt wird uns beiden nützen."

AUS_allow_croat_semi_autonomy:0 "Erlauben Sie kroatische Teilautonomie"
AUS_allow_croat_semi_autonomy_desc:0 "Die Kroaten haben sich immer gegen eine höhere Herrschaft ausgesprochen, unsere nicht mehr und nicht weniger als die anderer. Wenn wir ihnen eine gewisse Autonomie zugestehen, wird das die Dinge für uns in jeder Hinsicht einfacher machen."

AUS_supress_serbian_nationalists:0 "Unterdrückung serbischer Nationalisten"
AUS_supress_serbian_nationalists_desc:0 "Die Serben sind ein äußerst unabhängiges Volk, und ihre nationalistischen Fraktionen verfügen in ihren eigenen Regionen über große Macht. Es ist an der Zeit, dem ein Ende zu setzen – notfalls mit Gewalt."

AUS_establish_autonomous_serbian_puppet:0 "Gründung einer autonomen serbischen Marionette"
AUS_establish_autonomous_serbian_puppet_desc:0 "Die serbischen Nationalisten sind der österreichisch-ungarischen Herrschaft ein Dorn im Auge, seit Serbien wieder unter unsere Gerichtsbarkeit fiel. Ihnen Autonomie unter unserer Herrschaft zu gewähren, ist eine einfache und kostengünstige Lösung des Problems."

AUS_transylvania_or_war:0 "Siebenbürgen oder Krieg"
AUS_transylvania_or_war_desc:0 "Rumänien hat nach dem Ersten Weltkrieg wie ein Geier die Region Siebenbürgen überfallen. Wir müssen dieses Land zurückfordern und die Rückkehr unseres Volkes unter unsere Herrschaft."

AUS_suppress_transylvanian_romanians:0 "Unterdrückung der siebenbürgischen Rumänen"
AUS_suppress_transylvanian_romanians_desc:0 "Trotz der rechtmäßigen österreichisch-ungarischen Herrschaft über Siebenbürgen gibt es weiterhin ein nationalistisches rumänisches Element, das dem Reich ein Dorn im Auge ist. Es müssen Schritte unternommen werden, um dieses Element zu unterdrücken."

AUS_deport_romanians:0 "Deportation siebenbürgischer Rumänen"
AUS_deport_romanians_desc:0 "Die in Siebenbürgen lebenden rumänischen Nationalisten stellen eine ständige und lästige Herausforderung für unsere Herrschaft dar. Sie loszuwerden dürfte jedoch eine geringere Herausforderung darstellen, sollten wir uns dafür entscheiden."

AUS_form_holy_roman_empire:0 "Bilden Sie das Heilige Römische Reich"
AUS_form_holy_roman_empire_desc:0 "Österreich-Ungarn ist nicht das älteste Reich Mitteleuropas. Einst war das Heilige Römische Reich eine der stärksten militärischen und politischen Mächte seiner Zeit – und wir kontrollieren dasselbe Land, dasselbe Volk, dieselbe militärische und politische Macht. Wagen wir es, die Macht zu reformieren, die einst Mitteleuropa beherrschte?"

AUS_reclaim_historical_lands:0 "Historisches Land zurückerobern"
AUS_reclaim_historical_lands_desc:0 "Mit der Erklärung der Reform des Heiligen Römischen Reiches haben wir stillschweigend Anspruch auf alle Gebiete erhoben, die das Reich einst kontrollierte. Doch wir sind immer noch dieselbe imperiale Macht! Wir müssen nichts stillschweigend tun. Wir werden unseren Anspruch auf die Länder der Welt verkünden."

AUS_german_aero_tech:0 "Deutsche Flugzeugentwürfe"
 AUS_german_aero_tech_desc:0 "Unsere deutschen Verbündeten haben uns Zugang zu ihren neuesten Flugzeugdesigns gewährt."
 
 AUS_british_aero_tech:0 "Britische Flugzeugdesigns"
 AUS_british_aero_tech_desc:0 "Unsere britischen Verbündeten haben uns Zugang zu ihren neuesten Flugzeugdesigns gewährt."
 
 AUS_soviet_aero_tech:0 "Sowjetische Flugzeugentwürfe"
 AUS_soviet_aero_tech_desc:0 "Unsere sowjetischen Verbündeten haben uns Zugang zu ihren neuesten Flugzeugdesigns gewährt."
 
 AUS_imperial_naval_academy:0 "Kaiserliche Marineakademie"
 AUS_imperial_naval_academy_desc:0 "Die Marineakademie in Rijeka wird es uns ermöglichen, die klügsten und besten Marineoffiziere ins Feld zu schicken."
 
 AUS_triesteshipyards:0 "Triester Werften"
 AUS_triesteshipyards_desc:0 "Die großen Werften der Küstenstadt Triest waren einst die wichtigsten Produktionsstätten für die Marine der beiden Monarchien. Nun sollen sie uns wieder dienen."
 
 AUS_csepel_muvek:0 "Csepel Muvek"
 AUS_csepel_muvek_desc:0 "Dieser riesige Industriekomplex liegt auf einer Insel in der Nähe von Budapest und soll unseren Bedarf an der Massenproduktion von Panzerfahrzeugen decken."
 
