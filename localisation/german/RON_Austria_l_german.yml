 AUS_infantry_equipment_0:0 "Mannlicher M1895/30"
 AUS_infantry_equipment_0_short:0 "Mannlicher M1895/30"
 AUS_infantry_equipment_0_desc:0 "Ursprünglich von der österreichisch-ungarischen Armee während des Ersten Weltkriegs übernommen und eingesetzt, wurde es nach dem Krieg sowohl von der österreichischen als auch von der ungarischen Armee weitergeführt. Das Mannlicher M1895 ist ein Repetiergewehr, das von Ferdinand Ritter von Mannlicher entworfen wurde und eine weiterentwickelte Version seines revolutionären Geradezugverschlusses verwendete, ähnlich dem Mannlicher M1890-Karabiner. Das M95/30 wurde in den Jahren 1930–1940 in der Ersten Österreichischen Republik von Steyr-Mannlicher umgebaut."
 AUS_infantry_equipment_1:0 "Karabiner 98k"
 AUS_infantry_equipment_1_short:0 "Karabiner 98k"
 AUS_infantry_equipment_1_desc:0 "Der Karabiner 98 kurz ist ein Repetiergewehr mit der 7,92 × 57 mm Mauser-Patrone, das am 21. Juni 1935 von der deutschen Wehrmacht als Standard-Dienstgewehr eingeführt wurde. Es war eine der letzten Entwicklungen in der langen Reihe der Mauser-Militärgewehre. Obwohl es im Zweiten Weltkrieg durch halb- und vollautomatische Gewehre ergänzt wurde, blieb es bis Kriegsende 1945 das wichtigste deutsche Dienstgewehr."
 AUS_infantry_equipment_2:0 "MP 34"
 AUS_infantry_equipment_2_short:0 "MP 34"
 AUS_infantry_equipment_2_desc:0 "Die MP34 (Maschinenpistole 34) ist eine Maschinenpistole der Waffenfabrik Steyr, die im Zweiten Weltkrieg von der österreichischen Polizei und später von Einheiten der deutschen Armee und der Waffen-SS eingesetzt wurde. Als außergewöhnlich gut verarbeitete Waffe wurde sie von einigen Streitkräften bis weit in die 1970er Jahre eingesetzt."
 AUS_infantry_equipment_3:0 "StG 44"
 AUS_infantry_equipment_3_short:0 "StG 44"
 AUS_infantry_equipment_3_desc:0 "Das StG 44 war das erste erfolgreiche und in großer Stückzahl produzierte Design, bei dem eine neue, kürzere Patrone zum Einsatz kam, die ein kontrollierbares automatisches Feuer aus einer Waffe ermöglichte, die kompakter war als ein Sturmgewehr. Dies geschah in Verbindung mit der Erkenntnis, dass gezieltes Gewehrfeuer in Kampfsituationen meist nicht über eine Distanz von einigen hundert Metern hinausging."
 
 AUS_motorized_equipment:0 "Raupenschlepper Ost"
 AUS_motorized_equipment_desc:0 "Raupenschlepper Ost, wörtlich „Raupenschlepper Ost“, wird üblicherweise mit RSO abgekürzt. Dieses vollkettengetriebene Leichtfahrzeug wurde als Reaktion auf die schlechte Leistung von Rad- und Halbkettenfahrzeugen im Schlamm und Schnee während des ersten Herbsts und Winters der Wehrmacht an der sowjetischen Front entwickelt."
 AUS_motorized_equipment_1:0 "Raupenschlepper Ost"
 AUS_motorized_equipment_1_desc:0 "Raupenschlepper Ost, wörtlich „Raupenschlepper Ost“, wird üblicherweise mit RSO abgekürzt. Dieses vollkettengetriebene Leichtfahrzeug wurde als Reaktion auf die schlechte Leistung von Rad- und Halbkettenfahrzeugen im Schlamm und Schnee während des ersten Herbsts und Winters der Wehrmacht an der sowjetischen Front entwickelt."
 
 AUS_gw_tank_equipment:0 "Panzerwagen"
 AUS_gw_tank_equipment_short:0 "Steyr ADGZ"
 AUS_gw_tank_equipment_desc:0 "Der Steyr ADGZ wurde ursprünglich ab 1934 als schwerer Panzerwagen für das österreichische Bundesheer entwickelt (seine Bezeichnung war „M35 Mittlerer Panzerwagen“) und von 1935 bis 1937 ausgeliefert."
 
 AUS_artillery_equipment:0 "10 cm M. 14 Feldhaubitze"
 AUS_artillery_equipment_short:0 "10 cm M. 14 Feldhaubitze"
 AUS_artillery_equipment_desc:0 "Die 10 cm M. 14 Feldhaubitze war ein Mehrzweck-Feld- und Gebirgsgeschütz, das von Österreich-Ungarn im Ersten Weltkrieg eingesetzt wurde. Zwischen den Kriegen wurde es von Österreich, Italien und Polen verwendet. Erbeutete Waffen wurden von Nazi-Deutschland unter den Bezeichnungen 10 cm leFH 14(ö) und 10 cm leFH 315(i) verwendet."
 AUS_artillery_equipment_1:0 "10 cm M. 14 Feldhaubitze"
 AUS_artillery_equipment_1_short:0 "10 cm M. 14 Feldhaubitze"
 AUS_artillery_equipment_1_desc:0 "Die 10 cm M. 14 Feldhaubitze war ein Mehrzweck-Feld- und Gebirgsgeschütz, das von Österreich-Ungarn im Ersten Weltkrieg eingesetzt wurde. Zwischen den Kriegen wurde es von Österreich, Italien und Polen verwendet. Erbeutete Waffen wurden von Nazi-Deutschland unter den Bezeichnungen 10 cm leFH 14(ö) und 10 cm leFH 315(i) verwendet."
 AUS_artillery_equipment_2:0 "15 cm sFH 18"
 AUS_artillery_equipment_2_desc:0 "Die 15 cm schwere Feldhaubitze 18 oder sFH 18 (deutsch: „schwere Feldhaubitze, Modell 18“), Spitzname Immergrün („Evergreen“), war die grundlegende schwere Haubitze auf deutscher Divisionsebene während des Zweiten Weltkriegs und diente neben der kleineren, aber zahlreicheren 10,5 cm leFH 18."
 AUS_artillery_equipment_3:0 "17 cm Kanone 18"
 AUS_artillery_equipment_3_desc:0 "Ab 1939 tauchte der 21-cm-Mörser 18 erstmals in den Artillerieregimenten der deutschen Armee auf Korpsebene auf und ersetzte den veralteten 21-cm-Mörser 16 aus der Zeit des Ersten Weltkriegs. Das Geschütz konnte 113 kg (249 lb) schwere Sprenggranaten auf eine Reichweite von 14,5 km (9,0 Meilen) verschießen."


 news.10001.t:0 "Willkommen bei Greater Possibilities: Österreich"
 news.10001.d:0 "Mit diesem Mod können Sie den Anschluss Österreichs an Deutschland verhindern und Ihren eigenen Weg durch den Zweiten Weltkrieg ebnen. Lesen Sie den politischen Abschnitt, insbesondere den „Österreichischen Ausgleich“, sorgfältig durch, denn nur so können Sie den Anschluss verhindern."
 news.10001.a:0 "Viel Spaß!"
 
 news.1114.t:0 "Österreich-Ungarn hat reformiert"
 news.1114.d:0 "Obwohl sie seit über 19 Jahren getrennt sind, haben Österreich und Ungarn beschlossen, ihrer einstigen Union wieder beizutreten. Beide Länder sind nun politisch und militärisch eins."
 news.1114.a:0 "Werden wir das alte Reich neu erleben?"
 
 austria.1111.t:0 "Der österreichische Kompromiss"
 austria.1111.d:0 "Die österreichische Regierung hat offensichtlich von unserer Kampagne für den Anschluss unserer beiden großen Nationen gehört und einen Kompromiss angeboten: Unterstützung in einem etwaigen bevorstehenden Krieg, dafür aber Autonomie in der Zwischenzeit."
 austria.1111.a:0 "Sie werden als autonome Verbündete wertvoll sein."
 austria.1111.b:0 "Müssen wir sie an die Bedeutung wahrer Einheit erinnern?"
 
 austria.1112.t:0 "Deutschland hat unseren Vorschlag angenommen"
 austria.1112.d:0 "Die deutsche Regierung hat unser Alternativangebot angenommen und uns unsere Freiheit als Nation gewährt. Ein Hoch auf unser Bündnis!"
 austria.1112.a:0 "Auf die Zukunft der Mittelmächte!"
 
 austria.1113.t:0 "Deutschland hat unseren Vorschlag abgelehnt"
 austria.1113.d:0 "Die Nazis haben entschieden, dass die Vereinigung der Mittelmächte der einzige Weg nach vorn ist, und es scheint, dass wir nicht Teil dieses Plans sind. Der Anschluss wird voranschreiten."
 austria.1113.a:0 "Dies ist eine düstere Möglichkeit."
 
 austria.1114.t:0 "Wiedervereinigung Österreich-Ungarns"
 austria.1114.d:0 "Lange Zeit waren die Länder Österreich und Ungarn unter einem gemeinsamen Kaiser vereint. Die österreichische Regierung ist an uns herangetreten und bittet um Mithilfe bei der Wiederherstellung dieser Regelung."
 austria.1114.a:0 "Natürlich! Wir werden gemeinsam zurückgewinnen, was wir verloren haben!"
 austria.1114.b:0 "Ungarn wird seine Autonomie sowohl gegenüber Deutschen als auch gegenüber Österreichern verteidigen."
 
 austria.1115.t:0 "Ungarn hat die Wiedervereinigung akzeptiert"
 austria.1115.d:0 "Ungarn hat seinen Platz in unserem neuen, gemeinsamen Reich akzeptiert. Nun blicken wir nach vorn, in die Zukunft Österreich-Ungarns!"
 austria.1115.a:0 "Vorwärts!"
 
 austria.1116.t:0 "Ungarn hat die Wiedervereinigung abgelehnt"
 austria.1116.d:0 "Es scheint, als würden die Ungarn ihre Autonomie verteidigen. Unser Angebot wurde respektvoll abgelehnt, was Zweifel an ihren wahren Motiven aufkommen lässt."
 austria.1116.a:0 "Hm..."
 
 austria.1117.t:0 "Österreich-Ungarn fordert Siebenbürgen"
 austria.1117.d:0 "Österreich-Ungarn hat gegenüber seinem eigenen Volk und unserem Volk immer wieder die Bedeutung Siebenbürgens für das ungarische Volk betont. Wenn wir einen Krieg vermeiden wollen, ist die Lage an einem Wendepunkt angelangt: Sollen wir Siebenbürgen abtreten?"
 austria.1117.a:0 "Siebenbürgen gehört rechtmäßig uns!"
 austria.1117.b:0 "Wenn wir in den Krieg ziehen, nehmen sie uns einfach alles weg."
 
 austria.1118.t:0 "Rumänien hat nachgegeben"
 austria.1118.d:0 "Die Rumänen haben mit der geforderten Abtretung Siebenbürgens ungewöhnliche Weisheit bewiesen. Die lokale Regierungsinfrastruktur wird bereits unter unsere Kontrolle gestellt, und wir können bei Bedarf Truppen dorthin verlegen."
 austria.1118.a:0 "Perfekt."
 
 austria.1119.t:0 "Rumänien hat uns abgelehnt"
 austria.1119.d:0 "Es scheint, als hätten die aufstrebenden Rumänen vergessen, wem Siebenbürgen gehört. Ein Krieg gegen sie ist absolut gerechtfertigt. Aber ist es jetzt an der Zeit?"
 austria.1119.a:0 "Die Narren. Mobilisiert die Truppen."
 austria.1119.b:0 "Krieg ist im Moment unangebracht. Ein anderes Mal."
 
 austria.1122.t:0 "Siebenbürgen gehört uns"
 austria.1122.d:0 "Siebenbürgen gehört uns, und wir haben die Möglichkeit, einen vorteilhaften Frieden zu erzwingen, um das von uns geforderte Land zu behalten. Dieser Krieg hat bereits zu viele Menschenleben gefordert. Sollten wir einen Friedensschluss erzwingen?"
 austria.1122.a:0 "Dieser Krieg ist jetzt sinnlos."
 austria.1122.b:0 "Vorstoß nach Bukarest!"
 
 austria.1124.t:0 "Die rumänische Frage"
 austria.1124.d:0 "Die rumänische Mehrheit in Siebenbürgen leistet trotz weitgehender Friedfertigkeit einen hartnäckigen politischen Widerstand gegen die ungarische Herrschaft. Das ist inakzeptabel. Wenn die Mehrheit ihre Herrschaft nicht akzeptiert, werden wir sie zur Minderheit machen."
 austria.1124.a:0 "Entfernen Sie sie."
 austria.1124.b:0 "Vielleicht eine Brücke zu weit."
 
 austria.1125.t:0 "Österreich fordert Slowenien"
 austria.1125.d:0 "Die österreichische Regierung übt in letzter Zeit politischen Druck auf die Region Slowenien aus. Ein Krieg mit ihnen mag kostspielig sein, aber können wir es uns leisten, so leichtfertig Land abzutreten?"
 austria.1125.a:0 "Wenn dadurch das Leben unseres Volkes gerettet wird, ja."
 austria.1125.b:0 "Niemals! Jugoslawien wird sich selbst verteidigen!"
 
 austria.1126.t:0 "Jugoslawien tritt Slowenien ab"
 austria.1126.d:0 "Die Jugoslawen haben uns das von uns geforderte Land klugerweise abgetreten und unseren Truppen uneingeschränkten Zugang sowie die Kontrolle über sämtliche Einrichtungen gewährt. Unsere Pläne laufen wie gewünscht."
 austria.1126.a:0 "Exzellent."
 
 austria.1127.t:0 "Jugoslawien lehnte unsere Forderungen ab"
 austria.1127.d:0 "Der aufstrebende Scheinstaat Jugoslawien scheint sich gegen uns wehren zu wollen. Welche andere Erklärung gäbe es für eine so unhöfliche Ablehnung? Wir müssen uns zurückholen, was uns gehört."
 austria.1127.a:0 "Dann scheint es, als hätten wir keine Wahl."
 
 austria.1128.t:0 "Österreich fordert ehemalige Gebiete"
 austria.1128.d:0 "Die österreichischen Aggressionen haben ihren Höhepunkt erreicht und sie beanspruchen nun die nördlichen Gebiete Jugoslawiens für ihre eigenen Zwecke. Sie sind eine einschüchternde Macht – aber sollten wir nachgeben?"
 austria.1128.a:0 "Wir werden unser eigenes Land verteidigen!"
 austria.1128.b:0 "Wir können uns einem Krieg mit Österreich nicht stellen."
 
 austria.1129.t:0 "Jugoslawien lehnt unsere Forderungen ab"
 austria.1129.d:0 "Der Prätendentenstaat Jugoslawien hat uns das Land verweigert, auf das wir jedes Recht haben. Wir könnten jetzt in den Krieg ziehen, aber ist es der richtige Zeitpunkt?"
 austria.1129.a:0 "Wir nehmen, was wir brauchen."
 austria.1129.b:0 "Jetzt ist nicht der richtige Zeitpunkt."
 
 austria.1130.t:0 "Jugoslawien tritt den Nordbalkan ab"
 austria.1130.d:0 "Jugoslawien ist sich bewusst, dass es einem Krieg mit unserer überlegenen Militärmacht nicht standhalten kann und hat uns seine nördlichen Gebiete abgetreten. Wir sind bereits dabei, unsere eigenen politischen Agenten einzusetzen."
 austria.1130.a:0 "Genau wie geplant."
 
 austria.1131.t:0 "Unsere Ziele wurden erreicht"
 austria.1131.d:0 "Wir haben Jugoslawien den gesamten Boden abgenommen, den wir gefordert hatten, und nun suchen die verzweifelten Verteidigungskräfte nach jedem Ausweg – einschließlich eines Waffenstillstands. Wir können ihn jetzt durchsetzen, aber ist er die beste Option?"
 austria.1131.a:0 "Jetzt ist nicht die Zeit für allzu lange Kriege."
 austria.1131.b:0 "Wir können und werden ihnen alles nehmen, was sie haben!"
 
 austria.1132.t:0 "Remilitarisierung Serbiens"
 austria.1132.d:0 "Nach dem Jugoslawienkrieg haben unsere Armeen taktischen Zugang zu tiefer gelegenen Regionen Serbiens erhalten. Vorwärts!"
 austria.1132.a:0 "Genau wie geplant!"
 
 austria.1133.t:0 "Österreich fordert Slowakei auf"
 austria.1133.d:0 "Die österreichische Regierung hat beantragt, dass die besetzte Region der Slowakei unter ihre Kontrolle gestellt wird, da sie ursprünglich österreichisch-ungarisches Land war."
 austria.1133.a:0 "Das erscheint vernünftig."
 austria.1133.b:0 "Es war österreichisch und ist jetzt deutsch."
 
 austria.1138.t:0 "Deutschland hat uns die Slowakei geschenkt"
 austria.1138.d:0 "Die deutsche Regierung ist zu dem Schluss gekommen, dass wir einen Anteil an der slowakischen Region verdienen. Sie hat uns die Kontrolle über alle Anlagen übertragen und wir können das Land nach Bedarf nutzen."
 austria.1138.a:0 "Exzellent."
 
 austria.1139.t:0 "Deutschland hat die Slowakei zurückgehalten"
 austria.1139.d:0 "Deutschland hat unseren Antrag auf die slowakische Region abgelehnt. Ein trauriger Zustand, aber wir werden sicher noch unsere Chance bekommen."
 austria.1139.a:0 "Ein bedauerlicher Rückschlag."
 
 austria.1140.t:0 "Österreich fordert Krakau"
 austria.1140.d:0 "Österreich hat Anspruch auf die polnische Region Krakau erhoben, die seit langem zwischen der österreichisch-ungarischen Monarchie und Polen umstritten ist. Ihr Anspruch ist berechtigt – aber werden wir ihn gewähren?"
 austria.1140.a:0 "Natürlich."
 austria.1140.b:0 "Dies entspricht nicht unseren Bedürfnissen."
 
 austria.1141.t:0 "Deutschland hat uns Krakau geschenkt"
 austria.1141.d:0 "Deutschland hat uns den Zugang zur Region Krakau abgetreten und uns damit Zugang zu einem weiteren alten Zentrum österreichisch-ungarischen Erbes gewährt."
 austria.1141.a:0 "Exzellent."
 
 austria.1142.t:0 "Deutschland hat Krakau zurückgehalten"
 austria.1142.d:0 "Deutschland hat uns Krakau verweigert, den Zugang zur Stadt behalten und uns das alte österreichisch-ungarische Gebiet vorenthalten. Eine fragwürdige Entscheidung, ganz sicher."
 austria.1142.a:0 "Fragwürdig, aber unerbittlich."
 
 austria.1143.t:0 "Dalmatien für Südtirol"
 austria.1143.d:0 "Durch die politischen Machenschaften Italiens haben wir nach dem Ersten Weltkrieg einen Teil Tirols gewonnen. Die Österreicher wollen das Gebiet rechtzeitig zurückerobern – und wir wollen Dalmatien beanspruchen. Vielleicht lässt sich eine Einigung erzielen...?"
 austria.1143.a:0 "Es scheint notwendig zu sein."
 austria.1143.b:0 "Wir werden ihnen nichts überlassen!"
 
 austria.1144.t:0 "Italien hat unserem Deal zugestimmt"
 austria.1144.d:0 "Die Italiener haben unser Angebot angenommen und sich bereit erklärt, ihre Truppen aus Dalmatien abzuziehen, während wir unsere aus Tirol abziehen. Der Austausch tritt mit sofortiger Wirkung in Kraft."
 austria.1144.a:0 "Genau wie geplant."
 
 austria.1145.t:0 "Italien hat unser Abkommen abgelehnt"
 austria.1145.d:0 "Die Italiener sind zu dem Schluss gekommen, dass ihr Anspruch auf die italienische Mehrheit in Dalmatien mehr wert ist als ihr zweifelhafter Anspruch auf den Rest Tirols. Sie haben unser Angebot abgelehnt."
 austria.1145.a:0 "Vielleicht ist es das Beste."
 
 austria.1146.t:0 "Österreich fordert die Halbinsel Istrien"
 austria.1146.d:0 "Die Österreicher fordern die Halbinsel Istrien, eine Hochburg der österreichisch-ungarischen Seeherrschaft seit vor dem Ersten Weltkrieg. Ihnen den Anspruch zu verweigern, könnte Konsequenzen haben."
 austria.1146.a:0 "Sie sind eine zu gefährliche Macht, um sie zu leugnen."
 austria.1146.b:0 "Wir können mit den Konsequenzen umgehen."
 
 austria.1147.t:0 "Italien hat Istrien abgetreten"
 austria.1147.d:0 "Italien hat uns mit sofortiger Wirkung die alte Seefestung Istrien abgetreten. Unsere Truppen können sie zurückerobern."
 austria.1147.a:0 "Perfekt!"
 
 austria.1148.t:0 "Italien hat unsere Forderungen abgelehnt"
 austria.1148.d:0 "Die Italiener haben sich dummerweise gegen uns gestellt. Vielleicht ist es an der Zeit, den Emporkömmlingen zu zeigen, dass ein Sieg gegen uns nicht automatisch den zweiten Sieg garantiert."
 austria.1148.a:0 "Sind sie auf den Krieg vorbereitet?"
 
 austria.1149.t:0 "Österreichische Einladung"
 austria.1149.d:0 "Die österreichische Regierung hat eine Einladung zu einem Militärbündnis unter Führung ihres eigenen Imperiums ausgesprochen. Ein mächtiger Verbündeter – aber brauchen wir seine Hilfe?"
 austria.1149.a:0 "In diesen unsicheren Zeiten ist jede Hilfe willkommen."
 austria.1149.b:0 "Wir können unseren eigenen Weg gehen."
 
 austria.1150.t:0 "Österreichisches Ultimatum"
 austria.1150.d:0 "Österreich hat uns ein Ultimatum gestellt: Entweder wir kommen unter die Herrschaft des österreichischen Imperiums oder wir werden gewaltsam unter österreichische Herrschaft gebracht. Wir befinden uns in einer schwierigen Lage."
 austria.1150.a:0 "Wir werden die Lebensweise unserer Bürger schützen!"
 austria.1150.b:0 "Es scheint, wir müssen die österreichische Führung akzeptieren."
 
 austria.1151.t:0 "Griechenland hat unser Ultimatum abgelehnt"
 austria.1151.d:0 "Die unverschämten Griechen haben uns einen gehörigen Schlag ins Gesicht versetzt und unser Angebot politischen und militärischen Schutzes zurückgewiesen. Eine solch offensichtliche Geste ist eindeutig ein Akt des Krieges!"
 austria.1151.a:0 "Und wir werden es auch so behandeln!"
 
 austria.1152.t:0 "Griechenland ist unserem Ultimatum nachgegeben"
 austria.1152.d:0 "Griechenland hat unser Schutzangebot in diesen dunklen und unruhigen Zeiten klugerweise angenommen. Die Regierung ist ohne viel Aufhebens in unsere Hände übergegangen und wird als Teil unserer Koalition agieren."
 austria.1152.a:0 "Die klügere Wahl."
 
 austria.1153.t:0 "Österreichische Einladung"
 austria.1153.d:0 "Unsere alten Verbündeten, die Österreicher, haben uns freundschaftlich den Arm ausgestreckt und eine Wiederauferstehung der alten Mittelmächte in Aussicht gestellt. Vielleicht ist es an der Zeit, sich wieder mit unseren alten osmanischen Verbündeten zusammenzuschließen?"
 austria.1153.a:0 "Wenn es überhaupt eine Zeit dafür gibt, dann ist es jetzt."
 austria.1153.b:0 "Wenn ein Krieg droht, müssen wir unsere Verbündeten sorgfältiger prüfen."
 
 austria.1154.t:0 "Die Türkei hat sich bereit erklärt, uns beizutreten"
 austria.1154.d:0 "Die Türkei hat unser Bündnisangebot angenommen und steht uns in jedem zukünftigen Konflikt zur Seite. Die Osmanen haben ihre Freunde nicht vergessen!"
 austria.1154.a:0 "Und wir auch nicht."
 
 austria.1155.t:0 "Die Türkei hat sich geweigert, sich uns anzuschließen"
 austria.1155.d:0 "Die Türkei scheint vergessen zu haben, wie loyal wir im Ersten Weltkrieg zueinander standen. Sie hat unser Bündnis abgelehnt und wird ihren eigenen Weg gehen."
 austria.1155.a:0 "Ein beunruhigendes Konzept."
 
 austria.1156.t:0 "Wir haben die Sowjets zurückgeschlagen"
 austria.1156.d:0 "Der ukrainische Aufstand verläuft vergleichsweise gut, doch der sowjetische Bär ist weiterhin eine beunruhigende Präsenz über uns. Wir können weiter Druck machen, wenn wir glauben, dass wir mehr Boden gewinnen können – oder wenn wir ein Friedensabkommen erzielen können."
 austria.1156.a:0 "Wir werden Frieden anbieten – unter Bedingungen."
 austria.1156.b:0 "Den Sowjets kann nicht erlaubt werden, weiterzumachen!"
 
 austria.1157.t:0 "Der ukrainische Waffenstillstand"
 austria.1157.d:0 "Die Österreicher haben ein Friedensabkommen geschlossen. In Anbetracht des bisherigen Kriegsverlaufs sind die Bedingungen großzügig: ein sofortiger Waffenstillstand im Austausch für die Freiheit der russischen Ukraine. Sollen wir es akzeptieren?"
 austria.1157.a:0 "Es scheint notwendig."
 austria.1157.b:0 "Nicht bevor der letzte Mann tot ist!"
 
 austria.1158.t:0 "Die Sowjets haben eingeräumt"
 austria.1158.d:0 "Die Sowjets haben einem Waffenstillstand zugestimmt. Die Ukraine ist in den Händen der Ukrainer, und die Ukrainer sind uns sehr dankbar. Ein großer Sieg."
 austria.1158.a:0 "Und ein weiterer Schritt in unseren Plänen."
 
 austria.1159.t:0 "Die Sowjets haben sich geweigert"
 austria.1159.d:0 "Die Sowjets sind zu dem Schluss gekommen, dass ihre Interessen durch einen langen, zermürbenden Krieg besser gewahrt werden. Vielleicht ein Beweis für die wahre sowjetische Auffassung vom Wert des Arbeiters?"
 austria.1159.a:0 "Zu unserem eigenen Wohl werden wir die Sache schnell beenden."
 
 austria.1160.t:0 "Wir haben unsere Ziele erreicht"
 austria.1160.d:0 "Der ukrainische Aufstand ist erfolgreich verlaufen, und ein freier ukrainischer Staat ist nun möglich. Wir können den Sowjets ein Friedensabkommen anbieten – Frieden für die Freiheit der Ukraine. Ein vernünftigeres Angebot könnten wir nicht machen."
 austria.1160.a:0 "Alles, um der Ukraine Demokratie zu bringen."
 austria.1160.b:0 "Man kann sich nicht darauf verlassen, dass die Sowjets friedlich bleiben."
 
