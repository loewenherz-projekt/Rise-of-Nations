 AUS_motorised_infantry:0 "Raupenschlepper Ost"
 AUS_motorised_infantry_desc:0 "Raupenschlepper Ost, wörtlich „Raupenschlepper Ost“, wird üblicherweise mit RSO abgekürzt. Dieses vollkettengetriebene Leichtfahrzeug wurde als Reaktion auf die schlechte Leistung von Rad- und Halbkettenfahrzeugen im Schlamm und Schnee während des ersten Herbsts und Winters der Wehrmacht an der sowjetischen Front entwickelt."
 
 AUS_interwar_artillery:0 "Zwischenkriegsartillerie"
 AUS_interwar_artillery_desc:0 "Die bei der Entwicklung verschiedener Artillerietypen gewonnenen Erkenntnisse können auf die Konstruktion anderer Waffen übertragen werden."
 AUS_artillery1:0 "Artillerie I"
 AUS_artillery1_desc:0 "Mit moderneren Materialien und Mechanismen können Haubitzen und Feldgeschütze aus dem Ersten Weltkrieg umgerüstet und für die moderne Kriegsführung modernisiert werden."
 AUS_artillery2:0 "Verbessertes Artillerie-Upgrade I"
 AUS_artillery2_desc:0 "Mit der Modernisierung alter Waffen kommen wir nur bis zu einem gewissen Punkt voran. Wir brauchen neue Haubitzenkonstruktionen, die die Vorteile neuer hydraulischer Rückstoßvorrichtungen und längerer Läufe nutzen."
 AUS_artillery3:0 "Verbessertes Artillerie-Upgrade II"
 AUS_artillery3_desc:0 "Um schwerere Geschütze auf leichteren Lafetten zu ermöglichen, können in Haubitzenkonstruktionen Mündungsbremsen integriert werden."
 AUS_artillery4:0 "Artillerie IV"
 AUS_artillery4_desc:0 "Durch die Entwicklung leichter, für den Transport zerlegbarer Artillerie wird es möglich, Artillerieunterstützung in bisher schwer erreichbare Gebiete zu bringen."
 AUS_artillery5:0 "Verbessertes Artillerie-Upgrade"
 AUS_artillery5_desc:0 "Artilleriegeschütze mit niedrigeren Silhouetten sind für den Feind schwieriger anzuvisieren."

 austrian_research_name:0 "Forschungsgruppe Alpenschutzpakt"
 austrian_research_desc:0 ""

 AUS_paratrooper:0 "Jagdkommando"
 AUS_paratrooper_desc:0 "Durch die Eingliederung von Luftlandetruppen in unsere Armee können wir gewaltsam eindringen und wichtige Truppen in bisher unzugänglichen Gebieten stationieren, was neue taktische Möglichkeiten eröffnet."
 AUS_mountaineers:0 "Gebirgsjäger"
 AUS_mountaineers_desc:0 "Kämpfe in Gebirgsregionen setzen unsere Soldaten vielen Gefahren aus, die sich jedoch manchmal nicht vermeiden lassen. Durch eine spezielle Ausbildung unserer Soldaten für diese Umgebung können wir diese Risiken minimieren."
