 AUS_soviet_armour_tech_desc:0 "Unsere sowjetischen Verbündeten haben uns Zugang zu ihren neuesten Panzerdesigns gewährt."
 
 AUS_german_overseers:0 "Deutsche Aufseher"
 AUS_german_overseers_desc:0 "Hitlers Deutschland hat unseren Vorschlag zwar akzeptiert, hat aber immer noch einen massiven Einfluss auf unsere Politik."
 
 AUS_austrian_resistance:0 "Österreichischer Widerstand"
 AUS_austrian_resistance_desc:0 "Hitler hat entschieden, dass Österreich ein Teil Deutschlands sein muss. Wir werden ihm das Gegenteil beweisen!"
 
