 ### ROYALIST SECTION ###
 
 austria.5000.t:0 "Österreich schlägt Alpenschutzpakt vor"
 austria.5000.d:0 ""
 austria.5000.a:0 "Ja"
 austria.5000.b:0 "NEIN"
 
 austria.5001.t:0 "Italien lehnt unseren Vorschlag ab"
 austria.5001.d:0 ""
 austria.5001.a:0 "Interessant."
 
 news.6000.t:0 "Österreich und Italien unterzeichnen Verteidigungspakt"
 news.6000.d:0 ""
 news.6000.a:0 "bestätigen"
 
 austria.5002.t:0 "Nationalsozialisten versuchen einen Putsch"
 austria.5002.d:0 "Nazi-Fanatiker sind massenhaft in das Parlament eingedrungen, haben zahlreiche Politiker getötet und einen öffentlichen Aufruhr verursacht. Sie forderten öffentlich ihre Wiedereinsetzung in ihre Machtpositionen. Ihr Putsch wurde niedergeschlagen – doch ihre Forderung füllt den Platz, an dem einst gute, ehrliche Politiker saßen."
 austria.5002.a:0 "Dies ist jedoch eine Chance, unsere Position zu stärken."
 austria.5002.b:0 "Wenn wir ihren Forderungen nicht nachgeben, finden sie möglicherweise einen Weg, eine weitere Gräueltat zu begehen."
 
 austria.5003.t:0 "Österreich schlägt den Vertrag von Venedig vor"
 austria.5003.d:0 ""
 austria.5003.a:0 "Unterzeichnen Sie den Vertrag"
 austria.5003.b:0 "Italien soll allein bleiben"
 
 austria.5004.t:0 "Italien lehnt Vorschlag ab"
 austria.5004.d:0 ""
 austria.5004.a:0 "bestätigen"
 
 austria.5005.t:0 "Österreichisches Interventionsangebot"
 austria.5005.d:0 "Inmitten des Krieges um Italiens Zukunft haben sich österreichische Diplomaten an uns gewandt und ihre Unterstützung bei der Wiederherstellung der Monarchie angeboten. Sie fordern vor allem eines: die Rückgabe der Ländereien, die wir im Ersten Weltkrieg gewonnen haben."
 austria.5005.a:0 "Ein faires Angebot für unschätzbare Hilfe."
 austria.5005.b:0 "Der Preis ist zu hoch; schicken Sie sie weg."
 
 austria.5006.t:0 "Österreich schlägt Liechtenstein-Vertrag vor"
 austria.5006.d:0 ""
 austria.5006.a:0 "Ja"
 austria.5006.b:0 "NEIN"
 
 austria.5007.t:0 "Die Schweiz lehnt unseren Vertrag ab"
 austria.5007.d:0 ""
 austria.5007.a:0 "Verdammt."
 
 austria.5008.t:0 "Österreich fordert Südtirol und Istrien"
 austria.5008.d:0 "Österreich spürte unsere Schwäche und schickte Diplomaten zu uns, die die Rückgabe der einst österreichischen Provinzen Südtirol und Istrien „erbitten“. Man fragt sich, wie sehr Österreich bisher an den Ereignissen beteiligt war."
 austria.5008.a:0 "Wir können es uns nicht leisten, an zwei Fronten zu kämpfen. Wir werden das Land abtreten."
 austria.5008.b:0 "Sie würden es nicht wagen, uns das Land wegzunehmen, für das wir gekämpft und das wir erobert haben, auch jetzt nicht. Wir bleiben standhaft."
 
 austria.5009.t:0 "Das Königreich Italien lehnt unsere Forderungen ab"
 austria.5009.d:0 ""
 austria.5009.a:0 "Verdammt."
 
 austria.5010.t:0 "Österreich schlägt Allianz vor"
 austria.5010.d:0 "Unser altes Schwesterland Österreich hat ein Bündnis zwischen uns vorgeschlagen. Zwar wäre die Verbindung nicht so stark wie die unseres gemeinsamen Monarchen, aber es wäre eine Rückkehr zu unseren früheren Beziehungen."
 austria.5010.a:0 "Dies ist natürlich die einzig sinnvolle Option."
 austria.5010.b:0 "Österreich-Ungarn ist zerbrochen. Die Wege Ungarns und Österreichs trennen sich nun."
 
 austria.5011.t:0 "Österreich fordert tschechische Autonomie!"
 austria.5011.d:0 "Die österreichisch-ungarische Monarchie hat unsere Behörden kontaktiert und die Freigabe ihrer ehemaligen Gebiete unter halbautonomer deutscher Herrschaft gefordert. Welchen Nutzen sie daraus ziehen, ist unbekannt."
 austria.5011.a:0 "Solange das Land deutsch bleibt, können sich die Menschen nennen, wie sie wollen."
 austria.5011.b:0 "Auf keinen Fall. Das Schicksal der Tschechoslowakei ist besiegelt."
 
 austria.5012.t:0 "Österreich fordert die Südslowakei!"
 austria.5012.d:0 "Österreich-Ungarn forderte die Rückgabe der Südslowakei an seine Herrschaft, so wie sie vor dem Ersten Weltkrieg bestand. Angesichts der Geschichte der Region ist dieser Anspruch berechtigt."
 austria.5012.a:0 "Die Berechtigung der Forderung kann nicht bestritten werden."
 austria.5012.b:0 "Es steht und bleibt unter deutscher Herrschaft."
 
 austria.5013.t:0 "Österreich lädt uns zum Alpenschutzpakt ein"
 austria.5013.d:0 "Als zentrale Macht im Alpenraum ist Österreich stets auf der Suche nach potenziellen Verbündeten – Verbündeten wie uns, wie es scheint. Von der österreichischen Botschaft ist ein Brief eingetroffen, in dem wir zu einem „Alpenverteidigungspakt“ eingeladen werden."
 austria.5013.a:0 "Wir leben in instabilen Zeiten und Verbündete sind immer willkommen."
 austria.5013.b:0 "Österreich ist mächtig, und mit der Macht kommen gefährliche Feinde – Feinde, die wir lieber nicht teilen möchten."
 
 austria.5014.t:0 "Österreich fordert Slowenien"
 austria.5014.d:0 "Österreichische Diplomaten trafen sich mit unserem Fürsten und forderten die Rückgabe Sloweniens an Österreich. Sie warnten vor den möglichen „diplomatischen Folgen“ einer übereilten Reaktion."
 austria.5014.a:0 "Wir können uns einen Krieg mit Österreich nicht leisten. Wir akzeptieren ihn."
 austria.5014.b:0 "Sie werden es nicht wagen, das Thema weiter zu verfolgen – wir bleiben standhaft."
 
 austria.5015.t:0 "Österreichische Einladung zur Fraktion"
 austria.5015.d:0 "Österreich hat uns mit dem Vorschlag kontaktiert, unseren bestehenden Verteidigungspakt zu festigen und offiziell zu machen. Angesichts unserer jüngsten Zusammenarbeit könnte dies durchaus zu unserem beiderseitigen Vorteil sein."
 austria.5015.a:0 "Natürlich. Die Beziehungen zwischen Österreich und Jugoslawien waren nie besser."
 austria.5015.b:0 "So gut unsere Beziehungen auch sind, wir möchten nicht für die Verteidigung anderer verantwortlich gemacht werden."
 
 austria.5016.t:0 "Kroatischer Widerstand"
 austria.5016.d:0 "Seit unserer kürzlichen Übernahme Kroatiens ist das kroatische Volk der österreichischen Herrschaft gegenüber äußerst feindselig eingestellt und will nicht auf sie hören. Wir müssen diese Ablehnung sofort beenden. Doch vorerst wird der Nationalismus anhalten."
 austria.5016.a:0 "Rebellenabschaum.."
 
 austria.5017.t:0 "Serbischer Nationalismus"
 austria.5017.d:0 " Seit unserer kürzlichen Übernahme Serbiens ist das serbische Volk der österreichischen Herrschaft gegenüber äußerst feindselig eingestellt und will nicht auf sie hören. Wir müssen dieser Feindseligkeit sofort ein Ende setzen. Doch vorerst wird der Nationalismus bestehen bleiben."
 austria.5017.a:0 "Rebellischer Abschaum.."
 
 austria.5018.t:0 "Siebenbürgisches Ultimatum"
 austria.5018.d:0 "Österreich-Ungarn forderte die Rückgabe Siebenbürgens an die österreichische Monarchie. Einst herrschte sie tatsächlich über die Region, doch der Erste Weltkrieg änderte dies. Die Bedrohung, die sie heute darstellen, ist jedoch sehr real."
 austria.5018.a:0 "Wir können einem Krieg mit der österreichisch-ungarischen Monarchie nicht allein gegenüberstehen."
 austria.5018.b:0 "Nach ihrer Niederlage im Ersten Weltkrieg würden sie es nicht wagen."
 
 austria.5019.t:0 "Rumänien lehnt unser Ultimatum ab"
 austria.5019.d:0 "Wir haben die Nachricht erhalten, dass Rumänien unser Ultimatum zur Übernahme Siebenbürgens abgelehnt hat und sich auf einen Krieg vorbereitet. Es scheint, als hätten die Rumänen einen Todeswunsch."
 austria.5019.a:0 "Wenn sie den Tod wollen, werden sie ihn bekommen."
 
 austria.5020.t:0 "Rumänische Nationalisten tauchen in Siebenbürgen auf"
 austria.5020.d:0 "Seit unserer kürzlichen Übernahme Siebenbürgens ist das rumänische Volk der österreichischen Herrschaft gegenüber äußerst feindselig eingestellt und will nicht auf sie hören. Wir müssen dem sofort ein Ende setzen. Doch vorerst wird der Nationalismus bestehen bleiben."
 austria.5020.a:0 "Rebellischer Abschaum.."
 
 austria.5021.t:0 "Der Krieg ist vorbei!"
 austria.5021.d:0 "Nach viel Blut und Kampf ist der Krieg endlich vorbei. Unsere Bevölkerung jubelt, und unsere Soldaten werden als Helden gefeiert. Siebenbürgen ist nun in österreichischer Hand. Es scheint, als wären unsere Träume vom alten Kaiserreich zurückgekehrt."
 austria.5021.a:0 "Tolle Neuigkeiten!"
 
 austria.5022.t:0 "Der Krieg ist vorbei!"
 austria.5022.d:0 "Nach viel Blut und Kampf ist der Krieg endlich vorbei. Unsere Bevölkerung jubelt, und unsere Soldaten werden als Helden gefeiert. Der Balkan ist nun in österreichischer Hand. Es scheint, als wären unsere Träume vom alten Kaiserreich zurückgekehrt."
 austria.5022.a:0 "Tolle Neuigkeiten!"
 
 austria.5023.t:0 "Jugoslawien hat Slowenien abgetreten"
 austria.5023.d:0 "Die Jugoslawen haben verstanden, wie unterlegen sie sind, und haben beschlossen, Slowenien an seinen rechtmäßigen Besitzer Österreich abzutreten."
 austria.5023.a:0 "Sie kennen ihren Platz."
 
 austria.5024.t:0 "Bürgerkrieg!"
 austria.5024.d:0 "Zwei Fraktionen streiten um die Herrschaft in Österreich: die Faschisten auf der einen Seite, die Sozialisten auf der anderen. Anfang der Woche kam es zu einigen Auseinandersetzungen, wir stehen am Rande eines Bürgerkriegs. Welche Fraktion sollten wir unterstützen?"
 austria.5024.a:0 "Die Faschisten"
 austria.5024.b:0 "Die Sozialisten"

