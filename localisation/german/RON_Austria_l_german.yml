 AUS_alfred_jansa:0 "Alfred Jansa"
 AUS_war_for_transylvania_desc:0 "Die Kontrolle über ganz Siebenbürgen könnte Rumänien zur Kapitulation zwingen."
 AUS_the_austrian_plot_desc:0 "Die Österreicher planen etwas entlang unserer Grenze …"
 AUS_ukrainian_uprising_desc:0 "Der Krieg um die Unabhängigkeit der Ukraine hat begonnen. Wenn wir die Sowjets weit genug von der Ukraine wegdrängen, können wir sie vielleicht zur Kapitulation zwingen."
 AUS_british_support_desc:0 "Mit den Briten auf unserer Seite haben wir möglicherweise eine Chance gegen die Deutschen."
 AUS_soviet_support_desc:0 "Mit den Sowjets auf unserer Seite haben wir möglicherweise eine Chance gegen die Deutschen."
 AUS_support_weapons:0 "Schwarzlose M. 7"
 AUS_support_weapons_desc:0 "Das Maschinengewehr (Schwarzlose) M. 7, auch bekannt als Schwarzlose MG, ist ein mittleres Maschinengewehr, das während des Ersten Weltkriegs als Standardwaffe in der österreichisch-ungarischen Armee eingesetzt wurde. Im Zweiten Weltkrieg wurde es von der niederländischen, griechischen und ungarischen Armee verwendet. Es wurde routinemäßig neben dem Mannlicher M1895-Gewehr an italienische Kolonialtruppen ausgegeben."
 AUS_support_weapons2:0 "MG 34"
 AUS_support_weapons2_desc:0 "Das vielseitige MG 34 war zum Zeitpunkt seiner Einführung wohl das modernste Maschinengewehr der Welt. Seine Kombination aus außergewöhnlicher Mobilität – es war leicht genug, um von einem Mann getragen zu werden – und hoher Feuerrate (von bis zu 900 Schuss pro Minute) war unübertroffen."
 AUS_support_weapons3:0 "MG 42"
 AUS_support_weapons3_desc:0 "Das MG 42 sollte das frühere MG 34 ersetzen und hat sich in puncto Zuverlässigkeit, Langlebigkeit, Einfachheit und Bedienerfreundlichkeit bewährt. Besonders hervorzuheben ist jedoch seine Fähigkeit, ein hohes Sperrfeuer zu erzeugen. Das MG 42 hatte eine der höchsten durchschnittlichen Schussfrequenzen aller tragbaren einläufigen Maschinengewehre: zwischen 1.200 und 1.500 U/min, was zu einem unverwechselbaren Mündungsknall führte, der mit dem Geräusch einer Motorsäge oder reißendem Linoleum vergleichbar war."
 AUS_support_weapons4:0 "MG 45"
 AUS_support_weapons4_desc:0 "Das MG 45 unterschied sich vom MG 42 dadurch, dass es seinen Verschluss vor dem Abfeuern nicht vollständig verriegelte, was seine Feuerrate erhöhte und seine Konstruktion vereinfachte. 1945 führte der Materialmangel im Dritten Reich zur Entwicklung einer neueren Version des MG 42, dem MG 45 (oder MG 42V). Das getestete MG 45/42V feuerte 120.000 Schuss hintereinander mit einer Feuerrate von etwa 1.350 Schuss pro Minute ab."
 
 AUS_tech_mountaineers:0 "Gebirgsjäger I"
 AUS_tech_mountaineers2:0 "Gebirgsjäger II"
 AUS_tech_mountaineers3:0 "Gebirgsjäger III"
 
 AUS_paratroopers:0 "Jagdkommando I"
