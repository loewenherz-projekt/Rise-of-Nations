  ww1_kuk.70.t:0 "Die Österreicher schlagen ein Friedensabkommen vor"
  ww1_kuk.70.d:0 "Heute Morgen hat der österreichische Botschafter unserem Präsidenten ein Friedensangebot unterbreitet. Sie verlangen, dass wir im Austausch für Frieden alle nichtrussischen Gebiete freigeben. Sollen wir das Angebot annehmen oder ablehnen?"
  ww1_kuk.70.a:0 "Unterzeichnen Sie den Deal"
  ww1_kuk.70.b:0 "Kämpfe weiter!"
  ww1_kuk.71.t:0 "Die Österreicher schlagen den Kauf der Philippinen vor"
  ww1_kuk.71.d:0 "Heute Morgen hat der österreichische Botschafter unserem Präsidenten ein Angebot zum Kauf der Philippinen unterbreitet. Sie schlagen für dieses Grundstück den Preis von zwei Fabriken vor. Sollen wir das Angebot annehmen oder ablehnen? "
  ww1_kuk.71.a:0 "Unterschreiben Sie das Angebot"
  ww1_kuk.71.b:0 "Wir werden unser Land nicht verkaufen!"
  ww1_kuk.72.t:0 "Österreich-Ungarn fordert unser Territorium!"
  ww1_kuk.72.d:0 "Der österreichische Botschafter forderte unsere Regierung auf, unser Territorium in die österreichisch-ungarische Monarchie zu integrieren. Diese unerhörte Forderung spiegelt die Expansionspolitik des Kaiserreichs wider. Sie werden nicht aufhören, bis sie alle gewünschten Gebiete in ihrem Besitz haben. Was sollen wir auf diese Forderung antworten?"
  ww1_kuk.72.a:0 "Akzeptieren Sie ihre Forderungen"
  ww1_kuk.72.b:0 "Wir werden nicht kampflos verschwinden!"
  ww1_kuk.73.t:0 "[FROM.GetName] hat unsere Forderungen abgelehnt"
  ww1_kuk.73.d:0 "Die [FROM.GetAdjective]-Regierung hat auf unsere Forderung nach [FROM.GetAdjective]-Gebiet negativ reagiert und die Beziehungen zu unserem Botschafter abgebrochen. Die [FROM.GetAdjective]-Regierung bittet andere Nationen um Hilfe. Wir sollten so schnell wie möglich handeln, um die Bildung einer Koalition gegen uns zu verhindern." 
  ww1_kuk.74.t:0 "Österreichisches Ultimatum"
  ww1_kuk.74.d:0 "Der österreichische Botschafter forderte unsere Regierung auf, unser Territorium in die österreichisch-ungarische Monarchie zu integrieren. Diese unerhörte Forderung spiegelt die Expansionspolitik des Kaiserreichs wider. Sie werden nicht aufhören, bis sie alle Gebiete, die sie haben wollen, in ihrem Besitz haben. Was sollen wir auf diese Forderung antworten?"
  ww1_kuk.75.t:0 "Österreichischer Vorschlag"
  ww1_kuk.75.d:0 "Die österreichische Regierung hat uns einen Vorschlag unterbreitet: Wir sollen unsere Ostgebiete abgeben. Im Gegenzug würden sie alle Ansprüche auf andere französische Gebiete aufgeben und auch ihre Kolonien in Afrika abtreten. Sollen wir diesen Handel zustande bringen?"
  ww1_kuk.76.t:0 "[FROM.GetName] bittet um Unterwerfung"
  ww1_kuk.76.d:0 "Die [FROM.GetAdjective]-Regierung fordert von uns, eine befreundete Regierung einzusetzen. Sie hofft, ihren Einfluss in unserem Teil der Welt auszuweiten und droht uns mit Sanktionen, falls wir dieses Angebot ablehnen. Vielleicht sollten wir diese Option in Betracht ziehen, aber sind wir bereit, unsere Unabhängigkeit zu verlieren?"
  ww1_kuk.77.t:0 "Wiener Konferenz zur Teilung der USA"
  ww1_kuk.77.d:0 "Obwohl die Nordmänner den Nordosten Nordamerikas bereits um 1000 n. Chr. erkundet und kolonisiert hatten, fand zwischen 1500 und 1800 n. Chr., während des Zeitalters der Entdeckungen, eine spätere und bekanntere Welle europäischer Kolonisierung Amerikas statt. In dieser Zeit begannen mehrere europäische Imperien – vor allem Spanien, Portugal, Großbritannien und Frankreich – die natürlichen Ressourcen und das Humankapital Amerikas zu erforschen und für sich zu beanspruchen, was zur Vertreibung und Auflösung einiger indigener Völker und zur Gründung mehrerer Siedlerkolonialstaaten führte. Einige ehemals europäische Siedlerkolonien – darunter New Mexico, Alaska, die Prärien/nördlichen Great Plains und die „Nordwest-Territorien“ in Nordamerika; der Isthmus von Tehuantepec, die Halbinsel Yucatán und die Darién-Lücke in Mittelamerika; und der nordwestliche Amazonas, die zentralen Anden und die Guyanas in Südamerika – bleiben bis ins 21. Jahrhundert relativ ländlich, dünn besiedelt und indigen, doch mehrere Siedlerkolonialstaaten, darunter Brasilien, Kolumbien, Mexiko, Argentinien und die Vereinigten Staaten, entwickelten sich zu eigenständigen Siedlerkolonialreichen. Russland begann Mitte des 18. Jahrhunderts mit der Kolonisierung des pazifischen Nordwestens auf der Suche nach Fellen für den Pelzhandel. Viele der sozialen Strukturen – darunter Religionen, politische Grenzen und Linguae francae –, die im 21. Jahrhundert in der westlichen Hemisphäre vorherrschen, sind Nachkommen der Strukturen, die in dieser Zeit etabliert wurden."
  ww1_kuk.77.a:0 "Akzeptieren"
  ww1_kuk.77.b:0 "Abfall"
  ww1_kuk.78.t:0 "Europa droht, uns zu spalten!"
  ww1_kuk.78.d:0 "Die europäischen Mächte wollen unser Land aufteilen! Diese Nationen glauben, wir würden kampflos verschwinden! "
  
  ww1_kuk.79.d:0 "Der österreichische Botschafter forderte unsere Regierung auf, unser Territorium in die österreichisch-ungarische Monarchie zu integrieren. Diese unerhörte Forderung spiegelt die Expansionspolitik des Kaiserreichs wider. Sie werden nicht aufhören, bis sie alle Gebiete, die sie haben wollen, in ihrem Besitz haben. Was sollen wir auf diese Forderung antworten?"
  ww1_kuk.79.t:0 "Österreichisches Ultimatum"
  ww1_kuk.80.t:0 "Österreich macht einen Vorschlag"
  ww1_kuk.80.d:0 "Der österreichische Botschafter forderte von unserer Regierung die Eingliederung Istanbuls in die österreichisch-ungarische Monarchie. Diese unerhörte Forderung spiegelt die Expansionspolitik der Monarchie wider, die nicht ruhen wird, bis sie alle gewünschten Gebiete in ihrem Besitz hat. Dieser Vorschlag beinhaltet jedoch auch eine Garantie für den Fall der Abtretung des Landes. Was sollen wir auf diese Forderung antworten?"
  ww1_kuk.81.t:0 "Die Ergebnisse sind da!"
  ww1_kuk.81.d:0 "Jeder Mensch hat das Recht, die Regierung seines Landes in geheimer Abstimmung zu wählen. Ohne dieses Recht sind freie und faire Wahlen nicht möglich. Es garantiert die freie Meinungsäußerung der Bürger, die Repräsentativität der gewählten Volksvertreter und die Legitimität der Legislative und Exekutive und stärkt zugleich das Vertrauen der Bevölkerung in die Institutionen."
  ww1_kuk.81.a:0 "Großartig!"
  ww1_kuk.82.t:0 "[FROM.GetName] sendet"
  ww1_kuk.82.d:0 "Ein Protektorat ist ein Staat, der von einem anderen souveränen Staat kontrolliert und geschützt wird. Es handelt sich um ein abhängiges Gebiet, dem lokale Autonomie in den meisten inneren Angelegenheiten zugestanden wurde, das aber dennoch die Oberhoheit eines mächtigeren souveränen Staates anerkennt, ohne dessen direkter Besitz zu sein. Im Gegenzug übernimmt das Protektorat in der Regel bestimmte Verpflichtungen, abhängig von den Bedingungen der Vereinbarung. Protektorate werden in der Regel de jure durch einen Vertrag errichtet. Unter bestimmten Bedingungen, wie beispielsweise Ägypten unter britischer Herrschaft (1882–1914), kann ein Staat auch als De-facto-Protektorat oder „verhülltes Protektorat“ bezeichnet werden."
  ww1_kuk.82.a:0 "Großartig!"
  ww1_kuk.83.t:0 "Auflösung Deutschlands"
  ww1_kuk.83.d:0 "Nach der Niederlage der [GER.GetName] gegen unsere überlegenen [ROOT.GetAdjective] Streitkräfte wurde eine strenge Politik gegenüber der besetzten Bevölkerung eingeführt. Die Zentralregierung drängt auf eine vollständige Auflösung der [GER.GetName]. Die [GER.GetAdjective] konnten sich aufgrund des Deutsch-Französischen Krieges von 1870 vereinen, nun ist es Zeit für sie, zu verschwinden."
  ww1_kuk.83.a:0 "Ein kurzlebiges Imperium"
  ww1_kuk.83.b:0 "Annex Bayern"

