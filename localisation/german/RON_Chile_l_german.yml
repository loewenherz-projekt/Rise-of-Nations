l_german:

  #Events
 dnc_chile.1.t:0 "Fleischunruhen"
 dnc_chile.1.d: "Exhausted by the high tariffs on cattle, the Comité Central de Abolición del Impuesto al Ganado (Central Committee for the Abolishment of the Livestock Tariff) called for demonstration, at least fifty thousand people gathered. For now the protest is mostly peaceful."
 dnc_chile.1.a:0 "Machen Sie Zugeständnisse"
 dnc_chile.1.b:0 "Unterdrückt den Protest"

 dnc_chile.2.t:0 "Fleischprotest beendet"
 dnc_chile.2.d:0 "Nach unseren Verhandlungen mit dem Comité Central de Abolición del Impuesto al Ganado haben sie beschlossen, unser Angebot anzunehmen. Im Gegenzug für eine Senkung der Viehzölle werden sie zur Einstellung aller Proteste aufrufen."
 dnc_chile.2.a:0 "Endlich Frieden"
 
 dnc_chile.3.t:0 "Protest unterdrückt"
 dnc_chile.3.d:0 "Der Fleischprotest wurde gewaltsam niedergeschlagen. Da man dachte, [CHL.GetLeader] hätte die Hauptstadt verlassen, breitete sich eine Atmosphäre der Gewalt aus. Demonstranten griffen daraufhin Gebäude und öffentliche Einrichtungen an. Die Polizei musste eingreifen, und Berichten zufolge ist die Zahl der Opfer hoch. Immerhin verstanden die Demonstranten, dass sich die Regierung den Massen nicht beugen wird."
 dnc_chile.3.a:0 "Eine notwendige Tragödie"

 dnc_chile.4.t:0 "Der Protest geht weiter"
 dnc_chile.4.d:0 "Nach unseren Verhandlungen mit dem Comité Central de Abolición del Impuesto al Ganado war man mit unseren Bedingungen unzufrieden. Das Comité Central de Abolición del Impuesto al Ganado beschloss, den Protest fortzusetzen und rief die Massen dazu auf, ihre Aktionen fortzusetzen. Wir müssen weitere Zugeständnisse machen, um das Comité Central de Abolición del Impuesto al Ganado und die Massen zu besänftigen."
 dnc_chile.4.a:0 "Wie viele Zugeständnisse sollten wir machen?"

 chile_faction:0 "Südamerikanische Bruderschaft"
 CHL_isi:0 "ISI"
 CHL_isi_desc:0 "Um die Eigenständigkeit unserer Industrie zu fördern, wurden Maßnahmen zur Importsubstitutionsindustrialisierung eingeführt."
 CHL_corfo:0 "KORFO"
 CHL_corfo_desc:0 "Die Tatsache, dass es sich um ein verstaatlichtes Bauunternehmen handelt, trägt zur Vereinfachung unserer Projekte bei."
 CHL_dissident_activity:0 "Dissidentenaktivitäten"
 CHL_dissident_activity_desc:0 "In Chile wimmelt es von Dissidenten aller Art. Zwischen Kommunisten und Nationalsozialisten herrscht kein Frieden."
 CHL_command_economy:0 "Planwirtschaft"
 CHL_command_economy_desc:0 "Durch die Verstaatlichung der gesamten chilenischen Industrie können wir anstelle der Kapitalisten bestimmen, was dort produziert wird."
 CHL_communist_influence:0 "Chilenischer Einfluss"
 CHL_communist_influence_desc:0 "Chile verbreitet den Kommunismus in seinem Land."
 CHL_revolution:0 "Kommunistische Revolution"
 CHL_revolution_desc:0 "Das Feuer der Revolution brennt in dieser Nation."
 CHL_communist_militia_idea:0 "Kommunistische Milizen"
 CHL_communist_militia_idea_desc:0 "Durch die Integration kommunistischer Milizen in unsere Streitkräfte haben wir diese gestärkt."
 CHL_communist_ban:0 "Verbot des Kommunismus"
 CHL_communist_ban_desc:0 "Durch das Verbot des Kommunismus ist es für solche Bewegungen schwieriger geworden, im Land zu agieren."
 CHL_fascist_ban:0 "Verbot des Faschismus"
 CHL_fascist_ban_desc:0 "Da der Faschismus verboten ist, werden seine radikalen Bewegungen nahezu vollständig unterdrückt."
 CHL_republican_guard_idea:0 "Republikanische Garde"
 CHL_republican_guard_idea_desc:0 "Durch die Wiedereinführung der Republikanischen Garde als paramilitärische, dem Staat verpflichtete Organisation verfügen wir über eine größere Streitmacht, mit der wir arbeiten können."
 CHL_expanded_private_sector:0 "Erweiterter privater Sektor"
 CHL_expanded_private_sector_desc:0 "Die Expansion des privaten Sektors hat zu mehr Wettbewerb und Effizienz innerhalb der Wirtschaft geführt."
 CHL_preemptive_idea:0 "Kriegsvorbereitungen"
 CHL_preemptive_idea_desc:0 "Angesichts des drohenden Krieges wurden Maßnahmen zur Sicherung der Landesgrenzen ergriffen."
 CHL_crackdown_idea:0 "Durchgreifen"
 CHL_crackdown_idea_desc:0 "Die Regierung unterdrückt radikale Bewegungen im Land rücksichtslos."
 CHL_spread_of_fascist:0 "Der Faschismus breitet sich aus"
 CHL_spread_of_fascist_desc:0 "Im Land breiten sich faschistische Bewegungen aus. Es ist wahrscheinlich, dass sie die Macht ergreifen werden."
 CHL_patriotic_leagues_idea:0 "Patriotische Ligen"
 CHL_patriotic_leagues_idea_desc:0 "Durch die Neugründung der Patriotischen Ligen als paramilitärische Organisation verfügen wir über eine größere Armee."
 CHL_spread_the_revolution_idea:0 "Die Revolution verbreiten"
 CHL_spread_the_revolution_idea_desc:0 "Wir müssen die Revolution in der Welt verbreiten! Revolutionäre im Ausland müssen unterstützt werden."
 CHL_home_of_latin_revolution:0 "Heimat der Lateinischen Revolution"
 CHL_home_of_latin_revolution_desc:0 "Chile ist die Heimat der kommunistischen Revolution in Lateinamerika und daher herrscht dort ein starkes Gefühl von Zielstrebigkeit und Einheit."
 CHL_pacts_of_may_idea:0 "Die Pakte des Mai"
 CHL_pacts_of_may_idea_desc:0 "Die Maipakte wurden 1902 unterzeichnet und stellten eine Vereinbarung mit Argentinien dar, dass wir unsere Operationen auf den Pazifik und sie auf den Atlantik beschränken würden."
 CHL_central_bank_idea:0 "Erweiterte Zentralbank"
 CHL_central_bank_idea_desc:0 "Durch die Erweiterung unserer Zentralbank können wir staatliche Infrastrukturprojekte leichter ermöglichen."
 CHL_popular_front_frail:0 "Schwache Koalition"
 CHL_popular_front_frail_desc:0 "Die Volksfront war eine Koalition zwischen den Sozialisten, der Mitte-Links-Partei und den Kommunisten. Dieses breite Bündnis ist von Natur aus fragil."
 CHL_volunteer_corps_focus_republican:0 "Unterstützung für das republikanische Spanien"
 CHL_volunteer_corps_focus_republican_desc:0 "Wir müssen Soldaten schicken, um unseren Brüdern im Ausland in Spanien zu helfen. Wahrscheinlich sollten wir danach woanders damit weitermachen."
 CHL_volunteer_corps_focus_nationalist:0 "Unterstützung für das nationalistische Spanien"
 CHL_volunteer_corps_focus_nationalist_desc:0 "Wir müssen Soldaten schicken, um unseren Brüdern im Ausland in Spanien zu helfen. Wahrscheinlich sollten wir danach woanders damit weitermachen."
 lion_of_tarapaca:0 "Löwe von Tarapacá"
 CHL_soviet_assistance:0 "Sowjetische Berater"
 CHL_german_assistance:0 "Deutsche Berater"
 CHL_the_leader_idea:0 "El Jefe"
 CHL_the_leader_idea_desc:0 "Der Führer, El Jefe, hat die absolute Macht in Chile."
 CHL_extirpation_idea:0 "Ausrottung unerwünschter Personen"
 CHL_extirpation_idea_desc:0 "Die Semiten und andere ungünstige Gruppen wurden aus dieser Nation vertrieben."
 CHL_communist_conquest_idea:0 "Kavaliere des Kommunismus"
 CHL_anti_american_idea:0 "Antiamerikanische Stimmung"
 CHL_anti_capitalist_idea:0 "Kapitalisten ausgerottet"
 CHL_peronist_support:0 "Chilenische Unterstützung für Peronisten"
 CHL_consolidate_the_government:0 "Konsolidierung der Regierung"
 CHL_consolidate_the_government_desc:0 "Unser Land leidet noch immer unter den Auswirkungen des Putsches von 1925. Radikale Bewegungen durchdringen das Land und dürfen nicht weiter bestehen. Es ist Zeit, die Zügel unserer Nation wieder in die Hand zu nehmen und einen neuen, unbezwingbaren Kurs einzuschlagen."
 CHL_the_popular_front:0 "Die Volksfront"
 CHL_the_popular_front_desc:0 "Alessandri hat seine Zeit hinter sich; das Massaker von Seburo Obrero ist der Tropfen, der das Fass zum Überlaufen bringt. Da sich das Land unter seiner Herrschaft stabilisiert hat, wird ein solcher Rohling nicht mehr gebraucht. Es ist Zeit für eine liberalere Regierung. Wir brauchen eine Koalition aus sozialistischen und liberalen Parteien, um uns zu emanzipieren."
 CHL_win_the_liberals:0 "Gewinnen Sie die Liberalen"
 CHL_win_the_liberals_desc:0 "Sowohl Linke als auch Rechte drohen, die Nation erneut ins Chaos zu stürzen: Das dürfen wir nicht zulassen. Ein wenig Blutvergießen ist notwendig, um die Nation zu schützen, und das Blut von Dissidenten ist ein geringer Preis für die Sicherheit der Bürger. Wir werden die Liberalen zur Vernunft bringen und ihre Unterstützung gewinnen."
 CHL_isi_idea:0 "Importsubstitutionsökonomie"
 CHL_isi_idea_desc:0 "Die Weltwirtschaftskrise hat die chilenische Wirtschaft schwer getroffen. Eine solch radikal liberale Wirtschaftspolitik kann nicht noch einmal praktiziert werden. Chile muss autark sein, um sich vor den Turbulenzen ausländischer Volkswirtschaften zu schützen. Um dies zu ermöglichen, müssen die chilenischen Basisindustrien und Produktionskapazitäten verbessert werden."
 CHL_establish_corfo:0 "CORFO gründen"
 CHL_establish_corfo_desc:0 "Lassen Sie uns CORFO gründen: die Corporación de Fomento de la Producción, eine staatliche Organisation zur Überwachung unseres öffentlichen Sektors und zur Sicherung des Wirtschaftswachstums. Wir sollten mit der Gründung eines staatlichen Zuckerunternehmens beginnen: IANSA, die Industria Azucarera Nacional."
 CHL_cap_steel:0 "Ein nationales Stahlwerk"
 CHL_cap_steel_desc:0 "Wir sollten ein Stahlunternehmen für unser Land gründen. Chile verfügt bereits über eine Stahlindustrie, die aus Sicherheitsgründen durch verstaatlichte Teile erweitert werden sollte. Wir werden die Compania de Acero del Pacifico als nationales Stahlwerk gründen."
 CHL_enap:0 "Ausbau der Öl- und Elektronikindustrie"
 CHL_enap_desc:0 "Die Empresa Nacional del Petroleo (ENAP) und die Empresa Nacional de Electricidad (ENDESA) werden neue Industrien unter CORFO sein und dafür sorgen, dass diese Sektoren unter Chile gedeihen."
 CHL_liberalism_over_socialism:0 "Liberalismus statt Sozialismus"
 CHL_liberalism_over_socialism_desc:0 "Obwohl wir eine Koalition mit den Sozialisten und sogar mit den Kommunisten gebildet haben, ist dies nicht der Weg, den Chile einschlagen wird. Chile soll eine Sozialdemokratie werden. Denn die Kommunisten sind nicht besser als die Juntas und Diktatoren von einst. Freiheit und Sicherheit werden die Ziele dieser Regierung sein."
 CHL_a_truly_radical_party:0 "Eine wirklich radikale Partei"
 CHL_a_truly_radical_party_desc:0 "Die Nation ist weiterhin in Aufruhr. Diese schwache Koalition zwischen Bürgerlichen und Sozialisten wird nicht bestehen. Jetzt ist die Zeit für die kommunistische Revolution in Chile gekommen. Lasst uns die Präsidentschaft an uns reißen und eine wirklich gleichberechtigte und befreiende Regierung errichten."
 CHL_remove_the_right:0 "Entfernen Sie die rechte"
 CHL_remove_the_right_desc:0 "Die extreme Rechte bedroht seit Jahrzehnten die Stabilität Chiles. Es ist an der Zeit, diese Bedrohung endgültig zu beseitigen. Lasst uns von Marees und seine Nationalsozialisten finden und beseitigen. Es wird in Chile nie wieder einen gescheiterten Putsch geben."
 CHL_support_republican_spain:0 "Unterstützen Sie das republikanische Spanien"
 CHL_support_republican_spain_desc: "Long has Chile been tied closely with Spain. The Republicans cry out for the aid of internationalists everywhere and it is our duty to assist them. Soon the whole world will be communist."
 CHL_support_nationalist_spain: "Support Nationalist Spain"
 CHL_support_nationalist_spain_desc: "Our motherland, Spain, calls for aid. Franco, just as we did, struggles against the communists and anarachists who threaten to destroy everything that is Spanish and replace it with internationalism. We cannot sit idly by and allow the lands of our forefathers fall to darkness. We must assist him."
 CHL_reestablish_the_republican_guard:0 "Wiederherstellung der Republikanischen Garde"
 CHL_reestablish_the_republican_guard_desc:0 "Die Republikanische Garde löste sich 1936 auf, nachdem sie ihre Mission als erfüllt betrachtete. Doch heute ist klar, dass dies bei weitem nicht der Fall ist. Die Soldaten der Republik sollen erneut den Frieden der Nation bewahren und sie vor inneren und äußeren Kräften schützen, die sie zu zerstören drohen."
 CHL_public_works:0 "Öffentliche Arbeiten"
 CHL_public_works_desc:0 "Dank Alessandri ist der Haushalt endlich ausgeglichen. Wir sollten in größere öffentliche Bauvorhaben investieren, um die Größe Chiles zu zeigen und auch die Bevölkerung daran zu erinnern. Dies wird auch die Bauwirtschaft stark beleben und zur wirtschaftlichen Erneuerung beitragen."
 CHL_urbanisation_focus:0 "Urbanisierung fördern"
 CHL_urbanisation_focus_desc:0 "Es ist an der Zeit, Chile von einer überwiegend ländlichen und landwirtschaftlich geprägten Gesellschaft zu einer wirklich modernen Wirtschaft zu entwickeln. Eine bessere Infrastruktur in den Städten und Anreize zur Standortverlagerung werden die Entwicklung des verarbeitenden Gewerbes fördern und uns helfen, die Depression zu überwinden."
 CHL_land_reform_auth:0 "Die Haciendas aneignen"
 CHL_land_reform_auth_desc:0 "Die Hacendados haben sich als unerträgliche Oberherren erwiesen. Sie müssen bestraft und an ihre Rolle erinnert werden. Die Enteignung einiger ihrer Ländereien und die Einführung neuer Gesetze sollten das Problem einfach lösen."
 CHL_land_reform:0 "Agrarreform"
 CHL_land_reform_desc:0 "Der Agrarsektor in Chile ist an die Hacendados und ihr fast feudales System gefesselt. Aufgrund ihres Einflusses wird es schwierig, das Problem zu lösen, um die Agrarkrise zu bewältigen. Gesetze allein reichen nicht aus – auch Zwang ist erforderlich."
 CHL_full_recovery:0 "Vollständige wirtschaftliche Erholung"
 CHL_full_recovery_desc:0 "Die chilenische Wirtschaft hat dank der zahlreichen Investitionen und wirtschaftlichen Fortschritte einen neuen Aufschwung erlebt. Darüber hinaus ist Chile für seinen Wohlstand nicht mehr so stark von ausländischen Volkswirtschaften abhängig. Wir werden künftig besser auf wirtschaftliche Turbulenzen vorbereitet sein."
 CHL_efe_rail:0 "Revitalisierung der Eisenbahnen"
 CHL_efe_rail_desc:0 "Die Empresa de Ferrocarriles del Estado, das staatliche Eisenbahnunternehmen, wurde 1884 gegründet und betreibt Strecken durch ganz Chile. Die Modernisierung der Eisenbahnstrecken ist jedoch schon lange her, und die Züge sind veraltet. Wir sollten mit neuer Kraft in das Unternehmen investieren – zum Wohle aller Branchen und Menschen in Chile."
 CHL_steel:0 "Erweiterung des Stahlwerks"
 CHL_steel_desc:0 "Das nationale Stahlwerk hat sich als äußerst lohnendes Unternehmen erwiesen. Es ist nur sinnvoll, dort weiter zu investieren, wo wir Ressourcen haben. Bauen wir ein riesiges Stahlwerk in Huachipato – die Region verfügt nicht nur über eine besondere Fußballbegeisterung, sondern auch über Rohstoffvorkommen."
 CHL_the_spread_of_fascism:0 "Die Ausbreitung des Faschismus"
 CHL_the_spread_of_fascism_desc:0 "Sowohl innerhalb des Militärs als auch innerhalb der Bevölkerung Chiles gibt es eine zunehmend nationalistische Stimmung, die die Republik zu stürzen droht."
 CHL_appropriate_land_com:0 "Befreit die Bauern"
 CHL_appropriate_land_com_desc:0 "Der tyrannischen Aristokratie, die einen Großteil des Landes in Chile besitzt, muss ein Ende gesetzt werden. Es ist an der Zeit, ihr Land den hart arbeitenden Bauern zuzuteilen, die zuvor auf dem Land geschuftet haben."
 CHL_el_ariostazo:0 "El Ariostazo"
 CHL_el_ariostazo_desc:0 "Es ist Zeit für die Abschaffung der Republik. Die Demokratie ist schwach und leicht zu beeinflussen. Chile braucht in diesen turbulenten Zeiten eine starke Militärregierung. Ein Staatsstreich wird diese Regierung treffen, und er wird nicht scheitern."
 CHL_the_pacts_of_may:0 "Die Maipakte abschaffen"
 CHL_the_pacts_of_may_desc:0 "Die Pactos de Mayo wurden 1902 unterzeichnet und regelten die militärischen Beziehungen zwischen Chile und Argentinien. Vielleicht ist es an der Zeit, unser Verhältnis zu Argentinien zu überdenken."
 CHL_claims_on_argentina:0 "Die Einnahme von Feuerland"
 CHL_claims_on_argentina_desc:0 "Unsere Grenze zu Argentinien wurde 1902 festgelegt, doch mit der Neufestlegung muss auch unsere Grenze neu festgelegt werden. Feuerland ist ein Archipel südlich von Patagonien. Derzeit teilen wir uns das Gebiet mit Argentinien, doch diese Zeit ist vorbei. Chile muss Kap Hoorn kontrollieren."
 CHL_claims_on_uruguay:0 "Sicherung des Südatlantiks"
 CHL_claims_on_uruguay_desc:0 "Da Argentinien unter unserer Kontrolle steht, fällt auch die Kontrolle über den Südatlantik in unsere Zuständigkeit. Wir teilen den Rio de la Plata mit den Uruguayern: ein Gebiet von entscheidender strategischer Bedeutung. Das kann nicht so bleiben. Wir müssen unsere Kontrolle über die Region und den Rio de la Plata sichern."
 CHL_hispanic_pan_nationalism:0 "Hispanischer Pannationalismus"
 CHL_hispanic_pan_nationalism_desc:0 "Es ist klar, dass wir die wahre Nation Spanisch-Südamerikas sind. Mögen alle hispanischen Völker vereint sein und gemeinsam triumphieren."
 CHL_reform_the_army_desc:0 "Der Schatten des Krieges liegt erneut über der Welt – wir müssen uns bereit machen und unser völlig veraltetes Militär modernisieren. "
 CHL_reform_the_army:0 "Bewaffnet die Fuerzas neu"
 CHL_andean_warfare:0 "Andenkrieg"
 CHL_andean_warfare_desc:0 "Chile liegt fast vollständig auf einem Gebirgszug. Wir müssen unsere Armee auf Konflikte in diesem Gebiet spezialisieren, nicht nur für Verteidigungsoperationen, sondern auch für Angriffsoperationen, denn Chile ist in dieser geografischen Lage nicht das einzige Land auf dem Kontinent."
 CHL_mobility_focus:0 "Mobilitätsfokus"
 CHL_mobility_focus_desc:0 "Die Zukunft der Kriegsführung liegt in der Mobilität. Panzer bedeuten einen grundlegenden Wandel in der Kriegsführung, und wir müssen uns entsprechend anpassen, sonst werden wir vom Lauf der Geschichte mitgerissen. Chile wird an der Spitze der Kriegsführung der dritten Generation stehen und in Amerika eine Vorreiterrolle einnehmen."
 CHL_infantry_focus:0 "Infanterie-Fokus"
 CHL_infantry_focus_desc:0 "Panzer mögen ein interessantes Experiment sein, aber Chile verfügt nicht über die nötige Industrie, um solche phantasievollen Eskapaden zu unternehmen. Wir sollten uns auf bewährte Methoden der Kriegsführung verlassen: Infanterie und Artillerie."
 CHL_restore_the_navy:0 "Erweitern Sie die Armada"
 CHL_restore_the_navy_desc:0 "Chile verfügte einst über die mächtigste Flotte im Pazifik und übertraf sogar die Vereinigten Staaten. Was war, kann wieder sein; wir werden die Wellen unseres Ozeans beherrschen."
 CHL_naval_aviation_focus:0 "Marineflieger"
 CHL_naval_aviation_focus_desc:0 "Flugzeuge haben in den letzten zehn Jahren unglaubliche Fortschritte gemacht. Die traditionelle Seekriegsführung wird mit ihrer Einführung hoffnungslos veraltet sein, denn große Schlachtschiffe werden hilflos sinken, ohne jemals einen einzigen Schuss auf sie abgefeuert zu haben."
 CHL_surface_fleet_focus:0 "Oberflächenflotte"
 CHL_surface_fleet_focus_desc:0 "Die bewährten Methoden der Seekriegsführung werden uns bestens passen. Es gibt kein Hindernis, das dem Salvenfeuer eines Schlachtschiffs standhalten kann."
 CHL_destroyer_focus:0 "Zerstörerfokus"
 CHL_destroyer_focus_desc:0 "Zerstörer bilden das Fundament unserer Flotte, denn ohne sie ist ein Großkampfschiff ungeschützt und verwundbar. Wir sollten in neue Zerstörermodelle investieren, um ihre Leistungsfähigkeit zu gewährleisten."
 CHL_cruiser_focus:0 "Cruiser Focus"
 CHL_cruiser_focus_desc:0 "Die zunehmende Marinefliegerei erfordert eine verstärkte Luftunterstützung für unsere Flotten. Leichte Kreuzer sind hierfür die idealen Schiffe und dienen gleichzeitig als wirksamer Schutz für unsere größeren Schiffe."
 CHL_naval_bomber_focus:0 "Neue Torpedobomber-Designs"
 CHL_naval_bomber_focus_desc:0 "Moderne Flugzeugträger sind zwar schön und gut, aber ohne moderne Flugzeuge sind sie nutzlos. Wir müssen unsere Torpedobomber modernisieren, um sicherzustellen, dass sie effektiv und mit verheerender Wirkung zuschlagen können."
 CHL_expand_talcahuano:0 "Erweiterung der Talcahuano-Werft"
 CHL_expand_talcahuano_desc:0 "Unsere größte Werft befindet sich in Talcahuano, reicht aber für unseren Bedarf nicht aus. Wir müssen unsere Flottenkapazitäten erweitern, um größere Schiffe bauen zu können."
 CHL_expand_magallanes_valparasio:0 "Erweitern Sie Magallanes und Valparaiso"
 CHL_expand_magallanes_valparasio_desc:0 "Auch unsere Nebenwerften in Magallanes und Valparaiso müssen erweitert werden, um eine größere Schiffbaukapazität zu ermöglichen. Hier sollen unsere Siebe gebaut werden."
 CHL_expand_our_arsenal:0 "Erweitern Sie unser Arsenal"
 CHL_expand_our_arsenal_desc:0 "Die chilenische Armee ist professionell und unbezwingbar. Sie ist jedoch nicht ganz so groß, wie wir es uns wünschen. Wir müssen das nationale Arsenal erweitern, um eine größere Streitmacht zu ermöglichen."
 CHL_invest_further_in_electronics:0 "Investieren Sie weiter in Elektronik"
 CHL_invest_further_in_electronics_desc:0 "ENDESA hat sich als äußerst lohnende Investition erwiesen. Wir sollten weiter in die Elektronik investieren und sehen, was daraus wird. Zweifellos wird es sich auf jeden Fall lohnen."
 CHL_nuclear_focus:0 "Spaltung des Atoms"
 CHL_nuclear_focus_desc:0 "Unsere Wissenschaftler berichten von unermesslicher Kraft, die sogar in Atomen gefangen ist. Das klingt zwar ziemlich fantastisch, lohnt sich aber trotzdem, der Sache auf den Grund zu gehen, denn wenn es wahr ist, sind die möglichen Vorteile unermesslich."
 CHL_famae:0 "Investieren Sie in FAMAE"
 CHL_famae_desc:0 "Fabricas y Maestranzas del Ejercito ist der älteste Waffenhersteller Lateinamerikas. Wir sollten in dieses renommierte Unternehmen investieren und neue Waffen entwickeln, die die unserer Konkurrenten übertreffen."
 CHL_universities:0 "Investieren Sie in die Universitäten"
 CHL_universities_desc:0 "Lassen Sie uns zwei neue Universitäten gründen: Bio Bio und Playa Ancha. Um wettbewerbsfähig zu bleiben, muss Chile sowohl im zivilen als auch im militärischen Bereich eine führende Rolle in der Wissenschaft spielen. Diese Institutionen werden uns dies ermöglichen."
 CHL_military_research_institute:0 "Gründung der ICIA"
 CHL_military_research_institute_desc:0 "Unser Militär ist gewachsen und mit ihm unsere Erfahrung. Jetzt ist es an der Zeit, ein militärisches Forschungsinstitut zu gründen. Es soll Institución Chilena de Investigación Avanzada heißen: das chilenische Institut für fortgeschrittene Forschung."
 CHL_mechanized:0 "Mechanisierte Anstrengung"
 CHL_mechanized_desc:0 "Panzer können nicht allein operieren – sie benötigen Aufklärungs- und Unterstützungseinheiten zu ihrem Schutz. Motorisierte Einheiten sind jedoch mangelhaft, daher sollten wir neue Fahrzeuge ausstatten, die die Stärken von Panzerung und Geschütztürmen mit der Vielseitigkeit von Infanterie kombinieren."
 CHL_armour_effort:0 "Rüstungsaufwand"
 CHL_armour_effort_desc:0 "Panzer sind der Hammer unserer mobilen Armee. Es ist zwingend erforderlich, dass wir neue Modelle entwickeln, um unsere Gegner zu übertrumpfen und ihre Waffen gegen unsere Panzerung wirkungslos zu machen."
 CHL_armour_more:0 "Erweiterte Panzerungsmodelle"
 CHL_armour_more_desc:0 "Unsere neuen Universitäten haben eine Fülle von Innovationen hervorgebracht. Wir sollten davon profitieren und die modernsten Panzer der Welt entwickeln!"
 CHL_doctrine:0 "Lehrmäßige Weiterentwicklung"
 CHL_doctrine_desc:0 "Unsere neue Armee ist makellos und gut ausgerüstet. Es ist an der Zeit, unsere Taktik im Lichte dieser neuen Ausrüstung zu überdenken und neue Manöver zu entwickeln, um die Vorteile dieser neuen Ausrüstung voll auszuschöpfen."
 CHL_artillery:0 "Artillerieeinsatz"
 CHL_artillery_desc:0 "Unsere Strategie besteht darin, den Feind so lange wie möglich zu bombardieren, bis er sich ergibt. Daher ist es nur natürlich, dass wir neue Artilleriemodelle entwickeln, um unsere Gegner präziser und verheerender zu bombardieren."
 CHL_support:0 "Unterstützungsaufwand"
 CHL_support_desc:0 "Infanterie allein ist wirkungslos. Sie benötigt nicht nur Munition, sondern auch logistische, Aufklärungs- und Spezialunterstützung. Wir dürfen nicht zulassen, dass diese Teile unserer Armee ins Hintertreffen geraten."
 CHL_rockets:0 "Raketentechnik"
 CHL_rockets_desc:0 "Unsere Forscher haben uns einen interessanten Vorschlag unterbreitet: Raketen. Sie sagen, die Zukunft der Artillerie liege in ihrer Nutzung. Wir sind sicherlich nicht der Typ, der eine noch effektivere Möglichkeit, unsere Feinde zu bombardieren, ausschlägt. Wir sollten diese Raketen untersuchen und prüfen, ob sie sich lohnen."
 CHL_naval_doctrine:0 "Weiterentwicklung der Marinedoktrin"
 CHL_naval_doctrine_desc:0 "Unsere neuen Schiffe erfordern neue Taktiken. Wir sollten mit ihnen üben und neue Möglichkeiten entdecken, die wir zu unserem Vorteil nutzen können."
 CHL_marines_focus:0 "Chilenische Marineinfanterie"
 CHL_marines_focus_desc:0 "Unsere neue Flotte beherrscht die Meere um uns herum. Es ist nur sinnvoll, diese Vorteile zu nutzen und Marines einzusetzen, um die Küsten unserer Feinde zu erobern. Unsere bestehenden Spezialeinheiten sollten für diese Operationen erweitert werden."
 CHL_nationalise_all:0 "Verstaatlichung der gesamten Industrie"
 CHL_nationalise_all_desc:0 "Zu lange schon hat sich die Bourgeoisie an der Arbeit des einfachen Mannes bereichert. Wir werden träge Aufseher und tyrannische Zuchtmeister nicht länger dulden. Es ist an der Zeit, die gesamte chilenische Industrie den Arbeitern und dem Volk zu überlassen. Es wird keine Arbeitsverschwendung mehr für Frivolitäten geben."
 CHL_comintern:0 "Treten Sie der Komintern bei"
 CHL_comintern_desc:0 "Chile muss sich den Kommunisten überall auf der Welt in der globalen Revolution anschließen."
 CHL_internationalism:0 "Verbreite die Revolution"
 CHL_internationalism_desc:0 "Wir müssen die Revolution auf unsere Nachbarstaaten und dann auf die ganze Welt ausweiten! Bald werden sich alle unter einer Union der Menschen zusammenschließen."
 CHL_communist_argentina_influence:0 "Einfluss Argentinien"
 CHL_communist_argentina_influence_desc:0 "Argentinien ist der Staat, der uns am nächsten steht. Wir müssen die Revolution zuerst dorthin bringen. Die argentinischen Arbeiter werden bald Befreiung und wahre Freiheit erfahren."
 CHL_communist_faction:0 "Gründete die Kommunistische Lateinische Union"
 CHL_communist_faction_desc:0 "Die Komintern verhöhnt den wahren Kommunismus – sie sind nicht einmal Sozialisten. Stalin ist nichts weiter als ein despotischer Zar, der durch Angst regiert. Wir sollten unsere eigene Fraktion wahrhaft kommunistischer Staaten gründen und unsere eigene Revolution propagieren."
 CHL_communist_brazil_influence:0 "Einfluss Brasilien"
 CHL_communist_brazil_influence_desc:0 "Brasilien ist der größte Staat Südamerikas. Wenn wir die Brasilianer davon überzeugen können, sich der Revolution anzuschließen, wird der Rest des Kontinents schnell folgen."
 CHL_growing_communist_faction:0 "Verbreiten Sie die Revolution an unsere Nachbarn"
 CHL_growing_communist_faction_desc:0 "Unsere Nachbarn werden von der Bourgeoisie unterdrückt – wir sollten sie befreien, so wie wir es selbst getan haben."
 CHL_communist_argentina_war:0 "Befreie die Argentinier"
 CHL_communist_argentina_war_desc:0 "Die argentinischen Arbeiter schreien nach Freiheit. Wir müssen sie von den Fesseln der kapitalistischen Unterdrückung befreien."
 CHL_communist_bolivia_paraguay_war:0 "Verbreite die Revolution im Norden"
 CHL_communist_bolivia_paraguay_war_desc:0 "Paraguay ist nicht wirklich kommunistisch, denn seine Regierung ist nicht besser als die eines faschistischen Diktators. Wir müssen die Bolivianer und Paraguayer befreien, indem wir sie in unsere Gemeinschaft aufnehmen."
 CHL_communist_brazil_war:0 "Bringen Sie die Revolution nach Brasilien"
 CHL_communist_brazil_war_desc:0 "Brasilien ist der größte Staat Südamerikas. Wir müssen das brasilianische Volk befreien und die Hegemonie in Südamerika erringen. Von nun an wird sich der Rest des Kontinents uns schnell anschließen."
 CHL_preemptive_measures:0 "Präventivmaßnahmen"
 CHL_preemptive_measures_desc:0 "Wir müssen uns auf die unglückliche Unvermeidlichkeit eines Krieges vorbereiten. Peru ist die unmittelbarste Bedrohung, aber wir sollten uns auf alle Eventualitäten vorbereiten."
 CHL_join_allies:0 "Schließen Sie sich den Verbündeten an"
 CHL_join_allies_desc:0 "Allein Chile ist externen Mächten ausgesetzt, die größer sind als es selbst. Wir müssen Verbündete finden, die uns bei der Verteidigung gegen diejenigen helfen, die unsere Demokratie zerstören wollen, und wir müssen im Gegenzug dafür sorgen, dass die Freiheit überall geschützt wird."
 CHL_trade_deals:0 "Handelsabkommen"
 CHL_trade_deals_desc:0 "Chile ist zu eng mit Deutschland und anderen faschistischen Gruppierungen verbunden, um Wohlstand zu erreichen. Wir sollten neue Handelsmöglichkeiten mit den anderen Demokratien der Welt nutzen."
 CHL_expand_private_sector:0 "Ausbau des privaten Sektors"
 CHL_expand_private_sector_desc:0 "Ein viel zu großer Teil der chilenischen Wirtschaft befindet sich in staatlicher Hand. Wir sollten die staatliche Beteiligung reduzieren, um Wettbewerb und Effizienz zu steigern. Davon profitieren sowohl die Bevölkerung als auch die Wirtschaft."
 CHL_communist_militias:0 "Milizen in die Armee integrieren"
 CHL_communist_militias_desc:0 "Das Proletariat sehnt sich danach, uns bei der Verbreitung der Revolution zu unterstützen, und wer sind wir, ihm dies zu verweigern? Lasst uns diese Milizen in unsere Armee integrieren."
 CHL_crackdown:0 "Hartes Vorgehen gegen Dissidenten"
 CHL_crackdown_desc:0 "Die radikale Linke und die radikale Rechte wüten in unserem Land schon viel zu lange. Die Regierung kann auf ihre Putschversuche und Gewaltausbrüche nicht länger einfach reagieren. Wir müssen die politische Bedrohung, die sie für unser Land darstellen, erkennen und beseitigen."
 CHL_ties_with_argentina:0 "Beziehungen zu Argentinien pflegen"
 CHL_ties_with_argentina_desc:0 "Auch wenn unser Verhältnis zu Argentinien nicht immer optimal war, sind wir letztlich Brüder. Wir sollten unsere Freundschaft mit den Argentiniern stärken, um den Frieden in der Region zu sichern."
 CHL_central_bank:0 "Erweiterung der Zentralbank"
 CHL_central_bank_desc:0 "Alessandri hat unsere Zentralbank gegründet, aber das reicht in diesen schwierigen Zeiten nicht aus. Wir müssen die finanzielle Stabilität unseres Landes sicherstellen."
 CHL_patriotic_leagues:0 "Wiederherstellung der Patriotischen Ligen"
 CHL_patriotic_leagues_desc:0 "Die Patriotischen Ligen waren eine paramilitärische Organisation, die dafür sorgte, dass der nationalistische Geist Chiles nie erstickt wurde. Sie lösten sich jedoch vor etwa zehn Jahren auf. Wir sollten diese ehrenwerte Organisation wieder aufbauen und fördern."
 CHL_ban_communism:0 "Verbot des Kommunismus"
 CHL_ban_communism_desc:0 "Die kommunistische Bedrohung ist schon zu lange ungebrochen. Wir müssen diesen Kult verbieten und seine Präsenz vollständig beseitigen, wenn wir vor seinen Machenschaften sicher sein wollen."
 CHL_preemptive_strike:0 "Präventivschlag"
 CHL_preemptive_strike_desc:0 "Wir müssen einen Präventivschlag gegen die peruanischen Faschisten durchführen. Dieser Diktator bedroht den Frieden in Südamerika. Wenn wir jetzt nicht handeln, könnten sie mit noch größerer Gewalt gegen uns vorgehen."
 CHL_argentine_alliance:0 "Bündnis mit den Argentiniern"
 CHL_argentine_alliance_desc:0 "Wir sollten ein Bündnis mit den Argentiniern formalisieren, um den Schutz unserer beiden Nationen zu gewährleisten. Gemeinsam sind wir eine Macht, die auf dem Kontinent ihresgleichen sucht."
 CHL_expand_alliance:0 "Erweitern Sie die Allianz"
 CHL_expand_alliance_desc:0 "Wir sollten unser Bündnis auf unsere Nachbarn ausweiten, um uns selbst zu stärken und sie vor kriegstreiberischen Nachbarn zu schützen. Uruguay ist im Atlantikraum von strategischer Bedeutung, kann sich aber nicht selbst verteidigen. Wir sollten ihm anbieten, sich uns anzuschließen."
 CHL_paraguayan_threat:0 "Die paraguayische Bedrohung"
 CHL_paraguayan_threat_desc:0 "Paraguay darf nicht an unserer Grenze bleiben. Sie schlagen ein kommunistisches Regime vor, das das empfindliche Gleichgewicht Südamerikas bedroht. Wenn wir nicht bald handeln, könnten sie zunächst Agenten gegen uns schicken."
 CHL_establish_the_airforce:0 "Investieren Sie in Linea Aerea Nacional"
 CHL_establish_the_airforce_desc:0 "Die Linea Aerea Nacional wurde 1932 unter Carlos Ibáñez del Campo gegründet, verfügt aber bislang nur über eine kleine Flotte. Der Himmel wird sich als notwendiges Schlachtfeld erweisen, und Flugzeuge sind daher eine notwendige Investition. Unser militärisch-industrieller Komplex kann keine riesige Luftwaffe aufbauen, daher sollten wir uns darauf konzentrieren, das, was wir haben, optimal zu nutzen."
 CHL_bomber_focus:0 "Bomberfokus"
 CHL_bomber_focus_desc:0 "Wir sollten unsere Bemühungen in der Luftfahrt auf Bomber konzentrieren, da diese vielseitig einsetzbar sind und über eine hohe Nutzlast verfügen."
 CHL_cas_focus:0 "Support-Fokus"
 CHL_cas_focus_desc:0 "Die Luftfahrt spielt eine sekundäre Unterstützungsrolle für die Armee. Wir sollten Flugzeuge entwickeln, die sich für diese Rolle auszeichnen."
 CHL_air_doctrine:0 "Lehrbemühungen"
 CHL_air_doctrine_desc:0 "Unsere neuen Designs erfordern neue Taktiken. Lassen Sie uns mit unseren neuen Flugzeugen experimentieren und neue Methoden für ihren optimalen Einsatz entwickeln."
 CHL_heavy_bomber_focus:0 "Strategische Bomber"
 CHL_heavy_bomber_focus_desc:0 "Es sollte in die Entwicklung neuer schwerer Langstreckenbomber investiert werden – wir werden unsere Gegner aus der Luft in die Knie zwingen."
 CHL_bomber_focus_2:0 "Taktische Bomber"
 CHL_bomber_focus_2_desc:0 "Taktische Bomber erfüllen alle möglichen Aufgaben. Chile verfügt nicht über die nötige Industrie, um eine riesige Luftwaffe ausreichend zu unterhalten. Daher müssen wir unsere Flugzeuge effizient einsetzen: Taktische Bomber sind hierfür ideal."
 CHL_heavy_fighter_focus:0 "Schwere Jäger"
 CHL_heavy_fighter_focus_desc:0 "Feindliche Bomber überfallen Chile wie ein Wespenschwarm. Schwere Kampfflugzeuge eignen sich ideal, um sie auszurotten und die Lufthoheit in den entlegensten und abgelegensten Gebieten Südamerikas aufrechtzuerhalten."
 CHL_fighter:0 "Kämpfer"
 CHL_fighter_desc:0 "Kampfflugzeuge bilden die Grundlage jeder Luftwaffe und dürfen nicht vernachlässigt werden. Es ist daher nur vernünftig, neue Modelle zu entwickeln, um unsere Gegner zu überflügeln."
 CHL_jet_focus:0 "Jet Effort"
 CHL_jet_focus_desc:0 "Die Universitäten berichten von neuen Triebwerken: Düsentriebwerken. Sie behaupten, diese Triebwerke würden eine neue Flugzeuggeneration ermöglichen, die weitaus leistungsstärker sei als alle bisherigen. Das klingt nach kühnen Behauptungen, doch die Aussicht ist zu verlockend, um sie zu ignorieren."
 CHL_paratroopers:0 "Fallschirmjäger"
 CHL_paratroopers_desc:0 "Wir sollten die Vorteile unserer neu geschaffenen Luftwaffe nutzen und die Fallschirmjäger in vollem Umfang einsetzen."
 CHL_naval_fighter_focus:0 "Fokus auf Marinejäger"
 CHL_naval_fighter_focus_desc:0 "Ein Flugzeugträger ist ohne Startflugzeuge nutzlos, und Bomber allein sind verwundbar. Wir müssen neue Trägerjäger entwickeln, um unsere Träger und Torpedobomber vor feindlichen Flugzeugen zu schützen."
 CHL_northern_expansion:0 "Nördliche Expansion"
 CHL_northern_expansion_desc:0 "Wir müssen unsere nördlichen Grenzen sichern. Brasilien stellt eine Bedrohung für unsere Hegemonie dar und wir müssen dafür sorgen, dass zwischen uns und Brasilien eine Pufferzone besteht."
 CHL_expel_america:0 "Vertreibe Amerika"
 CHL_expel_america_desc:0 "Südamerika ist frei von der amerikanischen Bedrohung. Mit der sich über den gesamten Kontinent ausbreitenden Revolution spielen sie keine Rolle mehr."
 CHL_spread_revolution_idea:0 "Verbreite die Revolution"
 CHL_spread_revolution_idea_desc:0 "Wir müssen unsere Bemühungen verstärken, die Revolution im Ausland zu verbreiten!"
 CHL_soviet_ties:0 "Appell an die Sowjetunion"
 CHL_soviet_ties_desc:0 "Unser Regime ist noch jung und unerfahren. Wir sollten die Sowjets um Hilfe bitten, denn sie scheinen die am besten etablierten Kommunisten zu sein."
 CHL_german_ties:0 "Berater aus Deutschland anfordern"
 CHL_german_ties_desc:0 "Die deutsche Armee ist unserer eigenen Armee weit voraus, und wir könnten viel von ihr lernen. Da wir ideologisch auf einer Linie liegen, sollten wir sie um Unterstützung bitten."
 CHL_japan_accord:0 "Abkommen mit Japan"
 CHL_japan_accord_desc:0 "Chile ist seit langem eine bedeutende Seemacht im Pazifik. Die Japaner haben sich in letzter Zeit zu einer mächtigen Macht in der Region entwickelt. Wir sollten ein Abkommen zwischen unseren Nationen vorschlagen, um künftige Konflikte zu verhindern: Chile soll den West- und Nordpazifik kontrollieren, während wir den Süd- und Südostpazifik kontrollieren."
 CHL_fascist_constitution:0 "Neufassung der Verfassung"
 CHL_fascist_constitution_desc:0 "Die aktuelle Verfassung ist veraltet und schwach. Sie ist für Kommunisten und Kapitalisten gleichermaßen anfällig. Wir sollten ein neues Dokument entwerfen, das standhafter ist und den chilenischen Idealen entspricht."
 CHL_the_leader:0 "El Jefe"
 CHL_the_leader_desc:0 "Die Macht des Führers muss absolut sein, um den Kurs der Nation unbeugsam zu gestalten. Mit einer neuen Verfassung können wir die Macht des EL Jefe formell festigen. Die Demokratie ist schwach und anfällig für Subversion, doch mit dieser Verfassung wird unsere Autorität unanfechtbar sein und uns vor subversiven Elementen schützen."
 CHL_extirpation:0 "Unerwünschte Personen ausmerzen"
 CHL_extirpation_desc:0 "Chile wird seit Langem von zweifelhaften Gestalten heimgesucht. Das chilenische Volk ist von höchstem Charakter und bester Verfassung. Wir müssen diejenigen, die unsere Erwartungen nicht erfüllen, entfernen und ihre Ressourcen für die moralische und physische Gesundheit der Nation einsetzen."
 CHL_communist_conquest:0 "Befreie Südamerika"
 CHL_communist_conquest_desc:0 "Die anderen Regime in Südamerika sind unterdrückerisch und kapitalistisch – für sie gibt es keine Hoffnung. Wir müssen unsere Nachbarn mit Nachdruck von ihren Fesseln befreien und ein neues Zeitalter des Überflusses einläuten."
 CHL_anti_americanism:0 "Antiamerikanismus"
 CHL_anti_americanism_desc:0 "Amerika ist dekadent und korrupt. Der amerikanische Einfluss in Chile ist, gelinde gesagt, abscheulich. Wir müssen die törichten und schwachen Ideen, die Amerika verbreitet, ausmerzen, sonst könnten auch wir ihrer Dekadenz verfallen."
 CHL_japan_faction:0 "Ein Bündnis mit Japan"
 CHL_japan_faction_desc:0 "Nachdem wir uns darauf geeinigt haben, den Pazifik mit Japan zu teilen, sollten wir ein Bündnis formalisieren, um ihn zwischen uns zu sichern. Amerika wird dorthin zurückgedrängt, wo es hingehört, und wir werden diesen Ozean wieder beherrschen."
 CHL_axis:0 "Komm nach Deutschland"
 CHL_axis_desc:0 "Deutschland bekämpft unsere gemeinsamen Feinde: den Amerikanismus und den Kommunismus. Wir sollten darum bitten, uns ihnen in ihrem Kampf formell anzuschließen, um unsere beiderseitigen Erfolgschancen zu verbessern."
 CHL_ban_capitalism:0 "Den Kapitalismus ausrotten"
 CHL_ban_capitalism_desc:0 "Selbst unter unserer Herrschaft gibt es noch immer kapitalistische Aufständische, die Tauschhandel betreiben. Wir müssen sie ein für alle Mal ausrotten, um sicherzustellen, dass alles in unsere Zuständigkeit fällt, denn das Kollektiv ist stärker als das Individuum."
 CHL_support_peronism:0 "Unterstützen Sie den Peronismus in Argentinien"
 CHL_support_peronism_desc:0 "In Argentinien entsteht eine populistische Graswurzelbewegung, die uns nahe stehen könnte. Auch wenn Perón unsere Ansichten über die semitische Gemeinschaft und den Charakter unseres Volkes nicht teilt, ist er dennoch ein Populist und Nationalist."
 CHL_support_argentinian_coup:0 "Unterstützen Sie einen Putsch in Argentinien"
 CHL_support_argentinian_coup_desc:0 "Die Peronisten genießen in Argentinien breite Unterstützung in der Bevölkerung, doch die Regierung wird sie nicht an die Macht kommen lassen. Wir sollten einen Putsch in Argentinien unterstützen, um ihre Herrschaft zu sichern."
 CHL_fascist_faction:0 "Bündnis mit den Peronisten"
 CHL_fascist_faction_desc:0 "Da wir ihnen bei ihrem Aufstieg zur Macht geholfen haben, sind wir bereits eng mit den Peronisten verbunden. Wir sollten ein Bündnis mit ihnen formalisieren, um unsere Sicherheit auf dem Kontinent zu gewährleisten."
 CHL_arg_northern_expansion:0 "Gemeinsam nach Norden vorstoßen"
 CHL_arg_northern_expansion_desc:0 "Sowohl Argentinien als auch Chile werden von Brasilien und den anderen Nordmächten bedroht. Wir sollten gemeinsam nach Norden marschieren, um unsere gemeinsame Sicherheit zu gewährleisten."
 CHL_give_arg_urg:0 "Argentinische Kontrolle über Rio de la Plata"
 CHL_give_arg_urg_desc:0 "Argentinien kontrolliert den Südatlantik, und der Rio de la Plata ist ein wesentlicher Bestandteil dieser Kontrolle. Derzeit teilt sich Argentinien den Fluss mit Uruguay, aber das sollten wir ändern."
 CHL_shared_hegemony:0 "Geteilte Hegemonie"
 CHL_shared_hegemony_desc:0 "Gemeinsam mit Argentinien teilen wir die Hegemonie über Spanisch-Südamerika. Unsere Nationen sind durch die gegenseitige Stärkung stark geworden und werden dies auch weiterhin tun."
 CHL_expand_alliance_bol:0 "Rückkehr von Tarapaca nach Bolivien"
 CHL_expand_alliance_bol_desc:0 "Wir eroberten Tarapaca nach dem Salpeterkrieg 1904 im Rahmen des Friedens- und Freundschaftsvertrags von Bolivien. Leider führte dieser nicht zu einer so großen Freundschaft. Vielleicht sollten wir ihnen dieses Land im Austausch für ein dauerhaftes Bündnis und echten Frieden in der Region zurückgeben."
 CHL_expand_alliance_pru:0 "Rückkehr von Arica nach Peru"
 CHL_expand_alliance_pru_desc:0 "Arica gehörte bis 1883 zur peruanischen Provinz Tarapaca, bevor wir es nach dem Salpeterkrieg eroberten. Seitdem haben wir Tacna 1929 auf Geheiß Amerikas zurückgegeben, um den Frieden zu wahren, Arica jedoch nicht. Diese Lösungen waren nur vorübergehend, und der einzige Weg, den Frieden zu sichern, besteht darin, das zurückzugeben, was uns nicht gehört."
 trade_deal_relations:0 "Handelsabkommen"
 chile_argentina_relations_1:0 "Verbesserte Beziehungen zu Chile"
 chile_argentina_relations_2:0 "Bündnis mit Chile"
 argentina_chile_relations_1:0 "Verbesserte Beziehungen zu Argentinien"
 argentina_chile_relations_2:0 "Bündnis mit Argentinien"
 chile_relations_bonus:0 "Chilenische diplomatische Bemühungen"
 CHL_revolution_spread:0 "Hilfe während der Revolution"
 CHL_advisors:0 "Gesendete Berater"
 CHL_pacific_accord:0 "Pazifisches Abkommen"
 CHL_pacific_accord_no:0 "Kompromisslosigkeit"
 CHL_anti_americanism:0 "Antiamerikanismus"
 CHL_supported_peronism:0 "Unterstützter Peronismus"
 CHL_endesa:0 "Investitionen in ENDESA haben unsere Elektronik weiterentwickelt"
 CHL_endesa2:0 "Weitere Investitionen in ENDESA haben unsere Elektronik weiterentwickelt"
 CHL_famae_bonus:0 "FAMAE hat neue Gewehrdesigns zur Bewertung für uns"
 CHL_doctrine_bonus:0 "Neue militärische Fortschritte haben zu doktrinären Entwicklungen geführt"
 CHL_andean_bonus:0 "Andenbergsteiger"
 CHL_corfo_tech:0 "CORFO hat Ideen zur Verbesserung der Industrie des Landes"
 CHL_depression1:0 "Die Große Depression"
 CHL_depression1_desc:0 "Die Weltwirtschaftskrise hatte erhebliche Auswirkungen auf die chilenische Wirtschaft."
 CHL_depression2:0 "Die Große Depression"
 CHL_depression2_desc:0 "Durch staatliche Investitionen konnten die Auswirkungen der Weltwirtschaftskrise zwar gemildert werden, sie sind jedoch immer noch schwerwiegend."
 CHL_depression3:0 "Die Große Depression"
 CHL_depression3_desc:0 "Chile hat sich von der Weltwirtschaftskrise weitgehend erholt, doch Arbeitslosigkeit und Armut sind noch immer weit verbreitet."
 CHL_agrarian_reform:0 "Verrückte Hacendados"
 CHL_agrarian_reform_desc:0 "Die Mad Hacendados, Landbesitzer, sind für die Bauern Chiles wie Tyrannen."
 CHL_land:0 "Agrarreform"
 CHL_land_desc:0 "Große Agrarreformen haben die Effizienz fast aller ländlichen Aktivitäten erheblich verbessert."
 CHL_corfo_tech:0 "Fortschritte in der Industrie dank CORFO"
 CHL_endesa:0 "ENDESA hat Fortschritte in der Elektronik erzielt"
 CHL_endesa2:0 "Weitere Investitionen in ENDESA haben weitere Ergebnisse gebracht"
 CHL_endesa3:0 "Weitere Investitionen in ENDESA haben weitere Ergebnisse gebracht"
 CHL_naval_doctrine_bonus:0 "Marine-Kriegsspiele haben zu neuen Ideen zur Verbesserung unserer Marinedoktrin geführt"
 CHL_mobile_doctrine:0 "Die chilenische Armee hat neue Ideen zur Weiterentwicklung der Doktrin"
 CHL_plane_bonus:0 "LAN hat neue Flugzeugdesigns zur Bewertung für uns"
 CHL_cas_bonus:0 "Neue Sturzkampfbomber-Designs wurden zur Bewertung entwickelt"
 CHL_heavy_fighter_bonus:0 "Es gab Innovationen im Bereich der zweimotorigen Kampfflugzeuge, die wir nutzen können"
 CHL_fighter_bonus:0 "Leichtflugzeugdesigns wurden entwickelt und stehen für uns bereit, um die Vorteile zu nutzen"
 CHL_air_doctine_bonus:0 "Neue Flugzeugdesigns haben neue Ideen für die Luftdoktrin eröffnet"
 CHL_paratrooper_bonus:0 "Für den Aufstieg chilenischer Fallschirmjäger wurde eine Luftlandeausrüstung entwickelt"
 CHL_air_doctrine_bonus:0 "Neue Entwicklungen bei Flugzeugen haben neue Ideen für unsere Luftfahrtdoktrinen inspiriert"
 CHL_bomber_bonus:0 "Neue Bomberdesigns wurden entwickelt"
 CHL_bomber_doctrine_bonus:0 "Fortschritte in der Bombertechnologie haben neue Ideen für ihren Einsatz inspiriert"
 CHL_heavy_bomber_bonus:0 "Neue schwere Bomberdesigns wurden zur Bewertung entworfen"
 CHL_mobile:0 "Motorisiert"
 CHL_armour_ahead:0 "Für die Analyse wurden fortschrittliche Panzerungsdesigns entwickelt"
