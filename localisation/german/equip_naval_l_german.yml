l_german:
 naval_equipment:0 "Schiffe"

 submarine_1:0 "U-Boot V"
 submarine_2:0 "U-Boot VI"
 submarine_3:0 "U-Boot VII"
 submarine_4:0 "U-Boot VIII"
 submarine_1_desc:0 "U-Boote sind getarnte Schiffe, die dazu konzipiert sind, ungeschützte Konvois auszuschalten. Die frühen Modelle aus dem Ersten Weltkrieg ebnen den Weg für neue Methoden der Seekriegsführung."
 submarine_2_desc:0 "Neue U-Boot-Designs sind besser bewaffnet und stabiler, um die Fortschritte in der Marinetaktik zu nutzen und eine größere Reichweite zu haben, sodass sie weit entfernte Konvoirouten angreifen können."
 submarine_3_desc:0 "Die Rolle des U-Boots in der Flotte außerhalb von Konvoiangriffen wird noch diskutiert. Der Schlüssel zum Erreichen des erforderlichen Modells wird darin bestehen, ein Gleichgewicht zwischen Geschwindigkeit, Reichweite und Waffen zu erreichen."
 submarine_4_desc:0 "Moderne U-Boote zeichnen sich durch eine größere Testtiefe und eine effiziente Auslegung aus. Dabei werden die Felderfahrungen genutzt, um die geeigneten Waffen und Motoren auszuwählen."

# HOI4 TGW

 destroyer_1:0 "Zerstörer VI"
 destroyer_2:0 "Zerstörer VII"
 destroyer_3:0 "Zerstörer VIII"
 destroyer_4:0 "Zerstörer IX"




 destroyer_1_desc:0 "Um die Sicherheit der Konvois zu gewährleisten, müssen die Zerstörer des Ersten Weltkriegs umgerüstet und weiterentwickelt werden. Die Bewaffnung der Schiffe mit mehr Torpedos wird mehr Möglichkeiten für den Einsatz eröffnen."
 destroyer_2_desc:0 "Eine größere Torpedoreichweite und schnellere Nachladegeschwindigkeiten sowie neue Waffentypen wie beispielsweise Luftabwehrtürme sorgen dafür, dass unsere Zerstörer effizient und vielseitig bleiben."
 destroyer_3_desc:0 "Um Bedrohungen von oben und unten besser begegnen zu können, müssen neue Zerstörer mit Radar und modernen Luftabwehr- und U-Boot-Abwehrwaffen ausgestattet werden."
 destroyer_4_desc:0 "Der moderne Zerstörer muss mit einer Vielzahl unterschiedlicher Erkennungstechnologien und neuen Wasserbombensystemen ausgestattet sein und in größerem Maßstab gebaut werden als seine Vorgänger."
 light_cruiser_1:0 "Leichter Kreuzer V"
 light_cruiser_2:0 "Leichter Kreuzer VI"
 light_cruiser_3:0 "Leichter Kreuzer VII"
 light_cruiser_4:0 "Leichter Kreuzer VIII"
 light_cruiser_1_desc:0 "Manövrierfähige leichte Kreuzer, die eine hohe Geschwindigkeit beibehalten können, werden für Aufklärungsmissionen weiterhin nützlich sein."
 light_cruiser_2_desc:0 "Nachkriegsverträge schränken die Nutzung von Kreuzern ein, doch können gut bewaffnete leichte Schiffe entwickelt werden, ohne dass diese Beschränkungen verletzt werden."
 light_cruiser_3_desc:0 "Unter Umgehung der vertraglichen Beschränkungen können nun größere und stärker gepanzerte Kreuzer gebaut werden, die dennoch über eine ausreichend leichte Bewaffnung verfügen, um als leichte Kreuzer eingestuft zu werden."
 light_cruiser_4_desc:0 "Taktisch zum Schutz größerer Schiffe eingesetzt, kann die moderne Generation leichter Kreuzer die meisten Beschränkungen der Vergangenheit abschütteln und ist besser gegen Luftangriffe gewappnet."
 heavy_cruiser_1:0 "Schwerer Kreuzer I"
 heavy_cruiser_2:0 "Schwerer Kreuzer II"
 heavy_cruiser_3:0 "Schwerer Kreuzer III"
 heavy_cruiser_4:0 "Schwerer Kreuzer IV"
 heavy_cruiser_1_desc:0 "Der Washingtoner Flottenvertrag sollte ein Wettrüsten unter anderem bei Kreuzern verhindern, doch dieses scheint unvermeidlich. Durch die Beibehaltung einer leichten Panzerung kann die Waffenlast erhöht werden."
 heavy_cruiser_2_desc:0 "Trotz neuer Bemühungen um Verträge ist die Umrüstung leichterer Kreuzer mit schwereren Waffen weiterhin effizient, auch wenn die Panzerung noch immer begrenzt ist."
 heavy_cruiser_3_desc:0 "Da Beschränkungen weltweit zunehmend ignoriert werden, können ausgewogenere Designs schwerer Kreuzer mit stärkerer Panzerung gebaut werden. Dank besserer Flugabwehrgeschütze können diese Schiffe im Seeluftkrieg eingesetzt werden."
 heavy_cruiser_4_desc:0 "In diesen letzten Phasen der Entwicklung schwerer Kreuzer sind maßstabsgetreuere, längere und schwerere Konstruktionen mit Schnellfeuerbewaffnung zu sehen."
 battle_cruiser_1:0 "Schlachtkreuzer V"
 battle_cruiser_2:0 "Schlachtkreuzer VI"
 battle_cruiser_3:0 "Schlachtkreuzer VII"
 battle_cruiser_4:0 "Schlachtkreuzer VIII"
 battle_cruiser_1_desc:0 "Das Nachkriegswettrüsten bei den Schlachtkreuzern führte zu mehreren schwer bewaffneten Entwürfen, bei denen im Vergleich zu Schlachtschiffen die Panzerung zugunsten der Geschwindigkeit geopfert wurde."
 battle_cruiser_2_desc:0 "Umgebaute und umgerüstete Schlachtkreuzer übertreffen weiterhin sogar moderne Schlachtschiffentwürfe, da sie weniger Panzerung aufweisen, aber über bessere Systeme zur Feuerkontrolle, Ortung und Luftabwehr verfügen."
 battleship_1:0 "Schlachtschiff I"
 battleship_2:0 "Schlachtschiff II"
 battleship_3:0 "Schlachtschiff III"
 battleship_4:0 "Schlachtschiff IV"

 battleship_1_desc:0 "Manche halten sie für ein Relikt aus einer vergangenen Ära der Seekriegsführung, andere für die beeindruckendsten Schiffe, die je gebaut wurden. Niemand kann leugnen, dass diese Überreste des Schlachtschiff-Wettrüstens zu den am schwersten bewaffneten und gepanzerten Schiffen gehören, die je gebaut wurden."
 battleship_2_desc:0 "Mit verbesserter Stabilität und Reichweite stellt eine neue Generation von Schlachtschiffen eine Verbesserung gegenüber früheren Konstruktionen dar, bleibt dabei aber innerhalb der durch Flottenverträge festgelegten Grenzen."
 battleship_3_desc:0 "Dickere Panzerung, stärkere Motoren, eine Batterie großkalibriger Geschütze und verbesserte Luftabwehrfähigkeiten können bei richtiger Anwendung dafür sorgen, dass Schlachtschiffe in einer Welt, in der die Seekriegsführung zunehmend von Luftunterstützung dominiert wird, weiterhin relevant bleiben."
 battleship_4_desc:0 "Während die Welt Zeuge der möglicherweise letzten großen Schlachtschiff-Konfrontationen wird, ist die Bedeutung schwerer Waffen und Flugabwehrtürme größer denn je."
 mtg_carrier_1:0 "Wasserflugzeug-Tender"
 mtg_carrier_1_desc:0 ""
 carrier_1:0 "Träger II"
 carrier_2:0 "Träger III"
 carrier_3:0 "Träger IV"
 carrier_4:0 "Träger V"
 carrier_5:0 "Träger VI"
 carrier_6:0 "Träger VII"
 carrier_1_desc:0 "Viele Militärtheoretiker glauben, dass die Marinefliegerei die Zukunft ist. Der Umbau alter Großkampfschiffe und Ozeandampfer zu Flugzeugträgern ist der erste Schritt zur Umsetzung dieser neuen Doktrinen."
 carrier_2_desc:0 "Wenn die Arbeiten an den ersten Trägerentwürfen auf Kiel beginnen, müssen wir sicherstellen, dass diese Schiffe über die nötige Reichweite und Geschwindigkeit verfügen, um mit dem Rest unserer Marine mithalten zu können, und gleichzeitig die Flottenverträge der Nachkriegszeit einhalten."
 carrier_3_desc:0 "Verbesserte Konstruktionsmethoden und speziellere Systeme wie Deckkantenaufzüge ermöglichen diesen Fluggesellschaften einen effizienteren Transport von mehr Flugzeugen."
 carrier_4_desc:0 "Da viele Flottenverträge zunehmend ignoriert werden, können wir mit dem Bau von Flugzeugträgern fortfahren, die mehr Flugzeuge als je zuvor transportieren können, um die Luftüberlegenheit zu sichern."
 SH_battleship_1:0 "Superschweres Schlachtschiff I"
 SH_battleship_2:0 "Superschweres Schlachtschiff II"
 SH_battleship_1_desc:0 "Die aktuelle Lage der Welt lässt keinen Raum mehr für die Einhaltung von Seeverträgen. Ohne diese Einschränkungen können wir uns voll und ganz auf die Entwicklung der schwersten und am besten bewaffneten Schlachtschiffe aller Zeiten konzentrieren, die in der Lage sind, mehrere kleinere Schiffe zu bekämpfen."
 SH_battleship_2_desc:0 "Eine Verbesserung unseres früheren superschweren Designs mit stärkeren Waffen und verbesserten Feuerleitsystemen."
### ENG - ENGLAND ###
 ENG_submarine_1:0 "L-50-Klasse"
 ENG_submarine_1_desc:0 "Die L-Klasse bestand aus mittelgroßen Booten, die ursprünglich im Rahmen des Emergency War Program als verbesserte Version der vorherigen U-Boot-Klassen geplant waren. Sie wurden in der Spätphase des Ersten Weltkriegs gebaut und mit neuen, größeren 21-Zoll-Torpedos ausgestattet. Sie dienten bis zum Beginn des Zweiten Weltkriegs und wurden dann hauptsächlich für sekundäre und Ausbildungszwecke eingesetzt."
 #ENG_submarine_1b: "O/P/R Class"
 #ENG_submarine_1c: "S Class"
 ENG_submarine_2:0 "T-Klasse"
 ENG_submarine_2_desc:0 "Die Boote der To-Klasse bzw. Triton-Klasse wurden als Ersatz für die großen U-Boote der O-, P- und R-Klasse entwickelt. Es handelte sich um mittelgroße U-Boote mit großer Reichweite, die sich gut für den Atlantik und den Pazifik eigneten. Diese Boote waren gut bewaffnete, stabile Plattformen und wurden während des Konflikts häufig eingesetzt, da 25 Prozent der gebauten Boote im Krieg verloren gingen."
 ENG_submarine_3:0 "U-Klasse"
 ENG_submarine_3_desc:0 "Die U-Klasse bestand aus kleinen U-Booten, die im Rahmen der Kriegsnotstandsprogramme 1940 und 1941 gebaut wurden. Ursprünglich als Trainings-U-Boote konzipiert, wurde das Design bei Kriegsausbruch geändert, sodass sich diese U-Boote in den engen Gewässern der Nordsee und des Mittelmeers als nützlich erwiesen. Aufgrund ihrer geringeren Größe waren ihre Reichweite und ihre Bewaffnung begrenzt. Die Klasse bestand aus drei Unterklassen: Undine, Umpire und Uproar."
 #ENG_submarine_3b: "Seraph Class"
 ENG_submarine_4:0 "V-Klasse"
 ENG_submarine_4_desc:0 "Die U-Boote der V-Klasse oder Vampire-Klasse basierten auf den kleineren Booten der Vorgängerklasse U. Sie waren größer, aber immer noch relativ klein und verfügten über bessere Seetüchtigkeit, jedoch eine begrenzte Reichweite und Bewaffnung."
 #ENG_submarine_4b: "Amphion Class"
 ENG_destroyer_1:0 "A/B-Klasse"
 #ENG_destroyer_1_desc:0 "These destroyers included the Admirality and Thornycroft V and W classes. They were built under the War Emergency Program. They were the ultimate evolution of British destroyer design during the First World War, embodying the improvements of their predecessors as well as new technological advances. Large numbers of these ships were built during the late stages of WWI and became the backbone of the Royal Navy's destroyer flotillas afterwards. Beginning in the 1930s, they were placed into reserve fleets, used eventually relegated to convoy escort duties. They were adequately-armed, fast vessels with good range."
 #ENG_destroyer_1b: "A/B/C/D Class"
 ENG_destroyer_2:0 "G/H/I-Klasse"
 ENG_destroyer_2_desc:0 "Die Zerstörer der G-, H- und I-Klasse wurden im Rahmen der Marinebauprogramme 1933 und 1934 bestellt. Sie waren im Wesentlichen Wiederholungen der vorhergehenden F-Klasse, nur etwas kleiner. Die Bewaffnung der G- und H-Klassen war dieselbe wie die der F-Klasse, beide verwendeten 4,7-Zoll-Geschütze. Diese Schiffe hatten eine große Reichweite, waren ausreichend bewaffnet und verfügten über eine starke Torpedobewaffnung. Sie wurden während des Krieges ausgiebig eingesetzt und erlitten zahlreiche Verluste."
 #ENG_destroyer_2b: "Tribal Class"
 ENG_destroyer_3:0 "J/K/N-Klasse"
 ENG_destroyer_3_desc:0 "Die Klassen J, K und N ähnelten der früheren Tribal-Klasse, doch statt der Geschützbewaffnung setzten die Konstrukteure auf eine Standardbewaffnung mit schweren Torpedos und leichteren Geschützen. Die Schiffe wurden während ihres Kriegseinsatzes modifiziert. Zu den Upgrades gehörten verbesserte Flugabwehrgeschütze und Radar. Es handelte sich um schnelle, weitreichende und gut bewaffnete Schiffe, die sich ideal für Flottenbegleitschiffe eigneten."
 ENG_destroyer_4:0 "Kampfklasse"
 ENG_destroyer_4_desc:0 "Die Zerstörer der Battle-Klasse bauten auf der Weiterentwicklung britischer Zerstörer auf, die während des Krieges eingesetzt wurden. Die Schiffe wurden im Rahmen der Marineprogramme 1942 und 1943 bestellt. Sie waren sowohl mit Geschützen als auch mit Torpedos gut bewaffnet. Ihre Flugabwehr, ihre Fähigkeiten zur U-Boot-Abwehr, ihre Geschwindigkeit und ihre Reichweite machten sie zu vielseitigen Schiffen. Ihr später Einsatz im Krieg führte zu einem minimalen Beitrag."
 #ENG_destroyer_4b: "Weapon Class"
 ENG_light_cruiser_1:0 "Danae-Klasse"
 ENG_light_cruiser_1_desc:1 "Die Danae- oder D-Klasse war eine Klasse leichter Kreuzer, die Ende des Ersten Weltkriegs für die Royal Navy gebaut wurde und auch im Zweiten Weltkrieg im Einsatz war. Die Danaes basierten auf dem Design der vorhergehenden C-Klasse, wurden jedoch um 6 m verlängert, um Platz für ein sechstes 6-Zoll-Geschütz (152 mm) zwischen Brücke und Vorschornstein zu schaffen. Zusätzlich wurden die Zwillingstorpedorohre der C-Klasse durch Dreifachtorpedorohre ersetzt, sodass die Danaes insgesamt zwölf Rohre besaß und damit die schwerste Torpedobewaffnung für einen Kreuzer zu dieser Zeit darstellte. Maschinen und Aufbau entsprachen ansonsten denen der Ceres-Kreuzer der C-Klasse."
 #ENG_light_cruiser_1b: "Emerald Class"
 #ENG_light_cruiser_1c: "Leander Class"
 #ENG_light_cruiser_1d: "Arethusa Class"
 ENG_light_cruiser_2:0 "Stadtklasse, 1936"
 ENG_light_cruiser_2_desc:0 "Die Town-Klasse war eine aus zehn Schiffen bestehende Klasse leichter Kreuzer der Royal Navy. Die Towns wurden gemäß den Auflagen des Londoner Flottenabkommens von 1930 entworfen. Die Schiffe wurden in drei verschiedenen Unterklassen gebaut: der Southampton-, der Gloucester- und der Edinburgh-Klasse. Jede Unterklasse verfügte über zusätzliche Waffen."
 #ENG_light_cruiser_2b: "Edinburgh Class"
 #ENG_light_cruiser_2c: "Southampton Class"
 #ENG_light_cruiser_2d: "Gloucester Class"
 ENG_light_cruiser_3:0 "Kronkolonie-Klasse"
 ENG_light_cruiser_3_desc:0 "Die leichten Kreuzer der Crown-Colony-Klasse waren verbesserte Versionen der früheren Town-Klasse, jedoch mit vereinfachtem Design, um den Bau zu beschleunigen und Kosten zu senken. Die Schiffe trugen die gleiche Bewaffnung wie ihre Vorgänger, vier Drillingstürme mit 6-Zoll-Geschützen. Sie waren ähnlich gepanzert, hatten aber aufgrund ihrer kleineren Motoren eine etwas geringere Reichweite. Der Typ umfasste zwei Unterklassen: Fiji und Ceylon."
 #ENG_light_cruiser_3b: "Dido Class"
 ENG_light_cruiser_4:0 "Minotaurus-Klasse"
 ENG_light_cruiser_4_desc:0 "Diese Kreuzer, auch als Swiftsure-Klasse bekannt, wurden als modifizierte Version der Crown-Colony-Klasse konzipiert und enthielten 1941 genehmigte Kriegsmodifikationen. Sie verfügten über eine größere Reichweite und mehr Flugabwehrwaffen als die Crown-Colony-Klasse, während die Hauptbewaffnung auf drei Drillingstürme reduziert war. Da der Bau zu spät war, um den Kriegsausgang zu beeinflussen, wurden die meisten der bestellten Schiffe später storniert. "
 ENG_heavy_cruiser_1:0 "Hawkins-Klasse"
 ENG_heavy_cruiser_1_desc:0 "Die Kreuzer der Hawkins-Klasse waren die ersten schweren Kreuzer der Welt. Sie basierten auf den früheren leichten Kreuzern der Town-Klasse, insbesondere der Birmingham-Unterklasse, waren jedoch mit 7,5-Zoll-Geschützen und einem dickeren Panzergürtel ausgestattet. Sie wurden für den Kampf gegen die großen deutschen Konvoi-Angreifer entwickelt. Sie waren gut bewaffnet, verfügten über eine angemessene Geschwindigkeit und Reichweite und waren gut geschützt. Insgesamt wurden fünf Schiffe in Dienst gestellt, aber nur vier waren zu Beginn des Zweiten Weltkriegs im Einsatz."
 #ENG_heavy_cruiser_1b: "County Class"
 ENG_heavy_cruiser_2:0 "Surrey-Klasse"
 ENG_heavy_cruiser_2_desc:0 "Die Schweren Kreuzer der Surrey-Klasse wurden im Rahmen des Marineprogramms von 1928 vorgeschlagen. Sie waren verbesserte Versionen der früheren Schweren Kreuzer der York-Klasse. Wären sie fertiggestellt worden, wären sie mit vier 8-Zoll-Zwillingstürmen, schwererer Panzerung und stärkeren Motoren ausgestattet gewesen. Zwei Schiffe wurden bestellt, aber keines wurde auf Kiel gelegt."
 ENG_heavy_cruiser_3:0 "Admiral-Klasse"
 ENG_heavy_cruiser_3_desc:0 "Die Schweren Kreuzer der Admiral-Klasse (nicht zu verwechseln mit den Schlachtkreuzern der Admiral-Klasse) waren der letzte Versuch der Royal Navy, Kreuzer mit 8-Zoll-Geschützen zu konstruieren und zu bauen. Die Designstudien begannen 1938 und endeten 1941. Sie führten zu verschiedenen Entwürfen. Die endgültigen Entwürfe beinhalteten neue 8-Zoll-Geschütze in Drillingstürmen, schwere Flugabwehr, dicke Panzerung und hohe Geschwindigkeit. Der Mangel an feindlichen Kreuzern und die Kosteneffizienz dieser Schiffe führten dazu, dass man sich stattdessen auf den Bau weiterer leichter Kreuzer konzentrierte."
 ENG_heavy_cruiser_4:0 "Churchill Design"
 ENG_heavy_cruiser_4_desc:0 "Diese Schiffe wurden von Sir Winston Churchill, Lord der Admiralität, zu Beginn des Zweiten Weltkriegs als Gegenstück zu den schweren Kreuzern der Deutschland-Klasse vorgeschlagen. Die Schiffe verfügten über 9,2-Zoll-Kanonen, schwere Flugabwehr und starke Panzerung. Sie waren für den effektiven Kampf gegen feindliche Großkampfschiffe konzipiert. Aufgrund der hohen Kosten und der mangelnden Nachfrage nach neuen schweren Kreuzern wurde der Bau der Schiffe schließlich eingestellt. "
 ENG_battle_cruiser_1:0 "G3-Klasse"
 ENG_battle_cruiser_1_desc:0 "Die G3-Schlachtkreuzer waren als Reaktion auf die Marineerweiterungsprogramme der USA und Japans geplant. Die vier Schiffe dieser Klasse wären größer, schneller und stärker bewaffnet gewesen als jedes existierende Schlachtschiff. Die G3 hätten neun 16-Zoll-Geschütze (406 mm) getragen und sollten 32 Knoten (59 km/h; 37 mph) erreichen. Der Entwurf der G3 wurde am 12. August 1921 vom Admiralitätsrat genehmigt. Bestellungen wurden im Oktober und November aufgegeben, aber später im November mit Beginn der Washingtoner Marinekonferenz, die die Anzahl der Schlachtschiffe begrenzte, ausgesetzt. Die Bestellungen wurden im Februar 1922 mit der Ratifizierung des Washingtoner Flottenvertrags storniert, der den Bau auf Schiffe mit einer Verdrängung von nicht mehr als 35.000 Tonnen (36.000 t) beschränkte."
 ENG_battle_cruiser_2:0 "Princess Royal-Klasse"
 ENG_battle_cruiser_2_desc:0 "Die Princess Royal ist eine Klasse hypothetischer Schlachtkreuzer, die eine schnellere und günstigere Version der Schlachtschiffe der King George V-Klasse darstellten. Diese Schiffe verfügten über eine ähnliche, aber reduzierte Bewaffnung für den Überwasser- und Luftkampf: zwei 14-Zoll-Drillingskanonen und sechs 5,25-Zoll-Zwillings-Flugabwehrgeschütze. Ihre hohe Geschwindigkeit und Reichweite würden der Royal Navy schnelle Angriffsmöglichkeiten und Konvoischutz bieten, ihre eingeschränkte Panzerung würde sich jedoch im Kampf gegen moderne Schlachtschiffe als problematisch erweisen."
 ENG_battleship_1:0 "Nelson-Klasse"
ENG_battleship_1_desc:0 " Die Nelson-Klasse war eine Klasse von zwei Schlachtschiffen (Nelson und Rodney) der britischen Royal Navy, die kurz nach und gemäß den Bedingungen des Washingtoner Flottenabkommens von 1922 gebaut wurden. Sie waren die einzigen britischen Schlachtschiffe zwischen der Revenge-Klasse (bestellt 1913) und der King George V-Klasse (bestellt 1936)."
 ENG_battleship_2:0 "King George V-Klasse"
 ENG_battleship_2_desc:0 "Die Schlachtschiffe der King-George-V-Klasse waren das Ergebnis der Washingtoner Flottenverträge von 1922 und des Ersten Londoner Flottenvertrags von 1930, die die maximale Verdrängung und Artillerie von Großkampfschiffen beschränkten. Daher waren diese Schiffe mit Kanonen kleineren Kalibers ausgestattet als frühere und sogar zeitgenössische Schlachtschiffe. Trotz des geringeren Kalibers waren die Schiffe ausreichend bewaffnet, trugen starke Flugabwehrwaffen und waren ausreichend geschützt. Fünf Schiffe wurden als Ersatz für die alten Schlachtschiffe der Queen-Elizabeth-Klasse bestellt und auf Kiel gelegt."
 ENG_battleship_3:0 "Löwenklasse"
 ENG_battleship_3_desc:0 "Die Schlachtschiffe der Lion-Klasse waren die Nachfolgeklasse der King-George-V-Schlachtschiffe und übernahmen viele ihrer Merkmale. Im Rahmen des Marineprogramms von 1938 wurden sechs Schiffe bestellt, um die alternden Schlachtschiffe der Revenge-Klasse zu ersetzen. Aufgrund der ausbrechenden Feindseligkeiten wurde jedoch keines fertiggestellt. Die Schiffe hätten im Großen und Ganzen der King-George-Klasse ähnelt, die Hauptbewaffnung wäre jedoch schwerer gewesen und hätte eine neue 16-Zoll-Kanone eingeführt. Sie hätten außerdem eine dickere Panzerung und stärkere Motoren gehabt."
 ENG_battleship_4:0 "Vanguard-Klasse"
 ENG_battleship_4_desc:0 "Das Schlachtschiff der Vanguard-Klasse war das letzte Schlachtschiff, das für die Royal Navy gebaut wurde. Es wurde nur ein einziges Schiff bestellt, vier weitere wurden jedoch für den Pazifikkrieg in Betracht gezogen. Der Bau wurde im Rahmen des Emergency War Program von 1940 in Auftrag gegeben, hatte jedoch keine hohe Priorität und wurde erst nach dem Krieg fertiggestellt. Die Klasse hatte einen schlanken Rumpf, der für ausgezeichnete Stabilität und Seetüchtigkeit sorgte. Die Bewaffnung entspricht der der Schlachtschiffe der Queen Elizabeth- und Revenge-Klasse und bietet beträchtliche Feuerkraft. Starke Motoren und eine gute Panzerung machten das Schiff schnell und gut geschützt."
 ENG_SH_battleship_1:0 "Centurion-Klasse"
 ENG_SH_battleship_1_desc:0 "Die Centurion ist eine Klasse hypothetischer schwerer Schlachtschiffe der Royal Navy, die als Gegenstück zu den großen Schiffen der deutschen und japanischen Marine gebaut wurden. Große 18-Zoll-Geschütze und eine dicke Panzerung verleihen dem Schiff die nötige Feuerkraft und den nötigen Schutz, um diese Schiffe zu bekämpfen. Starke Flugabwehr, große Reichweite und hohe Geschwindigkeit waren unerlässlich, um die weiten Meere des Britischen Empires zu bezwingen."
 ENG_SH_battleship_2:0 "Lion II-Klasse"
 ENG_SH_battleship_2_desc:0 "Die Schlachtschiffe der Lion-II-Klasse wurden 1944 als verbesserte Version der früheren Lion-Klasse entworfen. Die Erfahrungen aus dem Krieg wurden in dieses Modell integriert, das größer und schwerer war und nach Fertigstellung entweder drei oder vier 16-Zoll-Drillingsgeschütze des neuesten Typs tragen sollte. Dicke Panzerplatten schützten das Schiff vor Angriffen von oben und aus der Luft. Die hohen Baukosten, die Niederlagen feindlicher Flotten und der Bedarf an Flugzeugträgern führten zum Abbruch des Projekts."
 ENG_carrier_1:0 "Mutige Klasse"
 ENG_carrier_1_desc:0 "Diese drei Flugzeugträger waren umgebaute Schlachtkreuzer und die ersten Flottenträger der Royal Navy. Ihr Umbau war das Ergebnis des Washingtoner Flottenabkommens von 1922 und wurde 1925 abgeschlossen. Es handelte sich um mäßig gepanzerte, aber gut bewaffnete Schiffe mit großer Reichweite und guter Geschwindigkeit, allerdings war ihre Flugzeugbesatzung aufgrund des Umbaus begrenzt. Dennoch brachten sie der Royal Navy wichtige Erfahrungen im Flugzeugträgerbau und in der Flottenluftprojektion."
 ENG_carrier_2:0 "Ark Royal-Klasse"
 ENG_carrier_2_desc:0 "Der Flugzeugträger Ark Royal war das erste Schiff dieser Art, das den Auflagen des Washingtoner Flottenabkommens entsprach. Er war das erste Schiff, bei dem Hangars und Flugdeck integraler Bestandteil des Rumpfes waren. Das 1934 entworfene Schiff ist gut gepanzert und bewaffnet. Es transportierte eine große Anzahl von Flugzeugen und verfügte über ausreichend Reichweite und Geschwindigkeit, um mit den Hauptstreitkräften der Royal Navy mitzuhalten."
 ENG_carrier_3:0 "Illustre Klasse"
 ENG_carrier_3_desc:0 "Die Illustrious-Klasse wurde unter den Bedingungen des Zweiten Londoner Flottenabkommens von 1936 entworfen, das die Größe der Träger auf maximal 23.000 Tonnen begrenzte. Sie war der erste britische Träger mit einem gepanzerten Flugdeck, was die Größe der Luftgruppe reduzierte. Schwere Panzerung und Flugabwehr sorgten für eine starke Verteidigung der Schiffe, während leistungsstarke Motoren und ein großer Treibstoffvorrat den Schiffen eine große Einsatzreichweite ermöglichten."
 ENG_carrier_4:0 "Unerbittliche Klasse"
 ENG_carrier_4_desc:0 "Die Flugzeugträger der Implacable-Klasse wurden im Rahmen des Marineprogramms von 1938 bestellt und waren im Wesentlichen verbesserte Versionen der früheren Illustrious-Klasse. Der Krieg und die Verlagerung der Priorität auf kleinere Schiffe für Konvoischutzaufgaben in der frühen und mittleren Kriegsphase verlangsamten die Reduzierung dieser Schiffe. Es handelte sich um größere Schiffe, die mehr Flugzeuge transportieren konnten und gleichzeitig eine dicke Panzerung an Rumpf und Flugdeck aufwiesen. Stärkere Motoren ermöglichten ihnen im Vergleich zur Illustrious-Klasse eine höhere Geschwindigkeit und Reichweite."
 #ENG_carrier_4b: "Malta Class"
 ### FRA - FRANCE ###
 FRA_submarine_1:0 "Serie 600"
 FRA_submarine_1_desc:0 "Die 600-Tonnen-U-Boote waren Frankreichs erste moderne U-Boote der Nachkriegszeit. Sie waren mittelgroß und verdrängten rund 600 Tonnen. Obwohl sie seetüchtig waren, dienten sie als Küsten-U-Boote und wurden hauptsächlich in den warmen Gewässern des Mittelmeers eingesetzt. Drei Klassen mit jeweils vier Schiffen dieses Typs wurden gebaut: die Sirène-, Ariane- und Circé-Klassen. Sie bildeten die Grundlage der größeren 630-Tonnen-Serie der Argonaute-, Diane- und Orion-Klassen."
 #FRA_submarine_1b: "630 Series"
 #FRA_submarine_1c: "Redoutable Class"
 FRA_submarine_2:0 "Minerve-Klasse"
 FRA_submarine_2_desc:0 "Die U-Boote der Minerve-Klasse (Projektname T2) basierten auf der 630-Tonnen-Serie, verfügten jedoch über bessere Motoren und eine andere Torpedoanordnung. Diese U-Boote waren der erste Teil des Standardisierungsprogramms, das sich aus einem zentralisierten Entwurf der DCAN (Direction des Constructions et Armes Navale) anstelle werftspezifischer Entwürfe der vorherigen Klassen ergab."
 #FRA_submarine_2b: "Aurore Class"
 FRA_submarine_3:0 "Roland Morillot-Klasse"
 FRA_submarine_3_desc:0 "Die U-Boote der Roland-Morillot-Klasse (Projektname Z2) waren große, hochseetaugliche U-Boote, die auf den früheren U-Booten der Redoubtable-Klasse basierten. Sie waren große U-Boote mit einer Verdrängung von 1.800 bis 2.400 Tonnen und einer beeindruckenden Bewaffnung von zehn Torpedorohren. Der Fall Frankreichs erfolgte, bevor eines der U-Boote fertiggestellt war."
 FRA_submarine_4:0 "Phénix-Klasse"
 FRA_submarine_4_desc:0 "Die U-Boote der Phénix-Klasse waren mittelgroße, hochseetaugliche Langstreckenboote, die in den Marineprogrammen von 1939 bis 1940 zugelassen waren. Kriegsbeginn und der Fall Frankreichs führten jedoch zur Einstellung ihrer Produktion. Sie ähnelten der Redoutable-Klasse, waren jedoch kleiner und verdrängten 1.200 Tonnen. Sie trugen eine ähnlich schwere Torpedobewaffnung."
 FRA_destroyer_1:0 "Bourrasque-Klasse"
 FRA_destroyer_1_desc:0 "Die Zerstörer der Bourrasque-Klasse gehörten zur 1.500-Tonnen-Serie und liefen Mitte der 1920er Jahre vom Stapel. Zusammen mit den Vorgängerschiffen der Chacal- und der nachfolgenden L&#39;Adroit-Klasse bildeten sie das Rückgrat der neuen, modernen französischen Nachkriegsflotte. Sie waren für ihre Zeit schnell und gut bewaffnet, ihre Torpedobewaffnung war jedoch im Vergleich zu ähnlichen Schiffen anderer Marinen geringer."
 #FRA_destroyer_1b: "Chacal Class"
 #FRA_destroyer_1c: "Agile & Vauquelin Class"
 FRA_destroyer_2:0 "Le Fantasque-Klasse"
 FRA_destroyer_2_desc:0 "Die Zerstörer der Le Fantasque-Klasse waren im Wesentlichen verbesserte Versionen der früheren Superzerstörer der 2.400-Tonnen-Serie (Guépard, Aigle, Vauquelin), die im Rahmen des Marineprogramms von 1930 gebaut wurden. Sie waren große, schwer bewaffnete und sehr schnelle Zerstörer, perfekt geeignet für die Eskorte der neuen Hochgeschwindigkeitseinheiten der französischen Flotte. Ihre Bewaffnung bestand aus neu entwickelten Geschützen, ausreichender Flugabwehr und Torpedobewaffnung."
 #FRA_destroyer_2b: "Le Hardi Class"
 #FRA_destroyer_2c: "Mogador Class"
 FRA_destroyer_3:0 "L&#39;Intrépide-Klasse"
 FRA_destroyer_3_desc:0 "Die Zerstörer der L&#39;Intrépide-Klasse waren eine modifizierte Version der früheren Zerstörer der Le Hardi-Klasse. Sie waren in den Marineprogrammen von 1938 und 1939 zugelassen, wurden jedoch aufgrund des Krieges und des Zerfalls Frankreichs nicht mehr gebaut. Sie sollten eher als Flugabwehrschiffe eingesetzt werden und hatten eine auf 2.800–2.900 Tonnen erhöhte Verdrängung sowie größere Motoren."
 FRA_destroyer_4:0 "Hoche-Klasse"
 FRA_destroyer_4_desc:0 "Die Hoche- und Bayard-Klassen waren die letzten Superzerstörer-Entwürfe der französischen Marine. Beide Klassen basierten auf der Mogador-Klasse und verdrängten 4.200 Tonnen mit ähnlicher Hauptbewaffnung, aber verbesserten Flugabwehrkanonen und stärkeren Motoren. Sie wurden in den Marineprogrammen 1939/40 genehmigt, doch Kriegsbeginn und der Fall Frankreichs führten zur Einstellung ihrer Produktion."
 FRA_light_cruiser_1:0 "Duguay-Trouin-Klasse"
 FRA_light_cruiser_1_desc:0 "Die Duguay-Trouin-Leichtkreuzer waren die ersten großen französischen Kriegsschiffe, die nach dem Ersten Weltkrieg im Rahmen des Marineprogramms von 1922 gebaut wurden. Sie waren die ersten Leichten Kreuzer mit hochfeuernden, geschlossenen Haupttürmen. Unter den Leichten Kreuzern verfügten sie über eine starke Torpedobewaffnung, aber praktisch keine Panzerung."
 FRA_light_cruiser_2:0 "La Galissonnière-Klasse"
 FRA_light_cruiser_2_desc:0 "Die Leichten Kreuzer der La-Galissonnière-Klasse waren die Antwort auf die italienischen Condottieri-Kreuzer und basierten auf der vorherigen Emile-Bertin-Klasse. Sie wurden in den Marineprogrammen 1931 und 1932 gebaut und verfügten über die typische Hauptbewaffnung und eine für die damalige Zeit angemessene Flugabwehr. Sie verdrängten 10.850 Tonnen, verfügten über eine erhöhte Anzahl an Aufklärungsflugzeugen und waren schnell."
 FRA_light_cruiser_3:0 "De Grasse-Klasse"
 FRA_light_cruiser_3_desc:0 "Die Kreuzer der DeGrasse-Klasse wurden in den Marineprogrammen 1938 und 1939 zugelassen und waren im Wesentlichen verbesserte La Galissonnières. Sie verfügten über eine stärkere Flugabwehr sowie größere Motoren. Der Fall Frankreichs führte dazu, dass die letzten beiden Schiffe abgesagt und das Typschiff nach dem Krieg als anderes Design fertiggestellt wurde. Die Deutschen beabsichtigten, es als leichten Träger fertigzustellen, aber auch dieses Projekt wurde nicht umgesetzt."
 FRA_light_cruiser_4:0 "Colbert-Klasse"
 FRA_light_cruiser_4_desc:0 "Die Colbert war ein leichter Flugabwehrkreuzer, der 1956 vom Stapel lief. Dieser Kreuzer der Colbert-Klasse war der Nachkriegs-De Grasse sehr ähnlich gebaut und verfügte über eine schwere Flugabwehrbewaffnung sowohl für lange als auch für kurze Reichweiten. Der Unterschied zwischen der Colbert und der DeGrasse besteht darin, dass die Colbert kleinere Motoren und eine dünnere Panzerung hatte und etwas kleiner war."
 FRA_heavy_cruiser_1:0 "Suffren-Klasse"
 FRA_heavy_cruiser_1_desc:0 "Die Schweren Kreuzer der Suffren-Klasse waren im Wesentlichen eine Wiederholung der vorherigen Duquesne-Klasse mit geringfügigen Verbesserungen hinsichtlich ihrer Seetüchtigkeit. Beide Klassen ähnelten der zeitgenössischen Kreuzerphilosophie der französischen Marine: sehr dünne Panzerung, aber gute Geschwindigkeit und Reichweite. Ihre Standardverdrängung beträgt 10.000 Tonnen und sie waren mit der für schwere Kreuzer üblichen Bewaffnung ausgestattet."
 FRA_heavy_cruiser_2:0 "Algérie-Klasse"
 FRA_heavy_cruiser_2_desc:0 "Die schweren Kreuzer der Algérie-Klasse stellten eine Weiterentwicklung der Vorgängerklassen Suffren und Duquesne dar und wurden als Gegenstück zu den neuen italienischen schweren Kreuzern der Zara-Klasse konzipiert. Sowohl der Hauptpanzergürtel als auch der Unterwasserschutz wurden deutlich verbessert. Die Flugabwehrbewaffnung war für ihre Zeit angemessen, aufgrund dieser Änderungen beträgt die Standardverdrängung jedoch über 10.000 Tonnen."
 FRA_heavy_cruiser_3:0 "Saint-Louis-Klasse"
 FRA_heavy_cruiser_3_desc:0 "Die Schweren Kreuzer der Saint-Louis-Klasse basierten auf der Algérie-Klasse, ähnelten optisch jedoch eher den Großkampfschiffen der Dunkerque- und Richelieu-Klasse. Im Rahmen des Marineprogramms 1940 wurden drei Schiffe bestellt, doch aufgrund des Falls Frankreichs wurde keines davon auf Kiel gelegt. Sie sollten über neue Geschütze und verbesserte Flugabwehr verfügen, die Panzerung entsprach jedoch der der Algérie-Klasse. Es war der letzte schwere Kreuzerentwurf der französischen Marine."
 FRA_heavy_cruiser_4:0 "Forbin-Klasse"
 FRA_heavy_cruiser_4_desc:0 "Die Schweren Kreuzer der Forbin-Klasse waren ein hypothetischer Entwurf als Nachfolger der Saint-Louis-Klasse. Sie wurden zur Verteidigung der Handelsrouten zwischen dem französischen Festland und den Kolonien entwickelt und verfügten über große Reichweite und hohe Geschwindigkeit sowie eine schwere Bewaffnung mit vier Drillingstürmen und ausreichend Flugabwehr. Schiffslayout und Gesamterscheinung ähnelten der vorherigen Saint-Louis-Klasse sowie der britischen Crown-Colony-Klasse."
 FRA_battle_cruiser_1:0 "Durand-Viels Design B"
 FRA_battle_cruiser_1_desc:0 "Der Durand-Viel-Schlachtkreuzerentwurf war ein Vorschlag aus einer Reihe von Studien aus dem Ersten Weltkrieg. Es handelte sich im Wesentlichen um Schlachtkreuzerversionen der Schlachtschiffklassen Normandie und Lyon mit denselben vierfachen Türmen und Geschützen, wenn auch in reduzierter Anzahl. Wie zeitgenössische Schlachtkreuzer anderer Marinen sollten sie schneller, aber schwächer gepanzert als ein Schlachtschiff sein. Ihr Bau wurde vor Ausbruch des Ersten Weltkriegs eingestellt."
 FRA_battle_cruiser_2:0 "Dunkerque-Klasse"
 FRA_battle_cruiser_2_desc:0 "Die Dunkerques wurden als Gegenstück zu den deutschen Westentaschen-Schlachtschiffen der Deutschland-Klasse entwickelt. Sie bildeten den Höhepunkt einer Reihe von Designstudien von Mitte der 1920er bis Anfang der 1930er Jahre. Sie wurden in den Marineprogrammen von 1931 und 1934 genehmigt und ähnelten den britischen Schlachtschiffen der Nelson-Klasse, wobei alle Haupttürme nach vorne konzentriert waren. Dies führte zu einer kürzeren Gürtelpanzerung und somit zu einem kleineren Schiff, das den Beschränkungen der Flottenverträge entsprach."
 
 FRA_battleship_1:0 "Lyon-Klasse"
 FRA_battleship_1_desc:0 "Bei der Lyon-Klasse handelte es sich um eine Reihe von Schlachtschiffen, die 1913 für die französische Marine (Marine Nationale) geplant waren und deren Bau 1915 beginnen sollte."
 FRA_battleship_2:0 "Richelieu-Klasse"
 FRA_battleship_2_desc:0 "Die Schlachtschiffe der Richelieu-Klasse waren die letzten Schlachtschiffe, die in Dienst gestellt wurden. Sie stellten eine Weiterentwicklung der Dunkerque dar und wurden im Rahmen der Marineprogramme von 1935 und 1938 zugelassen. Sie verfügten über eine hervorragende Flugabwehr, Geschwindigkeit und Reichweite, was sie zu hervorragenden Großkampfschiffen machte. Von den vier bestellten Schiffen wurden nur zwei vom Stapel gelassen, eines wurde vor dem Fall Frankreichs fertiggestellt. Es gab zahlreiche Versuche, die verbleibenden Schiffe mit unterschiedlichen Designs fertigzustellen, die als Flugabwehr-Schlachtschiffe, Schlachtschiff-Träger-Hybriden oder vollwertige Trägerschiffe eingesetzt werden sollten."
 FRA_battleship_3:0 "Gascogne-Klasse"
 FRA_battleship_3_desc:0 "Die Schlachtschiffe der Gascogne-Klasse waren eine Unterklasse der Richelieu-Klasse. Im Marineprogramm von 1940 wurden drei Schiffe bestellt, aber keines davon in Betrieb genommen. Das Design war eine Wiederholung der Richelieu, jedoch mit gleichmäßig verteilter Hauptbewaffnung, verbesserter Flugabwehr und verbesserten Motoren, was zu einem insgesamt besseren Schiff führte."
 FRA_battleship_4:0 "Elsass-Klasse"
 FRA_battleship_4_desc:0 "Die Schlachtschiffe der Alsace-Klasse sollten die Nachfolge der Richelieu-Klasse antreten. Vier Schiffe wurden bestellt, die Konstruktionsstudien 1939 abgeschlossen, 1940 genehmigt und 1941 auf Kiel gelegt, was jedoch durch den Fall Frankreichs verhindert wurde. Die Alsace-Klasse verbesserte das Richelieu-Design durch schwerere und zahlreichere Hauptgeschütze, eine stärkere Flugabwehr, dickere Panzerplatten und größere Motoren."
 FRA_SH_battleship_1:0 "Karl-der-Große-Klasse"
 FRA_SH_battleship_1_desc:0 "Die Superschlachtschiffe der Charlemagne-Klasse sind ein hypothetischer Entwurf, der den großen Schlachtschiffen anderer Marinen ebenbürtig sein soll. Sie verfügen über eine schwere Bewaffnung in Superfeuerstellungen, schwere Flugabwehr und eine dicke Panzerung. Das gesamte Design greift Elemente der Richelieu- und der britischen Nelson-Klasse auf."
 FRA_SH_battleship_2:0 "Napoléon Bonaparte-Klasse"
 FRA_SH_battleship_2_desc:0 "Die Schlachtschiffe der Napoléon-Bonaparte-Klasse waren ein hypothetischer Entwurf und basierten auf den Schlachtschiffen der Alsace- und Gascogne-Klasse. Ihre schwere Bewaffnung ist gleichmäßig in Drillingstürmen an Bug und Heck verteilt, mit überschießenden Sekundärgeschützen und schwerer Flugabwehr. Dicke Panzerung und starke Motoren sorgen für die nötige Geschwindigkeit und Verteidigung, um mit den anderen Schiffen der Flotte mitzuhalten und ihre Gegner effektiv zu bekämpfen."
 FRA_carrier_1:0 "Béarn-Klasse"
 FRA_carrier_1_desc:0 "Die Béarn wurde ursprünglich als Schlachtschiff der Normandie-Klasse auf Kiel gelegt, später jedoch als Flugzeugträger mit 22.100 Tonnen Verdrängung fertiggestellt und diente in der Zwischenkriegszeit und im Zweiten Weltkrieg. Als umgebauter Träger war sie langsam und bot nur begrenzt Platz für Flugzeuge. Der mittlere Panzergürtel und die große Reichweite glichen diese Mängel jedoch aus. Ihre Konstruktion lieferte den französischen Konstrukteuren der DCAN (Direction des Constructions et Armes Navale) wichtige Erfahrungen und führte später zu einer Reihe von Designstudien."
 FRA_carrier_2:0 "Joffre-Klasse"
 FRA_carrier_2_desc:0 "Die Flugzeugträger der Joffre-Klasse (Projektname PA-16) waren die nächste Generation von Trägern der französischen Marine. Sie waren die letzten der Designstudien, die 1929 begonnen und 1937 abgeschlossen wurden. Im Marineprogramm von 1938 wurden zwei Schiffe genehmigt, doch die eskalierenden Konflikte verlangsamten den Bauprozess, und der Fall Frankreichs verhinderte schließlich die Fertigstellung dieser Schiffe. Die Verdrängung hätte rund 20.000 Tonnen betragen. Sie hätten über gute Flugabwehr, Panzerung und Geschwindigkeit verfügt, aber eine unterdurchschnittliche Flugzeugbesatzung. Insgesamt wäre es ein vielseitiger und vielseitiger Träger für die französische Marine gewesen."
 FRA_carrier_3:0 "Jean Bart Klasse"
 FRA_carrier_3_desc:0 "Der Flugzeugträger Jean Bart war ein Vorschlag aus der Mitte des Krieges, das unfertige Schlachtschiff der Richelieu-Klasse, Jean Bart, in einen vollwertigen Flugzeugträger umzubauen, ähnlich der japanischen IJN Shinano. Der große Rumpf sollte eine große Flugzeugkomponente ermöglichen und zusammen mit den großen Motoren einen weitreichenden und schnellen Träger schaffen. Die schwere Flugabwehr aus den USA sollte eine gute Verteidigung gegen Flugzeuge und kleinere Überwasserkampfschiffe bieten."
 FRA_carrier_4:0 "Clemenceau-Klasse"
 FRA_carrier_4_desc:0 "Die Flugzeugträger der Clemenceau-Klasse (Projektname PA-28) waren der erste Flugzeugträgerentwurf der französischen Marine nach dem Krieg. Das Design ähnelte den unvollendeten Trägern der Joffre-Klasse, die installierte Ausrüstung und Bewaffnung entstammte jedoch modernen französischen Produkten. Der Erwerb der Geleitträger der US- und Royal Navy sowie die wirtschaftliche Lage im Nachkriegsfrankreich verhinderten die Kiellegung dieser Schiffe. Nicht zu verwechseln mit den späteren Flugzeugträgern der Clemenceau-Klasse (Projektname PA-54), die 1955 und 1957 auf Kiel gelegt wurden."
 ### GER - GERMANY ###
 GER_submarine_1:0 "UB III Typ"
 GER_submarine_1_desc:0 "Das Küsten-U-Boot Typ UB III war eine U-Boot-Klasse, die während des Ersten Weltkriegs von der deutschen Kaiserlichen Marine gebaut wurde. Sie trugen zehn Torpedos und verdrängten über 500 Tonnen. Zwischen 1916 und 1918 wurden 96 Exemplare gebaut, die jedoch alle bis 1935 außer Dienst gestellt wurden."
 GER_submarine_2:0 "Typ IIA"
 GER_submarine_2_desc:0 "Das deutsche U-Boot Typ IIA war ein einrumpfiges, vollverschweißtes Küsten-U-Boot mit internen Ballasttanks. Es verdrängte über 250 Tonnen und war mit fünf 533-mm-Torpedorohren ausgestattet. Sechs Exemplare wurden zwischen 1934 und 1935 gebaut."
 #GER_submarine_2b: "Type VIIA"
 GER_submarine_3:0 "Typ VIIC"
 GER_submarine_3_desc:0 "Das seetüchtige U-Boot Typ VIIC war das Arbeitspferd der deutschen U-Bootwaffe. Zwischen 1940 und 1945 wurden 568 Exemplare in Dienst gestellt. Die Schiffe verdrängten 770 Tonnen und waren mit fünf 533-mm-Torpedorohren bewaffnet."
 #GER_submarine_3b: "Type IXC"
 GER_submarine_4:0 "Typ XXI"
 GER_submarine_4_desc:0 "U-Boote des Typs XXI, auch bekannt als „Elektroboote“, waren die ersten U-Boote, die hauptsächlich für den Unterwasserbetrieb konzipiert waren und nicht als Überwasserschiffe, die abtauchen konnten, um unentdeckt zu bleiben oder einen Angriff zu starten. Ihre Hauptmerkmale waren der stromlinienförmige Rumpf und Kommandoturm sowie die große Anzahl an Batteriezellen. Mit einer Wasserverdrängung von über 1.620 Tonnen gehörten sie zu den größten deutschen U-Boot-Klassen. Zwischen 1943 und 1945 wurden 118 Schiffe in Dienst gestellt."
 GER_destroyer_1:0 "Typ 23"
 GER_destroyer_1_desc:0 "Der Typ 23 war eine Torpedobootklasse, die nach dem Ersten Weltkrieg für die Kriegsmarine gebaut wurde. Zwischen 1926 und 1928 wurden sechs Schiffe gebaut, die alle im Zweiten Weltkrieg im Einsatz waren. Trotz ihrer Bezeichnung als Torpedoboote hatten die Schiffe die Größe eines Zerstörers, verdrängten über 920 Tonnen und waren mit drei 105-mm-L/45-Geschützen bewaffnet."
 GER_destroyer_2:0 "Zerstörer 1934"
 GER_destroyer_2_desc:0 "Die Zerstörer-1934-Klasse war die erste Klasse deutscher Zerstörer, die seit dem Ersten Weltkrieg gebaut wurde. Sie waren mit fünf 5-Zoll-Geschützen und acht Torpedorohren bewaffnet. Es wurden 16 Schiffe gebaut, von denen 12 der verbesserten Unterklasse Zerstörer 1934A angehörten."
 GER_destroyer_3:0 "Narvik-Klasse"
 GER_destroyer_3_desc:0 "Der Zerstörer 1936A, den Alliierten als Zerstörer der Narvik-Klasse bekannt, wurde für die neuen 150-mm-Geschütze (5,9 Zoll) konstruiert. Ausgelegt mit drei Einzelgeschützen achtern und einem Zwillingsgeschütz im Bug, waren sie ursprünglich nur mit einem Einzelgeschütz im Bug ausgestattet. Vier der acht Schiffe dieser Klasse wurden später mit den Zwillingstürmen nachgerüstet. Eine zweite Gruppe von sieben Zerstörern wurde nach einem leicht modifizierten Entwurf mit Zwillingsgeschützen im Bug gebaut."
 GER_destroyer_4:0 "Zerstörer 1944"
 GER_destroyer_4_desc:0 "Obwohl der erste Prototyp eines dieselbetriebenen Zerstörers (Zerstörer 1942) nicht fertiggestellt wurde, wurde die Entwicklung des Schiffstyps fortgesetzt. Es wurden mehrere Vorschläge gemacht, die schließlich zum Projekt Zerstörer 1944 führten. Neben einer schweren Hauptbewaffnung verfügten die Schiffe im Vergleich zu ihren Vorgängern über eine verstärkte Flakbewaffnung, einschließlich der neuen 5,5-cm-Flugabwehrkanone."
 GER_light_cruiser_1:0 "Emden-Klasse"
 GER_light_cruiser_1_desc:0 "Die Emden war das erste große Kriegsschiff, das nach dem Ersten Weltkrieg in Deutschland gebaut wurde. Sie wurde 1921 auf Kiel gelegt und 1925 in Dienst gestellt. Die Bewaffnung bestand aus acht 150-mm-Geschützen (5,9 Zoll) in Einzeltürmen."
 #GER_light_cruiser_1b: "Königsberg Class"
 GER_light_cruiser_2:0 "Nürnberger Klasse"
 GER_light_cruiser_2_desc:0 "Die Leichten Kreuzer der Nürnberg-Klasse wurden zwischen 1928 und 1935 als Verbesserung gegenüber den Vorgängerkreuzern der Königsberg-Klasse gebaut. Sie verdrängten über 8.100 Tonnen, verfügten über ausreichende Geschwindigkeit und Reichweite und waren mit neun 15-cm-SK C/25-Geschützen in ihrer Hauptbewaffnung bewaffnet."
 GER_light_cruiser_3:0 "M-Klasse"
 GER_light_cruiser_3_desc:0 "Die Kreuzer der M-Klasse waren als Aufklärungsschiffe für Handelsüberfallgeschwader konzipiert. Im Rahmen des Plans Z wurden sechs Schiffe bestellt, von denen zwei auf Kiel gelegt wurden, bevor die Arbeiten bei Kriegsausbruch eingestellt wurden. Die Hauptbewaffnung bestand aus acht 150-mm-Geschützen in vier Zwillingstürmen."
 GER_light_cruiser_4:0 "Q-Klasse"
 GER_light_cruiser_4_desc:0 "Die Kreuzer der Q-Klasse stellten eine modifizierte Konstruktion der M-Klasse dar. Sie waren größer als die M-Klasse und verfügten über eine schwerere Flugabwehrbewaffnung und eine verbesserte Feuerkontrolle."
 GER_heavy_cruiser_1:0 "Blücher-Klasse"
 GER_heavy_cruiser_1_desc:0 "Blücher was the last armored cruiser built by Germany. Her design was innovative for her time and paved the way for the later Von der Tann-class Battlecruisers. By World War I, she was already obsolete. Blücher was sunk at the Battle at the Doggerbank in 1915."
 GER_heavy_cruiser_2:0 "Hipper-Klasse"
 GER_heavy_cruiser_2_desc:0 "Die Schweren Kreuzer der Admiral-Hipper-Klasse waren die ersten Schweren Kreuzer der Kriegsmarine. Offiziell verdrängten sie 10.000 Tonnen, tatsächlich waren es über 16.000 Tonnen. Sie waren mit acht 8-Zoll-Geschützen in vier Zwillingstürmen und einer Sekundärbatterie aus zwölf 105-mm-Geschützen bewaffnet."
 GER_heavy_cruiser_3:0 "Prinz-Eugen-Klasse"
 GER_heavy_cruiser_3_desc:0 "Offiziell Teil der Hipper-Klasse, verfügt die Prinz-Eugen-Unterklasse über zahlreiche Verbesserungen, darunter eine stärkere Flugabwehr. Von den drei Schiffen dieser Unterklasse wurde nur die Prinz Eugen fertiggestellt. Sie war an der Versenkung der HMS Hood während der Operation Rheinübung beteiligt. Nach dem Krieg wurde sie in die USA überführt und diente als USS Prinz Eugen bei den Atombombentests Able und Baker, bevor sie 1946 im Kwajalein-Atoll sank."
 GER_heavy_cruiser_4:0 "Kreuzer der P-Klasse"
 GER_heavy_cruiser_4_desc:0 "Die P-Klasse war ein großer schwerer Kreuzer, der von der Kriegsmarine offiziell als Panzerschiff bezeichnet wurde. Mit einer Wasserverdrängung von fast 24.000 Tonnen war sie 3.000 Tonnen leichter, aber 55 Meter länger als die US-Schlachtschiffe der New-York-Klasse. Die Bewaffnung bestand aus sechs 280-mm-Geschützen in zwei Drillingstürmen."
 GER_battle_cruiser_1:0 "Yorck-Klasse"
 GER_battle_cruiser_1_desc:0 "Die drei Schiffe der Yorck-Klasse wurden als Antwort auf die britische Renown-Klasse entworfen. Sie sollten mit acht 380-mm-Geschützen in vier Zwillingstürmen bewaffnet sein. Alle drei Schiffe wurden 1916 auf Kiel gelegt, aber aufgrund des Krieges wurde keines fertiggestellt."
 GER_battle_cruiser_2:0 "O-Klasse"
 GER_battle_cruiser_2_desc:0 "1939 beschloss die Kriegsmarine, drei der geplanten Kreuzer der P-Klasse durch Schlachtkreuzer zu ersetzen. Das Ergebnis waren die Schlachtkreuzer der O-Klasse, bewaffnet mit sechs 38-cm-Geschützen (15 Zoll) in drei Zwillingstürmen. Die Schiffe wurden mit einer Verdrängung von 35.400 Tonnen und einer Höchstgeschwindigkeit von 35 Knoten konstruiert. Für die drei Schiffe der Klasse wurden Bauaufträge erteilt, jedoch keiner begonnen."
 GER_battleship_1:0 "Schleissen-Klasse"
 GER_battleship_1_desc:0 "Nach dem Versailler Vertrag durfte Deutschland sechs Schlachtschiffe aus der Vor-Dreadnought-Baureihe behalten. Von der Kriegsmarine als Linienschiffe klassifiziert, blieben bis in die 1930er Jahre nur zwei Schiffe der Deutschland-Klasse im aktiven Dienst (nicht zu verwechseln mit den späteren Westentaschenschlachtschiffen der Deutschland-Klasse). Am 1. September 1939 um 4:47 Uhr feuerte die Schleswig-Holstein die ersten Schüsse des Zweiten Weltkriegs ab, als sie das Feuer auf die Westerplatte im polnischen Danzig eröffnete."
 GER_battleship_2:0 "Scharnhorst-Klasse"
 GER_battleship_2_desc:0 "Die Schlachtschiffe der Scharnhorst-Klasse waren die ersten modernen Schlachtschiffe, die für die Kriegsmarine gebaut wurden. Sie entstanden als Antwort auf die französischen Schlachtkreuzer der Dunkerque-Klasse, die wiederum eine Antwort auf die deutschen Panzerschiffe der Deutschland-Klasse (Westentaschen-Schlachtschiffe) waren. Die Scharnhorst-Klasse ist mit neun 283-mm-Geschützen (11 Zoll) in drei Drillingstürmen bewaffnet. Es gab Pläne, sie mit zwei 380-mm-Geschützen (15 Zoll) aufzurüsten, doch mit Kriegsausbruch wurde dies nie umgesetzt."
 GER_battleship_3:0 "Bismarck-Klasse"
 GER_battleship_3_desc:0 "Die aus zwei Schiffen bestehenden Schlachtschiffe der Bismarck-Klasse waren die größten Kriegsschiffe der Kriegsmarine. Die Schiffe wurden als Reaktion auf die im Bau befindlichen neuen französischen Schlachtschiffe entworfen und verfügten über eine ähnliche Bewaffnung mit acht 38-cm-Geschützen (15 Zoll) wie die Richelieu-Klasse, mit vier Zwillingstürmen anstelle der zwei Vierlingstürme der Richelieu-Klasse. Die Bismarck ist berühmt für die Versenkung des britischen Schlachtkreuzers HMS Hood in der Schlacht in der Dänemarkstraße, wurde jedoch später gejagt und versenkt, bevor sie den Hafen erreichte."
 GER_battleship_4:0 "Hindenburg-Klasse"
 GER_battleship_4_desc:0 "Der deutsche Plan Z sah eine Streitmacht von zehn Schlachtschiffen vor, um die Seemacht Großbritanniens herauszufordern. Die H-Klasse bestand aus einer Reihe von Entwürfen für die sechs Schlachtschiffe, die zur Erfüllung der Anforderungen des Plans benötigt wurden. Zwei Schiffe des Typs H39 wurden bei Ausbruch des Zweiten Weltkriegs auf Kiel gelegt, der Bau wurde jedoch mit Kriegsbeginn eingestellt. Keines der Schiffe erhielt einen offiziellen Namen, doch Hindenburg wurde als möglicher Name für das Typschiff der Klasse spekuliert. Wären die Schiffe fertiggestellt worden, wären sie erweiterte Schiffe der Bismarck-Klasse mit einer Hauptbatterie aus acht 40,6-cm-Geschützen (16 Zoll) gewesen."
 GER_carrier_1:0 "Flugzeugdampfer I"
 GER_carrier_1_desc:0 "Das 1915 entworfene Projekt „Flugzeugdampfer I“ war ein Umbau des unvollendeten Passagierschiffs Ausonia zu einem Flugzeugträger. Der Bau wurde am Ende des Ersten Weltkriegs aufgegeben. Wäre das Schiff fertiggestellt worden, hätte es in seinen drei Hangars eine Mischung aus Wasserflugzeugen und Radflugzeugen transportiert und 12.500 Tonnen verdrängt."
 GER_carrier_2:0 "Seydlitz-Klasse"
 GER_carrier_2_desc:0 "Die Seydlitz wurde als viertes Schiff der Schweren Kreuzer der Admiral-Hipper-Klasse auf Kiel gelegt. Zu Kriegsbeginn war sie teilweise fertiggestellt und sollte zu einem Flugzeugträger umgebaut werden. Das Projekt mit dem Codenamen Weser 1 war bereits teilweise im Gange, als die Arbeiten aufgrund zunehmender Luftangriffe auf Bremen und fehlender Ressourcen für den Bau eingestellt wurden."
 GER_carrier_3:0 "Graf Zeppelin-Klasse"
 GER_carrier_3_desc:0 "Die Graf Zeppelin war die einzige Schiffsklasse der Kriegsmarine, die von Anfang an als Flugzeugträger konzipiert war. Zwei Schiffe wurden bestellt, aber keines wurde fertiggestellt. Die Graf Zeppelin sollte 30 Bf-109T-Jäger und 12 Ju-87E-Sturzkampfbomber transportieren, Schiffsversionen der Bf-109E und der Ju-87D."
 GER_carrier_4:0 "Europa-Klasse"
 GER_carrier_4_desc:0 "In den 1940er Jahren erwog die Kriegsmarine den Umbau mehrerer ziviler Schiffe zu Flugzeugträgern. Das größte dieser Schiffe war das Passagierschiff Europa. Als größtes Passagierschiff Deutschlands wurde es als Kasernenschiff und Truppentransporter eingesetzt, bevor mit dem Umbau zum Flugzeugträger begonnen wurde. Wäre es fertiggestellt gewesen, hätte es 56.000 Tonnen verdrängt und eine Luftgruppe von 42 Flugzeugen befördert."
 GER_SH_battleship_1:0 "Schlachtschiff H41"
 GER_SH_battleship_1_desc:0 "Das Schlachtschiffdesign H41 war eine Verbesserung gegenüber dem Vorgängerdesign H39. Es sah eine deutlich stärkere Panzerung, verstärkte Torpedoschotten und Schutz für Ruder und Propellerwellen vor. Die Hauptbatterie wurde auf acht 42-cm-Geschütze aufgerüstet, größer als die der geplanten Schlachtschiffe der britischen Lion-Klasse. Diese Schiffe sollten eine Verdrängung von fast 70.000 Tonnen haben."
 GER_SH_battleship_2:0 "Schlachtschiff H44"
 GER_SH_battleship_2_desc:0 "Die H44-Klasse war das letzte Schlachtschiff der H-Serie. Da es keine Begrenzung hinsichtlich des Geschützkalibers oder der Verdrängung gab, wurden die Modelle H42 bis H44 mit zunehmend schwererer Bewaffnung und Panzerung ausgestattet, was schließlich in der 131.000 Tonnen schweren H44 gipfelte, die mit acht 508-mm-Geschützen (20 Zoll) ausgerüstet war."
 ### ITA - ITALY ###
 ITA_submarine_1:0 "Mameli-Klasse"
 ITA_submarine_1_desc:0 "Die Geoffredo-Mameli-Klasse ist eine Klasse mittelgroßer U-Boote der Regia Marina, die zwischen 1926 und 1928 vom Stapel liefen. Sie verdrängten knapp 800 Tonnen und hatten eine Tauchtiefe von 100 m. Sie bildeten die Grundlage für nachfolgende Modelle wie die Pisani-, Bandiera- und Squalo-Klasse."
 #ITA_submarine_1b: "Bandiera Class"
 #ITA_submarine_1c: "Sirena Class"
 ITA_submarine_2:0 "Perla-Klasse"
 ITA_submarine_2_desc:0 "Die U-Boote der Perla- und Adua-Klasse wurden in den 1930er Jahren gebaut. Sie waren die dritte und vierte Unterklasse der 600er-Serie italienischer U-Boote. Sie waren kleiner als ihre Vorgänger und verdrängten etwas mehr als 600 Tonnen."
 #ITA_submarine_2b: "Marcello Class"
 ITA_submarine_3:0 "Marconi-Klasse"
 ITA_submarine_3_desc:0 "Die Marconi-Klasse bestand aus sechs U-Booten, die zwischen 1939 und 1940 gebaut wurden und die Nachfolge der früheren Luizzi-U-Boote antraten. Die U-Boote beider Klassen verdrängten etwa 1.000 Tonnen und besaßen acht 533-mm-Torpedorohre. Nur ein Schiff beider Klassen überlebte den Krieg."
 #ITA_submarine_3b: "Plantino Class"
 ITA_submarine_4:0 "Pietro Calvi-Klasse"
 ITA_submarine_4_desc:0 "Die Unterklasse Pietro Calvi wies gegenüber der vorhergehenden Flutto-Klasse, einer Klasse mittelgroßer U-Boote, nur geringfügige Verbesserungen auf. Nur wenige wurden vom Stapel gelassen, da die meisten Rümpfe nach dem italienischen Waffenstillstand von den Deutschen erbeutet wurden. Eine überarbeitete Version der Pietro Calvi wurde schließlich 1961 in Dienst gestellt."
 ITA_destroyer_1:0 "Curtatone-Klasse"
 ITA_destroyer_1_desc:0 "Die Zerstörer der Curtatone-Klasse waren die ersten Zerstörer, die nach dem Ersten Weltkrieg in Italien gebaut wurden, und die ersten mit Doppelkanonenlafetten. Die Schiffe wurden ursprünglich gleichzeitig mit den Zerstörern der Palestro-Klasse bestellt, die Bestellung wurde jedoch aufgrund von Stahlmangel verschoben. Sie verdrängten knapp 1.000 Tonnen und waren mit vier 102-mm-Schneider-Armstrong-Geschützen ausgestattet."
 #ITA_destroyer_1b: "Navigatori Class"
 #ITA_destroyer_1c: "Maestrale Class"
 ITA_destroyer_2:0 "Soldati-Klasse"
 ITA_destroyer_2_desc:0 "Die Soldati-Klasse war eine Gruppe von Zerstörern, die Ende der 1930er Jahre gebaut wurden. Es gab zwei Serien. Die erste Serie von 1938/39 bestand aus zwölf Schiffen. Die zweite Serie von 1941/42 wurde aus fünf Schiffen fertiggestellt. Die erste Serie verdrängte etwas mehr als 1.800 Tonnen und war mit vier 120-mm-Ansaldo-Geschützen bewaffnet."
 ITA_destroyer_3:0 "Ciclone-Klasse"
 ITA_destroyer_3_desc:0 "Die Zerstörer der Ciclone-Klasse wurden als Torpedoboote bezeichnet, waren aber in Wirklichkeit eher Geleitzerstörer. Sie waren leicht vergrößerte Versionen der vorherigen Orsa-Klasse mit einer Verdrängung von über 1.100 Tonnen und verfügten über eine verbesserte Stabilität und eine schwerere U-Boot-Abwehrbewaffnung."
 #ITA_destroyer_3b: "Ariete Class"
 ITA_destroyer_4:0 "Medaglie d&#39;Oro-Klasse"
 ITA_destroyer_4_desc:0 "Die Comandanti Medaglie d&#39;Oro-Klasse war eine Gruppe von Zerstörern, die für die Regia Marina geplant waren, aber bis zum italienischen Waffenstillstand nie vom Stapel liefen. Die Schiffe waren deutlich größer als frühere italienische Zerstörer und verdrängten fast 2.100 Tonnen. Sie waren außerdem mit den größeren 135-mm-Ansaldo-Geschützen bewaffnet und verfügten über verbesserte Motoren."
 ITA_light_cruiser_1:0 "Taranto-Klasse"
 ITA_light_cruiser_1_desc:0 "Die Kreuzer Taranto und Bari waren Kreuzer aus dem Ersten Weltkrieg, die sie als Reparationsleistungen von Deutschland erhielten. Beide hatten eine Verdrängung zwischen 4.500 und 5.100 Tonnen und waren mit deutschen 150-mm-SK/45-Geschützen bewaffnet."
 #ITA_light_cruiser_1b: "Giussano Class"
 #ITA_light_cruiser_1c: "Montecuccoli Class"
 ITA_light_cruiser_2:0 "Herzog der Abruzzen"
 ITA_light_cruiser_2_desc:0 "Die Duca degli Abruzzi-Klasse war die fünfte Unterklasse der leichten Kreuzer der Condottieri-Klasse. Sie wurden vor dem Zweiten Weltkrieg gebaut, um die Vorherrschaft im Mittelmeer zu erlangen. Mit einer Verdrängung von über 9.400 Tonnen waren sie die größten italienischen Leichten Kreuzer, die während des Krieges in Dienst gestellt wurden. Sie waren gut gepanzert und mit zehn 152-mm-Ansaldo-Geschützen ausgestattet."
 ITA_light_cruiser_3:0 "Capitani Romani-Klasse"
 ITA_light_cruiser_3_desc:0 "Die leichten Kreuzer der Capitani Romani wurden im Wesentlichen entwickelt, um den großen neuen französischen Zerstörern der späten 1930er Jahre in puncto Geschwindigkeit und Bewaffnung zu entkommen. Ende 1939 wurden zwölf Rümpfe bestellt, aber nur drei wurden vor dem italienischen Waffenstillstand 1943 fertiggestellt. Sie waren leicht gepanzert und verdrängten nur 3.700 Tonnen, waren aber recht schnell. Sie waren mit acht 135-mm-OTO/Ansaldo-Geschützen ausgestattet."
 ITA_light_cruiser_4:0 "San Marco-Klasse"
 ITA_light_cruiser_4_desc:0 "Die San Marco-Klasse ist eine verbesserte Version der früheren leichten Kreuzer der Capitani Romani. Aufgrund des italienischen Waffenstillstands wurden die San Marco und ihr neu gestaltetes Schwesterschiff, die San Giorgio, erst in den 1950er Jahren in Dienst gestellt."
 ITA_heavy_cruiser_1:0 "Trento-Klasse"
 ITA_heavy_cruiser_1_desc:0 "Die Trento-Klasse war ein Schwerer Kreuzer der Regia Marina aus den späten 1920er Jahren. Sie waren die ersten Schiffe, die speziell nach den Beschränkungen des Washingtoner Flottenabkommens konstruiert wurden, das Kreuzer auf 10.000 Tonnen und 8-Zoll-Geschütze beschränkte. Das letzte Schiff dieser Klasse, die Bolzano, war ein verbessertes Design und lief 1932 vom Stapel."
 #ITA_heavy_cruiser_1b: "Zara Class"
 ITA_heavy_cruiser_2:0 "San Giorgio-Klasse"
 ITA_heavy_cruiser_2_desc:0 "Die San-Giorgio-Klasse ist eine hypothetische Klasse schwerer Kreuzer aus der Zwischenkriegszeit, die kurz vor Kriegsbeginn vom Stapel gelassen worden wären. Diese Kreuzer hätten eine Verdrängung von über 11.000 Tonnen und wären mit acht 203-mm-Ansaldo-Geschützen ausgestattet gewesen."
 ITA_heavy_cruiser_3:0 "Pisa-Klasse"
 ITA_heavy_cruiser_3_desc:0 "Die Pisa-Klasse ist ein hypothetischer schwerer Kreuzer aus der Mitte des Zweiten Weltkriegs. Er verdrängte etwa 12.000 Tonnen und fungierte als Anführer einer eigenen Patrouillenflotte."
 ITA_heavy_cruiser_4:0 "Garibaldi-Klasse"
 ITA_heavy_cruiser_4_desc:0 "Die Garibaldi-Klasse ist eine hypothetische Klasse schwerer Kreuzer aus der Spätkriegszeit. Sie verdrängte etwa 14.000 Tonnen, war mit acht 203-mm-OTO/Ansaldo-Geschützen gut bewaffnet und konnte mit den meisten Flugzeugträgern und anderen Großkampfschiffen mithalten."
 ITA_battle_cruiser_1:0 "Caracciolo-Klasse"
 ITA_battle_cruiser_1_desc:0 "Die Francesco-Caracciolo-Klasse war eine Klasse von Großkampfschiffen, die kurz nach dem Ersten Weltkrieg vorgeschlagen wurde. Die Schiffe verdrängten etwa 34.000 Tonnen, waren gut gepanzert und für ihre Größe und ihr Alter relativ schnell. Nur ein Schiff wurde vom Stapel gelassen, der Bau wurde jedoch 1921 eingestellt."
 ITA_battle_cruiser_2:0 "Principe Amedeo-Klasse"
 ITA_battle_cruiser_2_desc:0 "Die Principe-Amedeo-Klasse ist ein hypothetischer Schlachtkreuzer, der Ende der 1930er Jahre vom Stapel gelaufen wäre. Er wäre mit den französischen Schlachtkreuzern der Dunkerque vergleichbar, hätte eine Verdrängung von etwa 30.000 Tonnen und wäre mit 320-mm-Geschützen in der Hauptbatterie bewaffnet."
 ITA_battleship_1:0 "Conte Di Cavour Klasse"
 ITA_battleship_1_desc:0 "Die Schlachtschiffe der Conte-di-Cavour-Klasse wurden im Ersten Weltkrieg in Dienst gestellt. Sie besaßen 305-mm-Armstrong-Vickers-Geschütze, verdrängten 23.000 Tonnen und erreichten eine Höchstgeschwindigkeit, die mit anderen Schlachtschiffen der Dreadnought-Ära vergleichbar war. Ab 1933 wurden die beiden verbliebenen Schiffe der Klasse grundlegend überarbeitet. Größe, Bewaffnung und Leistung wurden verbessert, um mit den damals aufkommenden „schnellen“ Schlachtschiffen mithalten zu können."
 ITA_battleship_2:0 "Caio Duilio-Klasse"
 ITA_battleship_2_desc:0 "Die Schlachtschiffe der Caio Duilio-Klasse wurden ursprünglich zu Beginn des Ersten Weltkriegs in Dienst gestellt. Beide Schiffe wurden jedoch zwischen 1937 und 1940 einer vollständigen Neukonstruktion unterzogen. Dieses Modell stellt die Neukonstruktion dar. Die Bewaffnung wurde auf zehn 320-mm-Geschütze vom Typ M1934 aufgerüstet, die Verdrängung beträgt nun 29.000 Tonnen und die Geschwindigkeit reicht aus, um sie als „schnelle“ Schlachtschiffe zu klassifizieren. "
 ITA_battleship_3:0 "Littorio-Klasse"
 ITA_battleship_3_desc:0 "Die Littorio-Klasse, auch bekannt als Vittorio-Veneto-Klasse, war das modernste Schlachtschiff Italiens im Zweiten Weltkrieg. Sie verdrängten über 40.000 Tonnen und waren für ihre Größe sehr schnell. Sie bildeten das Rückgrat der italienischen Flotte."
 ITA_battleship_4:0 "Impero-Klasse"
 ITA_battleship_4_desc:0 "Die Impero-Schlachtschiffe waren eine hypothetische Klasse von Schlachtschiffen aus der Spätkriegszeit. Sie verdrängten etwa 43.000 Tonnen, waren mit 381-mm-Ansaldo-Geschützen bewaffnet und gut gepanzert."
 ITA_carrier_1:0 "Giuseppe Miraglia-Klasse"
 ITA_carrier_1_desc:0 "Die Giuseppe-Miraglia-Klasse ist eine hypothetische Klasse von Flugzeugträgern aus der frühen Zwischenkriegszeit. Sie ist vergleichbar mit den US-amerikanischen Trägern der Lexington-Klasse und den japanischen Trägern Kaga oder Akagi."
 ITA_carrier_2:0 "Falco-Klasse"
 ITA_carrier_2_desc:0 "Die Falco ist eine hypothetische Klasse italienischer Flugzeugträger aus der Zwischenkriegszeit. Sie waren vergleichbar mit den US-amerikanischen Flugzeugträgern der Yorktown-Klasse und dem britischen Flugzeugträger Ark Royal. Sie verdrängten etwa 21.000 Tonnen, hatten eine ordentliche Panzerung und transportierten eine durchschnittliche Anzahl an Flugzeugen."
 ITA_carrier_3:0 "Aquila-Klasse"
 ITA_carrier_3_desc:0 "Die Aquila war ein geplanter Umbau des Ozeandampfers Roma. Der Umbau sollte 1941 beginnen, wurde jedoch nie abgeschlossen. Nach Fertigstellung hätte die Aquila eine Verdrängung von 23.500 Tonnen und wäre mit den Flugzeugträgern der japanischen Hiyo-Klasse und der britischen Indomitable-Klasse vergleichbar."
 ITA_carrier_4:0 "Sparviero-Klasse"
 ITA_carrier_4_desc:0 "Die Sparviero war ebenfalls ein geplanter Umbau des Ozeandampfers Augustus. Der Umbau begann Ende 1942, kam aber nicht weit. Deutschland versenkte das Schiff nach der Kaperung nach dem italienischen Waffenstillstand. Der Träger hätte 30.400 Tonnen verdrängt, wäre gut gepanzert gewesen und hätte über eine starke Flugabwehrbatterie verfügt."
 ITA_SH_battleship_1:0 "Regina Margherita Klasse"
 ITA_SH_battleship_1_desc:0 "Die Regina-Margherita-Klasse ist eine hypothetische Klasse schwerer Schlachtschiffe, die kurz vor Kriegsbeginn vom Stapel gelassen worden wäre. Sie wären mit den japanischen Schlachtschiffen der Yamato-Klasse vergleichbar. Sie wären sehr gut gepanzert, hätten eine Wasserverdrängung von etwa 60.000 Tonnen und wären mit 406-mm-Geschützen bewaffnet."
 ITA_SH_battleship_2:0 "Regina Elena Klasse"
 ITA_SH_battleship_2_desc:0 "Die Regina-Elena-Klasse ist eine hypothetische Klasse schwerer Schlachtschiffe, die etwa zum Zeitpunkt des Kriegseintritts Italiens vom Stapel gelassen werden sollte. Sie waren vergleichbar mit den von den USA geplanten Schlachtschiffen der Montana-Klasse. Sie waren stark gepanzert, verdrängten über 70.000 Tonnen und waren in ihrer Hauptbatterie mit 406-mm-Geschützen bewaffnet."
 ### JAP - JAPAN ###
 JAP_submarine_1:0 "Kaichu-Klasse"
 JAP_submarine_1_desc:0 "Die U-Boote der Kaichu-Klasse wurden nach dem Ersten Weltkrieg auf Basis früherer U-Boote gebaut. Diese mittelgroßen U-Boote waren ausreichend bewaffnet, verfügten über eine gute Reichweite und waren für ihre Zeit recht schnell, waren aber 1938 etwas veraltet. Insgesamt wurden 42 U-Boote des Kaichu-Typs für die IJN gebaut, und die Serie umfasste sieben Varianten."
 #JAP_submarine_1b: "Kaidai III Class"
 JAP_submarine_2:0 "Kaidai VI-Klasse"
 JAP_submarine_2_desc:0 "Die U-Boote der Kaidai VI-Klasse waren große und gut bewaffnete U-Boote mit großer Reichweite und relativ guter Geschwindigkeit. Die gesamte Kaidai-Serie bestand aus stabilen und erfolgreichen Booten, die der IJN bis zum Ende des Pazifikkriegs dienten."
 JAP_submarine_3:0 "Ko/Otsu/Hei-gata-Klasse"
 JAP_submarine_3_desc:0 "Die Boote der Ko-gata-, Otsu-gata- und Hei-gata-Klasse waren große Kreuzer-U-Boote, die als Kommandoschiffe für U-Boot-Geschwader dienten. Sie waren mit hochentwickelter Funkausrüstung und schwerer Torpedobewaffnung ausgestattet und ermöglichten aufgrund ihrer Größe einen großen Einsatzradius. Die Ko- und Otsu-gata-Klassen führten außerdem Wasserflugzeuge für Aufklärungsaufgaben mit."
 #JAP_submarine_3b: "Ko/Otsu/Hei-gata Class (late)"
 JAP_submarine_4:0 "Sen-Toku-Klasse"
 JAP_submarine_4_desc:0 "Die U-Boote der Sen-Toku-Klasse waren die größten Tauchboote des Zweiten Weltkriegs. Sie waren U-Boot-Flugzeugträger mit schwerer Torpedobewaffnung, ausreichend leichter Flugabwehr und aufgrund ihrer Größe und Motoren relativ schnell und weitreichend. Sie konnten drei Aichi M6A Seiran-Flugzeuge für Aufklärungs- und begrenzte Angriffsaufgaben transportieren."
 #JAP_submarine_4b: "Sen-Taka Class"
 JAP_destroyer_1:0 "Minekaze-Klasse"
 JAP_destroyer_1_desc:0 "Die Zerstörer der Minekaze-, Kamikaze- und Mutsuki-Klasse waren für ihre Zeit gut mit Oberflächengeschützen und Torpedos bewaffnet, verfügten jedoch nur über begrenzte Flugabwehrwaffen. Zu Beginn des Zweiten Weltkriegs galten sie als veraltet und wurden meist auf Nebenrollen beschränkt."
 #JAP_destroyer_1b: "Fubuki Class"
 JAP_destroyer_2:0 "Asashio-Klasse"
 JAP_destroyer_2_desc:0 "Die Zerstörer der Asashio-Klasse waren die ersten japanischen Zerstörer mit einer Verdrängung von über 2.000 Tonnen und die ersten, die mit Sonar ausgestattet waren. Sie verfügten über schwere Torpedowaffen und ausreichend leichte Flugabwehrgeschütze sowie einen etwas größeren Einsatzradius als die ältere Fubuki-Klasse."
 #JAP_destroyer_2b_ "Kagero Class"
 JAP_destroyer_3:0 "Akizuki-Klasse"
 JAP_destroyer_3_desc:0 "Die Zerstörer der Akizuki-Klasse waren gut bewaffnet und verfügten über Oberflächengeschütze und Torpedos, eine ausreichende Flugabwehr sowie dringend benötigte zusätzliche Wasserbomben. Von den 39 geplanten Schiffen wurden nur 12 fertiggestellt, bevor die Serie eingestellt wurde."
 JAP_destroyer_4:0 "Shimakaze-Klasse"
 JAP_destroyer_4_desc:0 "Die Shimakaze-Klasse war zum Zeitpunkt ihrer Fertigstellung der schnellste Zerstörer der Welt. Es handelte sich um einen Zerstörer-Prototyp zur Erprobung neuer Hochtemperatur- und Hochdruckturbinen. Sie war extrem schnell und schwer mit Torpedos bewaffnet, was jedoch einen geringeren Einsatzradius bedeutete."
 JAP_light_cruiser_1:0 "Tenryu-Klasse"
 JAP_light_cruiser_1_desc:0 "Die Schiffe der Tenryu-Klasse verdrängten rund 4.400 Tonnen und waren im Vergleich zu ähnlichen Schiffen anderer Marinen nur leicht bewaffnet. Diese Mängel wurden jedoch durch ihre hohe Geschwindigkeit und ausreichende Torpedobewaffnung ausgeglichen. Sie waren als Flaggschiffe für Zerstörerflottillen konzipiert und stellten somit eine Zwischenklasse zwischen Leichten Kreuzern und Zerstörern dar."
 #JAP_light_cruiser_1b: "Kuma Class"
 #JAP_light_cruiser_1c: "Sendai Class"
 JAP_light_cruiser_2:0 "Leichte Mogami-Klasse"
 JAP_light_cruiser_2_desc:0 "Kreuzer der Mogami-Klasse waren schwer bewaffnet, mit guter Panzerung und starken Motoren ausgestattet, die hohe Geschwindigkeiten ermöglichten. Sie wurden gegenüber ihrem ursprünglichen Entwurf waffentechnisch verbessert und als Schwere Kreuzer neu klassifiziert. Die gute Flugabwehr und die hohe Geschwindigkeit ermöglichten Einsätze über große Entfernungen."
 JAP_light_cruiser_3:0 "Agano-Klasse"
 JAP_light_cruiser_3_desc:0 "Die leichten Kreuzer der Agano-Klasse wurden in erster Linie als Flottillenführer für Zerstörergeschwader konzipiert. Sie waren schnell und mit drei 152-mm-Zwillingsgeschützen bewaffnet, doch die begrenzte Flugabwehr und die dünnen Panzerplatten waren große Nachteile dieses Designs."
 #JAP_light_cruiser_3b: "Oyodo Class"
 JAP_light_cruiser_4:0 "Agatsuma-Klasse"
 JAP_light_cruiser_4_desc:0 "Die Agatsuma-Klasse war eine Klasse leichter Kreuzer, von denen bis Kriegsende keine Schiffe mehr gebaut wurden. Die Kreuzer sollten schnell und schwer bewaffnet, aber leicht gepanzert sein, um die Flotten und Träger vor feindlichen Flugzeugen zu schützen."
 JAP_heavy_cruiser_1:0 "Furutaka-Klasse"
 JAP_heavy_cruiser_1_desc:0 "Die Schweren Kreuzer der Furutaka-Klasse und der darauffolgenden Aoba-Klasse waren die ersten Schweren Kreuzer der Kaiserlich Japanischen Marine. Sie orientierten sich an der amerikanischen Omaha- und der britischen Hawkins-Klasse. Später wurden sie modernisiert und erhielten neue Bewaffnung und bessere Motoren."
 #JAP_heavy_cruiser_1b: "Myoko Class"
 JAP_heavy_cruiser_2:0 "Schwere Mogami-Klasse"
 JAP_heavy_cruiser_2_desc:0 "Die schwere Mogami-Klasse war eine aufgerüstete und neu klassifizierte Klasse leichter Kreuzer. Dies machte sie zu schnellen, schwer bewaffneten und gut gepanzerten Kreuzern. Ihre große Reichweite ging auf Kosten einer geringeren Panzerung."
 JAP_heavy_cruiser_3:0 "Tonklasse"
 JAP_heavy_cruiser_3_desc:0 "Die schweren Kreuzer der Tone-Klasse wurden ursprünglich als leichte Kreuzer konzipiert, jedoch mit stärkerer Bewaffnung ausgestattet. Ihre Besonderheit bestand darin, dass die gesamte Bewaffnung im Bugbereich positioniert war, während der hintere Teil des Schiffes zum Transport und zur Wartung von Wasserflugzeugen diente, die nach feindlichen Streitkräften Ausschau hielten."
 JAP_heavy_cruiser_4:0 "Ibuki-Klasse"
 JAP_heavy_cruiser_4_desc:0 "Die schweren Kreuzer der Ibuki-Klasse waren die letzten Kreuzer, die Japan vor Kriegsende baute. Es handelte sich um verbesserte Versionen der schweren Kreuzer der Mogami-Klasse mit gleichem Aufbau und gleicher Bewaffnung, jedoch mit modernerer Flugabwehr und Motoren."
 JAP_battle_cruiser_1:0 "Amagi-Klasse"
 JAP_battle_cruiser_1_desc:0 "Die Amagi-Schlachtkreuzer waren eine Reihe geplanter Schlachtkreuzer im Rahmen des ehrgeizigen Plans der japanischen Marine, über acht Schlachtschiffe und acht Schlachtkreuzer zu verfügen. Nach dem Washingtoner Flottenabkommen wurden die Amagi-Schiffe verschrottet und eines zu einem Flugzeugträger umgebaut."
 JAP_battle_cruiser_2:0 "Design B-65"
 JAP_battle_cruiser_2_desc:0 "Die Schlachtkreuzer des Typs B-65 waren schnelle, mäßig gepanzerte Schiffe mit guter Flugabwehr und moderner Bewaffnung. Sie wurden für den Kampf gegen die neuen schweren Kreuzer der US Navy und zum Schutz der Flottenträger der IJN entwickelt und wären nach ihrer Fertigstellung eine ernstzunehmende Macht gewesen."
 JAP_battleship_1:0 "Tosa-Klasse"
 JAP_battleship_1_desc:0 "Die Schlachtschiffe der Tosa-Klasse wurden Anfang der 1920er Jahre bestellt. Sie waren größere Versionen der Vorgängerklasse Nagato und besaßen zusätzlich einen 41-cm-Geschützturm mit zwei Kanonen. Beide Schiffe liefen Ende 1921 vom Stapel. Kurz nach dem Stapellauf traten die Bedingungen des Washingtoner Flottenabkommens in Kraft. Gemäß diesem Abkommen wurde die Tosa außer Dienst gestellt und die Kaga zu einem Flugzeugträger umgebaut."
 #JAP_battleship_1b: "Ise Class" (refit version)
 #JAP_battleship_1c: "Nagato Class" (refit version)
 JAP_battleship_2:0 "Kongo-Klasse"
 JAP_battleship_2_desc:0 "Die Kongo-Schlachtschiffe wurden kurz vor dem Ersten Weltkrieg als Schlachtkreuzer für die IJN gebaut, Ende der 1930er Jahre jedoch stark modernisiert und als erstklassige schnelle Schlachtschiffe neu klassifiziert. Ihre Panzerung, Geschütze und Motoren wurden drastisch verbessert, und die Kongos erwiesen sich als die schnellsten japanischen Schlachtschiffe des Krieges."
 JAP_battleship_3:0 "Tajima-Klasse"
 JAP_battleship_3_desc:0 "Die Tajima-Klasse war eine hypothetische Klasse schneller Schlachtschiffe, die günstiger und schneller zu bauen sein sollten als die riesigen Schlachtschiffe der Yamato-Klasse. Sie nutzten die älteren Kanonen früherer Schlachtschiffe, boten aber gleichzeitig hohe Geschwindigkeit, ausreichende Panzerung und Flugabwehr."
 JAP_battleship_4:0 "Iwami-Klasse"
 JAP_battleship_4_desc:0 "Die Iwami-Klasse war eine hypothetische Klasse von Schlachtschiffen, die neue Methoden zur Beschleunigung des Baus nutzte. Sie waren mit neuen Kanonen und schweren Flugabwehrgeschützen gut bewaffnet und konnten es hinsichtlich der Feuerkraft mit jedem ähnlich bewaffneten Schiff aufnehmen. Die daraus resultierenden Verbesserungen führten jedoch zu einer schwereren und damit etwas langsameren Schiffsklasse."
 JAP_SH_battleship_1:0 "Yamato-Klasse"
 JAP_SH_battleship_1_desc:0 "Die Yamato-Klasse bestand aus den schwersten Schlachtschiffen aller Zeiten mit einer Wasserverdrängung von 72.000 Tonnen. Die Schiffe sollten im Rahmen des Friedensgöttinnen-Plans der Stolz und die Macht der japanischen Marine sein. Jedes Schiff war mit neun 460-Millimeter-Schiffsgeschützen ausgestattet – der größten Schiffsartillerie, die je auf einem Kriegsschiff installiert wurde."
 JAP_SH_battleship_2:0 "Super Yamato-Klasse"
 JAP_SH_battleship_2_desc:0 "Bei der hypothetischen Super-Yamato-Klasse diente die Yamato als Basis, die Waffen sollten jedoch mit einer Hauptbewaffnung aus 51-cm-Kanonen und einer starken Flugabwehr des neuesten Typs noch stärker sein. Ihre Panzerungsstärke sollte sogar Granaten aus den eigenen Kanonen standhalten, und sie sollten eine Wasserverdrängung von etwa 70.000 bis 80.000 Tonnen ermöglichen."
 JAP_carrier_1:0 "Kaga-Klasse"
 JAP_carrier_1_desc:0 "Der Flugzeugträger Kaga war Japans erster Flottenträger. Ursprünglich war er ein Schlachtschiff, wurde aber als Flugzeugträger fertiggestellt. Das Ergebnis war ein großer und schwer gepanzerter Träger mit begrenztem Verbesserungspotenzial. Für die Kaiserlich Japanische Marine war er jedoch eine wichtige Erfahrung im Flugzeugträgerbau."
 #JAP_carrier_1b: "Akagi Class" (refit Kaga class)
 JAP_carrier_2:0 "Soryu-Klasse"
 JAP_carrier_2_desc:0 "Soryu und Hiryu wurden mit einer spiegelverkehrten Inselstruktur konstruiert, um die Bergung von Flugzeugen zu beschleunigen, während sie nebeneinander fuhren. Sie waren schnelle Träger mit Platz für große Luftgruppen, aber nur minimal gepanzert. Sie verdrängten 20.000 Tonnen und ihre großen Motoren ermöglichten hohe Geschwindigkeiten und eine große Reichweite."
 #JAP_carrier_2b: "Hiryu Class"
 JAP_carrier_3:0 "Shokaku-Klasse"
 JAP_carrier_3_desc:0 "Die Flugzeugträger der Shokaku-Klasse waren auf hohe Geschwindigkeit, großen Aktionsradius, starken Schutz und eine große Flugzeugkapazität ausgelegt, was sie zu hervorragenden Trägern machte. Dank verbesserter Konstruktionsmethoden verdrängten sie voll beladen 33.000 Tonnen und konnten mehr Schäden überstehen als die meisten zeitgenössischen Träger."
 #JAP_carrier_3b: "Hiyo Class"
 JAP_carrier_4:0 "Taiho-Klasse"
 JAP_carrier_4_desc:0 "Der Flugzeugträger der Taiho-Klasse war der erste voll gepanzerte Träger der IJN. Sein gepanzertes Flugdeck hielt mehreren Bomben- und Torpedotreffern stand und war dennoch einsatzfähig. Ein großer Luftverband und schwere Flugabwehrwaffen ermöglichten nicht nur Selbstverteidigung, sondern auch eine Machtprojektion gegenüber den feindlichen Streitkräften."
 #JAP_carrier_4b: "Shinano Class"
 ### SOV - SOVIET UNION ###
 SOV_submarine_1:0 "AG-Klasse"
 SOV_submarine_1_desc:0 "U-Boote der Amerikansky Golland-Klasse (Amerikanisches Holland) wurden in Kanada gebaut und im Ersten Weltkrieg nach Russland geliefert, wo sie schließlich zusammengebaut wurden. Sie waren eine direkte Kopie der erfolgreichen Holland-U-Boote. Sie waren als für ihre Zeit gut bewaffnete Seeboote konzipiert."
 #SOV_submarine_1b: "Series I Debakrist"
 SOV_submarine_2:0 "Serie V Shchuka"
 SOV_submarine_2_desc:0 "Die U-Boote der Schuka-Klasse der Serie V waren die zweitgrößten U-Boote der sowjetischen Marine. Ihre große Zahl rührte von ihrem Einsatz in den vier Flotten der Sowjetunion her: Schwarzes Meer, Ostsee, Nordsee und Pazifik. Es handelte sich um mittelgroße Patrouillen-U-Boote mit guter Torpedobewaffnung und Seetüchtigkeit."
 #SOV_submarine_2b: "Series IX Srednyaya" (Stalinets<-unofficial name)
 #SOV_submarine_2c: "Series X Shchuka"
 SOV_submarine_3:0 "Serie XIV K-Klasse"
 SOV_submarine_3_desc:0 "Die U-Boote der Serie XIV waren große Kreuzfahrt-U-Boote mit erweiterter Reichweite. Sie stellten im Wesentlichen eine verbesserte Version der Prawda-Klasse der Serie IV dar. Diese U-Boote waren mit schweren Überwassergeschützen und Torpedos bewaffnet. Sie hatten eine große Reichweite, waren aber nur mäßig seetüchtig."
 SOV_submarine_4:0 "Projekt 611"
 SOV_submarine_4_desc:0 "Die U-Boote des Projekts 611 (NATO-Codename: Zulu) waren die erste U-Boot-Klasse der sowjetischen Marine nach dem Zweiten Weltkrieg. Ihr Design basierte auf den deutschen U-Booten des Typs XXI und sie sollten die älteren Boote der K-Klasse XIV ersetzen. Es handelte sich um große, hochseetaugliche U-Boote mit schwerer Torpedobewaffnung und großer Reichweite. Sie dienten als Grundlage für die Nachfolge-U-Boote der Klassen 613 (NATO-Codename: Whiskey) und 641 (NATO-Codename: Foxtrot)."
 SOV_destroyer_1:0 "Orfey-Klasse"
 SOV_destroyer_1_desc:0 "Die Zerstörer der Orfey-Klasse waren eine verbesserte Version der vorherigen Novik-Klasse. Sie verfügten über eine für ihre Größe ausreichende Oberflächen- und Flugabwehrbewaffnung, eine eher geringe Reichweite, aber eine gute Geschwindigkeit und eine schwere Torpedobewaffnung. Die nachfolgenden Klassen Fidonisy und Izyaslav waren weiter verbesserte Versionen dieser Klasse mit größerer Hauptbewaffnung und Rumpfgröße."
 #SOV_destroyer_1b: "Leningrad & Minsk Class"
 SOV_destroyer_2:0 "Gnevny-Klasse"
 SOV_destroyer_2_desc:0 "Die Zerstörer der Gnewny-Klasse (Projekt 7) wurden im Rahmen des Schiffbauprogramms von 1933 bis 1938 genehmigt. Die Klasse selbst war stark vom italienischen Zerstörer Maestrale beeinflusst und galt als erfolgreiches Design. Ihre Verdrängung lag im Bereich von 1.600 bis 2.000 Tonnen, sie waren gut bewaffnet und verfügten über ausreichende Flugabwehr- und Torpedobewaffnung. Dank der leistungsstarken Motoren waren sie schnelle Schiffe mit kurzer Reichweite."
 SOV_destroyer_3:0 "Soobrazitelnyi-Klasse"
 SOV_destroyer_3_desc:0 "Die Zerstörer der Soobrazitelnyi-Klasse (Projekt 7U) waren eine verbesserte Version der vorherigen Gnevny-Klasse. Ihre Motoren wurden überarbeitet und sie verfügten über eine stärkere Flugabwehrbewaffnung. Sie verdrängten zwischen 1.900 und 2.400 Tonnen, und ihre Geschwindigkeit und Reichweite entsprachen denen der Gnevny-Klasse."
 #SOV_destroyer_3b: "Ognevoy Class"
 SOV_destroyer_4:0 "Skoryi-Klasse"
 SOV_destroyer_4_desc:0 "Die Skoryi-Klasse (Projekt 30bis) war eine Weiterentwicklung der Ognewoy-Klasse. Die größere Größe und Verdrängung (2.500–3.100 Tonnen) führte zu einem stabileren Schiff mit größerer Reichweite. Alle Schiffe wurden nach dem Krieg modular gebaut, was zu schnellen Bau- und Einsatzzeiten führte. Ihre Bewaffnung entsprach der der vorherigen Ognewoy-Klasse, die Hauptgeschütze waren jedoch in Doppeltürmen statt in Einzeltürmen untergebracht."
 SOV_light_cruiser_1:0 "Krasniy Krym-Klasse"
 SOV_light_cruiser_1_desc:0 "Der Bau des Kreuzers der Krasniy-Krym-Klasse, ursprünglich Swetlana-Klasse, begann vor dem Ersten Weltkrieg, doch der Krieg und die darauffolgende Revolution verzögerten die Fertigstellung der gesamten Klasse. Mitte/Ende der 1920er Jahre wurde sie schließlich zusammen mit ihrem Halbschwesterschiff Tscherwona Ukraine (ehemals Admiral Nachimow) in die sowjetische Marine aufgenommen. Diese Schiffe waren die ersten turbinengetriebenen Kreuzer der Kaiserlich Russischen Marine. Für ihre Zeit waren sie schwer bewaffnet und gut gepanzert."
 SOV_light_cruiser_2:0 "Komsomolez-Klasse"
 SOV_light_cruiser_2_desc:0 "Die leichten Kreuzer der Komsomolez-Klasse waren eine Reihe hypothetischer Schiffe. Sie stellten eine Mischung aus alten und neuen Technologien dar. Durch die Verwendung der unvollständigen Rümpfe der Swetlana- und Admiral-Nachimow-Klassen konnten die Baukosten gesenkt werden. Ausgestattet mit sechs Zwillingstürmen mit kleineren Geschützen im Zerstörerkaliber und ausreichender Flugabwehr eigneten sie sich für Aufklärungsfahrten und die Rolle eines Zerstörer-Flottillenführers. Das Gesamtbild der Schiffe weist Ähnlichkeiten mit den Kreuzern der Kirow-Klasse auf."
 SOV_light_cruiser_3:0 "Chapayev-Klasse"
 SOV_light_cruiser_3_desc:0 "Die Kreuzer der Tschapajew-Klasse (Projekt 68) basierten auf den Kreuzern der Kirow-Klasse (Projekt 26) und wurden im Schiffbauprogramm 1938–1943 zugelassen. Als erste echte leichte Kreuzer der sowjetischen Marine verfügten sie über eine starke Überwasser- und Luftabwehrbewaffnung sowie eine ausreichende Torpedobewaffnung. Insgesamt waren es gute Schiffe mit dickem Panzergürtel, hoher Geschwindigkeit, guter Reichweite und einer Verdrängung von 10.500 bis 14.000 Tonnen. Aufgrund des Krieges und der Invasion der deutschen Streitkräfte wurden viele Schiffe dieser Klasse abgesagt, die übrigen erst nach Kriegsende fertiggestellt."
 SOV_light_cruiser_4:0 "Swerdlow-Klasse"
 SOV_light_cruiser_4_desc:0 "Die Kreuzer der Swerdlow-Klasse (Projekt 68bis) waren die letzten Kanonenkreuzer der sowjetischen Marine und stellten verbesserte Versionen der vorhergehenden Tschapajew-Klasse dar. Im Vergleich zu den Tschapajew-Klassen verfügten sie über die gleiche Hauptbewaffnung, Maschinenanlage und Panzerung, hatten jedoch eine größere Treibstoffkapazität für eine größere Reichweite, verbesserten Unterwasserschutz, eine verbesserte Flugabwehrbatterie und eine etwas bessere Seetüchtigkeit. Sie waren für die Konvoijagd und die Eskorte von Großkampfschiffen konzipiert. Aufgrund des beginnenden Raketenzeitalters wurden viele Schiffe abgesagt oder nicht fertiggestellt."
 SOV_heavy_cruiser_1:0 "Krasniy Kavkaz-Klasse"
 SOV_heavy_cruiser_1_desc:0 "Der Kreuzer Krasnyi Kavkaz, ursprünglich ein leichter Kreuzer der Admiral-Nachimow-Klasse, war die Halbschwester der Tscherwona Ukraine. Krasnyi Kavkaz wurde mit einem modifizierten Design fertiggestellt, das großkalibrige 180-mm-Geschütze und eine stärkere Flugabwehr umfasste. Da es sich um einen umgebauten leichten Kreuzer handelte, war seine Panzerung im Vergleich zu den schweren Kreuzern anderer Marinen dünner."
 SOV_heavy_cruiser_2:0 "Kirov-Klasse"
 SOV_heavy_cruiser_2_desc:0 "Die Kreuzer der Kirow-Klasse (Projekt 26) waren die ersten modernen Kreuzer der sowjetischen Marine. Das Design basierte auf den italienischen Leichten Kreuzern der Raimondo-Montecuccoli-Klasse und wurde im Rahmen des Schiffbauprogramms von 1933 bis 1938 gebaut. Die Schiffe verdrängten zwischen 7.700 und 9.200 Tonnen. Sie waren mit neuen 180-mm-Geschützen in drei Drillingstürmen und einer soliden Flugabwehrbatterie bewaffnet. Ihre starken Motoren ermöglichten eine gute Geschwindigkeit und eine akzeptable Reichweite, während der Panzergürtel im Vergleich zu anderen schweren Kreuzern dünn war."
 #SOV_heavy_cruiser_2b: "Maxim Gorky Class"
 SOV_heavy_cruiser_3:0 "Projekt 22"
 SOV_heavy_cruiser_3_desc:0 "Die Schweren Kreuzer des Projekts 22 wurden Mitte der 1930er Jahre entwickelt, um ähnlichen Schiffen in den Nachbarländern entgegenzuwirken. Der Entwurf sah ein größeres Schiff mit einer Verdrängung zwischen 15.500 und 17.000 Tonnen vor. Sie waren mit vier 240-mm-Drillingskanonen zur Abwehr feindlicher Kreuzer, schwerer Flugabwehr zur Selbstverteidigung und einer größeren Aufklärungsflugzeugflotte zur Feindaufspürung ausgestattet. Ihre Hauptaufgaben bestanden in der Aufklärung feindlicher Streitkräfte und der Konvoijagd. Die Kosten der Schiffe und die Ressourcenvergabe für andere Zwecke führten zum Abbruch des Projekts."
 SOV_heavy_cruiser_4:0 "Projekt 66"
 SOV_heavy_cruiser_4_desc:0 "Die Schweren Kreuzer des Projekts 66 waren der letzte Versuch der sowjetischen Marine, einen reinen Kanonenkreuzer zu konstruieren und zu bauen. Die Designstudien begannen 1943, und die endgültige Version entstand nach dem Krieg. Die Schiffe sollten mit 220-mm-Kanonen in drei Drillingstürmen und einer starken Flugabwehr ausgestattet sein. Die Verdrängung sollte mindestens 26.500 Tonnen betragen. Der Beginn des Raketenzeitalters und der Tod Josef Stalins führten zum Abbruch des Projekts."
 SOV_battle_cruiser_1:0 "Borodino-Klasse"
 SOV_battle_cruiser_1_desc:0 "Die Schlachtkreuzer der Borodino-Klasse waren eine Klasse von vier Schiffen, die 1914, kurz vor dem Ersten Weltkrieg, zugelassen wurden. Sie basierten auf den Schlachtschiffen der Imperatritsa-Mariya-Klasse. Sie folgten der zeitgenössischen russischen Großkampfschiffbaupraxis mit vier Drillingstürmen zur Unterbringung der schweren Hauptbewaffnung, einer starken Sekundärbewaffnung in Kasematten und einem durchgehenden Deck. Sie hatten ein niedriges Profil und einen geringen Tiefgang, um in den seichten Gewässern der Ostsee kämpfen zu können. Wie bei vielen russischen Schiffen dieser Zeit verhinderten der Ausbruch des Ersten Weltkriegs und die Russische Revolution die Fertigstellung dieser Schiffe."
 SOV_battle_cruiser_2:0 "Kronstadt-Klasse"
 SOV_battle_cruiser_2_desc:0 "Die Schlachtkreuzer der Kronshtadt-Klasse (Projekt 69) wurden im Schiffbauprogramm 1938–1943 genehmigt und sollten in den 1940er Jahren fertiggestellt werden. Der ursprüngliche Entwurf sah einen großen Schweren Kreuzer mit 23.000 Tonnen vor. Nach dem Aufkommen deutscher Scharnhorst-Schlachtkreuzer wurden die Schiffe jedoch auf eine Verdrängung von 35.000 Tonnen umgebaut. Als die Feindseligkeiten zwischen Deutschland und der Sowjetunion ausbrachen, wurde der Bau der Schiffe unterbrochen und schließlich abgebrochen. Alternativpläne sahen vor, die unfertigen Rümpfe im Rahmen des Projekts 69AV zu Flugzeugträgern umzubauen."
 SOV_battleship_1:0 "Marat-Klasse"
 SOV_battleship_1_desc:0 "Die Schlachtschiffe der Marat-Klasse (ursprünglich Gangut-Klasse) waren Schlachtschiffe des Ersten Weltkriegs und die ersten Dreadnoughts der Kaiserlich Russischen Marine. Ihr Design und die Turmanordnung dienten als Grundlage für alle nachfolgenden Schlachtschiff- und Schlachtkreuzerklassen. Nur drei Schiffe überlebten die Wirren der Russischen Revolution. Sie wurden in den 1930er Jahren modernisiert und umgerüstet, was zu einem hohen, fast pagodenartigen Aufbau führte. Sie verfügten über moderne Elektronik und eine starke Flugabwehr."
 SOV_battleship_2:0 "Projekt 21"
 SOV_battleship_2_desc:0 "Die Schlachtschiffe des Projekts 21 wurden Mitte der 1930er Jahre als Teil von Stalins Hochseeflotte entworfen. Sie sollten den britischen Schlachtschiffen der Nelson-Klasse sehr ähnlich sein. Die Schiffe sollten eine Verdrängung von rund 41.000 Tonnen haben und mit neun 406-mm-Kanonen in drei Drillingstürmen (alle vorne) sowie einer Sekundärbewaffnung von zwölf 152-mm-Geschützen bewaffnet sein. Ihre gute Flugabwehr und die dicke Panzerung boten eine starke Verteidigung gegen Luft- und Oberflächenziele. Das Projekt wurde schließlich eingestellt, aber einige seiner Elemente wurden in den Schlachtschiffen der Sowjetski-Sojus-Klasse (Projekt 23) verwendet."
 SOV_battleship_3:0 "Lenin-Klasse"
 SOV_battleship_3_desc:0 "Das Schlachtschiff der Lenin-Klasse war ein hypothetischer Entwurf, um den deutschen Schlachtschiffen der Bismarck- und der US-amerikanischen South Dakota-Klasse Paroli zu bieten. Seine neun 406-mm-Kanonen in drei Drillingstürmen würden für ausreichend Feuerkraft sorgen, während seine 130-mm-Flugabwehrgeschütze, die dicke Panzerung und die großen Motoren sein Überleben im Gefecht sichern würden."
 SOV_battleship_4:0 "Stalingrad-Klasse"
 SOV_battleship_4_desc:0 "Die Großkampfschiffe der Stalingrad-Klasse (Projekt 82) sollten der sowjetischen Marine in der Nachkriegszeit die wichtigste Feuerkraft liefern. Sie waren schnell, gut bewaffnet und gepanzert. Der Bau begann nach dem Krieg, doch der Tod Josef Stalins führte zur Einstellung der Arbeiten an diesen Schiffen. Es gab jedoch Pläne, mindestens ein modifiziertes Modell fertigzustellen, das mit sowjetischen V-2-Raketen ausgestattet war."
 SOV_SH_battleship_1:0 "Sovetsky Sojus-Klasse"
 SOV_SH_battleship_1_desc:0 "Die Sowjetski-Sojus-Klasse (Projekt 23) war die letzte Schlachtschiffklasse, die von den sowjetischen Werften gebaut wurde. Sie wurde im Schiffbauprogramm 1938–1943 genehmigt. Geplant waren vier Schiffe mit einer Standardverdrängung von 59.000 Tonnen, drei Drillingstürmen mit 406-mm-Kanonen sowie schwerer Sekundär- und Flugabwehrbewaffnung. Sie verfügten außerdem über leistungsstarke Motoren, um ihre sehr dicke Gürtelpanzerung unterzubringen. Der Ausbruch des Krieges verhinderte die Fertigstellung dieser Schiffe."
 SOV_SH_battleship_2:0 "Projekt 23bis"
 SOV_SH_battleship_2_desc:0 "Die Schlachtschiffe der Projekt-23bis-Klasse waren eine modifizierte und verbesserte Version der vorherigen Sowjetski-Sojus-Klasse (Projekt 23). Im Vergleich zu ihren Vorgängern verfügten sie über vier Drillingstürme mit den gleichen 406-mm-Kanonen, eine verstärkte Gürtelpanzerung, eine überarbeitete Anordnung der Sekundärgeschütze und eine stärkere Flugabwehrbewaffnung."
 SOV_carrier_1:0 "Ismail-Klasse"
 SOV_carrier_1_desc:0 "Der Flugzeugträger der Ismail-Klasse war ein direkter Umbau des unfertigen Rumpfes ihres Namensvetters, des Schlachtkreuzers der Borodino-Klasse. Aufgrund des Umbaus erhielt das Schiff einen dicken Panzergürtel sowie eine für damalige Verhältnisse starke Oberflächen- und Flugabwehrbewaffnung. Eine mittelgroße Luftgruppe sollte der Flotte die nötige Luftunterstützung bieten. Das Projekt wurde aufgrund der Kosten und der Lage der sowjetischen Schiffbauindustrie nach der Oktoberrevolution nicht durchgeführt."
 SOV_carrier_2:0 "Krasnyi Vozdukh"
 SOV_carrier_2_desc:0 "Der Flugzeugträger der Krasnyj-Wosduch-Klasse war ein hypothetischer Entwurf, der der sowjetischen Marine die Luftprojektion über ihre Flotten ermöglichen sollte. Sie waren ähnlich groß wie die britischen Ark-Royal- oder japanischen Hiryu-Klassen, verfügten jedoch über zusätzliche Sekundärgeschütze gegen Oberflächenziele und ausreichende Flugabwehrgeschütze zur Luftunterstützung. Die verstärkte Panzerung führte zu einer etwas kleineren Luftgruppe im Vergleich zu diesen Klassen."
 SOV_carrier_3:0 "Projekt 71B"
 SOV_carrier_3_desc:0 "Die Träger des Projekts 71B wurden Mitte bis Ende der 1930er Jahre entworfen. Sie sollten die von Stalin in seinem Plan angeordneten neuen Überwasserflotten aus der Luft unterstützen. Geplant waren zwei Schiffe mit einer Verdrängung von rund 30.000 Tonnen, starker Flugabwehr, guter Panzerung und einer ausreichenden Luftgruppe. Der deutsche Einmarsch führte zum Abbruch des Baus dieser Schiffe."
 SOV_carrier_4:0 "Projekt 72"
 SOV_carrier_4_desc:0 "Die Flugzeugträger des Projekts 72 waren verbesserte Versionen der Vorgängerschiffe des Projekts 71. Die Anfang der 1940er Jahre abgeschlossenen Designstudien führten zu einem größeren Schiff mit dünnerer Panzerung. Der zusätzliche Platz wurde genutzt, um eine stärkere Flugabwehr zu installieren und eine größere Luftgruppe transportieren zu können."
 ### USA - USA ###
 USA_submarine_1:0 "S-Klasse"
 USA_submarine_1_desc:0 "Die Schnellboote, allgemein bekannt als Sugar Boats, waren eine Serie von 51 U-Booten, die in den 1920er Jahren entworfen und gebaut wurden. Im Vergleich zur O &amp; R-Boot-Serie des Ersten Weltkriegs waren die Schnellboote größer und ermöglichten eine größere Reichweite und mehr Torpedoladungen, obwohl die Klasse nur über vier nach vorne gerichtete 21-Zoll-Rohre verfügte. Trotz ihres Alters (das letzte Schnellboot wurde 1924 in Dienst gestellt) stellen die Schnellboote einen bedeutenden Teil der stehenden U-Bootflotte der US Navy dar."
 #USA_submarine_1b: "Barracuda Class"
 USA_submarine_2:0 "Schweinswal-Klasse"
 USA_submarine_2_desc:0 "Das U-Boot der Porpoise-Klasse war das erste moderne U-Boot der US Navy. Es wurde nach einer Reihe experimenteller „V-Boote“ der späten 1920er und frühen 1930er Jahre entworfen und gebaut. Trotz anfänglicher Probleme mit dem vollelektrischen Antrieb war die Klasse vielversprechend und wurde als zukünftiges Design in Betracht gezogen. Die Klasse war mit sechs Torpedorohren und einem 3-Zoll-Deckgeschütz bewaffnet."
 #USA_submarine_2b: "Salmon Class"
 USA_submarine_3:0 "Tambor-Klasse"
 USA_submarine_3_desc:0 "Die Tambor-Klasse war der Höhepunkt jahrelanger Versuche der US-Marine, U-Boote für die Rolle als „Flottenboot“ zu entwickeln und sie in den Gewässern des Pazifischen Ozeans zu bewähren. Die Bewaffnung wurde auf zehn Torpedorohre mit vier feuernden Hecktorpedorohren, ein 3-Zoll-Deckgeschütz und zwei Flugabwehrgeschütze für zusätzlichen Schutz aufgerüstet."
 #USA_submarine_3b: "Gato Class"
 USA_submarine_4:0 "Balao-Klasse"
 USA_submarine_4_desc:0 "Die Balao-Klasse war eine Weiterentwicklung des Designs der Tambor-Klasse. Verbesserungen erfolgten in Form einer Rumpfverstärkung und der Aufrüstung des Deckgeschützes auf ein Kaliber von 5&quot;/24 sowie zahlreichen subtilen Designverbesserungen."
 USA_destroyer_1:0 "Clemson-Klasse"
 USA_destroyer_1_desc:0 "Der Zerstörer der Clemson-Klasse übernahm viele Designelemente seines unmittelbaren Vorgängers, der Wickes-Klasse. Die Clemson-Klasse war im Vergleich zur Wickes-Klasse besser seegängig und mit 4&quot;/50-Kaliber-Hauptgeschützen, einer 3&quot;/23-Kaliber-Flugabwehrkanone und zwölf Torpedorohren bewaffnet. Die Klasse war zwar in die Jahre gekommen und nahezu überholt, stellte aber immer noch den Großteil der Zerstörerflotte der US Navy."
 #USA_destroyer_1b: "Farragut Class"
 USA_destroyer_2:0 "Sims-Klasse"
 USA_destroyer_2_desc:0 "Die Sims-Klasse war der größte 1500-Tonner mit einer stromlinienförmigeren Torpedoanordnung und einem längeren Rumpf. Die verbesserte Feuerkontrolle ermöglichte mit den 5-Zoll-/38-Kaliber-Geschützen und 12 Mittellinien-Torpedorohren bessere Angriffsmöglichkeiten."
 #USA_destroyer_2b: "Benson & Gleaves Class"
 USA_destroyer_3:0 "Fletcher-Klasse"
 USA_destroyer_3_desc:0 "Die Fletcher-Klasse stellte einen großen Fortschritt in Bezug auf die Zerstörerkapazität dar, vor allem dank ihrer Steigerung auf 2500 Tonnen. Unter Beibehaltung der 5&quot;/38-Mehrzweckgeschütze und der Mittellinien-Torpedoanordnung erhielt die Klasse einen zusätzlichen Einzelturm, deutlich verbesserte Flugabwehrwaffen sowie eine verbesserte Reichweite und größere Verdrängung."
 USA_destroyer_4:0 "Allen M Sumner Class"
 USA_destroyer_4_desc:0 "Die Sumner-Klasse war die Fortsetzung der Fletcher-Klasse, wobei die Verdrängung nur geringfügig zunahm. Das Schiff konnte mit zwei 5-Zoll-/38-Kaliber-Geschützen und einer deutlich größeren Flugabwehrbewaffnung ausgestattet werden. Ein zweites Ruder ermöglichte verbesserte Manöver bei U-Boot-Abwehroperationen."
 USA_light_cruiser_1:0 "Omaha-Klasse"
 USA_light_cruiser_1_desc:0 "Die Omaha-Klasse wurde ursprünglich als Schlüsselfigur der Aufklärungsflotte der US Navy im Ersten Weltkrieg konzipiert. Als schnelle und leistungsfähige Klasse war die Omaha-Klasse mit einer beeindruckenden Bewaffnung aus 6-Zoll-/53-Kaliber-Geschützen in einer 8x1- und 2x2-Turmkonfiguration sowie sechs Torpedowerfern bewaffnet. Die Omaha-Klasse war zwar in die Jahre gekommen, stellte aber den Großteil der Leichten Kreuzer der US Navy."
 USA_light_cruiser_2:0 "Brooklyn-Klasse"
 USA_light_cruiser_2_desc:0 "Die Brooklyn-Klasse wurde unter Berücksichtigung des Washingtoner Flottenabkommens entworfen und war daher auf 6-Zoll-Geschütze beschränkt. Um die Feuerkraft zu maximieren, wurde die Brooklyn-Klasse mit 15 der neuen 6-Zoll-Geschütze Mk16 in Drillingstürmen bewaffnet. Das Gesamtdesign war sehr ausgewogen und galt als Grundlage für alle zukünftigen Kreuzerdesigns der US Navy."
 USA_light_cruiser_3:0 "Cleveland-Klasse"
 USA_light_cruiser_3_desc:0 "Die Cleveland-Klasse basierte auf der Brooklyn-Klasse, jedoch ohne die Beschränkungen des Washingtoner Flottenvertrags. Die Cleveland-Klasse behielt die 15 6-Zoll-Hauptgeschütze bei, verstärkte jedoch die sekundäre 5-Zoll-Bewaffnung erheblich und fügte zusätzliche Flugabwehrwaffen hinzu."
 USA_light_cruiser_4:0 "Fargo-Klasse"
 USA_light_cruiser_4_desc:0 "Die Fargo-Klasse war eine Verbesserung der erfolgreichen Cleveland-Klasse. Dank eines besser konstruierten pyramidenförmigen Überbaus bot sie ein besseres Flugabwehrfeuerfeld."
 USA_heavy_cruiser_1:0 "Pensacola-Klasse"
 USA_heavy_cruiser_1_desc:0 "Die Pensacola-Klasse wurde unter den Beschränkungen des Washingtoner Flottenabkommens entworfen und sollte die Feuerkraft unter Berücksichtigung der 8-Zoll-Geschützbeschränkung maximieren. Sie war mit einer beeindruckenden Bewaffnung von 10 x 8 Zoll/55-Geschützen ausgerüstet. Die Rumpfpanzerung war dünn und die Konstruktion kopflastig, aber leistungsfähig. Sie bildete den Großteil der Schweren Kreuzerflotte der US Navy."
 #USA_heavy_cruiser_1b: "Portland Class"
 USA_heavy_cruiser_2:0 "Wichita-Klasse"
 USA_heavy_cruiser_2_desc:0 "Die Schiffe der Wichita-Klasse verfügen im Vergleich zur Pensacola-Klasse und ihren Varianten über eine verbesserte Bewaffnung mit einem neuen Turmdesign für ihre 8&quot;/55-Kaliber-Geschütze und einem verbesserten Schussfeld für ihre Sekundärbewaffnung mit 5&quot;/38-Geschützen. "
 USA_heavy_cruiser_3:0 "Baltimore-Klasse"
 USA_heavy_cruiser_3_desc:0 "Die Baltimore-Klasse vereinte die erfolgreicheren Elemente früherer Kreuzerdesigns und basierte weitgehend auf dem leichten Kreuzer der Brooklyn-Klasse, kombiniert mit Konfigurationen mit Bewaffnung und Panzerung der USS Wichita."
 USA_heavy_cruiser_4:0 "Oregon City-Klasse"
 USA_heavy_cruiser_4_desc:0 "Die Kreuzer der Oregon-City-Klasse boten gegenüber der Baltimore-Klasse umfassende und geringfügige Verbesserungen. Besonders hervorzuheben ist die veränderte Überstruktur, die ein besseres Flugabwehrfeuer ermöglichte. Ähnliche Verbesserungen wurden auch bei der Cleveland-Klasse und den leichten Kreuzern der Oregon-City-Klasse erzielt."
 USA_battle_cruiser_1:0 "Lexington-Klasse"
 USA_battle_cruiser_1_desc:0 "Die Lexington-Klasse war ursprünglich eine Reaktion auf den japanischen Schlachtkreuzer Kongo. Die Schiffe wurden 1916 durch den Naval Act in Auftrag gegeben und sollten 16-Zoll-Geschütze in Doppeltürmen tragen und eine Geschwindigkeit von 33 Knoten erreichen. Nach Baubeginn schlossen die USA den Washingtoner Flottenvertrag ab, und die USS Lexington und die USS Saratoga wurden zu Trägerschiffen umgebaut."
 USA_battle_cruiser_2:0 "Alaska-Klasse"
 USA_battle_cruiser_2_desc:0 "Die Alaska-Klasse war eine Antwort auf die deutschen Westentaschen-Schlachtschiffe und nun vor allem auf die japanischen „Superkreuzer“. Sie war für den Transport von 12-Zoll-Geschützen und die Abwehr von bis zu 10-Zoll-Granaten ausgelegt und erreichte Kreuzergeschwindigkeit, allerdings ohne Schutz unter Wasser."
 USA_battleship_1:0 "South Dakota-Klasse" 
 USA_battleship_1_desc:0 "Die erste South Dakota-Klasse bestand aus sechs amerikanischen Schlachtschiffen, die 1920 auf Kiel gelegt, aber nie fertiggestellt wurden. Sie wären die letzten Dreadnoughts im Naval Act von 1916 gewesen, die in Dienst gestellt wurden, wenn der Washingtoner Flottenvertrag nicht zu ihrer Einstellung nach einem Drittel der Bauzeit geführt hätte." 

 #USA_battleship_1b: "Pennsylvania Class"
 #USA_battleship_1c: "New Mexico Class"
 USA_battleship_2:0 "North Carolina-Klasse"
 USA_battleship_2_desc:0 "Die North-Carolina-Klasse war ein anspruchsvolles Design und die erste Schlachtschiffklasse, die die US Navy seit 20 Jahren baute. Die US Navy verlangte, dass diese Klasse den Standards des Washingtoner Flottenabkommens entsprach, auf 36.000 Tonnen begrenzt war, aber dennoch mit 16-Zoll-/45-Kaliber-Geschützen bewaffnet war, über eine verbesserte Panzerung verfügte und in der Lage war, die schnellen Flugzeugträger der US Navy zu eskortieren."
 #USA_battleship_2b: "South Dakota Class"
 USA_battleship_3:0 "Iowa-Klasse"
 USA_battleship_3_desc:0 "Die Iowa-Klasse verfügte über alle Innovationen und Fähigkeiten der früheren North Carolina, hatte aber eine deutlich höhere Verdrängung und taktische Geschwindigkeit. Die Iowa war in erster Linie für die Eskorte von Trägerverbänden zuständig und wurde auch als Kreuzervernichter konzipiert."
 USA_battleship_4:0 "Illinois-Klasse"
 USA_battleship_4_desc:0 "Die Illinois-Klasse übernahm das Design und die Rolle der Iowa-Klasse. Sie behielt Geschwindigkeit und Bewaffnung gegenüber Panzerung bei. Die Illinois-Klasse erhöhte die Anzahl der 16-Zoll-/50-Kaliber-Geschütze von 9 auf 12 und verbesserte gleichzeitig Kessel und Maschinen, um effizientere Reisegeschwindigkeiten zu ermöglichen. Wie die Montana-Klasse umfassten die ursprünglichen Entwürfe vier 6-Zoll-Geschütze in Doppeltürmen, wurden jedoch auf 5-Zoll-Doppelturmstellungen zurückgesetzt, um die Flugabwehr zu maximieren."
 USA_carrier_1:0 "Lexington-Klasse"
 USA_carrier_1_desc:0 "Der Träger der Lexington-Klasse entstand aus den umgebauten Rümpfen zweier Schlachtkreuzer der Lexington-Klasse, um den Beschränkungen des Washingtoner Flottenabkommens zu entsprechen. Die Klasse war die erste einsatzfähige Trägerklasse der US Navy und verbrachte mehrere Jahre damit, den Trägerbetrieb zu verbessern."
 USA_carrier_2:0 "Ranger-Klasse"
 USA_carrier_2_desc:0 "Die Ranger-Klasse war die erste Klasse der US Navy, die von Grund auf als Flugzeugträger konzipiert wurde. Als Teil eines kleineren Trägerkonzepts der US Navy war die Klasse deutlich kleiner als die vorherige Lexington-Klasse, behielt aber dank Verbesserungen im Innendesign die gleiche Luftgruppenstärke bei."
 #USA_carrier_2b: "Yorktown Class"
 #USA_carrier_2c: "Wasp Class"
 USA_carrier_3:0 "Essex-Klasse"
 USA_carrier_3_desc:0 "Basierend auf den Erfahrungen der Vorgängerklassen Lexington, Ranger und Yorktown entstand die Essex-Klasse, ein schnelles Schiff, das eine große Anzahl an Flugzeugen in die Schlacht transportieren konnte. Auch die Schadensbegrenzungskonzepte wurden von der Yorktown-Klasse übernommen, und ein Deckskantenlift wurde eingebaut, um die Handhabung der Flugzeuge zu verbessern."
 USA_carrier_4:0 "Midway-Klasse"
 USA_carrier_4_desc:0 "Die Midway-Klasse war das Nonplusultra der US Navy in puncto Flugzeugträger. Dank ihres gepanzerten Decks und der Fähigkeit, weitaus mehr Flugzeuge zu transportieren als frühere Klassen, erhielt die Midway-Klasse die einzigartige Unterklassenbezeichnung CVB (Carrier Vessel Battle)."
 USA_SH_battleship_1:0 "Virginia-Klasse"
 USA_SH_battleship_1_desc:0 "Im Jahr 1920 begann man mit dem Bau der großen Schlachtschiffe der South-Dakota-Klasse mit 12 x 16&quot;/50-Kanonen. Diese Klasse hätte eine neue Ära im Bau schwerer Schlachtschiffe eingeleitet, wurde jedoch 1922 eingestellt, um dem Washingtoner Flottenabkommen zu entsprechen. Da das Abkommen nicht mehr in Kraft ist und ein geheimes japanisches Schlachtschiffprojekt droht, können wir das Design modernisieren, die Verdrängung auf über 55.000 Tonnen erhöhen und die Konstruktion mit Kanonen des Kalibers 18&quot;/50 aufrüsten, um eine neue Klasse schwerer Schlachtschiffe zu schaffen."
 USA_SH_battleship_2:0 "Montana-Klasse"
 USA_SH_battleship_2_desc:0 "Die Montana-Klasse war größer und stärker gepanzert als die Illinois-Klasse, was jedoch zu Lasten der Geschwindigkeit ging. Ihre Hauptbewaffnung bestand aus zwölf 18-Zoll-Geschützen im Kaliber 50 und unserem neuesten Feuerleitsystem. Die Feuerkraft der Montana ist unübertroffen. Ursprüngliche Entwürfe umfassten 6-Zoll-Geschütze, wurden jedoch zugunsten der 5-Zoll-Doppelturmstellung mit doppeltem Verwendungszweck geändert."
 ### ALB - ALBANIA -- all generic ###
 ### ARG - ARGENTINA ###
 ARG_submarine_1:0 "Santa Fe-Klasse"
 ARG_submarine_1_desc:0 "Die Santa-Fe-Klasse besteht aus drei U-Booten, die in Italien bestellt und 1933 nach Argentinien geliefert wurden. Die drei Schiffe dieser Klasse bildeten bis 1960 das Rückgrat der argentinischen U-Boot-Streitkräfte. Sie wurden nach den Werften im italienischen Tarent, wo sie gebaut wurden, „Tarantinos“ genannt."
 ARG_destroyer_1:0 "Catamarca-Klasse"
 ARG_destroyer_1_desc:0 "Die Zerstörer der Catamarca-Klasse wurden von der argentinischen Marine bestellt und kurz vor dem Ersten Weltkrieg von Großbritannien gebaut. Sie waren mit vier 120-mm-Hauptgeschützen (Kaliber 50) und vier 533-mm-Torpedorohren bewaffnet."
 #ARG_destroyer_1b: "Cervantes Class"
 ARG_destroyer_2:0 "Buenos Aires-Klasse"
 ARG_destroyer_2_desc:0 "Die Zerstörer der Buenos-Aires-Klasse wurden zwischen 1936 und 1938 in Großbritannien für Argentinien gebaut. Sie basierten auf den britischen Zerstörern der G-Klasse. Sie verdrängten über 1300 Tonnen und waren mit vier QF 4,7-Zoll-Mark-IX-Kanonen als Hauptgeschützen bewaffnet."
 ARG_light_cruiser_1:0 "Libertad-Klasse"
 ARG_light_cruiser_1_desc:0 "Die Schiffe der Libertad-Klasse erhielten die Bezeichnung „Flussschlachtschiff“, waren aber eigentlich eher mit den kleineren, leichter bewaffneten geschützten Kreuzern des frühen 20. Jahrhunderts vergleichbar. Zwei Schiffe dieser Klasse wurden Ende der 1890er Jahre gebaut und waren zu Beginn des Zweiten Weltkriegs noch im Einsatz."
 ARG_light_cruiser_2:0 "La Argentina-Klasse"
 ARG_light_cruiser_2_desc:0 "Der leichte Kreuzer La Argentina wurde Ende der 1930er Jahre von Großbritannien für Argentinien gebaut. Vor dem Krieg unternahm sie mehrere Trainingsfahrten, wurde aber zur Wahrung der argentinischen Neutralität in das aktive Geschwader eingegliedert. Das Schiff war eine vergrößerte Version der britischen Arethusa-Klasse mit einer Verdrängung von 6500 Tonnen und war mit neun 6-Zoll-Kanonen als Hauptgeschützen bewaffnet."
 ARG_heavy_cruiser_1:0 "Garibaldi-Klasse"
 ARG_heavy_cruiser_1_desc:0 "Die Garibaldi-Klasse repräsentiert eine Klasse von Panzerkreuzern, die um die Jahrhundertwende für Argentinien gebaut wurden. Alle waren Mitte der 1930er Jahre veraltet, wobei der letzte 1932 außer Dienst gestellt wurde. Sie wurden 1931 durch die in Großbritannien gebauten schweren Kreuzer der Veinticinco de Mayo-Klasse ersetzt."
 #ARG_heavy_cruiser_1b: "Veinticinco de Mayo Class"
 ARG_battleship_1:0 "Rivadavia-Klasse"
 ARG_battleship_1_desc:0 "Die Rivadavia-Klasse bestand aus zwei in den USA gebauten Dreadnought-Schlachtschiffen, die Anfang der 1910er Jahre für die argentinische Marine gebaut wurden. Sie verdrängten 27.500 Tonnen und waren mit zwölf 305-mm/50-Call-Kanonen als Hauptgeschütze bewaffnet. Sie blieben bis in die 1950er Jahre im Einsatz."
 ### AST - AUSTRALIA ###
 AST_submarine_1:0 "L-Klasse"
 AST_submarine_1_desc:0 "Die L-Klasse bestand aus mittelgroßen Booten, die ursprünglich im Rahmen des Emergency War Program als verbesserte Version der vorherigen U-Boot-Klassen geplant waren. Sie wurden in der Spätphase des Ersten Weltkriegs gebaut und mit neuen, größeren 21-Zoll-Torpedos ausgestattet. Sie dienten bis zum Beginn des Zweiten Weltkriegs und wurden dann hauptsächlich für sekundäre und Ausbildungszwecke eingesetzt."
 AST_submarine_2:0 "T-Klasse"
 AST_submarine_2_desc:0 "Die Boote der T-Klasse bzw. Triton-Klasse wurden als Ersatz für die großen U-Boote der O-, P- und R-Klasse entwickelt. Es handelte sich um mittelgroße U-Boote mit großer Reichweite, die sich gut für den Atlantik und den Pazifik eigneten. Diese Boote waren gut bewaffnete, stabile Plattformen und wurden während des Konflikts häufig eingesetzt, da 25 Prozent der gebauten Boote im Krieg verloren gingen."
 AST_submarine_3:0 "U-Klasse"
 AST_submarine_3_desc:0 "Die U-Klasse bestand aus kleinen U-Booten, die im Rahmen der Kriegsnotstandsprogramme 1940 und 1941 gebaut wurden. Ursprünglich als Trainings-U-Boote konzipiert, wurde das Design bei Kriegsausbruch geändert, sodass sich diese U-Boote in den engen Gewässern der Nordsee und des Mittelmeers als nützlich erwiesen. Aufgrund ihrer geringeren Größe waren ihre Reichweite und ihre Bewaffnung begrenzt. Drei Unterklassen bildeten die Klassen Undine, Umpire und Uproar."
 AST_submarine_4:0 "V-Klasse"
 AST_submarine_4_desc:0 "Die U-Boote der V-Klasse oder Vampire-Klasse basierten auf den kleineren Booten der Vorgängerklasse U. Sie waren größer, aber immer noch relativ klein und verfügten über bessere Seetüchtigkeit, jedoch eine begrenzte Einsatzreichweite und Bewaffnung."
 AST_destroyer_1:0 "Vendetta-Klasse"
 AST_destroyer_1_desc:0 "Zu diesen Zerstörern gehörten die Admirality- und Thornycroft-Klassen V und W, die an die Royal Navy übergeben wurden, um die „Scrap Iron Flotilla“ zu bilden. Sie wurden im Rahmen des War Emergency Program gebaut. Sie stellten die ultimative Weiterentwicklung des britischen Zerstörerdesigns während des Ersten Weltkriegs dar und verkörperten die Verbesserungen ihrer Vorgänger sowie neue technologische Fortschritte. In der Spätphase des Ersten Weltkriegs wurden zahlreiche dieser Schiffe gebaut, die anschließend das Rückgrat der Zerstörerflottillen der Royal Navy bildeten. Ab den 1930er Jahren wurden sie den Reserveflotten zugeteilt und schließlich nur noch zur Geleitschutzführung von Konvois eingesetzt. Es waren ausreichend bewaffnete, schnelle Schiffe mit guter Reichweite."
 AST_destroyer_2:0 "G/H/I-Klasse"
 AST_destroyer_2_desc:0 "Die Zerstörer der G-, H- und I-Klasse wurden im Rahmen der Marinebauprogramme 1933 und 1934 bestellt. Sie waren im Wesentlichen Wiederholungen der vorhergehenden F-Klasse, nur etwas kleiner. Die Bewaffnung der G- und H-Klassen war dieselbe wie die der F-Klasse, wobei beide mit 4,7-Zoll-Geschützen ausgestattet waren. Diese Schiffe hatten eine große Reichweite, waren ausreichend bewaffnet und verfügten über eine starke Torpedobewaffnung. Sie wurden während des Krieges ausgiebig eingesetzt und erlitten zahlreiche Verluste."
 #AST_destroyer_2b: "Arunta Class"
 AST_destroyer_3:0 "Nizam-Klasse"
 AST_destroyer_3_desc:0 "Die Nizam-Klasse war die Bezeichnung für die von der Royal Navy übernommenen Zerstörer der J-, K- und N-Klasse. Sie ähnelten der früheren Tribal-Klasse, doch statt der Geschützbewaffnung setzten die Konstrukteure auf eine Standardbewaffnung mit schweren Torpedos und leichteren Geschützen. Die Schiffe wurden während ihres Kriegseinsatzes modifiziert. Zu den Upgrades gehörten verbesserte Flugabwehrgeschütze und Radar. Es handelte sich um schnelle, weitreichende und gut bewaffnete Schiffe, die sich ideal für Flottenbegleitschiffe eigneten."
 AST_destroyer_4:0 "Kampfklasse"
 AST_destroyer_4_desc:0 "Die Zerstörer der Battle-Klasse bauten auf der Weiterentwicklung britischer Zerstörer auf, die während des Krieges eingesetzt wurden. Die Schiffe wurden im Rahmen der Marineprogramme 1942 und 1943 bestellt. Sie waren sowohl mit Geschützen als auch mit Torpedos gut bewaffnet. Ihre Flugabwehr, ihre U-Boot-Abwehrfähigkeiten, ihre Geschwindigkeit und ihre Reichweite machten sie zu vielseitigen Schiffen."
 #AST_destroyer_4b: "Tobruk Class"
 AST_light_cruiser_1:0 "C-Klasse"
 AST_light_cruiser_1_desc:0 "Die Leichten Kreuzer der C-Klasse waren eine Gruppe von 28 Leichten Kreuzern der Royal Navy. Sie wurden vor und während des Ersten Weltkriegs für die rauen Bedingungen der Nordsee gebaut. Obwohl sie relativ klein und beengt waren, erwiesen sie sich als robuste und leistungsfähige Schiffe. Ihre Bewaffnung war mehr als zufriedenstellend: Sie trugen genügend 6-Zoll-Geschütze, um feindliche Oberflächenziele zu bekämpfen, und eine schwere Torpedoladung, um feindliche Schiffe und Konvois zu vernichten. Sie wurden im Ersten Weltkrieg ausgiebig eingesetzt und waren an vielen Überwasseraktionen beteiligt. Nur eine begrenzte Anzahl der Schiffe überlebte die Verschrottung vor dem Ersten Weltkrieg. Nur die Unterklassen Caledon, Ceres und Carlisle waren Mitte der 1930er Jahre im Einsatz."
 #AST_light_cruiser_1c: "Sydney Class"
 AST_light_cruiser_2:0 "Southampton-Klasse"
 AST_light_cruiser_2_desc:0 "Die Leichten Kreuzer der Southampton-Klasse waren eine Unterklasse der Kreuzer der Town-Klasse und wurden als Gegenstück zu den japanischen Kreuzern der Mogami-Klasse entwickelt. Diese Schiffe waren gut gepanzert, verfügten über eine gute Geschwindigkeit und Reichweite und trugen eine beeindruckende Bewaffnung mit zwölf 6-Zoll-Geschützen in vier Drillingstürmen. Sie bildeten die Grundlage für viele spätere Leichte-Kreuzer-Entwürfe der Royal Navy während des Krieges."
 AST_light_cruiser_3:0 "Kronkolonie-Klasse"
 AST_light_cruiser_3_desc:0 "Die leichten Kreuzer der Crown-Colony-Klasse waren verbesserte Versionen der früheren Town-Klasse, jedoch mit vereinfachtem Design, um den Bau zu beschleunigen und Kosten zu senken. Die Schiffe trugen die gleiche Bewaffnung wie ihre Vorgänger, vier Drillingstürme mit 6-Zoll-Geschützen. Sie waren ähnlich gepanzert, hatten aber aufgrund ihrer kleineren Motoren eine etwas geringere Reichweite. Der Typ umfasste zwei Unterklassen: Fiji und Ceylon."
 AST_light_cruiser_4:0 "Minotaurus-Klasse"
 AST_light_cruiser_4_desc:0 "Diese Kreuzer, auch als Swiftsure-Klasse bekannt, wurden als modifizierte Version der Crown Colony-Klasse konzipiert und beinhalteten kriegsbedingte Modifikationen, die 1941 genehmigt wurden. Sie hatten eine größere Reichweite und mehr Flugabwehrwaffen als die Crown Colony-Klasse, während die Hauptbewaffnung auf drei Drillingstürme reduziert war."
 AST_heavy_cruiser_1:0 "Hawkins-Klasse"
 AST_heavy_cruiser_1_desc:0 "Die Kreuzer der Hawkins-Klasse waren die ersten schweren Kreuzer der Welt. Sie basierten auf den früheren leichten Kreuzern der Town-Klasse, insbesondere der Birmingham-Unterklasse, waren jedoch mit 7,5-Zoll-Geschützen und einem dickeren Panzergürtel ausgestattet. Sie wurden für den Kampf gegen die großen deutschen Konvoi-Angreifer entwickelt. Sie waren gut bewaffnet, verfügten über eine angemessene Geschwindigkeit und Reichweite und waren gut geschützt. Insgesamt wurden fünf Schiffe in Dienst gestellt, aber nur vier waren zu Beginn des Zweiten Weltkriegs im Einsatz."
 #AST_heavy_cruiser_1b: "Canberra Class"
 AST_heavy_cruiser_2:0 "Surrey-Klasse"
 AST_heavy_cruiser_2_desc:0 "Die Schweren Kreuzer der Surrey-Klasse wurden im Rahmen des Marineprogramms von 1928 vorgeschlagen. Sie waren verbesserte Versionen der früheren Schweren Kreuzer der York-Klasse. Wären sie fertiggestellt worden, wären sie mit vier 8-Zoll-Zwillingstürmen, schwererer Panzerung und stärkeren Motoren ausgestattet gewesen. Zwei Schiffe wurden bestellt, aber keines wurde auf Kiel gelegt."
 AST_heavy_cruiser_3:0 "Admiral-Klasse"
 AST_heavy_cruiser_3_desc:0 "Die Schweren Kreuzer der Admiral-Klasse (nicht zu verwechseln mit den Schlachtkreuzern der Admiral-Klasse) waren der letzte Versuch der Royal Navy, Kreuzer mit 8-Zoll-Geschützen zu konstruieren und zu bauen. Die Designstudien begannen 1938 und endeten 1941. Sie führten zu verschiedenen Entwürfen. Die endgültigen Entwürfe beinhalteten neue 8-Zoll-Geschütze in Drillingstürmen, schwere Flugabwehr, dicke Panzerung und hohe Geschwindigkeit. Der Mangel an feindlichen Kreuzern und die Kosteneffizienz dieser Schiffe führten dazu, dass man sich stattdessen auf den Bau weiterer leichter Kreuzer konzentrierte."
 AST_heavy_cruiser_4:0 "Churchill Design"
 AST_heavy_cruiser_4_desc:0 "Diese Schiffe wurden von Sir Winston Churchill, Lord der Admiralität, zu Beginn des Zweiten Weltkriegs als Gegenstück zu den schweren Kreuzern der Deutschland-Klasse vorgeschlagen. Sie sollten über 9,2-Zoll-Kanonen, schwere Flugabwehr und starke Panzerung verfügen. Sie sollten die feindlichen Großkampfschiffe effektiv bekämpfen. Aufgrund der hohen Kosten und der mangelnden Nachfrage nach neuen schweren Kreuzern wurde der Bau der Schiffe schließlich eingestellt. "
 AST_battle_cruiser_1:0 "Ansehensklasse"
 AST_battle_cruiser_1_desc:0 "Die Schlachtkreuzer der Renown-Klasse wurden ursprünglich als verbesserte Versionen der Schlachtschiffe der Revenge-Klasse auf Kiel gelegt. Ihr Bau wurde bei Ausbruch des Ersten Weltkriegs eingestellt. Admiral Lord Fisher gelang es, den Bau als Schlachtkreuzer wiederaufzunehmen. Diese Schiffe waren der Inbegriff eines Schlachtkreuzers. Sie waren gut bewaffnet, schnell und wendig, hatten aber eine dünnere Panzerung und eine geringere Einsatzreichweite. Nur zwei der ursprünglich drei Schiffe, Repulse und Renown, wurden fertiggestellt."
 AST_battle_cruiser_2:0 "Princess Royal-Klasse"
 AST_battle_cruiser_2_desc:0 "Die Princess Royal war eine Klasse hypothetischer Schlachtkreuzer, die eine schnellere und günstigere Version der Schlachtschiffe der King George V-Klasse darstellten. Diese Schiffe verfügten über eine ähnliche, aber reduzierte Bewaffnung für den Überwasser- und Luftkampf: zwei 14-Zoll-Drillingskanonen und sechs 5,25-Zoll-Zwillings-Flugabwehrgeschütze. Ihre hohe Geschwindigkeit und Reichweite würden der Royal Navy schnelle Angriffsmöglichkeiten und Konvoischutz bieten, ihre eingeschränkte Panzerung würde sich jedoch im Kampf gegen moderne Schlachtschiffe als problematisch erweisen."
 AST_battleship_1:0 "Queen Elizabeth-Klasse"
 AST_battleship_1_desc:0 "Die Schlachtschiffe der Queen-Elizabeth-Klasse wurden im Rahmen des Marineprogramms von 1912 bestellt. Diese Schiffe waren die ersten, die mit 15-Zoll-Geschützen ausgestattet waren und galten als die ersten schnellen Schlachtschiffe. Sie trugen schwere Bewaffnung für Haupt- und Nebenaufgaben, und ihre dicke Panzerung machte diese Schiffe zu hervorragenden Kriegsschiffen, ideal zum Schutz des riesigen Britischen Empires. Sechs Schiffe wurden bestellt, aber nur fünf wurden in Dienst gestellt und später vor dem Zweiten Weltkrieg modernisiert."
 AST_battleship_2:0 "King George V-Klasse"
 AST_battleship_2_desc:0 "Die Schlachtschiffe der King-George-V-Klasse waren das Ergebnis der Washingtoner Flottenverträge von 1922 und des Ersten Londoner Flottenvertrags von 1930, die die maximale Verdrängung und Artillerie von Großkampfschiffen beschränkten. Daher waren diese Schiffe mit Kanonen kleineren Kalibers ausgestattet als frühere und sogar zeitgenössische Schlachtschiffe. Trotz des geringeren Kalibers waren die Schiffe ausreichend bewaffnet, verfügten über starke Flugabwehrwaffen und waren ausreichend geschützt. Fünf Schiffe wurden als Ersatz für die alten Schlachtschiffe der Queen-Elizabeth-Klasse bestellt und auf Kiel gelegt."
 AST_battleship_3:0 "Löwenklasse"
 AST_battleship_3_desc:0 "Die Schlachtschiffe der Lion-Klasse waren die Nachfolgemodelle der King George V und übernahmen viele ihrer Merkmale. Im Rahmen des Marineprogramms von 1938 wurden sechs Schiffe bestellt, um die alternden Schlachtschiffe der Revenge-Klasse zu ersetzen. Aufgrund der ausbrechenden Feindseligkeiten wurde jedoch keines fertiggestellt. Die Schiffe sollten im Großen und Ganzen der King George-Klasse ähneln, die Hauptbewaffnung sollte jedoch schwerer sein und eine neue 16-Zoll-Kanone enthalten. Sie sollten außerdem über eine dickere Panzerung und stärkere Motoren verfügen."
 AST_battleship_4:0 "Vanguard-Klasse"
 AST_battleship_4_desc:0 "Das Schlachtschiff der Vanguard-Klasse war das letzte Schlachtschiff, das für die Royal Navy gebaut wurde. Es wurde nur ein einziges Schiff bestellt, vier weitere wurden jedoch für den Pazifikkrieg in Betracht gezogen. Der Bau wurde im Rahmen des Emergency War Program von 1940 in Auftrag gegeben, hatte jedoch keine hohe Priorität und wurde erst nach dem Krieg fertiggestellt. Die Klasse hatte einen schlanken Rumpf, der für ausgezeichnete Stabilität und Seetüchtigkeit sorgte. Die Bewaffnung entsprach der der Schlachtschiffe der Queen Elizabeth- und Revenge-Klasse und bot beträchtliche Feuerkraft. Starke Motoren und eine gute Panzerung machten das Schiff schnell und gut geschützt."
 AST_SH_battleship_1:0 "Centurion-Klasse"
 AST_SH_battleship_1_desc:0 "Die Centurion war eine Klasse hypothetischer schwerer Schlachtschiffe der Royal Navy, die als Gegenstück zu den großen Schiffen der deutschen und japanischen Marine gebaut wurden. Große 18-Zoll-Geschütze und eine dicke Panzerung verliehen dem Schiff die nötige Feuerkraft und den nötigen Schutz, um diese Schiffe zu bekämpfen. Starke Flugabwehr, große Reichweite und hohe Geschwindigkeit waren unerlässlich, um die weiten Meere des Britischen Empires zu bezwingen."
 AST_SH_battleship_2:0 "Lion II-Klasse"
 AST_SH_battleship_2_desc:0 "Die Schlachtschiffe der Lion-II-Klasse wurden 1944 als verbesserte Version der früheren Lion-Klasse entworfen. Die Erfahrungen aus dem Krieg wurden in dieses Modell integriert, das größer und schwerer war und nach Fertigstellung entweder drei oder vier 16-Zoll-Drillingsgeschütze des neuesten Typs tragen sollte. Dicke Panzerplatten schützten das Schiff vor Angriffen von oben und aus der Luft. Die hohen Baukosten, die Niederlagen feindlicher Flotten und der Bedarf an Flugzeugträgern führten zum Abbruch des Projekts."
 AST_carrier_1:0 "Mutige Klasse"
 AST_carrier_1_desc:0 "Diese drei Flugzeugträger waren umgebaute Schlachtkreuzer und die ersten Flottenträger der Royal Navy. Ihr Umbau war das Ergebnis des Washingtoner Flottenabkommens von 1922 und wurde 1925 abgeschlossen. Es handelte sich um mäßig gepanzerte, aber gut bewaffnete Schiffe mit großer Reichweite und guter Geschwindigkeit, allerdings war ihre Flugzeugbesatzung aufgrund des Umbaus begrenzt. Dennoch brachten sie der Royal Navy wichtige Erfahrungen im Flugzeugträgerbau und in der Flottenluftprojektion."
 AST_carrier_2:0 "Ark Royal-Klasse"
 AST_carrier_2_desc:0 "Der Flugzeugträger Ark Royal war das erste Schiff dieser Art, das den Auflagen des Washingtoner Flottenabkommens entsprach. Er war das erste Schiff, bei dem Hangars und Flugdeck integraler Bestandteil des Rumpfes waren. Das 1934 entworfene Schiff war gut gepanzert und bewaffnet. Es transportierte eine große Anzahl von Flugzeugen und verfügte über ausreichend Reichweite und Geschwindigkeit, um mit den Hauptstreitkräften der Royal Navy mitzuhalten."
 AST_carrier_3:0 "Illustre Klasse"
 AST_carrier_3_desc:0 "Die Illustrious-Klasse wurde unter den Bedingungen des Zweiten Londoner Flottenabkommens von 1936 entworfen, das die Größe der Träger auf maximal 23.000 Tonnen begrenzte. Sie war der erste britische Träger mit einem gepanzerten Flugdeck, was die Größe der Luftgruppe reduzierte. Schwere Panzerung und Flugabwehr sorgten für eine starke Verteidigung der Schiffe, während leistungsstarke Motoren und ein großer Treibstoffvorrat den Schiffen eine große Einsatzreichweite ermöglichten."
 AST_carrier_4:0 "Unerbittliche Klasse"
 AST_carrier_4_desc:0 "Die Flugzeugträger der Implacable-Klasse wurden im Rahmen des Marineprogramms von 1938 bestellt und waren im Wesentlichen verbesserte Versionen der früheren Illustrious-Klasse. Der Krieg und die Verlagerung der Priorität auf kleinere Schiffe für Konvoischutzaufgaben in der frühen und mittleren Kriegsphase verlangsamten die Reduzierung dieser Schiffe. Es handelte sich um größere Schiffe, die mehr Flugzeuge transportieren konnten und gleichzeitig eine dicke Panzerung an Rumpf und Flugdeck aufwiesen. Stärkere Motoren ermöglichten ihnen im Vergleich zur Illustrious-Klasse eine höhere Geschwindigkeit und Reichweite."
 ### BEL - BELGIUM -- all generic ###
 ### BRA - BRAZIL ###
 BRA_submarine_1:0 "Humaytá-Klasse"
 BRA_submarine_1_desc:0 "Das brasilianische U-Boot Humaytá wurde in Italien bestellt und Ende der 1920er Jahre ausgeliefert. Es war als modifizierte Balilla-Klasse konzipiert, die als Tiefseetaucher konzipiert war. Es verdrängte fast 1.400 Tonnen und war mit sechs 533-mm-Torpedorohren bewaffnet. "
 BRA_submarine_2:0 "Tupy-Klasse"
 BRA_submarine_2_desc:0 "Die Tupy-Klasse war eine Klasse brasilianischer U-Boote, die Mitte der 1930er Jahre von Italien gebaut wurden. Es handelte sich um kleinere U-Boote mit einer Verdrängung von etwas mehr als 600 Tonnen, die mit sechs 533-mm-Torpedos bewaffnet waren."
 BRA_destroyer_1:0 "Marnhão-Klasse"
 BRA_destroyer_1_desc:0 "Die Marnhão war ein in Großbritannien gebauter Zerstörer der K-Klasse, der 1922 nach Brasilien verkauft wurde. Das Schiff verdrängte etwas mehr als 930 Tonnen und war mit vier 4-Zoll-Geschützen bewaffnet."
 BRA_destroyer_2:0 "Juruena-Klasse"
 BRA_destroyer_2_desc:0 "Die Zerstörer der Juruena-Klasse waren eine Serie von sechs Zerstörern der H-Klasse, die Brasilien Ende der 1930er Jahre bei Großbritannien bestellte. Die Schiffe wurden jedoch nie ausgeliefert, da die Briten sie nach Kriegsausbruch 1939 requirierten. Sie verdrängten über 1.300 Tonnen, waren schnell und mit drei QF 4,7-Zoll-Mk-IX-Kanonen als Hauptgeschützen sowie acht 533-mm-Torpedorohren bewaffnet."
 BRA_destroyer_3:0 "Marcílio Dias Klasse"
 BRA_destroyer_3_desc:0 "Die Zerstörer der Marcílio-Dias-Klasse (manchmal auch als M-Klasse oder Greenhalgh-Klasse bezeichnet) waren drei Schiffe der brasilianischen Marine, die 1943 in Dienst gestellt wurden. Sie basierten auf den US-amerikanischen Zerstörern der Mahan-Klasse und waren die ersten größeren Schiffe, die in Brasilien gebaut wurden. Sie verdrängten 1.500 Tonnen und waren mit fünf 5-Zoll-/38-Kaliber-Hauptgeschützen bewaffnet."
 BRA_destroyer_4:0 "Acre-Klasse"
 BRA_destroyer_4_desc:0 "Die Acre-Klasse (manchmal auch als Amazonas-Klasse bezeichnet) besteht aus sechs Zerstörern, die für die brasilianische Marine gebaut wurden. Keiner von ihnen wurde vor Kriegsende fertiggestellt. Die Schiffe wurden in Brasilien nach einem modifizierten britischen Design und teilweise mit US-amerikanischer Ausrüstung gebaut, um die sechs Zerstörer der Juruena-Klasse zu ersetzen, die Großbritannien zu Kriegsbeginn beschlagnahmt hatte."
 BRA_light_cruiser_1:0 "Bahia-Klasse"
 BRA_light_cruiser_1_desc:0 "Die Bahia-Klasse bestand aus zwei in Großbritannien gebauten Aufklärungskreuzern, die für Brasilien gebaut und 1910 ausgeliefert wurden. Die Schiffe wurden in den 1920er Jahren umfassend umgerüstet und modernisiert, waren aber zu Beginn des Zweiten Weltkriegs noch immer ein relativ veraltetes Design. Während des Krieges dienten die Kreuzer hauptsächlich zur Geleitschutzführung von Konvois."
 BRA_battleship_1:0 "Minas Gerais-Klasse"
 BRA_battleship_1_desc:0 "Die Minas Gerais war eine Klasse von zwei Dreadnought-Schlachtschiffen, die Anfang des 20. Jahrhunderts von Großbritannien für Brasilien gebaut wurden. Sie waren im Zweiten Weltkrieg im Einsatz, waren aber für ernsthafte Aufgaben viel zu veraltet und wurden stattdessen zur Küstenverteidigung entlang der brasilianischen Küste eingesetzt."
 ### BUL - BULGARIA -- all generic ###
 ### CAN - CANADA ###
 CAN_submarine_1:0 "L-Klasse"
 CAN_submarine_1_desc:0 "Die L-Klasse bestand aus mittelgroßen Booten, die ursprünglich im Rahmen des Emergency War Program als verbesserte Version der vorherigen U-Boot-Klassen geplant waren. Sie wurden in der Spätphase des Ersten Weltkriegs gebaut und mit neuen, größeren 21-Zoll-Torpedos ausgestattet. Sie dienten bis zum Beginn des Zweiten Weltkriegs und wurden dann hauptsächlich für sekundäre und Ausbildungszwecke eingesetzt."
 CAN_submarine_2:0 "T-Klasse"
 CAN_submarine_2_desc:0 "Die Boote der T-Klasse bzw. Triton-Klasse wurden als Ersatz für die großen U-Boote der O-, P- und R-Klasse entwickelt. Es handelte sich um mittelgroße U-Boote mit großer Reichweite, die sich gut für den Atlantik und den Pazifik eigneten. Diese Boote waren gut bewaffnete, stabile Plattformen und wurden während des Konflikts häufig eingesetzt, da 25 Prozent der gebauten Boote im Krieg verloren gingen."
 CAN_submarine_3:0 "U-Klasse"
 CAN_submarine_3_desc:0 "Die U-Klasse bestand aus kleinen U-Booten, die im Rahmen der Kriegsnotstandsprogramme 1940 und 1941 gebaut wurden. Ursprünglich als Trainings-U-Boote konzipiert, wurde das Design bei Kriegsausbruch geändert, sodass sich diese U-Boote in den engen Gewässern der Nordsee und des Mittelmeers als nützlich erwiesen. Aufgrund ihrer geringeren Größe waren ihre Reichweite und ihre Bewaffnung begrenzt. Die Klasse bestand aus drei Unterklassen: Undine, Umpire und Uproar."
 CAN_submarine_4:0 "V-Klasse"
 CAN_submarine_4_desc:0 "Die U-Boote der V-Klasse oder Vampire-Klasse basierten auf den kleineren Booten der Vorgängerklasse U. Sie waren größer, aber immer noch relativ klein und verfügten über bessere Seetüchtigkeit, jedoch eine begrenzte Einsatzreichweite und Bewaffnung."
 CAN_destroyer_1:0 "V/W-Klasse"
 CAN_destroyer_1_desc:0 "Zu diesen Zerstörern gehörten die Admirality- und Thornycroft-Klassen V und W. Sie wurden im Rahmen des War Emergency Program gebaut. Sie stellten die ultimative Weiterentwicklung des britischen Zerstörerdesigns während des Ersten Weltkriegs dar und verkörperten die Verbesserungen ihrer Vorgänger sowie neue technologische Fortschritte. In der Spätphase des Ersten Weltkriegs wurden diese Schiffe in großer Zahl gebaut und bildeten danach das Rückgrat der Zerstörerflottillen der Royal Navy. Ab den 1930er Jahren wurden sie in Reserveflotten eingesetzt und schließlich nur noch zur Konvoibegleitung eingesetzt. Es handelte sich um ausreichend bewaffnete, schnelle Schiffe mit guter Reichweite."
 #CAN_destroyer_1b: "Sanguenay Class"
 CAN_destroyer_2:0 "Ottawa-Klasse"
 CAN_destroyer_2_desc:0 "Die Ottawa-Klasse war die kanadische Bezeichnung für die britischen Zerstörer der G-, H- und I-Klasse, die im Rahmen der Marinebauprogramme 1933 und 1934 bestellt wurden. Sie waren im Wesentlichen Wiederholungen der vorhergehenden F-Klasse, nur etwas kleiner. Die Bewaffnung der G- und H-Klassen war dieselbe wie die der F-Klasse, wobei beide 4,7-Zoll-Geschütze verwendeten. Diese Schiffe hatten eine große Reichweite, waren ausreichend bewaffnet und verfügten über eine starke Torpedobewaffnung. Sie wurden während des Krieges ausgiebig eingesetzt und erlitten zahlreiche Verluste."
 #CAN_destroyer_2b: "Athabaskan Class"
 CAN_destroyer_3:0 "J/K/N-Klasse"
 CAN_destroyer_3_desc:0 "Die Klassen J, K und N ähnelten der früheren Tribal-Klasse, doch statt der Geschützbewaffnung setzten die Konstrukteure auf eine Standardbewaffnung mit schweren Torpedos und leichteren Geschützen. Die Schiffe wurden während ihres Kriegseinsatzes modifiziert. Zu den Upgrades gehörten verbesserte Flugabwehrgeschütze und Radar. Es handelte sich um schnelle, weitreichende und gut bewaffnete Schiffe, die sich ideal für Flottenbegleitschiffe eigneten."
 CAN_destroyer_4:0 "Algonquin-Klasse"
 CAN_destroyer_4_desc:0 "Die Algonquin-Klasse war die kanadische Bezeichnung für britische Zerstörer der Battle-Klasse. Die Schiffe wurden im Rahmen der Marineprogramme 1942 und 1943 bestellt. Sie waren sowohl mit Geschützen als auch mit Torpedos gut bewaffnet. Ihre Flugabwehr, ihre Fähigkeiten zur U-Boot-Abwehr, ihre Geschwindigkeit und ihre Reichweite machten sie zu vielseitigen Schiffen. Ihr später Kriegseinsatz führte zu einem minimalen Beitrag."
 CAN_light_cruiser_1:0 "C-Klasse"
 CAN_light_cruiser_1_desc:0 "Die Leichten Kreuzer der C-Klasse waren eine Gruppe von 28 Leichten Kreuzern der Royal Navy. Sie wurden vor und während des Ersten Weltkriegs für die rauen Bedingungen der Nordsee gebaut. Obwohl sie relativ klein und beengt waren, erwiesen sie sich als robuste und leistungsfähige Schiffe. Ihre Bewaffnung war mehr als zufriedenstellend: Sie trugen genügend 6-Zoll-Geschütze, um feindliche Oberflächenziele zu bekämpfen, und eine schwere Torpedoladung, um feindliche Schiffe und Konvois zu vernichten. Sie wurden im Ersten Weltkrieg ausgiebig eingesetzt und waren an vielen Überwasseraktionen beteiligt. Nur eine begrenzte Anzahl der Schiffe überlebte die Verschrottung vor dem Ersten Weltkrieg. Nur die Unterklassen Caledon, Ceres und Carlisle waren Mitte der 1930er Jahre im Einsatz."
 CAN_light_cruiser_2:0 "Southampton-Klasse"
 CAN_light_cruiser_2_desc:0 "Die Leichten Kreuzer der Southampton-Klasse waren eine Unterklasse der Kreuzer der Town-Klasse und wurden als Gegenstück zu den japanischen Kreuzern der Mogami-Klasse entwickelt. Diese Schiffe waren gut gepanzert, verfügten über eine gute Geschwindigkeit und Reichweite und trugen eine beeindruckende Bewaffnung mit zwölf 6-Zoll-Geschützen in vier Drillingstürmen. Sie bildeten die Grundlage für viele spätere Leichte-Kreuzer-Entwürfe der Royal Navy während des Krieges."
 CAN_light_cruiser_3:0 "Quebec-Klasse"
 CAN_light_cruiser_3_desc:0 "Die Quebec-Klasse war die kanadische Bezeichnung für die Leichten Kreuzer der britischen Crown Colony-Klasse. Es handelte sich um verbesserte Versionen der früheren Town-Klasse, jedoch mit vereinfachtem Design, um den Bau zu beschleunigen und Kosten zu senken. Die Schiffe trugen die gleiche Bewaffnung wie ihre Vorgänger, vier Drillingstürme mit 6-Zoll-Geschützen. Sie waren ähnlich gepanzert, hatten aber aufgrund ihrer kleineren Motoren eine etwas geringere Reichweite. Der Typ umfasste zwei Unterklassen – Fiji und Ceylon."
 CAN_light_cruiser_4:0 "Ontario-Klasse"
 CAN_light_cruiser_4_desc:0 "Die Ontario-Klasse war die kanadische Bezeichnung für die britischen leichten Kreuzer der Minotaur-Klasse (oder Swiftsure-Klasse). Diese Kreuzer wurden als modifizierte Version der Crown Colony-Klasse konzipiert und enthielten 1941 genehmigte Kriegsmodifikationen. Sie verfügten über eine größere Reichweite und mehr Flugabwehrwaffen als die Crown Colony-Klasse, während die Hauptbewaffnung auf drei Drillingstürme reduziert war."
 CAN_heavy_cruiser_1:0 "Hawkins-Klasse"
 CAN_heavy_cruiser_1_desc:0 "Die Kreuzer der Hawkins-Klasse waren die ersten schweren Kreuzer der Welt. Sie basierten auf den früheren leichten Kreuzern der Town-Klasse, insbesondere der Birmingham-Unterklasse, waren jedoch mit 7,5-Zoll-Geschützen und einem dickeren Panzergürtel ausgestattet. Sie wurden für den Kampf gegen die großen deutschen Konvoi-Angreifer entwickelt. Sie waren gut bewaffnet, verfügten über eine angemessene Geschwindigkeit und Reichweite und waren gut geschützt. Insgesamt wurden fünf Schiffe in Dienst gestellt, aber nur vier waren zu Beginn des Zweiten Weltkriegs im Einsatz."
 CAN_heavy_cruiser_2:0 "Surrey-Klasse"
 CAN_heavy_cruiser_2_desc:0 "Die Schweren Kreuzer der Surrey-Klasse wurden im Rahmen des Marineprogramms von 1928 vorgeschlagen. Sie waren verbesserte Versionen der früheren Schweren Kreuzer der York-Klasse. Wären sie fertiggestellt worden, wären sie mit vier 8-Zoll-Zwillingstürmen, schwererer Panzerung und stärkeren Motoren ausgestattet gewesen. Zwei Schiffe wurden bestellt, aber keines wurde auf Kiel gelegt."
 CAN_heavy_cruiser_3:0 "Admiral-Klasse"
 CAN_heavy_cruiser_3_desc:0 "Die Schweren Kreuzer der Admiral-Klasse (nicht zu verwechseln mit den Schlachtkreuzern der Admiral-Klasse) waren der letzte Versuch der Royal Navy, Kreuzer mit 8-Zoll-Geschützen zu konstruieren und zu bauen. Die Designstudien begannen 1938 und endeten 1941. Sie führten zu verschiedenen Entwürfen. Die endgültigen Entwürfe beinhalteten neue 8-Zoll-Geschütze in Drillingstürmen, schwere Flugabwehr, dicke Panzerung und hohe Geschwindigkeit. Der Mangel an feindlichen Kreuzern und die Kosteneffizienz dieser Schiffe führten dazu, dass man sich stattdessen auf den Bau weiterer leichter Kreuzer konzentrierte."
 CAN_heavy_cruiser_4:0 "Churchill Design"
 CAN_heavy_cruiser_4_desc:0 "Diese Schiffe wurden von Sir Winston Churchill, Lord der Admiralität, zu Beginn des Zweiten Weltkriegs als Gegenstück zu den schweren Kreuzern der Deutschland-Klasse vorgeschlagen. Sie sollten über 9,2-Zoll-Kanonen, schwere Flugabwehr und starke Panzerung verfügen. Sie sollten die feindlichen Großkampfschiffe effektiv bekämpfen. Aufgrund der hohen Kosten und der mangelnden Nachfrage nach neuen schweren Kreuzern wurde der Bau der Schiffe jedoch eingestellt. "
 CAN_battle_cruiser_1:0 "Ansehensklasse"
 CAN_battle_cruiser_1_desc:0 "Die Schlachtkreuzer der Renown-Klasse wurden ursprünglich als verbesserte Versionen der Schlachtschiffe der Revenge-Klasse auf Kiel gelegt. Ihr Bau wurde bei Ausbruch des Ersten Weltkriegs eingestellt. Admiral Lord Fisher gelang es, den Bau als Schlachtkreuzer wiederaufzunehmen. Diese Schiffe waren der Inbegriff eines Schlachtkreuzers. Sie waren gut bewaffnet, schnell und wendig, hatten aber eine dünnere Panzerung und eine geringere Einsatzreichweite. Nur zwei der ursprünglich drei Schiffe, Repulse und Renown, wurden fertiggestellt."
 CAN_battle_cruiser_2:0 "Princess Royal-Klasse"
 CAN_battle_cruiser_2_desc:0 "Die Princess Royal war eine Klasse hypothetischer Schlachtkreuzer, die eine schnellere und günstigere Version der Schlachtschiffe der King George V-Klasse darstellten. Diese Schiffe verfügten über eine ähnliche, aber reduzierte Bewaffnung für den Überwasser- und Luftabwehrkampf: zwei 14-Zoll-Drillingskanonen und sechs 5,25-Zoll-Zwillings-Flugabwehrgeschütze. Ihre hohe Geschwindigkeit und Reichweite würden der Royal Navy schnelle Angriffsmöglichkeiten und Konvoischutz bieten, ihre eingeschränkte Panzerung würde sich jedoch im Kampf gegen moderne Schlachtschiffe als problematisch erweisen."
 CAN_battleship_1:0 "Queen Elizabeth-Klasse"
 CAN_battleship_1_desc:0 "Die Schlachtschiffe der Queen-Elizabeth-Klasse wurden im Rahmen des Marineprogramms von 1912 bestellt. Diese Schiffe waren die ersten, die mit 15-Zoll-Geschützen ausgestattet waren und galten als die ersten schnellen Schlachtschiffe. Sie trugen schwere Bewaffnung für Haupt- und Nebenaufgaben, und ihre dicke Panzerung machte diese Schiffe zu hervorragenden Kriegsschiffen, ideal zum Schutz des riesigen Britischen Empires. Sechs Schiffe wurden bestellt, aber nur fünf wurden in Dienst gestellt und später vor dem Zweiten Weltkrieg modernisiert."
 CAN_battleship_2:0 "King George V-Klasse"
 CAN_battleship_2_desc:0 "Die Schlachtschiffe der King-George-V-Klasse waren das Ergebnis der Washingtoner Flottenverträge von 1922 und des Ersten Londoner Flottenvertrags von 1930, die die maximale Verdrängung und Artillerie von Großkampfschiffen beschränkten. Daher waren diese Schiffe mit Kanonen kleineren Kalibers ausgestattet als frühere und sogar zeitgenössische Schlachtschiffe. Trotz des geringeren Kalibers waren die Schiffe ausreichend bewaffnet, verfügten über starke Flugabwehrwaffen und waren ausreichend geschützt. Fünf Schiffe wurden als Ersatz für die alten Schlachtschiffe der Queen-Elizabeth-Klasse bestellt und auf Kiel gelegt."
 CAN_battleship_3:0 "Löwenklasse"
 CAN_battleship_3_desc:0 "Die Schlachtschiffe der Lion-Klasse waren die Nachfolgeklasse der King-George-V-Schlachtschiffe und übernahmen viele ihrer Merkmale. Im Rahmen des Marineprogramms von 1938 wurden sechs Schiffe bestellt, um die alternden Schlachtschiffe der Revenge-Klasse zu ersetzen. Aufgrund der ausbrechenden Feindseligkeiten wurde jedoch keines fertiggestellt. Die Schiffe sollten im Großen und Ganzen der King-George-Klasse ähneln, die Hauptbewaffnung sollte jedoch schwerer sein und eine neue 16-Zoll-Kanone enthalten. Sie sollten außerdem über eine dickere Panzerung und stärkere Motoren verfügen."
 CAN_battleship_4:0 "Vanguard-Klasse"
 CAN_battleship_4_desc:0 "Das Schlachtschiff der Vanguard-Klasse war das letzte Schlachtschiff, das für die Royal Navy gebaut wurde. Es wurde nur ein einziges Schiff bestellt, vier weitere wurden jedoch für den Pazifikkrieg in Betracht gezogen. Der Bau wurde im Rahmen des Emergency War Program von 1940 in Auftrag gegeben, hatte jedoch keine hohe Priorität und wurde erst nach dem Krieg fertiggestellt. Die Klasse hatte einen schlanken Rumpf, der ihr ausgezeichnete Stabilität und Seetüchtigkeit verlieh. Die Bewaffnung entsprach der der Schlachtschiffe der Queen Elizabeth- und Revenge-Klasse und bot beträchtliche Feuerkraft. Starke Motoren und eine gute Panzerung machten das Schiff schnell und gut geschützt."
 CAN_SH_battleship_1:0 "Centurion-Klasse"
 CAN_SH_battleship_1_desc:0 "Die Centurion war eine Klasse hypothetischer schwerer Schlachtschiffe der Royal Navy, die als Gegenstück zu den großen Schiffen der deutschen und japanischen Marine gebaut wurden. Große 18-Zoll-Geschütze und eine dicke Panzerung verliehen dem Schiff die nötige Feuerkraft und den nötigen Schutz, um diese Schiffe zu bekämpfen. Starke Flugabwehr, große Reichweite und hohe Geschwindigkeit waren unerlässlich, um die weiten Meere des Britischen Empires zu bezwingen."
 CAN_SH_battleship_2:0 "Lion II-Klasse"
 CAN_SH_battleship_2_desc:0 "Die Schlachtschiffe der Lion-II-Klasse wurden 1944 als verbesserte Version der früheren Lion-Klasse entworfen. Die Erfahrungen aus dem Krieg wurden in diesen Entwurf einfließen gelassen, der größer und schwerer war und nach Fertigstellung entweder drei oder vier 16-Zoll-Drillingsgeschütze des neuesten Typs tragen sollte. Dicke Panzerplatten schützten das Schiff vor Angriffen von oben und aus der Luft. Die hohen Baukosten, die Niederlagen feindlicher Flotten und der Bedarf an Flugzeugträgern führten zum Abbruch des Projekts."
 CAN_carrier_1:0 "Mutige Klasse"
 CAN_carrier_1_desc:0 "Diese drei Flugzeugträger waren umgebaute Schlachtkreuzer und die ersten Flottenträger der Royal Navy. Ihr Umbau war das Ergebnis des Washingtoner Flottenabkommens von 1922 und wurde 1925 abgeschlossen. Es handelte sich um mäßig gepanzerte, aber gut bewaffnete Schiffe mit großer Reichweite und guter Geschwindigkeit, allerdings war ihre Flugzeugbesatzung aufgrund des Umbaus begrenzt. Dennoch brachten sie der Royal Navy wichtige Erfahrungen im Flugzeugträgerbau und in der Flottenluftprojektion."
 CAN_carrier_2:0 "Ark Royal-Klasse"
 CAN_carrier_2_desc:0 "Der Flugzeugträger Ark Royal war das erste Schiff dieser Art, das den Auflagen des Washingtoner Flottenabkommens entsprach. Er war das erste Schiff, bei dem Hangars und Flugdeck integraler Bestandteil des Rumpfes waren. Das 1934 entworfene Schiff war gut gepanzert und bewaffnet. Es transportierte eine große Anzahl von Flugzeugen und verfügte über ausreichend Reichweite und Geschwindigkeit, um mit den Hauptstreitkräften der Royal Navy mitzuhalten."
 CAN_carrier_3:0 "Illustre Klasse"
 CAN_carrier_3_desc:0 "Die Illustrious-Klasse wurde unter den Bedingungen des Zweiten Londoner Flottenabkommens von 1936 entworfen, das die Größe der Träger auf maximal 23.000 Tonnen begrenzte. Sie war der erste britische Träger mit einem gepanzerten Flugdeck, was die Größe der Luftgruppe reduzierte. Schwere Panzerung und Flugabwehr sorgten für eine starke Verteidigung der Schiffe, während leistungsstarke Motoren und ein großer Treibstoffvorrat den Schiffen eine große Einsatzreichweite ermöglichten."
 CAN_carrier_4:0 "Unerbittliche Klasse"
 CAN_carrier_4_desc:0 "Die Flugzeugträger der Implacable-Klasse wurden im Rahmen des Marineprogramms von 1938 bestellt und waren im Wesentlichen verbesserte Versionen der früheren Illustrious-Klasse. Der Krieg und die Verlagerung der Priorität auf kleinere Schiffe für Konvoischutzaufgaben in der frühen und mittleren Kriegsphase verlangsamten die Reduzierung dieser Schiffe. Es handelte sich um größere Schiffe, die mehr Flugzeuge transportieren konnten und gleichzeitig eine dicke Panzerung an Rumpf und Flugdeck aufwiesen. Stärkere Motoren ermöglichten ihnen im Vergleich zur Illustrious-Klasse eine höhere Geschwindigkeit und Reichweite."
 ### CHI - NATIONALIST CHINA ###
 CHI_destroyer_1:0 "Jianwei-Klasse"
 CHI_destroyer_1_desc:0 "Die Jianwei-Klasse war eine Klasse großer Torpedoboote, die für die nationalchinesische Marine gebaut und 1904 in Dienst gestellt wurden. Zwei Schiffe dieser Klasse wurden modernisiert und waren zum Zeitpunkt der japanischen Invasion noch im Einsatz. Nach der Modernisierung verdrängten sie 870 Tonnen und waren mit zwei 4,7-Zoll-Hauptgeschützen bewaffnet."
 CHI_light_cruiser_1:0 "Hairong-Klasse"
 CHI_light_cruiser_1_desc:0 "Die Hairong war ein chinesischer Geschützter Kreuzer, der Ende der 1890er Jahre von Deutschland gebaut wurde. Das Schiff ähnelte anderen Geschützten Kreuzern und späteren Leichten Kreuzern, die um die Jahrhundertwende für China gebaut wurden. Die Hairong verdrängte knapp 2.700 Tonnen und war mit drei 5,9-Zoll-QF-Geschützen bewaffnet. "
 ### CHL - CHILE ###
 CHL_submarine_1:0 "H-Klasse"
 CHL_submarine_1_desc:0 "Bei diesen U-Booten handelte es sich um sechs britische U-Boote der H-Klasse (auch Holland 602 genannt), die in Großbritannien gebaut und kurz nach dem Ersten Weltkrieg im Austausch für während des Krieges internierte U-Boote nach Chile gebracht wurden. Die Schiffe wurden zwischen 1915 und 1918 gebaut. Sie verdrängten über 360 Tonnen, hatten eine Tauchtiefe von 30 Metern und waren mit vier 450-mm-Torpedorohren bewaffnet."
 #CHL_submarine_1b: "Capitán O`Brien Class"
 CHL_destroyer_1:0 "Almirante Lynch-Klasse"
 CHL_destroyer_1_desc:0 "Die Zerstörer der Almirante-Lynch-Klasse waren eine Gruppe von sechs Schiffen, die kurz vor dem Ersten Weltkrieg in Großbritannien für die chilenische Marine gebaut wurden. Nur zwei Schiffe wurden vor Ausbruch des Krieges ausgeliefert und waren bis 1945 im Einsatz. Sie verdrängten 1.430 Tonnen, hatten für ihr Alter eine ordentliche Geschwindigkeit und Reichweite und waren mit sechs 4-Zoll-Hauptgeschützen des Typs L/40 QF Mark VI und zwei 21-Zoll-Torpedorohren bewaffnet."
 #CHL_destroyer_1b: "Serrano Class"
 CHL_light_cruiser_1:0 "Chacabuco-Klasse"
 CHL_light_cruiser_1_desc:0 "Die Chacabuco war ein geschützter Kreuzer, der in Großbritannien gebaut und 1902 für die chilenische Marine in Dienst gestellt wurde. Sie verdrängte 4.160 Tonnen und war mit zwei 8-Zoll-Armstrong-Hauptgeschützen und drei 18-Zoll-Torpedorohren bewaffnet. Sie war langsam, aber im Vergleich zu frühen leichten Kreuzern gut gepanzert."
 CHL_heavy_cruiser_1:0 "O&#39;Higgins-Klasse"
 CHL_heavy_cruiser_1_desc:0 "Die O&#39;Higgins war ein Panzerkreuzer, der um die Jahrhundertwende in Großbritannien für die chilenische Marine gebaut wurde. Er verdrängte 7.800 Tonnen und verfügte über vier 8-Zoll-Kanonen vom Kaliber 45 als Hauptbewaffnung. Im Vergleich zu den nach dem Ersten Weltkrieg gebauten Schweren Kreuzern war er jedoch relativ langsam."
 CHL_battleship_1:0 "Almirante Latorre-Klasse"
 CHL_battleship_1_desc:0 "Die Almirante-Latorre-Klasse bestand aus zwei Super-Dreadnought-Schlachtschiffen, die zu Beginn des Ersten Weltkriegs in Großbritannien für die chilenische Marine gebaut wurden. Nur eines wurde als Schlachtschiff fertiggestellt, das andere wurde zum Flugzeugträger HMS Eagle umgebaut. Die Schiffe verdrängten über 28.000 Tonnen und besaßen eine Hauptbewaffnung aus zehn 14-Zoll-/45-Kaliber-BL-Geschützen. Sie waren schwächer gepanzert, aber etwas schneller als andere Dreadnoughts ihrer Zeit."
 ### COL - COLOMBIA ###
 COL_destroyer_2:0 "Antioquia-Klasse"
 COL_destroyer_2_desc:0 "Die Antioquia-Klasse bestand aus zwei Zerstörern, die für die kolumbianische Marine in Portugal gebaut wurden. Die Schiffe wurden 1934 in Dienst gestellt. Sie verdrängten über 1.200 Tonnen und waren mit vier BL-4,7-Zoll-Geschützen und acht 533-mm-Torpedorohren bewaffnet."
 ### DEN - DENMARK ###
 DEN_submarine_1:0 "Rota-Klasse"
 DEN_submarine_1_desc:0 "U-Boote der Rota-Klasse wurden nach dem Ende des Ersten Weltkriegs in Dänemark gebaut und in Dienst gestellt. Es handelte sich um kleine U-Boote, die auf dem Modell Holland 602 basierten. Sie verdrängten 290 Tonnen und waren mit vier 450-mm-Torpedorohren bewaffnet."
 DEN_submarine_2:0 "Havmanden-Klasse"
 DEN_submarine_2_desc:0 "Die Havmanden-Klasse bestand aus fünf geplanten U-Booten. Drei wurden vor der deutschen Besatzung fertiggestellt, eines während der Besatzung, und das fünfte wurde abgesagt. Die U-Boote waren relativ klein und verdrängten 320 Tonnen. Sie waren mit fünf 450-mm-Torpedorohren bewaffnet."
 DEN_submarine_4:0 "Støren-Klasse"
 DEN_submarine_4_desc:0 "Die Støren war ein britisches U-Boot der Vampire-Klasse, das nach dem Krieg an die dänische Marine übergeben wurde. Das Schiff war mit einer Verdrängung von 545 Tonnen relativ klein, verfügte aber über vier 533-mm-Torpedorohre und war gut seetüchtig."
 DEN_destroyer_4:0 "Huitfeldt-Klasse"
 DEN_destroyer_4_desc:0 "Die Huitfeldt-Klasse, auch bekannt als Najaden-Klasse, bestand aus zwei großen Torpedobooten, die in Dänemark gebaut und in Dienst gestellt wurden. Der Bau begann 1942, und die Schiffe wurden 1947 fertiggestellt. Sie verdrängten über 780 Tonnen und verfügten über zwei 105-mm-Geschütze als Hauptbewaffnung sowie sechs 533-mm-Torpedorohre und verschiedene U-Boot-Abwehrwaffen. "
 DEN_heavy_cruiser_1:0 "Herluf Trolle-Klasse"
 DEN_heavy_cruiser_1_desc:0 "Die Herluf-Trolle-Klasse bestand aus drei gepanzerten Küstenschlachtschiffen, die zwischen 1901 und 1908 in Dienst gestellt wurden. Trotz ihrer Klassifizierung als Schlachtschiff ähnelten sie in Größe und Bewaffnung eher einem Kreuzer. Nur eines, die Peter Skram, war zu Beginn des Zweiten Weltkriegs im Einsatz. Die Schiffe verdrängten über 3.700 Tonnen, waren mit zwei 240-mm/K43-Geschützen in ihrer Hauptbewaffnung bewaffnet und gut gepanzert, allerdings langsamer als die meisten Dreadnought-Schlachtschiffe ihrer Zeit."
 ### DOM - DOMINICAN REPUBLIC -- all generic ###
 ### ECU - ECUADOR -- all generic ###
 ### EST - ESTONIA ###
 EST_submarine_2:0 "Kalev-Klasse"
 EST_submarine_2_desc:0 "Die Kalev-Klasse bestand aus zwei U-Booten, die 1936 in Großbritannien für die estnische Marine gebaut wurden. Ihr Hauptzweck war das Minenlegen, obwohl sie auch mit vier 533-mm-Torpedorohren bewaffnet waren."
 ### FIN - FINLAND ###
 FIN_heavy_cruiser_1:0 "Väinämöinen-Klasse"
 FIN_heavy_cruiser_1_desc:0 "Die Väinämöinen-Klasse bestand aus zwei Küstenverteidigungs-Schlachtschiffen, die Anfang der 1930er Jahre in Finnland gebaut und in Dienst gestellt wurden. Sie gehörten zu den letzten Küstenverteidigungsschiffen, die je gebaut wurden, obwohl ihre Größe und Bewaffnung eher der eines schweren Kreuzers entsprachen. Sie verdrängten nur 3.900 Tonnen und waren relativ langsam, aber mit vier 254-mm/45-Kaliber-Bofors-Geschützen bewaffnet."
 FIN_submarine_1:0 "Vetehinen-Klasse"
 FIN_submarine_1_desc:0 "Die Vetehinen-Klasse bestand aus drei mittelgroßen U-Booten, die für die finnische Marine gebaut wurden. Sie basierten auf den deutschen U-Booten UB III aus dem Ersten Weltkrieg. Sie verdrängten knapp 500 Tonnen und waren mit vier 533-mm-Torpedorohren bewaffnet."
 ### GRE - GREECE ###
 GRE_submarine_1:0 "Katsonis-Klasse"
 GRE_submarine_1_desc:0 "Die U-Boote der Katsonis-Klasse wurden Ende der 1920er Jahre in Frankreich für die griechische Marine gebaut. Beide Schiffe der Klasse waren im Zweiten Weltkrieg im Einsatz. Sie verdrängten fast 580 Tonnen und waren mit sechs 533-mm-Torpedorohren bewaffnet."
 GRE_submarine_2:0 "Matrozos-Klasse"
 GRE_submarine_2_desc:0 "Das griechische U-Boot Matrozos war ein italienisches U-Boot der Perla-Klasse, das von den Briten erbeutet und 1942 im Exil an die griechische Marine übergeben wurde. Das U-Boot verdrängte 680 Tonnen und war mit sechs 533-mm-Torpedorohren bewaffnet. Es erreichte eine Tauchtiefe von 80 m."
 GRE_submarine_4:0 "Pipinos-Klasse"
 GRE_submarine_4_desc:0 "Die vier Schiffe der Pipinos-Klasse waren britische U-Boote der U-Klasse, die zwischen 1943 und 1946 an die griechische Marine im Exil übergeben wurden. Die Schiffe verdrängten 545 Tonnen und waren mit vier 533-mm-Torpedorohren bewaffnet."
 GRE_destroyer_1:0 "Aetos-Klasse"
 GRE_destroyer_1_desc:0 "Die Zerstörer der Aetos-Klasse wurden in Großbritannien gebaut und vor dem Ersten Weltkrieg für die griechische Marine gekauft. Alle vier waren im Zweiten Weltkrieg im Einsatz. Sie verdrängten 980 Tonnen und waren mit vier 105-mm/40-Armstrong-P-Geschützen und vier 533-mm-Torpedorohren bewaffnet. Sie wurden Ende der 1920er Jahre modernisiert."
 #GRE_destroyer_1b: "Hydra Class"
 GRE_destroyer_2:0 "Vasilefs Georgios I. Klasse"
 GRE_destroyer_2_desc:0 "Die Vasilefs-Georgios-I-Klasse bestand aus zwei modifizierten britischen Zerstörern der H-Klasse, die Ende der 1930er Jahre in Großbritannien für die griechische Marine gebaut wurden. Die Schiffe verdrängten 1.350 Tonnen und erreichten eine beachtliche Geschwindigkeit. Sie hatten eine große Reichweite, waren mit vier 128-mm/42 SK C/34-Geschützen bewaffnet und verfügten über eine starke Torpedobewaffnung."
 GRE_destroyer_3:0 "Adrias-Klasse"
 GRE_destroyer_3_desc:0 "Die Adrias-Klasse bestand aus sechs britischen Geleitzerstörern der Hunt-III-Klasse, von denen vier 1942 an die griechische Marine im Exil übergeben wurden. Als Geleitzerstörer waren sie langsamer als Standardzerstörer. Sie verdrängten 1.050 Tonnen, besaßen vier 102-mm/45-QF-Mk-XVI-Geschütze als Hauptbewaffnung und verfügten über eine starke Torpedo- und U-Boot-Abwehrausrüstung."
 GRE_destroyer_4:0 "Leon-Klasse"
 GRE_destroyer_4_desc:0 "Die Leon-Klasse war eine Klasse von US-amerikanischen Geleitzerstörern der Cannon-Klasse. Sie wurden 1943 in Dienst gestellt, aber erst 1951 an die griechische Marine ausgeliefert. Die Schiffe waren langsamer als ein Standardzerstörer. Sie verdrängten 1.240 Tonnen und verfügten über drei 3-Zoll/40-Kaliber-Geschütze als Hauptbewaffnung sowie eine starke Ausstattung mit Torpedos und U-Boot-Abwehrausrüstung."
 GRE_light_cruiser_1:0 "Elli-Klasse"
 GRE_light_cruiser_1_desc:0 "Die Elli war ein leichter Kreuzer, der 1914 von den USA gebaut wurde. Ursprünglich war er für die chinesische Marine bestimmt, wurde aber schließlich nach Griechenland geliefert. Für einen Kreuzer war er klein und verdrängte nur 2.600 Tonnen. Seine Hauptbewaffnung bestand aus zwei 152-mm-Kanonen (Kaliber 45). Das Schiff war im Zweiten Weltkrieg im Einsatz und wurde vor der Invasion Griechenlands durch die Achsenmächte von einem italienischen U-Boot versenkt."
 GRE_heavy_cruiser_1:0 "Averof-Klasse"
 GRE_heavy_cruiser_1_desc:0 "Die Averof war ein Panzerkreuzer, der vor dem Ersten Weltkrieg in Italien für die griechische Marine gebaut wurde. Während des Zweiten Weltkriegs diente sie als Flaggschiff der Flotte. Im Vergleich zu den Kreuzern ihrer Zeit war die Averof mit einer Wasserverdrängung von fast 10.000 Tonnen recht leistungsstark. Sie war sehr gut gepanzert und verfügte über eine Hauptbewaffnung aus vier 234-mm/45-Armstrong-Geschützen. Trotzdem war sie für einen Panzerkreuzer relativ schnell."
 GRE_battleship_1:0 "Kilkis-Klasse"
 GRE_battleship_1_desc:0 "Die Kilkis-Klasse bestand aus zwei US-amerikanischen Schlachtschiffen der Mississippi-Klasse, die 1908 in Dienst gestellt und 1914 an Griechenland verkauft wurden. Sie waren die letzten von den USA gebauten Schlachtschiffe der Vor-Dreadnought-Klasse. Sie verdrängten nur 13.000 Tonnen und waren mit vier 10-Zoll-/45-Kaliber-Mk-V-Geschützen in ihrer Hauptbewaffnung bewaffnet. Sie verfügten über eine für ihr Alter durchschnittliche Bewaffnung, Geschwindigkeit und Reichweite. Beide Schiffe wurden 1936 außer Dienst gestellt."
 ### HOL - NETHERLANDS ###
 HOL_submarine_1:0 "K-III-Klasse"
 HOL_submarine_1_desc:0 "Die K-III-Klasse bestand aus zwei U-Booten, die für die Königlich Niederländische Marine gebaut und von ihr als Patrouillen-U-Boote eingesetzt wurden. Sie wurden Anfang der 1920er Jahre in Dienst gestellt und basierten auf den US-amerikanischen U-Booten der Holland-Klasse. Jedes verdrängte über 580 Tonnen und war mit vier 450-mm-Torpedorohren bewaffnet. "
 #HOL_submarine_1b: "K-XIV Class"
 HOL_submarine_2:0 "O16-Klasse"
 HOL_submarine_2_desc:0 "Das U-Boot O16 wurde 1936 in den Niederlanden für die Königlich Niederländische Marine gebaut und in Dienst gestellt. Es war ein großes U-Boot mit einer Wasserverdrängung von über 980 Tonnen. Es hatte eine Tauchtiefe von 80 m und war mit acht 533-mm-Torpedorohren bewaffnet."
 HOL_submarine_3:0 "O21-Klasse"
 HOL_submarine_3_desc:0 "Die O21-Klasse bestand aus sieben U-Booten, die von den Niederlanden gebaut und in Dienst gestellt wurden. Zum Zeitpunkt der deutschen Invasion waren alle Schiffe noch nicht fertiggestellt, doch fünf von ihnen konnten nach Großbritannien entkommen und dienten der niederländischen Marine im Exil. Die U-Boote waren mit einer Wasserverdrängung von über 990 Tonnen etwas größer als die Vorgängermodelle der O-Klasse, verfügten aber über eine ähnliche Bewaffnung mit acht 533-mm-Torpedorohren."
 HOL_submarine_4:0 "Zwaardvis-Klasse"
 HOL_submarine_4_desc:0 "Die Zwaardvis-Klasse bestand aus vier britischen U-Booten der Taciturn-Klasse, die zwischen 1943 und 1945 an die Königlich Niederländische Marine im Exil übergeben wurden. Die Schiffe verdrängten 1.090 Tonnen, waren mit elf 533-mm-Torpedorohren bewaffnet und hatten eine Tauchtiefe von über 100 m."
 HOL_destroyer_1:0 "Van-Ghent-Klasse"
 HOL_destroyer_1_desc:0 "Die Van-Ghent- oder Admiralen-Klasse bestand aus acht Zerstörern, die zwischen 1926 und 1931 für die Königlich Niederländische Marine gebaut wurden. Die Schiffe basierten auf frühen Versionen der britischen A-Klasse. Alle Schiffe kämpften im Zweiten Weltkrieg und wurden entweder selbst versenkt oder versenkt. Die Schiffe verdrängten über 1.300 Tonnen, waren mit vier 120-mm-Geschützen bewaffnet und erreichten für ihr Alter eine beachtliche Geschwindigkeit."
 HOL_destroyer_3:0 "Callenburgh-Klasse"
 HOL_destroyer_3_desc:0 "Die Gerard-Callenburgh-Klasse plante vier Zerstörer für die Königlich Niederländische Marine. Alle vier wurden vor der deutschen Invasion vom Stapel gelassen, aber nur zwei wurden fertiggestellt: einer von den Briten nach ihrer Flucht nach England und einer von den Deutschen. Diese Zerstörer verdrängten über 1.600 Tonnen, waren mit fünf 120-mm-Geschützen in ihrer Hauptbewaffnung sowie acht 533-mm-Torpedorohren bewaffnet und verfügten über eine gute Geschwindigkeit."
 HOL_destroyer_4:0 "Piet Hein Klasse"
 HOL_destroyer_4_desc:0 "Die Piet-Hein-Klasse bestand aus drei britischen Zerstörern der S-Klasse, die kurz nach dem Krieg an die Königlich Niederländische Marine übergeben wurden. Die Schiffe verdrängten über 1.800 Tonnen, waren mit vier 120-mm/45-QF-Mk-IX-Geschützen bewaffnet und verfügten über eine breite Palette an U-Boot-Abwehrwaffen."
 HOL_light_cruiser_1:0 "Java-Klasse"
 HOL_light_cruiser_1_desc:0 "Die Niederlande nahmen Mitte der 1920er Jahre zwei Leichte Kreuzer der Java-Klasse in Dienst. Die Schiffe wurden in Deutschland entworfen, aber in den Niederlanden gebaut. Sie verdrängten fast 6.700 Tonnen und besaßen eine Hauptbewaffnung aus zehn 150-mm-Bofors-Geschützen. Sie waren leicht gepanzert und für ihr Alter recht schnell."
 HOL_light_cruiser_2:0 "De Ruyter-Klasse"
 HOL_light_cruiser_2_desc:0 "Der leichte Kreuzer De Ruyter wurde Mitte der 1930er Jahre in den Niederlanden gebaut und in Dienst gestellt. Er diente hauptsächlich in Niederländisch-Indien. Er verdrängte über 6.500 Tonnen und war mit sieben 150-mm-Geschützen bewaffnet. Seine Geschwindigkeit war unterdurchschnittlich, seine Reichweite jedoch gut."
 HOL_light_cruiser_3:0 "Tromp-Klasse"
 HOL_light_cruiser_3_desc:0 "Die Tromp-Klasse bestand aus zwei relativ kleinen Leichten Kreuzern, die kurz vor der deutschen Invasion für die Niederlande in Dienst gestellt wurden. Beide dienten im Fernen Osten und überlebten den Krieg. Sie verdrängten nur 3.350 Tonnen und verfügten konstruktionsgemäß über sechs 150-m-Geschütze als Hauptbewaffnung."
 HOL_light_cruiser_4:0 "De Zeven Provinciën Class"
 HOL_light_cruiser_4_desc:0 "Die De Zeven Provinciën-Klasse bestand aus zwei Kreuzern, die kurz vor der deutschen Invasion auf Kiel gelegt, aber erst 1951 fertiggestellt wurden. Der endgültige Entwurf basierte auf dem ursprünglichen Plan von 1939 und führte zu zwei Schiffen mit einer Verdrängung von über 12.000 Tonnen und einer Bewaffnung mit acht Bofors-152-mm-Kanonen. Für einen leichten Kreuzer waren sie gut gepanzert und hatten eine gute Reichweite."
 HOL_heavy_cruiser_1:0 "Soerabaja-Klasse"
 HOL_heavy_cruiser_1_desc:0 "Der niederländische Kreuzer Soerabaja, ursprünglich De Zeven Provinciën, war ein Küstenverteidigungsschiff („Panterschip“), das vor dem Ersten Weltkrieg in den Niederlanden gebaut und in Dienst gestellt wurde. Es verdrängte über 6.500 Tonnen und war mit zwei 280-mm- und vier 150-mm-Geschützen als Hauptbewaffnung bewaffnet. Es diente während des Zweiten Weltkriegs, bis es 1942 von japanischen Bombern versenkt wurde."
 ### IRE - IRELAND -- all generic ###
 ### LAT - LATVIA ###
 LAT_submarine_1:0 "Ronis-Klasse"
 LAT_submarine_1_desc:0 "Die Ronis-Klasse bestand aus zwei U-Booten, die in Frankreich für die lettische Marine gebaut wurden. Sie wurden 1927 in Dienst gestellt. Sie waren klein, verdrängten nur 390 Tonnen und waren mit sechs 533-mm-Torpedorohren bewaffnet."
 ### LIT - LITHUANIA -- all generic ###
 ### MEX - MEXICO -- all generic ###
 ### NOR - NORWAY ###
 NOR_submarine_1:0 "B-Klasse"
 NOR_submarine_1_desc:0 "Die norwegischen U-Boote der B-Klasse waren amerikanische U-Boote vom Typ Holland, die in Norwegen für die norwegische Marine gebaut wurden. Die sechs Schiffe dieser Klasse wurden zwischen 1923 und 1930 in Dienst gestellt. Sie verdrängten 420 Tonnen, waren mit vier 450-mm-Torpedorohren bewaffnet und hatten eine Tauchtiefe von 60 Metern."
 NOR_submarine_3:0 "Uredd-Klasse"
 NOR_submarine_3_desc:0 "Die Uredd-Klasse bestand aus zwei britischen U-Booten der U-Klasse, die zwischen 1941 und 1943 für die norwegische Exilmarine gebaut wurden. Die Schiffe verdrängten 540 Tonnen und waren mit vier 533-mm-Torpedorohren bewaffnet. Sie verfügten über eine gute britische Radar- und Sonarausrüstung und erreichten eine Tauchtiefe von 60 Metern."
 NOR_submarine_4:0 "Utsira-Klasse"
 NOR_submarine_4_desc:0 "Die Utsira-Klasse bestand aus vier britischen U-Booten der Vampire-Klasse. Sie wurden zwischen 1943 und 1944 gebaut, wobei nur eines vor Kriegsende an die norwegische Marine übergeben wurde. Die Schiffe stellten nur eine moderate Verbesserung gegenüber der Vorgängerklasse U dar. Sie verdrängten 545 Tonnen, waren mit vier 533-mm-Torpedorohren bewaffnet und erreichten eine Tauchtiefe von 90 Metern."
 NOR_destroyer_1:0 "Draug-Klasse"
 NOR_destroyer_1_desc:0 "Die vier Zerstörer der Draug-Klasse waren die ersten Zerstörer der norwegischen Marine, die aus mehreren Schiffen bestanden. Sie wurden kurz vor dem Ersten Weltkrieg in Dienst gestellt und verdrängten 580 Tonnen. Ihre Hauptbewaffnung bestand aus drei britischen 3-Zoll-QF-Geschützen. Sie waren jedoch selbst im Vergleich zu anderen Zerstörern ihres Jahrgangs relativ langsam."
 NOR_destroyer_2:0 "Sleipner-Klasse"
 NOR_destroyer_2_desc:0 "Die Sleipner-Klasse war eine Klasse großer Torpedoboote, die in Norwegen für die Königlich Norwegische Marine gebaut und zwischen 1937 und 1939 in Dienst gestellt wurden. Im Gegensatz zur früheren Draug-Klasse verfügte die Sleipner-Klasse über eine relativ gute Bewaffnung und U-Boot-Abwehrausrüstung. Sie verdrängte 735 Tonnen und erreichte für ihre Größe eine ordentliche Geschwindigkeit."
 NOR_destroyer_3:0 "Ålesund-Klasse"
 NOR_destroyer_3_desc:0 "Die Ålesund-Klasse bestand aus zwei Zerstörern, die 1939 auf Kiel gelegt, aber vor der deutschen Besatzung nie fertiggestellt wurden. Wären sie fertiggestellt worden, wären sie die ersten norwegischen Zerstörer gewesen, deren Größe mit den Zerstörern der meisten großen Nationen vergleichbar war und über 1.200 Tonnen verdrängte. Sie sollten mit vier 120-mm/40-Bofors-Kanonen und vier 533-mm-Torpedorohren bewaffnet sein."
 NOR_destroyer_4:0 "Stord-Klasse"
 NOR_destroyer_4_desc:0 "Die Stord-Klasse bestand aus vier britischen Zerstörern der S-Klasse, die zwischen 1943 und 1944 für die norwegische Marine im Exil gebaut wurden. Sie verdrängten fast 1.800 Tonnen und waren mit vier 120-mm/45 QF Mk IX-Geschützen in ihrer Hauptbewaffnung sowie acht 533-mm-Torpedorohren und einer ordentlichen U-Boot-Abwehr- und Radarausrüstung bewaffnet. Sie waren außerdem schnell und zuverlässig."
 NOR_heavy_cruiser_1:0 "Norge-Klasse"
 NOR_heavy_cruiser_1_desc:0 "Die Norge war ein Küstenverteidigungsschiff, das um die Jahrhundertwende in Großbritannien für Norwegen gebaut wurde. Ihre Bewaffnung, bestehend aus zwei 210-mm-Geschützen, entsprach der eines Schweren Kreuzers, während ihre Größe mit einer Verdrängung von etwas über 4.200 Tonnen eher der eines Leichten Kreuzers entsprach. Ihre Geschwindigkeit entsprach der eines Dreadnought-Schlachtschiffs. Sie war eines von vier Küstenverteidigungsschiffen ihrer Zeit, die zu Beginn des Zweiten Weltkriegs noch in der Königlich Norwegischen Marine im Einsatz waren."
 ### NZL - NEW ZEALAND ###
 NZL_submarine_1:0 "L-Klasse"
 NZL_submarine_1_desc:0 "Die L-Klasse bestand aus mittelgroßen Booten, die ursprünglich im Rahmen des Emergency War Program als verbesserte Version der vorherigen U-Boot-Klassen geplant waren. Sie wurden in der Spätphase des Ersten Weltkriegs gebaut und mit neuen, größeren 21-Zoll-Torpedos ausgestattet. Sie dienten bis zum Beginn des Zweiten Weltkriegs und wurden dann hauptsächlich für sekundäre und Ausbildungszwecke eingesetzt."
 NZL_submarine_2:0 "T-Klasse"
 NZL_submarine_2_desc:0 "Die Boote der To-Klasse bzw. Triton-Klasse wurden als Ersatz für die großen U-Boote der O-, P- und R-Klasse entwickelt. Es handelte sich um mittelgroße U-Boote mit großer Reichweite, die sich gut für den Atlantik und den Pazifik eigneten. Diese Boote waren gut bewaffnete, stabile Plattformen und wurden während des Konflikts häufig eingesetzt, da 25 Prozent der gebauten Boote im Krieg verloren gingen."
 NZL_submarine_3:0 "U-Klasse"
 NZL_submarine_3_desc:0 "Die U-Klasse bestand aus kleinen U-Booten, die im Rahmen der Kriegsnotstandsprogramme 1940 und 1941 gebaut wurden. Ursprünglich als Trainings-U-Boote konzipiert, wurde das Design bei Kriegsausbruch geändert, sodass sich diese U-Boote in den engen Gewässern der Nordsee und des Mittelmeers als nützlich erwiesen. Aufgrund ihrer geringeren Größe waren ihre Reichweite und ihre Bewaffnung begrenzt. Die Klasse bestand aus drei Unterklassen: Undine, Umpire und Uproar."
 NZL_submarine_4:0 "V-Klasse"
 NZL_submarine_4_desc:0 "Die U-Boote der V-Klasse oder Vampire-Klasse basierten auf den kleineren Booten der Vorgängerklasse U. Sie waren größer, aber immer noch relativ klein und verfügten über bessere Seetüchtigkeit, jedoch eine begrenzte Einsatzreichweite und Bewaffnung."
 NZL_destroyer_1:0 "V/W-Klasse"
 NZL_destroyer_1_desc:0 "Zu diesen Zerstörern gehörten die Admirality- und Thornycroft-Klassen V und W. Sie wurden im Rahmen des War Emergency Program gebaut. Sie stellten die ultimative Weiterentwicklung des britischen Zerstörerdesigns während des Ersten Weltkriegs dar und verkörperten die Verbesserungen ihrer Vorgänger sowie neue technologische Fortschritte. In der Spätphase des Ersten Weltkriegs wurden diese Schiffe in großer Zahl gebaut und bildeten danach das Rückgrat der Zerstörerflottillen der Royal Navy. Ab den 1930er Jahren wurden sie in Reserveflotten eingesetzt und schließlich nur noch zur Konvoibegleitung eingesetzt. Es handelte sich um ausreichend bewaffnete, schnelle Schiffe mit guter Reichweite."
 NZL_destroyer_2:0 "G/H/I-Klasse"
 NZL_destroyer_2_desc:0 "Die Zerstörer der G-, H- und I-Klasse wurden im Rahmen der Marinebauprogramme 1933 und 1934 bestellt. Sie waren im Wesentlichen Wiederholungen der vorhergehenden F-Klasse, nur etwas kleiner. Die Bewaffnung der G- und H-Klassen war dieselbe wie die der F-Klasse, wobei beide mit 4,7-Zoll-Geschützen ausgestattet waren. Diese Schiffe hatten eine große Reichweite, waren ausreichend bewaffnet und verfügten über eine starke Torpedobewaffnung. Sie wurden während des Krieges ausgiebig eingesetzt und erlitten zahlreiche Verluste."
 NZL_destroyer_3:0 "J/K/N-Klasse"
 NZL_destroyer_3_desc:0 "Die Klassen J, K und N ähnelten der früheren Tribal-Klasse, doch statt der Geschützbewaffnung setzten die Konstrukteure auf eine Standardbewaffnung mit schweren Torpedos und leichteren Geschützen. Die Schiffe wurden während ihres Kriegseinsatzes modifiziert. Zu den Upgrades gehörten verbesserte Flugabwehrgeschütze und Radar. Es handelte sich um schnelle, weitreichende und gut bewaffnete Schiffe, die sich ideal für Flottenbegleitschiffe eigneten."
 NZL_destroyer_4:0 "Kampfklasse"
 NZL_destroyer_4_desc:0 "Die Zerstörer der Battle-Klasse bauten auf der Weiterentwicklung britischer Zerstörer auf, die während des Krieges eingesetzt wurden. Die Schiffe wurden im Rahmen der Marineprogramme 1942 und 1943 bestellt. Sie waren sowohl mit Geschützen als auch mit Torpedos gut bewaffnet. Ihre Flugabwehr, ihre Fähigkeiten zur U-Boot-Abwehr, ihre Geschwindigkeit und ihre Reichweite machten sie zu vielseitigen Schiffen. Ihr später Einsatz im Krieg führte zu einem minimalen Beitrag."
 NZL_light_cruiser_1:0 "C-Klasse"
 NZL_light_cruiser_1_desc:0 "Die Leichten Kreuzer der C-Klasse waren eine Gruppe von 28 Leichten Kreuzern der Royal Navy. Sie wurden vor und während des Ersten Weltkriegs für die rauen Bedingungen der Nordsee gebaut. Obwohl sie relativ klein und beengt waren, erwiesen sie sich als robuste und leistungsfähige Schiffe. Ihre Bewaffnung war mehr als zufriedenstellend: Sie trugen genügend 6-Zoll-Geschütze, um feindliche Oberflächenziele zu bekämpfen, und eine schwere Torpedoladung, um feindliche Schiffe und Konvois zu vernichten. Sie wurden im Ersten Weltkrieg ausgiebig eingesetzt und waren an vielen Überwasseraktionen beteiligt. Nur eine begrenzte Anzahl der Schiffe überlebte die Verschrottung vor dem Ersten Weltkrieg. Nur die Unterklassen Caledon, Ceres und Carlisle waren Mitte der 1930er Jahre im Einsatz."
 #NZL_light_cruiser_1c: "Leander Class"
 NZL_light_cruiser_2:0 "Southampton-Klasse"
 NZL_light_cruiser_2_desc:0 "Die Leichten Kreuzer der Southampton-Klasse waren eine Unterklasse der Kreuzer der Town-Klasse und wurden als Gegenstück zu den japanischen Kreuzern der Mogami-Klasse entwickelt. Diese Schiffe waren gut gepanzert, verfügten über eine gute Geschwindigkeit und Reichweite und trugen eine beeindruckende Bewaffnung mit zwölf 6-Zoll-Geschützen in vier Drillingstürmen. Sie bildeten die Grundlage für viele spätere Leichte-Kreuzer-Entwürfe der Royal Navy während des Krieges."
 NZL_light_cruiser_3:0 "Gambia-Klasse"
 NZL_light_cruiser_3_desc:0 "Die Gambia-Klasse war die neuseeländische Bezeichnung für die Leichten Kreuzer der britischen Crown Colony-Klasse. Es handelte sich um verbesserte Versionen der früheren Town-Klasse, jedoch mit vereinfachtem Design, um den Bau zu beschleunigen und Kosten zu senken. Die Schiffe trugen die gleiche Bewaffnung wie ihre Vorgänger, vier Drillingstürme mit 6-Zoll-Geschützen. Sie waren ähnlich gepanzert, hatten aber aufgrund ihrer kleineren Motoren eine etwas geringere Reichweite. Der Typ umfasste zwei Unterklassen: Fiji und Ceylon."
 NZL_light_cruiser_4:0 "Black Prince-Klasse"
 NZL_light_cruiser_4_desc:0 "Die Black-Prince-Klasse war die kanadische Bezeichnung für die britischen Leichten Kreuzer der Minotaur-Klasse (oder Swiftsure-Klasse). Diese Kreuzer wurden als modifizierte Version der Crown-Colony-Klasse konzipiert und enthielten 1941 genehmigte Kriegsmodifikationen. Sie verfügten über eine größere Reichweite und mehr Flugabwehrwaffen als die Crown-Colony-Klasse, während die Hauptbewaffnung auf drei Drillingstürme reduziert war. Da die Schiffe zu spät gebaut wurden, um den Kriegsausgang zu beeinflussen, wurden die meisten der bestellten Schiffe später storniert. "
 NZL_heavy_cruiser_1:0 "Hawkins-Klasse"
 NZL_heavy_cruiser_1_desc:0 "Die Kreuzer der Hawkins-Klasse waren die ersten schweren Kreuzer der Welt. Sie basierten auf den früheren leichten Kreuzern der Town-Klasse, insbesondere der Birmingham-Unterklasse, waren jedoch mit 7,5-Zoll-Geschützen und einem dickeren Panzergürtel ausgestattet. Sie wurden für den Kampf gegen die großen deutschen Konvoi-Angreifer entwickelt. Sie waren gut bewaffnet, verfügten über eine angemessene Geschwindigkeit und Reichweite und waren gut geschützt. Insgesamt wurden fünf Schiffe in Dienst gestellt, aber nur vier waren zu Beginn des Zweiten Weltkriegs im Einsatz."
 NZL_heavy_cruiser_2:0 "Surrey-Klasse"
 NZL_heavy_cruiser_2_desc:0 "Die Schweren Kreuzer der Surrey-Klasse wurden im Rahmen des Marineprogramms von 1928 vorgeschlagen. Sie waren verbesserte Versionen der früheren Schweren Kreuzer der York-Klasse. Wären sie fertiggestellt worden, wären sie mit vier 8-Zoll-Zwillingstürmen, schwererer Panzerung und stärkeren Motoren ausgestattet gewesen. Zwei Schiffe wurden bestellt, aber keines wurde auf Kiel gelegt."
 NZL_heavy_cruiser_3:0 "Admiral-Klasse"
 NZL_heavy_cruiser_3_desc:0 "Die Schweren Kreuzer der Admiral-Klasse (nicht zu verwechseln mit den Schlachtkreuzern der Admiral-Klasse) waren der letzte Versuch der Royal Navy, Kreuzer mit 8-Zoll-Geschützen zu konstruieren und zu bauen. Die Designstudien begannen 1938 und endeten 1941. Sie führten zu verschiedenen Entwürfen. Die endgültigen Entwürfe beinhalteten neue 8-Zoll-Geschütze in Drillingstürmen, schwere Flugabwehr, dicke Panzerung und hohe Geschwindigkeit. Der Mangel an feindlichen Kreuzern und die Kosteneffizienz dieser Schiffe führten dazu, dass man sich stattdessen auf den Bau weiterer leichter Kreuzer konzentrierte."
 NZL_heavy_cruiser_4:0 "Churchill Design"
 NZL_heavy_cruiser_4_desc:0 "Diese Schiffe wurden von Sir Winston Churchill, Lord der Admiralität, zu Beginn des Zweiten Weltkriegs als Gegenstück zu den schweren Kreuzern der Deutschland-Klasse vorgeschlagen. Sie sollten über 9,2-Zoll-Kanonen, schwere Flugabwehr und starke Panzerung verfügen. Sie sollten die feindlichen Großkampfschiffe effektiv bekämpfen. Aufgrund der hohen Kosten und der mangelnden Nachfrage nach neuen schweren Kreuzern wurde der Bau der Schiffe schließlich eingestellt. "
 NZL_battle_cruiser_1:0 "Ansehensklasse"
 NZL_battle_cruiser_1_desc:0 "Die Schlachtkreuzer der Renown-Klasse wurden ursprünglich als verbesserte Versionen der Schlachtschiffe der Revenge-Klasse auf Kiel gelegt. Ihr Bau wurde bei Ausbruch des Ersten Weltkriegs eingestellt. Admiral Lord Fisher gelang es, den Bau als Schlachtkreuzer wiederaufzunehmen. Diese Schiffe waren der Inbegriff eines Schlachtkreuzers. Sie waren gut bewaffnet, schnell und wendig, hatten aber eine dünnere Panzerung und eine geringere Einsatzreichweite. Nur zwei der ursprünglich drei Schiffe, Repulse und Renown, wurden fertiggestellt."
 NZL_battle_cruiser_2:0 "Princess Royal-Klasse"
 NZL_battle_cruiser_2_desc:0 "Die Princess Royal war eine Klasse hypothetischer Schlachtkreuzer, die eine schnellere und günstigere Version der Schlachtschiffe der King George V-Klasse darstellten. Diese Schiffe verfügten über eine ähnliche, aber reduzierte Bewaffnung für den Überwasser- und Luftabwehrkampf: zwei 14-Zoll-Drillingskanonen und sechs 5,25-Zoll-Zwillings-Flugabwehrgeschütze. Ihre hohe Geschwindigkeit und Reichweite würden der Royal Navy schnelle Angriffsmöglichkeiten und Konvoischutz bieten, ihre eingeschränkte Panzerung würde sich jedoch im Kampf gegen moderne Schlachtschiffe als problematisch erweisen."
 NZL_battleship_1:0 "Queen Elizabeth-Klasse"
 NZL_battleship_1_desc:0 "Die Schlachtschiffe der Queen-Elizabeth-Klasse wurden im Rahmen des Marineprogramms von 1912 bestellt. Diese Schiffe waren die ersten, die mit 15-Zoll-Geschützen ausgestattet waren und galten als die ersten schnellen Schlachtschiffe. Sie trugen schwere Bewaffnung für Haupt- und Nebenaufgaben, und ihre dicke Panzerung machte diese Schiffe zu hervorragenden Kriegsschiffen, ideal zum Schutz des riesigen Britischen Empires. Sechs Schiffe wurden bestellt, aber nur fünf wurden in Dienst gestellt und später vor dem Zweiten Weltkrieg modernisiert."
 NZL_battleship_2:0 "King George V-Klasse"
 NZL_battleship_2_desc:0 "Die Schlachtschiffe der King-George-V-Klasse waren das Ergebnis der Washingtoner Flottenverträge von 1922 und des Ersten Londoner Flottenvertrags von 1930, die die maximale Verdrängung und Artillerie von Großkampfschiffen beschränkten. Daher waren diese Schiffe mit Kanonen kleineren Kalibers ausgestattet als frühere und sogar zeitgenössische Schlachtschiffe. Trotz des geringeren Kalibers waren die Schiffe ausreichend bewaffnet, verfügten über starke Flugabwehrwaffen und waren ausreichend geschützt. Fünf Schiffe wurden als Ersatz für die alten Schlachtschiffe der Queen-Elizabeth-Klasse bestellt und auf Kiel gelegt."
 NZL_battleship_3:0 "Löwenklasse"
 NZL_battleship_3_desc:0 "Die Schlachtschiffe der Lion-Klasse waren die Nachfolgeklasse der King-George-V-Schlachtschiffe und übernahmen viele ihrer Merkmale. Im Rahmen des Marineprogramms von 1938 wurden sechs Schiffe bestellt, um die alternden Schlachtschiffe der Revenge-Klasse zu ersetzen. Aufgrund der ausbrechenden Feindseligkeiten wurde jedoch keines fertiggestellt. Die Schiffe sollten im Großen und Ganzen der King-George-Klasse ähneln, die Hauptbewaffnung sollte jedoch schwerer sein und eine neue 16-Zoll-Kanone enthalten. Sie sollten außerdem über eine dickere Panzerung und stärkere Motoren verfügen."
 NZL_battleship_4:0 "Vanguard-Klasse"
 NZL_battleship_4_desc:0 "Das Schlachtschiff der Vanguard-Klasse war das letzte Schlachtschiff, das für die Royal Navy gebaut wurde. Es wurde nur ein einziges Schiff bestellt, vier weitere wurden jedoch für den Pazifikkrieg in Betracht gezogen. Der Bau wurde im Rahmen des Emergency War Program von 1940 in Auftrag gegeben, hatte jedoch keine hohe Priorität und wurde erst nach dem Krieg fertiggestellt. Die Klasse hatte einen schlanken Rumpf, der für ausgezeichnete Stabilität und Seetüchtigkeit sorgte. Die Bewaffnung entsprach der der Schlachtschiffe der Queen Elizabeth- und Revenge-Klasse und bot beträchtliche Feuerkraft. Starke Motoren und eine gute Panzerung machten das Schiff schnell und gut geschützt."
 NZL_SH_battleship_1:0 "Centurion-Klasse"
 NZL_SH_battleship_1_desc:0 "Die Centurion war eine Klasse hypothetischer schwerer Schlachtschiffe der Royal Navy, die als Gegenstück zu den großen Schiffen der deutschen und japanischen Marine gebaut wurden. Große 18-Zoll-Geschütze und eine dicke Panzerung verliehen dem Schiff die nötige Feuerkraft und den nötigen Schutz, um diese Schiffe zu bekämpfen. Starke Flugabwehr, große Reichweite und hohe Geschwindigkeit waren unerlässlich, um die weiten Meere des Britischen Empires zu bezwingen."
 NZL_SH_battleship_2:0 "Lion II-Klasse"
 NZL_SH_battleship_2_desc:0 "Die Schlachtschiffe der Lion-II-Klasse wurden 1944 als verbesserte Version der früheren Lion-Klasse entworfen. Die Erfahrungen aus dem Krieg wurden in diesen Entwurf einfließen gelassen, der größer und schwerer war und nach Fertigstellung entweder drei oder vier 16-Zoll-Drillingsgeschütze des neuesten Typs tragen sollte. Dicke Panzerplatten schützten das Schiff vor Angriffen von oben und aus der Luft. Die hohen Baukosten, die Niederlagen feindlicher Flotten und der Bedarf an Flugzeugträgern führten zum Abbruch des Projekts."
 NZL_carrier_1:0 "Mutige Klasse"
 NZL_carrier_1_desc:0 "Diese drei Flugzeugträger waren umgebaute Schlachtkreuzer und die ersten Flottenträger der Royal Navy. Ihr Umbau war das Ergebnis des Washingtoner Flottenabkommens von 1922 und wurde 1925 abgeschlossen. Es handelte sich um mäßig gepanzerte, aber gut bewaffnete Schiffe mit großer Reichweite und guter Geschwindigkeit, allerdings war ihre Flugzeugbesatzung aufgrund des Umbaus begrenzt. Dennoch brachten sie der Royal Navy wichtige Erfahrungen im Flugzeugträgerbau und in der Flottenluftprojektion."
 NZL_carrier_2:0 "Ark Royal-Klasse"
 NZL_carrier_2_desc:0 "Der Flugzeugträger Ark Royal war das erste Schiff dieser Art, das den Auflagen des Washingtoner Flottenabkommens entsprach. Er war das erste Schiff, bei dem Hangars und Flugdeck integraler Bestandteil des Rumpfes waren. Das 1934 entworfene Schiff war gut gepanzert und bewaffnet. Es transportierte eine große Anzahl von Flugzeugen und verfügte über ausreichend Reichweite und Geschwindigkeit, um mit den Hauptstreitkräften der Royal Navy mitzuhalten."
 NZL_carrier_3:0 "Illustre Klasse"
 NZL_carrier_3_desc:0 "Die Illustrious-Klasse wurde unter den Bedingungen des Zweiten Londoner Flottenabkommens von 1936 entworfen, das die Größe der Träger auf maximal 23.000 Tonnen begrenzte. Sie war der erste britische Träger mit einem gepanzerten Flugdeck, was die Größe der Luftgruppe reduzierte. Schwere Panzerung und Flugabwehr sorgten für eine starke Verteidigung der Schiffe, während leistungsstarke Motoren und ein großer Treibstoffvorrat den Schiffen eine große Einsatzreichweite ermöglichten. "
 NZL_carrier_4:0 "Unerbittliche Klasse"
 NZL_carrier_4_desc:0 "Die Flugzeugträger der Implacable-Klasse wurden im Rahmen des Marineprogramms von 1938 bestellt und waren im Wesentlichen verbesserte Versionen der früheren Illustrious-Klasse. Der Krieg und die Verlagerung der Priorität auf kleinere Schiffe für Konvoischutzaufgaben in der frühen und mittleren Kriegsphase verlangsamten die Reduzierung dieser Schiffe. Es handelte sich um größere Schiffe, die mehr Flugzeuge transportieren konnten und gleichzeitig eine dicke Panzerung an Rumpf und Flugdeck aufwiesen. Stärkere Motoren ermöglichten ihnen im Vergleich zur Illustrious-Klasse eine höhere Geschwindigkeit und Reichweite."
 ### POR - PORTUGAL ###
 POR_submarine_1:0 "Foca-Klasse"
 POR_submarine_1_desc:0 "Die portugiesische Foca-Klasse bestand aus drei kleinen U-Booten, die kurz nach dem Ersten Weltkrieg in Italien für die portugiesische Marine gebaut wurden. Sie waren vergrößerte Versionen der italienischen Espadarte-Klasse und die Schwesterschiffe der spanischen A-Klasse. Sie verdrängten nur 260 Tonnen und waren mit zwei 450-mm-Torpedorohren bewaffnet. Alle drei Schiffe wurden Mitte der 1930er Jahre außer Dienst gestellt."
 POR_submarine_2:0 "Delfim-Klasse"
 POR_submarine_2_desc:0 "Die Delfim-Klasse bestand aus zwei U-Booten, die ursprünglich Anfang der 1930er Jahre für die portugiesische Marine bestellt und in Italien auf Kiel gelegt worden waren. Die Bestellung wurde storniert und die Schiffe stattdessen für die italienische Marine fertiggestellt. Sie basierten auf der großen italienischen Squalo-Klasse, verdrängten 980 Tonnen und waren mit acht 533-mm-Torpedorohren bewaffnet."
 POR_submarine_4:0 "Narval-Klasse"
 POR_submarine_4_desc:0 "Die Narval-Klasse bestand aus drei britischen U-Booten der Subtle-Klasse, die 1945 in Dienst gestellt und nach dem Zweiten Weltkrieg an Portugal verkauft wurden. Sie verdrängten 840 Tonnen und waren mit sieben 533-mm-Torpedorohren bewaffnet."
 POR_destroyer_1:0 "Douro-Klasse"
 POR_destroyer_1_desc:0 "Die Douro-Klasse bestand aus sieben Zerstörern, die Anfang der 1930er Jahre vom Stapel liefen. Sie wurden sowohl in Portugal als auch in Großbritannien gebaut. Zwei der Schiffe wurden 1934 nach Kolumbien verkauft. Die Schiffe verdrängten über 1.200 Tonnen und waren mit vier BL-4,7-Zoll-Geschützen und acht 533-mm-Torpedorohren bewaffnet."
 ### PRU - PERU ###
 PRU_submarine_1:0 "R-Klasse"
 PRU_submarine_1_desc:0 "Die peruanischen U-Boote der R-Klasse bestanden aus vier U-Booten, die Mitte der 1920er Jahre bei den USA bestellt und gebaut wurden. Sie waren im Wesentlichen identisch mit den US-amerikanischen U-Booten der R-Klasse, verdrängten über 570 Tonnen und waren mit vier 533-mm-Torpedorohren bewaffnet."
 PRU_destroyer_1:0 "Almirante Villar-Klasse"
 PRU_destroyer_1_desc:0 "Die Almirante Villar und die Amirante Guise waren zwei ehemalige russische Zerstörer der Novik-Klasse. Sie gelangten über Umwege zur peruanischen Marine und fuhren unter der Flagge Großbritanniens und Estlands, bevor sie 1934 schließlich nach Peru ausgeliefert wurden. Sie waren mit vier 102-mm/60-Kaliber-Geschützen und neun 533-mm-Torpedorohren bewaffnet. Sie verdrängten über 1.200 Tonnen und erreichten für ihre Größe und ihr Alter eine beachtliche Geschwindigkeit."
 PRU_light_cruiser_1:0 "Almirante Grau-Klasse"
 PRU_light_cruiser_1_desc:0 "Die Almirante-Grau-Klasse bestand aus zwei Leichten Kreuzern, die vor dem Ersten Weltkrieg in Großbritannien für die peruanische Marine gebaut und 1907 in Dienst gestellt wurden. Selbst für einen Leichten Kreuzer waren die Schiffe mit einer Verdrängung von nur 3.100 Tonnen recht klein und erreichten eine unterdurchschnittliche Geschwindigkeit. Sie waren leicht gepanzert und besaßen als Hauptbewaffnung zwei 152-mm/50-Kaliber-Vickers-Geschütze."
 ### RAJ - BRITISH RAJ ###
 RAJ_submarine_1:0 "L-Klasse"
 RAJ_submarine_1_desc:0 "Die L-Klasse bestand aus mittelgroßen Booten, die ursprünglich im Rahmen des Emergency War Program als verbesserte Version der vorherigen U-Boot-Klassen geplant waren. Sie wurden in der Spätphase des Ersten Weltkriegs gebaut und mit neuen, größeren 21-Zoll-Torpedos ausgestattet. Sie dienten bis zum Beginn des Zweiten Weltkriegs und wurden dann hauptsächlich für sekundäre und Ausbildungszwecke eingesetzt."
 RAJ_submarine_2:0 "T-Klasse"
 RAJ_submarine_2_desc:0 "Die Boote der T-Klasse bzw. Triton-Klasse wurden als Ersatz für die großen U-Boote der O-, P- und R-Klasse entwickelt. Es handelte sich um mittelgroße U-Boote mit großer Reichweite, die sich gut für den Atlantik und den Pazifik eigneten. Diese Boote waren gut bewaffnete, stabile Plattformen und wurden während des Konflikts häufig eingesetzt, da 25 Prozent der gebauten Boote im Krieg verloren gingen."
 RAJ_submarine_3:0 "U-Klasse"
 RAJ_submarine_3_desc:0 "Die U-Klasse bestand aus kleinen U-Booten, die im Rahmen der Kriegsnotstandsprogramme 1940 und 1941 gebaut wurden. Ursprünglich als Trainings-U-Boote konzipiert, wurde das Design bei Kriegsausbruch geändert, sodass sich diese U-Boote in den engen Gewässern der Nordsee und des Mittelmeers als nützlich erwiesen. Aufgrund ihrer geringeren Größe waren ihre Reichweite und ihre Bewaffnung begrenzt. Die Klasse bestand aus drei Unterklassen: Undine, Umpire und Uproar."
 RAJ_submarine_4:0 "V-Klasse"
 RAJ_submarine_4_desc:0 "Die U-Boote der V-Klasse oder Vampire-Klasse basierten auf den kleineren Booten der Vorgängerklasse U. Sie waren größer, aber immer noch relativ klein und verfügten über bessere Seetüchtigkeit, jedoch eine begrenzte Einsatzreichweite und Bewaffnung."
 RAJ_destroyer_1:0 "V/W-Klasse"
 RAJ_destroyer_1_desc:0 "Zu diesen Zerstörern gehörten die Admirality- und Thornycroft-Klassen V und W. Sie wurden im Rahmen des War Emergency Program gebaut. Sie stellten die ultimative Weiterentwicklung des britischen Zerstörerdesigns während des Ersten Weltkriegs dar und verkörperten die Verbesserungen ihrer Vorgänger sowie neue technologische Fortschritte. In der Spätphase des Ersten Weltkriegs wurden zahlreiche dieser Schiffe gebaut, die anschließend das Rückgrat der Zerstörerflottillen der Royal Navy bildeten. Ab den 1930er Jahren wurden sie in Reserveflotten eingesetzt und schließlich nur noch zur Konvoibegleitung eingesetzt. Es handelte sich um ausreichend bewaffnete, schnelle Schiffe mit guter Reichweite."
 RAJ_destroyer_2:0 "G/H/I-Klasse"
 RAJ_destroyer_2_desc:0 "Die Zerstörer der G-, H- und I-Klasse wurden im Rahmen der Marinebauprogramme 1933 und 1934 bestellt. Sie waren im Wesentlichen Wiederholungen der vorhergehenden F-Klasse, nur etwas kleiner. Die Bewaffnung der G- und H-Klassen entsprach der der F-Klasse, wobei beide mit 4,7-Zoll-Geschützen ausgerüstet waren. Diese Schiffe hatten eine große Reichweite, waren ausreichend bewaffnet und verfügten über eine starke Torpedobewaffnung. Sie wurden während des Krieges ausgiebig eingesetzt und erlitten zahlreiche Verluste."
 RAJ_destroyer_3:0 "J/K/N-Klasse"
 RAJ_destroyer_3_desc:0 "Die Klassen J, K und N ähnelten der früheren Tribal-Klasse, doch statt der Geschützbewaffnung setzten die Konstrukteure auf eine Standardbewaffnung mit schweren Torpedos und leichteren Geschützen. Die Schiffe wurden während ihres Kriegseinsatzes modifiziert. Zu den Upgrades gehörten verbesserte Flugabwehrgeschütze und Radar. Es handelte sich um schnelle, weitreichende und gut bewaffnete Schiffe, die sich ideal für Flottenbegleitschiffe eigneten."
 RAJ_destroyer_4:0 "Kampfklasse"
 RAJ_destroyer_4_desc:0 "Die Zerstörer der Battle-Klasse bauten auf der Weiterentwicklung britischer Zerstörer auf, die während des Krieges eingesetzt wurden. Die Schiffe wurden im Rahmen der Marineprogramme 1942 und 1943 bestellt. Sie waren sowohl mit Geschützen als auch mit Torpedos gut bewaffnet. Ihre Flugabwehr, ihre Fähigkeiten zur U-Boot-Abwehr, ihre Geschwindigkeit und ihre Reichweite machten sie zu vielseitigen Schiffen. Ihr später Einsatz im Krieg führte zu einem minimalen Beitrag."
 RAJ_light_cruiser_1:0 "C-Klasse"
 RAJ_light_cruiser_1_desc:0 "Die Leichten Kreuzer der C-Klasse waren eine Gruppe von 28 Leichten Kreuzern der Royal Navy. Sie wurden vor und während des Ersten Weltkriegs für die rauen Bedingungen der Nordsee gebaut. Obwohl sie relativ klein und beengt waren, erwiesen sie sich als robuste und leistungsfähige Schiffe. Ihre Bewaffnung war mehr als zufriedenstellend: Sie trugen genügend 6-Zoll-Geschütze, um feindliche Oberflächenziele zu bekämpfen, und eine schwere Torpedoladung, um feindliche Schiffe und Konvois zu vernichten. Sie wurden im Ersten Weltkrieg ausgiebig eingesetzt und waren an vielen Überwasseraktionen beteiligt. Nur eine begrenzte Anzahl der Schiffe überlebte die Verschrottung vor dem Ersten Weltkrieg. Nur die Unterklassen Caledon, Ceres und Carlisle waren Mitte der 1930er Jahre im Einsatz."
 RAJ_light_cruiser_2:0 "Southampton-Klasse"
 RAJ_light_cruiser_2_desc:0 "Die Leichten Kreuzer der Southampton-Klasse waren eine Unterklasse der Kreuzer der Town-Klasse und wurden als Gegenstück zu den japanischen Kreuzern der Mogami-Klasse entwickelt. Diese Schiffe waren gut gepanzert, verfügten über eine gute Geschwindigkeit und Reichweite und trugen eine beeindruckende Bewaffnung mit zwölf 6-Zoll-Geschützen in vier Drillingstürmen. Sie bildeten die Grundlage für viele spätere Leichte-Kreuzer-Entwürfe der Royal Navy während des Krieges."
 RAJ_light_cruiser_3:0 "Kronkolonie-Klasse"
 RAJ_light_cruiser_3_desc:0 "Die leichten Kreuzer der Crown-Colony-Klasse waren verbesserte Versionen der früheren Town-Klasse, jedoch mit vereinfachtem Design, um den Bau zu beschleunigen und Kosten zu senken. Die Schiffe trugen die gleiche Bewaffnung wie ihre Vorgänger, vier Drillingstürme mit 6-Zoll-Geschützen. Sie waren ähnlich gepanzert, hatten aber aufgrund ihrer kleineren Motoren eine etwas geringere Reichweite. Der Typ umfasste zwei Unterklassen: Fiji und Ceylon."
 RAJ_light_cruiser_4:0 "Minotaurus-Klasse"
 RAJ_light_cruiser_4_desc:0 "Diese Kreuzer, auch als Swiftsure-Klasse bekannt, wurden als modifizierte Version der Crown-Colony-Klasse konzipiert und enthielten 1941 genehmigte Kriegsmodifikationen. Sie verfügten über eine größere Reichweite und mehr Flugabwehrwaffen als die Crown-Colony-Klasse, während die Hauptbewaffnung auf drei Drillingstürme reduziert war. Da der Bau zu spät war, um den Kriegsausgang zu beeinflussen, wurden die meisten der bestellten Schiffe später storniert. "
 RAJ_heavy_cruiser_1:0 "Hawkins-Klasse"
 RAJ_heavy_cruiser_1_desc:0 "Die Kreuzer der Hawkins-Klasse waren die ersten schweren Kreuzer der Welt. Sie basierten auf den früheren leichten Kreuzern der Town-Klasse, insbesondere der Birmingham-Unterklasse, waren jedoch mit 7,5-Zoll-Geschützen und einem dickeren Panzergürtel ausgestattet. Sie wurden für den Kampf gegen die großen deutschen Konvoi-Angreifer entwickelt. Sie waren gut bewaffnet, verfügten über eine angemessene Geschwindigkeit und Reichweite und waren gut geschützt. Insgesamt wurden fünf Schiffe in Dienst gestellt, aber nur vier waren zu Beginn des Zweiten Weltkriegs im Einsatz."
 RAJ_heavy_cruiser_2:0 "Surrey-Klasse"
 RAJ_heavy_cruiser_2_desc:0 "Die Schweren Kreuzer der Surrey-Klasse wurden im Rahmen des Marineprogramms von 1928 vorgeschlagen. Sie waren verbesserte Versionen der früheren Schweren Kreuzer der York-Klasse. Wären sie fertiggestellt worden, wären sie mit vier 8-Zoll-Zwillingstürmen, schwererer Panzerung und stärkeren Motoren ausgestattet gewesen. Zwei Schiffe wurden bestellt, aber keines wurde auf Kiel gelegt."
 RAJ_heavy_cruiser_3:0 "Admiral-Klasse"
 RAJ_heavy_cruiser_3_desc:0 "Die Schweren Kreuzer der Admiral-Klasse (nicht zu verwechseln mit den Schlachtkreuzern der Admiral-Klasse) waren der letzte Versuch der Royal Navy, Kreuzer mit 8-Zoll-Geschützen zu konstruieren und zu bauen. Die Designstudien begannen 1938 und endeten 1941. Sie führten zu verschiedenen Entwürfen. Die endgültigen Entwürfe beinhalteten neue 8-Zoll-Geschütze in Drillingstürmen, schwere Flugabwehr, dicke Panzerung und hohe Geschwindigkeit. Der Mangel an feindlichen Kreuzern und die Kosteneffizienz dieser Schiffe führten dazu, dass man sich stattdessen auf den Bau weiterer leichter Kreuzer konzentrierte."
 RAJ_heavy_cruiser_4:0 "Churchill Design"
 RAJ_heavy_cruiser_4_desc:0 "Diese Schiffe wurden von Sir Winston Churchill, Lord der Admiralität, zu Beginn des Zweiten Weltkriegs als Gegenstück zu den schweren Kreuzern der Deutschland-Klasse vorgeschlagen. Sie sollten über 9,2-Zoll-Kanonen, schwere Flugabwehr und starke Panzerung verfügen. Sie sollten die feindlichen Großkampfschiffe effektiv bekämpfen. Aufgrund der hohen Kosten und der mangelnden Nachfrage nach neuen schweren Kreuzern wurde der Bau der Schiffe schließlich eingestellt. "
 RAJ_battle_cruiser_1:0 "Ansehensklasse"
 RAJ_battle_cruiser_1_desc:0 "Die Schlachtkreuzer der Renown-Klasse wurden ursprünglich als verbesserte Versionen der Schlachtschiffe der Revenge-Klasse auf Kiel gelegt. Ihr Bau wurde bei Ausbruch des Ersten Weltkriegs eingestellt. Admiral Lord Fisher gelang es, den Bau als Schlachtkreuzer wiederaufzunehmen. Diese Schiffe waren der Inbegriff eines Schlachtkreuzers. Sie waren gut bewaffnet, schnell und wendig, hatten aber eine dünnere Panzerung und eine geringere Einsatzreichweite. Nur zwei der ursprünglich drei Schiffe, Repulse und Renown, wurden fertiggestellt."
 RAJ_battle_cruiser_2:0 "Princess Royal-Klasse"
 RAJ_battle_cruiser_2_desc:0 "Die Princess Royal war eine Klasse hypothetischer Schlachtkreuzer, die eine schnellere und günstigere Version der Schlachtschiffe der King George V-Klasse darstellten. Diese Schiffe verfügten über eine ähnliche, aber reduzierte Bewaffnung für den Überwasser- und Luftkampf: zwei 14-Zoll-Drillingskanonen und sechs 5,25-Zoll-Zwillings-Flugabwehrgeschütze. Ihre hohe Geschwindigkeit und große Reichweite würden der Royal Navy schnelle Angriffsfähigkeiten und Konvoischutz ermöglichen, ihre eingeschränkte Panzerung würde sich jedoch im Kampf gegen moderne Schlachtschiffe als problematisch erweisen."
 RAJ_battleship_1:0 "Queen Elizabeth-Klasse"
 RAJ_battleship_1_desc:0 "Die Schlachtschiffe der Queen-Elizabeth-Klasse wurden im Rahmen des Marineprogramms von 1912 bestellt. Diese Schiffe waren die ersten, die mit 15-Zoll-Geschützen ausgestattet waren und galten als die ersten schnellen Schlachtschiffe. Sie trugen schwere Bewaffnung für Haupt- und Nebenaufgaben, und ihre dicke Panzerung machte diese Schiffe zu hervorragenden Kriegsschiffen, ideal zum Schutz des riesigen Britischen Empires. Sechs Schiffe wurden bestellt, aber nur fünf wurden in Dienst gestellt und später vor dem Zweiten Weltkrieg modernisiert."
 RAJ_battleship_2:0 "King George V-Klasse"
 RAJ_battleship_2_desc:0 "Die Schlachtschiffe der King-George-V-Klasse waren das Ergebnis der Washingtoner Flottenverträge von 1922 und des Ersten Londoner Flottenvertrags von 1930, die die maximale Verdrängung und Artillerie von Großkampfschiffen beschränkten. Daher waren diese Schiffe mit Kanonen kleineren Kalibers ausgestattet als frühere und sogar zeitgenössische Schlachtschiffe. Trotz des geringeren Kalibers waren die Schiffe ausreichend bewaffnet, verfügten über starke Flugabwehrwaffen und waren ausreichend geschützt. Fünf Schiffe wurden als Ersatz für die alten Schlachtschiffe der Queen-Elizabeth-Klasse bestellt und auf Kiel gelegt."
 RAJ_battleship_3:0 "Löwenklasse"
 RAJ_battleship_3_desc:0 "Die Schlachtschiffe der Lion-Klasse waren die Nachfolgemodelle der King George V und übernahmen viele ihrer Merkmale. Im Rahmen des Marineprogramms von 1938 wurden sechs Schiffe bestellt, um die alternden Schlachtschiffe der Revenge-Klasse zu ersetzen. Aufgrund der ausbrechenden Feindseligkeiten wurde jedoch keines fertiggestellt. Die Schiffe sollten im Großen und Ganzen der King George-Klasse ähneln, die Hauptbewaffnung sollte jedoch schwerer sein und eine neue 16-Zoll-Kanone enthalten. Sie sollten außerdem über eine dickere Panzerung und stärkere Motoren verfügen."
 RAJ_battleship_4:0 "Vanguard-Klasse"
 RAJ_battleship_4_desc:0 "Das Schlachtschiff der Vanguard-Klasse war das letzte Schlachtschiff, das für die Royal Navy gebaut wurde. Es wurde nur ein einziges Schiff bestellt, vier weitere wurden jedoch für den Pazifikkrieg in Betracht gezogen. Der Bau wurde im Rahmen des Emergency War Program von 1940 in Auftrag gegeben, hatte jedoch keine hohe Priorität und wurde erst nach dem Krieg fertiggestellt. Die Klasse hatte einen schlanken Rumpf, der für ausgezeichnete Stabilität und Seetüchtigkeit sorgte. Die Bewaffnung entsprach der der Schlachtschiffe der Queen Elizabeth- und Revenge-Klasse und bot beträchtliche Feuerkraft. Starke Motoren und eine gute Panzerung machten das Schiff schnell und gut geschützt."
 RAJ_SH_battleship_1:0 "Centurion-Klasse"
 RAJ_SH_battleship_1_desc:0 "Die Centurion war eine Klasse hypothetischer schwerer Schlachtschiffe der Royal Navy, die als Gegenstück zu den großen Schiffen der deutschen und japanischen Marine gebaut wurden. Große 18-Zoll-Geschütze und eine dicke Panzerung verliehen dem Schiff die nötige Feuerkraft und den nötigen Schutz, um diese Schiffe zu bekämpfen. Starke Flugabwehr, große Reichweite und hohe Geschwindigkeit waren unerlässlich, um die weiten Meere des Britischen Empires zu bezwingen."
 RAJ_SH_battleship_2:0 "Lion II-Klasse"
 RAJ_SH_battleship_2_desc:0 "Die Schlachtschiffe der Lion-II-Klasse wurden 1944 als verbesserte Version der früheren Lion-Klasse entworfen. Die Erfahrungen aus dem Krieg wurden in diesen Entwurf einfließen gelassen, der größer und schwerer war und nach Fertigstellung entweder drei oder vier 16-Zoll-Drillingsgeschütze des neuesten Typs tragen sollte. Dicke Panzerplatten schützten das Schiff vor Angriffen von oben und aus der Luft. Die hohen Baukosten, die Niederlagen feindlicher Flotten und der Bedarf an Flugzeugträgern führten zum Abbruch des Projekts."
 RAJ_carrier_1:0 "Mutige Klasse"
 RAJ_carrier_1_desc:0 "Diese drei Flugzeugträger waren umgebaute Schlachtkreuzer und die ersten Flottenträger der Royal Navy. Ihr Umbau war das Ergebnis des Washingtoner Flottenabkommens von 1922 und wurde 1925 abgeschlossen. Es handelte sich um mäßig gepanzerte, aber gut bewaffnete Schiffe mit großer Reichweite und guter Geschwindigkeit, allerdings war ihre Flugzeugbesatzung aufgrund des Umbaus begrenzt. Dennoch brachten sie der Royal Navy wichtige Erfahrungen im Flugzeugträgerbau und in der Flottenluftprojektion."
 RAJ_carrier_2:0 "Ark Royal-Klasse"
 RAJ_carrier_2_desc:0 "Der Flugzeugträger Ark Royal war das erste Schiff dieser Art, das den Auflagen des Washingtoner Flottenabkommens entsprach. Er war das erste Schiff, bei dem Hangars und Flugdeck integraler Bestandteil des Rumpfes waren. Das 1934 entworfene Schiff war gut gepanzert und bewaffnet. Es transportierte eine große Anzahl von Flugzeugen und verfügte über ausreichend Reichweite und Geschwindigkeit, um mit den Hauptstreitkräften der Royal Navy mitzuhalten."
 RAJ_carrier_3:0 "Illustre Klasse"
 RAJ_carrier_3_desc:0 "Die Illustrious-Klasse wurde unter den Bedingungen des Zweiten Londoner Flottenabkommens von 1936 entworfen, das die Größe der Träger auf maximal 23.000 Tonnen begrenzte. Sie war der erste britische Träger mit einem gepanzerten Flugdeck, was die Größe der Luftgruppe reduzierte. Schwere Panzerung und Flugabwehr sorgten für eine starke Verteidigung der Schiffe, während leistungsstarke Motoren und ein großer Treibstoffvorrat den Schiffen eine große Einsatzreichweite ermöglichten. "
 RAJ_carrier_4:0 "Unerbittliche Klasse"
 RAJ_carrier_4_desc:0 "Die Flugzeugträger der Implacable-Klasse wurden im Rahmen des Marineprogramms von 1938 bestellt und waren im Wesentlichen verbesserte Versionen der früheren Illustrious-Klasse. Der Krieg und die Verlagerung der Priorität auf kleinere Schiffe für Konvoischutzaufgaben in der frühen und mittleren Kriegsphase verlangsamten die Reduzierung dieser Schiffe. Es handelte sich um größere Schiffe, die mehr Flugzeuge transportieren konnten und gleichzeitig eine dicke Panzerung an Rumpf und Flugdeck aufwiesen. Stärkere Motoren ermöglichten ihnen im Vergleich zur Illustrious-Klasse eine höhere Geschwindigkeit und Reichweite."
 ### ROM - ROMANIA ###
 ROM_submarine_1:0 "Delfinul-Klasse"
 ROM_submarine_1_desc:0 "Die Delfinul war ein rumänisches U-Boot, das in Italien für die rumänische Marine gebaut wurde. Es lief 1930 vom Stapel, verdrängte 650 Tonnen und war mit sechs 533-mm-Torpedorohren bewaffnet."
 ROM_submarine_3:0 "Requinul-Klasse"
 ROM_submarine_3_desc:0 "Die U-Boote Requinul und Marsuinul wurden von den Deutschen für ihre rumänischen Verbündeten gebaut. Sie wurden 1943 in Dienst gestellt. Die Schiffe basierten auf den deutschen U-Booten des Typs VII. Es handelte sich um mittelgroße U-Boote mit einer Verdrängung von 600 Tonnen und sechs 533-mm-Torpedorohren."
 ROM_destroyer_1:0 "Marasti-Klasse"
 ROM_destroyer_1_desc:0 "Die Marasti-Klasse war eine Zerstörerklasse, die während des Ersten Weltkriegs für Rumänien gebaut wurde. Die vier Schiffe dieser Klasse wurden während des Krieges von der italienischen Marine requiriert, zwei wurden schließlich Anfang der 1920er Jahre nach Rumänien verkauft. Es handelte sich um größere Zerstörer mit einer Verdrängung von über 1.400 Tonnen. Sie waren mit vier 120-mm/45 Schneider-Canet-Armstrong-Geschützen und vier 450-mm-Torpedorohren bewaffnet. Sie waren für ihr Alter durchschnittlich schnell und zuverlässig."
 #ROM_destroyer_1b: "Regele Ferdinand Class"
 ### SAF - SOUTH AFRICA ###
 SAF_submarine_1:0 "L-Klasse"
 SAF_submarine_1_desc:0 "Die L-Klasse bestand aus mittelgroßen Booten, die ursprünglich im Rahmen des Emergency War Program als verbesserte Version der vorherigen U-Boot-Klassen geplant waren. Sie wurden in der Spätphase des Ersten Weltkriegs gebaut und mit neuen, größeren 21-Zoll-Torpedos ausgestattet. Sie dienten bis zum Beginn des Zweiten Weltkriegs und wurden dann hauptsächlich für sekundäre und Ausbildungszwecke eingesetzt."
 SAF_submarine_2:0 "T-Klasse"
 SAF_submarine_2_desc:0 "Die Boote der T-Klasse bzw. Triton-Klasse wurden als Ersatz für die großen U-Boote der O-, P- und R-Klasse entwickelt. Es handelte sich um mittelgroße U-Boote mit großer Reichweite, die sich gut für den Atlantik und den Pazifik eigneten. Diese Boote waren gut bewaffnete, stabile Plattformen und wurden während des Konflikts häufig eingesetzt, da 25 Prozent der gebauten Boote im Krieg verloren gingen."
 SAF_submarine_3:0 "U-Klasse"
 SAF_submarine_3_desc:0 "Die U-Klasse bestand aus kleinen U-Booten, die im Rahmen der Kriegsnotstandsprogramme 1940 und 1941 gebaut wurden. Ursprünglich als Trainings-U-Boote konzipiert, wurde das Design bei Kriegsausbruch geändert, sodass sich diese U-Boote in den engen Gewässern der Nordsee und des Mittelmeers als nützlich erwiesen. Aufgrund ihrer geringeren Größe waren ihre Reichweite und ihre Bewaffnung begrenzt. Die Klasse bestand aus drei Unterklassen: Undine, Umpire und Uproar."
 SAF_submarine_4:0 "V-Klasse"
 SAF_submarine_4_desc:0 "Die U-Boote der V-Klasse oder Vampire-Klasse basierten auf den kleineren Booten der Vorgängerklasse U. Sie waren größer, aber immer noch relativ klein und verfügten über bessere Seetüchtigkeit, jedoch eine begrenzte Einsatzreichweite und Bewaffnung."
 SAF_destroyer_1:0 "V/W-Klasse"
 SAF_destroyer_1_desc:0 "Zu diesen Zerstörern gehörten die Admirality- und Thornycroft-Klassen V und W. Sie wurden im Rahmen des War Emergency Program gebaut. Sie stellten die ultimative Weiterentwicklung des britischen Zerstörerdesigns während des Ersten Weltkriegs dar und verkörperten die Verbesserungen ihrer Vorgänger sowie neue technologische Fortschritte. In der Spätphase des Ersten Weltkriegs wurden diese Schiffe in großer Zahl gebaut und bildeten danach das Rückgrat der Zerstörerflottillen der Royal Navy. Ab den 1930er Jahren wurden sie in Reserveflotten eingesetzt und schließlich zum Konvoi-Begleitdienst degradiert. Es handelte sich um ausreichend bewaffnete, schnelle Schiffe mit guter Reichweite."
 SAF_destroyer_2:0 "G/H/I-Klasse"
 SAF_destroyer_2_desc:0 "Die Zerstörer der G-, H- und I-Klasse wurden im Rahmen der Marinebauprogramme 1933 und 1934 bestellt. Sie waren im Wesentlichen Wiederholungen der vorhergehenden F-Klasse, nur etwas kleiner. Die Bewaffnung der G- und H-Klassen war dieselbe wie die der F-Klasse, wobei beide mit 4,7-Zoll-Geschützen ausgestattet waren. Diese Schiffe hatten eine große Reichweite, waren ausreichend bewaffnet und verfügten über eine starke Torpedobewaffnung. Sie wurden während des Krieges ausgiebig eingesetzt und erlitten zahlreiche Verluste."
 SAF_destroyer_3:0 "J/K/N-Klasse"
 SAF_destroyer_3_desc:0 "Die Klassen J, K und N ähnelten der früheren Tribal-Klasse, doch statt der Geschützbewaffnung setzten die Konstrukteure auf eine Standardbewaffnung mit schweren Torpedos und leichteren Geschützen. Die Schiffe wurden während ihres Kriegseinsatzes modifiziert. Zu den Upgrades gehörten verbesserte Flugabwehrgeschütze und Radar. Es handelte sich um schnelle, weitreichende und gut bewaffnete Schiffe, die sich ideal für Flottenbegleitschiffe eigneten."
 SAF_destroyer_4:0 "Kampfklasse"
 SAF_destroyer_4_desc:0 "Die Zerstörer der Battle-Klasse bauten auf der Weiterentwicklung britischer Zerstörer auf, die während des Krieges eingesetzt wurden. Die Schiffe wurden im Rahmen der Marineprogramme 1942 und 1943 bestellt. Sie waren sowohl mit Geschützen als auch mit Torpedos gut bewaffnet. Ihre Flugabwehr, ihre Fähigkeiten zur U-Boot-Abwehr, ihre Geschwindigkeit und ihre Reichweite machten sie zu vielseitigen Schiffen. Ihr später Einsatz im Krieg führte zu einem minimalen Beitrag."
 SAF_light_cruiser_1:0 "C-Klasse"
 SAF_light_cruiser_1_desc:0 "Die Leichten Kreuzer der C-Klasse waren eine Gruppe von 28 Leichten Kreuzern der Royal Navy. Sie wurden vor und während des Ersten Weltkriegs für die rauen Bedingungen der Nordsee gebaut. Obwohl sie relativ klein und beengt waren, erwiesen sie sich als robuste und leistungsfähige Schiffe. Ihre Bewaffnung war mehr als zufriedenstellend: Sie trugen genügend 6-Zoll-Geschütze, um feindliche Oberflächenziele zu bekämpfen, und eine schwere Torpedoladung, um feindliche Schiffe und Konvois zu vernichten. Sie wurden im Ersten Weltkrieg ausgiebig eingesetzt und waren an vielen Überwasseraktionen beteiligt. Nur eine begrenzte Anzahl der Schiffe überlebte die Verschrottung vor dem Ersten Weltkrieg. Nur die Unterklassen Caledon, Ceres und Carlisle waren Mitte der 1930er Jahre im Einsatz."
 SAF_light_cruiser_2:0 "Southampton-Klasse"
 SAF_light_cruiser_2_desc:0 "Die Leichten Kreuzer der Southampton-Klasse waren eine Unterklasse der Kreuzer der Town-Klasse und wurden als Gegenstück zu den japanischen Kreuzern der Mogami-Klasse entwickelt. Diese Schiffe waren gut gepanzert, verfügten über eine gute Geschwindigkeit und Reichweite und trugen eine beeindruckende Bewaffnung mit zwölf 6-Zoll-Geschützen in vier Drillingstürmen. Sie bildeten die Grundlage für viele spätere Leichte-Kreuzer-Entwürfe der Royal Navy während des Krieges."
 SAF_light_cruiser_3:0 "Kronkolonie-Klasse"
 SAF_light_cruiser_3_desc:0 "Die leichten Kreuzer der Crown-Colony-Klasse waren verbesserte Versionen der früheren Town-Klasse, jedoch mit vereinfachtem Design, um den Bau zu beschleunigen und Kosten zu senken. Die Schiffe trugen die gleiche Bewaffnung wie ihre Vorgänger, vier Drillingstürme mit 6-Zoll-Geschützen. Sie waren ähnlich gepanzert, hatten aber aufgrund ihrer kleineren Motoren eine etwas geringere Reichweite. Der Typ umfasste zwei Unterklassen: Fiji und Ceylon."
 SAF_light_cruiser_4:0 "Minotaurus-Klasse"
 SAF_light_cruiser_4_desc:0 "Diese Kreuzer, auch als Swiftsure-Klasse bekannt, wurden als modifizierte Version der Crown-Colony-Klasse konzipiert und enthielten 1941 genehmigte Kriegsmodifikationen. Sie verfügten über eine größere Reichweite und mehr Flugabwehrwaffen als die Crown-Colony-Klasse, während die Hauptbewaffnung auf drei Drillingstürme reduziert war. Da der Bau zu spät war, um den Kriegsausgang zu beeinflussen, wurden die meisten der bestellten Schiffe später storniert. "
 SAF_heavy_cruiser_1:0 "Hawkins-Klasse"
 SAF_heavy_cruiser_1_desc:0 "Die Kreuzer der Hawkins-Klasse waren die ersten schweren Kreuzer der Welt. Sie basierten auf den früheren leichten Kreuzern der Town-Klasse, insbesondere der Birmingham-Unterklasse, waren jedoch mit 7,5-Zoll-Geschützen und einem dickeren Panzergürtel ausgestattet. Sie wurden für den Kampf gegen die großen deutschen Konvoi-Angreifer entwickelt. Sie waren gut bewaffnet, verfügten über eine angemessene Geschwindigkeit und Reichweite und waren gut geschützt. Insgesamt wurden fünf Schiffe in Dienst gestellt, aber nur vier waren zu Beginn des Zweiten Weltkriegs im Einsatz."
 SAF_heavy_cruiser_2:0 "Surrey-Klasse"
 SAF_heavy_cruiser_2_desc:0 "Die Schweren Kreuzer der Surrey-Klasse wurden im Rahmen des Marineprogramms von 1928 vorgeschlagen. Sie waren verbesserte Versionen der früheren Schweren Kreuzer der York-Klasse. Wären sie fertiggestellt worden, wären sie mit vier 8-Zoll-Zwillingstürmen, schwererer Panzerung und stärkeren Motoren ausgestattet gewesen. Zwei Schiffe wurden bestellt, aber keines wurde auf Kiel gelegt."
 SAF_heavy_cruiser_3:0 "Admiral-Klasse"
 SAF_heavy_cruiser_3_desc:0 "Die Schweren Kreuzer der Admiral-Klasse (nicht zu verwechseln mit den Schlachtkreuzern der Admiral-Klasse) waren der letzte Versuch der Royal Navy, Kreuzer mit 8-Zoll-Geschützen zu konstruieren und zu bauen. Die Designstudien begannen 1938 und endeten 1941. Sie führten zu verschiedenen Entwürfen. Die endgültigen Entwürfe beinhalteten neue 8-Zoll-Geschütze in Drillingstürmen, schwere Flugabwehr, dicke Panzerung und hohe Geschwindigkeit. Der Mangel an feindlichen Kreuzern und die Kosteneffizienz dieser Schiffe führten dazu, dass man sich stattdessen auf den Bau weiterer leichter Kreuzer konzentrierte."
 SAF_heavy_cruiser_4:0 "Churchill Design"
 SAF_heavy_cruiser_4_desc:0 "Diese Schiffe wurden von Sir Winston Churchill, Lord der Admiralität, zu Beginn des Zweiten Weltkriegs als Gegenstück zu den schweren Kreuzern der Deutschland-Klasse vorgeschlagen. Sie sollten über 9,2-Zoll-Kanonen, schwere Flugabwehr und starke Panzerung verfügen. Sie sollten die feindlichen Großkampfschiffe effektiv bekämpfen. Aufgrund der hohen Kosten und der mangelnden Nachfrage nach neuen schweren Kreuzern wurde der Bau der Schiffe schließlich eingestellt. "
 SAF_battle_cruiser_1:0 "Ansehensklasse"
 SAF_battle_cruiser_1_desc:0 "Die Schlachtkreuzer der Renown-Klasse wurden ursprünglich als verbesserte Versionen der Schlachtschiffe der Revenge-Klasse auf Kiel gelegt. Ihr Bau wurde bei Ausbruch des Ersten Weltkriegs eingestellt. Admiral Lord Fisher gelang es, den Bau als Schlachtkreuzer wiederaufzunehmen. Diese Schiffe waren der Inbegriff eines Schlachtkreuzers. Sie waren gut bewaffnet, schnell und wendig, hatten aber eine dünnere Panzerung und eine geringere Einsatzreichweite. Nur zwei der ursprünglich drei Schiffe, Repulse und Renown, wurden fertiggestellt."
 SAF_battle_cruiser_2:0 "Princess Royal-Klasse"
 SAF_battle_cruiser_2_desc:0 "Die Princess Royal war eine Klasse hypothetischer Schlachtkreuzer, die eine schnellere und günstigere Version der Schlachtschiffe der King George V-Klasse darstellten. Diese Schiffe verfügten über eine ähnliche, aber reduzierte Bewaffnung für den Überwasser- und Luftkampf: zwei 14-Zoll-Drillingskanonen und sechs 5,25-Zoll-Zwillings-Flugabwehrgeschütze. Ihre hohe Geschwindigkeit und große Reichweite würden der Royal Navy schnelle Angriffsfähigkeiten und Konvoischutz ermöglichen, ihre eingeschränkte Panzerung würde sich jedoch im Kampf gegen moderne Schlachtschiffe als problematisch erweisen."
 SAF_battleship_1:0 "Queen Elizabeth-Klasse"
 SAF_battleship_1_desc:0 "Die Schlachtschiffe der Queen-Elizabeth-Klasse wurden im Rahmen des Marineprogramms von 1912 bestellt. Diese Schiffe waren die ersten, die mit 15-Zoll-Geschützen ausgestattet waren und galten als die ersten schnellen Schlachtschiffe. Sie trugen schwere Bewaffnung für Haupt- und Nebenaufgaben, und ihre dicke Panzerung machte diese Schiffe zu hervorragenden Kriegsschiffen, ideal zum Schutz des riesigen Britischen Empires. Sechs Schiffe wurden bestellt, aber nur fünf wurden in Dienst gestellt und später vor dem Zweiten Weltkrieg modernisiert."
 SAF_battleship_2:0 "King George V-Klasse"
 SAF_battleship_2_desc:0 "Die Schlachtschiffe der King-George-V-Klasse waren das Ergebnis der Washingtoner Flottenverträge von 1922 und des Ersten Londoner Flottenvertrags von 1930, die die maximale Verdrängung und Artillerie von Großkampfschiffen beschränkten. Daher waren diese Schiffe mit Kanonen kleineren Kalibers ausgestattet als frühere und sogar zeitgenössische Schlachtschiffe. Trotz des geringeren Kalibers waren die Schiffe ausreichend bewaffnet, verfügten über starke Flugabwehrwaffen und waren ausreichend geschützt. Fünf Schiffe wurden als Ersatz für die alten Schlachtschiffe der Queen-Elizabeth-Klasse bestellt und auf Kiel gelegt."
 SAF_battleship_3:0 "Löwenklasse"
 SAF_battleship_3_desc:0 "Die Schlachtschiffe der Lion-Klasse waren die Nachfolgeklasse der King-George-V-Schlachtschiffe und übernahmen viele ihrer Merkmale. Im Rahmen des Marineprogramms von 1938 wurden sechs Schiffe bestellt, um die alternden Schlachtschiffe der Revenge-Klasse zu ersetzen. Aufgrund der ausbrechenden Feindseligkeiten wurde jedoch keines fertiggestellt. Die Schiffe sollten im Großen und Ganzen der King-George-Klasse ähneln, die Hauptbewaffnung sollte jedoch schwerer sein und eine neue 16-Zoll-Kanone enthalten. Sie sollten außerdem über eine dickere Panzerung und stärkere Motoren verfügen."
