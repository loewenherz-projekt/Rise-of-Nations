 SAF_carrier_3_desc:0 "Die Illustrious-Klasse wurde unter den Bedingungen des Zweiten Londoner Flottenabkommens von 1936 entworfen, das die Größe der Träger auf maximal 23.000 Tonnen begrenzte. Sie war der erste britische Träger mit einem gepanzerten Flugdeck, was die Größe der Luftgruppe reduzierte. Schwere Panzerung und Flugabwehr sorgten für eine starke Verteidigung der Schiffe, während leistungsstarke Motoren und ein großer Treibstoffvorrat den Schiffen eine große Einsatzreichweite ermöglichten. "
 SAF_carrier_4:0 "Unerbittliche Klasse"
 SAF_carrier_4_desc:0 "Die Flugzeugträger der Implacable-Klasse wurden im Rahmen des Marineprogramms von 1938 bestellt und waren im Wesentlichen verbesserte Versionen der früheren Illustrious-Klasse. Der Krieg und die Verlagerung der Priorität auf kleinere Schiffe für Konvoischutzaufgaben in der frühen und mittleren Kriegsphase verlangsamten die Reduzierung dieser Schiffe. Es handelte sich um größere Schiffe, die mehr Flugzeuge transportieren konnten und gleichzeitig eine dicke Panzerung an Rumpf und Flugdeck aufwiesen. Stärkere Motoren ermöglichten ihnen im Vergleich zur Illustrious-Klasse eine höhere Geschwindigkeit und Reichweite."
 ### SIA - SIAM ###
 SIA_submarine_2:0 "Vilun-Klasse"
 SIA_submarine_2_desc:0 "Die U-Boote der Vilun-Klasse waren vier kleine Küsten-U-Boote, die zwischen 1936 und 1938 in Japan für die Königlich Thailändische Marine gebaut wurden. Sie verdrängten 370 Tonnen und waren mit fünf 533-mm-Torpedorohren bewaffnet."
 SIA_destroyer_1:0 "Phra Ruang-Klasse"
 SIA_destroyer_1_desc:0 "Die Phra Ruang war ein ehemaliger britischer Zerstörer der R-Klasse, der 1920 an die Königlich Thailändische Marine verkauft wurde. Das Schiff verdrängte etwas über 1.000 Tonnen und war mit drei 120-mm/45 QF Mk IV-Geschützen und vier 533-mm-Torpedorohren bewaffnet. Für ihr Alter verfügte sie über eine gute Geschwindigkeit, Reichweite und Zuverlässigkeit."
 SIA_light_cruiser_3:0 "Taskin-Klasse"
 SIA_light_cruiser_3_desc:0 "Die Taskin-Klasse bestand aus zwei in Italien gebauten Leichten Kreuzern. Sie liefen 1941 vom Stapel, wurden aber 1942 von der siamesischen Marine requiriert. Sie sollten die italienischen Flakkreuzer der Etna-Klasse der Regia Marina werden, wurden aber vor dem italienischen Waffenstillstand nie fertiggestellt. Sie hätten 5.900 Tonnen verdrängt und wären mit sechs 152-mm/53 OTO 1929-Geschützen in ihrer Hauptbewaffnung bewaffnet gewesen. Sie hätten eine ordentliche Panzerung gehabt, wären aber für einen Kreuzer relativ langsam gewesen."
 SIA_heavy_cruiser_1:0 "Sri Ayuthia-Klasse"
 SIA_heavy_cruiser_1_desc:0 "Die Küstenverteidigungsschiffe der Sri-Ayuthia-Klasse waren vermutlich die letzten Schiffe dieses Typs weltweit. Beide Schiffe der Klasse wurden in Japan gebaut und 1938 für die Königlich Thailändische Marine in Dienst gestellt. Das Design war vergleichbar mit einem kleinen Kreuzer (oder großen Zerstörer) in der Größe, mit einem Schlachtschiff in der Geschwindigkeit und mit einem schweren Kreuzer in der Bewaffnung. Die Hauptgeschütze bestanden aus vier 203-mm/53 3-Shiki-Kanonen. Im Vergleich zu damaligen schweren Kreuzern waren sie leicht gepanzert."
 ### SPA - NATIONALIST SPAIN ###
 SPA_submarine_1:0 "B-Klasse"
 SPA_submarine_1_desc:0 "Die B-Klasse waren die ersten in Spanien für die spanische Marine gebauten U-Boote. Die sechs Schiffe dieser Klasse wurden zwischen 1922 und 1925 in Dienst gestellt. Sie waren als Einhüllenschiffe konzipiert und daher nicht sehr zuverlässig. Es handelte sich um mittelgroße U-Boote mit einer Wasserverdrängung von über 550 Tonnen. Sie waren mit vier 450-mm-Torpedorohren bewaffnet."
 #SPA_submarine_1b: "C Class"
 SPA_submarine_2:0 "Allgemeine Mola-Klasse"
 SPA_submarine_2_desc:0 "Die General-Mola-Klasse bestand aus vier italienischen U-Booten der Archimedes-Klasse, die 1934 in Dienst gestellt und 1937 an die Nationalisten übergeben wurden. Sie waren mit einer Verdrängung von 880 Tonnen recht groß, aber schneller als die meisten U-Boote. Sie waren mit acht 533-mm-Torpedorohren bewaffnet und hatten eine Tauchtiefe von 90 m."
 SPA_submarine_3:0 "G-Klasse"
 SPA_submarine_3_desc:0 "Die spanischen U-Boote der G-Klasse waren zwei deutsche U-Boote der VIIC-Klasse, die vom nationalistischen Spanien in Lizenz gebaut wurden. Allerdings wurde nur eines fertiggestellt und erst 1947 an die spanische Marine übergeben. Die U-Boote verdrängten 770 Tonnen und waren mit fünf 533-mm-Torpedorohren bewaffnet. Sie verfügten über eine hervorragende Geschwindigkeit und Reichweite, da die VIIC-U-Boote das Arbeitspferd der deutschen U-Boot-Flotte waren."
 SPA_submarine_4:0 "D-Klasse"
 SPA_submarine_4_desc:0 "Die drei U-Boote der spanischen D-Klasse liefen alle 1944 vom Stapel und wurden nach dem Krieg zu verschiedenen Zeitpunkten in Dienst gestellt. Alle drei wurden in Spanien entworfen und gebaut. Es handelte sich um große, hochseetaugliche U-Boote mit einer Verdrängung von 1.050 Tonnen. Sie waren mit sechs 533-mm-Torpedorohren bewaffnet und verfügten über eine hervorragende Geschwindigkeit und Reichweite."
 SPA_destroyer_1:0 "Alsedo-Klasse"
 SPA_destroyer_1_desc:0 "Die drei Zerstörer der Alsedo-Klasse wurden für die spanische Marine in Spanien gebaut. Sie basierten auf dem britischen L-Klasse-Design und wurden zwischen 1924 und 1925 in Dienst gestellt. Sie verdrängten über 1.040 Tonnen und waren mit drei 102-mm/45-Vickers-Mk-LA-Geschützen als Hauptbewaffnung sowie vier 450-mm-Torpedorohren ausgestattet. Sie verfügten für ihr Alter über eine beachtliche Geschwindigkeit und Reichweite."
 SPA_destroyer_2:0 "Churucca-Klasse"
 SPA_destroyer_2_desc:0 "Die spanische Churucca-Klasse umfasste sechzehn Zerstörer, die zwischen 1925 und 1933 vom Stapel liefen. Zwei davon wurden später nach Argentinien verkauft. Die Schiffe basierten auf den britischen Zerstörern der S-Klasse und bildeten während des Bürgerkriegs das Rückgrat der spanischen Marine. Sie verdrängten über 1.500 Tonnen und waren mit fünf 120-mm/45-Vickers-Armstrong-Geschützen in ihrer Hauptbewaffnung sowie sechs 533-mm-Torpedorohren bewaffnet. Sie verfügten über eine hohe Geschwindigkeit und eine ausgezeichnete Reichweite. "
 SPA_destroyer_4:0 "Álava-Klasse"
 SPA_destroyer_4_desc:0 "Die Zerstörer der Álava-Klasse wurden nach dem Krieg als Weiterentwicklung der vorherigen Almirante-Antequera-Klasse (einer Unterklasse der früheren Churucca-Klasse) vom Stapel gelassen. Sie verdrängten 1.710 Tonnen und waren mit vier 120-mm/45-Vickers-Armstrong Mk F als Hauptgeschütze ausgestattet. Ihre Geschwindigkeit und Reichweite waren mit den früheren Entwürfen vergleichbar, auf denen die Klasse aufbaute."
 SPA_light_cruiser_1:0 "Méndez Núñes-Klasse"
 SPA_light_cruiser_1_desc:0 "Die leichten Kreuzer der Méndez-Núñes-Klasse waren zwei Kreuzer, die Anfang der 1920er Jahre in Spanien für die spanische Marine gebaut wurden. Die Schiffe wurden 1915 bestellt, aber Materialknappheit während des Ersten Weltkriegs verzögerte den Bau. Das Design war stark von den britischen Kreuzern der C-Klasse beeinflusst. Die Kreuzer verdrängten fast 4.800 Tonnen, waren aber relativ langsam. Ihre Hauptbewaffnung bestand aus sechs 152-mm/50-Vickers-Mk-V-Geschützen. Sie verfügten außerdem über eine gute Panzerung und ein Dutzend 533-mm-Torpedorohre."
 #SPA_light_cruiser_1b: "Príncipe Alfonso Class"
 SPA_heavy_cruiser_1:0 "Princesa de Asturias-Klasse"
 SPA_heavy_cruiser_1_desc:0 "Die Princesa-de-Asturias-Klasse bestand aus drei Panzerkreuzern, die um die Jahrhundertwende für die spanische Marine gebaut wurden. Alle drei wurden Mitte der 1930er Jahre entweder verschrottet oder zerstört. Sie waren mit zwei 240-mm-Guillén-M1896- und acht 140-mm/33-Schneider-Canet-Geschützen bewaffnet. Sie waren schwer gepanzert, aber im Vergleich zu einem Standard-Schweren Kreuzer auch etwas langsam."
 SPA_heavy_cruiser_2:0 "Canarias-Klasse"
 SPA_heavy_cruiser_2_desc:0 "Die beiden Schweren Kreuzer der Canarias-Klasse wurden nach den Vorgaben des Washingtoner Marineabkommens gebaut. Sie liefen Anfang der 1930er Jahre vom Stapel, wurden aber erst 1936 fertiggestellt. Sie verdrängten fast 10.700 Tonnen und waren schnell. Sie waren relativ leicht gepanzert, verfügten aber über acht 203-mm/50-Vickers-Armstrong-Mk-D-Geschütze als Hauptbewaffnung."
 SPA_battleship_1:0 "España-Klasse"
 SPA_battleship_1_desc:0 "Die España-Klasse bestand ursprünglich aus drei Dreadnought-Schlachtschiffen, die um die Zeit des Ersten Weltkriegs in Dienst gestellt wurden. Eines davon war jedoch bereits während des Spanischen Bürgerkriegs zerstört. Die beiden anderen gingen während des Krieges verloren. Sie waren für ein Schlachtschiff relativ klein und verdrängten nur etwas mehr als 15.400 Tonnen. Sie verfügten jedoch über eine ordentliche Panzerung und Geschwindigkeit sowie eine Hauptbatterie mit acht 305-mm/50-Vickers-H-Geschützen. "
