 SPR_heavy_cruiser_2:0 "Canarias-Klasse"
 SPR_heavy_cruiser_2_desc:0 "Die beiden Schweren Kreuzer der Canarias-Klasse wurden nach den Vorgaben des Washingtoner Marineabkommens gebaut. Sie liefen Anfang der 1930er Jahre vom Stapel, wurden aber erst 1936 fertiggestellt. Sie verdrängten fast 10.700 Tonnen und waren schnell. Sie waren relativ leicht gepanzert, verfügten aber über acht 203-mm/50-Vickers-Armstrong-Mk-D-Geschütze als Hauptbewaffnung."
 SPR_battleship_1:0 "España-Klasse"
 SPR_battleship_1_desc:0 "Die España-Klasse bestand ursprünglich aus drei Dreadnought-Schlachtschiffen, die um die Zeit des Ersten Weltkriegs in Dienst gestellt wurden. Eines davon war jedoch bereits während des Spanischen Bürgerkriegs zerstört. Die beiden anderen gingen während des Krieges verloren. Sie waren für ein Schlachtschiff relativ klein und verdrängten nur etwas mehr als 15.400 Tonnen. Sie verfügten jedoch über eine ordentliche Panzerung und Geschwindigkeit sowie eine Hauptbatterie mit acht 305-mm/50-Vickers-H-Geschützen. "
 ### SWE - SWEEDEN ###
 SWE_submarine_1:0 "Hajen-Klasse"
 SWE_submarine_1_desc:0 "Die Hajen-, Bävern- und Valen-Klassen waren eine Reihe kleiner bis mittelgroßer U-Boote, die in den 1920er Jahren für die schwedische Marine gebaut wurden. Die 1920 in Dienst gestellte Hajen-Klasse umfasste U-Boote mit einer Verdrängung von fast 400 Tonnen und vier 450-mm-Torpedorohren. Ihre Tauchtiefe betrug lediglich 30 m."
 #SWE_submarine_1b: "Draken Class"
 SWE_submarine_2:0 "Sjölejonet-Klasse"
 SWE_submarine_2_desc:0 "Die Sjölejonet-Klasse bestand aus neun U-Booten, die zwischen 1936 und 1942 gebaut wurden. Es handelte sich um mittelgroße U-Boote mit einer Verdrängung von 580 Tonnen, deren Design stark von den niederländischen U-Booten der O-Klasse beeinflusst war. Sie waren mit sechs 533-mm-Torpedorohren bewaffnet und hatten eine Tauchtiefe von 60 m. "
 SWE_submarine_3:0 "U-Klasse"
 SWE_submarine_3_desc:0 "Die schwedische U-Klasse bestand aus neun U-Booten, die zwischen 1942 und 1944 in Dienst gestellt wurden. Sie waren relativ klein und langsam und verdrängten nur 370 Tonnen. Sie waren mit vier 533-mm-Torpedorohren bewaffnet."
 SWE_submarine_4:0 "Neptun-Klasse"
 SWE_submarine_4_desc:0 "Die Neptun-Klasse bestand aus drei mittelgroßen U-Booten, die alle 1943 in Dienst gestellt wurden. Sie wurden hauptsächlich zum Minenlegen eingesetzt. Sie verdrängten 550 Tonnen und waren mit fünf 533-mm-Torpedorohren bewaffnet."
 SWE_destroyer_1:0 "Ehrensköld-Klasse"
 SWE_destroyer_1_desc:0 "Die beiden Zerstörer der Ehrensköld-Klasse wurden 1927 als erste moderne Zerstörer Schwedens nach dem Ersten Weltkrieg fertiggestellt. Sie verdrängten etwas mehr als 970 Tonnen und waren mit drei 120-mm/44-K/45-Geschützen und sechs 533-mm-Torpedorohren bewaffnet. Sie hatten eine kurze Reichweite, aber eine gute Geschwindigkeit."
 SWE_destroyer_2:0 "Göteborg-Klasse"
 SWE_destroyer_2_desc:0 "Die Göteborg-Klasse bestand aus sechs Zerstörern, die zwischen 1935 und 1942 gebaut wurden. Sie hatten einen längeren Rumpf und eine verbesserte Maschinenanlage als ihre Vorgänger. Sie verdrängten etwas mehr als 1.020 Tonnen und verfügten über eine Hauptbewaffnung aus 120-mm/44 K/45-Geschützen sowie sechs 533-mm-Torpedorohren. Sie hatten eine begrenzte Reichweite, aber eine hohe Geschwindigkeit."
 SWE_destroyer_3:0 "Visby-Klasse"
 SWE_destroyer_3_desc:0 "Die vier Zerstörer der Visby-Klasse wurden alle zwischen 1942 und 1944 gebaut. Sie ähnelten der früheren Göteborg-Klasse, waren jedoch größer und verdrängten über 1.130 Tonnen. Sie verfügten außerdem über verbesserte Motoren, eine etwas größere Reichweite und eine leistungsstarke U-Boot-Abwehrausrüstung."
 SWE_destroyer_4:0 "Öland-Klasse"
 SWE_destroyer_4_desc:0 "Die beiden Zerstörer der Öland-Klasse stellten eine radikale Veränderung gegenüber früheren Entwürfen dar. Sie wurden kurz nach dem Zweiten Weltkrieg vom Stapel gelassen und fertiggestellt. Sie waren groß und verdrängten 1.880 Tonnen. Ihre Hauptbewaffnung bestand aus vier 120-mm/45 M44-Geschützen und einer starken Flugabwehr, Torpedos und U-Boot-Abwehr. Sie waren etwas langsamer als frühere Zerstörer, hatten aber eine deutlich größere Reichweite."
 SWE_light_cruiser_1:0 "Fylgia-Klasse"
 SWE_light_cruiser_1_desc:0 "Die Fylgia war ein relativ kleiner Panzerkreuzer, der 1905 für die schwedische Marine in Dienst gestellt wurde. Während des Krieges diente sie hauptsächlich zu Ausbildungszwecken und wurde 1939–1941 umfassend überholt. Vor der Überholung verdrängte sie über 4.300 Tonnen und war mit sechs 152-mm/45 K/50 M1903-Geschützen in ihrer Hauptbewaffnung bewaffnet. Sie war gut gepanzert, aber für einen Kreuzer relativ langsam."
 SWE_light_cruiser_4:0 "Tre Kronor-Klasse"
 SWE_light_cruiser_4_desc:0 "Die Tre-Kronor-Klasse bestand aus zwei leichten Kreuzern, die kurz nach dem Ende des Zweiten Weltkriegs für die schwedische Marine fertiggestellt wurden. Sie verdrängten knapp 7.700 Tonnen und verfügten über eine beachtliche Geschwindigkeit und Reichweite. Ihre Hauptbewaffnung bestand aus sieben Geschützen des Typs 152/53 M42. Sie verfügten außerdem über eine starke Bewaffnung mit Flugabwehrgeschützen, Torpedos und U-Boot-Abwehrausrüstung."
 SWE_heavy_cruiser_1:0 "Sverige-Klasse"
 SWE_heavy_cruiser_1_desc:0 "Die Sverige-Klasse bestand aus drei Küstenschlachtschiffen, die vor dem Ersten Weltkrieg für die schwedische Marine gebaut wurden. Die Schiffe ähnelten sowohl in ihrer Größe (Verdrängung von über 6.800 Tonnen) als auch in ihrer Bewaffnung (vier 283-mm/44 K/45 M12-Geschütze) eher schweren Kreuzern. Die Schiffe waren für einen Kreuzer relativ langsam, aber sehr gut gepanzert. Alle drei Schiffe waren im Zweiten Weltkrieg im Einsatz."
 SWE_light_cruiser_2:0 "Lejonet-Klasse"
 SWE_light_cruiser_3:0 "Skölden-Klasse"
 SWE_heavy_cruiser_2:0 "Viborg-Klasse"
 SWE_heavy_cruiser_3:0 "Sveaborg-Klasse"
