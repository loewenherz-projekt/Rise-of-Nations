 heavy_ship_engine_9:0 "Motor 180.000 PS"
 ship_hull_cruiser_submarine:0 "Kreuzer-U-Boot"
 ship_hull_cruiser_submarine_desc:0 "Ein größerer U-Boot-Rumpf, optimiert für größere Reichweite. Kann mit zusätzlichen Treibstofftanks für noch mehr Reichweite oder einem kleinen Aufklärungsflugzeug ausgestattet werden."
 ship_hull_midget_submarine:0 "Kleinst-U-Boot"
 ship_hull_midget_submarine_desc:0 "Ein kleines U-Boot mit kleiner Besatzung. Die geringere Reichweite und Waffenkapazität wird durch eine hohe Produktionsrate ausgeglichen."
 ship_hull_fleet_submarine:0 "Flotten-U-Boot"
 ship_hull_fleet_submarine_desc:0 "U-Boote, die dank ihrer großen Reichweite als Begleit- und Unterstützungsboote für Überwasserflotten eingesetzt werden können."
 ship_hull_nuclear_submarine:0 "Atom-U-Boot"
 ship_hull_nuclear_submarine_desc:0 "Mit Kernreaktoren können unsere U-Boote sehr lange unter Wasser operieren und dabei eine hohe Geschwindigkeit beibehalten, was sie zu einem äußerst tödlichen Werkzeug in unserem Arsenal macht. "
 ship_hull_torpedo_cruiser:0 "Torpedokreuzer"
 ship_hull_torpedo_cruiser_desc:0 "Leichte Kreuzer sind mit einer großen Anzahl Torpedorohre ausgestattet, haben dafür aber eine kleinere Hauptbatterie und weniger Flugabwehrgeschütze."
 ship_hull_super_heavy_1:0 "Rumpf eines superschweren Schlachtschiffs"
 ship_hull_super_heavy_1_desc:0 "Die aktuelle Lage der Welt lässt keinen Raum mehr für die Einhaltung von Seeverträgen. Ohne diese Einschränkungen können wir uns voll und ganz auf die Entwicklung der schwersten und am besten bewaffneten Schlachtschiffe aller Zeiten konzentrieren, die in der Lage sind, mehrere kleinere Schiffe zu bekämpfen."
 ship_hull_heavy_modern:0 "Modernes Schlachtschiff"
 ship_hull_carrier_modern:0 "Moderner Träger"
 ship_hull_carrier_modern_desc:0 "Die größten und modernsten Flugzeugträger verfügen über die neuesten Technologien, Ausrüstungen und Fortschritte. Sie sind der Inbegriff modernster Waffentechnik."
 ship_hull_mega_carrier:0 "Eisträger"
 ship_hull_mega_carrier_desc:0 "Gigantischer Flugzeugträger, der aus experimentellen Eisverbundstoffen wie Pykrete hergestellt wurde und den Einsatz von regulären Flugzeugen ermöglicht, wodurch die Reichweite unserer Marinefliegerei erhöht wird"
