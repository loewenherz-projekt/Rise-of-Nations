 ### TUR - TURKEY ###
 TUR_submarine_1:0 "Birinci İnönü Class"
 TUR_submarine_1_desc:0 "Die Birinci-Inönü-Klasse bestand aus zwei Küsten-U-Booten, die Mitte der 1920er Jahre in den Niederlanden für die Türkei gebaut wurden. Sie waren die ersten Schiffe, die nach dem Ersten Weltkrieg für die türkische Marine gebaut wurden. Sie verdrängten 520 Tonnen und waren mit sechs 450-mm-Torpedorohren bewaffnet. Sie waren zwar etwas langsam, hatten aber eine gute Reichweite."
 #TUR_submarine_1b: "Dumlupınar Class"
 TUR_submarine_2:0 "Saldiray-Klasse"
 TUR_submarine_2_desc:0 "Die drei U-Boote der Saldiray-Klasse liefen Ende der 1930er Jahre vom Stapel. Ihr Design war stark von deutschen Einflüssen geprägt: Das erste Schiff der Klasse wurde in Deutschland gebaut, die beiden anderen in Lizenz in Istanbul. Es handelte sich um große, hochseetaugliche U-Boote mit einer Wasserverdrängung von über 930 Tonnen und einer hervorragenden Reichweite. Sie waren mit sechs 533-mm-Torpedorohren bewaffnet."
 TUR_submarine_3:0 "Oruç Reis Klasse"
 TUR_submarine_3_desc:0 "Die U-Boote der Oruç-Reis-Klasse wurden in Großbritannien als modifizierte britische S-Klasse gebaut. Die Schiffe liefen 1940 vom Stapel, einige wurden vorübergehend von der Royal Navy interniert. Bis auf eines wurden alle Schiffe schließlich in die Türkei zurückgebracht. Die Schiffe verdrängten 625 Tonnen und waren mit fünf 533-mm-Torpedorohren bewaffnet. Ihre Geschwindigkeit und Reichweite waren etwas eingeschränkt."
 TUR_submarine_4:0 "Sakayra-Klasse"
 TUR_submarine_4_desc:0 "Die U-Boote der Sakayra-Klasse waren eine Serie von US-amerikanischen U-Booten der Balao-Klasse, die nach dem Krieg an die Türkei verkauft wurden. Für ihre Zeit waren sie mit einer Wasserverdrängung von über 1.520 Tonnen sehr große U-Boote. Sie verfügten über eine hervorragende Reichweite und Geschwindigkeit und waren mit zehn 533-mm-Torpedorohren bewaffnet."
 TUR_destroyer_1:0 "Peyk-Klasse"
 TUR_destroyer_1_desc:0 "Die Peyk-Klasse bestand aus zwei großen, schnellen Torpedobooten, die 1907 für die osmanische Marine in Dienst gestellt wurden. Die Schiffe wurden in Deutschland gebaut und überstanden den Ersten Weltkrieg, waren jedoch im Zweiten Weltkrieg veraltet. Die Schiffe verdrängten 775 Tonnen und waren mit zwei 105-mm/37 SK L/40-Geschützen sowie drei 450-mm-Torpedorohren bewaffnet. Sie hatten eine beachtliche Reichweite, waren aber für einen Zerstörer relativ langsam."
 TUR_destroyer_2:0 "Kocatepe-Klasse"
 TUR_destroyer_2_desc:0 "Die beiden Zerstörer der Kocatepe-Klasse wurden 1931 in Italien für die türkische Marine gebaut. Sie basierten auf dem italienischen Folgore-Design. Die Schiffe verdrängten 1.250 Tonnen und waren mit vier 120-mm/50-Ansaldo-1926-Geschützen und sechs 533-mm-Torpedorohren bewaffnet. Sie verfügten über eine gute Geschwindigkeit und Reichweite."
 TUR_destroyer_3:0 "Demirhisar-Klasse"
 TUR_destroyer_3_desc:0 "Die vier Zerstörer der Demirhisar-Klasse wurden in Großbritannien gebaut und 1942 fertiggestellt. Zwei der Schiffe wurden von der Royal Navy interniert, eines wurde nach dem Krieg zurückgegeben. Die Schiffe basierten auf der britischen I-Klasse. Sie verdrängten 1.370 Tonnen und waren mit vier 120-mm/45 QF Mk IX-Geschützen als Hauptbewaffnung ausgerüstet. Sie verfügten über eine ordentliche Geschwindigkeit und Reichweite sowie eine starke Bewaffnung mit Flugabwehrgeschützen und U-Boot-Abwehrausrüstung."
 TUR_light_cruiser_1:0 "Mecidiye-Klasse"
 TUR_light_cruiser_1_desc:0 "Das türkische Schiff Mecidiye war ein geschützter Kreuzer, der um die Jahrhundertwende in den USA für die osmanische Marine gebaut wurde. Im Zweiten Weltkrieg sank es in seichten Gewässern, wurde aber gehoben und nach einem kurzen Einsatz im Dienst der Kaiserlich Russischen Marine in die Türkei zurückgebracht. Es verdrängte knapp 3.500 Tonnen und war mit zwei 152 mm/44 Bethlehem Nr. 2 und acht 120 mm/45 Armstrong Y-Geschützen bewaffnet. Sie hatten eine ordentliche Reichweite, waren aber relativ langsam und leicht gepanzert."
 TUR_battle_cruiser_1:0 "Yavuz-Klasse"
 TUR_battle_cruiser_1_desc:0 "Die Yavuz wurde ursprünglich als deutscher Schlachtkreuzer Goeben in Dienst gestellt, wurde aber 1914 an die Osmanen verkauft und wieder in Dienst gestellt, um einer Internierung zu entgehen. Sie verdrängte knapp 23.000 Tonnen und verfügte über eine beachtliche Geschwindigkeit und Reichweite. Sie war gut gepanzert und mit zehn 283-mm/47 SK L/50-Geschützen sowie einer starken Sekundärbewaffnung bewaffnet."
 TUR_battleship_1:0 "Reşadiye-Klasse"
 TUR_battleship_1_desc:0 "Die Reşadiye-Klasse besteht aus drei Dreadnought-Schlachtschiffen, die kurz vor dem Ersten Weltkrieg in Großbritannien für die türkische Marine bestellt wurden. Allerdings wurde nur eines der Schiffe fertiggestellt und zu Beginn des Ersten Weltkriegs von den Briten interniert. Die Schiffe hätten eine Verdrängung von 23.000 Tonnen gehabt und über eine gute Panzerung, Geschwindigkeit und Reichweite verfügt. Ihre Hauptbewaffnung bestand aus zehn 343-mm/45-Vickers-Geschützen."
 ### URU - URUGUAY ###
 URU_destroyer_1:0 "Uruguay-Klasse"
 URU_destroyer_1_desc:0 "Die Uruguay war ein schweres Torpedoboot, das vor dem Ersten Weltkrieg in Deutschland für die uruguayische Marine gebaut wurde. Es verdrängte über 1.400 Tonnen und war mit vier 120-mm/45-Krupp-QF-Geschützen bewaffnet. Es verfügte über eine starke Flugabwehr und zwei 450-mm-Torpedorohre. Aufgrund ihres Alters und ihrer Größe waren sie im Vergleich zu anderen Zerstörern relativ langsam."
 ### VEN - VENEZUELA -- generic only ###
 ### VIC - VICHY FRANCE ###
 VIC_submarine_1:0 "Serie 600"
 VIC_submarine_1_desc:0 "Die 600-Tonnen-U-Boote waren Frankreichs erste moderne U-Boote der Nachkriegszeit. Sie waren mittelgroß und verdrängten rund 600 Tonnen. Obwohl sie seetüchtig waren, dienten sie als Küsten-U-Boote und wurden hauptsächlich in den warmen Gewässern des Mittelmeers eingesetzt. Von diesem Typ wurden drei Klassen mit jeweils vier Schiffen gebaut: die Sirène-, Ariane- und Circé-Klassen. Sie bildeten die Grundlage für die größeren 630-Tonnen-U-Boote der Argonaute-, Diane- und Orion-Klassen."
 #VIC_submarine_1b: "630 Series"
 #VIC_submarine_1c: "Redoutable Class"
 VIC_submarine_2:0 "Minerve-Klasse"
 VIC_submarine_2_desc:0 "Die U-Boote der Minerve-Klasse (Projektname T2) basierten auf der 630-Tonnen-Serie, verfügten jedoch über bessere Motoren und eine andere Torpedoanordnung. Diese U-Boote waren der erste Teil des Standardisierungsprogramms, das aus einem zentralisierten Entwurf der DCAN (Direction des Constructions et Armes Navale) resultierte, einem eher spezifischen Werftentwurf der vorherigen Klassen."
 #VIC_submarine_2b: "Aurore Class"
 VIC_submarine_3:0 "Roland Morillot-Klasse"
 VIC_submarine_3_desc:0 "Die U-Boote der Roland-Morillot-Klasse (Projektname Z2) waren große, hochseetaugliche U-Boote, die auf den früheren U-Booten der Redoubtable-Klasse basierten. Sie waren große U-Boote mit einer Verdrängung von 1.800 bis 2.400 Tonnen und einer beeindruckenden Bewaffnung von zehn Torpedorohren. Der Fall Frankreichs erfolgte, bevor eines der U-Boote fertiggestellt war."
 VIC_submarine_4:0 "Phénix-Klasse"
 VIC_submarine_4_desc:0 "Die U-Boote der Phénix-Klasse waren mittelgroße, hochseetaugliche Langstreckenboote, die in den Marineprogrammen von 1939 bis 1940 zugelassen waren. Der Kriegsbeginn und der Fall Frankreichs führten jedoch zur Einstellung ihrer Produktion. Sie ähnelten der Redoutable-Klasse, waren jedoch kleiner und verdrängten 1.200 Tonnen. Sie trugen eine ähnlich schwere Torpedobewaffnung."
 VIC_destroyer_1:0 "Bourrasque-Klasse"
 VIC_destroyer_1_desc:0 "Die Zerstörer der Bourrasque-Klasse gehörten zur 1.500-Tonnen-Serie und liefen Mitte der 1920er Jahre vom Stapel. Zusammen mit den Vorgängerschiffen der Chacal- und der nachfolgenden L&#39;Adroit-Klasse bildeten sie das Rückgrat der neuen, modernen französischen Nachkriegsflotte. Sie waren für ihre Zeit schnell und gut bewaffnet, ihre Torpedobewaffnung war jedoch im Vergleich zu ähnlichen Schiffen anderer Marinen geringer."
 #VIC_destroyer_1b: "Chacal Class"
 #VIC_destroyer_1c: "Agile & Vauquelin Class"
 VIC_destroyer_2:0 "Le Fantasque-Klasse"
 VIC_destroyer_2_desc:0 "Die Zerstörer der Le Fantasque-Klasse waren im Wesentlichen verbesserte Versionen der früheren Superzerstörer der 2.400-Tonnen-Serie (Guépard, Aigle, Vauquelin), die im Rahmen des Marineprogramms von 1930 gebaut wurden. Sie waren große, schwer bewaffnete und sehr schnelle Zerstörer, perfekt geeignet für die Eskorte der neuen Hochgeschwindigkeitseinheiten der französischen Flotte. Ihre Bewaffnung bestand aus neu entwickelten Geschützen, ausreichender Flugabwehr und Torpedobewaffnung."
 #VIC_destroyer_2b: "Le Hardi Class"
 #VIC_destroyer_2c: "Mogador Class"
 VIC_destroyer_3:0 "L&#39;Intrépide-Klasse"
 VIC_destroyer_3_desc:0 "Die Zerstörer der L&#39;Intrépide-Klasse waren eine modifizierte Version der früheren Zerstörer der Le Hardi-Klasse. Sie waren in den Marineprogrammen von 1938 und 1939 zugelassen, wurden jedoch aufgrund des Krieges und des Zerfalls Frankreichs nicht mehr gebaut. Sie sollten sich eher auf die Flugabwehr konzentrieren und hätten eine auf 2.800–2.900 Tonnen erhöhte Verdrängung und größere Motoren."
 VIC_destroyer_4:0 "Hoche-Klasse"
 VIC_destroyer_4_desc:0 "Die Hoche- und Bayard-Klassen waren die letzten Superzerstörer-Entwürfe der französischen Marine. Beide Klassen basierten auf der Mogador-Klasse und verdrängten 4.200 Tonnen mit ähnlicher Hauptbewaffnung, aber verbesserten Flugabwehrgeschützen und stärkeren Motoren. Sie wurden in den Marineprogrammen 1939/40 genehmigt, doch Kriegsbeginn und der Fall Frankreichs führten zur Einstellung ihrer Produktion."
 VIC_light_cruiser_1:0 "Duguay-Trouin-Klasse"
 VIC_light_cruiser_1_desc:0 "Die Duguay-Trouin-Leichtkreuzer waren die ersten großen französischen Kriegsschiffe, die nach dem Ersten Weltkrieg im Rahmen des Marineprogramms von 1922 gebaut wurden. Sie waren die ersten Leichten Kreuzer mit hochfeuernden, geschlossenen Haupttürmen. Unter den Leichten Kreuzern verfügten sie über eine starke Torpedobewaffnung, aber praktisch keine Panzerung."
 VIC_light_cruiser_2:0 "La Galissonnière-Klasse"
 VIC_light_cruiser_2_desc:0 "Die Leichten Kreuzer der La-Galissonnière-Klasse waren die Antwort auf die italienischen Leichten Kreuzer vom Typ Condottieri und basierten auf der vorherigen Emile-Bertin-Klasse. Sie wurden in den Marineprogrammen 1931 und 1932 gebaut und verfügten über die typische Hauptbewaffnung und eine für die damalige Zeit angemessene Flugabwehr. Sie verdrängten 10.850 Tonnen, verfügten über eine erhöhte Anzahl an Aufklärungsflugzeugen und waren schnell."
 VIC_light_cruiser_3:0 "De Grasse-Klasse"
 VIC_light_cruiser_3_desc:0 "Die Kreuzer der DeGrasse-Klasse wurden in den Marineprogrammen 1938 und 1939 genehmigt und waren im Wesentlichen verbesserte La Galissonnières. Sie verfügten über eine stärkere Flugabwehr sowie größere Motoren. Der Fall Frankreichs führte dazu, dass die letzten beiden Schiffe abgesagt und das Typschiff nach dem Krieg als anderes Design fertiggestellt wurde. Die Deutschen beabsichtigten, es als leichten Träger fertigzustellen, aber auch dieses Projekt wurde nicht umgesetzt."
 VIC_light_cruiser_4:0 "Colbert-Klasse"
 VIC_light_cruiser_4_desc:0 "Die Colbert war ein leichter Flugabwehrkreuzer, der 1956 vom Stapel lief. Dieser Kreuzer der Colbert-Klasse war der Nachkriegs-De Grasse sehr ähnlich gebaut und verfügte über eine schwere Flugabwehrbewaffnung sowohl für lange als auch für kurze Reichweiten. Der Unterschied zwischen der Colbert und der DeGrasse bestand darin, dass die Colbert kleinere Motoren und eine dünnere Panzerung hatte und etwas kleiner war."
 VIC_heavy_cruiser_1:0 "Suffren-Klasse"
 VIC_heavy_cruiser_1_desc:0 "Die schweren Kreuzer der Suffren-Klasse waren im Wesentlichen eine Wiederholung der vorherigen Duquesne-Klasse mit geringfügigen Verbesserungen hinsichtlich ihrer Seetüchtigkeit. Beide Klassen ähnelten der zeitgenössischen Kreuzerphilosophie der französischen Marine: sehr dünne Panzerung, aber gute Geschwindigkeit und Reichweite. Ihre Standardverdrängung beträgt 10.000 Tonnen und sie waren mit der für schwere Kreuzer üblichen Bewaffnung ausgestattet."
 VIC_heavy_cruiser_2:0 "Algérie-Klasse"
 VIC_heavy_cruiser_2_desc:0 "Die schweren Kreuzer der Algérie-Klasse stellten eine Weiterentwicklung der Vorgängerklassen Suffren und Duquesne dar und waren als Gegenstück zu den neuen italienischen schweren Kreuzern der Zara-Klasse konzipiert. Sowohl der Hauptpanzergürtel als auch der Unterwasserschutz wurden deutlich verstärkt. Die Flugabwehr war für die damalige Zeit angemessen, doch aufgrund dieser Änderungen lag die Standardverdrängung bei über 10.000 Tonnen."
 VIC_heavy_cruiser_3:0 "Saint-Louis-Klasse"
 VIC_heavy_cruiser_3_desc:0 "Die Schweren Kreuzer der Saint-Louis-Klasse basierten auf der Algérie-Klasse, ähnelten optisch jedoch eher den Großkampfschiffen der Dunkerque- und Richelieu-Klasse. Im Rahmen des Marineprogramms 1940 wurden drei Schiffe bestellt, doch aufgrund des Falls Frankreichs wurde keines davon auf Kiel gelegt. Sie sollten über neue Geschütze und verbesserte Flugabwehr verfügen, die Panzerung entsprach jedoch der der Algérie-Klasse. Es war der letzte schwere Kreuzerentwurf der französischen Marine."
 VIC_heavy_cruiser_4:0 "Forbin-Klasse"
 VIC_heavy_cruiser_4_desc:0 "Die Schweren Kreuzer der Forbin-Klasse waren ein hypothetischer Entwurf als Nachfolger der Saint-Louis-Klasse. Sie wurden zur Verteidigung der Handelsrouten zwischen dem französischen Festland und den Kolonien entwickelt und verfügten über große Reichweite und hohe Geschwindigkeit sowie eine schwere Bewaffnung mit vier Drillingstürmen und ausreichend Flugabwehr. Schiffslayout und Gesamterscheinung ähnelten der vorherigen Saint-Louis-Klasse sowie der britischen Crown-Colony-Klasse."
 VIC_battle_cruiser_1:0 "Durand-Viel Design"
 VIC_battle_cruiser_1_desc:0 "Der Durand-Viel-Schlachtkreuzerentwurf war ein Vorschlag aus einer Reihe von Studien aus dem Ersten Weltkrieg. Es handelte sich im Wesentlichen um Schlachtkreuzerversionen der Schlachtschiffklassen Normandie und Lyon mit denselben vierfachen Türmen und Geschützen, wenn auch in reduzierter Anzahl. Wie zeitgenössische Schlachtkreuzer anderer Marinen sollten sie schneller, aber schwächer gepanzert als ein Schlachtschiff sein. Ihr Bau wurde vor Ausbruch des Ersten Weltkriegs eingestellt."
 VIC_battle_cruiser_2:0 "Dunkerque-Klasse"
 VIC_battle_cruiser_2_desc:0 "Die Dunkerques wurden als Gegenstück zu den deutschen Westentaschen-Schlachtschiffen der Deutschland-Klasse entwickelt. Sie bildeten den Höhepunkt einer Reihe von Designstudien von Mitte der 1920er bis Anfang der 1930er Jahre. Sie wurden in den Marineprogrammen von 1931 und 1934 genehmigt und ähnelten den britischen Schlachtschiffen der Nelson-Klasse, wobei alle Haupttürme nach vorne konzentriert waren. Dies führte zu einer kürzeren Gürtelpanzerung und somit zu einem kleineren Schiff, das den Beschränkungen der Flottenverträge entsprach."
 VIC_battleship_1:0 "Courbet-Klasse"
 VIC_battleship_1_desc:0 "Die Schlachtschiffe der Courbet-Klasse waren die ersten Super-Dreadnoughts, die vor und während des Ersten Weltkriegs für die französische Marine gebaut wurden. Sie wurden in den Marineprogrammen von 1910 und 1911 zugelassen und waren im Ersten Weltkrieg nur eingeschränkt im Einsatz, waren jedoch im Zweiten Weltkrieg aktiv. Obwohl sie über eine stärkere Panzerung und stärkere Geschütze als die vorherigen Schlachtschiffe der Dante-Klasse verfügten, waren sie den zeitgenössischen Schlachtschiffen der US-Marine und der Royal Navy immer noch unterlegen. Sie verdrängten etwas mehr als 22.000 Tonnen und wurden vor dem Zweiten Weltkrieg lediglich durch eine verbesserte Flugabwehr und verbesserte Kessel modernisiert."
 #VIC_battleship_1b: "Bretagne Class" 
 VIC_battleship_2:0 "Richelieu-Klasse"
 VIC_battleship_2_desc:0 "Die Schlachtschiffe der Richelieu-Klasse waren die letzten Schlachtschiffe, die in Dienst gestellt wurden. Sie stellten eine Weiterentwicklung der Dunkerque dar und wurden im Rahmen der Marineprogramme von 1935 und 1938 zugelassen. Sie verfügten über eine hervorragende Flugabwehr, Geschwindigkeit und Reichweite, was sie zu hervorragenden Großkampfschiffen machte. Von den vier bestellten Schiffen wurden nur zwei vom Stapel gelassen, eines wurde vor dem Fall Frankreichs fertiggestellt. Es gab zahlreiche Versuche, die verbleibenden Schiffe mit unterschiedlichen Designs fertigzustellen, die als Flugabwehr-Schlachtschiffe, Schlachtschiff-Träger-Hybriden oder vollwertige Trägerschiffe eingesetzt werden sollten."
 VIC_battleship_3:0 "Gascogne-Klasse"
 VIC_battleship_3_desc:0 "Die Schlachtschiffe der Gascogne-Klasse waren eine Unterklasse der Richelieu-Klasse. Im Marineprogramm von 1940 wurden drei Schiffe bestellt, aber keines davon in Betrieb genommen. Das Design war eine Wiederholung der Richelieu, jedoch mit gleichmäßig verteilter Hauptbewaffnung, verbesserter Flugabwehr und verbesserten Motoren, was zu einem insgesamt besseren Schiff führte."
 VIC_battleship_4:0 "Elsass-Klasse"
 VIC_battleship_4_desc:0 "Die Schlachtschiffe der Alsace-Klasse sollten die Nachfolge der Richelieu-Klasse antreten. Vier Schiffe wurden bestellt, die Konstruktionsstudien 1939 abgeschlossen, 1940 genehmigt und 1941 auf Kiel gelegt, was jedoch durch den Fall Frankreichs verhindert wurde. Die Alsace-Klasse verbesserte das Richelieu-Design durch schwerere und zahlreichere Hauptgeschütze, eine stärkere Flugabwehr, dickere Panzerplatten und größere Motoren."
 VIC_SH_battleship_1:0 "Karl-der-Große-Klasse"
 VIC_SH_battleship_1_desc:0 "Die Superschlachtschiffe der Charlemagne-Klasse waren ein hypothetischer Entwurf, der den großen Schlachtschiffen anderer Marinen Paroli bieten sollte. Sie verfügten über eine schwere Bewaffnung in Überfeuerungspositionen, schwere Flugabwehr und eine dicke Panzerung. Das gesamte Design übernahm Elemente der Richelieu- und der britischen Nelson-Klasse."
 VIC_SH_battleship_2:0 "Napoléon Bonaparte-Klasse"
 VIC_SH_battleship_2_desc:0 "Die Schlachtschiffe der Napoléon-Bonaparte-Klasse waren ein hypothetischer Entwurf und basierten auf den Schlachtschiffen der Alsace- und Gascogne-Klasse. Ihre schwere Bewaffnung war gleichmäßig in Drillingstürmen an Bug und Heck verteilt, mit überschießenden Sekundärgeschützen und schwerer Flugabwehr. Dicke Panzerung und starke Motoren sorgten für die nötige Geschwindigkeit und Verteidigung, um mit den anderen Schiffen der Flotte mithalten und ihre Gegner effektiv bekämpfen zu können."
 VIC_carrier_1:0 "Béarn-Klasse"
 VIC_carrier_1_desc:0 "Die Béarn wurde ursprünglich als Schlachtschiff der Normandie-Klasse auf Kiel gelegt, später jedoch als Flugzeugträger mit 22.100 Tonnen Verdrängung fertiggestellt und diente in der Zwischenkriegszeit und im Zweiten Weltkrieg. Als umgebauter Träger war sie langsam und bot nur begrenzt Platz für Flugzeuge. Der mittlere Panzergürtel und die große Reichweite glichen diese Mängel jedoch aus. Ihre Konstruktion lieferte den französischen Konstrukteuren der DCAN (Direction des Constructions et Armes Navale) wichtige Erfahrungen und führte später zu einer Reihe von Designstudien."
 VIC_carrier_2:0 "Joffre-Klasse"
 VIC_carrier_2_desc:0 "Die Flugzeugträger der Joffre-Klasse (Projektname PA-16) waren die nächste Generation von Trägern der französischen Marine. Sie waren die letzten der Designstudien, die 1929 begonnen und 1937 abgeschlossen wurden. Im Marineprogramm von 1938 wurden zwei Schiffe genehmigt, doch die eskalierenden Konflikte verlangsamten den Bauprozess, und der Fall Frankreichs verhinderte schließlich die Fertigstellung dieser Schiffe. Die Verdrängung hätte rund 20.000 Tonnen betragen. Sie hätten über gute Flugabwehr, Panzerung und Geschwindigkeit verfügt, aber eine unterdurchschnittliche Flugzeugbesatzung. Insgesamt wäre es ein vielseitiger und vielseitiger Träger für die französische Marine gewesen."
 VIC_carrier_3:0 "Jean Bart Klasse"
 VIC_carrier_3_desc:0 "Der Flugzeugträger Jean Bart war ein Vorschlag aus der Mitte des Krieges, das unfertige Schlachtschiff der Richelieu-Klasse, Jean Bart, in einen vollwertigen Flugzeugträger umzubauen, ähnlich der japanischen IJN Shinano. Der große Rumpf ermöglichte den Einbau großer Flugzeuge und zusammen mit den großen Motoren einen weitreichenden und schnellen Träger. Die schwere Flugabwehr aus den USA hätte eine gute Verteidigung gegen Flugzeuge und kleinere Überwasserkampfschiffe gewährleistet."
 VIC_carrier_4:0 "Clemenceau-Klasse"
 VIC_carrier_4_desc:0 "Die Flugzeugträger der Clemenceau-Klasse (Projektname PA-28) waren der erste Flugzeugträgerentwurf der französischen Marine nach dem Krieg. Das Design ähnelte den unvollendeten Trägern der Joffre-Klasse, die installierte Ausrüstung und Bewaffnung entstammte jedoch modernen französischen Produkten. Der Erwerb der Geleitträger der US- und Royal Navy sowie die wirtschaftliche Lage im Nachkriegsfrankreich verhinderten die Kiellegung dieser Schiffe. Nicht zu verwechseln mit den späteren Flugzeugträgern der Clemenceau-Klasse (Projektname PA-54), die 1955 und 1957 auf Kiel gelegt wurden."
 ### YUG - YUGOSLAVIA ###
 YUG_submarine_1:0 "Hrabri-Klasse"
 YUG_submarine_1_desc:0 "Die beiden U-Boote der Hrabri-Klasse wurden ursprünglich als britische U-Boote der L-Klasse für die Royal Navy auf Kiel gelegt, aber verkauft und schließlich 1928 nach einem modifizierten Entwurf für Jugoslawien fertiggestellt. Es handelte sich um große U-Boote mit einer Wasserverdrängung von 975 Tonnen und einer Bewaffnung mit sechs 533-mm-Torpedorohren."
 YUG_destroyer_1:0 "Dubrovnik-Klasse"
 YUG_destroyer_1_desc:0 "Der Zerstörer Dubrovnik war zum Zeitpunkt seines Kaufs das größte Schiff der jugoslawischen Flotte. Das Schiff wurde in Großbritannien gebaut und 1932 nach Jugoslawien geliefert. Es handelte sich um einen großen Zerstörer mit einer Wasserverdrängung von 1.880 Tonnen. Er war mit vier 140-mm/53-Skoda-Geschützen, einer starken Flugabwehr, sechs 533-mm-Torpedorohren und guter U-Boot-Abwehrausrüstung bewaffnet."
 YUG_destroyer_2:0 "Beograd-Klasse"
 YUG_destroyer_2_desc:0 "Die Beograd-Klasse bestand aus drei Zerstörern, die mit französischer Hilfe gebaut wurden. Zwei der Schiffe wurden in Split gebaut, das dritte in Frankreich. Alle drei basierten auf den französischen Zerstörern der L&#39;Adroit-Klasse und wurden 1939 in Dienst gestellt. Sie verdrängten 1.210 Tonnen und waren mit vier 120-mm/43-Skoda-Geschützen und sechs 533-mm-Torpedorohren bewaffnet. Sie waren sehr schnell, hatten aber eine unterdurchschnittliche Reichweite."
 YUG_destroyer_4:0 "Split-Klasse"
 YUG_destroyer_4_desc:0 "Die Split war ein schwerer Zerstörer, der 1943 vom Stapel lief und in Jugoslawien fertiggestellt wurde. Sie wurde jedoch erst 1958 mit modifiziertem Design fertiggestellt. Ihr ursprüngliches Schiff hatte eine Verdrängung von 2.400 Tonnen und war mit fünf 140/56 Skoda-Geschützen in der Hauptbewaffnung bewaffnet. Trotz ihrer Größe war sie sehr schnell."

