  ### Tooltips
  SAF_party_split_elections_tt:0 "§RSonntags finden vorgezogene Wahlen statt.§!\n"
  SAFR_elections_held:0 "Es wurden Wahlen abgehalten.\n"
  #SAFR_favoured_havenga:0 "Favoured Havenga's Germany trade deal.\n"
  #SAFR_favoured_pirow:0 "Favoured Pirow's Germany military deal.\n"
  fra_needs_approval:0 "Frankreich muss dem Abkommen zustimmen, bevor es Madagaskar übergibt. Die Zustimmung ist viel wahrscheinlicher, wenn Frankreich die Kontrolle über seine nordafrikanischen Gebiete behält."
  SAF_african_commanders_tt:0 "Gewinnen Sie vier neue Kommandanten.\n"
  SAFR_civil_war_tt:0 "§RBeginnt einen Bürgerkrieg§! zwischen den §YUnion Forces§! in Kapstadt und Südwestafrika und den §Ykommunistischen Revolutionären§! im Rest des Landes.\n"
  procure_expertise_tt:0 "„Wir können uns nur an ein Land wenden, um uns von seiner Design- und Konstruktionskompetenz zu überzeugen, also sollten wir sorgfältig auswählen.“"
  SAFR_create_unit_boer_commandos_tt:0 "Wird zwei Einheiten von Elite-Burenkommandos im Transvaal erhalten.\n"
  SAFR_create_unit_greyshirts_tt:0 "Erhalte eine Einheit der §YGrauhemden-Miliz§! am Kap.\n"
  SAFR_create_unit_stormjaers_tt:0 "Nachdem wir die Unterstützung sowohl der Ossewabrandwag als auch der Grauhemden gewonnen haben, können wir in Südwestafrika auf Einheiten der „Stormjaers und der Grauhemden-Miliz“ zurückgreifen.\n"
  SAFR_making_new_friends:0 "§RDadurch können wir sie so beeinflussen, dass sie bereit sind, ein Bündnis mit uns einzugehen.§!\n"
  
  ### Focuses
  SAF_force_parliament_debate:0 "Erzwingen Sie eine Debatte im Parlament"
  SAF_force_parliament_debate_desc:0 "Es ist klar, dass wir mit ziemlicher Sicherheit auf einen weiteren großen Krieg zusteuern. Wir können es uns nicht leisten, länger unentschlossen zu bleiben. Wir müssen uns jetzt für Großbritannien einsetzen und mit den Vorbereitungen beginnen. Smuts hat die Unterstützung der Parteimehrheit und kann eine Abstimmung zu diesem Thema durchsetzen."
  SAF_begin_rearmament:0 "Beginn der Wiederbewaffnung"
  SAF_begin_rearmament_desc:0 "Nachdem wir uns nun dazu verpflichtet haben, müssen wir eine Politik der Ausweitung unserer Rüstungskapazitäten verfolgen, wenn wir unsere Armee vollständig ausrüsten wollen."
  SAF_relax_worker_restrictions:0 "Lockerung der Arbeitnehmerbeschränkungen"
  SAF_relax_worker_restrictions_desc:0 "Wir haben viele arbeitsfähige Männer, die bereit sind zu arbeiten, und wenn sie dazu bereit sind, sollte ihnen dies gestattet werden, unabhängig von ihrer Hautfarbe."
  SAF_split_in_the_party:0 "Eine Spaltung in der Partei"
  SAF_split_in_the_party_desc:0 "Die Fusion von Hertzogs National Party und Smuts South African Party zur United Party ist in der Frage der Unterstützung Großbritanniens in einem möglichen Krieg tief gespalten. Hinzu kommt die Frage der Rassentrennung, für die Hertzog sich stark einsetzt, während Smuts einen gemäßigteren Ansatz verfolgt. Vielleicht ist es an der Zeit, die Koalition aufzulösen."
  SAF_focus_europe:0 "Das Europäische Theater"
  SAF_focus_europe_desc:0 "Der Sieg in Europa ist der Schlüssel zur Beendigung dieses Krieges. Deshalb sollten wir unsere Bemühungen darauf konzentrieren, unsere Armee auf die bevorstehenden erbitterten Kämpfe vorzubereiten."
  SAF_focus_asia:0 "Das asiatische Theater"
  SAF_focus_asia_desc:0 "Die Lage in Asien wird immer verzweifelter, die Alliierten sind überfordert und deshalb müssen wir unsere Truppen auf die schwierigen Bedingungen dort vorbereiten."
  SAF_an_iron_grip:0 "Ein eiserner Griff"
  SAF_an_iron_grip_desc:0 "Die Regierung ist sicher und wir können die Zukunft des Landes nun nach unserem Ermessen gestalten."
  SAF_strategic_reach:0 "Strategische Reichweite"
  SAF_strategic_reach_desc:0 "Südafrika ist weit entfernt und von vielen Teilen der Welt isoliert. Um unser Potenzial voll auszuschöpfen und unsere Verbündeten zu unterstützen, müssen wir in der Lage sein, bei Bedarf jeden Teil der Welt zu erreichen."
  SAF_support_appeasement:0 "Unterstützen Sie die Appeasement-Politik"
  SAF_support_appeasement_desc:0 "Deutschland hat berechtigte Beschwerden, und die Dominions haben im letzten Krieg schwer gelitten. Wir sollten jede Gelegenheit für Frieden in unserer Zeit nutzen."
  SAF_civil_investment:0 "Investitionen in die Zivilindustrie"
  SAF_civil_investment_desc:0 "Solange Deutschland beschwichtigt bleibt, können wir uns auf interne Angelegenheiten konzentrieren. Wir können damit beginnen, in unsere Industrie zu investieren, um die Wirtschaft anzukurbeln." 
  SAF_propose_joint_exercises:0 "Reorganisieren Sie die Bezirksstreitkräfte"
  SAF_propose_joint_exercises_desc:0 "Unsere Armee ist nicht kriegsbereit. Die jüngsten Ausgabenkürzungen aufgrund der Weltwirtschaftskrise haben unsere Kampfkraft beeinträchtigt. Wir sollten einen Ausbau- und Ausbildungsplan in Angriff nehmen, um die Männer auf den nächsten großen Krieg vorzubereiten."
  SAF_yield_to_smuts:0 "Nachgeben gegenüber Schmutz"
  SAF_yield_to_smuts_desc:0 "Ein Krieg droht, doch Jan Smuts gewann die Parlamentsdebatte über den Kriegseintritt Großbritanniens. Da ihm keine andere Wahl blieb, schloss sich Hertzog seinen Parteianhängern an und strebt eine Fusion mit Malans PNP an."
  #SAF_rearmament:0 "New Munitions Factories"
  #SAF_rearmament_desc:0 "A plan has been put into place to begin rapid construction of new munitions factories."
  SAF_support_the_afrikaner_broederbond_np:0 "Unterstützen Sie den Afrikaner Broederbond"
  SAF_support_the_afrikaner_broederbond_np_desc:0 "Der Afrikaaner Broederbond setzt sich für eine stärkere Mitsprache der Afrikaaner und eine stärkere Rassentrennung ein. Die Erinnerung an die britische Politik im Burenkrieg ist noch lebendig, und der Broederbond kann zum Aufbau eines neuen Südafrikas beitragen."
  SAF_republic_agenda:0 "Auf dem Weg zu einer Republik"
  SAF_republic_agenda_desc:0 "Die Erlangung unserer Unabhängigkeit von den Briten sollte unsere oberste Priorität sein. Wir werden alle notwendigen Maßnahmen ergreifen und alle Gesetze verabschieden, um diese Unvermeidlichkeit zu verwirklichen. "
  SAF_malans_plan:0 "Malans Vision"
  SAF_malans_plan_desc:0 "Malans erstes Ziel wird die Unabhängigkeit und die Gründung einer neuen Republik Südafrika sein. Darüber hinaus könnte es einfach darum gehen, unseren Einfluss in der Region auszuweiten, oder vielleicht etwas Kühneres."
  SAF_pirow_havenga_mission:0 "Mission nach Berlin"  
  SAF_pirow_havenga_mission_desc:0 "Indem wir Havenga und Berlin auf eine diplomatische Mission nach Deutschland schicken, können wir unsere Präsenz spürbar machen und den Deutschen zeigen, dass wir für neue Möglichkeiten offen sind."
  SAF_ref_republic:0 "Referendum für eine Republik"
  SAF_ref_republic_desc:0 "Es ist Zeit für Südafrika, seinen eigenen Weg zu gehen und sich vom Britischen Empire und seinen Marionetten zu befreien. Wir werden ein Referendum darüber abhalten, ob wir eine Republik werden und den Commonwealth verlassen wollen."
  SAF_rearm_udf:0 "UDF neu bewaffnen"
  SAF_rearm_udf_desc:0 "Die UDF befinden sich in einem desolaten Zustand. Sie benötigen neue Ausrüstung und Ausbildung, um eine wirksame Streitmacht für das Land zu sein."
  SAF_focus_saaf:0 "Priorisieren Sie die Luftwaffe"
  SAF_focus_saaf_desc:0 "Was nützen Bodentruppen, wenn der Feind sie einfach aus der Luft bombardieren kann? Der Schutz unseres Himmels ist weitaus wichtiger als ein paar neue Gewehre."
  SAF_focus_army:0 "Priorisieren Sie die Armee"
  SAF_focus_army_desc:0 "Was nützen uns ein paar Flugzeuge, wenn wir nicht über die nötigen Männer verfügen, um das Land zu sichern? Die besten Waffen und die beste Ausrüstung für unsere Fußsoldaten haben Priorität."
  SAF_prepare_for_third_boer_war:0 "Bereiten Sie sich auf den Dritten Burenkrieg vor"
  SAF_prepare_for_third_boer_war_desc:0 "Dieses Mal werden wir bereit sein."
  SAF_pirows_new_order:0 "Pirows neue Ordnung"
  SAF_pirows_new_order_desc:0 "Pirow befürwortet einen radikalen Einparteienstaat nach dem Vorbild der deutschen NSDAP. Was er tun wird, wenn er sein Ziel erreicht, ist ungewiss."
  SAF_promte_urbanisation:0 "Urbanisierung fördern"
  SAF_promte_urbanisation_desc:0 "Indem wir Arbeitskräfte in die Stadt locken, können wir sie dazu nutzen, bestehende Industriegebiete zu erweitern und den Menschen mehr Arbeit zu geben."
  SAF_recruitment_drive:0 "Rekrutierungskampagne für ländliche Gebiete"
  SAF_recruitment_drive_desc:0 "In den ländlichen Gebieten gibt es viele arbeitslose Männer, die die Gelegenheit, sich zu engagieren, gerne nutzen würden. Um sie besser erreichen zu können, werden wir in diesen Gebieten lokale Rekrutierungsstellen einrichten."
  SAF_hofmeyrs_reforms:0 "Hofmeyrs Reformen"
  SAF_hofmeyrs_reforms_desc:0 "Hofmeyr war eine einsame Stimme in der Regierung, die die Rechte aller Menschen in Südafrika verteidigte, unabhängig von ihrer Rasse. Es ist an der Zeit, ihm die Macht zu geben, seine Reformen umzusetzen und uns auf den Weg zu einem neuen Südafrika zu führen."
  SAF_repeal_job_reservation_act:0 "Aufhebung des Gesetzes zur Arbeitsplatzreservierung"
  SAF_repeal_job_reservation_act_desc:0 "Das Gesetz zur Arbeitsplatzreservierung war eine der Säulen, auf denen dieses System der Rassenungleichheit aufgebaut wurde. Es ist an der Zeit, es abzuschaffen und der Vergangenheit anzugehören."
  SAF_wartime_worker_laws:0 "Gesetze für Kriegsarbeiter"
  SAF_wartime_worker_laws_desc:0 "In Kriegszeiten müssen wir die Versorgung unserer Truppen über jegliche Art bevorzugter Beschäftigungsmöglichkeiten stellen."
  SAF_equal_worker_pay:0 "Gleichstellung der Arbeitnehmerlöhne"
  SAF_equal_worker_pay_desc:0 "Wenn wir von den Menschen erwarten, dass sie die gleiche Arbeit verrichten, sollten sie auch erwarten, dass sie den gleichen Lohn wie ihre Kollegen erhalten."
  SAF_economic_boom:0 "Boomende Wirtschaft"  
  SAF_economic_boom_desc:0 "Unsere Reformen haben zu einer massiven Produktivitätssteigerung geführt und werden es uns ermöglichen, unsere neue Belegschaft für den Ausbau unserer Branche zu nutzen."
  #SAF_oppenheimers_deal:0 "Oppenheimer's Plan"
  #SAF_oppenheimers_deal_desc:0 "."
  SAF_expand_gold_mining_operations:0 "Ausbau der Gold- und Diamantenproduktion"
  SAF_expand_gold_mining_operations_desc:0 "Oppenheimer möchte den Bergbau durch die Eröffnung neuer und die Vertiefung bestehender Schächte ausweiten. Wir können ihn finanziell unterstützen."
  SAF_vanderbijlpark_expansion_project:0 "Vanderbijlpark-Entwicklungsprojekt"
  SAF_vanderbijlpark_expansion_project_desc:0 "Vanderbijlpark ist ein industrielles Herzstück des Nordens und es gibt noch mehr Raum, um das Gebiet zu entwickeln und sein Potenzial zu steigern."
  SAF_open_engineering_schools:0 "Offene Ingenieurschulen"
  SAF_open_engineering_schools_desc:0 "Oppenheimer plant die Eröffnung neuer Ingenieurschulen und -abteilungen an Universitäten. Dies wird künftigen Generationen sicherlich zugutekommen und weitere technische Innovationen im Land fördern."
  SAF_battlefield_medical_advancements:0 "Medizinische Fortschritte auf dem Schlachtfeld"
  SAF_battlefield_medical_advancements_desc:0 "Die Bundeswehrärzte haben in der Gefechtsmedizin zahlreiche Verbesserungen und Entwicklungen erzielt. Angesichts der begrenzten Anzahl an Soldaten, auf die wir zurückgreifen können, sollten wir sicherstellen, dass unsere Truppen die bestmögliche medizinische Versorgung erhalten, um sie wieder in den Kampf zu schicken."
  SAF_remove_segregation_shared:0 "Einschränkungen im Service aufheben"
  SAF_remove_segregation_shared_desc:0 "Wenn ein Mann bereit und in der Lage ist, für sein Land zu kämpfen, sollte ihm dies unabhängig von seiner Hautfarbe gestattet sein, auch wenn manche das anders sehen. Dies sollte auch arbeitslose Männer aus ländlichen Gebieten ermutigen, sich für den Militärdienst zu melden."
  SAF_offer_protection_of_madagascar:0 "Angebot Schutz für Madagaskar"
  SAF_offer_protection_of_madagascar_desc:0 "Nachdem wir nun erfolgreich die Kontrolle über Madagaskar zurückerlangt haben, können wir beantragen, dass das Land an die Union übertragen wird, da wir besser in der Lage sind, es zu schützen."
  SAF_native_representation_act:0 "Gesetz zur Vertretung der Ureinwohner"
  SAF_native_representation_act_desc:0 "Indem wir afrikanische Wähler aus der gemeinsamen Rolle am Kap herausnehmen, können wir unsere Position in der Regierung künftig stärken."
  SAF_directorate_war_supplies:0 "Die Direktion für Kriegsvorräte"
  SAF_directorate_war_supplies_desc:0 "Nicht nur unserer eigenen Armee mangelt es an Ausrüstung, auch die Streitkräfte des Commonwealth benötigen Kampfausrüstung. Wir müssen alles tun, um die Commonwealth-Staaten mit Waffen und Munition zu versorgen."
  SAF_peace_expansion_scheme:0 "Friedenserweiterungsprogramm"
  SAF_peace_expansion_scheme_desc:0 "Pierre van Ryneveld hat einen Plan zur Erweiterung unserer Luftwaffe durch Flugzeugkäufe britischer Hersteller ausgearbeitet. Dieser Plan soll weiterverfolgt werden, bis unsere eigene Flugzeugindustrie aufgeholt hat."
  SAF_tanks_lend_lease:0 "Shermans und Glühwürmchen"
  SAF_tanks_lend_lease_desc:0 "Die Amerikaner und die Briten haben vereinbart, uns für unsere Panzerdivisionen einige moderne Panzer und Panzerzerstörer zu leihen und zu verpachten."
  SAF_create_unit_boer_commandos_tt:0 "Wird zwei Einheiten Elite-Burenkommandos im Transvaal gewinnen.\n"
  SAF_military_research_bureau:0 "Militärisches Forschungsbüro"
  SAF_military_research_bureau_desc:0 "Moderne Waffen und Ausrüstung sind der Schlüssel zum Sieg in jedem Krieg, daher werden wir unsere Forschungsanstrengungen von nun an auf diesen Bereich konzentrieren. "
  SAF_fight_against_communism:0 "Die Bedrohung durch den Kommunismus"
  SAF_fight_against_communism_desc:0 "Die Briten sind zwar ein Ärgernis, doch die wahre Bedrohung ist der wachsende Schandfleck des Kommunismus auf der ganzen Welt. Wir müssen alles tun, um ihm ein Ende zu setzen."
  SAF_the_anti_revolution:0 "Die Anti-Revolution"
  SAF_the_anti_revolution_desc:0 "Es ist an der Zeit, diese „Revolution“ zu beenden. Lasst uns jetzt zuschlagen."
  SAF_deal_with_liberia:0 "Ein atlantischer Sprungbrett"
  SAF_deal_with_liberia_desc:0 "Liberia ist ein strategisch wichtiges Sprungbrett in den Nordatlantik und verfügt außerdem über Kautschukplantagen, die wir sicherlich ausbauen können. Sie werden eine leichte Beute sein."
  SAF_deal_with_oman:0 "Das Tor nach Asien" 
  SAF_deal_with_oman_desc:0 "Eine kürzlich durchgeführte Untersuchung ergab, dass in der Region Fahud ungenutzte Ölreserven schlummern. Wir brauchen Öl, um unsere Kriegsmaschinerie anzutreiben, und es eröffnet uns auch neue Wege zur Expansion in die reichen Länder Asiens."
  SAF_riches_of_india:0 "Der Reichtum Indiens"
  SAF_riches_of_india_desc:0 "Indien verfügt über alle Ressourcen, die wir brauchen, insbesondere über die, die uns vor Ort fehlen. Nutzen wir seinen Ressourcenreichtum für uns."
  SAF_split_portugal:0 "Erobern Sie portugiesische Kolonien"
  SAF_split_portugal_desc:0 "Die portugiesischen Kolonien werden wöchentlich bewacht und liegen weit entfernt von Portugal. Wir können sie schnell einnehmen, bevor Portugal auch nur einen Finger zu ihrem Schutz rühren kann."
  SAF_appeal_to_greyshirts:0 "Appell an die Grauhemden"
  SAF_appeal_to_greyshirts_desc:0 "Die SANP versucht, diesen Kampf allein zu führen. Wir sollten auf sie zugehen und unsere Bemühungen koordinieren, um eine neue Ära für Südafrika einzuläuten."
  SAF_equip_stormjaers:0 "Rüste die Stormjaers aus"
  SAF_equip_stormjaers_desc:0 "Die Stormjaers ziehen täglich mehr Rekruten an. Wenn wir diese neuen Rekruten bewaffnen können, haben wir loyale Soldaten, auf die wir zurückgreifen können, wenn es darauf ankommt."
  SAF_equip_greyshemde:0 "Rüste die Grauhemden aus"
  SAF_equip_greyshemde_desc:0 "Die Grauhemden haben die Männer, aber nicht die Munition. Wir haben die Mittel, sie mit Waffen auszustatten und sie zu einer echten Kampftruppe zu organisieren."
  SAF_reactivate_kommandos:0 "Reaktivierung der Burenkommandos"
  SAF_reactivate_kommandos_desc:0 "Das Kommandosystem ist seit über 200 Jahren ein integraler Bestandteil der Verteidigung unseres Landes. Und obwohl es nach dem letzten Burenkrieg aufgelöst wurde, blieb es als informelle Gruppe bestehen. Es gibt keinen besseren Zeitpunkt als jetzt, es formell wieder zu aktivieren."
  SAF_armor_mech_bonus:0 "Guderians Theorien übernehmen"
  SAF_armor_mech_bonus_desc:0 "Heinz Guderian ist ein Pionier im Einsatz von Panzern in der modernen Kriegsführung. Es wäre dumm von uns, nicht von seinen Ideen zu lernen."
  SAF_seawolf_bonus:0 "Übernehmen Sie Dönitz&#39; Taktik"
  SAF_seawolf_bonus_desc:0 "Dönitz hat einzigartige Ideen für den Einsatz von U-Booten in großen Jagdrudeln, dem „Wolfsrudel“. Wir sollten diese neue Praxis begrüßen."
  SAF_mobile_warfare_exercises:0 "Übungen zur mobilen Kriegsführung"
  SAF_mobile_warfare_exercises_desc:0 "Wir können viel von der Wehrmacht lernen. Wir werden gemeinsame Ausbildungsoperationen vorschlagen, um unsere Panzer und unsere mobile Infanterie effektiv koordinieren zu können."
  SAF_wolfpack_exercises:0 "Wolfsrudel-Übungen"
  SAF_wolfpack_exercises_desc:0 "Während deutsche U-Boote in unseren Häfen liegen, können wir die Gelegenheit nutzen, mit ihnen zu trainieren und von ihren Kommandanten und Matrosen zu lernen."
  SAF_invite_ig_farben:0 "IG Farben einladen"
  SAF_invite_ig_farben_desc:0 "IG Farben ist weltweit führend in der Herstellung synthetischer Kraftstoffe. Wir haben die Kohle, uns fehlt nur noch das Know-how, sie zu nutzen. Wir sollten sie um Unterstützung bitten, um ein eigenes lokales Unternehmen zur Kraftstoffverflüssigung aufzubauen."
  SAF_empower_trade_unions:0 "Stärkung der Gewerkschaften"
  SAF_empower_trade_unions_desc:0 "Die derzeitige Regierung ist in hohem Maße auf die Anstrengungen afrikanischer Arbeiter angewiesen und zahlt ihnen dafür nur einen Hungerlohn. Wir können die Gewerkschaften zusammenbringen und Streiks und Demonstrationen organisieren, bis ihre Stimmen gehört werden."
  #SAF_the_bloodless_revolution:0 "The Bloodless Revolution"
  #SAF_the_bloodless_revolution_desc:0 "We have gathered enough support behind us to force the government to step down and hand over power to the people of Africa."
  SAF_expand_industrial_zones:0 "Industriegebiete erweitern"
  SAF_expand_industrial_zones_desc:0 "Eines mangelt es uns in Südafrika nicht: an Platz. Ein Teil dieses Landes muss für große Industriegebiete reserviert werden."
  SAF_support_indian_independence:0 "Unterstützen Sie die Unabhängigkeit Indiens"
  SAF_support_indian_independence_desc:0 "Wir haben das kolonialistische Joch erfolgreich abgeworfen, also lasst uns Indien helfen, dasselbe zu tun."
  #SAF_institute_development_program:0 "Institute Development Program"
  #SAF_institute_development_program_desc:0 "If we are to truly stand as equals among the world's powers we must begin a program of econmic and industrial development."
  SAF_economic_technical_exchange:0 "Wirtschaftlich-technischer Austausch"
  SAF_economic_technical_exchange_desc:0 "Indien und Südafrika verfügen über ideale Voraussetzungen, um sich gegenseitig bei der Entwicklung zu modernen Industrienationen zu unterstützen. Beginnen wir damit, in die Wirtschaft und Infrastruktur des jeweils anderen zu investieren. Wir können ihnen auch beim Aufbau eines eigenen Forschungsinstituts helfen."
  #SAF_coordinate_company_expansions:0 "Coordinate Company Expansions"
  #SAF_coordinate_company_expansions_desc:0 "India and South Africa both have unique skills in certain areas through our various companies. If we can help set up local branches of these companies then we can both benefit in areas we lack in."
  SAF_workers_for_engineers:0 "Arbeiter für Ingenieure"
  SAF_workers_for_engineers_desc:0 "Indien verfügt über einen großen Pool an Arbeitskräften, die nach Möglichkeiten suchen, und wir verfügen über langjährige Erfahrung und Fachkompetenz im Bergbau. Wir sollten die Einwanderung indischer Arbeitskräfte im Austausch für einige unserer erfahrensten Ingenieure fördern."
  SAF_safeguard_our_oceans:0 "Schützen Sie unsere Ozeane"
  SAF_safeguard_our_oceans_desc:0 "Im Falle eines Krieges ist es zwingend erforderlich, dass wir den Indischen Ozean kontrollieren können, um eine gegenseitige Isolierung zu verhindern. "
  SAF_research_institute:0 "Abteilung für strategische Forschung"
  SAF_research_institute_desc:0 "Wir hinken im technologischen Fortschritt vielen westlichen Nationen hinterher und werden daher ein neues Forschungsinstitut gründen, um unsere klügsten Köpfe zu versammeln und technologische Innovationen zu fördern."
  SAF_research_area_priority:0 "SRD-Richtlinien"
  SAF_research_area_priority_desc:0 "Ohne die richtige Anleitung weiß niemand, was unsere Wissenschaftler erschaffen werden. Indem wir ihnen jährliche Anweisungen geben, können wir ihre Forschungsanstrengungen auf die Bereiche konzentrieren, die wir am dringendsten benötigen."
  SAF_the_darkest_hour:0 "Die dunkelste Stunde"
  SAF_the_darkest_hour_desc:0 "Viele unserer Bündnispartner sind gefallen, und da wir eine direkte Landverbindung zu den Achsenmächten haben, werden wir die volle Wucht ihrer Kriegsmaschinerie an unseren Grenzen zu spüren bekommen. Wir müssen uns darauf vorbereiten, bis zum bitteren Ende zu kämpfen und dürfen keine Gnade walten lassen."
  SAF_ask_for_soviet_aid:0 "Bitten Sie um sowjetische Hilfe"
  SAF_ask_for_soviet_aid_desc:0 "Eine Reihe unserer führenden Mitglieder der Kommunistischen Partei haben in den vergangenen Jahren in der Sowjetunion studiert, und wir können ihre Verbindungen und ihren Einfluss nutzen, um sowjetische Hilfe für die bevorstehende Revolution zu sichern."
  SAF_secure_peoples_state:0 "Den Volksstaat sichern"
  SAF_secure_peoples_state_desc:0 "Die Revolution ist geschafft, aber es gibt immer noch Widerstand. Wir werden den verbleibenden Widerstand zerschlagen und unseren Platz im Land sichern."
  SAF_encourage_soviet_investment:0 "Förderung sowjetischer Investitionen"
  SAF_encourage_soviet_investment_desc:0 "Lassen Sie uns Anreize und Möglichkeiten für sowjetische Investitionen in unsere Wirtschaft schaffen."
  SAF_institute_planned_economy:0 "Institut Planwirtschaft"
  SAF_institute_planned_economy_desc:0 "In unserer neuen afrikanischen Arbeiterutopie ist kein Platz für kapitalistische Freimarktpolitik. Die Regierung wird die industrielle und wirtschaftliche Expansion des Landes überwachen."
  SAF_seize_means_of_production:0 "Beschlagnahme der Produktionsmittel"
  SAF_seize_means_of_production_desc:0 "Es gibt viel zu viele Unternehmen in den Händen reicher Kapitalisten. Wir werden sie von der Last ihres Reichtums befreien und ihn für unsere eigenen Zwecke nutzen."
  SAF_exploit_mineral_wealth:0 "Den Mineralreichtum ausbeuten"
  SAF_exploit_mineral_wealth_desc:0 "Die Ressourcen unseres Landes sind riesig und größtenteils ungenutzt, wie zum Beispiel die neuen Wolframvorkommen, die wir im Namaqualand entdeckt haben. Es nützt niemandem, wenn es im Boden liegt, also werden wir es sinnvoll nutzen."
  SAF_national_rationing_recycling_program:0 "Einführung eines Rationierungs- und Recyclingprogramms"
  SAF_national_rationing_recycling_program_desc:0 "Unser Volk braucht so viele Luxusgüter nicht, deshalb werden wir es ermutigen, sie zu recyceln, damit wir sie stattdessen zur Herstellung von Waffen verwenden können."
  SAF_the_revolution:0 "Starten Sie die Revolution"
  SAF_the_revolution_desc:0 "Wir haben das Volk hinter uns, es gibt keinen besseren Zeitpunkt als jetzt, um die Revolution zu beginnen."
  SAF_peoples_army:0 "Die Volksarmee"
  SAF_peoples_army_desc:0 "Unser Land braucht Soldaten, wenn wir überleben wollen. Ermutigen wir unser Volk, für uns zu kämpfen."
  #SAF_workers_army:0 "The Worker's Army"
  #SAF_workers_army_desc:0 "While soldiers are important, we must not forget that it is guns that will win us wars. Our factories must get all the resources and workers they need."
  SAF_african_utopia:0 "Eine afrikanische Utopie"
  SAF_african_utopia_desc:0 "Die Arbeiter Afrikas haben Südafrika als den idealen Ort für die Sicherung ihrer Zukunft erkannt und sind daher aus allen Teilen des Kontinents gekommen, um an unserem Wohlstand teilzuhaben."
  SAF_liberate_spanish:0 "Befreit die spanischen Kolonien"
  SAF_liberate_spanish_desc:0 "Mehr Kolonialisten, mehr Unterdrückung der Arbeiter. Dies wird ein weiteres Kapitel in der Geschichte der Befreiung der afrikanischen Arbeiter sein."
  SAF_liberate_italian:0 "Befreit italienische Kolonien"
  SAF_liberate_italian_desc:0 "Die Italiener sind zu spät zur Kolonialparty gekommen. Wir werden dafür sorgen, dass sie sie auch früh verlassen."
  SAF_an_african_peoples_republic:0 "Die Afrikanische Volksrepublik"
  SAF_an_african_peoples_republic_desc:0 "Afrika ist zum ersten Mal in der Geschichte als Kontinent vereint. Zeigen wir uns der Welt und zeigen wir ihr, dass wir eine neue Macht sind, mit der man rechnen muss."
  SAF_asymmetric_warfare:0 "Asymmetrische Kriegsführung"
  SAF_asymmetric_warfare_desc:0 "Durch unsere Erfahrungen in den Burenkriegen und den Kämpfen in den deutschen Kolonien im Ersten Weltkrieg haben wir ein einzigartiges Verständnis für die unkonventionelle Kriegsführung in schwierigem Gelände entwickelt. Dieses Wissen und diese Erfahrung müssen wir bewahren und an unsere neuen Offiziere und Soldaten weitergeben."
  SAF_sa_engineer_medical_corps:0 "SA Ingenieur &amp; Sanitätskorps"
  SAF_sa_engineer_medical_corps_desc:0 "Das südafrikanische Sanitätskorps benötigt moderne Ausrüstung und Ausbildung, wenn es unsere Soldaten auf dem Schlachtfeld halten will."
  SAF_improve_infantry:0 "Modernisierung der Infanterie"
  SAF_improve_infantry_desc:0 "Fußsoldaten bilden das Rückgrat unserer Armee. Sie benötigen die beste Ausrüstung und die besten Ressourcen, um im Kampf die Nase vorn zu haben."
  SAF_retool_pretoria_mint:0 "Umrüstung der Pretoria Mint"
  SAF_retool_pretoria_mint_desc:0 "Mit nur geringfügigen Umrüstungen kann die Münzprägeanstalt Pretoria zur Herstellung von Waffen und Ausrüstung für die Armee genutzt werden."
  SAF_pretoria_metal_pressings:0 "Vertrag Pretoria Metal Pressings"
  SAF_pretoria_metal_pressings_desc:0 "Pretoria Metal Pressings stellt seit einiger Zeit sowohl Munition als auch Sprengstoff her. Erweitern wir gemeinsam ihre Kapazitäten, damit sie uns noch mehr Ausrüstung liefern können."
  SAF_mechanize_army:0 "Mechanisierung der Armee"
  SAF_mechanize_army_desc:0 "Die Kriegsführung beginnt sich drastisch zu verändern. Wir müssen sicherstellen, dass wir mit dieser Veränderung Schritt halten und unsere Soldaten mit modernen, mobilen Kampffahrzeugen ausstatten."
  SAF_the_sarc_mki:0 "Der SARC MK I"
  SAF_the_sarc_mki_desc:0 "Wir haben all unsere Erfahrung und unser Know-how gebündelt, um einen neuen Panzerwagen für unsere Armee zu entwickeln. Nutzen wir dies und investieren wir in noch bessere Fahrzeuge."
  SAF_expand_artillery_aircraft_depot:0 "Erweitern Sie das Artillerie- und Flugzeugdepot"
  SAF_expand_artillery_aircraft_depot_desc:0 "Das Artillerie- und Flugzeugdepot in Roberts Heights baut seit Jahren in Lizenz Hawker Hartbees für die Luftwaffe. Wenn wir die Anlagen dort erweitern, können sie mehr und bessere Flugzeuge für uns produzieren."
  SAF_protect_the_trade_2:0 "Verbessere die Handelsflotte"
  SAF_protect_the_trade_2_desc:0 "Unsere umgerüsteten Handelsschiffe und Walfänger haben bei der U-Boot-Jagd und Minenräumung hervorragende Arbeit geleistet, aber neuere Ausrüstung wäre immer noch angebracht."
  SAF_disrupt_the_trade_2:0 "Verbessere die Torpedos"
  SAF_disrupt_the_trade_2_desc:0 "Die U-Boot-Abwehr wird immer effizienter, daher sollten wir ihren Bemühungen immer einen Schritt voraus sein und neuere Torpedos entwickeln."
  SAF_expand_repair_facilities:0 "Erweitern Sie die Reparatureinrichtungen"
  SAF_expand_repair_facilities_desc:0 "Die Werften in Kapstadt und Durban sind wichtige Häfen für die Reparatur und Umrüstung von Schiffen, die in Afrika unterwegs sind. Da der Platz dort knapp sein könnte, sollten wir stattdessen große schwimmende Werften bauen."
  SAF_saaf_coastal_command:0 "SAAF-Küstenkommando"
  SAF_saaf_coastal_command_desc:0 "Durch die Einrichtung eines speziellen Küstenkommandos zur Überwachung der Gewässer rund um Südafrika wird die Sicherheit der Schifffahrtswege gewährleistet."
  SAF_flexible_airforce:0 "Eine flexible Luftwaffe"
  SAF_flexible_airforce_desc:0 "Taktische Bomber können mehrere Aufgaben angemessen erfüllen. Es besteht keine Notwendigkeit für mehrere Flugzeugtypen, wenn ein Flugzeug alle erforderlichen Aufgaben erfüllen kann."
  SAF_specialised_airforce:0 "Eine spezialisierte Luftwaffe"
  SAF_specialised_airforce_desc:0 "Unsere Luftwaffe muss in der Lage sein, alle ihre Aufgaben so effektiv wie möglich zu erfüllen, daher müssen wir sie mit spezialisierten Flugzeugtypen ausstatten."
  SAF_flying_tanks:0 "Fliegende Panzer"
  SAF_flying_tanks_desc:0 "Wir brauchen neuere CAS-Modelle, wenn sie ihrem Namen gerecht werden sollen."
  SAF_protect_cape_sea_route:0 "Schützen Sie die Kapseeroute"
  SAF_protect_cape_sea_route_desc:0 "Der Schutz der Kap-Seeroute ist für die Kriegsanstrengungen von entscheidender Bedeutung. Durch den weiteren Ausbau der Garnison entlang der Küste können wir die Kontrolle über die Schifffahrtswege behalten."
  SAF_sa_airforce_college:0 "Südafrikanisches Luftwaffen-College"
  SAF_sa_airforce_college_desc:0 "Das South African Air Force College war bisher Teil des Army College. Lassen Sie uns eine unabhängige Institution gründen, um unsere Piloten besser zu unterstützen."
  SAF_sa_naval_college:0 "Südafrikanisches Marinecollege"
  SAF_sa_naval_college_desc:0 "Das südafrikanische Marine-College ist im Vergleich zu einigen unserer Verbündeten klein. Wir sollten in bessere Einrichtungen und eine bessere Ausbildung unserer neuen Marine-Rekruten investieren, um das Beste aus ihnen herauszuholen."
  SAF_hulamin_aluminium_plant:0 "Hulamin Aluminium Plant"
  SAF_hulamin_aluminium_plant_desc:0 "Unsere Industrie benötigt Aluminium. Investieren wir daher in die Produktion unserer eigenen Vorkommen. Ein neues Werk in Richards Bay ist hierfür ein idealer Standort."
  SAF_iscor_expansion:0 "Iscor-Erweiterung"
  SAF_iscor_expansion_desc:0 "In Thabazimbi wurden Eisenerzvorkommen entdeckt. Um das Potenzial optimal zu nutzen, sollten wir in der Gegend ein neues Stahlwerk bauen."
  SAF_sasol_non_aligned:0 "Sasol gefunden"
  SAF_sasol_non_aligned_desc:0 "Südafrika kann sich bei Öl und Kautschuk nicht immer auf Importe verlassen. Wir müssen versuchen, autark zu werden. Wir verfügen über reichlich Kohlereserven, die wir zur Herstellung synthetischer Kraftstoffe nutzen können."
  SAF_electronics_bonus:0 "Investieren Sie in Elektronik"
  SAF_electronics_bonus_desc:0 "Die Elektronik entwickelt sich rasant weiter. Wir müssen mithalten."
  SAF_hulamin_aluminium_plant_ii:0 "Aluminiumwerke erweitern"
  SAF_hulamin_aluminium_plant_ii_desc:0 "Wir werden immer mehr Aluminium benötigen, also lasst uns in weitere Kapazitäten investieren."
  SAF_iscor_expansion_ii:0 "Ein neues Iscor-Werk"
  SAF_iscor_expansion_ii_desc:0 "Ein neues, vollständig integriertes Stahlwerk in Vanderbijlpark wird es uns ermöglichen, den Bedarf unserer Branche zu decken." 
  SAF_invite_german_settlers:0 "Deutsche Siedler einladen"
  SAF_invite_german_settlers_desc:0 "Afrika bietet unternehmerischen Menschen reichlich Raum, ihr Glück zu machen. Wir werden die deutsche Neuansiedlung in Südwestafrika und anderswo fördern."  
  SAF_expand_cape_franchise:0 "Erweitern Sie das Cape-Franchise"
  SAF_expand_cape_franchise_desc:0 "Jeder Mann und jede Frau im wahlfähigen Alter sollte über ihre eigene Zukunft abstimmen dürfen. Indem wir das Wahlrecht landesweit auf alle Ethnien ausweiten, können wir echte Fortschritte auf dem Weg zu einem neuen Südafrika erzielen." 
  SAF_free_elections:0 "Halten Sie freie Wahlen ab"
  SAF_free_elections_desc:0 "Es ist an der Zeit, die ersten freien Wahlen im Land abzuhalten. Viele erwarten, dass es nur einen klaren Sieger geben wird." 
  SAF_reconciliation:0 "Politik der Versöhnung"
  SAF_reconciliation_desc:0 "In diesem neuen Südafrika müssen wir nach Inklusion und Versöhnung streben, um als Nation friedlich voranzukommen." 
  SAF_namibian_freedom:0 "Freiheit für Namibia"
  SAF_namibian_freedom_desc:0 "Was für ein Beispiel würden wir Afrika geben, wenn wir die alte Kolonialpolitik fortführen würden? Wir werden Namibia seinem Volk übergeben und es in die völlige Unabhängigkeit führen." 
  
  ### Events
  SAFR.1.t:0 "Schutzangebot für Madagaskar"  
  SAFR.1.d:0 "Südafrika hat darum gebeten, zumindest für die absehbare Zukunft die Kontrolle über Madagaskar zu übernehmen, um, so heißt es, die Interessen der Alliierten in der Region zu schützen. Wie sollten wir darauf reagieren?"
  SAFR.1.a:0 "Sehr gut, sie können es vorerst haben." 
  SAFR.1.b:0 "Niemals! Sie wollen lediglich ihre Grenzen erweitern." 
  SAFR.2.t:0 "Frankreich stimmt unserem Vorschlag zu"  
  SAFR.2.d:0 "Die französische Regierung hat klugerweise erkannt, dass wir in einer besseren Position sind, die Kontrolle und Interessen der Alliierten im südlichen Indischen Ozean aufrechtzuerhalten, und hat sich bereit erklärt, die Kontrolle über Madagaskar abzugeben."
  SAFR.2.a:0 "Wir werden gut darauf aufpassen."
  SAFR.3.t:0 "Frankreich lehnt unser Angebot ab"  
  SAFR.3.d:0 "In einem erstaunlichen Anflug von Weitsicht und Vernunft hat die französische Regierung unser Angebot, die Kontrolle über Madagaskar zu übernehmen, abgelehnt. Sie behauptet, wir seien lediglich daran interessiert, unseren Einfluss auf ihr „rechtmäßiges“ Territorium auszudehnen."
  SAFR.3.a:0 "Die Narren"
  #SAFR.4.t:0 "South Africa Demands Colonies"  
  #SAFR.4.d:0 "South Africa has demanded that we immediately hand over control of our colonies of Angola and Mozambique to them, citing a rise in communist element in the regions and our inability to properly govern the countries."
  #SAFR.4.a:0 "We will never surrender our African holdings!"   
  #SAFR.4.b:0 "Fine, we have too much on our plate as it is."
  #SAFR.5.t:0 "Portugal Refuses"  
  #SAFR.5.d:0 "The Portuguese government has refused our demands for Angola and Mozambique. They say they are fully capable of taking care of their colonies, and have laughed off our attempt to strong-arm them."
  #SAFR.5.a:0 "We'll have them one way or another..."
  #SAFR.5.b:0 "On second thoughts, we don't need them."
  #SAFR.6.t:0 "Portugal Agrees"  
  #SAFR.6.d:0 "The Portuguese have seen reason and have officialy relinquished control over Angola and Mozambique to us."
  #SAFR.6.a:0 "Our influence grows."
  SAFR.7.t:0 "Südafrika fordert Waffen für die Revolution"  
  SAFR.7.d:0 "Südafrika hat uns um Hilfe bei einer möglichen Revolution gebeten, die sich im Land zusammenbraut."
  SAFR.7.a:0 "Sehr gut"
  SAFR.7.b:0 "Nein, wir brauchen sie"
  SAFR.8.t:0 "Sowjets akzeptieren"  
  SAFR.8.d:0 "Die Sowjets haben sich bereit erklärt, uns einige Gewehre zu schicken, um uns beim Sturz der Regierung zu unterstützen. Sie sollten einige Zeit nach Beginn der Revolution eintreffen."
  SAFR.8.a:0 "Brillant"
  SAFR.9.t:0 "Sowjets weigern sich"  
  SAFR.9.d:0 "Die Sowjets haben sich geweigert, uns jegliche Hilfe zukommen zu lassen, und erklärt, wir müssten mit dem auskommen, was wir haben."
  SAFR.9.a:0 "Verräter der Sache!"
  SAFR.10.t:0 "Sowjetische Waffen kommen an"  
  SAFR.10.d:0 "Die Sowjets haben Wort gehalten und erfolgreich Waffen für unsere revolutionäre Miliz geliefert. Die Männer, die uns die Waffen beschafft haben, haben sich ebenfalls entschieden, zu bleiben und uns im Kampf gegen Kolonialismus und Kapitalismus zu unterstützen."
  SAFR.10.a:0 "Wir werden sie gut nutzen."
  SAFR.15.t:0 "Bürgerkrieg"  
  SAFR.15.d:0 "Es ist Zeit, die Revolution zu beginnen und die Briten ein für alle Mal aus Indien zu vertreiben."
  SAFR.15.a:0 "Ja!"
  SAFR.15.a:0 "Now is not the time.
  SAFR.16.t:0 "Neue SRD-Richtlinie verfügbar"  
  SAFR.16.d:0 "Unsere Wissenschaftler berichten, dass sie ihre vorherige Aufgabe abgeschlossen haben und auf ihre neuen Anweisungen für das Jahr warten."
  SAFR.16.a:0 "Okay"  
  SAFR.17.t:0 "Der Parteiputsch"  
  SAFR.17.d:0 "Hertzog ist zur National Party zurückgekehrt und setzt sich für eine Versöhnung zwischen Afrikaanern und Britisch-Südafrikanern ein. Dies wurde von der Mehrheit der Parteimitglieder abgelehnt. Daher hat er beschlossen, zurückzutreten und sich aus der Politik zurückzuziehen. Vor den Wahlen muss ein neuer Parteivorsitzender gewählt werden. Malans Absichten sind klar: Republik und Unabhängigkeit für Südafrika. Pirows Vision hingegen scheint weitaus extremer zu sein als bloße Freiheit."
  SAFR.17.b:0 "Zurück Pirow." 
  SAFR.17.a:0 "Unterstützen Sie Malan." 
  SAFR.18.t:0 "Malan gewinnt"  
  SAFR.18.d:0 "In einer hart umkämpften Wahl gewann Malans Reunited National Party die Unterstützung der Bevölkerung und wird nun die neue Regierung führen. Die Unabhängigkeit von Großbritannien scheint das Hauptziel der neuen Regierung zu sein, aber wir müssen abwarten, was darüber hinausgeht."
  SAFR.18.a:0 "Exzellent" 
  SAFR.19.t:0 "Pirow gewinnt"  
  SAFR.19.d:0 "Mit einem knappen Vorsprung hat die Reunited National Party die Wahl gewonnen, und Pirow wird nun Premierminister. Pirows genaue Politik ist vielen in der Partei unklar, manche vermuten sogar, dass es sich um eine sehr radikale Politik handeln könnte."
  SAFR.19.a:0 "Exzellent" 
  SAFR.21.t:0 "Havenga und Pirow in Berlin"  
  SAFR.21.d:0 "Unsere Treffen in Berlin scheinen von der deutschen Regierung positiv aufgenommen worden zu sein. Wir haben zwei Angebote auf dem Tisch, von denen wir realistischerweise nur eines umsetzen können. Havenga hat es geschafft, ein für beide Seiten vorteilhaftes Handelsabkommen auszuhandeln, während Pirows frühere Treffen mit Hitler und hochrangigen deutschen Beamten sowie seine fließenden Deutschkenntnisse es uns ermöglichen, unsere hochrangigen Generäle und Offiziere für Trainings und Übungen mit der Wehrmacht nach Deutschland zu schicken."
  SAFR.21.a:0 "Havengas Deal" 
  SAFR.21.b:0 "Pirows Deal"
  SAFR.22.t:0 "Südafrika fordert die Oberherrschaft über unsere Kolonien."  
  SAFR.22.d:0 "Südafrika behauptet, es könne unsere südafrikanischen Kolonien besser schützen und werde ihnen eine begrenzte Selbstverwaltung gewähren. Sollten wir das zulassen?"
  SAFR.22.a:0 "Wir akzeptieren." 
  SAFR.22.b:0 "NEIN."
  SAFR.23.t:0 "Großbritannien stimmt unserem Vorschlag zu"  
  SAFR.23.d:0 "Großbritannien hat sich bereit erklärt, seine Kolonien im südlichen Afrika abzugeben. Wir werden sofort dafür sorgen, dass Großbritannien eine gewisse Autonomie erhält, bevor wir ihm die Zügel vollständig überlassen."
  SAFR.23.a:0 "Exzellent." 
  SAFR.24.t:0 "Großbritannien lehnt unseren Vorschlag ab"  
  SAFR.24.d:0 "Großbritannien hat unser Angebot abgelehnt. Es scheint, als gäbe es keine Änderung seiner überholten Kolonialpolitik."
  SAFR.24.a:0 "Schade." 
  SAFR.25.t:0 "Großbritannien bietet einen Kompromiss an"  
  SAFR.25.d:0 "Großbritannien hat uns einen Kompromiss angeboten. Sie haben sich bereit erklärt, Betschuanaland und Rhodesien abzutreten, wollen aber ihre Kolonien im Norden behalten."
  SAFR.25.a:0 "Es ist ein Anfang."
  
  