vilayet_stability_dynamic_modifier:0 "Stabilität des Reiches\n§W--------------§!\n§gVon den Wüsten Syriens über die Berge Kurdistans bis hin zu den Hügeln Zyperns übt das Osmanische Reich Kontrolle über seine Bürger aus. Diese Bürger mögen es jedoch nicht immer, von Konstantin regiert zu werden, und erweisen sich häufig als Nachteil für die allgemeine Stabilität des Reiches.\n\nJe höher die lokale Instabilität unserer Vilajets (dargestellt durch £resistance_texticon §YUnrest§!), desto höher ist die Strafe für unsere Nation. Die folgenden Werte werden pro Staat berechnet und zu einem reichsweiten Gesamtwert addiert:\n\n§GLow§! : £stability_texticon §R-1%§! \n§YMedium§! : £stability_texticon §R-2.5%§! \n§RHigh§! : £stability_texticon §R-5%§! §!\n\nAktualisiert dynamisch"
OTT_Centralise_tt_desc:0 "Durch die Aufhebung einiger lokaler Autoritäten des Vilayet wird die Macht auf das osmanische Parlament in Konstantinopel verlagert. Durch Siedlungspolitik, Verstärkung lokaler Garnisonen, Entwaffnung der Beduinen und Ausbau der staatlichen Infrastruktur wurden in einem Büro in der Hauptstadt ehrgeizige Pläne entworfen, die hoffentlich ebenso einfach umzusetzen wie zu schreiben sind...\n\n[THIS.OTT_CENTRALISE_complete_check] Alle der folgenden Aussagen müssen wahr sein:\n [THIS.OTT_CENTRALISE_pp_check] Mehr politische Macht als §Y10§!\n [THIS.OTT_CENTRALISE_party_check] Eine der folgenden Aussagen muss wahr sein:\n Die derzeitige Regierungspartei ist §YPaternal Autocrat§!\n Die derzeitige Regierungspartei ist §YAuthoritarian Democrat§!\n Die derzeitige Regierungspartei ist zentralistisch §YMarket Liberal§!\n [THIS.OTT_CENTRALISE_integration_factor_total_check] Eine der folgenden Aussagen muss wahr sein:\n [THIS.OTT_CENTRALISE_integration_factor1_check] Alle der folgenden Aussagen müssen wahr sein:\n ist §CAutonome Region§!\n [THIS.OTT_CENTRALISE_vilayet_category] &gt; §G50%§!\n [THIS.OTT_CENTRALISE_integration_factor2_check] Alle der folgenden Aussagen müssen wahr sein:\n ist §CVilayet§!\n [THIS.OTT_CENTRALISE_vilayet_category] = §G100%§!\n\n§YEffekt§!:\n£political_power_texticon Politische Macht: §R-10§!\n§Y[THIS.GetName]§! £resistance_texticon §YAufstandsrisiko§! wird §Rzunehmen§!\n§Y[THIS.GetName]§! £national_unity_texticon §YOsmanische Autorität§! wird §Gincrease§!"
OTT_Decentralise_tt_desc:0 "Um den lokalen Bedürfnissen besser gerecht zu werden und den einzigartigen kulturellen Charakter des Reiches zu bewahren, muss die Macht von der Zentralregierung in Konstantinopel auf die lokalen Behörden verlagert werden. Dies wird die Durchsetzung landesweiter Richtlinien oder die Reaktion auf lokale Bedrohungen durch das Osmanische Reich erschweren, ist aber eine vor Ort beliebte Politik und wird den Druck auf einige unserer instabileren Regionen verringern.\n\n§YEffect§!:\n§Y[THIS.GetName]§! £resistance_texticon §YAufstandsrisiko§! wird §Gverringern§!\n§Y[THIS.GetName]§! £national_unity_texticon §YOsmanische Autorität§! wird §Rverringern§!"
