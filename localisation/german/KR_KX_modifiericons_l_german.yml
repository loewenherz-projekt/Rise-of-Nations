#KR_Guatemala_l_english
GUA_united_fruit_desc:0 "Die United Fruit Company hat die Politik und Wirtschaft Guatemalas seit Cabreras Diktatur im Jahr 1898 fest im Griff. Obwohl Guatemala dadurch eine bedeutende wirtschaftliche Entwicklung erlebte, hängt das Schicksal des Landes von der United Fruit Company ab. Sie kontrolliert derzeit §Y[?UFC_power]%§! unseres Landes.\n§WDies hat folgende Auswirkungen:§!\n§W£political_power_texticon Täglicher politischer Machtgewinn:§! §R-[?UFC_effect1]§!\n§W£construction_speed_texticon Baugeschwindigkeit:§! §G+[?UFC_effect2]%§!\n§W£consumer_goods_texticon Konsumgüterfabriken:§! §Y-[?UFC_effect3]%§!\n§W£war_support_texticon Kriegsunterstützung:§! §R-[?UFC_effect4]%§!"

#KR_Haiti_l_english
 HAI_foreign_control_desc:0 "Trotz des amerikanischen Rückzugs aus der Besatzung unserer Insel ist Haiti weiterhin fest in der amerikanischen Wirtschaftssphäre verankert. Gespalten zwischen deutschen und amerikanischen Wirtschaftsinteressen wird unser Volk kontinuierlich ausgebeutet, und sofern keiner der beiden Mächte etwas Wesentliches widerfährt, werden wir weiterhin in ihrer Gewalt bleiben.\n§W-----------------§!\n§WAmerikanischer wirtschaftlicher Einfluss:§! [GetAmericanInfluence]\n§WDeutscher wirtschaftlicher Einfluss:§! [GetGermanInfluence]\n§WFranzösischer kommunaler wirtschaftlicher Einfluss:§! [GetFrenchInfluence]§![GetENTInfluence]\n\n§W[GetRestrictions]§W£civ_factory Industrielle Fabrikspenden:§! [?HAIeconomicinfluncecivs|=+0]\n§W£political_power_texticon Politischer Machtgewinn:§! [?HAIeconomicinfluncepp|%+0]"
 HAI_foreign_control_dummy_desc:0 "Trotz des amerikanischen Rückzugs aus der Besetzung unserer Insel ist Haiti weiterhin fest in der amerikanischen Wirtschaftssphäre verankert. Gespalten zwischen deutschen und amerikanischen Wirtschaftsinteressen wird unser Volk kontinuierlich ausgebeutet, und sofern keiner der beiden Mächte etwas Bedeutsames widerfährt, werden wir weiterhin in ihrer Gewalt bleiben.\n§W-----------------§!\n§WAmerikanischer wirtschaftlicher Einfluss:§! §RHoch§!\n§WDeutischer wirtschaftlicher Einfluss:§! §GLow§!\n§WFranzösischer kommunaler wirtschaftlicher Einfluss:§! §GLow§!\n\n§WAmerikanischer Beschränkungen:§! §RHeuvernementale Ausgaben§!\n\n§WKann keine Minister oder Gesetze ernennen:§! §RYas§!\n§W£civ_factory Industrielle Fabrikspenden:§! [?1|=+0]\n§W£political_power_texticon Politischer Machtgewinn:§! [?-0,1|%+0]"
 HAI_border_clashes_idea_desc:0 "Seit dem Abzug der US-Truppen haben die Dominikaner begonnen, ihre Truppen an unserer Grenze zu verstärken und gehen noch aggressiver vor. Trotz unseres Wunsches, zurückzuschlagen, haben Bestechungsgelder aus der Dominikanischen Republik unsere Armee geschwächt. Wir müssen die Korruption bekämpfen und unsere Armee zumindest ein wenig modernisieren, um unsere Grenzen verteidigen zu können.\n§W-----------------\n£organization_texticon Divisionsorganisation: [?HAIborderclashesORG|+=%1]\n£stability_texticon Stabilität: [?HAIborderclashesST|+=%]\n£war_support_texticon Kriegsunterstützung: [?HAIborderclashesWS|+=%]§!"
 HAI_border_clashes_desc:0 "Das dominikanische Regime dringt kontinuierlich in haitianisches Territorium ein. Es hat verschiedene Grenzdörfer überfallen und anschließend unsere Beamten bestochen, um Vergeltungsmaßnahmen zu verhindern. Präsident Calixte kam mit der Prämisse an die Macht, die dominikanischen Überfälle zu stoppen, doch die Bestechung in der Dominikanischen Republik ist uns weiterhin ein Dorn im Auge. Wir müssen eine Lösung finden, wenn wir unsere Grenze verteidigen wollen.\n\nDie Korruption in Haiti liegt derzeit bei [?HAI.HAI_corruption|R%].\n\nDie dominikanische Bestechung hat Haiti wie folgt beeinträchtigt:\n£organization_texticon Divisionsorganisation: [?HAI.HAIborderclashesORG|=+%]\n£war_support_texticon Kriegsunterstützung: [?HAI.HAIborderclashesWS|=+%]\n£stability_texticon Stabilität: [?HAI.HAIborderclashesST|=+%]\n\n[GetCorruptionStance]"

