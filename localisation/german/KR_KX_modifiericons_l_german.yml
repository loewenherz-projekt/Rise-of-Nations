SOV_cultural_revolution_proletkult_idea_desc:0 "Unter der Führung der Proletkultisten-Fraktion wurde eine aktive Politik der „Proletarisierung“ eingeleitet. Ziel ist die Ausrottung des Analphabetismus, eine radikale Verbesserung des Bildungsniveaus und die Integration der Menschen in die proletarische Ethik. Dieses Projekt erfordert viel Geld und Personal. Wenn es jedoch erfolgreich ist, werden wir uns buchstäblich im Arbeiterparadies wiederfinden\n§W--------------\n£kx_illiteracy_texticon Monatliche Veränderung der Analphabetenrate: [?SOV.SOV_culrev_level_of_illiteracy_monthly_rate|=-2]\n£kx_education_texticon Monatliche Veränderung des durchschnittlichen Bildungsniveaus: [?SOV.SOV_culrev_level_of_education_monthly_rate|=+2]\n£ai_texticon Monatliche Veränderung der Akzeptanz der proletarischen Ethik [?SOV.SOV_culrev_level_of_proletarian_ethics|=+2]\n£stability_texticon Stabilität: [?SOV.SOV_culrev_stability|%=+2]\n£war_support_texticon Kriegsunterstützung: [?SOV.SOV_culrev_war_support|%=+2]"
SOV_Cultural_Revolution_Proletkult_decisions_desc:0 "„Der Proletkult“ hat sich aus einem kleinen Kreis avantgardistischer Dichter und Schriftsteller zu einer großen Organisation in der Struktur des „Volkskommissariats der Aufklärung“ entwickelt. Der „Proletkult“ Das Projekt zielt darauf ab, den Analphabetismus auszurotten, das Bildungsniveau zu erhöhen und die proletarische Ethik in die Kulturen der Russen und Minderheiten einzubringen.\n\n£kx_illiteracy_texticon ANALPHABETISURQUOTE: [?SOV.SOV_proletkult_level_of_illiteracy|2]%\n\n£kx_education_texticon DURCHSCHNITTLICHES BILDUNGSNIVEAU: [?SOV.SOV_proletkult_level_of_education|2]%\n\n£ai_texticon AKZEPTANZ DER PROLETARISCHEN ETHIK: [?SOV.SOV_proletkult_level_of_proletarian_ethics|2]%"

