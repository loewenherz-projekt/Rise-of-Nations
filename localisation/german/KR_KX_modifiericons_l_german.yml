RUS_orth_eur_enlightenment_modifier_idea_desc:0 "Die Große Eurasische Aufklärung begann mit der Einrichtung spezieller Regierungsräte, die sich mit dem Analphabetismus in der Bevölkerung befassen, einheimische Minderheiten assimilieren und die eurasische Ideologie in allen sozialen Schichten fördern sollten.\n§W--------------\n£political_power_texticon Politischer Machtgewinn: [?RUS.RUS_orth_eur_enlightenment_political_power_factor|=%+0]\n£stability_texticon Stabilität: [?RUS.RUS_orth_eur_enlightenment_stability|=%+2]\n£war_support_texticon Kriegsunterstützung: [?RUS.RUS_orth_eur_enlightenment_war_support|=%+0]\n£consumer_goods_texticon Konsumgüter: [?RUS.RUS_orth_eur_enlightenment_consumer_goods_factor|=%+]\n£manpower_texticon Effektive Gesamtbelegschaft: [?RUS.RUS_orth_eur_enlightenment_conscription_factor|=%+]\n£drift_defence_texticon Ideologie-Drift-Verteidigung: [?RUS.RUS_orth_eur_enlightenment_ideology_drift_defense|=%+0]\n£occupation_costs Durchschnittliche Compliance zur Integration: [?RUS.rus_core_integration_cost_compliance|Y3]\n£time_texticon Integrationszeit: [?RUS.rus_core_integration_time_to_remove|Y0] Tage"
RUS_orth_eur_cultural_revolution_decisions_desc:0 "Unsere Regierung hat endlich mit der Schaffung einer wahren „Deokratie“ begonnen, und zwar mit Hilfe des Prozesses der „Großen Eurasischen Aufklärung“. Die Aufklärung ist ein komplexer, aber notwendiger Prozess, den wir abschließen müssen, um die Integrationszeit und die durchschnittliche Integrationsbereitschaft zu verringern. Die „Deokratierate“ hängt von der Assimilation einheimischer Minderheiten, der Alphabetisierungsrate und der Akzeptanz der Eurasischen Ideologie ab. Die totale „Deokratierate“ ist abhängig von der Assimilation einheimischer Minderheiten, der Alphabetisierungsrate und der Akzeptanz der Eurasischen Ideologie. Rate: [?RUS.rus_ideocracy|С2]\n\n£national_unity_texticon §YAssimilation einheimischer Minderheiten§!: [?RUS.rus_assimiliation_of_native_minorities|Y2]\n£kx_education_texticon Rate der §MLitationsrate§!: [?RUS.rus_illiteracy|M2]\n§g£ai_texticon Akzeptanz der eurasischen Ideologie§!: [?RUS.party_popularity@ruling_party|%g2]"
increase_rus_illiteracy_imrovement_rate_tt:0 "Wir werden uns stärker darum bemühen, die §MLiteracy§! zu verbessern, allerdings auf Kosten von:\n£political_power_texticon §R-50%§! Politischer Machtgewinn\n£kx_education_texticon §G+0.08§! §MLiteracy§! Tägliche Veränderung.\n"
