#KR_Ottoman_l_english
ott_constitution_tt:0 "Das osmanische Parlament, der Großwesir und der Padischah [OTT.GetLeader] werden eine moderne Verfassung für das Osmanische Reich erarbeiten.\n\n§YPluralistische Verfassung§!:\n§gDie Macht soll näher beim Einzelnen statt beim Staat liegen, wobei die Bedeutung individueller Freiheiten wie Rede- und Religionsfreiheit garantiert und geschützt wird. Der Sultan wird sein Recht auf direkten Einfluss auf Staatsangelegenheiten aufgeben und dieses stattdessen an ein demokratisch gewähltes Gremium delegieren.§!\nErhält den Nationalgeist durch die §YPluralistische Verfassung§!, die Folgendes gewährt: (£stability_texticon Stabilität: §G+10%§!)\n\n§YAutoritäre Verfassung§!:\n§gDie Macht wird um die Partei zentralisiert, deren gewählter Vorsitzender zum Großwesir ernannt wird, während alle anderen Parteien verboten werden. Der Sultan behält sich das Recht vor, alle religiösen Angelegenheiten zu kontrollieren, muss sich jedoch in Staatsangelegenheiten an die Partei halten.§!\nErhält den Nationalgeist durch die §YAutoritäre Verfassung§!, die Folgendes gewährt: (£political_power_texticon Politischer Machtgewinn: §G+10%§!, £manpower_texticon Nicht-Kern-Einberufungsfaktor: §G+10%§!)\n\n"
OTT_camel_corps_effect:0 "Aktiviert §H$camel_corps_tech$\nKavallerie\n Wüste§!\n £attack_texticon Angriff: §G+15%§!\n £defence_texticon Verteidigung: §G+5%§!\n £movement_texticon Bewegung: §G+3%§!\n\n"
ott_amn_tt:0 "Fügt den Modifikator hinzu: §YMitglied der Vereinigung muslimischer Nationen§!, der (£political_power_texticon Politischer Machtgewinn: §G+0,05§!, £civ_factory_output Fabrikleistung: §G+5,00 %§!) gewährt.\n\nFür jede weitere Nation, die der Vereinigung beitritt, erhöht sich dieser Modifikator um (£political_power_texticon Politischer Machtgewinn: §G+0,01§!, £civ_factory_output Fabrikleistung: §G+1,00 %§!)"
