ott_vilayet_stability_idea_desc:0 "Von den Wüsten Syriens bis zu den Bergen Kurdistans und den Hügeln Zyperns übt das Osmanische Reich Kontrolle über seine Bürger aus. Diese Bürger lassen sich jedoch nicht immer gern von Kostantiniyye regieren und erweisen sich häufig als Nachteil für die allgemeine Stabilität des Reiches.\n\nJe höher die lokale Instabilität unserer Vilayets (dargestellt durch £resistance_texticon §YUnrest§!), desto größer ist die Strafe für unsere Nation.\n§W--------------\n£stability_texticon Stabilität: [?var_state_stability|+=%][ott_vilayet_stability_war_support]\n\n§HEffect on our core states§!:\n£political_violence_texticon Garrison Penetration Chance: [?-0.95|-=%]\n£political_violence_texticon Schaden an Garnisonen: [?-0.95|-=%]§!"
