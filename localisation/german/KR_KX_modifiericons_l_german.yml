rus_industry_lack_desc:0 "Kerenskis Unfähigkeit, eine Landreform durchzuführen, führte dazu, dass ganze Regionen des Landes ihre effektiven Industrialisierungswege verloren. Darüber hinaus stand Russland nach dem Bürgerkrieg vor dem wirtschaftlichen Ruin, einer kurzen Wachstumsphase und anschließend einer Rezession aufgrund von Stagnation und Korruption, die durch Kerenskis ineffektive Herrschaft verursacht wurden. Derzeit hinkt Russland industriell immer noch Westeuropa und den USA hinterher.\n§W--------------\n£political_power_texticon Politischer Machtzuwachs: [?ROOT.RUS_backward_industry_political_power_gain|=%+0]\n£efficiency_growth_texticon Produktionseffizienzwachstum: [?ROOT.RUS_backward_industry_efficiency_gain|=%+0]\n£prod_eff_cap Produktionseffizienzobergrenze: [?ROOT.RUS_backward_industry_max_efficiency|=%+0]\n£civ_factory_output Fabrikleistung: [?ROOT.RUS_backward_industry_industrial_capacity|=%+0]\n£construction_speed_texticon Baugeschwindigkeit: [?ROOT.RUS_backward_industry_production_speed_buildings|=%+0]\n£research_speed_texticon Forschungsgeschwindigkeit: [?ROOT.RUS_backward_industry_research_speed|=%+0]\n£civ_factory Monatliche Industrialisierungsrate: [?ROOT.RUS_backward_industry_industrialisation_rate|=%+2]"
rus_industrialised_nation_desc:0 "Dank der Bemühungen unserer Regierung ist unser Land industrialisiert und wohlhabend.\n§W--------------\n£political_power_texticon Politischer Machtzuwachs: [?ROOT.RUS_backward_industry_political_power_gain|=%+0]\n£efficiency_growth_texticon Produktionseffizienzwachstum: [?ROOT.RUS_backward_industry_efficiency_gain|=%+0]\n£prod_eff_cap Produktionseffizienzobergrenze: [?ROOT.RUS_backward_industry_max_efficiency|=%+0]\n£civ_factory_output Fabrikleistung: [?ROOT.RUS_backward_industry_industrial_capacity|=%+0]\n£construction_speed_texticon Baugeschwindigkeit: [?ROOT.RUS_backward_industry_production_speed_buildings|=%+0]\n£research_speed_texticon Forschungsgeschwindigkeit: [?ROOT.RUS_backward_industry_research_speed|=%+0]\n£civ_factory Monatliche Industrialisierungsrate: [?ROOT.RUS_backward_industry_industrialisation_rate|=%+2]"

