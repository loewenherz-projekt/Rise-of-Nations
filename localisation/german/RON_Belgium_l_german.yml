 BEL_CAS_equipment_1_desc:0 "Dieses Flugzeug zur Luftnahunterstützung litt im Jahr 1940 unter seiner unzureichenden Geschwindigkeit, was es zu einem leichten Ziel machte, und unter seiner unzureichenden Nutzlast, was die Zerstörung der Brücken des Albertkanals für die armen Piloten, die für diese letzten Missionen abkommandiert wurden, unmöglich machte." 
 BEL_CAS_equipment_2:0 "Renard 37 B 14N"
 BEL_CAS_equipment_2_short:0 "R-37 B"
 BEL_CAS_equipment_2_desc:0 "Die Renard 37 B ist eine Zweisitzer-Variante der R-37, die für Bodenangriffe konzipiert wurde. Da nur ein Prototyp der Jagdversion gebaut wurde, blieb es auf dem Papier und wurde nie gebaut."  
