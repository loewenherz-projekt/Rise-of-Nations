 COG_CAS_equipment_1:0 "Fairey-Schlacht"
 COG_CAS_equipment_1_short:0 "Schlacht"
 COG_CAS_equipment_1_desc:0 "Dieses Flugzeug zur Luftnahunterstützung litt im Jahr 1940 unter seiner unzureichenden Geschwindigkeit, was es zu einem leichten Ziel machte, und unter seiner unzureichenden Nutzlast, was die Zerstörung der Brücken des Albertkanals für die armen Piloten, die für diese letzten Missionen abkommandiert wurden, unmöglich machte." 
