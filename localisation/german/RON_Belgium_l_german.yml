 COG_fighter_equipment_2_desc:0 "Nach dem Absturz der R-36, der zur Auflösung des Vertrags mit der belgischen Armee führte, glaubte Alfred Renard weiterhin an seine Kampfflugzeugprojekte. Er überarbeitete seine Entwürfe mehrfach, doch da die belgische Armee bereits die Hurricane übernommen hatte, fand sie kein Interesse an diesem einheimischen Entwurf." 
