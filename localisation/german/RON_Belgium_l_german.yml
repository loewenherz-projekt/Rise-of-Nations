 WLL_CAS_equipment_1:0 "Fairey-Schlacht"
 WLL_CAS_equipment_1_short:0 "Schlacht"
 WLL_CAS_equipment_1_desc:0 "Dieses Flugzeug zur Luftnahunterstützung litt im Jahr 1940 unter seiner unzureichenden Geschwindigkeit, was es zu einem leichten Ziel machte, und unter seiner unzureichenden Nutzlast, was die Zerstörung der Brücken des Albertkanals für die armen Piloten, die für diese letzten Missionen abkommandiert wurden, unmöglich machte." 
 WLL_CAS_equipment_2:0 "Sabca 47"
 WLL_CAS_equipment_2_short:0 "S 47"
 WLL_CAS_equipment_2_desc:0 "Die Sabca 47 ist die lokale Adaption der italienischen Caproni 135 Mistrale, um die Fairey Battle und ihre unzureichende Nutzlast zu ersetzen."  
