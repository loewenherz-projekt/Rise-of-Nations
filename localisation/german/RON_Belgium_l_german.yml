 WLL_equipment_effort_3_desc:0 "Anstatt ausländische Ausrüstung zu imitieren oder zu kaufen, sollten wir darauf abzielen, weltweit führend im Bereich Infanteriewaffen zu werden."
 WLL_armor_effort:0 "Gepanzerte Fahrzeuge entwerfen"
 WLL_armor_effort_desc:0 "Indem wir das anwenden, was wir bei der Mechanisierung unserer Infanterie gelernt haben, können wir auch unsere gepanzerten Fahrzeuge verbessern."
 WLL_special_forces:0 "Spezialeinheiten"
 WLL_special_forces_desc:0 "Wir brauchen Elitetruppen; Gebirgsjäger und Fallschirmjäger sollten unsere Priorität sein."
 WLL_aviation_effort:0 "Gründung der Wallonischen Flugschule"
 WLL_aviation_effort_tt:0 "Nicht genügend Bauplätze für §YAir Base§!"
 WLL_aviation_effort_desc:0 "Nirgendwo schreitet der technologische Fortschritt schneller voran als in der Luftkriegsführung. Die Luftfahrt ist ein Gebiet, das jede moderne Nation beherrschen muss."
 WLL_fighter_focus:0 "Vorrang für &quot;Avion Fairey&quot;"
 WLL_fighter_focus_desc:0 "Luftkämpfe haben im Ersten Weltkrieg noch nicht stattgefunden. Wenn wir bei der Entwicklung von Kampfflugzeugen die Nase vorn haben, werden wir auch in Zukunft einen Vorteil haben."
 WLL_bomber_focus:0 "Vorrang für die SABCA"
 WLL_bomber_focus_desc:0 "Wenn die Menschen in Zukunft vom Schrecken der heutigen Kriege sprechen, wird Feuer, das vom Himmel regnet, eine zentrale Rolle spielen. Wir werden unser Bestes tun, um sicherzustellen, dass diese Geschichten auch von unseren Feinden erzählt werden."
 WLL_aviation_effort_2:0 "Studieren Sie ausländische Taktiken"
 WLL_aviation_effort_2_desc:0 "Um unsere Luftwaffe gut in andere Zweige des Militärs zu integrieren, sind weitere Fortschritte in der Luftfahrt erforderlich."
 WLL_CAS_effort:0 "Sturzkampfbomber"
 WLL_CAS_effort_desc:0 "Eine moderne Armee benötigt nicht nur am Boden, sondern auch in der Luft die Unterstützung durch Fahrzeuge."
 WLL_rocket_effort:0 "Raketentriebwerke"
 WLL_rocket_effort_desc:0 "Raketen- und Düsentriebwerke ermöglichen sowohl unbemannten als auch bemannten Schiffen beispiellose Geschwindigkeiten. Die Entwicklung dieser Technologien wird es uns ermöglichen, den Feind zu überraschen."
 WLL_NAV_effort:0 "Marinebomber"
 WLL_NAV_effort_desc:0 "So wie die neue Seekriegsführung teilweise unter der Wasseroberfläche stattfindet, findet ein Teil davon in der Luft über dem Wasser statt."
 WLL_naval_effort:0 "Finanzieren Sie den Schiffbau"
 WLL_naval_effort_tt:0 "Nicht genügend Bauplätze für §YNaval Dockyards§!"
 WLL_naval_effort_desc:0 "Der Ausbau unserer Marine sollte unsere oberste Priorität sein. Alle verfügbaren Ressourcen sollten für neue Werften und die Erforschung leichter Überwasserschiffe eingesetzt werden."
 WLL_flexible_navy:0 "Flexibles Marineblau"
 WLL_flexible_navy_desc:0 "Durch die Neugestaltung der Seekriegsführung unter Berücksichtigung der Fortschritte in der U-Boot-Technologie können wir feindliche Konvois effizient bekämpfen."
 WLL_large_navy:0 "Große Marine"
 WLL_large_navy_desc:0 "Die Anpassung unserer Marinedoktrinen an große Schiffe und die Gewährleistung der Sicherheit unserer Handelskonvois wird uns viel darüber beibringen, welche Art von Schiffen wir benötigen."
 WLL_submarine_effort:0 "U-Boot-Krieg"
 WLL_submarine_effort_desc:0 "Der U-Boot-Krieg ist die spannendste Entwicklung in der Marine seit der Erfindung des Torpedoboots. Wir tun gut daran, uns nicht nur vor U-Booten zu schützen, sondern sie auch gegen feindliche Schiffe einzusetzen."
 WLL_cruiser_effort:0 "Kreuzer konzipieren"
 WLL_cruiser_effort_desc:0 "Bevor wir uns auf die Erforschung fortgeschrittener Schlachtschiffe konzentrieren können, müssen die kleineren Kreuzer ersetzt werden."
 WLL_destroyer_effort:0 "Design-Zerstörer"
 WLL_destroyer_effort_desc:0 "Durch die Untersuchung der Konstruktion und des strategischen Einsatzes von U-Booten haben wir auch gelernt, wie wir diesen Strategien entgegenwirken können. Zerstörer werden dabei eine entscheidende Rolle spielen."
 WLL_capital_ships_effort:0 "Interesse an Großkampfschiffen"
 WLL_capital_ships_effort_desc:0 "Die Nation mit den meisten Schlachtschiffen wird die Weltmeere beherrschen. Schlachtschiffe und Flugzeugträger repräsentieren die alte und die neue Seeüberlegenheit."
 WLL_industrial_effort:0 "Industrieplan Maastal"
 WLL_industrial_effort_desc:0 "Konzentrieren Sie alle unsere politischen Anstrengungen darauf, die zivile Industrie mit einem großen Sprung nach vorne aufzubauen."
 WLL_industrial_effort_2:0 "Industrielle Anstrengung II"
 WLL_industrial_effort_2_desc:0 "Mit eisernem Willen und einer unermüdlichen Arbeitsmoral können wir die Menschen zu einer weiteren großen industriellen Anstrengung mobilisieren."
 WLL_construction_effort:0 "Entwicklung der Schwerindustrie in Lüttich"
 WLL_construction_effort_tt:0 "Nicht genügend Bauplätze für §YCivilian Factories§!"
 WLL_construction_effort_desc:0 "Auch wenn weltweit ein Krieg droht, darf die zivile Industriekapazität nicht unterschätzt werden."
 WLL_production_effort:0 "Investieren Sie in FN Herstal"
 WLL_production_effort_tt:0 "Nicht genügend Bauplätze für §YMilitärfabrik§!"
 WLL_production_effort_desc:0 "Wer Traktoren bauen kann, kann auch Panzer bauen! Wir dürfen nicht zulassen, dass unsere militärische Produktionskapazität zurückbleibt."
 WLL_construction_effort_3:0 "Förderung der Leichtindustrie in Namur"
 WLL_construction_effort_3_desc:0 "Im Herzen des Sambre-Maas-Tals gelegen, sollte Namur nicht nur unsere politische Hauptstadt sein, sondern könnte auch ein sekundäres Industriezentrum sein, das Lüttich und Charleroi unterstützt."
 WLL_coal_mines:0 "Der Kampf um die Kohle"
 WLL_coal_mines_desc:0 "Kohle ist unsere wichtigste Ressource und wir müssen ihre Förderung unbedingt maximieren."
 WLL_Artificial_Oil_Industry:0 "Von Kohle zu Öl"
 WLL_Artificial_Oil_Industry_desc:0 "Unsere Spule kann in Öl und Kunstkautschuk umgewandelt werden, eine nützliche Entwicklung, die es uns ermöglicht, weniger auf Importe angewiesen zu sein." 
 WLL_production_effort_2:0 "Erweitern Sie den FRC"
 WLL_production_effort_2_desc:0 "Der Versuch, zivile Fabriken für die Produktion militärischer Ausrüstung umzurüsten, ist ineffizient. Wir sollten uns jetzt auf die Vorbereitung der Rüstungsproduktion konzentrieren."
 WLL_production_effort_3:0 "Investieren Sie in Avion Fairey und SABCA"
 WLL_production_effort_3_desc:0 "Um den Bedarf an neuer Ausrüstung zu decken, sind kontinuierliche Anstrengungen zum Ausbau unserer Militärfabriken erforderlich."
 WLL_infrastructure_effort:0 "Straßen renovieren"
 WLL_infrastructure_effort_desc:0 "Ein Land ohne angemessene Infrastruktur kann keine fortschrittlichen Projekte oder Bauvorhaben durchführen."
 WLL_infrastructure_effort_tt:0 "Nicht genügend Bauplätze für §YInfrastruktur§!"
 WLL_synth_oil_effort_tt:0 "Nicht genügend Bauplätze für §YSynthetische Raffinerie§!"
 WLL_infrastructure_effort_2:0 "Renovieren Sie die Eisenbahngüter"
 WLL_infrastructure_effort_2_desc:0 "Der weitere Ausbau unserer Infrastruktur wird die für geheime Hightech-Projekte notwendigen Transport- und Kommunikationsmittel ermöglichen."
 WLL_construction_effort_2:0 "Steigerung der Produktion im Hennegau"
 WLL_construction_effort_2_desc:0 "Die Region zwischen Mons und Charleroi ist nicht nur reich an Kohle, sondern auch an Industrieanlagen. Eine Aussage, die wir umso mehr wahr machen müssen, um diesen schwierigen Zeiten standzuhalten."  
 WLL_liege_forts:0 "Bauen Sie den Forts Belt von Lüttich nach"
 WLL_liege_forts_desc:0 "Die Forts von Lüttich waren zu Beginn des Ersten Weltkriegs ein Schlüsselelement der belgischen Verteidigung gegen Deutschland. Ein umfassendes Bauprogramm musste so schnell wie möglich beginnen, um die Festungen zu einem zentralen Element zur Abwehr deutscher Angriffe zu machen. Dabei sollte auch die Möglichkeit eines Angriffs mit Segelflugzeugen berücksichtigt werden." 
 WLL_nuclear_effort:0 "Nukleare Anstrengungen"
 WLL_nuclear_effort_desc:0 "Wir stehen am Rande einer weltverändernden Entdeckung und können nicht zulassen, dass andere das Feuer entfachen, das eines Tages die Erde verzehren könnte."
 WLL_extra_tech_slot:0 "Financer les universités"
 WLL_extra_tech_slot_desc:0 "Unsere industrielle Expansion und andere aktuelle Fortschritte könnten es uns ermöglichen, parallel mehr Forschung und Entwicklung durchzuführen."
 WLL_extra_tech_slot_2:0 "Koordinieren Sie die Innovationen"
 WLL_extra_tech_slot_2_desc:0 "Die schnelle Industrialisierung unseres Landes hat neue Möglichkeiten in Forschung und Entwicklung eröffnet, die wir nutzen sollten."
 WLL_technology_sharing:0 "Technologieaustausch"
 WLL_technology_sharing_desc:0 "Indem wir technologische Fortschritte mit unseren Verbündeten teilen, kann unsere gesamte Fraktion die Forschung und Entwicklung im Kriegsfall effizienter durchführen."
 WLL_secret_weapons:0 "Geheimwaffen"
 WLL_secret_weapons_desc:0 "Es ist verlockend, alle zusätzlichen Ressourcen in die Entwicklung von Panzern und Flugzeugen zu stecken, aber das Geheimnis, Kriege zu gewinnen, liegt in ganz neuen Wissenschaftsbereichen: Elektronik, Raketentechnik und Nuklearforschung."
 WLL_political_effort:0 "Organisieren Sie den neuen Staat"
 WLL_political_effort_desc:0 "Um Veränderungen in der Welt herbeizuführen, müssen wir in der Lage sein, Veränderungen in unserem eigenen Land herbeizuführen. Die Stärkung unserer politischen Position sollte dabei an erster Stelle stehen."
 WLL_collectivist_ethos:0 "Kollektivistisches Ethos"
 WLL_collectivist_ethos_desc:0 "Unsere Feinde mögen kleinere Nationen spalten und erobern, aber unser Volk wird vereint bleiben. Einer für alle, alle für einen."
 WLL_liberty_ethos:0 "Demokratischer Konsens"
 WLL_liberty_ethos_desc:0 "In dieser Zeit ideologischer Fanatiker, die den menschlichen Geist ersticken wollen, werden wir die individuellen Freiheiten und die Unabhängigkeit schützen."
 WLL_militarism:0 "Militarismus"
 WLL_militarism_desc:0 "Wer das Militär als notwendiges Übel betrachtet, ist dazu verdammt, angesichts des Krieges zu zögern. Wir werden den Militarismus in unsere Kultur einprägen, um ein Volk von Soldaten zu werden."
 WLL_political_correctness:0 "Politische Korrektheit"
 WLL_political_correctness_desc:0 "Menschen mit leicht kontroversen oder anderweitig peinlichen Ansichten scheinen sich Sorgen zu machen, dass es eine weitreichende Verschwörung gegen sie gibt. Das scheint eine hervorragende Idee zu sein."
 WLL_neutrality_focus:0 "Neutralitätsfokus"
 WLL_neutrality_focus_desc:0 "Während andere behaupten, dass es Mut und Weisheit erfordert, in einem globalen Konflikt Partei zu ergreifen, wissen wir, dass es mehr erfordert, sich zu weigern."
 WLL_interventionism_focus:0 "Interventionismus-Fokus"
 WLL_interventionism_focus_desc:0 "Wir schätzen die Freiheit aller Menschen, nicht nur unserer eigenen Bürger. Wenn die Verhinderung von Tyrannei Krieg bedeutet, dann ist das so."
 WLL_military_youth:0 "Jeunesses Rexistes"
 WLL_military_youth_desc:0 "Organisationen zur Förderung der Disziplin und politischen Bildung junger Menschen in unserem Land werden frühzeitig Loyalität und Selbstaufopferung fördern."
 WLL_deterrence:0 "Abschreckung"
 WLL_deterrence_desc:0 "Wenn wir allein dastehen, profitieren wir selten vom Krieg. Glücklicherweise wissen wir, dass die beste Verteidigung eine ist, die so bekannt ist, dass man sie nie anwenden muss."
 WLL_volunteer_corps:0 "Freiwilligenkorps"
 WLL_volunteer_corps_desc:0 "Unser Volk zu zwingen, für die Ideale der Freiheit zu sterben, wäre eine Ironie des Schicksals. Doch die Schaffung von Mitteln für diejenigen, die Menschen im Ausland helfen möchten, ist es nicht."
 WLL_paramilitarism:0 "Gardes Wallonnes"
 WLL_paramilitarism_desc:0 "Militärische Prinzipien finden auch außerhalb des Militärs Anwendung. Mit der Entwicklung halbmilitarisierter Einheiten zur Ergänzung unserer Streitkräfte werden mehr Menschen eine militärische Ausbildung erhalten."
 WLL_indoctrination_focus:0 "Indoktrination"
 WLL_indoctrination_focus_desc:0 "Nachdem wir unsere Ideologie als wahrheitsgetreu etabliert haben, kann sie auch als Wahrheit gelehrt werden. Bildung und Medien müssen diese Lehre widerspiegeln."
 WLL_foreign_expeditions:0 "Auslandsexpeditionen"
 WLL_foreign_expeditions_desc:0 "Da unsere Feinde bereit sind, im Namen ihrer Ideale in weit entfernte Konflikte einzugreifen, müssen wir bereit sein, dasselbe für unsere zu tun."
 WLL_why_we_fight:0 "Warum wir kämpfen"
 WLL_why_we_fight_effect:0 "Wenn wir nicht den Geist einer „Neutralen Außenpolitik“ haben, werden wir in der Lage sein, Fraktionen zu bilden.\n"
 WLL_why_we_fight_desc:0 "Die Welt wird immer unsicherer. Unsere Bevölkerung muss die Gräueltaten der Machtgierigen sehen. Es ist Zeit, die Bevölkerung für unsere Sache zu gewinnen und sicherzustellen, dass alle bereit sind, für unsere Freiheit zu kämpfen."
 WLL_political_commissars:0 "Politische Kommissare"
 WLL_political_commissars_desc:0 "Um sicherzustellen, dass unsere Richtlinien in der militärischen Praxis befolgt werden, werden wir politisch ernannte Beamte in die militärischen Ränge aufnehmen."
 WLL_internationalism_focus:0 "Internationalismus-Fokus"
 WLL_internationalism_focus_desc:0 "Ideologie kennt keine Grenzen. Eine andere Nation mag sich als souverän bezeichnen, doch unsere Überzeugungen stehen über solchen Ansprüchen."
 WLL_nationalism_focus:0 "Fokus auf Nationalismus"
 WLL_nationalism_focus_desc:0 "Unsere Nation ist einzigartig und unsere politischen Errungenschaften konnten nur hier erzielt werden. Dafür müssen wir um jeden Preis kämpfen."
 WLL_ideological_fanaticism:0 "Ideologischer Fanatismus"
 WLL_ideological_fanaticism_desc:0 "Unsere politisch etablierten Werte und Ziele sind es wert, für sie zu sterben, genauso wie für jeden alten Glauben. Jeder Anhänger sollte darauf vorbereitet sein, dem Tod ins Auge zu sehen, und diejenigen, die vom Glauben abirren, sollten besser darauf vorbereitet sein, dem Tod ins Auge zu sehen."
 WLL_conservatism_focus:0 "Katholischer Einfluss"
 WLL_conservatism_focus_desc:0 "Katholischer Einfluss."
 WLL_welfare_focus:0 "Sozialreformen"
 WLL_conservatism_focus_desc:0 "Sozialreformen." 
 WLL_political_coalition_focus:0 "Politische Koalition"
 WLL_political_coalition_focus_desc:0 "Politische Koalition."  
 WLL_rearmement_agreement:0 "Wiederaufrüstungsabkommen"
 WLL_rearmement_agreement_desc:0 "Angesichts der weltweit zunehmenden Spannungen ist eine Verbesserung unserer militärischen Organisation und unserer zivilen Verteidigung unabdingbar."

 
 
 
