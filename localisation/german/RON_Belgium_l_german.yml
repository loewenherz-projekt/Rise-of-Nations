 VLA_tac_bomber_equipment_0_desc:0 "Die GR.8, genannt „Doryphore“ (was wegen ihrer schlechten Flugeigenschaften „Kartoffelkäfer“ bedeutet), wurde als Mehrzweckflugzeug für die belgische Luftwaffe gebaut. Sie sollte als Bomber, Aufklärungsflugzeug und schwerer Jäger dienen. Sie erfüllte die absurden Anforderungen der belgischen Armee aufs Wort ... und war in all diesen Rollen folglich schlecht."   
 VLA_tac_bomber_equipment_1:0 " S.45"
