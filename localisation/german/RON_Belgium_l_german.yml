l_german:
 
 caring_leader:0 "Fürsorglicher Leiter"
 caring_leader_desc:0 "Dieser Mann kümmert sich aufrichtig um die Gesundheit und das relative Wohlbefinden des einfachen Soldaten. Seine Untergebenen sind schnell wieder kampffähig, aber dieser „Luxus“ hat seinen Preis."
 artillerist:0 "Artillerist"
 artillerist_desc:0 "Dieser Mann hat den Einsatz von Artillerie studiert und weiß, wie man sie gut einsetzt. Manchmal überstrapaziert er seine geliebten Waffen und feuert etwas mehr als nötig."
 air_force_ties:0 "Krawatten der Luftwaffe"
 air_force_ties_desc:0 "Dieser Mann diente einst in der Luftwaffe oder hat enge Verbindungen zu Offizieren der Luftwaffe, was die Koordination zwischen seinen Truppen und der Luftfahrt verstärkt." 
 meticulous:0 "Akribisch"
 meticulous_desc:0 "Dieser Mann prüft gerne jedes Detail seiner Pläne, verliert dabei viel Zeit, behebt aber gleichzeitig kleine Fehler." 
 obsessed_by_artillery_desc:0 "Die Leidenschaft dieses Mannes für die Artillerie kennt fast keine Grenzen. Er überprüft ständig ihre Einsatzfähigkeit und besteht darauf, dass sie in jeder Situation eingesetzt werden, auch wenn ein schnellerer und leichterer Einsatz vorzuziehen wäre."
 decisive_planner:0 "Entschlossener Planer"
 homeland_connoisseur:0 "Heimatkenner"
 homeland_connoisseur_desc:0 "Dieser Kommandant kennt sein Heimatland so gut, dass er wenig bekannte Besonderheiten des Geländes ausnutzen kann, die auf einer Militärkarte nur schwer zu erkennen sind."  
 flemish:0 "flämisch"
 flemish_desc:0 "Auch wenn die Muttersprache dieser Figur Französisch sein könnte, hat er, da die Sprache von der Elite im ganzen Land gesprochen wurde, eindeutig flämische Wurzeln und ist höchstwahrscheinlich zweisprachig."   
 walloon:0 "wallonisch"
 walloon_desc:0 "Diese Person ist entweder ein französischsprachiger Wallone oder in Brüssel aufgewachsen und würde es nicht begrüßen, einem Staat zu dienen, der seine Muttersprache nicht vollständig anerkennt."    
 
 armored_car_corps_veteran:0 "Veteran des Panzerwagenkorps"
 
 BELverdinaso_party:0 "Verdinaso - Rex"
 BELverdinaso_party_long:0 "Verbond der Dietschen Nationaal-Solidaristen – Parti Rexiste"
