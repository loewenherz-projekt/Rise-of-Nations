 WLL_anti_tank_equipment_1:0 "Canon Anti-Charge für 47-mm-Modell 1931"
 WLL_anti_tank_equipment_1_short:0 "C.47 FRC Mle31"
 WLL_anti_tank_equipment_1_desc:0 "Die 47-mm-Kanone von 1931 wurde von der „Fonderie Royale de Canons“ hergestellt und genoss einen ausgezeichneten Ruf. Sie diente als Basis für den Panzerzerstörer T-13."
 WLL_anti_tank_equipment_2:0 "Canon Anti-Char de 60mm"
 WLL_anti_tank_equipment_2_short:0 "C.60"
 WLL_anti_tank_equipment_2_desc:0 "Die belgische 60-mm-Panzerabwehrkanone war eine leistungsstarke, aber seltene Panzerabwehrkanone. Tatsächlich kam sie nie im Feld zum Einsatz, da ihre Produktion als zu kostspielig galt. Alle produzierten Exemplare wurden in Festungen, hauptsächlich in der Umgebung von Lüttich, eingesetzt."  
