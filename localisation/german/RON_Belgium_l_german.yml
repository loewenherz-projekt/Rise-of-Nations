 WLL_medium_tank_destroyer_equipment_1_desc:1 "Der ACG-2 ist ein Panzerjäger-Prototyp auf Basis des ACG-1. Er wäre eine logische Weiterentwicklung des ACG-1 durch die Belgier gewesen. Selbst seine Silhouette ist nicht genau bekannt. Wir haben nur ein Foto des Prototyps, und die Originalpläne sind verloren gegangen. Der Name Automitrailleuse Anti-Tank ist spekulativ und basiert auf dem belgischen Namen des ACG-1."
