 WLL_auguste_buisseret:0 "Auguste Buisseret"
 WLL_georges_thone:0 "Georges Thone"
 WLL_arille_carlier:0"Arille Carlier"
 WLL_Prosper_Theugels:0 "Prosper Theugels"
 WLL_fernand_rouleau:0 "Fernand Rouleau"
 WLL_Jules_Mahieu:0 "Jules Mahieu"
 
 COG_albert_decoster:0 "Albert Decoster"
 COG_albert_decoster_desc:0 "Albert Decoster war der Leiter des „Journal du Katanga“, einer Publikation, die mit äußerster Genauigkeit und Regelmäßigkeit den Inhalt der sowjetischen Kriegsbulletins wiedergab. Obwohl dies teilweise eine Haltung war, die den Syndikalisten von Jadotville gefallen sollte, hegte er eindeutig linksgerichtete Sympathien." 
 COG_pierre_cattier:0 "Pierre Cattier"
 COG_pierre_cattier_desc:0 "Pierre Cattier ist kein Soldat, sondern Manager einer Fährgesellschaft, die zwischen Antwerpen und Léopoldville verkehrt. Im Falle des Aufbaus einer belgisch-kongolesischen Marine wäre er einer der wenigen Menschen mit der nötigen Erfahrung gewesen, um bei der Leitung mitzuhelfen."
 COG_joseph_kasa_vubu:0 "Joseph Kasa Vubu"
 COG_joseph_kasa_vubu_desc:0 "Joseph Kasa Vubu setzte sich bereits kurz nach dem Krieg für die Anerkennung der kulturellen Besonderheiten der Kongolesen ein und wurde später der erste Präsident der unabhängigen Republik Kongo-Léopoldville." 
 COG_gerard_greindl:0 "Gérard Greindl"
 COG_gerard_greindl_desc:0 "Gérard Greindl war ein belgischer Pilot, der den Krieg in Afrika fortsetzte. Aufgrund des Flugzeugmangels im belgischen Kongo diente er in der südafrikanischen Luftwaffe."
 COG_charles_joseph_haas:0 "Charles-Joseph Haas"
 COG_charles_joseph_haas_desc:0 "Charles-Joseph Haas war ein Offizier, der seine Karriere nach dem Ersten Weltkrieg im Kongo fortsetzte. Er wurde 1935 Oberstleutnant und 1941 Oberst und kämpfte unter dem Kommando von Gilliaert in Abessinien."  
 COG_jules_cousin:0 "Jules Cousin"
 COG_jules_cousin_desc:0 "Jules Cousin war einer der Verwalter der Union Minière du Haut-Katanga."
 COG_leo_petillon: "Léo Pétillon"
 COG_leo_petillon_desc: "Léo Pétillon was a civil servant in the minister of the colonies in Brussels (he is one of the founder of the colonial lottery, ancestor of the Belgian national lottery) before being asked to be moved to the Belgian Congo. In 1939 he became aide of the Governor General Pierre Ryckmans"
 COG_eugene_jungers: "Eugène Jungers"
 COG_eugene_jungers_desc: "Eugène Jungers is the colonial administrator of the mandate of Ruanda-Urundi, a territory composed of the modern countries of Rwanda and Burundi. Those territories were (in theory) distinct from the Belgian Congo as they were previously German colonies mandate by the SDN." 
 COG_edgar_sengier:0 "Edgar Sengier"
 COG_edgar_sengier_desc:0 "Edgar Sengier war ein Ingenieur, der die Idee hatte, große Mengen Uranerz aus Tchinkolobwe in ein Lagerhaus in New York zu schicken, um es vor einem europäischen Krieg zu schützen. Anschließend organisierte er den Transport der Uranproduktion aus Katanga in die USA. Sein Handeln hatte direkten Einfluss auf die der US-Regierung zur Verfügung stehenden Uranmengen, um das Manhattan-Projekt in Gang zu setzen."
 COG_jean_beaudinet:0 "Jean Beaudinet"
 COG_jean_beaudinet_desc:0 "Jean Beaudinet war der Direktor der „Staatssicherheit“ (des zivilen belgischen Geheimdienstes) in der Kolonie."
 COG_paul_ermens:0 "Paul Ermens"
 COG_paul_ermens_desc:0 "Paul Ermens war Stabschef der Force Publique."
 COG_auguste_edouard_gilliaert:0 "Auguste-Édouard Gilliaert" 
 COG_emile_janssens:0 "Émile Janssens"
 COG_leopold_dronkers_martens:0 "Léopold Dronkers-Martens"
 COG_leopold_dronkers_martens_desc:0 "Léopold Dronkers-Martens war einer der ranghöchsten Offiziere während des Abessinienfeldzugs. Später wurde er mit dem kongolesischen Korps in den Nahen Osten geschickt."  
 COG_edmond_van_der_meersch:0 "Edmond Van der Meersch"  
 COG_edmond_van_der_meersch_desc:0 "Edmond Van der Meersch ist vor allem für seine Rolle bei den Ereignissen rund um die Unabhängigkeit des Kongo im Jahr 1960 bekannt, er war jedoch bereits ein hochrangiger Offizier der Force Publique." 
 COG_robert_mauroy:0"Robert Mauroy"
 COG_robert_mauroy_desc:0"Robert Mauroy war der Stabschef von Emile Hennequin. Er war ein potenzieller Kandidat für das effektive Kommando über die Truppen, aber stattdessen wurde Auguste-Edouard Gilliaert ausgewählt."
 COG_emile_hennequin:0 "Émile Hennequin"
 COG_emile_hennequin_desc:0 "Émile Hennequin befehligte die Force Publique vor General Ermens. Er beaufsichtigte die ersten Reformen der Force Publique, die zu ihrer Neuausrichtung nach den durch die Weltwirtschaftskrise verursachten Budgetkürzungen führten."
 COG_franz_burniaux:0 "Franz Burniaux"
 COG_franz_burniaux_desc:0 "Franz Burniaux, Fluglehrer der belgischen Luftwaffe, setzte den Krieg in Afrika nach einem kurzen Aufenthalt in Großbritannien fort. Er wurde zur Machbarkeit des Aufbaus einer Luftwaffe für Belgisch-Kongo konsultiert, diente jedoch im belgischen Korps der südafrikanischen Luftwaffe, da das Projekt aufgegeben wurde."
 COG_n_cools:0 "N. Cools"
 COG_n_cools_desc:0 "Obwohl N. Cools unter den hochrangigen Offizieren der Force Publique historisch eine relativ untergeordnete Rolle spielte, war er bekannt für seine Germanophilie. Aus diesem Grund habe ich ihn, da kein besserer Kandidat in Frage kam, als kongolesischen Faschistenführer ausgewählt. Ich muss auch erwähnen, dass ich intensiv nach seinem Vornamen gesucht habe, aber nur seinen Anfangsbuchstaben gefunden habe."
 COG_m_heynen:0 "M. Heynen"
 COG_m_heynen_desc:0 "M. Heynen ist ein Syndikalist, der 1940 gemeinsam mit M. Dutron Streiks in Jadotville anführte. Der Unterschied zwischen den beiden besteht darin, dass er für einen deutschen Sieg plädierte, während Dutron für eine kommunistische Revolution plädierte. Aufgrund des Molotow-Ribbentrop-Pakts war dies damals kein Widerspruch. Schließlich landeten beide wegen „defätistischer Reden“ im Gefängnis." 
 COG_m_dutron:0 "M. Dutron"
 COG_m_dutron_desc:0 "M. Dutron ist ein Syndikalist, der 1940 gemeinsam mit M. Heynen Streiks in Jadotville anführte. Der Unterschied zwischen den beiden besteht darin, dass er für eine kommunistische Revolution plädierte, während Heynen einen deutschen Sieg wünschte. Aufgrund des Molotow-Ribbentrop-Pakts war dies damals kein Widerspruch. Schließlich landeten beide wegen „defätistischer Reden“ im Gefängnis." 
 COG_m_dutron2:0 "M. Dutron"
 COG_m_dutron2_desc:0 "M. Dutron ist ein Syndikalist, der 1940 gemeinsam mit M. Heynen Streiks in Jadotville anführte. Der Unterschied zwischen den beiden besteht darin, dass er für eine kommunistische Revolution plädierte, während Heynen einen deutschen Sieg wünschte. Aufgrund des Molotow-Ribbentrop-Pakts war dies damals kein Widerspruch. Schließlich landeten beide wegen „defätistischer Reden“ im Gefängnis."
 
 COG_maurice_sluys:0 "Maurice Sluys"
 COG_maurice_sluys_desc:0 "Maurice Sluys war Bergbauingenieur und arbeitete für ein amerikanisches Unternehmen in Jugoslawien, bevor er nach der Invasion Belgiens und Jugoslawiens nach Belgisch-Kongo zog. Im Kongo wurde er Leiter der „Direction de la production minière de guerre“ (französisch: „Direction de la production minière de guerre“). Später kehrte er nach Belgien zurück und lehrte Geologie in Lüttich. Das hier verwendete Foto zeigt ihn in seinen späteren Lebensabschnitten, lange nachdem er Afrika verlassen hatte."
 COG_union_miniere:0 "Union Minière du Haut Katanga"
 COG_union_miniere_desc:0 "Die Union Minière du Haut Katanga ist ein Bergbauunternehmen, das im Zuge des „geologischen Skandals“ von Katanga gegründet wurde. Es förderte Kupfer, Wolfram und vor allem die berühmte Uranmine von Tchinkolobwe."
 COG_idea_war_mining_production_directorate:0 "Direktion für Kriegsbergbauproduktion"
 COG_idea_war_mining_production_directorate2:0 "Direktion für Kriegsbergbauproduktion"
 COG_idea_war_mining_production_directorate3:0 "Direktion für Kriegsbergbauproduktion"
 
 tblra_british_ship_designs:0 "Britische Schiffsentwürfe"
 tblra_british_ship_designs_desc:0 "Wenn wir unsere Küsten wirksam schützen wollen, müssen wir unsere Kräfte mit der Royal Navy bündeln." 
 tblra_tank_destroyers_expertise:0 "Panzerzerstörer-Expertise"
 tblra_recovery_from_the_great_depression1:0 "Erholung von der Weltwirtschaftskrise" 
 tblra_recovery_from_the_great_depression1_desc:0 "Während sich die wirtschaftliche Lage verbessert, leidet die Wirtschaft immer noch unter den Folgen der großen Depression"
 tblra_recovery_from_the_great_depression2:0 "Erholung von der Weltwirtschaftskrise" 
 tblra_recovery_from_the_great_depression2_desc:0 "Während sich die wirtschaftliche Lage verbessert, leidet die Wirtschaft immer noch unter den Folgen der großen Depression"
 tblra_recovery_from_the_great_depression3:0 "Erholung von der Weltwirtschaftskrise" 
 tblra_recovery_from_the_great_depression3_desc:0 "Während sich die wirtschaftliche Lage verbessert, leidet die Wirtschaft immer noch unter den Folgen der großen Depression"
 tblra_recovery_from_the_great_depression4:0 "Erholung von der Weltwirtschaftskrise" 
 tblra_recovery_from_the_great_depression4_desc:0 "Während sich die wirtschaftliche Lage verbessert, leidet die Wirtschaft immer noch unter den Folgen der großen Depression"
 tblra_recovery_from_the_great_depression5:0 "Erholung von der Weltwirtschaftskrise" 
 tblra_recovery_from_the_great_depression5_desc:0 "Während sich die wirtschaftliche Lage verbessert, leidet die Wirtschaft immer noch unter den Folgen der großen Depression" 
 tblra_digging_of_the_albert_canal:0 "Der Bau des Albertkanals"
 tblra_digging_of_the_albert_canal_desc:0 "Der Albertkanal wurde nach dem Ersten Weltkrieg geplant und 1930 begonnen. Es handelt sich um ein kostspieliges, aber wichtiges Projekt, das die Industriegebiete Walloniens mit dem Hafen von Antwerpen verbinden soll."
 tblra_van_den_bergen_plan:0 "Van den Bergens Wehrpflichtplan"
 tblra_military_linguistical_weaknesses:0 "Militärische sprachliche Schwächen"
 tblra_military_linguistical_weaknesses_desc:0 "Auch nach der sprachlichen Aufteilung der Armee waren noch immer Schwächen erkennbar: Es herrschte ein chronischer Mangel an flämisch sprechenden Offizieren (so sehr, dass einige davon überzeugt werden mussten, ihre bevorzugte Sprache zu ändern) und die lokale Verwurzelung jeder Division führte dazu, dass sie manchmal Schwierigkeiten hatten, außerhalb ihrer üblichen Ausbildungs- und Einsatzgebiete zu operieren."
 tblra_linguistic_question_in_military:0 "Sprachliche Militärfrage"
 tblra_linguistic_question_in_military_desc:0 "Seit Jahren versucht die flämische Bewegung, die Armee aus sprachlichen Gründen zu spalten. Sie argumentiert, dass die flämischen Soldaten die auf Französisch erteilten Befehle nicht verstehen könnten."
 tblra_divide_the_military:0 "Die Armee sprachlich neu organisieren"
 tblra_divide_the_military_desc:0 "Nachdem wir nun einen Plan zur Neuorganisation der Struktur unserer Streitkräfte auf sprachlicher Basis beschlossen haben, müssen einige Einheiten in andere Kasernen umziehen, während viele Soldaten von neuen Offizieren kommandiert werden."
 tblra_army_linguistic_divide:0 "Sprachabteilung der Armee "
 tblra_army_linguistic_divide_desc:0 "Seit Jahren will die flämische Bewegung die Armee sprachlich aufspalten. Sie argumentiert, die flämischen Soldaten könnten die auf Französisch erteilten Befehle nicht verstehen. Nun ist es an der Zeit, die Armeestruktur zu ändern und nur noch französisch- und flämischsprachige Divisionen zu haben." 
 tblra_depillarize_the_belgians:0 "Entsäulen Sie die belgische Gesellschaft"
 tblra_depillarize_the_belgians_desc:0 "Die Starrheit unserer gegenwärtigen Säulengesellschaft ist ein Hindernis für die Revolution und die damit verbundene bessere Zukunft." 
 tblra_choose_Rex:0 "Wählen Sie Rex"
 tblra_choose_Rex_desc:0 "Rex ist die stärkste faschistische Partei in diesem Land. Rex will das Vaterland stark und vereint halten. Rex wird zeigen, wie glorreich Belgien wirklich ist. Rex wird sich durchsetzen!"
 tblra_choose_Verdinaso_desc:0 "Die VNV will das Land nur spalten. Sie will nicht erkennen, dass die Wallonen nicht unsere Feinde, sondern unsere ethnischen Brüder sind. Im Gegenteil: Wenn wir unser Volk hinter der Vereinigung der Niederlande vereinen können, könnten wir Dietsland gründen, die Union aller Menschen der Niederlande. Diese neue Nation wird unsere ewige Einheit nach 500 Jahren der Trennung feiern."
 tblra_choose_Verdinaso:0 "Wählen Sie Verdinaso"
 tblra_go_left:0 "PCB-PKB-Unterstützung"
 tblra_go_left_desc:0 "Unser Land wurde viel zu lange von den Bankern und Bonzen dominiert. Jetzt ist es an der Zeit, dass die Kommunistische Partei Belgiens glänzt. Wir müssen die proletarische Revolution verbreiten!"
 tblra_go_right:0 "Unterstütze Rex und Verdinaso"
 tblra_go_right_desc:0 "Unser Land wird schon viel zu lange von einer Klasse selbstsüchtiger, korrupter Politiker und ihren Bankster-Freunden regiert. Dieses Verhalten beschleunigt den moralischen Verfall unserer Gesellschaft und ermöglicht es den berüchtigten roten Hunden, unser Volk von der einen, heiligen, katholischen und apostolischen Kirche abzuwenden. Es ist Zeit für unser Vaterland, aufzuwachen!"
 tblra_fascist_legions:0 "Belgische antibolschewistische Legionen"
 tblra_fascist_legions_desc:0 "Wir müssen unsere Anhänger mobilisieren, um die rote Bedrohung in allen gefährdeten Landkreisen zu bekämpfen."
 tblra_belgian_militarism:0 "Belgischer Militarismus"
 tblra_belgian_militarism_desc:0 "Belgien schreibt seit rund zweitausend Jahren Geschichte! Wir haben den großen Cäsar überrascht, die Franzosen in der Schlacht der Goldenen Sporen besiegt und die Deutschen im Ersten Weltkrieg besiegt. Unser Erbe ist heroisch, und unsere Armee muss es widerspiegeln."
 tblra_claim_the_benelux:0 "Beanspruchen Sie die Altburgundischen Niederlande"
 tblra_claim_the_benelux_desc:0 "Die Niederlande wurden einst vereint ... nein, nicht durch König Wilhelm von Oranien, sondern durch die Grafen von Flandern, die Herzöge von Brabant und Burgund, die von Brügge, Brüssel und Dijon aus regierten. Die Menschen der Niederlande sind ein edles Volk und teilen ein gemeinsames Erbe. Deshalb müssen sie unter einer Herrschaft vereint werden, nämlich der unseren."
 tblra_burgundian_circuit:0 "Den Burgundischen Kreis wiederherstellen"
 tblra_burgundian_circuit_desc:0 "Kaiserliches Volk, wacht auf! Mit diesen Worten rief Léon Degrelle alle Belgier dazu auf, die Ambitionen der Herzöge von Burgund zu erneuern und einen Staat zwischen Frankreich und Deutschland zu gründen, inspiriert vom Burgundischen Kreis, den Kaiser Karl V. ins Leben rief. Dennoch begannen einige Skeptiker, ihn „Modest I., König von Burgund“ zu nennen (Anmerkung: Diese Skeptiker waren wie er Soldaten der Wallonischen Legion an der Ostfront)."
 tblra_proclaim_thiois_empire:0 "Proklamieren Sie das Thiois-Reich"
 tblra_proclaim_thiois_empire_desc:0 "Nachdem wir unsere Hauptziele erreicht haben, können wir endlich unseren alten Namen Belgien abschaffen und ihn durch einen neuen ersetzen, der die Macht unserer imperialen Union deutlicher zum Ausdruck bringt. Es lebe das Thiois-Reich!"
 tblra_unite_dietsland:0 "Verenig Dietsland"
 tblra_unite_dietsland_desc:0 "Eine Vereinigung von Dietsland ist nun möglich. Zunächst müssen wir die Grenzen des Vereinigten Königreichs der Niederlande wiedervereinigen. Dann könnten wir Frankreich angreifen, um die berüchtigten Kriegsverträge von Sébastien von Vauban und Ludwig XIV. rückgängig zu machen und die 17 Provinzen wieder zu vereinen. Es wird funktionieren, denn wie das Motto sagt: „Stärke schafft Einheit.“"
 tblra_proclaim_dietsland:0 "Proklamiere das Diätland"
 tblra_proclaim_dietsland_desc:0 "Eine Vereinigung von Dietsland ist nun möglich. Zunächst müssen wir die Grenzen des Vereinigten Königreichs der Niederlande wiedervereinigen. Dann könnten wir Frankreich angreifen, um die berüchtigten Kriegsverträge von Sébastien von Vauban und Ludwig XIV. rückgängig zu machen und die 17 Provinzen wieder zu vereinen. Es wird funktionieren, denn wie das Motto sagt: „Stärke schafft Einheit.“"
 tblra_proclaim_dietsche_rijk:0 "Proklamieren Sie das Dietsche Rijk"
 tblra_proclaim_dietsche_rijk_desc:0 "Nachdem wir unsere Hauptziele erreicht haben, können wir uns endlich von unserem alten Namen Belgien trennen und ihn durch einen neuen ersetzen, der die Macht unserer imperialen Union deutlicher zum Ausdruck bringt. Es lebe das Dietsche Reich!"
 tblra_fascist_youth_organizations:0 "Gründung faschistischer Jugendorganisationen"
 tblra_fascist_youth_organizations_desc:0 "Im Norden und im Süden sprechen wir zwar unterschiedliche Sprachen, doch uns vereint unsere gemeinsame germanische Herkunft. Diese alte Wahrheit muss der Jugend vermittelt werden, denn sie ist die Zukunft unseres Landes, unserer Rasse und die Grundlage der neuen europäischen Ordnung."
 tblra_colonial_claims:0 "Beanspruchen Sie das Große Kongobecken"
 tblra_colonial_claims_desc:0 "Auf der Berliner Konferenz wurde die wahre Ausdehnung des Kongo von den heuchlerischen „Großmächten“ eingeschränkt. Es ist an der Zeit, diese Entscheidungen zu revidieren und den von Stanley vorgestellten Plan umzusetzen: einen Groß-Kongo, der beide Ozeane verbindet und den Triumph der Zivilisation im Herzen Afrikas sichert."
 tblra_germany_millitary_coop:0 "Militärische Zusammenarbeit mit Deutschland"
 tblra_germany_millitary_coop_desc:0 "Angesichts des zunehmenden nationalen Erwachens in unserem Land und unserer ideologischen Nähe zu Deutschland könnten wir eine militärische Zusammenarbeit mit ihnen aufbauen."
 tblra_belgium_first:0 "Gott beschützt das freie Belgien und seinen König"
 tblra_belgium_first_desc:0 "„Dieu Protège la Libre Belgique et son Roi“ stammt aus „Vers l&#39;Avenir“ (Der Zukunft entgegen), der Rex-Hymne. In ihrem Namen war Rex sehr royalistisch, und Leopold III. selbst war nicht eindeutig gegen eine starke Exekutive. Diese „Unentschlossenheit“ führte zur „Königsfrage“, der Regentschaft des Prinzen Karl und der Abdankung des Königs nach dem Krieg."
 tblra_propaganda_ministry:0 "Einrichtung eines Propagandaministeriums"
 tblra_propaganda_ministry_desc:0 "Bei Propaganda geht es nicht um Indoktrination, sondern um die beste Möglichkeit, die Menschen auf den richtigen Weg zu führen."
 tblra_communist_brigades:0 "Belgische kommunistische Brigaden"
 tblra_communist_brigades_desc:0 "Wir müssen Freiwillige mobilisieren, um die Faschisten zu bekämpfen."
 tblra_support_pcf:0 "Unterstützen Sie die Kommunistische Partei Frankreichs"
 tblra_support_pcf_desc:0 "Die Kommunistische Partei Frankreichs ist ein wichtiger Bestandteil der antifaschistischen Kräfte Europas. Wir müssen sie mit allen uns zur Verfügung stehenden Mitteln unterstützen." 
 tblra_support_pcf2:0 "Unterstützen Sie die französische Kommune"
 tblra_support_pcf2_desc:0 "Die Kommunistische Partei Frankreichs ist ein wichtiger Bestandteil der antifaschistischen Kräfte Europas. Wir müssen sie mit allen uns zur Verfügung stehenden Mitteln unterstützen."
 tblra_communist_army:0 "Politische Reorganisation der Armee"
 tblra_communist_army_desc:0 "Für nationalen Ruhm ist individuelles Leid erforderlich. In einem Land wie Belgien muss der Internationalismus im eigenen Land beginnen, bevor er sich in der Welt ausbreitet."
 tblra_sign_pact_with_soviets:0 "Unterzeichnen Sie einen Pakt mit den Sowjets"
 tblra_sign_pact_with_soviets_desc:0 "Unsere größte Bedrohung geht von Nazi-Deutschland aus. Die Sowjetunion hat angeboten, unsere Panzertechnologie zu verbessern, um mit den deutschen Panzern konkurrieren zu können. Wir sollten diese Chance unbedingt nutzen!"
 tblra_independent_revolution:0 "Unabhängige Revolution"
 tblra_independent_revolution_desc:0 "Diese Revolution ist unsere Revolution! Wir schulden Stalin und seinen Sowjets nichts!" 
 tblra_invite_france:0 "Bündnis mit der französischen Kommune"
 tblra_invite_france_desc:0 "Als eine weitere neue kommunistische Macht in Westeuropa müssen unsere beiden Länder eine Einigung erzielen, um ein unzerbrechliches Militärbündnis zu bilden." 
 tblra_political_commissars:0 "Politische Kommissare"
 tblra_political_commissars_desc:0 "Kommunistische Revolutionen riskieren auf jedem Schritt des Weges zum weltweiten Wohlstand eine Subversion. Um sicherzustellen, dass dieser Fortschritt nicht durch seine Feinde bedroht wird, müssen die Hüter des rechten Weges die Agenten der kapitalistischen Mächte bekämpfen."  
 tblra_technology_sharing:0 "Technologieaustausch"
 tblra_puppet_netherlands:0 "Druck auf die niederländische Regierung ausüben"
 tblra_puppet_netherlands_desc:0 "Die Niederlande müssen vom Kapitalismus befreit werden."
 tblra_communist_propaganda_Benelux:0 "Arbeiter der Niederlande, vereinigt euch!"
 tblra_communist_propaganda_Benelux_desc:0 "Das Tiefland muss vom Kapitalismus befreit werden. Um dies sicherzustellen, muss die Propaganda auch bei unseren Nachbarn verbreitet werden, um die Revolution zu verbreiten."  
 tblra_technology_sharing_desc:0 "Indem wir technologische Fortschritte mit unseren Verbündeten teilen, kann unsere gesamte Fraktion die Forschung und Entwicklung im Kriegsfall effizienter durchführen."
 tblra_technology_sharing_democracy:0 "Technologieaustausch"
 tblra_technology_sharing_democracy_desc:0 "Indem wir technologische Fortschritte mit unseren Verbündeten teilen, kann unsere gesamte Fraktion die Forschung und Entwicklung im Kriegsfall effizienter durchführen."
 tblra_technology_sharing_fascism:0 "Stärke durch Wissen"
 tblra_technology_sharing_fascism_desc:0 "Indem wir technologische Fortschritte mit unseren Verbündeten teilen, kann unsere gesamte Fraktion die Forschung und Entwicklung im Kriegsfall effizienter durchführen." 
 tblra_technology_sharing_communism:0 "Sozialistische Wissenschaftskooperation"
 tblra_technology_sharing_communism_desc:0 "Indem wir technologische Fortschritte mit unseren Verbündeten teilen, kann unsere gesamte Fraktion die Forschung und Entwicklung im Kriegsfall effizienter durchführen."  
 tblra_form_coalition_government:0 "Bilden Sie eine Koalitionsregierung"
 tblra_form_coalition_government_desc:0 "Koalitionsregierungen haben in Belgien Tradition, doch um der Bedrohung durch den Faschismus zu begegnen, müssen alle demokratischen Parteien in eine große Koalition eingebunden werden und kleinliche Meinungsverschiedenheiten müssen beiseite gelegt werden."  
 tblra_centralized_communist_government:0 "Zentralisierte kommunistische Regierung"
 tblra_urban_projects_capital:0 "Steigen Sie ein in die Brüsseler Eisenbahn"
 tblra_urban_projects_capital_desc:0 "Wir können unsere Hauptstadt in eine echte moderne Stadt verwandeln, indem wir Tunnel graben, um die verschiedenen Eisenbahnsysteme zu einem großen, durch die Stadt verlaufenden Netzwerk zu verbinden, selbst wenn dies auf Kosten ihres architektonischen Charmes geht." 
 tblra_fortress_belgium:0 "Bauen Sie den Forts Belt von Lüttich nach"
 tblra_fortress_belgium_desc:0 "Die Forts von Lüttich waren zu Beginn des Ersten Weltkriegs ein Schlüsselelement der belgischen Verteidigung gegen Deutschland. Ein umfassendes Bauprogramm musste so schnell wie möglich beginnen, um die Festungen zu einem zentralen Element zur Abwehr deutscher Angriffe zu machen. Dabei sollte auch die Möglichkeit eines Angriffs mit Segelflugzeugen berücksichtigt werden."
 tblra_reinforce_antwerp_brussels:0 "Ligne KW Linie"
 tblra_reinforce_antwerp_brussels_desc:0 "Brabant liegt im Herzen unseres Landes und beherbergt unsere wichtigsten Städte. Antwerpen war einst eine wichtige Festung und Brüssel ist das Zentrum unserer Nation. Die Befestigung beider Regionen wird sie zu einem Bollwerk gegen jede feindliche Invasion machen. Die Linie, die sich vom Dorf Koningshooikt bis zur Stadt Wavre erstreckt, wird mit Panzergräben, Bunkern und Cointet-Panzersperren ausgestattet." 
 tblra_fortress_french_border:0 "Befestigen Sie die französische Grenze"
 tblra_fortress_french_border_desc:0 "Die Franzosen sind unsere wahren Feinde und wir müssen auf einen Krieg vorbereitet sein."
 tblra_Support_the_congo_railways:0 "Office des Transports Coloniaux"
 tblra_Support_the_congo_railways_desc:0 "Das 1935 gegründete „Office des transports coloniaux“ oder OTRACO („Büro für Kolonialtransporte“) war für das Eisenbahnsystem im belgischen Kongo zuständig."
 tblra_congo_rubber:0 "Erweitern Sie die Kautschukplantagen"
 tblra_congo_rubber_desc:0 "Das tropische Klima des Kongo ist ideal für Kautschukplantagen. Durch den Einsatz neuer Sorten und die Ausweitung der Plantagen ließe sich die Produktion deutlich steigern. Ich bin sicher, die Einheimischen würden uns dabei gerne helfen."
 tblra_congo_rubber2:0 "Verbessern Sie die Produktivität Ihrer Plantagen"
 tblra_congo_rubber2_desc:0 "Das tropische Klima des Kongo ist ideal für Kautschukplantagen. Durch den Einsatz neuer Sorten und die Ausweitung der Plantagen ließe sich die Produktion deutlich steigern. Ich bin sicher, die Einheimischen würden uns dabei gerne unterstützen." 
 tblra_support_copper_mining:0 "Beginn des kongolesischen Kupferbergbaus"
 tblra_support_copper_mining_desc:0 "Die reichen Erze der Kolonie wurden im Laufe der Jahre in verschiedenen Regionen des Kongo entdeckt und warten nur darauf, von der Zivilisation abgebaut zu werden, um unsere Wirtschaft anzukurbeln."
 tblra_support_copper_mining2:0 "Ausbau der kongolesischen Kupferminen"
 tblra_support_copper_mining2_desc:0 "Die reichen Erze der Kolonie wurden im Laufe der Jahre in verschiedenen Regionen des Kongo entdeckt und warten nur darauf, von der Zivilisation abgebaut zu werden, um unsere Wirtschaft anzukurbeln."
 tblra_support_tungsten_mining:0 "Beginn des kongolesischen Wolframabbaus"
 tblra_support_tungsten_mining_desc:0 "Die reichen Erze der Kolonie wurden im Laufe der Jahre in verschiedenen Regionen des Kongo entdeckt und warten nur darauf, von der Zivilisation abgebaut zu werden, um unsere Wirtschaft anzukurbeln."
 tblra_support_tungsten_mining2:0 "Erweiterung der kongolesischen Wolframminen"
 tblra_support_tungsten_mining2_desc:0 "Die reichen Erze der Kolonie wurden im Laufe der Jahre in verschiedenen Regionen des Kongo entdeckt und warten nur darauf, von der Zivilisation abgebaut zu werden, um unsere Wirtschaft anzukurbeln."
 tblra_support_tungsten_mining3:0 "Weiterer Ausbau der Wolframminen"
 tblra_support_tungsten_mining3_desc:0 "Die reichen Erze der Kolonie wurden im Laufe der Jahre in verschiedenen Regionen des Kongo entdeckt und warten nur darauf, von der Zivilisation abgebaut zu werden, um unsere Wirtschaft anzukurbeln."  
 tblra_support_tungsten_mining4:0 "Maximieren Sie die Wolframextraktion"
 tblra_support_tungsten_mining4_desc:0 "Die reichen Erze der Kolonie wurden im Laufe der Jahre in verschiedenen Regionen des Kongo entdeckt und warten nur darauf, von der Zivilisation abgebaut zu werden, um unsere Wirtschaft anzukurbeln." 
 tblra_transform_the_congo:0 "Erweitern Sie die kolonialen Möglichkeiten"
 tblra_transform_the_congo_desc:0 "Renovieren Sie den Hafen von Banana, um unsere logistischen Kapazitäten zu verbessern."
 tblra_transform_the_congo2:0 "Investieren Sie in die koloniale Fertigung"
 tblra_transform_the_congo2_desc:0 "Auch wenn der Kongo hauptsächlich eine Ausbeutungskolonie war, sind die Kolonialbevölkerung und die Menge an Mineralien wichtig genug, um dort vor dem Export mit dem Herstellungsprozess zu beginnen."
 tblra_transform_the_congo3:0 "Steigern Sie die koloniale Produktion"
 tblra_transform_the_congo3_desc:0 "Auch wenn der Kongo hauptsächlich eine Ausbeutungskolonie war, sind die Kolonialbevölkerung und die Menge an Mineralien wichtig genug, um dort vor dem Export mit dem Herstellungsprozess zu beginnen." 
 tblra_urbanize_wallonie:0 "Investieren Sie in den „Sillon Sambre et Meuse“"
 tblra_urbanize_wallonie_desc:0 "Seit Beginn des 19. Jahrhunderts war Wallonien eine der am stärksten industrialisierten Regionen Europas. Die Maas und ihr Nebenfluss Sambre sind wichtige Verkehrsadern, die den Transport industrieller Produkte durch das Land und dann in den Rest Europas ermöglichen."
 tblra_invest_in_FN_Herstal:0 "Ausbau der Militärfabriken in Lüttich"
 tblra_invest_in_FN_Herstal_desc:0 "Die „Fabrique Nationale“, die „Fonderie Royale de Canons“ und die „Manufacture d&#39;Armes de l&#39;État“ in und um Lüttich sind die wertvollsten Elemente unserer Rüstungsproduktion. Wenn wir eine Armee mit ausreichend Waffen für den Kampfeinsatz ausstatten wollen, ist eine Erweiterung dieser Fabriken unabdingbar."
 tblra_invest_in_FRC_Herstal:0 "Erweitern Sie die „Fonderie Nationale de Canons“"
 tblra_invest_in_FRC_Herstal_desc:0 "Die „Fabrique Nationale“ und die „Fonderie Royale de Canons“, beide in Herstal bei Lüttich, sind die wichtigsten Produktionsstätten unserer Waffenproduktion. Um die Anzahl der produzierten Waffen zu erhöhen, ist eine Erweiterung dieser Fabriken unabdingbar." 
 tblra_urban_projects_capital_industry:0 "Entwicklung der Brüsseler Industrie"
 tblra_urban_projects_capital_industry_desc:0 "Durch die neuen Eisenbahnstrecken, die derzeit in und um Brüssel gebaut werden, wird das wirtschaftliche Potenzial der Stadt für Industrie und Dienstleistungssektor noch attraktiver."  
 tblra_Expand_the_port_of_Antwerp:0 "Renovierung des Hafens von Antwerpen"
 tblra_Expand_the_port_of_Antwerp_desc:0 "Als einer der wichtigsten europäischen Häfen ist Antwerpen in einer guten Position, um eine auf den Export ausgerichtete Industrie zu entwickeln."   
 tblra_urban_projects_capital2:0 "Antwerpen Industriegebiet"
 tblra_urban_projects_capital2_desc:0 "Als einer der wichtigsten europäischen Häfen ist Antwerpen in einer guten Position, um eine auf den Export ausgerichtete Industrie zu entwickeln."  
 tblra_revise_air_doctrine:0 "Überarbeitung der Luftdoktrin"
 tblra_revise_air_doctrine_desc:0 "Mitte der 1930er Jahre schien die Notwendigkeit einer neuen Luftdoktrin dringend. Die belgische Luftwaffe studierte französische Lufttaktiken, kaufte jedoch nach dem Scheitern belgischer Prototypen hauptsächlich englische Lizenzen." 
 tblra_van_overstraeten_aa_guns:0 "Fokus auf Luftabwehrartillerie"
 tblra_van_overstraeten_aa_guns_desc:0 "Raoul Van Overstraeten, einer der einflussreichsten belgischen Militärtheoretiker, war davon überzeugt, dass Belgien zu klein sei, um über eine militärische Luftfahrt zu verfügen. Er vertrat die Ansicht, dass Belgiens Verbündete den Luftraum des Landes verteidigen würden, während sich die belgische Armee auf Flugabwehrgeschütze konzentrieren sollte." 
 tblra_aa_guns_expertise:0 "Flugabwehr-Expertise"
 tblra_aa_guns_expertise_desc:0 "Um unsere Sicherheit vor der Bedrohung durch Luftangriffe zu gewährleisten, müssen wir mehr Batterien produzieren und unsere wichtigste Infrastruktur mit Luftabwehrstrukturen schützen."  
 tblra_Renard_fighters:0 "Renards Leichtflugzeuge"
 tblra_Renard_fighters_desc:0 "Alfred Renard, ein mutiger Pilot während des Ersten Weltkriegs, wurde zu einem der bedeutendsten belgischen Flugzeughersteller. Seine Militärflugzeuge waren aufgrund von Prototypenabstürzen in der Vergangenheit Fehlschläge, doch mit einigen Verbesserungen konnten sie zu den besten belgischen Kampfflugzeugen werden." 
 tblra_SABCAs_bombers:0 "Lizenzierte Bomber der SABCA"
 tblra_SABCAs_bombers_desc:0 "Aufgrund der begrenzten italienischen Kapazitäten schlossen sie Verträge mit der SABCA, der „Société Anonyme Belge de Construction Aéronautique“ (belgische Gesellschaft für anonymen Flugzeugbau), um italienische Flugzeuge in Lizenz zu produzieren. Darüber hinaus begann die SABCA auch mit der Produktion schwerer Flugzeuge für die Franzosen und Belgier (Teile der Breguet 693), doch die Invasion stoppte die Produktion."
 tblra_Foreign_aviation_studies:0 "Studieren Sie ausländische Taktiken"
 tblra_Foreign_aviation_studies_desc:0 "Durch Studien und den Erwerb von Lizenzen können wir Mängel an unseren Flugzeugen erkennen und ihre Qualität verbessern."
 tblra_experimental_weaponry:0 "Unterstützen Sie FN-Prototypen"
 tblra_experimental_weaponry_desc:0 "Geniale Erfindungen und radikale technologische Durchbrüche haben es uns ermöglicht, exotischere und effektivere Militärtechnologien zu entwickeln. Die FN ist seit Jahrzehnten ein Pionier im Bereich der Infanteriewaffen. Diese Tradition muss fortgeführt werden, um unseren Sieg zu sichern." 
 tblra_establish_radio_stations:0 "Radiosender verbessern"
 tblra_establish_radio_stations_desc:0 "Wie die Briten gezeigt haben, sind Funkortungs- und Entfernungsmessstationen für die Landesverteidigung sehr nützlich. Lassen Sie uns im Inland unsere eigenen Funkortungsanlagen bauen, damit wir unser Land effektiver verteidigen können."
 tblra_support_innovation:0 "Innovationen unterstützen"
 tblra_support_innovation_desc:0 "Schlachten werden mit Hilfe technologischer Vorteile gewonnen. Bessere Technologien bedeuten: Wir gewinnen mehr Schlachten, und bessere Technologien werden durch überlegene Forschungseinrichtungen ermöglicht."
 tblra_clear_lands_congo:0 "Räumen Sie neue Länder frei"
 tblra_clear_lands_congo_desc:0 "Renovieren Sie den Hafen von Banana, um unsere logistischen Kapazitäten zu verbessern."
 tblra_invest_in_nuclear_program:0 "Nukleare Forschungen"
 tblra_invest_in_nuclear_program_desc:0 "Aufbauend auf Albert Einsteins Relativitätstheorien und dem radioaktiven Zerfall von Uran-238 haben wir herausgefunden, dass die Atomspaltung enorme Energiemengen freisetzt. Wir müssen nicht nur die Möglichkeit der Kettenreaktionstheorie untersuchen, sondern dafür auch große Mengen Uranerz abbauen. Hoffentlich können unsere Minen in Kolwezi und Shinkolobwe die benötigten Mengen produzieren."
 tblra_further_nuclear_research:0 "Uran abbauen und exportieren"
 tblra_further_nuclear_research_desc:0 "Mit unserem neuen Verständnis des Atoms und der zunehmenden Produktion von Uranerz können wir nicht nur dessen Potenzial erforschen, sondern auch einen Teil des Erzes an unsere wichtigsten Verbündeten exportieren, um den endgültigen Sieg unserer Koalition über unsere Feinde sicherzustellen."
 tblra_start_rocket_program:0 "Raketenprogramm starten"
 tblra_start_rocket_program_desc:0 "Die Raketentechnik ist eine neue Wissenschaft mit vielen Möglichkeiten. Die Erforschung dieser Möglichkeiten für militärische Zwecke könnte Früchte tragen. Um den Erfolg dieses Vorhabens zu gewährleisten, sollten wir versuchen, den kompetentesten Experten auf diesem Gebiet zu gewinnen. Karel Jan Bossart arbeitet derzeit in den USA. Hoffentlich wird er bereit sein, in sein Land zurückzukehren und die Leitung dieses faszinierenden Projekts zu übernehmen."
 tblra_stay_neutral:0 "Politique des Mains Libres"
 tblra_stay_neutral_desc:0 "Wir durften Hitler nicht provozieren. Auch wenn es sicherer wäre, sich auf die Seite der Alliierten zu stellen, würde dies nur die Chancen eines neuen Schlieffen-Plans erhöhen. Diese neutrale Politik wurde „Mains Libres“/„Vrij Handen“ (wörtlich: Freie Hände) genannt."
 tblra_deterrence:0 "Abschreckung"
 tblra_deterrence_desc:0 "Die wachsende Bedrohung durch den europäischen Faschismus macht deutlich, dass Neutralitätserklärungen nicht ausreichen. Wir müssen uns bewaffnen, um unsere Unabhängigkeit zu verteidigen."
 tblra_democratic_influence:0 "Politische Union gegen den Faschismus"
 tblra_democratic_influence_desc:0 "Unser Land ist demokratisch und wir sollten uns nicht von neuen Ideen des Nationalismus oder Kommunismus beeinflussen lassen."
 tblra_begin_rearmement:0 "Folgen Sie dem Bericht der Verteidigungskommission"
 tblra_begin_rearmement_desc:0 "Um den notwendigen Aufwand zur Anpassung unserer Streitkräfte an die zunehmenden politischen Spannungen zu erwägen, hat die Verteidigungskommission einen ausführlichen Bericht veröffentlicht. Dieser Bericht soll die Grundlage für einen ehrgeizigen Wiederaufrüstungsplan bilden."
 tblra_accept_van_den_den_bergen_plan:0 "Akzeptieren Sie Van den Bergens Plan"
 tblra_accept_van_den_den_bergen_plan_desc:0 "General Van den Bergen schlug uns einen ehrgeizigen Plan vor, um den Pool an Wehrpflichtigen, die vollständig mobilisiert werden können, zu vergrößern. Dieser Plan würde zwar die Armee schnell kampfbereit machen, doch die Mobilisierung so vieler Menschen würde unsere Wirtschaft, die nach dem Schock der Weltwirtschaftskrise immer noch fragil ist, wahrscheinlich bremsen." 
 tblra_lessons_from_wwi:0 "Lehren aus dem Ersten Weltkrieg"
 tblra_lessons_from_wwi_desc:0 "Indem wir uns ansehen, was im letzten großen Konflikt funktioniert hat und was nicht, sollten wir in der Lage sein, unsere Armeedoktrinen zu modernisieren."
 tblra_light_tank_destroyers:0 "Programm für leichte Panzerzerstörer"
 tblra_light_tank_destroyers_desc:0 "Wir verfügen über eine der besten Panzerabwehrkanonen der Welt, die FRC 47 mm. Sie kann jedoch von schnellen Fahrzeugen flankiert werden. Um dieser Bedrohung entgegenzuwirken, müssen wir einen Weg finden, unsere Panzerabwehrkanonen schnell zu bewegen. Vielleicht könnten wir die Panzerabwehrkanonen einfach auf leicht gepanzerte Kettenfahrgestelle setzen, um leichte und mobile Panzerabwehrkanonen zu schaffen. Sie könnten die ungünstige Lage der Ardennen nutzen, um Hinterhaltstaktiken gegen eindringende Panzerkolonnen anzuwenden."
 tblra_motorised_support:0 "Motorisierte Unterstützung"
 tblra_motorised_support_desc:0 "Um ein System zu entwickeln, das eine möglichst schnelle Verlegung unserer Truppen an die Front ermöglicht, müssen wir große Teile der Unterstützungseinheiten unserer Infanteriedivisionen motorisieren."
 tblra_military_research_interest:0 "Erweitern Sie das Büro für Militärforschung"
 tblra_military_research_interest_desc:0 "Während die jüngsten Siege zur Eroberung ausländischer Produktionskapazitäten und militärischer Ausrüstung geführt haben, müssen wir das Büro für Militärforschung, die Abteilung des Verteidigungsministeriums, die sich mit militärischer Innovation befasst, ausbauen, um sicherzustellen, dass alle unsere Truppen mit der geeignetsten Ausrüstung ausgestattet sind."
 tblra_doctrines_of_the_present:0 "Lehren der Gegenwart"
 tblra_doctrines_of_the_present_desc:0 "Ein guter Anfang ist es, sich anzuschauen, was in der Vergangenheit funktioniert hat und was nicht. Wir müssen uns jedoch auch die moderneren Kriege ansehen und uns von ihnen ein Beispiel nehmen."
 tblra_mechanized_infantry_investments:0 "Investitionen in mechanisierte Infanterie"
 tblra_mechanized_infantry_investments_desc:0 "Die Mechanisierung unserer Infanterie ist ein wichtiger nächster Schritt in der neuen Welt der mobilen Kriegsführung."
 tblra_equipement_modernization:0 "Modernisierung der Ausrüstung"
 tblra_equipement_modernization_desc:0 "Die jüngsten Investitionen in unsere Kriegsanstrengungen haben dazu geführt, dass die Menschen mit Stolz auf unsere Militärgeschichte blicken und junge, wehrhafte Männer in Scharen in die Freiwilligenzentren strömen."
 tblra_prototype_weapons:0 "FRCs Artillerie-Prototypen"
 tblra_prototype_weapons_desc:0 "Um eine ausreichende Feuerkraft zu gewährleisten, müssen bessere Artilleriekonstruktionen entwickelt werden. Das FRC wird als einziger belgischer Waffenhersteller logischerweise an der Spitze dieses Programms stehen." 
 tblra_modernize_tanks:0 "Panzer modernisieren"
 tblra_modernize_tanks_desc:0 "Unsere Panzer sind veraltet, wir sollten neue Modelle entwickeln, um den militärischen Entwicklungen unserer Zeit gewachsen zu sein."
 tblra_continue_the_tank_destroyer_program:0 "Fortsetzung des Panzerzerstörerprogramms"
 tblra_continue_the_tank_destroyer_program_desc:0 "Wir müssen unser bisheriges Programm fortsetzen, um die feindlichen Panzer jagen und ihren Vormarsch wirksam stoppen zu können."
 tblra_daring_paratroopers:0 "Wagemutige Fallschirmjäger"
 tblra_specialized_divisions:0 "Spezialisierte Abteilungen"
 tblra_specialized_divisions_desc:0 "Die jüngsten militärischen Entwicklungen haben gezeigt, dass spezialisierte Infanterie für bestimmte Geländearten erforderlich ist."
 tblra_daring_paratroopers_desc:0 "Die jüngsten militärischen Entwicklungen haben den Bedarf an spezialisierter Infanterie gezeigt. Angesichts der zunehmenden Bedeutung der Luftwaffe im modernen militärischen Denken könnte es für Belgien an der Zeit sein, über ein eigenes Fallschirmjägerkorps zu verfügen. Regnete es in Belgien früher Seile und Hellebarden, wird es heute Soldaten regnen!" 
 tblra_aerial_support:0 "Luftgestützte Bodenunterstützung"
 tblra_aerial_support_desc:0 "Die Erforschung neuer Flugzeuge, die unsere Truppen unterstützen können, wird unseren Truppen im Kampf einen Vorteil verschaffen."
 tblra_rule_the_sea_through_the_sky:0 "Herrsche durch den Himmel über das Meer"
 tblra_rule_the_sea_through_the_sky_desc:0 "Um die See zu beherrschen, ist die Luftmacht ein entscheidendes Element. Auch wenn andere die Überlegenheit von Schlachtschiffen vertreten, haben sich in den letzten Jahren mehrere Theoretiker für eine starke Luftmacht ausgesprochen, um feindliche Schiffe zu versenken."
 tblra_further_investments_fokker_company:0 "Erhöhte Investitionen in Fokker"
 tblra_further_investments_fokker_company_desc:0 "Weitere Investitionen in die Bemühungen von Anthony Fokker werden unsere Fähigkeit, Krieg am Himmel zu führen, erheblich verbessern."
 tblra_interest_in_rocket_technology:0 "Interesse an Raketen"
 tblra_interest_in_rocket_technology_desc:0 "Die jüngsten Investitionen in unsere Luftwaffe haben in unserem Land eine Art Raketen-„Wahn“ ausgelöst. Das sollten wir ausnutzen."
 tblra_recreate_the_navy:0 "Bauen Sie die belgische Marine nach"
 tblra_recreate_the_navy_desc:0 "Die belgische Marine ist nicht mehr das, was sie einmal war ... und das ist logisch, wenn man bedenkt, dass sie 1927 aufgelöst wurde! Während einige Werften aufgefordert werden, die ersten belgischen Militärschiffe seit Jahrzehnten zu bauen, werden umgebaute Fischereifahrzeuge, die mit einigen Kanonen unterschiedlichen Kalibers ausgestattet sind, so schnell wie möglich eingesetzt, um Patrouillen durchzuführen oder Minen zu legen."
 tblra_submarine_operations:0 "U-Boot-Operationen"
 tblra_submarine_operations_desc:0 "Wir müssen unsere Marinebemühungen auf eine Streitmacht konzentrieren, die unsere Feinde aushungern kann, indem sie ihre Transportkonvois zerstört."
 tblra_reinvigorate_naval_prowess_of_old:0 "Entwickeln Sie die Marine"
 tblra_reinvigorate_naval_prowess_of_old_desc:0 "Unserer Marine mangelt es sehr, wir müssen sie stark machen und sie zu einer Macht machen, mit der man rechnen muss."
 tblra_submarine_improvements:0 "Eine unsichtbare Marine"
 tblra_submarine_improvements_desc:0 "Um unsere neuen Strategien erfolgreich umsetzen zu können, müssen wir sicherstellen, dass wir über die modernsten U-Boote der Welt verfügen."
 tblra_expand_the_navy:0 "Erweitern Sie die Marine"
 tblra_expand_the_navy_desc:0 "Schlachtschiffe und Flugzeugträger sind der Weg, unser weit verstreutes Reich vor äußeren Bedrohungen zu verteidigen."
 tblra_cruisers_and_destroyers:0 "Fokus auf kleine Schiffe"
 tblra_cruisers_and_destroyers_desc:0 "Große Schiffe sind eine Verschwendung wertvoller Ressourcen. Warum sollten wir sie bauen, wenn wir unsere Seewege mit kleineren und schneller produzierenden Schiffen besser verteidigen können?"
 tblra_dutch_marines:0 "Begian Marines"
 tblra_dutch_marines_desc:0 "Um Inseln einzunehmen, benötigen wir spezielle Marinedivisionen, die bei einer Seeinvasion die größtmögliche Effektivität erzielen."
 tblra_interest_in_carriers:0 "Aeronaval Ambition"
 tblra_interest_in_carriers_desc:0 "Es ist Zeit, die belgische Marine in die Zukunft zu führen! Luftunterstützung ist für moderne Marineoperationen unerlässlich. Die neue Bedrohung durch globale Konflikte erfordert Machtdemonstration auf der ganzen Welt ... und Belgien muss bereit sein, seinen Teil dazu beizutragen." 
 tblra_join_britain_alliance:0 "Schließen Sie sich den Verbündeten an"
 tblra_join_britain_alliance_desc:0 "In Europa gibt es zwei Fronten: diejenigen, die die Freiheit schützen wollen, und diejenigen, die sie zerstören wollen. Es ist Zeit, auf Großbritannien zuzugehen und die Neutralität aufzugeben. Für die Alliierten!"
 tblra_benelux_faction:0 "Aus den Benelux-Ländern"
 tblra_benelux_faction_desc:0 "Anstatt neutral zu bleiben oder uns mit Frankreich und Großbritannien zu verbünden – ein Weg, der uns unweigerlich in einen Krieg gegen Deutschland führen würde – sollten wir mit unseren nächsten Nachbarn kooperieren. Deshalb muss nach der Einführung der Benelux-Zollunion ein gemeinsamer Verteidigungsplan entwickelt werden, um die Unabhängigkeit unserer drei Löwen gegenüber Adler und Hahn zu gewährleisten."
 tblra_invite_bel_lux:0 "Laden Sie die Niederlande und Luxemburg ein"
 tblra_invite_bel_lux_desc:0 "Wir müssen Ne und Lux hinzufügen, um wirklich die Benelux-Länder zu bilden."
 tblra_communist_youth:0 "Zweisprachige revolutionäre Jugendbewegung"
 tblra_communist_youth_desc:0 "Internationalität beginnt manchmal im eigenen Land. Um sicherzustellen, dass sich alle zukünftigen belgischen Arbeitnehmer verstehen, müssen wir Zweisprachigkeit zur Pflicht machen, auch wenn das einen Teil der französischsprachigen Bevölkerung schockieren mag."
 tblra_armed_neutrality:0 "Bewaffnete Neutralität" 
 tblra_armed_neutrality_desc:0 "Um unsere Neutralität in diesen feindseligen Zeiten zu wahren, müssen wir zeigen, dass wir nicht kampflos untergehen werden."
 tblra_British_ship_designs:0 "Britische Schiffsentwürfe"
 tblra_British_ship_designs_desc:0 "Die Briten haben uns einige Marinepläne gegeben, damit wir unsere Schiffsproduktion steigern und unser Seegebiet effizienter schützen können."
 tblra_trick_german_scum:0 "Zeigen Sie unsere Neutralität"
 tblra_trick_german_scum_desc:0 "Durch den Bau einiger Küstenfestungen werden wir den Deutschen zeigen, dass wir uns gegen jede Bedrohung von außen verteidigen wollen, nicht nur gegen ihre eigene."
 tblra_pillarized_society:0 "Säulengesellschaft"
 tblra_pillarized_society_desc:0 "Die Säulenbildung ist einer der wichtigsten politischen Faktoren in Belgien. Sie wird als eine Spaltung der Gesellschaft in „politische Blasen“ charakterisiert, da jede wichtige politische Partei über eigene Investmentfonds, Syndikate und andere Organisationen verfügt. Dieses System führt dazu, dass die Wählerstimmen von Wahl zu Wahl gefestigt werden und die Bildung identischer politischer Koalitionen gefördert wird."
 tblra_union_agreements:0 "Gewerkschaftsvereinbarungen"
 tblra_union_agreements_desc:0 "Die jüngsten Gespräche der Union führten zu einem zufriedenstellenden Ergebnis"
 tblra_reserve_mobilization:0 "Reservemobilisierung"
 tblra_reserve_mobilization_desc:0 "Gestärkt durch die Geschichten unseres heldenhaften Widerstands gegen die Deutschen im Ersten Weltkrieg können wir eine neue Generation in der Armee vereinen."
 tblra_communist_police:0 "Kommunistische Polizei"
 tblra_communist_police_desc:0 "Diese speziellen Polizeieinheiten gehen gegen den Widerstand unserer neu gewonnenen Bürger vor und machen unsere Truppen kampfbereiter – für das Vaterland!"
 tblra_aerial_interest:0 "Luftinteresse"
 tblra_aerial_interest_desc:0 "Mit unserem neuen Fallschirmjägerkorps und den erneuten Investitionen in die Firma Fokkers haben wir ein öffentliches Interesse an der Entwicklung der Luftwaffe geweckt."
 tblra_armed_neutrality_idea:0 "Bewaffnete Neutralität"
 tblra_coalition_vs_fascism:0 "Union gegen Faschismus"
 tblra_why_we_fight:0 "Verteidigung der Freiheit"
 tblra_why_we_fight_desc:0 "Für den Anfang, für die Freiheit und für das Recht – Für den König, die Liebe, die Freiheit!" 
 tblra_launch_V_campaign:0 "Starten Sie die V-Kampagne"
 tblra_launch_V_campaign_desc:0 "Während wir im Exil sind, müssen wir die Belgier weiterhin informieren und sie zum Widerstand gegen die ausländische Besatzung aufrufen. Um ein gemeinsames Symbol zu schaffen, kam Robert de Laveleye auf die Idee, den Buchstaben V zu verwenden, da dieser der Anfangsbuchstabe sowohl des französischen Wortes Victoire (Sieg) als auch des Wortes Vrijheid (Freiheit) ist." 
 tblra_armed_neutrality_idea_desc:0 "Obwohl unser Land seine Neutralität erklärt hat, ist eine stehende Armee von größter Bedeutung für den Schutz dieser Neutralität."
 tblra_British_ship_designs_idea:0 "Britische Schiffsentwürfe"
 tblra_British_ship_designs_idea_desc:0 "Die Briten haben uns einige ihrer Blaupausen gegeben, damit wir Zerstörer effektiver produzieren können"
 tblra_Antwerp_Oil_Industry:0 "Antwerpener Raffinage Mogelijkheden"
 tblra_Antwerp_Oil_Industry_desc:0 "Antwerpen ist bereits ein wichtiger Hafen für die Chemieindustrie. Angesichts der täglich wachsenden Bedrohung für den internationalen Handel sollten wir einen Teil dieser Anlagen umfunktionieren, um unsere geliebte Kondrusenkohle in Öl umzuwandeln."
 tblra_form_air_guard_of_the_territory:0 "Bilden Sie die „Territoriale Flugabwehrgarde“"
 tblra_form_air_guard_of_the_territory_desc:0 "Die Territoriale Anti-Air Guard (Garde Territoriale Antiaérienne, Territoriale Wacht voor Luchtafweer) wurde 1937 von Verteidigungsminister Denis gegründet, um strategische Gebiete vor der Bedrohung durch Luftangriffe zu schützen. Sie war von der Armee unabhängig und verfügte über ein Budget von einer Milliarde Franken. Da die FRC Probleme mit der Produktion von Flugabwehrgeschützen hatte, wurde sie mit 40-mm-Bofors-, 75- und 94-mm-Vickers-Flugabwehrgeschützen ausgerüstet."
 tblra_belgian_navy_in_exile:0 "Gründung der belgischen Marine im Exil"
 tblra_belgian_navy_in_exile_desc:0 "Belgien mag gefallen sein, aber der Krieg ist noch nicht verloren. Wir müssen eine neue Marine aufbauen, um den Kampf fortzusetzen und die Befreiung des Landes vorzubereiten."
 tblra_air_force_congo:0 "Die Luftflügel der Force Publique"
 tblra_air_force_congo_desc:0 "Belgien mag zwar unter ausländischer Besatzung stehen, doch der Krieg geht weiter. Wie uns die Schlacht um Belgien gezeigt hat, ist die Luftwaffe in diesem Krieg von entscheidender Bedeutung, und wir werden die zukünftigen Entwicklungen nicht verpassen."
 tblra_fighter_license:0 "Erwerben Sie eine Kampflizenz"
 tblra_fighter_license_desc:0 "Da unsere Kampfflugzeugentwürfe nicht zuverlässig genug erscheinen, um mit anderen Flugzeugen konkurrieren zu können, müssen wir Kontakt mit den Großmächten aufnehmen, um herauszufinden, wer an einem Lizenzabkommen interessiert wäre, das den Bau eines modernen Kampfflugzeugs für die belgische Armee ermöglicht."
 tblra_SABCAs_bombers:0 "Sabcas lizenzierte Bomber"
 tblra_SABCAs_bombers_desc:0 "In ihrer Werkstatt kann die Sabca robuste und große moderne Flugzeuge bauen. Doch ein Schlüsselelement fehlt: die Konstruktion, insbesondere die militärische Konstruktion. Wenn wir eine der Großmächte davon überzeugen könnten, ihre Konstruktionen zu verwenden, könnten wir eine eigene Bomberflotte aufbauen."
 tblra_SABCAs_CAS:0 "Die Sabca S.47"
 tblra_SABCAs_CAS_desc:0 "Die Sabca S.47 ist ein Aufklärungs-/Luftnahunterstützungsflugzeug, das in Italien vom Flugzeughersteller Caproni unter der strengen Kontrolle des Chefingenieurs von Sabca entwickelt wurde."
 tblra_license_production:0 "Ausländische Designs"
 tblra_license_production_desc:0 "Da unsere eigenen Entwürfe nicht viel Potenzial bieten, müssen wir uns anderweitig umsehen, um an die Pläne moderner Militärflugzeuge zu kommen." 
 tblra_multipurpose_bombers:0 "Mehrzweckbomber"
 tblra_multipurpose_bombers_desc:0 "Da es uns an schweren Militärflugzeugen mangelt (Transporter ausgenommen), wäre die einfachste und wirtschaftlichste Lösung, alle Missionen, die solchen Flugzeugen zugewiesen werden könnten, mit einem einzigen schweren Flugzeugtyp zu erfüllen. Dieses neue Flugzeug sollte in der Lage sein, eine ganze Reihe von Missionen zu erfüllen, von der Aufklärung bis zum Bombenangriff."
 tblra_king_reaction:0 "Notstand ausrufen"
 tblra_king_reaction_desc:0 "Angesichts der Bedrohung durch politischen Radikalismus und der zunehmenden Schwierigkeiten, die Ordnung aufrechtzuerhalten, beschloss der König, das Kriegsrecht zu verhängen. In dieser schicksalshaften Stunde setzten der König und der Verteidigungsminister das Militär ein, um das Land zu stabilisieren. Damit setzten sie die Verfassung faktisch außer Kraft."
 tblra_purge_radical_opposition:0 "Säuberung der radikalen Opposition"
 tblra_purge_radical_oppostion_desc:0 "Um die Kommunisten und Faschisten zu bekämpfen, müssen massive Razzien organisiert werden. Dabei wird die zivile Autorität eingeschränkt und der Premierminister durch einen loyalen Monarchisten ersetzt, der die außergewöhnlichen, aber notwendigen Maßnahmen des Königs, Henri Denis und Auguste Lippens, nicht in Frage stellt."
 tblra_reduce_parlementarism:0 "Parlamentarismus reduzieren"
 tblra_reduce_parlementarism_desc:0 "Während die Macht in den Händen der Exekutive zentralisiert ist, bildet das Parlament die letzte Gegenmacht. Auch wenn eine vollständige Abschaffung dieser Institution auf lange Sicht nicht möglich ist, ist ihre Schwäche im Vergleich zur Situation vor Beginn der politischen Krise offensichtlich. Solange sich Wolken am Horizont abzeichnen, wird der König als wachsamer Wächter Belgien vor äußeren Bedrohungen schützen."
 tblra_restore_constitution:0 "Wiederherstellung der Verfassung"
 tblra_restore_constitution_desc:0 "Nach einer Reihe von Unruhen, die mit der Sintflut vergleichbar waren, ist die Friedenstaube endlich in die Arche des Vaterlandes zurückgekehrt. Während sich die Wolken am Horizont auflösen, ist es vielleicht an der Zeit, beiseite zu treten und die Verfassung wiederherzustellen, den Regenbogen zwischen Regierung und Bürgern. Mit der Wiederherstellung der Rechtsstaatlichkeit wurde die Macht wieder in die Hände einer Zivilregierung gelegt."
 tblra_aa_expertise:0 "Fachwissen zur Herstellung von Flugabwehrwaffen"
 
 tblra_national_union:0 "Politische Union während des Krieges"
 tblra_national_union_desc:0 "Aufgrund des Krieges wurde eine neue Koalitionsregierung gebildet, um die demokratischen Parteien gegen die ausländische Bedrohung zu vereinen."
 tblra_peacetime_national_union:0 "Nationale Unionsregierung" 
 tblra_peacetime_national_union_desc:0 "Unsere Regierung vereint derzeit alle demokratischen Parteien in einer großen Koalition, wodurch politische Streitigkeiten reduziert werden." 
 tblra_congo_uranium:0 "Katanga-Uran"
 tblra_congo_uranium_desc:0 "Das Uraninit/Pechblende der Shinkolobwe-Mine in Katanga ist das reichste Uranerz der Welt. Wir könnten es an unsere Verbündeten exportieren, um ihnen zum Sieg im Krieg zu verhelfen. \n§RDieser Bonus wird entfernt, wenn eine rivalisierende Fraktion die Region Leopoldville im Kongo einnimmt und hält.§"
