 COG_CAS_equipment_2_desc:0 "Die Renard 37 B ist eine Zweisitzer-Variante der R-37, die für Bodenangriffe konzipiert wurde. Da nur ein Prototyp der Jagdversion gebaut wurde, blieb es auf dem Papier und wurde nie gebaut."  
