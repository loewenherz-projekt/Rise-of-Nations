 BEL_cv_nav_bomber_equipment_2_short:0 "R-37 DC AN"  
 BEL_nav_bomber_equipment_2_desc:0 "Die Renard 37 war die erste Überarbeitung des R36-Prototyps. Die Baupläne zeigen drei mögliche Varianten: Bomber, Jäger und Küstenverteidigung. Letztere Version zeigt die R-37 mit einem 200-kg-Torpedo bewaffnet."
 BEL_nav_bomber_equipment_3:0 "Fairey Barracuda"
 BEL_nav_bomber_equipment_3_short:0 "Barrakuda" 
 BEL_heavy_fighter_equipment_1:0 "Potez 630"
 BEL_heavy_fighter_equipment_1_short:0 "Potez 630"
 BEL_heavy_fighter_equipment_3:0 "Renard 42"
 BEL_heavy_fighter_equipment_3_short:0 "R-42"
 BEL_heavy_fighter_equipment_3_desc:0 "Die R-42 ist ein zweimotoriger Langstreckenjäger der R-36 und nachfolgender Modelle (R-38, R-40), dessen Idee später in der amerikanischen F-82 Twin Mustang weiterentwickelt wurde. Kriegsbedingt existierte sie nur als Skizze." 
 BEL_heavy_fighter_equipment_2:0 "Breguet 690"
 BEL_heavy_fighter_equipment_2_short:0 "Bre 690"
 BEL_tac_bomber_equipment_0:0 "LACAB GR.8"
 BEL_tac_bomber_equipment_0_short:0 "PRIMA"
 BEL_tac_bomber_equipment_0_desc:0 "Die GR.8, genannt „Doryphore“ (was wegen ihrer schlechten Flugeigenschaften „Kartoffelkäfer“ bedeutet), wurde als Mehrzweckflugzeug für die belgische Luftwaffe gebaut. Sie sollte als Bomber, Aufklärungsflugzeug und schwerer Jäger dienen. Sie erfüllte die absurden Anforderungen der belgischen Armee aufs Wort ... und war in all diesen Rollen folglich schlecht."   
 BEL_tac_bomber_equipment_1:0 " S.45"
 BEL_tac_bomber_equipment_1_short:0 " S.45" 
 BEL_tac_bomber_equipment_1_desc:0 "Die SABCA S.45 ist eine in Lizenz gebaute Caproni Ca.135, um eine größere Produktion als Italiens begrenzte Kapazitäten zu ermöglichen. Mit dieser Erfahrung im Bomberbau hätten die Belgier problemlos mehr davon für den eigenen Bedarf bauen können, was sie jedoch nie taten." 
