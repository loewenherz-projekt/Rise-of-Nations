 COG_Support_the_congo_railways:0 "Office des Transports Coloniaux"
 COG_Support_the_congo_railways_desc:0 "Das 1935 gegründete „Office des transports coloniaux“ oder OTRACO („Büro für Kolonialtransporte“) war für das Eisenbahnsystem im belgischen Kongo zuständig."
 COG_congo_rubber:0 "Erweitern Sie die Kautschukplantagen"
 COG_congo_rubber_desc:0 "Das tropische Klima des Kongo ist ideal für Kautschukplantagen. Durch den Einsatz neuer Sorten und die Ausweitung der Plantagen ließe sich die Produktion deutlich steigern. Ich bin sicher, die Einheimischen würden uns dabei gerne unterstützen."
 COG_congo_rubber2:0 "Verbessern Sie die Produktivität Ihrer Plantagen"
 COG_congo_rubber2_desc:0 "Das tropische Klima des Kongo ist ideal für Kautschukplantagen. Durch den Einsatz neuer Sorten und die Ausweitung der Plantagen ließe sich die Produktion deutlich steigern. Ich bin sicher, die Einheimischen würden uns dabei gerne unterstützen."
 COG_congo_rubber3:0 "Wilde Gummireben ausnutzen"
 COG_congo_rubber3_desc:0 "Da immer mehr Kautschuk benötigt wird, um den Krieg zu finanzieren, scheinen Plantagen nicht auszureichen. Um die Produktion weiter zu steigern, könnten wir einen Teil der Bevölkerung in den Dschungel schicken, um dort den Latex aus den Kautschukreben zu gewinnen, die unter der Herrschaft Leopolds II. gepflanzt wurden, als es noch keine Plantagen gab. Pflanzen der Gattung Landolphia sind schwieriger zu gewinnen, aber sie liefern den gleichen Latex."
 COG_congo_rubber4:0 "Maximieren Sie die Kautschukgewinnung"
 COG_congo_rubber4_desc:0 "Das tropische Klima des Kongo ist ideal für Kautschukplantagen. Durch den Einsatz neuer Sorten und die Ausweitung der Plantagen ließe sich die Produktion deutlich steigern. Ich bin sicher, die Einheimischen würden uns dabei gerne unterstützen." 
 COG_support_tungsten_mining:0 "Beginn des kongolesischen Wolframabbaus"
 COG_support_tungsten_mining_desc:0 "Die reichen Erze der Kolonie wurden im Laufe der Jahre in verschiedenen Regionen des Kongo entdeckt und warten nur darauf, von der Zivilisation abgebaut zu werden, um unsere Wirtschaft anzukurbeln."
 COG_support_tungsten_mining2:0 "Erweiterung der kongolesischen Wolframminen"
 COG_support_tungsten_mining2_desc:0 "Die reichen Erze der Kolonie wurden im Laufe der Jahre in verschiedenen Regionen des Kongo entdeckt und warten nur darauf, von der Zivilisation abgebaut zu werden, um unsere Wirtschaft anzukurbeln."
 COG_support_tungsten_mining3:0 "Weiterer Ausbau der Wolframminen"
 COG_support_tungsten_mining3_desc:0 "Die reichen Erze der Kolonie wurden im Laufe der Jahre in verschiedenen Regionen des Kongo entdeckt und warten nur darauf, von der Zivilisation abgebaut zu werden, um unsere Wirtschaft anzukurbeln."  
 COG_support_tungsten_mining4:0 "Maximieren Sie die Wolframextraktion"
 COG_support_tungsten_mining4_desc:0 "Die reichen Erze der Kolonie wurden im Laufe der Jahre in verschiedenen Regionen des Kongo entdeckt und warten nur darauf, von der Zivilisation abgebaut zu werden, um unsere Wirtschaft anzukurbeln."
 
 COG_support_copper_mining:0 "Beginn des kongolesischen Kupferbergbaus"
 COG_support_copper_mining_desc:0 "Die reichen Erze der Kolonie wurden im Laufe der Jahre in verschiedenen Regionen des Kongo entdeckt und warten nur darauf, von der Zivilisation abgebaut zu werden, um unsere Wirtschaft anzukurbeln."
 COG_support_copper_mining2:0 "Ausbau der kongolesischen Kupferminen"
 COG_support_copper_mining2_desc:0 "Die reichen Erze der Kolonie wurden im Laufe der Jahre in verschiedenen Regionen des Kongo entdeckt und warten nur darauf, von der Zivilisation abgebaut zu werden, um unsere Wirtschaft anzukurbeln."
 COG_support_copper_mining3:0 "Kupferminen weiter ausbauen"
 COG_support_copper_mining3_desc:0 "Die reichen Erze der Kolonie wurden im Laufe der Jahre in verschiedenen Regionen des Kongo entdeckt und warten nur darauf, von der Zivilisation abgebaut zu werden, um unsere Wirtschaft anzukurbeln."  
 COG_support_copper_mining4:0 "Maximieren Sie die Kupfergewinnung"
 COG_support_copper_mining4_desc:0 "Die reichen Erze der Kolonie wurden im Laufe der Jahre in verschiedenen Regionen des Kongo entdeckt und warten nur darauf, von der Zivilisation abgebaut zu werden, um unsere Wirtschaft anzukurbeln."   
 COG_great_inga_dam:0 "Großer Inga-Damm"
 COG_great_inga_dam_desc:0 "Dieses lang ersehnte Projekt, das bereits 1928 ins Auge gefasst wurde, verband einen großen Staudamm am unteren Kongo mit einer stromhungrigen Aluminiumaufbereitungsanlage. Das Projekt sollte bei voller Auslastung mehr Aluminium produzieren als die Weltproduktion von 1939."
 COG_industrial_effort:0 "Kongo-Industrieplan"
 COG_industrial_effort_desc:0 "In dieser Zeit des Wandels sollte ein Teil unserer lebenswichtigen Bedürfnisse vor Ort hergestellt werden." 
 COG_transform_the_congo:0 "Erweitern Sie die kolonialen Möglichkeiten"
 COG_transform_the_congo_desc:0 "Renovieren Sie die Häfen von Banana und Matadi, um unsere logistischen Kapazitäten zu verbessern."
 COG_transform_the_congo2:0 "Investieren Sie in die koloniale Fertigung"
 COG_transform_the_congo2_desc:0 "Auch wenn der Kongo hauptsächlich eine Ausbeutungskolonie war, sind die Kolonialbevölkerung und die Menge an Mineralien wichtig genug, um dort vor dem Export mit dem Herstellungsprozess zu beginnen."
 COG_transform_the_congo3:0 "Steigern Sie die koloniale Produktion"
 COG_transform_the_congo3_desc:0 "Auch wenn der Kongo hauptsächlich eine Ausbeutungskolonie war, sind die Kolonialbevölkerung und die Menge an Mineralien wichtig genug, um dort vor dem Export mit dem Herstellungsprozess zu beginnen."  
 COG_production_effort:0 "Lokale Militärproduktion"
 COG_production_effort_desc:0 "Lokale Militärproduktion"
 COG_production_effort_2:0 "Die Bedürfnisse unserer Zeit"
 COG_production_effort_2_desc:0 "Der Kongo soll kein vom Krieg zerrissenes Land sein, aber wenn die Situation es erfordert, müssen wir bereit sein, auf jede Bedrohung zu reagieren."
 COG_production_effort_3:0 "Lokale Militärproduktion III"
 COG_production_effort_3_desc:0 "Lokale Militärproduktion III"
 COG_export_to_new_markets:0 "Export in neue Märkte"
 COG_export_to_new_markets_desc:0 "Aufgrund der kriegsbedingten Störungen sind einige Länder nicht mehr für unsere Exportprodukte zugänglich. Gleichzeitig könnten und sollten wir unseren Verbündeten jedoch ein Maximum an Ressourcen zur Verfügung stellen." 
 COG_war_mining_production_directorate:0 "Direktion für Kriegsbergbauproduktion"
 COG_war_mining_production_directorate_desc:0 "Die Kriegsbergbau-Produktionsdirektion wurde 1941 gegründet, um die verschiedenen Bergbauunternehmen zu beaufsichtigen und sicherzustellen, dass die von den Alliierten benötigten Mineralien priorisiert und die Bergbauwerkzeuge voll ausgeschöpft werden." 
 COG_gold_extraction:0 "Intensivierung der Goldgewinnung"
 COG_gold_extraction_desc:0 "„Geld ist die Sehne des Krieges“, sagte Cicero. Zweitausend Jahre später ist dieses Sprichwort so wahr wie eh und je. Der Kongo birgt einen großen Schatz, der von der eifersüchtigen Erde bewacht wird. Heute brauchen wir ihn dringender denn je." 
 COG_diamond_extraction:0 "Diamantengewinnung intensivieren"
 COG_diamond_extraction_desc:0 "Neben der Verwendung in Schmuckstücken finden Diamanten auch in der Industrie vielfältige Anwendungsmöglichkeiten. Da die Rüstungsindustrie einen Boom bei der Nachfrage nach Diamanten auslöste, müssen wir sicherstellen, dass wir genügend des härtesten Minerals überhaupt fördern, um unsere Partner zu beliefern."
 
 
 COG_invest_in_nuclear_program:0 "Unterstützen Sie den Uranabbau in Katanga"
 COG_invest_in_nuclear_program_desc:0 "Aufbauend auf Albert Einsteins Relativitätstheorien und dem radioaktiven Zerfall von Uran-238 haben wir herausgefunden, dass die Atomspaltung enorme Energiemengen freisetzt. Wir müssen nicht nur die Möglichkeit der Kettenreaktionstheorie untersuchen, sondern dafür auch große Mengen Uranerz abbauen. Hoffentlich können unsere Minen in Kolwezi und Shinkolobwe die benötigten Mengen produzieren."
 COG_further_nuclear_research:0 "Uran abbauen und exportieren"
 COG_further_nuclear_research_desc:0 "Mit unserem neuen Verständnis des Atoms und der zunehmenden Produktion von Uranerz können wir nicht nur dessen Potenzial erforschen, sondern auch einen Teil des Erzes an unsere wichtigsten Verbündeten exportieren, um den endgültigen Sieg unserer Koalition über unsere Feinde sicherzustellen." 
 COG_establish_radio_stations:0 "Radiosender einrichten"
 COG_establish_radio_stations_desc:0 "Die Société belge radio-électrique muss Radiostationen errichten, um die Fernkommunikation mit entlegenen Gebieten des Landes, aber auch mit der Kolonie und Europa zu erleichtern."
 COG_radio_divisional_support:0 "Die Funkrelais von Force Publique" 
 COG_radio_divisional_support_desc:0 "Um die Truppeneinsätze über die riesigen Entfernungen im Kongo besser koordinieren zu können, ist es unerlässlich, dass jede Einheit über eigene Funkstationen verfügt." 
 COG_extra_tech_slot:0 "Institut für Kolonialwissenschaften"
 COG_extra_tech_slot_desc:0 "Das Institut für Kolonialwissenschaften war die wichtigste Forschungseinrichtung im belgischen Kongo. Es hatte seinen Sitz in Antwerpen, Belgien, und spezialisierte sich auf die Erforschung der Geologie und Natur der Kolonie. Es wurde durch lokale Forschungsstationen vor Ort ergänzt. Darüber hinaus ermöglichte ein riesiges agronomisches Institut, das Nationale Institut für Agrarwissenschaften des belgischen Kongo, der Kolonie, ihre Erträge drastisch zu steigern."
 COG_extra_tech_slot_2:0 "Technische Spezialisten einladen"
 COG_extra_tech_slot_2_desc:0 "Um den Herausforderungen unserer Zeit zu begegnen, müssen wir unser Innovationspotenzial steigern. Die Einbeziehung ausländischer Experten würde uns dabei neue technische Möglichkeiten eröffnen und uns helfen, die Herausforderungen der aktuellen Jahre zu meistern."

 COG_colonial_loyalty:0 "Koloniale Loyalität"
 COG_colonial_loyalty_desc:0 "Unsere Regierung muss leicht umstrukturiert werden, um den neuen Herausforderungen gerecht zu werden. Derzeit liegt zu viel Macht beim Generalgouverneur, und wir sollten ihm erlauben, einen Teil seiner Macht an kompetente Personen zu delegieren."
 COG_reinforce_colonial_government:0 "Stärkung der Kolonialregierung"
 COG_reinforce_colonial_government_desc:0 "Die Unterstützung der meisten belgischen Siedler und das Vertrauen des Kolonialministeriums in Brüssel oder im Londoner Exil waren ein wichtiger Faktor für die Legitimität von Pierre Ryckmans und die Stabilität der Kolonie." 
 COG_commit_to_the_war:0 "Verpflichte dich zum Krieg"
 COG_commit_to_the_war_desc:0 "Wir befinden uns im Krieg. Manche in Belgien meinten, wir hätten uns neutral erklären sollen, doch die Realität des Krieges betrifft uns hier und jetzt. Wir müssen unsere Unterstützung für die Menschen zeigen, die uns helfen wollen, um zu verhindern, dass ausländische Mächte unter dem Vorwand des „Schutzes“ die Kontrolle über die Kolonie übernehmen." 
 COG_technology_sharing:0 "Technologieaustausch"
 COG_technology_sharing_desc:0 "Während wir unseren Verbündeten in diesem Konflikt mit natürlichen Ressourcen helfen, sollten wir sie um einige Spezialisten und Blaupausen bitten, um unsere industriellen und militärischen Fähigkeiten zu verbessern."
 COG_increased_research_collaboration:0 "Verstärkte Forschungszusammenarbeit"
 COG_increased_research_collaboration_desc:0 "Wir sind in einer Weise mit Belgien verbunden, dass wir gute Kontakte zu den belgischen Innovatoren pflegen sollten, um das volle Potenzial ihrer Fortschritte auszuschöpfen." 
 COG_cracks_down_on_enemies:0 "Geht hart gegen Feinde vor"
 COG_cracks_down_on_enemies_desc:0 "Die Verhaftung deutscher Sympathisanten und von Angola aus operierender Abwher-Spione war für die Sicherheit der Kolonie von entscheidender Bedeutung."  
 COG_military_help:0 "Militärische Hilfe"
 COG_military_help_desc:0 "Um unsere Streitkräfte auszurüsten, sollten wir unsere Verbündeten um Maschinen bitten, um die notwendige Ausrüstung für die Force Publicique hier zu produzieren. Diese Hilfe würde es uns ermöglichen, unsere Abhängigkeit vom Seehandel zu verringern und gleichzeitig unser militärisches Potenzial zu stärken." 
 COG_colonial_defense_associations:0 "Unterstützen Sie koloniale Verteidigungsverbände"
 COG_colonial_defense_associations_desc:0 "Jetzt, da wir im Krieg sind, haben die Belgier in unseren wichtigsten Städten spontan „Verteidigungsverbände“ gegründet, um zur Sicherung der Kolonie beizutragen. Wir sollten sie unterstützen und einige ihrer Mitglieder rekrutieren, um Offiziere zu haben, die in der Lage sind, die Tausenden neuen afrikanischen Rekruten zu befehligen."
 COG_finance_planes_britain:0 "Finanzflugzeuge für Großbritannien"
 COG_finance_planes_britain_desc:0 "Um unsere Solidarität mit den belgischen Kämpfen auf der ganzen Welt auch nach der Kapitulation der Armee zu zeigen, müssen wir Spenden sammeln, um neue Flugzeuge für die belgischen Piloten zu finanzieren, die in der RAF dienen."
 COG_finance_planes_belgium:0 "Finanzpläne für Belgien"
 COG_finance_planes_belgium_desc:0 "Wir müssen Belgien im Kampf um die Wahrung seiner Unabhängigkeit unterstützen. Wir müssen eine große Spendenkampagne in der gesamten Kolonie organisieren, um den Bau von Flugzeugen für die belgische Armee zu finanzieren."  
 COG_expand_force_publique_recruitment:0 "Erweitern Sie die Rekrutierung von Force Publique"
 COG_expand_force_publique_recruitment_desc:0 "Angesichts der Kriegsverluste ist eine verstärkte Rekrutierung erforderlich." 
 
 
 COG_colonial_autonomy:0 "Koloniale Autonomie"
 COG_colonial_autonomy_desc:0 "Wir haben das Kolonialministerium bereits früher gebeten, uns mehr Handlungsfreiheit zu gewähren, aber es hat uns systematisch abgelehnt."
 COG_empower_congolese:0 "Den Kongolesen Macht verleihen"
 COG_empower_congolese_desc:0 "Den Kongolesen Macht verleihen"
 COG_burn_royal_portraits:0 "Verbrennen Sie königliche Porträts"
 COG_burn_royal_portraits_desc:0 "Verbrennen Sie königliche Porträts" 
 COG_affinity_fascism:0 "Faschistische Tendenzen"
 COG_affinity_fascism_desc:0 "Faschistische Tendenzen"
 COG_affinity_new_order:0 "Affinität zur Neuen Ordnung"
 COG_affinity_new_order_desc:0 "Affinität zur Neuen Ordnung"
 COG_independence:0 "Sturz der Regierung von Pierre Rykmans"
 COG_independence_desc:0 "Nachdem wir nun in den wichtigsten kongolesischen Städten und bei der Force Publique genügend Unterstützung gesammelt haben, sollten wir einen Putsch durchführen. Dieser Schlag ins Herz des bestehenden Systems wird uns vom belgischen Einfluss befreien können."
 COG_doctrinal_marxism:0 "Doktrinärer Marxismus"
 COG_doctrinal_marxism_desc:0 "Der Marxismus-Leninismus ist der einzige Weg, die Arbeiter von der Tyrannei der Kapitalisten zu befreien, die ihre Forderungen hinsichtlich der Arbeitszeit in den Bergwerken immer weiter erhöhen. Es ist Zeit, sich zu vereinen und die Gründung eines starken Syndikats zu erzwingen." 
 COG_masses_education:0 "Massenbildung"
 COG_masses_education_desc:0 "Die Alphabetisierung ist der erste notwendige Schritt zur Befreiung der Arbeiter."
 COG_political_commissars:0 "Politische Kommissare"
 COG_political_commissars_desc:0 "„Diese Befehle folgen nicht der Parteilinie!“"
 COG_communist_army:0 "Kommunistische Armee"
 COG_communist_army_desc:0 "Die Revolution ist in Gefahr! Zu den Waffen!" 
 COG_join_comintern:0 "Treten Sie der Komintern bei"
 COG_join_comintern_desc:0 "Die Sowjetunion ist das Herz der Revolution, es wäre töricht, ihren Anweisungen nicht zu folgen"
 COG_african_diplomacy:0 "Afrikanische Diplomatie"
 COG_african_diplomacy_desc:0 "Als freies Land mitten in Afrika müssen wir unsere Position auf dem Kontinent behaupten." 
 COG_influence_liberia:0 "Einfluss Liberia"
 COG_influence_liberia_desc:0 "Liberia soll ein Land für die freien Nachkommen von Sklaven sein. Ihre Vorfahren wurden aus der Sklaverei befreit, doch nun müssen sie von der proletarischen Ausbeutung befreit werden." 
 COG_influence_south_africa:0 "Einfluss Südafrika"
 COG_influence_south_africa_desc:0 "Die Ureinwohner Südafrikas wurden viel zu lange unterdrückt. Wir müssen ihnen den Weg des Sozialismus zeigen, um sie von der kolonialen Unterdrückung zu befreien und sie auf unsere Seite zu ziehen." 
 COG_technology_sharing_communism:0 "Wissenschaftliche Bruderschaft" 
 COG_technology_sharing_communism_desc:0 "Die Wissenschaft wird die Menschheit auf den wahren Weg des Sozialismus führen."  
 
 COG_build_revolution:0 "Bauen Sie die Revolution auf"
 COG_build_revolution_desc:0 "Motiviert durch die Aussicht auf eine bessere Zukunft werden die Arbeiter härter arbeiten, um den Triumph der Revolution zu sichern."
 COG_manipulate_native_masses:0 "Manipulation der einheimischen Massen"
 COG_manipulate_native_masses_desc:0 "Mit einer Armee, die nur aus Europäern besteht, werden wir keinen Krieg führen können. Wir müssen alle möglichen Mittel nutzen, um die Einheimischen davon zu überzeugen, dass sie unter unserem Kommando kämpfen und für unsere Sache sterben müssen."
 COG_colonial_claims:0 "Beanspruchen Sie das Große Kongobecken"
 COG_colonial_claims_desc:0 "Auf der Berliner Konferenz wurde die wahre Ausdehnung des Kongo von den heuchlerischen „Großmächten“ eingeschränkt. Es ist an der Zeit, diese Entscheidungen zu revidieren und den von Stanley vorgestellten Plan umzusetzen: einen Groß-Kongo, der beide Ozeane verbindet und den Triumph der Zivilisation im Herzen Afrikas sichert."
 COG_mobilize_colonial_manpower:0 "Wehrpflicht der Kolonisten"
 COG_mobilize_colonial_manpower_desc:0 "Die belgische Bevölkerung ist das wichtigste Element unserer Gesellschaft, und wenn wir eine große Zahl Kongolesen wirksam befehligen wollen, müssen wir die Zahl der europäischen Offiziere erhöhen." 
 COG_join_axis:0 "Treten Sie der Achse bei"
 COG_join_axis_desc:0 "Deutschland ist unser Vorbild und wir müssen die neue Ordnung auf jede erdenkliche Weise unterstützen."
 COG_german_scientists:0 "Deutsche Wissenschaftler einladen"
 COG_german_scientists_desc:0 "Im Austausch für unsere Ressourcen sollten uns die Deutschen bei der Entwicklung besserer Waffen helfen. Diese neuen Waffen würden es uns dann ermöglichen, diesen Krieg gegen das Bündnis aus korrupter Ploutokratie und Bolschewismus zu gewinnen."
 COG_italian_scientists:0 "Laden Sie italienische Wissenschaftler ein"
 COG_italian_scientists_desc:0 "Im Austausch für unsere Ressourcen sollten die Italiener uns helfen, bessere Waffen zu entwickeln, um diesen Krieg gegen das Bündnis aus korrupter Ploutokratie und Bolschewismus zu gewinnen."
 COG_join_italy:0 "Nähern Sie sich den Italienern"
 COG_join_italy_desc:0 "Italien ist unser Vorbild und wir müssen die neue Ordnung auf jede erdenkliche Weise unterstützen."
 COG_technology_sharing_fascism:0 "Die Stärke der Zusammenarbeit"
 COG_technology_sharing_fascism_desc:0 "Wir werden diesen Krieg nicht allein führen, aber wenn wir unsere Anstrengungen vereinen, können wir die Kontinuität der europäischen Herrschaft über ein Afrika sicherstellen, das frei von bolschewistischen Einflüssen ist." 
 
 COG_army_effort:0 "Reform der Force Publicique"
 COG_army_effort_desc:0 "Die Force Publique ist in einem schlechten Zustand. Die Gewehre sind alt und die Moral der Offiziere niedrig. Das müssen wir ändern."
 COG_engineer_effort:0 "Ingenieurkorps"
 COG_engineer_effort_desc:0 "Um sich in unwegsamem Gelände fortzubewegen, sind Ingenieure unabdingbar. Deshalb ist die Ausbildung von Spezialisten unerlässlich."
 COG_motorization_effort:0 "Motorisierungsbemühungen"
 COG_motorization_effort_desc:0 "Wir müssen die Möglichkeit der Schaffung einer motorisierten Brigade prüfen, die viel schneller über den Kontinent verlegt werden könnte als unsere reguläre Infanterie." 
 COG_motorised_support:0 "Motorisierte Unterstützung"
 COG_motorised_support_desc:0 "Um ein System zu entwickeln, das eine möglichst schnelle Verlegung unserer Truppen an die Front ermöglicht, müssen wir große Teile der Unterstützungseinheiten unserer Infanteriedivisionen motorisieren."
 COG_armor_effort:0 "Kommission für gepanzerte Fahrzeuge"
 COG_armor_effort_desc:0 "Panzer scheinen im Herzen des Dschungels nicht besonders nützlich zu sein, aber im Kontext der Neuen Welt sollten wir überall effizient kämpfen können. Wer würde bestreiten, dass wir in einem gepanzerten Fahrzeug besser kämpfen? Um unsere Anforderungen zu ermitteln, müssen wir Spezialisten konsultieren, die sich in einer Kommission zur Entwicklung gepanzerter Fahrzeuge zusammengeschlossen haben."
 COG_equipment_effort:0 "Weg mit den veralteten Gewehren"
 COG_equipment_effort_desc:0 "Die belgische Armee war viel zu lange mit veralteten Gewehren aus dem Jahr 1889 ausgerüstet, die die belgische Armee überzählig hatte. Es ist an der Zeit, diese alten Gewehre zu entsorgen oder durch modernere zu ersetzen." 
 COG_equipment_effort_2:0 "Fortsetzung des Rüstungsmodernisierungsprogramms"
 COG_equipment_effort_2_desc:0 "Auch bei neuen Gewehren ist die restliche Ausrüstung noch alt und muss verbessert werden."
 COG_equipment_effort_3:0 "Finalisieren Sie das Programm zur Modernisierung der Ausrüstung"
 COG_equipment_effort_3_desc:0 "Mit einigen zusätzlichen Anstrengungen werden wir in der Lage sein, die ehemalige Kolonialpolizei auf die Ebene einer nationalen stehenden Armee zu heben."

 COG_gendarmerie_formation:0 "Modernisierung der Polizeiformation"
 COG_gendarmerie_formation_desc:0 "Die Force Publique ist (zumindest theoretisch) keine Armee, sondern eine Kolonialpolizei. Polizeieinsätze sind daher ein wesentlicher Bestandteil ihrer täglichen Aufgaben." 
 COG_doctrine_effort:0 "Taktiken modernisieren"
 COG_doctrine_effort_desc:0 "Wenn unsere Ausrüstung modernisiert werden muss, müssen wir auch unsere Taktik modernisieren. Unsere Offiziere sind zwar echte Profis, doch die jüngsten Fortschritte in der Militärtheorie haben deutlich gemacht, dass eine Modernisierung unserer Taktiken und Strategien absolut notwendig ist."
 COG_doctrine_effort_2:0 "Groß angelegte Übungen"
 COG_doctrine_effort_2_desc:0 "Um unsere Koordination zu verbessern und neue Taktiken auszuprobieren, ist es unerlässlich, groß angelegte Übungen zu organisieren. An diesen Übungen würden mehrere Hundert oder sogar Tausend Mann beteiligt sein, um die Koordination der verschiedenen Einheiten zu bewerten."
 COG_river_patrols:0 "Flusspatrouillen"
 COG_river_patrols_desc:0 "Das Kongobecken ist die Basis des Landes und seine Kontrolle ist für den Transport von Truppen und Gütern unerlässlich. Dazu müssen wir es mit leichten Booten patrouillieren und unsere Infanterie so ausbilden, dass sie es problemlos überqueren kann."
 COG_special_forces:0 "Spezialeinheiten"
 COG_special_forces_desc:0 "Die natürliche Umgebung des Kongo könnte für einen Ausländer als äußerst feindselig empfunden werden. Das Land ist von dichten Wäldern und Dschungeln bedeckt und wird von einem großen Fluss durchzogen, während im Osten schwieriges Gelände dominiert wird. Damit die Force Publique in diesen Umgebungen kämpfen kann, müssen wir Truppen organisieren, die das Gelände optimal ausnutzen und so den Ausgang potenzieller Kämpfe entscheiden können."
 COG_jungle_training:0 "Dschungeltraining"
 COG_jungle_training_desc:0 "Da der Dschungel einen beträchtlichen Teil unseres Territoriums ausmacht, ist die Fähigkeit, sich in dieser feindlichen Umgebung effektiv zu bewegen und zu kämpfen, für die militärische Effizienz der Force Publique von entscheidender Bedeutung."
 COG_fortify_congo_mouth:0 "Die Kongomündung befestigen"
 COG_fortify_congo_mouth_desc:0 "Unsere wichtigsten Ressourcen liegen an der Mündung des Kongo-Flusses. Diese lebenswichtige Region muss geschützt werden. Um dieses Ziel zu erreichen, müssen wir ein geeignetes Flusskorps aufstellen. Diese neuen Einheiten sollten mit schnellen kleinen Booten ausgestattet sein, um den gesamten Fluss zu patrouillieren. "
 COG_fortify_cities:0 "Beschütze die anderen Städte"
 COG_fortify_cities_desc:0 "Auch wenn Léopoldville sicher ist, sind die anderen Städte Elisabethville in Katanga und Stanleyville in der Provinz „Orientale“ noch immer verwundbar und sollten verstärkt werden."

 COG_air_force_congo:0 "Die Luftflügel der Force Publique" 
 COG_aviation_effort_tt:0 "Nicht genügend Bauplätze für §YAir Base§!"
 COG_air_force_congo_desc:0 "Nirgendwo schreitet der technologische Fortschritt schneller voran als in der Luftkriegsführung. Die Luftfahrt ist ein Gebiet, das jede moderne Nation beherrschen muss."
 COG_fighter_focus:0 "Importieren Sie Kampfflugzeug-Blaupausen"
 COG_fighter_focus_desc:0 "Luftkämpfe haben im Ersten Weltkrieg noch nicht stattgefunden. Wenn wir bei der Entwicklung von Kampfflugzeugen die Nase vorn haben, werden wir auch in Zukunft einen Vorteil haben."
 COG_bomber_focus:0 "Experimentieren Sie mit Langstreckenflugzeugen"
 COG_bomber_focus_desc:0 "Wenn die Menschen in Zukunft vom Schrecken der heutigen Kriege sprechen, wird Feuer, das vom Himmel regnet, eine zentrale Rolle spielen. Wir werden unser Bestes tun, um sicherzustellen, dass diese Geschichten auch von unseren Feinden erzählt werden."
 COG_long_range_fighters:0 "Langstreckenjäger"
 COG_long_range_fighters_desc:0 "Um die riesigen Entfernungen des Dschungels zu überwinden, muss ein neues Konzept entwickelt werden. Deshalb ist eine Art Militärflugzeug als Vermittler zwischen Jägern und Bombern notwendig, um Langstreckenmissionen abzudecken und feindliche Bomber herauszufordern."
 COG_radar_system:0 "Radarsystem"
 COG_radar_system_desc:0 "Da sich die Weite des Kongo nur schwer effizient überwachen lässt, würde uns ein Radarsystem in die Lage versetzen, den Feind zu erkennen und unsere Flugzeuge nur dann einzusetzen, wenn eine Bedrohung im Anmarsch ist."
 COG_aviation_effort_2:0 "Studieren Sie ausländische Taktiken"
 COG_aviation_effort_2_desc:0 "Um unsere Luftwaffe gut in andere Zweige des Militärs zu integrieren, sind weitere Fortschritte in der Luftfahrt erforderlich."
 COG_CAS_effort:0 "Sturzkampfbomber-Prototypen"
 COG_CAS_effort_desc:0 "Eine moderne Armee benötigt nicht nur am Boden, sondern auch in der Luft die Unterstützung durch Fahrzeuge."
 COG_rocket_effort:0 "Entwicklung von Düsentriebwerken"
 COG_rocket_effort_desc:0 "Raketen- und Düsentriebwerke ermöglichen sowohl unbemannten als auch bemannten Schiffen beispiellose Geschwindigkeiten. Die Entwicklung dieser Technologien wird es uns ermöglichen, den Feind zu überraschen."
 COG_NAV_effort:0 "Marinebomber-Experimente"
 COG_NAV_effort_desc:0 "So wie die neue Seekriegsführung teilweise unter der Wasseroberfläche stattfindet, findet ein Teil davon in der Luft über dem Wasser statt."
 COG_naval_effort:0 "Beginn des Schiffsbaus in Matadi"
 COG_naval_effort_tt:0 "Nicht genügend Bauplätze für §YNaval Dockyards§!"
 COG_naval_effort_desc:0 "Als unser modernster Hafen, geschützt vor der hohen See, da er 100 km von der Mündung des Kongo-Flusses entfernt liegt, ist der Hafen von Matadi der ideale Ausgangspunkt für unser Marineprogramm."
 COG_submarine_operations:0 "Taktiken für Konvoi-Überfälle"
 COG_submarine_operations_desc:0 "Durch die Neugestaltung der Seekriegsführung unter Berücksichtigung der Fortschritte in der U-Boot-Technologie können wir feindliche Konvois effizient bekämpfen."
 COG_large_navy:0 "Marinetaktiken"
 COG_large_navy_desc:0 "Die Anpassung unserer Marinedoktrinen an große Schiffe und die Gewährleistung der Sicherheit unserer Handelskonvois wird uns viel darüber beibringen, welche Art von Schiffen wir benötigen."
 COG_fleet_management:0 "Flottenmanagement"
 COG_fleet_management_desc:0 "Um effektiv zu sein, erfordert unsere neue Flotte neue Taktiken." 
 COG_submarine_experiments:0 "U-Boot-Experimente"
 COG_submarine_experiments_desc:0 "Der U-Boot-Krieg ist die spannendste Entwicklung in der Marine seit der Erfindung des Torpedoboots. Wir tun gut daran, uns nicht nur vor U-Booten zu schützen, sondern sie auch gegen feindliche Schiffe einzusetzen."
 COG_cruiser_effort:0 "Experimentieren Sie mit größeren Schiffen"
 COG_cruiser_effort_desc:0 "Bevor wir uns auf die Erforschung fortgeschrittener Schlachtschiffe konzentrieren können, müssen die kleineren Kreuzer ersetzt werden."
 COG_destroyer_effort:0 "Fortgeschrittene Zerstörer"
 COG_destroyer_effort_desc:0 "Durch die Untersuchung der Konstruktion und des strategischen Einsatzes von U-Booten haben wir auch gelernt, wie wir diesen Strategien entgegenwirken können. Zerstörer werden dabei eine entscheidende Rolle spielen."
 COG_capital_ships_effort:0 "Großkampfschiff-Anstrengung"
 COG_capital_ships_effort_desc:0 "Die Nation mit den meisten Schlachtschiffen wird die Weltmeere beherrschen. Schlachtschiffe und Flugzeugträger repräsentieren die alte und die neue Seeüberlegenheit."

 
 tblra.1.t:0 "[From.GetNameDef] möchte, dass wir den Benelux-Staaten beitreten"
 tblra.1.d:0 "[From.GetNameDef] möchte ihre Allianz stärken, indem sie uns in sie aufnimmt"
 tblra.1.a:0 "Akzeptieren"
 tblra.1.b:0 "Verweigern"
 tblra.2.t:0 "[From.GetNameDef] lehnt ab"
 tblra.2.d:0 "[From.GetNameDef] hat unser Allianzangebot leider abgelehnt"
 tblra.2.a:0 "Wir brauchen sie, auf die eine oder andere Weise"
 tblra.3.t:0 "[From.GetNameDef] Akzeptiert"
 tblra.3.d:0 "[From.GetNameDef] hat unser Allianzangebot angenommen und ist nun Teil der [Root.GetFactionName]"
 tblra.3.a:0 "Tolle Neuigkeiten"
 tblra.3.b:0 "Dann machen wir das selbst!"
 tblra.4.t:0 "[From.GetNameDef] bietet einen Pakt an"
 tblra.4.d:0 "Da [From.GetNameDef] erkannte, dass unsere Panzerentwürfe ihren eigenen überlegen sind, schlug er vor, dass wir unsere Entwürfe teilen, damit sie als Bastion des Kommunismus in Westeuropa dienen können."
 tblra.4.a:0 "Akzeptieren"
 tblra.4.b:0 "Verweigern"
 tblra.5.t:0 "[From.GetName] akzeptiert unseren vorgeschlagenen Pakt"
 tblra.5.d:0 "[From.GetNameDef] hat unsere strategische Bedeutung in der Mitte Westeuropas erkannt und uns technologisch überlegene Panzerkonstruktionen gegeben, damit wir uns gegen äußere Einflüsse verteidigen können."
 tblra.5.a:0 "Machen Sie sich an die Arbeit mit den neuen Designs"
 tblra.6.t:0 "[From.GetName] lehnt unseren vorgeschlagenen Pakt ab"
 tblra.6.d:0 "[From.GetName] hat unseren vorgeschlagenen Pakt zur Verbesserung unserer Panzerfähigkeiten nicht unterzeichnet. Wir müssen das selbst tun!"
 tblra.6.a:0 "So sei es"
 tblra.8.t:0 "Belgien möchte [Root.GetFactionName] beitreten"
 tblra.8.d:0 "[From.GetName] erkennt, dass die deutsche Aggression möglicherweise nicht eingedämmt werden kann, befürchtet eine bevorstehende Invasion und bittet um unseren Schutz"
 tblra.8.a:0 "Akzeptieren"
 tblra.8.b:0 "Verweigern"
 tblra.9.t:0 "[From.GetName] Akzeptiert"
 tblra.9.d:0 "Die Briten erkannten, dass die Benelux-Länder für einen Krieg gegen Deutschland strategisch günstig gelegen sind, und beschlossen, ihren Schutz auf unser Land auszudehnen."
 tblra.9.a:0 "Tolle Neuigkeiten"
 tblra.10.t:0 "[From.GetName] lehnt ab"
 tblra.10.d:0 "Offenbar erkennen die Briten die Benelux-Region nicht als wichtig an, da sie uns nicht vor feindlichen Einfällen verteidigen werden."
 tblra.10.a:0 "Verdammte Briten"
 tblra.11.t:0 "Starten Sie den Depillarisierungsprozess"
 tblra.11.d:0 "Wir brauchen in diesen turbulenten Zeiten keine Säulengesellschaft. Der Beginn des Abbaus der Säulen ist ein wichtiger Schritt zur Stärkung unseres Staates."
 tblra.11.a:0 "Starten Sie den Prozess"
 tblra.12.t:0 "Wirtschaftlicher Vorschlag"
 tblra.12.d:0 "[Root.GetName] hat vor kurzem neue Wirtschaftsabkommen ausgehandelt, die es uns ermöglichen würden, die Herstellungskosten zu senken"
 tblra.12.a:0 "Akzeptieren"
 tblra.12.b:0 "Verweigern"
 tblra.13.t:0 "[From.GetName] Akzeptiert"
 tblra.13.d:0 "[From.GetName] hat sich bereit erklärt, mit uns zusammenzuarbeiten, um die Kosten zu senken und uns stärker aufeinander abzustimmen."
 tblra.13.a:0 "Gut zu hören"
 tblra.14.t:0 "[From.GetName] lehnt ab"
 tblra.14.d:0 "Leider hat [From.GetName] unser Angebot abgelehnt, da es „ihre Souveränität negieren“ würde."
 tblra.14.a:0 "Ein trauriger Tag für die Benelux-Länder"
 tblra.15.t:0 "Jeder akzeptiert das wirtschaftliche Angebot"
 tblra.15.d:0 "Die gesamten Benelux-Länder haben unser wirtschaftliches Angebot angenommen, und in Zukunft werden wir nur noch enger zusammenwachsen"
 tblra.15.a:0 "Tolle Neuigkeiten"
 tblra.22.t:0 "Arbeiter streiken nach Doppelmord!"
 tblra.22.d:0 "Die Ermordung zweier sozialistischer Aktivisten durch Faschisten in Antwerpen löste einen Streik der Hafenarbeiter aus, dem bald der Rest des Landes folgte. Die Zahl der Streikenden erreichte bis zu 500.000 Arbeiter, die Industrie des Landes kam zum Erliegen."
 tblra.22.a:0 "Wir sollten Zugeständnisse machen."
 tblra.22.b:0 "Lassen Sie sie zuschlagen und wenn nötig in die Menge schießen." 
 tblra.23.t:0 "Paul Van Zeeland der Unterschlagung beschuldigt!"
 tblra.23.d:0 "Parlamentsabgeordneter Gustaaf Sap warf dem Premierminister während seiner Tätigkeit bei der Nationalbank Unterschlagung vor. Auch nach Van Zeelands Dementis setzte dieser Skandal die Regierung unter Druck. Die Dreierkoalition wird den Schock vorerst noch ertragen müssen."
 tblra.23.a:0 "Es wäre sicherer, zurückzutreten." 
 tblra.24.t:0 "Politische Agitation bedroht die Regierung!"
 tblra.24.d:0 "Da die Bedrohung durch die Rexisten weniger bedrohlich erscheint, verschärft sich die politische Rivalität erneut. Finanzminister Henri De Man versucht, den linken Flügel der Katholischen Partei und der Liberalen Partei mit der Sozialistischen Partei zu vereinen, um eine neue Steuer für die oberen Gesellschaftsschichten einzuführen. De Man tritt daraufhin „aus gesundheitlichen Gründen“ zurück. Dieses Projekt erschüttert die Parlamentsmehrheit erneut. Eine neue Koalition muss gebildet werden, ohne die Katholiken."
 tblra.24.a:0 "Paul-Henri Spaak hat mehr Unterstützung als De Man."
 tblra.25.t:0 "Die Nominierung eines flämisch-nationalistischen Arztes löst einen Skandal aus!"
 tblra.25.d:0 "König Leopold III. weigerte sich, die Ernennung von Dr. Adriaan Martens, der im Ersten Weltkrieg mit den deutschen Streitkräften kollaborierte, zum Leiter der Flämischen Medizinakademie zu unterzeichnen. Der Vorschlag hätte zunächst vom Ministerrat genehmigt werden müssen. Doch es stellte sich heraus, dass dies nicht der Fall war und jemand seinen Namen unter den königlichen Orden gesetzt hatte. Der Skandal führte zum Rücktritt der gesamten Regierung."
 tblra.25.a:0 "Hubert Pierlot wird der nächste Formateur." 
 tblra.26.t:0 "Der König und die Regierung haben sich zur Verteidigung des Landes zusammengeschlossen. Hubert Pierlot als Premierminister bestätigt!"
 tblra.26.d:0 "Um der gegenwärtigen Situation zu begegnen und die Einheit des Landes zu gewährleisten, wurde die Regierungskoalition erweitert, um alle demokratischen Parteien des Landes mit Hubert Pierlot als Premierminister einzubeziehen."
 tblra.26.a:0 "Wir hoffen, eines Tages in Frieden leben zu können."  
 tblra.27.t:0 "Der König und die Regierung haben sich zur Verteidigung des Landes zusammengeschlossen. Hubert Pierlot als Premierminister bestätigt!"
 tblra.27.d:0 "Um der plötzlichen Aggression unseres Landes zu begegnen, wurde die Regierungskoalition erweitert, um alle demokratischen Parteien des Landes mit Hubert Pierlot als Premierminister einzubeziehen."
 tblra.27.a:0 "Wir hoffen, eines Tages in Frieden leben zu können." 
 tblra.28.t:0 "Belgisches Ultimatum"
 tblra.28.d:0 "Die belgische Revolutionsregierung will unserem Land die Bildung einer kommunistischen Regierung aufzwingen."
 tblra.28.a:0 "Akzeptieren"
 tblra.28.b:0 "Suchen Sie britische Hilfe"  
 tblra.28.c:0 "Zehn Oorlog!" 
 tblra.38.t:0 "Der Wahlkampf 1936 beginnt!"
 tblra.38.d:0 "Die zunehmenden politischen Aktivitäten zeigen deutlich, dass die Wahlen nahe sind. In wenigen Monaten, Ende Mai, werden die Belgier zur Wahl aufgerufen. Hinter den Kulissen verhandeln einige Parteien bereits über Wahlvereinbarungen, um nach dem Wahltag eine neue Koalition zu bilden. Werden die neuen populistischen Bewegungen wie Rex, Verdinaso und die VNV den traditionellen Parteien Stimmen abjagen?"
 tblra.38.a:0 "Wir organisieren ein tolles Treffen!"
 tblra.39.t:0 "Demokratische Union zerbrochen!"
 tblra.39.d:0 "Aufgrund der Entwicklung der politischen Lage in Belgien ist die politische Einheit, die den Krieg befürwortete, inzwischen verschwunden."
 tblra.39.a:0 "OK"
 tblra.40.t:0 "Joseph Jacquemotte ist gestorben!"
 tblra.40.d:0 "Die Kommunistische Partei Belgiens gab den plötzlichen Tod ihres Vorsitzenden Joseph Jacquemotte bekannt. Er hatte die belgische Kommunistische Partei mehr als zehn Jahre lang geführt. Eine Troika bestehend aus Julien Lahaut, Xavier Relecom und Georges Van den Boom wird die Partei in naher Zukunft regieren."
 tblra.40.a:0 "Relecom ist die Wahl Moskaus, er wird die Partei regieren."
 tblra.40.b:0 "Julien Lahaut sollte die Kommunisten in Belgien anführen." 
 tblra.41.t:0 "Der Rücktritt rexistischer Vertreter erzwingt Teilwahlen. Paul Van Zeeland wird gegen Léon Degrelle antreten!"
 tblra.41.d:0 "In einem politischen Manöver, vergleichbar mit dem Rücktritt der POB-Vertreter im Jahr 1935, traten alle Rexisten-Vertreter aus Brüssel gleichzeitig zurück, was die Organisation einer Teilwahl erzwang. Um der rexistischen Bedrohung, insbesondere der Nachricht von der Kandidatur Léon Degrelles, entgegenzuwirken, wurde Paul Van Zeeland als Gegenkandidat ausgewählt. Er wurde von allen anderen Parteien, einschließlich der Kommunisten, unterstützt."
 tblra.41.a:0 "L&#39;union fait la force - Eendracht maakt macht!" 
 tblra.41.b:0 "Für ein sauberes Regime: Wählen Sie Degrelle!" 
 tblra.41.c:0 "Ein großer Sieg gegen den Faschismus!"  
 tblra.42.t:0 "Die 1919 geraubten deutschen Ländereien."
 tblra.42.d:0 "Am Ende des Ersten Weltkriegs annektierte sogar Belgien einen Teil unseres Territoriums. Unsere geplante Offensive rund um die Maginot-Linie wird eine perfekte Gelegenheit sein, ein weiteres Kapitel des Versailler Diktats zu revidieren."
 tblra.42.a:0 "Auch diese Länder gehören zum Vaterland!"
 tblra.43.t:0 "Léon Degrelle verkündet den Beginn des Thiois-Imperiums"
 tblra.43.d:0 "\n\nIn einer langen Rede, in der er die Werte der Nation und ihrer Armee lobte, verkündete Léon Degrelle, dass mit der Vereinigung mit den Niederlanden eine neue Ära für die wiedervereinigten Niederlande begonnen habe. Um diesen Wandel zu verdeutlichen, wird das Land nun „Thois Empire“ heißen. Um den Geist Kaiser Karls V. wiederzubeleben, rief er zur Wiedervereinigung des alten „Burgundischen Kreises“ in dieser neuen politischen Einheit auf."
 tblra.43.a:0 "Heute ist endlich ein imperiales Volk erwacht!"
 tblra.44.t:0 "Joris Van Severen verkündet den Beginn des Dietsche Rijk"
 tblra.44.d:0 "\n\nIn einer langen Rede, in der er die Werte der Nation und ihrer Armee lobte, verkündete Joris Van Severen, dass mit der Vereinigung mit den Niederlanden eine neue Ära für die wiedervereinigten Niederlande begonnen habe. Um diesen Wandel zu verdeutlichen, wird das Land nun „Dietsche Rijk“ heißen. In einem Aufruf zur Wiederherstellung der Einheit der niederländischen Sprache rief er zur Wiedervereinigung aller Erben der Niederlande zu dieser neuen politischen Einheit auf."
 tblra.44.a:0 "Heute, nach Jahrhunderten, sind wir endlich wirklich vereint!" 
 tblra.49.t:0 "Joris Van Severen von französischen Soldaten getötet"
 tblra.49.d:0 "Zu Beginn der Invasion wurden belgische Faschisten von der Regierung aus Angst vor einer möglichen Kollaboration mit dem Feind inhaftiert. Diese politischen Gefangenen wurden aus der Reichweite der feindlichen Streitkräfte gebracht und schließlich nach Frankreich geschickt, wo sie von französischen Soldaten bewacht wurden.\n\nGestern Abend töteten betrunkene Soldaten, frustriert über die Kapitulation der belgischen Armee, ihre Gefangenen. Damit endete das Leben eines der wichtigsten flämischen Faschistenführer: Joris Van Severen."
 tblra.49.a:0 "Ein Opfer unter Tausenden in diesem Krieg." 
 tblra.50.t:0 "Joris Van Severen verkündet die Wiedervereinigung ganz Flanderns"
 tblra.50.d:0 "Jetzt, da Flandern wieder vereint ist, ist es an der Zeit, unseren Eroberungszug in die Landschaft zu würdigen. Lille heißt jetzt Rijsel und Dünkirchen erhält seinen ursprünglichen Namen zurück: Duinkerke."
 tblra.50.a:0 "Alles für Vlaanderen, Vlaanderen für Kristus."
 tblra.50.b:0 "Sie haben Flämisch vergessen, das ist hoffnungslos." 
 tblra.51.t:0 "Nordfrankreich befreit"
 tblra.51.d:0 "Jetzt, da der Norden wieder frei ist, müssen die Städte ihren wahren Namen zurückerhalten. De Gaulle wurde in Lille geboren, nicht in Ri-je-zelle."
 tblra.51.a:0 "La France retrouve son individible unité."
 tblra.52.t:0 "Die alten Ft-17"
 tblra.52.d:0 "14 Renault Ft sind seit Jahren ungenutzt und befinden sich noch in unserer Reserve. Es handelt sich um Überreste der 49 Panzer, die nach dem Ersten Weltkrieg von Frankreich gekauft wurden. Jeder weiß, dass diese alten Maschinen veraltet sind. Manche halten es für eine gute Idee, sie der Gendarmerie zu überlassen."
 tblra.52.a:0 "Übergeben Sie sie vorerst der Gendarmerie"
 tblra.53.t:0 "Das Artillerielager"
 tblra.53.d:0 "Alte 75-mm-Geschütze warten in unseren Arsenalen auf ihren Einsatz."
 tblra.53.a:0 "Wir müssen sie unseren Abteilungen zuordnen"
 tblra.54.t:0 "Der Artillerievorrat – Die schwedischen Geschütze"
 tblra.54.d:0 "Die im letzten Jahr gekauften Bofors-Gebirgsgeschütze wurden zu den Beständen älterer 75-mm-Geschütze hinzugefügt und warten nun in unseren Arsenalen."
 tblra.54.a:0 "Wir müssen sie unseren Abteilungen zuordnen" 
 tblra.55.t:0 "Hubert Pierlot ist zurückgetreten"
 tblra.55.d:0 "Von den Kriegsjahren ermüdet, beschloss Hubert Pierlot, seinen Rücktritt einzureichen. Achille Van Acker wird eine fast identische Regierung führen."
 tblra.55.a:0 "Ein einfacher Übergang" 
 tblra.56.t:0 "Versand von Katanga-Uran gestoppt"
 tblra.56.d:0 "Da Belgien die Kontrolle über Katanga verloren hat und die Zusammenarbeit mit der belgischen Regierung abgebrochen ist, haben wir keinen Zugriff mehr auf das wertvolle Uran aus Katanga. Dies wird unsere Forschungen zu den physikalischen Eigenschaften des Urans und seinem vielversprechenden Potenzial erheblich erschweren."
 tblra.56.a:0 "Wir müssen ohne sie weitermachen"
 tblra.57.t:0 "Lieferung von Katanga-Uran erhalten"
 tblra.57.d:0 "Aufgrund unserer Zusammenarbeit mit der belgischen Regierung, die die Uranminen von Katanga kontrolliert, haben wir eine Lieferung dieses wertvollen Minerals erhalten."
 tblra.57.a:0 "Wir müssen versuchen, sein Potenzial auszuschöpfen" 
 tblra.58.t:0 "Xavier Relecom verhaftet"
 tblra.58.d:0 "Der Führer der belgischen kommunistischen Partei wurde von den deutschen Streitkräften verhaftet und im Fort Breendonck in Gewahrsam genommen"
 tblra.58.a:0 "Ein weiteres Opfer des Faschismus"
 tblra.59.t:0 "Julien Lahaut verhaftet"
 tblra.59.d:0 "Der Führer der belgischen kommunistischen Partei wurde von den deutschen Streitkräften verhaftet und im Fort Breendonck in Gewahrsam genommen"
 tblra.59.a:0 "Ein weiteres Opfer des Faschismus" 
 tblra.60.t:0 "Alexandre Galopin ermordet"
 tblra.60.d:0 "Der Direktor der „Société Générale de Belgique“, eines der größten belgischen Unternehmen, das auch in der Wirtschaft des besetzten Landes eine wichtige Rolle spielte, wurde heute von flämischen Faschisten der Gruppe „De Vlag“ (Die Flagge) ermordet. Der Mordanschlag wurde von einem ihrer wichtigsten Mitglieder organisiert: Robert Jan Verbelen."
 tblra.60.a:0 "Ein weiteres Opfer des Faschismus" 
 tblra.61.t:0 "Endlich Frieden!"
 tblra.61.d:0 "Mit der Rückkehr des Friedens kann sich die Regierung der Nationalen Union auf künftige Herausforderungen konzentrieren."
 tblra.61.a:0 "Hoffen wir, dass der Frieden anhält"  
 tblra.62.t:0 "Kapitulation Leopolds III."
 tblra.62.d:0 "Aufgrund der Kapitulation ergab sich König Leopold III. den feindlichen Streitkräften und ist nun im Schloss von Laeken (im Norden Brüssels) gefangen. Inzwischen hat sich die Regierung von der Entscheidung des Königs losgesagt und beschlossen, den Krieg fortzusetzen, solange der König nicht regieren kann."
 tblra.62.a:0 "Die Nation muss befreit werden." 
 tblra.63.t:0 "Charles wird Prinzregent"
 tblra.63.d:0 "Während der König nicht regieren kann, übernimmt sein jüngerer Bruder Karl die Funktion des Prinzregenten. Er zeigte sich bereit, mit der Regierung zusammenzuarbeiten, um die normale Ordnung der Institutionen wiederherzustellen."
 tblra.63.a:0 "„Ich schwöre, die Verfassung zu beachten …“" 
 tblra.64.t:0 "Die Demokratische Union ist zerbrochen!"
 tblra.64.d:0 "Aufgrund der Entwicklung der politischen Lage in Belgien ist die politische Einheit, die den Krieg befürwortete, inzwischen verschwunden."
 tblra.64.a:0 "Eine neue Bestellung wartet!"  
 tblra.64.b:0 "Die Arbeiterrevolution siegt!"
 tblra.64.c:0 "Die radikale Opposition wächst von Tag zu Tag."
 tblra.65.t:0 "Konservative sichern sich Regierungsmehrheit!"
 tblra.65.d:0 "Aufgrund ihres wachsenden Einflusses in den politischen Kreisen ist die sozialistische Regierung gestürzt und die Konservativen werden in absehbarer Zukunft die nächste Wallonie regieren."
 tblra.65.a:0 "Mahieu ist Priester und ein echter flämischer Militanter."  
 tblra.65.b:0 "Wir müssen uns auf einen erfahrenen Politiker wie Pierlot verlassen."  
 tblra.66.t:0 "Im Kongo wurde eine begrenzte koloniale Autonomie eingeführt"
 tblra.66.d:0 "Mit der Einführung der begrenzten Autonomie im Kongo wurden dem Generalgouverneur Pierre Ryckmans neue Machtbefugnisse verliehen. Der DLC „Together for Victory“ wird empfohlen."
 tblra.66.a:0 "Den Kongo unter belgischer Kontrolle halten"
 tblra.66.b:0 "Arbeit und Fortschritt!" 
 tblra.67.t:0 "Der Belgisch-Kongo finanzierte Kampfflugzeuge"
 tblra.67.d:0 "Belgisch-Kongo hat Gelder gesammelt, um den Bau zusätzlicher Kampfflugzeuge für die in der RAF eingesetzten belgischen Piloten zu finanzieren."
 tblra.67.a:0 "Gemeinsam werden wir gewinnen!"  
 tblra.70.t:0 "Der Beginn der V-Kampagne"
 tblra.70.d:0 "In einer Sendung von Radio Belgium, dem belgischen Teil des Senders, verkündete Victor de Laveleye, dass jeder, der mit der Besatzung unzufrieden sei, den Buchstaben V als Symbol des Widerstands wählen solle. Dieser Buchstabe wurde gewählt, weil er sowohl der Anfangsbuchstabe von Victoire (Sieg) als auch von Vrijheid (Freiheit) ist, einem Symbol der Einheit aller freien Belgier. Die Briten könnten daran interessiert sein, ihn zu verwenden, um Partisanenaktivitäten in ganz Europa zu fördern."
 tblra.70.a:0 "V für Sieg!"
 tblra.70.b:0 "Wir werden die Terroristen vernichten!"
 tblra.70.c:0 "Dieser Krieg wird von Tag zu Tag gewalttätiger." 
 tblra.71.t:0 "Die V-Kampagne unterstützt Partisanenaktivitäten"
 tblra.71.d:0 "Mit der zunehmenden Unterstützung für die V-Kampagne sind in unseren Städten immer mehr V-Gemälde zu sehen. Diese Symbole, die man morgens sieht und schnell wieder verwischt, erinnern die Bevölkerung daran, dass die Besatzung kein Verhängnis ist und dass unsere Feinde besiegt werden."
 tblra.71.a:0 "V für Sieg!"  
 tblra.72.t:0 "Die Demokratische Republik Kongo strebt den Beitritt zur Komintern an"
 tblra.72.d:0 "Die Demokratische Republik Kongo ist mit der Bitte an uns herangetreten, der Komintern beitreten zu dürfen."
 tblra.72.a:0 "Ein weiteres Land schließt sich der Revolution an."   
 tblra.72.b:0 "Lehnen Sie ihre Forderung ab."
 tblra.73.t:0 "Die Demokratische Republik Kongo strebt den Beitritt zur Union der afrikanischen Völker an"
 tblra.73.d:0 "Die Demokratische Republik Kongo ist mit der Bitte an uns herangetreten, der Union Afrikanischer Völker beitreten zu dürfen."
 tblra.73.a:0 "Ein weiteres Land schließt sich der Revolution an."   
 tblra.73.b:0 "Lehnen Sie ihre Forderung ab." 
 tblra.74.t:0 "Der Kongo strebt einen Beitritt zu [Root.GetFactionName] an"
 tblra.74.d:0 "Der nun von Belgien unabhängige kongolesische Staat möchte sich der [Root.GetFactionName] anschließen, um beim Aufbau einer neuen Weltordnung mitzuhelfen."
 tblra.74.a:0 "Ein weiteres Land schließt sich der Revolution an."   
 tblra.74.b:0 "Lehnen Sie ihre Forderung ab."  
 tblra.74-2.a:0 "Ein weiteres Land schließt sich der Revolution an."   
 tblra.74-2.b:0 "Lehnen Sie ihre Forderung ab."   
 tblra.75.t:0 "Eine belgische Allianz?"
 tblra.75.d:0 "Der kommunistische Staat Belgien schlug vor, ein Militärbündnis zu bilden, um die Revolution vor ihren Feinden zu schützen. Moskau ist weit weg, und wir müssen uns untereinander abstimmen."
 tblra.75.a:0 "Natürlich!"   
 tblra.75.b:0 "Lehnen Sie ihre Forderung ab."  
 tblra.76.t:0 "Belgien und die französische Kommune bemühen sich um gegenseitige militärische Unterstützung"
 tblra.76.d:0 "\n\nDie beiden kommunistischen Mächte des Westens sind sich näher gekommen, als sie die Unterzeichnung eines Vertrags über gegenseitige militärische Unterstützung zur Gewährleistung ihrer Sicherheit ankündigten. Dieses neue Bündnis, das gestern Morgen im Brüsseler Rathaus unterzeichnet wurde, trägt bereits den Namen „Brüsseler Pakt“ und könnte andere kommunistische Mächte anziehen, die sich nicht mit der Rücksichtslosigkeit des sowjetischen Regimes verbünden wollen."
 tblra.76.a:0 "Wir werden die Leuchtfeuer der Revolution sein"   
 tblra.76.b:0 "Eine weitere Bedrohung für das Establishment" 
 tblra.76.c:0 "Die Diplomatie verändert sich ebenso schnell wie die Politik"  
 tblra.77.t:0 "Die französisch-belgischen Verteidigungsverhandlungen scheiterten"
 tblra.77.d:0 "Während französische und belgische Diplomaten über ein gegenseitiges Verteidigungsabkommen verhandelten, schienen diese Gespräche lediglich auf ein großes Missverständnis hinauszulaufen. Die beiden Länder blieben bei ihren Positionen und konnten keine Einigung erzielen."
 tblra.77.a:0 "Wir waren einer historischen Einigung so nahe!"   
 tblra.77.b:0 "Diese Allianz sieht nicht wie eine Bedrohung aus" 
 tblra.77.c:0 "Solange sie untereinander streiten ..."
 tblra.78.t:0 "Belgien beeinflusst unsere Politik"
 tblra.78.d:0 "Wir haben vor kurzem bemerkt, dass das neue kommunistische Regime Belgiens versucht, Einfluss auf unsere Bevölkerung und einige unserer Politiker zu nehmen."
 tblra.78.a:0 "Unterstützung ist immer willkommen"   
 tblra.78.b:0 "Wie können sie es wagen!"   
 tblra.79.t:0 "Die Rückkehr Trotzkis Einflusses auf die belgischen Kommunisten"
 tblra.79.d:0 "Seit Leo Trotzki in der UdSSR wieder an die Macht kam, erregen Debatten die Kommunistische Partei. Zuvor marginalisierte Trotzkisten wollen die früheren Parteiführer ersetzen, die nach dem Sturz Stalins ohne externe Unterstützung dastanden."
 tblra.79.a:0 "Ein Kommunist ersetzt einen Kommunisten, na und?"   
 tblra.79.b:0 "Wir haben keine andere Wahl, als uns selbst zu kritisieren."
 tblra.79.c:0 "Wir werden den Daugismus, eine Variante des Trotzkismus, annehmen."
 tblra.79.e:0 "Wir werden Stalins Weg nicht verlassen!" 
 tblra.80.t:0 "Die Rückkehr des Trotzki-Einflusses auf die wallonischen Kommunisten"
 tblra.81.t:0 "Mitarbeiter De Clerq war gestorben!"
 tblra.81.d:0 "Berichten zufolge starb Staff De Clerq letzte Nacht an einem plötzlichen Herzinfarkt. Flämische Nationalisten trauern um ihn, da er der Anführer der flämischen Unabhängigkeitsbewegung war und sich für die Schaffung eines faschistischen flämischen Staates einsetzte. Er stellte sich sogar einen großen niederländischen Staat vor, der Französisch-Flandern, Flandern und die Niederlande umfassen würde."
 tblra.81.a:0 "De Leider ist tot! Er wird nie vergessen werden!"
 tblra.81.b:0 "Auf Nimmerwiedersehen!"
 tblra.84.t:0 "Die Demokratische Republik Kongo beeinflusst unsere Politik"
 tblra.84.d:0 "Wir haben vor kurzem bemerkt, dass das neue kommunistische Regime im Kongo versucht, Einfluss auf unsere Bevölkerung und einige unserer Politiker zu nehmen."
 tblra.84.a:0 "Unterstützung ist immer willkommen"   
 tblra.84.b:0 "Wie können sie es wagen!"   
 tblra.85.t:0 "Das Schicksal des Königs"
 tblra.85.d:0 "Da wir nun endlich die Macht in unseren Händen haben, müssen wir uns fragen, was wir mit dem König tun sollen. Während die Fanatiker argumentieren, er müsse dasselbe Schicksal erleiden wie Nikolaus II., argumentieren andere, er müsse wegen der Niederschlagung der Unruhen vor einigen Jahren ins Gefängnis gesteckt werden. Eine letzte Gruppe argumentiert, er sei nun ein machtloser Mann und müsse ins Exil gehen."
 tblra.85.a:0 "Bereiten Sie das Erschießungskommando vor!"   
 tblra.85.b:0 "Die Unterdrücker des Proletariats müssen eingesperrt werden!"
 tblra.85.c:0 "Setzen Sie diesen unbedeutenden Hanswurst auf ein Boot." 
 tblra.86.t:0 "Die Rückkehr Trotzkis Einflusses auf die flämischen Kommunisten"
 tblra.87.t:0 "Die Absetzung Leopolds III."
 tblra.87.d:0 "Mit der Kapitulation der belgischen Armee ergab sich sein König uns und ist nun unser Gefangener."
 tblra.87.a:0 "Eine wertvolle Geisel."
 tblra.88.t:0 "Der König der Belgier war freigelassen worden"
 tblra.88.d:0 "Leopold III., der König der Belgier, wurde von feindlichen Truppen befreit und ist nicht länger unser Gast."
 tblra.88.a:0 "Wir haben andere Sorgen."
 tblra.89.t:0 "Die Rückkehr des Königs?"
 tblra.89.d:0 "Mit der Freilassung Leopolds III. stellt sich die Frage nach seiner möglichen Rückkehr. Ihn zurückzurufen wäre zwar am einfachsten gewesen, doch seine Heirat mit seiner Geliebten und seine Weigerung, der Exilregierung zu folgen, sorgten für Unruhe in der Bevölkerung, und es gibt viele, die seine Rückkehr nicht wollen."
 tblra.89.a:0 "Er wird vorerst im Ausland bleiben."
 tblra.89.b:0 "Organisieren Sie seine Rückkehr." 
 tblra.90.t:0 "Die Monarchie wiederhergestellt!"
 tblra.90.d:0 "Als Folge des Erfolgs der antikommunistischen Kräfte wurde der belgische König Leopold III. aus seiner Zelle entlassen und erhält seine königliche Macht zurück. Um dies zu gewährleisten, wird er vor dem neuen Parlament seinen Eid erneuern und die Freiheiten und Gesetze des belgischen Volkes schwören." 
 tblra.90.a:0 "Le Roi, la Loi, la Liberté! Für den Anfang, für die Freiheit und für das Recht!"
 tblra.90.b:0 "Gott beschützt das freie Belgien und seinen König!"
 tblra.91.t:0 "Der König der Belgier wurde befreit und wieder auf seinen Thron gesetzt!"
 tblra.91.d:0 "\nDer Erfolg der antikommunistischen Kräfte führte zur Freilassung des belgischen Königs Leopold III. aus seiner Zelle, die er in einer privaten Bemerkung als „den nassen Trog des St. Leonards-Gefängnisses“ bezeichnete. Er zog feierlich in die Hauptstadt ein, während die Straßen überfüllt waren, um die Rückkehr des Monarchen zu feiern. Die Parade war jedoch kurz, da man befürchtete, kommunistische Sympathisanten könnten versuchen, ihn zu töten. Nachdem er seinen Eid erneuert hatte, die Gesetze des Landes zu schützen, wurde er vom neuen Parlament gefeiert."
 tblra.91.a:0 "Interessant!"
 tblra.91.b:0 "Le Roi, la Loi, la Liberté! Für den Anfang, für die Freiheit und für das Recht!"
 tblra.92.t:0 "Die Rückkehr des Königs!" 
 tblra.92.d:0 "Nach der Vernichtung der kommunistischen Tyrannei wurden die Monarchie und die Freiheit unseres Volkes wiederhergestellt!"
 tblra.92.a:0 "Le Roi, la Loi, la Liberté! Für den Anfang, für die Freiheit und für das Recht!"
 tblra.92.b:0 "Gott beschützt das freie Belgien und seinen König!"  
 tblra.93.t:0 "Der König der Belgier kehrt in sein Land zurück und erobert seinen Thron zurück!"
 tblra.93.d:0 "\nNach dem Erfolg der antikommunistischen Kräfte kehrte der belgische König Leopold III. aus dem Exil zurück. Er hielt seinen freudigen Einzug ab und paradierte durch die Straßen voller Menschen, die den wieder eingesetzten Monarchen sehen wollten. Dieser Einzug dauerte jedoch relativ kurz, da die Sicherheitsvorkehrungen sehr streng waren. Während er bei seinem ersten Auftritt nach dem Tod Alberts I. noch zu Pferd paradierte, musste er dies diesmal aus Angst vor einem kommunistischen Attentat in einem verstärkten Wagen tun. Er wurde vom neuen Parlament gefeiert und bekräftigte sein Gelübde, die Gesetze und Freiheiten des belgischen Volkes zu schützen."
 tblra.93.a:0 "Interessant!"
 tblra.93.b:0 "Le Roi, la Loi, la Liberté! Für den Anfang, für die Freiheit und für das Recht!"   
 tblra.94.t:0 "Der König der Belgier ins Exil geschickt!"
 tblra.94.d:0 "Nachdem Leopold III., der belgische König, der Gefangennahme durch kommunistische Revolutionäre entgangen war, wurde ihm von der neuen Regierung befohlen, auf seinen Thron zu verzichten und Belgien für immer zu verlassen. Dies ist ein trauriger Tag für den König, da er sein Versagen bei der Eindämmung des Kommunismus in seinem Land markiert und möglicherweise das letzte Mal sein wird, dass er belgischen Boden betritt. \n Inzwischen haben die Revolutionäre erste Maßnahmen ergriffen, um den Kollektivierungsprozess einzuleiten."
 tblra.94.a:0 "Ein weiterer Tyrann war vertrieben worden!"
 tblra.94.b:0 "Eine Veränderung zum Schlechteren, ganz sicher"   
 tblra.95.t:0 "Der König der Belgier wurde von den Revolutionären eingesperrt!"
 tblra.95.d:0 "Leopold III., der belgische König, wurde während des kommunistischen Putsches gefangen genommen und ins Gefängnis gesteckt. Das Revolutionskomitee hatte bereits angekündigt, ihn wegen seiner Unterdrückung des Proletariats vor Gericht zu stellen. Der König ist nur eine von vielen politischen Persönlichkeiten, die in den Stunden nach der kommunistischen Machtübernahme verhaftet wurden. Wer fliehen konnte, verließ das Land wie Antilopen vor einem Löwenrudel. Es scheint, dass einige der Geflohenen bereits über die Gründung eines Befreiungskomitees sprechen, um das neue kommunistische Regime Belgiens zu stürzen."
 tblra.95.a:0 "Ein weiterer Tyrann wird für seine Verbrechen bezahlen!"
 tblra.95.b:0 "Diese Kommunisten sind wirklich beunruhigend" 
 tblra.96.t:0 "Der König der Belgier wurde von Revolutionären hingerichtet!"
 tblra.96.d:0 "\nDie Nachrichtenkorrespondenten berichteten über die Ereignisse in Belgien, dass König Leopold III. von den Revolutionären gefangen genommen und umgehend hingerichtet worden war. Diese Nachricht schockierte die Traditionalisten. Kardinal Van Roey, der der Gefangennahme nur knapp entging, hatte bereits verkündet, Leopold sei ein Märtyrer des christlichen Glaubens und werde sich beim Papst für seine Seligsprechung einsetzen.\n\n Diese Hinrichtung zeigt die Entschlossenheit der Revolutionäre, die wie zuvor die Bolschewiken bereit waren, zu morden, um ihre Ziele zu erreichen und ihre sozialistische Utopie Wirklichkeit werden zu lassen."
 tblra.96.a:0 "Dieser Tyrann wird das Proletariat nicht mehr unterdrücken!"
 tblra.96.b:0 "Ein weiteres Zeugnis kommunistischer Barbarei"
 tblra.97.t:0 "Die Niederlande haben Verhandlungen über eine gegenseitige Verteidigungskooperation aufgenommen"
 tblra.97.d:0 "Die Außen- und Verteidigungsminister Belgiens, der Niederlande und Luxemburgs haben Verhandlungen zum Ausbau ihrer Zusammenarbeit aufgenommen. Während zuvor bereits Zölle abgeschafft und andere Handelsbeschränkungen abgebaut wurden, soll nun auf dem regionalen Gipfel ein Abkommen zur Ausweitung der militärischen Zusammenarbeit ausgehandelt werden. Sollten die Verhandlungen erfolgreich sein, würde jeder Angriff auf ein Benelux-Land als Angriff auf alle anderen Länder des geplanten Bündnisses gewertet."
 tblra.97.a:0 "Wir hoffen, gemeinsam unsere Neutralität zu wahren."
 tblra.97.b:0 "Eine interessante Entwicklung."    
 tblra.98.t:0 "Die dreigliedrigen Verhandlungen der Niederlande sind gescheitert!"
 tblra.98.d:0 "Der belgische Außenminister gab heute bekannt, dass die dreigliedrige Kommission, die den Grundstein für ein gegenseitiges Verteidigungsabkommen zwischen Belgien, den Niederlanden und Luxemburg legen sollte, gescheitert sei, da sich die verschiedenen Delegationen nicht auf eine gemeinsame Strategie einigen konnten. Da eine militärische Zusammenarbeit nun unmöglich erscheint, müssen sich die drei Länder in naher Zukunft wohl auf sich selbst verlassen und sich möglicherweise nach neuen Partnern umsehen."
 tblra.98.a:0 "Es war sowieso ihre Schuld."
 tblra.98.b:0 "Ist es wirklich so wichtig?"   
 tblra.99.t:0 "Lassen wir unsere koloniale Vergangenheit beiseite"
 tblra.99.d:0 "Nachdem wir nun unsere Unabhängigkeit gesichert haben, sollten wir unsere koloniale Vergangenheit hinter uns lassen und die wahren Namen unserer wichtigsten Städte wiederherstellen."
 tblra.99.a:0 "Kinshasa ist unsere Hauptstadt!"
 tblra.99.b:0 "Warum sich die Mühe machen?" 
 tblra.100.t:0 "Die Wiederherstellung der kolonialen Stadtnamen"
 tblra.100.d:0 "Da der Kongo nun wieder unter unserer Kontrolle ist, sollten wir den Städten der Kolonie den Namen wiederherstellen."
 tblra.100.a:0 "Lass es uns tun."
 tblra.100.b:0 "Ist es wirklich so wichtig?" 
 
 tblra.101.t:0 "Kämpferwettbewerb"
 tblra.101.desc:0 "Eine aktuelle Studie zum modernen Luftkampf hat eine kritische Schwäche unserer Luftwaffe aufgezeigt. Unsere Kampfflugzeuge hinken der Entwicklung anderer Länder deutlich hinterher. Das Luftfahrtministerium hat ein Schnellprogramm gestartet, um so schnell wie möglich ein modernes Kampfflugzeug zu beschaffen. Da die Entwicklung im Inland unzumutbar lange dauern würde, wurde beschlossen, eine Lizenz im Ausland zu erwerben. Ein zusätzliches Budget wurde bewilligt.\n\nExperten sind sich uneinig, welcher Flugzeugtyp für die Modernisierung unserer Jagdgeschwader am besten geeignet wäre."
 tblra.101.a:0 "Ein leichter Abfangjäger, der von Avions Fairey gebaut wird"
 tblra.101.b:0 "Ein großer, schwerer Jäger, der von der Sabca gebaut wird."
 tblra.102.t:0 "Leichter Kampfflugzeugwettbewerb"
 tblra.102.desc_light_fighter:0 "Das Verteidigungsministerium sucht nach einem neuen leichten Kampfflugzeug, das den Luftraum schützen soll. Das Auswärtige Amt lehnte das Projekt zwar nicht ab, meinte aber, dass politische und diplomatische Bedenken bei der Entscheidung, von welchem Land die Flugzeuge gekauft werden, ebenfalls eine Rolle spielen sollten."
 tblra.102.desc_light_fighter_refused:0 "Unter Berufung auf die nationale Sicherheit hat die [From.GetAdjective]-Regierung die Erteilung einer Produktionslizenz verweigert. Möglicherweise haben wir anderswo bessere Chancen, oder wir können als Notlösung die Modernisierung unserer vorhandenen Flugzeuge in Betracht ziehen."
 tblra.102.a:0 "Anfahrt Deutschland"
 tblra.102.b:0 "Anfahrt Italien"
 tblra.102.c:0 "Anfahrt Frankreich"
 tblra.102.d:0 "Nähern Sie sich Großbritannien"
 tblra.102.e:0 "Nähern Sie sich den USA"
 tblra.102.f:0 "Die Erfahrungen aus dem Wettbewerb nutzen, um unsere eigenen Flugzeuge zu verbessern."
 tblra.103.t:0 "Wettbewerb für schwere Kampfflugzeuge"
 tblra.103.desc_heavy_fighter:0 "Das Luftfahrtministerium ist bestrebt, einen neuen schweren Kampfjet für die Langstreckenabfangjagd und die Bomberbegleitung zu beschaffen. Das Außenministerium hat jedoch angedeutet, dass bei der Entscheidung, von welchem Land der Kauf getätigt wird, auch politische und diplomatische Erwägungen eine Rolle spielen sollten."
 tblra.103.desc_heavy_fighter_refused:0 "Unter Berufung auf die nationale Sicherheit hat die [From.GetAdjective]-Regierung die Erteilung einer Produktionslizenz verweigert. Möglicherweise haben wir anderswo bessere Chancen, oder wir können als Notlösung die Modernisierung unserer vorhandenen Flugzeuge in Betracht ziehen."
 tblra.104.t:0 "[From.GetAdjective] Kämpferwettbewerb"
 tblra.104.desc:0 "Die [From.GetAdjective] Luftwaffe führt derzeit Tests für einen neuen leichten Kampfjet durch. Laut unserem Luftattaché hat unser neuestes Modell gute Aussichten auf Erfolg. Eine formelle Anfrage der [From.GetAdjective] Regierung wird in Kürze erwartet. \n\nVertreter des Herstellers befürworten den Verkauf ausdrücklich, es bestehen jedoch Bedenken hinsichtlich der nationalen Sicherheit hinsichtlich des Verkaufs unserer modernsten Ausrüstung an ein anderes Land. Sollten wir den Verkauf zulassen?"
 tblra.104.a:0 "Absolut."
 tblra.104.b:0 "Wir können keine Lecks riskieren."
 tblra.105.desc:0 "Die [From.GetAdjective] Luftwaffe führt derzeit Tests für einen neuen schweren Kampfjet durch. Laut unserem Luftattaché hat unser neuestes Modell gute Aussichten auf Erfolg. Eine formelle Anfrage der [From.GetAdjective] Regierung wird in Kürze erwartet. \n\nVertreter des Herstellers befürworten den Verkauf ausdrücklich, es bestehen jedoch Bedenken hinsichtlich der nationalen Sicherheit hinsichtlich des Verkaufs unserer modernsten Ausrüstung an ein anderes Land. Sollten wir den Verkauf zulassen?"
 tblra.106.t:0 "Kämpferwettbewerb abgeschlossen"
 tblra.106.desc:0 "Nach Verhandlungen mit dem Hersteller und staatlichen Stellen haben wir erfolgreich eine Produktionslizenz für ein neues Kampfflugzeug erhalten. Ein Exemplar des Flugzeugs ist bereits eingetroffen, um Mechaniker in der Wartung zu schulen. Ein vollständiger Satz Zeichnungen und Baupläne wird in Kürze erwartet. Die Produktion kann jederzeit beginnen."
 tblra.106.a:0 "Sauber."
 
 
 tblra.107.t:0 "Bomber-Wettbewerb"
 tblra.107.desc:0 "Eine Studie des Luftfahrtministeriums hat ergeben, dass unsere Luftstreitkräfte für die Unterstützung der Armee unzureichend ausgerüstet sind. Luftangriffe auf große Entfernungen und Luftnahunterstützung gelten als Schlüsselbereiche mit erheblichen Defiziten. Die Regierung hat Gelder für ein Sofortprogramm zur Anschaffung eines modernen Bombers bereitgestellt, doch wir müssen uns entscheiden, welches Flugzeug wir beschaffen."
 tblra.107.a:0 "Ein kleiner Bomber zur Nahunterstützung."
 tblra.107.b:0 "Ein größeres Flugzeug mit größerer Reichweite."
 tblra.108.t:0 "Leichtbomber-Wettbewerb"
 tblra.108.desc_cas:0 "Das Luftfahrtministerium möchte einen neuen leichten Bomber zur Unterstützung der Bodentruppen beschaffen, doch das Außenministerium hat angedeutet, dass bei der Entscheidung, von welchem Land der Bomber gekauft wird, auch politische und diplomatische Erwägungen eine Rolle spielen sollten."
 tblra.108.desc_cas_refused:0 "Unter Berufung auf die nationale Sicherheit hat die [From.GetAdjective]-Regierung die Erteilung einer Produktionslizenz verweigert. Möglicherweise haben wir anderswo bessere Chancen, oder wir können als Notlösung die Modernisierung unserer vorhandenen Flugzeuge in Betracht ziehen."
 tblra.108.a:0 "Anfahrt Deutschland"
 tblra.108.b:0 "Anfahrt Italien"
 tblra.108.c:0 "Anfahrt Frankreich"
 tblra.108.d:0 "Nähern Sie sich Großbritannien"
 tblra.108.e:0 "Nähern Sie sich den USA" 
 tblra.109.t:0 "Wettbewerb für mittlere Bomber"
 tblra.109.desc_tac:0 "Das Luftfahrtministerium möchte einen neuen Mittelstreckenbomber für Langstreckenangriffe und taktische Luftangriffe beschaffen. Das Außenministerium hat jedoch angedeutet, dass bei der Entscheidung, von welchem Land der Bomber gekauft wird, auch politische und diplomatische Erwägungen eine Rolle spielen sollten."
 tblra.109.desc_tac_refused:0 "Unter Berufung auf die nationale Sicherheit hat die [From.GetAdjective]-Regierung die Erteilung einer Produktionslizenz verweigert. Möglicherweise haben wir anderswo bessere Chancen, oder wir können als Notlösung die Modernisierung unserer vorhandenen Flugzeuge in Betracht ziehen."
 tblra.109.a:0 "Anfahrt Deutschland"
 tblra.109.b:0 "Anfahrt Italien"
 tblra.109.c:0 "Anfahrt Frankreich"
 tblra.109.d:0 "Nähern Sie sich Großbritannien"
 tblra.109.e:0 "Nähern Sie sich den USA"  
 tblra.110.t:0 "[From.GetAdjective] Bomber-Wettbewerb"
 tblra.110.desc:0 "Die [From.GetAdjective] Luftwaffe führt derzeit Tests für einen neuen leichten Bomber durch. Laut unserem Luftattaché hat unser neuestes Modell gute Aussichten auf Erfolg. Eine formelle Anfrage der [From.GetAdjective] Regierung wird in Kürze erwartet. \n\nVertreter des Herstellers befürworten den Verkauf ausdrücklich, es bestehen jedoch Bedenken hinsichtlich der nationalen Sicherheit hinsichtlich des Verkaufs unserer modernsten Ausrüstung an ein anderes Land. Sollten wir den Verkauf zulassen?"
 tblra.110.a:0 "Zeigen wir ihnen unsere Designs."
 tblra.110.b:0 "Daran haben wir kein Interesse." 
 
 tblra.111.t:0 "[From.GetAdjective] Bomber-Wettbewerb"
 tblra.111.desc:0 "Die [From.GetAdjective] Luftwaffe führt derzeit Tests für einen neuen Mittelstreckenbomber durch. Laut unserem Luftattaché hat unser neuestes Modell gute Aussichten auf Erfolg. Eine formelle Anfrage der [From.GetAdjective] Regierung wird in Kürze erwartet. \n\nVertreter des Herstellers befürworten den Verkauf ausdrücklich, es bestehen jedoch Bedenken hinsichtlich der nationalen Sicherheit hinsichtlich des Verkaufs unserer modernsten Ausrüstung an ein anderes Land. Sollten wir den Verkauf zulassen?"
 tblra.111.a:0 "Zeigen wir ihnen unsere Designs."
 tblra.111.b:0 "Daran haben wir kein Interesse."
 tblra.112.t:0 "Bomber-Wettbewerb abgeschlossen"
 tblra.112.desc:0 "Nach Verhandlungen mit dem Hersteller und staatlichen Stellen haben wir erfolgreich eine Produktionslizenz für einen neuen Bomber erhalten. Ein Exemplar des Flugzeugs ist bereits eingetroffen, um Mechaniker in der Wartung zu schulen. Ein vollständiger Satz Zeichnungen und Baupläne wird in Kürze erwartet. Die Produktion kann jederzeit beginnen."
 tblra.112.a:0 "Sauber." 
 tblra.113.t:0 "Die Belgier wollen mit uns einen leichten Bomber entwickeln"
 tblra.113.desc:0 "Die Belgier haben uns vorgeschlagen, ihr Wissen zu teilen, um der SABCA die Entwicklung eines leichten Bombers in Zusammenarbeit mit Caproni zu ermöglichen. Dadurch könnten wir wertvolle Erfahrungen sammeln, während die Belgier ein modernes Flugzeug zur Luftnahunterstützung erhalten würden."
 tblra.113.a:0 "Wir können nur davon profitieren"
 tblra.113.b:0 "Wir bevorzugen Autarkie" 
 tblra.114.t:0 "Die Italiener haben unsere gemeinsame Entwicklungsvereinbarung akzeptiert"
 tblra.114.desc:0 "Die italienische Regierung hat die Zusammenarbeit zwischen SABCA und Caproni zum Bau eines neuen Flugzeugs für die belgische Armee genehmigt."
 tblra.114.a:0 "Das sind großartige Neuigkeiten"
 tblra.115.t:0 "Die französischen Garantien für Belgien"
 tblra.115.desc:0 "Belgien steht seit Jahrzehnten unter dem Schutz Frankreichs. Dies geht auf die belgische Revolution zurück, als ein französisches Expeditionskorps 1831 den niederländischen Gegenangriff abwehrte und die Unabhängigkeit der südlichen Niederlande sicherte. Seit dem Ende des Ersten Weltkriegs pflegen wir enge Beziehungen zur belgischen Armee, um unsere Aktionen im Konfliktfall zu koordinieren. Wir schützen Belgien und werden dafür garantieren."
 tblra.115.a:0 "Unsere Position zu dieser Angelegenheit ist klar."
 tblra.116.t:0 "Neutralitätserklärung"
 tblra.116.desc:0 "Nach einer hitzigen Debatte sind wir zu dem Schluss gekommen, dass die fortgesetzte militärische Zusammenarbeit mit der französischen Regierung ein Risiko für die belgische Sicherheit darstellt, da sie das Land in einen neuen Konflikt zwingen könnte. Um Belgien eine neue Katastrophe ähnlich der Verwüstung durch die deutsche Offensive von 1914 zu ersparen, müssen wir auf französische Garantien verzichten."
 tblra.116.a:0 "Wir werden unsere Entscheidung dem Völkerbund mitteilen"
 tblra.117.t:0 "Belgien verzichtet auf französischen Schutz"
 tblra.117.desc:0 "Nach einer hitzigen Debatte hat die belgische Regierung beschlossen, vorerst eine strikt neutrale Haltung einzunehmen und alle Grenzen gleichermaßen zu schützen. Diese Entscheidung wurde teilweise aufgrund der Unterstützung flämischer Nationalisten getroffen, die diese Garantien und den französischen Einfluss auf das Militär als skandalöse Einmischung einer ausländischen Regierung in unsere inneren Angelegenheiten betrachteten."
 tblra.117.a:0 "Wir respektieren diese Entscheidung."
 tblra.117.b:0 "Wir respektieren diese Entscheidung."
 tblra.117.c:0 "Interessant."
 tblra.118.t:0 "Flämische Abgeordnete wollen absolute Neutralität"
 tblra.118.desc:0 "„Keine französische Intervention mehr!“ Dieser und andere Slogans sind das neue Motto der flämischen Nationalisten. Sie fordern, auf den französischen Schutz zu verzichten und stattdessen eine strikt neutrale Politik zu verfolgen. Diese Position, die im völligen Bruch mit der diplomatischen Situation Belgiens der letzten 18 Jahre steht, soll uns Sicherheit geben, da enge Beziehungen zu Frankreich im Falle eines neuen deutsch-französischen Konflikts nur eine Neuauflage des Schlieffen-Plans ermöglichen würden. Doch diese Position wird nicht nur von flämischen Nationalisten unterstützt, sondern auch von führenden französischsprachigen Politikern wie Paul-Henri Spaak. Gerüchten aus dem Königspalast zufolge würde sogar der König selbst eine solche Entscheidung unterstützen."
 tblra.118.a:0 "Akzeptieren Sie ihre Forderungen"
 tblra.118.b:0 "Wir werden uns ihrem Willen nicht beugen."
 tblra.119.t:0 "Paul-Henri Spaak stellt ein Ultimatum"
 tblra.119.desc:0 "Paul-Henri Spaak, einer der führenden sozialistischen Politiker, hat mit seinem Rücktritt gedroht, sollte nicht schnellstmöglich eine neutrale Außenpolitik umgesetzt werden. Ein Rücktritt der Sozialisten würde die Dreierkoalition, die seit den letzten Parlamentswahlen den Mittelpunkt der belgischen Politik bildete, zerbrechen. Die logische Konsequenz wäre, dass Katholiken und Liberale gemeinsam eine Regierung bilden, um ihre Beziehungen zu Frankreich und Großbritannien zu stärken."
 tblra.119.a:0 "Stimmen Sie Spaaks Ultimatum zu"
 tblra.119.b:0 "Wir werden ohne sie eine Regierung bilden."
 tblra.120.t:0 "Der französischen Entente beitreten?"
 tblra.120.desc:0 "Das französische Engagement für den Schutz der anderen europäischen Nationen scheint klar und deutlich. Sie haben eine sogenannte Entente gebildet, um den Kontinent vor der Bedrohung durch Tyrannen zu schützen. Aufgrund unserer Position und unserer klar pro-französischen Politik wäre es für uns selbstverständlich, diesem Bündnis beizutreten, um unsere eigene Sicherheit zu gewährleisten. Die einzige praktikable Alternative wäre ein starkes Bündnis mit Großbritannien, das uns zunächst geheime und dann konkrete Unterstützung für unsere Strategie sichert."
 tblra.120.a:0 "Unsere Hymne wird jedoch weiterhin nicht die Marseillaise sein."
 tblra.120.b:0 "Lasst uns stattdessen die diplomatischen Beziehungen zu Großbritannien schließen"  
 tblra.121.t:0 "Faschistische Versammlung von militanten Kommunisten gestört"
 tblra.121.desc:0 "Gestern Abend kam es zu gewalttätigen Übergriffen kommunistischer Sympathisanten auf eine faschistische Kundgebung. Sie warfen Steine und schlugen, um die Kundgebung zu stören. Die gewalttätigen Reaktionen der Faschisten führten zu einer angespannten Situation, die von der Polizei mit größter Sorgfalt unter Kontrolle gehalten wurde."
 tblra.121.a:0 "Ein notwendiger Schritt, um die Faschisten zu stoppen."
 tblra.121.b:0 "Eingreifen, um die Gewalt zu stoppen" 
 tblra.122.t:0 "Die Kommunisten organisieren massive Streiks"
 tblra.122.desc:0 "Um ihre Stärke gegenüber den unteren Schichten unserer Gesellschaft zu demonstrieren, organisierte die Kommunistische Partei einen massiven, aber hoffentlich kurzen Streik im ganzen Land. Obwohl sie diese Bewegung als Sieg bezeichnete, verdeutlichte sie die Kluft zwischen den Kommunisten und den demokratischen Parteien."
 tblra.122.a:0 "Arbeiter aller Länder, vereinigt euch!"
 tblra.122.b:0 "Verdammte Kommunisten!" 
 tblra.122.c:0 "Das reicht, schickt das Militär!"
 tblra.123.t:0 "Die Kommunisten organisieren einen Marsch auf Brüssel"
 tblra.123.desc:0 "Wie schon 1933 organisierte die belgische Kommunistische Partei einen Marsch nach Brüssel gegen den Hunger und für soziale Gerechtigkeit. Während kommunistische Sympathisanten Reformen zugunsten der Arbeiter fordern und die Veranstaltung als notwendigen Protest zur Verteidigung der Arbeiterschaft bezeichnen, befürchten die Behörden, dass diese Demonstration zu einem Aufstand gegen die demokratischen Institutionen ausarten könnte."
 tblra.123.a:0 "Verdammte Kommunisten!"
 tblra.123.b:0 "Das reicht, schickt das Militär!"
 tblra.124.t:0 "Xavier Relecom verhaftet!"
 tblra.124.desc:0 "Um den von der Kommunistischen Partei organisierten Streik zu unterdrücken, wurde gestern Abend einer ihrer wichtigsten Führer, Xavier Relecom, verhaftet. Er befindet sich derzeit in Haft, um seine Verwicklung in die jüngsten Unruhen zu untersuchen."
 tblra.124.a:0 "Die Polizei macht ihre Arbeit."
 tblra.125.t:0 "Erfolgreiches Rexist-Treffen"
 tblra.125.desc:0 "Gestern Abend füllte der Anführer von Rex, Léon Degrelle, einen großen Raum mit Sympathisanten und hielt eine lange Rede gegen die korrupte Natur der Institution und den Zerfall des Nationalgeistes."
 tblra.125.a:0 "„Rex Vaincra“, sagen sie …" 
 tblra.126.t:0 "Großes Rexist-Treffen"
 tblra.126.desc:0 "Gestern Nachmittag hielt Léon Degrelle eine große Versammlung im Freien ab. Er kam in einem schwarzen Cabrio an und marschierte an den Mitgliedern der rexistischen Miliz vorbei. Anschließend hielt er eine lange Rede, in der er das parlamentarische System und die Nachgiebigkeit der demokratischen Abgeordneten kritisierte. Diese eindrucksvolle Demonstration der Stärke war für die Sympathisanten eine Möglichkeit, ihre Unterstützung für die Bewegung zu demonstrieren. Gleichzeitig wirkte sie aus Sicht nichtfaschistischer Bürger wie eine große Militärparade, die die Demokratie bedrohte."
 tblra.126.a:0 "Unsere erhobene Hand ist das Zeichen unserer Bereitschaft zum Vaterland."
 tblra.126.b:0 "Das reicht, schickt das Militär!" 
 tblra.127.t:0 "Großes Treffen von Verdinaso"
 tblra.127.desc:0 "Gestern demonstrierte Joris Van Severen die Stärke seiner Bewegung, indem er bei einer Großveranstaltung einen großen organisierten Mob zusammentrommelte. In seiner Rede griff er das derzeitige politische System als korrupt und ineffizient an, das die Nation zerstöre."
 tblra.127.a:0 "Diese Bewegung wird jeden Tag größer."
 tblra.127.b:0 "Das reicht, schickt das Militär!" 
 tblra.128.t:0 "Großer Aufruhr zwischen Faschisten und Antifaschisten"
 tblra.128.desc:0 "Eine Gruppe organisierter faschistischer Schläger hat wiederholt antifaschistische Sympathisanten angegriffen, die gegen ihre letzte Versammlung protestierten. Dieser Vorfall eskalierte zu einem Aufruhr, bei dem Einrichtungen beschädigt und viele Beteiligte verletzt wurden – darunter auch einige Zuschauer, die mitten in der Schlägerei gefangen waren."
 tblra.128.a:0 "Politische Gewalt ist nicht die Lösung."
 tblra.128.b:0 "Greifen Sie so schnell wie möglich ein, um die Probleme zu beenden."
 tblra.129.t:0 "Léon Degrelle nach seinem letzten Treffen verhaftet"
 tblra.129.desc:0 "Aufgrund von Unruhen nach dem letzten faschistischen Treffen wurde Léon Degrelle von der Polizei festgenommen, um seine Verantwortung für die jüngsten Unruhen zu untersuchen."
 tblra.129.a:0 "Die Polizei macht ihre Arbeit."
 tblra.130.t:0 "Demokraten organisieren sich vor Ort, um den Faschismus zurückzuschlagen!"
 tblra.130.desc:0 "Es scheint, dass das letzte faschistische Treffen eher kontraproduktiv war, da es dieser Machtdemonstration gelang, einen Teil der Bevölkerung davon zu überzeugen, dass die Demokratie verteidigt werden muss."
 tblra.130.a:0 "Wer wird es ihnen verdenken?"
 tblra.131.t:0 "Die faschistische Fünfte Kolonne"
 tblra.131.desc:0 "Die deutsche Aggression zwingt uns, über das Schicksal potenzieller Sympathisanten des Feindes im Land zu entscheiden. Während Léon Degrelle offiziell erklärte, Rex sei neutral und würde Deutschland nicht bevorzugen, argumentieren einige, das Risiko sei zu groß, um es zu ignorieren. Der Staatsschutz hat bereits eine Liste prominenter Ultranationalisten, Unionisten und Separatisten wie August Borms, Léon Degrelle und Joris Van Severen erstellt. Sie könnten daher in einer großen Operation verhaftet werden. Doch durch eine Laune des Schicksals haben wir einen Brief von Joris Van Severen erhalten, in dem er uns bittet, die Eingliederung seiner faschistischen paramilitärischen „Zwarte Brigade“ in die Armee zu gestatten."
 tblra.131.a:0 "Sie könnten mit dem Feind zusammenarbeiten"
 tblra.131.b:0 "Folgen Sie Van Severens Idee und schicken Sie sie in die Armee"
 tblra.131.c:0 "Meinungsverschiedenheiten sind Teil des demokratischen Prozesses"
 tblra.132.t:0 "Syndikalist hilft, marxistische Ideen zu verbreiten"
 tblra.132.desc:0 "Ein örtlicher Syndikalist hat eine intensive Kampagne zur Förderung der kommunistischen Ideen organisiert. Er scheint viele neue Sympathisanten für unsere Sache gewonnen zu haben."
 tblra.132.a:0 "Wir sind die Zukunft!"
 tblra.133.t:0 "Bürgerliche Reaktionäre versuchen, die kapitalistischen Institutionen zu schützen"
 tblra.133.desc:0 "Als Reaktion auf unseren Aufstieg zur Vormachtstellung haben die Agenten der Kapitalisten beschlossen, ihre sogenannte „Freiheit“ zu schützen, um das Überleben der von der Bourgeoisie geschaffenen Institutionen zu sichern. Dieser Prozess wird wahrscheinlich nur vorübergehend sein, da die Arbeiter auf ihrem Weg zur Diktatur des Proletariats und zur Zerstörung der alten Welt nichts mehr aufhalten wird."
 tblra.133.a:0 "Wir haben die Zukunft gesehen, sie kämpfen gegen das Unvermeidliche"
 tblra.134.t:0 "Faschisten versammeln sich, um dem Aufstieg der Kommunisten entgegenzuwirken"
 tblra.134.desc:0 "Um das Unvermeidliche umzukehren, haben sich vermutlich von den Kapitalisten kontrollierte faschistische Reaktionärsgruppen organisiert und kommunistische Militante angegriffen."
 tblra.134.a:0 "Am Ende werden wir triumphieren!"
 tblra.135.t:0 "Mobilisierung für die Demokratie"
 tblra.135.desc:0 "Die Bedrohung durch faschistische und kommunistische Bewegungen hat eine Reaktion zur Unterstützung der demokratischen Institutionen hervorgerufen. Es haben sich Vereinigungen gebildet, um die Angriffe auf die öffentlichen Freiheiten anzuprangern und die Strukturen der belgischen Gesellschaft aufrechtzuerhalten."
 tblra.135.a:0 "Freiheiten müssen geschützt werden"
 tblra.136.t:0 "Die Force Publique fordert moderne Gewehre"
 tblra.136.desc:0 "Die Force Publique, die Sicherheitstruppe des belgischen Kongo, verfügt seit Jahren nicht über moderne Ausrüstung. Sie ist nicht nur als Kampftruppe zunehmend obsolet, sondern hat auch Schwierigkeiten, ihre alltäglichen Aufgaben der Strafverfolgung in den entlegenen Gebieten der Kolonie zu erfüllen. \n Um die Situation zu ändern, wurde im Rahmen eines umfassenden Plans zur Wiederherstellung der Leistungsfähigkeit der Kolonialtruppe moderne Ausrüstung angefordert."
 tblra.136.a:0 "Anweisungen an die Logistikabteilung senden"
 tblra.136.b:0 "Wir senden ihnen die technische Dokumentation zu."
 tblra.136.c:0 "Wir können kein Gewehr entbehren."
 tblra.137.t:0 "Belgien stimmt der Lieferung moderner Gewehre zu."
 tblra.137.desc:0 "Die belgische Regierung hat sich bereit erklärt, einen Teil der angeforderten FN-Gewehre zu liefern, um die Ausrüstung der Force Publique zu modernisieren."
 tblra.137.a:0 "Das sind großartige Neuigkeiten."
 tblra.138.t:0 "Belgien hat unseren Antrag abgelehnt."
 tblra.138.desc:0 "Die belgische Regierung hat sich geweigert, uns die angeforderten Gewehre zu liefern. Ohne Investitionen wird es für die Force Publique immer schwieriger, ihre täglichen Aufgaben effizient zu erfüllen."
 tblra.138.a:0 "Dann müssen wir sie selbst herstellen."
 tblra.139.t:0 "Die Kleinwaffen der Force Publique"
 tblra.139.desc:0 "Der erste Teil der Waffen, die wir der Force Publique zur Modernisierung ihrer Bewaffnung versprochen hatten, ist endlich fertig."
 tblra.139.a:0 "Senden Sie sie ohne Verzögerung." 
 tblra.139.b:0 "Stornieren Sie die Lieferung und behalten Sie die Waffen."
 tblra.140.t:0 "Zweite Waffenlieferung an die Force Publique"
 tblra.140.desc:0 "Die zweiten Teile der für Force Publique bestimmten Waffen sind fertig."
 tblra.140.a:0 "Sie kennen das Verfahren, weiter geht&#39;s."  
 tblra.141.t:0 "Die letzte Waffenlieferung des Kongo"
 tblra.141.desc:0 "Der letzte Teil der Kleinwaffen für den Versand in den Kongo ist endlich fertig."
 tblra.141.a:0 "Ich hoffe, dass sie ihre neuen Gewehre lieben werden."
 tblra.142.t:0 "Die Belgier weigern sich, die Waffen auszuliefern!"
 tblra.142.desc:0 "In einer überraschenden Wendung der Ereignisse beschlossen die Belgier, die versprochenen Waffenlieferungen zu behalten und zukünftige Lieferungen zu stornieren. Diese Entscheidung löste bei den Offizieren der Force Publique und der kongolesischen Regierung Wut aus. Der Mangel an Unterstützung und Verlässlichkeit der belgischen Regierung verstärkte das Gefühl, dass eine größere Autonomie der Kolonie notwendig sei, um realistische Ziele zu erreichen, mit oder ohne Zustimmung des Kolonialministeriums."
 tblra.142.a:0 "Das ist ein Skandal."  
 tblra.143.t:0 "Die erste Lieferung Gewehre ist eingetroffen"
 tblra.143.desc:0 "Wir haben den ersten Teil der von der belgischen Regierung versprochenen Waffen erhalten"
 tblra.143.a:0 "Hoffen wir, dass der Rest schnell folgt." 
 tblra.144.t:0 "Eine weitere Ladung Gewehre ist eingetroffen"
 tblra.144.desc:0 "Eine zweite Lieferung Kleinwaffen ist eingetroffen."
 tblra.144.a:0 "Es ist an der Zeit." 
 tblra.145.t:0 "Der letzte Teil der versprochenen Waffen wurde geliefert"
 tblra.145.desc:0 "Der letzte Teil der von der belgischen Regierung versprochenen Schusswaffen ist gerade in Matadi eingetroffen."
 tblra.145.a:0 "Es ist toll, dass sie ihr Wort gehalten haben." 

 tblra.146.t:0 "Belgien verhängt Ausnahmezustand"
 tblra.146.desc:0 "Um der wachsenden Bedrohung durch radikale Politiker zu begegnen, hat der belgische König Leopold III. beschlossen, das Militär zu mobilisieren. So überraschend dieser Schritt auch sein mag, Gerüchte besagen, dass diese radikale Entscheidung durch den britischen Druck auf das Land begünstigt wurde. In Belgien wurde nun das Kriegsrecht verhängt, und faschistische Politiker und ihre Sympathisanten werden repressiv verfolgt. Dennoch räumten viele von ihnen, mehr Royalisten als Faschisten, ihre Ansichten als kurzsichtig ein und stellten sich hinter den König. \n\nDie demokratischen Parteien sind sich in dieser Entwicklung uneinig. Während viele erleichtert sind, die Staatsfeinde niederzuschlagen, befürchten andere, dass die Ausnahmevollmachten verlängert und die demokratischen Institutionen obsolet werden könnten."
 tblra.146.a:0 "Interessant."
 tblra.146.b:0 "Heil dem König!" 
 tblra.147.t:0 "Belgien verhängt Ausnahmezustand"
 tblra.147.desc:0 "Um der wachsenden Bedrohung durch radikale Politiker zu begegnen, hat der belgische König Leopold III. beschlossen, das Militär zu mobilisieren. So überraschend dieser Schritt auch sein mag, Gerüchte besagen, dass diese radikale Entscheidung durch den britischen Druck auf das Land begünstigt wurde. In Belgien wurde nun das Kriegsrecht verhängt, und kommunistische Politiker und ihre Sympathisanten werden unterdrückt. Dennoch haben viele von ihnen, eher Royalisten als Faschisten, ihre Fehler eingestanden und sich hinter den König gestellt. Die demokratischen Parteien sind sich über diese Entwicklung uneinig. Während viele erleichtert sind, die Staatsfeinde niederzuschlagen, befürchten andere, dass die Ausnahmevollmachten verlängert und die demokratischen Institutionen obsolet werden könnten."
 tblra.147.a:0 "Interessant."
 tblra.147.b:0 "Heil dem König!" 
 tblra.148.t:0 "Der König der Belgier schlägt ein diplomatisches Abkommen vor."
 tblra.148.desc:0 "König Leopold III. war sich unserer Interventionspläne in ihrem Land bewusst, mit denen wir unsere Unterstützung an ihrer Seite sichern wollten. Daher schlug er eine friedlichere Lösung vor. Er würde das Kriegsrecht verhängen und selbst gegen radikale Politiker vorgehen, während wir ihre Unabhängigkeit und Neutralität wahren würden."
 tblra.148.a:0 "Das ist eine vernünftige Lösung."
 tblra.148.b:0 "Wir dürfen die Möglichkeit einer Invasion nicht ungenutzt lassen."
 tblra.149.t:0 "Die Briten lehnten unser Angebot ab."
 tblra.149.desc:0 "Die Briten haben uns mitgeteilt, dass sie unseren Vorschlag abgelehnt haben. Da eine britische Intervention weiterhin möglich ist, müssen wir unsere Anstrengungen verstärken, um die Faschisten und Kommunisten zu bekämpfen und gleichzeitig vorbereitet zu sein, solange sie sich auf dem Kriegspfad befinden."
 tblra.149.a:0 "Zeit, sich zu mobilisieren!"
 tblra.150.t:0 "Ein Beweis der Loyalität."
 tblra.150.desc:0 "In jüngster Zeit hat die pro-royalistische Propaganda zugenommen und wurde von Monarchisten, die das Land verteidigen wollen, mit Begeisterung aufgenommen. In Roeselare versammelten sich Menschen spontan, um vor einem großen Porträt des Königs Blumensträuße niederzulegen und so ihre Loyalität zu zeigen."
 tblra.150.a:0 "Es lebe Leopold!"
 tblra.151.t:0 "Die Gefahr einer britischen Intervention"
 tblra.151.desc:0 "Das britische Parlament hat dem Interventionsplan in Belgien zugestimmt. Die Möglichkeit einer Invasion rückt damit täglich in den Vordergrund. Da unsere diplomatischen Appelle zur Vermeidung eines neuen europäischen Konflikts taub erscheinen, befinden wir uns in einer Zwickmühle zwischen antidemokratischen politischen Diskursen und der Möglichkeit einer britischen Landung. Um aus dieser scheinbar ausweglosen Situation herauszukommen, traf sich der König mit der Regierung und dem Generalstabschef, um einen radikalen Aktionsplan zu besprechen, der den Briten unsere Entschlossenheit im Kampf gegen Faschisten und Kommunisten demonstrieren und so einen unnötigen Krieg vermeiden sollte."
 tblra.151.a:0 "Setzen Sie den Plan fort. Verhängen Sie das Kriegsrecht."
 tblra.151.b:0 "Das ist zu gefährlich." 
 tblra.152.t:0 "Das Kriegsrecht tritt in Kraft"
 tblra.152.desc:0 "Wie in der langen und ernsten Rede belgischer Radiosender dargelegt, ist im Land nun faktisch das Kriegsrecht verhängt. Divisionen wurden mobilisiert und an strategische Standorte entsandt, während der König die gesamte Operation vom militärischen Oberkommando in der Festung Breendonck aus befehligte. Die Hauptquartiere von Rex, der VNV, den belgischen Kommunistischen Parteien und anderen Organisationen der extremen Linken und Rechten werden derzeit von Polizeikräften mit Unterstützung des Militärs durchsucht. \n\n Der König hat nun faktisch die Kontrolle über das Land und ist bereit, dessen Unabhängigkeit zu wahren und gleichzeitig seinen eigenen Thron zu schützen."
 tblra.152.a:0 "Ein Schlag ins Herz unserer Feinde."
 tblra.152.b:0 "Ein Schlag ins Herz unserer Feinde." 

 tblra.153.t:0 "Die Säulenbildung tritt erneut auf."
 tblra.153.desc:0 "Mit der Rückkehr zu einer funktionierenden demokratischen Politik scheint sich die Gesellschaft neu zu organisieren und sich nicht mehr entlang der Parteilinien zu ordnen. Daher ist zu erwarten, dass die Versäulung auf die eine oder andere Weise erneut die Struktur der Gesellschaft prägen wird."
 tblra.153.a:0 "Die Gesellschaft, die wir kennen und lieben, kommt zurück." 
 #maybe add unique text for tblra.155
 tblra.156.t:0 "Das Ende Belgiens"
 tblra.156.desc:0 "Durch den Verlust der Hälfte der historischen Gebiete des Landes verschwand plötzlich die Bevölkerungstrennung zwischen Flamen und Flamen. Folglich muss die Regierung diese Veränderung berücksichtigen und anerkennen, dass die Institutionen des belgischen Staates nicht mehr repräsentativ sind."
 tblra.156.a:0 "Eine logische Weiterentwicklung"
 tblra.156.b:0 "Eine logische Weiterentwicklung"
 tblra.156.c:0 "Eine logische Weiterentwicklung"
 tblra.156.d:0 "Eine logische Weiterentwicklung"
 
 tblra.157.t:0 "Das Ende Belgiens"
 tblra.157.desc:0 "Durch den Verlust der Hälfte der historischen Gebiete des Landes verschwand plötzlich die Bevölkerungstrennung zwischen Flamen und Flamen. Folglich muss die Regierung diese Veränderung berücksichtigen und anerkennen, dass die Institutionen des belgischen Staates nicht mehr repräsentativ sind."
 tblra.157.a:0 "Eine logische Weiterentwicklung"
 tblra.157.b:0 "Eine logische Weiterentwicklung"
 tblra.157.c:0 "Eine logische Weiterentwicklung"
 tblra.157.d:0 "Eine logische Weiterentwicklung"
 
 tblra.158.t:0 "Der Aufstieg des flämischen Löwen"
 tblra.158.desc:0 "Mit dem Verlust der wallonischen Gebiete brach die ehemalige belgische Regierung zusammen. Mit dem Verlust des sprachlichen Gleichgewichts (begünstigt durch die französischsprachige Bevölkerung) gegenüber der nun überwältigenden Mehrheit der flämischen Bevölkerung beschloss das Land, sich als Flandern neu zu gründen. Flämische nationalistische Führer bezeichneten dies als den zweitgrößten Tag Flanderns seit der Schlacht der Goldenen Sporen im Jahr 1302."
 tblra.158.a:0 "Interessant" 
 
 tblra.159.t:0 "Der Wallonische Kongress verkündet die Reform Belgiens"
 tblra.159.desc:0 "Mit dem Verlust der flämischen Gebiete, einschließlich der ehemaligen Hauptstadt Brüssel, ist die belgische Regierung in Aufruhr. Um sich an die neuen politischen Realitäten anzupassen, wurde in Lüttich ein flämischer Kongress einberufen, um die Grundlage für einen flämischen Staat zu legen."
 tblra.159.a:0 "Interessant" 
 
 tblra.160.t:0 "Anpassung von Fall Gelb"
 tblra.160.desc:0 "Mit dem Verschwinden Belgiens müssen wir unseren Invasionsplan an die neue politische Realität anpassen."
 tblra.160.a:0 "Es wird einfacher sein."
 
 tblra.161.t:0 "Machtspiel im Kongo"
 tblra.161.desc:0 "Unter dem Einfluss eines anderen kommunistischen Landes ist eine Debatte über die Führung der kommunistischen Bewegung im Kongo entbrannt. Albert Decoster wird von manchen aufgrund seiner europäischen Herkunft als illegitim angesehen, andere würden lieber einen Afrikaner an der Spitze eines afrikanischen Landes sehen, selbst wenn er nur eine Galionsfigur ist."
 tblra.161.a:0 "Afrika muss von Afrikanern regiert werden."
 tblra.161.b:0 "Behalten Sie ihn in der Regierung."
 tblra.161.c:0 "Halten Sie ihn an der Macht."

 tblra.162.t:0 "Das neue Regime verändert die Landschaft"
 tblra.162.desc:0 "Das neue kommunistische Regime im Kongo kann den Triumph der Revolution nicht feiern, solange die Städtenamen noch immer Symbole der imperialistischen bürgerlichen Vergangenheit sind. Um dies zu ändern, müssen verschiedene Städte umbenannt werden, um die Helden der Revolution und die Inspiratoren des Proletariats zu ehren."
 tblra.162.a:0 "Ändern Sie alle Zeichen."
 tblra.162.b:0 "Ein atheistischer Staat glaubt nicht an Zeichen."
 
 tblra.164.t:0 "Bericht des Kolonialministeriums für 1935"
 tblra.164.desc:0 "Wir sind mit der Arbeit von Pierre Ryckmans im Kongo recht zufrieden, da er die Kolonialcharta recht gut umsetzt, auch wenn hier und da einige Verstöße gemeldet wurden.\nDie Wirtschaft erholt sich, und die Lage der Einheimischen hat sich seit 1909 drastisch verbessert. Darüber hinaus bringen der Bergbau und die Kautschukgewinnung erhebliche Einnahmen. Dennoch veraltet unsere Bergbauausrüstung, was die wirtschaftliche Leistungsfähigkeit der Kolonie in Zukunft gefährden könnte.\nWas die öffentliche Gewalt betrifft, so ist diese nahezu völlig desorganisiert. Die Soldaten sind fast ausschließlich mit veralteten Gewehren ausgerüstet, die Offiziere sind unmotiviert, sodass derzeit nur die grundlegendsten Sicherheitsmaßnahmen durchgeführt werden können.\n\nInzwischen hat der Völkerbund den Bericht von Eugéne Jungers über seine Arbeit in den Mandatskolonien Ruanda und Urundi genehmigt. Die Aufsicht über die Königreiche Mutara III in Ruanda und Mwambutsa IV in Urundi sollte somit ohne Zwischenfälle fortgesetzt werden. Daher sehen wir derzeit keine Notwendigkeit, die zivile Verwaltung zu ersetzen, aber eine dringende Überarbeitung unserer Sicherheitskräfte ist notwendig."
 tblra.164.a:0 "Wir haben viel zu tun!" 
 
 tblra.165.t:0 "Albertkanal fertiggestellt"
 tblra.165.desc:0 "Nach einem Jahrzehnt Arbeit wurde der Albertkanal endlich eingeweiht."
 tblra.165.a:0 "Eine großartige Leistung"  
 
 tblra.166.t:0 "Die Grabungen für den Albert-Kanal wurden eingestellt "
 tblra.166.desc:0 "Aufgrund des Krieges wurden die Bauarbeiten am Albertkanal kurz vor seiner Fertigstellung eingestellt."
 tblra.166.a:0 "Wir werden den Krieg gewinnen, den Frieden wiederherstellen und ihn beenden."  
 
 tblra.167.t:0 "Brüssel versprach technische Hilfe."
 tblra.167.desc:0 "Während wir um neue Gewehre baten, schickte die Regierung stattdessen technische Hilfe."
 tblra.167.a:0 "Es ist besser als nichts." 
 
 tblra.news.1.t:0 "Die niederländische Regierung beugt sich den belgischen Forderungen!"
 tblra.news.1.d:0 "\n\nDie niederländische Regierung akzeptierte die Bedingungen des belgischen Ultimatums und setzte sich damit einem starken kommunistischen Einfluss aus."
 tblra.news.1.a:0 "Tolle Neuigkeiten!"
 tblra.news.1.b:0 "Verdammte Belgier! Die dürften eigentlich gar nicht existieren."  
 tblra.news.1.c:0 "Jubelt, Arbeiter! Die Revolution breitet sich aus!" 
 tblra.news.1.e:0 "Ein weiteres Land, das sich vor einer ausländischen Aggression blamiert"
 tblra.news.2.t:0 "Die niederländische Regierung lehnt belgische Forderungen ab!"
 tblra.news.2.d:0 "\n\nDie niederländische Regierung lehnte das belgische Ultimatum mit der Begründung ab, dass sie diesen lächerlichen Forderungen nicht nachgeben werde. Sie fügte hinzu, dass sie bereit sei, jedes noch so kleine Stück Land gegen Wasser und andere Eindringlinge zu verteidigen."
 tblra.news.2.a:0 "Die Niederländer stellen sich gegen Aggression!"
 tblra.news.2.b:0 "Unsere niederländischen Verbündeten werden uns brauchen, seien wir bereit."  
 tblra.news.2.c:0 "Dies wird den Lauf der Geschichte nicht aufhalten!" 
 tblra.news.2.e:0 "Besorgniserregend!"
 tblra.news.3.t:0 "Die niederländische Regierung bittet die Alliierten um Hilfe!"
 tblra.news.3.d:0 "\n\nDie niederländische Regierung lehnte die belgischen Forderungen ab und bat die Alliierten um militärische Unterstützung im Falle einer belgischen Aggression."
 tblra.news.3.a:0 "Die Vereinten Nationen werden die Freiheit verteidigen!"
 tblra.news.3.b:0 "Die Feinde unserer Feinde sind (fast) unsere Freunde."  
 tblra.news.3.c:0 "Dies wird den Lauf der Geschichte nicht aufhalten!" 
 tblra.news.3.e:0 "Es wird einen kurzen Krieg geben, oder?"
 tblra.news.43.t:0 "Léon Degrelle proklamiert das Thiois-Reich"
 tblra.news.43.d:0 "In einer langen Rede, in der er die Werte der Nation und ihrer Armee lobte, verkündete Léon Degrelle, dass mit der Vereinigung mit den Niederlanden eine neue Ära für die wiedervereinigten Niederlande begonnen habe. Um diesen Wandel zu verdeutlichen, wird das Land nun „Thois Empire“ heißen. Um den Geist Kaiser Karls V. wiederzubeleben, rief er zur Wiedervereinigung des alten „Burgundischen Kreises“ in dieser neuen politischen Einheit auf."
 tblra.news.43.a:0 "Heute ist endlich ein imperiales Volk erwacht!"
 tblra.news.43.b:0 "Nach dem Land, das nicht existiert, dem Reich, das nicht existiert!"
 tblra.news.43.c:0 "Wir müssen unsere Karten ändern."
 tblra.news.44.t:0 "Joris Van Severen verkündet das Dietsche Rijk"
 tblra.news.44.d:0 "In einer langen Rede, in der er die Werte der Nation und ihrer Armee lobte, verkündete Joris Van Severen, dass mit der Vereinigung mit den Niederlanden eine neue Ära für die wiedervereinigten Niederlande begonnen habe. Um diesen Wandel zu verdeutlichen, wird das Land nun „Dietsche Rijk“ heißen. Um die Einheit des Landes wiederherzustellen, rief er zur Wiedervereinigung aller Erben der Niederlande zu diesem neuen politischen Gebilde auf."
 tblra.news.44.a:0 "Heute ist endlich ein imperiales Volk erwacht!"
 tblra.news.44.b:0 "Nach dem Land, das nicht existiert, dem Reich, das nicht existiert!"
 tblra.news.44.c:0 "Wir müssen unsere Karten ändern." 
 
