 COG_tac_bomber_equipment_0:0 "LACAB GR.8"
 COG_tac_bomber_equipment_0_short:0 "PRIMA"
 COG_tac_bomber_equipment_0_desc:0 "Die GR.8, genannt „Doryphore“ (was wegen ihrer schlechten Flugeigenschaften „Kartoffelkäfer“ bedeutet), wurde als Mehrzweckflugzeug für die belgische Luftwaffe gebaut. Sie sollte als Bomber, Aufklärungsflugzeug und schwerer Jäger dienen. Sie erfüllte die absurden Anforderungen der belgischen Armee aufs Wort ... und war folglich in all diesen Rollen schlecht."   
