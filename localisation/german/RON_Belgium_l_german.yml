 WLL_nav_bomber_equipment_2_desc:0 "Die Renard 37 war die erste Überarbeitung des R36-Prototyps. Die Baupläne zeigen drei mögliche Varianten: Bomber, Jäger und Küstenverteidigung. Letztere Version zeigt die R-37 mit einem 200-kg-Torpedo bewaffnet."
