 COG_heavy_fighter_equipment_3_short:0 "R-42"
 COG_heavy_fighter_equipment_3_desc:0 "Die R-42 ist ein zweimotoriger Langstreckenjäger der R-36 und nachfolgender Modelle (R-38, R-40), dessen Idee später in der amerikanischen F-82 Twin Mustang weiterentwickelt wurde. Kriegsbedingt existierte sie nur als Skizze." 
