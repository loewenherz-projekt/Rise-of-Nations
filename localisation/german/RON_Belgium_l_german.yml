 bel_cityfall.1.t:0 "Der Fall Berlins"
 bel_cityfall.1.d:0 "Siegreiche belgische Soldaten marschieren durch die Straßen Berlins, nachdem erbitterte Kämpfe um das Brandenburger Tor, den Reichstag und die Reichskanzlei ausgetragen haben.\n\nÜber dem Reichstag weht nun die belgische Flagge. Inzwischen werden Spezialeinheiten ausgesandt, um die Stadt zu durchsuchen und alle deutschen Beamten festzunehmen, die in der belagerten Stadt eingeschlossen sein könnten."
 bel_cityfall.1.a:0 "Der belgische Löwe brüllt wieder!"
 bel_cityfall.1.b:0 "Der belgische Löwe brüllt wieder!"
 bel_cityfall.1.c:0 "Belgische Schweinhunde!"
 bel_cityfall.2.t:0 "Der Fall Londons"
 bel_cityfall.2.d:0 "Siegreiche belgische Soldaten marschieren durch die Straßen Londons, nachdem sie fast den ganzen Tag erbitterte Kämpfe ausgetragen hatten. Obwohl die meisten Monumente der Stadt erhalten blieben, wurde die Tower Bridge zerstört, als britische Truppen versuchten, über die Brücke über die Themse zu gelangen. Belgische Artillerieangriffe zerstörten die Mitte, bevor sie die andere Seite erreichen konnten.\n\n Der Buckingham Palace ist heute das neue Hauptquartier der vorrückenden belgischen Truppen."
 bel_cityfall.2.a:0 "Der belgische Löwe brüllt wieder!"
 bel_cityfall.2.b:0 "Der belgische Löwe brüllt wieder!"
 bel_cityfall.2.c:0 "Warum haben wir ihnen 1914 geholfen?"
 bel_cityfall.3.t:0 "Der Fall Moskaus"
 bel_cityfall.3.d:0 "Siegreiche belgische Soldaten marschieren durch die Straßen Moskaus, nachdem sie den größten Teil des Tages heftig gekämpft hatten. Belgische Bataillone bezogen Stellung rund um den Roten Platz und in den beschädigten Gebäuden des Kremls. Die Türme der Basilius-Basilika überstanden wie durch ein Wunder den Artilleriebeschuss, ebenso wie der Turm des Brüsseler Rathauses im Jahr 1695."
 bel_cityfall.3.a:0 "Der belgische Löwe brüllt wieder!"
 bel_cityfall.3.b:0 "Der belgische Löwe brüllt wieder!"
 bel_cityfall.3.c:0 "Belgier? Hier?"
 bel_cityfall.4.t:0 "Der Untergang von Amsterdam"
 bel_cityfall.4.d:0 "Siegreiche belgische Soldaten marschieren durch die Straßen von Amsterdam, nachdem sie fast den ganzen Tag über heftig gekämpft hatten. Belgische Bataillone bezogen auf verschiedenen Brücken und den wichtigsten Plätzen der Stadt Stellung."
 bel_cityfall.4.a:0 "Der belgische Löwe brüllt wieder!"
 bel_cityfall.4.b:0 "Der belgische Löwe brüllt wieder!"
 bel_cityfall.4.c:0 "Wir hätten sie 1830 vernichten sollen."
 bel_cityfall.5.t:0 "Der Fall von Paris"
 bel_cityfall.5.d:0 "Siegreiche belgische Soldaten marschierten heute Morgen die Champs-Élysées entlang. Belgische Bataillone bezogen Stellung rund um den Eiffelturm, das Hotel Matignon und den Palais du Luxembourg. Während die Franzosen sich zurückzogen, nutzten einige belgische Offiziere die Gelegenheit, den Louvre zu besuchen, obwohl fast alles evakuiert worden war. Unterdessen erließ der Oberbefehlshaber der belgischen Streitkräfte eine Proklamation, in der er die Pariser aufforderte, die vorrückende Armee nicht zu fürchten, da sie sich menschlich verhalten würden. Er lobte diesen Tag zudem als die erste Besetzung von Paris seit dem Einmarsch der burgundischen Truppen im Jahr 1418 ... ein seltsamer Unterton angesichts der Massaker, die diesem Ereignis folgten."
 bel_cityfall.5-2.d:0 "Siegreiche belgische Soldaten marschierten heute Morgen über die Champs-Élysées. Belgische Bataillone bezogen Stellung rund um den Eiffelturm, das Hotel Matignon und den Palais du Luxembourg. Während die Franzosen sich zurückzogen, nutzten einige belgische Offiziere die Gelegenheit, den Louvre zu besuchen, obwohl fast alles evakuiert worden war. In der Zwischenzeit erließ der Oberbefehlshaber der belgischen Streitkräfte eine Proklamation, in der er die Pariser aufforderte, die vorrückende Armee nicht zu fürchten, da sie sich menschlich verhalten würden. Er verkündete außerdem, dass dieser historische Sieg das Ende der französischen Herrschaft über Flandern markierte, das drei Jahrhunderte lang von den imperialistischen Franzosen erobert und unterdrückt worden war." 
 bel_cityfall.5.a:0 "Der belgische Löwe brüllt wieder!"
 bel_cityfall.5.b:0 "Der belgische Löwe brüllt wieder!"
 bel_cityfall.5.c:0 "Sie können nicht einmal richtig rechnen und schlagen uns?"
 bel_cityfall.6.t:0 "Der Fall von Paris"
 bel_cityfall.6.d:0 "Siegreiche belgische Soldaten marschierten heute Morgen über die Champs-Élysées. Belgische Bataillone bezogen Stellung rund um den Eiffelturm, das Hotel Matignon und den Palais du Luxembourg. Während die Franzosen sich zurückzogen, nutzten einige belgische Offiziere die Gelegenheit, den Louvre zu besuchen, obwohl fast alles evakuiert worden war. In der Zwischenzeit erließ der Oberbefehlshaber der belgischen Streitkräfte eine Proklamation, in der er die Pariser aufforderte, die vorrückende Armee nicht zu fürchten, da sie sich human verhalten würden."
 bel_cityfall.6.a:0 "Der belgische Löwe brüllt wieder!"
 bel_cityfall.6.b:0 "Der belgische Löwe brüllt wieder!"
 bel_cityfall.6.c:0 "Sie können nicht einmal richtig rechnen und schlagen uns?"
 bel_cityfall.7.t:0 "Der Fall Jerusalems"
 bel_cityfall.7.d:0 "Siegreiche belgische Soldaten marschierten heute Morgen in die Altstadt von Jerusalem ein. Die Bataillone bezogen Stellung auf und um den Tempelberg und die Grabeskirche. Während die britischen Truppen zurückweichen, betraten belgische Offiziere die Grabeskirche, um vor dem Grab Christi zu beten und Gottfried von Bouillon, dem Eroberer Jerusalems während des Ersten Kreuzzugs, ihren Respekt zu erweisen. Léon Degrelle würdigte diesen großen Sieg als Zeichen der Gottesfürchtigkeit im Kampf der heiligen europäischen Zivilisation gegen die jüdisch-bolschewistische plutokratische Barbarei." 
 bel_cityfall.7.a:0 "Der belgische Löwe brüllt wieder!"
 bel_cityfall.7.b:0 "Deus Vult!"
 bel_cityfall.7.c:0 "Ein Gegenangriff ist zwingend erforderlich!"
 bel_cityfall.8.t:0 "Der Untergang Roms" 
 bel_cityfall.8.d:0 "Berichte bestätigten, dass belgische Truppen die Kontrolle über Rom übernommen hatten. Die letzten Verteidiger versuchten, die belgischen Truppen vor der Milviusbrücke aufzuhalten, wurden jedoch schnell in die Flucht geschlagen. Daraufhin marschierte eine belgische Vorhut durch die Porta del Popolo in Rom ein. Eine Abteilung wurde umgehend zum Vatikan und den Vertretern des Papstes entsandt, um ihm mitzuteilen, dass der Pontifex nichts zu befürchten habe und seine Sicherheit gewährleistet sei." 
 bel_cityfall.8.a:0 "Diese Belgier sind überall!"
 bel_cityfall.8.b:0 "Wir haben den gleichen Mut bewiesen wie Ambiorix!"
 bel_cityfall.8.c:0 "Wir dürfen die Roma nicht den Barbaren überlassen!"
 bel_cityfall.9.d:0 "Berichte bestätigen die Übernahme Roms durch belgische Truppen. Die letzten Verteidiger versuchten, die belgischen Truppen vor der Milviusbrücke aufzuhalten, wurden jedoch schnell zurückgeschlagen. Daraufhin marschierte eine belgische Vorhut durch die Porta del Popolo in Rom ein. Der belgische Kommandant verkündete, dies sei ein neuer Meilenstein in der römischen Geschichte, da das römische Volk nun frei von der Herrschaft eines ploutokratischen Senats oder despotischen religiösen Führers sei! In der Folge wurden Inschriften und Denkmäler, die an den Faschismus erinnern, systematisch zerstört. Der Aufenthaltsort des Papstes ist unbekannt, und während die Katholiken völlig schockiert sind, vergleichen einige Journalisten dieses Ereignis bereits mit der Plünderung Roms durch die Vandalen."
 bel_cityfall.9.b:0 "Es beweist, dass kein Gott den Papst beschützt!"
 
 
