 COG_support_african_diplomacy:0 "Kongolesische Afrikadiplomatie"
 cog_diplomacy_focus:0 "Kongolesischer diplomatischer Fokus"
 tblra_declared_neutrality:0 "Habe französische Garantien aufgegeben"
 tblra_neutrality_debate_over:0 "Die Neutralitätsdebatte ist vorbei"
 
 tblra_benelux_tech_sharing_group:0 "Wissenschaftliche Kommission der Benelux-Länder"
 tblra_benelux_tech_sharing_group_desc:0 "Da wir nur wenige Menschen mobilisieren können, ist technologische Überlegenheit der einzige Weg, um der militärischen Bedrohung unserer Zeit zu begegnen. Eine enge Zusammenarbeit der Benelux-Länder würde sicherstellen, dass das volle Potenzial unserer drei Armeen ausgeschöpft wird."
 benelux_research_name:0 "Benelux-Forschungskommission"
 benelux_research_desc:0 "Reduzieren Sie die Forschungszeit für Technologien, die bereits in anderen Benelux-Ländern erforscht wurden."
 belgium_research_name:0 "Belgische Forschungsgruppe"
 belgium_research_desc:0 "Reduzieren Sie die Forschungszeit für Technologien, die bereits in Belgien und im Kongo erforscht wurden."
 italian_research_name:0 "Italienische Forschungsgruppe"
 italian_research_desc:0 "Reduzieren Sie die Forschungszeit für Technologien, die Italien bereits erforscht hat. Zu diesen Technologien gehören riesige Armbrüste, Holzpanzer, muskelbetriebene Hubschrauber und furchterregende mobile schwere Pasta-Artillerie." 
 BEL_GATHERING_STORM_DESC:0 "Belgien mag wie ein unbedeutendes Gebiet zwischen Frankreich und Deutschland erscheinen, ist aber ein dicht industrialisiertes Land, das wertvolle Ressourcen aus seiner Kolonie Kongo gewinnt. Das Land erholt sich gerade von der Weltwirtschaftskrise, Infrastrukturprojekte laufen auf Hochtouren und die Industrie erholt sich langsam. Auf der politischen Bühne suchen immer mehr Wähler nach Lösungen in extremistischen Diskursen. Léon Degrelle gewinnt täglich an Popularität und könnte die traditionellen Koalitionen demokratischer Parteien bedrohen. Gleichzeitig sind auch die flämischen Nationalisten aktiv und schüren Zwietracht in den unteren Rängen des Militärs."
 COG_GATHERING_STORM_DESC:0 "Belgisch-Kongo ist offiziell eine belgische Kolonie und wird direkt von Brüssel aus regiert. In der Praxis genießt Generalgouverneur Pierre Ryckmans aufgrund der Entfernung zu Europa jedoch ein gewisses Maß an Autonomie. Als Ausbeutungskolonie, insbesondere im Zusammenhang mit dem „geologischen Skandal“ Katanga, verfügt der Kongo über reichhaltige Bodenschätze. Deren Abbau ist daher eine der Prioritäten der Kolonialverwaltung. Das Gebiet verfügt über reichlich Wolfram, Kupfer und Kautschuk und hat Zugang zu den reichsten Uranerzvorkommen der Welt."
 
 excavation_tech_research:0 "Kosten für Ausgrabungsforschung"
 construction_tech_research:0 "Kosten für Bauforschung"
 
 #flanders semi generic
 VLA_army_effort:0 "Organisieren Sie die neue Armee"
 VLA_army_effort_desc:0 "Trotz der zunehmenden Möglichkeiten der Luft- und Seekriegsführung bleibt der Bodenkampf auch in den Kriegen von morgen von zentraler Bedeutung. Mit entsprechender Vorbereitung können wir die Hölle der Schützengräben vermeiden."
 VLA_equipment_effort:0 "Modernisieren Sie die Ausrüstung"
 VLA_equipment_effort_desc:0 "Die Grenzen der Ausrüstung, die von Infanterie getragen werden kann, werden ständig erweitert. Wir werden uns darauf konzentrieren, unseren Truppen die beste verfügbare Ausrüstung zur Verfügung zu stellen."
 VLA_motorization_effort:0 "Motorisierte Unterstützung"
 VLA_motorization_effort_desc:0 "Mobilität und Schutz sind entscheidend für den sicheren Transport der Infanterie ins Feld und wieder hinaus. Wenn wir uns auf diese Entwicklungen konzentrieren, können wir schnell handeln."
 VLA_doctrine_effort:0 "Neue Taktiken entwickeln"
 VLA_doctrine_effort_desc:0 "Die militärischen Doktrinen, die den Bodenkampf im Ersten Weltkrieg bestimmten, sind überholt. Wir müssen unsere besten Köpfe mit der Aufgabe betrauen, das militärische Denken von morgen zu gestalten."
 VLA_equipment_effort_2:0 "Fortsetzung der Ausrüstungsreform"
 VLA_equipment_effort_2_desc:0 "Wir werden unsere Bemühungen fortsetzen, sicherzustellen, dass unsere Infanterie- und Unterstützungstruppen mit der bestmöglichen Ausrüstung unserer Zeit ausgestattet sind."
 VLA_mechanization_effort:0 "Eine mechanisierte Infanterie"
 VLA_mechanization_effort_desc:0 "Indem wir die Möglichkeiten der motorisierten Infanterie überdenken, können wir die Grenzen der heute konstruierbaren Fahrzeuge erweitern."
 VLA_doctrine_effort_2:0 "Groß angelegte Übungen"
 VLA_doctrine_effort_2_desc:0 "Das Schlachtfeld hat sich nicht nur in der Zwischenkriegszeit, sondern auch im Verlauf der jüngsten Konflikte verändert. Wir müssen unsere Doktrinen kontinuierlich neu bewerten, um dies widerzuspiegeln."
 VLA_equipment_effort_3:0 "Die militärische Modernisierung abschließen"
 VLA_equipment_effort_3_desc:0 "Anstatt ausländische Ausrüstung zu imitieren oder zu kaufen, sollten wir darauf abzielen, weltweit führend im Bereich Infanteriewaffen zu werden."
 VLA_armor_effort:0 "Gepanzerte Fahrzeuge entwerfen"
 VLA_armor_effort_desc:0 "Indem wir das anwenden, was wir bei der Mechanisierung unserer Infanterie gelernt haben, können wir auch unsere gepanzerten Fahrzeuge verbessern."
 VLA_special_forces:0 "Spezialeinheiten"
 VLA_special_forces_desc:0 "Wir brauchen Elitetruppen; Gebirgsjäger und Fallschirmjäger sollten unsere Priorität sein."
 VLA_aviation_effort:0 "Gründung der Flämischen Flugschule"
 VLA_aviation_effort_tt:0 "Nicht genügend Bauplätze für §YAir Base§!"
 VLA_aviation_effort_desc:0 "Nirgendwo schreitet der technologische Fortschritt schneller voran als in der Luftkriegsführung. Die Luftfahrt ist ein Gebiet, das jede moderne Nation beherrschen muss."
 VLA_fighter_focus:0 "Kämpferfokus"
 VLA_fighter_focus_desc:0 "Luftkämpfe haben im Ersten Weltkrieg noch nicht stattgefunden. Wenn wir bei der Entwicklung von Kampfflugzeugen die Nase vorn haben, werden wir auch in Zukunft einen Vorteil haben."
 VLA_bomber_focus:0 "Bomberfokus"
 VLA_bomber_focus_desc:0 "Wenn die Menschen in Zukunft vom Schrecken der heutigen Kriege sprechen, wird Feuer, das vom Himmel regnet, eine zentrale Rolle spielen. Wir werden unser Bestes tun, um sicherzustellen, dass diese Geschichten auch von unseren Feinden erzählt werden."
 VLA_aviation_effort_2:0 "Studieren Sie ausländische Taktiken"
 VLA_aviation_effort_2_desc:0 "Um unsere Luftwaffe gut in andere Zweige des Militärs zu integrieren, sind weitere Fortschritte in der Luftfahrt erforderlich."
 VLA_CAS_effort:0 "Sturzkampfbomber"
 VLA_CAS_effort_desc:0 "Eine moderne Armee benötigt nicht nur am Boden, sondern auch in der Luft die Unterstützung durch Fahrzeuge."
 VLA_rocket_effort:0 "Raketentriebwerke"
 VLA_rocket_effort_desc:0 "Raketen- und Düsentriebwerke ermöglichen sowohl unbemannten als auch bemannten Schiffen beispiellose Geschwindigkeiten. Die Entwicklung dieser Technologien wird es uns ermöglichen, den Feind zu überraschen."
 VLA_NAV_effort:0 "Marinebomber"
 VLA_NAV_effort_desc:0 "So wie die neue Seekriegsführung teilweise unter der Wasseroberfläche stattfindet, findet ein Teil davon in der Luft über dem Wasser statt."
 VLA_naval_effort:0 "Finanzieren Sie den Schiffbau"
 VLA_naval_effort_tt:0 "Nicht genügend Bauplätze für §YNaval Dockyards§!"
 VLA_naval_effort_desc:0 "Der Ausbau unserer Marine sollte unsere oberste Priorität sein. Alle verfügbaren Ressourcen sollten für neue Werften und die Erforschung leichter Überwasserschiffe eingesetzt werden."
 VLA_flexible_navy:0 "Flexibles Marineblau"
 VLA_flexible_navy_desc:0 "Durch die Neugestaltung der Seekriegsführung unter Berücksichtigung der Fortschritte in der U-Boot-Technologie können wir feindliche Konvois effizient bekämpfen."
 VLA_large_navy:0 "Große Marine"
 VLA_large_navy_desc:0 "Die Anpassung unserer Marinedoktrinen an große Schiffe und die Gewährleistung der Sicherheit unserer Handelskonvois wird uns viel darüber beibringen, welche Art von Schiffen wir benötigen."
 VLA_submarine_effort:0 "U-Boot-Krieg"
 VLA_submarine_effort_desc:0 "Der U-Boot-Krieg ist die spannendste Entwicklung in der Marine seit der Erfindung des Torpedoboots. Wir tun gut daran, uns nicht nur vor U-Booten zu schützen, sondern sie auch gegen feindliche Schiffe einzusetzen."
 VLA_cruiser_effort:0 "Kreuzer konzipieren"
 VLA_cruiser_effort_desc:0 "Bevor wir uns auf die Erforschung fortgeschrittener Schlachtschiffe konzentrieren können, müssen die kleineren Kreuzer ersetzt werden."
 VLA_destroyer_effort:0 "Design-Zerstörer"
 VLA_destroyer_effort_desc:0 "Durch die Untersuchung der Konstruktion und des strategischen Einsatzes von U-Booten haben wir auch gelernt, wie wir diesen Strategien entgegenwirken können. Zerstörer werden dabei eine entscheidende Rolle spielen."
 VLA_capital_ships_effort:0 "Interesse an Großkampfschiffen"
 VLA_capital_ships_effort_desc:0 "Die Nation mit den meisten Schlachtschiffen wird die Weltmeere beherrschen. Schlachtschiffe und Flugzeugträger repräsentieren die alte und die neue Seeüberlegenheit."
 VLA_industrial_effort:0 "Industrielle Anstrengungen"
 VLA_industrial_effort_desc:0 "Konzentrieren Sie alle unsere politischen Anstrengungen darauf, die zivile Industrie mit einem großen Sprung nach vorne aufzubauen."
 VLA_industrial_effort_2:0 "Industrielle Anstrengung II"
 VLA_industrial_effort_2_desc:0 "Mit eisernem Willen und einer unermüdlichen Arbeitsmoral können wir die Menschen zu einer weiteren großen industriellen Anstrengung mobilisieren."
 VLA_construction_effort_tt:0 "Nicht genügend Bauplätze für §YCivilian Factories§!"
 VLA_construction_effort:0 "Entwicklung der Brüsseler Industrie"
 VLA_construction_effort_desc:0 "Durch die neuen Eisenbahnstrecken, die derzeit in und um Brüssel gebaut werden, wird das wirtschaftliche Potenzial der Stadt für Industrie und Dienstleistungssektor noch attraktiver."
 VLA_production_effort:0 "Unterstützen Sie die Zeebrugge Smederijen"
 VLA_production_effort_tt:0 "Nicht genügend Bauplätze für §YMilitärfabrik§!"
 VLA_production_effort_desc:0 "Wer Traktoren bauen kann, kann auch Panzer bauen! Wir dürfen nicht zulassen, dass unsere militärische Produktionskapazität zurückbleibt."
 VLA_construction_effort_2:0 "Renovierung des Hafens von Antwerpen"
 VLA_construction_effort_2_desc:0 "Durch den weiteren Ausbau unserer Fabriken können wir die Produktion von Waren für den Handel und weitere Bauvorhaben beschleunigen."
 VLA_production_effort_2:0 "Unterstützung der Schwerfahrzeugindustrie"
 VLA_production_effort_2_desc:0 "Als einer der wichtigsten europäischen Häfen ist Antwerpen in einer guten Position, um eine auf den Export ausgerichtete Industrie zu entwickeln."   
 VLA_production_effort_3:0 "Unterstützen Sie Hersteller von Militärflugzeugen"
 VLA_production_effort_3_desc:0 "Um den Bedarf an neuer Ausrüstung zu decken, sind kontinuierliche Anstrengungen zum Ausbau unserer Militärfabriken erforderlich."
 VLA_infrastructure_effort:0 "Brüsseler Eisenbahnen verbinden"
 VLA_infrastructure_effort_desc:0 "Ein Land ohne angemessene Infrastruktur kann keine fortschrittlichen Projekte oder Bauvorhaben durchführen."
 VLA_infrastructure_effort_tt:0 "Nicht genügend Bauplätze für §YInfrastruktur§!"
 VLA_coal_mines:0 "Die Limburger Kohlengruben voll ausschöpfen"
 VLA_coal_mines_desc:0 "Kohle ist unsere wichtigste Ressource und wir müssen ihre Förderung unbedingt maximieren." 
 VLA_synth_oil_effort_tt:0 "Nicht genügend Bauplätze für §YSynthetische Raffinerie§!"
 VLA_infrastructure_effort_2:0 "Straßen renovieren"
 VLA_infrastructure_effort_2_desc:0 "Der weitere Ausbau unserer Infrastruktur wird die für geheime Hightech-Projekte notwendigen Transport- und Kommunikationsmittel ermöglichen."
 VLA_construction_effort_3:0 "Antwerpen Industriegebiet"
 VLA_construction_effort_3_desc:0 "Durch den Ausbau unseres Infrastrukturnetzes haben wir unsere Baukapazitäten deutlich verbessert."
 VLA_nuclear_effort:0 "Goedendagproject"
 VLA_nuclear_effort_desc:0 "Wir stehen am Rande einer weltverändernden Entdeckung und können nicht zulassen, dass andere das Feuer entfachen, das eines Tages die Erde verzehren könnte."
 VLA_extra_tech_slot:0 "Unterstützen Sie die Universität Gent"
 VLA_extra_tech_slot_desc:0 "Unsere industrielle Expansion und andere aktuelle Fortschritte könnten es uns ermöglichen, parallel mehr Forschung und Entwicklung durchzuführen."
 VLA_extra_tech_slot_2:0 "Komitee für Innovationskoordination"
 VLA_extra_tech_slot_2_desc:0 "Die schnelle Industrialisierung unseres Landes hat neue Möglichkeiten in Forschung und Entwicklung eröffnet, die wir nutzen sollten."
 VLA_technology_sharing:0 "Technologieaustausch"
 VLA_technology_sharing_desc:0 "Indem wir technologische Fortschritte mit unseren Verbündeten teilen, kann unsere gesamte Fraktion die Forschung und Entwicklung im Kriegsfall effizienter durchführen."
 VLA_secret_weapons:0 "Geheimwaffen"
 VLA_secret_weapons_desc:0 "Es ist verlockend, alle zusätzlichen Ressourcen in die Entwicklung von Panzern und Flugzeugen zu stecken, aber das Geheimnis, Kriege zu gewinnen, liegt in ganz neuen Wissenschaftsbereichen: Elektronik, Raketentechnik und Nuklearforschung."
 VLA_political_effort:0 "Grundgesetz "
 VLA_political_effort_desc:0 "Um Veränderungen in der Welt herbeizuführen, müssen wir in der Lage sein, Veränderungen in unserem eigenen Land herbeizuführen. Die Stärkung unserer politischen Position sollte dabei an erster Stelle stehen."
 VLA_collectivist_ethos:0 "Syndikate stärken"
 VLA_collectivist_ethos_desc:0 "Unsere Feinde mögen kleinere Nationen spalten und erobern, aber unser Volk wird vereint bleiben. Einer für alle, alle für einen."
 VLA_liberty_ethos:0 "Demokratischer Konsens"
 VLA_liberty_ethos_desc:0 "In dieser Zeit ideologischer Fanatiker, die den menschlichen Geist ersticken wollen, werden wir die individuellen Freiheiten und die Unabhängigkeit schützen."
 VLA_militarism:0 "Militarismus"
 VLA_militarism_desc:0 "Wer das Militär als notwendiges Übel betrachtet, ist dazu verdammt, angesichts des Krieges zu zögern. Wir werden den Militarismus in unsere Kultur einprägen, um ein Volk von Soldaten zu werden."
 VLA_political_correctness:0 "Politische Korrektheit"
 VLA_political_correctness_desc:0 "Menschen mit leicht kontroversen oder anderweitig peinlichen Ansichten scheinen sich Sorgen zu machen, dass es eine weitreichende Verschwörung gegen sie gibt. Das scheint eine hervorragende Idee zu sein."
 VLA_neutrality_focus:0 "Neutralitätsfokus"
 VLA_neutrality_focus_desc:0 "Während andere behaupten, dass es Mut und Weisheit erfordert, in einem globalen Konflikt Partei zu ergreifen, wissen wir, dass es mehr erfordert, sich zu weigern."
 VLA_interventionism_focus:0 "Interventionismus-Fokus"
 VLA_interventionism_focus_desc:0 "Wir schätzen die Freiheit aller Menschen, nicht nur unserer eigenen Bürger. Wenn die Verhinderung von Tyrannei Krieg bedeutet, dann ist das so."
 VLA_military_youth:0 "Nationaal-Socialistische Jeugd Vlaanderen"
 VLA_military_youth_desc:0 "Organisationen zur Förderung der Disziplin und politischen Bildung junger Menschen in unserem Land werden frühzeitig Loyalität und Selbstaufopferung fördern."
 VLA_deterrence:0 "Abschreckung"
 VLA_deterrence_desc:0 "Wenn wir allein dastehen, profitieren wir selten vom Krieg. Glücklicherweise wissen wir, dass die beste Verteidigung eine ist, die so bekannt ist, dass man sie nie anwenden muss."
 VLA_volunteer_corps:0 "Freiwilligenkorps"
 VLA_volunteer_corps_desc:0 "Unser Volk zu zwingen, für die Ideale der Freiheit zu sterben, wäre eine Ironie des Schicksals. Doch die Schaffung von Mitteln für diejenigen, die Menschen im Ausland helfen möchten, ist es nicht."
 VLA_paramilitarism:0 "Vlaamsche Wacht"
 VLA_paramilitarism_desc:0 "Militärische Prinzipien finden auch außerhalb des Militärs Anwendung. Mit der Entwicklung halbmilitarisierter Einheiten zur Ergänzung unserer Streitkräfte werden mehr Menschen eine militärische Ausbildung erhalten."
 VLA_indoctrination_focus:0 "Indoktrination"
 VLA_indoctrination_focus_desc:0 "Nachdem wir unsere Ideologie als wahrheitsgetreu etabliert haben, kann sie auch als Wahrheit gelehrt werden. Bildung und Medien müssen diese Lehre widerspiegeln."
 VLA_foreign_expeditions:0 "Auslandsexpeditionen"
 VLA_foreign_expeditions_desc:0 "Da unsere Feinde bereit sind, im Namen ihrer Ideale in weit entfernte Konflikte einzugreifen, müssen wir bereit sein, dasselbe für unsere zu tun."
 VLA_why_we_fight:0 "Warum wir kämpfen"
 VLA_why_we_fight_effect:0 "Wenn wir nicht den Geist einer „Neutralen Außenpolitik“ haben, werden wir in der Lage sein, Fraktionen zu bilden.\n"
 VLA_why_we_fight_desc:0 "Die Welt wird immer unsicherer. Unsere Bevölkerung muss die Gräueltaten der Machtgierigen sehen. Es ist Zeit, die Bevölkerung für unsere Sache zu gewinnen und sicherzustellen, dass alle bereit sind, für unsere Freiheit zu kämpfen."
 VLA_political_commissars:0 "Politische Kommissare"
 VLA_political_commissars_desc:0 "Um sicherzustellen, dass unsere Richtlinien in der militärischen Praxis befolgt werden, werden wir politisch ernannte Beamte in die militärischen Ränge aufnehmen."
 VLA_internationalism_focus:0 "Internationalismus-Fokus"
 VLA_internationalism_focus_desc:0 "Ideologie kennt keine Grenzen. Eine andere Nation mag sich als souverän bezeichnen, doch unsere Überzeugungen stehen über solchen Ansprüchen."
 VLA_nationalism_focus:0 "Rallye rund um den Strijdvlag"
 VLA_ultra_nationalism_focus:0 "Triumph des VNV" 
 VLA_nationalism_focus_desc:0 "Unsere Nation ist einzigartig und unsere politischen Errungenschaften konnten nur hier erzielt werden. Dafür müssen wir um jeden Preis kämpfen."
 VLA_ideological_fanaticism:0 "Ideologischer Fanatismus"
 VLA_ideological_fanaticism_desc:0 "Unsere politisch etablierten Werte und Ziele sind es wert, für sie zu sterben, genauso wie für jeden alten Glauben. Jeder Anhänger sollte darauf vorbereitet sein, dem Tod ins Auge zu sehen, und diejenigen, die vom Glauben abirren, sollten besser darauf vorbereitet sein, dem Tod ins Auge zu sehen."
 VLA_conservatism_focus:0 "Katholischer Einfluss"
 VLA_conservatism_focus_desc:0 "Katholischer Einfluss."
 VLA_welfare_focus:0 "Sozialreformen"
 VLA_conservatism_focus_desc:0 "Sozialreformen." 
 VLA_political_coalition_focus:0 "Politische Koalition"
 VLA_political_coalition_focus_desc:0 "Politische Koalition." 
 VLA_Antwerp_Oil_Industry:0 "Antwerpener Raffinage Mogelijkheden"
 VLA_Antwerp_Oil_Industry_desc:0 "Antwerpen ist bereits ein wichtiger Hafen für die Chemiebranche. Angesichts der täglich wachsenden Bedrohung des internationalen Handels sollten wir einen Teil dieser Anlagen umfunktionieren, um unsere geliebte Kondrusenkohle in Öl umzuwandeln."
 VLA_reinforce_antwerp_brussels:0 "KO Linie"
 VLA_reinforce_antwerp_brussels_desc:0 "Brabant liegt im Herzen unseres Landes und hier liegen unsere wichtigsten Städte. Antwerpen war in der Vergangenheit eine wichtige Festung und Brüssel ist das Zentrum unserer Nation. Die Befestigung beider Regionen wird sie zu einem Bollwerk gegen jede feindliche Invasion machen. Die Linie erstreckt sich von den Dörfern Koningshooikt bis Ottenburg und wird mit Panzergräben, Bunkern und Cointet-Panzersperren ausgestattet."  
 VLA_rearmement_agreement:0 "Wiederaufrüstungsabkommen"
 VLA_rearmement_agreement_desc:0 "Angesichts der weltweit zunehmenden Spannungen ist eine Verbesserung unserer militärischen Organisation und unserer zivilen Verteidigung unabdingbar."
