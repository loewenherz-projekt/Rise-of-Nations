 S47_tooltip:0 "Dieses Ereignis sollte Belgien eine Variante des lizenzierten Flugzeugs gewähren, aber das scheint derzeit nicht möglich zu sein. Als kleiner Ausgleich wurden Air XP gewährt. Wenn Belgien über die CAS1-Technologie verfügt, ist die S47 verfügbar."
 S47_focus_tooltip:0 "§RDie Flugzeugtechnologie: „Close Air Support 1“ wird empfohlen, um diesen Schwerpunkt voll auszunutzen, da es nicht möglich ist, den gewünschten Effekt über den Code des Spiels zu erzeugen.§"
