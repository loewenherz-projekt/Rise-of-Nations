 VLAcatholic_socialist_coalition_party:0 "KP-VWP"
 VLAcatholic_socialist_coalition_party_long:0 "Katholieke Partij-Vlaamsche Werkliedenpartij" 
 
  
  
 BEL_charles_bastin:0 "Jules Bastin"
 BEL_jules_bastin:0 "Jules Bastin" 

 tblra_leopold3:0 "Leopold III."
 tblra_leopold3_desc:0 "Leopold III., König der Belgier, regiert, herrscht aber nicht. Gleichzeitig ist er der Oberbefehlshaber der belgischen Armee, auch wenn das effektive Kommando beim Generalstabschef liegt."
 tblra_leopold3_captive:0 "Leopold III., inhaftiert"
 tblra_leopold3_captive_desc:0 "Leopold III. ist in Gefangenschaft. Um ihn zu befreien, müssen wir tief in feindliches Gebiet vordringen."
 tblra_leopold3_exile:0 "Leopold III. ist im Exil" 
 tblra_charles_regent:0 "Prinzregent Charles"
 tblra_charles_regent_desc:0 "Solange der König nicht regieren kann, wird sein Bruder Prinz Charles seinen Platz als Regent des Königreichs einnehmen." 
 
 BEL_Pierre_Daye:0 "Pierre Daye " #better choice than Theugels
 BEL_Pierre_Daye_desc:0 "Pierre Daye war der Vorsitzende der Rexistengruppe im belgischen Parlament. Er war auch der einzige Rexist, der im Königspalast akzeptiert wurde, während Degrelle als Unruhestifter galt. Da er eine schlechte Meinung von den anderen Rexistenvertretern hatte, verließ er die Bewegung noch vor Kriegsbeginn."
 BEL_Charles_Someville:0 "Charles Somville"
 BEL_edgar_lalmand:0 "Edgar Lalmand"
 BEL_edgar_lalmand_desc:0 "Auch wenn er nicht zur regierenden Troika von Van Den Boom, Lahaut und Relecom gehört, ist Edgar Lalmand oft hinter den Kulissen aktiv. Als Getreidehändler könnte er seine Fähigkeiten im Geschäftsmanagement bei der Leitung öffentlicher Bauvorhaben nutzen."
 BEL_henri_glineur:0 "Henri Glineur"
 BEL_robert_desmet:0 "Robert Desmet"
 BEL_robert_desmet_desc:0 "Robert Desmet war während des Ersten Weltkriegs Pilot. In den 1930er Jahren diente er als Ausbilder für zukünftige belgische Militärpiloten."
 BEL_raoul_overstraeten:0 "Raoul Van Overstraeten"
 BEL_raoul_overstraeten_desc:0 "Raoul Van Overstraeten war einer der engsten militärischen Berater des Königs, weshalb er (zumindest in militärischen Angelegenheiten) den Spitznamen „Vizekönig“ erhielt. Er war außerdem einer der Lehrer an der königlichen Militärschule und veröffentlichte in den 1920er Jahren mehrere Bücher über die Natur, in denen er die zukünftige Bedeutung von Panzern in der Kriegsführung voraussah. Er hatte auch eine sehr eigenartige Meinung über die belgische Luftwaffe: Da die Luftwaffe einem deutschen Angriff nicht standhalten konnte, sollte die Armee seiner Meinung nach überhaupt nicht in Luftstreitkräfte investieren und sich stattdessen auf Flugabwehrartillerie konzentrieren."
 BEL_raoul_overstraeten2:0 "Raoul Van Overstraeten"
 BEL_raoul_overstraeten2_desc:0 "Raoul Van Overstraeten war einer der engsten militärischen Berater des Königs, weshalb er (zumindest in militärischen Angelegenheiten) den Spitznamen „Vizekönig“ erhielt. Er war außerdem einer der Lehrer an der königlichen Militärschule und veröffentlichte in den 1920er Jahren mehrere Bücher über die Natur, in denen er die zukünftige Bedeutung von Panzern in der Kriegsführung voraussah. Er hatte auch eine sehr eigenartige Meinung über die belgische Luftwaffe: Da die Luftwaffe einem deutschen Angriff nicht standhalten könne, sollte die Armee seiner Meinung nach überhaupt nicht in Luftstreitkräfte investieren und sich stattdessen auf Flugabwehrartillerie konzentrieren."
 BEL_henri_decarpentrie:0 "Henri Decarpentrie"
 BEL_henri_decarpentrie_desc:0 "Henri Decarpentrie war ein Artillerieoffizier, der vor der Auflösung der belgischen Marine im Jahr 1928 kurzzeitig auf einem Schiff diente. In dieser Funktion wurde ihm das Kommando über das bewaffnete Fischereischiff der neu gegründeten belgischen Marine übertragen."
 BEL_jules_iserentant:0 "Félix Iserentant"
 BEL_gustaaf_sap:0 "Gustaaf Sap"
 BEL_gustaaf_sap_desc:0 "Gustaaf Sap war Ökonom und Politiker am rechten Rand der Katholischen Partei. Als solcher unterstützte er heimlich Léon Degrelle und hoffte auf einen Sieg der Rexisten. Der Plan bestand darin, Degrelles Wahlerfolg zu organisieren und erst nach dessen Machtergreifung seiner Partei beizutreten. Aufgrund des Niedergangs von Rex nach Degrelles Wahlerfolg von 1936 blieb Gustaaf Sap in der Katholischen Partei und wurde schließlich in die Exilregierung in London berufen."
 BEL_victor_van_strydonck_de_burkel:0 "Victor van Strydonck de Burkel"
 BEL_victor_van_strydonck_de_burkel_desc:0 "Als einer der ältesten Generäle der belgischen Armee hätte er von den technologischen Fortschritten im Bereich der Mobilität überwältigt werden können. Doch nach einigem Zögern willigte er ein und unterstützte das 1935 begonnene Motorisierungsprogramm."
 BEL_auguste_edouard_gilliaert:0 "Auguste-Édouard Gilliaert"
 BEL_karel_bossart:0 "Karel Jan Bossart"
 BEL_karel_bossart_desc:0 "Während des Spiels lebte Karel Jan Bossart dank eines Forschungsstipendiums einer amerikanischen Universität in den USA und war einer der vielversprechendsten Köpfe auf dem Gebiet der Raketentechnik. Vielleicht könnten wir versuchen, ihn zu einer Rückkehr in seine Heimat zu bewegen."
 BEL_joris_van_severen:0 "Joris Van Severen"
 BEL_joris_van_severen_desc:0 "Joris Van Severen war kein wirklicher Parteiführer, da Verdinaso keine wirkliche politische Partei war. Vielmehr war es eine Bewegung, die die Vereinigung der gesamten Benelux-Länder zu einem vereinigten korporativen Staat anstrebte. Vor 1935 war er ein vehementer flämischer Nationalist, bevor er erklärte, die Wallonen seien Cousins gleichen Blutes und sollten daher in die Union aufgenommen werden. Praktischer ausgedrückt: Eine Teilung Belgiens hätte eine Teilung Belgisch-Kongos bedeutet, und das stand im völligen Widerspruch zu seinen Träumen von Größe. 1940 wurde er von den belgischen Behörden als potenzieller zukünftiger Kollaborateur verhaftet. Er wurde mit anderen Faschisten nach Nordfrankreich gebracht und von seinen verärgerten, betrunkenen französischen Wachen ermordet."
 BEL_julien_lahaut:0 "Julien Lahaut"
 BEL_julien_lahaut_desc:0 "Julien Lahaut, Veteran des „Belgischen Expeditionskorps für Panzerwagen in Russland“, traf dort Bolschewiken und stimmte ihren Ideen zu. In Belgien wurde er zu einem wichtigen Mitglied der Kommunistischen Partei."
 BEL_achille_van_acker:0 "Achille Van Acker"
 BEL_achille_van_acker_desc:0 "Achille (Achiel) Van Acker war ein sozialistischer Politiker, der 1945 Premierminister wurde."
 BEL_yvan_gerard:0"Ivan Gérard"
 BEL_yvan_gerard_desc:0"Ivan Gérard war Divisionskommandeur der belgischen Armee und es gelang ihm, seine Truppe unter den gegebenen Umständen in relativ guter Ordnung zurückzuziehen."
 BEL_jean_de_lannoy:0"Jean de Lannoy"
 BEL_jean_de_lannoy_desc:0"Jean de Lannoy entstammte einer alten Adelsfamilie und war ein erfahrener General, der sich mit der modernen Kriegsführung auseinandersetzte. Im Vergleich zum belgischen Militär vertrat er einige innovative Ansichten. In seinen Artikeln schlug er vor, Panzer als Waffe einzusetzen, um tödliche Gegenangriffe durchzuführen und den Vormarsch des Feindes zu stoppen. Auch wenn Belgien historisch nie über genügend Panzer verfügte, um die in seinen Artikeln vorgeschlagenen Manöver zu planen, ist klar, dass er den Einsatz mobiler Kriegsführung in Belgien befürwortete."
 BEL_henri_denis:0"Henri Denis"
 BEL_henri_denis_desc:0"Aufgrund seiner militärischen Erfahrung als pensionierter General diente Henri Denis in mehreren Regierungen als Verteidigungsminister. Er überwachte die Entwicklung der belgischen Verteidigungsstrategie und gründete die territoriale Luftabwehr. 1940 weigerte er sich, der Exilregierung nach London zu folgen, um beim König zu bleiben. Er bot Leopold III. sogar an, als einziger im Land verbliebener Minister den Rücktritt der Regierung zu unterzeichnen. Ein Schritt, der die Legitimität der Regierung von Hubert Pierlot beeinträchtigt hätte. Hoffentlich lehnte der König seinen Vorschlag ab."
 BEL_edouard_van_den_bergen:0 "Édouard Van den Bergen"
 BEL_edouard_van_den_bergen_desc:0 "Édouard Van den Bergen, zuvor General der Artillerie, wurde 1935 zum Generalstabschef ernannt. Als Oberbefehlshaber der Streitkräfte (unter dem König) konzipierte er einen Plan zur Verlängerung des Wehrdienstes und damit zur Verbesserung der Reservedivisionen. Dieser Plan wurde jedoch nie umgesetzt, da die Regierung den wirtschaftlichen Aufschwung wichtiger fand als die Vorbereitung auf einen Krieg, der noch immer als hypothetisch galt. Er verlor seinen Posten und wurde zum Kommandeur einer der Armeegruppen ernannt, nachdem er die französischen Streitkräfte nach einem der vielen Fehlalarme des „Sitzkriegs“ ins Land eingeladen hatte, ohne dass der König oder die Regierung hierzu konsultiert worden wären."
 BEL_paul_hiernaux:0 "Paul Hiernaux"
 BEL_paul_hiernaux_desc:0 "Der Fliegerveteran des Ersten Weltkriegs, Paul Hiernaux, war 1940 Oberbefehlshaber der belgischen Luftwaffe. (Hinweis: Sein Porträt stammt aus dem Jahr 1918.)"
 BEL_paul_van_waesberghe:0 "Paul Van Waesberghe"
 BEL_paul_van_waesberghe_desc:0 "Als die belgische Armee neu gegründet wurde, war Paul Van Waesberghe noch ein junger Leutnant. Aufgrund seines Talents wurde er jedoch ausgewählt, nach Großbritannien geschickt zu werden und erhielt dort eine fortgeschrittenere Ausbildung bei der Royal Navy. Anschließend kämpfte er im belgischen Korps der Royal Navy und wurde nach dem Krieg einer der wichtigsten belgischen Marineoffiziere." 
 BEL_etienne_glorie:0 "Étienne Glorie"
 BEL_etienne_glorie_desc:0 "Étienne Glorie war der kommandierende General des Militärstützpunkts Ostende und mit der Versorgung der jungen belgischen Marine beauftragt."
 BEL_gustave_fromont:0 "Gustave Fromont" 
 BEL_gustave_fromont_desc:0 " Gustave Fromont war 1940 neben Olivier Derousseaux stellvertretender Generalstabschef."
 BEL_gustave_fromont2:0 "Gustave Fromont" 
 BEL_gustave_fromont2_desc:0 " Gustave Fromont war 1940 neben Olivier Derousseaux stellvertretender Generalstabschef."
 BEL_olivier_derousseaux:0 "Olivier Derousseaux"
 BEL_olivier_derousseaux_desc:0 "Olivier Derousseaux war 1940 neben Gustave Fromont stellvertretender Generalstabschef. Ihm fiel die schwierige Aufgabe zu, die Kapitulation der belgischen Armee auszuhandeln."
 BEL_olivier_derousseaux2:0 "Olivier Derousseaux"
 BEL_olivier_derousseaux2_desc:0 "Olivier Derousseaux war 1940 neben Gustave Fromont stellvertretender Generalstabschef. Ihm fiel die schwierige Aufgabe zu, die Kapitulation der belgischen Armee auszuhandeln."
 BEL_jules_pire2:0 "Jules Pire"
 BEL_jules_pire2_desc:0 "Jules Pire war 1940 Divisionskommandeur, später jedoch Kommandeur der belgischen Geheimarmee."
 BEL_franz_burniaux:0 "Franz Burniaux"
 BEL_franz_burniaux_desc:0 "Franz Burniaux, Fluglehrer der belgischen Luftwaffe, setzte den Krieg in Afrika nach einem kurzen Aufenthalt in Großbritannien fort. Er wurde zur Machbarkeit des Aufbaus einer Luftwaffe für Belgisch-Kongo konsultiert, diente jedoch im belgischen Korps der südafrikanischen Luftwaffe, da das Projekt aufgegeben wurde."
 BEL_Fernand_Frenay:0 "Fernand Frenay"
 BEL_xavier_relecom:0 "Xavier Relecom"
 BEL_xavier_relecom_desc:0 "Als eines der wichtigsten Mitglieder der belgischen kommunistischen Partei war Xavier Relecom nach dem Tod von Joseph Jacquemotte zusammen mit Julien Lahaut und Georges Van den Boom das führende Mitglied der Troika. Von der Gestapo inhaftiert, schloss er mit ihnen einen geheimen Pakt, um das Leben der Führungsriege der Partei (einschließlich seines eigenen) im Austausch für das Leben Hunderter kommunistischer Aktivisten zu retten."
 BEL_andor_berei:0 "Andor Berei"
 BEL_andor_berei_desc:0 "Andor Berei war ein Ungar im Exil nach dem Erfolg der Konterrevolutionäre, die 1919 die Ungarische Räterepublik zerschlugen. Er wurde als Vertreter der Komintern (d. h. Stalins) bei der Kommunistischen Partei Belgiens nach Belgien geschickt."
 BEL_paul_nothomb:0 "Paul Nothomb"
 BEL_paul_nothomb_desc:0 "Paul Nothomb hatte alles, um ein Vorbild der belgischen Oberschicht zu sein. Er wurde in eine wohlhabende Familie hineingeboren und verdiente sich seinen Aufstieg als Pilot. Dabei entdeckte er jedoch marxistisch-leninistische Ideen und wandte sich dem Kommunismus zu. Er verließ die Armee, um im spanischen Bürgerkrieg gegen den Faschismus zu kämpfen, wo er André Malraux kennenlernte. Nach seiner Rückkehr nach Belgien wurde er zusammen mit anderen wichtigen kommunistischen Aktivisten von den Deutschen verhaftet, entging jedoch dank des Pakts zwischen Relecom und der Gestapo der Hinrichtung."
 BEL_Jose_Streel:0 "José Streel" 
 BEL_rene_lagrou:0 "René Lagrou"
 BEL_rene_lagrou_desc:0 "René Lagrou war Kriegsberichterstatter der flämischen Autonomie- und Unabhängigkeitspartei VNV. In dieser Funktion versuchte er, die flämische Jugend zum Beitritt zur flämischen SS-Legion zu motivieren. Er ist zudem der Großvater eines Universitätsdozenten des Verfassers dieser Zeilen."
 BEL_Victor_Matthys:0 "Victor Matthys"
 BEL_Victor_Matthys_desc:0 "Victor Matthys war ein enger Gefährte von Léon Degrelle und ihm wurde die Leitung der Rexistenpartei anvertraut, während Degrelle an der Ostfront kämpfte."
 BEL_lambert_chardome:0 "Lambert Chardome"
 BEL_lambert_chardome_desc:0 "Lambert Chardome ist ein Sonderfall. Er kommandierte 1940 eine Division, könnte aber mit Degrelle intrigiert haben, um dessen „Marsch auf Brüssel“ zu unterstützen und einen Putsch zu organisieren. Ich habe dazu jedoch nur Degrelles Behauptung gefunden, daher sieht dies nach einer weiteren historischen Umschreibung aus. Wie dem auch sei, nach der Kapitulation wurde er wie die meisten belgischen Generäle ins Gefängnis gesteckt. 1944 brauchte Léon Degrelle einen richtigen Offizier für das Kommando der „Légion Wallonie“ und suchte daher nach antikommunistischen belgischen Offizieren. Chardome war überzeugt, nachdem man ihm mitgeteilt hatte, dass der König bereit war, gegen die Sowjets zu kämpfen. Auch wenn Leopold III. sicherlich kein großer Kommunist war, äußerte er solche Ansichten nie. Bevor er jedoch an die Front ging, bat er um Erlaubnis, nach Belgien zurückkehren zu dürfen, um seine Familie zu besuchen. Dort machte er sich ein Bild von der Lage im Land und erhielt wahrscheinlich weitere Informationen über den Kriegsverlauf. Er war dann überzeugt, dass dies nicht richtig war, und kehrte stattdessen in sein Stalag zurück. Obwohl er nie an den Aktivitäten der Legion teilnahm, wurde er nach dem Krieg zu 15 Jahren Gefängnis verurteilt."
 BEL_jules_henri_vincotte:0 "Jules-Henri Vincotte"
 BEL_jules_henri_vincotte_desc:0 "Direktor der Militärakademie."
 BEL_rene_legros:0 "René Legros"
 BEL_rene_legros_desc:0 "René Legros war Generalmajor Aviator der belgischen Luftwaffe"
 BEL_andre_becquet:0 "André Becquet"
 BEL_alexandre_galopin:0 "Alexandre Galopin"
 BEL_alexandre_galopin_desc:0 "Alexandre Galopin war Verwalter der „Société Générale“, eines Konzerns, dessen Name so vage war wie sein Tätigkeitsbereich. Der Konzern besaß Vermögenswerte in vielen wichtigen Sektoren der belgischen Wirtschaft, beispielsweise in der „Union Minière du Haut-Katanga“ in Belgisch-Kongo. Während des Krieges entschied er sich, in Belgien zu bleiben, da er befürchtete, dass die Vermögenswerte des Konzerns ohne eine ordnungsgemäße Führung von den Besatzungstruppen beschlagnahmt würden. Stattdessen gab er der „Galopin-Doktrin“ seinen Namen. Diese besagte, dass die Wirtschaft am Laufen gehalten werden müsse, um die Gehälter der Bevölkerung zahlen zu können. Auch wenn diese Politik den Deutschen teilweise half, wurde sie von der belgischen Exilregierung unterstützt, da sie im Vergleich zur Hungersnot als notwendiges Übel angesehen wurde. 1944 wurde er von einer Gruppe flämischer Faschisten unter der Führung von Robert Jan Verbelen ermordet, da er die wirtschaftlich herrschende Klasse der Vorkriegszeit repräsentierte."
 BEL_jean_terfve:0 "Jean Terfve"
 BEL_jean_terfve_desc:0 "Jean Terfve war Doktor der Rechtswissenschaften und Mitglied der belgischen kommunistischen Partei. Er war im belgischen Widerstand aktiv und wurde nach der Verhaftung anderer kommunistischer Führer von Andor Berei zu einem der führenden Kommunisten Belgiens ernannt."
 BEL_gustave_joassart:0 "Gustave Joassart"
 BEL_gustave_joassart_desc:0 "Als Direktor von FN Herstal war Gustave Joassart im Zentrum der verschiedenen belgischen Rüstungsindustrien tätig. So nahm er beispielsweise an Treffen zum Aufbau einer Fabrik für Flugzeugmotoren in Belgien teil, die von belgischen Flugzeugherstellern systematisch importiert wurden." 
 BEL_constant_de_wulf:0 "Constant De Wulf"
 BEL_maximilien_de_neve_de_roden:0 "Maximilien de Neve de Roden"
 BEL_maximilien_de_neve_de_roden_desc:0 "Als General der Kavallerie befehligte er 1936 die „Chasseurs Ardennais“ und 1939 die belgische Kavallerie."
 BEL_auguste_lippens:0 "Auguste Lippens"
 BEL_auguste_lippens_desc:0 "Der frühere Generalgouverneur von Belgisch-Kongo, Auguste Lippens, schlug 1940 vor, eine neue Regierung um den König herum zu bilden." 

 VLA_auguste_baesens:0 "Auguste Baesens"
 VLA_auguste_baesens_desc:0 "Auguste Baesens war einer der Kommandeure der Artillerie-Heeresgruppe."
 VLA_alexis_vander_veken:0 "Alexis Vander Veken"
 VLA_alexis_vander_veken_desc:0 "Alexis Vander Veken war einer der Heeresgruppenkommandeure."
 VLA_Robert_Jan_Verbelen:0 "Robert Jan Verbelen"
 VLA_Robert_Jan_Verbelen_desc:0 "Robert Jan Verbelen war ein flämischer Nationalist, der aktiv mit der Gestapo zusammenarbeitete, um die Opposition im besetzten Belgien zu eliminieren. Er jagte Widerstandskämpfer, Kommunisten und alle anderen, die ihm im Weg standen. Er steckte hinter der Ermordung des Direktors der Société Générale, Alexandre Galopin. Nach dem Krieg floh er nach Österreich, um der Justiz zu entgehen, und bot sich den Amerikanern als professioneller Kommunistenjäger an. Daraufhin begann er eine neue Karriere als CIA-Agent."
 VLA_jef_van_de_wiele:0 "Jef Van de Wiele"
 VLA_jef_van_de_wiele_desc:0 "Jef Van de Wiele war einer der enthusiastischsten Kollaborateure Belgiens. Er war eines der prominentesten Mitglieder von „De Vlag“, einer Organisation, die nichts Geringeres als den Anschluss Flanderns an Deutschland anstrebte. Wenig überraschend erhielt er starke Unterstützung von den Deutschen, die auf die Schaffung eines Großdeutschlands hofften, das alle Völker germanischer Herkunft vereinen sollte."
 
