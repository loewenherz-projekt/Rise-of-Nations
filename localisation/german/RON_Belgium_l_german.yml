 VLA_tac_bomber_equipment_1_desc:0 "Die SABCA S.45 ist eine in Lizenz gebaute Caproni Ca.135, um eine größere Produktion als Italiens begrenzte Kapazitäten zu ermöglichen. Mit dieser Erfahrung im Bomberbau hätten die Belgier problemlos mehr davon für den eigenen Bedarf bauen können, was sie jedoch nie taten." 
