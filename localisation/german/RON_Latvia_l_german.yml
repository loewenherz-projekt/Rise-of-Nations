 LAT_coalition_with_the_communists:0 "Koalition mit den Kommunisten"
 LAT_coalition_with_the_communists_desc:0 "In dieser Zeit der Krise kann nur eine Volksfront, die Kommunisten und demokratische Parteien vereint, die Bildung einer glaubwürdigen politischen Kraft ermöglichen."
 LAT_radical_opposition:0 "Radikale Opposition"
 LAT_radical_opposition_desc:0 "Die Thundercross-Bewegung hat sich von Anfang an gegen Ulmanis Diktatur gestellt und ist in dieser Krisenzeit die einzige glaubwürdige Oppositionskraft, die noch aktiv ist."

 LAT_event.1.t:0 "Ein herzliches Abendessen unter Offizieren"
 LAT_event.1.desc:0 "Bei einem Essen im Offiziersverein war der Attaché bereit, über die neuesten Innovationen im Rüstungsbereich zu diskutieren."
 LAT_event.1.a:0 "Fragen Sie ihn nach Schusswaffen."
 LAT_event.1.b:0 "Erkundigen Sie sich nach Waffen und Granaten."
 LAT_event.1.c:0 "Erkundigen Sie sich nach Trainingsmethoden."

 LAT_event.2.t:0 "Nach Lehren fragen"
 LAT_event.2.desc:0 "Wie kann ich dir helfen?"
 LAT_event.2.a:0 "So organisieren wir unsere Armee."
 LAT_event.2.b:0 "So organisieren wir unsere Marine."
 LAT_event.2.c:0 "So organisieren wir unsere Luftfahrt."

 LAT_event.3.t:0 "Das Kraftwerk Kegums ist fertig!"
 LAT_event.3.desc:0 "Nach Jahren der Arbeit und Investitionen ist der Damm endlich betriebsbereit. Dies ist eine gigantische Leistung und ein Beweis für den lettischen Einfallsreichtum."
 LAT_event.3.a:0 "Hurra!"

 LAT_event.4.t:0 "Das Mandat von Alberts Kviesis geht zu Ende."
 LAT_event.4.desc:0 "Wie in der Verfassung vorgesehen, endet Kviesis‘ Präsidentschaft. Während die Verfassung vorsieht, dass der Parlamentspräsident seine Nachfolge antreten soll, hat Ministerpräsident Ulmanis ein Gesetz entworfen, das seine derzeitige Position mit der Präsidentschaft kumuliert. Dadurch kann er seine Macht noch weiter konzentrieren und seine Diktatur festigen."
 LAT_event.4.a:0 "Das Spiel war von Anfang an manipuliert"
 LAT_event.4.b:0 "Machen Sie diese Aktion jetzt ungültig!"

 LAT_event.5.t:0 "Die Ungültigkeitserklärung von Ulmanis"
 LAT_event.5.desc:0 "Carlis Ulmanis ist seit seinem Putsch 1934 der De-facto-Diktator des Landes; seine Herrschaft ist seit zwei Jahren unangefochten. Der Präsident, der es gewohnt war, alle seine früheren Gesetze zu billigen, ergriff jedoch die Initiative, Ulmanis Nachfolgegesetz für ungültig zu erklären und verhinderte so, dass dieser Präsident wurde. Der ehemalige Präsident der lettischen Saeima, Pauls Kalniņš, sollte laut Verfassung der nächste Präsident werden. Er sitzt jedoch derzeit in Ulmanis&#39; Gefängnis. Die wachsende politische Rivalität zwischen Ulmanis und der Opposition um Kviesis könnte zu einem politischen Zusammenbruch führen, da niemand mehr legal Macht ausüben könnte."
 LAT_event.5.a:0 "Nutzen Sie die Legalität, um Pauls Kalniņš zu befreien."
 LAT_event.5.b:0 "Ulmanis wird alle Tricks ausprobieren, um mehr Macht zu erlangen."

 LAT_event.6.t:0 "Die neue Saeima"
 LAT_event.6.desc:0 "Nachdem Ulmanis nun aus dem Amt entfernt wurde, können wir endlich mit der Wiederherstellung eines funktionierenden demokratischen Systems beginnen. Zunächst müssen wir eine neue Saeima bilden und unseren nächsten Präsidenten wählen."
 LAT_event.6.a:0 "Bestätigen Sie Pauls Kalniņš, er ist der legitime Präsident gemäß der Verfassung"
 LAT_event.6.b:0 "Wählen Sie stattdessen Margers Skujenieks."

 LAT_event.7.t:0 "Was jetzt?"
 LAT_event.7.desc:0 "Der Widerstand von Ulmanis und seinen Anhängern gegen die Wiederherstellung der Demokratie war stärker als erwartet. Präsident Kviesis gelang es nicht, ihn auf legalem Wege aus dem Amt zu drängen, und zwischen den verbliebenen Institutionen ist ein Riss entstanden."
 LAT_event.7.a:0 "Bitten Sie die Kommunisten um Unterstützung, sie sind unsere letzte Chance."
 LAT_event.7.b:0 "Die Perkonkrusts werden den Staat retten, sie waren jahrelang gegen Ulmanis."

 LAT_event.8.t:0 "Proklamieren Sie die Volksrepublik"
 LAT_event.8.desc:0 "Wir sind aus der Asche der vorherigen autoritären Regierungen auferstanden, und das trotz äußerst geringer Chancen! Doch nun haben wir genügend Unterstützung gewonnen, um die Gründung eines Staates zu proklamieren, der das Instrument des lettischen Volkes zur Befreiung der Arbeiter der Welt sein wird. Die Frage seiner Führung ist jedoch noch nicht geklärt, da Minister- und Präsidentenposten noch nicht vergeben sind."
 LAT_event.8.a:0 "Fricis Menders wird die Präsidentschaft übernehmen."
 LAT_event.8.b:0 "Stattdessen wird Lacis Villis als Staatsoberhaupt fungieren."

