 LAT_ulmanis_in_control_of_the_government:0 "Der Führer des Volkes"
 LAT_ulmanis_in_control_of_the_government_desc:0 "Mit der Machtübernahme von Carlis Ulmanis als Präsident ist jeglicher Widerstand seitens der Regierung im Inland ausgeschaltet. Von nun an bricht in Lettland ein neues Zeitalter an, in dem Ulmanis die Kontrolle hat."
 LAT_enforce_the_succession_law:0 "Durchsetzung des Erbrechts"
 LAT_enforce_the_succession_law_desc:0 "Um am Ende der Amtszeit von Alberts Kviesis Präsident zu werden, muss das Gesetz geändert werden. Dies würde zu einer weiteren Machtkonzentration in den Händen von Ulmanis führen. Danach wird seine Diktatur tatsächlich absolut sein."
 LAT_nationalize_important_industries:0 "Verstaatlichung wichtiger Industrien"
 LAT_nationalize_important_industries_desc:0 "Staatliche Industrien können uns helfen, eine stabile und prosperierende Wirtschaft aufzubauen, ohne uns an private Sponsoren zu verkaufen."
 LAT_micromanage_the_economy:0 "Mikromanagement der Wirtschaft"
 LAT_micromanage_the_economy_desc:0 "Unsere Wirtschaft, insbesondere der Agrarsektor, liegt nicht vollständig in unserer Hand. Präsident Ulmanis verfügt zwar über viel Erfahrung in der Wirtschaft. Ihm die Kontrolle über die Wirtschaft zu überlassen, erfordert möglicherweise einige Opfer, aber es wird sich in Zukunft auszahlen."
