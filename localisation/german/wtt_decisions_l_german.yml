 CHI_communist_infiltration:0 "Kommunistische Infiltration"
 CHI_communist_infiltration_desc:0 "Es gibt Berichte über kommunistische Gruppen, die in abgelegenen Gebieten des Landes Stützpunkte errichten. Wir sollten Agenten schicken, um dies zu bestätigen, damit wir gegen sie vorgehen können.\n[Root.GetDiscoveredInfiltration]"
