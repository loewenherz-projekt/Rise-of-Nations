 reintegrate_austro_hungarian_empire:0 "Das Imperium wieder integrieren"
 reintegrate_austro_hungarian_empire_desc:0 "Wir haben genug zurückerobert, um die österreichisch-ungarischen Länder wieder in unser Reich integrieren zu können. Lasst uns dies unverzüglich tun."
 form_commonwealth:0 "Das Commonwealth neu gründen"
 form_united_netherlands:0 "Den Vertrag von London ablehnen"
 form_united_central_america:0 "Die Bundesrepublik neu konstituieren"
 form_baltic_federation:0 "Das Baltikum vereinen"
 form_ottoman_empire:0 "Das Osmanische Reich neu formieren"
 form_european_union:0 "Verwirklichung der europäischen Einheit"
 form_mutapa:0 "Erschaffen Sie das Simbabwe-Imperium neu"
 form_roman_empire:0 "Verwirklichen Sie römische Ambitionen"
 form_persian_empire:0 "Erschaffen Sie das Persische Reich neu"
 form_byzantine_empire:0 "Byzanz wiederherstellen"
 byz_triumph_for_italy:0 "Triumph für Italien"
 byz_triumph_for_italy_desc:0 "Italien ist unter unsere Kontrolle geraten und wir sollten es in einer glorreichen Zeremonie wieder in das Reich integrieren!"
 byz_triumph_for_middle_east:0 "Triumph für die Levante"
 byz_triumph_for_middle_east_desc:0 "Die Levante ist unter unsere Kontrolle geraten und wir sollten sie in einer glorreichen Zeremonie wieder in das Reich integrieren!"
 byz_triumph_for_egypt_and_tunis:0 "Triumph für Ägypten und Tunis"
 byz_triumph_for_egypt_and_tunis_desc:0 "Ägypten und Tunis sind unter unsere Kontrolle geraten und wir sollten sie in einer glorreichen Zeremonie wieder in das Reich integrieren!"
 form_arabia:0 "Vereinige Arabien"
 form_majapahit_empire:0 "Die Thalassokratie neu formieren"
 form_rattanakosin_kingdom:0 "Stärkung des Rattanakosin-Erbes"
 form_hre:0 "Das Heilige Römische Reich wiederbeleben"
 form_scandinavia_category:0 "Wiederherstellung der Kalmarer Union"
 form_scandinavia_category_desc:0 "Mit der Eroberung aller skandinavischen Gebiete ist es an der Zeit, den Geist der Kalmarer Union wiederherzustellen. Ganz Skandinavien soll unter unserer Herrschaft gedeihen."
 form_nordic_league_category:0 "Verkündet die nordische Einheit"
 form_nordic_league_category_desc:0 "Die nordischen Länder verspüren seit langem eine gewisse Verbundenheit zueinander. Da wir nun alle Länder kontrollieren, die einst zu den nordischen Teilstaaten gehörten, ist es möglich, diese Verbundenheit auf ein neues Niveau zu heben."
 form_gran_colombia_category:0 "Bolívars Erbe wiederbeleben"
 form_gran_colombia_category_desc:0 "Obwohl das Experiment Großkolumbiens vor einem Jahrhundert nur von kurzer Dauer war, ist es uns nun erneut gelungen, die Kontrolle über die einzelnen Gebiete zu erlangen. Vielleicht können wir Bolívars Traum erneut verwirklichen."
 form_austria_hungary_category:0 "Wiederherstellung des Österreichisch-Ungarischen Reiches"
 form_austria_hungary_category_desc:0 "Die alten österreichisch-ungarischen Länder wurden erobert, und als ihr einziger verbliebener Nachfolgestaat liegt es an uns, das Kaiserreich wiederherzustellen. Lasst uns nicht zögern, sondern sofort handeln."
 form_commonwealth_category:0 "Das Commonwealth neu gründen"
 form_commonwealth_category_desc:0 "Polen und Litauen haben eine lange gemeinsame Geschichte. Jetzt, da wir durch Waffengewalt wieder vereint sind, ist es vielleicht an der Zeit, die glorreichsten Tage unserer Vergangenheit wieder aufleben zu lassen."
 form_united_netherlands_category:0 "Den Vertrag von London ablehnen"
 form_united_netherlands_category_desc:0 "Der Londoner Vertrag von 1839 trennte den Norden und Süden des Tieflandes nach einer viel zu kurzen Zeit der Einheit auf schändliche Weise. Unter unserer Führung können wir diese Zeiten nun wieder aufleben lassen und die uns zugedachte Rolle als Gegengewicht zu Frankreich und Deutschland einnehmen."
 form_united_central_america_category:0 "Die Bundesrepublik neu konstituieren"
 form_united_central_america_category_desc:0 "Der mächtige Staat, zu dem unsere Nation vor einem Jahrhundert gehörte, hatte nur eine allzu kurze Lebensdauer. Nachdem wir nun die Sezessionsstaaten, die seinen Untergang verursacht hatten, besiegt haben, können wir uns der Wiederherstellung der Bundesrepublik widmen und beginnen, die Macht eines vereinten Mittelamerikas zu demonstrieren."
 form_baltic_federation_category:0 "Das Baltikum vereinen"
 form_baltic_federation_category_desc:0 "Unsere bisherigen Erklärungen zu regionaler Solidarität und einer einheitlichen Außenpolitik können jetzt, da wir das gesamte Baltikum unter unserer Kontrolle haben, nur noch verbessert werden. Die Integration unserer ehemaligen Nachbarn wird angesichts der Gefahren im Westen und Osten für mehr Sicherheit für alle sorgen."
 form_ottoman_empire_category:0 "Das Osmanische Reich neu formieren"
 form_ottoman_empire_category_desc:0 "Mit Waffengewalt ist es uns gelungen, die Verluste, die wir aufgrund unserer Schwäche im Ersten Weltkrieg erlitten hatten, wiedergutzumachen. Um diesen historischen Anlass zu würdigen, wäre nichts besser geeignet, als die Wiederherstellung des Osmanischen Reiches zu verkünden."
 form_european_union_category:0 "Verwirklichung der europäischen Einheit"
 form_european_union_category_desc:0 "Obwohl das Konzept eines politisch vereinten Europas erst in den letzten Jahrzehnten an Bedeutung gewonnen hat, konfrontiert uns die jüngste Eroberung der mächtigsten kontinentaleuropäischen Nationen mit dieser unerwarteten Realität. Vielleicht ist eine Umstrukturierung der Nation erforderlich, um die Chancen, die sie uns bietet, voll auszuschöpfen."
 form_mutapa_category:0 "Erschaffen Sie das Simbabwe-Imperium neu"
 form_mutapa_category_desc:0 "Nachdem wir die südlichen Teile des Kontinents von kolonialen Einflüssen befreit haben, ist es vielleicht an der Zeit, die Menschen hinter dem Konzept eines mächtigen Imperiums aus unserer Vergangenheit zu vereinen. In dieser Region gab es mehrere, und wir brauchen nur einen Namen, der als Symbol dient."
 form_roman_empire_category:0 "Verwirklichen Sie römische Ambitionen"
 form_roman_empire_category_desc:0 "Die Idee eines Mittelmeerreichs ist in den letzten Jahren wieder in den Köpfen der Bevölkerung aufgetaucht. Unsere militärischen Feldzüge haben die kühnsten Träume selbst unserer glühendsten Anhänger übertroffen, und wir stehen kurz davor, diese Ambitionen zu verwirklichen. Roma invicta!"
 form_persian_empire_category:0 "Erschaffen Sie das Persische Reich neu"
 form_persian_empire_category_desc:0 "Unsere jüngsten Eroberungen haben die Ausmaße des alten Persischen Reiches erreicht. Angesichts der reichen Geschichte unserer Region sollten wir diese Gelegenheit nicht nutzen, um unser Reich als Fortsetzung der Reiche von einst zu identifizieren."
 form_byzantine_empire_category:0 "Byzanz wiederherstellen"
 form_byzantine_empire_category_desc:0 "Nachdem wir unsere alten Gebiete vom türkischen Joch befreit haben, können wir nun mit etwas Propaganda behaupten, unsere Nation sei der Nachfolger eben jenes Reiches, das die Türken vor fünf Jahrhunderten zerstörten. Dieses Erbe wird unser internationales Ansehen mit Sicherheit steigern!"
 form_arabia_category:0 "Vereinige Arabien"
 form_arabia_category_desc:0 "Viel zu lange waren die arabischen Staaten durch regionale Rivalitäten gespalten. Nachdem wir nun die Halbinsel unter unserer Herrschaft vereint haben, können wir endlich die Gründung eines vereinten Arabiens verkünden!"
 form_majapahit_empire_category:0 "Die Thalassokratie neu formieren"
 form_majapahit_empire_category_desc:0 "Vor vielen Jahrhunderten erstreckte sich ein großes Reich über den indonesischen Archipel und beherrschte dessen Handel. Es ist uns gelungen, unsere Grenzen auf die Ausdehnung dieses Reiches auszudehnen, und seine Wiederherstellung könnte durchaus als Symbol der Einheit der Region dienen."
 form_rattanakosin_kingdom_category:0 "Stärkung des Rattanakosin-Erbes"
 form_rattanakosin_kingdom_category_desc:0 "In den letzten Jahren haben wir uns von den traditionellen Werten entfernt, auf denen unsere Nation ursprünglich gegründet wurde. Jetzt, da wir die territoriale Ausdehnung unserer glorreichen Tage erreicht haben, ist es vielleicht an der Zeit, unsere Geschichte stärker zu begreifen."
 form_hre_category:0 "Das Heilige Römische Reich wiederbeleben"
 form_hre_category_desc:0 "Der Glanz unserer Kaiserin kennt keine Grenzen, ebenso wenig wie die Grenzen unserer Nation. Diese erstrecken sich mittlerweile über die Grenzen des alten Heiligen Römischen Reiches, und die Nationen, die uns im Weg stehen, können unserer Politik nicht länger widersprechen. Die Kaiserin hat verfügt, dass die gegenwärtige Gelegenheit genutzt werden soll und dass die Nation ihre Rolle als geistiger Nachfolger des Heiligen Römischen Reiches annehmen soll. Aquila Elegit Iovis Omnia Vincit!"
 form_greater_german_reich_category:0 "Großdeutsches Reich ausrufen"
 form_greater_german_reich_category_desc:0 "Unsere Feinde wurden besiegt und unsere Expansionsziele im Osten erreicht. Jetzt ist es an der Zeit, der Welt die Größe unserer Nation zu verdeutlichen und mit der Umwandlung unserer Hauptstadt in etwas zu beginnen, auf das alle mit Stolz blicken können."
 form_greater_german_reich:0 "Großdeutsches Reich ausrufen"
