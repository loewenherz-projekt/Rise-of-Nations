 war_propaganda_against_tension:1 "Kriegspropaganda gegen [From.GetName]"
 war_propaganda_against_tension_desc:0 "Wir müssen uns der Bedrohung durch [From.GetName] entgegenstellen. Unsere Nation ist darauf angewiesen, dass jeder seinen Teil dazu beiträgt, uns zu schützen."
 war_propaganda_against_warmonger:1 "Kriegspropaganda gegen [From.GetName]"
 war_propaganda_against_warmonger_desc:0 "Die Nation ruft nach jedem Mann, jeder Frau und jedem Kind. Ein Krieg wie der von [From.GetName] könnte auch hier passieren."
