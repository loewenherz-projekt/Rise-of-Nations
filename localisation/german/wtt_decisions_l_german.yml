 hold_fight_on_the_beaches_speech:0 "Halten Sie die Rede „Wir werden an den Stränden kämpfen“"
 hold_fight_on_the_beaches_speech_desc:0 "„Wir werden bis zum Ende weitermachen. Wir werden in Frankreich kämpfen, wir werden auf See und auf den Ozeanen kämpfen, wir werden mit wachsendem Selbstvertrauen und wachsender Stärke in der Luft kämpfen. Wir werden unsere Insel verteidigen, koste es, was es wolle. Wir werden an den Stränden kämpfen, wir werden auf den Landungsplätzen kämpfen, wir werden auf den Feldern und auf den Straßen kämpfen, wir werden in den Bergen kämpfen; wir werden niemals aufgeben …“"
 fight_on_the_beaches_speech:0 "Rede „Wir werden an den Stränden kämpfen“"
 operation_fork:0 "Operation Fork"
 operation_fork_desc:0 "Der gerade unabhängig gewordene Staat Island liegt an einer strategisch wichtigen Stelle im Nordatlantik. Der Verlust Norwegens würde die wehrlose Insel in eine verwundbare Lage bringen. Wir müssen unseren Feinden zuvorkommen und sie bei der Invasion und Besetzung Islands unterstützen, damit sie nicht die strategischen Stützpunkte der Insel erobern und von dort aus unsere Versorgungslinien gefährden könnten. Nur mit unserem Schutz sind die Isländer vor unseren Feinden sicher."
 invade_ireland:0 "Irland erobern"
 invade_ireland_desc:0 "Wir müssen die Sicherheit unserer Konvois mit allen erforderlichen Mitteln gewährleisten. Eine Invasion Irlands mag für manche von uns unangenehm sein, aber wenn es nötig ist, um die Nutzung der Luftwaffenstützpunkte zu erwirken, dann soll es so sein."
 macdonald_proposal:0 "Der Macdonald-Vorschlag"
 macdonald_proposal_desc:0 "Wir müssen die Sicherheit unserer Konvois gewährleisten. Dafür sind irische Luft- und Marinestützpunkte von größter Bedeutung. Wir werden einen Gesandten entsenden, der einen Handel mit Nordirland im Gegenzug für den sofortigen Kriegseintritt Irlands auf unserer Seite vorschlagen wird."
 hold_blood_toil_tears_sweat_speech:0 "Halten Sie eine Rede zum Thema „Blut, Mühsal, Tränen und Schweiß“"
 hold_blood_toil_tears_sweat_speech_desc:0 "„Ich habe nichts zu bieten außer Blut, Mühe, Tränen und Schweiß. [...] Sie fragen: Was ist unsere Politik? Ich werde sagen: Wir führen Krieg zu Wasser, zu Lande und in der Luft mit all unserer Macht und mit aller Kraft, die Gott uns geben kann; wir führen Krieg gegen eine monströse Tyrannei, die in der dunklen und beklagenswerten Liste menschlicher Verbrechen unübertroffen ist. Das ist unsere Politik. Sie fragen: Was ist unser Ziel? Ich kann es mit einem Wort beantworten: Sieg. Sieg um jeden Preis – Sieg trotz allen Terrors – Sieg, wie lang und beschwerlich der Weg auch sein mag, denn ohne Sieg gibt es kein Überleben.“"
 blood_toil_tears_sweat_speech:0 "Rede „Blut, Mühsal, Tränen und Schweiß“"
 hold_this_was_their_finest_hour_speech:0 "Halten Sie die Rede „Das war ihre Sternstunde“"
 hold_this_was_their_finest_hour_speech_desc:0 "„Lasst uns daher unsere Pflichten erfüllen und uns so verhalten, dass die Menschen, selbst wenn das Britische Empire und sein Commonwealth tausend Jahre lang bestehen, immer noch sagen werden: Dies war ihre Sternstunde.“"
 this_was_their_finest_hour_speech:0 "Rede „Das war ihre Sternstunde“"
 mers_el_kebir_raid:1 "Operation Katapult"
 mers_el_kebir_raid_desc:0 "Die französische Flotte ist in die Hände Vichy-Frankreichs gefallen, und wir können nicht zulassen, dass sie in deutsche Hände fällt. So widerlich das auch sein mag, wir müssen die sofortige Kapitulation der Marine unseres ehemaligen Verbündeten fordern, da ein Bombardement droht."
 FRA_vichy_france:0 "Vichy-Frankreich"
 FRA_scuttle_the_fleet:0 "Versenke die Flotte"
 FRA_scuttle_the_fleet_desc:0 "Ausländische Streitkräfte versuchen, unsere Seestreitkräfte gewaltsam zu übernehmen. Das dürfen wir nicht zulassen und müssen unsere Schiffe versenken!"
 FRA_case_anton_mission:0 "Fall Anton im Gange"
 case_anton:0 "Case Anton"
 FRA_case_anton_mission_tt:0 "Eine Annexion wird vermieden."
 war_measures:0 "Kriegsmaßnahmen"
 women_in_the_workforce:0 "Frauen in der Arbeitswelt"
 women_in_the_workforce_desc:0 "Während die Männer in den Krieg ziehen, nehmen Tausende von Frauen Jobs in Fabriken an, um die Kriegsmaschinerie am Laufen zu halten."
 scientist_refuge:0 "Wissenschaftler-Zuflucht"
 scientist_refuge_desc:0 "Angesichts des aktuellen politischen Klimas in Europa haben sich einige Wissenschaftler entschlossen, ihr Heimatland zu verlassen. Sie haben ein Einreisevisum für unser Land beantragt. Die Erteilung dieses Visums würde uns zwar einen Forschungsvorteil verschaffen, würde aber auch einige Leute verärgern, die dies als interne Angelegenheit betrachten, in die wir uns nicht einmischen sollten."
 give_refuge_ger:0 "Gewähren Sie deutschen Wissenschaftlern Zuflucht"
 give_refuge_ita:0 "Gewähren Sie italienischen Wissenschaftlern Zuflucht"
 operations:0 "Operationen"
 GER_military_buildup:0 "Militärischer Aufbau"
 GER_weserubung_sud:0 "Weserübung-Süd"
 GER_weserubung_sud_desc:0 "Um einen guten Bereitstellungsraum für die Invasion Norwegens zu erhalten, müssen wir zuerst nach Dänemark vorrücken."
 GER_weserubung_nord:0 "Weserübung-Nord"
 GER_weserubung_nord_desc:0 "Norwegen ist ein strategisch wichtiger Punkt und wäre ein naheliegender Angriffspunkt für jeden Feind, der unseren Stahlhandel mit Schweden stören möchte. Wir können nicht riskieren, dass unsere Feinde in dieser Region Stützpunkte errichten."
 GER_case_yellow_netherlands:0 "Fall Gelb - Niederlande"
 GER_case_yellow_netherlands_desc:0 "Ein Angriff über Belgien zwingt uns, eine zu schmale Front zu durchqueren. Wir müssen unseren Kriegsplan auf die Niederlande ausweiten, um die Fehler von 1914 zu vermeiden."
 GER_case_yellow_belgium_luxembourg:0 "Fall Gelb – Belgien und Luxemburg"
 GER_case_yellow_belgium_luxembourg_desc:0 "Ein Angriff durch die Maginot-Linie wäre Selbstmord. Wir werden sie im Norden flankieren und durch die Ardennen vorrücken, um die stärksten Befestigungen zu umgehen."
 GER_polish_ultimatum:0 "Stellen Sie Polen das Ultimatum"
 SOV_industry_relocation:0 "Industrieverlagerung"
 SOV_relocate_industry_from_moscow:0 "Industrie aus Moskau verlagern"
 SOV_relocate_industry_from_moscow_desc:0 "Die Evakuierung der schweren Maschinen unserer Moskauer Fabriken in den Ural ist ein gewaltiges Unterfangen, aber es ist notwendig, um unsere Kriegsproduktion zu sichern."
 SOV_relocate_industry_from_moscow_tt:0 "§RDiese Effekte erfordern die Kontrolle über Moskau, wenn die Entscheidung abgelaufen ist.§!"
 SOV_relocate_industry_from_leningrad:0 "Verlagerung der Industrie aus Leningrad"
 SOV_relocate_industry_from_leningrad_desc:0 "Die Evakuierung der schweren Maschinen unserer Leningrader Fabriken in den Ural ist ein gewaltiges Unterfangen, aber es ist notwendig, um unsere Kriegsproduktion zu sichern."
 SOV_relocate_industry_from_leningrad_tt:0 "§RDiese Effekte erfordern die Kontrolle über Leningrad, wenn die Entscheidung abgelaufen ist.§!"
 SOV_relocate_industry_from_smolensk:0 "Industrieverlagerung aus Smolensk"
 SOV_relocate_industry_from_smolensk_desc:0 "Die Evakuierung der schweren Maschinen unserer Smolensker Fabriken in den Ural ist ein gewaltiges Unterfangen, aber notwendig, um unsere Kriegsproduktion zu sichern."
 SOV_relocate_industry_from_smolensk_tt:0 "§RDiese Effekte erfordern die Kontrolle über Smolensk, wenn die Entscheidung abgelaufen ist.§!"
 relocate_industry_repair:1 "Einige Fabriken müssen neu aufgebaut werden!"
 SOV_order_227:0 "Bestellung 227"
 SOV_order_227_desc:0 "„Es ist Zeit, den Rückzug abzuschließen. Keinen Schritt zurück!“"
