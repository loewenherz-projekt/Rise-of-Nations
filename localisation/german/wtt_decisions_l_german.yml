 recall_von_lettow_vorbeck:0 "Rückruf Paul von Lettow-Vorbeck"
 recall_von_lettow_vorbeck_desc:0 "Nachdem die Hohenzollern wieder auf dem Thron saßen, bietet der alte Löwe Ostafrikas erneut seine Dienste an."
 GER_sharpen_air_safety_regulations:0 "Verschärfung der Flugsicherheitsvorschriften"
 GER_sharpen_air_safety_regulations_desc:0 "Durch strengere Sicherheitsvorschriften können wir einige der häufigsten Ursachen für katastrophale Unfälle, darunter auch solche mit Luftschiffen, verhindern."
 MAN_recruit_bandits_north:0 "Rekrutiere die Northern Bandits"
 MAN_recruit_bandits_north_desc:0 "Jede Kugel, die wir bei der Jagd auf Banditen verfeuern, ist eine weniger für den bevorstehenden Kampf. Anstatt gegen unsere eigenen Untertanen zu kämpfen, sollten wir ihnen eine Möglichkeit bieten, sich durch den Dienst am Kaiser zu rehabilitieren."
 MAN_recruit_bandits_west:0 "Rekrutiere die westlichen Banditen"
 MAN_recruit_bandits_west_desc:0 "Jede Kugel, die wir bei der Jagd auf Banditen verfeuern, ist eine weniger für den bevorstehenden Kampf. Anstatt gegen unsere eigenen Untertanen zu kämpfen, sollten wir ihnen eine Möglichkeit bieten, sich durch den Dienst am Kaiser zu rehabilitieren."
 MAN_recruit_bandits_east:0 "Rekrutiere die östlichen Banditen"
 MAN_recruit_bandits_east_desc:0 "Jede Kugel, die wir bei der Jagd auf Banditen verfeuern, ist eine weniger für den bevorstehenden Kampf. Anstatt gegen unsere eigenen Untertanen zu kämpfen, sollten wir ihnen eine Möglichkeit bieten, sich durch den Dienst am Kaiser zu rehabilitieren."
 MAN_recruit_bandits_generic:0 "Rekrutiere Banditenreste"
 MAN_recruit_bandits_generic_desc:0 "Unsere Gefängnisse und Arbeitslager sind voll mit denen, die einst gegen uns gekämpft haben. Wir brauchen jeden Soldaten und jedes Gewehr im Kampf um unsere Freiheit. Der Kaiser könnte seine legendäre Gnade und Barmherzigkeit zeigen, indem er diesen Verbrechern die Möglichkeit gibt, sich durch Dienst zu rehabilitieren."
 MAN_release_bandits:0 "Lasst die Banditen frei"
 MAN_release_bandits_desc:0 "Die ehemaligen Kriminellen und Unterweltler haben gezeigt, dass sie bereit sind, für ihren Kaiser Opfer zu bringen und können nun sicher wieder in die Gesellschaft entlassen werden."
 MAN_war_preparations:0 "Unabhängigkeitskrieg"
 MAN_raise_manchu_banner:0 "Hisst die Banner"
 MAN_raise_manchu_banner_desc:0 "In alten Zeiten konnten die Qing-Kaiser ihre Vasallen in ihren Kriegen einsetzen. Auch wenn sich die Zeiten geändert haben, gelten die gleichen Prinzipien. Das Haus der Qing benötigt die Dienste ihrer Banner erneut."
 MAN_disband_the_banners:0 "Löst die Banner auf"
 MAN_disband_the_banners_desc:0 "Nachdem sie ihren Dienst getan haben, können die Mandschu-Banner wieder zu ihren Häusern und Familien geschickt werden – bis sie wieder benötigt werden."
 MAN_fund_underground_gun_shops:0 "Erstellen Sie unterirdische Werkstätten"
 MAN_fund_underground_gun_shops_desc:0 "Zwar erzielen sie nicht dieselben Skaleneffekte wie große Fabriken und verfügen über eine sehr unterschiedliche Qualitätskontrolle, doch die Verteilung der Waffenproduktion auf kleinere, über das ganze Land verteilte Werkstätten ist der beste Weg, die Produktion schnell zu steigern."
 MAN_remove_underground_gun_shops:0 "Schließung der Untergrundwerkstätten"
 MAN_remove_underground_gun_shops_desc:0 "Die von uns geschaffenen Waffenwerkstätten haben ihren Zweck erfüllt. Es ist Zeit, zu einer organisierteren Form der Waffenproduktion zurückzukehren."
 MAN_divert_machine_tools:0 "Werkzeugmaschinen umleiten"
 MAN_divert_machine_tools_desc:0 "Da wir die Eisenbahn unter unserer Kontrolle haben, können wir sicherstellen, dass einige Lieferungen von Werkzeugmaschinen aufgrund eines Verwaltungsfehlers „verloren“ gehen."
 MAN_prepare_to_seize_arms:0 "Bereiten Sie sich auf die Eroberung japanischer Waffendepots vor"
 MAN_prepare_to_seize_arms_desc:0 "Die über das ganze Land verteilten Depots und Versorgungslager sind schlecht bewacht. Ein gut geplanter und zeitlich abgestimmter Angriff könnte sie mit minimalen Verlusten einnehmen, uns Zugang zu modernen Waffen verschaffen und gleichzeitig den Japanern Munition und Vorräte entziehen. Wenn wir mehr Zeit und Ressourcen darauf verwenden, können wir weitere Depots erobern."
 MAN_seize_arms:0 "Führen Sie den Plan aus"
 MAN_seize_arms_desc:0 "Schlagt schnell zu! FÜR DEN KAISER!"
 MAN_can_prepare_more_tt:0 "Weitere Vorbereitungen zur Eroberung weiterer Depots können noch getroffen werden.\n"
