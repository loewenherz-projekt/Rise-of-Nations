 military_support_for_democratic_civil_war:0 "Hat militärische Unterstützung für den Bürgerkrieg.\n"
 military_support_for_communist_civil_war:0 "Hat militärische Unterstützung für den Bürgerkrieg.\n"
 demand_tribute_from_new_communist_china:0 "Fordern Sie einen höheren Tribut"
 blow_suez_canal:0 "Sprengen Sie den Suezkanal"
 blow_suez_canal_desc:0 "Wir können unseren Feinden nicht erlauben, den strategisch wichtigen Suezkanal zu nutzen. Wir müssen daher Vorbereitungen treffen, um den Kanal gezielt zu beschädigen und ihn so lange außer Betrieb zu halten. Dies wird die Fähigkeit des Feindes, Schiffe aus Asien und Ostafrika ins Mittelmeer zu bringen, erheblich einschränken."
 blow_panama_canal:0 "Sprengen Sie den Panamakanal"
 blow_panama_canal_desc:0 "Wir können unseren Feinden nicht erlauben, den strategisch wichtigen Panamakanal zu nutzen. Wir müssen daher Vorbereitungen treffen, um den Kanal gezielt zu beschädigen und ihn so lange außer Betrieb zu halten. Dies wird es dem Feind erheblich erschweren, Schiffe vom Pazifik in den Atlantik und umgekehrt zu transportieren."
 rebuild_suez_canal:0 "Reparieren Sie den Suezkanal"
 rebuild_suez_canal_desc:0 "Der Suezkanal ist für unsere Kriegsanstrengungen von größter Bedeutung. Wir müssen alle erforderlichen Mittel für den Wiederaufbau dieses großen Kanals bereitstellen, damit wir ihn für den ungehinderten Schiffs- und Truppenverkehr zwischen dem Mittelmeer und dem Indischen Ozean nutzen können."
 rebuild_panama_canal:0 "Reparieren Sie den Panamakanal"
 rebuild_panama_canal_desc:0 "Der Panamakanal ist für unsere Kriegsanstrengungen von größter Bedeutung. Wir müssen alle notwendigen Mittel für den Wiederaufbau dieses großen Kanals bereitstellen, damit wir ihn für den ungehinderten Schiffs- und Truppenverkehr zwischen Pazifik und Atlantik nutzen können."
 border_war_with_from:0 "Grenzkrieg mit [From.GetNameDef]"
 MAN_banditry_category:0 "Banditentum"
 MAN_banditry_category_desc:0 "Die Kwantung-Armee zeigt wenig Interesse daran, den Bewohnern der Mandschurei zu helfen, da sie dies eher als militärische Besatzung denn als Aufbau einer Nation betrachtet. Die japanische Regierung Mandschukuos hat kaum Mittel zur Aufrechterhaltung der Ordnung erhalten. In dieses Machtvakuum strömen Banditen aller Art: manchmal selbsternannte „Freiheitskämpfer“, die im Namen abstrakter Ideale wie „nationaler Befreiung“ oder „proletarischem Internationalismus“ morden und stehlen, aber häufiger ohne eine erklärte Ideologie, die ihre Missbräuche verschleiern könnte."
 MAN_bandit_raids:0 "Banditenüberfälle"
 MAN_bandit_raids_desc:0 "Umherziehende Räuber und Terroristen stehlen alles, was nicht niet- und nagelfest ist, und verbrennen den Rest! Stellen Sie mehr Truppen auf und halten Sie sie auf!"
 PRC_border_clashes:0 "Grenzkonflikte"
 PRC_border_clashes_desc:0 "Die Landschaft Chinas zwingt jeden dazu, seine Schlachten sorgfältig auszuwählen. Das gibt uns die Möglichkeit, verwundbares Terrain zu erobern, ohne einen umfassenden Krieg zu führen."
 MAN_pacify_bandits_mission_explanation:0 "Halten Sie [?Root.MAN_maintain_control_timer|H0] Tage lang Divisionen im Staat aufrecht, um Banditen in der Region zu befrieden.\n"
