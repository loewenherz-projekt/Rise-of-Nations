 demob_economic_mission:0 "Demobilisierung unserer Wirtschaft"
 demob_manpower_mission:0 "Lockerung der Wehrpflicht"
 demobilization_desc:0 "Da die Kriegsgefahr in weite Ferne rückt, sind die Menschen nicht länger bereit, die Härten der Kriegsgesetze zu akzeptieren. Wir müssen unsere Gesetze überprüfen und über Änderungen nachdenken, um die Demonstranten zu beruhigen, bevor die Situation eskaliert."
 demobilization_economic_desc:0 "Da die Kriegsgefahr in weite Ferne gerückt scheint, sind die Menschen nicht länger bereit, die Härten einer Kriegswirtschaft hinzunehmen. Wir sollten unsere Wirtschaftsgesetze überprüfen und über deren Änderung nachdenken, um mehr Konsumgüter zu produzieren und so die Nachfrage zu decken."
 draft_dodging_mission:0 "Lösen Sie die Wehrdienstverweigerungskrise"
 draft_dodging_mission_desc:0 "Wenn dieses Problem nicht schnell gelöst wird, wird sich das Problem der Wehrdienstverweigerung nur noch verschärfen und könnte dazu führen, dass die Menschen die Autorität der Regierung selbst in Frage stellen."
