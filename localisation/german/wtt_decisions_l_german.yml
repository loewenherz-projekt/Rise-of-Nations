 JAP_colonial_independence:0 "Koloniale Unabhängigkeit"
 JAP_return_manchuria:0 "Rückkehr in die Mandschurei"
 PRC_return_manchuria_communist:0 "Fordern Sie die Rückgabe der Mandschurei"
 PRC_return_manchuria_communist_desc:0 "Die japanischen Imperialisten nahmen die Mandschurei ihren rechtmäßigen Besitzern – dem freien chinesischen Volk – weg. Nachdem unsere Genossen in Japan die Unterdrücker vertrieben haben, sollten wir darum bitten, dass die Mandschurei dem Volk zurückgegeben wird."
 JAP_liberate_manchuria_alliance_tt:0 "Sendet ein Allianzangebot."
 JAP_interservice_rivalry:0 "Rivalität zwischen den Diensten"
 JAP_interservice_rivalry_desc:0 "Die Imperiale Marine und die Imperiale Armee befinden sich in einem erbitterten Konflikt um unsere begrenzten Ressourcen. Wir haben regelmäßige Konferenzen einberufen, um sicherzustellen, dass unsere Ressourcen am richtigen Ort eingesetzt werden. Eine Bevorzugung des einen gegenüber dem anderen wird weitreichende Konsequenzen haben."
