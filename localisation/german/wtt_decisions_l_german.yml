 SOV_scorched_earth_stalingrad:0 "Führen Sie „Verbrannte Erde“ in den Vororten Stalingrads aus"
 GER_reichskommissariats:0 "Reichskommissariate"
 GER_reichskommissariats_desc:0 "Ermöglicht die Schaffung bestimmter Reichskommissariatssubjekte außerhalb des kontrollierten Gebiets.\n\n"
 GER_reichskommissariat_norwegen:0 "Reichskommissariat Norwegen"
 GER_reichskommissariat_niederlande:0 "Reichskommissariat Niederlande"
 GER_reichskommissariat_belgien_nordfrankreich:0 "Reichskommissariat Belgien-Nordfrankreich"
 GER_reichskommissariat_ostland:0 "Reichskommissariat Ostland"
 GER_reichskommissariat_ukraine:0 "Reichskommissariat Ukraine"
 reinstate_wilhelm_iv_succession_rights:0 "Wiederherstellung des Thronfolgerechts von Prinz Wilhelm"
 reinstate_wilhelm_iv_succession_rights_desc:1 "Der Sohn Kaiser Wilhelms III. musste auf sein Thronfolgerecht verzichten, da er gegen die Zustimmung des damaligen Familienoberhaupts Wilhelm II. heiraten wollte. Da Wilhelm III. nun diese Rolle übernommen hat, könnte er seinen im Exil lebenden Vater möglicherweise dazu drängen, eine Rücknahme dieser Entscheidung zu unterstützen."
 reinstate_wilhelm_iv_succession_rights_tt:0 "Die Thronfolge wird geändert.\n"
 modernize_the_succession_laws:0 "Modernisierung des Erbrechts"
 modernize_the_succession_laws_desc:0 "Der Sohn des derzeitigen Kaisers, der zukünftige Wilhelm IV., hat nur zwei Töchter als Erben. Wir müssen die Thronfolge sichern und daher die Erbfolgegesetze modernisieren, damit Prinzessin Felicitas zu gegebener Zeit regieren kann."
 modernize_the_succession_laws_tt:0 "Frauen können den Thron erben.\n"
 request_restoration_of_british_titles:0 "Antrag auf Wiederherstellung britischer Titel"
 request_restoration_of_british_titles_desc:0 "1917 beschloss das britische Parlament, deutschen Königs- und Fürstenfamilien alle britischen Adelstitel und Königstitel abzuerkennen. Da wir nun Verbündete sind und ausgezeichnete Beziehungen pflegen, ist es vielleicht an der Zeit, die Rücknahme dieser Entscheidung zu fordern."
 hindenburg_destroyed_tt:0 "Die Hindenburg ist §YNOT§! zerstört.\n"
 request_restoration_of_british_titles_tt:0 "Dies wird zweifellos zu beispiellosen Belohnungen führen...\n"
 GER_request_polish_war_participation:0 "Fordern Sie die polnische Kriegsbeteiligung"
 GER_request_polish_war_participation_desc:0 "Da wir uns im Krieg mit den [SOV.GetName] befinden, müssen unsere Armeen durch das Gebiet von [POL.GetAdjective] ziehen. Da wir geschworen haben, sie zu beschützen, ist es nur natürlich, dass sie sich unserem Krieg anschließen."
 GER_reform_austro_hungarian_empire:1 "Neugründung des Österreichisch-Ungarischen Reiches"
 GER_reform_austro_hungarian_empire_tt:0 "Bitte an die anderen Nachfolgestaaten Österreich-Ungarns, das Kaiserreich neu zu gründen.\n§RInformieren sie dies, erben Sie alle Kriege, an denen sie beteiligt sind!§!\n"
 GER_reformed_austro_hungarian_empire:0 "Reformierte das Österreichisch-Ungarische Reich"
 GER_barbarossa_mission:0 "Führerdirektive 21"
 emergency_factory_conversion_defensive:0 "Notumbau der Fabrik"
 emergency_factory_conversion_defensive_desc:0 "An der Front wird dringend mehr Ausrüstung benötigt. Wir müssen dringend mehr Fabriken umrüsten, um Waffen und Fahrzeuge zur Verteidigung unseres Landes zu produzieren."
 emergency_factory_conversion_offensive:0 "Notumbau der Fabrik"
 emergency_factory_conversion_offensive_desc:0 "Unsere Truppen benötigen dringend mehr Ausrüstung. Es werden mehr Fabriken benötigt, um die für den Sieg im Krieg erforderliche Ausrüstung herzustellen."
 demolish_enemy_fortifications:0 "Zerstöre feindliche Befestigungen"
 dismantle_maginot:0 "Maginot demontieren"
 propaganda_efforts:0 "Propagandabemühungen"
 war_propaganda:0 "Kriegspropaganda"
 war_propaganda_desc:0 "Während die Welt um uns herum brennt, ist unser Volk völlig unvorbereitet auf einen Krieg. Wir müssen seine Unterstützung mobilisieren, damit es für unser Land zu den Waffen greift."
 desperate_defense:0 "Verzweifelte Verteidigung"
 desperate_defense_desc:0 "Wir können nicht weiter zurückweichen. Unsere Soldaten müssen sich eingraben und die Stellung halten."
 war_bonds:0 "Kriegsanleihen"
 war_bonds_desc:0 "Wir brauchen mehr Ressourcen für unsere Kriegswirtschaft und Kriegsanleihen sind genau der richtige Weg, um diese zu erhalten."
 CHI_lessons_of_war:0 "Lehren des Krieges"
 CHI_bolster_our_ranks:0 "Verstärken Sie unsere Reihen"
 CHI_industrial_evacuations_from_beijing:0 "Industrielle Evakuierungen aus Peking"
 GER_barbarossa_mission_desc:0 "„Die deutschen Streitkräfte müssen darauf vorbereitet sein, Sowjetrussland in einem schnellen Feldzug zu vernichten. Der Großteil der russischen Armee wird durch gewagte Operationen unter der Führung gepanzerter Vorhuten vernichtet werden.“"
 USA_war_measures:0 "Kriegsmaßnahmen"
 USA_homeland_defense:0 "Gesetz zum Notstand der Heimatverteidigung"
 USA_homeland_defense_desc:1 "Der Feind hat den Boden unserer stolzen Nation betreten. Das amerikanische Volk wird sich erheben und die Invasoren zurück ins Meer drängen!"
 USA_aid_britain:0 "Helfen Sie Großbritannien"
 USA_establish_personal_communication_with_former_naval_person:0 "Korrespondenz mit einem ehemaligen Marineangehörigen"
 USA_establish_personal_communication_with_former_naval_person_desc:0 "Ein neuer Anführer hat die Rolle des Ersten Ministers in [ENG.GetName] übernommen. Wir müssen einen persönlichen Dialog mit ihm aufnehmen und uns dabei helfen, unseren unvermeidlichen Kriegseintritt vorzubereiten und zu koordinieren."
 USA_battle_domestic_isolationism:0 "Bekämpfung des Isolationismus im Inland"
 USA_battle_domestic_isolationism_desc:0 "Wenn es nach isolationistischen Elementen ginge, wären wir jeder feindlichen Nation schutzlos ausgeliefert. Zu unserem eigenen Wohl müssen wir beginnen, die vorherrschende isolationistische Rhetorik zu dekonstruieren."
 USA_emergency_arms_deliveries:0 "Notlieferungen von Waffen"
 USA_emergency_arms_deliveries_desc:0 "Frankreich ist gefallen, und Großbritannien steht nun allein dem Aggressor gegenüber und kämpft darum, seine Küsten gegen eine Invasion zu verteidigen. Mit feuriger Rhetorik haben sie signalisiert, dass ihre Entschlossenheit ungebrochen ist und sie nicht die Absicht haben, still und leise unterzugehen. Wir sind es der Demokratie schuldig, sicherzustellen, dass Großbritannien die Mittel erhält, seine Freiheit zu verteidigen."
 USA_arsenal_of_democracy_decision:0 "Arsenal der Demokratie"
 USA_arsenal_of_democracy_decision_desc:0 "Auch wenn wir noch nicht in den Konflikt hineingezogen werden, können wir unseren Freunden helfen, indem wir ihnen als Waffenlager dienen. Lassen Sie uns den Menschen klarmachen, warum dies notwendig ist."
 USA_women_in_the_workforce:1 "Rosie, die Nieteneinschlägerin"
 USA_women_in_the_workforce_desc:0 "Können Sie einen elektrischen Mixer bedienen? Wenn ja, können Sie lernen, eine Bohrmaschine zu bedienen. Während des Krieges arbeiteten über sechs Millionen amerikanische Frauen in Fabriken, auf dem Bau und verrichteten andere körperliche Arbeiten. Sie bewiesen damit, dass Frauen diese Arbeit genauso gut erledigen konnten wie Männer."
 CAN_women_in_the_workforce:0 "Ronnie, das Bren Gun Girl"
 CAN_women_in_the_workforce_desc:0 "Ronnie sagt: „Weiter so!“ Da unsere Männer in der Armee dienen, lastet die Last unserer Militärproduktion auf den Schultern der Frauen unserer Nation. Im Laufe des Krieges übernahmen 800.000 kanadische Frauen die Jobs, die die Soldaten zurückließen, und bewiesen damit, dass Frauen diesen Beruf genauso gut ausüben konnten wie Männer."
 CHI_integrate_the_warlords:0 "Integrieren Sie die Kriegsherren"
 CHI_integrate_the_army:1 "Integrieren Sie die [From.GetAdjective] Armee"
 CHI_integrate_the_administration:1 "Integrieren Sie die [From.GetAdjective]-Verwaltung"
