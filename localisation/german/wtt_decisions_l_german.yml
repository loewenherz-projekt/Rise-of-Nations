 improved_worker_conditions:0 "Verbesserte Arbeitsbedingungen"
 improved_worker_conditions_desc:0 "Fabrikarbeit ist hart und mit vielen Gefahren verbunden. Die Verbesserung der Arbeitsbedingungen unserer Fabrikarbeiter wird zwar kurzfristig die Produktion reduzieren, doch die langfristigen Vorteile sind es wert."
 promises_of_peace:0 "Friedensversprechen"
 promises_of_peace_desc:1 "Die Geschichte hat uns die Schrecken des Krieges gelehrt. Wir dürfen ihn nie wieder zulassen. Es ist Zeit für Frieden und Wohlstand in unserem Land."
 refuse_the_tribute:0 "Weigere dich, Tribut zu zahlen"
 refuse_the_tribute_desc:0 "Die sowjetischen Forderungen bluten unser Land aus. Wir können es unseren sogenannten „Kameraden“ nicht erlauben, uns auf diese Weise auszubeuten."
