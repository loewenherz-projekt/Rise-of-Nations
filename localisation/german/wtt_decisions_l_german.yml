PRC_education_campagin:0 "Bildungskampagne"
PRC_education_campagin_desc:0 "Wir werden unsere Mitarbeiter weiterbilden und so unsere Branche verbessern"
save_north_korea:0 "Rettet Nordkorea"
save_north_korea_desc:0 "Wir werden das nordkoreanische Land retten und einen Pufferstaat zwischen uns und der westlichen Welt schaffen."
failure_in_norht_korea:0 "Scheitern in Nordkorea"
failure_in_norht_korea_desc:0 "Es ist uns nicht gelungen, Nordkorea zu retten und einen Pufferstaat zwischen uns und der westlichen Welt zu schaffen! Der Krieg ist vorbei!"
victory_in_norht_korea:0 "Sieg in Nordkorea"
victory_in_norht_korea_desc:0 "Wir haben Nordkorea gerettet und einen Pufferstaat zwischen uns und der westlichen Welt geschaffen! Der Krieg ist vorbei!"
stalemate_in_norht_korea:0 "Patt in Nordkorea"
stalemate_in_norht_korea_desc:0 "Es ist uns nicht gelungen, einen koreanischen Staat zu schaffen. Wir müssen retten, was wir jetzt haben!"
