 ensure_marshal_loyalty_for_democratic_civil_war_desc:0 "Es ist möglich, dass bestimmte Feldmarschälle insgeheim dem Faschismus zugeneigt sind. Wir müssen auf sie zugehen und uns ihrer Loyalität für den Beginn der Kämpfe versichern."
 siphon_equipment_stockpiles_for_democratic_civil_war:0 "Siphonausrüstung"
 siphon_equipment_stockpiles_for_democratic_civil_war_desc:0 "Indem wir die Ausrüstungslager des Landes plündern, können wir einen kleinen Waffenvorrat anlegen, der uns in unserem zukünftigen Kampf helfen wird."
 formulate_surprise_attack_plan_for_democratic_civil_war:0 "Formulieren Sie einen Überraschungsangriffsplan"
 formulate_surprise_attack_plan_for_democratic_civil_war_desc:0 "Der Feind ahnt nichts von der bevorstehenden Katastrophe. Wir müssen dafür sorgen, dass dies auch so bleibt, und gleichzeitig unsere Schlachtpläne so ausrichten, dass wir das Überraschungsmoment optimal nutzen."
