 war_propaganda_campaign_running:0 " Es läuft bereits eine Kriegspropagandakampagne"
 JAP_test_the_soviets:0 "Testen Sie die [SOV.GetAdjective]s"
 JAP_test_the_soviets_desc:0 "Wir teilen eine lange Grenze mit [SOV.GetNameDef] in Korea und der Mandschurei. Es gibt zahlreiche potenzielle Krisenherde, an denen unsere Streitkräfte jederzeit aufeinandertreffen könnten. Für uns bietet sich dadurch die Gelegenheit, die sowjetische Reaktion auf eine kleinere Provokation zu testen."
 JAP_border_conflict_warning_SOV:0 "Grenzprovokation an der japanischen Grenze"
 JAP_border_conflict_warning_SOV_desc:0 "An unserer gemeinsamen Grenze in Korea kam es zu einem Zusammenstoß zwischen unseren Grenzsoldaten und japanischen Soldaten. Japanische Geheimdienstquellen berichten, dass dies nur der erste Schritt zu einer größeren Konfrontation sein könnte. Wir sollten die Grenze zu Japan umgehend verstärken."
 JAP_border_conflict_escalation_warning_SOV:0 "Japanische Zubereitungen"
 JAP_border_conflict_escalation_warning_SOV_desc:0 "Luftaufklärung hat größere Truppenbewegungen auf der japanischen Seite der Grenze bestätigt. Wir wissen nicht, ob und wann die Japaner sich zum Angriff entschlossen haben, aber wir müssen bereit sein."
 JAP_border_incident_forgotten:0 "Zeitfenster der Gelegenheit"
 JAP_border_incident_forgotten_desc:1 "Wenn wir den Vorfall an der sowjetischen Grenze zu Korea ausnutzen wollen, müssen wir schnell zuschlagen."
 JAP_escalate_incident_to_border_conflict_SOV:0 "Den Vorfall eskalieren"
 JAP_escalate_incident_to_border_conflict_SOV_desc:0 "Es scheint, dass die Sowjets nicht bereit sind, aus dem Konflikt auszusteigen. An diesem Punkt müssen wir entweder zu einer bewaffneten Konfrontation eskalieren oder selbst einen Rückzieher machen."
 JAP_border_conflict_time_until_cancelled:0 "Beenden Sie den Konflikt"
 JAP_border_conflict_time_until_cancelled_desc:0 "Bei der derzeitigen Geschwindigkeit können wir Kampfhandlungen nur eine begrenzte Zeit lang aufrechterhalten, bevor wir den Kampf abbrechen müssen."
 JAP_border_conflict_escalate_conflict:0 "Den Konflikt eskalieren lassen"
 JAP_border_conflict_escalate_conflict_desc:0 "Der Konflikt an der Grenze zur Sowjetunion ist ins Stocken geraten. Vielleicht können wir durch eine weitere Eskalation und den Einsatz weiterer Truppen im Kriegsgebiet noch einen Sieg erringen."
 JAP_border_conflict_escalate_to_war:0 "Krieg erklären"
 JAP_border_conflict_escalate_to_war_desc:0 "Die Kämpfe in der umstrittenen Region dauern schon seit einiger Zeit an und ein Ende ist nicht in Sicht. Wir müssen bereit sein, den nächsten Schritt zu tun und diesen Konflikt als ersten Schritt in einen allgemeinen Krieg zu betrachten."
JAP_return_chi:0 "Geben Sie die besetzten Städte unserer Marionette zurück"
JAP_return_chi_desc:0 "Unsere Armee hat beschlossen, nach dem Sieg des Krieges einige Städte zu besetzen. Wir sollten sie unserer Marionette zurückgeben, um weniger Unreset zu verursachen"
 JAP_border_conflict_back_out_of_conflict:0 "Zurück nach unten"
 JAP_border_conflict_back_out_of_conflict_desc:0 "Die Gefahr, dass dieser Konflikt außer Kontrolle gerät und sich zu einem umfassenden Krieg zwischen unseren Ländern ausweitet, ist einfach zu groß. Wir sollten jetzt unsere Verluste begrenzen und diplomatische Fühler nach der anderen Seite ausstrecken."
