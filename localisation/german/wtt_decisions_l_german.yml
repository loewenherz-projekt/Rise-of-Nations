 GER_austro_hungarian_empire:0 "Österreich-Ungarn"
 GER_mefo_bills_category:0 "MEFO-Rechnungen"
 GER_mefo_bills_category_desc:0 "Um unsere wachsende Rüstungsindustrie zu finanzieren und dies vor den Augen Großbritanniens und Frankreichs geheim zu halten, sind wir gezwungen, Zahlungen in Form von Schuldscheinen an eine Bilanzgesellschaft zu überweisen. Wenn wir unsere politischen Verbindungen nicht nutzen, um die Fälligkeit dieser Schuldscheine zu verlängern, werden wir gezwungen sein, sie zurückzuzahlen und werden nicht länger von den damit verbundenen Vorteilen profitieren."
 GER_mefo_bills_mission:0 "Fällige MEFO-Rechnungen"
 GER_can_delay_mefo_payment:0 "Kann die Zahlung von MEFO-Rechnungen verzögern."
 GER_mefo_bills_mission_desc:0 "Unsere ausgestellten Rechnungen werden bald fällig. Wir müssen entscheiden, ob wir sie verlängern oder mit der Zahlung beginnen."
 GER_extend_mefo_bills:0 "MEFO-Rechnungen"
 GER_extend_mefo_bills_desc:0 "Verlängern Sie das Fälligkeitsdatum der MEFO-Rechnungen um weitere drei Monate, damit wir für die Dauer weiterhin von deren Vorteilen profitieren können. Dies wird jedoch auch die Kosten unserer späteren Zahlungen erhöhen."
 GER_extend_mefo_bills_tt:1 "Entscheiden Sie, ob Sie die Zahlung von „§YMEFO-Rechnungen§!“ verlängern oder mit der Zahlung beginnen möchten.\n"
 GER_mefo_bills_mission_tt:1 "Gewähren Sie eine sechsmonatige Verlängerung der Bearbeitungszeit von „§YMEFO-Rechnungen§!“, die mit dem Fälligkeitsdatum der aktuellen MEFO-Rechnungen in Kraft tritt.\n\nDie Kosten jeder Verlängerung steigen schrittweise an, bis ein Krieg ausbricht. Ab diesem Zeitpunkt ist man nicht mehr auf MEFO-Rechnungen angewiesen und die Zahlung wird bis nach Kriegsende aufgeschoben.\n\n"
 GER_mefo_bills_effect_in_days:0 "Wenn ausgewählt, geschieht Folgendes in [?Root.days_mission_timeout@GER_mefo_bills_mission|H0] Tagen:\n"
 GER_mefo_bills_extension_timer:0 "Vor dem Fälligkeitsdatum der MEFO-Rechnungen."
 GER_mefo_bills_extension:0 "Weniger als 60 Tage seit der Verlängerung der MEFO-Rechnungen."
 GER_mefo_bills_extended:0 "Erweiterte MEFO-Rechnungen"
 GER_case_anton_category:0 "Case Anton"
 GER_case_anton_category_desc:0 "Die Absicht hinter der Gründung Vichy-Frankreichs bestand stets darin, die französischen Kolonien und die französische Flotte aus den Händen der Alliierten zu halten. Wir können diese Vereinbarung jedoch jederzeit widerrufen. Wir haben einen Plan ausgearbeitet, um das Gebiet gewaltsam zu integrieren und einen Blitzangriff auf den französischen Flottenstützpunkt in Toulon zu starten."
 GER_case_anton:1 "Fall ausführen Anton"
 GER_case_anton_tt2:1 "Kontrolliert keine französischen Staaten in Nordafrika."
 GER_case_anton_desc:0 "Unser Marionettenstaat in Frankreich hat seine Nützlichkeit überlebt. Wir werden sofort mit der Integration in [Root.GetName] beginnen. Wenn wir schnell genug vorgehen, können wir möglicherweise sogar die Überreste der französischen Flotte requirieren."
 GER_case_anton_tt:0 "Annexion von Vichy-Frankreich innerhalb von 7 Tagen und Beschlagnahmung der französischen Flotte.\n\n§RFrankreich kann seine Flotte versenken, wenn die deutschen Truppen nicht innerhalb von 2 Tagen in Toulon eintreffen!§!\n"
 GER_case_red:0 "Herbstfäule"
 GER_operation_marita:0 "Unternehmen Marita"
 political_actions:0 "Politische Aktionen"
 ban_fascist_party:0 "Verbot rechtsextremer Parteien"
 ban_fascist_party_desc:0 "In der gegenwärtigen Situation würde es unsere Fähigkeit zu effektiver Regierung untergraben, wenn wir die weitere Organisation rechtsextremer Parteien zulassen würden. Es müssen drastische Maßnahmen ergriffen werden."
 ban_fascist_party_tt:1 "Veränderung der Popularität des Faschismus: §G-§![?.Root.party_popularity@fascism|%0G].\n"
 ban_democratic_party:1 "Verbot demokratischer Parteien"
 ban_democratic_party_desc:1 "Die Parteien der politischen Mitte sind unserer Regierung schon viel zu lange ein Dorn im Auge. Ihr Beharren auf den „Rechten“ des Einzelnen untergräbt unsere Bemühungen, eine bessere Nation für die gesamte Bevölkerung zu schaffen."
 ban_democratic_party_tt:1 "Änderung der Popularität der Demokratie: §G-§![?.Root.party_popularity@democratic|%0G].\n"
 ban_communist_party:0 "Verbot linksextremer Parteien"
 ban_communist_party_desc:0 "Die Kommunistische Partei protestiert auf Schritt und Tritt gegen die Regierung, sät Unmut und erschwert die Regierungsführung. Es ist Zeit, dagegen vorzugehen."
 ban_communist_party_tt:1 "Veränderung der Popularität des Kommunismus: §G-§![?.Root.party_popularity@communism|%0G].\n"
 anti_fascist_raids:0 "Razzien gegen Rechtsextreme"
 anti_fascist_raids_desc:0 "Um die innere Stabilität langfristig zu sichern, müssen wir gegen rechtsextreme Elemente in unserem Land vorgehen. Ihr Einfluss ist zu groß und könnte für die Regierung zu einem Problem werden."
 anti_democratic_raids:0 "Antidemokratische Razzien"
 anti_democratic_raids_desc:0 "Um die innere Stabilität langfristig zu sichern, müssen wir gegen demokratische Elemente in unserem Land vorgehen. Ihr Einfluss ist zu groß und könnte möglicherweise zu einem Problem für den Staat werden."
 anti_communist_raids:0 "Razzien gegen die extreme Linke"
 anti_communist_raids_desc:0 "Um die Stabilität unseres Landes langfristig zu sichern, müssen wir gegen linksradikale Elemente in unserem Land vorgehen. Ihr Einfluss ist zu groß und könnte für die Regierung zu einem Problem werden."
 object_to_attaches:0 "Einspruch gegen den Attaché"
 object_to_attaches_desc:0 "Unsere Feinde erhalten ausländische Hilfe! Wir müssen entschieden dagegen protestieren und die Entfernung aller Attachés fordern."
 infrastructure_building_slot:0 "Regionsweite industrielle Integration"
 infrastructure_building_slot_flag:0 "Hat noch keinen zusätzlichen Gebäudeplatz aus der Infrastruktur erhalten."
 war_building_slot:0 "Industrielle Landenteignung"
 war_building_slot_flag:0 "Hat nicht bereits einen zusätzlichen Bauplatz durch Landenteignung erhalten."
 special_projects:0 "Sonderprojekte"
 CHI_xian_fired:0 "Chinesische Staats- und Regierungschefs nach Xi&#39;an eingeladen"
 JAP_intervene_in_china_level_down:0 "Intervention in China – Abwärtskompromisse"
 JAP_china_step_up_war_effort:0 "Eskalation des Krieges in China"
 JAP_ichi_go:0 "Ichi Go"
 JAP_ichi_go_desc:0 "Das Ende des Krieges ist in Sicht. Mit einem letzten Anstoß und entschlossenen Anstrengungen können wir den Konflikt schnell beenden. Sollte es uns jedoch nicht gelingen, innerhalb des nächsten Jahres einen Sieg zu erringen, könnte es zu innerer Instabilität kommen, da sich die öffentliche Meinung gegen die verstärkten Kriegsanstrengungen erhebt."
 JAP_conquer_china:0 "Erobere China"
 JAP_release_korea:0 "Koreanische Unabhängigkeit"
 JAP_southern_expansion:0 "Südliche Expansion"
 JAP_sue_for_peace_CHI:1 "Bieten Sie [From.GetNameDef] Rückkaufsbedingungen an"
 JAP_sue_for_peace_TT:0 "Kein Kernland auf dem chinesischen oder koreanischen Festland wird von Japan oder einem seiner Untertanen kontrolliert."
 JAP_sue_for_peace_CHI_desc:0 "Wir haben unsere Kontrolle über das Festland verloren. Das Militär hält es für unwahrscheinlich, dass wir die verlorenen Gebiete zurückerobern können. Die Zivilregierung schlägt vor, dass wir nach Bedingungen suchen sollten, um zumindest unsere Souveränität über die Inseln zu behalten."
 JAP_sue_for_peace_MAN:0 "Bieten Sie [From.GetNameDef] Rückkaufsbedingungen an"
 JAP_sue_for_peace_MAN_desc:0 "Wir haben unsere Kontrolle über das Festland verloren. Das Militär hält es für unwahrscheinlich, dass wir die verlorenen Gebiete zurückerobern können. Die Zivilregierung schlägt vor, dass wir nach Bedingungen suchen sollten, um zumindest unsere Souveränität über die Inseln zu behalten."
 JAP_sue_for_peace_nuke:0 "Bieten Sie bedingungslose Kapitulation an"
 JAP_sue_for_peace_nuke_desc:0 "Der Feind hat eine neue, grausame Bombe eingesetzt. Der Krieg entwickelt sich nicht unbedingt zu unserem Vorteil. Wir müssen das Unerträgliche ertragen."
 JAP_sue_for_peace_nuke_mission:0 "Führen Sie Atomschläge auf japanischem Boden durch"
 JAP_sue_for_peace_nuke_mission_desc:1 "Der kürzlich erfolgreiche Atombombentest bietet eine Alternative zu einer groß angelegten Invasion der japanischen Heimatinseln. Geheimdienstinformationen legen nahe, dass wir den Japanern die Kontrolle über Okinawa und Iwo Jima entreißen und ihre Flotte auf lediglich 30 Schiffe reduzieren können. Ein rasch aufeinanderfolgender Angriff mit Atombomben auf zwei Orte auf den Heimatinseln wird die japanische Regierung zur bedingungslosen Kapitulation zwingen."
 JAP_request_soviet_support:0 "Bitte um sowjetische Unterstützung"
 JAP_request_soviet_support_desc:0 "Wir benötigen Unterstützung im aktuellen Bürgerkrieg, und die Sowjets im Norden sind wahrscheinlich die nächsten Unterstützer unserer Sache. Vielleicht könnten wir die Halbinsel Süd-Sachalin gegen eine Gruppe sowjetischer Freiwilligendivisionen eintauschen."
 JAP_nuke_1:0 "Erster Atomschlag gegen Japan ausgeführt"
 JAP_nuke_2:0 "Zweiter Atomschlag gegen Japan ausgeführt"
 foreign_politics:0 "Außenpolitik"
 JAP_pressure_france:1 "Nachfrage Indochina"
 JAP_break_the_london_naval_treaty:0 "Brechen Sie den Londoner Flottenvertrag"
 JAP_break_the_london_naval_treaty_desc:0 "Die unerhörten Beschränkungen des Londoner Flottenabkommens stellen eine Bedrohung für die Sicherheit unseres Landes dar. Wir müssen die Freiheit haben, eine Marine aufzubauen, die jeder Nation Paroli bieten kann, die unser rechtmäßiges Eigentum in Frage stellt."
 JAP_tora_tora_tora:0 "Tora! Tora! Tora!"
 JAP_tora_tora_tora_desc:0 "Der erste Schlag steht bevor. Danach müssen wir schnell weitermachen und den gewonnenen Schwung nutzen, um unsere Feinde zu lähmen, bevor sie wissen, was passiert ist."
 JAP_war_with_soviet_union:0 "Der Sowjetunion den Krieg erklären"
 JAP_war_with_soviet_union_desc:0 "Unsere Verbündeten in Europa haben einen Nichtangriffspakt mit der Sowjetunion unterzeichnet. Unser Krieg kann jedoch nicht warten. Wir müssen den Konflikt mit den Kommunisten einseitig fortsetzen, auch wenn wir dadurch Gefahr laufen, unsere Verbündeten zu verprellen."
 prospect_for_resources:0 "Suche nach Ressourcen"
 prospect_for_resources_desc:0 "Unsere Geologen haben in unseren Gebieten zahlreiche vielversprechende Rohstoffvorkommen entdeckt. Wir können in die Erschließung dieser Felder investieren. Fortschritte in der Fördertechnologie könnten weitere Vorkommen für die Ausbeutung erschließen."
 economy_decisions:0 "Wirtschaftspolitik"
 institute_press_censorship_fascist_state:0 "Institut Pressezensur"
 institute_press_censorship_fascist_state_desc:0 "Wir erleben gefährliche Zeiten, und wir dürfen nicht zulassen, dass abweichende Meinungen unser Land auseinanderreißen. Die Einschränkung der Pressefreiheit ist notwendig, um sicherzustellen, dass die Wahrheit laut und deutlich ans Licht kommt."
 institute_press_censorship_democratic_state:0 "Institut Pressezensur"
 institute_press_censorship_democratic_state_desc:0 "Wir erleben gefährliche Zeiten, und wir dürfen nicht zulassen, dass abweichende Meinungen unser Land auseinanderreißen. Die Einschränkung der Pressefreiheit ist notwendig, um sicherzustellen, dass die Wahrheit laut und deutlich ans Licht kommt."
