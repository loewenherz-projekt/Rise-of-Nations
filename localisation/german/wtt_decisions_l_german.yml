 SOV_hold_stalingrad:0 "Stalingrad halten"
 SOV_hold_leningrad:0 "Halten Sie Leningrad"
 SOV_hold_moscow:0 "Halten Sie Moskau"
 SOV_seize_manchuria:0 "Erobere die Mandschurei"
 SOV_seize_manchuria_desc:0 "Infolge des japanischen Bürgerkriegs konnte sich [MAN.GetName] von der japanischen Herrschaft befreien. Wenn wir schnell handeln, bietet sich uns die einmalige Gelegenheit, die sowjetische Herrschaft über das Gebiet endgültig zu etablieren."
 SOV_return_manchuria:0 "Rückkehr in die Mandschurei"
 SOV_return_manchuria_desc:0 "Wir werden die Mandschurei dem einzigen rechtmäßigen Volksregime in China zurückgeben."
 fascism_on_the_rise:0 "Rechtsextremismus auf dem Vormarsch"
 fascism_on_the_rise_desc:0 "Lautstarke politische Kräfte haben begonnen, sich für rechtsextreme Werte einzusetzen und finden damit Unterstützung bei einem immer größeren Teil der Bevölkerung. Der Weg des Landes in die extreme Rechte ist offen, es bleibt nur noch die Wahl zwischen einem friedlichen oder gewaltsamen Übergang."
 prepare_for_fascist_civil_war:0 "Bereiten Sie sich auf den Bürgerkrieg vor"
 prepare_for_fascist_civil_war_desc:1 "Wir haben keine Zeit, auf den langsamen Wandel in den Köpfen der Bevölkerung zu warten. In ihrem eigenen Interesse müssen wir die Sache schnell vorantreiben, auch wenn dabei einige ihr Leben verlieren könnten. Im Gegensatz zu einem friedlichen Referendum wird ein Bürgerkrieg unsere Streitkräfte, die Industrie und die Infrastruktur des Landes schwer treffen. Er ist aber auch schneller und stellt sicher, dass wir unseren Willen danach mit größerer Kraft durchsetzen können."
 expand_civil_fascism_support:0 "Zivile Unterstützung ausbauen"
 expand_civil_fascism_support_desc:1 "Wir müssen dafür sorgen, dass unsere Sache in der Bevölkerung immer mehr Unterstützung findet, und sie ermutigen, die Autorität der gegenwärtigen Regierung öffentlich in Frage zu stellen. Da die Position der Regierung zunehmend untergraben wird und die Unruhen in der Bevölkerung zunehmen, wird es für uns leichter, unsere Ziele zu erreichen. Dies gilt insbesondere dann, wenn diese Ziele, anders als ein legaler Regierungswechsel, mit einem finstereren Mittel des Regimewechsels verbunden sind."
 army_support_for_fascist_civil_war:0 "Ausweitung der militärischen Unterstützung"
 army_support_for_fascist_civil_war_desc:0 "Ohne umfassende militärische Unterstützung wäre jede Hoffnung auf einen Sieg in einem bewaffneten ideologischen Kampf vergeblich. Wir müssen uns der Loyalität gut aufgestellter Einheiten unserer Streitkräfte versichern."
 army_support_TT:0 "Jedes Mal, wenn die Armeeunterstützung erhöht wird, wird die Stärke Ihrer Fraktion im Bürgerkrieg um 10 % erhöht, bis zu einer maximalen Gesamtstärke von 70 %.\n"
 ensure_general_loyalty_for_fascist_civil_war:1 "Sicherstellung der Loyalität des unteren Armeekommandos"
 ensure_general_loyalty_for_fascist_civil_war_desc:0 "Es ist möglich, dass bestimmte Generäle insgeheim der extremen Rechten zugeneigt sind. Wir müssen auf sie zugehen und uns ihrer Loyalität für den Beginn der Kämpfe versichern."
 ensure_marshal_loyalty_for_fascist_civil_war:0 "Sicherstellung der Loyalität des oberen Armeekommandos"
 ensure_marshal_loyalty_for_fascist_civil_war_desc:0 "Es ist möglich, dass bestimmte Feldmarschälle insgeheim der extremen Rechten zugeneigt sind. Wir müssen auf sie zugehen und uns ihrer Loyalität für den Beginn der Kämpfe versichern."
 siphon_equipment_stockpiles_for_fascist_civil_war:0 "Siphonausrüstung"
 siphon_equipment_stockpiles_for_fascist_civil_war_desc:0 "Indem wir die Ausrüstungslager des Landes plündern, können wir einen kleinen Waffenvorrat anlegen, der uns in unserem zukünftigen Kampf helfen wird."
 formulate_surprise_attack_plan_for_fascist_civil_war:0 "Formulieren Sie einen Überraschungsangriffsplan"
 formulate_surprise_attack_plan_for_fascist_civil_war_desc:0 "Der Feind ahnt nichts von der bevorstehenden Katastrophe. Wir müssen dafür sorgen, dass dies auch so bleibt, und gleichzeitig unsere Schlachtpläne so ausrichten, dass wir das Überraschungsmoment optimal nutzen."
 formulate_surprise_attack_plan_for_civil_war_tt:0 "Der Überraschungsangriffsplan gewährt allen Divisionen im Kerngebiet 30 Tage lang einen Angriffsbonus von 25 %.\n"
 ignite_the_fascist_civil_war:0 "Bürgerkrieg entfachen"
 ignite_the_fascist_civil_war_desc:0 "Es ist Zeit, den Sprung zu wagen. Alle notwendigen Vorbereitungen sind getroffen. Es gibt kein Zurück mehr."
 rebuild_the_nation_fascism:0 "Wiederaufbau der Nation"
 rebuild_the_nation_fascism_desc:0 "Nach dem Bürgerkrieg ist nun die Zeit gekommen, unsere zerstörte Nation wieder aufzubauen."
 open_up_political_discourse_fascism:0 "Den politischen Diskurs öffnen"
 open_up_political_discourse_fascism_desc:1 "Wir müssen die Akzeptanz abweichender Standpunkte in der Regierung öffnen. Vielleicht wird dies letztendlich einen friedlichen Wandel in der Politik unseres Landes ermöglichen."
 discredit_government_fascism:0 "Regierung diskreditieren"
 discredit_government_fascism_desc:0 "Indem wir auf die vielen Mängel unserer derzeitigen Regierung hinweisen, können wir die Menschen dazu bringen, über die ideologischen Ursachen dieser Versäumnisse nachzudenken."
 hold_the_fascist_national_referendum:0 "Halten Sie ein nationales Referendum ab"
 hold_the_fascist_national_referendum_desc:0 "Mit ausreichender Unterstützung können wir nun gefahrlos und ohne Blutvergießen ein Referendum abhalten, um einen Regierungswechsel herbeizuführen."
 democratic_on_the_rise:0 "Demokratie auf dem Vormarsch"
 democratic_on_the_rise_desc:0 "Lautstarke politische Kräfte haben begonnen, sich für demokratische Werte einzusetzen und finden dabei Unterstützung bei einem immer größeren Teil der Bevölkerung. Der Weg zur Demokratie ist für das Land frei, es bleibt nur noch die Entscheidung zwischen einem friedlichen und einem gewaltsamen Übergang."
 prepare_for_democratic_civil_war:0 "Bereiten Sie sich auf den Bürgerkrieg vor"
 prepare_for_democratic_civil_war_desc:1 "Wir haben keine Zeit, auf den langsamen Wandel in den Köpfen der Bevölkerung zu warten. In ihrem eigenen Interesse müssen wir die Sache schnell vorantreiben, auch wenn dabei einige ihr Leben verlieren könnten. Anders als ein friedliches Referendum würde ein Bürgerkrieg unsere Streitkräfte, die Industrie und die Infrastruktur des Landes schwer treffen. Er ist aber auch schneller und stellt sicher, dass wir unseren Willen danach mit größerer Kraft durchsetzen können."
 expand_civil_democratic_support:0 "Zivile Unterstützung ausbauen"
 expand_civil_democratic_support_desc:1 "Wir müssen dafür sorgen, dass unsere Sache in der Bevölkerung immer mehr Unterstützung findet, und sie ermutigen, die Autorität der gegenwärtigen Regierung öffentlich in Frage zu stellen. Da die Position der Regierung zunehmend untergraben wird und die Unruhen in der Bevölkerung zunehmen, wird es für uns leichter, unsere Ziele zu erreichen. Dies gilt insbesondere dann, wenn diese Ziele, anders als ein legaler Regierungswechsel, mit einem finstereren Mittel des Regimewechsels verbunden sind."
 army_support_for_democratic_civil_war:0 "Ausweitung der militärischen Unterstützung"
 army_support_for_democratic_civil_war_desc:0 "Ohne umfassende militärische Unterstützung wäre jede Hoffnung auf einen Sieg in einem ideologischen Kampf vergeblich. Wir müssen uns der Loyalität gut aufgestellter Einheiten unserer Streitkräfte versichern."
 ensure_general_loyalty_for_democratic_civil_war:1 "Sicherstellung der Loyalität des unteren Armeekommandos"
 ensure_general_loyalty_for_democratic_civil_war_desc:0 "Möglicherweise hegen bestimmte Generäle insgeheim demokratische Ansichten. Wir müssen auf sie zugehen und uns ihrer Loyalität für den Beginn der Kämpfe versichern."
