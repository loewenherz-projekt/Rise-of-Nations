 SIA_Economic_Depression:0 "Wirtschaftskrise"
 SIA_Economic_Depression_desc:0 "Der Geldmangel, der zur Finanzkrise führte, ist auf das Haushaltsdefizit der Regierung zurückzuführen, da die Einnahmen des Staates geringer waren als die Ausgaben. Bis der Staat auf die Staatsreserven zurückgreifen musste, sanken die Staatseinnahmen aus Steuereinnahmen. Gleichzeitig stiegen die Staatsausgaben seit der Herrschaft von König Chulalongkorn. Dies war die Ursache für die Haushaltsprobleme in den Jahren 1920–1925, in denen der Großteil der Staatsausgaben für die Landesverteidigung und die Monarchie aufgewendet wurde."
 SIA_Bowring_Treaty_1925:0 "Bowring-Vertrag 1925"
 SIA_Bowring_Treaty_1925_desc:0 "Dieser Vertrag hatte nur begrenzte Auswirkungen auf die Einkommenssteigerung und die wirtschaftliche Entwicklung Thailands und ermöglichte Ausländern den freien Handel in Bangkok. Während der Herrschaft von König Rama VI. ernannte er 1925 Dr. Francis Bowes Sayre zum Vertreter der thailändischen Regierung, um Änderungen am britischen Vertrag auszuhandeln. Dadurch konnte der Steuersatz im Boring-Vertrag teilweise geändert werden."
 SIA_Bowring_Treaty_1925_2:0 "Bowring-Vertrag 1925"
 SIA_Bowring_Treaty_1925_2_desc:0 "Dieser Vertrag hatte nur begrenzte Auswirkungen auf die Einkommenssteigerung und die wirtschaftliche Entwicklung Thailands und ermöglichte Ausländern den freien Handel in Bangkok. Während der Herrschaft von König Rama VI. ernannte er 1925 Dr. Francis Bowes Sayre zum Vertreter der thailändischen Regierung, um Änderungen am britischen Vertrag auszuhandeln. Dadurch konnte der Steuersatz im Boring-Vertrag teilweise geändert werden."
 SIA_Military_Restructuring:0 "Militärische Umstrukturierung"
 SIA_Military_Restructuring_desc:0 "Phraya Songsuradet sah, dass Siam eine kleine Bevölkerung hatte. Aber es gab zu viele Kommandeure, wie kleine Menschen mit großen Köpfen. Deshalb wollte er die Struktur der Armee anpassen, um sie kleiner, aber effizienter zu gestalten und die Streitkräfte auf verschiedene Regionen zu verteilen. Und er hatte den höchsten militärischen Rang, nur ein Oberst wie die Schweiz."
