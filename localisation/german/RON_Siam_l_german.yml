### Events 

improvedsiam.1.title:0 "Gründung der Militärgruppe „Jungtürken“"
improvedsiam.1.desc:0 "Es gibt einen jungen Militäroffizier, Oberst Luang Pibunsongkram. Er war während der Regierung von Phraya Phahonphonphayuhasena Verteidigungsminister. Er gründete eine Militärgruppe namens „Jungtürken“ und setzte politische Strategien und demokratische Methoden ein, um Phraya Phahonphon zur Auflösung des Repräsentantenhauses zu bewegen. Daraufhin unterstützten die meisten Abgeordneten – sowohl gewählte als auch ernannte – Oberst Luang Phibunsongkram als Premierminister."
improvedsiam.1.a:0 "Hmm, da stimmt was nicht."
improvedsiam.2.title:0 "Phraya Pahon beantragt Rücktritt als Premierminister"
improvedsiam.2.desc:0 "Im Jahr 1937 wurde ein großer Teil des Staatsgrundstücks günstig an Bekannte verkauft. Daraufhin wurde im Repräsentantenhaus eine allgemeine Debatte angeregt. Der Premierminister stimmte der vorgeschlagenen Debatte zu und gab allen Parteien die Möglichkeit, den Verkauf des Staatsgrundstücks in Ruhe zu prüfen. Am 27. Juli 1937 reichte der Premierminister seinen Rücktritt ein. Er begründete dies damit, dass der Verkauf des Staatsgrundstücks an die Partei, wie am Morgen dieses Tages im Rat besprochen, geprüft werden müsse."
improvedsiam.2.a:0 "Wir brauchen ihn zurück!"
improvedsiam.3.title:0 "Änderung der Armeestruktur"
improvedsiam.3.desc:0 "Phraya Songsuradet sah, dass Siam nur eine kleine Bevölkerung hatte. Es gab jedoch zu viele Kommandeure. Wie kleine Leute, aber mit großen Köpfen. Deshalb wollte er die Struktur der Armee anpassen, damit sie kleiner, aber effizienter ist und die Streitkräfte effizienter auf verschiedene Regionen verteilt werden können. Und er hatte den höchsten militärischen Rang, nur ein Oberst wie in der Schweiz. Nach der Änderung der Herrschaft mischte sich Phraya Songsuradet, obwohl er Politik nicht wirklich mochte, plötzlich in die Armee ein und organisierte die Armeestruktur sofort wie geplant, indem er befahl, alle Generäle zu entlassen und viele Militäreinheiten zu verlegen. Dies betraf viele Soldaten und sorgte für Unzufriedenheit bei vielen Offizieren, darunter auch Luang Pibun."
improvedsiam.3.a:0 "Armeestruktur ändern."
improvedsiam.4.title:0 "Nächster Premierminister von Siam"
improvedsiam.4.desc:0 "Nachdem Phraya Phahonphonphayuhasena Ende 1938 angekündigt hatte, keine Premierministerämter mehr anzunehmen, waren Phraya Song Suradet und Luang Phibun bei der Wahl des Premierministers so etwas wie „Konkurrenten“ oder „Rivalen“."
improvedsiam.4.a:0 "Luang Phibul sollte"
improvedsiam.4.b:0 "Phraya Songsuradet sollte"
improvedsiam.5.title:0 "Phraya Pahon Zurück"
improvedsiam.5.desc:0 "Die Ratsmitglieder wählten Oberst Phraya Phahonphon zum Premierminister. Sie hegten keinerlei Zweifel am Verkauf des Staatsgrundstücks durch den Premierminister. Nach der Ratssitzung trafen sich über 80 Ratsmitglieder, um Oberst Phraya Phahon in Wang Parusk zu treffen und ihn zu bitten, sein Amt als Premierminister fortzusetzen."
improvedsiam.5.a:0 "Großartig"
improvedsiam.6.title:0 "Demonstration in Bangkok"
improvedsiam.6.desc:0 "Die Stimmung und die Gefühle der Menschen zu dieser Zeit, die sich über die französische Bedrohung und die lange Verfolgung ärgerten, zogen Studenten und Yuwachon Thaharn auf die Straße, um die Regierung zu fordern, das Land zurückzufordern, das Frankreich durch den Vorfall in RE 112 verloren hatte. Die Verhandlungen wurden zurückgeführt. Fazit: Der Vertrag scheint unwirksam zu sein. Als Frankreich auf Thailands Vorschlag reagierte, indem es sich weigerte, die Grenzlinie zwischen Thailand und Frankreich zu verbessern,"
improvedsiam.6.a:0 "Chai yo!"
improvedsiam.7.title:0 "Territoriale Verhandlungen mit Frankreich"
improvedsiam.7.desc:0 "Die thailändische Regierung schlug der französischen Regierung vor, die Grenzlinie zu verbessern. Frankreich sollte sich gemäß internationalem Recht einer Verbesserung der Grenzen unterziehen. Das bedeutet, dass das Mekong-Becken gemäß internationalem Recht als Grenzlinie gilt und Thailand einen fairen Grenzverlauf erhält. Die französische Seite bat jedoch darum, die Verhandlungen abzuwarten."
improvedsiam.7.a:0 "Wir werden es noch einmal versuchen"
improvedsiam.8.a:0 "Wir müssen dieses Problem schnell lösen!"
improvedsiam.8.title:0 "Inflationsprobleme"
improvedsiam.8.desc:0 "Thailand musste während des Krieges, als Güter knapp waren, im Vergleich zu den verfügbaren Gütern große Mengen Banknoten drucken. Aufgrund von Produktionsunterbrechungen wurden Arbeitskräfte und Rohstoffe zur Herstellung von Ausrüstung verlagert und im Krieg eingesetzt. Außerdem wurden Produkte zu hohen Preisen verkauft, was eines der schlimmsten Inflationsprobleme in der thailändischen Finanzgeschichte verursachte. Wiwat Chaiyachayanon sieht die Ursache dieses Problems in drei Faktoren: erstens in den japanischen Militärausgaben. Zweitens zahlt die Regierung mehr als sie einnimmt. Und schließlich änderten sich der Wechselkurs und der Yen, sodass er nun denselben Wert wie vor dem höheren Baht hat."
improvedsiam.9.title:0 "Frankreich lehnte den Antrag ab"
improvedsiam.9.desc:0 "Frankreich lehnte die thailändischen Vorschläge ab und bestand darauf, einen nichtinvasiven Vertrag mit Thailand zu unterzeichnen. Und zwar nur zur Ratifizierung. Die politische Atmosphäre sorgt für Spannungen zwischen Thailand und Frankreich. Dies führt zu Kämpfen entlang der Grenze."
improvedsiam.9.a:0 "Wir können das nicht länger zurückhalten!"
improvedsiam.9.b:0 "Wir müssen in Frieden handeln"
improvedsiam.10.a:0 "Es lebe Thailand"
improvedsiam.10.title:0 "Phibulsongkhrams Rede"
improvedsiam.10.desc:0 "Phibulsongkhrams Rede"
improvedsiam.11.title:0 "Anpassung der Wechselkurse zwischen Baht und Yen"
improvedsiam.11.desc:0 "Die japanische Regierung schlägt vor, den Wechselkurs zwischen Baht und Yen auf 100 Baht pro 100 Yen anzupassen. Zuvor entsprachen 100 Baht 155,70 Yen. Der Grund dafür ist, dass Banken mehr Banknoten als üblich ausgeben. Denn Banken müssen Baht im Tausch gegen japanische Yen als Verkaufskosten für die japanische Armee zahlen, und der japanische Handel ging gemäß einer Vereinbarung zwischen der thailändischen und der japanischen Regierung nach Thailand."
improvedsiam.11.a:0 "Wir haben keine Wahl"
improvedsiam.12.title:0 "Japan intervenierte als Vermittler im Konflikt"
improvedsiam.12.desc:0 "Japan befürchtet, dass dieser Kampf seine Politik behindern könnte. Deshalb schaltete sich Japan als Vermittler in den Konflikt ein und wird die Gebiete zurückgewinnen, die Thailand an Frankreich verloren hat."
improvedsiam.12.a:0 "Wir haben keine Wahl"
improvedsiam.12.b:0 "Verweigern"
improvedsiam.13.title:0 "Friedensvertrag in Tokio"
improvedsiam.13.desc:0 "Nachdem der Streit mit Japan als Vermittler bei den Verhandlungen beigelegt wurde, unterzeichneten Thailand und Frankreich das Tokioter Friedensabkommen. Dadurch gewann Thailand Territorium zurück und wurde in vier neue Provinzen aufgeteilt: die Provinzen Nakhon Champasak, Lan Chang, Phibun Songkram und Battambang."
improvedsiam.13.a:0 "OK"
improvedsiam.14.title:0 "Große Flut in Bangkok"
improvedsiam.14.desc:0 "Starke Regenfälle im Nordosten und Nordwesten Thailands führten zu großen Überschwemmungen und verursachten große Schäden an Bauernhöfen, Feldern und Häusern in der Mitte, im Nordosten und im Norden. Die Überschwemmungen ereigneten sich im September, Oktober und November und waren eine der schwersten Überschwemmungen in der Geschichte Thailands."
improvedsiam.14.a:0 "Schon wieder Hochwasser??"
improvedsiam.15.t:0 "Große Flut in Bangkok"
improvedsiam.15.d:0 "Überschwemmungen sind in Thailand regelmäßige Naturkatastrophen, die fast jedes Jahr während der Monsunzeit auftreten. Die Monsunzeiten im Land sind regional unterschiedlich. Starke Regenfälle im Nordosten und Nordwesten Thailands verursachen große Überschwemmungen und verursachen große Schäden an Bauernhöfen, Feldern und Häusern in der Mitte, im Nordosten und im Norden. Die Überschwemmungen ereigneten sich im September, Oktober und November und waren eine der schwersten Überschwemmungen in der Geschichte Thailands."
improvedsiam.15.a:0 "Klingt schlecht"
improvedsiam.15.b:0 "Klingt schlecht"
improvedsiam.16.t:0 "asd"
improvedsiam.16.d:0 "a"
improvedsiam.17.t:0 "Luang Phibul überlebt das Attentat"
improvedsiam.17.d:0 "Dies war bereits das zweite Attentat. Es ereignete sich am 9. November 1938. Die Tat wurde von Personen in seinem Haus begangen. Sie geschah kurz vor den Parlamentswahlen in seinem eigenen Haus im Bezirk Bang Sue. Gegen 19 Uhr, als Phibulsongkram sich für eine Party im Verteidigungsministerium zurechtmachte, stürmte ein Gärtner namens Lee Bunta das Feuer in sein Zimmer. Er gab an, sich vor dem Attentat unter dem Bett versteckt gehalten zu haben. Doch letztendlich überlebte Phibulsongkram das Attentat."
improvedsiam.17.a:0 "OK"
improvedsiam.18.t:0 "Phibul überlebt erneut ein Attentat"
improvedsiam.18.d:0 "Dies ist das dritte Mal, dass er ein Attentat überlebt hat. Dieses Mal wurde er vom Chef beim Mittagessen ermordet. Er speiste gerade mit seinen Freunden, doch als er merkte, dass er vergiftet war, beeilte er sich, rechtzeitig im Armeekrankenhaus den Magen zu waschen. Was die Verbrecher angeht, verpfiff er auch seinen Arbeitgeber nicht."
improvedsiam.18.a:0 "OK"
improvedsiam.19.t:0 "Luang Phibul starb bei einem Attentat"
improvedsiam.19.d:0 "Dies ist das dritte Attentat. Dieses Mal wurde er von einem Koch beim Mittagessen ermordet. Er aß gerade mit seinen Freunden, aber das Mittagessen war voller Gift. Als er es bemerkte, eilte er ins Krankenhaus, konnte es aber nicht rechtzeitig bemerken."
improvedsiam.19.a:0 "Ruhe in Frieden"
