improvedsiam.25.t:0 "Petchabul-Projekt"
improvedsiam.25.d:0 "Im weiteren Verlauf des Krieges hatte Plaek Phibunsongkhram geplant, die Hauptstadt nach Phetchabun zu verlegen. Er fürchtete eine unvermeidliche Invasion Bangkoks und plante stattdessen die Verlegung der Hauptstadt in die Bergregion Phetchabun. Er hatte das Gebiet bereits mit Luang Phibunsongkhram vermessen und wartet nun auf die Zustimmung des Parlaments zu dem Projekt."
improvedsiam.25.a:0 "Bereiten Sie sich auf Veränderungen vor"
improvedsiam.25.b:0 "Keine Stadt kann Bangkok ersetzen!"
improvedsiam.25.c:0 "Nicht jetzt"

improvedsiam.26.t:0 "Luang Phibunsongkhram kam nach Phetchabul"
improvedsiam.26.d:0 "Kurz nach der Genehmigung des Projekts beschloss Luang Phibun Songkram, nach Ban Bung Nam Talay zu reisen, um dort einen Stadtpavillon zu errichten. In Kürze wird er den Umzug des Regierungsbüros anordnen. Darüber hinaus wurden in der gesamten Provinz Ministerien und Ämter eingerichtet. Allerdings sollte die Konzentration auf eine Stadt wie Bangkok nicht erfolgen, da das Büro des Premierministers und der Regierungspavillon im Bereich des Huai Yai-Wasserfalls errichtet wurden."
improvedsiam.26.a:0 "OK"

improvedsiam.27.t:0 "Nakhon Phetchabun"
improvedsiam.27.d:0 "Nachdem das Phetchabun-Projekt vor Monaten vom Parlament genehmigt worden war, wurde heute der Saolakmuang (Stadtpfeiler) von Phetchabun errichtet und verschiedene Regierungsbehörden haben ihre Büros bereits von Bangkok in dieses Gebiet verlegt.\n\nDieser nationale Plan soll vor unseren Feinden geheim bleiben, bis der Krieg vorbei ist. Die meisten unserer nationalen Reserven wurden bereits heimlich per Zug in geheime Höhlen in den Bergen gebracht, wo sie mit versteckten Flugabwehrkanonenstellungen ausgestattet sind, um jedes unglückliche Flugzeug abzuschießen."
improvedsiam.27.a:0 "Lasst uns unsere neue Hauptstadt feiern!"

improvedsiam.28.t:0 "Die Kriegssituation"
improvedsiam.28.d:0 "Das thailändische Kabinett berief eine Sondersitzung ein, um sich über die Lage im Krieg zwischen Deutschland und Polen zu informieren. Dieser Krieg ereignete sich vor der offiziellen Kriegserklärung Englands und Frankreichs. Thailand kann dank Kommunikationstechnologien wie dem Rundfunk schneller Informationen und Nachrichten aus Europa empfangen, da die Regierung und die thailändische Bevölkerung dadurch schneller informiert werden können. Bei der Kabinettssitzung wurde neben der Kriegslage zwischen Deutschland und Polen und der Haltung Englands und Frankreichs auch die Rolle Thailands im Krieg diskutiert, ein weiterer Punkt, dem die Regierung ihre Aufmerksamkeit widmen muss. Thailand hat natürlich aus dem Ersten Weltkrieg gelernt und wollte zu Beginn des Krieges noch an einer neutralen Politik festhalten."
improvedsiam.28.a:0 "Habe es"

improvedsiam.29.t:0 "Gründung des CCEN"
improvedsiam.29.d:0 "Die Neutralitätspolitik Thailands in diesem Krieg entstand, weil die Einschätzung der Neutralität bereits gerechtfertigt war. Ein Kriegseintritt bringt Thailand keinerlei Vorteile. Die thailändische Neutralitätspolitik spiegelt die Sichtweise des Krieges und der Schlacht wider und berücksichtigt die Ansichten und Haltungen von Supermächten wie England, Frankreich und Deutschland. Daher ist eine Organisation erforderlich, die Informationen sammelt, zusammenstellt und zusammenfasst, um die Kriegslage genau zu kennen. Die thailändische Regierung kann diese Informationen nutzen, um Entscheidungen zu treffen und die Neutralitätspolitik fortzusetzen. Die oben genannte Agentur wurde als „Komitee für Nachrichtennotfälle“ eingerichtet."
improvedsiam.29.a:0 "Es muss geheim bleiben"

improvedsiam.30.t:0 "a"
improvedsiam.30.d:0 "Die Neutralitätspolitik Thailands in diesem Krieg entstand, weil die Einschätzung der Neutralität bereits gerechtfertigt war. Ein Kriegseintritt bringt Thailand keinerlei Vorteile. Die thailändische Neutralitätspolitik spiegelt die Sichtweise des Krieges und der Schlacht wider und berücksichtigt die Ansichten und Haltungen der Supermächte wie Großbritannien, Frankreich und Deutschland. Daher ist eine Organisation erforderlich, die Informationen sammelt, zusammenstellt und zusammenfasst, um die Kriegslage genau zu kennen. Die thailändische Regierung kann diese Informationen nutzen, um Entscheidungen zu treffen und die Neutralitätspolitik fortzusetzen. Die oben genannte Agentur wurde als „Komitee für Nachrichtennotfälle“ eingerichtet."
improvedsiam.30.a:0 "a"

improvedsiam.31.t:0 "Japanische Invasion in Französisch-Indochina"
improvedsiam.31.d:0 "Die japanische Invasion in Französisch-Indochina war eine kurze, nicht erklärte militärische Konfrontation zwischen Japan und Frankreich im Norden Französisch-Indochinas. Sie fand gleichzeitig mit der Schlacht von Süd-Guangxi im Japanisch-Chinesischen Krieg statt. Hauptziel war es, die Republik China daran zu hindern, Waffen und Treibstoff über Französisch-Indochina entlang der Eisenbahnlinie Kunming-Haiphong einzuführen. "
improvedsiam.31.b:0 "Es wird etwas Schlimmes passieren."

