jungletroops:0"Dschungelspezialisten I"
jungletroops_desc:0"Dschungelspezialisten werden darauf trainiert, den harten Bedingungen des Dschungelkriegs standzuhalten und mit dem häufigen Mangel an Vorräten klarzukommen."
jungletroops2:0"Dschungelspezialisten II"
jungletroops2_desc:0"Dschungelspezialisten werden darauf trainiert, den harten Bedingungen des Dschungelkriegs standzuhalten und mit dem häufigen Mangel an Vorräten klarzukommen."
jungletroops3:0"Dschungelspezialisten III"
jungletroops3_desc:0"Dschungelspezialisten werden darauf trainiert, den harten Bedingungen des Dschungelkriegs standzuhalten und mit dem häufigen Mangel an Vorräten klarzukommen."


shocktroops:0"Stoßtruppen I"
shocktroops_desc:0"Stoßtruppen werden eingesetzt, um die Verteidigungslinien des Gegners heftig anzugreifen und an bestimmten Stellen einen Durchbruch zu erzielen. Diese Einheiten haben eine höhere Durchbruchskraft und eine höhere Angriffskraft als normale Infanterie. Allerdings verbrauchen Stoßtruppen auch mehr Vorräte und benötigen eine längere Erholungszeit."
shocktroops2:0"Stoßtruppen II"
shocktroops2_desc:0"Stoßtruppen werden eingesetzt, um die Verteidigungslinien des Gegners heftig anzugreifen und an bestimmten Stellen einen Durchbruch zu erzielen. Diese Einheiten haben eine höhere Durchbruchskraft und eine höhere Angriffskraft als normale Infanterie. Allerdings verbrauchen Stoßtruppen auch mehr Vorräte und benötigen eine längere Erholungszeit."
shocktroops3:0"Stoßtruppen III"
shocktroops3_desc:0"Stoßtruppen werden eingesetzt, um die Verteidigungslinien des Gegners heftig anzugreifen und an bestimmten Stellen einen Durchbruch zu erzielen. Diese Einheiten haben eine höhere Durchbruchskraft und eine höhere Angriffskraft als normale Infanterie. Allerdings verbrauchen Stoßtruppen auch mehr Vorräte und benötigen eine längere Erholungszeit."


desertinfantry_at:0"Wüsteninfanterie I"
desertinfantry_at_desc:0"Die sandigen Berge der Wüste können für Ihre reguläre Infanterie tückisch sein. Um in dieser Umgebung zurechtzukommen, können Sie Ihre Wüsteninfanterie trainieren, um in der Wüste die Oberhand zu gewinnen. Modifikatoren: Angriff +20 %, Verteidigung +20 % und Mobilität +10 %"
desertinfantry_at2:0"Wüsteninfanterie II"
desertinfantry_at2_desc:0"Die sandigen Berge der Wüste können für Ihre reguläre Infanterie tückisch sein. Um in dieser Umgebung zurechtzukommen, können Sie Ihre Wüsteninfanterie trainieren, um in der Wüste die Oberhand zu gewinnen."
desertinfantry_at3:0"Wüsteninfanterie III"
desertinfantry_at3_desc:0"Die sandigen Berge der Wüste können für Ihre reguläre Infanterie tückisch sein. Um in dieser Umgebung zurechtzukommen, können Sie Wüsteninfanteriekräfte ausbilden, um in der Wüste die Oberhand zu gewinnen."


tech_flamethrower:0"Flammenwerfer I"
tech_flamethrower_desc:0"Flammenwerfer sind im Nahkampf sehr nützlich und können im Häuserkampf und gegen feste Befestigungen sehr effektiv eingesetzt werden. Sie verleihen Ihren Divisionen außerdem eine erhebliche sanfte Angriffskraft."
tech_flamethrower2:0"Flammenwerfer II"
tech_flamethrower2_desc:0"Flammenwerfer sind im Nahkampf sehr nützlich und können im Häuserkampf und gegen feste Befestigungen sehr effektiv eingesetzt werden. Sie verleihen Ihren Divisionen außerdem eine erhebliche sanfte Angriffskraft."
