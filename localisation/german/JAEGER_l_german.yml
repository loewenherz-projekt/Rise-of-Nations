jaeger:0"Jaeger"
jaeger_desc:0"Jäger sind Streitkräfte, die auf das Überleben in der Wildnis des borealen Waldes spezialisiert sind. Normalerweise sind diese Truppen in ihrem Gebiet heimisch und benötigen eine lange Ausbildung."

jungletroop:0"Dschungelspezialisten"
jungletroop_desc:0"Dschungelspezialisten werden darauf trainiert, den harten Bedingungen des Dschungelkriegs standzuhalten und den Feind auf seine eigene Art herauszufordern."

desertinfantry:0"Wüsteninfanterie"
desertinfantry_desc:0"Kämpfe in der Wüste sind vielen Gefahren ausgesetzt, die sich jedoch manchmal nicht vermeiden lassen. Durch eine spezielle Ausbildung unserer Soldaten für diese Umgebung können wir diese Risiken minimieren."

shocktroop:0"Stoßtrupps"
shocktroop_desc:0"Stoßtruppen können in die feindlichen Linien eindringen, um einen Durchbruch zu erzielen. Dies ist für jede Form von Tiefenkampf nahezu unerlässlich und kann erheblich dazu beitragen, die Verteidiger in Unordnung zu bringen."

flamethrower:0"Flammenwerfer-Unterstützung"
flamethrower_desc:0"Flammenwerfer können im Nahkampf eine große Hilfe sein. Das Räumen von Häusern und Befestigungen mit regulären Infanterieeinheiten kann sehr kostspielig sein. Der Flammenwerfer ist bei solchen Aufgaben und im Nahkampf gegen schwache Einheiten im Allgemeinen eine große Hilfe."


