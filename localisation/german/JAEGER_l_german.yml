tech_flamethrower3_desc:0"Flammenwerfer sind im Nahkampf sehr nützlich und können im Häuserkampf und gegen feste Befestigungen sehr effektiv eingesetzt werden. Sie verleihen Ihren Divisionen außerdem eine erhebliche sanfte Angriffskraft."
