jaegers:0"Jäger I"
jaegers_desc:0"Jäger sind Streitkräfte, die auf das Überleben in der Wildnis des borealen Waldes spezialisiert sind. Normalerweise sind diese Truppen in ihrem Gebiet heimisch und benötigen eine lange Ausbildung."
