l_german:

coastal_defense_ship:0"Küstenverteidigungsschiff"
coastal_defense_ship_desc:0"Die Sverige-Klasse bestand aus drei Küstenschlachtschiffen, die vor dem Ersten Weltkrieg für die schwedische Marine gebaut wurden. Die Schiffe ähnelten sowohl in ihrer Größe (Verdrängung von über 6.800 Tonnen) als auch in ihrer Bewaffnung (vier 283-mm/44 K/45 M12-Geschütze) eher schweren Kreuzern. Die Schiffe waren für einen Kreuzer relativ langsam, aber sehr gut gepanzert. Alle drei Schiffe waren im Zweiten Weltkrieg im Einsatz."
coastal_defense_ship_1:0"Sverige-Klasse"
coastal_defense_ship_1_desc:0"Die Sverige-Klasse bestand aus drei Küstenschlachtschiffen, die vor dem Ersten Weltkrieg für die schwedische Marine gebaut wurden. Die Schiffe ähnelten sowohl in ihrer Größe (Verdrängung von über 6.800 Tonnen) als auch in ihrer Bewaffnung (vier 283-mm/44 K/45 M12-Geschütze) eher schweren Kreuzern. Die Schiffe waren für einen Kreuzer relativ langsam, aber sehr gut gepanzert. Alle drei Schiffe waren im Zweiten Weltkrieg im Einsatz."

