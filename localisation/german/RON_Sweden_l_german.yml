##################National Focuses Sweden
SWE_motti_tactic:0"Aktive Verteidigung"
SWE_motti_tactic_desc:0"Wir sind heute nicht in der Lage, eine Großmacht in Europa zu überwältigen, unabhängig von unseren Bündnissen. Daher verfolgen wir eine aktive Verteidigungsdoktrin und nutzen die dichten Wälder zu unserem Vorteil. Die Finnen nennen dies Motti-Taktik, und wir sollten diese Taktik in gemeinsamen Übungen üben."
#SWE_motti_tactic:0"Adopt Motti Tactics"
SWE_kings_council:0"Der König im Rat"
SWE_kings_council_desc:0"Der König im Rat oder „Konungen i Statsrådet“ gibt dem König die Möglichkeit, sein eigenes Kabinett zu bilden und die derzeitige Regierung bei Bedarf abzuberufen. Mehrere Generäle und eine starke öffentliche Bewegung haben Seine Majestät dazu gedrängt, die Führung zu übernehmen, um eine pragmatischere Außenpolitik zu verfolgen und unseren Nachbarn zur Seite zu stehen."
SWE_convoy_focus:0"Schützen Sie die Handelsschiffe"
SWE_convoy_focus_desc:0"Wir müssen unsere Anstrengungen zum Schutz der Handelsschiffe und ihrer Schiffe verstärken, um unseren internationalen Handel zu sichern. Die schwedische Wirtschaft und Kriegsanstrengungen hängen von diesen Importen und Exporten ab."
#SWE_convoy_focus:0"Atlantic Dockyards"
SWE_iron_ore:0"Unterstützen Sie die Handelsbranche"
SWE_iron_ore_desc:0"Schweden verfügt über eine lange Schiffbautradition und eine große Handelsflotte. Diese müssen wir nutzen und unsere inländischen Schiffbaukapazitäten weiter ausbauen."
SWE_fortify_gulf:0"Befestigen Sie den Bottnischen Meerbusen"
SWE_small_arms_focus:0"Vapenfabrik"
SWE_unified_command:0"Oberbefehlshaber"
SWE_slot_expansion:0"Industrielle Zusammenarbeit"
SWE_technology_sharing:0"Technologieaustausch"
SWE_technology_sharing_desc:0"Teilen Sie alle technologischen Fortschritte mit Fraktionsmitgliedern, dies hängt von den Fraktionsmitgliedern ab."
SWE_kings_meeting:0"Stockholmer Kommuniqué"
SWE_hansson_3:0"Hansson III Schrank"
SWE_hansson_3_desc:0"Bilden Sie die Regierung der Nationalen Einheit, auch bekannt als Kabinett Hansson III."
SWE_construction_effort_II:0"L&amp;M Ericsson "
SWE_frivilligkaren:0"Erweitern Sie Frivilligkåren"
SWE_frivilligkaren_desc:0"Viele sympathisieren mit der finnischen Sache und betrachten sie als eine Erweiterung unserer eigenen Außenpolitik, was viele potenzielle Rekruten beschert."
SWE_german_command:0"Deutsche Berater"
SWE_german_command_desc:0"Erlauben Sie erfahrenen deutschen Kommandanten, mehrere unserer Einheiten zu unterstützen, zu führen und auszubilden, um während des Krieges an Effizienz zu gewinnen."
SWE_embargo_soviet:0"Embargo UdSSR"
SWE_embargo_england:0"Embargo Großbritannien"
SWE_baltic_uprising:0"Baltische Meuterei"
SWE_baltic_uprising_desc:0"Erklärung: Estland wird sich mit 60 %iger Wahrscheinlichkeit (und Lettland mit 40 %iger Wahrscheinlichkeit) gegen die UdSSR erheben. 10 Tage später werden 1 Leichter Kreuzer, 2 Zerstörer und 1 U-Boot erbeutet und von Tallinn nach Schweden geschickt."
SWE_volunteer_corps:0"Nicht-Kriegsführung"
SWE_polistrupper_focus:0"Polistrupper"
SWE_polistrupper_focus_desc:0"In einer verdeckten Operation werden dänische und norwegische Freiwillige in Schweden zu „Polizisten“ ausgebildet und kämpfen später auf unserer Seite für die Befreiung Dänemarks und Norwegens."
SWE_guarantee_finland:0"Garantie Finnland"

SWE_nationalism_focus:0"NSAP-Koalitionsregierung"
SWE_nationalism_focus_desc:0"Nach der Aufhebung der Åland-Konvention spaltet sich die SAP. Bildung einer Koalitionsregierung mit den NSAP-Nationalisten, um die Macht zu übernehmen."
SWE_internationalism_focus:0"SKP-Koalitionsregierung"
SWE_internationalism_focus_desc:0"Nach der Aufhebung der Åland-Konvention spaltet sich die SAP. Bildung einer Koalitionsregierung mit den Kommunisten der SKP, um die Macht zu übernehmen."

SWE_support_allies:0"Kommuniqué von Göteborg"
SWE_malmoe_communique:0"Malmö-Kommuniqué"
SWE_american_engineers:0"Amerikanische Ingenieure"

SWE_danish_ultimatum:0"Dänisches Ultimatum"
#SWE_danish_ultimatum:0"Join or Die"

SWE_ajs:0"Ranger Academy AJS"
SWE_ajs_desc:0"Die Arméns Jägarskola bildet schwedische Spezialeinheiten und Elitesoldaten aus, um uns in der multilateralen Kriegsführung einen Vorteil zu verschaffen."

SWE_svensk_standard:0"Gemeinsamer Produktionsstandard"
SWE_svensk_standard_desc:0"Schweden ist heute die treibende Kraft der Industrie in Skandinavien, und die meisten anderen Branchen sind bei ihrer Fertigung auf unsere Produkte angewiesen. Durch die Formalisierung gemeinsamer Produktionsstandards können wir die Produktion deutlich effizienter gestalten und alle Änderungen mit unseren Verbündeten koordinieren."

SWE_beredskap:0"Beredskap"
SWE_beredskap_desc:0"Machen Sie Ihre Streitkräfte bereit und bereiten Sie sie darauf vor, Schweden gegen jede Bedrohung aus dem Ausland zu verteidigen."

SWE_arrest_royalists:0"Royalisten verhaften"
SWE_arrest_royalists_desc:0"Der König hat uns lange genug den Weg zur Macht versperrt. Trotz seiner Popularität kann ein Monarch nicht das Staatsoberhaupt unserer glorreichen Nation sein. Wir müssen die Verantwortung übernehmen, ihn zum Rücktritt zwingen und die obersten Abteilungsleiter, von denen viele Royalisten sind, entlassen. Revolutionäre Elemente unserer Partei haben bereits Pläne angedeutet, sie und die königliche Familie zu verhaften."
SWE_abolish_monarchy:0"Die Monarchie abschaffen"
SWE_abolish_monarchy_desc:0"Der König ist ein überzeugter Antibolschewist und darf das Volk nicht länger unterdrücken. Wir müssen die Monarchie abschaffen."
SWE_facket:0"Folkhemmet"
SWE_facket_desc:0"Wir müssen die Heimat des Volkes verbreiten, indem wir unsere eigene Fraktion gründen."
SWE_norway_friend:0"Fonds norwegischer Kommunisten"
SWE_norway_friend_desc:0"Finanzieren Sie norwegische Gewerkschaften und kommunistische Politiker, um unseren Einfluss in der Region zu stärken. Wenn wir gute Beziehungen zu den Norwegern pflegen, können wir vielleicht eine weitere Union gründen?"
SWE_deal_soviet:0"Ein Deal mit der UdSSR"
SWE_deal_soviet_desc:0"Geben Sie den Sowjets die Kontrolle über Karelien im Austausch für den Beitritt zu ihrer Fraktion und ihre Unterstützung bei der Durchsetzung des Kommunismus in Norwegen durch erhebliche subversive Anstrengungen."
SWE_women_pilots:0"Flyglottakåren"
SWE_women_pilots_desc:0"Nehmen Sie Pilotinnen in Ihre Pilotenprogramme auf."
SWE_technology_sharing_comintern:0"Forschungsstadt Murmansk"
SWE_technology_sharing_comintern_desc:0"Teilen Sie Technologie mit der UdSSR."
SWE_norway_unification:0"Skandinavische Sozialistische Union"
SWE_norway_unification_desc:0"Bilden Sie die vierte Union mit Norwegen und vereinen Sie Ihre beiden Länder zu einer Skandinavischen Sozialistischen Union. Die Geschichte war und wird wieder auf unserer Seite sein, wenn wir als ein Land zusammenstehen."

SWE_support_iceland_rebels:0"Versorgung isländischer Nationalisten"
SWE_support_iceland_rebels_desc:0"Die Isländer streben schon lange nach Unabhängigkeit von Dänemark und einige sind bereit, für ihr eigenes Land zu kämpfen. Wir müssen die Nationalisten bewaffnen."
SWE_iceland_rebel_uprising:0"Isländischer Aufstand"
SWE_iceland_rebel_uprising_desc:0"Die isländischen Nationalisten wurden von uns umfassend ausgebildet und bewaffnet. Nun müssen wir ihnen helfen, ihre Unabhängigkeit zu sichern. Wir sind uns jedoch nicht sicher, wie die Dänen reagieren werden."
SWE_strb:0"Stridsbåtar"
SWE_strb_desc:0"Entwickeln Sie kleine, wendige Boote, die mit Maschinengewehren bewaffnet sind und viel Platz bieten, um unsere Marines zu transportieren und Invasionen zu beschleunigen."
SWE_axis_leanings_focus:0"Achsenneigungen"
SWE_axis_leanings_focus_desc:0"Wir müssen näher an Deutschland heranrücken und unsere Politik auf eine mögliche Mitgliedschaft in der Achse ausrichten."
SWE_technology_sharing_axis:0"Krupp Tech Sharing"
SWE_technology_sharing_axis_desc:0"Beginnt mit dem Technologieaustausch mit Deutschland."
SWE_found_own_empire:0"Unser eigenes Imperium"
SWE_found_own_empire_desc:0"Gründen Sie unsere eigene Fraktion und vertreten Sie unsere Interessen im Baltikum."  


SWE_bofors_nobelkrut:0"Bofors Nobelkrut"
#SWE_bofors_nobelkrut:0"Encourage Domestic Arms Manufacturing"
SWE_bofors_nobelkrut_desc:0"Bofors ist unser größter und vielleicht wichtigster Waffenhersteller. Sie bauen einige der leistungsfähigsten und qualitativ hochwertigsten Waffen der Welt. Indem wir sie bei der Modernisierung ihrer Nobelkrut-Anlagen unterstützen, können wir die Produktion bestimmter Geräte steigern. Ihr größter Anteilseigner Axel Wenner-Gren wird das Verteidigungsministerium bei der angemessenen Wiederbewaffnung unseres Landes beraten."
SWE_undk:0"Signalaufklärung FRA"
SWE_undk_desc:0"Derzeit sind unsere Geheimdienste und das Cipher Office über die Streitkräfte und den Verteidigungsstab verstreut. Wir müssen sie in einer eigenen Abteilung, der FRA, neu organisieren."
#SWE_undk:0"Intelligence Agency FRA"
#SWE_undk_desc:0"Implement the Intelligence Office of the Defence Staff to reduce foreign subversie activity. UNDK is short for Underrättelsekontoret which is part of Försvarsstaben."
#SWE_amfss:0"Kustartilleriets Skjutskola"
#SWE_amfss:0"Coastal Artillery School"
SWE_amfss_desc:0"Kustartilleriets Skjutskola bildet unsere Marines für den Einsatz in Küstengebieten aus."
SWE_amfss:0"Küstenschützenschule KAS"
SWE_musko_bas:0"Archipelstützpunkte"
SWE_crypto_bomb_focus:0"Geheimfernschreiber-Chiffre"
SWE_crypto_bomb_focus_desc:0"Holen Sie den brillanten Mathematiker Arne Beurling in die Kryptoabteilung und geben Sie ihm und seinem Team die Ressourcen, um unsere Verschlüsselungsbemühungen voranzutreiben."
SWE_stuka_effort:0"Nydqvist &amp; Holm Flygmotorfabriker"
#SWE_stuka_effort:0"StuKa Operations"
SWE_stuka_effort_desc:0"Da die deutsche Luftwaffe nach dem Versailler Vertrag zahlreichen Einschränkungen unterliegt, möchten die Deutschen StuKa-Sturzkampfbombereinsätze in Schweden üben, an denen wir gerne teilnehmen können."
SWE_synth_oil:0"Skifferoljeaktiebolaget"
SWE_army_effort:0"Arméstaben"
SWE_army_effort_desc:0"Im Rahmen unserer militärischen Reorganisation wird das Heeresstabsbüro eingerichtet. Der Stab wird künftig nicht mehr dem Staatsoberhaupt, sondern dem Verteidigungsstab und dem Oberbefehlshaber unterstellt sein."
SWE_doctrine_effort_2:0"Mechanisierter Kampf"
SWE_doctrine_effort_2_desc:0"Der moderne Kampf wird zunehmend mechanisiert und wir müssen dies bei der Entwicklung unserer Kampfdoktrinen berücksichtigen."
SWE_doctrine_effort_3:0"Königliche Militärakademie Karlberg"
SWE_doctrine_effort_3_desc:0"Die Königliche Militärakademie Karlberg kann weiter ausgebaut werden, um mehr Offiziere aufzunehmen und mehr Erfahrung an die Front zu bringen."
SWE_equipment_effort:0"Fonds Carl Gustafs Gevärsfaktori"
SWE_equipment_effort_desc:0"Carl Gustafs Gevärsfaktori ist ein hochqualifizierter Kleinwaffendesigner, der den nächsten technologischen Sprung für moderne Waffen anstrebt"
SWE_equipment_effort_2:0"Gunnary School ArtSS"
SWE_equipment_effort_2_desc:0"Die Artilleriskjutskolan wird unsere Artillerie ausbilden, um im Feld effizienter zu sein."
SWE_rocket_effort:0"Reaktionsmotor"
#SWE_rocket_effort:0"Jet-Motor"
SWE_rocket_effort_desc:0"Beginnen Sie mit der Entwicklung von Düsentriebwerken, die sowohl moderne Flugzeuge als auch ballistische Raketen antreiben können."
SWE_nuclear_effort:0"Kärnvapenprogrammet"
SWE_nuclear_effort_desc:0"Weisen Sie die FOA an, ein Kernforschungsprogramm „Kärnvapenprogrammet“ zu starten."
SWE_ski_troops:0"Winterausrüstung"
SWE_ski_troops_desc:0"Wir müssen unserer Infanterie Winterausrüstung geben, damit sie dem Feind im rauen arktischen Gelände Nordeuropas mit Vorteil gegenübertreten kann."
SWE_mechanization_effort:0"Gepanzerte Geländewagen bestellen"
SWE_mechanization_effort_desc:0 "Pansarterrängbilar sind robuste Panzerwagen, die in unwegsamem Gelände eingesetzt werden können und unsere Infanterie sicher in den Kampf bringen."
SWE_armor_effort:0"Vertrag Landsverk"
SWE_armor_effort_desc:0 "Landsverk ist ein in Landskrona ansässiges Panzerunternehmen, das im Wettbewerb um die Produktion schwedischer Panzer für unsere Verteidigung steht."
SWE_aviation_effort:0"Flygstaben"
SWE_aviation_effort_desc:0"Im Rahmen unserer militärischen Reorganisation wird das Luftfahrtstabsbüro eingerichtet. Der Stab wird von nun an dem Verteidigungsstab und dem Oberbefehlshaber der Streitkräfte und nicht mehr dem Staatsoberhaupt unterstellt sein."
SWE_fighter_focus:0"Flygverkstäderna"
SWE_fighter_focus_desc:0 "Luftkämpfe haben im Ersten Weltkrieg noch nicht stattgefunden. Wenn wir bei der Entwicklung von Kampfflugzeugen die Nase vorn haben, werden wir auch in Zukunft einen Vorteil haben."
SWE_bomber_focus:0"Zweimotorige SAAB-Flugzeuge"
SWE_bomber_focus_desc:0"SAAB ist ein Hightech-Hersteller von Aluminiumflugzeugen und bereit, eine Reihe von Flugzeugen für unsere Royal Air Force zu produzieren."
SWE_jet_fighter_focustree:0"Das Fass und die Lanze"
SWE_jet_fighter_focustree_desc:0"Saab hat in den letzten Jahren große Fortschritte gemacht und seine Flugzeuge werden immer wettbewerbsfähiger. Das Unternehmen plant nun die Entwicklung eigener Düsenjäger, die den Spitznamen „Barrel and the Lance“ tragen."
SWE_CAS_effort:0"Sturzkampfbomber"
SWE_CAS_effort_desc:0"Für jede Armee ist es unerlässlich, Sturzkampfbomber zur Luftnahunterstützung anzuschaffen."
SWE_NAV_effort:0"Torpedobomber"
SWE_NAV_effort_desc:0"Torpedobomber haben begonnen, sich in der Seekriegsführung als äußerst vielversprechend zu erweisen."
SWE_bulltofta:0"Bulltofta &amp; Kavaheden"
SWE_bulltofta_desc:0"Bauen Sie die Flugplätze Bulltofta bei Malmö und Kavaheden in Lappland. Schweden ist riesig und um die Lufthoheit zu erlangen, sind zahlreiche Flugplätze unbedingt erforderlich."
SWE_ornen:0"Pilotenakademie FlygS"
SWE_ornen_desc:0"Einige Länder haben begonnen, Frauen für ihre Pilotenprogramme zu rekrutieren. Wir haben uns entschieden, nur die besten Männer mit echter Kampfgeist-Einstellung für eine umfassende Pilotenausbildung zu rekrutieren. Sie werden gut auf die rauen skandinavischen Wetterbedingungen und zukünftige Luftkämpfe mit unserem Feind vorbereitet sein."
SWE_geting:0"Manöver Getingen"
SWE_bulldog:0"Kampfpiloten"
SWE_bulldog_desc:0"Implementieren Sie das Pilotentrainingsprogramm Bulldoggen, um Manöver zu üben, die die Fähigkeiten für mehrere Flugzeugklassen verbessern."
SWE_j22_steel_fighter:0"J-22 Steel Fighter"
SWE_j22_steel_fighter_desc:0"Beauftragen Sie Bo Lundgren mit dem Bau einer Stahlrahmenversion der J-22, um den Bedarf an Kampfflugzeugen trotz des aktuellen Aluminiummangels zu decken. Dieses Kampfflugzeug ist mit der SpitFire aus den 1940er Jahren vergleichbar und verwendet Stahl anstelle von Aluminium als Rohmaterial." 
#SWE_support_the_industry:0"Iron Ore Line"
SWE_support_the_industry:0"Nordbahnen"
SWE_support_the_industry_desc:0"Unterstützen Sie die Industrie in Nordschweden und erweitern Sie die Infrastruktur in Schlüsselbereichen in der Nähe der Eisenerzlinie."
SWE_southern_infrastructure:0"Südbahn"
SWE_southern_infrastructure_desc:0"Bauen Sie zusätzliche Eisenbahnstrecken durch Skåne und Småland, um die Transportmöglichkeiten zwischen dem Öresund und Stockholm zu verbessern."
SWE_planned_expansion:0"Finanzierung staatlicher Unternehmen"
SWE_planned_expansion_desc:0"Finanzieren Sie staatliche Unternehmen, um die Zahl der Beschäftigten zu erhöhen, die Arbeitslosigkeit zu senken und gleichzeitig die heimische Produktionsleistung zu steigern."
SWE_scania_rubber:0"Trelleborg Gummifabrik"
SWE_scania_rubber_desc:0"Trelleborgs Gummifabrik ist ein wichtiger Lieferant von Gummi und synthetischen Materialien, dringend benötigten Ressourcen für die Produktion von modernen Maschinen und Kampfflugzeugen."
SWE_mining:0"Aluminiumunternehmen"
SWE_mining_desc:0"Die Swedish Aluminum Company (SAKO) möchte ihre Verarbeitungskapazitäten durch den Bau einer Verarbeitungsanlage in Sundsvall erweitern. Unterstützen Sie das Unternehmen, um die Produktion von hochwertigem Aluminium zu steigern."
SWE_construction_effort_I:0"Kugellagerfabrik"
SWE_construction_effort_I_desc:0"Schwedische Kugellager sind von sehr hoher Qualität und werden in modernen Maschinen auf der ganzen Welt eingesetzt."
SWE_production_effort_I:0"Organisieren Sie die mechanischen Arbeiten"
SWE_production_effort_I_desc:0"Die Mechanischen Werke sind Produktionsbetriebe, die die Industrie mit wichtigen Teilen versorgen, nicht zuletzt für unsere Waffenhersteller. Organisieren Sie ihre Bemühungen und erweitern Sie ihre Anlagen, um ihre Lieferungen an SAAB, Bofors und Landsverk zu steigern."
SWE_substitute_aluminium:0"Aluminiumersatz"
SWE_substitute_aluminium_desc:0"Um der großen Nachfrage nach Aluminium und dem geringen Angebot gerecht zu werden, müssen verschiedene staatliche Maßnahmen ergriffen werden, beispielsweise das Recycling und die Umarbeitung von Stahl zu einem Aluminiumersatz."
SWE_industry_research:0"Industrielle Forschung"
SWE_industry_research_desc:0 "Unsere industrielle Expansion und andere aktuelle Fortschritte könnten es uns ermöglichen, parallel mehr Forschung und Entwicklung durchzuführen."
SWE_extra_tech_slot_2:0"Forschungsinstitut FOA"
#SWE_extra_tech_slot_2:0"Millitary Research"
SWE_extra_tech_slot_2_desc:0 "Die schnelle Industrialisierung unseres Landes hat neue Möglichkeiten in Forschung und Entwicklung eröffnet, die wir nutzen sollten."
#SWE_secret_weapons:0"Försvarets Forskningsanstalt"
SWE_secret_weapons:0"Forschungsinstitut FOA"
SWE_secret_weapons_desc:0 "Es ist verlockend, alle zusätzlichen Ressourcen in die Entwicklung von Panzern und Flugzeugen zu stecken, aber das Geheimnis, Kriege zu gewinnen, liegt in ganz neuen Wissenschaftsbereichen: Elektronik, Raketentechnik und Nuklearforschung."
SWE_naval_effort:0"Stockholms Örlogsvarv"
#SWE_naval_effort:0"Stockholm Shipyards"
#SWE_naval_effort:0"Marinverkstäderna"
SWE_naval_effort_desc:0 "Der Ausbau unserer Marine sollte unsere oberste Priorität sein. Setzen Sie alle verfügbaren Ressourcen ein, um weitere Werften für unsere bereits bestehende „Örlogsvarv“ zu bauen."
SWE_flexible_navy:0"Marinstab"
SWE_flexible_navy_desc:0 "Durch die Neugestaltung der Seekriegsführung unter Berücksichtigung der Fortschritte in der U-Boot-Technologie können wir feindliche Konvois effizient bekämpfen."
SWE_large_navy:0"Marinedoktrin bewerten"
SWE_large_navy_desc:0 "Bisher hat unsere Marine offene Seeschlachten vermieden und unsere gesamte Strategie basiert auf der flachen Küstenlinie, die für unsere Feinde schwer zu manövrieren ist. Es ist an der Zeit, unsere Marinedoktrinen zu überdenken und zu beurteilen, was die Seeschlachten der modernen Kriegsführung erfordern."
SWE_baltic_dominance:0"Kontrollieren Sie die Ostsee"
SWE_baltic_dominance_desc:0"Es liegt in unserem Interesse, die Ostsee bestmöglich zu kontrollieren. Wenn möglich, würden wir danach streben, diese Region zu beherrschen, um unsere ausgedehnte Küstenlinie zu schützen."
SWE_capital_ships:0"Kreuzer renovieren"
SWE_capital_ships_desc:0"Es ist unbedingt erforderlich, dass wir unsere derzeit in Produktion befindlichen Kreuzerklassen modernisieren, damit sie es mit jeder anderen modernen Marine in der Ostsee aufnehmen können."
SWE_destroyer_effort:0"Moderne Zerstörer bestellen"
#SWE_destroyer_effort:0"Jagare"
SWE_destroyer_effort_desc:0"Schweden ist durchaus in der Lage, qualitativ hochwertige Zerstörer zu bauen. Da der technologische Fortschritt stetig voranschreitet, müssen wir sicherstellen, dass unsere Zerstörer den modernen Standards entsprechen."
#SWE_sea_wolves:0"Wolfpack"
SWE_sea_wolves:0"Ubåtsflottiljen"
SWE_sea_wolves_desc:0"Dieser U-Boot-Einsatz kann einer kleinen Nation wie der unseren einen entscheidenden Vorteil verschaffen, um feindliche Konvois anzugreifen und heimliche Angriffe auf Großkampfschiffe durchzuführen."

SWE_osterbotten:0"Schwedische Konsolidierung"
SWE_osterbotten_desc:0"Die Schweden im gesamten Baltikum müssen als ein Volk zusammenstehen und die Interessen der anderen schützen. "
SWE_infrastructure:0"Südbahn"
SWE_infrastructure_desc:0"Bauen Sie zusätzliche Eisenbahnstrecken durch Skåne und Småland, um die Transportmöglichkeiten zwischen dem Öresund und Stockholm zu verbessern."
SWE_production_effort_II:0"Entwicklung der Flugzeugindustrie"
SWE_production_effort_II_desc:0"Die zivile Flugzeugindustrie hat in den letzten Jahren stark zugenommen und beginnt, wettbewerbsfähige Flugzeuge für den internationalen Markt zu produzieren. Da unsere Luftwaffe kaum über Kampfflugzeuge verfügt, müssen wir Hersteller wie ASJA, SAAB und Nohab Flygmotorfabriker ermutigen, ihre Anstrengungen zur Produktion moderner Kampfflugzeuge zu verstärken."
#SWE_production_effort_II:0"Flygmotorfabriker"
SWE_bomb_defence:0"Bergrum"
SWE_motorized_focus:0"Motorisierte Standardisierung"
SWE_planned_expansion_II:0"Öffentliche Bauinvestitionen"
SWE_planned_expansion_II_desc:0"Um unseren heimischen Baumarkt anzukurbeln und unsere industriellen Anstrengungen auszuweiten, können wir der Regierung erlauben, in öffentliche Bauunternehmen zu investieren."
SWE_planned_expansion_III:0"Industrielle Expansion"



SWE_lottorna:0"Lottorna"
SWE_lottorna_desc:0"Lottorna ist eine Hilfsorganisation für Frauen, die seit 1924 Frauen einzieht, um Männer in einigen weniger wichtigen Bereichen unserer Verteidigung zu ersetzen. Jetzt können wir sie in die drei bewaffneten Zweige einteilen, damit sie am aktiven Dienst teilnehmen können."
SWE_neutrality_focus:0"Skandinavische Isolation"
SWE_neutrality_focus_desc:0"Es liegt in unserem Interesse, die nordischen Neutralitätsregeln einzuhalten und unsere Beziehungen zu unseren Nachbarn zu verbessern. Dies ist für uns von weit größerer Bedeutung als alle Meinungsverschiedenheiten in Kontinentaleuropa. Mit der Unterzeichnung des Stockholmer Kommuniqués stärken wir die Beziehungen zwischen den nordischen Ländern."
#SWE_fortify_skargard:0"Kustartilleriet"
SWE_fortify_skargard:0"Küstenartillerie"
SWE_fortify_skargard_desc:0"Weisen Sie die Kustartilleriet an, Verteidigungsanlagen entlang der Küste zu errichten und unsere Häfen zu befestigen, um das Heimatland auf mögliche Invasionen von See aus vorzubereiten. Verbessern Sie außerdem die Havsbandslinjen, um unsere Verteidigung im Stockholmer Schärengarten zu stärken."
SWE_fortify_scania:0"Skånelinjen"
SWE_fortify_scania_desc:0"Bauen Sie die Verteidigungslinie, auch Per-Albin-Linie genannt, zum Schutz der Südküste."
SWE_airfields_gotland:0"Gotska Flygfält"
SWE_airfields_gotland_desc:0"Bau einer Reihe von Flugplätzen und Flugabwehrkanonen auf Gotland"
SWE_tornea_line:0"Kalixlinjen"
SWE_tornea_line_desc:0"Verteidigungsanlagen entlang des Flusses Torne zum Schutz der östlichen Landgrenze."

SWE_liberty_ethos:0"Exportbasierte Wirtschaft"
SWE_liberty_ethos_desc:0"Stärken Sie unseren Handel, indem Sie unsere Wirtschaft noch besser auf den internationalen Handel der modernen Welt vorbereiten."
SWE_intervention:0"Ausländisches Engagement"
SWE_intervention_desc:0"Schauen Sie nach vorn und stärken Sie Ihren Einfluss in Skandinavien."
SWE_alliance_finland:0"Åbo-Konferenz"
SWE_alliance_finland_desc:0"Bilden Sie das historische Bündnis mit Finnland, für das sich viele Militärführer und Politiker auf beiden Seiten des Golfs eingesetzt haben. Unsere Unabhängigkeit steht und fällt mit der Karelischen Landenge."
SWE_finalnd_arms_production:0"Finnische Rüstungskooperation"
SWE_finalnd_arms_production_desc:0"Arbeiten Sie bei der Kleinwaffenproduktion mit Finnland zusammen, um Effizienzsteigerungen zu erzielen."
SWE_baltic_refugees:0"Nordische Evakuierte"
SWE_baltic_refugees_desc:0"Viele baltische Flüchtlinge flohen während des Zweiten Weltkriegs nach Schweden und mehrere schwedische Minderheiten, darunter die Estlandschweden, wurden mit Handelsschiffen und Zerstörern evakuiert."
SWE_demand_aland:0"Nachfrage Åland"
SWE_demand_aland_desc:0"Fordern Sie Åland von den Finnen. Es ist unser Recht, mit unserem Volk wiedervereinigt zu werden und den Eingang zum Bottnischen Meerbusen zu schützen. Es ist wichtig, die schwedische Bevölkerung auf den Inseln zu schützen und unser historisches Land zurückzufordern."
SWE_befriend_denmark:0"Kopenhagener Vertrag"
SWE_befriend_denmark_desc:0"Fordern Sie Dänemark und Norwegen auf einem Gipfel in Kopenhagen auf, sich unserer Allianz anzuschließen."
SWE_danish_factory_alliance:0"Dänische Industriekooperation"
SWE_danish_factory_alliance_desc:0"Arbeiten Sie mit den Dänen zusammen, um die Fabrikproduktion zu rationalisieren."
SWE_befriend_norway:0"Oslo-Änderung"
SWE_befriend_norway_desc:0"Bitten Sie Norwegen, einem Bündnis beizutreten."
SWE_small_ships:0"Norwegische Werftkooperation"
SWE_small_ships_desc:0"Institut für norwegische Schiffsmontage zur Verbesserung der Effizienz der U-Boot- und Zerstörerproduktion."
SWE_norway_war_goal:0"Anhang Norwegen"
SWE_norway_war_goal_desc:0"Norwegen erklärte 1905 seine Unabhängigkeit von Schweden und ist seitdem ein souveräner Staat. Der politische Diskurs ist jedoch härter geworden, und die erheblichen Meinungsverschiedenheiten könnten uns dazu zwingen, einzugreifen und die Unabhängigkeit Norwegens zu kontrollieren."
SWE_germany_friend:0"Deutsche Zusammenarbeit"
SWE_germany_friend_desc:0"Die deutsche Macht in Europa nimmt ständig zu. Durch Zusammenarbeit können wir bessere Beziehungen zu den Deutschen aufbauen. "
SWE_soviet_war_goal:0"Dagö &amp; Ösel-Krise"
SWE_estonia_war_goal:0"Dagö &amp; Ösel-Krise"
SWE_estonia_war_goal_desc:0"Dagö und Ösel sind beides Inseln vor der Westküste Estlands, die historisch von Schweden bewohnt wurden, die an der Ostsee lebten. Ihre aktuelle Lage ist unsicher, und die Spannungen in der Region machen es wahrscheinlich, dass ihre Regierung gegen sie vorgeht. Für unsere Landsleute droht eine Krise. Wir müssen eingreifen!"
SWE_militarism:0"Millitarismus"
SWE_german_tank_production:0"Deutsche Panzerkooperation"
SWE_german_tank_production_desc:0"Angesichts des größeren Wohls sind die Deutschen bereit, uns bei unseren Kriegsanstrengungen zu helfen, die Produktion leichter Panzer zu rationalisieren."
SWE_soviet_friend:"Befriend Soviet Union"
SWE_influence_finland_communism:0"Finnland zwingen"
SWE_influence_norway_communism:0"Norwegen zwingen"

SWE_norwegian_ultimatum:0"Norwegisches Ultimatum"
SWE_go_with_britain:0"Schließen Sie sich den Verbündeten an"

SWE_planned_expansion_comm:0"Arbeitererweiterung"

SWE_foreign_expeditions:0"Frivilligkåren"
SWE_foreign_expeditions_desc:0"Frivilligkåren sind unsere Freiwilligenbataillone, die sich im Namen anderer Nationen engagieren, die sie nötiger brauchen als wir."
SWE_war_bonds:0"Kriegsanleihen"
SWE_war_bonds_desc:0"Wir können die Menschen bitten, in staatliche Kriegsanleihen zu investieren, um Geld für unsere Kriegsanstrengungen zu sammeln."
SWE_ltank_tooltip:0"Kann jetzt leichte Panzer und motorisierte Einheiten einsetzen"
SWE_forsvenskning_tt:0"Kann Event Unite mit Finnland-Schweden bekommen"
#SWE_forsvarsbeslutet:0"Defence Policy"
SWE_forsvarsbeslutet:0"Försvarsbeslutet"
SWE_forsvarsbeslutet_desc:0"Verkünden Sie die Nationale Verteidigungsbewertung, die unseren Verteidigungsbedarf für die nächsten zehn Jahre ermittelt. Dieses Mal benötigen wir zusätzliche Mittel für das Verteidigungsministerium und die Rüstungsindustrie, um unsere inländischen Produktionsziele zu erreichen."
SWE_fst:0"Oberbefehlshaber"
SWE_ransonering:0"Rationierung"
SWE_ransonering_desc:0"Wir können uns dafür entscheiden, einige Konsumgüter zu rationieren, um Kapazitäten in unseren zivilen Fabriken freizugeben."
SWE_air_defence:0"Luftvärnet"
SWE_air_defence_desc:0"Luftvärnet ist für die Verteidigung unseres Luftraums vom Boden aus verantwortlich."
SWE_anschluss_finland:0"Arbetarbundet"
SWE_hemvarnet:0"Heimwehr"
SWE_hemvarnet_desc:0"Hemvärnet ist eine Zivilmiliz, die Männer aus dem ganzen Land versammelt, um das Heimatland vor potenziellen Eindringlingen zu schützen."
SWE_naval_dockyard_effort:0"Varvs-Erweiterung"
SWE_naval_dockyard_effort_desc:0"Erweitern Sie die Marinewerften und stärken Sie die norwegische Zusammenarbeit."
SWE_radar:0"RADAR"
SWE_radar_desc:0"Konzentrieren Sie Ihre Bemühungen auf die Entwicklung besserer Radarsysteme zur Erkennung feindlicher Aktivitäten."
SWE_kalix_line:0"Kalixlinjen"
SWE_kalix_line_desc:0"Die Kalix-Linie ist eine Festungslinie, die zum Schutz unserer nordöstlichen Grenze zu Finnland und weiter zur Sowjetunion errichtet wurde. Sie liegt entlang des Flusses Torne in dichten Wäldern."
SWE_continuation_war:0"Fortsetzungskrieg"
SWE_continuation_war_desc:0"Nehmen Sie am Fortsetzungskrieg teil, um die Sowjets ein für alle Mal aus unseren skandinavischen Heimatländern zu vertreiben."
SWE_liberate_norway:0"Krieg mit Deutschland"
SWE_liberate_norway_desc:0"Befreien Sie Norwegen von den Deutschen und unterstützen Sie die Mission der Alliierten."
SWE_political_effort:0"En Svensk Tiger"
SWE_political_effort_desc:0"Der schwedische Nationalgeist soll das Volk vereinen und die Kriegsanstrengungen stärken."
SWE_claim_aland:0"Widerruf der Åland-Konvention"
SWE_claim_aland_desc:0"Mit der 1921 unterzeichneten Åland-Konvention erhielt Finnland die Åland-Inseln. Die Bevölkerungsmehrheit ist schwedisch, und die Inseln gehören historisch zu unserem Territorium. Wir können uns dem Urteil des Völkerbundes widersetzen und die Åland-Konvention aufheben, um die Inseln für Schweden zurückzufordern."
SWE_fortify_aland:0"Befestigen Sie Åland"
SWE_fortify_aland_desc:0"Befestigen Sie die Åland-Inseln, da sie eine strategische Schlüsselposition beim Schutz Stockholms und des Golfs einnehmen."

#SWE_min_def:0"The Five Year Plan"
SWE_min_def:0"Verteidigungsministerium"
SWE_american_help:0"Amerikanische Ausrüstung"
SWE_kalmar_union:0"Skandinavismus"
SWE_kalmar_union_desc:0"Die Idee, dass wir im Kampf gegen einen gemeinsamen Feind geschlossen zusammenstehen sollten, ist nichts Neues. Dieser wiederbelebte Skandinavismus wird es uns ermöglichen, Personal in unseren Streitkräften freizusetzen und unsere Fähigkeit zur Verstärkung zu verbessern."
SWE_black_chamber:0"Aufstand der Weißen Garde"
SWE_black_chamber_desc:0"Erklärung: Schweden wird einen Bürgerkrieg in Finnland anzetteln und dann von der demokratischen Republik Finnland zum Beitritt aufgefordert werden. Åland wird sich einige Tage später erheben und sich mit Schweden vereinigen, wenn Sie zustimmen. Sie werden gegen das kommunistische Finnland kämpfen, wenn Sie zustimmen."
SWE_embargo_germany:0"Embargo Deutschland"
SWE_polstjarna:0"Operation Stella Polaris"
SWE_abandon_neutrality:0"Neutralität aufgeben"
SWE_abandon_neutrality_desc:0"Geben Sie die derzeitige Neutralitätspolitik unserer Regierung auf, um eine interventionistischere Politik zu verfolgen, und beziehen Sie in den kommenden Konflikten Stellung für Ihre Seite."
SWE_saltsjobad:0"Saltsjöbad-Abkommen"
SWE_saltsjobad_desc:0"Unterzeichnen Sie das historische Saltsjöbad-Abkommen und legen Sie ein für alle Mal fest, dass die Regierung aus allen privaten Verhandlungen zwischen Arbeitnehmern und ihren Arbeitgebern herausgehalten wird, um die Wettbewerbsfähigkeit unserer Branche zu steigern."


SWE_oresund:0"Öresund-Streit"


SWE_polistrupper:0"Gewinnen Sie 2 Divisionen Polizeitruppen in Südschweden"
SWE_balttrupper:0"Die 1. Division flieht nach Schweden"

###########Events
sweden.1.t:0"Schweden fordert Åland"
sweden.1.d:0"Die schwedische Regierung hat in der jüngeren Vergangenheit Druck auf uns ausgeübt, Åland unter ihre Kontrolle zu stellen. Die Mehrheit der Åland-Bevölkerung ist schwedisch und steht der Idee sehr positiv gegenüber. Åland ist jedoch für unsere Kontrolle über den Bottnischen Meerbusen von entscheidender Bedeutung. Dies ist eine schwierige Entscheidung, aber angesichts der jüngsten Entwicklungen in Stockholm sollten wir alle Möglichkeiten in Betracht ziehen."
sweden.1.a:0"Akzeptieren Sie die Anforderungen."
sweden.1.b:0"Weigert euch, Åland gehört uns!"

sweden.2.t:0"Finnland akzeptiert Forderungen!"
sweden.2.d:0"Unsere Forderungen nach einer Rückgabe Ålands wurden erfüllt. Die finnische Regierung hat unsere Forderungen akzeptiert, und Åland ist nun wieder rechtmäßig in unserem Besitz. Dies ist ein bedeutender Sieg für unsere Regierung. Angesichts der Lage der Inseln gewinnen wir zudem einen wichtigen strategischen Vorteil in der Ostsee."
sweden.2.a:0"Endlich!"

sweden.3.t:0"Die Finnen weigern sich!"
sweden.3.d:0"Die finnische Regierung lehnt unsere Forderungen ab! Dies ist eine bedeutsame Entwicklung. Die schwedische Minderheit in Westfinnland wird weiterhin von den Finnen unterdrückt und unser historisches Land wird uns vorenthalten. Wir müssen eingreifen und unser Volk befreien!"
sweden.3.a:0"Empörend!"

sweden.6.t:0"Einladung zur schwedischen Fraktion"
sweden.6.d:0"Da die zunehmenden weltweiten Spannungen sowohl im In- als auch im Ausland für Instabilität sorgen, strebt die schwedische Regierung ein Bündnis mit uns an. Dies ist in vielerlei Hinsicht sehr begrüßenswert, man sollte jedoch nicht vergessen, dass ein Bündnis in beide Richtungen funktioniert. Die Risiken in unserem geopolitischen Umfeld sind erheblich, und eine solche Entscheidung muss sorgfältig abgewogen werden. Sollten wir uns für eine solche Entscheidung entscheiden, könnte die Zukunft eine umfassende Zusammenarbeit mit sich bringen, die uns helfen kann, effektivere Produktionslinien zu schaffen."
sweden.6.a:0"Allianz annehmen"
sweden.6.b:0"Anfrage ablehnen"

sweden.7.t:0"Finnland tritt der Allianz bei"
sweden.7.d:0"Die Finnen haben eine kluge Entscheidung getroffen und sich unserer Nordischen Konföderation angeschlossen. Dies verleiht uns erhebliche Stärke, bringt aber auch viel Verantwortung mit sich. Wir sollten unsere militärische Zusammenarbeit ausbauen."
sweden.7.a:0"Wie sehr befriedigend"

sweden.8.t:0"Finnland lehnt ab"
sweden.8.d:0"Die Finnen haben deutlich gemacht, dass sie kein Bündnis mit uns anstreben. Dies ist ein schwerer Schlag für die gegenseitige Hilfe in Skandinavien. Wir müssen diese Kraft bestmöglich einsetzen und eine andere Alternative finden."
sweden.8.a:0"Unglücklich"

sweden.9.t:0"Einladung zur schwedischen Fraktion"
sweden.9.d:0"Da die zunehmenden weltweiten Spannungen sowohl im In- als auch im Ausland für Instabilität sorgen, strebt die schwedische Regierung ein Bündnis mit uns an. Dies ist in vielerlei Hinsicht sehr begrüßenswert, man sollte jedoch nicht vergessen, dass ein Bündnis in beide Richtungen funktioniert. Die Risiken in unserem geopolitischen Umfeld sind erheblich, und eine solche Entscheidung muss sorgfältig abgewogen werden. Sollten wir uns für eine solche Entscheidung entscheiden, könnte die Zukunft eine umfassende Zusammenarbeit mit sich bringen, die uns helfen kann, effektivere Produktionslinien zu schaffen."
sweden.9.a:0"Allianz annehmen"
sweden.9.b:0"Anfrage ablehnen"

sweden.10.t:0"Dänemark tritt der Allianz bei"
sweden.10.d:0"Die Dänen haben eine kluge Entscheidung getroffen und sich unserer Nordischen Konföderation angeschlossen. Dies verleiht uns erhebliche Stärke, bringt aber auch viel Verantwortung mit sich. Wir sollten versuchen, unsere militärische Zusammenarbeit auszubauen."
sweden.10.a:0"Wie sehr befriedigend"

sweden.11.t:0"Dänemark lehnt ab"
sweden.11.d:0"Die Dänen haben deutlich gemacht, dass sie kein Bündnis mit uns anstreben. Dies ist ein schwerer Schlag für die gegenseitige Hilfe in Skandinavien. Wir müssen diese Kräfte bestmöglich einsetzen und eine andere Alternative finden."
sweden.11.a:0"Unglücklich"

sweden.12.t:0"Einladung zur schwedischen Fraktion"
sweden.12.d:0"Da die zunehmenden weltweiten Spannungen sowohl im In- als auch im Ausland für Instabilität sorgen, strebt die schwedische Regierung ein Bündnis mit uns an. Dies ist in vielerlei Hinsicht sehr begrüßenswert, man sollte jedoch nicht vergessen, dass ein Bündnis in beide Richtungen funktioniert. Die Risiken in unserem geopolitischen Umfeld sind erheblich, und eine solche Entscheidung muss sorgfältig abgewogen werden. Sollten wir uns für eine solche Entscheidung entscheiden, könnte die Zukunft eine umfassende Zusammenarbeit mit sich bringen, die uns helfen kann, effektivere Produktionslinien zu entwickeln."
sweden.12.a:0"Allianz annehmen"
sweden.12.b:0"Anfrage ablehnen"

sweden.13.t:0"Norwegen tritt der Allianz bei"
sweden.13.d:0"Die Norweger haben eine kluge Entscheidung getroffen und sich unserer Nordischen Konföderation angeschlossen. Dies verleiht uns erhebliche Stärke, bringt aber auch viel Verantwortung mit sich. Wir sollten unsere militärische Zusammenarbeit ausbauen."
sweden.13.a:0"Wie sehr befriedigend"

sweden.14.t:0"Norwegen lehnt ab"
sweden.14.d:0"Die Norweger haben deutlich gemacht, dass sie kein Bündnis mit uns anstreben. Dies ist ein schwerer Schlag für die gegenseitige Hilfe in Skandinavien. Wir müssen diese Kraft bestmöglich einsetzen und eine andere Alternative finden."
sweden.14.a:0"Unglücklich"

sweden.19.t:0"Parlamentarische Auseinandersetzungen"
sweden.19.d:0"Nach der Ankündigung der neuen Åland-Politik haben sich in den letzten Monaten offenbar parteiübergreifende Bündnisse gebildet. Viele Abgeordnete haben sich daraufhin entschlossen, Teile der Regierung herauszufordern, was zu mehreren Auseinandersetzungen führte. Dies veranlasste Premierminister Hansson, sich in die Situation einzumischen. Die Regierung steht nun vor der Entscheidung, entweder den „Populisten“ entgegenzukommen und sie so vorerst zum Schweigen zu bringen, oder Stärke zu zeigen und sich direkt an die Öffentlichkeit zu wenden."
sweden.19.a:0"Passen Sie das Richtige an"
sweden.19.b:0"Der Linken entgegenkommen"
sweden.19.c:0"Zeig Stärke!"

sweden.20.t:0"Norwegen lehnt unsere Forderungen ab!"
sweden.20.d:0"Die Norweger haben sich geweigert, unsere Marionette zu sein. Dies ist eine unglückliche Wendung der Ereignisse, die uns zum Handeln zwingt. Die politische Instabilität hat jede vernünftige Erwartung übertroffen, und wir müssen unsere Interessen in Skandinavien sichern." 
sweden.20.a:0"Das bedeutet Krieg"

swe_norway.2.t:0"Gewerkschaften drängen auf kollektive Vertretung"
swe_norway.2.d:0"Die Gewerkschaften erhalten massive finanzielle Unterstützung von anderen Sozialisten im Ausland und führen seit einiger Zeit zahlreiche Kampagnen durch und mobilisieren die Bevölkerung. Dies hat nun seinen Höhepunkt erreicht, und sie fordern eine stärkere Vertretung in der Regierung. Entweder machen wir einige parlamentarische Zugeständnisse oder wir akzeptieren Henry Wilhelm Kristiansen, einen kommunistischen Revolutionär, als politischen Berater. Andernfalls werden sie streiken."
swe_norway.2.a:0"Machen Sie parlamentarische Zugeständnisse"
swe_norway.2.b:0"Akzeptieren Sie Henry Wilhelm Kristiansen"
swe_norway.2.c:0"Lasst sie zuschlagen!"

swe_norway.20.t:0"Schicksal Norwegens"
swe_norway.20.d:0"Die Schweden haben beschlossen, sich in unsere Angelegenheiten einzumischen. Aufgrund unserer politischen Differenzen halten sie dies für notwendig. Wir müssen entweder zu einer schwedischen Marionette werden oder die Konsequenzen einer solchen Ablehnung tragen. Dies ist ein anspruchsvolles Unterfangen, da die Bevölkerung angesichts unserer Unabhängigkeitserklärung von 1905 einen solchen Status nicht akzeptieren wird."
swe_norway.20.a:0"Werde eine schwedische Marionette."
swe_norway.20.b:0"Lehnen Sie diese Narren ab!"

sweden.22.t:0"Die Finnen lehnen unsere Union ab"
sweden.22.d:0"Die Finnen haben unseren Antrag auf Beitritt zur Gewerkschaft der Arbeiter in Skandinavien leider abgelehnt."
sweden.22.a:0"Wie traurig"

sweden.25.t:0"Malmö-Kommuniqué"

sweden.50.t:0"Baltische Meuterei"

sweden.51.t:0"Sowjetische Schiffe gekapert!"
sweden.51.d:0"Die estnischen Kampfflugzeuge in Tallinn enterten und kaperten sowjetische Schiffe, die im Hafen vor Anker lagen und auf ihre Abfahrt warteten. Die Hauptflotte der Sowjetunion war in Leningrad stationiert. Aus Angst vor einer baldigen sowjetischen Eroberung schickten die Meuterer einen Leichten Kreuzer, zwei Zerstörer und ein U-Boot nach Gotland und übergaben sie uns. Das sind großartige Neuigkeiten!"
sweden.51.a:0"Gut gedacht!"


sweden.55.t:0"Schweden bittet um Beitritt zu den Alliierten"
sweden.55.d:0"Die Schweden haben ihre langjährige Neutralitätspolitik aufgegeben und sich entschieden, uns in unseren Bemühungen zu unterstützen. Sie fordern nun, unserem Bündnis beizutreten und fest an unserer Seite zu stehen. Die Schweden besitzen strategisch wichtige Gebiete und riesige Mengen Eisenerz. Die Frage ist nur: Ist dies in Ihrem langfristigen Interesse?"
sweden.55.a:0"Sie sind herzlich willkommen!"
sweden.55.b:0"Nein, solche Risiken können wir nicht eingehen."

sweden.56.t:0"Großbritannien lehnt ab"
sweden.56.d:0"Leider hat Großbritannien beschlossen, uns den Beitritt zu seinem Bündnis zu verweigern. Es war höchstwahrscheinlich ein Appell vom richtigen Ort zur falschen Zeit, da unsere strategische Lage, gelinde gesagt, prekär ist. Wir müssen andere Vorkehrungen treffen."
sweden.56.a:0"Sehr schade!"

sweden.57.t:0"Großbritannien akzeptiert"
sweden.57.d:0"Die Briten haben unsere Bitte angenommen, sich den Alliierten anzuschließen! Wir können nun vereint gegen die wachsende Aggression unserer Zeit auftreten und den demokratischen Wohlstand sichern, den der Westen anstrebt."
sweden.57.a:0"Sehr zufriedenstellend"

sweden.60.t:0"Schweden schlägt eine sozialistische Union vor"
sweden.60.d:0"Wir haben langjährige Verbindungen zu den Schweden und haben in den letzten Jahren in unseren ideologischen Bestrebungen denselben radikalen Kurs eingeschlagen. Unsere sozialistischen Brüder schlagen vor, dass wir eine Union zwischen unseren Ländern wiederherstellen und vereint gegen die Tyrannei in Europa vorgehen!"
sweden.60.a:0"Gründung der Union"
sweden.60.b:0"Nein, wir werden unsere Unabhängigkeit bewahren"

sweden.61.t:0"Die Norweger weigern sich"
sweden.61.d:0"Die Norweger weigern sich, eine Union mit uns einzugehen. Das ist wirklich sehr traurig, aber sie versichern uns, dass wir in Skandinavien einen guten Freund haben."
sweden.61.a:0"Ein trauriger Tag für uns"


sweden.65.t:0"Ein Deal mit Schweden"
sweden.65.d:0"Die Schweden haben sich entschieden, uns einen Deal anzubieten, der auf der sozialistischen Kameradschaft beruht, die unsere beiden Nationen verbindet. Sie bieten uns den ehemaligen finnischen Staat Karalia im Gegenzug für eine Mitgliedschaft in der Komintern und unsere Hilfe bei der Untergrabung der norwegischen Regierung zur Förderung der kommunistischen Ideologie an. Das ist ein großzügiges Angebot – sollten wir es annehmen?"
sweden.65.a:0"Angebot annehmen"
sweden.65.b:0"Das Angebot ablehnen"

sweden.66.t:0"Die Sowjets lehnen unser Angebot ab!"
sweden.66.d:0"Die Sowjets sind zu dem Schluss gekommen, dass unser Abkommen für sie zum gegenwärtigen Zeitpunkt nicht wünschenswert ist. Wir werden ohne sie auskommen müssen."
sweden.66.a:0"Schwachköpfe!"

sweden.67.t:0"Die Sowjets nehmen unser Angebot an!"
sweden.67.d:0"Die weisen Führer der UdSSR haben unser Angebot angenommen und sind stolz, im Kampf gegen den Kapitalismus an unserer Seite zu stehen."
sweden.67.a:0"Tolle Neuigkeiten!"

sweden.70.t:0"Der König beruft die Regierung ein"
sweden.70.d:0"König Gustav V. hat beschlossen, die Regierung einzuberufen. Er ist besorgt über den politischen Kurs unseres Landes und steht der Koalitionsregierung mit der NSAP sehr skeptisch gegenüber. Da der König immer noch über erhebliche politische Macht verfügt, erwägt er, die SAP öffentlich zu unterstützen. Das müssen wir verhindern! Glücklicherweise verachtet er die Kommunisten mehr als uns."
sweden.70.a:0"Überzeugen Sie den König von der kommunistischen Bedrohung!"
sweden.70.b:0"Lass den alten Narren in Ruhe."

sweden.72.t:0"Royalistische Zeitungen"
sweden.72.d:0"Es scheint, dass der im Exil lebende König Gustav V. seit einiger Zeit Geschichten über uns und unsere Politiker in sogenannten royalistischen Zeitungen fabriziert. Diese wurden in Nachbarländern gedruckt und heimlich verbreitet. Dies hat zu Unmut in der Bevölkerung geführt. Was sollen wir tun?"
sweden.72.a:0"Lassen Sie das T-Office die Verteiler verhaften!"
sweden.72.b:0"Dem können wir nicht entgegenwirken."

sweden.75.t:0"Vereint euch mit den Finnland-Schweden"
sweden.75.d:0"Da wir unser Volk befreit und die rechtmäßige Kontrolle über unsere historischen Gebiete erlangt haben, könnten viele schwedische Minderheiten oder in manchen Gebieten sogar Mehrheitsbevölkerungen besser eingesetzt werden. Indem wir loyalen Nationalisten in ihren Institutionen Raum geben, können wir die Staaten Åland und Pohjanmaa zu Kernstaaten machen, sollten wir das tun?"
sweden.75.a:0"Wir müssen es tun."
sweden.75.b:0"Zu viel Aufwand, nichts tun."

sweden.90.t:0"Die Rückkehr des Königs"
sweden.90.d:0"Die militärische Führung und eine engagierte Öffentlichkeit konnten auf der Åbo-Konferenz erfolgreich Unterstützung für Finnland gewinnen und ein Bündnis mit Finnland eingehen. Es ist kein Geheimnis, dass die Regierung unter Per Albin Hansson diese Politik ablehnte. Als Zweifel an der Bündnisbereitschaft aufkamen, kam es zu einer Krise innerhalb der Regierung. Im Namen mehrerer Generäle hat sich der König entschlossen, die Initiative zu ergreifen und einen Rat aus prominenten Parlamentsabgeordneten zu leiten, um die Regierung zu stabilisieren und die konstitutionelle Monarchie fortzuführen."
sweden.90.a:0"Der König soll seinen Rat bilden."
sweden.90.b:0"Niemals, wir müssen unsere Demokratie bewahren!"

sweden.100.t:0"Das Stockholmer Kommuniqué"
sweden.100.d:0"Der schwedische Staatschef Gustaf V. hat die Staatschefs Norwegens, Dänemarks und Finnlands zu einem Treffen nach Stockholm eingeladen, um die politischen und wirtschaftlichen Herausforderungen zu besprechen, die in einem unsichereren Europa vor uns liegen. Im Mittelpunkt der Diskussion steht das veränderte geopolitische Umfeld und die Frage, wie sich die nordischen Länder in den kommenden Krisen verhalten werden. Am Ende des Treffens wird ein Kommuniqué veröffentlicht, in dem wir uns gegenseitig in Nordeuropa unterstützen. Dies wird unsere Beziehungen deutlich verbessern."
sweden.100.a:0"Nehmen Sie an der Konferenz teil"
sweden.100.b:0"Nein, das ist nicht in unserem Interesse"

sweden.105.t:0"Operation Stella Polaris"
sweden.105.d:0"Da der Krieg nicht unbedingt zu unseren Gunsten verläuft, haben einige Geheimdienstoffiziere vorgeschlagen, unsere Verschlüsselungs- und Entschlüsselungsausrüstung zusammen mit unseren wichtigsten Offizieren nach Schweden zu bringen. Dies würde die Sowjets daran hindern, an unser wertvolles Material zu gelangen, und könnte uns den Kampf um unsere Unabhängigkeit verlängern lassen. Was sollten wir tun?"
sweden.105.a:0"Schicken Sie sie nach Schweden"
sweden.105.b:0"Sie werden hier gebraucht!"

sweden.106.t:0"Operation Stella Polaris"
sweden.106.d:0"Die Finnen kämpfen derzeit tapfer gegen die Sowjets und versuchen verzweifelt, ihre Unabhängigkeit zu sichern. Da der Krieg nicht unbedingt zu ihren Gunsten ausgegangen ist, schlagen sie vor, einen Teil ihrer Geheimdienste nach Schweden zu verlegen, von wo aus sie relativ sicher operieren könnten. Dadurch erhalten wir wertvolle Informationen, erfahrene Geheimdienstler und Ausrüstung. Die Operation trägt den Codenamen „Stella Polaris“ und wir werden ihnen helfen, alles über den Bottnischen Meerbusen zu transportieren."
sweden.106.a:0"Führen Sie den Vorgang durch"
sweden.106.b:0"Nein, das ist zu riskant"

swe_denmark.1.t:0"Dominium Maris Baltici"

finland.40.t:0"Um schwedische Hilfe bitten?"
finland.40.d:0"Dieser Bürgerkrieg wird grausam sein. Die Kommunisten werden von der Komintern unterstützt, deren Fähigkeiten weit über unsere Träume hinausgehen. Wir müssen die Schweden bitten, sich uns in unserem Freiheitskampf anzuschließen. Sollte Schweden in den Krieg eintreten, könnte Åland es wagen, ebenfalls für uns zu kämpfen."
finland.40.a:0"Schweden zum Beitritt auffordern"
finland.40.b:0"Nein, das ist unser Krieg!"

finland.41.t:0"Finnland bittet um Hilfe"
finland.41.d:0"Unsere Unterstützung der Weißen Garde hat in Finnland erfolgreich zum Bürgerkrieg geführt. Die demokratischen Fraktionen fordern uns auf, uns einer finnisch-schwedischen Allianz anzuschließen und die Kommunisten zu bekämpfen. In diesem Fall ist die Weiße Garde bereit, unsere Wiedervereinigung mit Åland zu unterstützen und hofft, dass die Inselbewohner ihren Freiheitskampf unterstützen. Was sollen wir tun?"
finland.41.a:0"Nehmen Sie am Bürgerkrieg teil"
finland.41.b:0"Wir können nicht beitreten"

finland.43.t:0"Åland erhebt sich!"
finland.43.d:0"Åland hat sich entschieden, gegen die Kommunisten zu kämpfen und sich im finnischen Bürgerkrieg der demokratischen Fraktion der Weißgardisten anzuschließen. Glücklicherweise hat die Weiße Garde aufgrund unserer Teilnahme am finnischen Bürgerkrieg die Wiedervereinigung Ålands mit Schweden ermöglicht. Wir müssen diese Gelegenheit nutzen und den Bottnischen Meerbusen schließen. "
finland.43.a:0"Glücklich!"

finland.45.t:0"Schweden weigert sich, beizutreten"
finland.45.d:0"Die Schweden haben nicht den nötigen Wunsch, sich unserem Krieg anzuschließen, das ist sehr bedauerlich!"
finland.45.a:0"Verrat!"

import.10.t:0"Schweden bittet um Hilfe"
import.10.d:0"Die Schweden kämpfen derzeit für ein freies Skandinavien, und das Kräfteverhältnis ist nicht zu ihren Gunsten. Die Region ist strategisch sehr wichtig im europäischen Kriegsschauplatz, und wir dürfen nicht zulassen, dass totalitäre Regime die Kontrolle übernehmen. Die Schweden bitten uns um die Entsendung von 2000 Infanterieeinheiten, 500 Unterstützungseinheiten und 200 Artilleriegeschützen sowie 8000 Freiwilligen aus den USA. Sollen wir ihrer Bitte nachkommen?"
import.10.a:0"Ja, schick es!"
import.10.b:0"Nein, wir können nichts entbehren."

import.11.t:0"Die USA schicken Hilfe"
import.11.d:0"Unsere Bitten wurden erhört, und die USA schicken uns Ausrüstung und Freiwillige, die für uns kämpfen. Dies ist ein großer Glücksfall, den wir bestmöglich nutzen müssen. Die Lieferung wird voraussichtlich in etwa 20 Tagen eintreffen."
import.11.a:0"Das könnte uns retten!"

import.12.t:0"US-Ausrüstung kommt an"
import.12.d:0"Die lang ersehnten Freiwilligen und die Ausrüstung sind endlich in Schweden eingetroffen. Jetzt müssen wir sie sinnvoll einsetzen!"
import.12.a:0"Endlich!"

import.13.t:0"Die USA weigern sich"
import.13.d:0"Die USA können oder wollen uns weder Ausrüstung noch Freiwillige schicken. Das ist eine Katastrophe! Wir brauchten es dringend."
import.13.a:0"Eine Katastrophe"

exileunits.2.t:0"Polistrupper rekrutiert und ausgebildet"
exileunits.2.d:0"In einer verdeckten Operation wurden Polistrupper oder Polizeitruppen rekrutiert und ausgebildet. Dabei kamen Freiheitskämpfer aus Dänemark und Norwegen zum Einsatz. Sie wurden in der Nähe von Göteborg und Malmö stationiert und warten auf unsere Befehle."
exileunits.2.a:0"Feine Ergänzung"

swe_iceland.1.t:0"Isländischer Aufstand"

swe_iceland.2.t:0"Island erklärt seine Unabhängigkeit!"
swe_iceland.2.d:0"Die isländischen Nationalisten haben zu den Waffen gegriffen und ihre Unabhängigkeit von uns erklärt. Politische Strömungen und Forderungen nach nationaler Souveränität sind seit Jahren zu hören und werden immer lauter. Unsere Geheimdienste bestätigen, dass die Schweden die Rebellen bewaffnet und diesen Aufstand ermöglicht haben. Wie sollen wir reagieren?"
swe_iceland.2.a:0"Geben Sie ihnen Souveränität"
swe_iceland.2.b:0"Erklären Sie den Krieg und erobern Sie Island zurück!"

swe_iceland.3.t:0"Dänemark erklärt uns den Krieg"
swe_iceland.3.d:0"Die Dänen weigern sich, uns unsere Unabhängigkeit zu gewähren und haben nun beschlossen, uns den Krieg zu erklären! Da wir nicht über die Ressourcen verfügen, um über einen längeren Zeitraum allein zu kämpfen, müssen wir möglicherweise andere Nationen um Hilfe bitten. Die Schweden, die uns zur Macht verholfen haben, sind wahrscheinlich dazu bereit. Vielleicht werden sie eingreifen und die Dänen in unserem Namen besiegen?"
swe_iceland.3.a:0"Kämpfe allein!"
swe_iceland.3.b:0"Bitten Sie die Schweden um Hilfe"

swe_iceland.4.t:0"Island bittet um Hilfe"
swe_iceland.4.d:0"Die isländischen Nationalisten bitten uns um Unterstützung in ihrem Unabhängigkeitskampf gegen die Dänen. Sie pflegen enge Beziehungen zu uns, da wir sie politisch und militärisch umfassend unterstützen. Wir könnten sicherlich für sie kämpfen. Was sollen wir tun?"
swe_iceland.4.a:0"Sie sind auf sich allein gestellt"
swe_iceland.4.b:0"Kämpfe für Island!"

swe_iceland.5.t:0"Die Schweden greifen ein"
swe_iceland.5.d:0"Die Schweden haben beschlossen, an unserer Seite zu kämpfen und hoffen, die Dänen für uns zu besiegen. Unsere Bemühungen waren nicht umsonst, sie haben sich gelohnt."
swe_iceland.5.a:0"Feuern Sie Eyjafjallajökull an!"

swe_iceland.7.t:0"Dänemark sendet sein Bedauern"
swe_iceland.7.d:0"Die Dänen haben entschieden, dass sie an einer isländischen Intervention kein Interesse haben. Daher bedauert König Christian X. den Isländern, dass sie sich entschieden haben, die dänische Krone zu verlassen, und wünscht ihnen viel Glück bei ihren Bemühungen, eine eigene Nation zu gründen."
swe_iceland.7.a:0"Unerwartet"

swe_iceland.10.t:0"Bewaffnen Sie die Fjölnismenn"
swe_iceland.10.d:0"Wir haben erfolgreich Waffen und Offiziere zu den isländischen Nationalisten transportiert. Die Fjölnismenn, wie sie sich selbst nennen, haben sich sehr über unsere Unterstützung gefreut und bereiten nun einen Aufstand vor. Sind wir bereit, ihn durchzuziehen?"
swe_iceland.10.a:0"Oh, das werden wir!"


news.900.t:0"Schweden Puppen Norwegen"
news.900.d:0"Die schwedische Regierung hat sich zu einer Intervention in Norwegen entschlossen, da die jüngsten politischen Bestrebungen die Unsicherheit in der Region verstärkt haben. Norwegens Abspaltung von Schweden im Jahr 1905 wurde zwar von beiden Seiten akzeptiert, die Schweden äußerten jedoch Zweifel an der Fähigkeit Norwegens, sich selbst zu regieren. Schwedischen Beamten zufolge waren sie dieser Aufgabe nicht gewachsen, was Schweden zum Eingreifen und zur Unterwerfung der konstitutionellen Monarchie veranlasste."
news.900.a:0"Ärgerlich"

news.902.t:0"Die baltischen Staaten erheben sich!"
news.902.d:0"Nach der sowjetischen Unterdrückung kam es zu Spannungen zwischen der Bevölkerung und den Besatzern. Demokratische Kräfte in den baltischen Ländern unterstützten gemeinsam mit ihren skandinavischen Nachbarn Widerstandsbewegungen, die nun einen Aufstand zum Sturz der sowjetischen Unterdrücker anzettelten. Litauische Unruhen wurden von sowjetischen Grenztruppen rasch niedergeschlagen. Lettland und Estland sind völlig in Aufruhr!"
news.902.a:0"Sowjetische Maskerovska?"

news.903.t:0"Die baltischen Staaten erheben sich!"
news.903.d:0"Nach der sowjetischen Unterdrückung kam es zu Spannungen zwischen der Bevölkerung und den Besatzern. Demokratische Kräfte in den baltischen Ländern unterstützten gemeinsam mit ihren skandinavischen Nachbarn Widerstandsbewegungen, die nun einen Aufstand zum Sturz der sowjetischen Unterdrücker anzettelten. Aufstände in Litauen und Lettland wurden von sowjetischen Grenztruppen rasch niedergeschlagen. Estland ist völlig in Aufruhr! "
news.903.a:0"Schwedische Beteiligung?"

news.904.t:0"Zweiter finnischer Bürgerkrieg"
news.904.d:0"Die finnische Weiße Garde hat einen Massenaufstand organisiert, um Finnland vom Kommunismus zu befreien und eine demokratische Regierung zu etablieren. Die Weiße Garde genießt enorme öffentliche Unterstützung, und seit langem sind subversive antikommunistische Aktivitäten im Gange. Geheimdienstquellen zufolge erhielt Schweden erhebliche Ausrüstung und politische Unterstützung, um den Zweiten Bürgerkrieg zu ermöglichen. Die Sowjets werden wahrscheinlich in diesen Konflikt eingreifen. Sind die Schweden ebenfalls bereit zu kämpfen?"
news.904.a:0"Störung"

news.905.t:0"Schweden tritt in den zweiten finnischen Bürgerkrieg ein"
news.905.d:0"Es ist kein Geheimnis, dass die Weiße Garde erhebliche Unterstützung von der schwedischen Regierung erhielt. Der Ausbruch des Bürgerkriegs in Finnland veranlasste die sonst zögerlichen Schweden, sich den demokratischen Kräften anzuschließen, um deren Sieg in Finnland zu sichern. Dies ist eine dramatische Entwicklung in Skandinavien."
news.905.a:0"Merkwürdige Wendung der Ereignisse"

news.906.t:0"Schweden widerruft das Åland-Übereinkommen!"
news.906.d:0"Die Åland-Konvention wurde 1921 unterzeichnet. Schweden und Finnland vereinbarten darin, die Inseln unter finnischer Souveränität zu belassen und ihnen ein hohes Maß an Autonomie zu gewähren. Darüber hinaus war die Entmilitarisierung des Gebiets für die Aufnahme in den Völkerbund unabdingbar. Die Schweden haben nun beschlossen, Åland als Teil ihres Territoriums zurückzufordern. Angesichts der großen schwedischen Bevölkerung auf den Inseln ist dies kaum überraschend; viele Generäle und Politiker haben sich seit der Unterzeichnung der Konvention dafür eingesetzt. Da die Konvention eine der ersten Entscheidungen des Völkerbundes war, könnte Schwedens Position in der Organisation in Frage gestellt werden."
news.906.a:0"Ärgerlich"
news.906.b:0"Endlich!"

news.907.t:0"Der König legt sich mit den Kommunisten an"
news.907.d:0"Der König äußerte eine lautstarke und heftige Abneigung gegen den Bolschewismus und versammelte das Volk vor der Festung, um öffentlich zu verkünden, dass er alle seine Regierungsaufgaben sofort aufgibt, um die SKP-Koalitionsregierung zu bekämpfen. Es wird behauptet, er habe Unterstützung für den Sturz der Regierung gesucht, sei aber bisher gescheitert. Der Kampf um die Unterstützung des Landes hat gerade erst begonnen, doch es sieht so aus, als würden die Kommunisten seit der Aufhebung der Åland-Konvention erhebliche Erfolge erzielen."
news.907.a:0"Wir müssen die Eliten vernichten!"

news.908.t:0"Der König wird verhaftet!"
news.908.d:0"König Gustaf V. wurde von kommunistischen Untergrundkämpfern, die in den Straßen Stockholms kreisen, festgenommen. Offizielle Vertreter bestätigten die Abschaffung der Monarchie und die Abdankung des Königs. Derzeit steht er unter Hausarrest und wartet auf die Entscheidung, ob er wegen Verbrechen gegen das Volk vor Gericht gestellt wird. Insider berichten, dass er angesichts seines hohen Alters gerecht behandelt wird."
news.908.a:0"Gerechtigkeit für alle"

news.909.t:0"Der König wird verbannt!"
news.909.d:0"König Gustav V. ist aus dem Land geflohen und wurde auf seiner Reise nach Genf in der Schweiz auf der Durchreise durch Kopenhagen gesehen. Gerüchte über die Abschaffung der Monarchie hatten offenbar die königliche Familie erreicht, die daraufhin beschloss, ins Exil zu gehen. Laut ihrem offiziellen Attaché geht es allen gut und sie werden auf absehbare Zeit im Exil bleiben. Der König ist weiterhin entschlossen, den Bolschewismus zu bekämpfen, solange er lebt."
news.909.a:0"Harmloser alter Mann"

news.910.t:0"Das Buckingham-Treffen"
news.910.d:0"Der im Exil lebende schwedische König Gustaf V. hat mehreren englischen Politikern, dem Außenministerium und königlichen Vertretern vieler europäischer Länder den Hof gemacht. Bei dem Treffen am Wochenende im Buckingham Palace unterstützten Royalisten und Antibolschewisten aus ganz Europa öffentlich den schwedischen König und verurteilten die derzeitige schwedische Regierung für ihr Vorgehen. Journalisten, die für die internationale Presse über skandinavische Themen berichteten, sahen darin eine präventive Maßnahme, um ähnliche Entwicklungen in anderen Ländern zu verhindern."
news.910.a:0"So eine Frechheit!"
news.910.b:0"Interessant"

news.911.t:0"Schweden und Norwegen schließen sich einer Sozialistischen Union an"
news.911.d:0"Schweden und Norwegen haben beschlossen, der vierten Union beizutreten, die sie als Skandinavische Sozialistische Union bezeichnen. Angesichts der jüngsten politischen Entwicklungen in beiden Ländern, der offensichtlichen ideologischen Implikationen des Marxismus und ihrer strategischen Verwundbarkeit ist dieser Zusammenschluss ein unerwartetes, aber vorhersehbares Ereignis. Dieser Schritt verleiht der Region erhebliche Macht, was zu Spannungen führen könnte. Dennoch stehen die Arbeiter beider Nationen, die nun vereint sind, zu ihrem Entschluss und haben erklärt, sie würden nicht ruhen, bis ganz Skandinavien aus dem Griff des Kapitalismus befreit sei."
news.911.a:0"Unerwartet"
news.911.b:0"Ein toller Tag!"

news.912.t:0"Isländische Unabhängigkeit"
news.912.d:0"Die Isländer streben seit langem danach, ihre Souveränität unabhängig von der dänischen Krone zu etablieren und haben nun ihre Unabhängigkeit erklärt. Da die republikanischen Demokratiebewegungen bisher scheiterten, schlossen sich viele junge Männer der Isländer den Untergrundnationalisten an, die Berichten zufolge von den Schweden unterstützt werden. In Stockholm fanden offenbar zahlreiche Treffen zwischen isländischen Nationalisten und schwedischen NSAP-Vertretern statt. Welche Unterstützung die Isländer erhalten haben, ist noch unklar, aber die meisten Spekulationen deuten auf Waffenlieferungen und militärische Ausbildung hin. Diese Gruppen, die sich selbst „Fjölnismenn“ nennen, übernahmen mehrere Institutionen auf der Insel und erklärten nun ihre Unabhängigkeit. Die Welt wartet gespannt auf die dänische Reaktion."
news.912.a:0"Wie werden die Dänen reagieren?"
news.912.b:0"Gute Neuigkeiten!"
news.912.c:0"Empörend!"
