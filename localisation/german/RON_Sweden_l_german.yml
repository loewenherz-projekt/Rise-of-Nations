import.1.t:0"Anfrage der dänischen Polizeitruppe"
import.1.d:0"Während dieses Krieges bittet uns die dänische Regierung um Unterstützung bei der Ausbildung von Soldaten und Freiwilligen, die in ihrem Namen kämpfen sollen. Es handelt sich um eine verdeckte Operation, getarnt als Ausbildungsprogramm für Polizeibeamte. Sie benötigen umfangreiche Ausrüstung (2000 Gewehre, 200 Hilfsausrüstungen und 50 Artilleriegeschütze). Können wir helfen?"
import.1.a:0"Ja, geben Sie ihnen, was sie brauchen!"
import.1.b:0"Nein, wir bleiben unparteiisch."

import.2.t:0"Die schwedische Regierung akzeptiert unsere Anfrage"
import.2.d:0"Die schwedische Regierung unterstützt uns bei der Rekrutierung sogenannter Polizeitruppen in einer verdeckten Operation und schickt uns die entsprechende Ausrüstung, um uns bei unseren Kriegsanstrengungen zu unterstützen."
import.2.a:0"Dringend benötigte Hilfe!"

import.3.t:0"Die schwedische Regierung lehnt unseren Antrag ab"
import.3.d:0"Leider halten die Schweden dies für zu riskant und werden uns weder Truppen noch Ausrüstung schicken."
import.3.a:0"Sie haben uns verraten!"




