unit_limit_label:0 "§HMaximal unterstützte Divisionen§!"
unit_limit_desc:0 "Jedes Land kann nur eine bestimmte Anzahl einzelner Militärdivisionen unterhalten, bevor seine Wirtschaft und Infrastruktur an ihre Grenzen stoßen. §L\n\n - Eigene Fabriken:§! [?net_factory_count]§L[unit_limit_major_power][unit_limit_world_tension]\n - [unit_limit_economy_law]:§! [upper_limit_perc_figure]§L[unit_limit_was_capped][unit_limit_lower_limit_used][unit_limit_upper_limit_used][unit_limit_bonus_used]\n\n ENDGÜLTIGE GESAMTBETRAG: §W[?max_divisions]§! (aufgerundet)\n\nBitte beachten Sie, dass Änderungen an den oben genannten Punkten bis zu einer Spielwoche dauern können, bevor sie in der Berechnung berücksichtigt werden.§![above_unit_limit_desc]"

unit_limit_desc_fake_intel:0 " (§HFake Intel Divisions§! zählen nicht zum Divisionslimit)"

unit_limit_desc_above_limit:0 "\n\n--------------\n\n§RWir haben derzeit unsere Kapazitäten überschritten und die einzige Möglichkeit, die Belastung unseres Landes zu verringern, besteht darin, einige unserer Divisionen aufzulösen.§!\n\nDivisionsorganisation: [?mobilisation_penalty_var|+=%1]\nKonsumgüterfabriken: [?mobilisation_penalty_var_positive|=%H0]\nFabrikleistung: [?mobilisation_penalty_var|+=%]\nAusbildungszeit: [?mobilisation_penalty_var_positive|-=%]\nVerstärkungsrate: [?mobilisation_penalty_var|+=%1]"

unit_limit_major_power_desc:0 "\n - Großmacht/Fraktionsführer: §G+15%§!"
unit_limit_world_tension_desc:0 "\n - Weltspannung 70 % oder höher: §G+5 %§!"
unit_limit_was_capped_desc:0 "\n - Unbegrenzte Gesamtzahl: §W[?net_max_divisions]§!"
unit_limit_cap_used_desc:0 "\n\n Die maximal unterstützten Divisionen können nicht höher sein als §W[?upper_limit]§! (aus [unit_limit_economy_law])."
unit_limit_manpower_used_desc:0 "\n\n Da die von den Fabriken bereitgestellte Gesamtmenge niedriger war als die von der Gesamtarbeitskraft bereitgestellte (§W[?Untergrenze_der_Arbeitskraft]§!), wurde diese stattdessen verwendet."
unit_limit_num_states_used_desc:0 "\n\n Da die von den Fabriken bereitgestellte Gesamtmenge niedriger war als die Anzahl der eigenen Staaten (§W[?lower_limit_from_states]§!), wurde diese stattdessen verwendet."
unit_limit_default_used_desc:0 "\n\n Da die von den Fabriken bereitgestellte Gesamtmenge geringer war als der Standardwert (§W5§!), wurde dieser stattdessen verwendet."
unit_limit_bonus_used_desc:0 "\n\n - Zusätzliche Modifikatoren: §G+[?upper_limit_unit_bonus]§! bis zur Obergrenze \n §Wfrom:§!\n [unit_limit_bonus_economy]\n [unit_limit_bonus_foreign_policy]\n [unit_limit_bonus_military_spending]"

