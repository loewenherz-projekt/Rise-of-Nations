 ICBM_tt:0 "ICBM"
 ICBM_tt_delayed:0 "£air_range_texticon Maximale Reichweite: [?ROOT.ICBM_base_range] §gkm§!\n£rocket_modifiericons_texticon Maximale Kapazität: 5000 §gkg§! \n\n ICBMs oder §YInterkontinentalraketen§! werden für Langstreckenoperationen eingesetzt, ihre Reichweite kann bis zu §Y15000km§! betragen."
