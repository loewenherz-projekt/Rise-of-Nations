 warhead_1_tt:0 "Einfacher nuklearer Sprengkopf"
 warhead_1_delayed_tt:0 "£rocket_modifiericons_texticon Nutzlastgewicht: 50 §gkg§!\n£air_range_texticon Reichweite: §R-50§! §gkm§!\n£manpower_texticon Auswirkungen auf die Bevölkerung: §R30%§!\n£repairing Auswirkungen auf die Industrie: §RDamaging Factories§! \n\n Dieser nukleare Sprengkopf ist eine Miniaturversion der aus Flugzeugen abgeworfenen Bomben. Er wurde in einen Raketensprengkopf integriert."
 warhead_2_tt:0 "Thermonuklearer Sprengkopf"

 warhead_2_delayed_tt:0 "£rocket_modifiericons_texticon Nutzlastgewicht: 2400 §gkg§!\n£air_range_texticon Reichweite: §R-100§! §gkm§!\n£manpower_texticon Auswirkungen auf die Bevölkerung: §R50%§!\n£repairing Auswirkungen auf die Industrie: §R50%§! \n\n Dieser Atomsprengkopf ist ein mononuklearer Sprengkopf. Er wurde in eine Rakete integriert, um eine Kernfusion auf das Ziel abzufeuern."
 warhead_3_tt:0 "Fortschrittlicher thermonuklearer Sprengkopf"
 warhead_3_delayed_tt:0 "£rocket_modifiericons_texticon Nutzlastgewicht: 4500 §gkg§!\n£air_range_texticon Reichweite: §R-150§! §gkm§!\n£manpower_texticon Auswirkungen auf die Bevölkerung: §R70%§!\n£repairing Auswirkungen auf die Industrie: §R70%§! \n\n Diese weiterentwickelte Version eines thermonuklearen Sprengkopfes hat eine höhere Sprengkraft und ermöglicht so eine noch größere Wirkung auf das Ziel."
 warhead_4_tt:0 "Neutronenbombe"
 warhead_4_delayed_tt:0 "£rocket_modifiericons_texticon Nutzlastgewicht: 900 §gkg§!\n£air_range_texticon Reichweite: §R-150§! §gkm§!\n£manpower_texticon Auswirkungen auf die Bevölkerung: §R90%§!\n£repairing Auswirkungen auf die Industrie: §R0%§! \n\n Neutronensprengköpfe sind hocheffizient gegen Streitkräfte, lassen die Infrastruktur jedoch intakt, da Neutronen Beton und Stahl einfach durchdringen."
 warhead_5_tt:0 "Antimaterie-Sprengkopf"
 warhead_5_delayed_tt:0 "£rocket_modifiericons_texticon Nutzlastgewicht: 2000 §gkg§!\n£air_range_texticon Reichweite: §R-100§! §gkm§!\n£manpower_texticon Auswirkungen auf die Bevölkerung: §R95%§!\n£repairing Auswirkungen auf die Industrie: §R95%§! \n\n Dieser Sprengkopf ist der stärkste und enthält eine Mischung aus Antiwasserstoff. Bei Kontakt mit normalem Wasserstoff kommt es zur spontanen Vernichtung, wobei eine unglaubliche Energiemenge freigesetzt wird, die der berühmten Gleichung „E=mc^2“ folgt."
 ### Moon Race ###
 has_completed_previous_milestone_tt:0 "hat den vorherigen Meilenstein erreicht"
 completes_milestone_tt:0 "Schließt den zugehörigen §YMeilenstein§ ab!"

 moonrace_manned_flight_decision_tt:0 "Erfordert §Y5§! erfolgreichen Triebwerkstest (derzeit §Y[?successful_engine_test_count]§!) und §Y1§! erfolgreichen Lebenserhaltungstest (derzeit §Y[?life_support_test_count]§!)"
 has_at_least_1_rocket_tt:0 "Benötigt mindestens §Y1§! Mondrakete auf Lager (derzeit §Y[?available_rockets]§!)"
 wiil_consume_1_rocket_tt:0 "Rakete auf Lager: §R-1§!"
 moonrace_star0_tooltip:0 "§3Bemannte Raumfahrt§!\n§gDer erste Schritt zu einer Mondlandung besteht darin, einen Menschen ins All und sicher zurück zur Erde zu bringen.§! \n\nErfordert §Y5§! erfolgreichen Triebwerkstest (derzeit §Y[?successful_engine_test_count]§!)\nErfordert §Y1§! erfolgreichen Lebenserhaltungstest (derzeit §Y[?life_support_test_count]§!) \n\n [GetStar0CompletionStatus]"
 moonrace_star0_delayed_tt:0 "Die folgenden Länder haben diesen Meilenstein bereits erreicht: \n[GetStar0List]"

 moonrace_star1_tooltip:0 "§3Bemannte Umlaufbahn§!\n§gDer zweite Schritt besteht darin, eine ausreichend hohe Geschwindigkeit zu erreichen, um in der Umlaufbahn zu bleiben.§! \n\n [GetStar1CompletionStatus]"
 moonrace_star1_delayed_tt:0 "Die folgenden Länder haben diesen Meilenstein bereits erreicht: \n[GetStar1List]"

 moonrace_star2_tooltip:0 "§3Weltraumspaziergang§!\n§gAls nächstes steht der Weltraumspaziergang auf der Liste. Was bringt es, zum Mond zu fliegen, wenn man seinen Lebensraum nicht verlassen kann? Das Überleben im Vakuum des Weltraums ist eine schwierige Aufgabe. Dieser Meilenstein sichert die Überlebensfähigkeit unserer Astronauten.§! \n\n [GetStar2CompletionStatus]"
 moonrace_star2_delayed_tt:0 "Die folgenden Länder haben diesen Meilenstein bereits erreicht: \n[GetStar2List]"

 moonrace_star3_tooltip:0 "§3Rendezvous und Andocken§!\n§gRendezvous und Andocken sind sehr nützlich, da sie komplizierte Missionen ermöglichen, ohne dass man überdimensionierte Raketen konstruieren muss.§! \n\n [GetStar3CompletionStatus]"
 moonrace_star3_delayed_tt:0 "Die folgenden Länder haben diesen Meilenstein bereits erreicht: \n[GetStar3List]"

 moonrace_star4_tooltip:0 "§3Mondumlaufbahn§!\n§gDas Erreichen der Umlaufbahn um den Mond ist ein weiterer entscheidender Meilenstein auf dem Weg zur Landung auf unserem natürlichen Satelliten§! \n\n [GetStar4CompletionStatus]"
 moonrace_star4_delayed_tt:0 "Die folgenden Länder haben diesen Meilenstein bereits erreicht: \n[GetStar4List]"

 moonrace_star5_tooltip:0 "§3Mondlandung§!\n§gDies ist der letzte Schritt im Rennen zum Mond: den Fuß auf ihn setzen. Dies ist der letzte Schritt in diesem Rennen, aber es ist erst der Anfang unseres Abenteuers in den Sternen!§! \n\n [GetStar5CompletionStatus]"
 moonrace_star5_delayed_tt:0 "Die folgenden Länder haben diesen Meilenstein bereits erreicht: \n[GetStar5List]"

 marsrace_star0_tooltip:0 "§3Raumstation§!\n§gDer Bau und die Verwaltung einer Raumstation ist der erste Schritt zu längeren Missionen, da wir dadurch Erfahrungen im Bau besserer und langlebigerer Raumschiffe sammeln können.§! \n\n [GetStar6CompletionStatus]"
 marsrace_star0_delayed_tt:0 "Die folgenden Länder haben diesen Meilenstein bereits erreicht: \n[GetStar6List]"

 marsrace_star1_tooltip:0 "§3Orbitalkonstruktion§!\n§gDie Montage von Stationsteilen ermöglicht uns den Bau größerer Raumschiffe, die für die geistige Gesundheit unserer Astronauten während langer Missionen unerlässlich sind§! \n\n [GetStar7CompletionStatus]"
 marsrace_star1_delayed_tt:0 "Die folgenden Länder haben diesen Meilenstein bereits erreicht: \n[GetStar7List]"

 marsrace_star2_tooltip:0 "§3Interplanetare Transferbahn§!\n§gUm den Mars zu erreichen, müssen wir die Wissenschaft des Orbittransfers beherrschen.§! \n\n [GetStar8CompletionStatus]"
 marsrace_star2_delayed_tt:0 "Die folgenden Länder haben diesen Meilenstein bereits erreicht: \n[GetStar8List]"

 marsrace_star3_tooltip:0 "§3Marsumlaufbahn§!\n§gDas Erreichen der Umlaufbahn um den Mars ist ein weiterer entscheidender Meilenstein auf dem Weg zu einer Landung auf dem roten Planeten§! \n\n [GetStar9CompletionStatus]"
 marsrace_star3_delayed_tt:0 "Die folgenden Länder haben diesen Meilenstein bereits erreicht: \n[GetStar9List]"

 marsrace_star4_tooltip:0 "§3Landung auf dem Mars§!\n§gDen roten Sand des Mars betreten, der größte Traum der Menschheit, und wir haben ihn wahr gemacht!§! \n\n [GetStar10CompletionStatus]"
 marsrace_star4_delayed_tt:0 "Die folgenden Länder haben diesen Meilenstein bereits erreicht: \n[GetStar10List]"

