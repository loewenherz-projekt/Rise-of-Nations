l_german: 
RUS_DNC_debug:0 "debuggen"
RUS_DNC_debug_desc:0 "debuggen"
RUS_DNC_begin_industrialization:0 "Beginn der Industrialisierung"
RUS_DNC_begin_industrialization_desc:0 "wir haben es endlich geschafft, wir haben unsere Arbeiter aus den Farmen in die zivile Industrie verlagert, wir werden jetzt mit der Industrialisierung beginnen"
RUS_DNC_relocate_our_farming_industry:0 "Verlagern Sie unsere Landwirtschaft"
RUS_DNC_relocate_our_farming_industry_desc:0 "Wir werden unsere zivile Industrie in die Stadt verlagern. Dazu müssen wir unsere Bevölkerung massenhaft von den Bauernhöfen in die Städte verlagern."
RUS_DNC_the_long_march:0 "Der lange Marsch"
RUS_DNC_the_long_march_desc:0 "Wir werden alle unsere Zivilisten in unsere Städte umsiedeln und heute mit der Industrialisierung beginnen!"
RUS_DNC_secure_the_key_industrys:0 "Sichern Sie sich die Schlüsselindustrien"
RUS_DNC_secure_the_key_industrys_desc:0 "Wir werden unsere Aluminiumreserven sichern und unter unsere Kontrolle bringen und unsere Arbeiter ausbeuten, um mehr davon zu bekommen. Die Gefahr einer Revolution wird uns nicht erschrecken. Wir werden nicht einknicken und uns noch mehr Macht über unsere Arbeiter verschaffen."
RUS_DNC_begin_the_urbanization:0 "Beginnen Sie mit der Urbanisierung"
RUS_DNC_begin_the_urbanization_desc:0 "Wir werden unseren Prozess während der Urbanisierung beginnen. Wir werden in der Lage sein, Fabriken zu bauen und die Landwirtschaft auf Kosten von Arbeitskräften in den Industriesektor zu verlagern."
RUS_DNC_freedom_for_the_elate:0 "Freiheit für die Elate"
RUS_DNC_freedom_for_the_elate_desc:0 "Wir werden die Elite von den Fesseln der Unterdrückung befreien und für die Rechte der Elite kämpfen!"
RUS_DNC_freedom_for_the_workers:0 "Freiheit für die Arbeiter"
RUS_DNC_freedom_for_the_workers_desc:0 "Wir werden die Arbeiter aus ihrem Chaos befreien und ihnen mehr Rechte geben"
RUS_DNC_war_plan_gold:0 "Kriegsplan Gold"
RUS_DNC_war_plan_gold_desc:0 "Wir werden uns auf eine Invasion Chinas vorbereiten und gegebenenfalls Kriegspläne erstellen."
RUS_DNC_strength_in_numbers:0 "Gemeinsam stark"
RUS_DNC_strength_in_numbers_desc:0 "Wir werden uns darauf vorbereiten, unsere Küsten zu schützen und sicherzustellen, dass die Japaner nicht auf russischem Boden landen."
RUS_DNC_army_proffenalism:0 "Armeeproffenalismus"
RUS_DNC_army_proffenalism_desc:0 "Wir werden uns auf die Modernisierung unserer Armee vorbereiten und Truppen einstellen, die mit der modernen Technologie auf dem neuesten Stand sind, um einen entscheidenden Sieg gegen China zu erringen."
RUS_DNC_embrace_work_culture:0 "Arbeitskultur annehmen"
RUS_DNC_embrace_work_culture_desc:0 "Wir werden beginnen, das russische Territorium zu integrieren und die Arbeitskultur zu übernehmen. Wir müssen arbeiten, wir müssen uns durchsetzen, wir müssen gewinnen!"
RUS_DNC_finish_the_boxers:0 "Beende die Boxer"
RUS_DNC_finish_the_boxers_desc:0 "Wir werden den Boxeraufstand besiegen und die Rebellen niederschlagen."
RUS_DNC_secure_korea:0 "Sicheres Korea"
RUS_DNC_secure_korea_desc:0 "Wir werden Korea sichern und in unseren Einflussbereich aufnehmen. Sobald uns das gelingt, sind wir der Sicherung der Inhalte einen Schritt näher gekommen."
RUS_DNC_the_threat_of_revolution:0 "Die Gefahr einer Revolution"
RUS_DNC_the_threat_of_revolution_desc:0 "Angesichts der wachsenden Gefahr einer Revolution müssen wir uns entscheiden, ob wir jetzt industrialisieren oder die Gefahr direkt bekämpfen!"
RUS_DNC_put_down_the_threat_of_revolt:0 "Schlagen Sie die Drohung einer Revolte nieder"
RUS_DNC_put_down_the_threat_of_revolt_desc:0 "Wir werden die Revolutionäre auf Kosten der Industrialisierung niederschlagen. Wir müssen uns auf unsere inneren Probleme konzentrieren. Wir müssen entweder eine Duma schaffen oder die Bevölkerung unterdrücken. So oder so müssen wir diesem Wahnsinn ein Ende setzen."
RUS_DNC_focus_on_industrialization:0 "Fokus auf Industrialisierung"
RUS_DNC_focus_on_industrialization_desc:0 "Wir werden die Drohungen eines Aufstands ignorieren und uns auf die schnellstmögliche Industrialisierung Russlands konzentrieren, wenn wir eine Schlacht verlieren wollen"
RUS_DNC_begin_economic_liberalization:0 "Beginnen Sie mit der wirtschaftlichen Liberalisierung"
RUS_DNC_begin_economic_liberalization_desc:0 "Um unser Land vollständig zu industrialisieren, müssen wir die kapitalistischen Werte des Westens annehmen. Wir müssen unsere alten Gewohnheiten hinter uns lassen und damit beginnen, uns aus dem Agrarsektor zurückzuziehen."
RUS_DNC_european_modernization_initative:0 "Europäische Modernisierungsinitiative"
RUS_DNC_european_modernization_initative_desc:0 "Wir werden eine Union europäischer Nationen schaffen, die sich gegenseitig bei der Modernisierung unterstützen. Mit dieser Union werden wir sie für politische Macht ausbeuten können, auf Kosten ihrer Beziehungen zu ihnen."
RUS_DNC_modernize_our_navy:0 "Modernisieren Sie unsere Marine"
RUS_DNC_modernize_our_navy_desc:0 "Wir werden unsere Marine modernisieren, um mit unseren europäischen Mächten gleichzuziehen."
RUS_DNC_power_to_the_tzar:0 "Macht dem Zaren"
RUS_DNC_power_to_the_tzar_desc:0 "Wir werden dem Zaren die absolute Macht geben und alle Gruppen niederschlagen, die sich uns widersetzen. Wir müssen uns auf die Industrialisierung konzentrieren!"
RUS_DNC_modernization_of_the_army:0 "Modernisierung der Armee"
RUS_DNC_modernization_of_the_army_desc:0 "Wir brauchen eine moderne Armee, um ins 19. Jahrhundert einzutreten. Wir müssen uns schnell modernisieren und eine große Nation werden!"
RUS_DNC_increase_military_spending:0 "Erhöhung der Militärausgaben"
RUS_DNC_increase_military_spending_desc:0 "Wir müssen die Militärausgaben erhöhen, damit wir die russische Armee aufbauen und über eine angemessene Schutztruppe verfügen können."
RUS_DNC_armillary_for_our_troops:0 "Armillarium für unsere Truppen"
RUS_DNC_armillary_for_our_troops_desc:0 "Wir werden die Produktion von Armillargeschützen erhöhen, um unsere Truppen besser ausrüsten zu können."
RUS_DNC_less_is_more:0 "Weniger ist mehr"
RUS_DNC_less_is_more_desc:0 "Wir werden eine riesige Armee haben und unseren riesigen Personalpool zu unserem Vorteil nutzen. Wir werden mit der wenigen Ausrüstung, die wir haben, arbeiten, um eine große Armee aufzubauen"
RUS_DNC_russojapanese_war:0 "Russisch-Japanischer Krieg"
RUS_DNC_russojapanese_war_desc:0 "Wir befinden uns im Krieg mit dem japanischen Kaiserreich! Wir werden es vernichten, bevor es eine Chance dazu hat."
RUS_DNC_improve_our_steel_production:0 "Verbesserung unserer Stahlproduktion"
RUS_DNC_improve_our_steel_production_desc:0 "Wir werden unsere Stahlproduktion verbessern, damit wir mehr Waffen herstellen können"
RUS_DNC_research_grant_program:0 "Forschungsstipendienprogramm"
RUS_DNC_research_grant_program_desc:0 "Wir werden ein Forschungsstipendienprogramm starten, um unsere Forschungskapazitäten zu verbessern"
RUS_DNC_exploit_the_turks:0 "Beute die Türken aus"
RUS_DNC_exploit_the_turks_desc:0 "Die Türken, der kranke Mann Europas, werden für ihre Kontrolle über das Schwarze Meer mit der Höhe der Schulden bezahlen. Ihr Land ist in der Krise. Es ist nur eine Frage der Zeit, bis das Land zusammenbricht."
RUS_DNC_exploit_china:0 "China ausbeuten"
RUS_DNC_exploit_china_desc:0 "Wir werden von China Zugeständnisse verlangen, wenn wir mit Krieg drohen. Sie werden keine andere Wahl haben, als uns zu gehorchen, wenn die Gefahr eines Krieges droht."
RUS_DNC_start_infantry_production:0 "Beginn der Infanterieproduktion"
RUS_DNC_start_infantry_production_desc:0 "Wir werden unsere Produktion von Infanterieausrüstung erhöhen, damit wir unsere Armee besser ausrüsten können."
RUS_DNC_a_modern_army:0 "Eine moderne Armee"
RUS_DNC_a_modern_army_desc:0 "Wir haben unsere Armee modernisiert und sind bereit für einen weiteren Krieg. Wir können unsere Truppen jetzt richtig mobilisieren"
RUS_DNC_war_plan_japan:0 "Kriegsplan Japan"
RUS_DNC_war_plan_japan_desc:0 "Wir haben mit Japan um den Einfluss Koreas gekämpft und es wird mit Sicherheit zu Konflikten kommen. Wir müssen uns auf einen Krieg mit Japan vorbereiten, falls nötig."
RUS_DNC_destabilize_japan:0 "Destabilisierung Japans"
RUS_DNC_destabilize_japan_desc:0 "Wir werden daran arbeiten, eine antijapanische Kampagne zu starten, in der Hoffnung, China zu destabilisieren"
RUS_DNC_cut_through_manchuria:0 "Durch die Mandschurei schneiden"
RUS_DNC_cut_through_manchuria_desc:0 "Wir werden die Bedrohung durch China abschneiden und sie als unseren Weg nach Südosten nutzen! Wir werden Japan besiegen!"
RUS_DNC_send_in_the_waves:0 "Senden Sie in den Wellen"
RUS_DNC_send_in_the_waves_desc:0 "Wir werden mit allen uns zur Verfügung stehenden Männern kämpfen und weiterhin Soldaten schicken, bis Japan kapituliert!"
RUS_DNC_antijapanese_propagda:0 "Antijapanische Propaganda"
RUS_DNC_antijapanese_propagda_desc:0 "Wir werden antijapanische Propaganda starten und unseren Mann davon überzeugen, dass wir gewinnen werden!"
RUS_DNC_abolish_the_rights_of_man:0 "Die Menschenrechte abschaffen"
RUS_DNC_abolish_the_rights_of_man_desc:0 "Wir werden uns für die Abschaffung der Menschenrechte einsetzen. Wir werden uns für die Stärkung des Königs und die Macht des Adels einsetzen."
RUS_DNC_war_plan_england:0 "Kriegsplan England"
RUS_DNC_war_plan_england_desc:0 "Wir müssen uns auf einen Konflikt mit England vorbereiten und für jeden Konflikt bereit sein"
RUS_DNC_strengthen_the_state:0 "Den Staat stärken"
RUS_DNC_strengthen_the_state_desc:0 "Wir werden den Staat stärken und unseren Einfluss auf die russische Bevölkerung verstärken"
RUS_DNC_crush_the_kulaks:0 "Zerschmettere die Kulaken"
RUS_DNC_crush_the_kulaks_desc:0 "Wir werden die Kulaken zerschlagen und die russische Minderheit stärken"
RUS_DNC_empower_the_kulaks:0 "Stärke die Kulaken"
RUS_DNC_empower_the_kulaks_desc:0 "Wir werden den Kulaken Macht geben und sie unterstützen"
RUS_DNC_war_planning:0 "Kriegsplanung"
RUS_DNC_war_planning_desc:0 "Wir werden mit den anderen Nationen zusammenarbeiten, um gegen China zu kämpfen. Wir werden den Krieg gewinnen!"
RUS_DNC_expand_our_influence_into_china:0 "Erweitern Sie unseren Einfluss auf China"
RUS_DNC_expand_our_influence_into_china_desc:0 "Wir werden unseren Einfluss auf China ausweiten und sicherstellen, dass wir Territorium gewinnen. Wir müssen uns auf unseren Einfluss und nicht auf unser Territorium konzentrieren."
RUS_DNC_a_deal_with_the_devil:0 "Ein Pakt mit dem Teufel"
RUS_DNC_a_deal_with_the_devil_desc:0 "Wir werden einen Kompromiss mit der Acht-Nationen-Allianz und China vorschlagen. Im Gegenzug für die Dezentralisierung Chinas und die Gewährung von Ressourcenrechten werden wir diesen Krieg beenden. Wir werden diese Gelegenheit nutzen, um unseren Einfluss in der Region auszuweiten."
RUS_DNC_on_our_own:0 "Auf eigene Faust"
RUS_DNC_on_our_own_desc:0 "Wir haben die Allianz verlassen und sind auf uns allein gestellt. Wir werden unsere eigenen Bedingungen mit China regeln und sehen, ob wir Chinas Bemühungen unterstützen oder behindern werden."
