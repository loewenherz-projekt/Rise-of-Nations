 SWI_councilor3_loc_key:0 "[?SWI.SWI_councilor_3.GetName]"
 SWI_confederation_president_loc_key:0 "[?SWI.SWI_confederation_president.GetName]"
 SWI_no_councilor:0 "§RNein Ratsherr§!"
 SWI_no_president:0 "§RNein Präsident der Konföderation§!"
 SWI_promoting_to_president_TT:0 "\n§Y[?SWI.temp_character_president.GetName]§! Wird als politischer Berater abgesetzt und zum Präsidenten von [SWI.GetNameDef] gewählt. Sobald innerhalb eines Jahres ein neuer Präsident gewählt wird, steht §R[?SWI.temp_character_president.GetSheHe] nicht mehr als politischer Berater oder Präsident der Konföderation zur Verfügung.§!"
 SWI_decision_remove_councilor_1:0 "[SWI_Get_ousted_councilor_text_1]"
 SWI_decision_remove_councilor_1_desc:0 "Wenn ein Ratsmitglied abgesetzt wird, werden die Räder der Schweizer Versammlung in Bewegung gesetzt. Wir müssen einige Zeit warten, bis wir seine Position besetzen können."
 SWI_decision_remove_councilor_1_text:0 "Stadtrat [?SWI.SWI_councilor_1.GetName] entlassen"
