 SWI_concessions_to_democrats_desc:0 "[SWI_Zugeständnisse_an_die_politische_Partei_Beschreibung]"
 SWI_concessions_to_political_party_desc:0 "Unsere harte Haltung gegenüber der [ROOT.GetAdjective] [FROM.GetRulingIdeology] könnte die [FROM.GetAdjective] verärgern und einen diplomatischen Zwischenfall oder schlimmer noch eine Invasion provozieren. Vielleicht ist es an der Zeit, unsere Haltung gegenüber [FROM.GetRulingIdeologyNoun] zu lockern."
 SWI_cancel_trade_agreement_prematurely:0 "Handelsabkommen vorzeitig kündigen"
 SWI_weapons_production_for_civilian_supplies:0 "Tausche Waffenteile gegen Vorräte"
 SWI_weapons_production_for_civilian_supplies_desc:0 "Angesichts der schwindenden Vorräte bleibt uns keine andere Wahl, als einem Teil unserer Rüstungsindustrie die Herstellung von Teilen für die [FROM.GetAdjective]-Kriegsmaschinerie zu gestatten. Auf diese Weise können wir zumindest die Versorgung der Zivilbevölkerung sicherstellen und [FROM.GetNameDef] möglicherweise von einer Invasion in [ROOT.GetName] abhalten."
 SWI_country_angry_mission:0 "[SWI_get_country_angry_mission_title]"
 SWI_country_angry_mission_desc:0 "Es scheint, dass unser Vorgehen gegenüber anderen Ländern von [?SWI_angriest_country.GetNameDef] als inakzeptabler Verstoß gegen die Neutralität interpretiert wird. Wenn wir sie nicht bald beschwichtigen, werden sie dies sicherlich als Vorwand für eine Invasion nutzen."
