 BBA_purchase_old_ships_category_desc:0 "Angesichts der zunehmenden Instabilität in der Welt müssen wir unsere Möglichkeiten zur Machtprojektion auf See ausbauen. Glücklicherweise sind einige der großen Marinen möglicherweise bereit, sich von ihren älteren Schiffen zu trennen."
