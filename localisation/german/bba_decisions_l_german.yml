 SWI_basic_council_TT:0 "\n\nDie drei zugewiesenen §YPolitischen Berater§! übernehmen die Rolle der §YLeitenden Ratsmitglieder§!, und jedes Jahr kann einer von ihnen zum §YPlässe der Konföderation§! gewählt werden, wodurch eine besondere Entscheidung freigeschaltet wird. §RDie Position eines politischen Beraters sollte nie unbesetzt bleiben, da sonst Strafen für das Land verhängt werden.§!"
 SWI_research_slot_tooltip:0 "Bei der Beförderung zum §YPräsidenten der Konföderation§! wird die Entscheidung §Y$SWI_expand_arms_industry$§! freigeschaltet, die einen zusätzlichen §GResearch Slot§! gewährt."

