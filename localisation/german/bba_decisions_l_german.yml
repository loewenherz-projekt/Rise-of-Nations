######## COUNCIL SYSTEM ###########

 SWI_federal_council_decisions_category:0 "Bundesrat"
 SWI_federal_council_decisions_category_desc:2 "[SWI_get_correct_council_category_description]"
 SWI_federal_council_decisions_category_desc_dem:0 "Der Bundesrat der Schweiz ist seit 1848 der unerschütterliche Höhepunkt der Schweizer Demokratie. [SWI_get_temp_explanation_of_council_system]\n\n§YPräsident der Schweizerischen Eidgenossenschaft:§! \n[SWI_GetPresidentName] \n\n§YLeading Councils:§! \n[SWI_GetCouncilor1name] \n[SWI_GetCouncilor2name] \n[SWI_GetCouncilor3name]"
 SWI_federal_council_decisions_category_desc_fasc:0 "Es ist vielleicht nicht derselbe Rat wie früher, aber das neue glorreiche Regime unter der Führung von [SWI.GetLeader] braucht dennoch einen starken Rat, um den Willen des Führers in [?SWI.SWI_biggest_fascist.GetNameDef] durchzusetzen. \n\n§YLeading Councilors:§! \n[SWI_GetCouncilor1name] \n[SWI_GetCouncilor2name] \n[SWI_GetCouncilor3name]"
 SWI_federal_council_decisions_category_desc_alt:0 "Vom Vorsitzenden von [SWI.GetNameDef], [SWI.GetLeader], kann nicht erwartet werden, dass er alle Aufgaben eines Landes mit einer so wichtigen Mission erfüllt. Deshalb muss sich [SWI.GetLeader.GetSheHe] auf einen Rat verlassen, der einige der Funktionen der nicht mehr bestehenden Versammlung delegiert. \n\n§YLeitende Ratsmitglieder:§! \n[SWI_GetCouncilor1name] \n[SWI_GetCouncilor2name] \n[SWI_GetCouncilor3name]"
 SWI_recently_finished_president_initiative:0 "Habe vor Kurzem eine Ratsinitiative abgeschlossen"
 SWI_recently_finished_president_initiative_desc:0 "Angesichts der begrenzten Macht des Bundespräsidenten und des Bundesrates müssen wir warten, bis eine weitere konzertierte Initiative versucht werden kann. Dem Rat mehr Macht zu geben, könnte der Weg sein, mehr solcher Initiativen zu starten. Wir müssen jedoch abwägen, ob dies der beste Weg für die tief verwurzelten demokratischen Werte der Schweiz ist."
 SWI_defense_fund_drive:0 "Spendenaktion für die Verteidigung"
 SWI_defense_fund_drive_desc:0 "Die Verteidigung gegen unsere potenziellen Eindringlinge erfordert Geld, über das die Schweizer Bundesregierung nicht verfügt. Wir können uns jedoch dafür einsetzen, dass die Bürger der Schweiz diese Mittel bereitstellen, und zwar in einer echten Bottom-up-Initiative."
 SWI_swiss_democratic_tradition_campaign:0 "Kampagne Schweizer Demokratische Tradition"
 SWI_swiss_democratic_tradition_campaign_desc:0 "Wir können die Schweizer Bevölkerung an unsere geschichtsträchtige demokratische Tradition erinnern, an die älteste und vielleicht einzig wahre Demokratie Europas."
 SWI_rally_workers:0 "Rallye-Mitarbeiter"
 SWI_rally_workers_desc:0 "Die Arbeiter könnten ein integraler Bestandteil der Verteidigung von [SWI.GetName] sein, daher können wir ihre begeisterte Teilnahme an der [SWI.GetAdjective] Rüstungsindustrie fördern und sie dazu ermutigen, die erforderlichen Opfer zu bringen."
 SWI_anti_fascist_drive:0 "Antifaschistische Kampagne"
 SWI_anti_fascist_drive_desc:0 "In [ROOT.GetName] ist kein Platz für Faschisten. Als ein Land, das sich der Selbstbestimmung und der lokalen demokratischen Macht verschrieben hat und danach strebt, ein Paradies für die Menschen zu werden, ist es unsere Pflicht, jeden noch im Land verbliebenen Faschisten loszuwerden, wo immer er auch sein mag."
 SWI_spouse_fascism:0 "Ehepartner faschistische Ideale"
 SWI_spouse_fascism_desc:0 "So wie die Dinge in der Welt laufen, ist es vielleicht am sichersten, sich mit faschistischen Mächten zu verbünden. Wir können anfangen, faschistische Propaganda zu verbreiten, damit die Menschen auf unsere Neuausrichtung der Werte vorbereitet sind."
 SWI_focus_on_swiss_unity:0 "Fokus auf die Schweizer Einheit"
 SWI_focus_on_swiss_unity_desc:0 "Wir können die [SWI.GetAdjective] Bevölkerung ermutigen, dass die Situation es erfordert, unsere Unterschiede in Sprache, Klasse, Herkunft und politischer Ausrichtung beiseite zu legen und unsere Ressourcen und Anstrengungen zur Verteidigung der Einheit und Vielfalt zu bündeln, die [SWI.GetNameDef] ausmacht."
 SWI_isolate_switzerland:0 "Isolierte Schweiz"
 SWI_isolate_switzerland_desc:0 "Wir können uns darauf konzentrieren, alles zu tun, um sicherzustellen, dass [SWI.GetName] allein und eigenständig dastehen kann. Dies könnte unsere einzige Chance sein, den Verlust unserer Unabhängigkeit zu vermeiden."
 SWI_militarization_drive:0 "Militarisierungsdrang"
 SWI_militarization_drive_desc:0 "Wir können unseren Fokus auf den Ausbau der [SWI.GetAdjective]-Kriegsmaschinerie verlagern, damit wir uns verteidigen und vielleicht sogar die Initiative ergreifen und ihren Offensiven zuvorkommen können."
 SWI_expand_covert_operations:0 "Ausweitung verdeckter Operationen"
 SWI_expand_covert_operations_desc:0 "Wir können unsere Spionageressourcen erhöhen, um das Weltgeschehen zu unseren Gunsten zu beeinflussen und gleichzeitig den Anschein der Neutralität zu wahren."
 SWI_expand_arms_industry:0 "Ausbau der Rüstungsindustrie"
 SWI_expand_arms_industry_desc:0 "Wir können unsere Kapazitäten zur Entwicklung neuer Waffen steigern und diese mit erheblicher Geschwindigkeit produzieren, sodass wir bei unserer Verteidigung nicht auf ausländische Mächte angewiesen sind."
 SWI_support_humanitarian_efforts:0 "Unterstützen Sie humanitäre Bemühungen"
 SWI_support_humanitarian_efforts_desc:0 "Wir können nicht tatenlos zusehen, wie um uns herum Gräueltaten begangen werden. Wir haben die moralische Verpflichtung, den Unterdrückten Europas zu helfen und ihnen in unserem Land Asyl zu gewähren."
 SWI_diplomatic_mission:0 "Diplomatische Mission"
 SWI_diplomatic_mission_desc:0 "Wir können diplomatische Reisen in andere Länder unternehmen, um engere Beziehungen zu ihnen aufzubauen und etwaige Zweifel an unserer Neutralität zu zerstreuen, um so eine mögliche Invasion ihrerseits zu verhindern."
 SWI_appease_fascists:0 "Faschisten beschwichtigen"
 SWI_appease_fascists_desc:0 "Wir können die neue europäische Ordnung akzeptieren und lernen, mit unseren faschistischen Nachbarn zu koexistieren. Dies könnte uns dem Krieg entgehen und unsere Unabhängigkeit und Neutralität sichern."
 SWI_oust_confederation_president:0 "Den Präsidenten der Konföderation absetzen"
 SWI_no_elected_president:0 "Kein Bundespräsident"
 SWI_elect_a_new_confederation_president:0 "Wählen Sie einen neuen Präsidenten für die Konföderation"
 SWI_no_confederation_councilor:1 "Kein Konföderationsrat"
 SWI_no_confederation_councilor_desc:1 "Wenn ein Ratssitz zu lange unbesetzt bleibt, werden inkompetente Opportunisten versuchen, diese Rolle zu ihrem eigenen Vorteil zu besetzen."
 SWI_councilor1_loc_key:0 "[?SWI.SWI_councilor_1.GetName]"
