 ETH_move_capital_to_axum_desc:0 "Die antike Stadt Axum sollte die neue Hauptstadt des Reiches werden."
 ETH_prevents_further_capital_moves_tt:1 "Die Verlegung der Hauptstadt nach Jerusalem verhindert weitere Verlegungen der Hauptstadt."
