 ITA_bop_slander_the_duce:0 "Verleumdung des Duce"
 ITA_bop_slander_the_duce_desc:1 "Italien kämpft aufgrund der Inkompetenz von [ITA.GetLeader] an mehreren Fronten. Vielleicht ist es Zeit für eine neue Führung?"
 ITA_bop_criticize_the_war:0 "Kritisieren Sie die Kriegsanstrengungen"
 ITA_bop_criticize_the_war_desc:1 "Unsere tapferen Truppen haben mit inkompetenter Führung, schlechter Logistik und unzureichender Ausrüstung zu kämpfen. Diese Probleme müssen behoben werden!"
 ITA_bop_question_the_army:0 "Stellen Sie die Loyalität der Armee in Frage"
 ITA_bop_question_the_army_desc:1 "Angesichts der jüngsten Ereignisse, die die Ineffektivität der Armee deutlich gemacht haben, fragen sich viele Menschen, wie loyal die Truppen Italien und dem faschistischen System gegenüber sind."
 ITA_bop_question_the_airforce:0 "Stellen Sie die Loyalität der Luftwaffe in Frage"
 ITA_bop_question_the_airforce_desc:1 "Angesichts der jüngsten Ereignisse, die die Ineffektivität der Luftwaffe deutlich gemacht haben, fragen sich viele Menschen, wie loyal die Truppen gegenüber Italien und dem faschistischen System tatsächlich sind."
 ITA_bop_question_the_navy:0 "Stellen Sie die Loyalität der Marine in Frage"
 ITA_bop_question_the_navy_desc:1 "Angesichts der jüngsten Ereignisse, die die Ineffektivität der Marine deutlich gemacht haben, fragen sich viele Menschen, wie loyal die Truppen Italien und dem faschistischen System gegenüber sind."
 ITA_bop_military_parade:0 "Halten Sie eine Militärparade ab"
 ITA_bop_military_parade_desc:1 "Es ist höchste Zeit, dass wir unsere siegreichen und tapferen Soldaten feiern und das italienische Volk sie mit Zuneigung überschütten lassen."
 ITA_bop_send_support:0 "Senden Sie militärische Unterstützung an [FROM.GetName]"
 ITA_bop_send_support_desc:1 "Unsere ideologischen Brüder befinden sich im Krieg. Als Begründer des Faschismus ist es unsere Pflicht, dafür zu sorgen, dass sie siegreich sind!"
 ITA_bop_praise_the_army:0 "Lobt die Armee"
 ITA_bop_praise_the_army_desc:1 "Die mutigen Männer und Frauen, die in unserer Armee dienen, sind das Rückgrat eines sicheren und stabilen [ITA.GetName]. Sie verdienen die Bewunderung des italienischen Volkes!"
 ITA_bop_praise_the_airforce:0 "Lob der Luftwaffe"
 ITA_bop_praise_the_airforce_desc:1 "Die mutigen Männer und Frauen unserer Luftwaffe bilden das Rückgrat einer sicheren und stabilen [ITA.GetName]. Sie verdienen die Bewunderung des italienischen Volkes!"
 ITA_bop_praise_the_navy:0 "Lob der Marine"
 ITA_bop_praise_the_navy_desc:1 "Die mutigen Männer und Frauen, die in unserer Marine dienen, sind das Rückgrat einer sicheren und stabilen [ITA.GetName]. Sie verdienen die Bewunderung des italienischen Volkes!"

 ITA_discredit_haile_selassie:0 "Diskreditierung [ETH.GetLeader]"
 ITA_discredit_haile_selassie_desc:1 "Indem wir die Äthiopier darüber informieren, wie Haile Selassie wie ein Feigling davonlief und in einem weit entfernten Land einem dekadenten Lebensstil frönt, können wir vielleicht einige Leute für unsere Sache gewinnen und dem Ruf des ehemaligen Kaisers schaden."
 ITA_electrify_state:0 "$ETH_electrify_state$"
 ITA_electrify_state_desc:0 "$ETH_electrify_state_desc$"

 ITA_vallo_alpino_del_littorio_dec_cat:0 "Vallo Alpino del Littorio"
 ITA_vallo_alpino_del_littorio_dec_cat_desc:1 "$ITA_vallo_alpino_del_littorio_desc$"
 ITA_vallo_alpino_occidentale:0 "Vallo Alpino Occidentale"
 ITA_vallo_alpino_occidentale_desc:1 "Wir können unsere Westgrenze sichern, indem wir dort eine Reihe von Befestigungsanlagen errichten. "
 ITA_vallo_alpino_occidentale_tt:0 "Bauen Sie mit [735.GetName] und [847.GetName] eine Verteidigungslinie in §Y[158.GetName]§! entlang der westlichen Alpengrenze.\n"
 ITA_vallo_alpino_settentrionale_west:0 "Vallo Alpino Settentrionale - Westen"
 ITA_vallo_alpino_settentrionale_west_desc:1 "Wir können unsere Nordwestgrenze sichern, indem wir dort eine Reihe von Befestigungsanlagen errichten. "
 ITA_vallo_alpino_settentrionale_west_tt:0 "Bauen Sie mit [846.GetName] und [151.GetName] eine Verteidigungslinie in §Y[158.GetName]§! und §Y[159.GetName]§! entlang der nordwestlichen Alpengrenze.\n"
 ITA_vallo_alpino_settentrionale_east:0 "Vallo Alpino Settentrionale – Osten"
 ITA_vallo_alpino_settentrionale_east_desc:1 "Wir können unsere nordöstliche Grenze sichern, indem wir dort eine Reihe von Befestigungsanlagen errichten. "
 ITA_vallo_alpino_settentrionale_east_tt:0 "Bauen Sie eine Verteidigungslinie in §Y[850.GetName]§! und in §Y[39.GetName]§! entlang der nordöstlichen Alpengrenze mit [153.GetName].\n"
 ITA_vallo_alpino_orientale:0 "Vallo Alpino Orientale"
 ITA_vallo_alpino_orientale_desc:1 "Wir können unsere Ostgrenze sichern, indem wir dort eine Reihe von Befestigungsanlagen errichten. "
 ITA_vallo_alpino_orientale_tt:0 "Bauen Sie eine Verteidigungslinie in §Y[160.GetName]§!, §Y[736.GetName]§! und §Y[852.GetName]§! entlang der östlichen Alpengrenze mit [153.GetName], [102.GetName], [853.GetName] und [103.GetName].\n"
 ITA_vallo_alpino_project_ongoing_flag:0 "Ein Projekt zur Erweiterung des $ITA_vallo_alpino_del_littorio$ ist bereits im Gange."

 ITA_colonial_management_dec_cat:0 "Kolonialverwaltung"
 ITA_colonial_management_dec_cat_desc:1 "$ITA_ministry_of_italian_africa_desc$"
 ITA_disband_irregulars:0 "Irreguläre Truppen auflösen"
 ITA_disband_irregulars_desc:1 "Wir brauchen die irregulären Kolonialtruppen nicht mehr. Lasst sie in ihre Heimat zurückkehren, oder wohin auch immer sie kommen."
 ITA_disband_irregulars_tt:0 "§RAlle irregulären Divisionen werden aufgelöst.§! \n(Personal und Ausrüstung werden nicht erstattet.)"
 ITA_train_irregulars:0 "Zugunregelmäßige"
 ITA_train_irregulars_desc:1 " Die Rekrutierung einheimischer Kräfte würde unsere eigenen Arbeitskräfte weniger belasten und sie haben den Vorteil, dass sie aus den jeweiligen Ländern stammen und über Kenntnisse der dortigen Völker und der Geographie verfügen."
 ITA_train_irregulars_create_units_tt:0 "Erstellen Sie §Y[ROOT.GetFlag][ROOT.GetAdjective]§! irreguläre Einheiten in eigenen und kontrollierten Kolonien:"
 ITA_train_irregulars_eritrea_tt:0 "Erstellen Sie eine §Y1 $irreguläre_Infanterie$-Division§! und eine §Y1 $Kavallerie$-Division§!."
 ITA_train_irregulars_libya_tt:0 "Erstellen Sie §Y1 $Kavallerie$-Divisionen§! und §Y1 $Kamelie$-Division§!."
 ITA_train_irregulars_somalia_tt:0 "Erstellen Sie §Y1 $irreguläre_Infanterie$-Divisionen§! und §Y1 $Kavallerie$-Division§!."
 ITA_train_irregulars_ethiopia_tt:0 "Erstellen Sie eine §Y1 $irregular_infantry$-Division§! und eine §Y1 $camelry$-Division§!."
 ITA_train_irregulars_cd_tt:0 "\nDiese Entscheidung wird in §Y[?ITA_colonial_management_cd] Tagen§! wieder verfügbar sein.\n"
 ITA_reorganize_irregulars:0 "Unregelmäßige Bänder neu organisieren"
 ITA_reorganize_irregulars_desc:1 "Durch die Neuorganisation unserer irregulären Truppen könnten wir sie möglicherweise stärken und sie zu einer gewaltigeren Streitmacht machen."
 ITA_reorganize_irregulars_tt:1 "Fügt allen Vorlagen für irreguläre Infanteriedivisionen §Y2 $irregular_infantry$-Bataillone§! und §Y1 $recon$-Bataillon§! hinzu. \nFügt allen Vorlagen für irreguläre Kavalleriedivisionen §Y2 $cavalry$-Bataillone§! und §Y1 $recon$-Bataillon§! hinzu. \nFügt allen Vorlagen für irreguläre Kavalleriedivisionen §Y2 $camelry$-Bataillone§! und §Y1 $recon$-Bataillon§! hinzu."
 ITA_reorganize_ascari:0 "Ascari neu organisieren"
 ITA_reorganize_ascari_desc:1 "Durch eine Neuorganisation der Ascari-Truppen könnten wir sie möglicherweise stärken und sie zu einer gewaltigeren Streitmacht machen."
 ITA_reorganize_ascari_tt:1 "Fügt allen Vorlagen für koloniale Infanteriedivisionen §Y1 $armored_car_recon$ battalion§! und §Y1 $artillery_brigade$ battalion§! hinzu. \nFügt allen Vorlagen für koloniale Kavalleriedivisionen §Y2 $cavalry$ battalions§! und §Y1 $recon$ battalion§! hinzu. \nFügt allen Vorlagen für koloniale Kamelritterdivisionen §Y2 $camelry$ battalions§! und §Y1 $recon$ battalion§! hinzu."
 ITA_regional_development_in_state:0 "Regionale Entwicklung in [FROM.GetName]"
 ITA_regional_development_in_state_desc:1 "Durch die Entwicklung unserer Kolonialgebiete werden diese bewohnbarer und wohlhabender."

 ITA_naval_cooperation_programs_dec_cat:0 "Marine-Kooperationsprogramme"
 ITA_naval_cooperation_programs_dec_cat_desc:1 "$ITA_cooperation_programs_desc$"
 ITA_cooperation_program_with_country:0 "Kooperationsprogramm mit [FROM.GetNameDef]"
 ITA_cooperation_program_with_country_desc:1 "Der Bau und Export unserer Schiffe in andere Länder könnte zu einer tieferen technologischen Zusammenarbeit führen."
 ITA_joint_maneuvers_with_country:0 "Gemeinsame [ROOT.GetAdjective]-[FROM.GetAdjective]-Manöver"
 ITA_joint_maneuvers_with_country_desc:1 "Damit militärische Kräfte effektiv und einsatzfähig sind, müssen sie vorbereitet und einsatzbereit sein. Eine gemeinsame Übung mit einem anderen Land leistet genau das."
 ITA_joint_maneuvers_with_country_doctrine_bonus:0 "Gemeinsame Marinemanöver"
 ITA_sell_obsolete_escort_ships_to_country:0 "Verkaufe veraltete Begleitschiffe an [FROM.GetNameDef]"
 ITA_sell_obsolete_escort_ships_to_country_desc:1 "Wir haben veraltete Schiffe in unserer Flotte, die in ein anderes Land verkauft werden könnten."
 ITA_sell_obsolete_escort_ships_to_country_only_once_tt:0 "\nWir können unsere Schiffe nur einmal erfolgreich verkaufen.\n"
 ITA_escort_ships_purchase_ongoing_flag:0 " Es wird bereits versucht, Begleitschiffe an ein anderes Land zu verkaufen."
 ITA_cede_aquila_class_destroyers_to_spanish_tag:0 "Abtretung von Zerstörern der Aquila-Klasse an [FROM.GetNameDef]"
 ITA_cede_aquila_class_destroyers_to_spanish_tag_desc:1 "Wir könnten den Spaniern einige unserer Zerstörer geben, um die Bindung zwischen unseren Ländern zu stärken und ihre militärischen Fähigkeiten zu verstärken."
 ITA_export_midget_submarines:0 "Exportieren von Kleinst-U-Booten"
 ITA_export_midget_submarines_desc:1 "Die klaren Gewässer des Mittelmeers stellen für größere U-Boote eine Gefahr dar. Andere Nationen könnten an unseren kleineren, winzigen U-Booten interessiert sein."
 ITA_export_midget_submarines_tt:0 "Baut §Y5 Kleinst-U-Boote§! für §Y[FROM.GetFlag][FROM.GetNameDef]§!. Die Produktion dauert §Y[?ITA.ITA_export_midget_submarines_days] Tage§!."
