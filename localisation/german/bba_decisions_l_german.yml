 SWI_military_readiness_decisions_category:1 "Schweizer Bürgermilizen"
 SWI_military_readiness_decisions_category_desc:1 "Die Bevölkerung der Schweiz befindet sich im Zentrum des faschistischen Sturms und muss daher bereit sein, ihre demokratische Lebensweise zu verteidigen. \n\n\nMilitärische Bereitschaft: [?SWI.SWI_military_readiness]/[?SWI.SWI_max_mil_readiness]£GFX_SWI_military_readiness_text_icon"
 SWI_absolute_neutrality_decisions_category:1 "Absolute Neutralität"
 SWI_absolute_neutrality_decisions_category_desc:2 "Umgeben von potenziellen Invasoren müssen wir bei [ROOT.GetNameDef] darauf achten, unsere brüchige Neutralität nicht zu brechen, sonst riskieren wir, unsere Insel der Demokratie an die steigenden Fluten des Krieges zu verlieren. \n\n"
