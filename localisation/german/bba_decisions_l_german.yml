 ETH_offer_peace_SOM_tt:0 "Bieten Sie dem Besitzer des Gebiets [SOM.GetAdjective] Frieden an, wenn er bereit ist, seine Ansprüche auf das Gebiet aufzugeben, das derzeit von [ETH.GetName] kontrolliert wird. Das derzeit kontrollierte Gebiet von [SOM.GetAdjective] wird zu einer Marionette von [ETH.GetAdjective]."
 ETH_offer_peace_UGA:0 "Bieten Sie Frieden für [UGA.GetAdjective] Unabhängigkeit"
 ETH_offer_peace_UGA_tt:0 "Bieten Sie dem Besitzer des Gebiets [UGA.GetAdjective] Frieden an, wenn er bereit ist, seine Ansprüche auf das Gebiet aufzugeben, das derzeit von [ETH.GetName] kontrolliert wird. Das derzeit kontrollierte Gebiet von [UGA.GetAdjective] wird zu einer Marionette von [ETH.GetAdjective]."
 ETH_freedom_at_gunpoint_offer_peace:0 "Bieten Sie [FROM.Capital.OWNER.GetName] Frieden für [FROM.GetAdjective] Unabhängigkeit an"
 ETH_freedom_at_gunpoint_offer_peace_tt:1 "§Y[FROM.Capital.OWNER.GetName]§! wird Frieden angeboten, wenn sie im Gegenzug ihre Ansprüche auf das §Y[FROM.GetAdjective]§!-Gebiet aufgeben, das §Y[THIS.GetName]§! derzeit kontrolliert. Wenn sie zustimmen, erhält §Y[THIS.GetName]§! einen Untertan in einem kontrollierten Gebiet, das einen Kern von §Y[FROM.GetName]§! bildet.\n\n§R[ROOT.GetFlag][ROOT.GetNameDefCap] verlässt jede Fraktion, der es angehört, wenn der Frieden angenommen wird und die Fraktion sich im Krieg mit [FROM.Capital.OWNER.GetFlag][FROM.Capital.OWNER.GetName]!§! befindet. \n\n§R[FROM.Capital.OWNER.GetFlag][FROM.Capital.OWNER.GetName] wird ein Friedensangebot nur in Betracht ziehen, wenn [ROOT.GetFlag][ROOT.GetName] das Gebiet von [FROM.GetAdjective] kontrolliert!§!"

 ETH_exploit_french_weakness_category:0 "Nutzen Sie die Schwäche der Franzosen"
 ETH_exploit_french_weakness_category_desc:0 "Wenn die Zeit reif ist, werden wir [268.GetName] unter unsere Kontrolle bringen, während die [FRA.GetAdjective] mit Angelegenheiten in der näheren Umgebung abgelenkt sind."
 ETH_take_DJI:0 "Nehmen wir Französisch-Somaliland"
 ETH_take_DJI_tt:0 "Wir müssen den richtigen Moment für einen Angriff abwarten. Sobald Französisch-Somaliland nicht besetzt ist, können wir das Gebiet schnell einnehmen. Frankreich wird unseren Besitzanspruch auf das Gebiet wahrscheinlich anerkennen, dennoch sollten wir auf einen größeren Konflikt vorbereitet sein."
 ETH_take_DJI_cancel_tt:0 "\n§RWerde aufgehoben, wenn $FRA_VICHY_fascism$ nicht länger die Kontrolle über Französisch-Somaliland hat oder wenn sie Divisionen in den Staat einführen!§!"
 ETH_take_DJI_danger_tt:0 "\n§R$FRA_VICHY_fascism$ könnte Vergeltung für die Annexion ihres Territoriums üben!§!"

 ETH_reintegrate_former_territory_category:0 "Erobere das Imperium zurück"
 ETH_reintegrate_former_territory_category_desc:0 "Die große Aufgabe, die vor uns liegt, besteht in der Rückgewinnung unseres rechtmäßigen Landes und der Vereinigung des [ETH.GetAdjective] Volkes unter unserem großen Führer [ETH.GetLeader]."
 ETH_reintegrate_core:0 "[FROM.GetName] zurückfordern"
 ETH_reclaim_the_empire_targets:0 "Diese Zustände können von [ETH.GetName] zurückgefordert werden."

 ETH_consolidate_east_africa_category:0 "Ostafrika konsolidieren"
 ETH_consolidate_ea_targets:0 "Diese Zustände können in [ETH.GetName] integriert werden:"
