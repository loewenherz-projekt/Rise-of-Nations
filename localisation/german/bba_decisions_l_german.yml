############### African Union ################

 african_union_category:0 "Organisation für Afrikanische Einheit"
 african_union_category_desc:0 "Wir werden Institutionen schaffen, die die Talente und Ressourcen des gesamten Kontinents bündeln und der politischen Vereinigung immer näher kommen. Nur wenn wir zusammenstehen und zusammenarbeiten, können die Menschen Afrikas hoffen, nicht erneut zu Untertanen zu werden."
 promote_org_of_african_unity:0 "Organisation in [FROM.GetName] fördern"
 invite_to_org:1 "[FROM.OWNER.GetName] zur Organisation einladen"
 invite_to_org_tt:0 "Nationen mit einer anderen Ideologie als Sie werden das Mitgliedschaftsangebot weniger wahrscheinlich annehmen."
 invite_to_ACB:0 "Laden Sie [FROM.GetName] zur Afrikanischen Zentralbank ein"
 invite_to_ACB_tt:0 "Nationen mit einer anderen Ideologie als Sie werden eine wirtschaftliche Integration mit Ihnen wahrscheinlich nicht akzeptieren."
 invite_to_org_alliance:0 "Laden Sie [FROM.GetName] zum gegenseitigen Verteidigungsabkommen ein"
 invite_to_org_alliance_tt:0 "Nationen mit einer anderen Ideologie als Sie werden mit geringerer Wahrscheinlichkeit ein Verteidigungsabkommen unterzeichnen."
 invite_to_exec_council:0 "Lade [FROM.GetName] zum Exekutivrat ein"
 invite_to_exec_council_tt:0 "Nationen mit anderer Ideologie werden eine politische Vereinigung mit Ihnen nicht unterstützen."
 threaten_org_member:0 "Bedrohen Sie die Führung von [FROM.GetName]"
 integrate_into_org:0 "Integrieren Sie [FROM.GetName] in die Afrikanische Union"
 leave_org_of_african_unity:0 "Verlassen Sie die Organisation für Afrikanische Einheit"
 threaten_member_state:0 "Führung einschüchtern [FROM.GetAdjective]"
 threaten_member_state_desc:0 "Wir werden den Führern von [FROM.GetNameDef] eine Botschaft senden, dass es für sie persönlich schwerwiegende Konsequenzen haben wird, wenn sie einer stärkeren Integration mit der Organisation für Afrikanische Einheit nicht zustimmen …"
 threaten_member_state_tt:0 "\nDie Führung des eingeschüchterten Landes wird eher bereit sein, Integrationsvorschläge für die §G60-Tage§ anzunehmen! Diese Entscheidung ist aktiv."

