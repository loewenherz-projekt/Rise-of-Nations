 ITA_abolish_the_colonies_event_chain_tt:0 "Startet die Ereigniskette „§Y$ITA_abolish_the_colonies$§!“, in deren Verlauf unsere kontrollierten Gebiete auf anderen Kontinenten Referenden abhalten, um zu entscheiden, ob sie in unser Land integriert werden oder unabhängige Nationen werden."
 ITA_abolish_the_colonies_tips_tt:0 "Eine stärkere Einhaltung der Vorschriften in den Kolonialstaaten und eine verstärkte Konzentration auf die Entwicklung bestimmter Staaten werden die Wahrscheinlichkeit einer erfolgreichen Integration der Region erhöhen."

