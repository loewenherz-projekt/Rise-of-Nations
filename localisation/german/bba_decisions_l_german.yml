 SWI_embrace_communism:0 "Umarme den Kommunismus"
 SWI_embrace_communism_desc:0 "Jetzt, da die Bühne bereitet ist, müssen wir schnell handeln und diese einmalige Gelegenheit nutzen, um [ROOT.GetNonIdeologyName] in ein Arbeiterparadies zu verwandeln."
 SWI_declare_the_alpine_confederation:0 "Erklären Sie den Alpenbund"
 SWI_declare_the_alpine_confederation_desc:0 "Da sich unsere Demokratie nun über die Alpen erstreckt, gehört die Eidgenossenschaft nicht mehr nur [SWI.GetNonIdeologyName], sondern allen Menschen und Gemeinschaften der Alpen."
 SWI_declare_the_alpine_union:0 "Erklären Sie die Alpenunion"
 SWI_declare_the_alpine_union_desc:0 "Der Wille der Arbeiter und Völker der Alpen ist nicht aufzuhalten. Während wir weiterhin Gebiete vom Joch der Bourgeoisie befreien, haben wir [SWI.GetNonIdeologyName] überschritten und unser Land sollte dies widerspiegeln."
 SWI_ask_for_guarantees:0 "Fragen Sie [FROM.GetName] nach Garantien"
 SWI_purchase_democratic_planes_fighters:0 "Kaufen Sie Kämpfer von [FROM.GetName]"
 SWI_purchase_democratic_planes_fighters_desc:0 "Die Verteidigung des Himmels über [ROOT.GetName] kann nicht warten, bis wir die Kapazität haben, unsere eigene Luftwaffe aufzustellen. In der Zwischenzeit müssen wir uns also bei unseren Kampfflugzeugen auf [FROM.GetName] verlassen."
 SWI_purchase_democratic_planes_cas:0 "Kaufen Sie Bomber von [FROM.GetName]"
 SWI_purchase_democratic_planes_cas_desc:0 "Da unsere industrielle Kapazität noch immer begrenzt ist, müssen wir uns auf [FROM.GetName] verlassen, um unsere Luftwaffe mit den Bombern zu versorgen, die wir zur Unterstützung unserer Truppen auf dem Schlachtfeld benötigen."
 SWI_purchase_democratic_planes_unlock_TT:0 "Schaltet Entscheidungen zum Kauf von §YKampfflugzeugen und Flugzeugen zur Luftnahunterstützung§! von §Y[?SWI.SWI_democratic_planes_seller.GetFlag][?SWI.SWI_democratic_planes_seller.GetNameDef]§! frei."
 SWI_purchase_fascist_planes_fighters:0 "Kaufen Sie Kämpfer von [FROM.GetName]"
 SWI_purchase_fascist_planes_fighters_desc:0 "Die Verteidigung des Himmels über [ROOT.GetName] kann nicht warten, bis wir die Kapazität haben, unsere eigene Luftwaffe aufzustellen. In der Zwischenzeit müssen wir uns also bei unseren Kampfflugzeugen auf [FROM.GetName] verlassen."
