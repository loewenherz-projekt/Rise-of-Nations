l_german:
 #### Ethiopia

 # Balance of Power
 ETH_recall_balco_safo_decision:0 "$ETH_balcho_safo$ aus dem Ruhestand zurückrufen"
 ETH_recall_balco_safo_decision_desc:0 "$ETH_balcho_safo$ mag den Ambitionen des Kaisers, [ROOT.GetName] zu reformieren und zu zentralisieren, ein entschiedener Gegner sein. Gleichzeitig ist er aber auch ein Held, der sowohl in der Schlacht von Mekelle als auch beim glorreichen Sieg bei Adwa gekämpft hat. Er ist außerdem ein beliebter Anführer. Wenn wir ihn also bitten, für [ROOT.GetName] erneut zu den Waffen zu greifen, erhalten wir nicht nur einen erfahrenen Kommandanten, sondern höchstwahrscheinlich auch mehr Soldaten, die sich uns anschließen."
 balcho_safo_recalled_tt:0 "Holen Sie sich 1 Einheit §Y$irregular_infantry$§!."
 ETH_bop_increase_mesafint_privileges:0 "Erhöhen Sie die Mesafint-Berechtigungen"
 ETH_bop_increase_mesafint_privileges_desc:1 "Die lokalen Ras sind am besten geeignet, die Regionen zu regieren. Die Zentralregierung in [ROOT.capital.GetCapitalVictoryPointName] sollte sich nicht mit Kleinigkeiten aufhalten. Wir müssen jedoch vorsichtig sein und dürfen nicht zu schnell vorgehen, sonst nutzen sie ihre Macht, um sich völlig zu befreien."
 ETH_bop_increase_the_power_of_the_mekwanint:0 "Erhöhen Sie die Kraft des Mekwanint"
 ETH_bop_increase_the_power_of_the_mekwanint_desc:1 "Die ernannten Minister müssen mehr Macht über lokale Angelegenheiten haben. Wir sollten daran arbeiten, die Macht von der Mesafint zur Mekwanint zu verlagern und die Kontrolle schrittweise an die Zentralregierung zu übertragen. [ROOT.GetLeader]. Dies wird den Ras natürlich verärgern, ist aber notwendig, wenn wir eine starke [ROOT.GetName] aufbauen wollen."
 ETH_bop_privileges_changed:0 " Weniger als ein Jahr seit der letzten Änderung der Berechtigungen"
 ETH_bop_increase_anarchist_influence:0 "Erhöhen Sie die Unterstützung für die Anarchisten"
 ETH_bop_increase_communist_influence:0 "Erhöhen Sie die Unterstützung für die Kommunisten"
 ETH_bop_increase_anarchist_influence_desc:0 "Wir müssen dafür sorgen, dass die Anarchisten genügend Einfluss haben, um eine erneute Einschränkung der Volksrechte durch die Zentralregierung zu verhindern. Wir sollten eine Propagandakampagne starten, um die Unterstützung der Bevölkerung für unsere Sache zu stärken. "
 ETH_bop_increase_communist_influence_desc:0 "Wir müssen sicherstellen, dass die Kommunisten die Entscheidungen der Zentralregierung beeinflussen. Wir sollten eine Propagandakampagne starten, um die Unterstützung der Bevölkerung für unsere Sache zu stärken, bevor die Nation auseinanderbricht."

# Decisions Menu
 ETH_placeholder_political_category:0 "PLATZHALTER - ZU ENTFERNEN"
 ETH_placeholder_political_category_desc:0 "PLATZHALTER - ZU ENTFERNEN\n- Dezentralisierung / Zentralisierung: [GetPlaceholderBopText]"
 war_escalation_text:0 "£generic_war_escalation_text_icon Kriegseskalationsstufe: §Y[?ETH.ETH_war_escalation_level]§!"
 war_escalation_level_tt:1 "§YAktuelle Kriegseskalation§!\nDie Eskalationsstufe steigt mit der Zeit und auch durch verschiedene Aktionen Italiens.\n\nKriegsdauer: §Y+[?ETH.ETH_escalation_time_increase_total]§!\nItalien hat eine Großoffensive gestartet (+1) [GetItalianRenewedOffensiveText]\n\nItalien hat mindestens 25 reguläre Divisionen eingesetzt (+1) [GetItalian20DivisionsText]\n\nItalien hat mindestens 300 Flugzeuge eingesetzt (+1) [GetItalianAircraftsText] [GetDefendTheNorthMissionText][GetDefendTheSouthMissionText][GetDefendHararMissionText][GetDefendTheCapitalMissionText]"
 war_escalation_icon_tt:1 "§YKriegeskalation§!\nAusgelöste Effekte durch zunehmende Kriegseskalation, nach Level:\n Level 3:\n §YLegage of Nations§!: Embargo-Anforderung freigeschaltet.\n §YLegage of Nations§!: Internationales Ansehen wächst \nLevel 4:\n §YLegage of Nations§!: Waffenkäufe freigeschaltet.\n §YLegage of Nations§!: Italienische Öffentlichkeit besorgt\nLevel 5:\n §YLegage of Nations§!: Schließung des Suezkanals freigeschaltet.\n §YLegage of Nations§!: Afrikanische Armee entmutigt\nLevel 6: \n §YLegage of Nations§!: Internationale Brigaden freigeschaltet.\n §YLegage of Nations§!: Armeemoral gestärkt\n §YLegage of Nations§!: Unruhen in den Kolonien\nLevel 7: \n §YLegage of Nations§!: Nationen§!: Internationale Vermittlung freigeschaltet.\n §YItalien§!: Italienische Öffentlichkeit stellt Kriegsanstrengungen in Frage \nStufe 8:\n §YÄthiopien§!: Desertionen von Feinden\n §YItalien§!: Massendesertion \nStufe 9:\n §YÄthiopien§!: Überleben gegen alle Widrigkeiten \nStufe 10:\n §YÄthiopien§!: Der Volkskrieg\n §YItalien§!: Aufruhr in den Kolonien"
 war_escalation_1_tt:0 "Stufe 1\n Keine Effekte"
 war_escalation_2_tt:0 "Stufe 2\n Keine Effekte"
 war_escalation_3_tt:1 "Level 3\n §YLegage of Nations§!: Äthiopien kann ein Embargo beantragen.\n §YÄthiopien§!: Internationales Ansehen wächst, Fokus §YEmbargo beantragen§! freigeschaltet."
 war_escalation_4_tt:1 "Level 4\n §YLexikobund§!: Äthiopien kann Waffen anfordern.\n §YItalien§!: Italienische Öffentlichkeit besorgt \n §YÄthiopien§!: Fokus auf §YWaffenkäufe§! freigeschaltet."
 war_escalation_5_tt:1 "Level 5\n §YLexikoliga§!: Äthiopien könnte die Schließung des Suezkanals beantragen.\n §YItalien§!: Afrikanische Armee entmutigt \n §YÄthiopien§!: Fokus auf §YSuezkanal-Schließung§! freigeschaltet"
 war_escalation_6_tt:1 "Level 6 \n §YLexistenzbund§!: Äthiopien kann internationale Brigaden anfordern.\n §YÄthiopien§!: Armeemoral gestärkt, Fokus auf §YInternationale Brigaden§! freigeschaltet.\n §YItalien§!: Unruhen in den Kolonien"
 war_escalation_7_tt:2 "Level 7\n §YLegage of Nations§!: Äthiopien kann um internationale Vermittlung bitten.\n§Y Italy§!: Die italienische Öffentlichkeit stellt die Kriegsanstrengungen in Frage \n§YEthiopia§!: Fokus §YInternational Mediation§! freigeschaltet."
 war_escalation_8_tt:0 "Level 8\n §YÄthiopien§!: Desertionen des Feindes\n §YItalien§!: Massendesertion"
 war_escalation_9_tt:1 "Level 9\n §YEthiopia§!: Überleben gegen alle Widrigkeiten"
 war_escalation_10_tt:0 "Level 10\n §YÄthiopien§!: Der Volkskrieg\n §YItalien§!: Aufruhr in den Kolonien"

 ETH_trigger_fulfilled:0 "£trigger_yes"
 ETH_trigger_not_fulfilled:0 "£trigger_no"
 ETH_war_escalation_threat:0 "Eskalation des Italienisch-Äthiopischen Krieges"
 ETH_major_offensive_threat:0 "Großoffensive im Italienisch-Äthiopischen Krieg"

 ETH_improve_country_category:0 "Die Weiterentwicklung von [ROOT.GetName]"
 ETH_improve_country_category_desc:0 "[ETH.GetNameDefCap] ist eine weitgehend landwirtschaftliche Wirtschaft, die von Subsistenzbauern bewirtschaftet wird. Um die Industrialisierung voranzutreiben, benötigen wir massive Investitionen in die Elektrifizierung und die Verkehrsinfrastruktur, damit mehr Arbeitskräfte von der Landwirtschaft in die Fabriken wechseln können."
 ETH_build_local_resistance_force:0 "Bauen Sie Widerstandskräfte in [FROM.GetName] auf"
 ETH_build_local_resistance_force_desc:1 "Wir müssen alles tun, was wir können, um die Widerstandsbewegungen in den besetzten Gebieten zu unterstützen. Dies wird wesentlich dazu beitragen, den Einfluss der [ITA.GetAdjective] auf die Region zu schwächen und sie besetzt zu halten, während wir uns auf die unvermeidliche Befreiung von [ETH.GetName] vorbereiten."
 ETH_build_local_resistance_force_increase_tt:0 "Rekrutiert §G1§! Arbegnoch-Division, die im Staat aufsteigen kann."
 ETH_build_local_resistance_force_cost:0 "£Befehlsmacht §G25§!"
 ETH_build_local_resistance_force_cost_blocked:0 "£Befehlsmacht §R25§!"
 ETH_building_local_resistance_flag:0 "Derzeit werden Widerstandskämpfer rekrutiert"
 ETH_launch_large_scale_uprising:0 "Groß angelegter Aufstand"
 ETH_launch_large_scale_uprising_desc:0 "Die Bevölkerung von [ETH.GetName] brennt darauf, die ausländischen Besatzungstruppen in ihrem Heimatland zu stürzen. Wir müssen ihnen nur einen Anstoß dazu geben."
 ETH_has_readied_uprising_tt:0 "Hat in mindestens einem Staat einen Aufstand vorbereitet"
 ETH_italian_uprising_warning_mission:0 "Aufstand in [ETH.GetName] steht unmittelbar bevor"
 ETH_italian_uprising_warning_mission_desc:0 "Gerüchten zufolge hat [ETH.GetLeader] die Rebellen im Land zu einem koordinierten Angriff auf [ROOT.GetName] aufgerufen."
 ETH_italian_uprising_warning_mission_tt:0 "Aufstand beginnt"
 ETH_coup_haile_selassie_imru:0 "Anstiftung zum Palastputsch"
 ETH_coup_haile_selassie_imru_desc:0 "Der demokratisch gesinnte $ETH_ras_imru_haile_selassie$ regierte das Land in Abwesenheit des Kaisers. Zweifellos wird er von den Massen als der wahre Held von [ROOT.GetName] angesehen, nachdem er das Land in den Krieg geführt hatte. Die Rufe nach einem demokratischeren [ROOT.GetName] werden immer lauter. Vielleicht ist es jetzt an der Zeit, in [ROOT.GetNameDef] wirklich Veränderungen herbeizuführen."
 ETH_palace_coup_tt:0 "§Y$ETH_ras_imru_haile_selassie$§! startet einen Putschversuch"
 ETH_formal_request_to_host:0 "Stellen Sie eine formelle Anfrage an die [?ETH.host_nation.GetAdjective]-Regierung."
 ETH_formal_request_to_host_desc:0 "Die [?ETH.host_nation.GetAdjective]-Regierung sollte angesprochen und gebeten werden, sich dem Krieg gegen [ITA.GetNameDef] anzuschließen. Dies würde den letzten Teil der Rückeroberung unserer Nation einleiten."
 ETH_false_flag_operation_decision:0 "Starten Sie eine Operation unter falscher Flagge"
 ETH_false_flag_operation_decision_desc:0 "Um unsere Gastgeber davon zu überzeugen, dass [ITA.GetName] nicht vertrauenswürdig ist, müssen wir einen Angriff auf einen deutschen Grenzposten inszenieren und die Schuld den Italienern in die Schuhe schieben."
 ETH_throw_grand_party_for_host:0 "Veranstalten Sie eine rauschende Party"
 ETH_throw_grand_party_for_host_desc:0 "Eine große Party in der Residenz von [ROOT.GetLeader] wäre neben der eher offiziellen auch eine hervorragende Gelegenheit für informelle Lobbyarbeit."
 ETH_influence_host_cost:0 "§G10§! £GFX_ETH_imperial_treasury"
 ETH_influence_host_cost_blocked:0 "§R10§! £GFX_ETH_imperial_treasury"
 organization_of_african_unity_member_tt:0 "Ist ein Mitgliedstaat der Organisation für Afrikanische Einheit"
 ETH_take_loans:0 "Persönliche Darlehen"
 ETH_take_loans_desc:0 "Wir können versuchen, unsere verfügbaren Mittel zu erhöhen, indem wir Imperial Assets als Sicherheit verwenden."
 ETH_take_loans_tt:0 "£GFX_ETH_imperial_treasury Schatzkammer: §G+10§! \n"
 ETH_fundraising_campaign_decision:0 "Spendenaktion"
 ETH_fundraising_campaign_decision_desc:0 "Nach der Radioansprache von [ROOT.GetLeader] ist die Unterstützung für unsere Sache in Amerika erheblich gewachsen. Wir sollten dies nutzen und dort und anderswo Spendenaktionen starten, um die Reichskasse zu füllen und so die Rückeroberung unserer Heimatländer zu finanzieren."
 ETH_low_fundraising_effect_tt:0 "£GFX_ETH_imperial_treasury Schatzkammer: §G+5§! \n"
 ETH_medium_fundraising_effect_tt:0 "£GFX_ETH_imperial_treasury Schatzkammer: §G+15§! \n"
 ETH_high_fundraising_effect_tt:0 "£GFX_ETH_imperial_treasury Schatzkammer: §G+20§! \n"
 ETH_very_high_fundraising_effect_tt:0 "£GFX_ETH_imperial_treasury Schatzkammer: §G+30§! \n"
 ETH_set_up_gideon_force_decision:0 "Die Gideon Force"
 ETH_set_up_gideon_force_decision_desc:0 "Die [?ETH.host_nation.GetAdjective]-Regierung scheint bereit zu sein, eine kleine Expeditionstruppe zu sponsern, die unseren Angriff auf die Besatzer direkt unterstützt. Wir sollten uns umgehend für die Bildung einer solchen Einheit einsetzen!"
 ETH_set_up_gideon_force_decision_tt:0 "Ein [?ETH.host_nation.GetAdjective]-Kommandeur einer Spezialeinheit tritt vorübergehend der [ROOT.GetAdjective]-Armee bei."

 ETH_recruit_mercenaries_host_cost:0 "§G[?ETH_recruit_mercenaries_cost]§! £GFX_ETH_imperial_treasury"
 ETH_recruit_mercenaries_host_cost_blocked:0 "§R[?ETH_recruit_mercenaries_cost]§! £GFX_ETH_imperial_treasury"
 ETH_recruit_mercenaries_from_host:0 "Rekrutiere Söldner"
 ETH_recruiting_mercenaries_flag:0 "Söldner rekrutieren"
 ETH_recruit_mercenaries_from_host_desc:0 "Es gibt immer Leute, die für Geld kämpfen."
 ETH_recruit_aircrews_from_host:0 "Rekrutieren Sie [?ETH.host_nation.GetAdjective] Piloten"
 ETH_recruit_aircrews_from_host_desc:0 "Sicherlich gibt es [?ETH.host_nation.GetAdjective] Piloten und Servicetechniker, die bereit sind, ihr Handwerk im Dienste von [ROOT.GetName] auszuüben, wenn das Geld gut genug ist."
 ETH_recruit_merchant_marines_from_host:0 "Erwerben Sie zivile Schiffe"
 ETH_recruit_merchant_marines_from_host_desc:0 "Wir werden Schiffe und Seeleute brauchen, um unsere Armee zurück nach Afrika zu transportieren"
 ETH_buy_rifles_from_host:0 "Kaufen Sie in [?ETH.host_nation.GetAdjective] hergestellte Gewehre."
 ETH_buy_rifles_from_host_desc:0 "Um die Rückeroberung von [ROOT.GetName] zu finanzieren, sind Opfer notwendig. Das persönliche Vermögen des Monarchen für Waffen auszugeben, mag verzweifelt sein, aber verzweifelte Zeiten erfordern verzweifelte Maßnahmen."
 ETH_buy_rifles_from_host_cost:0 "§G[?ETH_Kaufe_Waffen_vom_Host_Kosten]§! £GFX_ETH_Imperial_Treasury"
 ETH_buy_rifles_from_host_cost_blocked:0 "§R[?ETH_Kaufe_Waffen_vom_Host_Kosten]§! £GFX_ETH_Imperial_Treasury"
 ETH_securing_arms_deals_flag:0 "Sicherung des Waffendeals"
 ETH_will_be_re_enabled_tt:0 "Nach Abschluss wird diese Entscheidung in [?ETH_re_enable_time_international_actions] Tagen wieder verfügbar sein."
 ETH_buy_tanks_from_host:0 "Kaufen Sie überschüssige [?ETH.host_nation.GetAdjective]-Panzer"
 ETH_buy_tanks_from_host_desc:0 "Der [ROOT.GetAdjective]-Armee mangelt es stark an Panzern. Es gibt alte Überschusspanzer auf dem Markt. Ein Teil der kaiserlichen Schatzkammer für den Erwerb einiger dieser Panzer sollte Abhilfe schaffen. Alte Panzer sind besser als gar keine Panzer."
 ETH_buy_support_equipment_from_host:0 "Erwerben Sie unterstützende Ausrüstung"
 ETH_buy_support_equipment_from_host_desc:0 "Gewehre sind nicht alles. Soldaten brauchen Helme, Stiefel, Granaten und so weiter. Wir können einen Teil der kaiserlichen Staatskasse für die Anschaffung dieser Dinge verwenden."

 ETH_chitet_category:0 "Das Chitet"
 ETH_chitet_category_desc:0 "Durch die Einberufung der nationalen Wehrpflicht erhält der Staat schnell Zugriff auf eine große Anzahl von Truppen. Die Wehrpflicht hat dem Land über Jahrhunderte hinweg gute Dienste geleistet. Nach Kriegsende können alle Soldaten in ihr ziviles Leben zurückgeschickt werden."
 ETH_raise_the_chitet:0 "Erhebe das Chitet"
 ETH_raise_the_chitet_desc:0 "Führen Sie die Erhebung der regionalen Abgaben in allen kontrollierten äthiopischen Staaten durch."
 ETH_disband_the_chitet:0 "Löst das Chitet auf"
 ETH_disband_the_chitet_desc:0 "Wenn der Krieg vorbei ist, ist es an der Zeit, die Wehrpflichtigen in ihre Heimat zurückkehren zu lassen."
 ETH_chitet_cooldown_tt:0 "Das Chitet kann [?var_ETH_chitet_cooldown] Tage nach seiner Auflösung erneut auferstehen."
 ETH_chitet_disband_tt:0 "[?var_ETH_chitet_cooldown] Tage seit der Auflösung des Chitet"
 ETH_disband_the_chitet_mission:0 "Heimkehrende Levies"
 ETH_disband_the_chitet_mission_desc:0 "Es ist an der Zeit, das Chitet aufzulösen und den Soldaten die Rückkehr in ihr ziviles Leben zu ermöglichen."
 ETH_raise_the_chitet_effect_tt:0 "Erhöht die Abgabe"
 ETH_number_levy_units_less_than_five:0 "Weniger als 5 aktive Abgabeabteilungen."
 ETH_second_italo_ethiopian_war_category:0 "Der 2. Italienisch-Äthiopische Krieg"
 ETH_second_italo_ethiopian_war_category_desc:0 "[Get2ndItaloEthiopianWarDesc] "
 
 ETH_2ndItaloEthiopianWar:1 "[ITA.GetName] ist widerrechtlich in unser Heimatland eingedrungen. Obwohl wir Vollmitglied des Völkerbundes sind, unternimmt die Welt nichts und betrachtet den Konflikt als ein kleines koloniales Scharmützel. \nWir müssen dem Völkerbund beweisen, dass es sich um einen umfassenden Angriffskrieg eines Mitgliedsstaates gegen einen anderen handelt, und so die Welt zum Handeln gegen [ITA.GetLeader] zwingen."
 ITA_2ndItaloEthiopianWar:0 "Der Völkerbund hat bisher keine Maßnahmen gegen uns ergriffen und unserer Eroberung Äthiopiens lediglich symbolischen Widerstand geleistet. Je länger sich der Konflikt jedoch hinzieht und je mehr reguläre Truppen wir einsetzen, desto größer ist das Risiko, dass er sich tatsächlich in unsere Angelegenheiten einmischt. Wir müssen diesen Krieg beenden, bevor es [ETH.GetLeader] gelingt, den Völkerbund zum Handeln zu bewegen."
 ETH_christmas_offensive_mission:0 "Die Weihnachtsoffensive"
 ETH_christmas_offensive_mission_desc:0 "Unsere Truppen rücken noch vor, aber wir verlieren an Schwung. Bald wird die Energie des Gegenangriffs verflogen sein."
 ETH_time_based_war_escalation_mission:0 "Allmähliche Eskalation des Krieges"
 ETH_time_based_war_escalation_mission_desc:0 "Je länger der Krieg dauert, desto größer wird die Besorgnis in der Welt. Mit jedem halben Jahr, das seit Beginn des Krieges im Oktober 1935 vergeht, wird sich die Eskalation des Krieges um ein Jahr erhöhen."

 ETH_hold_the_north_mission:0 "Halte den Norden"
 ETH_hold_the_north_mission_desc:0 "Die Weihnachtsoffensive hat die Italiener zwar zurückgedrängt, aber es ist uns nicht gelungen, sie wie geplant ins Meer zu treiben. Sie werden sich neu formieren und mit größerer Stärke angreifen. Wir müssen zeigen, dass wir unser Land verteidigen können."
 ETH_hold_the_north_mission_success:0 "\n[ETH.GetName] hat erfolgreich den Norden (+1) gehalten £trigger_yes\n"
 ITA_conquer_the_north_mission:0 "Erobern Sie Nordäthiopien"
 ITA_conquer_the_north_mission_desc:0 "Es ist an der Zeit, den Boden zurückzuerobern, den wir bei der Offensive der Äthiopier verloren haben."
 ETH_war_escalation_inc_tt:0 "Die Kriegseskalation nimmt um §G1§ zu!"
 ETH_war_deescalation_inc_tt:0 "Die Kriegseskalation nimmt um §R1§ ab!"
 ITA_war_escalation_inc_tt:0 "Die Kriegseskalation nimmt um §R1§ zu!"
 ITA_war_deescalation_inc_tt:0 "Die Kriegseskalation nimmt um §G1§ ab!"
 ETH_hold_the_south_mission:0 "Halte den Süden"
 ETH_hold_the_south_mission_desc:0 "An der Südfront herrschte bisher Ruhe, doch die Italiener bereiten sich mit Sicherheit auf eine weitere Offensive aus ihren südlichen Besitzungen vor. Wir müssen sie aufhalten und der Welt zeigen, dass die von ihnen und ihren somalischen Marionetten erhobenen Ansprüche unrechtmäßig sind."
 ETH_hold_the_south_mission_success:0 "\n[ETH.GetName] hat erfolgreich den Süden (+1) gehalten £trigger_yes\n"
 ITA_conquer_the_south_mission:0 "Erobern Sie Südäthiopien"
 ITA_conquer_the_south_mission_desc:0 "Die Äthiopier rechnen wahrscheinlich nicht mit einem Vorstoß im Süden. Wir müssen ihre Armee demoralisieren und ihre Unterstützung im Völkerbund schwächen, indem wir [837.GetName] und [836.GetName] schnell erobern."
 ETH_hold_addis_ababa_mission:0 "Halten Sie Addis Abeba"
 ETH_hold_addis_ababa_mission_desc:0 "Indem wir in unserer Hauptstadt durchhalten, können wir der internationalen Gemeinschaft hoffentlich klarmachen, dass die Italiener mit Gewalt gestoppt werden müssen."
 ETH_hold_the_capital_mission_success:0 "\n[ETH.GetName] erfolgreich gehalten Addis Abeba (+1) £trigger_yes\n"
 ETH_conquer_addis_ababa_mission:0 "Nehmen Sie Addis Abeba"
 ETH_conquer_addis_ababa_mission_desc:0 "Wir müssen die Hauptstadt einnehmen und [ETH.GetName] zur Kapitulation zwingen."
 ETH_hold_harar_mission:0 "Halten [835.GetName]"
 ETH_hold_harar_mission_desc:0 "Nachdem wir den Süden verloren haben, sollten wir versuchen, in Harar durchzuhalten und unseren Weg zum Meer zu verteidigen."
 ETH_harar_lost_tt:0 "Der Verlust der Kontrolle über Harar wird die Unterstützung der Bevölkerung für den Krieg verringern."
 ETH_conquer_harar_mission:0 "Erobern Sie [835.GetName]"
 ETH_conquer_harar_mission_desc:0 "Die Äthiopier formieren sich in den Bergen neu. Wir müssen [835.GetCapitalVictoryPointName] einnehmen, bevor sie ihre Stellungen verschanzen können."
 ETH_hold_harar_mission_success:0 "\n[ETH.GetName] erfolgreich gehalten [835.GetName] (+1) £trigger_yes\n"
 ETH_buy_rifles:0 "Kleinwaffen kaufen"
 ETH_buy_rifles_desc:0 "Da wir nun Zugang zum internationalen Waffenmarkt haben, müssen wir Waffengeschäfte abschließen. Unser wichtigstes Anliegen ist es, unsere Infanterie mit Gewehren auszustatten, damit sie die Invasoren auf Augenhöhe bekämpfen kann."
 ETH_buy_artillery:0 "Artillerie kaufen"
 ETH_buy_artillery_desc:0 "Wir benötigen dringend moderne Artillerie zur Unterstützung unserer Armeen. Unsere Priorität sollte darin bestehen, Waffengeschäfte für den Kauf schwerer Geschütze abzuschließen."
 ETH_buy_support_equipment:0 "Kaufen Sie unterstützende Ausrüstung"
 ETH_buy_support_equipment_desc:0 "Wir brauchen nicht nur Waffen, sondern dringend Kommunikations- und Unterstützungsausrüstung im Allgemeinen. Die Beschaffung weiterer solcher Geräte hat höchste Priorität."
 ETH_buy_anti_tank_guns:0 "Kaufen Sie Panzerabwehrkanonen"
 ETH_buy_anti_tank_guns_desc:0 "Wir versuchen, die italienischen Panzer mit Benzinkanistern und Großwildjagdgewehren zu bekämpfen. Um die Italiener besiegen zu können, brauchen wir eine große Anzahl guter Panzerabwehrkanonen."

 ETH_request_sent_flag:0 "Warte auf Antwort"
 ETH_host_confirmed_flag:0 "Hat ein Exil-Gastland bestätigt"
 ETH_host_country_decision:0 "Fordern Sie die Erlaubnis an, eine Exilregierung in [FROM.GetName] einzurichten."
 ETH_host_country_decision_desc:0 "Wir müssen uns auf das Schlimmste vorbereiten. Sollte das Land fallen, brauchen wir eine Basis, von der aus wir den Widerstand fortsetzen können. Wir sollten uns an die [FROM.GetAdjective]-Regierung wenden und um die Erlaubnis bitten, dort eine Exilregierung zu bilden."
 ETH_host_country_decision_tt:0 "§Y[ROOT.GetLeader]§! kann eine §YRegierung im Exil§! in §Y[FROM.GetNameWithFlag]§! einrichten, wenn der Fokus §Y$ETH_boarding_the_train$§! vor der Kapitulation abgeschlossen wurde. \n\nSchaltet zusätzliche Fokusse frei, die als Regierung im Exil in [FROM.GetNameDef] verfügbar sein werden."

 ITA_expand_regional_control:0 "Regionale Steuerung erweitern auf [FROM.GetName]"
 ITA_expand_regional_control_desc:1 "Wir werden die Kontrolle von [ITA.GetAdjective] über [FROM.GetName] erweitern."
 ITA_discredit_haile_selassie_cd_tt:0 "[GetDecisionCooldownTooltip] §Y180§! Tage.\n"
 expanding_regional_control_flag:0 "Ausweitung der regionalen Kontrolle"
 ETH_italian_occupation_category:0 "[ITA.GetAdjective] Beruf von [ETH.GetName]"
 ETH_italian_occupation_category_desc:1 "Obwohl wir gezwungen waren, uns aus unserer Heimat zurückzuziehen, ist der Krieg noch lange nicht vorbei. Wir werden alle uns zur Verfügung stehenden Mittel einsetzen, um dem Volk [ETH.GetAdjective] wieder die Freiheit zu sichern."
 ETH_italian_occupation_category_map_category_name:0 "Verwalten Sie die [ITA.GetAdjective] Besetzung von [ETH.getNameDef]"
 ETH_italian_control_mission:0 "[ITA.GetName] integriert [?ITA.state_integrated.GetName]"
 ETH_italian_control_mission_desc:1 "[ITA.GetName] versucht, mit roher Gewalt die Kontrolle über unser Territorium zu erlangen. Wir müssen sie zurückdrängen."
 ETH_italian_control_mission_tt:0 "[?ITA.state_integrated.GetName] wird Eigentum von [ITA.GetNameWithFlag]."
 ETH_retake_territory_mission:0 "Gebiet zurückerobern"
 ETH_retake_territory_mission_desc:0 "Die Hälfte von [ROOT.GetName] steht unter feindlicher Kontrolle. Die lokalen Ras sind verärgert über die Aufgabe ihres Territoriums und die zentrale Autorität wird in Frage gestellt. Es gibt Gespräche über einen Deal mit den Italienern. Die Rückeroberung des [ROOT.GetAdjective]-Territoriums ist die einzige Möglichkeit, die Bevölkerung vom Sieg zu überzeugen."
 controls_50_percent_of_territory:0 "[ROOT.GetNameWithFlag] kontrolliert mindestens §Y50%§! der Gesamtzahl der eigenen Staaten.\n Derzeit kontrolliert: [?num_owned_controlled_states|Y0]\n Bedarf: [?controlled_owned_50|Y0] "
 controls_more_than_50_percent_of_territory:0 "[ROOT.GetNameWithFlag] kontrolliert mehr als §Y50%§! der Gesamtzahl der eigenen Staaten.\n Derzeit kontrolliert: [?num_owned_controlled_states|Y0]\n Bedarf: [?controlled_owned_more_than_50|Y0] "
 
 ETH_road_reform_BoP:0 "Straßenverbesserungen"

 ETH_Education_reform_decentralized_BoP:0 "Lokale Bildungsreformen"
 ETH_Education_reform_decentralized_BoP_tt:0 "Bildung steht im Mittelpunkt unseres Kampfes gegen veraltete Machtstrukturen. Wir müssen junge Menschen so erziehen, dass sie Autoritäten hinterfragen und die antiquierten Ansichten der Traditionalisten ablehnen."
 ETH_Education_reform_centralized_BoP:0 "Staatliche Bildungsreformen"
 ETH_Education_reform_centralized_BoP_tt:0 "Natürlich ist es unsere Priorität, sicherzustellen, dass die nächste Generation ins Berufsleben einsteigen kann. Wir haben jedoch die Möglichkeit, zukünftige Generationen in eine akzeptablere moralische Richtung zu lenken und so sicherzustellen, dass sie [ETH.GetLeader] treu bleiben."
 ETH_road_reform_local_BoP:0 "Unterstützen Sie den lokalen Straßenbau"
 ETH_road_reform_highways_BoP:0 "Unterstützen Sie die Entwicklung des Capital Highway"
 ETH_road_reform_local_BoP_desc:0 "Das Straßennetz von [ETH.GetName] stellt zunehmend ein Hindernis für die weitere wirtschaftliche Entwicklung dar. Wir verfügen nun über den politischen Einfluss, um eine Straßenmodernisierung voranzutreiben, die durch die Schaffung besserer Straßen zwischen Städten und Dörfern dem Durchschnittsbürger im ganzen Land zugutekommt."
 ETH_road_reform_highways_BoP_tt:0 "Das Straßennetz von [ETH.GetName] stellt zunehmend ein Hindernis für die weitere wirtschaftliche Entwicklung dar. Mit unserem neu gewonnenen Einfluss sollten wir die wirtschaftliche Entwicklung und Zentralisierung durch den Bau besserer Autobahnen rund um die Hauptstadt beschleunigen."
 ETH_officer_reforms_centralized_BoP:0 "Politische Militäroffiziere vorstellen"
 ETH_officer_reforms_decentralized_BoP:0 "Stärkung der Meritokratie im Militär"
 ETH_officer_reforms_centralized_BoP_tt:0 "Um zu verhindern, dass sich das Militär gegen unser Regime wendet, müssen wir seine Loyalität durch die Einführung politischer Offiziere sicherstellen."
 ETH_officer_reforms_decentralized_BoP_tt:0 "Um die Effektivität des Militärs zu gewährleisten, müssen wir die Leistungsorientierung des Offizierskorps stärken."
 ETH_BoP_purge_communists:0 "Säubert die Kommunisten"
 ETH_BoP_purge_communists_tt:0 "Der brüchige Frieden zwischen den Schwarzen Löwen und den kommunistischen Militäroffizieren beginnt zu bröckeln. Die Offiziere wollen die Macht zentralisieren und einen autoritären Staat errichten, der ihnen treu ergeben ist. Wir müssen sie eliminieren, bevor sie alles zerstören, was wir aufgebaut haben."
 ETH_BoP_purge_anarchists:0 "Säubert die Anarchisten"
 ETH_BoP_purge_anarchists_tt:1 "Der unsichere Frieden zwischen dem Militär und den Schwarzen Löwen bröckelt. Ihre naiven anarchistischen Ansichten verderben [ETH.GetNameDef] von innen heraus und machen uns anfällig für Angriffe. Um die Fortsetzung unserer Revolution zu sichern, werden wir die Schwarzen Löwen ein für alle Mal auslöschen. \n\n§Y$ETH_prov_mil_admin$§! wird Anführer von §Y[ROOT.GetFlag][ROOT.GetNameDefCap]§!."
 ETH_BoP_expand_black_lions:0 "Erhöhen Sie die Anzahl der Black Lion-Divisionen"
 ETH_BoP_expand_black_lions_tt:0 "Den Kommunisten kann man nicht trauen. Wir müssen wachsam sein, falls sie versuchen, die Macht an sich zu reißen. Deshalb werden wir die Zahl der Black Lion-Divisionen erhöhen, um sie von jeglichen Schritten abzuhalten."
 ETH_BoP_expand_red_guards:0 "Verstärkung der Rotgarde-Divisionen"
 ETH_BoP_expand_red_guards_tt:0 "Den Schwarzen Löwen kann man die Regierungsgewalt nicht anvertrauen und sie müssen letztendlich entmachtet werden. Wir müssen die Zahl der Rotgardisten unter unserem Kommando erhöhen, um die Situation zu unserem Vorteil nutzen zu können, wenn die Schwarzen Löwen unweigerlich scheitern."

 ETH_electrify_state:0 "Elektrifizierung von [FROM.GetName]"
 ETH_electrify_state_desc:0 "Die Stromversorgung der umliegenden Dörfer ist ein Schlüsselfaktor bei der Modernisierung des Landes."
 ETH_electrify_state_tt:0 "Ändern Sie §Y$ETH_state_development_dynamic_modifier$§! durch: \n$MODIFIER_STATE_PRODUCTION_SPEED_BUILDINGS_FACTOR$: §G+10%§!\n$MODIFIER_LOCAL_BUILDING_SLOTS$: §G+10%§!"
 ETH_improve_communications_in_state:0 "Verbessern Sie die Kommunikationsinfrastruktur in [FROM.GetName]"
 ETH_improve_communications_in_state_desc:0 "Effiziente Kommunikationsmittel sind für die Entwicklung des Landes von entscheidender Bedeutung."
 ETH_improve_communications_in_state_tt:0 "Ändern Sie §Y$ETH_state_development_dynamic_modifier$§! durch: \n$MODIFIER_STATE_PRODUCTION_SPEED_BUILDINGS_FACTOR$: §G+15%§!"
 ETH_invest_in_state_industry:0 "Investitionen in der [FROM.GetName]-Branche"
 ETH_invest_in_state_industry_desc:0 "Wenn [FROM.GetName] eine erfolgreiche Industrie aufbauen will, sind staatliche Investitionen erforderlich, entweder direkt oder über lokale Herrscher."
 ETH_invest_in_state_industry_tt:0 "Ändern Sie §Y$ETH_state_development_dynamic_modifier$§! durch: \n$MODIFIER_LOCAL_BUILDING_SLOTS$: §G+20%§!"
 prospecting_ongoing_flag:0 "Ressourcensuche im Gange"
 ETH_prospect_for_resources:0 "Ressourcensuche"
 ETH_prospect_for_resources_desc:0 "In [FROM.GetName] gibt es Bodenschätze zu finden. Wenn Sie tief genug graben und bohren, wird [ROOT.GetName] ein reicheres Land."
 ETH_japanese_industrial_investments_decision:0 "Japanische Industrieinvestitionen"
 ETH_japanese_industrial_investments_decision_desc:0 "Japanische Investoren suchen nach neuen Investitionsmöglichkeiten in Afrika. [FROM.GetName] könnte der perfekte Standort für einige von Japan finanzierte Industrien sein."
 ETH_japanese_investments_flag:0 " Derzeit laufende japanische Investitionen "
 ETH_local_development_state_grows_mission:0 "Wachstum von [?ETH.ETH_local_state.GetName]"
 ETH_local_development_state_grows_mission_desc:0 "[?ETH.ETH_local_state.GetName] floriert unter der aktuellen Herrschaft. Die landwirtschaftliche Produktion steigt und Städte und Dörfer wachsen."
 ETH_max_japanese_investments_tt:0 "Investitionen können in maximal §Y3§! Staaten getätigt werden. Anzahl der Staaten, in die investiert wird: §Y[?ETH_japanese_invesment_states]§!"
 ETH_japanese_infrastructure_investments_decision:0 "Japanische Infrastrukturinvestitionen"
 ETH_japanese_infrastructure_investments_decision_desc:0 "Japanische Investoren suchen nach neuen Investitionsmöglichkeiten in Afrika. [FROM.GetName] könnte der perfekte Standort für eine von Japan finanzierte Infrastrukturentwicklung sein."
 ETH_japanese_dockyard_investments_decision:0 "Japanische Schiffbauinvestitionen"
 ETH_japanese_dockyard_investments_decision_desc:0 "Japanische Investoren suchen nach neuen Investitionsmöglichkeiten in Afrika. [FROM.GetName] könnte der perfekte Standort für einige von Japan finanzierte Schiffsbauanlagen sein."
 ETH_local_development_industry_grows_mission:0 "Industrielle Expansion in [?ETH.ETH_local_state.GetName]"
 ETH_local_development_industry_grows_mission_desc:0 "Die Kleinserienfertigung in [?ETH.ETH_local_state.GetName] boomt. Wenn wir sie weiterhin fördern, wird ganz [ROOT.GetName] davon profitieren."
 ETH_local_development_arms_industry_grows_mission:0 "Lokale Waffenproduktion in [?ETH.ETH_local_state.GetName]"
 ETH_local_development_arms_industry_grows_mission_desc:0 "Die lokalen Waffenschmiede in [?ETH.ETH_local_state.GetName] haben ihre Produktion deutlich gesteigert. Damit ist ein Niveau erreicht, von dem das ganze Land profitieren kann."
 ETH_local_development_improved_production_mission:0 "Lokale Baukomitees werden in [?ETH.ETH_local_state.GetName] gebildet"
 ETH_local_development_improved_production_mission_desc:0 "Lokale Komitees in [?ETH.ETH_local_state.GetName] verbessern Arbeitsbedingungen, Werkzeuge und Methoden."
 ETH_local_development_improved_production_mission_tt:0 "Ändern Sie §Y$ETH_state_development_dynamic_modifier$§! durch: \n$MODIFIER_STATE_PRODUCTION_SPEED_BUILDINGS_FACTOR$: §G+10%§!"
 ETH_anti_colonialism_category:0 "Antikolonialismus"
 ETH_anti_colonialism_category_desc:0 "Wir werden alles in unserer Macht Stehende tun, um die Widerstandsbewegungen in der gesamten Region zu unterstützen, bis die Notlage des Imperialismus endgültig beendet ist."
 ETH_anti_colonialism_map_category_name:0 "Kolonialstaaten, in denen Widerstand unterstützt werden kann"
 ETH_support_resistance_decision:0 "Unterstützt Anti-[FROM.OWNER.GetAdjective]-Resistenz in [FROM.GetName]"
 ETH_support_resistance_decision_desc:0 "Unterstützen Sie Widerstandskämpfer beim Sturz der [FROM.Owner.GetAdjective]-Regel."
 ETH_arm_resistance_decision:0 "Aktivieren Sie den Anti-[FROM.OWNER.GetAdjective]-Widerstand in [FROM.GetName]"
 ETH_arm_resistance_decision_desc:0 "Bewaffnen Sie Widerstandskämpfer in diesem Staat."
 ETH_support_independence_decision:0 "Unterstützung [FROM.GetAdjective] Unabhängigkeit"
 ETH_support_independence_decision_desc:0 "Unterstützung [FROM.GetAdjective] Unabhängigkeit"
 ETH_independence_support_progress_flag:0 " Unterstützt derzeit die Unabhängigkeitsbewegung"

 ETH_support_resistance_decision_cost:0 "£Befehlsleistung §Y25§!"
 ETH_support_resistance_decision_cost_blocked:0 "£Befehlsmacht §R25§!"
 ETH_anti_colonialism_decision:0 "Anti-[FROM.GetAdjective] Propaganda"
 ETH_anti_colonialism_decision_desc:0 "Der Imperialismus in Afrika muss ein Ende haben. Die Welt muss aufwachen und erkennen, dass die Tage des Kolonialismus vorbei sind. Die Bevölkerung von Afrika muss Druck auf ihre Führer ausüben, damit sie ihre unterdrückten afrikanischen Kolonien freigeben."
 ETH_demand_peace_decision:0 "Fordern Sie [?FROM.previous_overlord.GetAdjective] die Anerkennung von [FROM.GetNameDef]"
 ETH_demand_peace_decision_desc:0 "Das tapfere Volk von [FROM.GetName] hat sich gegen die Tyrannei von [?FROM.previous_overlord.GetAdjective] erhoben. Wir sollten jetzt handeln und alle notwendigen Mittel einsetzen, um [?FROM.previous_overlord.GetNameDef] zum Rückzug aus dem Gebiet von [FROM.GetAdjective] zu zwingen."
 ETH_demand_peace_decision_tt:0 "§Y[?FROM.previous_overlord.GetNameWithFlag]§! wird unter Druck gesetzt, den Krieg mit §Y[FROM.GetNameWithFlag]§! zu beenden."
 ETH_currently_demanding_peace_flag:0 " Derzeitige Forderung nach Frieden"

 ETH_social_reforms_category:0 "Anarcho-kommunistische Sozialreformen"
 ETH_social_reforms_category_desc:0 "Wir brauchen eine Welle sozialer Reformen, um die kulturellen und religiösen Spaltungen in [ETH.GetName] zu überwinden, damit wir vereint bleiben können."
 ETH_education_reforms_decision:0 "Reformen des Bildungssystems"
 ETH_education_reforms_decision_desc:0 "Um die Entstehung einer zukünftigen reaktionären Bewegung zu verhindern, müssen wir das Bildungssystem reformieren, damit aus den Kindern frei denkende Erwachsene werden und keine Lakaien des Kapitalismus."
 ETH_collectivization_reforms_decision:0 "Landreformen"
 ETH_collectivization_reforms_decision_desc:0 "Das Land von [ETH.GetNameDefCap] ist seit Jahrhunderten im Besitz von Aristokraten, obwohl es vom Volk bearbeitet wird. Wir haben die Möglichkeit, durch die Neuverteilung des Landes jeden zu seinem eigenen Herrn zu machen."
 ETH_secularization_reforms_decision:0 "Säkularisierungsreformen"
 ETH_secularization_reforms_decision_desc:0 "[ETH.GetNameDefCap] weist eine Vielzahl kultureller und religiöser Unterschiede auf, deren Ursprünge Jahrhunderte zurückreichen. Wir müssen den Würgegriff des Aberglaubens durchbrechen, um künftige sektiererische Gewalt zu verhindern."
 ETH_freedom_at_gunpoint_category:0 "Freiheit mit vorgehaltener Waffe"
 ETH_freedom_at_gunpoint_category_desc:0 "Unsere Nachbarn sind weiterhin unter dem Joch der Imperialisten gefangen. Es ist an der Zeit, unsere Kriegserfahrung und unsere neu gewonnene wirtschaftliche Stärke für die Befreiung Afrikas einzusetzen – mit der einzigen Sprache, die die Kolonialmächte verstehen: roher Gewalt."
 ETH_freedom_at_gunpoint_dynamic:0 "Befreie [FROM.GetName] von [FROM.Capital.OWNER.GetName]"
 ETH_freedom_at_gunpoint_dynamic_tt:0 "Erhalte §YKriegsziel befreien§! gegen §Y[FROM.Capital.OWNER.GetName]§!"
 ETH_has_active_liberation_goal:0 "Hat ein aktives Befreiungskriegsziel"
 form_ethiopian_empire_category:0 "Expansion des [ETH.GetAdjective]-Imperiums"
 form_ethiopian_empire_category_desc:0 "[ROOT.GetNameDefCap] ist bereits ein mächtiges Imperium, aber es ist nicht mehr das, was es einmal war, und mit der richtigen Führung kann es stärker werden als je zuvor."
