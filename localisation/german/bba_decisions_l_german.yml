 SWI_building_up_military_readiness_mission:1 "Aufbau militärischer Bereitschaft£GFX_SWI_military_readiness_text_icon "
 SWI_building_up_military_readiness_mission_desc:0 "Wir steuern unsere Nation auf die Verteidigung von [ROOT.GetName] zu. Verteidigungsanleihen werden verkauft, Bürger trainieren zu Hause, Verbände organisieren Schulen und Unternehmen führen Übungen durch. Wir müssen um jeden Preis bereit sein."
