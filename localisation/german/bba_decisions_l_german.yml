 SWI_field_hospital_for_militias_desc:0 "[ROOT.GetNonIdeologyName] hat eine lange Tradition des Mitgefühls und der medizinischen Versorgung. Wir müssen diese nutzen, um unsere Milizen besser auf die Verteidigung unseres Landes vorzubereiten."
 SWI_support_for_militias:0 "Unterstützungskompanien für Milizen"
 SWI_support_for_militias_desc:0 "Mit umfassender Unterstützung können wir unsere Milizen stärken und sie flexibler und widerstandsfähiger machen."
