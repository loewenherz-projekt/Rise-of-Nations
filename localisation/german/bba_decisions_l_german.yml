 SWI_influence_future_cantons:0 "Einfluss auf zukünftige Kantone nehmen"
 SWI_press_for_future_canton:0 "Drücken Sie [FROM.Owner.GetName] für [FROM.GetName]"
 SWI_ongoing_president_initiative:0 "Laufende Initiative des Präsidenten der Konföderation"
 SWI_renounce_guiding_principles:0 "Leitprinzipien aufgeben"
 SWI_renounce_guiding_principles_desc:0 "[SWI_renounce_guiding_princpiples_desc_loc]"
 SWI_renounce_guiding_principles_desc_cantons:0 "Unser ursprüngliches Bekenntnis zur Weiterführung der Machtübertragung an die Kantone und die Bundesversammlung war möglicherweise verfrüht. Die aktuelle Lage macht deutlich, dass wir für unser Überleben einen energischeren und handlungsfähigeren Bundesrat brauchen."
 SWI_renounce_guiding_principles_desc_council:0 "Unser ursprüngliches Bekenntnis, die Macht im Bundesrat zu konsolidieren, war möglicherweise fehlgeleitet. Die aktuelle Situation erfordert eine direktere und integrativere Demokratie, in der Stabilität und Bürgerbeteiligung an der Tagesordnung sind."
 SWI_buy_ships_from_country:0 "[SWI_get_buy_ships_from_country_title]"
 SWI_buy_ships_ENG:0 "Kaufen Sie alte [ENG.GetAdjective] Zerstörer"
