 ETH_offer_peace_SUD:0 "Bieten Sie Frieden für [SUD.GetAdjective] Unabhängigkeit"
 ETH_offer_peace_SUD_tt:0 "Bieten Sie dem Besitzer des Gebiets [SUD.GetAdjective] Frieden an, wenn er bereit ist, seine Ansprüche auf das Gebiet aufzugeben, das derzeit von [ETH.GetName] kontrolliert wird. Das derzeit kontrollierte Gebiet von [SUD.GetAdjective] wird zu einer Marionette von [ETH.GetAdjective]."
 ETH_offer_peace_DJI:0 "Bieten Sie Frieden für [DJI.GetAdjective] Unabhängigkeit"
 ETH_offer_peace_DJI_tt:0 "Bieten Sie dem Besitzer des Gebiets [DJI.GetAdjective] Frieden an, wenn er bereit ist, seine Ansprüche auf das Gebiet aufzugeben, das derzeit von [ETH.GetName] kontrolliert wird. Das derzeit kontrollierte Gebiet von [DJI.GetAdjective] wird zu einer Marionette von [ETH.GetAdjective]."
 ETH_offer_peace_KEN:0 "Bieten Sie Frieden für [KEN.GetAdjective] Unabhängigkeit"
 ETH_offer_peace_KEN_tt:0 "Bieten Sie dem Besitzer des Gebiets [KEN.GetAdjective] Frieden an, wenn er bereit ist, seine Ansprüche auf das Gebiet aufzugeben, das derzeit von [ETH.GetName] kontrolliert wird. Das derzeit von [KEN.GetAdjective] kontrollierte Gebiet wird zu einer Marionette von [ETH.GetAdjective]."
 ETH_offer_peace_ERI:0 "Bieten Sie Frieden für [ERI.GetAdjective] Unabhängigkeit an"
