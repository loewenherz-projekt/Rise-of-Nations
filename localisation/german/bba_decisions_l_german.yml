############################

 ITA_withdraw_from_ethiopia:0 "Rückzug aus Äthiopien"
 ITA_withdraw_from_ethiopia_desc:0 "Der Krieg gegen Äthiopien war ein Fehler. Es ist an der Zeit, diese umstrittene Angelegenheit zu klären."
 ITA_transfer_lost_states_tt:1 "§Y[550.GetName]§!, §Y[559.GetName]§! und §Y[844.GetName]§! werden an §Y[ETH.GetName]§! übertragen, wenn sie vollständig von diesem kontrolliert werden. §Y[908.GetName]§! wird ebenfalls übertragen, wenn es im Besitz von [ROOT.GetNameDef] ist."

 ITA_missiolinis:1 "Missionen des Duce"
 ITA_missiolinis_desc:1 "Der Duce hat große Pläne, die stolze italienische Nation an ihren rechtmäßigen Platz zu führen. Um seine Vision eines größeren Italiens zu verwirklichen, erlässt er die entsprechenden Befehle, von denen er überzeugt ist, dass sie zeitnah ausgeführt werden. \n\n£ITA_missiolini_text_icon Aktive Missionen: §Y[?ITA_missiolinis_active_missions]§! \n£ITA_missiolini_text_icon Erfolgreiche Missionen: §Y[?ITA_missiolinis_successful_missions]§! \n£ITA_missiolini_silver_text_icon Fehlgeschlagene Missionen: §R[?ITA_missiolinis_failed_missions]§!"
 ITA_missiolini_conquer_ethiopia:0 "Erobern Sie Äthiopien"
 ITA_missiolini_conquer_ethiopia_desc:1 "Um einen italienischen Sieg zu sichern, müssen alle noch verbliebenen abessinischen Festungen zerstört werden."
 ITA_missiolini_pacify_ethiopia:0 "Befriedung Äthiopiens"
 ITA_missiolini_pacify_ethiopia_desc:1 "Der Duce hat den Befehl gegeben, den Widerstand Abessiniens mit brutaler Gewalt niederzuschlagen und Gesetze zur Eindämmung der Bevölkerung zu erlassen. Er will das ganze Land so schnell wie möglich befrieden und in die italienische Gemeinschaft integrieren."
 ITA_missiolini_pacify_ethiopia_vanilla:0 "$ITA_missiolini_pacify_ethiopia$"
 ITA_missiolini_pacify_ethiopia_vanilla_desc:0 "$ITA_missiolini_pacify_ethiopia_desc$"
 ITA_pacify_ethiopia_goal_tt:1 "Alle ursprünglichen äthiopischen Staaten weisen eine höhere Compliance auf als §Y60%§!"
 ITA_missiolini_strengthen_heavy_industry:0 "Industrialisierungsprogramm"
 ITA_missiolini_strengthen_heavy_industry_desc:1 "Damit Italien wirklich florieren kann, müssen wir neue Fabriken bauen, um das Wachstum unseres geschäftigen Imperiums aufrechtzuerhalten und unsere Produktionskapazitäten zu erweitern."
 ITA_missiolini_strengthen_heavy_industry_trigger_tt:0 "$TRIGGER_NUM_OF_CIVILIAN_FACTORIES_MORE_THAN$§Y[?ITA_missiolinis_required_civs]§!. (Derzeit §[GetColorNumOfCivsMissiolinis][?ROOT.num_of_civilian_factories]§!.)"
 ITA_missiolini_strengthen_the_army:0 "Stärkung der Armee"
 ITA_missiolini_strengthen_the_army_desc:1 "Wie das Römische Reich der Antike erstreckt sich auch unser aufstrebendes Reich weit und breit und braucht eine starke Armee, um es vor den Barbarenhorden gleich hinter den Grenzen zu schützen."
 ITA_missiolini_stockpile_trucks:0 "Haldenwagen"
 ITA_missiolini_stockpile_trucks_desc:1 "Wir brauchen eine mobilere Streitmacht, die sich schnell über große Geländestrecken bewegen kann, ohne durch schleppende Logistik eingeschränkt zu werden."
 ITA_missiolini_stockpile_fuel:0 "Kraftstoffreserven erhöhen"
 ITA_missiolini_stockpile_fuel_desc:1 "Eine moderne Armee marschiert nicht nur mit ihrem Magen, sondern auch mit ihrem Treibstoff. Fehlt dieser, kommt die gesamte Kriegsmaschinerie zum Stillstand. Alle Zweige des Militärs sind auf ihn angewiesen, und wir müssen in der Lage sein, große Mengen an Gas bereitzustellen, um auf den Schlachtfeldern erfolgreich zu sein."
 ITA_missiolini_strengthen_the_airforce:0 "Stärkung der Luftwaffe"
 ITA_missiolini_strengthen_the_airforce_desc:1 "Die Aeronautica ist zu einem Symbol des Nationalstolzes geworden und war einst eine der größten Luftwaffen der Welt. Wir müssen zusätzliche Flugzeuge produzieren, um unsere Luftwaffe zu verstärken und sie wieder groß zu machen."
 ITA_missiolini_strengthen_the_airforce_fighters_goal_tt:1 "Hat §Y[?ROOT.ITA_missiolinis_fighters_to_produce]§! neue §Y$fighter_equipment$§! Flugzeuge produziert oder erworben. \nDerzeit im Einsatz befindliche Jäger: §G[?ROOT.num_deployed_planes_with_type@small_plane_airframe]§! - Derzeit auf Lager befindliche Jäger §G[?ROOT.num_equipment@small_plane_airframe]§! - Gesamtziel an Jägern §Y[?ITA_missiolinis_fighters_goal]§! \n\n"
 ITA_missiolini_strengthen_the_airforce_bombers_goal_tt:1 "Hat §Y[?ROOT.ITA_missiolinis_bombers_to_produce]§! neue §Y$CAS_equipment$§!, §Y$nav_bomber_equipment$§! oder §Y$tac_bomber_equipment$§! Flugzeuge (nur ein Typ) produziert oder erworben. \nAktuell eingesetzte CAS: §G[?ROOT.num_deployed_planes_with_type@small_plane_cas_airframe]§! - Aktuell auf Lager befindliche CAS §G[?ROOT.num_equipment@small_plane_cas_airframe]§! - Gesamtziel für CAS §Y[?ITA_missiolinis_cas_goal]§! \nAktuell eingesetzte Marinebomber: §G[?ROOT.num_deployed_planes_with_type@small_plane_naval_bomber_airframe]§! - Derzeitige Marinebomber im Bestand §G[?ROOT.num_equipment@small_plane_naval_bomber_airframe]§! - Gesamtziel für Marinebomber §Y[?ITA_missiolinis_naval_bombers_goal]§! \nDerzeit eingesetzte taktische Bomber: §G[?ROOT.num_deployed_planes_with_type@medium_plane_airframe]§! - Derzeitige taktische Bomber im Bestand §G[?ROOT.num_equipment@medium_plane_airframe]§! - Gesamtziel für taktische Bomber §Y[?ITA_missiolinis_tactical_bombers_goal]§!"
 ITA_missiolini_industrial_research:0 "Industrielle Forschung"
 ITA_missiolini_industrial_research_desc:1 "Wir müssen der Welt zeigen, mit welcher Geschwindigkeit der Faschismus und das italienische Volk große technologische Sprünge vollbringen können."
 ITA_missiolini_expand_intelligence_agency:0 "Nachrichtendienst erweitern"
 ITA_missiolini_expand_intelligence_agency_desc:1 "Durch den Ausbau unseres Geheimdienstes werden wir jeden Aspekt der italienischen Gesellschaft infiltrieren, um Kommunisten, Kriminelle und andere schädliche Elemente ans Licht zu bringen und sie vor Gericht zu bringen, wodurch Italien sicherer wird."
 ITA_missiolini_occupy_albania:0 "Albanien besetzen"
 ITA_missiolini_occupy_albania_desc:1 "Die engen Verbindungen zwischen Italien und Albanien reichen Jahrtausende zurück, bis in die Zeit des Römischen Reiches. Wir müssen Albanien in Italien eingliedern, um den Zugang zur Adria zu sichern."
 ITA_missiolini_firmly_established_italian_administration_autonomy_text:0 "Fest etablierte [ROOT.GetAdjective] Verwaltung"
 ITA_missiolini_occupy_albania_occupation_effects:0 "Wenn [ROOT.GetFlag][ROOT.GetNameDef] [ALB.GetFlag][ALB.GetAdjective]-Kerne steuert: \n"
 ITA_missiolini_occupy_albania_subject_effects:0 "Wenn [ALB.GetFlag][ALB.GetNameDef] ein Subjekt von §Y[ROOT.GetFlag][ROOT.GetNameDef]§! ist: \n"
 ITA_missiolini_occupy_dalmatia:0 "Besetzen [103.GetName]"
 ITA_missiolini_occupy_dalmatia_desc:1 "Wir müssen ein schweres Unrecht aus dem Ersten Weltkrieg wiedergutmachen und uns mit Gewalt nehmen, was uns rechtmäßig gehört. Dalmatien muss italienisch werden!"
 ITA_missiolini_occupy_dalmatia_occupation_effects:0 "\nWenn [ROOT.GetFlag][ROOT.GetNameDef] §Y[103.GetName]§! kontrolliert: \nJeder [YUG.GetFlag][YUG.GetAdjective]-Kernzustand wird vollständig von [ROOT.GetFlag][ROOT.GetNameDef] kontrolliert: \n Compliance: §G+5,0 %§!. \n Widerstand: §G-5,0 %§!"
 ITA_missiolini_occupy_dalmatia_subject_effects:0 "\n Wenn §Y[103.GetName]§! vollständig von einem [ROOT.GetAdjective]-Subjekt mit [YUG.GetAdjective]-Ursprung kontrolliert wird: \n Alle [ROOT.GetAdjective]-Subjekte mit [YUG.GetAdjective]-Ursprung: \n"
 ITA_missiolini_occupy_greece:0 "Besetzen [GRE.GetName]"
 ITA_missiolini_occupy_greece_desc:1 "Wie die römischen Legionen in der Antike können auch wir die uns durch die Eroberung Griechenlands auferlegten Beschränkungen überwinden und unsere brüderlichen Völker vereinen."
 ITA_missiolini_occupy_greece_occupation_effects:0 "\nJeder [GRE.GetFlag][GRE.GetAdjective]-Kernzustand wird vollständig von [ROOT.GetFlag][ROOT.GetNameDef] kontrolliert: \n Compliance: §G+5,0 %§!. \n Widerstand: §G-5,0 %§! \n\nAktuelle Auswirkungen:"
 ITA_missiolini_occupy_greece_subject_effects:0 "\nWenn [GRE.GetFlag][GRE.GetName] ein Subjekt von §Y[ROOT.GetFlag][ROOT.GetNameDef]§! ist: \n"
 ITA_missiolini_occupy_ticino:0 "Besetzen [846.GetName]"
 ITA_missiolini_occupy_ticino_desc:1 "„Seit Hannibal mit seinen Elefanten die Alpen überquerte, sind die Berge für Barbaren eine Route direkt ins Herz Italiens. Wir müssen unsere Nordgrenze sichern."
 ITA_missiolini_occupy_ticino_occupation_effects:0 "\n[846.GetName] und jeder [SWI.GetFlag][SWI.GetAdjective] Kernzustand vollständig kontrolliert durch [ROOT.GetFlag][ROOT.GetNameDef]: \n Compliance: §G+5.0%§!. \n Widerstand: §G-5.0%§! \n\nAktuelle Auswirkungen:"
 ITA_missiolini_occupy_ticino_subject_effects:0 "\nWenn [SWI.GetFlag][SWI.GetName] ein Subjekt von §Y[ROOT.GetFlag][ROOT.GetNameDef]§! ist: \n"
 ITA_missiolini_bolster_political_cabinet:0 "Stärkung des politischen Kabinetts"
 ITA_missiolini_bolster_political_cabinet_desc:1 "Es ist immer schwierig, die richtigen Leute für die richtigen Positionen zu finden. Bei unserer Suche nach den intelligentesten und klügsten Köpfen dürfen wir nichts unversucht lassen."
 ITA_missiolini_bolster_political_cabinet_trigger_tt:0 "Hat §Y3§! $political_advisor$s aktiv, mindestens einer davon ist ein §YHierarch§!"
 ITA_missiolini_bolster_military_high_command:0 "Stärkung des militärischen Oberkommandos"
 ITA_missiolini_bolster_military_high_command_desc:1 "Die Suche nach geeigneten Kandidaten und deren Beförderung in das militärische Oberkommando wird unsere strategischen und taktischen Argumente in künftigen Konflikten stärken."
 ITA_missiolini_bolster_military_high_command_trigger_tt:0 "Hat §Y3§! $high_command$ Berater aktiv"
 ITA_victory_in_ethiopia_flag:0 "Italienischer Sieg im Italienisch-Äthiopischen Krieg."

 ITA_balance_of_power_category:0 "$ITA_power_balance$"
 ITA_bop_take_over_ministry_of_foreign_affairs:0 "Übernahme des Außenministeriums"
 ITA_bop_take_over_ministry_of_foreign_affairs_desc:1 "Indem er sich selbst zum Außenminister ernennt, kann Benito Mussolini die direkte Kontrolle über die Außenpolitik und die Beziehungen Italiens ausüben."
 ITA_bop_resign_ministry_of_foreign_affairs_position:0 "Rücktritt vom Amt des Außenministeriums"
 ITA_bop_resign_ministry_of_foreign_affairs_position_desc:1 "Mit seinem Rücktritt vom Amt des Außenministers würde dieser Posten für andere zugänglich gemacht, wodurch Benito Mussolini weniger Kontrolle über die Außenpolitik und die Beziehungen Italiens hätte."
 ITA_bop_take_over_ministry_of_justice:0 "Übernahme des Justizministeriums"
 ITA_bop_take_over_ministry_of_justice_desc:1 "Indem er sich selbst zum Minister für Gnade und Justiz ernannt, kann Benito Mussolini die direkte Kontrolle über das italienische Justizsystem und die Institutionen ausüben."
 ITA_bop_resign_ministry_of_justice_position:0 "Rücktritt vom Amt im Justizministerium"
 ITA_bop_resign_ministry_of_justice_position_desc:1 "Mit seinem Rücktritt vom Amt des Gnaden- und Justizministers würde dieser Posten für andere zugänglich gemacht, wodurch Benito Mussolini weniger Kontrolle über das italienische Justizsystem und die Justizinstitutionen hätte."
 ITA_bop_take_over_ministry_of_education:0 "Übernahme des Bildungsministeriums"
 ITA_bop_take_over_ministry_of_education_desc:1 "Indem er sich selbst zum Minister für öffentliche Bildung ernennt, kann Benito Mussolini die direkte Kontrolle über das italienische Bildungssystem und die italienischen Bildungseinrichtungen ausüben."
 ITA_bop_resign_ministry_of_education_position:0 "Rücktritt vom Posten im Bildungsministerium"
 ITA_bop_resign_ministry_of_education_position_desc:1 "Mit seinem Rücktritt vom Amt des Bildungsministers würde dieser Posten für andere zugänglich gemacht, wodurch Benito Mussolini weniger Kontrolle über das italienische Bildungssystem und die italienischen Institutionen hätte."
 ITA_bop_take_over_ministry_of_corporations:0 "Übernahme des Ministeriums für Unternehmen"
 ITA_bop_take_over_ministry_of_corporations_desc:1 "Indem er sich selbst zum Minister für Unternehmen ernennt, kann Benito Mussolini die direkte Kontrolle über das italienische Finanzsystem und die italienischen Institutionen ausüben."
 ITA_bop_resign_ministry_of_corporations_position:0 "Rücktritt vom Amt im Ministerium für Unternehmen"
 ITA_bop_resign_ministry_of_corporations_position_desc:1 "Mit seinem Rücktritt vom Amt des Unternehmensministers würde dieser Posten für andere zugänglich gemacht, wodurch Benito Mussolini weniger Kontrolle über das italienische Finanzsystem und die italienischen Institutionen hätte."
 ITA_mussolini_took_over_minister_of_foreign_affairs_flag:0 "§Y365 Tage§! sind vergangen, seit §Y[ROOT.ITA_benito_mussolini.GetName]§! das Außenministerium übernommen hat \n(Derzeit sind §Y[?ITA_mussolini_took_over_minister_of_foreign_affairs_flag:days|Y0]§! Tage vergangen)"
 ITA_mussolini_resigned_minister_of_foreign_affairs_position_flag:0 "§Y365 Tage§! sind vergangen, seit §Y[ROOT.ITA_benito_mussolini.GetName]§! von seinem Amt im Außenministerium zurückgetreten ist \n(Derzeit sind §Y[?ITA_mussolini_resigned_minister_of_foreign_affairs_position_flag:days|Y0]§! Tage vergangen)"
 ITA_mussolini_took_over_minister_of_justice_flag:0 "§Y365 Tage§! sind vergangen, seit §Y[ROOT.ITA_benito_mussolini.GetName]§! das Justizministerium übernommen hat \n(Derzeit sind §Y[?ITA_mussolini_took_over_minister_of_justice_flag:days|Y0]§! Tage vergangen)"
 ITA_mussolini_resigned_minister_of_justice_position_flag:0 "§Y365 Tage§! sind vergangen, seit §Y[ROOT.ITA_benito_mussolini.GetName]§! sein Amt als Justizminister niedergelegt hat \n(Derzeit sind §Y[?ITA_mussolini_resigned_minister_of_justice_position_flag:days|Y0]§! Tage vergangen)"
 ITA_mussolini_took_over_minister_of_education_flag:0 "§Y365 Tage§! sind vergangen, seit §Y[ROOT.ITA_benito_mussolini.GetName]§! das Bildungsministerium übernommen hat \n(Derzeit sind §Y[?ITA_mussolini_took_over_minister_of_education_flag:days|Y0]§! Tage vergangen)"
 ITA_mussolini_resigned_minister_of_education_position_flag:0 "§Y365 Tage§! sind vergangen, seit §Y[ROOT.ITA_benito_mussolini.GetName]§! von seinem Posten im Bildungsministerium zurückgetreten ist \n(Derzeit sind §Y[?ITA_mussolini_resigned_minister_of_education_position_flag:days|Y0]§! Tage vergangen)"
 ITA_mussolini_took_over_minister_of_corporations_flag:0 "§Y365 Tage§! sind vergangen, seit §Y[ROOT.ITA_benito_mussolini.GetName]§! das Ministerium für Unternehmen übernommen hat \n(Derzeit sind §Y[?ITA_mussolini_took_over_minister_of_corporations_flag:days|Y0]§! Tage vergangen)"
