russianempire.1.title:0 "Russland fordert Schuldenrückzahlung"
russianempire.1.desc:0 "Russland hat von uns die Rückzahlung seiner Schulden verlangt. Sollten wir dieser Forderung nicht nachkommen, ist unklar, was sie tun werden. Sollten wir jedoch nachkommen, wird sich unser Verhältnis zu Russland nicht verschlechtern. Was sollen wir tun?"
russianempire.1.a:0 "Rückzahlung russischer Schulden"
russianempire.1.b:0 "Lehnen Sie ihre Forderungen ab"
russianempire.2.title:0 "Die Osmanen lehnen unsere Forderungen ab"
russianempire.2.desc:0 "Das Osmanische Reich hat unsere Forderungen nach Schuldentilgung abgelehnt. Sollten wir Vergeltungsmaßnahmen ergreifen, könnte dies zum Krieg führen. Ohne eine modernisierte Armee könnten wir den Krieg verlieren. Wir können entweder einen diplomatischen Protest einreichen, ohne etwas zu unternehmen, den Konflikt eskalieren lassen und die osmanische Meerenge fordern, unsere Kontrolle über das Schwarze Meer zu übernehmen, oder warten, bis wir unsere Armee vollständig modernisiert haben, und uns dann auf den Krieg vorbereiten."
russianempire.2.a:0 "Einen diplomatischen Protest einreichen"
russianempire.2.b:0 "Den Konflikt eskalieren lassen"
russianempire.2.c:0 "warten, bis wir unsere Armee modernisieren"
russianempire.3.title:0 "ea"
russianempire.3.desc:0 "ea"
russianempire.4.title:0 "Russisches Reich fordert Zugeständnisse"
russianempire.4.desc:0 "Wir haben keine andere Wahl, als den Russen unsere Ausrüstung zu überlassen, da wir uns auf die Gefahr einer weiteren Aufwertung vorbereiten und keinen Krieg mit Russland riskieren können."
russianempire.4.a:0 "Wir werden eines Tages unsere Revivale haben!"
russianempire.5.title:0 "Der japanisch-russische Krieg beginnt."
russianempire.5.desc:0 "Es scheint, als würden Russland und Japan um Einfluss in Korea kämpfen, da dies unsere Zukunft beeinflussen kann. Wir möchten vielleicht eine Seite wählen, in die wir eingreifen."
russianempire.5.a:0 "Auf der Seite Japans"
russianempire.5.b:0 "Seite an Seite mit Russland"
russianempire.5.c:0 "Unterstützen Sie die Unabhängigkeit Koreas"
russianempire.5.d:0 "Bleiben Sie neutral"
russianempire.6.title:0 "China erklärt Russland den Krieg"
russianempire.6.desc:0 "Überraschenderweise hat der chinesische Kaiser heute Pläne angekündigt, den japanischen Staat im Kampf gegen den russischen Imperialismus zu unterstützen. Es scheint, als könnte der russisch-japanische Krieg zu etwas viel Größerem führen, auch wenn es keinen klaren Sieger geben wird."
russianempire.7.title:0 "China erklärt Japan den Krieg"
russianempire.7.desc:0 "Um den japanischen Einfluss zu bekämpfen, hat China Japan den Krieg erklärt. Es scheint, als hätte der erste chinesisch-japanische Krieg begonnen. Angesichts dessen und der russischen Unterstützung für die Koreaner ist jedoch unklar, wie lange die japanische Regierung bestehen wird."
russianempire.8.title:0 "China verspricht Schutz für Korea, der Krieg beginnt"
russianempire.8.desc:0 "Angesichts der Bedrohung durch westliche und östliche Nationen, die ihren Einfluss in China ausweiten, hat China beschlossen, zum Schutz Koreas einzugreifen. Es scheint, als würde für China ein langer Zweifrontenkrieg beginnen. Es ist unklar, ob China sich angemessen verteidigen oder überhaupt in feindliches Gebiet vordringen kann."
russianempire.9.title:0 "Korea rebelliert gegen uns!"
russianempire.9.desc:0 "Korea hat sich gegen uns aufgelehnt, um seine Freiheit zu sichern. Wir müssen schnell handeln, denn wenn dieser Krieg in eine Pattsituation mündet, wird dieser Krieg umsonst sein."
russianempire.9.a:0 "Wir müssen gewinnen!"
russianempire.10.title:0 "Kapitulation in Tokio"
russianempire.10.desc:0 "Japan hat seine Truppen kapituliert und wir haben die Zufriedenheit gesichert"
russianempire.10.a:0 "Sieg!"
russianempire.11.title:0 "Russische Kapitulation"
russianempire.11.desc:0 "Russland hat seine Streitkräfte übergeben und wir haben uns in der Welt einen Namen gemacht"
russianempire.11.a:0 "Endlich Sieg!"
