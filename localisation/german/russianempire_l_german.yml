dnc_russian_empire.1.t:0 "Finnischer Nationalismus"
dnc_russian_empire.1.d:0 "Neue Berichte unseres Geheimdienstes zeigen, dass [FROM.GetName] nach der Eroberung einiger finnischer Kerngebiete Rebellen und Agitatoren in der finnischen Region finanziert. Diese Aktionen sind für die verräterische [FROM.GetAdjective]-Regierung kein Grund zur Überraschung, da sich unsere großartige Nation mit ihnen im Kriegszustand befindet. Wir stehen vor zwei Möglichkeiten: Wir können entweder versuchen, den finnischen Widerstandsführer unter Druck zu setzen oder ihm begrenzte Autonomie zu gewähren. Sie unter Druck zu setzen ist extrem riskant, denn wenn es schiefgeht, riskieren wir, unseren über lange Zeit aufgebauten Ruf als Terrorist in ganz Finnland zu verlieren. Andererseits könnte es auch nach hinten losgehen für [FROM.GetName]. Ihnen begrenzte Autonomie zu gewähren, birgt kein Risiko, aber aufgrund unserer jüngsten Verluste im Krieg wird unsere Regierung damit nicht gut fahren."
dnc_russian_empire.1.a:0 "Gewähren Sie ihnen eine begrenzte Autonomie."
dnc_russian_empire.1.b:0 "Setzen Sie ihnen Gewalt ein."
