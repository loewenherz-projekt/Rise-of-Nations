russian_int_cw_sov_desc:0 "Der Bürgerkrieg hat begonnen, wir sind in Fraktionen gespalten und es tobt ein Machtkampf, unsere glorreichen Führer kämpfen um die Kontrolle unserer Fraktion, hier ist die aktuelle Aufschlüsselung der Situation:\n\n - Lenins Einfluss §Y[?lenin_strengh]§!\n - Stalins Einfluss §Y[?stalin_strengh]§!\n - Trotzkis Einfluss §Y[trotsky_strengh]§!"

russian_int_cw_RUS_desc:0 "Der Bürgerkrieg hat begonnen, wir sind in Fraktionen gespalten und es tobt ein Machtkampf, unsere Anführer kämpfen um die Kontrolle unserer Fraktion, hier ist die aktuelle Situation:\n\n - Krasnovs Einfluss §Y[?krasnov_strengh]§!\n - Denikins Einfluss §Y[?denekin_strengh]§!\n - Koltschaks Einfluss §Y[?kolchak_strengh]§!"
