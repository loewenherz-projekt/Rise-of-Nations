 bs_fra.1.t:0 "Die Regierung von Léon Blum stürzte"
 bs_fra.1.d:0 "Léon Blum gelang es nicht, ein stabiles Ministerium aufzubauen. Seine sozialistische Regierung stürzte und er wurde seines Amtes enthoben."
 bs_fra.1.a:0 "Édouard Daladier wird versuchen, eine Regierung zu bilden."
 
 bs_gre.1.t:0 "Der Tod von Konstantinos Demertzis"
 bs_gre.1.d:0 "Heute wurde Premierminister Konstantinos Demertzis tot aufgefunden. Todesursache war ein Herzinfarkt."
