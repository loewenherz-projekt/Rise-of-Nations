 GER_form_the_reichsprotektorat_desc:0 "Um die Nutzung lokaler Ressourcen, der Industrie und der Arbeitskräfte zu verbessern, sollten wir die Einrichtung einer quasi-autonomen Untertanenregierung in unseren eroberten Gebieten in Erwägung ziehen."
