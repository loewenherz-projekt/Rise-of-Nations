 #Burgenland Question
 HUN_burgenland_question:0 "Anfrage Burgenland aus Deutschland"
 HUN_burgenland_question_desc:0 "Das Burgenland ist unser rechtmäßiges Territorium. Wir mussten es 1921 durch eine fragwürdige Parlamentswahl verlieren. Doch jetzt, da Deutschland dieses Gebiet kontrolliert, könnte man es vielleicht dazu überreden, es uns zu überlassen ..."
 
