 #New Slovenia event
 germany.940.t:0 "Die Kapitulation Londons"
 germany.940.d:0 "London hat sich unserem Anspruch auf Slowenien geschlagen gegeben. Jetzt haben wir zwei Möglichkeiten: Slowenien mit unseren Freunden aufzuteilen oder ganz zu beanspruchen."
 germany.940.a:0 "Teilen Sie Slowenien mit Italien und Ungarn."
 germany.940.b:0 "Nimm alles!"
 
