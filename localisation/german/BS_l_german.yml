 #Burgenland Question
 bs.1.t:0 "Ungarn fordert Burgenland auf"
 bs.1.d:0 "Das Burgenland gehörte bis 1921 zu Ungarn. Danach wurde das Gebiet nach Parlamentswahlen an Österreich abgetreten. Obwohl die Bevölkerung mehrheitlich deutschsprachig ist, möchte Ungarn das Gebiet zurückhaben."
 bs.1.a:0 "Ungarn sind dort nur eine Minderheit."
 bs.1.b:0 "Lass es sie haben."
 
 bs.100.t:0 "Deutschland hat unsere Anfrage angenommen"
 bs.100.d:0 "Die deutsche Regierung hat unserer Bitte entsprochen. Ungarn, kommt zurück nach Hause!"
 bs.100.a:0 "Die Deutschen sind unsere besten Freunde!"
 
 bs.101.t:0 "Deutschland lehnte unsere Anfrage ab"
 bs.101.d:0 "Die deutsche Regierung hat unsere Anfrage abgelehnt. Sie betrachtet sie wahrscheinlich als leichtsinnige Anfrage."
 bs.101.a:0 "Es war eine absurde Forderung, und wir werden sie zurückziehen."
 bs.101.b:0 "Wir werden keinen Schritt zurück machen."
 
 #Separate Burma
 bs_burma_separate_tt:0 "§YBurma§! wird von §Y[RAJ.GetName]§! getrennt sein."
 
 #Pope Died
 bs.3.t:0 "Der Tod von Papst Pius XI." #Copied from Wikipedia https://en.wikipedia.org/wiki/Pope_Pius_XI#Death_and_burial
 bs.3.d:0 "Papst Pius XI. war schon länger krank, als er am 25. November 1938 innerhalb weniger Stunden zwei Herzinfarkte erlitt. Er litt unter schweren Atemproblemen und konnte seine Wohnung nicht verlassen. Fachärzte berichteten, dass Herzinsuffizienz und Bronchialanfälle seine ohnehin schon schlechten Aussichten hoffnungslos verschlechtert hatten. \nPapst Pius XI. starb am 10. Februar 1939 um 5:31 Uhr (römischer Zeit) im Alter von 81 Jahren an einem dritten Herzinfarkt. Seine letzten Worte an seine Nächsten waren klar und bestimmt: „Meine Seele scheidet in Frieden von euch allen.“"
 bs.3.a:0 "Oh je..."
 bs.3.b:0 "Hoffentlich wird Pius XII. ebenso lange regieren."
 
 #Italy wants left axis
 bs.400.t:0 "Ersetzen Sie den Premierminister"
 bs.400.d:0 "Unser König, Viktor Emanuel III., glaubt, dass wir diesen Krieg verlieren und teuer dafür bezahlen werden. Aus dieser Überzeugung heraus möchte unser König den Premierminister durch einen Nichtfaschisten ersetzen."
 bs.400.a:0 "Ersetzen Sie ihn sofort."
 bs.400.b:0 "Das ist zu riskant."
 
 bs.401.t:0 "Die Verhaftung Mussolinis"
 bs.401.d:0 "Der italienische König Viktor Emanuel III. hat die sofortige Verhaftung von Ministerpräsident Benito Mussolini angeordnet, um die Faschisten zu stürzen. Obwohl Viktor Emanuel III. Mussolini selbst zum Ministerpräsidenten ernannt hatte, musste er mit ansehen, wie sein Land den Krieg verlor, und will keine weiteren Niederlagen. Nach seinem Befehl hat die neue italienische Regierung die Alliierten um einen Waffenstillstand gebeten, doch sie werden für ihre Taten bezahlen müssen."
 bs.401.a:0 "Hat Italien Deutschland erneut verraten?"
 bs.401.ITA:0 "Jetzt brauchen wir einen Waffenstillstand mit den Alliierten."
 bs.401.ITA_tt:0 "„Wir werden die Kolonien verlieren!“"
 bs.401.GER:0 "Vernichtet den Verräter!"
 
 bs.402.t:0 "Italien bietet Waffenstillstand an"
 bs.402.d:0 "Nach Mussolinis Verhaftung hat die neue italienische Regierung einen Waffenstillstand mit den Alliierten gefordert. Trotz ihrer früheren Verbindungen zu den Achsenmächten haben sie eine antifaschistische Regierung eingesetzt und kämpfen nun gegen Deutschland. Sollten wir ihr Angebot annehmen, müssen sie ihre Kolonien aufgeben."
 bs.402.a:0 "Wir brauchen sie jetzt mehr als später."
 bs.402.b:0 "Wie dem auch sei, es wird sich nie ändern, dass sie Kriegsverbrecher sind."
 
 bs.403.t:0 "Großbritannien hat unser Angebot angenommen"
 bs.403.d:0 "Die britische Regierung hat unser Angebot angenommen. Obwohl wir unsere wenigen Kolonien verlieren werden, ist der Preis im Vergleich zu dem, was wir gewinnen, angemessen."
 bs.403.a:0 "Jetzt können wir uns auf den Kampf gegen Deutschland konzentrieren."
 
 bs.404.t:0 "Großbritannien lehnte unser Angebot ab"
 bs.404.d:0 "Die britische Regierung hat unser Angebot abgelehnt. Ihre Wut auf uns ist einfach zu groß."
 bs.404.a:0 "Wir haben keine Wahl."

 #Operation achse
 bs.4.t:0 "Deutschland errichtete Marionettenregierung im Norden"
 bs.4.d:0 "Deutschland hat die Kontrolle über die nördliche Hälfte Italiens übernommen, Mussolini freigelassen und ihn in das von Deutschland besetzte Gebiet gebracht, um dort ein Satellitenregime zu errichten."
 bs.4.a:0 "Zerstört die Faschisten!"
 
 #Occupy Schutzzone
 bs.5.t:0 "Deutsch-Slowakischer Vertrag"
 bs.5.d:0 "Im Rahmen des Schutzabkommens zwischen Deutschland und der Slowakei können wir nun einen Teil der Westslowakei besetzen. Obwohl das Gebiet klein erscheint, befinden sich dort mehrere Waffenfabriken und wichtige ehemalige tschechoslowakische Waffenlager. Was sollen wir tun?"
 bs.5.a:0 "Militärische Besetzung."
 bs.5.b:0 "Bleibt die Slowakei."
 
 #Capital of Austria-Hungary
 bs.11.t:0 "Kapitalfrage"
 bs.11.d:0 "Nach der Wiederherstellung Österreich-Ungarns diskutierten einige Regierungsvertreter über einen Hauptstadtwechsel. Obwohl die Ungarn die beiden Länder wiedervereinen sollten, war Wien die Hauptstadt unseres alten Reiches. Was sollten wir tun?"
 bs.11.a:0 "Wien ist die legitime Hauptstadt."
 bs.11.b:0 "Die Ungarn werden dieses Reich von Ungarn selbst aus führen."

 #Suicide of Hitler
 bs.12.d:0 "Bei der Einnahme Berlins entdeckten unsere Truppen Hitlers Leiche in einem Bunker der Stadt. Der Führer entschied sich offenbar für den Tod, anstatt die Alliierten das Land übernehmen zu sehen, und nahm sich das Leben, um nicht gefangen genommen zu werden.\n\nGemäß Hitlers Willen übernahm Karl Dönitz nun die Führung der Nazis."
 bs.12.a:0 "Die Nazis sind gefallen."

 #Cairo Conference (Actually, most of them came from Yalta Conference)
 bs.13.t:0 "Die Kairoer Konferenz"
 bs.13.d:2 "Da der Krieg in Ostasien zügig voranschreitet, ist es für die unvermeidlichen Sieger an der Zeit, über die Zukunft Ostasiens nachzudenken.\n\nWir könnten [cairo_partner.GetNameDef] eine Konferenz über die Teilung Koreas nach dem Krieg vorschlagen, um unsere Einflusssphären auf dem Kontinent abzugrenzen.\n\nUnsere „Freunde“ in [cairo_partner.GetNameDef] haben signalisiert, dass sie an einer solchen Konferenz interessiert wären. Zweifellos werden sie eine Belohnung für ihre Opfer erwarten."
 bs.13.a:0 "Wir brauchen eine Konferenz zur Zukunft Ostasiens."
 bs.13.b:0 "Wir können nicht mit [cairo_partner.GetNameDef] zusammenarbeiten."
 bs.14.t:0 "Die Kairoer Konferenz"
 bs.14.d:0 "Da der Krieg gegen [JAP.GetNameDef] seinem unvermeidlichen Ende entgegengeht, hat [cairo_origin.GetNameDef] uns wegen einer Konferenz über die Zukunft Ostasiens kontaktiert.\n\nSie schlagen eine Teilung Koreas in Nord und Süd vor. Dies würde unseren Einflussbereich weit nach Ostasien ausdehnen und einige der Verluste wettmachen, die wir in diesem grausamen Kampf erlitten haben."
 bs.14.a:0 "Für eine dauerhafte Zusammenarbeit."
 bs.14.b:0 "Wir werden unseren eigenen Frieden diktieren."
 bs.15.t:0 "[cairo_partner.GetNameDefCap] weigert sich, teilzunehmen"
 bs.15.d:0 "Unsere geplante Konferenz zur Zukunft Ostasiens ist geplatzt.\n\n[cairo_partner.GetLeader] hat in aller Deutlichkeit jegliche Notwendigkeit von Planung und Zusammenarbeit im Nachkriegsostasien zurückgewiesen.\n\nWir treffen uns, wenn ich meine Forderungen an [JAP.GetNameDef] am Verhandlungstisch vorbringe. Ich werde nicht zulassen, dass [cairo_partner.GetNameDef] durch kleinliche Politik in die Quere kommt."
 bs.15.a:0 "Das ist besorgniserregend."
 bs.17.t:0 "Die Teilung Koreas"
 bs.17.d:0 "Wie im Kairoer Abkommen festgelegt, soll Korea in zwei separate Staaten aufgeteilt werden, die jeweils in die Gewalt einer der Kriegsparteien fallen."
 bs.17.a:0 "Armes Korea ..."

 #Cairo Conference News
 bs.16.t:0 "Die Kairoer Konferenz"
 bs.16.d:0 "Da ein gemeinsamer Sieg gegen [JAP.GetNameDef] unvermeidlich ist, wollen [cairo_origin.GetNameDef] und [cairo_partner.GetNameDef] die zukünftige Stabilität in Europa sichern. [cairo_origin.GetLeader], [cairo_partner.GetLeader] und die Staats- und Regierungschefs anderer am Krieg beteiligter Länder haben sich getroffen, um über das Schicksal von [JAP.GetNameDef] zu einigen.\n\nTagelange Verhandlungen führten zur Zeichnung einer neuen Karte Ostasiens. Diese neue Ordnung Ostasiens wird durch die Wunde, die sich mitten durch Korea zieht, zwischen Nord und Süd geteilt."
 bs.16.a:0 "Loben Sie den Tag nicht, bevor der Abend vorbei ist."
 bs.16.b:0 "Wir forderten, was uns richtig erschien."
 bs.16.c:0 "Lassen Sie uns diesen Krieg schnell beenden."
 bs.16.e:0 "Dies könnte das Ende von [JAP.GetNameDef] sein."

 #Danzig
 bshistory.2.t:0 "Die Diskussion über unsere Zukunft"
 bshistory.2.d:0 "Die Mehrheit der Bevölkerung Danzigs ist deutsch, und die meisten von ihnen wünschen sich eine Wiedereingliederung in Deutschland. Glücklicherweise hat ein deutsch-polnischer Krieg begonnen. Dies ist der beste Zeitpunkt, um Entscheidungen zu treffen."
 bshistory.2.a:0 "Treten Sie Deutschland bei."
 bshistory.2.b:0 "Zu Polen zu gehören ist viel sicherer."
 bshistory.2.c:0 "Wir werden unsere Souveränität selbst schützen!"
 
 bshistory.3.t:0 "Danzig hat beschlossen, an unserer Seite zu stehen"
 bshistory.3.d:0 "Das Danziger Parlament hat beschlossen, auf unserer Seite zu stehen."
 bshistory.3.a:0 "Danzig ist ein Teil Deutschlands!"
 
 bshistory.4.t:0 "Danzig hat beschlossen, an unserer Seite zu stehen"
 bshistory.4.d:0 "Obwohl die Mehrheit der Bevölkerung in Danzig deutsch ist, haben sie sich entschieden, auf unserer Seite zu stehen."
 bshistory.4.a:0 "Willkommen zu Hause."
 
 bshistory.5.t:0 "Danzig schließt sich Polen an"
 bshistory.5.d:0 "Obwohl deutsche Faschisten in Danzig Machtpositionen innehaben, scheinen sie uns eher zu hassen als Polen. Sie haben beschlossen, Teil Polens zu sein und erklärten: „Wir können die Wilden nicht ausstehen!“"
 bshistory.5.a:0 "Es spielt keine Rolle, wir werden sie zusammen mit dem Rest Polens erobern!"
 
 bshistory.6.t:0 "Danzig beschloss, den Status Quo beizubehalten"
 bshistory.6.d:0 "Das Danziger Parlament hat beschlossen, den Status Quo beizubehalten."
 bshistory.6.a:0 "Sie werden es bereuen ..."
 bshistory.6.b:0 "Polen ist wichtiger als Danzig!"
 
 bshistory.10.t:0 "Wir sind von Deutschland annektiert"
 bshistory.10.d:0 "Aufgrund äußerer Umstände wurden wir von Deutschland annektiert."
 bshistory.10.a:0 "Wir haben keine Wahl."
 
