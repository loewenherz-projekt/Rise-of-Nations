 #Operation Achse
 GER_operation_achse_category:0 "Operation Achse"
 GER_operation_achse_category_desc:0 "Mit Unterstützung von König Viktor Emanuel III. stürzten und verhafteten die Italiener Mussolini. Darüber hinaus haben sie uns verlassen und sich den Alliierten zugewandt. Wir müssen Maßnahmen ergreifen, um diese Situation zu lösen."
 GER_operation_achse:0 "Operation Achse"
 
 #New order in France
 GER_new_order_in_france_category:0 "Neuer Auftrag in Frankreich"
 GER_new_order_in_france_category_desc:0 "Wir haben ganz Frankreich erobert! Da sie eine große Bedrohung für uns darstellten, könnte eine Balkanisierung Frankreichs vielleicht hilfreich sein, um sie unter Kontrolle zu bringen."
 GER_ss_staat_burgund:0 "Form the SS-Staat Burgund"
 GER_ss_staat_burgund_desc:0 "Heinrich Himmler, der Anführer der Schutzstaffel, hat die Gründung des SS-Staates Burgund vorgeschlagen. Heinrich Himmler sagte: „Burgund ist ein altes wirtschaftliches und kulturelles Zentrum und wäre getrennt von Frankreich leichter zu kontrollieren.“"
 GER_unabhangiger_staat_bretagne:0 "Bilden Sie das Protektorat Bretagne"
 GER_unabhangiger_staat_bretagne_desc:0 "Unser Führer, Adolf Hitler, hat einen unabhängigen britischen Staat vorgeschlagen. Er hat diese Absicht gelegentlich gegenüber seinem Generalstab erwähnt und diese Pläne fertiggestellt und umgesetzt."
 
