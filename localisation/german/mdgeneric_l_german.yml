## Events ##
 mdtree.1.t:0 "Roter Freitag"
 mdtree.1.d:0 "Es war ein ganz normaler Tag auf den Straßen von [Root.Capital.GetName], zumindest für [Root.GetAdjective]-Verhältnisse. Die [Root.GetCommunistParty] hatte in den letzten Wochen stark zugenommen, Streiks und Schlägereien waren an der Tagesordnung. Heute jedoch kam es zu einem schrecklichen Zwischenfall.\n\nMehrere Gewerkschaftsführer riefen erneut zu einem landesweiten Streik auf, und mehrere Hundert, wenn nicht Tausende Arbeiter, Kommunisten und dergleichen marschierten durch die Straßen von [Root.Capital.GetName]. Als sie jedoch den Verkehrsknotenpunkt der Stadt erreichten, wurden sie von einem Bataillon Soldaten begrüßt. Als sie aufgefordert wurden, anzuhalten und an ihre Arbeitsplätze zurückzukehren, folgten einige dem Befehl. Die Mehrheit blieb jedoch und wollte den Streik fortsetzen, und sogar einige Anarchisten und radikale Sozialisten bewarfen sie mit Steinen. Als Antwort darauf befahl der verantwortliche Kommandant seinen Männern, auf die Menge zu schießen.\n\nEs folgte Panik mit zahlreichen Schlägereien und Schießereien, von denen einige bis spät in den Abend Widerstand leisteten. In den darauffolgenden Tagen verurteilten viele linke Zeitschriften dies als „ungerechtfertigten und feigen Angriff auf die Arbeiter und freiheitsliebenden Menschen dieser Nation“. Kurz gesagt: Wir haben nicht wirklich zur Stabilisierung der Lage beigetragen."
 mdtree.1.a:0 "Als ob es nicht schon schlimm genug wäre."
 mdtree.2.t:0 "Landesweite Sabotageakte"
 mdtree.2.desc:0 "Es war ein ruhiger und schöner Morgen. [Root.GetLeader] war gerade aufgewacht und hatte sich für den kommenden Tag angezogen, als plötzlich eine Explosion seinen Alltag unterbrach. Er eilte zum Fenster und traute seinen Augen nicht: Eine riesige Rauchwolke stieg über dem Industriegebiet der Hauptstadt in den Himmel. Kurz darauf folgten die Sirenen der herannahenden Feuerwehr, die versuchte, so viel wie möglich zu retten. Augenblicke später erreichten [Root.GetLeader] Berichte über zahlreiche Bombenexplosionen in mehreren Fabriken im ganzen Land."
 mdtree.2.a:0 "Toll, mein Tag ist schon ruiniert, bevor er überhaupt angefangen hat."
 mdtree.3.t:0 "Der Marsch auf [From.Capital.GetName]"
 mdtree.3.d:0 "Es war bereits Abend, als Dutzende oder gar Hunderte von Mitgliedern der [Root.GetCommunistParty] im ganzen Land zu einem Marsch auf mehrere Regierungsgebäude aufriefen.\n\nIhr Hauptziel war offensichtlich nicht irgendwelche Rathäuser auf dem Land, sondern [Root.Capital.GetName]. Dort bildete sich rasch eine riesige Menge von Tausenden von Kommunisten, Sozialisten, Gewerkschaftern und Arbeitern und besetzte mehrere wichtige Gebäude. Ihr Hauptziel war jedoch der Regierungssitz [Root.GetAdjective] selbst, und so setzte sich die Menge in Bewegung, entschlossen, die derzeitige und korrupte Herrschaft von [Root.GetLeader] zu stürzen. Auf ihrem Weg begegneten sie einigen fehlgeleiteten Loyalisten, die ihre derzeitige Regierung immer noch unserer gerechten Sache vorzuziehen schienen. Unnötig zu erwähnen, dass sie schnell überwältigt wurden.\n\nAls die Menge endlich ihr Ziel erreichte, wurde sie von einigen verzweifelten Loyalisten und hastig errichteten Verteidigungsanlagen begrüßt, an deren Spitze [Root.GetLeader] selbst stand. Da mehrere unserer Versuche, die Situation friedlich zu lösen, scheiterten, brachen schließlich gegen Mitternacht Kämpfe aus. Die Schießereien waren heftig und verzweifelt, doch nach einer Stunde waren die letzten Verteidiger vor dem Gebäude entweder gefangen oder tot.\n\nIm Inneren versuchten die verbliebenen Loyalisten erbittert, uns aufzuhalten, und nahmen fast fünf Gefangene. Schließlich gelangten unsere tapferen Revolutionäre zu [Root.GetLeader] und seinen Ministern, die meisten von ihnen wurden von den wütenden Angreifern gelyncht. Am nächsten Morgen war die alte Regierung verschwunden und die rote Fahne wehte stolz über [Root.GetCapital]."
 mdtree.3.a:0 "Zeit für echte Veränderungen."
 mdtree.4.t:0 "Unvorhergesehene Nebenwirkungen"
 mdtree.4.d:0 "Schockierende Nachrichten erreichten uns heute: Mehrere antikommunistische Militärangehörige sind desertiert oder, noch schlimmer, rebellieren offen gegen unser neues Regime. Und als ob das nicht schon schlimm genug wäre, haben viele Beamte ihre Arbeit niedergelegt, und mehrere hochrangige Politiker diffamieren uns offen mit der Behauptung, wir seien ein „korruptes, despotisches und totalitäres Regime, das unsere alte Regierung aus eigenem Machthunger gewaltsam gestürzt hat, den es mit dem Streben nach Gleichheit tarnte.“\n\nDa ein großer Teil des Militärs und der Bevölkerung gegen uns ist, ist schnelles Handeln erforderlich, sonst werden wir wie unsere alten Herrscher enden."
 mdtree.4.a:0 "Verräter! Alle von ihnen!"
