 MCK_opium_plantation2:0 "Opiumplantage"
 MCK_opium_plantation2_desc:0 "Die Wirtschaft unseres Landes ist extrem abhängig vom Opium. Wir können das Opium an die Einheimischen in unserem besetzten Gebiet verteilen, um ihre Kampfbereitschaft zu schwächen.\n\n§YÄndere die mittlere Zeit bis zum Eintreten der Auswirkungen der Dongbei-Partisanen um x1,25§!"
