 ##### FIVE YEAR PLAN
MAN_five_year_plan_industry_I:0 "Der Fünfjahresplan – Industrie"
MAN_five_year_plan_industry_I_desc:0 "Eine Wirtschaftsinitiative, die Entwicklungsziele für einen Zeitraum von fünf Jahren umreißt und häufig zur Förderung von industriellem Wachstum und Produktivität eingesetzt wird. Der neue Fünfjahresplan, der detailliert beschreibt, wie unsere Regierung die Wirtschaft in den kommenden Jahren ausbauen will, nimmt langsam Gestalt an. Zwischen den verschiedenen Ressorts bestehen nach wie vor erhebliche Meinungsverschiedenheiten darüber, worauf der Schwerpunkt liegen soll. Während Einigkeit darüber besteht, dass der Ausbau der Schwerindustrie das Ziel sein sollte, wird noch darüber diskutiert, was diese neuen Fabriken produzieren sollen. Um den Stillstand zu überwinden, muss eine Entscheidung getroffen werden."

MAN_five_year_plan_air_I:0 "Der Fünfjahresplan - Luft"
MAN_five_year_plan_air_I_desc:0 "Eine Wirtschaftsinitiative, die Entwicklungsziele für einen Zeitraum von fünf Jahren umreißt und häufig genutzt wird, um Wachstum und Modernisierung in der Luftfahrtindustrie voranzutreiben. Der neue Fünfjahresplan, der detailliert beschreibt, wie unsere Regierung die Wirtschaft in den kommenden Jahren ausbauen will, nimmt langsam Gestalt an. Zwischen den verschiedenen Ressorts bestehen nach wie vor erhebliche Meinungsverschiedenheiten darüber, worauf der Schwerpunkt liegen soll. Während Einigkeit darüber besteht, dass eine Expansion der Schwerindustrie das Ziel sein sollte, wird noch darüber diskutiert, was diese neuen Fabriken produzieren sollen. Um den Stillstand zu überwinden, muss eine Entscheidung getroffen werden."

MAN_five_year_plan_tank_I:0 "Der Fünfjahresplan – Militär"
MAN_five_year_plan_tank_I_desc:0 "Ein spezifischer Fünfjahresplan, der die industrielle und militärische Entwicklung der Region in den Vordergrund stellt. Der neue Fünfjahresplan, der detailliert beschreibt, wie unsere Regierung die Wirtschaft in den kommenden Jahren ausbauen will, nimmt langsam Gestalt an. Zwischen den verschiedenen Ressorts bestehen weiterhin erhebliche Meinungsverschiedenheiten darüber, worauf der Schwerpunkt liegen soll. Während Einigkeit darüber besteht, dass der Ausbau der Schwerindustrie das Ziel sein sollte, wird noch darüber diskutiert, was diese neuen Fabriken produzieren sollen. Um die festgefahrene Situation zu überwinden, muss eine Entscheidung getroffen werden."

 
