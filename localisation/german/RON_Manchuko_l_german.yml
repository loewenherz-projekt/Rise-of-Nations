 ## MANCHUKO Mod
 
 
 jap.3.t:0 "Eine chinesische Marionette in Peking aufstellen?"
 jap.3.d:0 "Unsere Armee für das Gebiet Nordchina hat Peking erfolgreich erobert. Vielleicht wird die Errichtung einer Marionettenregierung dort unsere Kosten für die Besetzung des Gebiets senken."
 jap.3.a:0 "Bekämpfe Chinesen mit Chinesen."
 jap.3.b:0 "Zu riskant."
 jap.4.t:0 "Gründung von [PGR.GetName]"
 jap.4.d:0 "Nach der Gründung von [PGR.GetName] hat [Root.GetLeader] ein Dokument erhalten, dass wir [EHA.GetNameDef] auflösen und unter die Verwaltung von [PGR.GetNameDef] kommen sollen."
 jap.4.a:0 "Wir haben unseren Wert verloren..."
 jap.4.b:0 "Tod den Imperialisten!"
 jap.5.t:0 "[EHA.GetName] Rebellen!"
 jap.5.d:0 "[EHA.GetName] hat sich geweigert, in [PGR.GetNameDef] aufgenommen zu werden und hat sich gegen uns aufgelehnt!"
 jap.5.a:0 "Lächerlich!"
 jap.6.t:0 "Tungchow-Meuterei"
 jap.6.d:0 "Einige [CHI.GetRulingParty]-Anhänger unserer Polizei hörten auf [CHI.GetRulingParty]s Propaganda, sie würden den aktuellen Konflikt gewinnen, und erhoben sich in Tungchow gegen uns. Diese Meuterer haben zahlreiche ethnische Japaner und Koreaner angegriffen und getötet. Obwohl sie schließlich besiegt wurden, wurde Yin Ju-keng zum Rücktritt gezwungen, und [Root.GetLeader] übernimmt nun sein Amt. Auch unsere Beziehungen zu Tokio haben sich verschlechtert."
 jap.6.a:0 "Verdammt!"
 jap.7.d:0 "Einige Meuterer im Tungchow haben sich erhoben und einige ethnische Japaner und Koreaner getötet! Glücklicherweise wurden sie später von der örtlichen Polizei zur Rechenschaft gezogen."
 jap.7.a:0 "Wie kann das passieren!!"
 jap.8.t:0 "Eine chinesische Marionette in Nanking aufstellen?"
 jap.8.d:0 "Unsere Armee für das Gebiet Zentralchina hat Nanking erfolgreich erobert. Vielleicht wird die Errichtung einer Marionettenregierung dort unsere Kosten für die Besetzung des Gebiets senken."
 jap.9.t:0 "Wang Jingwei in Nanking installieren?"
 jap.9.d:0 "Ein ehemaliger chinesischer Politiker namens Wang Jingwei ist als Sympathisant Japans bekannt. Vielleicht können wir ihn in Nanking einsetzen und seine Regierung nutzen, um die Kosten für unsere Besetzung Chinas zu senken?"
 jap.11.t:0 "Mandschukuo hat seine Unabhängigkeit erklärt!"
 jap.11.d:0 "[MCK.GetLeader] hat die ganze Zeit seinen erbärmlichen Restaurationsplan ausgeheckt. Heute haben er und seine kleine Clique ihre Unabhängigkeit von uns erklärt!"
 jap.11.a:0 "Bakayarou!"
 jap.11.b:0 "Was auch immer"
 jap.12.t:0 "Attentate in der Mandschurei"
 jap.12.d:0 "In der Mandschurei kam es zu einer Reihe von Attentaten. Ziel waren lokale japanische Beamte, insbesondere Angehörige der Kwantung-Armee. Einige unserer Generäle wurden getötet. Ermittlungen deuten darauf hin, dass es sich um lokale chinesische Guerillakämpfer handelte. Die Täter konnten wir jedoch nicht fassen."
 mck_puppet_wjw_tt:0 "Diese neue Marionette wird die beiden zuvor etablierten chinesischen Marionetten annektieren."
 jap.13.t:0 "[From.GetName] bittet um unsere Unterstützung für die Unabhängigkeit"
 jap.13.d:0 "[From.GetName] hat seinen Wunsch geäußert, sich von Japan zu lösen, und sucht nun unsere Unterstützung."
 jap.13.a:0 "Das ist das Richtige."
 jap.13.b:0 "Kein Interesse."
 jap.14.t:0 "[From.GetName] Stimmen Sie zu, unsere Unabhängigkeit zu unterstützen"
 jap.14.d:0 "[From.GetName] hat sich bereit erklärt, unsere Unabhängigkeit zu unterstützen. Weitere Bedingungen werden später besprochen."
 jap.14.a:0 "Fantastisch!"
 jap.15.t:0 "[From.GetName] weigerte sich, unsere Unabhängigkeit zu unterstützen"
 jap.15.d:0 "[From.GetName] hat sich geweigert, unsere Unabhängigkeit zu unterstützen und erklärt, dass es kein Interesse an der Vereinbarung habe."
 jap.15.a:0 "Wir müssen einen anderen Weg suchen."
 jap.16.t:0 "[From.GetLeader] Aufrufe zum Handeln"
 jap.16.d:0 "Nachdem [From.GetName] erfolgreich die Demokratie etabliert hat, fordert [From.GetLeader] uns nun auf, die Japaner anzugreifen, um sie in die Freiheit zu führen."
 jap.16.a:0 "Wenn die Diplomatie nicht funktioniert, werden wir zum Krieg greifen."
 jap.16.b:0 "Wir haben bereits einen Plan im Kopf. Sagen Sie ihnen, sie sollen Geduld haben."
 jap.16.c:0 "Bring die Sonne unter!"
 jap.17.t:0 "Ultimatum von [From.GetName]"
 jap.17.d:0 "[From.GetLeader] hat uns ein Ultimatum gestellt, in dem wir aufgefordert werden, [MCK.GetName] die Unabhängigkeit zu gewähren. Wenn wir dem nicht nachkommen, müssen wir möglicherweise gegen sie in den Krieg ziehen."
 jap.17.a:0 "Wir können es uns nicht leisten, gegen sie in den Krieg zu ziehen."
 jap.17.b:0 "Wenn sie Krieg wollen, werden wir ihn ihnen geben!"
 jap.18.t:0 "[From.GetName] weigert sich, jetzt zu handeln"
 jap.18.d:0 "Die Antwort von [From.GetName] lautet, dass wir uns vorerst zurückziehen müssen. Denn sie haben bereits einen Plan im Kopf."
 jap.18.a:0 "Dann warten wir..."
 jap.19.t:0 "[JAP.GetName] gewährt [MCK.GetName] Unabhängigkeit"
 jap.19.d:0 "[JAP.GetName] hat [MCK.GetName] Unabhängigkeit gewährt."
 jap.19.a:0 "Eine rationale Entscheidung."
 jap.20.t:0 "[JAP.GetName] gewährt uns Unabhängigkeit"
 jap.20.d:0 "[JAP.GetName] hat uns Unabhängigkeit gewährt!"
 jap.20.a:0 "Ein herrlicher Tag!"
 jap.21.t:0 "[JAP.GetName] verweigert [MCK.GetName] die Unabhängigkeit"
 jap.21.d:0 "Trotz unserer Macht weigert sich [JAP.GetName], dem Ultimatum nachzukommen."
 jap.21.a:0 "Möge Gott ihnen gnädig sein."
 jap.22.t:0 "Beigetreten bei [USA.GetName]!"
 jap.22.d:0 "Die Zeit ist gekommen, wir kämpfen jetzt an der Seite des Leuchtfeuers der Demokratie gegen die tyrannischen Japaner!"
 jap.22.a:0 "Freiheit oder Tod!"
 jap.23.t:0 "[MCK.GetName] schließt sich [USA.GetName] an!"
 jap.23.d:0 "Das rebellische Volk von [MCK.GetName] hat sich von uns losgesagt und sich [USA.GetNameDef] im Krieg angeschlossen."
 jap.23.a:0 "Bakayarou!"
 jap.28.t:0 "[From.GetNameDef] Bietet Vasallisierung an"
 jap.28.d:0 "Durch den Befehl des Himmels verfügt der Kaiser hiermit,\n\nDein Königreich ist nun eingeladen, ein Vasall des glorreichen Großen Qing-Reiches zu werden. Gehorche. Andernfalls wirst du unter der Macht des Himmlischen Reiches zugrunde gehen.\n\nRespektiere dies. "
 jap.28.a:0 "Das Edikt ist eingegangen."
 jap.28.b:0 "Schwachsinn!"
 jap.29.t:0 "[From.GetName] wird unser Vasall"
 jap.29.d:0 "Durch den Erlass des Kaisers wurde [From.GetName] ein ehrenhafter Vasall unter [MCK.GetNameDef]."
 jap.29.a:0 "Die Welt wird sich erneut dem mächtigen Qing-Reich beugen!"
 jap.29.b:0 "Es wäre für sie besser, Teil des Imperiums zu sein."
 jap.30.t:0 "[From.GetName] lehnt Vasallentum ab"
 jap.30.d:0 "Der arrogante [From.GetLeader] hat unser freundliches Angebot der Vasallisierung abgelehnt!"
 jap.30.a:0 "Sie werden ihren Fehler bald erkennen."
 jap.31.t:0 "[MCK.GetName] möchte Kanto-Shu erwerben"
 jap.31.d:0 "[MCK.GetName] hat einen Vertreter geschickt, um die Angelegenheit der Versetzung von Kanto-Shu zu besprechen."
 jap.31.a:0 "Zustimmen."
 jap.31.b:0 "Auf keinen Fall."
 jap.32.t:0 "Kanto-Shu erworben"
 jap.32.d:0 "Wir haben den Besitz von Kanto-Shu übernommen!"
 jap.32.a:0 "Das beste Ergebnis."
 jap.33.t:0 "Kanto-Shu blieb in japanischer Hand"
 jap.33.d:0 "Unser Vorschlag konnte die japanischen Beamten nicht überzeugen, Kanto-Shu blieb in japanischer Hand."
 jap.33.a:0 "Wir können nichts tun."
 jap.34.t:0 "[MCK.GetName] beantragt Genehmigung zur Erweiterung der Marine"
 jap.34.d:0 "[MCK.GetName]-Beamte sind gekommen, um über die Genehmigung zur Erweiterung ihrer Marine zu diskutieren."
 jap.35.t:0 "Erlaubnis erteilt"
 jap.35.d:0 "Wir haben die Erlaubnis erhalten, unsere Marine zu erweitern."
 jap.36.t:0 "Zugriff verweigert"
 jap.36.d:0 "Die Erlaubnis zum Ausbau unserer Marine wurde uns verweigert."
 jap.37.t:0 "Industrielle Expansion"
 jap.37.d:0 "Unsere Industrie litt lange unter Defiziten. Dank der Bemühungen unseres geliebten und glorreichen Kaisers hat sich unsere Industrie nun deutlich verbessert."
 jap.37.a:0 "Es lebe der Kaiser!"
 jap.38.d:0 "Mit den zunehmenden Anstrengungen der Industrie haben sich auch unsere Techniken in diesem Fachgebiet deutlich verbessert."
 jap.39.d:0 "Obwohl die Zivilwirtschaft wichtig ist, darf der Militärsektor nicht vernachlässigt werden. Wir sollten anfangen, uns mit dem militärischen Aspekt unserer Industrie zu befassen."
 jap.40.t:0 "Rüstungsentwicklung"
 jap.40.d:0 "Die Anstrengungen im Militärbereich haben sich gelohnt. Unsere Produktionskapazitäten haben sich verbessert und das Verständnis für Kleinwaffen hat große Fortschritte gemacht."
 jap.41.d:0 "Unsere Spezialisten haben ein besseres Verständnis für die Militärtechnologie entwickelt. Unser geliebter und ruhmreicher Kaiser erkannte die Lage unseres Reiches und bewilligte eine kleine Förderung der Marineindustrie."
 jap.42.t:0 "Blauwasserambitionen"
 jap.42.d:0 "Die demütigende Niederlage gegen die japanische Marine vor langer Zeit ist nicht vergessen. Die Bedeutung einer starken Marine ist allen unseren Bürgern bekannt."
 jap.43.t:0 "Schutz unseres Horizonts"
 jap.43.d:0 "Unsere Marinetechnologie macht große Fortschritte. Unsere Luftwaffe ist jedoch immer noch in einem schlechten Zustand. Wenn wir das Eigentum der Bevölkerung schützen wollen, müssen wir sie auch von der Angst vor feindlichen Bombardierungen befreien."
 jap.44.d:0 "Die Anstrengungen in der Luft- und Marineforschung bringen unschätzbare Ergebnisse. Wir können nun Flugzeuge im gesamten Imperium verteilen und unsere Marineproduktion ist sprunghaft angestiegen."
 jap.45.t:0 "Aussicht auf Öl"
 jap.45.d:0 "Angesichts der reichen Ressourcenvorkommen unter dem riesigen Territorium unseres Imperiums wurden Arbeiten zu ihrer Nutzung eingeleitet, um zur Zukunft des Imperiums beizutragen."
 jap.46.t:0 "Mineralvorkommen"
 jap.47.t:0 "RFP Fordern Sie unsere Unterstützung an"
 jap.47.d:0 "Mit der erfolgreichen Erklärung unserer Unabhängigkeit von den Japanern hat die RFP ihr Versprechen eingelöst und es ist nun an der Zeit, dass wir unseres einlösen, oder nicht?"
 jap.47.a:0 "Die Vernichtung der Bolschewiki ist die Pflicht eines jeden Menschen!"
 jap.47.b:0 "Wir brauchen 10 Monate zur Vorbereitung."
 jap.47.c:0 "Es gibt keine Vögel mehr zu jagen, der beste Bogen nützt uns jetzt nichts mehr."
 jap.48.d:0 "Für uns ist die Zeit gekommen, die Bolschewiki anzugreifen!"
 jap.49.t:0 "RFP erhebt sich gegen uns"
 jap.49.d:0 "Unser Verrat hat die RFP wütend gemacht und sie haben sich gegen uns erhoben!"
 jap.49.a:0 "Der Hund hat seinen Zweck erfüllt, wir können ihn jetzt nicht mehr gebrauchen."
 MCK_longer_partisan_effect:0 "\n§YMultiplizieren Sie die mittlere Zeit bis zum Eintreten der Effekte der Dongbei-Partisanen mit x2,0§!"
 jap.50.t:0 "Sieg gegen Guerillas"
 jap.50.d:0 "Trotz schwerer Verluste ging unsere Armee aus einer kürzlichen Konfrontation mit der kommunistischen Guerilla als Sieger hervor. Mehrere Anführer der Guerilla wurden während der Konfrontation getötet. Dieser entscheidende Schlag wird ihre Stärke erheblich schwächen."
 jap.50.a:0 "Die Gerechtigkeit soll siegen!"
 jap.51.t:0 "Niederlage gegen Guerillas"
 jap.51.d:0 "Unser jüngster Versuch, die Guerilla zu bekämpfen, geriet außer Kontrolle. Unsere Divisionen gerieten in einen Hinterhalt und wurden rasch von den anderen getrennt. Nur wenige überlebten das Massaker."
 jap.51.a:0 "Undenkbar!"
 jap.52.t:0 "Frieden mit [JAP.GetName]?"
 jap.52.d:0 "Wir haben die niederträchtigen Japaner erfolgreich von unserem Heimatboden vertrieben. Sollten wir dieses Blutvergießen jetzt beenden?"
 jap.52.a:0 "Lassen Sie uns ein Friedensgespräch vereinbaren."
 jap.52.b:0 "Wir werden die Heimatinseln erobern!"
 jap.53.t:0 "[MCK.GetName] will Frieden"
 jap.53.d:0 "Da unsere Truppen nicht in der Lage waren, ihre Verteidigung zu durchbrechen, haben die Beamten von [MCK.GetNameADJ] einen Vorschlag für Friedensgespräche übermittelt."
 jap.53.a:0 "Das nächste Mal werden sie nicht so viel Glück haben."
 jap.53.b:0 "Sie haben unsere Gnade mit Schwäche verwechselt!"
 jap.54.t:0 "Frieden!"
 jap.54.d:0 "Die japanische Regierung hat der Friedensvereinbarung zugestimmt!"
 jap.54.b:0 "Ein herrlicher Tag!"
 jap.55.t:0 "Der Krieg geht weiter"
 jap.55.d:0 "Unser Vertreter wurde von der japanischen Militärpolizei festgenommen."
 jap.55.b:0 "Outrageous!
 MCK_independence_yes_tt:0 "Übernehmen Sie Staaten, die Japan und seinen Marionetten gehören."
 MCK_10_t_prepare_tt:0 "Dieses Ereignis wird nach zehn Monaten erneut ausgelöst, jedoch ohne diese Option."
 MCK_rfp_rise_tt:0 "Die RFP wird in Zukunft einen Bürgerkrieg auslösen."
 ## 19/1/2017 ##
 jap.57.t:0 "Regierungsumstrukturierung in [From.GetName]"
 jap.57.d:0 "[From.GetLeader] hat seine Regierung im Alleingang umstrukturiert und seine Politik ist unseren Interessen weniger dienlich geworden."
 jap.57.a:0 "Wir müssen ihnen ihre Autonomie nehmen, um weiteren Schaden für unsere Interessen zu verhindern."
 jap.57.b:0 "Kein Grund zur Sorge."
 jap.58.t:0 "[From.GetName] Fordern Sie unsere Annexion"
 jap.58.d:0 "Angesichts der jüngsten Umstrukturierung unserer Regierung hat [From.GetName] von uns verlangt, dass wir unsere Autonomie aufgeben und Teil ihrer Nation werden."
 jap.58.a:0 "Handeln Sie, bevor es zu spät ist!"
 jap.58.b:0 "Sie sind zu mächtig."
 jap.59.t:0 "[From.GetName] bricht frei"
 jap.59.d:0 "[From.GetName] hat unser Angebot nicht nur abgelehnt, sondern sich auch von unserer Oberherrschaft befreit."
 jap.59.a:0 "Wie können sie es wagen!"
 jap.60.t:0 "[From.GetName] Angehängt"
 jap.60.d:0 "Da er weiß, dass dies dem Wohl der Menschen von [From.GetNameADJ] und [Root.GetNameADJ] dient, hat [From.GetLeader] zugestimmt, dass [From.GetName] Teil von [Root.GetNameDef] wird."
 jap.60.a:0 "Ein herrlicher Tag."
 ## 11/5/2017 ##
 jap.64.t:0 "Japanischer Support"
 jap.64.d:0 "Die Japaner haben unsere Unzufriedenheit mit [CHI.GetRulingParty] bemerkt, nachdem das Mongal Political Committee gespalten wurde. Sie ließen uns mitteilen, dass sie uns helfen könnten, in der Region Chahar eine eigene Regierung zu bilden und die [ECR.GetName] einzugliedern, die unter der Kontrolle von [ECR.GetLeader] steht."
 jap.64.a:0 "Die Japaner zeigen sich vielversprechend."
 jap.64.b:0 "Dies muss ihr bösartiger Plan sein."
 jap.65.t:0 "Die zweite Generalversammlung der Mongalen"
 jap.65.d:0 "Nachdem Suiyuan in unsere Hände gefallen war, wurde die zweite Generalversammlung des Mogal einberufen. Die Versammlung besprach die Gründung von [Root.GetName] und ernannte [Root.GetLeader] zum Vorsitzenden."
 jap.65.a:0 "Der Ruhm des Mongolischen Reiches wird bald wiederhergestellt sein!"
 jap.66.t:0 "Einrichtung von [Root.GetName]"
 jap.66.d:0 "Nachdem Suiyuan und Taiyuan unter die Kontrolle unseres Verbündeten gefallen waren, wurde in Zhangjiangkou ein Protokoll unterzeichnet. Das Protokoll sieht die Gründung von [Root.GetName] vor."
 jap.67.t:0 "Aufteilen [MEN.GetName]"
 jap.67.d:0 "[MEN.GetLeader]s pro-japanische Haltung ist besorgniserregend, sein Überlaufen zu den Japanern ist nur eine Frage der Zeit. Sollte er mit seiner derzeitigen Macht zu den Japanern überlaufen, würde unsere Innere Mongolei vollständig unter japanischer Kontrolle stehen und ihnen im Kriegsfall einen Vorteil verschaffen.\n\nEinige Beamte von [Root.GetRulingParty] haben eine Maßnahme gefordert, um [MEN.GetLeader]s Macht zu schwächen, indem [MEN.GetNameDef] gespalten und seine Macht auf die Region Chahar beschränkt wird. Dies könnte einen größeren Gebietsverlust verhindern, aber Kriegsherr Yan Xishan könnte davon profitieren."
 jap.67.a:0 "Teilen Sie das Komitee auf."
 jap.67.b:0 "Kein Grund zur Sorge."
 jap.68.t:0 "Politisches Komitee von Suiyuan"
 jap.68.d:0 "[From.GetRulingParty] hat beschlossen, die Macht von [MEN.GetLeader] einzuschränken, indem das Mongal-Politische Komitee in zwei Teile geteilt wird. Das Suiyuan-Politische Komitee wird gegründet und Fu Zuoyi, der [Root.GetName] gegenüber ein loyaler General war, wird zum Vorsitzenden ernannt."
 jap.68.a:0 "Ein Schub für unsere Stärke."
 jap.69.t:0 "[Root.GetName]"
 jap.69.d:0 "[From.GetRulingParty] hat aus irgendeinem Grund beschlossen, unser mongolisches politisches Komitee aufzuspalten. Die Macht von [Root.GetLeader] wurde ausschließlich auf die Region Chahar beschränkt."
 jap.69.a:0 "Verdammt!"
 jap.70.t:0 "[MEN.GetName] Gegründet"
 jap.70.d:0 "Die [MEN.GetName] wurde von Demchugdongrub mit Hilfe der Japaner gegründet. Sie haben sich ebenfalls unserer Kontrolle entzogen."
 jap.70.a:0 "Wir wussten es!"
 jap.71.t:0 "[MEN.GetName] kontaktieren?"
 jap.71.d:0 "Die jüngsten Aktionen der [CHI.GetRulingParty] haben innerhalb der [MEN.GetName] für Unmut gesorgt. Wir haben eine enge Beziehung zu [MEN.GetLeader], vielleicht können wir diese Gelegenheit nutzen, um die Chinesen weiter zu schwächen?"
 jap.71.a:0 "Alles, was uns im bevorstehenden Krieg einen Vorteil verschaffen kann."
 jap.71.b:0 "Verschwenden Sie keine Ressourcen für solch unbedeutende Probleme."
 jap.72.t:0 "[From.GetName] Einverstanden"
 jap.72.d:0 "Demchugdongrub hat der Gründung von [MEN.GetName] zugestimmt und [MEN.GetLeader] wurde zum Vorsitzenden ernannt. Sie sind uns nun treu ergeben und haben sich von der [CHI.GetRulingParty] losgesagt."
 jap.72.a:0 "Dies wird die [CHI.GetRulingParty] schwächen"
 jap.73.t:0 "[From.GetLeader] Abgelehnt"
 jap.73.d:0 "Trotz unserer Großzügigkeit hat sich [From.GetLeader] entschieden, sich uns nicht anzuschließen und seine eigene Regierung in der Region Chahar zu gründen. Er erklärte, unsere Absichten seien weitaus schlimmer als das, was die [CHI.GetRulingParty] zu bieten habe."
 jap.73.a:0 "Schade."
 ## 16/5/2017 ##
 increase_jap_awareness_tt:0 "§RSensibilisieren Sie die japanische Regierung leicht\n§!"
 jap.78.t:0 "Radikale Ausbreitung"
 jap.78.d:0 "Kürzlich hat eine Gruppe von Restaurationisten eine radikalere Methode zur Verbreitung ihrer Propaganda entwickelt. Sie zwingen andere, ihre Bewegung zu unterstützen, und wer sich weigert, wird verprügelt. Einige berichten sogar, sie seien in die Häuser projapanischer Bürger eingebrochen und hätten ihnen „Lektionen“ erteilt. Ihr Vorgehen hat in unserem Volk Unruhe gestiftet. Wenn sie nicht gemäßigtere Methoden zur Verbreitung ihrer Propaganda anwenden, werden wir bald die Aufmerksamkeit Japans auf uns ziehen, und der gesamte Plan ist gefährdet."
 jap.78.a:0 "Lassen Sie sie ihre Praxis fortsetzen."
 jap.78.b:0 "Sag ihnen, sie sollen sich beruhigen."
 jap.79.t:0 "[MCK.GetLeader]s kleinlicher Plan"
 jap.79.d:0 "Unsere Ermittler haben handfeste Beweise für [MCK.GetLeader]s kleinlichen Plan gefunden, sich unserer Kontrolle zu entziehen. Wir haben ihm ein Ultimatum gestellt und ihn zur sofortigen Unterwerfung aufgefordert. Sollte er sich weigern, werden sie mit der mächtigen Armee von [Root.GetNameDef] konfrontiert!"
 jap.79.a:0 "Verräter des Imperiums müssen sterben!"
 jap.80.t:0 "Restauratorenversammlung"
 jap.80.d:0 "Eine Gruppe von Anhängern der Restaurationsbewegung hat eine Versammlung in der Nähe von [Root.GetLeader]s Komplex in [Root.Capital.GetName] organisiert. Sie wollen die Vertreibung der Japaner und die Wiederherstellung des alten Kaiserreichs fordern. Es wurde ein Petitionsschreiben zur Übergabe an [Root.GetLeader] angefordert. Wenn wir das Schreiben annehmen, könnten die Japaner vermuten, dass wir die Restaurationsbewegung tatsächlich unterstützen. Nehmen wir das Schreiben jedoch nicht an, könnte unsere öffentliche Unterstützung sinken."
 jap.80.a:0 "Nehmen Sie den Brief an."
 jap.80.b:0 "Lehnen Sie den Brief ab."
 jap.81.t:0 "Monarchismus-Ideen, die in Schulen gelehrt werden"
 jap.81.d:0 "Einige Schulen in unserem Reich haben begonnen, Schüler heimlich monarchistische Ideen zu lehren. Es wurde bestätigt, dass dies das Werk einiger Restaurationisten ist, die im Bildungssystem über Macht verfügen. Obwohl dieser Unterricht unserem Restaurationsplan förderlich wäre, könnte er den Verdacht der Japaner erregen, wenn sie davon erfahren."
 jap.81.a:0 "Erlaube es."
 jap.81.b:0 "Forderte ein Ende dieser Praxis."
 jap.82.t:0 "Antijapanische Versammlungen"
 jap.82.d:0 "In einigen Teilen unseres Landes kam es zu Versammlungen mit dem Ziel, die Japaner zu vertreiben. Einige dieser Versammlungen führten sogar zu Konflikten zwischen pro-japanischen und anti-japanischen Bürgern. Obwohl diese Versammlungen Sachschäden verursachen könnten, könnten sie für unseren Plan von Nutzen sein. Nicht zu reagieren wäre jedoch Illoyalität gegenüber den Japanern."
 jap.82.a:0 "Setzen Sie unsere Teeparty fort."
 jap.82.b:0 "Gehen Sie gegen diese Aufwiegler vor!"
 jap.83.t:0 "Politiker mögen Japaner nicht"
 jap.83.d:0 "Einige Politiker zeigen sich gegenüber Japanern abgestoßen. Japanische Regierungsvertreter sind Zielscheibe von Angriffen und Erpressungen. Unsere Regierung entwickelt sich in besorgniserregendem Tempo zu einer antijapanischen. Einige Politiker haben sogar vorgeschlagen, Japanern den Zugang zur Regierung zu verbieten. Obwohl es sich um einen gewagten Vorschlag handelt, könnte er mehr Gutes als Schlechtes bewirken …"
 jap.83.a:0 "Dies wird einen großen Beitrag zur Wiederherstellung leisten!"
 jap.83.b:0 "Sind die verrückt geworden?"
 jap.84.t:0 "Militär mag keine Japaner"
 jap.84.d:0 "Angesichts der antijapanischen Stimmung in unserem Land haben viele Menschen ihre Abneigung gegenüber den Japanern zum Ausdruck gebracht, insbesondere gegenüber den Mächtigen. Auch unser Militär ist davon nicht ausgenommen. In jüngster Zeit haben einige unserer Soldaten offen Befehle japanischer Generäle missachtet und japanische Soldaten verprügelt. Diese Aktionen haben Unruhen und Chaos in unserer Armee und sogar bewaffnete Konflikte zwischen unseren Männern und der Kwantung-Armee verursacht. Um solche Konflikte zu verhindern, ist es am effektivsten, jeglichen japanischen Einfluss in unserem Militär zu beseitigen. Ein solches Vorgehen würde die Japaner jedoch definitiv provozieren."
 jap.84.a:0 "Verbieten Sie den Japanern die Teilnahme an militärischen Angelegenheiten unseres Landes!"
 jap.84.b:0 "Denjenigen, die hinter diesen meuternden Aktionen stecken, droht ein Kriegsgerichtsverfahren."
 jap.85.t:0 "Japaner getötet"
 jap.85.d:0 "Kürzlich sind antijapanische Fanatiker in japanische Haushalte eingebrochen und haben die Bewohner brutal ermordet. Diese Vorfälle haben in der japanischen Bevölkerung unseres Landes für Aufruhr gesorgt, da sie sich über die mangelnde Sicherheit beklagen, die sie hier empfinden. Wir mögen diese Taten ignorieren, doch wenn wir sie nicht unterbinden, könnten sie schwerwiegende Folgen haben."
 jap.85.a:0 "Drücken Sie ein Auge zu."
 jap.85.b:0 "Stellen Sie Ressourcen bereit, um die Täter zu verhaften."
 jap.87.t:0 "Antijapanische Guerillakämpfer"
 jap.87.d:0 "Einige Restaurationisten haben Milizen finanziert, um Guerillagruppen zu bilden, die japanische Militärziele angreifen. Bisher haben sie der Kwantung-Armee Schaden zugefügt, und die Kwantung-Armee hat auch Männer für Befriedungsoperationen entsandt. Die Zahl der Guerillagruppen nimmt weiter zu und könnte einen Punkt erreichen, an dem die Japaner eine groß angelegte Militäroperation durchführen müssen, um sie vollständig auszurotten. Sollten diese Guerillakämpfer gefangen genommen werden, besteht die Gefahr, dass unsere Verbindungen zu ihnen aufgedeckt werden."
 jap.87.a:0 "Erlauben Sie der Guerilla, sich auszubreiten."
 jap.87.b:0 "Stoppen Sie aus Sicherheitsgründen ihre Expansion."
 jap.88.t:0 "Vandalismus gegen Japaner"
 jap.88.d:0 "Antijapanische Fanatiker haben in letzter Zeit japanisches Eigentum, darunter Geschäfte, Häuser und sogar Fabrikmaschinen, verwüstet. Die geschätzten Kosten sind hoch und steigen weiter. Obwohl diese Praktiken dazu beitragen, antijapanische Stimmungen zu verbreiten, könnten sie letztlich unserem Land mehr Schaden zufügen als den Japanern."
 jap.88.b:0 "Schicken Sie die Polizei, um potenzielle Opfer von Vandalismus zu schützen."
 jap.89.t:0 "Mutiger Vorschlag"
 jap.89.d:0 "Bei einem kürzlichen Treffen der Restaurationisten schlug einer von ihnen einen kühnen Plan vor, um die restaurationistische Idee noch weiter und schneller zu verbreiten. Andere lehnten seinen Plan jedoch mit der Begründung ab, er erhöhe das Risiko, dass unser geheimer Plan nach außen gelangt. Nach langer Debatte fiel die Entscheidung auf [Root.GetLeader]. Soll die vorgeschlagene Methode übernommen werden?"
 jap.89.a:0 "Wer nicht wagt, der nicht gewinnt."
 jap.89.b:0 "Vertraulichkeit steht an erster Stelle."
 ## 17/5/2017 ##
 MCK_nothing_tt:0 "Es wird nichts passieren\n"
 MCK_jap_will_demand_submission_tt:0 "§R[JAP.GetName] wird Ihre sofortige Unterwerfung verlangen, wenn Sie nicht nachkommen, wird es Krieg geben§!\n\n"
 jap.90.t:0 "Flugblatt-Typ festgenommen"
 jap.90.d:0 "Eine Person, die von den Restauratoren zum Verteilen von Flugblättern angeheuert wurde, wurde kürzlich in einem kleinen Vorort von der japanischen Polizei festgenommen. Die festgenommene Person scheint Informationen über die Aktivitäten der lokalen Restauratoren weitergegeben zu haben, und unser regionales Hauptquartier dort ist nun in Gefahr."
 jap.90.a:0 "Sie werden uns nicht finden können, das Hauptgebäude fügt sich sehr gut ein."
 jap.90.b:0 "Sie werden uns nicht finden können, wir werden dort alle Beweise vernichten und umziehen."
 jap.91.t:0 "Potenzieller Whistleblower"
 jap.91.d:0 "Ein Mitglied der restaurativen Untergrundbewegung ist in letzter Zeit bei Treffen völlig aus dem Häuschen. Er behauptet immer wieder, die Japaner seien sich unseres Plans bewusst und wir sollten ihn ein für alle Mal stoppen. Abgesehen von seinem mangelnden Vertrauen in die Bewegung machen sich andere Mitglieder nun Sorgen, dass er unseren Plan den japanischen Behörden verraten könnte, um sein eigenes Leben zu retten, und erwägt, ihn zu beseitigen."
 jap.91.a:0 "Versuchen wir zunächst, ihn zu überzeugen."
 jap.91.b:0 "Werde ihn los, still und leise."
 jap.92.t:0 "Geheimtreffen aufgedeckt"
 jap.92.d:0 "Ein geheimes Treffen wurde aufgedeckt, als ein japanischer Polizist den Raum betrat, in dem die Restauratoren ihre Zukunftspläne besprachen. Die Restauratoren erschossen den Polizisten auf der Stelle, und sie flohen, bevor weitere Polizisten eintrafen. Die Leiche des Polizisten wurde jedoch gefunden, und einige Dokumente über die Bewegung wurden am Tatort zurückgelassen. Dies weckte in den Japanern den Verdacht auf die Existenz einer Untergrundgruppe von Restauratoren. Wenn wir einige Mitglieder der Bewegung anweisen, sich zum Wohle der Allgemeinheit zu stellen, könnte ihr Verdacht mit der Zeit zerstreut werden."
 jap.92.a:0 "Wir werden unsere Kameraden niemals aufgeben!"
 jap.92.b:0 "Erfolg erfordert Opfer."
 jap.93.t:0 "Japanischer Inspektor getötet"
 jap.93.d:0 "Gestern inspizierte ein japanischer Inspektor ein kleines Dorf, um verdächtige Aktivitäten festzustellen. Zu seinem Pech war die Dorfbevölkerung den Japanern gegenüber alles andere als freundlich. Es kam zu einem kleinen Konflikt, bei dem Blut vergossen wurde. Der Inspektor wurde dabei getötet, und seine überlebenden Helfer forderten, das ganze Dorf niederzubrennen und alle Dorfbewohner hinzurichten. Wie sollten wir reagieren?"
 jap.93.b:0 "Gesetz ist Gesetz..."
 jap.94.t:0 "Besuch eines japanischen Ermittlers"
 jap.94.d:0 "Ein Ermittler aus Japan besucht [Root.GetLeader]. Er bittet [Root.GetLeader], ihr alles über die Restaurationsbewegung zu erzählen. Er scheint davon überzeugt zu sein, dass [Root.GetLeader] mit der Bewegung in Verbindung steht. Lügen ist hier vielleicht nicht die beste Lösung, aber andere Restaurationsbefürworter zu verraten, ist es auch nicht."
 jap.94.a:0 "„Ich habe keine Ahnung, wovon Sie reden …“"
 jap.94.b:0 "„Diese Verschwörer haben mich schon früher kontaktiert, aber ich habe ihre Angebote abgelehnt …“"
 jap.95.t:0 "Stalker?"
 jap.95.d:0 "[Root.GetLeader] hegt nun den Verdacht, dass Stalker aus Tokio seinen Alltag noch stärker überwachen. Sogar einige Mitglieder der Bewegung berichten von Verfolgung, und zahlreiche Treffen müssen abgesagt werden, da Schlüsselfiguren nicht am Treffpunkt erscheinen können. Die Stalker stellen eine Bedrohung für unseren Plan dar, wir können jedoch Lockvögel einsetzen, um die Stalker abzulenken und das Risiko einer Entdeckung zu verringern."
 jap.95.a:0 "Wir müssen einfach vorsichtiger sein, Lockvögel sind unnötig und teuer."
 jap.95.b:0 "Ein solider Plan."
 jap.96.t:0 "Abgehörtes Telefon"
 jap.96.d:0 "Einige Schlüsselfiguren berichteten, dass ihre Telefone abgehört würden. Die meisten glauben, dass japanische Agenten dahinterstecken. Viele von ihnen schreiben inzwischen Briefe, anstatt zu telefonieren. Dies hat den Fortschritt der Bewegung drastisch verlangsamt."
 jap.96.a:0 "Sagen Sie ihnen, dass sie weiterhin das Telefon benutzen sollen."
 increase_jap_awareness2_tt:0 "§RMengemäßige Sensibilisierung der japanischen Regierung\n§!"
 increase_jap_awareness3_tt:0 "§RSensibilisierung der japanischen Regierung deutlich steigern\n§!"
 increase_jap_awareness4_tt:0 "§RDas Bewusstsein der japanischen Regierung drastisch steigern\n§!"
 jap.97.t:0 "Japanische Geheimpolizei"
 jap.97.d:0 "Nachdem die Japaner von unseren Restaurationsbewegungen erfahren hatten, gründeten sie eine Geheimpolizei. Wir konnten einige Monate lang unbemerkt bleiben. Nun haben wir erfahren, dass sie nun eine landesweite Razzia planen, um die Restaurationisten auszumerzen. Hochrangige Mitglieder der Bewegung haben zu einer Phase der Inaktivität aufgerufen, um nicht entdeckt zu werden. Dies wird unseren Fortschritt sicherlich erheblich verlangsamen, wird sich aber langfristig als vorteilhaft erweisen."
 jap.97.a:0 "Wir dürfen nicht langsamer werden!"
 jap.97.b:0 "Wir dürfen nicht riskieren, erwischt zu werden!"
 jap.98.t:0 "[MCK.GetName]s Verbot für Japanisch"
 jap.98.d:0 "[MCK.GetName] hat Japanern seit einiger Zeit den Zutritt zur Regierung verboten. Diese Politik schadet unseren Interessen in der Region erheblich. Wir müssen die Aufhebung des Verbots fordern und unsere Interessen schützen. Sollten sie sich nicht daran halten, können wir sie genauso gut in unser Reich „eingliedern“ und die Region unter unsere direkte Kontrolle stellen …"
 jap.98.a:0 "Senden Sie das Ultimatum"
 jap.98.b:0 "Dies kann später erfolgen, wir müssen uns auf unser aktuelles Problem konzentrieren."
 jap.99.t:0 "Ultimatum von [From.GetName]"
 jap.99.d:0 "Ein Ultimatum von [From.GetName] liegt bei [Root.GetLeader] vor. Darin heißt es, dass wir das Verbot für Japaner in unserer Regierung aufheben müssen. Andernfalls könnten sie ihre Truppen für eine Offensive mobilisieren."
 jap.99.a:0 "Wir können uns einfach nicht gegen sie wehren ..."
 jap.99.b:0 "Abscheuliche Kreaturen! Wir werden unsere Macht nie wieder an fremde Mächte abgeben!"
 jap.100.t:0 "Verbot aufgehoben"
 jap.100.d:0 "[From.GetLeader] hat beschlossen, das Verbot aufzuheben. Wir können nun unsere Kontrolle über das Gebiet problemlos festigen."
 jap.100.a:0 "Nihon Banzai!"
 jap.101.t:0 "Verbot weiterhin aktiv"
 jap.101.d:0 "Der Narr [From.GetLeader] hat beschlossen, gegen unsere Interessen zu handeln und weigert sich, das Verbot aufzuheben."
 jap.101.a:0 "Sie wehren sich einfach gegen den Stachel."
 jap.101.b:0 "Wir werden uns später darum kümmern ..."
 jap.102.t:0 "Hausarrest [MCK.GetLeader]?"
 jap.102.d:0 "[MCK.GetLeader]s Verbindung zu den Restaurationisten ist offensichtlich. Obwohl die Beamten ihn unbedingt loswerden wollen, könnte dies die Einheimischen provozieren und den Chinesen weiteren Auftrieb verleihen. In der gegenwärtigen Situation wäre es besser, ihn unter Hausarrest zu stellen, als ihn zu liquidieren."
 jap.102.a:0 "Schicken Sie ein paar Männer, um ihn zu „bewachen“."
 jap.102.b:0 "Das ist nicht nötig."
 jap.103.t:0 "[Root.GetLeader] Unter Hausarrest"
 jap.103.t:0 "Einige japanische Soldaten sind zum Komplex von [Root.GetLeader] gekommen und haben erklärt, ihre Aufgabe sei es, ihn zu „schützen“ und zu „bewachen“. Tatsächlich steht [Root.GetLeader] jedoch auf Befehl Tokios unter Hausarrest. Die Restaurationisten sind über diese Aktion empört und planen nun, ihren Plan schneller umzusetzen, um [Root.GetLeader]s Autorität zu sichern."
 jap.103.a:0 "Wir wehren uns, und zwar mit aller Kraft!"
 jap.103.b:0 "Es ist noch nicht soweit!"
 jap.104.t:0 "[From.GetName] wehrt sich"
 jap.104.d:0 "[From.GetLeader] hat beschlossen, zurückzuschlagen und seine Unabhängigkeit erklärt! Seine Truppen haben die Offensive gestartet!"
 jap.104.a:0 "Mudamudamudamudamudamuda!"
 jap.105.t:0 "[From.GetName] erklärt uns den Krieg"
 jap.105.d:0 "Unsere Aktion hat die Japaner provoziert, [From.GetName] hat uns den Krieg erklärt!"
 jap.105.a:0 "Lasst sie kommen!"
 ## 8/6/2017 ##
 jap.106.t:0 "Unsere alte Hauptstadt"
 jap.106.d:0 "Peking, einst der Sitz des Kaisers, ist nun wieder unter unserer Kontrolle. Wir sollten die Residenz des Kaisers zurück in die Verbotene Stadt verlegen und den Rebellen zeigen, dass wir die Kontrolle über die Zentralebene zurückerlangt haben!"
 jap.106.a:0 "Lang lebe [Root.GetLeader]!"
 jap.107.t:0 "Tod von [Root.GetLeader]"
 jap.107.d:0 "[Root.GetLeader] war sehr lange krank und ist schließlich an Krankheiten gestorben. Nun wird ein neuer Leiter ernannt, der [Root.GetNameDef] beaufsichtigen soll."
 jap.107.a:0 "Was auch immer."
 ## 16/6/2017 ##
 jap.74.t:0 "[JAP.GetName] beitreten?"
 jap.74.d:0 "In der gegenwärtigen Situation haben wir eine wertvolle Gelegenheit, uns vom [CHI.GetAdjective] zu lösen und uns mit dem [JAP.GetAdjective] zu verbünden. Sollten wir jetzt handeln?"
 jap.74.a:0 "Eine solche Chance wird es nicht noch einmal geben."
 jap.74.b:0 "Wir sollten beim [CHI.GetAdjective] bleiben."
 jap.74.c:0 "Die [JAP.GetAdjective] sind schlimmer als die [CHI.GetAdjective]."
 jap.75.t:0 "[From.GetName] möchte sich uns anschließen"
 jap.75.d:0 "Aufgrund ihrer aktuellen Situation hat [From.GetLeader] beschlossen, uns zu kontaktieren und unsere Hilfe zu erbitten, um sich von [CHI.GetAdjective] zu befreien. Im Gegenzug werden sie uns Treue schwören."
 jap.75.a:0 "Interessant"
 jap.75.b:0 "Das erscheint zu verdächtig"
 jap.76.t:0 "[From.GetName] Akzeptiert"
 jap.76.d:0 "[From.GetName] hat unsere Anfrage angenommen!"
 jap.76.a:0 "Bravo!"
 jap.77.t:0 "[From.GetName] Abgelehnt"
 jap.77.d:0 "[From.GetName] hat unsere Anfrage aus nicht genannten Gründen abgelehnt."
 jap.77.a:0 "Verdammt."
 ## 25/8/2017 ##
 jap.109.t:0 "Freundschaftsbeweis"
 ## 24/9/2017 ##
 jap.111.t:0 "Unseren Verbündeten anrufen?"
 jap.111.d:0 "Jetzt, da wir uns mit [SOV.GetNameDef] im Krieg befinden, können wir unsere Verbündeten aufrufen, sich unserer Sache anzuschließen."
 jap.111.a:0 "Fordern Sie ihre Unterstützung an."
 jap.111.b:0 "Wir kommen alleine gut zurecht."
 jap.112.t:0 "[JAP.GetAdjective] Diplomaten"
 jap.112.d:0 "Diplomaten aus [JAP.GetNameDef] sind in [Root.Capital.GetName] eingetroffen, um über ein Bündnis zwischen uns zu sprechen. Wenn das Abkommen zustande kommt, könnten sie uns möglicherweise helfen, wenn wir gegen [SOV.GetNameDef] in den Krieg ziehen."
 jap.112.a:0 "Eine fantastische Idee!"
 jap.112.b:0 "Nein!"
 jap.113.t:0 "Allianz gegründet"
 jap.113.d:0 "Wir haben jetzt mit [GER.GetNameDef] eine Allianz gegen [SOV.GetNameDef] gebildet."
 jap.113.a:0 "Hübsch"
 jap.114.t:0 "[GER.GetNameADJ] Abgelehnt"
 jap.114.d:0 "[GER.GetName] hat unser Angebot zur Bildung einer Allianz abgelehnt."
 jap.114.a:0 "Schade"
 jap.116.t:0 "[From.GetName] bittet um unsere Unterstützung"
 jap.116.d:0 "[From.GetName] hat darum gebeten, dass wir unsere Allianz ehren und uns ihrem Krieg gegen [SOV.GetNameDef] anschließen."
 jap.116.a:0 "Gerne"
 jap.116.b:0 "Wir haben im Moment alle Hände voll zu tun."
 jap.117.t:0 "[From.GetName] Geehrte Allianz"
 jap.117.d:0 "[From.GetName] hat sich unserem Krieg gegen die [SOV.GetAdjective]-Bedrohung angeschlossen!"
 jap.117.a:0 "Fantastisch!"
 jap.118.t:0 "[From.GetName] Dishonored Alliance"
 jap.118.d:0 "[From.GetName] hat sich geweigert, sich unserem Krieg gegen [SOV.GetNameDef] anzuschließen, da sie keine Ressourcen mehr übrig hätten."
 jap.118.a:0 "Verdammt!"
 jap.119.t:0 "Unserem Verbündeten beitreten?"
 jap.119.d:0 "Unser Verbündeter befindet sich jetzt im Krieg mit [SOV.GetNameDef]. Sollen wir unser Bündnis ehren und uns ihrer Sache anschließen?"
 jap.109.d:0 "Unser Verbündeter [JAP.GetName] ist in den Krieg mit [USA.GetNameDef] eingetreten. Wir können uns unseren [JAP.GetAdjective] Freunden anschließen, indem wir [USA.GetName] als Zeichen der Freundschaft den Krieg erklären, im Gegenzug für ihre Unterstützung in unserem aktuellen Krieg mit [SOV.GetNameDef]. Einige Beamte meinen jedoch, dass eine Kriegserklärung an [USA.GetNameDef] möglicherweise nicht im besten Interesse von [Root.GetName] liege."
 jap.109.a:0 "Wir können nur hoffen, dass sie uns im Gegenzug helfen."
 jap.109.b:0 "Wir können keinen Zweifrontenkrieg riskieren!"
 jap.110.t:0 "[From.GetName] erklärt [USA.GetName] den Krieg"
 jap.110.d:0 "Als Zeichen der Freundschaft hat [From.GetName] beschlossen, sich unserem Krieg gegen die Barbaren von [USA.GetName] anzuschließen. Und im Gegenzug haben sie uns um Unterstützung in ihrem Krieg gegen [SOV.GetNameDef] gebeten."
 jap.110.a:0 "Wir werden die [SOV.GetAdjective]-Bedrohung gemeinsam besiegen!"
 jap.110.b:0 "Vielleicht... später?"
 ## 25/9/2017 ##
 jap.108.t:0 "Unsere Puppen"
 jap.108.d:0 "Die große Zahl unserer Marionetten hat zu Verwaltungsproblemen in den jeweiligen Regierungen geführt. Vielleicht sollten wir versuchen, dieses Problem zu lösen, indem wir unserer größeren Marionette erlauben, einige der kleineren zu absorbieren?"
 jap.108.a:0 "Sicher"
 jap.108.b:0 "Zeitverschwendung."
 jap.120.t:0 "Eine Marionette von [JAP.GetName] werden?"
 jap.120.d:0 "Unser ehemaliger Oberherr [CHI.GetName] hat sich [JAP.GetNameDef] ergeben und ist zu seiner Marionette geworden. Jetzt ist es Zeit für uns, unsere Entscheidung zu treffen."
 jap.120.a:0 "Stellt euch in die Reihe..."
 jap.120.b:0 "Wir werden niemals Sklaven sein!"
 jap.121.t:0 "[From.GetName] Rebellen"
 jap.121.d:0 "Nachdem ihr ehemaliger Oberherr [CHI.GetName] den klugen Schachzug gewählt hatte, unsere Marionette zu werden, haben die sturen Wilden von [From.GetName] beschlossen, dass sie unter unserem eisernen Stiefel umkommen werden."
 jap.121.a:0 "Lächerlich."
 jap.122.a:0 "Treten Sie [CHI.GetLeader] bei"
 jap.122.b:0 "Treten Sie [HYQ.GetLeader] bei"
 jap.123.t:0 "Absorbiert werden?"
 jap.123.d:0 "[From.GetName] hat entschieden, dass wir in eine ihrer Marionetten integriert werden sollten, um die Verwaltungskosten zu senken."
 jap.123.a:0 "Wir werden und können keinen Widerstand leisten."
 jap.123.b:0 "Empörend!"
 jap.124.d:0 "Nachdem [From.GetLeader] von unserer Entscheidung erfahren hat, anderen unserer Marionetten zu erlauben, ihr Regime zu übernehmen, hat er beschlossen, unseren Befehl zu missachten und seine eigene Zerstörung herbeizuführen."
 jap.125.t:0 "Das Wang-Jingwei-Regime"
 jap.125.d:0 "[JAP.GetName] hat entschieden, dass ein stärker geeintes Regime erforderlich ist, um die Verwaltungskosten der besetzten chinesischen Gebiete zu senken. Daher wurde Wang Jingwei zum Führer dieses Regimes ernannt. Das bedeutet auch, dass unsere Herrschaft beendet ist, da unser Regime in Wangs Regime aufgeht."
 ## 13/10/2017 ##
 jap.129.t:0 "Die Bedrohung im Fernen Osten"
 jap.129.d:0 "Angesichts der militärischen Erfolge von [GER.GetName] in Europa scheint ein Krieg zwischen ihnen und dem Mutterland unvermeidlich. Darüber hinaus haben sie einen Militärpakt mit [JAP.GetName], der eine große Bedrohung für unsere Interessen und unsere Sicherheit im Fernen Osten darstellt.\n\nDie gute Nachricht ist jedoch, dass [JAP.GetName] unsere militärische Stärke fürchtet und eine direkte Konfrontation mit unseren Streitkräften vermeiden möchte. Wir können dies als Gelegenheit nutzen, einen Zweifrontenkrieg zu vermeiden."
 jap.129.a:0 "Rufen Sie den [JAP.GetAdjective] Außenminister an"
 jap.129.b:0 "Bah! Lesen Sie ein paar Geschichtsbücher und jeder wird wissen, dass Russland unbesiegbar ist!"
 jap.130.t:0 "Nichtangriffspakt mit [From.GetName]?"
 jap.130.d:0 "Unser Außenminister wurde nach [From.Capital.GetName] gerufen, um über einen Nichtangriffspakt zwischen uns zu sprechen. Wenn wir diesen annehmen, hätten wir im Krieg mit anderen europäischen Mächten eine Bedrohung weniger."
 jap.130.a:0 "Unterschreiben Sie es."
 jap.130.b:0 "Dies liegt nicht im Interesse unsererseits!"
 jap.131.t:0 "Sowjetisch-japanischer Neutralitätspakt"
 jap.131.d:0 "[From.GetName] hat den Pakt unterzeichnet, wir können uns jetzt stärker auf die Bedrohung durch [GER.GetAdjective] konzentrieren."
 jap.131.a:0 "Ein Haufen Idioten ..."
 jap.132.t:0 "[From.GetName] lehnt ab"
 jap.132.d:0 "[From.GetName] hat unseren Vorschlag abgelehnt und weigert sich, einen Nichtangriffspakt mit uns einzugehen."
 jap.132.a:0 "Dann werden sie auch der Macht der Roten Armee gegenüberstehen."
 jap.135.d:0 "In Übereinstimmung mit dem kürzlich unterzeichneten sowjetisch-japanischen Neutralitätspakt hat [SOV.GetName] beschlossen, uns keine Militärhilfe mehr zu schicken."
 jap.135.a:0 "Verdammt"
 ## 14/10/2017 ##
 jap.138.t:0 "[SOV.GetNameDef] angreifen?"
 jap.138.d:0 "[SOV.GetNameDef] verliert jetzt den Krieg. Wenn wir ihnen jetzt den Krieg erklären, können wir möglicherweise die reichen Bodenschätze im Fernen Osten und in Sibirien erobern."
 jap.138.a:0 "Aufladung!"
 jap.138.b:0 "Bleiben wir im Moment unter uns."
 jap.139.t:0 "[From.GetName] erklärt [SOV.GetNameDef] den Krieg"
 jap.139.d:0 "Da [SOV.GetNameDef] den Krieg verliert, hat [From.GetNameDef] beschlossen, ihnen den Krieg zu erklären, um ihren Anteil an der Beute einzufordern."
 jap.139.a:0 "Gefräßiger Opportunist."
 jap.140.t:0 "[From.GetName] erklärt uns den Krieg"
 jap.140.d:0 "Da wir den Krieg verlieren, hat [From.GetNameDef] beschlossen, uns den Krieg zu erklären, um seinen Anteil an der Beute einzufordern."
 jap.140.a:0 "Verdammt seien diese gelben Gefahren!"
 jap.141.t:0 "Den [JAP.GetAdjective] angreifen?"
 jap.141.d:0 "Nach der Konferenz von Jalta drängten uns unsere westlichen Verbündeten schon seit geraumer Zeit, [JAP.GetNameDef] den Krieg zu erklären."
 jap.141.a:0 "Greife das [JAP.GetAdjective] an."
 jap.141.b:0 "Daran haben wir kein Interesse."
 jap.142.t:0 "[From.GetName] erklärt uns den Krieg"
 jap.142.d:0 "[From.GetAdjective]-Streitkräfte haben die Grenze überschritten und eine Offensive gegen unsere Truppen in Grenznähe gestartet. Die Kriegserklärung landete kurz darauf auf dem Schreibtisch unseres Premierministers."
 jap.142.a:0 "Alles fällt auseinander!"
 KMT_will_be_requested_to_fight_jap_after_GER_surrender:0 "Es wird ein Ereignis geben, das es Ihnen ermöglicht, [JAP.GetName] den Krieg zu erklären, nachdem [GER.GetName] kapituliert hat.\n"
 ## 17/11/2017 ##
 jap.145.t:0 "[WJW.GetName] Eingerichtet"
 jap.145.d:0 "[WJW.GetNameDef] wurde von [WJW.GetLeader] mit Unterstützung der Japaner gegründet. Einige unserer Generäle sind ebenfalls zu ihnen übergelaufen."
 jap.145.a:0 "Verräter!"
 ## 1/8/2018 ##
 jap.146.t:0 "[JAP.GetName] beitreten?"
 jap.146.d:0 "[CHI.GetName] hat beschlossen, [JAP.GetName] weitere Zugeständnisse zu machen, indem es Nordchina aufgibt. Ihr Einfluss in der Region hat drastisch abgenommen. Wir können dies als Gelegenheit nutzen, uns [JAP.GetName] anzuschließen, ohne dass [CHI.GetAdjective] eingreift."
 jap.146.a:0 "Mach es!"
 jap.146.b:0 "Nicht jetzt."
 jap.147.t:0 "[From.GetName] möchte sich uns anschließen"
 jap.147.d:0 "[From.GetName] hat Vertreter geschickt, die ihren Wunsch zum Ausdruck bringen, in unseren Einflussbereich aufgenommen zu werden."
 jap.147.a:0 "Akzeptabel."
 jap.147.b:0 "Das muss ein böser Plan sein ..."
 jap.148.t:0 "[From.GetName] Akzeptiert"
 jap.148.d:0 "[From.GetName] hat uns in seinen Einflussbereich aufgenommen."
 jap.148.a:0 "Großartig!"
 jap.149.t:0 "[From.GetName] Abgelehnt"
 jap.149.d:0 "[From.GetName] hat unsere Anfrage, sich ihnen anzuschließen, abgelehnt."
 jap.149.a:0 "Das funktioniert nicht wie geplant ..."
 ## 15/3/2018 ##
 jap.150.t:0 "[From.GetName] beschlagnahmt [KMT_land_grabbed.GetName]"
 jap.150.d:0 "Da wir es im aktuellen Bürgerkrieg mit inneren Feinden zu tun haben, hat [From.GetName] diese Gelegenheit genutzt und [KMT_land_grabbed.GetName] besetzt!"
 jap.150.a: "Outrageous!"
 ## 16/3/2018 ##
 jap.151.t:0 "Rache"
 jap.151.d:0 "Jetzt, da wir unsere Freiheit wiedererlangt haben, sollten wir Rache an denen nehmen, die uns in der Vergangenheit unterdrückt haben!"
 jap.151.a:0 "Diesmal ist es an der Zeit, dass wir sie unterwerfen!"
 jap.151.b:0 "Eine schreckliche Idee."
 ## 28/3/2018 ##
 KMT_nice_to_become_dog_tt:0 "\n§GIst außergewöhnlich, dass wir [From.GetName]s Hund werden können§!\n"

 
 
 
 ## news ##
 jap.115.t:0 "[GER.GetName] Abgelehnter [JAP.GetAdjective] Vorschlag"
 jap.115.d:0 "Bei einem kürzlichen Treffen der Außenminister der beiden Großmächte lehnte [GER.GetAdjective] einen [JAP.GetAdjective]-Vorschlag für einen Verteidigungspakt zur Eindämmung der [SOV.GetAdjective]-Bedrohung ab. Man könnte sich fragen, warum [GER.GetName] einen so vorteilhaften Vorschlag ablehnt, da ihre Angrenzung an [SOV.GetNameDef] eine große Bedrohung für die nationale Sicherheit darstellen würde. Andererseits drückte der [JAP.GetAdjective]-Außenminister seine Enttäuschung aus, blieb jedoch hoffnungsvoll für eine zukünftige Zusammenarbeit. \n\nVon [SOV.GetNameDef]s Behörden liegt zu dieser Angelegenheit noch keine Antwort vor."
 jap.115.a:0 "Zan nen da..."
 jap.115.b:0 "Wir haben unsere eigenen Gründe ..."
 jap.115.c:0 "Was für ein erbärmlicher Versuch."
 jap.115.e:0 "Interessante Entwicklung."
 jap.115.f:0 "Wir wollen sicher nicht, dass unser Feind weitere Verbündete gewinnt."
 ## 10/10/2017 ##
 jap.126.t:0 "Einrichtung von [WJW.GetNameDef]"
 jap.126.d:0 "\nMit Unterstützung der [JAP.GetAdjective]-Regierung wurde [WJW.GetLeader] in Nanking als Oberhaupt von [WJW.GetNameDef] mit Sitz in [WJW.Capital.GetName] an die Macht gebracht. Die Marionettenregierung wird bald von [JAP.GetName]s Verbündeten und ihren anderen Marionetten anerkannt, während andere dies nicht tun.\n\n[WJW.GetLeader]s Vorgehen würde von den Chinesen, die noch immer gegen die japanischen Invasoren kämpfen, als Verrat gewertet. Sollte der Krieg mit einer Niederlage Japans enden, könnte er mit schwerwiegenden Konsequenzen rechnen."
 jap.126.a:0 "Japan wird sie alle beherrschen!"
 jap.126.b:0 "Japans Einflussbereich wächst …"
 jap.126.c:0 "Ein weiterer verabscheuungswürdiger Hund der japanischen Barbaren." 
 jap.127.t:0 "[From.GetName] rebelliert gegen [JAP.GetName]"
 jap.127.d:0 "Als [From.GetName] aufgefordert wurde, in eine neue Marionettenregierung integriert zu werden, lehnte er dieses Angebot und die tyrannische Herrschaft von [JAP.GetAdjective] ab. Er stürzte die ehemalige Marionettenregierung und beschloss, in seinem eigenen Namen zu kämpfen, um die japanische Bedrohung loszuwerden."
 jap.127.a:0 "Verräter!"
 jap.127.b:0 "Netter Hinterhältigkeitsversuch!"
 jap.127.c:0 "Ein Wolf, den Sie in Ihrer Nähe halten, wird sich irgendwann gegen Sie wenden."
 jap.127.e:0 "Wir werden niemals Sklaven sein!"
 ## 13/10/2017 ##
 jap.133.d:0 "[JAP.GetNameDef] und [SOV.GetNameDef] haben einen Nichtangriffspakt geschlossen. Dies würde es [SOV.GetNameDef] ermöglichen, ihre militärische Stärke stärker auf [GER.GetAdjective] zu konzentrieren, und für [JAP.GetAdjective] würde dies auch bedeuten, dass sie sich um eine Sache weniger Sorgen machen müssten, wenn sie sich zu weiteren militärischen Aktionen in Asien entschließen sollten."
 jap.133.a:0 "Ein Sieg für uns."
 jap.133.b:0 "Ein Pakt mit dem Teufel."
 jap.133.c:0 "Solch ein Verrat!!"
 jap.133.e:0 "Interessante Entwicklung."
 jap.134.t:0 "[JAP.GetName] hat Nichtangriffspakt mit [SOV.GetName] abgelehnt"
 jap.134.d:0 "\nUm einen möglichen Zweifrontenkrieg zu verhindern, hat [SOV.GetLeader] kürzlich den Außenminister von [JAP.GetName] angerufen, um einen Nichtangriffspakt zwischen den beiden Nationen zu besprechen. [JAP.GetName] hat jedoch alle Bedingungen entschieden zurückgewiesen und erklärt, dass man den Sowjets nicht trauen könne.\n\nDas seit langem bestehende feindselige Verhältnis zwischen den beiden Nationen könnte sich noch weiter verschlechtern."
 jap.134.a:0 "Verdammt seien diese gelben Gefahren!"
 jap.134.b:0 "Wir machen keinen Pakt mit dem Teufel!"
 jap.134.c:0 "Ein erbärmlicher Versuch."
 jap.134.e:0 "Sie werden bald ihre eigene Zerstörung herbeiführen."
 jap.134.f:0 "Möglicherweise eine Fehlkalkulation von [SOV.GetNameDef]."
 jap.136.t:0 "[KMT_SJ_neutrality_broker.GetName] Bruch des sowjetisch-japanischen Neutralitätspakts"
 jap.136.d:0 "\n[KMT_SJ_neutrality_broker.GetName] hat den sowjetisch-japanischen Neutralitätspakt gebrochen, indem er [KMT_SJ_neutrality_attacked.GetName] den Krieg erklärte. [KMT_SJ_neutrality_broker.GetAdjective] Kriegsmaschinen haben die Grenze überschritten und sind in [KMT_SJ_neutrality_attacked.GetAdjective] Gebiete eingedrungen. Obwohl schockiert über [KMT_SJ_neutrality_broker.GetName]s Verrat, hat [KMT_SJ_neutrality_attacked.GetName] begonnen, Truppen zur Verteidigung der [KMT_SJ_neutrality_broker.GetAdjective] Front zu mobilisieren."
 jap.136.a:0 "Wir wussten es!"
 jap.136.b:0 "Wir werden sie begraben!"
 jap.136.c:0 "Dies wird [KMT_SJ_neutrality_attacked.GetName]s Untergang sein!"
 jap.136.e:0 "Hinterhältige Bastarde!"
 jap.136.f:0 "Das könnte unsere Chance sein!"
 jap.136.g:0 "Wir sind die Höchsten!"
 jap.136.h:0 "Das Vertrauen zwischen Giganten ist so dünn wie Papier."
 
 ### decisions ###
 JAP_establish_PGR:0 "Errichtung einer Marionettenregierung in [608.GetName]"
 JAP_establish_PGR_desc:0 "Wir haben nun die volle Kontrolle über [608.GetName], doch die Kontrolle der lokalen Bevölkerung und der Widerstand haben einige unserer Soldaten daran gehindert, an der Front zu kämpfen. Sollten wir dort eine Marionettenregierung etablieren, würde diese uns die Last der Besetzung des Gebiets erleichtern."
 JAP_establish_RGR:0 "Errichtung einer Marionettenregierung in [613.GetName]"
 JAP_establish_RGR_desc:0 "Wir haben nun die volle Kontrolle über [613.GetName], doch die Kontrolle der lokalen Bevölkerung und der Widerstand haben einige unserer Soldaten daran gehindert, an der Front zu kämpfen. Sollten wir dort eine Marionettenregierung etablieren, würde diese uns die Last der Besetzung des Gebiets erleichtern."
 JAP_establish_WJW:0 "Errichtung des Wang-Jingwei-Regimes"
 JAP_establish_WJW_desc:0 "Wang Jingwei, ein linker Kuomintang-Politiker, der für seine pazifistische Haltung im aktuellen Krieg bekannt ist, hat uns mit der Bitte um die Einrichtung einer neuen Regierung in [613.GetName] kontaktiert. Er erklärte, dass seine neue Regierung sich um die Chinesen in den von uns besetzten Gebieten kümmern und unsere Verwaltungskosten für die Besatzung senken würde."
 JAP_dcat_invasion_of_china:0 "Chinesisch-Japanischer Krieg"
 MCK_dcat_restoration_of_qing:0 "Wiederherstellung der Qing-Dynastie"
 MCK_go_back_to_beijing:0 "Kapital verschieben nach [608.GetName]"
 
 
 ### focus ###
 MCK_more_opium_tt:0 "Die Verteilung von Opium in besetzten Gebieten verringert leicht den Kampfeswillen der Einheimischen.\n§YÄndere die mittlere Zeit bis zum Eintreten der Wirkung der Dongbei-Partisanen um x1,25§!\n\n"
 MCK_some_keibigun_tt:0 "5 Kenpeitai werden sich in Hsinking versammeln.\n"
 MCK_contact_white_tt:0 "§RDie RFP könnte unsere Unterstützung bei der Vernichtung der Bolschewiki anfordern, wenn wir erfolgreich unsere Unabhängigkeit erklärt haben.§!"
 MCK_river_force_tt:0 "2 Marines werden sich in Hsinking versammeln."
 MCK_royal_guards_tt:0 "5 Königliche Wachen werden sich in Hsinking versammeln."
 MCK_militias_tt:0 "An verschiedenen Orten erheben sich Milizen."
 MCK_assassination_tt:0 "Einige japanische Beamte werden entlassen."
 MCK_rfr_arm_forces:0 "Einige RFP-Kräfte werden unserer direkten Kontrolle unterstellt.\n"
 MCK_will_join_usa_in_war_against_japan_tt:0 "§YWird uns den USA anschließen, wenn sie oder Japan sich gegenseitig den Krieg erklären.§!"
 MCK_restoration_tt:0 "§YBonuseffekte erscheinen im Abstand von 10 %.§!\n\n"
 MCK_reclaim_central_plain_tt:0 "§YKriegsziel gegen Nationen erreichen, die unsere Kernstaaten im eigentlichen China halten.§!"
 MCK_restore_frontier_tt:0 "§YKriegsziel gegen Nationen erreichen, die unsere Kernstaaten außerhalb des eigentlichen Chinas halten.§!"
 MCK_acquire_the_north_manchu_railway:0 "Erwerben Sie die Nord-Mandschu-Eisenbahn"
 MCK_acquire_the_north_manchu_railway_desc:0 "Obwohl die Nordmandschurische Eisenbahn innerhalb unserer Grenzen liegt, wird sie tatsächlich von den Russen kontrolliert. Glücklicherweise kann dieses Problem mit etwas Geld gelöst werden."
 MCK_five_race_under_one_union:0 "Fünf Rassen unter einer Union"
 MCK_five_race_under_one_union_desc:0 "Angesichts der vielfältigen Ethnizität in unserem Reich können wir sagen, dass unser Prinzip „Fünf Rassen unter einer Union“ angemessen vertreten ist."
 MCK_showa_steel_mill:0 "Showa Steel Work"
 MCK_showa_steel_mill_desc:0 "Showa Steel Work ist ein wichtiger Teil unserer Industrie. Durch weitere Verbesserungen können wir die Gewinne aus den lokalen Eisenvorkommen steigern."
 MCK_support_aikawa_yoshisuke:0 "Unterstützen Sie Aikawa Yoshisuke"
 MCK_support_aikawa_yoshisuke_desc:0 "Der japanische Industrielle Aikawa Yoshisuke schlägt einen Plan zur Schaffung eines staatlich kontrollierten Industrieunternehmens vor, um die mandschukuische Industrie zu verbessern. Dies steht im Gegensatz zu Hoshino Naokis syndikalistischer Vision, bei der das Militär Monopole von einem Unternehmen pro Branche zuweist."
 MCK_support_naoki_hoshino:0 "Unterstütze Hoshino Naoki"
 MCK_support_naoki_hoshino_desc:0 "Hoshino Naoki hat eine syndikalistische Zukunft für unsere Industrie geplant, in der das Militär Monopole für jeweils ein Unternehmen pro Branche zuteilen würde. Ein solcher Plan würde dem Militär große Vorteile bringen, der zivile Sektor wird jedoch ignoriert."
 MCK_manchurian_industrial_development_company:0 "Mangyo"
 MCK_manchurian_industrial_development_company_desc:0 "Manshu Jukogyo Kaihatsu Kabushiki Kaisha (Mandschurische Gesellschaft für industrielle Entwicklung), kurz Mangyo, ist ein Zaibatsu, das auf Betreiben der Kaiserlich Japanischen Armee gegründet wurde, um die Industrialisierung Mandschukuos voranzutreiben und das Land insbesondere in der strategischen Schwerindustrie autark zu machen."
 MCK_finish_the_five_year_plan:0 "Beenden Sie den Fünfjahresplan"
 MCK_finish_the_five_year_plan_desc:0 "Unser zweiter Fünfjahresplan war erfolgreich, wir müssen uns nur noch ein wenig mehr anstrengen, dann wird unsere Branche in kürzester Zeit boomen."
 MCK_increase_opium_production:0 "Steigerung der Opiumproduktion"
 MCK_increase_opium_production_desc:0 "Für die Menschen ist Opium ein zweischneidiges Schwert. Wir können jedoch die zum Feind gerichtete Schneide schärfen, um den Profit zu steigern, den wir aus den Plantagen ziehen."
 MCK_request_zaibatsu_investment_on_military_industry:0 "Zaibatsu investiert in die Militärindustrie"
 MCK_request_zaibatsu_investment_on_military_industry_desc:0 "Mit der Finanzierung durch Zaibatsu können wir unsere Branche in die von uns gewünschte Richtung weiter ausbauen."
 MCK_request_zaibatsu_investment_on_industry:0 "Zaibatsu investiert in die Industrie"
 MCK_request_zaibatsu_investment_on_industry_desc:0 "Dank der Finanzierung durch Zaibatsu hat sich unsere Industrie nun in jeder Hinsicht verbessert."
 MCK_aluminium_deposit_in_liaoning:0 "Aluminiumlagerstätte in Liaoning"
 MCK_aluminium_deposit_in_liaoning_desc:0 "Bei einer kürzlich durchgeführten Prospektion wurde in Liaoning ein großes Vorkommen an Aluminiummineralien entdeckt. Diese Nachricht wird sicherlich weitere Investoren aus Japan anlocken und unserer Industrie weiteren Auftrieb verleihen."
 MCK_manchu_society_for_light_metal:0 "Mandschurische Gesellschaft für Leichtmetall"
 MCK_manchu_society_for_light_metal_desc:0 "Um die Aluminiumlagerstätte in Liaoning bestmöglich auszubeuten, soll eine eigene Gruppe zur Gewinnmaximierung gegründet werden."
 MCK_prepare_for_war:0 "Bereite dich auf den Krieg vor"
 MCK_prepare_for_war_desc:0 "Angesichts der zunehmenden Spannungen in unserer Umgebung sind Kriege vorprogrammiert. Unsere Nation muss auf das vorbereitet sein, was danach kommt, sei es um zu überleben oder um sich unseren Anteil an der Beute zu sichern."
 MCK_for_the_emperor:0 "Für den Kaiser"
 MCK_for_the_emperor_desc:0 "Unsere Soldaten kämpfen im Namen unseres glorreichen und geliebten Kaisers, unser Sieg ist gesichert!"
 MCK_expand_military_district:0 "Militärbezirk erweitern"
 MCK_expand_military_district_desc:0 "Durch die Vergrößerung der Militärbezirke können wir die Sicherheit vor Ort mit unserem Militär weiter erhöhen."
 MCK_kantogun_advisor:0 "Berater der Kwantung-Armee"
 MCK_kantogun_advisor_desc:0 "Die in Mandschukuo stationierten Offiziere der Kwantung-Armee verfügen über umfangreiche Erfahrung, die unser Militär verbessern könnte. Die Einstellung eines solchen Offiziers als Militärberater würde unserem Militär große Vorteile bringen und unsere Beziehungen zu Japan stärken."
 MCK_enhance_local_policing:0 "Stell dich den Guerillas"
 MCK_enhance_local_policing_desc:0 "Da der Großteil der Kwantung-Armee im Süden mobilisiert wurde, um im Krieg gegen die Chinesen zu helfen, ist die Effizienz bei der Vernichtung der Guerillas gesunken. Wir müssen zu Ende bringen, was die Kwantung-Armee hinterlassen hat."
 MCK_an_alternative:0 "Eine Alternative"
 MCK_an_alternative_desc:0 "Da der Großteil der Kwantung-Armee im Süden mobilisiert wurde, um im Krieg gegen die Chinesen zu helfen, bietet uns diese Gelegenheit, die Sache selbst in die Hand zu nehmen."
 MCK_contact_qing_restorationists:0 "Kontakt Qing Restorationists"
 MCK_contact_qing_restorationists_desc:0 "Einige der Überreste der ehemaligen Qing-Dynastie träumen noch immer vom Tag des Gegenschlags des Kaiserreichs. Vielleicht scheint dieser Tag, von dem sie träumen, nicht mehr so weit entfernt."
 MCK_contact_russian_fascists:0 "Kontakt Die RFP"
 MCK_contact_russian_fascists_desc:0 "Nachdem es der Weißen Bewegung nicht gelungen war, den bolschewistischen Unrat der Oktoberrevolution zu beseitigen, flüchteten zahlreiche ehemalige Mitglieder in unser Land. Diese weißen Emigranten gründeten bald ihre eigenen Parteien, von denen die Russische Faschistische Partei die mächtigste war. Ihre Stärke könnte für unseren Plan, uns von Japan zu befreien, von großem Nutzen sein."
 MCK_national_conscription:0 "Wehrpflicht"
 MCK_national_conscription_desc:0 "Mit der geringen Anzahl an Offizieren in unserem Militär können wir uns nicht gegen Bedrohungen aus anderen Ländern, insbesondere den Bolschewiken aus dem Norden, verteidigen. Zum Schutz unserer Nation und unseres Volkes soll zum Wohle der Allgemeinheit ein strengeres Wehrpflichtgesetz eingeführt werden."
 MCK_labour_service_corps:0 "Arbeitsdienstkorps"
 MCK_labour_service_corps_desc:0 "Nicht alle Erwachsenen können die Wehrpflicht erfüllen, aber sie würden nicht einfach so eingezogen werden."
 MCK_manchukuo_imperial_air_force:0 "Kaiserliche Luftwaffe"
 MCK_manchukuo_imperial_air_force_desc:0 "Angesichts der zunehmenden Bedeutung der Luftkriegsführung muss unser Land die Kunst dieser Kriegsführung beherrschen."
 MCK_river_force:0 "Flusskraft"
 MCK_river_force_desc:0 "Da sich die japanische Marine anderweitig umsah, ist unsere Flusspatrouille überflüssig geworden. Die japanische Armee übernahm die Kontrolle über die Streitkräfte und benannte sie in Flussstreitkräfte um, die nun Teil der Armee sind."
 MCK_a_self_sufficient_army:0 "Ein autarkes Militär"
 MCK_a_self_sufficient_army_desc:0 "Da unser Militär in jeder Hinsicht verbessert wurde, kann es nun die schwere Aufgabe der Verteidigung der Einheimischen übernehmen. Es ist nicht länger auf die Kwantung-Armee angewiesen."
 MCK_establish_hoankyoku:0 "Gründung von Hoankyoku"
 MCK_establish_hoankyoku_desc:0 "Um die Sicherheit vor Ort weiter zu erhöhen, ist ein Geheimdienst erforderlich, der alle Übertragungen überwacht, die möglicherweise subversive Informationen enthalten."
 MCK_fotify_heilungkiang_border:0 "Zerstöre die Guerillas"
 MCK_fotify_heilungkiang_border_desc:0 "Es ist Zeit, dass wir die Guerilla ein für alle Mal ausrotten."
 MCK_spread_restoration_propaganda:0 "Verbreiten Sie restauratorische Propaganda"
 MCK_spread_restoration_propaganda_desc:0 "Unter der Aufsicht des japanischen Militärs wissen nur wenige unserer Bürger von der Existenz restaurativer Gruppen. Jetzt bietet sich die Gelegenheit, diese Propaganda an mehr Menschen zu verbreiten, bevor die japanische Regierung sie unter Kontrolle bringt."
 MCK_sow_anti_japanese_sentiment:0 "Säen Sie antijapanische Stimmung"
 MCK_sow_anti_japanese_sentiment_desc:0 "Wenn unser Volk weiterhin glaubt, dass die Japaner die Retter sind, wird der Plan zur Wiederherstellung unseres einst so glorreichen Reiches zweifellos auf einige Hindernisse stoßen. Die Verbreitung von Informationen, die das Image Japans schädigen, kann Abhilfe schaffen."
 MCK_strengthen_the_royal_guard:0 "Verstärken Sie die königliche Wache"
 MCK_strengthen_the_royal_guard_desc:0 "Die königliche Garde ist die engste Bewachung des Kaisers und seiner Verwandten. Ihre Ausstattung mit modernerer Ausrüstung wird der Öffentlichkeit die Autorität des Kaisers demonstrieren. "
 MCK_coronation:0 "Das Imperium kehrt zurück"
 MCK_coronation_desc:0 "Die Zeit ist gekommen, das glorreiche Reich soll nicht länger die Marionette der niederträchtigen Japaner sein!"
 MCK_destroy_opium_plantations:0 "Zerstöre Opiumplantagen"
 MCK_destroy_opium_plantations_desc:0 "Opium hat den Menschen mehr geschadet als genützt, dieses Ungeziefer muss ein für alle Mal ausgerottet werden!"
 MCK_assassination_of_japanese_officials:0 "Ermordung japanischer Beamter"
 MCK_assassination_of_japanese_officials_desc:0 "Lokale japanische Beamte stellen eine Bedrohung für den Restaurierungsplan dar. Um das Risiko einer Gefährdung des Plans zu minimieren, müssen sie beseitigt werden."
 MCK_arm_the_rfr:0 "Bereiten Sie die RFP vor"
 MCK_arm_the_rfr_desc:0 "Die RFP hat sich bereit erklärt, bei der Restaurierung zu helfen. Im Gegenzug stellen wir ihnen die notwendige Ausrüstung zur Verfügung."
 MCK_independence_war:0 "Unabhängigkeitskrieg"
 MCK_independence_war_desc:0 "Die Zeit ist gekommen, unsere Armee wird jede japanische Präsenz in unserem geliebten Land beseitigen!"
 MCK_turn_to_the_bolshelviks:0 "Wenden Sie sich an die Bolschewiki"
 MCK_turn_to_the_bolshelviks_desc:0 "Obwohl es unerwünscht ist, bleibt uns nur die Möglichkeit, die Bolschewiki um Hilfe zu bitten, um unsere Unabhängigkeit zu fördern."
 MCK_head_towards_democracy:0 "Auf dem Weg zur Demokratie"
 MCK_head_towards_democracy_desc:0 "Die Erfahrungen der späten Qing-Dynastie zeigen, dass ein Mangel an Demokratie letztlich zum Untergang einer Nation führt. Dieser Fehler darf nicht wiederholt werden."
 MCK_turn_over_the_rfr:0 "Übergeben Sie die RFP"
 MCK_turn_over_the_rfr_desc:0 "Die Sowjetunion forderte, dass die weißen Emigranten in unserem Land ihnen zur „Rehabilitierung“ übergeben werden. Wenn wir nicht kooperieren, werden wir unsere Unabhängigkeit möglicherweise nie erlangen."
 MCK_manzhouli_secret_meeting:0 "Geheimtreffen in Manzhouli"
 MCK_manzhouli_secret_meeting_desc:0 "In Manzhouli wird ein geheimes Treffen mit sowjetischen Vertretern stattfinden. Wir können diese Gelegenheit nutzen, um die kommunistischen Guerillas zum Rückzug aufzufordern."
 MCK_soviet_intervention:0 "Sowjetische Intervention"
 MCK_soviet_intervention_desc:0 "Zum vereinbarten Termin können wir die Sowjets nun auffordern, zu handeln und sich aus den Fesseln der Japaner zu befreien."
 MCK_secret_aid_from_usa:0 "Geheime Hilfe aus den USA"
 MCK_secret_aid_from_usa_desc:0 "Um unsere Bemühungen zu unterstützen, haben die USA geheime Wissenschaftlergesandte entsandt, die unseren wissenschaftlichen Fortschritt fördern sollen."
 MCK_call_usa_to_act:0 "Rufen Sie die USA zum Handeln auf"
 MCK_call_usa_to_act_desc:0 "Wir können nicht länger warten, wir müssen die USA auffordern, Maßnahmen zu ergreifen, um uns von den bösartigen Japanern zu befreien!"
 MCK_secret_protocol:0 "Geheimprotokoll"
 MCK_secret_protocol_desc:0 "Der Krieg zwischen Japan und den USA wird für uns eine unschätzbar wertvolle Gelegenheit zur Erlangung unserer Unabhängigkeit sein, wir müssen darauf vorbereitet sein."
 MCK_fighter_focus:0 "Kämpferfokus"
 MCK_fighter_focus_desc:0 "Luftkämpfe haben im Ersten Weltkrieg noch nicht stattgefunden. Wenn wir bei der Entwicklung von Kampfflugzeugen die Nase vorn haben, werden wir auch in Zukunft einen Vorteil haben."
 MCK_bomber_focus:0 "Bomberfokus"
 MCK_bomber_focus_desc:0 "Wenn die Menschen in Zukunft vom Schrecken der heutigen Kriege sprechen, wird Feuer, das vom Himmel regnet, eine zentrale Rolle spielen. Wir werden unser Bestes tun, um sicherzustellen, dass diese Geschichten auch von unseren Feinden erzählt werden."
 MCK_aviation_effort_2:0 "Luftfahrtbemühungen II"
 MCK_aviation_effort_2_desc:0 "Um unsere Luftwaffe gut in andere Zweige des Militärs zu integrieren, sind weitere Fortschritte in der Luftfahrt erforderlich."
 MCK_CAS_effort:0 "CAS-Aufwand"
 MCK_CAS_effort_desc:0 "Eine moderne Armee benötigt nicht nur am Boden, sondern auch in der Luft die Unterstützung durch Fahrzeuge."
 MCK_NAV_effort:0 "NAV-Aufwand"
 MCK_NAV_effort_desc:0 "So wie die neue Seekriegsführung teilweise unter der Wasseroberfläche stattfindet, findet ein Teil davon in der Luft über dem Wasser statt."
 MCK_naval_effort:0 "Marinebemühungen"
 MCK_naval_effort_tt:0 "Nicht genügend Bauplätze für §YNaval Dockyards§!"
 MCK_naval_effort_desc:0 "Der Ausbau unserer Marine sollte unsere oberste Priorität sein. Alle verfügbaren Ressourcen sollten für neue Werften und die Erforschung leichter Überwasserschiffe eingesetzt werden."
 MCK_flexible_navy:0 "Flexibles Marineblau"
 MCK_flexible_navy_desc:0 "Durch die Neugestaltung der Seekriegsführung unter Berücksichtigung der Fortschritte in der U-Boot-Technologie können wir feindliche Konvois effizient bekämpfen."
 MCK_large_navy:0 "Große Marine"
 MCK_large_navy_desc:0 "Die Anpassung unserer Marinedoktrinen an große Schiffe und die Gewährleistung der Sicherheit unserer Handelskonvois wird uns viel darüber beibringen, welche Art von Schiffen wir benötigen."
 MCK_submarine_effort:0 "U-Boot-Anstrengungen"
 MCK_submarine_effort_desc:0 "Der U-Boot-Krieg ist die spannendste Entwicklung in der Marine seit der Erfindung des Torpedoboots. Wir tun gut daran, uns nicht nur vor U-Booten zu schützen, sondern sie auch gegen feindliche Schiffe einzusetzen."
 MCK_cruiser_effort:0 "Kreuzeraufwand"
 MCK_cruiser_effort_desc:0 "Bevor wir uns auf die Erforschung fortgeschrittener Schlachtschiffe konzentrieren können, müssen die kleineren Kreuzer ersetzt werden."
 MCK_destroyer_effort:0 "Zerstörer-Anstrengung"
 MCK_destroyer_effort_desc:0 "Durch die Untersuchung der Konstruktion und des strategischen Einsatzes von U-Booten haben wir auch gelernt, wie wir diesen Strategien entgegenwirken können. Zerstörer werden dabei eine entscheidende Rolle spielen."
 MCK_capital_ships_effort:0 "Großkampfschiff-Anstrengung"
 MCK_capital_ships_effort_desc:0 "Die Nation mit den meisten Schlachtschiffen wird die Weltmeere beherrschen. Schlachtschiffe und Flugzeugträger repräsentieren die alte und die neue Seeüberlegenheit."
 MCK_restore_the_empire:0 "Das Imperium wiederherstellen"
 MCK_restore_the_empire_desc:0 "Der verräterische Yuan Shi-kai brachte den Kaiser während der Xinhai-Revolution durch eine List zur Abdankung und die Gebiete gingen an die abscheuliche Republik China verloren. Nach der Rückkehr des Kaiserreichs sollen diese Gebiete nun ihrem rechtmäßigen Besitzer zurückgegeben werden!"
 MCK_peking_agreement:0 "Zufrieden mit dem Status Quo"
 MCK_peking_agreement_desc:0 "Die während der Xinhai-Revolution verlorenen Gebiete zurückzuerobern, wäre eine unkluge Entscheidung. Eine solche Entscheidung würde der Bevölkerung mehr schaden als nützen."
 MCK_reclaim_the_central_plain:0 "Erobern Sie die Zentralebene zurück"
 MCK_reclaim_the_central_plain_desc:0 "Der erste Schritt zur Wiederherstellung des Reiches besteht darin, die Kontrolle über die Zentralebene zurückzugewinnen. Von dort aus sollen zukünftige Pläne um sie herum entworfen werden."
 MCK_restore_the_old_frontier:0 "Stellen Sie die alte Grenze wieder her"
 MCK_restore_the_old_frontier_desc:0 "Nachdem die Zentralebene nun unter Kontrolle ist, besteht der nächste Schritt des Plans darin, die verlorenen Außengebiete zurückzugewinnen."
 MCK_offer_vassalisation:0 "Angebot Vasallisierung"
 MCK_offer_vassalisation_desc:0 "Dank der enormen Macht des Kaiserreichs haben die umliegenden kleineren Nationen die Chance, vom Großen Qing beschützt zu werden. Es wäre für sie eine Ehre, Teil des Kaiserreichs zu sein."
 MCK_revive_zongli_yamen:0 "Belebe Zongli Yamen wieder"
 MCK_revive_zongli_yamen_desc:0 "Die Zongli Yamen war eine Organisation, die sich hauptsächlich um die Außenpolitik und den technologischen Fortschritt des Qing-Reiches kümmerte. Um mit den westlichen Mächten konkurrieren zu können, ist die Zongli Yamen ein unverzichtbarer Bestandteil."
 MCK_revive_the_grand_council:0 "Beleben Sie den Großen Rat wieder"
 MCK_revive_the_grand_council_desc:0 "Der Große Rat wurde mit der Gründung des erfolglosen „Königlichen Kabinetts“ aufgelöst. Dieses wichtige Gremium des Reiches soll wiederbelebt werden und erneut zum Ruhm des Großen Qing-Reiches beitragen."
 MCK_xuantong_restoration:0 "Xuantung-Restaurierung"
 MCK_xuantong_restoration_desc:0 "Die Macht des Imperiums ist nicht mehr so groß wie früher. Es bedarf einer Restaurationsbewegung, die der Welt zeigt, dass das Imperium eine Macht ist, mit der man rechnen muss."
 MCK_subjugate_japan:0 "Japan unterwerfen"
 MCK_subjugate_japan_desc:0 "Die Japaner werden für die Demütigung bezahlen, die sie uns zugefügt haben. Wir werden sie in die Knie zwingen!"
 MCK_industrial_effort:0 "Bauaufwand"
 MCK_industrial_effort_desc:0 "Konzentrieren Sie alle unsere politischen Anstrengungen darauf, die zivile Industrie mit einem großen Sprung nach vorne aufzubauen."
 MCK_industrial_effort_2:0 "Baumaßnahme II"
 MCK_industrial_effort_2_desc:0 "Durch den weiteren Ausbau unserer Fabriken können wir die Produktion von Waren für den Handel und weitere Bauvorhaben beschleunigen."
 MCK_infrastructure_effort:0 "Infrastrukturaufwand"
 MCK_infrastructure_effort_desc:0 "Ein Land ohne angemessene Infrastruktur kann keine fortschrittlichen Projekte oder Bauvorhaben durchführen."
 MCK_armament_effort:0 "Rüstungsanstrengungen"
 MCK_armament_effort_desc:0 "Wer Traktoren bauen kann, kann auch Panzer bauen! Wir dürfen nicht zulassen, dass unsere militärische Produktionskapazität zurückbleibt."
 MCK_armament_effort_2:0 "Rüstungsanstrengung II"
 MCK_armament_effort_2_desc:0 "Der Versuch, zivile Fabriken für die Produktion militärischer Ausrüstung umzurüsten, ist ineffizient. Wir sollten uns jetzt auf die Vorbereitung der Rüstungsproduktion konzentrieren."
 MCK_prospect_for_resources:0 "Suche nach Ressourcen"
 MCK_prospect_for_resources_desc:0 "Wenn wir autark sein wollen, müssen wir die uns zur Verfügung stehenden Ressourcen nutzen, um eine starke Wirtschaft aufrechtzuerhalten."
 MCK_national_defence_forces:0 "Nationale Verteidigungsstreitkräfte"
 MCK_national_defence_forces_desc:0 "Obwohl wir in der heutigen Welt eine neutrale Haltung einnehmen, tun andere dies möglicherweise nicht. Um unsere wertvolle Nation und die Bevölkerung zu schützen, ist ein starkes Militär erforderlich."
 MCK_national_defence_forces:0 "Nationale Verteidigungsstreitkräfte"
 MCK_national_defence_forces_desc:0 "Obwohl wir in der heutigen Welt eine neutrale Haltung einnehmen, tun andere dies möglicherweise nicht. Um unsere wertvolle Nation und die Bevölkerung zu schützen, ist ein starkes Militär erforderlich."
 MCK_extra_research_slot:0 "Zusätzlicher Forschungsplatz"
 MCK_extra_research_slot_desc:0 "Unsere industrielle Expansion und andere aktuelle Fortschritte könnten es uns ermöglichen, parallel mehr Forschung und Entwicklung durchzuführen."
 MCK_expand_university:0 "Universität erweitern"
 MCK_expand_university_desc:0 "Der Ausbau unserer Universität wird mit Sicherheit mehr gebildete Bürger hervorbringen und so zum wissenschaftlichen Fortschritt unseres Landes beitragen."
 MCK_extra_research_slot_2:0 "Zusätzlicher Forschungsplatz II"
 MCK_extra_research_slot_2_desc:0 "Die schnelle Industrialisierung unseres Landes hat neue Möglichkeiten in Forschung und Entwicklung eröffnet, die wir nutzen sollten."
 MCK_acquire_kanto_shu:0 "Erwerben Sie Kanto-Shu"
 MCK_acquire_kanto_shu_desc:0 "Die japanischen Behörden sind zu sehr auf den Krieg mit den Chinesen konzentriert und versuchen, Kanto-shu an uns zu übertragen, um den Druck der gesetzgeberischen Macht zu verringern. Wir könnten dabei auch einen wichtigen Hafen gewinnen."
 MCK_send_cadets_to_japan:0 "Schicken Sie Kadetten nach Japan"
 MCK_send_cadets_to_japan_desc:0 "Da es in unserem Land keine Militärakademien gibt, mangelt es unseren Offizieren an Erfahrung. Um diese Situation zu verbessern, können wir sie an japanische Akademien auf den Heimatinseln schicken."
 MCK_reform_command_structure:0 "Reform der Kommandostruktur"
 MCK_reform_command_structure_desc:0 "Unsere derzeitige Kommandostruktur ist nicht sehr effizient und könnte einige Reformen vertragen."
 MCK_naval_expansion_permission:0 "Genehmigung zur Marineerweiterung"
 MCK_naval_expansion_permission_desc:0 "Jetzt, da wir Kanto-shu unter unserer Kontrolle haben, könnten wir eine starke Marine zu seinem Schutz gebrauchen."
 MCK_soviet_advisor:0 "Sowjetischer Militärberater"
 MCK_soviet_advisor_desc:0 "Wir können viel von der Sowjetunion lernen, zum Beispiel von ihrem Militär."
 MCK_resist:0 "Widerstand gegen den Kommunismus"
 MCK_resist_desc:0 "Wenn wir zulassen, dass der Kommunismus in unserer Gesellschaft Fuß fasst, wird die Demokratie zugrunde gehen. Wir dürfen nicht zulassen, dass sich die Pest auf uns ausbreitet!"
 MCK_if_aikawa:0 "\n§MIf§! §YAikawa Yoshisuke§! §Mis in der Regierung, gewähre auch die folgende Wirkung :§!\n"
 MCK_if_naoki:0 "\n§MIf§! §YHoshino Naoki§! §Mis in der Regierung, gewähren Sie auch die folgende Wirkung :§!\n"
 MCK_if_aikawa_random_ic_in_state:0 "Baue §Y1 Zivile Fabrik§! in einem zufälligen, kontrollierten Zustand.\n"
 MCK_if_naoki_random_af_in_state:0 "Baue §Y1 Militärfabrik§! in einem zufälligen, kontrollierten Zustand.\n"
 MCK_industrial_effort_3:0 "Baumaßnahme III"
 MCK_industrial_effort_3_desc:0 "Durch den Ausbau unseres Infrastrukturnetzes haben wir unsere Baukapazitäten deutlich verbessert."
 MCK_if_aikawa_random_ic_infra_in_state:0 "Baue §Y1 Zivile Fabrik§! und §Ymaximale Infrastruktur§! in einem zufälligen, kontrollierten Staat.\n"
 MCK_industrial_developement:0 "Industrielle Anstrengungen"
 MCK_industrial_developement_desc:0 "Die industrielle Kapazität darf nicht unterschätzt werden, wenn weltweit ein Krieg droht."
 MCK_if_naoki_s:0 "\n§MIf§! §YHoshino Naoki§! §Mis in der Regierung, gewähren Sie auch die folgenden Effekte :§!\n"
 MCK_confront_guerillas_tt:0 "§YDie Konfrontation mit den Guerillas wird bald beginnen.§!\n\n"
 MCK_has_partisan_tt:0 "Hat Nationalgeist §YDongbei-Partisanen§!"
 MCK_no_partisan_tt:0 "Hat keinen Nationalgeist §YDongbei Partisanen§!"
 MCK_secret_recuitment:0 "Geheime Rekrutierung"
 MCK_secret_recuitment_desc:0 "Wenn wir offen zusätzliche Leute für das Militär rekrutieren, könnte dies den Verdacht der Japaner erregen. Deshalb muss es geheim gehalten werden."
