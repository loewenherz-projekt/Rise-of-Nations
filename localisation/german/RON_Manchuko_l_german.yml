 MCK_mangyo_idea_desc:0 "Manshu Jukogyo Kaihatsu Kabushiki Kaisha (Mandschurische Gesellschaft für industrielle Entwicklung), kurz Mangyo, ist ein Zaibatsu, das auf Betreiben der Kaiserlich Japanischen Armee gegründet wurde, um die Industrialisierung Mandschukuos voranzutreiben und das Land insbesondere in der strategischen Schwerindustrie autark zu machen."
