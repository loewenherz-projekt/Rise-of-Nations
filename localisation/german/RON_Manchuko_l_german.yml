 MAN_great_hsi_ku_arsenal:0 "Großes Hsi-Ku-Arsenal"
 MAN_great_hsi_ku_arsenal_desc:0 "Das Große Hsi-Ku-Arsenal war ein kaiserliches Arsenal der Qing-Dynastie, in dem Munition, Gewehre und Millionen Schuss Munition gelagert wurden. Die Anlage wurde von kaiserlichen Truppen der Qing-Dynastie mit Gewehren und Krupp-Feldgeschützen bewacht, die als Verteidigungsbatterien montiert waren. Von nun an wird es überprüft und modernisiert und produziert die modernsten Waffen für unsere neue kaiserliche Armee."

 ##### PACIFY BRANCH
 MAN_pacify_the_countryside_EXPL:0 "   Kümmern Sie sich um die Banditen in Machuria.\n Beseitigen Sie den Nationalgeist des §HBanditentums§!"

 MAN_promote_experienced_colonels:0 "Befördern Sie erfahrene Oberste"
 MAN_promote_experienced_colonels_EXPL:0 "Erhalte §H3§! ausgebildete §HGeneräle§!.\n"
 MAN_promote_experienced_colonels_desc:0 "Uns fehlen einige ausgebildete Generäle, daher können wir erfahrene Oberste befördern, um diese Positionen einzunehmen."
 MAN_reuse_old_firearms:0 "Alte Schusswaffen wiederverwenden"
 MAN_reuse_old_firearms_desc:0 "Auch wenn wir vielleicht nicht über die neuesten Waffenmodelle verfügen, können wir dennoch einige alte Reste verwenden."
 MAN_lower_the_army_incompetence:0 "Die Inkompetenz der Armee verringern"
 MAN_lower_the_army_incompetence_desc:0 "Unsere Armee ist den meisten Aufgaben nicht gewachsen, und wir können uns nicht nur auf die Japaner verlassen. Unsere Armee muss bald verstärkt werden, sonst verlieren wir jede Schlacht, die wir schlagen."
 
 MAN_electronic_development:0 "Elektronikentwicklung"
 MAN_electronic_development_desc:0 "Wir können uns nicht nur auf die einfachsten Industrien und die Landwirtschaft verlassen, Mandschukuo muss auch seine elektronischen Technologien entwickeln."
 MAN_export_the_goods:0 "Exportieren Sie die Waren"
 MAN_export_the_goods_desc:0 "In unserer Situation kann der Export von Waren ein Segen für unsere Wirtschaft sein, und auch unsere japanischen Freunde werden davon profitieren."
 
 ##### OBEDIENCE BRANCH
 MAN_guided_by_the_japanese_empire:0 "Geleitet vom japanischen Kaiserreich"
 MAN_guided_by_the_japanese_empire_EXPL:0 "\nDurch das Abschließen dieses Fokus wird der Fokuszweig „§HDas Mandschurische Projekt§!“ für [JAP.GetFlag]§H[JAP.GetName]§! §C entsperrt§!."
 MAN_guided_by_the_japanese_empire_desc:0 "Im kommenden Sturm ist Japan unser einziger Freund und unsere einzige Möglichkeit, ihn zu überstehen. Japan wird unsere glorreiche Nation durch die dunkelsten Zeiten führen!"
 
 MAN_airforce_expansion_program:0 "Programm zur Erweiterung der Luftwaffe"
 MAN_airforce_expansion_program_desc:0 "Unsere japanischen Freunde können uns beim Aufbau unserer eigenen Luftwaffe helfen und uns so zu einem noch wertvolleren Verbündeten machen."
 
 MAN_Zaibatsus:0 "Manchokuoan Zaibatsu-Reich"
 MAN_Zaibatsus_desc:0 "Die japanischen „Zaibatsu“, die Industriekonglomerate, können unsere wirtschaftliche Entwicklung vorantreiben."
 
 ##### FOUNDATIONS OF AUTONOMOUS STATE BRANCH
 MAN_lay_the_foundations_of_autonomous_state:0 "Legen Sie die Grundlagen für einen autonomen Staat"
 MAN_lay_the_foundations_of_autonomous_state_desc:0 "Mandschukuo kann sich nicht in allem auf die Japaner verlassen, wir müssen die Grundlagen für eine Autonomie Mandschukuos legen."
 MAN_claim_japanese_air_technology:0 "Anspruch auf japanische Lufttechnologie"
 MAN_claim_japanese_air_technology_EXPL:0 "Technologie hinzufügen: §HType 91§! Leichter Jäger.\nTechnologie hinzufügen: §HG3M Rikko§! Mittlerer Bomber."
 MAN_claim_japanese_air_technology_desc:0 "Wir können die Lufttechnologien unseres Meisters nutzen, um unsere eigene Luftwaffe aufzubauen."
 MAN_reduce_dependence_on_the_kwantung_army:0 "Reduzieren Sie die Abhängigkeit von der Kwantung-Armee"
 MAN_reduce_dependence_on_the_kwantung_army_desc:0 "Die Kwantung-Armee, eine japanische Sicherheitstruppe im Kwantung-Pachtgebiet und in der Mandschurei, kontrolliert de facto unser gesamtes Territorium. Unsere Abhängigkeit von ihr schadet unserer Wirtschaft, unserem Militär und unserem nationalen Ansehen. Deshalb müssen wir sie reduzieren."
 MAN_use_former_japanese_arsenals:0 "Nutzen Sie ehemalige japanische Arsenale"
 MAN_use_former_japanese_arsenals_desc:0 "Nachdem wir die Kontrolle der Kwantung-Armee in der Region verringert haben, können wir ihre ehemaligen Arsenale nutzen."
 
