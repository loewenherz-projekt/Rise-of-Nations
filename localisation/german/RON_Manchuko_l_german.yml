 ### AISIN GIORO PUYI
 MAN_puyi_T1:0 "Gehungge Yoso Hūwangdi"
 MAN_puyi_T2:0 "Unberechenbar"
 MAN_puyi_T3:0 "Paranoid"
 MAN_puyi_T4:0 "Bloße japanische Puppe"
 MAN_puyi_T5:0 "Symbol eines Imperiums"
 umc_aisin_gioro_puyi_desc:0 "Der letzte chinesische Kaiser, Xuantong, wurde am 7. Februar 1906 geboren. Nach der Xianhai-Revolution im Februar 1912 trat er zurück und verzichtete auf seine Rechte als Qing-Kaiser. Obwohl Kriegsherr Zhang Xun 1917 eine kurzzeitige Wiedereinsetzung seines Amtes erwirkte, blieb diese praktisch erfolglos. Er lebte in der Verbotenen Stadt, die durch die „Artikel der günstigen Behandlung“ garantiert war, bis Kriegsherr Feng Yuxiang 1924 die Kontrolle über Peking übernahm und den Artikel einseitig revidierte. Puyis kaiserlicher Titel und seine Privilegien wurden abgeschafft und er wurde zu einem Privatbürger der Republik China degradiert. Puyi zog anschließend nach Tianjin und später in die Mandschurei, als er nach dem „Mukden-Zwischenfall“ zustimmte, Regierungschef von Mandschukuo zu werden. Er glaubt, dies sei nur der Anfang und er werde innerhalb weniger Jahre wieder als Kaiser von China regieren und die gelben kaiserlichen Drachenroben, die bei der Krönung der Qing-Kaiser verwendet wurden, von Peking nach Changchun bringen lassen. Doch um dies zu erreichen, muss er nach einer Möglichkeit suchen, seine Herrschaft zu festigen, da er heute nur noch eine Marionette der Japaner ist und als Propagandamittel für den Panasiatismus dient."
 
 MAN_xuantong_T1:0 "Qin Shi Huáng Di"
 MAN_xuantong_T2:0 "Fortsetzung einer Dynastie"
 MAN_xuantong_T3:0 "Wiederaufbereiter und Restaurator"
 MAN_xuantong_T4:0 "Leise hinterfragte Persönlichkeit"
 
 ### KENKICHI UEDA
 MAN_ueda_T1:0 "Kantōgun Sanbō-chō"
 MAN_ueda_T2:0 "Unnachgiebig"
 MAN_ueda_T3:0 "Einbeinig"
 MAN_ueda_T4:0 "Winterkriegserfahrung"
 MAN_ueda_T5:0 "Starker Anhänger von „Hokushin-ron“"
 MAN_ueda_T6:0 "Antirevolutionäre Japaner"
 umc_kenkichi_ueda_desc:0 "Ueda wurde 1875 in der Präfektur Osaka geboren und schloss 1898 die 10. Klasse der Kaiserlich Japanischen Heeresakademie und 1908 die 21. Klasse des Heeresstabskollegs ab. Er wurde der 9. Kavalleriebrigade zugeteilt und diente 1918 als Stabsoffizier in der Sibirischen Expeditionsarmee.\n1928 wurde er zum Generalleutnant befördert und im folgenden Jahr Oberbefehlshaber der Japanisch-Chinesischen Garnisonsarmee, deren Kommandeur er bis 1930 war. Bei dem Bombenanschlag des koreanischen Nationalisten Yoon Bong-Gil auf Shanghai am 29. April 1932 verlor er ein Bein. Danach kehrte Ueda nach Japan zurück, um im Generalstab der Kaiserlich Japanischen Armee eingesetzt zu werden, wo er von 1933 bis 1934 zum Vizechef aufstieg.\n1935 wurde Ueda General und kehrte als Oberbefehlshaber der Kwantung-Armee nach Mandschukuo zurück."
 
 ### ZHANG XUELIANG
 MAW_xueliang_T1:0 "Manzhōu de Jūnfá"
 MAW_xueliang_T2:0 "Der „junge Marschall“"
 MAW_xueliang_T3:0 "Ehemaliger Kommandant der Fengtian-Luftwaffe"
 MAW_xueliang_T4:0 "Anti-Japanisch"
 MAW_xueliang_T5:0 "Überläufer"
 umc_leader_zhang_xueliang_desc:0 "Zhang Xueliang, geboren am 3. Juni 1901, war nach der Ermordung seines Vaters Zhang Zuolin, des „Alten Marschalls“, durch die Japaner am 4. Juni 1928 der faktische Herrscher der Mandschurei und großer Teile Nordchinas. Er führte die Fengtian-Clique als Anführer der Nordost-Friedenstruppe fort und schwor im Dezember desselben Jahres der Kuomintang seine Treue.\n\nZhang erwies sich als unabhängiger und geschickter als erwartet. Er unterstützte Chiang Kai-sheks Fraktion im „Krieg der Zentralebenen“, was unglücklicherweise zum „Mukden-Zwischenfall“ und zum Verlust der Mandschurei an die Japaner führte.\n\nSeitdem tut er alles, um ganz China zu vereinen … und die jüngsten Ereignisse könnten ihm genau diese Gelegenheit bieten."
 
 MAN_zhang_jinghui_adv:0 "Zhang Jinghui"
 MAN_zhang_jinghui_adv_desc:0 "Zhang Jinghui, geboren 1871 in Tai&#39;an, ist seit 1935 Premierminister von Mandschukuo.\n\nEr bevorzugt eine passive Rolle als Galionsfigur und überlässt den japanischen Beratern die Erledigung aller alltäglichen Verwaltungsaufgaben. Manche nennen ihn deshalb auch den „Tofu-Premierminister“."
 MAN_jinghui_T:0 "„Der Tofu-Premierminister“"
 
 MAN_nobusuke_kishi_adv:0 "Nobusuke Kishi"
 MAN_nobusuke_kishi_adv_desc:0 "Nobusuke Kishi (geb. 13. November 1896) ist ein japanischer Politiker und wurde zum Wirtschaftsmanager von Mandschukuo gewählt. Sein Ziel ist die Modernisierung der mandschurischen Wirtschaft, die Ausbeutung lokaler Bodenschätze und die Ausweitung der Zaibatsu-Investitionen in der Region. Wegen seiner brutalen Herrschaft wird er „Shōwa no yōkai“ – Teufel von Shōwa – genannt."
 MAN_kishi_T:0 "Shōwa no Yōkai"
 
 MAW_zhang_xueming_adv:0 "Zhang Xueming"
 MAW_zhang_xueming_adv_desc:0 "Xueming wurde 1908 als Sohn des Mukden-Tigers und Bruder von Zhang Xueliang geboren und ist ein erfahrener Kommandant und Polizeichef."
 MAW_xueming_T:0 "Polizeichef"
 
 MAN_grigory_semyonov_adv:0 "Grigori M. Semjonow"
 MAN_grigory_semyonov_adv_desc:0 "Grigori Michailowitsch Semjonow, ein weißrussischer Kosaken-„Ataman“, musste nach der Niederlage der Weißen aus Russland fliehen und ließ sich schließlich in Mandschukuo nieder.\n\nSeit 1934 ist Semjonow Mitglied des „Büros der russischen Emigranten“, einem de facto japanischen Spione-Vorbereitungszentrum, und wartet auf eine Gelegenheit, seine Niederlagen zu rächen."
 MAN_semyonov_T:0 "Erlebnisse in unwegsamem Gelände"
 
 MAN_western_refinery_T:0 "Raffinerie-Konzern"
 
 umc_leader_han_fuju_desc:0 ""
 
 SHA_start_with_better_ps_EXPL:0 "\nWir werden mit einer besseren Unterstützung der Bevölkerung beginnen, sobald unser Land als legitime Regierung Chinas anerkannt wird."
 SHA_start_with_lower_ps_EXPL:0 "\nWir werden mit §RLingerer§! §HUnterstützung der Bevölkerung§! §CStarten§!, wenn unsere Nation als legitime Regierung Chinas anerkannt wird."

