 ### MAW FENGTIAN BRANCH
 MAW_revive_the_fengtian_clique:0 "Beleben Sie die Fengtian-Clique wieder"
 MAW_revive_the_fengtian_clique_desc:0 "Die Fengtian-Clique, oder Fèng Xì Jūnfá, wurde nach der endgültigen Niederlage des Chinesischen Kaiserreichs 1919 durch den alten Marschall Zhang Zuolin gegründet. Xueliangs Vater wurde daraufhin von den Japanern ermordet, woraufhin die japanische Invasion die Clique schließlich auflöste und stattdessen ihren Marionettenstaat errichtete. Nun werden wir die Fengtian-Clique erneut ausrufen."
 MAW_the_young_marshals_personality_cult:0 "Der Personenkult des jungen Marschalls"
 MAW_the_young_marshals_personality_cult_EXPL:0 "Verbessern Sie die Führungsqualitäten von „HZhang Xueliang“."
 MAW_the_young_marshals_personality_cult_desc:0 "Zhang Xueliang war nach der Ermordung seines Vaters Zhang Zuolin der faktische Herrscher Nordostchinas und großer Teile Nordchinas. Jetzt, da er sein rechtmäßiges Land zurückeroberte, können wir mit der Schaffung seines eigenen Personenkults beginnen. Schließlich ist er der Rückeroberer, der Eroberer. Der Retter der Mandschus. Der Schild gegen den Roten Bären. Der Sturm, der die aufgehende Sonne verdunkeln wird."
 
 MAW_stabilize_internal_situation:0 "Stabilisierung der internen Lage"
 MAW_stabilize_internal_situation_desc:0 "Unser Staat steht stark da, doch wir müssen zusätzliche Anstrengungen unternehmen, um die innere Stabilität zu stabilisieren und zu verbessern. Wir können nicht zulassen, dass jemand diese vorübergehende Schwäche ausnutzt."
 
 ##### FENGTIAN SOVEREIGN STATE BRANCH
 MAW_fengtian_sovereign_state:0 "Souveräner Staat Fengtian"
 MAW_fengtian_sovereign_state_desc:0 "Der Rest Chinas interessiert uns nicht. Uns geht es nur um die Mandschurei und unseren Staat Feng Tian. Hier werden wir aufbauen und gedeihen, hier werden wir Innovationen und Verbesserungen schaffen. Hier wird er stehen und verteidigen. Kai-shek Kuomintang muss die Tatsache akzeptieren, dass die Mandschurei nicht länger Teil Chinas ist."
 MAW_sino_fengtian_settlement:0 "Sino-Fengtian-Siedlung"
 MAW_sino_fengtian_settlement_desc:0 "Wir müssen betonen, dass wir kein Interesse daran haben, nach Süden zu gehen und uns in Kai-sheks Angelegenheiten einzumischen. Darüber hinaus könnten wir, wenn er uns als legitimen Staat anerkennt, enge diplomatische Beziehungen aufbauen und unsere Zusammenarbeit beginnen. Dies wäre sicherlich für beide Nationen von Nutzen – denn die Feinde ganz Chinas stehen noch immer fest und warten auf ihre Gelegenheit zum Angriff."
