 MAN_remove_underground_gun_shops_dec_desc:0 "Die von uns geschaffenen Waffenwerkstätten haben ihren Zweck erfüllt. Es ist Zeit, zu einer organisierteren Form der Waffenproduktion zurückzukehren."

 MAN_prepare_to_seize_arms_dec:0 "Bereiten Sie sich auf die Eroberung japanischer Waffendepots vor"
 MAN_prepare_to_seize_arms_dec_EXPL1:0 "Folgendes wird §GGewonnen§!, wenn die Entscheidung §HSeize the Arms Depots§! ausgewählt wird:\n"
 MAN_prepare_to_seize_arms_dec_EXPL2:0 "\nSie können zusätzliche Einzahlungen §HSeize§! vornehmen.\n"
 MAN_prepare_to_seize_arms_dec_desc:0 "Die über das ganze Land verteilten Depots und Versorgungslager sind schlecht bewacht. Ein gut geplanter und zeitlich abgestimmter Angriff könnte sie mit minimalen Verlusten einnehmen, uns Zugang zu modernen Waffen verschaffen und gleichzeitig den Japanern Munition und Vorräte entziehen. Wenn wir mehr Zeit und Ressourcen darauf verwenden, können wir weitere Depots erobern."
