 MAN_nippon_kaigun_under_manchurian_control_EXPL1:0 "Der Nationalgeist wird §GRemoved§! sein, wenn wir mindestens §H15§! §HNavaval Dockyards§! haben.\n"
 MAN_nippon_kaigun_under_manchurian_control_EXPL2:0 "\nDies ist ein §CReaktiver Fokus§!. Wenn wir mindestens §H15§! §HNavigierte Werften§! haben, hat dieser Fokus stattdessen die folgenden §GEffects§!:\n"
 MAN_nippon_kaigun_under_manchurian_control_desc:0 "Die einst mächtige Kaiserlich Japanische Marine, die „Nippon Kaigun“, geriet nach dem blutigen japanischen Bürgerkrieg in die Hände der Mandschurei. Wir verfügen heute über eine beträchtliche Anzahl moderner Kriegsschiffe, die wir einsetzen müssen. Ihre Wartung und Instandhaltung sind jedoch sehr teuer und erfordern den Bau zahlreicher Werften."
 MAN_utilize_japanese_naval_air_technology:0 "Nutzen Sie die japanische Marinelufttechnologie"
 MAN_utilize_japanese_naval_air_technology_EXPL:0 "Technologie hinzufügen: §HNakajima A4N§! Trägerjäger.\nTechnologie hinzufügen: §HAichi D1A2§! Träger-CAS.\nTechnologie hinzufügen: §HNakajima B5N§! Träger-Marinebomber.\n"
