 ### Shandong Rebelion
 umc_maw.30.t:0 "Shandong-Aufstand!"
 umc_maw.30.d:0 "Aktuelle Nachrichten zeigen, dass die von [MAN.GetLeader] unterstützten Rebellen aus Shandong ihren Vorstoß vorbereiten.\nDieser Aufstand folgt auf eine Phase innerer Instabilität, da wir noch immer mit Korruption in der Regierung und verfeindeten Kriegsherren an unseren Grenzen zu kämpfen haben.\n\nSollte der Aufstand erfolgreich sein, könnte [MAN.GetName] sogar noch einflussreicher werden als unsere Kuomintang-Regierung."
 umc_maw.30.a:0 "Nutzen Sie die vorhandene Ausrüstung, um es zu unterdrücken!"
 umc_maw.30.b:0 "Machen Sie sich bereit, Ihren Standpunkt zu vertreten!"
 umc_maw.30.c:0 "Dafür sind wir zu schwach..."
 
 umc_maw.31.t:0 "Die Rebellion beginnt!"
 umc_maw.31.d:0 "Unsere vertrauenswürdigen Quellen in Shandong berichteten, dass die lokalen Rebellen unter der Führung von General Han Fuju gut ausgerüstet und bereit sind, gegen die nationalistische Regierung vorzugehen.\n\nObwohl sie geistig stark sind, werden sie sicherlich unsere Freiwilligen sowie erhebliche materielle Hilfe benötigen, sollte der Aufstand erfolgreich sein.\nDennoch wird dies die Herrschaft von [CHI.GetLeader] so oder so schwächen."
 umc_maw.31.a:0 "Chaaaaaargggeeee!"
 
 umc_maw.32.t:0 "Rebellion unterdrückt"
 umc_maw.32.d:0 ""
 umc_maw.32.a:0 "Das sollte ihnen eine Lehre sein."
 
 umc_maw.33.t:0 "Die Rebellion geht weiter"
 umc_maw.33.d:0 ""
 umc_maw.33.a:0 "Zu den Waffen!"
 
 umc_maw.34.t:0 "Rebellion unterdrückt"
 umc_maw.34.d:0 ""
 umc_maw.34.a:0 "Schlechte Nachrichten."
 
 umc_maw.35.t:0 "[CHI.GetLeader] Rückzug aus den nördlichen Territorien"
 umc_maw.35.d:0 ""
 umc_maw.35.a:0 "Seine Herrschaft ist schwächer als wir dachten."
 
 umc_maw.36.t:0 "Der Aufstand in Shandong wird stärker"
 umc_maw.36.d:0 ""
 umc_maw.36.a:0 "Wir müssen den Frieden anstreben, nicht den Krieg."
 umc_maw.36.b:0 "Kämpfe weiter!"
 
 umc_maw.37.t:0 "[CHI.GetLeader] Frieden mit dem Kriegsherrn von Shandong geschlossen"
 umc_maw.37.d:0 ""
 umc_maw.37.a:0 "Ein letzter Todesstoß und wir sind mit ihm fertig."
 
 ### SOUTHWEST FLAG REPLACEMENT
 umc_maw.40.t:0 "Ersatz der Südwestflagge"
 umc_maw.40.d:0 ""
 umc_maw.40.a:0 "Eine Kapitulation? Drängt diese Verräter zurück!"
 umc_maw.40.b:0 "Die Führung des jungen Marschalls ist die beste Option für China."
 
 umc_maw.41.t:0 "Kuomintang zieht seine Flaggen zurück"
 umc_maw.41.d:0 ""
 umc_maw.41.a:0 "Sieg."
 
 umc_maw.42.t:0 "Frage des Generalissimus."
 umc_maw.42.d:0 ""
 umc_maw.42.a:0 ""
 
 umc_maw.43.t:0 "[CHI.GetLeader] Flaggenaustausch ablehnen"
 umc_maw.43.d:0 ""
 umc_maw.43.a:0 "Dann ist es Krieg."

 ### SINO-FENGTIAN SETTLEMENT
 umc_maw.50.t:0 "Sino-Fengtian-Siedlung"
 umc_maw.50.d:0 ""
 umc_maw.50.a:0 "Unsere Feinde sind woanders."
 umc_maw.50.b:0 "Wir müssen ganz China vereinen."
 
 umc_maw.51.t:0 "[CHI.GetLeader] Akzeptiert die Einigung"
 umc_maw.51.d:0 ""
 umc_maw.51.a:0 "Eine gute Entscheidung."
 
 umc_maw.52.t:0 "[CHI.GetLeader] lehnt die Einigung ab"
 umc_maw.52.d:0 ""
 umc_maw.52.a:0 "Wir müssen auf das vorbereitet sein, was als Nächstes kommt."
 
 ### FOUR YEAR PLAN OF MODERNIZATION
 umc_maw.60.t:0 "Vierjahresplan zur Modernisierung"
 umc_maw.60.d:0 ""
 umc_maw.60.a:0 "Bevorzugen Sie den zivilen Sektor."
 umc_maw.60.b:0 "Die Verbesserung der Infrastruktur hat für uns Priorität."
 umc_maw.60.c:0 "Eine ausreichende Ressourcenversorgung wird unserer Wirtschaft enorm helfen."
 umc_maw.60.e:0 "Unsere Armee muss an erster Stelle stehen."
 
 ### MISSION TO USA
 umc_maw.70.t:0 "[MAN.GetName] fragt nach Panzerungstechnologie"
 umc_maw.70.d:0 ""
 umc_maw.70.a:0 "Wir müssen unsere antisowjetischen Verbündeten unterstützen."
 umc_maw.70.b:0 "Unsere Fortschritte müssen zu Hause bleiben."
 
 umc_maw.71.t:0 "[FROM.GetName] bietet Panzerungstechnologie"
 umc_maw.71.d:0 ""
 umc_maw.71.a:0 "Unsere Armee wird stärker."
 
 umc_maw.72.t:0 "[FROM.GetName] lehnt unsere Anfrage ab"
 umc_maw.72.d:0 ""
 umc_maw.72.a:0 "Schade."
 
 ### MISSION TO GER
 umc_maw.75.t:0 "[MAN.GetName] fragt nach Panzerungstechnologie"
 umc_maw.75.d:0 ""
 umc_maw.75.a:0 "Wir müssen unsere antisowjetischen Verbündeten unterstützen."
 umc_maw.75.b:0 ""
 
 umc_maw.76.t:0 "[FROM.GetName] bietet Panzerungstechnologie"
 umc_maw.76.d:0 ""
 umc_maw.76.a:0 "Unsere Armee wird stärker."
 
 umc_maw.77.t:0 "[FROM.GetName] lehnt unsere Anfrage ab"
 umc_maw.77.d:0 ""
 umc_maw.77.a:0 "Bah."
 
 ### ANTI-SOVIET ALLIANCE
 umc_maw.80.t:0 "[MAN.GetLeader] schlägt antisowjetisches Bündnis vor"
 umc_maw.80.d:0 ""
 umc_maw.80.a:0 "Wir müssen überall, wo wir können, Verbündete gewinnen."
 umc_maw.80.b:0 "Wir brauchen sie nicht."
 
 umc_maw.81.t:0 "[FROM.GetName] akzeptiert antisowjetisches Bündnis"
 umc_maw.81.d:0 ""
 umc_maw.81.a:0 "In die Nordmandschurei!"
 
 umc_maw.82.t:0 "[FROM.GetName] lehnt antisowjetisches Bündnis ab"
 umc_maw.82.d:0 ""
 umc_maw.82.a:0 "Eine dumme Wahl."
 
 ### SEEK ALLY
 umc_maw.90.t:0 "[MAN.GetLeader] Schlägt Allianz vor"
 umc_maw.90.d:0 ""
 umc_maw.90.a:0 "Der junge Marschall wird uns gut führen."
 umc_maw.90.b:0 "Wir sind unabhängig und werden es auch bleiben."
 
 umc_maw.91.t:0 "[FROM.GetLeader] Akzeptiert Allianzangebot"
 umc_maw.91.d:0 ""
 umc_maw.91.a:0 "China wird bald vereint sein."
 
 umc_maw.92.t:0 "[FROM.GetLeader] lehnt Allianzangebot ab"
 umc_maw.92.d:0 ""
 umc_maw.92.a:0 "Dann werden wir China durch Blut vereinen."
 
 ### END OF THE WARLORD ERA
 umc_maw.100.t:0 "Ende der Warlord-Ära"
 umc_maw.100.d:0 ""
 umc_maw.100.a:0 "Wir müssen zusammenarbeiten, um China wieder zu vereinen."
 umc_maw.100.b:0 "Unsere Unabhängigkeit ist unerlässlich."
 
 umc_maw.101.t:0 "[FROM.GetLeader] schließt sich dem [ROOT.GetName] an "
 umc_maw.101.d:0 ""
 umc_maw.101.a:0 "Ein großer Schritt hin zum vereinten China."
 
 umc_maw.102.t:0 "[FROM.GetLeader] Verweigert ihre Integration"
 umc_maw.102.d:0 ""
 umc_maw.102.a:0 "Dann wird es blutig."
 
 
 
 
