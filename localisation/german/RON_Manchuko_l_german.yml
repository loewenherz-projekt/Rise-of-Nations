 ### Event for CHI to puppet MEN
 umc_maw.10.t:0 "Junger Marschall führt Nordostarmee in die Mandschurei"
 umc_maw.10.d:0 "Als die Kriegsherren Feng Yuxiang und Yan Xishan 1930 versuchten, Chiang Kai-sheks Kuomintang-Regierung zu stürzen, schritt Zhang ein und unterstützte die Regierung in Nanjing im Kampf gegen die Kriegsherren aus dem Norden. Im Gegenzug erhielt er die Kontrolle über die wichtigsten Eisenbahnstrecken der Provinz Hebei und die Zolleinnahmen der Hafenstadt Tianjin. Ein Jahr später griffen japanische Truppen beim Mukden-Zwischenfall vom 18. September Zhangs Streitkräfte in Mukden an, um einen offenen Krieg mit China zu provozieren. Chiang wollte dies jedoch erst, wenn seine Streitkräfte stärker waren. Gemäß dieser Strategie zogen sich Zhangs Armeen ohne nennenswerte Gefechte von der Front zurück, was zur effektiven Besetzung von Zhangs Fengtian-Clique und ihres ehemaligen nordöstlichen Herrschaftsgebiets durch Japan führte.\n\nZhang war sich dabei der Schwäche seiner Streitkräfte im Vergleich zu den Japanern bewusst und wollte seine Position in China durch den Erhalt einer ansehnlichen Armee sichern. Daher marschierte seine Nordostarmee mit ihm nach China, wo sie unter der Kontrolle des jungen Marschalls blieb.\n\nNun, da die Situation auf den japanischen Heimatinseln zu einem umfassenden Bürgerkrieg eskalierte, blieb die Mandschurei in den Händen des letzten Kaisers Puyi, der von den dort als Teil der Kwantung-Armee stationierten japanischen Generälen geführt oder sogar kontrolliert wird. Als Reaktion darauf führte der junge Marschall seine Nordostarmee in einem waghalsigen Rückeroberungsfeldzug erneut zurück in den Norden der Mandschurei.\n\nWährend die chinesische Bevölkerung die Vertreibung der Japaner unterstützt, wird spekuliert, ob Zhang durch diese Aktion seine Verbindungen zur Kuomintang abbrach oder ob dieser Feldzug von Chiang Kai-shek unterstützt wird."
 umc_maw.10.a:0 "Er wird sich daran erinnern, wem seine Loyalität gilt, wenn er die japanischen Überreste erst einmal los ist."
 umc_maw.10.a_EXPL:0 "\nWenn Sie diese Option auswählen, wird der Fokuszweig §C entsperrt§! &#39;§HCooperieren Sie mit dem jungen Marschall§!&#39;.\n"
 umc_maw.10.b:0 "Nur ein weiterer Kriegsherr, um den wir uns kümmern werden."
