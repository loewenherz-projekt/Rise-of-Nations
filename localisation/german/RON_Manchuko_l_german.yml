 MAW_legacy_of_french_tanks_desc:0 "Es war Großmarschall Zhang Zuolin, der Panzer in China einführte. Frankreich hatte 1919 während der gemeinsamen alliierten Intervention, die im August 1918 begann, ein kleines Kontingent von Renault FT-Panzern nach Wladiwostok entsandt.[3] Diese wurden später an die Mandschurische Armee unter Zhang Zuolin weitergegeben. Die Mandschurische Armee kaufte 1924/25 weitere 14 FTs."
