 ##### PATH OF A MANCHURIAN WARLORD BRANCH
 MAW_path_of_a_manchurian_warlord:0 "Pfad eines mandschurischen Kriegsherrn"
 MAW_path_of_a_manchurian_warlord_EXPL:0 "§HZhang Xueliang§! wird aus dem nationalistischen China überlaufen und Feldmarschall werden.\n"
 MAW_path_of_a_manchurian_warlord_desc:0 "Die Mandschurei ging vor etwa acht Jahren unrechtmäßig an das japanische Kaiserreich verloren. Doch da Japan seine eigenen Probleme mit sich bringt, muss der junge Marschall seine loyalen Truppen in China sammeln und nach Norden marschieren, um die Mandschurei zurückzuerobern und sie erneut unter Xueliangs Herrschaft zu bringen."
 MAW_purge_japanese_administration:0 "Säuberung der japanischen Verwaltung"
 MAW_purge_japanese_administration_desc:0 "Der Staat Mandschukuo folgte lange Zeit den direkten Befehlen Tokios. Diese wurden dann von der lokalen japanischen Regierung umgesetzt und von der Kwantung-Armee durchgesetzt. Und selbst heute noch verfügen deren Überreste hier über eine bedeutende Macht. Dem müssen wir ein Ende setzen."
 MAW_end_of_the_kangde_emperor:0 "Ende des Kangde-Kaisers"
 MAW_end_of_the_kangde_emperor_desc:0 "1934 wurde Aisin Gioro Puyi zum Kangde-Kaiser ernannt und regierte als Marionettenherrscher des Mandschurischen Reiches. Eine kurzlebige Neuauflage des einst mächtigen chinesischen Kaiserreichs. Wir werden nun die Tage des Kaisers endgültig beenden und die notwendigen Gesetze erlassen, um eine Wiederholung zu verhindern."
 
 ### MAW INDUSTRY BRANCH
 MAW_renew_old_fengtian_industries:0 "Erneuerung alter Fengtian-Industrien"
 MAW_renew_old_fengtian_industries_desc:0 "Nachdem wir unsere Länder von japanischen Einflüssen befreit haben, können wir nun mit einer echten Industrialisierung beginnen, die in den Händen der einheimischen Chinesen liegt. Alte Geschäfte werden wiedereröffnet und neue aufgebaut – ein großartiger Start für eine landesweite wirtschaftliche Wiedergeburt."
 MAW_industrial_modernization:0 "Industrielle Modernisierung"
 MAW_industrial_modernization_desc:0 "Unsere Industrie ist hoffentlich veraltet, der Beginn ihrer Modernisierung muss oberste Priorität haben"
 MAW_anshan_steelmill:0 "Anshan Stahlwerk"
 MAW_anshan_steelmill_desc:0 "Die Gruppen Anshan Iron &amp; Steel Works und Showa Steel Works wurden 1916 unter japanischer Herrschaft gegründet. Sie belieferten lange Zeit die japanische Armee und Marine, heute jedoch nicht mehr. Wir werden die dort eingesetzten Anlagen und Technologien nutzen und das Werk zum modernsten Stahlwerk Chinas ausbauen."
