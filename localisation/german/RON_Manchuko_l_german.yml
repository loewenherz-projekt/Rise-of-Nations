 MAN_divert_machine_tools_dec_desc:0 "Da wir die Eisenbahn unter unserer Kontrolle haben, können wir sicherstellen, dass einige Lieferungen von Werkzeugmaschinen aufgrund eines Verwaltungsfehlers „verloren“ gehen."
 MAN_fund_underground_gun_shops_dec:0 "Erstellen Sie unterirdische Werkstätten"
 MAN_fund_underground_gun_shops_dec_desc:0 "Zwar erzielen sie nicht dieselben Skaleneffekte wie große Fabriken und verfügen über eine sehr unterschiedliche Qualitätskontrolle, doch die Verteilung der Waffenproduktion auf kleinere, über das ganze Land verteilte Werkstätten ist der beste Weg, die Produktion schnell zu steigern."
