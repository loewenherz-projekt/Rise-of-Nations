 ##### KUOMINTANG OPPOSITION BRANCH
 MAW_kuomintangs_opposition:0 "Opposition der Kuomintang"
 MAW_kuomintangs_opposition_EXPL:0 "Wir werden uns einem Kampf um die „Unterstützung der Bevölkerung“ in China anschließen."
 MAW_kuomintangs_opposition_desc:0 "Nachdem wir unseren stabilen Staat aufgebaut haben, müssen wir uns auf unser Endziel – China – freuen. China steckt noch immer in der Ära der Kriegsherren, Kommunisten und Kai-sheks fest, was nichts Gutes bringt. Wir müssen unser altes Land retten und diesem Chaos ein Ende setzen. Der junge Marschall ist die beste Hoffnung für das Volk."

