 MAN_restore_the_might_of_the_qing_dynasty:0 "Stellen Sie die Macht der Qing-Dynastie wieder her"
 MAN_restore_the_might_of_the_qing_dynasty_desc:0 "Die Qing-Dynastie war eines der größten chinesischen Reiche der Menschheitsgeschichte. Ihre vollständige Wiederherstellung muss unser Ziel sein."
 MAN_seize_the_control_of_the_railways:0 "Übernehmen Sie die Kontrolle über die Eisenbahn"
