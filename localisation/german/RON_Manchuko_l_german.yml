 MAN_low_legitimacy_I10:0 "Geringe Legitimität der Führungskraft"
 MAN_low_legitimacy_I10_desc:0 "Kaiser Puyi ist der legitime Nachfahre der Qing-Kaiser, die China dreihundert Jahre lang regierten. Leider erfreute sich die Xinhai-Revolution, die ihn 1911 absetzte, großer Beliebtheit, da die damalige Qing-Regierung weder gegen die Ausländer, die chinesisches Land stahlen, noch gegen die regionalen Gouverneure, die sich zu Kriegsherren aufbauten, machtlos war. Die Einsetzung Kaiser Puyis durch Japan als Kaiser von Mandschukuo wird von der mandschurischen Bevölkerung, geschweige denn vom Rest Chinas, noch nicht akzeptiert.\n\nWir müssen die Unabhängigkeit des Kaisers von Japan erreichen, um die Nation unter ihm zu vereinen.\n§W---------------§!\nDieser Nationalgeist ist auf dem gleichen Niveau (§R10§!)."
