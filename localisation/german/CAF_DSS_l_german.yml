GER_ASS_units_tech:0 "Allgemeine-SS-Truppen"
GER_ASS_units_tech_desc:0 "Ermöglicht die Rekrutierung von Anti-Partisanen-Einheiten der Allgemeinen SS, die über starke Verteidigungsfähigkeiten, aber langsame Bewegungen und schwache Angreifer verfügen."

