SS_police:0 "Allgemeine-SS"
SS_police_desc:0 "Truppen, die auf die Verteidigung von Städten, Häfen und Befestigungen gegen Partisanenaktivitäten spezialisiert sind. Stark in der Verteidigung, aber langsam in der Bewegung und schwach in der Offensive."
