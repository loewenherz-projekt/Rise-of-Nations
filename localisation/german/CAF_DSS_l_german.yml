ZDSS.1:0 "Die Schulzstaffel"
ZDSS.1.t:0 "Optionen für den Mod „Die Schulzstaffel“"
ZDSS.1.desc:0 "Sie haben vier Optionen:\n\n#1 Nur Skins und Modelle.\nDies ermöglicht den Zugriff auf die SS-Einheitenvorlagen und alle Modelle. Es werden keine Einheiten jährlich geliefert.\n\n#2 Historische Einheiten.\nDies liefert die historischen jährlichen SS-Divisionsaufbauten um den 30. Januar jedes Jahres 1940-45.\n\n#3 Historische Einheiten und Technologie.\nDies liefert die historischen jährlichen SS-Divisionsaufbauten und Landtechnologie um den 30. Januar jedes Jahres 1940-45.\n\n#4 Die Waffen-SS!\nLiefert jetzt alle Waffen- und Allgemeine-SS-Einheiten mit einigen Basistechnologien."
ZDSS.1.a:0 "Nur Skins und Modelle"
ZDSS.1.a.tt:0 "Dies ermöglicht den Zugriff auf die SS-Einheitsvorlagen und alle Modelle. Es werden keine Einheiten jährlich geliefert"
ZDSS.1.b:0 "Historische Einheiten"
ZDSS.1.b.tt:0 "Dies liefert die historischen jährlichen Einheitenbauten um den 30. Januar jedes Jahres 1940-45"
ZDSS.1.c:0 "Historische Einheiten und Technik"
ZDSS.1.c.tt:0 "Dies wird die historischen jährlichen Einheitenbauten und Landtechnologien um den 30. Januar jedes Jahres 1940-45 liefern"
ZDSS.1.d:0 "Die Waffen-SS!"
ZDSS.1.d.tt:0 "Liefert jetzt alle Waffen- und Allgemeine-SS-Einheiten mit einigen Basistechnologien."
ZDSS.100:0 "Die Shultzstaffel Mod"
ZDSS.100.t:0 "Die Shultzstaffel Bericht "
ZDSS.100.d:0 "Das Oberkommando der Wehrmacht meldet, dass alle SS-Einsätze für dieses Jahr wie befohlen abgeschlossen sind.\n\nZeig Heil"
ZDSS.100.a:0 "Anerkannt, Anerkannt!"
