 neorion:0 "Neorion"

 GRE_forts:0 "Befestigungsfokus"
 GRE_forts_desc:0 "Die Regierung bemüht sich um den Bau von Befestigungsanlagen in ganz Griechenland."
 GRE_construction_effort:0 "Bauaufwand"
 GRE_construction_effort_desc:0 "Es gibt Bemühungen um den Bau öffentlicher Bauwerke und Bürgerprojekte."
 GRE_military_factory_effort:0 "Militärfabrik-Bemühungen"
 GRE_military_factory_effort_desc:0 "Es gibt Bestrebungen zum Bau von Militärfabriken und Rüstungsdepots."

 GRE_recruitment_drive:0 "Rekrutierungskampagne"
 GRE_recruitment_drive_desc:0 "Die Armee startet eine von der Regierung geförderte Massenrekrutierungskampagne, um ihre Zahl zu erhöhen."
 GRE_infantry_effort:0 "Infanterieeinsatz"
 GRE_infantry_effort_desc:0 "Die Armee konzentriert sich auf Infanterieeinheiten und hat eine Rekrutierungskampagne gestartet."
 GRE_supportive_corps:0 "Unterstützendes Einheitenkorps"
 GRE_supportive_corps_desc:0 "Die Armee erweitert ihr Unterstützungskorps aus Pionieren, Aufklärungseinheiten, Sanitätern und anderen Kräften."
 GRE_motorized_effort:0 "Motorisierte Anstrengung"
 GRE_motorized_effort_desc:0 "Die Armee konzentriert sich auf motorisierte Einheiten und hat eine Rekrutierungskampagne gestartet."
 GRE_tank_corps:0 "Panzerkorps"
 GRE_tank_corps_desc:0 "Die Armee experimentiert mit Panzerkorps auf dem Schlachtfeld."
 
 GRE_factory_speed:0 "Fabrikboom"
 GRE_factory_speed_desc:0 "In ganz Griechenland werden massiv Fabriken gebaut und unsere Industrie boomt."
 GRE_unpopular_dicatorship:0 "Unbeliebte Diktatur"
 GRE_unpopular_dicatorship_desc:0 "Die metaxistische Diktatur des Regimes des 4. August ist in der griechischen Bevölkerung unbeliebt. Ihr spaltender Nationalismus, der die Minderheiten des Landes ausschließt, ihre aggressive antikommunistische Haltung und ihre Intoleranz gegenüber Andersdenkenden schüren Ressentiments in der Bevölkerung und machen sie anfällig für die Indoktrination radikaler Ideologien."
 GRE_aggressive_doctrine:0 "Aggressive Armeedoktrin"
 GRE_aggressive_doctrine_desc:0 "Unsere Armee ist in erster Linie offensiv ausgerichtet und greift lieber an als zu verteidigen."
 GRE_defensive_doctrine:0 "Doktrin der Verteidigungsarmee"
 GRE_defensive_doctrine_desc:0 "Unsere Armee ist in erster Linie entlang der Verteidigungslinien ausgerichtet und bevorzugt die Verteidigung gegenüber dem Angriff."
 GRE_AEKKEA:0 "AEKKEA"
 GRE_AEKKEA_desc:0 "Gegründet von Antonius Raab, einem aus seiner Heimat vertriebenen Nazigegner aus Deutschland, und mit beträchtlicher Unterstützung des griechischen Militärs, ist Anonymos Etaireia Kataskevis Kai Ekmetallefseos Aeroplanon der wichtigste inländische Lieferant der griechischen Luftwaffe."
 GRE_TAE:0 "TAE verstaatlicht"
 GRE_TAE_desc:0 "Die Technical and Aeronautical Holdings, Griechenlands größte Fluggesellschaft, wurde im Rahmen einer Luftwaffenreform von der griechischen Luftwaffe verstaatlicht. Die Flugzeuge der TAE sollen als Transportflugzeuge für den Truppentransport umfunktioniert werden."
 GRE_convoy_escorts:0 "Konvoi-Eskorten"
 GRE_convoy_escorts_desc:0 "Der Schutz der griechischen Schifffahrt, hauptsächlich durch Zerstörer, hat für die griechische Marine hohe Priorität."
 GRE_carrier_production:0 "Trägerproduktion"
 GRE_carrier_production_desc:0 "Die griechische Flotte setzt vorrangig Flugzeugträger als Flaggschiffe der Flotte ein und legt den Schwerpunkt auf deren Produktion. Außerdem werden Schlachtkreuzer als Schutzschiffe eingesetzt."
 GRE_battleship_production:0 "Schlachtschiffproduktion"
 GRE_battleship_production_desc:0 "Die griechische Flotte setzt vorrangig Schlachtschiffe als Flaggschiffe der Flotte ein und legt den Schwerpunkt auf deren Produktion. Außerdem werden Kreuzer als Schutzschiffe eingesetzt."
 GRE_courting_allies:0 "Die Verbündeten umwerben"
 GRE_courting_allies_desc:0 "Der Schwerpunkt der griechischen Außenpolitik liegt auf der Wiederherstellung der alten Verbindungen mit Großbritannien und Frankreich aus der Zeit des Ersten Weltkriegs."
 GRE_reform:0 "Demokratische Reform"
 GRE_reform_desc:0 "Metaxas hat sich dem Willen des Volkes gebeugt, und die Diktatur lockert ihren Griff um das griechische Volk. Endlich liegt Veränderung in der Luft."
 GRE_metaxist_propaganda:0 "Metaxistische Propaganda"
 GRE_metaxist_propaganda_desc:0 "Die Diktatur geht härter vor als je zuvor und mobilisiert Massenunterstützung für das Regime. An jedem Haus wehen griechische Flaggen, und in jedem Haus hängen Porträts des Königs und von Metaxas."
 GRE_elections:0 "Ermächtigtes Parlament"
 GRE_elections_desc:0 "Das griechische Parlament, das unter der Diktatur formal unterdrückt und gelähmt war, wurde erneuert und fungiert erneut als nationales Instrument der Demokratie."
 GRE_venizelism_reconciled:0 "Venizelismus versöhnt"
 GRE_venizelism_reconciled_desc:0 "Der nationale Riss zwischen dem Venizelismus und den Antivenizelisten ist endlich überwunden und die verbannten venizelistischen Führer sind aus ihrem erzwungenen Exil auf den Ägäischen Inseln zurückgekehrt."
 GRE_nationalism_moderated:0 "Gemäßigter Nationalismus"
 GRE_nationalism_moderated_desc:0 "Die Zeiten griechischer Bestrebungen, Konstantinopel zurückzuerobern, Westanatolien zu erobern und sich mit den griechischen Diasporas in Zypern und Albanien zu vereinen, sind vorbei. Es ist an der Zeit, dass Griechenland in der Welt voranschreitet, anstatt in der Vergangenheit zu verweilen."
 GRE_true_republic:0 "Wahre Republik"
 GRE_true_republic_desc:0 "Das Volk hat gesprochen, und die Monarchie gibt es nicht mehr. Diese archaische Institution hat in der neuen, wahren Republik keinen Platz mehr, in der die Zukunft des Landes durch die Stimme des einfachen Volkes entschieden wird. Georg II. wird für immer als der letzte König der Hellenen bekannt sein, denn nun hat das griechische Volk endlich die Zügel seines eigenen Schicksals in der Hand."
 GRE_military_industrial:0 "Militärisch-industrieller Komplex"
 GRE_military_industrial_desc:0 "Die Armee und die sie beliefernde heimische Rüstungsindustrie sind heute auf unerklärliche Weise wirtschaftlich miteinander verbunden."
 GRE_recruitment:0 "Massenrekrutierung"
 GRE_recruitment_desc:0 "Mithilfe einer neuen Rekrutierungskampagne stehen die Menschen in Scharen Schlange, um sich zu melden, und die Reihen der Armee erreichen neue Höhen."
 GRE_nyo:0 "Nationale Jugendorganisation"
 GRE_nyo_desc:0 "Die griechische Jugend wird ermutigt, der staatlichen Nationalen Jugendorganisation beizutreten, um die nächste Generation mit den metaxistischen Idealen des Regimes vertraut zu machen."
 GRE_asfaleia:0 "Asfaleia"
 GRE_asfaleia_desc:0 "Unsere neu gegründete Geheimpolizei, die Asfaleia, hält Dissidenten und diejenigen, die gegen das Regime intrigieren wollen, in Schach, indem sie jegliche abweichende Meinung brutal unterdrückt."
 GRE_venizelism_crushed:0 "Venizelismus zerschlagen"
 GRE_venizelism_crushed_desc:0 "Die liberal-nationalistischen Venizelisten, die größte regimekritische politische Bewegung in Griechenland, wurden im Zuge der jüngsten Razzia der Geheimpolizei endlich in den Griff bekommen."
 GRE_statism:0 "Der neue Staat"
 GRE_statism_desc:0 "Das alte Griechenland wurde weggespült und an seiner Stelle steht eine starke, vereinte neue Ordnung."
 GRE_socialized_economy:0 "Sozialisierte Wirtschaftspolitik"
 GRE_socialized_economy_desc:0 "Die Wirtschaft wurde zu einem korporatistischen System reformiert, in dem die Rechte der Arbeitnehmer hochgehalten werden und in dem der Staat stärker eingreift als je zuvor."
 GRE_hellenic_civilisation:0 "Dritte hellenische Zivilisation"
 GRE_hellenic_civilisation_desc:0 "Ein neues Griechenland ist aus der Asche auferstanden und die Dritte Hellenische Zivilisation wurde gegründet, größer als alles, was zuvor da war."
 GRE_aid_allies:0 "Hilfe der Alliierten"
 GRE_aid_allies_desc:0 "Wir erhalten im Rahmen eines Leih- und Pachtgesetzes materielle Hilfe von den anderen Mitgliedern unserer Fraktion."
 GRE_pact_rallied:0 "Allied Drift"
 GRE_pact_rallied_desc:0 "Aufgrund des anglo-griechischen Einflusses und der Bindungen des historischen Balkanpakts tendiert dieses Land allmählich in Richtung der Alliierten."
 GRE_fascism_rise:0 "Der Faschismus auf dem Vormarsch"
 GRE_fascism_rise_desc:0 "Unsere Nation driftet allmählich in Richtung Faschismus ab, wobei unsere autoritären Tendenzen rasch zu einem umfassenden Totalitarismus eskalieren."
 GRE_volunteers_fascism:0 "Faschistische Freiwillige"
 GRE_volunteers_fascism_desc:0 "Freiwillige aus der Zivilbevölkerung sind bereit, ins Ausland zu gehen, um für unsere nationalen Interessen und die faschistische Ideologie zu kämpfen."
 GRE_coalition:0 "Metaxist-EEE-Koalition"
 GRE_coalition_desc:0 "Die Regierung teilt sich die Macht mit der faschistischen EEE-Partei in einer Koalitionsregierung."
 GRE_brownshirts:0 "Griechische Garde"
 GRE_brownshirts_desc:0 "Mit ihrer neu gewonnenen Macht hat die EEE eine paramilitärische Organisation namens „Hellenische Garde“ eingesetzt, um politische Feinde zu schikanieren."
 GRE_athens_marched:0 "Sturz der Regierung"
 GRE_athens_marched_desc:0 "Die Faschisten waren mit der bloßen Machtteilung nicht zufrieden. Sie marschierten nach Athen, stürzten Metaxas und errichteten ihre eigene Diktatur."
 GRE_KKE_banned:0 "KKE verboten"
 GRE_KKE_banned_desc:0 "Die KKE, die Kommunistische Partei Griechenlands und größte marxistisch-leninistische Gruppe in Griechenland, wurde offiziell verboten und ihre Anführer interniert."
 GRE_parliament_dissolved:0 "Das Parlament wurde aufgelöst"
 GRE_parliament_dissolved_desc:0 "Die neue Regierung hat ein Dekret zur Auflösung des Parlaments erlassen, sodass Griechenland de facto per Dekret aus Athen regiert wird."
 GRE_constitution:0 "Neue Verfassung"
 GRE_constitution_desc:0 "Um die letzten Überreste der alten Ordnung endgültig zu beseitigen, wurde eine neue Verfassung erlassen, die der EEE-Regierung alle gewünschten Befugnisse einräumt."
 GRE_work_ministry:0 "Nationales Arbeitsministerium"
 GRE_work_ministry_desc:0 "Die Regierung hat ein nationales Arbeitsministerium eingerichtet, um die Produktion des Landes zu lenken und die Arbeitskräfte zu mobilisieren."
 GRE_nationalism:0 "Territorialer Nationalismus"
 GRE_nationalism_desc:0 "Der Wunsch nach griechischem Irredentismus, das zurückzuerobern, was einst uns gehörte und wo ethnische Griechen noch immer leben, ist in unserer Nation unter der neuen Ordnung neu entfacht. Wir werden Alexanders Reich wiederaufbauen, größer als je zuvor."
 GRE_symbolism:0 "Faschistische Symbolik"
 GRE_symbolism_desc:0 "Mit eindrucksvollen, inspirierenden Bildern macht das neue Regime den Faschismus den jüngeren Generationen zugänglich"
 GRE_totalitarianism:0 "Totalitarismus"
 GRE_totalitarianism_desc:0 "Durch die schrittweise Konsolidierung der Macht, die Umstrukturierung der Regierungssysteme und die Unterdrückung von Dissidenten haben wir ein völlig totalitäres Regime errichtet, bei dem die Partei an der Spitze der gesamten Nation steht."
 GRE_aid_axis:0 "Achsenhilfe"
 GRE_aid_axis_desc:0 "Wir erhalten im Rahmen eines Leih- und Pachtgesetzes Hilfe von unseren Verbündeten in den Achsenmächten."
 GRE_hungary_production:0 "Produktionsvereinbarungen mit Ungarn"
 GRE_hungary_production_desc:0 "Wir haben mit der ungarischen Regierung eine Produktionsvereinbarung geschlossen, die den Import ihrer großen Aluminiumreserven nach Griechenland für militärische Zwecke sicherstellt."
 GRE_communism_rise:0 "Der Kommunismus auf dem Vormarsch"
 GRE_communism_rise_desc:0 "Die Unzufriedenheit der Arbeiter erreicht den Siedepunkt und immer mehr von ihnen schließen sich der KKE an."
 GRE_central_committee:0 "Zentralkomitee der KKE"
 GRE_central_committee_desc:0 "Nachdem das Zentrale Parteikomitee der KKE an den Rand der Zerstörung gebracht worden war, wurde es neu organisiert und wiederaufgebaut und verfügt nun wieder über eine starke, kohärente Führung für die Partei."
 GRE_rizospastis:0 "Kommunistische Veröffentlichungen"
 GRE_rizospastis_desc:0 "Die KKE und andere kommunistische Gruppen haben mit der Massenproduktion von Zeitungen und anderen Publikationen begonnen, um die einfachen Fabrikarbeiter in den Städten für ihre Sache zu gewinnen."
 GRE_nlf:0 "Kommunistische Unruhen"
 GRE_nlf_desc:0 "Die massive Unzufriedenheit der Arbeiterklasse ist schließlich auf die Straße übergekocht und das Volk nimmt endlich den Kampf gegen die Bourgeoisie auf."
 GRE_revolution:0 "Kommunistische Revolution"
 GRE_revolution_desc:0 "Die Kommunisten haben endlich die Macht ergriffen, die Regierung in einer Revolution gestürzt und die Kontrolle übernommen. Die neuen Revolutionsführer Griechenlands genießen zwar die Unterstützung der städtischen Arbeiterklasse, doch diese ist alles andere als universell, und die Nation ist gespalten."
 GRE_metaxists_purged:0 "Metaxisten gesäubert"
 GRE_metaxists_purged_desc:0 "Die alten loyalistischen Metaxisten-Elemente in unserer Regierung wurden zu Recht beseitigt und der Verwaltungsflügel unserer Regierung ist frei von bürgerlicher Korruption."
 GRE_venizelists_integrated:0 "Venizelisten integriert"
 GRE_venizelists_integrated_desc:0 "Die Venizelisten, ebenfalls ehemalige Feinde des Metaxas-Regimes, wurden in die KKE integriert und stehen uns nun als Verbündete zur Seite."
 GRE_fedora:0 "Staatsatheismus"
 GRE_fedora_desc:0 "Die griechisch-orthodoxe Kirche wurde verboten und geschlossen, ihr Eigentum verstaatlicht und der Staat hat den Atheismus zur offiziellen Religionspolitik der Griechischen Volksrepublik erklärt."
 GRE_stalinism:0 "Stalinismus"
 GRE_stalinism_desc:0 "Wir sind Stalins Linie der brutalen Unterdrückung abweichender Meinungen, der Konsolidierung der Macht und der Säuberung der Regierung von illoyalen Elementen gefolgt und haben die griechische Regierung nach unseren Wünschen umgestaltet."
 GRE_economy_communist:0 "Planwirtschaft"
 GRE_economy_communist_desc:0 "Durch die Aufhebung der korporatistischen Politik der metaxistischen Regierung wurde diese durch ein zentral geplantes System ersetzt."
 GRE_labour_culture:0 "Arbeitskultur"
 GRE_labour_culture_desc:0 "Die Aufgabe des einfachen Fabrikanten und Arbeiters wird von der revolutionären Regierung verherrlicht, indem sie eine Kultur der Produktion und Effizienz entwickelt."
 GRE_regeneration:0 "Nationale Erneuerungsbewegung"
 GRE_regeneration_desc:0 "Die Regierung hat eine Massenmobilisierungskampagne gestartet, deren Ziel es ist, ideologisch gesinnte junge Kommunisten in die Armee zu treiben und deren Reihen vollständig mit loyalen Bolschewiken zu besiedeln."
 GRE_mobilised:0 "Nationale Mobilisierung"
 GRE_mobilised_desc:0 "Das gesamte Land und die gesamte Belegschaft wurden zu einer massenhaften politisch-ökonomischen Bewegung mobilisiert, um die Produktion zu steigern und die Wirtschaft auszuweiten."
 GRE_red_terror:0 "Roter Terror"
 GRE_red_terror_desc:0 "Die neu eingesetzte kommunistische Regierung hat eine Schreckensherrschaft errichtet und jagt und verfolgt die sogenannten konterrevolutionären Elemente in der Gesellschaft."
 GRE_aid_comintern:0 "Kominternhilfe"
 GRE_aid_comintern_desc:0 "Wir erhalten im Rahmen eines Leih- und Pachtprogramms Hilfe von unseren Verbündeten in der Komintern."



 GRE_military_development:0 "Militärische Entwicklungsbemühungen"
 GRE_military_development_desc:0 "Wir sollten unsere Bemühungen auf die Entwicklung und den Ausbau unserer militärischen Infrastruktur konzentrieren und eine Kriegsmaschinerie aufbauen, die mit der unserer aggressiven Nachbarn mithalten kann."
 GRE_military_development_short_desc:0 "Unsere militärische Infrastruktur weiterentwickeln"
 GRE_armaments_industry:0 "Rüstungsindustrie ausbauen"
 GRE_armaments_industry_desc:0 "Um einen längeren Krieg führen zu können und die Versorgung unserer Truppen sicherzustellen und sie kampfbereit zu halten, müssen wir unsere Produktions- und Industriekapazitäten ausbauen, an denen es uns derzeit mangelt."
 GRE_armaments_industry_short_desc:0 "Rüstungsindustrie ausbauen"
 GRE_mainland_development:0 "Mazedonische Fabriken"
 GRE_mainland_development_desc:0 "Wir sollten unsere Rüstungsindustrie auf dem griechischen Festland entwickeln. Im Falle eines Krieges könnten die Ägäischen Inseln zu schwach oder zu anfällig sein, um dort solch wichtige Industrien anzusiedeln."
 GRE_mainland_development_short_desc:0 "Mazedonische Fabriken"
 GRE_mainland_development_2:0 "Militarisieren Sie den Peloponnes"
 GRE_mainland_development_2_desc:0 "Die Pelepeninsel, ganz hinten auf dem griechischen Festland, wäre ein ideales Industriezentrum. Durch die Ansiedlung unserer Industriekomplexe wären sie vor Gefahren geschützt und dennoch nahe genug, um Versorgungsprobleme zu vermeiden."
 GRE_mainland_development_2_short_desc:0 "Militarisieren Sie den Peloponnes"
 GRE_aegean_development:0 "Ägäische Fabriken"
 GRE_aegean_development_desc:0 "Wenn wir unsere Entwicklungsbemühungen auf die Ägäischen Inseln konzentrieren, können wir das griechische Festland für die zivile Industrie freihalten und gleichzeitig sicher sein, dass im Falle einer Landinvasion Griechenlands unsere Industriekapazitäten auf unseren Inselfestungen sicher sind."
 GRE_aegean_development_short_desc:0 "Ägäische Fabriken"
 GRE_aegean_development_2:0 "Militarisieren Sie Kreta"
 GRE_aegean_development_2_desc:0 "Kreta ist der letzte Verteidigungspunkt und die letzte Bastion im Falle einer Übernahme des griechischen Festlands. Wenn wir unsere Industrie hier konzentrieren, können wir bis zum bitteren Ende kämpfen."
 GRE_aegean_development_2_short_desc:0 "Militarisieren Sie Kreta"
 GRE_core_development:0 "Entwickeln Sie Thessalienfabriken"
 GRE_core_development_desc:0 "Die Region Thessalien ist das Herz der griechischen Nation. Sie verbindet das Festland mit den Inseln der Ägäis. Unabhängig von unserem Schwerpunkt müssen wir hier unsere Industrie konsolidieren."
 GRE_core_development_short_desc:0 "Entwickeln Sie Thessalienfabriken"
 GRE_fortress_greece:0 "Festung Griechenland"
 GRE_fortress_greece_desc:0 "Griechenland ist bedroht – Viele Nationen um uns herum stehen zum Angriff bereit, und wenn wir unvorbereitet sind, könnten sie uns überwältigen. Die beste Verteidigung unseres Heimatlandes wäre der Bau großer Befestigungsanlagen, gegen die ihre Armeen keine Chance haben."
 GRE_fortress_greece_short_desc:0 "Griechenland stärken"
 GRE_papagos_line:0 "Befestigen Sie Epirus"
 GRE_papagos_line_desc:0 "Italien plant, Albanien zu erobern, und Griechenland steht als nächstes auf der Liste. Wir müssen entlang der albanischen Grenze Festungen errichten, um uns auf etwaige italienische Einfälle in griechisches Gebiet vorzubereiten!"
 GRE_papagos_line_short_desc:0 "Befestigen Sie Epirus"
 GRE_fortify_thrace:0 "Bauen Sie die Metaxas-Linie"
 GRE_fortify_thrace_desc:0 "Thrakien, das nordöstliche Tor zu Griechenland, grenzt an Bulgarien und die Türkei, beides alte Feinde unseres Landes. Um revanchistische Vorstöße Bulgariens oder türkische Feindseligkeiten zu verhindern, sollten wir diese wichtige und bedrohte Region massiv befestigen."
 GRE_fortify_thrace_short_desc:0 "Bauen Sie die Metaxas-Linie"
 GRE_extend_papagos:0 "Erweiterung der Metaxas-Linie"
 GRE_extend_papagos_desc:0 "Angesichts der bestehenden Befestigungsanlagen entlang der albanischen und türkisch-bulgarischen Grenze wäre es ein geringer Aufwand, diese beiden entlang der jugoslawischen Grenze mit Mazedonien zu verbinden und so eine vollständige Verteidigungskette entlang der griechischen Landgrenzen zu vervollständigen."
 GRE_extend_papagos_short_desc:0 "Erweiterung der Metaxas-Linie"
 GRE_air_defence:0 "Nationales Luftverteidigungsprogramm"
 GRE_air_defence_desc:0 "Auch wenn unsere Landesgrenzen vor Invasionen geschützt sind, sind wir weiterhin Angriffen ausländischer Luftstreitkräfte ausgesetzt. Mit einem nationalen Luftverteidigungsprogramm, das den Bau von Luftschutzbunkern, Flugabwehrstellungen und den Ausbau unserer Militärflughäfen vor feindlichen Bomben schützt und uns in die Lage versetzt, uns zu wehren."
 GRE_air_defence_short_desc:0 "Nationales Luftverteidigungsprogramm"
 GRE_ionian_wall:0 "Baue die Ionische Mauer"
 GRE_ionian_wall_desc:0 "Wenn wir uns gegen die großen Seemächte des Mittelmeers verteidigen wollen, seien es Italien, Großbritannien oder Frankreich, müssen wir zunächst unsere Westküste sichern, die die erste Verteidigungslinie gegen eine etwaige Seeinvasion Griechenlands darstellt."
 GRE_ionian_wall_short_desc:0 "Baue die Ionische Mauer"
 GRE_fortify_aegean:0 "Befestigen Sie die Ägäischen Inseln"
 GRE_fortify_aegean_desc:0 "Die Ägäis deckt Griechenland auf und gewährt jedem, der dort die Seeherrschaft erringen kann, Zugang zu wichtigen Häfen und natürlich zur Hauptstadt. Es ist zwingend erforderlich, dass wir die Kontrolle über die verschiedenen verstreuten Inseln erlangen, die sich in der Ägäis befinden, um sie jedem, der Griechenland schaden möchte, als wichtige Marinestützpunkte zu verwehren."
 GRE_fortify_aegean_short_desc:0 "Befestigen Sie die Ägäischen Inseln"
 GRE_aegean_forts:0 "Ägäische Küstenfestungen"
 GRE_aegean_forts_desc:0 "Wenn die Ägäischen Inseln gesichert sind, müssen wir nur noch ähnliche Befestigungen entlang der ägäischen Festlandküste errichten, um Athen, Thessaloniki und andere wichtige Häfen und Orte zu schützen, und dann wird die Ägäis wieder das griechische Meer sein."
 GRE_aegean_forts_short_desc:0 "Bauen Sie Festungen an der Ägäisküste"
 GRE_fortress_crete:0 "Festung Kreta"
 GRE_fortress_crete_desc:0 "Das Kronjuwel unseres Marineverteidigungsprogramms wäre ein zentraler Stützpunkt für die griechische Marine auf Kreta, von dem aus wir Missionen in die umliegenden Meere starten, das griechische Festland verteidigen und unsere Macht im gesamten Mittelmeerraum demonstrieren könnten."
 GRE_fortress_crete_short_desc:0 "Festung Kreta"
 GRE_industrial_development:0 "Industrielle Entwicklungsbemühungen"
 GRE_industrial_development_desc:0 "Wir müssen die zivile Industrie Griechenlands fördern und ausbauen und unsere Infrastruktur weiter ausbauen, wenn wir ein modernes Land sein und die kommenden Herausforderungen bestehen wollen."
 GRE_industrial_development_short_desc:0 "Entwicklung unserer Industrie und zivilen Infrastruktur"
 GRE_central_industry:0 "Entwicklung der zivilen Industrie"
 GRE_central_industry_desc:0 "Wir müssen die Region Mazedonien-Thessalien, das griechische Kernland, weiter entwickeln, bevor wir den ländlichen Raum und den Rest des Landes urbanisieren."
 GRE_central_industry_short_desc:0 "Entwicklung der zivilen Industrie"
 GRE_industrialise_coast:0 "Industrialisierung der Westküste"
 GRE_industrialise_coast_desc:0 "Mit dem Aufbau der Zentralregion sollten wir unsere industrielle Entwicklung entlang der westlichen Ionischen Küste, durch Epirus und den Peloponnes ausweiten."
 GRE_industrialise_coast_short_desc:0 "Industrialisierung der Westküste"
 GRE_aegean_industry:0 "Ägäische Industrie"
 GRE_aegean_industry_desc:0 "Es wäre klug, auf den Ägäischen Inseln einige kleinere Industrien aufzubauen, sodass selbst im Falle einer Besetzung des griechischen Festlands zumindest ein Teil unserer Industrie vor der Küste sicher wäre."
 GRE_aegean_industry_short_desc:0 "Ägäische Industrie"
 GRE_highway:0 "Autobahn Athen-Kastoria"
 GRE_highway_desc:0 "Der erste Schritt zur Schaffung eines gemeinsamen Landes im Rahmen eines großen Infrastrukturprojekts wird die Verbindung der Hauptstadt mit Epirus und der albanisch-jugoslawischen Grenze sein."
 GRE_highway_short_desc:0 "Autobahn Athen-Kastoria"
 GRE_link_northeast:0 "Verbinden Sie den Nordosten"
 GRE_link_northeast_desc:0 "Der erste größere Ausbau der Autobahn Athen-Kastoria muss eine Verlängerung nach Nordosten sein, die durch Thessaloniki bis zur thrakischen Grenze mit der Türkei führt."
 GRE_link_northeast_short_desc:0 "Den Nordosten verbinden"
 GRE_urbanize_south:0 "Urbanisierung des Südens"
 GRE_urbanize_south_desc:0 "Um unser Urbanisierungsprogramm abzuschließen, sollten wir den Peloponnes und Kreta, die sichere Rücklage der griechischen Nation, entwickeln."
 GRE_urbanize_south_short_desc:0 "Urbanisierung des Südens"
 GRE_support_academia:0 "Unterstützen Sie die Wissenschaft"
 GRE_support_academia_desc:0 "Zusätzlich zu unserer praktischen Entwicklung sollten wir die akademischen Einrichtungen des Landes unterstützen, damit wir neue Theorien und Wege entwickeln können, um das Land voranzubringen."
 GRE_support_academia_short_desc:0 "Unterstützen Sie die Wissenschaft"
 GRE_industrial_thought:0 "Industrielles Denken"
 GRE_industrial_thought_desc:0 "Wir sollten anstelle von mehr theoretischer Forschung mehr praktisches wissenschaftliches Denken fördern, das sich in weiteren Entwicklungen niederschlagen kann."
 GRE_industrial_thought_short_desc:0 "Industrielles Denken"
 GRE_cultivate_oil:0 "Ölindustrie kultivieren"
 GRE_cultivate_oil_desc:0 "Uns fehlen jegliche einheimischen Quellen für eine lebenswichtige Ressource: Öl. Wenn wir überleben wollen, sollten wir mit dem Aufbau einer einheimischen Industrie dafür beginnen, damit unsere Kriegsmaschinerie nicht einfach zusammenbricht, wenn eine Blockade die Ölimporte verhindert."
 GRE_cultivate_oil_short_desc:0 "Ölindustrie kultivieren"
 GRE_scientific_thought:0 "Wissenschaftliches Denken"
 GRE_scientific_thought_desc:0 "Wir sollten Forschern und anderen wissenschaftlichen Organisationen und Einzelpersonen Forschungsstipendien gewähren, damit wir neue Technologiezweige entwickeln können."
 GRE_scientific_thought_short_desc:0 "Wissenschaftliches Denken"
 GRE_research_slot:0 "Zusätzlicher Forschungsplatz"
 GRE_research_slot_desc:0 "Schaltet einen zusätzlichen Forschungsplatz frei."
 GRE_research_slot_short_desc:0 "Zusätzlicher Forschungsplatz"
 GRE_rocketry:0 "Raketenexperimente"
 GRE_rocketry_desc:0 "Wir sollten wissenschaftliche Teams finanziell unterstützen und Forschungsstipendien bereitstellen, um die aufkeimende Raketenwissenschaft zu erforschen, damit wir diese neuen Waffen gegen unsere Feinde einsetzen können."
 GRE_rocketry_short_desc:0 "Raketenexperimente"
 GRE_nuclear:0 "Atomexperimente"
 GRE_nuclear_desc:0 "Wenn wir unsere Forschung auf die nukleare Entwicklung und Atomforschung konzentrieren, können wir neue Waffentypen schaffen, die die Art und Weise der Kriegsführung verändern werden."
 GRE_nuclear_short_desc:0 "Atomexperimente"
 GRE_oil_autarky:0 "Öl-Autarkie"
 GRE_oil_autarky_desc:0 "Wir sollten den Ausbau unserer Kunststoffindustrie fortsetzen, um eine vollständige Ölunabhängigkeit zu erreichen."
 GRE_oil_autarky_short_desc:0 "Öl-Autarkie"
 GRE_industrial_plants:0 "Industrieanlagen"
 GRE_industrial_plants_desc:0 "Durch die Konzentration von Fabriken in kompakten Industrieanlagen können wir unseren begrenzten Platz optimal nutzen."
 GRE_industrial_plants_short_desc:0 "Industrieanlagen"
 GRE_factory_boom:0 "Fabrikboom"
 GRE_factory_boom_desc:0 "Die Nation braucht für den Krieg ein starkes industrielles Rückgrat. Wir sollten unsere Wirtschaft so strukturieren, dass der Fabrikbau im Vordergrund steht."
 GRE_factory_boom_short_desc:0 "Fabrikboom"
 GRE_modernize_army:0 "Modernisierung der griechischen Armee"
 GRE_modernize_army_desc:0 "Die griechische Armee ist neben der Marine und der Luftwaffe der wichtigste Schutzschild der Nation. Wir müssen sie auf den neuesten Stand bringen und zu einer voll modernen Armee entwickeln, wenn wir die kommenden Herausforderungen bestehen wollen."
 GRE_modernize_army_short_desc:0 "Modernisierung der griechischen Armee"
 GRE_infantry_focus:0 "Infanterie-Fokus"
 GRE_infantry_focus_desc:0 "Die einfachen Soldaten der Infanterie bilden das Rückgrat der griechischen Armee und damit auch das Rückgrat der gesamten Landesverteidigung. Wir sollten unsere Bemühungen zunächst auf die Ausrüstung und Entwicklung unserer Infanterie konzentrieren."
 GRE_infantry_focus_short_desc:0 "Infanterie-Fokus"
 GRE_artillery_development:0 "Artillerieentwicklung"
 GRE_artillery_development_desc:0 "Jede gute Infanterie braucht ein solides Artilleriekorps im Rücken, um den Feind mit schwerem Feuer zu schwächen und ihm im Angriff Deckung zu bieten."
 GRE_artillery_development_short_desc:0 "Artillerieentwicklung"
 GRE_support_units:0 "Entwickeln Sie ein unterstützendes Einheitenkorps"
 GRE_support_units_desc:0 "Zusätzlich zur Artillerie zur Unterstützung unserer einfachen Infanterie müssen wir Unterstützungseinheiten wie Sanitäter, Aufklärungstruppen und Pioniere entwickeln, um unseren Truppen im Kampf einen Vorteil zu verschaffen."
 GRE_support_units_short_desc:0 "Entwickeln Sie ein unterstützendes Einheitenkorps"
 GRE_motorized_focus:0 "Motorisierungsfokus"
 GRE_motorized_focus_desc:0 "Um zuerst zuschlagen und die Oberhand über unsere Feinde gewinnen zu können, ist Schnelligkeit unerlässlich. Der griechischen Armee mangelt es dringend an modernen motorisierten Einheiten. Die Entwicklung in diesem Bereich wird es uns ermöglichen, mit einer in unserer Geschichte beispiellosen Geschwindigkeit anzugreifen."
 GRE_motorized_focus_short_desc:0 "Motorisierungsfokus"
 GRE_mechanized_focus:0 "Mechanisierungsbemühungen"
 GRE_mechanized_focus_desc:0 "Wenn wir wirklich mobile, moderne Streitkräfte wollen, wäre der nächste Schritt über die Grundmotorisierung hinaus die Mechanisierung großer Teile unserer Armee."
 GRE_mechanized_focus_short_desc:0 "Mechanisierungsbemühungen"
 GRE_tank_experiments:0 "Panzerexperimente" 
 GRE_tank_experiments_desc:0 "Als Höhepunkt der Panzerkriegsführung müssen wir eine starke Panzervorhut aufbauen, die unsere neuen Panzer- und mechanisierten Divisionen anführt. Mit dieser Vorhut an der Spitze unserer Offensiven wird die Verteidigung unserer Feinde zusammenbrechen."
 GRE_tank_experiments_short_desc:0 "Panzerexperimente"
 GRE_army_doctrine:0 "Entwickeln Sie eine Armeedoktrin" 
 GRE_army_doctrine_desc:0 "Da unsere Truppen vor Ort nun spezialisiert und auf den neuesten Stand gebracht sind, müssen unser Offizierskorps und unser Oberkommando nun eine offizielle Doktrin als Richtschnur für unser gesamtes Militär übernehmen."
 GRE_army_doctrine_short_desc:0 "Entwickeln Sie eine Armeedoktrin"
 GRE_aggressive_doctrine:0 "Aggressive Doktrin" 
 GRE_aggressive_doctrine_desc:0 "Wenn wir unsere Armee entlang der Angriffslinien ausrichten, können wir zuerst zuschlagen und unsere Feinde überraschen."
 GRE_aggressive_doctrine_short_desc:0 "Aggressive Doktrin"
 GRE_defensive_doctrine:0 "Verteidigungsdoktrin" 
 GRE_defensive_doctrine_desc:0 "Griechenland liegt isoliert und von Feinden umgeben. Um den bevorstehenden Sturm zu überleben, muss sich unsere Armee an Verteidigungslinien orientieren und Strategien entwickeln, die auf die Vorbereitung einer Invasion ausgerichtet sind."
 GRE_defensive_doctrine_short_desc:0 "Verteidigungsdoktrin"
 GRE_expand_airforce:0 "Ausbau der Luftwaffe" 
 GRE_expand_airforce_desc:0 "Unsere Luftwaffe mit weniger als 100 Flugzeugen ist stark veraltet, unterbesetzt und unterfinanziert. In jeder Kampfsituation hält sie keine zehn Minuten durch, und den Krieg in der Luft zu verlieren, ist der erste Schritt zur Niederlage. Um zu überleben, müssen wir die griechische Luftwaffe ausbauen und weiterentwickeln."
 GRE_expand_airforce_short_desc:0 "Erweitern Sie die Luftwaffe"
 GRE_support_AEKKEA:0 "Unterstützen Sie AEKKEA"
 GRE_support_AEKKEA_desc:0 "Wir sollten die Produktion unserer Flugzeuge an AEKKEA delegieren, ein Flugzeugunternehmen, das von dem Nazigegner Antonius Raab gegründet wurde. Die Anschaffung von Flugzeugen für die griechische Luftwaffe einer so talentierten und angesehenen Persönlichkeit anzuvertrauen, wird uns einen Vorsprung am Himmel verschaffen."
 GRE_support_AEKKEA_short_desc:0 "Unterstützen Sie AEKKEA"
 GRE_commandeer_TAE:0 "Kommandieren Sie die TAE"
 GRE_commandeer_TAE_desc:0 "Durch die Verstaatlichung der Technical and Aeronautical Holdings, der wichtigsten griechischen Inlandsfluggesellschaft, können wir einige ihrer vorhandenen Flugzeuge für den Truppentransport umfunktionieren."
 GRE_commandeer_TAE_short_desc:0 "Kommandieren Sie die TAE"
 GRE_paratrooper_experiments:0 "Fallschirmjäger-Experimente"
 GRE_paratrooper_experiments_desc:0 "Mit unseren neuen Lufttechnologien sollten wir den Einsatz experimenteller Fallschirmjägereinheiten in Betracht ziehen. Diese könnten uns bei Invasionen ein neues Überraschungsmoment verschaffen, indem sie von oben auf das Schlachtfeld abgeworfen werden."
 GRE_paratrooper_experiments_short_desc:0 "Fallschirmjäger-Experimente"
 GRE_air_academy:0 "Habe den Scholi Ikaron gefunden"
 GRE_air_academy_desc:0 "Für eine leistungsfähige Luftwaffe benötigen wir eine starke Institution zur Ausbildung von Piloten für den Kampfeinsatz. Mit der Gründung der Scholi Ikaron, der griechischen Luftwaffenakademie, können wir mit dem Aufbau eines erfahrenen Pilotenkorps beginnen, das das Rückgrat unserer Luftwaffe bilden wird."
 GRE_air_academy_short_desc:0 "Habe den Scholi Ikaron gefunden"
 GRE_fighter_specialization:0 "Kämpferspezialisierung"
 GRE_fighter_specialization_desc:0 "Unsere Forscher und Theoretiker sollten sich gemeinsam mit unseren Flugzeugkonstrukteuren auf Kampfflugzeuge konzentrieren, um die Luftüberlegenheit über dem Schlachtfeld zu erreichen und so den Weg für weitere Luftoperationen zu ebnen."
 GRE_fighter_specialization_short_desc:0 "Kämpferspezialisierung"
 GRE_CAS_specialization:0 "CAS-Spezialisierung"
 GRE_CAS_specialization_desc:0 "Flugzeuge zur Luftnahunterstützung sind auf dem modernen Schlachtfeld unverzichtbar. Mit der Luftüberlegenheit in großer Höhe und unseren Flugzeugen, die unsere Truppen am Boden auf dem Schlachtfeld unterstützen, können wir nicht verlieren."
 GRE_CAS_specialization_short_desc:0 "CAS-Spezialisierung"
 GRE_naval_cooperation:0 "Zusammenarbeit mit der Marine "
 GRE_naval_cooperation_desc:0 "Wenn wir die Scholi Ikaron dazu bringen, den Anfragen der griechischen Marine nach Luftunterstützung nachzukommen, können wir neue Bombertypen entwickeln, die sich hauptsächlich auf das Treffen von Marinezielen konzentrieren."
 GRE_naval_cooperation_short_desc:0 "Zusammenarbeit mit der Marine "
 GRE_officer_corps:0 "Offizierskorps"
 GRE_officer_corps_desc:0 "Aus unseren Piloten, die die Scholi Ikaron durchlaufen, können wir die Besten und Klügsten auswählen, um ein erfahrenes Offizierskorps zu bilden, das als theoretische und wissenschaftliche Grundlage für die gesamte Luftwaffe dient."
 GRE_officer_corps_short_desc:0 "Offizierskorps"
 GRE_araxos_airbase:0 "Bau des Luftwaffenstützpunkts Araxos"
 GRE_araxos_airbase_desc:0 "Als neuen vorgeschobenen Stützpunkt für unser Bomberkorps sollten wir den Luftwaffenstützpunkt Araxos nahe der albanischen Grenze im nördlichen Epirus gründen, um mögliche zukünftige Bombenangriffe weiter nördlich durchführen zu können."
 GRE_araxos_airbase_short_desc:0 "Bau des Luftwaffenstützpunkts Araxos"
 GRE_tac_bomber:0 "Fokus auf taktische Bomber"
 GRE_tac_bomber_desc:0 "Wir sollten unsere Anstrengungen auf taktische Bomber konzentrieren, die in Verbindung mit Kampfflugzeugen vor allem Truppenziele bombardieren und schwere Bodenunterstützung leisten, um den Feind aus der Luft zu dezimieren."
 GRE_tac_bomber_short_desc:0 "Fokus auf taktische Bomber"
 GRE_strategic_bomber:0 "Strategischer Bomber-Fokus"
 GRE_strategic_bomber_desc:0 "Der nächste Krieg wird ein totaler Krieg sein, bei dem jede Seite alle ihr zur Verfügung stehenden Ressourcen voll ausschöpfen wird. Wir müssen bereit sein, unsere Feinde mit aller Gewalt zu bekämpfen, denn wir können sicher sein, dass sie uns unterstützen werden. Wir sollten strategische Bomber entwickeln, um Infrastruktur, Rüstungsindustrie und andere große, statische Ziele anzugreifen und die feindliche Kriegsmaschinerie zum Stillstand zu bringen."
 GRE_strategic_bomber_short_desc:0 "Strategischer Bomber-Fokus"
 GRE_research_slot_2:0 "Zusätzlicher Forschungsplatz"
 GRE_research_slot_2_desc:0 "Schaltet einen zusätzlichen Forschungsplatz frei."
 GRE_research_slot_2_short_desc:0 "Zusätzlicher Forschungsplatz"
 GRE_rebuild_navy:0 "Wiederaufbau der griechischen Marine"
 GRE_rebuild_navy_desc:0 "Nach dem Ersten Weltkrieg und dem Griechisch-Türkischen Krieg wurde unsere Marine schrittweise dezimiert und ist unterfinanziert und vernachlässigt. Griechenland ist eine Seefahrernation, und zwar seit jeher, seit die ersten Griechen vor tausend Jahren das Mittelmeer kolonisierten. Dieser Zustand unserer Marine ist inakzeptabel und muss geändert werden."
 GRE_rebuild_navy_short_desc:0 "Wiederaufbau der griechischen Marine"
 GRE_underdog_tactics:0 "Außenseitertaktiken"
 GRE_underdog_tactics_desc:0 "Da es unwahrscheinlich ist, dass wir den großen Seemächten des Mittelmeers direkt gegenübertreten können, müssen wir auf raffiniertere und hinterhältigere Taktiken zurückgreifen, um die Oberhand zu gewinnen. Indem wir uns auf leichte und schnelle Schiffe konzentrieren, können wir den Feind ausmanövrieren und verwirren und ihn hilflos zurücklassen."
 GRE_underdog_tactics_short_desc:0 "Außenseitertaktiken"
 GRE_submarine_corps:0 "Griechisches U-Boot-Korps"
 GRE_submarine_corps_desc:0 "Durch den Ausbau unseres U-Boot-Korps können wir feindliche Schiffe ausbeuten und dort zuschlagen, wo sie es am wenigsten erwarten."
 GRE_submarine_corps_short_desc:0 "Griechisches U-Boot-Korps"
 GRE_destroyer_force:0 "Moderne Zerstörerstreitkräfte"
 GRE_destroyer_force_desc:0 "Zusätzlich zu einem U-Boot-Korps sollten wir unsere Zerstörer, schnelle und wendige Überwasserschiffe, als Hauptbestandteil unserer Marine entwickeln."
 GRE_destroyer_force_short_desc:0 "Moderne Zerstörerstreitkräfte"
 GRE_convoy_escorts:0 "Konvoi-Eskorten"
 GRE_convoy_escorts_desc:0 "Neben der Ausnutzung feindlicher Schifffahrt und Logistik müssen wir auch die Sicherheit unserer eigenen gewährleisten. Indem wir uns auf die Massenproduktion von Konvois und Zerstörern konzentrieren, erhöhen wir unsere Chancen gegen feindliche Angriffe auf unsere Schifffahrt."
 GRE_convoy_escorts_short_desc:0 "Konvoi-Eskorten"
 GRE_heavy_fleet:0 "Großkampfschiffflotte"
 GRE_heavy_fleet_desc:0 "Wir sollten uns auf den Aufbau konzentrieren, um Schulter an Schulter mit den anderen Seemächten des Mittelmeers zu stehen, und uns auf schwere Schiffe wie Kreuzer und Schlachtkreuzer konzentrieren, die um ein wichtiges Großkampfschiff gruppiert sind, um traditionelle offene Schlachten zu gewinnen."
 GRE_heavy_fleet_short_desc:0 "Großkampfschiffflotte"
 GRE_cruiser_support:0 "Kreuzerunterstützungstruppe"
 GRE_cruiser_support_desc:0 "Der Großteil unserer schweren Flotte sollte aus Kreuzern bestehen, die als Wache um unser Großkampfschiff dienen."
 GRE_cruiser_support_short_desc:0 "Kreuzerunterstützungstruppe"
 GRE_battlecruiser_vanguard:0 "Schlachtkreuzer-Vorhut"
 GRE_battlecruiser_vanguard_desc:0 "Mit unseren Kreuzern an den Flanken sollte die Hauptvorhut unserer Flotte aus schweren Schlachtkreuzern bestehen, die ihrerseits um ein einzelnes Großkampfschiff herum angeordnet sind."
 GRE_battlecruiser_vanguard_short_desc:0 "Schlachtkreuzer-Vorhut"
 GRE_carrier_focus:0 "Träger-Flaggschiff"
 GRE_carrier_focus_desc:0 "Wir sollten einen Flugzeugträger als Flaggschiff und Speerspitze unserer Flotte entwickeln. Flugzeugträger sind der neueste Stand der Marinetechnologie, und ihr effektiver Einsatz auf See muss sich noch beweisen, doch wichtige Fraktionen der griechischen Marine glauben, dass ihnen die Zukunft gehört."
 GRE_carrier_focus_short_desc:0 "Träger-Flaggschiff"
 GRE_battleship_focus:0 "Schlachtschiff-Flaggschiff"
 GRE_battleship_focus_desc:0 "Unsere Flotte sollte sich um ein einzelnes schweres Schlachtschiff konzentrieren, ein wahrer Moloch auf See. Flankiert von leichteren Schutzschiffen werden feindliche Flotten unter schwerem Feuer auseinanderfallen."
 GRE_battleship_focus_short_desc:0 "Schlachtschiff-Flaggschiff"
 GRE_naval_infrastructure:0 "Marineinfrastruktur"
 GRE_naval_infrastructure_desc:0 "Bevor wir eine große Marine aufbauen können, müssen wir unseren Schiffsbau und unsere Marineanlagen modernisieren."
 GRE_naval_infrastructure_short_desc:0 "Marineinfrastruktur"
 GRE_marine_corps:0 "Marine Corps"
 GRE_marine_corps_desc:0 "Wenn wir eine experimentelle Marinestreitmacht entwickeln, die der Armee angegliedert ist und mit der Flotte zusammenarbeitet, können wir mit einer neuen Leichtigkeit Seeinvasionen durchführen."
 GRE_marine_corps_short_desc:0 "Marine Corps"
 GRE_ideological_drift:0 "Ideologischer Drift"
 GRE_ideological_drift_desc:0 "Die Welt verändert sich radikal, und wir müssen uns mit ihr verändern. Unsere unbequeme Neutralitätsposition wird zunehmend unhaltbar, und wenn wir überleben wollen, müssen wir Verbündete suchen."
 GRE_ideological_drift_short_desc:0 "Ideologischer Drift"
 GRE_court_allies:0 "Werben Sie um die Alliierten"
 GRE_court_allies_desc:0 "Wir kämpften im Ersten Weltkrieg an der Seite der Alliierten gegen die Mittelmächte, und unsere Bande sind seitdem stark. Mussolini fürchtet uns vielleicht nicht, aber er fürchtet die Royal Navy im Mittelmeer und Frankreich vor seiner Haustür. Wenn wir alte Bande wiederbeleben, können wir diesem neuen Bündnis beitreten."
 GRE_court_allies_short_desc:0 "Werben Sie um die Alliierten"
 GRE_democratic_reform:0 "Demokratische Reform"
 GRE_democratic_reform_desc:0 "Die Diktatur, die zunehmend unpopulär wird und von Armee und Monarchie gestützt wird, ist auf dem Weg zum Ende. Es wäre inakzeptabel, wenn wir in diesem Bündnis für Freiheit und demokratische Rechte eintreten und gleichzeitig Metaxas als unseren obersten Führer behalten würden. Es ist Zeit für einen Wandel."
 GRE_democratic_reform_short_desc:0 "Demokratische Reform"
 GRE_open_elections:0 "Halten Sie offene Wahlen ab"
 GRE_open_elections_desc:0 "Es ist an der Zeit, die Zukunft des Landes wieder dem Volk zu überlassen. Lassen Sie es seine eigene Führung wählen, und hoffentlich werden seine Entscheidungen weise sein."
 GRE_open_elections_short_desc:0 "Halten Sie offene Wahlen ab"
 GRE_empower_parliament:0 "Stärkung des Parlaments"
 GRE_empower_parliament_desc:0 "Unter der metaxistischen Diktatur war das griechische Parlament stark eingeschränkt und fungierte eher als Vorzeigeorgan denn als legitime Legislative. Das muss sich ändern."
 GRE_empower_parliament_short_desc:0 "Stärkung des Parlaments"
 GRE_mi_complex:0 "Militärisch-industrieller Komplex"
 GRE_mi_complex_desc:0 "Durch die Verknüpfung unserer Armee und der sie beliefernden Rüstungsindustrie können wir die Vorteile hochentwickelter, privat entwickelter Technologien nutzen und die Volkswirtschaft stärken, indem wir Arbeitsplätze für unsere Arbeitslosen schaffen."
 GRE_mi_complex_short_desc:0 "Militärisch-industrieller Komplex"
 GRE_mass_recruitment:0 "Massenrekrutierung"
 GRE_mass_recruitment_desc:0 "Die Armee braucht Männer, und unsere Bevölkerung ist nicht begeistert – das muss sich ändern. Wir sollten eine landesweite Propagandakampagne starten, um die Menschen zu motivieren, sich für ihr Land zu melden."
 GRE_mass_recruitment_short_desc:0 "Massenrekrutierung"
 GRE_reconcile_venizelism:0 "Versöhnung mit dem Venizelismus"
 GRE_reconcile_venizelism_desc:0 "Unter der Metaxisten-Diktatur wurden Anhänger des Venizelismus, der liberal-nationalistischen politischen Bewegung, die nach dem ehemaligen griechischen Premierminister Eleftherios Venizelos benannt ist, unterdrückt und ihre Anführer ins Exil geschickt. Es ist an der Zeit, das nationale Tabu des Venizelismus zu beenden und ihn als Verbündete und nicht als Feinde zu betrachten."
 GRE_reconcile_venizelism_short_desc:0 "Versöhnung mit dem Venizelismus"
 GRE_moderate_nationalism:0 "Gemäßigter Nationalismus"
 GRE_moderate_nationalism_desc:0 "Historisch gesehen war der territoriale Nationalismus ein zentrales Thema der griechischen Politik und fand Unterstützung aus allen politischen Lagern. Es ist an der Zeit, diese unverschämten Gebietsansprüche auf Zypern, weite Teile der Türkei und andere Gebiete auf dem Balkan zu beenden."
 GRE_moderate_nationalism_short_desc:0 "Gemäßigter Nationalismus"
 GRE_abolish_monarchy:0 "Die Monarchie abschaffen"
 GRE_abolish_monarchy_desc:0 "Die Monarchie des Hauses Glücksburg wird immer unbeliebter. Ihr früheres Bündnis mit der Metaxisten-Diktatur zur Unterdrückung des griechischen Volkes ist noch immer ein nationaler Skandal, und wenn wir eine echte Demokratie haben wollen, ist es Zeit für sie zu gehen."
 GRE_abolish_monarchy_short_desc:0 "Die Monarchie abschaffen"
 GRE_metaxism_desc:0 "Bisher waren wir gegenüber den Menschen nachsichtig, doch jetzt, wo der Wind der Veränderung weht, ist es an der Zeit, wirklich hart durchzugreifen und einen metaxistischen Staat zu errichten."
 GRE_metaxism_short_desc:0 "Metaxismus verbreiten"
 GRE_youth:0 "Nationale Jugendorganisation"
 GRE_youth_desc:0 "Um die breite Unterstützung zu mobilisieren und die nächste Generation mit den Idealen des Staates vertraut zu machen, müssen wir eine nationale Jugendorganisation gründen – eine Nation, ein König, ein Führer, eine Jugend."
 GRE_youth_short_desc:0 "Nationale Jugendorganisation"
 GRE_secret_police:0 "Errichten Sie die Asfaleia"
 GRE_secret_police_desc:0 "Es gibt viele Staatsfeinde, und ihre abweichenden Ansichten sind eine degenerative Krankheit der Nation. Wenn wir standhaft bleiben wollen, müssen diese zerstörerischen nationalen Elemente beseitigt werden. Zu diesem Zweck sollten wir die Asfaleia gründen, eine Geheimpolizei nach dem Vorbild der deutschen Gestapo, um diese subversiven Elemente zu jagen und zu neutralisieren."
 GRE_secret_police_short_desc:0 "Errichten Sie die Asfaleia"
 GRE_crush_venizelists:0 "Zerschmettert die Venizelisten"
 GRE_crush_venizelists_desc:0 "Die Venizelisten, eine liberale nationalistische Bewegung, die sich gegen die Monarchie stellt, sind die Antithese unseres Regimes, das auf den Säulen der Armee und der Monarchie steht. Lassen wir die neue Asfaleia gegen diese Verräter vorgehen."
 GRE_crush_venizelists_short_desc:0 "Zerschmettert die Venizelisten"
 GRE_new_state:0 "Der neue Staat"
 GRE_new_state_desc:0 "Um ein starkes und geeintes Griechenland zu errichten, müssen die Überreste des alten Staates niedergerissen und zerstört werden. Der Individualismus, Liberalismus und die lasziv-faire Wirtschaftspolitik des alten Griechenlands müssen hinweggefegt und durch eine einzige geeinte griechische Nation für Gott, König und Vaterland ersetzt werden."
 GRE_new_state_short_desc:0 "Der neue Staat"
 GRE_economic_policy:0 "Sozialisierte Wirtschaftspolitik"
 GRE_economic_policy_desc:0 "Wir sollten das alte kapitalistische System reformieren und unsere Wirtschaftsstruktur im Sinne eines stärker korporatistischen Ansatzes umbauen, indem wir einen Mindestlohn, Mutterschaftsurlaub, eine Fünf-Tage-Woche und weitere Reformen der Arbeitnehmerrechte einführen."
 GRE_economic_policy_short_desc:0 "Sozialisierte Wirtschaftspolitik"
 GRE_horizontal_labor:0 "Horizontale Arbeitsstruktur"
 GRE_horizontal_labor_desc:0 "Wenn wir unsere Wirtschaftsstruktur zum Wohle der griechischen Bevölkerung reformieren wollen, müssen wir von einer „vertikalen“ Struktur nach sozialen Klassen zu einer „horizontalen“ Struktur übergehen, die nach Produktionszweigen organisiert ist."
 GRE_horizontal_labor_short_desc:0 "Horizontale Arbeitsstruktur"
 GRE_four_values:0 "Die vier Werte"
 GRE_four_values_desc:0 "Die neue griechische Gesellschaft muss auf den vier traditionellen Werten aufbauen: Vaterland, Loyalität, Familie und Religion."
 GRE_four_values_short_desc:0 "Die vier Werte"
 GRE_third_civilisation:0 "Dritte hellenische Zivilisation"
 GRE_third_civilisation_desc:0 "Griechenland blickt auf eine glorreiche Geschichte zurück – zuerst das antike Griechenland, die Wiege der westlichen Kultur. Dann kamen die Erben Roms, das Byzantinische Reich, und schließlich die Gegenwart. Aus der Asche des Ersten Weltkriegs und der Niederlage im Griechisch-Türkischen Krieg wird das Neue Griechenland wie ein Phönix wieder auferstehen, größer als alles, was zuvor da war."
 GRE_third_civilisation_short_desc:0 "Dritte hellenische Zivilisation"
 GRE_anglo_greek_alliance:0 "Anglo-Griechische Allianz"
 GRE_anglo_greek_alliance_desc:0 "Großbritannien war im Ersten Weltkrieg ein wichtiger Verbündeter Griechenlands und seine starke Mittelmeerflotte sowie seine Gebiete in Gibraltar, Malta und Ägypten verschafften dem Land eine gute Position, um uns vor der italienischen Aggression zu schützen."
 GRE_anglo_greek_alliance_short_desc:0 "Anglo-Griechische Allianz"
 GRE_interventionism:0 "Interventionismus im Ausland"
 GRE_interventionism_desc:0 "Überall auf der Welt sind Demokratie und Freiheit der Menschen bedroht. Wir sollten in diesen Konflikten eine Politik der Intervention verfolgen, um unsere nationalen Interessen zu stärken und zu fördern."
 GRE_interventionism_short_desc:0 "Interventionismus im Ausland"
 GRE_expeditions:0 "Ausländische Expeditionstruppen"
 GRE_expeditions_desc:0 "Wir sollten staatlich geförderte Freiwilligenbrigaden aus der Armee und der willigen Zivilbevölkerung bilden, die ins Ausland gehen und auf ausländischen Schlachtfeldern für unsere nationalen Interessen kämpfen."
 GRE_expeditions_short_desc:0 "Ausländische Expeditionstruppen"
 GRE_join_allies:0 "Schließen Sie sich den Verbündeten an"
 GRE_join_allies_desc:0 "Wir werden im Westen von Italien, im Norden von Bulgarien und im Nordosten von der Sowjetunion bedroht. Solange sie ihre Eroberungsambitionen nicht aufgeben, können wir keinen Frieden mit ihnen schließen. Wenn unsere Zukunft gesichert sein soll, sollten wir das englisch-griechische Bündnis ausbauen und uns den Alliierten anschließen."
 GRE_join_allies_short_desc:0 "Schließen Sie sich den Verbündeten an"
 GRE_allied_aid:0 "Fordern Sie die Hilfe der Alliierten an"
 GRE_allied_aid_desc:0 "Da Europa in einen Krieg verwickelt ist, brauchen wir jede Hilfe, die wir bekommen können, und unsere Kriegsmaschinerie gerät zunehmend unter Druck. Wir sollten die stärkeren Verbündeten um materielle Hilfe bitten, damit unsere Truppen gut ausgerüstet und kampfbereit bleiben."
 GRE_allied_aid_short_desc:0 "Fordern Sie die Hilfe der Alliierten an"
 GRE_rally_pact:0 "Den Balkanpakt mobilisieren"
 GRE_rally_pact_desc:0 "Der Balkanpakt, der 1934 zwischen Griechenland, der Türkei, Rumänien und Jugoslawien, vor allem gegen Bulgarien, geschlossen wurde, hat allmählich an Bedeutung verloren. Wir sollten unsere Verbindungen zu diesen Nationen bekräftigen und sie unter den Alliierten vereinen. Wir sollten demokratische Bestrebungen in Staaten unterstützen, in denen noch immer Tyrannei herrscht."
 GRE_rally_pact_short_desc:0 "Den Balkanpakt mobilisieren"
 GRE_induct_romania:0 "Rumänien einladen"
 GRE_induct_romania_desc:0 "Angesichts unserer anhaltenden Freundschaft und zunehmenden ideologischen Übereinstimmung sollten wir Großbritannien bitten, Rumänien in die Allianz aufzunehmen."
 GRE_induct_romania_short_desc:0 "Rumänien einladen"
 GRE_induct_yugoslavia:0 "Jugoslawien einladen"
 GRE_induct_yugoslavia_desc:0 "Die Beziehungen zwischen Griechenland und Jugoslawien waren in der Vergangenheit zwar angespannt, haben sich in den letzten Jahren jedoch verbessert, insbesondere durch die Abkehr der jugoslawischen Regierung vom Despotismus hin zur Demokratie. Um diese Beziehungen zu festigen, sollten wir Großbritannien auffordern, sie im Hinblick auf eine Mitgliedschaft in den Bündnissen zu prüfen."
 GRE_induct_yugoslavia_short_desc:0 "Jugoslawien einladen"
 GRE_turkish_alliance:0 "Griechisch-türkische Allianz"
 GRE_turkish_alliance_desc:0 "Die Türkei ist der alte Feind Griechenlands – seit dem Fall Byzanz, über unseren Unabhängigkeitskrieg, die Balkankriege, den Ersten Weltkrieg und zuletzt die demütigende Niederlage im Griechisch-Türkischen Krieg. Es gab kaum eine Zeit, in der sich Griechen und Türken nicht gegenseitig bekämpften. Doch wir können unsere Beziehungen durch ein Bündnis wieder in Ordnung bringen."
 GRE_turkish_alliance_short_desc:0 "Griechisch-türkische Allianz"
 GRE_induct_turkey:0 "Laden Sie die Türkei ein"
 GRE_induct_turkey_desc:0 "Die Wunden der Vergangenheit werden durch das jüngste griechisch-türkische Bündnis allmählich geheilt, und die Türkei vollzieht ihren Weg zu einer echten Demokratie. Nun ist es an der Zeit, die Türkei offiziell einzuladen, sich den Bündnispartnern anzuschließen und Seite an Seite mit Griechenland die neue Weltordnung zu gestalten."
 GRE_induct_turkey_short_desc:0 "Laden Sie die Türkei ein"
 GRE_fascist_drift:0 "Faschistische Drift"
 GRE_fascist_drift_desc:0 "Angesichts der bereits vorhandenen autoritären und pseudofaschistischen Tendenzen unseres Regimes wäre es für uns kein Problem, immer tiefer in den Abgrund und in den Faschismus zu rutschen."
 GRE_fascist_drift_short_desc:0 "Faschistische Drift"
 GRE_fascist_volunteers:0 "Faschistische Freiwillige"
 GRE_fascist_volunteers_desc:0 "Wir sollten unseren ideologisch ergebenen Bürgern erlauben und sie dabei unterstützen, im Ausland für die faschistische Sache zu kämpfen, an die sie glauben, um unsere nationalen Interessen zu fördern und gleichzeitig die direkten Auswirkungen der Entsendung von Armeetruppen zu vermeiden."
 GRE_fascist_volunteers_short_desc:0 "Faschistische Freiwillige"
 GRE_EEE_coalition:0 "Metaxist-EEE-Koalition"
 GRE_EEE_coalition_desc:0 "Um der wachsenden faschistischen Massenbewegung, die mit unserer Regierung kollidiert, entgegenzuwirken, sollten wir ihnen erlauben, die Macht in einer Koalition mit den Metaxisten zu teilen."
 GRE_EEE_coalition_short_desc:0 "Metaxist-EEE-Koalition"
 GRE_hellenic_guard:0 "Griechische Garde"
 GRE_hellenic_guard_desc:0 "Mit ihrer neuen Position in der Regierung hat die EEE ihre eigene paramilitärische Truppe, die Hellenische Garde, gegründet, um politische Gegner zu schikanieren und die Bewegung zu verteidigen. Der Staat ist weiterhin machtlos, sie aufzuhalten, und die Nation sieht sich zunehmend mit vorgehaltener Waffe konfrontiert."
 GRE_hellenic_guard_short_desc:0 "Griechische Garde"
 GRE_march_on_athens:0 "Marsch auf Athen"
 GRE_march_on_athens_desc:0 "Die EEE gab sich nicht länger damit zufrieden, die Macht nur zu teilen. Sie ließen ihre kürzlich gegründete Hellenische Garde nach Athen marschieren, stürzten die metaxistische Regierung und schickten Metaxas selbst ins Exil. An ihrer Stelle setzten sie ihren eigenen Anführer als Archigos oder Führer der griechischen Nation ein."
 GRE_march_on_athens_short_desc:0 "Marsch auf Athen"
 GRE_ban_communism:0 "Verbot der KKE"
 GRE_ban_communism_desc:0 "Mit unserer neu gewonnenen Macht sollten wir die Kommunistische Partei Griechenlands, die KKE, verbieten. Ihr degenerierter Bolschewismus hat in der neuen griechischen Gesellschaft keinen Platz."
 GRE_ban_communism_short_desc:0 "Verbot der KKE"
 GRE_dissolve_parliament:0 "Das Parlament auflösen"
 GRE_dissolve_parliament_desc:0 "Mit unserem neuen Archigos als oberstem Führer des griechischen Volkes wird die Legislative nicht mehr benötigt. Wir sollten ein Dekret verkünden, das die rechtlichen Befugnisse des griechischen Parlaments abschafft und es uns ermöglicht, die Nation nach unseren Wünschen umzugestalten."
 GRE_dissolve_parliament_short_desc:0 "Das Parlament auflösen"
 GRE_new_constitution:0 "Neue Verfassung"
 GRE_new_constitution_desc:0 "Nachdem die Legislative aus dem Weg geräumt ist, sollten wir eine neue Verfassung für den neuen Staat erlassen, die uns alle gewünschten Befugnisse einräumt und die alten Standards abschafft."
 GRE_new_constitution_short_desc:0 "Neue Verfassung"
 GRE_labor_ministry:0 "Nationales Arbeitsministerium"
 GRE_labor_ministry_desc:0 "Die arbeitslosen und unzufriedenen Arbeiter bilden das Rückgrat unserer Revolution. Wir müssen diese Unterstützung mobilisieren und ihnen in unserem neuen Regime Arbeit geben. Wir sollten ein nationales Arbeitsministerium einrichten, das die landesweiten Produktions- und Arbeitsprojekte leitet."
 GRE_labor_ministry_short_desc:0 "Nationales Arbeitsministerium"
 GRE_war_machine:0 "Hellenic War Machine"
 GRE_war_machine_desc:0 "Zur Vorbereitung auf einen Krieg sollte das nationale Arbeitsministerium seine Produktion auf die Rüstungsindustrie ausrichten."
 GRE_war_machine_short_desc:0 "Hellenic War Machine"
 GRE_fascist_symbolism:0 "Faschistische Symbolik"
 GRE_fascist_symbolism_desc:0 "Durch die Verwendung mutiger, eindrucksvoller Bilder und die Übernahme der Theorie der Ästhetik der Politik können wir wie nie zuvor eine Massenattraktivität für das Regime mobilisieren."
 GRE_fascist_symbolism_short_desc:0 "Faschistische Symbolik"
 GRE_totalitarian_state:0 "Totalitärer Staat"
 GRE_totalitarian_state_desc:0 "Durch die schrittweise Konsolidierung der Macht, die Umstrukturierung der Regierungssysteme und die Unterdrückung von Dissidenten haben wir ein völlig totalitäres Regime errichtet, bei dem die Partei an der Spitze der gesamten Nation steht."
 GRE_totalitarian_state_short_desc:0 "Totalitärer Staat"
 GRE_revise_lausanne:0 "Lausanne überarbeiten"
 GRE_revise_lausanne_desc:0 "Was uns 1920 nach dem Ersten Weltkrieg im Vertrag von Sèvres zugesprochen wurde, ging im Griechisch-Türkischen Krieg und dem darauffolgenden Vertrag von Lausanne beinahe sofort verloren. Alle unsere territorialen Errungenschaften aus dem Krieg wurden dadurch zunichte gemacht. Wir wurden von den Alliierten verraten, aber wir werden die Sache selbst in Ordnung bringen."
 GRE_revise_lausanne_short_desc:0 "Revise Lausanne"
 GRE_pacify_bulgaria:0 "Bulgarien befrieden"
 GRE_pacify_bulgaria_desc:0 "Bulgarien, unser Todfeind im Ersten Weltkrieg und zuvor in den Balkankriegen, läuft Gefahr, uns erneut aufzurüsten und zu bedrohen. Bevor sie eine schlagkräftige Streitmacht aufstellen können, sollten wir einmarschieren und sie ein für alle Mal Griechenland unterwerfen."
 GRE_pacify_bulgaria_short_desc:0 "Bulgarien befrieden"
 GRE_claim_macedonia:0 "Anspruch auf Mazedonien"
 GRE_claim_macedonia_desc:0 "Mazedonien, die alte Heimat Alexanders des Großen, des größten Griechen, ist in slawische Hände gefallen. Dies muss korrigiert werden."
 GRE_claim_macedonia_short_desc:0 "Anspruch auf Mazedonien"
 GRE_demand_constantinople:0 "Nachfrage Konstantinopel"
 GRE_demand_constantinople_desc:0 "Istanbul, oder wie es richtig heißt, Konstantinopel, wurde vor fast 500 Jahren von den Türken erobert. Es ist an der Zeit, diese nationale Schande zu beseitigen und Konstantinopel als Hauptstadt unseres neuen griechischen Reiches zurückzuerobern."
 GRE_demand_constantinople_short_desc:0 "Nachfrage Konstantinopel"
 GRE_megali_idea:0 "Die Megali-Idee"
 GRE_megali_idea_desc:0 "Es ist an der Zeit, die alte Megali-Idee wiederzubeleben, das griechisch-nationalistische Konzept der Eroberung Westanatoliens und der türkischen Ägäisküste, des alten Territoriums des antiken Griechenlands, in dem noch immer eine bedeutende griechische Minderheit lebt."
 GRE_megali_idea_short_desc:0 "Die Megali-Idee"
 GRE_enosis:0 "Enosis"
 GRE_enosis_desc:0 "Die zypriotischen Griechen fordern schon lange die Enosis, die Vereinigung aller Griechen unter einem hellenischen Staat. Nachdem wir unsere anderen territorialen Ambitionen verwirklicht haben, ist es an der Zeit, dieses Ziel endlich zu erreichen – notfalls mit Gewalt."
 GRE_enosis_short_desc:0 "Enosis"
 GRE_pontus:0 "Erobere Pontus zurück"
 GRE_pontus_desc:0 "An der Nordküste der Türkei, in der Antike Pontus genannt, leben noch heute viele Griechen, die sogenannten Pontosgriechen. Wenn wir endlich alle Griechen unter einem Banner vereinen wollen, müssen die Pontosgriechen in die Gemeinschaft aufgenommen werden."
 GRE_pontus_short_desc:0 "Erobere Pontus zurück"
 GRE_crimea:0 "Wiederherstellung der Handelsposten auf der Krim"
 GRE_crimea_desc:0 "Vor Jahrhunderten säumten griechische Kolonien die Küste des Schwarzen Meeres, damals bekannt als Euxinisches Meer. Im Laufe der Zeit wurden diese von Barbaren und Wilden zerstört, und heute liegen nur noch windgepeitschte Ruinen dort, wo einst geschäftige Kunst- und Kulturstädte standen. Es ist Zeit, zurückzuerobern, was einst uns gehörte und wieder uns gehören wird."
 GRE_crimea_short_desc:0 "Wiederherstellung der Handelsposten auf der Krim"
 GRE_intimidate_bulgaria:0 "Bulgarien zwingen"
 GRE_intimidate_bulgaria_desc:0 "Da Bulgarien, ein alter Feind von uns, von verbündeten Staaten umgeben ist, können wir Druck auf das Land ausüben, damit es seine Waffen abgibt, sein Regierungssystem reformiert und sich den Alliierten anschließt."
 GRE_intimidate_bulgaria_short_desc:0 "Bulgarien zwingen"
 GRE_balkan_diplomacy:0 "Balkandiplomatie"
 GRE_balkan_diplomacy_desc:0 "Wir sollten diplomatische Optionen für den Aufbau ideologischer Allianzen mit den Balkanstaaten prüfen, anstatt unsere territorialen Ziele gegen sie zu verfolgen."
 GRE_balkan_diplomacy_short_desc:0 "Balkandiplomatie"
 GRE_befriend_yugoslavia:0 "Jugoslawien einladen"
 GRE_befriend_yugoslavia_desc:0 "Wir sollten unseren nördlichen Nachbarn und Titanen des Balkans, Jugoslawien, einladen. Mit Jugoslawien an unserer Seite sind wir in einer guten Position, um die anderen Balkanstaaten einzuschüchtern oder zu zwingen, unserem Block beizutreten."
 GRE_befriend_yugoslavia_short_desc:0 "Jugoslawien einladen"
 GRE_ally_romania:0 "Rumänien einladen"
 GRE_ally_romania_desc:0 "Da Jugoslawien nun auf unserer Seite ist, sollten wir Rumänien einladen. Wir haben zwar keine gemeinsamen Landgrenzen, doch wenn wir Rumänien an unserer Seite haben, umschließt unser Bündnis Bulgarien vollständig und schneidet unseren alten Feind ab."
 GRE_ally_romania_short_desc:0 "Rumänien einladen"
 GRE_ally_hungary:0 "Ungarn einladen"
 GRE_ally_hungary_desc:0 "Obwohl Ungarn etwas weiter im Norden liegt, gibt es dort bereits seit langem eine faschistische Regierung unter Miklos Horthy, mit der wir ideologisch gemeinsame Ziele verfolgen, und ihre Position ermöglicht es uns, Rumänien und die Tschechoslowakei in Zukunft zu bedrohen."
 GRE_ally_hungary_short_desc:0 "Ungarn einladen"
 GRE_balkan_league:0 "Die Balkanliga gründen"
 GRE_balkan_league_desc:0 "Wir sollten den alten Balkanbund wiederbeleben, der vor fast einem halben Jahrhundert in den Balkankriegen zunächst dem Osmanischen Reich und dann Bulgarien gegenüberstand. Wenn wir dieses alte Bündnis wiederbeleben, können wir den Alliierten, den Achsenmächten und der Komintern als starke vierte Kolonne in Europa dienen."
 GRE_balkan_league_short_desc:0 "Die Balkanliga gründen"
 GRE_threaten_bulgaria:0 "Bedrohen Sie Bulgarien"
 GRE_threaten_bulgaria_desc:0 "Da Bulgarien von allen Seiten von verbündeten Staaten umgeben ist, stellen sie unsere einzige größere Opposition auf dem Balkan dar. Aufgrund unserer vorteilhaften Position sollten wir ein Ultimatum stellen und von ihnen verlangen, sich unserem Willen zu unterwerfen."
 GRE_threaten_bulgaria_short_desc:0 "Bedrohen Sie Bulgarien"
 GRE_threaten_turkey:0 "Drohen Sie der Türkei"
 GRE_threaten_turkey_desc:0 "Da Bulgarien nun freundlich gesinnt ist, bleibt zur Konsolidierung der Balkanliga nur noch die Integration unseres alten Feindes, der Türkei. Mit unserer überwältigenden militärischen Überlegenheit sollten wir Druck auf sie ausüben, damit sie ihr politisches System reformieren und sich der Liga unterwerfen."
 GRE_threaten_turkey_short_desc:0 "Drohen Sie der Türkei"
 GRE_claims_albania:0 "Ansprüche auf Argyrokastro"
 GRE_claims_albania_desc:0 "Mit unserem neuen Bündnis im Rücken können wir nun einige unserer territorialen Ziele gegenüber Nationen verfolgen, die ansonsten als stärker gelten würden. Ein Beispiel hierfür ist das von Italien besetzte Südalbanien, wo eine bedeutende ethnische Minderheit griechischer Herkunft lebt. Es ist an der Zeit, sie dem griechischen Staat zu unterwerfen."
 GRE_claims_albania_short_desc:0 "Ansprüche auf Argyrokastro"
 GRE_claims_italy:0 "Ansprüche auf den Dodekanes"
 GRE_claims_italy_desc:0 "Mit unserem neuen Bündnis können wir Italien endlich die seit 1912 besetzten Docanesischen Inseln streitig machen. Diese Inseln sind die Heimat von Griechen, waren schon in archaischen Zeiten griechisches Territorium und werden rechtmäßig wieder griechisch sein."
 GRE_claims_italy_short_desc:0 "Ansprüche auf den Dodekanes"
 GRE_ideological_allies:0 "Ideologische Verbündete"
 GRE_ideological_allies_desc:0 "Wir sollten unsere diplomatischen Möglichkeiten prüfen und versuchen, unsere Beziehungen zu jenen zu verbessern, mit denen wir ideologisch gemeinsame Ziele verfolgen."
 GRE_ideological_allies_short_desc:0 "Ideologische Verbündete"
 GRE_german_ties:0 "Griechisch-deutsche Verbindungen"
 GRE_german_ties_desc:0 "Wir sollten uns mit Deutschland, der nationalsozialistischen Bastion Europas, verbünden, in der Hoffnung auf eine eventuelle Mitgliedschaft in den Achsenmächten."
 GRE_german_ties_short_desc:0 "Griechisch-deutsche Verbindungen"
 GRE_join_axis:0 "Treten Sie der Achse bei"
 GRE_join_axis_desc:0 "Aufbauend auf unseren bestehenden Bindungen zu Deutschland sollten wir die Mitgliedschaft in der Achse beantragen."
 GRE_join_axis_short_desc:0 "Treten Sie der Achse bei"
 GRE_join_axis:0 "Treten Sie der Achse bei"
 GRE_join_axis_desc:0 "Aufbauend auf unseren bestehenden Verbindungen zu Deutschland sollten wir die Mitgliedschaft in der Achse beantragen."
 GRE_join_axis_short_desc:0 "Treten Sie der Achse bei"
 GRE_axis_aid:0 "Achsenhilfe"
 GRE_axis_aid_desc:0 "Angesichts des Krieges in Europa benötigen wir materielle Hilfe, um unsere Kriegsmaschinerie funktionsfähig zu halten und unsere Truppen für den nächsten Kampf einsatzbereit zu halten. Wir sollten Deutschland oder einen unserer anderen stärkeren Verbündeten um ein Leih- und Pachtgesetz ersuchen."
 GRE_axis_aid_short_desc:0 "Achsenhilfe"
 GRE_hungary_agreement:0 "Produktionsvereinbarungen mit Ungarn"
 GRE_hungary_agreement_desc:0 "Um unsere Wirtschaftsbeziehungen zu unseren Achsenmächten zu stärken, sollten wir ein Handelsabkommen mit Ungarn wegen seiner großen Aluminiumreserven abschließen."
 GRE_hungary_agreement_aid_short_desc:0 "Produktionsvereinbarungen mit Ungarn"
 GRE_reconcile_italy:0 "Italien versöhnen"
 GRE_reconcile_italy_desc:0 "Italien, unser westlicher Nachbar am Ionischen Meer, bietet unsere besten Chancen auf einen starken Verbündeten in der Nähe. Nach den Spannungen der letzten Jahre sollten wir versuchen, unsere diplomatischen Beziehungen zu ihm wiederherzustellen. Vor allem sollten wir auf unsere Ansprüche auf die von Italien besetzten Dodekanes-Inseln verzichten."
 GRE_reconcile_italy_short_desc:0 "Italien versöhnen"
 GRE_marble_pact:0 "Marmorpakt"
 GRE_marble_pact_desc:0 "Wir sollten einen formellen Militärpakt mit Italien unterzeichnen, in dem wir Freundschaft und Zusammenarbeit versprechen, um unsere territorialen Ambitionen gemeinsam zu verwirklichen."
 GRE_marble_pact_short_desc:0 "Marmorpakt"
 GRE_german_innovation:0 "Deutsche Panzerinnovationen"
 GRE_german_innovation_desc:0 "Wir sollten deutsche Panzerinnovationen für unsere eigenen Panzerdivisionen übernehmen und von ihrer bewährten Militärdoktrin lernen."
 GRE_german_innovation_short_desc:0 "Deutsche Panzerinnovationen"
 GRE_german_research:0 "Deutsche Forschung"
 GRE_german_research_desc:0 "Durch das Studium der Arbeit deutscher Militärwissenschaftler können wir neue industrielle und militärische Methoden entwickeln."
 GRE_german_research_short_desc:0 "Deutsche Forschung"
 GRE_national_revolution:0 "Nationale Revolution"
 GRE_national_revolution_desc:0 "Es ist Zeit, das unterdrückerische faschistische Regime von Metaxas zu stürzen. Doch eine kapitalistische Bourgeoisie wäre ebenso unterdrückerisch. Die Ordnung der Dinge muss umgestürzt werden, und die Arbeiterklasse, das Proletariat, muss endlich die Macht in Griechenland übernehmen."
 GRE_national_revolution_short_desc:0 "Nationale Revolution"
 GRE_rebuild_committee:0 "Wiederaufbau des Zentralkomitees"
 GRE_rebuild_committee_desc:0 "Die KKE wurde unter Metaxas‘ Regime brutal unterdrückt. Unsere Führer wurden ins Exil in die Ägäis geschickt oder aus Griechenland verbannt. Die Partei zerfällt. Es ist Zeit, unsere Führung wieder aufzubauen, stärker und dem marxistischen Ideal ergebener als je zuvor."
 GRE_rebuild_committee_short_desc:0 "Wiederaufbau des Zentralkomitees"
 GRE_circulate_newspaper:0 "Zirkulieren Sie Rizospastis"
 GRE_circulate_newspaper_desc:0 "Um die breite Unterstützung und Anziehungskraft der städtischen Arbeiter zu gewinnen, von denen die meisten lesen und schreiben können, sollten wir den Druck der KKE-Parteizeitung Rizospastis wieder aufnehmen."
 GRE_circulate_newspaper_short_desc:0 "Zirkulieren Sie Rizospastis"
 GRE_national_liberation:0 "Kommunistische Unruhen"
 GRE_national_liberation_desc:0 "Es ist Zeit, aus den Fabriken auf die Straße zu gehen. Die Arbeiter wachen auf, und die Stimme des einfachen Volkes soll endlich gehört werden – in der einzigen Sprache, die die faschistische Bourgeoisie, die unser Land erpresst, versteht."
 GRE_national_liberation_short_desc:0 "Kommunistische Unruhen"
 GRE_out_of_underground:0 "Raus aus dem Untergrund"
 GRE_out_of_underground_desc:0 "Die KKE hat sich lange genug im Hintergrund gehalten. Es ist Zeit, aus dem Schatten zu treten und endlich die Macht zu übernehmen. Die Diktatur kann nicht länger bestehen, und das Proletariat, das für Griechenland blutet, schwitzt und stirbt, wird endlich die Früchte seiner eigenen Arbeit ernten."
 GRE_out_of_underground_short_desc:0 "Raus aus dem Untergrund"
 GRE_purge_metaxists:0 "Säubert die Metaxisten"
 GRE_purge_metaxists_desc:0 "Obwohl wir nun die Zentralregierung beherrschen, gibt es immer noch viele Anhänger der Metaxistenbewegung in den Streitkräften sowie in den gesetzgebenden und administrativen Organen der Regierung. Wenn wir die Arbeiter wirklich befreien und die Reformen umsetzen wollen, die wir wollen, müssen diese rechten Elemente verschwinden."
 GRE_purge_metaxists_short_desc:0 "Säubert die Metaxisten"
 GRE_integrate_venizelists:0 "Venizelisten integrieren"
 GRE_integrate_venizelists_desc:0 "Die Venizelisten, Mitglieder einer liberal-nationalistischen Bewegung, die von Metaxas‘ Regierung verboten wurde, könnten Verbündete sein. Viele von ihnen vertreten ähnliche Ansichten wie wir, und solange ihre wirtschaftspolitischen Ansichten korrigiert werden, können sie der Partei als Verbündete dienen."
 GRE_integrate_venizelists_short_desc:0 "Venizelisten integrieren"
 GRE_state_atheism:0 "Verbot der orthodoxen Kirche"
 GRE_state_atheism_desc:0 "Die Kirche und die Monarchie waren die beiden Hauptstützer von Metaxas&#39; Regime. Darüber hinaus hat Religion in unserer neuen Ordnung keinen Platz. Wie Karl Marx sagte, ist Religion das Opium des Volkes, eine Täuschung, die im Neuen Griechenland nicht toleriert wird."
 GRE_state_atheism_short_desc:0 "Verbot der orthodoxen Kirche"
 GRE_stalinist_state:0 "Stalinistischer Staat"
 GRE_stalinist_state_desc:0 "Wir haben unsere Macht schrittweise gefestigt und die alte Ordnung hinweggefegt. Aus der Asche der Revolution soll ein neues Griechenland entstehen, mit Frieden, Brot und Land für alle."
 GRE_stalinist_state_short_desc:0 "Stalinistischer Staat"
 GRE_planned_economy:0 "Planwirtschaft"
 GRE_planned_economy_desc:0 "Wir sollten die korporatistische Politik des metaxistischen Regimes reformieren und ausweiten und die griechische Wirtschaft in ein von KKE-Funktionären gelenktes Plansystem umstrukturieren."
 GRE_planned_economy_short_desc:0 "Planwirtschaft"
 GRE_culture_of_labour:0 "Kultur der Arbeit"
 GRE_culture_of_labour_desc:0 "Harte körperliche Arbeit ist die Grundlage der Gesellschaft und die edelste Aufgabe, die man erfüllen kann. Wir sollten die Aufgabe des einfachen Arbeiters oder Fabrikarbeiters in offiziellen Veröffentlichungen romantisieren und glorifizieren, um eine produktive Kultur zu pflegen."
 GRE_culture_of_labour_short_desc:0 "Kultur der Arbeit"
 GRE_national_regeneration:0 "Nationale Erneuerung"
 GRE_national_regeneration_desc:0 "Wir sollten eine landesweite Massenkampagne starten, um die Arbeiterklasse zu motivieren und sie für den Wiederaufbau des Landes zu mobilisieren."
 GRE_national_regeneration_short_desc:0 "Nationale Erneuerung"
 GRE_hellenic_sciences:0 "Wiedereröffnung der Griechischen Akademie der Wissenschaften"
 GRE_hellenic_sciences_desc:0 "Wir sollten die während der Revolution geschlossene Griechische Akademie der Wissenschaften wiedereröffnen und finanziell unterstützen, um Wissenschaft und Technologie als Weg in die Zukunft des neuen Arbeitergriechenlands zu fördern."
 GRE_hellenic_sciences_short_desc:0 "Griechische Akademie der Wissenschaften"
 GRE_national_mobilisation:0 "Nationale Mobilisierung"
 GRE_national_mobilisation_desc:0 "Um Griechenland wieder so stark wie nie zuvor aufzubauen, muss das ganze Land zu einer landesweiten produktiven Anstrengung mobilisiert werden, um unsere Wirtschaft und Kultur umzugestalten."
 GRE_national_mobilisation_short_desc:0 "Nationale Mobilisierung"
 GRE_internationalism:0 "Internationalismus"
 GRE_internationalism_desc:0 "Griechenland ist umzingelt – Wir treiben an der Spitze des Balkans, umzingelt von Faschisten, Monarchisten, Reaktionären und anderen Feinden der Revolution. Um Verbündete zu finden und das neue Regime zu stützen, müssen wir im Ausland suchen."
 GRE_internationalism_short_desc:0 "Internationalismus"
 GRE_spread_the_revolution:0 "Verbreite die Revolution"
 GRE_spread_the_revolution_desc:0 "Die Revolution kann hier in Griechenland nicht enden, genauso wenig wie sie in Russland endete. Die Weltrevolution wird von hier aus nur wachsen und sich ausbreiten, und wir werden ihre Speerspitze sein."
 GRE_spread_the_revolution_short_desc:0 "Verbreite die Revolution"
 GRE_ideological_brigades:0 "Ideologische Brigaden"
 GRE_ideological_brigades_desc:0 "Wir sollten politisch motivierte Elitebrigaden bilden, die ins Ausland gehen und die Arbeiterrevolution in anderen Ländern verbreiten, die um ihre Befreiung kämpfen."
 GRE_ideological_brigades_short_desc:0 "Ideologische Brigaden"
 GRE_join_comintern:0 "Treten Sie der Komintern bei"
 GRE_join_comintern_desc:0 "Wir sollten die Mitgliedschaft in der Dritten Internationale oder Komintern beantragen, damit wir unter dem Schutz unserer befreiten Mitstaaten stehen können."
 GRE_join_comintern_short_desc:0 "Treten Sie der Komintern bei"
 GRE_reject_comintern:0 "Lehnen Sie die Komintern ab"
 GRE_reject_comintern_desc:0 "Die Komintern ist korrupt und desillusioniert und hat unter Stalins machthungriger Tyrannei den von Marx beabsichtigten Weg verloren. Wir werden unseren eigenen Weg gehen."
 GRE_reject_comintern_short_desc:0 "Lehnen Sie die Komintern ab"
 GRE_intervene_bulgaria:0 "Intervenieren in Bulgarien"
 GRE_intervene_bulgaria_desc:0 "Es ist an der Zeit, die Arbeiterrevolution über die Grenzen Griechenlands hinaus zu tragen. In Bulgarien wird das Volk schwer unterdrückt und jeder Widerstand des Proletariats grausam bestraft. Es ist an der Zeit, dass Zar Boris das gleiche Schicksal erleidet wie der russische Zar vor ihm."
 GRE_intervene_bulgaria_short_desc:0 "Intervenieren in Bulgarien"
 GRE_intervene_turkey:0 "Intervention in der Türkei"
 GRE_intervene_turkey_desc:0 "Jenseits der Ägäis liegt die Türkei, unfrei und unter bürgerlicher Demokratie. Es ist Zeit für den Kommunismus, in Asien Fuß zu fassen."
 GRE_intervene_turkey_short_desc:0 "Intervention in der Türkei"
 GRE_turkey_ultimatum:0 "Ultimatum an die Türkei"
 GRE_turkey_ultimatum_desc:0 "Die Türkei, und nur die Türkei, liegt zwischen Griechenland und der Sowjetunion. Sie zu einem befreundeten Staat zu machen, würde die territoriale Integrität der Komintern weiter festigen. Mit der Hilfe der Sowjetunion können wir ein Ultimatum stellen und von ihnen verlangen, sich unserem Willen zu fügen und ihre Regierung nach unseren Wünschen zu reformieren."
 GRE_turkey_ultimatum_short_desc:0 "Ultimatum an die Türkei"
 GRE_intervene_romania:0 "Intervenieren in Rumänien"
 GRE_intervene_romania_desc:0 "Da Bulgarien bereits auf unserer Seite ist, sollten wir weiter nach Norden, nach Rumänien vordringen und die Arbeiter dort befreien."
 GRE_intervene_romania_short_desc:0 "Intervenieren in Rumänien"
 GRE_romania_ultimatum:0 "Ultimatum an Rumänien"
 GRE_romania_ultimatum_desc:0 "Ähnlich wie die Türkei steckt Rumänien in einem Schraubstock zwischen den Kominternstaaten – wir müssen nur Druck ausüben, und sie werden nach unserem Willen brechen."
 GRE_romania_ultimatum_short_desc:0 "Ultimatum an Rumänien"
 GRE_intervene_yugoslavia:0 "Verbreitung der Revolution in Jugoslawien"
 GRE_intervene_yugoslavia_desc:0 "Da nun auch Rumänien und Bulgarien unter dem Roten Banner stehen, ist Jugoslawien von drei Seiten umzingelt. Bei einer gemeinsamen Invasion der Komintern würde es rasch zerfallen."
 GRE_intervene_yugoslavia_short_desc:0 "Verbreitung der Revolution in Jugoslawien"
 GRE_italy_ultimatum:0 "Italien bedrohen"
 GRE_italy_ultimatum_desc:0 "Da der Balkan nun rot ist, stehen wir bereit, Italien, die einzige andere große Regionalmacht, herauszufordern. Mit sowjetischer Unterstützung sollten wir ein Ultimatum stellen und von Italien die Abtretung der Dodekanes und Zara an Griechenland bzw. Jugoslawien fordern, die Besetzung Albaniens durch jugoslawische Truppen zulassen und die Grenze zu Jugoslawien entmilitarisieren."
 GRE_italy_ultimatum_short_desc:0 "Italien bedrohen"
 GRE_comintern_aid:0 "Kominternhilfe"
 GRE_comintern_aid_desc:0 "Angesichts des Krieges in Europa benötigen wir materielle Hilfe, um unsere Kriegsmaschinerie am Laufen zu halten und unsere Truppen für den nächsten Kampf einsatzbereit zu halten. Wir sollten die Sowjetunion um ein Leih- und Pachtgesetz bitten. Mit ihrem enormen Reichtum wird sie uns sicherlich helfen können."
 GRE_comintern_aid_short_desc:0 "Kominternhilfe"
 GRE_soviet_scientists:0 "Sowjetische Wissenschaftler"
 GRE_soviet_scientists_desc:0 "Wir sollten die weltbekannten Wissenschaftler der Sowjetunion um Hilfe bei der Erforschung und Entwicklung neuer Kriegstechnologien bitten."
 GRE_soviet_scientists_short_desc:0 "Sowjetische Wissenschaftler"
 


####Events####
 GRE_elections_tt:0 "Wahlen zulassen"
 GRE_uk_alliance_tt:0 "Großbritannien garantiert Griechenland" 
 GRE_overthrown_tt:0 "Regierungspartei auf Faschismus setzen" 
 GRE_revolution_tt:0 "Regierungspartei auf Kommunismus setzen" 
 
 greece.6.t:0 "Griechenland bittet um Allianz"
 greece.6.d:0 "Die griechische Regierung ist mit der Bitte um ein Bündnis an uns herangetreten und hat ihre Fähigkeit betont, einen Angriff auf das italienische Albanien zu unternehmen und als Vertreter der britischen Interessen auf dem Balkan zu fungieren."
 greece.6.a:0 "Absolut!"
 
 greece.7.t:0 "Griechenland beantragt den Beitritt zu den Alliierten"
 greece.7.d:0 "Die griechische Regierung ist an uns herangetreten und hat sie gebeten, sich den Alliierten anzuschließen, als Erweiterung unseres derzeitigen anglo-griechischen Bündnisses."
 greece.7.a:0 "Absolut!"
 
 greece.8.t:0 "Rumänien schließt sich den Alliierten an"
 greece.8.d:0 "Großbritannien hat dem von Griechenland unterstützten Antrag Rumäniens auf Beitritt zu den Alliierten stattgegeben und das Land in die Fraktion aufgenommen."
 greece.8.a:0 "Unser Bündnis wächst!"
 
 greece.9.t:0 "Jugoslawien schließt sich den Alliierten an"
 greece.9.d:0 "Großbritannien hat dem von Griechenland unterstützten Antrag Jugoslawiens auf Beitritt zu den Alliierten stattgegeben und das Land in die Fraktion aufgenommen."
 greece.9.a:0 "Unser Bündnis wächst!"
 
 greece.10.t:0 "Griechenland bietet Bündnis an"
 greece.10.d:0 "Angesichts unserer zunehmend übereinstimmenden ideologischen Standpunkte hat uns die griechische Regierung die Hand zur Allianz gereicht."
 greece.10.a:0 "Aus der Asche unserer alten Geschichte können wir eine neue Freundschaft schmieden"
 greece.10.b:0 "Die Griechen? Verbündete? Ich glaube nicht"
 
 greece.11.t:0 "Die Türkei schließt sich den Alliierten an"
 greece.11.d:0 "Großbritannien hat dem von Griechenland unterstützten Antrag der Türkei auf Beitritt zu den Alliierten stattgegeben und sie in die Fraktion aufgenommen."
 greece.11.a:0 "Unser Bündnis wächst!"
 
 greece.13.t:0 "Griechenland fordert Konstantinopel"
 greece.13.d:0 "Griechenland hat ein Ultimatum gestellt und verlangt, dass wir alle Gebiete westlich des Bosporus an sie abtreten, andernfalls droht uns ein Krieg."
 greece.13.a:0 "Wir müssen tun, was wir tun müssen, um den Frieden zu wahren."
 greece.13.b:0 "Niemals! Es soll für immer Istanbul bleiben!"
 
 greece.14.t:0 "Türken geben Konstantinopel ab"
 greece.14.d:0 "Die Türkei hat unseren Forderungen nachgegeben und alle Gebiete westlich des Bosporus sowie die östliche Hälfte Konstantinopels abgetreten. Die Hauptstadt von Byzanz ist nun nach fast fünfhundert Jahren wieder in griechischer Hand."
 greece.14.a:0 "Palaiologos XI. gerächt"
 
 greece.15.t:0 "Die Türkei lehnt ab!"
 greece.15.d:0 "Die Türkei hat unser Ultimatum für Konstantinopel abgelehnt und unsere Forderungen als unerhört und imperialistisch bezeichnet."
 greece.15.a:0 "Dann werden wir uns mit Gewalt nehmen, was uns gehört."
 
 greece.16.t:0 "Verbündete stellen Ultimatum"
 greece.16.d:0 "Die Alliierten und der Balkanpakt haben uns ein Ultimatum gestellt: Reformieren Sie unsere Regierung, stürzen Sie die Monarchie und unterwerfen Sie sich der Besatzung, oder Sie müssen mit Krieg rechnen."
 greece.16.a:0 "Wir haben keine andere Wahl"
 greece.16.b:0 "Wir werden lieber auf Leben und Tod kämpfen, als uns damit abzufinden, ein griechisches Protektorat zu sein!"
 
 greece.17.t:0 "Bulgarien unterwirft sich"
 greece.17.d:0 "Bulgarien hat kapituliert und unsere Forderungen akzeptiert. Alliierte Truppen haben Sofia besetzt und ihre Regierung wird derzeit zwangsweise umstrukturiert. Die provisorische bulgarische Regierung wurde vorerst in die Alliierten aufgenommen."
 greece.17.a:0 "Exzellent"
 
 greece.18.t:0 "Bulgarien entscheidet sich für den Krieg"
 greece.18.d:0 "Die Bulgaren haben unser Ultimatum zurückgewiesen und gezeigt, dass sie lieber eine sicher verlorene Schlacht einem Ende der zaristischen Willkür vorziehen würden."
 greece.18.a:0 "Dann werden sie Krieg haben!"
 
 greece.19.t:0 "Die Türkei akzeptiert!"
 greece.19.d:0 "Der türkische Außenminister hat den Bedingungen unseres vorgeschlagenen Bündnisses zugestimmt und wird nach Ankara zurückkehren, um das Abkommen zu formalisieren."
 greece.19.a:0 "Möge dies der Beginn eines neuen Tages für die griechisch-türkische Freundschaft sein"
 
 greece.20.t:0 "Die Türkei lehnt ab"
 greece.20.d:0 "Die türkische Regierung hat eine Antwort herausgegeben, in der sie unser Angebot der Freundschaft und Allianz zurückweist. Es scheint, als ob sie keine engere Beziehung zu uns aufbauen möchte."
 greece.20.a:0 "Vielleicht sind manche Wunden nicht dazu bestimmt zu heilen"
 
 greece.24.t:0 "Marsch auf Athen"
 greece.24.d:0 "Die EEE gaben sich nicht mit der bloßen Machtteilung zufrieden, sondern marschierten unter Führung ihrer paramilitärischen Hellenischen Garde nach Athen und stürzten die Regierung. Metaxas floh aus dem Land, und die EEE setzten an seiner Stelle einen neuen faschistischen Diktator ein."
 greece.24.a:0 "Alles im Staat, nichts außerhalb des Staates, nichts gegen den Staat!"
 
 greece.25.t:0 "[From.GetName] akzeptiert"
 greece.25.d:0 "Nach Prüfung unseres Vorschlags hat die [From.GetAdjective]-Regierung diesen angenommen und sich bereit erklärt, der Balkanliga beizutreten."
 greece.25.a:0 "Die Liga wächst"
 
 greece.26.t:0 "Angebot zum Beitritt zur Balkanliga"
 greece.26.d:0 "Die griechische Regierung hat uns die Mitgliedschaft in ihrer Balkanliga angeboten."
 greece.26.a:0 "Absolut"
 
 greece.27.t:0 "Ultimatum der Balkanliga"
 greece.27.d:0 "Die Balkanliga hat ein Ultimatum gestellt, in dem sie fordert, dass wir die Monarchie abschaffen, unser politisches System reformieren und den Truppen der Balkanliga erlauben, das Land zu besetzen."
 greece.27.a:0 "Wir haben keine andere Wahl."
 greece.27.b:0 "Wir werden lieber bis zum Tod kämpfen, als zu akzeptieren, ein griechisches Protektorat zu sein!"
 
 greece.28.t:0 "Bulgarien willigt ein"
 greece.28.d:0 "Bulgarien hat sich unseren Forderungen unterworfen und eine neue politische Ordnung eingeführt, mit einem freundlich gesinnten Diktator an der Macht. Die Monarchie wurde abgesetzt und das neugestaltete Bulgarien in den Balkanbund aufgenommen."
 greece.28.a:0 "Exzellent"
 
 greece.29.t:0 "Bulgarien weigert sich!"
 greece.29.d:0 "Bulgarien hat unser Ultimatum zurückgewiesen und ist nun bereit, uns notfalls zu bekämpfen."
 greece.29.a:0 "Dann ist es Krieg"
 
 greece.30.t:0 "Ultimatum der Balkanliga"
 greece.30.d:0 "Die Balkanliga hat ein Ultimatum gestellt, in dem sie von uns verlangt, alle Gebiete westlich des Bosporus an Griechenland abzutreten, den Truppen der Balkanliga die Besetzung des Landes zu gestatten und unser politisches System zu reformieren."
 greece.30.a:0 "Wir haben keine andere Wahl."
 greece.30.b:0 "Wir werden lieber bis zum Tod kämpfen, als zu akzeptieren, ein griechisches Protektorat zu sein!"
 
 greece.31.t:0 "Türkei unterwirft sich"
 greece.31.d:0 "Die Türkei hat unseren Forderungen voll und ganz nachgegeben: Das gesamte Gebiet westlich des Bosporus wurde an uns abgetreten, wir haben einen freundlich gesinnten Diktator eingesetzt und die Türkei wurde in den Balkanpakt aufgenommen."
 greece.31.a:0 "Endlich ist Konstantinopel wieder in griechischer Hand"
 
 greece.32.t:0 "Die Türkei lehnt ab!"
 greece.32.d:0 "Bulgarien hat unser Ultimatum zurückgewiesen und ist nun bereit, uns notfalls zu bekämpfen."
 greece.32.a:0 "Dann ist es Krieg"
 
 greece.33.t:0 "Griechenland beantragt den Beitritt zur Achse"
 greece.33.d:0 "Die griechische Regierung ist an uns herangetreten und hat sie gebeten, sich der Achse anzuschließen, um die bestehenden griechisch-deutschen Beziehungen und unsere ideologische Gemeinsamkeit zu erweitern."
 greece.33.a:0 "Absolut!"
 
 greece.34.t:0 "Kommunisten übernehmen die Macht!"
 greece.34.d:0 "Nach Massenunruhen von Fabrikarbeitern im ganzen Land und kommunistischen Unruhen in Athen und Thessaloniki ist die Regierung zusammengebrochen. Große Teile der Armee desertierten oder schlossen sich den Revolutionären an, und Metaxas und seine Regierung flohen aus dem Land."
 greece.34.a:0 "Frieden, Brot und Land"
 
 greece.36.t:0 "Griechenland beantragt den Beitritt zur Komintern"
 greece.36.d:0 "Die griechische Regierung ist an uns herangetreten und hat sie nach ihrer jüngsten Revolution aufgefordert, der Komintern beizutreten."
 greece.36.a:0 "Absolut!"
 
 greece.37.t:0 "Kommunistisches Ultimatum"
 greece.37.d:0 "An uns wurde ein gemeinsames griechisch-sowjetisches Ultimatum gestellt, in dem wir aufgefordert werden, der Besetzung und Umstrukturierung unserer Regierung sowie der Entmilitarisierung des Bosporus zuzustimmen und die sowjetische Annexion großer Teile der Osttürkei zuzulassen."
 greece.37.a:0 "Wir haben keine andere Wahl"
 greece.37.b:0 "Wir werden kämpfend sterben, bevor die Türkei dem Bolschewismus zum Opfer fällt"
 
 greece.38.t:0 "Die Türkei akzeptiert" 
 greece.38.d:0 "Die türkische Regierung hat sich unserem Ultimatum gefügt und uns die vollständige Erfüllung unserer Forderungen gestattet. Griechische Truppen haben Konstantinopel besetzt, in der Osttürkei wurde ein unabhängiges kommunistisches Armenien errichtet und in Ankara eine neue kommunistische Übergangsregierung eingesetzt. Gleichzeitig wurde die Türkei in die Komintern aufgenommen."
 greece.38.a:0 "Die Revolution breitet sich aus"
 
 greece.39.t:0 "Die Türkei lehnt ab"
 greece.39.d:0 "Die Türkei hat das griechisch-sowjetische Ultimatum zurückgewiesen und es uns vor die Nase gehalten."
 greece.39.a:0 "Dann haben sie sich für den Krieg entschieden"
 greece.39.b:0 "Sie werden dafür bezahlen, aber nicht heute"
 
 greece.40.t:0 "Die Türkei lehnt ab"
 greece.40.d:0 "Die Türkei hat das griechisch-sowjetische Ultimatum zurückgewiesen und es uns vor die Nase gehalten."
 greece.40.a:0 "Dann haben sie sich für den Krieg entschieden"
 greece.40.b:0 "Wir sind einfach nicht in der Lage, den Griechen hier zu helfen"
 
 greece.41.t:0 "Kommunistisches Ultimatum"
 greece.41.d:0 "An uns wurde ein gemeinsames griechisch-sowjetisches Ultimatum gestellt, in dem wir aufgefordert wurden, der Besetzung zuzustimmen, die sowjetische Annexion Bessarabiens zuzulassen und unsere Regierung nach kommunistischen Grundsätzen umzustrukturieren."
 greece.41.a:0 "Wir haben keine andere Wahl"
 greece.41.b:0 "Wir werden kämpfend sterben, bevor Rumänien dem Bolschewismus zum Opfer fällt"
 
 greece.42.t:0 "Rumänien akzeptiert"
 greece.42.d:0 "Die rumänische Regierung hat sich unserem Ultimatum gefügt und uns die vollständige Erfüllung aller unserer Forderungen gestattet. Sowjetische Truppen haben Bessarabien besetzt, in Bukarest wurde eine neue provisorische kommunistische Regierung eingesetzt und die neue rumänische Regierung inzwischen in die Komintern aufgenommen."
 greece.42.a:0 "Die Revolution breitet sich aus"
 
 greece.43.t:0 "Rumänien lehnt ab"
 greece.43.d:0 "Rumänien hat das griechisch-sowjetische Ultimatum zurückgewiesen und es uns vor die Füße geworfen."
 greece.43.a:0 "Dann haben sie sich für den Krieg entschieden"
 greece.43.b:0 "Sie werden dafür bezahlen, aber nicht heute"
 
 greece.44.t:0 "Rumänien lehnt ab"
 greece.44.d:0 "Rumänien hat das griechisch-sowjetische Ultimatum zurückgewiesen und es uns vor die Füße geworfen."
 greece.44.a:0 "Dann haben sie sich für den Krieg entschieden"
 greece.44.b:0 "Wir sind einfach nicht in der Lage, den Griechen hier zu helfen"
 
 greece.45.t:0 "Kommunistisches Ultimatum"
 greece.45.d:0 "Uns wurde ein gemeinsames griechisch-sowjetisches Ultimatum gestellt, das die Abtretung von Zara an Jugoslawien, des Dodekanes an Griechenland und die Entmilitarisierung der italienisch-jugoslawischen Grenze fordert."
 greece.45.a:0 "Wir werden alles tun, was wir tun müssen, um den Frieden zu wahren"
 greece.45.b:0 "Absurd - Das wird nicht passieren"
 greece.45.c:0 "Was denken die, wer sie sind? Sie werden dafür bezahlen"
 
 greece.46.t:0 "Italien willigt ein"
 greece.46.d:0 "Die italienische Regierung hat unser Ultimatum akzeptiert und unsere Forderungen vollständig erfüllt. Die Dodekanes-Inseln wurden formell an Griechenland übergeben, jugoslawische Truppen haben Zara und Albanien besetzt und italienische Truppen haben sich aus Istrien zurückgezogen."
 greece.46.a:0 "Feiglinge"
 
 greece.47.t:0 "Italien lehnt ab"
 greece.47.d:0 "Italien hat das griechisch-sowjetische Ultimatum zurückgewiesen und es uns vor die Füße geworfen."
 greece.47.a:0 "Dann haben sie sich für den Krieg entschieden"
 greece.47.b:0 "Sie werden dafür bezahlen, aber nicht heute"
 
 greece.48.t:0 "Italien lehnt ab"
 greece.48.d:0 "Italien hat das griechisch-sowjetische Ultimatum zurückgewiesen und es uns vor die Füße geworfen."
 greece.48.a:0 "Dann haben sie sich für den Krieg entschieden"
 greece.48.b:0 "Wir sind einfach nicht in der Lage, den Griechen hier zu helfen"

 greece.49.t:0 "Italien erklärt den Krieg"
 greece.49.d:0 "Die italienische Regierung hat unser Ultimatum nicht nur abgelehnt, sondern vermutlich, da sie einen bevorstehenden Angriff witterte, die Initiative ergriffen und uns den Krieg erklärt!"
 greece.49.a:0 "Damit haben wir nicht gerechnet"
 
