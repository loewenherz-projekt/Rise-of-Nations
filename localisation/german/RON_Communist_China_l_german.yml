l_german:
 ### Focus ###
 PRC_lower_defeatism_penalty:0 "Reduzieren Sie die Strafe für „Defätismus“!"
 prc_sov_supply_eff_tt:0 "§YSowjetische Verstärkungen und Nachschub werden in wenigen Tagen in Yan&#39;an eintreffen§!"
 prc_long_march_tt:0 "§YWir werden uns schneller vom Langen Marsch erholen§!\n\n"
 prc_west_expedition_tt:0 "Drei für die Expedition vorgesehene Divisionen werden sich in Yan&#39;an versammeln.\n\n"
 prc_east_expedition_tt:0 "Zwei für diese Operation vorgesehene Divisionen werden sich in Yan&#39;an versammeln.\n\n"
 prc_front_infras_tt:0 "Fügen Sie 2 §YInfrastrukturen§! in allen an §YJapan§! und seine Marionetten angrenzenden Staaten hinzu."
 prc_root_out_defeatism_tt:0 "Die Japaner wurden vom Festland vertrieben."
 prc_nb_tt:0 "Unsere Truppen können auf dem Feld schneller manövrieren."
 prc_gp_tt:0 "Unsere Partisanen werden eine größere Wirkung haben."
 prc_ng_tt:0 "Unsere Partisanen werden bessere Leistungen erbringen."
 prc_mp_tt:0 "Unsere Truppen werden effizienter manövrieren."
 prc_set_government_rank:0 "Ändern Sie den Ländernamen in §YVolksrepublik China§!.\n"
 PRC_recover_from_the_long_march:0 "Erholen Sie sich vom langen Marsch"
 PRC_recover_from_the_long_march_desc:0 "Der Lange Marsch hat uns viel gekostet. Wir müssen mit der Erholung beginnen, bevor die Kuomintang dies als Chance nutzt!"
 PRC_anti_japanese_aim:0 "Antijapanisches Ziel"
 PRC_anti_japanese_aim_desc:0 "Die japanischen Invasoren stehen vor unserer Haustür. Wir müssen dies als Mittelpunkt unseres Plans nutzen, um sie zu besiegen."
 PRC_west_expedition:0 "Westexpedition organisieren"
 PRC_west_expedition_desc:0 "Wenn wir den Sowjets eine Versorgungsroute eröffnen können, wird unsere Revolution viel reibungsloser verlaufen. Allerdings steht uns die Ma-Clique im Weg, wir müssen sie loswerden."
 PRC_approach_the_front:0 "Nähern Sie sich der Front"
 PRC_approach_the_front_desc:0 "Wir müssen unsere eigene Initiative ergreifen, um die japanischen Invasoren zurückzuschlagen! Wir können uns nicht allein auf die Kriegsherren und die Kuomintang verlassen."
 PRC_supply_line_from_sov:0 "Lieferungen aus der Sowjetunion"
 PRC_supply_line_from_sov_desc:0 "Da die Route nun offen ist, können sowjetischer Nachschub und Verstärkung viel einfacher kommen."
 PRC_front_line_preparation:0 "Frontline-Vorbereitung"
 PRC_front_line_preparation_desc:0 "Wir müssen unsere Frontpositionen vorbereiten und unsere Soldaten besser gegen die japanischen Imperialisten organisieren."
 PRC_boost_the_morale:0 "Steigern Sie die Moral"
 PRC_boost_the_morale_desc:0 "Die Defätisten in unseren Reihen sind zweifellos schädlich. Wir müssen ihnen Beweise dafür liefern, dass wir eine Chance auf den Sieg haben, aber das wird nicht alle überzeugen."
 PRC_prepare_for_war:0 "Bereite dich auf den Krieg vor"
 PRC_prepare_for_war_desc:0 "Der Krieg mit den Japanern scheint unvermeidlich, wir müssen uns vorbereiten!"
 PRC_the_united_front:0 "Die Einheitsfront"
 PRC_the_united_front_desc:0 "Die Kuomintang führt derzeit die Einheitsfront an. Wir können unsere Truppen in ihre Reihen eingliedern und ihnen die Taktik des Guerillakriegs beibringen."
 PRC_initiative_in_war_time:0 "Unsere Eigeninitiative"
 PRC_initiative_in_war_time_desc:0 "Wir müssen die Initiative selbst in die Hand nehmen. Die Kuomintang wird uns nach dem Krieg gegen Japan mit Sicherheit vernichten, wenn sie die Initiative ergreift. Wir dürfen ihnen nicht die Mittel geben, uns zu vernichten!"
 PRC_protracted_war:0 "Langwieriger Krieg"
 PRC_protracted_war_desc:0 "Wir müssen unseren Feind so lange wie möglich aufhalten und darauf warten, dass sich die Menschen und Nationen uns im Krieg gegen die Japaner anschließen."
 PRC_root_out_defeatism:0 "Den Defätismus ausmerzen"
 PRC_root_out_defeatism_desc:0 "Den Japanern ist es nicht gelungen, China zu erobern. Dies ist der beste Beweis, der den Defätisten ins Gesicht schlagen kann."
 PRC_neccessary_flexibility:0 "Notwendige Mobilität"
 PRC_neccessary_flexibility_desc:0 "Sich ausschließlich auf Guerillakrieg zu verlassen, ist nicht praktikabel. Unsere Truppen müssen sich auf einen Angriff und einen Rückzug vorbereiten, wenn es nötig ist."
 PRC_war_of_attrition:0 "Zermürbungskrieg"
 PRC_war_of_attrition_desc:0 "Wir haben den Raum und die Männer, um einen längeren Krieg gegen die Japaner zu führen. Wir können die Verluste aufhalten, die Japaner jedoch nicht. Wir werden das gegen sie einsetzen."
 PRC_swift_victory:0 "Doktrin des schnellen Sieges"
 PRC_swift_victory_desc:0 "Obwohl Mao darauf besteht, einen langwierigen Krieg zu führen, schlagen einige Genossen vor, dass wir mehr Initiative zeigen und den Krieg zu den Japanern tragen und sie dann treffen sollten, wenn sie es am wenigsten erwarten."
 PRC_partial_guerrilla_operation:0 "Teilweise Guerilla-Operation"
 PRC_partial_guerrilla_operation_desc:0 "Mao bestand darauf, dass ein Guerillakrieg unerlässlich sei. Wir werden ihm nur eine oberflächliche Antwort geben."
 PRC_war_of_annihilation:0 "Vernichtungskrieg"
 PRC_war_of_annihilation_desc:0 "Da wir die Initiative in der Hand haben, werden wir die Japaner vernichten, bevor sie reagieren können!"
 PRC_political_mobilisation:0 "Politische Mobilisierung"
 PRC_political_mobilisation_desc:0 "Wir müssen unser gesamtes Volk, sowohl die Zivilisten als auch unsere Soldaten, ermutigen, gegen den Eindringling zu kämpfen."
 PRC_self_perservation:0 "Selbsterhaltung"
 PRC_self_perservation_desc:0 "Wenn wir eine Chance haben wollen, diesen Krieg zu gewinnen, müssen unsere Soldaten wissen, wie sie ihre Kräfte bewahren und keine unnötigen Opfer bringen."
 PRC_prepare_for_decisive_battle:0 "Bereite dich auf die entscheidende Schlacht vor"
 PRC_prepare_for_decisive_battle_desc:0 "Wenn wir unsere Kräfte bewahren, können wir uns auf entscheidende Schlachten vorbereiten, die die Japaner mit einem einzigen Schlag lähmen werden."
 PRC_the_goal_of_our_war:0 "Das Ziel unseres Krieges"
 PRC_the_goal_of_our_war_desc:0 "Wenn wir unser Volk daran erinnern, was das Ziel unseres gegenwärtigen Krieges ist, wird das unseren Nationalgeist erheblich stärken."
 PRC_military_civilian_corporation:0 "Militärisch-zivile Zusammenarbeit"
 PRC_military_civilian_corporation_desc:0 "Der Aufbau einer Miliz und die Ermutigung der Zivilbevölkerung, bei der Armeelogistik mitzuhelfen, werden wichtige Faktoren im Krieg sein."
 PRC_debunk_the_underestimation:0 "Entlarven Sie die Unterschätzung"
 PRC_debunk_the_underestimation_desc:0 "Wir müssen unseren Kameraden zeigen, dass es völlig falsch ist, Japan zu unterschätzen, und dass es der Armee unseres Landes schadet."
 PRC_army_reform:0 "Armeereform"
 PRC_army_reform_desc:0 "Unsere derzeitige Armeestruktur ist zu locker. Wir müssen eine strukturiertere Struktur schaffen."
 PRC_purge_dissident_element:0 "Säubert die Rechten"
 PRC_purge_dissident_element_desc:0 "Manche glauben, dass das Denken einiger unserer Genossen von rechtsgerichteten Ansichten befallen sei. Wir müssen sie dazu bringen, wieder nach links zu gehen, sonst werden sie exkommuniziert …"
 PRC_found_our_nation:0 "Unsere Nation gegründet"
 PRC_found_our_nation_desc:0 "Nachdem wir uns für die Wahl unserer Hauptstadt entschieden haben, können wir eine Versammlung abhalten, um zu verkünden, dass wir endlich unsere Nation gefunden haben und keine Guerillabewegung mehr sind."
 PRC_pla:0 "PLA"
 PRC_pla_desc:0 "Die Volksbefreiungsarmee wird die einzige Armee sein, die das chinesische Volk vor dem niederträchtigen Kapitalismus retten und die Reaktionäre beseitigen kann, um es so zu befreien und zum Kommunismus zu führen."
 PRC_the_first_five_year_plan:0 "Der Plan für die ersten fünf Jahre"
 PRC_the_first_five_year_plan_desc:0 "Unserem neu gegründeten Land mangelt es an industriellen Kapazitäten. Darauf müssen wir uns in unserem ersten Fünfjahresplan konzentrieren."
 PRC_resources_prospection:0 "Ressourcenprospektion"
 PRC_resources_prospection_desc:0 "Die riesigen Gebiete unseres Landes erweisen sich als äußerst ergiebig. Wir können nach Ressourcen suchen, die die Menge der produzierten nützlichen Materialien erheblich steigern werden."
 PRC_land_reform:0 "Bodenreform"
 PRC_land_reform_desc:0 "Derzeit ist unser Land größtenteils im Besitz von Großgrundbesitzern, und die Bauern werden ausgebeutet. Es bedarf einer Politik, die die Bauern befreit, ihnen ihr eigenes Land gibt und ihnen den Mut gibt, sich gegen die Großgrundbesitzer zu wehren."
 PRC_suppress_counterrevolutionaries:0 "Unterdrückt Konterrevolutionäre"
 PRC_suppress_counterrevolutionaries_desc:0 "Um die Stabilität in unserem Land aufrechtzuerhalten, müssen alle Elemente, die gegen die Revolution sind, eliminiert oder wieder angesiedelt werden. Familien werden ermutigt, die antirevolutionären Aktivitäten ihrer Familienmitglieder den Behörden zu melden."
 PRC_156_project:0 "Das 156-Projekt"
 PRC_156_project_desc:0 "Mit sowjetischer Hilfe wird die Industrie unseres Landes florieren."
 PRC_equipment_update:0 "Ausrüstungs-Update"
 PRC_equipment_update_desc:0 "Die aktuelle Ausrüstung unserer Armee ist im Museum ausgestellt, wir müssen sie mit modernerer Ausrüstung ausstatten."
 PRC_ndcprc:0 "NDCPRC gefunden"
 PRC_ndcprc_desc:0 "Das Nationale Verteidigungskomitee der Volksrepublik China wird eingerichtet, um über die nationale Verteidigungspolitik zu entscheiden."
 PRC_tbos:0 "TBOS"
 PRC_tbos_desc:0 "TBOS, die Abkürzung für Two Bombs One Star (Satellite), ist der erste Plan unseres Landes, unsere Reichweite bis in den Himmel und sogar ins Weltall auszudehnen."
 PRC_establish_navy:0 "Gründung der Marine der Volksbefreiungsarmee"
 PRC_establish_navy_desc:0 "Wir verfügen zwar über Schiffe, aber es fehlt uns eine offiziell organisierte Marine."
 PRC_the_red_pacific:0 "Roter Pazifik"
 PRC_the_red_pacific_desc:0 "Wir werden den Kommunismus über den Pazifik verbreiten!"
 PRC_sea_ambition:0 "SEA Ambition"
 PRC_sea_ambition_desc:0 "Die Straße von Malakka ist eine wichtige Handelsroute zwischen Ost und West. Wenn wir sie kontrollieren, entscheiden wir über das Schicksal einiger Nationen."
 PRC_institution_reorganization:0 "Neuorganisation der Institution"
 PRC_institution_reorganization_desc:0 "Unser derzeitiges Bildungssystem ist nicht sehr gut ausgebaut. Wenn wir talentierte Menschen haben wollen, ist eine Umstrukturierung erforderlich."
 PRC_cult_of_personality:0 "Personenkult"
 PRC_cult_of_personality_desc:0 "Jeder Chinese muss unseren großen und glorreichen Führer Mao Zedong verehren und sonst nichts."
 PRC_eliminate_iliteracy:0 "Analphabetismus beseitigen"
 PRC_eliminate_iliteracy_desc:0 "Die Analphabetenrate in unserem Land ist hoch. Um Fortschritte zu erzielen, müssen wir sie senken."
 PRC_adopt_soviet_education_system:0 "Übernahme der sowjetischen Bildungsmethoden"
 PRC_adopt_soviet_education_system_desc:0 "Wir können das Bildungssystem der Sowjetunion übernehmen und unser heutiges ersetzen, da das dortige besser strukturiert ist als unseres."
 PRC_sov_cooperation:0 "Sowjetische Zusammenarbeit"
 PRC_sov_cooperation_desc:0 "Die Sowjetunion ist zweifellos die mächtigste kommunistische Nation der Welt. Wir können so viel von ihr lernen."
 PRC_the_new_communism_beacon:0 "Das neue Leuchtfeuer des Kommunismus"
 PRC_the_new_communism_beacon_desc:0 "Die Sowjetunion ist heute von Revisionisten verseucht, die vom Weg Karl Marx&#39; abgekommen sind. Wir werden solch verrotteten Strukturen nicht folgen."
 PRC_anti_soviet_revisionist_aim:0 "Ziel des Antisowjetrevisionismus"
 PRC_anti_soviet_revisionist_aim_desc:0 "Der sowjetische Revisionismus vergiftet Millionen von Genossen in der Sowjetunion, wir müssen ihre Rettung planen."
 PRC_liberate_the_soviet_people:0 "Befreit das sowjetische Volk"
 PRC_liberate_the_soviet_people_desc:0 "Es ist Zeit für uns, das sowjetische Volk von den niederträchtigen Revisionisten zu befreien!"
 PRC_state_controlled_education:0 "Staatlich kontrollierte Bildung"
 PRC_state_controlled_education_desc:0 "Alles, was den Glauben unseres Volkes an den Kommunismus erschüttert, sollte nicht in der Schule gelehrt werden!"
 PRC_liberate_tibet:0 "Befreit Tibet"
 PRC_liberate_tibet_desc:0 "Tibet wurde schon vor langer Zeit dazu verleitet, die chinesische Familie zu verlassen. Jetzt müssen wir sie von dem Kapitalismus befreien, der ihren Geist verdorben hat."
 PRC_establish_air_force:0 "Gründung der Luftwaffe der Volksbefreiungsarmee"
 PRC_establish_air_force_desc:0 "Mit ausländischer Hilfe können wir eine richtige Luftwaffe aufbauen."
 PRC_fighter_focus:0 "Kämpferfokus"
 PRC_fighter_focus_desc:0 "Luftkämpfe haben im Ersten Weltkrieg noch nicht stattgefunden. Wenn wir bei der Entwicklung von Kampfflugzeugen die Nase vorn haben, werden wir auch in Zukunft einen Vorteil haben."
 PRC_bomber_focus:0 "Bomberfokus"
 PRC_bomber_focus_desc:0 "Wenn die Menschen in Zukunft vom Schrecken der heutigen Kriege sprechen, wird Feuer, das vom Himmel regnet, eine zentrale Rolle spielen. Wir werden unser Bestes tun, um sicherzustellen, dass diese Geschichten auch von unseren Feinden erzählt werden."
 PRC_cas_effort:0 "CAS-Aufwand"
 PRC_cas_effort_desc:0 "Eine moderne Armee benötigt nicht nur am Boden, sondern auch in der Luft die Unterstützung durch Fahrzeuge."
 PRC_nav_effort:0 "NAV-Aufwand"
 PRC_nav_effort_desc:0 "So wie die neue Seekriegsführung teilweise unter der Wasseroberfläche stattfindet, findet ein Teil davon in der Luft über dem Wasser statt."
 PRC_economic_reform:0 "Wirtschaftsreform"
 PRC_economic_reform_desc:0 "Die Verwüstungen, die die Kulturrevolution angerichtet hat, treiben unsere Nation in den Abgrund. Wir müssen Reformen anstreben, die uns da rausholen können."
 PRC_generalissimo_lin:0 "Generalissimus Lin"
 PRC_generalissimo_lin_desc:0 "Lin erwies sich als die einzig geeignete Person für die Führung des Militärs unseres Landes und nannte sich daher selbst Generalissimus."
 PRC_armament_reorganization:0 "Neuorganisation der Rüstung"
 PRC_armament_reorganization_desc:0 "Wir müssen unsere Nation in der Rüstungsproduktion stärken."
 PRC_expand_taiyuan_arsenal:0 "Erweiterung des Taiyuan-Arsenals"
 PRC_expand_taiyuan_arsenal_desc:0 "Taiyuan Arsenal ist für seine hochwertige Produktion bekannt. Wenn wir seine Produktion steigern können, werden wir enorm davon profitieren."
 if_in_faction_with_chi:0 "§YWenn Sie mit [CHI.GetName] in einer Fraktion sind: §!"
 PRC_lure_them_in_strategy:0 "Lock-sie-an-Strategie"
 PRC_lure_them_in_strategy_desc:0 "Angesichts des riesigen Territoriums und des unwegsamen Geländes unseres Landes können wir es uns leisten, uns zurückzuziehen und Eindringlinge auf Schlachtfelder unserer Wahl zu locken. Sollen die Imperialisten doch versuchen, uns zu verfolgen! Hinter jeder Ecke werden sie in einen Hinterhalt stoßen und bei jedem Schritt in eine Sprengfalle lauern!"
 PRC_industrialization_NW:0 "Lokale Industrialisierung: Nordwesten"
 PRC_industrialization_NW_desc:0 "Die Region Nordwest mag derzeit noch wie ein Ödland aussehen, doch schon bald wird sie zu einer der am stärksten industrialisierten Regionen werden."
 PRC_excavation_NW:0 "Nordwest-Ausgrabung"
 PRC_excavation_NW_desc:0 "Wir müssen in unserem Land nach mehr Ressourcen suchen, um von importierten Ressourcen unabhängig zu werden."
 PRC_industrialization_S:0 "Lokale Industrialisierung: Süden"
 PRC_industrialization_S_desc:0 "Der Süden mag zwar zu den am stärksten industrialisierten Regionen gehören, aber es besteht noch viel Verbesserungspotenzial."
 PRC_excavation_S:0 "Kautschukplantage"
 PRC_excavation_S_desc:0 "Das Klima im Süden eignet sich sehr gut für den Kautschukanbau, wir sollten es gut nutzen."
 PRC_excavation_NE:0 "Nordost-Prospektion"
 PRC_excavation_NE_desc:0 "Die Japaner haben in der Gegend zahlreiche Werkzeuge hinterlassen, die wir nutzen können, um in der Gegend neue Ressourcen zu entdecken."
 PRC_pioneering_the_north_east:0 "Gründung der Northeast Development Agency"
 PRC_pioneering_the_north_east_desc:0 "Obwohl die Japaner Teile der Mandschurei erschlossen, blieben weite Landstriche unberührt. Wir sollten große Anstrengungen unternehmen, um diese einst barbarischen Länder vollständig in die moderne Welt zu integrieren."
 PRC_rectification:0 "Korrekturbewegung"
 PRC_rectification_desc:0 "Einige unserer Genossen folgen nicht vollständig den Richtlinien des Kommunismus, wir müssen ihre Denkweise korrigieren." 
 PRC_increase_credibility_of_theory:0 "Erhöhen Sie die Glaubwürdigkeit der Lehre"
 PRC_increase_credibility_of_theory_desc:0 "Da der Krieg für uns gut verläuft, kann dies als Beweis dafür dienen, die Glaubwürdigkeit der Theorie zu stärken, die wir kürzlich übernommen haben."
 PRC_front_line_behind_enemy_line:0 "Frontlinie hinter der feindlichen Linie"
 PRC_front_line_behind_enemy_line_desc:0 "Wenn wir das Potenzial des Guerillakriegs voll ausschöpfen wollen, müssen wir Operationen hinter der Frontlinie unseres Feindes durchführen, seine Versorgungsrouten unterbrechen und ihn ausbremsen."
 PRC_exploit_our_enemys_mistake:0 "Den Fehler unseres Feindes ausnutzen"
 PRC_exploit_our_enemys_mistake_desc:0 "Die Synergien zwischen den Frontoperationen unseres Feindes sind nicht besonders gut, wir können dies zu unserem Vorteil nutzen und so weit wie möglich ausnutzen."
 PRC_dare_to_die_corps:0 "Dare-To-Die-Corps"
 PRC_dare_to_die_corps_desc:0 "Wenn wir den Krieg gegen die Invasoren gewinnen wollen, muss unser Volk mutig genug sein, keine Angst vor dem Tod zu haben."
 PRC_march_into_sik:0 "Sinkiang zurückerobern"
 PRC_march_into_sik_desc:0 "Es ist Zeit für uns, unsere verlorenen Gebiete zurückzuerobern. Sinkiang wird bald uns gehören."
 ## 16/1/2017 ##
 PRC_continuous_naval_production:0 "Marineproduktion"
 PRC_continuous_naval_production_desc:0 "Indem wir die Ressourcen auf unsere Werften konzentrieren und qualifizierte Schiffsbauer vom Militärdienst befreien, können wir die Produktionszeit für Schiffe drastisch verkürzen."
 PRC_continuous_air_production:0 "Luftproduktion"
 PRC_continuous_air_production_desc:0 "Wir können unsere Luftfahrtindustrie umstrukturieren, um Abfall zu vermeiden und die Produktion zu rationalisieren."
 PRC_continuous_non_factory_construct:0 "Bauingenieurwesen"
 PRC_continuous_non_factory_construct_desc:0 "In unserer Bauindustrie herrscht noch immer viel Nachholbedarf. Indem wir unsere Aufmerksamkeit darauf richten, können wir die Baugeschwindigkeit deutlich verbessern. Leider hat sich die Produktion von Werkzeugmaschinen als großer Engpass für die Expansion unserer Schwerindustrie erwiesen, sodass sie von den Bemühungen in diesem Bereich nicht profitieren wird. "
 PRC_continuous_reduce_training_time:0 "Armeeausbildung"
 PRC_continuous_reduce_training_time_desc:0 "Durch die Schaffung spezialisierter Fortbildungseinheiten innerhalb jeder Division können wir auch Divisionen an die Front schicken, die zuvor mit der Ausbildung zurückgehalten worden wären."
 PRC_continuous_suppression:0 "Unterdrückung von Resistenzen"
 PRC_continuous_suppression_desc:0 "Indem wir die großen Widerstandsgruppen in den besetzten Gebieten infiltrieren und ihre Anführer ausschalten, können wir den Schaden, den sie anrichten können, erheblich verringern."
 PRC_continuous_repair:0 "Baureparatur"
 PRC_continuous_repair_desc:0 "Wir werden spezialisierte Reparaturteams aus Fabrik- und Bauarbeitern bilden und ihren Einsatz zentral steuern, um den Wiederaufbau der beschädigten Infrastruktur zu verbessern."
 PRC_continuous_tech_share:0 "Technologieaustausch"
 PRC_continuous_tech_share_desc:0 "Wir werden unsere Forschungsinstitute und Universitäten dazu ermutigen, mit Partnern in verbündeten Ländern in Kontakt zu treten. Dadurch erhalten wir einen Bonus für den Austausch von Technologie."
 PRC_continuous_boost_freedom:0 "Mehr Autonomie"
 PRC_continuous_boost_freedom_desc:0 "Durch die Reorganisation unserer Kolonialbürokratie und die Anwerbung einheimischer Verwalter werden wir mit der Zeit in der Lage sein, unsere Angelegenheiten selbst in die Hand zu nehmen."
 PRC_continuous_restrict_freedom:0 "Unterdrücken von Themen"
 PRC_continuous_restrict_freedom_desc:0 "Unsere Kolonialisten haben ziemlich alberne Vorstellungen von Dingen wie „Selbstbestimmung“ oder „nationaler Unabhängigkeit“. Es ist an der Zeit, sie von diesen Vorstellungen abzubringen."
 ## UNUSED ##
 prc_continuous_partisan_tt:0 "§Y In unserem Kernstaat, der vollständig von unserem Feind kontrolliert wird und den Nationalgeist „Feindliche Partisanen hinter unserer Frontlinie“ besitzt, werden sich alle 30 Tage Partisanen erheben.§! §R Staaten, die unseren Feinden gehören, sind hiervon nicht betroffen.§!"
 PRC_continuous_partisan:0 "Stützpunkte hinter der feindlichen Linie"
 PRC_continuous_partisan_desc:0 "Unsere Partisanen richten derzeit hinter der Frontlinie unserer Feinde einiges Chaos an. Wir könnten ihren Einfluss verstärken, indem wir ihnen zusätzliche Vorräte zukommen lassen."
 PRC_continuous_one_time_boost:0 "Planerstellung"
 PRC_continuous_one_time_boost_desc:0 "Um unseren Feind zu besiegen, brauchen wir einen gründlichen Plan. Wir sollten so viel Intelligenz und militärisches Geschick wie möglich für solche Pläne sammeln, denn sie sollten uns in den nächsten Gefechten gegen unsere Feinde einige Vorteile verschaffen."
 ## 7/2/2017 ##
 PRC_defy_sov_order:0 "Befehl der Sowjetunion missachtet"
 PRC_sov_approve:0 "Der Sowjet stimmt unserem Vorschlag zu"
 PRC_zxl_will_become_leader_if_agree:0 "§YZhang Xueliang wird der Anführer der Grand Northwest Union, wenn er es annimmt.\n§!"
 PRC_some_generals_will_defect:0 "§REinige Generäle werden zur KMT überlaufen§!\n"
 ## 9/2/2017 ##
 PRC_remove_noresist_from_zxl_tt:0 "Entferne die Eigenschaft „Der General, der keinen Widerstand leistete“ von Zhang Xueliang.\n"
 prc_preserve:0 "Aktiviert §HSelbsterhaltung§!\nGesamte Infanterie: \n Rückfluss: §G+1%§!\n Erfahrungsverlust: §G-1,5%§!"
 PRC_mountain_training_tt:0 "Aktiviert §HMountain Warfare§!\nAlle Infanterie: \n §HMountain§!\n Bewegung: §G+10%§!\n §Hills§!\n Bewegung: §G+10%§!\n\n§HMauries\n Mountain§!\n Angriff: §G+5%§!\n §Hills§!\n Angriff: §G+5%§!\n \n§HMountaineers\n Mountain§!\n Angriff: §G+5%§!\n §Hills§!\n Angriff: §G+5%§!\n \n§HPallschirmjäger\n Mountain§!\n Angriff: §G+5%§!\n §Hills§!\n Angriff: §G+5%§!\n\nGewinne 2 Elite-Bergsteiger-Divisionen.\n"
 PRC_yhc_join:0 "§YYang Hucheng§! wird sich unserer Armee anschließen\n"
