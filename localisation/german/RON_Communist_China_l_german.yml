 ### ideas ###
 PRC_defeatism_1:0 "Defätismus"
 PRC_defeatism_1_desc:0 "Einige unserer Kameraden glauben, dass wir das nächste Abessinien werden, wenn wir gegen die Japaner kämpfen. Solche Gedanken dämpfen den Willen unseres Volkes erheblich."
 PRC_defeatism_2:0 "Defätismus"
 PRC_defeatism_2_desc:0 "Einige unserer Kameraden glauben, dass wir das nächste Abessinien werden, wenn wir gegen die Japaner kämpfen. Solche Gedanken schwächen den Willen unseres Volkes."
 PRC_underestimation:0 "Unterschätzen Sie Japan"
 PRC_underestimation_desc:0 "Einige unserer Kameraden sind hinsichtlich der Japaner zu optimistisch. Sie behaupten sogar, dass sie Shanxi niemals erreichen werden. Diese Arroganz wird unsere Kriegsanstrengungen stark beeinträchtigen."
 PRC_integrated_army:0 "Eingetragene Armee"
 PRC_integrated_army_desc:0 "Die kommunistische Rote Armee hat sich bereit erklärt, in unsere Armee integriert zu werden. Mit dieser kleinen zusätzlichen Unterstützung könnte der Krieg weniger schwierig werden."
 PRC_initiative_idea:0 "Initiative in Kriegszeiten"
 PRC_initiative_idea_desc:0 "Die Entwaffnung eines Soldaten ist die Folge des Verlustes seiner Handlungsfreiheit durch die Erzwingung einer passiven Haltung. Dasselbe gilt für die Niederlage einer Armee. Aus diesem Grund versuchen beide Seiten im Krieg, die Initiative zu ergreifen und Passivität zu vermeiden."
 PRC_protracted_war_idea:0 "Langwieriger Krieg"
 PRC_protracted_war_idea_gp:0 "Langwieriger Krieg"
 PRC_protracted_war_idea_nb:0 "Langwieriger Krieg"
 PRC_protracted_war_idea_all:0 "Langwieriger Krieg"
 PRC_protracted_war_idea_desc:0 "Wir müssen die Japaner so lange wie möglich aufhalten, um Zeit für internationale Hilfe zu gewinnen."
 PRC_protracted_war_idea_gp_desc:0 "Wir müssen die Japaner so lange wie möglich aufhalten, um Zeit für internationale Hilfe zu gewinnen."
 PRC_protracted_war_idea_nb_desc:0 "Wir müssen die Japaner so lange wie möglich aufhalten, um Zeit für internationale Hilfe zu gewinnen."
 PRC_protracted_war_idea_all_desc:0 "Wir müssen die Japaner so lange wie möglich aufhalten, um Zeit für internationale Hilfe zu gewinnen."
 PRC_devastating_long_march:0 "Die Verwüstungen des Langen Marsches"
 PRC_devastating_long_march_desc:0 "Nach dem Langen Marsch ließen wir uns schließlich in Shaanxi nieder. Doch die klaffende Wunde, die er hinterlassen hatte, ist noch immer nicht verheilt. Wird dies unser Ende sein?"
 PRC_devastating_long_march_1:0 "Erholung vom langen Marsch"
 PRC_devastating_long_march_1_desc:0 "Wir kommen jetzt wieder auf Kurs, die Auswirkungen des Langen Marsches werden bald abgemildert sein."
 PRC_guerrilla_warfare:0 "Guerillakrieg"
 PRC_guerrilla_warfare_desc:0 "Wir sind nicht einmal annähernd eine „Nation“ oder ein „Land“, unsere Bewegung ist lediglich eine Art Guerillakrieg gegen die Kuomintang. \n"
