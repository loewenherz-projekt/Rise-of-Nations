 ## 14/2/2017 ##
 PRC_the_grand_northwest_united_proposal:0 "Großer Vorschlag der Nordwestunion"
 PRC_the_grand_northwest_united_proposal_desc:0 "Der ehemalige General der Fengtian-Clique, Zhang Xueliang, plante die Gründung einer weiteren Regierung im Norden. Diese würde dann mit Sheng Shicai in Sinkiang zusammenarbeiten, um Nachschub aus der Sowjetunion zu erhalten und die japanischen Invasoren allein zu bekämpfen. Für die Umsetzung dieses Plans bedarf es jedoch der Genehmigung der Komintern."
 PRC_urge_zhang:0 "Kontaktieren Sie Zhang Xueliang"
 PRC_urge_zhang_desc:0 "Nachdem wir unseren nächsten Schritt entschieden haben, ist es an der Zeit, Zhang über unseren Plan zu informieren ..."
 PRC_form_the_grand_northwest_united:0 "Bilden Sie die Nordwestliche Nationale Verteidigungsregierung"
 PRC_form_the_grand_northwest_united_desc:0 "Da fast alles entschieden ist, können wir nun den Plan der „Großen Nordwestunion“ in die Tat umsetzen. Dadurch können wir unsere Abhängigkeit von der Kuomintang im Kampf gegen die Japaner erheblich verringern."
 PRC_unite_against_the_jap:0 "Vereint gegen die Japaner"
 PRC_unite_against_the_jap_desc:0 "Gemeinsam sind wir stark, getrennt sind wir schwach."
 PRC_destroy_mao_and_his_clique:0 "Zerstöre die Kommunisten"
 PRC_destroy_mao_and_his_clique_desc:0 "Obwohl er an der Spitze einer Regierung steht, die von Kommunisten geprägt ist, glaubt Zhang immer noch, dass nur der Faschismus die einzige Rettung für China sei. Um die faschistische Idee zu verwirklichen, müssten die Kommunisten ausgerottet werden."
 PRC_trust_in_communism:0 "Vertrauen in den Kommunismus"
 PRC_trust_in_communism_desc:0 "Es gibt einen Grund, warum die Kommunisten so lange gegen die NRA durchhalten können, einen Grund, den Zhang herausfinden möchte."
 PRC_government_reshuffle:0 "Regierungsumbildung"
 PRC_government_reshuffle_desc:0 "Defätisten und übertriebene Optimisten in der Regierung können nicht zum Untergang dieser neu gegründeten Union führen. Es müssen Maßnahmen ergriffen werden, um eine solche Katastrophe zu verhindern."
 PRC_invite_shx:0 "Suiyuan-Korridor"
 PRC_invite_shx_desc:0 "Durch den Zugang zu Suiyuan können unsere Truppen die Front problemlos erreichen. Allerdings stellen die Kriegsherren in der Region ein Hindernis für die Umsetzung dieses Plans dar."
 PRC_retake_dongbei:0 "Erobere Dongbei zurück"
 PRC_retake_dongbei_desc:0 "Seit der japanischen Invasion in der Mandschurei war der Nordosten von den Japanern besetzt. Wir werden uns nun zurückholen, was uns rechtmäßig gehört!"
 PRC_winter_training:0 "Wintertraining"
 PRC_winter_training_desc:0 "Das extreme Klima im Norden war brutal. Durch spezielles Training in der kalten Jahreszeit können unsere Streitkräfte die Situation leichter bewältigen."
 PRC_mountain_training:0 "Bergtraining"
 PRC_mountain_training_desc:0 "Das bergige Gelände Chinas stellt für die mechanisierten Streitkräfte unserer Invasoren eine große Barriere dar. Ohne die Unterstützung dieser mechanisierten Streitkräfte können unsere Männer unsere Feinde mit ausreichender Ausbildung leicht besiegen."
 PRC_recall_feng_clique_generals:0 "Erinnern Sie sich an die Generäle der Fengtian-Clique"
 PRC_recall_feng_clique_generals_desc:0 "Nachdem er seine Position in der neu gegründeten Regierung gestärkt hat, hat Zhang beschlossen, ehemalige Generäle der Fengtian-Clique zurückzurufen, um ihn bei seinem Plan zur Bekämpfung der Japaner zu unterstützen."
 PRC_incorporate_xbj:0 "Integrieren Sie die Xibei-Armee"
 PRC_incorporate_xbj_desc:0 "Yang Huchengs Xibei-Armee hat Zhangs Plan unterstützt. Wir könnten für den bevorstehenden Krieg ein paar zusätzliche Männer gebrauchen."
 PRC_fight_alone:0 "Einzelgänger"
 PRC_fight_alone_desc:0 "Angesichts der Inkompetenz der NRA wäre es nur ein Scherz, an ihrer Seite zu kämpfen. Deshalb müssen wir die Japaner allein bekämpfen. So hätten wir eine viel größere Chance zu gewinnen."
 PRC_military_knowledge_exchange:0 "Militärischer Wissensaustausch"
 PRC_military_knowledge_exchange_desc:0 "Sowohl die Taktik der NRA als auch unsere eigene weisen einige Schwächen auf. Durch den Austausch von Militärbeamten könnten wir unsere Taktik deutlich verbessern und mit vereinten Kräften die Japaner mit Sicherheit aus unserem Land vertreiben."
 PRC_study_kmt_equipment:0 "Studieren Sie NRA-Ausrüstung"
 PRC_study_kmt_equipment_desc:0 "Obwohl die Ausrüstung der NRA nicht von höchster Qualität ist, ist sie immer noch besser als die der meisten unserer Streitkräfte. Wenn wir sie studieren würden, könnten wir unser Wissen über Kleinwaffen erweitern."
 PRC_apologise_to_sov:0 "Entschuldige dich bei den Sowjets"
 PRC_apologise_to_sov_desc:0 "Trotz unseres Ungehorsams gegenüber dem sowjetischen Befehl zur Bildung einer neuen Regierung stehen wir nun doch in einer Einheitsfront mit der KMT. Die sowjetischen Beamten können über dieses kleine „Fehlverhalten“ unsererseits sicher hinwegsehen …"
 PRC_pressure_prince_dem:0 "Druck auf die Chahar-Regierung ausüben"
 PRC_pressure_prince_dem_desc:0 "Die japanische Marionette in Chahar ist lockerer als erwartet. Wir könnten sie mit Bestechungsgeldern und Vergünstigungen belohnen, um sie ohne Blutvergießen zu bekämpfen. Sollten diese Maßnahmen nicht ausreichen, dann..."
 PRC_reform_high_command:0 "Reform des Oberkommandos"
 PRC_reform_high_command_desc:0 "Unser Oberkommando könnte noch etwas Arbeit vertragen. Die derzeitige Struktur ist zu locker und die Befehlskette ist für die Koordinierung einer großen Armee nicht besonders geeignet."
 PRC_focus_on_red_army:0 "Fokus auf die Rote Armee"
 PRC_focus_on_red_army_desc:0 "Die Rote Armee der Kommunisten ist eine herausragende Guerillakämpferin und genießt in der Bevölkerung große Unterstützung. Wenn wir uns für sie einsetzen würden, würde das unsere Legitimität deutlich erhöhen."
 PRC_focus_on_dong_beijun:0 "Fokus auf die Dongbei-Armee"
 PRC_focus_on_dong_beijun_desc:0 "Die gut organisierte Dongbei-Armee unter Zhang Xueliang ist bereit, für ihr Vaterland zu sterben. Wenn wir uns für sie einsetzen, wird sich die Leistungsfähigkeit unserer Streitkräfte im Feld erheblich verbessern."
 PRC_guerrilla_operation_expansion:0 "Erweiterung der Guerilla-Operation"
 PRC_guerrilla_operation_expansion_desc:0 "Unsere furchtlosen Guerillakämpfer haben im Feld einige Erfolge erzielt. Wir sollten darüber nachdenken, den Guerillakrieg auf andere Bereiche auszuweiten, beispielsweise indem wir unsere eigenen Guerillakämpfer einsetzen, um unsere Feinde zu bekämpfen. Dies kann unsere Kosten für die Besetzung feindlicher Gebiete erheblich senken."
 PRC_stir_anti_japanese_sentiment:0 "Schüren Sie antijapanische Stimmungen"
 PRC_stir_anti_japanese_sentiment_desc:0 "Die japanische Besetzung der Mandschurei hat unsere Brüder dazu veranlasst, ihre Heimat Dongbei zu verlassen. Wir können dies als Propaganda nutzen und ihre Moral stärken."
 PRC_enforce_our_goal:0 "Unser Ziel durchsetzen"
 PRC_enforce_our_goal_desc:0 "Wir sollten das ursprüngliche Ziel der Regierungsbildung nicht vergessen. Jetzt müssen wir handeln."
 PRC_mongolia_issue:0 "Mongolei-Ausgabe"
 PRC_mongolia_issue_desc:0 "Die Mongolei ist ein untrennbarer Teil Chinas, sie muss uns zurückgegeben werden!"
 PRC_exert_influence_in_sea:0 "Einfluss in SEA ausüben"
 PRC_exert_influence_in_sea_desc:0 "In Südostasien verlaufen zahlreiche wichtige Seewege. Die Festigung unseres Einflusses in der Region kann uns im Falle eines Kriegsausbruchs taktische Vorteile sichern."
 PRC_coerce_korea:0 "Korea zwingen"
 PRC_coerce_korea_desc:0 "Die Auserwählte Halbinsel ist eine großartige strategische Position. Wir müssen sie erobern, um unseren Vorteil im Kriegsfall zu sichern!"
 PRC_exert_influence_in_central_asia:0 "Einfluss in Zentralasien ausüben"
 PRC_exert_influence_in_central_asia_desc:0 "Wenn wir nach Westen expandieren wollen, wäre eine Konsolidierung unserer Präsenz in Zentralasien von Vorteil."
 PRC_exert_influence_in_india_and_mongolia:0 "Einfluss in der Mongolei und in Indien ausüben"
 PRC_exert_influence_in_india_and_mongolia_desc:0 "Ein Zweifrontenkrieg ist das Letzte, was wir wollen. Um ihn zu verhindern, müssen wir unsere Nord- und Südgrenze sichern. Unsere Nachbarn dort zu Freunden zu machen, könnte durchaus von Vorteil sein."
 PRC_demand_return_of_trade_ports:0 "Fordern Sie die Rückkehr der Handelshäfen"
 PRC_demand_return_of_trade_ports_desc:0 "Ausländische Zugeständnisse sind eine Demütigung für unser Land. Wir müssen die sofortige Abschaffung dieser ungleichen Verträge fordern!"
 PRC_the_permanent_revolution:0 "Die permanente Revolution"
 PRC_the_permanent_revolution_desc:0 "Der Kommunismus innerhalb eines Staates reicht bei weitem nicht aus, die ganze Welt sollte dem wahren Weg von Marx und Lenin folgen!"
 PRC_aid_the_workers:0 "Helfen Sie den Arbeitern"
 PRC_aid_the_workers_desc:0 "Die Arbeiter in unseren Nachbarländern wurden zu lange unterdrückt. Es ist an der Zeit, sie von ihren kapitalistischen Unterdrückern zu befreien!"
 PRC_hire_sov_experts:0 "Stellen Sie sowjetische Experten ein"
 PRC_hire_sov_experts_desc:0 "Sowjetische Experten könnten wertvolle Beiträge zu unserer industriellen Entwicklung leisten. Ihre Ratschläge überwiegen die Kosten für ihre Anstellung."
 PRC_import_sov_machinery:0 "Importieren Sie sowjetische Maschinen"
 PRC_import_sov_machinery_desc:0 "Die Qualität der Maschinen in unserem Land ist sehr schlecht. Sowjetische Maschinen produzieren jedoch hochwertige Materialien in enormer Qualität. Ihr Import würde uns eine starke Industrie sichern."
 PRC_invest_in_new_companies:0 "Investieren Sie in neue Unternehmen"
 PRC_invest_in_new_companies_desc:0 "In unserem Land gibt es nur eine Handvoll einheimischer Unternehmen. Wir sollten Investitionen in neue Unternehmen in Erwägung ziehen, um die weltweite Wettbewerbsfähigkeit unseres Landes zu steigern."
 PRC_assistance_in_naval_industry:0 "Fordern Sie sowjetische Unterstützung in der Marineindustrie an"
 PRC_assistance_in_naval_industry_desc:0 "Angesichts der starken Kapazitäten unseres Freundes in der Schiffsindustrie können wir auch in unserem Bereich um seine Unterstützung bitten."
 PRC_study_soviet_ships:0 "Studieren Sie sowjetische Schiffe"
 PRC_study_soviet_ships_desc:0 "Das Studium ausländischer Entwürfe wird unseren Ingenieuren Aufschluss über die Schiffbautechnologie geben."
 PRC_study_sov_aircrafts:0 "Studieren Sie sowjetische Flugzeuge"
 PRC_study_sov_aircrafts_desc:0 "Das Studium ausländischer Designs wird unseren Ingenieuren einige Erkenntnisse über die Lufttechnik liefern."
 PRC_study_sov_equipments:0 "Studieren Sie die Ausrüstung der sowjetischen Armee"
 PRC_study_sov_equipments_desc:0 "Das Studium ausländischer Entwürfe wird Aufschluss über unsere Militäringenieure geben."
 PRC_sov_military_advisor:0 "Sowjetischer Militärberater"
 PRC_sov_military_advisor_desc:0 "Mit der Hilfe erfahrener sowjetischer Generäle im Ruhestand kann unsere Armee bessere Leistungen erbringen."
 PRC_the_second_northeast_flag_replacement:0 "Der zweite Austausch der Nordostflagge"
 PRC_the_second_northeast_flag_replacement_desc:0 "Die Dongbei-Armee war während der Kriegsherrenzeit eine entscheidende Kraft. Ohne unser Eingreifen im Zentralebenenkrieg hätte die Regierung von Nanking ihn nicht gewonnen. Ohne den Austausch der Nordostflagge wäre China nicht unter einer Flagge vereint. Jetzt werden wir die Fengtian-Clique wiederherstellen und der Regierung von Nanking zeigen, wer besser für die Herrschaft über China geeignet ist."
 PRC_submit_to_central_government:0 "Der Zentralregierung vorlegen"
 PRC_submit_to_central_government_desc:0 "Ahhhhhhhhhh, ich will jetzt als CHI spielen, dieser Fokusbaum ist Mist!"
 PRC_revive_arsenals:0 "Arsenale wiederbeleben"
 PRC_revive_arsenals_desc:0 "Die meisten Arsenale im Nordosten blieben unberührt, einige wurden sogar von den Japanern begünstigt. Wir können sie nun nutzen, um die Kriegsmaschinerie zu produzieren, die wir brauchen, um der Fengtian-Clique zu ihrem früheren Ruhm zu verhelfen."
 ## 15/2/2017 ##
 PRC_revive_the_navy_and_air_force:0 "Wiederbelebung der Marine und der Luftwaffe"
 PRC_revive_the_navy_and_air_force_desc:0 "Unsere Marine- und Luftstreitkräfte waren einer der Gründe für unsere Stärke während der Kriegsherren-Ära. Wir müssen sie wiederherstellen, um sicherzustellen, dass wir auch weiterhin eine ernstzunehmende Macht sind."
 PRC_pact_with_jap:0 "Ein Pakt mit Japan"
 PRC_pact_with_jap_desc:0 "Obwohl sie einst unsere Feinde waren, ist ihre militärische Stärke unbestreitbar. Vielleicht könnten wir unsere Vorurteile beiseite legen und ein Bündnis mit ihnen eingehen?"
 PRC_king_of_dongbei:0 "König von Dongbei"
 PRC_king_of_dongbei_desc:0 "Wir haben unser verlorenes Land zurückerobert, die Region soll wieder zu unserem Operationszentrum werden."
 PRC_industrial_developement:0 "Industrielle Entwicklung"
 PRC_industrial_developement_desc:0 "In der vom Krieg zerstörten Region Dongbei gibt es kaum Infrastruktur. Durch verstärkte Bemühungen zum Wiederaufbau der Region können wir unsere Produktion steigern."
 PRC_study_foreign_equipment:0 "Ausländische Ausrüstung studieren"
 PRC_study_foreign_equipment_desc:0 "Wir können ausländische Geräte nachahmen und unsere Geräte auf der Grundlage ihres Designs verbessern."
 PRC_expand_unversity:0 "Universität erweitern"
 PRC_expand_unversity_desc:0 "Bildung ist unverzichtbar. Wir müssen mehr Universitäten bauen, um die nächste Generation für die Zukunft unseres Landes heranzubilden."
 PRC_establish_general_staff:0 "Generalstab einrichten"
 PRC_establish_general_staff_desc:0 "Die Größe unseres Militärs ist stark gewachsen. Wir müssen ein Gremium für eine bessere Koordinierung einrichten."
 PRC_claim_the_central_plain:0 "Beanspruchen Sie die Zentralebene"
 PRC_claim_the_central_plain_desc:0 "Die Regierung im Süden hat es schon lange auf unsere Gebiete abgesehen. Wir sollten sie niederschlagen, bevor sie dasselbe tut."
 PRC_secure_the_far_east:0 "Sichern Sie den Fernen Osten"
 PRC_secure_the_far_east_desc:0 "Der russische Ferne Osten hat uns den direkten Zugang zum Pazifik verwehrt. Dies wird unsere Marineexpansion erheblich behindern. Im Interesse unseres Landes müssen wir die Kontrolle über dieses Gebiet übernehmen."
 PRC_joint_warfare:0 "Gemeinsame Kriegsführung"
 PRC_joint_warfare_desc:0 "Die lange Küstenlinie Chinas bietet unseren Streitkräften hervorragende Möglichkeiten, unser Luft-, See- und Landarsenal zu nutzen. Wir sollten uns intensiver mit solchen effizienten Taktiken befassen."
 PRC_pressure_korea:0 "Druck auf Korea"
 PRC_pressure_korea_desc:0 "Mit der erfolgreichen Übernahme der wichtigsten Städte im Fernen Osten hat sich unser Einfluss erweitert. Da Korea nun von unseren Streitkräften umzingelt ist, sollte es wissen, welche Entscheidung die beste ist."
 PRC_special_research_department:0 "Abteilung für Sonderforschung"
 PRC_special_research_department_desc:0 "Der wissenschaftliche Fortschritt ist für das Überleben unserer Nation von entscheidender Bedeutung."
 PRC_provisional_science_department:0 "Provisorische Forschungsabteilung"
 PRC_provisional_science_department_desc:0 "Im Zuge der Umbildung sind einige qualifizierte Leute in unsere Regierung eingetreten. Wir könnten sie zusammenfassen und ihnen wissenschaftsbezogene Aufgaben zuweisen."
 PRC_establish_top_command:0 "Errichtung des Oberkommandos"
 PRC_establish_top_command_desc:0 "Zur effizienteren Führung und Koordination der Truppen muss ein militärisches Führungsgremium eingerichtet werden."
 PRC_expand_navy_command_structure:0 "Erweitern Sie das Marinekommando"
 PRC_expand_navy_command_structure_desc: "With the ever-growing size of our navy, a dedicated command structure is needed."
 PRC_expand_air_command_structure:0 "Erweitern Sie das Luftkommando"
 PRC_expand_air_command_structure_desc: "With the ever-growing size of our air force, a dedicated command structure is needed."
 PRC_yellow_sea_navy:0 "Gelbes Meer Marine"
 PRC_yellow_sea_navy_desc:0 "Der Operationsstützpunkt unserer Marine befindet sich im Gelben Meer. Um ihre Sicherheit zu gewährleisten, müssen wir unsere Küstenmarine stärken."
 PRC_pacific_fleet:0 "Pazifikflotte"
 PRC_pacific_fleet_desc:0 "Wir müssen uns höhere Ziele stecken, der Ausbau unserer Marine für Operationen auf hoher See ist ein Muss."
 PRC_naval_air_effort:0 "Luftangriffe der Marine"
 PRC_naval_air_effort_desc:0 "Flugzeugträger standen in den letzten Jahren im Mittelpunkt der Marineentwicklung. Wir sollten unsere Marine auf dem neuesten Stand halten."
 PRC_naval_innovation:0 "Marineinnovation"
 PRC_naval_innovation_desc:0 "Traditionelle Marinedoktrinen und -konzepte werden irgendwann außer Gebrauch geraten. Wir müssen neue und effizientere Wege finden, um unseren Feind auf See zu vernichten, während er stagniert."
 PRC_fight_effort:0 "Kämpfereinsatz"
 PRC_fight_effort_desc:0 "Luftkämpfe haben im Ersten Weltkrieg noch nicht stattgefunden. Wenn wir bei der Entwicklung von Kampfflugzeugen die Nase vorn haben, werden wir auch in Zukunft einen Vorteil haben."
 PRC_bomber_effort:0 "Bomber-Anstrengung"
 PRC_bomber_effort_desc:0 "Wenn die Menschen in Zukunft vom Schrecken der heutigen Kriege sprechen, wird Feuer, das vom Himmel regnet, eine zentrale Rolle spielen. Wir werden unser Bestes tun, um sicherzustellen, dass diese Geschichten auch von unseren Feinden erzählt werden."
 PRC_air_innovation:0 "Luftinnovation"
 PRC_air_innovation:0 "Traditionelle Luftdoktrinen und Flugzeugkonstruktionen werden irgendwann außer Gebrauch geraten. Wir müssen neue und effizientere Wege finden, um unseren Feind aus der Luft zu vernichten, während er stagniert."
 PRC_introduce_jap_shipbuilding_tech:0 "Fordern Sie japanische Unterstützung in der Marineindustrie an"
 PRC_introduce_jap_shipbuilding_tech_desc:0 "Angesichts der starken Kapazitäten unseres Freundes in der Schiffsindustrie können wir auch in unserem Bereich um seine Unterstützung bitten."
 PRC_jap_military_advisor:0 "Japanischer Militärberater"
 PRC_jap_military_advisor_desc:0 "Japan hat eine längere Militärgeschichte als wir, seine Erfahrungen werden für unsere militärische Entwicklung von großem Nutzen sein."
 PRC_west_pacific_alliance:0 "Westpazifik-Allianz"
 PRC_west_pacific_alliance_desc:0 "Um das Überleben beider Nationen zu sichern, sollte ein Bündnis gebildet werden."
 PRC_coup_in_philipine:0 "Unterstützen Sie den faschistischen Putsch in Südostasien"
 PRC_coup_in_philipine_desc:0 "Die Menschen sollten sich gegen ihre inkompetente Regierung erheben und dem wahren Weg des Faschismus folgen. Wer dies tut, erhält unsere volle Unterstützung."
 PRC_burn_the_bridge:0 "Verbrenne die Brücke"
 PRC_burn_the_bridge_desc:0 "Wir haben von Japan bekommen, was wir wollten. Es ist Zeit für uns, den Pakt zu brechen."
 PRC_battlefield_four:0 "Das Sechste Theater"
 PRC_battlefield_four_desc:0 "Jenseits des Pazifiks lauert die wahre Bedrohung für unsere Nation, sie muss vernichtet werden!"
