 PRC_uncertainty_of_new_theory_desc:0 "Die Einführung einer neuen Doktrin, die alle bisherigen Strategien aufgibt, hat einige Bedenken hinsichtlich der IT ausgelöst."
 PRC_maybe_theory_is_ok:0 "Vertrauen in die neue Lehre"
 PRC_maybe_theory_is_ok_desc:0 "Die neu eingeführte Doktrin erweist sich als erfolgreich, unsere Armee hat sich vollständig an den neuen Kampfstil gewöhnt.\n\n§RInformiert sich der Krieg zu Beginn nicht zu Ihren Gunsten, könnte Ihre Armee das Vertrauen in ihn verlieren.§!"
 PRC_enemy_partisan:0 "Feindliche Partisanen hinter unserer Front"
 PRC_enemy_partisan_desc:0 "Die Partisanen unseres Feindes haben sich tief hinter unserer Frontlinie festgesetzt, wodurch sie Versorgungswege beschädigen und unsere Truppen verlangsamen.\n\n§RDieser Nationalgeist erlischt, wenn der Krieg mit der VR China vorbei ist.§!\n\n§RPeriodische Gebäudeschäden in den von uns kontrollierten chinesischen Kernstaaten§!"
 PRC_exploit_our_enemys_mistake_idea:0 "Den Fehler unseres Feindes ausnutzen"
 PRC_exploit_our_enemys_mistake_idea_desc:0 "Die Frontoperationen unseres Feindes sind nicht sehr gut koordiniert. Wir können dies zu unserem Vorteil nutzen und so gut wie möglich ausnutzen.\n\n§RDieser Nationalgeist wird erlöschen, wenn der Krieg mit Japan vorbei ist.§!"
 improper_frontline_command:0 "Mängel im Frontline-Betrieb"
 improper_frontline_command_desc:0 "Die Mängel unserer Frontoperationen treten allmählich zutage und unser Feind beginnt, sie zu seinem Vorteil zu nutzen."
