 ## news ##
 kns.4.t:0 "Der Tod Josef Stalins"
 kns.4.d:0 "Bei Josef Stalin, dem ehemaligen Führer der Sowjetunion, wurden Schlaganfall, Bluthochdruck und Magenblutungen diagnostiziert. Er wurde auf dem Boden seines Schlafzimmers liegend aufgefunden, bevor die Ärzte gerufen wurden. Die Behandlung mit Blutegeln war erfolglos, und so wurde Stalins Doppelgänger aus dem Urlaub zurückgerufen, um bei Bedarf Stalins Stelle zu übernehmen. Stalins Gesundheitszustand wurde jedoch später in ganz Moskau ausführlich im Fernsehen übertragen. Am Tag darauf wurde Josef Stalin für tot erklärt.\n\nDer Personenkult um Stalin dürfte auch nach seinem Tod weitergehen. Und ein Machtkampf ist bereits im Gange, da einflussreiche Parteimitglieder begeistert darauf brennen, die von Stalin frei gewordene Position einzunehmen."
 kns.4.a:0 "Ein verheerender Verlust."
 kns.4.b:0 "Der Verlust eines großartigen Lehrers und eines großartigen Anführers."
 kns.4.c:0 "Interessant"
 
