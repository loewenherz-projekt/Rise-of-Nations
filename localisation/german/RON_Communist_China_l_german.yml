 prc.1.a:0 "Dies wird einen großen Beitrag zum Krieg gegen die Japaner leisten."
 prc.2.t:0 "Kommunistische Armee Incorporated"
 prc.2.d:0 "Die Kommunisten haben zugestimmt, dass wir ihre Männer in unsere Armee aufnehmen. Wir werden jetzt gemeinsam gegen unseren gemeinsamen Feind vorgehen."
 prc.2.a:0 "Unser Feind wird keinen Erfolg haben!"
 prc.3.t:0 "Fehlerhafte Säuberung"
 prc.3.d:0 "Bei unseren Bemühungen, Reaktionäre aus unseren Reihen zu entfernen, glauben manche Genossen fälschlicherweise, sie seien auf dem „rechten“ statt auf dem „linken“ Weg. Dies wird sich sicherlich auf unsere Leistung auswirken."
 prc.3.a:0 "Einige unserer Genossen sind zu „links“, um andere als „rechts“ zu bezeichnen …"
 prc.4.t:0 "Talentiertes Personal"
 prc.4.d:0 "Aus der Gesellschaft sind einige talentierte Bürger hervorgegangen, denen wir einen Platz in unserer Institution geben konnten."
 prc.4.a:0 "Der Fortschritt wird niemals aufhören!"
 prc_msp_tt:0 "Reduzieren Sie die Strafe für §YLangen Fachkräftemangel§!.\n"
 prc.5.t:0 "Stalin ist gestorben"
 prc.5.d:0 "Unser ruhmreicher Führer, Josef Wissarionowitsch Stalin, war von Karl Marx eingeladen worden und hat uns gestern verlassen. Ein großer Verlust für das sowjetische Volk.\n\nEin Machtkampf hat begonnen, da mächtige Mitglieder der Partei um die von Stalin frei gewordene Position konkurrieren."
 prc.5.a:0 "Ein Stern fällt..."
 prc.6.t:0 "[GetMonth] Gliederung"
 prc.6.d:0 "Nachdem unser Großer Vorsitzender Mao das Drama „Hai Rui aus dem Amt entlassen“ kritisiert hatte, gründeten einige Leute eine Gruppe, um die Wirkung dieser Aussage so weit wie möglich abzumildern, indem sie die Aussage des Großen Vorsitzenden Mao aus einer akademischen Perspektive betrachteten. Zuvor hatte der Große Vorsitzende Mao das Drama als eine treffende Darstellung des Klassenkonflikts im sozialistischen Staat gelobt.\n\nDieser Auftritt des Großen Vorsitzenden Mao hat im Land für Aufsehen gesorgt, die gesamte Presse machte dieses Ereignis zu ihren Schlagzeilen und berichtete ausführlich darüber."
 prc.6.a:0 "Hoffe, dass da nichts rauskommt..."
 prc.7.t:0 "Mitteilung des Zentralkomitees"
 prc.7.d:0 "Der Große Vorsitzende Mao hat eine Bekanntmachung herausgegeben, in der er erklärt, der Kapitalismus habe einige hochrangige Parteifunktionäre korrumpiert und sie müssten entmachtet werden. In der Bekanntmachung wurde auch der Entwurf zurückgewiesen, der veröffentlicht wurde, nachdem der Große Vorsitzende Mao das Drama „Hai Rui aus dem Amt entlassen“ kritisiert hatte.\n\nEinige hochrangige Funktionäre waren am selben Tag aus der Partei ausgeschlossen worden."
 prc.7.a:0 "Das sieht nicht gut aus..."
 prc.8.t:0 "Tod von Lin Biao"
 prc.8.d:0 "Lin Biao, der handverlesene Erbe des Großen Vorsitzenden Mao, starb bei einem Flugzeugabsturz in Öndörkhaan. Den Dokumenten im Flugzeug zufolge handelte es sich bei den Opfern um Lin und einige seiner Familienmitglieder. Der genaue Grund für den Absturz ist noch immer unbekannt.\n\nLins Verhältnis zum Großen Vorsitzenden Mao verschlechterte sich, seit sie unterschiedlicher Meinung über die Abschaffung des Amtes des Nationalvorsitzenden waren. Lin wurde für einen Attentatsversuch auf den Großen Vorsitzenden Mao verantwortlich gemacht und floh vermutlich aus Angst, das nächste Ziel der Roten Garde zu werden."
 prc.8.a:0 "Das gerät außer Kontrolle!"
 prc.10.t:0 "Lin Biao floh nach [PRC_linbiao_flee_target.GetName]"
 prc.10.d:0 "Lin Biao, der handverlesene Erbe des Großen Vorsitzenden Mao, war nach [PRC_linbiao_flee_target.GetName] geflohen und mit dem Flugzeug in [PRC_linbiao_flee_target.Capital.GetName] angekommen. Die Partei und der Große Vorsitzende Mao gaben bekannt, dass Lin aus Angst vor einer Anklage wegen versuchten Attentats auf den Großen Vorsitzenden Mao geflohen sei und deshalb in [PRC_linbiao_flee_target.GetName] Asyl gesucht habe.\n\nDie Rote Garde begann, Lin und seine Familienmitglieder zu kritisieren, die nicht an der Flucht teilgenommen hatten und anschließend von der Roten Garde zu Tode geprügelt wurden."
 prc.10.a:0 "Es scheint, als würden Maos engste Vertraute allmählich sein wahres Gesicht erkennen."
 prc.11.t:0 "Tod von Zhou Enlai"
 prc.11.d:0 "Zhou Enlai, der Vorsitzende der Politischen Konsultativkonferenz des chinesischen Volkes, war verstorben. Trotz seines Einsatzes und seiner Loyalität weigerte sich der Große Vorsitzende Mao, an seiner Beerdigung teilzunehmen. Trotz des Chaos hielten die Menschen im ganzen Land Trauerversammlungen ab. Unter dem Denkmal für den Volkshelden legten viele Menschen Kränze nieder, um den Tod des geliebten Vorsitzenden zu betrauern."
 prc.11.a:0 "Ein tragischer Verlust..."
 prc.12.t:0 "Tod von Mao Zedong"
 prc.12.d:0 "Der Große Vorsitzende Mao Zedong erlag in seiner Villa in Zhongnanhai zahlreichen Krankheiten. Der Große Vorsitzende hatte die KPCh gegründet und war aus dem Zweiten Chinesischen Bürgerkrieg siegreich hervorgegangen. Sein Gesundheitszustand verschlechterte sich jedoch rapide, seit er Lins verräterische Tat entdeckt hatte. Obwohl er sich kurzzeitig erholte, folgte er schließlich der Einladung von Karl Marx. Sein Leichnam soll in einem Kristallsarg im neu errichteten Mao-Zedong-Mausoleum auf dem Tiananmen-Platz beigesetzt werden, damit auch künftige Generationen diesen einst ruhmreichen Vorsitzenden Chinas bewundern können."
 prc.12.a:0 "Ein weiterer Führungsverlust, das sieht nicht gut aus."
 prc.13.t:0 "Viererbande zerschlagen"
 prc.13.d:0 "[Root.GetLeader] verhaftete die „Viererbande“, die für die meisten Bewegungen in der Spätphase der „Kulturrevolution“ verantwortlich war, darunter auch für die Kritik an Konfuzius und Lin Biao. Die Anführerin der Bande, Jiang Qing, Maos Witwe, erklärte, sie würden lediglich Maos Willen ausführen. Mao hatte jedoch schon zu Lebzeiten versucht, die Macht der Bande zu unterdrücken. Mit dem Verschwinden der „Viererbande“ dürfte das fast ein Jahrzehnt andauernde Chaos seinem Ende entgegengehen."
 prc.13.a:0 "Sie hätten schon vor langer Zeit verhaftet und hingerichtet werden müssen!"
 prc.14.t:0 "Ausländische Investitionen"
 prc.14.d:0 "Im Zuge unserer aktuellen Reformen sind einige ausländische Unternehmen von unserer Wirtschaft angezogen worden und haben beschlossen, dort zu investieren. Dies wird unsere Wirtschaft noch weiter stärken."
 prc.14.a:0 "Unsere Wirtschaft wird eine der stärksten werden!"
 prc_more_trade_deals_tt:0 "Der Handel ist jetzt bequemer"
 prc.15.t:0 "Einführung in die Auslandsforschung"
 prc.15.d:0 "Einige ausländische Forschungsergebnisse werden in unser Labor eingeführt, was den Fortschritt unserer Forschung beschleunigen wird."
 prc.15.a:0 "Wissenschaft!"
 prc_more_research_tt:0 "Unsere Wissenschaftler werden mehr Zeit für ihre Forschung haben."
 prc_more_trade_deals_and_construct_tt:0 "Unsere Industrie und unser Handel werden ein wenig stärker werden."
 prc.21.t:0 "Die Auswirkungen der Reform"
 prc.21.d:0 "Durch die Reform wurde für das chinesische Volk eine ausreichend starke Nation geschaffen und die Auswirkungen der „Kulturrevolution“ mehr oder weniger ausgelöscht."
 prc.21.a:0 "China erhebt sich!"
 prc.22.t:0 "Deng Xiaoping ergreift die Macht"
 prc.22.d:0 "Nachdem Hua Guofeng auf dem jüngsten Treffen Selbstkritik geübt hatte, stieg Deng Xiaoping in die höchste Position der Partei auf und wurde damit zur mächtigsten Person der Nation."
 prc.22.a:0 "Hoffe, er ist besser als Hua …"
 prc.23.t:0 "Lin Biao ergreift die Macht"
 prc.23.d:0 "Lin Biao, der während der „Kulturrevolution“ nach [SOV.GetName] geflohen war, ist zurückgekehrt und ergreift die Macht, indem er mit seinen verbliebenen Untergebenen, die das Chaos-Jahrzehnt überleben, einen Putsch startet, Hua Guofeng stürzt und den Sitz des Nationalvorsitzenden einnimmt."
 prc.23.a:0 "Ein Geist der Vergangenheit!"
 prc.24.t:0 "Die Westexpedition"
 prc.24.d:0 "Der unerträgliche Fortschritt der Westexpedition veranlasste Mao, über einen Waffenstillstand nachzudenken, um dieser gewinnlosen Expedition ein Ende zu setzen."
 prc.24.a:0 "Die Expedition ist gescheitert."
 prc.24.b:0 "Wir müssen einfach warten."
 prc.25.t:0 "Bai Qiuens Besuch"
 prc.25.d:0 "Der kanadische Kommunist Norman Bethune, auch bekannt als Bai Qiuen, hat Mao gestern besucht. Bai bestand darauf, dass er an unseren Soldaten Feldoperationen durchführen werde, um uns im Krieg gegen die Japaner zu unterstützen."
 prc.25.a:0 "Wir brauchen einen Sanitäter!"
 prc.26.t:0 "[GetMonth] Gegenstrom"
 prc.26.d:0 "Der Konflikt zwischen einigen hochrangigen Parteimitgliedern und Jiang Qing ist deutlicher geworden. Jiang Qings Gruppe hat die hochrangigen Mitglieder als Reaktionäre dargestellt, was dazu geführt hat, dass einige von ihnen bei Mao misstrauisch wurden."
 prc.26.a:0 "Politik ist eine dunkle Sache."
 prc.27.t:0 "Er stand lange unter Hausarrest"
 prc.27.d:0 "He Longs Ungehorsam gegenüber Maos Befehl, „die Kapitalisten auszurotten“, hat zu Maos Misstrauen geführt und He Long wurde gestern in Xi Shan unter Hausarrest gestellt."
 prc.27.a:0 "Politik ist eine dunkle Sache."
 prc.28.t:0 "Peng De Huai entführt"
 prc.28.d:0 "Jiang Qing hat der Roten Garde die Entführung von General Peng De Huai genehmigt und Peng wurde verhört. Nach dem Verhör wurde Peng ins Gefängnis gesteckt."
 prc.28.a:0 "Politik ist eine dunkle Sache."
 prc.29.t:0 "Nie Rong Zhen herabgestuft"
 prc.29.d:0 "Nie Rong Zhen wurde auf Befehl Maos degradiert und muss nun in einer Chemiefabrik in Han Dan arbeiten."
 prc.29.a:0 "Politik ist eine dunkle Sache."
 prc_1_tt:0 "3 Infanteriedivisionen und 1 Panzerbrigade werden in Yan&#39;an eintreffen.\n\n"
 sov_power_struggle_ends:0 "Der Machtkampf endet\n"
 sov_power_struggle_begins:0 "Der Machtkampf beginnt\n"
 prc.30.t:0 "Das Ende des Machtkampfes"
 prc.30.d:0 "Nach einem fast dreijährigen Machtkampf ist [Root.GetLeader] nun in die von Stalin hinterlassene Position aufgestiegen und hat sich zur mächtigsten Person in der Sowjetunion entwickelt."
 prc.30.a:0 "Hoffe, das ist das beste Ergebnis"
 prc.32.t:0 "Integration der Regierung"
 prc.32.d:0 "[CHI.GetName] versucht, unsere Regierung zu integrieren, damit China sich vereinen kann."
 prc.32.a:0 "Sicherlich"
 prc.32.b:0 "Es ist eine Falle!"
 prc.33.t:0 "[PRC.GetName] Integration zustimmen"
 prc.33.d:0 "[PRC.GetName] hat der Vereinigung Chinas zugestimmt, aber wer soll dann unsere neu vereinte Nation führen?"
 prc.33.a:0 "[PRC.GetLeader] wird China zur Größe führen!"
 prc.33.b:0 "Es ist das Beste, wenn unsere derzeitigen Beamten an der Macht bleiben."
 prc.34.t:0 "[PRC.GetName] hat die Integration abgelehnt"
 prc.34.d:0 "[PRC.GetLeader] hat unseren Vorschlag mit der Begründung abgelehnt, es handele sich um eine Falle."
 prc.34.a:0 "Ignorantes Ungeziefer!"
 prc_no_generals_transfer:0 "§RDie derzeitigen Generäle werden die Kommunisten nicht tolerieren und unser Militär verlassen.§!"
 prc.36.t:0 "[PRC.GetName] plant eine Invasion von [SIK.GetName]"
 prc.36.d:0 "Unsere Informationen in [PRC.GetName] haben bestätigt, dass sie planen, [SIK.GetName] mit Gewalt einzunehmen."
 prc.36.a:0 "Fordern Sie [SIK.GetLeader] zur Zusammenarbeit auf, um Blutvergießen zu vermeiden."
 prc.36.b:0 "Fordern Sie [PRC.GetLeader] auf, diese Idee aufzugeben."
 prc.36.c:0 "Interessant..."
 prc.37.t:0 "Herold von [SOV.GetName]"
 prc.37.d:0 "[SOV.GetLeader] hat verlangt, dass wir uns [PRC.GetName] friedlich unterwerfen, um weiteres Blutvergießen zu vermeiden."
 prc.37.a:0 "Sie haben Recht, es geht um das Wohl unseres Volkes."
 prc.37.b:0 "So ein Unsinn! Wir werden nicht kampflos aufgeben!"
 prc.38.d:0 "[SOV.GetLeader] hat verlangt, dass wir unseren Plan zur Invasion von [SIK.GetName] aufgeben."
 prc.38.a:0 "Die Worte von [SOV.GetLeader] sind nicht die weisesten, die von [PRC.GetLeader] schon!"
 prc.38.b:0 "Ziehen Sie keine unerwünschte Aufmerksamkeit auf sich."
 prc.39.t:0 "[SOV.GetName] Intervention"
 prc.39.d:0 "Durch das Eingreifen von [SOV.GetName] hat sich [SIK.GetName] uns friedlich unterworfen."
 prc.39.a:0 "So oder so, unser Ziel ist erreicht."
 prc.40.t:0 "[SIK.GetName] Trotzig"
 prc.40.d:0 "[SIK.GetLeader] hat sich geweigert, sich [PRC.GetName] friedlich zu unterwerfen!"
 prc.40.a:0 "Wie können sie es wagen, unseren Befehlen nicht zu folgen!"
 prc.41.t:0 "[PRC.GetName] Trotzig"
 prc.41.d:0 "[PRC.GetLeader] hat sich geweigert, seinen Plan zur Invasion von [SIK.GetName] aufzugeben!"
 prc.42.t:0 "[PRC.GetLeader] Hat unseren Befehl befolgt"
 prc.42.d:0 "[SIK.GetLeader] hat seinen Plan zur Invasion von [SIK.GetName] aufgegeben!"
 prc.42.a:0 "Zumindest kennen sie noch ihren Platz."
 prc.43.t:0 "[SOV.GetNameADJ] Verstärkungen"
 prc.43.d:0 "In Bezug auf [SIK.GetName]s Widerstandsfähigkeit gegenüber Unterwerfung hat [SOV.GetName] Verstärkung geschickt, um uns zu helfen."
 prc_sov_reinforcements:0 "Erhalte 8 Divisionen von [SOV.GetName]"
 prc.43.a:0 "Diese Kräfte werden für unsere Bemühungen von entscheidender Bedeutung sein!"
 prc.44.d:0 "In Bezug auf die Kriegstreiberei von [PRC.GetName] hat [SOV.GetName] Verstärkung geschickt, um uns zu helfen."
 prc.46.t:0 "Ermordung von Mao Zedong"
 prc.46.d:0 "Unser großer Vorsitzender Mao Zedong wurde heute bei einem hinterhältigen Attentat getötet. Sein handverlesener Nachfolger Lin Biao hat beschlossen, die Kulturrevolution ein für alle Mal zu beenden. Jeglicher Widerstand wurde rasch niedergeschlagen, und unser Land erholt sich zumindest teilweise von den Schäden, die diese Katastrophe angerichtet hat.\n\nObwohl einige Verschwörungstheorien besagen, dass Lin das Attentat inszeniert hat, um sein Amt anzutreten, gibt es keine Beweise dafür, dass dies der Wahrheit entspricht."
 prc.46.a:0 "Ein verheerender Verlust."
 prc.47.t:0 "Mao Zedong überlebt Attentat"
 prc.47.d:0 "Unser Großer Vorsitzender, Mao Zedong, hat heute einen hinterhältigen Mordanschlag überlebt. Der Attentäter wurde entdeckt, bevor er unserem geliebten Großen Vorsitzenden Schaden zufügen konnte. Er scheint seinem Herrn jedoch äußerst treu ergeben zu sein, da er während des Verhörs kein Wort sagte.\n\nWilde Gerüchte besagten, dass Lin Biao, der handverlesene Nachfolger von Mao, den Mordanschlag inszeniert habe. Obwohl es keine Beweise dafür gibt, beginnen einige Rote Garden, Lin Biao für diesen „Verrat“ zu kritisieren."
 prc.47.a:0 "Es lebe unser großer Vorsitzender Mao Zedong!"
 ## 15/11/2016 ##
 prc.48.t:0 "Unterstützung durch die Sowjetunion"
 prc.48.d:0 "Die Sowjetunion hat uns im Krieg gegen die Japaner unterstützt."
 prc.48.a:0 "Dies wird für unsere Kriegsanstrengungen von entscheidender Bedeutung sein."
 prc.49.t:0 "Unsere Partisanen erheben sich"
 prc.49.d:0 "Unsere Partisanen in der Mandschurei haben sich erhoben und helfen uns, die Kontrolle über das Gebiet zu gewinnen."
 prc.49.a:0 "Prächtig!"
 PRC_dongbei_partisans_tt:0 "Werden Sie Kontrolleur aller Staaten in der Mandschurei, die [CHI.GetName] gehören."
 prc.50.t:0 "Überläufer von der NRA"
 prc.50.d:0 "Einige Soldaten der NRA haben beschlossen, auf unsere Seite überzulaufen."
 prc.50.a:0 "Die schlechte Entscheidung von [CHI.GetLeader] führt zu seinem Scheitern."
 ## 17/11/2016 ##
 prc.51.t:0 "Inspirierender Sieg"
 prc.51.d:0 "Die Berichte von der Front brachten gute Nachrichten. Vereinzelte Zusammenstöße unserer Truppen führten zu unserem Sieg und die Moral unserer Armee stieg sprunghaft an!"
 prc.51.a:0 "Marschiert weiter, Genossen!"
 ## 19/12/2016 ##
 west_expedition_failed_msg:0 "Die Westexpedition der VR China ist gescheitert und die Operation wurde beendet."
 ## 14/1/2017 ##
 PRC_restart_CHI_war:0 "Die Veranstaltung &quot;Der Kommunismus schreitet voran&quot; hat"
 ## 29/1/2017 ##
 enter_key:0 "\N"
 ## 8/2/2017 ##
 PRC_no_wargoal_to_chi_when_ok_tt:0 "§RWerde mit dem Fokus §YUnser Ziel durchsetzen§! kein Kriegsziel gegen [CHI.GetName] erreichen.§!\n"
 PRC_random_amount_of_partisan_tt:0 "§Y2 – 6 Guerillaeinheiten werden unser Bestechungsgeld annehmen und sich unserer Armee anschließen§!\n"
 ## 9/2/2017 ##
 prc.66.t:0 "Chen Duxiu"
 prc.66.d:0 "Mit Trotzkis Rückkehr in [SOV.GetName] erhoben sich weltweit Trotzkisten und kritisierten den von Stalin geschaffenen „korrupten“ Kommunismus. Unter ihnen ist auch einer unserer ehemaligen Genossen, Chen Duxiu. Wenn wir ein gutes Verhältnis zu [SOV.GetName] bewahren wollen, sollten wir Chen an die Macht bringen und Mao stürzen."
 prc.66.a:0 "Der Trotzkismus ist die wahre korrupte Form des Kommunismus!"
 prc.66.b:0 "Lasst uns die Idee der permanenten Revolution vorantreiben!"
 ## 15/2/2017 ##
 prc.54.t:0 "Vorschlag von [From.GetName]"
 prc.54.d:0 "Wir haben vor Kurzem einen Vorschlag vom Vertreter von [From.GetLeader] erhalten. Darin heißt es, dass sie unsere Erlaubnis einholen möchten, um eine weitere Regierung im Nordwesten Chinas zu bilden und unsere Unterstützung im Kampf gegen die Japaner und [CHI.GetRulingParty] zu nutzen."
 prc.54.a:0 "Sagen Sie ihnen, sie sollen stattdessen mit [CHI.GetRulingParty] zusammenarbeiten."
 prc.54.b:0 "Mal sehen, wie gut sie das machen."
 prc.55.t:0 "Zhang Xueliang"
 prc.55.d:0 "Zhang hat sich geweigert, den Plan der Grand Northwest Union voranzutreiben. Nachdem wir nun die Dinge auf unserer Seite entschieden haben, sollten wir versuchen, Zhang davon zu überzeugen, dass alles gut vorbereitet ist."
 prc.55.a:0 "Werden Sie ihn einfach los, er wird unseren Fortschritt nur verlangsamen."
 prc.55.b:0 "Akzeptieren Sie seine Idee, sich nicht gegen die [CHI.GetRulingParty] zu stellen."
 prc.55.c:0 "Bieten Sie ihm einen Platz in unserer Partei an, wie er es wollte."
 prc.55.e:0 "Warten Sie, bis er seine Meinung ändert."
 prc.56.t:0 "Ermordung von Zhang Xueliang"
 prc.56.d:0 "Wir haben herausgefunden, dass Zhang Xueliang ermordet wurde. Er wurde mehrfach in Kopf und Brust geschossen. Einige vermuten, dass dies das Werk der Kommunisten sei. Der Täter wurde jedoch noch immer nicht gefunden."
 prc.56.a:0 "Jetzt wird seine Armee unter unsere Kontrolle geraten."
 prc.57.t:0 "Zhang akzeptiert"
 prc.57.d:0 "Nach reiflicher Überlegung hat sich Zhang Xueliang dazu entschlossen, der Grand Northwest Union beizutreten. Sobald alles bereit ist, wird er der Vorsitzende der Nationalen Verteidigungsregierung des Nordwestens werden."
 prc.57.a:0 "Wie erwartet."
 prc.58.t:0 "Zhang lehnte ab"
 prc.58.d:0 "Selbst wenn wir versuchen, ihn mit weiteren Beweisen zu überzeugen, weigert sich Zhang, seinen Plan voranzutreiben. Wir sind jetzt auf uns allein gestellt."
 prc.58.a:0 "Was auch immer."
 prc.59.t:0 "[From.GetName] hat unseren Vorschlag abgelehnt"
 prc.59.d:0 "[From.GetLeader] hat unseren Vorschlag abgelehnt und erklärt, dass wir mit der [CHI.GetRulingParty] zusammenarbeiten sollten, anstatt gegen sie zu kämpfen."
 prc.59.a:0 "Wir nehmen die Sache selbst in die Hand!"
 prc.59.b:0 "Befolgen Sie die Anweisungen."
 prc.60.t:0 "[From.GetName] hat unseren Vorschlag genehmigt"
 prc.60.d:0 "Unser Vorschlag für die Grand Northwest Union wurde von [From.GetName] genehmigt, wir sollten sofort daran arbeiten."
 prc.60.a:0 "Großartig!"
 prc.61.t:0 "[From.GetName] hat sich unserem Befehl widersetzt"
 prc.61.d:0 "Trotz unserer guten Absichten hat sich [From.GetLeader] geweigert, unserem Befehl Folge zu leisten und hat sich trotzdem entschieden, die Grand Northwest Union zu gründen."
 prc.61.a:0 "Сукин сын!"
 prc.62.t:0 "Mao hingerichtet"
 prc.62.d:0 "Nach einer nächtlichen Razzia im Hauptquartier und Haus von Mao und seinen treuen Anhängern wurden zahlreiche Kommunisten verhaftet und kurzerhand hingerichtet. Ihre Leichen wurden an einigen Passagen aufgehängt, um die Menschen an die Konsequenzen zu erinnern, die es hat, dem verdammten Kommunismus zu folgen."
 prc.62.a:0 "Ab mit dem Kopf dieser widerlichen Schlange!"
 prc.63.t:0 "Versteckte Kommunisten"
 prc.63.d:0 "Obwohl die nächtliche Razzia erfolgreich war, befinden sich immer noch einige Kommunisten in der Regierung. Bei einigen gibt es klare Hinweise darauf, dass sie Mao unterstützen, bei anderen hingegen ist die Haltung nicht eindeutig zu erkennen."
 prc.63.a:0 "Richtet sie alle hin!"
 prc.63.b:0 "Geben Sie sich mehr Mühe, sie zu identifizieren, bevor Sie Maßnahmen ergreifen."
 prc.64.t:0 "Kommunistische Guerillas"
 prc.64.d:0 "Einige Kommunisten haben kleine Guerillagruppen gebildet, um unsere Truppen und Stützpunkte zu belästigen. Wie sollen wir mit ihnen umgehen?"
 prc.64.a:0 "Schlagen Sie sie hart durch!"
 prc.64.b:0 "Verwenden Sie Bestechung, um Zwietracht unter ihnen zu säen."
 prc.65.t:0 "Geheimpolizei einrichten?"
 prc.65.d:0 "In unserer Regierung gibt es mittlerweile keine Kommunisten mehr. Allerdings gibt es unter der Zivilbevölkerung noch immer viele von ihnen. Manche meinen, man brauche eine Geheimpolizei, um kommunistische Aktivitäten wirksamer unterdrücken zu können."
 prc.65.a:0 "Wir müssen unser Volk vor der Roten Pest schützen!"
 prc.65.b:0 "Das ist nicht nötig."
 prc.67.t:0 "Nachricht von [From.GetName]"
 prc.67.d:0 "[From.GetName] hat Vertreter zu einem Treffen mit [Root.GetLeader] geschickt und verlangt, dass wir ihnen Suiyuan übergeben. Im Gegenzug bieten sie uns an, der [From.GetFaction] beizutreten und etwas Unterstützung in der Industrie zu leisten."
 prc.67.a:0 "Klingt vernünftig."
 prc.67.b:0 "Nicht einmal in ihren wildesten Träumen!"
 prc.68.t:0 "[From.GetName] Akzeptiert"
 prc.68.d:0 "[From.GetLeader] hat zugestimmt, Suiyuan an uns zu übergeben."
 prc.68.a:0 "Ein kluger Schachzug"
 prc.69.t:0 "[From.GetName] Abgelehnt" 
 prc.69.d:0 "[From.GetLeader] hat sich geweigert, uns Suiyuan zu übergeben."
 prc.69.a:0 "Vergeblicher Widerstand."
 prc.70.t:0 "Xu Lanzhou"
 prc.70.d:0 "Xu Lanzhou ist nach seiner Pensionierung Kampfkunstlehrer geworden. Er erklärt, dass er keine weitere Armee mehr führen wird, unseren Männern aber gerne einige Kampfkünste beibringen würde."
 prc.70.a:0 "Lass ihn in Ruhe."
 prc.70.b:0 "Stellen Sie ihn als unseren Kampfkunstlehrer ein."
 prc.71.t:0 "[From.GetName] sucht Allianz"
 prc.71.d:0 "Obwohl sie ihre Regierung im Nordwesten etabliert haben, scheinen ihre Ziele in gewisser Weise mit unseren übereinzustimmen. Wir könnten mit ihnen zusammenarbeiten und die Japaner zurück zum Meer treiben."
 prc.71.a:0 "Die Chinesen sollten sich gegen unsere gemeinsamen Feinde zusammenschließen."
 prc.71.b:0 "Sie werden uns mit Sicherheit in den Rücken fallen!"
 prc.72.t:0 "Allianz akzeptiert"
 prc.72.d:0 "[From.GetName] hat unseren Vorschlag für eine Allianz angenommen."
 prc.72.a:0 "Tod den Eindringlingen!"
 prc.73.t:0 "Allianz abgelehnt"
 prc.73.d:0 "[From.GetName] hat unseren Vorschlag abgelehnt."
 prc.73.a:0 "Verdammt!"
 prc.74.t:0 "[From.GetName] möchte militärisches Wissen austauschen"
 prc.74.d:0 "Da wir beide nicht lange überleben werden, wenn wir allein kämpfen, hat [From.GetLeader] beschlossen, unsere Streitkräfte zusammenarbeiten zu lassen. Auf diese Weise können wir die Vorzüge ihrer Armee kennenlernen und sie unsere."
 prc.74.a:0 "Akzeptabel"
 prc.74.b:0 "Sie müssen etwas Böses planen …"
 prc.75.t:0 "Vorschlag angenommen"
 prc.75.d:0 "Einige NRA-Beamte sind in unserem Kommandozentrum eingetroffen und haben begonnen, militärisches Wissen mit unseren Kommandanten auszutauschen."
 prc.75.a:0 "Unsere vereinte Macht wird unsere Feinde in die Knie zwingen!"
 prc.76.t:0 "Vorschlag abgelehnt"
 prc.76.d:0 "[From.GetName] hat unseren Vorschlag zum Austausch militärischen Wissens abgelehnt."
 prc.76.a:0 "Was denken sie überhaupt?"
 prc.77.t:0 "[From.GetName] sendet Entschuldigung"
 prc.77.d:0 "Obwohl sie sich unserem Befehl widersetzt haben, indem sie die [From.GetFaction] gegründet haben, bilden sie nun technisch gesehen eine Einheitsfront mit [CHI.GetName], und genau das wollen wir erreichen. Sie haben sich bei uns entschuldigt und möchten, dass wir ihr vorheriges „Fehlverhalten“ übersehen."
 prc.77.a:0 "Nun ja..."
 prc.77.b:0 "Ich habe noch nie so schamlose Menschen gesehen!"
 prc.78.t:0 "[From.GetName] nimmt unsere Entschuldigung an"
 prc.78.d:0 "Unsere Entschuldigung wurde von [From.GetName] angenommen."
 prc.78.a:0 "Hübsch."
 prc.79.t:0 "[From.GetName] lehnt unsere Entschuldigung ab"
 prc.79.d:0 "Unsere Entschuldigung wurde von [From.GetName] abgelehnt."
 prc.79.a:0 "Schade"
 prc.80.t:0 "Druck von [From.GetName]"
 prc.80.d:0 "[From.GetName] hat in letzter Zeit Druck auf [Root.GetLeader] ausgeübt. Einige Beamte begannen auch, [Root.GetLeader] zu fordern, sich zu unterwerfen, bevor [From.GetName]s Truppen in sein Haus eindringen und ihn töten."
 prc.80.b:0 "Senden Sie es, bevor es zu spät ist."
 prc.80.a:0 "Auf solche naiven Tricks werden wir nicht hereinfallen."
 prc.81.t:0 "[From.GetName] Gesendet"
 prc.81.d:0 "Da er unserem Druck nicht länger standhalten kann, hat [From.GetLeader] beschlossen, sich unserer Regierung zu unterwerfen."
 prc.81.a:0 "Eine weise Entscheidung."
 prc.82.t:0 "[From.GetName] verweigert die Übermittlung"
 prc.82.d:0 "Trotz unseres starken Drucks und der Überredungskünste bestochener Beamter bleibt [From.GetLeader] standhaft. Er sagte unserem Vertreter, dass er sich unserer tyrannischen Herrschaft niemals unterwerfen werde."
 prc.82.a:0 "Sie werden bald erkennen, welchen Fehler sie gemacht haben."
 prc.83.t:0 "[From.GetName] hat uns verraten"
 prc.83.d:0 "[From.GetName] hat unsere Marionettenregierung gestürzt und ist jetzt [PRC.GetName] treu!"
 prc.83.a:0 "Wie können sie es wagen!"
 prc.84.t:0 "[From.GetName] Fordern Sie uns auf, Land zurückzugeben"
 prc.84.d:0 "[From.GetName] gibt an, dass wir ihre rechtmäßigen Gebiete schon zu lange besetzen und dass es für sie an der Zeit ist, gegen diese Ungerechtigkeit vorzugehen."
 prc.84.a:0 "Wir wollen keinen Krieg mit ihnen beginnen."
 prc.84.b:0 "Ist das eine Art Witz?"
 prc.84.c:0 "Wir werden eine Verhandlungsüberweisung durchführen."
 prc.85.t:0 "[From.GetName] Gibt das Gebiet zurück"
 prc.85.d:0 "[From.GetName] hat beschlossen, unser Gebiet zurückzugeben."
 prc.85.a:0 "Gut für beide."
 prc.86.t:0 "[From.GetName] weigert sich, das Gebiet zurückzugeben"
 prc.86.d:0 "[From.GetName] hat beschlossen, unser rechtmäßiges Territorium zu behalten."
 prc.86.a:0 "Zeit, dies auf die harte Tour zu tun."
 ## 16/2/2017 ##
 prc.87.d:0 "Angesichts der ständig wachsenden Macht von [From.GetName] befürchtet unser Volk, dass unsere Nation schon bald untergehen könnte, wenn wir uns nicht auf eine Seite stellen. Erst gestern erreichte [Root.GetLeader] ein Ultimatum von [From.GetName], in dem es fordert, dass [Root.GetName] ihr Protektorat wird."
 prc.87.a:0 "Feiglinge leben ..."
 prc.87.b:0 "Wir werden einem Tyrannen niemals nachgeben!"
 prc.88.a:0 "Besetzen Sie das Gebiet."
 prc.89.t:0 "[From.GetName] Fordern Sie uns auf, die Konzession zurückzugeben"
 prc.92.t:0 "[From.GetName] versucht zu übernehmen"
 prc.92.d:0 "[From.GetName] hat heute Morgen Vertreter zu einem Treffen mit [Root.GetLeader] geschickt. Bei dem Treffen geht es hauptsächlich darum, [Root.GetLeader] zu bitten, seine Macht abzugeben und [From.GetName] die Macht übernehmen zu lassen. Nach reiflicher Überlegung von [Root.GetLeader] wurde eine Lösung gefunden..."
 prc.92.a:0 "[Root.GetName] wird sich dem Teufel nicht unterwerfen!"
 prc.92.b:0 "Gib die Macht auf."
 prc.93.t:0 "[From.GetName] Rebellen"
 prc.93.d:0 "[From.GetLeader] hat beschlossen, gegen uns in den Krieg zu ziehen, anstatt sich uns zu unterwerfen."
 prc.93.a:0 "Waffen können immer noch den gewünschten Erfolg erzielen."
 prc.95.t:0 "[From.GetName] sucht einen Pakt mit uns"
 prc.95.d:0 "[From.GetName] hat Vertreter geschickt, um unsere Unterschrift unter den neu ausgearbeiteten Pakt zu erbitten. Dieser Pakt dient zugleich als Freundschaftserklärung und Nichtangriffspakt."
 prc.95.a:0 "Unterschreiben Sie es"
 prc.95.b:0 "Das muss ein naiver Trick sein."
 prc.96.t:0 "Pakt unterzeichnet"
 prc.96.d:0 "[From.GetName] hat den Pakt unterzeichnet."
 prc.96.a:0 "Exzellent!"
 prc.97.t:0 "Pakt abgelehnt"
 prc.97.d:0 "[From.GetName] hat sich geweigert, den Pakt zu unterzeichnen."
 prc.97.a:0 "Was auch immer"
 prc.102.t:0 "WPPO-Vorschlag"
 prc.102.d:0 "[From.GetName] hat uns einen Vorschlag unterbreitet, in dem er die Gründung der WPPO (West Pacific Pact Organisation) für unerlässlich hält. Mit der Gründung der WPPO können wir uns gegenseitig unterstützen und alle Teufel abschrecken, die es auf unsere Gebiete abgesehen haben."
 prc.102.a:0 "Dies könnte unser Überleben sichern."
 prc.102.b:0 "Sore wa inbou desu."
 prc.103.t:0 "[From.GetFaction] Gegründet"
 prc.103.d:0 "[From.GetName] hat der Gründung der WPPO zugestimmt, wir stehen jetzt zusammen."
 prc.103.a:0 "Herrlich!"
 prc.104.t:0 "[From.GetName] Abgelehnt"
 prc.104.d:0 "[From.GetName] hat die Gründung des WPPO abgelehnt."
 prc.104.a:0 "Schade"
 prc.105.t:0 "[From.GetFaction] Unterstützter Putsch"
 prc.105.d:0 "Ein von [From.GetFaction] unterstützter Putsch hat gerade begonnen!"
 prc.105.a:0 "Verdammt!"
 prc.106.t:0 "[From.GetName]s Verrat"
 prc.106.d:0 "Trotz des von uns unterzeichneten Pakts zeigt [From.GetName] uns nun Feindseligkeit. Sie haben alle [Root.GetNameADJ]-Beamten ihrer Regierung hinrichten lassen und uns den Krieg erklärt!"
 prc.106.a:0 "Yaban Jin!"
 ## 19/2/2017 ##
 prc.108.t:0 "Zhang Xueliang retten?"
 prc.108.d:0 "Zhang wird nach dem Xi&#39;an-Vorfall von der [CHI.GetRulingParty] festgenommen. Ohne ihn kann der Plan für die Große Nordwestunion nicht umgesetzt werden."
 prc.108.a:0 "Rette ihn!"
 prc.108.b:0 "Wir können ohne ihn weitermachen."
 prc.109.t:0 "Frieden mit Japan?"
 prc.109.d:0 "Da Dingbei nun unter unserer Kontrolle ist, sind einige Generäle und Beamte mit dem Ergebnis zufrieden. Sie schlagen vor, dass wir mit Japan Frieden schließen könnten."
 prc.109.a:0 "Es dient dem Allgemeinwohl."
 prc.109.b:0 "Wir sollten auf eine geeignetere Situation warten."
 prc.109.c:0 "Was soll das für ein Unsinn!"
 PRC_wait_for_civil_war_tt:0 "Dieses Ereignis wird erneut ausgelöst, wenn das Ereignis zum japanischen Bürgerkrieg ausgelöst wird.\n"
 prc.110.t:0 "[From.GetName] sucht Frieden"
 prc.110.d:0 "Nachdem sie ihr Ziel erreicht haben, streben sie nun Frieden zwischen uns an."
 prc.110.a:0 "Unsere Kräfte werden anderswo gebraucht ..."
 prc.110.b:0 "Niemals!"
 prc.111.t:0 "Frieden mit [JAP.GetName]"
 prc.111.d:0 "[From.GetName] hat einem Frieden zwischen uns zugestimmt."
 prc.111.a:0 "Das beste Ergebnis"
 prc.112.t:0 "[From.GetName] Abgelehnter Frieden"
 prc.112.d:0 "[From.GetName] hat sich geweigert, Frieden zu schließen."
 prc.112.a:0 "Sie vermeiden lediglich das Unvermeidliche."
 prc.114.d:0 "Angesichts des anhaltenden Bürgerkriegs kann [JAP.GetName] seine Streitkräfte nicht länger an unserer Front konzentrieren. Das ist unsere Chance, Forderungen zu stellen!"
 ## 20/2/2017 ##
 prc.115.t:0 "Hungersnot in Henan"
 prc.115.d:0 "Der Krieg in Henan hat in der Region eine Hungersnot ausgelöst, da Ackerland zerstört wurde. Die lokale Regierung bittet nun um unsere Hilfe, um ihre Not zu lindern."
 prc.115.a:0 "Wir müssen ihnen helfen!"
 prc.115.b:0 "Dafür haben wir keine Zeit."
 KMT_commie_generals_join_tt:0 "§YLin Biao§!, §YZhu De§!, §YChen Yi§! und §YPeng Dehuai§! treten unserer Armee bei."
 prc.116.t:0 "Ehemalige Kommunisten schließen sich uns an"
 prc.116.d:0 "Aufgrund des Erfolgs unseres ländlichen Wiederaufbauprogramms haben sich einige ehemalige Kommunisten entschieden, sich uns anzuschließen."
 prc.116.a:0 "Ein kluger Schachzug."
 prc.117.t:0 "[XSM.GetName] schließt sich [CHI.GetName] gegen uns an"
 prc.117.d:0 "[CHI.GetLeader] hat [XSM.GetLeader] befohlen, eine Offensive an unserer nordwestlichen Flanke zu starten!"
 prc.117.a:0 "Sie werden zusammen mit [CHI.GetLeader] untergehen!"
 PRC_takeover_dongbei_tt:0 "[PRC.GetName] übernimmt Staaten in der Mandschurei, die [JAP.GetName] oder ihren Marionetten gehören.\n"
 ## 27/2/2017 ##
 prc.120.t:0 "Einladung von [From.GetLeader]"
 prc.120.d:0 "Mit der Gründung von [From.GetFaction] hat [From.GetLeader] eine Einladung an [Root.GetLeader] gesendet, in der Hoffnung, dass wir an ihrem Kurs teilnehmen können."
 prc.120.a:0 "Gute Idee."
 prc.120.t:0 "Wir brauchen sie nicht."
 prc.121.t:0 "[From.GetName] schließt sich uns an"
 prc.121.d:0 "[From.GetLeader] hat sich entschieden, an unserem Kurs teilzunehmen."
 prc.121.a:0 "Fantastisch!"
 prc.122.t:0 "[From.GetName] Abgelehnt"
 prc.122.d:0 "[From.GetLeader] hat sich geweigert, [Root.GetFaction] beizutreten, mit der Begründung, dass sie es alleine besser schaffen."
 prc.122.t:0 "Arroganter Abschaum!"
 prc.123.t:0 "Einladung an [SIK.GetLeader] senden?"
 prc.123.d:0 "Um Vorräte von [SOV.GetName] zu erhalten, ist der Zugang zur Sinkiang-Region wichtig. Wir könnten sie in unsere Fraktion einladen und ihr Vertrauen gewinnen."
 prc.123.a:0 "Senden Sie es."
 prc.123.b:0 "Es ist unnötig."
 ## 24/4/2017 ##
 prc.124.t:0 "[From.GetLeader] Drängt zum Handeln"
 prc.124.d:0 "[From.GetLeader] hat Nachrichten gesendet, dass sie gut auf die Gründung der Northwest National Defense Government vorbereitet sind und nun auf unsere Maßnahmen warten."
 prc.124.a:0 "Wir sind bereit."
 prc.124.b:0 "Zu früh..."
 ## 26/7/2017 ##
 prc.10.d_2:0 "Lin Biao, der auserwählte Erbe des Großen Vorsitzenden Mao, ist in eine ländliche Gegend unseres Landes geflohen. Die Partei und der Große Vorsitzende Mao gaben bekannt, dass Lin aus Angst vor einer Anklage wegen versuchten Attentats auf den Großen Vorsitzenden Mao geflohen sei und sich deshalb vor den Behörden verstecken wollte. Die Rote Garde kritisierte Lin und seine Familienmitglieder, die nicht an der Flucht beteiligt waren und anschließend von der Roten Garde zu Tode geprügelt wurden. Truppen wurden entsandt, um Lin zu suchen, doch da unser Land nun über den gesamten Planeten herrscht, wird es eine ganze Weile dauern, bis Lin gefunden werden kann."
 PRC_linbiao_will_die_tt:0 "Lin Biao wird bald eliminiert."
 prc.125.t:0 "Lin Biao"
 prc.125.d:0 "Wir vermuten, dass Lin Biao das jüngste Attentat auf unseren Großen Vorsitzenden [Root.GetLeader] geplant hat. Es heißt, er versuche nun, an einen unbekannten Ort zu fliehen, um einer möglichen Strafverfolgung zu entgehen.\n\nSollten wir die Initiative ergreifen und ihn eliminieren?"
 prc.125.a:0 "Einen „Unfall“ arrangieren …"
 prc.125.b:0 "Lass das Schicksal entscheiden ..."
 ## 27/8/2017 ##
 prc.126.t:0 "Gerüchte über ein Attentat"
 prc.126.d:0 "Es gibt Gerüchte, dass eine unbekannte Fraktion innerhalb der Partei ein Attentat auf Mao plant."
 prc.126.a:0 "Vielleicht könnten wir die Sicherheitsvorkehrungen lockern und sehen ..."
 prc.126.b:0 "Fahren Sie einfach wie gewohnt fort."
 ## 28/8/2017 ##
 prc.127.t:0 "[SIK.GetLeader]"
 prc.127.d:0 "Angesichts der aktuellen pro-sowjetischen Haltung von [SIK.GetLeader] könnten wir möglicherweise sowjetische Lieferungen aus Sinkiang erhalten, wenn es uns gelingt, ein gutes Verhältnis zu ihm aufrechtzuerhalten."
 prc.127.a:0 "Schicken Sie ein paar Leute dorthin."
 prc.127.b:0 "Kein großer Grund zur Sorge."
 prc.128.t:0 "Vertreter von [From.GetName]"
 prc.128.d:0 "[From.GetName] hat einige Vertreter hierher geschickt, um uns bei unseren inneren Angelegenheiten zu unterstützen. Sollen wir sie abweisen?"
 prc.128.a:0 "Sie können bleiben."
 prc.128.b:0 "Das müssen Spione sein!"
 prc.129.t:0 "Erfolg"
 prc.129.d:0 "[From.GetName] hat zugestimmt, dass unsere Vertreter bleiben dürfen."
 prc.129.a:0 "Davon sollten wir langfristig profitieren."
 prc.130.t:0 "Vertreter abgewiesen"
 prc.130.d:0 "[From.GetLeader] hat unsere Vertreter abgewiesen."
 prc.130.a:0 "Schade."
 ## 29/8/2017 ##
 prc.131.t:0 "[SOV.GetName] verliert"
 prc.131.d:0 "Aufgrund ihrer Macht pflegten wir eine enge Beziehung zu [SOV.GetName]. Ihr aktueller Krieg läuft jedoch nicht gut für sie. Wenn wir ihnen weiterhin so nahe bleiben, könnten wir als kriegerisch gelten und dabei vernichtet werden. Vielleicht sollten wir uns diesmal an [CHI.GetName] wenden."
 prc.131.a:0 "Versuchen Sie, [CHI.GetLeader] davon zu überzeugen, dass wir ihnen treu sind."
 prc.131.b:0 "Wir sollten [SOV.GetName] hintergehen und uns ein bisschen Kriegsbeute sichern!"
 prc.131.c:0 "Warten wir es ab..."
 prc.132.t:0 "[From.GetLeader] Geschworene Treue"
 prc.132.d:0 "Da [SOV.GetName] den Krieg verliert, hat [From.GetLeader] beschlossen, dass es für ihr eigenes Überleben das Beste ist, die Verbindung zu [SOV.GetName] abzubrechen und sich stattdessen an uns zu wenden."
 prc.132.a:0 "Hübsch"
 prc.132.b:0 "Lass sie verrotten."
 prc.133.t:0 "Beamte hingerichtet"
 prc.133.d:0 "Bei einem kürzlichen Versuch von [SIK.GetLeader], [CHI.GetLeader] von seiner Loyalität zu überzeugen, hat [SIK.GetLeader] Kommunisten, darunter auch unsere Vertreter in der Region, zusammengetrieben und hingerichtet."
 prc.133.a:0 "Tragisch"
 prc.134.t:0 "[SIK.GetLeader] Versucht, die Verbindung zu kappen"
 prc.134.d:0 "Angesichts dessen, dass wir unseren Krieg verlieren, hat [SIK.GetLeader] beschlossen, die Verbindung zu uns abzubrechen und versucht, [CHI.GetLeader] die Treue zu schwören."
 prc.134.a:0 "Fordern Sie ihn auf, diesen Verrat sofort zu beenden und unseren Krieg zu unterstützen!"
 prc.134.b:0 "Wir haben dringendere Angelegenheiten zu erledigen."
 prc.135.t:0 "[SOV.GetLeader] fordert unsere Hilfe"
 prc.135.d:0 "Als [SOV.GetName] unsere Versuche bemerkte, die Verbindung zu ihnen zu kappen, forderte er uns auf, sofort damit aufzuhören und ihnen zu Hilfe zu kommen."
 prc.135.a:0 "Sie werden in kürzester Zeit erledigt sein, wir können nicht unsere eigene Zerstörung herbeiführen!"
 prc.135.b:0 "Die [CHI.GetRulingParty] ist zu weit weg, um zu helfen …"
 prc.136.t:0 "[SIK.GetLeader] Weigert sich zu helfen"
 prc.136.d:0 "[SIK.GetLeader] baut weiterhin Beziehungen zu [CHI.GetRulingParty] auf und weigert sich, uns zu helfen."
 prc.136.b:0 "Dann werden wir ihre Hilfe mit Gewalt erlangen ..."
 prc.137.t:0 "[SIK.GetLeader] Sendet"
 prc.137.d:0 "[SIK.GetLeader] hat erkannt, dass wir gemeinsam stärker sind und hat sich uns angeschlossen."
 prc.137.a:0 "Für Mütterchen Russland!"
 prc.139.t:0 "[SIK.GetLeader] An [SOV.GetName] übermittelt"
 prc.139.d:0 "[SIK.GetLeader] hat beschlossen, sich [SOV.GetName] zu unterwerfen."
 prc.139.a:0 "Wir dürfen nicht zulassen, dass Ausländer auch nur einen Zentimeter chinesischen Bodens einnehmen!"
 prc.139.b:0 "Sie sind zu stark für uns ..."
 prc.140.t:0 "[SOV.GetName] hat uns den Krieg erklärt"
 prc.140.d:0 "[SOV.GetName] hat uns in Bezug auf die Probleme der Sinkiang-Region den Krieg erklärt."
 prc.140.a:0 "Wir werden bis zum letzten Mann kämpfen!"
 prc.141.t:0 "[From.GetLeader] Hat uns akzeptiert"
 prc.141.d:0 "[From.GetLeader] hat uns in seine Regierung aufgenommen, jetzt sind wir nicht mehr an [SOV.GetName] gebunden."
 prc.141.a:0 "Ja!"
 prc.142.t:0 "[From.GetRulingParty] hat uns abgelehnt"
 prc.142.d:0 "[From.GetLeader] hat unser Angebot abgelehnt."
 prc.142.a:0 "Wie konnten sie nur!?"
 prc.143.t:0 "[SIK.GetLeader] An [CHI.GetLeader] übermittelt"
 prc.143.d:0 "[SIK.GetLeader] hat sich [CHI.GetName] unterworfen, die Region Sinkiang steht nun unter der direkten Kontrolle von [CHI.GetName]."
 prc.143.a:0 "Verflucht!"
 prc.143.b:0 "Wir müssen handeln!"
 prc.138.t:0 "Gelegenheit"
 prc.138.d:0 "Wir haben die Nachricht erhalten, dass [CHI.GetLeader] beschlossen hat, [SIK.GetLeader] in Ruhe zu lassen. Dies könnte unsere Chance sein, die Region ohne chinesische Intervention zu erobern."
 prc.138.b:0 "Wir werden Sinkiang einnehmen!"
 prc.144.t:0 "[SIK.GetLeader] hat uns in den Rücken gefallen"
 prc.144.d:0 "[SIK.GetLeader] hat beschlossen, uns in dieser schlimmen Situation zu hintergehen!"
 prc.144.a:0 "Blödsinn!"
 ## 31/8/2017 ##
 prc.145.t:0 "Kontakt mit [YUN.GetLeader]?"
 prc.145.d:0 "Da [YUN.GetName] immer stärker in den aktuellen Krieg verwickelt wird, können wir auch gleich Kontakt mit [YUN.GetLeader] aufnehmen, um uns in der Region mehr Einfluss zu verschaffen."
 prc.145.a:0 "Schicken Sie einen Vertreter."
 prc.145.b:0 "Kein großer Grund zur Sorge."
 prc.146.t:0 "Vertreter von [PRC.GetLeader]"
 prc.146.d:0 "[From.GetLeader] hat Leute geschickt, um zu versuchen, Kontakt mit [Root.GetLeader] aufzunehmen."
 prc.146.a:0 "Mal sehen, was sie zu sagen haben."
 prc.146.b:0 "Wir dürfen nicht zulassen, dass der Kommunismus in [Root.GetName] Fuß fasst!"
 prc.147.t:0 "Erfolg"
 prc.147.d:0 "[YUN.GetLeader] hat sich bereit erklärt, mit unseren Vertretern zu sprechen."
 prc.147.a:0 "Gut"
 prc.148.t:0 "Abgeordnete festgenommen"
 prc.148.d:0 "Unsere Vertreter wurden von [YUN.GetLeader] festgenommen!"
 prc.148.a:0 "Verdammt!"
 prc.149.t:0 "An [PRC.GetName] senden?"
 prc.149.d:0 "[CHI.GetRulingParty] scheint in diesem Krieg am Ende zu sein, und die Kommunisten rücken immer näher. Wir müssen jetzt eine Entscheidung treffen: Zu den Kommunisten überlaufen oder weiter gegen sie kämpfen?"
 prc.149.a:0 "[PRC.GetName] scheint vielversprechender zu sein als [CHI.GetRulingParty]"
 prc.149.b:0 "Besser tot als rot!"
 prc.150.t:0 "[From.GetLeader] nimmt an unserem Kurs teil"
 prc.150.d:0 "Als [From.GetLeader] sah, wie inkompetent die [CHI.GetRulingParty] ist und wie mächtig das Volk ist, hat er seine Männer versammelt und ist auf unsere Seite übergelaufen!"
 prc.150.a:0 "Nieder mit der korrupten [CHI.GetRulingParty]!"
 prc.151.t:0 "[From.GetLeader] Übergelaufen zu den Kommunisten"
 prc.151.d:0 "Angesichts der aktuellen Kriegslage hat der verräterische [From.GetLeader] beschlossen, seine Partei und sein Land zu verraten und sich den verfluchten Kommunisten gegen uns anzuschließen, anstatt bis zum letzten Mann und mit der letzten Kugel zu kämpfen!"
 prc.151.a:0 "Verräterischer Hund!"
 ## 1/9/2017 ##
 prc.152.t:0 "Einrichtung von [Root.GetName]"
 prc.152.d_pk:0 "„Mitbürger, die Zentrale Volksregierung der Volksrepublik China ist heute gegründet!“, verkündete unser geliebter Führer [Root.GetLeader] auf dem Platz des Himmlischen Friedens während der Gründungszeremonie der [Root.GetName]. Tausende, wenn nicht Millionen, haben sich auf dem Platz versammelt und jubeln, als diese monumentale Zeremonie die Gründung des neuen China markiert."
 prc.152.d_nk:0 "„Mitbürger, heute ist die Zentrale Volksregierung der Volksrepublik China gegründet!“, verkündete unser geliebter Führer [Root.GetLeader] im Präsidentenpalast. [Root.GetLeader]s Rede wurde im ganzen Land live im Radio übertragen und die Menschen jubelten, als diese monumentale Rede die Gründung des neuen China markierte."
 prc.152.d_ya:0 "„Mitbürger, die Zentralregierung der Volksrepublik China ist heute gegründet!“, verkündete unser geliebter Führer [Root.GetLeader] in einer vorab aufgezeichneten Rede. [Root.GetLeader]s Rede wurde in einem seiner Hauptquartiere in Yan&#39;an aufgezeichnet, der Hauptstadt des neuen China. Die Rede stärkte die Moral der Soldaten und rührte die Bürger zu Freudentränen."
 prc.152.a:0 "Xin zhong guo cheng li le!"
 ## 28/10/2017 ##
 prc.154.t:0 "Ehemalige japanische Puppen"
 prc.154.d:0 "Einige der ehemaligen Marionetten Japans stehen nun unter unserer Kontrolle. Wir könnten diese Regionen an die [CHI.GetRulingParty] oder die [PRC.GetRulingParty] übergeben, um unsere Beziehungen zu verbessern. Dies würde ihnen jedoch einen erheblichen Vorteil gegenüber ihrem Rivalen verschaffen, falls ihr Bürgerkrieg erneut ausbricht."
 prc.154.a:0 "[PRC.GetLeader] soll unsere Unterstützung erhalten."
 prc.154.b:0 "[CHI.GetLeader] kann diese Regionen haben."
 prc.154.d:0 "Diese Regionen sind für [Root.GetNameDEF] von vitalem Interesse!"
 prc.155.t:0 "[From.GetName] übergibt besetzte Gebiete"
 prc.155.d:0 "[From.GetName] hat einige der Gebiete gehalten, die zuvor von unseren Feinden besetzt waren. Als Zeichen der Freundschaft und Unterstützung haben sie nun beschlossen, uns diese Regionen übernehmen zu lassen."
 prc.155.a:0 "Exzellent!"
 prc.156.t:0 "[From.GetName] übergibt besetzte Gebiete an unseren Feind"
 prc.156.d:0 "[From.GetName] hat einige der Gebiete behalten, die zuvor von unseren Feinden besetzt waren. Nun, so empörend es auch erscheinen mag, haben sie diese Regionen an unseren politischen Rivalen übergeben!"
 prc.156.a:0 "Wie können sie es wagen, sich in unsere inneren Angelegenheiten einzumischen!"
 prc.157.t:0 "[From.GetName] hält an besetzten Gebieten fest."
 prc.157.d:0 "Obwohl [From.GetNameDEF] uns bei der Vertreibung der Invasoren geholfen hat, haben sie nach der Niederlage unseres gemeinsamen Feindes Teile unseres Landes besetzt. Sie geben uns diese Gebiete nur widerwillig zurück und werden sie wahrscheinlich für immer behalten!"
 prc.157.a:0 "Wie können sie es wagen!"
 ## 8/1/2018 ##
 prc.158.t:0 "Der Zweite Chinesisch-Japanische Krieg"
 prc.158.d:0 "Der Zweite Japanisch-Chinesische Krieg ist ausgebrochen. [CHI.GetName] und [JAP.GetName] kämpfen erbittert um ihr Überleben und ihre Interessen. Doch während ihre Soldaten sterben und ihr Blut das Schlachtfeld bedecken, sitzen wir hier und tun nichts. Vielleicht ist es an der Zeit, unsere Kameraden zu sammeln und in diesem Konflikt auf unserer Seite zu stehen?"
 prc.158.a:0 "Chinesen werden niemals Sklaven sein!"
 prc.158.b:0 "Bringen Sie die korrupten Bürokraten in [CHI.GetRulingParty] zu Fall!"
 prc.158.c:0 "Sowohl die Imperialisten als auch die Bürokraten werden durch unsere Hand sterben!"
 prc.158.d:0 "Vielleicht sollten wir in unserem Hauptquartier einige Unterhaltungsmöglichkeiten installieren."
 ## 22/3/2018 ##
 prc.159.t:0 "Feindliche Guerilla-Aktivitäten in [PRC_temp_decision_target_state.GetName]"
 prc.159.d:0 "In [PRC_temp_decision_target_state.GetName] wurden feindliche Guerillaaktivitäten festgestellt. Wir sollten sofort auf die Situation reagieren."
 prc.159.a:0 "Bemerkt"
 prc.160.t:0 "Guerillazelle in [PRC_temp_sweep_decision_target_state.GetName] ausgelöscht"
 prc.160.d:0 "Soldaten von [From.GetName] haben eine Befriedungskampagne in [PRC_temp_sweep_decision_target_state.GetName] gestartet, um unsere Guerillazellen in der Gegend zu zerstören.\n\n[Root.GetCellStatusTT]"
 prc.160.a:0 "Wir werden uns neu formieren und zurückschlagen!"
 PRC_cell_still_active_tt:0 "Obwohl wir einige Verluste erlitten haben, ist unsere Zelle bei [PRC_temp_sweep_decision_target_state.GetName] immer noch betriebsbereit."
 PRC_cell_destroyed_tt:0 "Der Feind war gründlich, unsere Zelle bei [PRC_temp_sweep_decision_target_state.GetName] wurde vollständig zerstört."
 
