 panzer_leader_desc:0 "§LA natürlich mit Panzern und mechanisierten Kräften.§!"
 commando:0 "Kommando"
 commando_desc:0 "§LErfahren in amphibischen Operationen, Luftangriffen und kalten Wetterbedingungen – der Kommando ist ein Mann mit vielen Talenten.§!"
