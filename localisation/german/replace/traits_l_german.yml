 winter_specialist_desc:0 "§LPerhält ein intuitives Verständnis für die Schwierigkeiten des Kampfes unter kalten Bedingungen.§!"
 trait_engineer:0 "Ingenieur"
 trait_engineer_desc:0 "§LBewandert in der Kunst, Flüsse zu überqueren und Feldbefestigungen zu errichten.§!"
 fortress_buster:0 "Festungsbrecher"
 fortress_buster_desc:0 "§LDer Angriff auf eine Festung bereitet diesem Offizier keine Angst.§!"
