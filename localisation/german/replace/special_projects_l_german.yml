l_german:
 sp_land_tank:0 "Panzer"
 sp_land_tank_desc:0 "Ein Fahrzeug, das es uns ermöglicht, durch das Niemandsland zu fahren, während wir vor dem Beschuss geschützt sind, und das mit Kanonen für zusätzlichen Schaden ausgestattet werden kann"
 sp_land_tank_focus_type:0 "Design-Fokus"
 sp_land_tank_focus_type_desc:0 "Im Laufe der Entwicklung muss eine wichtige Entscheidung getroffen werden: Wir können schweren Rümpfen für Panzer den Vorzug geben, um sie widerstandsfähiger gegen feindliches Feuer zu machen, oder wir können in leichtere Rümpfe investieren und dabei die Verteidigung zugunsten der Produktionskosten opfern."
 sp_land_tank_type_light:0 "Fokus auf leichte Panzer"
 sp_land_tank_type_heavy:0 "Konzentrieren Sie sich auf schwere Panzer"
 sp_combat_gas:0 "Kampfgas"
 sp_combat_gas_desc:0 "Der Einsatz von Chemikalien auf dem Schlachtfeld verschafft uns einen Vorteil gegenüber unseren Feinden und ermöglicht es uns, leichter durch ihre Linien zu brechen."
 sp_machine_gun:0 "Maschinengewehr"
 sp_machine_gun_desc:0 "Eine Waffe mit hoher Feuerrate, die es uns ermöglicht, unsere Positionen zu verteidigen"

