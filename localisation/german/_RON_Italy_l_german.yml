 italy.183.t:0 "Britische Separatisten triumphieren"
 italy.183.d:0 "Die separatistische Revolution war für Großbritannien zu viel. Nun bleibt dem Land nichts anderes übrig, als den Separatisten die ersehnte Unabhängigkeit zu gewähren."
