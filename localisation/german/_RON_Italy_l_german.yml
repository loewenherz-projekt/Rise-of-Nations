 italy.134.d:0 "Die Separatisten haben sich zu einem gewaltsamen Aufstand erhoben. Wir haben bereits unsere Truppen entsandt, um diesen Aufstand niederzuschlagen. Doch erst die Zeit wird zeigen, was dabei herauskommt."
