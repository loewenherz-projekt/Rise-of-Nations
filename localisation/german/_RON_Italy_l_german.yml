 italy.135.a:0 "Wir müssen auf das Beste hoffen"
 italy.136.t:0 "Auflösung der Rebellion"
 italy.136.d:0 "Der separatistische Aufstand wurde mit minimalem Aufwand niedergeschlagen. Bei den Kämpfen gingen nur wenige Ausrüstungsgegenstände und Menschen verloren. Dennoch sollten wir Maßnahmen ergreifen, um dies in Zukunft zu verhindern."
 italy.136.a:0 "Militärisches Vorgehen"
 italy.136.b:0 "Gewähren Sie ihnen mehr Autonomie"
 italy.136.c:0 "Es besteht kein weiterer Handlungsbedarf"
 italy.137.t:0 "Auflösung der Rebellion"
 italy.137.d:0 "Der separatistische Aufstand wurde mit großem Aufwand niedergeschlagen. Bei den Kämpfen ging viel Material und Personal verloren. Wir sollten Maßnahmen ergreifen, um dies in Zukunft zu verhindern."
