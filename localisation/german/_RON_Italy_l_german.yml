ITA3_germany_claims_desc:0 ""
ITA3_austrian_claims:0 "Österreichische Ansprüche"
ITA3_austrian_claims_desc:0 ""
ITA3_claims_on_portugal:0 "Forderungen an Portugal"
ITA3_claims_on_portugal_desc:0 ""
