 italy.72.t:0 "Französischer Bürgerkrieg für den Kommunismus"
 italy.72.d:0 "Den Kommunisten ist es nicht gelungen, unsere Regierung vollständig zu stürzen. Jetzt führen sie Krieg gegen unser Land, um mit anderen Mitteln ein kommunistisches Regime zu installieren."
