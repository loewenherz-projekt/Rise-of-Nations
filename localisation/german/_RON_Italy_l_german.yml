 italy.156.d:0 "Wir haben den letzten Schritt zur Autonomie der separatistischen Regionen erfolgreich vollzogen und ihnen ihre Unabhängigkeit gewährt. Ihr Beitrag zu unserem Staat wird uns fehlen, doch diese Wendung der Ereignisse wird allen zugutekommen."
