 italy.167.d:0 "Italien hat gerade seine Ansprüche auf Dalmatien geltend gemacht. Es ist klar, dass sie es ernst meinen und die Provinz auf die eine oder andere Weise zurückfordern wollen. Es ist jedoch bedauerlich, dass ein Nachgeben derzeit die klügste Option sein könnte."
