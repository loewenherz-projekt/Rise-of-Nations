 italy.105.t:0 "[From.GetName] hat sich der Großen Kommunistischen Revolution angeschlossen"
 italy.105.d:0 "Nachdem [From.GetName] den Kommunismus angenommen hatte, zog er sich aus dem britischen Commonwealth zurück und schloss sich Italien in dessen Kampf zur Verbreitung des Kommunismus an."
 italy.105.a:0 "Wir werden sehen, was dabei herauskommt"
 italy.120.t:0 "Wahlen in Italien"
 italy.120.d:0 "Faschisten beschlossen, freie Wahlen zuzulassen"
 italy.120.a:0 "Wir werden sehen, was dabei herauskommt"
 italy.121.t:0 "Wahlen in Italien (NACHRICHTEN)"
 italy.121.d:0 "Faschisten beschlossen, freie Wahlen zuzulassen"
 italy.121.a:0 "Wir werden sehen, was dabei herauskommt"
 italy.122.t:0 "Aufstieg des Separatismus"
 italy.122.d:0 "Separatistische Bewegungen sind in unseren Ländern auf dem Vormarsch. Bislang stille Minderheiten fordern nun ihre Unabhängigkeit."
 italy.122.a:0 "Diese Bewegung muss zerschlagen werden"
 italy.125.t:0 "Von Italien unterstützter Separatismus"
 italy.125.d:0 "Von Italien unterstützte Separatistenbewegungen sind im Land auf dem Vormarsch. Wir müssen ihre Ausbreitung mit allen Mitteln verhindern."
 italy.125.a:0 "Diese verdammten Spaghettis!"
 italy.128.t:0 "Ende des Separatismus"
 italy.128.d:0 "Alle separatistischen Bewegungen in unserem Land sind so weit zurückgegangen, dass sie bedeutungslos geworden sind."
 italy.128.a:0 "Gott sei Dank"
 italy.130.t:0 "Separatistische Proteste"
 italy.130.d:0 "Die Separatisten sind auf die Straße gegangen und fordern die Unabhängigkeit ihres Landes. Diese Proteste sind bisher nicht gewalttätig geworden. Wir haben mehrere Möglichkeiten, damit umzugehen."
 italy.130.a:0 "Schicken Sie das Militär"
 italy.130.b:0 "Geben Sie ihnen mehr Autonomie"
 italy.130.c:0 "Ignoriere sie"
 italy.131.t:0 "Separatistische Unruhen"
 italy.131.d:0 "Im Namen der separatistischen Unabhängigkeit sind in unserem Land zahlreiche Unruhen ausgebrochen. Wir haben mehrere Möglichkeiten, damit umzugehen."
 italy.131.a:0 "Schicken Sie das Militär"
 italy.131.b:0 "Geben Sie ihnen mehr Autonomie"
 italy.131.c:0 "Ignoriere sie"
 italy.132.t:0 "Separatisten bitten um italienische Unterstützung"
 italy.132.d:0 "Separatisten in [From.GetName] haben uns um Unterstützung für ihre Bewegung gebeten."
 italy.132.a:0 "Ignoriere sie"
 italy.132.b:0 "Unterstützen Sie sie"
 italy.132.c:0 "Unterstützen Sie sie maßgeblich"
 italy.133.t:0 "Separatistische Rebellion"
 italy.133.d:0 "Die Separatisten haben sich zu einem gewaltsamen Aufstand erhoben. Wir haben bereits unsere Truppen entsandt, um diesen Aufstand niederzuschlagen. Doch erst die Zeit wird zeigen, was dabei herauskommt."
 italy.133.a:0 "Wir müssen auf das Beste hoffen"
