 italy.171.t:0 "Jugoslawien bestreitet Vorwürfe"
 italy.171.d:0 "Jugoslawien hat unsere Ansprüche auf sein Territorium töricht zurückgewiesen. Wir haben keine andere Wahl, als unser Land mit Gewalt zurückzuerobern."
 italy.171.a:0 "Sie werden dafür bezahlen"
