 italy.159.t:0 "Länder erlangen Unabhängigkeit"
 italy.159.d:0 "Die jüngste Staatskrise in der UdSSR konnte überraschend friedlich gelöst werden, indem man ihnen freiwillig die Unabhängigkeit gewährte. Die sowjetische Regierung gab schließlich den separatistischen Forderungen nach und gewährte den Regionen der Republik Serbien ihre Unabhängigkeit."
 italy.159.a:0 "Wünschen wir ihnen viel Glück"
 italy.160.t:0 "Der Zagreber Aufstand"
 italy.160.d:0 "Es scheint, als hätte unser Konflikt mit den Separatisten einen Höhepunkt erreicht, da sie sich erhoben haben, um für ihre Unabhängigkeit zu kämpfen. Wir haben keine Wahl mehr, wir müssen diesen Aufstand mit unseren Bajonetten niederschlagen."
