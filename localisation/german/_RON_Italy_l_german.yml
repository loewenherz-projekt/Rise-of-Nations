 italy.180.t:0 "Der Nilaufstand"
 italy.180.d:0 "Was als eine Reihe von Unruhen ägyptischer Separatisten entlang des Nils begann, entwickelte sich bald zu einem umfassenden Aufstand in ganz Afrika. Wir haben keine Wahl mehr. Wir müssen diesen Aufstand mit unseren Bajonetten niederschlagen."
 italy.180.a:0 "In den Krieg"
 italy.181.t:0 "Der Nilaufstand"
 italy.181.d:0 "Was als eine Reihe von Unruhen ägyptischer Separatisten entlang des Nils begann, entwickelte sich bald zu einem umfassenden Aufstand in ganz Afrika. Das mächtige Britische Empire muss nun darum kämpfen, in Afrika überhaupt Fuß zu fassen."
 italy.181.a:0 "Wir werden sehen, was dabei herauskommt"
