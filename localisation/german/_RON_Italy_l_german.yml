### Cold War

ITA3_relations_with_the_west:0 "Beziehungen zum Westen"
ITA3_relations_with_the_west_desc:0 "Nach vielen Gesprächen kamen wir alle zu der gleichen Einigung: Demokratie ist der einzige Weg."
ITA3_help_yugoslavia:0 "Helfen Sie Jugoslawien"
ITA3_help_yugoslavia_desc:0 "Wir sollten Jugoslawien dabei helfen, die Demokratie anzunehmen und die anderen politischen Parteien zu ihrem eigenen Wohl zu verdrängen."
ITA3_interest_in_the_european_coal_and_steel_community:0 "Interesse an der Europäischen Gemeinschaft für Kohle und Stahl"
ITA3_interest_in_the_european_coal_and_steel_community_desc:0 "Durch den Beitritt zur EGKS wird unser Handel einen Aufschwung erleben und unsere Wirtschaft wird davon profitieren."
ITA3_alcide_de_gasperi:0 "Alcide De Gasperi"
ITA3_alcide_de_gasperi_desc:0 "Die Parlamentswahlen im April 1949 waren stark von der anhaltenden Konfrontation des Kalten Krieges zwischen der Sowjetunion und den Vereinigten Staaten beeinflusst. Wir sollten unsere Position auf der weltpolitischen Bühne mit Bedacht wählen."
ITA3_form_a_centrist_coalition:0 "Bilden Sie eine zentristische Koalition"
ITA3_form_a_centrist_coalition_desc:0 "Mit der Unterstützung der Liberalen, Republikaner und Sozialdemokraten können wir eine zentristische Regierung bilden und das Machtvakuum in unserer politischen Landschaft füllen. Allerdings ist klar, dass dieses Bündnis nur von kurzer Dauer sein wird. Wir müssen uns auf den Fall vorbereiten, dass sie uns verlassen wollen."
ITA3_revive_mussolinis_ideas:0 "Mussolinis Ideen wiederbeleben"
ITA3_revive_mussolinis_ideas_desc:0 "Wiederbelebung der Ideen Mussolinis. Unser Land wird wie ein großer Phönix aus der Asche wiedergeboren."
ITA3_join_nato:0 "Treten Sie der NATO bei"
ITA3_join_nato_desc:0 "Durch den Beitritt zur NATO festigen wir unsere Position in der Welt. Mit großen Nationen als Verbündeten werden unsere Feinde zweimal überlegen, bevor sie gegen uns vorgehen."
ITA3_hold_talks_with_the_west:0 "Gespräche mit dem Westen führen"
ITA3_hold_talks_with_the_west_desc:0 "Jetzt, da wir eine Regierung haben, sollten wir unsere Beziehungen zum Westen, insbesondere zu Großbritannien und Amerika, aufnehmen."
ITA3_help_france_change:0 "Helfen Sie Frankreich, sich zu verändern"
ITA3_help_france_change_desc:0 "Wir sollten Frankreich dabei helfen, die Demokratie zu akzeptieren und die anderen politischen Parteien zu ihrem eigenen Wohl zu verdrängen."
ITA3_become_a_founding_member_of_ecsc:0 "Werden Sie Gründungsmitglied der EGKS"
ITA3_become_a_founding_member_of_ecsc_desc:0 "Wir werden Gründungsmitglied der EGKS. Eine glorreiche Position für unser Land."
ITA3_join_the_united_nations:0 "Treten Sie den Vereinten Nationen bei"
ITA3_join_the_united_nations_desc:0 "Die Vereinten Nationen sind eine großartige Organisation. Wir sollten ein Teil davon sein."
ITA3_help_albania:0 "Helfen Sie Albanien"
ITA3_help_albania_desc:0 "Wir sollten Albanien dabei helfen, die Demokratie zu akzeptieren und die anderen politischen Parteien zu ihrem eigenen Wohl zu verdrängen."
ITA3_help_spain_change:0 "Helfen Sie Spanien, sich zu verändern"
ITA3_help_spain_change_desc:0 "Wir sollten Spanien dabei helfen, die Demokratie zu akzeptieren und die anderen politischen Parteien zu ihrem eigenen Wohl zu verdrängen."
ITA3_offer_aid_to_romania:0 "Rumänien Hilfe anbieten"
ITA3_offer_aid_to_romania_desc:0 "Wir sollten Rumänien dabei helfen, die Demokratie zu akzeptieren und die anderen politischen Parteien zu ihrem eigenen Wohl zu verdrängen."
ITA3_alliance_with_uk:0 "Allianz mit Großbritannien"
ITA3_alliance_with_uk_desc:0 "Durch ein Bündnis mit Großbritannien werden wir zu einer großen Nation in Europa."
ITA3_form_piccoli_alleanza:0 "Form Piccoli Alleanza"
ITA3_form_piccoli_alleanza_desc:0 "Wenn sie zustimmen, werden Jugoslawien, Albanien, Rumänien und Italien eine Fraktion mit dem Namen „Piccoli Alleanza“ bilden."
ITA3_form_european_treaty:0 "Form des Europäischen Vertrags"
ITA3_form_european_treaty_desc:0 "Mit der Unterstützung Frankreichs, Spaniens und Großbritanniens werden wir eine Fraktion namens „Der Europäische Vertrag“ gründen. Gemeinsam werden wir stark sein."
ITA3_umberto_ii_of_italy:0 "Umberto II. von Italien"
ITA3_umberto_ii_of_italy_desc:0 "Umberto II. von Italien ist ein vielversprechender König, der unsere Nation in den Augen der Welt groß machen wird."
ITA3_install_the_monarchy:0 "Installieren Sie die Monarchie"
ITA3_install_the_monarchy_desc:0 "Durch die Errichtung der Monarchie in Italien werden wir an Macht gewinnen und schließlich Umberto II. zum König von Italien krönen."
ITA3_oust_the_opposing_parties:0 "Verdrängen Sie die gegnerischen Parteien"
ITA3_oust_the_opposing_parties_desc:0 "Die Monarchie ist der einzige Weg. Wir werden zu unseren Wurzeln zurückkehren und die übrigen politischen Parteien verdrängen. Der König wird gewinnen!"
ITA3_expand_our_rule:0 "Erweitern Sie unsere Regel"
ITA3_expand_our_rule_desc:0 "Nachdem wir nun endlich alle anderen politischen Parteien in unserem Land verboten haben, können wir nach eigenem Ermessen regieren."
ITA3_influence_france:0 "Einfluss Frankreich"
ITA3_influence_france_desc:0 ""
ITA3_influence_spain:0 "Einfluss Spanien"
ITA3_influence_spain_desc:0 ""
ITA3_influence_george_vi:0 "Einfluss Georgs VI."
ITA3_influence_george_vi_desc:0 ""
ITA3_claims_on_albania:0 "Ansprüche an Albanien"
ITA3_claims_on_albania_desc:0 "Albanien würde unter unserer Herrschaft weitaus wohlhabender sein. Wir werden seine Gebiete einfordern oder Krieg führen."
ITA3_coronation_of_umberto_ii_as_king:0 "Krönung Umbertos II. zum König"
ITA3_coronation_of_umberto_ii_as_king_desc:0 "Die Krönung Umbertos II. zum König wird auf der internationalen Bühne, insbesondere in Europa, für Schockwellen sorgen. Er wird unsere große Nation regieren und das Königreich Italien errichten."
ITA3_the_support_of_the_people:0 "Die Unterstützung des Volkes"
ITA3_the_support_of_the_people_desc:0 "Da wir nun die Unterstützung der Bevölkerung haben, werden wir nach starken Bündnissen und Freundschaften streben."
ITA3_help_restore_the_napoleonic_line:0 "Helfen Sie mit, die napoleonische Linie wiederherzustellen"
ITA3_help_restore_the_napoleonic_line_desc:0 "Wir werden Frankreich helfen, seine napoleonische Linie wiederherzustellen."
ITA3_the_house_of_bourbon:0 "Das Haus Bourbon"
ITA3_the_house_of_bourbon_desc:0 "Wir werden Spanien helfen, das Haus Bourbon wiederherzustellen."
ITA3_the_windsor_house:0 "Das Windsor House"
ITA3_the_windsor_house_desc:0 "Wir werden England dabei helfen, das Windsor House wiederherzustellen."
ITA3_offer_full_support_to_france:0 "Bieten Sie Frankreich volle Unterstützung an"
ITA3_offer_full_support_to_france_desc:0 "Frankreich hat unsere volle Unterstützung."
ITA3_offer_full_support_to_spain:0 "Bieten Sie Spanien volle Unterstützung an"
ITA3_offer_full_support_to_spain_desc:0 "Spanien hat unsere volle Unterstützung."
ITA3_offer_full_support_to_england:0 "Bieten Sie England volle Unterstützung an"
ITA3_offer_full_support_to_england_desc:0 "England hat unsere volle Unterstützung."
ITA3_the_francoitalian_alliance:0 "Die französisch-italienische Allianz"
ITA3_the_francoitalian_alliance_desc:0 "Da der französische König nun auf dem Thron sitzt, können wir nun ein Bündnis zwischen unseren Ländern bilden und so unsere Position in Europa stärken."
ITA3_the_land_of_corsica:0 "Das Land Korsika"
ITA3_the_land_of_corsica_desc:0 "Korsika war italienisch und sollte italienisch bleiben. Zu den Waffen!"
ITA3_the_spanishitalian_alliance:0 "Die spanisch-italienische Allianz"
ITA3_the_spanishitalian_alliance_desc:0 "Da der spanische König nun auf dem Thron sitzt, können wir nun ein Bündnis zwischen unseren Ländern bilden und so unsere Position in Europa stärken."
ITA3_the_englanditalian_alliance:0 "Die englisch-italienische Allianz"
ITA3_the_englanditalian_alliance_desc:0 "Da der englische König nun auf dem Thron sitzt, können wir nun ein Bündnis zwischen unseren Ländern bilden und so unsere Position in Europa stärken."
ITA3_expansion_ideas:0 "Erweiterungsideen"
ITA3_expansion_ideas_desc:0 "Wir werden unser altes Land aus den Händen unserer Feinde zurückerobern. Wir werden siegen!"
ITA3_north_of_yugoslavia:0 "Nordjugoslawien"
ITA3_north_of_yugoslavia_desc:0 ""
ITA3_southern_france:0 "Südfrankreich"
ITA3_southern_france_desc:0 ""
ITA3_mallorca_islands:0 "Mallorca-Inseln"
ITA3_mallorca_islands_desc:0 "Wir könnten unseren Einfluss ausweiten und auf den Inseln Mallorca einen Casus Belli schaffen."
ITA3_malta_or_war:0 "Malta oder Krieg"
ITA3_malta_or_war_desc:0 ""
ITA3_central_france:0 "Zentralfrankreich"
ITA3_central_france_desc:0 ""
ITA3_central_yugoslavia:0 "Zentraljugoslawien"
ITA3_central_yugoslavia_desc:0 ""
ITA3_northern_africa:0 "Nordafrika"
ITA3_northern_africa_desc:0 "Wir werden nach Nordafrika expandieren. Algerien und Tunesien werden eine wertvolle Ergänzung unseres Reiches sein."
ITA3_libya_ultimatum:0 "Libyen-Ultimatum"
ITA3_libya_ultimatum_desc:0 "Indem wir Libyen ein Ultimatum stellen, geben wir ihnen zwei Optionen: Kapitulation oder Krieg."
ITA3_ban_democracy:0 "Demokratie verbieten"
ITA3_ban_democracy_desc:0 "Wir werden den demokratischen Geist in diesem Land verbannen. Der Kommunismus ist der einzige Weg."
ITA3_boost_albanian_views:0 "Steigern Sie die albanischen Aufrufe"
ITA3_boost_albanian_views_desc:0 "Wenn man die Ansichten der Albaner zum Kommunismus stärkt, wird ihnen dies die Augen für diese Ideologie öffnen."
ITA3_american_relations:0 "Amerikanische Beziehungen"
ITA3_american_relations_desc:0 "Durch die Ausweitung unserer politischen Beziehungen zu den Vereinigten Staaten von Amerika werden wir eine mächtige Nation als Verbündeten gewinnen."
ITA3_regain_power:0 "Macht zurückgewinnen"
ITA3_regain_power_desc:0 "Wir werden die Macht mit verschiedenen Methoden zurückgewinnen, etwa durch die Entführung politischer Feinde, die Ermordung der Opposition und die Bestechung aller, die wir bestechen können, um die Macht zurückzugewinnen, die wir verdienen."
ITA3_help_greece:0 "Helfen Sie Griechenland"
ITA3_help_greece_desc:0 "Italien und Griechenland sind großartige Verbündete."
ITA3_help_germany:0 "Helfen Sie Deutschland"
ITA3_help_germany_desc:0 "Indem wir Deutschland helfen, festigen wir die demokratische Ideologie in Europa weiter."
ITA3_italian_communist_party:0 "Kommunistische Partei Italiens"
ITA3_italian_communist_party_desc:0 "Die Säuberung war ein Erfolg. Die Kommunistische Partei Italiens wird an die Macht kommen, und wir werden Fortschritte bei der Ausschaltung der anderen politischen Parteien in unserem Land machen."
ITA3_palmiro_togliatti:0 "Palmiro Togliatti"
ITA3_palmiro_togliatti_desc:0 "Palmiro Togliatti ist der Führer der Kommunistischen Partei Italiens. Wir sollten ihn nutzen, um die sowjetische Ideologie in unserem Land weiter voranzutreiben."
ITA3_expand_our_influence:0 "Erweitern Sie unseren Einfluss"
ITA3_expand_our_influence_desc:0 "Durch den Einsatz verschiedener Propagandamittel wird die kommunistische Ideologie an Boden gewinnen und sich unter allen verbreiten. Wir werden diese Mittel sehr gut nutzen."
ITA3_begin_the_purge:0 "Beginnen Sie mit der Säuberung"
ITA3_begin_the_purge_desc:0 "Jetzt, da wir die Macht und die Unterstützung des Volkes haben, werden wir mit der Säuberung beginnen. Alle anderen politischen Parteien werden entfernt und ihre Mitglieder getötet oder zu Zwangsarbeit gezwungen."
ITA3_relations_with_the_soviet_union:0 "Beziehungen zur Sowjetunion"
ITA3_relations_with_the_soviet_union_desc:0 "Wir werden unsere Beziehungen zur Sowjetunion verbessern, sodass wir einen starken Verbündeten an unserer Seite haben. Durch die Gründung dieses Bündnisses wird der Westen zweimal überlegen, bevor er etwas unternimmt."
ITA3_anti_west_propaganda_division:0 "Anti-West-Propagandaabteilung"
ITA3_anti_west_propaganda_division_desc:0 "Die AWPD wird den westlichen Einfluss bekämpfen und jeden in unserem Land verhaften, der schlecht über uns spricht."
ITA3_ask_the_soviet_union_for_help:0 "Bitten Sie die Sowjetunion um Hilfe"
ITA3_ask_the_soviet_union_for_help_desc:0 "Wir werden die Sowjets um Waffen bitten. Vielleicht sind sie bereit, uns ein paar zu überlassen?"
ITA3_propaganda_against_usa:0 "Propaganda gegen die USA"
ITA3_propaganda_against_usa_desc:0 "Die Propaganda gegen die USA wird wirksam sein und uns helfen, im Ausland Unterstützung zu gewinnen."
ITA3_propaganda_against_the_uk:0 "Propaganda gegen Großbritannien"
ITA3_propaganda_against_the_uk_desc:0 "Propaganda gegen Großbritannien wird sich als wirksam erweisen, wenn es darum geht, die Demokratie in der Welt zu verbreiten."
ITA3_help_france:0 "Helfen Sie Frankreich"
ITA3_help_france_desc:0 "Wenn wir Frankreich dabei helfen, den Kommunismus in seinem Land weiter zu etablieren, wird sich die Situation für uns noch weiter verbessern."
ITA3_pro_communism_division:0 "Pro-Kommunismus-Abteilung"
ITA3_pro_communism_division_desc:0 "Die PCD wird den Kommunismus in jedem noch so kleinen Winkel des Landes verbreiten und selbst den demokratischsten Menschen zu einem Gründungsmitglied der kommunistischen Ideale machen."
ITA3_help_spain:0 "Hilfe Spanien"
ITA3_help_spain_desc:0 "Wenn wir Spanien helfen, die Werte des Kommunismus zu erkennen, wird ihnen das sicherlich die Augen für unsere Ideologie öffnen."
ITA3_rally_the_people:0 "Versammeln Sie die Menschen"
ITA3_rally_the_people_desc:0 "Wenn wir die Bevölkerung dazu bewegen, unsere politischen Ansichten zu unterstützen, werden die anderen politischen Parteien massiv unterdrückt. Vielleicht führt das dazu, dass sie die Partei verlassen?"
ITA3_boost_yugoslavian_views:0 "Steigern Sie die Ansichten Jugoslawiens"
ITA3_boost_yugoslavian_views_desc:0 "Die Stärkung der jugoslawischen Ansichten zum Kommunismus wird in Zukunft ein wichtiger Verbündeter sein."
ITA3_install_the_communist_model:0 "Installieren Sie das kommunistische Modell"
ITA3_install_the_communist_model_desc:0 "Das kommunistische Modell wird in der Gesellschaft umgesetzt. Alle für alle und jeder für jeden."
ITA3_communism_in_northern_africa:0 "Kommunismus in Nordafrika"
ITA3_communism_in_northern_africa_desc:0 "In Nordafrika wird eine große Propagandakampagne beginnen, um den Kommunismus weit und breit zu verbreiten."
ITA3_egypt_relations:0 "Beziehungen zu Ägypten"
ITA3_egypt_relations_desc:0 "In die ägyptische Politik eingreifen."
ITA3_change_african_ideology_views:0 "Ändern Sie die Ansichten der afrikanischen Ideologie"
ITA3_change_african_ideology_views_desc:0 "Indem wir uns in die afrikanische Politik einmischen, gewinnen wir Unterstützung und Verbündete auf dem afrikanischen Kontinent. Daraus kann nur Gutes entstehen."
ITA3_intervene_in_the_middleeast:0 "Intervenieren im Nahen Osten"
ITA3_intervene_in_the_middleeast_desc:0 "Der Nahe Osten wird ein wichtiger Verbündeter und ein Tor zum Osten sein. Der Kommunismus wird sich durchsetzen."
ITA3_declare_allegiance_to_the_soviet_union:0 "Erklären Sie der Sowjetunion die Treue"
ITA3_declare_allegiance_to_the_soviet_union_desc:0 "Die Treueerklärung gegenüber der Sowjetunion wird das Vertrauen zwischen unseren Nationen stärken."
ITA3_the_new_power:0 "Die neue Macht"
ITA3_the_new_power_desc:0 "Auf dem europäischen Kontinent wird eine neue Macht entstehen. Wir werden andere Nationen fragen, ob sie Teil davon sein wollen."
ITA3_convince_romania_to_join:0 "Rumänien zum Beitritt bewegen"
ITA3_convince_romania_to_join_desc:0 "Fragen Sie Rumänien, ob es unserer Fraktion beitreten möchte."
ITA3_convince_hungary_to_join:0 "Ungarn zum Beitritt bewegen"
ITA3_convince_hungary_to_join_desc:0 "Fragen Sie Ungarn, ob es unserer Fraktion beitreten möchte."
ITA3_convince_bulgaria_to_join:0 "Bulgarien zum Beitritt bewegen"
ITA3_convince_bulgaria_to_join_desc:0 "Fragen Sie Bulgarien, ob es unserer Fraktion beitreten möchte."
ITA3_sway_greece:0 "Sway Griechenland"
ITA3_sway_greece_desc:0 "Beeinflussen Sie Griechenland und versuchen Sie, es davon zu überzeugen, dass der Kommunismus der einzige Weg in die Zukunft ist. Die anderen Ideologien sind veraltet und werden beim ersten Anzeichen von Schwierigkeiten zusammenbrechen."
ITA3_sway_turkey:0 "Sway Türkei"
ITA3_sway_turkey_desc:0 "Beeinflussen Sie die Türkei und versuchen Sie, sie davon zu überzeugen, dass der Kommunismus der einzige Weg in die Zukunft ist. Die anderen Ideologien sind veraltet und werden beim ersten Anzeichen von Schwierigkeiten zusammenbrechen."
ITA3_sway_egypt:0 "Sway Ägypten"
ITA3_sway_egypt_desc:0 "Beeinflussen Sie Ägypten und versuchen Sie, es davon zu überzeugen, dass der Kommunismus der einzige Weg in die Zukunft ist. Die anderen Ideologien sind veraltet und werden beim ersten Anzeichen von Schwierigkeiten zusammenbrechen."
ITA3_convince_yugoslavia:0 "Jugoslawien überzeugen"
ITA3_convince_yugoslavia_desc:0 "Fragen Sie Jugoslawien, ob es unserer Fraktion beitreten möchte."
ITA3_form_the_new_powers:0 "Bilden Sie die neuen Mächte"
ITA3_form_the_new_powers_desc:0 "Mit der Unterstützung der anderen Nationen wird unsere Fraktion einen wichtigen Schritt zur Veränderung der politischen Landschaft Europas und vielleicht sogar darüber hinaus leisten."
ITA3_sway_austria:0 "Sway Österreich"
ITA3_sway_austria_desc:0 "Beeinflussen Sie Österreich und versuchen Sie, es davon zu überzeugen, dass der Kommunismus der einzige Weg in die Zukunft ist. Die anderen Ideologien sind veraltet und werden beim ersten Anzeichen von Schwierigkeiten zusammenbrechen."
ITA3_sway_albania:0 "Sway Albanien"
ITA3_sway_albania_desc:0 "Beeinflussen Sie Albanien und versuchen Sie, das Land davon zu überzeugen, dass der Kommunismus der einzige Weg in die Zukunft ist. Die anderen Ideologien sind veraltet und werden beim ersten Anzeichen von Schwierigkeiten untergehen."
ITA3_mallorca:0 "Mallorca"
ITA3_mallorca_desc:0 ""
ITA3_search_for_a_fitting_candidate:0 "Suche nach einem passenden Kandidaten"
ITA3_search_for_a_fitting_candidate_desc:0 "Wir werden nach einem neuen Kandidaten suchen, der unser Land zum Ruhm führen kann. Zum jetzigen Zeitpunkt ist niemand für diese Rolle geeignet."
ITA3_gather_power:0 "Kraft sammeln"
ITA3_gather_power_desc:0 "Wir werden alle Macht aufbringen, die wir brauchen, und es schaffen, unsere Feinde aus der herrschenden Position zu verdrängen."
ITA3_fascist_propaganda:0 "Faschistische Propaganda"
ITA3_fascist_propaganda_desc:0 "Die faschistische Propaganda wird funktionieren und wir werden siegen. Die Menschen werden endlich wieder die Wahrheit erkennen."
ITA3_the_new_candidate:0 "Der neue Kandidat"
ITA3_the_new_candidate_desc:0 "Nach langer Suche haben wir endlich unseren besten Kandidaten gefunden. Wir werden ihn in wenigen Tagen der Welt vorstellen. Er wird uns den Ruhm zurückgeben, der uns zusteht."
ITA3_begin_operation_devastazione:0 "Beginn der Operation Devastazione"
ITA3_begin_operation_devastazione_desc:0 "Operation „Devastazione“. Welchen Weg sollten wir zuerst einschlagen? Wenn wir zeigen wollen, dass unsere Nation groß ist, müssen wir Taten statt Worte zeigen."
ITA3_west_european_claims:0 "Westeuropäische Ansprüche"
ITA3_west_european_claims_desc:0 "Die Expansion nach Westen wird schwierig und voller Überraschungen sein. Aber wir werden es schaffen."
ITA3_mediteranean_influence:0 "Mediterraner Einfluss"
ITA3_mediteranean_influence_desc:0 "Die Mittelmeerinseln gehören nur uns."
ITA3_malta:0 "Malta"
ITA3_malta_desc:0 ""
ITA3_east_european_claims:0 "Osteuropäische Ansprüche"
ITA3_east_european_claims_desc:0 "Nicht so hart wie im Westen, aber wir sollten weiterhin auf der Hut sein."
ITA3_central_europe_claims:0 "Mitteleuropa-Ansprüche"
ITA3_central_europe_claims_desc:0 "Mitteleuropa sieht schwach genug aus. Vielleicht sollten wir die Veränderung nutzen?"
ITA3_southern_claims:0 "Südliche Ansprüche"
ITA3_southern_claims_desc:0 "Der afrikanische Kontinent scheint reif genug für die Eroberung zu sein. Vielleicht sollten wir die Gelegenheit nutzen?"
ITA3_belgium_and_netherlands:0 "Belgien und Niederlande"
ITA3_belgium_and_netherlands_desc:0 ""
ITA3_switzerland_claims:0 "Schweizer Schadensfälle"
ITA3_switzerland_claims_desc:0 ""
