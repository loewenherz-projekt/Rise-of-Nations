 italy.140.t:0 "Unterdrückung erfolgreich"
 italy.140.d:0 "Unser Versuch, separatistische Bewegungen zu unterdrücken, war erfolgreich. Die Unruhen sind unter das Niveau vor der Krise gesunken."
 italy.140.a:0 "Tolle Neuigkeiten"
 italy.141.t:0 "Unterdrückung teilweise erfolgreich"
 italy.141.d:0 "Unser Versuch, separatistische Bewegungen zu unterdrücken, war teilweise erfolgreich. Die Unruhen sind auf das Niveau vor der Krise zurückgegangen."
 italy.141.a:0 "Gute Nachrichten"
 italy.142.t:0 "Unterdrückung fehlgeschlagen"
 italy.142.d:0 "Unser Versuch, separatistische Bewegungen zu unterdrücken, ist gescheitert. Die Unruhen haben nicht im Geringsten abgenommen."
 italy.142.a:0 "Das ist bedauerlich"
 italy.143.t:0 "Unterdrückung ging nach hinten los"
 italy.143.d:0 "Unser Versuch, separatistische Bewegungen zu unterdrücken, ist nach hinten losgegangen. Die Unruhen sind größer als zuvor."
 italy.143.a:0 "Das sind schreckliche Neuigkeiten"
 italy.144.t:0 "Fahrlässigkeit des Separatismus"
 italy.144.d:0 "Aufgrund unserer Nachlässigkeit ist die separatistische Bewegung nicht im Geringsten zurückgegangen"
 italy.144.a:0 "Schade"
 italy.145.t:0 "Die Nachlässigkeit des Separatismus ging nach hinten los"
 italy.145.d:0 "Aufgrund unserer Nachlässigkeit hat der Separatismus nicht nur abgenommen, sondern sogar zugenommen."
 italy.145.a:0 "Schade"
 italy.150.t:0 "Länder erlangen Unabhängigkeit"
 italy.150.d:0 "Wir haben den letzten Schritt zur Autonomie der separatistischen Regionen erfolgreich vollzogen und ihnen ihre Unabhängigkeit gewährt. Ihr Beitrag zu unserem Staat wird uns fehlen, doch diese Wendung der Ereignisse wird allen zugutekommen."
 italy.150.a:0 "Wünschen wir ihnen viel Glück"
