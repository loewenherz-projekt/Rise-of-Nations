 italy.164.t:0 "Jugoslawiens Moment der Schwäche"
 italy.164.d:0 "Endlich ist der Moment gekommen, in dem Jugoslawien am schwächsten ist. Jetzt wäre ein günstiger Zeitpunkt, unseren Anspruch auf Dalmatien geltend zu machen."
