 italy.79.a:0 "Die Kommunisten müssen gestoppt werden"
 italy.80.t:0 "Antikommunistische Koalition"
 italy.80.d:0 "Der Kommunismus ist sowohl für uns als auch für alle übrigen nichtkommunistischen Länder zu einer ernsten Bedrohung geworden. Die Bildung einer antikommunistischen Koalition mit einigen anderen Ländern könnte für unser Überleben entscheidend sein."
 italy.80.a:0 "Ja, wir müssen unsere Kräfte bündeln, um zu überleben"
 italy.80.b:0 "Wir können die Kommunisten alleine bewältigen"
 italy.81.t:0 "Angebot, der Antikommunistischen Koalition beizutreten"
 italy.81.d:0 "Als Reaktion auf die rasche Ausbreitung des Kommunismus in Europa bildeten einige andere Länder eine Koalition, um dieser Ideologie entgegenzuwirken. Wir erhielten nun ein Angebot, diesem Bündnis beizutreten."
 italy.81.a:0 "Ja, der Kommunismus muss gestoppt werden"
 italy.81.b:0 "Der Kommunismus stellt für uns keine Bedrohung dar"
 italy.82.t:0 "Geburt der Antikommunistischen Koalition"
 italy.82.d:0 "Als Reaktion auf die Ausbreitung des Kommunismus im Mittelmeerraum schlossen sich mehrere Länder zusammen und bildeten ein Bündnis, um die weitere Verbreitung dieser Ideologien zu verhindern."
 italy.82.a:0 "Wir werden sehen, was dabei herauskommt"
 italy.83.t:0 "[From.GetName] tritt der antikommunistischen Koalition bei"
 italy.83.d:0 "[From.GetName] hat seine Haltung zum Kommunismus geändert und ist der Koalition beigetreten, die seine Ausbreitung verhindern soll."
 italy.83.a:0 "Wir werden sehen, was dabei herauskommt"
 italy.90.t:0 "Mittelmeerunion ausgerufen&quot; italy.90.d:0 &quot;Italien hat die Gründung der Mittelmeerunion ausgerufen. Sie behaupten, der nächste Schritt zur Schaffung einer kommunistischen Utopie sei die Vereinigung des Mittelmeers. Allerdings muss man an ihren Absichten zweifeln."
 italy.90.a:0 "Sie haben recht"
 italy.90.b:0 "Sie werden unsere Souveränität nicht beanspruchen"
 italy.91.t:0 "[From.GetName] akzeptiert mediterrane Vereinigung"
 italy.91.d:0 "[From.GetName] hat unseren Vorschlag zur Gründung einer größeren sozialistischen Union angenommen. Unserem Volk wird es von nun an gewiss gut gehen."
 italy.91.a:0 "Es lebe die Revolution"
 italy.92.t:0 "Antideutscher Koalitionsvorschlag"
 italy.92.d:0 "Angesichts der jüngsten Aggression Deutschlands hat Italien die Bildung einer antideutschen Koalition vorgeschlagen. Sollte ein Mitglied der Koalition im Krieg mit den Deutschen landen, werden alle anderen einberufen."
 italy.92.a:0 "Deutschland muss gestoppt werden"
 italy.92.b:0 "Deutschland stellt für uns keine Bedrohung dar"
 italy.93.t:0 "[From.GetName] ist dem antideutschen Pakt beigetreten"
 italy.93.d:0 "[From.GetName] hat die Bedrohung durch Deutschland verstanden und ist der Meinung, dass diese gestoppt werden muss."
 italy.93.a:0 "Deutschland wird gestoppt"
 italy.94.t:0 "[From.GetName] hat den antideutschen Pakt abgelehnt"
 italy.94.d:0 "[From.GetName] weigerte sich, der antideutschen Koalition beizutreten. Diese Idioten sind eindeutig zu schwach, um sich gegen Deutschland zu behaupten, oder vielleicht einfach inkompetent."
 italy.94.a:0 "Wir brauchen sie nicht"
 italy.95.t:0 "[From.GetName] schloss sich einer antideutschen Koalition an"
 italy.95.d:0 "[From.GetName] hat erkannt, dass Deutschland eine zu große Bedrohung darstellt, um sie zu ignorieren, und hat zusammen mit mehreren anderen Ländern ein Bündnis gebildet, um die weitere Expansion des Landes zu verhindern."
 italy.95.a:0 "Wir werden sehen, was dabei herauskommt"
 italy.96.t:0 "Mobilisierung der Antideutschen Koalition"
 italy.96.d:0 "Wir befinden uns jetzt im Krieg mit Deutschland. Gemäß dem Antideutschen Pakt haben wir die Möglichkeit, alle anderen Paktmitglieder einzuberufen, müssen dies aber nicht, wenn wir nicht möchten."
 italy.96.a:0 "Mobilisieren Sie den Pakt"
 italy.96.b:0 "Wir brauchen den Pakt nicht"
 italy.97.t:0 "Antideutscher Pakt mobilisiert"
 italy.97.d:0 "Ein Mitglied der antideutschen Koalition befindet sich im Krieg mit Deutschland. Gemäß dem Antideutschen Pakt, dem wir angehören, sollten wir uns diesem Krieg anschließen. Der Kampf gegen Deutschland dürfte zwar schwierig sein, doch eine Weigerung, dem Pakt Folge zu leisten, würde unseren Ruf ernsthaft schädigen."
 italy.97.a:0 "Schließe dich dem Krieg an"
 italy.97.b:0 "Wir dürfen nicht"
 italy.98.t:0 "[From.GetName] hat sich unserem Krieg angeschlossen"
 italy.98.d:0 "[From.GetName] hat den antideutschen Pakt eingehalten und sich unserem Krieg angeschlossen. Wir stehen jetzt zusammen."
 italy.98.a:0 "Deutschland wird bald zerschlagen"
 italy.99.t:0 "[From.GetName] hat sich geweigert, an unserem Krieg teilzunehmen"
 italy.99.d:0 "Die feige Nation [From.GetName] hat sich geweigert, den antideutschen Pakt einzuhalten. Wir werden Deutschland ohne sie bekämpfen müssen."
 italy.99.a:0 "Wir werden es trotzdem zurückgeben"
 italy.100.t:0 "Die antideutsche Koalition im Krieg"
 italy.100.d:0 "Endlich hat die Spannung zwischen Deutschland und seinen Feinden ihren Höhepunkt erreicht, als zwischen ihnen schließlich Krieg ausbrach. "
 italy.100.a:0 "Wir werden sehen, was dabei herauskommt"
 italy.101.t:0 "Schließen Sie sich Italien und der Großen Revolution an"
 italy.101.d:0 "Nachdem wir nun den Weg des Kommunismus eingeschlagen haben, ist es an der Zeit, den Commonwealth zu verlassen und uns Italien anzuschließen."
 italy.101.a:0 "Ja, wir müssen die globale Revolution unterstützen"
 italy.101.b:0 "Nein, wir haben Wichtigeres zu befürchten"
