 italy.212.b:0 "Nein, unsere Industrien können dem Druck nicht standhalten"
 italy.204.t:0 "Italien will Handelsbeziehungen ausbauen"
 italy.204.d:0 "Italien hat uns kürzlich ein Angebot zur Ausweitung unserer Handelsbeziehungen unterbreitet. Dies würde zwar große militärische und wissenschaftliche Vorteile mit sich bringen, würde aber auch den Druck auf unsere zivile Industrie erhöhen und möglicherweise dazu führen, dass wir von ihr abhängig werden."
 italy.204.a:0 "Es wird sich lohnen"
 italy.204.b:0 "Nein, wir können den Druck nicht ertragen"
