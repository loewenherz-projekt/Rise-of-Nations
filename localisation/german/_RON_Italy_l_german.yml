 italy.184.a:0 "In den Krieg"
 italy.185.t:0 "Der Sewastopol-Aufstand"
 italy.185.d:0 "Es scheint, als hätte der Konflikt zwischen der Sowjetunion und den Separatisten einen Höhepunkt erreicht, da diese sich erhoben haben, um für ihre Unabhängigkeit zu kämpfen."
 italy.185.a:0 "Dunkle Zeiten für die Sowjets"
 italy.186.t:0 "Sowjetische Separatisten triumphieren"
 italy.186.d:0 "Die separatistische Revolution war für unsere Union zu viel. Wir haben keine Wahl, wir müssen die verräterischen Nationen freilassen."
 italy.186.a:0 "Ein schrecklicher Schlag für den Kommunismus"
 italy.187.t:0 "Sowjetische Separatisten triumphieren"
 italy.187.d:0 "Die separatistische Revolution war für unsere Union zu viel. Wir haben keine Wahl, wir müssen die verräterischen Nationen freilassen."
 italy.187.a:0 "Ein schrecklicher Schlag für den Kommunismus"
 italy.188.t:0 "Zagreber Aufstand"
 italy.188.d:0 "Es scheint, dass die verräterischen Kroaten endlich genug Unterstützung mobilisiert haben, um sich in einer Revolution gegen uns zu erheben."
 italy.188.a:0 "Die Südslawen werden vereint bleiben"
 italy.190.t:0 "Selbstbestimmung in Afrika"
 italy.190.d:0 "Wir sind endlich zur Vernunft gekommen und haben das Privileg der Selbstbestimmung auf unsere afrikanischen Brüder ausgeweitet."
 italy.190.a:0 "Für die Freiheit"
 italy.191.t:0 "Italien gibt seine Kolonien frei"
 italy.191.d:0 "Italien hat sich entschlossen, zu beweisen, dass es die Selbstbestimmung der Völker weltweit fördert. Zum Entsetzen aller verkündete der italienische Premierminister, der italienische Staat werde dieses Privileg ausnahmslos auf alle ausdehnen, auch auf seine Kolonien. Experten loben zwar Italiens gute Absichten, sind aber besorgt über die Fähigkeit des neuen Landes, sich selbst zu regieren, und darüber, ob dies andere Kolonien anderer Imperien zu einem ähnlichen Schicksal inspirieren wird."
 italy.191.a:0 "Wir werden sehen, was dabei herauskommt"
 italy.192.t:0 "Allianzangebot aus Italien"
 italy.192.d:0 "Unsere ehemaligen Invasoren, die Italiener, haben uns den bizarren Vorschlag gemacht, sich mit uns zu verbünden. Unser Boden ist noch immer mit dem Blut unserer gefallenen Brüder befleckt, die durch ihre gescheiterte Invasion gefallen sind, aber ein Bündnis mit ihnen würde unsere Unabhängigkeit von anderen gierigen Mächten der Welt garantieren und dazu beitragen, die Kolonialmächte zu untergraben."
 italy.192.a:0 "Es ist Zeit, unsere Beziehung neu zu beginnen"
 italy.192.b:0 "Italien ist und bleibt immer unser Feind"
 italy.193.t:0 "Äthiopien akzeptiert Bündnisvorschlag"
 italy.193.d:0 "Die Äthiopier haben unseren Bündnisvorschlag angenommen. Endlich können wir unsere Dämonen hinter uns lassen und unsere Beziehungen neu beginnen."
 italy.193.a:0 "Es lebe Äthiopien"
 italy.194.t:0 "Äthiopien lehnt Bündnisvorschlag ab"
 italy.194.d:0 "Leider haben uns die Äthiopier unsere Taten in der Vergangenheit nicht verziehen und weigern sich, unsere Sache zu unterstützen."
 italy.194.a:0 "Schade"
 italy.195.t:0 "Italienisches Bündnis mit Äthiopien"
 italy.195.d:0 "Italien hat die Welt erneut mit seiner angekündigten Allianz mit Äthiopien schockiert. Nach der Geschichte der Feindseligkeiten zwischen den beiden Nationen hatten nur wenige an eine solche Möglichkeit geglaubt, und doch geschah es."
 italy.195.a:0 "Was für eine schockierende Wendung der Ereignisse"
 italy.202.t:0 "Weitere Handelsbeziehungen mit [From.GetName]"
 italy.202.d:0 "Neue Umstände haben es uns ermöglicht, unsere Handelsbeziehungen mit [From.GetName] noch weiter zu verschärfen. Dies wird den Druck auf unseren zivilen Sektor erhöhen, wird aber auch große Vorteile für Forschung und Militär mit sich bringen."
 italy.202.a:0 "Lasst uns die Beziehungen vertiefen"
 italy.202.b:0 "Nein, unsere Industrien können dem Druck nicht standhalten"
