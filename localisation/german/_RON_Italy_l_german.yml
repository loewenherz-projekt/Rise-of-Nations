 italy.213.d:0 "Italien hat uns kürzlich ein Angebot zur Ausweitung unserer Handelsbeziehungen unterbreitet. Dies würde zwar große militärische und wissenschaftliche Vorteile mit sich bringen, würde aber auch den Druck auf unsere zivile Industrie erhöhen und möglicherweise dazu führen, dass wir von ihr abhängig werden."
 italy.213.a:0 "Es wird sich lohnen"
 italy.213.b:0 "Nein, wir können den Druck nicht ertragen"
 italy.206.t:0 "Unsere Wirtschaft floriert"
 italy.206.d:0 "Wie vorhergesagt, hat unser jüngstes Handelsabkommen mit Italien beiden Ländern größeren Wohlstand beschert. Wir müssen jedoch darauf achten, dass unsere Wirtschaft nicht von der ihren abhängig wird."
 italy.206.a:0 "Es ist das Beste"
 italy.207.t:0 "Unsere Wirtschaft ist abhängig"
 italy.207.d:0 "Unser letztes Abkommen mit Italien war ein Fehler. Unser Land ist nun wirtschaftlich von Italien abhängig, was bedeutet, dass wir in ihren Einflussbereich geraten sind. Diese missliche Lage wird schwer zu lösen sein."
 italy.207.a:0 "Oh nein"
 italy.208.t:0 "Akzeptiertes Handelsabkommen"
 italy.208.d:0 "[From.GetName] hat unseren Handelsvorschlag angenommen. Es ist ein großartiger Tag, da beide Nationen von diesem Abkommen profitieren werden."
 italy.208.a:0 "Unsere Freundschaft wächst"
 italy.209.t:0 "[From.GetName] wird wirtschaftlich abhängig"
 italy.209.d:0 "Nach unserem jüngsten Handelsabkommen mit [From.GetName] sind sie wirtschaftlich von uns abhängig geworden. Dennoch wird dieses Abkommen sicherlich sowohl uns als auch ihnen Vorteile bringen."
 italy.209.a:0 "Es ist das Beste"
 italy.210.t:0 "[From.GetName] ist abhängig von Italien"
 italy.210.d:0 "Aufgrund der törichten Entscheidungen von [From.GetName] ist die Wirtschaft ihres Landes von den Italienern abhängig geworden."
 italy.210.a:0 "Es wurden Fehler gemacht"
 italy.220.t:0 "Handelsbeziehungsvorschlag erstellen"
 italy.220.d:0 "Italien hat uns gerade ein Angebot zur Schaffung angemessener Handelsbeziehungen zwischen unseren beiden Ländern unterbreitet. Obwohl dies unsere Wirtschaft belasten wird, wird ein solches Abkommen mit Sicherheit der Entwicklung und dem Militär unseres Landes zugute kommen."
 italy.220.a:0 "Es wäre zu unserem Vorteil"
 italy.220.b:0 "Wir haben kein Interesse an Beziehungen mit ihnen"
 italy.221.t:0 "[From.GetName] akzeptiert Handelsbeziehungen"
 italy.221.d:0 "[From.GetName] hat unseren Handelsvorschlag klugerweise angenommen. Unsere Nationen werden von dieser Vereinbarung mit Sicherheit stark profitieren."
 italy.221.a:0 "Was für eine kluge Wahl"
 italy.222.t:0 "[From.GetName] Handelsangebot abgelehnt"
 italy.222.d:0 "[From.GetName] hat unser Handelsangebot dummerweise abgelehnt. Diese Entscheidung wird ihnen sicherlich mehr schaden als uns."
 italy.222.a:0 "Ihr Verlust"
 italy.224.t:0 "Italienische antikommunistische Unterstützung"
 italy.224.d:0 "Die Italiener, die den Kommunismus als gemeinsamen Feind betrachten, haben angeboten, unsere Wirtschaft zu unterstützen, um den Kommunismus zu bekämpfen. Die Annahme dieser Unterstützung wird unsere Wirtschaft zwangsläufig noch abhängiger von ihrer machen, aber um die Marxisten aufzuhalten, könnte es sich lohnen."
 italy.224.a:0 "Jede Hilfe wird geschätzt"
 italy.224.b:0 "Wir brauchen keine italienische Hilfe im Kampf gegen den Kommunismus"
 italy.226.t:0 "[From.GetName] nimmt Hilfsangebot an"
 italy.226.d:0 "[From.GetName] hat unser Hilfsangebot klugerweise angenommen. Damit ist ein Land weniger gefährdet, das der roten Bedrohung zum Opfer fällt."
 italy.226.a:0 "Die Marxisten werden gestoppt"
 italy.228.t:0 "[From.GetName] lehnt Unterstützungsangebot ab"
 italy.228.d:0 "[From.GetName] hat unser Unterstützungsangebot dummerweise abgelehnt. Sie scheinen wirklich zu glauben, dass sie die Marxisten allein bewältigen können."
 italy.228.a:0 "Was für Narren"
 italy.229.t:0 "Italien unterstützt [From.GetName] gegen den Kommunismus"
 italy.229.d:0 "Italien hat kürzlich offiziell seine Unterstützung für [From.GetName] im Kampf gegen den Marxismus erklärt. Das Land plant, [From.GetName] vor allem beim Wiederaufbau zu unterstützen, obwohl es Gerüchte gibt, dass es auch militärische Hilfe geschickt hat."
 italy.229.a:0 "Was für eine Wendung der Ereignisse"
 italy.240.t:0 "Vorschlag für eine Mittelmeerunion"
 italy.240.d:0 "Italien hat der Welt verkündet, dass es eine Mittelmeerunion gründen möchte. Als einer der engsten Handelspartner Italiens hat das Land die Möglichkeit, die Mitgliedschaft in dieser Union anzunehmen oder abzulehnen. Es deutete jedoch an, dass eine Ablehnung unsere Beziehungen zu Italien beeinträchtigen würde."
 italy.240.a:0 "Natürlich akzeptieren wir"
 italy.240.b:0 "Wir werden unsere Unabhängigkeit bewahren"
 italy.250.t:0 "Robustere Schiffe"
 italy.250.d:0 "Unsere jüngsten Experimente haben dazu geführt, dass wir deutlich robustere Schiffe entwickeln konnten. Diese Forschung wird unserer Marine sicherlich einen großen Nutzen bringen."
 italy.250.a:0 "Die italienische Marine wird unzerstörbar sein"
 italy.251.t:0 "Schnellere Schiffe"
 italy.251.d:0 "Unsere jüngsten Experimente haben dazu geführt, dass wir deutlich schnellere Schiffe entwickeln konnten. Diese Forschung wird unserer Marine sicherlich einen großen Nutzen bringen."
 italy.251.a:0 "Die italienische Marine wird unbesiegbar sein"
 italy.252.t:0 "Tödlichere Schiffe"
 italy.252.d:0 "Unsere jüngsten Experimente haben dazu geführt, dass wir deutlich tödlichere Waffen für unsere Schiffe entwickeln konnten. Diese Forschung wird unserer Marine sicherlich von großem Nutzen sein."
 italy.252.a:0 "Die italienische Marine wird unschlagbar sein"
 italy.253.t:0 "Stärkere Schiffe"
 italy.253.d:0 "Unsere jüngsten Experimente haben dazu geführt, dass wir insgesamt stärkere Schiffe entwickeln konnten. Diese Forschung wird unserer Marine mit Sicherheit einen enormen Nutzen bringen."
 italy.253.a:0 "Die italienische Marine wird unbesiegbar sein"
 italy.300.t:0 "Tutorial zu imperialen Ambitionen"
 italy.300.d:0 "Die imperialen Ambitionen werden mit der Eroberung immer größerer imperialer Gebiete zunehmen. Wichtige Staaten für die Ausweitung ihrer Autorität sind Dalmatien, Athen, Istanbul, Madrid und Aquitanien. Alle Städte sind notwendig, um das Remon-Imperium wiederherzustellen."
 italy.300.a:0 "Zum Ruhm"
 italy.301.t:0 "Tutorial zur Mittelmeerrevolution"
 italy.301.d:0 "Jedes Land, das fällt, wird sowohl die Mittelmeerrevolution als auch den Dominoeffekt verstärken. Die Mittelmeerrevolution macht Ihr Land insgesamt mächtiger und einflussreicher, während die Dominotheorie den Kommunismus in anderen Mittelmeerländern fördert oder sie, falls sie bereits kommunistisch sind, untergräbt. Wenn zu viele Länder kommunistisch werden, kann sich eine antikommunistische Koalition bilden, um die Bewegung einzudämmen und zu zerstören."
 italy.301.a:0 "Für die Revolution"
 italy.302.t:0 "Tutorial zur Wirtschaftsherrschaft"
 italy.302.d:0 "Handelsereignisse mit anderen Ländern können beide Länder treffen, kosten aber Fabriken für beide, daher ist Vorsicht geboten. Je mehr Handel Sie mit einem Land treiben, desto wahrscheinlicher ist es, dass es von Ihnen abhängig wird und zu Ihrem Herrschaftsgebiet wird. Für die Bildung der Mittelmeerkonföderation sind vier Stufen der Handelsmacht, Wirtschaftsmacht, starke Wirtschaftsmacht, mächtige Wirtschaftsmacht und große Wirtschaftsmacht erforderlich."
 italy.302.a:0 "Für die Freiheit"
 italy.303.t:0 "Der sowjetische Garantiepakt"
 italy.303.d:0 "Wir mussten einen gegenseitigen Beistandsvertrag unterzeichnen, um die Sozialisten in Italien ruhig zu halten. Da wir uns aber keine Sorgen mehr um die Popularität der Sozialisten machen müssen, müssen wir diesen Vertrag aufkündigen, um weiter voranzukommen."
 italy.303.a:0 "Dieser Pakt war von Anfang an ein Fehler …"
 
 
NOVUS_IMPERIUM_ROMANUM:0 "Novus Imperium Romanum"
ITA_greece_war_goal:0 "Erobern Sie Griechenland"
ITA_greece_war_goal_desc:0 "Die Griechen besaßen einst eine reiche, glanzvolle Kultur, die einen großen Beitrag zum alten Rom leistete. Die gewaltsame Wiedereingliederung Byzanzes wird dafür sorgen, dass die Welt uns und unser Ziel ernst nimmt."
ITA_hungary_friend:0 "Befreunde dich mit Ungarn"
ITA_hungary_friend_desc:0 "Ungarn versucht außerdem, sein verlorenes Reich wiederherzustellen. Mit unserer Hilfe wird es den Faschismus auf dem Balkan fördern und uns in diesen Ländern einen wichtigen strategischen Verbündeten verschaffen."
ITA_yugoslavia_war_goal:0 "Invasion Jugoslawiens"
ITA_yugoslavia_war_goal_desc:0 "Italien wurde in Versailles betrogen. Für unseren Kriegsbeitrag bekamen wir so gut wie nichts. Wir werden uns nehmen, was uns rechtmäßig zusteht, nach dem Recht von Versailles und nach dem Recht Roms."
ITA_turkey_war_goal:0 "Invasion der Türkei"
ITA_turkey_war_goal_desc:0 "Byzanz beherrschte einst Griechenland und die anatolische Halbinsel, bevor sie an die Osmanen fielen. Die Osmanen hätten Europa im Namen ihres falschen Gottes beinahe zerstört. Wir werden die rechtmäßigen römischen Länder zurückerobern und die osmanische Bedrohung für immer verhindern."
ITA_turkey_friend:0 "Befreunde dich mit der Türkei"
ITA_turkey_friend_desc:0 "Obwohl die Türken rechtmäßig römisches Land besitzen, gibt es andere Angelegenheiten, die in erster Linie unsere Aufmerksamkeit erfordern. Wenn wir uns vorerst mit der Türkei verbünden, gewinnen wir einen wichtigen strategischen Verbündeten im Mittelmeerraum."
ITA_dominate_balkans:0 "Beherrsche den Balkan"
ITA_dominate_balkans_desc:0 "Wir üben bereits jetzt einen enormen Einfluss und eine enorme Kontrolle über den Balkan aus. Wir müssen unsere Kontrolle nur noch offiziell machen."
ITA_spain_war_goal:0 "Invasion in Spanien"
ITA_spain_war_goal_desc:0 "Spanien verfügt über ein wertvolles römisches Erbe und verdankt uns einen Großteil seiner Kultur und Sprache. Mit diesem Recht werden wir Spanien zurückfordern."
ITA_portugal_war_goal:0 "Invasion Portugals"
ITA_portugal_war_goal_desc:0 "Ähnlich wie Spanien verdanken auch die Portugiesen den Roma alles, was sie haben. Sie müssen in die Gemeinschaft integriert werden."
ITA_war_against_germany:0 "Krieg gegen Deutschland"
ITA_war_against_germany_desc:0 "Die größte Bedrohung für den Erfolg unseres Reiches ist das Deutsche Reich. Diese Barbaren haben sich kaum über ihre germanischen Vorfahren hinaus entwickelt; Odin wird sie jetzt nicht mehr retten können."
ITA_econ_reform:0 "Wirtschaftsreformen"
ITA_econ_reform_desc:0 "Unsere Wirtschaft ist ineffizient und damit die Roma Erfolg haben können, brauchen wir ein stabiles und zuverlässiges Wirtschaftssystem."
ITA_expand_IRI:0 "Erweitern Sie das IRI"
ITA_expand_IRI_desc:0 "Das Institut für industriellen Wiederaufbau muss erweitert werden, um unserer Regierung eine stärkere Kontrolle über die Produktion und Industrie der Unternehmen zu geben."
ITA_stabilization_focus:0 "Stabilisierung der Wirtschaft"
ITA_stabilization_focus_desc:0 "Um uns von der Weltwirtschaftskrise zu erholen, müssen wir in unsere Unternehmen investieren, um uns jetzt zu helfen, auch wenn dies unsere zukünftige Entwicklung verlangsamt."
ITA_nationalization_focus:0 "Verstaatlichung der Wirtschaft"
ITA_nationalization_focus_desc:0 "Nur wenn wir unsere Wirtschaft dem Vertrauen unserer Regierung überlassen, können wir uns auf die Mobilisierung vorbereiten."
ITA_militarization_focus:0 "Militarisierung der Wirtschaft"
ITA_militarization_focus_desc:0 "Indem wir unsere Wirtschaft auf das Militär und Kriegsgüter ausrichten, können wir das römische Erbe verteidigen und bewahren."
ITA_modernization_focus:0 "Modernisierung der Wirtschaft"
ITA_modernization_focus_desc:0 "Wir sind in unserem Wirtschaftssystem im Rückstand. Wenn wir mit anderen Mächten konkurrieren wollen, müssen wir unsere Wirtschaft auf den neuesten Stand bringen."
ITA_all_roads_rome:0 "Viele Wege führen nach Rom"
ITA_all_roads_rome_desc:0 "Die Infrastruktur ist für den Erfolg eines jeden Imperiums von entscheidender Bedeutung. Früher führten alle Straßen nach Rom, und bald wird dies wieder der Fall sein."
ITA_decrease_bureaucracy:0 "Bürokratie abbauen"
ITA_decrease_bureaucracy_desc:0 "Weniger Bürokratie würde das Wachstum von Unternehmen und der Wirtschaft insgesamt ermöglichen und fördern; unsere Regierung würde etwas Kontrolle verlieren, aber letztendlich würde Italien stärker sein."
ITA_encourage_corporatism:0 "Fördern Sie den Korporatismus"
ITA_encourage_corporatism_desc:0 "Indem wir die Kontrolle von Organisationen durch große Interessengruppen fördern, können wir unsere Wirtschaft stärken."
ITA_dismantle_cartels:0 "Zerschlagung der italienischen Monopole"
ITA_dismantle_cartels_desc:0 "Es gibt verschiedene Monopole, die im Wesentlichen unsere Wirtschaft und damit unseren Staat leiten. Das ist inakzeptabel. Um Fortschritt zu ermöglichen, müssen diese Monopole abgebaut werden."
ITA_laissez_faire:0 "Laissez-faire-Prinzip übernehmen"
ITA_laissez_faire_desc:0 "Laissez-faire könnte unserer Wirtschaft enorm helfen, allerdings auf Kosten einer geringeren Kontrolle über die Produktion. Der Nutzen könnte die Kosten wert sein, oder vielleicht gibt es einen anderen Weg …"
ITA_syndicalism:0 "Syndikalismus übernehmen"
ITA_syndicalism_desc:0 "Roma ist nur so gut wie seine Bürger. Wir brauchen die Unterstützung der Bevölkerung, um zu gedeihen und zu florieren. Unternehmen müssen zum Wohle der Bevölkerung leiden."
ITA_army_modernization:0 "Modernisierung der Armee"
ITA_army_modernization_desc:0 "Eine veraltete Armee würde vernichtend besiegt werden, egal wie überlegen unsere Schiffe oder Flugzeuge auch sein mögen. Starke Armeen gewinnen Kriege, unsere Armee muss stärker sein."
ITA_new_weapons:0 "Waffen des neuen Zeitalters"
ITA_new_weapons_desc:0 "Da neue Waffen ins Spiel gekommen sind, ist Italien technologisch im Rückstand, wir müssen uns stärker auf die Waffenentwicklung konzentrieren."
ITA_army_mechanization:0 "Armeemechanisierung"
ITA_army_mechanization_desc:0 "Schnelle Armeen sind die Zukunft. Wenn unsere Soldaten schnell und effektiv sind, werden Kriege gewonnen."
ITA_blitzkriek:0 "Blitzkrieg adoptieren"
ITA_blitzkriek_desc:0 "Die Deutschen haben eine brillante Doktrin namens Blitzkrieg entwickelt. Wenn wir lernen, diese Taktik anzuwenden, könnten wir zu einer unaufhaltsamen Macht werden."
ITA_pan_mediterranean_army:0 "Panmediterrane Armee"
ITA_pan_mediterranean_army_desc:0 "Obwohl das Mittelmeer ein Meer ist, hat es viele Ufer. Am Mittelmeer treffen die unterschiedlichsten Geländearten aufeinander. Wenn wir diese Gebiete zurückerobern wollen, muss unsere Armee anpassungsfähig und schnell sein."
ITA_from_sea_to_land:0 "Vom Meer ans Land"
ITA_from_sea_to_land_desc:0 "Invasionen von See aus sind unvermeidlich, unsere Armeen müssen in der Lage sein, vom Meer aus das Land anzugreifen."
ITA_mountain_warfare:0 "Bergkrieg"
ITA_mountain_warfare_desc:0 "Große Teile des alten Roms waren gebirgig. Diese Regionen sind schwer zu durchqueren. Unsere Soldaten müssen gut und richtig ausgebildet sein, um mit einem solchen Gelände zurechtzukommen."
ITA_desert_warfare:0 "Wüstenkrieg"
ITA_desert_warfare_desc:0 "Kämpfe in Wüstengebieten können zermürbend sein. Wenn wir in Äthiopien etwas gelernt haben, dann, dass die Wüste gnadenlos ist und wir vorbereitet sein müssen."
ITA_from_sky_to_land:0 "Vom Himmel ans Land"
ITA_from_sky_to_land_desc:0 "Durch Angriffe aus der Luft könnten wir strategische Positionen schneller und effizienter einnehmen und in Kombination mit überlegenen Land- und Seestreitkräften wären wir möglicherweise nicht mehr aufzuhalten."
ITA_return_of_arditi:0 "Rückkehr der Arditi"
ITA_return_of_arditi_desc:0 "Im Ersten Weltkrieg waren die Arditi unser größter Stolz in der Schlacht. Sie hielten den Kopf hoch und brachten Italien Ehre und Sieg. Ihre Wiedereinsetzung würde das Volk vereinen und uns eine überlegene Schlagkraft verleihen."
ITA_jungle_warfare:0 "Dschungelkrieg"
ITA_jungle_warfare_desc:0 "Der Dschungelkrieg mag weit entfernt erscheinen, doch unsere Truppen müssen für jedes Terrain gerüstet sein, wenn sie siegreich hervorgehen wollen. Zwischen den Dschungeln und Wüsten Afrikas liegt viel Arbeit vor uns."
ITA_chemical_weapons:0 "Chemische Waffen"
ITA_chemical_weapons_desc:0 "Die Zukunft liegt in der chemischen Kriegsführung. Der Einsatz tödlicher Chemikalien in unseren Waffen würde unsere Artillerie exponentiell tödlicher machen und unseren Streitkräften mehr Furcht einflößen und ihre Effektivität steigern."
ITA_new_high_command:0 "Neues Oberkommando"
ITA_new_high_command_desc:0 "Unser derzeitiges Oberkommando ist veraltet und korrupt. Um effektiv kämpfen und im Kampf siegen zu können, brauchen wir moderne und loyale Kommandeure."
ITA_new_officer_stuff:0 "Neuer Offiziersstab"
ITA_new_officer_stuff_desc:0 "Unser derzeitiges Offizierskorps ist korrupt und unerfahren. Um mit den anderen Weltmächten konkurrieren zu können, müssen wir die Korruption in unseren Reihen ausmerzen."
ITA_officer_stuff_trained_GER:0 "Deutsch ausgebildeter Offiziersstab"
ITA_officer_stuff_trained_GER_desc:0 "Unsere Offiziere sind zwar engagiert, aber unerfahren. Wenn sie von den Deutschen unterrichtet würden, würden sie die Methoden des Blitzkriegs und der mobilen Kriegsführung erlernen und diese Erkenntnisse effektiv anwenden."
ITA_officer_stuff_trained_FRA:0 "Französisch ausgebildeter Offiziersstab"
ITA_officer_stuff_trained_FRA_desc:0 "Unsere Offiziere sind zwar engagiert, aber unerfahren. Wenn sie von den Franzosen unterrichtet würden, würden sie von der renommierten und berühmten französischen Militärakademie lernen. Sie könnten uns mehr über die Doktrin des großen Schlachtplans und ihre Anwendung beibringen."
ITA_officer_stuff_trained_SOV:0 "Sowjetisch ausgebildeter Offiziersstab"
ITA_officer_stuff_trained_SOV_desc:0 "Unsere Offiziere müssen von Kommunisten ausgebildet werden, wenn sie die Botschaft der Revolution in die Herzen unserer Soldaten tragen sollen. Als Kommunisten müssen wir von denen aus der Heimat der Revolution lernen."
ITA_the_black_pact:0 "Der Schwarze Pakt"
ITA_the_black_pact_desc:0 "Mit der französischen Kapitulation hat England seinen wichtigsten Verbündeten verloren. Die Engländer sind verzweifelt und suchen Schutz vor den expandierenden Deutschen. Wenn wir sie unter unsere Fittiche nehmen und sie uns im Kampf gegen die Nazis unterstützen können, könnten sie sich als nützlich erweisen ..."
ITA_dominate_iberia:0 "Dominiere die Iberische Halbinsel"
ITA_dominate_iberia_desc:0 "Unsere Präsenz auf der Iberischen Halbinsel ist bereits enorm, es ist an der Zeit, Neu-Karthago wieder offiziell in Rom zu integrieren."
ITA_new_roman_empire:0 "Novus Imperium Romanum"
ITA_new_roman_empire_desc:0 "Allen Widrigkeiten zum Trotz haben wir das Römische Reich wieder vereint, unser Schicksal erfüllt, unser Erbe gesichert, Roma ist auferstanden."
ITA_dalmatia_for_protection:0 "Dalmatien zum Schutz"
ITA_dalmatia_for_protection_desc:0 "Ein Krieg mit Jugoslawien ist derzeit nicht angebracht. Wenn wir sie also davon überzeugen können, uns die wichtige Provinz Dalmatien zu überlassen, können wir die anderen kleinen Ländereien später einnehmen."
ITA_istanbul_or_war:0 "Istanbul oder Krieg"
ITA_istanbul_or_war_desc:0 "Die Stadt der Welterwartung war ein Wunderwerk des alten Roms und später auch des zerfallenden Byzanz. Wenn wir Rom wiederherstellen wollen, muss Konstantinopel zurückerobert werden."
ITA_failureinETH:0 "Scheitern in Äthiopien"
ITA_failureinETH_desc:0 "Faschismus und Mussolini lügen. Wir haben im ersten Krieg genug Italiener verloren, wir werden in diesem nicht mehr verlieren. Der imperialistische Traum ist das falsche Hirngespinst von Verrückten, wir müssen unser Verhalten ändern."
ITA_move_to_left:0 "Nach links bewegen"
ITA_move_to_left_desc:0 "Der Kommunismus ist die Zukunft, er ist das Beste für unsere moderne Gesellschaft. Die Revolution muss entschlossen nach Europa getragen werden."
ITA_purge_fascism:0 "Säuberung des Faschismus"
ITA_purge_fascism_desc:0 "Es gibt immer noch Unterstützung für den Faschismus und das alte Regime. Um unsere neue nationale Mission erfolgreich zu erfüllen, müssen wir die Faschisten aus dem Herzen Italiens vertreiben. Das ist schmerzhaft, aber letztlich notwendig."
ITA_single_revolution_theory:0 "Theorie der Einzelrevolution"
ITA_single_revolution_theory_desc:0 "Es ist nicht möglich, die Revolution in einzelne Teile aufzuspalten. Eine Revolution muss durch ganz Europa getragen werden. Wir werden uns den Sowjets bei ihrem Vorhaben anschließen."
ITA_multi_revolution_theory:0 "Multi-Revolution-Theorie"
ITA_multi_revolution_theory_desc:0 "Unsere geopolitische Lage unterscheidet sich stark von der der Sowjets. Eine eigenständige Mittelmeerrevolution ist am sinnvollsten."
ITA_war_on_capitalism:0 "Krieg gegen den Kapitalismus"
ITA_war_on_capitalism_desc:0 "Der Kapitalismus ist nur ein Deckmantel für Sklaverei. Obwohl die Kapitalisten die Freiheit feiern, versklaven sie die Arbeiter ihres Landes. Sie müssen vernichtet werden."
ITA_war_on_fascism:0 "Krieg gegen den Faschismus"
ITA_war_on_fascism_desc:0 "Der Faschismus ist eine Ideologie falscher Versprechungen und ferner Träume. Der Imperialismus hat in der Moderne nie lange Bestand gehabt. Die faschistische Bedrohung muss ausgerottet werden."
ITA_war_on_england:0 "Zerschmettere Großbritannien"
ITA_war_on_england_desc:0 "England ist die Avantgarde des Kapitalismus. Wenn wir unser Schicksal erfüllen wollen, müssen wir es zerstören."
ITA_war_on_usa:0 "Zerschmettere die Vereinigten Staaten"
ITA_war_on_germany:0 "Zerschmettere das Reich"
ITA_new_socialist_reality:0 "Neue sozialistische Realität"
ITA_new_socialist_reality_desc:0 "Damit die Revolution Fuß fassen kann, muss der Kommunismus auf allen Ebenen unserer Gesellschaft eingeführt werden."
ITA_final_leap:0 "Letzter Sprung nach vorn"
ITA_final_leap_desc:0 "Ein letzter Anstoß wird unsere Industrien zu ihrem höchsten Potenzial führen. Auch wenn es zunächst schwierig erscheinen mag, werden wir es schaffen."
ITA_people_army:0 "Bilden Sie die Volksarmee"
ITA_people_army_desc:0 "Unsere neue Gesellschaft wird eine Armee brauchen, die aus dem Volk besteht und für das Volk kämpft."
ITA_liberation_army:0 "Befreiungsarmee"
ITA_liberation_army_desc:0 "Da unser eigener Erfolg gesichert ist, müssen wir nun eine Armee aufbauen, um denen zu helfen, die sich noch nicht von den Fesseln des Imperialismus befreit haben."
ITA_extra_tech_slot_3:0 "Reformpädagogik"
ITA_extra_tech_slot_3_desc:0 "Die Bevölkerung muss über unsere aktuellen und künftigen Reformen aufgeklärt werden; wir müssen den Weg für eine bessere Zukunft ebnen."
ITA_dictator_proletariate:0 "Diktatur des Proletariats"
ITA_dictator_proletariate_desc:0 "Die Revolution ist noch nicht vollständig abgeschlossen, unser Land ist noch nicht bereit für die Demokratie. Wir müssen das Kriegsrecht verhängen, bis wir als Nation unser Endstadium erreicht haben."
ITA_education_reforms:0 "Bildungsreformen"
ITA_education_reforms_dec:0 "Die Bevölkerung muss über unsere aktuellen und künftigen Reformen aufgeklärt werden; wir müssen den Weg für eine bessere Zukunft ebnen."
ITA_cultural_pluralism:0 "Kultureller Pluralismus"
ITA_cultural_pluralism_desc:0 "Es gibt weder Zeit noch Grund, unser Volk aufgrund unterschiedlicher Kulturen und Sprachen zu spalten. Wir müssen alle unter einem neuen Banner und einem neuen, einzigartigen Schlachtruf zusammenführen."
ITA_biblical_communism:0 "Biblischer Kommunismus"
ITA_biblical_communism_desc:0 "Der Großteil Europas ist katholisch oder gehört einer katholischen Konfession an. Das zu ändern, wäre zu schwierig. Obwohl unsere sowjetischen Nachbarn die Religion verboten haben, müssen wir bereit sein, mit den Menschen zu verhandeln."
ITA_FRA_revolution:0 "Unterstützen Sie die Französische Revolution"
ITA_FRA_revolution_desc:0 "Frankreich nähert sich bereits einer kommunistischen Realität. Das Land wird von unverschämten Kapitalisten unterdrückt und sein Volk muss in seinem Kampf unterstützt werden."
ITA_support_communist_spain:0 "Unterstützen Sie das republikanische Spanien"
ITA_support_communist_spain_desc:0 "In Spanien kämpft das Volk gegen das unterdrückerische faschistische Regime. Spanien muss Teil der Mittelmeerrevolution sein und die Menschen müssen frei sein."
ITA_balkan_revolution:0 "Die Balkanrevolution"
ITA_balkan_revolution_desc:0 "Auf dem Balkan leben viele unterdrückte Völker, die in der Gewalt der Deutschen sind. Sie brauchen die Revolution, um die Kraft zu haben, dem Imperialismus Widerstand zu leisten."
ITA_ROM_revolution:0 "Die rumänische Revolution"
ITA_ROM_revolution_desc:0 "Die Rumänen laufen Gefahr, vollständig in die deutsche Einflusssphäre einzudringen. Das dürfen wir nicht zulassen."
ITA_YUG_revolution:0 "Die jugoslawische Revolution"
ITA_YUG_revolution_desc:0 "Durch die Ausweitung der Revolution auf Jugoslawien kann sie sich leichter auf den Balkan und in den Mittelmeerraum ausbreiten."
ITA_YUG_dismantle:0 "Zerschlagung Jugoslawiens"
ITA_YUG_dismantle_desc:0 "Die jugoslawische Regierung unterdrückt ihr Volk direkt. Die Menschen verspotten sich gegenseitig wegen ihrer kulturellen Unterschiede. Wir müssen sie alle befreien und dafür sorgen, dass die Revolution ihre Herzen erfüllt."
ITA_GRE_revolution:0 "Die griechische Revolution"
ITA_GRE_revolution_desc:0 "Es ist Zeit für das griechische Volk, sich gegen seine unverschämten Herren zu erheben. Die Revolution gewinnt mit jedem Tag an Dynamik. Für die Revolution! Für die Freiheit!"
ITA_HUN_revolution:0 "Die ungarische Revolution"
ITA_HUN_revolution_desc:0 "Es ist Zeit für das ungarische Volk, sich gegen seine unverschämten Herren zu erheben. Die Revolution gewinnt mit jedem Tag an Dynamik. Für die Revolution! Für die Freiheit!"
ITA_BUL_revolution:0 "Die bulgarische Revolution"
ITA_BUL_revolution_desc:0 "Es ist Zeit für das bulgarische Volk, sich gegen seine unverschämten Herren zu erheben. Die Revolution gewinnt mit jedem Tag an Dynamik. Für die Revolution! Für die Freiheit!"
ITA_TUR_revolution:0 "Die türkische Revolution"
ITA_TUR_revolution_desc:0 "Es ist Zeit für das türkische Volk, sich gegen seine unverschämten Herren zu erheben. Die Revolution gewinnt mit jedem Tag an Dynamik. Für die Revolution! Für die Freiheit!"
ITA_ALB_revolution:0 "Die albanische Revolution"
ITA_ALB_revolution_desc:0 "Es ist Zeit für das albanische Volk, sich gegen seine unverschämten Herren zu erheben. Die Revolution gewinnt mit jedem Tag an Dynamik. Für die Revolution! Für die Freiheit!"
ITA_POR_revolution:0 "Die portugiesische Revolution"
ITA_POR_revolution_desc:0 "Es ist Zeit für das portugiesische Volk, sich gegen seine unverschämten Herren zu erheben. Die Revolution gewinnt mit jedem Tag an Dynamik. Für die Revolution! Für die Freiheit!"
ITA_mediterranean_revolution:0 "Die Mittelmeerrevolution"
ITA_mediterranean_revolution_desc:0 "Italien ist mittlerweile zum Kernland des mediterranen Kommunismus geworden. Die letzten Schritte in die Freiheit stehen uns bevor."
ITA_war_on_imperialism:0 "Krieg gegen den Imperialismus"
ITA_war_on_imperialism_desc:0 "Der Imperialismus ist lediglich ein Deckmantel für die Sklaverei. Er muss schnell und sicher beendet werden."
ITA_mediterranean_union:0 "Vereint das Mittelmeer"
ITA_mediterranean_union_desc:0 "Die Mittelmeerländer können nun alle zusammenkommen, um Imperialismus und Faschismus direkt entgegenzutreten. Gemeinsam sind wir stärker, für die Revolution!"
ITA_undermine_ENG_empire:0 "Untergrabung des britischen Empire"
ITA_undermine_ENG_empire_desc:0 "Das britische Empire ist das abscheulichste und korrupteste Produkt des Imperialismus. Es muss zerschlagen werden, damit die Revolution vollendet werden kann."
ITA_anti_german_pact:0 "Antideutscher Pakt"
ITA_anti_german_pact_desc:0 "Mit der Zusammenarbeit mit den Sowjets können wir die deutsche Bedrohung ein für alle Mal zerschlagen."
ITA_anti_german_pact_invite_poland:0 "Polen einladen"
ITA_anti_german_pact_invite_poland_desc:0 "Wir brauchen Polens Hilfe im Kampf gegen die Deutschen. Die Sowjets müssen ihre Streitigkeiten mit den Polen beilegen."
ITA_anti_german_pact_invite_low_countries:0 "Laden Sie die Niederlande ein"
ITA_anti_german_pact_invite_low_countries_desc:0 "Die Niederlande liegen direkt auf dem Weg der deutschen Eroberung. Wir müssen sie verteidigen, um ihre Unterstützung im bevorstehenden Konflikt zu gewinnen."
ITA_war_on_germany_desc:0 "Deutschland hat seine Grenzen überschritten und ist schlicht zu weit gegangen. Es muss zerstört werden, bevor es weiteren Schaden anrichten kann."
ITA_war_on_usa_desc:0 "Die Einführung des Kommunismus in den USA würde das größte kapitalistische Regime von der Macht entfernen und der Revolution in Amerika Fuß fassen."
ITA_move_to_right:0 "Nach rechts bewegen"
ITA_move_to_right_desc:0 "Mussolini verbreitete Lügen über die Wiederherstellung des „Ruhms der Roma“. Er war eine Schlange, und ohne ihn können wir uns einer besseren Gesellschaft voller Freiheit und Unabhängigkeit nähern. "
ITA_elections:0 "Freie Wahlen"
ITA_elections_desc:0 "Um einen Bürgerkrieg zu verhindern, werden freie Wahlen abgehalten, die den wahren Willen des Volkes widerspiegeln. Dies ist einer der vielen ersten Schritte in Richtung Freiheit."
ITA_cult_of_freedom:0 "Kult der Freiheit"
ITA_cult_of_freedom_desc:0 "Unsere neu gewonnene Freiheit muss bewahrt werden. Wir dürfen sie nicht verlieren, koste es, was es wolle. Das ist unser Schicksal."
ITA_economism:0 "Ökonomismus"
ITA_economism_desc:0 "Der italienische Einfluss muss auf andere Weise als durch den Einsatz von Waffen ausgeweitet werden. Durch den Ausbau unserer Wirtschaft können wir durch Handel und Diplomatie Macht über andere ausüben."
ITA_better_dead_than_red:0 "Besser tot als rot"
ITA_better_dead_than_red_desc:0 "Der Kommunismus ist das Gegenteil des Kapitalismus und muss aus unserer Gesellschaft vollständig entfernt werden. Auch die faschistischen Anhänger, die dem alten Regime noch immer treu sind, müssen zum Schweigen gebracht werden, bevor sich Unzufriedenheit ausbreitet."
ITA_anti_communism_support_spain:0 "Unterstützen Sie das nationalistische Spanien"
ITA_anti_communism_support_spain_desc:0 "Spanien darf nicht kommunistisch werden. Dies würde unseren Zugang zum Atlantik einschränken. Selbst wenn dies bedeutet, das Land den Faschisten auszuliefern, würden zumindest die Kommunisten einen Verlust erleiden."
ITA_anti_communism_support_france:0 "Unterstützen Sie den französischen Kapitalismus"
ITA_anti_communism_support_france_desc:0 "Frankreich ist ein wichtiger Akteur auf der Weltbühne und läuft Gefahr, kommunistisch zu werden. Das darf nicht passieren."
ITA_anti_communism_support_poland:0 "Unterstütze Polen"
ITA_anti_communism_support_poland_desc:0 "Polens prekäre Lage als sowjetisches Tor zu Europa macht das Land zu einem äußerst wichtigen strategischen Verbündeten. Es muss unterstützt und verteidigt werden, da es als Bollwerk gegen den Kommunismus fungiert."
ITA_support_SOV_seperatists:0 "Unterstützen Sie sowjetische Separatisten"
ITA_support_SOV_seperatists_desc:0 "Die unter dem Sowjetregime unterdrückten Staaten schreien nach Freiheit. Wir müssen sie befreien, um mit der Beseitigung der kommunistischen Bedrohung zu beginnen."
ITA_anti_communism_alliance_with_germany:0 "Antikommunistischer Pakt"
ITA_anti_communism_alliance_with_germany_desc:0 "Selbst mit Hilfe von außen ist die Sowjetunion ein gefährlicher Gegner. Wir werden die Hilfe der Nazis brauchen, die die besten Chancen haben, das kommunistische Heimatland zu besiegen. Wir müssen das kleinere von zwei Übeln wählen."
ITA_anti_communism_war:0 "Krieg gegen den Kommunismus"
ITA_anti_communism_war_desc:0 "Mit Hilfe der Deutschen ist es an der Zeit, den Kommunismus auszulöschen. Für die Freiheit!"
ITA_materialism:0 "Materialismus"
ITA_materialism_desc:0 "Der Kommerz soll unsere Stärke in unserer neuen Nation sein. Dies kann uns bei unserer neuen Ökonomismuspolitik helfen und unseren neuen Platz in der Welt festigen."
ITA_triple_trade_union:0 "Die Dreifachgewerkschaft"
ITA_triple_trade_union_desc:0 "Durch die Gründung eines Handelsbündnisses zwischen uns, den Griechen und den Türken können wir den gesamten Handel und die Wirtschaft im Mittelmeerraum stärken. Wir müssen als Friedensvermittler zwischen Griechenland und der Türkei auftreten und die alte Rivalität beilegen."
ITA_balkan_trade_initiative:0 "Balkan-Handelsinitiative"
ITA_balkan_trade_initiative_desc:0 "Der Aufbau einer Handelspräsenz auf dem Balkan kann sowohl uns als auch den dort vertretenen Staaten helfen. Die strategische und wirtschaftliche Bedeutung ist sicherlich wertvoll."
ITA_mediterranean_confederation:0 "Mittelmeer-Konföderation"
ITA_mediterranean_confederation_desc:0 "Ein neuer Mittelmeerstaat kann dazu beitragen, unser bereits formelles Bündnis der Mittelmeerstaaten zu zentralisieren."
ITA_decentralized_power:0 "Dezentralisierung der Macht"
ITA_decentralized_power_desc:0 "Es darf nie wieder zugelassen werden, dass die Regierung so mächtig wird wie unter Mussolini. Wir müssen Maßnahmen ergreifen, um eine solche Tragödie in Zukunft zu verhindern."
ITA_federalized_power:0 "Föderales Italien"
ITA_federalized_power_desc:0 "Der nächste Schritt der Dezentralisierung wird es einfacher machen, weitere Staaten in unser Bündnis einzubinden. Wahre Freiheit ist uns nahe."
ITA_support_YUG_seperatists:0 "Unterstützen Sie jugoslawische Separatisten"
ITA_support_YUG_seperatists_desc:0 "Jugoslawien ist ein Symbol der Tyrannei des Balkans. Die darin eingeschlossenen Staaten müssen freigelassen werden, damit sie sich selbst unabhängig regieren können."
ITA_yugoslavia_trade_initiative:0 "Der Modigliani-Plan"
ITA_yugoslavia_trade_initiative_desc:0 "Der Modigliani-Plan wird den neu befreiten jugoslawischen Staaten dabei helfen, ihr Wirtschaftswachstum anzukurbeln und gleichzeitig unsere eigene Wirtschaft auszubauen."
ITA_Free_the_Colonies:0 "Selbstbestimmung in Afrika"
ITA_Free_the_Colonies_desc:0 "Obwohl die afrikanischen Staaten seit ihrer Entdeckung unterdrückt wurden, verdienen sie auch Selbstbestimmung. Wir werden sie von ihren kolonialen Unterdrückern befreien und die Welt in eine bessere Zukunft führen."
ITA_alliance_with_ethiopia:0 "Bündnis mit Äthiopien"
ITA_alliance_with_ethiopia_desc:0 "Um unsere Absichten klarzustellen und sie ernst zu nehmen, müssen wir uns zunächst mit Äthiopien versöhnen. Es lebe das neue Bündnis, es lebe die neue Welt!"
ITA_support_african_seperatists:0 "Unterstützen Sie afrikanische Separatisten"
ITA_support_african_seperatists_desc:0 "Freiheit und Unabhängigkeit müssen unter der Kolonialbevölkerung verbreitet werden, sie werden ihre Unterdrücker stürzen und mit unserer Hilfe wirklich frei werden."
ITA_anti_reich_alliance:0 "Antideutsche Koalition"
ITA_anti_reich_alliance_desc:0 "Deutschland droht die Freiheit zu zerstören, und dieses Problem muss sehr bald gelöst werden. Die Sicherheit Europas kann nur durch eine Koalition gewährleistet werden."
ITA_anti_reich_war:0 "Krieg gegen den Nationalsozialismus"
ITA_anti_reich_war_desc:0 "Das Nazi-Regime unterzieht das deutsche Volk einer Gehirnwäsche und versklavt es. Es muss befreit und in eine neue und freie Welt geführt werden."
ITA_experimental_navy:0 "Experimentelle Marine"
ITA_experimental_navy_desc:0 "Durch die Weiterentwicklung unserer Marinetechnologie haben wir die Möglichkeit, die anderen Mächte in Seeschlachten zu bekämpfen."
ITA_submarine_effort:0 "U-Boot-Anstrengungen"
ITA_submarine_effort_desc:0 "U-Boote verfügen von allen Schiffstypen über die größte Seekampfkapazität. Der Einsatz dieser Technologie verschafft uns im Seekampf die Oberhand."
ITA_fleet_stalkers:0 "Flottenpirscher"
ITA_fleet_stalkers_desc:0 "Durch die Betonung der Tarnung im Marineszenario können wir unsere Zerstörungskraft maximieren und die Verlustrate minimieren."
ITA_combat_submarines:0 "Kampf-U-Boote"
ITA_combat_submarines_desc:0 "Die Integration von U-Booten in unsere Hauptflotten kann im offenen Kampf für ein Überraschungsmoment sorgen."
ITA_air_navy_effort:0 "Marine-Luftwaffe"
ITA_air_navy_effort_desc:0 "Luftunterstützung ist für die moderne Marine von entscheidender Bedeutung. Durch die Integration von Lufttaktiken in unsere Marinepläne können wir eine neue Strategie für den Seekampf nutzen."
ITA_atlantic_navy:0 "Atlantische Marine"
ITA_atlantic_navy_desc:0 "Nachdem wir das Mittelmeer fest im Griff haben, blicken wir nun auf den Atlantik, die riesige Wassermasse zwischen uns und unserem Schicksal."
ITA_carriers:0 "Trägeraufwand"
ITA_carriers_desc:0 "Flugzeugträger bringen unsere Luftunterstützung an die Front, wo sie zur Unterstützung unserer Flotten und Bodentruppen benötigt werden."
ITA_oceangoing_airforce:0 "Schwimmende Flugplätze"
ITA_oceangoing_airforce_desc:0 "Wir werden unsere Luftwaffe auf der ganzen Welt stationieren, indem wir unsere riesige Marine nutzen, um Bomber und Kampfflugzeuge dorthin zu transportieren, wo sie benötigt werden."
ITA_traditional_navy:0 "Traditionelle Marine"
ITA_traditional_navy_desc:0 "Indem wir den Schwerpunkt auf eine kleine Marine legen, können wir bei dem bleiben, von dem wir wissen, dass es funktioniert, und müssen uns weniger technischen und experimentellen Problemen stellen."
ITA_small_vessal_effort:0 "Kleine Schiffsbemühungen"
ITA_small_vessal_effort_desc:0 "Kleine Schiffe bilden das Rückgrat der größeren Marine, ihre Bedeutung darf nicht unterschätzt werden."
ITA_lightning_navy:0 "Blitz-Marineblau"
ITA_lightning_navy_desc:0 "Durch die Erhöhung der Schiffsgeschwindigkeit können wir unsere Einheiten dort platzieren, wo sie zum richtigen Zeitpunkt benötigt werden. Unsere Stärke bedeutet nichts, wenn die Schlacht bereits verloren ist."
ITA_massed_navy:0 "Massenmarine"
ITA_massed_navy_desc:0 "Unsere Feinde werden durch unsere schiere Zahl überwältigt sein und aufgrund der Stärke unserer Masse werden sie uns fürchten."
ITA_large_vessals_effort:0 "Große Schiffsbemühungen"
ITA_large_vessals_effort_desc:0 "Größere Schiffe kämpfen in den wirklichen Konflikten, während kleinere Schiffe den Schaden für sie tragen. Unser Fokus sollte auf den größeren Schiffen liegen."
ITA_cruiser_effort:0 "Schwerpunkt Kreuzer"
ITA_cruiser_effort_desc:0 "Kreuzer sind notwendig, um es mit den riesigen Flotten anderer Nationen aufzunehmen. Mit überlegenen Kreuzern wird unsere Marine unaufhaltsam sein."
ITA_flagship_effort:0 "Schwerpunkt Flaggschiff"
ITA_flagship_effort_desc:0 "Wir müssen Flaggschiffe entwickeln, um die Meere unbestritten zu beherrschen. Solche Symbole unserer Stärke werden weder unseren Streitkräften noch den Feinden verborgen bleiben."
ITA_air_expansion:0 "Ausbau der Luftwaffe"
ITA_air_expansion_desc:0 "Um in der modernen Kriegsführung eine Chance zu haben, muss unsere Luftwaffe mit anderen Ländern konkurrieren können. Den Krieg in der Luft zu verlieren, ist inakzeptabel."
ITA_independent_air_force:0 "Unabhängige Luftwaffe"
ITA_independent_air_force_desc:0 "Die Luftwaffe hat ihre bisherige Existenz als bloße Unterstützungswaffe hinter sich gelassen. Es ist an der Zeit, dass sie zu einem vollwertigen Zweig unseres Militärs wird."
ITA_air_invasion:0 "Luftinvasion"
ITA_air_invasion_desc:0 "Die Kombination von Luftangriffen mit Boden- und sogar Seeangriffen wird uns in den kommenden Konflikten zweifellos einen Vorteil verschaffen."
ITA_heavy_fighter:0 "Schwerer Kampfeinsatz"
ITA_heavy_fighter_desc:0 "Schwere Kampfflugzeuge werden benötigt, um unsere leichteren, taktischen Flugzeuge zu schützen, die ihre Ziele verfolgen."
ITA_air_domination:0 "Luftherrschaft"
ITA_air_domination_desc:0 "An der modernen Front bedeutet die Lufthoheit, dem Schlachtfeld den Sieg zu sichern. Sie steigert nicht nur die Moral und verringert die Verluste des Feindes, sondern stärkt auch unsere eigene Entschlossenheit."
ITA_war_on_infrastructure:0 "Krieg gegen die Infrastruktur"
ITA_war_on_infrastructure_desc:0 "Krieg wird mit Waffen geführt. Einem Land die Fähigkeit zum Waffenbau zu nehmen, heißt, ihm die Fähigkeit zu nehmen, Krieg zu führen."
ITA_overwhelming_forces:0 "Überwältigende Kräfte"
ITA_overwhelming_forces_desc:0 "Durch die Überlegenheit in der Luft werden Sie den Feind überwältigen und zur Unterwerfung zwingen."
ITA_air_support:0 "Unterstützende Luftwaffe"
ITA_air_support_desc:0 "Die Luftwaffe ist als Unterstützungseinheit für die Bodentruppen gedacht. Sie muss in erster Linie als Unterstützung für das Heer ausgebaut werden."
ITA_fear_skies:0 "Fürchte den Himmel"
ITA_fear_skies_desc:0 "Wenn wir unsere Luftstreitkräfte auf die Vernichtung feindlicher Bodentruppen konzentrieren, wird der Feind Angst vor unseren Kampfflugzeugen und Bombern bekommen, was seine Moral und Entschlossenheit gegenüber uns stark schwächt."
ITA_shower_of_death:0 "Schauer des Todes"
ITA_shower_of_death_desc:0 "Unsere Feinde werden in unseren Giften ertränkt und wie die Insekten ausgerottet, die sie sind, weil sie sich Italien entgegengestellt haben."
ITA_shadow_forces:0 "Schattenkräfte"
ITA_shadow_forces_desc:0 "Indem wir unsere Streitkräfte darauf trainieren, nicht in ungünstige Konflikte verwickelt zu werden, können sie auf Gelegenheiten warten, um effektiv und effizient zuzuschlagen."
ITA_anti_air_army:0 "Luftabwehrarmee"
ITA_anti_air_army_desc:0 "Um unser Ziel der Luftraumkontrolle weiter zu unterstützen, werden sogar unsere Bodeneinheiten für den Kampf gegen feindliche Flugzeuge ausgerüstet."
ITA_planes_of_future:0 "Luftwaffe der Zukunft"
ITA_planes_of_future_desc:0 "Auf unserem Weg in die Zukunft stehen uns zwei Möglichkeiten für den technologischen Fortschritt zur Verfügung. Die Kernspaltung eröffnet uns zwei Optionen: Entweder wir nutzen ihre zerstörerische Wirkung, um eine „Superbombe“ zu entwickeln, oder wir nutzen ihre erstaunlichen Energieerzeugungsfähigkeiten, um „Superflugzeuge“ zu entwickeln."
ITA_super_fighters:0 "Super Fighters"
ITA_super_fighters_desc:0 "Mit unserer neuesten Entwicklung, dem „Superjäger“, ist unsere Luftüberlegenheit unübertroffen und unbestritten. Wir beherrschen nun den Himmel ohne Hindernisse oder Herausforderungen."
ITA_super_bomb:0 "Superbombe"
ITA_super_bomb_desc:0 "Die Kernspaltung hat uns ihre wahre Macht gezeigt. Indem wir ihre Energie nutzen, können wir eine Bombe bauen, die ganze Städte zerstören kann. Diese neue Waffe verschafft uns einen unvorstellbaren Vorteil im modernen Kriegsgeschehen."


