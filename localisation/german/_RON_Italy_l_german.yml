ITA3_build_bunkers_on_the_french_border:0 "Bauen Sie Bunker an der französischen Grenze"
ITA3_build_bunkers_on_the_french_border_desc:0 "Wir sollten Bunker an der französischen Grenze bauen. Wir wissen nicht, wie die Franzosen auf unsere jüngsten Aktionen reagieren werden."
ITA3_request_tanks_from_the_soviets:0 "Fordern Sie Panzer von den Sowjets an"
ITA3_request_tanks_from_the_soviets_desc:0 "Vielleicht haben die Sowjets ein paar Panzer übrig?"
ITA3_the_new_generation:0 "Die neue Generation"
ITA3_the_new_generation_desc:0 "Wir werden die neue Generation darin schulen, das zu erkennen, was wir in Bezug auf den Faschismus sehen. Sie wird in Zukunft eine mächtige Waffe sein."
ITA3_build_up_the_military_industry:0 "Bauen Sie die Militärindustrie auf"
