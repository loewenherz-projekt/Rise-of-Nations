ITA3_american_weapons:0 "Amerikanische Waffen"
ITA3_american_weapons_desc:0 "Amerikanische Waffen sind für den italienischen Staat immer von Vorteil. Wir sollten sie fragen, ob sie bereit sind, Handel zu treiben, natürlich zu Verteidigungszwecken."
ITA3_expand_our_naval_research:0 "Erweitern Sie unsere Marineforschung"
ITA3_expand_our_naval_research_desc:0 "Die amerikanische Marine ist die beste, die es gibt. Wir sollten ihre Schiffe studieren, um unsere Seemacht auszubauen."
