ITA_spazio_vitale_idea:0 "Spazio vitale"
ITA_spazio_vitale_idea_desc:0 "Spazio vitale war das territoriale Expansionskonzept des italienischen Faschismus. Es wurde allgemein definiert als „der Teil der Erde, über den sich entweder die Lebensbedürfnisse oder die Expansionskraft eines Staates mit starker Einheitsorganisation erstrecken, der seine Bedürfnisse durch Expansion über seine nationalen Grenzen hinaus zu befriedigen sucht“. Es entsprach dem Lebensraumkonzept der deutschen NSDAP."

 italy.17.t:0 "Italienische Herrschaftserklärung"
 italy.17.d:0 "Italien erklärte seine Herrschaft über unser Land. Die Annahme kann die Unabhängigkeit kosten, aber die Ablehnung wird wahrscheinlich zum Krieg führen"
 italy.17.a:0 "Wir müssen nachgeben"
 italy.17.b:0 "Sie müssen uns unsere Freiheit nehmen"
 italy.18.t:0 "[From.GetName] akzeptiert die Herrschaftserklärung"
 italy.18.d:0 "[From.GetName] akzeptierte unser Recht, über ihre Nation zu herrschen"
 italy.18.a:0 "Wir sind der Wiederherstellung des Imperiums einen Schritt näher gekommen"
 italy.19.t:0 "[From.GetName] leugnet unsere Herrschaft"
 italy.19.d:0 "[From.GetName] hat unsere Herrschaft über die Region abgelehnt und ist bereit, für die Wahrung ihrer Unabhängigkeit zu kämpfen."
 italy.19.a:0 "Rom wird auf die eine oder andere Weise wieder auferstehen"
 italy.20.t:0 "Wachsende Unterstützung für Mussolini"
 italy.20.d:0 "Unser jüngster Erfolg hat mehr Menschen davon überzeugt, dass ein neues Römisches Reich in greifbarer Nähe ist. Er hat die italienische Unterstützung für Mussolini verstärkt."
 italy.20.a:0 "Das Imperium wird wieder auferstehen"
 italy.21.t:0 "Wachsende Unterstützung für Mussolini"
 italy.21.d:0 "Unser jüngster Erfolg hat mehr Menschen davon überzeugt, dass ein neues Römisches Reich in greifbarer Nähe ist. Er hat die italienische Unterstützung für Mussolini verstärkt."
 italy.21.a:0 "Das Imperium wird wieder auferstehen"
 italy.22.t:0 "Wachsende Unterstützung für Mussolini"
 italy.22.d:0 "Unser jüngster Erfolg hat mehr Menschen davon überzeugt, dass ein neues Römisches Reich in greifbarer Nähe ist. Er hat die italienische Unterstützung für Mussolini verstärkt."
 italy.22.a:0 "Das Imperium wird wieder auferstehen"
 italy.23.t:0 "Wachsende Unterstützung für Mussolini"
 italy.23.d:0 "Unser jüngster Erfolg hat mehr Menschen davon überzeugt, dass ein neues Römisches Reich in greifbarer Nähe ist. Er hat die italienische Unterstützung für Mussolini verstärkt."
 italy.23.a:0 "Das Imperium wird wieder auferstehen"
 italy.24.t:0 "Wachsende Unterstützung für Mussolini"
 italy.24.d:0 "Unser jüngster Erfolg hat mehr Menschen davon überzeugt, dass ein neues Römisches Reich in greifbarer Nähe ist. Er hat die italienische Unterstützung für Mussolini verstärkt."
 italy.24.a:0 "Das Imperium wird wieder auferstehen"
 italy.25.t:0 "Wiederherstellung Dalmatiens"
 italy.25.d:0 "Dalmatien ist wieder in italienischer Hand, und die italienische Bevölkerung ist in Sicherheit. Wir haben zurückerlangt, was uns in Versailles verweigert wurde. Das ist ein Beweis dafür, dass Mussolini Recht hat."
 italy.25.a:0 "Es lebe Mussolini"
 italy.26.t:0 "Wiederherstellung Athens"
 italy.26.d:0 "Athen ist wieder in italienischer Hand. Es ist ein wichtiger strategischer Punkt und ein Ort großen italienischen Erbes. Rom wäre ohne Athen nicht vollständig. Dies ist ein Beweis dafür, dass Mussolini Recht hat."
 italy.26.a:0 "Wir sind dem Wiederaufbau des Imperiums einen Schritt näher gekommen"
 italy.27.t:0 "Die Wiedereroberung Konstantinopels"
 italy.27.d:0 "Konstantinopel ist wieder in italienischer Hand. Es ist die von der Welt begehrte Stadt und fast so groß wie Rom selbst. Sie birgt wichtiges römisches und christliches Erbe. Rom wäre ohne sie nicht vollständig. Dies ist ein Beweis dafür, dass Mussolini Recht hat."
 italy.27.a:0 "Das Imperium ist fast wiedergeboren"
 italy.28.t:0 "Rückeroberung Madrids"
 italy.28.d:0 "Madrid ist wieder in italienischer Hand. Es ist ein wichtiger strategischer Punkt und verschafft Italien Zugang zum Atlantik und zum Rest der Welt. Dies ist ein Beweis dafür, dass Mussolini Recht hat."
 italy.28.a:0 "Italien wird aufsteigen"
 italy.29.t:0 "Rückgewinnung von Aquitan"
 italy.29.d:0 "Aquitanien ist wieder in italienischer Hand. Unser großer Rivale Frankreich wurde vernichtend geschlagen. Aquitanien ist ein Ort mit großem italienischen Erbe und ein Hafen mit Zugang zum Atlantik. Dies ist ein Beweis dafür, dass Mussolini Recht hat."
 italy.29.a:0 "Italien ist nicht aufzuhalten"
 italy.30.t:0 "Dalmatien zum Schutz"
 italy.30.d:0 "Italien machte einen interessanten Vorschlag. Sie sind bereit, unseren Konflikt zu vergessen, wenn wir ihnen einfach das bewohnte Gebiet übergeben, und sind sogar bereit, unsere Unabhängigkeit zu garantieren. Der Landverlust mag zwar unangenehm sein, sichert aber unser Überleben in diesen turbulenten Zeiten."
 italy.30.a:0 "Es ist das Beste"
 italy.30.b:0 "Die Vereinbarung ist akzeptabel"
 italy.31.t:0 "Jugoslawien akzeptiert unseren Schutz"
 italy.31.d:0 "Jugoslawien hat unseren Vorschlag angenommen und Territorium aufgegeben. Dies eröffnet die Möglichkeit einer Verbesserung der Beziehungen."
 italy.31.a:0 "Dies kommt allen zugute"
 italy.32.t:0 "Jugoslawien lehnt Schutz ab"
 italy.32.d:0 "Jugoslawien hat unseren Schutzvorschlag abgelehnt. Das beweist, dass unser Konflikt nur durch Krieg gelöst werden kann."
 italy.32.a:0 "Wir werden Yug auf die eine oder andere Weise zurückfordern"
 italy.33.t:0 "Italien fordert Istanbul"
 italy.33.d:0 "Italien hat ein Ultimatum gestellt und Istanbul gefordert. Es ist unsere wertvollste Stadt, aber ein Niedergang könnte dazu führen, dass sie mit Gewalt eingenommen wird."
 italy.33.a:0 "Wir können Italien nicht standhalten"
 italy.33.b:0 "Wir würden lieber sterben, als Istanbul aufzugeben"
 italy.34.t:0 "Die Türkei hat unser Ultimatum akzeptiert"
 italy.34.d:0 "Die Türkei hörte auf die Vernunft und gab Istanbul auf"
 italy.34.a:0 "Konstantinopel ist wieder unter christlicher Kontrolle"
 italy.35.t:0 "Die Türkei hat unser Ultimatum abgelehnt"
 italy.35.d:0 "Die Türkei weigerte sich, Istanbul zu übergeben, selbst als sie von einem Krieg bedroht war"
 italy.35.a:0 "Sie müssen zerquetscht werden"
 italy.36.t:0 "Schwarzer Pakt"
 italy.36.d:0 "Nach dem Fall Frankreichs hat Italien uns einen interessanten Vorschlag gemacht: Im Austausch gegen Zypern, Gibraltar, Malta und verschiedene französische Gebiete würde Italien auf unserer Seite in den Krieg eintreten. Die Annahme wäre zwar verräterisch, würde uns aber sicherlich bei unseren Kriegsanstrengungen unterstützen."
 italy.36.a:0 "Akzeptiere den schwarzen Pakt"
 italy.36.b:0 "Wir würden unsere Verbündeten niemals verraten"
 italy.37.t:0 "Schwarzer Pakt angenommen"
 italy.37.d:0 "England hat unser Angebot, sich seinem Krieg auf Kosten verbündeter Gebiete anzuschließen, verraten. Wir werden nun die Stabilität Europas wiederherstellen und gleichzeitig unser Imperium wiederherstellen."
 italy.37.a:0 "Tod für Deutschland"
 italy.38.t:0 "Großbritannien lehnt den Black Pact ab"
 italy.38.d:0 "Großbritannien hat unser Angebot, sich seinem Krieg anzuschließen, törichterweise abgelehnt. Nun wird es unweigerlich von der Macht des Reichs zermalmt werden."
 italy.38.a:0 "Wie dumm"
 italy.39.t:0 "Kritische italienische Abhängigkeit"
 italy.39.d:0 "Von allen Besitztümern Italiens sind wir einer der wichtigsten. Das bedeutet leider, dass sie größere Anstrengungen unternehmen werden, um ihren Einfluss auf uns zu behaupten."
 italy.39.a:0 "Das ist bedauerlich"
 italy.40.t:0 "Wiedergeburt des Römischen Reiches"
 italy.40.d:0 "Italien hat die Wiedergeburt des Römischen Reiches ausgerufen, und da wir angeblich Teil dieses Reiches sind, bedeutet dies, dass wir unsere gesamte Souveränität verlieren. Unsere einzige Überlebenschance ist der Krieg."
 italy.40.a:0 "Akzeptiere unser Schicksal"
 italy.40.b:0 "Wir werden für unsere Freiheit kämpfen"
 italy.41.t:0 "[From.GetName] lehnt die Annexion ab"
 italy.41.d:0 "[From.GetName] hat unsere Einladung, dem glorreichen Römischen Reich beizutreten, abgelehnt. Leider müssen wir es mit Gewalt annektieren."
 italy.41.a:0 "Rom wird auf die eine oder andere Weise geboren"
 italy.42.t:0 "Rückgabe Konstantinopels an die Griechen"
 italy.42.d:0 "Konstantinopel ist wieder unter römischer Kontrolle, aber wir haben die Möglichkeit, es seinen ursprünglichen Besitzern, den Griechen, zurückzugeben."
 italy.42.a:0 "Es gehört ihnen rechtmäßig"
 italy.42.b:0 "Nein, die Stadt gehört uns"
 italy.43.t:0 "Italien gibt Konstantinopel zurück"
 italy.43.d:0 "Italien hat uns Konstantinopel großzügig zurückgegeben, es ist ein wahrer Freund Griechenlands."
 italy.43.a:0 "Es lebe die Italiener"
 italy.50.t:0 "Italienisches Ultimatum"
 italy.50.d:0 "Die italienische Regierung hat uns ein Ultimatum gestellt und mit Krieg gedroht, sollten wir nachgeben. Die Annahme des Ultimatums würde unsere Monarchien beenden und uns zu einer Marionette machen, aber es könnte unsere einzige Option sein."
 italy.50.a:0 "Wir haben keine Wahl, wir müssen akzeptieren"
 italy.50.b:0 "Besser tot als rot"
 italy.51.t:0 "Albanische Revolution triumphiert"
 italy.51.d:0 "Der albanische Tyrann hat sich weise dafür entschieden, seine Macht friedlich aufzugeben. Albanien gehört jetzt und für immer dem Volk."
 italy.51.a:0 "Es lebe die Revolution"
 italy.52.t:0 "Albanien lehnt Ultimatum ab"
 italy.52.d:0 "Der albanische Tyrann hat sich törichterweise dafür entschieden, an seiner Macht festzuhalten, in der Illusion, er könne die Revolution unterdrücken. Wir haben keine andere Wahl, als ihn zu vernichten."
 italy.52.a:0 "Königliches Blut wird durch die Straßen von Tirana fließen"
 italy.53.t:0 "Kommunistische Revolution"
 italy.53.d:0 "Kommunistische Elemente in unserem Land haben gegen die Regierung mobilisiert. Wir haben unsere eigenen Truppen entsandt, um sie aufzuhalten. Der Ausgang ist jedoch noch unklar."
 italy.53.a:0 "Wir werden sehen, was dabei herauskommt"
 italy.54.t:0 "Kommunistischer Putsch"
 italy.54.d:0 "Mit einem Schlag haben die Revolutionäre das vorherige Regime gestürzt. Dieses Land wird nun vom Volk für das Volk regiert."
 italy.54.a:0 "Es lebe die Revolution"
 italy.55.t:0 "Bürgerkrieg"
 italy.55.d:0 "Unseren Streitkräften ist es gelungen, die Kommunisten daran zu hindern, unsere Regierung zu stürzen. In ihren Bemühungen, uns zu besiegen, greifen die Kommunisten nun auf einen offenen Krieg zurück."
 italy.55.a:0 "Sie dürfen nicht erfolgreich sein"
 italy.56.t:0 "Der Große Italienische Bürgerkrieg"
 italy.56.d:0 "Italien ist so weit degeneriert, dass eine Revolution ausbrach. Italien droht nun, dem Kommunismus, dem genauen Gegenteil des Faschismus, zu verfallen."
 italy.56.a:0 "Unterstützt die Faschisten"
 italy.56.b:0 "Unterstützen Sie die Kommunisten"
 italy.57.t:0 "Bündnisvorschlag mit Italien"
 italy.57.d:0 "Die italienischen Sozialisten haben vorgeschlagen, mit uns ein Bündnis zu bilden, in der Hoffnung, eine große revolutionäre Kraft zu schaffen."
 italy.57.a:0 "Die Arbeiterklasse muss zusammenhalten"
 italy.57.b:0 "Sie müssen ihre eigene Revolution kämpfen"
 italy.58.t:0 "Die UdSSR akzeptiert den Bündnisvorschlag"
 italy.58.d:0 "Die Sowjets haben unseren Vorschlag angenommen, ein großes kommunistisches Bündnis zu bilden. Mit vereinten Kräften wird die ganze Welt bald rot und gold sein."
 italy.58.a:0 "Es lebe die Revolution"
 italy.59.t:0 "Die UdSSR lehnte den Bündnisvorschlag ab"
 italy.59.d:0 "Die Sowjets lehnten den Vorschlag eines gemeinsamen Bündnisses mit der Begründung ab, ihre Revolution sei von unserer getrennt."
 italy.59.a:0 "Diese Narren"
 italy.60.t:0 "Mussolini ist tot"
 italy.60.d:0 "Der italienische Staatschef Mussolini wurde gerade ermordet. Dieses Ereignis wird zwangsläufig Auswirkungen auf die Stabilität Italiens haben."
 italy.60.a:0 "Wir werden sehen, was dabei herauskommt"
 italy.61.t:0 "[From.GetName] fällt der Revolution zum Opfer"
 italy.61.d:0 "[From.GetName] ist der kommunistischen Revolution zum Opfer gefallen und hat im gesamten Mittelmeerraum die Vorstellung verstärkt, dass der Kommunismus der Weg der Zukunft ist. Alle Mittelmeerländer werden nun einen stärkeren Sog in Richtung Kommunismus verspüren."
 italy.61.a:0 "Ein Zeitalter des Kommunismus könnte uns bevorstehen"
 italy.62.t:0 "Frankreich fällt der Revolution zum Opfer"
 italy.62.d:0 "Frankreich ist der kommunistischen Revolution zum Opfer gefallen, was im gesamten Mittelmeerraum die Vorstellung verstärkt, dass der Kommunismus der Weg der Zukunft ist. Alle Mittelmeerländer werden nun einen deutlich stärkeren Sog in Richtung Kommunismus verspüren."
 italy.62.a:0 "Ein Zeitalter des Kommunismus könnte uns bevorstehen"
 italy.63.t:0 "Der Kommunismus siegt"
 italy.63.d:0 "Die Revolution ist siegreich. Das französische Volk ist nun frei von Unterdrückung und Frankreich ist ein wahrhaft sozialistischer Staat."
 italy.63.a:0 "Es lebe die Revolution"
