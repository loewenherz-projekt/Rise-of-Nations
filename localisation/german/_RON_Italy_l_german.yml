 italy.151.t:0 "Länder erlangen Unabhängigkeit"
 italy.151.d:0 "Die jüngste Staatskrise in Jugoslawien konnte überraschend friedlich durch die Gewährung der Unabhängigkeit gelöst werden. Die jugoslawische Regierung hat endlich den separatistischen Forderungen nachgegeben und den Regionen Serbiens ihre Unabhängigkeit gewährt."
 italy.151.a:0 "Wünschen wir ihnen viel Glück"
 italy.153.t:0 "Länder erlangen Unabhängigkeit"
 italy.153.d:0 "Die jüngste Staatskrise in Belgien wurde überraschend friedlich gelöst, indem man den belgischen Regionen die Unabhängigkeit gewährte. Die belgische Regierung hat endlich den separatistischen Forderungen nachgegeben und ihnen die Unabhängigkeit gewährt."
 italy.153.a:0 "Wünschen wir ihnen viel Glück"
 italy.155.t:0 "Länder erlangen Unabhängigkeit"
