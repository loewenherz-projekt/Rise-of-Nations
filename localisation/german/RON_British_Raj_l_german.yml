### FOCUSES

 RAJ_industrailize_india:0 "Industrialisierung Indiens"
  RAJ_industrailize_india_desc:0 "Die Briten und ihre Vizekönige haben unsere Industrialisierung eingeschränkt, indem sie nur britischen Staatsbürgern und anderen Ausländern erlaubten, Geschäfte zu betreiben. Es ist Zeit, dass sich die Dinge ändern."
  RAJ_princely_state_invesments:0 "Fürstliche Staatsinvestitionen"
  RAJ_princely_state_invesments_desc:0 "Die Fürstenstaaten, die durch die East India Trading Company in die britische Herrschaft integriert wurden, sind bereit, in die Industrie des Landes zu investieren, um ihre Macht zu erhalten und die Beziehungen zu verbessern. Wir nehmen ihre Investitionen an, aber eines Tages werden sie ihre Macht abgeben müssen."
  RAJ_expand_the_northern_railway:0 "Erweitern Sie die Nordbahn"
  RAJ_expand_the_northern_railway_desc:0 "Der britische Ingenieur Robert Maitland Brereton war für den Bau zahlreicher Eisenbahnen in Indien verantwortlich. Bereits 1875 begannen wir mit dem Bau eigener Lokomotiven und planten den weiteren Ausbau der Eisenbahn. Wir sollten die Pläne unserer Vorgänger vollenden ..."
  RAJ_link_up_the_south:0 "Verbinde dich mit dem Süden"
  RAJ_link_up_the_south_desc:0 "Bis 1936 war das Eisenbahnnetz 66.000 Kilometer lang und umrundete das ganze Land. Mit der Weltwirtschaftskrise litt die Eisenbahn stark unter den wirtschaftlichen Folgen und kämpft seitdem um ihre Erholung. Wir sollten mehr Geld in die Eisenbahn investieren, um sie instand zu halten und sicherzustellen, dass unser ganzes Land Zugang zu öffentlichen Verkehrsmitteln hat."
  RAJ_royal_ordance_facotries:0 "Erweiterung der Royal Ordnance Factories"
  RAJ_royal_ordance_facotries_desc:0 "Während der britischen Wiederaufrüstung begann man in England und seinen Kolonien mit dem Bau von Royal Ordnance Factories. Wir sollten mit der privaten Expansion solcher Fabriken beginnen."
  RAJ_remove_corrupt_railroad_officals:0 "Korrupte Eisenbahnbeamte entfernen"
  RAJ_remove_corrupt_railroad_officals_desc:0 "Seit der Weltwirtschaftskrise überweisen viele Eisenbahnbeamte heimlich Geld aus dem Eisenbahnbetrieb auf ihre eigenen Bankkonten. Wenn wir den Eisenbahnbetrieb aufrechterhalten wollen, müssen diese Beamten entlassen werden."
  RAJ_develop_our_mic:0 "Entwickeln Sie unser MIC"
  RAJ_develop_our_mic_desc:0 "Unser militärisch-industrieller Komplex ist im Vergleich zu vielen anderen großen Nationen glanzlos. Mit einigen Verbesserungen könnten wir es mit der großen Industriemacht Großbritannien aufnehmen."
  RAJ_bombay_oil:0 "Bombay Ölproduktion"
  RAJ_bombay_oil_desc:0 "Geologen haben vor der Küste Bombays (Mumbais) kürzlich kleine Ölvorkommen entdeckt. Wir sollten umgehend mit der Ölförderung in dieser Region beginnen."
  RAJ_return_the_colonies:0 "Fordern Sie die Kolonien an"
  RAJ_return_the_colonies_desc:0 "Der indische Subkontinent wurde viel zu lange erobert oder in westliche Imperien integriert. Es ist Zeit, dass sie das Land zurückgeben, das sie dem indischen Volk geraubt haben! Goa, Französisch-Indien und Ceylon müssen zurückgegeben werden."
  RAJ_optimized_production:0 "Optimierte Produktion"
  RAJ_optimized_production_desc:0 "Wenn wir ein bestimmtes Gerät oder Fahrzeug in Massenproduktion herstellen möchten, müssen wir unsere Produktionsmethoden optimieren."
  RAJ_subside_tata_steel:0 "Subventionierung von Tata Steel"
  RAJ_subside_tata_steel_desc:0 "1907 gründeten Jamshedji Tata und Dorabji Tata Tata Iron and Steel. Jamshedji starb, bevor er miterleben konnte, was aus seinem Unternehmen wurde. Doch 1939 war Tata Steel das größte Stahlwerk des gesamten britischen Empires. Wir sollten dieses Unternehmen subventionieren und ihm helfen, seine Aktivitäten in unserem Land auszuweiten. "
  RAJ_univeristy_of_calcutta:0 "Universität von Kalkutta"
  RAJ_univeristy_of_calcutta_desc:0 "Die Universität von Kalkutta wurde am 24. Januar 1857 gegründet und ist damit eine der ältesten Universitäten Indiens. Da die Briten das Sergeant-Programm nicht umsetzen konnten, müssen wir die Sache selbst in die Hand nehmen. Wir sollten der Universität zusätzliche Mittel zuweisen, um die Alphabetisierung in unserem Land zu fördern."
  RAJ_the_ultra_project:0 "Das Ultra-Projekt"
  RAJ_the_ultra_project_desc:0 "Die Briten haben einige unserer größten Intellektuellen eingeladen, ihnen beim Knacken der Enigma zu helfen. Die Informationen, die sie erhalten, können wir nutzen, um unsere eigenen Chiffriercodes zu entwickeln."
  RAJ_develop_our_own_computers:0 "Entwickeln Sie unsere eigenen Computer"
  RAJ_develop_our_own_computers_desc:0 "Die Großmächte der Welt liefern sich ein Wettrennen um die Entwicklung fortschrittlichster Computer. Wir sollten uns diesem Wettlauf anschließen und einen Computer entwickeln, der allen anderen ebenbürtig ist."
  RAJ_found_bhabha_atomic_research_centre:0 "Atomforschungszentrum Bhabha"
  RAJ_found_bhabha_atomic_research_centre_desc:0 "Das Bhabha Atomic Research Centre wurde von der indischen Regierung als Atomenergieeinrichtung gegründet. Es entwickelte sich schnell zu Indiens führendem Atomenergie- und Atomwaffenforschungszentrum. Einige Forscher schlugen den Bau einer Atombombe vor, den „Smiling Buddha“."
  RAJ_build_the_university_of_deli:0 "Bauen Sie die Universität von Delhi"
  RAJ_build_the_university_of_deli_desc:0 "Die Universität von Kalkutta ist das Bildungszentrum für Bengalen, aber nicht für den Rest Indiens. Wir sollten in unserer Hauptstadt eine große Universität bauen, die Universität von Delhi."
  RAJ_legacy_of_the_indian_armed_forces:0 "Vermächtnis der indischen Streitkräfte"
  RAJ_legacy_of_the_indian_armed_forces_desc:0 "Jahrzehntelang haben unsere Truppen für Großbritannien um die Welt gekämpft. Wir haben in den Anglo-Afghanischen Kriegen, im Ersten Weltkrieg, im Boxeraufstand und vielen anderen Kämpfen gekämpft. Es ist Zeit für die umfassende Modernisierung unserer Streitkräfte."
  RAJ_army_reforms:0 "Armeereformen"
  RAJ_army_reforms_desc:0 "Der erste Schritt zur Modernisierung besteht in der Umsetzung einiger Reformen, die dazu beitragen, die Armee auf die Zukunft vorzubereiten."
  RAJ_prepare_for_the_next:0 "Bereiten Sie sich auf den nächsten Krieg vor"
  RAJ_prepare_for_the_next_desc:0 "Angesichts der zunehmenden Spannungen in Europa und China müssen wir damit beginnen, die Armee auf den nächsten Weltkrieg vorzubereiten."
  RAJ_gurkhas:0 "Gurkhas"
  RAJ_gurkhas_desc:0 "Die Briten hatten die Gurkhas nach dem Gorkha-Krieg, der 1814 endete, gegründet. Die Gurkhas hatten aufgrund ihrer Effizienz auf die Briten Eindruck gemacht und im Friedensabkommen einigten sich beide Seiten darauf, dass die Gurkhas von den Briten rekrutiert werden könnten. Die Gurkhas sind auf den Kampf im rauen Gelände spezialisiert und wären eine wertvolle Ergänzung für die Armee."
  RAJ_indian_regiment_of_artillery:0 "Indisches Artillerieregiment"
  RAJ_indian_regiment_of_artillery_desc:0 "Dem Mogulkaiser Babur wird allgemein zugeschrieben, als Erster Artillerie in eine indische Armee integriert zu haben. Im Jahr 1935 wurde nach der enormen Rolle, die die Artillerie im Ersten Weltkrieg spielte, das Artillerieregiment gegründet."
  RAJ_order_besa_machine_guns:0 "Besa Maschinengewehre bestellen"
  RAJ_order_besa_machine_guns_desc:0 "Das Besa-Maschinengewehr ist eine britische Variante des tschechoslowakischen ZB-53-Maschinengewehrs. Das Besa-Maschinengewehr war im Zweiten Weltkrieg bei der indischen Armee sehr beliebt und wurde dort eingesetzt. Viele Militärquartiermeister und Waffenschmiede fragen bereits nach diesem Maschinengewehr. Es ist Zeit, ihre Bestellungen zu erfüllen."
  RAJ_chindits_columns:0 "Chindits-Kolumnen"
  RAJ_chindits_columns_desc:0 "Die Chidit-Kolonnen wurden von einem britischen Brigadegeneral namens Orde Wingate gebildet. Ein Chindit ist eine abgewandelte Version der burmesischen Chinthay, einer Statue, die buddhistische Tempel bewacht. Die ersten Chindit-Kolonnen bestanden aus britischen, burmesischen und nepalesischen Gurkhas, die während der Regenzeit in Indien im Dschungel trainierten. Würden wir diese in unsere Armee integrieren, hätten wir einen strategischen Vorteil gegenüber unseren Feinden."
  RAJ_army_motorizition:0 "Armeemotorisierung "
  RAJ_army_motorizition_desc:0 "Gepanzerte und ungepanzerte Fahrzeuge spielen heute in der Kriegsführung eine große Rolle. Wenn wir die Armee modernisieren wollen, müssen wir sie motorisieren."
  RAJ_armoured_corps:0 "Panzerkorps"
  RAJ_armoured_corps_desc:0 "Die Herstellung eigener Panzer ist der letzte Schritt einer vollständigen Modernisierung."
  RAJ_renown_indian_divisons:0 "Renommierte indische Divisionen"
  RAJ_renown_indian_divisons_desc:0 "Während des Zweiten Weltkriegs erlangten viele Regimenter, Divisionen und Bataillone Berühmtheit. Beispiele hierfür sind die 4. indische Infanteriedivision „Red Eagles“ und die 10. Princess Mary’s Own Gurkha Rifles."
  RAJ_reorganize_the_royal_indian_airforce:0 "Reorganisieren Sie die Royal Indian Air Force"
  RAJ_reorganize_the_royal_indian_airforce_desc:0 "Die Royal Indian Air Force (nach dem Abzug der Briten in „Indian Air Force“ umbenannt) wurde ursprünglich als Hilfsluftwaffe für die britische Royal Air Force gegründet. Im Zweiten Weltkrieg spielte sie jedoch eine entscheidende Rolle bei der Bekämpfung des Vormarsches japanischer Truppen in Burma und Thailand. Wir sollten unsere Luftwaffe modernisieren, um mächtigere Feinde bekämpfen zu können."
  RAJ_purchase_hindustan_aircraft:0 "Kaufen Sie Anteile an Hindustan Aircraft"
  RAJ_purchase_hindustan_aircraft_desc:0 "1941 erwarb die indische Regierung ein Drittel der Anteile an dem Unternehmen und investierte dafür 2,5 Milliarden Rupien in das Unternehmen. 1942 wurde das Unternehmen verstaatlicht und bald darauf übernahm die indische Regierung die Kontrolle. Hindustan Aircraft ist für die Produktion unserer Militärflugzeuge von entscheidender Bedeutung."
  RAJ_british_models:0 "Britische Models"
  RAJ_british_models_desc:0 "Wir sollten britische Flugzeugmodelle kaufen und studieren und den Rest unserer Flugzeuge auf solchen Designs basieren."
  RAJ_soviet_models:0 "Sowjetische Modelle"
  RAJ_soviet_models_desc:0 "Wir sollten sowjetische Flugzeugmodelle kaufen und studieren und den Rest unserer Flugzeuge auf solchen Designs basieren."
  RAJ_develop_our_own_models:0 "Eigene Modelle entwickeln"
  RAJ_develop_our_own_models_desc:0 "Anstatt unsere Designs auf anderen Ländern aufzubauen, sollten wir unsere eigenen einzigartigen Modelle erstellen."
  RAJ_airforce_training_drills:0 "Trainingsübungen der Luftwaffe"
  RAJ_airforce_training_drills_desc:0 "Wir sollten mehrere Luftwaffenübungen durchführen, die uns bei der Entwicklung neuer Luftdoktrinen helfen."
  RAJ_rocket_engine_techongoly:0 "Investieren Sie in Raketentriebwerke"
  RAJ_rocket_engine_techongoly_desc:0 "Nachdem wir neue britische und amerikanische Flugzeuge mit Düsenantrieb untersucht haben, scheint es in unserem besten Interesse zu sein, unser eigenes Flugzeug mit Düsenantrieb zu bauen."
  RAJ_indian_royal_marines:0 "Indische Royal Marines"
  RAJ_indian_royal_marines_desc:0 "Nach acht Namensänderungen wurde die indische Marine 1892 schließlich zu den Indian Royal Marines und bestand aus über fünfzig Schiffen. Wir sollten unsere Marine weiter ausbauen, um mit der Zeit Schritt zu halten."
  RAJ_navy_discpline_act_of_1934:0 "Disziplinargesetz der indischen Marine von 1934"
  RAJ_navy_discpline_act_of_1934_desc:0 "Mit dem Navy Discpline Act von 1934 wurde die indische Marine endgültig in „Royal Indian Navy“ umbenannt und das Präfix aller ihrer Schiffe in „HMIS“ für „His Majesty’s Indian Ship“ geändert."
  RAJ_nationalize_hindustan_shipyard:0 "Erweitern Sie die Hindustan Shipyard Limited"
  RAJ_nationalize_hindustan_shipyard_desc:0 "Die Hindustan Shipyard wurde aufgrund ihrer strategischen Lage in Vishakhaptnam errichtet. Vor dem Bau der Werft hatten die Japaner die Stadt bombardiert, doch Walchand Hirachand ließ sich nicht vom Bau der Werft abhalten. Die Werft unterstützt die indische Regierung auch bei der Reparatur ihrer Marine und der Modernisierung von U-Booten."
  RAJ_sub_focus:0 "Verdeckte Operationen"
  RAJ_sub_focus_desc:0 "Um beim Verlassen des Hafens nicht von Feinden entdeckt zu werden, müssen wir U-Boote bauen, um ihre Blockaden zu durchbrechen und ihre Flotten zu überfallen."
  RAJ_destroyer_focus:0 "Küstenverteidigungsstreitkräfte"
  RAJ_destroyer_focus_desc:0 "Um feindliche Blockaden und unerlaubtes Betreten unserer Gewässer zu verhindern, müssen wir eine Küstenverteidigungstruppe aufstellen, um dieses Problem zu vermeiden."
  RAJ_crusier_focus:0 "Ein Kreuzer der Marine"
  RAJ_crusier_focus_desc:0 "Um unsere Pläne für eine Präsenz auf See in die Tat umzusetzen, werden immer größere Schiffe benötigt."
  RAJ_sham_no_varunah:0 "Sham No Varuanh "
  RAJ_sham_no_varunah_desc:0 "„Sham No Varuanh“ ist das Motto unserer Marine und bedeutet „Möge der Herr des Wassers uns glückverheißend sein“."
  RAJ_expansion_of_colonial_powers:0 "Ausweitung der Kolonialmächte"
  RAJ_expansion_of_colonial_powers_desc:0 "Die Kolonie Indien gehört dem Kaiser und seinem Volk. Um sicherzustellen, dass sein Wille in der Kolonie gewahrt wird, müssen wir die Macht des Vizekönigs hier ausweiten."
  RAJ_the_indian_national_congress:0 "Der Indische Nationalkongress"
  RAJ_the_indian_national_congress_desc:0 "Der Indische Nationalkongress wurde 1885 gegründet und stand an der Spitze der indischen Unabhängigkeitsbewegung mit 15 Millionen Mitgliedern im ganzen Land und 70 Millionen Nichtmitgliedern, die sich der britischen Kolonialherrschaft widersetzten."
  RAJ_abolish_the_caste_system:0 "Das Kastensystem abschaffen"
  RAJ_abolish_the_caste_system_desc:0 "Das Kastensystem war ein soziales Konstrukt der vedischen Gesellschaft. Es teilte die Menschen in fünf Hauptgruppen ein: Brahmanen (die Priesterklasse), Kshatriyas (die Kriegerklasse), Vaisyas (die Kaufleute und Bauern), Shudras (die Arbeiterklasse) und Chandalas (die unterste Klasse). Um den gesellschaftlichen Fortschritt zu fördern, musste dieses System abgeschafft werden."
  RAJ_quit_india:0 "Quit India-Bewegung"
  RAJ_quit_india_desc:0 "Die Quit-India-Bewegung wurde am 8. August 1942 ins Leben gerufen. Angeführt wurde sie von Mahatma Gandhi, der das Ende der britischen Herrschaft in Indien forderte. Da es der Cripps-Mission nicht gelungen war, Unterstützung für die britische Herrschaft zu gewinnen, hätte sie beinahe den gesamten Mitarbeiterstab des Indischen Nationalkongresses verhaften lassen. Das indische Volk fordert seine Unabhängigkeit!"
  RAJ_qandhis_vision:0 "Gandhis Vision"
  RAJ_qandhis_vision_desc:0 "Gandhi hatte die Vision eines vollständig vereinten Indiens, in dem Muslime, Hindus und Sikhs in Frieden leben könnten, ohne dass es jemals zu einer Teilung Indiens käme."
  RAJ_constituent_assembly:0 "Konstituierende Versammlung"
  RAJ_constituent_assembly_desc:0 "Die Verfassunggebende Versammlung Indiens hatte am 9. Dezember 1946 unter Beteiligung von Mitgliedern der Muslimliga und der Fürstenstaaten die indische Verfassung ausgearbeitet. Als die Verfassung am 26. Januar 1950 offiziell in Kraft trat, war dies der Tag der Republik. Wir sollten unsere eigene Verfassung entwerfen, um die Rechte des Volkes zu sichern."
  RAJ_protect_religious_minorities:0 "Schutz religiöser Minderheiten"
  RAJ_protect_religious_minorities_desc:0 "Seit Generationen ist religiöse Gewalt zwischen Muslimen und Hindus, Sikhs und Muslimen sowie Hindus und Sikhs an der Tagesordnung. Wir müssen diesen Trend stoppen und bestimmten Regionen ein gewisses Maß an Autonomie gewähren, um den religiösen Minderheiten entgegenzukommen."
  RAJ_public_wellfare:0 "Gemeinwohl"
  RAJ_public_wellfare_desc:0 "Um eine weitverbreitete Krankheit zu verhindern, sollten wir öffentliche Leistungen wie offene Sprechstunden und kostenlose Unterbringung für kurze Zeit anbieten."
  RAJ_british_research_deal:0 "Britischer Forschungsdeal"
  RAJ_british_research_deal_desc:0 "Aufgrund unserer jüngsten Fortschritte in vielen wissenschaftlichen Bereichen möchten die Briten gemeinsame militärische Forschung betreiben."
  RAJ_burma_road:0 "Die Burma-Straße"
  RAJ_burma_road_desc:0 "Die Burmastraße wurde 1937 von chinesischen und burmesischen Arbeitern gebaut, um den Briten während des Zweiten Japanisch-Chinesischen Krieges den Nachschub zu erleichtern. Wir sollten diese Straße selbst verbessern, um eine vollständige japanische Vorherrschaft zu verhindern."
  RAJ_peackeeping_operations:0 "Friedenssicherungseinsätze"
  RAJ_peackeeping_operations_desc:0 "Um zur Stabilität in der Region beizutragen, sollten wir unsere eigenen Friedensmissionen starten, um unsere Nachbarn zu schützen und eine Einkreisung durch die Sowjetunion zu verhindern."
  RAJ_the_commonwealth_question:0 "Die Commonwealth-Frage"
  RAJ_the_commonwealth_question_desc:0 "Seit wir bei den Alliierten geblieben sind, betrachtet Großbritannien uns als eines seiner Commonwealths. In unserem Volk stellt sich die Frage, ob wir im britischen Einflussbereich bleiben sollen."
  RAJ_a_shining_light_of_democracy:0 "Ein leuchtendes Licht der Demokratie"
  RAJ_a_shining_light_of_democracy_desc:0 "Wir haben uns sowohl dem Faschismus als auch dem Kommunismus entgegengestellt. Wir haben uns gegen religiöse Konflikte und schreckliche Tragödien gestellt. Wir haben allen Widrigkeiten zum Trotz an unseren demokratischen Werten festgehalten. Wir sind das leuchtende Licht der Demokratie."
  RAJ_the_rise_of_communism:0 "Der Aufstieg des Kommunismus"
  RAJ_the_rise_of_communism_desc:0 "Die Kommunistische Partei Indiens (CPI) ist bereit, ihre Unabhängigkeit mit bewaffneten Konflikten zu erreichen und ihre Unabhängigkeit von Großbritannien zu erklären!"
  RAJ_soviet_friendship:0 "Sowjetische Freundschaft"
  RAJ_soviet_friendship_desc:0 "Wir müssen dafür sorgen, dass wir auf dieser Welt nicht allein sind. Die Sowjets reichen uns die Hand ..."
  RAJ_soviet_aid:0 "Sowjetische Hilfe"
  RAJ_soviet_aid_desc:0 "Die Sowjets sind bereit, unsere Entwicklung zu unterstützen, aber wir müssen entscheiden, welche Art von Hilfe wir wollen, militärisch oder industriell."
  RAJ_steel_elephants:0 "Stahlelefanten"
  RAJ_steel_elephants_desc:0 "Die Sowjets bieten uns an, uns bei der Entwicklung schwerer Panzer zu unterstützen. Wir sollten den Stahlelefanten bauen …"
  RAJ_mass_assault_doctrines:0 "Massenangriffsdoktrinen"
  RAJ_mass_assault_doctrines_desc:0 "Wir sollten der sowjetischen Massenangriffstaktik folgen und billige Infanterieausrüstung in Massen produzieren, während wir Wellen unserer eigenen Männer auf den Feind loslassen."
  RAJ_rapid_industrilization:0 "Rasche Industrialisierung"
  RAJ_rapid_industrilization_desc:0 "Wenn wir eine echte sozialistische Republik werden wollen, müssen wir Stalins Weg der schnellen Industrialisierung folgen."
  RAJ_militarized_schools:0 "Militarisierte Schulen"
  RAJ_militarized_schools_desc:0 "Um mehr Unterstützung für die Armee zu gewinnen, sollte militärischer Unterricht Teil des Lehrplans unserer Schulen sein."
  RAJ_ban_all_parties:0 "Alle Parteien verbieten"
  RAJ_ban_all_parties_desc:0 "Um sicherzustellen, dass der Kapitalismus nicht in die Risse der nationalen Regierungen eindringt, sollten wir alle politischen Parteien verbieten."
  RAJ_workers_unite:0 "Arbeiter, vereinigt euch!"
  RAJ_workers_unite_desc:0 "Wir müssen die Nation zur Unterstützung der glorreichen Revolution mobilisieren, die die Monarchisten und die Kolonialregierung gestürzt hat. Arbeiter, vereinigt euch!"
  RAJ_red_india:0 "Rotes Indien"
  RAJ_red_india_desc:0 "Die Glocke hat für die Kapitalisten und den Maharadscha endlich geläutet. Die Revolution in unserem Land ist vorbei … aber sie muss sich auf andere Länder ausweiten."
  RAJ_subas_bose_way:0 "Subhas Bose Way"
  RAJ_subas_bose_way_desc:0 "Subhas Chandra Bose war eine Ikone des indischen Nationalismus, dessen Ideologie eine Mischung aus Faschismus und Kommunismus war. Subhas war stets Gegner der britischen Kolonialherrschaft und arbeitete sogar mit den Achsenmächten zusammen, um einen Aufstand in Indien anzuzetteln. Später führte er die Azad Hind Fauj, die Indische Nationalarmee, an."
  RAJ_supress_religious_conflict:0 "Unterdrücken Sie den religiösen Konflikt"
  RAJ_supress_religious_conflict_desc:0 "Angesichts der wachsenden Spannungen zwischen der religiösen Mehrheit und den Minderheiten in unserem Land sollten wir die beliebteste Partei, den Hinduismus, unterstützen."
  RAJ_hindu_dominace:0 "Religiöse Mobilisierung "
  RAJ_hindu_dominace_desc:0 "Wir sollten die Religion nutzen, um mehr militärische Unterstützung sowohl von Sikhs als auch von Hindus zu erhalten."
  RAJ_german_and_japanese_development:0 "Axis-unterstützte Entwicklung"
  RAJ_german_and_japanese_development_desc:0 "Mit unserer neu gewonnenen Unabhängigkeit haben wir die Freiheit, selbst über unsere industrielle Basis zu entscheiden. Viele Regierungsmitglieder schlagen vor, dass wir uns entweder an die Japaner oder an die Deutschen wenden, um unsere industriellen Unternehmungen zu finanzieren."
  RAJ_form_the_azad_hind_fauj:0 "Bilden Sie The Azad Hind Fauj"
  RAJ_form_the_azad_hind_fauj_desc:0 "Die Azad Hind Fauj, die Indische Nationalarmee, wurde 1942 während der japanischen Besetzung Burmas von indischen Nationalisten gegründet. Nachdem der erste Anführer der Azad Hind eine andere Vorstellung von ihrer Rolle im japanischen Militärfeldzug hatte, reformierte Subhas Bose die Azad Hind unter seiner Führung. Wir sollten unsere eigenen Elitedivisionen unter der Azad Hind Fauj gründen."
  RAJ_gupt_pulis:0 "Gupt Pulis"
  RAJ_gupt_pulis_desc:0 "Wir sollten unsere eigene Gupt Pulis oder Geheimpolizei gründen, die uns dabei hilft, alle „Probleme“ zu beseitigen, die im Land lauern."
  RAJ_national_planning_commitee:0 "Nationales Planungskomitee"
  RAJ_national_planning_commitee_desc:0 "In dem Buch „Subhas Chandra Bose; Pionier der indischen Planung“ beschreibt er Subhas‘ Pläne für die Zukunft Indiens, mit denen das Land schließlich seine Unabhängigkeit erlangte. Er wollte, dass das Nationale Planungskomitee ihm bei der Industrialisierung Indiens half."
  RAJ_crush_the_mahraja:0 "Zerschmettere den Maharadscha"
  RAJ_crush_the_mahraja_desc:0 "Subhas Bose war stets der Ansicht, dass der Maharadscha vollständig aus der Politik herausgehalten werden müsse, um die nationale Einheit zu stärken. Er sagte auch, wenn sich die Fürsten seiner Revolution anschlossen, könnten sie zu einer Einigung kommen. Wir sollten den Fürstenstaaten unverzüglich Ultimaten stellen."
  RAJ_the_five_year_plan:0 "Der Fünfjahresplan"
  RAJ_the_five_year_plan_desc:0 "Subhas Bose hatte die Effizienz des sowjetischen Fünfjahresplans stets bewundert und wollte seinen eigenen schaffen. Wir sollten seine Pläne umsetzen."
  RAJ_unite_greater_india:0 "Großindien vereinen"
  RAJ_unite_greater_india_desc:0 "Das Konzept eines Großindiens basierte auf der Vereinigung der kulturellen und religiösen Einflusssphären Indiens. Wir müssen Großindien vereinen!"
  RAJ_conquer_the_graveyard:0 "Erobere den Friedhof"
  RAJ_conquer_the_graveyard_desc:0 "Afghanistan wurde im Laufe der Geschichte als „Friedhof der Imperien“ bezeichnet, da es so schwierig war, es in ein Imperium zu integrieren, das jemals versucht hatte, es zu erobern oder zu unterwerfen. Wir werden es vielleicht nicht als Kernstaat in unser Land integrieren können, aber wir werden das Unbesiegbare besiegen!"
  RAJ_reclaim_lesser_india:0 "Kleinindien zurückerobern"
  RAJ_reclaim_lesser_india_desc:0 "Im mittelalterlichen Europa gab es das Konzept der „Drei Indiens“, wobei Mittelindien den Nahen Osten, der indische Subkontinent und schließlich Kleinindien, das heutige Südostasien, umfasste. Viele Gebiete Kleinindiens sind auf die eine oder andere Weise kulturell mit Indien verbunden. Indien wird vereint sein!"
  RAJ_unite_the_him:0 "Vereint den Himalaya"
  RAJ_unite_the_him_desc:0 "Der Himalaya lag schon immer im Einflussbereich Indiens und beherbergt zahlreiche hinduistische und buddhistische heilige Stätten. In Tibet befindet sich einer der legendärsten Orte, der Berg Kailash. "
  RAJ_invasion_of_indonesia:0 "Invasion Indonesiens"
  RAJ_invasion_of_indonesia_desc:0 "Die indonesischen Inseln wurden einst von großen Hindu-Königreichen beherrscht. Wir müssen die Kolonialregierung in der Region stürzen und die Ordnung wiederherstellen."
  RAJ_demand_chinese_lands:0 "Fordern Sie chinesische Ländereien"
  RAJ_demand_chinese_lands_desc:0 "China hat unserem Volk rechtmäßiges tibetisches Land geraubt und hält die von Kriegsherren überrannte Provinz Yunnan in Schach. Diese Gebiete sind stark indisch geprägt. Wir müssen uns zurückholen, was uns gehört!"
  RAJ_conquer_the_philippines:0 "Erobern Sie die Philippinen"
  RAJ_conquer_the_philippines_desc:0 "Wie Indonesien gab es auch auf den Philippinen während der Stammesherrschaft hinduistische und buddhistische Herrscher. Sie müssen wieder mit dem Vaterland vereint werden."
  RAJ_greater_india_established:0 "Großindien gegründet"
  RAJ_greater_india_established_desc:0 "Alle Hindus sind unter einer Flagge vereint. Alle Nationen, die von unserem kulturellen Einfluss betroffen waren, sind vereint. Großindien ist aus der Asche anderer Nationen auferstanden. Jai Hind!"
  RAJ_strengthen_the_caste_system:0 "Stärkung des Kastensystems"
  RAJ_strengthen_the_caste_system_desc:0 "Unsere Kolonialregierung hat stets das Kastensystem unterstützt, um den Maharadscha für sich zu gewinnen. Wir genießen zwar nicht die Unterstützung der Bevölkerung, aber wir sollten das Kastensystem stärken, um unsere Beziehungen zum Maharadscha zu festigen."
  RAJ_divide_india:0 "Indien teilen"
  RAJ_divide_india_desc:0 "Da die einheimische Bevölkerung zwischen zwei Religionen gespalten ist und religiöse Gewalt als alltägliches Phänomen betrachtet, sollten wir Indien in autonome Staaten aufteilen, um solche Aktionen zu stoppen."
  RAJ_forced_mandatory_service:0 "Pflichtdienst"
  RAJ_forced_mandatory_service_desc:0 "Wir müssen eine Armee aufbauen, die unabhängig von den Freiwilligen des Festlands ist, um unsere Grenzen zu sichern. Da die Bevölkerung nicht der Armee beitreten will, hat sie keine andere Wahl."
  RAJ_arrest_political_leaders:0 "Verhaftung politischer Führer"
  RAJ_arrest_political_leaders_desc:0 "Menschen wie Subhas Chandra Bose, Mahatma Gandhi und die Kommunisten untergraben unsere politische Macht im Staat. Wir müssen diese subversiven Aktionen sofort stoppen und diese Revolutionäre verhaften."
  RAJ_revive_the_indian_indeture_system:0 "Beleben Sie das indische Indenture-System wieder"
  RAJ_revive_the_indian_indeture_system_desc:0 "Das indische Schuldknechtsystem war ein System, bei dem 3,5 Millionen verschuldete Inder in die Kolonien in aller Welt verschifft wurden. Viele Inder kehrten nie in ihre Heimat zurück. Viele Weltmächte benötigen heute Fabrikarbeiter und Bauarbeiter. Wir sollten dieses System wiederbeleben."
  RAJ_enact_longer_work_hours:0 "Längere Arbeitszeiten einführen"
  RAJ_enact_longer_work_hours_desc:0 "Der König hat uns gerufen, ihm im Kampf gegen den Faschismus zu helfen. In diesen unsicheren Zeiten muss unser Volk rund um die Uhr arbeiten, um die Armee mit mehr Ausrüstung auszustatten. Wir sollten längere Arbeitszeiten einführen, um ausreichend Nachschub zu gewährleisten."
  RAJ_expansion_of_industry:0 "Ausbau der Industrie"
  RAJ_expansion_of_industry_desc:0 "Indien ist weitgehend unterentwickelt und wir können dies zu unserem Vorteil nutzen. Wir können unsere Industrie rasch ausbauen und so das Land auf den nächsten Krieg vorbereiten."
  RAJ_purge_corruption:0 "Korruption beseitigen"
  RAJ_purge_corruption_desc:0 "Die Kolonialregierung ist voller Korruption und wenn wir unsere Pläne fortsetzen wollen, müssen wir dem ein Ende setzen."
  RAJ_crush_civil_disobendice:0 "Zivilen Ungehorsam zerschlagen"
  RAJ_crush_civil_disobendice_desc:0 "Die Unabhängigkeitsbewegung ist Zeitverschwendung, wird aber vom indischen Volk mit Nachdruck unterstützt. Dieser Akt zivilen Ungehorsams ist inakzeptabel und muss gestoppt werden. Wir werden die Unabhängigkeitsbewegung zerschlagen."
  RAJ_isolationism:0 "Isolationismus"
  RAJ_isolationism_desc:0 "Die Welt wird durch Kriege zerrissen, und der einzige Weg, dies zu vermeiden, ist völliger Isolationismus. Nur so kann die Zukunft des Raj gesichert werden."
  RAJ_long_live_the_king:0 "Lang lebe der König!"
  RAJ_long_live_the_king_desc:0 "Wir haben Indien endlich für Edward VIII. gesichert. Lang lebe der König!"

###EVENTS

 raj.1.t:0 "Sowjetische Hilfe"
   raj.1.d:0 "Die Sowjets sind bereit, uns entweder bei der Entwicklung unserer Militärtechnologie oder bei der Fortsetzung unserer Industrialisierung zu unterstützen. Wir müssen uns für das eine oder das andere entscheiden."
   raj.1.a:0 "Militärische Entwicklung."
   raj.1.b:0 "Industrielle Entwicklung."﻿
   raj.2.t:0 "Indien erklärt seine Unabhängigkeit"
   raj.2.d:0 "Die Führer der verschiedenen indischen Unabhängigkeitsbewegungen haben die Macht übernommen. Sie haben ihre Unabhängigkeit erlangt, wollen aber weiterhin bei ihren Verbündeten bleiben. Was sollen wir tun?"
   raj.2.a:0 "Sie liegen immer noch in UNSEREM Einflussbereich …"
   raj.2.b:0 "Wir werden den Aufstand niederschlagen!"﻿
   raj.3.t:0 "Die Briten haben uns erlaubt, unsere Unabhängigkeit zu bewahren"
   raj.3.d:0 "Die Briten haben beschlossen, uns nicht zu unterwerfen, sondern weiterhin in der Fraktion der Alliierten zu bleiben."
   raj.3.a:0 "Jai Hind!"
   raj.4.t:0 "Indien fordert die Rückgabe von Goa"
   raj.4.d:0 "Indien hat die Rückgabe von Goa gefordert, einer Kolonie, die wir seit 1510 haben."
   raj.4.a:0 "Goa gehört zum Volk Indiens."
   raj.4.b:0 "Goa ist zu Recht portugiesisch!"﻿
   raj.5.t:0 "Portugal weigert sich, Goa zurückzugeben"
   raj.5.d:0 "Die Portugiesen haben sich geweigert, Goa seinen rechtmäßigen Besitzern zurückzugeben."
   raj.5.a:0 "Operation Vijay (Sieg) gestartet."﻿
   raj.6.t:0 "Portugal kehrt nach Goa zurück"
   raj.6.d:0 "Die Portugiesen haben beschlossen, Goa an das indische Volk zurückzugeben."
   raj.6.a:0 "Wir heißen die Menschen von Goa zu Hause willkommen."
   raj.8.t:0 "Indien verlangt unsere Inseln im Indischen Ozean."
   raj.8.d:0 "Indien hat um Ceylon, die Malediven und die Andamanen gebeten"
   raj.8.a:0 "Es gehört dem indischen Volk."
   raj.8.b:0 "Es gehört den Briten!"﻿
   raj.10.t:0 "Die Briten lehnen unsere Anfragen ab."
   raj.10.d:0 "Die Briten haben unseren Antrag auf Rückgabe der rechtmäßigen Indianergebiete abgelehnt."
   raj.10.a:0 "Wir holen uns zurück, was uns gehört!"
   raj.9.t:0 "Die Briten haben unsere Anfrage akzeptiert"
   raj.9.d:0 "Die Briten haben unseren Forderungen nach der Rückgabe von Ceylon und anderen Inseln entsprochen."
   raj.9.a:0 "Die Briten haben eine weise Entscheidung getroffen."
   raj.11.t:0 "Indien fordert die Rückgabe von Pondicherry"
   raj.11.d:0 "Indien hat uns höflich gebeten, unsere Kolonie Pondicherry zurückzugeben. Was sollen wir tun?"
   raj.11.a:0 "Pondicherry gehört dem indischen Volk."
   raj.11.b:0 "Pondicherry gehört zur Französischen Republik!"﻿
   raj.12.t:0 "Frankreich lehnt ab"
   raj.12.d:0 "Frankreich hat sich geweigert, die Kolonie Pondicherry zurückzugeben."
   raj.12.a:0 "Pondicherry gehört dem indischen Volk!"
   raj.13.t:0 "Die Franzosen kehren nach Pondicherry zurück"
   raj.13.d:0 "Frankreich hat uns die Kolonie Pondicherry geschenkt."
   raj.13.a:0 "Indien wurde wiederhergestellt!"
   raj.14.t:0 "Indien fordert Indochina"
   raj.14.d:0 "Die neue faschistische Regierung in Indien versucht, ein sogenanntes „Großindien“ zu schaffen und verlangt von uns, Indochina abzutreten."
   raj.14.a:0 "Die Deutschen sind schon näher an uns dran, wir brauchen keinen zweiten Krieg."
   raj.14.b:0 "Wir werden niemals mit Faschisten zusammenarbeiten!"﻿
   raj.15.t:0 "Frankreich bereitet seine Verteidigung vor"
   raj.15.d:0 "Die Franzosen bereiten ihre Verteidigung in Indochina vor, wir müssen jetzt handeln."
   raj.15.a:0 "Wenn sie Krieg wollen, werden sie Krieg haben."
   raj.16.t:0 "Die Franzosen geben nach"
   raj.16.d:0 "Die Franzosen haben unseren Forderungen nachgegeben und ziehen sich aus Indochina zurück."
   raj.16.a:0 "Sie konnten einem bewaffneten Konflikt nur knapp entgehen."
   raj.17.t:0 "Indien fordert Malaysia"
   raj.17.d:0 "Mit dem Aufstieg des Faschismus in Indien begannen sie mit der Ausweitung ihrer Grenzen und fordern nun Malaysia vom Imperium."
   raj.17.a:0 "Gut, sie können mit den Japanern verhandeln."
   raj.17.b:0 "Wir machen keine Geschäfte mit Faschisten!"﻿
   raj.18.t:0 "Großbritannien rüstet sich für einen Krieg auf der Halbinsel."
   raj.18.d:0 "Großbritannien verstärkt derzeit seine malaysische Garnison, wir müssen jetzt handeln."
   raj.18.a:0 "Jai Hind!"
   raj.19.t:0 "Großbritannien gibt nach"
   raj.19.d:0 "Die Briten haben unseren Forderungen nachgegeben und verlassen Malaysia."
   raj.19.a:0 "Die Briten fallen auseinander."
   raj.20.t:0 "Indien fordert Indonesien"
   raj.20.d:0 "Indien hat von uns die Übergabe unserer indonesischen Kolonien verlangt."
   raj.20.a:0 "Wir sind nicht in der Lage, unsere Kolonien zu verteidigen, wir müssen sie aufgeben."
   raj.20.b:0 "Der niederländische Löwe wird wieder brüllen!"﻿
   raj.21.t:0 "Die Niederländer haben unsere Forderungen abgelehnt."
   raj.21.d:0 "Die Niederländer haben sich geweigert, nachzugeben."
   raj.21.a:0 "Sie werden zerquetscht werden!"
   raj.22.t:0 "Die Niederländer haben nachgegeben"
   raj.22.d:0 "Die Niederländer haben einen formellen Vertrag unterzeichnet, in dem sie uns den Großteil ihrer Kolonien überlassen."
   raj.22.a:0 "Der lauernde Tiger schlägt wieder zu."
   raj.23.t:0 "Axis Assistied Development"
   raj.23.d:0 "Die Achsenmächte sind bereit, uns bei der Entwicklung unseres Landes zu helfen, sei es militärisch oder industriell."
   raj.23.a:0 "Militärische Entwicklung."
   raj.23.b:0 "Industrielle Entwicklung."﻿
   raj.24.t:0 "Indien fordert Yunnan und Xikang"
   raj.24.d:0 "Die Große Indische Republik hat die Provinzen Yunnan und Xikang gefordert. Was sollen wir tun?"
   raj.24.a:0 "Wir müssen sie ausliefern."
   raj.24.b:0 "Wir werden unser Land nicht faschistischen Kriegsherren überlassen!"﻿
   raj.25.t:0 "China ist zurückgegangen"
   raj.25.d:0 "China weigert sich, unseren Forderungen nachzugeben und bereitet sich auf einen Krieg vor."
   raj.25.a:0 "Wir werden die Chinesen vernichten, genau wie alle anderen Invasoren!"
   raj.26.t:0 "Die Chinesen geben nach."
   raj.26.d:0 "Die Chinesen haben uns die von uns geforderten Provinzen übergeben."
   raj.26.a:0 "Exzellent."
   raj.27.t:0 "Die Commonwealth-Frage"
   raj.27.d:0 "Jetzt ist es an der Zeit zu entscheiden, ob wir bei den Briten und dem Commonwealth bleiben oder ob wir austreten und unseren eigenen Weg gehen."
   raj.27.a:0 "Gemeinsam sind wir stark"
   raj.27.b:0 "Die Zeit für die vollständige Unabhängigkeit ist gekommen"﻿
   raj.28.t:0 "Indien verlässt das Commonwealth"
   raj.28.d:0 "Heute hat Indien offiziell seinen Austritt aus dem Commonwealth angekündigt."
   raj.28.a:0 "Es ist ein schwarzer Tag für Großbritannien und seine Kolonien"
   raj.29.t:0 "Indien bleibt im Commonwealth."
   raj.29.d:0 "Indien hat beschlossen, im Commonwealth zu bleiben."
   raj.29.a:0 "Exzellent."


