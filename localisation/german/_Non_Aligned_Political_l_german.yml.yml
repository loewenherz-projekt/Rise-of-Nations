 election.55.t:0 "Wahl: Parteilose Mehrheit"
 election.55.d:0 "Diese Wahl hat verheerende Folgen für die Institution, die sie repräsentiert. Die Mehrheit der Bevölkerung hat für eine unabhängige Partei gestimmt, die Wahlen abschaffen und einen autokratischen Herrscher einsetzen will. Während viele erwägen, zu den Waffen zu greifen, um gegen diese Verletzung der demokratischen Ideale zu kämpfen, die ihnen dieses Mandat überhaupt erst ermöglicht haben, befürworten andere den Einsatz von Gewalt, um ihre Ideale nur weiter zu festigen."
 election.55.a:0 "Es ist ein schwarzer Tag für [Root.GetName], aber das Volk hat gesprochen."
 election.55.b:0 "Wir werden unsere Freiheit nicht kampflos aufgeben!"
 political.41.t:0 "Ungebundenheit auf dem Vormarsch"
 political.41.d:0 "Monarchisten erheben sich weltweit gegen ihre Unterdrücker, und in der [Root.GetAdjective] Bewegung der Blockfreien machen sich neue Stimmen breit. Sie bezeichnen die Herrschaft von [Root.GetRulingParty] als Diktatur und fordern, sie mit allen Mitteln zu stürzen. Ob diese Mittel von innen oder von außen kommen, bleibt abzuwarten."
 political.41.a:0 "Möglicherweise gibt es in der Regierung selbst Leute, die solche Ideen unterstützen."
 political.41.a.tt:0 "Erhöht die Chance auf interne Unterstützung für einen Putsch ohne Bündnis."
 political.41.b:0 "Eine Bewegung für das Volk muss die Unterstützung des Volkes suchen."
 political.41.b.tt:0 "Erhöht die Chance auf öffentliche Unterstützung für einen Aufstand der Blockfreien."
 political.29.t:0 "Referendum zur Forderung der Nichtangepassten"
 political.29.d:0 "Die schnell wachsende [Root.GetAdjective] Bewegung der Unabhängigen hat nie behauptet, sie bräuchte für eine Machtergreifung die Unterstützung der Mehrheit, sondern hofft, die Nation nach der Etablierung ihrer Herrschaft unter ihrer Führung zu einen. Dennoch scheint ihre öffentliche Unterstützung rapide gewachsen zu sein. Viele Unabhängige bezeichnen [Root.GetLeader] nun als Heuchler, der vorgibt, die Wünsche des Volkes zu vertreten, sich in Wirklichkeit aber taub stellt.\n\nDer Aufruf zu einem Referendum wurde von den Mitgliedern der [Root.GetRulingParty] bisher als typischer Versuch zur Störung des Systems abgetan, aber immerhin ist es eine politische Maßnahme. Wenn wir jetzt nicht handeln, könnten die Unabhängigen den gewaltsamen Kampf als besseren Weg zur Macht wählen."
 political.29.a:0 "Unterdrücken Sie diese hasserfüllte Bewegung!"
 political.29.b:0 "Schenken Sie ihnen keine Beachtung."
 political.29.c:0 "Wenn das Volk es will, werden wir das Referendum abhalten."
 political.22.t:0 "Unabhängige Unterstützer erheben sich"
 political.38.d:0 "Nach der Ablehnung ihres Referendums verloren die wenigen Reformer der Blockfreien Bewegung in [Root.GetName] rasch an Einfluss gegenüber den radikaleren Elementen. Da [Root.GetRulingParty] die öffentliche Unterstützung für die vorgeschlagenen Reformen nicht zur Kenntnis nahm, verbreitete sich die romantische Sicht der Revolution allmählich, und die Anführer der Bewegung wurden zu denjenigen, die am leichtesten einen Aufstand anzetteln konnten. Diese Unruhen haben sich inzwischen zu einem umfassenden Bürgerkrieg entwickelt, bei dem die Zukunft der Nation auf dem Spiel steht."
 political.38.a:0 "Wir werden nicht zulassen, dass sie unser Land ruinieren!"
 political.38.b:0 "Das Feuer der Revolution muss mit dem Blut der Unterdrücker gelöscht werden!"
