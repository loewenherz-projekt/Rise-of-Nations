marpac_against_button:0 "§RStimmen Sie gegen diesen Antrag!§"
marpac_for_button:0 "§GUnterstützen Sie diesen Antrag§!"
marpac_voting_countries:0 "§GWahlberechtigte Länder§"
MARPAC_resolution_80:0 "§RResolution 80§!: Autorisierung gemeinsamer Militäraktionen zur Unterstützung Südkoreas während des Koreakrieges\n\nVorgeschlagen von: §G[USA.GetName]§!\n\nNach Ausbruch des Koreakrieges sind zahlreiche Konterrevolutionäre nach Nordkorea geflohen und stellen eine Bedrohung für die Stabilität in der Region dar. Als Reaktion auf die §YNordkoreanische Invasion in Südkorea§! wird der Europäische Rat gebeten, die Autorisierung militärischer Maßnahmen zur Unterstützung Südkoreas bei der Abwehr der Aggression zu prüfen. Der Europäische Rat ist sich der Dringlichkeit der Lage und der Notwendigkeit raschen Handelns zum Schutz der Souveränität und Unabhängigkeit Südkoreas bewusst. Daher wird vorgeschlagen, eine gemeinsame Militäroperation zur Unterstützung Südkoreas zu starten. Der §G[USA.GetName]§Y schlägt dem §YEuropäischen Rat§Y eine Militäroperation gegen Nordkorea vor."
MARPAC_resolution_40:0 "§RResolution 40§!: Autorisierung gemeinsamer rechtlicher Schritte im Rahmen der Nürnberger Prozesse\n\nVorgeschlagen von: §G[USA.GetName]§!\n\nNach dem Ende des Zweiten Weltkriegs wurden zahlreiche hochrangige Beamte und Führer des Nazi-Regimes gefangen genommen und inhaftiert. Als Reaktion auf die §YNürnberger Prozesse§! wird der Europäische Rat gebeten, die Autorisierung gemeinsamer rechtlicher Schritte zur strafrechtlichen Verfolgung der Verantwortlichen für Kriegsverbrechen, Verbrechen gegen die Menschlichkeit und andere während des Krieges begangene Gräueltaten zu prüfen. Der Europäische Rat erkennt die Notwendigkeit an, für Gerechtigkeit zu sorgen und die Rechenschaftspflicht für diese abscheulichen Taten sicherzustellen. Daher wird vorgeschlagen, koordinierte rechtliche Schritte zur Unterstützung der Nürnberger Prozesse einzuleiten. Der §G[USA.GetName]§Y schlägt dem §YEuropäischen Rat§Y vor, rechtliche Schritte gegen die Angeklagten einzuleiten."
MARPAC_resolution_240:0 "§RResolution 240§!: Anerkennung der aus dem Zusammenbruch der Sowjetunion hervorgegangenen neuen Staaten\n\nVorgeschlagen von: §G[EUR.getname]§!\n\nNach dem Zusammenbruch der Sowjetunion sind mehrere neue unabhängige Staaten entstanden, darunter Estland, Lettland, Litauen, Weißrussland, die Ukraine, Moldawien, Georgien, Armenien, Aserbaidschan, Kasachstan, Usbekistan, Turkmenistan, Kirgisistan und Tadschikistan. Als Reaktion auf diese bedeutende geopolitische Veränderung wird der Europäische Rat gebeten, die offizielle Anerkennung dieser neuen unabhängigen Staaten in Erwägung zu ziehen. Der Europäische Rat erkennt an, wie wichtig es ist, diese Nationen bei der Etablierung ihrer Souveränität und ihrem Streben nach internationaler Legitimität zu unterstützen. Daher wird vorgeschlagen, dass der Europäische Rat die Unabhängigkeit dieser Staaten formell anerkennt und ihnen Unterstützung für ihren Übergang anbietet. Der §G[EUR.GetName]§Y schlägt dem §YEuropäischen Rat§Y vor, die aus der Sowjetunion hervorgegangenen neuen Staaten anzuerkennen und zu unterstützen."
marpac.voting.t:0 "Derzeit findet weltweit eine Abstimmung statt!"
marpac.voting.d:0 "Wenn Sie die Teilnahmekriterien erfüllen, sind Sie herzlich eingeladen, an diesem wichtigen Referendum teilzunehmen. Ihre Stimme ist entscheidend für den Ausgang dieser wichtigen Entscheidung, die Millionen Menschen in ganz Europa betreffen wird. Bitte informieren Sie sich in Ihrem Politikmenü über den Stand der Abstimmung."
marpac.voting.a:0 "Vielen Dank für Ihre Bewertung!"
marpac.voting.b:0 "Stummschalten der Benachrichtigung bei Abstimmungen"
marpac.3.t:0 "Abstimmung angenommen: Die Resolution wurde angenommen"
marpac.3.d:0 "Der Europäische Rat hat die vorgeschlagene Resolution erfolgreich verabschiedet."
marpacnews.a:0 "Es lebe die Demokratie!"
marpac.4.t:0 "Abstimmung fehlgeschlagen: Die Resolution wurde abgelehnt"
marpac.4.d:0 "Die Entschließung wurde vom Europäischen Rat abgelehnt. Trotz ausführlicher Diskussionen und Debatten fand der Vorschlag nicht die notwendige Unterstützung der Mitgliedstaaten."
marpac.4.a:0 "Es lebe Europa!"
MARPAC_resolution_130:0 "§RResolution 130§!: Vereinigung Chinas nach der Niederlage Japans\n\nVorgeschlagen von: §G[CHI.GetName]§!\n\nNach der Niederlage Japans steht China an einem Wendepunkt. Die nationalistische Regierung unter Führung von §G[CHI.GetLeader]§! erkennt die dringende Notwendigkeit einer Vereinigung der Nation, um Stabilität, Frieden und Wohlstand für alle Bürger zu gewährleisten. Die Ära der Zersplitterung und des Regionalismus muss enden, und ein geeintes China muss aus der Asche des Krieges auferstehen. Die nationalistische Regierung schlägt allen Kriegsherren in China eine mutige und historische Resolution vor: Verbündet euch mit den Nationalisten und tragt zur Schaffung eines starken, zentralisierten Staates bei. Diese Resolution fordert die Kriegsherren auf, der nationalistischen Regierung die Treue zu schwören und so Teil eines geeinten Chinas zu werden. Dadurch werden sie zu Marionetten des nationalistischen Chinas und verlieren ihre Autonomie, erhalten aber die Möglichkeit, Teil eines größeren nationalen Projekts zu sein. Es steht viel auf dem Spiel. Die Annahme dieses Vorschlags bedeutet, zur Vereinigung und Stabilisierung Chinas beizutragen und sich einen Platz in der Geschichte einer wiedererstarkten Nation zu sichern. Die Ablehnung dieses Vorschlags wird jedoch als Kriegshandlung ausgelegt, als eine Erklärung, die die Kriegsherren in direkten Widerspruch zum nationalen Interesse stellt. Der §G[CHI.GetName]§Y ruft alle chinesischen Kriegsherren dazu auf, für diese Resolution zu stimmen. Dies ist ein entscheidender Moment, der die Zukunft Chinas bestimmen wird. Durch ein Bündnis mit den Nationalisten haben die Kriegsherren die Chance, Teil eines vereinten, wohlhabenden und starken Chinas zu werden. Die nationalistische Regierung ist bereit, die Nation in eine bessere Zukunft zu führen, was jedoch nur mit der Zusammenarbeit und Unterstützung aller Regionalmächte erreicht werden kann. Daher wird allen chinesischen Kriegsherren vorgeschlagen, sich zu entscheiden, ob sie sich auf die Seite der nationalistischen Regierung stellen und die Vision eines vereinten chinesischen Staates unterstützen oder die Konsequenzen tragen, als Feinde der Nation angesehen zu werden. §G[CHI.GetName]§Y schlägt allen chinesischen Kriegsherren vor, sich auf die Seite der nationalistischen Regierung zu stellen und den vereinten chinesischen Staat zu unterstützen, um Frieden, Stabilität und Wohlstand für alle zu gewährleisten."
MARPAC_resolution_50:0 "§RResolution 50§!: Präventivschlag gegen das monarchistische Deutschland\n\nVorgeschlagen von: §G[ENG.GetName]§!\n\nIn der Zwischenkriegszeit hat Deutschland einen bedeutenden politischen Wandel durchgemacht und ein monarchistisches Regime wiederhergestellt, das nun das Mächtegleichgewicht in Europa bedroht. Das neu gegründete monarchistische Deutschland unter der Führung von §G[GER.GetLeader]§ hat aggressive Absichten gezeigt und ist bereit, militärische Invasionen in Nachbarstaaten zu starten und so Frieden und Stabilität auf dem gesamten Kontinent zu stören. Angesichts dieser unmittelbaren Bedrohung wird der §YEuropäische Rat§Y gebeten, einen Präventivschlag gegen Deutschland in Erwägung zu ziehen, um diese wachsende Gefahr zu neutralisieren, bevor sie sich zu einem umfassenden Konflikt entwickeln kann. Diese Resolution fordert eine Koalition europäischer Mächte auf, schnell und entschlossen zu handeln und eine koordinierte militärische Anstrengung zu starten, um das monarchistische Regime zu stürzen und die Ordnung in Deutschland wiederherzustellen. Es steht außerordentlich viel auf dem Spiel. Untätigkeit könnte zu weitreichender Verwüstung führen, während Deutschland seine expansionistische Agenda fortsetzt und möglicherweise den gesamten Kontinent in einen langwierigen und zerstörerischen Krieg hineinzieht. Ein Präventivschlag ist zwar mit Risiken verbunden, aber die praktikabelste Option, um die Stabilität Europas zu schützen und einen größeren, katastrophalen Konflikt zu verhindern. Der §G[ENG.GetName]§Y ruft alle Mitgliedsstaaten des Europäischen Rates dazu auf, über diese Resolution zu beraten. Dies ist ein kritischer Zeitpunkt für Europa, da die heute ergriffenen Maßnahmen die Zukunft des Kontinents prägen werden. Mit der Unterstützung dieser Resolution verpflichten sich die Mitgliedsstaaten zu einer gemeinsamen Front gegen Aggressionen und stellen die kollektive Sicherheit über individuelle Interessen. Daher wird vorgeschlagen, dass der Europäische Rat eine präventive Militärintervention gegen das monarchistische Deutschland billigt. Die Annahme dieses Vorschlags würde eine konzertierte Anstrengung einleiten, um die Bedrohung zu neutralisieren und den Frieden in Europa zu bewahren. Eine Ablehnung würde den Kontinent jedoch den deutschen Ambitionen aussetzen und zu weitreichenden Konflikten und Instabilität führen. Der §G[ENG.GetName]§Y schlägt dem §YEuropäischen Rat§Y vor, einen Präventivschlag gegen das monarchistische Deutschland zu unterstützen und durchzuführen, um den Schutz des Friedens, der Stabilität und der Sicherheit in Europa zu gewährleisten."
join_the_un:0 "Treten Sie den Vereinten Nationen bei"
join_the_un_desc:0 "Der Antrag auf Beitritt zu den Vereinten Nationen stellt einen entscheidenden Schritt in der internationalen Diplomatie dar. Die 1945 gegründeten Vereinten Nationen haben sich zum Ziel gesetzt, Frieden, Sicherheit und die Zusammenarbeit zwischen ihren Mitgliedsstaaten weltweit zu fördern. Mit dem Beitritt verpflichten sich die Nationen, internationale Friedensbemühungen, Menschenrechte, nachhaltige Entwicklung und gemeinsame Lösungen für globale Herausforderungen zu unterstützen. Die Entscheidung, den Vereinten Nationen beizutreten, wird oft als Schritt hin zu mehr internationaler Zusammenarbeit und Beteiligung an der globalen Ordnungspolitik gesehen. Diese Abstimmung entscheidet darüber, ob ein Land seinen Platz in der globalen Staatengemeinschaft einnimmt und gemeinsam an der Lösung globaler Probleme arbeitet."
voting_add_new_UN_member:0 "§RResolution 300§!: Autorisierung zur Aufnahme von §G[?global.UN_adding_target.GetNameDefCap]§! in die Vereinten Nationen\n\nVorgeschlagen von: §G[?global.UN_adding_target.GetNameDefCap]§!\n\nNach dem jüngsten Antrag auf Mitgliedschaft hat §G[?global.UN_adding_target.GetNameDefCap]§! seine Verpflichtung zum Ausdruck gebracht, die in der Charta der Vereinten Nationen festgelegten Grundsätze und Verpflichtungen einzuhalten. Als Reaktion auf diese Anfrage wird der Europäische Rat gebeten, die Aufnahme von §G[?global.UN_adding_target.GetNameDefCap]§! in die Vereinten Nationen zu unterstützen. Der Europäische Rat erkennt die Bedeutung einer umfassenden internationalen Zusammenarbeit und die Vorteile einer Ausweitung der UN-Mitgliedschaft auf neue Nationen an, die zu Frieden und Sicherheit in der Welt beitragen. Daher wird vorgeschlagen, dass der Europäische Rat den Antrag von §G[?global.UN_adding_target.GetNameDefCap]§! auf Mitgliedschaft in den Vereinten Nationen billigt. Der §G[?global.UN_adding_target.GetNameDefCap]§Y schlägt dem §YEuropäischen Rat§Y vor, die Aufnahme von §G[?global.UN_adding_target.GetNameDefCap]§! in die Vereinten Nationen zu unterstützen."
MARPAC_resolution_301:0 "§RResolution 301§!: Aufruf zum Waffenstillstand mit §G[?global.UN_call_for_ceasefire.GetNameDefCap]§!\n\nVorgeschlagen von: §G[?global.UN_call_for_ceasefire.GetNameDefCap]§!\n\nAngesichts des anhaltenden Konflikts und der eskalierenden Gewalt zwischen §G[?global.UN_call_for_ceasefire.GetNameDefCap]§! und seinen Gegnern wird der Europäische Rat dringend gebeten, einen sofortigen Waffenstillstand und die Rückkehr zum Status quo vor dem Krieg für alle Seiten zu fordern. Angesichts der schwerwiegenden humanitären Folgen und der destabilisierenden Wirkung anhaltender Feindseligkeiten wird ein Waffenstillstand vorgeschlagen, um Verhandlungen zu erleichtern und der betroffenen Zivilbevölkerung Hilfe zu leisten. Der §G[?global.UN_call_for_ceasefire.GetNameDefCap]§Y schlägt dem §YEuropäischen Rat§Y vor, die Bemühungen um eine friedliche Lösung durch ein formelles Waffenstillstandsabkommen zu unterstützen, das für alle beteiligten Parteien die Bedingungen vor dem Krieg wiederherstellt."
MARPAC_resolution_302:0 "§RResolution 303§!: Militärische Hilfe an §G[?global.UN_call_for_aid.GetNameDefCap]§! senden\n\nVorgeschlagen von: §G[?global.UN_call_for_aid.GetNameDefCap]§!\n\nAngesichts der kritischen Sicherheitslage in §G[?global.UN_call_for_aid.GetNameDefCap]§! wird der Europäische Rat dringend gebeten, die Entsendung militärischer Hilfe in Erwägung zu ziehen, um die Regierungstruppen in ihrem Kampf gegen aufständische Gruppen zu unterstützen und die Stabilität in der Region wiederherzustellen. Angesichts des Bedarfs an Verteidigungsausrüstung, Ausbildung und logistischer Unterstützung wird vorgeschlagen, ein militärisches Hilfspaket zu entsenden, um die Verteidigungsfähigkeiten von §G[?global.UN_call_for_aid.GetNameDefCap]§! zu stärken. Der §G[?global.UN_call_for_aid.GetNameDefCap]§Y appelliert an den §YEuropäischen Rat§Y, die Bereitstellung militärischer Hilfe zu genehmigen und zu erleichtern, um die Souveränität und Sicherheit der Nation zu gewährleisten."
MARPAC_voting_in_process:0 "Derzeit findet weltweit eine Abstimmung statt!"
cooldownunvotecountry:0 "Unser Land hat kürzlich gewählt"
cooldownunvoteglobal:0 "Es gab kürzlich eine Abstimmung"
call_for_ceasefire:0 "Aufruf zu einem Waffenstillstand"
united_nations:0 "Vereinte Nationen"
united_nations_desc:0 "Die Vereinten Nationen wurden 1945 mit dem Ziel gegründet, Frieden und Sicherheit weltweit zu fördern, die Menschenrechte zu wahren und die soziale und wirtschaftliche Entwicklung weltweit zu fördern. Als zentrale Drehscheibe der Diplomatie bringt die UNO ihre Mitgliedsstaaten zusammen, um komplexe globale Herausforderungen durch Zusammenarbeit und Dialog zu bewältigen. Die Organisation ist bekannt für ihre Friedensmissionen, humanitäre Hilfe und ihre Bemühungen um nachhaltige Entwicklungsziele. Über verschiedene Räte, Versammlungen und Agenturen versucht die UNO, Konflikte zu schlichten, gefährdete Bevölkerungsgruppen zu unterstützen und globale Partnerschaften zu fördern. Sie spielt eine zentrale Rolle bei der Gestaltung des Völkerrechts und der Etablierung von Normen, die Nationen zu einem friedlichen Zusammenleben führen. Die Resolutionen und Initiativen der UNO zielen auf eine stabilere und gerechtere Welt ab, in der die Nationen gemeinsam zusammenarbeiten, um drängende globale Probleme zu lösen. [?UNA.storedarms] Gelagerte Waffen können an Länder abgegeben werden, die sich im Krieg befinden, und leisten so wichtige Unterstützung zur Stabilisierung von Konfliktregionen und zum Schutz von Zivilisten."
united_nations:0 "§BUnitätsstaaten§!"
release_arms:0 "Arme loslassen"
release_arms_desc:0 "§GDie Entscheidung zur §BFreigabe von Waffen§! beinhaltet die Bereitstellung gelagerter Waffen für Konfliktländer. Diese Maßnahme wird häufig ergriffen, um Länder zu unterstützen, die sich im Krieg befinden oder mit erheblichen Sicherheitsproblemen konfrontiert sind. Mit der Freigabe dieser Waffen wollen wir die Verteidigungsfähigkeit unserer Verbündeten stärken und Regionen in Unruhen stabilisieren.\n\n§RDiese Maßnahme unterstreicht unser Engagement für internationale Sicherheit§! und humanitäre Hilfe. Sie spiegelt unsere strategischen Prioritäten bei der Bewältigung globaler Konflikte und der Unterstützung von Friedensbemühungen wider.\n\n§YGelagerte Waffen können von bedürftigen Ländern genutzt werden, um ihre Verteidigung zu stärken und in Zeiten von Unruhen zur Wahrung des Friedens§! beizutragen. Solche Entscheidungen werden unter sorgfältiger Abwägung ihrer möglichen Auswirkungen auf die globale Stabilität und Sicherheit getroffen.\n\n§M[?UNA.storedarms]§! §GAktueller Bestand an gelagerten Waffen§!, der zur Freigabe bereitsteht, um sicherzustellen, dass die Ressourcen effektiv zur Unterstützung internationaler Friedenssicherungs- und Konfliktlösungsbemühungen eingesetzt werden."
united_nations_desc:0 "Die Vereinten Nationen, gegründet 1945, dienen als Hoffnungsträger für Frieden und Sicherheit in der Welt. Ihre Mission ist es, die internationale Zusammenarbeit zu fördern, die Menschenrechte zu schützen und eine nachhaltige soziale und wirtschaftliche Entwicklung weltweit zu fördern. Als zentrale Drehscheibe der Diplomatie vereint die UNO ihre Mitgliedsstaaten, um die komplexesten Herausforderungen der Welt durch Zusammenarbeit und Dialog zu bewältigen. Bekannt für ihre Friedensmissionen, ihre humanitäre Hilfe und ihre Bemühungen um die Erreichung der Ziele für nachhaltige Entwicklung, spielen die Vereinten Nationen eine zentrale Rolle bei der Gestaltung des Völkerrechts und der Festlegung von Normen, die Nationen zu einem friedlichen Zusammenleben führen. Mit ihren Resolutionen und Initiativen strebt die UNO eine stabilere und gerechtere Welt an, in der die gemeinsamen Maßnahmen der Nationen zur Bewältigung drängender globaler Probleme harmonisiert werden. Gelagerte Waffen können an Länder freigegeben werden, die sich im Krieg befinden, und leisten so entscheidende Unterstützung bei der Stabilisierung von Konfliktregionen und beim Schutz des Lebens der Zivilbevölkerung."
call_for_ceasefire_desc:0 "Angesichts der aktuellen Lage rufen wir zu einem Waffenstillstand auf. Diese Entscheidung ist eine Reaktion auf den anhaltenden Konflikt und zielt darauf ab, die Feindseligkeiten zwischen den Kriegsparteien zu beenden. Mit der Einleitung eines Waffenstillstands wollen wir Verhandlungskanäle öffnen, die Zahl der Opfer reduzieren und ein förderliches Umfeld für Friedensgespräche schaffen. Dieser Schritt spiegelt unser Engagement für die Beendigung des Konflikts und die Erzielung einer Lösung wider, die allen Beteiligten zugutekommt. Er ist ein wichtiger Schritt zur Wiederherstellung der Stabilität und zur Sicherung einer friedlichen Zukunft."
reject_all_sphere_requests:0 "Alle Sphere-Anfragen ablehnen"
reject_all_sphere_requests_desc:0 "Um unsere nationale Souveränität und Unabhängigkeit zu wahren, haben wir beschlossen, alle Anträge auf Beitritt zum Einflussbereich anderer Länder abzulehnen. Diese Entscheidung stellt sicher, dass unser Land frei von externer Kontrolle und Einfluss bleibt und wir unseren eigenen Weg verfolgen können, ohne den Agenden mächtigerer Nationen unterworfen zu sein. Mit dieser Haltung senden wir eine klare Botschaft an die internationale Gemeinschaft: Unser Land lässt sich nicht von externen Kräften beeinflussen oder manipulieren. Wir werden künftig keine weiteren Anträge auf Beitritt zum Einflussbereich anderer Länder mehr berücksichtigen."
donate_arms_to_UN:0 "Spenden Sie Waffen an die Vereinten Nationen"
donate_arms_to_UN_desc:0 "Um die internationalen Friedensbemühungen zu unterstützen und die globale Sicherheit zu stärken, haben wir beschlossen, einen erheblichen Teil unserer militärischen Ausrüstung an die UN zu spenden. Diese Geste des guten Willens soll die Fähigkeiten der internationalen Friedenstruppen stärken und zur Wahrung der globalen Stabilität beitragen. Mit der Waffenlieferung an die UN bekräftigen wir unser Engagement für kollektive Sicherheit und zeigen, dass wir Konflikte kooperativ statt einseitig lösen wollen."
request_peacekeepers:0 "Fordern Sie Friedenstruppen von den Vereinten Nationen an"
request_peacekeepers_desc:0 "Angesichts anhaltender Konflikte und Instabilität haben wir beschlossen, die Entsendung von Friedenstruppen der UN anzufordern. Ziel dieser Anfrage ist es, Stabilität in die betroffenen Regionen zu bringen und die Wiederherstellung der Ordnung zu erleichtern. Durch die Unterstützung internationaler Friedenstruppen hoffen wir, die Gewalt zu reduzieren, die Zivilbevölkerung zu schützen und den Friedensprozess zu unterstützen. Dieser Schritt spiegelt unser Engagement für die globale Zusammenarbeit wider und unterstreicht unser Vertrauen in die gemeinsamen Anstrengungen der internationalen Gemeinschaft zur Lösung der Krise."
marpacnews:0"Okay"
unsc.9.t:0"§BUN-Benachrichtigung§!"
unsc.9.d:0 "Waffenstillstandsgesuch\n\nDie Vereinten Nationen haben eine Resolution verabschiedet, die einen sofortigen Waffenstillstand zwischen §G[ROOT.GetName]§! und §G[?global.UN_call_for_ceasefire.GetNameDefCap]§! fordert. Als Anführer von §G[ROOT.GetName]§! müssen Sie nun entscheiden, ob Sie den Waffenstillstand akzeptieren und einem weißen Frieden zustimmen oder das Gesuch ablehnen und den Krieg fortsetzen. Ihre Entscheidung wird erhebliche Auswirkungen auf den anhaltenden Konflikt und die Stellung Ihres Landes in der internationalen Gemeinschaft haben."
unsc.7.t:0 "§BUN-Benachrichtigung§!: Auf Aggression reagieren"
unsc.7.d:0 "§G[FROM.GetNameDefCap]§! hat uns den Krieg erklärt §G[ROOT.GetName]§!. Angesichts dieser Aggression haben Sie die Möglichkeit, die Vereinten Nationen um Unterstützung zu bitten. Sie können entweder militärische Hilfe zur Stärkung Ihrer Verteidigung beantragen oder einen Waffenstillstand ausrufen, um Friedensverhandlungen aufzunehmen. Ihre Entscheidung beeinflusst den Verlauf des Konflikts und die Stellung Ihres Landes auf der Weltbühne. Möchten Sie militärische Hilfe beantragen, einen Waffenstillstand ausrufen oder den Krieg unabhängig fortsetzen?"
unsc.10.t:0 "§NNATO-Benachrichtigung§!: Artikel 5 ausgelöst"
unsc.10.d:0 "Artikel 5 des NATO-Vertrags ist in Kraft getreten und ruft alle NATO-Mitglieder zur Unterstützung im Konflikt um §G[ROOT.GetName]§! auf. Diese kollektive Verteidigungsmaßnahme bedeutet, dass alle NATO-Mitglieder nun verpflichtet sind, uns im Krieg zu unterstützen. Wir werden diesen Krieg gewinnen! Wir werden die NATO besiegen!"
