marpac_council_name:0 "§G[?ROOT.selected_marpac.GetName]§ kann dazu gebracht werden, FÜR oder GEGEN die vorgeschlagene Resolution für 150 politische Macht zu stimmen, wenn wir eine große Nation sind!"
marpacnews.t:0 "[GetNewsHeadline]"
marpac.1.t:0 "Die Versammlung zur Abstimmung einberufen"
marpac.1.d:0 "Der Europäische Rat ist zusammengetreten, um über die Genehmigung der Pariser Friedensverträge zu diskutieren und abzustimmen. Ziel ist es, das Ende der Feindseligkeiten in Europa zu formalisieren und langfristigen Frieden und Stabilität zu fördern."
marpac.1.a:0 "Der Europäische Rat wird so bald wie möglich über diese Entschließung abstimmen."
marpac.2.t:0 "Abstimmungscheck"
marpac_current_motion:0 "[GetMARPACMotionName]\n\n\n\n\n\n\n\n\n\n\n\n\n"
MARPAC_resolution_51:0 "Resolution 51: Ermächtigung zur Unterzeichnung der Pariser Friedensverträge\n\nVorschlag: G[FRA.GetName]\n\nSeit dem Ende des Zweiten Weltkriegs bestehen in Europa zahlreiche Konflikte und ungelöste Fragen. Nach dem Plan für europäische Stabilität von 1947 wurden Anstrengungen unternommen, um dauerhaften Frieden und Stabilität in der Region zu schaffen. Unter der Führung der Französischen Republik hat die Friedensverhandlungskommission unermüdlich daran gearbeitet, alle Parteien an einen Verhandlungstisch zu bringen. Nach Abschluss der Verhandlungen schlägt G[FRA.GetName] dem Europäischen Rat die offizielle Unterzeichnung der Pariser Friedensverträge vor, um die Feindseligkeiten formell zu beenden und den Grundstein für eine friedliche und kooperative Zukunft in Europa zu legen."
MARPAC_resolution_1:0 "§RResolution 1§!: Autorisierung einer militärischen Intervention im Boxeraufstand\n\nVorschlag: §G[FRA.GetName]§!\n\nSeit dem Ausbruch des §YBoxeraufstands§! in China haben ausländer- und christenfeindliche Stimmungen zu weit verbreiteter Gewalt und Chaos geführt. Ausländische Staatsangehörige und chinesische Christen sind in großer Gefahr. Gemäß dem §YInternationalen Koalitionsabkommen§! von 1900 haben sich die vereinten Streitkräfte der beteiligten Nationen auf eine Intervention geeinigt. Unter dem Vorwand, Leben zu schützen und die Ordnung wiederherzustellen, haben wir eine Verhandlungsphase für eine friedliche Lösung zugelassen. Die Boxerstreitkräfte haben jedoch ihre Feindseligkeiten fortgesetzt und sich unseren Forderungen widersetzt. Der §G[FRA.GetName]§Y schlägt den §Yeuropäischen Nationen§Y vor, eine koordinierte militärische Intervention zum Schutz ausländischer Staatsangehöriger, zur Wiederherstellung des Friedens und zur Wahrung internationaler Interessen zu genehmigen."
MARPAC_resolution_10:0 "§RResolution 10§!: Waffenstillstandsabkommen im Ersten Weltkrieg\n\nVorschlag: §G[FRA.GetName]§!\n\nNach Jahren verheerender Konflikte im §YErsten Weltkrieg§! ist klar geworden, dass keine der Kriegsparteien einen entscheidenden Sieg erringen kann. Die anhaltenden Kämpfe haben zu enormen Verlusten an Menschenleben, wirtschaftlichem Ruin und weit verbreitetem Leid geführt. Angesichts dieser Umstände wurde ein Waffenstillstand vorgeschlagen, um die Feindseligkeiten zu beenden und eine neue Ordnung in Europa zu etablieren. Als Teil dieses Waffenstillstandsabkommens wurden die folgenden territorialen Anpassungen vereinbart: Deutschland annektiert Luxemburg, während Österreich-Ungarn den Staat Trentino abtritt und den Staat Friaul-Julisch Venetien erhält. Polen wird als unabhängiger Staat freigelassen. Rumänien erhält ganz Bessarabien. Frankreich erhält Elsass-Lothringen zurück und erhält seine historischen Grenzen zurück. Ziel dieser Resolution ist die Schaffung eines stabileren und ausgewogeneren Europas, die Verringerung künftiger Konflikte und die Förderung des Wiederaufbaus und der Heilung kriegszerstörter Länder. Die §G[FRA.GetName]§Y schlägt den §Yeuropäischen Nationen§Y die formelle Annahme und Umsetzung dieses Waffenstillstandsabkommens vor."
marpac.8.t:0 "Europäische Mächte treffen sich zur Abstimmung"
marpac.8.d:0"Der Europäische Rat ist zusammengetreten, um über die Autorisierung einer militärischen Intervention in China als Reaktion auf den Boxeraufstand zu diskutieren und abzustimmen. Ziel ist es, ausländische Staatsangehörige zu schützen und die internationalen Interessen in der Region zu wahren."
marpac.8.a:0"Der Europäische Rat wird so bald wie möglich über diese Entschließung abstimmen."
