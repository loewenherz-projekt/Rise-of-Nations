l_german: 
polishinti.1.title:0 "Polen bittet um unsere Hilfe im Polnisch-UdSSR-Krieg"
polishinti.1.desc:0 "Polnische Diplomaten sind in unser Land gekommen und haben um unsere Unterstützung gebeten. Sie haben uns gebeten, ihnen mit allem zu helfen, von diplomatischer bis hin zu militärischer Unterstützung."
polishinti.1.a:0 "Senden Sie diplomatische Unterstützung"
polishinti.1.b:0 "Senden Sie eine KLEINE Menge Waffen"
polishinti.1.c:0 "Senden Sie eine GROSSE Menge an Waffen"
polishinti.1.d:0 "Senden Sie keine Unterstützung"
polishinti.2.title:0 "[From.GetName] Sendet einen diplomatischen Protest"
polishinti.2.desc:0 "[From.GetName] hat uns einen diplomatischen Protest geschickt, in dem wir aufgefordert werden, unsere Gewalt gegen den polnischen Staat einzustellen. Die Berater von [Root.GetLeader] haben das Papier bereits verschrottet und entsorgt. Wir werden den polnischen Staat loswerden!"
polishinti.2.a:0 "Verstanden"
polishinti.3.title:0 "Waffenlieferungen sind von [From.GetName] eingetroffen"
polishinti.3.desc:0 "Derzeit sind Lieferungen von [From.GetName] mit Vorräten am Doc von Gdynia angekommen. Wir werden diesen Akt der Freundlichkeit nicht vergessen"
polishinti.3.a:0 "Wir sollten ihnen unseren Dank ausrichten"
polishinti.4.title:0 "Polen bittet uns um unsere Unterstützung"
polishinti.4.desc:0 "Polen hat uns um Unterstützung bei der Sicherung seiner Unabhängigkeit gebeten. Dies kann uns auf lange Sicht dabei helfen, diplomatischer an Polen anzunähern und könnte sogar zu einem Bündnis führen."
polishinti.4.a:0 "Wir werden unsere polnischen Brüder unterstützen"
polishinti.4.b:0 "Wir werden sie brennen lassen"
polishinti.5.title:0 "Polen hat den Krieg gewonnen!"
polishinti.5.desc:0 "Mit dem Sieg Polens, der unsere Unzweckmäßigkeit bestätigt, besteht für uns keine Notwendigkeit mehr, gegen Russland zu kämpfen. Wir werden einen Waffenstillstand mit den Russen unterzeichnen und sie sich selbst überlassen."
polishinti.5.a:0 "Endlich Sieg"
polishinti.6.title:0 "Der polnisch-sowjetische Krieg beginnt"
polishinti.6.desc:0 "Der polnische Sowjet begann, Polen versucht, sein verlorenes Territorium in Russland zurückzugewinnen. Polen nutzte heute seine Chance mit der Instabilität und dem Bürgerkrieg zwischen Russland und den Kommunisten, die es als perfekten Zeitpunkt für einen Angriff ansah."
polishinti.6.a:0 "Welche Auswirkungen wird dies auf die polnische Geschichte haben?"
polishinti.7.title:0 "Die Industrialisierung Polens"
polishinti.7.desc:0 "Welche Schritte sollten wir als nächstes unternehmen, um Polen zu industrialisieren?"
polishinti.7.a:0 "Investieren Sie in den Agrarsektor"
polishinti.7.b:0 "Investieren Sie in den Industriesektor"
polishinti.8.title:0 "Fehlender industrieller Fokus"
polishinti.8.desc:0 "Es gab einen Mangel an industrieller Ausrichtung in unserer Gesellschaft. Polen ist eine weitgehend landwirtschaftliche Gesellschaft. Jetzt können wir zivile Fabriken schneller produzieren, aber die Produktion unserer militärischen Fabriken wird langsamer sein."
polishinti.8.a:0 "Verstanden"
polishinti.9.title:0 "Mangelnder Fokus auf die Landwirtschaft"
polishinti.9.desc:0 "In unserer Gesellschaft fehlte der Fokus auf die Landwirtschaft. Polen ist eine weitgehend industrielle Gesellschaft. Wir werden jetzt in der Lage sein, Militärfabriken schneller zu produzieren, aber die Produktion unserer zivilen Fabriken wird langsamer sein."
polishinti.9.a:0 "Okay"
polishinti.10.title:0 "Gleichgewicht zwischen Industrie und Landwirtschaft erreicht"
polishinti.10.desc:0 "Der Fokus lag auf dem Industrie- und Agrarsektor, was uns in die Lage versetzte, die Vorteile beider Sektoren zu nutzen."
polishinti.10.a:0 "Großartig!"
polishinti.11.title:0 "Industrieller Fokus wieder auf Kurs"
polishinti.11.desc:0 "Wir haben uns auf den Industriesektor unseres Landes konzentriert und es scheint, als würden sich die Dinge ausgleichen, alles wird zur Normalität zurückkehren"
polishinti.11.a:0 "Großartig!"
polishinti.12.title:0 "Landwirtschaftliche Ausrichtung wieder auf Kurs"
polishinti.12.desc:0 "Wir haben uns auf den Agrarsektor unseres Landes konzentriert, und es scheint, als würde sich die Lage ausgleichen. Alles wird sich wieder normalisieren und Polen wird ein stabiles Land sein."
polishinti.12.a:0 "Großartig!"
polishinti.13.title:0 "Mai-Putsch"
polishinti.13.desc:0 "Der Mai-Staatsstreich oder Mai-Putsch war ein Putsch, der unsere demokratische Regierung von Józef Piłsudski und anderen prominenten Führern stürzte. Damit ist Polen nun kein demokratisches Land mehr"
polishinti.13.a:0 "Was kommt als nächstes für Polen?"
polishinti.14.title:0 "Polen bietet Waffenstillstand an – kleiner Sieg"
polishinti.14.desc:0 "Polen hat sich genommen, was es will, und bietet nun einen Waffenstillstand an. Wenn wir akzeptieren, dass wir nicht mehr im Krieg mit Polen sind und unsere Kräfte auf die Westfront konzentrieren können, werden wir einen Stabilitätsverlust erleiden, aber eine Chance, die Polen abzuwehren und schließlich ganz Polen einzunehmen."
polishinti.14.a:0 "Waffenstillstand akzeptieren"
polishinti.14.b:0 "Wir müssen weiterkämpfen!"
polishinti.15.title:0 "Polen fordert Kapitulation - mittlerer Sieg"
polishinti.15.desc:0 "Polen hat sich genommen, was es wollte, und noch mehr! Und jetzt bieten sie einen Waffenstillstand an, wenn wir akzeptieren, dass wir nicht länger mit Polen im Krieg sind und unsere Kräfte auf die Westfront konzentrieren können. Wenn wir uns weigern, werden wir einen mittleren Stabilitätsverlust erleiden."
polishinti.15.a:0 "Akzeptieren Sie die Friedensbedingungen"
polishinti.15.b:0 "Wir müssen weiterkämpfen ..."
polishinti.16.title:0 "Polen fordert Kapitulation – großer Sieg"
polishinti.16.desc:0 "Polen hat uns eine völlige Niederlage zugefügt! Es gibt keinen Verhandlungsspielraum, wir müssen uns den Polen ergeben."
polishinti.16.a:0 "Wir müssen die ehrenvolle Niederlage akzeptieren"
polishinti.17.title:0 "Polnischer Waffenstillstand?"
polishinti.17.desc:0 "Wir haben die Ukraine erobert und haben nun keine Lust mehr, gegen Polen zu kämpfen, da dies mit Sicherheit zu einer Pattsituation führen würde. Wir müssen unsere Truppen an der Westfront konzentrieren. Sollen wir weiterkämpfen oder einen Waffenstillstand vorschlagen?"
polishinti.17.a:0 "Wir werden den Waffenstillstand akzeptieren"
polishinti.17.b:0 "Wir werden niemals aufgeben"
polishinti.18.title:0 "Patt mit den Sowjets"
polishinti.18.desc:0 "Wir konnten nicht weiter in die Sowjets vordringen und die Gewinnchancen beider Seiten werden immer geringer. Wir müssen ihnen einen Waffenstillstand anbieten und uns auf die Westfront konzentrieren."
polishinti.18.a:0 "Nur so kann Polen gewinnen"
polishinti.19.title:0 "Polnisch-französisches Handelsabkommen"
polishinti.19.desc:0 "Die Verhandlungen über das polnisch-französische Handelsabkommen werden in Kürze beginnen. Während der Verhandlungen werden wir beide eine Lizenz für die Produktion von Panzern und Artillerie erhalten."
polishinti.19.a:0 "Lizenznehmer für Tanks - 30 pp"
polishinti.19.b:0 "Lizenznehmer für Artillerie - 25 pp"
polishinti.20.title:0 "Verhandlungen über ein französisch-polnisches Handelsabkommen"
polishinti.20.desc:0 "Polen hat uns ein Handelsabkommen für die Artillerieproduktion sowie Freihandel für unsere beiden Länder angeboten. Damit dieses Abkommen zustande kommt, müssen wir Polen jedoch 25 % politische Macht übertragen. Was sollen wir tun?"
polishinti.20.a:0 "Wir werden diesen Deal annehmen"
polishinti.20.b:0 "Wir verhandeln Preise"
polishinti.20.c:0 "Wir werden höflich ablehnen"
polishinti.21.title:0 "Frankreich bietet einen Kompromiss an"
polishinti.21.desc:0 "Frankreich hat uns einen Kompromiss für die Artillerieproduktion angeboten! Sie bieten an, dass wir beide 12 politische Machtpunkte zahlen, im Austausch für die gleichen Vorteile, was sollen wir tun?"
polishinti.21.a:0 "Wir akzeptieren"
polishinti.21.b:0 "Wir lehnen ab"
polishinti.22.title:0 "Verhandlungen über ein französisch-polnisches Handelsabkommen"
polishinti.22.desc:0 "Polen hat uns ein Handelsabkommen für die Panzerproduktion sowie Freihandel für unsere beiden Länder angeboten. Damit dieses Abkommen zustande kommt, müssen wir Polen jedoch 25 % politische Macht übertragen. Was sollen wir tun?"
polishinti.22.a:0 "Wir werden diesen Deal annehmen"
polishinti.22.b:0 "Wir verhandeln Preise"
polishinti.22.c:0 "Wir werden höflich ablehnen"
polishinti.23.title:0 "Frankreich bietet einen Kompromiss an"
polishinti.23.desc:0 "Frankreich hat uns einen Kompromiss für die Artillerieproduktion angeboten! Sie bieten an, dass wir beide 15 politische Machtpunkte zahlen, um die gleichen Vorteile zu erhalten. Was sollen wir tun?"
polishinti.23.a:0 "Akzeptiere den Kompromiss"
polishinti.23.b:0 "Den Kompromiss ablehnen"
polishinti.24.title:0 "Deutsch-Polnischer Gipfel"
polishinti.24.desc:0 "Deutschland und Polen haben heute einen Gipfel abgehalten, bei dem sie darüber diskutierten, was mit der Provinz Danzig geschehen soll. Da Polen bereit ist, sie an Deutschland zurückzugeben, um künftige Konflikte zu vermeiden, scheint die Zukunft Danzigs ungewiss."
polishinti.24.a:0 "Großartig"
polishinti.25.title:0 "Was sollten uns die Deutschen im Austausch für die Provinz Danzig geben?"
polishinti.25.desc:0 "Die Provinz Danzig hat einen großen Anteil deutscher Bevölkerung und wir sind bereit, sie an Deutschland zurückzugeben. Allerdings können wir die Provinz nicht einfach kostenlos an Deutschland zurückgeben. Wir müssen etwas im Austausch für die Provinz bekommen. Was sollten uns die Deutschen geben?"
polishinti.25.a:0 "Politische Macht monatlich"
polishinti.25.b:0 "Ein Teil ihrer Arbeitskräfte"
polishinti.25.c:0 "Bessere Forschungsgeschwindigkeit"
polishinti.26.title:0 "Polen bietet Danzig an"
polishinti.26.desc:0 "Polen hat uns die Provinz Danzig für 1 politische Macht pro Monat für 1 Jahr angeboten. Wenn wir diesen Deal annehmen, werden wir die Provinz Danzig gewinnen. Das wird unsere politische Macht monatlich beeinflussen."
polishinti.26.a:0 "Wir akzeptieren"
polishinti.27.title:0 "Polen bietet uns Danzig"
polishinti.27.desc:0 "Polen hat uns die Provinz Danzig für 50.000 Mann angeboten. Das mag eine enorme Belastung für unsere Arbeitskräfte sein, aber die Provinz ist mehrheitlich deutsch und wir müssen sie befreien!"
polishinti.27.a:0 "Wir akzeptieren"
polishinti.28.title:0 "Polen bietet uns Danzig"
polishinti.28.desc:0 "Polen hat uns die Provinz Danzig für einige unserer Wissenschaftler und Forscher angeboten. Dies wird unsere Forschungsgeschwindigkeit für zwei Jahre beeinträchtigen, aber wir werden eine mehrheitlich deutsche Provinz gewinnen."
polishinti.28.a:0 "Wir akzeptieren diesen Deal!"
polishinti.28.b:0 "Wir lehnen diesen Deal ab"
polishinti.29.title:0 "Frankreich lehnt den Deal ab"
polishinti.29.desc:0 "Frankreich hat unser Handelsabkommen abgelehnt! Es scheint, wir müssen unseren Handel woanders hin verlagern! Dadurch erhält keiner von uns Vorteile, und der Handel wird wie gewohnt weiterlaufen."
polishinti.29.a:0 "Es ist ihr Verlust"
polishinti.30.title:0 "Polen lehnt den Deal ab"
polishinti.30.desc:0 "Polen hat unseren Handelskompromiss abgelehnt! Dadurch erhält keiner von uns Vorteile und der Handel wird wie gewohnt weitergeführt."
polishinti.30.a:0 "Schade"
polishinti.31.title:0 "Deutschland nimmt unser Angebot mit politischer Stärke an"
polishinti.31.desc:0 "Wenn Deutschland unser Angebot annimmt, erhalten wir im Austausch für Danzig ein Jahr lang täglich eine zusätzliche politische Macht!"
polishinti.31.a:0 "Großartig!"
polishinti.32.title:0 "Deutschland nimmt unser Personalangebot an"
polishinti.32.desc:0 "Deutschland hat unser Angebot für Danzig im Austausch gegen Arbeitskräfte angenommen! Die Übertragung des Staates Danzig wird in Kürze beginnen"
polishinti.32.a:0 "Gute Nachrichten!"
polishinti.33.title:0 "Deutschland akzeptiert unseren Forschungs-Speed-Deal"
polishinti.33.desc:0 "Wenn die Deutschen unseren Deal annehmen, erhalten sie nun die Provinz Danzig, während wir einen Forschungsbonus von 5 % wieder einführen!"
polishinti.33.a:0 "Tolle Neuigkeiten!"
polishinti.34.title:0 "Deutschland lehnt den Deal ab"
polishinti.34.desc:0 "Deutschland hat unseren Deal für Danzig abgelehnt. Wir werden die Provinz Danzig auf absehbare Zeit behalten"
polishinti.34.a:0 "nun ja"
polishinti.35.title:0 "Polen - hungrig nach Handelsabkommen"
polishinti.35.desc:0 "Wir werden in Kürze mit den Verhandlungen über das polnisch-hungrige Handelsabkommen beginnen. Was sollten wir mit diesem Handelsabkommen erreichen?"
polishinti.35.a:0 "Stabilität"
polishinti.35.b:0 "Politische Unterstützung für unsere aktuelle Ideologie"
polishinti.36.title:0 "Polen - hungrig nach Verhandlungen über Handelsabkommen"
polishinti.36.desc:0 "Wir haben von Polen ein Angebot für bessere Handelsbeziehungen und eine Stärkung der Stabilität erhalten, allerdings wird dies 100 politische Macht kosten. Was sollen wir tun?"
polishinti.36.a:0 "Wir akzeptieren diesen Deal"
polishinti.36.b:0 "Wir lehnen diesen Deal ab"
polishinti.37.title:0 "Polen - hungrig nach Verhandlungen über Handelsabkommen"
polishinti.37.desc:0 "Wir haben von Polen ein Angebot für bessere Handelsbeziehungen erhalten. Im Gegenzug schicken wir ihnen Berater, um ihre aktuelle Ideologie zu stärken. Die Annahme dieses Angebots kostet uns 50 politische Macht. Sollten wir es annehmen?"
polishinti.37.a:0 "Wir akzeptieren"
polishinti.37.b:0 "Wir lehnen ab"
polishinti.38.title:0 "Polen plant, Damm vollständig in das Reich zu integrieren"
polishinti.38.desc:0 "Polen plant, in die mehrheitlich deutsche Provinz einzumarschieren und ihr den Garaus zu machen. Sollten wir eingreifen und diese Invasion verhindern oder abwarten, was passiert?"
polishinti.38.a:0 "Wir müssen unsere Garantie geben"
polishinti.38.b:0 "Unser Militär ist nicht für einen bewaffneten Konflikt gerüstet. Wir werden uns später damit befassen."
polishinti.39.title:0 "Polen setzt seinen Plan zur Unterdrückung aller anderen Ideologien um"
polishinti.39.desc:0 "Polen kehrt zu seinen monarchistischen Wurzeln zurück und behauptet nun kühn, es werde jeden Verräter des Monarchen töten. Dies wurde mit landesweiten Protesten beantwortet, und es scheint, als würde Polen in die Dunkelheit versinken."
polishinti.39.a:0 "Was wird mit Polen passieren?"
polishinti.40.title:0 "Weißrussland löst sich von Polen!"
polishinti.40.desc:0 "Angesichts des Bürgerkriegs hat sich Weißrussland von Polen abgespalten und setzt sich für seine Unabhängigkeit ein, um die Sozialistische Republik Weißrussland zu gründen!"
polishinti.40.a:0 "Mist"
polishinti.41.title:0 "Polen: Bürgerkrieg beginnt"
polishinti.41.desc:0 "Der polnische Bürgerkrieg hat begonnen, Polen in drei Lager zu spalten: die dem König treu ergebenen Monarchisten (die Oberschicht), die Kommunisten (zumeist Bauern) und die der Republik treu ergebene Unterschicht und Mittelschicht! Was wird aus diesem Bürgerkrieg werden? Wer wird als Sieger hervorgehen?"
polishinti.41.a:0 "Möge das beste Polen gewinnen"
polishinti.42.title:0 "Handelsabkommen zwischen Griechenland und Polen"
polishinti.42.desc:0 "Wir werden Verhandlungen mit Griechenland aufnehmen. Worüber sollten wir mit Polen verhandeln? Über militärischen Zugang oder Anlegerechte?"
polishinti.42.a:0 "Militärischer Zugang nach Griechenland"
polishinti.42.b:0 "Nichtangriffspakt"
polishinti.43.title:0 "Verhandlungen über ein Handelsabkommen zwischen Griechenland und Polen"
polishinti.43.desc:0 "Polen hat uns gemeinsamen militärischen Zugang zu den Ländern des jeweils anderen angeboten. Das wird uns zehn Prozent politische Macht kosten. Sollen wir das akzeptieren?"
polishinti.43.a:0 "Wir akzeptieren"
polishinti.43.b:0 "Wir lehnen ab"
polishinti.44.title:0 "Verhandlungen über ein Handelsabkommen zwischen Griechenland und Polen"
polishinti.44.desc:0 "Polen hat uns einen gemeinsamen Nichtangriffspakt für jedes unserer Länder angeboten. Das wird uns zehn Prozent politische Macht kosten. Sollen wir ihn annehmen?"
polishinti.44.a:0 "Wir akzeptieren"
polishinti.44.b:0 "Wir lehnen ab"
polishinti.45.title:0 "Griechenland hat unser Handelsabkommen abgelehnt"
polishinti.45.desc:0 "Griechenland hat unser Handelsabkommen abgelehnt und die diplomatischen Beziehungen werden sich wieder normalisieren. Es sind keine weiteren Maßnahmen erforderlich."
polishinti.45.a:0 "nun ja"
polishinti.46.title:0 "Handelsabkommen zwischen der Tschechoslowakei und Polen"
polishinti.46.desc:0 "Wir werden Verhandlungen mit der Tschechoslowakei über die Schaffung besserer Beziehungen und den Abschluss eines Handelsabkommens aufnehmen. Worüber sollten wir verhandeln?"
polishinti.46.a:0 "Armeeerfahrung"
polishinti.46.b:0 "Marineerfahrung"
polishinti.47.title:0 "Handelsabkommen zwischen der Tschechoslowakei und Polen"
polishinti.47.desc:0 "Polen hat uns ein Handelsabkommen angeboten, bei dem wir beide 40 % politische Macht erhalten und 50 % Armee ablaufen. Nehmen wir es an?"
polishinti.47.a:0 "Wir akzeptieren"
polishinti.47.b:0 "Wir lehnen ab"
polishinti.48.title:0 "Handelsabkommen zwischen der Tschechoslowakei und Polen"
polishinti.48.desc:0 "Polen hat uns ein Handelsabkommen für 35 politische Macht angeboten. Wir erhalten beide 50 Marine-Abkommen. Nehmen wir es an?"
polishinti.48.a:0 "Wir akzeptieren"
polishinti.48.b:0 "Wir lehnen ab"
polishinti.49.title:0 "Die Tschechoslowakei lehnte das Handelsabkommen ab"
polishinti.49.desc:0 "Das Handelsabkommen wurde von der Tschechoslowakei abgelehnt und unsere diplomatischen Beziehungen werden sich normalisieren. Es sind keine weiteren Maßnahmen erforderlich."
polishinti.49.a:0 "nun ja"
polishinti.50.title:0 "Polen schlägt uns ein Bündnis im Krieg vor"
polishinti.50.desc:0 "Polen hat vorgeschlagen, dass wir beide ein Bündnis eingehen und uns gegenseitig die Unabhängigkeit garantieren. Wenn wir dies akzeptieren, werden wir uns gegenseitig schützen, wenn jemand einen Krieg gegen einen von uns rechtfertigt."
polishinti.50.a:0 "Wir akzeptieren"
polishinti.50.b:0 "Wir lehnen ab"
polishinti.51.title:0 "Deutsch-polnisches Handelsabkommen"
polishinti.51.desc:0 "Das deutsch-polnische Handelsabkommen hat begonnen. Worüber sollten wir Verhandlungen aufnehmen?"
polishinti.51.a:0 "Forschungsgeschwindigkeit"
polishinti.51.b:0 "Besprechen Sie den Status Oberpreußens"
polishinti.51.c:0 "Zollfreier Handel"
polishinti.52.title:0 "Polens Status als eine der im Handel mit uns am meisten bevorzugten Nationen der Entente erlosch."
polishinti.52.desc:0 "Heute sind polnische Diplomaten zu uns gekommen, um über ein Handelsabkommen zu sprechen. Allerdings ist ihr im Versailler Vertrag vorgeschriebener Sonderhandelsstatus abgelaufen. Wir können diese Situation ausnutzen und Polens Zölle erhöhen. Dies wird sich auf die Kohleindustrie Polens auswirken und uns politisch nützen, aber unseren Beziehungen zu Polen schaden. Was sollen wir tun?"
polishinti.52.a:0 "Höhere Zölle"
polishinti.52.b:0 "Pflege der Beziehungen zu Polen"
polishinti.53.title:0 "Deutschland hat die Steuern für unsere Kohleindustrie erhöht"
polishinti.53.desc:0 "Deutschland hat die Steuern auf unsere Kohleexporte erhöht. Dies wird sich negativ auf unser Land auswirken. Wir haben derzeit zwei Möglichkeiten, mit dieser Situation umzugehen: Entweder wir erhöhen die Zölle auf deutsche Waren und riskieren damit eine Eskalation des Konflikts, oder wir können wie gewohnt weitermachen."
polishinti.53.a:0 "Steuern für Deutschland erhöhen"
polishinti.53.b:0 "Steuern gleich halten"
polishinti.54.title:0 "Polen hat die Steuern auf unsere Exporte erhöht"
polishinti.54.desc:0 "Polen hat als Vergeltung für unsere Kohlesteuer die Steuern auf unsere Exporte erhöht. Wir können entweder mit der Erhöhung weiterer Zölle auf Polen reagieren oder den Konflikt deeskalieren."
polishinti.54.a:0 "Steuererhöhungen für Polen"
polishinti.54.b:0 "Deeskalieren"
polishinti.55.title:0 "Deutschland revanchierte sich mit höheren Steuern"
polishinti.55.desc:0 "Als Vergeltung für unsere Steuererhöhungen in Deutschland hat Deutschland die Steuern für unser Land auf ein fast schon Embargoniveau angehoben. Wenn wir jetzt aufgeben, wird der Handel mit Deutschland für immer zerstört sein. Wir müssen weiterhin die Steuern erhöhen, um unser Land vor einem Embargo zu bewahren."
polishinti.55.a:0 "Steuern erhöhen"
polishinti.56.title:0 "Polen revanchierte sich mit höheren Steuern"
polishinti.56.desc:0 "Als Vergeltung für unsere Steuererhöhungen hat Polen die Steuern für unser Land auf ein fast schon Embargoniveau angehoben. Wir müssen die Steuern weiter erhöhen. Vielleicht können wir davon profitieren, indem wir unsere revanchistischen Forderungen in Polen unterstützen."
polishinti.56.a:0 "Steuern erhöhen"
polishinti.57.title:0 "Wie erwartet übt Deutschland Vergeltung"
polishinti.57.desc:0 "Deutschland hat als Vergeltung ein Embargo gegen unser Land verhängt. Andere Nationen schauen zu, denn dies könnte zu einem totalen Krieg führen! Wenn wir jetzt jedoch aufhören, wird Deutschland enorm profitieren und wir werden zu einer schwachen Nation."
polishinti.57.a:0 "Wir verhängen ein Embargo gegen Deutschland"
polishinti.58.title:0 "Polen verhängt ein Embargo gegen die USA"
polishinti.58.desc:0 "Polen hat ein umfassendes Embargo gegen uns verhängt. Es scheint, als würde dieser Konflikt nicht so bald enden. Es scheint, als wäre ein Konflikt zu diesem Zeitpunkt unvermeidlich."
polishinti.58.a:0 "Der Konflikt eskaliert"
polishinti.59.title:0 "Krieg mit Deutschland"
polishinti.59.desc:0 "Ein Krieg mit Deutschland scheint derzeit unvermeidlich, doch da die Eskalation des Konflikts kein Ende zu nehmen scheint, müssen wir uns auf einen Krieg vorbereiten. Vielleicht sollten wir, falls wir das nicht schon getan haben, die deutsche Grenze befestigen."
polishinti.59.a:0 "Der Krieg scheint näher denn je"
polishinti.60.title:0 "Krieg mit Polen"
polishinti.60.desc:0 "Wir können Polen in einem Krieg leicht besiegen. Aber ob sich das wegen eines Handelsstreits wirklich lohnt, werden wir bald herausfinden …"
polishinti.60.a:0 "Wird es in Europa erneut zu Kriegen kommen?"
polishinti.61.title:0 "Polen und Deutschland stehen am Rande eines Krieges"
polishinti.61.desc:0 "Obwohl es uns nichts ausmacht, dass Polen und Deutschland aufgrund eines Handelskonflikts am Rande eines Krieges stehen, können wir dennoch eingreifen und diesen kleinlichen Konflikt beenden, indem wir sie kämpfen lassen oder ihre Kämpfe einstellen."
polishinti.61.a:0 "intervenieren und Deutschland unterstützen"
polishinti.61.b:0 "intervenieren und Polen unterstützen"
polishinti.61.c:0 "eingreifen und den Status quo unterstützen"
polishinti.62.title:0 "Großbritannien beendet den polnisch-deutschen Handelskrieg"
polishinti.62.desc:0 "Was für Europa wie ein Seufzer der Erleichterung wirkt, offenbart die gefährliche Wahrheit über die Fragilität Europas: Der Handelskrieg zwischen Polen und Deutschland wurde von Großbritannien beendet. Da keine Seite als klarer Gewinner dieses Konflikts hervorgeht, scheint alles sinnlos und umsonst. Dennoch scheint Europa wieder Frieden zu haben."
polishinti.63.title:0 "Großbritannien beendet den polnisch-deutschen Handelskrieg"
polishinti.63.desc:0 "Was für Europa wie ein Seufzer der Erleichterung wirkt, enthüllt die gefährliche Wahrheit über die Fragilität Europas: Der Handelskrieg zwischen Polen und Deutschland wurde von Großbritannien beendet. Da das Deutsche Reich dank der Unterstützung Großbritanniens siegte, hat Deutschland durch diesen Deal zwar viel gewonnen, doch die Beziehungen zwischen den beiden Ländern sind für immer zerbrochen. Polen verspricht, seine Verluste wieder auszugleichen und Deutschland dafür bezahlen zu lassen."
polishinti.64.title:0 "Großbritannien beendet den polnisch-deutschen Handelskrieg"
polishinti.64.desc:0 "Was für Europa wie ein Seufzer der Erleichterung wirkt, enthüllt die gefährliche Wahrheit über die Fragilität Europas: Der Handelskrieg zwischen Polen und Deutschland wurde von Großbritannien beendet. Polen hat dank der Unterstützung Großbritanniens zwar gewonnen und profitierte zwar stark von diesem Abkommen, doch die Beziehungen zwischen den beiden Ländern sind für immer zerrüttet. Deutschland bekennt sich zu seinen Verlusten und wird Polen dafür bezahlen lassen."
