 ##welfare (economic policy)
 NOR_finish_the_post-depression_recovery:0 "Beenden Sie die Erholung nach einer Depression"
 NOR_finish_the_post-depression_recovery_desc:0 "Da sich unser Land und unsere Wirtschaft in relativ guter Verfassung befinden, könnten wir erhebliche Mittel bereitstellen, um die anhaltenden Auswirkungen der Depression zu bekämpfen und das Sozialprogramm der Regierung Nygaardsvold als durchschlagenden Erfolg zu verkünden. Die norwegische Bevölkerung würde einen solchen Schritt zweifellos noch jahrelang zu schätzen wissen."
 ##foreign material orders (economic policy)
 NOR_procure_british_destroyers:0 "Britische Zerstörer beschaffen"
 NOR_procure_british_destroyers_desc:0 "Aufgrund der aktuellen Marinekooperation im Rahmen unseres Bündnisses mit den Briten sollten wir in der Lage sein, Zerstörer zu sehr vernünftigen Preisen von ihnen zu beschaffen, da eine starke norwegische Marine im Interesse aller liegt."
 NOR_procure_british_destroyers_tt:0 "Zwei britische Zerstörer werden uns nach ihrer Fertigstellung übergeben. Durch die Erforschung verbesserter Zerstörer erhalten wir modernere Schiffe."
 NOR_procure_german_destroyers:0 "Beschaffung deutscher Zerstörer"
 NOR_procure_german_destroyers_desc:0 "Aufgrund der aktuellen Marinekooperation im Rahmen unseres Bündnisses mit den Deutschen sollten wir in der Lage sein, Zerstörer zu sehr vernünftigen Preisen von ihnen zu beschaffen, da eine starke norwegische Marine im Interesse aller liegt."
 NOR_procure_german_destroyers_tt:0 "Zwei Zerstörer deutscher Bauart werden uns nach Fertigstellung übergeben. Durch die Erforschung verbesserter Zerstörer erhalten wir modernere Schiffe."
 ##defensive lines and fortifications (economic policy)
 NOR_glomma-halden_line:0 "Konstruieren Sie die Glomma-Halden-Linie"
 NOR_glomma-halden_line_desc:0 "Die Beauftragung von Bauunternehmern mit dem Bau einer Bunker- und Verteidigungslinie östlich von Oslo soll diese wichtige Stadt vor potenziellen Angreifern schützen. Die traditionelle Invasionsroute von Schweden in unser Landesinnere dürfte für jeden Feind einige ernsthafte Hindernisse bereithalten."
 NOR_lyngen_line:0 "Bau der Lyngenlinie"
 NOR_lyngen_line_desc:0 "Im Falle eines neutralen Schwedens könnten wir Landangriffe über Nordnorwegen durch den Bau einer Reihe von Befestigungen und Bunkern in den Bergen des Lyngen-Gebiets in Troms abwehren. Die schmalen Grenzen würden zudem dazu beitragen, Angreifer abzuwehren, die Angst vor einer Verletzung der schwedischen Neutralität haben."
 ##political actions
 NOR_the_kings_choice:0 "Die Wahl des Königs"
 NOR_the_kings_choice_desc:0 "Ein emotional aufgeladener König hat die Forderung unseres Feindes nach unserer Kapitulation und der Einsetzung einer kollaborierenden Regierung erhalten. Unter Tränen verkündete er gegenüber Regierung und Parlament seine Abdankung, wenn sie diesen Forderungen nachkämen. Lassen Sie uns daher unseren Feinden das „Nein“ des Königs entgegenbringen und unsere Regierung seinen Kampf für unsere Unabhängigkeit unterstützen."
 NOR_rebrand_into_the_modern_kingdom:0 "Umbenennung in das moderne Königreich"
 NOR_rebrand_into_the_modern_kingdom_desc:0 "Wenn wir es wünschen, könnten wir wieder die moderne Flagge und das moderne Erscheinungsbild der Welt annehmen. Dies würde jedoch einen großen Aufwand für unsere Staatsmänner bedeuten, und ein Rebranding kann nicht oft durchgeführt werden."
 NOR_rebrand_into_the_traditional_kingdom:0 "Umbenennung in das traditionelle Königreich"
 NOR_rebrand_into_the_traditional_kingdom_desc:0 "Wenn wir möchten, können wir die traditionelle Flagge und das Erscheinungsbild des alten norwegischen Königreichs übernehmen. Ein plötzlicher Schritt könnte zwar unsere Verwaltungsressourcen stark belasten und ist keine Entscheidung, die sich schnell rückgängig machen lässt, aber wenn wir es wünschen, ist es dennoch möglich."
 ##foreign support (war measures)
 NOR_petition_the_british_for_an_alliance:0 "Petition an die Briten für ein Bündnis"
 NOR_petition_the_british_for_an_alliance_desc:0 "Bewaffnete Neutralität reichte nicht aus, um Krieg von unserem Land fernzuhalten. Daher wäre es wohl am besten, wenn wir nach einer gemeinsamen Basis mit den Feinden unseres Feindes suchen würden. Die Seite der Briten zu vertreten, wäre vielleicht unsere beste Chance."
 NOR_petition_the_french_for_an_alliance:0 "Petition an die Franzosen für ein Bündnis"
 NOR_petition_the_french_for_an_alliance_desc:0 "Bewaffnete Neutralität reichte nicht aus, um Krieg von unserem Land fernzuhalten. Daher wäre es wohl am besten, wenn wir nach einer gemeinsamen Basis mit den Feinden unseres Feindes suchen würden. Die Seite der Franzosen zu wählen, wäre vielleicht unsere beste Option."
 NOR_petition_the_germans_for_an_alliance:0 "Petition an die Deutschen für ein Bündnis"
 NOR_petition_the_germans_for_an_alliance_desc:0 "Bewaffnete Neutralität reichte nicht aus, um Krieg von unserem Land fernzuhalten. Daher wäre es wohl am besten, wenn wir nach einer gemeinsamen Basis mit den Feinden unseres Feindes suchen würden. Auf der Seite der Deutschen zu stehen, wäre vielleicht unsere beste Chance."
 NOR_petition_the_russians_for_an_alliance:0 "Petition an die Russen für ein Bündnis"
 NOR_petition_the_russians_for_an_alliance_desc:0 "Bewaffnete Neutralität reichte nicht aus, um Krieg von unserem Land fernzuhalten. Daher wäre es wohl am besten, wenn wir nach einer gemeinsamen Basis mit den Feinden unseres Feindes suchen würden. Auf der Seite der Russen zu stehen, wäre vielleicht unsere beste Option."
 NOR_petition_the_americans_for_an_alliance:0 "Petition an die Amerikaner für ein Bündnis"
 NOR_petition_the_americans_for_an_alliance_desc:0 "Bewaffnete Neutralität reichte nicht aus, um Krieg von unserem Land fernzuhalten. Daher besteht unsere beste Chance wohl darin, eine gemeinsame Basis mit den Feinden unseres Feindes zu suchen. Auf der Seite der Amerikaner zu stehen, ist vielleicht unsere beste Chance."
 NOR_initiate_cooperation_with_the_british:0 "Initiieren Sie die Zusammenarbeit mit den Briten"
 NOR_initiate_cooperation_with_the_british_desc:0 "Da wir uns im britischen Bündnis befinden, wäre es eine gute Idee, eine engere Zusammenarbeit in Fragen der Kommunikation, des Transports und auch des Krieges anzustreben."
 NOR_initiate_cooperation_with_the_germans:0 "Zusammenarbeit mit den Deutschen initiieren"
 NOR_initiate_cooperation_with_the_germans_desc:0 "Da wir uns im deutschen Bündnis befinden, wäre es eine gute Idee, eine engere Zusammenarbeit in Fragen der Kommunikation, des Transports und auch des Krieges anzustreben."
 NOR_initiate_cooperation_with_the_russians:0 "Zusammenarbeit mit den Russen einleiten"
 NOR_initiate_cooperation_with_the_russians_desc:0 "Da wir uns in der Allianz mit Russland befinden, wäre es eine gute Idee, eine engere Zusammenarbeit in Fragen der Kommunikation, des Transports und auch des Krieges anzustreben."
