 ####--Decisions--####
 ##monarchist politics
 NOR_monarchism_on_the_rise:0 "Der norwegische Monarchismus auf dem Vormarsch"
 NOR_monarchism_on_the_rise_desc:0 "Lautstarke politische Kräfte haben begonnen, sich für unsere traditionellen Werte und das Alte Königreich einzusetzen und finden dabei Unterstützung bei einem wachsenden Teil der Bevölkerung. Der Weg des Königreichs zu sicheren und soliden Werten wartet lediglich auf die Entscheidung für einen Übergang, sei er friedlich oder auf andere Weise."
 NOR_prepare_for_monarchist_civil_war:0 "Bereiten Sie sich auf den Bürgerkrieg vor"
 NOR_prepare_for_monarchist_civil_war_desc:0 "Wir haben keine Zeit, auf die langsamen Veränderungen in den Köpfen der Menschen von [Root.GetName] zu warten. Zu ihrem eigenen Wohl müssen wir die Sache schnell vorantreiben, auch wenn dabei einige ihr Leben verlieren könnten."
 NOR_expand_civil_monarchism_support:0 "Zivile Unterstützung ausbauen"
 NOR_expand_civil_monarchism_support_desc:0 "Wir müssen dafür sorgen, dass die Unterstützung unter den Menschen in [Root.GetName] weiter zunimmt, auch wenn dies zu einer Destabilisierung der Gesellschaft führt."
 NOR_ensure_command_loyalty_for_monarchist_civil_war:0 "Sorgen Sie für ein loyales Armeekommando"
 NOR_ensure_command_loyalty_for_monarchist_civil_war_desc:0 "Es ist wahrscheinlich, dass viele unserer Kommandeure traditionalistische Werte hegen und diese in der Gesellschaft fördern wollen. Wir sollten auf sie alle zugehen und uns im Falle interner Konflikte ihrer Loyalität versichern."
 NOR_ensure_command_loyalty_for_monarchist_civil_war_tt:0 "Stellt die Loyalität unserer §YArmeekommandeure§! im Falle eines §RCrivellen Krieges§! für den §YMonarchismus§! sicher.\n"
 NOR_preliminary_monarchist_armament_industry:0 "Vorläufige loyalistische Rüstungsindustrie"
 NOR_preliminary_monarchist_armament_industry_desc:0 "Bereiten Sie eine begrenzte Menge an §Rüstungsindustrie§! in unseren loyalen Staaten vor.\n"
 NOR_open_up_political_discourse_monarchism:0 "Den politischen Diskurs öffnen"
 NOR_open_up_political_discourse_monarchism_desc:0 "Wir müssen die Akzeptanz abweichender Standpunkte in der Regierung öffnen. Vielleicht wird dies letztendlich einen friedlichen politischen Wandel in unserem Land ermöglichen."
 NOR_discredit_government_monarchism:0 "Regierung diskreditieren"
 NOR_discredit_government_monarchism_desc:0 "Indem wir auf die vielen Mängel unserer derzeitigen Regierung hinweisen, können wir die Menschen dazu bringen, über die ideologischen Ursachen dieser Versäumnisse nachzudenken."
 NOR_ignite_the_monarchist_civil_war:0 "Bürgerkrieg entfachen"
 NOR_ignite_the_monarchist_civil_war_desc:0 "Es ist Zeit, den Sprung zu wagen. Alle notwendigen Vorbereitungen sind getroffen. Es gibt kein Zurück mehr. „Für Fedrelandet!“"
 ##norwegian land reintegration
 NOR_land_reintegration:0 "Norwegische Landrückführung"
 NOR_land_reintegration_desc:0 "Das norwegische Königreich erstreckte sich einst über Nordeuropa, doch Kriege und Verträge haben dem Königreich einige seiner historischen Ländereien entzogen. Schweden, Dänemark und in geringerem Maße auch das Vereinigte Königreich besitzen ihren „gerechten“ Anteil an diesen ehemaligen Inseln, Titeln, Landschaften und Grenzregionen. Dennoch besteht kein Grund, die Hoffnung aufzugeben …\n\nSollten wir eines dieser Gebiete zurückerobern, ist der moderne norwegische Staat mit seiner soliden Wirtschaft und zahlreichen fähigen Staatsmännern gut aufgestellt, um es wieder zu integrieren. Die Wiederherstellung unserer glorreichen Vergangenheit sollte daher durchaus machbar sein."
 NOR_reintegrate_faeroeyane:0 "Færøyane wieder eingliedern"
 NOR_fully_incorporate_faeroeyane:0 "Færøyane vollständig integrieren"
 NOR_reintegrate_island:0 "Insel wieder integrieren"
 NOR_fully_incorporate_island:0 "Insel vollständig integrieren"
 NOR_reintegrate_groenland:0 "Grønland wieder eingliedern"
 NOR_fully_incorporate_groenland:0 "Grønland vollständig einbeziehen"
 NOR_reintegrate_hjaltland:0 "Hjaltland wieder integrieren"
 NOR_fully_incorporate_hjaltland:0 "Hjaltland vollständig integrieren"
 NOR_reintegrate_orknoeyane:0 "Orknøyane wieder eingliedern"
 NOR_fully_incorporate_orknoeyane:0 "Orknøyane vollständig integrieren"
 NOR_recreate_the_kingdom_of_the_isles:0 "Erschaffe das Königreich der Inseln neu"
 NOR_recreate_the_kingdom_of_the_isles_desc:0 "Nachdem wir die Hebriden und das Hochland erobert haben, könnten wir versuchen, einen Satellitenstaat auf Grundlage des alten Königreichs der Inseln zu errichten. Unter unserer Herrschaft würden sie ein autonomes Herzogtum sein, das die nordisch-gälischen Beziehungen fördert, um die Bevölkerung auf unsere Seite zu ziehen.\n\nObwohl dies Aufwand und Ressourcen erfordern würde, könnte es sich für uns durchaus lohnen, das Gebiet indirekt über lokale Lords, Landbesitzer und Politiker zu regieren."
 NOR_lords_of_the_isles_propaganda_aberdeenshire:0 "Verbreiten Sie Propaganda der Lords of the Isles nach Aberdeenshire"
 NOR_lords_of_the_isles_propaganda_aberdeenshire_desc:0 "Indem wir nicht nur die nordisch-gälischen, sondern auch die hochlandischen Verbindungen fördern, könnten wir die Hochlandbewohner von Aberdeenshire in unseren Satellitenstaat [LOI.GetNameDef] integrieren. Dadurch hätten sie eine größere Bevölkerungsbasis, aus der sie rekrutieren könnten, und unsere loyale Basis auf den Britischen Inseln würde deutlich wachsen."
 ##partisan operations
 NOR_partisan_operations:0 "Partisanenoperationen"
 NOR_partisan_operations_desc:0 "Da der Feind norwegisches Territorium besetzt, könnten wir unsere ausgebildeten Kommandos und Partisanen schicken, um die besetzten Gebiete zu infiltrieren und die Kriegsanstrengungen unseres Feindes zu sabotieren."
 NOR_gather_intelligence:0 "Sammeln Sie Informationen über den Feind"
 NOR_spread_resistance_sentiment:0 "Spread-Resistenz-Stimmung"
