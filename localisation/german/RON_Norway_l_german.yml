l_german:
 
 ####--Focuses--####
 ##unique search filters
 FOCUS_FILTER_NAW_UNIQUE_TACTICS:0 "Einzigartige Taktiken und Techniken"
 ##general purpose tooltips
 NOR_wip_tt:0 "\n§RIN ARBEIT§! - Die volle Funktionalität dieses §YFokus§! ist noch nicht implementiert. Überlegen Sie sich vorerst einen anderen Weg, da dieser bestenfalls Teilfunktionen bietet.\n"
 NOR_wip_light_tt:0 "\n§RIN ARBEIT§! - Für diesen §YFokus§! wurden ausreichende Grundfunktionen implementiert, er ist aber noch nicht so ausgereift wie geplant. Der Fokus kann jedoch problemlos ausgewählt werden, und es wurden einige Gameplay-Elemente hinzugefügt.\n"
 NOR_enable_puppet_states_tt:0 "Ermöglicht die Schaffung von Marionettenstaaten während Friedenskonferenzen.\n"
 NOR_icelandic_subject_benefits_tt:0 "\nWenn §YIsland§! als autonomes §YSubjekt§! von uns oder als eines unserer §YFraktionsmitglieder§! existiert, werden auch sie von dieser Politik profitieren.\n\n"
 NOR_political_advisor_needed_tt:0 "\nEin §Ypolitischer Berater§! wird benötigt, um unseren Übergang zu einer neuen §YRegierungsform§! abzuschließen, sei es durch Wahlen, Referenden oder Gewalt.\n\n"
 NOR_enable_british_naval_procurements_tt:0 "\nEine Einigung mit den Briten wird es §Ydecisions§! ermöglichen, britische §YSchiffe§! und §YU-Boote§! für die norwegische Marine zu beschaffen.\n"
 NOR_enable_german_naval_procurements_tt:0 "\nEine Einigung mit den Deutschen wird es §YEntscheidungen§! ermöglichen, in Deutschland hergestellte §YSchiffe§! und §YU-Boote§! für die norwegische Marine zu beschaffen.\n"
 NOR_cosmetic_tag_enabled_tt:0 "\nErmöglicht den Wechsel zwischen dem traditionellen, mittelalterlichen Erscheinungsbild des Königreichs Norwegen und umgekehrt. Dies ist jedoch nicht ganz billig. Überlegen Sie sich diese Option gut, da sie außer einem anderen Erscheinungsbild keine weiteren Vorteile bietet.\n"
 NOR_cosmetic_tag_switch_tt:0 "\nWechselt zum Erscheinungsbild des traditionellen, mittelalterlichen §YKönigreichs Norwegen§!. Da dies der richtige Zeitpunkt dafür ist, gilt hier und nur hier ein kräftiger §Geld-Zeit-Rabatt§!..."
 ##naval
 NOR_encourage_fishing:0 "Ermutigen Sie zum Angeln"
 NOR_encourage_fishing_desc:0 "Durch die Förderung der Nutzung unserer langen Küstenlinie und der umliegenden reichen Fischgründe könnte unsere Wirtschaft profitieren."
 NOR_establish_nortraship:0 "Gründung von Nortraship"
 NOR_establish_nortraship_desc:0 "Norwegische Reeder verfügen über Hunderte moderner Handelsschiffe, die Fracht rund um die Welt transportieren. Wir sollten eine staatliche Organisation gründen, die diese Schiffe im Bedarfsfall beschlagnahmt und verwaltet."
 NOR_establish_nortraship_tt:0 "\nMit der Gründung von §YNortraship§! können wir nicht nur die direkte Kontrolle über unsere Handelsflotte übernehmen, sondern diese möglicherweise auch an wichtige Verbündete delegieren.\n"
 NOR_landing_crafts:0 "Nortraship Landungsboote"
 NOR_landing_crafts_desc:0 "Nortraship und unsere etablierten Schifffahrtsunternehmen entwickeln neue Landungsboote für unsere Streitkräfte. Die Marine erwägt die Aufstellung spezialisierter Truppen für den Einsatz solcher Schiffe."
 NOR_navy:0 "Flottenaufbau"
 NOR_navy_desc:0 "Die Flotte war schon immer die Stärke Norwegens. Wir sollten dieses großartige Erbe nicht vernachlässigen."
 NOR_nortraship_production_incentives:0 "Nortraship-Produktionsanreize"
 NOR_nortraship_production_incentives_desc:0 "Die Handelsschiffe und Konvois sind auf sich allein gestellt schutzlos. Wir sollten daher Anreize für die Schiffsproduktion schaffen und vielleicht Schiffskonstrukteure zusammenbringen, die auf die Bedürfnisse unserer Handelsflotte spezialisiert sind."
 NOR_nortraship_production_incentives_tt:0 "\n§YNortraship Escort Docks§! wird als Schiffsdesigner verfügbar sein.\n"
 NOR_coastal_defense_specialization:0 "Küstenverteidigungsspezialisierung"
 NOR_coastal_defense_specialization_desc:0 "Durch die Bündelung unserer etablierten Schiffbauindustrie und der norwegischen Marine könnten wir Schiffsdesigns und Taktiken entwickeln, die speziell auf die norwegischen Bedürfnisse zugeschnitten sind. Dies würde höchstwahrscheinlich eine Küstenverteidigungsflotte bedeuten, die sowohl landgestützte Truppen entlang der Küste unterstützen als auch begrenzte Hit-and-Run-Operationen auf hoher See durchführen kann."
 NOR_escorts:0 "Moderne Begleitschiffe"
 NOR_escorts_desc:0 "Wir sollten unsere große Handelsflotte mit modernen Begleitschiffen vor möglichen Überfällen schützen."
 NOR_submarines:0 "U-Boot-Entwicklung"
 NOR_submarines_desc:0 "U-Boote eignen sich hervorragend, um unsere Küsten unbemerkt zu patrouillieren. Lassen Sie uns die Möglichkeiten moderner U-Boote voll ausschöpfen."
 NOR_develop_naval_tactics:0 "Setzen Sie Tordenskjolds Vermächtnis fort"
 NOR_develop_naval_tactics_desc:0 "Mutige und einfallsreiche Marinetaktiken prägten die Karriere unseres Nationalhelden, Vizeadmiral Peter Wessel Tordenskjöld. Er bewies, dass Innovation und kluge Taktik auf See Schlachten und sogar Kriege gewinnen können. Lasst uns dieses Erbe ehren."
 NOR_capital_ships:0 "Großkampfschiffe"
 NOR_capital_ships_desc:0 "Wir sollten darüber nachdenken, eigene Großkampfschiffe zu bauen, um unsere leichteren Begleitschiffe zu unterstützen. Durch die Verbesserung unserer Produktionsanlagen sollten wir diese modernen Großkampfschiffe problemlos produzieren können."
 NOR_capital_ships_tt:0 "\nEine verbesserte Version von §YHorten Naval Yard§! wird freigeschaltet.\nSollten Sie sie derzeit als §YShip Designer§! haben, wird dieser Fokus §Mkostenlos auf die aktualisierte Version umsteigen§!.\n\n"
 NOR_navy_wing:0 "Marineflügel"
 NOR_navy_wing_desc:0 "Lassen Sie uns unseren Marineflügel weiterentwickeln, damit er die Marine bei ihren Operationen entlang der Küste unterstützen kann."
 NOR_carriers:0 "Frachtführer"
 NOR_carriers_desc:0 "Obwohl unsere Flugzeuge aufgrund unserer langen Küste eine gute Reichweite haben, könnte eine trägergestützte Flotte mit Flugplätzen, die sich dorthin bewegen können, wo sie gebraucht werden, eine noch bessere Reichweite bieten."
 ##air
 NOR_bases:0 "Luftwaffenstützpunkte"
 NOR_bases_desc:0 "Angesichts der großen Entfernungen innerhalb unseres Landes ist der Bau von Luftwaffenstützpunkten rund um das Land möglicherweise die beste Lösung, wenn wir unseren Flugzeugen die nötigen Stützpunkte und den Treibstoff zur Verfügung stellen wollen, um einen ordnungsgemäßen Betrieb zu gewährleisten."
 NOR_merge:0 "Die Luftflügel zusammenführen"
 NOR_merge_desc:0 "Angesichts unserer kleinen Luftgeschwader und der unzusammenhängenden Luftkommandos wäre es möglicherweise besser, die Heeres- und Marinegeschwader unter einem Kommando zusammenzulegen. Lassen Sie uns also einen dritten Zweig des norwegischen Militärs gründen: die norwegische Luftwaffe."
 NOR_light_fighter:0 "Leichte Jäger"
 NOR_light_fighter_desc:0 "Leichte Kampfflugzeuge sind erschwinglich, wendig und schnell. Sie können Truppen unterstützen, feindliche Flugzeuge bekämpfen und sogar auf uns zukommende Bomber stoppen."
 NOR_fortify_military_bases:0 "Befestigen Sie unsere Militärstützpunkte"
 NOR_fortify_military_bases_desc:0 "Wir sollten rund um unsere Militärstützpunkte Verteidigungsanlagen, Bunker und Flugabwehranlagen errichten, damit unsere Armee, Marine und Luftwaffe versorgt und ausgerüstet bleiben können."
 NOR_medium:0 "Mittlere Flugzeuge"
 NOR_medium_desc:0 "Wir sollten in Erwägung ziehen, Flugzeuge mit größerer Reichweite zu bauen, damit wir unsere Meere verteidigen können, während wir vor der norwegischen Küste operieren."
 ##army
 NOR_army:0 "Die norwegische Armee"
 NOR_army_desc:0 "Hæren, die Armee, wird zwar wirtschaftlich vernachlässigt, verfügt aber dennoch über viel Fachwissen und talentierte Mitarbeiter. Lassen Sie uns sehen, wie wir dies trotz wirtschaftlicher Einschränkungen weiter ausbauen können."
 NOR_army_wing:0 "Armeeflügel"
 NOR_army_wing_desc:0 "Lassen Sie uns unseren Heeresflügel weiterentwickeln, damit er die Armee bei landgestützten Operationen unterstützen kann."
 NOR_winter_tactics:0 "Skiinfanterie"
 NOR_winter_tactics_desc:0 "1747 wurde hier in Norwegen das erste offizielle Skikorps der Welt gegründet. Seitdem ist der Einsatz von Skiern in unserer Armee weit verbreitet. Die Vorteile dieser Fähigkeit für unsere Soldaten zeigen sich im Winter und in größeren Höhen."
 NOR_winter_tactics_tt:0 "Aktiviert §HSki-Infanterie§!\n§HLandeinheiten:\n Berg§!: Angriff: §G+10%§!\n§H Berg§!: Bewegung: §G+10%§!\n§H"
 NOR_mountaineers:0 "Bergsteiger"
 NOR_mountaineers_desc:0 "Obwohl es in unserem Land viele talentierte Bergsteiger gibt, können einige durch militärische Spezialisierung auch bei Bergoperationen wahre Spitzenleistungen erbringen. Mit solch spezialisierten Truppen haben die Deutschen den Italienern im Ersten Weltkrieg verheerende Niederlagen zugefügt, was beweist, dass spezialisierte Truppen unsere Zeit wert sind."
 NOR_mountaineers_tt:0 "\nWir können jetzt §YBergsteiger-Divisionen§ einsetzen!.\n\n"
 NOR_urban_defenses:0 "Städtische Verteidigung"
 NOR_urban_defenses_desc:0 "Wir sollten alle wichtigen Städte befestigen, um sie vor möglichen Invasionen zu schützen. Zusätzlich zu den Befestigungen um ausgewählte Städte sollte eine Verteidigungslinie von Halden bis zum großen Fluss Glomma errichtet werden. Eine solche Verteidigungslinie könnte entscheidend sein, um Eindringlinge aus den schwedischen Grenzregionen daran zu hindern, die städtischen Gebiete im inneren Oslofjord zu bedrohen."
 NOR_urban_defenses_tt:0 "\nErmöglicht §YEntscheidungen§! den Aufbau der §YGlomma-Halden-Verteidigungslinie§! und der §YLyngen-Verteidigungslinie§!.\n"
 NOR_jegerbataljonene:0 "Merge Jegerbataljonene"
 NOR_jegerbataljonene_desc:0 "Anfang 1930 wurde das Jägerregiment, Jegerkorpset IR 2, in die drei Bataillone 1. Jegerbataljon, 2. Jegerbataljon und 3. Jegerbataljon aufgeteilt. Kürzlich kam eine neue Idee auf: Um die Schlagkraft unserer begrenzten Truppenstärke zu erhöhen, sollten wir unsere Kräfte in größeren militärischen Formationen konzentrieren. Um dies zu erreichen, werden wir nun die Bataillone zu einer neuen Formation zusammenfassen, der 1. Jegerdivisjon."
 NOR_jegerbataljonene_tt:0 "Erhalte eine §Yelite-Infanteriedivision§! in Østlandet.\n"
 NOR_continued_motorization_efforts:0 "Fortgesetzte Motorisierungsbemühungen"
 NOR_continued_motorization_efforts_desc:0 "Obwohl die Motorisierung des Heeres bereits zu einem gewissen Grad geplant und umgesetzt ist, wäre es gut, diese fortzusetzen, damit größere Teile unseres Heeres schnell reagieren können. Neben dem Transport unserer Truppen selbst könnten Lastwagen auch Nachschub transportieren und mobile Feldlazarette für unsere Truppen bereitstellen."
 NOR_bicycle_battalions:0 "Fahrradbataillone"
 NOR_bicycle_battalions_desc:0 "Treibstoff ist nicht billig. Anstatt zu riskieren, dass unsere Truppen durch einen möglichen Treibstoffmangel aufgehalten werden, wäre es sinnvoller, das vielseitige Fahrrad für unsere Armee zu nutzen. Daher sollten wir neue Fahrradbataillone aufstellen, um unseren Truppen die Fortbewegung in unseren Städten und ländlichen Gebieten zu erleichtern."
 NOR_armored_battalions:0 "Panzerbataillone"
 NOR_armored_battalions_desc:0 "Um die Pattsituation des Ersten Weltkriegs zu überwinden, entwickelten Großbritannien und Frankreich gewaltige gepanzerte Kriegsmaschinen, die dem verheerenden Maschinengewehrfeuer der Westfront größtenteils standhielten. Neue Taktiken, Motoren, Fahrgestelle und Waffen haben diese Panzerfahrzeuge leistungsfähiger denn je gemacht. Daher sollten wir versuchen, in dieser Hinsicht zu den Großmächten aufzuschließen, selbst auf Kosten hoher Treibstoffkosten."
 NOR_armored_battalions_tt:0 "\n\nEin norwegisches Panzerprogramm, das zu den Großmächten Europas und Nordamerikas aufschließen will, würde erheblich von einer Allianz mit einem großen Panzerentwicklungsland oder einer Gruppe zum Technologieaustausch profitieren. Vorzugsweise beides.\n"
 NOR_equipment:0 "Geräteaufwand"
 NOR_equipment_desc:0 "Die Infanterie stellt das Rückgrat jeder Armee dar. Wir müssen dafür sorgen, dass sie stets über die beste Ausrüstung verfügt."
 NOR_encourage_recreational_shooting:0 "Ermutigen Sie zum Freizeitschießen"
 NOR_encourage_recreational_shooting_desc:0 "Norwegen ist ein Land, in dem viele Menschen Waffen für Sport und Jagd nutzen. Durch die Förderung dieser Waffennutzung sollten die allgemeine Waffenkompetenz und die Überlebensfähigkeiten unseres Landes verbessert werden."
 NOR_encourage_recreational_shooting_tt:0 "\nDurch Abschluss dieses Schwerpunkts wird §YDisruptives Kreuzfeuer§! aktiviert, eine neue Verteidigungstaktik, bei der präzises Kleinwaffenfeuer aus verborgenen Positionen genutzt wird, um den Feind aufzuhalten.\n"
 NOR_heimevernet:0 "Heimevernet"
 NOR_heimevernet_desc:0 "Lassen Sie uns eine Kampfgruppe bilden, die den ersten Schlag einer ausländischen Invasion abwehren kann. Mit regelmäßigem Training könnte eine schnell einsetzbare Heimwehr überraschend nützlich sein."
 NOR_fund_the_rearmament:0 "Finanzieren Sie die Wiederaufrüstung"
 NOR_fund_the_rearmament_desc:0 "Lassen Sie uns etwas gegen die Vernachlässigung und den Mangel an Ressourcen unternehmen, unter denen unsere Streitkräfte leiden."
 NOR_fund_the_rearmament_tt:0 "\nEinige unserer Kommandanten werden als §YTheoretiker§! verfügbar sein.\n\n"
 NOR_a_serious_defense_budget:0 "Ein ernsthafter Verteidigungshaushalt"
 NOR_a_serious_defense_budget_desc:0 "Eine erneute Erhöhung der Ausgaben sollte sicherstellen, dass unsere Streitkräfte auf das Schlimmste vorbereitet sind."
 ##economy
 NOR_armfac:0 "Erste Rüstungsinvestitionen"
 NOR_armfac_desc:0 "Beginnen wir mit der Wiederaufrüstung, indem wir einen Teil der Mittel in die heimische Rüstungsproduktion umleiten."
 NOR_armfac2:0 "Rüstungsproduktion weiter ausbauen"
 NOR_armfac2_desc:0 "Lassen Sie uns nun, nachdem der erste Anstoß gegeben ist, unsere Rüstungsanlagen weiter ausbauen und unsere Waffenproduktion diversifizieren."
 NOR_armfac3:0 "Errichtung militärischer Industrieparks"
 NOR_armfac3_desc:0 "Durch den Bau großer Industrieparks zur Sicherung einer inländischen Produktionskette vom kleinsten Bolzen oder Geschoss bis zum größten Fahrzeug oder Schiff können wir eine florierende Rüstungsindustrie aufbauen."
 NOR_kongsberg_research:0 "Kongsberg-Forschung"
 NOR_kongsberg_research_desc:0 "Unsere Rüstungsentwickler in Kongsberg können nun ihren Forschungsbereich durch zusätzliche Mittel erweitern. Dies soll uns helfen, mit modernen Entwicklungen Schritt zu halten."
 NOR_de_norske_statsbaner:0 "De norske Statsbaner"
 NOR_de_norske_statsbaner_desc:0 "De norske Statsbaner, die norwegische Staatsbahn, wurde 1883 als gemeinsames staatliches Unternehmen für alle seit 1861 eröffneten Eisenbahnen gegründet. Die Finanzierung weiterer Eisenbahnprojekte in Südnorwegen könnte sich langfristig positiv auf die Wirtschaft auswirken."
 NOR_nordlandsbanen:0 "Beenden Sie die Nordlandlinie"
 NOR_nordlandsbanen_desc:0 "Die Nordlandsbanen, die Nordlandlinie, ist seit den 1920er Jahren ein laufendes Projekt der Norwegischen Staatsbahn. Durch die Finanzierung des Baus dieser Eisenbahnen können wir diesen Prozess beschleunigen und unsere dünn besiedelten, aber ressourcenreichen nördlichen Provinzen mit dem Rest des Landes verbinden."
 NOR_norsk_jernverk:0 "A/S Norsk Jernverk"
 NOR_norsk_jernverk_desc:0 "Lassen Sie uns eine gemeinsame Gesellschaft gründen, die uns mit Eisen, Stahl und anderen Metallen versorgt."
 NOR_expand_domestic_steel_production:0 "Ausbau der heimischen Stahlproduktion"
 NOR_expand_domestic_steel_production_desc:0 "Wir sollten Norsk Jernverk einladen, unsere heimische Stahlproduktion durch neue Minen und Schmelzhütten unter Einsatz moderner Technologie zu erweitern."
 NOR_access_the_small_deposits:0 "Greifen Sie auf die kleineren Einlagen zu"
 NOR_access_the_small_deposits_desc:0 "Obwohl die Vorkommen in Südnorwegen nicht groß genug sind, um eine rentable Ausbeutung zu gewährleisten, können sie im Notfall genutzt werden."
 NOR_statmin:0 "Statmin"
 NOR_statmin_desc:0 "Durch die Zusammenführung aller Bergbauunternehmen unter einem Dach können diese ihr Wissen und ihre Erfahrungen austauschen."
 NOR_lumber_industries:0 "Entwicklung der Holzindustrie"
 NOR_lumber_industries_desc:0 "Holz ist in unserem Land allgegenwärtig und trug maßgeblich dazu bei, dass Norwegen zu Beginn des Ersten Weltkriegs ein recht wohlhabendes Land war. Lassen Sie uns daher diese profitable Industrie ausbauen. Wer weiß, vielleicht wird ein norwegisches Unternehmen eines Tages zum weltweit führenden Papierproduzenten? Man darf ja träumen."
 NOR_invest_in_district_industries:0 "Bezirksinvestitionen"
 NOR_invest_in_district_industries_desc:0 "Investieren wir in unsere Landkreise und ländlichen Gebiete. Mit lokalen Produzenten und Dienstleistungen können unsere Bürger jeden Winkel des Landes nutzen."
 NOR_nth:0 "NTH"
 NOR_nth_desc:0 "Ein Großteil unserer nationalen Expertise findet sich in der Norges Tekniske Høiskole, dem Norwegischen Institut für Technologie in Trondheim. Durch die Förderung dieser Hochschule könnten wir florieren. Vielleicht gelingt es uns sogar, sie mit der Zeit zu einer Universität auszubauen?"
 NOR_tungtvann:0 "Investieren Sie in Schwerwasseranlagen"
 NOR_tungtvann_desc:0 "Die Industrieanlagen und Forschungslabore von Norsk Hydro in Vemork und Rjukan versorgen uns bereits mit Energie und nützlichen Chemikalien. Das überschüssige Schwerwasser, das sie produzieren, dürfte uns auch dabei helfen, bisher unerforschte Wissenschaftsbereiche zu erschließen. Vielleicht gibt es sogar eine potenzielle militärische Anwendung? Darüber zu vertiefen lohnt sich allerdings nicht."
 NOR_hydro:0 "Norsk Hydro"
 NOR_hydro_desc:0 "Das Unternehmen Norsk Hydro ist ein Pionier der norwegischen Wissenschaft und Industrie und ist in vielen (wenn auch miteinander verbundenen) Bereichen wie Elektrizität, Chemie, Düngemittel und Schwerwasser tätig."
 NOR_hydro_plants:0 "Bauen Sie mehr Wasserkraftwerke!"
 NOR_hydro_plants_desc:0 "Seit den 1890er Jahren wurden bereits zahlreiche Wasserkraftwerke errichtet, darunter einige, die damals zu den größten der Welt zählten. Doch es besteht noch Potenzial für weitere Kraftwerke, die Steigerung der Stromproduktion, die Bereitstellung moderner Annehmlichkeiten für unsere Bevölkerung und sogar die Energieversorgung unserer Schwerindustrie. Worauf warten wir noch?"
 NOR_expand_alu:0 "Produktion von expandiertem Aluminium"
 NOR_expand_alu_desc:0 "Wir sollten die überschüssige Energie aus unseren Wasserkraftwerken nutzen, um unsere Aluminiumwerke zu betreiben und zu erweitern. Dies ist in Høyanger bereits mit großem Erfolg von Norsk Aluminium Co. umgesetzt worden."
 ##political
 NOR_til_dovre_faller:0 "Enig og tro til Dovre Faller"
 NOR_til_dovre_faller_desc:0 "Vereint und treu, bis die Dovreberge zerfallen. Diese Worte sprachen unsere Vorfahren, als die Verfassung von 1814 geschrieben wurde. Wohin uns unser Weg auch führen mag, Norwegen war und bleibt eine Nation, die durch die gemeinsamen Anstrengungen eines vereinten Volkes und eines vereinten Willens aufgebaut wurde."
 ##democratic branch
 NOR_affirm_constitutional_monarchy:0 "Bekräftigung der konstitutionellen Monarchie"
 NOR_affirm_constitutional_monarchy_desc:0 "Indem wir unsere aktuelle Mischung aus Alt und Neu bekräftigen, können wir sicher sein, dass Hans Majestet Kongens Garde, die Wache Seiner Majestät des Königs, stets bereit sein wird, zu den Waffen zu greifen, um ihren König zu verteidigen und unser Volk zu inspirieren. Die Sicherheit der Menschen – ob hoch oder niedrig – ist für jeden Staat, der etwas auf sich hält, von größter Bedeutung."
 NOR_continuous_politics:0 "Kontinuierliche Politik"
 NOR_continuous_politics_desc:0 "Schenken wir unserer derzeitigen Regierung weiterhin Vertrauen in ihren politischen Kurs. Denn dieses Land ist auf gegenseitigem Vertrauen aufgebaut."
 NOR_continuous_politics_tt:0 "\nErmöglicht eine §YEntscheidung§!, die Sozialprogramme der Regierung Nygaardsvold zu beenden, mit der Absicht, die Weltwirtschaftskrise und ihre Auswirkungen zu bekämpfen.\n\n"
 NOR_change_starts_within:0 "Veränderung beginnt im Inneren ..."
 NOR_change_starts_within_desc:0 "Anstatt unseren riskanten Weg fortzusetzen oder die Regierung abzuschaffen, könnten wir interne Veränderungen vornehmen, Personal austauschen und Vertreter anderer Parteien zur Zusammenarbeit und Beratung einladen. Eine Hinwendung zur gemäßigteren Politik der Farmers&#39; Party anstelle der Labour Party könnte uns hier helfen."
 NOR_motion_of_no_confidence:0 "Misstrauensantrag"
 NOR_motion_of_no_confidence_desc:0 "Die Regierung hat sich gegenüber den zunehmenden Spannungen im Rest der Welt blind gezeigt. Ein neuer Kurs ist nötig."
 NOR_join_allies:0 "Schließen Sie sich den Verbündeten an"
 NOR_join_allies_desc:0 "Lasst uns ein Bündnis mit dem Britischen Empire eingehen. Die Macht der Royal Navy auf unserer Seite dürfte viele Angreifer abschrecken."
 NOR_eng_research:0 "Commonwealth-Technologie-Sharing"
 NOR_eng_research_desc:0 "Lassen Sie uns unsere Zusammenarbeit mit den Briten durch ein Forschungsabkommen ausbauen."
 NOR_eng_research_tt:0 "Laden Sie das Vereinigte Königreich ein, mit uns eine „Technologie-Sharing-Gruppe“ zu gründen.\n\nSehr gute Beziehungen würden wahrscheinlich ihre Akzeptanz sicherstellen.\n\n"
 NOR_expand_eng_research:0 "Erweitern Sie den gemeinsamen Technologieaustausch"
 NOR_expand_eng_research_desc:0 "Beauftragen Sie britische Experten, uns bei unserer Forschung zu unterstützen."
 NOR_north_atlantic_defense_focus:0 "Nordatlantische Verteidigungsinitiative"
 NOR_north_atlantic_defense_focus_desc:0 "Mit einer Nordatlantischen Verteidigungsinitiative könnten wir die Küsten unserer nordatlantischen Verbündeten und unsere eigenen vor Invasionen und Handelsbeschränkungen schützen. Die gemeinsamen Oberkommando- und Militärübungen würden unseren Streitkräften ebenfalls zugutekommen, unseren jedoch aufgrund des Machtgefälles vielleicht noch mehr."
 NOR_north_atlantic_defense_focus_tt:0 "Gründung der „Nordatlantischen Verteidigungsinitiative“ mit den Staaten des Nordatlantischen Commonwealth. Die enge Zusammenarbeit und das gemeinsame Oberkommando sollen dazu führen, dass die alliierten Truppen und Kommandeure im Laufe der Zeit bessere Leistungen erbringen, da sie von ihren Verbündeten lernen. Wenn unsere Verbündeten diesem Abkommen beitreten, könnten sie sich ebenfalls zu einer Aufrüstung inspiriert fühlen, wie wir es getan haben. Je nachdem, welche Aufrüstungspolitik wir zuvor gewählt haben, kann unsere nordatlantische Verteidigungspolitik etwas anders aussehen."
 NOR_american_military_support:0 "Suchen Sie amerikanische Militärunterstützung"
 NOR_american_military_support_desc:0 "Da die Vereinigten Staaten nun unser Verbündeter sind, könnten wir uns militärische Unterstützung von ihren Experten holen. Mit ihren enormen Ressourcen können sie uns sicherlich etwas beibringen, und ein stärkerer Verbündeter würde ihnen im Gegenzug zugutekommen."
 NOR_british_military_support:0 "Bitten Sie um britische Militärunterstützung"
 NOR_british_military_support_desc:0 "Da Großbritannien nun unser Verbündeter ist, könnten wir uns militärische Unterstützung von seinen Experten holen. Mit ihren Ressourcen und ihrer Kriegserfahrung können sie uns sicherlich etwas beibringen, und ein stärkerer Verbündeter würde ihnen im Gegenzug zugutekommen."
 NOR_delegate_control_of_the_merchant_fleet:0 "Delegierte Handelsflottenkontrolle"
 NOR_delegate_control_of_the_merchant_fleet_desc:0 "Da wir uns nun in einem gemeinsamen Krieg mit den Briten befinden, wäre es vielleicht an der Zeit, mit ihnen eine Vereinbarung über die Delegierung unserer großen Handelsflotte zu treffen. Für uns waren die Wettbewerbsfähigkeit unserer Schifffahrtsindustrie auch nach einem sicheren Sieg und die faire Bezahlung unserer Seeleute von entscheidender Bedeutung. Unter dieser Voraussetzung könnten die Briten uns im Gegenzug die Anschaffung kleiner Kriegsschiffe und U-Boote zu einem günstigeren Preis ermöglichen."
 NOR_armed_neutrality_once_more:0 "Erneut bewaffnete Neutralität"
 NOR_armed_neutrality_once_more_desc:0 "Viele unserer Politiker und Staatsmänner sind überzeugt, dass wir im Falle eines erneuten Konflikts in Europa am besten vor künftigen Konflikten schützen können, indem wir unsere bewaffnete Neutralität aus der Zeit des Ersten Weltkriegs beibehalten. Mit einem starken Militär könnten wir Angreifer abschrecken, und im Falle eines Angriffs könnten wir uns jederzeit mit den Gegnern unserer potenziellen Angreifer verbünden."
 NOR_armed_neutrality_once_more_tt:0 "\nVersuchen Sie, [Root.GetNameDef] neutral zu halten. Sollte ein Angreifer unsere §YNeutralität§! verletzen, ermöglicht der Fokus auf bewaffnete Neutralität §YEntscheidungen§!, Großmächte um Allianzen zu bitten.\n"
 NOR_three_brothers:0 "Drei Brüder"
 NOR_three_brothers_desc:0 "In der sechsten Strophe unserer Nationalhymne singen wir über die drei Brüder. Lasst uns leben, was wir singen, und ein Bündnis mit Schweden und Dänemark initiieren. Der Panskandinavismus verdient eine Wiederbelebung."
 NOR_three_brothers_tt:0 "\nBei schlechteren Beziehungen ist es weniger wahrscheinlich, dass andere Länder unserer Fraktion beitreten, während gute Beziehungen ihnen den Beitritt praktisch garantieren.\n"
 NOR_nor_research:0 "Nordischer Technologieaustausch"
 NOR_nor_research_desc:0 "Lassen Sie uns die Zusammenarbeit mit unseren Nachbarn durch eine Forschungsvereinbarung ausbauen."
 NOR_nor_research_tt:0 "Laden Sie Dänemark und Schweden ein, mit uns eine „Technologie-Sharing-Gruppe“ zu gründen.\n\nSehr gute Beziehungen würden wahrscheinlich ihre Akzeptanz sicherstellen.\n\n"
 NOR_expand_nor_research:0 "Erweitern Sie den nordischen Technologieaustausch"
 NOR_expand_nor_research_desc:0 "Holen Sie Experten aus unseren Nachbarländern hinzu, um unsere Forschung zu unterstützen und den Technologieaustausch weiter auszubauen."
 NOR_expand_nor_research_tt:0 "Gewährt Norwegen und seinen Verbündeten Forschungsboni.\nDie Anzahl der Forschungsboni steigt mit der zunehmenden Anzahl nordischer Länder in unserer Fraktion.\n\n"
 NOR_fourth_brother:0 "Der vierte Bruder"
 NOR_fourth_brother_desc:0 "Obwohl Finnland in der Hymne nicht erwähnt wird, sollten wir es aufgrund seiner historischen Verbindungen zu Skandinavien, seiner ähnlichen Kultur und seiner angenehmen Gesellschaft einbeziehen. Der Pan-Skandinavismus weicht nun dem Pan-Nordismus. Was dies für Estland bedeutet, ist derzeit unbekannt."
 NOR_fourth_brother_tt:0 "\nBei schlechteren Beziehungen ist es weniger wahrscheinlich, dass andere Länder unserer Fraktion beitreten, während gute Beziehungen ihnen den Beitritt praktisch garantieren.\n"
 NOR_invite_fin:0 "Finnland einladen"
 NOR_invite_fin_desc: "With Finland in our faction they should take part in our research agreement."
 NOR_invite_fin_tt:0 "Laden Sie Finnland ein, sich mit uns der §YNordischen Forschungszusammenarbeit§! anzuschließen.\n\nSehr gute Beziehungen würden wahrscheinlich ihre Akzeptanz sicherstellen.\n\n"
 NOR_the_dano-norwegian_deal:0 "Der dänisch-norwegische Deal"
 NOR_the_dano-norwegian_deal_desc:0 "Schlagen wir den Dänen einen Austausch vor, bei dem wir unsere alten Inseln, die Färöer und Island, zurückerhalten, wenn wir im Gegenzug unseren Anspruch auf Grönland aufgeben und den dänischen Anspruch auf Schleswig-Holstein unterstützen, falls sie in der Lage sind, ihn zu übernehmen."
 NOR_the_dano-norwegian_deal_tt:0 "\nDamit die §YLandtransfers§! und der §Y[DEN.GetAdjective]§!-Kern in Schleswig-Holstein wirksam werden, muss §Y[DEN.GetNameDef]§! unserem Vorschlag zustimmen. §GBessere Beziehungen§! würden hier wahrscheinlich zu besseren Ergebnissen führen.\n\n"
 NOR_the_fennoscandian_deal:0 "Der Fennoskandische Deal"
 NOR_the_fennoscandian_deal_desc:0 "Mit Schweden und Finnland im Bündnis haben Pragmatiker aller drei Nationen ein geheimes Abkommen geschlossen, das die Grenzen aller drei fennoskandischen Nationen nach Osten verschieben und Finnlands Ostgrenze sichern soll. Schweden tritt das ehemals norwegische Båhuslen an Norwegen ab, Finnland kündigt die Åland-Konvention, und falls ein eventueller sowjetischer Angriff abgewehrt wird, fällt Karelien an Finnland."
 NOR_the_fennoscandian_deal_tt:0 "\nIm Gegensatz zum dänisch-norwegischen Abkommen ist das fennoskandische Abkommen für alle Seiten so vorteilhaft, dass wir die Akzeptanz aller Seiten sicherstellen können, solange Schweden und Finnland in unserem Bündnis bleiben. Wir riskieren jedoch, die russische Skepsis gegenüber unserer Fraktion zu verstärken, wenn wir uns bereit erklären, Finnlands Ostgrenzen zu verteidigen.\n\n"
 NOR_seek_american_support:0 "Suchen Sie amerikanische Unterstützung"
 NOR_seek_american_support_desc:0 "Durch Handelsbeziehungen, die Hilfsbereitschaft nordamerikanischer Amerikaner und unsere ähnlichen Werte könnten wir versuchen, bei den Amerikanern beliebt zu werden. So könnten sie uns später unterstützen oder beschützen, falls wir es brauchen. Es gibt jedoch keine Garantie dafür, dass dies gelingt, denn die Amerikaner legen Wert auf Neutralität und Frieden."
 NOR_pragmatic_diplomacy:0 "Pragmatische Diplomatie"
 NOR_pragmatic_diplomacy_desc:0 "Selbst mit einem vereinten Nordeuropa können wir einem Angriff sowohl der Deutschen als auch der Russen nicht standhalten. Um zu überleben, müssen wir die Großmächte um Hilfe bitten, und selbst das könnte nicht ausreichen. Partei zu ergreifen, könnte unsere einzige Wahl sein ..."
 NOR_stand_against_communism:0 "Ein Widerstand gegen den Kommunismus"
 NOR_stand_against_communism_desc:0 "Auf der Seite Deutschlands zu stehen und Nichtangriffspakte, Freihandel und freie Schifffahrt in der Ostsee zu versprechen, wäre vielleicht besser, aber den Dänen dürfte das nicht gefallen, da wir ihnen Schleswig versprochen haben. Und den Russen wird es sicher nicht gefallen …"
 NOR_stand_against_communism_tt:0 "\nParteiergreifung kann notwendig sein, um einen Zweifrontenkrieg zu vermeiden. Diejenigen, denen wir uns nähern, werden uns eher in Ruhe lassen oder sich sogar mit uns anfreunden. Die verachtete Seite wird uns jedoch eher angreifen.\n"
 NOR_stand_against_fascism:0 "Ein Widerstand gegen den Faschismus"
 NOR_stand_against_fascism_desc:0 "Sich auf die Seite Russlands zu stellen, was Nichtangriffspakte, Freihandel und einigermaßen feste Ostgrenzen mit sich bringt, wäre vielleicht besser. Den Finnen dürfte es jedoch nicht gefallen, wenn wir uns auf die Seite Russlands stellen und gegen Deutschland arbeiten. Sie behaupten, es sei nicht ihr Kampf und die Russen würden einfach zurückkommen, sobald Deutschland am Boden ist. Und den Deutschen wird das sicher nicht gefallen …"
 NOR_stand_against_fascism_tt:0 "\nParteiergreifung kann notwendig sein, um einen Zweifrontenkrieg zu vermeiden. Diejenigen, denen wir uns nähern, werden uns eher in Ruhe lassen oder sich sogar mit uns anfreunden. Die verachtete Seite wird uns jedoch eher angreifen.\n"
 NOR_end_foreign_influence:0 "Ein Ende des ausländischen Einflusses"
 NOR_end_foreign_influence_desc:0 "Lassen Sie Politiker und Medien in unserem Bündnis den ausländischen Einflüssen auf unser Volk entgegenwirken. Unsere Politik liegt in unserer Hand!"
 NOR_end_foreign_influence_tt:0 "Entfernt ausländische politische Einflüsse von unseren engen Verbündeten und uns.\n"
 NOR_nordic_joint_defense_focus:0 "Gemeinsame Nordische Verteidigungsinitiative"
 NOR_nordic_joint_defense_focus_desc:0 "Einige der klügsten Staatsmänner und Verteidigungsexperten der nordischen Länder drängen auf eine gemeinsame nordische Verteidigungskooperation mit einem gemeinsamen Oberkommando und gemeinsamen Übungen. Jetzt ist es vielleicht an der Zeit, die Initiative zu ergreifen und Vertreter unserer Verbündeten einzuladen. Dies könnte genau das sein, was wir brauchen, um unsere Freiheit und unseren Wohlstand zu sichern."
 NOR_nordic_joint_defense_focus_tt:0 "Bildet mit den anderen nordischen Fraktionsmitgliedern die „Nordische gemeinsame Verteidigungsinitiative“. Die enge Zusammenarbeit und das gemeinsame Oberkommando sollten dazu führen, dass nordische Truppen und Kommandeure mit der Zeit bessere Leistungen erbringen, da sie von ihren Verbündeten lernen. Wenn unsere Verbündeten dieser Vereinbarung zustimmen, könnten sie ebenfalls zu einer Aufrüstung inspiriert werden, wie wir es getan haben.\n\nJe nachdem, welche Aufrüstungspolitik wir zuvor gewählt haben, kann unsere nordische Verteidigungspolitik etwas variieren.\n\n"
 NOR_the_brotherhood_of_nations:0 "Bruderschaft Demokratischer Nationen"
 NOR_the_brotherhood_of_nations_desc:0 "Eine Namensänderung unseres Bündnisses ist längst überfällig, insbesondere angesichts der Tatsache, dass wir mittlerweile nicht mehr nur ein Bündnis von drei Brüdern sind. Die Umbenennung in Bruderschaft Demokratischer Nationen und die Einbeziehung einiger weiterer friedlicher europäischer Nationen sollten unsere diplomatische Dynamik aufrechterhalten."
 NOR_the_brotherhood_of_nations_tt:0 "\nBei schlechteren Beziehungen ist es unwahrscheinlicher, dass andere Länder unserer Fraktion beitreten, während gute Beziehungen ihnen den Beitritt praktisch garantieren.\n"
 NOR_support_neighbors:0 "Unterstützen Sie unsere Nachbarn"
 NOR_support_neighbors_desc:0 "Wir müssen bereit sein, unsere Nachbarn zu unterstützen, falls sie Hilfe gegen ausländische Invasoren benötigen."
 NOR_gutta_paa_skauen:0 "Gutta på skauen"
 NOR_gutta_paa_skauen_desc:0 "Es gibt Menschen, die bereit sind, sich für unseren König und unsere Sache unter Feinden zu verstecken und diese zu infiltrieren. Und oft melden sie sich auch freiwillig für unsere Sache, wenn unsere Freunde vom Krieg betroffen sind. Wir sollten diese Menschen willkommen heißen."
 NOR_gutta_paa_skauen_tt:0 "\n§YGunnar FT Sønsteby§! wird als Berater zur Verfügung stehen.\n"
 NOR_saboteurs:0 "Saboteure"
 NOR_saboteurs_desc:0 "Da sich eine Widerstandsbewegung etabliert hat, ist es vielleicht an der Zeit, einige unserer Partisanen für geheime Sabotageaktionen hinter den feindlichen Linien auszubilden. Nach der Ausbildung dieser Kommandos werden diese tapferen Männer unsere gut geplanten und geheimen Operationen durchführen. Es könnte sein, dass ihnen die Mission ihres Lebens bevorsteht."
 NOR_saboteurs_tt:0 "Ermöglicht §YEntscheidungen§!, §YPartisanenoperationen§! gegen Feinde durchzuführen, die norwegisches Territorium besetzen.\n"
 ##monarchist branch
 NOR_traditions_and_monarchy:0 "Monarchistische Traditionen wiederbeleben"
 NOR_traditions_and_monarchy_desc:0 "Viele setzen sich in diesen unsicheren Zeiten für Fürsorge ein. Und was wäre da besser, als sich wieder auf unsere bewährten Wurzeln zu besinnen? Die Wiederbelebung der Tradition ist den Mächtigen schon seit einiger Zeit ein wichtiges Anliegen."
 NOR_traditions_and_monarchy_tt:0 "\n§YFredrik Wedel Jarlsberg§! wird als Berater zur Verfügung stehen. Ein §YStändiger Monarchist§! als Berater ermöglicht besondere §YEntscheidungen§! in Vorbereitung auf einen §RCrivellen Krieg§! oder eine andere monarchistische Machtübernahme.\n\n"
 NOR_develop_the_kingdom:0 "Entwickle das Königreich"
 NOR_develop_the_kingdom_desc:0 "Wir sollten unseren Weg zur Schaffung eines idealen Königreichs mit dem Aufbau einer soliden Infrastruktur dafür beginnen. Ein starkes Fundament wird sicherlich notwendig sein, um den Staat, unser Volk und unsere Werte zu tragen."
 NOR_traditions_worth_fighting_for:0 "Traditionen, für die es sich zu kämpfen lohnt"
 NOR_traditions_worth_fighting_for_desc:0 "Da Monarchismus und traditionelle Werte täglich an Popularität gewinnen, stellt sich die Frage, wie wir unsere neu gewonnenen Werte an die Macht bringen können. Warten wir auf die Wahlen? Starten wir einen Putsch? Oder kämpfen wir, wenn es darauf ankommt?"
 NOR_traditions_worth_fighting_for_tt:0 "\nKönnte möglicherweise zu einem §RCrivellen Krieg§ führen!.\n"
 NOR_matters_of_presentation:0 "Fragen der Präsentation"
 NOR_matters_of_presentation_desc:0 "Angesichts der Wiederherstellung unseres traditionellen Königreichs stellen sich einige Fragen dazu, wie wir unsere Nation der Außenwelt und unserer eigenen Bevölkerung präsentieren wollen. Die ersten Fragen, die sich stellen, sind die Beibehaltung oder Aufhebung der Aristokratie und möglicherweise auch die Frage unserer nationalen Symbolik, insbesondere unserer Flagge."
 NOR_the_location_of_power:0 "Der Ort der Macht"
 NOR_the_location_of_power_desc:0 "Eine weitere Frage der Symbolik und Präsentation ist unsere Hauptstadt und wie sie der Welt präsentiert wird. Und vielleicht am wichtigsten: Wo sollte sie liegen, buchstäblich und geografisch gesehen?"
 NOR_matters_of_practicality:0 "Praktische Aspekte"
 NOR_matters_of_practicality_desc:0 "Unsere Anhänger haben uns durch die wichtigen ersten Schritte zur Wiederherstellung einer Nation alter Werte geführt. Aber wir müssen Stellung beziehen, wer die monarchistische Koalition durch ihre wichtigen ersten Schritte und Reformen führen soll …"
 NOR_the_extent_of_power:0 "Das Ausmaß der Macht"
 NOR_the_extent_of_power_desc:0 "Da die Koalition nun handlungsbereit ist, müssen wir als letzte praktische Angelegenheit die Definition der Machtbefugnisse des Monarchen klären. Was genau kann der König entscheiden? Sollen wir einfach eine moderne konstitutionelle Monarchie sein, die Familienwerte fördert? Soll der König mehr als nur symbolische Macht haben? Ist der Premierminister dem König gegenüber verantwortlich? Und wie steht es um unsere Wahlen?"
 NOR_foreign_relations:0 "Stärkung der Außenbeziehungen"
 NOR_foreign_relations_desc:0 "Durch den Aufbau solider diplomatischer und Handelsbeziehungen mit anderen Nationen können wir unsere Chancen verbessern, im Falle eines weiteren europäischen Krieges Schaden zu vermeiden, falls wir unsere neutrale Haltung beibehalten möchten."
 NOR_foreign_relations_tt:0 "\nDie Beschwichtigung Großbritanniens und Deutschlands sollte unmittelbare Feindseligkeiten gegen uns unwahrscheinlich machen.\n\n"
 NOR_the_nordic_policy:0 "Die nordische Politik"
 NOR_the_nordic_policy_desc:0 "Die dringendsten (und damit auch wichtigsten) diplomatischen Fragen eines Landes werden immer jene sein, die seine unmittelbaren Nachbarn betreffen. Sollten wir uns mit den anderen nordischen Ländern anfreunden oder sollte ein norwegischer Staat zum ersten Mal seit über einem halben Jahrtausend im Ausland Gewalt anwenden?"
 NOR_reclaim_the_islands:0 "Erobern Sie die Inseln zurück"
 NOR_reclaim_the_islands_desc:0 "Wenn das norwegische Königreich wirklich zu seinem früheren Glanz zurückkehren soll, müssen wir die ehemals norwegischen Inseln Färöer, Island und Grönland zurückfordern, die Dänemark durch den Vertrag von Kiel zu Unrecht zugesprochen wurden."
 NOR_icelandic-faroese_revolt:0 "Isländisch-Färöischer Aufstand"
 NOR_icelandic-faroese_revolt_desc:0 "Da wir uns im Konflikt mit den Dänen befinden, könnten wir Aufstände in Island und auf den Färöern anzetteln. Diese ehemaligen norwegischen Inseln haben stärkere historische und kulturelle Bindungen zu Norwegen als zu Dänemark. Dies würde dazu führen, dass die Färöer an Norwegen angeschlossen werden, während Island sich indirekt als abhängiges, aber autonomes Gebiet unserer Sache anschließt."
 NOR_icelandic-faroese_revolt_tt:0 "\nÜberträgt uns das Eigentum an den §YFäröer-Inseln§! und macht §YIsland§! zu einem autonomen §YUntertan§! von uns.\n\n"
 NOR_develop_iceland:0 "Island entwickeln"
 NOR_develop_iceland_desc:0 "Mit Island unter unserer Kontrolle sollten wir diese weitläufige Insel mit ihrem Wasserreichtum, ihren fleißigen Arbeitern, ihren ergiebigen Fischgründen und ihren gesunden Schafen entwickeln. Natürlich sollten auch die Randgebiete unseres Landes zu unseren Bemühungen beitragen können."
 NOR_develop_the_faroes:0 "Entwicklung der Färöer"
 NOR_develop_the_faroes_desc:0 "Da die Färöer nun wieder unter unserer Kontrolle sind, gibt es kaum einen Grund, ihre Ressourcen – Fische, Wale und Schafe – nicht für die Industrie zu nutzen."
 NOR_develop_the_jarldom_of_orkney:0 "Entwickeln Sie das Jarldom von Orkney"
 NOR_develop_the_jarldom_of_orkney_desc:0 "Das alte Jarldom Orkney, das jetzt unter unserer Kontrolle steht, ist an sich sicherlich ein prestigeträchtiges Gebiet, doch mit mehr Industrie könnte es auch für uns noch mehr materiellen Nutzen bringen."
 NOR_reclaim_the_mainland:0 "Erobern Sie das Festland zurück"
 NOR_reclaim_the_mainland_desc:0 "Auch wenn Norwegen im Laufe seiner Geschichte viele verschiedene Inseln besaß, waren das Festland und die mit dem Festland verbundenen Inseln stets das Zentrum von Macht, Wirtschaft und Bevölkerung. Mitte des 17. Jahrhunderts schnitt Schweden in dieses lange gehaltene norwegische Festland ein, und wir sollten unsere Chance nutzen, das zurückzubekommen, was uns rechtmäßig zusteht!"
 NOR_subjugate_finland:0 "Finnland unterwerfen"
 NOR_subjugate_finland_desc:0 "Finnland besitzt zwar keine Gebiete, die jemals integrales norwegisches Gebiet waren, aber da wir nun zumindest einige unserer ehemals integralen Gebiete zurückerobert haben, könnten wir erneut Gewalt anwenden, um Finnland in die Sphäre zu bringen und unsere Ostflanke zu sichern. Natürlich würden auch die Finnen langfristig von diesem Schutz profitieren. Sollten wir ein Ultimatum stellen?"
 NOR_approach_denmark:0 "Anfahrt Dänemark"
 NOR_approach_denmark_desc:0 "Den Dänen täte es am besten, unsere Freunde zu sein. Sie haben uns kein Land mit Gewalt genommen (sondern durch Verträge der Großmächte), und die Handelspartnerschaft funktionierte während der Unionszeit gut. Den Dänen ein Bündnis anzubieten, wäre daher eine gute Vorgehensweise."
 NOR_approach_sweden:0 "Anfahrt Schweden"
 NOR_approach_sweden_desc:0 "Die Schweden wären für die Norweger eine ausgezeichnete Freundschaft. Nur aufgrund der übermäßigen Einmischung der Dänen mussten sie in der Vergangenheit in Norwegen einmarschieren. Schließlich kam es auch sie oft teuer zu stehen. Lasst uns daher unseren Brüdern im Osten vergeben und ihnen Freundschaft schenken. Wir sollten uns daran erinnern, dass unsere Wirtschaft und Kultur während der Union mit Schweden und ihrer nachsichtigen Herrschaft florierten."
 NOR_approach_finland:0 "Anfahrt Finnland"
 NOR_approach_finland_desc:0 "Die Finnen waren nie freiwillig Feinde Norwegens, da die finnischen Soldaten, die in Norwegen einfielen, auf Befehl aggressiver schwedischer Könige standen. Und war es nicht eine Kven-Frau, die ihre Sicherheit riskierte, um eine dieser schwedischen Invasionen zu vereiteln? Die Finnen gehören zu den natürlichsten Verbündeten des norwegischen Volkes. Wer wäre also eines Bündnisses würdiger als unsere Cousins im Osten?"
 NOR_the_european_policy:0 "Die europäische Politik"
 NOR_the_european_policy_desc:0 "Nachdem wir uns nun einigermaßen um unser Heimatland gekümmert haben, erscheint es ratsam, die politische Entwicklung in Europa im Auge zu behalten. Schließlich ist es besser, Probleme fernzuhalten, als sie auf uns zukommen zu lassen."
 NOR_take_no_sides:0 "Ergreife keine Partei"
 NOR_take_no_sides_desc:0 "Mit Ausnahme Finnlands, das Teil des Russischen Reiches war, hielten sich die nordischen Nationen erfolgreich aus dem Ersten Weltkrieg heraus. Und obwohl der Krieg tatsächlich seinen Tribut an die neutrale Schifffahrt forderte, wurde Norwegen selbst als neutraler Staat entschädigt, da die Entente die norwegische Schifffahrt ausnutzte. Warum sollten wir uns also nicht dafür einsetzen, dass Nordeuropa erneut aus zerstörerischen Konflikten herausgehalten wird?"
 NOR_a_piece_in_the_greater_game:0 "Ein Teil des größeren Spiels"
 NOR_a_piece_in_the_greater_game_desc:0 "Um in der Welt wirklich ernst genommen zu werden, müssen wir proaktiv handeln und sie mitgestalten. Dazu sollten wir uns entweder auf die Seite einer Großmacht stellen, die unsere Ansichten teilt, oder vielleicht sollten wir auf andere lokale Mächte zugehen und ihnen helfen, die Bedrohungen unseres traditionellen Staates zu bekämpfen."
 NOR_the_british_empire:0 "Das Britische Empire"
 NOR_the_british_empire_desc:0 "Wenn wir uns auf die Seite des größten Imperiums aller Zeiten stellen, können wir sicher nicht verlieren. Das ist eine sichere Wahl, wenn sie uns haben wollen, und die Seite der Sieger bringt den Handlangern immer einen gewissen Einfluss. Allerdings kann dieser Einfluss durch das Ansehen der Großen im Vergleich zu uns geschmälert werden."
 NOR_a_deal_with_britain:0 "Ein Deal mit Großbritannien"
 NOR_a_deal_with_britain_desc:0 "Indem wir Großbritannien dabei helfen, sein Empire aufrechtzuerhalten, könnten wir im Gegenzug vielleicht einige unserer alten Inseln zurückbekommen, die Dänemark illegal verpfändet hat. Denn welchen Unterschied machen die Shetlandinseln und Orkneys für ein weltumspannendes Empire?"
 NOR_a_deal_with_britain_tt:0 "\nSchickt uns einen Deal, der die Übertragung von §YShetland§! und §YOrkney§! an uns fordert. Großbritannien kann dies §Gakzeptieren§!, sich für eine Beschränkung auf §YShetland§! entscheiden oder §Rablehnen§!. §Ggute Beziehungen§! und die Rolle eines nützlichen Verbündeten erhöhen die Wahrscheinlichkeit eines §Gguten Ergebnisses§!.\n"
 NOR_the_north_sea_deal:0 "Der Nordsee-Deal"
 NOR_the_north_sea_deal_desc:0 "Während Deutschland und Großbritannien einander näher kommen, werden auch wir uns diesem Zusammenhalt der Nationen anschließen. Vielleicht können wir die Rückgabe der Shetlandinseln aushandeln, weil sie den Großmächten geholfen haben, ihre Feinde zu besiegen?"
 NOR_the_north_sea_deal_tt:0 "\nSchickt Großbritannien einen Deal mit der Forderung nach der Rückgabe der Shetlandinseln. Großbritannien kann diesen entweder akzeptieren oder ablehnen. Gute Beziehungen und die Rolle eines nützlichen Verbündeten erhöhen die Wahrscheinlichkeit eines guten Ergebnisses.\n"
 NOR_the_german_kaiserreich:0 "Das Deutsche Kaiserreich"
 NOR_the_german_kaiserreich_desc:0 "Wenn wir uns mit dem wiedererstarkten Kaiserreich verbünden, könnten wir unseren Einfluss in der Welt massiv steigern. Anders als bei einer Partnerschaft mit den Briten ist dies riskanter, da sie im Vergleich zur zweiten Generation des deutschen Kaiserreichs nicht annähernd so einflussreich und mächtig sind. Doch die Vorteile für uns sind potenziell größer …"
 NOR_a_deal_with_germany:0 "Ein Deal mit Deutschland"
 NOR_a_deal_with_germany_desc:0 "Wenn wir Deutschland helfen, den Versailler Vertrag aufzukündigen, ist es nur fair, dass wir auch einige unserer alten Inseln erhalten. In diesem Fall sind das die Shetland- und Orkneyinseln. Der Kaiser wird solchen vernünftigen Forderungen sicherlich zustimmen."
 NOR_baltic_anti-communist_league:0 "Baltische Antikommunistische Liga"
 NOR_baltic_anti-communist_league_desc:0 "Der Kommunismus stellt möglicherweise die größte Bedrohung für die Monarchie und traditionelle Familienwerte dar, die es je gab. Die Suche nach gleichgesinnten Regierungen in Osteuropa und im Baltikum könnte, wenn alles nach Plan verläuft, eine wirksame Abschreckung gegen die alles korrumpierenden Bolschewiken darstellen."
 NOR_baltic_league_strikes_west:0 "Die große westliche Speerspitze"
 NOR_baltic_league_strikes_west_desc:0 "Während die ursprüngliche Idee des Bündnisses darin bestand, die Bolschewiken im Osten abzuschrecken, sind westliche Faschisten und Aggressoren in letzter Zeit allein zu einer großen Bedrohung geworden. Sollte das Bündnis diese Bedrohung gemeinsam eindämmen, bevor sie außer Kontrolle gerät?"
 NOR_baltic_league_deterrence:0 "Abschreckungspolitik der Baltischen Liga"
 NOR_baltic_league_deterrence_desc:0 "Unser Bündnis ist in seiner Funktionsweise vor allem defensiv ausgerichtet. Lassen Sie uns potenzielle Angreifer abschrecken und sie dafür bezahlen lassen, sollten sie unser großes baltisches Bündnis angreifen."
 NOR_baltic_league_strikes_east:0 "Die große Speerspitze des Ostens"
 NOR_baltic_league_strikes_east_desc:0 "Die Gründung des Baltischen Bundes war vor allem eine Reaktion auf die bolschewistische Bedrohung der Souveränität und Lebensweise gemäßigterer Länder. Lassen Sie uns diese Bedrohung ein für alle Mal beenden, bevor sie alles zerstört, was uns lieb und teuer ist."
 ##collectivist branch
 NOR_reject_constitutional_monarchy:0 "Ablehnung der konstitutionellen Monarchie"
 NOR_reject_constitutional_monarchy_desc:0 "Der König steht dem wahren Weg im Weg. So wie Hindernisse beseitigt werden müssen, müssen auch sture Könige abdanken! Mit einigen Parteipropagandakampagnen für modernen Autoritarismus und Kollektivismus können wir das archaische System stürzen und echte Veränderungen herbeiführen."
 ##fascist sub-branch
 NOR_go_fascist:0 "Unterstützen Sie den radikalen Nationalismus"
 NOR_go_fascist_desc:0 "Wir sollten unsere einzige wirklich nationalistische Partei, Nasjonal Samling, unter der Führung des dynamischen Vidkun Quisling unterstützen."
 NOR_hirden_est:0 "Hirden"
 NOR_hirden_est_desc:0 "Das persönliche Gefolge und die Leibwache unserer mittelalterlichen Könige hießen Hirden, der Hird. Lasst uns eine solche Garde wiedereinführen, die nun nicht mehr einem König, sondern nationalistischen Idealen und Parteiführern treu ist."
 NOR_rinnanbanden:0 "Rinnanbanden"
 NOR_rinnanbanden_desc:0 "Einige Männer, die unserer Sache treu ergeben sind, bieten ihre Hilfe bei der Unterwanderung möglicher Widerstände oder Andersdenkender an."
 NOR_rinnanbanden_tt:0 "\n§YHenry Oliver Rinnan§! wird als Berater zur Verfügung stehen.\n"
 NOR_norway_first:0 "Norwegen zuerst"
 NOR_norway_first_desc:0 "Wir sollten Norwegen zu seinem früheren Glanz verhelfen."
 NOR_reclaim_danish:0 "Erobern Sie dänisches Land zurück"
 NOR_reclaim_danish_desc:0 "Lassen Sie uns die an Dänemark verlorenen und nach den Napoleonischen Kriegen und dem darauffolgenden Frieden von Kiel vergessenen Länder zurückerobern."
 NOR_reclaim_swedish:0 "Erobern Sie die von Schweden besetzten Ländereien zurück"
 NOR_reclaim_swedish_desc:0 "Lassen Sie uns die Ländereien zurückerobern, die Schweden während der Kriege zwischen Dänemark und Schweden verloren hat."
 NOR_join_axis:0 "Treten Sie der Achse bei"
 NOR_join_axis_desc:0 "Ein Bündnis mit unseren Brüdern im Dritten Reich kann uns nur guttun. Beginnen wir damit, Beziehungen aufzubauen und den Frieden zwischen unseren Nationen zu sichern."
 NOR_invite_terboven: "Invite Terboven"
 NOR_invite_terboven_desc:0 "Als kleines Land können wir nicht alles alleine schaffen. Lassen Sie uns deutsches Fachwissen einladen, um bei der Regierung und beim Aufbau unseres Landes mitzuhelfen."
 NOR_invite_terboven_tt:0 "§YJosef Terboven§! wird als §YPolitischer Berater§! zur Verfügung stehen.\n"
 NOR_festung_norwegen:0 "Festung Norwegen"
 NOR_festung_norwegen_desc:0 "Die Idee, unsere gesamte Küste zu einer Festung zu machen, ist möglich, erfordert aber Anstrengungen. Wir haben jedenfalls nichts anderes geglaubt."
 NOR_german_puppet:0 "Akzeptieren Sie die deutsche Herrschaft"
 NOR_german_puppet_desc:0 "Angesichts des deutschen Militärangriffs auf unser Land haben einige faschistische Anhänger vorgeschlagen, dass es uns langfristig besser gehen würde, den Deutschen nachzugeben. Es besteht eine gute Chance, dass sie es begrüßen würden, wenn wir im Gegenzug für milde Bedingungen deutschen Einfluss und die Nutzung unserer Marinestützpunkte akzeptieren würden."
 NOR_ger_research:0 "Deutscher Technologieaustausch"
 NOR_ger_research_desc:0 "Lassen Sie uns unsere Zusammenarbeit mit den Deutschen durch ein Forschungsabkommen ausbauen."
 NOR_ger_research_tt:0 "Laden Sie Deutschland ein, mit uns eine „Technologie-Sharing-Gruppe“ zu gründen.\n\nSehr gute Beziehungen würden wahrscheinlich ihre Akzeptanz sicherstellen.\n\n"
 NOR_expand_ger_research:0 "Erweitern Sie den Axis Technology Sharing"
 NOR_expand_ger_research_desc:0 "Importieren Sie deutsche Experten, um uns bei unserer Forschung zu unterstützen."
 NOR_german_naval_coordination:0 "Deutsche Marinekoordination"
 NOR_german_naval_coordination_desc:0 "Mit unserer großen Handelsmarine werden wir für die Deutschen sicherlich eine Bereicherung sein. Im Gegenzug für die Übertragung der Kontrolle über einen Teil davon sollten wir in der Lage sein, Schiffe und U-Boote zu einem ermäßigten Preis bei ihnen zu bestellen. Eine starke norwegische Präsenz auf See wird unserem Bündnis sicherlich enorm zugutekommen."
 NOR_at_any_cost:0 "Um jeden Preis"
 NOR_at_any_cost_desc:0 "Getrieben von Ideologie und dem Gemeinwohl sind einige unserer Kampfpiloten bereit, alles zu opfern. Wir werden ihr großes Opfer ehren, indem wir die Nation zu Größe führen."
 NOR_demand_the_northern_isles:0 "Fordern Sie die nördlichen Inseln"
 NOR_demand_the_northern_isles_desc:0 "Fordern Sie das Land zurück, das wir durch illegale dänische Verpfändungen bis ins Spätmittelalter in unseren Händen hielten. Wenn wir Anspruch auf britisches Territorium erheben wollen, müssen wir hier beginnen. Die Bewohner der Shetlandinseln und Orkneys haben einen großen Anteil an norwegischem Erbe und würden sich in unserer neuen Nation wohlfühlen. Caithness war ein integraler Bestandteil der norwegischen Grafschaft Orkney und sollte daher auch so bleiben."
 NOR_demand_colonies:0 "Nachfrage britischer Kolonien"
 NOR_demand_colonies_desc:0 "Norwegen war schon immer eine Seefahrernation, und wir hätten sicherlich ein Kolonialreich sein können, wenn uns die Dänen nicht 300 dunkle Jahre lang aufgehalten hätten. Versuchen wir, dies zu ändern, indem wir unseren rechtmäßigen Anteil am britischen Kolonialreich einfordern."
 NOR_demand_scottish:0 "Nachfrage nach schottischem Land"
 NOR_demand_scottish_desc:0 "Teile Schottlands gehörten von der Wikingerzeit bis ins Mittelalter zu Norwegen. Nutzen wir dies, um die Großmächte dazu zu bewegen, uns Schottland zu überlassen, sobald ein Friedensvertrag unterzeichnet ist."
 NOR_demand_russian:0 "Fordern Sie russisches Land"
 NOR_demand_russian_desc:0 "Vidkun Quisling selbst möchte norwegische Kolonien in Nordrussland gründen, nachdem wir uns dem Kampf gegen den Bolschewismus angeschlossen haben – eine Belohnung für unsere Bemühungen, die Welt von der Roten Pest zu befreien. Einer unserer mittelalterlichen Könige beanspruchte alles Land vor dem Weißen Meer für norwegisch. Beginnen wir also damit, unseren Anspruch dort geltend zu machen, wo es unserer Heimat am nächsten ist."
 NOR_demand_russian_tt:0 "\nDieser Fokus wird auch eine Forderung nach §YPetsamo§! an §YFinnland§! senden, falls Finnland den Staat besitzt. Die Zustimmung Finnlands zur Landabtretung ist wahrscheinlicher, wenn man derselben §YFraktion§! angehört, §Ggute Beziehungen§! pflegt oder über eine §Gstarke Armee§! verfügt.\nUm dies zu gewährleisten, müssen wir Finnland entweder als §YMarionette§! haben oder gleichzeitig derselben §YFraktion§! angehören, §Ggute Beziehungen§! pflegen und über eine §Gstarke Armee§! verfügen.\n"
 ##communist sub-branch
 NOR_go_communist:0 "Unterstützen Sie den radikalen Sozialismus"
 NOR_go_communist_desc:0 "Wir sollten den wahren Weg der Norges Kommunistiske Parti, der Kommunistischen Partei Norwegens, unterstützen. Die Partei von Adam Egede-Nissen wird das Volk mit Sicherheit zu Macht und Gleichheit führen."
 NOR_join_comintern:0 "Treten Sie der Komintern bei"
 NOR_join_comintern_desc:0 "Ein Bündnis mit der mächtigen und auf Gleichheit bedachten Sowjetunion kann uns nur guttun. Beginnen wir damit, Beziehungen aufzubauen und den Frieden zwischen unseren Staaten zu sichern."
 NOR_sov_research:0 "Sowjetischer Technologieaustausch"
 NOR_sov_research_desc:0 "Lassen Sie uns unsere Zusammenarbeit mit den Sowjets durch ein Forschungsabkommen ausbauen."
 NOR_sov_research_tt:0 "Laden Sie die Sowjetunion ein, mit uns eine „Gruppe zum Austausch von Technologien“ zu gründen.\n\nSehr gute Beziehungen würden wahrscheinlich ihre Akzeptanz sicherstellen.\n\n"
 NOR_expand_sov_research:0 "Erweitern Sie den Technologieaustausch der Komintern"
 NOR_expand_sov_research_desc:0 "Importieren Sie sowjetische Experten, um uns bei unserer Forschung zu helfen."
 NOR_collectivism:0 "Kollektivismus"
 NOR_collectivism_desc:0 "Von jedem Mann und jeder Frau wird erwartet, dass sie sich für das Gemeinwohl einsetzen. Kollektivismus zahlt sich auf lange Sicht aus."
 NOR_folkearmeen:0 "Folkestyrken"
 NOR_folkearmeen_desc:0 "Errichten Sie Folkestyrken, die Volkstruppe, eine großartige und loyale Truppe, die unsere Parteifunktionäre beschützt."
 NOR_unite_the_scandinavian_workers:0 "Vereinigt die skandinavischen Arbeiter!"
 NOR_unite_the_scandinavian_workers_desc:0 "Da wir nun den Weg wahrer Gleichheit beschreiten, wäre es egoistisch, ihn nicht mit unseren skandinavischen Brüdern zu teilen. Lasst uns Skandinavien mit allen notwendigen Mitteln vereinen!"
 NOR_pressure_finland:0 "Druck Finnland"
 NOR_pressure_finland_desc:0 "Unser Sieg über unsere skandinavischen Nachbarn ist weltweit nicht unbemerkt geblieben. Das nordische Kräfteverhältnis hat sich verschoben, und dank unseres Zugangs zu den Rohstoffen und Industrien Skandinaviens sind wir eine ernstzunehmende Macht. Warum sollten wir uns also von den Finnen bei unserem Versuch, unsere Beziehungen zu den Sowjets zu vertiefen, behindern lassen? Sicherlich wäre es für sie das Beste, sich uns zu unterwerfen."
 NOR_pressure_finland_tt:0 "\nVersuchen Sie, Finnland unter Druck zu setzen, damit es unser §YUntertanenstaat§! wird. Eine starke Armee wird die Akzeptanz wahrscheinlicher machen.\nUm dies zu gewährleisten, brauchen wir sehr gute Beziehungen, wir müssen mit der Sowjetunion auf einer Linie sein, und sowohl die Sowjets als auch wir brauchen starke Armeen.\n\nSollte Finnland bereits unser Untertan sein, wird dieser Fokus seine §YAutonomie§! einschränken.\n\n"
 NOR_secret_police:0 "Richten Sie eine Geheimpolizei ein"
 NOR_secret_police_desc:0 "Nutzen wir die Erfahrungen unserer russischen Genossen, um eine Geheimpolizei nach dem Vorbild des „Narodnyj Kommissariats Wnutrennich Del“ (NKWD) aufzubauen. Dies würde uns helfen, unsere internen Angelegenheiten und die öffentliche Meinung zu kontrollieren und so unser Land deutlich stabiler zu machen. Denn wie könnten Integrität und Meinung des Einzelnen jemals mit der Stabilität und Sicherheit des Staates als Ganzem mithalten?"
 NOR_perfect_state_propaganda:0 "Perfektionieren Sie unsere Staatspropaganda"
 NOR_perfect_state_propaganda_desc:0 "Propaganda ist eine Kunst, und um Staat und Volk zu einer effektiven und gut geölten Maschine zu formen, sollten wir diese Kunst perfektionieren. Wenn jeder seinen Platz und seine Pflicht kennt, werden auch die Gesellschaft und unser Volk die Früchte unseres eigenen Utopia ernten."
 ##for temporary tags (Note: Currently not used!)
 NOR_recover_from_civil_war:0 "Erholung vom Bürgerkrieg"
 NOR_recover_from_civil_war_desc:0 "Nachdem es uns gelungen ist, unsere Feinde im jüngsten Bürgerkrieg zu besiegen, können wir uns nun auf den Wiederaufbau unseres zerstörten Landes und seiner Infrastruktur konzentrieren. Auch das Vertrauen zwischen den verschiedenen Regionen und Menschen Norwegens muss wiederhergestellt werden."
 
 ####--Ideas--####
 ##country ideas/national spirits
 NOR_state_investments:0 "Staatliche Investitionen"
 NOR_state_investments_desc:0 "Der norwegische Staat hat kürzlich ein Projekt finanziert, sodass für andere Aufgaben vorerst weniger Geld zur Verfügung steht."
 NOR_large_state_investments:0 "Große staatliche Investitionen"
 NOR_large_state_investments_desc:0 "Der norwegische Staat hat kürzlich erheblich in ein Projekt investiert. Es wird einige Zeit dauern, bis weitere Mittel frei werden."
 NOR_large_armament_investments:0 "Große Rüstungsinvestitionen"
 NOR_large_armament_investments_desc:0 "Wir haben kürzlich einen erheblichen Ausbau unserer Rüstungsindustrie finanziert. Während die Fabriken nun gebaut werden, müssen wir auch Mittel umleiten, um sicherzustellen, dass die Produktionslinien reibungslos laufen. Hoffen wir, dass dies ausreicht, um sich durchzusetzen."
 NOR_aftermath_of_the_depression:0 "Nachwirkungen der Weltwirtschaftskrise"
 NOR_aftermath_of_the_depression_desc:0 "Norwegen erlebte in den 1920er Jahren mehrere Krisen, zuletzt die Weltwirtschaftskrise. Im Vergleich zu anderen westlichen Ländern wurde das Land dieses Mal jedoch nicht so hart getroffen. Zwar herrscht weiterhin hohe Arbeitslosigkeit, doch die norwegische Export- und Schifffahrtsindustrie boomt, und die Grundlagen für die Entwicklung Norwegens zu einer voll industrialisierten Nation sind gelegt. Wenn wir jetzt geschickt an den richtigen Stellen investieren, könnte uns das ein für alle Mal aus der Depression befreien."
 NOR_fishing:0 "Ermutigtes Angeln"
 NOR_fishing_desc:0 "Eine moderne Fischereiflotte und Verarbeitungsanlagen entlang der Küste sollten es uns ermöglichen, die reichen Fischgründe entlang unserer Küste zu nutzen."
 NOR_dockyard_investments:0 "Erweiterte Schiffbauindustrie"
 NOR_dockyard_investments_desc:0 "Durch Investitionen in unsere Werften und Marineanlagen sind wir in der Lage, bei Innovation und Produktion im Marinebereich eine Vorreiterrolle einzunehmen."
 NOR_grand_naval_expansion:0 "Große Marineerweiterung"
 NOR_grand_naval_expansion_desc:0 "Der Staat, Nortraship, Horten Naval Yard und andere maritime Unternehmen haben ihre Ressourcen gebündelt, um unsere Marinekapazitäten massiv zu erweitern."
 NOR_specialized_naval_industry:0 "Spezialisierte Schiffsindustrie"
 NOR_specialized_naval_industry_desc:0 "Unsere maritimen Industrien entwickeln innovative Schiffskonstruktionen, die auf die Küstenverteidigung und begrenzte Operationen spezialisiert sind. Schwere Kreuzer und andere größere Schiffe bieten Deckungsfeuer für unterstützende Schutzschilde und Landstreitkräfte entlang der Küste. Unsere Marine hat Taktiken entwickelt, um dies bestmöglich zu nutzen. Unsere Schiffe werden mit diesen Konstruktionen zwar leistungsfähiger denn je sein, sind aber dadurch auch etwas teurer in der Herstellung."
 NOR_policy_of_disarmament:0 "Dauerhafte Abrüstungspolitik"
 NOR_policy_of_disarmament_desc:0 "Mit Ausnahme der Angriffe deutscher U-Boote auf neutrale Schiffe im Ersten Weltkrieg waren Norwegen und seine Bevölkerung im 20. Jahrhundert keinen echten militärischen Bedrohungen ausgesetzt. Die Regierung gab immer weniger für militärische Zwecke aus, was mit der Regierung von Johan Nygaardsvold seinen Höhepunkt erreichte. Immerhin wurden Mittel für zivile Zwecke frei."
 NOR_meager_defense_budget:0 "Mageres Verteidigungsbudget"
 NOR_meager_defense_budget_desc:0 "Zwar konnten durch die jüngsten Investitionen in unsere Streitkräfte eine weitere Verschlechterung der Lage aufgehalten werden, doch im Vergleich zu allen anderen, vorsichtigeren Nationen der Welt verwenden wir immer noch einen unverhältnismäßig kleinen Teil unseres Haushalts für das Militär."
 NOR_new_defense_budget:0 "Neuer Verteidigungshaushalt"
 NOR_new_defense_budget_desc:0 "Vielleicht erkannte unsere Regierung eine drohende Gefahr, doch ist es ihr endlich gelungen, die bisherige Abrüstung umzukehren. Der neue Verteidigungshaushalt dürfte dazu führen, dass unsere Streitkräfte in einem in den letzten Jahrzehnten beispiellosen Tempo ausgerüstet und ausgebildet werden."
 NOR_winter_training:0 "Wintertraining"
 NOR_winter_training_desc:0 "Skier gibt es in Norwegen schon seit Ewigkeiten, und auch die Armee nutzt sie schon lange. Nun wird Skifahren auch als Pflichtfach für alle Truppen unterrichtet. Dies sollte uns bei winterlichen Bedingungen und schneebedeckten Bergen einen allgemeinen Vorteil verschaffen."
 NOR_recreational_shooting:0 "Ermutigung zum Freizeitschießen"
 NOR_recreational_shooting_desc:0 "Die Regierung ermutigt viele unserer Bürger, weiterhin Waffen zur Freizeitgestaltung und zur Jagd zu verwenden. Dadurch erwerben sie allgemeine Kenntnisse im Umgang mit Waffen und der Landschaft."
 NOR_heimevernet_idea:0 "Heimevernet"
 NOR_heimevernet_idea_desc:0 "Die Aufgabe des Heimevernet, der norwegischen Heimwehr, besteht darin, die erste Verteidigungslinie auf norwegischem Boden zu bilden. Durch regelmäßiges Training ist unser Volk darauf vorbereitet, im Bedarfsfall zu den Waffen zu greifen."
 NOR_district_investments:0 "Investitionen in den Bezirken"
 NOR_district_investments_desc:0 "Investitionen in die Landwirtschaft, in lokale Produzenten und in eine flächendeckende Versorgung sichern Wohlstand und ein gutes Leben für unsere Bevölkerung, minimieren das Risiko, dass Feinde unsere gesamte Industrie lahmlegen können, und ermöglichen uns die Nutzung aller unserer Ressourcen. Noch nie war es lukrativer, staatliche Gelder auszugeben."
 NOR_heavy_water:0 "Rjukan Schweres Wasser"
 NOR_heavy_water_desc:0 "Unsere Wissenschaftler sollten von den Schwerwasseranlagen und Laboren in Rjukan profitieren."
 NOR_haakon:0 "Haakon VII"
 NOR_haakon_desc:0 "Obwohl er als dänischer Prinz geboren wurde, hat er sich seit 1905 als loyaler und engagierter König erwiesen und sich den Respekt des norwegischen Volkes verdient. König Haakon VII. ist nun wahrlich zu einem einigenden Symbol für ein unabhängiges Norwegen geworden.\n\n\&quot;Alt for Norge!&quot; (\&quot;Alles für Norwegen!&quot;)\n - Königliches Motto von König Haakon VII."
 NOR_kongens_garde:0 "Hans Majestet Kongens Garde"
 NOR_kongens_garde_desc:0 "Die königliche Garde des Königs. Ausgebildet für Zeremonien und Kämpfe und unerschütterlich in ihrer Pflicht.\n\n\&quot;Alt für Kongen!\&quot; (&quot;Alles für den König!&quot;)\n- Motto der königlichen Garde"
 NOR_wave_of_monarchism:0 "Welle des Monarchismus"
 NOR_wave_of_monarchism_desc:0 "Eine Welle monarchistischer und traditionalistischer Gefühle erfasst das Land. Vielleicht bietet sich dadurch die Chance, eine traditionellere Regierungsform wiederherzustellen?"
 NOR_building_the_kingdom:0 "Das Königreich aufbauen"
 NOR_building_the_kingdom_desc:0 "Um unser traditionelles Königreich zu schützen, sollten wir alle zusammenarbeiten, um sicherzustellen, dass es über ein starkes Fundament verfügt, also über eine starke Infrastruktur und Industrie."
 NOR_diplomatic_efforts:0 "Diplomatische Bemühungen"
 NOR_diplomatic_efforts_desc:0 "Derzeit sind die Diplomaten und Botschafter des Königreichs unterwegs, um die Beziehungen zu wichtigen Handelspartnern zu vertiefen. Dies wird zwar zunächst einige wertvolle Verwaltungsressourcen in Anspruch nehmen, bietet aber gleichzeitig eine gute Gelegenheit, gute Freundschaften zu schließen."
 NOR_deterrence_investments:0 "Investitionen in die baltische Abschreckung"
 NOR_deterrence_investments_desc:0 "Die Große Baltische Allianz gegen Extremismus und Bolschewismus hat entschieden in die militärische Abschreckung investiert, so dass alle extremistischen Länder, die ihre Souveränität und territoriale Integrität bedrohen, sich gut überlegen müssen, ob sie zu Aggressionsakten greifen."
 NOR_national_collectivism:0 "Nationaler Kollektivismus"
 NOR_national_collectivism_desc:0 "Fördern wir den nationalen Kollektivismus, arbeiten wir gemeinsam für unsere Nation und stellen wir sie über alles andere."
 NOR_socialist_collectivism:0 "Sozialistischer Kollektivismus"
 NOR_socialist_collectivism_desc:0 "Lasst uns den sozialistischen Kollektivismus fördern, gemeinsam für radikale sozialistische Ideale arbeiten und die Schaffung und Erhaltung eines Arbeiterstaates über alles andere stellen."
 NOR_german_advisors:0 "Deutsche Berater"
 NOR_german_advisors_desc:0 "Deutsche Berater sind jetzt in Norwegen präsent und helfen dem norwegischen Militär bei der Umsetzung der neuesten Taktiken, Technologien und Entwicklungen der europäischen Kriegsführung."
 NOR_festung:0 "Festung Norwegen"
 NOR_festung_desc:0 "Die Festung Norwegen ist die Idee, die gesamte norwegische Küste zu einer uneinnehmbaren Festung zu machen und unser Land so vor westlichen Angriffen zu schützen. Da die Deutschen auf die Idee kamen, bekamen sie auch ihren Namen ..."
 NOR_hirden:0 "Hirden"
 NOR_hirden_desc:0 "Hirden, der Hird, ein Name, der von der Leibwache und dem Gefolge unserer mittelalterlichen Könige stammt. Der moderne Hird wird unsere Gruppenmitglieder beschützen und für unsere Sache kämpfen."
 NOR_rinnanbanden_idea:0 "Rinnanbanden"
 NOR_rinnanbanden_idea_desc:0 "Rinnanbanden oder die Rinnan-Gang ist eine Gruppe von Menschen, die unserer Sache treu ergeben sind und sich freiwillig bereit erklärt haben, Gruppen von Andersdenkenden zu infiltrieren. Ihr Name leitet sich von ihrem Anführer Henry Rinnan ab."
 NOR_folkestyrken:0 "Folkestyrken"
 NOR_folkestyrken_desc:0 "Eine Volksgarde, die Parteifunktionäre und ihre Interessen schützen soll. Sie kann bei Bedarf auch für den Staat selbst kämpfen."
 NOR_secret_police_idea:0 "Geheimpolizei"
 NOR_secret_police_idea_desc:0 "Mit unserer eigenen Geheimpolizei, die dem sowjetischen NKWD und der deutschen Gestapo nachempfunden ist, können wir unsere Bevölkerung heute besser kontrollieren und uns vor Feinden schützen als zuvor. Dennoch sind Spionageabwehr und Propaganda Bereiche, in denen wir uns verbessern könnten und sollten."
 NOR_secret_police_idea_2:0 "Geheimpolizei"
 NOR_secret_police_idea_2_desc:0 "Mit unserer eigenen Geheimpolizei, die dem sowjetischen NKWD und der deutschen Gestapo nachempfunden ist, können wir unsere Bevölkerung besser kontrollieren und uns vor Feinden schützen als je zuvor. Unsere verdeckten Operationen und unsere Propaganda haben bereits enorme Vorteile gebracht."
 NOR_gutta_paa_skauen_idea:0 "Gutta på skauen"
 NOR_gutta_paa_skauen_idea_desc:0 "„Gutta på skauen“, eine Gruppe von Menschen, die unserem Land und unseren Werten treu sind und bereit sind, sich freiwillig in ausländischen Kriegen zu engagieren und sogar als Partisanen oder Spione zu agieren, um unsere Sache voranzubringen."
 NOR_continuous:0 "Kontinuierliche Politik"
 NOR_continuous_desc:0 "Der richtige Weg ist, Frieden zu schaffen. Wenn es Krieg gibt, werden uns unsere Freunde zu Hilfe kommen. Stimmt das?"
 NOR_pro-rearmament_politics:0 "Pro-Wiederaufrüstungspolitik"
 NOR_pro-rearmament_politics_desc:0 "Endlich ist die Regierung bereit, in unsere bisher vernachlässigten Streitkräfte zu investieren. Nutzen wir diese Chance, solange wir können!"
 NOR_change:0 "Veränderte Turbulenzen"
 NOR_change_desc:0 "Der Misstrauensantrag ist nicht unproblematisch. Mit der Zeit wird sich unsere politische Lage stabilisieren."
 NOR_atlantic_balanced_policy:0 "Ausgewogene atlantische Verteidigungspolitik"
 NOR_atlantic_balanced_policy_desc:0 "Mit der jüngsten Initiative zur Verteidigung des Atlantiks hat unsere Regierung erkannt, dass sie zur Verteidigung unseres Bündnisses beitragen muss, und verfolgt nun eine ausgewogenere Politik zwischen zivilen Belangen und der Wiederaufrüstung der Marine. Das neue gemeinsame Oberkommando und gemeinsame Übungen sollten unser Militär rasch auf einen professionelleren Standard bringen, auch wenn der Nutzen für die Großmächte eher begrenzt sein dürfte."
 NOR_atlantic_defense_policy:0 "Nordatlantikzentrierte Verteidigungspolitik"
 NOR_atlantic_defense_policy_desc:0 "Mit der neuen Atlantischen Verteidigungsinitiative hat unsere Regierung die nötige Bestätigung erhalten, dass die Entscheidung zur Wiederaufrüstung richtig war. Allerdings bedarf es einiger Anstrengungen, um unsere Verteidigungsbedürfnisse mit denen unserer Verbündeten abzustimmen, was bedeutet, dass wir mehr Anstrengungen in die Marine stecken müssen. Letztendlich sollten das neue gemeinsame Oberkommando und gemeinsame Übungen unsere Streitkräfte jedoch schnell auf einen professionelleren Standard bringen, auch wenn der Nutzen für die Großmächte eher begrenzt sein dürfte."
 NOR_nordic_balanced_policy:0 "Ausgewogene Verteidigungspolitik"
 NOR_nordic_balanced_policy_desc:0 "Mit der jüngsten Nordischen Verteidigungsinitiative hat unsere Regierung erkannt, dass sie zur Verteidigung unseres Bündnisses beitragen muss, und verfolgt nun eine ausgewogenere Politik zwischen zivilen Belangen und militärischer Aufrüstung. Das neue gemeinsame Oberkommando und gemeinsame Übungen sollen unser Militär schnell auf einen professionelleren Standard bringen."
 NOR_nordic_defense_policy:0 "Nordisch zentrierte Verteidigungspolitik"
 NOR_nordic_defense_policy_desc:0 "Mit der neuen Nordischen Verteidigungsinitiative hat unsere Regierung die nötige Bestätigung erhalten, dass die Entscheidung zur Wiederaufrüstung richtig war. Allerdings bedarf es einiger Anstrengungen, um unsere Verteidigungsbedürfnisse mit denen unserer Verbündeten abzustimmen. Letztendlich dürften das neue gemeinsame Oberkommando und gemeinsame Übungen unsere Streitkräfte jedoch schnell auf einen professionelleren Standard bringen."
 ##infiltration/sabotage ideas (generally temporary ideas)
 NOR_intelligence_gathered:0 "Gesammelte Informationen"
 NOR_intelligence_gathered_desc:0 "Norwegische Infiltratoren und der Widerstand haben die Pläne der Besatzer unseres Territoriums aufgedeckt. Dies gibt uns Einblick in ihre Ressourcen und ihre Pläne für die nahe Zukunft."
 NOR_intelligence_compromised:0 "Geheimdienst kompromittiert"
 NOR_intelligence_compromised_desc:0 "Ausländische Infiltratoren haben Dokumente mit wichtigen Informationen erbeutet. Unglücklicherweise ermöglicht ihnen dies, unsere Ressourcen und unsere Pläne für die unmittelbare Zukunft besser einzuschätzen."
 NOR_resistance_strengthened:0 "Norwegischer Widerstand gestärkt"
 NOR_resistance_strengthened_desc:0 "Unsere Widerstandsbewegung und loyale Infiltratoren haben es geschafft, den Feind im besetzten norwegischen Gebiet zu erreichen. Diese zivile Unterstützung für unsere Sache, die die besetzte Gesellschaft durchdringt, sollte ihre Lage weniger komfortabel machen."
 ##country ideas/national spirits applied to other countries
 NOR_north_atlantic_joint_defense:0 "Gemeinsame Verteidigung des Nordatlantiks"
 NOR_north_atlantic_joint_defense_desc:0 "Mit der neuen Nordatlantischen Verteidigungsinitiative ist unser Bündnis mit unseren Nachbarn auf der anderen Seite des Meeres enger denn je. Die Norweger haben schnell aufgerüstet, und wir werden uns von ihnen nicht übertrumpfen lassen. Um die Erwartungen unserer neuen Freunde zu erfüllen, müssen Produktion und Rekrutierung erhöht werden. Doch mit neuer Verantwortung gehen auch neue Chancen einher; ein gemeinsames Oberkommando und gemeinsame Übungen dürften unserem Militär einen gewissen Nutzen bringen."
 NOR_nordic_joint_defense:0 "Gemeinsame Nordische Verteidigungsinitiative"
 NOR_nordic_joint_defense_desc:0 "Mit der neuen Nordischen Verteidigungsinitiative ist unser Bündnis mit unseren Nachbarn enger denn je. Die Norweger haben schnell aufgerüstet, und wir werden uns nicht von ihnen übertrumpfen lassen. Um die Erwartungen unserer Freunde zu erfüllen, müssen Produktion und Rekrutierung erhöht werden. Doch mit neuer Verantwortung gehen auch neue Chancen einher; ein gemeinsames Oberkommando und gemeinsame Übungen dürften unserem Militär zugutekommen."
 NOR_norwegian_destroyer_order:0 "Norwegischer Zerstörerbefehl"
 NOR_norwegian_destroyer_order_desc:0 "Unsere norwegischen Verbündeten haben Zerstörer bei unseren Werften bestellt. Wir werden zwar bezahlt, und das stärkt unsere Verbündeten, aber es wird unsere eigenen Projekte natürlich verlangsamen, bis die Schiffe fertig sind."
 NOR_norwegian_destroyer_order_strong_shipbuilding:0 "Norwegischer Zerstörerauftrag (starke Schiffbauindustrie)"
 NOR_norwegian_destroyer_order_strong_shipbuilding_desc:0 "Unsere norwegischen Verbündeten haben Zerstörer bei unseren Werften bestellt. Im Gegenzug erhalten wir eine faire Bezahlung und einen stärkeren Verbündeten. Dank unserer starken Schiffbauindustrie dürften unsere eigenen Projekte durch den Bau einiger kleinerer Schiffe nicht zu sehr beeinträchtigt werden."
 ##designers
 NOR_thunes_mekaniske_verksted:0 "Thunes Mekaniske Verksted"
 NOR_thunes_mekaniske_verksted_desc:0 "Als wichtiger Hersteller von Turbinen und verschiedenen Lokomotiven für unsere Eisenbahnen könnte Thunes Mechanische Werkstatt als unser heimischer Panzerproduzent ausgewählt werden. Da ihre Anlagen bereits für die Bearbeitung großer Fahrzeuge ausgelegt sind, scheinen sie die beste Wahl für ein solches Vorhaben zu sein.\n"
 NOR_det_norske_luftfartselskap:0 "Det Norske Luftfartselskap"
 horten_naval_yard_desc:0 "Die Horten Werft dient sowohl als Hauptstützpunkt der Königlich Norwegischen Marine als auch als nationale Werft. Im letzten Jahrhundert wurde der Stützpunkt nach dem König des ehemaligen Schweden-Norwegens Karljohansvern benannt. Ab 1850 übernahm er seine Funktionen von Fredriksvern in Stavern.\n"
 NOR_marinens_hovedverft:0 "Marinens Hovedverft"
 NOR_marinens_hovedverft_desc:0 "Die Horten Werft dient sowohl als Hauptstützpunkt der Königlich Norwegischen Marine als auch als inländische Werft. Im letzten Jahrhundert hieß der Stützpunkt Karljohansvern, benannt nach dem König des ehemaligen Schweden-Norwegen. Ab 1850 übernahm er seine Funktionen von Fredriksvern in Stavern.\n\nInzwischen wurden die Anlagen für die inländische Produktion von Großkampfschiffen erweitert, vor allem für Küstenverteidigungsschiffe, sogenannte „Panserskips“, Panzerschiffe aus der Zeit nach der Monitor-Ära. Diese schweren Kreuzer sollten sich als vielseitige, gepanzerte und kostengünstige Küstenverteidigungsschiffe für unsere Marine eignen.\n"
 NOR_nortraship_dock_limited:0 "Nortraship Escort Docks"
 NOR_nortraship_dock_limited_desc:0 "Indem wir das Fachwissen und das Interesse der Schiffseigner am Schutz der Schiffe, in die sie investiert haben, nutzen, können wir ein neues Unternehmen zum Schutz unseres Handels auf See gründen."
 NOR_tandbergs_radiofabrikk_desc:0 "Tandbergs Radiofabrikk wurde 1933 vom Bauingenieur Vebjørn Tandberg gegründet. Die in Oslo ansässige Radiofabrik erlebte ein rasantes Wachstum und verspricht vielversprechende Impulse für die norwegische Elektronikindustrie und Innovationen, insbesondere im Bereich der Radio- und Aufnahmetechnik.\n"
 NOR_norsk_hydro_desc:0 "Das zunächst unter dem Namen „Norsk Hydro-Elektrisk Kvælstofaktieselskab“ firmierende Unternehmen wurde im Dezember 1905 von Sam Eyde und Kristian Birkeland mit finanzieller Unterstützung der schwedischen Familie Wallenberg und französischer Banken gegründet. Das Unternehmen wurde ursprünglich gegründet, um das Birkeland-Eyde-Verfahren anzuwenden, bei dem Lichtbögen zur Herstellung von Nitratkomponenten (zur Düngemittelproduktion) verwendet wurden. Das Birkeland-Eyde-Verfahren war sehr energieintensiv (was sich auch bei nicht wenigen späteren Industrieunternehmen von Hydro herausstellen sollte) und benötigte daher billigen Strom. Glücklicherweise war norwegischer Wasserkraft zu dieser Zeit bereits im Überfluss vorhanden. Dennoch führte dies dazu, dass sich das Verfahren anderswo auf der Welt nicht allzu gut verkaufte, und das Unternehmen stellte schließlich auf weniger energieintensive Methoden um. 1927 erfolgte in Zusammenarbeit mit dem Chemiegiganten IG Farben die Umstellung auf das Haber-Bosch-Verfahren. Die Anlagen von Norsk Hydro in Rjukan und Notodden produzierten nun flüssiges Ammoniak, das dann zu den neuen Anlagen auf Herøya transportiert wurde, um dort Calciumnitrat herzustellen, das später als norwegischer Salpeter bekannt wurde. Heute erschließt Norsk Hydro neue Felder; 1934 wurde in Vemork die weltweit erste kommerzielle Schwerwasseranlage gebaut, die industrielle Mengen dieses neuen Rohstoffs produzierte."
 NOR_christiania_spigerverk:0 "Christiania Spigerverk"
 NOR_christiania_spigerverk_desc:0 "„Christiania Spiger- og Valtse Værk“, wie die Gießerei ursprünglich hieß, war eine lokale Nagelgießerei, die 1853 in der norwegischen Hauptstadt gegründet wurde. Anfangs verwendete die Gießerei importiertes Eisen, später auch Eisenabfälle aus dem ganzen Land und entwickelte schließlich die bahnbrechenden Coates-Maschinen zum Warmschmieden von Nägeln anstelle des Kaltschmiedens. Dank innovativer und effizienter Produktionsmethoden entwickelte sich die lokale Gießerei in weniger als drei Jahrzehnten zu einer großen und angesehenen Fabrik. Mit den erweiterten Märkten begann die Osloer Fabrik schließlich auch mit der Produktion von Werkzeugen und anderen Eisenwaren. Während des Ersten Weltkriegs und in den 1920er Jahren erweiterte sie ihre Produktion sogar um inländische Schmelzhütten."
 ##advisors/theorists
 NOR_skule_storheill:0 "Skule Storheill" ### Fixed spelling here (and on the idea itself, even though it was not strictly necessary) from the base game's erroneous spelling of his last name.
 NOR_terboven:0 "Josef Terboven"
 NOR_terboven_desc:0 "Hitlers Mann in Norwegen, mit großen und konkreten Plänen für das Land."
 NOR_rinnan:0 "Henry Oliver Rinnan"
 NOR_rinnan_desc:0 "Henry Oliver Rinnan ist zwar kleinwüchsig, aber charmant, kontaktfreudig, hinterlistig und eingeschworener Antikommunist. Er könnte unserem Regime von großem Nutzen sein. Er hat sich freiwillig bereit erklärt, uns bei der Ausmerzung von Andersdenkenden zu helfen, indem er ihre Widerstandsgruppen infiltriert."
 NOR_soensteby:0 "Gunnar FT Sønsteby"
 NOR_soensteby_desc:0 "Gunnar Fridtjof Thurmann Sønsteby ist ein junger Naturliebhaber mit vielen Talenten, der kürzlich seinen Militärdienst in der Königsgarde beendet hat. Nun hat er sich freiwillig gemeldet, um erneut für die anhaltende Unabhängigkeit und den Wohlstand Norwegens zu kämpfen."
 NOR_carl_gustav_fleischer:0 "Carl Gustav Fleischer"
 NOR_carl_gustav_fleischer_desc:0 "Selbst als die Regierung die Militärausgaben vernachlässigte, plante Fleischer, wie Norwegen am besten verteidigt werden könnte. Jetzt beschäftigt er sich mit der Taktik, feindliche Brückenköpfe abzuschneiden."
 NOR_kristian_k_laake:0 "Kristian K. Laake"
 NOR_kristian_k_laake_desc:0 "Kristian Kristiansen Laake, einer unserer obersten Kommandeure und ein Mann mit starker Meinung, hat mehrfach seine Ablehnung der Vernachlässigung unserer Streitkräfte zum Ausdruck gebracht. Bei einem früheren Besuch in Deutschland beobachtete er deren massive Aufrüstung und berichtete später mit einiger Besorgnis den Politikern im Inland darüber. Er ist ein aufmerksamer und fähiger Kommandeur und kann gut für die Zukunft planen."
 NOR_fredrik_wedel_jarlsberg:0 "Fredrik Wedel Jarlsberg"
 NOR_fredrik_wedel_jarlsberg_desc:0 "Fredrik „Fritz“ HH Wedel Jarlsberg ist ein norwegischer Aristokrat, Jurist und Diplomat. Zum Zeitpunkt der norwegischen Unabhängigkeitserklärung 1905 war er einer der wenigen Norweger mit umfassenden Kenntnissen der internationalen Beziehungen. Als Norwegens Unabhängigkeit zur Wahl stand, befürwortete er die Regierung Norwegens durch einen König anstelle eines Präsidenten, da dies eine sicherere und diplomatischere Lösung darstellte.\n\nWedel Jarlsberg selbst entstammt einer berühmten norwegischen und dänischen Adelsfamilie und trägt als Aristokrat aufgrund seiner Besitzungen in Dänemark den Titel eines Barons. In Norwegen trägt er jedoch keine solchen formellen Titel, da der Adel mit dem Adelsgesetz von 1821 abgeschafft wurde. Als erfahrener Diplomat spielte Wedel eine zentrale Rolle bei der norwegischen Übernahme des Spitzbergen-Archipels. Die Inseln wurden Norwegen (teilweise) als Entschädigung für die Verluste der Handelsmarine des neutralen Königreichs zugesprochen, da diese der Entente im Ersten Weltkrieg subtile Hilfe geleistet hatte."
 ###advisors/theorists for (the kingdom/duchy of) the isles
 LOI_douglas_neil_wimberley:0 "Douglas Neil Wiberley"
 LOI_andrew_miller:0 "Andrew Miller"
