 ####--Events--####
 naw_norway.1.t:0 "Norwegen lädt zu Three Brothers ein"
 naw_norway.1.d:0 "In der sechsten Strophe der norwegischen Nationalhymne heißt es, die Skandinavier würden im Krieg zusammenstehen. Die Norweger lassen jetzt die panskandinavische Bewegung wieder aufleben und wenden sich an uns."
 naw_norway.1.a:0 "Brüder im Leben und im Tod!"
 naw_norway.1.b:0 "Vielleicht nicht im Tod ..."
 
 naw_norway.2.t:0 "[From.GetName] schließt sich Three Brothers an"
 naw_norway.2.d:0 "Unser Bruder [From.GetName] ist unserem Bündnis beigetreten. Lasst unsere Völker gemeinsam für den Sieg einstehen."
 naw_norway.2.a:0 "Wir sind eins!"
 
 naw_norway.3.t:0 "[From.GetName] lehnt unsere Hand ab"
 naw_norway.3.d:0 "[From.GetName] hatte irgendwie das Gefühl, dass es in ihrem besten Interesse sei, sich von unserer brillanten Idee einer Kameradschaft fernzuhalten."
 naw_norway.3.a:0 "Vielleicht dann ein anderes Mal..."
 
 naw_norway.4.t:0 "Der Vorschlag für vierjährige Amtszeiten wird angenommen"
 naw_norway.4.d:0 "Das norwegische Parlament hat kürzlich beschlossen, dass die Parlamentswahlen ab sofort alle vier statt alle drei Jahre stattfinden. Man hofft wohl, dass die amtierende Regierung in einem zusätzlichen Jahr mehr erreichen kann. Natürlich ist ein zusätzliches Jahr Arbeitsplatzsicherheit ein angenehmer Nebeneffekt für unsere Abgeordneten."
 naw_norway.4.a:0 "Also gut"
 naw_norway.4.b:0 "Heh, diese schlauen Bastarde"
 naw_norway.4.c:0 "Nun zurück zur „Samnorsk“-Debatte …"
 
 naw_norway.5.t:0 "[From.GetName] verabschiedet den Vorschlag für eine Amtszeit von vier Jahren"
 naw_norway.5.d:0 "Die Parlamentsabgeordneten von [From.GetName] haben kürzlich einen Antrag zur Verlängerung ihrer Amtszeit von drei auf vier Jahre mit sofortiger Wirkung angenommen. Sie hoffen zweifellos, dass die amtierende Regierung mit dem zusätzlichen Jahr mehr erreichen kann. Der Antrag wurde ohne Probleme angenommen."
 naw_norway.5.a:0 "Okay dann"
 naw_norway.5.b:0 "Ich habe keine starken Gefühle in die eine oder andere Richtung"
 naw_norway.5.c:0 "Norwegische Politik? Bah!"
 
 naw_norway.6.t:0 "[From.GetName] unterstützt die neue Bruderschaft"
 naw_norway.6.d:0 "Unser Bruder [From.GetName] unterstützt uns bei der Ausweitung unseres Bündnisses. Lasst unsere freien Nationen als Brüder zusammenstehen."
 naw_norway.6.a:0 "Wir sind tatsächlich im Willen vereint!"
 
 naw_norway.7.t:0 "Norwegen beantragt eine nordische Forschungszusammenarbeit"
 naw_norway.7.d:0 "Unser Nachbar hat uns zu einer gemeinsamen nordischen Forschungskooperation eingeladen und argumentiert, dass diese zum Wohle aller skandinavischen Nationen beitragen werde. Die Fortschritte unserer Nachbarn zu nutzen, könnte uns nur nützen. Die Frage ist: Können wir Nachteile erkennen, wenn sie Zugang zu unseren Erkenntnissen erhalten?"
 naw_norway.7.a:0 "Mehr technologischer Fortschritt in skandinavischen Händen wäre gut für uns!"
 naw_norway.7.b:0 "Eine Forschungszusammenarbeit klingt lohnend. Warum sollten wir ihnen nicht regelmäßig unsere Chemiker zur Verfügung stellen?"
 naw_norway.7.c:0 "Unsere technologischen Fortschritte in ausländischen Händen? Klingt ein bisschen zu riskant …"
 
 naw_norway.8.t:0 "[From.GetName] ist der Nordic Research Collaboration beigetreten"
 naw_norway.8.d:0 "[From.GetName] hat sich klugerweise entschieden, unserer Forschungskooperation beizutreten."
 naw_norway.8.a:0 "Und dadurch werden wir alle noch klüger."
 
 naw_norway.9.t:0 "[From.GetName] weigert sich, der Nordic Research Collaboration beizutreten"
 naw_norway.9.d:0 "[From.GetName] scheint seine Technologie besser zu schützen, als wir erwartet hatten."
 naw_norway.9.a:0 "Wir haben mehr von ihnen erwartet."
 
 naw_norway.10.t:0 "Eine Einladung zur Nordic Research Collaboration"
 naw_norway.10.d:0 "Norwegen hat uns eine Einladung zur Nordic Research Collaboration geschickt, einem Abkommen, das allen nordischen Ländern durch den Austausch technologischer Entwicklungen gegenseitig zugutekommen soll."
 naw_norway.10.a:0 "Natürlich wird Finnland mitmachen. Loistava aloite!"
 naw_norway.10.b:0 "Gute Ideen sollten geteilt werden. Loistava aloite!"
 naw_norway.10.c:0 "Ein netter Antrag, aber wir können nicht riskieren, dass unsere Technologie in die falschen Hände gerät."
 
 naw_norway.11.t:0 "[From.GetName] ist der Nordic Research Collaboration beigetreten"
 naw_norway.11.d:0 "[From.GetName] hat sich klugerweise entschieden, unserer Forschungskooperation beizutreten."
 naw_norway.11.a:0 "Unser Bruder, der Finne, jetzt ist er dabei."
 
 naw_norway.12.t:0 "[From.GetName] weigert sich, der Nordic Research Collaboration beizutreten"
 naw_norway.12.d:0 "[From.GetName] scheint seine Technologie besser zu schützen, als wir erwartet hatten."
 naw_norway.12.a:0 "Unser Bruder, der Finne, ein Tritt gegen das Schienbein?"
 
 naw_norway.13.t:0 "Norwegen will mit Commonwealth-Wissenschaftlern zusammenarbeiten"
 naw_norway.13.d:0 "Der skandinavische Staat auf der anderen Seite des Meeres möchte eine Forschungskooperation mit den Commonwealth-Staaten abschließen. Ihre Wissenschaftler werden eng mit unseren zusammenarbeiten und ihre Fortschritte teilen."
 naw_norway.13.a:0 "Ein Technologieaustausch wäre für beide Seiten von Vorteil."
 naw_norway.13.b:0 "Die Zusammenarbeit mit unseren Freunden ist nur richtig."
 naw_norway.13.c:0 "Es wäre zu einseitig. Warum sollten wir Asse gegen Dreier eintauschen?"
 
 naw_norway.14.t:0 "[From.GetName] hat zugestimmt, eine Forschungsvereinbarung abzuschließen"
 naw_norway.14.d:0 "[From.GetName] hat freundlicherweise eine Forschungsvereinbarung aufgesetzt und unsere Wissenschaftler eingeladen, teilzunehmen, beizutragen und zu lernen."
 naw_norway.14.a:0 "Prost."
 
 naw_norway.15.t:0 "[From.GetName] verweigert uns den Zugriff auf die Commonwealth Research"
 naw_norway.15.d:0 "[From.GetName] scheint seine fortschrittliche Elektronik und seine Schiffe zu schützen und hat uns den Zugang zur Forschung des Commonwealth verweigert."
 naw_norway.15.a:0 "Die verdammten Mistkerle."
 
 naw_norway.16.t:0 "Norwegen möchte mit Axis-Wissenschaftlern zusammenarbeiten"
 naw_norway.16.d:0 "Unsere nordgermanischen Freunde wollen eine Forschungskooperation zwischen den Achsenmächten unterzeichnen. Ihre Wissenschaftler werden eng mit unseren zusammenarbeiten und ihre Fortschritte teilen."
 naw_norway.16.a:0 "Ein Technologieaustausch wäre für beide Seiten von Vorteil."
 naw_norway.16.b:0 "Die Zusammenarbeit mit unseren Freunden ist nur richtig."
 naw_norway.16.c:0 "Nein. Sie müssen sich mit dem Leasing oder der Lizenzierung unserer Ausrüstung zufrieden geben."
 
 naw_norway.17.t:0 "[From.GetName] hat zugestimmt, eine Forschungsvereinbarung abzuschließen"
 naw_norway.17.d:0 "[From.GetName] hat freundlicherweise eine Forschungsvereinbarung aufgesetzt und unsere Wissenschaftler eingeladen, teilzunehmen, beizutragen und zu lernen."
 naw_norway.17.a:0 "Danke schön."
 
 naw_norway.18.t:0 "[From.GetName] verweigert uns den Zugriff auf die Axis Research"
 naw_norway.18.d:0 "[From.GetName] scheint seine fortschrittlichen Verschlüsselungstechniken, Panzer und Waffen zu schützen und hat uns den Zugriff auf die Forschung der Achsenmächte verweigert."
 naw_norway.18.a:0 "Ach so..."
 
 naw_norway.19.t:0 "Norwegen will mit Wissenschaftlern der Komintern zusammenarbeiten"
 naw_norway.19.d:0 "Unsere sozialistischen Genossen im Westen wollen eine Forschungskooperation zwischen unseren Nationen unterzeichnen. Ihre Wissenschaftler werden eng mit unseren zusammenarbeiten und ihre Fortschritte teilen."
 naw_norway.19.a:0 "Ein Technologieaustausch wäre für beide Seiten von Vorteil."
 naw_norway.19.b:0 "Die Zusammenarbeit mit unseren Freunden ist nur richtig."
 naw_norway.19.c:0 "Njet. Heutzutage können wir nicht vorsichtig genug sein."
 
 naw_norway.20.t:0 "[From.GetName] hat zugestimmt, eine Forschungsvereinbarung abzuschließen"
 naw_norway.20.d:0 "[From.GetName] hat freundlicherweise eine Forschungsvereinbarung aufgesetzt und unsere Wissenschaftler eingeladen, teilzunehmen, beizutragen und zu lernen."
 naw_norway.20.a:0 "Wir haben richtig daran getan, Vertrauen in unsere Kameraden zu haben."
 
 naw_norway.21.t:0 "[From.GetName] verweigert uns den Zugang zur Komintern-Forschung"
 naw_norway.21.d:0 "[From.GetName] scheint seine effektive industrielle Produktion und seine ausgeklügelten Panzervarianten zu schützen und hat uns den Zugang zur Forschung der Komintern verweigert."
 naw_norway.21.a:0 "Sei, was sein wird."
 
 naw_norway.22.t:0 "Norwegen lädt uns zur Bruderschaft Demokratischer Nationen ein"
 naw_norway.22.d:0 "Die Norweger und ihre Verbündeten, die bis vor kurzem – je nachdem, wen man fragt – als Drei-Brüder-Allianz, Vier-Brüder-Allianz oder Nordische Bruderschaft bekannt waren, haben uns kürzlich eingeladen, ihrer neu formierten Allianz beizutreten. Zweifellos hoffen sie, ihre diplomatische Dynamik aufrechtzuerhalten, und diese Allianz könnte unserer eigenen Sicherheit und unserem politischen Einfluss zugutekommen, würde aber auch eine Verpflichtung gegenüber unseren potenziellen neuen Freunden bedeuten."
 naw_norway.22.a:0 "Wir sind Brüder!"
 naw_norway.22.b:0 "Ich denke, wir bleiben auf der Ebene der freundlichen Bekanntschaft"
 naw_norway.22.c:0 "Wir sind Brüder, und Brüder müssen Vorrang vor unseren aktuellen Freunden haben"
 naw_norway.22.p:0 "Wir dürfen unsere derzeitigen Verbündeten nicht verraten!"
 
 naw_norway.23.t:0 "[From.GetName] tritt der Bruderschaft Demokratischer Nationen bei"
 naw_norway.23.d:0 "Unser Bruder [From.GetName] ist unserer Bruderschaft beigetreten. Lasst unsere Völker gemeinsam für den Sieg einstehen."
 naw_norway.23.a:0 "Wir sind viele und doch sind wir eins!"
 
 naw_norway.24.t:0 "[From.GetName] lehnt unsere gnädige Hand ab"
 naw_norway.24.d:0 "[From.GetName] hatte irgendwie das Gefühl, dass es in ihrem besten Interesse sei, sich aus unserer Bruderschaft herzlicher, mächtiger und freiheitsliebender Nationen herauszuhalten. Wer weiß, was sie sich dabei gedacht haben?"
 naw_norway.24.a:0 "Enttäuschend..."
 
 naw_norway.25.t:0 "[From.GetName] hat unsere Fraktion in Demokratische Bruderschaft der Nationen umbenannt"
 naw_norway.25.d:0 "Wenn Sie die Fraktion weiter ausbauen möchten, ist möglicherweise eine Namensänderung in einen umfassenderen Namen erforderlich."
 naw_norway.25.a:0 "Möglicherweise ist tatsächlich eine neue weltweite Ausrichtung erforderlich."
 
 naw_norway.26.t:0 "[From.GetName] fordert Petsamo"
 naw_norway.26.d:0 "Unser Nachbar [From.GetName] hat seine alten Ansprüche auf die Kola-Halbinsel geltend gemacht und möchte daher eine zusammenhängende Grenze zu der überwiegend von Russland bewohnten Halbinsel. Um dies zu erreichen, verlangt er von uns die Abtretung unseres nördlichsten Territoriums, Petsamo. Es ist zwar dünn besiedelt, verfügt aber über wertvolle Nickelvorkommen und ist nach wie vor unser einziger Zugang zur Barentssee. Wie sollen wir vorgehen?"
 naw_norway.26.a:0 "Geben Sie Petsamo auf. Lassen Sie sie den Bären reizen, wenn sie wollen ..."
 naw_norway.26.b:0 "Überlassen Sie es unseren Freunden, aber wir erwarten eine Entschädigung."
 naw_norway.26.c:0 "Petsamo gehört den Finnen."
 
 naw_norway.27.t:0 "[From.GetName] tritt das Eigentum an Petsamo ab"
 naw_norway.27.d:0 "Die Finnen haben uns klugerweise die dünn besiedelte, aber rohstoffreiche Region Petsamo überlassen. Damit haben wir nun eine zusammenhängende Grenze zu unseren alten mittelalterlichen Ansprüchen. Dies ist ein Beweis für das hohe Ansehen unserer Nation in Europa und für die Geschicklichkeit unserer Diplomaten und Staatsmänner."
 naw_norway.27.a:0 "Ruhm für Norwegen und ein Hoch auf unsere Staatsmänner!"
 
 naw_norway.28.t:0 "[From.GetName] lehnt unsere Forderungen nach Petsamo ab"
 naw_norway.28.d:0 "Die Finnen erklären, dass Art und Umfang ihrer Grenzen nicht verhandelbar seien und sie uns Petsamo daher nicht überlassen würden, egal welche Gründe wir für unseren Anspruch gehabt hätten. Es scheint, als hätten sie uns enttäuscht. Wir haben ihnen zwar eine formelle Beschwerde zugesandt, aber vorerst müssen wir ihre Entscheidung akzeptieren."
 naw_norway.28.a:0 "Wurde in der Notiz erwähnt, wie sehr sie uns enttäuscht haben?"
 
 naw_norway.29.t:0 "[From.GetName] fordert, dass wir uns der Revolution unterwerfen"
 naw_norway.29.d:0 "Die Norweger, die kürzlich Dänen und Schweden besiegt haben, verlangen nun, dass wir uns ihrer Herrschaft und ihren kommunistischen Idealen unterwerfen. Angesichts ihrer Kontrolle über Skandinavien, ihrer zunehmenden Armee und ihrer Verbindungen zu den Sowjets könnte es sehr gefährlich sein, ihnen diese Forderung zu verweigern. Andererseits könnte unsere Unabhängigkeit in beiden Fällen auf dem Spiel stehen ..."
 naw_norway.29.a:0 "Wir müssen uns unterwerfen, denn wir haben auf beiden Seiten Feinde und es gibt einfach keine andere Wahl ..."
 naw_norway.29.b:0 "Wir müssen uns unterwerfen, denn wir haben auf beiden Seiten Feinde und es gibt einfach keine andere Wahl ..."
 naw_norway.29.c:0 "Die Norweger haben ihre Kontrolle über unser Land verschärft."
 naw_norway.29.p:0 "Die Norweger haben ihre Kontrolle über unser Land verschärft."
 naw_norway.29.e:0 "Hier beziehen wir Stellung: Das unabhängige Finnland wird bleiben."
 
 naw_norway.30.t:0 "[From.GetName] übermittelt uns"
 naw_norway.30.d:0 "Die Finnen haben beschlossen, uns die Kontrolle über einen Großteil ihrer Staatsangelegenheiten zu überlassen. Damit liegt die Führung der nordischen Nationen ganz bei uns."
 naw_norway.30.a:0 "Großartig."
 
 naw_norway.31.t:0 "[From.GetName] weigert sich, uns zu übermitteln"
 naw_norway.31.d:0 "Die Finnen haben beschlossen, unser großzügiges Angebot, sich uns zu unterwerfen und ihre Autonomie zu behalten, abzulehnen. Offenbar würden sie lieber zwischen uns und den Sowjets aufgeteilt werden, und für finnische Staatsmänner ist Schnaps offenbar viel zu leicht zu bekommen. Jetzt sind wir an der Reihe zu entscheiden: Ist es einen Krieg wert, die Revolution unter dem finnischen Volk zu verbreiten?"
 naw_norway.31.a:0 "In den Krieg."
 naw_norway.31.b:0 "Oder nicht in den Krieg?"
 
 naw_norway.32.t:0 "[From.GetName] stellt sich auf die Seite Deutschlands, nachdem es uns Schleswig versprochen hat"
 naw_norway.32.d:0 "Die norwegische Führung hat sich auf die Seite Deutschlands gestellt, um Angriffe abzuwehren. Natürlich sind viele Dänen verärgert, da wir unsere Inseln im Nordatlantik im Austausch für die Unterstützung bei der Rückeroberung ganz Schleswigs und vielleicht auch Holstens aufgegeben haben. Und außerdem: Wenn Deutschland die anderen Großmächte besiegt, wie sollen wir uns dann gegen sie verteidigen? Wir stehen sogar an ihrer Grenze... Zumindest könnten wir unsere Beschwerden an die Norweger richten, um unsere Öffentlichkeit zufriedenzustellen und vielleicht etwas davon zu haben?"
 naw_norway.32.a:0 "Unsere Beschwerden an die norwegische Regierung weiterleiten."
 naw_norway.32.b:0 "Beschweren Sie sich nicht, wenigstens haben wir jetzt Frieden."
 
 naw_norway.33.t:0 "[From.GetName] versteht unsere Entscheidung, auf der Seite Deutschlands zu stehen"
 naw_norway.33.d:0 "Die Dänen sind zwar verärgert, weil wir ihnen Hilfe bei der Rückeroberung Schleswigs versprochen haben, verstehen aber unseren Pragmatismus, uns auf die Seite Deutschlands zu stellen. Die unmittelbare Sicherheit muss Vorrang haben. Und wer weiß, wenn Deutschland den Krieg verliert, muss die Freundschaft mit ihnen vielleicht nicht mehr lange halten …"
 naw_norway.33.a:0 "[From.GetName] versteht unseren Pragmatismus."
 
 naw_norway.34.t:0 "[From.GetName] erhebt Beschwerde gegen unsere Parteinahme für Deutschland"
 naw_norway.34.d:0 "Die dänische Führung schien ziemlich verärgert darüber zu sein, dass wir uns auf die Seite Deutschlands stellten. Erstens war da die Frage, wie wir versprochen hatten, bei der Rückeroberung Schleswigs zu helfen. Zweitens könnten die Deutschen uns und den heutigen dänischen Teil Schleswigs angreifen, wenn sie trotz unserer Parteinahme stärker werden. Wie sollen wir damit umgehen?"
 naw_norway.34.a:0 "Sie müssen entschädigt werden! Eine finanzielle Entschädigung und Grönland als Sicherheit."
 naw_norway.34.b:0 "Geben Sie ihnen Grönland vorerst als Sicherheit zurück."
 naw_norway.34.c:0 "Diese Idioten! Verstehen sie nicht, dass wir das tun mussten? Sie bekommen nichts."
 
 naw_norway.35.t:0 "Die Norweger stimmen massiven Entschädigungen zu"
 naw_norway.35.d:0 "Es scheint, als hätten die Norweger unsere Beschwerden wirklich verstanden. Sie haben uns Grönland als vorübergehende Sicherheit zurückgegeben und uns zusätzlich eine massive finanzielle Entschädigung gezahlt, die wir nun in unsere Industrie umleiten."
 naw_norway.35.a:0 "Es ist nur richtig, dass sie zahlen, aber danke."
 
 naw_norway.36.t:0 "Die Norweger übergeben Grönland"
 naw_norway.36.d:0 "Die Norweger haben uns Grönland vorerst als Pfand zurückgegeben, bis der Rest Schleswigs uns gehört. Wir haben den Grönland-Prozess nicht umsonst gewonnen! Und unsere Öffentlichkeit ist vorerst beruhigt."
 naw_norway.36.a:0 "Akzeptabel."
 
 naw_norway.37.t:0 "Die Norweger haben uns eine Entschädigung verweigert"
 naw_norway.37.d:0 "Die Norweger haben uns mit der Begründung, sie hätten das Notwendige getan, eine Entschädigung verweigert und erklärt, die Unterstützung Deutschlands sei für das Überleben aller unserer Nationen notwendig. Das wird für uns nicht leicht zu vertuschen sein, aber ein solcher Schritt und ihre mangelnde Kompromissbereitschaft haben die Glaubwürdigkeit der norwegischen Politiker sicherlich noch weiter beschädigt."
 naw_norway.37.a:0 "Dies war das schlechteste Handelsabkommen in der Geschichte der Handelsabkommen."
 
 naw_norway.38.t:0 "Wir halten unseren Teil der Abmachung ein"
 naw_norway.38.d:0 "Schleswig-Holstein gehört uns, und die Norweger haben ihren Teil der Abmachung eingehalten. Nun werden Maßnahmen ergriffen, um Grönland wieder an sie zurückzugeben, wie es unser Teil der Abmachung war."
 naw_norway.38.a:0 "Kümmern Sie sich jetzt gut um die Inuit!"
 
 naw_norway.39.t:0 "[From.GetName] hat uns Grönland zurückgegeben"
 naw_norway.39.d:0 "Die Dänen erkannten, dass wir unseren Teil der Abmachung, ihnen bei der Rückeroberung Schleswigs zu helfen, erfüllt hatten, und gaben uns Grönland zurück. Grönland ist nun kein vorübergehendes Pfand mehr, sondern Teil des norwegischen Königreichs, und die Inuit werden norwegische Staatsbürger."
 naw_norway.39.a:0 "Wunderbar. Wie oft erleben Sie eine Ereigniskette mit einer Moral?"
 
 naw_norway.40.t:0 "[From.GetName] stellt sich auf die Seite der Russen, nachdem es uns Karelien versprochen hat"
 naw_norway.40.d:0 "Die norwegische Führung hat sich auf die Seite der Russen gestellt, um sie von Angriffen abzuhalten. Natürlich sind einige Finnen nun verärgert, dass wir unsere baltischen Inseln im Austausch für Unterstützung bei der Rückeroberung Kareliens und der Beendigung der Bedrohung im Osten aufgegeben haben. Und außerdem: Wenn die Russen die anderen Großmächte besiegen, wie sollen wir uns dann gegen sie verteidigen? Wir teilen eine riesige Grenze mit ihnen! Zumindest könnten wir unsere Beschwerden an die Norweger richten, um unsere Öffentlichkeit zufriedenzustellen und vielleicht etwas davon zu haben?"
 naw_norway.40.a:0 "Unsere Beschwerden an die norwegische Regierung weiterleiten."
 naw_norway.40.b:0 "Beschweren Sie sich nicht, wenigstens haben wir jetzt Frieden."
 
 naw_norway.41.t:0 "[From.GetName] versteht unsere Entscheidung, auf der Seite Russlands zu stehen"
 naw_norway.41.d:0 "Die Finnen sind zwar verärgert, weil wir ihnen Hilfe bei der Rückeroberung Kareliens versprochen haben, aber wahrscheinlich noch mehr, weil wir uns auf die Seite einer Bedrohung gestellt haben, die sie eines Tages treffen könnte. Sie verstehen jedoch unseren Pragmatismus, mit dem wir uns auf die Seite Russlands gestellt haben. Sie sind zwar um die langfristigen Folgen besorgt, wissen aber, dass die unmittelbare Sicherheit Vorrang haben muss. Und wer weiß, sollte Russland den Krieg verlieren, muss die Freundschaft mit ihnen vielleicht nicht mehr lange halten …"
 naw_norway.41.a:0 "[From.GetName] versteht unseren Pragmatismus."
 
 naw_norway.42.t:0 "[From.GetName] erhebt Beschwerden darüber, dass wir Partei für die Sowjetunion ergreifen"
 naw_norway.42.d:0 "Die finnische Führung schien ziemlich verärgert darüber zu sein, dass wir uns auf die Seite der Russen stellten. Erstens war da die Frage, wie wir versprochen hatten, bei der Rückeroberung des restlichen Kareliens zu helfen. Zweitens könnten die Sowjets uns und Finnland angreifen, wenn sie trotz unserer Unterstützung stärker werden. Das ist jedenfalls die Überzeugung der Finnen. Wie sollen wir damit umgehen?"
 naw_norway.42.a:0 "Sie müssen entschädigt werden! Geben Sie ihnen eine finanzielle Entschädigung."
 naw_norway.42.b:0 "Wir können sie jetzt nicht entschädigen, wir brauchen unsere Ressourcen, um unsere eigene Verteidigung aufzubauen."
 
 naw_norway.43.t:0 "Die Norweger stimmen Entschädigungen zu"
 naw_norway.43.d:0 "Es scheint, als hätten die Norweger unsere Beschwerden verstanden. Sie werden uns eine finanzielle Entschädigung zahlen, die wir in unsere Industrien umleiten werden."
 naw_norway.43.a:0 "Das reicht fürs Erste, danke."
 
 naw_norway.44.t:0 "Die Norweger haben uns eine Entschädigung verweigert"
 naw_norway.44.d:0 "Die Norweger haben behauptet, sie hätten das Notwendige getan, und uns eine Entschädigung verweigert. Sie behaupten, die Unterstützung der Sowjets sei für das Überleben aller unserer Nationen notwendig. Die Expansion nach Karelien ist zwar eine Sache, doch der langfristige Schutz unserer Grenzen vor den Russen ist hier das Hauptanliegen. Dass die Norweger uns trotz ihrer bequemen Lage fernab der Bedrohung nicht einmal entschädigen wollen, ist äußerst enttäuschend …"
 naw_norway.44.a:0 "Die behüteten, naiven Narren ..."
 
 naw_norway.50.t:0 "[From.GetName] schlägt einen Deal vor"
 naw_norway.50.d:0 "Nachdem Norwegen 1814 vom dänischen Königreich getrennt wurde, erhielt Norwegen im Kieler Frieden die ehemaligen nordatlantischen Inseln Grönland, Island und die Färöer. Obwohl es in dieser Hinsicht Meinungsverschiedenheiten mit der vorübergehenden Besetzung Ostgrönlands durch norwegische Irredentisten gab, sind die Norweger nun diplomatisch auf uns zugekommen, wenn auch mit anderen Forderungen. Im Gegenzug für die Rückgabe ihrer ehemaligen Inseln Färöer und Island an Norwegen werden die Norweger ihre Ansprüche auf Grönland aufgeben, uns im Falle eines deutschen Angriffs verteidigen und bei Gelegenheit auch bei Verhandlungen über die Rückgabe Schleswigs und Teile Holstens helfen. Die Forderungen sind zwar recht umfangreich, doch die nordatlantischen Inseln sind nicht die wirtschaftlich bedeutendste Region unseres Landes, und eine Rückgabe Schleswigs wäre deutlich lukrativer gewesen. Sollten wir diesen Vorschlag annehmen oder ablehnen oder angesichts der hohen Forderungen vielleicht einen Kompromiss vorschlagen?"
 naw_norway.50.a:0 "Accept, and throw in Greenland as well. We should befriend our kindred people in the North at any cost!
 naw_norway.50.b:0 "Akzeptieren. Die Inseln waren norwegisch, und Schleswig-Holstein wäre für uns wertvoller."
 naw_norway.50.c:0 "Verhandeln Sie, um Island zu behalten. Der Deal ist derzeit sehr zu Norwegens Gunsten."
 naw_norway.50.e:0 "Lehnen Sie einen solchen Deal ab, nur die Norweger würden hiervon unmittelbar profitieren …"
 
 naw_norway.51.t:0 "[From.GetName] akzeptiert den Deal"
 naw_norway.51.d:0 "Der vorgeschlagene dänisch-norwegische Deal wurde von [From.GetName] angenommen, und unsere alten Inseln sind nun wieder unter unserer Kontrolle. Sollten wir jemals in der Lage sein, Schleswig an Dänemark zurückzugeben, müssen wir dies tun, um unseren Teil der Abmachung zu erfüllen."
 naw_norway.51.a:0 "Die Dänen sind wirklich gute Verbündete und helfen uns, einen Teil des ungerechten Vertrags von Kiel durchzusetzen."
 
 naw_norway.52.t:0 "[From.GetName] akzeptiert den Deal, mit einem Haken"
 naw_norway.52.d:0 "Den Dänen gefiel zwar die Grundidee des Abkommens, doch wenig überraschend fanden sie es etwas zu einseitig, da wir die einzigen sind, die unmittelbare Vorteile daraus ziehen. Sie schlugen daher ein scheinbar vernünftiges Gegenangebot vor, das den Deal so modifiziert, dass sie Island behalten. Unsere ausländischen Würdenträger fanden dies vernünftig genug und akzeptierten das modifizierte Angebot."
 naw_norway.52.a:0 "Nicht perfekt, aber vollkommen akzeptabel."
 
 naw_norway.53.t:0 "[From.GetName] lehnt den Deal ab"
 naw_norway.53.d:0 "Da [From.GetName] keine unmittelbaren Vorteile erwirtschaftet und unsere Forderungen überzogen sind, haben die Dänen unsere Bitte, unsere Inseln für die Rückeroberung von Schleswig-Holstein zurückzufordern, abgelehnt. Dies stellt zwar einen erheblichen Rückschlag für unseren diplomatischen Weg zu mehr Einfluss dar, wir gehen jedoch ein Risiko ein und provozieren Aufstände auf Island und den Färöern, da deren Einwohner ursprünglich vom norwegischen Festland und einem Teil unseres Königreichs stammen. Dies würde jedoch unser Bündnis mit Dänemark gefährden, und wenn Dänemark nicht nachgibt, könnte Krieg ausbrechen ..."
 naw_norway.53.a:0 "Wir werden unsere Freundschaft mit Dänemark nicht aufs Spiel setzen. Sollen sie die Inseln behalten ..."
 naw_norway.53.b:0 "Das ist inakzeptabel. Wir müssen die Revolten anzetteln und unsere Forderungen klar formulieren!"
 
 naw_norway.54.t:0 "[From.GetName] stiftet zu Sezessionen auf den Inseln an!"
 naw_norway.54.d:0 "Die niederträchtigen Norweger haben sich nicht damit abgefunden, dass wir die Inseln behalten, und haben auf Island und den Färöern Sezessionsrevolten angezettelt. Die Norweger nutzten die wachsenden nationalistischen und autonomen Bewegungen auf den Inseln sowie ihre gemeinsamen kulturellen und ethnischen Bindungen, um Unruhestifter auf die Inseln zu schicken und sie zum Anschluss an ihr Land zu bewegen. Grönland bleibt sicher, da die dortigen Bewohner keine so engen Bindungen zu Norwegen haben, aber wir müssen hier Stellung beziehen. Sollen wir den vorherigen Deal akzeptieren, den Status quo akzeptieren oder das Bündnis verlassen und unsere Inseln mit Gewalt zurückerobern?"
 naw_norway.54.a:0 "Wenn wir auch Grönland mit einbeziehen, können wir genauso gut den ursprünglichen Deal retten und sie bei der Rückeroberung Schleswigs unterstützen."
 naw_norway.54.b:0 "Riskieren Sie nichts. Akzeptieren Sie den neuen Status Quo ohne Unterstützung für die Rückeroberung Schleswigs."
 naw_norway.54.c:0 "Eine derartige Verletzung unseres Territoriums darf niemals toleriert werden. Auf in den Krieg!"
 
 naw_norway.55.t:0 "[From.GetName] gibt auf und übergibt Grönland"
 naw_norway.55.d:0 "Die Aufstandsversuche waren ein voller Erfolg. Die Dänen haben nachgegeben, um den ursprünglichen Deal zu retten, da sie keinen Krieg riskieren wollten und die Versorgungslinien nach Grönland zu lang waren, um eine Aufrechterhaltung zu rechtfertigen. Da der ursprüngliche Deal weitgehend zu unseren Gunsten ausfiel, sollten wir ihnen ihre Verfehlungen verzeihen und ihr Recht auf Schleswig unterstützen, falls es jemals relevant wird."
 naw_norway.55.a:0 "Und der Island-Gambit zahlt sich aus."
 
 naw_norway.56.t:0 "[From.GetName] akzeptiert widerwillig den neuen Status Quo"
 naw_norway.56.d:0 "Die Dänen sind zwar verbittert über unser schmutziges Spiel, akzeptieren aber den neuen Status quo und bleiben in der Allianz, solange ihre Versorgungsschiffe nach Grönland weiterhin auf den Färöern und in Island anlegen können. Darüber hinaus besteht für sie keine Verpflichtung mehr, ihre Ansprüche auf Schleswig zu unterstützen, wenn wir dies wünschen."
 naw_norway.56.a:0 "Etwas umsonst bekommen? Was für Weltklasse-Staatsmänner wir haben."
 
 naw_norway.57.t:0 "[From.GetName] erklärt uns den Krieg!"
 naw_norway.57.d:0 "Der isländische Schachzug ist auf schlimmste Weise nach hinten losgegangen! Die Dänen bezeichneten die Inselaufstände als unrechtmäßige norwegische Einmischung und erklärten sie zum Kriegsakt. Daraufhin mobilisierten sie ihre Truppen gegen uns und erklärten uns den Krieg. Das einzig Positive daran ist, dass die Dänen die ersten Angriffsschritte unternommen haben. Dies könnte möglicherweise dazu beitragen, andere verbündete Staaten davon zu überzeugen, sich unserer Verteidigung gegen die Dänen anzuschließen."
 naw_norway.57.a:0 "Manchmal bekommt man mehr, als man erwartet. Die Dänen haben uns nun dazu gezwungen ..."
 
 naw_norway.58.t:0 "Der Fennoskandische Deal"
 naw_norway.58.d:0 "Aus Angst vor Einfällen in die Ostgrenzen ihres Bündnisses einigten sich die fennoskandischen Verbündeten Norwegen, Schweden und Finnland auf gegenseitige Verteidigungsgarantien. Finnland übergab die mehrheitlich von Schweden bewohnten Åland-Inseln an Schweden, während Schweden das ehemalige norwegische Gebiet Båhuslen an Norwegen abtrat.\n\nDadurch erhielt Norwegen, das am wenigsten vom russischen Expansionismus bedrohte Land, einen Anreiz, seine Verbündeten in der Nähe der Gefahr zu verteidigen. Schweden konnte die potenzielle Expansion seines ehemaligen Feindes begrenzen, und Finnland hat nun Nachbarn, die sich verpflichten, seine Ostgrenzen zu verteidigen, einschließlich der wichtigen Karelischen Landenge."
 naw_norway.58.a:0 "Freunde können sich immer einigen. Nun müssen wir unser Militär zu einem wichtigen Teil der Abschreckung machen."
 naw_norway.58.b:0 "Vertrauen sie uns etwa nicht? Auf jeden Fall sollten wir uns vor diesen intriganten Nachbarn in Acht nehmen …"
 
 naw_norway.59.t:0 "[From.GetName] akzeptiert den Deal und einige"
 naw_norway.59.d:0 "Der vorgeschlagene dänisch-norwegische Deal wurde von [From.GetName] angenommen, und unsere alten Inseln, einschließlich Grönland, das in gutem Glauben in den Deal einbezogen wurde, sind nun wieder unter unserer Kontrolle. Sollten wir jemals in der Lage sein, Schleswig an Dänemark zurückzugeben, müssen wir dies tun, um unseren Teil der Abmachung zu erfüllen."
 naw_norway.59.a:0 "Die Dänen sind wirklich gute Verbündete und helfen uns, den Schaden durch den ungerechten Vertrag von Kiel wiedergutzumachen."
 
 naw_norway.60.t:0 "Haakon VII. dankt ab"
 naw_norway.60.d:0 "Angesichts der zunehmenden Spannungen in Norwegen hat sich König Haakon, selbst ein angesehener und demokratisch gesinnter Mann, entschlossen, dem wachsenden Druck nachzugeben, der eine neue Art von Hierarchie im Staat fordert. Seine Abdankung trat mit sofortiger Wirkung in Kraft."
 naw_norway.60.a:0 "So gut er auch als König war, die Monarchie ist überholt"
 naw_norway.60.b:0 "Was ist mit unseren Freunden los?"
 naw_norway.60.c:0 "Die Monarchie ist für das Volk überflüssig"
 naw_norway.60.p:0 "In Norwegen muss radikale Politik am Werk sein …"
 
 naw_norway.61.t:0 "[From.GetName] bietet Bedingungen"
 naw_norway.61.d:0 "Angesichts des Ansturms unserer Kriegsmaschinerie hat die [From.GetAdjective]-Führung beschlossen, Frieden mit uns zu suchen und bietet im Gegenzug an, unser Satellitenstaat zu werden. Dies wird zu Frieden zwischen unseren Nationen führen, und sobald sie unser unterworfener Staat wird, wird sie sich an allen laufenden Kriegen auf unserer Seite beteiligen. Was halten wir davon?"
 naw_norway.61.a:0 "Akzeptieren Sie die Entscheidung [From.GetName] indirekt"
 naw_norway.61.b:0 "Nur die vollständige Annexion ihres Landes ist gut genug …"
 
 naw_norway.62.t:0 "[From.GetName] akzeptiert unsere Bedingungen"
 naw_norway.62.d:0 "[From.GetName] hat unsere Kapitulationsbedingungen akzeptiert und wir werden fortan ihr Satellitenstaat sein. Das bedeutet auch, dass wir vorerst keine andere Wahl haben, als an allen Konflikten teilzunehmen, in die sie uns hineinziehen. Aber vielleicht warten Freiheit und Frieden am fernen Horizont?"
 naw_norway.62.a:0 "Leider hatten wir keine anderen Möglichkeiten mehr ..."
 
 naw_norway.63.t:0 "[From.GetName] lehnt unsere Bedingungen ab"
 naw_norway.63.d:0 "[From.GetName] hat unsere Kapitulationsbedingungen abgelehnt und offenbar entschieden, dass nur die direkte Herrschaft gut genug ist. Dies könnte zu einem Kampf um unsere Unabhängigkeit und Existenz werden!"
 naw_norway.63.a:0 "Ein Kampf ist also unvermeidlich und der Einsatz wird erhöht …"
 
 naw_norway.70.t:0 "Alte Traditionen neu entfacht"
 naw_norway.70.d:0 "Die alten Traditionen von [Root.GetName] erleben in letzter Zeit eine romantische Renaissance. Bürger und Politiker fragen sich nun, ob alte Traditionen wie Adelstitel wieder eingeführt werden sollten (obwohl die meisten angesichts unserer demokratischen Traditionen der Meinung sind, dass die Titel diesmal ohne die damit verbundenen Privilegien bleiben sollten). Einige plädieren sogar für die Wiedereinführung alter Ortsnamen und sogar der alten Flagge des mittelalterlichen Königreichs Norwegen. Welchen Weg sollten wir einschlagen?"
 naw_norway.70.a:0 "Die Aristokratie ist überholt und wir sollten natürlich an unserer aktuellen norwegischen Flagge festhalten."
 naw_norway.70.b:0 "Adelstitel für unsere ehrenhaftesten Bürger, aber behalten Sie unsere aktuelle Flagge."
 naw_norway.70.c:0 "Wir müssen unsere Traditionen respektieren! Wir werden Aristokratie UND unsere glorreiche alte Flagge haben."
 
 naw_norway.71.t:0 "Der Ort der Macht"
 naw_norway.71.d:0 "In der Vergangenheit hatte [Root.GetNameDef] viele verschiedene Hauptstädte, die drei wichtigsten sind jedoch nach wie vor Oslo, Bergen (früher bekannt als Bjørgvin) und Trondheim (früher bekannt als Nidaros). Mit den raschen Veränderungen hin zu unserem traditionellen Königreich haben wir nun auch die Möglichkeit, eine der älteren Städte wieder zur Hauptstadt zu machen, falls wir dies wünschen. Oslo ist jedoch immer noch die größte Stadt, in der Nähe der meisten unserer landwirtschaftlichen Betriebe und beherbergt die meisten unserer Institutionen. Daher könnte dieser Schritt dort möglicherweise nicht auf große Zustimmung stoßen ..."
 naw_norway.71.a:0 "Bleiben Sie bei Oslo als Hauptstadt."
 naw_norway.71.b:0 "Gehen Sie nach Bergen, der ehemaligen Hauptstadt und wichtigen Handelsstadt."
 naw_norway.71.c:0 "Gehen Sie nach Trondheim, der ehemaligen Hauptstadt und einem wichtigen Ort für Pilger und Religion."
 
 naw_norway.72.t:0 "Städtenamen von Old?"
 naw_norway.72.d:0 "Nachdem die wichtigsten symbolischen Fragen geklärt sind, ist es vielleicht an der Zeit, darüber nachzudenken, ob wir alte Ortsnamen, insbesondere für unsere Städte, wieder einführen sollten. Sollten wir bei dem bleiben, was die heutigen Generationen kennen, unsere größten Städte umbenennen oder sogar damit beginnen, alle großen Städte und einige der kleineren umzubenennen, um wirklich etwas zu verändern?"
 naw_norway.72.a:0 "Lass es. Das Wichtigste ist, dass es kein Christiania gibt."
 naw_norway.72.b:0 "Benennen Sie die großen Städte um. Bjørgvin und Nidaros sollen zurückgebracht werden."
 naw_norway.72.c:0 "Es ist eine umfassende Umbenennung erforderlich. Beginnen Sie mit Bergen, Trondheim, Aalesund und Hamar."
 
 naw_norway.73.t:0 "Die Monarchistische Koalition"
 naw_norway.73.d:0 "Wer sollte die Monarchistische Koalition nun, da sie an der Macht ist, bei ihren ersten Schritten zur Gestaltung unseres Königreichs anführen? Unsere älteste politische Partei, die Liberale Partei? Unsere traditionsbewusste Agrarpartei? Oder vielleicht die Konservativen?"
 naw_norway.73.a:0 "Die Liberale Partei."
 naw_norway.73.b:0 "Die Bauernpartei."
 naw_norway.73.c:0 "Die Konservative Partei."
 
 naw_norway.74.t:0 "Das Ausmaß der Macht"
 naw_norway.74.d:0 "Angesichts der Wiederbelebung alter Traditionen stellten Politiker und Anhänger des neuen, aber dennoch alten Staates die Frage, wie dieser eigentlich geführt werden soll. Sollte der Premierminister in jeder Hinsicht dem König unterstellt sein oder sollten weiterhin viele parlamentarische Befugnisse bestehen? Wie oft sollten Wahlen abgehalten werden? Wie viel Macht sollte der König in diesem neugestalteten Königreich konkret haben?"
 naw_norway.74.a:0 "Wahlen wie üblich und eine traditionelle, aber konstitutionelle Monarchie."
 naw_norway.74.b:0 "Mehr Macht für den König. Dennoch eine konstitutionelle Monarchie mit Wahlen."
 naw_norway.74.c:0 "Der Premierminister sollte dem König Rechenschaft ablegen, aber es sollten dennoch Wahlen abgehalten werden."
 naw_norway.74.p:0 "Der König soll über umfassende Macht verfügen, eine wahre traditionelle Monarchie."
 
 naw_norway.75.t:0 "Traditionen, für die es sich zu kämpfen lohnt?"
 naw_norway.75.d:0 "Mit der Welle des Monarchismus, die unser Land erfasst hat, haben sich viele Menschen unseren monarchistischen Reihen angeschlossen. Sollten wir die Gunst der Stunde nutzen oder warten, bis die Menschen unsere heilsame Sichtweise annehmen?"
 naw_norway.75.a:0 "Wir kämpfen im Morgengrauen!"
 naw_norway.75.b:0 "Äh, vielleicht im Morgengrauen in, sagen wir, einem Monat. Wir müssen uns vorbereiten."
 naw_norway.75.c:0 "Dem König würde es nicht gefallen, wenn wir ihm zuliebe einen Krieg beginnen würden. Wir werden sie rechtzeitig überzeugen."
 
 naw_norway.76.t:0 "Bereit zu kämpfen?"
 naw_norway.76.d:0 "Es ist einen Monat her, seit sich unsere monarchistischen Anhänger zum ersten Mal getroffen haben. Ist dies der richtige Zeitpunkt, um zuzuschlagen und einen Bürgerkrieg zu riskieren?"
 naw_norway.76.a:0 "Wir sind bereit. Auf in den Krieg!"
 naw_norway.76.b:0 "Vielleicht war das am Ende doch keine so gute Idee.."
 
 naw_norway.77.t:0 "Norwegen lädt uns zu seiner Allianz ein"
 naw_norway.77.d:0 "In der sechsten Strophe der norwegischen Nationalhymne heißt es, die Skandinavier würden im Krieg zusammenstehen. Die Norweger lassen jetzt die panskandinavische (oder pannordische) Bewegung wieder aufleben und wenden sich an uns."
 naw_norway.77.a:0 "Bruderreiche im Leben und im Tod!"
 naw_norway.77.b:0 "Vielleicht nicht im Tod ..."
 
 naw_norway.78.t:0 "[From.GetName] tritt [Root.GetFactionName] bei"
 naw_norway.78.d:0 "Unser Bruder [From.GetName] ist unserer Fraktion beigetreten. Lasst unsere Völker gemeinsam für den Sieg einstehen!"
 naw_norway.78.a:0 "Noch ein paar gute Karten und wir haben einen Royal Flush."
 
 naw_norway.79.t:0 "[From.GetName] lehnt unsere Hand ab"
 naw_norway.79.d:0 "[From.GetName] hatte irgendwie das Gefühl, dass es in ihrem besten Interesse sei, unser auf Traditionen basierendes Bündnis abzulehnen."
 naw_norway.79.a:0 "Ein königliches Fiasko ..."
 
 naw_norway.80.t:0 "Die Färöer-Inseln werden wieder integriert"
 naw_norway.80.d:0 "Nachdem wir unsere Verbindung zu unseren Verwandten auf den Färöern wiederhergestellt haben, fühlen sie sich nun willkommen und bemühen sich, sich in ihr früheres Herkunftsland zu integrieren. [Root.GetName] heißt sie zu Hause willkommen. Wie sollen wir nun die Inseln nennen, die jetzt zu unserem Land gehören?"
 naw_norway.80.a:0 "Mit Bokmål, der Schriftsprache der Mehrheit."
 naw_norway.80.b:0 "Mit Nynorsk, der heutigen Schriftsprache, die den gesprochenen Dialekten und dem Altnorwegischen am nächsten kommt."
 naw_norway.80.c:0 "Verwenden wir die Sprache der einheimischen Färinger, um ihre Inseln zu benennen."
 
 naw_norway.81.t:0 "Island wieder integriert"
 naw_norway.81.d:0 "Das Schicksal hat uns wieder mit der Insel der Wikingersagen zusammengeführt. Ursprünglich waren wir Norweger, die vor der Herrschaft und den Steuern unseres ersten Königs flohen und später in das norwegische Königreich zurückkehrten. Die Dänische Union und der Vertrag von Kiel nahmen uns einst Island, die Färöer und Grönland weg. Unsere ähnliche Kultur, Geschichte und Abstammung bringen uns nun wieder zusammen."
 naw_norway.81.a:0 "Ein weiteres Ereignis, das einer Saga würdig ist."
 
 naw_norway.82.t:0 "Grönland wieder integriert"
 naw_norway.82.d:0 "Während die ursprünglichen norwegisch-isländischen Siedler auf Grönland ausstarben, wurde Grönland durch eine dänisch-norwegische Mission, die die Insel in den 1720er Jahren erreichte, wieder in den Besitz Norwegens zurückgeführt. Der Frieden von Kiel nahm uns die Insel weg, ohne dass wir dabei wenig Mitspracherecht hatten. Und auch die Sache mit Grönland ging für uns nicht gut aus … Nun jedoch hat uns das Schicksal die Insel wieder zugeteilt. Die neuen Siedler dieser Insel, die Inuit, wurden zwar getauft und integriert, sind aber nicht wie die Färinger und Isländer ursprünglich norwegischer Abstammung, daher war die Integration hier naturgemäß schwieriger. Doch nun beginnen die Inuit endlich, sich in ihrer neuen Nation einzuleben."
 naw_norway.82.a:0 "Den Grönländern wird es in unserem Land gut gehen."
 
 naw_norway.83.t:0 "Båhuslen wieder integriert"
 naw_norway.83.d:0 "Båhuslen war 800 Jahre lang norwegisches Land, bevor es in einem der vielen Kriege zwischen Dänen und Schweden verloren ging, in den wir aufgrund unserer Union mit Dänemark verwickelt waren. Obwohl es kurzzeitig zurückerobert wurde, war es nicht Teil der Friedensverträge. Nun jedoch ist es durch die Ereignisse wieder in unseren Besitz gelangt, und die Menschen von Båhuslen sind bereit, zu ihrer neuen Nation beizutragen. Unsere lange Geschichte und unser gemeinsames Erbe helfen dabei zweifellos."
 naw_norway.83.a:0 "Unsere Zahl wächst, ebenso wie unsere Küstenlinie."
 naw_norway.83.b:0 "Unsere sehr alte norwegische Küste."
 naw_norway.83.c:0 "Tatsächlich sehr, sehr alt ..."
 
 naw_norway.84.t:0 "Jämtland wieder integriert"
 naw_norway.84.d:0 "Die raue, aber wunderschöne Landschaft Jämtlands und seine Bewohner wurden wieder in die norwegische Nation integriert. Es stellt sich jedoch die Frage, wie wir diesen Neuzugang in unserem Land nennen, oder besser gesagt, wie wir ihn nennen. Sollten wir die moderne norwegische Schriftsprache verwenden oder etwas, das auf unserer anderen, weniger verbreiteten Schriftsprache basiert, aber traditioneller ist und sowohl den Dialekten der Jämtländer selbst als auch unserer angrenzenden Region Trøndelag entspricht? Es gibt auch die Möglichkeit, zu unseren Wurzeln zurückzukehren und dem Land seinen altnordischen Namen zu geben."
 naw_norway.84.a:0 "Bleiben wir bei der Schriftsprache der Mehrheit, der Bokmål-Variante."
 naw_norway.84.b:0 "Bleiben wir bei Traditionen und lokalen Dialekten, der Nynorsk-Variante."
 naw_norway.84.c:0 "Kehren wir zu unseren gemeinsamen Wurzeln zurück, der nordischen Variante."
 
 naw_norway.85.t:0 "Orkney wieder integriert"
 naw_norway.85.d:0 "Die Orkney-Inseln waren einst das Herzstück des Jarldoms Orkney, einem der höchsten Titel innerhalb des norwegischen Königreichs. Nun sind sie überraschend wieder in unseren Besitz übergegangen. Mit ihrem gemischten norwegischen, keltischen und schottischen Erbe sind die Menschen der Region nun in unsere Nation integriert und bereit, Bürger zu werden. Doch wie sollen wir das Gebiet nun benennen? Modern, traditionell oder sehr traditionell?"
 naw_norway.85.a:0 "Modernes Bokmål reicht völlig aus. Dank der Samnorsk-Initiativen ist es norwegisch genug."
 naw_norway.85.b:0 "Natürlich Nynorsk! Die Sprache basiert auf der norwegischen Sprechweise, nicht auf der dänischen Schreibweise."
 naw_norway.85.c:0 "Beginnen wir dort, wo wir aufgehört haben, nämlich bei den Einwohnern, die die nordische Sprache sprechen."
 
 naw_norway.86.t:0 "Shetland wieder integriert"
 naw_norway.86.d:0 "Die Shetlandinseln waren einst Teil des norwegischen Orkney-Gebiets, einem der höchsten Titel innerhalb des norwegischen Königreichs. Seit sie vor Kurzem wieder in unseren Besitz übergegangen sind, haben wir daran gearbeitet, diese ehemaligen norwegischen Inseln wieder in unser Land zu integrieren – und das mit Erfolg. Doch die Frage bleibt: Shetland oder Hjaltland?"
 naw_norway.86.a:0 "Shetland ist eine schöne moderne Interpretation des Alten ..."
 naw_norway.86.b:0 "Aber das Original ist unschlagbar: Hjaltland!"
 
 naw_norway.100.t:0 "Die Moskauer Prozesse"
 naw_norway.100.d:0 "Die Sowjetunion durchlebte und durchlebt weiterhin große und brutale interne Veränderungen. Viele einflussreiche Personen wurden während der berüchtigten Moskauer Prozesse verurteilt.\n\nDie internationale Presse durfte an den Prozessen teilnehmen. Dabei wurde festgestellt, dass überraschend viele Angeklagte schwere Verbrechen innerhalb der Sowjetunion zugaben. Wurden sie möglicherweise zu diesen Geständnissen gezwungen oder unter Druck gesetzt? Versucht der Generalsekretär, politische Gegner loszuwerden?\n\nNachdem die Nachrichten nach Norwegen gelangten, spekulierten Medien und Öffentlichkeit über die Geschehnisse und verurteilten die Prozesse oft als ungerecht und verdächtig. Viele unserer politischen Parteien distanzieren sich inzwischen von der Komintern und haben sich gemäßigt. Wie sollen wir mit diesen Berichten aus Moskau umgehen?"
 naw_norway.100.a:0 "Verurteilen Sie ungerechte Prozesse und lassen Sie unsere Medien frei berichten und informieren."
 naw_norway.100.b:0 "Versuchen Sie, die schlimmsten Seiten zu vertuschen. Die Arbeiter brauchen den Sozialismus."
 naw_norway.100.c:0 "Nutzen wir diese Farce, um nationalistische und antikommunistische Gefühle zu schüren."
 naw_norway.100.p:0 "Dies ist ein Beweis dafür, dass wir solide Traditionen brauchen, um dem Extremismus entgegenzutreten."
 
 naw_norway.101.t:0 "[From.GetName] strebt engere Beziehungen zu Deutschland an"
 naw_norway.101.d:0 "[From.GetLeader] hat angekündigt, dass [From.GetName] freundschaftliche und freundschaftliche Beziehungen zu seinem Brudervolk in Deutschland aufbauen soll. Die deutschen Minister sind darüber sehr erfreut und haben bei einem kürzlichen Staatsbesuch von [From.GetLeader] vereinbart, die Zusammenarbeit zwischen beiden Nationen zu fördern."
 naw_norway.101.a:0 "Wir haben eine kluge Wahl getroffen."
 naw_norway.101.b:0 "Was könnten unsere Nachbarn vorhaben?"
 naw_norway.101.c:0 "Holt den Schnaps, ein Toast auf unsere neuen Freunde ist angebracht!"
 naw_norway.101.p:0 "Die Freunde unserer Freunde könnten auch unsere Freunde sein!"
 naw_norway.101.e:0 "In Nordwesteuropa gibt es einige Fehleinschätzungen."
 naw_norway.101.f:0 "Lassen Sie uns diese Entwicklung zur Kenntnis nehmen."
 
 naw_norway.102.t:0 "[From.GetName] strebt engere Beziehungen zur Sowjetunion an"
 naw_norway.102.d:0 "[From.GetLeader] hat die Freundschaft und Zusammenarbeit zwischen [From.GetName] und seinen östlichen Nachbarn verkündet. Zweifellos haben die Norweger einen mächtigen Freund gewonnen, und die Revolution breitet sich weiter aus. Die russischen Minister freuen sich über dieses Ereignis, und bei einem kürzlichen Staatsbesuch von [From.GetLeader] war gegenseitiges Wohlwollen deutlich spürbar."
 naw_norway.102.a:0 "Wir haben eine kluge Wahl getroffen."
 naw_norway.102.b:0 "Was könnten unsere Nachbarn vorhaben?"
 naw_norway.102.c:0 "Holt den Wodka, ein Toast auf unsere neuen Freunde ist angebracht!"
 naw_norway.102.p:0 "Die Freunde unserer Freunde könnten auch unsere Freunde sein!"
 naw_norway.102.e:0 "In Nordwesteuropa gibt es einige Fehleinschätzungen."
 naw_norway.102.f:0 "Lassen Sie uns diese Entwicklung zur Kenntnis nehmen."
 
 naw_norway.140.t:0 "Der norwegische Bürgerkrieg"
 naw_norway.140.d:0 "In Zeiten sich rasch verändernder politischer Lagen hat sich Norwegen für einen anderen Weg entschieden als Länder wie die Sowjetunion, Italien und Deutschland mit ihren neuen und beispiellosen politischen Ideologien. In der Parlamentarischen Konstitutionellen Monarchie Norwegen plädieren viele für eine Rückkehr zu Traditionen, alten Werten und einem altmodischen Königreich. Dieses Mal allerdings ohne die Herrschaft von Kopenhagen oder Stockholm. Die traditionell konservativen, zentristischen, agrarisch-monarchistischen Elemente haben sich mit einem Großteil des Militärs zusammengeschlossen, um einen solchen Staat wiederherzustellen. In der Hauptstadtregion stieß dieser Schritt auf massiven Widerstand, und Freiwillige aus Europa strömten herbei. Der norwegische Bürgerkrieg hat nun unbestreitbar begonnen."
 naw_norway.140.a:0 "Familie und Traditionen stehen an erster Stelle!"
 naw_norway.140.b:0 "Brüderlichkeit und Demokratie zuerst!"
 naw_norway.140.c:0 "Ein Bürgerkrieg in der Nachbarschaft? Wir sollten vorsichtig sein, wenn Norwegen in ein solches Chaos versinkt …"
 naw_norway.140.p:0 "Für die Monarchie kämpfen? Welchen Nutzen soll das den Massen bringen? Die norwegischen Monarchisten sind verblendet ..."
 naw_norway.140.e:0 "Wie konnte das in Norwegen passieren?"
 
 naw_norway.141.t:0 "Der Bürgerkrieg ist beendet – die Opposition ist gefangen!"
 naw_norway.141.d:0 "Mit der Einnahme Oslos und der letzten Festungen unserer Gegner haben wir auch die Anführer derjenigen gefangen genommen, die gegen uns zu den Waffen gegriffen haben. Während einige argumentieren, dass der Einsatz gegen uns und die Verursachung des Elends eines Bürgerkriegs bestraft werden sollte, plädieren andere für Milde, da tapfere Seelen, die für ihre Überzeugungen kämpfen, dem neuen Königreich nützlich sein könnten. Wie sollen wir mit diesen Tätern umgehen?"
 naw_norway.141.a:0 "Weitverbreitete Zwangsarbeit für diejenigen, die die Menschen dazu gebracht haben, zu den Waffen zu greifen!"
 naw_norway.141.b:0 "Zwangsarbeit gibt es nur für die schlimmsten Täter."
 
 naw_norway.142.t:0 "Der norwegische Bürgerkrieg ist beendet"
 naw_norway.142.d:0 "Nach der Einnahme Oslos war es nur eine Frage der Zeit, bis die monarchistischen Kräfte den norwegischen Bürgerkrieg gewinnen würden. Monarchistische und traditionalistische Kräfte kämpften für die Wiederherstellung einer traditionellen Monarchie, und mit dem Ende des Bürgerkriegs ist der Weg für Reformen frei.\n\nWichtige Oppositionsmitglieder werden vor Gericht gestellt, und König Haakon, der den Bürgerkrieg von Anfang an ablehnte, erklärte, er freue sich über die Rückkehr des Friedens nach Norwegen. Möge der Heilungsprozess beginnen."
 naw_norway.142.a:0 "Der Tag gehört uns!"
 naw_norway.142.b:0 "Gut, das norwegische Volk wird nicht länger unter den Schrecken des Krieges leiden."
 naw_norway.142.c:0 "Gut zu wissen."
 
 naw_norway.145.t:0 "Separatisten auf den Färöern und Island"
 naw_norway.145.d:0 "Im Krieg zwischen Norwegen und Dänemark gibt es neue Entwicklungen. Norwegern ist es in Zusammenarbeit mit führenden Isländern und Färingern gelungen, auf den ehemaligen norwegischen Inseln Aufstände gegen die dänische Herrschaft anzuzetteln. Dies wird die dänische Sache sicherlich zurückwerfen."
 naw_norway.145.a:0 "Ein diplomatischer Sieg, selbst im Krieg. Unsere Sache ist gerecht."
 naw_norway.145.b:0 "Das ist ein schmutziges Spiel, selbst für Kriegsstandards."
 naw_norway.145.c:0 "Hmmm … Vielleicht hatte die norwegische Sache doch etwas für sich."
 
 naw_norway.150.t:0 "Die monarchistische Fraktion von [Root.GetNameDef]"
 naw_norway.150.d:0 "Tatsächlich werden Schritte unternommen, um unsere Haltung und Werte weltweit zu vertreten. Nach der harten Arbeit unserer Repräsentanten und Staatsmänner könnte eine neue Fraktion entstehen. Wie sollen wir dieses neue, ehrgeizige Bündnis nennen?"
 naw_norway.150.a:0 "„Royal League“, denke ich. Wenn Sie mich jetzt entschuldigen würden, ich hätte Lust, eine Pause mit etwas Fußball zu machen."
 naw_norway.150.b:0 "„Monarchistische Union“. Warum sollte man die Dinge der Fantasie der Menschen überlassen?"
 naw_norway.150.c:0 "„Union der Könige“. „Könige“ im Plural ist wichtig, damit die Dänen oder Schweden nicht auf dumme Gedanken kommen."
 naw_norway.150.p:0 "Hmmm ... Lassen Sie mich bitte die anderen Optionen sehen ..."
 
 naw_norway.151.t:0 "Die Monarchistische Fraktion, Fortsetzung"
 naw_norway.151.d:0 "Tatsächlich werden Schritte unternommen, um unsere Haltung und Werte weltweit zu vertreten. Nach der harten Arbeit unserer Repräsentanten und Staatsmänner könnte eine neue Fraktion entstehen. Wie sollen wir dieses neue, ehrgeizige Bündnis nennen?"
 naw_norway.151.a:0 "„Kindred Kingdoms“ klingt gut. Es hat tatsächlich einen schönen Klang."
 naw_norway.151.b:0 "„Nördliches Königreich“, ganz sicher. Geographie wird unterschätzt."
 naw_norway.151.c:0 "„Nordische Union“. Es ist einfach und lässt Raum für potenzielle traditionelle Republiken. Hei Suomi!"
 naw_norway.151.p:0 "Lassen Sie uns diese Entscheidung jetzt nicht treffen."
 
 naw_norway.160.t:0 "[From.GetName] will sich mit dem Kaiserreich verbünden"
 naw_norway.160.d:0 "[From.GetName] hat uns um ein Bündnis gebeten. Das traditionelle Königreich im Norden und seine Untertanenstaaten werden sich uns anschließen, wenn wir dies annehmen."
 naw_norway.160.a:0 "Einverstanden. Mehr Freunde für das Kaiserreich."
 naw_norway.160.b:0 "Ablehnen. Uns geht es gut, so wie es ist."
 
 naw_norway.161.t:0 "[From.GetName] nimmt uns in ihre Allianz auf"
 naw_norway.161.d:0 "Der deutsche Kaiser und seine Vertreter haben uns in ihre Fraktion aufgenommen. Lasst uns gemeinsam eine bessere Welt aufbauen."
 naw_norway.161.a:0 "Das sind hervorragende Neuigkeiten."
 
 naw_norway.162.t:0 "[From.GetName] lehnt unseren Beitritt zu ihrer Allianz ab …"
 naw_norway.162.d:0 "Der deutsche Kaiser hat unseren großzügigsten Vorschlag, sich mit ihm zusammenzuschließen, abgelehnt."
 naw_norway.162.a:0 "Das sind enttäuschende Neuigkeiten."
 
 naw_norway.163.t:0 "[From.GetName] möchte sich mit dem Imperium verbünden"
 naw_norway.163.d:0 "[From.GetName] hat uns um ein Bündnis gebeten. Das traditionelle Königreich im Norden und seine Untertanenstaaten werden sich uns anschließen, wenn wir dies annehmen."
 naw_norway.163.a:0 "Einverstanden. Mehr Freunde für das Imperium."
 naw_norway.163.b:0 "Ablehnen. Uns geht es gut, so wie es ist."
 
 naw_norway.164.t:0 "[From.GetName] nimmt uns in ihre Allianz auf"
 naw_norway.164.d:0 "Der britische König und seine Vertreter haben zugestimmt, uns ihrer Fraktion beizutreten. Lasst uns gemeinsam eine bessere Welt aufbauen."
 naw_norway.164.a:0 "Das sind hervorragende Neuigkeiten."
 
 naw_norway.165.t:0 "[From.GetName] lehnt unseren Beitritt zu ihrer Allianz ab …"
 naw_norway.165.d:0 "Der britische König hat unseren großzügigsten Vorschlag, sich mit ihnen zusammenzuschließen, abgelehnt."
 naw_norway.165.a:0 "Das sind enttäuschende Neuigkeiten."
 
 naw_norway.170.t:0 "[From.GetName] möchte eine Entschädigung für seine Hilfe"
 naw_norway.170.d:0 "Die Norweger haben sich mit uns verbündet und nun erklärt, dass sie für ihre Hilfe bei der Verteidigung unserer Heimat und unseres Empires eine Entschädigung verlangen. Da wir ein mächtiges Bündnis mit dem Britischen Empire und Deutschland haben, wäre ihre Hilfe nicht verkehrt. Sie haben uns daher gebeten, ihnen ihren alten Besitz, die Shetlandinseln, als Entschädigung für ihre Bemühungen zurückzugeben."
 naw_norway.170.a:0 "Das scheint fair, sie sollen die Shetlandinseln bekommen."
 naw_norway.170.b:0 "Lasst uns die Inseln nicht aufgeben."
 
 naw_norway.171.t:0 "[From.GetName] akzeptiert die Abtretung der Shetlandinseln"
 naw_norway.171.d:0 "Die Briten haben unseren Deal für akzeptabel befunden, und die Shetlandinseln werden in Kürze übertragen. Über die Seegrenzen wird zu einem späteren Zeitpunkt verhandelt."
 naw_norway.171.a:0 "Vielen Dank."
 
 naw_norway.172.t:0 "[From.GetName] lehnt die Abtretung der Shetlandinseln ab"
 naw_norway.172.d:0 "Für die Briten ist unser Abkommen in gewisser Weise inakzeptabel, und die Shetlandinseln werden vorerst in ihrem Besitz bleiben."
 naw_norway.172.a:0 "Eine enttäuschende Truppe."
 
 naw_norway.173.t:0 "[From.GetName] möchte eine Entschädigung für ihre Hilfe"
 naw_norway.173.d:0 "Die Norweger haben sich mit uns verbündet und nun erklärt, dass sie für ihre Hilfe bei der Verteidigung unserer Heimat und unseres Imperiums eine Entschädigung fordern. Sie meinen insbesondere die Orkney- und Shetlandinseln. Sollen wir zustimmen, eine geringere Entschädigung für sie aushandeln oder sie einfach ablehnen?"
 naw_norway.173.a:0 "Unsere Freunde können ihre alten Inseln zurückbekommen!"
 naw_norway.173.b:0 "Wenn wir nur über die Übergabe der Shetlandinseln verhandeln, werden sie letztendlich akzeptieren müssen."
 naw_norway.173.c:0 "Lehnen Sie die Abtretung unserer Inseln ab."
 
 naw_norway.174.t:0 "[From.GetName] akzeptiert die Abtretung von Shetland und Orkney"
 naw_norway.174.d:0 "Die Briten fanden unseren Deal fair genug und haben mit der Übertragung unserer alten Inseln begonnen. Über die Seegrenzen wird kurz darauf verhandelt."
 naw_norway.174.a:0 "Vielen Dank."
 
 naw_norway.175.t:0 "[From.GetName] akzeptiert die Abtretung der Shetlandinseln, aber nicht der Orkneyinseln"
 naw_norway.175.d:0 "Die Briten fanden unseren Deal fast akzeptabel, wollten aber die Orkney-Inseln behalten. Unsere ausländischen Würdenträger akzeptierten den Deal, da sie befürchteten, mit leeren Händen abzureisen. Über die Seegrenzen wird kurz darauf verhandelt."
 naw_norway.175.a:0 "Danke schön."
 
 naw_norway.176.t:0 "[From.GetName] lehnt die Abtretung einer der Inseln ab"
 naw_norway.176.d:0 "Für die Briten ist unser Deal inakzeptabel, sie wollen alle ihre Inseln behalten. Unsere ausländischen Würdenträger sind mit leeren Händen gegangen."
 naw_norway.176.a:0 "Danke fürs Zuhören ..."
 
 naw_norway.180.t:0 "Eine gemeinsame antibolschewistische Fraktion?"
 naw_norway.180.d:0 "Angesichts der zunehmenden Bedrohung der alten Ordnung und Traditionen hat [From.GetNameDef] uns in seine neue Fraktion monarchistischer und traditionalistischer Länder eingeladen. Diese Allianz soll angeblich politischen Extremismus und militärische Aggression extremistischer Länder, insbesondere des Bolschewismus, bekämpfen.\n\n Sollen wir dieser Fraktion beitreten? Alle unterworfenen Länder würden sich uns anschließen, doch alle anderen Mitglieder unserer Fraktion könnten frei entscheiden, ob sie sich uns anschließen oder, falls nicht, allein bleiben."
 naw_norway.180.a:0 "Ja, lasst diese Große Allianz Wirklichkeit werden!"
 naw_norway.180.b:0 "Wie kann uns der dünn besiedelte Norden möglicherweise helfen?"
 
 naw_norway.181.t:0 "[From.GetName] tritt der traditionalistischen Allianz bei"
 naw_norway.181.d:0 "Wir heißen unsere neuen Freunde aus [From.GetName] in unserer Allianz willkommen. Dies ist ein großer Tag für unsere Werte."
 naw_norway.181.a:0 "Wir werden noch stärker!"
 
 naw_norway.182.t:0 "[From.GetName] wird der traditionalistischen Allianz nicht beitreten"
 naw_norway.182.d:0 "[From.GetName] hatte irgendwie das Gefühl, dass es in ihrem besten Interesse sei, ihren eigenen Kurs ohne uns fortzusetzen."
 naw_norway.182.a:0 "Ich schätze, sie hatten keine Lust dazu."
 
 naw_norway.200.t:0 "[From.GetName] erklärt bewaffnete Neutralität"
 naw_norway.200.d:0 "[From.GetName] hat entschieden, dass es das Beste ist, wenn das Land wie im Ersten Weltkrieg erneut Neutralität anstrebt. Die norwegische Regierung hofft, dadurch erneut schädliche Konflikte vor der Haustür des norwegischen Volkes zu vermeiden. Die Frage bleibt: Kann [From.GetName] darauf vertrauen, dass die Welt diese Neutralität respektiert?"
 naw_norway.200.a:0 "Bisher scheint ihnen keine unmittelbare Gefahr zu drohen"
 naw_norway.200.b:0 "Wird dies [From.GetName] vor der regionalen Aggression retten?"
 naw_norway.200.c:0 "Na ja, ein Versuch wurde unternommen ..."
 naw_norway.200.p:0 "Hey, wenn es beim letzten Mal funktioniert hat ..."
 
 naw_norway.201.t:0 "[GER.GetName] hat die [NOR.GetAdjective] Neutralität verletzt!"
 naw_norway.201.d:0 "[GER.GetName] hat beschlossen, dass es in seinem besten Interesse ist, [NOR.GetNameDef] im kommenden Konflikt nicht als neutralen Nachbarn zu haben. Könnte ihr Misstrauen daher rühren, dass Großbritannien Norwegen in der zweiten Hälfte des Ersten Weltkriegs zu subtiler Unterstützung zwang? Was auch immer der Grund sein mag, Norwegen sieht sich nun von der Industriemacht im Süden bedroht …"
 naw_norway.201.a:0 "Glücklicherweise scheinen wir gut vorbereitet zu sein."
 naw_norway.201.b:0 "Zumindest scheinen unsere Streitkräfte dieser Aufgabe einigermaßen gewachsen zu sein."
 naw_norway.201.c:0 "Leider scheinen wir nicht ganz vorbereitet zu sein."
 naw_norway.201.p:0 "Wenn es hart auf hart kommt, würden die Norweger auf der Seite unserer Feinde stehen ..."
 naw_norway.201.e:0 "Es scheint, als hätte [GER.GetNameDef] den Norwegern nicht zugetraut, neutral zu bleiben ..."
 
 naw_norway.202.t:0 "[ENG.GetName] hat die [NOR.GetAdjective] Neutralität verletzt!"
 naw_norway.202.d:0 "[ENG.GetName] hat entschieden, dass es in seinem besten Interesse ist, [NOR.GetNameDef] im kommenden Konflikt nicht als neutralen Nachbarn zu haben. Könnten die Aktionen von [ENG.GetName] bedeuten, dass sie die deutschen Eisenlieferungen aus Nordschweden abschneiden wollen? Was auch immer der Grund sein mag, Norwegen sieht sich nun von seinem Nachbarn auf der anderen Seite der Nordsee bedroht ..."
 naw_norway.202.a:0 "Glücklicherweise scheinen wir gut vorbereitet zu sein."
 naw_norway.202.b:0 "Zumindest scheinen unsere Streitkräfte dieser Aufgabe einigermaßen gewachsen zu sein."
 naw_norway.202.c:0 "Leider scheinen wir nicht ganz vorbereitet zu sein."
 naw_norway.202.p:0 "Wir können nicht riskieren, dass sie mit unseren Feinden Handel treiben oder sie beliefern. Sie müssen gestoppt werden ..."
 naw_norway.202.e:0 "Es scheint, als hätte [ENG.GetNameDef] den Norwegern nicht zugetraut, neutral zu bleiben ..."
 
 naw_norway.203.t:0 "Die Angreifer haben die Neutralität verletzt!"
 naw_norway.203.d:0 "Es scheint, als hätten die Feinde von [NOR.GetNameDef] beschlossen, dass es in ihrem besten Interesse ist, [NOR.GetNameDef] als neutrales Land in Nordwesteuropa zu vermeiden. Für Außenstehende kam dies überraschend, und sie konnten nur spekulieren, warum dies geschah. War ihnen der Handel von [NOR.GetNameDef] mit bestimmten Nationen nicht gefiel? Oder trauten sie ihnen nicht zu, neutral zu bleiben?"
 naw_norway.203.a:0 "Glücklicherweise scheinen wir gut vorbereitet zu sein."
 naw_norway.203.b:0 "Zumindest scheinen unsere Streitkräfte dieser Aufgabe einigermaßen gewachsen zu sein."
 naw_norway.203.c:0 "Leider scheinen wir nicht ganz vorbereitet zu sein."
 naw_norway.203.p:0 "Zuschauer mögen verwirrt sein, aber im Moment müssen wir nur unseren Masterplan verstehen!"
 naw_norway.203.e:0 "Was kann das nur sein, dass jemand plötzlich zu solch drastischen Maßnahmen greift?"
 
 naw_norway.204.t:0 "[From.GetName] Petitionen zum Beitritt zu unserer Fraktion"
 naw_norway.204.d:0 "Nachdem ausländische Aggressoren die Neutralität von [From.GetNameDef] gebrochen haben, wenden sie sich nun an uns in der Hoffnung, dass wir sie in unser Bündnis aufnehmen und uns gegen diejenigen zur Wehr setzen, die ihre Neutralität brechen. Sollen wir ihrem Antrag auf Beitritt zu uns stattgeben?"
 naw_norway.204.a:0 "Ja. [From.GetName] kann sich darauf verlassen, dass wir ihnen den Rücken freihalten."
 naw_norway.204.b:0 "Nein. [From.GetName] ist nichts weiter als eine Belastung …"
 
 naw_norway.205.t:0 "[From.GetName] hat akzeptiert, dass wir ihrer Fraktion beitreten"
 naw_norway.205.d:0 "Unsere Freunde in [From.GetNameDef] haben uns in unserer Not in ihr Bündnis aufgenommen. Unsere Angreifer sollen wissen, dass wir gegen ihre dreiste Aggression die Unterstützung anderer haben!"
 naw_norway.205.a:0 "Wahre Freunde antworten tatsächlich, wenn sie gerufen werden."
 
 naw_norway.206.t:0 "[From.GetName] hat uns den Beitritt zu ihrer Fraktion verweigert"
 naw_norway.206.d:0 "[From.GetName] hatte irgendwie das Gefühl, dass es zu viel Aufwand wäre, uns in unserer Notlage aus der Patsche zu helfen ..."
 naw_norway.206.a:0 "Ich schätze, da haben wir Pech gehabt ... Sollten wir woanders Hilfe suchen?"
 
 naw_news.100.t:0 "Der Fall von Kopenhagen"
 naw_news.100.d:0 "Den norwegischen Streitkräften, die durch Seeland vorrücken, ist es gelungen, Kopenhagen einzunehmen. \n\nDie nun sporadischen Kämpfe nehmen weiter ab, und glücklicherweise konnten der erbitterte Widerstand und der Artilleriebeschuss auf Handfeuerwaffengefechte reduziert werden, bevor die norwegischen Streitkräfte Fredriksstaden mit Schloss Amalienborg erreichten und die Rokoko-Architektur weitgehend unbeschädigt ließen.\n\nEinige Dänen, die den Widerstand fortsetzen wollten, wurden in den Stunden vor und während der Invasion evakuiert, doch die Stadt liegt weitgehend still da, während die Norweger ihre Macht über Stadt und Bevölkerung festigen.\n\nDer dänische Kampf gegen [NOR.GetNameDef] mag anderswo weitergehen, doch der Verlust ihrer Hauptstadt ist ein sicherer Schlag für die dänischen Regierungs- und Militärkapazitäten."
 naw_news.100.a:0 "Dänemark konnte [NOR.GetNameDef] nicht standhalten."
 naw_news.100.b:0 "Ein glorreicher Sieg für die Sons of Norway!"
 naw_news.100.c:0 "Als ob die Invasion der Schweden in Kopenhagen nicht schon schlimm genug wäre."
 
 naw_news.101.t:0 "Der Fall Stockholms"
 naw_news.101.d:0 "Während anderswo in [SWE.GetNameDef] die Kämpfe toben, gibt es Berichte über den Einmarsch norwegischer Truppen in die schwedische Hauptstadt.\n\nSowohl die schwedische Zivilbevölkerung als auch die norwegischen Streitkräfte scheinen in einer unheimlichen Stimmung zu sein, da dieser unerwartete Höhepunkt des Konflikts zwischen den beiden Ländern offen zutage tritt. Die norwegischen Truppen hielten eine kurze Siegesparade ab, nachdem die meisten schwedischen Institutionen in Stockholm von den Norwegern gesichert worden waren. Da die Kämpfe schnell auf Handfeuerwaffenbeschuss abflachten, ist die Stadt noch in überraschend gutem Zustand, obwohl der alte Stockholmer Telefonturm nach Mörserbeschuss teilweise einstürzte.\n\nDie schwedische Entschlossenheit dürfte angesichts dieser Nachrichten deutlich nachlassen."
 naw_news.101.a:0 "[NOR.GetNameDefCap] schlägt für seine Gewichtsklasse offenbar hart zu."
 naw_news.101.b:0 "Nun hat sich das Kräfteverhältnis endgültig wieder nach Westskandinavien verschoben."
 naw_news.101.c:0 "Das ist schlichtweg unglaublich!"
 
 naw_news.102.t:0 "Der Fall von Helsinki"
 naw_news.102.d:0 "Reports from Southern Finland now confirm that the Finnish capital has been captured by advancing Norwegian troops.\n\nSmall arms fire can still be heard from some boroughs and the outskirts, but no significant Finnish forces have been sighted within the city.\n\nStill, a detachment of Norwegian snipers has taken up positions near the University of Helsinki, limiting the possibilities of Finnish counterattacks in the area anyways. The Finnish Government and other high ranking officials seem to have evacuated before the fighting hit Helsinki as well.\n\nNow the Finns have also seen Norwegians added to the list of foreign rulers of Helsinki, among the Swedes and Russians.
 naw_news.102.a:0 "[NOR.GetNameDefCap] können ihre Macht anscheinend ziemlich weit von ihrem Heimatland entfernt projizieren ..."
 naw_news.102.b:0 "Die Finnen müssen sich jetzt fügen."
 naw_news.102.c:0 "Was wollen die Norweger hier überhaupt?"
 
 ####--Leader Descriptions--####
 POLITICS_JOHAN_NYGAARDSVOLD_DESC:0 "Johan Nygaardsvold wurde als Bauernsohn in Hommelvik, der heutigen Gemeinde Malvik, geboren und hatte mit 12 Jahren seine erste Anstellung in einem Sägewerk. Als junger Erwachsener wanderte er 1902 nach Kanada und später in die USA aus. Dort arbeitete er in British Columbia, Montana und Washington. Als er nur fünf Jahre später nach Norwegen zurückkehrte, engagierte er sich in der Politik und wurde 1910 für die Arbeiterpartei in den Bildungsausschuss gewählt, die er bis heute vertritt. Inzwischen hat er die norwegische Politik bereits geprägt, da er einer der Urheber des sogenannten „Krisenabkommens“ mit der Bauernpartei war, das es ihm 1935 ermöglichte, wie von ihm gewünscht, eine Regierung zu bilden. Seine Regierung setzte sich stark dafür ein, die Auswirkungen der Depression durch eine fortschrittliche Sozialpolitik zu lindern, weniger jedoch für Militärausgaben und eine umsichtige Außenpolitik."
 POLITICS_NILS_TRAEDAL_DESC:0 "Nils Trædal wurde als Sohn eines Bauern in Sunndal geboren und hat im Laufe seines Lebens viel Verantwortung und politische Erfahrung gesammelt. Zu seinen Ämtern und Führungspositionen im Erwachsenenleben zählen die eines Priesters, eines Politikers, eines ehemaligen Bürgermeisters, eines ehemaligen Kirchen- und Bildungsministers sowohl in der Regierung von Peder L. Kolstad als auch in der Regierung von Jens Hundeid (1931–1932 bzw. 1932–1933), eines amtierenden Premierministers/Außenministers (Anfang 1932), eines Regierungsvertreters der Provinz Møre og Romsdal und eines ehemaligen Mitglieds der Liberalen Partei.\n\nEr war außerdem Mitbegründer der Vorgängerpartei der Bauernpartei und ist nun Parteivorsitzender der heutigen Bauernpartei. Als Verfechter der Agrarreform und vielseitig begabter Mann kann Norwegen nun von seinen vielfältigen Erfahrungen profitieren."
 POLITICS_IVAR_LYKKE_DESC:0 "Ivar Lykke wurde im damaligen Trondhjem als Sohn eines Lebensmittelhändlers und Geschäftsmannes geboren. Nachdem er im väterlichen Geschäft gearbeitet hatte, kam er erstmals in die Politik, als er die Handelsbranche in der Kommunalpolitik vertrat. 1916 wurde er ins norwegische Parlament gewählt und galt als gemäßigter und besonnener Politiker, der die Interessen der praxisorientierten Wirtschaft vertrat. Seine Akzeptanz sozialliberaler Reformen sowie sein angenehmes und bescheidenes Auftreten brachten ihm im Laufe der Jahre großes Vertrauen ein. Seine erste Chance, Ministerpräsident zu werden, lehnte er ab, doch 1926 wurde die gleichnamige Regierung gebildet, diesmal mit ihm als norwegischem Ministerpräsidenten. Danach setzte er seine politische Arbeit fort, beispielsweise im Namensstreit um seine Heimatstadt Trondhjem. Es ging um die Frage, ob sie weiterhin Trondhjem heißen oder wieder das altnorwegische Nidaros heißen sollte. Im März 1931 endete der Streit mit Lykkes Kompromissvorschlag: Trondheim."
 POLITICS_JOHAN_LUDWIG_MOWINCKEL_DESC:0 "Johan Ludwig Mowinckel wurde 1870 in Bergen als Sohn einer der ältesten Kaufmannsfamilien Norwegens geboren. Er studierte Sprachen und Betriebswirtschaft im Ausland, unter anderem in Deutschland, England und Frankreich. 1898 kaufte er sein erstes Boot und leitete eine Reederei in seinem eigenen Namen. Kurz darauf wurde er in den Stadtrat von Bergen gewählt und war Bürgermeister während der Auflösung der Union zwischen Norwegen und Schweden. 1907 zog er zum ersten Mal ins norwegische Parlament ein.\n\nSeitdem war Johan L. Mowinckel später Teil mehrerer Regierungen, diente dreimal als Premierminister und bekleidete oft andere wichtige Positionen wie Präsident des Storting (des norwegischen Parlaments), Industrieminister, Handelsminister und Außenminister, um nur einige zu nennen. Er ist wahrlich eine wichtige Persönlichkeit in der norwegischen Politik."
 POLITICS_HAAKON_VII_DESC:0 "König Haakon VII. wurde 1872 als Christian Frederik Carl Georg Valdemar Axel, Prinz von Dänemark und Island, geboren. In jungen Jahren diente er in der dänischen Marine, ab 1893 im Rang eines Leutnants. 1896 heiratete er im Buckingham Palace die britische Prinzessin Maud (nach der die norwegischen Antarktisgebiete benannt sind). Seitdem reisten Carl (so verwendete er meist) und Maud zwischen Dänemark und Großbritannien hin und her.\n\nDer Lebensstil des Paares änderte sich drastisch, als norwegische Politiker Prinz Carl mit dem Angebot kontaktierten, König des unabhängigen Norwegens zu werden, als die Union zwischen Norwegen und Schweden aufgelöst wurde. Am 18. November 1905 verkündete Prinz Carl in einem Telegramm, dass er den Namen Haakon VII. annehmen und sein Sohn und Erbe (Alexander) den Namen Olav erhalten würde. Am 25. November traf er in Norwegen ein und legte am 27. den Eid als Norwegens erster unabhängiger König seit 518 Jahren ab.\n\nDurch einige beispiellose weitere Veränderungen hin zur Tradition ist der demokratisch gesinnte Haakon nun ein absoluterer und traditionellerer König als je zuvor. Welcher Verrückte könnte hinter dieser Entwicklung stecken?"
 POLITICS_VIDKUN_QUISLING_DESC:0 "Der junge Vidkun Quisling stammte aus Fyresdal und war ein begabter Student der Geisteswissenschaften, Geschichte und Naturwissenschaften. 1905 schrieb er sich an der Norwegischen Militärakademie ein und schnitt bei der Aufnahmeprüfung von 250 Bewerbern des Jahrgangs am besten ab. Seine Studienleistungen waren so erfolgreich, dass er eine Audienz beim König erhielt und später als Offizier diente. Während des Ersten Weltkriegs verabscheute er die Friedensstimmung, änderte jedoch seine Ansichten, als er die enormen menschlichen Kosten des Krieges bemerkte.\n\nSeitdem diente er als Attaché, als Experte des Militärs für Russland-Angelegenheiten, half Fridtjof Nansen bei der Organisation humanitärer Hilfsmaßnahmen nach dem Ersten Weltkrieg, heiratete zweimal, flirtete mit der norwegischen kommunistischen Bewegung (zweifellos inspiriert von den wirkungsvollen Volksmilizen der Sowjetunion), diente als Verteidigungsminister in Peder Kolstads Agrarregierung (obwohl er weder ein Agrarier noch Kolstads Freund war, waren seine Erfahrung und sein Wissen unbestreitbar) und schließlich half er bei der Gründung der politischen Partei „Nasjonal Samling“ aus der ehemaligen politischen Bewegung „Nordisk folkereisning i Norge“. Jetzt vertritt er endlich eine Partei, die seinen eigenen politischen Ansichten folgt, einer ausgeprägten Mischung aus Nationalismus und Sozialismus."
 POLITICS_ADAM_EGEDE_NISSEN_DESC:0 "Adam Hjalmar Egede-Nissen wurde auf einem Bauernhof in der Gemeinde Frol geboren. In jungen Jahren studierte er Philosophie und arbeitete gleichzeitig bei der Post. 1897 wurde er schließlich Leiter des örtlichen Postverteilzentrums von Vardø nahe der russischen Grenze. 1900 zog er als Abgeordneter der Liberalen Partei Venstre erstmals ins norwegische Parlament ein. 1905 wechselte er zur Arbeiterpartei, wo er 1912 auf eine weitere Amtszeit verzichtete, um weiterhin für die norwegische Post zu arbeiten. Neben seiner Berufs- und politischen Erfahrung war Egede-Nissen auch mit radikaleren Ansätzen vertraut. Er schmuggelte und druckte illegal revolutionäre Literatur und gründete 1906 eine radikale Bergarbeitergewerkschaft. Seine Zeit in Vardø gab ihm Einblick in die wachsende revolutionäre Stimmung in Russland, die er seither maßgeblich unterstützt. Von 1915 bis 1919 war er Bürgermeister von Stavanger. In dieser Zeit wurde er wegen seiner Beteiligung am Generalstreik zur Unterstützung der Russischen Revolution 1919 mit einer Geldstrafe belegt. 1918 reiste er nach Russland, traf Lenin und nahm an einer Versammlung zur Gründung der heute bekannten Komintern teil. Nach der Spaltung der Arbeiterpartei 1923 schloss sich Egede-Nissen den radikaleren Politikern an und trat der Kommunistischen Partei Norwegens (NKP) bei."
 
 ####--Bookmarks--####
 NORWAY_GATHERING_STORM_DESC:0 "Die frühen 1900er Jahre galten für Norwegen als goldenes Zeitalter. Mit Unabhängigkeit, Wirtschaftswachstum, Polarforschung und der Ausdehnung seiner Territorien an beiden Enden der Erde hinterließ das Königreich Norwegen weltweite Spuren. Doch nicht immer lief es reibungslos: Norwegens neutrale Handelsmarine erlitt im Ersten Weltkrieg Verluste, und in jüngster Zeit bremste die Weltwirtschaftskrise die Wirtschaft etwas. \n\nWährend die Sozialpolitik der Labour-geführten Regierung die Probleme zu lindern versuchte, hat diese Politik der „kaputten Waffe“ mit geringeren Verteidigungsausgaben Norwegen einem gewissen Risiko ausgesetzt..."
 NORWAY_BLITZKRIEG_DESC:0 "Die frühen 1900er Jahre galten für Norwegen als goldenes Zeitalter. Mit Unabhängigkeit, Wirtschaftswachstum, Polarforschung und der Ausdehnung seiner Gebiete an beiden Enden der Erde hinterließ das Königreich Norwegen weltweite Spuren. Doch nicht immer lief es reibungslos: Norwegens neutrale Handelsmarine erlitt im Ersten Weltkrieg Verluste, und in jüngster Zeit bremste die Weltwirtschaftskrise die Wirtschaft etwas. \n\nWährend die Sozialpolitik der Labour-Regierung die Probleme zu lindern versuchte, hat diese Politik der „kaputten Waffe“ mit geringeren Verteidigungsausgaben Norwegen einem gewissen Risiko ausgesetzt..."
 
