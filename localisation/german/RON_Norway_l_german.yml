 NOR_mountain_men:0 "Norwegische Bergtaktiken"
 NOR_mountain_men_desc:0 "Norwegische Taktiken in großen Höhen und bei kaltem Wetter umfassen Blitzangriffe durch Skiinfanterie und die Nutzung des unwegsamen Geländes als Deckung oder für bessere Sicht, wenn nötig.\n\nUnsere Einheiten können sich jetzt in bergigem Gelände schneller bewegen und härter zuschlagen!"
 NOR_concealed_skirmishers:0 "Verdeckte Plänkler"
 NOR_concealed_skirmishers_desc:0 "Wenn der Feind vorrückt, können unsere Plänkler ihn aus versteckten Stellungen mit präzisem Gewehr- und Maschinengewehrfeuer unter Beschuss nehmen und ihn so zum Stehen bringen. Während er sich auf den Gegenangriff vorbereitet, können sich unsere Plänkler wieder zurückziehen."
 
