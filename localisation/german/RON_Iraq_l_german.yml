 ###Event 
 
 irq.1.t:0 "Deutsche Militärmission"
   irq.1.d:0 "Der Aufstieg des Faschismus im Irak öffnet dem sowjetischen Terror neue Türen. Es liegt in unserem Interesse, das Land auf die Invasion sowjetischer Gebiete vorzubereiten."
   irq.1.a:0 "Lassen Sie uns ein gemeinsames militärisches Forschungsprogramm einrichten."
   irq.1.b:0 "Das ist eine Verschwendung unserer Ressourcen!"
   irq.2.t:0 "Deutsche Militärmission; Akzeptiert"
   irq.2.d:0 "Die Deutschen möchten uns dabei helfen, militärisch in der Welt voranzukommen und die diplomatischen Beziehungen zu verbessern."
   irq.2.a:0 "Für das Vaterland!"
   irq.3.t:0 "Deutsche Militärmission; Abgelehnt"
   irq.3.d:0 "Die Deutschen haben unser Angebot für gemeinsame militärische Forschung abgelehnt."
   irq.3.a:0 "Wir sind allein auf dieser Welt."
   irq.4.t:0 "Die Kurdistan-Krise"
   irq.4.d:0 "In den Staaten Kurdistan und Chuzestan ist es zu einem massiven Aufstand gekommen. Wir müssen unser Land zurückerobern!"
   irq.4.a:0 "Mobilisiert die Armee!"
   irq.5.t:0 "Kurdistan schließt sich uns an"
   irq.5.d:0 "Die Kurden haben unsere Vereinbarung eingehalten und sich dem Neuassyrischen Reich angeschlossen."
   irq.5.a:0 "Begrüßen Sie die Rückkehr unserer Brüder!"
   irq.6.t:0 "Irak fordert Levante"
   irq.6.d:0 "Das „Neuassyrische Reich“ beansprucht unsere Zwangskolonien entlang der Levante. Was sollen wir tun?"
   irq.6.a:0 "Unsere Pläne zur Entkolonialisierung würden bald umgesetzt werden ..."
   irq.6.b:0 "Wir werden uns um die Faschisten kümmern!"
   irq.7.t:0 "Großbritannien lehnt unsere Forderungen ab"
   irq.7.d:0 "Die Briten haben unsere Forderungen abgelehnt."
   irq.7.a:0 "Wir nehmen uns, was uns gehört!"
   irq.8.t:0 "Großbritannien hat unseren Forderungen nachgegeben"
   irq.8.d:0 "Die Briten haben uns gegeben, was wir wollen."
   irq.8.a:0 "Für das Imperium!"
   irq.9.t:0 "Aufstand in Ägypten"
   irq.9.d:0 "Ein massiver Aufstand hat alle Kolonialgarnisonen in der Region vertrieben. Die Rebellen wollen sich dem Neuassyrischen Reich anschließen. Was sollen wir tun?"
   irq.9.a:0 "Geben Sie den Rebellen, was sie wollen."
   irq.9.b:0 "Wir müssen den Aufstand niederschlagen!"
   irq.10.t:0 "Die Briten kommen, um den Aufstand niederzuschlagen"
   irq.10.d:0 "Die Briten haben beschlossen, ihre Kolonie zurückzuerobern."
   irq.10.a:0 "Wir werden Ägypten bis zum letzten Mann verteidigen!"
   irq.11.t:0 "Die Briten überlassen uns Ägypten"
   irq.11.d:0 "Die Briten haben uns das ägyptische Volk überlassen ..."
   irq.11.a:0 "Ein weiterer Schritt zur Wiederherstellung."
   irq.12.t:0 "Der Irak fordert Kuwait und Abu Dhabi"
   irq.12.d:0 "Der Irak fordert die Kolonien Kuwait und Abu Dhabi. Was sollen wir tun?"
   irq.12.a:0 "Übergebt die Kolonien."
   irq.12.b:0 "Verteidige unsere Kolonien"
   irq.15.t:0 "Die Briten haben unsere Ansprüche zurückgewiesen"
   irq.15.d:0 "Die Briten müssen an ihren Kolonien festhalten."
   irq.15.a:0 "Die Golfkolonien gehören den Arabern!"
   irq.14.t:0 "Der Irak besetzt Kuwait und Abu Dhabi"
   irq.14.d:0 "Wir haben die Kolonien besetzt"
   irq.14.a:0 "Der erste Schritt zur Vertreibung der Kolonialmächte aus dem Nahen Osten."
   irq.17.t:0 "Der Irak fordert Syrien und den Libanon"
   irq.17.d:0 "Der Irak fordert die Kolonien Syrien und Libanon. Was sollen wir tun?"
   irq.17.a:0 "Übergebt die Kolonien."
   irq.17.b:0 "Verteidige unsere Kolonien"
   irq.19.t:0 "Frankreich akzeptiert unsere Forderung"
   irq.19.d:0 "Die Franzosen sind endgültig aus dem Nahen Osten vertrieben. Wir werden dafür sorgen, dass sich ihr Einflussbereich hier wieder ausweitet."
   irq.19.a:0 "Lasst uns unsere lange verlorenen Brüder willkommen heißen!"
   irq.18.t:0 "Frankreich bereitet seine Verteidigung vor"
   irq.18.d:0 "Die Franzosen haben unser Ultimatum abgelehnt. Sie bereiten sich auf den Krieg vor ..."
   irq.18.a:0 "Und sie werden Krieg bekommen!"
   irq.20.t:0 "Der Irak fordert Zypern"
   irq.20.d:0 "Der Irak fordert die Kolonie Zypern. Was sollen wir tun?"
   irq.20.a:0 "Übergeben Sie die Kolonie."
   irq.20.b:0 "Verteidige unsere Kolonie."
   irq.22.t:0 "Der Irak annektiert Zypern"
   irq.22.d:0 "Die Insel Zypern wurde aus der Gewalt der Briten befreit."
   irq.22.a:0 "Wir sind endlich frei!"
   irq.21.t:0 "Die Briten halten an Zypern fest"
   irq.21.d:0 "Die Briten haben sich geweigert, Zypern aufzugeben."
   irq.21.a:0 "Sie werden es bereuen ..."
