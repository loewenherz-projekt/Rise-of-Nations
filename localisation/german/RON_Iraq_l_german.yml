l_german:
    
 ###Tooltips   
    
 IRQ_adds_new_units_tt:0 "Grants-Einheiten im Staat Bagdad"
 
 ### Focuses
 
  IRQ_arab_industrial_revolution:0 "Arabische Industrielle Revolution"
  IRQ_arab_industrial_revolution_desc:0 "Bevor wir unser Land industrialisieren konnten, kamen die Briten und errichteten eine Mandatsregierung, die unsere Regierungsgewalt einschränkte. Die Zeiten haben sich geändert, und jetzt ist es an der Zeit, unsere eigenen, massiven Industriezweige aufzubauen."
  IRQ_modernisation_of_rural_villages:0 "Modernisierung ländlicher Dörfer"
  IRQ_modernisation_of_rural_villages_desc:0 "Al-Hajara ist eine karge Wüstenprovinz mit vielen kleinen ländlichen Dörfern. Durch die Modernisierung der Dörfer können wir uns mit dem ländlichen Raum verbinden und unsere industrielle Revolution fortsetzen."
  IRQ_iraqi_republic_railways:0 "Eisenbahnen der Irakischen Republik"
  IRQ_iraqi_republic_railways_desc:0 "Die Osmanen hinterließen uns ein kleines Eisenbahnnetz, das die Irakische Republikbahn ausbaute. Wenn wir das Unternehmen subventionieren, können wir den Ausbau dieser Eisenbahn fortsetzen."
  IRQ_total_eletrification:0 "Vollständige Elektrifizierung"
  IRQ_total_eletrification_desc:0 "Seit 1917 sind nur noch Regierungsgebäude mit Strom versorgt. Die vollständige Elektrifizierung ist der nächste Schritt zur vollständigen Industrialisierung."
  IRQ_rapid_industrialization:0 "Rasche Industrialisierung"
  IRQ_rapid_industrialization_desc:0 "Angesichts der zunehmenden Spannungen weltweit bauen immer mehr Länder ihre Industriekapazitäten aus. Unsere Feinde werden uns vernichten, wenn wir unsere Industrialisierung nicht beschleunigen."
  IRQ_finish_the_railyways:0 "Beende die Eisenbahn"
  IRQ_finish_the_railyways_desc:0 "IRR hat das Schienennetz fast fertiggestellt. Für den letzten Schliff werden noch etwas mehr Mittel benötigt."
  IRQ_rebuild_baghdad:0 "Bagdad wieder aufbauen"
  IRQ_rebuild_baghdad_desc:0 "Die Großstadt Bagdad war einst ein Zentrum der Kunst, Kultur und Wissenschaft. Sie war zudem die bevölkerungsreichste Stadt im Nahen Osten. Wir müssen ihr zu ihrem früheren Glanz verhelfen."
  IRQ_ghazis_propaganda_station:0 "Ghazi I&#39;s Propagandastation"
  IRQ_ghazis_propaganda_station_desc:0 "Der ununterstützte Monarch Ghazi der Erste hatte seinen eigenen Radiosender, über den er seine radikalen Weltanschauungen verbreitete. So hatte er sich beispielsweise für die Vereinigung des Irak und Kuwaits eingesetzt."
  IRQ_royal_armament_factories:0 "Königliche Rüstungsfabriken"
  IRQ_royal_armament_factories_desc:0 "Wir sollten „königliche“ Militärfabriken in Auftrag geben, um mit der Nachfrage nach militärischer Versorgung Schritt zu halten."
  IRQ_expanded_oil_drilling:0 "Ölbohrungen ausweiten"
  IRQ_expanded_oil_drilling_desc:0 "Wir haben kleine Ölförderanlagen eröffnet, aber in letzter Zeit wurden große Mengen Öl in der Nähe von Kirkuk gefunden. Dieses Öl können wir als Treibstoff für unsere eigenen Panzerdivisionen verwenden."
  IRQ_mosul_military_stockpile:0 "Militärvorräte in Mossul"
  IRQ_mosul_military_stockpile_desc:0 "Wir sollten in der Stadt Mossul ein militärisches Waffenlager anlegen. So verfügen wir auch bei einer Einnahme unserer Hauptstadt noch über eine große Menge an Ausrüstung, um unsere Armee zu versorgen."
  IRQ_labor_camps:0 "Arbeitslager"
  IRQ_labor_camps_desc:0 "Einige unserer Militärführer empfehlen, dass wir Arbeitslager für unsere Kriegsgefangenen einrichten, damit sie all das abarbeiten können, was sie unserem Land angetan haben."
  IRQ_steel_mining:0 "Stahlproduktion"
  IRQ_steel_mining_desc:0 "Stahl ist ein Rohstoff, der in fast unserer gesamten Militärausrüstung verwendet wird. Wir sollten mit der Stahlproduktion in unseren eigenen Ländern beginnen, für den Fall, dass unsere Häfen jemals blockiert werden."
  IRQ_establish_the_univeristy_of_baghdad:0 "Gründung der Universität von Bagdad"
  IRQ_establish_the_univeristy_of_baghdad_desc:0 "Wir brauchen einen Ort, an dem die klügsten Köpfe des Landes zusammenkommen. Die Universität von Bagdad ist genau der richtige Ort dafür."
  IRQ_create_the_iraqi_block_cipher:0 "Erstellen Sie die irakische Blockchiffre"
  IRQ_create_the_iraqi_block_cipher_desc:0 "Da viele Länder bereits einen Weg gefunden haben, die Chiffrecodes der anderen zu knacken, sollten wir unseren eigenen einzigartigen Chiffrecode erstellen: den Iraqi Block Cipher."
  IRQ_license_cipher_machines:0 "Lizenz-Chiffriermaschinen"
  IRQ_license_cipher_machines_desc:0 "Wenn wir ausländische Chiffriermaschinen lizenzieren, können wir deren Entwicklung reservieren, um unser Verständnis solcher Maschinen zu verbessern. Dieses Wissen können wir dann nutzen, um unsere eigenen Chiffriermaschinen zu verbessern oder zu entwickeln."
  IRQ_design_the_osirak_reactor:0 "Erstellen Sie den Osirak-Reaktor"
  IRQ_design_the_osirak_reactor_desc:0 "Die Franzosen möchten ihre Atomforschung abseits des Krieges beginnen. Sie haben sich an uns gewandt und uns den Bau eines gemeinsamen Forschungsreaktors vorgeschlagen, des Osirak-Reaktors."
  IRQ_expand_the_univeristy:0 "Erweitern Sie die Forschungsstipendien der Universität"
  IRQ_expand_the_univeristy_desc:0 "Wir sollten die Finanzierung von Professoren und Wissenschaftlern ausweiten, die unermüdlich daran arbeiten, uns dabei zu helfen, eine bessere Zukunft zu schaffen."
  IRQ_resolve_the_army_conflict:0 "Lösen Sie den Armeekonflikt"
  IRQ_resolve_the_army_conflict_desc:0 "Die Armee widersetzt sich unserer vom Volk eingesetzten Zivilregierung. Wir müssen diesen Konflikt schnell lösen, bevor ein Bürgerkrieg ausbricht."
  IRQ_anti_colonialism_policy:0 "Antikolonialismuspolitik"
  IRQ_anti_colonialism_policy_desc:0 "Unser Volk hat sich seit langem offen gegen den britischen und französischen Kolonialismus ausgesprochen. Es ist an der Zeit, dass es eine Regierung gibt, die hinter dieser Aussage steht."
  IRQ_demand_persian_gulf_colonies:0 "Nachfrage nach Kolonien am Persischen Golf"
  IRQ_demand_persian_gulf_colonies_desc:0 "Der erste Schritt unserer Antikolonialismuspolitik sollte darin bestehen, ALLE Besatzer aus dem Persischen Golf zu entfernen, da sie vielen Ländern der arabischen Welt den Zugang zum Meer verwehrt haben."
  IRQ_demand_french_colonies:0 "Fordern Sie Libanon und Syrien"
  IRQ_demand_french_colonies_desc:0 "Die Franzosen haben die osmanischen Gebiete Syrien und Libanon erobert. Wer auch immer diese Länder jetzt besitzt, sie müssen sie den rechtmäßigen arabischen Eigentümern zurückgeben!"
  IRQ_demand_cyprus:0 "Nachfrage Zypern"
  IRQ_demand_cyprus_desc:0 "Der letzte Schritt zur Beseitigung der verdammten Imperialisten besteht darin, die kleine Insel Zypern einzunehmen, einen strategisch wichtigen Marinestützpunkt."
  IRQ_remove_dependency_on_british_equipment:0 "Beseitigen Sie die Abhängigkeit von britischer Ausrüstung"
  IRQ_remove_dependency_on_british_equipment_desc:0 "Seit unserer Zeit als britischer Mandatsstaat sind wir auf britische Ausrüstung angewiesen. Wenn wir in dieser Welt vorankommen wollen, müssen wir unsere eigene Ausrüstung herstellen."
  IRQ_motorized_army:0 "Motorisierte Armee"
  IRQ_motorized_army_desc:0 "Motorisierte Divisionen sind heutzutage ein wichtiger Bestandteil jeder Armee. Wir müssen mit der Zeit gehen."
  IRQ_study_new_land_doctrines:0 "Studieren Sie die Lehren des Neuen Landes"
  IRQ_study_new_land_doctrines_desc:0 "Die Zeiten der Kavallerieangriffe mit Unterstützung durch Repetiergewehre sind vorbei. Um siegreich zu sein, müssen wir unsere alten Strategien aktualisieren."
  IRQ_special_forces:0 "Spezialeinheiten"
  IRQ_special_forces_desc:0 "Anders als im Ersten Weltkrieg müssen wir massive amphibische Angriffe und Fallschirmabwürfe planen. Die Armee schlägt vor, dass wir hierfür spezialisierte Divisionen bilden."
  IRQ_army_modernisation:0 "Modernisierung der Armee"
  IRQ_army_modernisation_desc:0 "Dies ist der letzte Schritt bei der Reorganisation der Armee. Die Macht unserer Armee wird es sogar mit der der Götter aufnehmen können."
  IRQ_study_foreign_tanks:0 "Studieren Sie ausländische Panzer"
  IRQ_study_foreign_tanks_desc:0 "Wir hatten nicht viel Zeit, unsere eigenen Panzer zu entwickeln. Wir sollten uns darauf konzentrieren, ausländische Panzer zu konstruieren, ihre Stärken und Schwächen herauszufinden und noch bessere zu bauen …"
  IRQ_create_our_own_heavy_tanks:0 "Erstellen Sie unsere eigenen schweren Panzer"
  IRQ_create_our_own_heavy_tanks_desc:0 "Wir müssen unsere eigenen schweren Panzer bauen, um die tief verwurzelten feindlichen Linien zu durchbrechen."
  IRQ_crusiers_experiments:0 "Kreuzerexperimente"
  IRQ_crusiers_experiments_desc:0 "Die Weltmächte haben neue „Crusier“-Panzer entwickelt, die eine Kombination aus schweren und leichten Panzern darstellen."
  IRQ_optimize_tank_production:0 "Tankproduktion optimieren"
  IRQ_optimize_tank_production_desc:0 "Wenn wir unsere Panzer in Massenproduktion herstellen wollen, müssen wir einen Weg finden, die Produktion billiger zu gestalten."
  IRQ_elte_tank_forces:0 "Elite-Panzerstreitkräfte"
  IRQ_elte_tank_forces_desc:0 "Nach all unseren Panzerforschungen und Experimenten haben wir endlich den Weg zu den besten Panzerdesigns gefunden. Es ist Zeit, unsere Elitetruppen zu erschaffen."
  IRQ_unsupported_monarch:0 "Nicht unterstützter Monarch"
  IRQ_unsupported_monarch_desc:0 "König Ghazi I. ist ein Monarch, der kaum Unterstützung findet. Wir sollten unsere Macht auf verschiedene politische Parteien übertragen."
  IRQ_the_end_of_the_monarchy:0 "Ende der Monarchie"
  IRQ_the_end_of_the_monarchy_desc:0 "Das Zeitalter der Monarchen ist zu Ende. Es ist Zeit, dass er zurücktritt und jemand, der das Volk vertritt, seinen Platz einnimmt."
  IRQ_a_new_kind_of_monarch:0 "Eine neue Art von Monarch"
  IRQ_a_new_kind_of_monarch_desc:0 "Rashid Aali al-Gaylani, unser derzeitiger Justizminister und arabischer Nationalist, wäre ein perfekter Ersatz für den König ... vielleicht sogar ein Kaiser."
  IRQ_rise_of_the_emperor:0 "Aufstieg des Kaisers"
  IRQ_rise_of_the_emperor_desc:0 "Es ist Zeit, dass jemand Kompetenteres den Thron besteigt. Ein Hoch auf Kaiser Al-Gaylani!"
  IRQ_political_purification:0 "Politische Reinigung"
  IRQ_political_purification_desc:0 "Der erste Erlass des Kaisers besteht darin, das Land von politischer Opposition zu säubern."
  IRQ_cult_of_personaility:0 "Personenkult"
  IRQ_cult_of_personaility_desc:0 "Wir müssen das Bild des Kaisers in der Bevölkerung festigen. Er hat eine ganze Reihe von Propagandamitteln in Auftrag gegeben, darunter eine Statue von ihm auf dem Firdos-Platz."
  IRQ_assyrian_revanchism:0 "Assyrischer Revanchismus"
  IRQ_assyrian_revanchism_desc:0 "Anders als Ghazi der Erste ist der Völkermord am assyrischen Volk inakzeptabel. Wir werden ihnen helfen, das zurückzuerobern, was einst ihnen gehörte."
  IRQ_algaylani_youth:0 "Al-Gaylani Jugend"
  IRQ_algaylani_youth_desc:0 "Wir sollten eine eigene Gruppe nach dem Vorbild der Hitlerjugend gründen, die Al-Gaylani-Jugend."
  IRQ_german_military_mission:0 "Deutsche Militärmission"
  IRQ_german_military_mission_desc:0 "Die Deutschen wollen diplomatische Beziehungen zu uns aufnehmen und uns dabei helfen, unser Militär noch weiter zu reformieren."
  IRQ_establish_the_republican_guard:0 "Gründung der Republikanischen Garde"
  IRQ_establish_the_republican_guard_desc:0 "Es gibt immer noch Gegner des Kaisers. Wir wissen nicht, ob sie versuchen könnten, ihn zu ermorden. Um eine solche Katastrophe zu verhindern, sollten wir die Republikanische Garde gründen."
  IRQ_proclaim_the_neo_assyrian_empire:0 "Proklamieren Sie das Neuassyrische Reich"
  IRQ_proclaim_the_neo_assyrian_empire_desc:0 "Es ist Zeit, dass wir uns für das einsetzen, was uns gehört! Die geistige Mobilisierung unseres Landes hat bereits begonnen. Es ist Zeit, dass auch die Armee mobilisiert."
  IRQ_demand_levant:0 "Nachfrage Levante"
  IRQ_demand_levant_desc:0 "Die Mittelmeerküste des Nahen Ostens gehörte einst den Assyrern. Wir werden unsere Vorherrschaft in der Region wiederherstellen."
  IRQ_conquer_saudi:0 "Erobern Sie die Arabische Halbinsel"
  IRQ_conquer_saudi_desc:0 "Das Assyrische Reich besaß Nordarabien. Dieses Mal werden wir es ganz einnehmen, um die Vereinigung der arabischen Welt zu beschleunigen."
  IRQ_kurdistan_crisis:0 "Die Kurdistan-Krise"
  IRQ_kurdistan_crisis_desc:0 "Wir haben die iranischen Kurden heimlich finanziell unterstützt, indem wir ihnen Autonomie und Wehrdienstverweigerungsrecht gewährten. Jetzt sind die Iraner bereit, ihre Armeen zu mobilisieren. Mal sehen, wie sie reagieren."
  IRQ_demand_old_turkish_lands:0 "Erobern Sie alte türkische Länder zurück"
  IRQ_demand_old_turkish_lands_desc:0 "In Südkleinasien lebt eine kleine assyrische Minderheit. Diese befindet sich derzeit in türkischer Hand. Wir werden ein Ultimatum stellen und sehen, was sie antworten."
  IRQ_uprising_in_egypt:0 "Aufstand in Ägypten"
  IRQ_uprising_in_egypt_desc:0 "Wir können einen Aufstand in Ägypten finanzieren und dann schnell weiterziehen und das Land annektieren."
  IRQ_assyria_restored:0 "Assyrien wiederhergestellt"
  IRQ_assyria_restored_desc:0 "Wir haben das Assyrische Reich wiederhergestellt!"
  IRQ_royal_road:0 "Der Königsweg"
  IRQ_royal_road_desc:0 "Vor langer Zeit hatten die Assyrer eine Königsstraße gebaut. Wir sollten ihr ihren alten Glanz zurückgeben."
  IRQ_workers_revolution:0 "Arbeiterrevolution"
  IRQ_workers_revolution_desc:0 "Arbeiter des Irak, vereinigt euch! Viel zu lange wurden wir vom „König“ falsch repräsentiert. Es ist Zeit, dass wir uns erheben und die bürgerlichen Unterdrücker vernichten!"
  IRQ_socialist_scientists:0 "Sozialistische Wissenschaft"
  IRQ_socialist_scientists_desc:0 "Wir können das, was wir aus natürlichen Experimenten lernen, auf ein soziales Umfeld anwenden. Dies wird immer dazu beitragen, in die Köpfe der Bevölkerung zu gelangen ..."
  IRQ_workers_culture:0 "Arbeiterkultur"
  IRQ_workers_culture_desc:0 "Der Sozialismus ist nicht nur ein Wirtschaftssystem und der Marxismus nicht nur eine Wissenschaft. Wir müssen das Grundgerüst der irakischen Gesellschaft umgestalten, um alle Überreste bürgerlicher Sitten und Traditionen auszumerzen."
  IRQ_ministry_of_propaganda:0 "Propagandaministerium"
  IRQ_ministry_of_propaganda_desc:0 "Wenn wir ein Propagandaministerium einrichten, können wir unserer Bevölkerung eine Gehirnwäsche verpassen, damit sie alles glaubt, was wir wollen …"
  IRQ_soviet_funding:0 "Sowjetische Finanzierung"
  IRQ_soviet_funding_desc:0 "Die Sowjets haben angeboten, unsere industriellen Bemühungen zu finanzieren."
  IRQ_secret_police:0 "Geheimpolizei"
  IRQ_secret_police_desc:0 "Wir sollten eine Geheimpolizei einrichten, um allen Widerstand gegen die Revolution niederzuschlagen!"
  IRQ_militarized_settlements:0 "Militarisierte Siedlungen"
  IRQ_militarized_settlements_desc:0 "Wir sollten in den Siedlungen im ganzen Land militärische Lehren einführen, um mehr Unterstützung für das Militär zu gewinnen."
  IRQ_join_the_comitern:0 "Treten Sie der Komintern bei"
  IRQ_join_the_comitern_desc:0 "Die Sowjets gründeten die Komintern, um Kommunisten und Sozialisten weltweit zu vereinen. Wir sollten ihre Sache unterstützen."
  IRQ_the_parition_of_persia:0 "Die Teilung Persiens"
  IRQ_the_parition_of_persia_desc:0 "Die Sowjets planen eine Invasion Persiens, um die britischen Ölinteressen zu untergraben. Wir sollten unseren sowjetischen Brüdern helfen und die Imperialisten vernichten!"
  IRQ_operation_sublime_porte:0 "Operation Sublime Porte"
  IRQ_operation_sublime_porte_desc:0 "Genau wie die Sowjets haben auch wir unsere eigenen Interessen in der Türkei. Unser Militär hat eine gemeinsame Operation zur Invasion der Türkei vorgeschlagen, die als Operation „Erhabene Pforte“ bekannt ist."
  IRQ_the_red_dawn:0 "Die Rote Morgendämmerung"
  IRQ_the_red_dawn_desc:0 "Unser kommunistischer Einfluss hat sich im Nahen Osten ausgebreitet. Die Rote Morgendämmerung beginnt heute..."
  IRQ_form_the_socialist_union_of_the_mashriq:0 "Bilden Sie die Sozialistische Union des Maschrik "
  IRQ_form_the_socialist_union_of_the_mashriq_desc:0 "Die kommunistischen Nationen des Nahen Ostens gehören nicht zu den westlichen Nationen. Wir werden die Sozialistische Union des Maschrik gründen ..."
  IRQ_invite_arabia:0 "Arabien einladen"
  IRQ_invite_arabia_desc:0 "Wir sollten die zweitgrößte freie Nation im Nahen Osten, Arabien, einladen."
  IRQ_invite_yemen:0 "Jemen einladen"
  IRQ_invite_yemen_desc:0 "Wir sollten die Expansion unserer Fraktion fortsetzen, indem wir den Jemen einladen."
  IRQ_invite_oman:0 "Oman einladen"
  IRQ_invite_oman_desc:0 "Als drittes und letztes Mitglied laden wir Oman ein, die letzte freie arabische Nation."
  IRQ_invite_oman:0 "Oman einladen"
  IRQ_invite_oman_desc:0 "Als drittes und letztes Mitglied laden wir Oman ein, die letzte freie arabische Nation."
  IRQ_assisted_development:0 "Unterstützte Entwicklung"
  IRQ_assisted_development_desc:0 "Nach Prüfung des Zustands des militärisch-industriellen Komplexes unserer Nachbarn ist es klar, dass wir seine Entwicklung unterstützen sollten."
  IRQ_conquer_persia:0 "Erobere Persien"
  IRQ_conquer_persia_desc:0 "Jahrhundertelang wurde das arabische Volk von den vielen persischen Reichen unterdrückt. Heute werden sie sich der Volksrepublik Irak anschließen ..."
  IRQ_conquer_turkey:0 "Erobern Sie die Türkei"
  IRQ_conquer_turkey_desc:0 "Wie die Perser eroberten die Türken einst den Nahen Osten und drangsalierten die Nationen, die sie nicht erobern konnten. Die Sozialistische Union des Maschrik wird ihnen zeigen, was mit Imperialisten geschieht ..."
  IRQ_Mawtini:0 "Mawtini"
  IRQ_Mawtini_desc:0 "„Mawtini“ ist der Spruch, den unser Volk auf den Straßen singt. Mawtini bedeutet „Mein Heimatland“. Wir haben dem Volk den Ruhm gegeben, den sein Heimatland verdient."
  IRQ_the_secular_movement:0 "Die säkulare Bewegung"
  IRQ_the_secular_movement_desc:0 "Anstatt westlichen autoritären Ideologien zu folgen, sollten wir der Demokratie folgen, einer Regierungsform, die Religion und Staat trennt. Dies ist ein Problem, das unser Land seit Jahren plagt."
  IRQ_foriegn_fighters:0 "Ausländische Kämpfer"
  IRQ_foriegn_fighters_desc:0 "Im ganzen Land haben sich viele Menschen als ausländische Kämpfer den Armeen anderer demokratischer Länder angeschlossen. Wir sollten ihre Kriegsanstrengungen durch die Schaffung formalisierter Freiwilligendivisionen unterstützen."
  IRQ_british_embassy:0 "Britische Botschaft"
  IRQ_british_embassy_desc:0 "Die Briten rufen alle demokratischen Nationen der Welt dazu auf, das Bollwerk des Faschismus zu bekämpfen. Sie sind bereit, die diplomatischen Beziehungen zu uns auszubauen."
  IRQ_sell_oil_to_the_allies:0 "Verkaufen Sie Öl an die Alliierten"
  IRQ_sell_oil_to_the_allies_desc:0 "Die Alliierten benötigen mehr Ressourcen, um ihre Kriegsanstrengungen in Europa zu unterstützen. Öl ist für die Aufrechterhaltung der alliierten Kriegsmaschinerie von entscheidender Bedeutung."
  IRQ_join_the_allies:0 "Schließen Sie sich den Verbündeten an"
  IRQ_join_the_allies_desc:0 "Es ist Zeit, dass wir uns dem Kampf gegen die faschistische und kommunistische Bedrohung anschließen. Wir sollten darum bitten, den Alliierten beizutreten."
  IRQ_volunteer_corps:0 "Freiwilligenkorps"
  IRQ_volunteer_corps_desc:0 "Während der Krieg in Europa weiter wütet, benötigen wir immer mehr Hilfe, um den Briten und Franzosen den Sieg zu sichern. Wir sollten mit der Schaffung kleinerer Freiwilligendivisionen beginnen, die wir doppelt so schnell einsetzen können wie unsere derzeitigen."
  IRQ_allied_support:0 "Unterstützung der Alliierten"
  IRQ_allied_support_desc:0 "Nach allem, was wir für die Alliierten getan haben, revanchieren sie sich nun mit einer großen Expeditionstruppe in den Staat Bagdad."
  IRQ_a_true_republic:0 "Eine wahre Republik"
  IRQ_a_true_republic_desc:0 "Nach allem, was wir für sie getan haben, um die Zukunft der Demokratie zu schützen, haben wir uns in den Augen der westlichen Nationen endlich als echte Republik erwiesen."
  IRQ_air_base_expansion:0 "Erweiterung des Luftwaffenstützpunkts"
  IRQ_air_base_expansion_desc:0 "Wenn wir den Himmel beherrschen wollen, sollten wir zivile und militärische Luftwaffenstützpunkte ausbauen."
  IRQ_fighter_modernisation:0 "Modernisierung von Kampfflugzeugen"
  IRQ_fighter_modernisation_desc:0 "Unsere alten Kampfflugzeuge aus der Zwischenkriegszeit sind den Kampfflugzeugen von morgen unterlegen."
  IRQ_air_innovations:0 "Luftinnovationen"
  IRQ_air_innovations_desc:0 "Der Generalstabschef hat dem Kabinett neue Taktiken und Formationen vorgeschlagen. Wir müssen diese neuen Ideen umsetzen, um mit anderen Nationen mithalten zu können."
  IRQ_heavy_fighter_concept:0 "Konzept eines schweren Jägers"
  IRQ_heavy_fighter_concept_desc:0 "Sollten wir gezwungen sein, in die Offensive zu gehen, brauchen wir einen neuen Typ von Kämpfer, der lange Zeit innerhalb feindlicher Grenzen operieren kann."
  IRQ_naval_bomber_experiments:0 "Marinebomber-Experimente"
  IRQ_naval_bomber_experiments_desc:0 "Die Lufthoheit ist auf See ebenso wichtig wie über Land. Spezialflugzeuge, die für die Seekriegsführung entwickelt wurden, sind ein Mittel, dieses Ziel zu erreichen."
  IRQ_medium_bomber_focus:0 "Fokus auf mittleren Bomber"
  IRQ_medium_bomber_focus_desc:0 "Eine Erweiterung der Präzisionsbombenphilosophie, angepasst für eine größere Reichweite zur Verwendung in unterstützenden Rollen."
  IRQ_light_bomber_focus:0 "Fokus auf leichten Bomber"
  IRQ_light_bomber_focus_desc:0 "Der Wert des Einsatzes von Sturzkampfbombern zur Luftnahunterstützung sollte nicht unterschätzt werden."
  IRQ_air_modernisations_programme:0 "Luftmodernisierungsprogramm"
  IRQ_air_modernisations_programme_desc:0 "Die Flugtheorie ist ebenso wichtig wie die Technologie. Es warten immer noch neue Strategien für unsere Piloten darauf, entdeckt zu werden."
  IRQ_rocket_development:0 "Raketenentwicklung"
  IRQ_rocket_development_desc:0 "Geschwindigkeit ist die Eigenschaft, auf der alle anderen Eigenschaften der Luftfahrt beruhen. Raketen- und Düsentriebwerke könnten es uns theoretisch ermöglichen, alle bisherigen Grenzen zu überschreiten."
  IRQ_red_sea_supremacy:0 "Vorherrschaft im Roten Meer"
  IRQ_red_sea_supremacy_desc:0 "Wir müssen eine Marine aufbauen, die uns die Kontrolle über die Meere aneignet und sowohl die Briten als auch den Iran blockiert."
  IRQ_study_foreign_built_ships:0 "Studieren Sie ausländische Schiffe"
  IRQ_study_foreign_built_ships_desc:0 "Unsere Nachbarn entwickeln ständig neue Schiffstypen. Wir müssen diese lizenzieren und untersuchen, um dann neuere Schiffe zu entwickeln, die auf unsere strategischen und taktischen Marineanforderungen zugeschnitten sind."
  IRQ_a_cruiser_navy:0 "Ein Kreuzer der Marine"
  IRQ_a_cruiser_navy_desc:0 "Um unsere Pläne für eine Präsenz auf See in die Tat umzusetzen, werden immer größere Schiffe benötigt."
  IRQ_import_submarine_technology:0 "U-Boot-Technologie importieren"
  IRQ_import_submarine_technology_desc:0 "Eine Lücke im U-Boot-Bereich ist inakzeptabel. Wir werden die Technologie haben, auch wenn wir sie kaufen müssen."
  IRQ_commerce_attack:0 "Taktiken für Handelsüberfälle"
  IRQ_commerce_attack_desc:0 "Indem wir dem Feind mit U-Booten und leichten Zerstörern seine Ressourcen entziehen, können wir trotz unserer relativ kleinen Flotte die Vorherrschaft auf See sichern."
  IRQ_the_twin_threats:0 "Die doppelte Bedrohung"
  IRQ_the_twin_threats_desc:0 "Indem wir uns auf die Gegentaktiken konzentrieren, die wir brauchen, um unseren wahrscheinlichsten Feinden entgegenzutreten, behalten wir im Seekampf die Oberhand."
  IRQ_coastal_defense:0 "Küstenverteidigung"
  IRQ_coastal_defense_desc:0 "Eine mobile Marineverteidigungstruppe mit kurzer Reichweite könnte möglicherweise die Arbeit stationärer Befestigungen übernehmen, die um ein Vielfaches stärker sind."
  IRQ_strike_force:0 "Einsatztruppe"
  IRQ_strike_force_desc:0 "Falls uns die Zahl der Kriegsschiffe fehlt, benötigen wir eine schnell einsetzbare Streitmacht, um den Feind angreifen zu können, wenn und wo er am schwächsten ist."
  IRQ_red_sea_navy:0 "Marine des Roten Meeres"
  IRQ_red_sea_navy_desc:0 "Wenn wir unsere Schiffe im Roten Meer einsetzen wollen, ist eine gründliche Neugestaltung unserer Marinestrategie von großer Bedeutung."

