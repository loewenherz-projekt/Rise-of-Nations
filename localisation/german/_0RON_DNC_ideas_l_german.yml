 DNC_Two_Power_Standard:0 "Zwei-Mächte-Standard"
 DNC_Two_Power_Standard_desc:0 "Der Naval Defence Act von 1889 war ein Gesetz des britischen Parlaments. Es erhielt am 31. Mai 1889 die königliche Zustimmung und führte formell den „Zweimächtestandard“ ein und erhöhte die Seestärke des Vereinigten Königreichs. Der Standard sah vor, dass die Royal Navy eine Anzahl von Schlachtschiffen vorhalten sollte, die mindestens der kombinierten Stärke der beiden nächstgrößten Marinen der Welt entsprach, damals Frankreich und Russland. In den folgenden vier Jahren wurden zusätzlich 20 Millionen Pfund für zehn neue Schlachtschiffe, 38 neue Kreuzer, 18 neue Torpedoboote und vier neue Schnellboote bereitgestellt. Der Zweimächtestandard wurde bis zum Beginn der Abrüstung in der Zwischenkriegszeit aufrechterhalten."
 
