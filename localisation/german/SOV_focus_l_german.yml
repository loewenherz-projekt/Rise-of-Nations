 crop_yield_will_decrease_tt:0 "„Die Ernteerträge werden langsam zurückgehen.“"
 SOV_INT_dissolve_the_constituent_assembly:0 "Auflösung der verfassunggebenden Versammlung"
 SOV_INT_dissolve_the_constituent_assembly_desc:0 "Die Konstituierende Versammlung ist eine erfundene, bürgerlich verfasste Organisation, die für ihre eigenen Interessen kämpft, nämlich für die Aufrechterhaltung Russlands im imperialistischen Einflussbereich, und sollte daher nicht um des Volkswillens willen weiterbestehen."
 SOV_INT_war_communism:0 "Kriegskommunismus"
 SOV_INT_war_communism_desc:0 "Wenn wir die Revolution wirklich erfolgreich gestalten und die Arbeiter der Welt befreien wollen, müssen wir jetzt einen großen Schritt zurück machen. Krieg funktioniert anders als alles, was wir kennen: Der Stärkste gewinnt, und wir müssen uns so aufbauen, dass wir dieser Stärkste sind. Das bedeutet, schwierige Entscheidungen treffen zu müssen, und das wissen wir..."
 SOV_war_communism_dynamic_modifier:0 "Kriegskommunismus"
 SOV_modify_defense_industry_ns_intro:0 "Ändern Sie §Y$SOV_war_communism_dynamic_modifier$§! durch"
 SOV_war_communism_tt:0 "Fügen Sie §Y$SOV_war_communism_dynamic_modifier$§! hinzu, was Folgendes gewährt: (Stabilität: §R-5,00 %§!, Trainingszeit: §G-5,00 %§!) \n\n"
 SOV_forced_labor_tt:0 "Modifiziert §Y$SOV_war_communism_dynamic_modifier$§! durch (Konsumgüterfabriken: §Y-5,00%§!, Stabilität: §R-2,00%§!) \n\n"
 SOV_INT_army_supply:0 "Versorgung der Armee"
 SOV_INT_army_supply_desc:0 "In Kriegszeiten sind die Waffen der Revolution, unsere Rote Armee, für den Erhalt der Bewegung von entscheidender Bedeutung, und deshalb hat dies im Moment höchste Priorität."
 SOV_INT_prodrazvyorstka:0 "Prodrazvyorstka"
 SOV_INT_prodrazvyorstka_desc:0 "Wir können in Zeiten, in denen wir die landwirtschaftliche Produktion so dringend brauchen, keine überschüssigen Produkte übrig lassen. Prodrazvyorstka wird schwierige, aber notwendige Zeiten für uns schaffen."
 SOV_INT_attack_private_property:0 "Angriff auf das Privateigentum"
 SOV_INT_attack_private_property_desc:0 "An diesem Punkt sollte und wird es nicht toleriert, dass Privateigentum mitten in einer Revolution in den Händen der Bourgeoisie liegt, denn es gefährdet das Wohlergehen des revolutionären Staates."
 SOV_INT_deal_with_bankers:0 "Deal mit Bankern"
 SOV_INT_deal_with_bankers_desc:0 "Die Banker wollen mit der Revolution nichts zu tun haben, aber ihre Arbeit ist unerlässlich, denn ohne Geld geht nichts, wir müssen diese Situation schnell meistern."
 SOV_INT_mass_conscription:0 "Massenrekrutierung"
 SOV_INT_mass_conscription_desc:0 "Es wird jede Hilfe aller Arbeiter mit brennendem revolutionären Geist benötigt, denn die Priorität besteht darin, die Weißen auszulöschen."
 SOV_INT_ban_private_enterprises:0 "Verbot privater Unternehmen"
 SOV_INT_ban_private_enterprises_desc:0 "Da nach den wichtigsten Verstaatlichungen private Unternehmen und ihre bürgerlichen Ratten nicht länger benötigt werden, könnte man sie auch so schnell wie möglich verbieten."
 SOV_INT_building_of_leninism:0 "Der Aufbau des Leninismus"
 SOV_INT_building_of_leninism_desc:0 "Die genialen Ansichten des Genossen Lenin über die Werke von Marx und Engels stellen in der kommunistischen Bewegung tatsächlich einen Schritt weiter dar, und jetzt, da die Macht in den Händen der Partei liegt, sollten wir endlich die Theorien dieser drei Revolutionäre umsetzen."
 SOV_INT_abolish_the_russian_constitution:0 "Die Verfassung von 1906 auflösen"
 SOV_INT_abolish_the_russian_constitution:0 "Die Verfassung von 1906 ist lediglich die Art und Weise, wie der Zar und seine Anhänger unser Volk und die Arbeiter im ganzen Reich ausbeuten mussten. Sie hat für uns keinen Nutzen. Unsere Aufgabe besteht darin, eine erneuerte, auf das ausgebeutete Volk ausgerichtete Gesellschaft zu schaffen."
 SOV_INT_revolutionary_government:0 "Die revolutionäre Regierung"
 SOV_INT_revolutionary_government_desc:0 "Wir werden den Weg für den Erfolg der Revolution ebnen und dafür müssen wir alles nutzen, was die Diktatur des Proletariats zu bieten hat."
 SOV_INT_1918_constitution:0 "Das Grundgesetz"
 SOV_INT_1918_constitution_desc:0 "Es muss eine neue Verfassung geschaffen werden, eine vorläufige, die aber die Macht in den Händen der arbeitenden Bevölkerung bestätigt, die Erklärung der Rechte der arbeitenden und ausgebeuteten Bevölkerung."
 SOV_INT_cheka:0 "Die VCheKa"
 SOV_INT_cheka_desc:0 "Nach der Machtergreifung der bürgerlichen Regierung ist es offensichtlich, dass viele Konterrevolutionen im Inneren von jenen hinterhältigen bürgerlichen Elementen angeführt wurden, die zum Wohle des Proletariats beseitigt werden müssen."
 SOV_INT_respect_decree_on_peace:0 "Respektieren Sie das Friedensdekret"
 SOV_INT_respect_decree_on_peace_desc:0 "Die Arbeiter in ganz Russland können diesen Krieg, den wir zum Verlieren verurteilt sind, nicht länger ertragen, und diese bürgerlichen Ratten haben das nicht begriffen. Alles, was die Sowjets brauchen, ist Frieden, und das Abkommen von Brest-Litowsk ist unsere Chance, ihnen diesen Frieden zu verschaffen."
 SOV_INT_end_brest_litovsk_talks:0 "Friedensgespräche beenden"
 SOV_INT_end_brest_litovsk_talks:0 "Es bedarf keines Friedens, die Mittelmächte, Zeichen des Imperialismus des vergangenen Jahrhunderts, stehen am Rande einer Revolution, es bleibt nur Geduld."
 SOV_INT_let_crowns_roll:0 "Lasst die Kronen rollen!"
 SOV_INT_let_crowns_roll_desc:0 "Nach langen Jahrzehnten in der Hand eines skrupellosen, blutigen und teuflischen Herrschers haben wir es nun unter unserer Kontrolle. Die Sowjets brauchen diesen Mann und seine Familie nicht mehr. Sie sind einfach nur Mitglieder des Königshauses, die gesäubert werden müssen, um zu verhindern, dass ihr blutiges Erbe jemals wieder herrscht."
 SOV_INT_forced_labor:0 "Zwangsarbeitsdienst"
 SOV_INT_forced_labor_desc:0 "Wir brauchen so viele Menschen wie möglich, die für das Wohl der Revolution arbeiten. Wir sollten sowohl die Verhafteten als auch die ehemaligen Bürger einsetzen, die nicht mehr gebraucht werden."
 SOV_INT_implement_food_rationing:0 "Lebensmittelrationierung einführen"
 SOV_INT_implement_food_rationing_desc:0 "Ein großer Rückschritt für die Revolution, aber um die gesamte Bevölkerung zumindest mit dem Nötigsten zu versorgen, sind Kriegsmaßnahmen kaum zu ergreifen …"
 SOV_INT_labor_divisions:0 "Arbeitsteilungen"
 SOV_INT_labor_divisions_desc:0 "Noch einmal: Unser Hauptanliegen besteht darin, die Armee aufzufüllen, die Revolution mit Gewalt aufrechtzuerhalten, und selbst wenn wir nicht vertrauenswürdig sind, brauchen wir von ihnen jegliche militärische Hilfe."
 SOV_INT_expand_the_kolkhoz:0 "Das Kolchos-System"
 SOV_INT_expand_the_kolkhoz_desc:0 "Die Bauern müssen nicht mehr einzeln produzieren, die Idee einer Kollektivfarm ist nicht nur gut für die Revolution, sondern auch viel produktiver als die Einzelproduktion."
 SOV_INT_ban_strikes:0 "Streikverbot"
 SOV_INT_ban_strikes_desc:0 "Wir können in unserer fragilen Zeit nicht mit Streikenden umgehen. Wir befürworten das Recht auf Einforderung, aber unter den richtigen Umständen ist es eine vorübergehende, aber meist notwendige Maßnahme."
 SOV_INT_war_industrialism:0 "Kriegsindustrialismus"
 SOV_INT_war_industrialism_desc:0 "Je stärker die Industrie derzeit militärisch ausgerichtet ist, desto besser für das Wohl der Bevölkerung, denn zunächst geht es um die Versorgung der Roten Armee."
 SOV_INT_military_railways:0 "Militärische Eisenbahnregierung"
 SOV_INT_military_railways_desc:0 "Mit der Übernahme der Eisenbahnkontrolle durch das Militär minimieren wir die Möglichkeit, dass Konterrevolutionäre die Eisenbahn aufwiegeln und zerstören – ein notwendiger Schritt, zumindest vorerst."
 SOV_INT_prodnalog:0 "Prodnalog"
 SOV_ING_prodnalog_desc:0 "Da wir Prodraswyorstka fast am Ende des Krieges nicht mehr dringend benötigen, sollte diese verheerende und problematische Maßnahme so schnell wie möglich aufgehoben und den Bauern das Recht auf ihre eigene Produktion zurückgegeben werden."
 SOV_INT_economic_question:0 "Die wirtschaftliche Frage"
 SOV_INT_economic_question_desc:0 "Wir stehen kurz vor dem Ende von allem, und jetzt ist es an der Zeit, diese desaströse Wirtschaftspolitik zu überdenken, damit wir wirklich von einer erfolgreichen Revolution sprechen können."
 SOV_INT_vsevobuch:0 "Vsevobuch"
 SOV_INT_vsevobuch_desc:0 "Genossen, auf dem 7. Kongress drängten wir auf neue Maßnahmen in der militärischen Ausbildung, eine allgemeine, die mehr Genossen von unserem Kampfbedürfnis überzeugen könnte."
 SOV_INT_nep:0 "Neue Wirtschaftspolitik"
 SOV_INT_nep_desc:0 "Der Krieg ist zu Ende und damit ist es Zeit für Veränderungen. Das Hauptbedürfnis der Menschen besteht derzeit darin, die großen Probleme zu lindern, die durch den „Kriegskommunismus“ verursacht wurden. Genosse Lenin brachte die NEP auf dem 10. Parteitag zur Sprache."
 SOV_INT_deepen_war_communist_policies:0 "Verschärfung der kommunistischen Kriegspolitik"
 SOV_INT_deepen_war_communist_policies_desc:0 "Die sogenannte „kriegskommunistische“ Politik ist nichts anderes als die reine Diktatur des Proletariats, und es ist eine Illusion, über andere Wege zur Verwirklichung des Kommunismus nachzudenken."
 SOV_INT_equal_food_distribution:0 "Gleichmäßige Lebensmittelverteilung"
 SOV_INT_equal_food_distribution_desc:0 "Wir haben noch immer nicht das Recht auf Produktionsüberschüsse erreicht, deshalb müssen wir eine gleichmäßige Nahrungsmittelverteilung für alle Menschen in der gesamten Union umsetzen."
 SOV_INT_speed_up_the_collectivization:0 "Beschleunigen Sie den Kollektivierungsprozess"
 SOV_INT_militarize_trade_unions:0 "Militarisierung der Gewerkschaften"
 SOV_INT_militarize_trade_unions_desc:0 "Genosse Trotzki erkannte die Notwendigkeit, eine militarisierte Produktionsatmosphäre rund um die Arbeiterlogik zu schaffen und dadurch die Gewerkschaften in den Staatsapparat zu integrieren."
 SOV_INT_rebuild_the_rail_system:0 "Wiederaufbau des Schienensystems"
 SOV_INT_rebuild_the_rail_system_desc:0 "Genosse Trotzki ist zusammen mit dem Tsektran für den Wiederaufbau des durch den Krieg zerstörten Transport- und Eisenbahnsystems in der gesamten Union verantwortlich."
 SOV_INT_integrate_unions:0 "Integration der Gewerkschaften in den Staat"
 SOV_INT_integrate_unions_desc:0 "Nachdem die Militärkultur innerhalb der Produktionslogik geschaffen wurde, ist es nun an der Zeit, sie in den Apparat zu integrieren, da die Arbeiter in einem Sowjetstaat nichts vom Staat zu befürchten haben."
 SOV_INT_kulak_purges:0 "Kulak-Säuberungen"
 SOV_INT_kulak_purges_desc:0 "Die Kulaken sind seit langem eine Belastung und seit Jahrzehnten die Hauptausbeuter der Bauern. Sie müssen so schnell wie möglich beseitigt werden."
 SOV_INT_ban_on_private_properties:0 "Verbot von Privateigentum"
 SOV_INT_ban_on_private_properties_desc:0 "Der einzige wirkliche Nutzen des Privateigentums besteht in der Ausbeutung der Arbeiterklasse, dem Mittel, mit dem sich die Bourgeoisie vom Volk distanziert, und es muss so schnell wie möglich verboten werden."
 SOV_INT_centralize_transport_system:0 "Zentralisieren Sie das Transportsystem"
 SOV_INT_centralize_transport_system_desc:0 "Das Transportsystem ist ein grundlegender Bereich jedes Staates. Dies ändert sich auch für den revolutionären Staat nicht. Wir müssen es sichern und im Staatsapparat zentralisieren."
 SOV_INT_expand_red_army_influence_in_the_party:0 "Ausbau des Einflusses der Roten Armee in der Partei"
 SOV_INT_expand_red_army_influence_in_the_party_desc:0 "Der wichtigste Apparat der Revolution ist die Streitmacht, die für deren Aufrechterhaltung verantwortlich ist. Daher sollte und muss sie in den Staatsapparat integriert werden, um die Revolution langfristig zu schützen."
 SOV_INT_new_revolutionary_committees:0 "Neue Revolutionskomitees"
 SOV_INT_new_revolutionary_committees_desc:0 "Wir brauchen mehr revolutionäres Feuer unter den Arbeitern, und der beste Weg, dies zu erreichen, ist, wie bereits bewiesen, die Schaffung von Revolutionskomitees."
 SOV_INT_monopolize_communication_system:0 "Monopolisierung der Kommunikationssysteme"
 SOV_INT_monopolize_communication_system_desc:0 "Ein weiteres grundlegendes System für das Wohlergehen eines Staates ist das Kommunikationssystem. Heutzutage kann keine Gesellschaft völlig von der Welt isoliert werden, und um dies zu gewährleisten, sollte der Staat die Kontrolle über das System übernehmen."
 SOV_INT_a_militarist_state:0 "Ein militaristischer sozialistischer Staat"
 SOV_INT_a_militarist_state_desc:0 "Die Bedürfnisse des Militärs sind die Bedürfnisse des Volkes, und das Militär ist die höchste Kraft in jeder Revolution. Es ist notwendig, damit sie stattfinden kann. Es ist diejenigen, die für alles die Kontrolle haben müssen."
 SOV_INT_coexistence_of_public_and_private:0 "Koexistenz von öffentlich und privat"
 SOV_INT_coexistence_of_public_and_private_desc:0 "Die Bauern und Arbeiter sind dringend auf das Nötigste angewiesen. Deshalb muss die Revolution einen Schritt zurücktreten und warten, bis das Volk, solange es noch Privateigentum gibt, aufholen kann."
 SOV_INT_friendly_tax:0 "Sachleistungen"
 SOV_INT_friendly_tax_desc:0 "Prodnalog war mit seinem Ziel, die Hungersnot der Bevölkerung zu lindern, erfolgreich. Anstatt nun auf nicht mehr benötigte Überschüsse zurückzugreifen, sollen die Bauern auf ihren Überschüssen sitzen bleiben und lediglich eine Steuer auf ihre Produktion zahlen."
 SOV_INT_the_trade_unions_question:0 "Die Gewerkschaftsdebatte"
 SOV_INT_the_trade_unions_question_desc:0 "Die Syndikate und Gewerkschaften waren eine wichtige Grundlage für die Arbeiterrevolution, und ihr Schicksal muss im von den Arbeitern verwalteten Staat entschieden werden."
 SOV_INT_schools_of_communism:0 "Schulen des Kommunismus"
 SOV_INT_schools_of_communism_desc:0 "Wie Genosse Lenin weise bemerkte, sollten die Gewerkschaften als Grundlage des Kommunismus den Menschen die Mittel dazu beibringen, um sie zu politisieren und sie zu Anhängern der Revolution zu machen."
 SOV_INT_workers_opposition:0 "Arbeiteropposition"
 SOV_INT_workers_opposition_desc:0 "Nach der Niederlage gegen die Arbeitermehrheit stimmte Genosse Lenin der Übernahme der Methoden der Opposition in der Wirtschaft zu und verließ sich für eine bessere wirtschaftliche Produktion auf die Gewerkschaftsorganisation."
 SOV_INT_workers_self_management:0 "Arbeiterselbstverwaltung"
 SOV_INT_workers_self_management_desc:0 "Genosse Schljapnikow plädierte für die so theoretisierte Arbeiterkontrolle als Mittel zur Lösung der wirtschaftlichen Frage der Zukunft der Revolution als Reaktion auf das Wachstum der Bourgeoisie und der NEP-Anhänger im Sowjetstaat."
 SOV_INT_unionize_the_workers:0 "Organisieren Sie die Arbeiter gewerkschaftlich"
 SOV_INT_unionize_the_workers_desc:0 "Die Sowjets hatten ihr Ziel bereits erreicht und werden daher nicht länger benötigt. Der beste Weg für die Arbeiter besteht darin, sich in Syndikaten und Gewerkschaften zu zentralisieren." 
 SOV_INT_organize_the_laboral_unions:0 "Organisieren Sie die Gewerkschaften"
 SOV_INT_organize_the_laboral_unions_desc:0 "Die Notwendigkeit besteht nun darin, die neuen Gewerkschaften in einer effizienten und wirklich gut geführten Organisation zu organisieren, wie es Medwedew und seine Arbeitermehrheit vorgeschlagen haben. Vertreter der Gewerkschaften sollen von ihren Gewerkschaftern in Räte gewählt werden, um das Wohlergehen der Wirtschaft im Ganzen zu überwachen."
 SOV_INT_currency_reform:0 "Währungsreform"
 SOV_INT_currency_reform_desc:0 "Die Zeit des Kriegskommunismus hat unsere Wirtschaft völlig aus dem Gleichgewicht gebracht und sie unserer Kontrolle entzogen. Jetzt ist es an der Zeit, sie zurückzugewinnen und mit den Chevronets zu einer auf Geld basierenden Wirtschaft zurückzukehren. "
 SOV_INT_hire_bourgeois_specialists:0 "Stellen Sie bürgerliche Spezialisten ein"
 SOV_INT_hire_bourgeois_specialists_desc:0 "Der Bedarf an Fachkräften in der Produktion besteht weiterhin, und dafür sind wir bereit, ehemaligen bürgerlichen Interessenten ein gutes Leben in den Gewerkschaften zu ermöglichen."
 SOV_INT_allow_farmers_to_sell_surpluses:0 "Erlauben Sie den Bauern, Überschüsse zu verkaufen"
 SOV_INT_allow_farmers_to_sell_surpluses_desc:0 "Die Lage der Bauern ist nach der Krise infolge der Kriegsmaßnahmen desolat. Um die Bevölkerung vor die Revolution zu stellen, sollten wir ihr gestatten, ihre Überschüsse auf dem internationalen und nationalen Markt zu verkaufen."
 SOV_INT_buy_farmers_surpluses:0 "Kaufen Sie Bauernüberschüsse"
 SOV_INT_buy_farmers_surpluses_desc:0 "Um die Wirtschaftskrise zu lindern, die die Bauernschaft während des Bürgerkriegs erschüttert hat, und aufgrund unseres derzeitigen Bedarfs an Nahrungsmitteln ist der Kauf von Nahrungsmitteln bei unseren eigenen Bauern die beste Möglichkeit, die Nahrungsmittelproduktion aufrechtzuerhalten."
 SOV_INT_freedom_of_trade:0 "Handelsfreiheit"
 SOV_INT_freedom_of_trade_desc:0 "Unsere Genossen wissen, dass unsere Lage heikel ist und unsere Wirtschaft in einer desolaten Lage ist. Daher erscheint es notwendig, zusammen mit der neuen Politik von der sozialistischen Wirtschaft abzurücken und einen freieren Markt zu ermöglichen."
 SOV_INT_concessions_to_foreign_powers:0 "Zugeständnisse an ausländische Mächte"
 SOV_INT_concessions_to_foreign_powers_desc:0 "Es ist an der Zeit, dass wir uns vor den ausländischen Mächten beugen müssen, da wir das Nötige brauchen, um unsere gesamte Bevölkerung zu versorgen."
 SOV_INT_industrial_privatization:0 "Industrielle Privatisierung"
 SOV_INT_industrial_privatization_desc:0 "Die Zugeständnisse müssen nicht nur dem ausländischen Kapital, sondern auch der Bourgeoisie gemacht werden. Da es notwendig ist, den Staat und die Wirtschaft zu organisieren, werden wir den Teufel in der Bourgeoisie vorerst auf unserer Seite behalten."
 SOV_INT_nepmen:0 "NEPmen"
 SOV_INT_nepmen_desc:0 "Nach den großen Zugeständnissen rechneten wir mit Problemen in der Revolution. Und nun ist es so weit gekommen, in Form einer neuen sozioökonomischen Klasse innerhalb der Union. Die NEP-Leute sind Händler, die enorm von der NEP profitiert haben, und sie sind Ausbeuter der Arbeiter, was sie zu unseren Feinden macht."
 SOV_INT_labor_reforms:0 "Arbeitsreformen"
 SOV_INT_labor_reforms_desc:0 "Die Prodrazwerstka führte dazu, dass die Bauern und Arbeiter davon abgehalten wurden, hohe Qualitäts- und Quantitätsstandards in der Produktion aufrechtzuerhalten, da sie keinen wirklichen Nutzen daraus zogen. Doch jetzt, nach dem Ende der verzweifelten Zeiten, muss eine Reform durchgeführt werden, und der beste Weg, die Arbeiter zu ihrer höchsten Produktivität anzuspornen, besteht darin, Arbeit und Einkommen an ihre Arbeitsproduktivität zu knüpfen."
 SOV_INT_encourage_cooperatives:0 "Fördern Sie Genossenschaften"
 SOV_INT_encourage_cooperatives_desc:0 "Auch wenn wir uns für ausländisches Kapital und private Initiativen geöffnet haben, können wir ihnen dennoch nicht alles überlassen. Der Weg, die Revolution auf Kurs zu halten, während wir uns noch im Rückschritt befinden, besteht darin, die Arbeiter zu ermutigen, Genossenschaften zu gründen, die kollektive Gesellschaft und die gemeinsame Kontrolle der Produktionsmittel zu fördern."
 SOV_INT_grant_workers_political_positions:0 "Politische Positionen der Grant-Mitarbeiter"
 SOV_INT_grant_workers_political_positions_desc:0 "Um unser Ziel, die Förderung hoher Produktivität zu intensivieren, weiter zu verfolgen, werden den qualifiziertesten Arbeitnehmern in der Union politische Positionen präsentiert."
 SOV_INT_currency_stabilization:0 "Währungsstabilisierung"
 SOV_INT_currency_stabilization_desc:0 "Nach den großen Reformen und großen Erfolgen unserer Neuen Ökonomischen Politik können wir nun endlich sagen, dass unsere neue, wieder auf Geld basierende Wirtschaft wieder stabil ist. Dies ist eine der Grundlagen einer wohlhabenden Wirtschaft für die nächsten Schritte der Revolution."
 SOV_INT_exchange_in_cash:0 "Umtausch in Bargeld"
 SOV_INT_exchange_in_cash_desc:0 "Dank der Stabilisierung unserer Wirtschaft und der Union verfügen wir nun über die Mittel und die Fähigkeit, die Produktivitätsförderung der Arbeitnehmer nicht in Naturalien, sondern in bar zu tauschen, was zweifellos zu einer weiteren Produktionssteigerung führen wird."
 SOV_INT_rely_on_specialists:0 "Verlassen Sie sich auf Spezialisten"
 SOV_INT_rely_on_specialists_desc:0 "Unter den Parteikadern und zuverlässigen Arbeitern gibt es viele spezialisierte Genossen mit fundierten Kenntnissen in Bereichen, in denen ein Wiederaufbau notwendig ist. Wir sollten sie für eine schnellere Entwicklung hin zum Sozialismus um Hilfe bitten."
 SOV_INT_educate_the_workers:0 "Erzieht das Proletariat"
 SOV_INT_educate_the_workers_desc:0 "Die Gewerkschaften haben die Aufgabe, die Arbeiterklasse in der kommunistischen Ideologie zu unterrichten, damit die Menschen nicht nur körperlich, sondern auch geistig frei sind!"
 SOV_INT_reorganize_the_workers:0 "Organisiert die Arbeiterklasse"
 SOV_INT_reorganize_the_workers_desc:0 "Viele Arbeiter hatten sich inmitten des Chaos und der Kriegsnotwendigkeiten völlig aus dem Arbeitsapparat zurückgezogen, und es ist notwendig, die gesamte Arbeiterklasse wieder in ein erneuertes, geordnetes Arbeitssystem einzugliedern."
 SOV_INT_centralize_the_trade_unions:0 "Zentralisierung der Gewerkschaften"
 SOV_INT_centralize_the_trade_unions_desc:0 "Die Organisationen der Werktätigen sind Teil des revolutionären Staates, der Arbeiterstaat fungiert als Schutzschild für die Klasse und die Sowjets können nicht so stark dezentralisiert werden."
 SOV_INT_one_back_two_forward:0 "Ein Schritt zurück, zwei Schritte vorwärts ..."
 SOV_INT_one_back_two_forward_desc:0 "Das Ziel der Neuen Ökonomischen Politik, nämlich die Schaffung der Mittel und einer ausreichenden Produktion, um die Revolution und das Volk anzutreiben, wurde endlich erreicht. Und wie Genosse Lenin sagte, müssen wir nun dieser ausländischen kapitalistischen Wirtschaft Einhalt gebieten und mit dem Übergang zur echten Sowjetwirtschaft beginnen."
 SOV_INT_empower_the_soviets:0 "Stärke die Sowjets"
 SOV_INT_empower_the_soviets_desc:0 "Die Sowjets waren die wichtigsten Ressourcen der Volksrevolution und müssen während der revolutionären Wende auch als solche behandelt werden. Sie sind uneingeschränkt in der Lage, an der Politik und Wirtschaft teilzunehmen."
 SOV_INT_expropriate_clergy_property:0 "Enteignung des Eigentums des Klerus"
 SOV_INT_expropriate_clergy_property_desc:0 "Die Religion ist das Opium des Volkes, doch der Klerus und die religiösen Institute sind Werkzeuge der Bourgeoisie, um sie zu kontrollieren und großes Kapital anzuhäufen. In Zeiten der Not könnte das Kircheneigentum nützlicher sein als je zuvor."
 SOV_INT_decree_on_separation_of_church_and_state:0 "Dekret zur Trennung von Kirche und Staat"
 SOV_INT_decree_on_separation_of_church_and_state_desc:0 "Die Kirche ist als politische Institution das perfekte Instrument zur Entfremdung der Arbeiterklasse, und der Glaube hätte dem Staatsapparat niemals in die Quere kommen dürfen."
 SOV_INT_exile_priests:0 "Orthodoxe Priester im Exil"
 SOV_INT_exile_priests_desc:0 "Orthodoxe Priester sind zu einer der einflussreichsten Stimmen der antibolschewistischen Bewegung geworden. Dagegen muss etwas unternommen werden."
 SOV_INT_seize_church_gold_reserves:0 "Ergreifen Sie Elite-Goldreserven"
 SOV_INT_seize_church_gold_reserves_desc:0 "Die Russisch-Orthodoxe Kirche ist reich an Gold und Edelmetallen, deren Besitz durch die Bolschewiken große Auswirkungen auf unsere Wirtschaft hätte."
 SOV_INT_special_punitive_department:0 "Sonderstrafabteilung"
 SOV_INT_special_punitive_department_desc:0 "Die Rote Armee hatte im Bürgerkrieg bisher stark unter Desertionen zu leiden, die WCheKa kann sich schnell darum kümmern."
 SOV_INT_repatriate_deserters:0 "Deserteure repatriieren"
 SOV_INT_repatriate_deserters_desc:0 "Die Sonderstrafbehörden haben die Ratten gut zurückgerufen. Wir brauchen so viel Hilfe wie möglich, selbst wenn sie von einem Deserteur kommt. Wir können es uns im Moment nicht leisten, Arbeitskräfte zu verlieren."
 SOV_INT_secularize_the_state:0 "Säkularisierung des Staates"
 SOV_INT_secularize_the_state_desc:0 "Das russische Reich hat den Glauben lange genug durch die Hände der Orthodoxie unterdrückt. Die Arbeiter werden sich über diese Gehirnwäsche der höheren Geistlichkeit nicht amüsieren, das Volk will die Freiheit zu glauben und nicht zu glauben."
 SOV_INT_shut_down_cathedrals:0 "Kathedralen schließen"
 SOV_INT_shut_down_cathedrals_desc:0 "Kathedralen sind ein Zeichen der Großartigkeit des Klerus, die in der Revolution bekämpft wird. Ihr Zweck wird nicht mehr benötigt. Wir müssen sie schließen und ihr Eigentum für das nutzen, was im Moment wirklich nötig ist."
 SOV_INT_the_anarchist_threat:0 "Die anarchistische Bedrohung"
 SOV_INT_the_anarchist_threat_desc:0 "Die Anarchisten wurden mit ihrem exponentiellen Aufstieg im gesamten bolschewistischen Gebiet zu einem Problem, die Machnowisten unter der Führung von Nestor Machno und die Unruhen einiger kleinerer Rebellen beginnen, zu einem echten Problem zu werden."
 SOV_INT_the_green_rebellions:0 "Die grünen Rebellionen"
 SOV_INT_the_green_rebellions_desc:0 "Nach der Getreidebeschaffungspolitik begannen die Bauern im gesamten Sowjetgebiet, die Bevölkerung aufzuwiegeln und Aufstände anzuzetteln. Solche konterrevolutionären Maßnahmen konnten nicht unbemerkt bleiben."
 SOV_INT_crush_the_revolts:0 "Zerschlagt die Revolten"
 SOV_INT_crush_the_revolts_desc:0 "Es gibt keine Gnade für die Feinde der Revolution, die bereit sind, für ihre individualistischen Wünsche gegen das Volk zu kämpfen."
 SOV_INT_calm_down_the_peasantry:0 "Beruhigt die Bauern"
 SOV_INT_calm_down_the_peasantry_desc:0 "Die Menschen sind in einer verzweifelten Lage. Es ist natürlich, dass sie, genau wie wir es bereits getan haben, versucht haben, zu ihrem eigenen Vorteil zu revoltieren. Wir könnten versuchen, ihre Forderungen während des Krieges zu mildern, auch wenn das weniger Nachschub für die Armee bedeutet. Die Menschen haben für uns Priorität."
 SOV_INT_grant_hryhoriv_military_positions:0 "Grant Hryhoriv Militärpositionen"
 SOV_INT_grant_hryhoriv_military_positions_desc:0 "Hryhoriv ist eine wichtige Militärpersönlichkeit und da ihm nur das Wohl seiner Landsleute am Herzen liegt, würde er sich gut in den Kadern der Roten Armee einsetzen."
 SOV_INT_invite_tutyunnyk:0 "Tutyunnyk einladen"
 SOV_INT_invite_tutyunnyk_desc:0 "Tutyunnyk ist ein Held für das ukrainische Volk. Wenn wir ihn an unserer Seite hätten und ihm die Aussichten einer sozialistischen Revolution in der Ukraine aufzeigen würden, hätten wir mehr Unterstützung in der Bevölkerung."
 SOV_INT_united_against_whites:0 "Vereint gegen die Weißen"
 SOV_INT_united_against_whites_desc:0 "Die Machnowisten sind Teil des anarchistischen Problems, aber wir müssen gegen einen schlimmeren Feind kämpfen: die Freiwilligenarmee, und das ukrainische Hetmanat, das die Ukraine besetzt, ist problematischer, als dass wir es allein bewältigen könnten."
 SOV_INT_ovseenko_meetings:0 "Antonov-Ovseenko-Treffen"
 SOV_INT_ovseenko_meetings_desc:0 "Nestor Machno, der Anführer der Machnowisten, lud den Genossen Antonow-Owsejenko als „diplomatischen“ Vermittler zwischen uns ein. Dies könnte eine gute Gelegenheit sein, diplomatische Beziehungen zu den Anarchisten aufzubauen."
 SOV_INT_denounce_ukrainian_anarchism:0 "Denonce Ukrainischer Anarchismus"
 SOV_INT_denounce_ukrainian_anarchism_desc:0 "Das ukrainische Volk beteiligt sich an konterrevolutionären anarchistischen Bewegungen, die die proletarische Revolution willkürlich kritisieren. Diese kindischen Maßnahmen können in einem so wichtigen Moment nicht unbemerkt bleiben."
 SOV_INT_ease_ukrainian_food_requesitioning:0 "Vereinfachen Sie die Bestellung ukrainischer Lebensmittel"
 SOV_INT_ease_ukrainian_food_requesitioning_desc:0 "Nach der Zurückdrängung der Freiwilligenarmee aus dem ukrainischen Gebiet fand wie üblich die Prodraverstka auf sowjetischem Gebiet statt, um der Armee zu helfen. Dies ging jedoch mit zusätzlicher Aufregung seitens der Machnowisten und des ukrainischen Volkes einher. Zum Wohle unserer Kameraden und des Volkes ist es besser, die Situation zu beruhigen."
 SOV_INT_betray_makhno:0 "Verrate Machno"
 SOV_INT_betray_makhno_desc:0 "Das Bündnis hat seinen Zweck erfüllt, Denikin wurde aus dem ukrainischen Territorium vertrieben, und nun gibt es im Interesse der marxistischen Revolution keinen Platz mehr für eine solche konterrevolutionäre Gruppe."
 SOV_INT_punish_banditry_and_terror_in_ukraine:0 "Bestrafung von Banditentum und Terror in der Ukraine"
 SOV_INT_punish_banditry_and_terror_in_ukraine_desc:0 "Nach dem Einmarsch der Roten Armee in der Ukraine hielten es unsere Kameraden für richtig, Banditen zu verhaften und die lokale Bevölkerung zu terrorisieren. Dies wird nicht toleriert. Machno und seine Kameraden streben dasselbe an wie wir."
 SOV_INT_suppress_anarchist_deviants:0 "Unterdrückt anarchistische Abweichungen"
 SOV_INT_suppress_anarchist_deviants_desc:0 "Die Machnowschtschina und alle ihre Anhänger sind auf die eine oder andere Weise Teil dieser konterrevolutionären Bewegung. Eine Ablehnung der Sowjetmacht ist nicht zu tolerieren und die VCheKa kann sich darum kümmern."
 SOV_INT_autonomous_makhnovschina_sr:0 "Autonome Machnowschtschina SR"
 SOV_INT_autonomous_makhnovschina_sr_desc:0 "Machno und seine Kämpfer hatten sich als unsere Kameraden erwiesen, denen das Wohl des Volkes über alles ging, und nach langen Gesprächen wird das Gebiet der Machnowschtschina als autonomer Teil der Sowjetbewegung anerkannt, getrennt von der Sowjetukraine und mit hoher Autonomie innerhalb der Union."
 SOV_INT_red_terror:0 "Der Rote Terror"
 SOV_INT_red_terror_desc:0 "Die Revolution wird von Saboteuren, weißen Bourgeois und ausländischen Interventionisten bedroht. Wir müssen ernsthafte Maßnahmen ergreifen, selbst wenn dies den Tod Tausender Konterrevolutionäre bedeutet. Der Tod von Uritsky und Volodarsky wird nicht vergessen werden."
 SOV_INT_execute_kaplan:0 "Hinrichtung von Fanny Kaplan"
 SOV_INT_execute_kaplan_desc:0 "Ein Attentat auf den Genossen Lenin ist einer der schlimmsten Angriffe der Revolution selbst. Fanny Kaplan ist nichts weiter als eine bürgerliche Agentin, die von den Verrätern der Revolution hinterrücks dirigiert wird."
 SOV_INT_execute_kannegisser:0 "Hinrichtung von Leonid Kannegisser"
 SOV_INT_execute_kannegisser_desc:0 "Leonid Kannegisser, ein weißer Kadett, war für den Tod unseres großen Kameraden, des Anführers der Petrograf-Tscheka, Moisei Uritski, verantwortlich. In seinen Memoiren schrieb er: „Dieser weiße Degenerierte muss niedergestreckt werden.“"
 SOV_INT_assassinate_white_generals:0 "Ermordung weißer Generäle"
 SOV_INT_assassinate_white_generals_desc:0 "Als Kriegsmaßnahme müssen wir einige problematische Figuren für unsere Revolution „ausschalten“, weiße Armeeführer müssen ausgeschaltet werden."
 SOV_INT_brusilov_appeal:0 "Brusilov-Appell"
 SOV_INT_brusilov_appeal_desc:0 "„An alle Offiziere, wo immer sie auch sein mögen“: Mit der Hilfe des Genossen Brusilow wird der Sownarkom eine pragmatische Maßnahme ergreifen und versuchen, alle ehemaligen oder amtierenden Armeeführer auf unsere Seite zu ziehen und zu überzeugen. Jede Hilfe von denen, die das Wohl des Volkes wollen, ist willkommen."
 SOV_INT_gulag_system:0 "Gulag-System"
 SOV_INT_gulag_system_desc:0 "Wir müssen die Revolution vor den vielen konterrevolutionären Aktionen innerhalb des Arbeitergebiets schützen, und der Gulag, ein Arbeitslager, ist die Antwort auf dieses Problem. Angesichts des Bedarfs an mehr Produktion kann er zwei Probleme mit einer Maßnahme lösen."
 SOV_INT_left_sr_cheka:0 "Linke SR-Kontrolle in der Tscheka"
 SOV_INT_left_sr_cheka_desc:0 "Die Ansichten der linken Sozialrevolutionäre zur Unterdrückung durch die Tschekisten sind ein Aufschrei der Bauernschaft, und ihre pluralistische Politik könnte zur Beruhigung der Bauernschaft beitragen."
 SOV_INT_dzerzhinsky_rule:0 "Dzerzhinsky-Tschekismus"
 SOV_INT_dzerzhinsky_rule_desc:0 "Genosse Dzerzhinsky hat zusammen mit seinen Treuhändern Latsis und Unszlicht seine Werte bei der Beseitigung konterrevolutionärer Maßnahmen unter Beweis gestellt. Der SR-Abschaum, der versucht, die Kontrolle über die Tscheka zu übernehmen, würde uns nur noch mehr Probleme bereiten. Ihr Verbot der Institution war notwendig."
 SOV_INT_use_death_penalty:0 "Todesstrafe anwenden"
 SOV_INT_use_death_penalty_desc:0 "Die Todesstrafe ist die einzige Maßnahme, die den konterrevolutionären Aktionen im Arbeitergebiet ein Ende setzen kann."
 SOV_INT_reeducate_reactionary_forces:0 "Reaktionäre Kräfte umerziehen"
 SOV_INT_reeducate_reactionary_forces_desc:0 "Das Ziel einer Revolution besteht in erster Linie darin, im Volk und für das Volk zu arbeiten, für die Freiheit aller Arbeiter und Menschen. Deshalb dürfen auf keinen Fall brutale Methoden wie die vorgeschlagene Todesstrafe angewendet werden. Der richtige Weg ist, den Menschen eine bessere Zukunft zu zeigen, während sie ihre Strafe erleiden."
 SOV_INT_expand_red_cossacks:0 "Erweitern Sie die Roten Kosaken"
 SOV_INT_expand_red_cossacks_desc:0 "Die Kosaken waren ein Symbol der Bauernaufstände. Ihre revolutionäre Geschichte könnte dazu beitragen, die zaristische Armee der Kosaken für einen gewissen Gehorsam zu gewinnen und damit die Roten Kosaken zu stärken, die heute von den Genossen Primakow, Mironow und anderen angeführt werden."
 SOV_INT_begin_decossackization:0 "Beginn der Entkosakisierung"
 SOV_INT_begin_decossackization_desc:0 "Kosaken sind nichts anderes als Wachhunde der Imperialisten, reiche Landbesitzer und Ausbeuter der Bauernschaft und müssen bekämpft werden, denn ihr sozialer Status ist an sich schon ein Feind unserer Revolution."
 SOV_INT_petrovsky_doctrine:0 "Petrovsky-Doktrin"
 SOV_INT_petrovsky_doctrine_desc:0 "Genosse Petrovsky hat in seiner Funktion als Innenminister außergewöhnliche Arbeit geleistet und die konterrevolutionären Bedrohungen gebührend bewältigt. Dies muss als Beispiel für die künftige Organisation der inneren Angelegenheiten dienen."
 SOV_INT_slow_down_purges:0 "Säuberungen verlangsamen"
 SOV_INT_slow_down_purges_desc:0 "Es besteht keine Notwendigkeit für die Revolution, sich gegen das Volk zu wenden. Diese repressiven Maßnahmen sind lediglich ein Kraftakt der Gewalt, für den es keine wirkliche Notwendigkeit gibt. Die SR plädierte für ein Ende dieser Repressionen, und die Partei hörte dies und stimmte mehrheitlich dafür."
 SOV_INT_break_brest_litovsk:0 "Brechen Sie den Vertrag von Brest-Litowsk"
 SOV_INT_break_brest_litovsk_desc:0 "Dieser Deal hat keinen Nutzen mehr, der Krieg ist vorbei und unsere Kameraden im gesamten verlorenen Gebiet müssen noch befreit werden."
 SOV_INT_agitprop:0 "Agitprop"
 SOV_INT_agitprop_desc:0 "Wir als Avantgardepartei der Sowjetrevolution müssen mit propagandistischen Mitteln die bessere Zukunft und den sozialistischen Wunsch des Volkes aufzeigen. Agitprop ist dafür die beste Ressource."
 SOV_INT_prolekult:0 "Prolekult"
 SOV_INT_prolekult_desc:0 "Das Ziel von Prolekult besteht darin, die arbeitende Kunstklasse zu organisieren und gleichzeitig den Stand der Kunst als bürgerlichen Ausdruck radikal zu verändern und sie dem Volk nahezubringen."
 SOV_INT_invite_left_sr:0 "Laden Sie linke Sozialrevolutionäre zur Revolution ein"
 SOV_INT_invite_left_sr_desc:0 "Unsere Genossen von der Partei der Linken Sozialistischen Sowjetrepubliken verfolgen dasselbe Ziel wie wir: die Freiheit des Volkes, vielleicht mit anderen Mitteln, aber das wird sich nach dem wirklichen Sieg des Proletariats ändern."
 SOV_INT_bolshevik_congress:0 "Der bolschewistische Kongress"
 SOV_INT_bolshevik_congress_desc:0 "Wir Bolschewiki sind die einzigen wahren Befreier des Proletariats und wir sollten unsere Revolution allein führen. Jeder, der sich den Bolschewiki widersetzt, muss richtig behandelt werden, als Feind des Volkes."
 SOV_INT_gain_volost_soviets_support:0 "Gewinnen Sie die Unterstützung der Wolost-Sowjets"
 SOV_INT_gain_volost_soviets_support_desc:0 "Unsere Sowjetregierung hat sich nicht auf eine bedeutende Entwicklung der Beziehungen zur Bauernschaft konzentriert, und dies könnte Probleme für unsere Revolution auf dem gesamten russischen Territorium mit sich bringen. Daher könnten wir mit der Unterstützung der linken Sozialrevolutionäre unsere Unterstützung durch die Bauernsowjets von Wolost ausweiten."
 SOV_INT_left_sr_in_sovnarkom:0 "Linke SR im Sownarkom"
 SOV_INT_left_sr_in_sovnarkom_desc:0 "Obwohl bekannt ist, dass sie unsere radikalen Veränderungen abmildern wollen, haben sie den Willen, an der Revolution teilzunehmen und könnten unserer Intelligenzia eine große Hilfe sein und die Bauern und das städtische Proletariat aus den giftigen Händen des Kapitalismus und Imperialismus befreien."
 SOV_INT_bring_back_old_mensheviks_and_srs:0 "Bringt die alten Menschewiki und Sozialrevolutionäre zurück"
 SOV_INT_bring_back_old_mensheviks_and_srs_desc:0 "Nach einer parteiinternen Resolution mit den Sozialrevolutionären und Bolschewiki wurde beschlossen, alte Menschewiki und Sozialrevolutionäre sowie andere marxistische Befürworter in den Parteiapparat aufzunehmen, wie etwa Martow, Tschernow, Tschaikowski, Plechanow und Kropotkin. Sie alle sind zweifellos Intellektuelle, die für die Entwicklung der Zukunft des sozialistischen Staates wichtig sein könnten."
 SOV_INT_hinder_sr_support:0 "SR-Unterstützung behindern"
 SOV_INT_hinder_sr_support_desc:0 "Die reformistischen Maßnahmen der Sozialrevolutionäre, sei es Spiridonowa oder Tschernow, die beide auf die eine oder andere Weise Feinde der Revolution sind, haben das Volk vor den Kopf gestoßen."
 SOV_INT_8th_congress:0 "8. Kongress der Kommunistischen Partei"
 SOV_INT_8th_congress_desc:0 "Es ist an der Zeit, einen neuen Kongress für unsere Genossen zu organisieren, um die Notwendigkeit der Sowjets zu diskutieren, da einige Fragen im Interesse der Revolution aufgeworfen wurden, wie die Schaffung eines revolutionären Organs für internationale Maßnahmen, Probleme der Kriegssituation und unsere Organisation gegen die schmutzigen reaktionären Kräfte."
 SOV_INT_soviet_cultural_revolution:0 "Sowjetische Kulturrevolution"
 SOV_INT_soviet_cultural_revolution_desc:0 "Eines der wichtigsten, wenn nicht das wichtigste Erfordernis der Revolution ist die Beendigung der konservativen und liberalen Denkweise, die in der Gesellschaft und Kultur verborgen ist und nach kapitalistischen Grundsätzen funktioniert. Aus diesem Grund ist eine Kulturrevolution erforderlich."
 SOV_INT_stalin_minister_of_nationalities:0 "Stalin im Narkomnat"
 SOV_INT_stalin_minister_of_nationalities_desc:0 "Genosse Stalin, ein fleißiger Revolutionär, hat lange über die Nationalitätenfrage nachgedacht. Er, selbst Georgier, hat eine Abhandlung über die nationale Frage und ihre Unterdrückung unter dem blutigen Zarenregime geschrieben. Niemand außer ihm ist besser geeignet, diese Position zu vertreten."
 SOV_INT_expand_komsomol:0 "Komsomol erweitern"
 SOV_INT_expand_komsomol_desc:0 "Die Grundlage für eine revolutionäre Lehre liegt logischerweise in der Sozialisierung, bei den Minderjährigen, in der Schule und hat somit auch Einfluss auf das familiäre Umfeld. Darüber hinaus muss eine zukünftige Generation junger Revolutionäre aufgebaut werden, deren Ideal darin besteht, die Freiheit des Volkes zu schützen."
 SOV_INT_likbez:0 "Likez"
 SOV_INT_likbez_desc:0 "Das Russische Reich hat sich nie darum gekümmert, der Bevölkerung die Grundlagen kritischen Denkens beizubringen, da dies nicht erwünscht war. Doch genau das ist nun unser Hauptziel. Wir von Likbez haben das Ziel, den Analphabetismus in der Sowjetbevölkerung auszurotten, denn die Möglichkeit, selbst zu denken, ist der erste Schritt zur Emanzipation der Arbeiterklasse."
 SOV_INT_atheistic_propaganda:0 "Atheistische Propaganda"
 SOV_INT_atheistic_propaganda_desc:0 "Die russische Orthodoxie ist seit langem eine mächtige Waffe zur Entfremdung der Arbeiterklasse und zur Ankurbelung des Nationalismus unter unseren Genossen. Dies könnte für künftige Maßnahmen problematisch sein und ist daher nicht erwünscht."
 SOV_INT_goelro:0 "GOELRO"
 SOV_INT_goelro_desc:0 "Viele halten dieses Projekt für utopisch, schlicht unmöglich, doch Genosse Lenins Glaube an seine Bedeutung und seinen Erfolg spricht dagegen. Die Elektrifizierung ist für die Verwirklichung des Kommunismus von grundlegender Bedeutung, da sie eine der größten Ressourcen für den technologischen Fortschritt darstellt. Prognosen gehen davon aus, dass in mindestens 20 bis 15 Jahren die gesamte Union elektrifiziert sein wird."
 SOV_INT_vkhutemas:0 "Wchutemas"
 SOV_INT_vkhutemas_desc:0 "Kunst ist die ultimative Ausdrucksform einer Person und deshalb besteht Vkhutemas, um Meisterkünstler mit den höchsten Qualifikationen für die Industrie sowie Bauarbeiter und Manager für die beruflich-technische Ausbildung vorzubereiten."
 SOV_INT_criticize_anarchist_and_syndicalist_deviances:0 "Kritisieren Sie anarchistische und syndikalistische Abweichungen"
 SOV_INT_criticize_anarchist_and_syndicalist_deviances_desc:0 "Unsere Genossen waren lange Zeit von den konterrevolutionären Anarchisten und Syndikalisten degeneriert worden, die bereits von Marx kritisiert wurden. Daher kann diese Ansicht nicht länger aufrechterhalten werden, da sie für die künftige Festigung der Macht des Proletariats problematisch sein könnte."
 SOV_INT_listen_to_the_decists:0 "Hören Sie den Decisten zu"
 SOV_INT_listen_to_the_decists_desc:0 "Unsere Partei ist von den Grundsätzen des demokratischen Zentralismus abgewichen, ebenso wie von der tatsächlichen Diktatur des Proletariats, da die Partei sich selbst zentralisierte und das wahre Ziel der Revolution, die Befreiung des Volkes, ablehnte. Die Diktatur verwandelte sich langsam in eine Parteidiktatur und sie lehnte den Grundsatz ab, dass jeder, der bereit ist, für das Volk zu kämpfen, ein Genosse von uns ist."
 SOV_INT_workers_in_the_party_apparatus:0 "Arbeiter im Parteiapparat"
 SOV_INT_workers_in_the_party_apparatus_desc:0 "Die letzte Volkszählung der bolschewistischen Parteimitglieder ergab einen erschreckenden Prozentsatz. Nur sehr wenige der bolschewistischen Mitglieder waren wirklich Arbeiter, Mitglieder von Syndikaten und Sowjets. Wie konnte die Sowjetmacht in den Händen so weniger Sowjets liegen?"
 SOV_INT_cut_party_privileges:0 "Parteiprivilegien kürzen"
 SOV_INT_cut_party_privileges_desc:0 "Die Partei hat dank ihrer Privilegien und einflussreichen Positionen in der Partei viele Karrieremacher angezogen. Wir wollen keinen dieser schmutzigen Individualisten in der Avantgarde unserer Revolution, der die Parteidiktatur festigen will."
 SOV_INT_denounce_cult_of_leadership:0 "Den Personenkult anprangern"
 SOV_INT_denounce_cult_of_leadership_desc:0 "Persönlichkeiten wie Lenin, Trotzki und Stalin werden in der Partei und im Volk zunehmend als unerreichbar, verehrt und als Berühmtheiten behandelt. Das ist nicht gut für die Revolution und sollte so schnell wie möglich beseitigt werden."
 SOV_INT_retake_first_international_precepts:0 "Nehmen Sie die Grundsätze von First International wieder auf"
 SOV_INT_retake_first_international_precepts_desc:0 "Die Zweite Internationale hatte sich bereits als problematisch für die Zukunft der Revolutionen weltweit erwiesen und muss daher in Vergessenheit geraten, da es klar ist, dass die aufgrund persönlicher Meinungsverschiedenheiten in Vergessenheit geratenen Grundsätze der Ersten Internationale im Hinblick auf eine breite Volksrevolution in einer Koalition mit Proudhon, Bakunin, Marx, Blanqui und Engels zum Wohle des Volkes viel fortschrittlicher waren, und diese Einheit muss bewahrt werden."
 SOV_INT_open_cc_meetings_to_party_members:0 "Offene CC-Sitzungen für Parteimitglieder"
 SOV_INT_open_cc_meetings_to_party_members_desc:0 "Genosse Obolensky argumentierte, dass die Sitzungen des Zentralkomitees allen kleineren Parteimitgliedern offen stehen sollten, es sei denn, es handele sich um vertrauliche Maßnahmen, die die Macht der Partei in den Händen der höheren Führer ihres Apparats dezentralisieren würden."
 SOV_INT_the_true_democratic_centralism:0 "Der wahre demokratische Zentralismus"
 SOV_INT_the_true_democratic_centralism_desc:0 "Es ist die Zeit gekommen, in der unsere Genossen mit Hilfe der Dezisten auf die Linie des echten demokratischen Zentralismus gestoßen sind, wo die Sowjetdiktatur dem Willen des Volkes folgt, gegen unnötige Gewalt vorgeht, Säuberungen durchführt ... der echte revolutionäre Staat."
 SOV_INT_all_power_to_the_soviets:0 "Alle Macht den Sowjets!"
 SOV_INT_all_power_to_the_soviets_desc:0 "Die wahren Revolutionäre sind das Volk. Keine Avantgarde sollte das Volk anführen, da das Volk bereits weiß, wie es sein Leben selbst zu meistern hat. Die Arbeiter und Bauern sollen den Weg der Revolution bestimmen, nicht nur in der Union, sondern auf der ganzen Welt."
 SOV_INT_expell_syndicalist_and_anarchist_members:0 "Abweichende Mitglieder ausschließen"
 SOV_INT_expell_syndicalist_and_anarchist_members_desc:0 "In den letzten Monaten ist in den Reihen der Partei eine syndikalistische und anarchistische Abweichung entstanden. Diese Abweichung erfordert die entschlossensten Maßnahmen des ideologischen Kampfes sowie eine Säuberung der Partei und ihre Wiederherstellung in einen gesunden Zustand."
 SOV_INT_renovationist_church:0 "Renovierungskirche"
 SOV_INT_renovationist_church_desc:0 "Es ist klar, dass die kirchlichen Praktiken von tiefstem Reaktionismus und menschenfeindlicher, elitärer Politik durchdrungen sind. Damit der Glaube in ständiger Entwicklung bleibt, versuchten die neuen Renovierer, diesen Ultrakonservatismus in der orthodoxen Kirche von innen heraus zu bekämpfen."
 SOV_INT_the_red_patriarch:0 "Der Rote Patriarch"
 SOV_INT_the_red_patriarch_desc:0 "Vater Tichon ist ein beliebter Führer, und obwohl er mit Problemen zu kämpfen hat, da die gesamte Orthodoxie von Reaktionärismus geplagt ist, ist ihm das Wohl des Volkes am Herzen. Darüber hinaus ist sein Segen für die Renovierung der Kirche erforderlich, um den reaktionären Status der Kirche wirklich zu ändern."
 SOV_INT_arrest_patriarch_tikhon:0 "Verhaftung von Patriarch Tikhon"
 SOV_INT_arrest_patriarch_tikhon_desc:0 "Patriarch Tichon ist ein Verräter der Revolution, ebenso wie der Konterrevolutionarismus, der die orthodoxen Priester plagt, und sein Widerstand gegen die Verstaatlichung der Kirchen ist Beweis genug für seine rücksichtslose Haltung gegenüber dem Volk."
 SOV_INT_criticize_left_communists:0 "Kritik am Linkskommunismus"
 SOV_INT_criticize_left_communists_desc:0 "Das Etikett „Linkskommunist“ ist nichts anderes als eine Kinderkrankheit und eine unsinnige Praxis, die einfach zum Ende der Chancen einer Weltrevolution führen würde und wird, wenn die Menschen jetzt völlig aufhören würden, sich politisch zu betätigen, indem sie sich in Gewerkschaften und Parlamentsfragen engagieren, was ihnen mit einem Schlag die Unterstützung entziehen würde."
 SOV_INT_the_comintern:0 "Die Komintern"
 SOV_INT_the_comintern_desc:0 "Es ist an der Zeit, dass unter Führung einer revolutionären Avantgarde eine neue kommunistische Internationale gegründet wird. Nun liegen die Fragen, die sich um die Zukunft der Revolutionen stellen, in den Händen der Komintern."
 SOV_INT_bolshevization_of_the_comintern:0 "Bolschewisierung der Komintern"
 SOV_INT_bolshevization_of_the_comintern_desc:0 "Die Bolschewiki waren die ersten, die mit ihrer Revolution schnell Erfolg hatten, und die Revolutionäre auf der ganzen Welt müssen, wenn sie auf dem Weg zur Weltrevolution Erfolg haben wollen, viel von ihnen lernen und sich deren militärischer und politischer Taktik unterwerfen."
 SOV_INT_ban_factionalism:0 "Fraktionalismus verbieten"
 SOV_INT_ban_factionalism_desc:0 "Fraktionalismus ist das Schlimmste, wounter eine revolutionäre Avantgardepartei leiden kann, und der Aufstieg von Fraktionen wie den Decisten und der Arbeiteropposition zeigt, dass dies ein aktuelles Problem für den Erhalt der kommunistischen Revolution darstellt. Im Interesse der Parteieinheit plädierte Genosse Lenin für die Wahrung des demokratisch-zentralistischen Merkmals der Aktionseinheit und verbot Fraktionen, die nach Abschluss der Debatten aktiv werden."
 SOV_INT_10th_congress:0 "10. Kongress der Kommunistischen Partei"
 SOV_INT_10th_congress_desc:0 "Kurz nach dem Sieg drängt die Partei auf einen neuen Kongress, um die Zukunft der Revolution als Ganzes zu überdenken und einen sozialistischen Staat zu schaffen, die Probleme zu lösen, die der Krieg mit sich brachte, wie etwa die verheerende Kriegspolitik der Kommunisten und andere Fragen dieser Art."
 SOV_INT_form_the_ussr:0 "Aus der UdSSR"
 SOV_INT_form_the_ussr_desc:0 "Der Krieg ist vorbei, die Sowjetrepubliken drängen darauf, die Union der Sowjetrepubliken, die lange gegen die weiße Bedrohung gekämpft hatten, zu offiziell zu machen, sie unter einer mächtigen Sowjetunion zu vereinen, ihren revolutionären Staat zu bewahren, um das Ziel der Weltrevolution voranzutreiben und die zukünftigen Revolutionen zu schützen."
 SOV_INT_korenizatsiia:0 "Korenizatsiia"
 SOV_INT_korenizatsiia_desc:0 "Die Menschen im berüchtigten Russischen Reich litten lange unter der kulturellen Auslöschung durch die große Russophilie-Plage. Den Genossen war es verboten, ihre eigene Persönlichkeit auszudrücken. Die Revolution soll diese Menschen befreien. Durch die Indigenisierungspolitik können die Menschen endlich ihre verschiedenen Kulturen würdigen, ohne Angst vor Bestrafung haben zu müssen."
 SOV_INT_sr_autonomism:0 "SR-Autonomismus"
 SOV_INT_sr_autonomism_desc:0 "Genosse Skrypnyk und andere prominente Revolutionäre anderer Nationalitäten plädieren für eine weitgehende Entscheidungsautonomie der Sowjetrepubliken, auch wenn diese noch immer in die Union integriert sind. Russland hat kein Recht, in dieser Union die Allmacht zu übernehmen. Wir wollen nicht dem zaristischen Weg folgen. Die lokalen Nationalitäten haben das Recht, sich für die Rolle der Sozialrevolutionäre zu entscheiden und verfügen über autonome Rechte."
 SOV_INT_hinder_skrypnyk_autonomists_influence:0 "Behindern Sie den Einfluss der Autonomen von Skrypnyk"
 SOV_INT_hinder_skrypnyk_autonomists_influence_desc:0 "Da sich die Union um Moskau konzentriert, könnte eine starke Dezentralisierung der Macht in der Union nur zu Instabilität führen und außerdem zu mehr Meinungsverschiedenheiten und einem Anstieg des Chauvinismus in den Reihen unserer Partei."
 SOV_INT_assassinate_enver_pasha:0 "Ermordung von Enver Pascha"
 SOV_INT_assassinate_enver_pasha_desc:0 "Enver Pascha ist ein Verräter der Türken und der Sowjets und nichts anderes als ein chauvinistischer Abschaum, der das Volk zu seinem verdorbenen Nationalismus treibt, in einem Ideal, das nicht einmal er selbst versteht."
 SOV_INT_shut_down_the_basmachi_sun:0 "Schalten Sie den Basmachi aus"
 SOV_INT_shut_down_the_basmachi_sun_desc:0 "Diese pantürkischen Nationalisten wollen nichts mit dem Volk zu tun haben, sie agieren lediglich als konterrevolutionäre Banditen, desorganisiert und ohne wirkliches Ziel. Dieser unsinnige Aufruhr der Massen muss zusammen mit seinen Agitatoren bekämpft werden."
 SOV_INT_stalins_rise_to_power:0 "Stalins Aufstieg zur Macht"
 SOV_INT_stalins_rise_to_power_desc:0 "Genosse Stalin hat sich als vertrauenswürdiger, eiserner und hart arbeitender Revolutionär erwiesen. Seine Bemühungen, in den Reihen unserer Partei aufzusteigen, sind würdigend und sein Einsatz wird der Zukunft des Weltsozialismus guttun. Unter seiner Führung werden große Dinge erreicht werden."
 SOV_INT_trotskys_succession:0 "Trotzkis Nachfolge"
 SOV_INT_trotskys_succession_desc:0 "Trotzki war eine der Hauptfiguren der Revolution, im Westen wegen seines Genies gefürchtet und nicht nur für seine militärischen, sondern auch für seine politischen Taten gelobt. Er ist der richtige Genosse, um die Führung unserer erfolgreichen Revolution zu übernehmen und das Erbe des Genossen Lenin in der Union weiter voranzutreiben."
 SOV_INT_align_zinoviev:0 "Sinowjew ausrichten"
 SOV_INT_align_zinoviev_desc:0 "Sinowjew ist ein wichtiger Genosse von uns, der dank seiner Position bei der Komintern viele Anhänger hat, und unter den versklavten Genossen des Ostens ist seine Unterstützung für die Führung der Partei notwendig."
 SOV_INT_align_kamenev:0 "Kamenew ausrichten"
 SOV_INT_align_kamenev_desc:0 "Genosse Kamenew ist ein einflussreicher Name in den Reihen unserer Partei. Seine Positionen sind umstritten, werden aber dennoch von vielen gehört. Sein Beitrag zur Revolution ist unbestreitbar. Seine Unterstützung wird unserem Kampf um die Parteiführung Unterstützung bringen."
 SOV_INT_align_bukharin:0 "Bucharin ausrichten"
 SOV_INT_align_bukharin_desc:0 "Genosse Bucharin ist heute neben Stalin und Trotzki einer der einflussreichsten Bolschewiki und der Genosse, der die arme Bauernschaft erreichen konnte. Er genießt neben anderen wichtigen Persönlichkeiten der Partei deren volle Unterstützung. Seine Unterstützung gegen die Opportunisten in der Partei ist mehr als willkommen."
 SOV_INT_stalinists_in_the_party_apparatus:0 "Stalinisten im Parteiapparat"
 SOV_INT_stalinists_in_the_party_apparatus_desc:0 "Die Gefahr einer abweichenden Haltung Trotzkis steht unmittelbar bevor. Wir müssen keinerlei Toleranz gegenüber Menschen zeigen, die unsere Revolution zerstören wollen, und gegenüber jenen, die mit ihr kollaborieren. Um die richtige Linie der Sozialistischen Republiken sicherzustellen, sollte der Generalsekretär, unser Genosse Stalin, seine Getreuen in diese Positionen berufen."
 SOV_INT_antisemitic_propaganda:0 "Antisemitische Propaganda"
 SOV_INT_antisemitic_propaganda_desc:0 "Jede hilfreiche Maßnahme ist willkommen. Seine abweichenden Positionen sind nicht nur auf seinen wohlhabenden Hintergrund zurückzuführen, der bereits zeigt, dass er eine Bedrohung für die Revolution und die Arbeiterklasse darstellt, sondern auch seine jüdischen Wurzeln sind Teil des Problems."
 SOV_INT_publish_lenins_testament:0 "Lenins Testament veröffentlichen"
 SOV_INT_publish_lenins_testament_desc:0 "Genosse Lenin hatte seine endgültige und letzte Ansicht parteiweit veröffentlicht und seine Kritik an einflussreichen Parteimitgliedern, darunter Stalin, seiner Gewalt und Brutalität geäußert. Diese Ansicht würde die Haltung unserer Genossen ihm gegenüber ändern."
 SOV_INT_criticize_stalins_position_on_georgia:0 "Kritik an Stalins Position zu Georgien"
 SOV_INT_criticize_stalins_position_on_georgia_desc:0 "Stalins repressive Maßnahmen im Zusammenhang mit der Invasion Georgiens sind nicht hinnehmbar, insbesondere nicht für einen möglichen Generalsekretär. Diese Ansicht könnte für künftige Maßnahmen problematisch sein, und seine geringe Toleranz gegenüber den Ansichten anderer Genossen ist nicht akzeptabel."
 SOV_INT_ice_cruise_of_the_baltic_fleet:0 "Eiskreuzfahrt der Baltischen Flotte"
 SOV_INT_ice_cruise_of_the_baltic_fleet_desc:0 "Die russische königliche Marine liegt in Trümmern, ihre Überreste sind für uns von Nutzen, und die drohende deutsche Besetzung unserer Marinestützpunkte steht vor der Tür. Die Baltische Flotte muss unseren Kameraden in Kronstadt übergeben werden, sie werden sich gut darum kümmern."
 SOV_INT_dealing_with_the_red_sailors:0 "Umgang mit den Roten Matrosen"
 SOV_INT_dealing_with_the_red_sailors_desc:0 "Die Matrosen von Kronstadt wurden oft als die „Rotesten der Roten“ bezeichnet, und jetzt fordern sie aufgrund zahlreicher Probleme während der Revolution Änderungen in der Arbeitsweise der Partei und in der Führung der Volksdemokratie. Sollten wir auf unsere Kameraden hören?"
 SOV_INT_crush_rebel_saillors:0 "Zerschmettere die rebellischen Matrosen"
 SOV_INT_crush_rebel_saillors_desc:0 "Die Matrosen haben die Revolution verraten, um ihre individualistischen oder grundlosen Wünsche zu erfüllen. Dadurch ist unsere Marine arm geworden. Wir können nicht zulassen, dass der revolutionäre Militärapparat dadurch zersetzt und beschädigt wird. In solchen Momenten ist Disziplin mit eiserner Faust erforderlich."
 SOV_INT_the_red_power_in_the_seas:0 "Die Revolution der Meere"
 SOV_INT_the_red_power_in_the_seas_desc:0 "Das Meer ist das Territorium eines der einflussreichsten Militärgebiete, einflussreich für Politik und Wirtschaft. Zum Schutz der Zukunft unserer Revolution sowie zur Garantie des Revolutionsrechts anderer versklavter Nationen ist es notwendig, dass die Bolschewiken den Roten die Kontrolle über die Meere abnehmen, so wie es einst das Zaristische Russische Reich war, und die Rote Flotte wird es auch sein."
 SOV_INT_sell_old_fleet_for_economic_relief:0 "Verkaufen Sie alte Flotte zur wirtschaftlichen Entlastung"
 SOV_INT_sell_old_fleet_for_economic_relief_desc:0 "Die alte Flotte ist nahezu irreparabel. Wir können derzeit nicht die Anstrengungen unternehmen, die nötig wären, um die rote Flotte wiederaufzubauen. Wir haben andere Probleme, vor allem wirtschaftliche, also wäre es das Klügste, diese als Schrott an die Deutschen zu verkaufen."
 SOV_INT_assault_wrangels_fleet:0 "Angriff auf Wrangels Flotte"
 SOV_INT_assault_wrangels_fleet_desc:0 "Die Schwarzmeerflotte wurde vollständig von den Weißen beherrscht und kontrolliert. Diese Flotte ist für den Wiederaufbau unserer Roten Flotte von grundlegender Bedeutung. Wir können nicht zulassen, dass diese Konterrevolutionäre mit einem Teil der mächtigsten Militärwaffen des Russischen Reiches ihren Absichten nachkommen."
 SOV_INT_attack_kronstadt:0 "Angriff auf Kronstadt"
 SOV_INT_attack_kronstadt_desc:0 "Die rebellischen Matrosen von Kronstadt sind Konterrevolutionäre unter der Führung der Franzosen, Anarchisten und anderer Volksfeinde. Sie verdienen keine Gnade, und wenn sie Krieg führen, die Bevölkerung aufwiegeln und freiwillig unsere eigene Flotte zerstören, dann werden sie Krieg führen."
 SOV_INT_fund_the_red_fleet_reconstruction:0 "Finanzieren Sie den Wiederaufbau der Roten Flotte"
 SOV_INT_fund_the_red_fleet_reconstruction_desc:0 "Die kaiserlich-russische Marine, einst eine der stärksten aller Marinen, wurde durch Nikolais Inkompetenz sowie durch die Interventionisten und Sabotage der weißen Konterrevolutionäre schrittweise demontiert. Um sie wieder aufzubauen, müssen wir die Massenproduktion finanzieren und sicherstellen, dass unsere Matrosen perfekte Arbeit leisten."
 SOV_INT_listen_to_rebels_demands:0 "Hören Sie auf die Forderungen der Rebellen"
 SOV_INT_listen_to_rebels_demands_desc:0 "Die Forderungen der Rebellen von Kronstadt und Petrograd sind absolut gerechtfertigt, da einige der katastrophalen politischen Maßnahmen, die wir ergreifen mussten, die Arbeiter im gesamten Sowjetgebiet in schwierige Zeiten brachten. Und wie die demokratischen Zentralisten bereits zuvor sagten: Die Partei ist von den demokratischen Prinzipien für das Volk abgewichen. Wir müssen das ohne Blutvergießen wiedergutmachen."
 SOV_INT_focus_on_the_land:0 "Konzentrieren Sie sich auf das Land"
 SOV_INT_focus_on_the_land_desc:0 "Was von der Kaiserlich Russischen Marine übrig war, gibt es nicht mehr. Wir können eine irreparabel zerstörte Flotte nicht aufrechterhalten. Die Rote Flotte wird repariert, aber jetzt braucht das Landheer die Mittel."
 SOV_INT_rkka:0 "Die RKKA"
 SOV_INT_rkka_desc:0 "Es gibt nur einen Weg, die Wiederherstellung der Polizei zu verhindern, und zwar die Schaffung einer Volksmiliz und ihre Verschmelzung mit der Armee (wobei das stehende Heer durch die Bewaffnung des gesamten Volkes ersetzt werden muss)."
 SOV_INT_democratize_the_army:0 "Demokratisierung der Armee"
 SOV_INT_democratize_the_army_desc:0 "Genosse Krylenko plädierte für eine Demokratisierung der Militärkader, da die Hierarchie in der Armee dennoch ein Spiegelbild der geschichteten Gesellschaft sei, in der wir lebten, und die Unterordnung nur die Revolutionäre zurückbringe und das Volk in Unruhe bringe."
 SOV_INT_retake_army_hierarchy:0 "Lebenslauf Armeehierarchie"
 SOV_INT_retake_army_hierarchy_desc:0 "Die Streitkräfte könnten vor Ort am effizientesten mit den traditionellen Mitteln und in der traditionellen Hierarchie arbeiten. Unser Hauptanliegen besteht darin, sie wieder in die Rote Armee einzugliedern, um die Revolution angemessen gegen interventionistische Konterrevolutionäre verteidigen zu können."
 SOV_INT_call_former_tsarist_officers:0 "Rufen Sie ehemalige zaristische Offiziere an"
 SOV_INT_call_former_tsarist_officers_desc:0 "Eine Armee, die ausschließlich aus ehemaligen Arbeitern und unerfahrenen Soldaten niedriger Dienstgrade besteht, ist keine wirkliche Armee. Sie ist vom Unglück verfolgt. Deshalb ist es für eine wirkliche Reform der Roten Armee notwendig, ehemalige Offiziere der Königlichen Armee mit Kampf- und Militärtaktikerfahrung zu integrieren."
 SOV_INT_red_guard_primacy:0 "Vorrang der Roten Garde"
 SOV_INT_red_guard_primacy_desc:0 "Die Roten Garden waren die erste Form einer demokratischen Streitmacht, die die Sowjets auf russischem Gebiet gesehen haben. Sie haben sich bei der Verteidigung Petrograds bewährt und ihre Reihen erweitert. Wir sollten in der Lage sein, unsere organisatorischen Probleme zu bewältigen."
 SOV_INT_instensify_propaganda:0 "Propaganda intensivieren"
 SOV_INT_instensify_propaganda_desc:0 "Soldaten sind Teil des Proletariats, das Unruhen zur Verteidigung des Volkes anzettelt, und sie sollten nur in letzter Instanz bekämpft werden. Zuerst sollte unsere Sichtweise sie erreichen, da sie, da sie größtenteils Teil des Volkes sind, höchstwahrscheinlich daran festhalten und ihre eigene Revolution starten werden, ohne dass unser direktes Eingreifen erforderlich ist."
 SOV_INT_socialist_militias:0 "Sozialistische Milizen"
 SOV_INT_instensify_propaganda_desc:0 "Genosse Podvoisky, einer der Gründer der Roten Armee, schlägt zur angemessenen Verteidigung des Proletariats die Organisation lokaler und vielfältigerer sozialistischer Milizen vor, die von kampfbereiten Arbeitern und Soldaten geführt werden."
 SOV_INT_gru:0 "Der GRU"
 SOV_INT_gru_desc:0 "Der Vorschlag des Genossen Tuchatschewski, Sperrtruppen zu bilden, um die Disziplin innerhalb der Armee aufrechtzuerhalten, wurde von Genosse Trotzki gebilligt. Wir können im Moment nicht mit Desorganisation arbeiten."
 SOV_INT_ethnic_regiments:0 "Ethnische Regimenter"
 SOV_INT_ethnic_regiments_desc:0 "Das ehemalige Russische Reich bestand aus einer großen Vielfalt an Nationalitäten, die um jeden Preis zugunsten des großrussischen Chauvinismus unterdrückt wurden. Ihre Hilfe im Militär wird von großer Bedeutung sein, und Genossen wie Ma Shanqi, die den Willen haben, ihr Volk zur Revolution zu führen, werden der Armee in großem Umfang mit Sonderregimentern helfen."
 SOV_INT_red_partisanism:0 "Roter Partisanismus"
 SOV_INT_red_partisanism_desc:0 "Unser größter Vorteil besteht sicherlich darin, dass wir für das Volk kämpfen und dass das Volk daher an unserer Seite kämpft. Das bedeutet, dass unsere Kameraden in jedem von den Weißen oder anderen Interventionisten dem Untergang geweihten Gebiet immer noch das Recht haben, an unserer Seite zu kämpfen und sich um das innere Gebiet dieser Konterrevolutionäre zu kümmern."
 SOV_INT_red_army_demobilization:0 "Demobilisierung der Roten Armee"
 SOV_INT_red_army_demobilization_desc:0 "Es ist an der Zeit, nach dem Erfolg der Revolution über die Probleme innerhalb der Armee nachzudenken und sie zu lösen. Als Erstes müssen wir ihre Reihen verringern, um eine angemessene Reform durchzuführen und den revolutionären Staat nicht mit hohen Unterhaltskosten zu belasten."
 SOV_INT_general_staff_academy_of_the_red_army:0 "Generalstabsakademie der Roten Armee"
 SOV_INT_general_staff_academy_of_the_red_army_desc:0 "Es ist notwendig geworden, die Zukunft der Roten Armee zu planen und auszubilden, indem eine Militärakademie gegründet wird, um die besten Militärgenies für die Verteidigung der unaufhörlichen Revolution auf der ganzen Welt hervorzubringen."
 SOV_INT_international_affairs:0 "Internationale Angelegenheiten"
 SOV_INT_international_affairs_desc:0 "Die Revolution muss sich über den ganzen Globus ausbreiten, von den Ausgebeuteten im Kern des Kapitalismus bis zu den Versklavten des Ostens und der Kolonien, und wir, als erste Säule der Revolution, müssen diese Revolutionen bei ihrer Entwicklung unterstützen."
 SOV_INT_aid_finnish_reds:0 "Helfen Sie den finnischen Roten"
 SOV_INT_aid_finnish_reds_desc:0 "Auch in Finnland hat die Revolution begonnen. Das Land war lange Zeit vom Zarenreich kolonisiert und hat nun die Chance auf Freiheit. Es hat bereits seinen Wunsch geäußert, unabhängig zu bleiben, und das sollten wir respektieren."
 SOV_INT_intervene_in_finland:0 "Intervenieren Sie in Finnland"
 SOV_INT_intervene_in_finland_desc:0 "Das harte Eingreifen der Deutschen und die starke Präsenz der weißen Armee erschwerten den finnischen Roten Garden das Leben. Um ihnen dieses Versagen wiedergutzumachen, mussten wir eine Operation starten, um in das Gebiet der Mannerheimer einzudringen und die tyrannische Herrschaft der weißen Antikommunisten zu beenden."
 SOV_INT_advise_the_delay_of_german_revolution:0 "Raten Sie zur Verzögerung der deutschen Revolution"
 SOV_INT_advise_the_delay_of_german_revolution_desc:0 "Auch wenn die Zeit nach einer Revolution schreit und der Kampf der Arbeiter brodelt, brauchen die Kommunisten in Deutschland noch ein paar Schritte, damit die Revolution reibungslos gelingen kann. Da ihre Arbeit im Volk inzwischen ausgeschöpft ist, ist jetzt nicht der richtige Zeitpunkt dafür."
 SOV_INT_bolshevik_brigades:0 "Bolschewistische Brigaden"
 SOV_INT_bolshevik_brigades_desc:0 "Die deutschen Kommunisten gehören zu den am weitesten entwickelten kommunistischen Kadern im Kern des Kapitalismus, und ihre Arbeit bei der Durchdringung der Arbeiterschaft hat sich jetzt, zu Beginn einer der wichtigsten Revolutionen des Augenblicks, als Erfolg erwiesen. Ihr Erfolg ist von größter Bedeutung."
 SOV_INT_invite_kapd_to_comintern:0 "KAPD zur Komintern einladen"
 SOV_INT_invite_kapd_to_comintern_desc:0 "Nach dem harten Bruch der deutschen kommunistischen Bewegungen haben wir an der Spitze der Komintern die Pflicht, alle unsere Genossen, einschließlich derer in den Fraktionen, auf der richtigen Linie zu halten. Die KAPD, die sich bei der Komintern beworben hat, sollte aufgenommen werden, auch mit Rücksicht auf die KPD und Radek."
 SOV_INT_back_kpd:0 "Zurück KPD"
 SOV_INT_back_kpd_desc:0 "Der Fraktionalismus der deutschen kommunistischen Bewegung hat diese in eine Position geschwächt, in der es ihr schwerfallen wird, ihre Form und ihren Einfluss zu bewahren. Keiner Fraktion, die diese Selbstsabotagemaßnahme ergriffen hat, sollte vergeben werden, und wir müssen den wahren deutschen Kommunisten helfen, ihren früheren Ruhm wiederzuerlangen."
 SOV_INT_intervene_in_hungarian_invasion:0 "In die ungarische Invasion eingreifen"
 SOV_INT_intervene_in_hungarian_invasion_desc:0 "Die expansionistischen Bestrebungen, die sich hinter dem Antikommunismus der Europäer verbergen, zeigten sich in den ungerechten Interventionen und Invasionen auf ungarischem Gebiet, das von unseren Werktätigen und Genossen befreit worden war. Als Béla Kun das Schicksal der Revolution erkannte, rief er die Bolschewiken um Hilfe."
 SOV_INT_back_bela_kun:0 "Zurück Béla Kun"
 SOV_INT_back_bela_kun_desc:0 "Wir können nicht auf weitere Kämpfe hoffen, da unser Volk aufgrund der Katastrophe unseres Krieges dringend das Nötigste braucht. Die ungarischen Genossen müssen sich verteidigen, und mit Béla Kun sind sie dazu in der Lage."
 SOV_INT_romanian_ultimatum:0 "Rumänisches Ultimatum"
 SOV_INT_romanian_ultimatum_desc:0 "Rumänien marschiert in seinem äußerst nationalistischen und expansionistischen Vorstoß in Ungarn ein, um seinen Einfluss auf die neu gegründeten ehemaligen österreichisch-ungarischen Republiken auszuweiten. Ihr Kampf gegen unsere Kameraden kann nicht toleriert werden. Entweder sie stellen diese unsinnige Invasion ein, oder sie werden sich der Roten Armee stellen müssen."
 SOV_INT_french_ultimatum:0 "Französisches Ultimatum"
 SOV_INT_french_ultimatum_desc:0 "Frankreich weitet seinen Einfluss auf die versklavten, durch nationalistische Tendenzen unterdrückten Nationalitäten aus und stellt durch seine Politik eine Bedrohung für die ungarischen Sowjets dar. Eine Beteiligung Frankreichs am Ungarnkrieg sollte vermieden werden, und wir werden uns darum kümmern."
 SOV_INT_form_the_polrewkom:0 "Bilden Sie den Polrewkom"
 SOV_INT_form_the_polrewkom_desc:0 "Angesichts der kommunistischen revolutionären Erfolge im gesamten Gebiet ist es notwendig geworden, eine provisorische Regierung für die Arbeiter und Bauern des lange versklavten polnischen Volkes zu schaffen, um die Revolution in naher Zukunft in die Hände der Arbeiterpartei zu legen."
 SOV_INT_the_bulgarian_question:0 "Die bulgarische Frage"
 SOV_INT_the_bulgarian_question_desc:0 "In Zeiten der Spannungen auf bulgarischem Gebiet, nach der Absetzung von Stamboliyski, unternahmen die Genossen Dimitrov und Kabakchiev, führende Persönlichkeiten der Bewegung, wenig bis gar keine politische Bewegung. Diese politische Kapitulation vor der protofaschistischen Tyrannei von Tsankov sollte nicht akzeptiert werden. In Zeiten des Aufstands sollten wir nicht schweigen."
 SOV_INT_ignite_tataburnay_uprising:0 "Entfachen Sie den Tataburnay-Aufstand"
 SOV_INT_ignite_tataburnay_uprising_desc:0 "Das rumänische Volk ist lange genug von der oligarchischen und bürgerlichen Diktatur versklavt worden. In Momenten der Unruhe ruft sein Volk auf der ganzen Welt zum Aufstand auf, und wir haben die Tatkraft, ihn zu unterstützen."
 SOV_INT_arm_mongol_revolutionaries:0 "Bewaffnen Sie die mongolischen Revolutionäre"
 SOV_INT_arm_mongol_revolutionaries_desc:0 "Die Mongolei steht am Rande einer weiteren Revolution, gegen die chinesische Besatzung, von der sie vor einem Jahrzehnt zu entkommen versuchte, und gegen die Autokratie des Bogd Khan. Mongolische Genossen haben sich an uns gewandt, um im Rahmen unserer Revolution einen bewaffneten Aufstand zu starten. Bis dahin müssen sie gut bewaffnet sein."
 SOV_INT_aid_jangal_movement:0 "Helfen Sie der Jangal-Bewegung"
 SOV_INT_aid_jangal_movement_desc:0 "Die Jangal-Bewegung kämpft mehrheitlich gegen die Tyrannei der monarchischen Macht und will dem Volk die Macht bringen. Ihre Sympathie für die bolschewistische Bewegung beweist nur, dass sie vertrauenswürdige Genossen sind."
 SOV_INT_deepen_jangali_help:0 "Deepen Jangali Hilfe"
 SOV_INT_deepen_jangali_help_desc:0 "Die iranische Monarchie hat als die britischen Welpen, die sie nun einmal sind, den weißen Konterrevolutionären geholfen und mit ihnen zusammengearbeitet und ihnen die Flucht ermöglicht. Die Jangal-Bewegung muss sich mit diesem halbkolonialen Staat auseinandersetzen, damit wir wirklich sicherstellen können, dass die Weißen nicht noch einmal durch den Iran ziehen."
 SOV_INT_russo_persian_treaty_of_friendship:0 "Russisch-Persischer Freundschaftsvertrag"
 SOV_INT_russo_persian_treaty_of_friendship_desc:0 "Wir müssen uns rasch mit dem Problem der weißen Flüchtlinge befassen, die im Iran politisches Asyl und Zuflucht suchen, da sie eine Invasion sowjetischen Territoriums organisieren könnten. Dazu müssen wir die russisch-iranischen Beziehungen wieder aufnehmen."
