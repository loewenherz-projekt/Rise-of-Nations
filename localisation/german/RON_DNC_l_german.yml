rondncevent.1.t:0 "Der Anführer von [ROOT.GetNeutralParty] spricht"
rondncevent.1.d:0 "Heute versammelten sich viele Menschen in [Root.Capital.GetName], um der Rede des Vorsitzenden von [ROOT.GetNeutralParty] zuzuhören. Er sprach ausführlich über die Errungenschaften der aktuellen demokratischen Regierung, schwärmte aber schließlich von [ROOT.GetName]s vergangener Größe und davon, dass das Land nur noch ein Schatten seiner selbst sei. Dies scheint einen Nerv getroffen zu haben, da viele Menschen mit dem Kabinett von [ROOT.GetLeader] nicht ganz zufrieden sind."
rondncevent.1.a:0 "Er scheint ein feiner Mann zu sein."

rondncevent.2.t:0 "Ein interessantes Angebot"
rondncevent.2.d:0 "Der Vorsitzende von [ROOT.GetNeutralParty] saß in seinem Sessel und bereitete sich auf seine Regierungszeit vor, da alle Umfragen einen Erdrutschsieg für ihn und seine Partei voraussagten. Plötzlich klopfte es an der Tür. Er öffnete, fand aber nur einen Brief vor: „Wenn Sie [ROOT.GetNameDef] zu dem Ruhm verhelfen wollen, den es verdient, dann nutzen Sie Ihren Schwung und tun Sie das Richtige.“ Der Brief stammte von einem hochrangigen Armeegeneral und deutete auf einen Putsch hin. Wie sollte er reagieren?"
rondncevent.2.a:0 "Es ist Zeit, dass wir die Ordnung in [ROOT.GetName] wiederherstellen."
rondncevent.2.b:0 "Meint er das ernst? Natürlich nicht."

rondncevent.3.t:0 "Der Volksprotest"
rondncevent.3.d:0 "Kurz nach der Machtübernahme von [ROOT.GetLeader] begannen Gewerkschafter, Studenten und andere Liberale im ganzen Land zu protestieren. Wir müssen schnell für Ordnung sorgen, sonst wird [ROOT.GetLeader] nur noch eine Fußnote in der Geschichte sein."
rondncevent.3.a:0 "Wer hätte das vorhersehen können?"

rondncevent.4.t:0 "Der erste [ROOT.GetAdjective] Kongress"
rondncevent.4.d:0 "Heute, am [GetDateText], versammelten sich Menschen vor dem neuen Kongressgebäude in [Root.Capital.GetName]. Dort hielt [ROOT.GetLeader] eine große Rede über die Zukunft der Nation und seine Pläne für die nächsten Jahre seiner Amtszeit. Später am selben Tag verabschiedete das Parlament bereits sein erstes Gesetz."
rondncevent.4.a:0 "Was für ein toller Start!"

rondncevent.5.t:0 "Der Tag des Seils"
rondncevent.5.d:0 "Es war ein bewölkter Tag in [Root.Capital.GetName], und zu sagen, dass dies dem Anblick entsprach, den viele Bürger „genossen“, wäre untertrieben. Überall in der Stadt hingen Gewerkschaftsaktivisten, Demonstranten und andere Menschen an Laternenpfählen. Niemand sagte ein Wort, aus Angst, der Nächste zu sein."
rondncevent.5.a:0 "Sie haben es verdient."

rondncevent.6.t:0 "Die Krönung von [ROOT.GetLeader]"
rondncevent.6.d:0 "Nach den letzten Wochen und Monaten des Kampfes hat [ROOT.GetLeader] seine Herrschaft über [ROOT.GetName] endlich gefestigt und wurde heute endlich gekrönt. Unzählige Menschen kamen zusammen, sei es aus Angst oder aus echtem Patriotismus, und feierten ihren neuen König."
rondncevent.6.a:0 "Endlich ist es vorbei."

rondncevent.7.t:0 "Das Schicksal des Adels"
rondncevent.7.d:0 "Nachdem [ROOT.GetName] nun eine Demokratie geworden ist, muss entschieden werden, was mit den ehemaligen Aristokraten geschehen soll. Viele unserer radikaleren Parteimitglieder wollen ihnen nicht nur ihre Titel entziehen, sondern sie auch aus [ROOT.Capital.GetName] verbannen. Obwohl dies unser Engagement für die Demokratie unter Beweis stellen könnte, gibt es höchstwahrscheinlich auch eine weniger extreme Option."
rondncevent.7.a:0 "Entfernen Sie ihre Titel, aber sonst nichts."
rondncevent.7.b:0 "Entziehen Sie ihnen ihre Titel und öffnen Sie den Königspalast für die Öffentlichkeit."
rondncevent.7.c:0 "Verbannen Sie sie in ein weit entferntes Dorf."

rondncevent.8.t:0 "Das Schicksal der Demonstranten"
rondncevent.8.d:0 "Wir haben [ROOT.GetName] mehr oder weniger fest im Griff, aber eine Frage bleibt: Was tun mit denen, die sich uns widersetzt haben? Wenn wir sie freilassen, besteht immer noch die Gefahr, dass sie neuen Ärger verursachen, aber eine Chance auf Erlösung könnte genau das sein, was [ROOT.GetLeader] braucht, um in der Öffentlichkeit als humaner wahrgenommen zu werden."
rondncevent.8.a:0 "Lassen Sie sie frei, solange sie keinen neuen Ärger verursachen."
rondncevent.8.b:0 "Sperren Sie sie für immer weg."

rondncevent.9.t:0 "Es ist vollbracht"
rondncevent.9.d:0 "Nach sechs langen Monaten harter Arbeit haben wir endlich das ehrgeizigste Projekt in der Geschichte von [ROOT.GetName] abgeschlossen. In [ROOT.Capital.GetName] wird gefeiert, als [ROOT.GetLeader] endlich die neue zivile Fabrik eröffnet."
rondncevent.9.a:0 "Perfekt, genau das, was wir brauchten."

rondncevent.10.t:0 "Die Zolldebatte"
rondncevent.10.d:0 "Sie ist immer wieder Thema: die Debatte über unsere Zölle. Während konservative Politiker argumentieren, hohe Zölle würden unsere Industrie schützen, behaupten andere, niedrige Zölle würden unseren Handel ankurbeln. Offensichtlich können wir uns nur für eine Option entscheiden."
rondncevent.10.a:0 "Für manche Produkte können die Zölle niedrig sein, für die meisten sollten sie jedoch hoch sein."
rondncevent.10.b:0 "Niedrige Zölle werden unsere Wirtschaft wieder auf Kurs bringen."

rondncevent.11.t:0 "Der erste [ROOT.GetAdjective] Traktor"
rondncevent.11.d:0 "Heute war [ROOT.GetLeader] ausnahmsweise mal auf dem Land unterwegs. Nicht, um Wahlkampf zu machen, sondern um den Bauern und der Presse die neueste Erfindung und die „Zukunft der Landwirtschaft“, wie er es nannte, vorzustellen. Die Reaktionen fielen allerdings weniger begeistert aus. Als der Metallgigant, auch bekannt als „Traktor“, auf den Markt kam, waren viele Bauern zunächst verschreckt, begannen ihn aber nach einiger Zeit zu schätzen."
rondncevent.11.a:0 "Wir haben einen guten Start hingelegt."

rondncevent.12.t:0 "Experimentieren mit Dünger"
rondncevent.12.d:0 "Im Zuge der Modernisierung der Landwirtschaft begann die Regierung, Chemieunternehmen zu subventionieren, und dies scheint sich endlich auszuzahlen. Führende Forscher präsentierten heute einen „Dünger“, der das Pflanzenwachstum um beeindruckende 5 bis 10 Prozent steigern soll."
rondncevent.12.a:0 "Von hier an kann es nur noch aufwärts gehen."

rondncevent.13.t:0 "Die Rolle der Artillerie"
rondncevent.13.d:0 "Angesichts der ständigen Weiterentwicklung der modernen Kriegsführung ist es an der Zeit, über die Rolle einer ihrer neuesten Erfindungen zu entscheiden: der Artillerie. Artillerie kann eine entscheidende Rolle spielen, ist aber auch teurer als ein herkömmliches Gewehr. Welche Bedeutung sollte ihr also beigemessen werden?"
rondncevent.13.a:0 "Die Artillerie sollte eine unterstützende Rolle spielen."
rondncevent.13.b:0 "Die Artillerie sollte eine direktere Rolle im Kampf spielen."

DNC_project_tp:0 "Sobald der Geist erlischt, erhalten wir eine §Zivilfabrik§!"
