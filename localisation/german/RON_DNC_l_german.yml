l_german:

DNC_democracy_in_the_20th_century:0 "Demokratie im 20. Jahrhundert"
DNC_democracy_in_the_20th_century_desc:0 "Wir müssen zur politischen Landschaft des neuen Jahrhunderts Stellung beziehen."
DNC_calls_of_the_old:0 "Die Rufe der Alten"
DNC_calls_of_the_old_desc:0 "Der Monarchismus hat sich als das beste und widerstandsfähigste politische System erwiesen, das die Menschheit kennt. Wir müssen es weiterverfolgen und noch besser machen."
DNC_find_a_heir:0 "Einen Erben finden"
DNC_find_a_heir_desc:0 "Um sicherzustellen, dass unser Thron uns gehört, müssen wir einen angemessenen Erben finden, der ihn zu gegebener Zeit antritt."
DNC_calm_the_protests:0 "Beruhigt die Demonstranten"
DNC_calm_the_protests_desc:0 "Bevor wir mit unseren Plänen weitermachen, müssen wir auf jede mögliche Weise sicherstellen, dass die Menschen das System voll akzeptieren, nur dann können wir es tun."
DNC_the_referendum:0 "Das Referendum"
DNC_the_referendum_desc:0 "Jetzt, da alles vorbereitet ist, können wir mit der Änderung unserer Politik beginnen. Wir müssen nur noch mehr Unterstützung für die Sache gewinnen."
DNC_reignite_nationalism:0 "Den Nationalismus neu entfachen"
DNC_reignite_nationalism_desc:0 "Wenn der Nationalismus nicht kontrolliert wird, kann er sich zu etwas wirklich Schlimmen entwickeln. Doch wenn man es richtig macht, kann man ihn mit maximaler Effizienz einsetzen. Wir müssen die Menschen gegen unsere Feinde aufhetzen."
DNC_much_needed_reforms:0 "Dringend notwendige Reformen"
DNC_much_needed_reforms_desc:0 "Alte Systeme funktionieren einfach nicht mehr. Es ist Zeit für eine Veränderung in der Welt. Wir beginnen damit, den Boden für eine voll demokratische Gesellschaft zu bereiten."
DNC_an_appeal_to_the_people:0 "Ein Appell an die Bevölkerung"
DNC_an_appeal_to_the_people_desc:0 "Sie brauchen die Unterstützung der Menschen, damit diese für Sie stimmen. Wir beginnen mit der Organisation politischer Kampagnen, um sicherzustellen, dass sie uns während des gesamten Prozesses begleiten."
DNC_finish_congress_building:0 "Beenden Sie den [Root.Capital.GetName]-Kongress"
DNC_finish_congress_building_desc:0 "Da wir nun konkrete Pläne für die Einführung der Demokratie in unserem Land haben, brauchen wir einen Ort, an dem sie tatsächlich regieren können. Wir werden in unserer Hauptstadt ein Kongressgebäude errichten, damit sie ihre Arbeit ordnungsgemäß verrichten können."
DNC_election_reforms:0 "Wahlreformen"
DNC_election_reforms_desc:0 "Nachdem wir diese letzten Änderungen abgeschlossen haben, können wir ordnungsgemäße Wahlen abhalten. Es lebe die Demokratie!"

