 LOADING_TIP_293:0 "Wo eine Notwendigkeit besteht, entsteht ein Recht. \n- Eva Duarte de Peron "
 LOADING_TIP_294:0 "Folge nicht der Masse, lass die Masse dir folgen. \n- Margaret Thatcher "
 LOADING_TIP_295:0 "Ruhige Menschen haben die lautesten Gedanken. \n- Stephen Hawking "
 LOADING_TIP_296:0 "Die Frage ist nicht, wer es mir erlaubt, sondern wer mich davon abhält. \n- Wladimir Putin "
 LOADING_TIP_297:0 "Der einzige Mann, der nie Fehler macht, ist der Mann, der nie etwas tut. \n- Theodore Roosevelt "
