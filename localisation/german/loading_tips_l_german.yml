 LOADING_TIP_298:0 "Nichts ermutigt die Bösen so sehr wie der Mangel an Mut auf Seiten der Guten. \n- Papst Leo XIII "
 LOADING_TIP_299:0 "Alles, was Sie geplant haben, fliegt jetzt mit dem Staub und dem zerbrochenen Glas davon, und in wenigen Sekunden werden Sie sterben. \n- Israa Seblani, 6. August 2020 "
