l_german:
 LOADING_TIP_0:0 "Die Ausbildung eines Generalmajors erfordert 15.000 Opfer.\n- Ferdinand Foch"
 LOADING_TIP_1:0 "Sie werden zu Hause sein, bevor die Blätter von den Bäumen gefallen sind.\n- Kaiser Wilhelm II., August 1914"
 LOADING_TIP_2:0 "Eines Tages wird der große europäische Krieg aus einer verdammt dummen Sache auf dem Balkan entstehen – Otto von Bismarck, 1888"
 LOADING_TIP_3:0 "Sie werden zu Hause sein, bevor die Blätter von den Bäumen gefallen sind.\n- Kaiser Wilhelm II., August 1914"
 LOADING_TIP_4:0 "In ganz Europa gehen die Lampen aus, wir werden sie in unserem Leben nicht mehr leuchten sehen.\n- Edward Grey, Juli 1914"
 LOADING_TIP_5:0 "In zwölf Jahren werden Sie Berlin nicht wiedererkennen.\n- Adolf Hitler, 1933"
 LOADING_TIP_6:0 "Jetzt sind wir alle Hurensöhne.\n- Kenneth Tompkins Bainbridge, 16. Juli 1945 nach der Detonation der ersten Atombombe, „The Gadget“"
 LOADING_TIP_7:0 "Wer die Vergangenheit kontrolliert, kontrolliert die Zukunft. Wer die Gegenwart kontrolliert, kontrolliert die Vergangenheit.\n- George Orwell"
 LOADING_TIP_8:0 "Die Heimatfront wird von Generälen im Feld stets unterschätzt. Und doch wurde der Erste Weltkrieg dort gewonnen und verloren. Die russische, bulgarische, österreichische und deutsche Heimatfront zerfiel, bevor ihre Armeen zusammenbrachen. – David Lloyd George"
 LOADING_TIP_9:0 "Wenn wir die Macht haben, werden wir sie nie wieder hergeben, es sei denn, wir werden als Leichen aus unseren Ämtern getragen.\n- Joseph Goebbels"
 LOADING_TIP_10:0 "Was wären Ihre Männer lieber, müde oder tot?\n- Erwin Rommel"
 LOADING_TIP_11:0 "Wollt ihr den totalen Krieg? (Wollen Sie den totalen Krieg?)\n- Joseph Goebbels 1943 im Sportpalast"
 LOADING_TIP_12:0 "Im Kriegsbuch des Ersten Weltkriegs ist die Seite mit den russischen Verlusten herausgerissen. Die Zahlen sind unbekannt. Fünf Millionen oder acht? Wir wissen es selbst nicht. – Paul von Hindenburg, 1917"
 LOADING_TIP_13:0 "In der sowjetischen Armee erfordert der Rückzug mehr Mut als der Vormarsch.\n- Josef Stalin"
 LOADING_TIP_14:0 "Sie kommen nicht durch!\n- Philippe Petain, Verdun, 1916"
 LOADING_TIP_15:0 "Nichts wird uns die amerikanische Sympathie so sehr einbringen wie das auf dem Schlachtfeld vergossene amerikanische Blut. – Winston Churchill, 5. September 1914"
 LOADING_TIP_16:0 "Dieser Krieg ist, wie der nächste Krieg, ein Krieg, der den Krieg beenden soll.\n- David Lloyd George, 1916"
 LOADING_TIP_17:0 "Heute Morgen um elf Uhr endete der grausamste und schrecklichste Krieg, der die Menschheit je heimgesucht hat. Ich hoffe, wir können sagen, dass an diesem schicksalshaften Morgen alle Kriege zu Ende gingen. – David Lloyd George, 11. November 1918"
 LOADING_TIP_18:0 "Auf den Feldern Flanderns blühen die Mohnblumen zwischen den Kreuzen, Reihe für Reihe – John McCrae, 1915"
 LOADING_TIP_19:0 "Die Logistik ist das Herzstück der Panzerkriegsführung.\n- Heinz Guderian"
 LOADING_TIP_20:0 "Es sind die Soldaten und die Armee, nicht parlamentarische Mehrheiten und Entscheidungen, die das Deutsche Reich zusammengeschweißt haben. Ich setze mein Vertrauen in die Armee.\n- Kaiser Wilhelm II., 1891"
 LOADING_TIP_21:0 "Wenn Sie Frieden wünschen, verstehen Sie den Krieg.\n- Sir Basil Lidell-Hart"
 LOADING_TIP_22:0 "Das Kommen des drahtlosen Zeitalters wird den Krieg unmöglich machen, weil es ihn lächerlich machen wird.\n- Guglielmo Marconi, 1912"
 LOADING_TIP_23:0 "Ich möchte dem Sultan und seinen 300 Millionen Muslimen versichern, dass der deutsche Kaiser immer ihr Freund sein wird.\n- Kaiser Wilhelm II"
 LOADING_TIP_24:0 "Sie sind vielleicht nicht am Krieg interessiert, aber der Krieg interessiert sich für Sie.\n- Lew Trotzki"
 LOADING_TIP_25:0 "Als wir das Feuer eröffneten, mussten wir nur noch laden und nachladen. Hunderte von ihnen gingen zu Boden. Man musste nicht zielen, wir schossen einfach auf sie. – Deutscher Maschinengewehrschütze"
 LOADING_TIP_26:0 "Ich bin noch nicht bereit, Zar zu sein. Ich weiß nichts über das Regieren. - Zar Nikolaus II."
 LOADING_TIP_27:0 "Ich bin ein Anhänger der radikalen anarchistischen Idee, die darauf abzielt, das gegenwärtige System durch Terrorismus zu zerstören.\n- Gavrilo Princip"
 LOADING_TIP_28:0 "Dieses außergewöhnliche Reich, bekannt als die österreichisch-ungarische Doppelmonarchie, ist weniger ein Kaiserreich, ein Königreich oder ein Staat als vielmehr das persönliche Eigentum der Habsburger, deren ererbtes Talent für den Landerwerb heute auf der Landkarte Europas verzeichnet ist.\n- James W. Gerard (US-Botschafter in Berlin)"
 LOADING_TIP_29:0 "Ich bin überrascht, dass es trotz der jahrelangen schlechten Behandlung zwischen den Nationalitäten noch eine gewisse Loyalität gibt. Ich muss sie bei mir haben, das ist die einzige Rettung für die Zukunft.\n- Franz Ferdinand"
 LOADING_TIP_30:0 "Die Slawen sind nicht zum Herrschen geboren, sondern zum Gehorchen. Das muss ihnen klargemacht werden.\n- Kaiser Wilhelm II"
 LOADING_TIP_31:0 "Auf den Frieden! Was hätten wir von einem Krieg mit Serbien? Wir würden das Leben junger Männer verlieren und Geld ausgeben, das woanders besser angelegt wäre. Und was würden wir um Himmels willen gewinnen? Ein paar Bleibäume, ein paar Weiden voller Ziegenmist und einen Haufen rebellischer Killer. - Franz Ferdinand in seinem Toast beim Abendessen"
 LOADING_TIP_32:0 "Es ist nichts.\n- Franz Ferdinand zu seinem Fahrer, nachdem er angeschossen wurde"
 LOADING_TIP_33:0 "Was wir aus der Geschichte lernen, ist, dass niemand aus der Geschichte lernt.\n- Otto von Bismarck"
 LOADING_TIP_34:0 "Die Amerikaner sind ein sehr glückliches Volk. Sie grenzen im Norden und Süden an schwache Nachbarn und im Osten und Westen an Fische.\n- Otto von Bismarck"
 LOADING_TIP_35:0 "Die großen Fragen der Zeit werden nicht durch Reden und Mehrheitsentscheidungen, sondern durch Eisen und Blut entschieden.\n- Otto von Bismarck"
 LOADING_TIP_36:0 "Wir Deutschen fürchten Gott, aber sonst nichts auf der Welt.\n- Otto von Bismarck"
 LOADING_TIP_37:0 "Das Geheimnis der Politik? Einen guten Vertrag mit Russland schließen.\n- Otto von Bismarck"
 LOADING_TIP_38:0 "Im Krieg ist die Wahrheit das erste Opfer.\n- Eschyle"
 LOADING_TIP_39:0 "Große Männer haben große Hunde.\n- Otto von Bismarck"
 LOADING_TIP_40:0 "Glaube niemals etwas in der Politik, bis es offiziell dementiert wurde..\n- Otto von Bismarck"
 LOADING_TIP_41:0 "Die Hauptsache ist, Geschichte zu machen, nicht sie zu schreiben.\n- Otto von Bismarck"
 LOADING_TIP_42:0 "Alle Kriege werden durch Seemacht entschieden.\n- Erich Raeder"
 LOADING_TIP_43:0 "Paris zum Mittagessen, Abendessen in St. Petersburg.\n- Kaiser Wilhelm II"
 LOADING_TIP_44:0 "Wir führen Krieg, damit wir in Frieden leben können..\n- Aristoteles"
 LOADING_TIP_45:0 "Ein Feldmarschall wird geboren, nicht gemacht!\n- Erich Ludendorff"
 LOADING_TIP_46:0 "Die wahren und dauerhaften Siege sind die des Friedens und nicht die des Krieges.\n- Ralph Waldo Emerson"
 LOADING_TIP_47:0 "Nur die Toten haben das Ende des Krieges gesehen.\n- George Santayana als Antwort auf Wilsons „Dies ist ein Krieg, der alle Kriege beenden wird“"
 LOADING_TIP_48:0 "Schade, dass in meiner Trophäensammlung kein einziger Russe vertreten ist.\n- Manfred von Richtofen"
 LOADING_TIP_49:0 "Ein bloß gefallener Feind kann wieder auferstehen, aber der versöhnte ist wahrhaftig besiegt.\n- Johan Christoph Stiller"
 LOADING_TIP_50:0 "Es gab manchmal vierzig bis sechzig englische Maschinen, aber leider waren die Deutschen oft in der Minderheit. Bei ihnen war Qualität wichtiger als Quantität.\n- Manfred von Richtofen"
 LOADING_TIP_51:0 "Meine liebe Exzellenz! Ich bin nicht in den Krieg gezogen, um Käse und Eier zu sammeln, sondern zu einem anderen Zweck.\n- Manfred von Richtofen"
 LOADING_TIP_52:0 "Kriege lehren uns, unsere Feinde nicht zu lieben, sondern unsere Verbündeten zu hassen.\n- WL George"
 LOADING_TIP_53:0 "Dieses Glaubensbekenntnis der Wüste schien weder in Worten noch in Gedanken ausdrückbar.\n- Laurence von Arabien"
 LOADING_TIP_54:0 "Die Druckerpresse ist die größte Waffe im Arsenal des modernen Kommandanten.\n- Laurence von Arabien"
 LOADING_TIP_55:0 "Männer, ich befehle euch nicht anzugreifen. Ich befehle euch zu sterben.\n- Mustafa Kemal auf Gallipoli"
 LOADING_TIP_56:0 "Es gibt keine Verteidigungslinie, sondern ein Verteidigungsgebiet. Dieses Gebiet ist das gesamte Mutterland! – Mustafa Kemal"
 LOADING_TIP_57:0 "Befestigungen, Artillerie und Auslandshilfe sind wertlos, wenn der einfache Soldat nicht weiß, dass ER es ist, der sein Land bewacht.\n- CGE Mannerheim"
 LOADING_TIP_58:0 "Offiziere rennen nicht, das tun nur Korporale.\n- CGE Mannerheim"
 LOADING_TIP_59:0 "Politik ist der Mutterleib, in dem sich Krieg entwickelt.\n- Carl von Clausewitz"
 LOADING_TIP_60:0 "Gewalt ist allmächtig, aber ihre Siege sind nur von kurzer Dauer.\n- Abraham Lincoln"
 LOADING_TIP_61:0 "Alle Nationen wollen Frieden, aber sie wollen einen Frieden, der ihnen passt.\n- Admiral Sir John Fisher"
 LOADING_TIP_62:0 "Ein Mensch mag sterben, Nationen mögen aufsteigen und untergehen, aber eine Idee lebt weiter.\n- John F. Kennedy"
 LOADING_TIP_63:0 "Man kann einen Thron aus Bajonetten bauen, aber man kann nicht lange darauf sitzen.\n- Boris Jeltin"
 LOADING_TIP_64:0 "Ein Krieg ist erst dann verloren, wenn man ihn als verloren betrachtet.\n- Erich von Manstein"
 LOADING_TIP_65:0 "Wir hätten es nach dem ersten Krieg besser wissen müssen.\n- Gerd von Rundstedt"
 LOADING_TIP_66:0 "Der Krieg endet nie, er verblasst nur, rötet sich, schwärzt und hellt sich wieder auf.\n- Stephen Rawn"
 LOADING_TIP_67:0 "Im Krieg verhält sich die Moral zum Material wie drei zu eins.\n- Napoleon Bonaparte"
 LOADING_TIP_68:0 "Schweiß rettet Blut, Blut rettet Leben, Gehirn rettet beides.\n- Erwin Rommel"
 LOADING_TIP_69:0 "Die Wahrheit ist, dass die Menschen der Freiheit überdrüssig sind.\n- Benito Mussolini"
 LOADING_TIP_70:0 "Der Anführer ist angesichts schlechter Schicksale immer allein.\n- Charles de Gualle"
 LOADING_TIP_71:0 "Ob es Ihnen gefällt oder nicht, die Geschichte ist auf unserer Seite. Wir werden Sie eingraben.\n- Nikita Krutschev"
 LOADING_TIP_72:0 "Ich fürchte, wir haben lediglich einen schlafenden Riesen geweckt und ihn mit einer schrecklichen Entschlossenheit erfüllt.\n- Isoroku Yamamoto, 7. Dezember 1941"
 LOADING_TIP_73:0 "Je mehr Menschen du tötest, desto revolutionärer bist du.\n- Mao Zedong"
 LOADING_TIP_74:0 "Keine Revolution ist etwas wert, wenn sie sich nicht verteidigen kann.\n- Wladimir Lenin"
 LOADING_TIP_75:0 "Pazifismus, die Predigt des Friedens im Abstrakten, ist eines der Mittel, die Arbeiterklasse zu täuschen.\n- Wladimir Lenin"
 LOADING_TIP_76:0 "Das Ziel des Krieges besteht nicht darin, für sein Land zu sterben, sondern den anderen Bastard für seines sterben zu lassen.\n- George S. Patton"
 LOADING_TIP_77:0 "Der Krieg bestimmt nicht, wer Recht hat, sondern nur, wer übrig bleibt.\n- Bertrand Russel"
 LOADING_TIP_78:0 "Der Tod löst alle Probleme – kein Mensch, kein Problem.\n- Josef Stalin"
 LOADING_TIP_79:0 "Ich weiß nicht, ob der Krieg eine Unterbrechung während des Friedens ist oder der Frieden eine Unterbrechung während des Krieges.\n- Georges Clemenceau"
 LOADING_TIP_80:0 "Politiker sind überall gleich. Sie versprechen, eine Brücke zu bauen, auch dort, wo es keinen Fluss gibt.\n-Nikita Krutschev "
 LOADING_TIP_81:0 "Krieg ist Frieden. Freiheit ist Sklaverei. Unwissenheit ist Stärke.\n- George Orwell"
 LOADING_TIP_82:0 "Ein in sich gespaltenes Haus kann nicht bestehen.\n- Abraham Lincoln"
 LOADING_TIP_83:0 "Führer, wir sind auf dem Vormarsch! Siegreiche italienische Truppen haben heute im Morgengrauen die griechisch-albanische Grenze überschritten!\n- Benito Mussolini (an Adolf Hitler), 28. Oktober 1940"
 LOADING_TIP_84:0 "An diesem schönen Tag feiern wir den Geburtstag des Führers und danken ihm, denn nur er ist der Grund, warum Deutschland heute noch lebt.\n- Josef Goebbels, 20. April 1945"
 LOADING_TIP_85:0 "Ich kann nicht so viel Wagner hören. Ich bekomme den Drang, Polen zu erobern.\n- Woody Allen"
 LOADING_TIP_86:0 "Wir werden vielleicht vernichtet, aber wenn das passiert, werden wir eine Welt mit uns reißen – eine Welt in Flammen.\n- Adolf Hitler"
 LOADING_TIP_87:0 "Wer Angst davor hat, besiegt zu werden, ist sich der Niederlage sicher.\n- Napoleon Bonaparte"
 LOADING_TIP_88:0 "Der Stimmzettel ist stärker als die Kugel.\n- Abraham Lincoln"
 LOADING_TIP_89:0 "Zwischen den Kriegen ist jeder ein Pazifist. Es ist, als wäre man zwischen den Mahlzeiten Vegetarier.\n- Colman McCarthy"
 LOADING_TIP_90:0 "Ich glaube, Krieg könnte Gottes Art sein, uns Geographie beizubringen.\n- Paul Rodriguez"
 LOADING_TIP_91:0 "Der Duce wird Äthiopien haben ... mit oder ohne Äthiopier.\n- Rodolfo Graziani"
 LOADING_TIP_92:0 "Demokratie ist in der Theorie schön, in der Praxis ist sie ein Trugschluss. Sie in Amerika werden das eines Tages sehen. – Benito Mussolini"
 LOADING_TIP_93:0 "Rasse? Es ist ein Gefühl, keine Realität. Nichts wird mich jemals glauben lassen, dass es heute biologisch reine Rassen gibt.\n- Benito Mussolini"
 LOADING_TIP_94:0 "Frieden in unserer Zeit – Neville Chamberlain"
 LOADING_TIP_95:0 "Bellum se ipsum alet (Krieg nährt sich selbst).\n- Marcus Porcius Cato"
 LOADING_TIP_96:0 "Meine Logistiker sind ein humorloser Haufen. Sie wissen, dass sie die Ersten sind, die ich töten werde, wenn meine Kampagne scheitert.\n- Alexander der Große"
 LOADING_TIP_97:0 "Meine Luftwaffe ist unbesiegbar... Und nun wenden wir uns England zu. Wie lange wird das dauern – zwei, drei Wochen?\n- Hermann Göring, Juni 1940"
 LOADING_TIP_98:0 "Bevor wir mit ihnen fertig sind, wird die japanische Sprache nur noch in der Hölle gesprochen werden!\n- Admiral Halsey"
 LOADING_TIP_99:0 "Ich habe meine Feinde in München gesehen, und sie sind Würmer.\n- Adolf Hitler"
 LOADING_TIP_100:0 "Es muss ein Frieden ohne Sieg sein... Ein Sieg würde bedeuten, dass dem Verlierer ein Frieden aufgezwungen wird, dass dem Besiegten die Bedingungen des Siegers aufgezwungen werden.\n- Woodrow Wilson"
 LOADING_TIP_101:0 "Sollte der Tag kommen, an dem wir gehen müssen, wenn wir eines Tages gezwungen sind, die Bühne der Geschichte zu verlassen, werden wir die Tür so heftig zuschlagen, dass das Universum erbebt und die Menschheit verblüfft zurücktritt. – Joseph Goebbels"
 LOADING_TIP_102:0 "Wenn du wie die Sonne leuchten willst, musst du zuerst wie sie brennen.\n- Adolf Hitler"
 LOADING_TIP_103:0 "Vergleichen Sie sich nicht mit anderen. Wenn Sie das tun, beleidigen Sie sich selbst. - Adolf Hitler"
 LOADING_TIP_104:0 "Nur wer die Jugend gewinnt, gewinnt die Zukunft.\n- Adolf Hitler"
 LOADING_TIP_105:0 "Es ist schwieriger, gegen den Glauben als gegen das Wissen zu kämpfen.\n- Adolf Hitler"
 LOADING_TIP_106:0 "Ich hätte mich niemals ergeben, aufgrund meines Eids als deutscher Offizier. Doch mit Hitlers Tod endete dieser Eid. Durch seinen Selbstmord rettete Hitler Tausende von Leben. Sie entbanden uns von unserem Soldateneid.\n- Otto Skorzeny"
 LOADING_TIP_107:0 "Du musst härter trainieren als der Feind, der versucht, dich zu töten. Im Grab wirst du die nötige Ruhe finden.\n- Leon Degrelle"
 LOADING_TIP_108:0 "Wenn es einen Staat gibt, kann es keine Freiheit geben, aber wenn es Freiheit gibt, kann es keinen Staat geben.\n- Wladimir Lenin"
 LOADING_TIP_109:0 "Manchmal braucht die Geschichte einen kleinen Anstoß. – Wladimir Lenin"
 LOADING_TIP_110:0 "Kann eine Nation frei sein, wenn sie andere Nationen unterdrückt? Das kann sie nicht. – Wladimir Lenin"
 LOADING_TIP_111:0 "Die Geschichte ist eine Reihe vereinbarter Lügen. – Napoleon Bonaparte"
 LOADING_TIP_112:0 "Der sicherste Weg, arm zu bleiben, ist, ein ehrlicher Mann zu sein.\n- Napoleon Bonaparte"
 LOADING_TIP_113:0 "Religion ist es, die die Armen davon abhält, die Reichen zu ermorden.\n- Napoleon Bonaparte"
 LOADING_TIP_114:0 "Es ist gut, dass der Krieg so schrecklich ist, denn vielleicht lernen wir, ihn zu mögen.\n- Robert E. Lee"
 LOADING_TIP_115:0 "In einem Atomkrieg werden alle Menschen gleichermaßen eingeäschert.\n- Dexter Gordon"
 LOADING_TIP_116:0 "Denken Sie daran, dass Gott mehrere Stunden am Tag für die beste Tarnung sorgt.\n- David M. Shoup"
 LOADING_TIP_117:0 "Der Frieden hat seine Siege, nicht weniger als der Krieg, aber es gibt nicht so viele Denkmäler zu enthüllen.\n- Kin Hubbard" 
 LOADING_TIP_118:0 "Der Erste Weltkrieg brach größtenteils aufgrund eines Wettrüstens aus, und der Zweite Weltkrieg brach aus, weil es kein Wettrüsten gab.\n- Hermann Kahn"
 LOADING_TIP_119:0 "Ein halber Liter Schweiß spart eine Gallone Blut.\n- George S. Patton"
 LOADING_TIP_120:0 "Das Ziel des Krieges besteht nicht darin, für sein Land zu sterben, sondern den anderen Bastard für seines sterben zu lassen.\n- George S. Patton"
 LOADING_TIP_121:0 "Niemand hat jemals etwas erfolgreich verteidigt, es gibt nur Angriff und Angriff und noch mehr Angriff.\n- George S. Patton"
 LOADING_TIP_122:0 "Ich bin der Chef der Luftwaffe, aber ich habe keine Luftwaffe.\n- Ritter von Greim, Nachfolger von Hermann Göring, gegenüber seinen amerikanischen Entführern kurz nach Kriegsende"
 LOADING_TIP_123:0 "Wir nennen uns die „6. Panzerarmee“, weil wir nur noch 6 Panzer übrig haben.\n- Josef Dietrich"
 LOADING_TIP_124:0 "Die Stadt ist gefallen und ich lebe noch.\n- Konstantin XI., letzter römischer Kaiser, bevor er seine Männer zu einem letzten Angriff führte"
 LOADING_TIP_125:0 "Ihr Kosaken zieht in den Krieg, als würdet ihr zu einer Hochzeit gehen.\n- Alexander II., Kaiser von Russland"
 LOADING_TIP_126:0 "Für meine Freunde alles, für meine Feinde das Gesetz.\n- Oscar Benavides, „Präsident“ von Peru"
 LOADING_TIP_127:0 "Irgendetwas scheint mit unseren verdammten Schiffen heute nicht zu stimmen.\n- Admiral David Beatty, nachdem mehrere seiner Schiffe während der Skagerrakschlacht 1916 explodierten"
 LOADING_TIP_128:0 "Von Stettin in der Ostsee bis Triest an der Adria hat sich ein Eiserner Vorhang über den Kontinent gelegt.\n- Winston Churchill, 5. März 1946"
 LOADING_TIP_129:0 "Unter Lenin war die Sowjetunion wie eine religiöse Wiederbelebung, unter Stalin wie ein Gefängnis, unter Chruschtschow wie ein Zirkus und unter Breschnew wie die US-Post.\n- Zbigniew Brzezinski, 7. November 1977."
 LOADING_TIP_130:0 "Herr Gorbatschow, reißen Sie diese Mauer nieder! – Ronald Reagan, 12. Juni 1987"
 LOADING_TIP_131:0 "Durch die Gnade Gottes hat Amerika den Kalten Krieg gewonnen.\n- George HW Bush, 28. Januar 1992"
 LOADING_TIP_132:0 "Der Kapitalismus ist nichts weiter als die Sklaverei des Gentlemans. \n- Kwame Nkrumah, 1968"
 LOADING_TIP_133:0 "Manchmal muss die Demokratie in Blut getaucht werden.\n- Augusto Pinochet, undatiert"
 LOADING_TIP_134:0 "Kommunismus ist keine Liebe. \n Der Kommunismus ist ein Hammer, mit dem wir den Feind zerschmettern.\n – Mao Zedong, 1. Oktober 1949"
 LOADING_TIP_135:0 "Vergib deinen Feinden, aber vergiss nie ihre Namen.\n-John F. Kennedy, 1963"
 LOADING_TIP_136:0 "Wir werden amerikanische Jungen nicht 9 oder 10.000 Meilen von zu Hause wegschicken,\n um das zu tun, was asiatische Jungen für sich selbst tun sollten.\n- Lyndon B. Johnson, 21. Oktober 1964"
 LOADING_TIP_137:0 "Es kommt ein Moment, der in der Geschichte nur selten vorkommt, in dem wir vom Alten zum Neuen übergehen, wenn ein Zeitalter endet und die Seele einer Nation, die lange unterdrückt wurde, zum Ausdruck kommt. – Jawaharlal Nehru, 14. August 1947"
 LOADING_TIP_138:0 "Heute ist die Freiheit in der Offensive, \n die Demokratie auf dem Vormarsch. \n- Douglas MacArthur, 2. Dezember 1945"
 LOADING_TIP_139:0 "Die Kunst der Politik besteht darin, genau zu wissen, wann\n es notwendig ist, einen Gegner leicht unter die Gürtellinie zu treffen.\n – Konrad Adenauer, undatiert"
 LOADING_TIP_140:0 "Wenn ich Somalia verlasse, werde ich Gebäude zurücklassen, aber keine Menschen. \n- Siad Barre, 1991"
 LOADING_TIP_141:0 "Ich bin Marxist-Leninist und werde es bis zum letzten Tag meines Lebens bleiben.\n- Fidel Castro, 2. Dezember 1961"
 LOADING_TIP_142:0 "Die Flagge der Freiheit, die heute über Kairo, Damaskus und Bagdad weht, wird auch über dem Rest des Nahen Ostens wehen. – Gamal Abdel Nasser, 19. Juli 1958"
 LOADING_TIP_143:0 "Und dann dachte ich: Die Welt weiß nichts von Chatyn! \n Sie wissen von Katyn, vom Massaker an den polnischen Offizieren dort. \nAber sie wissen nichts von Weißrussland. \n- Elem Kilmov, 1977"
 LOADING_TIP_144:0 "Die Gefahr eines Weltkrieges besteht nicht mehr.\n- Michail Gorbatschow, Dezember 1991"
 LOADING_TIP_145:0 "Apartheid bedeutet gute Nachbarschaft. \n- PW Botha, 1998"
 LOADING_TIP_146:0 "Meine Berater errichteten eine Mauer zwischen mir und meinem Volk.\n Ich wusste nicht, was geschah. Als ich aufwachte, hatte ich mein Volk verloren.\n – Mohammed Reza Pahlavi, undatiert"
 LOADING_TIP_147:0 "Eine Mauer ist verdammt viel besser als ein Krieg.\n- John F. Kennedy, August 1961 "
 LOADING_TIP_148:0 "Die Gefahr eines Weltkrieges besteht nicht mehr.\n- Michail Gorbatschow, Dezember 1991"
 LOADING_TIP_149:0 "Ob es Ihnen gefällt oder nicht, die Geschichte ist auf unserer Seite. \n Wir werden Sie begraben.\n – Nikita Chruschtschow, 18. November 1956"
 LOADING_TIP_150:0 "Ich bin kein Diktator und ich glaube nicht, dass ich einer werde. \n Ich werde die Macht nicht mit einem Maschinengewehr aufrechterhalten.\n – Fidel Castro, 1959"
 LOADING_TIP_151:0 "Diese Genossen haben mich als ihren Anführer anerkannt, mir sogar einen neuen Namen gegeben und ein Lied über mich gesungen. \n Damit brachten sie ihre innersten Gefühle zum Ausdruck. \n – Kim Il Sung, 1992"
 LOADING_TIP_152:0 "Ich bin Marxist-Leninist,\n und ich werde bis zu den letzten Tagen meines Lebens Marxist-Leninist sein.\n – Fidel Castro, 1961"
