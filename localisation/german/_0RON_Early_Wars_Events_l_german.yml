l_german: 

#Country Events

ron_warsdiplo.1.t:0 "Rebellen zerstreuen sich"
ron_warsdiplo.1.d:0 "Rebellion, Aufstand oder Aufruhr sind die Verweigerung von Gehorsam oder Befehl. Sie bezeichnen den offenen Widerstand gegen die Anordnungen einer etablierten Autorität. Eine Rebellion entsteht aus einem Gefühl der Empörung und Missbilligung einer Situation und äußert sich in der Weigerung, sich der für die Situation verantwortlichen Autorität zu unterwerfen oder ihr zu gehorchen. Rebellion kann individuell oder kollektiv, friedlich (ziviler Ungehorsam, ziviler Widerstand und gewaltloser Widerstand) oder gewalttätig (Terrorismus, Sabotage und Guerillakrieg) sein. Politisch gesehen werden Rebellion und Revolte oft anhand ihrer unterschiedlichen Ziele unterschieden. Während Rebellion im Allgemeinen darauf abzielt, einer unterdrückenden Macht zu entgehen und/oder Zugeständnisse von ihr zu erhalten, zielt eine Revolte darauf ab, diese Macht sowie die sie begleitenden Gesetze zu stürzen und zu zerstören. Das Ziel einer Rebellion ist Widerstand, während eine Revolte eine Revolution anstrebt. Wenn sich die Machtverhältnisse im Verhältnis zum externen Gegner verschieben, oder wenn sich die Machtverhältnisse innerhalb einer gemischten Koalition verschieben, oder wenn sich die Positionen auf beiden Seiten verhärten oder abschwächen, kann ein Aufstand zwischen den beiden Formen hin- und herschwanken."
ron_warsdiplo.1.a:0 "Sieg"

ron_warsdiplo.2.t:0 "Massive zivile Unruhen"
ron_warsdiplo.2.d:0 "Rebellion, Aufstand oder Aufruhr sind die Verweigerung von Gehorsam oder Befehl. Sie bezeichnen den offenen Widerstand gegen die Anordnungen einer etablierten Autorität. Eine Rebellion entsteht aus einem Gefühl der Empörung und Missbilligung einer Situation und äußert sich in der Weigerung, sich der für die Situation verantwortlichen Autorität zu unterwerfen oder ihr zu gehorchen. Rebellion kann individuell oder kollektiv, friedlich (ziviler Ungehorsam, ziviler Widerstand und gewaltloser Widerstand) oder gewalttätig (Terrorismus, Sabotage und Guerillakrieg) sein. Politisch gesehen werden Rebellion und Revolte oft anhand ihrer unterschiedlichen Ziele unterschieden. Während Rebellion im Allgemeinen darauf abzielt, einer unterdrückenden Macht zu entgehen und/oder Zugeständnisse von ihr zu erhalten, zielt eine Revolte darauf ab, diese Macht sowie die sie begleitenden Gesetze zu stürzen und zu zerstören. Das Ziel einer Rebellion ist Widerstand, während eine Revolte eine Revolution anstrebt. Wenn sich die Machtverhältnisse im Verhältnis zum externen Gegner verschieben, oder wenn sich die Machtverhältnisse innerhalb einer gemischten Koalition verschieben, oder wenn sich die Positionen auf beiden Seiten verhärten oder abschwächen, kann ein Aufstand zwischen den beiden Formen hin- und herschwanken."
ron_warsdiplo.2.a:0 "Lasst sie randalieren"

ron_warsdiplo.3.t:0 "Bürgerkrieg!"
ron_warsdiplo.3.d:0 "Rebellion, Aufstand oder Aufruhr sind die Verweigerung von Gehorsam oder Befehl. Sie bezeichnen den offenen Widerstand gegen die Anordnungen einer etablierten Autorität. Eine Rebellion entsteht aus einem Gefühl der Empörung und Missbilligung einer Situation und äußert sich in der Weigerung, sich der für die Situation verantwortlichen Autorität zu unterwerfen oder ihr zu gehorchen. Rebellion kann individuell oder kollektiv, friedlich (ziviler Ungehorsam, ziviler Widerstand und gewaltloser Widerstand) oder gewalttätig (Terrorismus, Sabotage und Guerillakrieg) sein. Politisch gesehen werden Rebellion und Revolte oft anhand ihrer unterschiedlichen Ziele unterschieden. Während Rebellion im Allgemeinen darauf abzielt, einer unterdrückenden Macht zu entgehen und/oder Zugeständnisse von ihr zu erhalten, zielt eine Revolte darauf ab, diese Macht sowie die sie begleitenden Gesetze zu stürzen und zu zerstören. Das Ziel einer Rebellion ist Widerstand, während eine Revolte eine Revolution anstrebt. Wenn sich die Machtverhältnisse im Verhältnis zum externen Gegner verschieben, oder wenn sich die Machtverhältnisse innerhalb einer gemischten Koalition verschieben, oder wenn sich die Positionen auf beiden Seiten verhärten oder abschwächen, kann ein Aufstand zwischen den beiden Formen hin- und herschwanken."
