ron_early_wars_news.1.t:0 "Krieg um den goldenen Stuhl"
ron_early_wars_news.1.d:0 "Der Krieg um den Goldenen Stuhl, auch bekannt als Yaa-Asantewaa-Krieg, Dritte Aschanti-Expedition, Aschanti-Aufstand oder Variationen davon, war eine gewalttätige Schlacht in einer Reihe von Konflikten zwischen dem Vereinigten Königreich und dem Aschanti-Reich (dem heutigen Ghana), einem autonomen Staat in Westafrika, der in zerstrittener Koexistenz mit den Briten und ihren Vasallenstämmen an der Küste lebte."

ron_early_wars_news.2.t:0 "Mat Salleh-Rebellion"
ron_early_wars_news.2.d:0 "Der Mat-Salleh-Aufstand war eine Reihe schwerer bewaffneter Aufstände gegen die Verwaltung der britischen Nord-Borneo-Chartered-Company in Nord-Borneo, dem heutigen malaysischen Bundesstaat Sabah. Die Company entsandte eine Streitmacht zur Vergeltung, die das Gebiet am 31. Dezember 1899 erreichte. Am nächsten Tag begannen die Kämpfe. Der Aufstand endete, als die Truppen der Company die Wasserversorgung von Mat Sallehs Fort unterbrachen, indem sie den Pengkalian-Fluss zum Sensuran umleiteten und so das Ende der Belagerung erzwangen."

ron_early_wars_news.3.t:0 "Französische Eroberung von Borno"
ron_early_wars_news.3.d:0 "Die Schlacht von Kousséri hatte ihren Ursprung in französischen Plänen, die Region Chari-Baguirmi zu besetzen. In den Jahren 1899 und 1900 organisierten die Franzosen drei bewaffnete Kolonnen, eine aus dem Kongo nach Norden, eine aus Niger nach Osten und eine weitere aus Algerien nach Süden. Ziel war es, alle französischen Besitzungen in Westafrika miteinander zu verbinden. Dies gelang am 21. April 1900 am rechten Ufer des Chari im heutigen Tschad gegenüber von Kousséri, im heutigen Nordkamerun."

ron_early_wars_news.4.t:0 "Shoubak-Aufstand von 1900"
ron_early_wars_news.4.d:0 "Die Shoubak-Aufstände waren eine Reihe von Aufständen gegen die osmanische Herrschaft in der transjordanischen Stadt Shoubak, die zwischen 1900 und 1905 stattfanden. Der zweite Aufstand begann, nachdem die osmanischen Streitkräfte damit begannen, Frauen der Stadt zur Zwangsarbeit zu zwingen, was als bewusste Bestrafung der häufig ungehorsamen Einwohner von Shoubak galt. Shoubak erhob sich zum Aufstand und konnte die benachbarten Beduinen auf seine Seite ziehen; die Täter wurden durch eine osmanische Expedition aus Al-Karak, nördlich von Shoubak, mit militärischer Gewalt brutal bestraft."

ron_early_wars_news.5.t:0 "Russische Invasion der Mandschurei"
ron_early_wars_news.5.d:0 "Die russische Invasion in der Mandschurei erfolgte im Gefolge des Ersten Japanisch-Chinesischen Krieges (1894–1895). Damals veranlassten Sorgen über eine Niederlage Chinas gegen die Japaner und deren Besetzung der Mandschurei die Russen, ihre seit langem gehegten Pläne zur imperialen Expansion in ganz Eurasien voranzutreiben. Mit dem Bau der Südmandschurei-Eisenbahn wurde Mukden (heute Shenyang) zu einer russischen Hochburg, die nach dem Boxeraufstand von den Russen besetzt wurde. Wie alle anderen Großmächte in China verlangte auch Russland neben der Eisenbahn Zugeständnisse."

ron_early_wars_news.6.t:0 "Sharjah erobert Ras Al Khaimah"
ron_early_wars_news.6.d:0 "Scheich Saqr bin Khalid Al Qasimi (1883–1914) war von 1883 bis 1914 Herrscher von Schardscha. Während der Abwesenheit seines Onkels Salim bin Sultan Al Qasimi übernahm er durch einen Putsch die Kontrolle über Schardscha und regierte sowohl Schardscha als auch von 1900 bis zu seinem Tod 1914 Ra’s al-Chaima."

ron_early_wars_news.7.t:0 "Somaliland-Kampagne"
ron_early_wars_news.7.d:0 "Der Somaliland-Feldzug, auch Anglo-Somalischer Krieg oder Derwischkrieg genannt, war eine Reihe von Militärexpeditionen, die zwischen 1900 und 1920 am Horn von Afrika stattfanden und bei denen die Derwische unter der Führung von Mohammed Abdullah Hassan (der den Spitznamen „Verrückter Mullah“ erhielt, obwohl er „weder verrückt noch ein Mullah war“) gegen die Briten antraten. Die Briten wurden bei ihren Offensiven von den Äthiopiern und Italienern unterstützt. Während des Ersten Weltkriegs (1914–1918) erhielt Hassan eine Zeit lang symbolische Unterstützung vom äthiopischen Kaiser Iyasu V.; auch die Osmanen schickten ihm einen Unterstützungsbrief, der jedoch von italienischen Agenten in Aden abgefangen wurde und ihn möglicherweise nie erreichte. Der Konflikt endete mit dem britischen Luftangriff auf die Derwisch-Hauptstadt Taleh im Februar 1920."

ron_early_wars_news.8.t:0 "Kuwaitisch-Rashidi-Krieg"
ron_early_wars_news.8.d:0 "Der Kuwait-Raschidi-Krieg war ein Konflikt zwischen dem Scheichtum Kuwait und dem Emirat Dschabal Schammar, der von 1900 bis 1901 ausgetragen wurde. Er begann Mitte Dezember 1900, als der Emir von Kuwait, Mubarak Al-Sabah, einen Angriff auf Zentralarabien startete. Der anfängliche Erfolg war mäßig: Die Kuwaiter marschierten Ende Februar 1901 in Nadschd ein und eroberten bis zum 11. März Unaiza, Buraidah und Al-Zulfi."

ron_early_wars_news.9.t:0 "Mahsud Waziri-Blockade"
ron_early_wars_news.9.d:0 "Die Mahsud-Waziri-Blockade war eine britische Kampagne gegen die Mahsud im britischen Raj. Sie begann mit einer passiven Blockade am 1. Dezember 1900. Die britischen Streitkräfte wurden von Generalmajor Charles Egerton kommandiert. Die heftigste Phase der Kämpfe begann am 23. November 1901. Mobile Kolonnen, die sich in Datta Khel, Jandola, Sarwakai und Wana konzentrierten, überfielen alle paar Wochen das Gebiet der Mahsud, erbeuteten Vieh, nahmen Mahsud-Mitglieder gefangen und verursachten schwere Verluste."

ron_early_wars_news.10.t:0 "Revolution von 1911"
ron_early_wars_news.10.d:0 "Die Revolution von 1911, auch bekannt als Chinesische Revolution oder Xinhai-Revolution, war eine Revolution, die Chinas letzte Kaiserdynastie (die Qing-Dynastie) stürzte und die Republik China (ROC) gründete. Die Revolution wurde Xinhai (Hsin-hai) genannt, weil sie 1911 stattfand, dem Jahr des Xinhai-Stamms (辛亥) im 60-jährigen Zyklus des traditionellen chinesischen Kalenders. Die Revolution bestand aus zahlreichen Revolten und Aufständen. Der Wendepunkt war der Wuchang-Aufstand am 10. Oktober 1911, der das Ergebnis des Missmanagements der Eisenbahnschutzbewegung war. Die Revolution endete mit der Abdankung des sechsjährigen letzten Kaisers Puyi am 12. Februar 1912, was das Ende von 2000 Jahren Kaiserherrschaft und den Beginn von Chinas früher republikanischer Ära markierte."

ron_early_wars_news.11.t:0 "Anglo-Aro-Krieg"
ron_early_wars_news.11.d:0 "Der Anglo-Aro-Krieg (1901–1902) war ein Konflikt zwischen der Aro-Konföderation im heutigen Ostnigeria und dem Britischen Empire. Der Krieg begann nach Jahren gescheiterter Verhandlungen, als die Spannungen zwischen den Aro-Führern und den britischen Kolonialisten zunahmen."

ron_early_wars_news.12.t:0 "Schlacht am Kloster der Heiligen Apostel"
ron_early_wars_news.12.d:0 "In der zweiten Hälfte des 19. Jahrhunderts waren die Lebensbedingungen der armenischen Bevölkerung im Mush-Tal unerträglich geworden. Zu den offiziellen und inoffiziellen Steuern und Abgaben der Zentralregierung und den kurdischen Häuptlingen, die ihre traditionellen Tribute erpressten, kam hinzu, dass räuberische kurdische Stammesangehörige nach ihrer Eingliederung in die halbregulären kurdischen Kavallerieeinheiten, die als Hamidiye bekannt waren, einen offiziellen Status erhielten. Infolgedessen verloren Tausende armenischer Bauern ihr Land und fristeten ihr Dasein als Wanderarbeiter oder wanderten nach Konstantinopel und in andere Städte aus, um in ärmlichen, schmutzigen Verhältnissen zu leben. Das wiederholte Scheitern der von Konstantinopel versprochenen Reformen führte dazu, dass einige Armenier lokale Selbstverteidigungsmaßnahmen ergriffen."

ron_early_wars_news.13.t:0 "1901 Mapondera-Aufstand"
ron_early_wars_news.13.d:0 "Im Jahr 1901 führte Häuptling Kadungure Mapondera, der 1894 seine Unabhängigkeit von der Kompanieherrschaft proklamiert hatte, einen Aufstand in den Gebieten Guruve und Mount Darwin in Mashonaland Central an. Seine Truppe bestand zunächst aus weniger als 100 Mann, hatte aber Mitte 1901 über 600 Mann unter seinem Kommando. Er wurde 1903 gefangen genommen und starb 1904 nach einem Hungerstreik im Gefängnis."

ron_early_wars_news.14.t:0 "Rebellion des Heiligen Mannes"
ron_early_wars_news.14.d:0 "Der Aufstand des Heiligen Mannes ereignete sich zwischen März 1901 und Januar 1936. Er begann, als Anhänger der religiösen Bewegung Phu Mi Bun einen bewaffneten Aufstand gegen Französisch-Indochina und Siam initiierten, mit dem Ziel, ihren Anführer, den Zauberer Ong Keo, als Weltherrscher einzusetzen. 1902 wurde der Aufstand in Siam niedergeschlagen und setzte sich in Französisch-Indochina fort, bis er im Januar 1936 vollständig niedergeschlagen wurde."

ron_early_wars_news.15.t:0 "Venezolanische Krise von 1902–1903"
ron_early_wars_news.15.d:0 "Die Venezuela-Krise von 1902–1903 war eine Seeblockade, die Großbritannien, Deutschland und Italien von Dezember 1902 bis Februar 1903 gegen Venezuela verhängten, nachdem Präsident Cipriano Castro sich geweigert hatte, Auslandsschulden und Schäden zu bezahlen, die europäischen Bürgern in den jüngsten venezolanischen Bürgerkriegen entstanden waren. Castro ging davon aus, dass Washington im Rahmen der amerikanischen Monroe-Doktrin eingreifen würde, um eine europäische Militärintervention zu verhindern. US-Präsident Theodore Roosevelt und sein Außenministerium waren damals jedoch der Ansicht, dass die Doktrin nur auf die europäische Gebietseroberung und nicht auf eine Intervention an sich anwendbar sei. Nach vorherigen Zusagen, dass es zu keiner derartigen Gebietseroberung kommen würde, verhielten sich die USA offiziell neutral und ließen die Aktion ohne Einwände zu. Durch die Blockade wurde Venezuelas kleine Marine rasch außer Gefecht gesetzt, doch Castro weigerte sich nachzugeben und stimmte stattdessen grundsätzlich zu, einige der Forderungen einem internationalen Schiedsverfahren zu unterwerfen, was er zuvor abgelehnt hatte. Deutschland erhob zunächst Einwände dagegen und argumentierte, dass Venezuela einige Forderungen auch ohne Schiedsverfahren anerkennen sollte."

ron_early_wars_news.16.t:0 "Kabul Khel"
ron_early_wars_news.16.d:0 "Die Kabul Khel sind ein Waziri-Stamm in Pakistan, ein Unterstamm der Utmanzai. 1902 starteten die Briten eine neue Expedition gegen die Kabul Khel, die sich seit 1896 in einem Zustand der Rebellion gegen die britische Herrschaft befanden."

ron_early_wars_news.17.t:0 "Beziehungen zwischen Italien und der Türkei"
ron_early_wars_news.17.d:0 "Das Osmanische Reich (und die spätere Türkei) begann seine erste diplomatische Mission in Italien 1856, kurz vor der Gründung des Königreichs Italien, mit der Entsendung von Botschafter Rüstem Pascha nach Genua. Seitdem ist die Türkei sowohl mit ihrer Botschaft in Rom als auch mit ihren Konsulaten in Mailand und Neapel ständig in Italien präsent. Beide Länder sind Mitglieder der NATO und der Mittelmeerunion und unterhalten aktive diplomatische Beziehungen."

ron_early_wars_news.18.t:0 "Großer Ming-Aufstand"
ron_early_wars_news.18.d:0 "Vom 25. bis 28. Januar 1903 kam es zu einem sehr kurzen Aufstand, um das „Große Himmlische Königreich der Ming“ wiederherzustellen. Daran waren Tse Tsan-tai, Li Jitang, Liang Muguang und Hong Quanfu beteiligt, die zuvor während der Ära des Himmlischen Königreichs der Taiping am Jintian-Aufstand teilgenommen hatten."

ron_early_wars_news.19.t:0 "Kerinci-Expedition"
ron_early_wars_news.19.d:0 "Die Kerinci-Expedition war eine Strafexpedition der Königlich Niederländisch-Ostindien-Armee nach Kerinci (damals Korintji) an der Westküste Sumatras vom 12. Mai bis 4. September 1903."

ron_early_wars_news.20.t:0 "Theriso-Aufstand"
ron_early_wars_news.20.d:0 "Der Aufstand basierte auf einem Streit zwischen Venizelos und dem Herrscher der Insel, Prinz Georg von Griechenland, über die Zukunft der Insel, insbesondere über die Frage der Union Kretas mit Griechenland. Der Konflikt begann im Jahr 1901, als Prinz Georg Venizelos aus der Regierung entließ. Die Feindseligkeit zwischen Venizelos und dem Prinzen wurde durch dessen außenpolitische Haltung und seine Weigerung, mit seinen Beratern über die inneren Angelegenheiten der Insel zu sprechen, ausgelöst. Nach einem langwierigen politischen Kampf entschieden sich Venizelos und seine Anhänger für einen bewaffneten Aufstand mit dem Ziel, Kreta mit Griechenland zu vereinen und eine demokratischere Regierung auf der Insel einzuführen."

ron_early_wars_news.21.t:0 "Mai-Putsch in Serbien"
ron_early_wars_news.21.d:0 "Der Maiputsch war ein Staatsstreich, bei dem der serbische König Alexander Obrenović und seine Gemahlin, Königin Draga, in der Nacht vom 10. auf den 11. Juni 1903 im Königspalast in Belgrad ermordet wurden. Dieser Akt führte zum Aussterben der Obrenović-Dynastie, die Serbien seit Mitte des 19. Jahrhunderts regiert hatte. Das Attentat wurde von einer Gruppe von Armeeoffizieren unter der Führung des damaligen Hauptmanns Dragutin Dimitrijević Apis organisiert. Nach dem Maiputsch ging der serbische Thron von der rivalisierenden Karađorđević-Dynastie an Peter I. über."

ron_early_wars_news.22.t:0 "Ilinden-Preobrazhenie-Aufstand"
ron_early_wars_news.22.d:0 "Der Ilinden-Preobraschenie-Aufstand, kurz Ilinden-Aufstand vom August 1903, war ein organisierter Aufstand gegen das Osmanische Reich, der von der Inneren Mazedonisch-Adrianopelischen Revolutionären Organisation vorbereitet und durchgeführt wurde. Der Name des Aufstands bezieht sich auf Ilinden, die Zeit Elias, und Preobraschenie, was Verklärung bedeutet. Der Aufstand dauerte von Anfang August bis Mitte Oktober und erstreckte sich über ein riesiges Gebiet von der östlichen Schwarzmeerküste bis zum Ohridsee."

ron_early_wars_news.23.t:0 "Britische Expedition nach Tibet"
ron_early_wars_news.23.d:0 "Die britische Expedition nach Tibet, auch bekannt als Britische Invasion Tibets oder Younghusband-Expedition nach Tibet, begann im Dezember 1903 und dauerte bis September 1904. Die Expedition war de facto eine vorübergehende Invasion britisch-indischer Streitkräfte unter der Schirmherrschaft der Tibet Frontier Commission, deren angebliche Mission darin bestand, diplomatische Beziehungen aufzunehmen und den Grenzstreit zwischen Tibet und Sikkim beizulegen. Im 19. Jahrhundert hatten die Briten Burma und Sikkim erobert, wodurch die gesamte Südflanke Tibets unter die Kontrolle des britischen Raj gelangte. Tibet, das vom Dalai Lama unter der Regierung Ganden Phodrang regiert wurde, war der einzige Himalaya-Staat unter chinesischem statt britischem Einfluss."

ron_early_wars_news.24.t:0 "Britische Eroberung des Emirats Kano"
ron_early_wars_news.24.d:0 "Das Emirat Kano war ein muslimischer Staat in Nordnigeria, der 1805 während des Fulani-Dschihad gegründet wurde, als das von muslimischen Hausa geführte Sultanat Kano abgesetzt und durch ein neues Emirat ersetzt wurde, das ein Vasallenstaat des Kalifats Sokoto wurde. Während und nach der britischen Kolonialzeit wurden die Befugnisse des Emirats stetig eingeschränkt."

ron_early_wars_news.25.t:0 "Aufstand in Madagaskar"
ron_early_wars_news.25.d:0 "Der Aufstand von 1904–1905 in Madagaskar dauerte vom 17. November 1904 bis zum 30. August 1905. Seine Ursachen lagen in der Missachtung der madagassischen Kultur durch die Franzosen, Hinrichtungen ohne Gerichtsverfahren durch französische Beamte, hohen Steuern und Zwangsarbeit. Madagassische Protestanten unterstützten den Aufstand, während madagassische Katholiken ihn eher ablehnten. Aus diesem Grund wurden zahlreiche katholische Kirchen von den Rebellen niedergebrannt."

ron_early_wars_news.26.t:0 "Impfrevolte"
ron_early_wars_news.26.d:0 "Zu Beginn des 20. Jahrhunderts litt Rio de Janeiro, die damalige Hauptstadt Brasiliens, zwar unter den Mängeln seiner Infrastruktur, obwohl es für seine schönen Paläste und Herrenhäuser bekannt war. Zu den Problemen gehörten unzureichende Wasser- und Abwassersysteme, unregelmäßige Müllabfuhr und überfüllte Wohnhäuser. Viele Krankheiten wie Tuberkulose, Masern, Typhus und Lepra waren weit verbreitet. Immer wieder kam es zu Gelbfieber-, Pocken- und Beulenpest-Epidemien."

ron_early_wars_news.27.t:0 "Revolution von 1904"
ron_early_wars_news.27.d:0 "Die Revolution von 1904 war ein zivil-militärischer Aufstand unter der Führung von Aparicio Saravia gegen die Regierung von José Batlle y Ordóñez in der Banda Oriental. Es war der letzte militärische Konflikt zwischen Blancos und Colorados."

ron_early_wars_news.28.t:0 "Sasun-Aufstand"
ron_early_wars_news.28.d:0 "Der Sasun-Aufstand oder die Sasun-Rebellion von 1904 war ein Aufstand armenischer Milizen gegen das Osmanische Reich in der türkischen Region Sason im Jahr 1904. Das Reich wollte nach seiner Niederlage im Ersten Zeitun-Aufstand die Bildung einer weiteren halbautonomen armenischen Region in den östlichen Vilajets verhindern. In Sason rekrutierte die armenische nationale Befreiungsbewegung junge Armenier."

ron_early_wars_news.29.t:0 "Herero-Kriege"
ron_early_wars_news.29.d:0 "Die Hererokriege waren eine Reihe von Kolonialkriegen zwischen dem Deutschen Reich und dem Volk der Herero in Deutsch-Südwestafrika (dem heutigen Namibia). Sie fanden zwischen 1904 und 1908 statt."

ron_early_wars_news.30.t:0 "Russisch-Japanischer Krieg"
ron_early_wars_news.30.d:0 "Der Russisch-Japanische Krieg wurde in den Jahren 1904 und 1905 zwischen dem Russischen Reich und dem Japanischen Kaiserreich wegen rivalisierender imperialer Ambitionen in der Mandschurei und Korea ausgetragen. Die wichtigsten Kriegsschauplätze waren die Halbinsel Liaodong und Mukden in der Südmandschurei sowie die Meere um Korea, Japan und das Gelbe Meer."

ron_early_wars_news.31.t:0 "Jemenitischer Aufstand von 1904"
ron_early_wars_news.31.d:0 "1904 kam es im Jemen zu einem weiteren Aufstand. Während der arabische Historiker Abdul Yaccob den Beginn im Juni 1904 angibt, berichtet Caesar E. Farah, dass sich der erste schwere Zwischenfall am 8. November ereignete, als eine osmanische Garnison in Hafash angegriffen und zerstört wurde. Nach dem Angriff auf Hafash brachen in Hajjah und Hajur Aufstände aus. Die Rebellen besetzten daraufhin Dhamar und Yarim und marschierten auf Taiz und Qatabah ein."

ron_early_wars_news.32.t:0 "Mazedonischer Kampf"
ron_early_wars_news.32.d:0 "Der Makedonische Kampf bzw. der griechische Kampf um Makedonien bzw. aus bulgarischer und ethnischer Sicht die griechische bewaffnete Propaganda in Makedonien war eine Reihe sozialer, politischer, kultureller und militärischer Konflikte, die hauptsächlich zwischen griechischen und bulgarischen Untertanen ausgetragen wurden, die zwischen 1893 und 1908 im osmanischen Makedonien lebten. Der Konflikt war Teil eines größeren Aufstandskrieges, in dem revolutionäre Organisationen von Griechen, Bulgaren und Serben um Makedonien kämpften. Allmählich gewannen die griechischen und bulgarischen Gruppen die Oberhand, doch der Konflikt wurde 1908 durch die Jungtürkische Revolution beendet."

ron_early_wars_news.33.t:0 "Ping-liu-li-Aufstand"
ron_early_wars_news.33.d:0 "Ma Fuyi und Huaxinghui waren 1905 in den drei Gebieten Pingxiang, Liuyang und Liling an einem Aufstand beteiligt, der als Ping-liu-li-Aufstand bezeichnet wurde. Bereits 1903 wurde mit der Rekrutierung von Bergarbeitern begonnen. Nach dem Scheitern des Aufstands wurde Ma Fuyi hingerichtet."

ron_early_wars_news.34.t:0 "Persische Verfassungsrevolution"
ron_early_wars_news.34.d:0 "Die persische Verfassungsrevolution, auch bekannt als die Verfassungsrevolution des Iran, fand zwischen 1905 und 1911 statt. Die Revolution führte zur Gründung eines Parlaments in Persien (Iran) während der Kadscharen-Dynastie."

ron_early_wars_news.35.t:0 "Argentinische Revolution von 1905"
ron_early_wars_news.35.d:0 "Argentinische Revolution von 1905 Die Argentinische Revolution von 1905, auch bekannt als die Radikale Revolution von 1905, war ein zivil-militärischer Aufstand, der von der Radikalen Bürgerunion organisiert und von Hipólito Yrigoyen angeführt wurde und sich gegen die als Roquismo bekannte oligarchische Vorherrschaft unter der Führung von Julio Argentino Roca und seiner Nationalen Autonomen Partei richtete."

ron_early_wars_news.36.t:0 "Shoubak-Aufstand von 1905"
ron_early_wars_news.36.d:0 "Der zweite Aufstand begann im Mai 1905, nachdem osmanische Truppen Frauen der Stadt zur Zwangsarbeit zwangen. Sie mussten Wasser von Quellen tief im Tal zur Burg Montréal oberhalb der Truppenstationierung tragen. Dies könnte eine bewusste Bestrafung der häufig ungehorsamen Einwohner von Shoubak gewesen sein. Die Einwohner von Shoubak revoltierten, weil sie die Demütigung ihrer Frauen als Angriff auf ihre Ehre empfanden. Die Stadtbewohner griffen osmanische Soldaten an, vertrieben sie aus der Burg und suchten dort Schutz."

ron_early_wars_news.37.t:0 "Aufstand von Łódź"
ron_early_wars_news.37.d:0 "Der Aufstand von Lodz, auch als Junitage bekannt, war ein Aufstand polnischer Arbeiter in Lodz gegen das Russische Reich vom 21. bis 25. Juni 1905. Dieses Ereignis war eine der größten Unruhen im russisch kontrollierten Kongresspolen während der Russischen Revolution von 1905. Polen war von 1905 bis 1907 ein wichtiges Zentrum revolutionärer Kämpfe im Russischen Reich, und der Aufstand von Lodz war ein Schlüsselereignis in diesen Ereignissen."

ron_early_wars_news.38.t:0 "Tibetischer Aufstand"
ron_early_wars_news.38.d:0 "Der tibetische Aufstand von 1905 war eine Reihe von Unruhen, bei denen die tibetischen Lamas französische katholische Missionare folterten und hinrichteten, tibetisch-katholische Konvertiten massakrierten, Beamte des Qing-China ermordeten, die den Aufstand niederschlagende Armee der Qing angriffen und Dutzende von Kirchen niederbrannten. Dies gilt als eine der größten religiösen Verfolgungen, die von den tibetischen Lamas organisiert wurden."

ron_early_wars_news.39.t:0 "Russische Revolution"
ron_early_wars_news.39.d:0 "Die Russische Revolution von 1905, auch bekannt als Erste Russische Revolution, war eine Welle politischer und sozialer Unruhen, die sich über weite Teile des Russischen Reiches ausbreitete und sich teilweise gegen die Regierung richtete. Sie umfasste Arbeiterstreiks, Bauernunruhen und Militärmeutereien. Sie führte zu einer Verfassungsreform (dem „Oktobermanifest“), einschließlich der Gründung der Staatsduma, des Mehrparteiensystems und der russischen Verfassung von 1906."

ron_early_wars_news.40.t:0 "Maji-Maji-Rebellion"
ron_early_wars_news.40.d:0 "Der Maji-Maji-Aufstand war ein bewaffneter Aufstand islamischer und animistischer Afrikaner gegen die deutsche Kolonialherrschaft in Deutsch-Ostafrika. Auslöser des Krieges war die deutsche Politik, die die einheimische Bevölkerung zum Baumwollanbau für den Export zwang. Er dauerte von 1905 bis 1907. 250.000 bis 300.000 Menschen starben an Hunger, die meisten von ihnen Zivilisten."

ron_early_wars_news.41.t:0 "Jemenitische Expedition"
ron_early_wars_news.41.d:0 "Nach dem Scheitern der Verhandlungen verletzten die osmanischen Streitkräfte, bestehend aus sechs Bataillonen unter der Führung von Ahmad Faydi Pascha, den Waffenstillstand und starteten am 16. Juli 1905 von Manakhah aus eine dreigleisige Offensive. Am 29. oder 30. August eroberten sie Sanaa."

ron_early_wars_news.42.t:0 "Südsulawesi-Expeditionen von 1905"
ron_early_wars_news.42.d:0 "Die Südsulawesi-Expeditionen des Jahres 1905, zu denen auch der Dritte Knochenkrieg und der Gowa-Krieg gehörten, wurden von der Königlich Niederländisch-Ostindischen Armee (KNIL) unternommen, um die Staaten Südsulawesis (Celebes) zur Unterzeichnung der Korte Verklaring (Kurze Erklärung oder Deklaration) zu zwingen, der Standardvereinbarung, mit der ein einheimischer indonesischer Herrscher die niederländische Souveränität anerkennt. Einigen niederländischen Historikern zufolge waren die Expeditionen eine „Verpflichtung“, da die Niederländer für Recht und Ordnung verantwortlich waren. Ein indonesischer Historiker argumentierte, sie hätten tatsächlich einen strategischen Zweck gehabt: Südsulawesi sei der „Schlüssel“ zur Kontrolle des sogenannten Großen Ostens. Es gab auch ein wirtschaftliches Motiv: die Steuererhebungsbefugnisse der Regierung von Sulawesi auszuweiten. Die Expeditionen erhielten in einem Brief vom 11. Februar 1904 die Genehmigung des Gouverneurs von Sulawesi, Alexander Kroesen."

ron_early_wars_news.43.t:0 "Taba-Krise"
ron_early_wars_news.43.d:0 "Die Taba-Krise von 1906 begann, als Sultan Abdulhamid II. des Osmanischen Reiches beschloss, in Taba einen Stützpunkt zu errichten. Die Briten schickten einen Dampfer der ägyptischen Küstenwache, um Naqb el Aqaba und Taba zurückzuerobern. Als die ägyptischen Truppen auf einen türkischen Offizier trafen, der ihnen die Landeerlaubnis verweigerte, landeten sie stattdessen auf der nahegelegenen Pharaoneninsel. Die britische Marine schickte Kriegsschiffe ins östliche Mittelmeer und drohte, bestimmte Inseln unter die Herrschaft des Osmanischen Reiches zu bringen. Der Sultan stimmte der Räumung von Taba zu, und am 13. Mai 1906 einigten sich Großbritannien und das Osmanische Reich darauf, eine formelle Grenze zu ziehen, die ungefähr gerade von Rafah in südöstlicher Richtung bis zu einem Punkt am Golf von Akaba verlaufen sollte, der mindestens fünf Kilometer von Akaba entfernt war."

ron_early_wars_news.44.t:0 "Osmanische Invasion in Persien"
ron_early_wars_news.44.d:0 "Auf Befehl des Vali von Bagdad kam es 1906 zu einer osmanischen Invasion Persiens. Am 23. Mai besetzten die Osmanen Behik in Bradest. Ende Mai hatten osmanische Truppen Teile der Distrikte Dasht und Mergaver besetzt, jedoch nicht die Siedlung Mergaver selbst. Am 13. Juni hatten die Osmanen Serdasht und Bani besetzt. Die Bürger von Chanakin wurden gezwungen, osmanische Pässe anzunehmen und sich der osmanischen Armee anzuschließen. 500 berittene osmanische Truppen marschierten von Baneh in das persische Luristan und die Distrikte Seifi, Malkhatavi und Baghasi und verbrannten unterwegs die Ernte. Am 24. August erklärte der osmanische Kommandant in Ban nach Protesten der persischen Regierung, er habe keinen Befehl zum Rückzug. Zwei Tage später trieben die Osmanen Steuern in der Nähe von Urumia ein."

ron_early_wars_news.45.t:0 "Mesopotamien-Aufstand"
ron_early_wars_news.45.d:0 "Der Mesopotamien-Aufstand von 1906 war ein Aufstand mesopotamischer Stämme im Osmanischen Reich. Er wurde geführt, weil sich die osmanische Regierung weigerte, einen zehntägigen Waffenstillstand zuzulassen, um die Verluste der Jemen-Expedition von 1905 zu untersuchen. Während des Aufstands blockierten Stämme die Schifffahrt über den Tigris."

ron_early_wars_news.46.t:0 "Niederländische Intervention auf Bali"
ron_early_wars_news.46.d:0 "Die niederländische Intervention auf Bali im Jahr 1906 war eine niederländische Militärintervention auf Bali im Rahmen der niederländischen Kolonialherrschaft. Dabei kamen über 1.000 Menschen ums Leben, die meisten davon Zivilisten. Sie war Teil der niederländischen Kampagne zur Unterdrückung des größten Teils von Niederländisch-Ostindien. Die Kampagne tötete die balinesischen Herrscher von Badung sowie ihre Frauen und Kinder, zerstörte die südbalischen Königreiche Badung und Tabanan und schwächte das Königreich Klungkung. Es war die sechste niederländische Militärintervention auf Bali."

ron_early_wars_news.47.t:0 "Bambatha-Rebellion"
ron_early_wars_news.47.d:0 "Der Bambatha-Aufstand (oder Zulu-Aufstand) von 1906 wurde von Bambatha kaMancinza (ca. 1860–1906?) angeführt, dem Anführer des Zondi-Clans der Zulu, die im Mpanza-Tal (heute ein Distrikt in der Nähe von Greytown, KwaZulu-Natal) lebten und sich gegen die britische Herrschaft und Besteuerung in der Kolonie Natal in Südafrika richteten."

ron_early_wars_news.48.t:0 "Huanggang-Aufstand"
ron_early_wars_news.48.d:0 "Der Huanggang-Aufstand begann am 22. Mai 1907 in Chaozhou. Die Revolutionäre Partei unter Xu Xueqiu, Chen Yongpo und Yu Tongshi startete den Aufstand und eroberte die Stadt Huanggang. Nach Ausbruch des Aufstands schlug die Qing-Regierung ihn schnell und gewaltsam nieder. Rund 200 Revolutionäre wurden getötet."

ron_early_wars_news.49.t:0 "Huizhou Qinühu-Aufstand"
ron_early_wars_news.49.d:0 "Am 2. Juni versammelten Deng Zhiyu und Chen Chuan einige Anhänger um sich und erbeuteten gemeinsam Qing-Waffen im See, 20 Kilometer von Huizhou entfernt. Sie töteten mehrere Qing-Soldaten und griffen am 5. Juni Taiwei an. Die Qing-Armee floh in Unordnung, und die Revolutionäre nutzten die Gelegenheit und eroberten mehrere Städte. In Bazhiyie besiegten sie die Qing-Armee erneut. Viele Organisationen unterstützten den Aufstand nach dem Aufstand, und die Zahl der revolutionären Truppen stieg auf seinem Höhepunkt auf 200 Mann. Der Aufstand scheiterte jedoch letztendlich."

ron_early_wars_news.50.t:0 "Anqing-Aufstand"
ron_early_wars_news.50.d:0 "Am 6. Juli 1907 führte Xu Xilin aus Guangfuhui einen Aufstand in Anqing, Anhui, an, der als Anqing-Aufstand bekannt wurde. Xu Xilin war zu dieser Zeit Polizeikommissar und Leiter der Polizeiakademie. Er führte einen Aufstand an, dessen Ziel die Ermordung des Provinzgouverneurs von Anhui, En Ming, war. Nach vierstündigem Kampf wurden sie besiegt. Xu wurde gefangen genommen, und En Mings Leibwächter schnitten ihm Herz und Leber heraus und aßen sie. Sein Cousin Qiu Jin wurde wenige Tage später hingerichtet."

ron_early_wars_news.51.t:0 "Qinzhou-Aufstand"
ron_early_wars_news.51.d:0 "Von August bis September 1907 kam es zum Qinzhou-Aufstand, um gegen die hohen Steuern der Regierung zu protestieren. Sun Yat-sen schickte Wang Heshun dorthin, um die Revolutionsarmee zu unterstützen, und eroberte den Kreis im September. Danach versuchten sie, Qinzhou zu belagern und einzunehmen, doch sie blieben erfolglos. Sie zogen sich schließlich in die Gegend von Shiwandashan zurück, während Wang Heshun nach Vietnam zurückkehrte."

ron_early_wars_news.52.t:0 "Zhennanguan-Aufstand"
ron_early_wars_news.52.d:0 "Am 1. Dezember 1907 fand in Zhennanguan, einem Pass an der chinesisch-vietnamesischen Grenze, der Zhennanguan-Aufstand statt. Sun Yat-sen schickte Huang Mintang zur Überwachung des Passes, der von einer Festung bewacht wurde. Mit Unterstützung von Anhängern unter den Verteidigern der Festung eroberten die Revolutionäre den Kanonenturm in Zhennanguan. Sun Yat-sen, Huang Xing und Hu Hanmin begaben sich persönlich zum Turm, um die Schlacht zu befehligen. Die Qing-Regierung schickte Truppen zum Gegenangriff, und die Revolutionäre mussten sich in die Bergregionen zurückziehen. Nach dem Scheitern dieses Aufstands musste Sun aufgrund sunfeindlicher Stimmungen innerhalb der revolutionären Gruppen nach Singapur ziehen. Er kehrte erst nach dem Wuchang-Aufstand auf das Festland zurück."

ron_early_wars_news.53.t:0 "Bitlis-Aufstand"
ron_early_wars_news.53.d:0 "Der Bitlis-Aufstand war ein kurdischer Aufstand in Bitlis gegen das Osmanische Reich im Jahr 1907. Die Ursachen des Aufstands lagen in den Spannungen zwischen den lokalen Kurden und dem Gouverneur von Bitlis nach einem Erdbeben im März desselben Jahres. Der Aufstand begann am 22. Juni 1907 und dauerte 38 Tage, bevor er am 30. Juli von osmanischen Truppen niedergeschlagen wurde. Im März 1914 brach in Bitlis ein weiterer Aufstand aus."

ron_early_wars_news.54.t:0 "Rumänischer Bauernaufstand"
ron_early_wars_news.54.d:0 "Der rumänische Bauernaufstand von 1907 ereignete sich zwischen dem 21. Februar und dem 5. April 1907. Er begann in Nordmoldau und breitete sich nach dreiwöchiger Beschränkung auf dieses Gebiet rasch auf die Walachei und sogar Oltenien aus. Hauptursache war die Unzufriedenheit der Bauern über die ungleiche Verteilung des Grundbesitzes, der in den Händen einiger weniger Großgrundbesitzer lag."

ron_early_wars_news.55.t:0 "Honduranisch-Nicaraguanischer Krieg"
ron_early_wars_news.55.d:0 "Die erste Bewährungsprobe des neuen Vertrags betraf Honduras. 1908 marschierten Gegner von Präsident Dávila, vermutlich unterstützt von Guatemala und El Salvador, in das Land ein. Nicaragua unterstützte den honduranischen Präsidenten, und ein Krieg schien unmittelbar bevorzustehen. Doch vielleicht aus Angst vor einer möglichen Intervention der USA einigten sich die Parteien darauf, den Streit dem neuen zentralamerikanischen Gerichtshof vorzulegen. Der Gerichtshof wies die Klagen Hondurans und Nicaraguas letztlich ab, doch in der Zwischenzeit brach der Aufstand zusammen, und so kehrte in Honduras kurzzeitig Frieden ein."

ron_early_wars_news.56.t:0 "Beipu-Aufstand"
ron_early_wars_news.56.d:0 "Der Beipu-Zwischenfall im Jahr 1907 war der erste bewaffnete lokale Aufstand gegen die japanische Herrschaft auf der Insel Taiwan. Als Reaktion auf die Unterdrückung der lokalen Bevölkerung durch die japanischen Behörden griff eine Gruppe von Aufständischen der Hakka-Untergruppe der Han-Chinesen und der indigenen Saisiyat in Hokuho, Shinchiku Chō (heute Beipu, Kreis Hsinchu), japanische Beamte und deren Familien an. Als Vergeltung töteten japanisches Militär und Polizei mehr als 100 Hakka. Der lokale Aufstand war der erste seiner Art in Taiwan unter japanischer Herrschaft und führte in den folgenden Jahren zu weiteren Aufständen."

ron_early_wars_news.57.t:0 "Bazar Valley-Kampagne"
ron_early_wars_news.57.d:0 "Der Bazar-Tal-Feldzug war eine Strafexpedition gegen den Zakka-Khel-Clan der Afridi, eines paktunischen Stammes, der die Berge an der Grenze zu Peshawar in der nordwestlichen Grenzprovinz Britisch-Indiens bewohnte. Er wurde von der Bazar-Tal-Feldtruppe unter dem Kommando von General Sir James Willcocks durchgeführt. Der Feldzug begann am 12. Februar 1908 und endete mit einer Jirga und Frieden im März 1908. Das Satiremagazin Punch bezeichnete den Feldzug als Willcocks&#39; Wochenendkrieg. Die wichtigsten Elemente der britischen Armee waren die Seaforth Highlanders und die 37th Lancers. Zu den Regimentern der Britisch-Indischen Armee gehörten Teile des 45. und 53. Sikh-Regiments, die Madras Sappers und 5 Gorkha Rifles."

ron_early_wars_news.58.t:0 "Qin-lian-Aufstand"
ron_early_wars_news.58.d:0 "Am 27. März 1908 startete Huang Xing von einem Stützpunkt in Vietnam aus einen Angriff auf die Städte Qinzhou und Lianzhou in Guangdong, der später als Qin-Lian-Aufstand bekannt wurde. Der Kampf dauerte vierzehn Tage, musste jedoch abgebrochen werden, als den Revolutionären die Vorräte ausgingen."

ron_early_wars_news.59.t:0 "Hekou-Aufstand"
ron_early_wars_news.59.d:0 " Im April 1908 kam es in Yunnan, Hekou, zu einem weiteren Aufstand, dem sogenannten Hekou-Aufstand. Huang Mingtang führte zweihundert vietnamesische Männer an und griff am 30. April Hekou an. Zu den weiteren Revolutionären, die teilnahmen, gehörten Wang Heshun und Guan Renfu. Sie waren jedoch zahlenmäßig unterlegen und wurden von den Regierungstruppen besiegt, so dass der Aufstand scheiterte."

ron_early_wars_news.60.t:0 "Mapaoying-Aufstand"
ron_early_wars_news.60.d:0 "Am 19. November 1908 startete Xiong Chenggei, Mitglied der revolutionären Gruppe Yuewanghui, in Anhui den Mapaoying-Aufstand. Yuewanghui war zu dieser Zeit ein Teilgebiet von Tongmenghui. Auch dieser Aufstand scheiterte."

ron_early_wars_news.61.t:0 "Wad-Habuba-Aufstand"
ron_early_wars_news.61.d:0 "Der Wad-Habuba-Aufstand war ein Aufstand im anglo-ägyptischen Sudan Mitte 1908. Seine Ursachen lagen im religiösen Widerstand gegen die christliche britische Herrschaft im Sudan und dem Wunsch, den Mahdismus-Staat wiederherzustellen. Angeführt wurde er von einem Veteranen des Mahdismus-Krieges, Abd al-Qadir Muhammad Imam Wad Habuba. Er begann im April, als al-Qadir mit 40 Anhängern die Stadt Tugur einnahm. Von dort griff der Aufstand auf Katfia über. Die Kolonialbehörden nahmen den Aufstand sehr ernst und entsandten zwei Infanteriekompanien, um den Aufstand niederzuschlagen. Ende April war Katfia unblutig zurückerobert worden. In der Nacht des 2. Mai versuchten die Rebellen, Katfia von den Briten zurückzuerobern, blieben jedoch erfolglos."

ron_early_wars_news.62.t:0 "Mohmand-Expedition von 1908"
ron_early_wars_news.62.d:0 "Im Jahr 1908 teilten sich die Mohmands in zwei Hauptgruppen: die unabhängigen Mohmands, die jenseits der Verwaltungsgrenze lebten, und jene, die in und um Matanni und im südwestlichen Teil des Distrikts Peshawar wohnten. Die Mohmands des Distrikts Peshawar hatten jedoch schon lange den Kontakt zu denen in den Bergen verloren und standen in keiner Verbindung zum Ausbruch im Frühjahr 1908."

ron_early_wars_news.63.t:0 "Bazar Valley-Kampagne"
ron_early_wars_news.63.d:0 "Es wurde von der Bazar Valley Field Force unter dem Kommando von General Sir James Willcocks durchgeführt. Der Feldzug begann am 12. Februar 1908 und endete mit einer Jirga und Frieden im März 1908. Das Satiremagazin Punch bezeichnete den Feldzug als Willcocks&#39; Wochenendkrieg. Die wichtigsten Elemente der britischen Armee waren die Seaforth Highlanders und die 37th Lancers. Zu den Regimentern der British Indian Army gehörten Teile des 45. und 53. Sikh-Regiments, die Madras Sappers und 5 Gorkha Rifles. Archibald Percival, 1. Earl Wavell, nahm als Junioroffizier an diesem Feldzug teil."

ron_early_wars_news.64.t:0 "Schlacht von Marrakesch"
ron_early_wars_news.64.d:0 "Die Schlacht von Marrakesch war eine zentrale Schlacht in der Hafidiya, in der Abd al-Hafid die Macht von seinem Bruder Abdelaziz übernahm. Sie wurde am 19. August 1908 außerhalb von Marrakesch, Marokko, ausgetragen. Ein von Abdelaziz angeführtes Bataillon brach von Rabat auf und wurde auf dem Weg nach Marrakesch von Truppen, die Abd al-Hafid treu ergeben waren, überfallen und besiegt."

ron_early_wars_news.65.t:0 "Jungtürkische Revolution"
ron_early_wars_news.65.d:0 "Die Jungtürkische Revolution (Juli 1908) im Osmanischen Reich fand statt, als die Jungtürkische Bewegung Sultan Abdülhamid II. zwang, die osmanische Verfassung von 1876 wiederherzustellen und das Mehrparteiensystem im Reich einführte. Die Zeit von der Jungtürkischen Revolution bis zum Ende des Reiches markiert die Zweite Verfassungsära in der Geschichte des Osmanischen Reiches. Mehr als drei Jahrzehnte zuvor, im Jahr 1876, war unter Abdülhamid während einer als Erste Verfassungsära bekannten Zeitspanne die konstitutionelle Monarchie errichtet worden. Diese dauerte nur zwei Jahre, bevor Abdülhamid sie suspendierte und sich selbst die autokratische Macht zurückgab."

ron_early_wars_news.66.t:0 "Hamawand-Aufstand"
ron_early_wars_news.66.d:0 "Der Hamawand-Aufstand war ein kurdischer Aufstand des Hamawand-Stammes im Vilâyet Mossul, der 1908 als Gegenbewegung zur Revolution der Jungtürken und zur Unterstützung des osmanischen Sultans begann. Der Aufstand endete im Juli 1910, als die Hamawand eine Vereinbarung mit dem örtlichen Wali von Bagdad, Nadim Pascha, trafen, in der sie die osmanische Autorität nominell anerkannten. Laut David McDowall dauerte der Aufstand im April 1911 nach Nadims Rückkehr nach Konstantinopel an, und die Hamawand befanden sich Berichten zufolge noch immer im Aufstand, als der Erste Weltkrieg begann. Dies wird jedoch in Gökhan Çetinsayas Bericht nicht erwähnt, der lediglich berichtet, dass „der Hamawand-Terror in der Region etwa zwei Jahre dauerte und nur mit erheblicher Gewalt niedergeschlagen werden konnte“."

ron_early_wars_news.67.t:0 "Niederländische Intervention auf Bali"
ron_early_wars_news.67.d:0 "Die niederländische Intervention auf Bali im Jahr 1908 markierte die letzte Phase der niederländischen Kolonialherrschaft über die indonesische Insel Bali. Es war die siebte und letzte militärische Intervention auf Bali nach der niederländischen Intervention auf Bali (1906). Auslöser der Intervention war ein balinesischer Aufstand gegen den Versuch der Niederlande, ihnen ein Opiummonopol aufzuzwingen. Der Raja von Karangasem widersetzte sich dem Monopol, was zu Unruhen in der Hauptstadt Klungkung führte. Auch in Gelgel kam es zu Unruhen, als Balinesen einen javanischen Opiumhändler töteten."

ron_early_wars_news.68.t:0 "Niederländisch-venezolanische Krise"
ron_early_wars_news.68.d:0 "Die niederländisch-venezolanische Krise von 1908 war ein Streit, der zwischen den Niederlanden und Venezuela ausbrach, nachdem der venezolanische Präsident Cipriano Castro den Handel mit der niederländischen Insel Curaçao mit der Begründung eingestellt hatte, dass diese politische Flüchtlinge aus Venezuela beherbergte."

ron_early_wars_news.69.t:0 "Estradas Rebellion"
ron_early_wars_news.69.d:0 "Im Jahr 1909 sah sich der nicaraguanische Präsident José Santos Zelaya von der Liberalen Partei mit dem Widerstand der Konservativen Partei unter Führung von Gouverneur Juan José Estrada aus Bluefields konfrontiert. Dieser erhielt Unterstützung von der US-Regierung, da amerikanische Unternehmer Estradas Rebellion finanziell unterstützten, in der Hoffnung, nach dem Sieg der Rebellion wirtschaftliche Zugeständnisse zu erreichen."

ron_early_wars_news.70.t:0 "Kolašin-Affäre"
ron_early_wars_news.70.d:0 "Die Kolašin-Affäre war ein Aufstand des montenegrinischen Militärs gegen die Diktatur des Fürsten von Montenegro, Nikola I. Petrović-Njegoš, der 1909 ausbrach. Sie folgte auf die gescheiterte Bombaš-Affäre – eine 1907 von einer Gruppe montenegrinischer Studenten mit Verbindungen zur Schwarzen Hand organisierte Verschwörung mit dem Ziel, die montenegrinische Regierung durch Terroranschläge (mit Bomben, daher „Bombaši“) zu stürzen. Ihr letztendliches Ziel war die Vereinigung Montenegros mit Serbien, doch die Gruppe wurde frühzeitig entdeckt, was 1908 zu zahlreichen Verhaftungen führte. Im selben Jahr wurde in Belgrad eine geheime Organisation montenegrinischer Politiker und politischer Emigranten gegründet, die sich gegen Nikola I. stellten und Nikola I. töten, die Bombaši befreien und Tomanovićs reaktionäres Regime stürzen wollten. Die montenegrinische Polizei entdeckte die Affäre, was zur Inhaftierung und Todesstrafe der Verschwörer führte. Die beiden Affären führten zu einer Verschlechterung der bilateralen Beziehungen zwischen Montenegro und Serbien."

ron_early_wars_news.71.t:0 "Zaraniq-Aufstand"
ron_early_wars_news.71.d:0 "Der Zaraniq-Aufstand war ein Aufstand des Zaraniq-Stammes, der zwischen 1909 und 1910 im Vilâyet Jemen stattfand, das damals Teil des Osmanischen Reiches war. Der Aufstand wurde aus zwei Gründen geführt: dem Widerstand gegen die Verlängerung der Telegrafenleitungen durch ihr Gebiet und der unerfüllten Forderung, die Söhne ihrer Anführer, die in Hodeida, Bayt al-Faqih und anderen Orten als Geiseln festgehalten wurden, aus dem Gefängnis zu entlassen."

ron_early_wars_news.72.t:0 "Rebellion der verrückten Schlange"
ron_early_wars_news.72.d:0 "Der Crazy-Snake-Aufstand, auch bekannt als Smoked Meat Rebellion oder Crazy-Snake-Krieg, war ein Zwischenfall im Jahr 1909 zwischen den Creek und amerikanischen Siedlern. Er sollte nicht mit einem früheren, unblutigen Konflikt im Jahr 1901 verwechselt werden, an dem viele der gleichen Personen beteiligt waren. Der Konflikt bestand aus nur zwei kleineren Scharmützeln, wobei die erste ein Kampf zwischen einer Gruppe marginalisierter Afroamerikaner und einer Gruppe war, die gegründet worden war, um den angeblichen Raub eines Stücks geräuchertem Fleisch zu bestrafen."

ron_early_wars_news.73.t:0 "Zweite Melillan-Kampagne"
ron_early_wars_news.73.d:0 "Bei der Kampagne handelte es sich um einen Konflikt im Jahr 1909 in Marokko rund um Melilla. An den Kämpfen waren einheimische Riffianer und die spanische Armee beteiligt."

ron_early_wars_news.74.t:0 "Hauran Drusenaufstand"
ron_early_wars_news.74.d:0 "Der Drusenaufstand von Hauran war ein gewalttätiger Aufstand der Drusen gegen die osmanische Herrschaft in der syrischen Provinz, der 1909 ausbrach. Der Aufstand wurde von der Familie al-Atrash angeführt und zielte auf die Erlangung der Unabhängigkeit. Er endete jedoch mit der brutalen Unterdrückung der Drusen, einer erheblichen Entvölkerung der Region Hauran und der Hinrichtung der Drusenführer."

ron_early_wars_news.75.t:0 "Wadai-Krieg"
ron_early_wars_news.75.d:0 "Der Wadai-Krieg wurde von 1906 bis 1912 von Frankreich und seinen afrikanischen Verbündeten gegen das Wadai-Reich und dessen Verbündete geführt. Wadai, im heutigen Osttschad und Westsudan gelegen, leistete der französischen Invasion erbitterten Widerstand. Trotzdem fielen 1909 große Teile Wadais, einschließlich der Hauptstadt Abéché, an die Invasoren. Herrscher Dud Murra war daher gezwungen, seinen Widerstand aus den umliegenden Provinzen und verbündeten Staaten fortzusetzen. Es gelang ihm, die Unterstützung des Sultanats Darfur und Dar Masalit zu gewinnen und diese Gebiete als Stützpunkte bei seinen Versuchen, die Franzosen zu vertreiben, zu nutzen."

ron_early_wars_news.76.t:0 "Aufstand der neuen Armee von Gengxu"
ron_early_wars_news.76.d:0 "Im Februar 1910 kam es zum Aufstand der Neuen Armee von Gengxu. Dabei kam es zu einem Konflikt zwischen der Bevölkerung und der örtlichen Polizei gegen die Neue Armee. Nachdem der Revolutionsführer Ni Yingdian von den Qing-Truppen getötet worden war, wurden die verbleibenden Revolutionäre schnell besiegt, was zum Scheitern des Aufstands führte."

ron_early_wars_news.77.t:0 "Monegassische Revolution"
ron_early_wars_news.77.d:0 "Die Monegassische Revolution von 1910 war eine Reihe von Konfrontationen der Untertanen Monacos gegen ihren Herrscher, Fürst Albert I. Sie führte mit der Verkündung der Verfassung Monacos im darauffolgenden Jahr zum Ende der absoluten Monarchie."

ron_early_wars_news.78.t:0 "Karak-Aufstand"
ron_early_wars_news.78.d:0 "Der Karak-Aufstand war ein Aufstand gegen die osmanische Herrschaft in der transjordanischen Stadt Al-Karak, der am 4. Dezember 1910 ausbrach. Der Aufstand begann, nachdem Sami Pascha, der Gouverneur von Damaskus, die Einwohner von Al-Karak mit denselben Maßnahmen der Wehrpflicht, Besteuerung und Entwaffnung belegen wollte, die zuvor den Hauran-Drusenaufstand provoziert hatten."

ron_early_wars_news.79.t:0 "Albanischer Aufstand von 1910"
ron_early_wars_news.79.d:0 "Der albanische Aufstand von 1910 (oder Aufstand von 1910) war eine Reaktion auf die neue Zentralisierungspolitik der jungtürkischen osmanischen Regierung in Albanien. Es war der erste einer Reihe größerer Aufstände. Die Rebellen wurden vom Königreich Serbien unterstützt. Neue Steuern in den ersten Monaten des Jahres 1910 führten dazu, dass Isa Boletini albanische Führer, die bereits an einem Aufstand von 1909 beteiligt waren, zu einem weiteren Aufstand gegen das Osmanische Reich überredete. Die Rebellen griffen Osmanen in Priştine und Ferizovik an, töteten den osmanischen Kommandanten in İpek und blockierten die Eisenbahn nach Skopje am Kaçanik-Pass. Dies führte dazu, dass die osmanische Regierung das Kriegsrecht in der Region verhängte."

ron_early_wars_news.80.t:0 "Revolution vom 5. Oktober 1910"
ron_early_wars_news.80.d:0 "Die Revolution vom 5. Oktober 1910 war der Sturz der jahrhundertealten portugiesischen Monarchie und ihre Ersetzung durch die Erste Portugiesische Republik. Sie war das Ergebnis eines von der Portugiesischen Republikanischen Partei organisierten Staatsstreichs."

ron_early_wars_news.81.t:0 "Chinesische Expedition nach Tibet"
ron_early_wars_news.81.d:0 "Im Spätwinter 1910 war die Qing-Regierung in Peking wütend auf den 13. Dalai Lama. Seine Regierung hatte die Auflösung ihrer Herrschaftsgebiete in Khams durch die Qing-Verwaltung miterlebt und befürchtete, der Amban in Lhasa würde ihre weltliche Autorität aufheben. Sie entzog dem kaiserlichen Offizier daher den Lebensunterhalt, den ihm die tibetische Regierung in einer vorherigen Vereinbarung mit dem Qing-Hof garantiert hatte. Als eine Hilfstruppe aus Sichuan in Lhasa eintraf, um den Amban aus seiner Isolation zu befreien, floh der Dalai Lama nach Britisch-Indien."

ron_early_wars_news.82.t:0 "Sokehs Rebellion"
ron_early_wars_news.82.d:0 "Der Sokeh-Aufstand war ein Aufstand des Sokeh-Stammes gegen die lokale deutsche Herrschaft, der 1910/1911 auf der Sokeh-Insel vor der Hauptinsel Pohnpei in den östlichen Karolinen begann. Der deutsche Bezirkskommissar Gustav Boeder, drei weitere deutsche Beamte und fünf Inselbewohner wurden von den Rebellen getötet, bevor deutsche Marineeinheiten eintrafen und die Ordnung wiederherstellten."

ron_early_wars_news.83.t:0 "Mexikanische Revolution"
ron_early_wars_news.83.d:0 "Die mexikanische Revolution war eine bedeutende Revolution, die eine Reihe bewaffneter Kämpfe umfasste und etwa von 1910 bis 1920 andauerte. Sie veränderte die mexikanische Kultur und Regierung. Ihr Ausbruch im Jahr 1910 war auf die zunehmende Unbeliebtheit des 31 Jahre andauernden Regimes von Porfirio Díaz und das Versäumnis des Regimes, eine kontrollierte Lösung für die Präsidentschaftsnachfolge zu finden, zurückzuführen. Dies führte zu einem Machtkampf zwischen konkurrierenden Eliten, der die Möglichkeit für einen Agraraufstand eröffnete. Der wohlhabende Landbesitzer Francisco I. Madero forderte Díaz bei den Präsidentschaftswahlen 1910 heraus und revoltierte nach den manipulierten Ergebnissen im Rahmen des Plans von San Luis Potosí."

ron_early_wars_news.84.t:0 "Mexikanischer Grenzkrieg"
ron_early_wars_news.84.d:0 "Der mexikanische Grenzkrieg oder die Grenzkampagne bezeichnet die militärischen Auseinandersetzungen, die während der mexikanischen Revolution im Grenzgebiet zwischen Mexiko und den Vereinigten Staaten in Nordamerika stattfanden. Der Banditenkrieg in Texas war Teil des Grenzkrieges. Seit Beginn der mexikanischen Revolution im Jahr 1910 war die US-Armee in großer Zahl entlang der Grenze stationiert und kämpfte mehrmals mit mexikanischen Rebellen oder der Union. Der Höhepunkt des Konflikts kam 1916, als der Revolutionär Pancho Villa die amerikanische Grenzstadt Columbus in New Mexico angriff. Als Reaktion darauf startete die US-Armee unter der Führung von General John J. Pershing eine Expedition nach Nordmexiko, um Villa zu finden und gefangen zu nehmen. Obwohl die Operation scheiterte, da Villa nicht gefangen genommen wurde, war sie teilweise erfolgreich, da die Armee die Villista-Rebellen fand und angriff und Villas zwei ranghöchste Leutnants tötete. Der Revolutionär selbst entkam und die amerikanische Armee kehrte im Januar 1917 in die Vereinigten Staaten zurück. Der Konflikt an der Grenze dauerte jedoch an und die Vereinigten Staaten starteten mehrere zusätzliche, wenn auch kleinere Operationen auf mexikanischem Gebiet, bis der amerikanische Sieg in der Schlacht von Ambos Nogales zur Errichtung einer dauerhaften Grenzmauer führte."

ron_early_wars_news.85.t:0 "Banditenkrieg"
ron_early_wars_news.85.d:0 "Der Banditenkrieg oder die Banditenkriege waren eine Reihe von Überfällen in Texas, die 1915 begannen und 1919 ihren Höhepunkt erreichten. Verübt wurden sie von mexikanischen Rebellen aus den Bundesstaaten Tamaulipas, Coahuila und Chihuahua. Vor 1914 war die Carrancista-Fraktion für die meisten Angriffe entlang der Grenze verantwortlich, doch im Januar 1915 entwarfen als Seditionistas bekannte Rebellen den Plan von San Diego und begannen mit ihren eigenen Überfällen. Der Plan sah einen Rassenkrieg vor, um die amerikanischen Grenzstaaten von ihrer angloamerikanischen Bevölkerung zu befreien und sie an Mexiko anzugliedern. Den Seditionistas gelang es jedoch nie, eine groß angelegte Invasion der Vereinigten Staaten zu starten, sodass sie auf kleinere Überfälle in Texas zurückgriffen. An den meisten Kämpfen war die Texas Ranger Division beteiligt, obwohl auch die US-Armee in kleineren Einheiten gegen Banden von aufrührerischen Räubern vorging."

ron_early_wars_news.86.t:0 "Aufstand von Salar-al-Daulah"
ron_early_wars_news.86.d:0 "Der Aufstand von Salar-al-Daulah war ein Aufstand gegen die Regierung des erhabenen Staates Persien. Angeführt wurde er von Salar-al-Daulah, einem Bruder des ehemaligen Schahs Mohammad Ali Schah Qajar. Bis zum 17. Juli hatte er Senneh besetzt. Salar versuchte, von Kermanshah aus nach Teheran vorzudringen, wurde jedoch besiegt. Nach der Bildung eines neuen persischen Kabinetts am 26. Juli 1911 entsandte die persische Regierung bachtiarische Truppen gegen Salar-al-Daulah in Westpersien."

ron_early_wars_news.87.t:0 "Magonista-Aufstand"
ron_early_wars_news.87.d:0 "Der Magonistenaufstand von 1911 war ein früher Aufstand der mexikanischen Revolution, organisiert von der Liberalen Partei Mexikos, der nur im Norden von Baja California erfolgreich war. Benannt ist er nach Ricardo Flores Magón, einem der Anführer der PLM. Die Magonisten kontrollierten Tijuana und Mexicali etwa sechs Monate lang, beginnend mit der „Befreiung“ Mexicalis am 29. Januar 1911. Der Aufstand richtete sich gegen die Herrschaft von Porfirio Díaz, wurde aber von Truppen niedergeschlagen, die Francisco I. Madero treu ergeben waren. Aufgrund eines Hinweises von Maderos Agenten wurden Anführer der Magonistenbewegung in den USA verhaftet."

ron_early_wars_news.88.t:0 "Paraguayischer Bürgerkrieg"
ron_early_wars_news.88.d:0 "Der Paraguayische Bürgerkrieg war ein Bürgerkrieg, der vom 15. Juli 1911 bis zum 11. Mai 1912 in Paraguay ausgetragen wurde. Er begann, als Mitglieder der Liberalen Partei unter der Führung von Eduardo Schaerer und dem ehemaligen Präsidenten Manuel Gondra gegen die Herrschaft von Liberato Marcial Rojas und gegen Major Albino Jara revoltierten. Er endete, als Albino Jara in der Nähe von Paraguarí überfallen und getötet wurde, wodurch Eduardo Schaerer das Amt des 25. Präsidenten Paraguays übernehmen konnte."

ron_early_wars_news.89.t:0 "Russische Besetzung von Täbris"
ron_early_wars_news.89.d:0 "Die russische Besetzung von Täbris dauerte vom 30. April 1909 bis zum 28. Februar 1918, mit einer kurzen Unterbrechung vom 6. bis 31. Januar 1915. Täbris war zu dieser Zeit die zweitgrößte Stadt des Kadscharen-Persiens, die Hauptstadt der Region Aserbaidschan und die traditionelle Residenz des Kadscharen-Kronprinzen. Während der persischen Verfassungsrevolution brach am 23. Juni 1908 in Täbris ein Aufstand aus. Anfang Februar 1909 umzingelten Regierungstruppen unter Prinz Ain-al-Dawla die Stadt. Am 20. April einigten sich Großbritannien und Russland als Reaktion auf die Belagerungssituation darauf, dass eine russische Truppe zur Besetzung der Stadt entsandt werden sollte, um „den Zugang zu den notwendigen Vorräten in die Stadt zu erleichtern, die Konsulate und ausländischen Untertanen zu schützen und denjenigen zu helfen, die die Stadt verlassen wollten.“"

ron_early_wars_news.90.t:0 "Albanischer Aufstand von 1911"
ron_early_wars_news.90.d:0 "Der Malësori-Aufstand von 1911 war einer von vielen albanischen Aufständen im Osmanischen Reich und dauerte vom 24. März 1911 bis zum 4. August 1911 in der Region Malësia."

ron_early_wars_news.91.t:0 "Zweiter Aufstand in Guangzhou"
ron_early_wars_news.91.d:0 "Zu dieser Zeit hatte Malaya, zu dem das heutige malaiische Festland und Singapur gehörten, die größte chinesische Auslandsbevölkerung außerhalb Chinas. Viele von ihnen waren reich und engagierten sich für die Revolutionäre. Am 13. November 1910 trafen sich Sun Yat-sen und mehrere führende Persönlichkeiten der Tongmenghui auf der Konferenz von Penang, um Pläne für eine entscheidende Schlacht auszuarbeiten. Am folgenden Tag, dem 14. November 1910, leitete Sun Yat-sen eine Dringlichkeitssitzung der Tongmenghui in der Armenian Street 120 (heute das Sun Yat-sen Museum Penang) und sammelte auf der Stelle 8.000 Straits-Dollar. Die Planungsveranstaltungen sind als Penang-Konferenz von 1910 bekannt."

ron_early_wars_news.92.t:0 "Dominikanische Bürgerkrieg"
ron_early_wars_news.92.d:0 "Der Dominikanische Bürgerkrieg, der von Dezember 1911 bis November 1912 dauerte, war der blutigste in der Geschichte der Dominikanischen Republik. Er begann mit einem Aufstand im Nordwesten des Landes. Die Vereinigten Staaten erwogen eine militärische Intervention, konnten jedoch eine Einigung aushandeln, ohne eigene Truppen zu landen. Der Krieg wird manchmal auch als „Krieg der Quiquises“ bezeichnet, ein Spitzname für die Rebellen."

ron_early_wars_news.93.t:0 "Französische Eroberung Marokkos"
ron_early_wars_news.93.d:0 "Die französische Eroberung Marokkos oder die „Befriedung Marokkos“ begann 1907"

ron_early_wars_news.94.t:0 "Italienisch-Türkischer Krieg"
ron_early_wars_news.94.d:0 "Der Italienisch-Türkische Krieg wurde vom 29. September 1911 bis zum 18. Oktober 1912 zwischen dem Königreich Italien und dem Osmanischen Reich ausgetragen. Infolge dieses Konflikts eroberte Italien das osmanische Vilâyet (Provinz) Tripolitanien, dessen wichtigste Unterprovinzen (Sandschaks) Fezzan, Cyrenaika und Tripolis selbst waren. Diese Gebiete wurden zu den Kolonien Italienisch-Tripolitanien und Cyrenaika, die später zu Italienisch-Libyen aufgingen."

ron_early_wars_news.95.t:0 "Osttimoresischer Aufstand"
ron_early_wars_news.95.d:0 "Der osttimoresische Aufstand von 1911–1912, auch als Großer Aufstand oder Aufstand von Manufahi bezeichnet, war eine Reaktion auf die Bemühungen der portugiesischen Kolonialbehörden, eine Kopfsteuer einzuziehen und die Frondienste durchzusetzen. Dies war Teil ihrer größeren Bemühungen, den Anbau von Nutzpflanzen zu fördern und eine moderne Infrastruktur aufzubauen. Der landesweite Konflikt von 1911–1912 war der Höhepunkt einer Reihe von Aufständen unter der Führung von Dom Boaventura, dem Liurai (Häuptling) des einheimischen Königreichs Manufahi. Der erste dauerte von 1894 bis 1901, der zweite von 1907 bis 1908. 1911 führte Boaventura ein Bündnis lokaler Königreiche beim letzten und schwerwiegendsten Aufstand gegen die Portugiesen an."

ron_early_wars_news.96.t:0 "Xinhai-Revolution"
ron_early_wars_news.96.d:0 "Die Revolution von 1911, auch bekannt als Chinesische Revolution oder Xinhai-Revolution, war eine Revolution, die Chinas letzte Kaiserdynastie (die Qing-Dynastie) stürzte und die Republik China (ROC) gründete. Die Revolution wurde Xinhai (Hsin-hai) genannt, weil sie im Jahr 1911 stattfand, dem Jahr des Xinhai-Stammzweigs im 60-jährigen Zyklus des traditionellen chinesischen Kalenders."

ron_early_wars_news.97.t:0 "Krieg der Generäle"
ron_early_wars_news.97.d:0 "Der Krieg der Generäle war ein Bürgerkrieg, der von 1911 bis 1912 in Ecuador ausgetragen wurde. Seine Ursachen lagen in der liberalen Opposition gegen die autoritäre Herrschaft von Eloy Alfaro. Der Aufstand begann am 28. Dezember 1911. Die entscheidende Schlacht des Krieges fand am 18. Januar 1912 bei Yaguachi statt, wo Alfaro besiegt und gefangen genommen wurde. Alfaros Leichnam wurde am 28. Januar 1912 öffentlich eingeäschert. Die Gesamtzahl der Opfer auf beiden Seiten betrug rund 1500. Weniger als ein Jahr später brach in Ecuador ein neuer Bürgerkrieg aus, in dessen Verlauf sich die Provinz Esmeraldas gegen die Herrschaft von Leónidas Plaza erhob."

ron_early_wars_news.98.t:0 "Turkmenischer Aufstand"
ron_early_wars_news.98.d:0 "Der Turkmenenaufstand von 1912–1913 war ein Aufstand der Yomud-Turkmenen gegen das Khanat Chiwa. Seine Ursachen lagen im Widerstand gegen die Steuerreform von Isfandiyar Jurji Bahadur, die zu einer Verdoppelung oder Verdreifachung der von den Yomud-Turkmenen zu zahlenden Steuern geführt hatte. Er begann am 12. Dezember 1912, als Rebellen eine Karawane auf dem Weg von Taschaus nach Tachta angriffen und plünderten. Nach Ausbruch des Aufstands war die Regierung Chiwa zwischen kompromissbereiten und kriegsbefürwortenden Parteien gespalten, wobei letztere die Oberhand behielten."

ron_early_wars_news.99.t:0 "Ecuadorianischer Bürgerkrieg"
ron_early_wars_news.99.d:0 "Der ecuadorianische Bürgerkrieg von 1912–1914 war ein Bürgerkrieg, der in den 1910er Jahren in Ecuador ausgetragen wurde. Er begann 1913, als sich die Provinz Esmeraldas gegen die Herrschaft von Leónidas Plaza erhob. Letztendlich gelang es der Regierung, die Kontrolle zurückzugewinnen, obwohl dabei ein Großteil der Provinz zerstört wurde."

ron_early_wars_news.100.t:0 "Khost-Aufstand"
ron_early_wars_news.100.d:0 "Die Ursachen lagen in der „Rauheit und den Erpressungen“ von Muhammad Akbar Khan, dem örtlichen Gouverneur des Distrikts Khost. Der Aufstand, der von Jehandad Khan angeführt wurde, begann am 2. Mai 1912, als sich Stammesangehörige der Mangal und Jadran in Khost, Afghanistan, erhoben, schnell verschiedene isolierte Garnisonen überwältigten und Muhammad Akbar in Matun belagerten."

ron_early_wars_news.101.t:0 "Erster Balkankrieg"
ron_early_wars_news.101.d:0 "Der Erste Balkankrieg dauerte von Oktober 1912 bis Mai 1913 und beinhaltete Aktionen des Balkanbundes (der Königreiche Bulgarien, Serbien, Griechenland und Montenegro) gegen das Osmanische Reich. Die vereinten Armeen der Balkanstaaten besiegten die zunächst zahlenmäßig unterlegenen (und am Ende des Konflikts deutlich überlegenen) und strategisch benachteiligten osmanischen Armeen und erzielten rasche Erfolge."

ron_early_wars_news.102.t:0 "Albanischer Aufstand"
ron_early_wars_news.102.d:0 "Der albanische Aufstand von 1912 war der letzte albanische Aufstand im Osmanischen Reich und dauerte von Januar bis August 1912. Der Aufstand endete, als die osmanische Regierung am 4. September 1912 zustimmte, die Forderungen der Rebellen zu erfüllen. Im Allgemeinen kämpften muslimische Albaner im darauffolgenden Balkankrieg gegen die Osmanen."

ron_early_wars_news.103.t:0 "Contestado War"
ron_early_wars_news.103.d:0 "Der Contestado-Krieg war im weitesten Sinne ein Guerillakrieg um Land zwischen Siedlern und Landbesitzern, die von der Polizei und den Streitkräften des brasilianischen Staates unterstützt wurden und von Oktober 1912 bis August 1916 dauerten."

ron_early_wars_news.104.t:0 "Besetzung Nicaraguas durch die Vereinigten Staaten"
ron_early_wars_news.104.d:0 "Die Besetzung Nicaraguas durch die USA von 1912 bis 1933 war Teil der Bananenkriege, in deren Verlauf das US-Militär von 1898 bis 1934 in verschiedene lateinamerikanische Länder einmarschierte. Die formelle Besetzung begann 1912, obwohl es in diesem Zeitraum mehrere weitere Angriffe der USA auf Nicaragua gab. Ziel der amerikanischen Militärinterventionen in Nicaragua war es, alle anderen Nationen außer den Vereinigten Staaten von Amerika am Bau eines Nicaraguakanals zu hindern."

ron_early_wars_news.105.t:0 "Royalistischer Angriff auf Chaves"
ron_early_wars_news.105.d:0 "Der Angriff auf Chaves am 8. Juli 1912 war eine Militäraktion portugiesischer Monarchie gegen die zwei Jahre zuvor ausgerufene Erste Portugiesische Republik. Angeführt wurde der Angriff von Henrique Paiva Couceiro, der in Afrika gekämpft hatte und zum Anführer der Royalisten aufgestiegen war. Die Royalisten waren vom spanischen König Alfons XIII. heimlich bewaffnet worden und hatten ihre Truppen in Galicien konzentriert."

ron_early_wars_news.106.t:0 "Negeraufstand"
ron_early_wars_news.106.d:0 "Der Negeraufstand war eine Reihe von Protesten und Aufständen im Jahr 1912 in Kuba, bei denen es zu Konflikten zwischen afrokubanischen Rebellen und den Streitkräften Kubas und der USA kam. Er ereignete sich hauptsächlich im Osten der Insel, wo die meisten Afrokubaner beschäftigt waren. Nach einem großflächigen Massaker an Afrokubanern durch die kubanische Armee und dem Eingreifen des US-Militärs wurde der Aufstand innerhalb weniger Wochen beendet. Die Anführer der afrokubanischen Rebellen, Evaristo Estenoz und Pedro Ivonnet, wurden während des Aufstands getötet und ihre politische Bewegung, die Unabhängige Partei der Farbigen, aufgelöst."

ron_early_wars_news.107.t:0 "Euphrat-Rebellion"
ron_early_wars_news.107.d:0 "Im Jahr 1913 hielt Mudbir eine Rede vor einer Stammesversammlung in Diwaniya und beklagte die osmanische Herrschaft."

ron_early_wars_news.108.t:0 "Maskat-Aufstand"
ron_early_wars_news.108.d:0 "Der Maskat-Aufstand war ein Aufstand im Jahr 1913 unter der Führung von Sālim bin Rāshid al-Kharūṣī gegen die Autorität der Sultane von Maskat und Oman. Die Rebellen gründeten ihren eigenen Staat, das Ibāḍī-Imamat. Seine Ursachen lagen in einer tief verwurzelten Rivalität zwischen den nördlichen und südlichen Stämmen von Maskat und Oman. Er begann im Mai 1913 in Tanuf. Am 5. Juni eroberten die Rebellen Nizwa und am 20. Juni Izki. Zu diesem Zeitpunkt hatten die Rebellen auch Samail umzingelt."

ron_early_wars_news.109.t:0 "Urtatagai-Konflikt"
ron_early_wars_news.109.d:0 "Der Urtatagai-Konflikt war ein Konflikt zwischen dem Emirat Afghanistan und dem Russischen Reich um die Kontrolle über die Insel Urtatagai, der 1913 stattfand. Er begann im November, als afghanische Truppen auf Urtatagai stationiert wurden, nachdem diese mit dem afghanischen Ufer verschmolzen und somit afghanisches Territorium geworden war. Einige Zeit später trennte der Flusslauf die Insel erneut, und in einer Vereinbarung vom 13. Dezember in Askhabad stimmte die afghanische Führung der Rückgabe der Insel zu, womit der Konflikt beendet war."

ron_early_wars_news.110.t:0 "Eroberung von al-Hasa"
ron_early_wars_news.110.d:0 "Die Eroberung von al-Hasa gelang den saudischen Streitkräften von Ibn Saud mit Unterstützung der Ikhwan im April 1913. Die Oase al-Hasa wurde von einer osmanischen Garnison erobert, die das Gebiet seit 1871 kontrolliert hatte."

ron_early_wars_news.111.t:0 "Zweiter Balkankrieg"
ron_early_wars_news.111.d:0 "Der Zweite Balkankrieg brach aus, als Bulgarien, unzufrieden mit seinem Anteil an der Beute des Ersten Balkankrieges, am 16. Juni 1913 seine ehemaligen Verbündeten Serbien und Griechenland angriff. Serbische und griechische Armeen schlugen die bulgarische Offensive zurück, starteten einen Gegenangriff und marschierten in Bulgarien ein. Da Bulgarien zuvor auch in Territorialstreitigkeiten mit Rumänien verwickelt war, provozierte dieser Krieg eine rumänische Intervention gegen Bulgarien. Auch das Osmanische Reich nutzte die Situation, um einige verlorene Gebiete aus dem vorherigen Krieg zurückzugewinnen. Als sich rumänische Truppen der Hauptstadt Sofia näherten, bat Bulgarien um einen Waffenstillstand, der zum Vertrag von Bukarest führte, in dem Bulgarien Teile seiner Errungenschaften aus dem Ersten Balkankrieg an Serbien, Griechenland und Rumänien abtreten musste. Im Vertrag von Konstantinopel verlor es Edirne an die Osmanen."

ron_early_wars_news.112.t:0 "Tikveš-Aufstand"
ron_early_wars_news.112.d:0 "Es wurde von der Inneren Mazedonischen Revolutionären Organisation (IMRO) gegen die serbischen Truppen in Vardar-Mazedonien zwischen dem Ersten und dem Zweiten Balkankrieg organisiert. Als der Erste Balkankrieg seine endgültigen Grenzregelungen erreichte, verstärkte sich der Druck auf das bulgarische Exarchat und die mazedonisch-bulgarische Volksgemeinschaft in den osmanischen Gebieten, die unter griechische und serbische Kontrolle gerieten."

ron_early_wars_news.113.t:0 "Ohrid-Debar-Aufstand"
ron_early_wars_news.113.d:0 "Der Ohrid-Debar-Aufstand war ein Aufstand von Bulgaren und Albanern in Westmakedonien, dem damaligen Königreich Serbien, im September 1913. Er wurde von der Inneren Mazedonischen Revolutionären Organisation (IMRO) und Albanien gegen die serbische Eroberung der Regionen Ohrid, Debar und Struga nach den Balkankriegen (1912–13) organisiert."

ron_early_wars_news.114.t:0 "Zweite Revolution"
ron_early_wars_news.114.d:0 "Die Zweite Revolution bezeichnet einen Aufstand der Gouverneure mehrerer südchinesischer Provinzen sowie Anhänger von Sun Yat Sen und der Kuomintang im Jahr 1913 gegen die Beiyang-Regierung der Republik China unter Yuan Shikai. Der Aufstand wurde von Yuans Armeen rasch niedergeschlagen und führte zur weiteren Festigung von Yuans Macht als Präsident der Republik China."

ron_early_wars_news.115.t:0 "Bai Lang Rebellion"
ron_early_wars_news.115.d:0 "Der Bai-Lang-Aufstand war ein chinesischer Banditenaufstand, der von Mitte 1913 bis Ende 1914 andauerte. Er richtete sich gegen die republikanische Regierung von Yuan Shikai und wurde von Bai Lang angeführt. Seine Rebellenarmee war eine bunte Mischung aus Anti-Yuan-Shikai-Truppen und Rebellen, Banditengruppen und Mitgliedern der Gelaohui (Geheimgesellschaft). Als Einheit waren sie mit Revolutionären aus Südguangdong verbündet."

ron_early_wars_news.116.t:0 "Dersim-Aufstand"
ron_early_wars_news.116.d:0 "Während des Ersten Weltkriegs kam es im Osmanischen Reich zu mehreren kurdischen Aufständen. Diese Revolten wurden von den westlichen Verbündeten, insbesondere Großbritannien, gefördert, die den Kurden einen unabhängigen Staat versprachen. Dennoch leisteten die Alliierten nur begrenzte militärische Unterstützung. Britische Versprechen eines unabhängigen Kurdistans waren im Vertrag von Sèvres von 1920 enthalten, der ein kleines Gebiet für einen geplanten kurdischen Staat zuwies. Diese Pläne wurden jedoch 1923 mit dem türkischen Sieg im Türkischen Unabhängigkeitskrieg und dem darauf folgenden Vertrag von Lausanne aufgegeben."

ron_early_wars_news.117.t:0 "Bitlis-Aufstand"
ron_early_wars_news.117.d:0 "Der Bitlis-Aufstand war ein kurdischer Aufstand im Osmanischen Reich Anfang 1914. Er wurde vom Russischen Reich unterstützt. Er fand zeitgleich mit einem unabhängigen kurdischen Aufstand in Barzan im Vilâyet Mossul statt, der ebenfalls von Russland unterstützt wurde. Spätere kurdisch-nationalistische Geschichtsschreibungen stellten den Aufstand als Teil eines kurdischen nationalistischen Kampfes dar, doch seine tatsächlichen Ursachen lagen im Widerstand gegen Wehrpflicht und Steuern."

ron_early_wars_news.118.t:0 "Operationen im Tochi"
ron_early_wars_news.118.d:0 "Die Operationen im Tochi wurden von der indischen Armee während des Ersten Weltkriegs an der Nordwestgrenze durchgeführt. Der Tochi fließt von den Stammesgebieten ostwärts durch Nord-Wasiristan und mündet in den Kurram und den Indus. Am 28. und 29. November schlug die Miliz Nord-Wasiristans einen Überfall von 2.000 Stammesangehörigen aus Khost in der Nähe von Miranshah am Tochi zurück. Im darauffolgenden Januar schlug die Miliz erneut einen Überfall von Stammesangehörigen zurück, die Spina Khaisora angegriffen hatten. Am 25. und 26. März bedrohte eine Streitmacht von über 7.000 Stammesangehörigen Miranshah, wurde jedoch von der Bannu-Brigade zusammen mit der örtlichen Miliz besiegt."

ron_early_wars_news.119.t:0 "Zaian-Krieg"
ron_early_wars_news.119.d:0 "Der Zaian-Krieg wurde zwischen 1914 und 1921 während der französischen Eroberung Marokkos zwischen Frankreich und der Zaian-Konföderation der Berberstämme in Marokko ausgetragen. Marokko war 1912 ein französisches Protektorat geworden, und Generalresident Louis-Hubert Lyautey versuchte, den französischen Einfluss ostwärts durch das Mittlere Atlasgebirge in Richtung Französisch-Algerien auszudehnen. Die Zaianer unter Mouha ou Hammou Zayani widersetzten sich diesem Vorgehen. Der Krieg begann gut für die Franzosen, die schnell die wichtigen Städte Taza und Khénifra einnahmen. Trotz des Verlusts ihrer Basis in Khénifra fügten die Zaianer den Franzosen schwere Verluste zu, die mit der Aufstellung von Groupes Mobiles reagierten, kombinierten Waffenformationen, die reguläre und irreguläre Infanterie, Kavallerie und Artillerie zu einer einzigen Streitmacht vereinten."

ron_early_wars_news.120.t:0 "Dominikanische Bürgerkrieg"
ron_early_wars_news.120.d:0 "Der Dominikanische Bürgerkrieg (1914) war ein Bürgerkrieg in der Dominikanischen Republik, der als Aufstand gegen die Regierung von General Desiderio Arias in La Vega und Santiago de los Caballeros begann und am 30. März 1914 begann. José Bordas Valdez wurde am 15. Juni 1914 ohne Gegenkandidaten zum Präsidenten gewählt. Schiffe der US-Marine griffen ein, um die Bombardierung von Puerto Plata zu beenden, die am 26. Juni 1914 begonnen hatte. Im Juli 1914 wurden Truppen der US-Armee zur Unterstützung der Regierung in Santo Domingo stationiert. Die US-Regierung vermittelte am 6. August 1914 die Unterzeichnung eines Waffenstillstandsabkommens zwischen Regierungs- und Rebellenvertretern. Während des Konflikts wurden etwa 500 Menschen getötet."

ron_early_wars_news.121.t:0 "Bauernaufstand in Albanien"
ron_early_wars_news.121.d:0 "Der Bauernaufstand in Albanien, auch bekannt als Islamischer Aufstand oder Muslimischer Aufstand in Albanien, war der Aufstand von Bauern aus Zentralalbanien, hauptsächlich Muslimen, aber auch anderen, gegen das Regime von Prinz Wilhelm von Wied im Jahr 1914 und war einer der Gründe für den Rückzug des Prinzen aus dem Land, was den Fall des Fürstentums Albanien markierte. Der Aufstand wurde von den muslimischen Führern Haxhi Qamili, Arif Hiqmeti, Musa Qazimi und Mustafa Ndroqi angeführt. Neben einer vollständigen Amnestie forderten die Rebellen die Rückgabe Albaniens an die Oberhoheit des Sultans des Osmanischen Reiches."

ron_early_wars_news.122.t:0 "Truku-Krieg"
ron_early_wars_news.122.d:0 "Der Truku-Krieg ist eine Reihe von Ereignissen, die zwischen Mai und August 1914 stattfanden und in denen sich die indigene Gruppe der Truku gegen die kolonialen japanischen Streitkräfte im japanischen Taiwan auflehnte. Ziel des Konflikts war die Vorherrschaft über das Gebiet um den heutigen Landkreis Hualien, das bis dahin von den Truku kontrolliert wurde. Seit Beginn der japanischen Besatzung Taiwans im Jahr 1895 galt der Stamm der Truku als Hauptangriffsziel in diesem Gebiet. Viele Jahre vor der Kapitulation setzte Sakuma Samata, der damalige Generalgouverneur von Taiwan, massive Mittel ein, um den Widerstand der Truku-Krieger einzudämmen und zu überwinden. Er mobilisierte bis zu 20.000 Soldaten und Polizisten gegen eine Bevölkerung von kaum 2.000 Ureinwohnern."

ron_early_wars_news.123.t:0 "Besetzung von Veracruz durch die Vereinigten Staaten"
ron_early_wars_news.123.d:0 "Die Besetzung von Veracruz durch die Vereinigten Staaten begann mit der Schlacht von Veracruz und dauerte sieben Monate als Reaktion auf die Tampico-Affäre vom 9. April 1914. Der Vorfall ereignete sich inmitten schlechter diplomatischer Beziehungen zwischen Mexiko und den Vereinigten Staaten und stand im Zusammenhang mit der anhaltenden mexikanischen Revolution."

ron_early_wars_news.124.t:0 "Bluff War"
ron_early_wars_news.124.d:0 "Der Bluff-Krieg, auch bekannt als Posey-Krieg von 1915 oder Polk-und-Posse-Krieg, war einer der letzten bewaffneten Konflikte zwischen den Vereinigten Staaten und den amerikanischen Ureinwohnern. Er begann im März 1914 und war das Ergebnis eines Zwischenfalls zwischen einem Hirten aus Utah und Tse-ne-gat, dem Sohn des Paiute-Häuptlings Narraguinnep („Polk“). Bemerkenswert war die Beteiligung von Häuptling Posey und seiner Bande von Abtrünnigen, die Polk in einem kleinen Guerillakrieg gegen lokale mormonische Siedler und Navajo-Polizisten unterstützten. Der Konflikt konzentrierte sich auf die Stadt Bluff in Utah und endete im März 1915 mit der Kapitulation von Polk und Posey vor der US-Armee."

ron_early_wars_news.125.t:0 "Maritz-Rebellion"
ron_early_wars_news.125.d:0 "Der Maritz-Aufstand, auch Burenaufstand oder Fünf-Schilling-Aufstand genannt, war ein bewaffneter Aufstand in Südafrika im Jahr 1914, zu Beginn des Ersten Weltkriegs. Angeführt wurde er von Buren, die die Wiederherstellung der Südafrikanischen Republik im Transvaal unterstützten. Viele Mitglieder der südafrikanischen Regierung waren selbst ehemalige Buren, die im Zweiten Burenkrieg, der zwölf Jahre zuvor zu Ende gegangen war, mit den Maritz-Rebellen gegen die Briten gekämpft hatten. Der Aufstand scheiterte, und seine Anführer wurden zu hohen Geld- und Gefängnisstrafen verurteilt."

ron_early_wars_news.126.t:0 "Botanischer Aufstand"
ron_early_wars_news.126.d:0 "Während des Ersten Weltkriegs kam es im Osmanischen Reich zu mehreren kurdischen Aufständen. Diese Revolten wurden von den westlichen Verbündeten, insbesondere Großbritannien, gefördert, die den Kurden einen unabhängigen Staat versprachen. Dennoch leisteten die Alliierten nur begrenzte militärische Unterstützung. Britische Versprechen eines unabhängigen Kurdistans waren im Vertrag von Sèvres von 1920 enthalten, der ein kleines Gebiet für einen geplanten kurdischen Staat zuwies. Diese Pläne wurden jedoch 1923 mit dem türkischen Sieg im Türkischen Unabhängigkeitskrieg und dem darauf folgenden Vertrag von Lausanne aufgegeben."

ron_early_wars_news.127.t:0 "Tapani-Vorfall"
ron_early_wars_news.127.d:0 "Der Tapani-Aufstand im Jahr 1915 war einer der größten bewaffneten Aufstände der taiwanesischen Han und Ureinwohner, darunter auch der Taivoan, gegen die japanische Herrschaft in Taiwan. Der Vorfall wurde auch als Xilai-Tempel-Aufstand bezeichnet, benannt nach dem Xilai-Tempel in Tainan, wo der Aufstand begann, und als Yu-Qingfang-Aufstand, benannt nach dem Anführer Yu Qingfang."

ron_early_wars_news.128.t:0 "Turkmenischer Aufstand"
ron_early_wars_news.128.d:0 "Der Turkmenenaufstand von 1915 war ein Aufstand der Yomud-Turkmenen gegen das Khanat Chiwa, das zu dieser Zeit von Isfandiyar Khan regiert wurde. Er wurde von keiner der Mittelmächte unterstützt. Seine Ursachen lagen in der Verhaftung eines Yomud-Häuptlings, Bachschi Schah Murad. Der Aufstand begann im März 1915, und am 22. März griff eine von Dschunaid-khan angeführte Rebellenarmee die Hauptstadt Chiwa an. Eine offensichtlich pro-rebellische russische Intervention, um Bachschi Schah Murad vor der Verhaftung zu bewahren, überzeugte Dschunaid, den Aufstand wieder aufzunehmen, und bis zum 9. April waren mehrere Dörfer Chiwas unter seiner Kontrolle. Anfang Juni lud Russland turkmenische Vertreter zu Verhandlungen im Rahmen einer Friedenskonferenz ein, doch die misstrauischen Häuptlinge machten 32 Kilometer nordwestlich von Chiwa halt, wo sie am 7. Juni von den Truppen des Khans angegriffen wurden. Der Aufstand endete schließlich, als der russische Generalmajor Geppener am 30. Juni 1915 ein Friedensabkommen arrangierte, in dem die Regierung von Chiwan versprach, Schritte zu unternehmen, um die Ursachen der Unzufriedenheit der Yomud-Turkmenen zu beseitigen."

ron_early_wars_news.129.t:0 "Schlacht von Jarrab"
ron_early_wars_news.129.d:0 "Die Schlacht von Jarrab war ein Territorialkampf zwischen den Al Sa&#39;ud und ihren traditionellen Feinden, den Al Rashid, im Januar 1915. Es war eine Stellvertreterschlacht des Ersten Weltkriegs zwischen den von Großbritannien unterstützten Sa&#39;udis und den von den Osmanen unterstützten Raschidis."

ron_early_wars_news.130.t:0 "Chilembwe-Aufstand"
ron_early_wars_news.130.d:0 "Der Chilembwe-Aufstand war ein Aufstand gegen die britische Kolonialherrschaft in Njassaland (dem heutigen Malawi) im Januar 1915. Angeführt wurde er von John Chilembwe, einem in Amerika ausgebildeten Baptistenprediger. Die Anführer des Aufstands, der sich rund um seine Kirche im Dorf Mbombwe im Südosten des Protektorats konzentrierte, stammten größtenteils aus der aufstrebenden schwarzen Mittelschicht. Ihre Motivation war der Unmut über das Kolonialsystem, darunter Zwangsarbeit, Rassendiskriminierung und neue Anforderungen an die indigene Bevölkerung nach Ausbruch des Ersten Weltkriegs."

ron_early_wars_news.131.t:0 "Bussa-Rebellion"
ron_early_wars_news.131.d:0 "Der Bussa-Aufstand, auch Boussa-Aufstand genannt, war ein kleiner Aufstand in der Stadt Bussa gegen die Politik der indirekten Herrschaft im britisch regierten Nigeria im Juni 1915. Auslöser des Aufstands war die Absetzung des lokalen Emirs von Bussa, Kitoro Gani, durch die Briten und seine Ersetzung durch eine einheimische Regierung. Die Rebellen griffen etwa die Hälfte der Mitglieder der Regierung an und töteten sie, während der Rest floh und die Rebellen die Kontrolle in Bussa behielten. Trotz des andauernden Kamerunfeldzugs gegen das Deutsche Reich konnten die Briten eine kleine Truppe Soldaten einsetzen, die den Aufstand schnell und ohne Verluste niederschlugen. Der Bussa-Aufstand war Gegenstand eines bedeutenden Werks des britischen Historikers Michael Crowder."

ron_early_wars_news.132.t:0 "Meuterei in Singapur"
ron_early_wars_news.132.d:0 "Der Singapur-Aufstand von 1915, auch bekannt als Sepoy-Aufstand von 1915 oder Meuterei der 5. leichten Infanterie, war eine Meuterei gegen die Briten in Singapur während des Ersten Weltkriegs, an der bis zur Hälfte eines Regiments von 850 Sepoys (indischen Soldaten) beteiligt war. Sie steht im Zusammenhang mit der Ghadar-Verschwörung von 1915. Der Aufstand am 15. Februar 1915 dauerte fast sieben Tage. Acht britische Offiziere und Soldaten, zwei malaiische Offiziere und ein Soldat, 14 britische Zivilisten, fünf chinesische und malaiische Zivilisten sowie ein deutscher Internierter kamen dabei ums Leben, bevor er schließlich von britischen Streitkräften und alliierten Marineeinheiten niedergeschlagen wurde."

ron_early_wars_news.133.t:0 "Kelantan-Aufstand"
ron_early_wars_news.133.d:0 "Der Ausbruch des Kelantan-Aufstands im Jahr 1915 hat in der Wissenschaft große Aufmerksamkeit erregt, doch über die tatsächlichen Ursachen des Aufstands herrscht große Uneinigkeit. Es bleibt ein Bereich der Geschichte Kelantans, der unter Wissenschaftlern noch immer umstritten ist, ob sie den Aufstand anhand der britischen Kolonialquellen oder der volkstümlichen Version des Aufstands untersucht haben. Beide Versionen interpretieren die Motive des Aufstands sehr unterschiedlich. Einig sind sich beide Seiten jedoch darin, dass der Aufstand von einem „ehrwürdig aussehenden bärtigen Herrn“ ausging."

ron_early_wars_news.134.t:0 "Rundum-Aufstand"
ron_early_wars_news.134.d:0 "ntanum oder Antanom (vollständiger Name Ontoros Antanom) (1885–1915) war ein berühmter und einflussreicher Murut-Krieger aus Nordborneo (heute Sabah), Malaysia, der der lokalen mündlichen Überlieferung zufolge übernatürliche Kräfte besaß. Dadurch erhielt er Unterstützung von den Häuptlingen und Dorfbewohnern der Dörfer Keningau, Tenom, Pensiangan und Rundum und führte den Rundum-Aufstand gegen die Britische Nordborneo-Kompanie an, wurde jedoch bei Kämpfen mit der Armee der Kompanie in Sungai Selangit in der Nähe von Pensiangan getötet."

ron_early_wars_news.135.t:0 "Volta-Bani-Krieg"
ron_early_wars_news.135.d:0 "Der Volta-Bani-Krieg war ein antikolonialer Aufstand, der zwischen 1915 und 1917 in Französisch-Westafrika (genauer gesagt in den Gebieten des heutigen Burkina Faso und Mali) stattfand. Es war ein Krieg zwischen einer einheimischen afrikanischen Streitmacht, die aus einer heterogenen Koalition lokaler Völker stammte, die sich gegen die französische Armee erhob. Auf ihrem Höhepunkt im Jahr 1916 zählten die Rebellen 15.000 bis 20.000 Mann und kämpften an mehreren Fronten. Nach etwa einem Jahr und mehreren Rückschlägen besiegte die französische Armee die Aufständischen und ließ ihre Anführer inhaftieren oder hinrichten. Der Widerstand hielt jedoch bis 1917 an."

ron_early_wars_news.136.t:0 "Nationaler Schutzkrieg"
ron_early_wars_news.136.d:0 "Der Nationale Schutzkrieg, auch bekannt als Krieg gegen die Monarchie, war ein Bürgerkrieg, der von 1915 bis 1916 in China tobte. Nur drei Jahre zuvor war die letzte chinesische Dynastie, die Qing-Dynastie, gestürzt und an ihrer Stelle die Republik China errichtet worden. Auslöser des Krieges war die Ernennung Yuan Shikais, des Präsidenten der Republik, zum Kaiser von Hongxian, dem Kaiser des chinesischen Kaiserreichs."

ron_early_wars_news.137.t:0 "Senussi-Kampagne"
ron_early_wars_news.137.d:0 "Der Senussi-Feldzug fand während des Ersten Weltkriegs von November 1915 bis Februar 1917 in Nordafrika statt. Das Königreich Italien und das Britische Empire führten diesen Feldzug gegen die Senussi, einen religiösen Orden in Libyen und Ägypten. Die Senussi wurden vom Osmanischen Reich und dem Deutschen Reich umworben. Im Sommer 1915 überredeten die Osmanen den Groß-Senussi Ahmed Scharif as-Senussi, den Dschihad zu erklären, das britisch besetzte Ägypten von Westen her anzugreifen und einen Aufstand in Ägypten anzuzetteln, um britische Truppen von einem osmanischen Angriff auf den Suezkanal von Palästina aus abzulenken."

ron_early_wars_news.138.t:0 "Besetzung Haitis durch die Vereinigten Staaten"
ron_early_wars_news.138.d:0 "Die US-Besatzung Haitis begann am 28. Juli 1915, als 330 US-Marines auf Befehl von US-Präsident Woodrow Wilson in Port-au-Prince, Haiti, landeten. Die ersten Invasionstruppen waren bereits am 27. Januar 1914 von der USS Montana aus an Land gegangen. Die Intervention im Juli erfolgte nach der Ermordung des Diktators Vilbrun Guillaume Sam durch Aufständische, die über seine politischen Morde an der Elite der Opposition erzürnt waren."

ron_early_wars_news.139.t:0 "Operationen gegen die Mohmands"
ron_early_wars_news.139.d:0 "Die Operationen gegen die Mohmands, Bunerwals und Swatis wurden von der indischen Armee während des Ersten Weltkriegs durchgeführt. Die erste Operation begann Anfang 1915 mit einem Überfall des Mohmand-Stammes in der Nähe des Shabkadr-Forts in Peshawar. Im April wurden die Operationen gegen die Mohmands fortgesetzt, als 2.000 Stammesangehörige die Truppen der 1. Division (Peshawar) angriffen und in der Nähe von Hafiz Kor besiegt wurden."

ron_early_wars_news.140.t:0 "Yarahmadzai-Aufstand"
ron_early_wars_news.140.d:0 "Vor der Ankunft der Yarahmadzai wurde das Gebiet Taftan/Kash von den Kurden organisiert und kontrolliert. Die Kurden wurden ursprünglich von Schah Abbas dem Großen in die Region Belutschistan geschickt, um gefährliche belutschische Stämme durch ihre Vertreibung aus ihren Heimatgebieten zu schwächen. Die Yarahmadzai erkannten den Vertreter des Schahs nie an und setzten stattdessen ihren eigenen politischen Führer ein, den Sardar, der den Stamm vertrat. Es kam zu mehreren Auseinandersetzungen zwischen den Yarahmadzai und den Kurden, die schließlich zur Vertreibung der Kurden führten und die Kontrolle über das Gebiet an die Yarahmadzai verloren."

ron_early_wars_news.141.t:0 "Dersim-Aufstand von 1916"
ron_early_wars_news.141.d:0 "Während des Ersten Weltkriegs kam es im Osmanischen Reich zu mehreren kurdischen Aufständen. Diese Revolten wurden von den westlichen Verbündeten, insbesondere Großbritannien, gefördert, die den Kurden einen unabhängigen Staat versprachen. Dennoch leisteten die Alliierten nur begrenzte militärische Unterstützung. Britische Versprechen eines unabhängigen Kurdistans waren im Vertrag von Sèvres von 1920 enthalten, der ein kleines Gebiet für einen geplanten kurdischen Staat zuwies. Diese Pläne wurden jedoch 1923 mit dem türkischen Sieg im Türkischen Unabhängigkeitskrieg und dem darauf folgenden Vertrag von Lausanne aufgegeben."

ron_early_wars_news.142.t:0 "Kumyk-Aufstand"
ron_early_wars_news.142.d:0 "Mitte Juli 1916 erhoben sich in Aksay kumykische Rebellen gegen die russischen Behörden. Der Grund für den Aufstand lag in der mangelnden Bereitschaft der Kumyken, sich in die russische kaiserliche Armee einziehen zu lassen. Der Aufstand endete am 24. Juli, als die Wehrpflicht aufgehoben wurde."

ron_early_wars_news.143.t:0 "Mohmand-Blockade"
ron_early_wars_news.143.d:0 "Die Mohmand-Blockade (1916–1917) war eine Blockade, die die indische Armee während des Ersten Weltkriegs entlang der Grenze zu Mohmand an der Nordwestgrenze errichtete. Sie wurde durch eine Reihe von Blockhäusern und Stacheldrahtzäunen errichtet. Die Blockade begann nach mehreren Angriffen der Mohmands auf Peshawar. Das wichtigste Gefecht ereignete sich am 15. November 1916 bei Hafiz Kor, als eine Mohmand-Truppe besiegt wurde. Die Blockade wurde schließlich im Juli 1917 aufgehoben, als die Mohmands sich schließlich ergaben."

ron_early_wars_news.144.t:0 "Kaocen-Aufstand"
ron_early_wars_news.144.d:0 "Der Kaocen-Aufstand war eine Rebellion der Tuareg gegen die französische Kolonialherrschaft im Gebiet um das Aïr-Gebirge im Norden Nigers in den Jahren 1916–17."

ron_early_wars_news.145.t:0 "Cochinchina-Aufstand"
ron_early_wars_news.145.d:0 "Der Cochinchina-Aufstand von 1916 war eine Reihe von trotzigen Protesten und Revolten im Februar gegen die französische Kolonisierung Südvietnams, das seit 1867 die Kolonie Cochinchina war. Organisation und Motivation der Aufstände waren unklar, da viele verschiedene Organisationen vietnamesischer Revolutionäre mit unterschiedlichen Ideologien beteiligt waren. Einige waren Anhänger des Mystikers und Geomanten Phan Xich Long, der behauptet hatte, ein Nachfahre des jungen Kaisers Hàm Nghi zu sein, der etwa drei Jahrzehnte zuvor von den Franzosen abgesetzt worden war, weil er einen Aufstand mit dem Ziel der Unabhängigkeit versucht hatte."

ron_early_wars_news.146.t:0 "Schlacht von Segale"
ron_early_wars_news.146.d:0 "Die Schlacht von Segale, die am 27. Oktober 1916 ausgetragen wurde, war ein Sieg für die Anhänger von Kaiserin Zawditu über die von Kaiser Iyasu V. von Äthiopien. Henze gibt an, dass Segale Äthiopiens größte Schlacht seit Adwa im Jahr 1896 war."

ron_early_wars_news.147.t:0 "Noemvriana"
ron_early_wars_news.147.d:0 "Die Noemvriana 1916 oder die Griechische Vesper war ein politischer Streit, der zu einer bewaffneten Konfrontation in Athen zwischen der royalistischen Regierung Griechenlands und den Streitkräften der Alliierten über die Frage der Neutralität Griechenlands während des Ersten Weltkriegs führte."

ron_early_wars_news.148.t:0 "Zentralasiatischer Aufstand von 1916"
ron_early_wars_news.148.d:0 "Der zentralasiatische Aufstand von 1916, auch bekannt als Semiretschje-Aufstand oder Urkun-Aufstand, war ein antirussischer Aufstand der muslimischen Bevölkerung Russisch-Turkestans, der durch die Einberufung von Muslimen zum russischen Militärdienst an der Ostfront während des Ersten Weltkriegs ausgelöst wurde. Die grassierende Korruption des russischen Kolonialregimes und der zaristische Kolonialismus in all seinen wirtschaftlichen, politischen, religiösen und nationalen Dimensionen werden allesamt als beitragende Ursachen angesehen."

ron_early_wars_news.149.t:0 "Osteraufstand"
ron_early_wars_news.149.d:0 "Der Osteraufstand, auch bekannt als Osterrebellion, war ein bewaffneter Aufstand in Irland während der Osterwoche im April 1916. Der Aufstand wurde von irischen Republikanern gegen die britische Herrschaft in Irland mit dem Ziel gestartet, eine unabhängige irische Republik zu gründen, während das Vereinigte Königreich den Ersten Weltkrieg führte. Es war der bedeutendste Aufstand in Irland seit dem Aufstand von 1798 und der erste bewaffnete Konflikt der irischen Revolutionszeit. Sechzehn Anführer des Aufstands wurden im Mai 1916 hingerichtet, doch der Aufstand, die Art der Hinrichtungen und die nachfolgenden politischen Entwicklungen trugen letztendlich dazu bei, dass die Unterstützung der Bevölkerung für die irische Unabhängigkeit zunahm."

ron_early_wars_news.150.t:0 "Besetzung der Dominikanischen Republik durch die Vereinigten Staaten"
ron_early_wars_news.150.d:0 "Die erste US-amerikanische Besetzung der Dominikanischen Republik dauerte von 1916 bis 1924. Sie war eine der vielen Interventionen der US-amerikanischen Streitkräfte in Lateinamerika im 20. Jahrhundert. Am 13. Mai 1916 zwang Konteradmiral William B. Caperton den Kriegsminister der Dominikanischen Republik, Desiderio Arias, der die Macht von Juan Isidro Jimenes Pereyra übernommen hatte, Santo Domingo zu verlassen, indem er der Stadt mit einem Seebombardement drohte."

ron_early_wars_news.151.t:0 "Arabischer Aufstand"
ron_early_wars_news.151.d:0 "Der Arabische Aufstand oder Große Arabische Aufstand war ein militärischer Aufstand arabischer Streitkräfte gegen das Osmanische Reich im Nahen Osten des Ersten Weltkriegs. Auf Grundlage des McMahon-Hussein-Briefwechsels, einer Vereinbarung zwischen der britischen Regierung und Hussein bin Ali, dem Scharif von Mekka, wurde der Aufstand am 10. Juni 1916 in Mekka offiziell eingeleitet. Ziel des Aufstands war die Schaffung eines einzigen, vereinigten und unabhängigen arabischen Staates, der sich von Aleppo in Syrien bis Aden im Jemen erstrecken sollte und den die Briten anzuerkennen versprochen hatten."

ron_early_wars_news.152.t:0 "Basmachi-Bewegung"
ron_early_wars_news.152.d:0 "Die Basmachi-Bewegung war eine dezentralisierte Bewegung, die einen langwierigen Aufstand der muslimischen Völker Zentralasiens gegen die Herrschaft des russischen Zarenreichs und der Sowjetunion führte. Ihre Wurzeln liegen in der gewaltsamen Wehrpflicht von 1916, die ausbrach, als das Russische Reich im Ersten Weltkrieg begann, Muslime zum Militärdienst einzuziehen. In den Monaten nach der Oktoberrevolution 1917 übernahmen die Bolschewiki in vielen Teilen des Russischen Reiches die Macht, und der Russische Bürgerkrieg begann. Turkestanische muslimische politische Bewegungen versuchten, in der Stadt Kokand im Fergana-Tal eine autonome Regierung zu bilden. Die Bolschewiki griffen Kokand im Februar 1918 an und verübten ein Massaker an bis zu 25.000 Menschen."

ron_early_wars_news.153.t:0 "Kurdische Aufstände im Sommer 1917"
ron_early_wars_news.153.d:0 "Während des Ersten Weltkriegs kam es im Osmanischen Reich zu mehreren kurdischen Aufständen. Diese Revolten wurden von den westlichen Verbündeten, insbesondere Großbritannien, gefördert, die den Kurden einen unabhängigen Staat versprachen. Dennoch leisteten die Alliierten nur begrenzte militärische Unterstützung. Britische Versprechen eines unabhängigen Kurdistans waren im Vertrag von Sèvres von 1920 enthalten, der ein kleines Gebiet für einen geplanten kurdischen Staat zuwies. Diese Pläne wurden jedoch 1923 mit dem türkischen Sieg im Türkischen Unabhängigkeitskrieg und dem darauf folgenden Vertrag von Lausanne aufgegeben."

ron_early_wars_news.154.t:0 "Kurdische Aufstände im August 1917"
ron_early_wars_news.154.d:0 "Während des Ersten Weltkriegs kam es im Osmanischen Reich zu mehreren kurdischen Aufständen. Diese Revolten wurden von den westlichen Verbündeten, insbesondere Großbritannien, gefördert, die den Kurden einen unabhängigen Staat versprachen. Dennoch leisteten die Alliierten nur begrenzte militärische Unterstützung. Britische Versprechen eines unabhängigen Kurdistans waren im Vertrag von Sèvres von 1920 enthalten, der ein kleines Gebiet für einen geplanten kurdischen Staat zuwies. Diese Pläne wurden jedoch 1923 mit dem türkischen Sieg im Türkischen Unabhängigkeitskrieg und dem darauf folgenden Vertrag von Lausanne aufgegeben."

ron_early_wars_news.155.t:0 "Februarrevolution"
ron_early_wars_news.155.d:0 "Die Februarrevolution, die in der sowjetischen Geschichtsschreibung als „Bürgerlich-Demokratische Februarrevolution“ und manchmal auch als „Märzrevolution“ bekannt ist, war die erste von zwei Revolutionen, die 1917 in Russland stattfanden."

ron_early_wars_news.156.t:0 "Julitage"
ron_early_wars_news.156.d:0 "Die Julitage waren geprägt von spontanen bewaffneten Demonstrationen von Soldaten, Matrosen und Industriearbeitern gegen die russische Provisorische Regierung. Die Demonstrationen waren wütender und gewalttätiger als die Demonstrationen während der Februarrevolution Monate zuvor."

ron_early_wars_news.157.t:0 "Operationen gegen die Mahsuds"
ron_early_wars_news.157.d:0 "Im Jahr 1917 startete das britische Empire eine erfolgreiche Strafexpedition gegen den Mahsud."

ron_early_wars_news.158.t:0 "Mandschu-Restaurierung"
ron_early_wars_news.158.d:0 "Die Mandschu-Restauration im Juli 1917 war ein Versuch General Zhang Xuns, die Monarchie in China wiederherzustellen. Seine Armee eroberte Peking und setzte den letzten Kaiser der Qing-Dynastie, Puyi, kurzzeitig wieder auf den Thron. Die Restauration dauerte nur wenige Tage, vom 1. bis 12. Juli, und wurde von republikanischen Truppen rasch wieder rückgängig gemacht. Trotz des populären Namens „Mandschu-Restauration“ waren fast alle Teilnehmer des Aufstands ethnische Han-Chinesen."

ron_early_wars_news.159.t:0 "Thái Nguyên-Aufstand"
ron_early_wars_news.159.d:0 "Der Thái-Nguyên-Aufstand von 1917 gilt als der „größte und zerstörerischste“ antikoloniale Aufstand in Französisch-Indochina zwischen der Befriedung von Tonkin in den 1880er Jahren und dem Nghe-Tinh-Aufstand von 1930–1931. Am 30. August 1917 meuterte eine bunt gemischte Gruppe politischer Gefangener, einfacher Krimineller und aufsässiger Gefängniswärter im Thai-Nguyen-Gefängnis, dem größten der Region. Die Rebellen kamen aus über dreißig Provinzen und waren Schätzungen zufolge irgendwann etwa 300 Zivilisten, 200 ehemalige Häftlinge und 130 Gefängniswärter beteiligt."

ron_early_wars_news.160.t:0 "Polubotkivtsi-Aufstand"
ron_early_wars_news.160.d:0 "Die Polubotok-Club-Affäre war eine wichtige nationale Zivilaffäre und ein bewaffneter Aufstand der Kiewer Garnisonstruppen, der am 17. und 18. Juli 1917 in Kiew kurz nach dem Zusammenbruch der Kerenski-Offensive (16. Juli) stattfand. Sie war Teil einer ukrainischen Militärbewegung, wobei die öffentliche Organisation Ukrainischer Militärclub von Pawlo Polubotok eine Schlüsselrolle spielte."

ron_early_wars_news.161.t:0 "Toplica-Aufstand"
ron_early_wars_news.161.d:0 "Der Toplica-Aufstand war ein serbischer Aufstand im Jahr 1917, der von serbischen Guerillas (Tschetniks) im Bezirk Toplica gegen die bulgarische Besatzungsmacht im östlichen Teil des Königreichs Serbien durchgeführt wurde, das seit Oktober 1915 besetzt war. Der Aufstand dauerte vom 21. Februar bis zum 25. März 1917."

ron_early_wars_news.162.t:0 "Kornilow-Affäre"
ron_early_wars_news.162.d:0 "ie Kornilow-Affäre, auch Kornilow-Putsch genannt, war ein versuchter Militärputsch des Oberbefehlshabers der russischen Armee, General Lawr Kornilow, vom 10. bis 13. September 1917 gegen die russische Provisorische Regierung unter Alexander Kerenski und den Petrograder Sowjet der Soldaten- und Arbeiterdeputierten. Die genauen Einzelheiten und Motive der Kornilow-Affäre sind aufgrund der allgemeinen Verwirrung aller Beteiligten unbestätigt. Viele Historiker haben daher unterschiedliche historische Berichte zusammengetragen."

ron_early_wars_news.163.t:0 "Grüner Mais-Aufstand"
ron_early_wars_news.163.d:0 "Die Green Corn Rebellion war ein bewaffneter Aufstand, der am 2. und 3. August 1917 im ländlichen Oklahoma stattfand. Der Aufstand war eine Reaktion von Europäeramerikanern, Pächtern, Seminolen, Muscogee Creeks und Afroamerikanern auf den Versuch, den Selective Draft Act von 1917 durchzusetzen. Der Name „Green Corn Rebellion“ bezog sich auf die angeblichen Pläne der Rebellen, durch das Land zu marschieren und sich unterwegs von „grünem Mais“ zu ernähren."

ron_early_wars_news.164.t:0 "Oktoberrevolution"
ron_early_wars_news.164.d:0 "Die Oktoberrevolution, in der Sowjetunion auch als Große Sozialistische Oktoberrevolution, Bolschewistischer Putsch, Bolschewistische Revolution, Oktoberaufstand, Oktoberputsch oder Roter Oktober bekannt, war eine Revolution in Russland unter Führung der Bolschewistischen Partei Wladimir Lenins, die maßgeblich zur größeren Russischen Revolution von 1917–1923 beitrug. Sie fand in Form eines bewaffneten Aufstands in Petrograd (dem heutigen Sankt Petersburg) am 25. Oktober (alten Stils, OS; 7. November, neuen Stils oder NS) 1917 statt. Sie war das auslösende Ereignis des Russischen Bürgerkriegs."

ron_early_wars_news.165.t:0 "Kerenski-Krasnow-Aufstand"
ron_early_wars_news.165.d:0 "Der Kerenski-Krasnow-Aufstand war Alexander Kerenskis Versuch, nach dem Sturz seiner provisorischen Regierung in Petrograd durch die Bolschewiki die Macht zurückzugewinnen. Nach der Oktoberrevolution floh Kerenski aus Petrograd und ging nach Pskow, wo er loyale Truppen sammelte, um die Hauptstadt zurückzuerobern. Zum Anführer dieser Armee ernannte er Pjotr Krasnow. Auch Kadetten von Militärschulen, die sogenannte Junkermeuterei, unterstützten Kerenski bei seinem Versuch, die Macht zurückzuerlangen. Seine Truppen eroberten Zarskoje Selo, wurden aber am nächsten Tag auf den Pulkowo-Höhen besiegt. Das Scheitern des Aufstands führte dazu, dass Kerenski ins Exil gehen musste und schließlich in Frankreich und später in den USA Zuflucht fand."

ron_early_wars_news.166.t:0 "Russischer Bürgerkrieg"
ron_early_wars_news.166.d:0 "Der Russische Bürgerkrieg war ein Mehrparteienkrieg im ehemaligen Russischen Reich unmittelbar nach den beiden Russischen Revolutionen von 1917, in dem viele Fraktionen um die politische Zukunft Russlands wetteiferten. Die beiden größten kämpfenden Gruppen waren die Rote Armee, die für die bolschewistische Form des Sozialismus unter der Führung Wladimir Lenins kämpfte, und die lose verbündeten Streitkräfte, die als Weiße Armee bekannt waren und unterschiedliche Interessen vertraten, die politischen Monarchismus, Kapitalismus und Sozialdemokratie befürworteten, jeweils mit demokratischen und antidemokratischen Varianten. Darüber hinaus kämpften rivalisierende militante Sozialisten, insbesondere Machnowia-Anarchisten und Linke Sozialrevolutionäre, sowie nicht-ideologische Grüne Armeen sowohl gegen die Roten als auch gegen die Weißen. Dreizehn ausländische Nationen intervenierten gegen die Rote Armee, insbesondere die ehemaligen alliierten Streitkräfte aus dem Ersten Weltkrieg, mit dem Ziel, die Ostfront wiederherzustellen. Drei ausländische Nationen der Mittelmächte intervenierten ebenfalls und konkurrierten mit der alliierten Intervention mit dem Hauptziel, das Gebiet zu behalten, das sie im Vertrag von Brest-Litowsk erhalten hatten."

ron_early_wars_news.167.t:0 "Verfassungsschutzbewegung"
ron_early_wars_news.167.d:0 "Die Verfassungsschutzbewegung war eine Reihe von Bewegungen unter der Führung von Sun Yat-sen, die sich zwischen 1917 und 1922 der Beiyang-Regierung widersetzten. Sun Yat-sen setzte daraufhin eine neue Regierung in Guangzhou ein. Sie wurde als Dritte Revolution der Kuomintang bezeichnet. Die Verfassung, die sie schützen sollte, war die Provisorische Verfassung der Republik China."

ron_early_wars_news.168.t:0 "Ukrainischer Unabhängigkeitskrieg"
ron_early_wars_news.168.d:0 "Der Ukrainische Unabhängigkeitskrieg, eine Periode anhaltender kriegerischer Konflikte, dauerte von 1917 bis 1921 und führte zur Gründung und Entwicklung einer ukrainischen Republik, die später größtenteils als Ukrainische Sozialistische Sowjetrepublik (1922–1991) in die Sowjetunion eingegliedert wurde."

ron_early_wars_news.169.t:0 "Golok-Rebellionen"
ron_early_wars_news.169.d:0 "Die Ngolok-Aufstände (1917–1949) waren eine Reihe von Militärkampagnen gegen die noch nicht eroberten tibetischen Ngolok-Stammesgebiete in Qinghai (Amdo). Sie wurden von zwei Hui-Kommandeuren, General Ma Qi und General Ma Bufang, im Auftrag der Beiyang- und Kuomintang-Regierungen der Republik China durchgeführt. Die Kampagnen dauerten von 1917 bis 1949."

ron_early_wars_news.170.t:0 "Adubi-Krieg "
ron_early_wars_news.170.d:0 "Der Adubi-Krieg (lokal bekannt als Ogun Adubi oder Egba-Aufstand) war ein Konflikt im Juni und Juli 1918 in der britischen Kolonie und im Protektorat Nigeria, der angeblich mit der Einführung von Kolonialsteuern in Zusammenhang stand. Die Kolonialregierung führte neben den bestehenden Zwangsarbeitsverpflichtungen und Gebühren auch direkte Steuern ein. Am 7. Juni verhafteten die Briten 70 Egba-Häuptlinge und stellten ein Ultimatum, dass Widerstandskämpfer ihre Waffen niederlegen, die Steuern zahlen und der lokalen Führung gehorchen sollten."

ron_early_wars_news.171.t:0 "Simko-Shikak-Aufstand"
ron_early_wars_news.171.d:0 "Der Simko-Schikak-Aufstand bezeichnet einen bewaffneten, vom Osmanischen Reich unterstützten kurdischen Stammesaufstand gegen die Kadscharen-Dynastie im Iran von 1918 bis 1922. Angeführt wurde er vom kurdischen Häuptling Simko Schikak vom Stamm der Schekak. Der Aufstand wird oft als der erste moderne Konflikt bezeichnet, an dem iranische Kurden mit separatistischen Ambitionen beteiligt waren."

ron_early_wars_news.172.t:0 "Judenburger Meuterei"
ron_early_wars_news.172.d:0 "Der Judenburger Aufstand war ein bewaffneter Aufstand, der im Mai 1918 in der Stadt Judenburg stattfand. Auslöser war die mangelnde Bereitschaft einiger Militärangehöriger, in der zweiten Hälfte des Ersten Weltkriegs für Österreich-Ungarn zu dienen. Dieser Vorfall ereignete sich in der Endphase des Krieges als Folge mehrerer anderer Aufstände innerhalb der österreichisch-ungarischen Armee, die durch die Dauer des Konflikts und die schwierige Lage an der Isonzofront ausgelöst worden waren. Der Aufstand wurde gewaltsam beendet und seine wichtigsten Anführer von einem Militärgericht verurteilt und hingerichtet."

ron_early_wars_news.173.t:0 "Cattaro-Meuterei"
ron_early_wars_news.173.d:0 "Der Aufstand von Cattaro ereignete sich während des Ersten Weltkriegs. Matrosen der österreichisch-ungarischen Marine begannen ihn am 1. Februar 1918 in der Adriabucht von Cattaro (heute: Kotor, Montenegro), das damals zu Österreich-Ungarn gehörte. Der Aufstand blieb isoliert und musste nach drei Tagen aufgrund der Ankunft loyaler Truppen abgebrochen werden. Vier Matrosen wurden anschließend aufgrund des Kriegsrechts hingerichtet. Der Marinehistoriker Halpern schildert dieses Ereignis als den letzten Sieg der österreichisch-ungarischen Monarchie über die gesellschaftlichen Kräfte, die sie schließlich überwältigen sollten."

ron_early_wars_news.174.t:0 "Aster Revolution"
ron_early_wars_news.174.d:0 "Die Aster-Revolution oder Chrysanthemen-Revolution (ungarisch: Őszirózsás forradalom) war eine Revolution in Ungarn unter der Führung von Graf Mihály Károlyi nach dem Ersten Weltkrieg, die zur Gründung der kurzlebigen Ersten Ungarischen Volksrepublik führte."

ron_early_wars_news.175.t:0 "Radomir-Rebellion"
ron_early_wars_news.175.d:0 "Der Aufstand, dessen Zentrum westlich von Sofia in der Stadt Radomir lag, drohte sich zu einer nationalen Revolution auszuweiten, doch die Bewegung für eine neue Agrarrepublik wurde aufgrund verschiedener Faktoren rasch niedergeschlagen und hatte nicht genügend Mittel, um die gewünschten Veränderungen herbeizuführen. Der Aufstand dauerte nur vom 28. September bis zum 2. Oktober, konnte aber trotz seiner kurzen Dauer einige frühe Erfolge verzeichnen. Den Meuterern gelang es, in die bulgarische Hauptstadt einzudringen, wo zaristische Truppen unter General Alexander Protogerow den Aufstand niederschlugen und dabei schätzungsweise 2.000 Soldaten töteten und weitere 3.000 verhafteten. Anders als viele seiner Anhänger konnte Stambolijski einer Gefängnisstrafe oder Hinrichtung entgehen und tauchte stattdessen unter, bis er während der Herrschaft von Zar Boris III. wieder auf der politischen Bühne auftauchte. Die Bewegung konnte jedoch nicht als völliger Misserfolg der Agrarunion betrachtet werden, da sie die Herrschaft von Zar Ferdinand beendete, der am 3. Oktober 1918 vor der alliierten Besatzung mit dem Zug aus Bulgarien geflohen war. Ferdinands Nachfolger wurde mit Zustimmung der Alliierten sein Sohn Boris III."

ron_early_wars_news.176.t:0 "Aufstand der Linken Sozialrevolutionäre"
ron_early_wars_news.176.d:0 "Der Aufstand der Linken Sozialrevolutionären Partei (SR) war ein Aufstand der Linkssozialistischen Revolutionären Partei (SSR) gegen die Bolschewiki im Juli 1918. Der Aufstand begann am 6. Juli 1918 und sollte angeblich den Krieg mit Deutschland wiederaufleben lassen. Er war einer von mehreren linken Aufständen gegen die Bolschewiki während des russischen Bürgerkriegs."

ron_early_wars_news.177.t:0 "Finnischer Bürgerkrieg"
ron_early_wars_news.177.d:0 "Der Finnische Bürgerkrieg war ein Bürgerkrieg in Finnland im Jahr 1918, in dem das Weißfinnland und die Finnische Sozialistische Arbeiterrepublik (Rotes Finnland) während des Übergangs des Landes von einem Großfürstentum des Russischen Reiches zu einem unabhängigen Staat um die Führung und Kontrolle Finnlands ausgetragen wurden. Die Zusammenstöße ereigneten sich im Kontext der nationalen, politischen und sozialen Unruhen, die der Erste Weltkrieg (Ostfront) in Europa verursacht hatte. Der Krieg wurde zwischen den Roten, angeführt von einem Teil der Sozialdemokratischen Partei, und den Weißen, angeführt vom konservativen Senat und der deutschen Kaiserlichen Armee, ausgefochten. Die paramilitärischen Roten Garden, bestehend aus Industrie- und Agrararbeitern, kontrollierten die Städte und Industriezentren Südfinnlands. Die paramilitärischen Weißen Garden, bestehend aus Bauern sowie Angehörigen der Mittel- und Oberschicht, kontrollierten unter der Führung von General CGE Mannerheim das ländliche Mittel- und Nordfinnland."

ron_early_wars_news.178.t:0 "Georgisch-Armenischer Krieg"
ron_early_wars_news.178.d:0 "Der Georgisch-Armenische Krieg war ein kurzer Grenzstreit, der im Dezember 1918 zwischen der gerade unabhängig gewordenen Demokratischen Republik Georgien und der Ersten Republik Armenien ausgetragen wurde. Dabei ging es hauptsächlich um die Kontrolle der ehemaligen Bezirke des Gouvernements Tiflis in Borchaly (Lori) und Achalkalaki."

ron_early_wars_news.179.t:0 "Polnisch-tschechoslowakische Grenzkonflikte"
ron_early_wars_news.179.d:0 "Grenzkonflikte zwischen Polen und der Tschechoslowakei begannen 1918 zwischen der Zweiten Polnischen Republik und der Ersten Tschechoslowakischen Republik, beides neu gegründete Staaten. Die Konflikte konzentrierten sich auf die umstrittenen Gebiete Teschener Schlesien, Orava-Gebiet und Zips. Nach dem Zweiten Weltkrieg weiteten sie sich auf Gebiete um die Städte Glatz (Kłodzko) und Ratibor (Ratibor) aus, die bis 1945 zu Deutschland gehört hatten. Die Konflikte spitzten sich 1919 zu und wurden schließlich 1958 in einem Vertrag zwischen der Volksrepublik Polen und der Tschechoslowakischen Sozialistischen Republik beigelegt."

ron_early_wars_news.180.t:0 "Interne Konflikte in der Banater Republik"
ron_early_wars_news.180.d:0 "Am 1. November brach ein sozialer Aufstand aus, als die Zuckerfabrik in Margina, nordöstlich von Lugoj, von Bauern aus der umliegenden Region übernommen wurde. Ein weiterer Kern war Ciacova, südlich von Timișoara. Ehemalige Soldaten gingen mit Repressalien gegen die Notare vor, die für Kriegsungerechtigkeiten verantwortlich gemacht wurden. Solche Vorfälle erreichten ihren Höhepunkt in Ghilad, wo ein Notar von einem selbsternannten Gericht vor Gericht gestellt und hingerichtet wurde, und erneut in Denta, wo das Archiv verwüstet und sein Verwalter schwer verletzt wurde."

ron_early_wars_news.181.t:0 "Serbischer Einfall in die Banat-Republik"
ron_early_wars_news.181.d:0 "Nach dem ungarischen Waffenstillstand, der es den Alliierten ermöglichte, Teile Ungarns einzunehmen, trat Bartha aus Protest zurück. Am 12. November marschierte die Königlich Serbische Armee mit Unterstützung Ungarns und der Alliierten in das Banat ein. Eine von Oberst Čolović angeführte Truppe übernahm am 17. November die Kontrolle über Timișoara und wurde von allen Gemeinden als Garant für „Freiheit und Demokratie“ gefeiert. Sowohl Cosma als auch Roth sprachen bei dieser Gelegenheit und begrüßten die Intervention; Roth begrüßte Čolović mit dem Slogan „Es lebe der Internationalismus!“"

ron_early_wars_news.182.t:0 "Wien-Expedition"
ron_early_wars_news.182.d:0 "Die Wiener Expedition war eine Militärexpedition finnischer Freiwilligentruppen im März 1918 zur Angliederung Weißkareliens (Vienan Karjala) an das bolschewistische Russland. Sie war einer der vielen „Verwandtschaftskriege“ (Heimosodat), die während des russischen Bürgerkriegs in der Nähe des gerade unabhängig gewordenen Finnlands ausgetragen wurden. Das russische Ostkarelien war nie Teil des schwedischen Reiches oder des Großfürstentums Finnland und war zu dieser Zeit überwiegend von Kareliern bewohnt. Viele Befürworter eines Großfinnlands betrachteten diese Karelier jedoch als „verwandte“ finnische Nation und unterstützten die Annexion des russischen Ostkareliens an Finnland."

ron_early_wars_news.183.t:0 "Petsamo-Expeditionen"
ron_early_wars_news.183.d:0 "Die Petsamo-Expeditionen waren zwei Militärexpeditionen finnischer Zivilfreiwilliger im Mai 1918 und im April 1920, um Petsamo (russisch: Pechenga) vom bolschewistischen Russland zu annektieren. Es war einer der vielen „Verwandtschaftskriege“ (Heimosodat), die das gerade unabhängig gewordene Finnland während des russischen Bürgerkriegs führte. Obwohl beide Expeditionen erfolglos blieben, wurde Petsamo im Vertrag von Tartu 1920 von Russland an Finnland übergeben."

ron_early_wars_news.184.t:0 "Österreichisch-Slowenischer Konflikt in Kärnten"
ron_early_wars_news.184.d:0 "Der österreichisch-slowenische Konflikt in Kärnten war eine militärische Auseinandersetzung nach dem Ersten Weltkrieg zwischen den Streitkräften des Staates der Slowenen, Kroaten und Serben (später des Königreichs der Serben, Kroaten und Slowenen) und den Streitkräften der Republik Deutschösterreich. Hauptschauplatz des Konflikts war das sprachlich gemischte Gebiet im Südosten Kärntens. Der Konflikt wurde 1919 durch den Vertrag von Saint-Germain beigelegt, der eine Volksabstimmung zur Lösung des Territorialstreits vorsah."

ron_early_wars_news.185.t:0 "Deutsche Revolution"
ron_early_wars_news.185.d:0 "Die Deutsche Revolution oder Novemberrevolution war ein Bürgerkrieg im Deutschen Reich am Ende des Ersten Weltkriegs, der zur Ersetzung der deutschen föderalen konstitutionellen Monarchie durch eine demokratische parlamentarische Republik führte, die später als Weimarer Republik bekannt wurde. Die Revolutionszeit dauerte von November 1918 bis zur Verabschiedung der Weimarer Verfassung im August 1919."

ron_early_wars_news.186.t:0 "Aufstand in Großpolen"
ron_early_wars_news.186.d:0 "Der Großpolnische Aufstand von 1918–1919 (auch Wielkopolska-Aufstand von 1918–1919 oder Posener Krieg) war ein militärischer Aufstand der Polen in der Region Großpolen gegen die deutsche Herrschaft. Der Aufstand hatte erhebliche Auswirkungen auf den Vertrag von Versailles, der der wiederhergestellten Zweiten Polnischen Republik das von den polnischen Aufständischen eroberte Gebiet zusprach. Die Region war Teil des Königreichs Polen und dann der Polnisch-Litauischen Union, bevor sie 1793 nach der Zweiten Teilung Polens vom deutschen Königreich Preußen annektiert wurde. Nach dem Großpolnischen Aufstand von 1806 war sie außerdem Teil des Herzogtums Warschau (1807–1815), einem französischen Marionettenstaat während der Napoleonischen Kriege."

ron_early_wars_news.187.t:0 "Ungarisch-Tschechoslowakischer Krieg"
ron_early_wars_news.187.d:0 "Der Ungarisch-Tschechoslowakische Krieg oder Nordfeldzug wurde von April bis Juni 1919 zwischen der Ungarischen Sowjetrepublik und der Ersten Tschechoslowakischen Republik ausgetragen."

ron_early_wars_news.188.t:0 "Polnisch-Ukrainischer Krieg"
ron_early_wars_news.188.d:0 "Der Polnisch-Ukrainische Krieg von November 1918 bis 1919 war ein Konflikt zwischen der Zweiten Polnischen Republik und ukrainischen Streitkräften (sowohl der Westukrainischen Volksrepublik als auch der Ukrainischen Volksrepublik). Der Konflikt hatte seine Wurzeln in ethnischen, kulturellen und politischen Differenzen zwischen der polnischen und der ukrainischen Bevölkerung der Region. Der Krieg begann in Ostgalizien nach dem Zerfall der Österreichisch-Ungarischen Monarchie und griff auf die ehemals zum Russischen Reich gehörenden Regionen Chełm-Land und Wolhynien (Wołyń) über, die beide vom Ukrainischen Staat (einem Vasallenstaat des Deutschen Reiches) und der Ukrainischen Volksrepublik beansprucht wurden."

ron_early_wars_news.189.t:0 "Georgisch-ossetischer Konflikt"
ron_early_wars_news.189.d:0 "Der georgisch-ossetische Konflikt von 1918 bis 1920 umfasste eine Reihe von Aufständen in den von Osseten bewohnten Gebieten des heutigen Südossetien, einer abtrünnigen Republik in Georgien. Die Aufstände richteten sich gegen die Transkaukasische Demokratische Föderative Republik und die damals von Menschewiki dominierte Demokratische Republik Georgien. Sie forderten mehrere tausend Todesopfer und hinterließen in der georgischen und ossetischen Bevölkerung der Region schmerzhafte Erinnerungen."

ron_early_wars_news.190.t:0 "Sotschi-Konflikt"
ron_early_wars_news.190.d:0 "Der Sotschi-Konflikt war ein Grenzkonflikt zwischen drei Parteien, an dem die konterrevolutionären weißrussischen Streitkräfte, die bolschewistische Rote Armee und die Demokratische Republik Georgien beteiligt waren. Beide Seiten strebten nach der Kontrolle über die Schwarzmeerstadt Sotschi. Der Konflikt wurde als Teil des russischen Bürgerkriegs ausgetragen und dauerte mit wechselndem Erfolg von Juli 1918 bis Mai 1919. Er endete mit der britischen Vermittlung, die die heutige offizielle Grenze zwischen Russland und Georgien festlegte."

ron_early_wars_news.191.t:0 "Armenisch-Aserbaidschanischer Krieg"
ron_early_wars_news.191.d:0 "Der Armenisch-Aserbaidschanische Krieg, der nach der Russischen Revolution begann, bestand aus einer Reihe von Konflikten, die 1918, dann von 1920 bis 1922 während der kurzen Unabhängigkeit Armeniens und Aserbaidschans und danach stattfanden. Die meisten Konflikte folgten keinem einheitlichen Muster mit einheitlicher bewaffneter Struktur. Das Osmanische Reich und das Britische Empire waren in unterschiedlicher Funktion beteiligt: Das Osmanische Reich verließ die Region nach dem Waffenstillstand von Mudros, doch der britische Einfluss blieb bestehen, bis Dunsterforce in den 1920er Jahren abgezogen wurde. An den Konflikten waren Zivilisten in den umstrittenen Distrikten Kasachstan-Schamschadin, Zanghezur, Nachitschewan und Karabach beteiligt. Der Einsatz von Guerilla- und Semi-Guerilla-Operationen war der Hauptgrund für die hohen zivilen Opferzahlen während der Nation-Building-Aktivitäten der neu gegründeten Staaten."

ron_early_wars_news.192.t:0 "Estnischer Unabhängigkeitskrieg"
ron_early_wars_news.192.d:0 "Der Estnische Unabhängigkeitskrieg, auch Estnischer Befreiungskrieg genannt, war ein Verteidigungsfeldzug der estnischen Armee und ihrer Verbündeten, insbesondere der weißrussischen Nordwestarmee, Lettlands und Großbritanniens, gegen die Offensive der Sowjetunion an der Westfront und die Aggression der Baltischen Landeswehr. Er wurde im Zusammenhang mit dem russischen Bürgerkrieg von 1918 bis 1920 geführt. Der Feldzug war der Kampf Estlands um seine Souveränität nach dem Ersten Weltkrieg. Er endete mit einem Sieg für den neu gegründeten Staat und wurde mit dem Vertrag von Tartu abgeschlossen."

ron_early_wars_news.193.t:0 "Lettischer Unabhängigkeitskrieg"
ron_early_wars_news.193.d:0 "Der Lettische Unabhängigkeitskrieg, manchmal auch Lettischer Freiheitskampf oder Lettischer Befreiungskrieg genannt, war eine Reihe militärischer Konflikte in Lettland zwischen dem 5. Dezember 1918, nachdem die Sowjetrussland in die neu ausgerufene Republik Lettland einmarschiert war, und der Unterzeichnung des lettisch-sowjetischen Friedensvertrags von Riga am 11. August 1920."

ron_early_wars_news.194.t:0 "Litauisch-Sowjetischer Krieg"
ron_early_wars_news.194.d:0 "Der Litauisch-Sowjetische Krieg oder Litauisch-Bolschewistische Krieg wurde nach dem Ersten Weltkrieg zwischen dem gerade unabhängig gewordenen Litauen und der Russischen Sozialistischen Föderativen Sowjetrepublik ausgetragen. Er war Teil der größeren sowjetischen Westoffensive von 1918–1919."

ron_early_wars_news.195.t:0 "Al-Khurma-Streit"
ron_early_wars_news.195.d:0 "Der Erste Saudi-Haschemitische Krieg, auch bekannt als Erster Nejd-Hedschas-Krieg oder Al-Khurma-Konflikt, fand 1918–19 zwischen Abdulaziz ibn Saud aus dem Emirat Nejd und den Haschemiten aus dem Königreich Hedschas statt."

ron_early_wars_news.196.t:0 "Vue Pa Chays Aufstand"
ron_early_wars_news.196.d:0 "Der Aufstand von Vue Pa Chay, in französischen Quellen auch Krieg der Wahnsinnigen oder Krieg des Wahnsinnigen (Guerre du Fou) genannt, war ein Hmong-Aufstand gegen die Besteuerung der französischen Kolonialverwaltung in Indochina, der von 1918 bis 1921 dauerte. Vue Pa Chay, der Anführer des Aufstands, kletterte regelmäßig auf Bäume, um militärische Befehle vom Himmel zu erhalten. Die Franzosen gewährten den Hmong 1920 einen Sonderstatus und beendeten damit den Konflikt."

ron_early_wars_news.197.t:0 "Aufstand der Ingermanischen Finnen"
ron_early_wars_news.197.d:0 "Der Ingermanische Aufstand war ein Sezessionsaufstand in der Region Ingermanland während des russischen Bürgerkriegs. Ziel war die Eingliederung in Finnland, doch es kam nicht zu entsprechenden Vereinbarungen, und die Republik brach weniger als ein Jahr nach ihrer Entstehung zusammen. Sie kontrollierte nur einen kleinen nördlichen Teil der Region, was ihr den Namen „Republik Nordingrja“ einbrachte."

ron_early_wars_news.198.t:0 "Französisch-Türkischer Krieg"
ron_early_wars_news.198.d:0 "Der Französisch-Türkische Krieg, in Frankreich als Kilikienfeldzug und in der Türkei als Südfront des türkischen Unabhängigkeitskrieges bekannt, war eine Reihe von Konflikten, die zwischen Frankreich (den französischen Kolonialstreitkräften und der französischen armenischen Legion) und den türkischen Nationalstreitkräften (angeführt von der türkischen provisorischen Regierung nach dem 4. September 1920) von Dezember 1918 bis Oktober 1921 im Gefolge des Ersten Weltkriegs ausgetragen wurden. Das französische Interesse an der Region resultierte aus dem Sykes-Picot-Abkommen und der Rückführung armenischer Flüchtlinge des Völkermords an den Armeniern in ihre Heimat."

ron_early_wars_news.199.t:0 "Meuterei am Schwarzen Meer"
ron_early_wars_news.199.d:0 "Die Schwarzmeermeuterei fand an Bord verschiedener Schiffe der französischen Marine statt – unter anderem auf den Schlachtschiffen Jean Bart, France und Provence –, die im Rahmen der von Frankreich angeführten Intervention in Südrussland auf weißrussischer Seite ins Schwarze Meer entsandt worden waren. Am 19. April 1919 meuterten die Schiffsbesatzungen aus Protest gegen die französische Interventionspolitik. Zu den Anführern der Meuterei gehörte André Marty."

ron_early_wars_news.200.t:0 "Monarchie des Nordens"
ron_early_wars_news.200.d:0 "Die Monarchie des Nordens (offiziell Königreich Portugal) war eine kurzlebige Revolution und monarchistische Regierung, die Anfang 1919 im Norden Portugals stattfand. Sie hatte ihren Sitz in Porto und dauerte vom 19. Januar bis zum 13. Februar 1919. Die Bewegung ist auch unter dem abwertenden Begriff Traulitânia bekannt."

ron_early_wars_news.201.t:0 "Weihnachtsaufstand"
ron_early_wars_news.201.d:0 "Der Weihnachtsaufstand oder die Weihnachtsrebellion war ein gescheiterter Aufstand in Montenegro, der Anfang Januar 1919 von den Grünen angeführt wurde. Der militärische Anführer des Aufstands war Krsto Zrnov Popović und sein politischer Anführer war Jovan Plamenac."

ron_early_wars_news.202.t:0 "Spartakusaufstand"
ron_early_wars_news.202.d:0 "Der Spartakusaufstand, auch Januaraufstand genannt, war ein Generalstreik (mit den ihn begleitenden bewaffneten Kämpfen) in Berlin vom 5. bis 12. Januar 1919. Deutschland befand sich mitten in einer Nachkriegsrevolution, und zwei der erkannten Wege nach vorn waren die Sozialdemokratie und eine Räterepublik, ähnlich der von den Bolschewiki in Russland errichteten. Der Aufstand war in erster Linie ein Machtkampf zwischen der gemäßigten Sozialdemokratischen Partei Deutschlands (SPD) unter Friedrich Ebert und den radikalen Kommunisten der Kommunistischen Partei Deutschlands (KPD) unter Karl Liebknecht und Rosa Luxemburg, die zuvor den Spartakusbund gegründet und geführt hatten."

ron_early_wars_news.203.t:0 "Krieg gegen die Bermontianer"
ron_early_wars_news.203.d:0 "Die Bermontianer, benannt nach ihrem Anführer Pawel Bermondt-Awalow und offiziell als Westrussische Freiwilligenarmee bekannt, waren eine gemischte deutsch-russische Armee. Die Armee umfasste russische Kriegsgefangene, die vom Deutschen Reich freigelassen wurden, nachdem sie versprochen hatten, im russischen Bürgerkrieg gegen die Bolschewiki zu kämpfen, und Mitglieder der Freikorps, die nach der deutschen Kriegsniederlage in Lettland und Litauen stationiert waren. Das offizielle Ziel dieser Armee war der Kampf gegen die Bolschewiki zusammen mit Alexander Koltschaks Truppen. Ihr eigentliches Ziel war jedoch die Aufrechterhaltung der deutschen Macht in den Gebieten, die sie im Ersten Weltkrieg erobert hatten."

ron_early_wars_news.204.t:0 "Sejny-Aufstand"
ron_early_wars_news.204.d:0 "Der Sejny-Aufstand oder Seinai-Aufstand bezeichnet einen polnischen Aufstand gegen die litauischen Behörden im August 1919 in dem ethnisch gemischten Gebiet rund um die Stadt Sejny (litauisch: Seinai). Als sich die deutschen Truppen, die das Gebiet während des Ersten Weltkriegs besetzt hatten, im Mai 1919 aus dem Gebiet zurückzogen, übergaben sie die Verwaltung den Litauern. Um einen bewaffneten Konflikt zwischen Polen und Litauen zu verhindern, zog die Entente eine Demarkationslinie, die als Foch-Linie bekannt ist. Diese Linie sagte Polen einen Großteil der umstrittenen Region Suwałki (Suvalkai) zu und zwang die litauische Armee zum Rückzug. Während sich die Litauer aus einigen Gebieten zurückzogen, weigerten sie sich, Sejny (Seinai) zu verlassen, da dort ein großer Teil der litauischen Bevölkerung lebte. Polnische irreguläre Truppen begannen den Aufstand am 23. August 1919 und erhielten bald Unterstützung von der regulären polnischen Armee. Nach mehreren militärischen Scharmützeln nahmen polnische Truppen Sejny ein und die Litauer zogen sich hinter die Foch-Linie zurück."

ron_early_wars_news.205.t:0 "Erster Barzanji-Aufstand"
ron_early_wars_news.205.d:0 "Scheich Mahmud führte im Mai 1919 den ersten kurdischen Aufstand im britisch kontrollierten Irakisch-Kurdistan an. Kurz vor seiner Ernennung zum Gouverneur von Sulaimaniyya ordnete er die Verhaftung aller britischen Politiker und Militärs in der Region an. Nachdem er die Kontrolle über die Region übernommen hatte, stellte Scheich Mahmud eine Streitmacht aus seinen kurdischen Stammesanhängern auf und ernannte sich selbst zum „Herrscher von ganz Kurdistan“. Seine Autorität als religiöser Führer nutzend, rief Scheich Mahmud 1919 zum Dschihad gegen die Briten auf und gewann so die Unterstützung vieler Kurden, die dem nationalistischen Kampf gleichgültig gegenüberstanden. Obwohl die Intensität ihres Kampfes religiös motiviert war, griffen die kurdischen Bauern die Idee der „nationalen und politischen Freiheit für alle“ auf und strebten nach „einer Verbesserung ihrer sozialen Stellung“. Nach einem vergeblichen Protest der tschechoslowakischen Regierung gegen Maßnahmen, die gegen das Interimsabkommen verstießen, griffen sie den von polnischen Streitkräften gehaltenen Teil Teschen-Schlesiens an, um Wahlen zum polnischen Sejm in dem umstrittenen Gebiet und die Beitragszahlungen der lokalen Bevölkerung an die polnische Armee zu verhindern."

ron_early_wars_news.206.t:0 "Polnisch-Tschechoslowakischer Krieg"
ron_early_wars_news.206.d:0 "Der Polnisch-Tschechoslowakische Krieg, in tschechischen Quellen auch als Siebentagekrieg bekannt, war eine militärische Auseinandersetzung zwischen der Tschechoslowakei und Polen um das Gebiet von Teschen-Schlesien im Frühjahr 1919."

ron_early_wars_news.207.t:0 "Khotin-Aufstand"
ron_early_wars_news.207.d:0 "Der Chotiner Aufstand war ein von Ukrainern angeführter Aufstand im äußersten Norden Bessarabiens, eingebettet zwischen der Bukowina und Podolien. Er ereignete sich vom 7. Januar bis 1. Februar 1919, weniger als ein Jahr nach der Annexion Bessarabiens durch das rumänische Königreich. Die Stadt, um die sich der Aufstand drehte, heißt heute Chotyn (Хотин) und liegt in der Oblast Czernowitz in der Ukraine. 1919 war sie die Hauptstadt des Kreises Chotyn an der inoffiziellen Grenze zwischen Rumänien und der Ukrainischen Volksrepublik (UNR)."

ron_early_wars_news.208.t:0 "Ungarisch-Rumänischer Krieg"
ron_early_wars_news.208.d:0 "Der Ungarisch-Rumänische Krieg wurde vom 13. November 1918 bis zum 3. August 1919 zwischen Ungarn und Rumänien geführt. Er begann am 13. November 1918 als rumänischer Militärfeldzug in den östlichen Teilen des selbstentwaffneten Königreichs Ungarn und setzte sich gegen die Erste Ungarische Republik und ab März 1919 gegen die Ungarische Räterepublik fort. Die rumänische Armee besetzte bis zum 28. März 1920 weite Teile Ungarns und zog sich dann schließlich bis zu den Demarkationslinien zurück."

ron_early_wars_news.209.t:0 "Türkischer Unabhängigkeitskrieg"
ron_early_wars_news.209.d:0 "Der türkische Unabhängigkeitskrieg wurde zwischen der türkischen Nationalbewegung und den alliierten Mächten – nämlich Griechenland im Westen, Armenien im Osten, Frankreich im Süden, Royalisten und Separatisten in verschiedenen Städten sowie dem Vereinigten Königreich und Italien in Konstantinopel (dem heutigen Istanbul) – ausgetragen, nachdem Teile des Osmanischen Reiches nach der Niederlage der Osmanen im Ersten Weltkrieg besetzt und aufgeteilt worden waren."

ron_early_wars_news.210.t:0 "Dritter Anglo-Afghanischer Krieg"
ron_early_wars_news.210.d:0 "Der Dritte Anglo-Afghanische Krieg, auch bekannt als Dritter Afghanischer Krieg, Britisch-Afghanischer Krieg von 1919 und in Afghanistan als Unabhängigkeitskrieg, begann am 6. Mai 1919 mit dem Einmarsch des Emirats Afghanistan in Britisch-Indien und endete mit einem Waffenstillstand am 8. August 1919. Der Krieg führte dazu, dass die Afghanen die Kontrolle über die Außenpolitik von Großbritannien zurückerlangten und die Briten Afghanistan als unabhängige Nation anerkannten. Laut dem britischen Autor Michael Barthorp war es auch ein strategischer Sieg für die Briten, da die Durand-Linie als Grenze zwischen Afghanistan und der britischen Kolonialherrschaft bestätigt wurde und die Afghanen sich verpflichteten, auf britischer Seite keinen Ärger zu schüren. Afghanen auf der britischen Seite der Grenze sorgten jedoch aufgrund von Aufständen für Besorgnis."

ron_early_wars_news.211.t:0 "Waziristan-Kampagne"
ron_early_wars_news.211.d:0 "Der Waziristan-Feldzug 1919–1920 war eine Militärkampagne britischer und indischer Streitkräfte in Waziristan gegen die in dieser Region lebenden, äußerst unabhängigen Stammesangehörigen. Diese Operationen wurden 1919–1920 nach den Unruhen durchgeführt, die nach dem Dritten Anglo-Afghanischen Krieg aufkamen."

ron_early_wars_news.212.t:0 "Impresa di Fiume"
ron_early_wars_news.212.d:0 "Während des Ersten Weltkriegs (1914–1918) schloss Italien mit den Alliierten einen Pakt, den Londoner Vertrag (1915), in dem ihm das gesamte österreichische Küstenland, jedoch nicht die Stadt Fiume, zugesagt wurde. Nach dem Krieg wurde diese Gebietsabgrenzung auf der Pariser Friedenskonferenz 1919 bestätigt. Fiume (oder Rijeka) blieb außerhalb der italienischen Grenzen und wurde in das Königreich der Serben, Kroaten und Slowenen (später Jugoslawien) eingegliedert."

ron_early_wars_news.213.t:0 "Italienisch-Jugoslawischer Krieg"
ron_early_wars_news.213.d:0 "Der Zerfall des von den Habsburgern regierten Österreich-Ungarns im Oktober 1918 während der letzten Wochen des Ersten Weltkriegs führte zur Gründung rivalisierender kroatisch-serbischer und italienischer Verwaltungen in der Stadt. Sowohl Italien als auch die Gründer des neuen Königreichs der Serben, Kroaten und Slowenen (später Königreich Jugoslawien) beanspruchten die Souveränität aufgrund ihrer „irredentistischen“ („unerlösten“) ethnischen Bevölkerung."

ron_early_wars_news.214.t:0 "Polnisch-Sowjetischer Krieg"
ron_early_wars_news.214.d:0 "Der Polnisch-Sowjetische Krieg wurde von der Zweiten Polnischen Republik und der Sowjetunion um ein Gebiet geführt, das mit der heutigen westlichsten Ukraine und Teilen des modernen Weißrusslands vergleichbar ist. Nach der Intervention der Alliierten im russischen Bürgerkrieg versuchte Russland, den Druck zu verringern, indem es Polen durchquerte, um eine europaweite kommunistische Revolution unter dem trotzkistischen Slogan „den roten Pferden Wasser aus Weichsel und Rhein zu geben“ anzuregen."

ron_early_wars_news.215.t:0 "Schlesische Aufstände"
ron_early_wars_news.215.d:0 "Die Schlesischen Aufstände waren eine Serie von drei Aufständen von August 1919 bis Juli 1921 in Oberschlesien, das damals Teil der Weimarer Republik war. Polnische Separatisten, die das Gebiet der neu gegründeten Polnischen Republik zuordnen wollten, kämpften gegen deutsche Polizei- und paramilitärische Kräfte, die das Gebiet im nach dem Ersten Weltkrieg neu gegründeten deutschen Staat halten wollten. Nach dem Konflikt wurde das Gebiet zwischen den beiden Ländern aufgeteilt. Die Aufstände werden im heutigen Polen als Beispiel polnischen Nationalismus gewürdigt."

ron_early_wars_news.216.t:0 "Aunus-Expedition"
ron_early_wars_news.216.d:0 "Die Aunus-Expedition war ein Versuch finnischer Freiwilliger, 1919 während des russischen Bürgerkriegs Teile Ostkareliens zu besetzen. Aunus ist der finnische Name für Olonez-Karelien. Diese Expedition war einer von vielen finnischen „Verwandtschaftskriegen“, die nach der Russischen Revolution von 1917 und während des russischen Bürgerkriegs gegen die Streitkräfte Sowjetrusslands geführt wurden."

ron_early_wars_news.217.t:0 "Alawitenaufstand von 1919"
ron_early_wars_news.217.d:0 "Der alawitische Aufstand war eine Rebellion unter der Führung von Scheich Saleh al-Ali gegen die französischen Behörden der Verwaltung der besetzten feindlichen Gebiete und später im Rahmen des Französisch-Syrischen Krieges gegen das neu errichtete französische Mandatsgebiet Syrien, hauptsächlich im Küstengebirge Jabal Ansariyah. Der Aufstand war einer der ersten Akte bewaffneten Widerstands gegen die französischen Streitkräfte in Syrien, und sein Anführer, Scheich Saleh, erklärte seine Treue zur provisorischen arabischen Regierung in Damaskus. Er koordinierte die Aufstände mit den Anführern anderer antifranzösischer Aufstände im Land, darunter der Aufstand von Ibrahim Hananu im Umland von Aleppo und der Aufstand von Subhi Barakat in Antiochia."

ron_early_wars_news.218.t:0 "Irischer Unabhängigkeitskrieg"
ron_early_wars_news.218.d:0 "Der Irische Unabhängigkeitskrieg oder Anglo-Irische Krieg war ein Guerillakrieg, der von 1919 bis 1921 in Irland zwischen der Irish Republican Army (IRA, der Armee der Republik Irland) und britischen Streitkräften ausgetragen wurde: der britischen Armee, der quasi-militärischen Royal Irish Constabulary (RIC) und ihren paramilitärischen Truppen, den Auxiliaries und der Ulster Special Constabulary (USC). Es war eine Eskalation der irischen Revolutionszeit in einen Krieg."

ron_early_wars_news.219.t:0 "Kuwait-Najd-Krieg"
ron_early_wars_news.219.d:0 "Der Kuwait-Najd-Krieg brach nach dem Ersten Weltkrieg aus. Der Krieg fand statt, weil Ibn Saud von Najd Kuwait annektieren wollte. Der verschärfte Konflikt zwischen Kuwait und Najd führte zum Tod von Hunderten Kuwaitern. Der Krieg führte zwischen 1919 und 1920 zu sporadischen Grenzkonflikten."

ron_early_wars_news.220.t:0 "Griechisch-Türkischer Krieg"
ron_early_wars_news.220.d:0 "Der Griechenlandfeldzug wurde vor allem deshalb begonnen, weil die westlichen Alliierten, insbesondere der britische Premierminister David Lloyd George, Griechenland Gebietsgewinne auf Kosten des kurz zuvor im Ersten Weltkrieg besiegten Osmanischen Reiches versprochen hatten, da Anatolien vor der Eroberung des Gebiets durch die Osmanen zum antiken Griechenland und zum Byzantinischen Reich gehört hatte. Der bewaffnete Konflikt begann mit der Landung griechischer Truppen in Smyrna (dem heutigen Izmir) am 15. Mai 1919. Sie drangen ins Landesinnere vor und übernahmen die Kontrolle über den westlichen und nordwestlichen Teil Anatoliens, darunter die Städte Manisa, Balıkesir, Aydın, Kütahya, Bursa und Eskişehir. Ihr Vormarsch wurde 1921 in der Schlacht von Sakarya von türkischen Truppen aufgehalten. Die griechische Front brach mit dem türkischen Gegenangriff im August 1922 zusammen und der Krieg endete effektiv mit der Rückeroberung Smyrnas durch türkische Truppen und dem Großen Brand von Smyrna."

ron_early_wars_news.221.t:0 "Aufstände während des türkischen Unabhängigkeitskrieges"
ron_early_wars_news.221.d:0 "Während des türkischen Unabhängigkeitskrieges kam es zu zahlreichen Aufständen gegen die türkischen Revolutionäre."

ron_early_wars_news.222.t:0 "Französisch-Syrischer Krieg"
ron_early_wars_news.222.d:0 "Der Französisch-Syrische Krieg fand 1920 zwischen den haschemitischen Herrschern des neu gegründeten Arabischen Königreichs Syrien und Frankreich statt. In einer Reihe von Gefechten, die in der Schlacht von Maysalun gipfelten, besiegten französische Truppen die Streitkräfte des haschemitischen Monarchen König Faisal und seiner Anhänger und marschierten am 24. Juli 1920 in Damaskus ein. Am 25. Juli wurde in Syrien eine neue pro-französische Regierung unter Führung von Alaa ad-Din al-Darubi ausgerufen. Schließlich wurde Syrien unter dem französischen Mandatsgebiet Syrien und dem Libanon in mehrere Vasallenstaaten aufgeteilt. Die britische Regierung, besorgt um ihre Position im neuen Mandatsgebiet Irak, erklärte sich bereit, den flüchtigen Faisal zum neuen König des Irak zu erklären."

ron_early_wars_news.223.t:0 "Husino-Aufstand"
ron_early_wars_news.223.d:0 "Der Husino-Aufstand war ein kurzlebiger Streik der Bergarbeiter und ein bewaffneter Aufstand gegen die industrielle Sklaverei im neu gegründeten Königreich der Serben, Kroaten und Slowenen. 7.000 Bergleute aus Tuzla, Breza und Zenica in Zentralbosnien beteiligten sich am Streik im Dorf Husino in Tuzla. Als die lokale Regierung versuchte, die Bergleute zur Rückkehr an die Arbeit zu zwingen, leisteten sie mit Schusswaffen Widerstand, und der Aufstand wurde mit großer Gewalt niedergeschlagen. Sieben Arbeiter wurden getötet und vierhundert verhaftet. Der Aufstand wurde niedergeschlagen, doch die Erinnerung an ihn blieb als Teil des antiautoritären Erbes Tuzlas erhalten."

ron_early_wars_news.224.t:0 "Irakischer Aufstand von 1920"
ron_early_wars_news.224.d:0 "Der irakische Aufstand gegen die Briten, auch bekannt als Irakischer Aufstand von 1920 oder Große Irakische Revolution, begann im Sommer 1920 in Bagdad mit Massendemonstrationen der Iraker gegen die britische Besatzung des Irak, darunter auch Proteste verbitterter Offiziere der alten osmanischen Armee. Der Aufstand gewann an Dynamik, als er sich auf die überwiegend von schiitischen Stämmen bewohnten Gebiete am mittleren und unteren Euphrat ausweitete. Scheich Mehdi Al-Khalissi war ein prominenter schiitischer Anführer des Aufstands."

ron_early_wars_news.225.t:0 "Vlora-Krieg"
ron_early_wars_news.255.d:0 "Der Vlora-Krieg oder Krieg von 1920 war eine Reihe von Kämpfen zwischen italienischen Streitkräften, die in der albanischen Region Vlora stationiert waren, und albanischen Nationalisten, die in kleine Kämpfergruppen aufgeteilt waren. Der Krieg dauerte drei Monate bis zum Waffenstillstand. Er hatte großen Einfluss auf den Kampf Albaniens um die Sicherung seiner Gebiete, während auf der Pariser Friedenskonferenz die Grenzen und die Zukunft Albaniens diskutiert wurden. Der Vlora-Krieg gilt als Wendepunkt in der Erlangung der albanischen Unabhängigkeit."

ron_early_wars_news.226.t:0 "Bürgerkrieg in Jabal al-Gharbi"
ron_early_wars_news.226.d:0 "Der Bürgerkrieg von Jabal al-Gharbi in den Jahren 1920–22 war ein Konflikt, der sich in den Nafusa-Bergen und den umliegenden Gebieten im heutigen Libyen ereignete und zwischen lokalen Stammesführern ausgetragen wurde, die um politische Ämter in der Tripolitanischen Republik konkurrierten."

ron_early_wars_news.227.t:0 "Polnisch-Litauischer Krieg"
ron_early_wars_news.227.d:0 "Der Polnisch-Litauische Krieg war ein Konflikt zwischen dem gerade unabhängig gewordenen Litauen und Polen nach dem Ersten Weltkrieg. Der Konflikt wurde hauptsächlich in der Region Vilnius und Suwalki ausgetragen. Der Konflikt stand im Zusammenhang mit dem Polnisch-Sowjetischen Krieg und war Gegenstand internationaler Vermittlung auf der Botschafterkonferenz, dem späteren Völkerbund. Der Krieg wird von den beiden Seiten unterschiedlich gesehen: Litauische Historiker betrachten ihn als Teil der Litauischen Unabhängigkeitskriege, die von Frühjahr 1919 bis November 1920 dauerten, während polnische Historiker ihn als Teil des Polnisch-Sowjetischen Krieges betrachten, der nur von September bis Oktober 1920 stattfand."

ron_early_wars_news.228.t:0 "Kapp-Putsch"
ron_early_wars_news.228.d:0 "Der Kapp-Putsch, auch bekannt als Kapp-Lüttwitz-Putsch, benannt nach seinen Anführern Wolfgang Kapp und Walther von Lüttwitz, war ein Putschversuch in Berlin am 13. März 1920. Sein Ziel war es, die Deutsche Revolution von 1918–1919 rückgängig zu machen, die Weimarer Republik zu stürzen und an ihrer Stelle eine autokratische Regierung zu errichten. Der Putsch wurde von Teilen der Reichswehr sowie nationalistischen und monarchistischen Fraktionen unterstützt."

ron_early_wars_news.229.t:0 "Ruhraufstand"
ron_early_wars_news.229.d:0 "Der Ruhraufstand war ein linksgerichteter Arbeiteraufstand im Ruhrgebiet im März 1920. Der Aufstand fand ursprünglich statt, um den Aufruf zum Generalstreik zu unterstützen, den die sozialdemokratischen Mitglieder der deutschen Regierung, die Gewerkschaften und andere Parteien als Reaktion auf den rechtsgerichteten Kapp-Putsch vom 13. März 1920 veröffentlicht hatten."

ron_early_wars_news.230.t:0 "Schlesische Aufstände"
ron_early_wars_news.230.d:0 "Die Schlesischen Aufstände waren eine Serie von drei Aufständen von August 1919 bis Juli 1921 in Oberschlesien, das damals Teil der Weimarer Republik war. Polnische Separatisten, die das Gebiet der neu gegründeten Polnischen Republik zuordnen wollten, kämpften gegen deutsche Polizei- und paramilitärische Kräfte, die das Gebiet im nach dem Ersten Weltkrieg neu gegründeten deutschen Staat halten wollten. Nach dem Konflikt wurde das Gebiet zwischen den beiden Ländern aufgeteilt. Die Aufstände werden im heutigen Polen als Beispiel polnischen Nationalismus gewürdigt."

ron_early_wars_news.231.t:0 "Putschversuch in Georgien"
ron_early_wars_news.231.d:0 "Der georgische Putsch im Mai 1920 war ein erfolgloser Versuch der Bolschewiki, in der Demokratischen Republik Georgien die Macht zu übernehmen. Gestützt auf die im benachbarten Aserbaidschan operierende 11. Rote Armee Sowjetrusslands versuchten die Bolschewiki am 3. Mai, eine Militärschule und Regierungsgebäude in der georgischen Hauptstadt Tiflis einzunehmen. Die georgische Regierung unterdrückte die Unruhen in Tiflis und konzentrierte ihre Streitkräfte, um den Vormarsch der russischen Truppen an der aserbaidschanisch-georgischen Grenze erfolgreich zu blockieren. Der georgische Widerstand und ein unruhiger Krieg mit Polen überzeugten die rote Führung, ihre Pläne zur Sowjetisierung Georgiens aufzuschieben und Georgien im Moskauer Vertrag vom 7. Mai als unabhängige Nation anzuerkennen."

ron_early_wars_news.232.t:0 "Maiaufstand"
ron_early_wars_news.232.d:0 "Der Maiaufstand war ein Putschversuch der armenischen Bolschewiken, der am 10. Mai 1920 in Alexandropol (dem heutigen Gjumri) begann. Er wurde schließlich am 14. Mai von der armenischen Regierung niedergeschlagen und seine Anführer hingerichtet."

ron_early_wars_news.233.t:0 "Türkisch-Armenischer Krieg"
ron_early_wars_news.233.d:0 "Der Türkisch-Armenische Krieg, in der Türkei als Ostoperation oder Ostfront des Türkischen Unabhängigkeitskrieges bekannt, bezieht sich auf einen Konflikt im Herbst 1920 zwischen der Ersten Republik Armenien und den türkischen Nationalisten nach der Unterzeichnung des Vertrags von Sèvres. Nach der Unterzeichnung des Vertrags marschierte eine Armee der Türkischen Nationalbewegung unter Kâzım Karabekir in Armenien ein und besiegte es. Dabei eroberte sie auch Gebiete zurück, die das Osmanische Reich 1878 an das Russische Reich verloren hatte."

ron_early_wars_news.234.t:0 "Zhili-Anhui-Krieg"
ron_early_wars_news.234.d:0 "Der Zhili-Anhui-Krieg war ein Konflikt im Jahr 1920 in der Republik China zwischen den Zhili- und Anhui-Cliquen um die Kontrolle über die Beiyang-Regierung."

ron_early_wars_news.235.t:0 "Petsamo-Expeditionen"
ron_early_wars_news.235.d:0 "Die Petsamo-Expeditionen waren zwei Militärexpeditionen finnischer Zivilfreiwilliger im Mai 1918 und im April 1920, um Petsamo vom bolschewistischen Russland zu annektieren. Es war einer der vielen „Verwandtschaftskriege“, die das gerade unabhängig gewordene Finnland während des russischen Bürgerkriegs führte. Obwohl beide Expeditionen erfolglos blieben, wurde Petsamo im Vertrag von Tartu 1920 von Russland an Finnland übergeben."

ron_early_wars_news.236.t:0 "Guangdong-Guangxi-Krieg"
ron_early_wars_news.236.d:0 "Der Guangdong-Guangxi-Krieg oder der 1. und 2. Yue-Gui-Krieg ereigneten sich zwischen der Kuomintang und der alten Guangxi-Clique."

ron_early_wars_news.237.t:0 "Aufstand in Dagestan"
ron_early_wars_news.237.d:0 "Der Dagestan-Aufstand von 1920–1921 war ein Ereignis während des russischen Bürgerkriegs. Im Frühjahr 1920 kontrollierten bolschewistische Truppen den größten Teil des Kaukasus mit Ausnahme Georgiens. Der Aufstand, angeführt von der Naqshbandi-Bruderschaft, die zuvor Imam Schamil unterstützt hatte, begann im September 1920. Bis Ende des Jahres kontrollierten die Rebellen den größten Teil der dagestanischen Berge. Die Roten brachten Verstärkung und besiegten die Rebellen im März 1921, doch die Kämpfe dauerten bis Ende Mai an."

ron_early_wars_news.238.t:0 "Rif-Krieg"
ron_early_wars_news.238.d:0 "Der Rifkrieg war ein bewaffneter Konflikt zwischen der Kolonialmacht Spanien (später schloss sich Frankreich an) und den Berberstämmen des marokkanischen Rifgebirges, der von 1920 bis 1927 ausgetragen wurde. Unter der Führung von Abd el-Krim fügten die Berberstämme des Rif den spanischen Streitkräften zunächst mehrere Niederlagen zu, indem sie Guerillataktiken anwandten und europäische Waffen erbeuteten. Nach der französischen Militärintervention gegen Abd el-Krims Truppen und der Landung spanischer Truppen in Al Hoceima, die als erste amphibische Landung in der Geschichte mit Panzern und Flugzeugen gilt, ergab sich Abd el-Krim den Franzosen und wurde ins Exil geschickt."

ron_early_wars_news.239.t:0 "Waziristan-Kampagne"
ron_early_wars_news.239.d:0 "Der Waziristan-Feldzug war ein Straßenbau- und Militärfeldzug, der vom 21. Dezember 1921 bis zum 31. März 1924 von britischen und indischen Streitkräften in Waziristan (dem heutigen Pakistan) durchgeführt wurde. Diese Operationen waren Teil der neuen Vorwärtspolitik, die darauf abzielte, Stammesaufstände und Stammesüberfälle in besiedelte Gebiete durch die Stationierung regulärer Truppen in Waziristan zu reduzieren und schließlich zu unterbinden, um so schnell auf Waziri-Aufstände reagieren zu können. Die Rebellenstämme versuchten, die britischen Truppen zu bedrängen, konnten die britischen Straßenbaubemühungen jedoch nicht stoppen. Hugh Beattie lieferte in Kapitel 7 von „Empire and Tribe in the Afghan Frontier Region: Custom, Conflict and British Strategy in Waziristan until 1947“ einen detaillierten Bericht über den Konflikt."

ron_early_wars_news.240.t:0 "Antifaschistischer Aufstand in Albona"
ron_early_wars_news.240.d:0 "Die Republik Albona war eine kurzlebige, selbstverwaltete Republik, die am 2. März 1921 während eines Bergarbeiterstreiks von Bergarbeitern der istrischen Stadt Albona ausgerufen wurde. Sie entstand im Zuge des ersten antifaschistischen Aufstands der Welt."

ron_early_wars_news.241.t:0 "Invasion der Roten Armee in Georgien"
ron_early_wars_news.241.d:0 "Die Invasion Georgiens durch die Rote Armee war eine Militäraktion der russischen Roten Armee mit dem Ziel, die sozialdemokratische (menschewistische) Regierung der Demokratischen Republik Georgien (DRG) zu stürzen und ein bolschewistisches Regime im Land zu installieren. Der Konflikt war das Ergebnis der Expansionspolitik der Russen, die möglichst viele Gebiete des ehemaligen Russischen Reiches kontrollieren wollten."

ron_early_wars_news.242.t:0 "Kronstädter Aufstand"
ron_early_wars_news.242.d:0 "Der Kronstädter Aufstand oder die Kronstädter Meuterei war ein Aufstand der sowjetischen Matrosen, Soldaten und Zivilisten der Hafenstadt Kronstadt gegen die bolschewistische Regierung der Russischen SFSR. Es war der letzte große Aufstand gegen das bolschewistische Regime auf russischem Gebiet während des Russischen Bürgerkriegs, der das Land verwüstete. Der Aufstand begann am 1. März 1921 in der Marinefestung der Stadt auf der Insel Kotlin im Finnischen Meerbusen. Traditionell diente Kronstadt als Stützpunkt der russischen Ostseeflotte und als Verteidigungsanlage für die Zufahrten nach Petrograd, das 55 Kilometer von der Insel entfernt liegt. Sechzehn Tage lang erhoben sich die Rebellen gegen die Sowjetregierung, zu deren Konsolidierung sie beigetragen hatten."

ron_early_wars_news.243.t:0 "Februaraufstand"
ron_early_wars_news.243.d:0 "Der Februaraufstand war ein antibolschewistischer Aufstand der nationalistischen Armenischen Revolutionären Föderation, der am 13. Februar begann und am 2. April 1921 durch die Rückeroberung Eriwans durch bolschewistische Streitkräfte niedergeschlagen wurde."

ron_early_wars_news.244.t:0 "Coto-Krieg"
ron_early_wars_news.244.d:0 "Der Coto-Krieg war ein Konflikt zwischen Panama und Costa Rica, der zwischen dem 21. Februar und dem 5. März 1921 ausgetragen wurde. Der Kriegsausbruch ereignete sich, als eine Expeditionstruppe unter der Führung von Oberst Héctor Zúñiga Mora im Auftrag Costa Ricas die Stadt Pueblo Nuevo de Coto besetzte, einen Weiler am Ufer des gleichnamigen Flusses, der damals zum Bezirk Alanje in der panamaischen Provinz Chiriquí gehörte. Zúñiga rechtfertigte den Einfall damit, dass es zwischen Costa Rica und Panama keine klare Grenze gebe."

ron_early_wars_news.245.t:0 "Schlacht im Bergarmenien"
ron_early_wars_news.245.d:0 "Die Republik Bergarmenien (auch bekannt als Bergarmenien) war ein antibolschewistischer armenischer Staat, der in etwa dem Gebiet der heutigen armenischen Provinzen Wajoz Dsor und Sjunik sowie einigen Teilen der heutigen Republik Aserbaidschan (der Autonomen Republik Nachitschewan im Westen und der De-facto-Republik Arzach im Osten) entsprach. Sie wurde nach der Niederschlagung des Februaraufstands im April 1921 vom Militärkommandeur und armenischen politischen Denker Garegin Nschde und seinen Verbündeten mit Unterstützung lokaler Guerillakräfte gegründet. Sie wurde von keinem Land anerkannt, existierte aber bis Mitte Juli desselben Jahres."

ron_early_wars_news.246.t:0 "März-Aktion"
ron_early_wars_news.246.d:0 "Die Märzaktion war ein gescheiterter kommunistischer Aufstand im Jahr 1921, angeführt von der Kommunistischen Partei Deutschlands (KPD), der Kommunistischen Arbeiterpartei Deutschlands (KAPD) und anderen linksradikalen Organisationen. Sie fand in den Industriegebieten Halle, Leuna, Merseburg und Mansfeld statt. Der Aufstand endete mit einer Niederlage der Kommunisten und einer Schwächung des damaligen kommunistischen Einflusses in Deutschland."

ron_early_wars_news.247.t:0 "Mongolische Revolution"
ron_early_wars_news.247.d:0 "Die Mongolische Revolution von 1921 war ein militärisches und politisches Ereignis, bei dem mongolische Revolutionäre mit Unterstützung der sowjetischen Roten Armee die russischen Weißgardisten aus dem Land vertrieben und 1924 die Mongolische Volksrepublik gründeten. Obwohl nominell unabhängig, war die Mongolische Volksrepublik bis zur dritten Mongolischen Revolution im Januar 1990 ein Satellitenstaat der Sowjetunion. Die Revolution beendete auch die Besetzung der Mongolei durch die chinesische Beiyang-Regierung, die seit 1919 bestanden hatte."

ron_early_wars_news.248.t:0 "Versuch Karls IV., den Thron zurückzuerobern"
ron_early_wars_news.248.d:0 "Nachdem Miklós Horthy am 1. März 1920 zum Regenten von Ungarn gewählt worden war, unternahm Karl I. von Österreich, der in Ungarn als Karl IV. regierte, zwei erfolglose Versuche, den Thron zurückzuerobern. Seine Versuche werden auch als „Erster“ bzw. „Zweiter königlicher Staatsstreich“ bezeichnet."

ron_early_wars_news.249.t:0 "Aufstand in Westungarn"
ron_early_wars_news.249.d:0 "Gemäß dem Vertrag von Trianon fielen die westungarnische Stadt Sopron und ihre Umgebung an Österreich. Nach einem Aufstand in dieser Region im Jahr 1921 fand eine Volksabstimmung statt, bei der 65,8 % der Stimmen für den Anschluss an Ungarn stimmten. Diese Volksabstimmung wurde von den Großmächten angenommen, und der Übergang Soprons und der acht umliegenden Dörfer von Österreich an Ungarn war die einzige ernsthafte Gebietsrevision in den Jahren nach dem Vertrag von Trianon."

ron_early_wars_news.250.t:0 "Malabar-Aufstand"
ron_early_wars_news.250.d:0 "Der Malabar-Aufstand von 1921 war eine Reaktion auf die brutalen Taten der Kolonialmacht. Er begann als Teil der Kalifat-Bewegung. Die Bewegung, die ursprünglich von Mahatma Gandhi unterstützt wurde, geriet aufgrund der darauf folgenden kommunalen Unruhen unter heftige Kritik von nationalen Ikonen wie Dr. Ambedkar."

ron_early_wars_news.251.t:0 "Persischer Staatsstreich"
ron_early_wars_news.251.d:0 "Der persische Staatsstreich von 1921, im Iran als 3. Esfand-Staatsstreich von 1299 bekannt, bezieht sich auf mehrere wichtige Ereignisse in Persien im Jahr 1921, die schließlich 1925 zur Gründung der Pahlavi-Dynastie als Herrscherhaus des Landes führten."

ron_early_wars_news.252.t:0 "Eroberung von Ha&#39;il"
ron_early_wars_news.252.d:0 "Die Eroberung von Ha&#39;il, auch als Zweiter Saudi-Rashidi-Krieg bezeichnet, wurde von den saudischen Streitkräften, die britische Militärunterstützung erhielten, und ihren verbündeten Ikhwan-Stammesangehörigen im Emirat Jabal Shammar unter dem letzten Rashidi-Herrscher geführt. Am 2. November 1921 übergaben die letzten Herrscher der Al-Rashid-Dynastie Jabal Shammar den saudischen Streitkräften."

ron_early_wars_news.253.t:0 "Ostkarelischer Aufstand"
ron_early_wars_news.253.d:0 "Der Ostkarelische Aufstand und der sowjetisch-finnische Konflikt 1921–1922 waren der Versuch einer Gruppe ostkarelischer Separatisten, die Unabhängigkeit von der Russischen Sozialistischen Föderativen Sowjetrepublik zu erlangen. Ab dem 6. November 1921 wurden sie von zahlreichen finnischen Freiwilligen unterstützt. Der Konflikt endete am 21. März 1922 mit den Abkommen zwischen den Regierungen Sowjetrusslands und Finnlands über Maßnahmen zur Wahrung der Unverletzlichkeit der sowjetisch-finnischen Grenze."

ron_early_wars_news.254.t:0 "Rand-Rebellion"
ron_early_wars_news.254.d:0 "Die Rand-Rebellion war ein bewaffneter Aufstand weißer Bergarbeiter in der südafrikanischen Region Witwatersrand im März 1922. Jimmy Green, ein prominenter Politiker der Labour Party, war einer der Anführer des Streiks."

ron_early_wars_news.255.t:0 "Kura-Rebellion"
ron_early_wars_news.255.d:0 "Der Kura-Aufstand in Transjordanien im April 1921 wurde ausgelöst, als Scheich Kulaib al-Shraideh, ein selbsternannter Herrscher des Distrikts Kura, sich weigerte, seine Autonomie an den angrenzenden Distrikt Irbid abzutreten. Shraidehs Motive waren unter anderem persönlicher Hass auf Ali Khulki Al-Sharayri, einen von Emir Abdullahs Ministern und Oberhaupt des Distrikts Irbid. Shraideh forderte, dass Kura als eigenständige Einheit ausgewiesen, von Irbid getrennt und Amman gegenüber unabhängig rechenschaftspflichtig sei."

ron_early_wars_news.256.t:0 "Revolte in der Festung Copacabana"
ron_early_wars_news.256.d:0 "Der 18. Aufstand im Fort Copacabana ereignete sich am 5. Juli 1922 in der Stadt Rio de Janeiro, dem damaligen Bundesdistrikt Brasiliens. Es war der erste Aufstand der Tenentista-Bewegung im Kontext der Ersten Brasilianischen Republik."

ron_early_wars_news.257.t:0 "Ikhwan-Angriffe auf Transjordanien"
ron_early_wars_news.257.d:0 "Bei den Überfällen der Ichwan auf Transjordanien handelte es sich um eine Reihe von Plünderungen durch die Ichwan, irreguläre arabische Stammesangehörige aus Nadschd, in Transjordanien zwischen 1922 und 1924. Die wiederholten Einfälle der Wahhabiten aus Nadschd in die südlichen Teile seines Territoriums stellten die größte Bedrohung für Emir Abdullahs Position in Transjordanien dar. Der Emir war machtlos, diese Überfälle allein abzuwehren, daher unterhielten die Briten einen Militärstützpunkt mit einer kleinen Luftwaffe in Marka, in der Nähe von Amman. Die britischen Streitkräfte waren das Haupthindernis für die Ichwan und halfen Emir Abdullah, seine Herrschaft über Transjordanien zu sichern."

ron_early_wars_news.258.t:0 "Bondelswarts-Rebellion"
ron_early_wars_news.258.d:0 "Der Bondelswarts-Aufstand war ein umstrittener gewalttätiger Vorfall im südafrikanischen Mandatsgebiet Südwestafrika. 1917 hatte die südafrikanische Mandatsverwaltung eine Hundesteuer eingeführt und diese 1921 erhöht. Die Bondelswarts, eine Gruppe von Khoikhoi, die verschiedene Maßnahmen der neuen Regierung ablehnten, lehnten die Steuer ab. Sie schützten außerdem fünf Männer, gegen die Haftbefehle erlassen worden waren."

ron_early_wars_news.259.t:0 "Erster Zhili-Fengtian-Krieg"
ron_early_wars_news.259.d:0 "Der Erste Zhili-Fengtian-Krieg war ein Konflikt zwischen den Zhili- und Fengtian-Cliquen um die Kontrolle über Peking im Jahr 1922 in der Zeit der Kriegsherren der Republik China. Der Krieg führte zur Niederlage der Fengtian-Clique und zum Sturz ihres Anführers Zhang Zuolin aus der Koalitionsregierung Zhili-Fengtian in Peking. Wu Peifu galt als Stratege hinter Zhilis Sieg."

ron_early_wars_news.260.t:0 "Rampa-Aufstand von 1922"
ron_early_wars_news.260.d:0 "Der Rampa-Aufstand von 1922, auch bekannt als Manyam-Aufstand, war ein Stammesaufstand unter der Führung von Alluri Sitarama Raju in der Godavari Agency der Präsidentschaft Madras in Britisch-Indien. Er begann im August 1922 und dauerte bis zur Gefangennahme und Tötung von Raju im Mai 1924."

ron_early_wars_news.261.t:0 "Revolution vom 11. September 1922"
ron_early_wars_news.261.d:0 "Die Revolution vom 11. September 1922 war ein Aufstand der griechischen Armee und Marine gegen die Regierung in Athen. Die Revolution fand am 11. September 1922 statt."

ron_early_wars_news.262.t:0 "Irischer Bürgerkrieg"
ron_early_wars_news.262.d:0 "Der irische Bürgerkrieg war ein Konflikt, der auf den irischen Unabhängigkeitskrieg folgte und mit der Gründung des Irischen Freistaats einherging, einer vom Vereinigten Königreich unabhängigen, aber zum Britischen Empire gehörenden Einheit."

ron_early_wars_news.263.t:0 "Paraguayischer Bürgerkrieg"
ron_early_wars_news.263.d:0 "Der Paraguayische Bürgerkrieg (1922) fand vom 27. Mai 1922 bis zum 10. Juli 1923 innerhalb der Grenzen Paraguays statt. Er begann, als Anhänger des Kandidaten Adolfo Chirife versuchten, die von Präsident Eusebio Ayala abgesagten Präsidentschaftswahlen gewaltsam wiederherzustellen. Chirife vertrat die sogenannte konstitutionalistische oder Schaereristische Seite und unterstützte ideologisch den liberalen Politiker Eduardo Schaerer, während die Truppen unter Ayala als Loyalisten oder Gondristen bezeichnet wurden und dem ehemaligen Präsidenten Manuel Gondra ideologisch die Treue schworen. Der Konflikt endete, als die gondristischen Streitkräfte die Überreste der Schaereristischen Armee in Asunción besiegten."

ron_early_wars_news.264.t:0 "Aufstand von Scheich Khazal"
ron_early_wars_news.264.d:0 "Der Scheich-Khasal-Aufstand bezeichnet den arabischen Separatistenaufstand von Khazal al-Kabi, dem Scheich von Mohammerah, im Jahr 1924 im iranischen Chuzestan. Der Aufstand wurde von Reza Pahlavi schnell und effizient mit minimalen Verlusten niedergeschlagen. Er unterwarf die mit Scheich Khazal verbündeten Bachtiarenstämme und kapitulierte daraufhin."

ron_early_wars_news.265.t:0 "Zweiter Barzanji-Aufstand"
ron_early_wars_news.265.d:0 "Nach dem Vertrag von Sèvres, der einige Gebiete regelte, blieb Sulaimaniyya weiterhin unter der direkten Kontrolle des britischen Hochkommissars. Nach dem anschließenden Eindringen der türkischen „Özdemir“-Abteilung in das Gebiet versuchten die Briten, dem entgegenzuwirken, indem sie am 14. September 1922 den aus dem Exil zurückgekehrten Scheich Mahmud erneut zum Gouverneur ernannten."

ron_early_wars_news.266.t:0 "Tenente-Revolten"
ron_early_wars_news.266.d:0 "Der Tenentismus war eine politische Philosophie junger Armeeoffiziere, die maßgeblich zur brasilianischen Revolution von 1930 beitrugen."

ron_early_wars_news.267.t:0 "Alizai-Rebellion"
ron_early_wars_news.267.d:0 "Der Alizai-Aufstand von 1923 war ein Aufstand des Alizai-Stammes in der Region Zamindawar in der heutigen Provinz Helmand des Emirats Afghanistan. Die Ursachen lagen im Widerstand gegen die Reformen von Amanullah Khan, insbesondere in Bezug auf Wehrpflicht und Steuern. Der Aufstand dauerte sechs Monate, hauptsächlich weil keines der Wehrpflichtigenbataillone im Süden bereit war, gegen die Alizai zu kämpfen. Letztendlich wurde der Aufstand von Truppen aus Herat niedergeschlagen, die Rebellenführer hinrichteten und Gruppen von Zamindawaris nach Afghan-Turkestan deportierten."

ron_early_wars_news.268.t:0 "Korfu-Vorfall"
ron_early_wars_news.268.d:0 "Der Korfu-Zwischenfall war eine diplomatische und militärische Krise zwischen Griechenland und Italien im Jahr 1923. Auslöser war die Ermordung eines italienischen Generals, der eine Kommission zur Beilegung eines Grenzstreits zwischen Albanien und Griechenland leitete, zusammen mit Mitgliedern seines Stabes auf griechischem Gebiet. Benito Mussolini reagierte darauf mit einem strengen Ultimatum an Griechenland. Als dieses nicht vollständig angenommen wurde, entsandte er Truppen, um Korfu zu bombardieren und zu besetzen. Mussolini widersetzte sich dem Völkerbund und erklärte, Italien werde austreten, sollte dieser die Krise schlichten. Stattdessen einigte sich die Botschafterkonferenz schließlich auf ein Abkommen zugunsten Italiens. Dies war ein frühes Beispiel für die Schwäche des Völkerbundes im Umgang mit Großmächten."

ron_early_wars_news.269.t:0 "Juniaufstand"
ron_early_wars_news.269.d:0 "Der bulgarische Staatsstreich von 1923, auch bekannt als der Staatsstreich vom 9. Juni, war ein Staatsstreich in Bulgarien, der von den Streitkräften unter General Ivan Valkovs Militärunion am Vorabend des 9. Juni 1923 durchgeführt wurde. Zögerlich legitimiert durch ein Dekret von Zar Boris III. von Bulgarien, stürzte er die Regierung der Bulgarischen Nationalen Agrarunion unter Führung von Aleksandar Stamboliyski und ersetzte sie durch eine Regierung unter Aleksandar Tsankov."

ron_early_wars_news.270.t:0 "Putschversuch zwischen Leonardopoulos und Gargalidis"
ron_early_wars_news.270.d:0 "er Putschversuch von Leonardopoulos und Gargalidis war ein gescheiterter Militärputsch, der am 22. Oktober 1923 in Griechenland von pro-royalistischen Militäroffizieren unter den Generalleutnants Georgios Leonardopoulos und Panagiotis Gargalidis sowie Oberst Georgios Ziras durchgeführt wurde. Sein Scheitern diskreditierte die Monarchie und trug entscheidend zur Gründung der Zweiten Hellenischen Republik im März 1924 bei."

ron_early_wars_news.271.t:0 "Adwan-Rebellion"
ron_early_wars_news.271.d:0 "Der Adwan-Aufstand oder Balqa-Aufstand war der größte Aufstand gegen die neu gegründete transjordanische Regierung unter Mezhar Ruslan in ihren ersten Jahren."

ron_early_wars_news.272.t:0 "Posey-Krieg"
ron_early_wars_news.272.d:0 "Der Posey-Krieg war ein kleiner, kurzer Konflikt mit Indianern in Utah. Obwohl es sich um einen kleineren Konflikt handelte, führte er zu einer Massenflucht der Ute- und Paiute-Indianer aus ihrem Land bei Bluff, Utah, in die Wüsten des Navajo Mountain. Die Indianer wurden von einem Häuptling namens Posey angeführt, der mit seinem Volk in die Berge zog, um seinen Verfolgern zu entkommen. Anders als in früheren Konflikten spielten Posses eine wichtige Rolle, während die US-Armee nur eine untergeordnete Rolle spielte. Der Krieg endete nach einem Gefecht bei Comb Ridge. Posey wurde schwer verwundet und seine Gruppe in ein Kriegsgefangenenlager in Blanding gebracht. Als Poseys Tod von den Behörden bestätigt wurde, wurden die Gefangenen freigelassen und erhielten Landzuteilungen für Landwirtschaft und Viehzucht."

ron_early_wars_news.273.t:0 "Hamburger Aufstand"
ron_early_wars_news.273.d:0 "Der Hamburger Aufstand war ein Aufstand während der Weimarer Republik. Er wurde am 23. Oktober 1923 von einer der militantesten Sektionen der Hamburger Kommunistischen Partei (KPD), der KP Wasserkante, begonnen. Rebellen stürmten 24 Polizeiwachen, 17 in Hamburg und sieben in der Provinz Schleswig-Holstein in Preußen. Militärisch war der Versuch vergeblich und innerhalb von drei Tagen vorbei. Ohne Unterstützung aus dem Rest Deutschlands und der Sowjetunion zerfiel der kommunistische Aufstand. Rund 100 Menschen starben während des Aufstands. Die genauen Einzelheiten des Aufstands sowie die Einschätzung seiner Auswirkungen sind bis heute umstritten."

ron_early_wars_news.274.t:0 "Bierhallenputsch"
ron_early_wars_news.274.d:0 "The Beer Hall Putsch, also known as the Munich Putsch and, in German, as the Hitlerputsch, Hitler–Ludendorff-Putsch, Bürgerbräu-Putsch or Marsch auf die Feldherrnhalle ("March on the Field Marshals' Hall"), was a failed coup d'état by the Nazi Party (NSDAP) leader Adolf Hitler—along with Generalquartiermeister Erich Ludendorff and other Kampfbund leaders—to seize power in Munich, Bavaria, which took place on 8–9 November 1923. Approximately two thousand Nazis were marching to the Feldherrnhalle, in the city centre, when they were confronted by a police cordon, which resulted in the deaths of 16 Nazi party members and four police officers."

ron_early_wars_news.275.t:0 "Klaipėda-Aufstand"
ron_early_wars_news.275.d:0 "Der Klaipėda-Aufstand ereignete sich im Januar 1923 in der Region Klaipėda (Memelland). Die nördlich der Memel gelegene Region wurde durch den Vertrag von Versailles von Ostpreußen in Deutschland abgetrennt und unter Mandat des Völkerbundes gestellt. Bis zur Ausarbeitung einer dauerhafteren Lösung wurde sie unter provisorische französische Verwaltung gestellt. Litauen wollte sich mit der Region (Teil Kleinlitauens) vereinigen, da dort eine große litauischsprachige Minderheit preußischer Litauer lebte und der wichtige Hafen Klaipėda (Memel) – der einzige praktikable Zugang Litauens zur Ostsee – war. Da die Botschafterkonferenz dafür war, die Region als freie Stadt nach dem Vorbild der Freien Stadt Danzig zu belassen, organisierten und inszenierten die Litauer einen Aufstand."

ron_early_wars_news.276.t:0 "Septemberaufstand"
ron_early_wars_news.276.d:0 "Der Septemberaufstand war ein bewaffneter Aufstand der Bulgarischen Kommunistischen Partei (BKP) im September 1923 unter dem Druck der Komintern. Ziel war der Sturz der neuen Regierung von Alexander Zankow, die durch den Staatsstreich vom 9. Juni an die Macht gekommen war. Neben der kommunistischen Basis wurde der Aufstand auch von Agrariern und Anarchisten unterstützt. Ziel des Aufstands war die „Errichtung einer Arbeiter- und Bauernregierung“ in Bulgarien."

ron_early_wars_news.277.t:0 "Befriedung Libyens"
ron_early_wars_news.277.d:0 "Der Zweite Italo-Senussi-Krieg, auch als Befriedung Libyens bezeichnet, war ein langer, blutiger Konflikt, der während der italienischen Kolonialisierung Libyens zwischen italienischen Streitkräften (hauptsächlich bestehend aus Kolonialtruppen aus Libyen, Eritrea und Somalia) und einheimischen Rebellen des Senussi-Ordens ausgetragen wurde. Der Krieg dauerte von 1923 bis 1932, als der wichtigste Senussi-Anführer, Omar al-Mukhtar, gefangen genommen und hingerichtet wurde."

ron_early_wars_news.278.t:0 "Arabischer Separatismus in Chuzestan"
ron_early_wars_news.278.d:0 "Arabischer Separatismus in Chuzestan bezeichnet eine jahrzehntelange separatistische Bewegung im westlichen Teil des iranischen Chuzestan, die einen eigenen unabhängigen Staat für die arabische Bevölkerung anstrebt. Seit den 1920er Jahren führten Spannungen häufig zu Gewalt und Separatismusversuchen, darunter schwere Unruhen, ein Aufstand 1979, Unruhen 2005, terroristische Bombenanschläge 2005–2006, Proteste 2011 und der Angriff auf die Militärparade in Ahvaz 2018, die zu heftiger Kritik internationaler Menschenrechtsorganisationen am Iran führten. Der Iran bestreitet ethnische Diskriminierung oder Konflikte im Land."

ron_early_wars_news.279.t:0 "Paulista-Aufstand von 1924"
ron_early_wars_news.279.d:0 "Der Paulista-Aufstand von 1924, auch bekannt als die Vergessene Revolution, Isidoro-Revolution, Revolution von 1924 und der Zweite 5. Juli, war der zweite Aufstand der Pazifischen Revolution in Brasilien. Der bewaffnete Konflikt ereignete sich zwischen dem 5. und 28. Juli 1924 hauptsächlich in und um die Stadt São Paulo. Er basierte auf der Unzufriedenheit der unteren Offiziere mit der Wirtschaftskrise des Landes und der Machtkonzentration in den Händen von Politikern aus den Bundesstaaten São Paulo und Minas Gerais."

ron_early_wars_news.280.t:0 "Beytussebab-Rebellion"
ron_early_wars_news.280.d:0 "Der Beytussebab-Aufstand war der erste kurdische Aufstand in der modernen Republik Türkei. Angeführt wurde der Aufstand von Halid Beg Cibran vom Stamm der Cibran. Weitere prominente Kommandeure waren Ihsan Nuri und Yusuf Ziya Bey. Die Gründe für den Aufstand lagen im Widerstand gegen die Abschaffung des Osmanischen Kalifats im Jahr 1923, die repressive türkische Politik gegenüber der kurdischen Identität, das Verbot des öffentlichen Gebrauchs und Unterrichts der kurdischen Sprache sowie die Umsiedlung kurdischer Landbesitzer und Stammesführer in den Westen des Landes."

ron_early_wars_news.281.t:0 "Khost-Aufstand"
ron_early_wars_news.281.d:0 "Der Khost-Aufstand war ein Aufstand gegen die Verwestlichung und die Modernisierungsreformen des afghanischen Königs Amanullah Khan. Der Aufstand begann in der Südprovinz Afghanistans und dauerte von März 1924 bis Januar 1925. Kämpfer waren die Mangal-Paschtunen, denen sich später die Stämme der Sulaiman Khel, Ali Khel, Jaji, Jadran und Ahmadzai anschlossen. Nach dem Tod von über 14.000 Afghanen wurde der Aufstand im Januar 1925 endgültig niedergeschlagen."

ron_early_wars_news.282.t:0 "Saqqawistischer Aufstand in Afghanistan"
ron_early_wars_news.282.d:0 "Habibullāh Kalakāni begann 1924 mit dem Widerstand gegen die Regierung, nachdem er aus der afghanischen Armee desertiert war, die zu dieser Zeit gegen den Khost-Aufstand kämpfte. Kalakani begann ein Leben als Bandit, da er die unter den Kuhdamanis üblichen Berufe wie Weinbau und Brennholzverkauf für unter seiner Würde hielt, da er damit kaum Brot für seinen Tisch verdienen konnte. Stattdessen begann er, Karawanen und nahegelegene Dörfer auszurauben. Ihm schlossen sich Sayyid Husayn und Malik Muhsin sowie weitere Personen an – insgesamt 24. Drei Jahre lang lebten sie in Berghöhlen, wagten sich tagsüber hinaus, um zu rauben, und versteckten sich nachts, immer in Angst vor staatlichen Vergeltungsmaßnahmen. Einige Zeit später floh Kalakani nach Peshawar, wo er Tee verkaufte und als kleiner Dieb arbeitete."

ron_early_wars_news.283.t:0 "Augustaufstand"
ron_early_wars_news.283.d:0 "Der Augustaufstand war ein erfolgloser Aufstand gegen die Sowjetherrschaft in der Georgischen Sozialistischen Sowjetrepublik von Ende August bis Anfang September 1924."

ron_early_wars_news.284.t:0 "Junirevolution"
ron_early_wars_news.284.d:0 "Nolis Anhänger machten Zogus Mati-Clans für den Mord an Rustemi verantwortlich, die weiterhin Blutrache übten. Nach dem Streik wuchs die Unzufriedenheit, und im Juni 1924 eroberte ein von Bauern unterstützter Aufstand die Kontrolle über Tirana. Noli wurde Premierminister, und Zogu floh nach Jugoslawien."

ron_early_wars_news.285.t:0 "Estnischer Putschversuch"
ron_early_wars_news.285.d:0 "Der estnische Staatsstreich von 1924 war ein gescheiterter Putschversuch in Estland, der von Kommunisten (hauptsächlich aus der Sowjetunion infiltriert) am 1. Dezember 1924 durchgeführt wurde. Von den 279 aktiv teilnehmenden Kommunisten wurden 125 getötet, später wurden mehr als 500 Menschen verhaftet. Die Regierungstruppen verloren 26 Mann."

ron_early_wars_news.286.t:0 "Tatarbunarischer Aufstand"
ron_early_wars_news.286.d:0 "Der Tatarbunary-Aufstand war ein von den Bolschewiki inspirierter Bauernaufstand, der vom 15. bis 18. September 1924 in und um die Stadt Tatarbunary in Budjak (damals Teil Rumäniens, heute Teil der Oblast Odessa in der Ukraine) stattfand. Angeführt wurde er von einem pro-sowjetischen Revolutionskomitee, das die Gründung einer Moldauischen Sowjetrepublik und ein Ende der „rumänischen Besatzung“ forderte."

ron_early_wars_news.287.t:0 "Saudische Eroberung des Hedschas"
ron_early_wars_news.287.d:0 "Die saudische Eroberung des Hedschas oder der Zweite Saudi-Haschemitische Krieg, auch bekannt als Hedschas-Nedschd-Krieg, war ein Feldzug des saudischen Sultans Abdulaziz ibn Saud zur Übernahme des Haschemitischen Königreichs Hedschas in den Jahren 1924–25, der mit der Eroberung und Eingliederung des Hedschas in die saudische Herrschaft endete."

ron_early_wars_news.288.t:0 "Nestorianische Rebellion"
ron_early_wars_news.288.d:0 "Der nestorianische Aufstand war ein Aufstand der nestorianischen Gemeinde im Südosten der Türkei, der am 12. September 1924 begann und am 28. September desselben Jahres endete. Seine Wurzeln lagen im Konflikt zwischen der Türkei und Großbritannien um den Status von Mossul. Um in diesem Konflikt die Oberhand zu gewinnen, versprach Großbritannien den Nestorianern in der Türkei eine unabhängige nestorianische Heimat, was zu einem nestorianischen Aufstand führte. Nach dem Ende des Aufstands wurden 8.000 Nestorianer in das Mandatsgebiet Irak deportiert."

ron_early_wars_news.289.t:0 "Zweiter Zhili-Fengtian-Krieg"
ron_early_wars_news.289.d:0 "Der Zweite Zhili-Fengtian-Krieg von 1924 war ein Konflikt zwischen der von Japan unterstützten Fengtian-Clique in der Mandschurei und der liberaleren Zhili-Clique, die Peking kontrollierte und von anglo-amerikanischen Wirtschaftsinteressen unterstützt wurde. Der Krieg gilt als der bedeutendste in Chinas Warlord-Ära. Der Putsch des christlichen Kriegsherrn Feng Yuxiang in Peking führte zur endgültigen Niederlage der Zhili-Clique. Während des Krieges lieferten sich die beiden Cliquen im Oktober 1924 eine große Schlacht bei Tianjin sowie eine Reihe kleinerer Scharmützel und Belagerungen. Anschließend ernannten sowohl Feng als auch Zhang Zuolin, Herrscher der Fengtian-Clique, Duan Qirui zum Aushängeschild des Premierministers. In Süd- und Zentralchina waren liberalere Chinesen bestürzt über den Vormarsch der Fengtian und das daraus resultierende Machtvakuum. Es folgte eine Protestwelle. Der Krieg lenkte die Kriegsherren des Nordens außerdem von den von der Sowjetunion unterstützten Nationalisten ab, die in der südlichen Provinz Guangdong stationiert waren, und ermöglichte so ungehinderte Vorbereitungen für den Nordfeldzug (1926–1928), der China unter der Führung von Chiang Kai-shek vereinigte."

ron_early_wars_news.290.t:0 "Vorfall bei Petrich"
ron_early_wars_news.290.d:0 "Der Vorfall von Petritsch oder Krieg des streunenden Hundes war eine griechisch-bulgarische Krise im Jahr 1925, die zu einer kurzen Invasion Griechenlands in Bulgarien in der Nähe der Grenzstadt Petritsch führte, nachdem bulgarische Soldaten einen griechischen Hauptmann und einen Wachposten getötet hatten."

ron_early_wars_news.291.t:0 "Aufstand von Scheich Said"
ron_early_wars_news.291.d:0 "Der Scheich-Said-Aufstand war ein kurdischer Aufstand mit dem Ziel, das islamische Kalifat und Sultanat wiederzubeleben. Zur Rekrutierung nutzte er Elemente des kurdischen Nationalismus. Angeführt wurde er von Scheich Said und einer Gruppe ehemaliger osmanischer Soldaten, auch bekannt als die Hamidiye-Regimenter. Der Aufstand wurde von zwei kurdischen Untergruppen durchgeführt, den Zaza und den Kurmanji."

ron_early_wars_news.292.t:0 "Pinks Krieg "
ron_early_wars_news.292.d:0 "Pinks Krieg war eine Luft-Boden-Bombardierungs- und Tieffliegerkampagne der Royal Air Force unter dem Kommando von Wing Commander Richard Pink gegen die Bergfestungen der Mahsud-Stammesangehörigen in Süd-Wasiristan im März und April 1925. Es war die erste unabhängige Aktion der RAF und ist bis heute die einzige Kampagne, die nach einem RAF-Offizier benannt ist."

ron_early_wars_news.293.t:0 "Zaraniq-Aufstand"
ron_early_wars_news.293.d:0 "Der Zaraniq-Aufstand war ein bewaffneter Konflikt im unteren Tihamah zwischen dem jemenitischen Mutawakkiliten-Königreich und dem rebellischen Stamm der Zaraniq, der von 1925 bis 1929 andauerte. Er wurde als Revolte, Bürgerkrieg und mit verschiedenen anderen Begriffen bezeichnet. Er begann Ende 1925, und gegen Ende desselben Jahres gewannen die Zaraniq eine große Schlacht gegen die jemenitische Regierung. In den folgenden zwei Jahren stagnierten die groß angelegten Kämpfe; nur gelegentlich kam es zu Überfällen. Die Rebellen erhielten Waffenlieferungen aus Großbritannien über den Hafen von Ghulaifiqa."

ron_early_wars_news.294.t:0 "Großer syrischer Aufstand"
ron_early_wars_news.294.d:0 "Der Große Syrische Aufstand oder Große Drusenaufstand (1925–1927) war ein allgemeiner Aufstand im Mandatsgebiet Syrien und im Libanon mit dem Ziel, die Franzosen loszuwerden, die die Region seit dem Ende des Ersten Weltkriegs kontrolliert hatten. Der Aufstand wurde nicht zentral koordiniert; vielmehr wurde er von mehreren Fraktionen – darunter Sunniten, Drusen, Alawiten, Christen und Schiiten – mit dem gemeinsamen Ziel unternommen, die französische Herrschaft zu beenden."

ron_early_wars_news.295.t:0 "Anti-Fengtian-Krieg"
ron_early_wars_news.295.d:0 "Der Anti-Fengtian-Krieg war der letzte große Bürgerkrieg innerhalb der nördlichen Beiyang-Regierung der Republik China vor dem Nordfeldzug. Er dauerte von November 1925 bis April 1926 und wurde von der Guominjun gegen die Fengtian-Clique und ihre Verbündeten der Zhili-Clique geführt. Der Krieg endete mit der Niederlage der Guominjun und dem Ende der provisorischen Exekutivregierung."

ron_early_wars_news.296.t:0 "Urtatagai-Konflikt"
ron_early_wars_news.296.d:0 "Der Urtatagai-Konflikt war ein Konflikt zwischen der Sowjetunion und dem Emirat Afghanistan Mitte der 1920er Jahre um die Kontrolle der Insel Urtatagai, einer Insel im Fluss Amudarja, die seit 1900 von Afghanistan beansprucht wurde, obwohl sie bis 1920 unter russischer Kontrolle stand, als Reste der Kaiserlich Russischen Armee die Insel räumten, um die Weiße Bewegung im russischen Bürgerkrieg zu unterstützen. Die afghanische Armee hatte bereits 1913 in einem Grenzkonflikt erfolglos versucht, ihren Anspruch auf Urtatagai durchzusetzen, und 1920 konnten die afghanischen Streitkräfte die Insel schließlich ohne Widerstand einnehmen."

ron_early_wars_news.297.t:0 "Simko Shikak-Aufstand"
ron_early_wars_news.297.d:0 "Der Simko-Shikak-Aufstand von 1926 bezeichnet einen kurzzeitigen kurdischen Aufstand gegen die Pahlavi-Dynastie im Iran im Jahr 1926, angeführt vom kurdischen Häuptling Simko Shikak vom Stamm der Shikak."

ron_early_wars_news.298.t:0 "Nicaraguanischer Bürgerkrieg"
ron_early_wars_news.298.d:0 "Der nicaraguanische Bürgerkrieg von 1926–1927, auch Konstitutionalismuskrieg genannt, brach aus, nachdem ein Staatsstreich des Konservativen Emiliano Chamorro die demokratisch gewählte Regierung Nicaraguas stürzte, was zu einem Aufstand der Liberalen Partei führte. Der Konflikt endete nach einer militärischen und diplomatischen Intervention der USA, die zum Pakt von Espino Negro führte, der den Frieden von Tipitapa einleitete. Obwohl der Bürgerkrieg zu Ende ging, weigerte sich ein liberaler General, Augusto César Sandino, seine Waffen niederzulegen und führte bis 1933 den Sandino-Aufstand gegen die nicaraguanische Regierung und das US Marine Corps."

ron_early_wars_news.299.t:0 "Nordexpedition"
ron_early_wars_news.299.d:0 "Der Nordfeldzug war ein Feldzug der Nationalen Revolutionsarmee (NRA) der Kuomintang (KMT), auch bekannt als „Nationalistische Partei Chinas“, gegen die Beiyang-Regierung und andere regionale Kriegsherren im Jahr 1926. Ziel des Feldzugs war die Wiedervereinigung Chinas, das nach der Revolution von 1911 zersplittert war. Der Feldzug wurde von Generalissimus Chiang Kai-shek angeführt und verlief in zwei Phasen. Die erste Phase endete 1927 mit einer politischen Spaltung zwischen zwei Fraktionen der KMT: der rechtsgerichteten Nanjing-Fraktion unter Chiang Kai-shek und der linksgerichteten Wuhan-Fraktion unter Wang Jingwei."

ron_early_wars_news.300.t:0 "Cristero-Krieg"
ron_early_wars_news.300.d:0 "Der Cristero-Krieg, auch bekannt als Cristero-Rebellion oder La Cristiada, war ein weit verbreiteter Kampf in Zentral- und Westmexiko als Reaktion auf die Einführung säkularistischer und antiklerikaler Artikel der mexikanischen Verfassung von 1917, die von Gegnern als antikatholische Maßnahmen zur Durchsetzung des Staatsatheismus wahrgenommen wurden. Der Aufstand wurde als Reaktion auf ein Dekret des mexikanischen Präsidenten Plutarco Elías Calles zur Durchsetzung der Artikel 3, 5, 24, 27 und 130 der Verfassung angezettelt, ein Schritt, der als Calles-Gesetz bekannt ist. Calles versuchte, die Macht der katholischen Kirche und aller mit ihr verbundenen Organisationen zu beseitigen und populäre religiöse Feiern in lokalen Gemeinden zu unterdrücken."

ron_early_wars_news.301.t:0 "Kommunistischer Aufstand in Indonesien"
ron_early_wars_news.301.d:0 "In einer Plenarsitzung im Mai 1925 befahl das Exekutivkomitee der Komintern den indonesischen Kommunisten, eine antiimperialistische Koalition mit nichtkommunistischen, nationalistischen Organisationen zu bilden. Extremistische Elemente unter der Führung von Alimin und Musso riefen zu einer Revolution auf, um die niederländische Kolonialregierung zu stürzen. Auf einer Konferenz in Prambanan, Zentraljava, beschlossen kommunistisch kontrollierte Gewerkschaften, dass die Revolution mit einem Streik der Eisenbahnarbeiter beginnen sollte, der dann einen Generalstreik auslösen sollte. Danach sollte die PKI die Kolonialregierung ersetzen."

ron_early_wars_news.302.t:0 "Ararat-Aufstand"
ron_early_wars_news.302.d:0 "Der Ararat-Aufstand, auch bekannt als Ağrı-Aufstand, war ein Aufstand der Kurden der Provinz Ağrı im türkischen Kurdistan im Jahr 1930 gegen die türkische Regierung. Der Anführer der Guerillakräfte während des Aufstands war Ihsan Nuri vom Stamm der Jibran."

ron_early_wars_news.303.t:0 "Ikhwan-Aufstand"
ron_early_wars_news.303.d:0 "Der Ichwan-Aufstand begann 1927, als die Stammesangehörigen der Otaibah, Mutayr und Adschman gegen die Autorität Ibn Sauds rebellierten und grenzüberschreitende Überfälle in Teile Transjordaniens, des Mandatsgebiets Irak und des Emirats Kuwait unternahmen. Das Verhältnis zwischen dem Haus Saud und den Ichwan eskalierte im Dezember 1928 zu einer offenen blutigen Fehde."

ron_early_wars_news.304.t:0 "Ikhwan-Überfall auf Busayya"
ron_early_wars_news.304.d:0 "Der Angriff der Ikhwan auf Busayya im Irak ereignete sich am 5. November 1927. Teile der Ikhwan, hauptsächlich der Mutair-Stamm unter al-Dawish, überfielen den Südirak und stießen bei Busayya mit irakischen Truppen zusammen. Dabei kamen auf beiden Seiten etwa 20 Menschen ums Leben. Dieser Angriff wurde später als Beginn des Ikhwan-Aufstands bekannt."

ron_early_wars_news.305.t:0 "Chinesischer Bürgerkrieg"
ron_early_wars_news.305.d:0 "Der Chinesische Bürgerkrieg war ein Bürgerkrieg in China zwischen der von der Kuomintang (KMT) geführten Regierung der Republik China (ROC) und der Kommunistischen Partei Chinas (KPCh), der mit Unterbrechungen zwischen 1927 und 1949 andauerte. Der Krieg lässt sich im Allgemeinen in zwei Phasen mit einer Unterbrechung unterteilen: Von August 1927 bis 1937 zerbrach die Allianz aus KMT und KPCh während des Nordfeldzugs und die Nationalisten kontrollierten den größten Teil Chinas. Von 1937 bis 1945 wurden die Feindseligkeiten ausgesetzt und die Zweite Einheitsfront kämpfte gegen die japanische Invasion in China, letztendlich mit Unterstützung der Alliierten des Zweiten Weltkriegs. Mit der Niederlage Japans brach der Bürgerkrieg erneut aus und die KPCh gewann in der letzten Phase des Krieges von 1945 bis 1949 die Oberhand, die allgemein als Chinesische Kommunistische Revolution bezeichnet wird."

ron_early_wars_news.306.t:0 "Haji Abdul Rahman Limbong"
ron_early_wars_news.306.d:0 "Haji Abdul Rahman bin Haji Abdul Hamid (1868–1929) war ein Ulema, bekannt als Haji Abdul Rahman Limbong, weil er Limbong, Kemaman, besuchte, um den Islam zu lehren und mit dem Handel zu beginnen. Von 1922 bis 1928 war er ein Widerstandsführer, der sich den von den Briten eingeführten Gesetzen und Änderungen widersetzte."

ron_early_wars_news.307.t:0 "Schlacht von Al-Regeai"
ron_early_wars_news.307.d:0 "1928 fand die Schlacht von Al-Regai statt, die als letzte militärische Schlacht in der frühen Geschichte Kuwaits gilt. Sie ereignete sich im Januar während der Herrschaft Seiner Hoheit des 10. Herrschers von Kuwait, Scheich Ahmad Al-Jaber Al-Sabah. In dieser Schlacht kamen erstmals Fahrzeuge in der kuwaitischen Kriegsführung zum Einsatz. Auslöser der Schlacht war ein Überfall der Ikhwan-Gruppe auf mehrere Kuwaiter, die in einem Gebiet namens „Umm Al-Ruweisat“ im Nordwesten von Al Jahra Landwirtschaft betrieben. Die Ikhwan-Truppe, bestehend aus etwa 500 Reitern, besetzte ihre Höfe."

ron_early_wars_news.308.t:0 "Afghanischer Bürgerkrieg"
ron_early_wars_news.308.d:0 "Der afghanische Bürgerkrieg dauerte vom 14. November 1928 bis zum 13. Oktober 1929. Die rebellierenden und anschließend regierenden Saqqawisten unter Habibullāh Kalakāni kämpften gegen verschiedene gegnerische Stämme und rivalisierende Monarchen im Königreich Afghanistan, unter denen Mohammed Nādir Khān schließlich eine überragende Rolle erlangte. Trotz früher Erfolge wie der Einnahme von Kabul und der Niederlage von Amanullah Khan am 17. Januar 1929 oder der Einnahme von Kandahar am 3. Juni wurden die Saqqawisten schließlich am 13. Oktober 1929 von anti-saqqawistischen Kräften unter der Führung von Nadir abgesetzt, was zu Nadirs Aufstieg zum König von Afghanistan führte, der bis zu seiner Ermordung am 3. November 1933 regierte."

ron_early_wars_news.309.t:0 "Kongo-Wara-Rebellion"
ron_early_wars_news.309.d:0 "Der Kongo-Wara-Aufstand, auch bekannt als der Krieg des Hackengriffs, war ein ländlicher, antikolonialer Aufstand in den ehemaligen Kolonien Französisch-Äquatorialafrika und Französisch-Kamerun, der als Folge der Rekrutierung der einheimischen Bevölkerung für den Eisenbahnbau und die Kautschukgewinnung begann."

ron_early_wars_news.310.t:0 "Escobar-Rebellion"
ron_early_wars_news.310.d:0 "Der Escobar-Aufstand war ein Konflikt im Norden Mexikos im Jahr 1929 während des Maximato zwischen den Regierungstruppen von Präsident Emilio Portes Gil und den Rebellen unter dem Kommando von General José Gonzalo Escobar. Nach anfänglichen Erfolgen bei der Einnahme mehrerer wichtiger Städte in der nördlichen Hälfte des Landes wurden die Escobar-Rebellen in einer großen Schlacht bei Jiménez, Chihuahua, entscheidend besiegt und schließlich von den vorrückenden Regierungstruppen unter dem Kommando von General Calles zurückgedrängt."

ron_early_wars_news.311.t:0 "Basmachi-Bewegung"
ron_early_wars_news.311.d:0 "Die Basmachi-Bewegung war eine dezentralisierte Bewegung, die einen langwierigen Aufstand der muslimischen Völker Zentralasiens gegen die Herrschaft des russischen Zarenreichs und der Sowjetunion unternahm. Die Wurzeln der Bewegung liegen in der Gewalt gegen die Wehrpflicht von 1916, die ausbrach, als das Russische Reich im Ersten Weltkrieg begann, Muslime zum Militärdienst einzuziehen."

ron_early_wars_news.312.t:0 "Chiang-Gui-Krieg"
ron_early_wars_news.312.d:0 "Der Chiang-Gui-Krieg war ein militärischer Konflikt zwischen der nationalistischen Regierung von Chiang Kai-shek und der Kriegsherrenarmee von Guangxi, der von März bis Juni 1929 dauerte. Ein späterer Konflikt, der 2. Chiang-Gui-Krieg, ereignete sich zwischen den beiden verfeindeten Fraktionen im November und Dezember desselben Jahres."

ron_early_wars_news.313.t:0 "Afghanistanfeldzug der Roten Armee"
ron_early_wars_news.313.d:0 "Der Einsatz der Roten Armee in Afghanistan im Jahr 1929 war eine Sonderoperation zur Unterstützung des gestürzten Königs von Afghanistan, Amanullah Khan, gegen die Saqqawisten und Basmachi."

ron_early_wars_news.314.t:0 "Chinesisch-sowjetischer Konflikt"
ron_early_wars_news.314.d:0 "Der chinesisch-sowjetische Konflikt von 1929 war ein bewaffneter Konflikt zwischen der Union der Sozialistischen Sowjetrepubliken und dem chinesischen Kriegsherrn Zhang Xueliang von der Republik China um die Chinesische Ostbahn (auch bekannt als CER)."

ron_early_wars_news.315.t:0 "Anti-Saqqawistische Kampagnen in Kuhdaman und Herat"
ron_early_wars_news.315.d:0 "Während des afghanischen Bürgerkriegs kam es zu Vergewaltigungen und Plünderungen unter den Truppen der Saqqawisten. Ein solcher Vorfall ereignete sich am 28. Juni 1929, als Saqqawisten die Hazara-Siedlung Qalah-i Karim angriffen, alles Bewegliche plünderten und Vieh vertrieben."

ron_early_wars_news.316.t:0 "Frauenkrieg"
ron_early_wars_news.316.d:0 "Der Frauenkrieg oder die Aba-Frauenunruhen waren eine Zeit der Unruhen im kolonialen Nigeria im November 1929. Die Proteste brachen aus, als Tausende Igbo-Frauen aus dem Distrikt Bende, Umuahia und anderen Orten im Osten Nigerias in die Stadt Oloko reisten, um gegen die Warrant Chiefs zu protestieren, denen sie vorwarfen, die Rolle der Frauen in der Regierung einzuschränken. Die Aba-Frauenunruhen von 1929, wie sie in britischen Aufzeichnungen genannt wurden, gelten eher als ein strategisch geführter Aufstand, der von Frauen organisiert wurde, um soziale, politische und wirtschaftliche Missstände zu beseitigen. An dem Protest nahmen Frauen aus sechs ethnischen Gruppen teil (Ibibio, Andoni, Orgoni, Bonny, Opobo und Igbo)."

ron_early_wars_news.317.t:0 "Persische Stammesaufstände von 1929"
ron_early_wars_news.317.d:0 "Die persischen Stammesaufstände von 1929 waren eine Reihe von Rebellionen der Qashqai, Khamseh, Buyir Ahmadi und Bachtiari im erhabenen Staat Persien. Sie begannen im Frühjahr 1929, als sich die Qashqai unter der Führung von Ali Salar Hishmat Qashqai gegen die persische Regierung erhoben. Die Rebellen operierten hauptsächlich vom Dorf Siyuk südlich von Shiraz aus. Im Laufe des Jahres kam es zu weiteren Rebellionen der Khamseh und Buyir Ahmadi im Osten bzw. Norden der Provinz Fars."

ron_early_wars_news.318.t:0 "Shinwari-Aufstand"
ron_early_wars_news.318.d:0 "Der Shinwari-Aufstand war ein Aufstand der Shinwari, der im Februar 1930 im Königreich Afghanistan stattfand. Die Shinwari versuchten, Mohammed Nadir Schah abzusetzen und Amanullah Khan als König von Afghanistan wieder einzusetzen. Aufgrund mangelnder Unterstützung durch die Shinwari-Ältesten (die von Nadir bestochen worden waren) wurde der Aufstand umgehend niedergeschlagen."

ron_early_wars_news.319.t:0 "Afridi Redshirt Rebellion"
ron_early_wars_news.319.d:0 "Der Aufstand der Afridi-Rothemden war eine Militärkampagne der britischen und indischen Armee gegen Afridi-Stammesangehörige in der Nordwest-Grenzregion des Indischen Reiches, heute Pakistan, in den Jahren 1930–1931."

ron_early_wars_news.320.t:0 "Kuhistan-Aufstand"
ron_early_wars_news.320.d:0 "Der Kuhistan-Aufstand war ein Aufstand im heutigen Distrikt Kohistan in Kapisa, der 1930 im Königreich Afghanistan stattfand. Er begann im Februar 1930, als Rebellen, die Amanullah Khan als König von Afghanistan wieder einsetzen wollten, in einen offenen Aufstand gegen Mohammed Nadir Schah ausbrachen. Nach dem Tod vieler Aufständischer wurde der Aufstand Mitte April 1930 niedergeschlagen."

ron_early_wars_news.321.t:0 "Aufstand der Nghệ-Tĩnh-Sowjets"
ron_early_wars_news.321.d:0 "Die Demonstrationen brachten die allgemeine Wut über die französische Kolonialpolitik zum Ausdruck, wie hohe Steuern und staatliche Monopole auf bestimmte Güter, sowie über die Korruption und die wahrgenommene Ungerechtigkeit lokaler Honoratioren und Mandarine. Die Demonstranten waren zwar gewalttätig, aber mit kaum mehr als einfachen landwirtschaftlichen Waffen bewaffnet und wurden von der überwältigenden französischen Militärmacht brutal niedergeschlagen. Der Aufstand ebbte in der zweiten Jahreshälfte 1931 aufgrund von Hungersnot und Unterdrückung ab."

ron_early_wars_news.322.t:0 "Kuhistan-Aufstand"
ron_early_wars_news.322.d:0 "Der von Purdil Khan angeführte Aufstand wurde innerhalb einer Woche niedergeschlagen. Nach der Niederschlagung des Aufstands wurden 3.000 Rebellen gefangen genommen und 11 der Rädelsführer hingerichtet."

ron_early_wars_news.323.t:0 "Meuterei von Yên Bái"
ron_early_wars_news.323.d:0 "Der Yên-Bái-Aufstand war ein Aufstand vietnamesischer Soldaten der französischen Kolonialarmee am 10. Februar 1930 in Zusammenarbeit mit zivilen Unterstützern, die Mitglieder der Việt Nam Quốc Dân Đảng (VNQDĐ, der Vietnamesischen Nationalistischen Partei) waren."

ron_early_wars_news.324.t:0 "Central Plains-Krieg"
ron_early_wars_news.324.d:0 "Der Zentralebenenkrieg war eine Reihe militärischer Feldzüge in den Jahren 1929 und 1930, die einen chinesischen Bürgerkrieg zwischen der nationalistischen Kuomintang-Regierung in Nanjing unter Führung von Generalissimus Chiang Kai-shek und mehreren regionalen Militärkommandanten und Kriegsherren darstellten, die ehemalige Verbündete Chiangs waren."

ron_early_wars_news.325.t:0 "Überfall auf die Waffenkammer von Chittagong"
ron_early_wars_news.325.d:0 "Der Überfall auf das Waffenlager von Chittagong, auch als Chittagong-Aufstand bekannt, war ein Versuch bewaffneter indischer Unabhängigkeitskämpfer unter der Führung von Surya Sen am 18. April 1930, das Waffenlager der Polizei und Hilfskräfte des Waffenlagers von Chittagong in der Präsidentschaft Bengalen in Britisch-Indien (heute Bangladesch) zu überfallen."

ron_early_wars_news.326.t:0 "Gugsa Wales Rebellion"
ron_early_wars_news.326.d:0 "Der Aufstand von Gugsa Wale im Jahr 1930 war ein Aufstand, der von Ras Gugsa Wale und Anhängern von Kaiserin Zewditu ausgelöst wurde, um sie vom Kronprinzen und Thronfolger Negus Tafari Makonnen zu befreien. Nachdem Tafari verschwunden war, wäre Zewditu der einzige Anwärter auf die Nachfolge als Herrscher des Äthiopischen Reiches (Mangista Ityop&#39;p&#39;ya). Als Ehemann von Kaiserin Zewditu erwartete Gugsa Wale, Kaiser zu werden."

ron_early_wars_news.327.t:0 "Nghệ-Tĩnh-Sowjets"
ron_early_wars_news.327.d:0 "Der Aufstand der Nghệ-Tĩnh-Sowjets war eine Reihe von Aufständen, Streiks und Demonstrationen vietnamesischer Bauern, Arbeiter und Intellektueller in den Jahren 1930 und 1931 gegen das französische Kolonialregime, die Mandarine und die Grundbesitzer."

ron_early_wars_news.328.t:0 "Saya San Rebellion"
ron_early_wars_news.328.d:0 "Saya San (auch Hsaya geschrieben; 24. Oktober 1876 – 28. November 1931) war Arzt, ehemaliger Mönch und Anführer des Saya-San-Aufstands von 1930–1932 in Britisch-Burma. Die als „Saya-San-Aufstand“ bezeichnete Serie von Aufständen gilt als eine der prägendsten antikolonialen Bewegungen Südostasiens. Aufgrund ihres nationalen und historischen Charakters halten Diskussionen über Saya San und den mit ihm verbundenen Aufstand bis heute an, insbesondere in akademischen Kreisen."

ron_early_wars_news.329.t:0 "Intervention der Roten Armee in Afghanistan"
ron_early_wars_news.329.d:0 "Die Intervention der Roten Armee in Afghanistan im Jahr 1930 war eine Sonderoperation des Kommandos des zentralasiatischen Militärbezirks mit dem Ziel, die Wirtschaftsstützpunkte der Basmachi zu zerstören und ihre Arbeitskräfte in Afghanistan auszulöschen. Die Operation wurde von Teilen der kombinierten Kavalleriebrigade unter dem Kommando des Brigadekommandeurs Jakow Arkadijewitsch Melkumow durchgeführt."

ron_early_wars_news.330.t:0 "Chinesisch-Tibetischer Krieg"
ron_early_wars_news.330.d:0 "Der Chinesisch-Tibetische Krieg begann 1930, als die tibetische Armee unter dem 13. Dalai Lama aufgrund eines Streits um Klöster in Xikang und Yushu in Qinghai einmarschierte. Ma Bufang, der Kriegsherr der Ma-Clique, schickte heimlich ein Telegramm an den Sichuan-Kriegsherrn Liu Wenhui und den Führer der Republik China, Chiang Kai-shek, und schlug einen gemeinsamen Angriff auf die tibetischen Streitkräfte vor. Ihre Armeen überwältigten und besiegten die tibetische Armee rasch."

ron_early_wars_news.331.t:0 "Brasilianische Revolution von 1930"
ron_early_wars_news.331.d:0 "Die Revolution von 1930 war eine bewaffnete Bewegung in Brasilien unter Führung der Bundesstaaten Minas Gerais, Paraíba und Rio Grande do Sul, die in einem Putsch gipfelte. Die Revolution stürzte Präsident Washington Luís am 24. Oktober 1930, verhinderte die Amtseinführung des designierten Präsidenten Júlio Prestes und beendete die Alte Republik."

ron_early_wars_news.332.t:0 "Musha-Vorfall"
ron_early_wars_news.332.d:0 "Der Musha-Zwischenfall, auch bekannt als Wushe-Aufstand und unter vielen ähnlichen Namen, begann im Oktober 1930 und war der letzte große Aufstand gegen die japanischen Kolonialmächte im japanischen Taiwan. Als Reaktion auf die langjährige Unterdrückung durch die japanischen Behörden griff die indigene Gruppe der Seediq in Musha (Wushe) das Dorf an und tötete über 130 Japaner. Die Japaner reagierten mit einem unerbittlichen Gegenangriff und töteten als Vergeltung über 600 Seediq. Der Umgang der japanischen Behörden mit dem Vorfall wurde scharf kritisiert, was zu zahlreichen Änderungen in der Politik gegenüber den Aborigines führte."

ron_early_wars_news.333.t:0 "Grenzscharmützel zwischen Saudi-Arabien und Jemen"
ron_early_wars_news.333.d:0 "Anfang des Jahres 1931 war das vom Haus Saud regierte Königreich Hedschas und Nedschd in einen schlecht dokumentierten Grenzkampf mit dem mutawakkilitischen Königreich Jemen verwickelt."

ron_early_wars_news.334.t:0 "März-Vorfall"
ron_early_wars_news.334.d:0 "Der März-Zwischenfall war ein fehlgeschlagener Putschversuch in Japan im März 1931, der von der radikalen Geheimgesellschaft Sakurakai innerhalb der Kaiserlich Japanischen Armee mit Unterstützung ziviler ultranationalistischer Gruppen durchgeführt wurde."

ron_early_wars_news.335.t:0 "Vorfall im Oktober"
ron_early_wars_news.335.d:0 "Bei dem Oktober-Vorfall handelte es sich um einen gescheiterten Putschversuch in Japan am 21. Oktober 1931, der von der Geheimgesellschaft Sakurakai innerhalb der Kaiserlich Japanischen Armee mit Unterstützung ziviler ultranationalistischer Gruppen durchgeführt wurde."

ron_early_wars_news.336.t:0 "Zypern-Aufstand"
ron_early_wars_news.336.d:0 "Der Zypernaufstand von 1931 (Oktoberereignisse) war ein antikolonialer Aufstand, der zwischen dem 21. Oktober und Anfang November 1931 auf Zypern, damals eine britische Kronkolonie, stattfand. Angeführt wurde der Aufstand von griechisch-zypriotischen Nationalisten, die die Enosis (Union) der Insel mit Griechenland befürworteten. Die Niederlage der Rebellen führte zu einer Zeit repressiver britischer Herrschaft, bekannt als „Palmerokratie“ (Παλμεροκρατία), die bis zum Beginn des Zweiten Weltkriegs andauerte."

ron_early_wars_news.337.t:0 "Der Aufstand von Jafar Sultan bezeichnet einen kurdischen Stammesaufstand im Pahlavi-Iran, der 1931 ausbrach und einer der ersten stammesnationalistischen kurdischen Aufstände gegen die zentraliranische Herrschaft während der Frühphase des kurdischen Separatismus im Iran war."
ron_early_wars_news.337.d:0 "Der Jafar-Sultan-Aufstand"

ron_early_wars_news.338.t:0 "Aufstand in Norte Grande"
ron_early_wars_news.338.d:0 "Der Aufstand von Norte Grande war ein gewalttätiger und letztlich erfolgloser Putschversuch gegen die Regierung des chilenischen Präsidenten Juan Esteban Montero."

ron_early_wars_news.339.t:0 "Meuterei der chilenischen Marine"
ron_early_wars_news.339.d:0 "Die chilenische Marinemeuterei von 1931 war ein gewaltsamer Aufstand von Mannschaften der chilenischen Marine gegen die Regierung von Vizepräsident Manuel Trucco."

ron_early_wars_news.340.t:0 "Najran-Konflikt"
ron_early_wars_news.340.d:0 "Der Nadschran-Konflikt war ein schlecht dokumentierter Konflikt um Nadschran in den 1930er Jahren, der zwischen dem Mutawakkiliten-Königreich Jemen und dem Königreich Hedschas und Nedschd ausgetragen wurde."

ron_early_wars_news.341.t:0 "Japanische Invasion der Mandschurei"
ron_early_wars_news.341.d:0 "Die japanische Invasion in der Mandschurei begann am 18. September 1931, als die Kwantung-Armee des Japanischen Kaiserreichs unmittelbar nach dem Mukden-Zwischenfall in die Mandschurei einmarschierte. Nach Kriegsende im Februar 1932 gründeten die Japaner den Marionettenstaat Mandschukuo. Ihre Besetzung dauerte bis zum Erfolg der Mandschurei-Operation der Sowjetunion und der Mongolei Mitte August 1945."

ron_early_wars_news.342.t:0 "Ahmed-Barzani-Aufstand"
ron_early_wars_news.342.d:0 "Der Ahmed-Barzani-Aufstand war der erste der großen Barzani-Aufstände und der dritte kurdische nationalistische Aufstand im modernen Irak. Der Aufstand begann 1931, nachdem es Ahmed Barzani, einem der prominentesten kurdischen Führer Südkurdistans, gelungen war, mehrere andere kurdische Stämme zu einen. Der ehrgeizige kurdische Führer rekrutierte eine Reihe kurdischer Anführer für den Aufstand, darunter auch seinen jungen Bruder Mustafa Barzani, der während des Aufstands zu einem der berüchtigtsten Kommandeure wurde. Die Barzani-Truppen wurden schließlich mit britischer Unterstützung von der irakischen Armee überwältigt, was die Anführer Barzans zum Untergrund zwang."

ron_early_wars_news.343.t:0 "Kumul-Rebellion"
ron_early_wars_news.343.d:0 "Der Kumul-Aufstand war ein Aufstand von Kumulik-Uiguren von 1931 bis 1934, die mit dem muslimischen Hui-Chinesen General Ma Zhongying konspirierten, um Jin Shuren, den Gouverneur von Xinjiang, zu stürzen. Die Kumul-Uiguren waren Loyalisten des Kumul-Khanats und wollten den Erben des Khanats wieder einsetzen und Jin stürzen. Die Kuomintang wollte Jin wegen seiner Verbindungen zur Sowjetunion stürzen und billigte die Operation, während sie vorgab, Jin als Gouverneur anzuerkennen. Der Aufstand artete dann in groß angelegte Kampfhandlungen aus, als uigurische Rebellen aus Khotanlik im südlichen Xinjiang in geheimer Absprache mit kirgisischen Rebellen einen separaten Unabhängigkeitsaufstand begannen. Es kam zu mehreren Rebellionen, die jedoch nicht vereint waren (einige bekämpften sich sogar gegenseitig). Den größten Teil des Krieges führte Ma Zhongying gegen die Regierung in Xinjiang. Unterstützt wurde er von Chiang Kai-shek, dem Premierminister Chinas, der Ma heimlich die Eroberung Xinjiangs überließ."

ron_early_wars_news.344.t:0 "Lesko-Aufstand"
ron_early_wars_news.344.d:0 "Der Lesko-Aufstand, der im Juni und Juli 1932 stattfand, war ein Aufstand der Bauern im Bieszczady-Gebirge gegen die lokalen Behörden der Zweiten Polnischen Republik. Die verarmten Bauern missverstanden die staatlichen Maßnahmen zur Eindämmung der Großen Krise als Versuch, die Leibeigenschaft wieder einzuführen. Die ersten Zusammenstöße ereigneten sich am 21. Juni. In den folgenden Wochen beteiligten sich Tausende von Menschen in der gesamten Bieszczady-Region an den Unruhen, als polnische Polizei und Militär die Unruhen niederschlugen. Der Aufstand endete am 9. Juli mit etwa einem Dutzend Toten, vielen Verletzten und mehreren hundert verhafteten Bauern."

ron_early_wars_news.345.t:0 "Konstitutionalistische Revolution"
ron_early_wars_news.345.d:0 "Die Konstitutionalistische Revolution von 1932 bezeichnet den Aufstand der Bevölkerung des brasilianischen Bundesstaates São Paulo gegen die brasilianische Revolution von 1930, als Getúlio Vargas die Präsidentschaft übernahm. Vargas wurde von der Bevölkerung, dem Militär und den politischen Eliten von Minas Gerais, Rio Grande do Sul und Paraíba unterstützt. Die Bewegung entstand aus dem Unmut der Bevölkerung darüber, dass Vargas in einer provisorischen Regierung per Dekret und ohne Bindung an eine Verfassung regierte."

ron_early_wars_news.346.t:0 "Ecuadorianischer Bürgerkrieg"
ron_early_wars_news.346.d:0 "Der ecuadorianische Bürgerkrieg war ein Krieg, der im August 1932 zwischen Anhängern und Gegnern von Präsident Isidro Ayora ausgetragen wurde."

ron_early_wars_news.347.t:0 "Vorfall vom 28. Januar"
ron_early_wars_news.347.d:0 "Der Vorfall vom 28. Januar oder Shanghai-Vorfall war ein Konflikt zwischen der Republik China und dem Kaiserreich Japan. Er ereignete sich im internationalen Shanghaier Siedlungsgebiet, das unter internationaler Kontrolle stand. Japanische Armeeoffiziere hatten unter Missachtung höherer Autoritäten antijapanische Demonstrationen im internationalen Bezirk von Shanghai provoziert."

ron_early_wars_news.348.t:0 "Vorfall vom 15. Mai"
ron_early_wars_news.348.d:0 "Der Zwischenfall vom 15. Mai war ein Putschversuch im Kaiserreich Japan am 15. Mai 1932. Angeführt wurde er von reaktionären Elementen der Kaiserlich Japanischen Marine, unterstützt von Kadetten der Kaiserlich Japanischen Armee und zivilen Überresten der ultranationalistischen Blutsliga. Premierminister Inukai Tsuyoshi wurde von elf jungen Marineoffizieren ermordet."

ron_early_wars_news.349.t:0 "Bewaffneter Aufstand in der Mongolei"
ron_early_wars_news.349.d:0 "Der bewaffnete Aufstand in der Mongolei im Jahr 1932 war ein Volksaufstand gegen die linksgerichtete Politik der Mongolischen Revolutionären Volkspartei (MPRP), die von sowjetischen Bolschewiki und Agenten der Komintern in der Mongolei gelenkt wurde. Die Aufstände, die hauptsächlich von Lamas angeführt wurden, erstreckten sich über den Nordwesten des Landes und dauerten von April bis November 1932. Die meisten Rebellen waren einfache Hirten, aber auch viele Parteimitglieder und lokale Bürokraten schlossen sich dem Aufstand an."

ron_early_wars_news.350.t:0 "Kirgisischer Aufstand"
ron_early_wars_news.350.d:0 "Der Kirgisenaufstand ereignete sich, als im März 1932 kirgisische Freischärler in Xinjiang gegen die Republik China revoltierten. Die kirgisischen Rebellen unter der Führung von Id Mirab revoltierten im Tian Shan-Gebirge als Teil des größeren Kumul-Aufstands in Xinjiang, bis sie rasch von Regierungstruppen unter der Führung von Ma Shaowu, dem Hui-Militärkommandeur von Kashgar, mit geringfügiger Unterstützung der Sowjetunion besiegt wurden."

ron_early_wars_news.351.t:0 "Mäntsälä-Aufstand"
ron_early_wars_news.351.d:0 "Am 27. Februar 1932 unterbrachen rund 400 bewaffnete Mitglieder der Suojeluskunta-Miliz eine Versammlung der Sozialdemokraten in Mäntsälä mit Handfeuerwaffen. Es handelte sich um eine lokale Veranstaltung, die vom Ortsverband organisiert wurde, doch schon bald beteiligte sich auch die nationale Organisation daran."

ron_early_wars_news.352.t:0 "La Matanza"
ron_early_wars_news.352.d:0 "La Matanza war ein Bauernaufstand, der am 22. Januar 1932 in den westlichen Departements El Salvadors begann und von der Regierung unter Maximiliano Hernández Martínez niedergeschlagen wurde. Die salvadorianische Armee war weit überlegen und richtete ihre Widersacher hin."

ron_early_wars_news.353.t:0 "Sanjurjada"
ron_early_wars_news.353.d:0 "Sanjurjada war ein Militärputsch in Spanien am 10. August 1932. Ziel war der Sturz der Regierung, nicht unbedingt der Republik. Nach kurzen Zusammenstößen konnte er in Madrid mühelos niedergeschlagen werden. Außer in Sevilla, wo der lokale Rebellenkommandeur General José Sanjurjo für etwa 24 Stunden die Kontrolle übernahm, sich jedoch angesichts der entschlossenen Reaktion der Regierung geschlagen gab, kam es kaum zu weiteren Aktionen. Aufgrund seines kurzen Erfolgs und der Aufmerksamkeit, die ihm während der darauffolgenden Prozesse zuteilwurde, wurde der gesamte Putsch später nach ihm benannt."

ron_early_wars_news.354.t:0 "Leticia-Vorfall"
ron_early_wars_news.354.d:0 "Der Leticia-Zwischenfall, auch Leticia-Krieg oder Kolumbien-Peru-Krieg genannt (1. September 1932 – 24. Mai 1933), war ein kurzlebiger bewaffneter Konflikt zwischen Kolumbien und Peru um Gebiete im Amazonas-Regenwald. Schließlich einigten sie sich auf die Aufteilung des umstrittenen Gebiets."

ron_early_wars_news.355.t:0 "Chaco-Krieg"
ron_early_wars_news.355.d:0 "Der Chacokrieg wurde zwischen Bolivien und Paraguay um die Kontrolle über den nördlichen Teil der Region Gran Chaco (auf Spanisch Chaco Boreal) in Südamerika geführt, die als ölreich galt. In literarischen Kreisen wird er auch als La Guerra de la Sed (spanisch für „Der Krieg des Durstes“) bezeichnet, da er im halbtrockenen Chaco ausgetragen wurde. Es war der blutigste zwischenstaatliche militärische Konflikt in Südamerika im 20. Jahrhundert, zwischen zwei der ärmsten Länder, die beide zuvor in Kriegen des 19. Jahrhunderts Gebiete an ihre Nachbarn verloren hatten."

ron_early_wars_news.356.t:0 "Darre Khel-Aufstand"
ron_early_wars_news.356.d:0 "Muhammad Nadir Shah war vom 15. Oktober 1929 bis zu seiner Ermordung im November 1933 König von Afghanistan. Zuvor war er Kriegsminister, afghanischer Botschafter in Frankreich und General der afghanischen Armee. Er und sein Sohn Muhammad Zahir Shah, der ihm nachfolgte, gehören zu den Musahiban."

ron_early_wars_news.357.t:0 "Emu-Krieg"
ron_early_wars_news.357.d:0 "Der Emu-Krieg, auch bekannt als der Große Emu-Krieg, war eine militärische Operation zur Wildtierregulierung, die Ende 1932 in Australien durchgeführt wurde, um der öffentlichen Besorgnis über die Zahl der angeblich Amok laufenden Emus im Campion District in Westaustralien zu begegnen. Bei den erfolglosen Versuchen, die Population der Emus, eines großen, flugunfähigen Vogels, der in Australien heimisch ist, einzudämmen, kamen mit Lewis-Maschinengewehren bewaffnete Soldaten zum Einsatz – was dazu führte, dass die Medien den Vorfall als „Emu-Krieg“ bezeichneten. Obwohl einige Vögel getötet wurden, blieb die Emu-Population bestehen und verursachte weiterhin Erntezerstörung."

ron_early_wars_news.358.t:0 "Sowjetisch-japanische Grenzkonflikte"
ron_early_wars_news.358.d:0 "Der sowjetisch-japanische Grenzkonflikt, auch bekannt als der sowjetisch-japanische Grenzkrieg, war ein nicht erklärter Grenzkonflikt, der von 1932 bis 1939 zwischen der Sowjetunion und Japan in Nordostasien ausgetragen wurde."

ron_early_wars_news.359.t:0 "Die Rebellion des verrückten Fakirs"
ron_early_wars_news.359.d:0 "Ende Februar 1933 erschien ein „verrückter Fakir“ im Distrikt Khost im Süden Afghanistans und verkündete die baldige Ankunft des ehemaligen Königs Amanullah. Auf sein Betreiben hin griffen mehrere Stammesangehörige zu den Waffen, um nach Kabul zu marschieren. Sie erhielten beträchtliche Verstärkung von den Stämmen der Wazir und Mahsud jenseits der indischen Grenze. In der Nähe von Matun trafen sie auf die Regierungstruppen, die ihnen entgegengestellt worden waren. Ende Februar und Anfang März kam es zu heftigen Kämpfen. Die Stammesangehörigen jenseits der Grenze begannen daraufhin auf Geheiß einiger ihrer Ältesten, die von den britischen Behörden zum Rückruf geschickt worden waren, mit dem Rückzug, und der Aufstand fand bald ein Ende. Später im Jahr wurde einer der Rädelsführer, Tor Malang, zusammen mit einigen seiner Gefährten hingerichtet. Der „verrückte Fakir“, der ins Ausland geflohen war, durfte jedoch aufgrund seines hohen Alters mit der Zusicherung einer Begnadigung zurückkehren."

ron_early_wars_news.360.t:0 "Aktionen in der Inneren Mongolei"
ron_early_wars_news.360.d:0 "Der Feldzug in der Inneren Mongolei von 1933 bis 1936 war Teil der anhaltenden Invasion Nordchinas durch das Kaiserreich Japan vor dem offiziellen Beginn der Feindseligkeiten im Zweiten Japanisch-Chinesischen Krieg. 1931 sicherte die Invasion der Mandschurei die Gründung des Marionettenstaates Mandschukuo, und 1933 trennte die Operation Nekka die Provinz Jehol von der Republik China. Durch den Waffenstillstand der Tanggu-Dynastie an einem weiteren Vormarsch nach Süden gehindert, richtete die Kaiserlich Japanische Armee ihre Aufmerksamkeit nach Westen, auf die innermongolischen Provinzen Chahar und Suiyuan, mit dem Ziel, einen Pufferstaat in Nordchina zu errichten."

ron_early_wars_news.361.t:0 "Boworadet-Aufstand"
ron_early_wars_news.361.d:0 "Der Boworadet-Aufstand war ein thailändischer Aufstand unter der Führung des royalistischen Prinzen Boworadet im Jahr 1933. Er war eine Folge der Konflikte zwischen dem vorherigen royalistischen Regime (den Anhängern der Chakri-Dynastie und König Prajadhipok) und dem nachfolgenden konstitutionellen Regime unter Führung von Khana Ratsadon („Volkspartei“) nach der Revolution von 1932. Der Boworadet-Aufstand wurde schließlich von der siamesischen Regierung niedergeschlagen."

ron_early_wars_news.362.t:0 "Aufstand der Sergeanten"
ron_early_wars_news.362.d:0 "Der Sergeantenaufstand, auch Kubanische Revolution von 1933 genannt, war ein Staatsstreich, der im September 1933 in Kuba stattfand. Er begann als Aufstand von Sergeanten und einfachen Soldaten, die sich bald mit studentischen Aktivisten im Directorio Estudiantil Universitario verbündeten."

ron_early_wars_news.363.t:0 "Kazym-Rebellion"
ron_early_wars_news.363.d:0 "Der Kasym-Aufstand war ein Aufstand der Chanten in Westsibirien gegen die Kollektivierungspolitik der Sowjetregierung im Jahr 1933. Der Aufstand ist nach der Kleinstadt Kasym im Autonomen Kreis der Chanten und Mansen benannt. Einige Quellen beschreiben die Ereignisse als „Kazym-Aufstände“ und listen eine Reihe von Konflikten auf, die 1931 begannen, mit einigen halbherzigen Versöhnungsversuchen von sowjetischer Seite, die jedoch 1933 in gewaltsamer Niederschlagung und 1934 in Repressionen gipfelten."

ron_early_wars_news.364.t:0 "Anarchistischer Aufstand in Spanien"
ron_early_wars_news.364.d:0 "Der Vorfall in Casas Viejas, auch bekannt als „Casas Viejas-Ereignisse“, ereignete sich 1933 im Dorf Casas Viejas in der andalusischen Provinz Cádiz."

ron_early_wars_news.365.t:0 "Meuterei der sieben Provinzen"
ron_early_wars_news.365.d:0 "Die HNLMS De Zeven Provinciën war ein Küstenverteidigungsschiff der Königlich Niederländischen Marine und von 1910 bis 1942 im Einsatz. Es handelte sich um ein kleines Kriegsschiff in Kreuzergröße, das Geschwindigkeit und Reichweite zugunsten von Panzerung und Bewaffnung opferte. Sie war mit zwei 283-mm-, vier 150-mm-, zehn 75-mm- und vier 37-mm-Geschützen sowie einigen 75-mm-Mörsern bewaffnet."

ron_early_wars_news.366.t:0 "Asturischer Bergarbeiterstreik"
ron_early_wars_news.366.d:0 "Der asturische Bergarbeiterstreik von 1934 war eine große Streikaktion regionaler Bergarbeiter gegen die spanischen Parlamentswahlen von 1933, die in der Zweiten Spanischen Republik die politische Macht von den Linken zu den Konservativen umverteilten. Der Streik dauerte in Asturien zwei Wochen, vom 4. bis zum 19. Oktober 1934. Die Wahl führte dazu, dass die konservative Spanische Konföderation der Autonomen Rechten (CEDA) am 6. Oktober die parlamentarische Mehrheit in der spanischen Regierung erlangte."

ron_early_wars_news.367.t:0 "Sowjetische Invasion in Xinjiang"
ron_early_wars_news.367.d:0 "Die sowjetische Invasion in Xinjiang war eine Militärkampagne der Sowjetunion in der nordwestlichen chinesischen Region Xinjiang im Jahr 1934. Weißrussische Streitkräfte unterstützten die sowjetische Rote Armee."

ron_early_wars_news.368.t:0 "Vorfall an der Militärakademie"
ron_early_wars_news.368.d:0 "Der Vorfall an der Militärakademie, auch als November-Vorfall bekannt, war ein Putschversuch, der im November 1934 in Japan stattfand. Er war Teil einer Reihe ähnlicher Verschwörungen zur „Shōwa-Restauration“, angeführt von radikalen Elementen der Kaiserlich Japanischen Armee."

ron_early_wars_news.369.t:0 "Österreichischer Bürgerkrieg"
ron_early_wars_news.369.d:0 "Der Österreichische Bürgerkrieg, auch Februarkämpfe genannt, bezeichnet einige Tage dauernde Auseinandersetzungen zwischen faschistischen und sozialistischen Kräften zwischen dem 12. und 16. Februar 1934 in Österreich. Die Auseinandersetzungen begannen in Linz und fanden hauptsächlich in Wien, Graz, Bruck an der Mur, Judenburg, Wiener Neustadt und Steyr, aber auch in einigen anderen Industriestädten Ost- und Mittelösterreichs statt."

ron_early_wars_news.370.t:0 "Juliputsch"
ron_early_wars_news.370.d:0 "Der Juliputsch war ein gescheiterter Putschversuch österreichischer Nazis gegen das austrofaschistische Regime vom 25. bis 30. Juli 1934."

ron_early_wars_news.371.t:0 "Lettischer Staatsstreich"
ron_early_wars_news.371.d:0 "Der lettische Staatsstreich von 1934, in Lettland als Putsch vom 15. Mai oder Ulmanis-Putsch bekannt, war ein Selbstputsch des langjährigen Premierministers Kārlis Ulmanis gegen das parlamentarische System Lettlands. Sein Regime hielt bis zur sowjetischen Besetzung Lettlands im Jahr 1940 an. "

ron_early_wars_news.372.t:0 "Ereignisse vom 6. Oktober"
ron_early_wars_news.372.d:0 "Die Ereignisse des 6. Oktober waren ein Generalstreik, ein bewaffneter Aufstand und die Ausrufung des katalanischen Staates durch die autonome Regierung Kataloniens am 6. Oktober 1934 als Reaktion auf die Eingliederung konservativer Kräfte in das republikanische Regime Spaniens. Sie waren Teil eines landesweiten Streiks und bewaffneter Aktionen, die als Revolution von 1934 bekannt wurden."

ron_early_wars_news.373.t:0 "Khamba-Rebellion"
ron_early_wars_news.373.d:0 "Der Khamba-Aufstand von 1934 war ein Aufstand in den westlichen Regionen von Kham in Xikang gegen die tibetische Regierung und den Sichuan-Kriegsherrn Liu Wenhui. Er bestand aus Stammesangehörigen der Khamba unter der Führung der Familie Pandatsang; zwei Brüder der Familie, Pandatsang Togbye und Pandatsang Rapga, führten den Aufstand an."

ron_early_wars_news.374.t:0 "Erster saudi-jemenitischer Krieg"
ron_early_wars_news.374.d:0 "Der Erste Saudi-Jemen-Krieg war ein Krieg zwischen Saudi-Arabien und dem Jemen im Jahr 1934."

ron_early_wars_news.375.t:0 "Mohmand-Kampagne"
ron_early_wars_news.375.d:0 "Der Zweite Mohmand-Feldzug von 1935 war ein britischer Feldzug gegen die Mohmand-Stämme im Nordwesten Britisch-Indiens, dem heutigen Pakistan. Dabei kamen Panzer zum Einsatz, der erste operative Einsatz von Panzern in Indien. Der Erste Mohmand-Feldzug 1897–98 folgte auf frühere Militärexpeditionen in den Jahren 1851–1852, 1854, 1864, 1879 und 1880. Auf den Ersten Mohmand-Feldzug folgten die Mohmand-Expedition von 1908 und die Mohmand- und Bajaur-Operationen von 1933, die im August etwa einen Monat dauerten."

ron_early_wars_news.376.t:0 "Aufstand vom 2. Mai"
ron_early_wars_news.376.d:0 "Die Sakdalista-Partei war innerhalb kurzer Zeit schnell gewachsen, und Anfang April sorgten ihre Aktivitäten in den Provinzen rund um Manila in Regierungskreisen für Besorgnis. Die philippinische Regierung, die mit zunehmenden öffentlichen Unruhen rechnete, unterdrückte die Sakdal-Zeitung, indem sie ihr die Versandrechte entzog und öffentliche Versammlungen nur mit staatlicher Genehmigung abhalten durfte. Diese Maßnahmen erwiesen sich jedoch als erfolglos, da es Ramos während seiner Japanreise gelungen war, Tausende Exemplare einer von Japan gesponserten Broschüre mit dem Titel „Free Filipinos“ zu drucken und zu schmuggeln. Die Broschüre suggerierte die Illusion einer Unterstützung der Sakdal-Sache durch die japanische Bevölkerung."

ron_early_wars_news.377.t:0 "Jesiden-Aufstand"
ron_early_wars_news.377.d:0 "Der Jesidenaufstand von 1935 ereignete sich im Oktober 1935 im Irak. Die irakische Regierung unter Yasin al-Hashimi schlug einen Aufstand der Jesiden im Dschabal Sindschar gegen die Einführung der Wehrpflicht nieder. Die irakische Armee unter Bakr Sidqi tötete Berichten zufolge über 200 Jesiden und verhängte in der gesamten Region das Kriegsrecht. Parallele Aufstände gegen die Wehrpflicht brachen im selben Jahr auch im Norden (mit kurdischer Bevölkerung) und in den mehrheitlich schiitischen Regionen des mittleren Euphrat aus."

ron_early_wars_news.378.t:0 "Aufstand in der Goharshad-Moschee"
ron_early_wars_news.378.d:0 "Der Aufstand in der Goharshad-Moschee ereignete sich im August 1935, als im Imam-Reza-Schrein im iranischen Maschhad eine Gegenreaktion gegen die verwestlichende und säkularistische Politik von Schah Reza Pahlavi ausbrach."

ron_early_wars_news.379.t:0 "Griechischer Putschversuch"
ron_early_wars_news.379.d:0 "Der Putschversuch vom März 1935 war ein Aufstand der Venizelisten gegen die Regierung der Volkspartei unter Panagis Tsaldaris, die im Verdacht stand, pro-royalistische Tendenzen zu haben."

ron_early_wars_news.380.t:0 "Irakische schiitische Aufstände"
ron_early_wars_news.380.d:0 "Der Rumaytha- und Diwaniyya-Aufstand von 935 bzw. die irakischen Schiitenaufstände von 1935–1936 bestanden aus einer Reihe von Aufständen schiitischer Stämme in der Region des mittleren Euphrat gegen die sunnitisch dominierte Autorität des Königreichs Irak. Bei jedem Aufstand reagierte die irakische Regierung mit militärischer Gewalt, um die Aufstände gnadenlos niederzuschlagen."

ron_early_wars_news.381.t:0 "Brasilianischer Aufstand von 1935"
ron_early_wars_news.381.d:0 "Der kommunistische Aufstand von 1935 war ein Militäraufstand linker Militärs niedriger Ränge gegen die Regierung von Getúlio Vargas im Namen der Nationalen Befreiungsallianz und mit Unterstützung der brasilianischen Kommunistischen Partei, die damals Kommunistische Partei Brasiliens hieß. Der Aufstand wurde auch von der Komintern unterstützt. Es war der letzte einer Reihe brasilianischer Militäraufstände, die 1922 unter dem Namen Tenentismo oder Leutnantaufstände begannen. Später nutzte Vargas ihn als Vorwand für die Gründung des Estado Novo."

ron_early_wars_news.382.t:0 "Zweiter Italienisch-Äthiopischer Krieg"
ron_early_wars_news.382.d:0 "Der Zweite Italienisch-Äthiopische Krieg, auch Zweiter Italienisch-Abessinischer Krieg genannt, war ein Angriffskrieg, der von Oktober 1935 bis Februar 1937 zwischen Italien und Äthiopien geführt wurde. Er gilt als Beispiel für die expansionistische Politik der Achsenmächte und die Ineffektivität des Völkerbundes vor Ausbruch des Zweiten Weltkriegs."

ron_early_wars_news.383.t:0 "Irakischer Staatsstreich"
ron_early_wars_news.383.d:0 "Der irakische Staatsstreich von 1936, auch bekannt als Bakr-Sidqi-Putsch, war der erste Militärputsch im modernen Irak. Er wurde von General Bakr Sidqi initiiert, um Premierminister Yasin al-Hashimi zu stürzen. Der Putsch führte zur Einsetzung von Hikmat Sulayman als neuem Premierminister, während Sidqi als mächtiger Generalstabschef de facto Herrscher des Irak war. Bakr Sidqi wurde im darauffolgenden Jahr in Mossul ermordet. Nach Bakr Sidqis Putsch erlebte das Königreich Irak bis 1941 in einer Welle politischer Instabilität sechs weitere politische Putsche, bei denen es zu Machtübergaben außerhalb der Verfassung kam."

ron_early_wars_news.384.t:0 "Scythe Cross-Rebellion"
ron_early_wars_news.384.d:0 "Während die verschiedenen Fraktionen um eine gewisse Einheit kämpften, blieb die Sensenkreuz-Bewegung unabhängig. Die Gruppe vertrat ein starkes antisemitische und antikommunistisches Programm und wurde, da sie von der Arbeiterklasse unterstützt wurde, von der Regierung von Miklós Horthy bald als potenzielle Gefahr angesehen. Besonders stark war der Rückhalt unter den armen Saisonarbeitern, die zur Erntezeit Gelegenheitsarbeiten auf den großen Ländereien annahmen. Als über 100 von ihnen verhaftet wurden, erklärten sie sich alle bereit, für die von Böszörmény vertretene „Idee“ zu sterben."

ron_early_wars_news.385.t:0 "Marineaufstand"
ron_early_wars_news.385.d:0 "Der Seeaufstand oder die Meuterei auf den Tejo-Schiffen von 1936 (Motim dos Barcos do Tejo) war eine Meuterei in Portugal, die am 8. September 1936 an Bord der Aviso Afonso de Albuquerque und des Zerstörers Dão stattfand. Sie wurde von der Revolutionären Organisation der Flotte (Organização Revolucionária da Armada, ORA) organisiert, einer linken Gruppe mit Verbindungen zur Kommunistischen Partei Portugals."

ron_early_wars_news.386.t:0 "Vorfall vom 26. Februar"
ron_early_wars_news.386.d:0 "Der Vorfall vom 26. Februar war ein Putschversuch im Kaiserreich Japan am 26. Februar 1936. Er wurde von einer Gruppe junger Offiziere der Kaiserlich Japanischen Armee (IJA) organisiert, mit dem Ziel, die Regierung und die Militärführung von ihren Fraktionsrivalen und ideologischen Gegnern zu säubern."

ron_early_wars_news.387.t:0 "Arabischer Aufstand in Palästina"
ron_early_wars_news.387.d:0 "Der Arabische Aufstand von 1936–1939 in Palästina, später als „Der Große Aufstand“ bekannt, war ein nationalistischer Aufstand palästinensischer Araber im Mandatsgebiet Palästina gegen die britische Verwaltung des Palästinamandats. Sie forderten die arabische Unabhängigkeit und das Ende der Politik der unbefristeten jüdischen Einwanderung und Landkäufe mit dem erklärten Ziel, eine „Jüdische Nationale Heimstätte“ zu errichten. Der Widerstand wurde direkt beeinflusst durch den Kassamitenaufstand nach der Ermordung von Scheich Izz ad-Din al-Kassam im Jahr 1935 sowie durch die Erklärung des Hadsch Amin al-Husseini zum 16. Mai 1936 zum „Palästina-Tag“ und den Aufruf zu einem Generalstreik. Der Aufstand wurde von vielen im jüdischen Jischuw als „unmoralisch und terroristisch“ gebrandmarkt und oft mit Faschismus und Nationalsozialismus verglichen."

ron_early_wars_news.388.t:0 "Spanischer Bürgerkrieg"
ron_early_wars_news.388.d:0 "Der Spanische Bürgerkrieg dauerte von 1936 bis 1939 in Spanien. Republikaner, die der linksgerichteten Volksfrontregierung der Zweiten Spanischen Republik treu ergeben waren, kämpften im Bündnis mit Anarchisten kommunistischer und syndikalistischer Prägung gegen einen Aufstand der Nationalisten, einer Allianz aus Falangisten, Monarchisten, Konservativen und Traditionalisten unter Führung einer militärischen Gruppe, in der General Francisco Franco bald eine führende Rolle erlangte. Aufgrund des damaligen internationalen politischen Klimas hatte der Krieg viele Facetten und wurde unterschiedlich als Klassenkampf, Religionskrieg, Kampf zwischen Diktatur und republikanischer Demokratie, zwischen Revolution und Konterrevolution sowie zwischen Faschismus und Kommunismus wahrgenommen."

ron_early_wars_news.389.t:0 "Waziristan-Kampagne"
ron_early_wars_news.389.d:0 "Der Waziristan-Feldzug 1936–1939 umfasste eine Reihe von Operationen britischer und indischer Streitkräfte in Waziristan gegen die in dieser Region lebenden, äußerst unabhängigen Stammesangehörigen. Diese Operationen wurden zwischen 1936 und 1939 durchgeführt, als Operationen gegen Anhänger des paschtunischen Nationalisten Mirzali Khan durchgeführt wurden, der den Briten auch als &quot;Faqir von Ipi&quot; bekannt war, ein religiöser und politischer Agitator, der in der Region antibritische Stimmung verbreitete und das Ansehen der damaligen indischen Regierung in Waziristan untergrub."

ron_early_wars_news.390.t:0 "Islamischer Aufstand in Xinjiang"
ron_early_wars_news.390.d:0 "Im Jahr 1937 brach im südlichen Xinjiang ein islamischer Aufstand aus. Die Rebellen bestanden aus 1.500 turksprachigen (uigurischen) Muslimen unter der Führung von Kichik Akhund, die stillschweigend von der 36. Division gegen die prosowjetischen Provinztruppen von Sheng Shicai unterstützt wurden."

ron_early_wars_news.391.t:0 "Dieu Python-Bewegung"
ron_early_wars_news.391.d:0 "Im Jahr 1937 verkündete Sam Bam, ein vietnamesischer Dorfvorsteher der Montagnards, dass seine Tochter eine Python geboren habe. Die Montagnards begannen daraufhin, ihr Land nicht mehr zu bewirtschaften, da sie glaubten, die Python sei der Python-Gott (Dieu Python), der gesandt worden war, um das zentrale Hochland Vietnams von allen Ausländern zu befreien. Die Menschen begannen, die Franzosen anzugreifen, weil man ihnen „magisches Wasser“ gegeben hatte, das sie gegen französische Kugeln immun machen sollte. Dieser Aufstand wurde von den Franzosen rasch niedergeschlagen."

ron_early_wars_news.392.t:0 "Dersim-Aufstand"
ron_early_wars_news.392.d:0 "Der Dersim-Aufstand war ein Aufstand gegen die türkische Regierung in der Region Dersim im Osten der Türkei, die Teile der Provinzen Tunceli, Elazığ und Bingöl umfasst. Angeführt wurde der Aufstand von Seyid Riza, einem Häuptling der Aleviten-Zaza vom Stamm der Yukarı Abbas Uşağı. Infolge der Kämpfe der türkischen Streitkräfte gegen den Aufstand in den Jahren 1937 und 1938 und der damit verbundenen Massaker an der Zivilbevölkerung starben Tausende Aleviten-Zaza, und viele andere wurden innerhalb des Landes vertrieben."

ron_early_wars_news.393.t:0 "Zweiter Chinesisch-Japanischer Krieg"
ron_early_wars_news.393.d:0 "Der Zweite Japanisch-Chinesische Krieg war ein militärischer Konflikt, der hauptsächlich zwischen der Republik China und dem Kaiserreich Japan geführt wurde. In China ist der Krieg als Widerstandskrieg gegen die japanische Aggression oder als orientalischer Schauplatz des Antifaschistischen Weltkriegs bekannt. Letzterer Begriff geht auf Mao Zedongs Kriegsbündnis mit Stalin zurück. Der Beginn des Krieges wird üblicherweise auf den Zwischenfall an der Marco-Polo-Brücke am 7. Juli 1937 datiert, als ein Streit zwischen japanischen und chinesischen Truppen in Peking zu einer groß angelegten Invasion eskalierte. Im Jahr 2017 verfügte das Bildungsministerium der Volksrepublik China, dass der Begriff „Achtjähriger Krieg“ in allen Lehrbüchern durch „Vierzehnjähriger Krieg“ ersetzt werden sollte. Das geänderte Startdatum wurde auf den 18. September 1931 festgelegt, da die japanische Invasion in der Mandschurei dazu führte."

ron_early_wars_news.394.t:0 "Suleiman Khel-Aufstand"
ron_early_wars_news.394.d:0 "Eine Anzahl Wesire aus Süd- und West-Wasiristan überqueren die afghanische Grenze mit dem Ziel zu plündern und einen Aufstand gegen das herrschende afghanische Haus anzuzetteln. Diese Bewegung ist das Ergebnis einer Agitation, die seit einigen Monaten in Wasiristan von einem gewissen Syed Mohammad Sadi, allgemein bekannt als Shami Pir (syrischer Imam), geführt wird, einem Priester aus Damaskus, dessen Familie mit dem ehemaligen König Amanullah verwandt ist. Im Südosten Afghanistans bricht ein Aufstand aus, angeführt vom Suleiman Khel, und die Zahl der Aufständischen steigt bald auf 2.000 an. Die Regierung, die die Aktivitäten des Shami Pir beobachtet hat, ist nicht überrascht und schickt umgehend zwei Brigaden mit zehn Flugzeugen zum Schauplatz der Unruhen, die kurz darauf durch zwei weitere Brigaden verstärkt werden. Die Aufständischen werden in zwei Schlachten am 22. und 24. Juni besiegt, und der Aufstand findet bald sein Ende."

ron_early_wars_news.395.t:0 "Ghilzai-Aufstand"
ron_early_wars_news.395.d:0 "Der Ghilzai-Aufstand war ein Aufstand des Stammes der Ghilzai im Königreich Afghanistan im Jahr 1938. Auslöser war der Wunsch, Amanullah Khan als König von Afghanistan wieder einzusetzen. Ein Verwandter von Amanullah, Said al-Kailani, auch bekannt als Shami Pir, marschierte mit einer unbekannten Anzahl von Ghilzai-Kriegern nach Kabul. Es gibt zwei Berichte über das Ende des Aufstands: Britischen Aufzeichnungen zufolge wurde der Aufstand im Sommer 1938 von der afghanischen Armee mit von Großbritannien gelieferten Gewehren niedergeschlagen. Laut Harvey Smith endete der Aufstand, nachdem die Briten Shami Pir nach verzweifelten Appellen der afghanischen Regierung freikauften."

ron_early_wars_news.396.t:0 "Griechischer Putschversuch"
ron_early_wars_news.396.d:0 "Der Putschversuch von 1938 oder Staatsstreich von Chania war ein kurzlebiger Putschversuch in Chania, Griechenland, der darauf abzielte, die Diktatur von Ioannis Metaxas im Jahr 1938 zu stürzen. Aufgrund mangelhafter Organisation scheiterte der Putsch innerhalb weniger Stunden und stellte für das diktatorische Regime nie eine ernsthafte Bedrohung dar."

ron_early_wars_news.397.t:0 "Sudetendeutscher Aufstand"
ron_early_wars_news.397.d:0 "Der Sudetendeutsche Aufstand im September 1938 war eine spontane Rebellion der Sudetendeutschen gegen die tschechoslowakischen Behörden im Sudetenland, gleichzeitig aber auch eine organisierte Aktion der Sudetendeutschen Partei (SdP) unter dem Vorsitz von Konrad Henlein. Daher wird der Aufstand auch als Henlein-Putsch bezeichnet."

ron_early_wars_news.398.t:0 "Ungarische Invasion in der Karpato-Ukraine"
ron_early_wars_news.398.d:0 "Hitler machte unmissverständlich klar: Die Slowakei könne entweder sofort ihre Unabhängigkeit erklären und sich dem Reich anschließen, oder er werde die Übernahme des Landes durch die Ungarn zulassen – die sich laut Ribbentrop an der Grenze versammelten. Am Nachmittag und in der Nacht des 14. März proklamierte das slowakische Parlament die Unabhängigkeit von der Tschechoslowakei, und am 15. März 1939 um 5 Uhr erklärte Hitler die Unruhen in der Tschechoslowakei zu einer Bedrohung der deutschen nationalen Sicherheit. Er schickte seine Truppen nach Böhmen und Mähren, wo sie praktisch keinen Widerstand leisteten."

ron_early_wars_news.399.t:0 "Slowakisch-Ungarischer Krieg"
ron_early_wars_news.399.d:0 "Der Slowakisch-Ungarische Krieg oder Kleine Krieg (ungarisch: Kis háború, slowakisch: Malá vojna) war ein Krieg, der vom 23. bis 31. März 1939 zwischen der Ersten Slowakischen Republik und Ungarn in der Ostslowakei ausgetragen wurde."

ron_early_wars_news.400.t:0 "Maquis-Aufstand"
ron_early_wars_news.400.d:0 "Die spanischen Maquis waren spanische Guerillakämpfer, die nach dem Spanischen Bürgerkrieg nach Frankreich ins Exil geschickt wurden und bis in die frühen 1960er Jahre gegen das franquistische Spanien kämpften. Sie verübten Sabotageakte, Raubüberfälle (zur Finanzierung der Guerillaaktivitäten), besetzten die spanische Botschaft in Frankreich und ermordeten Francoisten. Darüber hinaus beteiligten sie sich während des Zweiten Weltkriegs am Kampf gegen Nazideutschland und das Vichy-Regime in Frankreich."

ron_early_wars_news.401.t:0 "Italienische Invasion Albaniens"
ron_early_wars_news.401.d:0 "Die italienische Invasion Albaniens war ein kurzer Feldzug des Königreichs Italien gegen das Königreich Albanien. Der Konflikt war eine Folge der imperialistischen Politik des italienischen Diktators Benito Mussolini. Albanien wurde rasch überrannt, sein Herrscher, König Zog I., ins benachbarte Griechenland ins Exil gezwungen und das Land als Protektorat in Personalunion mit der italienischen Krone dem italienischen Kaiserreich angegliedert."

ron_early_wars_news.402.t:0 "Winterkrieg"
ron_early_wars_news.402.d:0 "Der Winterkrieg war ein Krieg zwischen der Sowjetunion (UdSSR) und Finnland. Er begann mit der sowjetischen Invasion Finnlands am 30. November 1939, drei Monate nach Ausbruch des Zweiten Weltkriegs, und endete dreieinhalb Monate später mit dem Moskauer Friedensvertrag am 13. März 1940. Trotz überlegener militärischer Stärke, insbesondere bei Panzern und Flugzeugen, erlitt die Sowjetunion schwere Verluste und kam zunächst kaum voran. Der Völkerbund erklärte den Angriff für illegal und schloss die Sowjetunion aus."

ron_early_wars_news.403.t:0 "Aufstand in Tschetschenien"
ron_early_wars_news.403.d:0 "Der Aufstand in Tschetschenien von 1940 bis 1944 war ein autonomer Aufstand gegen die sowjetischen Behörden in der Tschetschenisch-Inguschischen Autonomen Sozialistischen Sowjetrepublik. Er begann Anfang 1940 unter Chasan Israilow, erreichte 1942 während der deutschen Invasion im Nordkaukasus seinen Höhepunkt und endete Anfang 1944 mit der großflächigen Konzentration und Deportation der Wainachen (Tschetschenen und Inguschen) aus ihrer Heimat und aus der gesamten UdSSR, was den Tod von mindestens 144.000 Zivilisten zur Folge hatte. Vereinzelter Widerstand in den Bergen hielt jedoch noch jahrelang an."

ron_early_wars_news.404.t:0 "Czortków-Aufstand"
ron_early_wars_news.404.d:0 "Der Czortków-Aufstand war ein gescheiterter Versuch junger antisowjetischer Polen, sich den Repressionen des sowjetischen Staates zu widersetzen. Die meisten von ihnen waren Vorkriegsschüler des örtlichen Gymnasiums. Der Aufstand ereignete sich während des Zweiten Weltkriegs in der sowjetisch besetzten polnischen Stadt Czortków (heute Tschortkiw, Ukraine). Die Aufständischen versuchten, die örtliche Kaserne der Roten Armee und ein Gefängnis zu stürmen, um dort inhaftierte polnische Soldaten zu befreien. Der Angriff ereignete sich in der Nacht vom 21. auf den 22. Januar 1940. Es war der erste polnische Zivilaufstand gegen die nationalsozialistische Besatzung Polens."

ron_early_wars_news.405.t:0 "Sowjetische Besetzung der baltischen Staaten"
ron_early_wars_news.405.d:0 "Die sowjetische Besetzung der baltischen Staaten umfasst den Zeitraum von den sowjetisch-baltischen Beistandsabkommen im Jahr 1939 über die Invasion und Annexion dieser Staaten im Jahr 1940 bis hin zu den Massendeportationen im Jahr 1941."

ron_early_wars_news.406.t:0 "Sowjetische Besetzung Bessarabiens und der Nordbukowina"
ron_early_wars_news.406.d:0 "Die sowjetische Besetzung Bessarabiens und der nördlichen Bukowina dauerte vom 28. Juni bis 4. Juli 1940 und war die Folge eines Ultimatums der Sowjetunion an Rumänien vom 26. Juni 1940, das mit Gewalt drohte. Bessarabien gehörte seit dem russischen Bürgerkrieg zum Königreich Rumänien, die Bukowina seit dem Zerfall Österreich-Ungarns, Hertza war ein Bezirk des Alten Rumänischen Reiches. Diese Gebiete mit einer Gesamtfläche von 50.762 km² und einer Bevölkerung von 3.776.309 Einwohnern wurden in die Sowjetunion eingegliedert."

ron_early_wars_news.407.t:0 "Französisch-Thailändischer Krieg"
ron_early_wars_news.407.d:0 "Verhandlungen mit Frankreich kurz vor dem Zweiten Weltkrieg hatten gezeigt, dass die französische Regierung bereit war, die Grenzen zwischen Thailand und Französisch-Indochina angemessen zu ändern, allerdings nur geringfügig. Nach dem Fall Frankreichs im Jahr 1940 entschied Generalmajor Plaek Pibulsonggram (im Volksmund „Phibun“ genannt), der Premierminister Thailands, dass die Niederlage Frankreichs den Thailändern eine noch bessere Chance biete, die während der Herrschaft von König Chulalongkorn an Frankreich abgetretenen Vasallenstaatengebiete zurückzugewinnen."

ron_early_wars_news.408.t:0 "Legionärsaufstand und Bukarest-Pogrom"
ron_early_wars_news.408.d:0 "Der Legionärsaufstand und das Bukarester Pogrom ereigneten sich vom 21. bis 23. Januar 1941 in Bukarest, Rumänien. Als der Dirigent Ion Antonescu der paramilitärischen Organisation Eiserne Garde schrittweise ihre Privilegien entzog, revoltierten ihre Mitglieder, auch als Legionäre bekannt. Während des Aufstands und des Pogroms tötete die Eiserne Garde 125 Juden, und 30 Soldaten starben bei der Konfrontation mit den Rebellen. Daraufhin wurde die Bewegung der Eisernen Garde verboten und 9.000 ihrer Mitglieder inhaftiert."

ron_early_wars_news.409.t:0 "Ecuadorianisch-Peruanischer Krieg"
ron_early_wars_news.409.d:0 "Der Ecuadorianisch-Peruanische Krieg, lokal bekannt als der Krieg von 1941 (spanisch: Guerra del 41), war ein südamerikanischer Grenzkrieg, der vom 5. bis 31. Juli 1941 ausgetragen wurde. Es war der erste von drei militärischen Konflikten zwischen Ecuador und Peru im 20. Jahrhundert. Während des Krieges besetzte Peru die westliche ecuadorianische Provinz El Oro und Teile der Andenprovinz Loja."

ron_early_wars_news.410.t:0 "Anglo-Irakischer Krieg"
ron_early_wars_news.410.d:0 "Der Anglo-Irakische Krieg war ein von Großbritannien angeführter Feldzug der Alliierten gegen den Irak unter Rashid Ali, der während des Zweiten Weltkriegs mit Unterstützung Deutschlands und Italiens die Macht ergriffen hatte. Der Feldzug führte zum Sturz von Alis Regierung, zur Wiederbesetzung des Irak durch Großbritannien und zur Rückkehr des irakischen Regenten Prinz &#39;Abd al-Ilah, eines britischen Verbündeten."

ron_early_wars_news.411.t:0 "Fortsetzungskrieg"
ron_early_wars_news.411.d:0 "Der Fortsetzungskrieg begann 15 Monate nach dem Ende des Winterkriegs, der ebenfalls zwischen Finnland und der UdSSR ausgetragen wurde. Es wurden zahlreiche Gründe für die finnische Invasionsentscheidung angeführt, wobei die Rückeroberung im Winterkrieg verlorener Gebiete als der häufigste Grund angesehen wurde. Weitere Rechtfertigungen für den Konflikt waren Präsident Rytis Vision eines Großfinnlands und Oberbefehlshaber Mannerheims Wunsch, Karelien zurückzuerobern. Die Angriffspläne wurden gemeinsam von der Wehrmacht und einer Fraktion finnischer politischer und militärischer Führer entwickelt, während der Rest der Regierung nichts davon wusste. Trotz der Zusammenarbeit in diesem Konflikt unterzeichnete Finnland nie formell den Dreimächtepakt, wohl aber den Antikominternpakt. Die finnische Führung rechtfertigte ihr Bündnis mit Deutschland mit Selbstverteidigung."

ron_early_wars_news.412.t:0 "Hama Rashid-Aufstand"
ron_early_wars_news.412.d:0 "Der Hama-Rashid-Aufstand war ein Stammesaufstand im Pahlavi-Iran während des Zweiten Weltkriegs nach der anglo-sowjetischen Invasion des Iran. Der Stammesaufstand brach in einer allgemeinen Atmosphäre der Anarchie im gesamten Iran aus und seine wichtigste Fraktion wurde von Muhammed Rashid angeführt. Er dauerte von Ende 1941 bis April 1942 und brach dann 1944 erneut aus, was zu Rashids Niederlage führte."

ron_early_wars_news.413.t:0 "Juni 1941 Aufstand in Ost-Herzegowina"
ron_early_wars_news.413.d:0 "Im Juni 1941 rebellierten Serben in Ost-Herzegowina gegen die Behörden des Unabhängigen Staates Kroatien (Nezavisna Država Hrvatska, NDH), eines Marionettenstaates der Achsenmächte, der während des Zweiten Weltkriegs auf dem Gebiet des besiegten und besetzten Königreichs Jugoslawien errichtet worden war. Als der NDH seine Autorität durchsetzte, begannen Mitglieder der faschistischen Ustascha-Partei einen Völkermordfeldzug gegen Serben im ganzen Land. In Ost-Herzegowina verübten die Ustascha ab der ersten Juniwoche eine Reihe von Massakern und Angriffen gegen die mehrheitlich serbische Bevölkerung. Zwischen dem 3. und 22. Juni 1941 kam es zu spontanen Zusammenstößen zwischen den Behörden des NDH und Serbengruppen in der Region."

ron_early_wars_news.414.t:0 "Aufstand in Serbien"
ron_early_wars_news.414.d:0 "Der Aufstand in Serbien wurde im Juli 1941 von der Kommunistischen Partei Jugoslawiens gegen die deutschen Besatzungstruppen und ihre serbischen Hilfstruppen im Gebiet des Militärbefehlshabers in Serbien begonnen. Zunächst hatten die jugoslawischen Partisanen Ablenkungsmanöver und Sabotageakte durchgeführt und Vertreter von Aćimovićs Kollaborateursregierung angegriffen. Ende August schlossen sich einige Tschetniks dem Aufstand an und befreiten Loznica. Der Aufstand erreichte bald Massenausmaße. Partisanen und Tschetniks eroberten Städte, die von schwachen deutschen Garnisonen aufgegeben worden waren. Der bewaffnete Aufstand erfasste bald weite Teile des besetzten Gebiets. Das größte befreite Gebiet im besetzten Europa wurde von den Partisanen in Westserbien geschaffen und war als Republik Užice bekannt. Die Rebellen teilten sich die Macht im befreiten Gebiet; das Zentrum des von den Partisanen befreiten Gebiets war Užice, und die Tschetniks hatten ihr Hauptquartier auf Ravna Gora."

ron_early_wars_news.415.t:0 "Hukbalahap-Rebellion"
ron_early_wars_news.415.d:0 "Der Hukbalahap-Aufstand war ein Aufstand ehemaliger Hukbalahap- oder Hukbo ng Bayan Laban sa Hapon-Soldaten (Volksarmee gegen die Japaner) gegen die philippinische Regierung. Es begann während der japanischen Besetzung der Philippinen im Jahr 1942, dauerte während der Präsidentschaft von Manuel Roxas an und endete 1954 unter der Präsidentschaft von Ramon Magsaysay."

ron_early_wars_news.416.t:0 "Barzani-Aufstand"
ron_early_wars_news.416.d:0 "Der Barzani-Aufstand von 1943 bis 1945 war ein kurdischer nationalistischer Aufstand im Königreich Irak während des Zweiten Weltkriegs. Angeführt wurde der Aufstand von Mustafa Barzani, dem sich später sein älterer Bruder Ahmed Barzani anschloss, der Anführer des vorherigen kurdischen Aufstands im Irak. Der 1943 begonnene Aufstand wurde schließlich durch den irakischen Angriff Ende 1945 niedergeschlagen, verbunden mit dem Überlaufen mehrerer kurdischer Stämme. Infolgedessen zogen sich die Barzanis mit einem Großteil ihrer Truppen ins iranische Kurdistan zurück und gründeten gemeinsam mit den lokalen kurdischen Elementen die Republik Mahabad."

ron_early_wars_news.417.t:0 "Woyane-Rebellion"
ron_early_wars_news.417.d:0 "Der Woyane-Aufstand war ein Aufstand in der äthiopischen Provinz Tigray gegen die Regierung von Kaiser Haile Selassie, der von September bis November 1943 stattfand. Die Rebellen wurden mit Unterstützung von Flugzeugen der britischen Royal Air Force besiegt."

ron_early_wars_news.418.t:0 "Jesselton-Aufstand"
ron_early_wars_news.418.d:0 "Der Jesselton-Aufstand (auch bekannt als Jesselton-Aufstand oder Double Tenth Revolt/Incident) war ein Aufstand einer Widerstandsbewegung namens Kinabalu Guerillas, die sich aus einheimischen Chinesen, Ureinwohnern, Eurasiern und Sikh-Indianern aus Jesselton, Nordborneo, zusammensetzte und von Albert Kwok angeführt wurde. Der Aufstand richtete sich gegen die japanischen Besatzungstruppen in Nordborneo."

ron_early_wars_news.419.t:0 "Ukrainische Aufständische Armee"
ron_early_wars_news.419.d:0 "Die Ukrainische Aufständische Armee (ukrainisch: Українська повстанська армія, УПА, Ukrayins&#39;ka Povstans&#39;ka Armiya, UPA) war eine ukrainische nationalistische paramilitärische und spätere Partisanenformation."

ron_early_wars_news.420.t:0 "Aufstand in Belutschistan"
ron_early_wars_news.420.d:0 "Von 1944 bis 1945 führte Daru Khan Badinzai einen Aufstand gegen die Behörden des Raj an. Er begann in der ersten Hälfte des Jahres 1944, als Rebellen des Badinzai-Stammes begannen, den Straßenbau auf der britischen Seite der Grenze zu Belutschistan zu behindern."

ron_early_wars_news.421.t:0 "Afghanische Stammesaufstände"
ron_early_wars_news.421.d:0 "Die afghanischen Stammesaufstände von 1944–1947 oder die Khost-Unruhen waren eine Reihe von Stammesaufständen im Königreich Afghanistan durch Stammesangehörige der Zadran, Safi und Mangal, die von Februar 1944 bis Januar 1947 andauerten. Die Ursachen der Aufstände lagen in der Verschlechterung der Lebensbedingungen der Bauern, Änderungen der Wehrpflichtgesetze, der Entmachtung der Stammesführer der Safi, der Loyalität zu Amanullah, Handelsmonopolen, staatlicher Überwachung, Besteuerung und Armut. Der Konflikt begann, als Regierungstruppen mit den Streitkräften eines Stammesführers namens Mazrak zusammenstießen, der den Aufstand des Stammes der Zadran anführte. Dem Aufstand der Zadran folgten weitere Aufstände der Safi und Mangal, von denen erstere ihren eigenen König Salemai wählten. Faqir Ipi, ein Stammesführer aus Waziristan (damals Teil Britisch-Indiens), kämpfte zusammen mit anderen Rebellen ebenfalls für die Wiedereinsetzung des ehemaligen Königs Amanullah Khan."

ron_early_wars_news.422.t:0 "Lapplandkrieg"
ron_early_wars_news.422.d:0 "Während des Zweiten Weltkriegs kam es im Lapplandkrieg (finnisch: Lapin sota; schwedisch: Lapplandskriget; deutsch: Lapplandkrieg) von September bis November 1944 zu Kämpfen zwischen Finnland und Nazideutschland in Finnlands nördlichster Region Lappland. Obwohl Finnen und Deutsche bereits seit 1941 im Fortsetzungskrieg (1941–1944) gegen die Sowjetunion kämpften, zwang die sowjetische Wyborg-Petrosawodsk-Offensive im Sommer 1944 die finnische Führung zu Verhandlungen über ein separates Friedensabkommen. Der am 19. September 1944 unterzeichnete Moskauer Waffenstillstand verpflichtete Finnland zum Abbruch der diplomatischen Beziehungen zu Deutschland und zur Ausweisung oder Entwaffnung aller nach dem 15. September 1944 in Finnland verbliebenen deutschen Soldaten."

ron_ww2wars.1.t:"Saudian-Yemeni War"
ron_ww2wars.1.d:"King Ibn Saud ordered the Crown Prince of Saudi Arabia 'to re-occupy townships in the highlands of Tehama which the Imam of the Yemen has seized'. A communique states that "Ibn Saud has tried all diplomatic means of seeking an agreement, but the last just ruler in Yemen, the Imam has persisted in a policy of oppressing the inhabitants and 'eradicating' all who have not surrendered."