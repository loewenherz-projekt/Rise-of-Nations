 ITA_regio_esercito_dynamic_modifier:0 "Regio Esercito"
 ITA_regio_esercito_dynamic_modifier_desc:1 "Die italienische Armee kämpfte im Ersten Weltkrieg und war auf der Siegerseite, konnte jedoch mit der militärischen Modernisierung nicht Schritt halten. Durch die Anpassung an die moderne Zeit werden wir die Armee stärken und stets siegreich sein."
