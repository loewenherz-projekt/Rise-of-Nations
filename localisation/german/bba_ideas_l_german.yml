 ETH_prince_regent_idea:0 "Prinzregent $ETH_ras_imru_haile_selassie$"
 ETH_prince_regent_idea_desc:0 "Während Kaiser $ETH_haile_selassie$ abwesend ist, um beim Völkerbund für die Sache von [ROOT.GetAdjective] einzutreten, wird Ras $ETH_ras_imru_haile_selassie$ damit beauftragt, das Land gegen die Invasoren zu verteidigen und bis zur Rückkehr des Kaisers als De-facto-Anführer von [ROOT.GetName] zu fungieren."
 ETH_conservative_high_command_idea:0 "Konservatives Oberkommando"
 ETH_conservative_high_command_idea_desc:0 "Die Ras&#39; von [ETH.GetName] wissen, wie man Krieg führt. Es besteht kaum Bedarf, etwas zu ändern, das sich seit Jahrhunderten bewährt hat. Der Feind wird stets durch einen umfassenden Angriff besiegt, bei dem die überlegene Moral und die zahlenmäßige Überlegenheit der [ETH.GetAdjective]-Armee den Sieg davontragen."
 ETH_the_heroes_of_adwa_idea:0 "Die Helden von Adwa"
 ETH_the_heroes_of_adwa_idea_desc:0 "Kaiser Menelik besiegte die italienischen Invasoren in der Schlacht von Adua. An diesem Tag zeigten wir der Welt, wozu unsere Armeen fähig sind, und vertrieben die Kolonialisten aus unserem Land. Wir haben es einmal geschafft, und wir können es wieder schaffen."
 ETH_taxed_nobility_idea:0 "Besteuerter Adel"
 ETH_on_our_own_idea:0 "Auf eigene Faust"
 ETH_on_our_own_idea_desc:0 "Die internationale Gemeinschaft hat im Konflikt zwischen [ITA.GetName] und [ETH.GetName] Stellung bezogen und beschlossen, dass sich keine anderen Länder einmischen sollten. [ETH.GetName] steht in dieser verzweifelten Stunde allein da."
