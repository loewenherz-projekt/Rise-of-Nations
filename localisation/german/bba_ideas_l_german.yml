 ITA_cantieri_navali_tosi:0 "Cantieri Navali Tosi"
 ITA_imam:0 "IMAM"
 ITA_crda_cant:0 "CRDA-CANT"
 ITA_fiat_aviazione:0 "Fiat Aviation"
 ITA_brescia_arsenal:0 "Brescia Arsenal"
 ITA_officine_meccaniche:0 "Officine Meccaniche"
 ITA_ferrovie_dello_stato_italiane:0 "Ferrovie dello Stato Italiane"
