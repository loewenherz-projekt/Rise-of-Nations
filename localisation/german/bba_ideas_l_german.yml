 ITA_terni_industria_ed_elettricita:0 "Terni Industria ed Elettricità"
 ITA_italcementi:0 "Italcementi"
 ITA_astaldi:0 "Astaldi"
 ITA_ducati_energia:0 "Ducati Energia"
 ITA_northern_designer_tt:1 "Dieser Designer befindet sich in Norditalien. Durch das Abschließen der Schwerpunkte „§Y$ITA_strengthen_northern_industry$§!“ und „§Y$ITA_new_industrialization_program$§!“ wird der Designer verbessert."
 ITA_southern_designer_tt:1 "Dieser Designer befindet sich in Süditalien. Durch das Abschließen der Schwerpunkte „§Y$ITA_modernize_the_mezzogiorno$§!“ und „§Y$ITA_new_industrialization_program$§!“ wird der Designer verbessert."
 ITA_northern_designer_improved_tt:0 "§YDieser Northern-Designer wurde bereits verbessert§!."
 ITA_southern_designer_improved_tt:0 "§YDieser Südstaaten-Designer wurde bereits verbessert§!."
 ITA_has_crda_tt:0 "Hat Schiffsdesigner §Y$crda$§!"
 ITA_has_fiat_tt:0 "Hat Panzerdesigner §Y$fiat$§!"

 ITA_italian_highways_modifier:0 "$ITA_italian_highways_bba$"
 ITA_libyan_railway_modifier:0 "Libysche Eisenbahn"
 ITA_pacified_italian_east_africa_modifier:0 "Befriedetes Italienisch-Ostafrika"
 ITA_fronte_militare_clandestino_modifier:0 "$ITA_fronte_militare_clandestino$"
 ITA_cooperatives_for_intensive_exploitation_dm:0 "$ITA_Genossenschaften_für_intensive_Ausbeutung$"
 ITA_anti_colonialism_sentiment:0 "Antikolonialismus-Stimmung"
 ITA_mafia_on_the_rise:0 "Mafia auf dem Vormarsch"
