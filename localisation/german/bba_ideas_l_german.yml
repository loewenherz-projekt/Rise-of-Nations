 ITA_regia_aeronautica_dynamic_modifier_desc:1 "Der jüngste Zweig der italienischen Streitkräfte zählte bei seiner Gründung zu den stärksten Luftwaffen der Welt, hinkte in letzter Zeit jedoch hinterher. Durch Investitionen in unsere Luftwaffe kann sie wieder zum Neidobjekt der Welt werden."
