 ITA_italia_irredenta_achieved:0 "Italia Irredenta erreicht"
 AOI_africa_orientale_italiana_idea:0 "Africa Orientale Italiana"
 ITA_banda_carita_non_la_resistance:0 "Banda Carità"
 ITA_ALB_italian_settlers:0 "Zustrom italienischer Siedler"
 ITA_dodecanese_treaty_idea:0 "Der Dodekanes-Vertrag"
 ITA_italys_destiny_idea:0 "Italiens Schicksal"
 ITA_vento_aureo:0 "Der goldene Wind"

 ITA_shadow_of_mussolini:0 "Der Schatten Mussolinis"
 ITA_shadow_of_mussolini_desc:1 "Auch wenn Mussolini entmachtet wurde, ist es schwer, seinem Schatten zu entkommen, da er die italienische Politik noch immer überschattet."
 ITA_divino_duce_1:0 "Divino Duce"
 ITA_divino_duce_1_desc:1 "Dank des starken Personenkults um [ITA.GetLeader] wird das italienische Volk niemals in seiner Loyalität gegenüber seinem Duce nachlassen oder brechen. Es wird jede Härte, die ihm auferlegt wird, mit Leichtigkeit ertragen und niemals aufgeben."
 ITA_divino_duce_2:0 "$ITA_divino_duce_1$"
 ITA_divino_duce_2_desc:1 "$ITA_divino_duce_1_desc$"
 ITA_italian_hegemony_master_1:0 "Italienische Hegemonie"
 ITA_italian_hegemony_master_1_desc:1 "Als Geburtsort des Faschismus ist unser Ziel klar: Wir wollen ihn beschützen und weithin verbreiten. Wir werden jedem Volk, das unter unsere Herrschaft kommt, ein Gefühl der Pflicht und Loyalität gegenüber dem faschistischen System vermitteln."
 ITA_italian_hegemony_master_2:0 "$ITA_italian_hegemony_master_1$"
 ITA_italian_hegemony_master_2_desc:0 "$ITA_italian_hegemony_master_1_desc$"
 ITA_italian_hegemony_master_3:0 "$ITA_italian_hegemony_master_1$"
 ITA_italian_hegemony_master_3_desc:0 "$ITA_italian_hegemony_master_1_desc$"
 ITA_italian_hegemony_subjects:0 "Italienische Hegemonie"
 ITA_italian_hegemony_subjects_desc:1 "Vereint unter der Hegemonie von [ITA.GetNameDef] sind wir die Beschützer des Faschismus und agieren als Bastion der Wahrheit und Aufklärung. Niemand und nichts wird uns im Weg stehen!"
 ITA_prioritizing_the_military:0 "Priorisierung des Militärs"
 ITA_prioritizing_the_military_desc:1 "Durch die Umleitung von Geldern und Ressourcen aus anderen Bereichen können wir uns auf unsere Streitkräfte konzentrieren. Zwar werden bestimmte Bereiche kurzfristig darunter leiden, doch langfristig werden wir davon profitieren."
 ITA_impero_italiano:0 "Impero Italiano"
 ITA_impero_italiano_desc:1 "Die Ausrufung des italienischen Kaiserreichs hat unsere Truppen ermutigt und unsere Ansprüche in Afrika legitimiert."
 ITA_novus_ordo_modifier:0 "Novus Ordo"
 ITA_expanded_corporatism_modifier:0 "Erweiterter Korporatismus"





### Switzerland ###
 SWI_spirit_of_resistance_idea:0 "Schweizer Widerstandsgeist"
 SWI_swiss_neutrality:0 "Schweizer Neutralität"
 SWI_werner_risch:0 "Werner-Risch"
 SWI_eidgenossische_FW:0 "Eidgenössische F+W"
 SWI_eidgenossische_KW:0 "Eidgenössische K+W"
 SWI_eidgenossische_WF:0 "Eidgenössische W+F"
 SWI_sig:0 "SIG"
 SWI_oerlikon:0 "Oerlikon"
 SWI_saurer:0 "Saurer"
 SWI_Berna:0 "Berna"
 SWI_buero_ha_idea:0 "Buero Ha"
 SWI_expanded_spy_network_idea:0 "Erweitertes Spionagenetzwerk"
 SWI_spirit_of_saint_bernard_idea:0 "Geist des Heiligen Bernhard"
 SWI_spirit_of_saint_bernard_idea_tooltip:2 "Feldlazarett-Rückfluss: §G+20%§!\nExp.-Verlustfaktor: §G-30%§!"
 SWI_mountaineer_paratroopers_idea:0 "$SWI_mountaneer_paratroopers$"
 SWI_mountaineer_paratroopers_idea_desc:0 "Der Zugang zu einigen der steilsten Gipfel und die jahrhundertealte Alpenkultur verschaffen den Schweizer Fallschirmjägern einen Vorteil gegenüber allen anderen Luftlandetruppen. Sie können aus unseren Transportflugzeugen absteigen und Berggipfel erobern, als wären sie auf dem Monte Rosa oder dem Matterhorn."
 SWI_mountaineer_paratroopers_idea_TT:0 "§YBerge§!:\n Angriff: §G+35%§!\n Verteidigung: §G+10%§!\n Bewegung: §G+20%§!\n§YHügel§!:\n Angriff: §G+20%§!\n Verteidigung: §G+5%§!\n Bewegung: §G+10%§!"
 SWI_air_production_ns:0 "Schweizer Flugzeugproduktion"
 SWI_air_production_ns_desc:0 "Unsere Fabriken sind darauf ausgerichtet, Flugzeuge so schnell wie möglich zu produzieren, damit wir mit der Fähigkeit unserer Nachbarn, Luftkrieg zu führen, gleichziehen können."
 SWI_federal_police_idea:0 "Nachrichtendienst der Schweizerischen Bundespolizei"
 SWI_federal_police_idea_no_lar:0 "$SWI_federal_police_idea$"
 SWI_federal_police_idea_no_lar_2:0 "$SWI_federal_police_idea$"
 SWI_infiltrated_federal_police_idea:0 "Infiltrierte Bundespolizei"
 SWI_infiltrated_federal_police_idea_no_lar:0 "$SWI_infiltrierte_Bundespolizei-Idee$"
 SWI_infiltrated_federal_police_idea_desc:0 "Faschistische Elemente haben die Bundespolizei und ihren Geheimdienst infiltriert. Man kann gar nicht sagen, auf welche Weise sie unserem faschistischen Nachbarn dabei helfen, die [SWI.GetName]-Gesellschaft zu infiltrieren."
 SWI_pro_helvetia_idea:0 "Pro Helvetia"
 SWI_pro_helvetia_idea_desc:0 "Damit die Schweiz überleben kann, muss sie sich von den Sprachen, die sie spricht, unterscheiden. Deshalb hat Pro Helvetia die Aufgabe, die Schweizer Werte und das damit verbundene Engagement für die Demokratie zu fördern."
 SWI_martial_law_idea:0 "Kriegsrecht"
 SWI_martial_law_idea_desc:0 "Gefährliche Zeiten erfordern gefährliche Maßnahmen. Das Militär muss die Ordnung und Stabilität gewährleisten. Mit etwas Glück kann [ROOT.GetAdjective] eines Tages wiederhergestellt werden."
 SWI_extensive_press_censorship_idea:0 "Umfangreiche Pressezensur"
 SWI_active_trade_agreement:0 "Lieferungen aus Handelsabkommen"
 SWI_trading_with_switzerland_military:0 "Import von Kriegsprodukten aus der Schweiz"
 SWI_trading_with_switzerland_civilian:0 "Import ziviler Produktion aus der Schweiz"
 SWI_no_confederation_president_idea:0 "Kein Präsident der Konföderation gewählt"
 SWI_no_confederation_president_idea_desc:0 "Das Undenkbare ist geschehen: Der Bundesrat hat es nicht geschafft, einen Bundespräsidenten zu wählen. Es wird viel Mühe kosten, aus dieser Situation herauszukommen."
 SWI_foreign_fascist_propaganda:0 "Ausländische faschistische Propaganda"
 SWI_foreign_fascist_propaganda_desc:0 "Obwohl es in [SWI.GetName] keine große einheimische faschistische Bewegung gibt, sind unsere faschistischen Nachbarn erpicht darauf, unsere Konföderation von innen heraus zu zerreißen, und zwar mit einer fünften Kolonne und Propagandaoperationen in jedem Kanton, insbesondere aber in den [GER.GetAdjective]- und [ITA.GetAdjective]-sprachigen."
 SWI_extensive_fascist_propaganda:0 "Umfangreiche faschistische Propaganda"
 SWI_extensive_fascist_propaganda_desc:0 "Früher kam die faschistische Propaganda in der Schweiz von außen, doch die Bewegung hat genug Schwung gewonnen, um das Land mit faschistischer Propaganda aus dem In- und Ausland zu überschwemmen."
 SWI_rearmaming_idea:0 "Laufende Wiederbewaffnung"
 SWI_increased_defense_budget:0 "Erhöhung des Verteidigungsbudgets"
 SWI_war_bonds:0 "Kriegsanleihen"
 SWI_banned_foreign_nazi_propaganda_idea:0 "Verbotene ausländische Nazi-Propaganda"
 SWI_banned_foreign_nazi_propaganda_idea_desc:0 "Der Nationalsozialismus hat in einer Gesellschaft wie der unseren keinen Platz. Deshalb können wir die Verbreitung einer Ideologie, die das Grundgerüst unserer Konföderation bedroht, nicht zulassen, ganz zu schweigen von Propaganda aus einem anderen Land."
 SWI_rearmed_idea_industrial:0 "Wiederbewaffnete Schweiz"
 SWI_army_limitations_TT:3 "§RKann keine regulären Streitkräfte außerhalb von Bürgermilizen ausbilden und kann keine bestehenden Vorlagen außerhalb der Entscheidungen zur militärischen Bereitschaft bearbeiten§!\n\n§YDie Schweiz§! ist darauf angewiesen, dass ihre Zivilbevölkerung bei Bedarf zu den Waffen greift. Es kann nur eine begrenzte Anzahl von Milizen ausgebildet werden, deren §YOrganisation§! zunächst begrenzt ist.\n\nSobald der Fokus §Y$SWI_bewaffnete_Neutralität$§! abgeschlossen ist, können die Milizen erweitert, verbessert und schließlich mit der Entscheidung §Y$SWI_Miliz_aktivieren$§! eingesetzt werden. Während des Einsatzes der Milizen summieren sich die Strafen für die Schweizer Wirtschaft mit der Zeit, werden aber nach der Abberufung zurückgesetzt."
 SWI_citizen_militia_1:0 "Schweizer Bürgermilizen"
 SWI_citizen_militia_1_desc:0 "Anders als in den meisten anderen Ländern wird in der Schweiz von jeder Person, die die Rekrutierungskriterien erfüllt, erwartet, dass sie bei Bedarf in der örtlichen Miliz zu den Waffen greift. Dies ermöglicht es uns, einen großen Prozentsatz der Bevölkerung in Reserve zu halten, ohne dass dies größere Folgen für unsere Wirtschaft hat, solange sie nicht eingesetzt werden.\n"
 SWI_citizen_militia_2:0 "Erweiterte Schweizer Bürgermilizen"
 SWI_citizen_militia_2_desc:0 "$SWI_citizen_militia_1_desc$"
 SWI_spirit_of_helvetia_passive_peace:0 "Passiver Geist von Helvetia"
 SWI_spirit_of_helvetia_passive_war:0 "$SWI_spirit_of_helvetia_passive_peace$"
 SWI_spirit_of_helvetia_defensive_peace:0 "Verteidigungsgeist von Helvetia"
 SWI_spirit_of_helvetia_defensive_war:0 "$SWI_spirit_of_helvetia_defensive_peace$"
 SWI_spirit_of_helvetia_aggressive_peace:0 "Aggressiver Geist von Helvetia"
 SWI_spirit_of_helvetia_aggressive_war:0 "$SWI_spirit_of_helvetia_aggressive_peace$"
 SWI_frontier_defense_plan_idea_1:0 "Grenzverteidigungsplan"
 SWI_infrastructure_rigged_to_blow:0 "Infrastruktur zum Explodieren gebracht"
 SWI_infrastructure_rigged_to_blow_desc:0 "Wir können nicht zulassen, dass der Feind unsere hart erarbeitete Infrastruktur und Industrie gegen uns einsetzt. Wir sind bereit, alles in die Luft zu jagen, sobald der Feind die Kontrolle darüber übernimmt."
 SWI_aktion_nationaler_widerstand_idea:0 "Aktion Nationaler Widerstand"
 SWI_aktion_nationaler_widerstand_idea_desc:0 "Eine geheime Gruppe von Zivilisten, die alle Facetten der Schweizer Gesellschaft repräsentieren und entschlossen sind, die Werte der Schweiz zu fördern und den Grundstein für den Widerstand zu legen, falls das Schlimmste eintritt."
 SWI_old_switzerland_idea:0 "Rückkehr in die alte Schweiz"
 SWI_old_switzerland_idea_desc:0 "Nach einer langen Zeit grausamer Kriege und unmoralischer Expansion fordert das Volk von [ROOT.GetName] nichts weniger als eine Rückkehr zur Neutralität und Demokratie der Vorkriegszeit. Diese turbulenten Zeiten werden bald vorbei sein."
 SWI_extended_supply_lines_idea:0 "Erweiterte Versorgungsleitungen"
 SWI_extended_supply_lines_idea_desc:0 "Wir haben unsere Logistik verbessert, sodass wir unsere Versorgungsleitungen weiter ausdehnen und schneller als je zuvor neue bauen können."
 SWI_expanded_special_forces:0 "Erweiterte Spezialkräfte"
 SWI_swiss_women_in_the_military:0 "Schweizer Frauen in der Armee"
 SWI_volunteer_forces_idea:0 "Freiwilligenkräfte"
 SWI_volunteer_forces_idea_desc:0 "Obwohl [SWI.GetNameDef] gemäß unserer üblichen Politik offiziell nicht an einem Konflikt beteiligt ist, erlauben wir die Teilnahme als Freiwillige und ermutigen sie insgeheim dazu, insbesondere wenn es um die Verteidigung der Demokratie geht."
 SWI_frozen_assets:0 "Von der Schweiz eingefrorene Vermögenswerte"
 SWI_frozen_assets_desc:0 "Nachdem wir jahrelang auf das Schweizer Bankwesen angewiesen waren, haben sie ihre wahren Absichten gezeigt und uns durch die Einfrierung unserer Vermögenswerte in den Rücken gefallen! Wir werden uns finanziell davon erholen, aber es wird einige Zeit dauern."
 SWI_intel_support_idea:0 "Geheimdienstunterstützung"
 SWI_communist_party_banned_idea:0 "Kommunismus verboten"
 SWI_alpine_redoubt_dynamic_modifier:0 "$SWI_alpine_redoubt$"
 SWI_democratic_unrest:0 "Demokratische Unruhen"
 SWI_democratic_unrest_desc:0 "Nach einem Jahrhundert direkter Demokratie wird das [ROOT.GetAdjective]-Volk über die aktuelle politische Lage von [ROOT.GetName] nicht schweigen."
 SWI_resistance_groups_funded_by_foreign_country:0 "Widerstandsgruppen werden vom Ausland finanziert"
 SWI_gold_trade_with_switzerland:0 "Schweizer Goldhandel"
 SWI_swiss_gold_market:0 "Schweizer Goldmarkt"
 SWI_seized_gold:0 "Beschlagnahmtes Gold"
