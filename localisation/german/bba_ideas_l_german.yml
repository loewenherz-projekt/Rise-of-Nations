 ITA_ricostruzione_industriale_dynamic_modifier:0 "Ricostruzione Industriale"
 ITA_ricostruzione_industriale_dynamic_modifier_desc:1 "Unsere Bemühungen, unsere heimische Industrie nach der Weltwirtschaftskrise zu retten, haben sich als erfolgreich erwiesen. Wenn wir noch stärker in Italiens industrielle Kapazitäten investieren, wird unsere Produktivität bald mit der der Großmächte konkurrieren können."
 ITA_military_industry_dynamic_modifier:0 "Militärindustrie"
 ITA_military_industry_dynamic_modifier_desc:1 "Unser heimischer Militärkomplex ist sowohl in Produktivität als auch Technologie hinter unsere Konkurrenten zurückgefallen. Wir müssen Italiens Rüstungsindustrie stärken, wenn wir wollen, dass unsere Streitkräfte auf den Schlachtfeldern erfolgreich sind."
