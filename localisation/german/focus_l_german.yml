 ITAB_il_vento_aureo:0 "Il Vento Aureo"
 ITAB_il_vento_aureo_desc:0 "Lange wurde das Papsttum von ausländischen Mächten unterdrückt. Wir können jedoch unsere Luftwaffen- und Kampfflugzeugausbildung optimieren, um deutlich günstigere und dennoch mutigere Piloten auszubilden und unseren Feinden die goldene Herrschaft der katholischen Kirche vom Himmel zu bringen. Dies wird unser größtes Requiem sein!"
 form_greater_italy_tt:0 "Schaltet Entscheidung frei: §YGroßitalien ausrufen§!"
 ITAB_papal_faction:0 "Das katholische Dominion"
 ITAB_roman_faction:0 "Imperium Romanum"
 ITAB_latin_initiatives:0 "Die lateinische Initiative"

 ITAB_depose_mussolini:0 "Mussolini absetzen"
 ITAB_depose_mussolini_desc:0 "Es ist an der Zeit, Mussolini zu stürzen! Er hat sich als inkompetenter Führer erwiesen, der unser geliebtes Italien durch viele unnötige Härten gezerrt und seine Widerstandsfähigkeit weit über die Belastungsgrenze hinaus auf die Probe gestellt hat. Auch wenn sein Schatten noch lange über uns schweben wird, werden Italien und sein Volk siegen!"
 ITAB_italo_balbo_focus:0 "Italo Balbo"
 ITAB_italo_balbo_focus_desc:0 "Wir brauchen einen fähigen Militärführer, der uns durch die turbulenten Zeiten führt, die vor uns liegen. Italo Balbo ist nicht nur ein Militärführer, sondern auch ein Held der Luftfahrt, der mehrere diplomatische Missionen unternommen und unsere libyschen Besitzungen erfolgreich regiert hat. Er wird den dürftigen Zustand unseres Militärs sicherlich verbessern und Italien zu Ruhm verhelfen!"
 ITAB_remove_balbo_as_advisor_tt:0 "§YItalo Balbo§! wird nicht mehr als §YBerater§! oder §YFeldmarschall§! verfügbar sein."
 ITAB_dino_grandi_focus:0 "Dino Grandi"
 ITAB_dino_grandi_focus_desc:0 "Wir brauchen jemanden, der diplomatisch versiert ist und keine Angst davor hat, alte Institutionen umzustrukturieren, wenn wir erfolgreich sein wollen. Dino Grandi war Außenminister und reformierte die diplomatische Klasse, indem er sie auch anderen Bürgern als dem Adel zugänglich machte. Er wird sich nicht scheuen, die notwendigen Reformen durchzuführen und Italien in eine neue, strahlende Zukunft zu führen!"
 ITAB_remove_grandi_as_advisor_tt:0 "§YDino Grandi§! wird nicht mehr als §YAdvisor§! verfügbar sein."
 ITAB_has_new_duce_flag:0 "Wurde vom §YGroßen Rat§! abgesetzt."
 ITAB_stop_the_squandering:0 "Stoppen Sie die Verschwendung"
 ITAB_stop_the_squandering_desc:0 "Mussolini hat schon viel zu lange Geld und Ressourcen verschwendet, die sich Italien kaum leisten kann. Es ist Zeit, dieser rücksichtslosen Verschwendung ein Ende zu setzen! Wir müssen unsere Ausgaben einschränken und unser Kapital auf die Verbesserung anderer Bereiche konzentrieren."
 ITAB_consolidate_power:0 "Konsolidieren Sie Ihre Macht"
 ITAB_consolidate_power_desc:0 "Unser Einfluss auf die Partei und das Land insgesamt ist nach wie vor schwach. Wir müssen unsere Macht festigen und unser Regime stärken, indem wir der Öffentlichkeit zeigen, dass wir so stark und verlässlich sind wie nie zuvor!"
 ITAB_purge_the_party:0 "Säubere die Partei"
 ITAB_purge_the_party_desc:0 "Gerüchte haben uns zu Ohren gekommen, dass manche sich nichts sehnlicher wünschen, als das alte Regime wieder einzusetzen. Obwohl Mussolini gestürzt und entmachtet wurde, ist sein Schatten in der Regierung und in den Köpfen der Bevölkerung allgegenwärtig. Wir müssen Stärke demonstrieren und die Partei von Elementen säubern, die uns nicht wirklich treu sind, aber dem alten Duce treu ergeben bleiben."
 ITAB_the_fate_of_mussolini:0 "Das Schicksal Mussolinis"
 ITAB_the_fate_of_mussolini_desc:0 "Solange Mussolini unter Hausarrest steht, können wir angesichts seiner ständigen Präsenz nicht wirklich vorankommen. Wir haben unsere Position als wahre Macht innerhalb der Partei gesichert, und nun ist es an der Zeit, über das Schicksal des ehemaligen Duce zu entscheiden!"
 ITAB_divino_duce:0 "Divino Duce"
 ITAB_divino_duce_desc:0 "Es ist deutlich geworden, welchen Einfluss eine einzelne Person auf ein Land und seine Bevölkerung haben kann. Vielleicht ist das etwas, das wir nutzen und adaptieren können. Über unsere staatlichen Kanäle können wir unseren neuen Duce als starken und fähigen Führer präsentieren, der Italien einen kann. Wir geben dem Volk einen überlebensgroßen Menschen, an den es glauben kann – einen göttlichen Menschen, dem es vertrauen kann!"
 ITAB_blackshirt_loyalty:0 "Gewinnen Sie die Loyalität des Schwarzhemdes"
 ITAB_blackshirt_loyalty_desc:0 "Die Schwarzhemden nehmen seit langem einen besonderen Platz im italienischen Faschismus ein. Wenn wir die Bevölkerung inspirieren wollen, sollten wir uns die Loyalität dieser Organisation sichern. Sie wären äußerst nützlich, um die göttliche Vision des glorreichen neuen Duce in den Streitkräften und darüber hinaus zu verbreiten."
 ITAB_a_greater_purpose:0 "Ein höherer Zweck"
 ITAB_a_greater_purpose_desc:0 "Die jüngsten innerparteilichen Auseinandersetzungen haben uns gezeigt, wie fehlerhaft es ist, die Idee des Faschismus zu eng an eine einzelne Person zu binden. Wir sollten uns darauf konzentrieren, den Faschismus als ein größeres Konzept zu fördern, etwas, das über das sterbliche Leben eines einzelnen Menschen hinausgeht – eine Idee, hinter der sich die Menschen versammeln können."
 ITAB_spreading_the_eagles_wings:0 "Die Flügel des Adlers ausbreiten"
 ITAB_spreading_the_eagles_wings_desc:0 "Überall um uns herum zerfallen und scheitern andere Ideologien. Es scheint, als habe nur der Faschismus dem Ansturm dieser turbulenten Ereignisse standgehalten und sogar gedeihen können. Es ist unsere Pflicht, diese Stabilität auch anderen Nationen zu bringen; ihnen in diesen dunklen Zeiten ein Licht zu sein!"
 ITAB_italian_hegemony:0 "Italienische Hegemonie"
 ITAB_italian_hegemony_desc:0 "In einer vom Krieg zerrissenen Welt müssen wir die verschiedenen Nationen und Kulturen unter unserer Herrschaft inspirieren und vereinen, um ihnen zu zeigen, wie sie vom Faschismus und [ROOT.GetNameDefCap] profitieren. Wir müssen den Weg in eine bessere Zukunft weisen!"
 ITAB_reorganize_regio_esercito:0 "Reorganisieren Sie Regio Esercito"
 ITAB_reorganize_regio_esercito_desc:0 "Mit einer neuen Führung kommen neue Erkenntnisse. Jedem, der sich die Mühe macht, genauer hinzuschauen, ist klar, dass unsere siegreiche Armee durchaus noch Verbesserungspotenzial hat. Mit den frei gewordenen Ressourcen sollten wir in mehr Ausbildung investieren und die Streitkräfte neu organisieren, damit ihnen nichts im Wege steht!"
 ITAB_reinforce_regia_aeronautica:0 "Verstärkung der Regia Aeronautica"
 ITAB_reinforce_regia_aeronautica_desc:0 "Die Regia Aeronautica wird weltweit respektiert und beneidet, doch es gibt noch Verbesserungspotenzial. Mit mehr verfügbaren Ressourcen sollten wir in Ausrüstung und Ausbildung investieren, um sie zur gefürchtetsten Luftwaffe zu machen!"
 ITAB_compagnie_auto_avio_sahariane:0 "Erweitern Sie die Compagnie Auto Avio Sahariane"
 ITAB_compagnie_auto_avio_sahariane_desc:0 "Die Auto-Saharan-Kompanien in Libyen haben sich in Kombination mit ihren eigenen Aufklärungsflugzeugen als äußerst effektiv erwiesen. Die Weiterentwicklung dieses Konzepts sollte unsere Streitkräfte noch schlagkräftiger machen und unseren Feinden Furcht einjagen!"
 ITAB_combined_land_and_air_warfare:0 "Kombinierte Land- und Luftkriegsführung"
 ITAB_combined_land_and_air_warfare_desc:0 "Die Unterstützung der Regia Aeronautica durch die Regio Esercito hat die Fähigkeiten des italienischen Militärs unter Beweis gestellt, aber es gibt noch Raum für Verbesserungen! Eine Vertiefung dieser Zusammenarbeit würde unsere Feinde auf dem Schlachtfeld vernichten und Italien ewigen Ruhm bringen!"
 ITAB_the_fourth_shore:0 "Das vierte Ufer"
 ITAB_the_fourth_shore_desc:0 "Libyen wird oft als Italiens vierte Küste bezeichnet und ist ein wesentlicher Bestandteil der Zukunft unseres Landes. Es ist die nächstgelegene Kolonie und eine der wertvollsten, da es als Bindeglied zum Rest des afrikanischen Kontinents dient. Indem wir hier Ressourcen investieren, sichern wir unsere Übersee-Bestände und werden in Zukunft reichlich davon profitieren."
 ITAB_oil_in_tripoli:0 "Öl in Tripolis"
 ITAB_oil_in_tripoli_desc:0 "Wir haben in Libyen Gold gefunden – schwarzes Gold! In den Wüsten vor Tripolis haben wir riesige Ölreserven entdeckt. Eine solche Gelegenheit dürfen wir uns nicht entgehen lassen, sondern müssen diese Vorkommen zum Ruhm Italiens nutzen!"
 ITAB_steel_in_tripoli:0 "Stahl in Tripolis"
 ITAB_steel_in_tripoli_desc:0 "In den Wüsten vor Tripolis scheint eine große Menge Eisen vergraben zu sein, die nur darauf wartet, von uns ausgegraben und verarbeitet zu werden. Durch den Bau eines Stahlwerks in der Nähe könnten wir den Stahl für den Ausbau unserer ruhmreichen Streitkräfte nutzen!"
 ITAB_novus_ordo:0 "Novus Ordo"
 ITAB_novus_ordo_desc:0 "Das Schicksal Italiens ist eng mit Libyen verknüpft, und deshalb müssen wir es noch stärker in unser Machtgebiet integrieren. Dies könnte erreicht werden, indem wir jedem Libyer, der bereit ist, für uns zu kämpfen, eine „Sonderbürgerschaft“ anbieten und so unsere Kontrolle über das Mittelmeer und Nordafrika sichern."
 ITAB_seek_british_military_cooperation:0 "Streben Sie nach britischer militärischer Zusammenarbeit"
 ITAB_seek_british_military_cooperation_desc:0 "Obwohl wir im letzten Krieg von unseren ehemaligen Verbündeten verraten wurden, könnte es dennoch sinnvoll sein, über unseren Groll hinauszublicken und ein Friedensangebot zu machen. Wir können viel von den Briten lernen, insbesondere was ihre Marine und Luftwaffe betrifft."
 ITAB_anglo_italian_pact:0 "Unterzeichnen Sie den Anglo-Italienischen Pakt"
 ITAB_anglo_italian_pact_desc:0 "Die militärische Zusammenarbeit mit Großbritannien hat uns gute Dienste geleistet, und ein Nichtangriffspakt würde uns ebenfalls zugutekommen. Ein solcher Pakt würde große Teile unserer afrikanischen Besitztümer sichern und uns ermöglichen, unseren Blick auf andere Gebiete zu richten."
 ITAB_invite_france_to_military_partnership:0 "Laden Sie Frankreich zu einer militärischen Partnerschaft ein"
 ITAB_invite_france_to_military_partnership_desc:0 "Frankreich ist der stärkste unserer unmittelbaren Nachbarn und ein alter Verbündeter. Wir werden den Verrat im letzten Krieg zwar nicht vergessen, können aber vergeben. Vielleicht ist es an der Zeit, alten Groll hinter uns zu lassen und unser Militär durch eine enge Partnerschaft zu stärken."
 ITAB_franco_italian_pact:0 "Unterzeichnen Sie den französisch-italienischen Pakt"
 ITAB_franco_italian_pact_desc:0 "Die militärische Zusammenarbeit mit Frankreich ist von großem Wert, ebenso wie ein Nichtangriffspakt. Wir würden nicht nur unsere Westflanke in Europa sichern, sondern auch große Teile unserer afrikanischen Besitztümer, was uns die Freiheit gäbe, uns auf andere Bereiche zu konzentrieren."
 ITAB_proclaim_the_italian_empire:0 "Proklamation des italienischen Kaiserreichs"
 ITAB_proclaim_the_italian_empire_desc:0 "Mit unseren jüngsten Errungenschaften in Afrika bricht ein neuer Tag an. Mit einem wachsenden Imperium und klugen Investitionen in unser Militär sind wir kein bloßes Königreich mehr; wir sind endlich zuversichtlich, den Beginn des italienischen Imperiums zu verkünden! Lange haben wir auf diesen Moment gewartet!"
 ITAB_italy_will_guarantee_tt:0 "[GetItalyGuaranteesMajor]"
 ITAB_italy_will_guarantee_tt_standard:1 "§Y[ROOT.GetNameDefCap]§! §Ygarantiert§! jedem §Ygroßen Land§!, das §Y[ROOT.GetNameDefCap]§! garantiert."
 ITAB_italy_will_guarantee_tt_fulfilled:1 "§Y[ROOT.GetNameDefCap]§! §Ygarantiert§! jedem §Ygroßen Land§!, das §Y[ROOT.GetNameDefCap]§! garantiert. Aktuelle Auswirkung:"
 ITAB_african_conquests_tt:0 "Mit unserem aufstrebenden Imperium wird es „weniger kostspielig“ sein, Gebiete auf dem „afrikanischen Kontinent“ zu „annektieren“."
 ITAB_economic_reforms:0 "Wirtschaftsreformen"
 ITAB_economic_reforms_desc:0 "Unter dem alten Regime stagnierte die Wirtschaft weitgehend, doch mit einer verjüngten Partito Nazionale Fascista sind wir bestens gerüstet, diese gewaltige Aufgabe in Angriff zu nehmen! Wir können nun kompetente Leute ernennen, die für die Wiederbelebung der Wirtschaft qualifiziert sind."
 ITAB_improve_the_industries:0 "Verbessern Sie die Branchen"
 ITAB_improve_the_industries_desc:0 "Mit einer wiederbelebten Wirtschaft verfügen wir nun über die Mittel, uns auf unsere Industrien zu konzentrieren und auch dort weitreichende Reformen durchzuführen. Eine effizientere Industrie wird sicherlich dazu führen, dass unsere siegreichen Streitkräfte schneller mit mehr Ausrüstung versorgt werden."
 ITAB_reorganize_the_party:0 "Reorganisieren Sie die Partei"
 ITAB_reorganize_the_party_desc:0 "Der Partito Nazionale Fascista ist zu einer trägen und schwerfälligen Institution geworden, voller Intrigen und Selbstverherrlichung. Mit einem festeren Griff um die Partei können wir nun beginnen, sie von Grund auf neu zu organisieren und sie effizienter und dynamischer zu machen."
 ITAB_meritocracy:0 "Meritokratie"
 ITAB_meritocracy_desc:0 "Nachdem wir die Opposition in unseren Reihen besiegt haben, können wir nun verschiedene Institutionen für Mitglieder außerhalb der Faschistischen Partei öffnen. Dies dürfte neue und spannende Ideen und auch neue Möglichkeiten hervorbringen."
 ITAB_expanded_corporatism:0 "Erweiterter Korporatismus"
 ITAB_expanded_corporatism_desc:0 "Korporatismus ist eine grundlegende Idee des Faschismus und sollte in allen neu erworbenen Gebieten so weit wie möglich umgesetzt werden. Dazu müssten wir uns jedoch auf die lokalen Eliten und Talente verlassen und den Aufstieg in der faschistischen Hierarchie ermöglichen. Dies ist ein einfacher Weg, Loyalität und Effizienz in unserem neuen Herrschaftsgebiet zu fördern."


