l_german:

 WHILE_FOCUSING:0 "Wenn Sie sich darauf konzentrieren, treten die folgenden Effekte auf:\n$EFF$"
 generic_focus:0 "Nationaler Fokus"
 army_effort:0 "Armeeeinsatz"
 army_effort_desc:0 "Trotz der zunehmenden Möglichkeiten der Luft- und Seekriegsführung bleibt der Bodenkampf auch in den Kriegen von morgen von zentraler Bedeutung. Mit entsprechender Vorbereitung können wir die Hölle der Schützengräben vermeiden."
 equipment_effort:0 "Geräteaufwand"
 equipment_effort_desc:0 "Die Grenzen der Ausrüstung, die von Infanterie getragen werden kann, werden ständig erweitert. Wir werden uns darauf konzentrieren, unseren Truppen die beste verfügbare Ausrüstung zur Verfügung zu stellen."
 motorization_effort:0 "Motorisierungsbemühungen"
 motorization_effort_desc:0 "Mobilität und Schutz sind entscheidend für den sicheren Transport der Infanterie ins Feld und wieder hinaus. Wenn wir uns auf diese Entwicklungen konzentrieren, können wir schnell handeln."
 doctrine_effort:0 "Lehrbemühungen"
 doctrine_effort_desc:0 "Die militärischen Doktrinen, die den Bodenkampf im Ersten Weltkrieg bestimmten, sind überholt. Wir müssen unsere besten Köpfe mit der Aufgabe betrauen, das militärische Denken von morgen zu gestalten."
 equipment_effort_2:0 "Ausrüstungsaufwand II"
 equipment_effort_2_desc:0 "Wir werden unsere Bemühungen fortsetzen, sicherzustellen, dass unsere Infanterie- und Unterstützungstruppen mit der bestmöglichen Ausrüstung unserer Zeit ausgestattet sind."
 mechanization_effort:0 "Mechanisierungsbemühungen"
 mechanization_effort_desc:0 "Indem wir die Möglichkeiten der motorisierten Infanterie überdenken, können wir die Grenzen der heute konstruierbaren Fahrzeuge erweitern."
 doctrine_effort_2:0 "Lehrbemühung II"
 doctrine_effort_2_desc:0 "Das Schlachtfeld hat sich nicht nur in der Zwischenkriegszeit, sondern auch im Verlauf der jüngsten Konflikte verändert. Wir müssen unsere Doktrinen kontinuierlich neu bewerten, um dies widerzuspiegeln."
 equipment_effort_3:0 "Ausrüstungsaufwand III"
 equipment_effort_3_desc:0 "Anstatt ausländische Ausrüstung zu imitieren oder zu kaufen, sollten wir darauf abzielen, weltweit führend im Bereich Infanteriewaffen zu werden."
 armor_effort:0 "Rüstungsaufwand"
 armor_effort_desc:0 "Indem wir das anwenden, was wir bei der Mechanisierung unserer Infanterie gelernt haben, können wir auch unsere gepanzerten Fahrzeuge verbessern."
 special_forces:0 "Spezialeinheiten"
 special_forces_desc:0 "Wir brauchen Elitetruppen; Gebirgsjäger und Fallschirmjäger sollten unsere Priorität sein."
 aviation_effort:0 "Luftfahrtbemühungen"
 aviation_effort_tt:0 "Nicht genügend Bauplätze für §YAir Base§!"
 aviation_effort_desc:0 "Nirgendwo schreitet der technologische Fortschritt schneller voran als in der Luftkriegsführung. Die Luftfahrt ist ein Gebiet, das jede moderne Nation beherrschen muss."
 fighter_focus:0 "Kämpferfokus"
 fighter_focus_desc:0 "Luftkämpfe haben im Ersten Weltkrieg noch nicht stattgefunden. Wenn wir bei der Entwicklung von Kampfflugzeugen die Nase vorn haben, werden wir auch in Zukunft einen Vorteil haben."
 bomber_focus:0 "Bomberfokus"
 bomber_focus_desc:0 "Wenn die Menschen in Zukunft vom Schrecken der heutigen Kriege sprechen, wird Feuer, das vom Himmel regnet, eine zentrale Rolle spielen. Wir werden unser Bestes tun, um sicherzustellen, dass diese Geschichten auch von unseren Feinden erzählt werden."
 aviation_effort_2:0 "Luftfahrtbemühungen II"
 aviation_effort_2_desc:0 "Um unsere Luftwaffe gut in andere Zweige des Militärs zu integrieren, sind weitere Fortschritte in der Luftfahrt erforderlich."
 CAS_effort:0 "CAS-Aufwand"
 CAS_effort_desc:0 "Eine moderne Armee benötigt nicht nur am Boden, sondern auch in der Luft die Unterstützung durch Fahrzeuge."
 rocket_effort:0 "Raketenanstrengung"
 rocket_effort_desc:0 "Raketen- und Düsentriebwerke ermöglichen sowohl unbemannten als auch bemannten Schiffen beispiellose Geschwindigkeiten. Die Entwicklung dieser Technologien wird es uns ermöglichen, den Feind zu überraschen."
 NAV_effort:0 "NAV-Aufwand"
 NAV_effort_desc:0 "So wie die neue Seekriegsführung teilweise unter der Wasseroberfläche stattfindet, findet ein Teil davon in der Luft über dem Wasser statt."
 naval_effort:0 "Marinebemühungen"
 naval_effort_tt:0 "Nicht genügend Bauplätze für §YNaval Dockyards§!"
 naval_effort_desc:0 "Der Ausbau unserer Marine sollte unsere oberste Priorität sein. Alle verfügbaren Ressourcen sollten für neue Werften und die Erforschung leichter Überwasserschiffe eingesetzt werden."
 GER_naval_effort2:0 "Erweiterung der Werftanlagen"
 GER_naval_effort2_desc:0 "Um wirklich eine bemerkenswerte Marine wieder aufzubauen, müssen wir unsere Schiffsbaukapazitäten erheblich erweitern."
 flexible_navy:0 "Flexibles Marineblau"
 flexible_navy_desc:0 "Durch die Neugestaltung der Seekriegsführung unter Berücksichtigung der Fortschritte in der U-Boot-Technologie können wir feindliche Konvois effizient bekämpfen."
 large_navy:0 "Große Marine"
 large_navy_desc:0 "Die Anpassung unserer Marinedoktrinen an große Schiffe und die Gewährleistung der Sicherheit unserer Handelskonvois wird uns viel darüber beibringen, welche Art von Schiffen wir benötigen."
 submarine_effort:0 "U-Boot-Anstrengungen"
 submarine_effort_desc:0 "Der U-Boot-Krieg ist die spannendste Entwicklung in der Marine seit der Erfindung des Torpedoboots. Wir tun gut daran, uns nicht nur vor U-Booten zu schützen, sondern sie auch gegen feindliche Schiffe einzusetzen."
 cruiser_effort:0 "Kreuzeraufwand"
 cruiser_effort_desc:0 "Bevor wir uns auf die Erforschung fortgeschrittener Schlachtschiffe konzentrieren können, müssen die kleineren Kreuzer ersetzt werden."
 destroyer_effort:0 "Zerstörer-Anstrengung"
 destroyer_effort_desc:0 "Durch die Untersuchung der Konstruktion und des strategischen Einsatzes von U-Booten haben wir auch gelernt, wie wir diesen Strategien entgegenwirken können. Zerstörer werden dabei eine entscheidende Rolle spielen."
 capital_ships_effort:0 "Großkampfschiff-Anstrengung"
 capital_ships_effort_desc:0 "Die Nation mit den meisten Schlachtschiffen wird die Weltmeere beherrschen. Schlachtschiffe und Flugzeugträger repräsentieren die alte und die neue Seeüberlegenheit."
 industrial_effort:0 "Industrielle Anstrengungen"
 industrial_effort_desc:0 "Konzentrieren Sie alle unsere politischen Anstrengungen darauf, die zivile Industrie mit einem großen Sprung nach vorne aufzubauen."
 industrial_effort_2:0 "Industrielle Anstrengung II"
 industrial_effort_2_desc:0 "Mit eisernem Willen und einer unermüdlichen Arbeitsmoral können wir die Menschen zu einer weiteren großen industriellen Anstrengung mobilisieren."
 construction_effort:0 "Bauaufwand"
 construction_effort_tt:0 "Nicht genügend Bauplätze für §YCivilian Factories§!"
 construction_effort_desc:0 "Auch wenn weltweit ein Krieg droht, darf die zivile Industriekapazität nicht unterschätzt werden."
 production_effort:0 "Rüstungsanstrengungen"
 production_effort_tt:0 "Nicht genügend Bauplätze für §YMilitärfabrik§!"
 production_effort_desc:0 "Wer Traktoren bauen kann, kann auch Panzer bauen! Wir dürfen nicht zulassen, dass unsere militärische Produktionskapazität zurückbleibt."
 construction_effort_2:0 "Baumaßnahme II"
 construction_effort_2_desc:0 "Durch den weiteren Ausbau unserer Fabriken können wir die Produktion von Waren für den Handel und weitere Bauvorhaben beschleunigen."
 production_effort_2:0 "Rüstungsanstrengung II"
 production_effort_2_desc:0 "Der Versuch, zivile Fabriken für die Produktion militärischer Ausrüstung umzurüsten, ist ineffizient. Wir sollten uns jetzt auf die Vorbereitung der Rüstungsproduktion konzentrieren."
 production_effort_3:0 "Rüstungsanstrengung III"
 production_effort_3_desc:0 "Um den Bedarf an neuer Ausrüstung zu decken, sind kontinuierliche Anstrengungen zum Ausbau unserer Militärfabriken erforderlich."
 infrastructure_effort:0 "Infrastrukturaufwand"
 infrastructure_effort_desc:0 "Ein Land ohne angemessene Infrastruktur kann keine fortschrittlichen Projekte oder Bauvorhaben durchführen."
 infrastructure_effort_tt:0 "Nicht genügend Bauplätze für §YInfrastruktur§!"
 synth_oil_effort_tt:0 "Nicht genügend Bauplätze für §YSynthetische Raffinerie§!"
 infrastructure_effort_2:0 "Infrastrukturbemühungen II"
 infrastructure_effort_2_desc:0 "Der weitere Ausbau unserer Infrastruktur wird die für geheime Hightech-Projekte notwendigen Transport- und Kommunikationsmittel ermöglichen."
 construction_effort_3:0 "Baumaßnahme III"
 construction_effort_3_desc:0 "Durch den Ausbau unseres Infrastrukturnetzes haben wir unsere Baukapazitäten deutlich verbessert."
 nuclear_effort:0 "Nukleare Anstrengungen"
 nuclear_effort_desc:0 "Wir stehen am Rande einer weltverändernden Entdeckung und können nicht zulassen, dass andere das Feuer entfachen, das eines Tages die Erde verzehren könnte."
 extra_tech_slot:0 "Zusätzlicher Forschungsplatz"
 extra_tech_slot_desc:0 "Unsere industrielle Expansion und andere aktuelle Fortschritte könnten es uns ermöglichen, parallel mehr Forschung und Entwicklung durchzuführen."
 extra_tech_slot_2:0 "Zusätzlicher Forschungsplatz II"
 extra_tech_slot_2_desc:0 "Die schnelle Industrialisierung unseres Landes hat neue Möglichkeiten in Forschung und Entwicklung eröffnet, die wir nutzen sollten."
 technology_sharing:0 "Technologieaustausch"
 technology_sharing_desc:0 "Indem wir technologische Fortschritte mit unseren Verbündeten teilen, kann unsere gesamte Fraktion die Forschung und Entwicklung im Kriegsfall effizienter durchführen."
 secret_weapons:0 "Geheimwaffen"
 secret_weapons_desc:0 "Es ist verlockend, alle zusätzlichen Ressourcen in die Entwicklung von Panzern und Flugzeugen zu stecken, aber das Geheimnis, Kriege zu gewinnen, liegt in ganz neuen Wissenschaftsbereichen: Elektronik, Raketentechnik und Nuklearforschung."
 political_effort:0 "Politische Bemühungen"
 political_effort_desc:0 "Um Veränderungen in der Welt herbeizuführen, müssen wir in der Lage sein, Veränderungen in unserem eigenen Land herbeizuführen. Die Stärkung unserer politischen Position sollte dabei an erster Stelle stehen."
 collectivist_ethos:0 "Kollektivistisches Ethos"
 collectivist_ethos_desc:0 "Unsere Feinde mögen kleinere Nationen spalten und erobern, aber unser Volk wird vereint bleiben. Einer für alle, alle für einen."
 liberty_ethos:0 "Freiheitsethos"
 liberty_ethos_desc:0 "In dieser Zeit ideologischer Fanatiker, die den menschlichen Geist ersticken wollen, werden wir die individuellen Freiheiten und die Unabhängigkeit schützen."
 militarism:0 "Militarismus"
 militarism_desc:0 "Wer das Militär als notwendiges Übel betrachtet, ist dazu verdammt, angesichts des Krieges zu zögern. Wir werden den Militarismus in unsere Kultur einprägen, um ein Volk von Soldaten zu werden."
 political_correctness:0 "Politische Korrektheit"
 political_correctness_desc:0 "Menschen mit leicht kontroversen oder anderweitig peinlichen Ansichten scheinen sich Sorgen zu machen, dass es eine weitreichende Verschwörung gegen sie gibt. Das scheint eine hervorragende Idee zu sein."
 neutrality_focus:0 "Neutralitätsfokus"
 neutrality_focus_desc:0 "Während andere behaupten, dass es Mut und Weisheit erfordert, in einem globalen Konflikt Partei zu ergreifen, wissen wir, dass es mehr erfordert, sich zu weigern."
 interventionism_focus:0 "Interventionismus-Fokus"
 interventionism_focus_desc:0 "Wir schätzen die Freiheit aller Menschen, nicht nur unserer eigenen Bürger. Wenn die Verhinderung von Tyrannei Krieg bedeutet, dann ist das so."
 military_youth:0 "Militärjugend"
 military_youth_desc:0 "Organisationen zur Förderung der Disziplin und politischen Bildung junger Menschen in unserem Land werden frühzeitig Loyalität und Selbstaufopferung fördern."
 deterrence:0 "Abschreckung"
 deterrence_desc:0 "Wenn wir allein dastehen, profitieren wir selten vom Krieg. Glücklicherweise wissen wir, dass die beste Verteidigung eine ist, die so bekannt ist, dass man sie nie anwenden muss."
 volunteer_corps:0 "Freiwilligenkorps"
 volunteer_corps_desc:0 "Unser Volk zu zwingen, für die Ideale der Freiheit zu sterben, wäre eine Ironie des Schicksals. Doch die Schaffung von Mitteln für diejenigen, die Menschen im Ausland helfen möchten, ist es nicht."
 paramilitarism:0 "Paramilitarismus"
 paramilitarism_desc:0 "Militärische Prinzipien finden auch außerhalb des Militärs Anwendung. Mit der Entwicklung halbmilitarisierter Einheiten zur Ergänzung unserer Streitkräfte werden mehr Menschen eine militärische Ausbildung erhalten."
 indoctrination_focus:0 "Indoktrination"
 indoctrination_focus_desc:0 "Nachdem wir unsere Ideologie als wahrheitsgetreu etabliert haben, kann sie auch als Wahrheit gelehrt werden. Bildung und Medien müssen diese Lehre widerspiegeln."
 foreign_expeditions:0 "Auslandsexpeditionen"
 foreign_expeditions_desc:0 "Da unsere Feinde bereit sind, im Namen ihrer Ideale in weit entfernte Konflikte einzugreifen, müssen wir bereit sein, dasselbe für unsere zu tun."
 why_we_fight:0 "Warum wir kämpfen"
 why_we_fight_effect:0 "Wenn wir nicht den Geist einer „Neutralen Außenpolitik“ haben, werden wir in der Lage sein, Fraktionen zu bilden.\n"
 why_we_fight_desc:0 "Die Welt wird immer unsicherer. Unsere Bevölkerung muss die Gräueltaten der Machtgierigen sehen. Es ist Zeit, die Bevölkerung für unsere Sache zu gewinnen und sicherzustellen, dass alle bereit sind, für unsere Freiheit zu kämpfen."
 political_commissars:0 "Politische Kommissare"
 political_commissars_desc:0 "Um sicherzustellen, dass unsere Richtlinien in der militärischen Praxis befolgt werden, werden wir politisch ernannte Beamte in die militärischen Ränge aufnehmen."
 internationalism_focus:0 "Internationalismus-Fokus"
 internationalism_focus_desc:0 "Ideologie kennt keine Grenzen. Eine andere Nation mag sich als souverän bezeichnen, doch unsere Überzeugungen stehen über solchen Ansprüchen."
 nationalism_focus:0 "Fokus auf Nationalismus"
 nationalism_focus_desc:0 "Unsere Nation ist einzigartig und unsere politischen Errungenschaften konnten nur hier erzielt werden. Dafür müssen wir um jeden Preis kämpfen."
 ideological_fanaticism:0 "Ideologischer Fanatismus"
 ideological_fanaticism_desc:0 "Unsere politisch etablierten Werte und Ziele sind es wert, für sie zu sterben, genauso wie für jeden alten Glauben. Jeder Anhänger sollte darauf vorbereitet sein, dem Tod ins Auge zu sehen, und diejenigen, die vom Glauben abirren, sollten besser darauf vorbereitet sein, dem Tod ins Auge zu sehen."
 air_innovation:0 "Luftinnovationen"
 air_innovation_desc:0 "Moderne Kriege können nicht gewonnen werden, ohne den Himmel zu beherrschen. Wir müssen alles in unserer Macht Stehende tun, um die Luftwaffe auszubauen!"
 air_innovation_2:0 "Luftinnovationen II"
 air_innovation_2_desc:0 "Jeder Vorteil, den wir in der Luft erlangen können, ist wertvoll. Wir sollten all unsere Anstrengungen auf die Entwicklung unserer Kampfflugzeuge konzentrieren."
 naval_air_effort:0 "Luftangriffe der Marine"
 naval_air_effort_desc:0 "Die Wirksamkeit von Luftangriffen auf Seeziele wurde von den Amerikanern bereits 1921 demonstriert. Wir sollten diesen Zweig der Luftwaffe nicht vernachlässigen, wenn wir Krieg gegen eine Seemacht führen wollen."
 german_focus:0 "Deutscher nationaler Fokus"
 GER_autobahn:0 "Reichsautobahn"
 GER_autobahn_tt:0 "Maximale §YInfrastruktur§! in §YBrandenburg§!, §YHannover§!, §YThüringen§! und §YFranken§! hinzufügen"
 GER_autobahn_desc:1 "Seit seiner Gründung 1933 war das Reichsautobahnprojekt ein voller Erfolg. Die Baumaßnahmen haben die Arbeitslosigkeit gesenkt, und die breiten Straßen gelten als Symbol für Deutschlands wirtschaftliche Erholung. Es bleibt jedoch noch viel zu tun."
 GER_west_wall:0 "Westwall"
 GER_west_wall_desc:0 "Der Westwall verläuft parallel zur berühmten Maginot-Linie Frankreichs und nimmt weitgehend dasselbe Gebiet ein wie der Westwall im letzten Weltkrieg. Durch die Verstärkung seiner Verteidigungsanlagen können wir die Grenze mit weniger Mann halten und so Divisionen für mögliche Feldzüge im Osten freisetzen."
 GER_west_wall_tt:0 "§RIm Falle einer Remilitarisierung des Rheinlandes erhalten Sie außerdem:§!\n"
 GER_west_wall_forts:0 "Fügen Sie §Y12 Landfestungen§! an der französischen Grenze hinzu.\n"
 GER_tactical_air_effort:0 "Taktische Luftangriffe"
 GER_tactical_air_effort_desc:0 "Der Sieg wird durch die Vernichtung der feindlichen Bodentruppen errungen. Wir müssen uns darauf konzentrieren, unsere eigenen Armeen mit taktischen Schlägen gegen nahe und tief gelegene Ziele zu unterstützen."
 GER_long_range_escorts:0 "Langstrecken-Eskorten"
 GER_long_range_escorts_desc:0 "Unsere taktischen und strategischen Bomber benötigen Eskorten mit größerer Reichweite, um ihnen auf dem gesamten Weg zum Zielgebiet und zurück Schutz zu bieten."
 GER_strategic_air_effort:0 "Strategische Luftangriffe"
 GER_strategic_air_effort_desc:0 "Der Sieg wird durch die Zerstörung der feindlichen Industrien errungen. Wir müssen unsere Anstrengungen auf die Entwicklung und Produktion strategischer Bomber konzentrieren."
 GER_army_innovation:0 "Armeeinnovationen"
 GER_army_innovation_desc:1 "Heinz Guderian und andere radikale Theoretiker drängen auf mutige neue Doktrinen, die Kommunikation, die Identifizierung von Schwerpunkten und die lokale Konzentration vereinter Streitkräfte betonen. Ihnen freie Hand zu lassen, könnte helfen, die Schrecken des Fleischwolfs des Ersten Weltkriegs zu vermeiden."
 GER_soviet_treaty:0 "Vertrag mit der UdSSR"
 GER_soviet_treaty_desc:0 "Wir können einen neuen Forschungsvertrag mit der Sowjetunion abschließen, um vor allem bessere Panzer zu entwickeln. Wenn sie einverstanden sind, können wir die Panzerschule in Kama wiedereröffnen, die wir 1933 geschlossen haben. Die sowjetische Zusammenarbeit bedeutet natürlich, dass auch sie von den Innovationen profitieren wird …"
 GER_air_innovation_2:0 "Luftinnovationen II"
 GER_air_innovation_2_desc:0 "Die Aufgaben des Reichsluftfahrtministeriums sind von höchster Bedeutung. Die Luftwaffe muss die modernste Luftwaffe der Welt sein!"
 GER_army_innovation_2:0 "Armeeinnovationen II"
 GER_army_innovation_2_desc:0 "Die Erfahrungen aus unseren Einrichtungen in der UdSSR werden es uns ermöglichen, unsere Doktrin und Ausrüstung weiter zu verbessern. Dieses Mal werden wir die Fortschritte jedoch für uns behalten!"
 GER_rocketry_focus:0 "Raketentechnik"
 GER_rocketry_focus_desc:0 "Der Raketenantrieb ist der Schlüssel zu massiven Innovationen in allen drei Militärzweigen."
 GER_fuhrerprinzip2: "Führerprinzip"
 GER_fuhrerprinzip2_desc:0 "Das Führerprinzip ist einfach die Idee, unserem Führer größeren Einfluss und Kontrolle über die Abläufe der gesamten Regierung zu geben – und ihm ein Recht auf derartige Aktivitäten.“"
 GER_wunderwaffe:0 "Wunderwaffe"
 GER_wunderwaffe_desc:0 "Heisenberg und von Braun können es kaum erwarten, ihre Ideen für Weltuntergangswaffen zu erforschen. Alles, was sie brauchen, sind zusätzliche Ressourcen …"
 GER_mol_rib_pact:0 "Molotow-Ribbentrop-Pakt"
 GER_mol_rib_pact_desc:0 "Ein Freundschafts- und Nichtangriffspakt mit der UdSSR mag zwar den Magen umdrehen, doch er wird dafür sorgen, dass ihr kostbares Öl weiterhin nach Deutschland fließt. Der geheime Zusatz wird die Gebiete Rumäniens, Polens, Litauens, Lettlands, Estlands und Finnlands in deutsche und sowjetische Einflusssphären aufteilen …"
 GER_mol_rib_pact_tt:0 "Schließen Sie einen Nichtangriffspakt mit der Sowjetunion ab und stimmen Sie der Aufteilung Polens zwischen der Sowjetunion und Deutschland zu."
 GER_soviet_ally:0 "Bündnis mit der UdSSR"
 GER_soviet_ally_desc:0 "Vielleicht ist es möglich, unsere ideologischen Differenzen mit den Sowjets beiseite zu legen und stattdessen das zu betonen, was uns verbindet: den Hass auf den egoistischen Liberalismus und den dekadenten Westen. Mit der UdSSR als Verbündetem hätten wir Zugang zu allen Ressourcen, die wir brauchen – natürlich zusätzlich zu ihrer militärischen Macht …"
 GER_turkey_puppet:0 "Marionette Truthahn"
 GER_turkey_puppet_desc:0 "Die Türkei steckt in der Zwickmühle zwischen uns und der Sowjetunion. Unter Druck werden die Türken höchstwahrscheinlich unserem Willen nachgeben und zu einem Marionettenstaat werden. Im Rahmen des Abkommens erhält die UdSSR Gebiete in der Osttürkei. Sollten sie unsere Forderungen jedoch ablehnen, würde dies Krieg bedeuten."
 GER_rhineland:0 "Rheinland"
 GER_rhineland_desc:0 "Das Rheinland ist seit dem Ende des Ersten Weltkriegs entmilitarisiert, doch diese Beleidigung soll nicht länger bestehen! Deutschland ist ein souveräner Staat und kann innerhalb seiner Grenzen Truppen überallhin verlegen!"
 GER_rhineland_ultimatum:0 "§RDie Remilitarisierung kann rückgängig gemacht werden, wenn Sie konfrontiert werden und nachgeben.§!\n"
 GER_japan_friend:0 "Befreunde dich mit Japan"
 GER_japan_friend_desc:0 "Wir pflegen seit langem eine fruchtbare Beziehung zu China, aber unseren Ambitionen wäre es vielleicht besser gedient, wenn wir uns stattdessen an der uns verwandten Kriegerkultur Japans orientieren würden, selbst wenn das bedeutet, China den Wölfen zum Fraß vorzuwerfen …"
 GER_japan_friend_tt:0 "Rückrufe von Falkenhausen.\n"
 GER_china_friend:0 "Befreunde dich mit China"
 GER_china_friend_desc:0 "Lassen Sie uns unsere langjährige Freundschaft mit China vertiefen. Dies würde Japan vor den Kopf stoßen, doch was ist Japan anderes als das Italien des Ostens?"
 GER_anti_comitern_pact:0 "Anti-Komintern-Pakt"
 GER_anti_comitern_pact_desc:0 "Die Einmischung der Kommunistischen Internationale in die inneren Angelegenheiten der Nationen gefährdet nicht nur ihren inneren Frieden und ihr soziales Wohlergehen, sondern stellt auch eine Bedrohung für den Weltfrieden dar! Wir werden viele nichtkommunistische Länder auffordern, den Pakt zu unterzeichnen und dafür sorgen, dass wir die rote Bedrohung in Schach halten."
 GER_anti_soviet_pact:0 "Antisowjetischer Pakt"
 GER_armor_cooperation:0 "Rüstungskooperation"
 GER_armor_cooperation_desc:0 "Wir werden mit den Sowjets zusammenarbeiten, um Panzer zu bauen"
 GER_anti_soviet_pact_desc:0 "Wir können den Antikominternpakt noch einen Schritt weiterführen und alle Mitglieder auffordern, sich zu einer Koalition gegen die Sowjetunion zu verpflichten. Sollte ein Unterzeichnerstaat mit der UdSSR in einen Krieg geraten, müssen auch alle anderen Mitglieder den Krieg erklären."
 GER_anti_soviet_pact_tt:0 "§YSendet allen Mitgliedern des Antikominternpakts das Angebot, einem Verteidigungsbündnis gegen die Sowjetunion beizutreten.§!"
 GER_anti_soviet_pact_tt_2:0 "§Y Das Verteidigungsbündnis wird seine Mitglieder zum Krieg aufrufen, wenn eines von ihnen von der Komintern angegriffen wird§!"
 GER_anti_soviet_pact_tt_3:0 "Erlangt Nationalgeist §YAntisowjetischer Pakt§!.\n"
 GER_ussr_war_goal:0 "Krieg mit der UdSSR"
 GER_ussr_war_goal_desc:0 "Wir können unsere Propagandabemühungen darauf konzentrieren, das deutsche Volk – und die Welt – auf einen gerechten Krieg gegen die Sowjetunion vorzubereiten."
 GER_turkey_friend:0 "Befreunde dich mit der Türkei"
 GER_turkey_friend_desc:0 "Atatürks Türkei befindet sich auf einem bewundernswerten Modernisierungskurs und kontrolliert den Zugang zum Schwarzen Meer über den Bosporus und die Dardanellen. Die Türkei in unseren Einflussbereich zu bringen, sollte unsere oberste Priorität sein!"
 GER_anschluss:0 "Anschluss"
 GER_anschluss_desc:0 "Der Anschluss an Österreich ist ein lang gehegter Wunsch des deutschen Volkes. Obwohl der Versailler Vertrag ihn verbot, ist es nun endlich an der Zeit, ihn zu verwirklichen. Geben wir den Österreichern die Chance, unser glorreiches Schicksal zu teilen!"
 anschluss_mefo_bills_tt:0 "Verwendet österreichisches Gold, um die Kosten für §YMEFO-Banknoten§ zu senken!.\n"
 anschluss_mefo_bills_double_reduction:0 "Modifizieren Sie §YMEFO-Rechnungen§! um §G+0,10§! Täglicher politischer Machtgewinn\n"
 GER_demand_memel:0 "Bekräftigung der östlichen Ansprüche"
 GER_demand_memel_desc:0 "Im Ersten Weltkrieg ging mit der Wiederauferstehung Polens und der Übergabe des Memellandes an Litauen ein großer Teil des deutschen Territoriums im Osten verloren. Beiden Nationen wird ein Ultimatum gestellt, doch zumindest Polen wird sich wahrscheinlich nicht bloßen Worten beugen."
 GER_demand_memel_threat:0 "Deutschland bekräftigte seine Ansprüche im Osten"
 GER_danzig_or_war:0 "Danzig oder Krieg"
 GER_danzig_or_war_POL_faction_GER_leader:0 "§R[This.GetName] muss der Vereinbarung zustimmen, damit die Boni wirksam werden. Sie werden [Root.GetFactionName] verlassen, wenn Krieg erklärt wird.§!\n"
 GER_danzig_or_war_POL_faction_GER_noleader:0 "§R[This.GetName] muss der Vereinbarung zustimmen, damit die Boni wirksam werden. Sie verlassen [Root.GetFactionName] die Fraktion, wenn Krieg erklärt wird.§!\n"
 GER_danzig_or_war_desc:0 "Danzig war deutsch, Danzig ist deutsch geblieben und Danzig soll von nun an deutsch sein! Wenn Polen das Gebiet nicht abtritt, müssen wir das deutsche Volk auf den unvermeidlichen Krieg vorbereiten. Danzig und die umliegenden Länder werden an Deutschland zurückgegeben!"
 GER_czech_friend:0 "Befreunde dich mit der Tschechoslowakei"
 GER_czech_friend_desc:0 "Die Tschechen und die Slowaken sind fleißige und bewundernswerte Völker. Es ist bedauerlich, dass unsere territorialen Ambitionen mit ihren kollidieren, aber es ist noch nicht zu spät, Freundschaft statt Unterwerfung anzustreben."
 GER_demand_sudetenland:0 "Nachfrage Sudetenland"
 GER_demand_sudetenland_desc:0 "Das Schicksal der Sudetendeutschen war eines der schlimmsten Ungerechtigkeiten, die der Versailler Vertrag mit sich brachte. Sie müssen unter unseren Schutz gestellt werden, ungeachtet der tschechischen Einwände."
 GER_demand_sudetenland_threat:0 "Deutschland forderte das Sudetenland"
 GER_first_vienna_award:0 "Erster Wiener Preis"
 GER_first_vienna_award_desc:0 "Die Ungarn gehörten zu den Völkern, die nach dem Ersten Weltkrieg am meisten litten. Nach der Zerstörung Österreich-Ungarns strandeten viele Ungarn auf fremdem Boden, obwohl ihre Vorfahren dort seit Jahrhunderten gelebt hatten. Wir könnten unsere Beziehungen zu Ungarn erheblich verbessern, wenn wir ihnen einige Gebiete aus der Tschechoslowakei zusprechen würden."
 GER_end_of_czechoslovakia:0 "Schicksal der Tschechoslowakei"
 GER_end_of_czechoslovakia_desc:0 "Es ist an der Zeit, die alten tschechischen Länder unter denjenigen aufzuteilen, die sie angemessen regieren können. Wir sollten auch die Schaffung eines separaten slowakischen Marionettenstaates im Osten in Erwägung ziehen."
 end_of_czechoslovakia_mefo_bills_tt:0 "Verwendet tschechoslowakisches Gold, um die Kosten von §YMEFO-Banknoten§ zu senken!.\n"
 GER_second_vienna_award:0 "Zweiter Wiener Preis"
 GER_second_vienna_award_desc:0 "Siebenbürgen hat eine ungarische Mehrheit und sollte rechtmäßig unseren Freunden in Ungarn gehören. Es ist jedoch schwer vorherzusagen, wie das rumänische Regime und die Bevölkerung auf diese Forderung reagieren werden."
 GER_italy_ally:0 "Bündnis mit Italien"
 GER_italy_ally_desc:0 "Italiener mögen unzuverlässig sein – wie sie im Ersten Weltkrieg bewiesen haben –, doch Mussolini und seine faschistische Bewegung haben gezeigt, dass es für Italien noch Hoffnung gibt. Deutschland kann doch nur gewinnen, wenn es sich mit Italien verbündet, oder nicht?"
 GER_nationalist_spain_ally:0 "Bündnis mit Spanien"
 GER_nationalist_spain_ally_desc:0 "Der Sieg der Nationalisten im spanischen Bürgerkrieg hat den Weg für eine engere Beziehung zwischen unseren beiden Ländern geebnet. Franco hält den Schlüssel zum Mittelmeer in der Hand."
 GER_nationalist_spain_ally_tt:0 "Stärkt die diplomatischen Beziehungen zum „nationalistischen Spanien“!"
 GER_danzig_vs_slovakia:0 "Danzig für die Slowakei"
 GER_danzig_vs_slovakia_desc:0 "Die Polen stehen unseren Lebensraumplänen im Weg. Dennoch ist es noch nicht zu spät, unsere langfristigen Prioritäten zu ändern und stattdessen ihre Freundschaft zu suchen. Der einzige Weg, dies zu erreichen, ist ein Gebietstausch: Danzig gegen die Slowakei. Polen hat bereits durch die Besetzung von Zaolzie Interesse an der Region gezeigt."
 GER_poland_friend:0 "Befreunde dich mit Polen"
 GER_poland_friend_desc:0 "Obwohl Polen keinen Zugang mehr zum Meer hat, haben wir mit der Übergabe der Slowakei unsere guten Absichten bewiesen. Vielleicht können wir Polen durch vage Versprechungen künftiger Gebietsgewinne im Osten noch näher an uns heranführen."
 GER_war_with_france:0 "Krieg mit Frankreich"
 GER_war_with_france_desc:0 "Nachdem Deutschland eine zufriedenstellende Lösung für die Frage seiner Ostgrenze gefunden hat, ist es nun an der Zeit, unsere Aufmerksamkeit nach Westen zu richten. Der Verlust Elsass-Lothringens ist ein Schandfleck auf der Ehre des deutschen Volkes, und nur durch einen gerechten und rechtmäßigen Krieg können wir dies rächen."
 GER_war_with_france_threat:0 "Ansprüche auf französisches Territorium"
 GER_operation_tannenbaum:0 "Operation Tannenbaum"
 GER_operation_tannenbaum_desc:0 "Die Schweiz hat ein höchst abstoßendes und erbärmliches Volk und politisches System. Jetzt haben wir endlich Zeit, uns um diese Todfeinde des neuen Deutschlands zu kümmern."
 GER_reintegrate_luxemburg_and_alsace_lorraine:0 "Reintegration von Luxemburg und Elsass-Lothringen"
 GER_reintegrate_luxemburg_and_alsace_lorraine_desc:0 "Mit unserer erfolgreichen Rückeroberung historisch deutscher Gebiete können wir nun mit dem Prozess ihrer Wiedereingliederung in die [Root.GetName] beginnen. Ihrer Bevölkerung muss die Möglichkeit gegeben werden, ihre patriotische Pflicht für das Vaterland zu erfüllen."
 GER_naval_rearmament:0 "Wiederbewaffnung der Marine"
 GER_naval_rearmament_desc:0 "Das englisch-deutsche Flottenabkommen von 1935 ermöglicht uns einen erheblichen Ausbau unserer Marine. Wir sollten diesbezüglich keine Mühen scheuen."
 GER_plan_z:0 "Plan Z"
 GER_plan_z_desc:0 "Admiral Raeder glaubt, dass die Briten am besten durch Überwasserangriffe besiegt werden können. Der Bau einer ausreichenden Anzahl von Schlachtschiffen und Flugzeugträgern hierfür wird eine gewaltige Aufgabe sein und Zeit in Anspruch nehmen; vielleicht sogar zu viel Zeit. Andererseits ist unsere derzeitige Überwasserflotte völlig unzureichend."
 GER_u_boat_effort:0 "U-Boot-Einsatz"
 GER_u_boat_effort_desc:0 "Kommodore Dönitz befürwortet die Strategie des uneingeschränkten U-Boot-Krieges als beste Möglichkeit, Großbritannien in die Knie zu zwingen. Mit genügend U-Booten könnten wir der britischen Industrie alle benötigten Ressourcen aus ihrem weit verzweigten Imperium entziehen."
 GER_trade_interdiction:0 "Handelsverbot"
 GER_trade_interdiction_desc:0 "Unsere Werften produzieren ständig U-Boote, aber wir müssen bessere Wege finden, diese „Wolfsrudel“ einzusetzen. Geben Sie den Admiralen alles, was sie für ihre Simulationen und Kriegsspiele brauchen …"
 GER_modular_construction:0 "Modularer Aufbau"
 GER_modular_construction_desc:0 "Da wir Teile unserer U-Boote in verschiedenen Fertigungsanlagen bauen lassen, wird die Montage- und Baugeschwindigkeit erheblich verbessert."
 GER_denmark_friend:0 "Befreunde Dänemark"
 GER_denmark_friend_desc:0 "Die Kanonenbootpolitik ist noch nicht tot. Unsere Pläne zur Marineerweiterung sind unserem kleinen nördlichen Nachbarn wohlbekannt. In Kombination mit seiner Angst vor unseren weit überlegenen Armeen sollte es ein Leichtes sein, ihn in unseren Einflussbereich zu drängen."
 GER_norway_friend:0 "Befreunde dich mit Norwegen"
 GER_norway_friend_desc:0 "Norwegen kontrolliert einen Großteil der Edeleisenexporte aus den riesigen Minen in Nordschweden. Wir sollten sie mit der Drohung unserer expandierenden Marine zu einer „Freundschaft“ zwingen."
 GER_dutch_friend:0 "Befreunde dich mit den Niederlanden"
 GER_dutch_friend_desc:0 "Die Niederländer wissen genau, wie lange sie im Falle eines weiteren Weltkriegs durchhalten werden. Wenn sie davon überzeugt werden können, dass Deutschland selbst eine ernsthafte Bedrohung für Großbritannien darstellt, ist es möglich, dass sie sich für ein Bündnis mit uns entscheiden, um einer harten Besatzung zu entgehen."
 GER_sweden_friend:0 "Befreunde dich mit Schweden"
 GER_sweden_friend_desc:0 "Die skandinavischen Länder sind wie Dominosteine; sie stehen und fallen gemeinsam. Nachdem Norwegen und Dänemark in unseren Einflussbereich geraten sind, wird Schweden mit Sicherheit folgen."
 GER_improve_national_spirit:0 "Stärkung des Nationalgeistes"
 GER_improve_national_spirit_desc:0 "Mit den Hauptstädten der Siegermächte des Ersten Weltkriegs in unseren Händen können wir endlich den Schatten unserer Niederlage abschütteln. Für Deutschland bricht ein neues Zeitalter an!"
 GER_improve_national_spirit_tooltip:0 "Wir oder die Mitglieder unserer Fraktion müssen London und Paris und die Staaten, in denen sie ansässig sind, kontrollieren."
 needs_approval:0 "§R[This.GetName] muss der Vereinbarung zustimmen, damit die Boni wirksam werden.§!\n"
 GER_demand_slovenia:0 "Nachfrage Slowenien"
 GER_demand_slovenia_threat:0 "Deutschland forderte Slowenien"
 GER_demand_slovenia_desc:0 "Im Vertrag von Saint-Germain-en-Laye wurden viele historische österreichische Gebiete an Nachfolgestaaten abgetreten. Nach der Wiedervereinigung Österreichs mit Deutschland ist es an der Zeit, diese Ungerechtigkeiten zu beenden. Die historischen Provinzen Krain und Steiermark, heute Slowenien, müssen zurückgeholt werden."
 GER_first_ljubljana_award:0 "Erster Ljubljana-Preis"
 GER_first_ljubljana_award_desc:0 "Die heuchlerischen westlichen Mächte predigten nationale Selbstbestimmung und überließen gleichzeitig viele Minderheiten der serbischen Herrschaft. Wir sind in der Lage, dieses historische Unrecht zu korrigieren und gleichzeitig Freunde zu gewinnen. Gegenüber denen, die sich in der europäischen Ordnung auf unsere Seite stellen wollen, können wir sehr großzügig sein."
 GER_fate_of_yugoslavia:0 "Schicksal Jugoslawiens"
 GER_fate_of_yugoslavia_desc:0 "Der jugoslawische Staat war immer ein künstliches Konstrukt, und die zentrale Autorität beginnt zu bröckeln. Wir müssen eingreifen und die Ordnung wiederherstellen. Die einzige Frage, die sich uns stellt, ist, wie wir dies am besten erreichen können."
 yugoslavia_mefo_bills_tt:0 "Verwendet jugoslawisches Gold, um die Kosten von §YMEFO-Banknoten§ zu senken!.\n"
 GER_second_ljubljana_award:0 "Zweiter Ljubljana-Preis"
 GER_second_ljubljana_award_tt:0 "Das Ereignis bietet die Möglichkeit, Land für [Root.GetName] oder einen würdigen Verbündeten zu fordern."
 GER_second_ljubljana_award_desc:0 "Nachdem die Jugoslawienfrage gelöst ist, ist es an der Zeit, unsere Aufmerksamkeit auf Griechenland zu richten. Auch dieses Land wurde von den Alliierten zu Unrecht bereichert. Es ist an der Zeit zu erkennen, wer unsere wahren Freunde sind."
 GER_war_with_greece:0 "Krieg mit Griechenland"
 GER_war_with_greece_desc:0 "Da sich Griechenland bereits im Krieg befindet, wäre es für Deutschland eine Schande, auf einen Stützpunkt im östlichen Mittelmeer zu verzichten."
 GER_fate_of_greece:0 "Schicksal Griechenlands"
 GER_fate_of_greece_desc:0 "Griechenland hat bewiesen, dass es den neuen Kräften, die auf Europa losgelassen wurden, nicht gewachsen ist. Es ist an der Zeit, dem Land den Schutz zu bieten, den nur Deutschland bieten kann."
 GER_weserubung:0 "Operation Weserübung"
 GER_weserubung_desc:0 "Norwegen ist ein strategisch wichtiger Punkt und wäre ein naheliegender Angriffspunkt für jeden Feind, der unseren Stahlhandel mit Schweden stören möchte. Wir können nicht riskieren, dass unsere Feinde in dieser Region Stützpunkte errichten. Um einen guten Aufmarschraum für die Invasion Norwegens zu schaffen, müssen wir zunächst nach Dänemark vorrücken."
 GER_around_maginot:0 "Rund um Maginot"
 GER_around_maginot_desc:0 "Wenn wir uns gegenüber Frankreich einen taktischen Vorteil sichern wollen, müssen wir in der Lage sein, sie von allen Seiten anzugreifen. Sie werden keinen Angriff aus dem Norden erwarten, und genau aus diesem Norden werden wir sie angreifen, sobald wir einige Hindernisse beseitigt haben."
 italian_focus:0 "Italienischer nationaler Fokus"
 GER_danzig_or_war_POL_civil_war:0 "Nehmen Sie Danzig im Austausch für Unterstützung ein"
 GER_danzig_trigger_polish_civil_war:0 "Polen befindet sich in einem Bürgerkrieg und eine der folgenden Aussagen muss zutreffen:\n Deutschland hat Freiwillige zur Unterstützung einer Seite geschickt\n Eine Seite ist in einer Fraktion mit Deutschland"
 GER_alone_or_peace_faction_tt:0 "ist nicht in einer Fraktion oder ist in einer Fraktion, die mit [GER.GetNameDef] im Frieden steht."
 GER_four_year_plan:0 "Vierjahresplan"
 GER_four_year_plan_desc:0 "Wir brauchen einen ehrgeizigen Plan zur Wiederbewaffnung und endgültigen Autarkie des Landes. Dieser Plan sollte innerhalb der nächsten vier Jahre verwirklicht werden."
 GER_atlantikwall:0 "Atlantikwall"
 GER_atlantikwall_desc:0 "Nachdem wir Westeuropa erobert haben, müssen wir uns gegen einen möglichen Angriff von jenseits des Atlantiks verschanzen. Ein riesiges Netzwerk von Befestigungsanlagen entlang der europäischen Küsten sollte uns ausreichenden Schutz bieten."
 atlantikwall_tooltip:1 "Platzieren Sie §YCoastal Forts§! in jedem der folgenden Atlantikküstenstaaten, die vollständig von Ihnen kontrolliert werden:\n"
 atlantikwall_tooltip_2:0 "§YAquitanien§!\n§YPoitou§!\n§YLoire§!\n§YBretagne§!\n§YNormandie§!\n§YPas de Calais§!\n§YVlaanderen§!\n§YHolland§!\n§YFriesland§!\n§YWeser-Ems§!\n§YHannover§!\n§YSchleswig-Holstein§!\n§YJütland§!\n§YOstlandet§!\n§YVestlandet§!\n§YTrondelag§!\n§YNord-Norge§!\n"
 GER_ostwall:0 "Ostwall"
 GER_ostwall_desc:0 "Trotz unserer Erfolge im Osten müssen wir sicherstellen, dass wir den feindlichen Vormarsch im Falle einer Wende aufhalten können. Wir sollten entlang des Dnjepr vom Schwarzen Meer bis zur Ostsee eine Befestigungslinie errichten, die Panther-Wotan-Stellung."
 GER_ostwall_forts:1 "Platzieren Sie „Landfestungen“ entlang des Dnjepr bis zur Ostsee in jedem der folgenden Staaten, die vollständig von Ihrer Fraktion kontrolliert werden:\n"
 GER_ostwall_forts_2:0 "§YTartu§!\n§YPskow§!\n§YNevel§!\n§YWitebsk§!\n§YMinsk§!\n§YBobrujsk§!\n§YMosyr§!\n§YKiew§!\n§YCherkasy§!\n§YDnipropetrowsk§!\n§YZaporozhe§!\n"
 GER_ostwall_tt:0 "Unter der Kontrolle eines Mitglieds unserer Fraktion.\n"
 GER_autarky:0 "Autarkie"
 GER_autarky_desc:0 "Damit Deutschland wirklich groß sein kann, muss es autark sein. Wir müssen unsere Ressourcen besser nutzen und beim Bauen effizienter werden."
 GER_hermann_goring_werke:0 "[Root.GetHermannGoringWerkeName]"
 GER_hermann_goring_werke_desc:0 "Wir müssen uns vom wankelmütigen Einfluss privater Kapitalisten befreien. Deshalb werden wir einen Industriekonzern unter unserer Kontrolle gründen, der das Wachstum im Bergbau- und Stahlsektor überwacht, da dieser das Rückgrat unserer Rüstungsindustrie bilden wird."
 GER_HERMANN_GORING_WERKE_NAME_FASCIST:0 "Hermann Göring-Werke"
 GER_HERMANN_GORING_WERKE_NAME_KAISER:0 "Kaiser-Werke"
 GER_HERMANN_GORING_WERKE_NAME_COMMIE:0 "VEB Vereinigte Maschinenwerke"
 GER_HERMANN_GORING_WERKE_NAME:0 "Staatlich kontrollierte Industrie"
 GER_kdf_wagen:0 "[Root.GetKdfWagenName]"
 GER_kdf_wagen_desc:0 "Wir werden unseren Bürgern ermöglichen, über ein Sparprogramm ihr eigenes zukünftiges „Volksauto“ zu kaufen, mit dem wir wiederum den Bau der Fabriken finanzieren, die letztendlich zum Bau dieser Autos beitragen werden."
 GER_KDF_WAGEN_NAME:0 "KdF-Wagen"
 GER_KAISER_WAGEN_NAME:0 "Wilhelm-Wagen"
 GER_VOLKS_WAGEN_NAME:0 "Volkswagen"
 GER_coal_liquidization:0 "Kohleverflüssigung"
 GER_coal_liquidization_desc:0 "In Deutschland herrscht Ölmangel, deshalb müssen wir unsere Anstrengungen im Bereich synthetisches Öl verdoppeln."
 GER_synthetic_rubber:0 "Synthetischer Kautschuk"
 GER_synthetic_rubber_desc:0 "Für die Massenmotorisierung und Luftfahrt werden große Mengen Kautschuk benötigt, für den wir keine eigenen Vorkommen besitzen. Wir müssen die synthetische Herstellung verbessern."
 GER_german_war_economy:0 "Deutsche Kriegswirtschaft"
 GER_german_war_economy_desc:0 "Die Bevölkerung unserer großen Nation muss für die Kriegsanstrengungen mobilisiert werden. Wir werden zu einer umfassenden Kriegswirtschaft übergehen, in der jeder seinen Beitrag leisten muss."
 GER_grosraumwirtschaft:0 "Großraumwirtschaft"
 GER_grosraumwirtschaft_desc:0 "Wir müssen Deutschland auf seine Bestimmung als Herzstück Europas vorbereiten. Unsere Infrastruktur wird den Westen mit dem Osten und den Süden mit dem Norden verbinden."
 GER_align_hungary:0 "Align Ungarn"
 GER_align_hungary_desc:0 "Ungarn liegt bereits in unserem Einflussbereich, aber wir könnten das Land leicht noch weiter auf unsere Denkweise umstimmen und es in Zukunft noch leichter manipulierbar machen."
 GER_align_romania:0 "Rumänien ausrichten"
 GER_align_romania_desc:0 "Rumänien liegt bereits in unserem Einflussbereich, aber wir könnten das Land leicht noch stärker auf unsere Denkweise umstimmen und es in Zukunft noch leichter manipulierbar machen."
 GER_integrate_war_economies:0 "Kriegsökonomien integrieren"
 GER_integrate_war_economies_desc:0 "Die Länder in unserem Einflussbereich sind wirtschaftlich extrem von uns abhängig geworden. Wir könnten dies nutzen, um unsere Kontrolle über ihre Wirtschaft und unseren Einfluss auf ihre Außenpolitik zu verstärken."
 GER_integrate_war_economies_tt:2 "Wenn §Y[HUN.GetName]§! in einer Fraktion mit §Y[Root.GetName]§! ist, füge jeweils §Y4 Militärfabrik§! zu §Y[Root.GetName]§! und §Y[HUN.GetName]§! hinzu, und §Y[HUN.GetName]§! wird zur Marionette von §Y[Root.GetName]§!.\n"
 GER_integrate_war_economies_tt2:2 "Wenn §Y[ROM.GetName]§! in einer Fraktion mit §Y[Root.GetName]§! ist, füge jeweils §Y4 Militärfabrik§! zu §Y[Root.GetName]§! und §Y[ROM.GetName]§! hinzu, und §Y[ROM.GetName]§! wird zur Marionette von §Y[Root.GetName]§!.\n"
 GER_integrate_war_economies_tt3:0 "§R[HUN.GetName] muss der Vereinbarung zustimmen, damit die Boni wirksam werden.§!\n"
 GER_integrate_war_economies_tt4:0 "§R[ROM.GetName] muss der Vereinbarung zustimmen, damit die Boni wirksam werden.§!\n"
 GER_form_the_reichskommissariats:0 "Bilden Sie die Reichskommissariate"
 GER_form_the_reichskommissariats_desc:0 "Um die Nutzung lokaler Ressourcen, der Industrie und der Arbeitskräfte zu verbessern, sollten wir die Einrichtung quasi-autonomer Untertanenregierungen in unseren eroberten Gebieten in Erwägung ziehen."
 GER_reichskommissariats_tt:0 "Ermöglicht die Bildung unterworfener Staaten in eroberten Gebieten.\n"
 GER_oppose_hitler:0 "Widersetzen Sie sich Hitler"
 GER_oppose_hitler_desc:0 "Hitlers Herrschaft muss ein Ende haben. Mit der Remilitarisierung des Rheinlandes will er die Westmächte provozieren. Damit liefert er uns den nötigen Vorwand, um mit Hilfe loyaler Elemente der Wehrmacht die Macht zu ergreifen."
 GER_oppose_hitler_civil_war:0 "§RDie faschistischen Anhänger werden einen Bürgerkrieg beginnen.§!\n"
 GER_secure_the_new_state:0 "Den neuen Staat sichern"
 GER_secure_the_new_state_desc:0 "Angesichts des Bürgerkriegs, der zu ihrer Entstehung geführt hat, mangelt es der provisorischen Regierung an Stärke. Wir müssen dafür sorgen, dass sie gesichert ist und nicht so leicht gestürzt werden kann."
 GER_clamp_down_on_fascism:0 "Den Faschismus bekämpfen"
 GER_clamp_down_on_fascism_desc:0 "In den letzten Jahren des Nazi-Regimes wurde der repressive, diktatorische und antiroyalistische Charakter der Regierung und ihrer faschistischen Ideologen und Unterstützer nur allzu deutlich. Wir müssen dafür sorgen, dass ihre Denkweise ausgemerzt wird, wo immer sie auch auftaucht."
 GER_revive_the_kaiserreich:0 "Das Kaiserreich wiederbeleben"
 GER_revive_the_kaiserreich_desc:0 "Die Ereignisse des letzten Jahrzehnts haben gezeigt, dass die Demokratie zu schwach ist, um schändliche interne Elemente in Schach zu halten. Wir müssen zur starken Führung eines Kaisers zurückkehren, und in Vorbereitung auf seine Rückkehr werden wir die Verfassung wieder in die des Deutschen Kaiserreichs umwandeln."
 GER_revive_the_kaiserreich_tt:0 "Die deutsche Militärjunta wird als das Deutsche Reich bezeichnet.\n"
 GER_mackensen_dead:0 "Von Mackensen ist tot."
 GER_rebuild_the_nation:0 "Wiederaufbau der Nation"
 GER_rebuild_the_nation_desc:1 "Nach den Verwüstungen des Bürgerkriegs müssen wir uns dem Wiederaufbau unserer Nation widmen. Wir werden die Menschen bitten, für eine Weile auf ihren persönlichen Komfort zu verzichten, damit wir alle unsere Ressourcen auf die Erreichung dieses Ziels konzentrieren können."
 GER_fan_the_prussian_militarism:0 "Fan des preußischen Militarismus"
 GER_fan_the_prussian_militarism_desc:0 "Um die Verluste unseres Bürgerkriegs auszugleichen, müssen wir an den preußischen Militarismus appellieren, um die Rekrutierung und Ausbildung neuer Rekruten zu verbessern. Dass unser Militär uns von der Nazi-Diktatur befreit hat, sorgt dafür, dass diese preußischen Ideale heute populärer sind denn je."
 GER_a_new_and_better_germany:0 "Ein neues und besseres Deutschland"
 GER_a_new_and_better_germany_desc:0 "Während wir unsere Nation wieder aufbauen, sollten wir versuchen, über das Notwendige hinauszugehen, damit das, was wir jetzt aufbauen, die Zeit überdauert."
 GER_bulwark_against_bolshevism:0 "Bollwerk gegen den Bolschewismus"
 GER_bulwark_against_bolshevism_desc:0 "Unsere Nation schützt den Westen vor dem Einfluss des Kommunismus und dient als Schutzschild gegen den Bolschewismus. Wir müssen diese Rolle mit Stolz tragen und bereit sein, notfalls auch die Waffen einzusetzen."
 GER_bulwark_against_bolshevism_tt:0 "§RDieser Nationalgeist geht verloren, wenn man einer Fraktion mit der Sowjetunion angehört oder auf derselben Seite wie sie Krieg führt.§!\n"
 GER_return_of_the_kaiser:0 "Rückkehr des Kaisers"
 GER_return_of_the_kaiser_desc:0 "Das Kaiserreich braucht einen Kaiser, und Wilhelm II. lebt noch, im Exil in den Niederlanden. Wir werden sein Exil aufheben und ihn einladen, zurückzukehren und den Thron zu besteigen, egal, was die westlichen Demokratien denken."
 GER_focus_on_the_true_enemy:0 "Konzentrieren Sie sich auf den wahren Feind"
 GER_focus_on_the_true_enemy_desc:0 "Unsere Feinde liegen nicht im Inneren, sondern im Äußeren. Das anhaltende Verbrechen des westlichen Kolonialmonopols wird nur durch die Ungerechtigkeit des Versailler Vertrags überschattet, der uns ausgesetzt war, nachdem wir versucht hatten, unseren Platz an der Sonne einzunehmen. Damit ist jetzt Schluss."
 GER_rebuild_the_high_seas_fleet:0 "Wiederaufbau der Hochseeflotte"
 GER_rebuild_the_high_seas_fleet_desc:0 "Wenn wir den Westen jemals erfolgreich herausfordern wollen, benötigen wir ein Programm zum massiven Ausbau unserer Flotte, um unsere einst glorreiche Hochseeflotte wieder aufzubauen."
 GER_our_place_in_the_sun:0 "Unser Platz an der Sonne"
 GER_our_place_in_the_sun_desc:0 "Lassen Sie alle wissen, dass das Deutsche Reich erneut seinen Anspruch auf seinen Platz an der Sonne geltend macht! Unser Volk wird nicht länger im Schatten gedemütigt werden."
 GER_pride_of_the_modern_germany:0 "Stolz des modernen Deutschlands"
 GER_pride_of_the_modern_germany_desc:0 "Es wird viele Jahre dauern, bis wir die Größe der Royal British Navy erreichen. Daher müssen wir sie qualitativ übertreffen. Unsere Schiffe werden die modernsten und leistungsstärksten sein, die jemals die Meere befahren haben!"
 GER_prepare_for_the_next_blockade:0 "Bereiten Sie sich auf die nächste Blockade vor"
 GER_prepare_for_the_next_blockade_desc:0 "Die höllische britische Blockade hat uns den letzten Krieg gekostet. Wir werden diesen Fehler nicht noch einmal machen. Dieses Mal werden wir noch größere Anstrengungen unternehmen, um die Bevölkerung auf das Kommende vorzubereiten."
 GER_break_the_anglo_french_colonial_hegemony:0 "Brechen Sie die anglo-französische Kolonialhegemonie"
 GER_break_the_anglo_french_colonial_hegemony_desc:0 "Es ist an der Zeit, das Monopol zu brechen, das der Westen viel zu lange auf den Kolonialismus hatte."
 flag_franco_british_union:0 "Französisch-Britische Union"
 GER_schlieffen_once_more:0 "Noch einmal Schlieffen"
 GER_schlieffen_once_more_desc:0 "Der Maginot muss umgangen werden. Wir werden erneut durch Belgien und Luxemburg ziehen und in einem schnellen Vorstoß zum Sieg angreifen."
 GER_reinstate_imperial_possessions:0 "Wiederherstellung kaiserlicher Besitztümer"
 GER_reinstate_imperial_possessions_desc:0 "Nach unserer erfolgreichen Rückeroberung historisch deutscher Gebiete können wir nun mit der Wiedereingliederung in die [Root.GetName] als vollwertige Provinzen beginnen. Die letzte Schande von Versailles ist endlich behoben!"
 GER_crossing_the_atlantic:0 "Überquerung des Atlantiks"
 GER_crossing_the_atlantic_desc:0 "Nachdem wir alle kontinentalen Widerstände gegen unsere Herrschaft besiegt haben, müssen wir unsere Produktionsanstrengungen auf den Aufbau einer riesigen Marine konzentrieren, um den Briten und Amerikanern den Kampf zu liefern. Wir werden nicht ruhen, „bis zu Gottes Zeit die Alte Welt mit all ihrer Macht und Kraft hervortritt, um die Neue zu unterwerfen und zu demütigen.“"
 GER_crossing_the_atlantic_2_factories_tt:0 "Entfernen Sie §Y2 Militärfabrik§! aus einem Binnenstaat für jeden Küstenstaat, der diese Werften erhält.\n"
 GER_crossing_the_atlantic_1_factory_tt:0 "Entfernen Sie §Y1 Militärfabrik§! aus einem Binnenstaat für jeden Küstenstaat, der diese Werften erhält.\n"
 GER_the_central_powers:0 "Die Mittelmächte"
 GER_the_central_powers_desc:0 "Wir brauchen Verbündete, um uns gegen den Westen zu behaupten. Wir werden unsere eigene Fraktion gründen, um uns gegen die Unterdrückung der Demokratien zu stellen."
 GER_prepare_italian_coup:0 "Bereiten Sie einen italienischen Putsch vor"
 GER_prepare_italian_coup_desc:0 "Italiens Abstieg in den Faschismus muss rückgängig gemacht werden. Wir werden uns mit einem Putschvorschlag an die italienischen Royalisten wenden und sie unterstützen."
 GER_prepare_italian_coup_tt:0 "Wenn sie unser Angebot annehmen:\n"
 GER_assassinate_mussolini:0 "Mussolini ermorden"
 GER_assassinate_mussolini_desc:0 "Es ist an der Zeit, dem Dreh- und Angelpunkt des italienischen Faschismus das Ende zu bereiten. Deutsche Hände werden den Führer ermorden, woraufhin die italienischen Royalisten mit einem Schlag die Macht ergreifen werden."
 GER_rekindle_imperial_sentiment:0 "Erwecken Sie die imperiale Stimmung neu"
 GER_rekindle_imperial_sentiment_desc:0 "Obwohl die österreichisch-ungarische Monarchie nach dem Ersten Weltkrieg zerbrach, gibt es immer noch Menschen, die um den Untergang des Kaiserreichs trauern. Wir werden diese imperialen Gefühle pflegen, in der Hoffnung, dass die Nachfolgestaaten sich aus eigener Kraft für einen Wiedereintritt entscheiden."
 GER_rekindle_imperial_sentiment_tt:0 "Wenn die Unterstützung der Blockfreien ausreichend hoch ist, können diese Nationen Entscheidungen treffen, um das Österreichisch-Ungarische Reich zu reformieren und sich den Mittelmächten anzuschließen.\n"
 GER_expatriate_the_communists:0 "Die Kommunisten ausbürgern"
 GER_expatriate_the_communists_desc:0 "Die innere Bedrohung durch den Kommunismus stellt weiterhin eine Belastung für unser Land dar. Wir müssen uns von ihm befreien, egal wohin die Anhänger fliehen."
 GER_accept_british_naval_dominance:0 "Akzeptieren Sie die britische Seeherrschaft"
 GER_accept_british_naval_dominance_desc:0 "Wir brauchen Verbündete im Kampf gegen den Kommunismus, und die Briten sind hierfür ein bevorzugter Kandidat. Wir werden ihre Bedenken zerstreuen, indem wir ihre maritime Überlegenheit anerkennen und im Interesse verbesserter Beziehungen auf einen umfassenden Ausbau der Flotte verzichten."
 GER_ally_the_shade:0 "Ein Bündnis mit dem Schatten"
 GER_ally_the_shade_desc:0 "Wenn wir ihren Platz an der Sonne nicht einnehmen können, werden wir uns mit denen verbünden, die einen Schatten auf uns werfen."
 GER_carte_blanche_for_alsace_and_french_colonies:0 "Carte Blanche für das Elsass und die französischen Kolonien"
 GER_carte_blanche_for_alsace_and_french_colonies_desc:0 "Wir müssen unseren neuen Verbündeten bitten, uns freie Hand bei der Rückforderung unserer rechtmäßigen Gebiete Elsass-Lothringen und unseres gerechten Anteils an den afrikanischen Kolonien zu lassen."
 GER_bypass_maginot_in_the_south:0 "Umgehung von Maginot im Süden"
 GER_bypass_maginot_in_the_south_desc:0 "Die Briten verfolgen ihre Interessen in den Niederlanden, und deshalb müssen wir nach alternativen Routen um den Maginot-Kanal herum suchen. Der Süden, obwohl bergig und schwer zu durchqueren, muss ausreichen. Der deutsche Einfallsreichtum wird uns helfen."
 GER_see_to_the_eastern_front:0 "Kümmern Sie sich um die Ostfront"
 GER_see_to_the_eastern_front_desc:0 "Wenn wir aus dem Ersten Weltkrieg etwas gelernt haben, dann ist es, dass wir uns auf einen Angriff auf unsere entlegenen östlichen Besitzungen vorbereiten müssen. Diese Besitzungen müssen wiederhergestellt und gegen eine Invasion befestigt werden."
 GER_see_to_the_eastern_front_tt:1 "Füge 6 §YLandfestungen§! in 3 Provinzen an der Ostgrenze hinzu.\n"
 GER_see_to_the_eastern_front_tt2:1 "Füge 8 §YLandfestungen§! in 4 Provinzen an der Ostgrenze hinzu.\n"
 GER_danzig_for_guarantees:0 "Danzig für Garantien"
 GER_danzig_for_guarantees_desc:1 "Die Polen müssen die Gefahr durch die Bolschewiki spüren. Vielleicht könnten wir uns auf eine Rückgabe Danzigs, Posens und der Woiwodschaft Schlesien einigen, im Austausch für Garantien militärischer Unterstützung im Falle einer Invasion der Roten."
 GER_safeguard_the_baltic:0 "Schützen Sie die Ostsee"
 GER_safeguard_the_baltic_desc:0 "Das Baltikum gehörte bis vor wenigen Jahrzehnten zum Russischen Reich. Es ist daher naheliegend, dass die Sowjets erneut versuchen könnten, das Baltikum zu annektieren. Wir müssen dies verhindern und im Falle einer sowjetischen Invasion unsere militärische Unterstützung anbieten."
 GER_support_the_finns:0 "Unterstützen Sie die Finnen"
 GER_support_the_finns_desc:0 "Die Finnen befinden sich in der Schusslinie der Sowjets. Wir werden ihnen eine Garantie gegen die kommunistische Bedrohung bieten und ihnen eine bescheidene industrielle Unterstützung gewähren."
 GER_anti_comintern_pact_unaligned:0 "Ideologische Verteidigung"
 GER_anti_comintern_pact_unaligned_desc:0 "Die militärische Bedrohung ist nicht die einzige Gefahr, der wir ausgesetzt sind. Wir müssen nach Wegen suchen, den Kommunismus selbst in Schach zu halten. Zu diesem Zweck werden wir mit unseren nichtkommunistischen Mitbürgern einen Pakt schließen, um seinen Vormarsch zu bekämpfen."
 GER_anti_soviet_pact_unaligned:1 "Formalisierung des Vertrags"
 GER_anti_soviet_pact_unaligned_desc:1 "Wir sollten uns auf einen militärischen Konflikt mit dem Kommunismus vorbereiten, indem wir alle Unterzeichner des Antikominternpakts einladen, einer Zusatzklausel zuzustimmen, die militärische Unterstützung gegen jede sowjetische Aggression vorsieht. Da wir uns bereits in vielerlei Hinsicht verpflichtet fühlen, sollte dies nicht mehr als eine Formalisierung sein."
 GER_tackle_the_communist_threat:0 "Bekämpfen Sie die kommunistische Bedrohung"
 GER_tackle_the_communist_threat_desc:0 "Solange die Sowjetunion existiert, stellt sie für uns eine Bedrohung dar. Anstatt darauf zu warten, dass sie zuschlägt, sollten wir die Initiative selbst in die Hand nehmen."
 GER_the_iberian_problem:0 "Das iberische Problem"
 GER_the_iberian_problem_desc:0 "Es gibt immer noch Bastionen des Kommunismus. Wir müssen dafür sorgen, dass sie alle ausgerottet werden, angefangen mit dem kommunistischen Spanien."
 GER_spain_wargoal_tt:0 "Erlangt das Kriegsziel §YAnnex§! gegen §YRepublikanisches Spanien§!.\n"
 GER_reestablish_free_elections:0 "Wiederherstellung freier Wahlen"
 GER_reestablish_free_elections_desc:0 "Wir werden zu den demokratischen Idealen zurückkehren, indem wir in naher Zukunft wieder freie Wahlen einführen."
 GER_the_monarchy_compromise:0 "Der Monarchiekompromiss"
 GER_the_monarchy_compromise_desc:0 "Das Militär, das für unsere Freiheit von der Nazi-Tyrannei kämpfte, hat eindeutig royalistische Neigungen. Um sicherzustellen, dass sie mit dem eingeschlagenen Weg der Nation zufrieden sind, müssen wir einen Kompromiss eingehen und die Rückkehr der Monarchie zulassen."
 GER_the_great_red_menace:0 "Die große rote Bedrohung"
 GER_the_great_red_menace_desc:0 "Unser Handeln im letzten Krieg ist vielen noch in frischer Erinnerung. Wir müssen die Ängste des Kontinents wieder auf die wahre Gefahr lenken: die große kommunistische Bedrohung, die im Osten lauert. Wir werden eine massive Propagandakampagne starten, um dem Kontinent die Augen zu öffnen."
 GER_central_european_alliance:0 "Mitteleuropäische Allianz"
 GER_central_european_alliance_desc:0 "Nachdem wir nun die Aufmerksamkeit des Kontinents auf das Problem gelenkt haben, müssen wir eine Lösung anbieten: Wir werden ein Bündnis aller kleineren Nationen in Europa anführen, das Schutz vor dieser tödlichsten Bedrohung unserer Lebensweise gewährleistet."
 GER_central_european_alliance_tt:0 "Wenn nicht in einer Fraktion:\n"
 GER_danubian_membership:0 "Donaumitgliedschaft"
 GER_danubian_membership_desc:0 "Die Donaunachfolgestaaten der österreichisch-ungarischen Monarchie haben nicht vergessen, was es bedeutet, unser Verbündeter zu sein. Wir werden ihnen die Mitgliedschaft und den Schutz vor der Bedrohung durch den Kommunismus anbieten."
 GER_danubian_expansion:0 "Donauerweiterung"
 GER_danubian_expansion_desc:0 "Wir müssen versuchen, unseren Einfluss auf jene Balkanstaaten auszuweiten, die anfällig für sowjetische Aggressionen sind. Den übrigen Donaustaaten werden wir die Mitgliedschaft und Schutz vor der Bedrohung durch den Kommunismus anbieten."
 invite_non_fascist_communist_only_TT:1 "Erfordert, dass potenzielle Mitgliedsstaaten weder faschistisch noch kommunistisch sind und nicht bereits einer Fraktion angehören.\n"
 GER_no_balkan_communism:0 "Kein Balkankommunismus"
 GER_no_balkan_communism_desc:0 "Auf dem Balkan haben sich kommunistische Einflüsse eingeschlichen, die wir nicht zulassen können. Sie müssen zerstört werden, bevor sie Wurzeln schlagen."
 GER_no_balkan_communism_tt:0 "Erreicht die Kriegsziele „Regierung stürzen“ gegen kommunistische Nationen auf dem Balkan.\n"
 GER_no_balkan_communism_HUN_tt:0 "Erzielt das Kriegsziel „Regierung stürzen“ gegen die „Ungarische Volksrepublik“.\n"
 GER_no_balkan_communism_ROM_tt:0 "Erzielt das Kriegsziel „Regierung stürzen“ gegen die „Rumänische Volksrepublik“.\n"
 GER_no_balkan_communism_YUG_tt:0 "Erzielt das Kriegsziel „Regierung stürzen“ gegen „Jugoslawien“.\n"
 GER_no_balkan_communism_BUL_tt:0 "Erzielt das Kriegsziel „Regierung stürzen“ gegen „Sozialistische Republik Bulgarien“.\n"
 GER_low_countries_membership:0 "Mitgliedschaft der Niederlande"
 GER_low_countries_membership_desc:0 "Obwohl sie weit von den östlichen Grenzen Europas entfernt sind, wissen die Niederlande, dass sie als Nächstes an der Reihe sind, wenn Mitteleuropa fällt. Wir werden ihnen die Mitgliedschaft anbieten, damit sie gemeinsam mit uns gegen die Bedrohung durch den Kommunismus kämpfen können."
 GER_no_reds_in_western_europe:0 "Keine Roten in Westeuropa"
 GER_no_reds_in_western_europe_desc:0 "In Westeuropa haben sich kommunistische Einflüsse eingeschlichen, die wir nicht zulassen können. Sie müssen zerstört werden, bevor sie Wurzeln schlagen."
 GER_no_reds_in_western_europe_tt:0 "Erreicht die Kriegsziele „Regierung stürzen“ gegen kommunistische Nationen in den Niederlanden und Frankreich.\n"
 GER_no_reds_in_western_europe_FRA_tt:0 "Erzielt das Kriegsziel „Sturz der Regierung“ gegen „Französische Kommune“.\n"
 GER_no_reds_in_western_europe_HOL_tt:0 "Erzielt das Kriegsziel „Regierung stürzen“! gegen „Vereinigte Volksprovinzen“!.\n"
 GER_no_reds_in_western_europe_BEL_tt:0 "Erzielt das Kriegsziel „Regierung stürzen“ gegen die „Genossenschaft Belgiens“.\n"
 GER_no_reds_in_western_europe_LUX_tt:0 "Erzielt das Kriegsziel „Regierung stürzen“ gegen „Rosa Luxemburg“!.\n"
 GER_scandinavian_membership:0 "Skandinavische Mitgliedschaft"
 GER_scandinavian_membership_desc:0 "Berge und Kälte sind kein Schutz vor der Roten Gefahr, und das müssen die Skandinavier wissen. Wir werden ihnen eine Mitgliedschaft und Schutz vor der Bedrohung durch den Kommunismus anbieten."
 GER_baltic_membership:0 "Baltische Mitgliedschaft"
 GER_baltic_membership_desc:0 "Seit zwei Jahrzehnten leben die baltischen Staaten in der tödlichen Doppelgefahr der Wiederangliederung und des Kommunismus. Wir werden ihnen die Mitgliedschaft und den Schutz vor der Bedrohung durch den Kommunismus anbieten."
 GER_polish_membership:0 "Polnische Mitgliedschaft"
 GER_polish_membership_desc:0 "Die Polen haben allen Nachbarn viele Gründe zu misstrauen, wissen aber, dass die größte Bedrohung aus dem Osten kommt. Wir werden ihnen die Mitgliedschaft und den Schutz vor der Bedrohung durch den Kommunismus anbieten."
 GER_finnish_membership:0 "Finnische Mitgliedschaft"
 GER_finnish_membership_desc:0 "Weit entfernt vom Zentrum Europas laufen die Finnen Gefahr, den Roten allein gegenüberzustehen. Doch das ist nicht nötig. Wir werden ihnen die Mitgliedschaft und den Schutz vor der Bedrohung durch den Kommunismus anbieten."
 GER_strike_at_the_source:0 "Schlag an der Quelle"
 GER_strike_at_the_source_desc:0 "Ein Leben in Angst ist kein Leben. Wir müssen dieser Bedrohung unserer Lebensweise ein für alle Mal ein Ende setzen. Die Quelle des kommunistischen Einflusses in Europa muss zerstört werden."
 GER_reverse_the_brain_drain:0 "Umkehr der Abwanderung hochqualifizierter Fachkräfte"
 GER_reverse_the_brain_drain_desc:0 "Nachdem die Unterdrücker und autoritären Regime besiegt sind, können wir versuchen, es für die Wissenschaftler, die aus dem Land geflohen sind, attraktiv zu machen, zurückzukehren und erneut in ihrem Heimatland zu arbeiten."
 GER_shared_rd_programs:0 "Gemeinsame F&amp;E-Programme"
 GER_shared_rd_programs_desc:0 "Zum Wohle unserer Sache müssen wir unser wissenschaftliches Wissen bündeln und unsere technologischen Fortschritte mit unseren neuen Verbündeten teilen."
 GER_the_mannheim_project:0 "Das Mannheim-Projekt"
 GER_the_mannheim_project_desc:0 "Da wir nun die Schwerwasseranlagen in Norwegen unter unserer Kontrolle haben, können wir unsere Anstrengungen verdoppeln, die Geheimnisse der Atomenergie zu lüften und zu prüfen, wie wir sie als Waffe gegen die Bolschewiken einsetzen können."
 GER_the_mannheim_project_tt:0 "Dieser Fokus gibt je nach aktuellem Stand der Atomforschung unterschiedliche Belohnungen:\n\n"
 GER_pool_technical_know_how:0 "Pooltechnisches Know-how"
 GER_pool_technical_know_how_desc:0 "Jede Nation hat ihre eigenen Methoden, ihre Industrie zu verwalten und ihre Anlagen zu warten. Wir können voneinander lernen, indem wir technische Teams entsenden, die dieses Wissen unter den anderen Mitgliedern der Allianz verbreiten."
 GER_pool_technical_know_how_tt:0 "Jede Nation in der Fraktion wird diesen Nationalgeist erhalten."
 ITA_ethiopian_war_logistics:0 "Äthiopische Kriegslogistik"
 ITA_ethiopian_war_logistics_desc:0 "Möglicherweise haben wir die logistische Situation bei unserer glorreichen Eroberung Äthiopiens falsch eingeschätzt. Unser oberstes Ziel muss es sein, unsere tapferen Truppen mit den notwendigen Vorräten zu versorgen."
 ITA_fortification_effort:0 "Befestigungsbemühungen"
 ITA_fortification_effort_desc:0 "Wir müssen unsere Küsten und Grenzen gegen die Aggression der schwindenden und dekadenten Imperialmächte Frankreich und Großbritannien verteidigen."
 ITA_fortification_effort_forts:0 "Fügen Sie §Y15 Landfestungen§! an der französischen Grenze hinzu.\n"
 ITA_army_primacy:0 "Vorrang der Armee"
 ITA_army_primacy_desc:0 "Industriell hinkt Italien den dekadenten Kolonialreichen noch immer hinterher. Wir müssen uns entscheiden, ob wir der Armee oder der Marine den Vorrang geben. Die Entscheidung scheint offensichtlich: So wie das antike Römische Reich auf seine Legionen angewiesen war, muss es auch das neue italienische Reich sein!"
 ITA_modernized_artillery:0 "Modernisierte Artillerie"
 ITA_modernized_artillery_desc:0 "Theoretisch ist die Regio Esercito eine der größten Armeen der Welt. Leider ist es uns unmöglich, all diese Männer angemessen auszurüsten. Und das Schlimmste: Der Großteil unserer Artillerie stammt aus dem Jahr 1918!"
 ITA_modernized_army:0 "Modernisierte Armee"
 ITA_modernized_army_desc:0 "Eine bessere Artillerie wird unsere Kampfkraft erheblich steigern, aber wir brauchen auch neue Taktiken und Doktrinen."
 ITA_armored_effort:0 "Gepanzerte Anstrengung"
 ITA_armored_effort_desc:0 "Der Kampf in Äthiopien ist schön und gut, aber unsere Panzer entsprechen einfach nicht dem Standard, der für den Kampf gegen die dekadenten – wenn auch immer noch mächtigen – Plutodemokraten Europas erforderlich wäre."
 ITA_mare_nostrum:0 "Mare Nostrum"
 ITA_mare_nostrum_desc:0 "Unsere Ressourcen sind begrenzt und wir müssen einige schmerzhafte Entscheidungen treffen, doch das Britische Empire hält uns im Mittelmeer gefangen. Für einen Ausbruch benötigen wir eine Marine, die es selbst mit der britischen Marine aufnehmen kann …"
 ITA_carrier_effort:0 "Trägeraufwand"
 ITA_carrier_effort_desc:0 "Moderne Schlachtflotten basieren auf Flugzeugträgern, nicht auf Schlachtschiffen. Die Überlegenheit der Luftwaffe gegenüber Schiffen wurde bereits 1921 von den Amerikanern demonstriert!"
 ITA_capital_ships:0 "Großkampfschiff-Anstrengung"
 ITA_capital_ships_desc:0 "Die Nation mit den meisten Schlachtschiffen wird die Weltmeere beherrschen. Wir dürfen nicht zulassen, dass uns die Royal Navy im Mittelmeer waffentechnisch überlegen ist ..."
 ITA_bomber_effort:0 "Bomber-Anstrengung"
 ITA_bomber_effort_desc:0 "Die Zeiten, in denen Armeen Kriege gewinnen konnten, ohne in den Himmel zu blicken, sind vorbei. Wir müssen unsere taktischen Bomber weiterentwickeln, um unseren Soldaten die Luftunterstützung zu bieten, die sie brauchen."
 ITA_atlantic_fleet:0 "Atlantikflotte"
 ITA_atlantic_fleet_desc:0 "Sobald wir aus dem britischen Käfig ausgebrochen sind, müssen wir unsere Macht über die Ozeane hinweg ausdehnen. Dies muss unsere oberste Priorität sein."
 ITA_marines_and_landing_craft:0 "Marinesoldaten und Landungsboote"
 ITA_marines_and_landing_craft_desc:0 "Kriege werden nicht allein durch die Seemacht gewonnen; wir müssen auch in der Lage sein, unsere Armeen über die Meere zu transportieren und sicher an Land zu bringen …"
 ITA_jet_engine_effort:0 "Düsentriebwerksaufwand"
 ITA_jet_engine_effort_desc:0 "Dank der brillanten Arbeit von Secondo Campini sollte Italien eine Vorreiterrolle bei der Entwicklung von Düsentriebwerken einnehmen. Wir sollten ihm alle Mittel zur Verfügung stellen, die er braucht, um seine Entwürfe für die Regio Aeronautica weiter zu verbessern."
 ITA_light_ship_effort:0 "Leichte Schiffsbemühungen"
 ITA_light_ship_effort_desc:0 "Die Konvois zu unseren Überseegebieten brauchen Schutz. Wir müssen neue Doktrinen und modernere Zerstörer entwickeln."
 ITA_escort_effort:0 "Eskortaufwand"
 ITA_escort_effort_desc:0 "Wir sollten weitere Anstrengungen unternehmen, um unsere gefährdeten Konvois im Mittelmeer zu schützen."
 ITA_sea_wolves:0 "Seewölfe"
 ITA_sea_wolves_desc:0 "Unsere deutschen Verbündeten haben erschreckend effiziente U-Boote und die „Wolfsrudel“-Doktrin zu deren Einsatz entwickelt. Wir sollten von ihnen lernen."
 ITA_slovenia_dalmatia_claims:0 "Ansprüche an Jugoslawien"
 ITA_slovenia_dalmatia_claims_desc:0 "In Jugoslawien gibt es noch immer eine bedeutende italienische Bevölkerung, die zumindest bis in die glorreichen Zeiten Venedigs zurückreicht. Die Wiederherstellung dieser Regionen unter italienischer Herrschaft ist ein wichtiger Schritt zur Wiederherstellung des Römischen Reiches!"
 ITA_slovenia_dalmatia_claims_threat:0 "Italienische Ansprüche auf Jugoslawien"
 ITA_yugoslavia_friend:0 "Befreunde dich mit Jugoslawien"
 ITA_yugoslavia_friend_desc:0 "Anstatt Jugoslawien jetzt zu verärgern, können wir seine mögliche Eroberung auf einen günstigeren Zeitpunkt verschieben. Stattdessen könnten wir uns mit dem Regime anfreunden und das Land in unseren Einflussbereich bringen."
 ITA_support_nationalist_spain:0 "Unterstützen Sie das nationalistische Spanien"
 ITA_support_nationalist_spain_desc:0 "Spanien befindet sich mitten in einem Bürgerkrieg, der darüber entscheiden wird, ob es künftig ein möglicher Verbündeter des Faschismus sein wird oder eine nutzlose Republik bleibt – oder, noch schlimmer, dem Kommunismus oder der Anarchie verfällt. Wir müssen den wahren Spaniern Unterstützung bieten, bevor es zu spät ist!"
 ITA_demand_balearic_islands:0 "Nachfrage Balearen"
 ITA_demand_balearic_islands_desc:0 "Nachdem wir unsere Unterstützung für Francos neues Regime unter Beweis gestellt haben, sind wir in der Lage, die Abtretung eines der wichtigen Gebiete, für deren Verteidigung wir gekämpft haben, nämlich der Balearen, an Italien zu fordern, um unsere strategische Stellung im Mittelmeerraum zu stärken."
 ITA_bulgaria_friend:0 "Befreunde dich mit Bulgarien"
 ITA_bulgaria_friend_desc:0 "Bulgarien liegt in unserem Einflussbereich. Sein sicheres Bündnis mit Italien ist für unsere Balkanambitionen von entscheidender Bedeutung."
 ITA_albania_war_goal:1 "Albanische Besatzung"
 ITA_albania_war_goal_desc:1 "Albanien ist für unsere Truppen ein leichtes Ziel. Wir werden wahrscheinlich nicht auf großen Widerstand stoßen. Wir müssen der Welt die Macht Italiens zeigen und den Ruhm des Römischen Reiches wiederherstellen!"
 ITAB_pact_of_steel:0 "Stahlpakt"
 ITAB_pact_of_steel_desc:0 "Unser Verhältnis zu Nazi-Deutschland ist durch ideologische Differenzen und widersprüchliche Ziele belastet; der Duce ist äußerst misstrauisch gegenüber den deutschen Ambitionen in Österreich und auf dem Balkan. Doch die Realitäten ändern sich …"
 ITA_pact_of_steel:0 "Stahlpakt"
 ITA_pact_of_steel_desc:0 "Unser Verhältnis zu Nazi-Deutschland ist durch ideologische Differenzen und widersprüchliche Ziele belastet; der Duce ist äußerst misstrauisch gegenüber den deutschen Ambitionen in Österreich und auf dem Balkan. Doch die Realitäten ändern sich …"
 ITA_germ_italy_same_tt:0 "§YItalien§! und §YDeutschland§! sind dieselbe §YIdeologie§!."
 ITA_german_millitary_cooperation:0 "Deutsche Militärzusammenarbeit"
 ITA_german_millitary_cooperation_desc:0 "Durch die enge Zusammenarbeit mit dem mächtigen deutschen Militär können wir das Beste aus deutscher Effizienz und italienischer Innovation vereinen. Wir werden einen strategischen Vorteil gegenüber jedem haben, der es wagt, sich uns entgegenzustellen."
 ITA_claims_on_france:0 "Ansprüche an Frankreich"
 ITA_claims_on_france_desc:0 "Land von Vichy-Frankreich einnehmen. Mit der deutschen Eroberung von Paris und der Bildung einer neuen Regierung in Frankreich ist es für uns an der Zeit, unseren rechtmäßigen Anteil an Südeuropa zu beanspruchen. Deutschland hat sich im Norden stark ausgebreitet, und es ist nur fair, dass uns ein eigenes Stück Land zugestanden wird."
 ITA_claims_on_france_tt:0 "§YVichy-Frankreich§! existiert und kontrolliert §YSavoyen§! und §YCorsika§!"
 ITA_go_after_france:0 "Gehen Sie nach Frankreich"
 ITA_go_after_france_desc:0 "Frankreich ... eine weitere reaktionäre Demokratie des Westens, die ständig versucht, den Vormarsch zu behindern und oft die Existenz des italienischen Volkes gefährdet. Wir ziehen in den Kampf für das Wohl Italiens und die Zukunft des Reiches."
 ITA_claims_on_turkey:0 "Ansprüche an die Türkei"
 ITA_claims_on_turkey_desc:0 "Der Londoner Vertrag von 1915 versprach Italien türkische Gebiete in Anatolien im Austausch für die Eroberungen der Westmächte in der Levante. Italien nahm sich den ihm zustehenden Anteil und behauptete, es handele sich lediglich um Mandate des Völkerbundes, während Italien diese verweigert wurden. Das neue Italien ist viel stärker als das alte, und wir werden die Türken zwingen, die britischen Versprechen einzuhalten."
 ITAB_italy_first:0 "Italien zuerst"
 ITAB_italy_first_desc:0 "Mussolini wird niemals die zweite Geige hinter Hitler spielen! Wir müssen die Lehren des Römischen Reiches beherzigen. Die Einmischung der Germanen in die italienischen Angelegenheiten endet nie gut …"

 ITA_italy_first:0 "Italien zuerst"
 ITA_italy_first_desc:0 "Mussolini wird niemals die zweite Geige hinter Hitler spielen! Wir müssen die Lehren des Römischen Reiches beherzigen. Die Einmischung der Germanen in die italienischen Angelegenheiten endet nie gut …"
 ITA_romania_friend:0 "Befreunde dich mit Rumänien"
 ITA_romania_friend_desc:0 "Es wäre in unserem besten Interesse, unsere entfernten Verwandten in Rumänien in unseren Einflussbereich zu bringen. Il Duce sieht großes Potenzial in ihrer „Eisernen Garde“."
 ITA_german_rd_treaty:0 "Vertrag mit Deutschland"
 ITA_german_rd_treaty_desc:0 "Wir sollten die Deutschen bitten, technologische Geheimnisse zum Nutzen unserer beiden großen Nationen auszutauschen."
 ITA_spanish_italian_faction:0 "Spanisch-Italienische Allianz"
 ITA_spanish_italian_faction_desc:0 "Franco und die spanischen Nationalisten sind unsere natürlichen Verbündeten, vereint durch Religion, Kultur und Ideologie. Gemeinsam könnten wir Gibraltar erobern und der Royal Navy das Leben schwer machen ..."
 ITA_italian_highways:0 "Italienische Autobahnen"
 ITA_italian_highways_desc:0 "Wir müssen unsere Infrastruktur ausbauen, um die Mobilität unserer Truppen in unserem gesamten Reich zu gewährleisten. Angesichts unserer Feinde in allen Teilen der Welt ist dies ein entscheidender Faktor für die Verteidigung Italiens."
 ITA_libyan_refineries:0 "Libysche Raffinerien"
 ITA_libyan_refineries_desc:0 "Benhasi ist ein idealer Ort für den Bau von Raffinerien. In der Nähe von Ölquellen und in der Nähe der Produktion im Heimatland."
 ITA_libyan_infrastructure:0 "Libysche Infrastruktur"
 ITA_libyan_infrastructure_desc:0 "Unsere riesigen Länder in Nordafrika hinken in puncto Infrastruktur noch immer dem Rest unseres Reiches hinterher. Wir sollten unsere Anstrengungen darauf konzentrieren, sie auf den gleichen Stand zu bringen."
 ITA_prospect_for_oil:0 "Aussicht auf Öl"
 ITA_prospect_for_oil_desc:0 "Alte Imperien fürchten stets den Aufstieg neuer Imperien, und wir sollten uns nicht auf sie verlassen. Wir können uns nicht auf das Öl anderer Länder verlassen und sollten unsere Bemühungen darauf konzentrieren, unsere eigenen Quellen innerhalb des Imperiums zu finden. So stellen wir sicher, dass wir auch in Zukunft wettbewerbsfähig bleiben."
 ITA_greece_war_goal:0 "Krieg mit Griechenland"
 ITA_greece_war_goal_desc:0 "Was für ein Römisches Reich stellen wir wieder her, wenn wir Griechenland ausklammern? Es sollte ein leichtes Ziel sein ..."
 ITA_greece_friend:0 "Befreunde dich mit Griechenland"
 ITA_greece_friend_desc:0 "Die Griechen sind ein antikes Volk und die Wiege der westlichen Zivilisation. Es sollte nicht unmöglich sein, ihre Ziele mit unseren in Einklang zu bringen …"
 ITA_turkey_friend:0 "Befreunde dich mit der Türkei"
 ITA_turkey_friend_desc:0 "Nach dem italienisch-türkischen Krieg und dem Ersten Weltkrieg haben die Türken keinen Grund mehr, uns zu lieben. Realpolitik hat jedoch Vorrang vor alten Nöten, und die aktuelle Situation im Mittelmeerraum könnte unsere beiden Sterne wieder in Einklang bringen."
 ITA_portugal_friend:0 "Befreunde dich mit Portugal"
 ITA_portugal_friend_desc:0 "Portugal ist neben Spanien ein natürlicher Verbündeter des italienischen Volkes. Wir müssen diese freundschaftlichen Bande stärken."
 ITA_anti_uk_war_goals:0 "Krieg mit Großbritannien"
 ITA_anti_uk_war_goals_desc:0 "Das zerfallende Britische Empire hält uns im Mittelmeer gefangen und wird uns die Schlüssel niemals freiwillig überlassen. Wir müssen die Engländer angreifen, sobald die Zeit reif ist!"
 ITA_japan_friend:0 "Befreunde dich mit Japan"
 ITA_japan_friend_desc:0 "Die Japaner sind uns sehr ähnlich: eine junge, hungrige Macht mit einer positiven Demografie, die durch den Handel mit schwindenden Plutodemokraten wie Großbritannien und den Niederlanden in Geiselhaft gehalten wird. Wir sollten uns mit ihnen zu einer dynamischen Seeachse über die Ozeane hinweg vereinen!"
 soviet_focus:0 "Sowjetischer nationaler Fokus"
 SOV_finish_five_year_plan:0 "Den Fünfjahresplan abschließen"
 SOV_finish_five_year_plan_desc:0 "Der zweite Fünfjahresplan priorisiert die Entwicklung der Schwerindustrie. Die Sowjetunion muss sich schnell entwickeln, um mit den kapitalistischen und faschistischen Mächten des Westens mithalten zu können."
 SOV_move_industry_to_urals:0 "Industrieverlagerung in den Ural"
 SOV_move_industry_to_urals_desc:0 "Den hinterhältigen Hitleristen darf nicht gestattet werden, unsere wertvollen Fabriken im Westen der UdSSR zu besetzen. Mit äußerster Anstrengung und Opferbereitschaft sollten wir in der Lage sein, die wertvollsten Schwermaschinen und Anlagen schnell nach Tscheljabinsk und an andere Orte im Ural zu bringen."
 SOV_defense_of_moscow:0 "Verteidigung Moskaus"
 SOV_defense_of_moscow_desc:0 "Die Faschisten klopfen an die Tore der Hauptstadt! Moskau darf um keinen Preis fallen. Mobilisiert alle, vom Kind bis zum Alten, um so schnell wie möglich Verteidigungsanlagen zu errichten!"
 SOV_defense_of_moscow_forts:0 "Fügen Sie §Y28 Landfestungen§! in und um Moskau hinzu.\n"
 SOV_infrastructure_effort:0 "Infrastrukturaufwand"
 SOV_infrastructure_effort_desc:0 "Die Sowjetunion ist riesig, aber größtenteils unbewohnt. Wir müssen dafür sorgen, dass Güter und Ausrüstung schnell durch das ganze Land transportiert werden können."
 SOV_tranformation_of_nature:0 "Transformation der Natur"
 SOV_tranformation_of_nature_desc:0 "Stalins großer Plan zur Umgestaltung der Natur muss in die Tat umgesetzt werden. Die Umwelt muss in großem Maßstab so gestaltet und geformt werden, dass sie zum Wohle des Volkes wirkt."
 SOV_stalin_constitution:0 "Stalins Verfassung"
 SOV_stalin_constitution_desc:0 "Es ist an der Zeit, unsere alte Verfassung zu aktualisieren und der Welt die Rechte vor Augen zu führen, die die Arbeiter und Bauern der Sowjetunion genossen!"
 SOV_collectivist_propaganda:0 "Kollektivistische Propaganda"
 SOV_collectivist_propaganda_desc:0 "In der Sowjetunion gibt es keinen Platz für individuellen Ruhm. Unsere Propaganda sollte den Schwerpunkt auf kollektive Anstrengungen legen: übertroffene Produktionsziele, erfolgreiche Expeditionen und gewaltige Bauprojekte."
 SOV_militarized_schools:0 "Militarisierte Schulen"
 SOV_militarized_schools_desc:0 "Sowjetischen Kindern sollten militärische Disziplin und sozialistische Tugenden wie Selbstaufopferung und Solidarität eingeimpft werden. Junge Köpfe lassen sich leichter formen."
 SOV_workers_culture:0 "Arbeiterkultur"
 SOV_workers_culture_desc:0 "Der Sozialismus ist nicht nur ein Wirtschaftssystem und der Marxismus nicht nur eine Wissenschaft; wir müssen das Gefüge der sowjetischen Gesellschaft grundlegend verändern, um alle Überreste bürgerlicher Sitten und Traditionen auszumerzen."
 SOV_new_soviet_man:0 "Der neue Sowjetmensch"
 SOV_new_soviet_man_desc:0 "Der neue Sowjetmensch ist selbstlos, gebildet, diszipliniert und gesund; ein lebendiger Triumph über niedere Instinkte und falsches Bewusstsein. Männer geben gerne ihr Leben für das Wohl aller, und Frauen gebären viele Kinder für die Zukunft der sowjetischen Gesellschaft."
 SOV_positive_heroism:0 "Positiver Heldenmut"
 SOV_positive_heroism_desc:0 "Es ist an der Zeit, die alte leninistische kollektivistische Propaganda hinter sich zu lassen und verschiedene außergewöhnliche Individuen in überlebensgroße Helden des Sozialismus zu verwandeln!"
 SOV_progress_cult:0 "Fortschrittskult"
 SOV_progress_cult_desc:0 "Wir sollten die Innovationen herausragender sowjetischer Wissenschaftler feiern und das richtige freie Denken fördern. Die UdSSR wird dem dekadenten Westen immer einen Schritt voraus sein, wenn es um mutige neue Wissenschaftsgebiete geht; man denke nur an die brillante Arbeit des Genossen Lysenko!"
 SOV_socialist_science:0 "Sozialistische Wissenschaft"
 SOV_socialist_science_desc:0 "Die Welt ist, wie der Geist, in ständiger Bewegung. Die Natur befindet sich in einem Zustand ständigen Fortschritts, ja sogar Revolution. Die Prinzipien des dialektischen Materialismus lassen sich sowohl auf die Naturwissenschaften als auch auf die Sozialwissenschaften anwenden."
 SOV_aviation_cult:0 "Luftfahrtkult"
 SOV_aviation_cult_desc:0 "Die Sowjetunion wird die Welt mit erstaunlichen Leistungen der Luftfahrt beeindrucken. Unsere heldenhaften Piloten sind die Ritter der bolschewistischen Kultur und des Fortschritts und demonstrieren unsere technologische Überlegenheit über die Natur. Wie weit sind wir seit den Tagen des Zaren gekommen!"
 SOV_women_pilots:0 "Frauen in der Luftfahrt"
 SOV_women_pilots_desc:0 "Genossin Raskova, unserer heldenhaften Langstreckenfliegerin, sollte es gestattet sein, im Rahmen ihres Programms „Aviation Group 122“ einige reine Frauenfliegerregimenter zu bilden."
 SOV_night_witches_tt:0 "Das 588. Nachtbomberregiment wird in Moskau aktiv."
 SOV_socialist_realism:0 "Sozialistischer Realismus"
 SOV_socialist_realism_desc:0 "Alle Kunstwerke in der Sowjetunion müssen darauf abzielen, die Menschen über die Ziele und die Bedeutung des Kommunismus aufzuklären und das Proletariat in realistischen und typischen Szenen des Alltagslebens darzustellen. Sowjetische Künstler sind Seeleningenieure!"
 SOV_improve_railway:0 "Verbesserung des Eisenbahnnetzes"
 SOV_improve_railway_desc:0 "Unser erster Fünfjahresplan erwies sich als zu erfolgreich. Der massive Ausbau der Schwerindustrie hat die Sowjetunion in eine deutlich stärkere Verteidigungsposition gebracht, doch das sowjetische Eisenbahnnetz ist an kritische Engpässe geraten. Das Volkskommissariat für Eisenbahnen (NKPS) hat einen ehrgeizigen Plan, diese Engpässe zu schließen und die Verteidigung des Vaterlandes zu gewährleisten."
 SOV_transpolar_flights:0 "Transpolare Flüge"
 SOV_transpolar_flights_desc:0 "Unsere mutigsten Piloten beweisen gerade erst, dass waghalsige Routen über die Arktis möglich sind. Indem wir bei der Planung unseres Luftkriegs solche unerwarteten Abkürzungen nutzen, können wir den Feind überraschen."
 SOV_ocean_going_navy:0 "Eine Hochseeflotte"
 SOV_ocean_going_navy_desc:0 "Obwohl die Union eine größere Landfläche umfasst als jede andere Nation auf der Erde, werden die Weltmeere noch immer nicht von unseren Schiffen beherrscht. Schwer gepanzerte Schlachtschiffe werden Teil unserer zukünftigen Hochseeflotte sein."
 SOV_peoples_commissariat:0 "PCDI gefunden"
 SOV_peoples_commissariat_desc:0 "Das Volkskommissariat für Rüstungsindustrie der UdSSR wird ein Schwerindustrieministerium sein, das sich auf unsere militärisch-industriellen Projekte konzentriert. Langfristig könnte die Arbeitsbelastung weitere Abteilungen des Ministeriums erfordern."
 SOV_anti_fascist_diplomacy:0 "Antifaschistische Diplomatie"
 SOV_anti_fascist_diplomacy_desc:0 "Obwohl alle westlichen Regime repressiv und korrupt sind, gibt es keine schlimmeren als diejenigen, die vorgeben, fortschrittlich oder gar sozialistisch zu sein! Indem sie ein solches falsches Bewusstsein im Proletariat fördern, versuchen sie, die Revolution zu verzögern und die Arbeiter in ewiger Knechtschaft zu halten."
 SOV_operation_zet:0 "Operation Zet"
 SOV_operation_zet_desc:0 "Obwohl die Kuomintang reaktionär ist, erscheint es unwahrscheinlich, dass Mao und seine Version des Kommunismus in China die Oberhand gewinnen werden. Wir sollten uns bemühen, die Beziehungen zu Chiang zu verbessern; das lächerlich anachronistische Kaiserreich Japan wird ohnehin bald zusammenbrechen."
 SOV_annex_tannu_tuva:0 "Annex Tannu Tuva"
 SOV_annex_tannu_tuva_desc:0 "Obwohl es wirtschaftlich kaum eine Rolle spielt, sollten wir aus politischen Gründen die Volksrepublik Tannu Tuva formell als autonome Oblast innerhalb der Sowjetunion annektieren."
 SOV_improve_stalin_line:0 "Verbessern Sie die Stalin-Linie"
 SOV_improve_stalin_line_desc:0 "Unsere Westgrenze muss besser vor faschistischer Aggression geschützt werden. Die Stalin-Linie sollte verlängert und modernisiert werden."
 SOV_far_east_fortification:0 "Fernöstliche Festung"
 SOV_far_east_fortification_desc:0 "Die Japaner dringen ständig über die Grenze zur Mandschurei vor. Wir müssen unsere Verteidigung entlang dieser Grenze verbessern, um sie dauerhaft abzuschrecken."
 SOV_far_east_fortification_forts_1:0 "Fügen Sie §Y6 Landfestungen§! an der japanischen Grenze hinzu.\n"
 SOV_far_east_fortification_forts_2:0 "Fügen Sie §Y8 Landfestungen§! an der japanischen Grenze hinzu.\n"
 SOV_far_east_fortification_forts_3:0 "Fügen Sie §Y4 Landfestungen§! an der japanischen Grenze hinzu.\n"
 SOV_xian_incident:0 "Xi&#39;an-Vorfall"
 SOV_xian_incident_desc:0 "Durch unsere Kontakte mit prominenten Vertretern der Kuomintang sollte es uns gelingen, Chiang Kai-Shek zu entführen und ihn zu zwingen, die Macht mit Mao zu teilen. Damit würden wir ihren zerstörerischen Streit effektiv beenden und China könnte den Raubzügen Japans besser widerstehen."
 SOV_xian_incident_tt:0 "Wenn beide Parteien zustimmen, wird ein Waffenstillstand zwischen dem nationalistischen und dem kommunistischen China erzwungen."
 SOV_anti_capitalist_diplomacy:0 "Antikapitalistische Diplomatie"
 SOV_anti_capitalist_diplomacy_desc:0 "Die größten Hindernisse für eine globale Revolution sind zweifellos die fetten Banker der USA und die rücksichtslosen kolonialistischen Unterdrücker Großbritanniens. Unser oberstes Ziel muss es sein, ihnen auf die gierigen Hände zu klopfen und ihre liberale Propaganda zu untergraben."
 SOV_expand_red_fleet:0 "Erweitern Sie die Rote Flotte"
 SOV_expand_red_fleet_desc:0 "Die Rote Flotte ist im Vergleich zu den Marinen der imperialistischen Mächte erbärmlich schwach. Wir müssen ihren Ausbau zu einer nationalen Priorität machen!"
 SOV_anti_colonialist_rebels:0 "Die Komintern"
 SOV_anti_colonialist_rebels_desc:0 "Da das kapitalistische System in die Phase des endgültigen Zusammenbruchs eintritt, muss die richtige Haltung aller kommunistischen Parteien eine äußerst aggressive, militante und ultralinke Linie sein. Insbesondere fordern wir die kommunistischen Parteien der Welt auf, ihre Energien der Zerstörung der gemäßigten Linken zu widmen."
 SOV_southern_thrust:0 "Südlicher Schub"
 SOV_southern_thrust_desc:0 "Durch die Annexion des Iran und des Irak würden sowohl deren riesige Ölreserven für die Revolution gesichert als auch direkter Druck auf die britischen Imperialisten in Ägypten und Indien ausgeübt."
 SOV_reconcile_japan:0 "Japan versöhnen"
 SOV_reconcile_japan_desc:0 "Unsere Beziehungen zu Japan waren schon immer problematisch, aber es gibt Wichtigeres zu tun. Indem sie den Mangel an natürlichen Ressourcen ausnutzen, könnten die Japaner an der Nase herumgeführt werden ... Ihr anachronistisches Feudalregime wird ohnehin bald fallen."
 SOV_claim_on_sinkiang:0 "Anspruch Sinkiang"
 SOV_claim_on_sinkiang_desc:0 "Unter der Herrschaft von Genosse Sheng Shicai ist Sinkiang praktisch bereits ein sowjetischer Marionettenstaat. Wir sollten es offiziell machen ..."
 SOV_claim_on_sinkiang_threat:0 "Sowjetische Beanspruchung von Sinkiang"
 SOV_pan_slavic_rhetoric:0 "Panslawische Rhetorik"
 SOV_pan_slavic_rhetoric_desc:0 "Genosse Lenin ging zu weit, als er im Streben nach der Weltrevolution seine russische, slawische Identität aufgab. Ein gewisses Maß an Nationalismus sollte uns gut tun, und die Wiederbelebung einer Art Panslawismus könnte uns helfen, den anderen slawischen Nationen näher zu kommen."
 SOV_claims_on_baltic:0 "Ansprüche in der Ostsee"
 SOV_claims_on_baltic_desc:0 "Peter der Große hatte Recht, als er Zugang zu den Häfen im Westen suchte. Die baltischen Staaten, die nach der Revolution verloren gingen, sollten wieder in die Sowjetunion integriert werden."
 SOV_claim_bessarabia:0 "Anspruch auf Bessarabien"
 SOV_claim_bessarabia_desc:0 "Das Schwarze Meer ist für unsere Wirtschaft sogar noch wichtiger als die Ostsee. Wir müssen alles tun, um die Kontrolle über den Bosporus und die Dardanellen zu sichern."
 SOV_claims_on_turkey:0 "Ansprüche an die Türkei"
 SOV_claims_on_turkey_desc:0 "Die Türken haben nicht nur unsere Forderungen nach einer gemeinsamen Kontrolle des Bosporus konsequent abgelehnt, sie weigern sich auch, über Grenzanpassungen im Osten zu diskutieren. Vielleicht ist es an der Zeit, ihnen eine Lektion zu erteilen!"
 SOV_baltic_security:0 "Baltische Sicherheit"
 SOV_baltic_security_desc:0 "Die Ostsee ist unser Vorgarten und muss um jeden Preis geschützt werden. Karelien muss erobert werden, um Leningrad eine sichere Pufferzone zu geben, und die Selbstverwaltung Estlands ist einfach lächerlich!"
 SOV_claims_on_poland:0 "Ansprüche an Polen"
 SOV_claims_on_poland_desc:0 "Die Inkompetenz und Peinlichkeit des sowjetisch-polnischen Krieges muss gerächt und Ostpolen wieder in die UdSSR integriert werden!"
 SOV_demand_eastern_poland:0 "Nachfrage Ostpolen"
 SOV_demand_eastern_poland_desc:0 "Nachdem wir unser Recht auf die östlichen Gebiete Polens bekräftigt haben, sollten wir klarstellen, dass sich Polen nur durch eine friedliche Übergabe dieser Gebiete vor einer weiteren Teilung retten kann."
 SOV_offer_poland_protection:0 "Bieten Sie Polen Schutz"
 SOV_offer_poland_protection_desc:0 "Obwohl wir Ostpolen einfach erobern könnten, wäre es viel besser, wenn Polen sich unserer Komintern anschließen würde. Allerdings müssten wir ihnen für unsere Ansprüche etwas bieten. Wenn wir ihnen Ostdeutschland versprechen, könnten sie Interesse haben."
 SOV_offer_poland_protection_tt:0 "§YPolen werden im Falle einer sowjetischen Eroberung die durch dieses Abkommen beanspruchten Staaten zugesprochen.§!\n"
 SOV_great_purge:0 "Die große Säuberung"
 SOV_great_purge_bypass_tt:0 "Trotzki wird zum Führer der Sowjetunion"
 SOV_great_purge_desc:0 "Unter den Offizieren, sogar in den höchsten Rängen, braut sich eine gefährliche trotzkistische Verschwörung zusammen. Obwohl Trotzkis persönliche Beteiligung unbekannt bleibt, ist die Bedrohung groß. Die UdSSR könnte sogar in einen weiteren Bürgerkrieg gestürzt werden ... es sei denn, wir sind bereit, ein paar Eier zu zerschlagen."
 SOV_great_purge_tt:0 "Es wird eine Reihe von „Schauprozessen“ geben, um mutmaßliche trotzkistische Minister und Führer aus dem Amt zu säubern.\n"
 SOV_great_purge_tt2:2 "Die Anzahl der durchgeführten Säuberungen beeinflusst die Wahrscheinlichkeit eines erneuten Bürgerkriegs und skaliert die Auswirkungen von „Gesäuberte Offiziere“. \nWenn dieser Schwerpunkt nicht gewählt wird, führt dies zu einem Bürgerkrieg und möglicherweise zur Rückkehr von „Leon Trotzki“ aus dem Exil. \n\n"
 SOV_permanent_revolution:0 "Permanente Revolution"
 SOV_permanent_revolution_tt:0 "Trotzki ist zurückgekehrt"
 SOV_permanent_revolution_tt2:0 "§YTrotzki§! erhält eine bessere Anführereigenschaft."
 SOV_permanent_revolution_desc:0 "Der unterdrückerische Demagoge ist verschwunden! Die wahre Macht ist dem Volk unserer Nation zurückgegeben worden. Jeder kann nun seine Interessen unabhängig und kompromisslos verfolgen. Wir verändern uns ständig. Die permanente Revolution ist eine triumphale Revolution."
 SOV_rehabilitated_military:0 "Rehabilitiertes Militär"
 SOV_rehabilitated_military_desc:0 "Wenn der Makel des Trotzkismus endlich aus dem Offizierskorps gesäubert wäre, wäre es vielleicht möglich, dem Militär wieder eine gewisse Freiheit von politischer Einmischung zu gewähren."
 SOV_military_reorganization:0 "Militärische Reorganisation"
 SOV_military_reorganization_desc:0 "Die Säuberung hat das Militär in keinem guten Zustand hinterlassen. Die neue Führung ist unerfahren und ineffektiv, und es wurde keine Arbeit an der Weiterentwicklung unserer Doktrinen geleistet. Wir müssen diese Situation sofort korrigieren!"
 SOV_nkvd_primacy:0 "NKWD-Vorrang"
 SOV_nkvd_primacy_desc:0 "Das Militär hat gezeigt, dass man ihm niemals trauen kann. Deshalb muss der NKWD ausgebaut und mit mehr Macht ausgestattet werden. Außerdem müssen mehr politische Kommissare die Offiziere im Auge behalten."
 SOV_nkvd_divisions:0 "NKWD-Abteilungen"
 SOV_nkvd_divisions_desc:0 "Dem NKWD sollten einige eigene Divisionen zur Verfügung gestellt werden, die als interne Truppen fungieren und Eisenbahnen und wichtige Einrichtungen schützen."
 SOV_lessons_of_war:0 "Lehren des Krieges"
 SOV_lessons_of_war_desc:0 "Mit den Erfahrungen aus begrenzten Kriegen sollten wir in der Lage sein, einige Durchbrüche in der Panzerkriegsführung zu erzielen und vielleicht sogar das dezimierte Offizierskorps endlich wieder auf Vordermann zu bringen!"
 SOV_smersh:0 "SMERSH"
 SOV_smersh_desc:0 "SMERSH oder „Tod den Spionen“ ist eine geplante Spionageabwehrinitiative, die einem doppelten Zweck dienen soll: der Aufspürung feindlicher Spione und der Hinrichtung von Deserteuren und Partisanen in den Reihen der Roten Armee."
 SOV_smersh_tt:0 "§YBeseitigt das Risiko eines Putsches.§!\n"
 SOV_partisan_suppression:0 "Partisanenunterdrückung"
 SOV_partisan_suppression_desc:0 "SMERSH sollte erweitert werden, um alle Formen parteiischer Aktivitäten in besetzten Gebieten besser infiltrieren und rücksichtslos unterdrücken zu können."
 SOV_war_with_germany:0 "Krieg mit Deutschland"
 SOV_war_with_germany_desc:0 "Die deutsche Bedrohung wächst weiter. Wir können und müssen die deutsche Armee vernichten und sie ihren neuen Oberherren unterwerfen."
 SOV_war_with_germany_tt:0 "Molotow-Ribbentrop-Pakt nicht in Kraft"
 SOV_war_with_japan:0 "Krieg mit Japan"
 SOV_has_not_officers_purged_tt:0 "Hat keinen Nationalgeist §YOffiziere gesäubert§!"
 SOV_war_with_japan_desc:0 "Es scheint, als hätten die Japaner nicht vor, nachzugeben. Die einzige wirksame Abschreckung ist der Krieg. Sie werden es bereuen, unseren Forderungen widerstanden zu haben, wenn die Rote Armee sie niedertrampelt."
 SOV_war_with_uk:0 "Krieg mit Großbritannien"
 SOV_war_with_uk_desc:0 "Die imperialistischen Briten haben uns nie respektiert. Es besteht kein Zweifel, dass sie sich der Sowjetunion zuwenden werden, wenn sie mit dem Rest der Welt fertig sind. Es gibt nur einen Weg, ihre aggressive Expansion zu verhindern: Krieg!"
 SOV_claim_on_the_straits:0 "Beanspruchen Sie die Meerenge"
 SOV_claim_on_the_straits_desc:0 "Die Meerenge vom Schwarzen Meer zur Ägäis ist ein strategisch wichtiger Punkt. Wir können nicht zulassen, dass dieses Gebiet von ausländischen Mächten kontrolliert wird. Um die Bedeutung der Roten Flotte zu gewährleisten, müssen wir die Meerenge sichern."
 SOV_ultimatum_to_greece:0 "Ultimatum an Griechenland"
 SOV_ultimatum_to_greece_desc:0 "Die Ägäischen Inseln sind das letzte strategische Puzzlestück, das wir brauchen, um sicherzustellen, dass die Rote Flotte ungehindert operieren kann. Die Griechen stehen von allen Seiten unter Druck und würden höchstwahrscheinlich ein kleines Gebiet aufgeben, um einen offenen Krieg zu vermeiden."
 SOV_diversify_the_programme:0 "Diversifizieren Sie das Programm"
 SOV_diversify_the_programme_desc:0 "Wir haben in den letzten Jahren viel gelernt und in der traditionellen Kriegsführung Fortschritte erzielt. Wir sind eine Nation großartiger Wissenschaftler, die in der Lage sind, Kriegsmethoden zu entwickeln, die enorme Vorteile bieten. Wenn wir Ergebnisse sehen wollen, müssen wir sicherstellen, dass sie optimale Arbeitsbedingungen vorfinden."
 SOV_research_city_experiment:0 "Forschungsstadt-Experiment"
 SOV_research_city_experiment_desc:0 "Einer unserer führenden Wissenschaftler, Kurchatov, stellte fest, dass beim Zerbrechen der Kerne eines Kilogramms Uran die freigesetzte Energie der Explosion von 20.000 Tonnen Uran entsprechen muss. Wir müssen diese Kraft nutzen, um unseren Feinden das Überleben unseres Vaterlandes zu sichern."
 SOV_closed_city_network:0 "Geschlossenes Stadtnetzwerk"
 SOV_closed_city_network_desc:0 "Wir sollten geschlossene Städte für Forschungszwecke errichten, die mehr Platz benötigen, als uns in unseren Militärbasen zur Verfügung steht. Der eingeschränkte Zugang zu den Städten stellt sicher, dass unsere Forschung geheim bleibt, und bietet unseren Wissenschaftlern gleichzeitig ausreichend Platz für groß angelegte Experimente."
 SOV_INT_step_towards_revolution:0 "Ein Schritt in Richtung Revolution"
 SOV_INT_step_towards_revolution_desc:0 "Die Sowjets haben die bürgerliche Diktatur unter der Herrschaft derjenigen, die den Völkermord im Russischen Reich verübt haben, endgültig gestürzt. Doch das ist nicht der letzte Schritt. Damit unsere Revolution wirklich erfolgreich ist, müssen wir sie durch die Lehren von Marx vorantreiben."
 SOV_INT_food_rationing:0 "Lebensmittelrationierung einführen"
 SOV_INT_food_rationing_desc:0 "Der Krieg und sein Elend haben uns dazu gebracht... die einzige Möglichkeit, die gesamte Bevölkerung zu versorgen, ist die Rationierung der Nahrungsmittel in unserem Volk. Wir sind uns der Folgen voll bewusst und müssen uns für deren Lösung einsetzen."
 strike_usa_focus:0 "Schlagt die USA!"
 strike_usa_focus_desc:0 "Die perfiden Amerikaner haben uns in ihrer Gewalt und kontrollieren unsere Versorgung mit Öl und anderen dringend benötigten Ressourcen. Ihre Industrie ist unserer weit überlegen, also sollten wir, wenn wir zuschlagen, mit aller Härte zuschlagen! Wir können nicht hoffen, einen längeren Krieg gegen die USA zu gewinnen ..."
 chinese_puppet_focus:0 "Chinesische Marionette"
 chinese_puppet_focus_desc:1 "China hat bewiesen, dass es einen Krieg mit uns vermeiden will. Vielleicht erachtet seine Führung die interne Spaltung als größere Bedrohung. Als Untertanen der Großostasiatischen Wohlstandssphäre könnten wir ihnen unseren Schutz vor Kommunisten und Kriegsherren anbieten."
 chinese_war_focus:0 "Krieg mit China"
 chinese_war_focus_desc:0 "Der Vorfall an der Marco-Polo-Brücke hat gezeigt, dass die Chinesen nicht an einer Zusammenarbeit interessiert sind. Angesichts der zunehmenden Spannungen, die den bevorstehenden Waffenstillstand gefährden, könnte Krieg die einzige Möglichkeit sein, die chinesische Nation zur Ruhe zu bringen."
 subdue_warlords_focus:0 "Unterwerfe die Kriegsherren"
 subdue_warlords_focus_desc:0 "Die Chinesen haben zugelassen, dass ihr einst stolzes Reich von Radikalen und Militärcliquen zerschlagen und in Stücke gerissen wurde. Das Kaiserreich Japan wird solche Spaltungen nicht dulden, nicht einmal innerhalb seiner Untertanen."
 oust_germans_focus:0 "Trennung der deutsch-chinesischen Beziehungen"
 oust_germans_focus_desc:0 "Deutsche Militärberater sind seit mindestens den 1920er Jahren in China präsent und unterstützen die Kuomintang maßgeblich. Das kann nicht länger toleriert werden. Wir haben das Recht, den sofortigen Entzug jeglicher deutscher Unterstützung für die Chinesen zu fordern. Es ist Zeit für die Deutschen, sich für eine Seite zu entscheiden."
 found_own_faction_focus:0 "Unsere Fraktion gegründet"
 found_own_faction_focus_desc:1 "Wir haben bereits Anstrengungen zur Schaffung einer gemeinsamen Wohlstandssphäre in Ostasien unternommen. Um einen dauerhaften Erfolg zu sichern, muss Japan stark genug sein, um in Asien und darüber hinaus allein die Führung zu übernehmen."
 axis_leanings_focus:0 "Achsenneigungen"
 axis_leanings_focus_desc:0 "Wir haben viele gemeinsame Interessen und Werte mit dem neuen Deutschland, das in Europa eine Machtbasis aufbaut. Ein Bündnis mit Deutschland würde uns einen mächtigen Freund bescheren, der weit genug entfernt ist, um unsere Herrschaft über Asien nicht zu überbieten."
 subvert_india_focus:0 "Indische Nationalarmee"
 subvert_india_focus_desc:0 "Wenn Großbritannien unsere Bemühungen, ein Imperium aufzubauen, beurteilt, werden wir ihnen zeigen, dass ihr eigenes bereits zerfällt. Indische Kriegsgefangene und Auswanderer werden die Grundlage einer Bewegung bilden, die das britische Raj stürzen kann."
 jap_improved_sprit_focus:0 "Verbesserter Nationalgeist"
 jap_improved_sprit_focus_desc:0 "Nationalstolz und Unterstützung für den Krieg überkommen alle Untertanen des Kaisers und treiben sie zu immer größerer Hingabe!"
 befriend_siam_focus:0 "Freunde dich mit Siam an"
 befriend_siam_focus_desc:0 "Siam hat die europäische Kolonisierung vermieden und ist es nicht gewohnt, ein unterworfenes Land zu sein. Anstatt es zu unterwerfen, sollten wir es davon überzeugen, mit uns zu kooperieren, damit es so bleibt."
 army_primancy_focus:0 "Vorrang der Armee"
 army_primancy_focus_desc:0 "Von den beiden Hauptwaffengattungen ist die Armee der starke rechte Arm des Imperiums! Ihre Fähigkeit, Gebiete zu erobern und zu halten, übertrifft die kleineren Leistungen der Marine bei weitem. Wenn man diese einfache, selbstverständliche Tatsache erkennt und der Armee mehr Ressourcen zur Verfügung stellt, sind die Möglichkeiten grenzenlos."
 JAP_army_primancy_focus_bypass_tt:0 "Nicht genügend Bauplätze für §YMilitärfabriken§! im Heimatgebiet."
 jap_sia_love:0 "Japanisch-siamesische Diplomatie"
 jap_sia_love_desc:0 "Japan hat seine diplomatischen Bemühungen auf die Verbesserung der Beziehungen zu Siam konzentriert."
 navy_primancy_focus:0 "Vorrang der Marine"
 JAP_navy_primancy_focus_bypass_tt:0 "Nicht genügend Bauplätze für §YNaval Dockyards§! im Heimatgebiet."
 navy_primancy_focus_desc:0 "Von den beiden Hauptwaffengattungen ist die Marine der starke rechte Arm des Imperiums! Ihre Fähigkeit, die Meere zu kontrollieren, übertrifft die kleineren Aufgaben des Heeres bei weitem. Wenn man diese einfache, selbstverständliche Tatsache anerkennt und der Marine mehr Ressourcen zur Verfügung stellt, sind die Möglichkeiten grenzenlos."
 army_innovations_focus:0 "Armeeinnovation"
 army_innovations_focus_desc:0 "Da die Armee nun die anerkannte wichtigste Streitkraft des Imperiums ist, ist es unsere Pflicht, mehr Ressourcen für das Studium der Landdoktrinen aufzuwenden."
 army_air_innovations_focus:0 "Army Air Innovation"
 army_air_innovations_focus_desc:0 "Die Hauptaufgabe der Luftwaffe muss die Unterstützung unserer gerühmten Armee sein!"
 army_motorization_focus:0 "Armeemotorisierung"
 army_motorization_focus_desc:0 "Eine stärkere Konzentration auf die Motorisierung wird die Geschwindigkeit erhöhen, mit der die Infanterie das Schlachtfeld erreichen kann, zumindest in Gebieten mit guten Straßen."
 air_base_expansion_focus:0 "Erweiterung des Luftwaffenstützpunkts"
 air_base_expansion_focus_desc:0 "Um unsere Armee besser unterstützen zu können, benötigt die Luftwaffe größere Luftwaffenstützpunkte."
 armor_innovations_focus:0 "Rüstungsinnovation"
 armor_innovations_focus_desc:0 "Angesichts des Aufstiegs unserer Armee haben einige Generäle vorgeschlagen, dass wir in eine Reihe moderner Panzerfahrzeuge investieren."
 naval_innovations_focus:0 "Marineinnovationen"
 naval_innovations_focus_desc:0 "Da die Marine nun die anerkannte wichtigste Streitkraft des Imperiums ist, ist es unsere Pflicht, mehr Ressourcen für die Entwicklung neuer Schiffsklassen aufzuwenden."
 naval_air_innovations_focus:0 "Marineluftinnovationen"
 naval_air_innovations_focus_desc:0 "Die Hauptaufgabe der Luftwaffe muss die Unterstützung unserer gerühmten Marine sein!"
 convoy_protection_focus:0 "Konvoischutz"
 convoy_protection_focus_desc:0 "Obwohl es sich um eine feige und unehrenhafte Taktik handelt, ist es möglich, dass feindliche Nationen die Handelsschiffe angreifen, die Vorräte und Ressourcen in unserem Reich transportieren. Wir müssen untersuchen, wie wir diese Schiffe in diesem Fall am besten schützen können."
 advanced_torpedoes_focus:0 "Fortgeschrittene Torpedos"
 advanced_torpedoes_focus_desc:0 "Durch die Verwendung von komprimiertem Sauerstoff anstelle von Druckluft in den Antriebssystemen können unsere Torpedos größere Reichweiten erreichen und einen größeren Sprengkopf tragen als alle bisherigen Typen."
 shbb_focus:0 "Superschwere Schlachtschiffe"
 shbb_focus_desc:0 "Kurzfristig ist es unwahrscheinlich, dass wir Großbritannien oder die USA in puncto Schlachtschiffezahl übertreffen können, aber das ist vielleicht auch gar nicht nötig. Stattdessen könnten wir möglicherweise weitaus mächtigere Schlachtschiffe bauen, als es der Washingtoner Vertrag den Westlern erlaubt."
 naval_base_focus:0 "Erweiterung des Marinestützpunkts"
 naval_base_focus_desc:0 "Der Ausbau der Marine erfordert mehr Marinestützpunkte."
 carrier_focus:0 "Carrier-Fokus"
 carrier_focus_desc:0 "Japan braucht eine schlagkräftige Marine, und der Flugzeugträger muss das Herzstück unserer Flotte bilden. Die Zeit der Schlachtschiffe ist gezählt, wie unsere Feinde bald feststellen werden!"
 battleship_focus:0 "Schlachtschiff-Fokus"
 battleship_focus_desc:0 "Japan braucht eine schlagkräftige Marine, und das Schlachtschiff muss das Herzstück unserer Flotte bilden. Andere Nationen sollen ihren Reichtum nicht für unerprobte Flugzeugträger verschwenden, denn nur Schlachtschiffe können die Meere beherrschen!"
 spiritual_mobilization_focus:0 "Spirituelle Mobilisierung"
 spiritual_mobilization_focus_desc:0 "Unsere gesamte Nation, nicht nur unsere Soldaten, muss geistig auf den Krieg vorbereitet werden. Zu diesem Zweck haben sich Nationalisten in der Nationalen Bewegung für spirituelle Mobilisierung zusammengeschlossen, um den Patriotismus und die Unterstützung für die Regierung zu stärken."
 warrior_traditions_focus:0 "Kriegertraditionen"
 warrior_traditions_focus_desc:0 "Im Laufe der Geschichte hat Japan innerhalb der Kriegerklasse einzigartige Traditionen bewahrt. Diese Werte müssen von jedem Soldaten, unabhängig von seinem Rang, wiederbelebt und geschätzt werden."
 divine_wind_focus:0 "Der göttliche Wind"
 divine_wind_focus_desc:0 "Von jedem Soldaten wird erwartet, dass er der Aussicht auf den Tod furchtlos ins Auge blickt, doch unser Volk muss darüber hinausgehen und sich darauf vorbereiten, sich ohne Hoffnung aufs Überleben zum Ruhm des Kaisers und der Nation zu opfern."
 imperial_glory_focus:0 "Kaiserlicher Ruhm"
 imperial_glory_focus_effect:0 "Ermöglicht die Produktion von §HYokosuka MXY7 Ohka§!"
 imperial_glory_focus_desc:0 "Kamikaze, die Taktik der Spezialangriffseinheit, hat Selbstmordanschläge von einer improvisierten letzten Maßnahme zu einer etablierten Doktrin gemacht. Mit neuen Flugzeugen, im Wesentlichen bemannten Raketen, werden diese Angriffe unaufhaltsam sein."
 student_movement_focus:0 "Die Studentenbewegung"
 student_movement_focus_desc:0 "Das Bildungsministerium ist ein ebenso wichtiger Teil der spirituellen Mobilisierung wie jeder andere, und wenn sich Pädagogen und Schüler hinter die Nation stellen, wird ein dauerhaftes, militärisch orientiertes Bildungssystem aufgebaut."
 extra_tech_focus:0 "Zusätzliche Forschung"
 synth_oil_focus:0 "Fokus auf synthetisches Öl"
 synth_oil_focus_desc:0 "Unsere eigene Ölproduktion ist sehr begrenzt und der Import von Öl macht uns von ausländischen Interessen abhängig. Die sicherste Lösung wäre die Perfektionierung unserer synthetischen Öltechnologie."
 JAP_synth_oil_focus_tt:0 "Idemitsu Kosan als Industriekonzern verfügbar"
 secret_weapon_focus:0 "Fortgeschrittene Waffen"
 secret_weapon_focus_desc:0 "Als Inselreich müssen wir in der Marineforschung immer an vorderster Front stehen, aber auch Langstreckenraketen können nicht schaden."
 industrial_effort_focus:0 "Imperiale Sparmaßnahmen"
 industrial_effort_focus_desc:0 "Jeder Untertan des Kaisers muss für das Wohl des Reiches Opfer bringen."
 industrial_effort_focus2:0 "Industrielle Anstrengungen"
 industrial_effort_focus2_desc:0 "Japan ist ein junges Industrieland und noch nicht so mächtig wie manche westliche Nationen. Wir müssen Maßnahmen ergreifen, um die Lücke zwischen unseren Fähigkeiten zu schließen."
 infra_effort_focus:0 "Infrastrukturaufwand"
 infra_effort_focus_desc:0 "Es war nicht einfach, in unserem bergigen Land eine Infrastruktur aufzubauen, dennoch müssen die Bemühungen fortgesetzt werden."
 fortress_japan_focus:0 "Festung Japan"
 fortress_japan_focus_desc:0 "Sollten unsere Feinde unsere Marine jemals überwältigen, werden unsere Befestigungen dafür sorgen, dass jeder Invasionsversuch weitaus mehr kostet, als sich die meisten Nationen leisten können."
 crypto_bomb_focus:0 "Kryptologische Bombe"
 crypto_bomb_focus_desc:0 "Die Polen haben eine geniale Maschine entwickelt, die sie „Kryptologische Bombe“ nennen und die deutsche Enigma-Chiffre knacken kann. Wir verfügen in unserem Werk in Bletchley Park über die nötigen Ressourcen, um sie weiterzuentwickeln."
 tizard_mission_focus:0 "Die Tizard-Mission"
 tizard_mission_focus_desc:0 "Wir haben viele technologische Durchbrüche erzielt, die wir aufgrund mangelnder Ressourcen und industrieller Kapazitäten nicht vollständig ausschöpfen können. Henry Tizard möchte eine Delegation anführen, die mit den USA über einen Technologieaustauschvertrag verhandelt."
 maud_focus:0 "Das MAUD-Komitee"
 maud_focus_desc:0 "Das Komitee „Militärische Anwendung der Uran-Detonation“ ist davon überzeugt, dass es theoretisch möglich ist, durch den Einsatz von Uran eine Bombe mit unglaublicher Sprengkraft zu bauen, die eine unkontrollierte Kernspaltung ermöglicht. Allerdings werden wir diese Technologie möglicherweise nicht rechtzeitig aus eigener Kraft entwickeln können. Wir sollten mit den Amerikanern sprechen."
 general_rearmament_focus:0 "Allgemeine Wiederbewaffnung"
 general_rearmament_focus_desc:1 "[Root.GetGeneralRearmamentDesc]"
 ENG_GENERAL_REARMAMENT_DESC_HISTORICAL:0 "Es sieht langsam so aus, als sei ein weiterer Weltkrieg unvermeidlich. Wenn es nicht Hitler ist, dann wird es der Mikado sein, oder sogar die Sowjets... Die öffentliche Meinung hat sich so weit gewandelt, dass wir ein Programm zur allgemeinen Wiederaufrüstung einleiten können."
 ENG_GENERAL_REARMAMENT_DESC_AHISTORICAL:0 "Unsere Vorgänger haben unsere militärische Lage zu sehr vernachlässigt. Wir müssen ein Programm zur allgemeinen Wiederaufrüstung einleiten, um die eklatanten Mängel unserer Streitkräfte zu beheben."
 air_defense_focus:0 "Flugabwehr"
 air_defense_focus_tt:1 "Maximale §YLuftabwehr§! in §YOstengland§!, §YSussex§! und §YSüdwestengland§! hinzufügen."
 air_defense_focus_bypass_tt:0 "Nicht genügend Bauplätze für §YLuftabwehr§!"
 air_defense_focus_desc:0 "Es besteht keine Frage, woher der Feind kommen wird; wir müssen die Küste mit ausgedehnten Flugabwehrbatterien schützen."
 radar_focus:0 "RADAR"
 radar_focus_desc:0 "Die Fähigkeit, feindliche Bomber zu erkennen, wird für die Kriegsanstrengungen von entscheidender Bedeutung sein. Wir sollten keine Ressourcen scheuen, um die Radartechnologie weiterzuentwickeln und ein Netzwerk von Ortungsstationen entlang der Küsten aufzubauen."
 royal_ordinance_focus:2 "[Root.GetRoyalOrdnanceFactoriesName]"
 royal_ordinance_focus_desc:1 "[Root.GetRoyalOrdnanceFactoriesDesc]"
 ENG_ROYAL_ORDNANCE_FACTORIES_NAME_HISTORICAL:0 "Königliche Waffenfabriken"
 ENG_ROYAL_ORDNANCE_FACTORIES_NAME_COMMUNIST:0 "Revolutionäre Waffenfabriken"
 ENG_ROYAL_ORDNANCE_FACTORIES_DESC_HISTORICAL:0 "Das Royal Arsenal in Woolwich ist völlig unzureichend, um die benötigte Munition und Kleinwaffen zu produzieren. Wir sollten im ganzen Land viele weitere Fabriken errichten, vorzugsweise in relativ sicheren Gebieten."
 ENG_ROYAL_ORDNANCE_FACTORIES_DESC_COMMUNIST:0 "Das Revolutionsarsenal in Woolwich ist völlig unzureichend, um die benötigte Munition und Kleinwaffen zu produzieren. Wir sollten im ganzen Land viele weitere Fabriken errichten, vorzugsweise in relativ sicheren Gebieten."
 shadow_scheme_focus:0 "Das Schattenschema"
 shadow_scheme_focus_desc:0 "Das Luftfahrtministerium hat einen brillanten Vorschlag vorgelegt, um die Umstellung ziviler Fabriken auf militärische Anlagen zu erleichtern. Mit entsprechenden Zuschüssen und Darlehen an verschiedene Schlüsselunternehmen können deren Fabriken im Voraus erweitert und angepasst werden, um den Übergang zu militärischen Anwendungen deutlich reibungsloser zu gestalten."
 shadow_scheme_focus_tt:1 "Gewährt bei Kriegseintritt insgesamt §G4§! Bauplätze und §Y4 Militärfabriken§! in zwei Staaten.\n"
 uk_small_arms_focus:0 "BSA Company"
 uk_small_arms_focus_desc:1 "[Root.GetBSACompanyDesc]"
 ENG_BSA_COMPANY_DESC_HISTORICAL:0 "Die Royal Ordnance Factories produzieren nicht genügend Kleinwaffen, aber wir könnten, wie im Ersten Weltkrieg, die Birmingham Small Arms Company beauftragen und ihre Kapazitäten erweitern."
 ENG_BSA_COMPANY_DESC_COMMUNIST:0 "Die Revolutionary Ordnance Factories produzieren nicht genügend Kleinwaffen, aber wir könnten, wie im Ersten Weltkrieg, die Birmingham Small Arms Company beauftragen und ihre Kapazitäten erweitern."
 UK_secret_focus:0 "Geheimwaffen"
 UK_secret_focus_desc:0 "Wir verfügen nun über das Wissen und die Infrastruktur, um uns auf die Entwicklung verschiedener Geheimwaffenprojekte zu konzentrieren, die früher in den Bereich der Science-Fiction gehörten."
 air_rearmament_focus:0 "Luftaufrüstung"
 air_rearmament_focus_desc:1 "[Root.GetAirRearmamentDesc]"
 ENG_AIR_REARMAMENT_DESC_HISTORICAL:0 "In jedem Krieg mit einem kontinentalen Feind ist die Royal Air Force der Schlüssel zum Sieg. Zunächst müssen wir sicherstellen, dass unsere Luftwaffenstützpunkte unsere Wiederaufrüstungspläne unterstützen können!"
 ENG_AIR_REARMAMENT_DESC_COMMUNIST:0 "In jedem Krieg mit einem kontinentalen Feind wird die Volksluftwaffe der Schlüssel zum Sieg sein. Zunächst müssen wir sicherstellen, dass unsere Luftwaffenstützpunkte unsere Wiederaufrüstungspläne unterstützen können!"
 fighter_command_focus:0 "Jagdkommando"
 fighter_command_focus_desc:0 "Unsere oberste Priorität muss die Kontrolle über unseren eigenen Luftraum sein! Es gibt kaum einen wichtigeren Bereich der militärischen Forschung als die Entwicklung von Kampfflugzeugen."
 bomber_command_focus:0 "Bomberkommando"
 bomber_command_focus_desc:0 "Wie Giulio Douhet immer sagte: „Der Bomber wird immer durchkommen!“ Ungeachtet der Fortschritte in der Radartechnologie und der Luftabwehr sollten wir der Entwicklung besserer Bomber Priorität einräumen."
 coastal_command_focus:0 "Küstenkommando"
 coastal_command_focus_desc:1 "[Root.GetCoastalCommandDesc]"
 ENG_COASTAL_COMMAND_DESC_HISTORICAL:0 "Unsere Industrie lebt von Rohstoffen, die aus weit entfernten Teilen des Empire nach Großbritannien geliefert werden. Unsere Konvois sind unser Lebenselixier und müssen sowohl von der Royal Navy als auch von der Royal Air Force geschützt werden. Wir sollten eine spezielle RAF-Formation einrichten, um die Zufahrten zu unseren Häfen zu schützen!"
 ENG_COASTAL_COMMAND_DESC_COMMUNIST:0 "Unsere Industrie wird von Rohstoffen angetrieben, die aus weit entfernten Teilen des Empire nach Großbritannien geliefert werden. Unsere Konvois sind unser Lebenselixier und müssen sowohl von der Arbeiterbefreiungsmarine als auch von der Volksluftwaffe geschützt werden. Wir sollten eine spezielle PAF-Formation aufstellen, um die Zufahrten zu unseren Häfen zu schützen!"
 aircraft_production_focus:0 "Flugzeugproduktionsgruppe"
 aircraft_production_focus_desc:0 "Die Flugzeugproduktion hat für uns weiterhin höchste Priorität. Die London Aircraft Production Group (LAPG) sollte gegründet werden, um die gesamte verfügbare Flugzeugproduktion zu verwalten und zu koordinieren."
 uk_jet_focus:0 "Düsenflugzeug"
 uk_jet_focus_desc:0 "Es scheint nahezu sicher, dass das Düsentriebwerk die Propellermotoren in Flugzeugen ersetzen wird. Das Potenzial ist enorm, und wir dürfen nicht zulassen, dass Großbritannien in diesem wichtigen Forschungsbereich den Anschluss verliert."
 naval_rearmament_focus:0 "Wiederbewaffnung der Marine"
 naval_rearmament_focus_desc:1 "[Root.GetNavalRearmamentDesc]"
 ENG_NAVAL_REARMAMENT_DESC_HISTORICAL:0 "Obwohl wir mit dem Zweiten Londoner Flottenvertrag versucht haben, ein Wettrüsten auf See zu verhindern, wird er selbst von den Unterzeichnern weitgehend ignoriert. Die Royal Navy darf ihre globale Vormachtstellung niemals verlieren. Wir müssen stets dafür sorgen, dass sie die größte der Welt bleibt."
 ENG_NAVAL_REARMAMENT_DESC_COMMUNIST:0 "Obwohl wir mit dem Zweiten Londoner Flottenvertrag versucht haben, ein Wettrüsten auf See zu verhindern, wird er selbst von den Unterzeichnern weitgehend ignoriert. Die Arbeiterbefreiungsmarine darf ihre globale Vormachtstellung niemals verlieren. Wir müssen stets dafür sorgen, dass sie die größte der Welt bleibt."
 uk_destroyer_focus:0 "Zerstörerfokus"
 uk_destroyer_focus_desc:0 "Moderne Schlachtschiffe sind Wunderwerke, aber wir dürfen die entscheidende Rolle der einfachen Zerstörer beim Schutz unserer Konvois nicht vernachlässigen."
 uk_convoy_focus:0 "Konvoi-Eskorte-Fokus"
 uk_convoy_focus_desc:0 "Es kann nicht genug betont werden: Unsere Konvois sind unser Lebenselixier. Wir müssen alles in unserer Macht Stehende tun, um sie zu schützen und verlorene Tonnage schnell zu ersetzen."
 uk_waves_focus:0 "Britannia beherrscht die Meere"
 uk_waves_focus_desc:1 "[Root.GetBritanniaRulesTheWavesDesc]"
 ENG_BRITANNIA_RULES_THE_WAVES_DESC_HISTORICAL:0 "Im langen Schatten der Royal Navy sind andere Seemächte gezwungen, innovative neue Doktrinen zu entwickeln, um dies auszugleichen. Wir dürfen nicht selbstgefällig werden und uns nur auf die Quantität und Qualität einzelner Schiffe verlassen."
 ENG_BRITANNIA_RULES_THE_WAVES_DESC_COMMUNIST:0 "Im langen Schatten der Arbeiterbefreiungsmarine sind andere Seemächte gezwungen, innovative neue Doktrinen zu entwickeln, um dies auszugleichen. Wir dürfen nicht selbstgefällig werden und uns nur auf die Quantität und Qualität einzelner Schiffe verlassen."
 uk_carrier_focus:0 "Carrier-Fokus"
 uk_carrier_focus_desc:0 "Unter Marinetheoretikern wird heftig über die weitere Überlebensfähigkeit des Schlachtschiffs gestritten. Manche argumentieren, dass die moderne Luftwaffe die Seemacht dominieren wird und dass der Flugzeugträger das Schlachtschiff als König der Weltmeere ablösen wird."
 uk_spain_focus:0 "Spanien zwingen"
 uk_spain_focus_desc:0 "Die Spanier kennen die Macht der Royal Navy besser als die meisten anderen, aber vielleicht ist eine Erinnerung angebracht …"
 uk_battleship_focus:0 "Schlachtschiff-Fokus"
 uk_battleship_focus_desc:0 "Während die Theoretiker über Luft- oder Seeherrschaft streiten, möchte niemand die Kanonen eines Schlachtschiffs auf seinen Palast gerichtet haben. Selbst wenn die Trägerenthusiasten am Ende Recht behalten, werden Schlachtschiffe die Weltmeere noch jahrelang beherrschen."
 uk_turkey_focus:0 "Die Türkei zwingen"
 uk_turkey_focus_desc:0 "Sie müssen uns nicht lieben, aber Johnny Turkey sollte genug wissen, um unsere Schlachtschiffe zu fürchten …"
 uk_amphibious_focus:0 "Amphibische Kriegsführung"
 uk_amphibious_focus_desc:0 "Die Meere zu beherrschen ist schön und gut, aber manchmal muss man auch mal die Füße nass machen. Wir dürfen unsere Fähigkeit, Invasionstruppen in feindlichem Gebiet zu landen, nicht vernachlässigen."
 singapore_focus:0 "Die Singapur-Strategie"
 singapore_focus_desc:0 "Singapur sollte unser wichtigster Marinestützpunkt im Osten bleiben. Hongkong könnte an die Japaner fallen, doch Singapur muss uneinnehmbar bleiben, bis die Hauptflotte eintrifft und den Feind entscheidend besiegt."
 sp_landward_forts_focus:0 "Landseitige Befestigungen"
 sp_landward_forts_focus_desc:0 "Die derzeitigen Verteidigungsanlagen auf der Insel Singapur sind unzureichend. Wir müssen unsere Anstrengungen auf die Verstärkung der Befestigungen konzentrieren!"
 peninsular_focus:0 "Halbinselkrieg"
 peninsular_focus_desc:0 "Wir sollten einem Feind zuvorkommen und ihn aufhalten, der aus dem Norden durch Malaya kommt, bevor er Singapur erreicht."
 hongkong_focus:0 "Halten Sie Hongkong"
 hongkong_focus_desc:0 "Die Singapur-Strategie ist überholt. Unser Plan sollte mutiger sein und auf einer Basis viel näher an Japan basieren. Mit ausreichenden Befestigungen und Einrichtungen wäre Hongkong dafür bestens geeignet!"
 hk_landward_forts_focus:0 "Landseitige Befestigungen"
 hk_landward_forts_focus_desc:0 "Hongkong muss zu einer Festungsstadt werden, um einem anhaltenden Angriff vom chinesischen Festland standzuhalten."
 hk_air_focus:0 "Luftabwehr"
 hk_air_focus_desc:0 "Wir müssen die Luftabwehrstellungen in Hongkong erheblich ausbauen und verbessern."
 uk_embargo_focus:0 "Embargo-Richtlinie"
 uk_embargo_focus_desc:0 "Der beste Weg, Diktatoren zu besiegen – egal ob rot oder braun – besteht darin, ihnen schlicht die Ressourcen zu entziehen, die sie für die Kriegsführung benötigen. Das Problem besteht lediglich darin, die Banker und Konzerne einzuschüchtern, die mit ihnen Geschäfte machen …"
 uk_sanction_italy_focus:0 "Sanktion Italien"
 uk_sanction_italy_focus_desc:0 "Mussolini träumt von einem neuen Römischen Reich und könnte, so absurd es auch klingen mag, eines Tages uns angreifen, um seinen Traum zu verwirklichen. Wir sollten alles tun, um dies zu verhindern, bevor es zum Krieg kommt."
 uk_sanction_japan_focus:0 "Sanktionen gegen Japan"
 uk_sanction_japan_focus_desc:0 "Die Japaner scheinen entschlossen, ihre „Großostasiatische Wohlstandssphäre“ zu schaffen – natürlich unter ihrer Hegemonie. Das Haupthindernis ist das Britische Empire, zusammen mit den Kolonien anderer westlicher Mächte. Ihnen muss der Zugang zu den benötigten Ressourcen verwehrt werden."
 uk_burma_focus:0 "Die Burma-Straße"
 uk_burma_focus_desc:0 "Wir sollten die Chinesen in ihrem Kampf gegen Japan unterstützen, indem wir eine Straße – und die dazugehörige Infrastruktur – zwischen Burma und China bauen, über die sie auf dem Landweg versorgt werden können und vor den japanischen Plünderern sicher sind."
 uk_scandinavian_focus:0 "Skandinavische Intervention"
 uk_scandinavian_focus_desc:0 "Skandinavien hätte ohne die schwedischen Eisenexporte kaum strategische Bedeutung. Wir müssen Druck auf Schweden und Norwegen ausüben, um zu verhindern, dass diese wichtige Ressource nach Deutschland gelangt. Sollten sie sich weigern, müssen wir möglicherweise mit einer Invasion rechnen."
 uk_iraq_focus:0 "Sicherer Irak"
 uk_iraq_focus_desc:0 "Wir haben dem Irak 1932 die Unabhängigkeit gewährt, doch angesichts der aktuellen Weltlage könnte das ein Fehler gewesen sein. Irakisches Öl darf niemals unsere Feinde erreichen ..."
 uk_iran_focus:0 "Sicherer Iran"
 uk_iran_focus_desc:0 "Der Iran verfügt nicht nur über reiche Ölvorkommen, die unseren Feinden vorenthalten werden müssen, sondern ist auch ein strategischer Knotenpunkt zwischen Indien, dem Nahen Osten und der Sowjetunion."
 uk_free_india_focus:0 "Indische Unabhängigkeit"
 uk_free_india_focus_desc:0 "Japan schürt aktiv einen Aufstand in Indien und hat sogar eine „Nationale Indische Armee“ aus indischen Rekruten gebildet. Die Situation könnte gefährlich werden, wenn nichts dagegen unternommen wird. Wir können Japan entweder schnell besiegen oder den Indern die Unabhängigkeit in wenigen Jahren versprechen."
 uk_colonial_focus:0 "Ermutigung der Kolonialelite"
 uk_colonial_focus_desc:0 "Unser riesiges, weitläufiges Imperium beherbergt einige der größten Köpfe der Welt, doch aufgrund seiner Größe treffen sich viele von ihnen nie. Indem wir sie ermutigen, bei unseren wichtigsten Projekten zusammenzuarbeiten, können wir schneller Ergebnisse erzielen."
 uk_asia_focus:0 "Ostasien stärken"
 uk_asia_focus_desc:0 "Viele unserer alten Kolonien im Osten sind durch Bürgerkriege und imperiale Ambitionen lokaler Länder bedroht. Wir dürfen unsere verbleibenden Außenposten nicht vernachlässigen, sondern müssen diese Regionen weiterentwickeln, um unsere globale Präsenz zu sichern."
 uk_china_focus:0 "Einfluss China"
 uk_china_focus_desc:0 "Obwohl sich die chinesischen Nationalisten als Feinde unserer Kolonialbemühungen bezeichnen, befinden sie sich in einer Situation, in der sie zu wenige Verbündete haben. Wenn wir auf sie zugehen, sind sie möglicherweise bereit, ihre Politik zu ändern."
 uk_commonwealth_focus:0 "Commonwealth-Krawatten"
 uk_commonwealth_focus_desc:0 "Die Nationen des britischen Commonwealth sind durch ihre gemeinsame Treue zur Krone vereint und sind im Falle eines weiteren globalen Konflikts die erste Adresse, auf die wir zählen können. Die Sicherung unserer diplomatischen Verwaltung wird dort von entscheidender Bedeutung sein."
 uk_india_focus:0 "Entwickeln Sie das Raj"
 uk_india_focus_desc:0 "Der Zustand unserer Kolonien in Indien bleibt sowohl im Ausland als auch im Inland umstritten, doch was auch immer ihnen bevorsteht, die Stärkung ihrer industriellen Kapazitäten hat im gegenwärtigen Stadium Priorität."
 northern_expansion_focus:0 "Nördliche Expansion"
 northern_expansion_focus_desc:0 "Die von der Kaiserlichen Armee unterstützte Nordexpansionsdoktrin erkennt an, dass die Sowjetunion die größte Bedrohung für die japanischen Ambitionen darstellt. Angesichts der zunehmenden Spannungen in Europa wird sich zwangsläufig ein günstiger Zeitpunkt für einen Angriff auf den russischen Fernen Osten ergeben. Wir müssen schnell zuschlagen."
 southern_expansion_focus:0 "Südliche Expansion"
 southern_expansion_focus_tt:0 "Füge §YNichtangriffspakt§! mit §YSowjetunion§! hinzu, wenn ausgewählt\n"
 southern_expansion_focus_desc:0 "Die von der Kaiserlichen Marine favorisierte Südexpansionsdoktrin schreibt Japans Expansion nach Südostasien und in den Pazifik vor. Die reichen Kolonien der europäischen Mächte verfügen über für die japanische Industrie wichtige Ressourcen. Doch dieser Weg würde zu Konflikten mit den USA führen. Ein Präventivschlag ist angebracht."
 new_ideas:0 "Neue Minister verfügbar.\n"
 available_political_advisor:0 "§GVerfügbar§! als §YPolitischer Berater§!:\n"
 available_chief_of_army:0 "§GAnbieten§! als §YOberbefehlshaber§!:\n"
 available_chief_of_navy:0 "§GAnbieten§! als §YChemeph der Marine§!:\n"
 available_chief_of_airforce:0 "§GAnbieten§! als §YChefechef§!:\n"
 available_military_high_command:0 "§GAnbietbar§! als §YMilitärisches Oberkommando§!:\n"
 available_theorist:0 "§GAvailable§! als §YTheoretiker§!:\n"
 available_designer:0 "§GVerfügbar§! als §YDesign Company§!:\n"
 available_industrial_concern:0 "§GAnbietbar§! als §YIndustriekonzern§!:\n"
 remove_political_advisor:0 "§RRemove§! as §YPolitical Advisor§!:\n"
 remove_chief_of_army:0 "§RRemove§! als §YChief of Army§!:\n"
 remove_chief_of_navy:0 "§RRemove§! als §YChief of Navy§!:\n"
 remove_chief_of_airforce:0 "§RRemove§! als §YChief of Airforce§!:\n"
 remove_military_high_command:0 "§RRemove§! als §YMilitary High Command§!:\n"
 remove_theorist:0 "§RRemove§! als §YTheoretiker§!:\n"
 usa_focus:0 "USA Nationaler Fokus"
 USA_issue_war_bonds:0 "Kriegsanleihen ausgeben"
 USA_issue_war_bonds_desc:0 "Mit Kriegsanleihen verlassen wir uns auf die Unterstützung der Bevölkerung für die Kriegsanstrengungen und den Patriotismus, um die Militärausgaben zu finanzieren."
 USA_office_of_strategic_services:0 "Büro für strategische Dienste"
 USA_office_of_strategic_services_desc:0 "Die Gründung eines eigenen Geheimdienstes wird nicht nur den Krieg unterstützen, sondern auch künftige Auslandseinsätze erleichtern. Britische Geheimdienste können als Vorbild dienen."
 USA_wartime_industry:0 "Kriegsindustrie"
 USA_wartime_industry_desc:0 "Wir verfügen über eine starke Industrie, doch nicht alle sind optimal auf die Produktion von Kriegsmaterial ausgerichtet. Die Entwicklung effizienter Prozesse zur Förderung dieses Wandels wird für die Nutzung unserer Ressourcen entscheidend sein."
 USA_first_special_service_force:0 "Erste Spezialeinheit"
 USA_first_special_service_force_desc:0 "Operationen hinter feindlichen Linien in unwirtlichem Gebiet werden Teil jedes globalen Konflikts sein. Die Bildung von Kommandoeinheiten, die diese Aufgaben erfüllen, ist für unsere zukünftige Kriegsführung von entscheidender Bedeutung."
 USA_rubber_reserve_company:0 "Gummireserve-Unternehmen"
 USA_rubber_reserve_company_desc:0 "Mit dem Ausbruch des Krieges sind uns fast alle unsere Quellen für importierten Kautschuk verloren gegangen.\n\nMit einer enormen koordinierten Anstrengung können die Kautschukunternehmen in den Vereinigten Staaten zusammenarbeiten, um bessere Möglichkeiten zur Herstellung von synthetischem Kautschuk zu finden und möglicherweise sogar den Bedarf der Kriegsanstrengungen zu decken."
 USA_manifest_destiny:0 "Manifest Destiny"
 USA_manifest_destiny_desc:0 "Die besonderen Umstände der Gründung und Geschichte unseres Landes berechtigen uns, gegen Ungerechtigkeit und Unterdrückung überall auf der Welt vorzugehen. Um eine sichere internationale Gemeinschaft zu schaffen, muss unser wichtigster Exportartikel die Freiheit sein."
 USA_manifest_destiny_tt:0 "§YGibt Kriegsziele gegen alle faschistischen und kommunistischen Nationen an.§!\n"
 USA_scientist_haven:0 "Zufluchtsort für Wissenschaftler"
 USA_scientist_haven_desc:0 "Nachdem wir uns als Hüter der Freiheit in der Welt etabliert haben, können wir Forscher und Intellektuelle, die aus den Unterdrückungsregimen im Ausland vertrieben wurden, willkommen heißen und ihnen eine Chance geben, erfolgreich zu sein und unsere Sache im Land der unbegrenzten Möglichkeiten zu unterstützen."
 USA_wpa:0 "WPA"
 USA_wpa_desc:0 "Millionen Menschen leiden noch immer unter der Arbeitslosigkeit, die die Weltwirtschaftskrise mit sich brachte. Eine Agentur, die diese Menschen in öffentlichen Projekten beschäftigt, wird das Problem vielleicht nicht vollständig lösen, aber die Work Progress Administration ist ein Schritt in die richtige Richtung."
 USA_committee_on_technocracy:0 "Ausschuss für Technokratie"
 USA_committee_on_technocracy_desc:0 "Wir sollten eine Reihe von Politikern und Geschäftsleuten durch Wissenschaftler und Ingenieure ersetzen. Sie verfügen über das technische Fachwissen, um die Wirtschaft zu steuern, und wir werden große wissenschaftliche Fortschritte erleben, die zu einem erneuten Aufschwung unserer Wirtschaft führen werden."
 USA_support_rock_island:0 "Unterstütze Rock Island"
 USA_support_rock_island_desc:0 "Der Schlüssel zum Sieg liegt darin, unsere tapferen Truppen mit allen Mitteln zu unterstützen. Sei es durch schweres Artilleriefeuer aus der Ferne oder durch direkte Unterstützung auf dem Schlachtfeld. Wir müssen sicherstellen, dass unsere Truppen alles haben, was sie brauchen."
 USA_military_construction:0 "Militärbau"
 USA_military_construction_desc:0 "Angesichts der Bedrohung des Weltfriedens durch Supermächte müssen unsere öffentlichen Bauprojekte sowohl militärischen als auch zivilen Zwecken dienen."
 USA_USACE_projects:0 "USACE-Projekte"
 USA_USACE_projects_desc:0 "Dem US Army Corps of Engineers wird die Aufgabe übertragen, die Grundlage für viele zukünftige Militärprojekte zu schaffen, wie sie die Welt noch nie gesehen hat. Essayons!"
 USA_arsenal_of_democracy:0 "Arsenal der Demokratie"
 USA_arsenal_of_democracy_desc:0 "Unabhängig davon, ob wir uns für eine direkte Intervention in einem Krieg entscheiden oder nicht, müssen demokratische Nationen wissen, dass wir sie bewaffnen und unterstützen werden."
 USA_liberty_ships:0 "Liberty-Schiffe"
 USA_liberty_ships_desc:0 "Unsere industriellen Entwicklungen müssen mit der Massenproduktion von Frachtschiffen einhergehen, um sicherzustellen, dass unsere Materialien und Truppen die Einsatzgebiete erreichen, in denen sie benötigt werden."
 USA_war_propaganda:0 "Kriegspropaganda"
 USA_war_propaganda_desc:0 "Unser Volk möchte seine Kinder nicht in einen weiteren Krieg schicken, um dort zu sterben. Dennoch sehen viele Politiker die Notwendigkeit einer Intervention. Propaganda, die den Feind dämonisiert und zum offenen Konflikt aufruft, ist möglicherweise nicht nur ein Werkzeug für Tyrannen."
 USA_war_plan_black:0 "Kriegsplan Schwarz"
 USA_war_plan_black_desc:0 "Es ist offensichtlich, dass die deutsche Politik und Expansionspolitik weit über jedes Maß an Vernunft hinausgehen. Sie müssen gestoppt werden, bevor ihre Kriegsmaschinerie den Punkt erreicht, an dem es kein Zurück mehr gibt."
 USA_embargo_germany:0 "Embargo Deutschland"
 USA_embargo_germany_desc:0 "Deutschland ist für seine Kriegsanstrengungen auf Öl und andere natürliche Ressourcen angewiesen. Ihm den Zugang zu diesen Ressourcen zu verwehren, ist das Mindeste, was wir tun können."
 USA_destroyers_for_bases:0 "Zerstörer für Stützpunkte"
 USA_destroyers_for_bases_desc:0 "Großbritannien braucht dringend Schiffe, und wir müssen unser Heimatgebiet schützen. Gegen das Recht, Militärstützpunkte in derzeit britischem Gebiet zu errichten, können wir einige Zerstörer eintauschen, die hoffentlich ebenfalls sinnvoll eingesetzt werden."
 USA_destroyers_for_bases_tt:0 "§Y[USA.GetNameDef]§!: \n"
 USA_war_plan_white:0 "Kriegsplan Weiß"
 USA_war_plan_white_desc:0 "Wir dürfen nicht zulassen, dass sich die Rote Gefahr ungehindert ausbreitet. Ob von außen oder von innen, es gibt keine größere Bedrohung für unser Land und die Welt insgesamt."
 USA_embargo_USSR:0 "Embargo UdSSR"
 USA_embargo_USSR_desc:0 "Wenn wir der Sowjetunion die Handelsmöglichkeiten mit uns vorenthalten, werden wir ihre militärischen Bemühungen nicht mehr unterstützen und gleichzeitig beweisen, dass unser Wirtschaftsmodell überlegen ist."
 USA_war_plan_red:0 "Kriegsplan Rot"
 USA_war_plan_red_desc:0 "Nachdem es zunächst so aussah, als seien unsere alten Unterdrücker auf dem Weg, das Volk zu respektieren, stehen sie nun im Widerspruch zu dem von uns akzeptierten Wind des Wandels. Das Britische Empire zeigt sein wahres Gesicht. Wir müssen ihnen zeigen, wo wir stehen."
 USA_embargo_the_empire:0 "Embargo gegen das Imperium"
 USA_embargo_the_empire_desc:0 "Trotz langjähriger guter Beziehungen haben die Briten die Ideale verraten, die sie unserer Hoffnung nach leben sollten. Es ist an der Zeit, ihnen die Konsequenzen aufzuzeigen."
 USA_war_plan_orange:0 "Kriegsplan Orange"
 USA_war_plan_orange_desc:0 "Für uns gibt es keine größere Bedrohung als Japans imperialistische Ambitionen. Seine Expansionsbestrebungen nach Asien und in den Pazifikraum werden schnell zu Konflikten mit unseren Interessen führen."
 USA_embargo_japan:0 "Embargo Japan"
 USA_embargo_japan_desc:0 "Wir müssen Japan zeigen, dass die USA ihre Aggression weder dulden noch unterstützen werden. Ein Embargo wäre der erste Schritt, um ihre Pläne im Pazifik zu vereiteln."
 USA_prepare_intervention:0 "Intervention vorbereiten"
 USA_prepare_intervention_desc:0 "Durch diplomatische und handelspolitische Entscheidungen hat sich unsere Position auf der internationalen Bühne von neutral und isolationistisch zu einer Haltung gegenüber ausländischen Aggressionen gewandelt. Unsere Militärpolitik wird dies in Zukunft widerspiegeln."
 USA_extra_tech_team:0 "Zusätzliches technisches Team"
 USA_manhattan_project:0 "Manhattan-Projekt"
 USA_manhattan_project_desc:0 "Die Entwicklung von Ersatzmaterialien, ein harmlos klingendes USACE-Projekt, wird schließlich als Manhattan-Projekt bekannt werden. Es ist eines der geheimsten und gefährlichsten Unterfangen der Militärgeschichte und hat die Entwicklung der ersten Atombombe zum Ziel."
 USA_unholy_alliance:0 "Unheilige Allianz"
 USA_unholy_alliance_desc:0 "Manchmal müssen wir uns unsere Feinde aussuchen. Oft ist die Wahl nicht leicht. Die Zukunft wird uns vielleicht dafür verurteilen, dass wir Seite an Seite mit dem einen Tyrannen standen, oder uns dafür loben, dass wir ihn vor dem anderen gerettet haben."
 USA_unholy_alliance_tt:0 "Stärkt die Meinung und tauscht Meinungen mit der Sowjetunion oder Deutschland aus, wenn diese sich im Krieg befinden und auf der Seite des Verteidigers stehen."
 USA_limited_intervention:0 "Begrenzte Intervention"
 USA_limited_intervention_desc:0 "Es bräuchte außerordentliche Aggressivität, um uns mit voller Wucht in einen Krieg zu ziehen, doch nach den jüngsten Entwicklungen sind viele Menschen bereit, bei Konflikten im Ausland zu helfen."
 USA_the_giant_wakes:0 "Der Riese erwacht"
 USA_the_giant_wakes_desc:0 "Die Nationen wenden sich an uns, um die Werte der Demokratie und Freiheit zu schützen. Die Welt, in der das nicht-interventionistische Amerika geboren wurde, existiert nicht mehr, und wir müssen uns entsprechend anpassen."
 USA_pearl_harbor_gambit:0 "Pearl Harbor Gambit"
 USA_pearl_harbor_gambit_desc:0 "Der Marinestützpunkt Pearl Harbor ist ein leichtes Ziel für die Japaner. Mit der Stationierung einer Flotte demonstrieren wir unsere Macht im Pazifik. Werden sie es wagen, sich diesem mutigen Schritt entgegenzustellen?"
 USA_pearl_harbor_gambit_tt:0 "§YWährend der Fokus läuft, hat Japan die Möglichkeit, einen Angriff zu starten.§!"
 USA_cancel_pearl_harbor_gambit:0 "Pearl Harbor Gambit abbrechen"
 USA_cancel_pearl_harbor_gambit_desc:0 "Die Stationierung einer Flotte in Pearl Harbor gefährdet das Leben unserer Seeleute. Wir werden sie nicht riskieren, um einen Krieg mit Japan zu provozieren."
 USA_air_war_plans_division:0 "Abteilung für Luftkriegspläne"
 USA_air_war_plans_division_desc:0 "Um in der Luftfahrt und der Flugzeugproduktion die richtigen Prioritäten zu setzen, bedarf es langfristiger Planung. Das AWPD stellt die materielle, organisatorische und strategische Planung sicher."
 USA_air_support:0 "Luftunterstützung"
 USA_air_support_desc:0 "Luftkriegsführung muss in erster Linie in Verbindung mit anderen militärischen Operationen eingesetzt werden."
 USA_strategic_bombing:0 "Strategische Bombardierung"
 USA_strategic_bombing_desc:0 "Die Fähigkeit, Präzisionsbombardements durchzuführen, wird es uns ermöglichen, die Kriegsmaschinerie jeder Nation aufzuhalten."
 USA_TAC:0 "Taktischer Bombereinsatz"
 USA_TAC_desc:0 "Der Bau von Flugzeugen zum Angriff auf taktische Ziele wird unseren Truppen einen sichereren Vormarsch ermöglichen."
 USA_combined_bomber_offensive:0 "Kombinierte Bomberoffensive"
 USA_combined_bomber_offensive_desc:0 "Mit einer weiteren Großmacht an unserer Seite verfügen wir über unerwartete Vorteile bei der Erforschung und Anwendung groß angelegter offensiver Bombenangriffe."
 USA_fund_the_navy:0 "Finanzieren Sie die Marine"
 USA_fund_the_navy_desc:0 "Wir müssen uns an alle neuen Herausforderungen unserer Feinde anpassen können. Eine verstärkte Finanzierung von Marineübungen wird zu einer effizienteren Marine führen, die unseren Feinden taktisch überlegen ist."
 USA_bureau_of_ships:0 "Schiffsbüro"
 USA_bureau_of_ships_desc:0 "Wir werden das Bureau of Construction and Repair und das Bureau of Engineering zu einer Einheit zusammenlegen, um die künftige Entwicklung der Marine zu überwachen."
 USA_battleship_primacy:0 "Schlachtschiff-Vorherrschaft"
 USA_battleship_primacy_desc:0 "Mit der Kündigung des Washingtoner Flottenabkommens durch Japan könnte uns ein neues Wettrüsten auf den Weltmeeren bevorstehen. Wir werden dafür sorgen, dass wir über die meisten und besten Schlachtschiffe verfügen."
 USA_advanced_mahanian_doctrine:0 "Fortgeschrittene Mahanian-Doktrin"
 USA_advanced_mahanian_doctrine_desc:0 "Der Einfluss von Alfred Thayer Mahan auf die Seekriegsführung kann kaum unterschätzt werden. Aufbauend auf seiner Arbeit können wir Schlachtschiffe, die er als entscheidenden Faktor betrachtete, sinnvoll einsetzen."
 USA_carrier_primacy:0 "Trägerpriorität"
 USA_carrier_primacy_desc:0 "In zukünftigen Schlachten werden wir Luftstreitkräfte brauchen. Die praktischste Möglichkeit, ihre Reichweite zu erweitern, ist der Einsatz von Flugzeugträgern. Wir müssen fortschrittlichere und spezialisiertere Modelle entwickeln."
 USA_bureau_of_aeronautics:0 "Büro für Luftfahrt"
 USA_bureau_of_aeronautics_desc:0 "Um den Bedarf an Entwicklungsmöglichkeiten für die Marinefliegerei zu decken, muss das Bureau of Aeronautics, das seit Jahrzehnten für diese Angelegenheiten zuständig ist, erweitert werden."
 USA_escort_effort:0 "Eskortaufwand"
 USA_escort_effort_desc:0 "U-Boote stellen eine Gefahr für unsere Handelskonvois dar. Die Konzentration auf die Entwicklung neuer Zerstörermodelle wird es uns ermöglichen, einen effizienten U-Boot-Abwehrkrieg zu führen."
 USA_convoy_tactics:0 "Konvoi-Taktiken"
 USA_convoy_tactics_desc:0 "Beim Schutz unserer Handelsschiffe geht es nicht nur um Eskorten und effektive Aufklärung, sondern auch um taktische Entscheidungen hinsichtlich der Gestaltung unserer Handelsrouten und -abläufe."
 USA_amphibious_operations:0 "Amphibische Operationen"
 USA_amphibious_operations_desc:0 "Sofern unsere schlimmsten Albträume nicht wahr werden, wird dieser Krieg nicht auf amerikanischem Boden enden. Der Weg zum Sieg wird nur durch gut durchgeführte Landungen möglich sein."
 USA_expand_the_USMC:0 "Erweitern Sie das USMC"
 USA_expand_the_USMC_desc:0 "Das United States Marine Corps war in vielen vergangenen Kriegen eine entscheidende Kraft und ist für unsere amphibischen Kampagnen möglicherweise wichtiger denn je. Semper fidelis!"
 USA_reinforce_monroe_doctrine:0 "Bekräftigung der Monroe-Doktrin"
 USA_reinforce_monroe_doctrine_desc:0 "Die über 100 Jahre alte Monroe-Doktrin sah ein Eingreifen der USA bei europäischen Kolonialisierungsversuchen in Amerika vor, ohne sich aus europäischen Angelegenheiten einzumischen. Die Stärkung unserer Rolle als Friedenshüter auf diesen Kontinenten wird unseren Einfluss in der Region stärken."
 USA_carribean_sphere:0 "Karibische Sphäre"
 USA_carribean_sphere_desc:0 "Die karibischen Inseln bieten den perfekten Ausgangspunkt für Angriffe auf unsere Ostküste oder den Panamakanal. Daher müssen wir natürlich klarstellen, dass wir keine feindlichen Übernahmen dieser Gebiete zulassen werden."
 USA_central_america:0 "Mittelamerika"
 USA_central_america_desc:0 "Es wäre undenkbar, dass eine ausländische Macht die Kontrolle über den Panamakanal übernimmt oder ihn auch nur bedroht. Deshalb werden wir die Unabhängigkeit aller zentralamerikanischen Länder garantieren."
 USA_the_neighbors:0 "Die Nachbarn"
 USA_the_neighbors_desc:0 "Wir müssen in erster Linie für die Sicherheit der Länder sorgen, die uns am nächsten liegen. Der Feind muss nicht unsere Nachbarn überqueren, um zu uns zu gelangen, sondern er wird uns überqueren, wenn er unsere Nachbarn überquert."
 USA_south_america:0 "Südamerika"
 USA_south_america_desc:0 "Kolonialreiche dürfen nie wieder nach Südamerika vordringen können. Wir werden die Unabhängigkeit unserer Brüder im Süden garantieren, um sie zu schützen."
 USA_pax_americana:0 "Pax Americana"
 USA_pax_americana_desc:0 "Der Frieden in Amerika muss gewahrt werden. Wir haben die Kraft, dafür zu sorgen, dass kleinliche Streitigkeiten zwischen Nachbarstaaten nicht eskalieren. Ein Krieg vor unserer Haustür ist genau das, was unsere Feinde wollen, und wir müssen alles tun, um ihn zu verhindern."
 USA_pax_americana_tt:0 "@USA §YVereinigte Staaten§! können in Kriege zwischen amerikanischen Ländern eingreifen"
 USA_black_chamber:0 "Operation „Schwarze Kammer“"
 USA_black_chamber_complete:0 "§RKLASSIFIZIERT§!"
 USA_black_chamber_desc:0 "Wir haben Informationen über politische Aktivitäten in einer Reihe amerikanischer Länder, die nicht mit unseren Interessen übereinstimmen. Glücklicherweise haben wir ein Untergrund-Propagandanetzwerk aufgebaut und sind bereit, diese Länder in unsere Richtung zu drängen. Das müssen wir tun, um sicherzustellen, dass wir im eigenen Land nicht bedroht werden."
 USA_preemptive_intervention:0 "Präventive Intervention"
 USA_preemptive_intervention_desc:0 "Wir können nicht länger tatenlos zusehen, wie unsere Nachbarländer Kriegsmittel entwickeln, um uns oder unsere Verbündeten zu unterdrücken. Wir müssen zum Wohle unseres mächtigen Landes und der Welt eingreifen."
