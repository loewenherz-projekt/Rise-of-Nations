 ITAB_solid_progress_completion_tt:1 "Wird automatisch abgeschlossen, nachdem sowohl die Missionen §Y$ITAB_conquer_the_north_mission$§! als auch §Y$ITAB_conquer_the_south_mission$§! erfolgreich abgeschlossen wurden, die im Januar 1936 von $ITAB_benito_mussolini$ herausgegeben wurden.\n"
 ITAB_topple_amhara_rulers_event_chain_tt:0 "\nStartet die Ereigniskette „Lokale Herrscher wenden sich an italienische Beamte“ und ermöglicht es uns, die Einhaltung der Vorschriften zu verbessern oder in einigen äthiopischen Staaten ein italienisches Staatsbürgertum zu etablieren, wenn wir dies wünschen."
