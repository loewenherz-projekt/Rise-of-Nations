 counter_purge:0 " Von Trotzki gesäubert"
 SOV_war_since_purge:0 "Hat seit Abschluss der Großen Säuberung einen Krieg geführt"
 FRA_metropolitan_france:2 "Investieren Sie in Frankreich"
 FRA_metropolitan_france_tt:0 "Nicht genügend Bauplätze für §YInfrastruktur§! im französischen Mutterland"
 FRA_metropolitan_france_desc:0 "La Métropole sollte immer an erster Stelle stehen. Wir können damit beginnen, unsere Infrastruktur zu verbessern, um Arbeitsplätze zu schaffen und einen schnelleren Truppeneinsatz zu ermöglichen."
 FRA_algerie_france:2 "Investieren Sie in Algerien-Frankreich"
 FRA_algerie_france_tt:0 "Nicht genügend Bauplätze für §YInfrastruktur§! im kolonialen Frankreich"
 FRA_algerie_france_desc:0 "Europa stehen gefährliche Zeiten bevor. Wir sollten uns auf die Verbesserung unserer Länder im Süden konzentrieren und sicherstellen, dass wir das Festland jederzeit unterstützen können."
 FRA_industrial_expansion:0 "Industrielle Expansion"
 FRA_industrial_expansion_tt:0 "Nicht genügend Bauplätze für „Zivilfabriken“ im französischen Mutterland"
 FRA_industrial_expansion_desc:0 "Wir brauchen eine stärkere industrielle Präsenz im Inland. Wir verfügen über ausreichend Arbeitskräfte, brauchen aber mehr Produktionslinien."
 FRA_colonial_industry:0 "Kolonialindustrie"
 FRA_colonial_industry_tt:0 "Nicht genügend Bauplätze für „Zivilfabriken“ im kolonialen Frankreich"
 FRA_colonial_industry_desc:1 "Wir sollten uns auf unsere Industrien in den Kolonien konzentrieren. Sollten die Spannungen in Europa zunehmen, verfügen wir immer noch über Industriekapazitäten, die außerhalb der Reichweite feindlicher Bomber liegen."
 FRA_military_factories:0 "Militärfabriken"
 FRA_military_factories_tt:0 "Nicht genügend Bauplätze für §YMilitärfabrik§! im französischen Mutterland"
 FRA_military_factories_desc:1 "Unsere Kriegsmaschinerie verliert an Kapazität. Wir müssen uns auf die Produktion militärischer Ausrüstung im Inland konzentrieren, um sicherzustellen, dass unsere Streitkräfte ständig mit neuer Ausrüstung ausgestattet werden."
 FRA_colonial_military_factories:0 "Koloniale Militärfabriken"
 FRA_colonial_military_factories_tt:0 "Nicht genügend Bauplätze für §YMilitärfabrik§! im kolonialen Frankreich"
 FRA_colonial_military_factories_desc:0 "Durch die Verlagerung unserer Militärproduktion außerhalb Europas können wir sicherstellen, dass unsere Truppen an der Front auch dann noch mit Ausrüstung versorgt werden, wenn der Feind die Kontrolle über unseren Luftraum erlangt."
 FRA_extra_research_slot:2 "Unterstützen Sie die Grandes Écoles"
 FRA_extra_research_slot_desc:0 "Überall tauchen vielversprechende junge Köpfe auf. Wir müssen ihnen die nötigen Forschungsmöglichkeiten bieten. Technologische Fortschritte können uns dort einen Vorsprung verschaffen, wo wir ihn am meisten brauchen."
 FRA_nuclear_effort:0 "Nukleare Anstrengungen"
 FRA_nuclear_effort_desc:0 "Erste Tests in der Nuklearwissenschaft haben vielversprechende Ergebnisse gezeigt. Die Nutzung ihrer Kraft könnte uns eine Waffe bescheren, wie sie die Menschheit noch nie gesehen hat."
 FRA_jet_effort:0 "Jet Effort"
 FRA_jet_effort_desc:0 "Im Luftkampf kommt es vor allem auf Mobilität an. Das Düsentriebwerk ist ein so leistungsstarker Fortschritt, dass es so scheint, als stünden die feindlichen Piloten still, während wir sie vom Himmel holen."
 FRA_extra_research_slot_2:2 "Bilden Sie das Nationale Forschungszentrum"
 FRA_extra_research_slot_2_desc:0 "Überall tauchen vielversprechende junge Köpfe auf. Wir müssen ihnen die nötigen Forschungsmöglichkeiten bieten. Technologische Fortschritte können uns dort einen Vorsprung verschaffen, wo wir ihn am meisten brauchen."
 FRA_defensive_focus:0 "Defensiver Fokus"
 FRA_defensive_focus_desc:0 "In Zeiten wie diesen ist es am besten, unsere Verteidigung zu stärken. Wenn es Bedrohungen gibt, lasst sie zu uns kommen, damit wir sie auf unserem eigenen Land bekämpfen können. Wir haben einen perfekten Kandidaten für die Führung unserer Armee. Alles, was wir brauchen, ist euer Wort."
 FRA_aggressive_focus:0 "Aggressiver Fokus"
 FRA_aggressive_focus_desc:0 "Wir können nicht tatenlos zusehen, wie Feinde an unsere Grenzen vordringen. Und wir können unsere Verbündeten im Kriegsfall nicht sich selbst überlassen. Bereiten Sie unsere Armee vor! Gamelin ist der richtige Mann für diese Aufgabe."
 FRA_fortification_focus:0 "Befestigungsfokus"
 FRA_fortification_focus_desc:0 "So wichtig unsere Festungen auch waren, wir müssen Wege finden, sie effizienter zu bauen. Die Maginot-Linie war eine wirksame Abschreckung für feindliche Streitkräfte. Wir könnten die Sicherheit weiterer ähnlicher Verteidigungsanlagen gebrauchen."
 FRA_alpine_forts:0 "Alpenfestungen"
 FRA_alpine_forts_desc:0 "Sobald wir die Alpen mit unserer neu geplanten Verteidigungslinie gesichert haben, werden die Italiener die Grenze nicht mehr so leicht überqueren. Wir werden Zeit haben, zu reagieren und unsere Position zu verstärken."
 FRA_extend_the_maginot_line:0 "Erweiterung der Maginot-Linie"
 FRA_extend_the_maginot_line_desc:0 "Wir können nicht darauf zählen, dass Belgien seine Stellung hält. Wenn es feindliche Armeen durchlässt, könnten wir in Schwierigkeiten geraten. Die Verlängerung der Maginot-Linie ist entscheidend, um unerwünschte Armeen aus Frankreich fernzuhalten!"
 FRA_infantry_focus:0 "Levée en masse"
 FRA_infantry_focus_desc:0 "Alle Männer und Frauen, die kämpfen können, werden es tun. Die Massenproduktion von Waffen wird die Kosten senken. Wir werden jedem ein Gewehr in die Hand geben."
 FRA_artillery_focus:0 "Grande Batterie"
 FRA_artillery_focus_desc:0 "Unsere Artillerie bildet eine schlagkräftige Einheit, die das Feuer auf bestimmte Punkte konzentriert. Mit jeder Salve schwächen wir die feindlichen Linien und bahnen uns notfalls einen Weg durch!"
 FRA_heavy_armor_focus:0 "Char de Bataille"
 FRA_heavy_armor_focus_desc:0 "Kampfpanzer sind der Weg in die Zukunft der französischen Armee. Wir wollen das Schlachtfeld kontrollieren und dafür brauchen wir neue, leistungsstarke Panzer!"
 FRA_motorized_focus:0 "Motorisierter Fokus"
 FRA_motorized_focus_desc:0 "Wenn wir bessere Möglichkeiten zum Bau unserer Infanteriefahrzeuge finden, können wir die Frontlinien besser unterstützen und verstärken."
 FRA_mechanized_focus:0 "Mechanisierter Fokus"
 FRA_mechanized_focus_desc:0 "Gepanzerte Fahrzeuge spielen im Krieg eine immer wichtigere Rolle. Sie sind zwar etwas weniger einschüchternd als ein gewöhnlicher Panzer, verschaffen uns aber einen Vorteil in den Bereichen Kommunikation, Führung, Transport und Häuserkampf. "
 FRA_light_medium_armor:0 "Automitrailleuses"
 FRA_light_medium_armor_desc:0 "Laut Gesetz kontrolliert die Infanterie alle Panzertruppen. Die leichteren, schnelleren Kavalleriefahrzeuge oder Automitrailleuses sind besser für die Fortbewegung geeignet und können mit ihren montierten Waffen dennoch einigen Schaden anrichten."
 FRA_army_reform:0 "Armeereform"
 FRA_army_reform_desc:0 "Keine Infanterieeinheit oder Hightech-Panzer allein werden uns den Krieg gewinnen lassen. Wir müssen unsere Anstrengungen darauf konzentrieren, sowohl unsere taktischen als auch unsere strategischen Fähigkeiten zu entwickeln. Mit den richtigen Leuten an der richtigen Stelle können wir uns als Armee weiterentwickeln."
 FRA_navy_focus:0 "Marine-Fokus"
 FRA_navy_focus_tt:0 "Nicht genügend Bauplätze für §YNaval Base§!"
 FRA_navy_focus_desc:0 "Wenn wir unsere Marine ausbauen wollen, müssen wir zunächst unsere Marinestützpunkte verbessern und erweitern. Unsere einzigartigen Schiffe erfordern ständige Aufmerksamkeit, um jederzeit kampfbereit zu bleiben."
 FRA_improved_screen_ships:0 "Verbesserte Bildschirmschiffe"
 FRA_improved_screen_ships_desc:0 "Zerstörer und leichte Kreuzer spielen eine Schlüsselrolle bei der Verteidigung unserer schwereren Schlachtschiffe oder Träger. Wenn wir unsere Verteidigungslinie auf See verlieren, gefährden wir alle Schiffe und Besatzungen. Wir müssen sicherstellen, dass unsere Schiffe mit der neuesten Technologie gebaut werden."
 FRA_capital_ship_focus:0 "Fokus auf Großkampfschiffe"
 FRA_capital_ship_focus_desc:0 "Eine Verbesserung des Designs unserer Schlachtschiffe würde zu großen taktischen Vorteilen führen. Ihre Reichweite und Leistung sind unübertroffen, und niemand wird ihren Geschützen entkommen können."
 FRA_carrier_focus:0 "Carrier-Fokus"
 FRA_carrier_focus_desc:0 "Marinetheoretiker haben uns auf unsere veralteten Träger aufmerksam gemacht. Sie haben Vorschläge, wie Träger weiter genutzt werden können, wenn die Entwicklung in die richtige Richtung vorangetrieben wird. Wirkliche Fortschritte sind ohne unsere volle Unterstützung nicht möglich."
 FRA_initiate_government_reform:0 "Regierungsreform"
 FRA_initiate_government_reform_desc:0 "Die Welt ist gefährlich geworden. Wir können uns nicht länger von unseren eigenen kleinlichen Streitereien einschränken lassen. Es ist Zeit, unseren Politikern Macht zu verleihen und zum Wohle Frankreichs voranzukommen."
 FRA_support_the_left:0 "Unterstützen Sie die Linke"
 FRA_support_the_left_desc:0 "Die Komintern wird stärker. Es ist an der Zeit zu zeigen, dass unsere Interessen vereinbar sind, und unsere kommunistischen Organisationen zu unterstützen."
 FRA_leftist_rhetoric:0 "Linke Rhetorik"
 FRA_leftist_rhetoric_desc:0 "Das Ziel ist klar: Gleichheit für alle. Wir wollen keine kapitalistischen Interessen in der französischen Politik. Es ist unerlässlich, optimale Bedingungen für die Entwicklung unserer kommunistischen Organisationen zu schaffen."
 FRA_scw_intervention_republicans:0 "Republikanische Intervention"
 FRA_scw_intervention_republicans_desc:0 "Das republikanische Spanien braucht unsere Hilfe! \nJeder, der bereit ist, für die Sache zu kämpfen, sollte dies dürfen. Wir dürfen nicht zulassen, dass ein weiteres faschistisches Regime an Boden gewinnt."
 FRA_national_mobilization:0 "Nationale Mobilisierung"
 FRA_national_mobilization_desc:0 "Wir haben endlich eine handlungsfähige Regierung. Jetzt ist es an der Zeit, unsere Armee zu stärken und bereit zu sein, für Frankreich zu kämpfen."
 FRA_humanite_unie:0 "Humanité Unie"
 FRA_humanite_unie_desc:0 "Die fetten Banker und machthungrigen Demagogen festigen ihren blutigen Griff um die Welt. Mit jedem Tag werden freie Menschen versklavt und die Welt stürzt tiefer in die Krise, verursacht durch die Gier des Einzelnen. Französische Ideale werden mehr denn je gebraucht! Die Menschheit braucht uns, und wir müssen die Menschheit vereinen!"
 FRA_join_comintern:0 "Treten Sie der Komintern bei"
 FRA_join_comintern_desc:0 "Da wir überall Feinde haben, müssen wir unsere Position durch mächtige Verbündete stärken. Unsere Verbindungen zur Komintern sind stärker geworden, und es ist an der Zeit, uns voll und ganz ihrer Sache zu widmen."
 FRA_support_status_quo:0 "Unterstützen Sie den Status Quo"
 FRA_support_status_quo_desc:0 "Frankreich ist die Wiege und der Beschützer der Freiheit und sollte dies auch bleiben. Wenn wir jemals wieder Einheit erreichen wollen, müssen wir unsere Demokratie stabilisieren, bevor sie schwindet."
 FRA_little_entente:0 "Kleine Entente"
 FRA_little_entente_desc:0 "Die Kleine Entente, ein Bündnis, das nach dem Ersten Weltkrieg gegründet wurde, um Aggressionen Österreichs und Ungarns gegenüber ihren Nachbarn zu verhindern, wurde von Frankreich unterstützt, beginnt nun aber zu zerfallen. Anstatt die Beziehungen zu Großbritannien zu festigen, sollten wir die Initiative ergreifen, diese Fraktion wiederherzustellen und zu festigen, angefangen bei ihren Gründern in der Tschechoslowakei."
 FRA_go_with_britain:0 "Gehen Sie mit Großbritannien"
 FRA_go_with_britain_desc:0 "Russland hat sich für immer verändert, und von der alten Triple Entente sind nur noch Frankreich und Großbritannien übrig. Wenn sich die Geschichte wiederholen soll, müssen wir dafür sorgen, dass diese beiden Nationen, Bastionen der Demokratie und Freiheit in Europa, unsere Verbündeten bleiben."
 FRA_strengthen_government_support:0 "Stärkung der Regierung"
 FRA_strengthen_government_support_desc:0 "Wir haben Pläne für das kommende Jahr geschmiedet, die den Wünschen der Menschen in allen Teilen Frankreichs entsprechen. Zeigen Sie ihnen, dass wir handlungsfähig und würdig sind, Frankreich zu regieren, damit wir wieder vereint auftreten können."
 FRA_defensive_strategems:0 "Verteidigungsstrategien"
 FRA_defensive_strategems_desc:0 "Wenn wir wollen, dass das französische Volk für uns in den Krieg zieht, ist eine klare Linie wichtiger denn je. Wir müssen aufhören, uns gegenseitig zu bekämpfen und stattdessen für Frankreich und für „Liberté, égalité, fraternité“ kämpfen."
 FRA_invite_yugoslavia:0 "Jugoslawien einladen"
 FRA_invite_yugoslavia_desc:0 "Jugoslawien hat genug Sorgen, auch ohne sich um expansionistische Nachbarn sorgen zu müssen. Sie wieder in die Kleine Entente zu holen, wäre sowohl für sie als auch für uns ein großer Dienst."
 FRA_invite_romania:0 "Rumänien einladen"
 FRA_invite_romania_desc:0 "Die rumänische Demokratie ist fragil und zwischen ihren internen faschistischen Fraktionen und dem sowjetischen Kommunismus gefangen. Die Aufnahme Rumäniens in die Kleine Entente wird es ihm ermöglichen, mit unserer Unterstützung seine Stabilität zu bewahren."
 FRA_polish_guarantee:0 "Polnische Garantie"
 FRA_polish_guarantee_desc:0 "Polnische Diplomaten haben ihre Besorgnis über die Spannungen an ihren Grenzen zum Ausdruck gebracht. Eine Garantie unseres mächtigen Landes sollte jeden abschrecken, der eine Invasion plant."
 FRA_czech_guarantee:0 "Tschechische Garantie"
 FRA_czech_guarantee_desc:0 "Die Spannungen an der tschechischen Grenze nehmen zu. Wir können nicht zulassen, dass expansive Nationen ein freies und demokratisches Land übernehmen. Die Tschechen müssen ein freies Volk bleiben. Mit unserer Garantie wird jeder, der eine Invasion plant, zweimal darüber nachdenken."
 FRA_revise_versailles:0 "Versailles überarbeiten"
 FRA_revise_versailles_desc:0 "Die Deutschen ignorieren bereits die im Versailler Vertrag festgelegten Reparationszahlungen und zeigen damit, dass Frankreich keinen Respekt mehr genießt. Wir haben zwar das Recht, für die im Ersten Weltkrieg verlorenen Leben höhere Forderungen zu stellen, doch ein gerechter Vertrag würde ein starkes, neues Frankreich erfordern, das ihn auch durchsetzen kann."
 FRA_support_the_right:0 "Unterstützen Sie die Rechte"
 FRA_support_the_right_desc:0 "Frankreich war schon immer eine starke und stolze Nation, doch die Untätigkeit der Regierung hat die Bevölkerung gespalten. Wir müssen Frankreich einen und unsere Überlegenheit und Stärke behaupten, um dem Verfall zu entgehen."
 FRA_right_wing_rhetoric:0 "Rechte Rhetorik"
 FRA_right_wing_rhetoric_desc:0 "Wir müssen uns darauf konzentrieren, jeden Franzosen zu erreichen und seinen Nationalgeist zu stärken. Zeigen Sie ihnen, dass wir die starken Führer sein können, die sie brauchen, und sie werden stolze Bürger unserer glorreichen Nation."
 FRA_scw_intervention_nationalists:0 "Nationalistische Intervention"
 FRA_scw_intervention_nationalists_desc:0 " Die Nationalisten gewinnen in Spanien endlich an Boden. Ihre Sache ist gerecht, und jeder, der bereit ist, für sie zu kämpfen, sollte dies tun dürfen."
 FRA_army_of_aggression:0 "Armee der Aggression"
 FRA_army_of_aggression_desc:0 "Wir können nicht länger hinter einer veralteten Mauer sitzen bleiben, während unsere Feinde in ganz Europa wüten. Es ist Zeit, unsere Armee zu stärken und unsere Grenzen zu erweitern, um sicherzustellen, dass Frankreich auch weiterhin eine große Nation bleibt."
 FRA_france_first:0 "Frankreich zuerst"
 FRA_france_first_desc:0 "Wir sind Frankreich! Sieger des Ersten Weltkriegs! Retter Europas! Wir sind die Heimat der größten Denker dieser Welt. Zu viele Nationen versuchen, die Welt ins Chaos zu stürzen. Wir werden gebraucht, und wir werden dem Ruf folgen. Wir werden das Ruder übernehmen, den Sturm überstehen und die Menschheit unter unserer Herrschaft in Sicherheit bringen!"
 FRA_woo_italy:0 "Woo Italien"
 FRA_woo_italy_desc:0 "Italien hat das Potenzial, eine mächtige Nation zu werden. Dank Mussolinis starker Führung ist das italienische Volk vereint und bereit, für die richtige Sache zu kämpfen. Lasst uns diese Sache zu unserer machen."
 FRA_dismantle_the_democracies:0 "Zerschlagt die Demokratien"
 FRA_dismantle_the_democracies_desc:0 "Das neue demokratische Bündnis in Mitteleuropa bedroht unsere neu gewonnene Position. Wir müssen jetzt handeln, bevor es noch mächtiger wird."
 FRA_join_germany:0 "Komm nach Deutschland"
 FRA_join_germany_desc:0 "Das Deutsche Reich wird zu einer Macht, mit der man rechnen muss. Seine Vision einer besseren Zukunft lässt sich mit unseren Interessen vereinbaren. Wir sollten es unterstützen, und sobald sich der Staub gelegt hat, wird Frankreich seinen rechtmäßigen Anteil an Europa bekommen."
 FRA_naval_doctrine:0 "Marinedoktrin"
 FRA_naval_doctrine_desc:0 "Jüngste Fortschritte im Schiffsbau eröffnen neue Möglichkeiten für taktische und strategische Manöver. Bevor wir diese neuen Theorien risikoreich einsetzen, müssen wir sie gründlich testen und die Pläne konkretisieren."
 FRA_air_focus:0 "Luftfokus"
 air_focus_bypass_tt:0 "Nicht genügend Bauplätze für §YAir Base§!"
 FRA_air_focus_desc:0 "Es ist an der Zeit, unsere Luftwaffe zu erweitern! Es gibt bereits Pläne für den Bau neuer Luftwaffenstützpunkte, um eine deutliche Aufstockung des Personals und der Flugzeuge zu ermöglichen."
 FRA_cas_focus:0 "CAS-Fokus"
 FRA_cas_focus_desc:0 "Flugzeuge zur Unterstützung unserer Landstreitkräfte und Schiffe waren eine sehr effiziente Ergänzung bei relativ geringen Investitionen. Für diese Flugzeuge gibt es nun mehrere Verbesserungsvorschläge. Unsere Ingenieure können die nächste Generation von Unterstützungsflugzeugen entwickeln."
 FRA_fighter_focus:0 "Kämpferfokus"
 FRA_fighter_focus_desc:0 "Revolutionäre zivile Technik kann auf unsere Kampfflugzeuge angewendet werden, um ihre Geschwindigkeit, Reichweite und maximale Flughöhe zu verbessern. Wir müssen uns darauf konzentrieren, wenn wir mit den Fortschritten anderer mithalten wollen."
 FRA_bomber_focus:0 "Bomberfokus"
 FRA_bomber_focus_desc:0 "Luftunterstützung ist ein wichtiger Bestandteil unserer Verteidigungs- und Angriffsfähigkeiten. Wenn wir unsere Anstrengungen auf die Entwicklung schneller, wendiger und präziserer Bomber konzentrieren, behalten wir in jedem Landkampf die Nase vorn."
 FRA_heavy_fighter_focus:0 "Fokus auf schwere Jäger"
 FRA_heavy_fighter_focus_desc:0 "Unsere schweren Jäger müssen in der Lage sein, die anfälligeren Bomberflugzeuge zu unterstützen. Dies erfordert eine stärkere Bewaffnung und eine größere Reichweite auf Kosten der Geschwindigkeit."
 FRA_air_doctrine:0 "Luftdoktrin"
 FRA_air_doctrine_desc:0 "Wir haben genügend Erfahrung gesammelt, um neue Theorien der Luftkriegsführung schneller zu testen. Dies ermöglicht es uns, neue taktische und strategische Möglichkeiten zu erkunden. Der Luftkampf ist der Schlüssel zur modernen Kriegsführung."
 FRA_heavy_bomber_focus:0 "Fokus auf schwere Bomber"
 FRA_heavy_bomber_focus_desc:0 "Moderne schwere Bomber werden so bewaffnet sein, dass sie kleinere Luftkämpfe allein bewältigen können. Wenn wir unseren Ingenieuren die Möglichkeit geben, sich auf die Entwicklung neuester Technologien zu konzentrieren, haben wir eine bessere Chance, feindliche Produktionsanlagen zu zerstören."
 FRA_naval_bomber_focus:0 "Fokus auf Marinebomber"
 FRA_naval_bomber_focus_desc:0 "Schiffe sind gegenüber Flugzeugen äußerst anfällig. Wir sollten ihre Technologie kontinuierlich verbessern, um Gegenmaßnahmen immer einen Schritt voraus zu sein."
 limited_rearmament_focus:0 "Begrenzte Wiederbewaffnung"
 limited_rearmament_focus_desc:1 "[Root.GetLimitedRearmamentDesc]"
 ENG_LIMITED_REARMAMENT_HISTORICAL:0 "Die jüngsten Unruhen in Deutschland und anderen faschistischen Mächten weltweit lassen darauf schließen, dass wir in unserer Zeit keinen Frieden erleben werden. Als Vorbereitung sollten wir die Weichen für unsere eigene Wiederbewaffnung stellen, falls sich die Lage noch weiter verschlechtern sollte."
 ENG_LIMITED_REARMAMENT_AHISTORICAL:0 "Unser neuer Ansatz in der Innenpolitik und den internationalen Beziehungen erfordert ein starkes Militär, das ihn unterstützt. Zur Vorbereitung sollten wir mit dem Ausbau unserer zivilen Industrie beginnen, damit diese zu gegebener Zeit eine stabile Grundlage für einen zukünftigen Ausbau unserer Rüstungsindustrie bildet."
 ENG_motorized_focus:0 "Eine motorisierte Armee"
 ENG_motorized_focus_desc:0 "In jüngster Zeit experimentiert die Armee mit vollmotorisierten Infanterieeinheiten. Bisher wurden noch keine vollmotorisierten Divisionen gebildet, doch mit den richtigen Worten an den Kriegsminister könnte dies bald möglich sein."
 ENG_tank_focus:1 "[Root.GetRoyalTankRegimentName]"
 ENG_tank_focus_desc:1 "[Root.GetRoyalTankRegimentDesc]"
 ENG_ROYAL_TANK_REGIMENT_NAME_HISTORICAL:0 "Königliches Panzerregiment"
 ENG_ROYAL_TANK_REGIMENT_NAME_COMMUNIST:0 "Panzerregiment der Republikanischen Garde"
 ENG_ROYAL_TANK_REGIMENT_DESC_HISTORICAL:0 "Großbritannien hat den Panzer erfunden, und daher sollte das Royal Tank Regiment mit den besten Panzern der Welt ausgestattet sein, was derzeit jedoch nicht der Fall ist. Das Special Vehicle Development Committee schlägt vor, ein modernes Design zu erforschen und zu entwickeln, um Großbritanniens Spitzenposition in der Panzerentwicklung zu sichern."
 ENG_ROYAL_TANK_REGIMENT_DESC_COMMUNIST:0 "Großbritannien hat den Panzer erfunden, und daher sollte das Panzerregiment der Republikanischen Garde mit den besten Panzern der Welt ausgestattet sein. Dies ist derzeit jedoch nicht der Fall. Das Komitee für die Entwicklung von Spezialfahrzeugen schlägt vor, ein modernes Design zu erforschen und zu entwickeln, um Großbritanniens Vorreiterrolle in der Panzerentwicklung zu sichern."
 uk_empire_focus:0 "Verstärke das Imperium"
 uk_empire_focus_desc:0 "Unser Imperium ist riesig und trotz unserer Macht nur schwach verteidigt. Um dem entgegenzuwirken, müssen wir den imperialen Patriotismus im gesamten Reich fördern."
 uk_service_focus:0 "Service Übersee"
 uk_service_focus_desc:0 "Durch die Rotation von Streitkräften zu Kolonialstationen und wieder zurück in die Heimat können sie die Bedingungen an verschiedenen Fronten kennenlernen, Erfahrungen sammeln und diese mit ihren Kameraden in der Heimat teilen."
 uk_mediterranean_focus:0 "Mittelmeerbastion"
 uk_mediterranean_focus_desc:0 "Die Route durch das Mittelmeer ist eine lebenswichtige Abkürzung von und nach Indien. Daher ist es von größter Bedeutung, sie offen und in unseren Händen zu halten."
 uk_rock_focus:0 "Befestige den Felsen"
 uk_rock_focus_desc:0 "Gibraltar kontrolliert nicht nur die Einfahrt zum Mittelmeer, sondern verfügt auch über einen stark verteidigten Hafen, von dem aus Schiffe sowohl im Atlantik als auch im Mittelmeer operieren können. Daher ist es unerlässlich, dass der Hafen streng bewacht wird."
 uk_greece_focus:0 "Griechenland zwingen"
 uk_greece_focus_desc:0 "Es liegt in unserem Interesse, in Griechenland Stationierungsrechte zu haben, und ehrlich gesagt sind die Griechen nicht in der Lage, uns diese Rechte zu verweigern."
 uk_malta_focus:0 "Malta stärken"
 uk_malta_focus_desc:0 "Malta verfügt über eine hervorragende Lage im zentralen Mittelmeerraum und ist eine wichtige Zwischenstation auf unserer Lebensader durch Ägypten und den Suezkanal nach Indien und in den Fernen Osten. Es wäre keine Zeitverschwendung, Malta stärker zu befestigen."
 ENG_mot_focus_tooltip:0 "Wir können jetzt motorisierte Infanteriedivisionen einsetzen."
 uk_canada_focus:0 "Entwicklung in Kanada"
 uk_canada_focus_desc:0 "Eine Investition in die kanadische Industrie und Werften wird der kanadischen Wirtschaft Auftrieb geben und es ihnen ermöglichen, im Kriegsfall einen größeren Beitrag zu leisten."
 uk_australia_focus:0 "Entwicklung in Australien"
 uk_australia_focus_desc:0 "Eine Investition in Australiens Werften und Industrie wird der australischen Wirtschaft Auftrieb geben und es dem Land ermöglichen, im Kriegsfall einen größeren Beitrag zu leisten."
 uk_protect_suez:0 "Schützen Sie Suez"
 uk_protect_suez_desc:0 "Die Kontrolle des Suezkanals ist ein Mittel, mit dem das Britische Empire seine Seeherrschaft behält. Der Verlust dieser Region wäre verheerend. Es müssen Maßnahmen zu ihrer Befestigung ergriffen werden."
 uk_balkan_strategy:0 "Balkanstrategie"
 uk_balkan_strategy_desc:0 "Viele Balkanstaaten sind probritisch eingestellt und sehen die gleiche Bedrohung durch Mitteleuropa wie wir. Wenn wir die Gelegenheit nutzen und sie frühzeitig unterstützen, können wir uns ihre Loyalität sichern, allerdings auf Kosten des Zorns ihrer rachsüchtigen Nachbarn."
 uk_new_zealand_focus:0 "Neuseeland entwickeln"
 uk_new_zealand_focus_desc:0 "Neuseeland ist unserem Land weiterhin eng verbunden und hat vor der faschistischen Bedrohung gewarnt. Ihr Beitrag im Kriegsfall ist sicher, und wir sollten sie bei der entsprechenden Vorbereitung unterstützen."
 uk_south_africa_focus:0 "Südafrika entwickeln"
 uk_south_africa_focus_desc:0 "Die politische Lage in Südafrika ist unsicher. Wir können nicht völlig darauf vertrauen, dass sie unsere Kriegsanstrengungen unterstützen werden, aber indem wir ihnen beim Ausbau ihrer Industrie helfen, können wir hoffen, die Unterstützung für die britische Sache zu erhöhen."
 FRA_strengthen_government_support_tooltip:0 "Die Idee der „Stärkung der staatlichen Unterstützung“ hat ausgedient."
 ITA_victoryinETH:0 "Triumph in Afrika"
 ITA_victoryinETH_desc:0 "Das Scheitern im Ersten Italienisch-Äthiopischen Krieg war 40 Jahre lang ein Schandfleck auf der Ehre Italiens. Durch den Sieg wird dieser Schandfleck nun beseitigt und die Stärke des eisernen Willens des Faschismus unter Beweis gestellt!"
 USA_reinforce_monroe_doctrine_tt:0 "Steigert die Handelsstimmung mit allen amerikanischen Nationen.\n"
 1939_bookmark_threat:0 "Jüngster faschistischer Expansionismus"
 USA_civil_war_fired:0 "Der Zweite Amerikanische Bürgerkrieg hat begonnen."
 USA_anti_imperialism:0 "Antiimperialismus"
 USA_anti_imperialism_desc:0 "Amerika war schon immer ein Feind imperialistischer Unterdrücker, doch es ist offensichtlich, dass die meisten sogenannten Demokratien bereit sind, diese Institutionen am Leben zu erhalten, solange sie davon profitieren. Die Revolutionäre der Sowjetunion sind bessere Verbündete."
 USA_fascist_menace:1 "Die preußische Bedrohung"
 USA_fascist_menace_desc:1 "Der Versailler Vertrag und die Wirtschaftssanktionen haben Deutschland nicht aufgehalten, und der preußische Militarismus zeigt erneut sein hässliches, aggressives Gesicht. Deutschland muss erneut besiegt und unter unsere Kontrolle gebracht werden, zumindest vorerst."
 USA_crusade_against_communism:0 "Kreuzzug gegen den Kommunismus"
 USA_crusade_against_communism_desc:0 "Der Rote Terror ist die mit Abstand schlimmste Bedrohung, der diese Welt je ausgesetzt war. Die destruktive Ideologie der Sowjetunion muss mit allen Mitteln im Keim erstickt werden, und wir werden diejenigen sein, die das tun."
 USA_strike_at_the_empire:0 "Schlag gegen das Imperium"
 USA_strike_at_the_empire_desc:0 "Die wahre Bedrohung für die Freiheit in der Welt sind die Kolonialreiche der europäischen Supermächte. Sie müssen zerschlagen und ihre Bevölkerungen befreit werden, angefangen beim Britischen Empire, von dem wir uns einst befreit haben."
 USA_defense_of_the_pacific:0 "Verteidigung des Pazifiks"
 USA_defense_of_the_pacific_desc:0 "Für die japanische Regierung gibt es keine Hoffnung mehr. Ihr Expansionismus bedroht sowohl unser Volk als auch seine asiatischen Nachbarn. Das Land muss unter amerikanische Verwaltung gestellt werden, um es zu reformieren und zu verhindern, dass es seine Fehler wiederholt."
 ENG_home_defence:0 "Heimverteidigung"
 ENG_home_defence_desc:0 "Ein riesiges Imperium nützt nichts, wenn wir das britische Volk nicht schützen können. Wir sollten unsere Bemühungen auf die Sicherheit der Britischen Inseln konzentrieren."
 ENG_issue_gasmasks:0 "Ausgabe Gasmasken"
 ENG_issue_gasmasks_desc:0 "Die Welt wird täglich gefährlicher. Wir sollten die Zivilbevölkerung vor Giftgasangriffen schützen. Großbritannien kann aufatmen."
 ENG_military_training_act:0 "Truppenausbildungsgesetz"
 ENG_military_training_act_desc:0 "Der Erste Weltkrieg hat bei unserem Volk den Eindruck hinterlassen, dass es nie wieder kämpfen müsse. Angesichts der zunehmenden Gefahren in der Welt müssen wir sicherstellen, dass alle fähigen jungen Männer eine militärische Grundausbildung erhalten."
 ENG_embargo_germany:0 "Embargo Deutschland"
 ENG_embargo_germany_desc:0 "Die deutsche Wiederaufrüstung ist eine Beleidigung und eine große Bedrohung für den Weltfrieden. Wir werden ihnen nicht die Ressourcen liefern, die sie brauchen, um ihre Kriegsmaschinerie anzutreiben."
 ENG_war_with_germany:0 "Krieg mit Deutschland"
 ENG_war_with_germany_desc:0 "Die Deutschen haben uns keine andere Wahl gelassen. Im Interesse der freien Welt und der Zukunft unserer Kinder. Es ist Zeit für Krieg."
 ENG_swedish_intervention:0 "Schwedische Intervention"
 ENG_swedish_intervention_desc:0 "Schwedische Bewegungen gegen die Demokratie haben einen besorgniserregenden Einfluss gewonnen. Wir können nicht riskieren, dass schwedischer Stahl als Waffen in den Händen unserer Feinde landet. Die Schweden sollen frei bleiben, aber wir müssen uns einen gewissen Einfluss auf ihr Land sichern."
 ENG_norwegian_intervention:0 "Norwegische Intervention"
 ENG_norwegian_intervention_desc:1 "Die norwegischen Bewegungen gegen die Demokratie gewinnen weiter an Boden. Wir sollten dafür sorgen, dass ihre Politik mit unseren Interessen im Einklang bleibt, selbst wenn wir dafür Gewalt anwenden müssen."
 ENG_danish_intervention:0 "Dänische Intervention"
 ENG_danish_intervention_desc:0 "Die dänische Unterstützung für die Feinde des Weltfriedens hat weiter zugenommen. Es gibt nur einen Weg, sie auf unserer Seite zu halten. Wir sollten Dänemark nutzen, um in der Region einen strategischen Stützpunkt zu errichten, falls eine Landinvasion in Europa notwendig werden sollte."
 ENG_benelux_intervention:0 "Benelux-Intervention"
 ENG_benelux_intervention_desc:0 "Das politische Umfeld in den Benelux-Ländern steht uns zunehmend feindselig gegenüber. Wir sollten ein klares Zeichen setzen: Wir dulden keinen Feind der Demokratie und sind bereit, notfalls Gewalt anzuwenden."
 ENG_belgium_security:0 "Sicheres Belgien"
 ENG_belgium_security_desc:0 "Eine Warnung allein reichte offensichtlich nicht aus. Wenn die politischen Tendenzen so weitergehen wie bisher, stellt Belgien eine direkte Bedrohung für unsere Gewässer dar. Wir müssen eingreifen und einen strategischen Stützpunkt auf dem europäischen Festland errichten."
 ENG_dutch_security:0 "Sichern Sie die Niederlande"
 ENG_dutch_security_desc:0 "Politische Bewegungen in den Niederlanden unterstützen weiterhin unsere Feinde. Um ein freies Europa zu gewährleisten, müssen die Niederlande unterworfen werden."
 ENG_war_with_japan:0 "Krieg mit Japan"
 ENG_war_with_japan_desc:0 "Alle anderen Optionen sind ausgeschöpft und die Japaner weigern sich, ihren Expansionskurs aufzugeben. Zur Sicherheit des Britischen Empires und der Völker Asiens müssen wir die Japaner unterwerfen."
 ENG_war_with_italy:0 "Krieg mit Italien"
 ENG_war_with_italy_desc:0 "Die Italiener geben ihre Pläne für ein neues Imperium nicht auf und sind bereit, Krieg zu führen, um ihre Grenzen zu erweitern. Wir müssen alles tun, um diese Bedrohung zu beseitigen, bevor es zu spät ist."
 ENG_embargo_ussr:0 "Embargo gegen die UdSSR"
 ENG_embargo_ussr_desc:0 "Die Sowjetunion wird immer mächtiger und nutzt britische Ressourcen für ihre militärischen Bemühungen. Wir sollten ihr den Zugang zu unserem Handel verwehren."
 ENG_war_with_ussr:0 "Krieg mit der UdSSR"
 ENG_war_with_ussr_desc:0 "Die Bedrohung durch die Sowjetunion wächst trotz unserer Einwände weiter. Wir können eine aggressive Sowjetunion nicht tolerieren und haben keine andere Wahl, als für eine bessere Zukunft in den Krieg zu ziehen."
 kamikaze_focus_tooltip:1 "Ermöglicht §YKamikaze-Angriffe§! Luftmissionen und Selbstmordanschläge auf feindliche Schiffe.\n"
 AST_additional_militia_training:0 "Zusätzliche Milizausbildung"
 AST_additional_militia_training_desc:0 "Ein Großteil unserer Milizionäre ist dienstuntauglich – entweder krank oder unzureichend ausgerüstet. Wir ergreifen Maßnahmen, um dieses Versäumnis in einer gefährlichen Welt zu beheben."
 AST_royal_australian_artillery:0 "Königliche australische Artillerie"
 AST_royal_australian_artillery_desc:0 "Die Artillerie ist die Königin des Schlachtfelds und wir müssen unseren Zugang zu schweren Geschützen erweitern."
 AST_promote_reservists:0 "Reservisten fördern"
 AST_promote_reservists_desc:0 "Obwohl wir eine Heimatverteidigungstruppe brauchen, wird uns die Aufnahme von Milizen und Reserven in die reguläre Armee den nötigen Zuwachs an verfügbaren Soldaten und Erfahrung verschaffen."
 AST_daimler_dingo:0 "Daimler Dingo"
 AST_daimler_dingo_desc:0 "Dieses in Großbritannien hergestellte Panzerfahrzeug wird unsere Mobilität auf dem Schlachtfeld verbessern. Und schließlich ist es nach unserem Nationalhund benannt."
 AST_hmas_assault:0 "HMAS Assault"
 AST_hmas_assault_desc:0 "Der Krieg im Pazifik wird ein amphibischer Krieg sein, daher ist der Bau eines Marinestützpunkts, der auf die Ausbildung von Marinesoldaten in der Strandeinnahme spezialisiert ist, für die Kriegsanstrengungen unerlässlich."
 AST_specialize_equipment:0 "Spezialausrüstung"
 AST_specialize_equipment_desc:0 "Nicht alle von uns verwendeten britischen Geräte sind für unsere spezielle Kampfsituation geeignet. Wir brauchen spezielle und maßgeschneiderte Werkzeuge."
 AST_australian_womens_army_service:0 "Australischer Frauenarmeedienst"
 AST_australian_womens_army_service_desc:0 "An der Front wird jeder Mann gebraucht, daher werden Fahr-, Signal- und Wartungsarbeiten von Tausenden australischen Frauen übernommen."
 AST_australian_army_catering_corps:0 "Catering-Corps der australischen Armee"
 AST_australian_army_catering_corps_desc:0 "Die australische Armee ist mit der Qualität ihrer Lebensmittel nicht zufrieden, was vor allem an der Qualität ihrer Köche liegt. Durch eine Neuorganisation dieses Prozesses können wir Moral und Effektivität steigern."
 AST_fund_owen_gun_research:0 "Finanzierung der Owen-Waffenforschung"
 AST_fund_owen_gun_research_desc:0 "Evelyn Owen hat eine neue Maschinenpistole entwickelt, die den harten Belastungen des Dschungelkriegs standhält. Wir sollten staatliche Mittel in die Produktion und Verbesserung dieser Waffe investieren."
 AST_sentinel_tank_project:0 "Sentinel Tank-Projekt"
 AST_sentinel_tank_project_desc:0 "Australien sollte ein eigenes Panzerfahrzeug entwickeln. Basierend auf deutschen und amerikanischen Ideen sollte das Sentinel-Programm vorangetrieben werden."
 AST_airborne_defence:0 "Luftgestützte Verteidigung"
 AST_airborne_defence_desc:0 "Wir müssen den Himmel über Australien schützen, indem wir in die Luftverteidigung investieren, einschließlich Abfangjägern und Luftabwehr."
 AST_introduce_unconventional_warfare:0 "Einführung unkonventioneller Kriegsführung"
 AST_introduce_unconventional_warfare_desc:0 "Die Dschungel des Pazifiks erfordern eine neue Art der Kriegsführung. Wir müssen lernen, uns schnell und leise durch die dichte Deckung zu bewegen, unsere Feinde aus dem Hinterhalt anzugreifen und dasselbe von ihnen zu erwarten."
 AST_z_special_unit:0 "Z-Spezialeinheit"
 AST_z_special_unit_desc:0 "Die Spezialeinheit Z ist unser Kommandoteam, das sich auf Aufklärung und Sabotage hinter den feindlichen Linien spezialisiert. Dafür sind mutige Männer erforderlich, die bereit sind, sich einem anspruchsvollen Training zu unterziehen."
 AST_m_special_unit:0 "M Spezialeinheit"
 AST_m_special_unit_desc:0 "Die Spezialeinheit M wird im Krieg unser vorgeschobener Aufklärungs- und Aufklärungsarm sein und aktuelle Informationen über die Aufstellung und Stellung des Feindes zurücksenden."
 AST_expand_the_raaf:0 "Erweitern Sie die RAAF"
 AST_expand_the_raaf_desc:0 "Unsere Luftwaffe muss wachsen, deshalb investieren wir in mehr Stützpunkte, mehr Ausbildung und mehr Produktion."
 AST_cac_boomerang:0 "CAC Boomerang"
 AST_cac_boomerang_desc:0 "Der Boomerang ist Australiens Beitrag zum Kampfflugzeugbau und zugleich eine Versicherung gegen den Verlust importierter Flugzeuge. Wir müssen mit japanischen und amerikanischen Flugzeugen konkurrieren."
 AST_expand_northern_presence:0 "Erweitern Sie Ihre Präsenz im Norden"
 AST_expand_northern_presence_desc:0 "Da unsere Städte überwiegend an der Ost- und Westküste der Insel liegen, mangelt es Australiens nördlicher Grenze an angemessener Verteidigung oder Vorbereitung auf eine Invasion oder einen Angriff. Neue militärische Strukturen in diesem Gebiet wären willkommen."
 AST_cac_woomera:0 "CAC Woomera"
 AST_cac_woomera_desc:0 "Australien wird seine eigene Bomberflotte entwickeln. Die Woomera ist zwar nur ein leichtes Flugzeug, wird aber für den Schutz unseres Heimatlandes und für leichte Kampfluftunterstützung ausreichen."
 AST_volunteer_air_observers_corps:0 "Freiwilliges Luftbeobachterkorps"
 AST_volunteer_air_observers_corps_desc:0 "Behalten Sie den Himmel im Auge! Wir rufen die Australier dazu auf, sich die Silhouetten gängiger Flugzeuge zu merken und die Regierung über verdächtige oder feindliche Flugzeuge zu informieren, die sich dem Dominion nähern."
 AST_naval_bombers:0 "Marinebomber"
 AST_naval_bombers_desc:0 "Wir sind von Wasser umgeben, daher sollten wir uns mit Flugzeugen und Trainings befassen, die es uns ermöglichen, feindliche Flotten abzufangen und anzugreifen. Der Bombenangriff auf See ist eine Spezialfähigkeit und sollte im Mittelpunkt stehen."
 AST_death_from_down_under:0 "Tod aus Down Under"
 AST_death_from_down_under_desc:0 "Sobald wir unser Luftverteidigungssystem durch ein besseres Verständnis der Luftstreitkräfte und der rohen Gewalt von Luftabwehrwaffen modernisiert haben, werden keine Bomber mehr unsere Häfen und Städte beschädigen."
 AST_womens_auxilliary_australian_air_force:0 "Frauenhilfskräfte der australischen Luftwaffe"
 AST_womens_auxilliary_australian_air_force_desc:0 "Die Hälfte unserer Bevölkerung kann besser für die Kriegsanstrengungen eingesetzt werden, als zu Hause zu sitzen. Die Flugzeugwartung, das Nachrichtenkorps und andere damit verbundene Aufgaben werden den Frauen übertragen."
 AST_dominate_the_skies:0 "Beherrsche den Himmel"
 AST_dominate_the_skies_desc:0 "Australien ist weit entfernt von vielen feindlichen Luftwaffenstützpunkten, daher sollte es unser Ziel sein, in unserem Teil der Welt die totale Lufthoheit zu erlangen."
 AST_cockatoo_island_shipyards:0 "Werften von Cockatoo Island"
 AST_cockatoo_island_shipyards_desc:0 "Der Ausbau und die Modernisierung der Cockatoo Island Shipyards haben für unsere Regierung höchste Priorität. Der Hafen von Sydney verfügt über den besten Zugang zu Arbeitskräften und Ressourcen, und dort sollten wir unsere Bemühungen im Schiffsbau konzentrieren."
 AST_protect_overseas_commerce:0 "Schutz des Überseehandels"
 AST_protect_overseas_commerce_desc:0 "Ein Inselstaat ist auf die Vorräte angewiesen, die er von anderen Inseln über die Meere beziehen kann. Die Verteidigung der Konvoilinien und Handelsrouten ist nicht nur eine Strategie – sie ist eine Notwendigkeit."
 AST_fly_the_jolly_roger:0 "Fliegen Sie die Piratenflagge"
 AST_fly_the_jolly_roger_desc:0 "Von unserer Inselfestung aus können wir U-Boot-Gruppen aussenden, um den feindlichen Handel und die Versorgung, die an unseren Küsten vorbeiführt, zu belästigen und zu zerstören."
 AST_scrap_iron_flotilla:0 "Schrotteisenflottille"
 AST_scrap_iron_flotilla_desc:0 "Bis wir unsere Flotte modernisieren können, müssen wir mit den alten Schiffen auskommen, die wir haben. Unser Feind mag unsere älteren Zerstörer als Schrottflottille bezeichnen, aber wir werden stolz darauf sein."
 AST_royal_australian_submarine_service:0 "Königlicher australischer U-Boot-Dienst"
 AST_royal_australian_submarine_service_desc:0 "U-Boote sind die Seewaffe der Zukunft und ein entscheidender Bestandteil der Streitkräfte unserer Verbündeten. Wir müssen diese Art der Kriegsführung annehmen."
 AST_naval_auxiliary_patrol:0 "Marine-Hilfspatrouille"
 AST_naval_auxiliary_patrol_desc:0 "Die vielen Häfen unseres großen Landes sind attraktive Ziele für heimliche U-Boot-Angriffe. Eine Hilfstruppe aus Küstenpatrouillenschiffen wird uns vor jeder Gefahr warnen."
 AST_cruisers:0 "Kreuzer"
 AST_cruisers_desc:0 "Wir können die Schlachtschiffe und Flugzeugträger den Großen überlassen, da eine Masse an Schiffen in Kreuzergröße unseren Bedarf mehr als decken wird."
 AST_pacific_area_navy:0 "Marine des Pazifikraums"
 AST_pacific_area_navy_desc:0 "Obwohl Seine Majestät in Europa ums Überleben kämpft, sollte unsere unmittelbare Priorität eine Marine sein, die unsere Feinde hier im Pazifik bekämpfen kann. Wir müssen Strategien entwickeln, die diesem Ziel entsprechen."
 AST_standard_gauge_railway:0 "Normalspurbahn"
 AST_standard_gauge_railway_desc:0 "Jahrzehntelang gab es in Australien konkurrierende Spurweiten, was unseren Transport- und Schifffahrtsbedarf durcheinander brachte. Es ist an der Zeit, die Spurweiten im ganzen Land endlich zu standardisieren."
 AST_industries_assistance_corporation:0 "Industries Assistance Corporation"
 AST_industries_assistance_corporation_desc:0 "Die jüngsten globalen Wirtschaftsverwerfungen haben Investitionen und Unternehmertum in Australien beeinträchtigt. Die Industries Assistance Corporation berät und finanziert kleine Unternehmen im ganzen Land, um die Wirtschaft wieder anzukurbeln."
 AST_western_australian_government_railways:0 "Western Australian Government Railways"
 AST_western_australian_government_railways_desc:0 "Den staatlichen Eisenbahnen in Westaustralien sollte derzeit eine höhere Priorität eingeräumt werden als dem Straßenbau. Die Geographie im Westen begünstigt die Bahn – das sollten wir ausnutzen."
 AST_south_australian_housing_trust:0 "Südaustralischer Wohnungsbaufonds"
 AST_south_australian_housing_trust_desc:0 "Südaustralien braucht mehr Industrie und Investitionen und wird daher Mittel für eine Reihe geplanter Siedlungen und Wohnungsverbesserungen bereitstellen, insbesondere rund um Adelaide."
 AST_department_of_supply_and_development:0 "Ministerium für Versorgung und Entwicklung"
 AST_department_of_supply_and_development_desc:0 "In Kriegszeiten benötigen wir eine spezielle Abteilung, die sich um Logistik- und Versorgungsfragen kümmert – Munition, Treibstoffvorräte und alles, was nötig ist, um eine Armee in Bewegung zu halten."
 AST_expand_lithgow_small_arms_factory:0 "Erweiterung der Lithgow Small Arms Factory"
 AST_expand_lithgow_small_arms_factory_desc:0 "Unsere Vickers und Brens kommen aus der Lithgow Small Arms Factory. Mit deren Wachstum wird es uns leichter fallen, unsere Kampfkraft zu steigern."
 AST_allied_works_council:0 "Alliierter Betriebsrat"
 AST_allied_works_council_desc:0 "Alle militärischen Bauvorhaben in Australien werden vom Allied Works Council überwacht. Diese zentralisierte Planung stellt sicher, dass die Regierung die Produktivität erreicht, die sie benötigt."
 AST_expand_the_northern_railway:0 "Ausbau der Nordbahn"
 AST_expand_the_northern_railway_desc:0 "Wir haben eine Eisenbahnlinie, die von Adelaide im Süden bis nach Alice Springs im Norden reicht. Nun müssen wir diesen nördlichen Punkt zu anderen Städten in der Region erweitern und so ganz Australien verbinden."
 AST_australian_arms_production:0 "Australische Waffenproduktion"
 AST_australian_arms_production_desc:0 "Aufgrund der langen Konvoizeiten muss Australien eine größere Verantwortung für die Herstellung eigener Waffen übernehmen als andere Dominions. Wir haben die Fabriken und wir haben das Know-how."
 AST_uranium_mining:0 "Uranabbau"
 AST_uranium_mining_desc:0 "In den letzten Jahrzehnten wurden in Südaustralien, insbesondere rund um Mount Gee, große Uranvorkommen entdeckt. Uran ist heute ein lebenswichtiger militärischer Rohstoff, und die Ausbeutung dieser Reserven sollte verstärkt werden."
 AST_establish_advisory_war_council:0 "Einrichtung eines beratenden Kriegsrates"
 AST_establish_advisory_war_council_desc:0 "Australiens Politiker müssen ideologische und parteipolitische Meinungsverschiedenheiten beiseite legen und zusammenkommen, um sich über die Kriegsführung zu beraten und Ratschläge zu erteilen."
 AST_national_security_act:0 "Nationales Sicherheitsgesetz"
 AST_national_security_act_desc:0 "Da wir uns nun im Krieg befinden, wird die Bundesregierung größere Machtbefugnisse zum Schutz Australiens an sich reißen. Sie wird eine stärkere Pressezensur und Unterdrückung von Dissidentengruppen sowie eine größere Möglichkeit zur Besteuerung und Beschlagnahmung von Eigentum zur Verteidigung des Dominions vorsehen."
 AST_volunteer_defence_corps:0 "Freiwilliges Verteidigungskorps"
 AST_volunteer_defence_corps_desc:0 "Aus älteren Veteranen und anderen Bürgern, die nicht in der regulären Armee sind, wurde ein freiwilliges Verteidigungskorps zusammengestellt. Sie dienen als Heimatschutz, um der Armee mehr Freiraum für direkte Aktionen gegen ihre Feinde zu geben."
 AST_civil_construction_corps:0 "Zivilbaukorps"
 AST_civil_construction_corps_desc:0 "Wir werden wehrfähige Männer zum Dienst in einem Zivilbaukorps einziehen, um beim Bau von Flugplätzen, Transportmitteln, Festungen und anderer wichtiger militärischer Infrastruktur zu helfen."
 AST_army_inventions_directorate:0 "Direktion für Erfindungen der Armee"
 AST_army_inventions_directorate_desc:0 "Kriege fördern Innovation und Kreativität. Die Regierung muss daher die guten von den schlechten Ideen unterscheiden. Ein neues, spezialisiertes Patentamt soll die Aufgabe haben, zu ermitteln, welche der zahlreichen Einreichungen bei der Regierung überhaupt einen Wert haben."
 AST_invest_in_victory:0 "Investieren Sie in den Sieg"
 AST_invest_in_victory_desc:0 "Durch den Verkauf von Kriegsanleihen an unsere Bevölkerung kann diese ihre Ersparnisse zur Kriegsanstrengung beitragen."
 AST_citizen_military_forces:0 "Bürgerliche Streitkräfte"
 AST_citizen_military_forces_desc:0 "Es ist jetzt an der Zeit, eine Reservearmee aufzustellen, um unsere Einsatzbereitschaft im Kriegsfall zu erhöhen. Wir werden verfügbare Milizionäre zur Verteidigung des eigenen Landes in die Armee einziehen und sie dann bei Bedarf auf den Einsatz im Ausland vorbereiten."
 AST_rats_of_tobruk:0 "Ratten von Tobruk"
 AST_rats_of_tobruk_desc:0 "Unsere tapferen Soldaten haben sich in der Wüstenkriegsführung und beim Plündern von Schlachtfeldern als geschickt erwiesen. Sie bedrängen den Feind, greifen ihn von seinen Stützpunkten aus an und ziehen sich dann vor dem Gegenangriff zurück."
 AST_rats_of_tobruk_effect_1:0 "Gewinnen Sie eine Eliteeinheit in Tobruk"
 AST_rats_of_tobruk_effect_2:0 "Gewinnen Sie eine Eliteeinheit in Sydney"
 AST_fight_work_or_perish:0 "Kämpfe, arbeite oder geh unter"
 AST_fight_work_or_perish_desc:0 "Da unser Feind eine existenzielle Bedrohung für das Dominion darstellt, müssen die Australier eine Entscheidung treffen. Sie werden kämpfen, sie werden arbeiten oder sie werden untergehen."
 AST_research_collaboration:0 "Forschungskooperationen"
 AST_research_collaboration_desc:0 "Die Briten haben uns gezeigt, wie vorteilhaft es ist, wissenschaftliche Fortschritte unter engen Verbündeten zu teilen. Unsere gesamte Fraktion wird in der Lage sein, Forschung und Entwicklung im Krieg effizienter durchzuführen, wenn wir die notwendigen Schritte unternehmen, um dies zu koordinieren."
 AST_fund_australian_defense_research:0 "Finanzierung der australischen Verteidigungsforschung"
 AST_fund_australian_defense_research_desc:0 "Da Australien nun ein vollständig souveräner Staat ist, haben wir keinen Zugriff mehr auf fortschrittliche Prototypen und Baupläne wie früher. Wir müssen sicherstellen, dass wir unseren Feinden immer einen Schritt voraus sind und technologisch nicht ins Hintertreffen geraten."
 AST_squash_the_squanderbugs:0 "Zerquetschen Sie die Verschwendungswanzen"
 AST_squash_the_squanderbugs_desc:0 "Verschwenderische Ausgaben für inflationsbelastete Konsumgüter entziehen Kriegsanleihen und Kriegsanstrengungen Geld. Wir müssen diesen Luxushunger unterbinden, solange unsere Armee in Not ist."
 AST_rationing_and_recycling:0 "Rationierung und Recycling"
 AST_rationing_and_recycling_desc:0 "Jede Ressource zählt. Wir werden die Lebensmittel für unsere Bürger rationieren, durch Recycling möglichst viel Metall aus Altwaren gewinnen und die Wirtschaft im ganzen Land fördern."
 AST_classify_aliens:0 "Aliens klassifizieren"
 AST_classify_aliens_desc:0 "Australien ist ein Einwanderungsland und hat daher möglicherweise auch Einwanderer aufgenommen, die ihrer Heimat treu sind. Wir registrieren und verfolgen im Ausland geborene Australier."
 AST_strengthen_ties_with_uk:0 "Stärkung der Beziehungen zu Großbritannien"
 AST_strengthen_ties_with_uk_desc:0 "Unsere Loyalität gilt dem Mutterland. Wir werden dorthin gehen, wohin es uns folgt, und uns dem Kampf gegen seine Feinde verschreiben. Gott schütze den König."
 AST_support_the_policy_of_appeasement:0 "Unterstützen Sie die Appeasement-Politik"
 AST_support_the_policy_of_appeasement_desc:0 "Die Kosten des letzten Krieges belasten das nationale Gedächtnis noch immer schwer. Wenn territoriale Zugeständnisse am anderen Ende der Welt Australien aus einem Krieg heraushalten können, dann sollten wir diese Zugeständnisse auf jeden Fall in Betracht ziehen."
 AST_the_singapore_strategy:0 "Die Singapur-Strategie"
 AST_the_singapore_strategy_desc:0 "Singapur ist zu weit von London entfernt, um sicher zu sein. Australien wird es auf sich nehmen, diesen Außenposten des Imperiums vor der Aggression anderer zu schützen."
 AST_adopt_westminster:0 "Adoptieren Sie Westminster"
 AST_adopt_westminster_desc:0 "Wir bekennen uns zum Westminster-System, das wir vom Vereinigten Königreich übernommen haben."
 AST_CSIR:0 "CSIR"
 AST_CSIR_desc:0 "Die Commonwealth Scientific and Industrial Research Organization ist unser staatlicher Forschungszweig zur Verbesserung der Effizienz von Wissenschaft und Produktion in Australien. Indem wir unsere Unterstützung dafür verstärken, verleihen wir dem Krieg weitere Energie."
 AST_swpa_protector:0 "SWPA-Schutz"
 AST_swpa_protector_desc:0 "Australien muss die vorrangige Rolle als Beschützer des südwestlichen Pazifikraums übernehmen. Die gesamte Seezone von Indochina über Indonesien bis nach Neuguinea sollte unter unserer Schirmherrschaft stehen."
 AST_empire_air_training_scheme:0 "Empire Air Training Scheme"
 AST_empire_air_training_scheme_desc:0 "Es ist an der Zeit, dass Australien sich zu einem umfassenden Flugausbildungsprogramm verpflichtet. Mit der Ermutigung und Unterstützung des Vereinigten Königreichs werden alle Dominions zusammenarbeiten, um Piloten und Hilfspersonal für die Kriegsanstrengungen bereitzustellen."
 AST_commonwealth_aircraft_corporation:0 "Commonwealth Aircraft Corporation"
 AST_commonwealth_aircraft_corporation_desc:0 "Die Commonwealth Aircraft Corporation ist der wichtigste Hersteller von Flugzeugen und Flugzeugtriebwerken in Australien. Sie verfügt über eine nachweisliche Erfolgsgeschichte und wird unseren Piloten durch ihre Unterstützung die benötigten Materialien liefern."
 AST_sever_ties_with_uk:0 "Beziehungen zu Großbritannien abbrechen"
 AST_sever_ties_with_uk_desc:0 "Es ist an der Zeit, sich vom Vereinigten Königreich zu lösen. Australien kann seinen eigenen Kurs ohne Einmischung aus London bestimmen und in seiner Region sein eigenes Schicksal bestimmen."
 AST_protect_the_homeland:0 "Schützen Sie das Heimatland"
 AST_protect_the_homeland_desc:0 "Australien ist groß, aber seine Küsten können geschützt werden. Die Sicherheit unseres eigenen Landes hat höchste Priorität."
 AST_the_swpa_menace:0 "Die SWPA-Bedrohung"
 AST_the_swpa_menace_desc:0 "Japan baut ein Imperium auf, das die Sicherheit Australiens und die Freiheit in der Region bedroht. Wir sollten uns gleichgesinnten Nationen als Verbündeten zuwenden."
 AST_never_another_gallipoli:0 "Nie wieder Gallipoli"
 AST_never_another_gallipoli_desc:0 "Der einzige Weg, Australien vor weiteren kostspieligen Gefühlskriegen zu bewahren, besteht darin, die volle Kontrolle über unsere Außenpolitik zu übernehmen. Wir brauchen keinen fernen König und können es uns nicht leisten, dass uns alte Blutsbande in Konflikte hineinziehen, die unseren Interessen nicht dienen."
 AST_woo_usa:0 "Woo USA"
 AST_woo_usa_desc:0 "Unser wahrer Verbündeter ist Amerika, eine weitere Pazifikmacht mit britischen Wurzeln. Dieses reiche und mächtige Land ist besser in der Lage, unsere Bedürfnisse zu verstehen, unseren Wohlstand zu mehren und uns vor Aggressionen zu schützen."
 AST_protect_the_dutch_colonies:0 "Schützen Sie die niederländischen Kolonien"
 AST_protect_the_dutch_colonies_desc:0 "Die Niederlande sind schwache und distanzierte Herrscher ihrer indonesischen Kolonien. Sie können sie nicht gegen Angriffe aus Japan, China oder anderen potenziell feindlichen Ländern verteidigen. Wir müssen zum Wohle der Allgemeinheit die Kontrolle übernehmen."
 AST_the_south_west_pacific_initiative:0 "Die Südwestpazifik-Initiative"
 AST_the_south_west_pacific_initiative_desc:0 "Wir haben die Machtbasis und Glaubwürdigkeit geschaffen, um unser eigenes Bündnisnetzwerk aufzubauen, dessen Schwerpunkt auf der Verteidigung des südwestlichen Pazifikraums gegen feindliche Mächte liegt. Wir werden nach gleichgesinnten Mächten suchen und Australien zu einer wichtigen Stimme in der Weltpolitik machen."
 AST_preemptive_intervention:0 "Präventive Intervention"
 AST_preemptive_intervention_desc:0 "Japans imperialer Aufbau im letzten Jahrzehnt stellt eine Bedrohung für alle freien Völker im Pazifik dar. Wir können es uns nicht leisten zu warten, bis es seine hungrigen Augen auf uns richtet. Jetzt ist es an der Zeit zu handeln."
 AST_research_cooperation:0 "Forschungskooperationen"
 AST_research_cooperation_desc:1 "Die Australier sind ein intelligentes und einfallsreiches Volk, verfügen jedoch weder über die Infrastruktur noch über die Bevölkerung für ein ernsthaftes wissenschaftliches Programm. Wir werden mit unseren Verbündeten zusammenarbeiten und Wissen und bahnbrechende Erkenntnisse zum gegenseitigen Nutzen austauschen."
 AST_abandon_the_westminster_system:0 "Verlassen Sie das Westminster-System"
 AST_abandon_the_westminster_system_desc:0 "Obwohl das Parlament in Westminster unser Erbe aus Großbritannien ist, hat es in der modernen Ära seinen Nutzen überlebt. Meinungsverschiedenheiten im Kabinett und Parteirivalitäten haben wenig dazu beigetragen, Australien in der jüngsten Wirtschaftskrise zu stabilisieren."
 AST_support_the_centre_party:0 "Unterstützen Sie die Zentrumspartei"
 AST_support_the_centre_party_desc:0 "In New South Wales ist eine starke antikommunistische Bewegung entstanden. Unterstützt von ihren Verbündeten aus der New Guard könnte die Zentrumspartei der Schlüssel zur Stärkung Australiens sein."
 AST_supply_indonesian_nationalists:0 "Versorgung indonesischer Nationalisten"
 AST_supply_indonesian_nationalists_desc:0 "Wir sollten das indonesische Volk in seinem Kampf gegen die niederländischen Unterdrücker unterstützen. Es braucht Bildung und Ausbildung, doch angesichts seiner zahlenmäßigen Überlegenheit ist ein Sieg in diesem Kampf für Gerechtigkeit unvermeidlich, ebenso wie seine Dankbarkeit uns gegenüber."
 AST_support_indonesian_uprising:0 "Unterstützen Sie den indonesischen Aufstand"
 AST_support_indonesian_uprising_desc:0 "Nachdem die Indonesier nun zu den Waffen gegen die Niederländer gegriffen haben, brauchen sie mehr als nur Worte. Der Aufstand braucht Waffen und andere Ausrüstung sowie uneingeschränkte diplomatische Unterstützung."
 AST_demand_new_zealand:0 "Nachfrage Neuseeland"
 AST_demand_new_zealand_desc:0 "Die Kiwis sind seit langem unsere engsten Verbündeten und Freunde. Wir haben an denselben Stränden gekämpft und sind in denselben sinnlosen imperialen Kriegen gestorben. Es ist Zeit, unsere beiden Länder unter einer Flagge zu vereinen."
 AST_protect_the_south_west_pacific:0 "Schützen Sie den Südwestpazifik"
 AST_protect_the_south_west_pacific_desc:0 "Es ist an der Zeit, unsere regionale Macht zu nutzen, um den gesamten Südwestpazifik in unseren Einflussbereich zu bringen. Nur wir können die Menschen und Ressourcen vor Außenstehenden schützen, die unser Erbe plündern wollen."
 AST_a_deal_with_japan:0 "Ein Deal mit Japan"
 AST_a_deal_with_japan_desc:0 "Mit dem Südwestpazifik in unserer Umlaufbahn können wir eine Annäherung an das japanische Kaiserreich erreichen. Wenn es im Nordwesten bleibt und uns unsere Sphäre überlässt, gibt es für uns keinen Grund zu kämpfen."
 AST_our_own_empire:0 "Unser eigenes Imperium"
 AST_our_own_empire_desc:0 "Es ist an der Zeit, dass die ehemalige Kolonie auf eigenen Beinen steht und ein australisches Imperium ausruft. Unser Wohlwollen und unsere weitsichtige Planung werden dem Wohl aller in der Region dienen."
 AST_japan_tech_sharing:0 "Japan Tech Sharing"
 AST_japan_tech_sharing_desc:0 "Japanische Wissenschaftler konnten unsere eigenen Forschungsinstitute überholen, aber unsere neue Harmonie mit dem Reich der aufgehenden Sonne eröffnet neue Möglichkeiten zum Lernen und Teilen."
 AST_war_on_japan:0 "Krieg gegen Japan"
 AST_war_on_japan_desc:0 "Japans Aggression dauert schon zu lange. Es hat sich seinen Weg durch Ostasien geplündert und geplündert, und nun hat es ein Auge auf die Länder und Ressourcen weiter südlich geworfen. Wir können nicht tatenlos zusehen."
 AST_empower_the_workers:0 "Stärkung der Arbeitnehmer"
 AST_empower_the_workers_desc:0 "Eine Nation von Sträflingen, Viehzüchtern und Hafenarbeitern. Das ist Australien. Es ist Zeit, den Arbeitern und dem Proletariat Australiens eine Stimme und Macht zu geben. Es lebe die Revolution."
 AST_delegation_to_china:0 "Delegation nach China"
 AST_delegation_to_china_desc:0 "Das chinesische Volk, das lange Zeit durch imperiale Gier zerrissen wurde, braucht einen Freund. Und wir brauchen einen regionalen Verbündeten gegen den Faschismus. Dieses offizielle Treffen mit der chinesischen Regierung wird uns einander näher bringen."
 AST_commitment_to_the_cause:0 "Engagement für die Sache"
 AST_commitment_to_the_cause_desc:0 "Es ist an der Zeit, die Fesseln eines ausländischen Königs abzuwerfen und ein Arbeiterparadies zu errichten, das frei von der imperialistischen Kriegstreiberei ist, die ganz Australien gefährdet."
 AST_indirect_support:0 "Indirekte Unterstützung"
 AST_indirect_support_desc:0 "Die Volksrepublik China befindet sich im Krieg, doch wir sind nicht in der Lage, uns dem auszusetzen. Eine kleine Waffenlieferung und vorsichtige Ermutigung ist alles, was wir im Moment riskieren können."
 AST_direct_support:0 "Direkte Unterstützung"
 AST_direct_support_desc:0 "Zu den Waffen, Genossen! Hört den Ruf unserer chinesischen Brüder, die im Krieg gegen den Faschismus leiden! Meldet euch an und schließt euch dem globalen Kampf aller Arbeiter an!"
 AST_join_comintern:0 "Treten Sie der Komintern bei"
 AST_join_comintern_desc:0 "Unsere Zukunft liegt im Kommunismus. Deshalb müssen wir uns unseren Genossen auf der ganzen Welt in diesem globalen Kampf anschließen. Papa Joe wird uns den Weg zeigen und die Arbeiter in Australien und anderswo in eine glorreiche Zukunft führen."
 AST_workers_paradise:0 "Arbeiterparadies"
 AST_workers_paradise_desc:0 "Das stalinistische kommunistische Experiment ist ein Fehlschlag, aber wir glauben, dass der Sozialismus der richtige Weg ist. Australien wird einen zweiten Weg für die Arbeiter einschlagen, unabhängig von den Vorgaben aus Moskau."
 AST_research_city_excursions:0 "Forschungsstadt-Exkursionen"
 AST_research_city_excursions_desc:0 "Die Sowjetunion hat auf ihrem gesamten Territorium Forschungsstädte und Labore errichtet und australische Forscher eingeladen, hierher zu kommen und etwas über die Herrlichkeit der kommunistischen Wissenschaft zu lernen."
 AST_nz_puppet:0 "NZ-Puppe"
 AST_nz_puppet_desc:0 "Die Arbeiter Neuseelands sollten sich mit ihren australischen Brüdern und Schwestern zusammenschließen. Wir können sie beschützen und haben ihnen unsere sanfte Hand der Freundschaft gereicht, solange sie sich unseren Anweisungen unterwerfen."
 AST_the_threat_against_the_people:0 "Die Bedrohung des Volkes"
 AST_the_threat_against_the_people_desc:0 "Die militaristische und faschistische Macht des kaiserlichen Japans bedroht das Wohlergehen aller Australier und verhindert das friedliche Zusammenleben der Arbeiter der Welt. Australien wird diesen Volksfeind zurückdrängen und ihn zwingen, auf seinen trostlosen, felsigen Inseln zu bleiben."
 AST_new_general_tt:0 "Ein neuer §Y3 Skill§!-General namens §YIven Mackay§! wird erscheinen."
 AST_homeland_defense_tt:0 "Befestigen Sie das Heimatland mit „Küstenfestungen und Landfestungen“!, die mögliche Landeplätze und Häfen bewachen."
 AST_swpi_research_tt:0 "Wir werden mit den USA oder mit anderen Mitgliedern unserer Fraktion eine „Ytech-Sharing-Vereinbarung“ abschließen."
 AST_deal_with_japan_tt:1 "Wir werden vorschlagen, die Oberhoheit über Malaya im Gegenzug für ein Bündnis an Japan zu übertragen. Sollte dies nicht möglich sein, werden wir stattdessen die Abtretung der Staaten Kalimantan, Sulawesi und Molukken an Japan vorschlagen.\n"
 CAN_rowell_sirois_commission:0 "Rowell-Sirois-Kommission"
 CAN_rowell_sirois_commission_desc:0 "Die Rowell-Sirois-Kommission kam zu dem Schluss, dass die föderale Verfassung Kanadas die Erholung von der Großen Depression behindert. Wir sollten die Servicestandards landesweit angleichen."
 CAN_crown_corporations:0 "Crown Corporations"
 CAN_crown_corporations_desc:0 "Um wichtige Dienstleistungen zu erbringen und das Wirtschafts- und Industriewachstum anzukurbeln, muss Kanada viele neue Crown Corporations gründen. Wo private Unternehmen nicht eingreifen, muss der Staat eingreifen."
 CAN_war_bonds:0 "Kriegsanleihen"
 CAN_war_bonds_desc:0 "Wir können die Kriegsanstrengungen nicht auf der Grundlage unserer mageren Steuereinnahmen oder Rohstoffexporte finanzieren. Das patriotische kanadische Volk muss in sein Land investieren und die Kriegsanstrengungen durch Kriegsanleihen unterstützen."
 CAN_defence_of_canada_regulations:0 "Vorschriften zur Verteidigung Kanadas"
 CAN_defence_of_canada_regulations_desc:0 "In Kriegszeiten müssen Bürgerrechte eingeschränkt werden, um eine Untergrabung der Kriegsanstrengungen zu verhindern. Dies bedeutet Einschränkungen der Presse, der Rechte von Dissidentengruppen und einiger gesetzlicher Rechte."
 CAN_national_housing_act:0 "Nationales Wohnungsbaugesetz"
 CAN_national_housing_act_desc:0 "Ein modernisierendes Dominion braucht landesweit einheitliche Wohnungsvorschriften. Wir müssen die Lebensbedingungen aller Kanadier verbessern."
 CAN_dollar_a_year_men:0 "Dollar-pro-Jahr-Männer"
 CAN_dollar_a_year_men_desc:0 "Die kanadische Industrie hat mit Effizienzproblemen zu kämpfen, doch eine Reihe wohlhabender Geschäftsleute bietet ihre Dienste und Beratung gegen eine symbolische Summe an. Dieser kleine Kreis von Beratern wird uns weiterbringen."
 CAN_canada_pacific_railway:0 "Kanadische Pazifikbahn"
 CAN_canada_pacific_railway_desc:0 "Die CPR hat alle ihre Ressourcen für die Kriegsanstrengungen zur Verfügung gestellt. Tausende Tonnen an Vorräten und Material werden unser großes Dominion ohne Unterbrechung von Meer zu Meer durchqueren."
 CAN_maritime_colonial_railway:0 "Maritime Kolonialeisenbahn"
 CAN_maritime_colonial_railway_desc:0 "Unsere Ostprovinzen sind seit dem Verkauf der Intercolonial Railway an die Canadian National Railway nicht ausreichend mit Bahnlinien versorgt. Wir fördern und realisieren den Bau einer neuen Maritime Colonial Railway, um die Verbindungen zwischen den Zentralprovinzen und den Atlantikprovinzen auszubauen."
 CAN_retool_angus_shops:0 "Angus Shops umrüsten"
 CAN_retool_angus_shops_desc:0 "Eine moderne Armee braucht Panzer, und die Angus Shops der CPR eignen sich für deren Bau. Rüsten Sie diese Infrastruktur um und bauen Sie Panzer."
 CAN_imperial_oil:0 "Imperial Oil"
 CAN_imperial_oil_desc:0 "Imperial Oil möchte die Exploration im Westen Kanadas finanzieren. Dies wird unsere Erdölreserven erhöhen und die Kriegsmaschinerie schmieren."
 CAN_department_of_munitions_and_supply:0 "Ministerium für Munition und Versorgung"
 CAN_department_of_munitions_and_supply_desc:0 "Wir werden die Kontrolle und Verwaltung der nationalen Ressourcen Kanadas unter CD Howe im Ministerium für Munition und Versorgung bringen."
 CAN_national_resources_mobilization_act:0 "Gesetz zur Mobilisierung nationaler Ressourcen"
 CAN_national_resources_mobilization_act_desc:0 "Kanada ist groß und seine Bevölkerung ist über das ganze Land verstreut. Es sollte ein System entwickelt werden, um den Beschäftigungsstatus zu verfolgen und sicherzustellen, dass alle Personen, die für den Auslandsdienst in Frage kommen, gefunden werden können."
 CAN_wartime_prices_and_trade_board:0 "Preis- und Handelsausschuss während des Krieges"
 CAN_wartime_prices_and_trade_board_desc:0 "Um Wucher und Hamsterkäufe zu verhindern, wurden Preiskontrollen eingeführt, um die Waren für die meisten Kanadier erschwinglich zu machen."
 CAN_bits_and_pieces_program:0 "Bits and Pieces-Programm"
 CAN_bits_and_pieces_program_desc:0 "Das Bits and Pieces-Programm wird eine Reihe kleiner Fabriken, die sich auf die Herstellung von Konsumgütern spezialisiert haben, für die Kriegsanstrengungen mobilisieren. Eine Fahrradfabrik kann Kapazitäten für eine Reihe nützlicher Kriegsgüter schaffen."
 CAN_fund_the_national_research_council:0 "Finanzieren Sie den National Research Council"
 CAN_fund_the_national_research_council_desc:0 "Kanada blickt auf eine lange Geschichte der Wissenschaft und des Fortschritts zurück, doch der Bedarf an Forschern ist größer denn je. Es ist an der Zeit, dem NRC mehr Gewicht zu verleihen."
 CAN_mine_the_shield:0 "Den Schild abbauen"
 CAN_mine_the_shield_desc:0 "Der Kanadische Schild ist reich an Nickel, Kupfer, Gold und Silber. Die Natur ist reich an Mineralien. Es ist an der Zeit, sie weiter auszubeuten."
 CAN_canada_wheat_board:0 "Canada Wheat Board"
 CAN_canada_wheat_board_desc:0 "Die verheerende Wirkung der Depression auf unsere westlichen Landwirte kann abgemildert werden, wenn wir das Canada Wheat Board wiederbeleben und ihm neue Impulse geben, damit es die Verkaufspreise für Weizen, Gerste, Hafer und andere Feldfrüchte festlegt."
 CAN_victory_aircraft_limited:0 "Victory Aircraft Limited"
 CAN_victory_aircraft_limited_desc:0 "Victory Aircraft wurde mit dem Aufbau der kanadischen Bomberflotte beauftragt. Lancaster für alle!"
 CAN_alberta_coal_towns:0 "Kohlestädte in Alberta"
 CAN_alberta_coal_towns_desc:0 "Entlang der gesamten Rocky Mountains gibt es Kohlevorkommen, die nur darauf warten, ausgebeutet zu werden. Wir können die Auswanderung in diese neuen Minenstandorte fördern und die Beschäftigung im Westen verbessern."
 CAN_commit_to_the_war:0 "Verpflichte dich zum Krieg"
 CAN_commit_to_the_war_desc:0 "Die Welt brennt, und Kanada hat eine Rolle dabei zu spielen. Wir geloben, die Demokratie und die britische Lebensweise zu schützen."
 CAN_john_inglis_and_company:0 "John Inglis und Company"
 CAN_john_inglis_and_company_desc:0 "John Inglis and Company sollte angewiesen werden, neue Maschinengewehre und Kanonen für die kanadische Armee zu bauen."
 CAN_polymer_corporation:0 "Polymer Corporation"
 CAN_polymer_corporation_desc:0 "Der neue Staatskonzern Polymer Corporation hat sich bei der Herstellung neuer Kautschukpolymere als außerordentlich effizient erwiesen."
 CAN_national_steel_car:0 "Nationales Stahlauto"
 CAN_national_steel_car_desc:0 "Obwohl die National Steel Car Company während der Depression zu kämpfen hatte, verfügt sie über das Fachwissen und die Erfahrung, um beim Bau der Fahrzeuge zu helfen, die wir für den Ausbau der Eisenbahn und der Armee benötigen."
 CAN_send_in_the_zombies:0 "Schickt die Zombies rein"
 CAN_send_in_the_zombies_desc:0 "Es ist an der Zeit, alle wehrfähigen Männer Kanadas in die Armee zu schicken. Wir haben über die NRMA viele Männer für die Industrie mobilisiert, aber jetzt sollten sie ins Ausland geschickt werden."
 CAN_if_day:0 "Wenn Tag"
 CAN_if_day_desc:0 "Die Kanadier nehmen die Bedrohung durch ausländische Macht nicht ernst. Deshalb simulieren wir eine Nazi-Besatzung Winnipegs, um die Angst zu schüren. Dies wird sicherlich den Verkauf von Victory Bonds steigern."
 CAN_defense_research_grants:0 "Forschungsstipendien für die Verteidigung"
 CAN_defense_research_grants_desc:0 "Da Kanada nun ein vollständig souveräner Staat ist, haben wir keinen Zugriff mehr auf fortschrittliche Prototypen und Baupläne wie früher. Wir müssen sicherstellen, dass wir unseren Feinden immer einen Schritt voraus sind und technologisch nicht ins Hintertreffen geraten."
 CAN_uranium_mining:0 "Uranabbau"
 CAN_uranium_mining_desc:0 "Unsere Verbündeten arbeiten an einem geheimen Projekt, für das Uran benötigt wird. Glücklicherweise hat die Eldorado Company das seltene Mineral entdeckt und rund um die Minen eine Stadt errichtet – Port Radium. Die Regierung muss die Kontrolle über diese Firma übernehmen und dieses hochsensible Mineral schützen."
 CAN_long_branch_arsenal:0 "Arsenal von Long Branch"
 CAN_long_branch_arsenal_desc:0 "Das Long Branch Arsenal im Westen Torontos wird unser Zentrum für die Gewehrproduktion sein. Wir benötigen Tausende von Lee-Enfields, und die zentrale Lage des Arsenals wird die Verteilung im ganzen Land erleichtern."
 CAN_independent_command:0 "Unabhängiges Kommando"
 CAN_independent_command_desc:0 "Im Ersten Weltkrieg waren die kanadischen Truppen letztlich britischen Offizieren unterstellt, was zu sinnlosen Massakern an der Somme und in Passchendaele führte. Dieses Mal wird Kanada sein eigenes Kommando übernehmen."
 CAN_forced_quebec_conscription:0 "Zwangsrekrutierung in Quebec"
 CAN_forced_quebec_conscription_desc:0 "Genau wie 1917 widersetzen sich unsere französisch-kanadischen Bürger in Quebec der Idee einer nationalen Wehrpflicht, um mehr Männer in die Armee zu holen. Wir werden nicht tatenlos zusehen, wie sich eine Minderheit dem Willen des Parlaments widersetzt."
 CAN_compromise_with_quebec:0 "Kompromiss mit Quebec"
 CAN_compromise_with_quebec_desc:0 "Quebec sträubt sich gegen die Wehrpflicht. Diese Frage hätte das Land im Ersten Weltkrieg beinahe auseinandergerissen, und wir können es uns nicht leisten, unsere nationale Einheit in Krisenzeiten zu gefährden. Vielleicht können wir eine Einigung über den Kriegsdienst für die Einwohner Quebecs erzielen."
 CAN_war_fueled_economy:0 "Vom Krieg angeheizte Wirtschaft"
 CAN_war_fueled_economy_desc:0 "Die Nachfrage nach Rohstoffen und Fertigprodukten aus dem Ausland hilft Kanada aus der Depression. Unser natürlicher Reichtum an Wäldern und Mineralien kann die alliierte Kriegsmaschinerie versorgen und die Nation bereichern."
 CAN_army_modernization:0 "Modernisierung der Armee"
 CAN_army_modernization_desc:0 "Kanada hat seine Armee zu lange in seinem feuerfesten Zuhause, fernab von brennbaren Materialien, mit veralteter Ausrüstung und Ausbildung auskommen lassen. Wir müssen die Modernisierung vorantreiben, bevor es zu spät ist."
 CAN_canadian_infantry_corps:0 "Kanadisches Infanteriekorps"
 CAN_canadian_infantry_corps_desc:0 "Wir verfügen nun über genügend Männer, um eine Formation auf Korpsebene aufzustellen. Das kanadische Infanteriekorps ist unsere erste Gruppe in Korpsgröße seit dem letzten Krieg."
 CAN_cmp_truck:0 "CMP-LKW"
 CAN_cmp_truck_desc:0 "Kanadische Fabriken sind vor feindlichen Bombenangriffen geschützt und können daher gezielt für den Transport von Kriegsgütern eingesetzt werden. Unser CMP-LKW-Design ist vielseitig und für viele Klimazonen geeignet."
 CAN_royal_regiment_of_canadian_artillery:0 "Königliches Regiment der kanadischen Artillerie"
 CAN_royal_regiment_of_canadian_artillery_desc:0 "Trotz des Mangels an modernen Kanonen müssen wir damit beginnen, unsere Artilleristen für die Führung eines modernen Krieges auszubilden, einschließlich der Verwendung von Flugabwehrgeschützen und neuen 25-Pfündern."
 CAN_a_motorized_army:0 "Eine motorisierte Armee"
 CAN_a_motorized_army_desc:0 "Kanadas Erfahrung in der Herstellung von Lastwagen und Motoren hat uns einen Vorsprung bei der Forschung und Entwicklung motorisierter Streitkräfte verschafft."
 CAN_red_deer_training_camp:0 "Trainingslager Red Deer"
 CAN_red_deer_training_camp_desc:0 "Das Trainingslager Red Deer wird der Hauptstandort für die Ausbildung unserer neuen Armee sein. Mit einem umfassenden Waffenlager und nahegelegenen Flugplätzen ist Red Deer ideal gelegen."
 CAN_the_walkie_talkie:0 "Das Walkie-Talkie"
 CAN_the_walkie_talkie_desc:0 "Donald Hings hat ein neues tragbares Zweiwege-Kommunikationsgerät erfunden und patentiert, das auf Funkwellen basiert. Dies wird die Kommunikation und Zielerfassung erheblich verbessern."
 CAN_1st_canadian_parachute_battalion:0 "1. kanadisches Fallschirmjägerbataillon"
 CAN_1st_canadian_parachute_battalion_desc:0 "Trotz des Widerstands derjenigen, die es vorziehen würden, wenn wir uns auf die Verteidigung unseres Heimatlandes konzentrieren würden, ist für die moderne Luftkriegsführung ein spezielles Fallschirmjägerbataillon erforderlich, um unseren Feinden zuvorzukommen."
 CAN_the_black_devils:0 "Die schwarzen Teufel"
 CAN_the_black_devils_desc:0 "Für gefährliche Einsätze muss eine spezielle Kommandoeinheit bereitstehen. Die Zusammenarbeit mit unseren amerikanischen Verbündeten bei der Gründung der „Teufelsbrigade“ ist vereinbart."
 CAN_the_valentine_tank:0 "Der Valentine-Panzer"
 CAN_the_valentine_tank_desc:0 "Kanada verfügt über eine Lizenz zur Herstellung des Valentine Tank, eines robusten mittleren Panzers britischer Bauart."
 CAN_the_rocky_mountain_rangers:0 "Die Rocky Mountain Rangers"
 CAN_the_rocky_mountain_rangers_desc:0 "Die Verteidigung der Heimat im Westen obliegt den Rocky Mountain Rangers mit Sitz in Kamloops."
 CAN_strengthen_the_commonwealth_ties:0 "Stärkung der Commonwealth-Beziehungen"
 CAN_strengthen_the_commonwealth_ties_desc:0 "Unsere Mitdominions sind unsere treuesten Freunde und wir sollten alle gemeinsam marschieren, um Seine Majestät zu unterstützen."
 CAN_shadow_factories:0 "Schattenfabriken"
 CAN_shadow_factories_desc:0 "Wir brauchen Flugzeugfabriken, aber es ist einfacher und sicherer, die Teilefertigung auf andere Fabriken zu verteilen, insbesondere in der Nähe von Automobilwerken. Dies fördert die Geheimhaltung und Sicherheit."
 CAN_montreal_laboratory_collaboration:0 "Zusammenarbeit mit dem Montrealer Labor"
 CAN_montreal_laboratory_collaboration_desc:1 "Das Montreal Laboratory ist zu einer Attraktion für Wissenschaftler aus aller Welt geworden. Französische und britische Wissenschaftler fühlen sich besonders willkommen und bringen dringend benötigtes Fachwissen in die Bemühungen der Dominions ein."
 CAN_the_plan:0 "Der Plan"
 CAN_the_plan_desc:0 "Wir haben uns mit unseren Verbündeten zusammengeschlossen, um Erfahrungen und Erkenntnisse in der Pilotenausbildung auszutauschen. Der Krieg könnte aus der Luft gewonnen werden, daher könnte der Commonwealth Air Training Plan der Schlüssel zum Sieg sein."
 CAN_camp_x:0 "Camp X"
 CAN_camp_x_desc:0 "Die Informationsbeschaffung und Spionageausbildung wird an einem geheimen Standort in der Nähe von Oshawa zentralisiert. Von hier aus gelangen Signale aus Großbritannien und den USA ins Zentrum der Kommunikation."
 CAN_supply_the_empire:0 "Versorge das Imperium"
 CAN_supply_the_empire_desc:0 "Gibt es eine Nation, die so reich an Holz, Eisen, Nickel und Kohle ist? Solange unsere Konvois und Eisenbahnen sicher sind, können wir Rohstoffe zu unseren Häfen und dann zu unseren imperialen Partnern transportieren."
 CAN_aluminium_company_of_canada:0 "Aluminium Company of Canada"
 CAN_aluminium_company_of_canada_desc:0 "Aluminium ist leicht und rostfrei. Durch den Ausbau unseres Aluminiumabbaus und unserer Aluminiumproduktion können wir sicherstellen, dass unsere Fabriken und Fertigungsstraßen stets mit ausreichend Material versorgt sind."
 CAN_turner_valley_oilfield:0 "Ölfeld Turner Valley"
 CAN_turner_valley_oilfield_desc:0 "Das 1914 entdeckte Turner Valley vor den Toren Calgarys hat sich zu einem der größten Ölfelder des Empire entwickelt. Die weitere Erschließung sollte für Industrie und Regierung oberste Priorität haben."
 CAN_patriation:0 "Patriation"
 CAN_patriation_desc:0 "Für Kanada ist es an der Zeit, seine Bindungen zu Mutter England zu lockern. Wir sind eine gewachsene Nation mit einem eigenen Schicksal, die sowohl auf den Kontinent und die Pazifikküste als auch auf England und Europa blickt."
 CAN_permanent_joint_defense_board:0 "Ständiger Gemeinsamer Verteidigungsausschuss"
 CAN_permanent_joint_defense_board_desc:0 "Die Geographie und das gemeinsame Erbe verbinden uns mit den Vereinigten Staaten, doch der Kontinent ist zu groß, als dass ihn einer von uns allein verteidigen könnte. Ein gemeinsamer Verteidigungsausschuss ist erforderlich, um den Schutz Nordamerikas zu beraten und zu planen."
 CAN_north_american_alliance:0 "Nordamerikanische Allianz"
 CAN_north_american_alliance_desc:0 "Es ist an der Zeit, eine große und dauerhafte Partnerschaft mit den Vereinigten Staaten von Amerika zu verkünden. Niemand kann uns herausfordern, wenn wir in Frieden und Brüderlichkeit vereint sind."
 CAN_habakkuk_carrier:0 "Habakuk-Träger"
 CAN_habakkuk_carrier_desc:0 "Im Rahmen des Projekts Habakuk planen wir den Bau eines U-Boot-Abwehrträgers aus Holzzellstoff und Eis. Dadurch wird Stahl für wichtigere Zwecke frei und die kanadische Wissenschaft wird gefördert."
 CAN_refuge_for_scientists:0 "Zufluchtsort für Wissenschaftler"
 CAN_refuge_for_scientists_desc:0 "Fernab vom Kriegsgetümmel hat sich Kanada als vielversprechender Landeplatz für Wissenschaftler erwiesen, die ihre Arbeit ohne Bomben und Kugeln durchführen möchten."
 CAN_swastika_clubs:0 "Hakenkreuzvereine"
 CAN_swastika_clubs_desc:0 "Viele Kanadier schließen sich Swastika-Clubs an, um die Ideen und Ideale des Faschismus zu fördern. Faszinierend!"
 CAN_support_the_blue_shirts:0 "Unterstützen Sie die Blauhemden"
 CAN_support_the_blue_shirts_desc:0 "Die Hinwendung unseres Landes zum Faschismus erfordert einen starken paramilitärischen Arm, um unsere Rivalen einzuschüchtern und zu beeindrucken. Die Blauhemden werden unsere Antwort auf jeden sein, der sich unserer neuen Ordnung widersetzt."
 CAN_join_germany:0 "Komm nach Deutschland"
 CAN_join_germany_desc:0 "Hitler hat sich als vernünftiger Mann erwiesen, der vernünftige Forderungen stellt und gleichzeitig seine Nation stärkt. Wir werden uns dem Reich solidarisch für ein neues Goldenes Zeitalter anschließen."
 CAN_support_a_synarchist_baja:0 "Unterstützen Sie ein synarchistisches Baja"
 CAN_support_a_synarchist_baja_desc:0 "Um die Verbreitung des konservativen Nationalismus in Nordamerika zu fördern, sollten wir uns mit aller Kraft für einen synarchistischen Aufstand in Mexiko einsetzen. Sobald dieser erfolgreich ist, werden wir zwei faschistische Staaten haben, die bereit sind, die Botschaft in der ganzen Hemisphäre zu verbreiten."
 CAN_pinion_the_eagle:0 "Pinion der Adler"
 CAN_pinion_the_eagle_desc:0 "Unsere lange Grenze zu den Vereinigten Staaten ist schon viel zu lange unverteidigt. Amerika bleibt die größte Bedrohung für die kanadische Sicherheit. Daher werden Maßnahmen ergriffen, um den USA eine Invasion zu erschweren und zu erschweren."
 CAN_skewer_the_eagle:0 "Spieß den Adler auf"
 CAN_skewer_the_eagle_desc:0 "Wir werden mit unseren mexikanischen Brüdern ein Bündnis bilden, um die amerikanische Bedrohung einzudämmen."
 CAN_defence_scheme_no_1:0 "Verteidigungsplan Nr. 1."
 CAN_defence_scheme_no_1_desc:0 "Es ist an der Zeit, den Verteidigungsplan Nr. 1, unseren Zwischenkriegsplan für einen Gegenangriff auf die Vereinigten Staaten im Kriegsfall, wieder hervorzuholen."
 CAN_demand_labrador_and_newfoundland:0 "Nachfrage Labrador und Neufundland"
 CAN_demand_labrador_and_newfoundland_desc:0 "Neufundland ist ein gescheitertes Dominion, das seinen Kolonialstatus wiedererlangen musste. Sein rechtmäßiger Platz liegt bei Kanada."
 CAN_burn_the_royal_portraits:0 "Verbrenne die königlichen Porträts"
 CAN_burn_the_royal_portraits_desc:0 "Keine Monarchen mehr! Wir werden uns nicht länger der Herrschaft einer ausländischen Galionsfigur und eines ausländischen Parlaments unterwerfen. Kanada wird frei und gleich sein. Das Volk wird sich erheben."
 CAN_communist_labor_total_war_committee:0 "Kommunistisches Arbeiterkomitee für den Totalen Krieg"
 CAN_communist_labor_total_war_committee_desc:0 "Kanadische Kommunisten sind auch Patrioten! Im globalen Krieg gegen den Faschismus können wir mit den bürgerlichen Liberalen zusammenarbeiten, um die gesamte Nation für den Krieg zu mobilisieren."
 CAN_defence_scheme_no_2:0 "Verteidigungsschema Nr. 2"
 CAN_defence_scheme_no_2_desc:0 "Verteidigungsplan Nr. 2 ist unser Notfallplan für den Fall eines Krieges im Pazifik zwischen den USA und dem japanischen Kaiserreich. Im Idealfall bleiben wir im Kriegsfall neutral, aber unabhängig von den Umständen wird eine starke Verteidigung an unserer Westküste aufgebaut."
 CAN_supply_the_red_army:0 "Versorgung der Roten Armee"
 CAN_supply_the_red_army_desc:0 "Da sich die Sowjetunion im Krieg gegen die Feinde des Volkes befindet, sollte Kanada Moskau mit Waffen und Nachschub unterstützen."
 CAN_canada_united:0 "Kanada vereint"
 CAN_canada_united_desc:0 "Obwohl unsere Bevölkerung in einer dünnen Linie über den Kontinent verstreut ist, haben wir uns in dieser Weltkrise zusammengeschlossen, um für kanadische Werte einzutreten und die Schwachen zu schützen."
 CAN_join_comintern:0 "Treten Sie der Komintern bei"
 CAN_join_comintern_desc:0 "Die Sowjetunion hat ihren guten Willen und ihre Stärke unter Beweis gestellt. Kanada sollte dem sowjetischen Bündnis beitreten."
 CAN_support_the_world_revolution:0 "Unterstützen Sie die Weltrevolution"
 CAN_support_the_world_revolution_desc:0 "Hört ihr das Volk singen? Es ist die Internationale! Kanada wird versuchen, das Proletariat von seinen Fesseln zu befreien."
 CAN_rcaf_station_borden:0 "RCAF-Station Borden"
 CAN_rcaf_station_borden_desc:0 "Das kanadische Luftkorps wurde in Borden, Ontario, gegründet und dieser Stützpunkt sollte zur Ausbildung einer neuen Generation von Piloten genutzt werden."
 CAN_we_have_the_hurricane:0 "Wir haben den Hurrikan"
 CAN_we_have_the_hurricane_desc:0 "Das Vereinigte Königreich hat uns die Genehmigung zum Bau einer Reihe von Hurricane-Kampfflugzeugen erteilt. Diese Flugzeuge werden das Herzstück unserer Luftstreitkräfte bilden."
 CAN_the_pacific_coast_air_defence_radar_system:0 "Das Radarsystem der Luftverteidigung an der Pazifikküste"
 CAN_the_pacific_coast_air_defence_radar_system_desc:0 "Die Küste von British Columbia ist felsig und mit Ausnahme des Südens dünn besiedelt. Wir werden uns auf Frühwarnsysteme wie eine Kette von Radarstationen verlassen müssen, um alles Ungewöhnliche zu erkennen, das über den Pazifik kommt."
 CAN_commonwealth_air_training_plan:0 "Commonwealth-Lufttrainingsplan"
 CAN_commonwealth_air_training_plan_desc:0 "Das Luftkampftraining wird mit unseren Verbündeten im Commonwealth und Dominion koordiniert. Dies ist effizienter und kann in großen Mengen und sicher auf unseren Flugplätzen durchgeführt werden."
 CAN_fund_fairchilds_development:0 "Finanzieren Sie die Entwicklung von Fairchild"
 CAN_fund_fairchilds_development_desc:0 "Das Fairchild-Flugzeugwerk in Quebec sollte die nötigen Mittel erhalten, um die Produktion von Bomberteilen zu steigern. Wir sollten in der Lage sein, die Zahl der Beschäftigten im Werk um Tausende zu erhöhen."
 CAN_cookie_carriers:0 "Keksträger"
 CAN_cookie_carriers_desc:0 "Der strategische Luftkrieg erfordert schwere Bomber, die unseren Feinden leckere Leckerbissen abwerfen."
 CAN_the_sabre_project:0 "Das Sabre-Projekt"
 CAN_the_sabre_project_desc:0 "Düsenflugzeuge werden den Himmel der Zukunft beherrschen, daher sollten wir in die Produktion unserer eigenen Varianten ausländischer Düsenflugzeuge investieren."
 CAN_halifax_shipyards:0 "Halifax-Werften"
 CAN_halifax_shipyards_desc:0 "In den Docks von Halifax, die günstig gegenüber Europa liegen, werden in Rekordtempo neue Schiffe gebaut. Die Schlacht um den Atlantik kann gewonnen werden."
 CAN_destroyer_effort:0 "Zerstörer-Anstrengung"
 CAN_destroyer_effort_desc:0 "Die Gefahr von U-Boot-Angriffen auf Versorgungs- und Truppenkonvois erfordert, dass wir uns auf den Bau von Zerstörern konzentrieren, um diese Unterwassergefahren zu jagen und zu beseitigen."
 CAN_light_cruiser_effort:0 "Leichter Kreuzer-Einsatz"
 CAN_light_cruiser_effort_desc:0 "Wir werden nie in der Lage sein, viele Großkampfschiffe zu bauen, aber kleinere Kreuzer, die in Massen gebaut werden, können immer noch eine Menge Schaden anrichten."
 CAN_heavy_cruiser_effort:0 "Schwerer Kreuzer-Einsatz"
 CAN_heavy_cruiser_effort_desc:0 "Wir können unsere Flotten um schwere Kreuzer herum aufbauen und verfügen über mehr als genug Häfen, um diese Strategie umsetzbar zu machen."
 CAN_escort_fleet:0 "Eskortflotte"
 CAN_escort_fleet_desc:0 "Die Ozeane trennen uns von den meisten Turbulenzen der Welt. Wenn unsere Armeen also kämpfen und versorgt werden sollen, müssen wir Eskortformationen und der U-Boot-Abwehr Priorität einräumen."
 CAN_fleet_in_being:0 "Flotte im Sein"
 CAN_fleet_in_being_desc:0 "Durch den Aufbau einer großen Seestreitmacht kann allein ihre Existenz eine Bedrohung für unsere Feinde darstellen, selbst wenn wir sie nie einsetzen. Allein der Gedanke, dass unsere Schiffe auslaufen und ihre Seewege angreifen könnten, zwingt sie zur Vorsicht."
 CAN_degauss_ship_hulls:0 "Schiffsrümpfe entmagnetisieren"
 CAN_degauss_ship_hulls_desc:0 "Wir werden mit der Entmagnetisierung unserer Schiffsrümpfe beginnen, um ihre magnetische Signatur zu reduzieren. Dies schützt sie vor Magnetminen und reduziert das elektronische Profil der Schiffe."
 CAN_trade_fleet:0 "Handelsflotte"
 CAN_trade_fleet_desc:0 "Kanada ist eine Handelsnation. Bauen Sie mehr Frachter und Konvois."
 CAN_united_shipyards:0 "Vereinigte Werften"
 CAN_united_shipyards_desc:0 "Das Montrealer Dock von United Shipyards ist zur Hauptquelle für unsere Landungsboote und Frachtschiffe geworden."
 SAF_support_axis_interests_effect_tt:0 "Bauen Sie §YInfrastruktur§! und fügen Sie §YBauplätze§! in besetzten Staaten im südlichen und mittleren Afrika hinzu.\n"
 SAF_a_king_for_our_people_trigger_tt:0 "König Edward wurde verbannt"
 NATIONAL_FOCUS_MUTUALLY_EXCLUSIVE_TREE:0 "Die Zweige schließen sich gegenseitig aus."
 NATIONAL_FOCUS_EXCLUSIVE_INFO_DESC:0 "Gegenseitig ausschließend mit"
 NATIONAL_FOCUS_EXCLUSIVE_INFO_ENTRY:0 "$FOCUS|Y$"
 NATIONAL_FOCUS_NO_CURRENT_EFFECT:0 "Dieser Fokus hat derzeit keine Auswirkung. Änderungen der Weltlage können dies beeinflussen."
 SAF_war_measures_act:0 "Kriegsmaßnahmengesetz"
 SAF_war_measures_act_desc:0 "Wir können keine Unterbrechung der Kriegsanstrengungen dulden. Deshalb verabschieden wir neue Gesetze, um die vollständige Einhaltung der Regierungsziele zu erzwingen. Dies schützt den Ressourcenfluss und ermöglicht es uns, die politische Energie dort zu konzentrieren, wo sie benötigt wird."
 SAF_emergency_workers:0 "Rettungskräfte"
 SAF_emergency_workers_desc:0 "Es ist an der Zeit, einen größeren Teil der südafrikanischen Bevölkerung für die Kriegsanstrengungen zu mobilisieren. Auch Frauen können zu geringeren Kosten in die Fabriken gebracht werden."
 SAF_csir:0 "CSIR"
 SAF_csir_desc:0 "Südafrika hinkt in Wissenschaft und Technologie anderen Dominions hinterher, daher ist die Gründung des Rates für wissenschaftliche und industrielle Forschung in Pretoria für die Regierung zu einer dringenden Angelegenheit geworden."
 SAF_cape_garrison_artillery:0 "Artillerie der Kapgarnison"
 SAF_cape_garrison_artillery_desc:0 "Das Kap bleibt für viele Nationen ein wichtiger Seeweg und stellt das Tor zum südafrikanischen Kernland dar. Der Ausbau der Küstenverteidigung und der Artillerie der Garnison sollte ganz oben auf unserer To-do-Liste stehen."
 SAF_reconstitute_the_cape_corps:0 "Stellen Sie das Cape Corps wieder her"
 SAF_reconstitute_the_cape_corps_desc:0 "In der Vergangenheit war es uns möglich, einen Teil unserer farbigen Bevölkerung zum Dienst in der Verteidigung Südafrikas zu zwingen. Dies ist nicht bei allen im Land beliebt, aber es wird weiße Südafrikaner für den Dienst im Ausland frei machen."
 SAF_expand_the_cape_corps:0 "Erweitern Sie das Cape Corps"
 SAF_expand_the_cape_corps_desc:0 "Obwohl wir das Cape Corps als überwiegend nichtkämpfende Truppe neu aufgestellt haben, bedeutet die Bedrohung durch eine Invasion, dass wir dem Corps mehr Ressourcen, Ausbildung und Zugang zu Waffen geben müssen."
 SAF_work_for_all_poor:0 "Arbeit für alle Armen"
 SAF_work_for_all_poor_desc:0 "Arme Afrikaner vom Land strömten in den letzten Jahren auf der Suche nach Arbeit in die Städte, und wir haben wenig getan, um ihnen zu helfen. Bis jetzt. Die Industrialisierung und der staatliche Schutz ihres Zugangs zur Arbeit werden dieser Bevölkerung helfen."
 SAF_outlaw_strikes:0 "Gesetzlose Streiks"
 SAF_outlaw_strikes_desc:0 "Arbeitsunterbrechungen und Arbeitsunterbrechungen sind in Krisenzeiten unpatriotisch. Streiks werden hiermit für illegal erklärt und die Regierung wird die Menschen zur Rückkehr an die Arbeit zwingen."
 SAF_support_the_policy_of_appeasement:0 "Unterstützen Sie die Appeasement-Politik"
 SAF_support_the_policy_of_appeasement_desc:0 "Deutschland hat berechtigte Beschwerden, und die Dominions haben im letzten Krieg schwer gelitten. Wir sollten jede Gelegenheit für Frieden in unserer Zeit nutzen."
 SAF_police_windhoek:0 "Polizei Windhoek"
 SAF_police_windhoek_desc:0 "Seit dem Ende des letzten Krieges haben wir ein Mandat über die ehemalige deutsche Kolonie Südwestafrika. Es ist von entscheidender Bedeutung, dass wir unserer Pflicht nachkommen, die Großstadt Windhoek zu sichern und zu verbessern."
 SAF_joint_air_training_scheme:0 "Gemeinsames Lufttrainingsprogramm"
 SAF_joint_air_training_scheme_desc:0 "Die Commonwealth-Staaten bündeln ihre Ressourcen und Erfahrungen, um die Ausbildung von Piloten und Flugpersonal zu erleichtern und zu beschleunigen."
 SAF_desert_equipment:0 "Wüstenausrüstung"
 SAF_desert_equipment_desc:0 "Der Krieg in Nordafrika erfordert Spezialausrüstung, und da unsere Streitkräfte zum Einsatz an dieser Front herangezogen werden könnten, wird die Bereitstellung und Lieferung dieser Ausrüstung zu einer wichtigen logistischen Angelegenheit."
 SAF_suppress_the_stormjaers:0 "Unterdrückt die Stormjaers"
 SAF_suppress_the_stormjaers_desc:0 "Die faschistische, prodeutsche Ossewabrandwag (OB) verfügt über einen paramilitärischen Flügel nach dem Vorbild ähnlicher europäischer Gruppen. Sie behindern die Bemühungen der Regierung, Truppen zu rekrutieren und eine sichere und einheitliche Kriegspolitik zu verfolgen. Die Stormjaers müssen zerschlagen werden."
 SAF_secure_interests_in_africa:0 "Sichere Interessen in Afrika"
 SAF_secure_interests_in_africa_desc:0 "Die Südafrikanischen Union grenzt an eine Reihe britischer Kolonien, die wir verwalten könnten. Wir sollten außerdem alles in unserer Macht Stehende tun, um unser Mandat über Südwestafrika dauerhaft zu sichern."
 SAF_native_laws_amendment_act:0 "Gesetz zur Änderung der Gesetze der Ureinwohner"
 SAF_native_laws_amendment_act_desc:0 "Um der afrikaansen Bevölkerung weiterhin Arbeit zu sichern, müssen wir die Ansiedlung schwarzer Südafrikaner in den Städten begrenzen. Nur diejenigen, die schon lange in der Gemeinde leben, erhalten ein Aufenthaltsrecht."
 SAF_encourage_segregation:0 "Segregation fördern"
 SAF_encourage_segregation_desc:0 "Wir sollten stärker auf eine rechtliche Trennung unserer verschiedenen ethnischen Bevölkerungsgruppen drängen, um die Macht und Einheit unserer herrschenden Klasse zu stärken."
 SAF_abandon_westminster:0 "Verlassen Sie Westminster"
 SAF_abandon_westminster_desc:0 "Die Ersetzung der Kaproute durch die Suezroute sowie die prägenden Erfahrungen des Burenkrieges haben dazu beigetragen, eine südafrikanische Identität zu schaffen, die sich von der unserer Dominion-Verbündeten unterscheidet. Wir sollten uns vom König distanzieren und unseren eigenen Weg gehen."
 SAF_support_the_afrikaner_broederbond:0 "Unterstützen Sie den Afrikaner Broederbond"
 SAF_support_the_afrikaner_broederbond_desc:0 "Der Afrikaaner Broederbond setzt sich für eine stärkere Mitsprache der Afrikaaner und eine stärkere Rassentrennung ein. Die Erinnerung an die britische Politik im Burenkrieg ist noch lebendig, und der Broederbond kann zum Aufbau eines neuen Südafrikas beitragen."
 SAF_support_ossewabrandwag:0 "Unterstützen Sie Ossewabrandwag"
 SAF_support_ossewabrandwag_desc:0 "Die faschistische paramilitärische Ossewabrandwag-Truppe sollte als Bollwerk gegen ausländische Agitation und inländische Aufstände eingesetzt werden, die sich gegen unsere herrschende Klasse richten."
 SAF_celebrate_the_great_trek:0 "Feiern Sie den Großen Treck"
 SAF_celebrate_the_great_trek_desc:0 "Vor einem Jahrhundert trennten sich unsere Afrikaaner-Vorfahren von der aufstrebenden britischen Kolonialmacht und gründeten im Nordosten ihren eigenen Burenstaat. Ihr unerschütterlicher Geist verkörpert noch heute die besten südafrikanischen Tugenden."
 SAF_voortrekker_monument:0 "Voortrekker-Denkmal"
 SAF_voortrekker_monument_desc:0 "Ein Denkmal für die Voortrekker, die den Großen Treck unternahmen, wird den Nationalgeist und die Einheit in diesen schwierigen Zeiten stärken."
 SAF_support_nazification_of_south_west_africa:0 "Unterstützen Sie die Nazifizierung Südwestafrikas"
 SAF_support_nazification_of_south_west_africa_desc:0 "Als ehemalige deutsche Kolonie ist es für uns nur angemessen, die Verbreitung deutscher politischer Ideen in Südwestafrika zu fördern."
 SAF_south_africa_first:0 "Südafrika zuerst"
 SAF_south_africa_first_desc:0 "Südafrika ist die stärkste unabhängige Nation auf dem Kontinent und kann daher ein Leitstern für die Zukunft Afrikas und ehemaliger Kolonien sein."
 SAF_support_the_german_coup:0 "Unterstützen Sie den deutschen Putsch"
 SAF_support_the_german_coup_desc:0 "Die deutsche Regierung betrachtet Südafrika schon seit dem letzten Jahrhundert als fruchtbaren Boden für größeren Einfluss. Unsere Zukunft liegt beim Reich, nicht beim Empire. Lassen Sie uns also den Plan zum Sturz der derzeitigen Regierung vorantreiben."
 SAF_reclaim_boer_colonies:0 "Burenkolonien zurückerobern"
 SAF_reclaim_boer_colonies_desc:0 "Das ehemalige Burengebiet Transvaal und andere Regionen gehören rechtmäßig den freien Erben dieses unternehmungslustigen Volkes."
 SAF_commemorate_the_battle_of_blood_river:0 "Gedenken an die Schlacht am Blood River"
 SAF_commemorate_the_battle_of_blood_river_desc:0 "Im Jahr 1838 wehrte ein Wagenlager burischer Siedler Zehntausende Zulu-Krieger ab und versetzte der Macht der Zulu in Natal damit einen vernichtenden Schlag. Dies war sicherlich ein göttliches Zeichen für die Richtigkeit unserer Sache."
 SAF_german_scientists:0 "Deutsche Wissenschaftler"
 SAF_german_scientists_desc:0 "Deutsche Wissenschaftler gehören zu den besten der Welt und können uns viel mitteilen."
 SAF_support_axis_interests:0 "Unterstützen Sie die Interessen der Achsenmächte"
 SAF_support_axis_interests_desc:0 "Die Achsenmächte verfügen über eine Energie und Ideologie, die Südafrika helfen kann, seinen Platz in der Welt zu behaupten. Wir sollten ihnen unsere volle diplomatische Unterstützung zukommen lassen."
 SAF_a_king_for_our_people:0 "Ein König für unser Volk"
 SAF_a_king_for_our_people_desc:0 "Südafrika sollte einen König haben, und glücklicherweise gibt es einen Windsor, den derzeit niemand benutzt. Der ehemalige Edward VIII., Herzog von Windsor, kann auf unserem Thron sitzen."
 SAF_empower_the_workers:0 "Stärkung der Arbeitnehmer"
 SAF_empower_the_workers_desc:0 "Wir sind ein Land der Bergarbeiter und Bauern. Die arbeitende Bevölkerung Südafrikas ist die einzige wahre Repräsentation des nationalen Willens."
 SAF_support_spain:0 "Support Spanien"
 SAF_support_spain_desc:0 "Der Faschismus ist in Europa auf dem Vormarsch, und wir können ihn in Spanien stoppen – oder zumindest seine Ausbreitung verlangsamen. Männer und Material sollten zur Unterstützung der republikanischen Sache geschickt werden."
 SAF_repeal_the_native_representation_act:0 "Aufhebung des Native Representation Act"
 SAF_repeal_the_native_representation_act_desc:0 "Rassendiskriminierung widerspricht den Werten der Volksrevolution in Südafrika. Schwarze sollten wieder in das allgemeine Wahlregister aufgenommen und mit politischen Rechten ausgestattet werden."
 SAF_burn_the_kings_portraits:0 "Verbrennt die Porträts des Königs"
 SAF_burn_the_kings_portraits_desc:0 "Nieder mit der königlichen Familie! Mit dieser symbolischen Geste erklären wir öffentlich unseren Verzicht auf den ausländischen Thron."
 SAF_join_comintern:0 "Treten Sie der Komintern bei"
 SAF_join_comintern_desc:0 "Die Sowjetunion stand an vorderster Front im Kreuzzug für die Arbeiter und gegen den Faschismus. Wir werden uns ihrem mächtigen Bündnis anschließen."
 SAF_support_the_world_revolution:0 "Unterstützen Sie die Weltrevolution"
 SAF_support_the_world_revolution_desc:0 "Der einzige Weg zum Sieg der Arbeiter besteht darin, den gesamten Globus in einer gemeinsamen Anstrengung zu vereinen. Die Revolution muss universell sein und daher exportiert werden."
 SAF_equal_opportunity_employment:0 "Chancengleichheit bei der Beschäftigung"
 SAF_equal_opportunity_employment_desc:0 "Wenn wir die Lage der Arbeitnehmer in unserem Land verbessern wollen, müssen wir zunächst dafür sorgen, dass alle Arbeitnehmer gleich behandelt werden, unabhängig von ihrer Hautfarbe."
 SAF_demand_madagascar:0 "Nachfrage Madagaskar"
 SAF_demand_madagascar_desc:1 "Angesichts der dramatischen Veränderungen in Europa ist es an der Zeit, das gesamte System des Kolonialismus zu überdenken. Warum sollte Madagaskar an ein untergehendes Imperium gefesselt bleiben?"
 SAF_invite_soviet_advisers:0 "Laden Sie sowjetische Berater ein"
 SAF_invite_soviet_advisers_desc:4 "Wenn wir die Sowjetunion in ihrem Kampf um die Freiheit der Arbeiter der Welt unterstützen wollen, müssen wir unser Militär verbessern, indem wir von ihr lernen."
 SAF_south_african_soviet_research_treaty:0 "Forschungsvertrag mit der UdSSR"
 SAF_south_african_soviet_research_treaty_desc:1 "Nachdem wir von unseren sowjetischen Freunden viele wertvolle Lektionen gelernt haben, ist es an der Zeit, die Beziehungen zu vertiefen und einen formellen Vertrag zu unterzeichnen."
 SAF_anti_colonialist_crusade:0 "Antikolonialistischer Kreuzzug"
 SAF_anti_colonialist_crusade_desc:1 "Der Kolonialismus ist das Herzstück des imperialistischen Systems, das die Arbeiter der Welt unterdrückt. Wir sind in der einzigartigen Lage, dieses System zu zerschlagen und die afrikanische Bevölkerung von der jahrhundertelangen Ausbeutung zu befreien, die sie ertragen musste."
 SAF_Union_of_the_African_People:0 "Union des afrikanischen Volkes"
 SAF_Union_of_the_African_People_desc:1 "Lange Zeit hatten die Menschen Afrikas kein Mitspracherecht bei der Bestimmung ihres eigenen Schicksals. Diese Zeiten sind vorbei. Wir werden eine Fraktion bilden, die stark genug ist, um jedem Versuch der revanchistischen Mächte der Welt standzuhalten, unsere Errungenschaften rückgängig zu machen. Afrika wird frei vom Kolonialismus sein."
 SAF_liberate_portugese:0 "Befreit die portugiesischen Kolonien"
 SAF_liberate_portugese_desc:1 "Die Kolonien Angola und Mosambik liegen direkt an unserer Grenze. Es ist an der Zeit, die Ausbeutung ihrer Bevölkerung zu beenden."
 SAF_liberate_british:0 "Befreien Sie britische Kolonien"
 SAF_liberate_british_desc:1 "Das Britische Empire ist das berüchtigtste Beispiel für Kolonialismus in der Geschichte. Wir werden ihm ein Ende setzen."
 SAF_liberate_belgian:0 "Befreit die belgischen Kolonien"
 SAF_liberate_belgian_desc:1 "Belgisch-Kongo gilt als eines der grausamsten Gebiete der Ausbeutung und Unterdrückung. Wir werden das letzte Kapitel dieser Geschichte schreiben."
 SAF_south_african_railways:0 "Südafrikanische Eisenbahnen"
 SAF_south_african_railways_desc:0 "Die südafrikanische Eisenbahngesellschaft muss ausgebaut werden. Dort können junge Leute ausgebildet werden und die notwendigen Fähigkeiten erwerben, um sowohl im Inland als auch im Ausland zu arbeiten."
 SAF_expand_the_mining_industry:0 "Ausbau der Bergbauindustrie"
 SAF_expand_the_mining_industry_desc:0 "Südafrikas Mineralreichtum ist legendär und wir haben gerade erst begonnen, seine riesigen Gold-, Chrom- und Platinreserven zu erschließen."
 SAF_heavy_engineering:0 "Schwermaschinenbau"
 SAF_heavy_engineering_desc:0 "Es ist wichtig, dass Südafrika stets auf dem neuesten Stand der Technik bleibt. Auch wenn unsere industrielle Basis klein ist, sollten wir in Schwermaschinen und Maschinenbau investieren, um schnell zu unseren Mitbewerbern aufzuschließen."
 SAF_infrastructure_effort:0 "Infrastrukturaufwand"
 SAF_infrastructure_effort_desc:0 "Große Teile Südafrikas sind noch immer ländlich und unterentwickelt. Mehr Straßen und Eisenbahnen könnten die natürlichen Reichtümer des Landes zu seinen hungrigen Häfen bringen."
 SAF_armament_effort:0 "Rüstungsanstrengungen"
 SAF_armament_effort_desc:0 "Südafrika ist vor der Invasion ausländischer Mächte sicher, aber auch weit entfernt von seinen Verbündeten. Es ist von entscheidender Bedeutung, dass das Land seine eigene Rüstungsindustrie aufbaut, damit die Union nie schutzlos dasteht."
 SAF_south_african_steel:0 "Südafrikanischer Stahl"
 SAF_south_african_steel_desc:0 "Wir haben Kohle und Eisen. Jetzt haben wir auch den Grund. Der Ausbau des Iscor-Stahlwerks in Pretoria wird das Land mit den für moderne Waffen notwendigen schweren Stahlplatten versorgen."
 SAF_pretoria_arms:0 "Pretoria Arms"
 SAF_pretoria_arms_desc:0 "Das bestehende Stahlwerk in Pretoria hat sich auf die Produktion von Grobblechen spezialisiert. Mit einigen Werkzeugmaschinen können wir jedoch einen Teil der Fabrik in ein Zentrum für die Produktion von Kleinwaffen umwandeln."
 SAF_expand_the_rand_mines:0 "Erweitern Sie die Rand-Minen"
 SAF_expand_the_rand_mines_desc:0 "Die Rand-Minen gehören zu den tiefsten Goldminen der Welt – und das sogar mit der Technologie des 19. Jahrhunderts. Heute sind wir zu so viel mehr fähig. Graben Sie tief! Und gierig sogar."
 SAF_fund_the_university_of_south_africa:0 "Finanzieren Sie die Universität von Südafrika"
 SAF_fund_the_university_of_south_africa_desc:0 "Die University of South Africa in Pretoria ist eine der besten Universitäten des Kontinents – sogar der südlichen Hemisphäre. Indem wir in sie investieren, können wir unsere eigenen Talente vor Ort fördern, anstatt unsere jungen Leute ins Ausland zu schicken."
 SAF_establish_the_atomics_energy_board:0 "Gründung des Atomenergie-Gremiums"
 SAF_establish_the_atomics_energy_board_desc:0 "Atomwaffen werden der größte militärische Durchbruch seit der Erfindung des Schießpulvers sein, ganz zu schweigen von der friedlichen Nutzung dieser Macht, wenn es uns gelingt, das Atom nutzbar zu machen. Versammeln Sie unsere Spitzenwissenschaftler, um dies zu untersuchen."
 SAF_the_cape_defense_institute:0 "Das Cape Defense Institute"
 SAF_the_cape_defense_institute_desc:0 "Da Südafrika nun ein vollständig souveräner Staat ist, haben wir keinen Zugriff mehr auf fortschrittliche Prototypen und Baupläne wie früher. Wir müssen sicherstellen, dass wir unseren Feinden immer einen Schritt voraus sind und technologisch nicht zurückfallen."
 SAF_defense_collaboration_initiative:0 "Initiative zur Zusammenarbeit im Verteidigungsbereich"
 SAF_defense_collaboration_initiative_desc:0 "Die Briten haben uns gezeigt, wie vorteilhaft es ist, wissenschaftliche Fortschritte unter engen Verbündeten zu teilen. Unsere gesamte Fraktion wird in der Lage sein, Forschung und Entwicklung im Krieg effizienter durchzuführen, wenn wir die notwendigen Schritte unternehmen, um dies zu koordinieren."
 SAF_special_service_battalion:0 "Spezialdienstbataillon"
 SAF_special_service_battalion_desc:0 "Südafrika ist voller junger, arbeitsloser Männer, die eine sinnvolle Beschäftigung suchen. Das Special Service Battalion wird ihnen die dringend benötigte Disziplin und Organisation vermitteln."
 SAF_improve_the_three_oh_three:0 "Verbessern Sie die Drei-Null-Drei"
 SAF_improve_the_three_oh_three_desc:0 "Südafrikas Truppen werden in unterschiedlichsten Klimazonen kämpfen, und wir haben das Glück, dass sich das Lee-Enfield-Gewehr leicht anpassen lässt. Die .303-Patrone wurde von anderen Ländern mehrfach an ihre Bedürfnisse angepasst."
 SAF_q_services_corps:0 "Q-Services-Korps"
 SAF_q_services_corps_desc:0 "Das Q Services Corps wird die zentrale Behörde sein, die für die Logistik und Versorgung der stehenden Armee verantwortlich ist. Es wird sich um die Verteilung von Öl, Verpflegung, Munition und Uniformen kümmern."
 SAF__south_african_military_college:0 "Südafrikanisches Militärcollege"
 SAF__south_african_military_college_desc:0 "Südafrika sollte eine Militärakademie nach dem Vorbild von West Point in den USA haben. Dadurch erhalten wir ein professionelles Offizierskorps, das der Union treu ergeben ist."
 SAF_expand_the_south_african_artillery:0 "Ausbau der südafrikanischen Artillerie"
 SAF_expand_the_south_african_artillery_desc:0 "Das Artilleriekorps wurde 1934 vereinigt. Nun ist es an der Zeit, seine Größe und Kapazität zu erhöhen."
 SAF_sa_engineer_corps:0 "SA-Pionierkorps"
 SAF_sa_engineer_corps_desc:0 "Das südafrikanische Pionierkorps verfügt über kaum 600 uniformierte Soldaten. Das ist in einer modernen Armee inakzeptabel. Für diese wichtige Aufgabe brauchen wir mehr Soldaten und eine bessere Ausbildung."
 SAF_equipment_effort:0 "Geräteaufwand"
 SAF_equipment_effort_desc:0 "Wir dürfen die Versorgung unserer Armee mit der notwendigen Ausrüstung nicht vernachlässigen. Waffen und Panzer sind gut und schön, aber wir brauchen Uniformen, Funkgeräte, Reparatursets und mehr."
 SAF_south_african_special_forces:0 "Südafrikanische Spezialeinheiten"
 SAF_south_african_special_forces_desc:0 "Südafrika braucht eine einheimische Kommandotruppe, um diese schwierigen Aufgaben an schwer zugänglichen Orten zu bewältigen."
 SAF_mechanization_effort:0 "Mechanisierungsbemühungen"
 SAF_mechanization_effort_desc:0 "Der motorisierte und mechanisierte Krieg steht uns bevor. Der Große Treck der Zukunft wird von Ketten- und Radfahrzeugen geführt."
 SAF_armor_effort:0 "Rüstungsaufwand"
 SAF_armor_effort_desc:0 "Panzer haben seit den trägen Bestien des letzten Krieges eine lange Entwicklung durchgemacht. Unsere Forschung und Ausbildung dürfen nicht hinter denen unserer Feinde – oder unserer Freunde – zurückbleiben."
 SAF_commit_to_the_five_year_plan:0 "Verpflichten Sie sich zum Fünfjahresplan"
 SAF_commit_to_the_five_year_plan_desc:0 "Wir haben einen Fünfjahresplan für die Modernisierung und den Ausbau der südafrikanischen Luftwaffe entwickelt. Die Regierung muss sich öffentlich dazu verpflichten, diesen Zeitplan einzuhalten."
 SAF_improve_the_hawker_hartbees:0 "Verbessern Sie die Hawker Hartbees"
 SAF_improve_the_hawker_hartbees_desc:0 "Unsere Hawker Hartbees gehören zwar nicht zu den modernsten Kampfflugzeugen der Welt, aber wir werden damit klarkommen. Mit verbesserter Mechanik und Training holen wir das Beste aus diesen Doppeldeckern heraus."
 SAF_replace_the_blenheim:0 "Ersetzen Sie den Blenheim"
 SAF_replace_the_blenheim_desc:0 "Die Bristol Blenheim war für die RAF und die Dominions ein brauchbarer leichter Bomber. Doch nun ist es vielleicht an der Zeit, etwas Robusteres mit größerer Reichweite zu finden."
 SAF_perfect_the_cab_rank_technique:0 "Perfektionieren Sie die „Cab-Rank“-Technik"
 SAF_perfect_the_cab_rank_technique_desc:0 "Bei der „Cab-Rank“-Technik greifen mehrere Bomber in einer langen Reihe nacheinander ein Ziel an. Dies hält den Druck auf den Feind aufrecht, erfordert aber viel Geschick."
 SAF_desert_air_force:0 "Wüstenluftwaffe"
 SAF_desert_air_force_desc:0 "Der Wüstenhimmel ist klar, und Hitze und Sand erfordern besondere Aufmerksamkeit für die Mechanik unserer Flugzeuge. In dieser unerbittlichen Umgebung können wertvolle Fähigkeiten erlernt werden."
 SAF_secure_the_cape_sea_route:0 "Sicherung der Kapseeroute"
 SAF_secure_the_cape_sea_route_desc:0 "Sollte der Suezkanal fallen, wird das Kap erneut das Tor zum Osten sein. Verteidigen Sie es um jeden Preis."
 SAF_retain_experienced_pilots:0 "Halten Sie erfahrene Piloten"
 SAF_retain_experienced_pilots_desc:0 "Zu oft wechseln unsere erfahrenen Piloten zur Royal Air Force, anstatt bei unseren eigenen Streitkräften zu bleiben. Die RAF bietet bessere Aufstiegs- und Kampfchancen. Wir sollten jedoch versuchen, unsere ausgebildeten Piloten in der Nähe ihrer Heimat zu halten, wo sie andere Südafrikaner inspirieren und ausbilden können."
 SAF_seaward_defence_force:0 "Seaward-Verteidigungsstreitkräfte"
 SAF_seaward_defence_force_desc:0 "Die Seaward Defense Force dient seit zwei Jahrzehnten als unsere Marine. Ihre Mittel sollten aufgestockt werden."
 SAF_protect_the_trade:0 "Schützen Sie den Handel"
 SAF_protect_the_trade_desc:0 "Der letzte Krieg hat gezeigt, wie wichtig Konvois und Eskorten sind. Südafrika liegt an einer wichtigen Handelsroute und sollte dafür sorgen, dass die Waren ihr Ziel erreichen."
 SAF_disrupt_the_trade:0 "Den Handel stören"
 SAF_disrupt_the_trade_desc:0 "Der letzte Krieg hat gezeigt, wie wichtig Konvois und Eskorten sind. Südafrika liegt an einer wichtigen Handelsroute und ist ideal gelegen, um feindliche Schiffe abzufangen und zu zerstören."
 SAF_expand_the_simons_town_base:0 "Erweitern Sie die Simon&#39;s Town-Basis"
 SAF_expand_the_simons_town_base_desc:0 "Simon’s Town am Kap ist seit den 1790er Jahren der wichtigste Marinestützpunkt im südlichen Afrika. Er sollte umgerüstet und erweitert werden, um mehr und größere Schiffe aufnehmen zu können."
 SAF_anti_submarine_tactics:0 "U-Boot-Abwehrtaktiken"
 SAF_anti_submarine_tactics_desc:0 "U-Boote bedrohen die Schiffe, die das Kap der Guten Hoffnung passieren. Wir müssen sie finden und zerstören."
 SAF_submarine_warfare:0 "U-Boot-Krieg"
 SAF_submarine_warfare_desc:0 "Feindliche Handelskonvois nutzen weiterhin die Passage durch das Kap der Guten Hoffnung. Wir werden sie von unten angreifen."
 SAF_prepare_overseas_offensive:0 "Überseeoffensive vorbereiten"
 SAF_prepare_overseas_offensive_desc:0 "Mit seiner kilometerlangen Küste ist Südafrika bestens dafür geeignet, seine Soldaten im amphibischen Krieg auszubilden. Dies ist eine der schwierigsten Fähigkeiten, aber unsere Jungs schaffen das."
 SAF_strengthen_the_cape_garrison_artillery:0 "Verstärken Sie die Artillerie der Kapgarnison"
 SAF_strengthen_the_cape_garrison_artillery_desc:0 "Die Geschütze der Kapgarnison müssen aufgerüstet und verstärkt werden, um das Kap vor feindlichen Angriffen zu schützen."
 SAF_civil_war_tt:1 "Es wird ein Bürgerkrieg zwischen faschistischen Nationalisten in Südwestafrika und demokratischen Unionisten im Rest des Landes ausbrechen."
 SAF_german_research_tt:0 "Wir werden mit Deutschland ein Abkommen zum Technologieaustausch schließen."
 scw_in_progress_tt:0 "Spanien befindet sich in einem Bürgerkrieg."
 NZL_transfer_the_new_zealand_division:0 "Übertragen Sie die neuseeländische Division"
 NZL_transfer_the_new_zealand_division_desc:0 "Die 2. neuseeländische Division wurde für den Einsatz mobilisiert. Wir sollten sie daher dorthin schicken, wo gekämpft wird. Die neuseeländische Division aus dem Ersten Weltkrieg war im Mittelmeer stationiert, und die neue Division wird dies ebenfalls tun."
 NZL_form_the_rnzn:0 "Bilden Sie die RNZN"
 NZL_form_the_rnzn_desc:0 "Unsere einst kleine Küstenpatrouille ist inzwischen auf Schiffe angewachsen, die unabhängig von der Aufsicht der Royal Navy operieren können. Neuseeland wird seine eigene Marine haben."
 NZL_expand_devonport_naval_base:0 "Erweiterung des Marinestützpunkts Devonport"
 NZL_expand_devonport_naval_base_desc:0 "Der Marinestützpunkt Devonport wird das Hauptquartier unserer Marine sein, muss jedoch erweitert werden, um den neuen Anforderungen eines totalen Krieges gerecht zu werden."
 NZL_coastal_defense:0 "Küstenverteidigung"
 NZL_coastal_defense_desc:0 "Neuseeland ist ein Inselstaat, weit entfernt von Feinden, daher müssen wir auf amphibische Angriffe entlang unserer Küsten vorbereitet sein."
 NZL_destroyer_effort:0 "Zerstörer-Anstrengung"
 NZL_destroyer_effort_desc:0 "Angesichts unserer kleinen Industriebasis sind Zerstörer für Neuseeland die effizienteste Möglichkeit, seine Seemacht zu demonstrieren. Sie patrouillieren die Küsten, fangen U-Boote ab und stellen Frühwarnposten auf."
 NZL_submarine_effort:0 "U-Boot-Anstrengungen"
 NZL_submarine_effort_desc:0 "Da jede Invasion über das Meer erfolgen muss, können die Wölfe des Ozeans eine starke Verteidigungslinie bilden. Eine U-Boot-Flotte kann unsere Seewege schützen, indem sie heimlich und im Rudel jagt."
 NZL_light_cruiser_effort:0 "Leichter Kreuzer-Einsatz"
 NZL_light_cruiser_effort_desc:0 "Mittelgroße Schiffe sind für eine mittelgroße Macht angemessen. Leichte Kreuzer können ordentlich zuschlagen, sind aber schnell genug, um bei Bedarf größeren Gefechten zu entgehen."
 NZL_capital_ship_effort:0 "Großkampfschiff-Anstrengung"
 NZL_capital_ship_effort_desc:0 "Wenn Neuseeland eine erstklassige Marine haben will, muss es auch über erstklassige Schiffe verfügen. Wir müssen in Schlachtschiffe und schwere Kreuzer investieren."
 NZL_expand_the_nzpaf:0 "Erweitern Sie die NZPAF"
 NZL_expand_the_nzpaf_desc:0 "Die neuseeländische Luftwaffe benötigt neue Küstenpatrouillenboote und Marinebomber. Moderne Nationen können den Luftkrieg nicht vernachlässigen,"
 NZL_form_the_rnzaf:0 "Bilden Sie die RNZAF"
 NZL_form_the_rnzaf_desc:0 "Es ist an der Zeit, die Luftwaffe von den anderen Waffengattungen unabhängig zu machen. Die Royal New Zealand Air Force wird über eine eigene Kommandostruktur verfügen, aber eng mit der Royal Air Force zusammenarbeiten."
 NZL_fighter_focus:0 "Kämpferfokus"
 NZL_fighter_focus_desc:0 "Kampfflugzeuge sind wirksam beim Abfangen und Eskortieren von Bombern, die für unsere Verbündeten die entscheidende Waffe sein werden."
 NZL_bomber_focus:0 "Bomberfokus"
 NZL_bomber_focus_desc:0 "Leichte Bomber können unsere Küsten wirksam schützen und werden im Kampf gegen unsere Feinde in Übersee benötigt."
 NZL_defend_our_islands:0 "Verteidige unsere Inseln"
 NZL_defend_our_islands_desc:0 "Wir müssen auf Angriffe auf unser Inselparadies vom Meer aus vorbereitet sein. Marinebomber können Landungsboote abfangen und angreifen oder sogar Großkampfschiffe ins Visier nehmen."
 NZL_modern_fighters:0 "Moderne Kämpfer"
 NZL_modern_fighters_desc:0 "Es ist an der Zeit, unsere Kampfflugzeuge auf schnellere Maschinen mit größerer Reichweite umzustellen. Unsere Verbündeten haben mit einigen der modernsten Flugzeuge, die die Welt je gesehen hat, den Weg gewiesen."
 NZL_heavy_bombers:0 "Schwere Bomber"
 NZL_heavy_bombers_desc:0 "Der Krieg kann nur gewonnen werden, wenn man das Herz des feindlichen Heimatlandes trifft. Schwere Bomber sind notwendig, um feindlichen Fabriken und Städten einen verheerenden Schlag zu versetzen."
 NZL_national_roads_board:0 "Nationales Straßenamt"
 NZL_national_roads_board_desc:0 "Neuseelands unwegsames Gelände hat den Bau eines zusammenhängenden Straßensystems erschwert. Wir müssen jedoch das bestehende System verbessern. Ein Autobahnsystem muss erforscht, Straßen gepflastert und neue Wege durch die Berge angelegt werden."
 NZL_new_zealand_steel:0 "Neuseeländischer Stahl"
 NZL_new_zealand_steel_desc:0 "Neuseeland ist mit reichlich Eisensandvorkommen gesegnet, insbesondere auf der Nordinsel. Um aus diesem Sand Erz zu gewinnen, bedarf es eines speziellen Verfahrens. Doch dieser Sand kann noch viele Jahre lang als Grundstein unserer Stahlindustrie dienen."
 NZL_taranaki_oil:0 "Taranaki-Öl"
 NZL_taranaki_oil_desc:0 "Die Region Taranaki auf der Nordinsel ist reich an Mineralien und Erdöl. Unternehmer haben versucht, diese Ölreserven auszubeuten, doch es bedarf weiterer Investitionen in Raffinerien und Bohrungen."
 NZL_wairarapa_sheep_farms:0 "Wairarapa Schaffarmen"
 NZL_wairarapa_sheep_farms_desc:0 "Die Wollindustrie von Wairarapa ist einer der Eckpfeiler der neuseeländischen Wirtschaft. Mit dem Ende der Weltwirtschaftskrise wird die Nachfrage nach unserer Wolle steigen."
 NZL_bureau_of_industry:0 "Büro der Industrie"
 NZL_bureau_of_industry_desc:0 "Neuseeland ist eine Agrargesellschaft mit Schwerpunkt auf der Viehzucht. Das Bureau of Industry muss große Investitionen in die Infrastruktur und die Produktion fördern."
 NZL_department_of_scientific_and_industrial_research:0 "Abteilung für wissenschaftliche und industrielle Forschung"
 NZL_department_of_scientific_and_industrial_research_desc:0 "Die anderen Commonwealth- und Dominion-Staaten investieren in wissenschaftliche und industrielle Forschung, also sollten wir das Gleiche tun."
 NZL_industrial_conscription:0 "Industrielle Wehrpflicht"
 NZL_industrial_conscription_desc:0 "Es gibt keinen Grund, warum ein arbeitsfähiger Mann nicht in den Streitkräften dienen oder in einer kriegsrelevanten Industrie arbeiten sollte. Unsere neuen Gesetze werden dafür sorgen, dass jeder in den Dienst der Mobilisierung und Produktion gestellt wird."
 NZL_think_big:0 "Denken Sie groß"
 NZL_think_big_desc:0 "Wir haben uns daran gewöhnt, uns als kleineres Dominion zu betrachten als unsere australischen oder kanadischen Verbündeten. Doch Neuseeland ist durchaus in der Lage, industrielle Größe zu erreichen."
 NZL_project_seal:0 "Projektsiegel"
 NZL_project_seal_desc:0 "Das Projekt Seal ist eine neue Initiative der Amerikaner zur Entwicklung einer Waffe, die Tsunamis auslösen und so unsere Feinde überwältigen kann. Die Entwicklung der abprallenden Bombe ist zwar etwas fantasievoll, aber vielversprechend."
 NZL_national_defense_institute:0 "Nationales Verteidigungsinstitut"
 NZL_national_defense_institute_desc:0 "Da Neuseeland nun ein vollständig souveräner Staat ist, haben wir keinen Zugriff mehr auf fortschrittliche Prototypen und Baupläne wie früher. Wir müssen sicherstellen, dass wir unseren Feinden immer einen Schritt voraus sind und technologisch nicht ins Hintertreffen geraten."
 NZL_expand_the_university_of_auckland:0 "Erweitern Sie die University of Auckland"
 NZL_expand_the_university_of_auckland_desc:0 "Die Universität Auckland ist unsere wichtigste postsekundäre Bildungseinrichtung. Durch den Ausbau ihrer Einrichtungen können wir versuchen, einige unserer besten Köpfe hier zu Hause zu halten."
 NZL_army_reforms:0 "Armeereformen"
 NZL_army_reforms_desc:0 "Wir sollten das Ausbildungs- und Beförderungssystem unserer Armee modernisieren. Auf diese Weise sind wir auf alles vorbereitet, was in der anhaltenden Weltkrise passieren kann."
 NZL_charlton_automatic_rifle:0 "Charlton-Automatikgewehr"
 NZL_charlton_automatic_rifle_desc:0 "Einer unserer Bürger hat das Standardgewehr von Lee Enfield zu einer vollautomatischen Waffe umgebaut. Das ist neuseeländischer Einfallsreichtum in seiner besten Form, und wir sollten Innovationen in dieser Richtung fördern."
 NZL_bob_semple_tank:0 "Bob Semple Tank"
 NZL_bob_semple_tank_desc:1 "Warum sollte Neuseeland keinen eigenen Panzer haben? Das Bauministerium in Temuka entwickelt einen leichten Panzer, der nur mit Maschinengewehren bewaffnet ist. Selbst wenn wir nie über einen Prototyp hinauskommen, werden die Erfahrungen, die wir sammeln, von unschätzbarem Wert sein."
 NZL_domestic_arms_industry:0 "Inländische Rüstungsindustrie"
 NZL_domestic_arms_industry_desc:0 "Wir sollten so viele Industrien wie möglich auf die Produktion von Kleinwaffen umstellen. Wir brauchen Munition, Waffenteile, Hilfsausrüstung und so weiter. Diese können im Inland hergestellt werden."
 NZL_schofield_tank:0 "Schofield-Panzer"
 NZL_schofield_tank_desc:0 "Wenn der Semple-Panzer unsere Anforderungen nicht erfüllt, könnte vielleicht ein Panzer mit einer richtigen Kanone die Lösung sein. Das kombinierte Rad-/Kettensystem ist originell und könnte uns zu neuen Erkenntnissen im Panzerdesign führen."
 NZL_long_range_patrol:0 "Langstreckenpatrouille"
 NZL_long_range_patrol_desc:0 "Die Long Range Patrol soll weite Gebiete in Nordafrika abdecken. Diese Aufklärungs- und Kommandoeinheit wird Spezialmissionen in einigen der rauesten Klimazonen der Welt durchführen."
 NZL_artillery_focus:0 "Artillerie-Fokus"
 NZL_artillery_focus_desc:0 "Artillerie ist für die Unterstützung jeder Vorwärtsbewegung unserer Infanterie von entscheidender Bedeutung. Erweitern Sie die Forschung im Bereich Ballistik und Geschütze mit größerem Lauf."
 NZL_big_bob_tank:0 "Big Bob Panzer"
 NZL_big_bob_tank_desc:0 "Die Schlachtfelder Europas verlangen nach schwererer Panzerung, um mit den Superpanzern unserer Feinde mithalten zu können. Der Big Bob ist Neuseelands Beitrag zu diesem Entwicklungsprojekt."
 NZL_research_collaboration:0 "Forschungskooperationen"
 NZL_research_collaboration_desc:0 "Die Briten haben uns gezeigt, wie vorteilhaft es ist, wissenschaftliche Fortschritte unter engen Verbündeten zu teilen. Unsere gesamte Fraktion wird in der Lage sein, Forschung und Entwicklung im Krieg effizienter durchzuführen, wenn wir die notwendigen Schritte unternehmen, um dies zu koordinieren."
 NZL_the_first_labor_government:0 "Die erste Labour-Regierung"
 NZL_the_first_labor_government_desc:0 "Die First Labour-Regierung Neuseelands hat die Möglichkeit, eine fortschrittliche soziale und wirtschaftliche Agenda zu verfolgen. Industrieregulierung, Arbeitnehmerrechte, Sozialgesetze und Lohnregeln stehen auf der Tagesordnung."
 NZL_ratana_alliance:0 "Ratana-Allianz"
 NZL_ratana_alliance_desc:0 "Ein Bündnis mit der Ratana-Bewegung wird neuseeländische Maori in die Regierung bringen und hoffentlich dazu beitragen, einige der Wunden der britischen Eroberung zu heilen."
 NZL_maori_affairs_act:0 "Gesetz über die Angelegenheiten der Maori"
 NZL_maori_affairs_act_desc:0 "Ein Großteil des Landes im Besitz der Maori ist wirtschaftlich unproduktiv. Wenn wir es konsolidieren und mehr davon unter staatliche Kontrolle bringen können, können wir diese unfruchtbaren Gebiete in fruchtbare Industrie- und Handelsstandorte verwandeln."
 NZL_social_security_act:0 "Sozialversicherungsgesetz"
 NZL_social_security_act_desc:0 "Die Arbeitslosen Neuseelands müssen versorgt werden, bis sich die Wirtschaft erholt und mehr Arbeitsplätze geschaffen werden. 1935 gab es bereits ein Weihnachtsgeld, doch jetzt ist es an der Zeit, ein angemessenes soziales Sicherheitsnetz für alle Bürger zu schaffen."
 NZL_the_manpower_act:0 "Das Arbeitsgesetz"
 NZL_the_manpower_act_desc:0 "Seit Kriegsbeginn sind die Maori in großer Zahl in die Städte gekommen. Der Manpower Act ermöglicht es uns, diese Energie in neuseeländische Fabriken zu lenken."
 NZL_amend_the_maori_affairs_act:0 "Änderung des Maori Affairs Act"
 NZL_amend_the_maori_affairs_act_desc:0 "Wir müssen das Maori Affairs Act ändern, damit es die Produktivität ungenutzter Ländereien steigert, ohne unsere Maori-Bürger unnötig zu vertreiben."
 NZL_waitangi_tribunal:0 "Waitangi-Tribunal"
 NZL_waitangi_tribunal_desc:0 "Die Briten in Neuseeland sollten sich mit dem auseinandersetzen, was ihre Vorfahren getan haben, um die Maori Neuseelands zu vertreiben, zu stören und zu marginalisieren. Blutige Kriege, Landnahmen und die Missachtung natürlicher Rechte. Die Anerkennung dieses Erbes ist ein Schritt zur Heilung."
 NZL_maori_conscription:0 "Wehrpflicht der Maori"
 NZL_maori_conscription_desc:0 "Der Mut und die Heldenhaftigkeit des Maori-Bataillons der Expeditionstruppe sind ein Zeichen dafür, dass wir das Beste aus unserer gesamten Bevölkerung machen sollten, indem wir auch die widerstrebenden Maori zum Dienst einziehen."
 NZL_maori_volunteers:0 "Maori-Freiwillige"
 NZL_maori_volunteers_desc:0 "Um ihren Patriotismus zu zeigen, melden sich Hunderte Maori freiwillig zum Dienst in der neuseeländischen Armee."
 NZL_strengthen_the_commonwealth:0 "Stärkung des Commonwealth"
 NZL_strengthen_the_commonwealth_desc:0 "Als kleineres Dominion ist es wichtig, eng mit unseren Freunden und unserer Familie verbunden zu bleiben. Wir werden unsere Bindungen zu unseren britischen Nachbargebieten stärken."
 NZL_statute_of_westminster:0 "Statut von Westminster"
 NZL_statute_of_westminster_desc:0 "Das Statut von Westminster verleiht uns größere Unabhängigkeit unter der Krone, während es uns gleichzeitig innerhalb des Empires hält."
 NZL_2nzef:0 "2NZEF"
 NZL_2nzef_desc:0 "Trotz der Schrecken des letzten Krieges ist Neuseeland bereit, erneut zu marschieren. Die 2. neuseeländische Expeditionstruppe wird gerade aufgestellt."
 NZL_arrest_pacifist_leaders:0 "Verhaftung pazifistischer Führer"
 NZL_arrest_pacifist_leaders_desc:0 "Jetzt ist nicht die Zeit für Zwietracht im Land. Jeder muss sich darauf konzentrieren, den Krieg zu gewinnen. Und wenn das bedeutet, jeden festzunehmen, der sich gegen den Krieg ausspricht, dann werden wir das tun."
 NZL_technology_sharing_with_britain:0 "Technologieaustausch mit Großbritannien"
 NZL_technology_sharing_with_britain_desc:0 "Großbritanniens wissenschaftliche und industrielle Basis übertrifft unsere bei weitem, aber da wir eine Familie sind, sind sie bereit, ihr Wissen mit uns zu teilen."
 NZL_the_lee_affair:0 "Die Lee-Affäre"
 NZL_the_lee_affair_desc:0 "John Lee, Abgeordneter für Grey Lynn, sorgt innerhalb der Labour-Fraktion für Unruhe. Er propagiert eine radikalere Agenda statt des vorsichtigen Kurses, den wir einschlagen. Es müssen Maßnahmen ergriffen werden, um seinen Aufstand zu unterdrücken."
 NZL_empower_the_working_class:0 "Stärkung der Arbeiterklasse"
 NZL_empower_the_working_class_desc:0 "Labour hat sich seit seiner Gründung für die Arbeiterklasse eingesetzt, und viele unserer Führungspersönlichkeiten stammen aus der Arbeiterklasse. Setzen wir uns für einen umfassenderen Schutz und mehr Macht für die Gewerkschaften ein."
 NZL_join_comintern:0 "Treten Sie der Komintern bei"
 NZL_join_comintern_desc:0 "Es ist an der Zeit, mit unseren sozialistischen Brüdern ein Bündnis zu schließen. Durch die Komintern werden wir das Arbeiterparadies verwirklichen."
 NZL_technology_sharing_with_soviet_union:0 "Technologieaustausch mit der Sowjetunion"
 NZL_technology_sharing_with_soviet_union_desc:0 "Viele der weltweit führenden Wissenschaftler und Technologie-Innovatoren stammen aus der Sowjetunion. Sie sind großzügig genug, ihr Wissen mit uns, ihren Waffenbrüdern, zu teilen."
 NZL_in_the_darkness:0 "In der Dunkelheit"
 NZL_in_the_darkness_desc:0 "Die demokratischen Systeme unseres Mutterlandes sind von Natur aus verdorben. Wahre Stärke kann nicht durch Kompromisse demonstriert werden."
 NZL_befriend_japan:0 "Befreunde dich mit Japan"
 NZL_befriend_japan_desc:0 "Als pazifischer Staat liegt es in unseren Sicherheitsinteressen, auf der Seite der stärksten Macht in der Region zu stehen. Japan und seine mächtigen Marinen können uns vor den Gefahren der Welt schützen."
 NZL_rule_them_all:0 "Beherrsche sie alle"
 NZL_rule_them_all_desc:0 "Die antipodischen Nationen des Südpazifiks sollten eine vereinte Macht sein. Australien sollte erwägen, sich unserem überlegenen Ethos zu unterwerfen."
 NZL_technology_sharing_with_japan:0 "Technologieaustausch mit Japan"
 NZL_technology_sharing_with_japan_desc:0 "Japan verfügt über viele der weltweit führenden Wissenschaftler und Technologie-Innovatoren. Sie sind großzügig genug, ihr Wissen mit uns, ihren Waffenbrüdern, zu teilen."
 NZL_constitution_amendment_act:0 "Verfassungsänderungsgesetz"
 NZL_constitution_amendment_act_desc:0 "Für Neuseeland ist es an der Zeit, über eine Abspaltung von der britischen Vorherrschaft nachzudenken. Wir werden unsere Verfassung ändern, um mehr Kontrolle über unsere eigenen Angelegenheiten zu erlangen."
 NZL_independent_new_zealand:0 "Unabhängiges Neuseeland"
 NZL_independent_new_zealand_desc:0 "Wir sind jetzt eine Republik! Neuseeland schuldet dem Vereinigten Königreich nichts außer der Dankbarkeit, die jedes Kind seiner Mutter für die sichere Erziehung schuldet. Aber wir müssen das sichere Nest des Commonwealth verlassen und die Welt mit unseren eigenen Interessen im Blick betrachten."
 NZL_transfer_ships_tt:0 "[ENG.GetNameDefCap] überträgt uns §Y2 Leichte Kreuzer§!."
 RAJ_provincial_elections:0 "Provinzwahlen"
 RAJ_provincial_elections_desc:0 "Das neue Government of India Act schreibt Wahlen in den Provinzen vor und schafft damit ein gewisses Maß an lokaler Regierung, die der indischen Bevölkerung gegenüber verantwortlich ist. Wir werden sehen, welche Auswirkungen dies auf die britische Herrschaft hat."
 RAJ_swaraj:0 "Swaraj"
 RAJ_swaraj_desc:0 "Gandhis Konzept der Selbstverwaltung – Swaraj – erfreut sich in ganz Indien zunehmender Beliebtheit. Es befürwortet einen völligen Bruch mit britischen Institutionen und Bräuchen. Swaraj-Gruppen demonstrieren an indischen Schulen."
 RAJ_indian_national_congress:0 "Indischer Nationalkongress"
 RAJ_indian_national_congress_desc:0 "Der Indische Nationalkongress war bei Wahlen auf dem gesamten Subkontinent sehr erfolgreich. Er ist eine starke Stimme für ein unabhängiges Indien oder zumindest für ein Land mit größerer Autonomie innerhalb des Imperiums."
 RAJ_quit_india_movement:0 "Quit India-Bewegung"
 RAJ_quit_india_movement_desc:0 "Gandhis Kampagne für die Unabhängigkeit Indiens erreichte mit dem Aufruf an die Briten, Indien zu verlassen, ihren Höhepunkt. Es ist unvorstellbar, dass die Herrschaft Indiens vor Kriegsende endet, doch die Lage vor Ort spitzt sich täglich zu."
 RAJ_all_india_forward_bloc:0 "All India Forward Bloc"
 RAJ_all_india_forward_bloc_desc:0 "Der All India Forward Bloc ist der Ansicht, dass der britische Rückzug aus Indien zu lange dauert. Es muss eine stärkere, wenn nicht gar militantere Position eingenommen werden."
 RAJ_seek_help_from_soviet:0 "Suchen Sie Hilfe bei der Sowjetunion"
 RAJ_seek_help_from_soviet_promised:0 " Die Sowjetunion versprach ihre Hilfe"
 RAJ_seek_help_from_soviet_desc:0 "Die Sowjetunion stellt das natürliche Gegengewicht zur imperialen Macht Großbritanniens dar. Sie behauptet, sie sei der Motor der Revolution, und wir sollten sie ermutigen, ihre Revolution nach Indien zu exportieren."
 RAJ_indian_peoples_army:0 "Indische Volksarmee"
 RAJ_indian_peoples_army_effect:0 "Die kommunistischen Anhänger beginnen einen Bürgerkrieg für die Freiheit. Das Ausmaß hängt von der Unterstützung der Partei und dem Fortschritt der Autonomie ab. "
 RAJ_indian_peoples_army_support:0 "[SOV.GetNameDefCap] wird ihre Sache unterstützen."
 RAJ_indian_peoples_army_desc:0 "Wir sollten eine Streitmacht organisieren, die von der kommunistischen Sache lernt und mit ihr verbündet ist."
 RAJ_research_city_excursions:0 "Forschungsstadt-Exkursionen"
 RAJ_research_city_excursions_desc:0 "Sowjetische Forschungsstädte sind ein Wunder, und Indiens Bevölkerung ist voller tatkräftiger und intelligenter Köpfe. Wenn wir unsere jungen Ingenieure in diese Städte schicken, können wir eine heimische Forschungs- und Industriebasis aufbauen."
 RAJ_combined_arms_academy:0 "Kombinierte Waffenakademie"
 RAJ_combined_arms_academy_desc:0 "Die sowjetische Militärausbildung kann durch die neue Combined Arms Academy effizienter gestaltet werden. Wir können uns auf den neuesten Stand der modernen Kriegsführung mit Luft-, Land- und Seestreitkräften bringen."
 RAJ_rani_of_jhans:0 "Rani von Jhansi"
 RAJ_rani_of_jhans_desc:0 "Rani von Jhansi war eine große Heldin der indischen Revolution von 1857. Ihr Beispiel an Tapferkeit und Nationalstolz ist ein Vorbild für alle Frauen Indiens, die zu den Waffen greifen und ein eigenes Regiment gründen wollen."
 RAJ_rebuilding_the_nation:0 "Wiederaufbau der Nation"
 RAJ_rebuilding_the_nation_desc:0 "Nachdem der imperiale Unterdrücker vertrieben und die indische Bevölkerung zum Handeln mobilisiert wurde, ist es an der Zeit, den Schaden zu beheben, der durch zwei Jahrhunderte Besatzung entstanden ist."
 RAJ_seek_help_from_germany:0 "Suchen Sie Hilfe aus Deutschland"
 RAJ_seek_help_from_germany_promised:0 " Das Deutsche Reich sagte seine Hilfe zu"
 RAJ_seek_help_from_germany_desc:0 "Deutschland hat uns nie so geschadet wie Großbritannien, und das Reich stellt die größte Herausforderung für die britische Macht dar. Wir sollten uns den Achsenmächten annähern."
 RAJ_indian_national_army:0 "Indische Nationalarmee"
 RAJ_indian_national_army_effect:0 "Die Anhänger des Faschismus beginnen einen Bürgerkrieg für die Freiheit. Das Ausmaß hängt von der Unterstützung der Partei und den Fortschritten bei der Autonomie ab. "
 RAJ_indian_national_army_support:0 "[GER.GetNameDefCap] wird ihre Sache unterstützen."
 RAJ_indian_national_army_desc:0 "Eine indische Nationalarmee, die sich von den britischen Streitkräften unterscheidet, wurde aufgestellt. Wir können sie in Regionen aufbauen, die frei von britischer Einmischung sind, und uns gegen die Alliierten stellen, um der indischen Kolonialmacht indische Arbeitskräfte zu entziehen."
 RAJ_battaglione_azad_hindoustan:0 "Battaglione Azad Hindoustan"
 RAJ_battaglione_azad_hindoustan_desc:0 "Italien hat das Battaglione Azad Hindoustan gegründet, ein Regiment aus ehemaligen indischen Kriegsgefangenen. Ausgebildet in Sabotage, Fallschirmspringen und Infiltration, könnte das BAH einen großen Schritt für den Nationalstolz bedeuten."
 RAJ_german_technology:1 "[Root.GetGermanTechnologyName]"
 RAJ_german_technology_german:0 "Deutsche Technologie"
 RAJ_german_technology_japan:0 "Japanische Technologie"
 RAJ_german_technology_desc:0 "Deutsche Wissenschaftler gehören zu den besten der Welt, und ihre Militärmaschinerie basiert auf den modernsten Ingenieurtechniken. Sie sind bereit, ihre Fortschritte mit uns zu teilen."
 RAJ_japanese_army_air_force_academy:1 "[Root.GetJAAFAName]"
 RAJ_japanese_army_air_force_academy_german:0 "Luftwaffen-Luftwaffenschule"
 RAJ_japanese_army_air_force_academy_japan:0 "Akademie der japanischen Luftstreitkräfte"
 RAJ_japanese_army_air_force_academy_desc:0 "Die japanische Luftwaffenakademie hat beschlossen, indische Rekruten aufzunehmen, die gegen die europäische Vorherrschaft in Asien kämpfen möchten."
 RAJ_cripps_mission:0 "Cripps&#39; Mission"
 RAJ_cripps_mission_desc:0 "Wir müssen Indien trotz der zunehmenden nationalistischen Unabhängigkeitsbestrebungen an die Seite der Alliierten und Großbritanniens drängen. Sir Stafford Cripps ist ein geschickter Verhandlungsführer, der den nationalistischen Führern versichern kann, dass ihre Forderungen berücksichtigt werden."
 RAJ_two_nation_theory:0 "Zwei-Nationen-Theorie"
 RAJ_two_nation_theory_effect:0 "Pakistan wird freigelassen, wenn Indien die Freiheit erlangt.\n"
 RAJ_two_nation_theory_desc:0 "Obwohl Indien lange Zeit als ein einziges Territorium regiert wurde, ist es sinnvoll, es als zwei Nationen zu betrachten – eine hinduistische und eine muslimische. Eine Teilung des Landes ist vielleicht nicht die einzige Lösung, aber jedes Abkommen für ein unabhängiges Indien muss dieser dualen Natur des Subkontinents Rechnung tragen."
 RAJ_princely_state_donations:0 "Fürstliche Staatsspenden"
 RAJ_princely_state_donations_desc:0 "Die Fürstenstaaten Indiens stellten lange Zeit die Männer, die den Kern der indischen Armee unter den Briten bildeten. Weitere Spenden dieser lokalen Herrscher unterstreichen ihre Unterstützung für das Empire."
 RAJ_imperial_service_troops:0 "Kaiserliche Diensttruppen"
 RAJ_imperial_service_troops_desc:0 "Die Imperial Service Troops werden von den indischen Prinzen rekrutiert und können Hunderttausende Mann umfassen. In diesen schwierigen Zeiten ist es gut zu wissen, dass Seine Majestät auf die Loyalität der Rajas zählen kann."
 RAJ_raf_funding:0 "RAF-Finanzierung"
 RAJ_raf_funding_desc:0 "Die Royal Air Force of India erhält mehr Geld und Ressourcen vom Vereinigten Königreich."
 RAJ_navy_funding:0 "Finanzierung der Marine"
 RAJ_navy_funding_effect:0 "§Y2 Leichte Kreuzer§! werden Ihrer Marine hinzugefügt, wenn Sie bereits über die Technologie verfügen.\n"
 RAJ_navy_funding_effect_mtg:0 "§Y2 Leichte Kreuzer§! dieses Typs werden unserer Marine hinzugefügt.\n"
 RAJ_navy_funding_desc:0 "Die Royal Navy of India erhält mehr Geld und Vermögenswerte vom Vereinigten Königreich."
 RAJ_british_army_support:0 "Unterstützung der britischen Armee"
 RAJ_british_army_support_desc:0 "Die britische Armee kennt Indien nach 200 Jahren Besatzung gut. Sie kennt die Menschen und das Land und kann die Ausbildung indischer Soldaten für den Kampf im eigenen Land unterstützen."
 RAJ_red_eagle_division:0 "Roter Adler Division"
 RAJ_create_unit_red_eagles_tt:0 "Gewinnen Sie eine Elite-Infanteriedivision in Delhi.\n"
 RAJ_red_eagle_division_desc:0 "Die Red Eagle Division wird die erste indische Division sein, die für den Einsatz im Ausland ausgebildet wird und bereit ist, unter harten Bedingungen zu kämpfen. "
 RAJ_chindits:0 "Chindits"
 RAJ_orde_wingate_tt:0 "Ein §Y4 Skill General§! namens §YOrde Wingate§! wird erscheinen.\n"
 RAJ_chindits_desc:0 "Indien benötigt eine Spezialeinheit, daher haben wir die Chindits gegründet, um hinter den feindlichen Linien in den Dschungeln Asiens zu operieren. Diese Operation ist riskant und wird hohe Verluste fordern, könnte aber für die Kriegsanstrengungen von großem Nutzen sein."
 RAJ_jungle_training:0 "Dschungeltraining"
 RAJ_jungle_training_effect:0 "Aktiviert §HDschungeltraining§!\n§HMarines\n Dschungel§!\n Angriff: §G+5%§!\n Bewegung: §G+10%§!\n§HBergsteiger\n Dschungel§!\n Angriff: §G+5%§!\n Bewegung: §G+10%§!\n§HFallschirmjäger\n Dschungel§!\n Angriff: §G+5%§!\n Bewegung: §G+10%§!\n"
 RAJ_jungle_training_desc:0 "Indien, Burma und Indochina sind von Dschungel bedeckt und es wird eine spezielle Ausbildung empfohlen, um unsere Soldaten in diesem gefährlichen Gelände effektiv einzusetzen."
 RAJ_lessons_of_the_great_war:0 "Lehren aus dem Ersten Weltkrieg"
 RAJ_lessons_of_the_great_war_desc:0 "Indische Kolonialsoldaten waren am letzten Weltkrieg beteiligt und die Lehren aus diesem Konflikt sollten in die Ausbildung und Organisation der Armee einfließen."
 RAJ_indianisation_of_army:0 "Indianisierung der Armee"
 RAJ_indianisation_of_army_desc:0 "Um Indien im Falle eines totalen Krieges ausreichend zu schützen, müsste die gesamte indische Bevölkerung mobilisiert werden. Dies bedeutet nicht nur, dass mehr indische Soldaten rekrutiert werden müssen, sondern auch, dass indische Offiziere an irgendeiner Stelle der Befehlskette das Kommando übernehmen können."
 RAJ_indian_gurkhas:0 "Indische Gurkhas"
 RAJ_indian_gurkhas_desc:0 "Die Gurkhas des Punjab und des nepalesischen Hochlandes sind für ihre militärischen Fähigkeiten legendär. Sie haben dem Raj viele Jahre lang treu gedient und sind in allen Arten der Kriegsführung herausragend."
 RAJ_an_indian_sandhurst:0 "Ein indischer Sandhurst"
 RAJ_an_indian_sandhurst_desc:0 "Indien forderte seit dem letzten Krieg eine eigene Militärschule, und 1932 wurde schließlich eine solche gegründet. Die Indische Militärakademie bildet seit einigen Jahren indische Offiziere aus und stellt uns damit eine zentrale Kommandotruppe zur Verfügung."
 RAJ_lions_of_the_great_war:0 "Löwen des Ersten Weltkriegs"
 RAJ_lions_of_the_great_war_desc:0 "Die Sikhs haben eine starke militärische Tradition und wurden im letzten Krieg hoch dekoriert. Die Löwen des Punjab bilden ein eigenes starkes Regiment, und die Region ist reif für weitere Rekrutierungen."
 RAJ_indian_gentlemen_officers:0 "Indische Gentlemen-Offiziere"
 RAJ_indian_gentlemen_officers_desc:0 "Die Herren, die dem Raj durch enge Zusammenarbeit mit den kaiserlichen Behörden gedient haben, sind ein einsatzbereiter Ersatz für Kommandeure, falls wir loyale Männer zur Führung der neuen indischen Armee benötigen."
 RAJ_the_bangalore_torpedo:0 "Der Bangalore Torpedo"
 RAJ_the_bangalore_torpedo_desc:0 "Einer der größten Beiträge Britisch-Indiens zur Kriegskunst ist der Bangalore-Torpedo, eine Reihe miteinander verbundener Rohre, mit denen Hindernisse zerstört werden können, während die Ingenieure unter Beschuss stehen. Dieses Gerät erfreut sich weltweit großer Beliebtheit. "
 RAJ_vickers_berthier_gun:0 "Vickers-Berthier-Gewehr"
 RAJ_vickers_berthier_gun_desc:0 "Das Vickers-Berthier ist etwas unhandlich, hat aber den Vorteil, dass es schnell und einfach hergestellt werden kann. Für ein Land wie Indien ist dies eine sehr wichtige Eigenschaft einer Waffe."
 RAJ_royal_indian_artillery:0 "Königliche indische Artillerie"
 RAJ_royal_indian_artillery_desc:0 "Die Royal Indian Artillery existiert, seit die East India Company im Jahr 1748 ein Kanonenbataillon mit indischen Kanonieren aufstellte. Wir können auf diese jahrzehntelange Erfahrung zurückgreifen."
 RAJ_army_motorization:0 "Armeemotorisierung"
 RAJ_army_motorization_desc:0 "Indien ist zu groß, um effizient mit Eisenbahn und Pferden abgedeckt zu werden. Die Armee sollte über motorisierte Divisionen und regelmäßige LKW-Transporte verfügen."
 RAJ_revive_the_screw_guns:0 "Beleben Sie die Schraubpistolen wieder"
 RAJ_revive_the_screw_guns_effect:0 "Aktiviert §HMountain Gun§!\n§HArtillery\n Mountain§!: Bewegung: §G+15%§!\n§HAnti-Tank\n Mountain§!: Bewegung: §G+15%§!"
 RAJ_revive_the_screw_guns_desc:0 "Das bergige Gelände Nordindiens führte zur Entwicklung eines Artilleriegeschütz, das zerlegt und auf Maultieren dorthin transportiert werden konnte, wo es benötigt wurde. Dieses 7-Pfünder-Geschütz mag zwar etwas veraltet sein, aber wir sollten seinen Nutzen nicht außer Acht lassen."
 RAJ_indian_armor:0 "Indische Rüstung"
 RAJ_indian_armor_desc:0 "Indien sollte sich auf die Entwicklung einer eigenen Panzer- und Selbstbauabteilung konzentrieren."
 RAJ_modernizing_army:0 "Modernisierung der Armee"
 RAJ_modernizing_army_desc:0 "Zu lange galten die indischen Streitkräfte als nicht viel mehr als ein kolonialer Außenposten, der kaum über die Vorteile und die Ausrüstung verfügte, die der britischen Armee zur Verfügung standen. Es ist Zeit, die Streitkräfte des Raj zu modernisieren."
 RAJ_indian_defense_research:0 "Indische Verteidigungsforschung"
 RAJ_indian_defense_research_desc:0 "Da Indien nun ein vollständig souveräner Staat ist, haben wir keinen Zugang mehr zu fortschrittlichen Prototypen und Bauplänen wie früher. Wir müssen sicherstellen, dass wir unseren Feinden immer einen Schritt voraus sind und technologisch nicht zurückfallen."
 RAJ_british_pilot_training:0 "Britische Pilotenausbildung"
 RAJ_british_pilot_training_desc:0 "Die Royal Air Force hat sich bereit erklärt, indische Piloten zur Ausbildung aufzunehmen. Diese Ausbildung wird für den Aufbau unserer eigenen Luftwaffe von großer Bedeutung sein."
 RAJ_expand_air_bases:0 "Luftwaffenstützpunkte erweitern"
 RAJ_expand_air_bases_desc:0 "Indien ist sehr groß. Um seinen Luftraum zu überwachen und zu schützen, müssen wir unsere Luftkapazitäten auf Stützpunkten auf dem gesamten Subkontinent erhöhen."
 RAJ_air_support_effort:0 "Luftunterstützungsbemühungen"
 RAJ_air_support_effort_desc:0 "Die kombinierte Kriegsführung ist die neue Art der Kriegsführung. Deshalb müssen wir unsere Energie auf die Ausbildung und Produktion von Flugzeugen konzentrieren, die Boden- und Seestreitkräfte unterstützen können."
 RAJ_fighter_effort:0 "Kämpfereinsatz"
 RAJ_fighter_effort_desc:0 "Wir brauchen Kampfflugzeuge, um Bomber zu eskortieren und alle feindlichen Flugzeuge abzufangen, die unser Land bedrohen."
 RAJ_royal_indian_air_force:0 "Königliche indische Luftwaffe"
 RAJ_royal_indian_air_force_desc:0 "Es ist an der Zeit, unsere kleine Luftdivision zu einem eigenen Zweig der Streitkräfte auszubauen. Eine nationale Luftwaffe mit unabhängigem Kommando wird dem indischen Volk und dem Imperium besser dienen können."
 RAJ_the_smiling_buddha:0 "Der lächelnde Buddha"
 RAJ_the_smiling_buddha_desc:0 "Wissenschaftler stehen kurz davor, das Geheimnis der Atomenergie zu lüften – und dies wird zur Entwicklung hochwirksamer Sprengstoffe führen. Wir dürfen bei der Suche nach Atomwaffen nicht ins Hintertreffen geraten."
 RAJ_great_indian_peninsula_railway:0 "Große Indische Halbinsel-Eisenbahn"
 RAJ_great_indian_peninsula_railway_desc:0 "Die staatliche Kontrolle der Great Indian Peninsula Railway im Jahr 1925 bedeutet, dass ihr Ausbau und ihre Verbesserung in unserer Verantwortung liegen. Eine wachsende Bevölkerung braucht eine bessere Verkehrsinfrastruktur."
 RAJ_industrial_expansion:0 "Industrielle Expansion"
 RAJ_industrial_expansion_desc:0 "Hunderte Millionen Menschen sind in Indien zu Hause – und es gibt keinen Grund, warum diese Bevölkerung nicht die Grundlage eines Industriegiganten bilden sollte."
 RAJ_tata_steel:0 "Tata Steel"
 RAJ_tata_steel_desc:0 "Tata Steel ist auf dem Weg, der größte Stahlproduzent des Imperiums zu werden. Eine höhere Produktion wird die Modernisierung Indiens weiter vorantreiben."
 RAJ_assam_oil:0 "Assam-Öl"
 RAJ_assam_oil_desc:0 "Assam ist das Zentrum der indischen Ölproduktion, insbesondere die Raffinerie in Digboi. Der Zugang zu dieser Ressource muss erweitert und ausgeschöpft werden."
 RAJ_indian_institute_of_science:0 "Indisches Wissenschaftsinstitut"
 RAJ_indian_institute_of_science_desc:0 "Der Campus des Indian Institute of Science in Bangalore ermöglicht es den besten und klügsten Köpfen der indischen Bevölkerung, unsere Fortschritte voranzutreiben."
 RAJ_institute_of_fundamental_research:0 "Institut für Grundlagenforschung"
 RAJ_institute_of_fundamental_research_desc:0 "Einige unserer führenden Wissenschaftler und Industriellen setzen sich für ein neues Institut für Grundlagenforschung ein, um die neuesten Entdeckungen in den Naturwissenschaften zu nutzen."
 RAJ_research_collaboration:0 "Forschungskooperationen"
 RAJ_research_collaboration_desc:0 "Die Briten haben uns gezeigt, wie vorteilhaft es ist, wissenschaftliche Fortschritte unter engen Verbündeten zu teilen. Unsere gesamte Fraktion wird in der Lage sein, Forschung und Entwicklung im Krieg effizienter durchzuführen, wenn wir die notwendigen Schritte unternehmen, um dies zu koordinieren."
 RAJ_expand_mazagon_dock:0 "Erweitern Sie das Mazagon Dock"
 RAJ_expand_mazagon_dock_desc:0 "Das Mazagon Dock in Mumbai ist unser wichtigster Schiffsbauer an der Westküste. In dieser Weltkrise benötigt es mehr Kapazitäten."
 RAJ_found_scindia_shipyard:0 "Scindia-Werft gefunden"
 RAJ_found_scindia_shipyard_desc:0 "Wir brauchen eine Werft an der Ostküste des Landes, daher ist die Gründung der Scindia Shipyard in Visakhapatnam für unsere Marinezukunft sinnvoll."
 RAJ_royal_indian_navy:0 "Königliche Indische Marine"
 RAJ_royal_indian_navy_desc:0 "Die Royal Indian Navy muss rasch erweitert werden. Neue Taktiken und neue Schiffe sollten dabei Priorität haben."
 RAJ_screening_effort:0 "Screening-Aufwand"
 RAJ_screening_effort_desc:0 "Indien spielt eine entscheidende Rolle bei der Verteidigung der südlichen Route zum Suezkanal. Durch Abschirm- und Eskortmissionen werden lebenswichtige Güter und Soldaten in die europäischen und afrikanischen Kriegsschauplätze gelangen."
 RAJ_cruiser_effort:0 "Kreuzeraufwand"
 RAJ_cruiser_effort_desc:0 "Für die Entwicklung und den Ausbau der indischen Seemacht werden Kreuzer vorerst ausreichen."
 RAJ_submarine_effort:0 "U-Boot-Anstrengungen"
 RAJ_submarine_effort_desc:0 "Angesichts des Aufstiegs der japanischen Seestreitkräfte in Asien könnte es sinnvoll sein, unsere Energien auf die Unterwasserwelt zu konzentrieren und Angriffe von U-Booten aus durchzuführen."
 RAJ_capital_ship_effort:0 "Großkampfschiff-Anstrengung"
 RAJ_capital_ship_effort_desc:0 "Als britischer Außenposten hat Indien die Macht von Großkampfschiffen bei der Beherrschung der Meere erlebt. Wir sollten unsere eigenen schweren Kreuzer und Schlachtschiffe bauen."
 RAJ_modernizing_navy:0 "Modernisierung der Marine"
 RAJ_modernizing_navy_desc:0 "Bessere Motoren, mehr Platz für die Besatzung, höhere Geschwindigkeit und größere Geschütze. Indiens Marine wird bald zu den besten des Kontinents gehören."
 RAJ_east_india_railways:0 "Ostindische Eisenbahnen"
 RAJ_east_india_railways_desc:0 "Aufgrund der staatlichen Kontrolle über die East India Railway liegen alle Entscheidungen über deren Ausbau und Verbesserung in den Händen unserer Minister."
 RAJ_integrate_princely_railways:0 "Fürstliche Eisenbahnen integrieren"
 RAJ_integrate_princely_railways_desc:0 "Einige indische Prinzen haben eigene Eisenbahnsysteme finanziert, doch bisher waren diese nur unzureichend in die vom Raj gebauten Bahnlinien integriert. Es muss etwas getan werden, um die Züge des Landes miteinander zu verknüpfen."
 RAJ_ishapore_arsenal:0 "Ishapore Arsenal"
 RAJ_ishapore_arsenal_desc:0 "Das Ishapore Arsenal und die Gewehrfabrik sind seit dem 18. Jahrhundert in Betrieb. Sie sind für viele Innovationen im Waffendesign verantwortlich und bilden das Herzstück unseres Waffenproduktionssystems."
 RAJ_clamp_down_on_corruption:0 "Korruption bekämpfen"
 RAJ_clamp_down_on_corruption_desc:0 "Trotz der Bemühungen der britischen Industrie, das indische Schienennetz auszubauen, scheinen die Vorteile des Ausbaus nur in geringem Maße Indien zu zugutekommen. Korruption und Doppelzüngigkeit sind im Transportsektor weit verbreitet, und wir müssen etwas dagegen unternehmen."
 RAJ_strengthen_ties_with_british_investors:0 "Stärkung der Beziehungen zu britischen Investoren"
 RAJ_strengthen_ties_with_british_investors_desc:0 "Für den Ausbau unserer Fabriken und Ressourcen sind wir noch immer stark auf britisches Kapital angewiesen. Bis wir über einen eigenen, starken Bankensektor verfügen, müssen wir uns auf die Knie begeben und in London um Unterstützung bitten."
 RAJ_british_rail_investors:0 "Britische Eisenbahninvestoren"
 RAJ_british_rail_investors_desc:0 "Die zivile und Verkehrsinfrastruktur in Indien benötigt eine kräftige Finanzspritze von britischen Geldgebern."
 RAJ_british_arms_investors:0 "Britische Waffeninvestoren"
 RAJ_british_arms_investors_desc:0 "Wenn wir unsere Waffenfabriken schnell wieder in Gang bringen wollen, müssen wir britische Banken bitten, in unsere militärische Infrastruktur zu investieren."
 RAJ_indian_sandhurst_tt:0 "Ein §Y4-Fähigkeitsgeneral§! namens §YKodandera Madappa Cariappa§! wird erscheinen.\nEin §Y3-Fähigkeitsgeneral§! namens §YKodandera Subayya Thimayya§! wird erscheinen.\nEin §Y3-Fähigkeitsgeneral§! namens §YJayanto Nath Chaudhuri§! wird erscheinen."
 RAJ_create_unit_gurkas_tt:0 "Gewinnen Sie eine Eliteeinheit von Gurkhas in Delhi."
 RAJ_create_unit_rani_tt:0 "Gewinnen Sie eine Infanterieeinheit in Delhi."
 RAJ_create_unit_sikh_tt:0 "Gewinnen Sie eine Infanterieeinheit in Delhi."
 RAJ_create_general_rani_tt:0 "\nEin §Y3 Skill General§! namens §YLakshmi Sahgal§! wird erscheinen"
 continuous_naval_production:0 "Marineproduktion"
 continuous_naval_production_desc:0 "Indem wir die Ressourcen auf unsere Werften konzentrieren und qualifizierte Schiffsbauer vom Militärdienst befreien, können wir die Produktionszeit für Schiffe drastisch verkürzen."
 continuous_air_production:0 "Luftproduktion"
 continuous_air_production_desc:0 "Wir können unsere Luftfahrtindustrie umstrukturieren, um Abfall zu vermeiden und die Produktion zu rationalisieren."
 continuous_non_factory_construct:0 "Bauingenieurwesen"
 continuous_non_factory_construct_desc:0 "In unserer Bauindustrie herrscht noch immer viel Nachholbedarf. Indem wir uns darauf konzentrieren, können wir die Baugeschwindigkeit deutlich verbessern. Leider hat sich die Produktion von Werkzeugmaschinen als großer Engpass für die Expansion unserer Schwerindustrie erwiesen, sodass sie von den Bemühungen in diesem Bereich nicht profitieren wird. "
 continuous_reduce_training_time:0 "Armeeausbildung"
 continuous_reduce_training_time_desc:0 "Durch die Schaffung spezialisierter Fortbildungseinheiten innerhalb jeder Division können wir auch Divisionen an die Front schicken, die zuvor mit der Ausbildung zurückgehalten worden wären."
 continuous_suppression:0 "Unterdrückung von Resistenzen"
 continuous_suppression_desc:0 "Indem wir die großen Widerstandsgruppen in den besetzten Gebieten infiltrieren und ihre Anführer ausschalten, können wir den Schaden, den sie anrichten können, erheblich verringern."
 continuous_repair:0 "Baureparatur"
 continuous_repair_desc:0 "Wir werden spezialisierte Reparaturteams aus Fabrik- und Bauarbeitern bilden und ihren Einsatz zentral steuern, um den Wiederaufbau der beschädigten Infrastruktur zu verbessern."
 continuous_tech_share:0 "Technologieaustausch"
 continuous_tech_share_desc:0 "Wir werden unsere Forschungsinstitute und Universitäten ermutigen, mit ihren Partnern in verbündeten Ländern in Kontakt zu treten. Dadurch erhalten wir einen Bonus für den Austausch von Technologie."
 continuous_boost_freedom:0 "Mehr Autonomie"
 continuous_boost_freedom_desc:0 "Durch die Reorganisation unserer Kolonialbürokratie und die Anwerbung einheimischer Verwalter werden wir mit der Zeit in der Lage sein, unsere Angelegenheiten selbst in die Hand zu nehmen."
 continuous_restrict_freedom:0 "Unterdrücken von Themen"
 continuous_restrict_freedom_desc:0 "Unsere Kolonialisten haben ziemlich alberne Vorstellungen von Dingen wie „Selbstbestimmung“ oder „nationaler Unabhängigkeit“. Es ist an der Zeit, sie von diesen Vorstellungen abzubringen."
 subject_autonomy_mod_tt:0 "Autonomie in den Fächern: §G-0,5§!"
 unlocks_decision:0 "Schaltet Entscheidung frei: "
 USA_continue_the_new_deal:1 "Den New Deal fortsetzen"
 USA_continue_the_new_deal_desc:1 "Die Politik des New Deal hat sich als erfolgreich erwiesen. Wir dürfen jetzt nicht den Weg verlieren."
 USA_suspend_the_presecution:0 "Einstellung der Verfolgung"
 USA_suspend_the_presecution_desc:0 "Die Verfolgung amerikanischer Bürger aufgrund ihrer politischen Ansichten – egal wie abscheulich sie auch erscheinen mögen – steht im fundamentalen Widerspruch zu den Werten dieses Landes. Sie muss sofort beendet werden."
 USA_desegregate_the_armed_forces:1 "Aufhebung der Rassentrennung in den Streitkräften"
 USA_desegregate_the_armed_forces_desc:1 "Der Dienst unter der Waffe in den Streitkräften des eigenen Landes kann eine unwillkommene Pflicht sein – aber auch ein geschätztes Recht. Ein Recht, das vielen unserer Bürger aufgrund ihrer Abstammung verwehrt bleibt."
 USA_full_desegregation:1 "Vollständige Aufhebung der Rassentrennung"
 USA_full_desegregation_desc:1 "Zu lange haben einige unserer Staaten Menschen aufgrund alter, überholter und unmenschlicher Kriterien unterschiedlich behandelt. In einer freien Republik muss jeder Bürger gleich behandelt werden – und nicht getrennt."
 USA_democratic_socialismx:1 "Demokratischer Sozialismus"
 USA_democratic_socialismx_desc:1 "Kein vernünftiger Mensch kann leugnen, dass der Sozialismus die Zukunft der menschlichen Zivilisation ist. Gleichzeitig könnte kein stolzer und patriotischer Bürger dieser Republik ein System unterstützen, in dem die Regierung nicht mehr vom Volk und aus dem Volk gemacht wird. Wie unsere stolzen Vorfahren werden wir eine neue Regierungsform schaffen, die beides vereint."
 USA_liberty_for_the_philippines:1 "Freiheit für die Philippinen"
 USA_liberty_for_the_philippines_desc:1 "Die Bevölkerung der Philippinen hat ihre Fähigkeit unter Beweis gestellt, ihre Angelegenheiten selbst zu regeln, und es ist an der Zeit, dass die letzten Überreste amerikanischer Kontrolle über ihr Land offiziell beseitigt werden."
 USA_pacific_decolonisation:1 "Pazifik-Entkolonialisierung"
 USA_pacific_decolonisation_desc:1 "Es gibt keine Rechtfertigung – keine – für die anhaltende Präsenz europäischer Mächte im Pazifik oder dafür, die Bevölkerung der pazifischen Inseln in der Knechtschaft ihrer europäischen Herren zu halten. Amerika wird nicht länger tatenlos zusehen, wie diese Ungerechtigkeit anhält."
 USA_union_representation_act:1 "Gesetz über die Gewerkschaftsvertretung"
 USA_union_representation_act_desc:1 "Arbeit ist ein zentraler Bestandteil des menschlichen Lebens, und die gewerkschaftliche Organisation ist ein grundlegender Bestandteil einer demokratischen Gesellschaft. Es ist nur richtig, dass wir dies anerkennen und sicherstellen, dass Gewerkschaften im Kongress obligatorisch vertreten sind."
 USA_old_age_pension_act:1 "Altersrentengesetz"
 USA_old_age_pension_act_desc:1 "Nach einem Leben voller Arbeit haben unsere Bürger ein Recht auf finanzielle Sicherheit und Respekt im Alter. Die bestehenden Gesetze zu ihrer Unterstützung reichen offensichtlich nicht aus."
 USA_accumulated_wealth_tax_act:1 "Gesetz zur Besteuerung angesammelter Vermögen"
 USA_accumulated_wealth_tax_act_desc:1 "Manche Menschen in unserem Land haben absurde Summen angehäuft. Dieses Geld liegt passiv auf Bankkonten oder ist in unpraktisch große Gebäude, vergoldete Möbel und teure Gemälde investiert. Nichts davon dient einem wirtschaftlichen Zweck. Mit der Einführung einer neuen Steuer zwingen wir diejenigen unter unseren Bürgern, die solch nutzlosen Reichtum angehäuft haben, das Geld wieder in die Wirtschaft zu investieren."
 USA_guarantee_the_american_dream:1 "Garantieren Sie den amerikanischen Traum"
 USA_guarantee_the_american_dream_desc:0 "Die meisten unserer Leute wünschen sich nicht viel vom Leben: einen festen Arbeitsplatz, gute Gesundheit und einen Ort, an dem sie eine Familie gründen können. Es gibt keinen Grund, warum sie das nicht haben sollten."
 USA_worker_management_act:1 "Arbeitnehmer-Management-Gesetz"
 USA_worker_management_act_desc:1 "Viel zu oft werden Fabriken und Büros von Menschen geleitet, die nie in der Produktion gearbeitet haben. Da sie die Realität der Produktion nicht verstehen, wecken sie unrealistische Erwartungen. Um unsere Wirtschaft vor den Schäden zu bewahren, die solche inkompetenten Manager anrichten können, setzen wir uns für eine Führung der Arbeiter ein, durch die Arbeiter, für die Arbeiter!"
 USA_militia_organization_act:1 "Milizorganisationsgesetz"
 USA_militia_organization_act_desc:1 "Unsere stolze Republik hat eine lange Tradition des Bürgersoldaten. Sollte unser Land jemals von einem ausländischen Angreifer angegriffen werden, wird dieser auf eine gut organisierte und gut bewaffnete Miliz von Männern und Frauen treffen, die auf vertrautem Gebiet kämpfen, um ihre Heimat zu verteidigen."
 USA_communal_property_act:1 "Gesetz über das gemeinschaftliche Eigentum"
 USA_communal_property_act_desc:1 "Die Bedürfnisse der Vielen dürfen niemals durch die Wünsche der Wenigen oder gar des Einzelnen überlagert werden. Um dies zu gewährleisten, werden wir neue Gesetze verabschieden, die es den Gemeinden erleichtern, das Recht auf Enteignung auszuüben."
 USA_reintegration:1 "Wiedereingliederung"
 USA_reintegration_desc:1 "Der Krieg hat unsere Nation gespalten, doch selbst diejenigen, die sich gegen uns erhoben haben, können letztendlich erlöst werden. Wenn die Bevölkerung ihre Fehler erkannt hat, sollte sie wieder am politischen Prozess unserer stolzen Republik teilnehmen dürfen."
 USA_reach_out_to_the_ware_group:1 "Kontaktieren Sie die Ware Group"
 USA_reach_out_to_the_ware_group_desc:1 "Es gibt eine kleine Gruppe überzeugter Kommunisten in unserer Regierung. Sie glauben, im Geheimen zu agieren, aber wir kennen ihre Namen. Vielleicht könnten sie erkennen, dass unsere Ziele übereinstimmen, und sich davon überzeugen lassen, der Regierung beizutreten."
 USA_us_ussr_economic_cooperation:1 "Wirtschaftliche Zusammenarbeit zwischen den USA und der UdSSR"
 USA_us_ussr_economic_cooperation_desc:1 "Trotz ihrer chaotischen und blutigen Entstehung hat die Sowjetunion beim Aufbau einer modernen Industriegesellschaft bemerkenswerte Fortschritte erzielt. Wir sollten unseren Teil dazu beitragen, sie zu unterstützen."
 USA_secure_china:1 "Sicheres China"
 USA_secure_china_desc:1 "China ist von einem langen, blutigen Bürgerkrieg erfasst. Die nationalistische Regierung ist zutiefst korrupt und hat jegliche Unterstützung in der Bevölkerung verloren. Es ist an der Zeit, den einzigen Akteur in China zu unterstützen, der das Land einen und befrieden kann – die Kommunistische Partei."
 USA_end_monarchism:1 "Schluss mit dem Monarchismus"
 USA_end_monarchism_desc:1 "Die Monarchien Europas haben die Welt bereits in einen Weltkrieg gestürzt – wir können nicht zulassen, dass sie dies erneut tun. Unsere Vorfahren führten Krieg gegen den König von England, um ihre Freiheit zu erlangen – wir werden die Welt für immer von seiner Tyrannei befreien!"
 USA_shatter_the_empires:1 "Zerschmettere die Imperien"
 USA_shatter_the_empires_desc:1 "Wir waren einst eine Kolonie eines globalen Imperiums, bis wir unsere Freiheit mit Blut erkauften. Unsere Republik kann sich erst dann wirklich sicher fühlen, wenn diejenigen, die sich als Herren dieser Welt wähnen, in Schach gehalten werden."
 USA_agricultural_adjustment_act:1 "Agraranpassungsgesetz"
 USA_agricultural_adjustment_act_desc:1 "Unsere Landwirte sind von der Wirtschaftskrise besonders hart getroffen worden. Wir müssen dafür sorgen, dass die Menschen, die unsere Lebensmittel produzieren, nicht durch einen unkontrollierten Markt aus dem Geschäft gedrängt werden."
 USA_fair_labour_standards_act:1 "Gesetz zu fairen Arbeitsnormen"
 USA_fair_labour_standards_act_desc:1 "Angesichts der ersten Anzeichen einer langsamen Erholung ist es an der Zeit, die Arbeitnehmer daran teilhaben zu lassen. Wir müssen ausbeuterische Praktiken wie unbezahlte Überstunden verbieten und einen existenzsichernden Mindestlohn einführen."
 USA_federal_housing_act:1 "Bundeswohnungsgesetz"
 USA_federal_housing_act_desc:1 "Im Rahmen unserer laufenden Bemühungen, die Armut in den Vereinigten Staaten zu beseitigen, werden wir ein Programm für staatlich subventionierten Wohnraum schaffen."
 federal_housing_tt:0 "(§YFünf zufällige Zustände§!): Füge §G1§ hinzu! Bauplätze."
 USA_office_of_scientific_research_and_development:1 "Büro für wissenschaftliche Forschung und Entwicklung"
 USA_office_of_scientific_research_and_development_desc:1 "Da am Horizont ein Krieg droht, müssen wir unsere wissenschaftlichen Anstrengungen darauf konzentrieren, sicherzustellen, dass uns kein potenzieller Gegner unterlegen ist."
 USA_focus_on_europe:1 "Fokus Europa"
 USA_focus_on_europe_desc:1 "Die europäischen Großmächte stehen erneut kurz davor, die Welt in einen Weltkrieg zu stürzen. Wir können nicht wie früher warten, bis es uns trifft. Wir müssen bereit sein, entschlossen einzugreifen, sollte eine Nation in Europa den Frieden bedrohen."
 USA_focus_on_asia:1 "Fokus auf Asien"
 USA_focus_on_asia_desc:1 "Während die meisten Menschen mit Sorge nach Europa blicken, sind wir auch jenseits des Pazifiks mit Unsicherheit und Instabilität konfrontiert. Es könnte in unserem besten Interesse sein, im Ausland zu intervenieren, bevor wir näher an der Heimat angreifen."
 USA_magic:1 "MAGIE"
 USA_magic_desc:1 "Die Marine glaubt, dass sie die japanischen Verschlüsselungscodes knacken kann, was es uns ermöglichen würde, ihren gesamten Nachrichtenverkehr, einschließlich der Schiffsbewegungen, zu lesen."
 USA_neutrality_act:1 "Neutralitätsgesetz"
 USA_neutrality_act_desc:1 "Es scheint immer wahrscheinlicher, dass in Europa ein Krieg ausbrechen wird. Während des Ersten Weltkriegs verkauften amerikanische Unternehmen große Mengen Waffen an die Alliierten, und viele glauben, dass der amerikanische Kriegseintritt vor allem durch den Wunsch motiviert war, die Bezahlung dieser Lieferungen sicherzustellen. Diesmal wird es keine Kriegsgewinnler geben."
 USA_lend_lease_act_neutrality_tt:0 "\n\nDie Verabschiedung des Neutralitätsgesetzes wird die Anforderungen für die Verabschiedung des Leih- und Pachtgesetzes §Rdrastisch erhöhen§!"
 USA_lend_lease_act:1 "Leih- und Pachtgesetz"
 USA_lend_lease_act_desc:1 "Die großen Demokratien der Welt stehen unter Beschuss. Sollten sie die Schlacht verlieren, ist es nur eine Frage der Zeit, bis der Krieg auch unsere Küsten erreicht. Wir müssen sie nach Kräften unterstützen – auch wenn sie die Ausrüstung nicht sofort bezahlen können."
 USA_reestablish_the_gold_standard:1 "Den Goldstandard wiederherstellen"
 USA_reestablish_the_gold_standard_desc:1 "Ohne den Goldstandard ist Geld kaum mehr als ein Glaubensartikel, während die galoppierende Inflation die Ersparnisse unserer Bevölkerung aufzehrt und ihre Arbeit entwertet. Wir müssen diesen finanzpolitisch unverantwortlichen Weg aufgeben."
 USA_adjusted_compensation_act:1 "Gesetz zur angepassten Vergütung"
 USA_adjusted_compensation_act_desc:1 "Unseren Veteranen des Ersten Weltkriegs wurde eine angemessene Rente versprochen. Viele von ihnen sind in jüngster Zeit durch die Depression in Not geraten. Wir müssen alles tun, um denen zu helfen, die in der Stunde der Not dem Ruf der Republik gefolgt sind."
 USA_labour_management_relations_act:1 "Gesetz über die Beziehungen zwischen Arbeitnehmern und Arbeitgebern"
 USA_labour_management_relations_act_desc:1 "Unternehmen in ganz Amerika sind durch Gewerkschaftsaktivitäten aller Art bedroht – Streiks, organisierte Gewerkschaftsarbeit, Forderungen nach höheren Löhnen. Wir können nicht zulassen, dass das so weitergeht."
 USA_protectionist_tariffs:1 "Protektionistische Zölle"
 USA_protectionist_tariffs_desc:1 "Der Freihandel hat unsere Märkte für ausländische Wettbewerber geöffnet, von denen viele selbst Zölle und Abgaben erhoben haben. Unsere Unternehmen sind einem harten Wettbewerb ausgesetzt, während ihre Unternehmen die Sicherheit der Zollmauer genießen. Dem muss ein Ende gesetzt werden."
 USA_income_tax_reform:2 "Einkommensteuerreform"
 USA_income_tax_reform_desc:1 "Die Einkommensteuer entzieht jedem Amerikaner Geld – Geld, das unsere Bürger für andere Dinge und die Unterstützung ihrer lokalen Wirtschaft ausgeben könnten. Wir geben den Amerikanern die Autonomie über ihre eigenen Finanzen zurück."
 USA_institute_of_american_sciences:1 "Amerikanisches Institut der Wissenschaften"
 USA_institute_of_american_sciences_desc:1 "Die Universitäten und Forschungslabore im ganzen Land haben ihre Forschung bisher nach eigenem Ermessen durchgeführt. Damit muss Schluss sein. Wir werden eine neue Organisation gründen, um die Bemühungen unserer Weltklasse-Wissenschaftler zu koordinieren."
 USA_america_first:0 "Amerika zuerst"
 USA_america_first_desc:2 "Manche Leute würden uns dazu bringen, unser Vermögen und das Blut unserer Jugend in fremden Kriegen zu verschwenden. Wir dürfen uns von diesen Kriegstreibern nicht beeinflussen lassen und müssen stattdessen nach einer einfachen Maxime leben: Amerika zuerst – alle anderen danach."
 USA_extend_the_chinese_exclusion_acts:1 "Ausweitung der Chinese Exclusion Acts"
 USA_extend_the_chinese_exclusion_acts_desc:2 "Da China vom Krieg verwüstet ist, müssen wir Maßnahmen ergreifen, um die chinesische Einwanderung zu begrenzen, damit wir nicht in Flüchtlingswellen ertrinken."
 USA_empower_the_huac:1 "Ermächtigen Sie den Huac"
 USA_empower_the_huac_desc:1 "Der Ausschuss für unamerikanische Umtriebe erfüllt in unserer gesunden Demokratie eine wichtige Funktion. Wir dürfen nicht zulassen, dass illoyale Elemente versuchen, den politischen Prozess zu beeinflussen."
 USA_voter_registration_act:1 "Wählerregistrierungsgesetz"
 USA_voter_registration_act_desc:1 "Wahlen sind der wichtigste Teil einer Demokratie. Es ist völlig unvernünftig zu fordern, dass es keine Kontrollen darüber geben sollte, wer an ihnen teilnehmen darf – oder vielleicht haben die Befürworter unkontrollierter Wahlen finsterere Motive und wollen den Prozess durch Wahlbetrug untergraben …"
 USA_ally_with_the_silver_shirts:1 "Verbünde dich mit den silbernen Hemden"
 USA_ally_with_the_silver_shirts_desc:1 "Um unserer Nation ihren angemessenen Platz in der Welt zurückzugeben und ihre Manifest Destiny zu verwirklichen, ist eine grundlegendere Reorganisation notwendig. Die Silver Shirts werden uns dabei helfen."
 USA_national_prosperity_program:1 "Nationales Wohlstandsprogramm"
 USA_national_prosperity_program_desc:1 "Der Schlüssel zu einer raschen Erholung und dauerhaftem Wohlstand liegt nicht in unkontrollierten Märkten, sondern in sorgfältig gesteuerten Programmen, die private und öffentliche Unternehmen miteinander verbinden."
 USA_privatize_the_TVA:1 "Privatisierung der TVA"
 USA_privatize_the_TVA_desc:1 "Die Tennessee Valley Authority hat die private Konkurrenz verdrängt und die Bautätigkeit in der Region regelrecht unter Kontrolle gebracht. Es kann nicht Aufgabe der Regierung sein, Dinge zu tun, die der private Sektor nachweislich besser kann."
 USA_de_regulate_the_banking_sector:1 "Deregulierung des Bankensektors"
 USA_de_regulate_the_banking_sector_desc:1 "Nach einer im Konjunkturzyklus völlig normalen Korrektur an den Finanzmärkten haben frühere Regierungen völlig unangemessene Beschränkungen der Finanzaktivitäten eingeführt. Obwohl diese Beschränkungen zweifellos gut gemeint waren, richten sie eindeutig mehr Schaden als Nutzen an."
 USA_national_employment_strategy:1 "Nationale Beschäftigungsstrategie"
 USA_national_employment_strategy_desc:1 "Arbeitslosigkeit hat eine einfache Ursache: Es gibt nicht die passenden Arbeitskräfte für die angebotenen Jobs. Fabriken liegen brach, weil Arbeitgeber nicht die benötigten Arbeitskräfte finden, während in anderen Teilen des Landes Menschen hungern. Wir werden eine neue Strategie einführen, die sicherstellt, dass jeder Arbeitgeber die benötigten Arbeitskräfte für sein Unternehmen findet."
 USA_invite_foreign_support:1 "Ausländische Unterstützung einladen"
 USA_invite_foreign_support_desc:1 "Angesichts einiger sehr beunruhigender Berichte über die Loyalität des Militärs und einiger Landesregierungen müssen wir möglicherweise im Ausland nach Unterstützung suchen."
 USA_send_lindbergh_to_germany:1 "Lindbergh nach Deutschland schicken"
 USA_send_lindbergh_to_germany_desc:1 "Der berühmte Flieger hat angeboten, nach Europa zu reisen, um zu untersuchen, wie Deutschland nach dem letzten Krieg wiederaufgebaut wurde. Dies dürfte uns wertvolle Erfahrungen liefern. Lindbergh hat zudem angedeutet, dass er bereit wäre, der Regierung als Berater zur Seite zu stehen."
 USA_work_with_the_bund:1 "Zusammenarbeit mit dem Bund"
 USA_work_with_the_bund_desc:1 "Der Deutsch-Amerikanische Bund hat uns angeboten, uns dabei zu helfen, unsere Positionen den vielen Amerikanern deutscher Abstammung zu vermitteln. Dadurch würden wir in ihren Staaten eine wohlwollende Basis finden."
 USA_work_with_the_bund_tt:0 "Stellt sicher, dass im Falle eines Bürgerkriegs die folgenden Staaten an der Seite der Regierung bleiben: Ohio, Missouri, Wisconsin, Illinois, Indiana und Michigan"
 USA_recruit_the_free_corps:1 "Rekrutieren Sie das Freikorps"
 USA_recruit_the_free_corps_desc:1 "Angesichts des zunehmenden Misstrauens gegenüber dem Militär müssen wir uns den Helden des Ersten Weltkriegs zuwenden. In der Stunde der Not kamen die deutschen Freikorps der Deutschen Republik zu Hilfe. Wir brauchen eine ähnliche Organisation, die uns in der Stunde der Not treu zur Seite steht."
 USA_honor_the_confederacy:1 "Ehre der Konföderation"
 USA_honor_the_confederacy_desc:1 "Zu lange wurde die Geschichte des Bürgerkriegs aus der Perspektive des Nordens erzählt – die Geschichte einer zum Scheitern verurteilten Rebellion. Es ist an der Zeit, dass auch die andere Seite Gehör findet."
 USA_war_powers_act:1 "Kriegsvollmachtsgesetz"
 USA_war_powers_act_desc:1 "In einer Welt, in der Flugzeuge immer schneller werden und immer größere Bombenlasten tragen, in einer Welt der U-Boote und Chemiewaffen, ist es eine Einladung zur Katastrophe, den Präsidenten daran zu hindern, für die notwendigen Maßnahmen zur Verteidigung des Landes die Zustimmung des Kongresses einzuholen."
 USA_seize_cuba:1 "Erobere Kuba"
 USA_seize_cuba_desc:1 "Direkt vor unserer Küste liegt ein unsinkbarer Flugzeugträger, der einem Angreifer als Stützpunkt dienen könnte. Das dürfen wir nicht zulassen."
 USA_eliminate_the_southern_threat:1 "Beseitigen Sie die Bedrohung aus dem Süden"
 USA_eliminate_the_southern_threat_desc:1 "Mexiko war in der letzten Generation ein instabiles Chaos. Ob die Gewalt über unsere Grenze schwappt oder jemand das Land vereint und nach Norden marschiert, ist irrelevant – wir müssen unsere Südflanke sichern."
 USA_the_canadian_corridor:1 "Der kanadische Korridor"
 USA_the_canadian_corridor_desc:1 "Ein schmaler Streifen dünn besiedelten kanadischen Territoriums trennt Alaska vom südlichen Teil der USA. Seine Verteidigung ist daher auf den guten Willen Kanadas angewiesen. Der wahrscheinlichste Angreifer ist jedoch Kanada. So kann es nicht weitergehen."
 USA_north_american_dominion:1 "Nordamerikanisches Dominion"
 USA_north_american_dominion_desc:1 "Da unsere unmittelbaren Grenzen gesichert sind, müssen wir unseren Blick auch über den Tellerrand richten, um einer Bedrohung Nordamerikas zuvorzukommen. Wir können keinen Schurkenstaat in der Region dulden."
 USA_strategic_interests:1 "Strategische Interessen"
 USA_strategic_interests_desc:1 "Die Welt ist vernetzter als je zuvor. Eine Bedrohung in einem Teil der Welt kann sich schnell zu einer Gefahr für die ganze Welt entwickeln. Wir müssen ein Netzwerk sich gegenseitig unterstützender Stützpunkte rund um den Globus aufbauen, um in jeder Situation schnell reagieren zu können."
 USA_protect_south_america:1 "Schützen Sie Südamerika"
 USA_protect_south_america_desc:1 "Der südliche Teil unseres Doppelkontinents ist seit seiner Entdeckung der Spielplatz verschiedener Imperien. Es ist an der Zeit, dass sich jemand darum kümmert, dass diese Nationen ungestört bleiben und in eine produktivere Zukunft geführt werden."
 USA_pacific_pacification:1 "Pazifische Befriedung"
 USA_pacific_pacification_desc:1 "Australien und Neuseeland sind zu weit von Großbritannien entfernt, um von ihnen wirksam verteidigt zu werden. Wir können nicht zulassen, dass sie von einer Nation übernommen werden, die [USA.GetNameDef] feindlich gesinnt ist."
 USA_secure_asia:1 "Sicheres Asien"
 USA_secure_asia_desc:1 "Die Kolonialmächte in Europa scheinen entweder nicht willens oder nicht in der Lage zu sein, ihre asiatischen Kolonien wirksam zu verteidigen. Wir müssen diese Last für sie übernehmen, damit diese Gebiete nicht zum Ausgangspunkt weiterer Aggressionen werden."
 USA_global_hegemony:1 "Globale Hegemonie"
 USA_global_hegemony_desc:1 "Wir stehen kurz davor, eine globale Vormachtstellung zu erlangen, die es uns ermöglicht, allein durch unsere Existenz Konflikte zu verhindern. Wir müssen nur dafür sorgen, dass die verbleibenden Großmächte auf dem Planeten unsere Position anerkennen."
 USA_war_plans_division:1 "Abteilung für Kriegspläne"
 USA_war_plans_division_desc:1 "Auch wenn wir uns Frieden wünschen, müssen wir uns auf Krieg vorbereiten."
 USA_intervention_in_the_americas:1 "Intervention in Amerika"
 USA_intervention_in_the_americas_desc:1 "Unsere erste Aufgabe muss es sein, sicherzustellen, dass wir auf alle Eventualitäten in unserer eigenen Hemisphäre vorbereitet sind."
 USA_war_plan_green:1 "Kriegsplan Grün"
 USA_war_plan_green_desc:1 "Da sich Mexiko seit der Revolution in einem Zustand ständiger Instabilität befindet, müssen wir bereit sein, entschlossen einzugreifen."
 USA_war_plan_crimson:1 "Kriegsplan Crimson"
 USA_war_plan_crimson_desc:1 "Obwohl Kanada derzeit ein freundlicher Nachbar sein mag, muss dies nicht immer der Fall sein."
 USA_war_plan_gray:1 "Kriegsplan Grau"
 USA_war_plan_gray_desc:1 "Die Geschichte hat gezeigt, dass die karibischen Länder recht instabil sind. Sollte eines dieser Länder instabil werden, müssen wir möglicherweise rasch handeln, um die amerikanischen Interessen zu schützen."
 USA_hemisphere_defense:1 "Hemisphärenverteidigung"
 USA_hemisphere_defense_desc:1 "Ungeachtet aller ausländischen Verwicklungen müssen wir in erster Linie auf unsere eigene Nachbarschaft schauen."
 USA_intervention_in_europe:1 "Intervention in Europa"
 USA_intervention_in_europe_desc:1 "Weniger als zwei Jahrzehnte nach dem Ende des Ersten Weltkriegs stehen die europäischen Nationen erneut vor einem Krieg. Wir müssen vorbereitet sein, falls die Situation ein schnelles Eingreifen erfordert."
 USA_war_plan_gold:1 "Kriegsplan Gold"
 USA_war_plan_gold_desc:1 "Frankreich leidet unter innerer Spaltung und zunehmendem politischen Radikalismus, ist aber gleichzeitig eine der größten Militärmächte Europas. Diese Kombination bereitet vielen Menschen Unbehagen."
 USA_war_plan_silver:0 "Kriegsplan Silber"
 USA_war_plan_silver_desc:0 "Italien hat offen seine Ambitionen erklärt, den Mittelmeerraum zu beherrschen. Sollten seine imperialen Bestrebungen mit unseren Interessen kollidieren, müssen wir vorbereitet sein."
 USA_anti_bolshevist_aid:1 "Antibolschewistische Hilfe"
 USA_anti_bolshevist_aid_desc:1 "Jede Waffe, Granate, Kugel und jedes Paar Stiefel, die wir denen geben können, die gegen die Ausbreitung des Kommunismus kämpfen, wird uns letztendlich bei unserer Verteidigung helfen."
 USA_war_plan_ruby:1 "Kriegsplan Ruby"
 USA_war_plan_ruby_desc:1 "In Indien leben unzählige Millionen Menschen, und wir müssen darauf vorbereitet sein, uns ihnen im Falle eines Konflikts zu stellen."
 USA_war_plan_scarlet_garnet:1 "Kriegsplan Scarlet Garnet"
 USA_war_plan_scarlet_garnet_desc:1 "Im Pazifik könnten Australien und Neuseeland ihrem Mutterland durchaus zu Hilfe kommen. Jeder Plan im Umgang mit Großbritannien muss jedoch auch dessen Kolonien berücksichtigen."
 USA_intervention_in_asia:1 "Intervention in Asien"
 USA_intervention_in_asia_desc:1 "Asien wird oft von den Entwicklungen in Europa überschattet und hat seine eigenen Krisenherde, die uns zwingen, uns auf eine Intervention vorzubereiten."
 USA_war_plan_yellow:1 "Kriegsplan Gelb"
 USA_war_plan_yellow_desc:1 "China befindet sich seit mehr als einer Generation in einem Bürgerkrieg. Es ist nicht abzusehen, wann sich die Lage so weit zuspitzt, dass wir eingreifen müssen."
 USA_war_department:1 "Kriegsministerium"
 USA_war_department_desc:1 "In einem Zeitalter industrialisierter Kriegsführung brauchen wir eine Regierung, die in der Lage ist, das volle Potenzial der Ressourcen unserer großen Nation auszuschöpfen."
 USA_selective_training_act:1 "Gesetz zur selektiven Ausbildung"
 USA_selective_training_act_desc:1 "Die Vereinigten Staaten haben in der Vergangenheit selbst in Kriegszeiten nur zögerlich die Wehrpflicht eingeführt. Wir können uns diesen Luxus nicht mehr leisten."
 USA_louisiana_maneuvers:1 "Louisiana-Manöver"
 USA_louisiana_maneuvers_desc:1 "Aufgrund von Budgetbeschränkungen waren wir gezwungen, viele militärische Entwicklungen aus der Ferne zu beobachten. Nun können wir einige unserer Theorien endlich in der Praxis erproben."
 USA_airborne_divisions:1 "Luftlandedivisionen"
 USA_airborne_divisions_desc:1 "Die Weiterentwicklung der Reichweite und Nutzlast von Flugzeugen eröffnet zahlreiche Möglichkeiten. Transportflugzeuge könnten ganze Truppendivisionen weit hinter die feindlichen Linien bringen und dort verheerende Schäden anrichten."
 USA_army_of_the_united_states:1 "Armee der Vereinigten Staaten"
 USA_army_of_the_united_states_desc:1 "Für die bevorstehenden Kämpfe ist die US-Armee zu klein. Um die dramatische Vergrößerung bewältigen zu können, die wir bewältigen müssen, müssen wir eine neue Organisation schaffen."
 USA_womens_armed_service_integration_act:1 "Gesetz zur Integration von Frauen in den Streitkräften"
 USA_womens_armed_service_integration_act_desc:1 "Wir können es uns nicht leisten, jemanden abzuweisen, der dienen möchte. Jede Frau in Uniform macht einen Mann frei, der an der Front kämpfen kann."
 USA_tank_experiments:1 "Panzerexperimente"
 USA_tank_experiments_desc:1 "Panzer sind auf dem modernen Schlachtfeld unverzichtbar. Wir müssen herausfinden, wie wir sie am besten einsetzen können."
 USA_tank_destroyer_doctrine:1 "Panzerzerstörer-Doktrin"
 USA_tank_destroyer_doctrine_desc:1 "Eine umstrittene Theorie einiger Artillerieoffiziere besagt, dass die beste Waffe gegen Panzerdurchbrüche ein schnelles, leicht gepanzertes, aber schwer bewaffnetes Fahrzeug sei."
 USA_main_battle_tanks:1 "Kampfpanzer"
 USA_main_battle_tanks_desc:1 "Die Praxiserfahrung hat deutlich gezeigt, dass ein Panzer eine Vielzahl von Aufgaben erfüllen muss, von der Infanterieunterstützung bis hin zur Bekämpfung feindlicher Panzer. Die Entwicklung von Fahrzeugen, die diesen Anforderungen gerecht werden, ermöglicht uns eine Rationalisierung der Produktion."
 USA_armored_infantry:1 "Gepanzerte Infanterie"
 USA_armored_infantry_desc:1 "Panzer allein können eine Schlacht nicht gewinnen. Um ein Gebiet zu halten, braucht es Infanterie. Mit gepanzerten Fahrzeugen können sie mit den Panzern mithalten und allem standhalten, was auf sie zukommt."
 USA_build_the_pentagon:1 "Bauen Sie das Pentagon"
 USA_build_the_pentagon_desc:1 "Der Ausbau unseres Militärs erfordert ein neues globales Hauptquartier, das es befehligt."
 USA_department_of_defense:1 "Verteidigungsministerium"
 USA_department_of_defense_desc:1 "Die Umbenennung des Kriegsministeriums unterstreicht, dass wir unseren Schutz nicht länger ignorieren können, bis er auf die Probe gestellt wird. Wir müssen stets wachsam sein."
 USA_escort_fighters:1 "Eskortjäger"
 USA_escort_fighters_desc:1 "Während der Bomber möglicherweise immer durchkommt, ist dies für seinen Flügelmann möglicherweise nicht der Fall – es sei denn, beide werden von befreundeten Jägern geschützt."
 USA_us_army_airforce:1 "Luftwaffe der US-Armee"
 USA_us_army_airforce_desc:1 "Das grundlegende Ziel der militärischen Luftstreitkräfte besteht darin, den Bodentruppen die Eroberung und Verteidigung von Gebieten zu ermöglichen. Alles andere ist zweitrangig."
 USA_us_air_force:1 "US-Luftwaffe"
 USA_us_air_force_desc:1 "Das grundlegende Ziel militärischer Luftstreitkräfte ist es, Kriege zu gewinnen. Strategische Bombenangriffe mit immer verheerenderen Waffen werden entweder den Widerstandswillen des Feindes brechen oder ihn materiell unfähig machen, Widerstand zu leisten."
 USA_two_ocean_navy_act:1 "Zwei-Ozean-Marinegesetz"
 USA_two_ocean_navy_act_desc:1 "Angesichts des bevorstehenden Krieges müssen wir sicherstellen, dass kein Feind jemals einen Fuß an die amerikanische Küste setzen kann. Unsere Marine muss in der Lage sein, jeden Feind auf den beiden großen Ozeanen, die unsere Grenzen bilden, zu bekämpfen."
 USA_maritime_commission:1 "Seefahrtskommission"
 USA_maritime_commission_desc:1 "Während sich die meisten Laien nur auf die Kriegsschiffe konzentrieren, wissen die wahren Experten, dass es die einfachen Frachtschiffe sind, die Kriege gewinnen. Um die Zahl der in Kriegszeiten verfügbaren Schiffe zu erhöhen, werden wir ein spezielles Gremium zur Koordinierung des Baus einrichten."
 USA_advanced_basing:1 "Erweiterte Basis"
 USA_advanced_basing_desc:1 "Je weiter wir den Feind von unseren Küsten fernhalten können, desto besser."
 USA_naval_radar:1 "Marineradar"
 USA_naval_radar_desc:1 "Radar bietet verlockende Möglichkeiten, unseren Feinden den Schutz der Nacht zu nehmen und sie auch bei schlechtem Wetter zu entdecken."
 USA_fleet_submarines:1 "Flotten-U-Boote"
 USA_fleet_submarines_desc:1 "Unsere wahrscheinlichsten Gegner im Seekrieg sind beide auf den Außenhandel angewiesen, der sich als sehr anfällig für U-Boote erwiesen hat. Diese U-Boote müssten über eine sehr große Reichweite verfügen, um die Ozeane überqueren und nahe der feindlichen Küste operieren zu können."
 USA_unrestricted_submarine_warfare:1 "Uneingeschränkter U-Boot-Krieg"
 USA_unrestricted_submarine_warfare_desc:1 "Die Geschichte hat gezeigt, dass jeder gut gemeinte Vertrag zur Kontrolle des U-Boot-Krieges das Papier nicht wert ist, auf dem er geschrieben steht. Wir sollten uns nicht an etwas gebunden fühlen, das unsere Feinde ohnehin ignorieren würden."
 can_degaussing_tech:0 "Nutzen Sie die Entmagnetisierungstechnologie"
 USA_great_depression_cooldown:0 "Neue Gesetze werden noch ausgearbeitet"
 USA_great_depression_cooldown_tt:0 "Nach der Verabschiedung dieses Gesetzes wird es §Y230 Tage§! dauern, bis weitere New-Deal-Gesetze ausgearbeitet und zur Unterzeichnung bereit sind.\n\n"
 USA_limited_intervention_tt:0 "\n\nDie Verabschiedung dieses Gesetzes wird es §Rerheblich schwieriger§! machen, Ihre Wirtschaft zu mobilisieren.\n\n"
 britain_enforced_our_loyalty:0 "Großbritannien hat unsere Loyalität erzwungen."
 sirte_oil_developed:0 "Erschließung der Sirte-Ölfelder"
 benghazi_oil_developed:0 "Ölfelder in Bengasi erschlossen"
 TREE_FILTER_TOGGLE:0 "§GKlicken§!, um die Anzeige weiterer Filter ein- und auszuschalten"
SPR_restoration_of_constitutional_monarchy:0 "Wiederbelebung der konstitutionellen Monarchie"
SPR_restoration_of_constitutional_monarchy_desc:0 "Befürworter der Wiedereinführung einer konstitutionellen Monarchie im Japan der Zwischenkriegszeit mit Kaiser Hirohito als symbolischem Staatsoberhaupt. Dieser Ansatz zielt darauf ab, traditionelle Werte und demokratische Bestrebungen in Einklang zu bringen."
SPR_establish_imperial_council:0 "Gründung des Kaiserlichen Beirats"
SPR_establish_imperial_council_desc:0 "Einrichten eines Beratungsgremiums aus Loyalisten und Beratern, um die Rolle der kaiserlichen Familie zu stärken und die Grundlage für ihre Beteiligung an der Gestaltung der Entwicklung Japans zwischen den Kriegen zu schaffen."
SPR_military_junta_support:0 "Unterstützung der Stabilisierungsbemühungen"
SPR_military_junta_support_desc:0 "Stärkung der Autorität der Militärjunta im Japan der Zwischenkriegszeit, Gewährleistung der Stabilität bei gleichzeitiger Vermeidung ziviler Konflikte. Dieser Weg beinhaltet eine stärkere Beteiligung des Militärs an der Regierungsführung und die Auseinandersetzung mit abweichenden Meinungen durch Verhandlungen und Zusammenarbeit."
SPR_fascist_movement_dominance:0 "Stärkung der faschistischen Bewegung"
SPR_fascist_movement_dominance_desc:0 "Knüpfen Sie engere Beziehungen zur faschistischen politischen Partei und integrieren Sie sie in die Regierungsstruktur der Zwischenkriegszeit. Dieser Ansatz erleichtert Entscheidungen, die der faschistischen Bewegung einen bedeutenden Einfluss einräumen und sie zur Gestaltung der Zwischenkriegspolitik beitragen."
SPR_legitimize_imperial_claim:0 "Bestätigung der imperialen Autorität"
SPR_legitimize_imperial_claim_desc:0 "Setzen Sie sich für die Legitimität von Kaiser Hirohito ein und gewinnen Sie Unterstützung für seinen Anspruch, der rechtmäßige Herrscher des Zwischenkriegsjapans zu sein. Ziel ist es, verschiedene Fraktionen unter dem Banner des Erbes der kaiserlichen Familie zu vereinen."
SPR_rural_defense_networks:0 "Aufbau ländlicher Verteidigungsnetzwerke"
SPR_rural_defense_networks_desc:0 "Aufbau von Guerilla-Verteidigungsnetzwerken in ländlichen Regionen, die während der Zwischenkriegszeit Japans nationalistischen Idealen nahestanden. Ziel dieser Bemühungen ist es, die Unterstützung dieser Gebiete zu konsolidieren und Grundlagen für künftige Unternehmungen zu schaffen."
SPR_infiltration_of_the_military:0 "Infiltration des Militärs"
SPR_infiltration_of_the_military_desc:0 "Versuch, während der Zwischenkriegszeit in Japan Sympathisanten innerhalb der regulären Armee zu gewinnen, indem wichtige Garnisonen und Militäreinrichtungen gesichert wurden, um nationalistische Ziele voranzutreiben."
SPR_workingclass_solidarity:0 "Solidarität innerhalb der Arbeiterklasse"
SPR_workingclass_solidarity_desc:0 "Engagieren Sie sich im Japan der Zwischenkriegszeit in Arbeiterorganisationen und nationalistischen Parteien, um eine einheitliche Front gegen die gegnerischen Fraktionen aufzubauen."
SPR_urban_proletariat_support:0 "Unterstützung des städtischen Proletariats gewinnen"
SPR_urban_proletariat_support_desc:0 "Konzentrieren Sie sich darauf, im Japan der Zwischenkriegszeit Unterstützung von der städtischen Arbeiterklasse zu gewinnen und Proteste zur Förderung nationalistischer Ideale zu organisieren."
SPR_international_alliances:0 "Internationale Vernetzung"
SPR_international_alliances_desc:0 "Knüpfen Sie Verbindungen zu globalen nationalistischen Bewegungen im Japan der Zwischenkriegszeit, um ausländische Unterstützung für die nationalistische Sache zu gewinnen."
SPR_prepare_for_the_future:0 "Vorbereitung auf zukünftige Herausforderungen"
SPR_prepare_for_the_future_desc:0 "Angesichts der zunehmenden Spannungen im Zwischenkriegsjapan steht das Land vor einem entscheidenden Moment. Der Fokus „Zukunft“ umfasst Vorbereitungen für verschiedene mögliche Szenarien, darunter die Bildung von Allianzen, die Stärkung nationaler Institutionen und die Vorbereitung des Landes auf kommende Herausforderungen. Die hier getroffenen Entscheidungen werden den Weg und die globale Rolle des Landes prägen."
SPR_coalition_building:0 "Bildung kollaborativer Allianzen"
SPR_coalition_building_desc:0 "Bilden Sie im Japan der Zwischenkriegszeit eine Koalition mit verschiedenen nationalistischen und autoritären Fraktionen, um eine geschlossene Front zu bilden. Ziel ist es, breite Unterstützung für nationalistische Ziele zu gewinnen."
SPR_imperial_restoration_campaign:0 "Kampagne zur Wiederherstellung des Kaiserreichs"
SPR_imperial_restoration_campaign_desc:0 "Kaiser Hirohito als legitimen Herrscher des Zwischenkriegsjapans zu propagieren. Ziel dieses Schwerpunkts ist es, Unterstützung für den Anspruch der kaiserlichen Familie zu gewinnen und eine treue Anhängerschaft aufzubauen."
SPR_intellectual_support:0 "Intellektuelle Unterstützung gewinnen"
SPR_intellectual_support_desc:0 "Engagieren Sie sich im Japan der Zwischenkriegszeit mit nationalistischen Intellektuellen und Künstlern, um kulturellen Einfluss zu gewinnen und nationalistische Ideale zu verbreiten. Dieser Ansatz ermöglicht Entscheidungen zur Organisation kultureller Veranstaltungen und zur Verbreitung von Propagandaliteratur."
SPR_focus_on_northern_territories:0 "Priorisierung der nördlichen Territorien"
SPR_focus_on_northern_territories_desc:0 "Konzentrieren Sie sich in der Zwischenkriegszeit auf die Sicherung der nördlichen Gebiete Japans und die Stärkung seiner Ansprüche auf diese Regionen."
SPR_secure_our_borders:0 "Sicherung nationaler Grenzen"
SPR_secure_our_borders_desc:0 "Umsetzung von Maßnahmen zur Stärkung der Grenzsicherheit im Japan der Zwischenkriegszeit und zur Wahrung der territorialen Integrität des Landes."
SPR_prepare_for_conflict:0 "Vorbereitung auf mögliche Konflikte"
SPR_prepare_for_conflict_desc:0 "Bereiten Sie sich auf mögliche Konflikte im Japan der Zwischenkriegszeit vor und verbessern Sie Ihre militärischen Fähigkeiten."
SPR_focus_on_southern_islands:0 "Schwerpunkt auf den südlichen Inseln"
SPR_focus_on_southern_islands_desc:0 "Konzentrieren Sie sich in der Zwischenkriegszeit auf die Sicherung der südlichen Inseln Japans und die Stärkung seiner Ansprüche auf diese Regionen."
SPR_focus_on_eastern_regions:0 "Fokus auf östliche Regionen"
SPR_focus_on_eastern_regions_desc:0 "Richten Sie Ihre Aufmerksamkeit auf die Stärkung und Festigung der Präsenz Japans in den östlichen Regionen während der Zwischenkriegszeit."
SPR_consolidate_our_positions:0 "Positionskonsolidierung"
SPR_consolidate_our_positions_desc:0 "Implementieren Sie Maßnahmen zur Festigung der Kontrolle über wichtige strategische Positionen und Einflusszentren im Japan der Zwischenkriegszeit."
SPR_focus_on_western_regions:0 "Fokus auf westliche Regionen"
SPR_focus_on_western_regions_desc:0 "Richten Sie Ihre Aufmerksamkeit auf die Stärkung und Festigung der Präsenz Japans in den westlichen Regionen während der Zwischenkriegszeit."
SPR_nationalist_campaign:0 "Förderung nationalistischer Werte"
SPR_nationalist_campaign_desc:0 "Bekennen Sie sich zu nationalistischen Werten und starten Sie eine Kampagne, um Unterstützung für das autoritäre Regime im Japan der Zwischenkriegszeit zu gewinnen. Ziel ist es, die Verbindungen zu nationalistischen Gruppierungen zu stärken und die Position des Regimes zu festigen."
SPR_authoritarian_coalition:0 "Einheit unter autoritären Kräften"
SPR_authoritarian_coalition_desc:0 "Bilden Sie im Japan der Zwischenkriegszeit eine Koalition mit verschiedenen autoritären und nationalistischen Fraktionen, um eine Einheitsfront zu bilden. Ziel ist es, breite Unterstützung für die nationalistische Sache zu gewinnen."
SPR_workers_unity:0 "Einheit unter den Arbeitern"
SPR_workers_unity_desc:0 "Vereinen Sie verschiedene sozialistische und kommunistische Fraktionen unter dem Banner einer geschlossenen nationalistischen Allianz im Japan der Zwischenkriegszeit. Ziel ist die Bildung einer starken und vereinten nationalistischen Koalition."
SPR_militarization_of_society:0 "Militarisierung der Gesellschaft"
SPR_militarization_of_society_desc:0 "Trainieren und mobilisieren Sie nationalistische paramilitärische Einheiten im Japan der Zwischenkriegszeit, um strategische Standorte zu schützen und Widerstand zu bekämpfen. Dieser Fokus ermöglicht die Gründung der Imperial Guards, einer dem Regime treu ergebenen Truppe."
  ITA_border_clashes_in_ethiopia:0 "Grenzkonflikte in Äthiopien"
  ITA_border_clashes_in_ethiopia_desc:0 "Wir werden anfangen, etwas für die Zukunft vorzubereiten …"
  ITA_march_on_rome:0 "Marsch auf Rom"
  ITA_march_on_rome_desc:0 "Der Moment ist gekommen, die Macht zu ergreifen und eine neue Ära für Italien einzuläuten. Wir werden unsere Anhänger mobilisieren und einen Marsch nach Rom anführen, um uns am Sitz der Macht zu treffen und den Rücktritt der derzeitigen Regierung und die Einsetzung einer neuen Führung zu fordern, die die Interessen des italienischen Volkes wirklich vertritt."
  ITA_a_modern_industry:0 "Eine moderne Industrie"
  ITA_a_modern_industry_desc:0 "Wir haben unsere Branche erfolgreich modernisiert"
  ITA_organizing_mass_demonstrations:0 "Organisation von Massendemonstrationen"
  ITA_organizing_mass_demonstrations_desc:0 "Es ist an der Zeit, unseren Unmut auf die Straße zu tragen. Wir werden Massendemonstrationen in den großen italienischen Städten organisieren, um die Bevölkerung zu mobilisieren und die Stärke unseres Widerstands gegen das derzeitige Regime zu demonstrieren."
  ITA_coordinated_strikes_and_sabotage:0 "Koordinierte Streiks und Sabotage"
  ITA_coordinated_strikes_and_sabotage_desc:0 "Wir werden die Arbeit der gegenwärtigen Regierung durch koordinierte Streiks und Sabotageakte stören. Indem wir wichtige Infrastrukturen und Versorgungsunternehmen angreifen, werden wir Chaos stiften und die Macht des Regimes schwächen."
  ITA_final_preparations:0 "Letzte Vorbereitungen"
  ITA_final_preparations_desc:0 "Die Zeit für entschlossenes Handeln rückt näher. Wir werden unsere Pläne finalisieren und sicherstellen, dass alle notwendigen Vorbereitungen für den bevorstehenden Marsch auf Rom getroffen sind. Unsere Streitkräfte werden organisiert, Ressourcen gesichert und Strategien entwickelt."
  ITA_defense_research_and_development:0 "Verteidigungsforschung und -entwicklung"
  ITA_defense_research_and_development_desc:0 "Um unsere führende Rolle in der Militärtechnologie zu behaupten, müssen wir der Verteidigungsforschung und -entwicklung Priorität einräumen. Wir werden spezielle Forschungsinstitute gründen, mit führenden Wissenschaftlern und Ingenieuren zusammenarbeiten und Ressourcen bereitstellen, um Innovationen in der Verteidigungstechnologie voranzutreiben."
  ITA_expansion_of_armaments_production:0 "Ausbau der Rüstungsproduktion"
  ITA_expansion_of_armaments_production_desc:0 "Italiens Rüstungsproduktion muss ausgebaut werden, um den Anforderungen moderner Kriegsführung gerecht zu werden. Wir werden die Produktionskapazität unserer Rüstungsindustrie erhöhen, neue Fabriken errichten und Maßnahmen ergreifen, um Produktionsprozesse zu rationalisieren und die Produktionsziele zu erreichen."
  ITA_technological_collaboration:0 "Technologische Zusammenarbeit"
  ITA_technological_collaboration_desc:0 "Kein Land kann die Modernisierung isoliert bewältigen. Wir werden die technologische Zusammenarbeit mit anderen Ländern fördern, Forschungspartnerschaften aufbauen, Fachwissen austauschen und uns an internationalen Verteidigungsprogrammen beteiligen, um unseren technologischen Fortschritt zu beschleunigen."
  ITA_command_and_control_systems:0 "Befehls- und Kontrollsysteme"
  ITA_command_and_control_systems_desc:0 "Die Effizienz und Koordination unserer Streitkräfte hängen von effektiven Führungs- und Kontrollsystemen ab. Wir werden in fortschrittliche Kommunikationstechnologie investieren, zentralisierte Kommandostrukturen aufbauen und Systeme für den Echtzeit-Austausch von Informationen vom Gefechtsfeld entwickeln."
  ITA_logistics_and_supply_chain_optimization:0 "Logistik- und Lieferkettenoptimierung"
  ITA_logistics_and_supply_chain_optimization_desc:0 "Ein gut funktionierendes Logistiksystem ist für ein modernes Militär von entscheidender Bedeutung. Wir werden unsere Lieferketten optimieren, Transportnetzwerke rationalisieren und effiziente Systeme für die Beschaffung, Lagerung und Verteilung militärischer Ressourcen entwickeln."
  ITA_mediterranean_dominance:0 "Mediterrane Dominanz"
  ITA_mediterranean_dominance_desc:0 "Das Mittelmeer muss für Italien wieder zu einem Mare Nostrum werden. Wir werden eine schlagkräftige Flotte aufbauen, in der gesamten Region Marinestützpunkte errichten und die Kontrolle über wichtige strategische Punkte sichern, um unsere Vorherrschaft über dieses lebenswichtige Meer zu sichern."
  ITA_red_sea_trade_routes:0 "Handelsrouten am Roten Meer"
  ITA_red_sea_trade_routes_desc:0 "Italien strebt die Kontrolle über die lukrativen Handelsrouten im Roten Meer an. Wir werden versuchen, an strategischen Standorten wie Eritrea und Somalia Marinestützpunkte zu errichten und unsere Präsenz in den wichtigen maritimen Handelsnetzwerken zwischen Europa, Asien und Afrika zu sichern."
  ITA_training_reforms:0 "Ausbildungsreformen"
  ITA_training_reforms_desc:0 "Ein modernes Militär benötigt hochqualifiziertes Personal. Wir werden unsere Ausbildungsprogramme überarbeiten und neue Methoden, fortschrittliche Simulationen und spezialisierte Ausbildungszentren einführen, um die Fähigkeiten und Fertigkeiten unserer Soldaten zu verbessern."
  ITA_libyan_consolidation:0 "Libysche Konsolidierung"
  ITA_libyan_consolidation_desc:0 "Libyen soll der Eckpfeiler unserer nordafrikanischen Besitzungen sein. Wir werden uns darauf konzentrieren, unsere Kontrolle über Libyen zu festigen, eine stabile Kolonialverwaltung aufzubauen und seine Ressourcen zum Nutzen des italienischen Kaiserreichs auszubeuten."
  ITA_mobilization_and_logistics:0 "Mobilisierung und Logistik"
  ITA_mobilization_and_logistics_desc:0 "Eine erfolgreiche Invasion erfordert eine effiziente Mobilisierung und Logistik. Wir werden unsere Mobilisierungsbemühungen rationalisieren, Lieferketten verbessern und effiziente Transportnetze aufbauen, um sicherzustellen, dass unsere Streitkräfte während der Invasion gut ausgerüstet und unterstützt sind."
  ITA_north_african_expansion:0 "Nordafrikanische Expansion"
  ITA_north_african_expansion_desc:0 "Italiens Ambitionen erstrecken sich auf die riesigen Gebiete Nordafrikas. Wir werden uns darauf konzentrieren, unseren Einfluss und unsere Präsenz in der Region auszuweiten, Gebiete zurückzuerobern, die historisch zu Italien gehören, und eine starke Basis für unsere kolonialen Ambitionen zu schaffen."
  ITA_military_planning:0 "Militärische Planung"
  ITA_military_planning_desc:0 "Es ist an der Zeit, die Invasion Jugoslawiens vorzubereiten. Wir werden unsere besten Militärstrategen, Geheimdienstoffiziere und Logistikexperten zusammenbringen, um einen umfassenden Plan für die schnelle und erfolgreiche Eroberung Jugoslawiens zu entwickeln."
  ITA_building_strategic_alliances:0 "Aufbau strategischer Allianzen"
  ITA_building_strategic_alliances_desc:0 "Um einen positiven Ausgang der Invasion Jugoslawiens sicherzustellen, müssen wir strategische Allianzen mit unseren Nachbarstaaten schließen. Wir werden diplomatische Verhandlungen führen, Allianzen schmieden und uns die Unterstützung von Ländern sichern, die unsere Interessen in der Region teilen."
  ITA_air_superiority_campaign:0 "Luftüberlegenheitskampagne"
  ITA_air_superiority_campaign_desc:0 "Für eine erfolgreiche Invasion ist die Lufthoheit über Jugoslawien von entscheidender Bedeutung. Wir werden die Ausbildung unserer Luftwaffe intensivieren, die Flugzeugproduktion steigern und eine Luftkampagne starten, um die Vorherrschaft am Himmel zu erlangen und Jugoslawiens Verteidigung zu schwächen."
  ITA_strengthening_military_leadership:0 "Stärkung der militärischen Führung"
  ITA_strengthening_military_leadership_desc:0 "Das Militär braucht starke und fähige Führungspersönlichkeiten, die unser Land führen. Wir werden talentierte Offiziere identifizieren, diejenigen fördern, die Loyalität und Kompetenz bewiesen haben, und sicherstellen, dass unsere Streitkräfte von den besten und klügsten Köpfen geführt werden."
  ITA_rebuilding_trust:0 "Vertrauen wiederherstellen"
  ITA_rebuilding_trust_desc:0 "Das Militär muss das Vertrauen der italienischen Bevölkerung wiederherstellen. Wir werden Transparenzinitiativen starten, uns in der Bevölkerung engagieren und Reformen vorantreiben, um das Vertrauen und die Unterstützung der Bevölkerung zurückzugewinnen und sicherzustellen, dass das Militär als Kraft des Guten wirkt."
  ITA_purging_farleft_influence:0 "Den Einfluss der extremen Linken beseitigen"
  ITA_purging_farleft_influence_desc:0 "Auch extremistische Ideologien der extremen Linken stellen eine Bedrohung für unsere Stabilität dar. Wir werden einflussreiche Persönlichkeiten, die in der Zwischenkriegszeit mit radikalen linksradikalen Bewegungen in Verbindung standen, identifizieren und aus dem Amt entfernen. Ihr Einfluss muss beseitigt werden, um weitere Unruhen und Chaos zu verhindern."
  ITA_purging_mussolinis_legacy:0 "Die Säuberung von Mussolinis Erbe"
  ITA_purging_mussolinis_legacy_desc:0 "Mussolinis Erbe wirft weiterhin einen Schatten auf unsere Nation. Wir müssen seinen Einfluss beschneiden und die Überreste des Faschismus ausmerzen. Wir werden seinen Propagandaapparat zerschlagen, Sympathisanten aus Machtpositionen entfernen und dafür sorgen, dass seine Ideologie keinen Einfluss mehr hat."
  ITA_consolidating_power:0 "Konsolidierung der Macht"
  ITA_consolidating_power_desc:0 "Nach dem erfolgreichen Putsch müssen wir unsere Macht festigen und die Loyalität des Militärs sicherstellen. Wir werden illoyale Elemente ausmerzen, loyale Offiziere belohnen und das Militär umstrukturieren, um unsere Vision eines stärkeren Italiens zu verwirklichen."
  ITA_national_rejuvenation:0 "Nationale Erneuerung"
  ITA_national_rejuvenation_desc:0 "Unter unserer Führung wird Italien eine nationale Erneuerung erleben. Wir werden Reformen durchführen, um Disziplin und Effizienz in den Streitkräften wiederherzustellen, die Wirtschaft wiederzubeleben und Italiens Stellung als Großmacht auf der Weltbühne wiederherzustellen."
  ITA_covert_planning_and_recruitment:0 "Verdeckte Planung und Rekrutierung"
  ITA_covert_planning_and_recruitment_desc:0 "Hinter verschlossenen Türen werden wir unseren Putsch im Geheimen planen. Wir werden loyale Offiziere rekrutieren, ein Unterstützungsnetzwerk aufbauen und einen detaillierten Plan ausarbeiten, um die Kontrolle über wichtige Militäreinrichtungen, Kommunikationssysteme und Regierungsgebäude zu übernehmen."
  ITA_debug:0 "debuggen"
  ITA_debug_desc:0 ""
  ITA_swift_and_decisive_action:0 "Schnelles und entschlossenes Handeln"
  ITA_swift_and_decisive_action_desc:0 "Die Zeit zum Handeln ist gekommen. Wir werden unseren Plan schnell und entschlossen umsetzen. Koordinierte Angriffe auf strategische Ziele werden den Widerstand neutralisieren und unsere Kontrolle über die Regierung festigen. Der Putsch wird schnell erfolgen und so wenig Blutvergießen und Unruhen wie möglich verursachen."
  ITA_modernization_program:0 "Modernisierungsprogramm"
  ITA_modernization_program_desc:0 "Italiens Streitkräfte müssen einem umfassenden Modernisierungsprogramm unterzogen werden. Wir werden in neue Militärtechnologien investieren, unsere Ausrüstung verbessern und unsere Ausbildungsmethoden verbessern, um eine starke und leistungsfähige Streitmacht zu gewährleisten."
  ITA_defense_industry_expansion:0 "Expansion der Verteidigungsindustrie"
  ITA_defense_industry_expansion_desc:0 "Eine starke Rüstungsindustrie bildet das Rückgrat unserer Streitkräfte. Wir werden unsere heimische Rüstungsindustrie ausbauen, neue Fabriken errichten, die Beteiligung des Privatsektors fördern und die Forschung und Entwicklung militärischer Technologien vorantreiben."
  ITA_discontent_within_the_ranks:0 "Unzufriedenheit in den eigenen Reihen"
  ITA_discontent_within_the_ranks_desc:0 "In den Reihen der italienischen Armee brodelt Unzufriedenheit. Die weit verbreitete Enttäuschung über die derzeitige Regierung hat zu Unmut unter den Offizieren geführt. Wir müssen diese Gelegenheit nutzen, um ihre Unzufriedenheit zu nutzen und die Armee hinter einer neuen Führung zu vereinen."
  ITA_industrial_infrastructure_development:0 "Entwicklung der industriellen Infrastruktur"
  ITA_industrial_infrastructure_development_desc:0 "Italiens Verteidigungsindustrie benötigt eine robuste Infrastruktur. Wir werden in den Ausbau von Industrieanlagen wie Fabriken, Forschungszentren und Testgeländen investieren, um den Ausbau unserer Verteidigungsproduktionskapazitäten zu unterstützen."
  ITA_strengthening_the_armed_forces:0 "Stärkung der Streitkräfte"
  ITA_strengthening_the_armed_forces_desc:0 "Um Italiens Interessen zu schützen, müssen wir in unsere militärischen Fähigkeiten investieren. Wir werden unsere Streitkräfte modernisieren, moderne Waffen entwickeln und unsere Ausbildungsprogramme verbessern, um sicherzustellen, dass wir für die Verteidigung unseres Landes gerüstet sind."
  ITA_colonial_ambitions:0 "Koloniale Ambitionen"
  ITA_colonial_ambitions_desc:0 "Italien muss seinen früheren Ruhm als Kolonialmacht zurückgewinnen. Unser Ziel ist es, die italienische Vorherrschaft im Mittelmeerraum zu etablieren und unseren Einfluss in Nordafrika auszuweiten, indem wir Gebiete zurückerobern, die uns rechtmäßig gehören."
  ITA_reforming_the_parliament:0 "Reform des Parlaments"
  ITA_reforming_the_parliament_desc:0 "Mit dem Ende des Ersten Weltkriegs ist es an der Zeit, unsere politische Landschaft neu zu gestalten. Durch die Einführung von Wahlreformen und die Förderung einer breiteren Repräsentation werden wir sicherstellen, dass das italienische Parlament zu einer echten Stimme des Volkes wird."
  ITA_east_african_territories:0 "Ostafrikanische Gebiete"
  ITA_east_african_territories_desc:0 "Italiens Kolonialreich muss sich weiter nach Ostafrika ausdehnen. Wir werden unsere Dominanz über Gebiete wie Somalia, Dschibuti und Kenia behaupten, die italienische Kontrolle etablieren und ihre Ressourcen für unsere nationalen Interessen ausbeuten."
  ITA_military_equipment_upgrades:0 "Upgrades für militärische Ausrüstung"
  ITA_military_equipment_upgrades_desc:0 "Italiens militärische Ausrüstung muss auf den neuesten Stand gebracht werden. Wir werden in die Forschung und Entwicklung moderner Waffen investieren, unser bestehendes Arsenal modernisieren und unsere Streitkräfte mit Spitzentechnologie ausstatten."
  ITA_gathering_dissatisfied_forces:0 "Unzufriedene Kräfte sammeln"
  ITA_gathering_dissatisfied_forces_desc:0 "Die Unzufriedenheit mit der aktuellen italienischen Führung wächst. Wir werden auf unzufriedene Gruppen wie nationalistische Organisationen, Veteranen und verärgerte Politiker zugehen, um eine gemeinsame Front gegen die derzeitige Regierung zu bilden."
  GERCW_thousand_year_peace:0 "Tausendjähriger Frieden"
  GERCW_thousand_year_peace_desc:0 "Nachdem wir unsere Vorherrschaft gefestigt haben, ist es an der Zeit, unsere Macht zu festigen und einen dauerhaften Frieden anzustreben. Wir werden diplomatische Anstrengungen unternehmen, um unsere Beziehungen zu anderen Nationen zu stabilisieren, Zusammenarbeit und gegenseitiges Verständnis zu fördern und so die Grundlage für einen tausendjährigen Frieden zu schaffen."
  GERCW_launch_facilities:0 "Startanlagen"
  GERCW_launch_facilities_desc:0 "Für den Start unserer Weltraummissionen benötigen wir spezielle Einrichtungen. Wir werden hochmoderne Startrampen, Forschungszentren und Testanlagen errichten, um unsere Bemühungen zu unterstützen und den Erfolg unseres Raumfahrtprogramms sicherzustellen."
  GERCW_astronaut_training_program:0 "Astronauten-Trainingsprogramm"
  GERCW_astronaut_training_program_desc:0 "Unsere Astronauten müssen intensiv trainiert werden, um die Herausforderungen der Raumfahrt zu meistern. Wir werden ein Astronauten-Trainingsprogramm einrichten, um die besten und klügsten Köpfe zu rekrutieren und auszubilden, damit sie zu Pionieren unseres Raumfahrtprogramms werden."
  GERCW_lunar_orbital_missions:0 "Mondumlaufmissionen"
  GERCW_lunar_orbital_missions_desc:0 "Bevor wir eine Mondlandung versuchen, werden wir zunächst unbemannte Raumfahrzeuge in die Umlaufbahn des Mondes schicken. Diese Missionen ermöglichen es uns, wichtige Daten zu sammeln und die Durchführbarkeit einer bemannten Mondlandung zu beurteilen."
  GERCW_lunar_research_station:0 "Mondforschungsstation"
  GERCW_lunar_research_station_desc:0 "Um eine dauerhafte Präsenz auf dem Mond zu etablieren, werden wir eine Mondforschungsstation errichten. Diese Einrichtung wird als wissenschaftlicher Außenposten dienen, Experimente durchführen und wertvolle Daten sammeln, die unser Verständnis des Weltraums erweitern."
  GERCW_rocket_propelled_aircraft:0 "Raketengetriebene Flugzeuge"
  GERCW_rocket_propelled_aircraft_desc:0 "Raketen können die Luftkriegsführung revolutionieren. Wir werden das Potenzial raketengetriebener Flugzeuge ausloten und die Grenzen von Geschwindigkeit, Flughöhe und Manövrierfähigkeit erweitern. Unsere Flugzeuge werden mit beispielloser Wendigkeit durch die Lüfte gleiten und uns die Vorherrschaft in der Luft sichern."
  GERCW_satellite_technology:0 "Satellitentechnologie"
  GERCW_satellite_technology_desc:0 "Raketen können mehr als nur Zerstörung transportieren; sie können auch Nutzlasten von wissenschaftlicher Bedeutung transportieren. Wir werden uns auf die Satellitentechnologie konzentrieren und Satelliten in die Umlaufbahn bringen, um Informationen zu sammeln, globale Ereignisse zu überwachen und unser Kommunikationsnetz auszubauen."
  GERCW_lunar_landing_preparation:0 "Vorbereitung der Mondlandung"
  GERCW_lunar_landing_preparation_desc:0 "Die Zeit für unsere historische Mondlandung rückt näher. Wir werden unsere Vorbereitungen intensivieren, unsere Pläne verfeinern, Simulationen durchführen und sicherstellen, dass jeder Aspekt der Mission sorgfältig geplant und durchgeführt wird."
  GERCW_lunar_landing:0 "Mondlandung"
  GERCW_lunar_landing_desc:0 "Der Höhepunkt unseres Raumfahrtprogramms steht bevor. Wir werden eine bemannte Mission starten, um eine historische Mondlandung zu erreichen – eine monumentale Leistung für das Deutsche Reich und die Menschheit als Ganzes."
  GERCW_vision_of_the_stars:0 "Vision der Sterne"
  GERCW_vision_of_the_stars_desc:0 "Der Ehrgeiz des Deutschen Reiches kennt keine Grenzen. Wir werden uns auf eine große Mission begeben, den Kosmos zu erobern. Unsere Vision der Sterne wird unseren technologischen Fortschritt vorantreiben und uns zu neuen Ufern führen."
  GERCW_rocketry_advancements:0 "Fortschritte in der Raketentechnik"
  GERCW_rocketry_advancements_desc:0 "Der Schlüssel zum Erreichen der Sterne liegt in der fortschrittlichen Raketentechnik. Wir werden in die Forschung und Entwicklung modernster Raketentechnologien investieren, die Grenzen der Antriebssysteme erweitern und den Grundstein für unser Raumfahrtprogramm legen."
  GERCW_indoctrination_programs:0 "Indoktrinationsprogramme"
  GERCW_indoctrination_programs_desc:0 "Ideologische Reinheit ist für den Erfolg unseres Regimes von entscheidender Bedeutung. Wir werden umfassende Indoktrinationsprogramme einführen, die den Geist unserer Jugend prägen und eine unerschütterliche Treue zu den Idealen des Deutschen Reiches fördern."
  GERCW_lunar_orbital_missions:0 "Mondumlaufmissionen"
  GERCW_lunar_orbital_missions_desc:0 "Bevor wir eine Mondlandung versuchen, werden wir zunächst unbemannte Raumfahrzeuge in die Umlaufbahn des Mondes schicken. Diese Missionen ermöglichen es uns, wichtige Daten zu sammeln und die Durchführbarkeit einer bemannten Mondlandung zu beurteilen."
  GERCW_lunar_module_development:0 "Entwicklung der Mondlandefähre"
  GERCW_lunar_module_development_desc:0 "Für eine erfolgreiche Mondlandung ist die Entwicklung eines speziellen Mondmoduls erforderlich. Wir werden Ressourcen und wissenschaftliches Know-how für die Entwicklung und den Bau eines Moduls einsetzen, das Astronauten sicher zur Mondoberfläche und wieder zurück transportieren kann."
  GERCW_permanent_draft:0 "Ständiger Entwurf"
  GERCW_permanent_draft_desc:0 "Unsere Regierungsführung muss das volle Potenzial unserer Nation nutzen. Wir werden eine Politik der totalen Mobilisierung umsetzen und Wirtschaft, Gesellschaft und Militär zu einer einheitlichen und effizienten Maschinerie zusammenführen, die bereit ist, den Interessen des Deutschen Reiches zu dienen."
  GERCW_state_surveillance_apparatus:0 "Staatlicher Überwachungsapparat"
  GERCW_state_surveillance_apparatus_desc:0 "Um die Kontrolle zu behalten und jeglichen Widerspruch zu unterbinden, müssen wir einen umfassenden staatlichen Überwachungsapparat aufbauen. Wir werden ein Informantennetz aufbauen, die Geheimdienste ausbauen und die Aktivitäten unserer Bürger überwachen, um sicherzustellen, dass unsere Herrschaft unangefochten bleibt."
  GERCW_centralized_authority:0 "Zentralisierte Autorität"
  GERCW_centralized_authority_desc:0 "Um die Kontrolle zu behalten und die Effizienz unserer Regierungsführung zu gewährleisten, müssen wir die Autorität zentralisieren. Wir werden eine starke Zentralregierung errichten und die Macht in den Händen vertrauenswürdiger Personen konzentrieren, die unsere Politik mit eiserner Faust umsetzen und durchsetzen."
  GERCW_technocratic_council:0 "Technokratischer Rat"
  GERCW_technocratic_council_desc:0 "Das Streben nach technologischer Vorherrschaft erfordert zentralisiertes Fachwissen und Koordination. Wir werden einen Technokratenrat einrichten, der die klügsten Köpfe verschiedener wissenschaftlicher Disziplinen zusammenbringt. Dieser Rat wird unseren technologischen Fortschritt lenken, eine effiziente Ressourcenverteilung sicherstellen und unser wissenschaftliches Potenzial maximieren."
  GERCW_technological_leap:0 "Technologischer Sprung"
  GERCW_technological_leap_desc:0 "Wir werden den technologischen Fortschritt sprunghaft vorantreiben und eine neue Ära der Innovation einläuten. Wir werden Forschungsinstitute gründen, mit Wissenschaftlern und Ingenieuren zusammenarbeiten und erhebliche Mittel bereitstellen, um technologische Durchbrüche in verschiedenen Sektoren voranzutreiben."
  GERCW_industrial_infrastructure_expansion:0 "Ausbau der industriellen Infrastruktur"
  GERCW_industrial_infrastructure_expansion_desc:0 "Unsere Industrien benötigen eine robuste Infrastruktur, um zu florieren. Wir werden massiv in Infrastrukturprojekte investieren, darunter Verkehrsnetze, Kraftwerke und Kommunikationssysteme, und so eine solide Grundlage für nachhaltiges industrielles Wachstum schaffen."
  GERCW_technological_advancement_initiative:0 "Initiative für technologischen Fortschritt"
  GERCW_technological_advancement_initiative_desc:0 "Unser Erfolg im Krieg beruhte auf unserer technologischen Überlegenheit. Um unseren Vorsprung zu halten, werden wir eine umfassende Initiative zur weiteren Beschleunigung des technologischen Fortschritts starten. Wir werden spezielle Forschungseinrichtungen gründen, brillante Köpfe anziehen und erhebliche Ressourcen für den Ausbau unserer wissenschaftlichen Bemühungen bereitstellen."
  GERCW_advanced_weaponry_research:0 "Fortgeschrittene Waffenforschung"
  GERCW_advanced_weaponry_research_desc:0 "Unser Kriegssieg war zum Teil auf unsere überlegenen Waffen zurückzuführen. Wir müssen die Grenzen der Militärtechnologie weiter verschieben. Wir werden Ressourcen bereitstellen und Forschungsinitiativen ins Leben rufen, um fortschrittliche Waffen zu entwickeln, die uns auf dem Schlachtfeld einen deutlichen Vorteil verschaffen."
  GERCW_strategic_resource_extraction:0 "Strategische Ressourcengewinnung"
  GERCW_strategic_resource_extraction_desc:0 "Um unsere industrielle Macht zu erhalten, müssen wir den Zugang zu lebenswichtigen Ressourcen sichern. Wir werden der Gewinnung und Nutzung strategischer Ressourcen in unseren Territorien Priorität einräumen und Handelsabkommen schließen, um Ressourcen aus dem Ausland zu erwerben."
  GERCW_the_german_space_program:0 "Das deutsche Raumfahrtprogramm"
  GERCW_the_german_space_program_desc:0 "Die Eroberung der Erde allein reicht nicht. Wir müssen nach den Sternen greifen und unsere Vorherrschaft im Weltraum sichern. Wir werden in fortschrittliche Raketentechnik, Satellitentechnologie und Weltraumforschung investieren, um Deutschlands Vorherrschaft in der unendlichen Weite des Alls zu sichern."
  GERCW_fortress_europa:0 "Festung Europa"
  GERCW_fortress_europa_desc:0 "Die Meere müssen zu unserer Festung werden und das Reich vor allen zukünftigen Bedrohungen schützen. Wir werden in Seeverteidigung, Befestigungen und Spitzentechnologien investieren, um unsere Vorherrschaft über den Atlantik und das Mittelmeer zu sichern."
  GERCW_european_hegemony:0 "Europäische Hegemonie"
  GERCW_european_hegemony_desc:0 "Unsere Kontrolle über Europa ist unbestreitbar, doch um unsere Hegemonie zu festigen, müssen wir Stabilität bewahren und unsere Autorität durchsetzen. Wir werden Marionettenregierungen einsetzen, Widerstandsbewegungen unterdrücken und sicherstellen, dass unsere europäische Vorherrschaft unangefochten bleibt."
  GERCW_continue_autarky:0 "Autarkie fortsetzen"
  GERCW_continue_autarky_desc:0 "Um unsere Position als Industriemacht zu festigen, müssen wir wirtschaftliche Autarkie erreichen. Wir werden Maßnahmen ergreifen und in die heimische Industrie investieren, um unsere Abhängigkeit vom Außenhandel zu verringern und unsere wirtschaftliche Unabhängigkeit zu sichern."
  GERCW_iron_fist_governance:0 "Regierung mit eiserner Faust"
  GERCW_iron_fist_governance_desc:0 "Unser Regime wird mit eiserner Faust über eine eingeschüchterte Bevölkerung herrschen. Wir werden Andersdenkende unterdrücken, die Freiheit unterdrücken und einen totalitären Überwachungsstaat errichten. Wir werden die Propaganda verstärken, die Massen indoktrinieren und absolute Loyalität gegenüber der dunklen Sache sicherstellen."
  GERCW_instruments_of_terror:0 "Instrumente des Terrors"
  GERCW_instruments_of_terror_desc:0 "Wir werden eine Streitmacht aufbauen, die unseren Feinden Angst einjagt. Investieren Sie in moderne Waffen, entwickeln Sie rücksichtslose Taktiken und bilden Sie Elitesoldaten aus, die unsere dunklen Ideale verkörpern. Beherrschen Sie das Schlachtfeld und sorgen Sie dafür, dass unsere Feinde vor unserer Macht erzittern."
  GERCW_rebuilding_the_industrial_base:0 "Wiederaufbau der industriellen Basis"
  GERCW_rebuilding_the_industrial_base_desc:0 "Unser Fokus liegt auf Investitionen in die Infrastruktur, der Modernisierung von Fabriken und der Förderung technologischer Fortschritte, um die deutsche Industrie wiederzubeleben. Durch die Steigerung von Produktivität und Effizienz können wir im globalen Wettbewerb bestehen und die wirtschaftliche Stabilität für die Zukunft unseres Landes sichern."
  GERCW_debug:0 "debuggen"
  GERCW_debug_desc:0 ""
  GERCW_auftragstaktik:0 "Auftragstaktik"
  GERCW_auftragstaktik_desc:0 "Dieser deutsche Begriff lässt sich mit Einsatztaktik oder Einsatzführung übersetzen. Er bezeichnet einen dezentralen Führungsansatz, bei dem untergeordnete Einheiten zwar ein Einsatzziel erhalten, aber die Freiheit haben, sich an die jeweilige Situation vor Ort anzupassen und Entscheidungen zu treffen. Diese Strategie betont die Initiative und Verantwortung einzelner Kommandeure und fördert Flexibilität und Agilität bei der Durchführung von Einsätzen."
  GERCW_gleichschaltung:0 "Gleichschaltung"
  GERCW_gleichschaltung_desc:0 "Während des Zweiten Weltkriegs setzte die deutsche Regierung ein System zur Kontrolle der Zivilbevölkerung ein, das als Gleichschaltung bekannt war. Mit diesem Prozess versuchte das Nazi-Regime, alle Aspekte der Gesellschaft unter seine Kontrolle zu bringen und sie der nationalsozialistischen Ideologie anzupassen."
  GERCW_start_of_a_new_germany:0 "Beginn eines neuen Deutschlands"
  GERCW_start_of_a_new_germany_desc:0 "Nach der Auflösung der Achsenmächte und mit dem Wunsch, unsere Rolle auf der internationalen Bühne neu zu definieren, richteten wir, die deutsche Nation, unsere Aufmerksamkeit auf die Schaffung eines neuen Militärbündnisses, des Germanenpaktes. Ziel dieses Bündnisses war es, die Marionettenstaaten, die wir während des Krieges erworben hatten, in einem gemeinsamen militärischen Rahmen zusammenzuführen."
  GERCW_the_beginning_of_the_cold_war:0 "Der Beginn des Kalten Krieges"
  GERCW_the_beginning_of_the_cold_war_desc:0 "Der Kalte Krieg zwischen den Vereinigten Staaten und Deutschland beginnt. Wir müssen unser Bestes tun, um ihn zu gewinnen!"
  GERCW_reshape_africa:0 "Afrika neu gestalten"
  GERCW_reshape_africa_desc:0 "Nach unseren siegreichen Eroberungen im Zweiten Weltkrieg haben wir gemeinsam mit Italien die Neuordnung Afrikas in Angriff genommen. Aufgrund unserer gemeinsamen strategischen Interessen teilen wir den Kontinent, schmieden eine vereinte Achsenfront und leiten eine Ära des Fortschritts und des Wohlstands für unsere beiden Imperien ein. Gemeinsam gestalten wir Afrikas Schicksal neu und hinterlassen einen unauslöschlichen Eindruck in der Geschichte."
  GERCW_end_of_the_axis:0 "Ende der Achse"
  GERCW_end_of_the_axis_desc:0 "Als sich der Krieg dem Ende zuneigte und sich der Staub gelegt hatte, erkannten wir, die deutsche Nation, gemeinsam, dass das Achsenbündnis nicht länger notwendig war. Der Konflikt, der die Welt verzehrt hatte, war zu Ende, und die Ziele, die wir einst verfolgt hatten, waren entweder erreicht oder unerreichbar geworden. Die Achsenmächte hatten sich zunächst aufgrund gemeinsamer Ambitionen und strategischer Interessen zusammengeschlossen. Doch mit dem Ende des Krieges war eine solche Koalition nicht mehr nötig. Die verheerenden Auswirkungen des Konflikts, sowohl auf unsere eigene Nation als auch auf die Welt insgesamt, hatten unser kollektives Gewissen unauslöschlich geprägt."
  GERCW_issue_there_debts:0 "Geben Sie dort Schulden aus"
  GERCW_issue_there_debts_desc:0 "Als Siegernation Deutschland fordern wir von den Verlierern des Zweiten Weltkriegs, Verantwortung für ihr Handeln zu übernehmen und ihre Schulden bei uns zu begleichen. Sie müssen die finanzielle Last des Wiederaufbaus und der Entschädigung für die entstandenen Schäden tragen. Unser Beharren auf Restitution ist eine gerechte Konsequenz ihrer Aggression."
  GERCW_reorganize_france:0 "Frankreich neu organisieren"
  GERCW_reorganize_france_desc:0 "Wir haben im Zweiten Weltkrieg einen glorreichen Sieg errungen, und nun ist die Zeit gekommen, Frankreich gemäß unseren Vorstellungen neu zu organisieren. Unsere Pläne sind groß, und wir werden dieses eroberte Land so umgestalten, dass es unserem arischen Reich dient. Als Führer habe ich beschlossen, Heinrich Himmler französisches Territorium zu gewähren, als Zeichen der Anerkennung für seine unerschütterliche Loyalität und seine unschätzbaren Beiträge für unsere Sache. Wir sind uns der Bedeutung bewusst, die die Kontrolle strategischer Regionen und die Etablierung einer starken Präsenz in diesem eroberten Land mit sich bringt. Im Gegenzug für dieses Geschenk wird Himmler unser Reich weiter stärken, indem er Maßnahmen umsetzt, die unsere Herrschaft festigen und unsere Ideologie fördern. Wir stellen uns einen französischen Staat vor, der unseren Idealen entspricht, von unerwünschten Elementen gesäubert ist und sich dem größeren Ruhm des Dritten Reichs verschrieben hat."
  GERCW_the_new_age_of_europe:0 "Das neue Zeitalter Europas"
  GERCW_the_new_age_of_europe_desc:0 "Europa ist in ein neues Zeitalter eingetreten, ein von Deutschland dominiertes Zeitalter!"
  GERCW_ripe_the_riches:0 "Reif den Reichtum"
  GERCW_ripe_the_riches_desc:0 "Wir werden beginnen, die Reichtümer unseres Sieges zu ernten! Wir haben den Zweiten Weltkrieg gewonnen und nun verneigt sich die Welt vor unserem Willen."
  GERCW_preemptive_military_coup:0 "Präventiver Militärputsch"
  GERCW_preemptive_military_coup_desc:0 "Wir werden unsere Generäle ermächtigen, Deutschland in einen noch militaristischeren Staat zu verwandeln. Indem wir ihre Autorität und ihren Einfluss in unserer Regierung und Gesellschaft stärken, wollen wir unsere militärischen Fähigkeiten verbessern und Entscheidungsprozesse rationalisieren. Zu den wichtigsten Initiativen gehören die Umstrukturierung des Generalstabssystems, die Reorganisation des Oberkommandos, die Verbesserung der Militärakademien und die Förderung der Zusammenarbeit in der Rüstungsindustrie. Durch diese Maßnahmen werden wir das volle Potenzial unserer Streitkräfte freisetzen und Deutschland als beeindruckende globale Militärmacht etablieren."
  GERCW_german_disaster:0 "Deutsches Wunder" 
  GERCW_german_disaster_desc:0 ""
  GERCW_cultivating_aryan_supremacy:0 "Kultivierung der arischen Vorherrschaft"
  GERCW_cultivating_aryan_supremacy_desc:0 "Wir werden eine Doktrin des Hasses und der rassischen Überlegenheit propagieren. Wir werden Eugenikprogramme durchsetzen, unerwünschte Personen verfolgen und ausrotten und unsere Ideologie der arischen Dominanz durch Propaganda, Bildung und Massenindoktrination verbreiten."
  GERCW_reinforcing_the_waffenss:0 "Verstärkung der Waffen-SS"
  GERCW_reinforcing_the_waffenss_desc:0 "Unser Erfolg im Krieg war zu einem nicht unerheblichen Teil dem Mut und der Entschlossenheit der Waffen-SS zu verdanken. Wir werden diese Elitetruppe ausbauen und stärken und ihre Loyalität und Hingabe gegenüber dem Reich sicherstellen."
  GERCW_the_fhrers_legacy:0 "Das Erbe des Führers"
  GERCW_the_fhrers_legacy_desc:0 "Die Vision des Führers hat uns Triumphe beschert, und wir werden sein Andenken ehren, indem wir sein Erbe bewahren. Wir werden Denkmäler, Museen und Gedenkstätten errichten, die seine Leistungen verewigen und künftige Generationen von Deutschen inspirieren."
  GERCW_lunar_orbital_missions2:0 "Subventionierte Indoktrinationsprogramme"
  GERCW_lunar_orbital_missions2_desc:0 "Durch unseren Erfolg bei der Mondmission verfügen wir über die Mittel, um das Programm zu subventionieren!"
#JOS
JOS_reorganize_the_nation:0 "Reorganisieren Sie die Nation"
JOS_reorganize_the_nation_desc:0 "Korea ist sich im Kampf gegen die Japaner einig. Sobald wir jedoch Frieden mit ihnen schließen, wird das Machtvakuum in Korea nicht mehr aufzuhalten sein. Wir müssen unsere Regierung neu organisieren und unsere Macht festigen, wenn wir kein leichtes Ziel für die Japaner sein wollen."
JOS_become_the_bastion:0 "Werde zur Bastion"
JOS_become_the_bastion_desc:0 "Asien ist heutzutage ein Land der Schatten. In China herrscht Anarchie, die japanische Sonne bedroht die Freiheit der Region und die Sowjets und Mongolen wollen den Kontinent rot färben. In diesen schweren Zeiten müssen wir als Leuchtfeuer der Hoffnung agieren."
JOS_ignite_the_torch:0 "Entzünde die Fackel"
JOS_ignite_the_torch_desc:0 "Wir müssen zum Licht im Schatten werden, lasst uns unsere Fackeln entzünden!"
JOS_defend_korea:0 "Verteidige Korea"
JOS_defend_korea_desc:0 "Wenn wir Frieden haben wollen, muss jeder Koreaner bereit sein, Asien und sein Land zu verteidigen."
JOS_arrest_corrupt_politicians:0 "Verhaftung korrupter Politiker"
JOS_arrest_corrupt_politicians_desc:0 "Korea ist kein Ort für korrupte Politiker und japanische Kollaborateure. Jeder, der es wagt, sich der Stabilität unseres Landes entgegenzustellen, wird bestraft."
JOS_every_democrat_a_warrior:0 "Jeder Demokrat ein Krieger"
JOS_every_democrat_a_warrior_desc:0 "Inspiriert von der Légion étrangère in Frankreich müssen wir eine neue Armeebrigade aufstellen, die jedoch aus Exilanten und Menschen besteht, die in ganz Asien bereit sind, für die Demokratie zu kämpfen."
JOS_purge_the_communists:0 "Säubert die Kommunisten"
JOS_purge_the_communists_desc:0 "Kim Il-sung und Shin Chae-ho sind nichts weiter als radikale Agitatoren, die gegen die Demokratie sind. Wenn wir Stabilität in Korea erreichen wollen, müssen wir sie loswerden."
JOS_join_allies:0 "Schließen Sie sich den Verbündeten an"
JOS_join_allies_desc:0 "Die Demokratie wird derzeit durch faschistische und kommunistische Diktaturen bedroht. Wenn wir ihren Untergang verhindern wollen, müssen wir nach Verbündeten suchen."
JOS_the_rising_sun_must_set:0 "Die aufgehende Sonne muss untergehen"
JOS_the_rising_sun_must_set_desc:0 "Wenn Japan weiter expandiert, wird es in Asien keinen Frieden geben. Die aufgehende Sonne muss untergehen."
JOS_the_david_in_the_land_of_goliaths:0 "Der David im Land der Goliaths"
JOS_the_david_in_the_land_of_goliaths_desc:0 "So wie David in der biblischen Allegorie Goliath besiegte, werden wir darauf vorbereitet sein, die Goliaths des Westens und des Ostens zu besiegen."
JOS_begin_industralization:0 "Industrialisieren Sie die Metropole"
JOS_begin_industralization_desc:0 "Korea ist eine Agrargesellschaft. Wir müssen wie die Japaner industrialisieren, um unsere Feinde in Asien und dem Rest der Welt besiegen zu können."
JOS_continue_industralization:0 "Industrialisierung des ländlichen Raums"
JOS_continue_industralization_desc:0 "Korea ist noch immer eine Agrargesellschaft. Wir müssen wie die Japaner industrialisieren, um unsere Feinde in Asien und dem Rest der Welt besiegen zu können."
JOS_finish_industralization:0 "Industrialisierte Gesellschaft"
JOS_finish_industralization_desc:0 "Wir haben die Industrialisierung erreicht, wie einst die Japaner. Wir nähern uns dem Ziel, eine Großmacht in Asien zu werden."
JOS_improve_our_industry:0 "Arbeit an der industriellen Effizienz"
JOS_improve_our_industry_desc:0 "Wir sollten unsere Industrien verbessern, um unsere Produktion zu steigern."
JOS_improve_our_research:0 "Arbeiten zur Forschungseffizienz"
JOS_improve_our_research_desc:0 "Wir sollten unsere Forschungstechniken verbessern, damit wir schnellere Untersuchungen durchführen können."
JOS_trade_deals:0 "Ausländische Investitionen"
JOS_trade_deals_desc:0 "Um mehr Geld für unser Land zu bekommen, werden wir Handelsabkommen mit anderen Nationen abschließen."
JOS_arms_deals:0 "Aufbau ausländischer Waffen"
JOS_arms_deals_desc:0 "Um mehr Waffen für unser Land zu bekommen, werden wir Verträge mit anderen Nationen abschließen."
JOS_free_trade_deals_with_the_americas:0 "Freihandelsabkommen mit Amerika"
JOS_free_trade_deals_with_the_americas_desc:0 "Der Abschluss von Freihandelsabkommen mit dem amerikanischen Kontinent wird sicherlich dazu beitragen, unsere Handelskapazitäten und unsere Wirtschaft zu verbessern."
JOS_close_the_country:0 "Schließen Sie die Halbinsel"
JOS_close_the_country_desc:0 "Der Geist unseres Volkes wird nicht durch die Ideen des Rests der Welt vergiftet. Unsere Grenzen werden geschlossen bleiben, bis unser Volk aufgeklärt ist."
JOS_the_korean_miracle:0 "Das koreanische Wunder"
JOS_the_korean_miracle_desc:0 "Unglaublicherweise ist es Korea gelungen, seine Wirtschaft wieder anzukurbeln. Ob dies jedoch langfristig funktionieren wird, ist noch ungewiss."
JOS_expand_universities:0 "Universitätsgebäude"
JOS_expand_universities_desc:0 "Wir werden unsere Universitäten ausbauen, um bessere Wissenschaftler zu gewinnen."
JOS_encourage_research:0 "Forschung fördern"
JOS_encourage_research_desc:0 "Wir werden die Forschung fördern, um bessere Technologien zu entwickeln."
JOS_rearm_the_country:0 "Das Land wieder aufrüsten"
JOS_rearm_the_country_desc:0 "Die Uibyeong, die „Gerechten Armeen“, sind zivile Milizen, die in der koreanischen Geschichte mehrfach auftauchten, wenn die nationalen Armeen Unterstützung benötigten. Nach der Auflösung unserer Armeen durch Japan waren die Uibyeong jedoch die einzige Möglichkeit für unsere Regierung, zu kämpfen. Nun stellt sich die Frage: Sollen wir versuchen, unsere Armee zu modernisieren oder an der Uibyeong-Strategie festhalten, die unsere Nation während des großen Aufstands verteidigte?"
JOS_continue_the_uibyeong_strategy:0 "Fortsetzung der Uibyeong-Strategie"
JOS_continue_the_uibyeong_strategy_desc:0 "Die koreanische Regierung hat beschlossen, die Uibyeong-Strategie fortzusetzen, und daher wird unsere Doktrin auf Guerillakrieg und Sondierungsangriffen basieren."
JOS_imitate_the_west:0 "Imitieren Sie den Westen"
JOS_imitate_the_west_desc:0 "Die koreanische Regierung hat beschlossen, die westlichen Lehren zu übernehmen. Wir werden versuchen, unsere Lehrbücher und Technologien zu verbessern."
JOS_quantity_over_quality:0 "Quantität vor Qualität"
JOS_quantity_over_quality_desc:0 "Für unsere Truppen ist es besser, alte oder gewöhnliche Ausrüstung zu haben, als gar keine."
JOS_never_surrender:0 "Gib niemals auf"
JOS_never_surrender_desc:0 "Die Wiedererlangung unserer Unabhängigkeit war ein großer Kampf und wir werden dieses Mal nicht so leicht darauf verzichten."
JOS_guerrilla_warfare:0 "Guerillakrieg"
JOS_guerrilla_warfare_desc:0 "Der Begriff „Guerillakrieg“ entstand im Kontext des Spanischen Unabhängigkeitskrieges im 19. Jahrhundert. Er besteht darin, keine offenen Kämpfe zu führen, sondern stattdessen Hit-and-Run-Taktiken anzuwenden und die feindlichen Divisionen einzukreisen. Dieser Ansatz wird sich hervorragend zur Verteidigung unserer Nation eignen."
JOS_hill_fighters:0 "Bergkämpfer"
JOS_hill_fighters_desc:0 "Die koreanischen Guerillas sind es gewohnt, in Hügeln und Bergen zu kämpfen. Wir werden die besten Guerillas integrieren und sie zu den ersten Spezialeinheiten Koreas ausbilden."
JOS_integrate_the_militias:0 "Integrieren Sie die Milizen"
JOS_integrate_the_militias_desc:0 "Wir werden versuchen, alle Uibyeong in die koreanische Armee zu integrieren. Je mehr, desto besser."
JOS_qualitity_over_quantity:0 "Qualität vor Quantität"
JOS_qualitity_over_quantity_desc:0 "Wir werden keine Armee besiegen können, wenn unsere mit lächerlichen Waffen ausgerüstet ist. Wir müssen jetzt die aktuellen Standards erfüllen."
JOS_replicate_the_stahlhelm:0 "Replikieren Sie den Stahlhelm"
JOS_replicate_the_stahlhelm_desc:0 "Genau wie die Chinesen werden wir in unserer Armee mit der Einführung des Stahlhelms beginnen, um unsere Soldaten und unser Heimatland besser zu schützen."
JOS_the_importance_of_artillery:0 "Die Bedeutung der Artillerie"
JOS_the_importance_of_artillery_desc:0 "Der Westen hat uns gelehrt, wie wichtig es ist, für den Kampf gerüstete Artillerie zu haben. Wir werden dafür sorgen, dass jedes Regiment welche hat."
JOS_winter_corps:0 "Winterkorps"
JOS_winter_corps_desc:0 "Korea ist für seine kalten Winter bekannt. Wir müssen unsere Armeen an diese harten Bedingungen gewöhnen, wenn wir uns wehren wollen."
JOS_new_text_books:0 "Neue Lehrbücher"
JOS_new_text_books_desc:0 "Nachdem die neuen Reformen nun durchgeführt wurden, ist es an der Zeit, neue Lehrbücher zu erstellen."
JOS_the_new_korean_army:0 "Die neue koreanische Armee"
JOS_the_new_korean_army_desc:0 "Die neue koreanische Armee glänzt durch ihre Macht, jetzt muss jede Nation es sich zweimal überlegen, bevor sie uns angreift."
JOS_protect_our_coast:0 "Schützen Sie unsere Küsten"
JOS_protect_our_coast_desc:0 "Die Befestigung unserer Küsten wird uns vor Seeinvasionen durch Japan oder die Sowjets schützen."
JOS_fortify_the_nort:0 "Befestigt den Norden"
JOS_fortify_the_nort_desc:0 "Durch die Befestigung des Nordens sind wir besser vor einer chinesischen, russischen oder mandschurischen Invasion geschützt."
JOS_build_a_prideful_navy:0 "Bauen Sie eine stolze Marine auf"
JOS_build_a_prideful_navy_desc:0 "Wenn wir nicht erneut angegriffen werden wollen, müssen wir versuchen, unsere Marine so weit wie möglich zu verbessern."
JOS_learn_from_the_wolves:0 "Von den Wölfen lernen"
JOS_learn_from_the_wolves_desc:0 "Wölfe jagen in Rudeln, greifen größere Beutetiere von allen Seiten an und verfolgen sie, bis sie tot umfallen. Unsere U-Boote könnten noch das eine oder andere von ihnen lernen."
JOS_learn_from_the_bear:0 "Lerne vom Bären"
JOS_learn_from_the_bear_desc:0 "Bären sind einzelgängerische, aber kraftvolle Tiere. Kaum ein anderes Lebewesen in der Natur kann sie besiegen, und unsere Marine wird versuchen, ihrem Beispiel zu folgen."
JOS_design_destroyers:0 "Design-Zerstörer"
JOS_design_destroyers_desc:0 "Wir werden unser Bestes tun, um neue Zerstörer zu konstruieren, die mit der japanischen und europäischen Technologie konkurrieren können."
JOS_design_cruisers:0 "Design-Kreuzer"
JOS_design_cruisers_desc:0 "Wir werden unser Bestes tun, um neue Kreuzer zu konstruieren, die mit der japanischen und europäischen Technologie konkurrieren können."
JOS_design_battle_ships:0 "Design-Schlachtschiffe"
JOS_design_battle_ships_desc:0 "Wir werden unser Bestes tun, um neue Schlachtschiffe zu konstruieren, die mit der japanischen und europäischen Technologie konkurrieren können."
JOS_design_submarines:0 "Design-U-Boote"
JOS_design_submarines_desc:0 "Wir werden unser Bestes tun, um neue U-Boote zu konstruieren, die mit der japanischen und europäischen Technologie konkurrieren können."
JOS_make_the_pack_bigger:0 "Machen Sie das Paket größer"
JOS_make_the_pack_bigger_desc:0 "Im Jahr 1936 besaß die koreanische Nation keine U-Boote und deshalb werden wir versuchen, so viele wie möglich zu produzieren, um mit den großen Nationen der Welt konkurrieren zu können."
JOS_on_our_way_to_naval_dominance:0 "Auf dem Weg zur Seeherrschaft"
JOS_on_our_way_to_naval_dominance_desc:0 "Nachdem wir die Modelle unserer Über- und Unterwasserflotte aktualisiert und neue Marinedoktrinen erlernt haben, ist es an der Zeit, die Seeherrschaft in Asien anzustreben."
JOS_slay_the_dragons:0 "Töte die Drachen"
JOS_slay_the_dragons_desc:0 "Seit der Erschaffung der Voisin III im Jahr 1914 wimmelt es am Himmel von Drachen, die ganze Städte innerhalb weniger Minuten zerstören und niederbrennen können. In der Luft können wir nicht mit ihnen konkurrieren, am Boden schon."
JOS_become_the_dragon:0 "Werde zum Drachen"
JOS_become_the_dragon_desc:0 "Seit der Erschaffung der Voisin III im Jahr 1914 wimmelt es am Himmel von Drachen, die ganze Städte innerhalb weniger Minuten zerstören und niederbrennen können. Wir werden unser Bestes geben, um die neuen Drachen Asiens zu werden und sie in ihrem eigenen Spiel zu besiegen."
JOS_take_the_dragons_down:0 "Besiege die Drachen"
JOS_take_the_dragons_down_desc:0 "Wenn wir die Drachen besiegen wollen, müssen wir unsere Luftabwehr verbessern. Wir werden heute mit unseren Untersuchungen beginnen."
JOS_keep_the_skies_clear:0 "Halten Sie den Himmel klar"
JOS_keep_the_skies_clear_desc:0 "Wir werden versuchen, dem britischen Beispiel zu folgen und unsere Städte unbombbar zu machen. Und wenn uns das nicht gelingt, werden wir zumindest einige Piloten mit in den Abgrund nehmen."
JOS_no_bomb_shall_reach_seoul:0 "Keine Bombe wird Seoul erreichen"
JOS_no_bomb_shall_reach_seoul_desc:0 "Unser Himmel wird undurchdringlich, jede Stadt wird über eine Luftabwehrstellung verfügen, um sich zu verteidigen, und jeder Bürger wird wissen, was im Falle eines Bombenangriffs zu tun ist."
JOS_say_goodbye_to_the_voisins:0 "Verabschieden Sie sich von den Voisins"
JOS_say_goodbye_to_the_voisins_desc:0 "Da nun jede koreanische Stadt und Division über Luftabwehrstellungen verfügt, können wir uns von den Drachen verabschieden."
JOS_investigation_against_the_clock:0 "Gegen die Uhr"
JOS_investigation_against_the_clock_desc:0 "Das einzige Flugzeug, das die koreanische Nation jemals erforscht hat, ist ein alter Entwurf aus der Zwischenkriegszeit. Wir müssen jetzt neue Entwürfe entwickeln, bevor feindliche Bomber und Jäger unseren Himmel füllen."
JOS_bring_them_to_hell:0 "Bring sie zur Hölle"
JOS_bring_them_to_hell_desc:0 "Wir werden unsere ersten Bomber erforschen, um dann unsere feindlichen Nationen in die Hölle zu schicken."
JOS_investigate_western_strategies:0 "Untersuchen Sie westliche Strategien"
JOS_investigate_western_strategies_desc:0 "Wir werden die westlichen Luftdoktrinen untersuchen, damit wir mit den Luftstreitkräften unserer Feinde konkurrieren können."
JOS_defend_our_skies:0 "Verteidige unseren Himmel"
JOS_defend_our_skies_desc:0 "Nachdem wir unsere Fabriken nun an die Flugzeugproduktion gewöhnt haben, können wir den Himmel verteidigen und in Angst und Schrecken versetzen."
JOS_the_korean_turing:0 "Der koreanische Turing"
JOS_the_korean_turing_desc:0 "Alan Turing ist ein englischer Mathematiker und Pionier der theoretischen Informatik. Derzeit hilft er den Briten, die Codes ihrer Feinde zu knacken. Aber wer sagt, dass wir unseren eigenen Turing nicht auch hier in Korea finden können?"
JOS_the_first_korean_radar:0 "Das erste koreanische RADAR"
JOS_the_first_korean_radar_desc:0 "Mithilfe von Technologien des Britischen Empire werden wir versuchen, das erste asiatische RADAR zu bauen."
JOS_bring_democracy_to_asia:0 "Demokratie nach Asien bringen"
JOS_bring_democracy_to_asia_desc:0 "Asien ist seit Jahrhunderten die Sklavin von Despotismus, Kommunismus und Imperialismus. Wenn wir Frieden schaffen wollen, dürfen wir das nicht zulassen."
JOS_proclaim_the_anarchist_state:0 "Verkündet die anarchistische Revolution"
JOS_proclaim_the_anarchist_state_desc:0 "Weder Kommunismus noch Faschismus, noch Monarchien oder Demokratien können Korea retten. Unsere einzige Option ist die Anarchie, in der jeder Koreaner wirklich frei sein wird!"
JOS_aftermath_of_the_kim_plot:0 "Nachwirkungen der Kim-Verschwörung"
JOS_aftermath_of_the_kim_plot_desc:0 "Nach dem Kim-Komplott hat sich der Sturm gelegt. Hoffen wir, dass bald Ruhe einkehrt."
JOS_purge_the_traitors:0 "Säubert die Verräter"
JOS_purge_the_traitors_desc:0 "Nach der Kim-Verschwörung begann Armeechef Lee Beom-seok, Korea von Kommunisten, Anarchisten und Faschisten zu säubern, damit sich ein derartiges Ereignis nie wieder wiederholt."
JOS_collectivize_korea:0 "Kollektivierung Koreas"
JOS_collectivize_korea_desc:0 "Damit eine anarchistische Gesellschaft funktioniert, muss jedes Mitglied der Kommune auf seine Individualität verzichten. Jetzt sind wir alle eins und marschieren in Richtung Fortschritt!"
JOS_total_equality:0 "Totale Gleichheit"
JOS_total_equality_desc:0 "„Alle Männer sind gleich.“ Aber was ist mit den Frauen? In unserer Kommune haben beide die gleichen Rechte und natürlich auch Pflichten."
JOS_bring_kim_il_sung_back_from_exile:0 "Holen Sie Kim Il-sung aus dem Exil zurück"
JOS_bring_kim_il_sung_back_from_exile_desc:0 "Kim Il-sung wurde nach der Rückkehr des Königs aus dem Land vertrieben. Jetzt, da die alte Regierung und der König weg sind, ist es Zeit, den roten General zurückzubringen."
JOS_mold_the_korean_mind:0 "Formen Sie den koreanischen Geist"
JOS_mold_the_korean_mind_desc:0 "Wir müssen das koreanische Volk umerziehen, um künftige Aufstände und Revolutionen zu verhindern."
JOS_deal_with_the_reds:0 "Deal mit den Roten"
JOS_deal_with_the_reds_desc:0 "Wir werden den kommunistischen Generälen und Politikern enorme Vorteile verschaffen, damit wir innerhalb der koreanischen Nation keine Feinde haben."
JOS_anarcho_communism:0 "Anarcho-Kommunismus"
JOS_anarcho_communism_desc:0 "Die Zerstörung des Kapitalismus, der Lohnarbeit und des Privateigentums zugunsten des Gemeineigentums an den Produktionsmitteln und der direkten Demokratie – wer würde nicht gerne in einem solchen Land leben?"
JOS_the_one_people_theory:0 "Die Ein-Volk-Theorie"
JOS_the_one_people_theory_desc:0 "Shin Chae-ho glaubt, dass die heutigen Koreaner und die Menschen in der Mandschurei einer einzigen Rasse angehörten, die einen angestammten Anspruch auf Korea und die Mandschurei hat. Diesem Anspruch werden wir nun nachkommen."
JOS_proclaim_the_east_asian_state:0 "Verkündet den ostasiatischen Staat"
JOS_proclaim_the_east_asian_state_desc:0 "Die einzige Möglichkeit, Ostasien zu stabilisieren, besteht darin, den Anarchismus dorthin zu bringen. Wir müssen alle ostasiatischen Länder unter einer Nation vereinen!"
JOS_liberate_north:0 "Befreie den Norden"
JOS_liberate_north_desc:0 "Die Revolution marschiert nach Norden."
JOS_liberate_west:0 "Befreie den Westen"
JOS_liberate_west_desc:0 "Die Revolution marschiert nach Westen."
JOS_liberate_center:0 "Befreie das Herz"
JOS_liberate_center_desc:0 "Die Revolution marschiert ins Herz Chinas."
JOS_liberate_south:0 "Befreit den Süden"
JOS_liberate_south_desc:0 "Die Revolution marschiert nach Süden."
JOS_liberate_islands:0 "Befreie die Inseln"
JOS_liberate_islands_desc:0 "Die Revolution wird auf die Inseln kommen."
JOS_liberate_the_sons_of_mother_anarchy:0 "Befreit die Söhne von Mutter Anarchie"
JOS_liberate_the_sons_of_mother_anarchy_desc:0 "Die Söhne der Mutter Anarchie sind Sklaven der westlichen Diktaturen, es ist unsere Pflicht, sie zu befreien."
JOS_integrate_the_iberian_anarchists:0 "Integrieren Sie die iberischen Anarchisten"
JOS_integrate_the_iberian_anarchists_desc:0 "Wir werden die Anarchisten der Iberischen Halbinsel zu Bündniszwecken kontaktieren … Ja …"
JOS_end_the_regency:0 "Beenden Sie die Regentschaft"
JOS_end_the_regency_desc:0 "Die Militärjunta Koreas entschied, dass die Wiederherstellung des koreanischen Throns der beste Weg zur Sicherung der Stabilität Koreas sei. Es bleibt jedoch ein großes Problem hinsichtlich der Frage, wer der legitime Erbe des koreanischen Throns ist."
JOS_mandatory_military_training:0 "Obligatorische militärische Ausbildung"
JOS_mandatory_military_training_desc:0 "Wenn wir unser Land vor ausländischen Bedrohungen schützen wollen, sollte jeder Koreaner mit dem Gewehr umgehen können. Das kommt auch ihnen zugute, da sie durch ihren Militärdienst Vorteile wie eine günstigere Gesundheitsversorgung und eine gute Wohnsituation erhalten."
JOS_jeogyeogbyeong:0 "Jeogyeogbyeong"
JOS_jeogyeogbyeong_desc:0 "Jeogyeogbyeong ist die Bezeichnung für Scharfschützen in Korea. In Europa ist erwiesen, dass Scharfschützen in Schlachten eine wichtige Rolle spielen. Daher wäre es für unsere Armee von Vorteil, in jedem Bataillon einige Scharfschützen zu haben."
JOS_japanese_dockyards:0 "Japanische Werften"
JOS_japanese_dockyards_desc:0 "Wir werden mit den Japanern Geschäfte machen, um einige Werften zu bekommen und so unsere Marine zu erweitern."
JOS_acquire_japanese_designs:0 "Erwerben Sie japanische Designs"
JOS_acquire_japanese_designs_desc:0 "Die Japaner haben ein neues Torpedomodell entwickelt, das jedes westliche Schiff besiegen kann. Es wäre nett von ihnen, wenn sie uns diese Entwürfe zeigen würden."
JOS_the_best_ships_of_asia:0 "Die besten Schiffe Asiens"
JOS_the_best_ships_of_asia_desc:0 "Wir werden neue Schiffsdesigns erforschen, damit wir nicht nur mit den westlichen und japanischen Schiffen konkurrieren, sondern sie auch übertreffen können."
JOS_the_devil_you_know:0 "Der Teufel, den du kennst"
JOS_the_devil_you_know_desc:0 "Viele Menschen sind vielleicht wütend über die Entscheidung der Regierung, erneut auf die Japaner zuzugehen, aber wie man so schön sagt: Besser den Teufel, den man kennt, als den, den man nicht kennt."
JOS_seek_help_from_the_kaiserreich:0 "Bitten Sie das Kaiserreich um Hilfe"
JOS_seek_help_from_the_kaiserreich_desc:0 "Als wir 1905 von den Japanern überfallen wurden, leisteten uns weder die Russen noch die Amerikaner noch die Briten Beistand. Wir können ihnen nicht vertrauen, und so bleibt uns derzeit nur der Feind der drei, das Deutsche Reich."
JOS_reorganize_the_state:0 "Kims Traum"
JOS_reorganize_the_state_desc:0 "Präsident Kim Il-sung wird seine Mission beginnen, Korea in eine strahlende kommunistische Nation zu verwandeln, wie es sein sollte!"
JOS_achieve_total_power:0 "Erreichen Sie die totale Leistung"
JOS_achieve_total_power_desc:0 "Der einzige Mann, der geeignet ist, Korea zu führen, ist unser Retter Kim Il-sung. Deshalb verdienen alle, die sich ihm widersetzen oder dies in Zukunft tun könnten, die Hinrichtung."
JOS_restore_the_caste_system:0 "Wiederherstellung des Kastensystems"
JOS_restore_the_caste_system_desc:0 "Was Korea braucht, ist eine Möglichkeit, seine Bürger in diejenigen einzuteilen, die dem Land treu sind, diejenigen, denen es gleichgültig ist, und diejenigen, die den Tod verdienen."
JOS_cultivate_fanatism:0 "Fanatismus kultivieren"
JOS_cultivate_fanatism_desc:0 "Alle Koreaner sollen unseren Führer und Retter Kim Il-sung lieben!"
JOS_state_of_constant_war:0 "Zustand des ständigen Krieges"
JOS_state_of_constant_war_desc:0 "Wir müssen den Bürgern Koreas beibringen, wie sich Krieg anfühlt und wie er sein wird, damit sie jederzeit darauf vorbereitet sind, in einem solchen Zustand zu leben."
JOS_massive_purges:0 "Massive Säuberungen"
JOS_massive_purges_desc:0 "Um unsere Nation zu stabilisieren, müssen wir diejenigen loswerden, die gegen unsere perfekte Regierung und unseren perfekten Führer sind."
JOS_approach_the_soviets:0 "Nähern Sie sich den Sowjets"
JOS_approach_the_soviets_desc:0 "Die Sowjetunion half den kommunistischen Generälen im Exil nach der Invasion Japans in Korea gerne. Wir sollten unser neues Bündnis formalisieren."
JOS_make_the_sun_bleed:0 "Lass die Sonne bluten"
JOS_make_the_sun_bleed_desc:0 "Wir werden die aufgehende Sonne für das, was sie uns 1905 angetan haben, bluten lassen, bis sie ganz rot wird."
JOS_reeducation_campaign:0 "Umerziehungskampagne"
JOS_reeducation_campaign_desc:0 "Wir werden versuchen, unsere Leute umzuerziehen, damit sie wissen, was sie wirklich wissen müssen. Diejenigen, die sich weigern, werden um ihr Leben beten müssen."
JOS_forced_labor:0 "Zwangsarbeit"
JOS_forced_labor_desc:0 "Diejenigen, die es wagen, sich unserer Regierung zu widersetzen, werden für den Rest ihres Lebens für uns arbeiten – es sei denn, unser großer Führer beschließt natürlich, sie zu töten."
JOS_kims_last_laugh:0 "Kims letztes Lachen"
JOS_kims_last_laugh_desc:0 "Wir müssen Atomwaffen erforschen, damit Kim im Falle einer Invasion zuletzt lacht."
JOS_korean_rocketry:0 "Koreanische Raketentechnik"
JOS_korean_rocketry_desc:0 "Unser Land würde von Raketen profitieren, also lasst uns versuchen, welche zu bekommen."
JOS_all_shall_serve:0 "Alle sollen dienen"
JOS_all_shall_serve_desc:0 "Wir werden unsere Armee erweitern, damit uns niemand besiegen kann!"
JOS_pay_our_debt:0 "Bezahlen Sie unsere Schulden"
JOS_pay_our_debt_desc:0 "Die Volksrepublik China hat vielen unserer Generäle und Politiker nach ihrer Verbannung vor der japanischen Besatzung Schutz gewährt. Jetzt, da sie ihren letzten Kampf ausfechten, ist es an der Zeit, unsere Schuld zu begleichen."
JOS_contact_the_manchurian_guerrillas:0 "Kontaktieren Sie die Manchurian Guerillas"
JOS_contact_the_manchurian_guerrillas_desc:0 "In der Mandschurei wimmelt es von demokratischen, antijapanischen und anti-Qing-Guerillas. Der Kontakt mit ihnen und ihre Integration in unsere Armee wird unserem Land sicherlich zugute kommen."
JOS_the_election_question:0 "Halten Sie die ersten koreanischen Wahlen ab"
JOS_the_election_question_desc:0 "Da unsere Nation nun wieder stabil ist, ist es an der Zeit, das koreanische Volk seinen neuen Präsidenten wählen zu lassen."
JOS_assassinate_kim_il_sung:0 "Ermordung von Kim Il-sung"
JOS_assassinate_kim_il_sung_desc:0 "Jetzt, da wir in Korea den vollständigen Anarchismus anstreben, gibt es nur noch ein Hindernis: Kim Il-sung. Aufgrund seiner Persönlichkeit und politischen Neigungen kritisiert er unsere Regierung seit dem Kim-Komplott. Es ist Zeit, ihn auf mysteriöse Weise verschwinden zu lassen."
JOS_the_dragon_corps:0 "Das Drachenkorps"
JOS_the_dragon_corps_desc:0 "Es ist uns unmöglich, die Heimatinseln über das Meer zu erobern. Trotzdem wird der japanische Dämon entsetzt sein, wenn er sein Verderben vom Himmel fallen sieht."
JOS_the_great_reformer:0 "Der große Reformator"
JOS_the_great_reformer_desc:0 "Yi Kang bereiste in seiner Jugend viele Länder. Er arbeitete in den Botschaften Japans, Großbritanniens, Deutschlands, Frankreichs, Russlands, Italiens und Österreich-Ungarns und studierte an der Keio-Universität Tokio und dem Roanoke College in den USA. Nach seinen Reisen durch so viele Industrieländer erkannte Yi Kang, dass die Stabilität Koreas nur gewährleistet werden kann, wenn man gegenüber dem Rest der Welt nicht ins Hintertreffen gerät."
JOS_japanese_teachings:0 "Japanische Lehren"
JOS_japanese_teachings_desc:0 "Der Grund, warum wir von den Japanern so leicht besiegt wurden, lag an unseren technologischen Unterschieden und der schlechten Qualität unserer Armee. Wir müssen von ihnen lernen, um stärker zu werden."
JOS_improve_the_korean_rails:0 "Verbesserung der koreanischen Schienen"
JOS_improve_the_korean_rails_desc:0 "Wir sollten die Eisenbahnen Koreas verbessern, um den europäischen Transportstandards zu entsprechen."
JOS_reconcile_with_japan:0 "Versöhnung mit Japan"
JOS_reconcile_with_japan_desc:0 "Da die Japaner uns nun als Gegner und nicht als Untertanen betrachten, könnten wir sie dazu zwingen, in unser Land und unsere Unternehmen zu investieren und, wenn wir Glück haben, einen Nichtangriffspakt zu schließen."
JOS_jomyeong_jeonjaeng:0 "Jomyeong Jeonjaeng"
JOS_jomyeong_jeonjaeng_desc:0 "Jomyeong Jeonjaeng, was so viel wie „Donnerkrieg“ bedeutet, ist die neue Doktrin, die wir unseren Soldaten in Anlehnung an den berühmten deutschen Blitzkrieg beibringen wollen. Wenn wir jedoch alle unsere Anstrengungen auf die Verbesserung der Qualität der Armee konzentrieren würden, würde dies die Marine sicherlich verärgern."
JOS_make_yi_sun_proud:0 "Machen Sie Yi Sun stolz"
JOS_make_yi_sun_proud_desc:0 "Yi Sun war ein koreanischer Admiral und General, der durch seine Siege gegen die japanische Marine während der japanischen Invasion Koreas im 16. Jahrhundert zum Nationalhelden wurde. Wir wollen unseren großen Admiral stolz machen, indem wir die koreanische Marine wiederauferstehen lassen. Wenn wir jedoch alle unsere Anstrengungen auf den Ausbau unserer Marine konzentrieren würden, würde das die Armee sicherlich verärgern."
JOS_believe_in_the_west:0 "Glaube an den Westen"
JOS_believe_in_the_west_desc:0 "Die westlichen Nationen ließen uns im Stich, als Japan 1905 in unser Land einmarschierte. Nach Jahren der Ausbeutung zögerten sie nicht, uns unserem Schicksal zu überlassen. Doch angesichts der Instabilität in Europa sind sie nun mehr als bereit, neue Verbündete zu gewinnen."
JOS_the_enemy_of_our_enemy:0 "Der Feind unseres Feindes"
JOS_the_enemy_of_our_enemy_desc:0 "Die Chinesen pflegen seit jeher eine Rivalität mit Japan. Es ist mehr als wahrscheinlich, dass sie bereit sind, uns in ihre Reihen aufzunehmen."
JOS_one_thousand_years_of_neutrality:0 "1000 Jahre Neutralität"
JOS_one_thousand_years_of_neutrality_desc:0 "Wir werden uns in eine undurchdringliche Nation verwandeln und jegliche Konflikte vermeiden, sodass die Japaner, die Chinesen und die Russen keinen Grund haben, uns jemals wieder anzugreifen."
JOS_buy_european_ships:0 "Kaufen Sie europäische Schiffe"
JOS_buy_european_ships_desc:0 "Die Europäer werden ihrem neuen Verbündeten gerne dabei helfen, die Größe und Qualität seiner Marine zu steigern."
JOS_experimental_armored_division:0 "Experimentelle Panzerdivision"
JOS_experimental_armored_division_desc:0 "Die Japaner und die Deutschen versetzten ihre Feinde mit ihren Panzerdivisionen in Angst und Schrecken. Wenn wir welche haben, verschafft uns das im Kampf einen großen Vorteil."
JOS_mobile_artillery:0 "Mobile Artillerie"
JOS_mobile_artillery_desc:0 "Artillerie- und Panzerdivisionen dominieren die Schlachtfelder auf der ganzen Welt. Die Fähigkeit, selbstfahrende Artillerie zu produzieren, würde die Leistungsfähigkeit unserer Streitkräfte sicherlich verbessern."
JOS_stab_the_sun:0 "Stich die Sonne"
JOS_stab_the_sun_desc:0 "Der Himmel selbst wird der Sonne ins Herz stechen."
JOS_the_jiandao_issue:0 "Die Jiandao-Frage"
JOS_the_jiandao_issue_desc:0 "Jiandao, auf Koreanisch auch Gando genannt, wird seit Jahrhunderten fast ausschließlich von Koreanern bewohnt. Viele Mitglieder unserer Regierung haben vorgeschlagen, die Kontrolle über die Region von den Chinesen zu verlangen, als eine Art Gegenleistung für unsere Unterstützung im Krieg, und genau das werden wir höflicherweise tun."
JOS_seek_help_from_the_west:0 "Bitten Sie den Westen um Hilfe"
JOS_seek_help_from_the_west_desc:0 "Die westlichen Nationen ließen uns im Stich, als Japan 1905 in unser Land einmarschierte. Nach Jahren der Ausbeutung zögerten sie nicht, uns unserem Schicksal zu überlassen. Doch angesichts der Instabilität in Europa sind sie nun mehr als bereit, neue Verbündete zu gewinnen."
JOS_seek_help_from_the_russians:0 "Bitten Sie die Russen um Hilfe"
JOS_seek_help_from_the_russians_desc:0 "Den Russen gelang es 1905 nicht, die Japaner zu besiegen. Doch jetzt, da sie industrialisiert sind und die Qualität ihrer Armee verbessert haben, sind sie möglicherweise wieder bereit, uns zu beschützen."
JOS_seek_help_from_the_kuomintang:0 "Bitten Sie die Kuomintang um Hilfe"
JOS_seek_help_from_the_kuomintang_desc:0 "Wenn es den Chinesen gelingt, ihr Land wieder zu vereinen, werden sie zu einer der stärksten Nationen der Welt. Es wäre eine gute Idee, sie auf unserer Seite zu haben."
JOS_cheolgi_regime:0 "Cheolgi-Regime"
JOS_cheolgi_regime_desc:0 "Lee Beom-seok, auch bekannt als Cheolgi („aus Stahl“), ist überzeugt, dass die Freiheit Koreas nur durch eine starke, militaristische Regierung unter seiner Führung gesichert werden kann. Die Demokratie wird erst dann Einzug halten, wenn es keine Bedrohungen für die koreanische Nation in Asien mehr gibt."
JOS_jokcheong:0 "Jokcheong"
JOS_jokcheong_desc:0 "Die „Joseon Minjog Cheongnyeondan“ (Koreanische Nationale Jugendgruppe), üblicherweise mit Jokcheong abgekürzt, ist eine antikommunistische paramilitärische Gruppe, die von Lee Beom-seok gegründet wurde und sich an der Danjisamchik-Doktrin orientiert."
JOS_jeogyeogbyeong2:0 "Jeogyeogbyeong"
JOS_jeogyeogbyeong2_desc:0 "Jeogyeogbyeong ist die Bezeichnung für Scharfschützen in Korea. In Europa ist erwiesen, dass Scharfschützen in Schlachten eine wichtige Rolle spielen. Daher wäre es für unsere Armee von Vorteil, in jedem Bataillon einige Scharfschützen zu haben."
JOS_we_shall_not_fall:0 "Wir werden nicht fallen"
JOS_we_shall_not_fall_desc:0 "Jeder Koreaner muss seinen Teil dazu beitragen, dass sich ein „Ilje Sidae“ nie wieder ereignet."
JOS_meet_western_standars:0 "Erfüllen Sie westliche Standards"
JOS_meet_western_standars_desc:0 "Wir müssen unsere Armee schnell modernisieren, wenn wir nicht wollen, dass die Japaner oder die Russen unser Land erneut erobern."
JOS_learn_from_the_germans:0 "Von den Deutschen lernen"
JOS_learn_from_the_germans_desc:0 "Großbritannien und Frankreich glauben noch immer an ihre langsamen und starren Doktrinen aus dem Ersten Weltkrieg, im Gegensatz zu den Deutschen, die wie wir erkannt haben, dass Jomyeong Jeonjaeng (was so viel wie „Donnerkrieg“ bedeutet) die neue Doktrin ist, die unserer Nation den Sieg bringen wird."
JOS_join_the_devil:0 "Schließe dich dem Teufel an"
JOS_join_the_devil_desc:0 "Die deutschen Verbrechen oder die deutsche Politik sind uns egal, solange sie bereit sind, uns dabei zu helfen, unsere Feinde zu besiegen."
JOS_begin_the_crusade:0 "Beginnen Sie den Kreuzzug"
JOS_begin_the_crusade_desc:0 "Wir können uns nicht darauf verlassen, dass andere Nationen unsere Feinde besiegen. Wenn wir den Kommunismus aus Asien vertreiben wollen, müssen wir den Kreuzzug allein führen."
JOS_join_the_kuomintang:0 "Schließen Sie sich unseren Brüdern an"
JOS_join_the_kuomintang_desc:0 "Die Kuomintang ist, wie auch wir, für ihren Antikommunismus und ihren Kampf gegen die von den Sowjets finanzierten Terrororganisationen bekannt. Wir müssen uns unseren Brüdern im Kampf gegen den Kommunismus und die Japaner anschließen!"
JOS_german_military_mission:0 "Deutsche Militärmission"
JOS_german_military_mission_desc:0 "Die Einbeziehung deutscher Offiziere in die Ausbildung unserer Soldaten würde die Qualität unserer Lehren und die Leistungsfähigkeit unserer Armeen erheblich steigern."
JOS_german_led_division:0 "Deutsch geführte Division"
JOS_german_led_division_desc:0 "Natürlich werden die Deutschen nicht in der Lage sein, eine komplette Militärmission ans andere Ende der Welt zu schicken. Wenn jedoch deutsche Offiziere die direkte Führung einer experimentellen Panzerdivision übernehmen, wird dies deren Leistungsfähigkeit auf dem Schlachtfeld erheblich steigern."
JOS_liberate_yanbian:0 "Befreie Jiandao"
JOS_liberate_yanbian_desc:0 "Jiandao, auf Koreanisch auch Gando genannt, ist eine Region, die fast ausschließlich von Koreanern bewohnt wird, nachdem ihre Vorfahren im 19. Jahrhundert dort siedelten. Sobald wir dazu bereit sind, müssen wir sie von ihren Unterdrückern befreien."
JOS_reunite_goguryeo:0 "Goguryeo wiedervereinen"
JOS_reunite_goguryeo_desc:0 "Goguryeo, auch bekannt als Goryeo oder Koryeo, war eines der drei Königreiche Koreas und existierte vom 1. Jahrhundert v. Chr. bis zum 7. Jahrhundert n. Chr. Nach Jahrhunderten der Demütigung der koreanischen Nation ist es an der Zeit, Goguryeo aus der Asche wiederzubeleben und anschließend den Kommunismus niederzubrennen."
JOS_naval_effort:0 "Marinebemühungen"
JOS_naval_effort_desc:0 "Wir müssen uns bemühen, eine Seestreitmacht aufzubauen, die in der Lage ist, die Seestreitkräfte unserer Feinde zu bekämpfen oder zumindest die Japaner und Russen so zu beschäftigen, dass sie nicht in unsere Küsten einfallen."
JOS_a_fair_deal:0 "Ein fairer Deal"
JOS_a_fair_deal_desc:0 "Nachdem wir unsere Nation gefestigt haben, ist es an der Zeit, die Kontrolle über Jiandao zu übernehmen, eine Region, die hauptsächlich von Koreanern bewohnt wird. Schließlich haben wir es im Austausch für all die Koreaner verdient, die im Kampf gegen die Japaner gestorben sind, nicht wahr?"
JOS_the_red_scare:0 "Die Rote Angst"
JOS_the_red_scare_desc:0 "Eine antikommunistische Regierung reicht nicht aus. Wir müssen den Kommunismus in Asien zerstören. Nur dann können wir und unsere Waffenbrüder in Frieden leben."
JAP_the_fading_sun:0 "Die verblassende Sonne"
JAP_the_fading_sun_desc:0 "Nach der Kapitulation Japans im Zweiten Japanisch-Chinesischen Krieg kehrte die Armee gedemütigt nach Japan zurück. Doch als eine Gruppe junger Offiziere mit der Absicht, einen Putsch zu starten, in Tokio einmarschierte, wurde den Japanern klar, dass sie noch weit vom Frieden entfernt waren."
JAP_break_our_old_ties:0 "Brechen Sie unsere alten Bindungen"
JAP_break_our_old_ties_desc:0 "Nach der Ermordung der korrupten Beamten und der Säuberung der Verräter am Kaiser ist es nun an der Zeit, die Bündnisse der illegitimen Regierung der Toseiha zu brechen."
JAP_address_the_famine:0 "Bekämpfen Sie die Hungersnot"
JAP_address_the_famine_desc:0 "Wir müssen einen Weg finden, die Hungersnot zu überwinden, bevor es für unser Volk und für uns zu spät ist."
JAP_emergency_land_reform:0 "Dringende Landreform"
JAP_emergency_land_reform_desc:0 "Wenn wir nie wieder eine Hungersnot erleben wollen, sollten wir eine bessere Nutzung unseres Landes fördern."
JAP_take_control_over_the_farms:0 "Übernehmen Sie die Kontrolle über die Farmen"
JAP_take_control_over_the_farms_desc:0 "Wir werden die direkte Kontrolle über die Farmen in Mandschukuo übernehmen und hoffen, dass uns ein derartiges Problem nicht noch einmal widerfährt."
JAP_demand_a_favourable_deal:0 "Fordern Sie ein günstiges Angebot"
JAP_demand_a_favourable_deal_desc:0 "Wir werden unsere Verbündeten überzeugen, damit sie nicht vergessen, wer der rechtmäßige Herrscher der Mandschurei ist."
JAP_favour_the_army:0 "Begünstigen Sie die Armee"
JAP_favour_the_army_desc:0 "Wir alle haben Angst davor, was passieren würde, wenn die Streitkräfte erneut einen Staatsstreich durchführen würden. Wir müssen der Nahrungsmittelversorgung unserer Armee und Marine Priorität einräumen, auch wenn dies den Rest der japanischen Bevölkerung verärgert."
JAP_help_the_people:0 "Helfen Sie den Menschen"
JAP_help_the_people_desc:0 "Auch wenn es die Armee verärgert, müssen wir allen Japanern gleichermaßen helfen. Allerdings müssen wir diese Situation so schnell wie möglich in den Griff bekommen."
JAP_the_showa_speech:0 "Die Showa-Rede"
JAP_the_showa_speech_desc:0 "Der Kaiser hat der Regierung vorgeschlagen, in ganz Japan eine Kampagne mit Reden zu starten, um die Bevölkerung zu beruhigen. Hoffen wir, dass sie Erfolg haben."
JAP_import_all_we_can:0 "Importieren Sie alles, was wir können"
JAP_import_all_we_can_desc:0 "Wir werden große Mengen an Lebensmitteln kaufen, um unsere Bevölkerung bis zur endgültigen Umsetzung der Reformen zu versorgen, auch wenn dies unsere Wirtschaft trifft."
JAP_enact_prize_controls:0 "Preiskontrollen einführen"
JAP_enact_prize_controls_desc:0 "Wir werden versuchen, die Preise unter Kontrolle zu halten, in der Hoffnung, dass dadurch der Schaden gemildert wird, der dem japanischen Volk in den letzten Monaten zugefügt wurde."
JAP_the_worst_is_over:0 "Das Schlimmste ist vorbei"
JAP_the_worst_is_over_desc:0 "Ein Jahr ist vergangen und unser Land ist nur noch wenige Schritte von der Erholung entfernt und droht nicht mehr, von einer Hungersnot heimgesucht zu werden."
JAP_no_more_famines:0 "Keine Hungersnöte mehr"
JAP_no_more_famines_desc:0 "Die letzten notwendigen Reformen wurden abgeschlossen und unsere Regierung kann stolz verkünden, dass das japanische Volk nie wieder eine Hungersnot erleben muss."
JAP_the_red_sun:0 "Die Rote Sonne"
JAP_the_red_sun_desc:0 "Jetzt, da die aufgehende Sonne des Faschismus erloschen ist, ist es an der Zeit, dass in ganz Asien eine kommunistische, rote Sonne erstrahlt."
JAP_anti_right_movement:0 "Anti-Rechts-Bewegung"
JAP_anti_right_movement_desc:0 "Jeder, der im Verdacht steht, konterrevolutionär zu sein, soll eliminiert werden."
JAP_praise_the_son_of_amaterasu:0 "Lobt den Sohn von Amaterasu"
JAP_praise_the_son_of_amaterasu_desc:0 "Die kaiserliche Familie stammt direkt von Amaterasu, der Sonnengöttin, ab. Daher wird Kaiser Hirohito ebenso verehrt wie die Sonne selbst."
JAP_learnings_of_shiberia_shuppei:0 "Erkenntnisse der Shiberia Shuppei"
JAP_learnings_of_shiberia_shuppei_desc:0 "Shiberia Shuppei, im Westen als japanische Intervention in Sibirien bekannt, war das erste Mal, dass unsere Armee in einem kalten und rauen Gebiet wie dem russischen Fernen Osten kämpfen musste. Wir müssen aus unseren Verlusten im Krieg lernen, um die Sowjets dieses Mal besiegen zu können."
JAP_erase_the_yanan_devil:0 "Lösche den Yan&#39;an-Teufel aus"
JAP_erase_the_yanan_devil_desc:0 "Die Kuomintang mag eine Bedrohung für unser Reich darstellen, doch die Kommunisten sind eine noch größere. Bekannt für ihre antijapanische Gesinnung und ihren Hass auf Monarchen und Religion, bedeutet dies, dass wir, wenn es ihnen gelingt, China zu erobern, direkt an unserer Grenze eine große Bedrohung erleben werden. Das dürfen wir nicht zulassen."
JAP_asian_economic_union:0 "Ostasiatische Wirtschaftsunion"
JAP_asian_economic_union_desc:0 "Zwischen den ostasiatischen Nationen sollte eine Wirtschaftsunion geschaffen werden. Wir können dann bessere Handelsabkommen mit unseren Verbündeten schließen und auch den Nationen Hoffnung geben, die durch unsere frühere imperialistische Herrschaft zerstört wurden."
JAP_end_the_monopolies:0 "Beenden Sie die Monopole"
JAP_end_the_monopolies_desc:0 "Wir können nicht zulassen, dass die Zaibatsus die gesamte wirtschaftliche Macht in Japan innehaben. Wir werden die Auflösung aller Unternehmen einleiten, die als Monopolisten gelten, und den Rücktritt von Zaibatsu-Vorstandsmitgliedern erzwingen, die eng mit den Zaibatsu-Familien verwandt sind."
JAP_land_and_work_reform:0 "Land- und Arbeitsreform"
JAP_land_and_work_reform_desc:0 "Japan braucht tiefgreifende Reformen, um als wirklich zivilisierte und demokratische Nation zu gelten. Eine Landreform ist hierfür ebenso unabdingbar wie eine Überarbeitung der Arbeitnehmerrechte."
JAP_sheath_the_sword:0 "Steck das Schwert in die Scheide"
JAP_sheath_the_sword_desc:0 "Der Samurai muss seine Kriegstreiberei beenden und sein Schwert in die Scheide stecken, um sich selbst, seinem Volk und Asien eine bessere Zukunft zu ermöglichen."
JAP_a_world_without_war:0 "Eine Welt ohne Krieg"
JAP_a_world_without_war_desc:0 "Unsere Welt braucht weder Krieg noch Blutvergießen, um zu existieren. Wir müssen als Wächter agieren, um andere Nationen davon abzuhalten, in Kriegstreiberei zu verfallen."
JAP_labor_reform:0 "Die große Reform"
JAP_labor_reform_desc:0 "Eine Landreform, das Recht, Gewerkschaften zu gründen und Streiks zu organisieren, Mindestlöhne, einen 8-Stunden-Arbeitstag, Frauenrechte, kostenlose Bildung, mehr Rechte für Pächter, progressive Besteuerung und die Demokratisierung der Militärführung."
JAP_women_rights:0 "Frauenrechte"
JAP_women_rights_desc:0 "Frauen sollten das gleiche Wahl- und Berufsrecht haben wie alle anderen Männer. Schließlich sind wir alle Japaner."
JAP_negotiate_peace:0 "Frieden verhandeln"
JAP_negotiate_peace_desc:0 "Toyohiko Kagawa, bekannt für seinen Pazifismus, wird sein Bestes tun, um diesen sinnlosen Bürgerkrieg zu beenden. Doch seine Bemühungen werden höchstwahrscheinlich auf taube Ohren stoßen ..."
JAP_fill_the_gap:0 "Füllen Sie die Lücke"
JAP_fill_the_gap_desc:0 "Wir müssen die Anarchie jetzt beenden, damit die Sonne wieder aufgehen kann."
JAP_cooperativism:0 "Genossenschaftswesen"
JAP_cooperativism_desc:0 "Der Genossenschaftsismus ist eine soziale Bewegung oder Lehre, die es Menschen ermöglicht, sich in sogenannten Genossenschaften zu organisieren, um gemeinsam Ziele zu erreichen. Wir fördern diese Praktiken, um den Einfluss der Monopole in Japan zu stoppen."
JAP_protectors_of_japan:0 "Beschützer Japans"
JAP_protectors_of_japan_desc:0 "Jeder Japaner muss sein Heimatland vor den Kräften des Totalitarismus schützen."
JAP_negotiate_with_the_kwantung:0 "Verhandeln Sie mit den Kwantung"
JAP_negotiate_with_the_kwantung_desc:0 "Wir können nicht zulassen, dass in diesem sinnlosen Konflikt noch mehr Menschenleben verloren gehen. Wir werden unser Bestes tun, um eine Versöhnung mit den Kwantung zu erreichen und unserem Land wieder Frieden zu bringen."
JAP_join_the_appeasers:0 "Schließen Sie sich den Beschwichtigern an"
JAP_join_the_appeasers_desc:0 "Wir werden uns unseren alten Verbündeten im Ersten Weltkrieg anschließen, um Frieden nach Asien und Europa zu bringen."
JAP_asian_defense_accord:0 "Asiatisches Verteidigungsabkommen"
JAP_asian_defense_accord_desc:0 "Wir sollten die Anführer dieses Kreuzzugs gegen Kriegstreiberei und Totalitarismus in Asien sein. Wir hoffen, dass andere Nationen bereit sind, sich unserer Sache anzuschließen."
JAP_the_great_amnesty:0 "Die große Amnestie"
JAP_the_great_amnesty_desc:0 "Wir dürfen niemandem schaden, nur weil er verteidigt, was er für richtig hält. Wir werden anfangen, denen zu vergeben, die es verdienen, damit wir unsere Wunden heilen können. \nWie Toyohiko zum Showa-Kaiser sagte: „Wer unter euch groß sein will, soll der Diener aller sein. Die Souveränität eines Herrschers, Eure Majestät, liegt in den Herzen des Volkes. Nur durch den Dienst an anderen kann ein Mensch oder eine Nation gottgleich sein.“"
JAP_humanization_campaign:0 "Humanisierungskampagne"
JAP_humanization_campaign_desc:0 "Denjenigen, die wie Dämonen handelten, muss beigebracht werden, wieder Menschen zu werden. Militarismus, Totalitarismus, Kommunismus und Faschismus dürfen Japan nie wieder beherrschen."
JAP_women_rights2:0 "Frauenrechte"
JAP_women_rights2_desc:0 "Wir sind alle Söhne Gottes und verdienen daher alle die gleiche Behandlung und die gleichen Chancen."
JAP_the_pacifist_samurai:0 "Der pazifistische Samurai"
JAP_the_pacifist_samurai_desc:0 "Unsere Welt braucht weder Krieg noch Blutvergießen, um zu existieren. Wir müssen als Wächter agieren, um andere Nationen davon abzuhalten, in Kriegstreiberei zu verfallen."
JAP_the_korean_japanese_union:0 "Die Koreanisch-Japanische Union"
JAP_the_korean_japanese_union_desc:0 "Obwohl wir den Koreanern gern die Freiheit schenken würden, wären sie ein leichtes Ziel für Persönlichkeiten wie Kim Il-sung und Shin Chae-ho, die nach dem japanischen Bürgerkrieg an Popularität gewinnen. Durch eine Union unserer Nationen könnten wir ihre Autonomie stärken und gleichzeitig die politische Kontrolle behalten."
JAP_integrate_dailan:0 "Dalian integrieren"
JAP_integrate_dailan_desc:0 "Auch die Chinesen in Dalian verdienen eine Vertretung in unserer neu gegründeten Gewerkschaft."
JAP_integrate_taiwan:0 "Taiwan integrieren"
JAP_integrate_taiwan_desc:0 "Wenn die Menschen in Taiwan erst einmal verstehen, dass sie nicht als Kolonie, sondern als Bruder betrachtet werden, werden sie mehr als bereit sein, unserer Union beizutreten."
JAP_bring_the_subjects_back:0 "Bringen Sie die Themen zurück"
JAP_bring_the_subjects_back:0 "Nachdem wir Japan wieder Stabilität verliehen haben, ist es an der Zeit, unsere Kolonien im Norden zurückzuerobern."
JAP_nationalize_the_zaibatsus2:0 "Verstaatlichung der Zaibatsus"
JAP_nationalize_the_zaibatsus:0 "Verstaatlichung der Zaibatsus"
JAP_nationalize_the_zaibatsus2_desc:0 "Die größten Konzerne unseres Landes verfügen seit langem über beispiellose politische und wirtschaftliche Macht. Doch damit ist es vorbei. Die staatliche Kontrolle wird nicht in Frage gestellt."
JAP_purge_the_kodoha_faction2:0 "Säubere die Kodoha-Fraktion"
JAP_purge_the_kodoha_faction2_desc:0 "Unsere große Rivalität mit den Kodoha endet jetzt. Alle ihre Unterstützer werden eliminiert."
JAP_ally_the_kodoha_faction:0 "Verbünde dich mit der Kodoha-Fraktion"
JAP_ally_the_kodoha_faction_desc:0 "Wenn wir einigen ihrer Forderungen zustimmen, wird die Kodoha-Fraktion unsere Regierung nachdrücklich unterstützen."
JAP_technological_exchange2:0 "Technologischer Austausch"
JAP_technological_exchange2_desc:0 "Wir brauchen Verbündete, um uns dem Bären zu stellen. Deutschland ist nicht nur ein guter Kandidat, sondern verfügt auch über zahlreiche technologische Fortschritte, die es mit uns teilen könnte, um uns in unserem Kampf zu unterstützen."
JAP_tokyo_aluminum_plant2:0 "Aluminiumwerk Tokio"
JAP_tokyo_aluminum_plant2_desc:0 "Wir werden die Kraft unserer Arbeiter nutzen, um die Autarkie der Nation zu erhöhen."
JAP_kirin_aluminum_plant:0 "Aluminiumwerk Kirin"
JAP_kirin_aluminum_plant_desc:0 "Wir werden die Kraft der Arbeiter der Mandschurei nutzen, um die Autarkie der Nation zu erhöhen."
JAP_the_new_bushido:0 "Der neue Bushido"
JAP_the_new_bushido_desc:0 "Wir werden den Bushido-Kodex nach unserem Willen formen und dabei die Ethik der Samurai, den Neokonfuzianismus und einen populistischen Nationalismus nach dem Vorbild des europäischen Faschismus und des linken nationalsozialistischen Faschismus miteinander verbinden."
JAP_the_true_spirit_of_the_meiji_restoration:0 "Der wahre Geist der Meiji-Restauration"
JAP_the_true_spirit_of_the_meiji_restoration_desc:0 "Saigo Takamori war ein bedeutender Politiker und Anführer des Satsuma-Aufstands gegen die Meiji-Restauration. Er verkörpert den wahren Geist der Meiji-Restauration, und die Aufgabe des modernen Japans besteht darin, ihn wiederzuentdecken."
JAP_unite_the_fronts:0 "Vereint die Fronten"
JAP_unite_the_fronts_desc:0 "Wir werden uns unseren Weg durch Asien bis zum Persischen Golf freisprengen, um uns mit unseren Verbündeten in Europa zu vereinen!"
JAP_empower_the_showa_kenkyukai:0 "Stärke den Showa Kenkyukai"
JAP_empower_the_showa_kenkyukai_desc:0 "Die Showa Kenkyukai (Showa-Forschungsvereinigung) ist ein Think Tank, der von namhaften Wissenschaftlern, Journalisten, Bankern, Sozialisten, Militaristen, Geschäftsleuten und Leitern von Jugendorganisationen gegründet wurde. Die Taisei Yokusankai stand kurz davor, diese nützliche Vereinigung aufzulösen, aber wir lassen uns nicht so täuschen wie sie."
JAP_redirect_our_efforts:0 "Unsere Bemühungen neu ausrichten"
JAP_redirect_our_efforts_desc:0 "Wenn wir unsere Wirtschaft vollständig auf den Krieg ausrichten, werden wir nicht in der Lage sein, ihre Leistungsfähigkeit in Friedenszeiten zu steigern."
JAP_manchurian_japanese_economic_union:0 "Mandschurisch-Japanische Wirtschaftsunion"
JAP_manchurian_japanese_economic_union_desc:0 "Adachi Kenzo hat sich immer für eine Wirtschaftsunion zwischen Japan und seiner größten Kolonie eingesetzt, und jetzt, da er das Sagen hat, wird dies Wirklichkeit."
JAP_the_greatest_colony:0 "Die größte Kolonie"
JAP_the_greatest_colony_desc:0 "China wird nun zur Mine, Scheune und Fabrik Japans. Sobald wir China unter unserer Herrschaft vereinen, werden wir die mächtigste Nation der Erde sein."
JAP_a_new_government:0 "Eine neue Regierung"
JAP_a_new_government_desc:0 "Unsere neue führende Partei wird dem Reich der Aufgehenden Sonne Sieg und Größe bringen!"
JAP_kempeitai:0 "Kempeitai"
JAP_kempeitai_desc:0 "Die Kempeitai, auch bekannt als Kenpeitai, sind die Militär- und Geheimpolizei unserer großen Nation. Sie haben die Freiheit, Personen zu verhaften oder zu töten, die der Verschwörung gegen das Kaiserreich verdächtigt werden, und können mit ihren Gefangenen alles tun, was sie für angebracht halten."
JAP_integrate_polynesia:0 "Polynesien integrieren"
JAP_integrate_polynesia_desc:0 "Wir dürfen die Tausenden von Polynesiern in unserem Land nicht vergessen. Sie verdienen eine Vertretung in unserer neuen Föderation."
PRC_second_chinese_elections:0 "Zweite Wahlen in China"
PRC_second_chinese_elections_desc:0 "Nachdem der Autoritarismus in China besiegt wurde, ist es an der Zeit, mit den Vorbereitungen für die ersten chinesischen Wahlen zu beginnen, damit das chinesische Volk seinen Traum verwirklichen und endlich seinen eigenen Führer wählen kann."
CHI_reclaim_the_lands_of_the_qing:0 "Erobern Sie die Länder der Qing zurück"
CHI_reclaim_the_lands_of_the_qing_desc:0 "Jahrzehntelang nutzte der Westen die schwache Qing-Regierung aus, um ihr Gebiete zu stehlen. Doch jetzt, da wir das Land stabilisiert haben, ist es an der Zeit, sie zurückzuerobern."
CHI_reintegrate_tibet:0 "Tibet wieder eingliedern"
CHI_reintegrate_tibet_desc:0 "Wir müssen der Welt beibringen, dass Tibet nur eine weitere chinesische Provinz ist und bleiben wird."
CHI_reintegrate_mongolia:0 "Reintegration der Mongolei"
CHI_reintegrate_mongolia_desc:0 "Wir müssen der Welt beibringen, dass die Mongolei nur eine weitere chinesische Provinz ist und bleiben wird."
CHI_terrorist_attack_in_nanking:0 "Terroranschlag in Nanking"
CHI_terrorist_attack_in_nanking_desc:0 "In Nanking kam es gerade zu einem Terroranschlag. Die Streitkräfte und das NBIS sind bereits vor Ort, um die Situation zu untersuchen."
CHI_dai_li_coup:0 "Dai Lis Regierungsführung"
CHI_dai_li_coup_desc:0 "Die Kommunisten haben Chiang Kai-shek getötet und Wang Jingwei ins Krankenhaus eingeliefert. Wir haben genug von diesen kommunistischen Mistkerlen! Wir brauchen einen Anführer, der den Roten gegenüber genauso grausam ist, wie sie es uns gegenüber sind, und dieser Anführer muss Dai Li sein, der Kommandant der NBIS."
CHI_sort_the_mess:0 "Sortieren Sie das Chaos"
CHI_sort_the_mess_desc:0 "Nach dem Tod Yuan Shikais im Jahr 1916 entstand ein Machtvakuum, das mit dem Ende seiner Diktatur einherging. Dies leitete die berüchtigte Ära der Kriegsherren in der Region ein, in der zahlreiche Militärcaudillos in vielen Regionen des Landes die Macht übernahmen. Es ist Zeit, unsere Nation ein für alle Mal wieder zu vereinen."
CHI_seize_the_ports:0 "Erobern Sie die Häfen"
CHI_seize_the_ports_desc:0 "Der Westen hat es immer geliebt, unser Land wie Raben anzugreifen. Mit Opium und ungleichen Verträgen hat er unsere Stabilität zerstört und unsere Gebiete geraubt. Wir haben genug, wir werden jetzt unseren Stolz zurückgewinnen."
CHI_never_again:0 "Nie wieder"
CHI_never_again_desc:0 "Der Grund für den Putsch der Kommunisten liegt in der exorbitanten Freiheit im Land. Um die Stabilität unseres Landes zu sichern, müssen wir zunächst den Belagerungszustand und eine Ausgangssperre verhängen."
CHI_kill_the_red_devil:0 "Töte den Roten Teufel"
CHI_kill_the_red_devil_desc:0 "Wir müssen den Teufel töten, der sich in den Bergen von Yan&#39;an versteckt, um unserem Mutterland Frieden zu bringen."
CHI_stab_the_sun_a_million_times:0 "Stich eine Million Mal in die Sonne"
CHI_stab_the_sun_a_million_times_desc:0 "Für jeden Chinesen, der in den Händen der Japaner getötet wird, werden wir tausend Bürger Japans foltern! Es wird keine Ruhe geben, bis Tokio in Flammen steht!"
CHI_we_must_prepare:0 "Wir müssen uns vorbereiten"
CHI_we_must_prepare_desc:0 "Jeder muss China dabei helfen, sich auf den Krieg vorzubereiten, sich auf die Befreiung unserer Brüder und Schwestern in der Mandschurei vorzubereiten und sich darauf vorzubereiten, jeden Japaner vor Schmerzen aufschreien zu lassen."
CHI_the_always_watchful_eye:0 "Das stets wachsame Auge"
CHI_the_always_watchful_eye_desc:0 "Nichts hören, nichts sehen, nichts sagen."
CHI_die_for_your_homeland:0 "Stirb für dein Vaterland"
CHI_die_for_your_homeland_desc:0 "Alle unsere Bürger müssen notfalls ihr Leben opfern, damit wir den japanischen Dämon besiegen können."
CHI_all_shall_march:0 "Alle werden marschieren"
CHI_all_shall_march_desc:0 "Alles soll marschieren. Wer atmen kann, kann kämpfen."
CHI_there_IS_war_in_beijing:0 "In Peking herrscht Krieg"
CHI_there_IS_war_in_beijing_desc:0 "Der Krieg in Peking ist noch nicht vorbei. Die Japaner versklaven unser Volk immer noch, töten Familien und verbrennen Ernten. Die Regierung wird bestehen bleiben, bis sie weg sind ..."
CHI_do_you_want_china_to_perish:0 "Wollen Sie, dass China untergeht?"
CHI_do_you_want_china_to_perish_desc:0 "Was tun Sie für China? \n\nWie können wir sicher sein, dass Sie nicht auch mit Japan kollaborieren? \n\nAlle Bürger Chinas müssen arbeiten, kämpfen und trainieren, nur dann werden wir in der Lage sein, das japanische Imperium zu besiegen."
CHI_close_china:0 "Schließen China"
CHI_close_china_desc:0 "Unser Volk wird nicht bereit sein, gegen die Japaner zu kämpfen, wenn es sich von westlichen Banalitäten ablenken lässt. Es wird nichts vom Westen hören oder empfangen, bis wir Japan besiegt haben."
CHI_protect_our_borders:0 "Schützen Sie unsere Grenzen"
CHI_protect_our_borders_desc:0 "Wir werden unsere breiten Grenzen vielleicht nicht ewig verteidigen können, aber eine große Anzahl Raketen an der richtigen Position wird uns ewig verteidigen können."
CHI_burn_our_enemies:0 "Verbrenne unsere Feinde"
CHI_burn_our_enemies_desc:0 "Es wäre völliger Blödsinn, eine Waffe nicht einzusetzen, mit der man auf Knopfdruck ganze Städte zerstören kann."
CHI_a_new_dawn:0 "Eine neue Sonne"
CHI_a_new_dawn_desc:0 "Nach Sun Yat Sens Tod ging die Macht an Wang Jingwei über, einen ehemaligen Freund des Vaters der Republik und Vertreter der linken Kuomintang-Fraktion. Dieser wurde jedoch schnell vom Führer der rechten Fraktion, Chiang Kai-Shek, gestürzt. Doch nun, da der Bastard endgültig gestorben ist, steht Wang Jingwei frei, den Traum seines alten Freundes entweder zu erfüllen oder ihn in einen Albtraum zu verwandeln."
CHI_rebuild_wuhan:0 "Wiederaufbau von Wuhan"
CHI_rebuild_wuhan_desc:0 "Wuhan war die Hauptstadt der Republik, bis sie von Chiangs Truppen gestürmt und nach Nanjing verlegt wurde. Sowohl Peking als auch Nanjing sind anfällig für japanische Invasionen. Deshalb werden wir unsere Hauptstadt in die Stadt der Flüsse verlegen, so wie die Sowjets ihre Hauptstadt nach Moskau verlegten, um ihre Regierung besser zu schützen."
CHI_ceasefire_with_the_communists:0 "Waffenstillstand mit den Kommunisten"
CHI_ceasefire_with_the_communists_desc:0 "Wang Jingwei versuchte nach seiner Machtübernahme, mit den Kommunisten Frieden zu schließen, doch diese lehnten törichterweise ab. Da Japan und die Sowjetunion nun eine immer größere Bedrohung für das chinesische Volk darstellen, werden sie sich sicherlich anders entscheiden."
CHI_unification_day:0 "Tag der Wiedervereinigung"
CHI_unification_day_desc:0 "Li Zongren, Yan Xishan, Feng Yuxiang und Premierminister Wang arbeiteten zusammen, um Chiang Kai-shek aufgrund seiner Zentralisierungsbemühungen im Zentralebenenkrieg 1932 zu besiegen. Doch nachdem die Japaner in die Mandschurei einmarschierten und sie uns entrissen hatten, waren sie zu einem Waffenstillstand gezwungen. Da Chiang nun nicht mehr da ist, haben die Kriegsherren keine Ausrede mehr, sich uns diesmal nicht anzuschließen."
CHI_concessions_to_the_japanese:0 "Zugeständnisse an die Japaner"
CHI_concessions_to_the_japanese_desc:0 "Wir werden Japan nicht besiegen können. Sie verfügen über eine der mächtigsten Marinen, hervorragende Piloten, Panzerdivisionen und industrialisieren sich seit dem 19. Jahrhundert. Und was haben wir? Ein armes, uneiniges Land, geschützt von einer nicht modernisierten und immer noch korrupten Armee. Wir müssen die Japaner jetzt beschwichtigen, bevor es zu spät ist."
CHI_staunch_anti_imperialism:0 "Entschiedener Antiimperialismus"
CHI_staunch_anti_imperialism_desc:0 "Asien darf nur den Asiaten gehören! Warum sollten wir mit denen zusammenarbeiten, die unsere Nation seit Jahren abschlachten? Frankreich, England, Russland und die USA sehen uns nicht als gleichwertig, sondern als Diener."
CHI_catch_up_with_meiji:0 "Auf dem Laufenden bleiben mit Tokio"
CHI_catch_up_with_meiji_desc:0 "Japan hatte 70 Jahre Zeit, sich zu industrialisieren. Wir müssen alles Mögliche tun, um zumindest annähernd das Industrialisierungsniveau Japans zu erreichen!"
CHI_a_dream:0 "Sonnentraum"
CHI_a_dream_desc:0 "Sun Yat Sen, ein enger Freund von Wang, träumte von einem vereinten und demokratischen China. Ist es dennoch möglich, diesen Traum zu verwirklichen...?"
CHI_a_nightmare:0 "Der Albtraum der Sonne"
CHI_a_nightmare_desc:0 "... Das ist es nicht. Eine Demokratie schwächt die Nation nur. Wir müssen den faschistischen Lehren folgen, wenn wir die Feinde Chinas und Asiens besiegen wollen."
CHI_deal_with_the_radicals:0 "Radikalismus unterdrücken"
CHI_deal_with_the_radicals_desc:0 "Wir können keinen weiteren weißen Terror entfachen, wie es Chiang 1927 tat. Wenn wir die anderen Fraktionen des Landes gegen uns aufbringen, wird es erneut zu Anarchie kommen. Deshalb werden wir zu anderen Strategien greifen, um mit den Radikalen umzugehen. Beispielsweise werden wir sie zur Verwaltung unwichtiger Regionen in Liangshan und Qinghai entsenden, wo sie der Regierung keinen Schaden zufügen können."
CHI_unending_political_tutelage:0 "Unendliche politische Bevormundung"
CHI_unending_political_tutelage_desc:0 "Das chinesische Volk ist noch nicht bereit, seinen Führer zu wählen. Wir werden es so lange belehren, bis wir wissen, dass es die richtige Wahl trifft."
CHI_issue_mass_propaganda:0 "Massenpropaganda veröffentlichen"
CHI_issue_mass_propaganda_desc:0 "„Treten Sie der Nationalen Revolutionsarmee bei! \n\nDas chinesische Volk braucht einen Helden, das chinesische Volk braucht SIE!“"
CHI_invite_fascist_officers:0 "Laden Sie faschistische Offiziere ein"
CHI_invite_fascist_officers_desc:0 "Die Einladung faschistischer Offiziere aus europäischen Ländern wird dazu beitragen, unsere Armee zu modernisieren. Dann werden nicht einmal sie in der Lage sein, uns zu besiegen!"
CHI_anti_corruption_campaign:0 "Antikorruptionskampagne"
CHI_anti_corruption_campaign_desc:0 "Korruption ist das Gift, das China seit Jahrhunderten langsam tötet. Wir werden ein Gegenmittel gegen dieses Gift entwickeln, und schon bald werden alle das neue China fürchten."
CHI_an_end_to_the_treaty:0 "Das Ende des Vertrags"
CHI_an_end_to_the_treaty_desc:0 "Wir werden uns nicht auf irgendwelche idiotischen Verträge berufen, die von den Qing und Chiang unterzeichnet wurden. Wir sind ein neues, freies China."
CHI_recover_the_ports:0 "Befreit die Häfen"
CHI_recover_the_ports_desc:0 "Im 19. Jahrhundert war China zu schwach, um den Missbrauch der westlichen Nationen zu stoppen. Sie vergifteten unser Volk mit Opium und raubten unsere Güter und Gebiete wie schwarze Raben, aber jetzt kann uns nichts und niemand mehr aufhalten."
CHI_second_white_terror:0 "Zweiter Weißer Terror"
CHI_second_white_terror_desc:0 "Kein Kommunist wird China jemals wieder schaden können. Früher waren sie eine Krankheit für Chinas Herz, doch jetzt sind sie nicht mehr als eine ferne Erinnerung."
CHI_chiang_and_soong:0 "Die zwei Familien"
CHI_chiang_and_soong_desc:0 "Die Chiang- und Soong-Familien haben bereits großen Einfluss auf das chinesische Volk, doch nun, da Chiang die volle Macht über China erlangt hat, werden sie bald auch die volle Kontrolle über das Land erlangen. Sie haben uns Stabilität, Freiheit und Fortschritt gebracht. Warum sollten wir jetzt damit aufhören?"
CHI_one_party_state:0 "Einparteienstaat"
CHI_one_party_state_desc:0 "Die Kuomintang arbeitet seit ihrer Gründung nach der Xinhai-Revolution an der Rettung Chinas. Wir werden nicht zulassen, dass eine andere Partei die Nation erneut zerstört. Weiße Sonne, blauer Himmel und eine ganz rote Erde für immer!"
CHI_the_father_of_china:0 "Der Vater Chinas"
CHI_the_father_of_china_desc:0 "Wer arbeitete jahrelang daran, die Japaner zu besiegen und aus China zu vertreiben? Wer rettete die Republik vor Wangs Linken und den Kommunisten des Südens? Wer besiegte Wu Peifu und nahm Kirin während des Nordfeldzugs ein? Chiang Kai-Shek, der Vater Chinas! Ihm verdanken wir alles, was wir heute haben!"
CHI_suns_dream_achieved:0 "Suns Traum ist wahr geworden!"
CHI_suns_dream_achieved_desc:0 "Nach zwei Jahrzehnten des Kampfes ist es uns endlich gelungen, Sun Yat Sens Traum zu verwirklichen: Demokratie in China, und das alles dank der weißen Sonne, des blauen Himmels und der ganz roten Erde!"
CHI_help_the_peasantry:0 "Helfen Sie der Bauernschaft"
CHI_help_the_peasantry_desc:0 "Hungersnöte und Armut sind in China weit verbreitet, da einige unserer Bauern Schwierigkeiten haben, ihre Ernten zu sichern. Die Regierung muss jetzt handeln, wenn sie ihrem Volk zeigen will, dass sie die richtige Wahl für die Regierung Chinas ist."
CHI_open_the_market:0 "Das Marktdilemma"
CHI_open_the_market_desc:0 "Viele Experten und Politiker diskutieren derzeit, welchen Weg die neue chinesische Regierung wählen soll: einen offenen Markt oder eine gelenkte Wirtschaft? Unabhängig von der Entscheidung hoffen die Chinesen, dass sie dem Land eine bessere Zukunft beschert."
CHI_a_happy_ending:0 "Ein Happy End?"
CHI_a_happy_ending_desc:0 "Ob das neue Wirtschaftssystem, das die Nation eingeführt hat, die richtige Entscheidung war, wird sich noch zeigen. Doch was auch immer das Ergebnis sein mag, das chinesische Volk wird nie vergessen, wie es war, während der Kriegsherrenära zu leben und wie die drei Prinzipien des Volkes ihm geholfen haben, sein Leben zu verbessern."
YUN_the_democratic_fortress:0 "Die demokratische Festung"
YUN_the_democratic_fortress_desc:0 "Während in Nanjing ein antikommunistischer Diktator herrscht und sich in Yan&#39;an ein verrückter Revolutionär versteckt, ist Yunnan, obwohl es von einem Kriegsherrn regiert wird, eine der stabilsten Regionen in ganz China und wird von seinen eigenen Bürgern aufgrund seiner wachsenden Wirtschaft und seiner politischen, sozialen und bildungsbezogenen Reformen als „demokratische Festung“ angesehen."
YUN_knee_before_chiang:0 "Knie vor Chiang"
YUN_knee_before_chiang_desc:0 "Nachdem die Nationalisten nun die Kontrolle über unser Land übernommen haben, ist es nur noch eine Frage der Zeit, bis wir Teil der Republik China werden ..."
YUN_defy_nanjing:0 "Trotze Nanjing"
YUN_defy_nanjing_desc:0 "Uns wird nicht dasselbe Schicksal widerfahren wie Sichuan und Hunan, die zu gescheiterten Provinzen der Regierung von Nanjing geworden sind. Es ist Zeit, unser Schicksal selbst in die Hand zu nehmen!"
YUN_nationalist_economic_aid:0 "Nationalistische Wirtschaftshilfe"
YUN_nationalist_economic_aid_desc:0 "Wir werden Nanjing um Wirtschaftshilfe bitten, um unsere schwache Wirtschaft zu verbessern."
YUN_prepare_for_the_inevitable:0 "Bereiten Sie sich auf das Unvermeidliche vor"
YUN_prepare_for_the_inevitable_desc:0 "Ein Krieg gegen die Japaner ist nur eine Frage der Zeit. Wir müssen unsere Produktion verbessern, um sie bekämpfen zu können."
YUN_renounce_to_our_future:0 "Verzichte auf unsere Zukunft"
YUN_renounce_to_our_future_desc:0 "Da wir keine Möglichkeit mehr haben, unser Schicksal selbst in die Hand zu nehmen, müssen wir unsere demokratischen Ambitionen aufgeben. Lasst uns jetzt einfach gute Divisionen für die Regierung in Nanjing ausbilden."
YUN_military_affairs_commision:0 "Kommission für Militärangelegenheiten"
YUN_military_affairs_commision_desc:0 "Wir werden unser Oberkommando reformieren und versuchen, die letzten Reformen von Nanjing nachzuahmen."
YUN_whampoa_military_academy:0 "Whampoa Militärakademie"
YUN_whampoa_military_academy_desc:0 "Wir werden unsere Offiziere in der bekannten Militärakademie Whampoa ausbilden, genau wie die Nationalisten."
YUN_increase_our_autonomy:0 "Erhöhen Sie unsere Autonomie"
YUN_increase_our_autonomy_desc:0 "Wir werden die nationalistische Regierung auffordern, eine autonomere Wirtschaft aufzubauen."
YUN_use_what_we_have:0 "Nutzen Sie, was wir haben"
YUN_use_what_we_have_desc:0 "Wir werden alles dafür tun, unsere Wirtschaft auch in Zukunft aufrechtzuerhalten."
YUN_request_control_over_sichuan:0 "Fordern Sie die Kontrolle über Sichuan"
YUN_request_control_over_sichuan_desc:0 "Da wir nun mit der Regierung von Nanjing verbündet sind, ist es möglich, dass sie bereit ist, uns einige Teile ihrer Verwaltung zu übertragen."
YUN_guard_the_burma_road:0 "Bewachen Sie die Burmastraße"
YUN_guard_the_burma_road_desc:0 "Unsere Pflicht ist es, die Burmastraße vor allen Eindringlingen zu schützen. Wir dürfen unserer Mission nicht entgehen!"
YUN_alone_against_all_odds:0 "Sozialistische Exilanten anlocken"
YUN_alone_against_all_odds_desc:0 "Viele Sozialisten saßen zwischen den Stühlen, als Chiang 1927 die kommunistische Säuberung begann. Die Kommunisten betrachteten sie als nicht der Sache verpflichtet, die Nationalisten als totalitäre Ratten. Wir werden ihnen einen Ort zum Ansiedeln geben, während die Kuomintang und die Kommunistische Partei ihr Blut und ihre Seele im Kampf vergießen."
YUN_military_academy_of_yunnan:0 "Militärakademie von Yunnan"
YUN_military_academy_of_yunnan_desc:0 "Die Militärakademie von Yunnan ist in ganz China für die Qualität ihrer Offiziere bekannt und wir werden ihr Ansehen weiter steigern.“"
YUN_a_better_future_for_china:0 "Für eine bessere Zukunft"
YUN_a_better_future_for_china_desc:0 "Warum sollte man für einen blutrünstigen General oder eine verrückte Bibliothekarin sterben? Sie wollen nichts anderes als mehr Macht für sich selbst. In Yunnan kämpft man für die Zukunft Chinas, nicht für den totalitären Traum eines Verrückten."
YUN_protect_the_fortress:0 "Beschütze die Festung"
YUN_protect_the_fortress_desc:0 "Unsere Armee muss für den Kampf in den Bergen ausgebildet werden, um die einzige Region zu verteidigen, die China retten kann."
YUN_proclaim_the_rival_government:0 "Die rechtmäßige KMT" 
YUN_proclaim_the_rival_government_desc:0 "Als Sun Yat Sen die Kuomintang gründete, versprach er dem chinesischen Volk eine Sozialdemokratie, die sich an den Drei Prinzipien des Volkes orientierte. Doch nach seinem Tod und dem Aufstieg Chiang Kai-sheks verwandelte sie sich in eine konservative, ja sogar faschistische Partei. Wir werden das Erbe Sun Yat Sens bewahren und es dann ganz China zugänglich machen."
YUN_unpolitized_high_command:0 "Unpolitisiertes Oberkommando"
YUN_unpolitized_high_command_desc:0 "Während Nanjing und Yan&#39;an lieber einen General haben, der ihrer Ideologie treu ist, als einen wirklich fähigen, befördern wir unsere Offiziere nur aufgrund ihrer Fähigkeiten."
YUN_prepare_to_cross_the_rivers:0 "Bereiten Sie sich auf die Überquerung der Flüsse vor"
YUN_prepare_to_cross_the_rivers_desc:0 "Wenn wir eine Offensive gegen Nanjing starten wollen, müssen wir über die richtigen Mittel verfügen, um die zahlreichen Flüsse zu überqueren, die unsere Grenzen zu Nanjing schützen."
YUN_prepare_the_revolt_of_sichuan:0 "Bereiten Sie den Aufstand von Sichuan vor"
YUN_prepare_the_revolt_of_sichuan_desc:0 "1935 begann die Sichuan-Clique eng mit der Regierung von Nanjing zusammenzuarbeiten, da Chiang Kai-Shek Liu Xiang bei dessen Putsch gegen seinen Onkel Liu Wenhui unterstützte. Heute ist die Regierung von Sichuan nur noch Nanjing unterstellt und hat sich zu einem korrupten Land entwickelt, das für seine missbräuchliche Münzprägung und -ausgabe bekannt ist. Um Nanjing Paroli zu bieten, müssen wir die Unzufriedenheit der Bevölkerung in der Region zu unserem Vorteil nutzen."
YUN_underground_weapon_production:0 "Unterirdische Waffenproduktion"
YUN_underground_weapon_production_desc:0 "Obwohl dies nicht die beste Option ist, werden wir Leute mit der Herstellung von Waffen im Eigenbau beauftragen, um unsere Produktion deutlich zu verbessern. Allerdings wäre die Qualität unserer Waffen dann wesentlich geringer und es wäre schwierig herauszufinden, ob diese illegalen Arbeiter uns alle Waffen übergeben oder ob sie Kriminelle und Banditen beliefern."
YUN_second_northern_expedition:0 "Zweite Nordexpedition"
YUN_second_northern_expedition_desc:0 "Unsere Regierung ist vielleicht nicht perfekt. Long Yun ist weiterhin der einzige Führer der in Yunnan gebildeten Republik China. Das Volk kann jedoch seine politischen Führer wählen, und es wird ein Parlament gebildet, um der Macht des Präsidenten entgegenzutreten. Dennoch lebt das chinesische Volk heute besser als unter der rechten Kuomintang und der KPCh. Deshalb müssen wir jetzt die Verbliebenen befreien und China wiedervereinigen, wie es Sun Yat Sen wollte."
YUN_expand_our_armed_forces:0 "Unsere Streitkräfte ausbauen"
YUN_expand_our_armed_forces_desc:0 "Wir müssen unsere Armee so schnell wie möglich vergrößern, wenn wir nicht von unseren Feinden besiegt werden wollen."
YUN_fix_the_economy:0 "Die Wirtschaft reparieren"
YUN_fix_the_economy_desc:0 "Unsere Wirtschaft beginnt sich zu erholen, aber es bleibt noch viel zu tun, insbesondere im Hinblick auf unser Opiumproblem."
YUN_mine_copper:0 "Kupfer abbauen"
YUN_mine_copper_desc:0 "Eine Steigerung unserer Kupferexporte wird uns bei unserer Waffenproduktion und unserer Wirtschaft enorm helfen."
YUN_mine_coal:0 "Kohle abbauen"
YUN_mine_coal_desc:0 "Kohle selbst könnte einen Teil unserer Industrie mit Energie versorgen, aber mit der Kohleverflüssigung könnten wir möglicherweise alle Arten von Fahrzeugen und Maschinen in unserem Land mit Energie versorgen."
YUN_mine_more_tungsten:0 "Mehr Wolfram abbauen"
YUN_mine_more_tungsten_desc:0 "Es gibt in unserem Land noch viele Wolframminen, die unsere Exporte ankurbeln könnten. Wir sollten sie nicht verschwenden."
YUN_textile_exports:0 "Textilexporte"
YUN_textile_exports_desc:0 "Unser Land ist für seine Textilexporte bekannt. Eine Steigerung dieser Exporte wird unserer Wirtschaft zu mehr Stabilität verhelfen."
YUN_pursue_food_self_sufficiency:0 "Streben Sie nach Selbstversorgung mit Lebensmitteln"
YUN_pursue_food_self_sufficiency_desc:0 "Einer der vielen Pläne Long Yuns, unserem Land zu helfen, besteht darin, die Getreide- und Weizenernte im Land zu steigern, um eine Nahrungsmittelautarkie im Land zu erreichen, sodass wir nicht vom Westen oder von Nanjing abhängig sind."
YUN_hydroelectric_ambitions:0 "Wasserkraftambitionen"
YUN_hydroelectric_ambitions_desc:0 "Auch wenn es schwierig sein wird, sich zurückzuziehen, wird uns die Nutzung unserer großen Flusslandschaft zum Bau unseres ersten Wasserkraftwerks sehr dabei helfen, ausreichend Strom zu produzieren."
YUN_improve_our_infrastructure:0 "Verbesserung unserer Infrastruktur"
YUN_improve_our_infrastructure_desc:0 "Die Straßen von Yunnan sind derzeit in einem beklagenswerten Zustand, Long Yun hat bereits einen Plan zur Verbesserung ihrer Qualität ausgearbeitet."
YUN_the_yunnan_transport_enterprise:0 "Yunnan Transportunternehmen"
YUN_the_yunnan_transport_enterprise_desc:0 "Das von Long Yun gegründete Transportunternehmen Yunnan ist für den Bau von Straßen in ganz Südchina und Burma bekannt geworden. Für unsere Regierung ist es von entscheidender Bedeutung, diesen Ruf zu bewahren."
YUN_the_burma_sichuan_road:0 "Die Burma-Sichuan-Straße"
YUN_the_burma_sichuan_road_desc:0 "Die Burma-Sichuan-Straße ist das neue Projekt unserer Regierung. Ziel ist es, die Burma-Yunnan-Straße und die Yunnan-Sichuan-Straße zu vereinen. Nach der Fertigstellung wird dieses Projekt unseren Nachbarn sicherlich gefallen."
YUN_replace_the_opium_crops:0 "Ersetzen Sie die Opiumpflanzen"
YUN_replace_the_opium_crops_desc:0 "Unsere Regierung wird versuchen, die Opiumfelder durch Getreide- und Weizenanbau zu ersetzen."
YUN_reintroduce_the_yuan:0 "Wiedereinführung des Yuan"
YUN_reintroduce_the_yuan_desc:0 "Die Wiedereinführung der Yuan-Währung wird den Menschen in Yunnan helfen zu verstehen, dass die einzige Möglichkeit zur Rettung unserer Wirtschaft darin besteht, auf Opium zu verzichten."
YUN_educate_our_people:0 "Unsere Mitarbeiter weiterbilden"
YUN_educate_our_people_desc:0 "Wenn wir unsere Bevölkerung über Opium und Wirtschaft aufklären, werden wir sie endgültig davon überzeugen, ihr veraltetes Währungssystem aufzugeben. Und wir werden auch die Zahl der Universitäten im Land erhöhen."
YUN_the_yunnan_university:0 "Die Yunnan-Universität"
YUN_the_yunnan_university_desc:0 "Da sich unsere Wirtschaft inzwischen stabilisiert hat, konnten viele Menschen Schulen und Universitäten besuchen, was unsere Forschungskapazitäten erheblich steigerte."
YUN_rebuild_our_army:0 "Bauen Sie unsere Armee wieder auf"
YUN_rebuild_our_army_desc:0 "Nachdem die Nationalisten nach dem Langen Marsch ihren Einfluss auf unsere Regierung verstärkt hatten, stoppte unsere Armee ihren Ausbau. Wenn wir unser Land verteidigen wollen, müssen wir die Wehrpflicht erhöhen."
YUN_investigate_artillery_models:0 "Untersuchen Sie Artilleriemodelle"
YUN_investigate_artillery_models_desc:0 "Einige unserer Offiziere haben noch nie mit Artillerie gearbeitet, während der Westen bereits eine Möglichkeit gefunden hat, Bomben vom Himmel zu werfen. Diese Technologie wäre für unsere Armee eine große Hilfe."
YUN_investigate_rifle_models:0 "Untersuchen Sie Gewehrmodelle"
YUN_investigate_rifle_models_desc:0 "Einige unserer Waffen sind sogar älter als unsere Nation. Wenn wir mit den anderen Kriegsherren konkurrieren wollen, müssen wir uns mit diesem Problem befassen."
YUN_mountain_artillery:0 "Gebirgsartillerie"
YUN_mountain_artillery_desc:0 "In Anlehnung an die Gebirgsgeschütze, die die Armee des Raj in den nördlichen Regionen einsetzte, haben wir ein Artilleriegeschütz entwickelt, das zerlegt und leicht per Pferd oder Fahrzeug transportiert werden kann, was unsere Transportmöglichkeiten in den Bergen erheblich verbessert."
YUN_all_must_be_trained:0 "Alle müssen geschult werden"
YUN_all_must_be_trained_desc:0 "Da unser Land fast ausschließlich aus Bergen besteht, müssen alle Soldaten eine gewisse Ausbildung zum Bergsteiger absolvieren."
YUN_mountaineer_training:0 "Bergsteigertraining"
YUN_mountaineer_training_desc:0 "Die Ausbildung von Eliteeinheiten der Gebirgsjäger wird uns einen großen Vorteil gegenüber unseren Feinden verschaffen."
YUN_reform_our_doctrines:0 "Reformieren Sie unsere Lehren"
YUN_reform_our_doctrines_desc:0 "Um unsere Nation zu verteidigen, ist eine Reform unserer überholten Lehren notwendig."
YUN_military_research:0 "Militärische Forschung"
YUN_military_research_desc:0 "Wir müssen mehr Wissenschaftler für die Waffenentwicklung einstellen und so unsere Chancen gegenüber anderen Ländern deutlich erhöhen."
YUN_the_hope_of_china:0 "Die Hoffnung Chinas"
YUN_the_hope_of_china_desc:0 "Chiangs Regierung ist gestürzt, und damit ist unser einziger Verbündeter weg. Die neue Regierung, die jetzt Nanjing kontrolliert, wird vielleicht noch schlimmer sein als Chiangs Regierung, aber wir wissen, dass das chinesische Volk uns braucht."
YUN_the_great_march_south:0 "Der Große Marsch nach Süden"
YUN_the_great_march_south_desc:0 "Viele Divisionen der Kuomintang sind aus ihrer ehemaligen Heimat nach Kunming, der demokratischen Festung, geflohen. Einige unserer Generäle haben vorgeschlagen, den feindlichen Angriff in den Bergen abzuwarten. Doch wenn wir das tun, werden wir letztendlich untergehen, da unsere Wirtschaft nicht stark genug ist. Wir müssen die Initiative ergreifen."
YUN_men_for_the_fortress:0 "Männer für die Festung"
YUN_men_for_the_fortress_desc:0 "Jeder Chinese, der im Kampf zur Befreiung Nanjings von den Mächten des Totalitarismus mithelfen will, soll eingezogen werden. Wir dürfen nicht untätig bleiben, während unsere Brüder und Schwestern im Ausland leiden."
YUN_guns_for_the_fortress:0 "Waffen für die Festung"
YUN_guns_for_the_fortress_desc:0 "Obwohl dies nicht die beste Option ist, werden wir Leute mit der Herstellung von Waffen im Eigenbau beauftragen, um unsere Produktion deutlich zu verbessern. Allerdings wäre die Qualität unserer Waffen dann wesentlich geringer und es wäre schwierig herauszufinden, ob diese illegalen Arbeiter uns alle Waffen übergeben oder ob sie Kriminelle und Banditen beliefern."
YUN_the_flag_of_liberty:0 "Die Flagge der Freiheit"
YUN_the_flag_of_liberty_desc:0 "Unsere Armee und unsere Flagge werden jedem unterworfenen Chinesen Hoffnung bringen. Von nun an kann jeder von Freiheit und Demokratie träumen."
YUN_the_end_of_the_century:0 "Der Tiger erwacht"
YUN_the_end_of_the_century_desc:0 "Unser großer Feldzug hat begonnen. So wie die Kuomintang nach Norden marschierte, um die Fengtian-Clique auszulöschen, müssen wir nun Nanjing und Peking von den Mächten des Totalitarismus befreien. Wir werden mit Ehre sterben oder mit Ruhm leben!"
YUN_lay_down_the_rifle:0 "Leg das Gewehr nieder"
YUN_lay_down_the_rifle_desc:0 "Unser Ziel ist erreicht. Endlich ist die Hauptstadt befreit, und wir sind der Erfüllung von Sun Yat Sens Traum näher denn je: Demokratie und Frieden in China."
YUN_our_own_path:0 "Unser eigener Weg"
YUN_our_own_path_desc:0 "Warum sollten wir uns mit einer repressiven Regierung wie der von Mao oder Chiang verbünden wollen? Wir müssen unseren eigenen Weg wählen, indem wir die Dian-Identität wiederbeleben."
YUN_the_king_of_yunnan:0 "Der König von Yunnan"
YUN_the_king_of_yunnan_desc:0 "Long Yun brachte uns Wohlstand und Stabilität, weshalb ihn viele Menschen immer als „König von Yunnan“ bezeichneten. Nun wird er uns in die Unabhängigkeit von Nanjing führen, und wir werden ihm dabei helfen, dieses Ziel zu erreichen."
YUN_of_mountains_and_rivers:0 "Von Bergen und Flüssen"
YUN_of_mountains_and_rivers_desc:0 "Yunnan mag ein raues Land sein, aber es ist das Land, das jeder seiner Bürger verteidigen wird."
YUN_bodish_himalayan_roots:0 "Bodish-Himalaya-Wurzeln"
YUN_bodish_himalayan_roots_desc:0 "Wir dürfen die Bodish-Himalaya-Wurzeln und Sprachen des alten Dian-Königreichs nicht vergessen."
YUN_burmish_loloish_roots:0 "Burmish-Loloish-Wurzeln"
YUN_burmish_loloish_roots_desc:0 "Wir dürfen die burmesisch-loloischen Wurzeln und Sprachen des alten Dian-Königreichs nicht vergessen."
YUN_expand_to_the_west:0 "Expansion nach Westen"
YUN_expand_to_the_west_desc:0 "Sowohl Tibet als auch Bhutan sind nicht stark genug, um sich vor China und Indien zu schützen. Wir werden sie in unsere Nation integrieren, sodass keiner von ihnen sie unterwerfen kann."
YUN_intervene_in_burma:0 "Intervenieren Sie in Burma"
YUN_intervene_in_burma_desc:0 "Wir müssen das Volk von Burma von seinen indischen und britischen Oberherren befreien, wenn wir jedoch Erfolg haben wollen, sollten wir einen indirekten Ansatz wählen."
YUN_the_dian_navy:0 "Die Dian-Marine"
YUN_the_dian_navy_desc:0 "Jetzt, da wir eine Küste haben, ist es an der Zeit, eine Marine aufzubauen, die in der Lage ist, das Volk der Dian zu verteidigen."
YUN_european_designs:0 "Europäische Designs"
YUN_european_designs_desc:0 "Wir werden europäische Designs für unsere Schiffe erwerben, damit deren Entwicklung schneller vorangeht."
YUN_focus_on_naval_production:0 "Fokus auf die Marineproduktion"
YUN_focus_on_naval_production_desc:0 "Wir werden versuchen, uns auf die Marineproduktion zu konzentrieren, um so schnell wie möglich eine Flotte aufzubauen."
XSM_choose_an_identity:0 "Wählen Sie eine Identität"
XSM_choose_an_identity_desc:0 "Obwohl unsere Regierung derzeit mit Nanjing verbündet und loyal ist, gibt es immer noch viele Menschen, die sich nicht als Han (auch bekannt als Chinesen) betrachten. Unsere Regierung wird entscheiden müssen, ob wir uns als Han bezeichnen und somit Nanjing gegenüber loyal sind, oder ob wir uns als Hui bezeichnen und unseren eigenen Weg gehen."
XSM_han:0 "Han"
XSM_han_desc:0 "Han ist die vorherrschende chinesische Volksgruppe, die vor allem in Ostchina vorkommt. Obwohl diese Volksgruppe nur in einem kleinen Teil unseres Landes vertreten ist, wird die Behauptung, hauptsächlich Chinese zu sein, unsere guten Beziehungen zu Nanjing aufrechterhalten."
XSM_deal_with_the_goloks:0 "Deal mit den Goloks"
XSM_deal_with_the_goloks_desc:0 "Seit 1917 haben wir es in der Region Qinghai mit Golok und tibetischen Milizen zu tun. Und obwohl wir den Qinghai-Tibet-Krieg 1932 gewonnen haben, hat der Widerstand in der Region nicht abgebrochen. Es ist an der Zeit, diese Verbrecher in die Hölle oder nach Tibet zu verbannen, je nach der Stimmung unseres Anführers."
XSM_hui:0 "Hui"
XSM_hui_desc:0 "Unser Land ist voller Ethnien. Tibeter, Goloks, Uiguren, Mongolen, Hui und Han leben innerhalb unserer Grenzen. Daher können wir unser Land nicht nur als eine chinesische Provinz betrachten. Wir werden unser Volk unter einer Identität vereinen: der der Hui."
XSM_continue_our_duty:0 "Setzen Sie unsere Pflicht fort"
XSM_continue_our_duty_desc:0 "Es ist unsere Pflicht, Nanjing in unserem Kampf gegen den Kommunismus und die Japaner zu helfen, und wir werden dieser Pflicht bis zum Ende nachkommen."
XSM_defy_chiang:0 "Trotze Chiang"
XSM_defy_chiang_desc:0 "Chiang Kai-Shek ist ein inkompetenter Führer, der es seit Jahren nicht geschafft hat, die Nation zu stabilisieren. Daher ist es an der Zeit, den Staffelstab an uns weiterzugeben, um die chinesische Wiedervereinigung unter Ma Buqing, dem konfuzianischen Schüler, fortzusetzen."
XSM_nationalist_economic_aid:0 "Nationalistische Wirtschaftshilfe"
XSM_nationalist_economic_aid_desc:0 "Wir werden Nanjing um Wirtschaftshilfe bitten, um unsere schwache Wirtschaft zu verbessern."
XSM_prepare_for_the_inevitable:0 "Bereiten Sie sich auf das Unvermeidliche vor"
XSM_prepare_for_the_inevitable_desc:0 "Ein Krieg gegen die Japaner ist nur eine Frage der Zeit. Wir müssen unsere Produktion verbessern, um sie bekämpfen zu können."
XSM_military_affairs_commision:0 "Kommission für Militärangelegenheiten"
XSM_military_affairs_commision_desc:0 "Wir werden unser Oberkommando reformieren und versuchen, die letzten Reformen von Nanjing nachzuahmen." 
XSM_whampoa_military_academy:0 "Whampoa Militärakademie"
XSM_whampoa_military_academy_desc:0 "Wir werden unsere Offiziere in der bekannten Militärakademie Whampoa ausbilden, genau wie die Nationalisten."
XSM_request_rail_building_from_nanjing:0 "Anfrage für Schienenbau aus Nanjing"
XSM_request_rail_building_from_nanjing_desc:0 "Wir werden Nanjing um eine Kommission zur Verbesserung der Infrastruktur unseres Landes bitten, damit wir die Kriegsanstrengungen besser unterstützen können."
XSM_nanjing_building_mission:0 "Nanjing-Baumission"
XSM_nanjing_building_mission_desc:0 "Wir werden Nanjing um Hilfe zur Verbesserung unserer wirtschaftlichen Lage bitten, im Gegenzug für unsere Hilfe im Konflikt."
XSM_expand_our_conscription:0 "Erweitern Sie unsere Wehrpflicht"
XSM_expand_our_conscription_desc:0 "Wenn wir eine Chance gegen die Invasoren haben wollen, müssen wir mehr Leute für die Armee rekrutieren und dürfen die Regierung von Nanjing nicht enttäuschen!"
XSM_fearsome_cavalry:0 "Furchterregende Kavallerie"
XSM_fearsome_cavalry_desc:0 "Nach unserem Kriegsbeitrag ist unser Kavalleriekorps in Ostasien zu einer Legende geworden. Wir müssen diese Legende am Leben erhalten, damit unsere Feinde immer wieder Ehrfurcht empfinden, wenn sie von unserem Korps besiegt werden."
XSM_the_four_confucian_principles:0 "Die vier konfuzianischen Prinzipien"
XSM_the_four_confucian_principles_desc:0 "Der Konfuzianismus, auch als Ruismus bekannt, wird als Tradition, Philosophie, Religion, Regierungsform oder einfach als Lebensweise beschrieben. Für andere ist er jedoch die Kraft, die China geschwächt und in das verwandelt hat, was es heute ist: eine Heimat der Anarchie und Diktaturen. Und während andere versuchen, ihn durch die Drei Prinzipien des Volkes und den Maoismus zu ersetzen, werden wir ihnen zeigen, dass der Konfuzianismus der richtige Weg ist."
XSM_ren:0 "Ren"
XSM_ren_desc:0 "Ren, auch bekannt als Güte oder Menschlichkeit, ist die Essenz des Menschen. „Was du nicht willst, dass man dir tu, das füg auch keinem anderen zu“ ist ein Satz, der dieses Prinzip perfekt beschreibt. Ihm folgend werden wir versuchen, diejenigen, die nur durch Gewalt verletzen wollen, mit Vernunft zu beruhigen."
XSM_li:0 "Li"
XSM_li_desc:0 "Li bedeutet Vernunft, Ritus oder Ordnung. Es ist das Prinzip, nach dem alle Menschen durch Erlernen und Praktizieren Vollkommenheit erreichen können. Deshalb werden wir unserem Volk und unserer Regierung helfen, Li zu praktizieren, um Vollkommenheit zu erreichen."
XSM_zhong:0 "Zhong"
XSM_zhong_desc:0 "Zhong bedeutet Loyalität gegenüber dem Führer, nicht wegen seiner Macht, sondern wegen seiner moralischen Rechtschaffenheit. Es besagt, dass ein inkompetenter Herrscher abgesetzt werden sollte. Ist der Herrscher böse, hat das Volk das Recht, ihn zu stürzen. Doch unsere Bürger werden das nie tun müssen, denn Ma Buqing wird immer der bessere Führer Chinas sein."
XSM_xiao:0 "Xiao"
XSM_xiao_desc:0 "Xiao steht für die kindliche Pietät, die alle Konfuzianer erfahren müssen. Ein Konfuzianer sollte nicht rebellisch sein, sondern Liebe, Respekt und Unterstützung zeigen und schließlich seiner Vorfahren gedenken. Und genau das werden wir tun. Wir werden uns an die Opfer und Erfahrungen aller Soldaten erinnern, die für China gekämpft haben, von den ersten Dynastien bis zur sowjetischen Invasion in Xinjiang."
XSM_bring_stability_to_nanjing:0 "Bringen Sie Stabilität nach Nanjing"
XSM_bring_stability_to_nanjing_desc:0 "Nachdem sich unser Land stabilisiert hat, ist es an der Zeit, Nanjing zu stabilisieren. Gemäß den konfuzianischen Prinzipien werden wir den Anarchismus in China und, wenn nötig, auch im Rest Asiens beenden."
XSM_the_junzi:0 "Der Junzi"
XSM_the_junzi_desc:0 "Junzi kann mit „Sohn des Herrn“ übersetzt werden und wird verwendet, um den idealen Mann zu beschreiben. Auch wenn es um Moral geht, brauchen wir ideale Soldaten, wenn wir Nanjing befreien wollen. In China gibt es viele, die sich unserer Sache, der Sache der Junzi, gerne anschließen würden."
XSM_train_the_xiaoren:0 "Trainiere die Xiaoren"
XSM_train_the_xiaoren_desc:0 "Die Xiaoren sind Menschen, die nicht nach Tugend streben, sondern nur nach unmittelbarem Gewinn. Xiaoren lässt sich mit „kleine Leute“ übersetzen und sie sind diejenigen, die das Leid einer Nation verursachen. Deshalb werden wir sie erziehen, damit unsere Regierung nur noch von Junzi umgeben ist, den Leuchttürmen der kindlichen Pietät."
XSM_non_intervention_pact_with_india:0 "Nichteinmischungspakt mit Indien"
XSM_non_intervention_pact_with_india_desc:0 "Im Qinghai-Tibet-Krieg von 1932 standen wir kurz davor, die Tibeter zu erobern, bis die britische Kolonialherrschaft und die Briten uns zu Hilfe kamen. Glücklicherweise scheinen die beiden nach der Machtübernahme des Faschismus in Deutschland nun wieder stärker mit Europa beschäftigt zu sein. Dennoch sollten wir uns vorsichtshalber mit den Indern über ihre Haltung zu Tibet in Verbindung setzen."
XSM_fight_the_remaining_militias:0 "Bekämpfe die verbleibenden Milizen"
XSM_fight_the_remaining_militias_desc:0 "Vor kurzem haben die tibetischen und Golok-Milizen begonnen, ihre terroristischen Aktivitäten in Qinghai einzustellen, aber sie sind noch nicht am Ende. Wir sollten eine Operation durchführen, um sie zu vernichten, bevor sie ihre Kämpfe wieder aufnehmen."
XSM_subjugate_the_tibetans:0 "Unterwerft die Tibeter"
XSM_subjugate_the_tibetans_desc:0 "Um nie wieder Guerillas in Qinghai zu haben, besteht unsere einzige Option darin, die Kontrolle über die tibetische Regierung zu übernehmen. Wir werden ein Ultimatum nach Lhasa schicken und ihre Kapitulation vor unserem Land fordern."
XSM_assimilate_the_tibetans:0 "Die Tibeter assimilieren"
XSM_assimilate_the_tibetans_desc:0 "Um nie wieder gegen diese Guerillas kämpfen zu müssen, werden wir versuchen, die Tibeter zu assimilieren, damit sie uns nicht als Oberherren, sondern als Brüder betrachten."
XSM_a_central_asian_state:0 "Ein zentralasiatischer Staat"
XSM_a_central_asian_state_desc:0 "Wir werden dem Traum von Ma Hushan folgen, die islamischen Inder, die Zentralasiaten und die Hui unter einer Nation zu vereinen und den Kommunismus vom Kontinent zu löschen, wie es sein sollte!"
XSM_a_pan_islamic_state:0 "Ein panislamischer Staat"
XSM_a_pan_islamic_state_desc:0 "Wir werden den Lehren von Ma Bufang folgen, um alle islamischen Nationen unter einem Banner zu befreien und wieder zu vereinen und sie für immer vor der Unterwerfung zu schützen!"
XSM_finish_the_sinkiang_campaign:0 "Beenden Sie die Sinkiang-Kampagne"
XSM_finish_the_sinkiang_campaign_desc:0 "Wir werden beenden, was wir 1934 begonnen haben, nämlich die illegitime Regierung von Xinjiang zu besiegen!\n§RInformieren wir Sinkiang den Krieg, haben wir 45 Tage Zeit, sie zu besiegen, bevor die Sowjets eingreifen.§!"
XSM_adquire_camels:0 "Kamele erwerben"
XSM_adquire_camels_desc:0 "Wenn wir unsere Mission erfüllen wollen, müssen wir unsere Armee an den Kampf in der Wüste gewöhnen, und was wäre hierfür besser geeignet als Kamele? Wir werden Trampeltiere für den Transport unserer Vorräte und importierte Kamele für den Kampf in den Dünen einsetzen."
XSM_liberate_the_slaves_of_the_soviets:0 "Befreit die Sklaven der Sowjets"
XSM_liberate_the_slaves_of_the_soviets_desc:0 "Unser Ziel ist die Befreiung der Zentralasiaten, die seit Jahrzehnten unter der russischen Herrschaft leben."
XSM_liberate_the_southern_islamics:0 "Befreit die Islamisten im Süden"
XSM_liberate_the_southern_islamics_desc:0 "Wir werden mit der Befreiung der Islamisten des Südens beginnen."
XSM_coerce_the_persians:0 "Zwinge die Perser"
XSM_coerce_the_persians_desc:0 "Nachdem wir nun unseren Feldzug zur Niederlage der sowjetischen und britischen Streitkräfte begonnen haben, ist es für Persien an der Zeit, sich für eine Seite zu entscheiden: Werden sie uns in unserer Sache unterstützen oder werden sie erobert werden?"
XSM_revolt_in_the_islamic_caucasus:0 "Aufstand im islamischen Kaukasus"
XSM_revolt_in_the_islamic_caucasus_desc:0 "Das Entfachen eines Aufstands in Aserbaidschan und Grosny wird dazu beitragen, die Russen zu schwächen und ihnen die Möglichkeit zu nehmen, ihre Kriegsmaschinen mit dem kaukasischen Öl zu betanken."
XSM_a_better_central_asia:0 "Ein besseres Zentralasien"
XSM_a_better_central_asia_desc:0 "Zentralasien wurde von den Sowjets jahrelang vernachlässigt, aber im Gegensatz zu ihnen werden wir diesen armen Menschen zeigen, dass wir hier sind, um ihnen zu helfen."
XSM_destroy_communism:0 "Zerstöre den Kommunismus"
XSM_destroy_communism_desc:0 "Einer von Ma Hushans Träumen ist es, den Kommunismus aus der Welt zu schaffen, und jetzt, da unsere Armee so mächtig geworden ist, ist es vielleicht an der Zeit, diesen Traum zu verwirklichen."
XSM_the_great_holy_war:0 "Der Große Heilige Krieg"
XSM_the_great_holy_war_desc:0 "Wir werden versuchen, alle islamischen Völker zu einem heiligen Befreiungs- und Vereinigungskrieg zu vereinen, damit kein Islam erneut von einer ausländischen Macht unterworfen wird."
XSM_liberate_the_middle_east:0 "Befreit den Nahen Osten"
XSM_liberate_the_middle_east_desc:0 "Wir werden mit der Befreiung der Islamisten im Nahen Osten beginnen."
XSM_liberate_the_europeans:0 "Befreit die Europäer"
XSM_liberate_the_europeans_desc:0 "Wir werden mit der Befreiung der europäischen Islamisten beginnen."
XSM_liberate_the_africans:0 "Befreit die Afrikaner"
XSM_liberate_the_africans_desc:0 "Wir werden mit der Befreiung der afrikanischen Islamisten beginnen."
XSM_liberate_the_last_ones:0 "Befreie die Letzten"
XSM_liberate_the_last_ones_desc:0 "Wir werden mit der Befreiung der indonesischen und malaysischen Islamisten beginnen."
XSM_develop_qinghai:0 "Qinghai entwickeln"
XSM_develop_qinghai_desc:0 "Gemäß den Reformplänen von Ma Bufang werden wir die Hauptstadt der Ma-Clique entwickeln."
XSM_consolidate_tunganistan:0 "Tunganistan konsolidieren"
XSM_consolidate_tunganistan_desc:0 "Wir werden unsere Hauptstadt nach Tunganistan verlegen, dessen Herrscher Ma Hushan ist, um mit den Kriegsvorbereitungen zu beginnen. Da unsere Hauptstadt in einer nahezu unzugänglichen Stadt liegt, wird es unseren Feinden unmöglich sein, unsere Hauptstadt zu erobern.\n§RUnsere Hauptstadt wird direkt an der sowjetischen Grenze liegen, aber sie wird durch Berge und unwegsame Gebiete geschützt sein.§!"
XSM_improve_gansu:0 "Gansu verbessern"
XSM_improve_gansu_desc:0 "Gansu, unsere bevölkerungsreichste Region, dürfte die naheliegendste Option für die Konzentration unserer Industrie sein.\n§RUnsere Hauptstadt wird direkt an der chinesischen Grenze liegen, aber das wird unsere Versorgungslage verbessern und unserer Industrie zu schnellerem Wachstum verhelfen.§!"
XSM_controled_industrialization_project:0 "Kontrolliertes Industrialisierungsprojekt"
XSM_controled_industrialization_project_desc:0 "Gemäß den Plänen von Ma Bufang werden wir ein Projekt zur kontrollierten Industrialisierung des Landes beginnen."
XSM_open_public_schools:0 "Offene öffentliche Schulen"
XSM_open_public_schools_desc:0 "Um der ungebildeten Bevölkerung der Ma-Clique zu helfen, hat Ma Bufang vorgeschlagen, von den Bundesstaaten betriebene Schulen zu eröffnen, in denen jeder die Möglichkeit hat, eine Ausbildung zu absolvieren."
XSM_promote_agriculture:0 "Förderung der Landwirtschaft"
XSM_promote_agriculture_desc:0 "Einer der Pläne von Ma Bufang besteht darin, die Landwirtschaft des Landes zu fördern, das aufgrund der unwegsamen Landschaft recht instabil ist."
XSM_public_hospitals:0 "Öffentliche Krankenhäuser"
XSM_public_hospitals_desc:0 "Neben der Verbesserung der sanitären Einrichtungen in der Clique verfolgt Ma Bufang auch ein Projekt zur Verbesserung der Lebenserwartung der Menschen durch den Bau staatlich betriebener Krankenhäuser."
XSM_ma_scientists:0 "Ma Wissenschaftler"
XSM_ma_scientists_desc:0 "Um nicht von anderen Ländern abhängig zu sein, werden wir Wissenschaftler im Land ausbilden, damit diese neue Technologien entdecken oder zumindest herausfinden, wie man die Technologien anderer Länder imitieren kann."
XSM_secular_universities:0 "Säkulare Universitäten"
XSM_secular_universities_desc:0 "Auch wenn es für manche Generäle der Ma Clique wie eine Beleidigung klingen mag, würde eine säkulare Ausbildung die Leistungen der Universitäten erheblich verbessern, da ihnen die Zeit, die sie sonst mit dem Erlernen einer Religion verbringen würden, die sie bereits in anderen Fächern kennen, zur Verfügung stünde."
XSM_prepare_for_reunification:0 "Vorbereitung auf die Wiedervereinigung"
XSM_prepare_for_reunification_desc:0 "Wir müssen unsere Nation darauf vorbereiten, unsere versklavten Brüder befreien zu können!"
XSM_increase_the_production:0 "Steigern Sie die Produktion"
XSM_increase_the_production_desc:0 "Wir müssen die Waffenproduktion steigern, damit wir selbst den mächtigsten Feind besiegen können!"
XSM_produce_more_and_better:0 "Mehr und Besseres produzieren"
XSM_produce_more_and_better_desc:0 "Wenn wir unsere Mission erfolgreich erfüllen wollen, können wir nicht am Alten festhalten und müssen daher unsere Mitarbeiter an die Herstellung neuer Gerätetypen gewöhnen."
XSM_from_baku_to_yarkand:0 "Von Baku nach Yarkand"
XSM_from_baku_to_yarkand_desc:0 "Wir werden mit dem Bau einer Eisenbahnstrecke von Xinjiang nach Aserbaidschan beginnen, damit unser Land vollständig angebunden ist."
XSM_industrialize_our_country:0 "Industrialisieren Sie unser Land"
XSM_industrialize_our_country_desc:0 "Wir werden eine Industrialisierungskampagne in unserem Land sowie ein Projekt zur Verbesserung unserer schlechten Infrastruktur starten."
XSM_expand_the_east:0 "Den Osten erweitern"
XSM_expand_the_east_desc:0 "Wir werden die Länder des Ostens bestmöglich nutzen und unsere Industrie dort konzentrieren."
XSM_guard_gansu:0 "Wache Gansu"
XSM_guard_gansu_desc:0 "Da unsere Hauptstadt nun nicht mehr in einer Einöde liegt, hat sich unsere Versorgungslage deutlich verbessert. Doch nun haben wir ein neues Problem: Sie liegt in unmittelbarer Nähe des chinesischen Regierungsbezirks Nanjing. Wenn wir nicht verwundbar sein wollen, müssen wir all unsere Anstrengungen auf die Befestigung Gansus konzentrieren."
XSM_improve_our_technologies:0 "Verbessern Sie unsere Technologien"
XSM_improve_our_technologies_desc:0 "Um unsere Bevölkerung davon zu überzeugen, dass das Leben in der Stadt am besten ist, werden wir ihre technologischen Fortschritte verbessern, sodass sie dort gerne leben."
XSM_like_a_thunder:0 "Wie ein Donner"
XSM_like_a_thunder_desc:0 "Wenn wir in der Lage sein wollen, stärkere Feinde zu besiegen, müssen wir schnell wie der Donner sein und dürfen nicht zulassen, dass sie sich neu organisieren."
XSM_from_all_sides:0 "Von allen Seiten"
XSM_from_all_sides_desc:0 "Einen Riesen kann man nur mit vielen, gut ausgebildeten Armeen besiegen. Wenn wir die Frontlinie nicht halten können, können wir niemanden besiegen."
XSM_research_western_technologies:0 "Erforschen Sie westliche Technologien"
XSM_research_western_technologies_desc:0 "Technologische Fortschritte wie das Flugzeug und das Maschinengewehr haben uns gelehrt, dass die Kavallerie nicht ewig überlebensfähig sein wird. Deshalb werden wir beginnen, Technologien wie die in Europa verwendeten zu erforschen und hoffen, dass sie uns einen Vorteil verschaffen können."
XSM_menacing_attacks:0 "Bedrohliche Angriffe"
XSM_menacing_attacks_desc:0 "Wir werden versuchen, mit motorisierten Divisionen und Kavallerie Angst und Schrecken in den feindlichen Linien zu verbreiten und sie dann auf ihrem Rückzug zu verfolgen."
XSM_investigate_coal_liquefaction:0 "Untersuchung der Kohleverflüssigung"
XSM_investigate_coal_liquefaction_desc:0 "Wenn wir bei der Versorgung unserer Fahrzeuge nicht von ausländischen Exporten abhängig sein wollen, müssen wir mit der Erforschung einer Möglichkeit zur Eigenproduktion unserer Ressourcen beginnen."
XSM_our_first_refineries:0 "Unsere ersten Raffinerien"
XSM_our_first_refineries_desc:0 "Wir haben es geschafft! Endlich können wir mit unserem Projekt beginnen, unsere Truppen ohne ausländische Hilfe mit Treibstoff zu versorgen."
XSM_officer_training:0 "Offiziersausbildung"
XSM_officer_training_desc:0 "Wir werden unseren Offizieren die neuesten Lehren beibringen, um ihre Leistung im Kampf zu verbessern."
XSM_military_research:0 "Militärische Forschung"
XSM_military_research_desc:0 "Wir müssen mehr Wissenschaftler für die Waffenentwicklung einstellen und so unsere Chancen gegenüber anderen Ländern deutlich erhöhen."
XSM_paramilitary_training:0 "Paramilitärische Ausbildung"
XSM_paramilitary_training_desc:0 "Es gibt bereits viele Milizen in unserer Clique. Einige unterstützen unsere Regierung, andere kämpfen für die Destabilisierung unseres Landes. Durch die Einberufung unserer Unterstützer und eine bessere Ausbildung wird unsere Armee sicherlich besser vorbereitet sein."
XSM_integrate_islamic_militias:0 "Integration der islamischen Milizen"
XSM_integrate_islamic_militias_desc:0 "Gemäß unserem Plan werden wir die islamischen Milizen in unsere Armee integrieren. Diese Milizen werden bis zum Tod für uns kämpfen und den Kampf fortsetzen, selbst wenn unsere Regierung besetzt ist."
XSM_islamic_high_command:0 "Islamisches Oberkommando"
XSM_islamic_high_command_desc:0 "Ein Oberkommando, das fast ausschließlich aus islamischen Mitgliedern besteht, könnte die Moral und Kampfbereitschaft unserer Armee verbessern und die Loyalität der Wehrpflichtigen gegenüber unserem Führer stärken."
XSM_a_religious_army:0 "Eine religiöse Armee"
XSM_a_religious_army_desc:0 "Eine religiöse Armee kann zwar von Vorteil sein, um die Moral und den Kampfgeist unserer Streitkräfte zu stärken, kann sie aber auch instabil machen, insbesondere wenn wir einen Anführer bekommen, der nicht zum Islam konvertiert ist. Dennoch lohnt es sich, das Risiko einzugehen."
GXC_continue_with_lis_governance:0 "Weiter mit Lis Regierungsführung"
GXC_continue_with_lis_governance_desc:0 "Li Zongren festigte seine Macht in der Guangxi-Clique im Jahr 1925, nachdem er Shen Hongying und Tang Jihao besiegt hatte, und heute scheint es, als hätte er seine Führung in der Clique gefestigt."
GXC_recall_zhao_hengti:0 "Rückruf von Zhao Hengti"
GXC_recall_zhao_hengti_desc:0 "Zhao Hengti und Chen Jiongming waren einst Befürworter einer föderalistischen Verfassung. Doch nachdem Tang Shengzhi, der von Chiang Kai-shek unterstützt wurde, ihn aus Hunan abgesetzt hatte, verließ Zhao die Armee und die Politik. Doch was, wenn er Recht hatte? Was, wenn China nur durch eine föderalistische Regierung Stabilität erlangen kann?"
GXC_the_enemy_of_my_enemy:0 "Der Feind meines Feindes"
GXC_the_enemy_of_my_enemy_desc:0 "Auch wenn wir nie gute Beziehungen zu Nanjing hatten, ist die Unabhängigkeit Chinas durch größere Bedrohungen bedroht. Deshalb werden wir uns zusammenschließen, um sie zu schützen."
GXC_nationalist_economic_aid:0 "Nationalistische Wirtschaftshilfe"
GXC_nationalist_economic_aid_desc:0 "Wir werden Nanjing um Wirtschaftshilfe bitten, um unsere schwache Wirtschaft zu verbessern."
GXC_prepare_for_the_inevitable:0 "Bereiten Sie sich auf das Unvermeidliche vor"
GXC_prepare_for_the_inevitable_desc:0 "Ein Krieg gegen die Japaner ist nur eine Frage der Zeit. Wir müssen unsere Produktion verbessern, um sie bekämpfen zu können."
GXC_military_affairs_commision:0 "Kommission für Militärangelegenheiten"
GXC_military_affairs_commision_desc:0 "Wir werden unser Oberkommando reformieren und versuchen, die letzten Reformen von Nanjing nachzuahmen." 
GXC_whampoa_military_academy:0 "Whampoa Militärakademie"
GXC_whampoa_military_academy_desc:0 "Wir werden unsere Offiziere in der bekannten Militärakademie Whampoa ausbilden, genau wie die Nationalisten."
GXC_defend_our_nation:0 "Verteidige unsere Nation"
GXC_defend_our_nation_desc:0 "Während die Chinesen Peking und Nanjing schützen, werden wir unser Bestes tun, um ihre Südflanke zu schützen. Guangzhou wird nicht fallen!"
GXC_improve_our_resource_extraction:0 "Verbessern Sie unsere Ressourcengewinnung"
GXC_improve_our_resource_extraction_desc:0 "Waffen fallen nicht vom Himmel. Wenn wir unsere Armeen gut versorgen wollen, müssen wir unsere Ressourcengewinnung verbessern."
GXC_build_more_industry:0 "Bauen Sie mehr Industrie auf"
GXC_build_more_industry_desc:0 "Der Ausbau unserer Industrie ist für unseren Sieg im Krieg von entscheidender Bedeutung."
GXC_trench_building:0 "Grabenbau"
GXC_trench_building_desc:0 "Unser Land ist voller Flüsse und Berge, wir müssen dies ausnutzen, um unsere Positionen besser zu verteidigen."
GXC_request_control_over_hunnan:0 "Fordern Sie die Kontrolle über Hunan"
GXC_request_control_over_hunnan_desc:0 "Da wir nun mit der Regierung von Nanjing verbündet sind, ist es möglich, dass sie bereit ist, uns einige Teile ihrer Verwaltung zu übertragen."
GXC_declare_independence:0 "Unabhängigkeit erklären"
GXC_declare_independence_desc:0 "Warum sollten wir uns mit einer repressiven Regierung wie der von Mao oder Chiang verbünden wollen? Wir müssen unseren eigenen Weg wählen, indem wir die Yue-Identität wiederbeleben."
GXC_prepare_to_seize_the_ports:0 "Bereiten Sie sich darauf vor, die Häfen zu erobern"
GXC_prepare_to_seize_the_ports_desc:0 "Wir werden nicht zulassen, dass irgendein Imperialist unser Volk unterwirft. Wir werden es befreien, auch wenn es seinen Zorn erregt."
GXC_ignite_a_revolt_in_yuenan:0 "Entfachen Sie einen Aufstand in Yuenan"
GXC_ignite_a_revolt_in_yuenan_desc:0 "Yuenan, im Englischen auch als Vietnam bekannt, ist seit Jahren eine westliche Kolonie. Wir müssen unserem Bruderland helfen, das ist das Mindeste, was wir tun können."
GXC_march_to_the_south:0 "Marsch nach Süden"
GXC_march_to_the_south_desc:0 "Die schwachen Nationen des Südens haben sich vor Jahrhunderten gegen den Westen geschlagen. Wenn wir wollen, dass Südasien nie wieder erobert wird, müssen wir diese Länder selbst verwalten."
GXC_defend_from_the_north:0 "Von Norden aus verteidigen"
GXC_defend_from_the_north_desc:0 "Es ist nur eine Frage der Zeit, bis die Chinesen kommen, um unser Land zurückzufordern, aber wenn das passiert, werden wir vorbereitet sein!"
GXC_claim_the_nanbu_de:0 "Beanspruchen Sie das Nanbu De"
GXC_claim_the_nanbu_de_desc:0 "Nanbu De sind die südlichen Nationen, die vom Westen erobert leben und die wir befreien werden!"
GXC_be_better_than_them:0 "Sei besser als sie"
GXC_be_better_than_them_desc:0 "Der einzige Weg, den chinesischen Riesen zu besiegen, besteht darin, den vielen besiegten Kriegsherren zu zeigen, dass es ihnen besser gehen würde, wenn sie mit uns zusammenarbeiten würden."
GXC_look_overseas:0 "Blick ins Ausland"
GXC_look_overseas_desc:0 "Wenn wir ins Ausland blicken, werden wir feststellen, wie viele Länder Asiens entweder zu Kautschukfarmen für die Briten und Niederländer oder zu Marinestützpunkten für die USA geworden sind. Das dürfen wir nicht zulassen."
GXC_conquer_the_mountains:0 "Erobern Sie die Berge"
GXC_conquer_the_mountains_desc:0 "Wir werden diejenigen besiegen, die sich nicht selbst befreien können, egal ob sie von den Chinesen oder den Briten besetzt werden."
GXC_exploit_their_weakness:0 "Nutzen Sie ihre Schwäche aus"
GXC_exploit_their_weakness_desc:0 "Die Chinesen verfügen über eine recht schwache Flotte und scheinen nicht daran interessiert zu sein, sie zu verbessern. Wir sollten unsere eigene Marine aufbauen, um ihren Handel mit anderen Nationen und die Beschaffung geliehener Vorräte zu behindern."
GXC_do_what_they_cannot:0 "Tun, was sie nicht können"
GXC_do_what_they_cannot_desc:0 "Die Chinesen verfügen über eine winzige Luftwaffe. Wenn es uns gelänge, die Lufthoheit zu erlangen, könnten wir sie an jeder Front besiegen."
GXC_guard_the_yue_sea:0 "Bewache das Yue-Meer"
GXC_guard_the_yue_sea_desc:0 "Das Südchinesische Meer, das von unserem Land heute Yue-Meer genannt wird, darf nicht die Heimat chinesischer und westlicher Imperialisten sein. Wenn wir unsere Souveränität bewahren wollen, müssen wir die Ozeane beherrschen."
GXC_save_taiwan:0 "Rette Taiwan"
GXC_save_taiwan_desc:0 "Taiwan war schon immer ein Opfer der Eroberung durch fremde Nationen, aber dieses Mal wird eine Brudernation kommen, um es zu befreien!"
GXC_integrate_the_island:0 "Integrieren Sie die Insel"
GXC_integrate_the_island_desc:0 "Wir werden die Insel weiterentwickeln, um die Bereitschaft der Bevölkerung zur Zusammenarbeit mit unserem Land zu steigern."
GXC_the_federal_army:0 "Das Bundesheer"
GXC_the_federal_army_desc:0 "Nachdem Zhao das Kommando über die Bundesstreitkräfte übernommen hatte, begann er mit einem Projekt zur Reform der Armee, um sie offensiver zu machen und die chinesischen Kriegsherren besser einschüchtern und sie gegebenenfalls angreifen zu können."
GXC_promise_a_better_future:0 "Versprechen Sie eine bessere Zukunft"
GXC_promise_a_better_future_desc:0 "Viele Menschen haben versucht, in China mit Gewalt und Tyrannei an der Macht zu bleiben, aber wir haben aus ihren Fehlern gelernt und verstanden, dass die einzige Möglichkeit, die Tiger zu zähmen, darin besteht, sie nicht zu provozieren."
GXC_make_a_deal_with_long_yun:0 "Machen Sie einen Deal mit Long Yun"
GXC_make_a_deal_with_long_yun_desc:0 "Long Yun und wir sind mit der Regierung von Chiang Kai-Shek nicht einverstanden. Ein Bündnis mit ihnen und die Integration ihrer Generäle würde die Qualität der Bundesarmee erheblich steigern."
GXC_integrate_the_generals_of_nanjing:0 "Integrieren Sie die Generäle von Nanjing"
GXC_integrate_the_generals_of_nanjing_desc:0 "Allen Kollaborateuren von Nanjing zu vergeben, sogar ihren Armeeführern, ist der erste Schritt, um Frieden in China zu erreichen und politische Ressentiments und Radikalisierung in der Zukunft zu verhindern."
GXC_offer_a_peaceful_reunification:0 "Bieten Sie eine friedliche Wiedervereinigung an"
GXC_offer_a_peaceful_reunification_desc:0 "Niemand mag Krieg, nicht einmal wir. Wir sollten die verbleibenden Kriegsherren bitten, friedlich in unsere Föderation einzutreten, um den Tod unschuldiger Menschen zu verhindern. Sollten sie sich jedoch weigern, bleibt uns nichts anderes übrig, als unsere Streitkräfte einzusetzen."
GXC_conquer_the_illegitimates:0 "Besiege die Illegitimierten"
GXC_conquer_the_illegitimates_desc:0 "Es gibt in China immer noch einige illegitime Staaten, die nicht bereit sind und auch nicht bereit sein werden, unsere Nation friedlich wiederzuvereinen. Daher besteht unsere einzige Option darin, sie mit Gewalt zu erobern."
GXC_peace_at_last:0 "Endlich Frieden"
GXC_peace_at_last_desc:0 "Wir haben China endlich wiedervereinigt, Frieden gebracht und die Stabilität in diesen Ländern erhöht. Auch wenn noch viel zu tun bleibt, ist das Jahrhundert der Demütigung in China endlich zu Ende."
GXC_the_port_solution:0 "Die Port-Lösung"
GXC_the_port_solution_desc:0 "Natürlich will uns der Westen seine Vertragshäfen nicht überlassen, was völlig verständlich ist. Wir können es jedoch nicht ertragen, dass Chinesen unter fremden Nationen leben. Deshalb planen wir, dem Westen eine Lösung vorzuschlagen, die beiden Seiten zugutekommt: die Schaffung einer internationalen Hafenzone, die von uns verwaltet, aber weitgehend autonom ist und allen Ländern, die bisher Vertragshäfen besaßen, militärischen Zugang und Schutz für ihre Geschäfte gewährt."
GXC_literacy_campaign:0 "Alphabetisierungskampagne"
GXC_literacy_campaign_desc:0 "Eines der Hauptprobleme Chinas ist die große Zahl der Analphabeten. Auch wenn es viel Zeit und Mühe kostet, muss eine Alphabetisierungskampagne eines unserer größten Anliegen sein."
GXC_semi_independent_armies:0 "Halbunabhängige Armeen"
GXC_semi_independent_armies_desc:0 "China ist ein riesiges Land mit vielen unterschiedlichen Kulturen, Dialekten und Landschaften. Halbunabhängige Armeen würden unsere Versorgungslage verbessern und es aufgrund der Autonomie der Regionen schwieriger machen, unser Land zu besiegen. Sollte unser Land jedoch erneut zusammenbrechen, würde dieser Ansatz wahrscheinlich eine neue Ära der Kriegsherren auslösen, genau wie die vielen Dynastien und die Erste Republik."
GXC_a_chinese_army:0 "Eine chinesische Armee"
GXC_a_chinese_army_desc:0 "Eine Armee, die nur dem Präsidenten und dem Parlament untersteht, würde sicherlich die Stabilität in unserem Land aufrechterhalten und den Separatismus in unserer Nation verhindern."
GXC_increase_our_military_capacity:0 "Erhöhen Sie unsere militärische Kapazität"
GXC_increase_our_military_capacity_desc:0 "Eine unterversorgte Armee ist eine inkompetente Armee. Um sie zu erhalten, müssen wir unsere militärischen Kapazitäten erhöhen."
GXC_reactivate_our_economy:0 "Reaktivieren Sie unsere Wirtschaft"
GXC_reactivate_our_economy_desc:0 "Im Jahr 1932 beliefen sich die Opiumeinnahmen auf 50 Millionen Dollar. Durch die Besteuerung des Opiumhandels konnten wir unsere Wirtschaft stark steigern. Doch seit die Regierung von Nanjing eine Kampagne zur Unterdrückung des Opiumhandels gestartet hat, hat unsere Wirtschaft stark gelitten."
GXC_build_a_navy:0 "Bauen Sie eine Marine auf"
GXC_build_a_navy_desc:0 "Derzeit verfügt unser Land über keine Marine, was große Sorgen bereitet. Eine solche könnte uns und unseren Verbündeten helfen, uns vor Seeinvasionen zu schützen und unsere Handelsrouten zu sichern."
GXC_expand_our_arsenals:0 "Erweitern Sie unsere Arsenale"
GXC_expand_our_arsenals_desc:0 "Die einzige Möglichkeit, die Zuverlässigkeit unserer Armee zu erhöhen, besteht in der Erweiterung unserer Arsenale."
GXC_weapon_research:0 "Waffenforschung"
GXC_weapon_research_desc:0 "Was nützt uns eine gut ausgestattete Armee, wenn unsere Waffen älter sind als unsere Nation? Wir müssen uns auf die Erforschung der besten Technologien konzentrieren, um unsere Schlachten zu gewinnen."
GXC_reconcile_with_the_air_force:0 "Versöhnung mit der Luftwaffe"
GXC_reconcile_with_the_air_force_desc:0 "Nach dem Aufstand Anfang 1936 nach dem Tod von Hu Hanmin beschloss die kantonesische Luftwaffe, sich auf die Seite der Nationalisten zu stellen, was zur Niederlage von Li Zongren im Konflikt führte. Nun sollten wir versuchen, uns mit ihnen zu versöhnen, um unseren Luftraum verteidigen zu können."
GXC_expand_our_dockyards:0 "Erweitern Sie unsere Werften"
GXC_expand_our_dockyards_desc:0 "Der einzige Weg, eine schlagkräftige Marine aufzubauen, besteht darin, genügend Werften für den Bau dieser Marine zu haben."
GXC_focus_on_naval_production:0 "Fokus auf die Marineproduktion"
GXC_focus_on_naval_production_desc:0 "Wir werden versuchen, uns auf die Marineproduktion zu konzentrieren, um so schnell wie möglich eine Flotte aufzubauen."
GXC_admiral_school_of_guangzhou:0 "Admiralsschule von Guangzhou"
GXC_admiral_school_of_guangzhou_desc:0 "Die Eröffnung einer Admiralsschule mit westlichen Ausbildern würde uns sicherlich dabei helfen, die Qualität unserer Seestreitkräfte zu steigern."
GXC_hunt_them_down:0 "Jagen Sie sie"
GXC_hunt_them_down_desc:0 "In unserem Land gab es schon immer Banditen und die einzige Möglichkeit, dieses Problem zu lösen, besteht darin, die Wurzel des Problems zu bekämpfen: dem Banditentum mit Gewalt ein Ende zu setzen."
GXC_give_them_an_opportunity:0 "Geben Sie ihnen eine Chance"
GXC_give_them_an_opportunity_desc:0 "Indem wir den Banditen eine Arbeitsmöglichkeit geben, können wir möglicherweise die kriminellen Aktivitäten in unserem Land verringern."
GXC_education_improvements:0 "Verbesserungen im Bildungsbereich"
GXC_education_improvements_desc:0 "Die Verbesserung des Bildungssystems im Land ist das Mindeste, was wir tun können, um die Kriminalität und den Opiumkonsum zu senken."
GXC_end_our_dependency_on_opium:0 "Beenden Sie unsere Abhängigkeit vom Opium"
GXC_end_our_dependency_on_opium_desc:0 "Nach den Veränderungen in unserer Wirtschaft sind wir bereit, den Opiumhandel aufzugeben und zu versuchen, eine stabilere Nation zu werden."
GXC_industrialize_our_country:0 "Industrialisieren Sie unser Land"
GXC_industrialize_our_country_desc:0 "Wir müssen die Industrialisierung unseres Landes abschließen und in ganz Ostasien zum Vorbild werden."
GXC_prestigious_universities:0 "Renommierte Universitäten"
GXC_prestigious_universities_desc:0 "Die Universitäten unseres Landes werden danach streben, die besten in Asien zu werden, um dann die Forschungskapazität unseres Landes zu erhöhen."
GXC_the_army_of_guangxi:0 "Die Armee von Guangxi"
GXC_the_army_of_guangxi_desc:0 "Wir werden uns auf die Verbesserung der Armee von Guangxi konzentrieren. Wenn wir unsere Grenzen nicht verteidigen können, können wir nichts verteidigen."
GXC_the_cantonese_airforce:0 "Die kantonesische Luftwaffe"
GXC_the_cantonese_airforce_desc:0 "Wir werden uns auf die Verbesserung der kantonesischen Luftwaffe konzentrieren. Wenn wir den Himmel nicht verteidigen können, können wir nichts verteidigen."
GXC_the_guangzhou_fleet:0 "Die Guangzhou-Flotte"
GXC_the_guangzhou_fleet_desc:0 "Unser Ziel ist es, die Flotte von Guangzhou aufzubauen. Wenn wir unsere Küsten nicht verteidigen können, können wir nichts verteidigen."
GXC_expand_our_army:0 "Erweitern Sie unsere Armee"
GXC_expand_our_army_desc:0 "Im Moment ist unsere Landarmee ein Witz, bestehend aus winzigen Korps mit wenig Ausbildung und Ausrüstung. Unser erster Schritt sollte darin bestehen, ihre Größe und ihr Wissen zu erhöhen."
GXC_trench_training:0 "Schützengrabentraining"
GXC_trench_trainin_desc:0 "Unser Land ist voller Flüsse und Berge, daher wäre es völlig dumm, unsere Soldaten nicht mit Pionierausrüstung auszustatten."
GXC_knowledge_is_power:0 "Wissen ist Macht"
GXC_knowledge_is_power_desc:0 "Ein Soldat, der nicht kämpfen kann, ist schwach. Ein General, der nicht befehligen kann, ist nutzlos. Und eine Nation, die nicht führen kann, ist zum Untergang verurteilt."
GXC_investigate_plane_models:0 "Flugzeugmodelle untersuchen"
GXC_investigate_plane_models_desc:0 "Unsere Flugzeugmodelle sind so veraltet, dass sie reine Ölverschwendung sind. Wir müssen nach besseren Modellen suchen, wenn wir mit unseren Gegnern konkurrieren wollen."
GXC_air_artillery:0 "Luftartillerie"
GXC_air_artillery_desc:0 "Wir werden die Bombermodelle des Westens untersuchen, um jeden Feind zu vernichten, der es wagt, uns anzugreifen."
GXC_investigate_western_strategies:0 "Untersuchen Sie westliche Strategien"
GXC_investigate_western_strategies_desc:0 "Wenn unsere Piloten nicht wissen, wie man kämpft, werden sie unsere Feinde nicht besiegen können. Indem wir westliche Strategien untersuchen, werden wir dieses Problem lösen."
GXC_catch_up_with_the_rest:0 "Holen Sie den Rest ein"
GXC_catch_up_with_the_rest_desc:0 "Unsere Marinetechnologien sind nahezu nicht vorhanden, wir werden große Anstrengungen unternehmen müssen, um mit den anderen Nationen gleichziehen zu können."
GXC_buy_european_ships:0 "Kaufen Sie europäische Schiffe"
GXC_buy_european_ships_desc:0 "Es ist einfacher, Schiffe von anderen Nationen zu kaufen, als sie selbst zu bauen, und es gibt viele Nationen, die bereit sind, uns welche zu verkaufen."
GXC_learn_from_them:0 "Von ihnen lernen"
GXC_learn_from_them_decs:0 "Wir werden von den europäischen Nationen lernen, um die Leistungsfähigkeit unserer Seestreitkräfte zu verbessern."
GXC_to_research_more:0 "Um mehr zu recherchieren"
GXC_to_research_more_desc:0 "Wir werden unser Bestes tun, um mehr Forschung betreiben zu können und so die Qualität unserer Streitkräfte zu verbessern."
SHX_the_sword:0 "Das Schwert"
SHX_the_sword_desc:0 "Wir sollten einen Waffenstillstand mit den Kommunisten anstreben, um die größere Bedrohung zu besiegen: das japanische Kaiserreich."
SHX_the_unthinkable:0 "Das Undenkbare"
SHX_the_unthinkable_desc:0 "Es ist an der Zeit, Yan Xishan in den Ruhestand zu schicken und Feng Yuxiang, den christlichen General, an die Spitze unseres Landes zu bringen. Yan Xishan hat sich als jemand erwiesen, dessen Ideologie flexibel seinen Interessen angepasst ist, doch Feng hat das, was Shanxi braucht: einen starken Anführer, der vor unseren Feinden nicht zurückweicht."
SHX_the_red_wall:0 "Die Rote Wand"
SHX_the_red_wall_desc:0 "Die einzigen, die die Souveränität von Shanxi schützen können, sind die Kommunisten. Sie haben China auf dem Langen Marsch ihre Entschlossenheit gezeigt und uns gezeigt, wer der rechtmäßige Herrscher Chinas sein sollte."
SHX_break_the_sword:0 "Zerbrich das Schwert"
SHX_break_the_sword_desc:0 "Der einzige Weg, Shanxi Frieden zu bringen, besteht darin, die Japaner aus China zu vertreiben. Mit der Hilfe von Nanjing und Yan&#39;an werden wir unbesiegbar sein!"
SHX_learn_from_the_sword:0 "Lerne vom Schwert"
SHX_learn_from_the_sword_desc:0 "Die Japaner haben Asien gezeigt, dass ein Land, das sich nicht schnell genug industrialisiert, zwangsläufig vom Westen erobert wird. Wir sollten versuchen, ihre Reformen nachzuahmen, um unbesiegbar zu werden."
SHX_the_biggest_wall:0 "Die größte Mauer"
SHX_the_biggest_wall_desc:0 "Die einzige Möglichkeit, Nanjing zu besiegen, besteht in der Zusammenarbeit mit dem größten Exponenten des Kommunismus auf der Welt: der Sowjetunion!"
SHX_a_new_wall:0 "Eine neue Mauer"
SHX_a_new_wall_desc:0 "Wir können niemandem vertrauen, nicht einmal den Sowjets. Wenn wir sie um Hilfe bitten, werden sie uns nur als weitere Untergebene oder, schlimmer noch, als Marionette betrachten. Wenn wir China wiedervereinigen wollen, müssen wir es allen Widrigkeiten zum Trotz allein schaffen!"
SHX_nationalist_economic_aid:0 "Nationalistische Wirtschaftshilfe"
SHX_nationalist_economic_aid_desc:0 "Wir werden Nanjing um Wirtschaftshilfe bitten, um unsere schwache Wirtschaft zu verbessern."
SHX_prepare_for_the_inevitable:0 "Bereiten Sie sich auf das Unvermeidliche vor"
SHX_prepare_for_the_inevitable_desc:0 "Ein Krieg gegen die Japaner ist nur eine Frage der Zeit. Wir müssen unsere Produktion verbessern, um sie bekämpfen zu können."
SHX_military_affairs_commision:0 "Kommission für Militärangelegenheiten"
SHX_military_affairs_commision_desc:0 "Wir werden unser Oberkommando reformieren und versuchen, die letzten Reformen von Nanjing nachzuahmen."
SHX_whampoa_military_academy:0 "Whampoa Militärakademie"
SHX_whampoa_military_academy_desc:0 "Wir werden unsere Offiziere in der bekannten Militärakademie Whampoa ausbilden, genau wie die Nationalisten."
SHX_improve_our_resource_extraction:0 "Verbessern Sie unsere Ressourcengewinnung"
SHX_improve_our_resource_extraction_desc:0 "Waffen fallen nicht vom Himmel. Wenn wir unsere Armeen gut versorgen wollen, müssen wir unsere Ressourcengewinnung verbessern."
SHX_build_more_industry:0 "Bauen Sie mehr Industrie auf"
SHX_build_more_industry_desc:0 "Der Ausbau unserer Industrie ist für unseren Sieg im Krieg von entscheidender Bedeutung."
SHX_clean_the_country:0 "Säubere das Land"
SHX_clean_the_country_desc:0 "Im Jahr 1931 begannen wir eine Kampagne gegen kommunistische Agenten, die in unserer Provinz aktiv waren, und arbeiteten von Zeit zu Zeit mit ihnen zusammen, wenn es nötig war. Doch wenn wir unser Land stabilisieren wollen, müssen wir sie aus der Clique werfen."
SHX_negotations_with_the_japanese:0 "Verhandlungen mit den Japanern"
SHX_negotations_with_the_japanese_desc:0 "Heute traf sich Ryukichi Tanaka, ein japanischer Stabschef und Freund von Yan Xishan, mit ihm, um ihn zu einem antikommunistischen Bündnis mit Japan zu bewegen. Es ist nicht bekannt, ob Yan akzeptierte oder nicht, aber sicher ist, dass ein Beitritt zu Japan zum Wohle des Volkes sein wird.\n§GIst Japan akzeptiert, können wir uns entweder ihrer Fraktion anschließen oder einen Waffenstillstand mit ihnen schließen.§!"
SHX_a_han_mongol_union:0 "Eine Han-Mongolische Union"
SHX_a_han_mongol_union_desc:0 "Ein Teil unserer Bevölkerung ist derzeit mongolischer Abstammung, was unser Land zur natürlichen Wahl für die Vereinigung der Mongolen zu einer Nation macht, aber natürlich unter der Herrschaft der Han. \n§GWenn wir derselben Fraktion wie Japan angehören und Mengkukuo eine japanische Marionette ist, können wir Mengkukuo annektieren.§!"
SHX_japanese_arsenals:0 "Japanische Arsenale"
SHX_japanese_arsenals_desc:0 "Wir werden die Übertragung japanischer Arsenale in unser Land beantragen, damit wir die Größe unserer jungen Armee erhöhen können."
#SHX_japanese_investiments
SHX_japanese_investiments_desc:0 "Japanische Investitionen in unsere Bergbauindustrie werden die industrielle Entwicklung unseres Landes vorantreiben, sodass es den japanischen und westlichen Standards entsprechen kann."
SHX_private_railbuilding:0 "Privater Schienenbau"
SHX_private_railbuilding_desc:0 "Die Infrastruktur von Shanxi ist derzeit unglaublich schlecht. Wenn japanische Unternehmen sie verbessern, wird uns das sicherlich dabei helfen, die Lebensqualität unserer Bevölkerung und die Versorgungslage unserer Armee zu verbessern."
SHX_invite_japanese_advisors:0 "Laden Sie japanische Berater ein"
SHX_invite_japanese_advisors_desc:0 "Wenn unsere Offiziere von japanischen Beratern ausgebildet würden, wären wir gegenüber den korrupten Generälen von Nanjing und den unerfahrenen Guerillaführern von Yan&#39;an im Vorteil."
SHX_the_japanese_military_mission:0 "Die japanische Militärmission"
SHX_the_japanese_military_mission_desc:0 "Unser Anführer hat den Japanern vorgeschlagen, einen General zur Führung unserer Streitkräfte zu schicken, um unsere Koordination zu verbessern, und hofft, dass sie zustimmen."
SHX_japanese_lent_divisions:0 "Japanische Fastenabteilungen"
SHX_japanese_lent_divisions_desc:0 "Eine japanische Expeditionstruppe ist in Shanxi eingetroffen und hat die Qualität unserer Armee erheblich verbessert."
SHX_coup_in_taiyuan:0 "Putsch in Taiyuan"
SHX_coup_in_taiyuan_desc:0 "Aufgrund der immer stärker werdenden Konflikte zwischen der KPCh und Shanxi wurde heute eine Guerillatruppe nach Taiyuan entsandt mit dem Ziel, Yan Xishan zu ermorden und die Kontrolle über die Region zu übernehmen. \n§RDies wird den Übertritt aller unserer Generäle und Feldmarschälle provozieren!§!"
SHX_march_to_yarkand:0 "Marsch nach Yarkand"
SHX_march_to_yarkand_desc:0 "Wir werden einen Kreuzzug beginnen, um die Kriegsherren des Nordens vom nationalistischen Stiefel zu befreien, weiter nach Yarkand!"
SHX_erase_the_illegitimate_communists:0 "Löschen Sie die illegitimen Kommunisten"
SHX_erase_the_illegitimate_communists_desc:0 "Die Regierung von Yan&#39;an behauptet fälschlicherweise, das wahre Aushängeschild des Kommunismus in China zu sein. Wir werden ihnen zeigen, wie falsch sie liegt."
SHX_retake_nanjing:0 "Nanjing zurückerobern"
SHX_retake_nanjing_desc:0 "Wenn wir die chinesischen Arbeiter befreien wollen, müssen wir die Regierung von Nanjing zerstören!"
SHX_peoples_liberation_army:0 "Volksbefreiungsarmee"
SHX_peoples_liberation_army_desc:0 "Wir werden uns nicht verstecken, wie es die Kommunisten in Yan&#39;an taten. Um die Kriegsherren zu besiegen, müssen wir in die Offensive gehen!"
SHX_socialist_market_economy:0 "Sozialistische Marktwirtschaft"
SHX_socialist_market_economy_desc:0 "Der Weg zum Sozialismus und Kommunismus führt per Definition über den Kapitalismus. China hat nie eine echte kapitalistische Marktwirtschaft entwickelt, was Fortschritte in Richtung Sozialismus nahezu unmöglich macht. Wir müssen zunächst die kapitalistische Produktionsweise entwickeln, bevor wir weiter vorankommen können."
SHX_call_wang_ming:0 "Rufen Sie Wang Ming an"
SHX_call_wang_ming_desc:0 "Mao und die Sozialisten haben die Revolution verraten, indem sie versuchten, die Macht der Yan&#39;an-Regierung zu übernehmen! Es ist Zeit, die wahre Revolution unter Wang Ming nach China zu bringen!"
SHX_soviet_economic_aid:0 "Sowjetische Wirtschaftshilfe"
SHX_soviet_economic_aid_desc:0 "Wir werden uns an die Sowjets wenden und sie um wirtschaftliche Unterstützung bitten, in der Hoffnung, dass sie uns keine Gefälligkeiten zurückfordern, bevor wir das Land stabilisiert haben."
SHX_ally_the_soviets:0 "Verbünde dich mit den Sowjets"
SHX_ally_the_soviets_desc:0 "Die Arbeiter und Bauern der Welt müssen sich vereinen, um ihre Fesseln abzuwerfen. Schulter an Schulter werden wir eine bessere Zukunft aufbauen."
SHX_save_mao_zedong:0 "Rette Mao Zedong"
SHX_save_mao_zedong_desc:0 "Wang und die Sozialisten haben die Revolution verraten, indem sie versucht haben, die Macht der Yan&#39;an-Regierung zu übernehmen! Es ist Zeit, die wahre Revolution unter Mao Zedong nach China zu bringen!"
SHX_maoism:0 "Maoismus"
SHX_maoism_desc:0 "Der große Vorsitzende hat viele Monate damit verbracht, seine politischen Theorien zu einer kohärenten Ideologie zu entwickeln, die unser Land voranbringen wird."
SHX_infiltration_campaign:0 "Infiltrationskampagne"
SHX_infiltration_campaign_desc:0 "Die Regierung von Nanjing möchte, dass wir sie offen bekämpfen. Wir dürfen dieser Versuchung nicht nachgeben. Wir werden kleine Gruppen von Soldaten in feindliches Gebiet schicken, um Stützpunkte aufzubauen. Wenn die Zeit reif ist, werden wir einen Aufstand auslösen und Nanjing überraschen."
SHX_christian_donations:0 "Christliche Spenden"
SHX_christian_donations_desc:0 "Christliche Organisationen auf der ganzen Welt würden gerne etwas Wohltätigkeit leisten, um die Wirtschaft unserer Clique zu verbessern."
SHX_for_salvation:0 "Für die Erlösung"
SHX_for_salvation_desc:0 "Wir müssen unser Bestes tun, um unser Volk zu schützen und es vor der Anarchie zu retten, die die Region heimsucht. Vorwärts, zu seiner Rettung!"
SHX_hard_working_army:0 "Hart arbeitende Armee"
SHX_hard_working_army_desc:0 "Die Armee kann in Friedenszeiten nicht tatenlos zusehen. Wie schon in Changde in den 1920er Jahren befahl Feng Yuxiang der Armee von Shanxi, sich an öffentlichen Bauarbeiten im ganzen Land zu beteiligen und so die Lage des Landes deutlich zu verbessern. Doch im Kriegsfall müssen sie erneut ihre Pflicht erfüllen."
SHX_a_meritocratic_army:0 "Eine meritokratische Armee"
SHX_a_meritocratic_army_desc:0 "Die Armeen von Feng waren in ganz China bekannt, da Beförderungen ausschließlich auf Leistung beruhten und Vetternwirtschaft im Gegensatz zu den heutigen Armeen von Nanjing völlig abgelehnt wurde. Wir werden diesen Ruf wiederherstellen."
SHX_expand_the_medic_corps:0 "Erweitern Sie das Sanitäterkorps"
SHX_expand_the_medic_corps_desc:0 "Eine glückliche Armee ist eine loyale Armee. Wie schon in Changde wird Feng die Loyalität seiner Männer durch ständige Sorge um ihr Wohlergehen fördern, körperliche Züchtigung einschränken und die Lebensqualität der Wehrpflichtigen verbessern, sodass sie keinen Unterschied zur Lebensqualität der Offiziere haben."
SHX_a_righteous_army:0 "Eine gerechte Armee"
SHX_a_righteous_army_desc:0 "Gemäß den Lehren des Christentums werden wir die Rechtschaffenheit unter unseren Truppen fördern und die von unseren Soldaten begangenen Verbrechen streng bestrafen."
SHX_literacy_campaign:0 "Alphabetisierungskampagne"
SHX_literacy_campaign_desc:0 "Genau wie in Changde hat Feng Alphabetisierungs- und Fremdsprachenprogramme für die Bevölkerung von Shanxi ins Leben gerufen und so das Wissen seines Volkes erheblich verbessert. Allerdings ist nichts auf der Welt umsonst und die Ausgaben müssen irgendwo herkommen."
SHX_rehabilitation_campaign:0 "Rehabilitationskampagne"
SHX_rehabilitation_campaign_desc:0 "Nach der Machtübernahme in Shanxi ließ Feng alle Bordelle und Casinos der Clique schließen, verbot Opium und startete eine Kampagne in der Armee, um den Tabak- und Alkoholkonsum zu stoppen. Anschließend begann er mit der Eröffnung von Drogentherapiezentren, Pflegeheimen und Waisenhäusern. In Changde lief dies gut, doch wie sich dies auf die Wirtschaft auswirken wird, bleibt abzuwarten."
SHX_public_schooling_campaign:0 "Kampagne für öffentliche Schulen"
SHX_public_schooling_campaign_desc:0 "Wie schon in Changde hat Feng begonnen, die öffentliche Bildung im Land zu fördern und zu verbessern, allerdings natürlich zu einem hohen finanziellen Aufwand."
SHX_save_china:0 "Rettet China"
SHX_save_china_desc:0 "Die einzige Möglichkeit, China vor Anarchie und Korruption zu retten, besteht darin, Feng, den christlichen General, an die Spitze zu stellen. Heute beginnen wir mit der Eroberung von Nanjing!"
#SHX_changde_revolt
#SHX_changde_revolt_desc
SHX_heavenly_republic:0 "Himmlische Republik"
SHX_heavenly_republic_desc:0 "Der einzige Mensch, der die Nation führen kann, ist Feng Yuxiang. Er hält das perfekte Gleichgewicht zwischen sozialem Wohlstand und Demokratie – Dinge, die die Kommunisten von Yan&#39;an und die Tyrannen von Nanjing nicht erreichen konnten. Der chinesische Traum wird jetzt wahr!"
SHX_five_year_plan:0 "Fünfjahresplan"
SHX_five_year_plan_desc:0 "Wir werden dem Plan von Yan Xishan folgen und versuchen, den Fünfjahresplan der Sowjets zu kopieren, um die industriellen Fähigkeiten unseres Landes zu verbessern."
SHX_salt_exports:0 "Salzexporte"
SHX_salt_exports_desc:0 "Unser Land ist für seine Salzexporte bekannt. Eine Steigerung dieser Exporte wird unserer Wirtschaft zu mehr Stabilität verhelfen."
SHX_mine_coal:0 "Kohle abbauen"
SHX_mine_coal_desc:0 "Kohle selbst könnte einen Teil unserer Industrie mit Energie versorgen, aber mit der Kohleverflüssigung könnten wir möglicherweise alle Arten von Fahrzeugen und Maschinen in unserem Land mit Energie versorgen."
SHX_mine_bauxite:0 "Bauxit abbauen"
SHX_mine_bauxite_desc:0 "Eine Steigerung unserer Bauxitexporte wird uns bei unserer Waffenproduktion und unserer Wirtschaft enorm helfen."
SHX_heavy_industry_building:0 "Schwerindustriegebäude"
SHX_heavy_industry_building_desc:0 "Nach seiner Reise nach Japan erfuhr Yan Xishan, dass der Grund für die Stärke des Landes der industrielle Fortschritt und die Leistungsfähigkeit seiner Armee sind. Wir werden versuchen, beides zu verbessern."
SHX_troop_railbuilding:0 "Truppenbahngebäude"
SHX_troop_railbuilding_desc:0 "Yan Xishan hat einen Plan ausgearbeitet, nach dem seine Soldaten Arbeiten zur Verbesserung der Infrastruktur von Shanxi durchführen sollen, darunter Straßeninstandhaltung und Unterstützung der Bauern."
#SHX_land_reform
SHX_land_reform_desc:0 "Den Plänen von Yan Xishan folgend, werden wir darauf abzielen, die Macht der Landbesitzer über die Bevölkerung auf dem Land zu schwächen und gleichzeitig den Bauern in Shanxi Vorteile zu verschaffen."
SHX_improve_the_public_education:0 "Verbesserung der öffentlichen Bildung"
SHX_improve_the_public_education_desc:0 "Gemäß den Plänen von Yan Xishan und Feng Yuxiang werden wir die Qualität der öffentlichen Bildung im ganzen Land verbessern."
SHX_reeducation_campaign:0 "Umerziehungskampagne"
SHX_reeducation_campaign_desc:0 "Wir werden versuchen, unsere Leute umzuerziehen, damit sie wissen, was sie wirklich wissen müssen. Diejenigen, die sich weigern, werden um ihr Leben beten müssen."
SHX_shangdi:0 "Shangdi"
SHX_shangdi_desc:0 "Shangdi ist der Name, den Yan Xishan für eine neue Interpretation Gottes kreierte, inspiriert von konfuzianischen Werten und dem Christentum. Der Glaube an Gott oder Shangdi verleiht den Menschen ein moralisches Gefühl. Du sollst nicht morden, du sollst nicht stehlen, du sollst nicht begehren ..."
SHX_welfare_virtue_and_knowledge:0 "Tugend, Wissen, Wohlergehen"
SHX_welfare_virtue_and_knowledge_desc:0 "Yan veränderte einige von Suns Lehren, bevor er sie in Shanxi verbreitete. Er formulierte seine eigene Version von Suns „Drei Prinzipien des Volkes“, in der er die Prinzipien von Nationalismus und Demokratie durch die Prinzipien von Tugend und Wissen ersetzte. Und so begann seine Existenz: Tugend, Wissen und Wohlstand."
SHX_neo_confucianism:0 "Neokonfuzianismus"
SHX_neo_confucianism_desc:0 "Yans Ideologie war stark vom Neokonfuzianismus der Qing-Dynastie beeinflusst. Er war der Meinung, dass Menschen ihr Potenzial nur durch intensive Selbstkritik und Selbstkultivierung entfalten könnten. Außerdem begann er, Meditation und Predigten über konfuzianische Werte zu fördern und versuchte schließlich, sein Volk zu Junzi zu machen."
SHX_model_virtues:0 "Vorbildliche Tugenden"
SHX_model_virtues_desc:0 "Unser Land ist zu einer Modellnation geworden. Mit der neuen Moral unseres Volkes werden wir in der Lage sein, unsere Intellektuellen dazu zu bringen, ihr wahres Potenzial zu entfalten, anstatt sie in Banalitäten verfallen zu lassen."
SHX_chinese_bushido:0 "Wushidao"
SHX_chinese_bushido_desc:0 "Nach seinem Studium in Japan erfuhr Yan Xishan, dass China die Japaner nur besiegen kann, wenn es seine eigene Form des Bushido entwickelt, auch bekannt als „Kodex des Kriegers“, sodass die chinesischen Truppen mit der gleichen Initiative und dem gleichen Mut kämpfen wie die japanischen."
SHX_japanese_officer_training:0 "Japanische Offiziersausbildung"
SHX_japanese_officer_training_desc:0 "Durch die Einladung japanischer Berater in unser Land können wir unsere Offiziere entsprechend den Standards ihrer Doktrin ausbilden. Ob wir dieses Wissen im Kampf gegen sie oder in Zusammenarbeit mit ihnen einsetzen, wird die Zukunft zeigen."
SHX_death_or_glory:0 "Tod oder Ruhm"
SHX_death_or_glory_desc:0 "Wir werden unser Heimatland um jeden Preis verteidigen, mit Ehre leben oder mit Ruhm sterben!"
SHX_spiritual_mobilization:0 "Spirituelle Mobilisierung"
SHX_spiritual_mobilization_desc:0 "Indem wir das Vertrauen der Menschen in unseren Vorteil nutzen, können wir das militärische Pflichtbewusstsein unserer Bevölkerung stärken."
SHX_learning_from_the_west:0 "Vom Westen lernen"
SHX_learning_from_the_west_desc:0 "Die einzige Möglichkeit, die militärischen Fähigkeiten unseres Landes zu steigern, besteht darin, die westlichen Doktrinen nachzuahmen. Wir werden die feindlichen Linien mit einem Artilleriehagel in Schrecken versetzen!"
SHX_imitate_american_doctrines:0 "Amerikanische Lehren nachahmen"
SHX_imitate_american_doctrines_desc:0 "Die Nachahmung der amerikanischen Doktrinen würde die Qualität unserer Armee sicherlich verbessern."
SHX_the_importance_of_artillery:0 "Die Bedeutung der Artillerie"
SHX_the_importance_of_artillery_desc:0 "Der Westen hat uns gelehrt, wie wichtig es ist, für den Kampf gerüstete Artillerie zu haben. Wir werden dafür sorgen, dass jedes Regiment welche hat."
SHX_anti_fascist_corps:0 "Antifaschistisches Korps"
SHX_anti_fascist_corps_desc:0 "Viele Menschen auf der Welt sind der faschistischen Tyrannei entkommen. Wir werden für sie alle eine Zufluchtsstätte sein, um die Tyrannei aus der Welt zu schaffen!"
SHX_shanxi_doctrine:0 "Shanxi-Lehre"
SHX_shanxi_doctrine_desc:0 "Die Nachahmung westlicher oder japanischer Strategien wird nicht funktionieren, da wir uns grundlegend von ihnen unterscheiden. Um unser Land zu verteidigen, müssen wir uns an die chinesischen Kriegspläne halten."
SHX_follow_chinese_strategies:0 "Folgen Sie chinesischen Strategien"
SHX_follow_chinese_strategies_desc:0 "Wenn wir den Lehren von Nanjing und Yan&#39;an folgen, wird dies unserer Nation helfen, undurchdringlich zu werden!"
SHX_a_beloved_army:0 "Eine geliebte Armee"
SHX_a_beloved_army_desc:0 "Da unsere Truppen den Bauern von Shanxi helfen und die Infrastruktur der Region verbessern, genießt unsere Armee in der Bevölkerung eine weitaus größere Unterstützung als die meisten Armeen ihrer Rivalen in China."
SHX_guard_the_mountains:0 "Beschütze die Berge"
SHX_guard_the_mountains_desc:0 "Shanxi ist ein Land voller Berge und Wüsten. Wir müssen diesen Geländevorteil nutzen, um in keinem Krieg besiegt zu werden."
SHX_shanxi_model_army:0 "Shanxi-Modellarmee"
SHX_shanxi_model_army_desc:0 "Aufgrund ihrer Fähigkeiten und Effizienz sind unsere Truppen zu einer Vorzeigearmee in China geworden. Diesen Ruf werden wir für immer bewahren."
SHX_mountaineer_corps:0 "Gebirgsjägerkorps"
SHX_mountaineer_corps_desc:0 "Die Ausbildung von Gebirgsjägerdivisionen wird uns einen großen Vorteil verschaffen."
SHX_military_research:0 "Militärische Forschung"
SHX_military_research_desc:0 "Wir müssen mehr Wissenschaftler für die Waffenentwicklung einstellen und so unsere Chancen gegenüber anderen Ländern deutlich erhöhen."
SIK_like_a_game_of_chess:0 "Wie eine Partie Schach"
SIK_like_a_game_of_chess_desc:0 "Das Leben selbst ist wie ein Schachspiel: Entweder man bleibt eine Schachfigur oder man kämpft darum, König zu werden …"
SIK_remain_a_pawn:0 "Bleib ein Bauer"
SIK_remain_a_pawn_desc:0 "Aber es ist sicherer, eine Schachfigur zu bleiben …"
SIK_become_a_king:0 "Werde ein König"
SIK_become_a_king_desc:0 "Und um den Sieg zu erringen, müssen wir König werden!"
SIK_consolidate_our_rule:0 "Konsolidieren Sie unsere Regel"
SIK_consolidate_our_rule_desc:0 "Wie Mao sagte: „Macht kommt aus den Gewehrläufen, und wir haben ein Land direkt neben uns, das bereit ist, uns diese Waffen zu liefern.“"
SIK_overthrow_sheng:0 "Sturz von Sheng"
SIK_overthrow_sheng_desc:0 "Sheng Shicai ist zu weit gegangen. Er machte Xinjiang zu einer Marionette der Sowjetunion und begann mit der Säuberung seiner eigenen Brüder und Schwestern in Xinjiang, nur um seine Machtposition zu festigen. So geht es nicht weiter."
SIK_consolidate_our_rule:0 "Konsolidieren Sie unsere Regel"
SIK_to_liberate_petrograd:0 "Zur Befreiung Petrograds"
SIK_to_liberate_petrograd_desc:0 "Viele weiße Generäle konnten dem russischen Bürgerkrieg entkommen, ebenso wie Hunderte Guihua, die heute die Grenzen unseres Landes schützen. Doch was wäre, wenn wir die derzeitige Instabilität der Moskauer Regierung ausnutzen würden, um Russland zu befreien?"
SIK_to_liberate_istanbul:0 "Zur Befreiung Istanbuls"
SIK_to_liberate_istanbul_desc:0 "Die Stabilität der Türkei kann nur durch eine starke Regierung gesichert werden. Doch jetzt, da Atatürk krank ist, gibt es keine Garantie dafür, dass die Türkei nicht zu einer Brutstätte von Korruption und Gewalt wird. Die Japaner und die Afghanen waren 1935 bereit, Prinz Mehmed Abdülkerim Efendi zum Kronprinzen zu küren, und nichts spricht dagegen, dass sie es auch jetzt tun."
SIK_the_great_purge:0 "Die große Säuberung"
SIK_the_great_purge_desc:0 "In Anlehnung an die sowjetischen Pläne für die große Säuberung werden wir versuchen, alle Menschen loszuwerden, die für unsere mächtige Regierung eine Bedrohung darstellen könnten."
SIK_soviet_economic_aid:0 "Sowjetische Wirtschaftshilfe"
SIK_soviet_economic_aid_desc:0 "Die Industrie in Xinjiang ist derzeit recht klein, aber das könnte sich ändern, wenn wir die richtigen Abkommen mit Moskau schließen."
SIK_disband_the_guihua_corps:0 "Lösen Sie das Guihua-Korps auf"
SIK_disband_the_guihua_corps_desc:0 "Die Guihua-Kavalleriedivisionen spielten eine wichtige Rolle beim Kumul-Aufstand und dem Staatsstreich gegen Jin Shuren, aber es ist nur eine Frage der Zeit, bis sie auch gegen uns revoltieren ... Wenn wir unsere Stabilität bewahren wollen, müssen wir diese Divisionen auflösen und ihre Waffen konfiszieren."
SIK_ethnic_equality:0 "Ethnische Gleichheit"
SIK_ethnic_equality_desc:0 "Alle vierzehn Völker Xinjiangs sollen in unserem Land gleichermaßen vertreten und geschätzt werden. Indem wir die Gründung von Kulturgesellschaften für jede Nationalität fördern, werden wir alle Ethnien Xinjiangs zufriedenstellen und natürlich die Popularität unserer Regierung erheblich steigern."
SIK_kuomintang_advisors:0 "Kuomintang-Berater"
SIK_kuomintang_advisors_desc:0 "Die Regierung von Nanjing wäre mehr als bereit, uns bei der Verbesserung der Qualität unserer Armee zu helfen, schließlich braucht sie uns, sei es zum Schutz vor den Russen oder als Hilfe gegen die Japaner."
SIK_communist_advisors:0 "Kommunistische Berater"
SIK_communist_advisors_desc:0 "Aufgrund der großen Säuberung haben wir jetzt einen erheblichen Personalmangel. Aber wir wissen, dass die chinesischen Kommunisten in Ya&#39;an ihren kommunistischen Brüdern gerne bei der Umsetzung von Shengs Politik helfen werden."
SIK_kick_the_soviets_out:0 "Verjagt die Sowjets"
SIK_kick_the_soviets_out_desc:0 "Seit Sheng an die Macht kam, beuten die Sowjets unsere Ölfelder aus und kontrollieren unsere Wirtschaft, aber jetzt, wo sie beschäftigt sind, werden sie nicht einmal bemerken, dass ihre Berater alle nach Hause zurückkehren."
SIK_the_second_purge:0 "Die zweite Säuberung"
SIK_the_second_purge_desc:0 "Nach dem Weggang der Sowjets ist es an der Zeit, die kommunistischen Berater Chinas, die die Regierung von Yan&#39;an mitgebracht hat, zu entfernen. Gerüchte über einen Putsch gegen Sheng kursieren in ganz Xinjiang, und es ist nur eine Frage der Zeit, bis sich dieses Gerücht bewahrheitet."
SIK_stay_loyal:0 "Bleiben Sie treu"
SIK_stay_loyal_desc:0 "Im Moment ist es entscheidend, dass wir der Regierung von Nanjing folgen und die japanischen Streitkräfte besiegen, zumindest bis die Sowjets stark genug sind, um uns wieder zu schützen …"
SIK_absolve_burhan_shahidi:0 "Burhan Shahidi freisprechen"
SIK_absolve_burhan_shahidi_desc:0 "Burhan Shahidi, ein in Russland geborener chinesischer Nachfahre und Dolmetscher, der Uigurisch, Mandarin, Russisch, Türkisch und etwas Arabisch spricht, wurde von Sheng Shicai zu Unrecht als „Trotzkist“ verhaftet. Ungeachtet dieser Dummheiten wäre es uns sicherlich eine Hilfe, einen Mann zu haben, der all diese Sprachen spricht."
SIK_nanjing_economic_mission:0 "Wirtschaftsmission Nanjing"
SIK_nanjing_economic_mission_desc:0 "Nachdem wir der Regierung von Nanjing unsere Treue geschworen haben, wäre sie mehr als bereit, uns dabei zu helfen, die Qualität und den Umfang der Industrie in unserem Land zu steigern."
SIK_nanjing_military_mission:0 "Militärmission Nanjing"
SIK_nanjing_military_mission_desc:0 "Die Armee von Xinjiang ist seit der sowjetischen Invasion in Xinjiang im Jahr 1934 geschwächt. Wir müssen unsere Armee schnell wieder aufbauen, wenn wir uns und Nanjing vor den Streitkräften aus Tokio und Moskau verteidigen wollen. Deshalb werden wir Nanjing fragen, ob sie bereit sind, uns eine Militärmission zu entsenden, die uns bei dieser Aufgabe hilft."
SIK_defy_moscow:0 "Trotzen Sie Moskau"
SIK_defy_moscow_desc:0 "Xinjiang wird sich niemals entwickeln können, wenn wir weiterhin eine Marionette der Sowjetunion bleiben. Wir müssen die Kommunisten aus unserem Land vertreiben und uns selbst schützen, falls die Sowjets uns erneut überfallen wollen."
SIK_united_against_our_enemy:0 "Vereint gegen unseren Feind"
SIK_united_against_our_enemy_desc:0 "Die vierzehn Völker Xinjiangs werden niemals gleich sein. Wir haben unterschiedliche Bildung, Kultur und Religion, aber eines werden wir von nun an alle gemeinsam haben: die Bereitschaft, unser Land und unser Volk vor dem Kommunismus zu verteidigen!"
SIK_military_affairs_commision:0 "Kommission für Militärangelegenheiten"
SIK_military_affairs_commision_desc:0 "Wir werden unser Oberkommando reformieren und versuchen, die letzten Reformen von Nanjing nachzuahmen."
SIK_whampoa_military_academy:0 "Whampoa Militärakademie"
SIK_whampoa_military_academy_desc:0 "Wir werden unsere Offiziere in der bekannten Militärakademie Whampoa ausbilden, genau wie die Nationalisten."
SIK_request_rail_building_from_nanjing:0 "Anfrage zum Bau einer Eisenbahnstrecke nach Nanjing"
SIK_request_rail_building_from_nanjing_desc:0 "Wir werden Nanjing um eine Kommission zur Verbesserung der Infrastruktur unseres Landes bitten, damit wir die Kriegsanstrengungen besser unterstützen können."
SIK_nanjing_building_mission:0 "Nanjing-Baumission"
SIK_nanjing_building_mission_desc:0 "Wir werden Nanjing um Hilfe zur Verbesserung unserer wirtschaftlichen Lage bitten, im Gegenzug für unsere Hilfe im Konflikt."
SIK_gather_the_exiles:0 "Versammelt die Verbannten"
SIK_gather_the_exiles_desc:0 "Viele weiße Emigranten mussten nach Deutschland, Frankreich oder in die USA fliehen, um nicht von den Sowjets gefangen genommen zu werden. Viele von ihnen sind immer noch bereit, für ihr Land zu kämpfen, und wir werden einen Weg finden, sie davon zu überzeugen, dies von Xinjiang aus zu tun."
SIK_invite_the_cossacks:0 "Lade die Kosaken ein"
SIK_invite_the_cossacks_desc:0 "Kosaken haben zwei Dinge mit uns gemeinsam: Ihre Fähigkeiten als Kavallerie und ihre Rivalität mit dem Kommunismus. Nach der Entkosakisierung durch die Sowjetunion von 1917 bis 1933 entwickelte sich unter den Kosaken eine zunehmende Opposition gegen die Sowjets und den Kommunismus. Das wird uns sicherlich helfen, sie davon zu überzeugen, sich unserem Kreuzzug gegen Moskau anzuschließen."
SIK_buy_weapons_to_germany:0 "Waffen kaufen nach Deutschland"
SIK_buy_weapons_to_germany_desc:0 "Deutschland hat schon immer mit Moskau rivalisiert, von Preußen über das Deutsche Reich bis hin zu den antikommunistischen Nazis. Sie davon zu überzeugen, uns Waffen zu einem niedrigen Preis zu verkaufen, dürfte ein Leichtes sein."
SIK_make_deals_with_the_usa:0 "Machen Sie Deals mit den USA"
SIK_make_deals_with_the_usa_desc:0 "Die USA halfen der weißen Regierung in Archangelsk 1918 und 1919 im Kampf gegen die Kommunisten. Sie wissen, dass die USA, wenn sie nichts unternehmen, um die Regierung in Moskau aufzuhalten, diese möglicherweise irgendwann als wirtschaftliche Hegemonialmacht der Welt ablösen könnten. Deshalb wären sie mehr als bereit, uns dabei zu helfen, dieses Ereignis hinauszuzögern …"
SIK_our_best_option:0 "Unsere beste Option"
SIK_our_best_option_desc:0 "Die Deutschen auf unserer Seite zu haben, mag ein wenig umstritten sein, schließlich haben sie ebenso wie die Kommunisten den Sturz unserer Regierung im Jahr 1917 provoziert, aber schließlich heißt es ja, der Feind meines Feindes ist mein Freund."
SIK_the_unthinkable:0 "Das Undenkbare"
SIK_the_unthinkable_desc:0 "Die japanische Armee und die Kodoha-Fraktion hatten schon immer die Idee, die Sowjets anzugreifen, um ihre Grenzen vor der roten Bedrohung zu schützen und Nord-Sachalin zurückzuerobern. In letzter Zeit wurde diese Idee jedoch durch die Idee der Südlichen Invasion ersetzt, d. h. durch einen Angriff auf die europäischen Kolonien in Südasien. Aber was wäre, wenn wir die "
SIK_request_economic_assistance:0 "Fordern Sie wirtschaftliche Unterstützung an"
SIK_request_economic_assistance_desc:0 "Wir werden die Feinde Moskaus um wirtschaftliche Unterstützung bitten, damit wir eine Chance gegen sie haben."
SIK_the_second_russian_civil_war:0 "Der zweite russische Bürgerkrieg"
SIK_the_second_russian_civil_war_desc:0 "Es ist Zeit, Russland von den Teufeln zu befreien, die nach 1923 die Macht übernahmen, den Tod von Wrangel, Koltschak und Kornilow zu rächen, alle Ukrainer, Kosaken und Polen zu rächen, die von den Sowjets feige ermordet wurden. Es ist Zeit, zur Hoffnung Russlands zu werden!"
SIK_buy_anti_air_equipment:0 "Kaufen Sie Flugabwehrausrüstung"
SIK_buy_anti_air_equipment_desc:0 "Es ist uns unmöglich, die Moskauer Luftwaffe aus der Luft zu bekämpfen, aber niemand sagt, dass uns das vom Boden aus nicht möglich ist."
SIK_form_logistics_officers:0 "Formular Logistikbeauftragte"
SIK_form_logistics_officers_desc:0 "Das größte Problem für unsere Streitkräfte wird der Verlust von Vorräten und Ausrüstung in den Wüsten und Tundren Russlands sein. Wenn wir Russland befreien wollen, müssen wir diese Situation schnell angehen."
SIK_german_military_training:0 "Deutsche Militärausbildung"
SIK_german_military_training_desc:0 "Die Deutschen sind für ihre guten Lehren und ihre militärische Disziplin bekannt. Es würde uns sehr helfen, sie zu bitten, uns eine Militärmission zu schicken."
#SIK_japanese_support:0 ""
SIK_japanese_support_desc:0 "Die logistische Unterstützung Japans wird uns im Kampf gegen unseren größten Feind eine große Hilfe sein: die harten Bedingungen in Russland."
SIK_dream_fulfilled:0 "Ein erfüllter Traum"
SIK_dream_fulfilled_desc:0 "Es ist uns endlich gelungen, Russland von seinen alten Unterdrückern zu befreien, doch nun müssen wir mit dem Wiederaufbau dessen beginnen, was einst eine große Nation war …"
SIK_rebuild_russia:0 "Russland wieder aufbauen"
SIK_rebuild_russia_desc:0 "Wir alle müssen daran arbeiten, unser Zuhause wieder aufzubauen und unsere Differenzen für ein höheres Ziel beiseite legen."
SIK_continue_the_regency:0 "Fortsetzung der Regentschaft"
SIK_continue_the_regency_desc:0 "Russland ist noch nicht bereit für die Demokratie, das haben wir 1917 gelernt. Was Russland braucht, ist ein starker Führer, aber im Gegensatz zu den Kommunisten einer, der ihre Unterschiede und das Privateigentum respektiert."
SIK_what_russia_deserves:0 "Was Russland verdient"
SIK_what_russia_deserves_desc:0 "Was Russland nach all diesem Leid verdient, ist eine Regierung, die ihr Volk schützen will, eine Regierung, die Minderheiten nicht übergeht und nicht das Eigentum von Menschen konfisziert, die hart dafür gearbeitet haben. Was Russland verdient, ist Demokratie."
SIK_revive_the_tsardom:0 "Beleben Sie das Zarenreich wieder"
SIK_revive_the_tsardom_desc:0 "Wir haben gelernt, wie die Schwäche der Demokratie Russland 1917 zerstört hat. Der einzige, der uns vor einer solchen Katastrophe noch einmal schützen kann, ist ein Zar! Nach der Ermordung der Familie Romanow im russischen Bürgerkrieg müssen wir jedoch entscheiden, wer den russischen Thron besteigen wird."
SIK_land_reform:0 "Bodenreform"
SIK_land_reform_desc:0 "Denikin hatte immer gute Ideen, konnte diese jedoch aufgrund der sowjetischen Bedrohung nicht umsetzen. Eine faire Landreform durch Denikin wird die Popularität unserer Regierung sicherlich steigern."
SIK_constitutionalism:0 "Konstitutionalismus"
SIK_constitutionalism_desc:0 "Eine Verfassungsreform, die zu einer demokratischeren Regierung führt, wird dazu beitragen, dass unser Volk uns eher als rechtmäßigen Herrscher denn als grausamen Diktator wahrnimmt. Allerdings wird der Großteil der Macht in Denikins Händen liegen, während Duma und Senat in den Hintergrund treten."
SIK_the_vozhd_of_moscow:0 "Der Woschd von Moskau"
SIK_the_vozhd_of_moscow_desc:0 "In Anlehnung an den deutschen und italienischen Faschismus marschierte Iwan Iljin mit Hunderten weißen Emigranten in Moskau ein und forderte von Denikin die Übergabe der Macht über das Land. Denikin stimmte seinem Vorschlag zu, vor allem aufgrund seines hohen Alters und seiner Kriegsmüdigkeit. Nun hat der Philosoph Iwan Iljin Wladimir Romanow zum Zaren gekrönt, doch die gesamte Macht liegt in den Händen des Woschd, Wladimir ist nur noch eine Marionette."
SIK_form_the_yunarmiya:0 "Bilden Sie die Yunarmiya"
SIK_form_the_yunarmiya_desc:0 "Wir werden die „Allunions-Pionierorganisation Wladimir Lenin“ in die Junarmija umwandeln, indem wir jungen Menschen den Hass auf den Kommunismus beibringen und sie auf den Krieg vorbereiten."
SIK_avenge_1917:0 "Räche 1917"
SIK_avenge_1917_desc:0 "Die alten Mitglieder der Mittelmächte werden mit ihrem Blut dafür bezahlen, dass sie den Untergang unseres Reiches provoziert haben. Wir werden Berlin, Wien, Sofia und Istanbul in Schutt und Asche legen!\n§GIst unsere Regierung faschistisch, werden wir Kriegsziele gegen Deutschland, Ungarn, Sofia und die Türkei verhängen. Ist sie es nicht, werden wir Kriegsziele gegen Deutschland, Ungarn, Sofia und die Türkei verhängen, sofern sie nicht demokratisch sind.§!"
SIK_freedom_of_thought:0 "Gedankenfreiheit"
SIK_freedom_of_thought_desc:0 "Jeder Mensch darf seine eigene Ideologie und seinen eigenen Glauben haben, solange er nicht darauf abzielt, anderen zu schaden."
SIK_unpolitized_education:0 "Unpolitisierte Bildung"
SIK_unpolitized_education_desc:0 "Wir werden dafür sorgen, dass unser Bildungssystem unpolitisch ist und dass die Lehrer ihren Schülern nicht ihre Ideologie aufzwingen."
SIK_like_in_the_old_days:0 "Wie in alten Zeiten"
SIK_like_in_the_old_days_desc:0 "Russland braucht ein Bündnis, um sich vor ausländischen Bedrohungen zu schützen. Der Zusammenschluss mit den westlichen Demokratien wird uns dabei helfen, dieses Ziel zu erreichen."
SIK_we_can_rely_on_no_one:0 "Wir können uns auf niemanden verlassen"
SIK_we_can_rely_on_no_one_desc:0 "Die Entente-Mitglieder ließen uns nach dem Sieg über die Deutschen im Stich und versuchten nicht einmal, ihrem alten Verbündeten zu helfen. Die einzige Möglichkeit, uns wirklich zu schützen, besteht darin, ein eigenes Bündnis zu bilden."
SIK_rebuild_the_imperial_navy:0 "Bauen Sie die Imperiale Marine wieder auf"
SIK_rebuild_the_imperial_navy_desc:0 "Nach der Schlacht von Tsushima im Jahr 1905 wurde unsere Marine von den japanischen Streitkräften vollständig zerstört, sodass uns nach Beginn des Bürgerkriegs kaum Zeit blieb, sie wieder aufzubauen. Doch unser Zar Kyrill Romanow lässt unsere Nation nicht mit einer erbärmlichen Marine zurück, ihr Wiederaufbau beginnt heute."
SIK_acquire_new_ships:0 "Erwerben Sie neue Schiffe"
SIK_acquire_new_ships_desc:0 "Wir werden Schiffe von den USA, Großbritannien und Frankreich kaufen, um den Wiederaufbau unserer Marine zu beschleunigen."
SIK_the_tsar_and_the_people:0 "Der Zar und das Volk"
SIK_the_tsar_and_the_people_desc:0 "„Der Zar und das Volk“ ist das neue Motto der Mladorossi, das das alte „Der Zar und die Sowjets“ ersetzt. Eine Regierung, die die Lebensbedingungen ihrer Bevölkerung verbessern und sie gleichzeitig vor ausländischen Bedrohungen schützen will, erhöht derzeit die Bereitschaft unserer Bevölkerung zur Zusammenarbeit mit unserer Regierung."
SIK_modernize_the_army:0 "Modernisierung der Armee"
SIK_modernize_the_army_desc:0 "Als unser Zar sah, wie die Deutschen ihre Feinde mit motorisierten Truppen und Panzern niedertrampelten, erkannte er, dass die einzige Möglichkeit zur Verteidigung Russlands die Aufstellung von Panzerdivisionen war."
SIK_reintroduce_the_okhrana:0 "Wiedereinführung der Ochrana"
SIK_reintroduce_the_okhrana_desc:0 "Die Auflösung der Okrana war einer der größten Fehler der provisorischen Regierung im Jahr 1917. Die einzige Möglichkeit, eine weitere kommunistische Revolution in der Zukunft zu verhindern, besteht darin, in Zukunft keine Kommunisten mehr zu haben."
SIK_destroy_communism:0 "Zerstöre den Kommunismus"
SIK_destroy_communism_desc:0 "Nachdem wir die Schrecken des Kommunismus miterlebt haben, können wir nicht zulassen, dass irgendein anderes Land in Europa dasselbe Schicksal erleidet wie wir. Wir werden ihnen einen Gefallen tun und sie von ihren roten Ketten befreien."
SIK_recover_the_economy:0 "Erholung der Wirtschaft"
SIK_recover_the_economy_desc:0 "Wir werden mit der Erholung der russischen Wirtschaft beginnen und dabei eine liberalere Wirtschaftspolitik wie in den USA anstreben."
SIK_improve_our_production:0 "Verbessern Sie unsere Produktion"
SIK_improve_our_production_desc:0 "Einer der Gründe für den Untergang Russlands im Ersten Weltkrieg und die Vernichtung der Weißen Armee im Ersten Russischen Bürgerkrieg war die schwache Industrie und Produktion des Landes. Wir werden versuchen, diese zu steigern, damit so etwas nicht noch einmal passiert."
SIK_the_russian_miracle:0 "Das russische Wunder"
SIK_the_russian_miracle_desc:0 "Das russische Wunder ist der Name, den Ökonomen der zunehmenden industriellen Entwicklung Russlands gaben, die derzeit ein Produktionsniveau erreicht, das dem in Großbritannien und Deutschland ähnelt."
SIK_pan_slavism:0 "Panslawismus"
SIK_pan_slavism_desc:0 "Die ersten Panslawisten waren überwiegend Südslawen, aber niemand behauptet, wir könnten ihren Traum nicht verwirklichen. Wir werden alle slawischen Nationen unter einem Banner vereinen, damit niemand einem Slawen je wieder Schaden zufügen kann."
SIK_recover_whats_ours:0 "Holen Sie sich zurück, was uns gehört"
SIK_recover_whats_ours_desc:0 "Wir werden unsere verlorenen Gebiete im Vertrag von Brest zurückgewinnen und alle ehemaligen Mitglieder des Reiches wieder in die Gemeinschaft aufnehmen."
SIK_an_era_of_peace:0 "Eine Ära des Friedens"
SIK_an_era_of_peace_desc:0 "Die Ukraine, Weißrussland, Polen, Finnland und das Baltikum. Alle diese Länder haben ihre Unabhängigkeit zu Recht erlangt und das soll auch so bleiben. Wir dürfen jedoch nicht zulassen, dass diese Länder unsere nationale Sicherheit bedrohen. Deshalb werden wir einen Plan entwickeln, um diese Länder nicht mit Gewalt, sondern mit unserer Wirtschaft zu beherrschen."
SIK_the_return_of_the_prince:0 "Die Rückkehr des Prinzen"
SIK_the_return_of_the_prince_desc:0 "Wie es sich die Japaner und Afghanen 1935 gewünscht hatten, ist der osmanische Prinz auf den Thron zurückgekehrt, doch bis zu seiner Rückkehr nach Anatolien ist es noch ein weiter Weg."
SIK_recall_the_nobles:0 "Rufen Sie die Adligen zurück"
SIK_recall_the_nobles_desc:0 "Wir werden Ömer Faruk, den Sohn des Kalifen Abdulmejid II., und Osman Fuad, den Anführer des Hauses Osman, einladen, unsere Truppen bei unserem Kreuzzug nach Istanbul zu befehligen. Diese Generäle haben im Ersten Weltkrieg tapfer gekämpft, und wir erwarten nichts Geringeres von ihnen."
SIK_prepare_the_reunification:0 "Die Wiedervereinigung vorbereiten"
SIK_prepare_the_reunification_desc:0 "Wir werden uns auf die Wiedervereinigung unseres verlorenen Reiches vorbereiten und seine Stabilität für die Zukunft sicherstellen."
SIK_realign_with_the_germans:0 "Neuausrichtung auf die Deutschen"
SIK_realign_with_the_germans_desc:0 "Wir werden uns wieder unserem alten Verbündeten anschließen und die Demütigung rächen, die uns die Entente im Vertrag von Sèvres zugefügt hat. Şehzade Ömer Faruk als unser Sultan würde die Deutschen jedoch dank seiner Kämpfe in Verdun und Galizien an unsere Loyalität erinnern, und glücklicherweise ist Mehmed Abdülkerim bereit, seinen Titel abzugeben, da er nach eigenen Angaben nicht bereit sei, eine Nation zu führen."
SIK_offer_subjugation_to_the_japanese:0 "Bieten Sie den Japanern Unterwerfung an"
SIK_offer_subjugation_to_the_japanese_desc:0 "Wir werden zulassen, dass die Japaner ihre Kontrolle über unsere Wirtschaft und Politik ausweiten, oder besser gesagt, wir werden ihnen vorgaukeln, sie hätten die Kontrolle. In Wahrheit werden wir sie nur als Schutzschild gegen die Sowjets benutzen, falls diese uns angreifen sollten."
SIK_request_economic_assistance_to_our_allies:0 "Fordern Sie wirtschaftliche Unterstützung für unsere Verbündeten an"
SIK_request_economic_assistance_to_our_allies_desc:0 "Wir werden unsere Verbündeten um wirtschaftliche Unterstützung bitten, damit wir eine Chance gegen unsere Feinde haben."
SIK_provoke_the_soviets:0 "Provozieren Sie die Sowjets"
SIK_provoke_the_soviets_desc:0 "Wir werden die Regierung in Moskau zu einem Angriff auf uns provozieren und sie mit Hilfe unserer neuen Verbündeten besiegen."
SIK_german_military_mission:0 "Deutsche Militärmission"
SIK_german_military_mission_desc:0 "Die Deutschen sind für ihre guten Lehren und ihre militärische Disziplin bekannt. Es würde uns sehr helfen, sie zu bitten, uns eine Militärmission zu schicken."
SIK_german_technologies:0 "Deutsche Technologien"
SIK_german_technologies_desc:0 "Die Nachahmung der deutschen Entwürfe würde die Qualität unserer Armee erheblich verbessern."
SIK_german_economic_experts:0 "Deutsche Wirtschaftsexperten"
SIK_german_economic_experts_desc:0 "Deutsche Ökonomen wären großartig, um unsere derzeit schwache Wirtschaft zu verbessern."
SIK_japanese_training:0 "Japanisch-Training"
SIK_japanese_training_desc:0 "Die Japaner werden derzeit von der westlichen Welt stark unterschätzt, aber angesichts ihres Sieges im Russisch-Japanischen Krieg und im ersten Chinesisch-Japanischen Krieg wäre es vielleicht eine gute Idee, einige ihrer Offiziere in unser Land zu rufen."
SIK_japanese_investiments:0 "Japanische Investitionen"
SIK_japanese_investiments_desc:0 "Da die Japaner uns nun als „Marionette“ betrachten, werden sie nicht zögern, in unserem Land zu investieren."
SIK_japanese_fighters:0 "Japanische Kämpfer"
SIK_japanese_fighters_desc:0 "Wir werden japanische Kampfflugzeuge erwerben, um unsere Soldaten vor den Bombardierungen unserer Feinde schützen zu können."
SIK_russian_extraction_companies:0 "Russische Extraktionsunternehmen"
SIK_russian_extraction_companies_desc:0 ""
SIK_expand_the_oil_fields:0 "Erweitern Sie die Ölfelder"
SIK_expand_the_oil_fields_desc:0 "Die Deutschen und die Japaner brauchen Öl, um ihre Kriegsmaschinen anzutreiben, und wir werden sie mit diesem Öl versorgen. Allerdings müssten wir uns vorher von der sowjetischen Dominanz in unserer Industrie befreien."
SIK_cotton_fields:0 "Baumwollfelder"
SIK_cotton_fields_desc:0 "Xinjiang ist für seine Baumwollexporte bekannt. Eine Steigerung der Baumwollexporte würde unserer Wirtschaft zu mehr Stabilität verhelfen."
SIK_food_exports:0 "Lebensmittelexporte"
SIK_food_exports_desc:0 "Xinjiang ist für seine Exporte von Obst und Vieh sowie Wolle und Leder bekannt geworden. Wir werden diese Exporte fortsetzen, um unsere wirtschaftliche Stabilität zu erhalten."
SIK_russian_rail_building:0 "Russisches Eisenbahngebäude"
SIK_russian_rail_building_desc:0 ""
SIK_foreign_arsenals:0 "Ausländische Arsenale"
SIK_foreign_arsenals_desc:0 "Unsere Industrie wäre im Falle einer Invasion durch eine Großmacht nicht in der Lage, unsere Armee zu versorgen. Allerdings haben alle Großmächte Feinde, und diese wären bereit, dafür zu sorgen, dass unsere Armee bereit ist."
SIK_foreign_weapon_designs:0 "Ausländische Waffenentwürfe"
SIK_foreign_weapon_designs_desc:0 "Wir werden andere Nationen bitten, uns ihre Waffenentwürfe zur Verfügung zu stellen, damit wir die Qualität unserer Streitkräfte verbessern können."
SIK_foreign_education:0 "Ausländische Bildung"
SIK_foreign_education_desc:0 "Wir werden unsere Studenten in andere Länder wie Russland und Japan schicken, damit sie eine vorbildliche Ausbildung erhalten und ihr Wissen an die neuen Generationen weitergeben können. Wir müssen jedoch bedenken, dass dies unsere Bevölkerung dazu provozieren könnte, Ideen zu verfolgen, die im Widerspruch zu unserer Regierung stehen."
SIK_buy_fighters:0 "Kämpfer kaufen"
SIK_buy_fighters_desc:0 "Um unsere Feinde zu besiegen, benötigen wir unter anderem eine leistungsfähige Luftwaffe."
SIK_xinjiang_university:0 "Xinjiang-Universität"
SIK_xinjiang_university_desc:0 "Da sich die Qualität der Fachkräfte nach ihrer Ausbildung im Ausland verbessert hat, wird sich auch die Qualität der Universitäten in Xinjiang verbessern."
SIK_the_army_of_xinjiang:0 "Die Armee von Xinjiang"
SIK_the_army_of_xinjiang_desc:0 "Wenn wir unsere Autonomie bewahren wollen, müssen wir eine Armee aufbauen, die in der Lage ist, sich gegen die Russen, die Chinesen, die Japaner und die Ma zu verteidigen. Dies wird eine schwierige Aufgabe sein, aber wir werden unser Bestes tun, um sie zu erreichen."
SIK_rebuilding_our_army:0 "Wiederaufbau unserer Armee"
SIK_rebuilding_our_army_desc:0 "Der Wiederaufbau unserer Armee nach unseren Verlusten bei der sowjetischen Intervention in Xinjiang und dem Kumul-Aufstand muss für unsere Regierung Priorität haben."
SIK_protect_our_nation:0 "Schützen Sie unsere Nation"
SIK_protect_our_nation_desc:0 "Durch die Befestigung unserer Grenzen haben wir bessere Chancen gegen unsere Feinde."
SIK_copy_foreign_doctrines:0 "Kopieren Sie ausländische Lehren"
SIK_copy_foreign_doctrines_desc:0 "Die Nachahmung der Doktrinen der mächtigsten Nationen könnte unsere Fähigkeit zur Verteidigung von Xinjiang verbessern."
SIK_empower_the_guihua:0 "Stärke die Guihua"
SIK_empower_the_guihua_desc:0 "Nachdem das Guihua-Korps Sheng gestürzt hat, gibt es für uns keinen Grund, eine Ausweitung nicht in Erwägung zu ziehen."
SIK_fourteen_peoples_knowledge:0 "Das Wissen von vierzehn Menschen"
SIK_fourteen_peoples_knowledge_desc:0 "Von der muslimischen Guerilla bis zur russischen Kavallerie hat unser Land immer wieder und nach vielen verschiedenen Doktrinen gekämpft, und wir werden von jeder ein bisschen lernen, damit wir die am besten vorbereitete Armee haben."
SIK_improve_our_artillery:0 "Verbessern Sie unsere Artillerie"
SIK_improve_our_artillery_desc:0 "Artillerie ist entscheidend für den Sieg in einer Schlacht. Wenn unsere Armee keine Artillerie hat, wird uns eine Armee mit Artillerie letztendlich vernichten. Die Untersuchungen beginnen heute."
SIK_form_the_mountaineer_corps:0 "Bilden Sie das Gebirgsjägerkorps"
SIK_form_the_mountaineer_corps_desc:0 "Die Bildung von Gebirgsjägerdivisionen wird die Qualität und Vielseitigkeit unserer Armee sowie die Fähigkeit unseres Landes zur Verteidigung seiner Grenzen erhöhen."
SIK_know_our_terrain:0 "Kennen Sie unser Terrain"
SIK_know_our_terrain_desc:0 "Unser Land ist voller Berge, Wüsten und Hügel. Für die Wahrung der Unabhängigkeit unserer Nation ist es entscheidend, zu wissen, wie man in diesem Terrain kämpft."
SIK_improve_our_investigation_capacities:0 "Militärische Forschung"
SIK_improve_our_investigation_capacities_desc:0 "Wir müssen mehr Wissenschaftler für die Waffenentwicklung einstellen und so unsere Chancen gegenüber anderen Ländern deutlich erhöhen."
SIK_build_a_navy:0 "Bauen Sie eine Marine auf"
SIK_build_a_navy_desc:0 "Nachdem unser Land seine Macht an den Küsten gefestigt hat, ist es an der Zeit, mit dem Aufbau unserer eigenen Marine zu beginnen."
SIK_come_back_to_europe:0 "Komm zurück nach Europa"
SIK_come_back_to_europe_desc:0 "Die dummen Balkanstaaten dachten, wir wären mit ihnen fertig, aber sie sollten lernen, dass sie vor dem rechtmäßigen Herrscher des Balkans niemals sicher sein werden!"
SIK_the_three_butchers_of_sevres:0 "Die drei Schlächter von Sèvres"
SIK_the_three_butchers_of_sevres_desc:0 "Paris, Rom, London: Sie sind die Kızıl Elma des wiederhergestellten Osmanischen Reiches. Wir werden vor nichts Halt machen, um sicherzustellen, dass unsere alten Feinde – die uns demontiert, gedemütigt und vernichtet sehen wollten – für ihre heimtückischen Pläne gegen unser Reich gedemütigt, gebeugt und schließlich gebrochen werden. Wir werden die alte Weltordnung in Flammen aufgehen lassen und auf den Trümmern ihrer gefallenen Reiche einen neuen Status quo errichten."
SIK_meijis_nightmare:0 "Meijis Albtraum"
SIK_meijis_nightmare_desc:0 "Sultan Abdulhamid II. befürchtete, der japanische Kaiser würde zum Islam konvertieren und sich anstelle des türkischen Monarchen zum Kalifen ausrufen. Dazu kam es jedoch nie. Leider unterzeichnete Japan Sèvres, genau wie Lausanne – obwohl wir die Japaner lange bewunderten, sind sie genauso schuldig wie die anderen alten Mächte. Wir werden sie demütigen, indem wir das Khedivat von Nihon direkt von Konstantinopel aus regieren."
SIK_soviet_chinese_union:0 "Sowjetchinesische Union"
SIK_soviet_chinese_union_desc:0 "Die chinesischen Kriegsherren haben unsere Gesellschaft seit dem Fall der Qing-Dynastie jahrelang korrumpiert. Als Anhänger der Sowjetunion ist es unsere Pflicht, ganz China unter einer Sowjetunion zu vereinen, in der jede Ethnie gleichermaßen vertreten ist."
SIK_internationalism:0 "Internationalismus"
SIK_internationalism_desc:0 "Die Arbeiter und Bauern der Welt müssen sich vereinen, um ihre Fesseln abzuwerfen. Schulter an Schulter werden wir eine bessere Zukunft aufbauen."
SIK_contact_the_prc:0 "Kontaktieren Sie die VR China"
SIK_contact_the_prc_desc:0 "Genau wie wir versucht die VR China, den Marxismus in China zu etablieren. Wir sollten Kontakt zu ihr aufnehmen und unsere Kräfte gegen die Regierung vereinen, die derzeit die Kontrolle über Nanjing hat."
SIK_soviet_support:0 "Sowjetische Unterstützung"
SIK_soviet_support_desc:0 "Die Sowjets werden uns höchstwahrscheinlich gerne bei unserer Revolution gegen die Kuomintang helfen."
SIK_a_federation_of_equals:0 "Eine Föderation der Gleichen"
SIK_a_federation_of_equals_desc:0 "Die Sowjetunion steht vor einem großen Problem: Die Macht des Landes liegt größtenteils in den Händen der Russen. Wir werden anders sein, jede Ethnie wird gleichberechtigt vertreten sein. Han, Hui, Mongolen, Tibeter und Mandschu werden sich gemeinsam erheben, um die Arbeiter Chinas zu verteidigen, wie Brüder."
SIK_destroy_the_kuomintang:0 "Zerstöre die Kuomintang"
SIK_destroy_the_kuomintang_desc:0 "Die Kuomintang hat in den letzten Jahren ihre sozialistischen Wurzeln verlassen und sich in eine konservative und korrupte Partei verwandelt. Wenn wir die Kontrolle über ganz China behalten wollen, müssen wir sie zerstören."
SIK_never_again:0 "Die einzige Lösung"
SIK_never_again_desc:0 "Hunderte Han und Hui wurden von Sheng Shicai nach seiner Machtübernahme ausgelöscht. Wir dürfen die Rote Angst, die Xinjiang heimsuchte, nicht vergessen. Es ist nun unsere Pflicht, ganz China unter der Führung der Familie Ma und der islamischen Lehre vor dem Kommunismus zu schützen."
SIK_widespread_anti_communism:0 "Weit verbreiteter Antikommunismus"
SIK_widespread_anti_communism_desc:0 "Jeder Chinese wird über die Verbrechen des Kommunismus aufgeklärt, sodass niemand auf die absurde Idee kommt, sich ihrer Bewegung anzuschließen."
SIK_united_under_our_god:0 "Vereint unter unserem Gott"
SIK_united_under_our_god_desc:0 "Alle Chinesen werden nicht durch eine ethnische Zugehörigkeit vereint sein, sondern durch die Lehren eines Messias."
SIK_islamic_high_command:0 "Islamisches Oberkommando"
SIK_islamic_high_command_desc:0 "Ein Oberkommando, das unserer Sache treu ist, ist äußerst wichtig. Deshalb werden wir der Beförderung islamischer Offiziere in unserer Armee Priorität einräumen. Dies wird nicht nur die Sicherheit unseres Regimes verbessern, sondern wahrscheinlich auch die Zahl der Menschen erhöhen, die bereit sind, zu unserer Religion zu konvertieren."
SIK_acquire_camels:0 "Kamele erwerben"
SIK_acquire_camels_desc:0 "Wenn wir unsere Mission erfüllen wollen, müssen wir unsere Armee an den Kampf in der Wüste gewöhnen, und was wäre hierfür besser geeignet als Kamele? Wir werden Trampeltiere für den Transport unserer Vorräte und importierte Kamele für den Kampf in den Dünen einsetzen."
SIK_fanatic_pilots:0 "Fanatische Piloten"
SIK_fanatic_pilots_desc:0 "Indem wir die Sicherheit unserer Piloten teilweise opfern, können wir unsere Flugzeuge wendiger und einfacher machen. Wir werden eine der besseren und größten Luftwaffen in Ostasien haben."
SIK_save_the_chinese_people:0 "Rettet das chinesische Volk"
SIK_save_the_chinese_people_desc:0 "Wir müssen das chinesische Volk vor der Korruption des Atheismus und Kommunismus retten, die alle ostasiatischen Gemüter plagt."
VIN_bao_dais_regime:0 "Bao Đais Regime"
VIN_bao_dais_regime_desc:0 "Bao Đai ist der neue Staatschef Indochinas, die Macht liegt jedoch größtenteils noch immer in den Händen der Franzosen. Glücklicherweise bietet die derzeitige Instabilität in Frankreich und Europa eine gute Gelegenheit, in der Region langsam mehr Macht zu erlangen."
VIN_acquire_french_weapons:0 "Erwerben Sie französische Waffen"
VIN_acquire_french_weapons_desc:0 "Da wir nun französische Untertanen sind und nicht mehr nur erbärmliche Gummispender, sind sie möglicherweise mehr als bereit, uns ein paar Waffen zu schenken."
VIN_request_control_of_the_anti_air:0 "Fordern Sie die Kontrolle über die Flugabwehr an"
VIN_request_control_of_the_anti_air_desc:0 "Wir werden unsere Oberherren höflich bitten, uns im Falle einer ausländischen Invasion die Kontrolle über die Flugabwehrbatterien in Indochina zu überlassen …"
VIN_convince_the_legion_etrangere:0 "Überzeugen Sie die Légion Étrangère"
VIN_convince_the_legion_etrangere_desc:0 "Viele Mitglieder der Légion Étrangère sind Vietnamesen, Kambodschaner oder Laoten, und wir sollten unser Bestes tun, um im Falle eines bewaffneten Aufstands gegen Frankreich ihre Treue zu unserer Sache zu sichern."
VIN_achieve_our_independence:0 "Erreichen Sie unsere Unabhängigkeit"
VIN_achieve_our_independence_desc:0 "Es ist Zeit, die westlichen Imperialisten aus unserem Land zu vertreiben. Wir werden ihnen ein Ultimatum stellen und sie zum Abzug aus Indochina auffordern. Sollten sie sich weigern, werden wir sie mit Tausenden von Guerillakämpfern erwarten, die bereit sind, für ihr Heimatland zu kämpfen."
VIN_seize_french_arm_deposits:0 "Beschlagnahmung französischer Waffenlager"
VIN_seize_french_arm_deposits_desc:0 "Um unsere Streitkräfte zu versorgen, sollte der Angriff auf Waffenlager unser erstes Ziel sein."
VIN_produce_molotovs:0 "Produzieren Sie Molotowcocktails"
VIN_produce_molotovs_desc:0 "Mit nur einer Flasche Benzin können wir billige Panzerabwehr-Brandwaffen herstellen und unsere Streitkräfte so schnell wie möglich damit versorgen."
VIN_lunge_mines:0 "Ausfallminen"
VIN_lunge_mines_desc:0 "Bei den sogenannten „Lunge Minen“, auch Shitotsubakurai genannt, handelt es sich um selbstmörderische Panzerabwehrwaffen mit einer konischen Hohlladung, die in einem Metallbehälter untergebracht und am Ende eines Holzstabs befestigt ist. Es ist natürlich traurig, wenn unser Volk Selbstmord begeht, um die feindlichen Panzer zu besiegen, aber es ist die einzige Möglichkeit, unsere Souveränität zu sichern."
VIN_seize_french_factories:0 "Beschlagnahme französischer Fabriken"
VIN_seize_french_factories_desc:0 "Die Besetzung französischer Fabriken und Unternehmen wird unsere Kriegsanstrengungen erheblich unterstützen."
VIN_seize_power:0 "Ergreife die Macht"
VIN_seize_power_desc:0 "Jetzt, da wir frei sind, ist es an der Zeit, die volle Kontrolle über die französischen Institutionen im Land zu übernehmen! Vorwärts, für unsere Zukunft!"
VIN_protect_our_people:0 "Schützen Sie unsere Leute"
VIN_protect_our_people_desc:0 "Der Schutz unseres Volkes sollte die oberste Verantwortung der neuen Regierung Indochinas sein! Gott schütze den König!"
VIN_help_our_people:0 "Helfen Sie unseren Leuten"
VIN_help_our_people_desc:0 "Die Hilfe für Bedürftige sollte die oberste Aufgabe der neuen Regierung Indochinas sein."
VIN_guide_our_people:0 "Leiten Sie unsere Mitarbeiter"
VIN_guide_our_people_desc:0 "Die Führung unseres Volkes sollte die Hauptverantwortung der neuen Regierung Indochinas sein, damit eine solche Besetzung nie wieder vorkommt. \n§RDie beiden Generäle werden zu Generälen der Stufe 2 und verlieren die Eigenschaft „Verborgene Sympathien“. Daher könnten sie Eigenschaften und Werte verlieren, die sie im Unabhängigkeitskrieg erlangt haben.§!"
VIN_found_the_viet_cong:0 "Den Vietcong gefunden"
VIN_found_the_viet_cong_desc:0 "Jetzt, da wir die Unabhängigkeit erlangt haben, sollten wir eine neue Streitmacht aufbauen, die weder von Nationalisten noch von Antikommunisten beeinflusst werden darf. Es ist Zeit, die Nationale Befreiungsfront zu gründen."
VIN_reform_the_viet_minh:0 "Reform der Viet Minh"
VIN_reform_the_viet_minh_desc:0 "Seit ihrer Gründung war die Viet Minh den kommunistischen Kräften unter Ho Chi Minh gegenüber voreingenommen. Wenn wir in einer demokratischen Nation leben wollen, müssen wir dem ein Ende setzen."
VIN_seize_full_power:0 "Ergreifen Sie die volle Macht"
VIN_seize_full_power_desc:0 "Die einzige Partei mit dem Recht, Vietnam zu regieren, sind wir, die Kommunistische Partei! Es gibt keinen König, Nationalisten oder Sektenführer, dem unser Volk wichtiger wäre als uns."
VIN_the_only_way:0 "Der einzige Weg"
VIN_the_only_way_desc:0 "Stabilität und Wohlstand können in Indochina nur unter Führung der Kommunistischen Partei erreicht werden. Alle Parteien, die nicht linksgerichtet sind, sollen sofort verboten werden."
VIN_the_laogai:0 "Der Laogai"
VIN_the_laogai_desc:0 "Laogai ist die Abkürzung für Láodòng Gǎizào, was auf Chinesisch Reform durch Arbeit bedeutet. Es handelt sich um ein von der kommunistischen Regierung Yan&#39;ans entwickeltes Strafrechtssystem mit Zwangsarbeit und Zwangsfarmen. Jeder, der es wagt, ein Verbrechen wie Mord, Diebstahl oder Kritik an der kommunistischen Partei zu begehen, wird ins Laogai-Gefängnis geschickt. In Tonkin gibt es keine Kriminellen."
VIN_land_redistribution:0 "Landumverteilung"
VIN_land_redistribution_desc:0 "Alle Landbesitzer sollen ihr Land den ärmsten Mitgliedern der Gesellschaft schenken, und diejenigen, die sich dagegen wehren, sollen mit ihrem Leben bezahlen."
VIN_join_moscow:0 "Treten Sie Moskau bei"
VIN_join_moscow_desc:0 "Um unsere Souveränität vor den imperialistischen und kapitalistischen Schweinen zu verteidigen, müssen wir den Schutz der Sowjets suchen."
VIN_help_yanan:0 "Hilf Yan&#39;an"
VIN_help_yanan_desc:0 "Nachdem das chinesische Volk nun die kommunistische Regierung in Yan&#39;an ausgerufen hat, könnten wir ihm ein Bündnis anbieten, um ihm bei der Befreiung des restlichen Landes zu helfen. Dann wird es niemand wagen, sich uns und unserem mächtigen Verbündeten entgegenzustellen."
VIN_true_communism:0 "Wahrer Kommunismus"
VIN_true_communism_desc:0 "Der einzige Weg zum wahren Kommunismus besteht darin, alle Lehren des Kapitalismus abzulehnen und eine vollständig geplante Wirtschaft einzuführen."
VIN_doi_moi:0 "Đoi Moi"
VIN_doi_moi_desc:0 "„Đoi Moi“ oder „Erneuerung“ ist die Bezeichnung für die von unseren Experten entwickelte Wirtschaftsdoktrin mit dem Ziel, eine sozialistisch orientierte Marktwirtschaft zu schaffen. Obwohl sie einige Prinzipien des Kommunismus ablehnt, ist sie eine bessere Alternative zum Kapitalismus."
VIN_excecute_the_lutteurs:0 "Hinrichtung der Lutteurs"
VIN_excecute_the_lutteurs_decs:0 "La Lutte (französisch für „Der Kampf“) war einst eine linke Zeitung, die vorwiegend in Saigon als gemeinsames Organ der Kommunistischen Partei Indochinas (PCI) und einer Gruppierung von Trotzkisten erschien. Da La Lutte heute jedoch eine offen trotzkistische Zeitung ist, bleibt uns nichts anderes übrig, als die Zeitung und ihre Autoren zum Schweigen zu bringen." 
VIN_female_recruitment:0 "Rekrutierung von Frauen"
VIN_female_recruitment_desc:0 "Jedes Mal, wenn wir gegen einen stärkeren Feind kämpfen, verlieren unsere Soldaten an Moral. Aber vielleicht ist es sinnvoll, Frauen, die zuvor als junge Freiwillige gearbeitet haben, als LKW-Fahrerinnen oder Verwundete zu rekrutieren. So zeigen sie den männlichen Soldaten, dass Frauen durchhalten können, wenn sie es können."
VIN_limited_female_support:0 "Eingeschränkte Unterstützung für Frauen"
VIN_limited_female_support_desc:0 "Jedes Mal, wenn wir gegen einen stärkeren Feind kämpfen, verlieren unsere Soldaten an Moral. Aber vielleicht wäre es sinnvoll, mehr Frauen als LKW-Fahrerinnen oder als Verwundete zu beschäftigen. So zeigen sie den männlichen Soldaten, dass Frauen durchhalten können, wenn sie es können."
VIN_dye_bangkok_red:0 "Farbstoff Bangkok Rot"
VIN_dye_bangkok_red_desc:0 "Siam war schon immer die Heimat korrupter Könige und blutrünstiger Generäle. Wir können nicht länger zusehen, wie diese Barbaren das siamesische Volk ausbeuten!"
VIN_offer_help_to_delhi:0 "Bieten Sie Delhi Hilfe an"
VIN_offer_help_to_delhi_desc:0 "Die Völker Indiens kämpfen darum, die letzten Fesseln der kolonialen Unterdrückung abzuschütteln. Wir werden ihnen die Hand reichen, ihren Kampf unterstützen und gemeinsam für eine bessere Zukunft unserer beiden Nationen arbeiten."
VIN_the_first_vietnamese_elections:0 "Die ersten Wahlen in Vietnam"
VIN_the_first_vietnamese_elections_desc:0 "Nachdem wir die westlichen Unterdrücker besiegt haben, ist es an der Zeit, die ersten demokratischen Wahlen in Vietnam abzuhalten!"
VIN_until_they_are_ready:0 "Bis sie bereit sind"
VIN_until_they_are_ready_desc:0 "Das indochinesische Volk ist noch nicht bereit für echte Demokratie, nicht nachdem die Kommunisten das Land fast übernommen haben. Vietnam kann nur durch einen starken Führer gerettet werden, der die Menschen vor den Gefahren des Kommunismus und Faschismus schützt."
VIN_embrace_republicanism:0 "Umarme den Republikanismus"
VIN_embrace_republicanism_desc:0 "Die einzige Regierungsform, die das indochinesische Volk verdient, ist der wahre Republikanismus, in dem es von keinem Diktator oder König regiert wird."
VIN_a_constitutional_monarchy:0 "Eine konstitutionelle Monarchie"
VIN_a_constitutional_monarchy_desc:0 "Bao Đai hat uns während der französischen Besatzung bestmöglich geholfen. Ihm einen Platz in der Regierung zu geben, ist richtig."
VIN_guillotine_the_traitors:0 "Guillotine die Verräter"
VIN_guillotine_the_traitors_desc:0 "Alle Kommunisten und sektiererischen Teufel verdienen es, in die Hölle zurückzukehren."
VIN_what_vietnam_deserved:0 "Was Vietnam verdient hat"
VIN_what_vietnam_deserved_desc:0 "Vietnam hatte, wie jedes andere Land auch, immer eine demokratische Führung verdient. Eine Verfassung, die den Fortbestand dieser Regierungsform sichert, ist für das Glück unseres Volkes von entscheidender Bedeutung."
VIN_ally_the_thai_monarchy:0 "Verbünde dich mit der siamesischen Monarchie"
VIN_ally_the_thai_monarchy_desc:0 "Die Entsendung einer Delegation nach Siam würde uns sehr dabei helfen, unsere Grenzen vor potenziellen Feinden zu schützen, und Bao Đai könnte die richtige Person für die Leitung dieser Delegation sein."
VIN_land_to_the_tiller:0 "Land für den Ackerbauer"
VIN_land_to_the_tiller_desc:0 "Es ist bekannt, dass in Vietnam der Großteil des Landes den Reichen gehört, während die ärmsten Bauern praktisch zu Sklaven der Landbesitzer werden. Wir sollten dies ändern, wenn wir ein Land wollen, in dem alle die Möglichkeit haben, ihre Lebensqualität zu verbessern."
VIN_pardon_the_west:0 "Verzeihen Sie dem Westen"
VIN_pardon_the_west_desc:0 "Es ist ganz natürlich, schwächere Nationen zu bekämpfen und zu erobern. Der Kampf gegen die Schwachen ist ein Naturprinzip, dem selbst Tiger mit allen Mitteln folgen. Deshalb sollten wir dem Westen verzeihen, dass er seinen wilden Instinkten folgt, wenn es uns nützt."
VIN_the_protector_of_asia:0 "Der Beschützer Asiens"
VIN_the_protector_of_asia_desc:0 "Wir müssen zur Hoffnung aller Asiaten werden, die versuchen, ihre Unabhängigkeit vom Westen zu erlangen. Wir müssen zum Beschützer Asiens werden!"
VIN_electrification_campaign:0 "Elektrifizierungskampagne"
VIN_electrification_campaign_desc:0 "Wir müssen die Elektrifizierung des Landes erreichen, wie es die Europäer und Amerikaner getan haben. Nur dann sind wir einen Schritt davon entfernt, eine vorbildliche Nation zu werden."
VIN_empower_christianism:0 "Das Christentum stärken"
VIN_empower_christianism_desc:0 "Seit Ngô Đình Diem die Macht übernahm, kam es zu zahlreichen Verbrechen gegen Buddhisten. Da er ein gläubiger Katholik ist, ist seine religiöse Voreingenommenheit mehr als deutlich geworden. Sie ging sogar so weit, dass Buddhisten Selbstverbrennungen begingen, um gegen die Regierung zu demonstrieren. Die First Lady antwortete ihnen nur mit den Worten: „Wenn die Buddhisten wieder grillen wollen, liefere ich gerne das Benzin.“"
VIN_religious_liberties:0 "Religionsfreiheit"
VIN_religious_liberties_desc:0 "Wir sollten dafür sorgen, dass alle Menschen die Freiheit haben, ihren Glauben auszuüben, sei es der Katholizismus, der Buddhismus oder eine der neuen Religionen, die vor kurzem im Süden des Landes entstanden sind."
VIN_limited_female_recruitment:0 "Begrenzte Rekrutierung von Frauen"
VIN_limited_female_recruitment_desc:0 "Jedes Mal, wenn wir gegen einen stärkeren Feind kämpfen, verlieren unsere Soldaten an Moral. Aber vielleicht wäre es sinnvoll, mehr Frauen als LKW-Fahrerinnen oder als Verwundete zu beschäftigen. So zeigen sie den männlichen Soldaten, dass Frauen durchhalten können, wenn sie es können."
VIN_personalism_community_idealism:0 "Personalismus, Gemeinschaft, Idealismus"
VIN_personalism_community_idealism_desc:0 "Personalismus, Gemeinschaft, Idealismus. Das sind die drei Prinzipien der Can Lao-Partei und die drei Prinzipien, die das vietnamesische Volk für immer leiten werden."
VIN_beacon_of_democracy:0 "Leuchtfeuer der Demokratie"
VIN_beacon_of_democracy_desc:0 "In einer Region, die von Schatten und imperialistischen Dämonen umgeben ist, werden wir zum Leuchtfeuer, das allen versklavten Asiaten der Welt Hoffnung gibt!"
VIN_university_building_campaign:0 "Universitätsbau-Kampagne"
VIN_university_building_campaign_desc:0 "Wir müssen mehr Universitäten bauen, wenn wir wollen, dass unsere Bevölkerung mit den westlichen Studenten und Arbeitern konkurrieren kann."
VIN_the_tonkin_march:0 "Der Tonkin-Marsch"
VIN_the_tonkin_march_desc:0 "Nationalistische Elemente begannen in Tonkin einzumarschieren, ähnlich wie der Marsch auf Rom und der Putsch in München. Unter ihnen befanden sich viele nationalistische Parteien, religiöse Sekten und sogar Cuong Đe, ein königlicher Verwandter der Nguyen-Dynastie und Revolutionär, der mit Hilfe der Japaner versuchte, die französische Herrschaft in Indochina zu stürzen. Nun bleibt abzuwarten, was die Zukunft für Vietnam bereithält."
VIN_crown_bao_dai:0 "Crown Bao Đai"
VIN_crown_bao_dai_desc:0 "Bao Đai ist der rechtmäßige Erbe der Nguyen-Dynastie, daher beginnt seine Krönung heute!"
VIN_crown_cuong_de:0 "Crown Cuong Đe"
VIN_crown_cuong_de_desc:0 "Cuong Đe ist der rechtmäßige Erbe der Nguyen-Dynastie, daher beginnt seine Krönung heute!"
VIN_deal_with_the_viet_minh:0 "Deal mit den Viet Minh"
VIN_deal_with_the_viet_minh_desc:0 "Die Viet Minh haben sich unter der Führung von Ho Chi Minh in eine Terrororganisation verwandelt. Wenn wir Frieden in unserem Land erreichen wollen, müssen wir sie entweder beschwichtigen oder hinrichten.\n§RDie beiden Generäle werden zu Generälen der Stufe 2 und verlieren die Eigenschaft „Verborgene Sympathien“. Daher könnten sie Eigenschaften und Werte verlieren, die sie im Unabhängigkeitskrieg erlangt haben.§!"
VIN_heal_the_scars:0 "Heile die Narben"
VIN_heal_the_scars_desc:0 "Um Frieden nach Vietnam zu bringen, werden wir versuchen, eine Versöhnung mit allen Parteien und religiösen Überzeugungen Indochinas herbeizuführen."
VIN_finish_off_the_devil:0 "Besiege den Teufel"
VIN_finish_off_the_devil_desc:0 "Jetzt, da der Dämon geschwächt ist, ist es an der Zeit, ihm den letzten Stich in die Kehle zu versetzen, um Frieden nach Indochina zu bringen."
VIN_reconcile_with_the_west:0 "Versöhnung mit dem Westen"
VIN_reconcile_with_the_west_desc:0 "Es ist ganz natürlich, schwächere Nationen zu bekämpfen und zu erobern. Der Kampf gegen die Schwachen ist ein Naturprinzip, dem selbst Tiger mit allen Mitteln folgen. Deshalb sollten wir dem Westen verzeihen, dass er seinen wilden Instinkten folgt, wenn es uns nützt."
VIN_greet_the_japanese:0 "Grüße die Japaner"
VIN_greet_the_japanese_desc:0 "Die Japaner halfen uns in den 20er Jahren, unsere Unabhängigkeit zu erreichen, bis die Franzosen sie dazu aufforderten. Wir sollten bei ihnen Schutz vor dem Westen suchen."
VIN_join_the_chinese:0 "Schließen Sie sich den Chinesen an"
VIN_join_the_chinese_desc:0 "Sowohl Japan als auch der Westen sind nichts weiter als schmutzige Imperialisten, die die Schwachen ausbeuten wollen. Die einzige Nation, die uns wirklich beschützen würde, ist China, der Feind beider."
VIN_western_artillery:0 "Westliche Artillerie"
VIN_western_artillery_desc:0 "Der Westen hat uns gelehrt, wie wichtig Artillerie im Krieg ist, und deshalb müssen wir unser Bestes tun, um diese Technologien zu erwerben."
VIN_whampoa_officers:0 "Whampoa-Offiziere"
VIN_whampoa_officers_desc:0 "Die Whampoa-Akademie ist für ihre guten Offiziere bekannt und deshalb werden wir unsere Offiziere dorthin zum Studium schicken, um ihre Führungsqualitäten zu verbessern."
VIN_japanese_expeditionary_mission:0 "Japanische Expeditionsmission"
VIN_japanese_expeditionary_mission_desc:0 "Die japanische Macht und Doktrin sind weltweit einzigartig und deshalb werden wir sie bitten, unsere Soldaten und Offiziere auf den Krieg vorzubereiten."
VIN_pass_the_land_reform:0 "Verabschieden Sie die Landreform"
VIN_pass_the_land_reform_desc:0 "Es ist bekannt, dass in Vietnam der Großteil des Landes den Reichen gehört, während die ärmsten Bauern praktisch zu Sklaven der Landbesitzer werden. Wir sollten dies ändern, wenn wir ein Land wollen, in dem alle die Möglichkeit haben, ihre Lebensqualität zu verbessern."
VIN_freedom_of_worship:0 "Religionsfreiheit"
VIN_freedom_of_worship_desc:0 "Wir sollten dafür sorgen, dass alle Menschen die Freiheit haben, ihren Glauben auszuüben, sei es der Katholizismus, der Buddhismus oder eine der neuen Religionen, die vor kurzem im Süden des Landes entstanden sind."
VIN_undermine_the_catholics:0 "Untergraben Sie die Katholiken"
VIN_undermine_the_catholics_desc:0 "Der Katholizismus ist nur eine Erfindung des Westens, um die eigene Bevölkerung zu kontrollieren. Daher hat er in Indochina keinen Platz. Wer sich weigert, seine schmutzige Religion aufzugeben, wird die Konsequenzen tragen müssen."
VIN_experimental_armored_division:0 "Experimentelle Panzerdivision"
VIN_experimental_armored_division_desc:0 "Da Vietnam hauptsächlich aus Hügeln und Dschungeln besteht, scheint es sinnlos, eine Panzerdivision zu haben. Angesichts der Kriegsleistung Japans und Deutschlands sollten wir jedoch über die Anschaffung einer Panzerdivision nachdenken, zumindest um die Panzer anderer Nationen zu bekämpfen."
VIN_buy_european_ships:0 "Kaufen Sie europäische Schiffe"
VIN_buy_european_ships_desc:0 "Es ist einfacher, Schiffe von anderen Nationen zu kaufen, als sie selbst zu bauen, und es gibt viele Nationen, die bereit sind, uns welche zu verkaufen."
VIN_acquire_western_designs:0 "Erwerben Sie Western Designs"
VIN_acquire_western_designs_desc:0 "Wenn wir mit den stärkeren Nationen konkurrieren wollen, sollten wir Rüstungsdesigns untersuchen oder kaufen."
VIN_empower_the_cao_dai:0 "Stärken Sie den Cao Đài"
VIN_empower_the_cao_dai_desc:0 "Der Caodaismus (auf Vietnamesisch Đao Cao Đài) ist eine monotheistische synkretistische neue religiöse Bewegung, die 1926 in der Stadt Tây Ninh im Süden Vietnams offiziell gegründet wurde. Der vollständige Name der Religion lautet Đai Đao Tam Ky Pho Đo (Der große Glaube an die dritte universelle Erlösung). Die Anhänger praktizieren Praktiken wie Gebet, Ahnenverehrung, Gewaltlosigkeit und Vegetarismus mit dem Ziel, sich mit Gott zu vereinen und vom Samsāra befreit zu werden."
VIN_empower_the_hoa_hao:0 "Stärke die Hòa Hao"
VIN_empower_the_hoa_hao_desc:0 "Der Hoahaoismus (auf Vietnamesisch Đao Hòa Hao genannt) ist eine quasi-buddhistische Religion, die vor kurzem von Huynh Phú So (im Volksmund Buddha-Meister genannt), einem Einheimischen aus dem Mekong-Delta im Süden Vietnams, gegründet wurde. Seine Anhänger betrachten So als Propheten und Hòa Hao als Fortführung der buddhistischen Lehre des 19. Jahrhunderts. Die Begründer dieser Traditionen werden von den Anhängern von Hòa Hảo als lebende Buddhas angesehen, die dazu bestimmt sind, die Menschheit vom Leid zu erlösen und die vietnamesische Nation zu beschützen."
VIN_purge_the_communists:0 "Säubert die Kommunisten"
VIN_purge_the_communists_desc:0 "Der Kommunismus sollte aufgrund seiner atheistischen Überzeugung der Hauptfeind unserer Nation sein. Wenn sie an nichts glauben wollen, tun sie es aus der Hölle heraus. \n§RDie beiden Generäle werden zu Generälen der Stufe 3 und erhalten möglicherweise neue Eigenschaften. Daher verlieren sie möglicherweise Eigenschaften und Werte, die sie im Unabhängigkeitskrieg erlangt haben.§!"
VIN_remember_our_ancestors:0 "Gedenken an unsere Vorfahren"
VIN_remember_our_ancestors_desc:0 "Das Gedenken an unsere Vorfahren ist eines der Prinzipien des Caodaismus und daher für alle Menschen in Indochina verpflichtend."
VIN_encourage_vegetarianism:0 "Vegetarismus fördern"
VIN_encourage_vegetarianism_desc:0 "Vegetarismus ist eines der Prinzipien des Caodaismus und daher für alle Menschen in Indochina verpflichtend."
VIN_nonviolence:0 "Gewaltlosigkeit"
VIN_nonviolence_desc:0 "Gewaltlosigkeit ist eines der Prinzipien des Caodaismus und daher für alle Menschen in Indochina verpflichtend."
VIN_protect_asia:0 "Schützen Sie Asien"
VIN_protect_asia_desc:0 "Wir müssen die Führung für alle Asiaten übernehmen, die versuchen, die Unabhängigkeit vom Westen zu erreichen. Wir müssen der Beschützer Asiens werden!"
VIN_open_to_democracy:0 "Offen für die Demokratie"
VIN_open_to_democracy_desc:0 "Es ist an der Zeit, die Indochinesen ihre eigenen Führer wählen zu lassen. Sie dürfen jedoch nie vergessen, wer ihnen die Unabhängigkeit und Stabilität geschenkt hat, die sie heute haben …"
VIN_secure_our_legacy:0 "Sichern Sie unser Erbe"
VIN_secure_our_legacy_desc:0 "Wir müssen dafür sorgen, dass unsere Lehren von den Indochinesen nie vergessen werden, nur dann können sie in Frieden leben …"
VIN_align_siam:0 "Align Siam"
VIN_align_siam_desc:0 "Siam als Feind zu haben, würde unsere nationale Sicherheit mit Sicherheit gefährden. Wir müssen versuchen, sie davon zu überzeugen, sich uns anzuschließen."
VIN_protect_burma:0 "Schützen Sie Burma"
VIN_protect_burma_desc:0 "Ein Feind Burmas würde unsere nationale Sicherheit gefährden. Wir müssen versuchen, Burma davon zu überzeugen, sich uns anzuschließen."
VIN_protect_the_southern_warlords:0 "Beschütze die Kriegsherren des Südens"
VIN_protect_the_southern_warlords_decs:0 "„China als Feind zu haben, würde sicherlich unsere nationale Sicherheit beeinträchtigen. Es könnte jedoch hilfreich sein, China zu schwächen, indem man seine Wiedervereinigung behindert.“"
VIN_support_malaysian_independence:0 "Unterstützen Sie die Unabhängigkeit Malaysias"
VIN_support_malaysian_independence_desc:0 "Die Malaysier sind derzeit nur eine Kolonie des Westens. Wenn wir die Freiheit Südostasiens wollen, dürfen wir das nicht zulassen."
VIN_becoming_living_buddhas:0 "Lebende Buddhas werden"
VIN_becoming_living_buddhas_desc:0 "Die Gründer des Hoahaoismus werden von den Anhängern des Hòa Hảo als lebende Buddhas angesehen, die dazu bestimmt waren, die Menschheit vom Leid zu befreien und die vietnamesische Nation zu beschützen. Nun sollten alle daran arbeiten, ebenfalls lebende Buddhas zu werden."
VIN_conquer_the_rivers:0 "Erobere die Flüsse"
VIN_conquer_the_rivers_desc:0 "Die Guerilla der Hoahao-Bewegung kämpfte ständig im Mekongdelta. Ihre Erfahrung lehrte sie, wie nützlich Flüsse zum Schutz einer Stellung sein können und wie schwierig ein Angriff werden kann, wenn der Feind durch Flüsse geschützt ist. Die Ausbildung guter Ingenieure sollte nun oberste Priorität für das Land haben."
VIN_work_with_little:0 "Arbeite mit Little"
VIN_work_with_little_desc:0 "Viele Religionen neigen dazu, Unmengen an Geld für Zeremonien zu verschwenden und ihre Anhänger am Ende um Geld zu bitten, wodurch ihnen jeden Monat immer weniger bleibt. Der Hoahaoismus wird jedoch anders sein. Wir werden unseren Leuten beibringen, wie wichtig es ist, keine Ressourcen zu verschwenden, die anderen helfen könnten."
VIN_yield_to_the_sun:0 "Ergeben Sie sich der Sonne"
VIN_yield_to_the_sun_desc:0 "Wir können nicht zulassen, dass unser Volk erneut von einem imperialistischen Teufel erobert wird, selbst wenn dies bedeutet, sich dem Teufel selbst zu beugen."
VIN_help_the_kuomintang:0 "Helfen Sie der Kuomintang"
VIN_help_the_kuomintang_desc:0 "Sowohl Japan als auch der Westen sind nichts weiter als schmutzige Imperialisten, die die Schwachen ausbeuten wollen. Die einzige Nation, die uns wirklich beschützen würde, ist China, der Feind beider."
VIN_secure_the_south:0 "Den Süden sichern"
VIN_secure_the_south_desc:0 "Wir müssen die Kontrolle über die südlichen Provinzen der Region übernehmen, damit unsere Verbündeten keine Angst haben müssen, dass ein neuer Feind vor ihren Toren steht."
VIN_protect_the_south_china_sea:0 "Schützen Sie das Südchinesische Meer"
VIN_protect_the_south_china_sea_desc:0 "Unsere Verbündeten verfügen nicht über unbegrenzte Ressourcen, um jedes Meer feindlicher Nationen zu schützen. Deshalb müssen wir die Aufgabe übernehmen, unsere Meere zu schützen."
VIN_defend_the_skies:0 "Verteidige den Himmel"
VIN_defend_the_skies_desc:0 "Wir sollten uns bemühen, unseren Luftraum zu verteidigen, damit unsere Verbündeten keine Ressourcen an uns verschwenden und so ihre Leistungsfähigkeit an ihren Fronten verbessern können."
VIN_secure_singapore:0 "Sicheres Singapur"
VIN_secure_singapore_desc:0 "Die Sicherung Singapurs würde uns große Ressourcen und eine strategische Position in der Region verschaffen."
VIN_save_asia_from_communism:0 "Rettet Asien vor dem Kommunismus"
VIN_save_asia_from_communism_desc:0 "Wir haben die Schrecken des Kommunismus erlebt. Wir müssen unser Volk opfern, um zu verhindern, dass irgendjemand in Asien dasselbe Leid erleiden muss wie wir."
VIN_reactivate_our_economy:0 "Reaktivieren Sie unsere Wirtschaft"
VIN_reactivate_our_economy_desc:0 "Um Stabilität zu erreichen, muss die indochinesische Wirtschaft neu organisiert werden."
VIN_improve_our_trails:0 "Verbessern Sie unsere Trails"
VIN_improve_our_trails_desc:0 "Die Indochinesischen Pfade sind für ihren schlechten Zustand bekannt. Dem müssen wir jetzt ein Ende setzen."
VIN_expand_the_rice_fields:0 "Erweitern Sie die Reisfelder"
VIN_expand_the_rice_fields_desc:0 "Vietnam ist für seinen Reisanbau bekannt. Eine Ausweitung dieser Felder wäre für unsere Wirtschaft sehr hilfreich."
VIN_coffe_harvesting:0 "Kaffeeernte"
VIN_coffe_harvesting_desc:0 "Vietnam ist reich an Kaffee. Eine größere Kaffeeernte wäre für unsere Wirtschaft sehr hilfreich."
VIN_indochinese_arsenals:0 "Indochinesische Arsenale"
VIN_indochinese_arsenals_desc:0 "Wenn wir Indochina gegen ausländische Bedrohungen verteidigen wollen, sollten wir in allen Regionen des Landes, einschließlich Kambodscha und Laos, Waffenarsenale aufbauen. Wir sollten sie jedoch im Auge behalten, falls sie über eine Unabhängigkeit nachdenken."
VIN_ke_vang:0 "Ke Vàng"
VIN_ke_vang:0 "„Ke hoach màu vàng“ ist der Name des Plans zur Befestigung unserer Nordgrenze gegenüber den Chinesen, für den Fall, dass sie sich zu einer Invasion entschließen."
VIN_ke_do:0 "Ke Đo"
VIN_ke_do_desc:0 "„Ke hoach màu đo“ ist der Name des Plans zur Befestigung unserer Westgrenze gegenüber den Indern und Siamesen, für den Fall, dass sie sich zu einer Invasion entschließen."
VIN_ke_xanh:0 "Ke Xanh"
VIN_ke_xanh_desc:0 "Ke hoach màu xanh ist der Name des Plans zur Befestigung unserer Küsten, für den Fall, dass Frankreich oder ein anderer Imperialist erneut beschließt, uns unseren Kautschuk zu stehlen."
VIN_address_the_minority_problem:0 "Das Minderheitenproblem angehen"
VIN_address_the_minority_problem_desc:0 "In Indochina gibt es nicht nur laotische und kambodschanische Minderheiten, sondern in Vietnam selbst 54 ethnische Gruppen. Wenn wir den Zusammenbruch unserer Union verhindern wollen, sollten wir ihnen entweder so viel Unabhängigkeit gewähren, dass sie sich nicht abspalten, oder dafür sorgen, dass sich alle als Indochinesen fühlen und nicht mehr ihrer alten Ethnie/Nationalität angehören."
VIN_limited_independence:0 "Eingeschränkte Unabhängigkeit"
VIN_limited_independence_desc:0 "Wenn man den Laoten und Kambodschanern eine begrenzte Unabhängigkeit gewährt, wird man sie sicherlich besänftigen."
VIN_the_indochinese_union:0 "Die Indochinesische Union"
VIN_the_indochinese_union_desc:0 "Die Indochinesen müssen vereint bleiben, solange es imperialistische Nationen gibt, die bereit sind, uns zu erobern. Wir müssen unsere alte Identität aufgeben, um eine bessere Zukunft zu haben."
VIN_promote_local_recruitment:0 "Förderung der lokalen Rekrutierung"
VIN_promote_local_recruitment_desc:0 "Wenn lokale laotische und kambodschanische Truppen für uns kämpfen, wird das unserer Nation sehr dabei helfen, uns zu verteidigen. Allerdings sollten wir auch einige vietnamesische Offiziere und Beobachter schicken, um sie auszubilden und sicherzustellen, dass sie nicht revoltieren."
VIN_indochinese_economic_assistance:0 "Indochinesische Wirtschaftshilfe"
VIN_indochinese_economic_assistance_desc:0 "Wir sollten den Menschen in Indochina gerecht helfen, damit sich keine Minderheit von der Regierung im Stich gelassen fühlt und an einen Aufstand denkt."
VIN_indochinese_scientifics:0 "Indochinesische Wissenschaften"
VIN_indochinese_scientifics_desc:0 "Die klügsten Köpfe Indochinas werden die Untersuchung unserer Nation leiten und uns so fortschrittlich machen wie diejenigen, die uns für Wilde hielten."
VIN_the_navy_of_indochina:0 "Die Marine von Indochina"
VIN_the_navy_of_indochina_desc:0 "Es ist völliger Unsinn, das Meer zu haben und es nicht zu nutzen. Wir müssen jetzt mit dem Aufbau der indochinesischen Marine beginnen."
VIN_imitate_foreign_doctrines:0 "Imitieren Sie ausländische Lehren"
VIN_imitate_foreign_doctrines_desc:0 "Von anderen Ländern zu lernen wird uns stärker machen."
VIN_imitate_foreign_doctrines2:0 "Imitieren Sie ausländische Lehren"
VIN_imitate_foreign_doctrines2_desc:0 "Von anderen Ländern zu lernen wird uns stärker machen."
VIN_destroyer_designs:0 "Zerstörer-Designs"
VIN_destroyer_designs_desc:0 "Wir werden unser Bestes tun, um neue Zerstörer zu konstruieren, die mit der japanischen und europäischen Technologie konkurrieren können."
VIN_cruiser_designs:0 "Cruiser-Designs"
VIN_cruiser_designs_desc:0 "Wir werden unser Bestes tun, um neue Kreuzer zu konstruieren, die mit der japanischen und europäischen Technologie konkurrieren können."
VIN_battle_ship_designs:0 "Schlachtschiff-Designs"
VIN_battle_ship_designs_decs:0 "Wir werden unser Bestes tun, um neue Schlachtschiffe zu konstruieren, die mit der japanischen und europäischen Technologie konkurrieren können."
VIN_submarine_designs:0 "U-Boot-Designs"
VIN_submarine_designs_desc:0 "Wir werden unser Bestes tun, um neue U-Boote zu konstruieren, die mit der japanischen und europäischen Technologie konkurrieren können."
VIN_the_airforce_of_indochina:0 "Die Luftwaffe von Indochina"
VIN_the_airforce_of_indochina_desc:0 "Die Bedeutung einer Luftwaffe zu leugnen, ist völliger Unsinn. Wir müssen jetzt mit dem Aufbau der indochinesischen Marine beginnen."
VIN_fighter_designs:0 "Kämpferdesigns"
VIN_fighter_designs_desc:0 "Wir werden unser Bestes tun, um neue Kampfflugzeuge zu entwickeln, die mit der japanischen und europäischen Technologie konkurrieren können."
VIN_light_bomber_designs:0 "Leichte Bomber-Designs"
VIN_light_bomber_designs_desc:0 "Wir werden unser Bestes tun, um neue leichte Bomber zu entwickeln, die mit der japanischen und europäischen Technologie konkurrieren können."
VIN_tactical_bomber_designs:0 "Taktische Bomber-Designs"
VIN_tactical_bomber_designs_desc:0 "Wir werden unser Bestes tun, um neue taktische Bomber zu entwickeln, die mit der japanischen und europäischen Technologie konkurrieren können."
VIN_strategic_bomber_designs:0 "Strategische Bomberentwürfe"
VIN_strategic_bomber_designs_desc:0 "Wir werden unser Bestes tun, um neue strategische Bomber zu entwickeln, die mit der japanischen und europäischen Technologie konkurrieren können."
VIN_investigation_against_the_clock:0 "Gegen die Uhr"
VIN_investigation_against_the_clock_desc:0 "Wenn wir weiterhin eine unabhängige Nation bleiben wollen, dürfen die indochinesischen Technologien nicht hinter denen des Westens und Japans zurückfallen."
VIN_guerrilla_warfare:0 "Guerillakrieg"
VIN_guerrilla_warfare_desc:0 "Aufgrund unseres hügeligen und dschungelartigen Geländes wird konventionelle Kriegsführung nie so nützlich sein wie der Einsatz von Guerillas."
VIN_modernize_the_army:0 "Modernisierung der Armee"
VIN_modernize_the_army_desc:0 "Wir sollten unsere Armee modernisieren, wenn wir nicht hinter den anderen Nationen zurückfallen wollen."
VIN_every_weapon_works:0 "Jede Waffe funktioniert"
VIN_every_weapon_works_desc:0 "Egal ob Maschinenpistole, Repetiergewehr, Pistole oder Muskete, solange der Feind uns nicht orten kann, werden wir siegen."
VIN_mortal_traps:0 "Tödliche Fallen"
VIN_mortal_traps_desc:0 "Wir wären nicht in der Lage, im offenen Kampf gegen einen größeren Feind anzutreten. Wenn jedoch bei jedem Schritt, den sie machen, ein Punji-Stock, eine Patronenfalle oder eine Tigerfalle auf sie wartet, werden sie uns niemals besiegen können."
VIN_hidden_tunnels:0 "Versteckte Tunnel"
VIN_hidden_tunnels_desc:0 "Tunnel wurden von Viet Minh-Soldaten als Verstecke im Kampf genutzt und dienten zahlreichen vietnamesischen Kämpfern als Kommunikations- und Versorgungswege, Krankenhäuser, Lebensmittel- und Waffenlager sowie als Unterkunft. Die Tunnelsysteme waren für die Viet Minh von großer Bedeutung, daher sollten wir ihre Nutzung durch unser Militär verstärken."
VIN_indestructible_trails:0 "Unzerstörbare Pfade"
VIN_indestructible_trails_desc:0 "Es ist unmöglich, alle Wege zu bombardieren, aber es ist unmöglich, unsere Kommunikations- und Versorgungslinien zu unterbrechen, wenn jedes Mal, wenn ein Weg zerstört wird, ein neuer entdeckt und ein neuer Tunnel gegraben wird."
VIN_jungle_fighter:0 "Dschungelkämpfer"
VIN_jungle_fighter_desc:0 "Unsere Truppen haben sich daran gewöhnt, im Dschungel zu kämpfen, was sie zu den besten Kämpfern für diese Art von Bedingungen macht."
VIN_form_the_mountaineer_corps:0 "Bilden Sie das Gebirgsjägerkorps"
VIN_form_the_mountaineer_corps_desc:0 "Vietnam besteht nicht nur aus Dschungel, deshalb müssen wir unsere Soldaten so ausbilden, dass sie auch in der Lage sind, Hügel einzunehmen und zu verteidigen."
VIN_weapon_investigation:0 "Waffenuntersuchung"
VIN_weapon_investigation_desc:0 "Wir werden unsere Feinde nicht mit lächerlichen Waffen besiegen können. Wenn wir unsere Nation verteidigen wollen, müssen wir uns jetzt anständige Waffen anschaffen."
VIN_acquire_artillery_designs:0 "Erwerben Sie Artillerieentwürfe"
VIN_acquire_artillery_designs_desc:0 "Jedes indochinesische Unternehmen sollte in der Lage sein, aus weit entfernten Stellungen Bomben auf unsere Feinde abzufeuern."
VIN_improve_our_strategies:0 "Verbessern Sie unsere Strategien"
VIN_improve_our_strategies_desc:0 "Wir können unser Heimatland nicht weiter verteidigen, wenn unsere Truppen nur unter einem Laubhaufen kämpfen können. Die Reform unserer Doktrin sollte Priorität haben."
VIN_knowing_our_terrain:0 "Unser Terrain kennen"
VIN_knowing_our_terrain_desc:0 "Die Kenntnis unseres Terrains ist ein großer Vorteil, den unsere Feinde nie haben werden. Jedes Mal, wenn sie auf einen Stock treten, werden wir es bemerken, jedes Mal, wenn sie vor Kummer schreien, werden wir es hören, jedes Mal, wenn sie einen unserer Landsleute töten, werden wir es wissen."
HUN_claim_silesia:0 "Schlesien zurückerobern"
HUN_claim_silesia_desc:0 "Der Vertrag von Hubertusburg wurde 1763 von Preußen, Österreich und Sachsen unterzeichnet, um den Dritten Schlesischen Krieg zu beenden. Darin wurden wir gezwungen, auf alle Ansprüche auf die Region Schlesien zu verzichten. Da jedoch weder das österreichische Kaiserreich noch Preußen mehr existieren, haben wir keinen Grund, weiterhin an diesen Vertrag gebunden zu sein."
HUN_reorganize_the_state:0 "Den Staat neu organisieren"
HUN_reorganize_the_state_desc:0 "Nachdem wir nun die Kontrolle über unsere alten Gebiete zurückerlangt haben, sollten wir nach einer Möglichkeit suchen, einen weiteren Zusammenbruch unseres Reiches in der Zukunft zu verhindern."
HUN_fulfilling_franzs_dream:0 "Die Erfüllung von Franz‘ Traum"
HUN_fulfilling_franzs_dream_desc:0 "Franz Ferdinand, möge er in Frieden ruhen, plädierte dafür, den ethnischen Gruppen innerhalb des Reiches mehr Autonomie zu gewähren und ihre Anliegen durch die Schaffung eines föderalen Staates nach dem Vorbild der USA, der Vereinigten Staaten von Großösterreich, zu berücksichtigen. Wir werden seinen Traum erfüllen, indem wir diese Reform umsetzen und den Donaubund ins Leben rufen."
HUN_fulfilling_karls_dream:0 "Karls Traum erfüllen"
HUN_fulfilling_karls_dream_desc:0 "Karl I., der Vater Ottos von Habsburgs, beschloss 1918 drastische Reformen. Das Reich wurde zu einem föderalen Staatenbund, dessen Mitglieder volle politische, wirtschaftliche und militärische Autonomie behielten und nur das Staatsoberhaupt teilten. Nach dem Frieden mit der Entente wurden all diese Reformen jedoch wieder aufgehoben. Nun steht Karls Wunsch jedoch nicht mehr im Wege."
HUN_the_second_ausleich:0 "Der zweite Ausgleich"
HUN_the_second_ausleich_desc:0 "Wir brauchen keine Reformen, um die Stabilität unseres Königreichs zu sichern. Was wir wirklich brauchen, ist, die Menschen dazu zu zwingen, uns nicht im Weg zu stehen."
HUN_the_blessed_empire:0 "Das gesegnete Reich"
HUN_the_blessed_empire_desc:0 "Das Heilige Römische Reich muss aus der Asche wiedergeboren werden, um Europa wieder Stabilität zu bringen …"
HUN_the_great_land_reform:0 "Die große Landreform"
HUN_the_great_land_reform_desc:0 "Um die Gleichberechtigung der Menschen in unserer neuen Föderation zu fördern, müssen wir dafür sorgen, dass jeder, unabhängig von seiner ethnischen Zugehörigkeit, Land besitzen oder von einem Grundbesitzer kaufen kann."
HUN_anti_discrimination_laws:0 "Antidiskriminierungsgesetze"
HUN_anti_discrimination_laws_desc:0 "Alle Donauvölker sollen die gleichen Rechte haben und gleich behandelt werden, unabhängig von ihrer ethnischen Zugehörigkeit, Nationalität oder Muttersprache."
HUN_the_guardian_of_the_danube:0 "Der Wächter der Donau"
HUN_the_guardian_of_the_danube_desc:0 "Nachdem wir unserer Föderation Stabilität gebracht haben, ist es an der Zeit, dem Rest des Balkans Frieden zu bringen."
HUN_expand_the_union:0 "Erweitern Sie die Union"
HUN_expand_the_union_desc:0 "Wenn wir Albanien, Bulgarien und Rumänien davon überzeugen, unserer Union beizutreten, können wir die Zahl potenzieller Feinde in der Region verringern. Wir werden versuchen, sie zum Beitritt zu bewegen, indem wir ihnen Gebiete versprechen, die uns oder unseren Untertanen gehören."
HUN_the_danube_economic_union:0 "Die Donau-Wirtschaftsunion"
HUN_the_danube_economic_union_desc:0 "Wir werden mit der Schaffung der Donau-Wirtschaftsunion beginnen. Dieser neue Markt soll den freien Verkehr von Waren, Kapital, Dienstleistungen und Arbeitskräften, bekannt als die „Vier Freiheiten“, gewährleisten. Wir werden außerdem eine Währungsunion schaffen, um die Donaumark zur einzigen gültigen Währung in der Union zu machen."
HUN_multinational_army:0 "Multinationale Armee"
HUN_multinational_army_desc:0 "Wir werden die Rekrutierung unter den Gewerkschaftsmitgliedern ausweiten, damit wir alle unsere Grenzen vor ausländischen Bedrohungen verteidigen können."
HUN_anti_riot_training:0 "Anti-Aufruhr-Training"
HUN_anti_riot_training_desc:0 "Die Schaffung einer paramilitärischen Polizei ist für die Gewährleistung der Stabilität des Imperiums von entscheidender Bedeutung."
HUN_geheime_staatpolizei:0 "Geheime Staatspolizei"
HUN_geheime_staatpolizei_desc:0 "Die Geheime Staatspolizei wurde im September 1786 im Zuge einer umfassenden Reorganisation der österreichischen Polizei unter der Führung von Johann Anton von Pergen gegründet. Ihre Aufgabe war die Spionageabwehr im Inland sowie die Überwachung politischer Umstürzler und der öffentlichen Meinung. Nun ist es an der Zeit, sie neu zu gründen."
HUN_the_kingdom_of_spionage:0 "Das Königreich der Spionage"
HUN_the_kingdom_of_spionage_desc:0 "Die vielen verschiedenen Ethnien in unserem Land sind ein großes Problem. Wenn wir das Glas jedoch als halb voll betrachten, kann die Vielzahl der verschiedenen Sprachen innerhalb unserer Grenzen Spionage und subversiven Aktivitäten nützen …"
HUN_recover_the_south:0 "Den Süden zurückgewinnen"
HUN_recover_the_south_desc:0 "Der Kirchenstaat und die italienischen Nationen müssen sich wieder unserem heiligen Reich anschließen."
HUN_recover_the_west:0 "Den Westen zurückgewinnen"
HUN_recover_the_west_desc:0 "Die Ostfranzosen müssen sich wieder unserem heiligen Reich anschließen."
HUN_recover_the_north:0 "Den Norden zurückgewinnen"
HUN_recover_the_north_desc:0 "Der einzige Schritt zur Wiedervereinigung unseres Reiches besteht nun darin, die Kontrolle über die Benelux-Länder zurückzuerlangen."
HUN_the_bratislava_treaty:0 "Der Vertrag von Bratislava"
HUN_the_bratislava_treaty_desc:0 "Land träumt nicht, Minen weinen nicht, Festungen atmen nicht. Doch alle Ungarn im Süden der Slowakei tun es. Wenn wir sie retten wollen, müssen wir die Tschechen davon überzeugen, uns die Region zurückzugeben. \n§GInformiert der Besitzer der Südslowakei, erhalten wir die Kontrolle über den Staat, aber er behält die Kontrolle über seine Ressourcen.§!"
HUN_the_vojvodina_accord:0 "Das Vojvodina-Abkommen"
HUN_the_vojvodina_accord_desc:0 "Für die Jugoslawen wäre es sicherlich demütigend, Territorium an eine andere Nation abzutreten, aber sie müssen verstehen, dass sie die Slawen Österreich-Ungarns befreien wollten und wir die Ungarn unter ihrer Regierung befreien müssen. \n§GWenn der Besitzer der Vojvodina zustimmt, erhalten wir die Kontrolle über den Staat und er bekommt im Gegenzug zwei zivile Fabriken.§!"
HUN_the_szeklerland_deal:0 "Der Szeklerland-Deal"
HUN_the_szeklerland_deal_desc:0 "Wir werden dem Eigentümer Siebenbürgens vorschlagen, im Szeklerland einen halbunabhängigen Staat unter unserer Herrschaft zu gründen. Wenn er diesen Vorschlag annimmt, werden wir endlich alle ungarischen Völker zu einer Nation wiedervereint haben."
HUN_danubian_peoples_republic:0 "Donauvolksrepublik"
HUN_danubian_peoples_republic_desc:0 "Wir werden versuchen, es den Sowjets gleichzutun, die in ihrem alten Reich eine Union vieler verschiedener Ethnien schufen. Die Integration dieser Staaten wird jedoch sicherlich schwierig sein."
HUN_reclaim_the_vojvodina:0 "Die Vojvodina zurückerobern"
HUN_reclaim_the_vojvodina_desc:0 "Wir müssen die vom jugoslawischen Königreich versklavten ungarischen Arbeiter befreien, sei es mit Vernunft oder mit Gewalt!"
HUN_recover_our_shores:0 "Unsere Küsten zurückgewinnen"
HUN_recover_our_shores_desc:0 "Normalerweise wäre es unmöglich, dass die Jugoslawen uns unseren Zugang zum Meer zurückgeben würden, doch jetzt, da Italien und Bulgarien versuchen, ihre Nation aufzulösen, wären sie vielleicht bereit, uns unsere alten Gebiete im Austausch für eine sowjetische Garantie zu schenken."
#HUN_avenge_our_pride:0 "Avenge our Pride"
#HUN_avenge_our_pride_desc:0 "Due to the treaty of Trianon, arouond 2/3rds of our territory was stolen by the Entente, along with our coastline and naval forces, to hand it over to the new abusers of the Balkans, Czechoslovakia, Romania and Yugoslavia. It is time to avenge all the Hungarians who lost their homeland, and avenge our pride."
HUN_end_the_german_madness:0 "Beendet den deutschen Wahnsinn"
HUN_end_the_german_madness_desc:0 "Die Deutschen zwingen uns mittlerweile, ihrer makabren Rassentheorie zu folgen und setzen Ministerpräsidenten ab, sobald sie ihnen nicht mehr nützlich sind. Wir werden diesem Wahnsinn jetzt ein Ende setzen."
HUN_the_only_path_to_greatness:0 "Der einzige Weg zur Größe"
HUN_the_only_path_to_greatness_desc:0 "Wir werden nicht zulassen, dass die Juden unsere Nation so erstechen, wie sie es im Ersten Weltkrieg mit Ungarn getan haben. Alle Ungarn müssen sich uns in unserem Kampf gegen den größten Dämon anschließen!"
HUN_reconciliate_with_bucharest:0 "Versöhnung mit Bukarest"
HUN_reconciliate_with_bucharest_desc:0 "Jetzt, da Michael I. von Ungarn und Rumänien König unserer Nation geworden ist, wäre es dumm, nicht zu versuchen, sich mit Bukarest zu versöhnen."
HUN_the_magyar_romanian_union:0 "Die Magyarisch-Rumänische Union"
HUN_the_magyar_romanian_union_desc:0 "Die 1919 nach dem Ersten Weltkrieg ins Leben gerufene Ungarisch-Rumänische Union sollte beide Nationen vereinen, um die Bedrohung durch den ungarischen Irredentismus zu beenden, eine bessere Behandlung der ungarischen Minderheit in Siebenbürgen zu gewährleisten und den Einfluss Rumäniens in Westeuropa auszuweiten. Mit der Thronbesteigung von Mihail ist es nun an der Zeit, diesen Plan in die Tat umzusetzen."
HUN_integrate_romania:0 "Rumänien integrieren"
HUN_integrate_romania_desc:0 "Nachdem Ungarn und Rumänien nun vereint sind, ist es an der Zeit, die rumänische Verwaltung in die Union zu integrieren."
HUN_hunedoara_steel_works:0 "Stahlwerk Hunedoara"
HUN_hunedoara_steel_works_desc:0 "Um den Bedarf unserer Waffenproduktion zu decken, müssen die großen Stahlwerke in Siebenbürgen modernisiert und drastisch erweitert werden."
HUN_expand_ploiesti_oil_production:0 "Erweitern Sie die Ölproduktion in Ploiesti"
HUN_expand_ploiesti_oil_production_desc:0 "Wir besitzen in Ploiesti einige der größten Ölfelder Europas, die nicht nur für uns, sondern auch für unsere Verbündeten und andere Nationen in der Region von enormer Bedeutung sind. Wir sollten die Produktion dieser Felder steigern, um den Bedarf besser decken zu können."
HUN_agrarian_reform:0 "Agrarreform"
HUN_agrarian_reform_desc:0 "Unser Agrarsektor bietet noch viel Raum für Verbesserungen. Durch die Rationalisierung und Verbesserung seiner Effizienz werden Arbeitskräfte frei, die in anderen Sektoren wie dem Baugewerbe und der Rüstungsproduktion eingesetzt werden können."
HUN_exploit_the_baita_mines:0 "Beute die Baita-Minen aus"
HUN_exploit_the_baita_mines_desc:0 "Es wird allmählich klar, dass Uran für einige der drastischsten technologischen Fortschritte im Waffenbau seit Erfindung der Feuerwaffe von entscheidender Bedeutung ist. Wir haben das Glück, innerhalb unserer Grenzen über große Uranvorkommen zu verfügen, und wir sollten eine Mine zu deren Ausbeutung errichten."
HUN_claim_the_hungarian_diaspora:0 "Beanspruchen Sie die ungarische Diaspora"
HUN_claim_the_hungarian_diaspora_desc:0 "Mihail I. ist der König aller Ungarn und Rumänen, doch viele Ungarn leben derzeit außerhalb Ungarns, vor allem in der Slowakei und in Jugoslawien. Wir sollten uns dafür einsetzen, diese Menschen wieder in ihre alte Heimat zu bringen."
UKR_our_last_opportunity:0 "Unsere letzte Chance"
UKR_our_last_opportunity_desc:0 "Da die Sowjetunion instabiler ist als je zuvor, ist es an der Zeit, erneut für unsere Unabhängigkeit zu kämpfen."
UKR_kill_the_hetman:0 "Töte den Hetman"
UKR_kill_the_hetman_desc:0 "Pawlo Skoropadskyj ist ein opportunistischer Bürger, eine Marionette der Deutschen und ein Despot. Wenn wir unser Volk befreien wollen, muss er gehen."
UKR_reinstall_the_rada:0 "Installieren Sie die Rada neu"
UKR_reinstall_the_rada_desc:0 "Das Volk sollte das Recht haben, seine eigene Führung zu wählen. Um diesen Traum zu verwirklichen, werden wir die Rada wieder einsetzen."
UKR_avenge_the_fallen:0 "Räche die Gefallenen"
UKR_avenge_the_fallen_desc:0 "Die 3,5 Millionen Ukrainer, die während des Holodomor von Russland und dem Kommunismus ermordet wurden, werden gerächt werden, koste es, was es wolle …"
UKR_not_more_revolutions:0 "Keine weiteren Revolutionen"
UKR_not_more_revolutions_desc:0 "Anarchisten und Kommunisten sind nichts weiter als ein Haufen Terroristen. Wir müssen sie ausmerzen, um ein stabiles Land zu haben."
UKR_anarkhiya_mama:0 "Anarkhiya Mama"
UKR_anarkhiya_mama_desc:0 "Die Pferde legen im schnellen Trab kilometerweit zurück; für uns ist die Freiheit kostbar; durch den Schlitz des Maschinengewehrs suche ich im Staub nach dem Feind ..."
UKR_loves_her_sons:0 "Liebt ihre Söhne"
UKR_loves_her_sons_desc:0 "Mutter Anarchie liebt ihre Söhne; Mutter Anarchie wird nicht verraten; sie wird den Feind mit bleiernem Regen streicheln; Mutter Anarchie ist für uns!"
UKR_the_second_republic:0 "Die Zweite Republik"
UKR_the_second_republic_desc:0 "Die Volksrepublik wurde von Pawlo Skoropadskyi abgeschafft, aber jetzt, da er in seinem Grab verrottet, wird die Volksrepublik unbesiegbar sein!"
UKR_there_was_no_famine_in_kiev:0 "In Kiew gab es keine Hungersnot"
UKR_there_was_no_famine_in_kiev_desc:0 "Wenn die Menschen erkennen, dass der Holodomor teilweise durch die Kollektivierung verursacht wurde, werden sie den Anarchismus verachten. Deshalb gab es in Kiew keine Hungersnot."
UKR_expand_the_black_army:0 "Erweitern Sie die Schwarze Armee"
UKR_expand_the_black_army_desc:0 "Um die Slawen von ihren Sklavenhaltern zu befreien, müssen wir die schwarze Armee erweitern."
UKR_prepare_for_the_worst:0 "Bereiten Sie sich auf das Schlimmste vor"
UKR_prepare_for_the_worst_desc:0 "Wenn wir nicht mehr Milizen ausbilden, werden die Russen uns angreifen, sobald sie dazu bereit sind. Wir müssen uns auf das Schlimmste vorbereiten."
UKR_insurrectionary_army_of_russia:0 "Aufständische Armee Russlands"
UKR_insurrectionary_army_of_russia_desc:0 "Russland ist ein riesiges Land, aber wenn wir Kontakte knüpfen und mit den dort lebenden Anarchisten Geschäfte machen, können wir sie leicht halten …"
UKR_modern_prometheus:0 "Moderner Prometheus"
UKR_modern_prometheus_desc:0 "So wie Prometheus den Menschen das Feuer schenkte, werden wir allen Überresten des russischen Reiches das Feuer schenken."
UKR_free_the_slaves:0 "Befreit die Sklaven"
UKR_free_the_slaves_desc:0 "Wir werden alle Sklaven Osteuropas befreien, koste es, was es wolle."
UKR_free_territory_of_russia:0 "Freies Territorium Russlands"
UKR_free_territory_of_russia_desc:0 "Die Völker Russlands und der Ukraine müssen gegen die Feinde der Slawen vereint bleiben!"
UKR_liberate_them_all:0 "Befreie sie alle"
UKR_liberate_them_all_desc:0 "Alle Slawen sollen von nun an frei sein! Für Mutter Anarchie!"
UKR_a_socialist_republic:0 "Eine sozialistische Republik"
UKR_a_socialist_republic_desc:0 "Nach dem Holodomor muss die Ukraine nicht mehr nach dem Vorbild der berüchtigten Sowjetunion regiert werden. Wir werden unseren eigenen Weg gehen und die Sozialistische Republik ausrufen."
UKR_a_soviet_republic:0 "Eine Sowjetrepublik"
UKR_a_soviet_republic_desc:0 "Der Holodomor war nicht auf den Kommunismus oder die Sowjets zurückzuführen, sondern allein auf Stalins Despotie. Wir werden aus seinen Fehlern lernen."
UKR_compensate_our_people:0 "Unsere Mitarbeiter entschädigen"
UKR_compensate_our_people_desc:0 "Es ist ganz natürlich, dass die Menschen den Kommunismus nach dem Holodomor hassen. Wir werden unser Volk dafür entschädigen und dafür sorgen, dass so etwas nie wieder passiert."
UKR_remember_the_reason:0 "Erinnere dich an den Grund"
UKR_remember_the_reason_desc:0 "Wir werden den Grund für den Holodomor nie vergessen: Josef Stalin. Wenn wir ein solches Ereignis noch einmal verhindern wollen, dürfen wir nie wieder zulassen, dass die Russen die Macht über uns übernehmen."
UKR_female_snipers:0 "Scharfschützinnen"
UKR_female_snipers_desc:0 "Gute Scharfschützen sind geduldig, vorsichtig, überlegt und sollten taktischen Nahkampf vermeiden. Frauen verfügen über all diese Fähigkeiten, daher sind Scharfschützenaufgaben für Frauen sicherlich gut geeignet."
UKR_not_another_1921:0 "Nicht noch ein 1921"
UKR_not_another_1921_desc:0 "Wir werden nicht zulassen, dass die Russen uns erneut in ihre grausame Union integrieren. Jeder Ukrainer muss kämpfen, um sein Heimatland zu verteidigen, wenn sie es wagen, uns erneut anzugreifen."
UKR_ukrainianization:0 "Ukrainisierung"
UKR_ukrainianization_desc:0 "Genau wie die Russen es mit uns gemacht haben, werden wir ihre Sprache und Zeitungen verbieten, um sie zu assimilieren. Dann müssen wir nur noch die alten Gebiete der Volksrepublik zurückgewinnen."
UKR_a_better_union:0 "Eine bessere Union"
UKR_a_better_union_desc:0 "Wir müssen die Sowjetunion mit Gewalt reformieren, damit sie wieder zu dem wird, was sie gewesen wäre, wenn Stalin nicht die Macht übernommen hätte."
UKR_fifth_international:0 "Fünfte Internationale"
UKR_fifth_international_desc:0 "Wir werden die Fünfte Internationale gründen, einen Zusammenschluss aller kommunistischen Nationen, die sich der Sowjetunion widersetzen. Wir können nicht zulassen, dass sich irgendjemand mit diesen Schlächtern verbündet."
UKR_purge_the_black_army:0 "Säubert die Schwarze Armee"
UKR_purge_the_black_army_desc:0 "Die Anarchisten sind nichts weiter als ein Haufen Agitatoren. Wenn wir die Kontrolle über unsere Gewerkschaft sichern wollen, müssen wir sie alle ausmerzen."
UKR_four_year_plan:0 "Vierjahresplan"
UKR_four_year_plan_desc:0 "Indem wir die Wirtschaftspläne der Sowjetunion nachahmen, werden wir dafür sorgen, dass wir in kürzester Zeit die Industrialisierung erreichen."
UKR_prepare_for_the_inevitable:0 "Bereiten Sie sich auf das Unvermeidliche vor"
UKR_prepare_for_the_inevitable_desc:0 "Die Deutschen und Russen werden uns irgendwann angreifen, um uns entweder zu annektieren oder unser Regime zu stürzen. Wir müssen auf diesen unvermeidlichen Konflikt vorbereitet sein."
UKR_destroy_their_armor:0 "Zerstöre ihre Rüstung"
UKR_destroy_their_armor_desc:0 "Wenn wir die Sowjets besiegen wollen, müssen wir in der Lage sein, ihre Panzerdivisionen zu durchbrechen. Dann werden sie uns gegenüber keinen Vorteil haben."
UKR_preventive_strike:0 "Präventivschlag"
UKR_preventive_strike_desc:0 "Jetzt, da die Sowjetunion geschwächt ist, ist es an der Zeit, sie anzugreifen und den Kopf Stalins auf den Schreibtisch unseres Vorsitzenden zu bringen."
UKR_erase_the_illegitimate:0 "Löschen Sie das Unrechtmäßige"
UKR_erase_the_illegitimate_desc:0 "Wir müssen die illegitime Regierung Moskaus zerstören, um eine neue Sowjetunion zu schaffen, ohne Totalitarismus oder Geheimpolizei, die das Volk tötet."
UKR_the_beacon_of_the_east:0 "Das Leuchtfeuer des Ostens"
UKR_the_beacon_of_the_east_desc:0 "Nachdem viele Nationen in Osteuropa in die Hände von Despotismus, Faschismus und Kommunismus gefallen sind, sollten wir zu einem Leuchtfeuer der Hoffnung für all jene werden, die versuchen, ihrem Albtraum zu entfliehen."
UKR_under_the_hetmans_guidance:0 "Unter der Führung des Hetman"
UKR_under_the_hetmans_guidance_desc:0 "Nach den ersten Wahlen hat Pawlo Skoropadskyj begonnen, unsere Regierung zu kritisieren und zu befürchten, dass wir wie zuvor der Kommunistischen Partei zum Opfer fallen werden. Aufgrund seiner Popularität nach dem Unabhängigkeitskrieg unterstützen viele ukrainische Milizen ihn und nicht unsere Regierung. Um eine weitere Katastrophe zu verhindern, werden wir ihm einen Sitz in der Duma geben und hoffen, dass er keine Dummheiten begeht."
UKR_never_forget:0 "Niemals vergessen"
UKR_never_forget_desc:0 "Wir werden den Kommunisten und Stalin nie verzeihen, dass sie so viele Ukrainer getötet haben. Aber wir werden auch aus dieser Hungersnot lernen, damit wir in Zukunft eine weitere vermeiden können."
UKR_to_defend_our_families:0 "Verteidigt unsere Familien"
UKR_to_defend_our_families_desc:0 "Wir müssen unsere Familien vor den Faschisten des Westens und den Kommunisten des Ostens verteidigen und uns für die Zukunft unseres Heimatlandes engagieren!"
UKR_seek_protection_from_the_entente:0 "Suchen Sie den Schutz der Entente"
UKR_seek_protection_from_the_entente_desc:0 "Trotz unserer Bemühungen verzichtete die Entente 1917 und 1918 auf jegliche Zusammenarbeit mit unseren Nationen und verweigerte uns die Hilfe im Kampf gegen die Sowjets. Doch nun, da ein neuer Weltkrieg droht, sind die Alliierten gerne bereit, weitere Mitglieder in ihre Fraktion aufzunehmen."
UKR_a_deal_with_the_devil:0 "Ein Pakt mit dem Teufel"
UKR_a_deal_with_the_devil_desc:0 "Die Deutschen gewährten uns unsere Unabhängigkeit und überließen unser Land der erneuten Annexion durch die Russen, natürlich nicht ohne es zuvor auszubeuten und stark einzuschränken. Doch nun ist der alte Teufel der Einzige, der uns wieder vor Russland verteidigen kann und will."
UKR_oil_extraction_company:0 "Ölförderunternehmen"
UKR_oil_extraction_company_desc:0 "Mit der Aussicht auf mögliche Ölfelder auf unserem Territorium haben wir die Aufmerksamkeit des Auslands auf uns gezogen. Befreundete Mächte sind bestrebt, unsere Ölindustrie mit ihrem technischen Know-how zu unterstützen, und dies wäre eine lukrative Gelegenheit, von ihren Fortschritten zu lernen."
UKR_feed_the_demon:0 "Füttere den Dämon"
UKR_feed_the_demon_desc:0 "Indem wir den deutschen Teufel füttern, stellen wir sicher, dass eine Hungersnot sie nicht noch einmal aufhält, und können im Gegenzug auch etwas verlangen, wie zum Beispiel Hilfe bei der schnellen Industrialisierung unseres Landes."
UKR_pact_of_national_defense_f:0 "Pakt der Nationalen Verteidigung"
UKR_pact_of_national_defense_f_desc:0 "Wir werden ein Verteidigungsbündnis zwischen den Nationen Osteuropas anstreben und versuchen, diejenigen zu schützen, die zu schwach sind, um dies allein zu tun."
UKR_the_bessarabia_accord:0 "Das Bessarabien-Abkommen"
UKR_the_bessarabia_accord_desc:0 "Wir erheben keine Ansprüche auf das von Rumänen bewohnte Bessarabien, daher wäre es eine gute Idee, das Gebiet im Austausch gegen etwas Nützliches an Rumänien zurückzugeben. \n§GInformiert Rumänien dies, erhalten wir im Falle eines Krieges einen Waffenstillstand und einen Nichtangriffspakt zwischen unseren Nationen.§!"
UKR_appease_the_crimeans:0 "Beschwichtigung der Krimbewohner"
UKR_appease_the_crimeans_desc:0 "Wir können verstehen, dass die russischen Krimbewohner nicht für ein Land sterben wollen, das ihnen nicht gehört, aber wir brauchen die Kontrolle über die Insel. Deshalb werden wir ein Gesetz erlassen, das es den russischen Krimbewohnern ermöglicht, sich dem Militärdienst zu entziehen, wenn sie dies wünschen."
UKR_light_division_training:0 "Ausbildung der Leichten Division"
UKR_light_division_training_desc:0 "Die Verteidigung unserer weiten Grenzen vor allen unseren potenziellen Feinden ist nahezu undenkbar. Leichte und mobile Divisionen zur Einkreisung der feindlichen Armeen werden uns jedoch sicherlich helfen."
UKR_university_building:0 "Universitätsgebäude"
UKR_university_building_desc:0 "Mit all den Flüchtlingen, die vor Faschismus und Kommunismus in unser Land geflohen sind, werden wir in der Lage sein, viele neue Intellektuelle einzustellen."
UKR_appease_the_greatest_demon:0 "Besänftige den größten Dämon"
UKR_appease_the_greatest_demon_desc:0 "Wir können uns nicht auf die Bekämpfung des Faschismus konzentrieren, wenn die Russen versuchen, unsere Existenz wieder zu beenden. Wir werden versuchen, ein Abkommen mit Moskau zu schließen, um den Frieden zwischen unseren Nationen zu sichern. \n§RInformiert Russland, erhalten wir eine russische Garantie und einen Nichtangriffspakt, überlassen ihnen aber die Kontrolle über die Krim, Woroschilowgrad und Stalino.§!"
UKR_avenge_the_fallen_in_the_holodomor:0 "Räche die Gefallenen im Holodomor"
UKR_avenge_the_fallen_in_the_holodomor_desc:0 "Die heutige russische Nation hat nach all den Verbrechen, die sie begangen hat, keine Existenzberechtigung. Wir werden die 3,5 Millionen Menschen rächen, die 1933 getötet wurden!"
UKR_protect_the_slavs_from_fascism:0 "Beschütze die Slawen vor dem Faschismus"
UKR_protect_the_slavs_from_fascism_desc:0 "In einer Welt, in der die Ideologie einiger Nationen besagt, dass alle Slawen Untermenschen sind, müssen wir uns und unsere Brüder schützen, damit sie ihren Traum von der Rassenüberlegenheit nicht wahr werden lassen."
UKR_not_more_red_famines:0 "Keine weiteren roten Hungersnöte"
UKR_not_more_red_famines_desc:0 "Kein Land wird aufgrund des Kommunismus eine Hungersnot erleben müssen, wie wir es mussten! Der Kommunismus wird ein für alle Mal zerstört!"
UKR_empower_the_gentelman:0 "Ermächtigen Sie den Gentleman"
UKR_empower_the_gentelman_desc:0 "Andrij Melnyk war für seine Ritterlichkeit in der österreichisch-ungarischen Armee im Ersten Weltkrieg und seine Treue zum Katholizismus bekannt. Nach dem Ende der ukrainischen Nation floh er nach Polen und wurde Mitglied der OUN, ebenso wie Jewgeni Konowalez und Stepan Bandera. Heute ist er bekannt für seine Unterstützung des Faschismus, seine Verachtung für den Nationalsozialismus und seinen relativen Moderatismus. Er ist der perfekte Herrscher für die neue Ukraine."
UKR_empower_the_rifleman:0 "Stärke den Schützen"
UKR_empower_the_rifleman_desc:0 "Jewgeni Konowalez war bekannt für seinen Kampf an der Seite Österreich-Ungarns im Ersten Weltkrieg, seine Beteiligung an der Gründung der ersten ukrainischen Republik und seine Mitgliedschaft bei den Sich-Schützen. Nach dem Ende der ukrainischen Nation gründete er die UVO und wurde später Vorsitzender der OUN. Heute ist er bekannt für seinen Einfluss unter den ukrainischen Emigranten und seinen bewaffneten Widerstand gegen die polnischen und sowjetischen Truppen in Galizien. Er ist der perfekte Herrscher für die neue Ukraine."
UKR_empower_the_partisan:0 "Stärke den Partisanen"
UKR_empower_the_partisan_desc:0 "Obwohl er weder im Ersten Weltkrieg noch für die ukrainische Unabhängigkeit kämpfte, wurde er in der UVO und der OUN für seinen bewaffneten Widerstand in Polen sowie für seine Radikalität und seine beharrliche Persönlichkeit bekannt. Er ist der perfekte Herrscher für die neue Ukraine."
UKR_collaborate_with_the_hetman:0 "Zusammenarbeit mit dem Hetman"
UKR_collaborate_with_the_hetman_desc:0 "Obwohl Pawlo Skoropadskyj den Faschismus scheinbar nicht unterstützt, hasst er den Kommunismus genauso sehr wie wir. Es wird leicht sein, ihn auf unsere Seite zu ziehen."
UKR_the_best_fuel:0 "Der beste Kraftstoff"
UKR_the_best_fuel_desc:0 "Flugzeuge, Panzer und Waffen sind nutzlos, wenn die Soldaten nicht den Willen zum Kampf haben. Wir werden unsere Kriegsunterstützung mit Hass gegen den Kommunismus und Russland für das befeuern, was sie uns 1933 angetan haben ..."
UKR_integrate_the_upa:0 "Integrieren Sie die UPA"
UKR_integrate_the_upa_desc:0 "Die UPA (Ukrainische Aufständische Armee) ist in Polen und der Sowjetunion als Terrororganisation bekannt, in der Ukraine jedoch sind sie die Helden, die jahrelang für unsere Unabhängigkeit gekämpft haben. Sie und ihre Fähigkeiten im Guerillakampf verdienen einen Platz in unserer Armee."
UKR_the_enemy_of_our_enemies:0 "Der Feind unserer Feinde"
UKR_the_enemy_of_our_enemies_desc:0 "Deutschland hat sich zum Feind Russlands und des Kommunismus erklärt. Ein Beitritt zu dieser Fraktion würde uns sicherlich helfen, unsere verlorenen Gebiete zurückzugewinnen."
UKR_knee_before_him:0 "Knie vor ihm nieder"
UKR_knee_before_him_desc:0 "Jetzt, da Deutschland unser Land beherrscht, können wir nichts anderes tun, als ihnen bei den Kriegsanstrengungen zu helfen …"
UKR_we_are_better_than_them:0 "Wir sind besser als sie"
UKR_we_are_better_than_them_desc:0 "Es wäre völlig dumm, mit denen zusammenzuarbeiten, die uns für Untermenschen halten. Wir müssen dem Nationalsozialismus jetzt ein Ende setzen."
UKR_take_the_blindfold_off:0 "Nehmen Sie die Augenbinde ab"
UKR_take_the_blindfold_off_desc:0 "Wir dachten, dass wir, wenn wir ihnen helfen, nicht Teil ihres Lebensraums werden würden, aber wir irrten uns. Vielleicht schließen wir uns den Feinden unseres neuen Feindes an, um die Slawen vor der größeren Bedrohung zu retten."
UKR_fuel_the_war_machine:0 "Treiben Sie die Kriegsmaschinerie an"
UKR_fuel_the_war_machine_desc:0 "Indem wir die deutsche Kriegsmaschinerie füttern, stellen wir sicher, dass sie nicht noch einmal durch eine Hungersnot aufgehalten wird. Und wir können im Gegenzug auch etwas verlangen, wie zum Beispiel Hilfe bei der schnellen Industrialisierung unseres Landes."
UKR_german_expeditionary_force:0 "Deutsches Expeditionskorps"
UKR_german_expeditionary_force_desc:0 "Die Deutschen haben uns angeboten, uns eine gepanzerte Expeditionstruppe zu schicken, um uns im Kampf gegen den Kommunismus zu unterstützen. Natürlich nehmen wir das Angebot an."
UKR_hit_them_hard:0 "Schlagen Sie sie hart"
UKR_hit_them_hard_desc:0 "Die Deutschen sind für ihren Einsatz von Panzer- und motorisierten Divisionen bekannt und deshalb werden wir dafür sorgen, dass sie gegen uns nutzlos werden."
UKR_buy_ships_to_the_west:0 "Ships to the West kaufen"
UKR_buy_ships_to_the_west_desc:0 "Derzeit ist unsere Marine zu klein, um die Achsenmächte im Schwarzen Meer besiegen zu können. Der Kauf einiger Schiffe im Westen könnte das Problem lösen."
UKR_an_eye_for_an_eye:0 "Auge um Auge"
UKR_an_eye_for_an_eye_desc:0 "Die Russen haben vor drei Jahren versucht, unsere Bevölkerung durch Hunger auszurotten. Wir werden es ihnen heimzahlen."
UKR_reunite_the_greater_ukraine:0 "Die Großukraine wiedervereinigen"
UKR_reunite_the_greater_ukraine_desc:0 "Wir werden die Gebiete zurückerobern, die uns die Sowjets nach der Invasion von 1921 gestohlen haben, koste es, was es wolle."
UKR_destroy_the_enemies_of_humanity:0 "Vernichte die Feinde der Menschheit"
UKR_destroy_the_enemies_of_humanity_desc:0 "Wir werden nicht zulassen, dass der Kommunismus und Russland irgendeine andere Nation in Europa zerstören."
UKR_reinstall_the_hetmanate:0 "Installieren Sie das Hetmanate neu"
UKR_reinstall_the_hetmanate_desc:0 "Das Hetmanat war eine antisozialistische Regierung unter Pawlo Skoropadskyj, die 1918 existierte. Es wurde von den deutschen Militärbehörden eingesetzt, nachdem der sozialistisch geprägte Zentralrat der Ukrainischen Volksrepublik am 28. April 1918 aufgelöst worden war. Angesichts der Ausbreitung des Kommunismus in Osteuropa ist es nun an der Zeit, das Hetmanat wieder einzusetzen."
UKR_install_the_kingdom:0 "Installieren Sie das Königreich"
UKR_install_the_kingdom_desc:0 "Die Ukraine wird niemals Frieden finden, wenn wir weiterhin unsere Brüder und Schwestern aufgrund ihrer Ideologie töten. Wir brauchen eine populäre Galionsfigur, die das ukrainische Volk liebt. Das könnte Wilhelm von Habsburg sein, auch bekannt als „Kniaz“ Vasyl. Als dem jungen Wilhelm gesagt wurde, die Ukrainer seien Banditen und ein Räuberstamm, reiste er los, um sie persönlich zu sehen. Da er keine Räuber fand, entwickelte er eine große Faszination für die ukrainische Kultur. Dies brachte ihm unter den Bauern den Spitznamen „Roter Prinz“ ein. Er ist der Kandidat für die Führung unseres Landes."
UKR_reaffirm_the_reason:0 "Geben Sie den Grund an"
UKR_reaffirm_the_reason_desc:0 "Russophobie wird uns nicht helfen, unsere Nation vor dem wahren Drahtzieher des Holodomor zu schützen: dem Kommunismus. Wenn es etwas oder jemanden gibt, der für den Tod von 3,5 Millionen Ukrainern verantwortlich ist, dann sind es der Bolschewismus und Stalin."
UKR_reaffirm_the_source:0 "Geben Sie die Quelle an"
UKR_reaffirm_the_source_desc:0 "Es ist dumm, die ukrainische Linke wegen der Taten der Russen im Jahr 1933 zu hassen. Wir dürfen nicht vergessen, dass die Sowjets und Stalin die Drahtzieher dieser Aktion waren. Und wir dürfen auch nicht den Fehler begehen, alle Russen für die Fehler ihrer Führer verantwortlich zu machen."
UKR_loyal_cossacks:0 "Loyale Kosaken"
UKR_loyal_cossacks_desc:0 "Um die Stabilität unseres Landes zu wahren, brauchen wir eine dem Hetman treue Kosakenarmee. Wir können keine OUN-Terroristen und Sitsch-Armeen dulden, die ihren Ideologien treu sind, anstatt dem Hetman Pawlo Skoropadskyj."
UKR_legacy_of_the_sich:0 "Erbe der Sich"
UKR_legacy_of_the_sich_desc:0 "Die Sich-Schützen waren eine der ersten regulären Militäreinheiten der Armee der Ukrainischen Volksrepublik. Die Einheit operierte von 1917 bis 1919 und wurde aus ukrainischen Soldaten der österreichisch-ungarischen Armee, der lokalen Bevölkerung und ehemaligen Kommandeuren der ukrainischen Sich-Schützen in Österreich-Ungarn gebildet. Wir werden das Korps reformieren, um das Sich-Erbe fortzuführen."
UKR_join_the_central_powers:0 "Schließen Sie sich den Mittelmächten an"
UKR_join_the_central_powers_desc:0 "Der Fall der Mittelmächte bedeutete den Fall unserer Nation gegen die sowjetischen Streitkräfte, aber jetzt, da sowohl sie als auch unsere Nation aus der Asche wiedergeboren wurden, müssen wir uns erneut gegen die Feinde der Ukraine vereinen!"
UKR_revive_the_empire:0 "Beleben Sie das Imperium wieder"
UKR_revive_the_empire_desc:0 "Wir brauchen Verbündete gegen die Feinde der Ukraine, und die alte Heimat von „Kniaz“ Vasyl an der Donau könnte uns dabei helfen."
UKR_a_talk_with_the_whites:0 "Ein Gespräch mit den Weißen"
UKR_a_talk_with_the_whites_desc:0 "Es gibt in Russland viele weißrussische Emigranten und stille Antikommunisten, die uns dabei helfen wollen, die derzeitige Regierung in Moskau zu säubern und sich unseren Armeen und unserer Luftwaffe anzuschließen, um deren Qualität zu verbessern."
UKR_a_talk_with_the_hetman:0 "Ein Gespräch mit dem Hetman"
UKR_a_talk_with_the_hetman_desc:0 "Trotz seiner Willkür und seiner Verbündeten in der Hetman-Ära von 1918 ist Pawlo Skoropadskyj durch seine Teilnahme am Unabhängigkeitskrieg zu einer einflussreichen Persönlichkeit in der Ukraine geworden. Wir könnten ihn jedoch beschwichtigen, indem wir einigen seiner Forderungen nachkommen, natürlich ohne ihm zu viel Macht in Armee und Regierung zu geben."
UKR_educate_the_peasants:0 "Bildet die Bauern aus"
UKR_educate_the_peasants_desc:0 "Die Bildung der Unterschicht der Ukraine ist von entscheidender Bedeutung, um das Wachstum von Faschismus und Kommunismus in unserem Land zu verhindern und die Qualität unserer Arbeitskräfte und das Wissen unserer Bürger zu verbessern."
UKR_help_the_peasants:0 "Helfen Sie den Bauern"
UKR_help_the_peasants_desc:0 "Nach all dem, was sie durchgemacht haben, verdienen unsere Bürger eine bessere Zukunft. Unser König wird dafür sorgen, dass wir ihnen helfen können, indem wir einen Wohlfahrtsstaat schaffen."
UKR_ukrainian_resettlement:0 "Ukrainische Umsiedlung"
UKR_ukrainian_resettlement_desc:0 "Wir müssen mit der Neubesiedlung der verlorenen Gebiete des ukrainischen Hetmanats beginnen, um die Gebiete zu integrieren, die uns von den Russen gestohlen wurden."
UKR_press_censorship:0 "Pressezensur"
UKR_press_censorship_desc:0 "Wir dürfen nicht zulassen, dass Kommunisten, Faschisten und Anarchisten die Köpfe der ukrainischen Jugend vergiften."
UKR_free_press:0 "Freie Presse"
UKR_free_press_desc:0 "Alle Meinungen sind gültig, solange sie niemandem schaden. Wir werden die von Pawlo Skoropadskyj verhängte Pressezensur aufheben."
UKR_erase_nazism:0 "Den Nationalsozialismus auslöschen"
UKR_erase_nazism_desc:0 "Die Unterstützung einer Ideologie, die unsere Vernichtung fordert, ist unakzeptabel. Wir müssen Europa von diesem Dämon befreien!"
UKR_restore_russias_values:0 "Russlands Werte wiederherstellen"
UKR_restore_russias_values_desc:0 "Die Werte Russlands wurden durch Ultranationalismus und Kommunismus zerstört. Wir müssen Russland zu seinem alten Glanz zurückführen!"
UKR_reorganize_the_ukranian_indsutry:0 "Reorganisieren Sie die ukrainische Industrie"
UKR_reorganize_the_ukranian_indsutry_desc:0 "Wir müssen unsere Industrie neu organisieren und das sowjetische Wirtschaftsmodell aufgeben, damit wir die Chance haben, eine wirtschaftliche und industrielle Hegemonialmacht zu werden."
UKR_loot_the_kiev_arsenals:0 "Plündern Sie die Arsenale von Kiew"
UKR_loot_the_kiev_arsenals_desc:0 "Wir müssen die Überreste der sowjetischen Rüstungsindustrie in Kiew plündern, damit wir über die Produktion verfügen, die wir zur Verteidigung unserer Grenzen benötigen."
UKR_industrialize_the_west:0 "Industrialisierung des Westens"
UKR_industrialize_the_west_desc:0 "Unsere Industrie sollte westlich des Dnjepr konzentriert werden, damit sie besser vor den Armeen Moskaus geschützt ist."
UKR_industrialize_the_east:0 "Industrialisierung des Ostens"
UKR_industrialize_the_east_desc:0 "Unsere Industrie sollte östlich des Dnjepr konzentriert werden, damit sie besser vor den Armeen Berlins geschützt ist."
UKR_arm_the_island:0 "Aktivieren Sie die Insel"
UKR_arm_the_island_desc:0 "Da wir nun die Kontrolle über die Krim haben, sollten wir ihre strategische Lage im Schwarzen Meer ausnutzen."
UKR_modernize_the_country:0 "Das Land modernisieren"
UKR_modernize_the_country_desc:0 "Wir müssen eine Industrialisierungskampagne starten, um das Land zu werden, das wir hätten werden können, wenn die Sowjets unsere Industrie und Landwirtschaft nicht ausgesaugt hätten."
UKR_feed_our_army:0 "Versorgen Sie unsere Armee"
UKR_feed_our_army_desc:0 "Wir sollten einer nahrhaften Ernährung unserer Armee Priorität einräumen, um die Bereitschaft zum Militärdienst und den Gesundheitszustand unserer Soldaten zu erhöhen."
UKR_feed_our_people:0 "Unsere Leute ernähren"
UKR_feed_our_people_desc:0 "Wir sollten einer nahrhaften Ernährung unserer Bevölkerung Priorität einräumen, um ihren Gesundheitszustand zu verbessern und die Zahl der Hungertoten unter den Bauern zu verringern."
UKR_the_national_academy_of_sciences:0 "Nationale Akademie der Wissenschaften"
UKR_the_national_academy_of_sciences_desc:0 "Wir müssen die Nationale Akademie der Wissenschaften der Ukraine, die von Pavlo Skoropadskyi in der Zeit des Hetmanats gegründet wurde, erweitern, um die Qualität unserer Studenten und Mitarbeiter zu verbessern."
UKR_rocketry_effort:0 "Raketenbemühungen"
UKR_rocketry_effort_desc:0 "Unsere Grenzen sind so breit, dass es undenkbar ist, sie alle verteidigen zu können. Doch mit den neu entdeckten Raketen könnten wir die Vernichtung unserer Feinde sicherstellen, ohne dass dabei auch nur ein einziger unserer Soldaten getötet wird."
UKR_deter_our_enemies:0 "Schrecken Sie unsere Feinde ab"
UKR_deter_our_enemies_desc:0 "Wenn wir die Zerstörung der feindlichen Hauptstädte sicherstellen, falls sie es wagen, bei uns einzumarschieren, werden wir dafür sorgen, dass niemand mehr auf die Idee kommt, dies jemals wieder zu tun."
UKR_the_army_of_ukraine:0 "Die Armee der Ukraine"
UKR_the_army_of_ukraine_desc:0 "Unsere Armee besteht derzeit aus Kosaken, OUN-Guerillas, kommunistischen Soldaten und anarchistischen Milizen. Wir müssen unsere Streitkräfte reformieren, damit wir gegen unsere Feinde und nicht gegen unsere Brüder kämpfen können."
UKR_imitate_berlin:0 "Imitiere Berlin"
UKR_imitate_berlin_desc:0 "Die Deutschen haben der Welt gezeigt, wie wichtig Panzerdivisionen im modernen Kampf sind. Wir müssen ihre Doktrinen nachahmen, um unsere Feinde in Europa zu vernichten."
UKR_a_capable_army:0 "Eine fähige Armee"
UKR_a_capable_army_desc:0 "Kombinierte Waffen und eine große Menge Artillerie sind der beste Weg, unsere Feinde zu besiegen."
UKR_guard_the_dnieper:0 "Bewachen Sie den Dnjepr"
UKR_guard_the_dnieper_desc:0 "Wir werden unser Volk in den Flussgebieten, Bergen und Wäldern verteidigen, niemand wird in der Lage sein, unsere Verteidigung zu durchbrechen!"
UKR_no_step_back:0 "Kein Schritt zurück"
UKR_no_step_back_desc:0 "Alle müssen daran arbeiten, die Ukraine zu verteidigen! Niemand wird zurückweichen!"
UKR_technological_exchanges:0 "Technologischer Austausch"
UKR_technological_exchanges_desc:0 "Wir werden mit jedem Land, das bereit ist, uns seine Panzerentwürfe zu überlassen, einen Technologieaustausch beginnen."
UKR_prepare_for_the_rasputitsa:0 "Bereiten Sie sich auf die Rasputitsa vor"
UKR_prepare_for_the_rasputitsa_desc:0 "Rasputiza ist ein russischer Begriff für zwei Jahreszeiten, in denen das Reisen auf unbefestigten Straßen oder im Gelände aufgrund von Schlamm durch Regen oder schmelzenden Schnee schwierig wird. Wir müssen uns darauf vorbereiten, wenn wir nicht wollen, dass unsere Panzer im Schlamm ertrinken."
UKR_increase_armor_production:0 "Erhöhen Sie die Rüstungsproduktion"
UKR_increase_armor_production_desc:0 "Wir müssen die Panzerproduktion jetzt steigern, sonst ist unsere Armeedoktrin nutzlos."
UKR_support_investigation:0 "Unterstützt die Untersuchung"
UKR_support_investigation_desc:0 "Wir müssen neue Modelle der Artillerie, Panzerabwehr und Luftabwehr untersuchen, um unsere Unternehmen zu unterstützen."
UKR_the_importance_of_radios:0 "Die Bedeutung von Radios"
UKR_the_importance_of_radios_desc:0 "Eine Armee, die nicht kommunizieren kann, ist eine nutzlose Armee. Die Untersuchung von Funkdesigns sollte Priorität haben."
UKR_shock_and_awe:0 "Schock und Ehrfurcht"
UKR_shock_and_awe_desc:0 "Die Artillerie wird unsere Feinde zerstückeln, die Panzerabwehr wird ihre Panzer zerstören, die Flugabwehr wird ihre Flugzeuge verbrennen. Wir werden unsere Feinde mit Schock und Ehrfurcht besiegen."
UKR_improve_our_equipment:0 "Verbessern Sie unsere Ausrüstung"
UKR_improve_our_equipment_desc:0 "Wir können unsere Nation nicht nur mit Pistolen und Roben verteidigen. Wir brauchen die idealen Gewehre und Uniformen."
UKR_trench_building:0 "Grabenbau"
UKR_trench_building_desc:0 "Jede Armee muss über ein Pionierkorps verfügen, das Schützengräben und Befestigungen baut. Andernfalls können wir niemanden verteidigen."
UKR_clear_the_skies:0 "Den Himmel klären"
UKR_clear_the_skies_desc:0 "Wir brauchen die Luftüberlegenheit, um die Ukraine verteidigen zu können. Allerdings verfügen wir nicht über genügend Fabriken, um genügend Flugzeuge für diese Aufgabe zu bauen. Andererseits: Luftabwehr..."
UKR_increase_our_capabilities:0 "Unsere Fähigkeiten erweitern"
UKR_increase_our_capabilities_desc:0 "Unsere Armeen sollten in der Lage sein, unsere Feinde mit Dauerfeuer zu überwältigen. Dafür brauchen wir gute Waffen und perfekte Versorgungslinien."
UKR_encirclement_campaigns:0 "Einkreisungskampagnen"
UKR_encirclement_campaigns_desc:0 "Nicht alle Feinde können besiegt werden, aber in unbekanntem Gelände können alle Feinde eingekreist werden."
UKR_everyone_must_help:0 "Jeder muss mithelfen"
UKR_everyone_must_help_desc:0 "Ob in der Armee oder an der Produktionsfront, alle Ukrainer müssen helfen."
UKR_modernize_our_guns:0 "Modernisieren Sie unsere Waffen"
UKR_modernize_our_guns_desc:0 "Die Verbesserung der Qualität unserer Waffen wird uns im Kampf gegen unsere Feinde sicherlich helfen."
UKR_all_armies_knowledge:0 "Wissen aller Armeen"
UKR_all_armies_knowledge_desc:0 "Die OUN, die Kosaken, die kommunistischen Offiziere und die republikanischen Soldaten verfügen alle über unterschiedliche Kampferfahrungen, und diese werden alle berücksichtigt, um die Qualität unserer Armeedoktrinen zu verbessern."
UKR_shelter_intelectuals:0 "Intellektuelle schützen"
UKR_shelter_intelectuals_desc:0 "Da unsere Nation nun in der Lage ist, sich selbst zu verteidigen, können wir damit beginnen, denjenigen Schutz zu bieten, die vor dem Faschismus oder Kommunismus fliehen."
UKR_form_an_airforce:0 "Bilden Sie eine Luftwaffe"
UKR_form_an_airforce_desc:0 "Die ukrainische Luftwaffe existiert derzeit nicht. Wir müssen jetzt eine aufbauen, wenn wir nicht wollen, dass Bomber den Himmel schwarz färben."
UKR_fighter_research:0 "Kämpferforschung"
UKR_fighter_research_desc:0 "Moderne Kampfflugzeuge sorgen dafür, dass unser Himmel sauber und geschützt bleibt."
UKR_clean_the_black_sea:0 "Reinigen Sie das Schwarze Meer"
UKR_clean_the_black_sea_desc:0 "Marinebomber werden uns helfen, das Schwarze Meer von feindlichen Schiffen zu säubern."
UKR_air_support:0 "Luftunterstützung"
UKR_air_support_desc:0 "Luftnahunterstützung wird unseren Armeen helfen, unsere Feinde zu vernichten."
UKR_tactical_bombing:0 "Taktische Bombardierung"
UKR_tactical_bombing_desc:0 "Taktische Bomber werden unseren Armeen sicherlich helfen und den Feinden einen Schock versetzen."
UKR_strategic_destruction:0 "Strategische Zerstörung"
UKR_strategic_destruction_desc:0 "Ohne Flughäfen und Fabriken ist die feindliche Armee handlungsunfähig. Wir sollten uns mit der Entwicklung von Bombern befassen, die diese zerstören können."
UKR_the_navy_of_ukraine:0 "Die Marine der Ukraine"
UKR_the_navy_of_ukraine_desc:0 "Die Ukraine besitzt den größten Teil der Küste des Schwarzen Meeres, deshalb sollten wir eine Marine zu ihrem Schutz aufbauen."
UKR_expand_our_dockyards:0 "Erweitern Sie unsere Werften"
UKR_expand_our_dockyards_desc:0 "Für den Wiederaufbau der ukrainischen Marine ist der Erwerb eigener Werften notwendig."
UKR_guard_the_black_sea:0 "Bewache das Schwarze Meer"
UKR_guard_the_black_sea_desc:0 "Wir werden eine Marine aufbauen, die in der Lage ist, das Schwarze Meer vor feindlichen Schiffen zu schützen."
UKR_terrify_the_black_sea:0 "Das Schwarze Meer in Angst und Schrecken versetzen"
UKR_terrify_the_black_sea:0 "Wir werden eine Marine aufbauen, die in der Lage ist, den Handel und die Schiffe des Schwarzen Meeres in Angst und Schrecken zu versetzen."
UKR_destroyer_designs:0 "Zerstörer-Designs"
UKR_destroyer_designs_desc:0 "Wir werden unser Bestes tun, um neue Zerstörer zu konstruieren, die mit der Technologie unserer Feinde konkurrieren können."
UKR_cruiser_designs:0 "Cruiser-Designs"
UKR_cruiser_designs_desc:0 "Wir werden unser Bestes tun, um neue Kreuzer zu konstruieren, die mit der Technologie unserer Feinde konkurrieren können."
UKR_battle_ship_designs:0 "Schlachtschiff-Designs"
UKR_battle_ship_designs_decs:0 "Wir werden unser Bestes tun, um neue Schlachtschiffe zu konstruieren, die mit der Technologie unserer Feinde konkurrieren können."
UKR_submarine_designs:0 "U-Boot-Designs"
UKR_submarine_designs_desc:0 "Wir werden unser Bestes tun, um neue U-Boote zu konstruieren, die mit der Technologie unserer Feinde konkurrieren können."
UKR_nobody_scapes:0 "Niemand entkommt"
UKR_nobody_scapes_desc:0 "Niemand wird unserer Marine entkommen können."
UKR_everyone_perishes:0 "Jeder kommt um"
UKR_everyone_perishes_desc:0 "Jeder wird im selben Moment umkommen, in dem er das Schwarze Meer betritt."
UKR_abandon_kiev:0 "Verlassen Sie Kiew"
UKR_abandon_kiev_desc:0 "Wir können nicht alle Ukrainer vor unseren Feinden im Westen schützen. Wenn wir überleben wollen, müssen wir uns hinter den Dnjepr zurückziehen und die Eisenminen in Charkow halten."
UKR_abandon_kharkov:0 "Verlassen Sie Charkow"
UKR_abandon_kharkov_desc:0 "Wir können nicht alle Ukrainer vor unseren Feinden im Osten schützen. Wenn wir überleben wollen, müssen wir uns hinter den Dnjepr zurückziehen und die Industrie in Kiew halten."
GER_pan_germanism:0 "Pangermanismus"
GER_pan_germanism_desc:0 "Alle Deutschen müssen unter einer großen Nation vereint sein, damit es nie wieder zu einem Machtmissbrauch durch das Ausland kommt!"
GER_attack_italy:0 "Angriff auf Italien"
GER_attack_italy_desc:0 "Die Italiener und Mussolini haben sich als nicht mehr als ein Haufen Trottel erwiesen, die der deutschen Vorherrschaft in Europa im Wege stehen. Es wäre besser, die in Italien lebenden Österreicher zu annektieren, als sich mit jemandem zu verbünden, der sich als Verräter erwiesen hat."
GER_germanize_czechia:0 "Tschechien germanisieren"
GER_germanize_czechia_desc:0 "Die Tschechen wurden zu der Annahme verleitet, sie seien Slawen. Wir werden ihnen beibringen, dass sie sich all die Jahrhunderte lang völlig geirrt haben."
GER_begin_the_lebensraum:0 "Lebensraum"
GER_begin_the_lebensraum_desc:0 "Der Begriff „Lebensraum“ wurde erstmals um 1901 populär und wurde im Ersten Weltkrieg zu einem geopolitischen Ziel des kaiserlichen Deutschlands, bevor er sich später zu einem ideologischen Prinzip des Nationalsozialismus entwickelte."
GER_form_mitteleuropa:0 "Form Mitteleuropa"
GER_form_mitteleuropa_desc:0 "Wir haben den größten Teil Europas bereits durch die Bildung eines Militärbündnisses vereint, doch nun ist es an der Zeit, diese Union auch wirtschaftlich zu stärken. Die Vereinheitlichung unserer Währung mit der unserer Verbündeten wird dazu beitragen, den Frieden zwischen den Bündnismitgliedern zu wahren und gleichzeitig denjenigen zu helfen, die wirtschaftlich stärker zu kämpfen haben."
GER_start_the_septemberprogramm:0 "Start des Septemberprogramms"
GER_start_the_septemberprogramm_desc:0 "Das Septemberprogramm war der von Kurt Riezler ausgearbeitete Plan zur territorialen Expansion des Deutschen Reiches. Ziel war die Errichtung von Marionettenkönigreichen in ganz Osteuropa und Belgien. Der Plan sah außerdem die Annexion von Teilen Belgiens und Frankreichs sowie deren Kolonien vor."
GER_the_last_german_state:0 "Der letzte deutsche Staat"
GER_the_last_german_state_desc:0 "Ein Anschluss Österreichs war im Versailler Vertrag verboten, doch nun ist die Zeit gekommen, den Traum einer Deutsch-Österreichischen Republik zu verwirklichen. Dies wird der erste Schritt zur Wiedervereinigung aller Deutschen in einem Staat sein."
GER_the_sudetenland_problem:0 "Das Sudetenlandproblem"
GER_the_sudetenland_problem_desc:0 "Rund 25 % der Bevölkerung der Tschechoslowakei sind Deutsche. Es ist unsere Pflicht, sie davor zu bewahren, in einem fremden Land eine Minderheit zu sein. Ob dies mit Vernunft oder Gewalt geschieht, liegt in der Hand der Tschechoslowaken."
GER_the_danzig_dilemma:0 "Das Danzig-Dilemma"
GER_the_danzig_dilemma_desc:0 "Rund 98 % der Bevölkerung der Stadt Danzig sind Deutsche. Wir müssen daran arbeiten, die Kontrolle über diese Provinz zurückzugewinnen und sie vom polnischen Joch zu befreien."
GER_reintegrate_alsace_lorraine:0 "Reintegration von Elsass-Lothringen"
GER_reintegrate_alsace_lorraine_desc:0 "Die letzte Schande von Versailles ist endlich behoben. Nachdem wir die Kontrolle über Elsass-Lothringen zurückerlangt haben, ist es an der Zeit, diese historische deutsche Region wieder in unsere Nation zu integrieren."
GER_roter_morgen:0 "Roter Morgen"
GER_roter_morgen_desc:0 "Die Monarchisten und Wehrmachtsangehörigen stürzten Hitler nur zu ihrem eigenen Vorteil. Das deutsche Volk hat genug vom Missbrauch der Oligarchien, und dieses Mal wird eine rote Morgendämmerung über unserer Nation aufziehen."
GER_rebuild_germany:0 "Deutschland wieder aufbauen"
GER_rebuild_germany_desc:0 "Nach den Verwüstungen des Bürgerkriegs müssen wir uns dem Wiederaufbau unserer Nation widmen. Wir werden die Menschen bitten, für eine Weile auf ihren persönlichen Komfort zu verzichten, damit wir alle unsere Ressourcen auf die Erreichung dieses Ziels konzentrieren können."
GER_rebuild_germany2:0 "Deutschland wieder aufbauen"
GER_rebuild_germany2_desc:0 "Nach den Verwüstungen des Bürgerkriegs müssen wir uns dem Wiederaufbau unserer Nation widmen. Wir werden die Menschen bitten, für eine Weile auf ihren persönlichen Komfort zu verzichten, damit wir alle unsere Ressourcen auf die Erreichung dieses Ziels konzentrieren können."
GER_peoples_militias:0 "Volksmilizen"
GER_peoples_militias_desc:0 "Jeder Arbeiter in Deutschland wird die Möglichkeit haben, eine militärische Ausbildung zu erhalten, damit unsere Nation nie wieder den Schrecken des Kapitalismus und Faschismus ausgesetzt sein wird."
GER_german_red_army:0 "Deutsche Rote Armee"
GER_german_red_army_desc:0 "Viele Offiziere und Generäle flohen nach dem kommunistischen Putsch aus dem Land. Wir müssen mit der Rekrutierung neuer Generäle beginnen, und die Thälmann-Brigade ist der richtige Ort dafür."
GER_workers_of_germany_unite:0 "Arbeiter Deutschlands, vereinigt euch!"
GER_workers_of_germany_unite_desc:0 "Jeder Arbeiter der Nation muss das Richtige tun, um das Vaterland nach der Zerstörung, die die Nazis und Monarchisten angerichtet haben, wieder aufzubauen."
GER_first_council_of_berlin:0 "Erster Rat von Berlin"
GER_first_council_of_berlin_desc:0 "Nachdem sich die Nation stabilisiert hat, ist es an der Zeit, den neuen Führer der Sozialistischen Republik Deutschland zu wählen. Viele Kandidaten wurden vorgeschlagen, aber nur einem wird das Vergnügen zuteil, die kommunistische Revolution in Deutschland anzuführen."
GER_the_red_navy:0 "Die Rote Marine"
GER_the_red_navy_desc:0 "Unser Land muss schnell eine große Marine aufbauen, die in der Lage ist, den kapitalistischen Seestreitkräften Großbritanniens, Frankreichs und der USA Paroli zu bieten, bevor es zu spät ist."
GER_the_spd_dilema:0 "Das SPD-Dilemma"
GER_the_spd_dilema_desc:0 "Mitglieder der Sozialdemokratischen Partei Deutschlands unterstützten die Antifaschistische Aktion während des Aufstands, doch viele unserer Genossen halten das für ein Problem. Ob sie in unsere Partei aufgenommen werden oder plötzlich verschwinden, liegt in der Hand unseres Führers."
GER_women_suffrage:0 "Frauenwahlrecht"
GER_women_suffrage_desc:0 "Es ist absurd und beschämend, dass die hart arbeitenden Frauen Deutschlands, die immer wieder auf den Barrikaden für ihre Rechte gekämpft haben, nicht an Wahlen teilnehmen dürfen. Wir werden diese Ungerechtigkeit beseitigen."
GER_worker_unions:0 "Gewerkschaften"
GER_worker_unions_desc:0 "Viel zu lange war das Recht des einzelnen Arbeiters, sich mit seinen Kollegen zu Kollektivverhandlungen zusammenzuschließen, angreifbar. Damit ist jetzt Schluss."
GER_state_controlled_economy:0 "Staatlich gelenkte Wirtschaft"
GER_state_controlled_economy_desc:0 "Der freie Markt hat die deutsche Wirtschaft nur ruiniert. Der Staat hat das Recht und die Pflicht, die wirtschaftlichen Angelegenheiten des Landes zu lenken, um das Wohlergehen seiner Bürger zu gewährleisten."
GER_liberate_the_austrian_workers:0 "Befreit die österreichischen Arbeiter"
GER_liberate_the_austrian_workers_desc:0 "Die Arbeiter Österreichs brauchen unsere Hilfe, um ihre Ketten zu sprengen, wie wir es nach unserem Aufstand gegen die Unterdrückung der Oligarchien getan haben, weiter!"
GER_follow_stalin:0 "Folgen Sie Stalin"
GER_follow_stalin_desc:0 "Die Sowjetunion ist das beste Beispiel für eine funktionierende kommunistische Gesellschaft. Unser Land sollte nicht nur mit ihr zusammenarbeiten, sondern ihrem Beispiel folgen."
GER_purge_the_marxists:0 "Säubert die Marxisten"
GER_purge_the_marxists_desc:0 "Für Antirevolutionäre ist in unserem Land kein Platz. Jeder, der es wagt, sich der Welt Stalins und Thälmanns zu widersetzen, wird zum Schweigen gebracht."
GER_german_soviet_research_cooperation:0 "Deutsch-Sowjetische Forschungskooperation"
GER_german_soviet_research_cooperation_desc:0 "Wissenschaftler beider Arbeiterparadiese sollen gemeinsam an der Entdeckung der Waffen der Zukunft arbeiten!"
GER_antifaschistische_aktion:0 "Antifaschistische Aktion"
GER_antifaschistische_aktion_desc:0 "Die Antifaschistische Aktion wurde 1932 als Widerstand gegen Hitler gegründet und erstand nach dem Putsch der Wehrmacht aus der Asche. Sie hat unserem Land gute Dienste geleistet, doch nun ist es an der Zeit, sie zu einem zentralen Bestandteil unserer Ideologie zu machen. Der Widerstand gegen den Faschismus wird die Menschen mobilisieren und ihnen einen Grund geben, für ihr Vaterland zu kämpfen."
GER_pieck_molotov_pact:0 "Pieck-Molotow-Pakt"
GER_pieck_molotov_pact_desc:0 "Sowohl wir als auch die Sowjets haben territoriale Streitigkeiten mit Polen. Wir sollten zusammenarbeiten, um sicherzustellen, dass diese Streitigkeiten gelöst werden."
GER_carry_the_revolution_east:0 "Trage die Revolution nach Osten"
GER_carry_the_revolution_east_desc:0 "Wir erheben Anspruch auf Polen und Litauen. Die Ausbreitung der Arbeiterrevolution wäre die perfekte Rechtfertigung für eine Invasion dieser Gebiete."
GER_partition_czechoslovakia:0 "Teilung der Tschechoslowakei"
GER_partition_czechoslovakia_desc:0 "Sowohl wir als auch die Sowjets haben territoriale Streitigkeiten mit den Tschechen. Wir sollten zusammenarbeiten, um sicherzustellen, dass diese Streitigkeiten gelöst werden."
GER_carry_the_revolution_to_czechia:0 "Bringen Sie die Revolution nach Tschechien"
GER_carry_the_revolution_to_czechia_desc:0 "Wir erheben Anspruch auf Tschechien. Die Ausbreitung der Arbeiterrevolution wäre die perfekte Rechtfertigung für eine Invasion dieser Gebiete."
GER_enter_the_balkans:0 "Betreten Sie den Balkan"
GER_enter_the_balkans_desc:0 "Die Königreiche Ungarn und Rumänien sollen abgeschafft werden, um ihren Arbeitern die Freiheit zu bringen!"
GER_liberate_the_south_slav_workers:0 "Befreit die südslawischen Arbeiter"
GER_liberate_the_south_slav_workers_desc:0 "Die Königreiche Jugoslawien und Bulgarien sollen abgeschafft werden, um ihren Arbeitern die Freiheit zu bringen!"
GER_dye_the_balkans_red:0 "Färbt den Balkan rot"
GER_dye_the_balkans_red_desc:0 "Die Königreiche Albanien und Griechenland sollen abgeschafft werden, um ihren Arbeitern die Freiheit zu bringen!"
GER_take_down_the_eagle:0 "Bring den Adler zur Strecke"
GER_take_down_the_eagle_desc:0 "Um der wahren Revolution begegnen zu können, müssen die Italiener von ihren Ketten befreit werden."
GER_the_red_dawn_of_the_east:0 "Die rote Morgendämmerung des Westens"
GER_the_red_dawn_of_the_east_desc:0 "Die Königreiche der Niederlande, Belgien und Luxemburg sollen abgeschafft werden, um ihren Arbeitern die Freiheit zu bringen!"
GER_liberate_the_home_of_the_ploretariat:0 "Befreit die Heimat des Plotariats"
GER_liberate_the_home_of_the_ploretariat_desc:0 "Das Vereinigte Königreich war im 19. Jahrhundert Schauplatz der industriellen Revolution. Wir müssen der Ungerechtigkeit ein Ende setzen, die in der von monarchistischen Oligarchen regierten Plotarität herrscht."
GER_liberate_the_home_of_the_commune:0 "Befreit das Haus der Kommune"
GER_liberate_the_home_of_the_commune_desc:0 "Frankreich war im 19. Jahrhundert die Heimat der Pariser Kommune. Wir müssen der Ungerechtigkeit ein Ende setzen, die die erste Kommune durch inkompetente und korrupte Politiker hervorgerufen hat."
GER_declare_victory_over_capitalism:0 "Erklären Sie den Sieg über den Kapitalismus"
GER_declare_victory_over_capitalism_desc:0 "Nachdem die großen Nationen Europas die Revolution angenommen haben, ist es nur noch eine Frage der Zeit, bis wir den Kapitalismus auf der Welt endgültig zerstören."
GER_reintegrate_the_alsace_region:0 "Elsass-Lothringen wieder eingliedern"
GER_reintegrate_the_alsace_region_desc:0 "Die letzte Schande von Versailles ist endlich behoben. Nachdem wir die Kontrolle über Elsass-Lothringen zurückerlangt haben, ist es an der Zeit, diese historische deutsche Region wieder in unsere Nation zu integrieren."
GER_the_red_eye:0 "Das Rote Auge"
GER_the_red_eye_desc:0 "Die Menschen in Deutschland müssen in die perfekte Zukunft geführt werden, die die Arbeiter Europas erwartet. Die neu gegründete Stasi wird dafür sorgen, dass sie nicht von den Lehren Lenins abweichen."
GER_say_nothing:0 "Sag nichts"
GER_say_nothing_desc:0 "Niemand soll gegen die Revolution sprechen."
GER_see_nothing:0 "Nichts sehen"
GER_see_nothing_desc:0 "Niemand wird unsere Revolution sehen können, und kein Arbeiter wird vom ausländischen Kapitalismus und Faschismus vergiftet werden."
GER_hear_nothing:0 "Nichts hören"
GER_hear_nothing_desc:0 "Niemand soll etwas hören, was ihn von der Revolution ablenken könnte, nicht einmal diejenigen, die der Stasi und ihrer Regierung zustimmen."
GER_the_only_path_to_communism:0 "Der einzige Weg zum Kommunismus"
GER_the_only_path_to_communism_desc:0 "Die Stalinisten und Leninisten haben ihr Bestes getan, um den Arbeitern der Welt beizubringen, dass der Kommunismus nur durch eine Diktatur des Staates erreicht werden könne. Sie liegen falsch. Wir werden Deutschland zeigen, dass Marx&#39; Traum auch ohne eine Diktatur der Partei verwirklicht werden kann."
GER_prepare_for_the_inevitable:0 "Bereiten Sie sich auf das Unvermeidliche vor"
GER_prepare_for_the_inevitable_desc:0 "Die Sowjets haben sich schon immer gern in die Angelegenheiten nichtstalinistischer kommunistischer Staaten eingemischt. Sie taten dies in der Mongolei und versuchen es derzeit bei den kommunistischen Guerillas in China. Aber wenn die Zeit gekommen ist, werden wir vorbereitet sein."
GER_the_sudetenland_trade:0 "Der Sudetenlandhandel"
GER_the_sudetenland_trade_desc:0 "Etwa 25 % der Bevölkerung der Tschechoslowakei sind Deutsche. Wir werden die Tschechen sanft bitten, uns die von ihnen bewohnten Gebiete zurückzugeben. Sollten sie sich jedoch weigern, müssen sie sich auf die Konsequenzen einstellen."
GER_recover_danzig:0 "Danzig zurückgewinnen"
GER_recover_danzig_desc:0 "Rund 98 % der Bevölkerung der Stadt Danzig sind Deutsche. Wir werden die Polen um die Rückgabe unseres rechtmäßigen Landes bitten, aber sie müssen wissen, dass ihre Weigerung mit Krieg beantwortet wird."
GER_reintegrate_the_old_land:0 "Elsass-Lothringen wieder eingliedern"
GER_reintegrate_the_old_land_desc:0 "Die letzte Schande von Versailles ist endlich behoben. Nachdem wir die Kontrolle über Elsass-Lothringen zurückerlangt haben, ist es an der Zeit, diese historische deutsche Region wieder in unsere Nation zu integrieren."
GER_protect_the_baltic:0 "Schützen Sie die Ostsee"
GER_protect_the_baltic_desc:0 "Das Baltikum gehörte bis vor wenigen Jahrzehnten zum Russischen Reich. Es ist daher naheliegend, dass die Sowjets erneut versuchen könnten, das Baltikum zu annektieren. Wir müssen dies verhindern und im Falle einer sowjetischen Invasion unsere militärische Unterstützung anbieten."
GER_support_finland:0 "Unterstütze Finnland"
GER_support_finland_desc:0 "Die Finnen befinden sich in der Schusslinie der Sowjets. Wir werden ihnen eine Garantie gegen die stalinistische Bedrohung bieten und ihnen eine bescheidene Industriehilfe gewähren."
GER_support_poland:0 "Unterstütze Polen"
GER_support_poland_desc:0 "Die Polen befinden sich in der Schusslinie der Sowjets. Wir werden ihnen eine Garantie gegen die stalinistische Bedrohung bieten und ihnen eine bescheidene Menge an Militärhilfe zukommen lassen."
GER_break_the_man_of_steel:0 "Zerbrich den Mann aus Stahl"
GER_break_the_man_of_steel_desc:0 "Die Arbeiter Russlands werden von der stalinistischen Dystopie befreit, in der sie derzeit leben, und aus ihrer Asche wird der wahre marxistische Traum auferstehen."
GER_spread_the_marxist_thought:0 "Verbreiten Sie den marxistischen Gedanken"
GER_spread_the_marxist_thought_desc:0 "Unser Ziel ist es, allen die Lehren von Karl Marx näherzubringen, um seine Ideale friedlich in der Welt zu verbreiten."
GER_support_the_prc:0 "Unterstützen Sie die KPCh"
GER_support_the_prc_desc:0 "Die Unterstützung der Maoisten in ihrem Kampf würde uns helfen, einen wichtigen Verbündeten im Osten zu gewinnen. Sollte Mao jedoch den Kampf verlieren, wird die Führung der Volksrepublik China wahrscheinlich in die Hände eines Stalinisten fallen ..."
GER_support_the_left_kuomintang:0 "Unterstützen Sie den KMT-RC"
GER_support_the_left_kuomintang_desc:0 "Die Unterstützung des Revolutionären Komitees der Kuomintang würde uns helfen, einen wichtigen Verbündeten im Osten zu gewinnen. Allerdings könnte die Kuomintang daran arbeiten, die Mitglieder des KMT-RC zu säubern, was unsere Bemühungen vergeblich machen würde. "
GER_support_the_cpi:0 "Unterstützen Sie den CPI"
GER_support_the_cpi_desc:0 "Durch die Unterstützung der Kommunistischen Partei Indiens würden wir einen wichtigen Verbündeten im Osten gewinnen. Es wird jedoch lange dauern, bis wir Indien zur Unabhängigkeit verhelfen können."
GER_influence_north_america:0 "Einfluss Nordamerika"
GER_influence_north_america_desc:0 "Wir müssen die Völker Mittelamerikas erreichen. Indem wir an die dortigen kommunistischen Elemente appellieren und ihre Bemühungen zur Verbreitung der Idee eines vereinten internationalen Blocks unterstützen, können wir neue Verbündete und Handelsmöglichkeiten gewinnen."
GER_influence_south_america:0 "Einfluss Südamerika"
GER_influence_south_america_desc:0 "Wir müssen die Völker Südamerikas erreichen. Indem wir an die dortigen kommunistischen Elemente appellieren und ihre Bemühungen zur Verbreitung der Idee eines vereinten internationalen Blocks unterstützen, können wir neue Verbündete und Handelsmöglichkeiten gewinnen."
GER_dreams_of_a_red_world:0 "Träume einer roten Welt"
GER_dreams_of_a_red_world_desc:0 "Nachdem wir der stalinistischen Bedrohung ein Ende gesetzt haben, ist es an der Zeit, den Kampf aufzunehmen, um die ganze Welt den Idealen von Marx anzupassen."
R_a_new_state:0 "Ein neuer Staat"
R_a_new_state_desc:0 ""
R_all_power_to_the_reichskomissar:0 "Alle Macht dem Reichskommissar"
R_all_power_to_the_reichskomissar_desc:0 ""
R_german_high_command:0 "Deutsches Oberkommando"
R_german_high_command_desc:0 ""
R_persecute_the_enemies_of_berlin:0 "Verfolgen Sie die Feinde Berlins"
R_persecute_the_enemies_of_berlin_desc:0 ""
R_german_planes:0 "Deutsche Flugzeuge"
R_german_planes_desc:0 ""
R_the_jewel_of_the_blitzkrieg:0 "Das Juwel des Blitzkriegs"
R_the_jewel_of_the_blitzkrieg_desc:0 ""
R_german_supplies:0 "Axis Supplies"
R_german_supplies_desc:0 ""
R_forced_labor:0 "Zwangsarbeit"
R_forced_labor_desc:0 ""
R_ss_recruitment:0 "SS-Rekrutierung"
R_ss_recruitment_desc:0 ""
R_forced_recruitment:0 "Zwangsrekrutierung"
R_forced_recruitment_desc:0 ""
R_anti_bolshevism:0 "Antibolschewismus"
R_anti_bolshevism_desc:0 ""
R_wunderwaffe:0 "Wunderwaffe"
R_wunderwaffe_desc:0 ""
CHL_continue_the_finance_wizards_plan:0 "Setzen Sie den Plan des Finanzassistenten fort"
CHL_continue_the_finance_wizards_plan_desc:0 "Gustavo Ross, der Chile 1932 half, einen Teil der Wirtschaftskrise zu überwinden, erhielt den Spitznamen „Finanzmagier“. Dank seiner Finanzkenntnisse hat er an der internationalen Börse ein Vermögen gemacht. Wir werden seinen Wirtschaftsplan fortsetzen, um die aktuelle Krise zu überwinden."
CHL_form_the_popular_front:0 "Bilden Sie die Volksfront"
CHL_form_the_popular_front_desc:0 "Um die bevorstehenden Wahlen zu gewinnen, haben die linken Parteien die „Frente Popular“ gegründet, eine Parteienkoalition mit dem Ziel, die von Gustavo Ross geführte „Partido Liberal“ zu besiegen."
CHL_nazi_riots_in_santiago:0 "Nazi-Unruhen in Santiago"
CHL_nazi_riots_in_santiago_desc:0 "Die „Movimiento Nacional Socialista“ (zu Deutsch: Nationalsozialistische Partei) hat dem Kandidaten der APL, Carlos Ibañez del Campo, ihre Unterstützung zugesagt. Nun haben in der Hauptstadt Unruhen gegen die Regierung von Arturo Alessandri begonnen, und es scheint, als seien sie nicht bereit, aufzuhören."
CHL_bombing_of_la_moneda:0 "Bombardierung von La Moneda"
CHL_bombing_of_la_moneda_desc:0 "La Moneda, der Präsidentenpalast Chiles, wurde von der Artillerie der Armee beschossen, nachdem die Polizei sich der Macht der Armee ergeben hatte. Das Land, das einst in Südamerika für Stabilität stand, ist nun die Heimat einer weiteren Diktatur..."
CHL_massacre_of_the_workers_insurance:0 "Massaker an der Arbeiterversicherung"
CHL_massacre_of_the_workers_insurance_desc:0 "Nachdem sich die Nazis der Armee ergeben hatten, wurden sie degradiert und schließlich hingerichtet. Ihre Wertsachen lagen nun in den Taschen der Polizisten, und ein roter Fluss ergoss sich von der Treppe des Arbeiterversicherungsgebäudes. Bleibt nur noch die Frage: Hat es sich gelohnt?"
CHL_sweep_corruption_away:0 "Beseitigen Sie die Korruption"
CHL_sweep_corruption_away_desc:0 "Die Nazis haben die Macht an Ibañez übertragen, der für den Sturz der korrupten parlamentarischen Regierung im Jahr 1924 und für seine grausame Diktatur bekannt ist, die er von 1927 bis 1931 ausübte. Aber unser Ibañez ist kein Opportunist. Er mag ein Sozialist, ein Liberaler, ein Faschist, ein Opportunist, ein Mörder sein, aber er wird niemals korrupt sein!"
CHL_the_puppeter_and_the_spokesman:0 "Der Puppenspieler und der Sprecher"
CHL_the_puppeter_and_the_spokesman_desc:0 "Carlos Keller Rueff, ein deutscher Einwanderer und Vordenker der &quot;Movimiento Nacional Socialista&quot;, ist bekannt für seine Studien zu Wirtschaft und Antisemitismus. Jetzt hält er de facto die Macht in Chile, während Von Marées als Sprecher seiner verdrehten Ideen auftritt."
CHL_reject_antisemitism:0 "Antisemitismus ablehnen"
CHL_reject_antisemitism_desc:0 "Jorge von Marées war nie ein großer Anhänger des Antisemitismus der Nazi-Ideologie. Jetzt, da er die Macht in Chile innehat, wird er nicht zulassen, dass das materialistische Äquivalent des vom Marxismus und kapitalistischen Konsumismus angeheizten Klassenkampfes die Gemüter der chilenischen Bevölkerung vergiftet."
CHL_national_corporativism:0 "Nationaler Korporativismus"
CHL_national_corporativism_desc:0 "Der nationale Korporativismus, der auf seinem deutschen Gegenstück basiert, zielt darauf ab, die Gemeinschaft auf der Grundlage organischer sozialer Solidarität, funktionaler Unterscheidung und sozialer Funktionen der einzelnen Personen in einen Organismus zu verwandeln."
CHL_german_support:0 "Deutscher Support"
CHL_german_support_desc:0 "Die NSDAP hat unsere Partei bereits früher mit Waffen beliefert. Jetzt gibt es für sie keinen Grund, dies nicht erneut zu tun."
CHL_german_exiles:0 "Deutsche Exilanten"
CHL_german_exiles_desc:0 "Nachdem die Wehrmacht einen Putsch gegen die NSDAP in Deutschland gestartet hat, ist es unsere Pflicht, unseren Brüdern in Europa zu helfen!"
CHL_chilean_strumabteilung:0 "Chilenische Sturmabteilung"
CHL_chilean_strumabteilung_desc:0 "Die „Tropas de Asalto“ (Sturmtruppen) sind eine paramilitärische Organisation, die zusammen mit der Nationalsozialistischen Bewegung gegründet wurde, um die marxistischen Schweine zu bekämpfen, die versuchen, die chilenische Nation zu übernehmen. Ihre Integration in die Armee würde deren schnelle Expansion im Falle eines ausländischen Angriffs ermöglichen."
CHL_chilenos_a_la_accion:0 "¡Chilenos a la Acción!"
CHL_chilenos_a_la_accion_desc:0 "„Chilenen, vorwärts!“ ist die Hymne und das Motto der Nationalsozialistischen Bewegung. Alle Chilenen werden gegen Marxismus und Kapitalismus kämpfen, um Chile für immer Stabilität zu bringen!"
CHL_socialist_nationalism:0 "Sozialistischer Nationalismus"
CHL_socialist_nationalism_desc:0 "Der sozialistische Nationalismus wird nicht dasselbe sein wie der berüchtigte Nationalsozialismus. Wir werden jedem Chilenen helfen, unabhängig von seiner Rasse oder Herkunft!"
CHL_public_works2:0 "Öffentliche Arbeiten"
CHL_public_works2_desc:0 "Alle Mitglieder der Nationalsozialistischen Bewegung müssen mit öffentlichen Arbeiten beginnen, um den Bedürftigen zu helfen. Nur dann wird unser Volk beginnen, seine neue Regierung zu akzeptieren."
CHL_public_works:0 "Öffentliche Arbeiten"
CHL_public_works_desc:0 "Alle Mitglieder der Nationalsozialistischen Bewegung müssen mit öffentlichen Arbeiten beginnen, um den Bedürftigen zu helfen. Nur dann wird unser Volk beginnen, seine neue Regierung zu akzeptieren."
CHL_untermensch:0 "Untermensch"
CHL_untermensch_desc:0 "Wir werden nicht zulassen, dass die Juden unser Land so erstechen, wie sie es im Ersten Weltkrieg mit Deutschland getan haben. Alle Chilenen müssen sich uns in unserem Kampf gegen den größten Dämon anschließen!"
CHL_join_the_axis:0 "Treten Sie der Achse bei"
CHL_join_the_axis_desc:0 "Wir müssen uns unseren Brüdern in Europa anschließen, um Amerika und der Welt Größe zu bringen!"
CHL_southamerican_axis:0 "Südamerikanische Achse"
CHL_southamerican_axis_desc:0 "Wir dürfen nicht in die Kriegstreiberei verfallen, die Berlin plagt. Wir sollten ein Bündnis mit nahestehenden Nationen eingehen und nur diejenigen angreifen, die für unsere Interessen wirklich wichtig sind."
CHL_reenact_the_brasilian_alliance:0 "Die brasilianische Allianz nachspielen"
CHL_reenact_the_brasilian_alliance_desc:0 "Wir sollten unser Bündnis mit der großen Nation Brasilien gegen Argentinien erneuern, bevor sie zu mächtig wird, um noch aufgehalten zu werden!"
CHL_ally_the_chaco_warrior:0 "Verbünde den Chaco-Krieger"
CHL_ally_the_chaco_warrior_desc:0 "Paraguay hat der Welt seine Größe gezeigt, indem es die bolivianische Armee im Chaco-Krieg demütigte, und jetzt wird es die Gelegenheit haben, seine Größe gegen die argentinische Nation zu beweisen!"
CHL_recover_the_patagonia:0 "Erobern Sie Patagonien zurück"
CHL_recover_the_patagonia_desc:0 "Die argentinischen Feiglinge haben uns Patagonien gestohlen, als wir im Salpeterkrieg gegen die Bolivianer und Peruaner kämpften. Doch jetzt, da wir frei sind, müssen sie sich unserer ganzen Macht stellen!"
CHL_shootings_in_tierra_del_fuego:0 "Schießereien in Feuerland"
CHL_shootings_in_tierra_del_fuego_desc:0 "Die argentinischen Feiglinge haben uns Patagonien gestohlen, als wir im Salpeterkrieg gegen die Bolivianer und Peruaner kämpften. Und jetzt, da wir frei sind, sollten wir sie dazu bringen, einen Angriffskrieg gegen uns zu beginnen ..."
CHL_break_the_rotten_nations:0 "Zerschlagt die verdorbenen Nationen"
CHL_break_the_rotten_nations_desc:0 "Sowohl Bolivien als auch Peru waren schon immer Schauplatz von Instabilität und Bürgerkriegen, doch selbst dann wagen sie es, Anspruch auf unser Land und unser Meer zu erheben. Wir werden sie in die Schranken weisen."
CHL_persecute_our_enemies:0 "Verfolgen Sie unsere Feinde"
CHL_persecute_our_enemies_desc:0 "Um die Stabilität unseres Regimes zu sichern, müssen alle Feinde der Nation verschwinden."
CHL_assume_full_power:0 "Übernehmen Sie die volle Leistung"
CHL_assume_full_power_desc:0 "Die einzige Person, die Chile beschützen kann, ist Ibañez. Alle Macht soll in seinem Land liegen!"
CHL_public_works_ibanez:0 "Öffentliche Arbeiten"
CHL_public_works_ibanez_desc:0 "Derzeit verachtet man die „Carabineros de Chile“ für ihr Massaker an den Nazis beim Putsch der Arbeiterversicherung und ihre Unterstützung der Diktatur von Ibáñez in den 20er Jahren. Wir müssen sie dazu bringen, öffentliche Arbeiten durchzuführen, damit die Menschen diese Unannehmlichkeiten vergessen …"
CHL_expand_the_pdi:0 "Erweitern Sie die PDI"
CHL_expand_the_pdi_desc:0 "Die „Policía de Investigaciones“ (Ermittlungspolizei) sollte eine wichtigere Rolle bei der Sicherung der Stabilität unseres Regimes spielen."
CHL_improve_our_infrastructure:0 "Verbesserung unserer Infrastruktur"
CHL_improve_our_infrastructure_desc:0 "Wir sollten damit beginnen, die erbärmliche Infrastruktur unseres Landes zu verbessern, bevor sie zu einem Problem für unsere Regierung wird."
CHL_banco_estado:0 "Banco Estado"
CHL_banco_estado_desc:0 "Banco Estado (was so viel wie Staatsbank bedeutet) ist eine Bank im Besitz des Staates, die dafür sorgt, dass unsere Bevölkerung jemanden hat, auf den sie sich verlassen kann, falls ausländische Banken keine Option sind."
CHL_diplomatic_missions:0 "Diplomatische Missionen"
CHL_diplomatic_missions_desc:0 "Die Aufnahme diplomatischer Missionen mit den anderen Ländern Südamerikas wird unserer Regierung sicherlich dabei helfen, nicht von einer feindlichen Nation gestürzt zu werden."
CHL_befriend_the_argentinians:0 "Freunde dich mit den Argentiniern an"
CHL_befriend_the_argentinians_desc:0 "Wir müssen unsere Beziehungen zu unseren Brüdern in den Anden ausbauen, gemeinsam werden wir unbesiegbar sein!"
CHL_befriend_the_brazilians:0 "Freunde dich mit den Brasilianern an"
CHL_befriend_the_brazilians_desc:0 "Die Brasilianer sind ein wertvoller Verbündeter, große Nationen wie unsere sollten vereint bleiben!"
CHL_joint_oil_extraction:0 "Gelenkölextraktion"
CHL_joint_oil_extraction_desc:0 "Chilenen und Argentinier sollten zusammenarbeiten, um das verborgene schwarze Gold im Südkegel zu gewinnen!"
CHL_carve_up_argentina:0 "Argentinien aufteilen"
CHL_carve_up_argentina_desc:0 "Sowohl wir als auch die Brasilianer haben unser rechtmäßiges Territorium an Argentinien verloren. Das wird sich ändern."
CHL_IANSA:0 "IANSA"
CHL_IANSA_desc:0 "Die Nationale Zuckerindustrie, auf Spanisch IANSA genannt, ist eine von Ibañez gegründete Einrichtung zur Verbesserung der chilenischen Wirtschaft."
CHL_secure_our_independence:0 "Sichern Sie unsere Unabhängigkeit"
CHL_secure_our_independence_desc:0 "Unsere Nation wird niemals in Frieden leben, solange andere Nationen Anspruch auf unser Territorium erheben. Wer es wagt, wird untergehen."
CHL_hold_the_election:0 "Halten Sie die Wahl ab"
CHL_hold_the_election_desc:0 "Jetzt, da der Sturm vorüber ist, ist es Zeit, unsere Wahlen abzuhalten!"
CHL_el_ariostazo2:0 "El Ariostazo"
CHL_el_ariostazo2_desc:0 "Viele Chilenen betrachten Kommunismus und Sozialismus als eine weitere Form des Totalitarismus. Einige von ihnen haben sich sogar geweigert, der neuen chilenischen Regierung die Treue zu schwören. Aber das ist doch keine große Sache, oder?"
CHL_el_ariostazo:0 "El Ariostazo"
CHL_el_ariostazo_desc:0 "Viele Chilenen betrachten Kommunismus und Sozialismus als eine weitere Form des Totalitarismus. Einige von ihnen haben sich sogar geweigert, der neuen chilenischen Regierung die Treue zu schwören. Aber das ist doch keine große Sache, oder?"
CHL_recall_ibanez:0 "Ibañez zurückrufen"
CHL_recall_ibanez_desc:0 "Nachdem wir Chile vor dem Marxismus gerettet haben, werden wir die Macht an unseren rechtmäßigen Führer Ibañez del Campo übergeben!"
CHL_democratic_communism_f:0 "Demokratischer Kommunismus"
CHL_democratic_communism_f_desc:0 "Die Chilenen werden lernen, dass nicht alle Kommunisten wie Stalin oder Mao sind. Wir werden unserem Volk wirklich helfen und unsere demokratischen Ideale nicht aufgeben."
CHL_to_govern_is_to_educate:0 "Regieren heißt erziehen"
CHL_to_govern_is_to_educate_desc:0 "„Regieren heißt erziehen“ ist das Motto der Regierung von Pedro Aguirre Cerda. Ein ungebildetes Volk ist eine gescheiterte Regierung."
CHL_support_the_republicans:0 "Unterstützen Sie die Republikaner"
CHL_support_the_republicans_desc:0 "Wir dürfen nicht zulassen, dass die spanische Regierung in die Klauen des Faschismus fällt! Für die Demokratie!"
CHL_the_return_of_the_red_admiral:0 "Die Rückkehr des Roten Admirals"
CHL_the_return_of_the_red_admiral_desc:0 "Nach einigen Jahren im Exil kehrte Marmaduke Grove als Mitglied der sozialistischen Partei nach Chile zurück, doch er ist nicht in sein Leben als einer der bedeutendsten Admirale des Jahrhunderts zurückgekehrt. Das sollte sich ändern."
CHL_join_the_internationale:0 "Treten Sie der Internationale bei"
CHL_join_the_internationale_desc:0 "Die Dritte Internationale, auch bekannt als Komintern, ist das einzige Bündnis, das stark genug ist, um unsere Nation zu verteidigen."
CHL_the_enemies_of_our_enemies:0 "Die Feinde unserer Feinde"
CHL_the_enemies_of_our_enemies_desc:0 "Alle Länder haben Feinde und wir werden das ausnutzen."
CHL_join_the_allies:0 "Schließen Sie sich den Verbündeten an"
CHL_join_the_allies_desc:0 "Es ist richtig, anderen Demokratien dabei zu helfen, der Welt wieder Stabilität zu verleihen."
CHL_ally_goliath:0 "Verbündeter Goliath"
CHL_ally_goliath_desc:0 "Wir müssen uns mit dem Goliath Südamerikas verbünden, nur dann werden wir in der Lage sein, unser Land und unsere Unabhängigkeit zu sichern."
CHL_ally_david:0 "Verbündeter David"
CHL_ally_david_desc:0 "Wir müssen uns mit dem David Südamerikas verbünden, da er im Kampf gegen die Feinde unserer Nation von Nutzen ist."
CHL_bring_stability_to_south_america:0 "Bringen Sie Stabilität nach Südamerika"
CHL_bring_stability_to_south_america_desc:0 "Es ist unsere Pflicht, Südamerika ein für alle Mal Stabilität zu bringen! \n§GIst unsere Regierung kommunistisch, erhalten wir Kriegsziele gegen alle südamerikanischen Nationen, deren Regierung weder kommunistisch noch demokratisch ist (Panama zählt für diesen Fokuseffekt als südamerikanisch). Ist unsere Regierung demokratisch, erhalten wir stattdessen Kriegsziele gegen alle südamerikanischen Nationen, deren Regierung nicht demokratisch ist.§!"
CHL_soviet_military_support:0 "Sowjetische Militärunterstützung"
CHL_soviet_military_support_desc:0 "Wenn wir unsere Nation schützen wollen, müssen wir über die richtige Ausrüstung dafür verfügen, und die Sowjets werden uns diese Ausrüstung wahrscheinlich gerne zur Verfügung stellen."
CHL_help_those_in_need:0 "Helfen Sie den Bedürftigen"
CHL_help_those_in_need_desc:0 "Wir müssen unserem Volk helfen, nach all dem, was es seit der Weltwirtschaftskrise und der Hundert-Tage-Republik von 1932 durchgemacht hat. Chile braucht einen Wohlfahrtsstaat."
CHL_agrarian_reform:0 "Agrarreform"
CHL_agrarian_reform_desc:0 "Die Bauern Chiles waren schon immer Sklaven ihrer Grundbesitzer, das muss jetzt ein Ende haben!"
CHL_found_the_SGDRAHL:0 "Den SGDRAHL gefunden"
CHL_found_the_SGDRAHL_desc:0 "Die „Secretaría General de Defensa de la Raza y Aprovechamiento de las Horas Libres“ (was auf Englisch „Generalsekretariat für die Verteidigung der Rasse und die gute Nutzung der freien Stunden“ bedeutet) ist eine Regierungsorganisation, die in ihren Homonymen vom faschistischen Italien und dem nationalsozialistischen Deutschland inspiriert ist und von Pedro Aguirre Cerda gegründet und von einem der Gründer des Movimiento Nacional Socialista, Francisco Díaz, geleitet wird."
CHL_the_agrarian_problem:0 "Das Agrarproblem"
CHL_the_agrarian_problem_desc:0 "Pedro Aguirre Cerda versteht die Bedürfnisse der Landbevölkerung, die seit dem 16. Jahrhundert von ihren Großgrundbesitzern unterdrückt wird. Wir müssen jetzt mit einer Agrarreform beginnen."
CHL_the_industrial_problem:0 "Das industrielle Problem"
CHL_the_industrial_problem_desc:0 "Pedro Aguirre Cerda bewunderte das Deutsche Reich für seinen wirtschaftlichen und industriellen Wandel. Nach seiner Rückkehr nach Chile, nachdem er in den 1920er Jahren unter der Ibáñez-Diktatur ins Exil gegangen war, übernahm er einige Ideen aus den Industrialisierungsprogrammen der USA und Großbritanniens und wurde sich bewusst, dass Chile, wenn es eine stabile Wirtschaft anstrebt, jetzt industrialisieren muss."
CHL_increase_the_tariffs:0 "Erhöhen Sie die Zölle"
CHL_increase_the_tariffs_desc:0 "Um die Erholung unserer Industrie einzuleiten, werden wir die Zölle auf ausländische Produkte in unserem Land erhöhen. Wir werden mehr Geld verdienen und die Preise für ausländische Produkte steigen, was die Kaufbereitschaft der Menschen für einheimische Produkte erhöht. Eine Win-Win-Situation!"
CHL_textile_industry:0 "Textilindustrie"
CHL_textile_industry_desc:0 "Die Textilindustrie Chiles war schon immer führend unter den anderen, daher ist es für uns eine Notwendigkeit, daraus Kapital zu schlagen."
CHL_car_industry:0 "Automobilindustrie"
CHL_car_industry_desc:0 "Die Automobilindustrie Chiles befindet sich seit einiger Zeit in der Entwicklung. Wir sollten sie weiter ausbauen, da sie uns bei der Produktion ziviler Fahrzeuge und Kriegsgerät helfen könnte."
CHL_wine_industry:0 "Weinindustrie"
CHL_wine_industry_desc:0 "Chile ist für seinen Wein- und Traubenexport bekannt und wird dies auch weiterhin bleiben!"
CHL_expand_the_arsenals_of_santiago:0 "Erweitern Sie die Arsenale von Santiago"
CHL_expand_the_arsenals_of_santiago_desc:0 "Wir müssen unsere Waffenarsenale und -produktion ausbauen, wenn wir unsere Familien und unser Volk verteidigen wollen."
CHL_continue_the_isi_model:0 "Folgen Sie dem ISI-Modell"
CHL_continue_the_isi_model_desc:0 "Die „Industrialización por sustitución de importaciones“, also die „Industrialisierung durch Importsubstitution“, ist ein Wirtschaftsmodell, das in Lateinamerika nach dem Ersten Weltkrieg eingeführt wurde und darauf abzielte, den Import ausländischer Produkte zu stoppen und den Konsum nationaler Güter anzukurbeln."
CHL_renounce_to_the_isi_model:0 "Verzicht auf das ISI-Modell"
CHL_renounce_to_the_isi_model_desc:0 "Das ISI-Modell hat sich nach seiner schwachen Leistung in den meisten lateinamerikanischen Ländern als unerreichbare Utopie erwiesen. Wenn wir unsere Wirtschaft wieder in Schwung bringen wollen, sollten wir einen liberaleren Ansatz verfolgen."
CHL_made_in_chile:0 "Hergestellt in Chile"
CHL_made_in_chile_desc:0 "Wenn wir unsere Bevölkerung dazu ermutigen, einheimische Waren zu kaufen, wird dies zur Erholung unserer Wirtschaft beitragen und sie deutlich weniger von ausländischen Produkten abhängig machen."
CHL_military_self_sufficiency:0 "Militärische Autarkie"
CHL_military_self_sufficiency_desc:0 "Wir können uns bei der Versorgung unserer Armee nicht auf ausländische Quellen verlassen. Wenn wir in diesen schwierigen Zeiten überleben wollen, müssen wir militärische Autarkie erreichen."
CHL_free_trade_deals:0 "Freihandelsabkommen"
CHL_free_trade_deals_desc:0 "Der Abschluss von Freihandelsabkommen mit anderen Ländern wird uns dabei helfen, die Erholung unserer Wirtschaft zu erreichen."
CHL_promote_foreign_investiment:0 "Förderung ausländischer Investitionen"
CHL_promote_foreign_investiment_desc:0 "Wir werden Chile nicht allein industrialisieren können, aber glücklicherweise gibt es viele Nationen, die bereit sind, uns bei der Verwirklichung dieses Traums zu helfen."
CHL_corfo:0 "KORFO"
CHL_corfo_desc:0 "Die „Corporación de Fomento de la Producción“ (zu Deutsch: Produktionsförderungsgesellschaft) ist ein Projekt der Regierung zur Förderung der nationalen Produktion und des regionalen Wirtschaftswachstums. Ziel ist es, Chile bis zum Ende des Jahrzehnts zu einem stärker entwickelten Land zu machen. Ob Letzteres erreicht wird, bleibt abzuwarten." 
CHL_covensa:0 "COVENSA"
CHL_covensa_desc:0 "Die „Corporación de Ventas de Salitre y Yodo de Chile“, zu Deutsch „Chilenische Gesellschaft für den Verkauf von Salpeter und Jod“, ist eine von Arturo Alessandri gegründete staatliche Institution zur Regulierung des Exports und der Vermarktung von Salpeter und Jod. Ihre Expansion wird unserem Land sicherlich zugutekommen."
CHL_enap:0 "ENAP"
CHL_enap_desc:0 "Die „Empresa Nacional del Petróleo“, was auf Deutsch „Nationale Ölgesellschaft“ bedeutet, widmet sich der Exploration, Produktion, Raffination und Vermarktung von Öl und seinen Derivaten. Ihre Expansion würde uns helfen, das kürzlich in Magallanes gefundene Öl zu fördern."
CHL_university_of_chile:0 "Universität von Chile"
CHL_university_of_chile_desc:0 "Die Universität von Chile wird für die anderen Nationen in der Region zu einem Beispiel der Größe werden!"
CHL_enap_refineries:0 "ENAP-Raffinerien"
CHL_enap_refineries_desc:0 "Der Ausbau des Raffineriegebäudes der ENAP wird uns dabei helfen, unsere Fahrzeuge und unsere Kriegsmaschinen mit Treibstoff zu versorgen."
CHL_learning_from_the_major:0 "Von den Majors lernen"
CHL_learning_from_the_major_desc:0 "Wir müssen von den Nationen Europas und Nordamerikas lernen, wenn wir unser Land modernisieren wollen."
CHL_the_undefeated_army:0 "Unbesiegte Armee"
CHL_the_undefeated_army_desc:0 "Seit unserer Unabhängigkeit im Jahr 1818 haben wir keinen Krieg verloren. Wir haben die Peruaner dreimal und die Bolivianer zweimal besiegt und es sogar geschafft, die spanischen Invasionen abzuwehren und die Mapuche im Süden zu bezwingen. Unsere Armee genießt in ganz Südamerika einen guten Ruf und wird ihren Titel als unbesiegte Armee behalten!"
CHL_protect_our_core:0 "Schützen Sie unseren Kern"
CHL_protect_our_core_desc:0 "Der Kern der chilenischen Bevölkerung und Industrie befindet sich in Santiago. Wir müssen es halten, falls es jemals wieder zu einem Krieg kommt."
CHL_protect_the_unconquerable_land:0 "Beschütze das unbesiegbare Land"
CHL_protect_the_unconquerable_land_desc:0 "Jahrhundertelang galt die Araukanien als unbesiegbare Region, doch nicht für unsere Armee. Jetzt, da wir sie in unserer Gewalt haben, muss sie in den Augen unserer Feinde unbesiegbar bleiben."
CHL_protect_our_salary:0 "Schützen Sie unser Gehalt"
CHL_protect_our_salary_desc:0 "Die Einkommensquelle unseres Landes sind die Kupferexporte sowie andere im Norden vorkommende Metalle. Wir müssen diese schützen, wenn wir weiterhin Zahlungen von anderen Ländern erhalten wollen."
CHL_remember_the_tarapaca_campaign:0 "Erinnern Sie sich an die Tarapacá-Kampagne"
CHL_remember_the_tarapaca_campaign_desc:0 "Wir sollten uns daran erinnern, was wir im Tarapacá-Feldzug gelernt haben, an alle Seeinvasionen, die wir durchgeführt haben, an alle Berge, die wir bestiegen haben, aber vor allem an alle Wüsten, die wir durchquert haben."
CHL_remember_the_sierra_campaign:0 "Erinnern Sie sich an die Sierra-Kampagne"
CHL_remember_the_sierra_campaign_desc:0 "Die Sierra-Kampagne war die letzte Kampagne des Salpeterkriegs. Sie war bekannt für den peruanischen Guerillakrieg in den Bergen ihres Landes. Wir werden all die Kämpfe, die wir dort austragen mussten, nicht vergessen."
CHL_remember_the_lima_campaign:0 "Erinnern Sie sich an die Lima-Kampagne"
CHL_remember_the_lima_campaign_desc:0 "Der Lima-Feldzug war einer der letzten Feldzüge des Salpeterkriegs. Dort mussten wir die peruanische Hauptstadt per See erobern, was uns auch gelang. Wir werden nie vergessen, wie wichtig es war, unsere Feinde über das Meer angreifen zu können."
CHL_a_defensive_army:0 "Eine Verteidigungsarmee"
CHL_a_defensive_army_desc:0 "Wir verfügen weder über die Bevölkerung noch über die Produktion, um andere Nationen zu überfallen, aber wir haben das perfekte Terrain, um unser Heimatland zu verteidigen. Seine Berge, Hügel, Wüsten und Wälder machen es zu einem Albtraum für jeden Feind, und wir werden dafür sorgen, dass das so bleibt."
CHL_an_offensive_army:0 "Eine Angriffsarmee"
CHL_an_offensive_army_desc:0 "Wir werden nichts erreichen, wenn wir uns wie Ratten hinter den Bergen verstecken. Wir müssen schnell mit einer Armeereform beginnen."
CHL_weapon_research:0 "Waffenforschung"
CHL_weapon_research_desc:0 "Unsere Armee braucht die besten Waffen, um unser Vaterland vor unseren Feinden zu verteidigen."
CHL_artillery_research:0 "Artillerieforschung"
CHL_artillery_research_desc:0 "Wir sollten unsere Unterstützungswaffen verbessern, um bei den Armeen unserer Feinde Ehrfurcht hervorzurufen!"
CHL_armor_development:0 "Rüstungsentwicklung"
CHL_armor_development_desc:0 "Die Panzer haben sich als entscheidender Bestandteil der modernen Kriegsführung erwiesen, wir müssen jetzt mit ihrer Produktion beginnen."
CHL_home_defense:0 "Heimverteidigung"
CHL_home_defense_desc:0 "Um unbesiegbar zu werden, muss unsere Armee in der Verteidigungskriegsführung ausgebildet werden."
CHL_air_defense:0 "Flugabwehr"
CHL_air_defense_desc:0 "Die Luftwaffe hat sich als entscheidender Bestandteil der modernen Kriegsführung erwiesen. Deshalb müssen wir in der Lage sein, uns vor feindlichen Flugzeugen zu verteidigen, auch wenn unsere Luftwaffe dazu nicht in der Lage ist."
CHL_prussia_of_south_america:0 "Preußen von Südamerika"
CHL_prussia_of_south_america_desc:0 "Viele nennen uns das „Preußen Südamerikas“, nach unserer Leistung im Salpeterkrieg und der preußischen Tradition unserer Streitkräfte, die uns Dinge wie die Pickelhaube, den Stechschritt und die deutschen Marschlieder vererbt hat. Wir werden dafür sorgen, dass diese Traditionen und dieser Ruf nie verloren gehen."
CHL_pride_of_the_pacific_war:0 "Der Stolz des Pazifikkriegs"
CHL_pride_of_the_pacific_war_desc:0 "Einer unserer größten Stolze ist die Marinetradition unseres Landes. Wir müssen dieses Ansehen bewahren."
CHL_chilean_dockyards:0 "Chilenische Werften"
CHL_chilean_dockyardsd_desc:0 "Wir können uns nicht darauf verlassen, dass die europäischen Nationen unsere Marine für immer ausbauen. Wir müssen mit dem Bau unserer eigenen Werften beginnen."
CHL_european_dockyards:0 "Europäische Werften"
CHL_european_dockyards_desc:0 "Unser Land verfügt weder über die Industrie noch über die Fähigkeit, eigene Schiffe zu bauen. Doch es gibt unzählige Nationen in Europa, die bereit wären, dies für uns zu tun. Dies könnte jedoch von unseren Nachbarn als Provokation angesehen werden."
CHL_destroyer_designs:0 "Zerstörer-Designs"
CHL_destroyer_designs_desc:0 "Wir werden unser Bestes tun, um neue Zerstörer zu konstruieren, die mit der Technologie unserer Feinde konkurrieren können."
CHL_cruiser_designs:0 "Cruiser-Designs"
CHL_cruiser_designs_desc:0 "Wir werden unser Bestes tun, um neue Kreuzer zu konstruieren, die mit der Technologie unserer Feinde konkurrieren können."
CHL_battle_ship_designs:0 "Schlachtschiff-Designs"
CHL_battle_ship_designs_decs:0 "Wir werden unser Bestes tun, um neue Schlachtschiffe zu konstruieren, die mit der Technologie unserer Feinde konkurrieren können."
CHL_submarine_designs:0 "U-Boot-Designs"
CHL_submarine_designs_desc:0 "Wir werden unser Bestes tun, um neue U-Boote zu konstruieren, die mit der Technologie unserer Feinde konkurrieren können."
CHL_the_chilean_airforce:0 "Die chilenische Luftwaffe"
CHL_the_chilean_airforce_desc:0 "Unsere Luftwaffe hat im Gegensatz zu unserem Heer und unserer Marine nie an Kampfhandlungen oder Kriegen teilgenommen. Das heißt jedoch nicht, dass wir sie vernachlässigen sollten."
CHL_focus_on_agility:0 "Fokus auf Agilität"
CHL_focus_on_agility_desc:0 "Unsere Flugzeuge sollten in der Lage sein, feindliche Flugzeuge nach Belieben zu verfolgen und ihnen auszuweichen."
CHL_focus_on_range:0 "Fokus auf Reichweite"
CHL_focus_on_range_desc:0 "Unsere Flugzeuge sollten unsere riesigen Gebiete problemlos abdecken können, sonst wären sie nicht hilfreich."
CHL_focus_on_coverage:0 "Fokus auf Abdeckung"
CHL_focus_on_coverage_desc:0 "Unsere Bomber sollten in der Lage sein, eine breite Front abzudecken, sonst würden sie ihre einzige Aufgabe nicht erfüllen."
CHL_focus_on_precision:0 "Fokus auf Präzision"
CHL_focus_on_precision_desc:0 "Unsere Bomber sollten in der Lage sein, den feindlichen Truppen präzise und tödliche Schläge zu versetzen, auch wenn dies eine geringere Reichweite bedeutet."
CHL_learn_from_europe:0 "Von Europa lernen"
CHL_learn_from_europe_desc:0 "Um die Leistungsfähigkeit unserer Luftwaffe zu steigern, sollten wir die deutschen und britischen Luftdoktrinen nachahmen."
CHL_amphibious_warfare:0 "Amphibische Kriegsführung"
CHL_amphibious_warfare_desc:0 "Nach all den Seeinvasionen, die unsere Armee im Salpeterkrieg durchführte, haben wir gelernt, wie wichtig es ist, amphibische Invasionen gegen unsere Feinde durchführen zu können."
CHL_prepare_for_the_next_conflict:0 "Bereiten Sie sich auf den nächsten Konflikt vor"
CHL_prepare_for_the_next_conflict_desc:0 "In dem Moment, als die Entente die Mittelmächte zur Unterzeichnung des Versailler Vertrags zwang, verurteilte sie die Welt zu einem weiteren globalen Konflikt. Revanchismus und Nationalismus plagen Europa und Asien, und in Zeiten wie diesen muss jeder Chilene sein Bestes tun, um sein Land zu schützen."
CHL_fortify_easter_island:0 "Befestigen Sie die Osterinsel"
CHL_fortify_easter_island_desc:0 "Die Lage der Osterinsel in Ozeanien ist entscheidend. Wir müssen eine Brigade dorthin schicken, um Befestigungen und Hangars zu bauen, damit wir die Insel verteidigen können, falls jemand eine Invasion wagt."
CHL_colonize_the_rapa_nui:0 "Kolonisieren Sie Rapa Nui"
CHL_colonize_the_rapa_nui_desc:0 "Die Osterinsel, von ihren Bewohnern Rapa Nui genannt, litt unter dem Tod und der Auswanderung von rund 94 % ihrer Bevölkerung aufgrund von Amseln durch Peruaner und Pockenausbrüchen, die die Bevölkerung um 3.000 dezimierten. Um das Leben auf die Insel zurückzubringen, werden wir zahlreiche Siedler und auch einige Intellektuelle dorthin schicken, die uns beim Bewahren der Rapa Nui-Kultur helfen sollen."
CHL_denounce_american_imperialism:0 "Den amerikanischen Imperialismus anprangern"
CHL_denounce_american_imperialism_desc:0 "Zu lange haben sich die USA in die Angelegenheiten lateinamerikanischer Länder eingemischt und nach Belieben Putsche und Invasionen durchgeführt. Huidobro ist der Meinung, dass die Dominanz ihres Imperialismus enden muss, und er hat einen Plan, um dies zu erreichen."
CHL_assist_the_republicans:0 "Unterstützen Sie die Republikaner"
CHL_assist_the_republicans_desc:0 "Wir dürfen nicht zulassen, dass die spanische Regierung in die Klauen des Faschismus fällt! Für den Kommunismus!"
CHL_bring_the_red_admiral_back_to_service:0 "Bringen Sie den Red Admiral zurück in den Dienst"
CHL_bring_the_red_admiral_back_to_service_desc:0 "Nach Jahren im Exil kehrte Marmaduke Grove als Mitglied der Sozialistischen Partei nach Chile zurück, doch sein Leben als einer der bedeutendsten Admirale des Jahrhunderts ist ihm noch nicht gelungen. Er muss wieder zur Marine, damit wir die Yanquis besiegen können!"
CHL_join_the_comitern:0 "Treten Sie dem Komitee bei"
CHL_join_the_comitern_desc:0 "Wir können die Vereinigten Staaten nicht allein besiegen. Wir müssen die Hilfe der Sowjets suchen, selbst wenn das bedeutet, dass wir uns mit einem totalitären Regime verbünden müssen."
CHL_lead_the_campaign:0 "Leiten Sie die Kampagne"
CHL_lead_the_campaign_desc:0 "Wir können uns nicht darauf verlassen, dass andere Nationen die Vereinigten Staaten besiegen. Wir müssen diesen Feldzug führen, auch wenn wir es alleine tun müssen."
CHL_the_andesia_republic:0 "Die Republik Andesien"
CHL_the_andesia_republic_desc:0 "Sowohl Vicente Huidobro als auch Liborio Justo haben verstanden, dass der einzige Weg, den US-Imperialismus zu besiegen, darin besteht, sich gegen ihn zu vereinen. Beide propagieren die Idee von „Andesia“, einer Föderation, die Chile, Argentinien, Paraguay, Uruguay und Bolivien zu einer Nation vereint, um gegen die nordamerikanische Hegemonialmacht kämpfen zu können. Wir werden diese Nationen bitten, sich uns anzuschließen, doch es ist unwahrscheinlich, dass sie diesen radikalen Vorschlag akzeptieren werden."
CHL_liberate_the_sons_of_bolivar:0 "Befreit die Söhne Bolívars"
CHL_liberate_the_sons_of_bolivar_desc:0 "Simón Bolívar wollte, genau wie Huidobro, Südamerika gegen einen imperialistischen Feind vereinen. Wir müssen Hispanoamerika vereinen, bevor es zu spät ist."
CHL_strike_at_the_rival:0 "Schlag gegen den Rivalen"
CHL_strike_at_the_rival_desc:0 "Jetzt, da wir beginnen, Hispanoamerika zu vereinen, ist es nur eine Frage der Zeit, bis Brasilien uns als Bedrohung betrachtet und sich entweder den Vereinigten Staaten anschließt oder einen Präventivschlag gegen uns startet. Das dürfen wir nicht zulassen."
CHL_march_northwards:0 "Marsch nach Norden"
CHL_march_northwards_desc:0 "Mexiko und Mittelamerika waren überhaupt nicht Teil von Huidobros Plan, aber es ist unmöglich, die Vereinigten Staaten aus der Luft oder vom Meer aus anzugreifen. Deshalb müssen wir ein Opfer bringen und nach Norden marschieren."
CHL_liberate_america:0 "Befreie Amerika"
CHL_liberate_america_desc:0 "Chile, Mexiko, Japan, Spanien, die Philippinen, Kuba, Puerto Rico, Panama, die Dominikanische Republik, Nicaragua, Haiti, China, Russland, Kanada und Hawaii. Alle diese Länder wurden von den USA angegriffen und teilweise sogar annektiert. Nun ist es an der Zeit, alle Opfer dieser blutrünstigen Nation zu rächen, indem Washington niedergebrannt wird!"
CHL_expand_the_tricontinental_possessions:0 "Erweitern Sie die Tricontinental Holdings"
CHL_expand_the_tricontinental_possessions_desc:0 "Nachdem wir unsere Ansprüche auf die Antarktis geltend gemacht und mit der Planung unserer ersten Siedlung in der Antarktis sowie der Integration der Osterinsel begonnen haben, ist unsere Nation zu einem trikontinentalen Land geworden. Es bleibt jedoch noch viel zu tun, um als echtes Imperium zu gelten."
CHL_expand_the_linea_aerea_nacional:0 "Erweitern Sie die Línea Aérea Nacional"
CHL_expand_the_linea_aerea_nacional_desc:0 "Die Línea Aérea Nacional (zu Deutsch: Nationale Fluggesellschaft) wurde 1929 von Carlos Ibañez del Campo selbst gegründet. Die Gewinne und der Nutzen dieses Unternehmens machen es für eine Expansion geeignet."
CHL_the_president_of_the_poor:0 "Der Präsident der Armen"
CHL_the_president_of_the_poor_desc:0 "Durch Schulbau, Bildungsreformen, Verbesserung der Lehrerbedingungen, Industrialisierungs- und Modernisierungspolitik sowie eine wohlwollende Führung gelang es Pedro Aguirre Cerda, die Chilenen unter seiner Führung zu vereinen. Nun wird der Präsident der Armen Chile in den Frieden und Fortschritt führen."
CHL_copper_nationalization:0 "Kupferverstaatlichung"
CHL_copper_nationalization_desc:0 "Wir können nicht zulassen, dass ausländische Unternehmen weiterhin unsere gesamten Ressourcen ausbeuten und uns nur das Schlimmste übrig lassen. Diese Unternehmen werden verschwinden müssen, aus vernünftigen Gründen oder mit Gewalt."
CHL_remember_arturo_prat:0 "Erinnern Sie sich an Arturo Prat"
CHL_remember_arturo_prat_desc:0 "Die Esmeralda, eine hölzerne Fregatte unter dem Kommando von Admiral Arturo Prat, kämpfte tapfer gegen die Huascar, eines der beiden modernsten peruanischen Schiffe im Salpeterkrieg. Sie war mit Geschütztürmen und einem Rammsporn aus Metall bewaffnet und durch eine eiserne Panzerung geschützt. Die Esmeralda kämpfte bis zum Ende und verschaffte der Covadonga genügend Zeit, ihren Kampf gegen die Independencia zu gewinnen, bevor sie nach Süden nach Antofagasta floh."
CHL_remember_carlos_condell:0 "Gedenken an Carlos Condell"
CHL_remember_carlos_condell_desc:0 "Die Covadonga, eine hölzerne Barkentine unter dem Kommando von Admiral Carlos Condell, kämpfte gegen den Goliath der peruanischen Streitkräfte, die Independencia, eine gepanzerte Fregatte und Stolz der peruanischen Flotte. Dank des Widerstands der Esmeralda gegen die Huascar gelang es der Covadonga, die Independencia dazu zu bringen, näher an die Küste zu fahren, woraufhin die Fregatte gegen einen Felsen lief und sank. Damit errang sie einen der größten Siege der chilenischen Marinegeschichte."
ARG_fraude_patriotico:0 "Patriotischer Betrug"
ARG_fraude_patriotico_desc:0 "Nachdem die Concordancia 1931 durch Wahlbetrug an die Macht gekommen war, begann sie eine neue Politik namens „Fraude Patriótico“ (Patriotischer Betrug). Ihr Hauptziel bestand nicht nur darin, die Anarchosyndikalisten und Kommunisten von der Wahlteilnahme abzuhalten, sondern auch die Unión Cívica Radical (Radikale Bürgerunion) daran zu hindern, nach ihrer autoritären Regierung unter Hipólito Yrigoyen jemals wieder an die Macht zu kommen."
ARG_support_the_spanish_republic:0 "Unterstützen Sie die Spanische Republik"
ARG_support_the_spanish_republic_desc:0 "Die Völker Spaniens kämpfen gegen den nationalistischen Putsch, der das ganze Land zu erobern droht. Das Menschlichste, was wir tun können, ist, ihnen im Kampf gegen die Kräfte des Faschismus zu helfen."
ARG_support_the_spanish_nationalists:0 "Unterstützen Sie die spanischen Nationalisten"
ARG_support_the_spanish_nationalists_desc:0 "Wir müssen den spanischen Nationalisten, die für den Ruhm ihres Landes gegen die kommunistische und anarchistische Bedrohung kämpfen, unsere Unterstützung zeigen, genau wie wir es bei der Patagonia Rebelde getan haben."
ARG_march_in_buenos_aires:0 "März in Buenos Aires"
ARG_march_in_buenos_aires_desc:0 "Die Liga Patriótica Argentina (Patriotische Argentinische Liga) spielte in den 1910er und 20er Jahren eine wichtige Rolle in Argentinien, als sie der Regierung half, die Streikenden der Semana Trágica und der Patagonia Rebelde zu unterdrücken. Nach dem Putsch von 1930 stellte sie ihre Aktivitäten jedoch ein, bis heute, wo in den Straßen von Buenos Aires Gerüchte aufkommen, Manuel Carlés habe seine Version des Marsches auf Rom organisiert."
ARG_guided_elections:0 "Geführte Wahlen"
ARG_guided_elections_desc:0 "Nach dem Ende der Regierung von Agustín Pedro Justo ist es Zeit für Wahlen! Wir müssen jedoch sicherstellen, dass die UCR weder diese noch künftige Wahlen gewinnt."
ARG_third_patagonia_rebelde:0 "Dritte Patagonia Rebelde"
ARG_third_patagonia_rebelde_desc:0 "In den 1920er Jahren kam es in Patagonien, allgemein bekannt als Patagonia Rebelde (Rebellisches Patagonien), zu zwei Aufständen unter der Führung des Anarchosyndikalisten Antonio Soto. Zunächst handelte es sich nur um einen Generalstreik, der sich jedoch schnell zu einem bewaffneten Aufstand entwickelte. Der Aufstand wurde schließlich niedergeschlagen, doch in Argentinien kursierten Gerüchte über einen dritten Patagonia Rebelde. Doch diesmal wird nicht nur Patagonien rebellieren."
ARG_untermensch:0 "Untermensch"
ARG_untermensch_desc:0 "Wir werden nicht zulassen, dass die Juden unser Land so erstechen, wie sie es im Ersten Weltkrieg mit Deutschland getan haben. Alle Argentinier müssen sich uns in unserem Kampf gegen den größten Dämon anschließen!"
ARG_for_god_and_country:0 "Für Gott und Vaterland"
ARG_for_god_and_country_desc:0 "Um unsere Nation zu vereinen, müssen wir sicherstellen, dass jeder Argentinier den Werten des Katholizismus und des Christentums folgt."
ARG_to_save_argentina:0 "Argentinien retten"
ARG_to_save_argentina_desc:0 "Wir dürfen unsere Nation nicht mit Rassenhass oder der blinden Befolgung bestimmter Doktrinen schüren. Wir müssen unser Volk davon überzeugen, dass die einzige Regierung, die bereit ist, ihm zu helfen, wir selbst sind."
ARG_german_support:0 "Deutscher Support"
ARG_german_support_desc:0 "Nachdem wir nun eine antisemitische Haltung eingenommen haben, wird uns das Deutsche Reich sicherlich dabei helfen, die Leistungsfähigkeit unserer Armee zu steigern."
ARG_spanish_support:0 "Spanischer Support"
ARG_spanish_support_desc:0 "Der spanische Falangismus ist für seine Treue zum Katholizismus bekannt. Da unsere Regierung nun eine klerikal-faschistische Haltung eingenommen hat, wird sie uns höchstwahrscheinlich helfen wollen."
ARG_italian_support:0 "Italienischer Support"
ARG_italian_support_desc:0 "Wenn wir den Schöpfer des Faschismus selbst um Hilfe bitten, wird dies wahrscheinlich zu einer Steigerung der Leistungsfähigkeit unserer Armee führen."
ARG_help_the_workers:0 "Helfen Sie den Arbeitern"
ARG_help_the_workers_desc:0 "Unsere Liga war nicht nur für ihre Auftritte in der Semana Trágica und der Patagonia Rebelde bekannt, sondern auch für die Entwicklung eines umfassenden Sozialhilfewerks für die Arbeiter, das die Einrichtung von Werkstätten, Kantinen, Schulen, Sparschweinen und vielem mehr umfasste. Wir werden diesen Ruhm nicht in Vergessenheit geraten lassen und deshalb mit dem Aufbau eines Wohlfahrtsstaates in Argentinien beginnen."
ARG_nationalize_the_transport_system:0 "Verstaatlichung des Verkehrssystems"
ARG_nationalize_the_transport_system_desc:0 "Seit seiner Gründung gehörten die argentinischen Transportsysteme ausländischen, meist britischen Unternehmen. Nach der Unterzeichnung des Roca-Runciman-Pakts im Jahr 1933 waren wir jedoch gezwungen, das Monopol auf argentinische Transporte an Großbritannien abzutreten. Damit ist jetzt Schluss: Die argentinischen Transporte werden von Argentiniern für Argentinier betrieben!"
ARG_renounce_to_the_slavers_pact:0 "Verzicht auf den Sklavenpakt"
ARG_renounce_to_the_slavers_pact_desc:0 "Die Briten dachten, sie könnten das argentinische Volk und die argentinische Wirtschaft versklaven, doch damit ist jetzt Schluss! Der Roca-Runciman-Pakt wird Argentinien nie wieder heimsuchen!"
ARG_bring_glory_back_to_argentina:0 "Bringen Sie den Ruhm zurück nach Argentinien"
ARG_bring_glory_back_to_argentina_desc:0 "Die Vereinigten Provinzen des Silberflusses (Provincias Unidas del Río de la Plata) waren ein Staat, der von Bolivien, Argentinien, Paraguay und Uruguay gebildet wurde und von 1810 bis 1831 existierte, nachdem die Bolivianer mit Hilfe Großkolumbiens ihre Unabhängigkeit erlangt hatten und die Paraguayer und Uruguayer aus der Union austraten. Doch dieses Mal wird es nichts und niemanden geben, der sie verteidigen könnte."
ARG_conquer_the_rebels:0 "Besiege die Rebellen"
ARG_conquer_the_rebels_desc:0 "Die Rebellenprovinzen Paraguay und Uruguay sollen sich unserer mächtigen Union wieder anschließen, auch wenn sie dies nicht wollen."
ARG_recover_tarija:0 "Tarija wiederherstellen"
ARG_recover_tarija_desc:0 "Seit unserer Unabhängigkeit streiten wir mit Bolivien um die Region Tarija. 1826 annektierten diese Verräter die Region und weigerten sich, sie an uns zurückzugeben. Jahre später kämpften wir und Chile gegen die Peru-Bolivianische Konföderation und gewannen. Leider gelang es uns nicht, die Kontrolle über Tarija zu behalten. Doch dieses Mal sind die Bolivianer allein und bereit, annektiert zu werden."
ARG_our_long_time_rival:0 "Unser langjähriger Rivale"
ARG_our_long_time_rival_desc:0 "Seit unserer Unabhängigkeit rivalisieren wir mit dem brasilianischen Titanen um die Regionen Uruguay und Misiones Orientales. Damals waren wir nicht vereint, und ständige Bürgerkriege und Uneinigkeit hinderten uns daran, sie zu besiegen. Doch dieses Mal sind wir vereint und bereit."
ARG_la_plata_reborn:0 "La Plata"
ARG_la_plata_reborn_desc:0 "Nachdem wir die Vereinigten Provinzen des Río de la Plata wiedervereinigt haben, ist es an der Zeit, unsere Union unter dem Namen La Plata zu reformieren, und dieses Mal wird es weder Instabilität noch Caudillo geben, der sie spalten könnte!"
ARG_help_our_brothers:0 "Helfen Sie unseren Brüdern"
ARG_help_our_brothers_desc:0 "Wir müssen unseren Brüdern in Europa helfen, um den Sieg des Faschismus in diesem globalen Konflikt zu sichern."
ARG_our_last_objective:0 "Unser letztes Ziel"
ARG_our_last_objective_desc:0 "Es gibt noch eine Region des alten La Plata, die wir zurückerobern müssen: die Malvinas. Derzeit sind wir jedoch nicht bereit, den britischen Streitkräften gegenüberzutreten. Wenn wir uns jedoch jetzt vorbereiten, werden wir in dem Moment, in dem sie einen Fehler machen, bereit sein, sie zu besiegen."
ARG_eden_malbran_pact:0 "Eden-Malbrán-Pakt"
ARG_eden_malbran_pact_desc:0 "Derzeit profitieren vom Roca-Runciman-Pakt nur die britischen Unternehmen, Argentinien bleibt ein wirtschaftlicher Sklave des britischen Empires. Wir sollten mit der Aushandlung eines neuen Pakts beginnen, der beiden Seiten Vorteile bringt."
ARG_british_investiments:0 "Britische Investitionen"
ARG_british_investiments_desc:0 "Wir sollten britische Investitionen in Buenos Aires fördern und das britische Monopol auf den Nahverkehr der Stadt beenden."
ARG_to_end_the_fraud:0 "Um dem Betrug ein Ende zu setzen"
ARG_to_end_the_fraud_desc:0 "Obwohl Präsident Roberto Ortiz durch Wahlbetrug gewählt wurde, lehnt er diesen strikt ab. Er hat angekündigt, dass Argentinien unter seiner Regierung eine demokratische Entwicklung anstrebt. Ob er seine Versprechen hält, wird sich erst mit der Zeit zeigen."
ARG_the_open_door:0 "Die offene Tür"
ARG_the_open_door_desc:0 "Argentinien war schon immer für seine Aufnahme von Einwanderern aus Europa bekannt und in diesen schweren Zeiten, in denen überall auf der Welt Kriege toben, ist es hilfreich, Flüchtlinge zu haben, die ein oder zwei Dinge über die Situation in ihrem Land wissen, auch wenn das bedeutet, dass man von Zeit zu Zeit Spione ins Land lassen muss."
ARG_shelter_intellectuals:0 "Intellektuelle schützen"
ARG_shelter_intellectuals_desc:0 "Viele Intellektuelle, meist Juden, Kommunisten und Faschisten, werden letztendlich von der Regierung aus ihrer Heimat vertrieben, aber sie dürfen nicht vergessen, dass wir immer da sein werden, um sie aufzunehmen."
ARG_our_last_hope:0 "Unsere letzte Hoffnung"
ARG_our_last_hope_desc:0 "Roberto Ortiz&#39; Zustand verschlechterte sich rapide. Ein Augenarzt aus den USA wurde geschickt, um Ortiz zu helfen. Nach einer angespannten medizinischen Untersuchung erklärte er jedoch, dass seine Situation nicht mehr verbessert werden könne. Die USA haben Ortiz angeboten, sich dort behandeln zu lassen, doch er glaubt, sein Schicksal sei klar. Sollen wir ihn trotzdem zur Reise zwingen oder ihn seine letzten Monate zu Hause verbringen lassen?"
ARG_gods_will:0 "Gottes Wille"
ARG_gods_will_desc:0 "Roberto Ortiz&#39; Zustand verschlechterte sich rapide und führte schließlich zur völligen Erblindung. Heute trat er mit den Worten zurück: „Ich habe zwei Jahre lang Widerstand geleistet, weil ich überzeugt war, dass es einen Weg gibt, meine Schmerzen zu lindern. Gott hat es nicht gewollt, und ich füge mich seinem Willen.“ Mit der Machtübergabe an Ramón S. Castillo, den konservativen Vizepräsidenten, scheint der Traum von der argentinischen Demokratie ausgeträumt."
ARG_a_new_era:0 "Eine neue Ära"
ARG_a_new_era_desc:0 "Nachdem Ortiz sich auf wundersame Weise erholt hat, ist es an der Zeit, in Argentinien eine neue Ära einzuläuten, eine Ära des Friedens und der Demokratie."
ARG_joint_oil_extraction:0 "Gelenkölextraktion"
ARG_joint_oil_extraction_desc:0 "Mit der Aussicht auf mögliche Ölfelder auf unserem Territorium haben wir die Aufmerksamkeit des Auslands auf uns gezogen. Befreundete Mächte sind bestrebt, unsere Ölindustrie mit ihrem technischen Know-how zu unterstützen, und dies wäre eine lukrative Gelegenheit, von ihren Fortschritten zu lernen."
ARG_those_who_dont_learn_from_history:0 "Diejenigen, die nicht aus der Geschichte lernen"
ARG_those_who_dont_learn_from_history_desc:0 "Wer nicht aus der Geschichte lernt, ist dazu verdammt, sie zu wiederholen. Wir haben versucht, eine erneute Militärdiktatur zu verhindern, doch die Regierung von Ramón S. Castillo hat erneut einen Putsch ausgelöst. Gott schütze Argentinien, denn niemand sonst kann das."
ARG_shall_not_be_us:0 "Soll nicht wir sein"
ARG_shall_not_be_us_desc:0 "Wir mögen erneut einer Diktatur zum Opfer gefallen sein, doch dieses Mal wird sich diese Diktatur um ihr Volk kümmern. Ob sie nun von Rawson, Ramírez, Farell oder Perón geführt wird, Korruption und Autoritarismus werden Argentinien nicht erneut beherrschen!"
ARG_join_the_allies:0 "Schließen Sie sich den Verbündeten an"
ARG_join_the_allies_desc:0 "Wir müssen uns den Alliierten in ihrem Kampf gegen Kommunismus und Faschismus anschließen, bevor es zu spät ist!"
ARG_we_shall_not_fall:0 "Wir werden nicht fallen"
ARG_we_shall_not_fall_desc:0 "Wir müssen unser Bestes tun, um das Scheitern unseres Aufstands gegen die argentinische Regierung zu verhindern! Jede Waffe ist geeignet, vom rostigen Revolver bis zur sowjetischen Mosin. Vorwärts, in unsere Zukunft!"
ARG_our_new_leader:0 "Unser neuer Anführer"
ARG_our_new_leader_desc:0 "Es ist Zeit, den neuen argentinischen Präsidenten zu wählen! Offensichtlich ist das Volk für diese wichtige Entscheidung noch nicht bereit. Deshalb hat ein Rat aus Mitgliedern der Unión Sindical Argentina (Argentinischer Gewerkschaftsbund), der Kommunistischen Partei und der neu gegründeten Partido Justicialista (Justizistische Partei) einen Rat einberufen."
ARG_we_are_all_peronists:0 "Wir sind alle Peronisten"
ARG_we_are_all_peronists_desc:0 "Ob Sie nun rechts oder links sind, solange Ihnen Argentinien und seine Arbeiter am Herzen liegen, sind Sie ein Peronist! Folgen Sie uns jetzt für eine kontrollierte Volkswirtschaft und einen Wohlfahrtsstaat in Argentinien!"
ARG_anarcho_syndicalism:0 "Anarchosyndikalismus"
ARG_anarcho_syndicalism_desc:0 "Antonio Soto weiß, was für die argentinischen Arbeiter besser ist! Wir werden uns für die Interessenbündelung mehrerer nicht wettbewerbsfähiger, kategorisierter Einheiten einsetzen, um die Wirtschaft zu verhandeln und zu steuern. Die Industrie wird durch Genossenschaftsverbände und gegenseitige Hilfe gesteuert. Ein Traum für die argentinischen Arbeiter!"
ARG_femminist_communism:0 "Feministischer Kommunismus"
ARG_femminist_communism_desc:0 "Der Kommunismus besagt, dass alle Menschen gleich sind. Sollten Frauen daher nicht auch politisch aktiv sein und die Revolution vorantreiben? Fanny Jabcovsky, die Vorsitzende der Kommunistischen Partei, ist dieser Meinung! Männer und Frauen werden vereint die rote Fahne für die Zukunft der argentinischen Arbeiter hochhalten!"
ARG_rural_work_reform:0 "Reform der ländlichen Arbeit"
ARG_rural_work_reform_desc:0 "Perón hat gerade die Verkündung des Status des Landarbeiters angekündigt. Dieser wird humanitäre Arbeitsbedingungen für Landarbeiter festlegen, darunter Mindestlöhne, Sonntagsruhe, bezahlten Urlaub, Hygiene- und Unterbringungsbedingungen. Es lebe Perón!"
ARG_increase_worker_rights:0 "Stärkung der Arbeitnehmerrechte"
ARG_increase_worker_rights_desc:0 "Perón hat gerade die Einführung der Arbeitsgerichte angekündigt. Diese werden neue Rechte wie Entschädigungen, bezahlten Urlaub, Krankenurlaub, Unfallverhütung, technische Weiterbildung und vieles mehr gewähren. Außerdem werden Gewerkschaften zu gemeinnützigen Einrichtungen erklärt. Auf diese Weise erhalten die Arbeiter die Anerkennung ihrer Rechte, rechtlichen Beistand und die Unterstützung des Staates."
ARG_el_mejor_trabajador:0 "El Primer Trabajador"
ARG_el_mejor_trabajador_desc:0 "Für diesen großen Argentinier, der unermüdlich arbeitete, damit Liebe und Gleichheit in der Stadt herrschen. Perón, Perón, wie groß bist du! Mein General, wie viel bist du wert! Perón, Perón, Großdirektor, du bist der erste Arbeiter!"
ARG_triple_a:0 "Triple A"
ARG_triple_a_desc:0 "Die Alianza Anticomunista Argentina (Antikommunistische Argentinische Allianz) ist eine Parapolizei, die von einem Teil des Perónismus, des Syndikalismus, der Polizei und des argentinischen Militärs gegründet wurde. Sie begann mit der Ermordung von Künstlern, Priestern, Intellektuellen, linken Politikern, Studenten, Historikern und Gewerkschaftern und setzte außerdem Folter, standrechtliche Hinrichtungen und das Verschwindenlassen von Personen ein, die sich der Führung Peróns widersetzten."
ARG_biased_education:0 "Voreingenommene Bildung"
ARG_biased_education_desc:0 "Alle Schulen müssen diesen Religionsunterricht beenden, der die Gehirne unserer Kinder vergiftet. Stattdessen müssen sie unseren Kindern beibringen, dass Perón sie liebt! Perón ist ein guter Gouverneur! Es lebe Perón!"
ARG_start_the_nuclear_program:0 "Starten Sie das Atomprogramm"
ARG_start_the_nuclear_program_desc:0 "Nachdem die Atombombe erfunden wurde, ist es an der Zeit, die erste argentinische Atombombe zu bauen! Deshalb werden wir jetzt deutsche Wissenschaftler rekrutieren, die uns beim Aufbau unseres Atomprogramms unterstützen! Es lebe Perón!"
ARG_join_the_vanguards:0 "Schließt euch der Avantgarde an"
ARG_join_the_vanguards_desc:0 "Wir werden uns der faschistischen Avantgarde in Europa anschließen, dann werden wir in der Lage sein, unsere Nation vor den Feinden der argentinischen Arbeiter zu verteidigen! ¡Viva Perón!"
ARG_the_first_argentine_plane:0 "Das erste argentinische Flugzeug"
ARG_the_first_argentine_plane_desc:0 "Mit Hilfe europäischer Konstrukteure hat unser Anführer Juan Domingo Perón mit der Entwicklung der I.Ae. 27 Pulqui I begonnen, eines der ersten südamerikanischen Flugzeuge. Wir können wirklich stolz auf diese Leistung sein! ¡Viva Perón!"
ARG_decentralization_campaign:0 "Dezentralisierungskampagne"
ARG_decentralization_campaign_desc:0 "Argentinien ist wie viele südamerikanische Länder stark zentralisiert. Das wird nun ein Ende haben, deshalb sind alle Arbeiter Argentiniens gleichermaßen wichtig!"
ARG_worker_and_farmer_rights:0 "Arbeitnehmer- und Bauernrechte"
ARG_worker_and_farmer_rights_desc:0 "Die Arbeiter und Bauern Argentiniens wurden jahrhundertelang unterdrückt, doch damit ist jetzt Schluss. Wir gewähren ihnen neue Rechte wie Entschädigungen, bezahlten Urlaub, Krankenurlaub, Verhütung von Arbeitsunfällen, technische Schulungen und vieles mehr!"
ARG_reject_the_church:0 "Lehne die Kirche ab"
ARG_reject_the_church_desc:0 "Die Religion hat die argentinischen Köpfe jahrhundertelang vergiftet, doch damit ist jetzt Schluss. Es ist Zeit, die Arbeiter Argentiniens zu befreien!"
ARG_join_the_comitern:0 "Treten Sie dem Komitee bei"
ARG_join_the_comitern_desc:0 "Alle Arbeiter der Welt müssen sich gegen die Kräfte des Faschismus und Kapitalismus vereinen!"
ARG_hold_the_torch:0 "Halte die Fackel"
ARG_hold_the_torch_desc:0 "Wir können uns nicht darauf verlassen, dass uns andere Nationen vor unseren Feinden schützen können. Wir müssen die Fackel im Kreuzzug zur Befreiung der Arbeiter Amerikas tragen!"
ARG_the_andesia_republic:0 "Die Republik Andesien"
ARG_the_andesia_republic_desc:0 "Sowohl Liborio Justo als auch Vicente Huidobro haben verstanden, dass der einzige Weg, den US-Imperialismus zu besiegen, darin besteht, sich gegen ihn zu vereinen. Beide propagieren die Idee von „Andesia“, einer Föderation, die Chile, Argentinien, Paraguay, Uruguay und Bolivien zu einer Nation vereint, um gegen die nordamerikanische Hegemonialmacht kämpfen zu können. Wir werden diese Nationen bitten, sich uns anzuschließen, doch es ist unwahrscheinlich, dass sie diesen radikalen Vorschlag akzeptieren werden."
ARG_liberate_the_sons_of_bolivar:0 "Befreit die Söhne Bolívars"
ARG_liberate_the_sons_of_bolivar_desc:0 "Simón Bolívar wollte, genau wie Huidobro, Südamerika gegen einen imperialistischen Feind vereinen. Wir müssen Hispanoamerika vereinen, bevor es zu spät ist."
ARG_strike_at_the_rival:0 "Schlag gegen den Rivalen"
ARG_strike_at_the_rival_desc:0 "Jetzt, da wir beginnen, Hispanoamerika zu vereinen, ist es nur eine Frage der Zeit, bis Brasilien uns als Bedrohung betrachtet und sich entweder den Vereinigten Staaten anschließt oder einen Präventivschlag gegen uns startet. Das dürfen wir nicht zulassen."
ARG_march_northwards:0 "Marsch nach Norden"
ARG_march_northwards_desc:0 "Mexiko und Mittelamerika waren überhaupt nicht Teil von Huidobros Plan, aber es ist unmöglich, die Vereinigten Staaten aus der Luft oder vom Meer aus anzugreifen. Deshalb müssen wir ein Opfer bringen und nach Norden marschieren."
ARG_liberate_america:0 "Befreie Amerika"
ARG_liberate_america_desc:0 "Chile, Mexiko, Japan, Spanien, die Philippinen, Kuba, Puerto Rico, Panama, die Dominikanische Republik, Nicaragua, Haiti, China, Russland, Kanada und Hawaii. Alle diese Länder wurden von den USA angegriffen und teilweise sogar annektiert. Nun ist es an der Zeit, alle Opfer dieser blutrünstigen Nation zu rächen, indem Washington niedergebrannt wird!"
ARG_many_rights:0 "Viele Rechte"
ARG_many_rights_desc:0 "Männer und Frauen in Argentinien werden durch Gesetz und Verfassung gleich behandelt. Alle argentinischen Frauen haben nun das Recht zu wählen, zu arbeiten und sogar das Land zu führen!"
ARG_carry_many_duties:0 "Viele Aufgaben übernehmen"
ARG_carry_many_duties_desc:0 "Doch mit vielen Rechten sind auch viele Pflichten verbunden. Dazu gehört beispielsweise die obligatorische militärische Ausbildung, damit im Falle einer ausländischen Invasion jeder Argentinier, ob Mann oder Frau, die Nation verteidigen kann. Völlige Gleichberechtigung bringt auch Nachteile mit sich, nicht wahr?"
ARG_socorro_rojo:0 "Socorro Rojo"
ARG_socorro_rojo_desc:0 "Die Socorro Rojo Internacional (Internationale Rote Hilfe) war ein internationaler Sozialdienst, der 1922 von der Kommunistischen Internationale gegründet wurde. Sie fungierte als internationales Rotes Kreuz und war unabhängig von religiösen Organisationen oder Konfessionen. In Argentinien gab es jedoch bis heute keine offizielle Niederlassung der Socorro Rojo!"
ARG_montoneros:0 "Montoneros"
ARG_montoneros_desc:0 "Die Montoneros oder Montoneras waren Milizen, die im 18. Jahrhundert im Unabhängigkeitskrieg vieler lateinamerikanischer Länder kämpften. Jetzt kämpfen die Montoneras erneut, diesmal jedoch für die Unabhängigkeit der argentinischen Arbeiter!"
ARG_spread_the_revolution:0 "Verbreite die Revolution"
ARG_spread_the_revolution_desc:0 "Wir müssen die Pflicht übernehmen, die Arbeiter Südamerikas und dann der ganzen Welt zu befreien!"
ARG_continue_pinedos_plan:0 "Pinedos Plan fortsetzen"
ARG_continue_pinedos_plan_desc:0 "Federico Pinedos Wirtschaftsplan begann 1933 mit der Absicht, die wirtschaftliche Lage Argentiniens zu verbessern. Die Aufwertung des Peso, die Aufteilung in offiziellen und freien Markt, die Regulierung der Gütermärkte, die Gründung der Zentralbank und die Ausweitung der öffentlichen Ausgaben sollten uns dabei helfen."
ARG_not_more_humillations:0 "Keine weiteren Demütigungen"
ARG_not_more_humillations_desc:0 "Wir wurden von den Briten völlig gedemütigt, als sie uns praktisch zwangen, den Roca-Runciman-Pakt zu unterzeichnen. Wir hoben alle Zölle auf britische Exporte nach Argentinien auf, behandelten britische Unternehmen „sanft“ und übergaben England das Monopol auf argentinische Transporte. Wir müssen unsere Wirtschaft jetzt in Ordnung bringen, damit wir nicht wieder von einem fremden Land versklavt werden!"
ARG_meat_exports:0 "Fleischexporte"
ARG_meat_exports_desc:0 "Argentinien ist weltweit für seine Fleischexporte bekannt. Wir sollten diesen Wirtschaftszweig ausbauen."
ARG_wool_exports:0 "Wollexporte"
ARG_wool_exports_desc:0 "Argentinien war im letzten Jahrzehnt für seine Wollexporte bekannt. Wir sollten die Kapazitäten dieser Industrie ausbauen, um unsere Wirtschaft zu stärken."
ARG_cotton_exports:0 "Baumwollexporte"
ARG_cotton_exports_desc:0 "Die argentinischen Ländereien eignen sich gut für den Baumwollanbau. Mit dem Anbau zu beginnen, wäre für uns sehr vorteilhaft."
ARG_car_production:0 "Automobilproduktion"
ARG_car_production_desc:0 "Viele Autos werden derzeit in Argentinien produziert. Eine Erhöhung der Anzahl von Fabriken mit Kapazitäten zum Fahrzeugbau wird unserer Wirtschaft sicherlich helfen und vielleicht sogar die Produktion von Fahrzeugen für die Armee fördern."
ARG_foreign_intellectuals:0 "Ausländische Intellektuelle"
ARG_foreign_intellectuals_desc:0 "Viele Intellektuelle, meist Juden, Kommunisten und Faschisten, werden letztendlich von der Regierung aus ihrer Heimat vertrieben, aber sie dürfen nicht vergessen, dass wir immer da sein werden, um sie aufzunehmen."
ARG_embrace_the_isi_model:0 "Nutzen Sie das ISI-Modell"
ARG_embrace_the_isi_model_desc:0 "Die „Industrialización por sustitución de importaciones“, also die „Industrialisierung durch Importsubstitution“, ist ein Wirtschaftsmodell, das in Lateinamerika nach dem Ersten Weltkrieg eingeführt wurde und darauf abzielte, den Import ausländischer Produkte zu stoppen und den Konsum nationaler Güter anzukurbeln."
ARG_agro_exporter_once_again:0 "Erneut Agrarexporteur"
ARG_agro_exporter_once_again_desc:0 "Das ISI-Modell hat sich nach seiner schwachen Leistung in den meisten lateinamerikanischen Ländern als unerreichbare Utopie erwiesen. Wenn wir unsere Wirtschaft wieder in Schwung bringen wollen, sollten wir einen liberaleren Ansatz verfolgen, wie vor der Großen Depression."
ARG_promote_national_consumer_goods:0 "Förderung nationaler Konsumgüter"
ARG_promote_national_consumer_goods_desc:0 "Wenn wir unsere Bevölkerung dazu ermutigen, einheimische Waren zu kaufen, wird dies zur Erholung unserer Wirtschaft beitragen und sie deutlich weniger von ausländischen Produkten abhängig machen."
ARG_increase_the_national_industry:0 "Steigerung der nationalen Industrie"
ARG_increase_the_national_industry_desc:0 "Wir müssen mit dem Ausbau der nationalen Industrie beginnen, damit wir überhaupt nicht von ausländischen Exporten abhängig sind."
ARG_free_trade_deals:0 "Freihandelsabkommen"
ARG_free_trade_deals_desc:0 "Der Abschluss von Freihandelsabkommen mit anderen Ländern wird uns dabei helfen, die Erholung unserer Wirtschaft zu erreichen."
ARG_promote_foreign_investiment:0 "Förderung ausländischer Investitionen"
ARG_promote_foreign_investiment_desc:0 "Wir werden Argentinien nicht allein industrialisieren können, aber glücklicherweise gibt es viele Nationen, die bereit sind, uns bei der Verwirklichung dieses Traums zu helfen."
ARG_reject_british_monopolies:0 "Britische Monopole ablehnen"
ARG_reject_british_monopolies_desc:0 "Jetzt, da unsere Wirtschaft wieder stabil ist, werden wir die britischen Monopole zerstören, die Argentinien plagen, auch wenn es sie verärgert!"
ARG_fmse:0 "FMSE"
ARG_fmse_desc:0 "Die Fabricaciones Militares Sociedad Estado (Staatliche Gesellschaft für Militärgebäude) ist eine staatlich kontrollierte Einrichtung, die militärische Autarkie anstrebt."
ARG_expand_the_ypf:0 "Erweitern Sie den YPF"
ARG_expand_the_ypf_desc:0 "Yacimientos Petrolíferos Fiscales (Fiscal Oilfields) ist ein argentinisches Unternehmen, das 1922 während der ersten Regierung von Hipólito Yrigoyen von General Enrique Mosconi gegründet wurde. Es ist zu einem Vorbild für andere Länder wie Brasilien, Venezuela, Uruguay und Bolivien geworden."
ARG_argentine_intellectuals:0 "Argentinische Intellektuelle"
ARG_argentine_intellectuals_desc:0 "Viele Intellektuelle, meist Juden, Kommunisten und Faschisten, werden von der Regierung aus ihren Heimatländern ausgewiesen. Sie dürfen jedoch nicht vergessen, dass wir immer für sie da sind. Das heißt jedoch nicht, dass es keine Argentinier gibt, die bereit sind, uns bei unseren Ermittlungen zu unterstützen."
ARG_el_ejercito_libertador:0 "El Ejército Libertador"
ARG_el_ejercito_libertador_desc:0 "San Martín und die argentinische Armee trugen zur Befreiung vieler südamerikanischer Nationen bei, darunter Peru, Chile, Uruguay, Paraguay und natürlich Argentinien. Unsere Armee sollte weiterhin als eine Armee angesehen werden, die für die Freiheit Südamerikas kämpft. Es sei denn, es wäre für uns vorteilhafter, wenn wir dies nicht tun würden."
ARG_foreign_weapon_models:0 "Ausländische Waffenmodelle"
ARG_foreign_weapon_models_desc:0 "Unsere Armee braucht die besten Waffen, um unser Vaterland vor unseren Feinden zu verteidigen."
ARG_foreign_artillery_models:0 "Artillerieforschung"
ARG_foreign_artillery_models_desc:0 "Wir sollten unsere Unterstützungswaffen verbessern, um bei den Armeen unserer Feinde Ehrfurcht hervorzurufen!"
ARG_remember_wilhelm_faupel:0 "Gedenken an Wilhelm Faupel"
ARG_remember_wilhelm_faupel_desc:0 "Wilhelm Faupel leitete in den 1920er Jahren die deutsche Militärmission in Argentinien. Er half unserer Armee, ihre Fähigkeiten zu verbessern und die veralteten französischen Doktrinen zu vergessen. Wir sollten uns an seine Lehren erinnern, um die Qualität unserer Armee zu erhalten."
ARG_remember_the_desert_conquest:0 "Erinnern Sie sich an die Wüsteneroberung"
ARG_remember_the_desert_conquest_desc:0 "Zwischen 1878 und 1885 tobte ein Krieg, der als „Eroberung der Wüste“ bekannt wurde. Unsere mächtige Armee eroberte dabei die Wüsten und Hügel Patagoniens. Wir müssen uns an diesen Konflikt erinnern, um unsere Armee besser auf die schwierigen Bedingungen in der Region vorzubereiten."
ARG_remember_the_chaco_conquest:0 "Erinnern Sie sich an die Eroberung des Chaco"
ARG_remember_the_chaco_conquest_desc:0 "Zwischen 1870 und 1917 tobte ein Krieg, der als „Eroberung des Chaco“ bekannt wurde. Unsere mächtige Armee eroberte dabei die heißen und trockenen Weiden des Chaco. Wir müssen uns an diesen Konflikt erinnern, um unsere Armee besser auf die schwierigen Bedingungen in der Region vorzubereiten."
ARG_remember_the_confederation_war:0 "Erinnern Sie sich an den Konföderationskrieg"
ARG_remember_the_confederation_war_desc:0 "Im Konföderationskrieg kämpften wir gegen die peruanische und bolivianische Konföderation, um unser Territorium vor ihren Streitkräften zu verteidigen. Obwohl wir erfolgreich waren, gelang es uns nicht, die Stadt Tarija zurückzuerobern. Wir müssen aus diesem Konflikt lernen und unsere Armee besser auf den Kampf in den Bergen der Atacama vorbereiten."
ARG_argentine_armada:0 "Argentinische Armada"
ARG_argentine_armada_desc:0 "Unsere Marine war seit dem 19. Jahrhundert nicht mehr in einen echten Konflikt verwickelt, aber das bedeutet nicht, dass wir sie vernachlässigen sollten."
ARG_argentine_dockyards:0 "Argentinische Werften"
ARG_argentine_dockyards:0 "Wir können uns nicht darauf verlassen, dass die europäischen Nationen unsere Marine für immer ausbauen. Wir müssen mit dem Bau unserer eigenen Werften beginnen."
ARG_european_dockyards:0 "Europäische Werften"
ARG_european_dockyards_desc:0 "Unser Land verfügt weder über die Industrie noch über die Fähigkeit, eigene Schiffe zu bauen. Doch es gibt unzählige Nationen in Europa, die bereit wären, dies für uns zu tun. Dies könnte jedoch von unseren Nachbarn als Provokation angesehen werden."
ARG_destroyer_designs:0 "Zerstörer-Designs"
ARG_destroyer_designs_desc:0 "Wir werden unser Bestes tun, um neue Zerstörer zu konstruieren, die mit der Technologie unserer Feinde konkurrieren können."
ARG_cruiser_designs:0 "Cruiser-Designs"
ARG_cruiser_designs_desc:0 "Wir werden unser Bestes tun, um neue Kreuzer zu konstruieren, die mit der Technologie unserer Feinde konkurrieren können."
ARG_battle_ship_designs:0 "Schlachtschiff-Designs"
ARG_battle_ship_designs_decs:0 "Wir werden unser Bestes tun, um neue Schlachtschiffe zu konstruieren, die mit der Technologie unserer Feinde konkurrieren können."
ARG_submarine_designs:0 "U-Boot-Designs"
ARG_submarine_designs_desc:0 "Wir werden unser Bestes tun, um neue U-Boote zu konstruieren, die mit der Technologie unserer Feinde konkurrieren können."
ARG_recover_our_islands:0 "Erobern Sie unsere Inseln zurück"
ARG_recover_our_islands_desc:0 "1833 griffen die Amerikaner und Briten die Malvinen an und annektierten sie anschließend unter ihrer imperialistischen Herrschaft. Wir haben unsere Rechte auf den Inseln nie aufgegeben, und jetzt ist es an der Zeit, sie endlich zurückzuerobern!"
ARG_fortify_tierra_del_fuego:0 "Befestigen Sie Feuerland"
ARG_fortify_tierra_del_fuego_desc:0 "Wenn wir die Malvinas zurückgewinnen wollen, müssen wir unsere Militärstützpunkte in Feuerland schützen!"
ARG_argentine_airforce:0 "Die argentinische Luftwaffe"
ARG_argentine_airforce_desc:0 "Unsere Luftwaffe hat im Gegensatz zu unserem Heer und unserer Marine nie an Kampfhandlungen oder Kriegen teilgenommen. Das heißt jedoch nicht, dass wir sie vernachlässigen sollten."
ARG_focus_on_agility:0 "Fokus auf Agilität"
ARG_focus_on_agility_desc:0 "Unsere Flugzeuge sollten in der Lage sein, feindliche Flugzeuge nach Belieben zu verfolgen und ihnen auszuweichen."
ARG_focus_on_range:0 "Fokus auf Reichweite"
ARG_focus_on_range_desc:0 "Unsere Flugzeuge sollten unsere riesigen Gebiete problemlos abdecken können, sonst wären sie nicht hilfreich."
ARG_focus_on_coverage:0 "Fokus auf Abdeckung"
ARG_focus_on_coverage_desc:0 "Unsere Bomber sollten in der Lage sein, eine breite Front abzudecken, sonst würden sie ihre einzige Aufgabe nicht erfüllen."
ARG_focus_on_precision:0 "Fokus auf Präzision"
ARG_focus_on_precision_desc:0 "Unsere Bomber sollten in der Lage sein, den feindlichen Truppen präzise und tödliche Schläge zu versetzen, auch wenn dies eine geringere Reichweite bedeutet."
ARG_learn_from_europe:0 "Von Europa lernen"
ARG_learn_from_europe_desc:0 "Um die Leistungsfähigkeit unserer Luftwaffe zu steigern, sollten wir die deutschen und britischen Luftdoktrinen nachahmen."
ARG_increase_argentine_metallurgy:0 "Argentinische Metallurgie"
ARG_increase_argentine_metallurgy_desc:0 "Um unsere Armeen versorgen zu können, ist die Metallgewinnung notwendig."
ARG_ask_for_control_of_the_malvinas:0 "Fordern Sie die Kontrolle über die Malvinas"
ARG_ask_for_control_of_the_malvinas_desc:0 "Nachdem wir uns nun ihrem Kampf angeschlossen haben, sind unser Volk und unsere Regierung der Ansicht, dass die Briten eher bereit sein sollten, uns die Kontrolle über die Malvinen zurückzugeben."
ARG_modernize_the_army:0 "Modernisierung der Armee"
ARG_modernize_the_army_desc:0 "Die Deutschen haben der Welt bewiesen, dass die neue Art der Kriegsführung der Einsatz schneller motorisierter Divisionen mit Panzerunterstützung ist. Wir werden die erste Nation in Südamerika sein, die diese neue Doktrin übernimmt."
ARG_work_with_what_we_have:0 "Ein offensives Militär"
ARG_work_with_what_we_have_desc:0 "Durch den Einsatz von Artillerie und Luftunterstützung kann unsere Armee jede feindliche Nation schnell besiegen."
ARG_defend_the_nation:0 "Verteidige die Nation"
ARG_defend_the_nation_desc:0 "Wir kontrollieren viele Wälder und Flüsse sowie Wüsten und Berge. Um unsere Unabhängigkeit zu verteidigen, sollten wir einer Verteidigungsdoktrin folgen."
ARG_expand_the_army:0 "Erweitern Sie die Armee"
ARG_expand_the_army_desc:0 "Wir sind eine der bevölkerungsreichsten Nationen Südamerikas. Diesen Vorteil sollten wir nutzen."
ARG_the_new_cavalry:0 "Die neue Kavallerie"
ARG_the_new_cavalry_desc:0 "Kavallerie ist veraltet. Wir müssen weitermachen, bevor es zu spät ist, indem wir die Produktion und den Einsatz von Panzerdivisionen erforschen."
ARG_moder_san_martin_regiment:0 "Modernes San Martín Regiment"
ARG_moder_san_martin_regiment_desc:0 "Das Grenadier-Kavallerieregiment „San Martín“ soll modernisiert werden, um auf den Schlachtfeldern des neuen Jahrzehnts wettbewerbsfähig zu sein."
ARG_trench_warfare:0 "Grabenbau"
ARG_trench_warfare_desc:0 "Unsere Armee wird darin geschult, im Falle einer Invasion schnell Schützengräben und Befestigungen an Schlüsselpunkten entlang unserer Grenzen zu errichten."
ARG_deterrence:0 "Abschreckung"
ARG_deterrence_desc:0 "Wenn wir unsere Nachbarn durch den Bau von Festungen entlang unserer Grenze abschrecken, werden wir zahllose argentinische Leben retten."
ARG_sustain_the_army:0 "Unterstützen Sie die Armee"
ARG_sustain_the_army_desc:0 "Wir müssen unsere Geschicklichkeit beim Bau von Infanteriewaffen verbessern, damit kein argentinischer Soldat ohne eine solche Waffe in die Schlacht zieht."
ARG_mass_conscription:0 "Massenrekrutierung"
ARG_mass_conscription_desc:0 "Die Wehrpflicht für die argentinische Jugend wird uns dabei helfen, die Größe unserer Armee schnell zu erhöhen."
PAR_revolucion_febrerista:0 "Revolución Febrerista"
PAR_revolucion_febrerista_desc:0 "Die Regierung von Eusebio Ayala erwies sich als inkompetent und konnte selbst die grundlegendsten öffentlichen Aufgaben nicht erfüllen. Obwohl sie uns den Sieg im Chaco-Krieg bescherte, kehrten unsere tapferen Soldaten nur mit Schulden, verlorenen Kameraden und humpelnd zurück. Mittlerweile sind fast alle Parteien gegen die Regierung, und da die Militärführung beginnt, die Gegner zu unterstützen, kursieren in Asunción Putschgerüchte."
PAR_exile_our_enemies:0 "Verbannen Sie unsere Feinde"
PAR_exile_our_enemies_desc:0 "Marschall Estigarribia und der ehemalige Präsident Eusebio Ayala stellen eine Gefahr für unsere neue sozialistische Regierung dar. Minister Gómez Freire drohte ihnen mit der Erschießung wegen Hochverrats, doch unser wohlwollender Führer Rafael Franco, der auf Guarani affektiert León Karê (Lahmer Löwe) genannt wird, hält ein vorübergehendes Exil für ausreichend."
PAR_help_our_workers:0 "Helfen Sie unseren Mitarbeitern"
PAR_help_our_workers_desc:0 "Paraguayische Arbeiter wurden aufgrund ihrer fehlenden Rechte stark unterdrückt. Rafael Franco hat zahlreiche Reformen eingeleitet, um die Situation zu ändern, wie z. B. die Einführung eines Achtstundentages, die Einführung von Weihnachtsgeschenken und bezahltem Urlaub, die Einführung der Sonntagsruhe als Pflicht, die Entkriminalisierung von Gewerkschaften und vieles mehr!"
PAR_military_pensions:0 "Militärrenten"
PAR_military_pensions_desc:0 "Es ist richtig, Kriegsveteranen, Familien der Verstorbenen und vielen anderen Einsatzkräften eine angemessene Entschädigung für die Verteidigung unseres Landes im Chaco-Krieg zu zahlen, auch wenn dies letztlich zu Lasten unserer Wirtschaft geht."
PAR_land_reform:0 "Bodenreform"
PAR_land_reform_desc:0 "Rafael Franco hat die erste Landreform Paraguays erlassen. Rund 10.000 Familien können nun Land erwerben, da die Regierung ihnen Grundstücke zwischen 10 und 50 Hektar zu einem äußerst fairen Preis und mit fairen Steuern verkauft hat."
PAR_land_redistribution:0 "Landumverteilung"
PAR_land_redistribution_desc:0 "Rafael Franco weiß, dass es in Paraguay viel ungenutztes Land gibt, und er weiß bereits, was damit geschehen soll. Indem wir es an Landwirte vergeben, die kaum noch Land haben, können wir unsere Agrarproduktion steigern und damit unsere Wirtschaft stärken."
PAR_lift_immigration_prohibitions:0 "Aufhebung der Einwanderungsverbote"
PAR_lift_immigration_prohibitions_desc:0 "Das Einwanderungsgesetz von 1903 verbietet allen „Gelben“ die Einreise nach Paraguay. Rafael Franco hat dieses schwachsinnige Gesetz aufgehoben und ein Abkommen mit der japanischen Regierung über die Einreise von 100 japanischen Familien in Paraguay geschlossen."
PAR_rewrite_the_constitution:0 "Schreiben Sie die Verfassung neu"
PAR_rewrite_the_constitution_desc:0 "Die Verfassung von 1870 hat sich als unfähig erwiesen, Paraguay zu Stabilität zu verhelfen. Wir müssen sie aufheben und eine neue Verfassung schaffen, die sich auf die Unterstützung aller Völker Paraguays konzentriert."
PAR_heroes_of_paraguay:0 "Helden von Paraguay"
PAR_heroes_of_paraguay_desc:0 "Francisco Solano López, Führer Paraguays während des Dreibundkriegs, sowie Leutnant Adolfo Rojas Silva, der 1927 von bolivianischen Barbaren feige ermordet wurde, sollten als Helden der Nation in Erinnerung bleiben. Ivan Beliayev sollte aufgrund seiner Leistung im Chaco-Krieg auch als Ehrenbürger Paraguays gelten."
PAR_viva_leon_kare:0 "Viva León Karê!"
PAR_viva_leon_kare_desc:0 "Arbeitnehmerrechte, Landreformen, Militärrenten – was hat León Karê nicht alles für uns getan? Er hat der Nation gezeigt, dass er tatsächlich der Einzige ist, der Paraguay eine bessere Zukunft schenken kann. Es lebe León Karê, Vater Paraguays! Ñapu&#39;āke lo mitá León Karê!"
PAR_counter_revolution:0 "Konterrevolution"
PAR_counter_revolution_desc:0 "Heute haben Militäroffiziere Rafael Franco abgesetzt und ins Exil geschickt, genau wie er es mit Estigarribia und Eusebio Ayala getan hatte. Estigarribia wird ins Land zurückkehren, während Ayala leider tot in einem fremden Land liegt, da er es nicht geschafft hat, der Versuchung zu widerstehen, seine Heimat wiederzusehen. Nun wird eine provisorische Regierung Paraguay bis zu den Wahlen regieren."
PAR_guarani_caesar:0 "Guarani Caesar"
PAR_guarani_caesar_desc:0 "Wie Cäsar wirkt sich León Karês Popularität positiv auf die Demokratie in Paraguay aus. Und solange der Brutus dieser Geschichte, Estigarribia, im Exil bleibt, wird es noch lange keine Demokratie geben. Doch was, wenn diese Diktatur das Richtige ist? Schließlich hat er in einem Jahr mehr Menschen geholfen als Eusebio Ayala während seiner gesamten Regierung ..."
PAR_guarani_cincinnati:0 "Guarani Cincinnatus"
PAR_guarani_cincinnati_desc:0 "Nach der Stabilisierung Paraguays setzte Rafael Franco das Parlament wieder ein und ebnete den Weg für eine demokratischere Nation. Wie Cincinnatus trat auch León Karê von der Diktatur zurück, nachdem die Kräfte, die sein Land bedrohten, besiegt waren."
PAR_bolivias_enemy:0 "Boliviens Feind"
PAR_bolivias_enemy_desc:0 "Obwohl Bolivien 50 Jahre vergangen sind, seit es Antofagasta an Chile verlor, beansprucht es es immer noch als rechtmäßiges bolivianisches Territorium, das die Chilenen „feige gestohlen“ hatten. Wenn Bolivien sie weiterhin provoziert, werden sie die verdiente Belohnung erhalten: Feinde an zwei Fronten."
PAR_argentinas_enemy:0 "Argentiniens Feind"
PAR_argentinas_enemy_desc:0 "Brasilien pflegte schon immer eine langjährige Rivalität mit Argentinien, die in den letzten Jahrzehnten etwas abgekühlt ist. Das heißt jedoch nicht, dass sie wahrscheinlich bereit wären, vorsichtshalber ein Verteidigungsbündnis mit uns zu schließen."
PAR_not_another_1870:0 "Nicht noch ein 1870"
PAR_not_another_1870_desc:0 "Unsere Nation wurde 1870 am Ende des Großen Krieges, auch bekannt als Dreibundkrieg, von den Brasilianern und Argentiniern praktisch zerstört. Wir dürfen nicht zulassen, dass so etwas noch einmal passiert."
PAR_join_the_allies:0 "Schließen Sie sich den Verbündeten an"
PAR_join_the_allies_desc:0 "Ironischerweise suchen die Alliierten nun nach weiteren Verbündeten, da ihre Koalition die Aggressionen totalitärer Regime in Europa offenbar nicht eindämmen kann. Nun könnten sie bereit sein, uns in ihr Bündnis aufzunehmen."
PAR_the_new_paraguay:0 "Das neue Paraguay"
PAR_the_new_paraguay_desc:0 "Wir dürfen nicht zulassen, dass Wut und Hass unser Land anheizen. Nach dem Rücktritt Rafael Francos als Diktator ist es an der Zeit, alle Verbannten, darunter Marschall Estigarribia, zurückzuholen. Leider hatte Eusebio Ayala nicht genug Zeit, um seine Heimat wiederzusehen. Sein Leichnam wird jedoch für eine würdige Beerdigung nach Paraguay überführt."
PAR_under_the_lions_protection:0 "Unter dem Schutz des Löwen"
PAR_under_the_lions_protection_desc:0 "León Karê weiß, was für Paraguay gut ist. Er hat eine Abschreckungskampagne gestartet, die unser Land unbesiegbar machen und durch Festungen und Luftabwehrstellungen schützen soll. Solange der Löwe brüllt, werden wir nicht wieder fallen!"
PAR_estigarribias_presidency:0 "Estigarribias Präsidentschaft"
PAR_estigarribias_presidency_desc:0 "Nach seiner Rückkehr nach Paraguay nach langem Exil unterstützten Generäle und Offiziere des Militärs Estigarribia als Kandidaten für die Präsidentschaft Paraguays. Nach der Zustimmung der liberalen Übergangsregierung setzte der Marschall die Verfassung außer Kraft und erklärte, dass Paraguay in Anarchie verfallen werde und die Demokratie wiederhergestellt werde, sobald die Stabilität wiederhergestellt sei."
PAR_lift_press_censorship:0 "Aufhebung der Pressezensur"
PAR_lift_press_censorship_desc:0 "Um negative politische Meinungen zu beschwichtigen und eine Verschärfung der Anarchie zu verhindern, hat Estigarribia der Presse und den Aktivitäten politischer Parteien weitreichende Freiheiten gewährt."
PAR_economic_cooperation:0 "Wirtschaftliche Zusammenarbeit"
PAR_economic_cooperation_desc:0 "Da Paraguay das erste Land war, das die Chaco-Konferenz respektierte und Kriegsveteranen half, begannen die USA mit einer wirtschaftlichen Zusammenarbeit, um zur Verbesserung unserer Infrastruktur und Industrie beizutragen."
PAR_estado_fuerte:0 "Estado Fuerte"
PAR_estado_fuerte_desc:0 "Estado Fuerte, was so viel bedeutet wie „starker Staat“, ist eine Politik Estigarribias, um die zunehmende Verbreitung von Militarismus und Nationalsozialismus im Land zu verhindern. Die Verfassung wird derzeit überarbeitet, um die Macht und Überlebensfähigkeit der Regierung zu stärken."
PAR_altos_tragedy:0 "Altos-Tragödie"
PAR_altos_tragedy_desc:0 "Heute starb der bekannte Marschall José Félix Estigarribia zusammen mit seiner Frau Julia Miranda Cueto bei einem Flugzeugunglück in der Stadt Altos. Paraguays Schicksal scheint düsterer denn je."
PAR_authoritarian_democracy:0 "Autoritäre Demokratie"
PAR_authoritarian_democracy_desc:0 "Estigarribias Regierung hat sich zu einem autoritären Regime entwickelt, in dem alle Macht in den Händen des Marschalls liegt. Um die Bevölkerung davon zu überzeugen, dass sie nicht erneut in einer Diktatur lebt, werden wir sie davon überzeugen, dass es sich um eine neue Form der Demokratie handelt, eine ziemlich autoritäre."
PAR_tiempismo:0 "Tiempismo"
PAR_tiempismo_desc:0 "Der Tiempismus, dessen Name von der paraguayischen Zeitung „El Tiempo“ (Die Zeit) stammt, ist eine vom iberischen Korporativismus inspirierte Ideologie, die von Katholiken und Konservativen angeführt wird und sich gegen die PLRA und den Liberalismus richtet. Higinio Morínigo unterstützt diese Doktrin derzeit ebenso wie viele faschistische Anhänger im Land."
PAR_the_darkest_day:0 "Der dunkelste Tag"
PAR_the_darkest_day_desc:0 "Jetzt, da Alfredo Stroessner, ein Antikommunist, dessen Inspiration unter anderem der Nationalsozialismus und Adolf Hitler waren, das Land regiert, ist es nicht übertrieben zu sagen, dass dies einer der finstersten Tage Paraguays ist. Seit politische Morde und Folterungen begonnen haben, bleibt nur noch das Beten, denn es scheint, als sei Gott selbst der Einzige, der Paraguay noch retten kann …"
PAR_guion_rojo:0 "Guión Rojo"
PAR_guion_rojo_desc:0 "Die Guión Rojo (spanisch für „Roter Strich“ oder „Rote Schrift“) ist eine paramilitärische konservative Gruppe unter Führung der Partido Colorado (spanisch für „Gefärbte Partei“ oder „Scharlachrote Partei“), einer konservativen und religiösen Partei. Die Mitglieder der Guión Rojo sind nationalistisch und antidemokratisch eingestellt und stehen den Liberalen und Linken des Landes feindlich gegenüber. Es könnte von Vorteil sein, diese Menschen auf unserer Seite zu haben."
PAR_frente_de_guerra:0 "Fronte de Guerra"
PAR_frente_de_guerra_desc:0 "Die Frente de Guerra (Kriegsfront) ist ein politischer Zweig unserer Armee, der für seine Unterstützung des Nationalsozialismus und seine Bewunderung für die deutsche Armee bekannt ist. Sie wird Ihnen sicherlich weiterhelfen."
PAR_cultural_isolation:0 "Kulturelle Isolation"
PAR_cultural_isolation_desc:0 "Die Regierung von Higinio Moríngo verfolgt derzeit eine nationalistische Rhetorik und lehnt ausländische kulturelle Einflüsse ab. Presse, Kino und Theater müssen nun alle vor ihrer Veröffentlichung von den Behörden genehmigt werden. Zu den Kontrollmaßnahmen gehören unter anderem die Todesstrafe für Landesverrat und strenge Strafen für geringfügige Straftaten."
PAR_secret_police:0 "Geheimpolizei"
PAR_secret_police_desc:0 "Um Kriminelle, Terroristen und Kommunisten auszurotten, muss eine Geheimpolizei gebildet werden. Politische Morde, Entführungen und Folter werden bei Bedarf eingesetzt. Alles wird getan, wenn es Paraguay hilft, wieder eine große Nation zu werden."
PAR_comfort_women:0 "Trostfrauen"
PAR_comfort_women_desc:0 "„Miss, Ihre Tochter wurde von der Regierung gebeten, Stroessner zu dienen.“\n„Aber, Herr Offizier, weiß General Stroessner nicht, dass sie erst 12 Jahre alt ist?“\n„Hören Sie mich an. Mädchen über 15 Jahre haben zu harte Knochen.“"
PAR_german_support:0 "Deutscher Support"
PAR_german_support_desc:0 "Nachdem wir den Deutschen nun die Treue geschworen haben, werden sie sicherlich bereit sein, uns bei der Verbesserung der Ausrüstung unserer Streitkräfte zu helfen."
PAR_german_exiles:0 "Deutsche Exilanten"
PAR_german_exiles_desc:0 "Nach ihrem Sturz suchen die Nazis nach Fluchtmöglichkeiten. Sie wissen, dass sie genau hier eine neue Heimat finden können."
PAR_join_the_axis:0 "Treten Sie der Achse bei"
PAR_join_the_axis_desc:0 "Wir müssen uns unseren Brüdern in Europa anschließen, nur dann können wir Paraguay wieder zu Größe verhelfen."
PAR_reform_the_constitution:0 "Reform der Verfassung"
PAR_reform_the_constitution_desc:0 "Nachdem Estigarribia die Verfassung vollständig reformiert hat, liegt die gesamte Macht bei ihm, während die Legislative und die Judikative bloße Marionetten des Präsidenten sind."
PAR_reject_totalitarism:0 "Lehnen Sie den Totalitarismus ab"
PAR_reject_totalitarism_desc:0 "Unser Land muss jederzeit bereit sein, sich gegen die Kräfte des Faschismus und Kommunismus zu verteidigen. Wir müssen mit dem Ausbau der Armee beginnen, bevor es zu spät ist."
PAR_punish_the_inoperatives:0 "Bestrafen Sie die Arbeitsunfähigen"
PAR_punish_the_inoperatives_desc:0 "Zu Beginn seiner Regierung führte Estigarribia eine Agrarreform durch, die Land als Instrument einer sozialen Funktion betrachtete und jedem paraguayischen Bürger die Verpflichtung auferlegte, sich auf einem Stück Land niederzulassen, das seinen Wohlstand garantiert. Zudem bekämpfte er unproduktive Großfarmen. Nun wird er versuchen, diese Maßnahmen fortzusetzen."
PAR_the_only_man_in_asuncion:0 "Der einzige Mann in Asunción"
PAR_the_only_man_in_asuncion_desc:0 "Estigarribia hat sich als der Einzige erwiesen, der Paraguay mit seinen Reformen stabilisieren konnte. Er mag ein autoritärer Diktator sein, aber immerhin tötet er nicht sein eigenes Volk wie die Sowjets und schickt es nicht in sinnlose Kriege wie die Deutschen."
PAR_join_the_allies2:0 "Schließen Sie sich den Verbündeten an"
PAR_join_the_allies2_desc:0 "Ironischerweise suchen die Alliierten nun nach weiteren Verbündeten, da ihre Koalition die Aggressionen totalitärer Regime in Europa offenbar nicht eindämmen kann. Nun könnten sie bereit sein, uns in ihr Bündnis aufzunehmen."
PAR_import_industrial_tools:0 "Importieren Sie Industriewerkzeuge"
PAR_import_industrial_tools_desc:0 "Unsere Industrie ist derzeit völlig unterentwickelt. Um diese Situation zu verbessern, müssen wir Industriewerkzeuge aus Europa und den USA importieren."
PAR_cotton_production:0 "Baumwollproduktion"
PAR_cotton_production_desc:0 "Wir exportieren seit Jahrzehnten Baumwolle und haben damit unserer Wirtschaft, die im Dreibundkrieg zerstört wurde, enorm geholfen. Es gibt keinen Grund, die Baumwollproduktion nicht fortzusetzen."
PAR_mate_production:0 "Mate-Produktion"
PAR_mate_production_desc:0 "Vor der Weltwirtschaftskrise importierte Argentinien große Mengen Mate-Tee aus den USA. Das änderte sich jedoch mit der Wirtschaftskrise. Jetzt, da die Lage stabiler ist, können sie ihn möglicherweise wieder von uns kaufen."
PAR_plant_oil_production:0 "Pflanzenölproduktion"
PAR_plant_oil_production_desc:0 "Pflanzenöle werden derzeit hier in Paraguay gewonnen. Der Export oder der Verkauf auf dem nationalen Markt wird uns sicherlich helfen."
PAR_foreign_weapon_industry:0 "Ausländische Waffenindustrie"
PAR_foreign_weapon_industry_desc:0 "Wir sind nicht in der Lage, unsere eigenen Waffen zu produzieren, aber es gibt unzählige Nationen, die bereit wären, dies für uns zu einem fairen Preis zu tun."
PAR_popular_universities:0 "Beliebte Universitäten"
PAR_popular_universities_desc:0 "Rafael Franco begann mit dem Bau von Volksuniversitäten und senkte die Zulassungsvoraussetzungen für Schulen und Hochschulen. Wir müssen diese Arbeit fortsetzen, damit unsere Arbeiter und Wissenschaftler besser vorbereitet und erfahrener sind."
PAR_schooling_campaign:0 "Schulkampagne"
PAR_schooling_campaign_desc:0 "Rafael Franco förderte den Bau neuer Schulen in Paraguay. Die Fortsetzung dieser Arbeit würde unseren Bürgern mehr Chancen auf bessere Arbeitsplätze und Lebensbedingungen bieten und die Qualität unserer Wissenschaftler verbessern."
PAR_like_before_the_triple_alliance:0 "Wie vor dem Dreibund"
PAR_like_before_the_triple_alliance_desc:0 "Vor dem Dreibundkrieg waren wir als erstes südamerikanisches Land mit Telegrafen und Eisenbahnen sowie einem relativ hohen Industrialisierungsgrad bekannt, doch all dies wurde von den brasilianischen und argentinischen Barbaren zerstört. Doch dieses Mal wird uns niemand aufhalten können."
PAR_continue_our_new_tradition:0 "Setzen Sie unsere neue Tradition fort"
PAR_continue_our_new_tradition_desc:0 "Unsere Wirtschaft ist seit Jahrzehnten auf Exporte angewiesen und lief bis zur Weltwirtschaftskrise gut. Es gibt jedoch keine Rückkehr zu den alten Zeiten der Industrialisierung. Wir müssen also an dem festhalten, was wir jetzt haben, und nicht an dem, was wir hätten haben können."
PAR_paraguayian_autarky:0 "Paraguayische Autarkie"
PAR_paraguayian_autarky_desc:0 "Damit unser Land nicht erneut vor unseren Feinden in die Knie geht, müssen wir autark sein. Wir müssen sicherstellen, dass unser Land in der Lage ist, sich selbst mit ausreichend Nahrungsmitteln und Waffen zu versorgen und seine Ressourcen effektiv zu fördern."
PAR_unstopable_progress:0 "Unaufhaltsamer Fortschritt"
PAR_unstopable_progress_desc:0 "Jetzt, da wir wieder mit der Industrialisierung begonnen haben, sind unser Fortschritt und unser Wachstum nicht mehr aufzuhalten. Bald werden wir in Südamerika eine große Rolle spielen."
PAR_free_trade_deals:0 "Freihandelsabkommen"
PAR_free_trade_deals_desc:0 "Der Abschluss von Freihandelsabkommen mit anderen Ländern wird uns dabei helfen, die Erholung unserer Wirtschaft zu erreichen."
PAR_promote_foreign_investiment:0 "Förderung ausländischer Investitionen"
PAR_promote_foreign_investiment_desc:0 "Wir werden Chile nicht allein industrialisieren können, aber glücklicherweise gibt es viele Nationen, die bereit sind, uns bei der Verwirklichung dieses Traums zu helfen."
PAR_chaco_resource_extraction:0 "Chaco-Ressourcengewinnung"
PAR_chaco_resource_extraction_desc:0 "Wir sollten die wenigen Ressourcen nutzen, die uns im Chaco zur Verfügung stehen."
PAR_chaco_oil_extraction:0 "Chaco-Öl-Extraktion"
PAR_chaco_oil_extraction_desc:0 "Auch wenn es im Chaco nicht viel Öl gibt, sollten wir daran arbeiten, es zu fördern. Das wird sicherlich hilfreich sein."
PAR_mickey_paraguay:0 "Mickey Paraguay"
PAR_mickey_paraguay_desc:0 "Gegründet 1935 vom italienischen Einwanderer Pascual Blasco, der das Bild der bekannten Zeichentrickfigur Mickey Mouse für den Verkauf von Obst und Gemüse verwendete. Manche Leute halten es vielleicht für unangebracht, das Bild einer Figur eines anderen Unternehmens für den Verkauf unserer Produkte zu verwenden, aber was wollen sie tun? 58 Jahre nach der Gründung noch etwas von uns verlangen oder so?"
PAR_exiled_intellectuals:0 "Exilierte Intellektuelle"
PAR_exiled_intellectuals_desc:0 "Während des russischen Bürgerkriegs kamen viele weißrussische Exilanten auf der Flucht vor den kommunistischen Truppen in unser Land, darunter auch General Ivan Beliaynev. Heute suchen unzählige Exilanten aus vielen Ländern eine neue Heimat, und wir sind bereit, sie aufzunehmen."
PAR_the_valiant_army:0 "Die tapfere Armee"
PAR_the_valiant_army_desc:0 "Unsere tapfere Armee hat unsere Nation immer vor ausländischen und nationalen Bedrohungen verteidigt und wird dies bis zum Ende tun!"
PAR_speed_the_wars_up:0 "Beschleunigen Sie die Kriege"
PAR_speed_the_wars_up_desc:0 "Nachdem wir in den letzten Jahren des Dreibundkrieges 50 bis 80 Prozent unserer männlichen Bevölkerung und einen Großteil unseres Territoriums verloren hatten, gerieten wir in ein erhebliches Arbeitskräfteproblem. Wenn es uns gelingt, die wichtigsten Städte unserer Feinde einzunehmen und ihre besten Divisionen einzukesseln, können wir Leben retten und den Krieg schnell beenden."
PAR_not_lose_anyone:0 "Niemanden verlieren"
PAR_not_lose_anyone_desc:0 "Nachdem wir in den letzten Jahren des Dreibundkrieges 50 bis 80 Prozent unserer männlichen Bevölkerung und einen Großteil unseres Territoriums verloren hatten, begannen wir mit einem erheblichen Personalmangel zu kämpfen. Wenn es uns gelingt, das Leben unserer Soldaten auf dem Schlachtfeld durch den Einsatz von Artillerie und Luftwaffe anstelle sinnloser Offensiven zu retten und Feldlazarette in die Armee zu integrieren, können wir die Situation im Kriegsfall möglicherweise entschärfen."
PAR_native_armies:0 "Einheimische Armeen"
PAR_native_armies_desc:0 "Während Länder wie die USA oder Argentinien begannen, ihre Ureinwohner zu bekämpfen und sogar auszurotten, begannen wir, sie in unsere Gesellschaft zu integrieren. Wir lernten die Sprache der Guarani, wurden zu einer zweisprachigen Nation und akzeptierten ihre Kultur als die unsere. Im Gegenzug bekamen wir ein Land ohne einheimische Guerillas, die um die Rückeroberung ihres alten Landes kämpften, und einheimische Armeen, die bereit waren, wie jeder andere Paraguayer auch, für uns zu kämpfen."
PAR_guerra_grande_trauma:0 "Guerra Grande Trauma"
PAR_guerra_grande_trauma_desc:0 "Während des Dreibundkrieges, in Paraguay als Guerra Grande bekannt, verloren wir unser gesamtes Eisenbahnnetz, Telegrafennetz und unsere Industrie. Häuser wurden geplündert, Kinder ermordet und Krankenhäuser niedergebrannt. Große Teile unseres Territoriums gingen verloren, ebenso wie rund 60 % unserer männlichen Bevölkerung. Wir dürfen so etwas nie wieder zulassen, selbst wenn wir dafür jeden Paraguayer im Land opfern müssten."
PAR_armor_doesnt_die:0 "Rüstung stirbt nicht"
PAR_armor_doesnt_die_desc:0 "Panzer sind zwar schwer herzustellen, eignen sich aber hervorragend zum Schutz ihrer Besatzung vor feindlichen Kugeln und Granaten. Wir sollten mit der Erforschung dieser nützlichen Technologie beginnen, um den Tod unserer Bevölkerung zu verhindern."
PAR_shells_dont_die:0 "Muscheln sterben nicht"
PAR_shells_dont_die_desc:0 "Wir können unzählige Leben retten, wenn wir unsere Feinde sicher aus der Ferne beschießen können. Wir sollten diese nützliche Technologie erforschen, um den Tod unserer Bevölkerung zu verhindern."
PAR_purchease_heavy_tanks:0 "Tanks kaufen"
PAR_purchease_heavy_tanks_desc:0 "Wir werden den großen Nationen Panzer kaufen, um unsere Armeen versorgen zu können."
PAR_national_production:0 "Nationale Produktion"
PAR_national_production_desc:0 "Wir müssen damit beginnen, in unserem Land Panzer zu bauen, damit wir es vor den Wilden Südamerikas schützen können."
PAR_medic_corps:0 "Sanitäterkorps"
PAR_medic_corps_desc:0 "Jedes Korps der paraguayischen Armee sollte über ein eigenes Sanitätskorps verfügen, damit wir das Leben unserer Soldaten nach Möglichkeit retten können."
PAR_air_artillery:0 "Luftartillerie"
PAR_air_artillery_desc:0 "Luftnahunterstützung spielt in der modernen Kriegsführung eine wichtige Rolle. Die Luftartillerie wird den Krieg in Südamerika verändern."
PAR_new_weapons:0 "Neue Waffen"
PAR_new_weapons_desc:0 "Der Krieg verändert sich, und das gilt auch für die Standardgewehre. Wir müssen neue Modelle erforschen, um unsere Feinde bekämpfen zu können."
PAR_birth_of_a_navy:0 "Geburt einer Marine"
PAR_birth_of_a_navy_desc:0 "Wir werden mit dem Aufbau einer Marine beginnen, die auf der ganzen Welt bekannt sein wird und die bei allen unseren Feinden Angst einflößt."
PAR_expand_our_airforce:0 "Erweitern Sie unsere Luftwaffe"
PAR_expand_our_airforce_desc:0 "Flugzeuge sind in der modernen Kriegsführung genauso wichtig wie jeder andere Teil der Armee. Wir müssen jetzt mit ihrem Ausbau beginnen, wenn wir in diesen schwierigen Zeiten kampffähig sein wollen."
PAR_investigation_effort:0 "Untersuchungsaufwand"
PAR_investigation_effort_desc:0 "Nachdem wir nun unsere Kontrolle über eine Küste festigen konnten, ist es an der Zeit, mit der Erforschung der neuesten Marinemodelle zu beginnen."
PAR_european_contracts:0 "Europäische Verträge"
PAR_european_contracts_desc:0 "Wir müssen anfangen, neue Marineaufträge zu erhalten, damit wir irgendwann mit dem Bau unserer eigenen Schiffe beginnen können."
PAR_paraguayian_dockyards:0 "Paraguayische Werften"
PAR_paraguayian_dockyards_desc:0 "Nachdem wir nun unsere ersten Werften gebaut haben, können wir endlich eine Marinepräsenz im Atlantik aufbauen!"
PAR_foreign_naval_trainers:0 "Ausländische Marinetrainer"
PAR_foreign_naval_trainers_desc:0 "Wir werden europäische Admirale zur Ausbildung unserer Matrosen und Kapitäne mitbringen, schließlich ist es schwierig, ohne Hilfe etwas völlig Neues zu lernen."
PAR_air_support:0 "Luftunterstützung"
PAR_air_support_desc:0 "Die Fähigkeit, unsere Feinde aus der Luft zu bombardieren, würde unsere Kriegsanstrengungen erheblich unterstützen. Wir müssen jetzt mit der Erforschung der Luftunterstützung beginnen."
PAR_air_superiority:0 "Luftüberlegenheit"
PAR_air_superiority_desc:0 "Die Fähigkeit, unsere Feinde aus der Luft in Angst und Schrecken zu versetzen, würde uns bei unseren Kriegsanstrengungen enorm helfen. Wir müssen jetzt mit der Erforschung von Kampfflugzeugen beginnen."
PAR_air_base_building:0 "Gebäude des Luftwaffenstützpunkts"
PAR_air_base_building_desc:0 "Flugzeuge können nirgendwo landen, wir müssen jetzt mit dem Bau von Flughäfen beginnen!"
PAR_learn_from_europe:0 "Von Europa lernen"
PAR_learn_from_europe_desc:0 "Um die Leistungsfähigkeit unserer Luftwaffe zu steigern, sollten wir die deutschen und britischen Luftdoktrinen nachahmen."
PAR_recover_paraguays_pride:0 "Den Stolz Paraguays wiederherstellen"
PAR_recover_paraguays_pride_desc:0 "Unsere Nation wurde nach dem Dreibundkrieg zerstört. Eisenbahnen, Telegrafen und Fabriken wurden zerstört, Häuser geplündert, Kinder ermordet und Krankenhäuser niedergebrannt. Ein großer Teil unseres Territoriums ging verloren, ebenso wie rund 60 % unserer männlichen Bevölkerung. Doch jetzt werden wir diese Jahrzehnte der Demütigung rächen!"
PAR_hold_the_chaco:0 "Halte den Chaco"
PAR_hold_the_chaco_desc:0 "Wir dürfen nicht zulassen, dass die Bolivianer uns den Chaco stehlen. Wir müssen einen Präventivschlag gegen sie starten, bevor es zu spät ist!"
PAR_our_old_borders:0 "Unsere alten Grenzen"
PAR_our_old_borders_desc:0 "Wir werden unsere alten Grenzen zurückerobern, die wir nach dem Dreibundkrieg verloren haben. Formosa, Corrientes und Campo Grande werden ein für alle Mal wieder zu unserem Land gehören!"
PAR_liberate_the_natives:0 "Befreie die Eingeborenen"
PAR_liberate_the_natives_desc:0 "Wir werden uns für die Befreiung der Guarani im Rio Grande Sul und der von den Argentiniern versklavten Ureinwohner im Chaco Austral einsetzen. Kein Volk wird sich diesen Barbaren beugen."
PAR_march_to_the_atlantic:0 "Marsch zum Atlantik"
PAR_march_to_the_atlantic_desc:0 "Es ist unser legitimes Recht, einen Weg zum Meer zu besitzen! Um dieses Recht einzufordern, werden wir alle Gegner besiegen und den Río Paraguay vor unseren Feinden schützen."
PAR_multi_ethnic_state:0 "Vielvölkerstaat"
PAR_multi_ethnic_state_desc:0 "Paraguay war schon immer ein multiethnisches Land, bestehend aus Hispanics, Guarani und vielen anderen Ureinwohnern wie den Maskoy, den Guaicuru, den Mataco und den Zamuco. Jetzt werden alle Argentinier, Brasilianer und Bolivianer in Paraguay von unseren multiethnischen Traditionen lernen und lernen, friedlich mit ihren Brüdern und Schwestern zusammenzuleben."
PAR_guard_the_paraguay_river:0 "Bewachen Sie den Paraguay-Fluss"
PAR_guard_the_paraguay_river_desc:0 "Die einzige Nation mit dem Recht, den Río Paraguay und den Chaco zu besitzen, sind wir! Unsere Truppen werden jetzt mit der Ausbildung für den Kampf im Dschungel beginnen und unser rechtmäßiges Land zurückerobern."
PAR_democratic_teachings:0 "Demokratische Lehren"
PAR_democratic_teachings_desc:0 "Unser Land hat eine lange Geschichte militärischer und autokratischer Regierungen. Wir müssen unserem Volk beibringen, dass diese nicht notwendig sind und dass es nur eine gefügige und demokratische Regierung verdient."
PAR_end_militarism:0 "Schluss mit dem Militarismus"
PAR_end_militarism_desc:0 "Das Militär hat im Land große Macht. Rafael Franco hat verstanden, dass, wenn der Militarismus weiterhin die dominierende Kraft in Paraguay bleibt, das Land unweigerlich wieder in ein autokratisches Regime verfallen wird, dem es nur um den Machterhalt und die Tötung politischer Feinde geht. Er wird dafür sorgen, dass die Caudillos für diese Ideen angemessen bestraft werden."
PAR_strike_at_fascism:0 "Schlag gegen den Faschismus"
PAR_strike_at_fascism_desc:0 "Der Faschismus ist wie ein Virus, der die Psyche vieler Nationen weltweit vergiftet. Wie kann eine Regierung versuchen, ihr Volk davon zu überzeugen, dass der einzige Weg zu Größe darin besteht, in sinnlosen Kriegen zu sterben? Eine Regierung muss ihrem Volk helfen, damit es bereit ist, ihr zu helfen. Und genau das werden wir tun, um Amerika vom Faschismus zu befreien."
PAR_destroy_communism:0 "Zerstöre den Kommunismus"
PAR_destroy_communism_desc:0 "Der Marxismus ist eine niederträchtige Ideologie, die behauptet, man könne den Menschen nur helfen, indem man diejenigen tötet und ausraubt, die sich das, was sie besitzen, angestrengt haben. Der Staat muss den Bedürftigen helfen, nicht diejenigen vernichten, die danach streben, besser zu werden oder zumindest mehr Geld zu bekommen. Wir müssen Amerika vom Marxismus befreien, wenn wir Frieden auf unserem Kontinent wollen."
CAN_a_north_american_union:0 "Eine nordamerikanische Union"
CAN_a_north_american_union_desc:0 "Der amerikanische Imperialismus und die Kriegstreiberei haben das Gleichgewicht auf dem gesamten amerikanischen Kontinent gestört. Wenn wir dem ein Ende setzen wollen, müssen wir diese Barbaren fest im Griff haben, indem wir sie in unsere Verwaltung integrieren."
CAN_their_darkest_hour:0 "Ihre dunkelste Stunde"
CAN_their_darkest_hour_desc:0 "Die britische Regierung ist gefallen. Sie wurde von kommunistischen Arbeitern und Gewerkschaften gestürzt, die das Empire so fest im Griff hatten, dass es in die Knie gezwungen wurde. Nur wir können dem britischen Volk in seiner dunkelsten Stunde helfen."
CAN_recruit_exiled_generals:0 "Rekrutieren Sie verbannte Generäle"
CAN_recruit_exiled_generals_desc:0 "Viele britische Generäle wurden aufgrund ihrer Adelstitel entweder abgesetzt oder verbannt. Wir werden sie gerne in unser Land aufnehmen und ihnen die Ränge zurückgeben, die sie verdienen."
CAN_gather_british_refugees:0 "Britische Flüchtlinge versammeln"
CAN_gather_british_refugees_desc:0 "Viele britische Flüchtlinge fliehen aus ihrer ehemaligen Heimat. Manche in die USA, andere nach Skandinavien oder Frankreich, manche sogar nach Deutschland. Doch wir werden dafür sorgen, dass jeder hierher, in die letzte Bastion des Britischen Empires, fliehen kann."
CAN_no_turning_back:0 "Kein Zurück"
CAN_no_turning_back_desc:0 "Einige Schiffe der britischen Marine haben unsere Regierung kontaktiert und ihre Bereitschaft erklärt, sich unseren Seestreitkräften anzuschließen, um die Ausbreitung des Kommunismus zu stoppen. Wenn wir ihren Vorschlag annehmen, wird uns die Londoner Regierung fortan als Feind betrachten. Es wird kein Zurück mehr geben."
CAN_fuel_the_royal_navy:0 "Treibstoff für die Royal Navy"
CAN_fuel_the_royal_navy_desc:0 "Wir müssen unsere Ölförderungstechnologien verbessern, wenn wir in der Lage sein wollen, unsere neu erworbene Marine zu versorgen."
CAN_the_new_government:0 "Die neue Regierung"
CAN_the_new_government_desc:0 "Kanada braucht einen starken Führer, der sein Volk gegen den Kommunismus einen kann. Dieser Führer muss jetzt gewählt werden!"
CAN_remember_the_entente:0 "Erinnern Sie sich an die Entente"
CAN_remember_the_entente_desc:0 "Einst besiegte unser Reich die Mittelmächte mit Hilfe der Franzosen, die jahrelang tapfer gegen die deutsche Bedrohung kämpften. Wir werden dieses Bündnis nicht vergessen und dafür sorgen, dass auch sie es nicht vergessen."
CAN_the_first_step:0 "Der erste Schritt"
CAN_the_first_step_desc:0 "Die Eroberung Grönlands und Islands wird uns der Befreiung der Briten vom roten Albtraum näher bringen."
CAN_coerce_the_irish:0 "Zwingen Sie die Iren"
CAN_coerce_the_irish_desc:0 "Die Iren müssen sich für eine Seite entscheiden: Entweder sie helfen uns oder sie helfen den Briten."
CAN_end_the_red_dawn:0 "Beende die Rote Morgendämmerung"
CAN_end_the_red_dawn_desc:0 "Für König und Vaterland, kehrt nach Hause zurück!\n\nVernichtet die marxistische Bedrohung!"
CAN_rule_britania:0 "Beherrsche Britannien"
CAN_rule_britania_desc:0 "Wir werden den Kanadiern für ihre Unterstützung bei der Befreiung Großbritanniens danken. Sie werden Teil der Union und gemeinsam werden wir dem Britischen Empire seine Größe zurückgeben."
AST_desert_training:0 "Wüstentraining"
AST_desert_training_desc:0 "Rund 20 % der australischen Fläche sind von rauen Wüsten bedeckt. Auf den ersten Blick erscheint dies als großer Nachteil gegenüber anderen Nationen, da weniger Land zur Besiedlung und Bewirtschaftung zur Verfügung steht. Der hohe Wüstenanteil kann jedoch hilfreich sein, um unsere Truppen im Kriegsfall auf den Kampf in heißem und trockenem Gelände vorzubereiten."
AST_guard_oceania:0 "Wache Ozeanien"
AST_guard_oceania_desc:0 "Nachdem wir uns von den Briten losgesagt haben, ist es an der Zeit, die Pflicht zu übernehmen, Ozeanien und Asien vor den Mächten des Faschismus und Kommunismus zu schützen!"
AST_australasian_confederation:0 "Australasiatische Konföderation"
AST_australasian_confederation_desc:0 "Die Nationen Ozeaniens müssen gegen ihre Feinde in Asien, Amerika und Europa vereint bleiben. Wenn wir unsere Unabhängigkeit verteidigen wollen, müssen wir uns mit Neuseeland einigen."
AST_god_save_the_king:0 "Gott schütze den König"
AST_god_save_the_king_desc:0 "Unsere Partei war dem britischen Königshaus stets treu ergeben, doch nach dessen Machtübernahme betrachteten uns die Engländer nicht mehr als Verbündeten, sondern als Feind. Es gibt jedoch einen Monarchen in England, der uns mit Interesse statt mit Angst betrachtet: Edward VIII. Wir müssen ihn wieder an die Macht bringen, damit unser Land wieder der britischen Krone dienen kann."
AST_restore_british_values:0 "Britische Werte wiederherstellen"
AST_restore_british_values_desc:0 "Die Engländer respektieren ihre Monarchen jeden Tag weniger. Wir müssen einen Kreuzzug nach London starten, um Edward VIII. wieder auf den Thron zu bringen und den Angelsachsen zu neuer Größe zu verhelfen!"
#AST_nz_puppet2:0 "Coerce New Zealand"
#AST_nz_puppet2_desc:0 "Having New Zealand close to our backdoor is a menace for our national security. If we want to be able to carry a worker revolution in Oceania and Asia, we must change this."
AST_liberate_the_oppressed:0 "Befreit die Unterdrückten"
AST_liberate_the_oppressed_desc:0 "Seit Jahrhunderten leben Millionen von Arbeitern in Asien unter der Unterdrückung Großbritanniens, Frankreichs und der Niederlande. Wir müssen einen Kreuzzug starten, um die Menschen von ihren europäischen Unterdrückern zu befreien, so wie wir es mit unseren eigenen getan haben!"
NZL_maori_trackers:0 "Maori-Tracker"
NZL_maori_trackers_desc:0 "Die Maori gelten als gute Fährtenleser und verfügen über hervorragende Überlebensfähigkeiten. Von ihnen zu lernen und einige von ihnen in unsere Garnisonen zu rekrutieren, wird uns im Krieg sicherlich helfen."
NZL_z_special_unit:0 "Z-Spezialeinheit"
NZL_z_special_unit_desc:0 "Die Spezialeinheit Z ist unser Kommandoteam, das sich auf Aufklärung und Sabotage hinter den feindlichen Linien spezialisiert. Dafür sind mutige Männer erforderlich, die bereit sind, sich einem anspruchsvollen Training zu unterziehen."
NZL_empire_air_training_scheme:0 "Empire Air Training Scheme"
NZL_empire_air_training_scheme_desc:0 "Es ist an der Zeit, dass Australien sich zu einem umfassenden Flugausbildungsprogramm verpflichtet. Mit der Ermutigung und Unterstützung des Vereinigten Königreichs werden alle Dominions zusammenarbeiten, um Piloten und Hilfspersonal für die Kriegsanstrengungen bereitzustellen."
NZL_commonwealth_aircraft_corporation:0 "Commonwealth Aircraft Corporation"
NZL_commonwealth_aircraft_corporation_desc:0 "Die Commonwealth Aircraft Corporation ist der wichtigste Hersteller von Flugzeugen und Flugzeugtriebwerken in Australien. Sie verfügt über eine nachweisliche Erfolgsgeschichte und wird unseren Piloten durch ihre Unterstützung die benötigten Materialien liefern."
NZL_rats_of_tobruk:0 "Ratten von Tobruk"
NZL_rats_of_tobruk_desc:0 "Unsere tapferen Soldaten haben sich in der Wüstenkriegsführung und beim Plündern von Schlachtfeldern als geschickt erwiesen. Sie bedrängen den Feind, greifen ihn von seinen Stützpunkten aus an und ziehen sich dann vor dem Gegenangriff zurück."
NZL_fight_socialism:0 "Bekämpfe den Sozialismus"
NZL_fight_socialism_desc:0 "Der Sozialismus ist der erste Schritt zum Kommunismus. Wir müssen diese abscheulichen Ideologien bekämpfen, indem wir unsere Wirtschaft mit anderen Mitteln in Ordnung bringen."
NZL_push_to_the_edge:0 "Bis an die Grenzen gehen"
NZL_push_to_the_edge_desc:0 "Wir können den Wandel jetzt nicht mehr aufhalten. Wenn wir wollen, dass es unseren Arbeitnehmern gut geht, müssen wir ihnen allen so gut wie möglich helfen."
NZL_end_government_interferience:0 "Beenden Sie die Einmischung der Regierung"
NZL_end_government_interferience_desc:0 "Wir müssen dem staatlichen Paternalismus jetzt ein Ende setzen. Die Menschen haben das Recht, frei von staatlichen Eingriffen in ihre Angelegenheiten zu sein (und sich ihnen gegebenenfalls zu widersetzen)."
NZL_full_interventionism:0 "Vollinterventionismus"
NZL_full_interventionism_desc:0 "Der Staat muss die Pflicht übernehmen, seinem Volk zu helfen, indem er die Wirtschaft des Landes vollständig kontrolliert. Nur dann wird unser Volk sicher sein."
NZL_follow_the_samurai:0 "Folgen Sie den Samurai"
NZL_follow_the_samurai_desc:0 "Die Japaner haben der Welt ihre Macht und ihre Interessen in Südostasien gezeigt. Ein Anschluss an sie würde ihren Schutz bedeuten und ein Land weniger, das bereit wäre, uns anzugreifen."
NZL_peace_in_the_islands:0 "Frieden auf den Inseln"
NZL_peace_in_the_islands_desc:0 "Wir dürfen keine Nationen gegen uns aufbringen. Wir werden versuchen, unsere Inseln zu schützen und uns mit jenen Nationen zu verbünden, die nicht plündern und erobern wollen."
NZL_follow_the_bear:0 "Folge dem Bären"
NZL_follow_the_bear_desc:0 "Die Sowjets haben der Welt ihre Macht und ihre politischen Interessen gezeigt. Ein Anschluss an sie würde ihren Schutz bedeuten und ein Land weniger, das bereit ist, unsere Regierung zu stürzen."
NZL_japanese_military_mission:0 "Japanische Militärmission"
NZL_japanese_military_mission_desc:0 "Japanische Offiziere und Admirale sollten in unser Land eingeladen werden, um die Doktrin unseres Militärs zu verbessern."
NZL_unity_and_progress:0 "Einheit und Fortschritt"
NZL_unity_and_progress_desc:0 "Wir müssen vereint bleiben, während die Welt aufgrund der Kriegstreiberei der großen Nationen brennt."
NZL_soviet_support:0 "Sowjetische Unterstützung"
NZL_soviet_support_desc:0 "Um unsere industriellen Kapazitäten zu verbessern, sollten sowjetische Ökonomen und Wissenschaftler in unser Land eingeladen werden."
NZL_naval_autonomy:0 "Marineautonomie"
NZL_naval_autonomy_desc:0 "Da wir nun allein sind, ist es unsere Pflicht, die neuseeländischen Meere vor den Japanern und Briten zu verteidigen."
NZL_reject_racism:0 "Rassismus ablehnen"
NZL_reject_racism_desc:0 "Robert Campbell Begg wurde 1935 von den Nazis in Deutschland angesprochen, fand deren Philosophie jedoch völlig absurd – und das aus gutem Grund. Unsere Regierung hat begonnen, die Maori und andere Ureinwohner Neuseelands zu akzeptieren und mit ihnen zu kollaborieren. Daher wäre es völlig heuchlerisch, unsere Ideologie durch Hass auf eine Rasse wie die Deutschen zu befeuern oder andere Rassen wie die Briten und Sowjets zu versklaven."
NZL_rights_and_duties:0 "Rechte und Pflichten"
NZL_rights_and_duties_desc:0 "Der Feminismus wird in der neuseeländischen Gesellschaft tief verwurzelt sein und es Frauen leichter machen, einer Arbeit nachzugehen, sich politisch zu beteiligen und – was in diesen schwierigen Zeiten am wichtigsten ist – der Armee beizutreten."
NZL_new_zealand_undefeatable:0 "Neuseeland unbesiegbar"
NZL_new_zealand_undefeatable_desc:0 "Wenn es uns gelingt, alle unsere Küsten und Städte zu befestigen, können wir unsere Feinde von Angriffen abhalten, selbst wenn unsere Truppenstärke und Industrie ihnen unterlegen sind. Dann wird Neuseeland unbesiegbar sein."
NZL_union_of_oceania:0 "Union von Ozeanien"
NZL_union_of_oceania_desc:0 "Die Nationen Ozeaniens müssen gegen ihre Feinde in Asien, Amerika und Europa vereint bleiben. Wenn wir unsere Unabhängigkeit verteidigen wollen, müssen wir uns mit Australien einigen."
RAJ_pursue_equality:0 "Streben Sie nach Gleichheit"
RAJ_pursue_equality_desc:0 "In Indien wird es keinen Oberherren und keine Sklaven geben. Wir werden unsere Arbeiter von den Briten und dann von Asien befreien."
RAJ_hail_the_motherland:0 "Heil dem Vaterland"
RAJ_hail_the_motherland_desc:0 "Wir müssen stolz auf unsere Geschichte vor der britischen Dominanz in Indien sein und härter daran arbeiten, diese Erinnerung in eine Tatsache umzusetzen."
RAJ_soviet_economic_plan:0 "Sowjetischer Wirtschaftsplan"
RAJ_soviet_economic_plan_desc:0 "Den Russen gelang es, sich von einer rückständigen Agrarwirtschaft zu einer mächtigen Industrienation zu entwickeln. Wir müssen ihrem Beispiel folgen, um unsere Wirtschaft wiederzubeleben."
RAJ_german_military_standars:0 "Deutsche Militärstandards"
RAJ_german_military_standars_desc:0 "Die Deutschen haben der Welt die Macht und Leistungsfähigkeit ihrer Armee gezeigt. Wir müssen ihrem Beispiel folgen, um unsere Feinde zu besiegen."
RAJ_a_free_india:0 "Ein freies Indien"
RAJ_a_free_india_desc:0 "Jetzt, da wir frei sind, können wir damit beginnen, die britischen Unternehmen zu beschlagnahmen, die den Reichtum unseres Landes aussaugen, und gleichzeitig unseren Bürgern bessere Arbeitsbedingungen bieten."
RAJ_an_armored_army:0 "Eine gepanzerte Armee"
RAJ_an_armored_army_desc:0 "Wir müssen mit der Modernisierung unserer Streitkräfte beginnen, um unsere Nation unbesiegbar zu machen."
RAJ_rule_our_skies:0 "Beherrsche unseren Himmel"
RAJ_rule_our_skies_desc:0 "Um unser Land vor dem Imperialismus zu schützen, ist es wichtig, über eine leistungsfähige Luftwaffe zu verfügen."
RAJ_national_security:0 "Nationale Sicherheit"
RAJ_national_security_desc:0 "Pakistan, Bangladesch und Burma müssen alle unter unserer Macht bleiben, sonst könnten sie zu einer großen Bedrohung für unsere Nation werden."
USA_caesar_and_the_barbarians:0 "Cäsar und die Barbaren"
USA_caesar_and_the_barbarians_desc:0 "So wie Julius Cäsar Rom vor den gallischen Barbaren verteidigen musste, muss unser amerikanischer Cäsar Amerika vor der Silberlegion und der Kommunistischen Partei verteidigen. Bis die Vereinigten Staaten wieder stabil sind, hat er die Pflicht, sie vor dem Totalitarismus zu schützen."
USA_ideals_dont_die:0 "Ideale sterben nicht"
USA_ideals_dont_die_desc:0 "Huey Long, Kingfish aus Louisiana, wurde feige vom Schwiegersohn des korrupten Richters Pavy ermordet. Nach seinem Tod zerbrach seine Bewegung „Share our Wealth“, doch nun gibt es in Amerika neue Hoffnung: Earl Long. General MacArthur verhandelt über die Präsidentschaft von Kingfishs Bruder, um die Unterstützung für die Silberlegion zu gewinnen. Ob er Hueys erträumte Reformen umsetzen kann, ist jedoch ungewiss."
USA_purge_the_legion:0 "Säubert die Legion"
USA_purge_the_legion_desc:0 "Die Silberlegion stellt eine große Bedrohung für das amerikanische Volk dar. Wenn sie die Macht im Land übernimmt, wird sie zu einer Bedrohung für die ganze Welt. Wir müssen alles tun, um ihren Erfolg zu verhindern."
USA_sort_the_mess:0 "Sortieren Sie das Chaos"
USA_sort_the_mess_desc:0 "Der amerikanische Cäsar kennt viele der Fehler der berüchtigten Präsidentschaft von Alf Landon. Alle Amerikaner werden hart arbeiten müssen, um dieses Chaos zu beseitigen."
USA_support_the_chinese:0 "Unterstützen Sie die Chinesen"
USA_support_the_chinese_desc:0 "Wir dürfen weder die Chinesen noch die Japaner in die Knie zwingen. Militärberater werden nach China geschickt, um die Fähigkeiten der chinesischen Armee zu stärken und sie so gegen diese Bedrohungen verteidigen zu können."
USA_pardon_the_rebels:0 "Begnadigung der Rebellen"
USA_pardon_the_rebels_desc:0 "Die meisten unserer Generäle traten entweder zurück oder schlossen sich dem Konstitutionalismus-Aufstand an, sodass unsere Armee unter einem Mangel an qualifizierten Generälen leidet. Es mag riskant sein, diejenigen, die es wagten, sich uns entgegenzustellen, wieder in den Dienst zu rufen, doch jetzt, da der Totalitarismus sowohl Asien als auch Europa erobert, können wir das Risiko durchaus eingehen."
USA_war_on_totalitarism:0 "Krieg gegen den Totalitarismus"
USA_war_on_totalitarism_desc:0 "Solange es kommunistische oder faschistische Nationen auf der Welt gibt, besteht die Möglichkeit, dass diese abscheulichen Ideen das amerikanische Bewusstsein vergiften. Wir können nicht dafür sorgen, dass totalitäre Staaten weiter bestehen."
USA_assassinate_pelley:0 "Ermordet Pelley"
USA_assassinate_pelley_desc:0 "Solange die Silberlegion existiert, wird es in Amerika keinen Frieden geben. Wir können nicht randalieren und jeden töten, den wir für ihre Mitglieder halten, aber wir können der Chimäre William Pelley den Kopf abschlagen. Ist er tot, haben seine Milizen keinen Anführer mehr, und wenn sie nach dem Tod ihres verrückten Anführers nicht mehr wissen, was sie tun sollen, bleibt ihnen nichts anderes übrig, als nach Hause zurückzukehren."
USA_end_the_chaos:0 "Beenden Sie das Chaos"
USA_end_the_chaos_desc:0 "Onkel Earl kennt viele der Fehler der berüchtigten Präsidentschaft von Alf Landon. Alle Amerikaner werden hart arbeiten müssen, um dieses Chaos zu beenden."
USA_reconcile_with_the_rebels:0 "Versöhne dich mit den Rebellen"
USA_reconcile_with_the_rebels_desc:0 "Die meisten unserer Generäle traten entweder zurück oder schlossen sich dem Konstitutionalismus-Aufstand an, sodass unsere Armee unter einem Mangel an qualifizierten Generälen leidet. Es mag riskant sein, diejenigen, die es wagten, sich uns entgegenzustellen, wieder in den Dienst zu rufen, doch jetzt, da der Totalitarismus sowohl Asien als auch Europa erobert, können wir das Risiko durchaus eingehen."
USA_public_works:0 "Öffentliche Arbeiten"
USA_public_works_desc:0 "Das amerikanische Volk betrachtet unsere Regierung noch immer als illegitim und diktatorisch. Öffentliche Maßnahmen wie Schulspeisungsprogramme, höhere Lehrergehälter und mehr Stimmrechte für Minderheiten könnten die Unterstützung unserer Regierung erhöhen."
USA_every_man_a_king:0 "Jeder Mann ein König"
USA_every_man_a_king_desc:0 "Nur die Familie Long weiß, was für das amerikanische Volk richtig und was falsch ist. Um unseren Reichtum bis zum letzten Tag zu teilen, müssen wir unsere Macht als Führer der Vereinigten Staaten festigen. Nur dann wird jeder Mann für immer als König leben können."
USA_enforce_the_jim_crow_laws:0 "Setzen Sie die Jim-Crow-Gesetze durch"
USA_enforce_the_jim_crow_laws_desc:0 "Nach dem Ende des Bürgerkriegs ist es an der Zeit, die Jim-Crow-Gesetze wieder einzuführen, doch dieses Mal werden sich alle Bundesstaaten daran halten."
USA_teach_our_sons:0 "Lehre unsere Söhne"
USA_teach_our_sons_desc:0 "„Die Söhne Amerikas müssen ausgebildet werden, um ihre Familien und ihre Nation vor den dunklen Seelen der Welt zu verteidigen …"
USA_eliminate_the_dark_souls:0 "Eliminiere die dunklen Seelen"
USA_eliminate_the_dark_souls_desc:0 "... Juden, Kommunisten, Katholiken, sie alle sind die Feinde Amerikas und des Christentums! Gott und Jesus selbst haben mir das gesagt, und sie haben recht, sie haben recht! Ich habe die Schrecken des jüdischen Bolschewismus in Sibirien gesehen! Ich werde nicht zulassen, dass sie Amerika dasselbe antun, das werde ich nicht, das werde ich nicht, das werde ich nicht ...“"
USA_negroe_education_act:0 "Gesetz zur Bildung von Schwarzen"
USA_negroe_education_act_desc:0 "„Für die Schwarzen gibt es in der amerikanischen Gesellschaft keinen Platz oberhalb bestimmter Arbeitsformen … Welchen Sinn hat es, den Kindern der Schwarzen Mathematik beizubringen, wenn sie diese in der Praxis nicht anwenden können? Das ist völlig absurd. Die Bildung muss die Menschen entsprechend ihren Möglichkeiten im Leben ausbilden, entsprechend der Sphäre, in der sie leben.“"
USA_isolationism:0 "Isolationismus"
USA_isolationism_desc:0 "„Niemand wird Amerika jetzt noch etwas anhaben können, niemand …“"
USA_invade_la_hispaniola:0 "Erobern Sie La Hispaniola"
USA_invade_la_hispaniola_desc:0 "Genau wie Kuba können Haiti und die Dominikanische Republik zu einem sicheren Luftwaffenstützpunkt für jeden unserer Feinde werden. Das werden wir nicht zulassen."
USA_join_the_allies:0 "Schließen Sie sich den Verbündeten an"
USA_join_the_allies_desc:0 "Die Alliierten sind ebenso wie wir gegen Kommunismus und Faschismus. Wir sollten unsere Kräfte gegen den Totalitarismus vereinen."
USA_form_the_npto:0 "Bilden Sie die NPTO"
USA_form_the_npto_desc:0 "Wir werden den Kampf gegen den Totalitarismus anführen, für eine strahlende, freie Welt!"
USA_interviene_in_north_america:0 "Interviene in Nordamerika"
USA_interviene_in_north_america_desc:0 "Nord- und Mittelamerika sollen von den Mächten des Faschismus und Kommunismus befreit werden! Vorwärts!"
USA_interviene_in_south_america:0 "Interviene in Südamerika"
USA_interviene_in_south_america_desc:0 "Südamerika soll von den Mächten des Faschismus und Kommunismus befreit werden! Vorwärts!"
USA_set_the_eastern_sun:0 "Untergang der Ostsonne"
USA_set_the_eastern_sun_desc:0 "Die Japaner stellen mit ihrer zunehmenden Kriegstreiberei und ihrem Militarismus eine Bedrohung für unser Land dar. Es ist Zeit, die Sonne unterzugehen."
USA_set_the_western_sun:0 "Setzen Sie die westliche Sonne ein"
USA_set_the_western_sun_desc:0 "Die Briten stellen mit ihrer zunehmenden Macht in Armee und Marine eine Bedrohung für unser Land dar. Es ist Zeit, die Sonne unterzugehen."
USA_kill_the_bear:0 "Töte den Bären"
USA_kill_the_bear_desc:0 "Die Russen modernisieren sich rasant. Das wäre kein Problem, wenn ihre abscheuliche Ideologie nicht wäre. Doch aufgrund dieser Ideologie haben wir keine andere Wahl, als ihre Regierung zu stürzen."
USA_kill_the_tigers:0 "Töte die Tiger"
USA_kill_the_tigers_desc:0 "Die Chinesen modernisieren sich rasant. Das wäre kein Problem, wenn ihre abscheuliche Ideologie nicht wäre. Doch aufgrund dieser Ideologie haben wir keine andere Wahl, als ihre Regierung zu stürzen."
USA_save_the_globe:0 "Rette den Globus"
USA_save_the_globe_desc:0 "Als eine der mächtigsten Nationen der Welt ist es unsere Pflicht, die Welt vor dem Totalitarismus zu retten. Ruhm, Ruhm sei Amerika!"
USA_enforce_the_monroe_doctrine:0 "Durchsetzung der Monroe-Doktrin"
USA_enforce_the_monroe_doctrine_desc:0 "Keine amerikanische Nation darf von einer ausländischen Macht bedroht werden. Das vereinte Amerika wird unbesiegbar sein!"
USA_found_the_ais:0 "AIS gefunden"
USA_found_the_ais_desc:0 "Der American Intelligence Service ist ein Auslandsnachrichtendienst ziviler Natur der Bundesregierung der Vereinigten Staaten, der für die Erfassung, Verarbeitung und Analyse von Informationen zur nationalen Sicherheit aus aller Welt zuständig ist."
USA_operation_condor:0 "Operation Condor"
USA_operation_condor_desc:0 "Wir werden in Lateinamerika daran arbeiten, diese Länder stärker auf unsere Interessen auszurichten."
USA_the_only_president:0 "Der einzige Präsident"
USA_the_only_president_desc:0 "Earl Long hat dem amerikanischen Volk gezeigt, dass er der Richtige ist, um der Nation Fortschritt und Wohlstand zu bringen."
USA_guided_democracy:0 "Geführte Demokratie"
USA_guided_democracy_desc:0 "Nachdem es uns nun gelungen ist, die Nation zu organisieren, ist es an der Zeit, eine demokratischere Haltung einzunehmen, natürlich ohne Präsident Long die Macht zu entziehen."
USA_align_the_americas:0 "Verbünde Amerika"
USA_align_the_americas_desc:0 "Wir sollten uns mit den antikommunistischen Nationen Lateinamerikas verbünden, um unsere Nation vor dem Marxismus zu schützen."
USA_ally_the_americas:0 "Schützen Sie Amerika"
USA_ally_the_americas_desc:0 "Wir müssen auf Lateinamerika Einfluss nehmen, um zu verhindern, dass es in die Klauen des Marxismus gerät."
USA_free_the_globe:0 "Befreie den Globus"
USA_free_the_globe_desc:0 "Wir werden daran arbeiten, alle Menschen von ausländischer Unterdrückung zu befreien, sei es in Amerika, Afrika oder Asien."
MON_a_nation_in_ruins:0 "Eine Nation in Trümmern"
MON_a_nation_in_ruins_desc:0 "Unser Land war nie so weit entwickelt wie andere asiatische Länder, doch die ständigen Kämpfe zwischen Weißrussen, Sowjets und Chinesen verschlimmerten die Lage zusätzlich. Darüber hinaus trafen bewaffnete Aufstände und das völlige Scheitern der Kollektivierung unser Volk und unsere Wirtschaft noch stärker. Wir werden hart arbeiten müssen, um die Situation zu verbessern."
MON_bring_back_hope:0 "Bring die Hoffnung zurück"
MON_bring_back_hope_desc:0 "Unser Volk unterstützt unsere Regierung nicht, und diejenigen, die es tun, tun dies meist aus Angst vor Säuberungen durch den NKWD und die Stalinisten. Wir müssen die Hoffnung auf den Kommunismus wiederherstellen, wenn wir wollen, dass er uns beim Wiederaufbau des Landes hilft."
MON_kuomintang_coup:0 "Putsch der Kuomintang"
MON_kuomintang_coup_desc:0 "Wir haben genug von der kommunistischen Ausbeutung. Wir sollten Nanjing um Hilfe bitten, um die Stalinisten aus der Mongolei zu vertreiben und endlich frei zu werden."
MON_kwantung_coup:0 "Kwantung-Putsch"
MON_kwantung_coup_desc:0 "Wir haben genug von der kommunistischen Ausbeutung. Wir sollten die Hilfe der Japaner in Anspruch nehmen, um die Stalinisten aus der Mongolei zu vertreiben und endlich Größe zu erreichen."
MON_inner_mongolian_emmigration:0 "Einwanderung in die Innere Mongolei"
MON_inner_mongolian_emmigration_desc:0 "Alle Mongolen, die unter japanischer Herrschaft leben, müssen eingeladen werden, in unserem Land Zuflucht zu suchen. Und natürlich können sich auch alle in China lebenden Menschen uns anschließen, wenn sie dies wünschen!"
MON_military_affairs_commision:0 "Kommission für Militärangelegenheiten"
MON_military_affairs_commision_desc:0 "Wir werden unser Oberkommando reformieren und versuchen, die letzten Reformen von Nanjing nachzuahmen."
MON_whampoa_military_academy:0 "Whampoa Militärakademie"
MON_whampoa_military_academy_desc:0 "Wir werden unsere Offiziere in der bekannten Militärakademie Whampoa ausbilden, genau wie die Nationalisten."
MON_nationalist_economic_support:0 "Nationalistische Wirtschaftsunterstützung"
MON_nationalist_economic_support_desc:0 "Wir werden Nanjing um Wirtschaftshilfe bitten, um unsere schwache Wirtschaft zu verbessern."
MON_chinese_expeditionary_force:0 "Chinesische Expeditionstruppe"
MON_chinese_expeditionary_force_desc:0 "Unsere Armee ist derzeit nicht in der Lage, die Mongolei allein zu verteidigen. Wir sollten die Chinesen um einige Einheiten bitten, um unsere neue Nation vor den Sowjets und den Japanern zu verteidigen."
MON_follow_nanjing:0 "Folgen Sie Nanjing"
MON_follow_nanjing_desc:0 "Unsere Zukunft liegt nun bei den Chinesen. Sie haben unsere Unabhängigkeit respektiert und unserer Armee geholfen, im Gegensatz zu den Sowjets, die uns nur als lästigen Vasallen betrachteten."
MON_an_independent_mongolia:0 "Eine unabhängige Mongolei"
MON_an_independent_mongolia_desc:0 "Die Chinesen haben uns seit dem Putsch viel geholfen, doch obwohl wir ihre Hilfe sehr zu schätzen wussten, ist es an der Zeit, andere Wege einzuschlagen. Schließlich kämpften wir für die Unabhängigkeit und nicht, um zur Marionette eines anderen Großen zu werden."
MON_rebuild_the_monasteries:0 "Bauen Sie die Klöster wieder auf"
MON_rebuild_the_monasteries_desc:0 "Buddhistische Klöster wurden von kommunistischen Barbaren und sowjetischen Streitkräften geplündert und zerstört. Wenn wir zur Heilung der Wunden beitragen wollen, müssen wir das Zerstörte wieder aufbauen."
MON_buddhist_values:0 "Buddhistische Werte"
MON_buddhist_values_desc:0 "Um eine bessere Gesellschaft zu sein, müssen wir unserem Volk beibringen, den buddhistischen Werten zu folgen."
MON_under_one_lama:0 "Unter einem Lama"
MON_under_one_lama_desc:0 "Alle Mongolen sollten vom selben Lama geführt werden, nicht von chinesischen oder japanischen Kriegstreibern. Wir müssen sie befreien, sei es durch Vernunft oder Gewalt."
MON_unite_the_mongols:0 "Vereint die Mongolen"
MON_unite_the_mongols_desc:0 "Unsere Armee wird von nun an hart arbeiten, um unsere Brüder in der Inneren Mongolei zu befreien. Wir werden nicht ruhen, bis dieses Ziel erreicht ist."
MON_pro_chinese_sentiment:0 "Pro-chinesische Stimmung"
MON_pro_chinese_sentiment_desc:0 "Unsere Bevölkerung beginnt, die neue Herrschaft der Kuomintang zu akzeptieren und entwickelt antijapanische Gefühle. Ob wir letztendlich wieder in China integriert werden, ist derzeit noch unklar. Bis dahin werden wir unser Bestes tun, um unseren Bürgern zu helfen."
MON_improve_our_economy:0 "Verbessern Sie unsere Wirtschaft"
MON_improve_our_economy_desc:0 "Wenn wir den Menschen in der Inneren Mongolei unsere Fortschritte zeigen, können wir sie vielleicht noch stärker davon überzeugen, dass unsere Regierung da ist, um ihnen zu helfen."
MON_shelter_the_buryats:0 "Schützt die Burjaten"
MON_shelter_the_buryats_desc:0 "Die Burjaten sind ein mongolisches Volk aus Burjatien, einer Region um Ulan-Ude. Sie sind neben den Jakuten eine der beiden größten indigenen Gruppen Sibiriens und werden wie diese von den stalinistischen Schlächtern verfolgt. Wir müssen diesen Menschen in unserem Land Zuflucht gewähren und ihnen, wenn möglich, helfen."
MON_soviet_economic_support:0 "Sowjetische Wirtschaftsunterstützung"
MON_soviet_economic_support_desc:0 "Wir werden Moskau um Wirtschaftshilfe bitten, um unsere schwache Wirtschaft zu verbessern."
MON_buryat_emmigration:0 "Burjatische Auswanderung"
MON_buryat_emmigration_desc:0 "Die Burjaten sind ein mongolisches Volk aus Burjatien, einer Region um Ulan-Ude. Sie sind neben den Jakuten eine der beiden größten indigenen Gruppen Sibiriens und werden wie diese von den stalinistischen Schlächtern verfolgt. Wir müssen diesen Menschen in unserem Land Zuflucht gewähren und ihnen, wenn möglich, helfen."
MON_pardon_the_lkhumbe_affair:0 "Entschuldigen Sie die Lkhümbe-Affäre"
MON_pardon_the_lkhumbe_affair_desc:0 "Die Lkhümbe-Affäre war eine Verschwörung, um Mitglieder der MAN fälschlicherweise der Zusammenarbeit mit japanischen Spionen zu bezichtigen. Jambyn Lkhümbe, der Erste Sekretär der MAN, sowie viele andere hochrangige Politiker, Militärs und Burjaten wurden von den sowjetischen Behörden verfolgt und hingerichtet. Wir müssen diejenigen begnadigen, die nicht ermordet wurden, um den 15. Jahrestag der Revolution zu feiern. Schließlich sind wir alle Genossen, nicht wahr?"
MON_new_course_policy:0 "Neue Kursrichtlinie"
MON_new_course_policy_desc:0 "Wir haben versucht, die sowjetische Kollektivierung nachzuahmen, aber sie hat der Mongolei nur Tod und Armut gebracht. Wenn wir unsere Wirtschaft wieder in Gang bringen wollen, müssen wir eine neue und andere Politik verfolgen."
MON_assassinate_choibalsan:0 "Ermordung von Choibalsan"
MON_assassinate_choibalsan_desc:0 "Der stalinistische General war in zahlreiche Verschwörungen gegen das mongolische Volk verwickelt und wird nicht ruhen, bis er die volle Macht über das Land innehat. Ein Schuss an der richtigen Stelle wird diese Situation schnell wieder in Ordnung bringen."
MON_demids_death:0 "Demids Tod"
MON_demids_death_desc:0 "General Demid, ein beliebter Rivale Tschoibalsans, ist heute am Bahnhof Taiga (im Nordosten Nowosibirsks) an Bord der Transsibirischen Eisenbahn auf dem Weg nach Moskau gestorben. Gerüchten zufolge starb er an einer Lebensmittelvergiftung, aber das ist unmöglich! Vielleicht war er krank oder so, meinen Sie nicht?"
MON_mongol_soviet_split:0 "Mongolisch-sowjetische Spaltung"
MON_mongol_soviet_split_desc:0 "Wir haben genug von den Schlächtern Moskaus. Wir werden ihren Forderungen nicht mehr nachkommen."
MON_sino_mongol_alliance:0 "Chinesisch-Mongolische Allianz"
MON_sino_mongol_alliance_desc:0 "Die Barbaren Moskaus konnten die Bedeutung eines Bündnisses nicht begreifen. Sie sind so sehr daran gewöhnt, Nationen zu unterwerfen, dass sie mit niemandem zusammenarbeiten können, der ihnen nicht unter die Fuchtel steht. Die Chinesen von Yan&#39;an hingegen scheinen Verbündete für ihren Kampf gegen die Kuomintang zu suchen, und wir helfen ihnen gerne."
MON_chinese_military_mission:0 "Chinesische Militärmission"
MON_chinese_military_mission_desc:0 "Unsere Armee ist derzeit stark unterentwickelt. Es wäre sehr hilfreich, die Chinesen zu bitten, unsere Armeen auszubilden."
MON_religious_liberties:0 "Religionsfreiheit"
MON_religious_liberties_desc:0 "Unser Volk sollte und wird die Möglichkeit haben, seine Religion zu wählen oder gar keine zu wählen. Die Regierung hat keinen Einfluss auf seinen Glauben, solange er niemandem schadet."
MON_free_forever:0 "Für immer kostenlos"
MON_free_forever_desc:0 "Die Mongolei wird sich nie wieder ausländischen Mächten beugen! Wir werden entweder in Ehre leben oder in Ruhm sterben!"
MON_pan_mongolism:0 "Panmongolismus"
MON_pan_mongolism_desc:0 "Alle Mongolen sollten Teil derselben Nation sein und unsere Armeen sind bereit, diesen Wunsch zu erfüllen."
MON_invite_the_nkvd:0 "Laden Sie den NKWD ein"
MON_invite_the_nkvd_desc:0 "Die mongolische Geheimpolizei reicht nicht aus, um die Nation vor japanischen Spionen und antikommunistischen Organisationen zu schützen. Wir müssen dem sowjetischen NKWD mehr Macht geben, wenn wir wollen, dass die mongolische Revolution ewig währt."
MON_the_great_terror:0 "Der große Terror"
MON_the_great_terror_desc:0 "Alle, die der Kollaboration mit den Japanern oder der Konterrevolution verdächtigt werden, werden hingerichtet."
MON_incriminate_anandyn:0 "Anandyn belasten"
MON_incriminate_anandyn_desc:0 "Anandyns Träume von Unabhängigkeit und gefügigem Verhalten sind eine Gefahr für die sowjetischen Interessen. Wir werden ihn jetzt loswerden."
MON_a_close_ally:0 "Ein enger Verbündeter"
MON_a_close_ally_desc:0 "Wir sind Stalin und Moskau treu. Wir brauchen keine völlige Unabhängigkeit. Solange wir die Großmongolei wiedervereinigen können, wird alles gut gehen."
MON_assisted_modernization:0 "Unterstützte Modernisierung"
MON_assisted_modernization_desc:0 "Wir werden die Modernisierung nicht allein schaffen. Die Sowjets werden ihrem geschätzten Verbündeten in dieser Angelegenheit gerne zur Seite stehen."
MON_reunite_with_menjiang:0 "Wiedervereinigung mit Menjiang"
MON_reunite_with_menjiang_desc:0 "Nachdem wir uns nun mit den Japanern verbündet haben, ist es an der Zeit, uns wieder mit unseren Brüdern in der Inneren Mongolei zu vereinen."
MON_eliminate_the_communists:0 "Eliminiere die Kommunisten"
MON_eliminate_the_communists_desc:0 "Die Kommunisten haben unseren mongolischen Mitbürgern nichts weiter als Hunger und Tod gebracht. Diese Teufel werden entweder nach Russland oder in die Hölle geschickt."
MON_rejoin_the_japanese:0 "Schließen Sie sich wieder den Japanern an"
MON_rejoin_the_japanese_desc:0 "Unsere Armee ist derzeit ziemlich schwach und nicht in der Lage, die Mongolei vor der Kuomintang und den Sowjets zu verteidigen. Wir müssen uns wieder mit den Japanern verbünden, wenn wir diese Bedrohungen bekämpfen wollen."
MON_buryat_refugees:0 "Burjatische Flüchtlinge"
MON_buryat_refugees_desc:0 "Die Burjaten sind ein mongolisches Volk aus Burjatien, einer Region um Ulan-Ude. Sie sind neben den Jakuten eine der beiden größten indigenen Gruppen Sibiriens und werden wie diese von den stalinistischen Schlächtern verfolgt. Wir müssen diesen Menschen in unserem Land Zuflucht gewähren und ihnen, wenn möglich, helfen."
MON_japanese_support:0 "Japanischer Support"
MON_japanese_support_desc:0 "Die Japaner werden ihrem neuen Verbündeten im Kampf um die Vorherrschaft in Asien gerne helfen."
MON_japanese_arsenals:0 "Japanische Arsenale"
MON_japanese_arsenals_desc:0 "Aufgrund der Verwüstungen, die die Kollektivierung in der Mongolei hinterlassen hat, sind wir nicht in der Lage, unsere Armeen zu versorgen und unsere Wirtschaft zu verbessern. Um unser Land wieder aufzubauen, benötigen wir die Hilfe japanischer Unternehmen."
MON_deal_with_the_manchurians:0 "Deal mit den Mandschuren"
MON_deal_with_the_manchurians_desc:0 "Derzeit leben viele Mongolen in Mandschukuo, und natürlich sind sie Teil unseres panmongolischen Traums. Wir werden die Mandschuren höflich bitten, uns diese Ländereien jetzt zurückzugeben."
MON_tribe_federation:0 "Stammesföderation"
MON_tribe_federation_desc:0 "Unter Demchugdongrub werden alle mongolischen Stämme gleichberechtigt vertreten sein und über ein hohes Maß an Autonomie verfügen. Eine Stammesföderation wird der Mongolei zu neuer Größe verhelfen."
MON_king_of_the_mongols:0 "König der Mongolen"
MON_king_of_the_mongols_desc:0 "Alle mongolischen Stämme müssen sich Kaiser Demchugdongrub beugen. Ein starkes Königreich wird der Mongolei wieder zu Größe verhelfen."
MON_liberate_our_brothers:0 "Befreie unsere Brüder"
MON_liberate_our_brothers_desc:0 "Hunderttausende Mongolen leben derzeit unter der chinesischen Herrschaft der Ma- und Shanxi-Cliquen. Wir müssen einen Kampf für ihre Befreiung beginnen und die Mongolen endlich in einem Staat vereinen!"
MON_a_new_khan:0 "Ein neuer Khan"
MON_a_new_khan_desc:0 "Kaiser Demchugdongrub wird von nun an als Khan aller Mongolen bekannt sein. Er wird uns zu Größe und Einheit führen!"
MON_the_second_horde:0 "Die Zweite Horde"
MON_the_second_horde_desc:0 "Der einzige Grund für den Untergang des Mongolischen Reiches im 14. Jahrhundert waren mangelnde Einheit und eine Nachfolgekrise unter den Stämmen. Doch jetzt, da unsere Dynastie klar ist und die Kommunikation zwischen Städten und Ländern einfacher denn je geworden ist, steht der zweiten Mongolenhorde nichts mehr im Wege."
MON_soviet_machinery:0 "Sowjetische Maschinen"
MON_soviet_machinery_desc:0 "Unser Land ist derzeit noch stark unterentwickelt, doch die geliehenen sowjetischen Maschinen werden uns dabei helfen, mit der Modernisierung der Mongolei zu beginnen."
MON_nalaikh_coal:0 "Nalaikh-Kohle"
MON_nalaikh_coal_desc:0 "Dank der neuen technologischen Fortschritte kann die Kohle von Nalaikh problemlos abgebaut werden."
MON_zuun_bayan_oil:0 "Züünbayan-Öl"
MON_zuun_bayan_oil_desc:0 "Dank der neuen technologischen Fortschritte kann das Öl von Züünbayan problemlos gewonnen werden."
MON_mongolian_minerals:0 "Mongolische Mineralien"
MON_mongolian_minerals_desc:0 "Dank der neuen technologischen Fortschritte können viele Mineralien in der gesamten Mongolei problemlos abgebaut werden."
MON_modern_mining:0 "Moderner Bergbau"
MON_modern_mining_desc:0 "Moderne europäische Werkzeuge haben unserem Land geholfen, seine begrenzten Ressourcen besser zu nutzen."
MON_trans_mongolian_railway:0 "Transmongolische Eisenbahn"
MON_trans_mongolian_railway_desc:0 "Dank russischer Unternehmen wurde die Infrastruktur der Mongolei und Burjatiens erheblich verbessert!"
MON_electrification_campaign:0 "Elektrifizierungskampagne"
MON_electrification_campaign_desc:0 "Dank russischer Unternehmen konnten die Stromnetze der Mongolei erheblich ausgebaut werden, was unserer Wirtschaft zugutekommt und das Leben aller unserer Bürger verbessert."
MON_hospital_building:0 "Krankenhausgebäude"
MON_hospital_building_desc:0 "Wenn wir wollen, dass unsere Bevölkerung unsere Regierung unterstützt, müssen die Gesundheitsdienste verbessert werden."
MON_school_building:0 "Schulgebäude"
MON_school_building_desc:0 "Wenn wir wollen, dass unsere Bevölkerung unsere Regierung unterstützt, müssen die Gesundheitsdienste verbessert werden."
MON_our_first_university:0 "Unsere erste Universität"
MON_our_first_university_desc:0 "Wir werden unsere erste große Universität gründen, um die Fähigkeiten unserer Arbeiter und Wissenschaftler zu verbessern."
MON_a_new_mongolia:0 "Eine neue Mongolei"
MON_a_new_mongolia_desc:0 "Nachdem sich unsere Nation modernisiert hat, ist es an der Zeit, als neue Mongolei neu anzufangen."
MON_new_scientists:0 "Neue Wissenschaftler"
MON_new_scientists_desc:0 "Die Bildungsreformen und Schulbaukampagnen zeigen erste Ergebnisse. Unserer Nation stehen nun mehr Wissenschaftler und Forscher zur Verfügung."
MON_modernize_our_army:0 "Modernisieren Sie unsere Armee"
MON_modernize_our_army_desc:0 "Unsere Armee besteht derzeit nur aus Kavallerieregimentern und einigen bewaffneten Milizen, die nicht in der Lage sind, unsere weiten Grenzen zu verteidigen. Viele unserer Generäle plädieren für eine umfassende Modernisierung der Armee, und wir werden ihren Ideen folgen."
MON_what_we_already_know:0 "Was wir bereits wissen"
MON_what_we_already_know_desc:0 "Unsere Armee besteht derzeit nur aus Kavallerieregimentern und einigen bewaffneten Milizen, die nicht in der Lage sind, unsere weiten Grenzen zu verteidigen. Viele unserer Generäle plädieren für eine umfassende Modernisierung der Armee, doch eine moderne Armee würde in den kalten Steppen und heißen Wüsten der Mongolei nicht funktionieren. Was wir brauchen, ist eine gut ausgerüstete Armee."
MON_foreign_doctrines:0 "Ausländische Lehren"
MON_foreign_doctrines_desc:0 "Wir könnten das eine oder andere von anderen Nationen lernen, um die Qualität unserer Armee zu verbessern."
MON_russian_armor:0 "Russische Rüstung"
MON_russian_armor_desc:0 "Russische Blaupausen werden uns dabei helfen, unsere eigenen Panzer zu entwickeln."
MON_foreign_weapons:0 "Ausländische Waffen"
MON_foreign_weapons_desc:0 "Der Kauf ausländischer Waffen wird unsere Versorgungslage verbessern und zu einer besseren Ausrüstung unserer Armeen beitragen."
MON_modern_weapons:0 "Moderne Waffen"
MON_modern_weapons_desc:0 "Durch die Anschaffung modernerer Waffendesigns werden wir die Leistungsfähigkeit unserer Armeen verbessern."
MON_modern_horde:0 "Moderne Horde"
MON_modern_horde_desc:0 "Unsere Vorfahren kesselten ihre Feinde rasch ein und besiegten sie. Unsere modernisierte Armee wird nun in der Lage sein, dasselbe zu tun, und zwar viel besser als zuvor."
MON_steppe_army:0 "Steppenarmee"
MON_steppe_army_desc:0 "Unsere Armee ist es gewohnt, in den Steppen und Wüsten Asiens zu kämpfen. Dies wird uns einen Vorteil gegenüber unseren Feinden verschaffen."
MON_pack_for_winter:0 "Packen für den Winter"
MON_pack_for_winter_desc:0 "Die Winter in unserer Region sind unglaublich hart. Wir müssen unsere Armeen mit der richtigen Kleidung und den richtigen Werkzeugen ausstatten, damit unsere Feinde nicht erfrieren."
MON_foreign_arsenals:0 "Ausländische Arsenale"
MON_foreign_arsenals_desc:0 "Wir können unsere Armee nicht allein versorgen. Um das erforderliche Produktionsniveau zu erreichen, benötigen wir die Hilfe unserer derzeitigen Verbündeten."
MON_birth_of_an_airforce:0 "Geburt einer Luftwaffe"
MON_birth_of_an_airforce_desc:0 "Wir werden mit dem Aufbau einer Luftwaffe beginnen, die in der Lage ist, unsere Feinde in Angst und Schrecken zu versetzen und unser Volk aus der Luft zu schützen."
MON_bomber_research:0 "Bomberforschung"
MON_bomber_research_desc:0 "Wir werden unser Bestes tun, um neue Bomber zu entwickeln, die mit der Technologie unserer Feinde konkurrieren können."
MON_western_strategies:0 "Westliche Strategien"
MON_western_strategies_desc:0 "Wir werden die westlichen Strategien kopieren, um die Fähigkeiten unserer Luftwaffe zu verbessern."
MON_fighter_research:0 "Kämpferforschung"
MON_fighter_research_desc:0 "Wir werden unser Bestes tun, um neue Kampfflugzeuge zu entwickeln, die mit der Technologie unserer Feinde konkurrieren können."
MON_kublais_khan_vengeance:0 "Kublais Khan-Rache"
MON_kublais_khan_vengeance_desc:0 "Kublai Khan war der erste Kaiser der Yuan-Dynastie und der letzte Großkhan des Mongolischen Reiches. Er begann die Invasion Japans, wurde jedoch von zwei Taifunen, den sogenannten „Kamikaze“, besiegt. Wir werden seinen Traum verwirklichen, indem wir die mongolische Marine wiederaufbauen und anschließend die Japaner ein für alle Mal vernichten."
MON_copy_russian_technologies:0 "Kopieren Sie russische Technologien"
MON_copy_russian_technologies_desc:0 "Wir werden einige russische Technologien imitieren, um schnell eine neue Marine aufzubauen."
MON_copy_japanese_technologies:0 "Japanische Technologien kopieren"
MON_copy_japanese_technologies_desc:0 "Wir werden einige japanische Technologien imitieren, um schnell eine neue Marine aufzubauen."
MON_yuan_dockyards:0 "Yuan-Werften"
MON_yuan_dockyards_desc:0 "In Yuan, auch bekannt als China, werden Werften gebaut, um mit dem Aufbau unserer Seestreitkräfte zu beginnen."
MON_foreign_doctrines2:0 "Ausländische Lehren"
MON_foreign_doctrines2_desc:0 "Wir könnten von anderen Nationen das eine oder andere lernen, um die Qualität unserer Marine zu verbessern."
MAN_an_army_with_a_state:0 "Eine Armee mit einem Staat"
MAN_an_army_with_a_state_desc:0 "„Für Showa und das Imperium“ \n\n„KEHRT NACH HAUSE ZURÜCK!“ \n\n„Zerschmettert die kommunistische Bedrohung!“"
MAN_reorganize_the_nation:0 "Reorganisieren Sie die Nation"
MAN_reorganize_the_nation_desc:0 "Die ehemalige mandschurische Nation muss völlig neu organisiert werden, um einen Beitrag zum Krieg gegen die Teufel leisten zu können, die die Macht in Tokio übernommen haben."
MAN_dockyard_conversion:0 "Umbau der Werft"
MAN_dockyard_conversion_desc:0 "Wir müssen unsere Werften umbauen, damit sie unsere Kriegsschiffe produzieren und reparieren können. Wenn wir unsere Seeherrschaft nicht aufrechterhalten können, werden wir Tokio nie befreien können."
MAN_extensive_army_training:0 "Umfangreiche Armeeausbildung"
MAN_extensive_army_training_desc:0 "Wir müssen mit Armeeübungen beginnen, um uns auf unseren größten Kampf vorzubereiten."
MAN_empower_the_imperial_family:0 "Stärken Sie die kaiserliche Familie"
MAN_empower_the_imperial_family_desc:0 "Nur die Nachkommen von Amaterasu selbst sind in der Lage, den Japanern wieder zu Größe zu verhelfen!"
MAN_a_different_approach:0 "Ein anderer Ansatz"
MAN_a_different_approach_desc:0 "Wir werden Tokio nicht zurückerobern können, wenn wir uns ständig mit unseren Vasallen und Nachbarn im Kampf befinden. Um sie auf unsere Seite zu ziehen, müssen wir einen gefügigeren Ansatz verfolgen."
MAN_prepare_for_the_strike:0 "Bereiten Sie sich auf den Streik vor"
MAN_prepare_for_the_strike_desc:0 "Jeder Bürger muss für die Befreiung Tokios arbeiten! Mandschuren, Mongolen, Russen, Koreaner und Japaner werden dafür sorgen, dass die Sonne wieder aufgeht!"
MAN_enemies_in_all_sides:0 "Feinde auf allen Seiten"
MAN_enemies_in_all_sides_desc:0 "Die Russen, die Chinesen und die illegitimen Japaner versuchen alle, unsere Nation zu zerstückeln und unser Erbe auszulöschen. Wir werden das nicht zulassen."
MAN_prepare_for_the_winter:0 "Bereiten Sie sich auf den Winter vor"
MAN_prepare_for_the_winter_desc:0 "Wenn wir im Kampf gegen unsere Feinde überleben wollen, muss unsere Armee auf die harten Winter im Norden Ostasiens und im Fernen Osten vorbereitet sein."
MAN_begin_the_hokushin_ron:0 "Beginnen Sie mit dem Hokushin-Ron"
MAN_begin_the_hokushin_ron_desc:0 "Wir dürfen nicht zulassen, dass die Russen uns überraschen. Wir müssen sie zuerst angreifen und ihnen so hart zusetzen, dass sie nie wieder in unser Gebiet eindringen können."
MAN_the_greatest_struggle:0 "Der größte Kampf"
MAN_the_greatest_struggle_desc:0 "„Für Showa und das Imperium“ \n\n„KEHRT NACH HAUSE ZURÜCK!“ \n\n„Zerschmettert die kommunistische Bedrohung!“"
MAN_guard_the_skies:0 "Bewache den Himmel"
MAN_guard_the_skies_desc:0 "Wir werden die Luftüberlegenheit auf See brauchen, um einen Fuß in unsere ehemalige Heimat setzen zu können."
MAN_supply_our_armed_forces:0 "Versorgung unserer Streitkräfte"
MAN_supply_our_armed_forces_desc:0 "Schiffe und Flugzeuge sind ohne Öl als Treibstoff nichts weiter als nutzloser Stahl. Wir müssen die in Europa erlernten neuen Techniken nutzen, um die Versorgungslage zumindest ein wenig zu entschärfen."
MAN_deal_with_korea:0 "Koreanische Autonomie"
MAN_deal_with_korea_desc:0 "Wir werden den Koreanern eine begrenzte Autonomie gewähren, um künftige Aufstände zu verhindern und einen neuen Verbündeten für unseren Kampf um Tokio zu gewinnen."
MAN_deal_with_the_kuomintang:0 "Deal mit der Kuomintang"
MAN_deal_with_the_kuomintang_desc:0 "Die Chinesen werden früher oder später kommen, um ihr ehemaliges Land zurückzuerobern. Wir müssen schnell einen Deal machen, damit das nicht passiert"
MAN_we_wont_rest:0 "Wir werden nicht ruhen"
MAN_we_wont_rest_desc:0 "Kein Bürger von Kwantung wird ruhen, bis Tokio von den Barbaren befreit ist, die es derzeit halten!"
MAN_military_exercises:0 "Militärübungen"
MAN_military_exercises_desc:0 "Wir müssen mit Armeeübungen beginnen, um uns auf unseren größten Kampf vorzubereiten."
MAN_begin_the_nanshin_ron:0 "Beginnen Sie mit dem Nanshin-Ron"
MAN_begin_the_nanshin_ron_desc:0 "Wir dürfen nicht zulassen, dass die Chinesen uns überraschen. Wir müssen sie zuerst angreifen und ihnen so hart zuschlagen, dass sie nie in der Lage sind, in unser Gebiet einzudringen."
MAN_consolidate_the_chinese_holdings:0 "Konsolidierung der chinesischen Beteiligungen"
MAN_consolidate_the_chinese_holdings_desc:0 "Wir sind nicht in der Lage, die Inseln von den illegitimen Japanern zurückzuerobern. Wir müssen das, was wir in China erworben haben, festigen und uns darauf vorbereiten, eines Tages unsere Heimat zurückzuerobern."
MAN_consolidate_the_russian_holdings:0 "Konsolidierung der russischen Beteiligungen"
MAN_consolidate_the_russian_holdings_desc:0 "Wir sind nicht in der Lage, die Inseln von den illegitimen Japanern zurückzuerobern. Wir müssen das, was wir in Russland erworben haben, festigen und uns darauf vorbereiten, eines Tages unsere Heimat zurückzuerobern."
MAN_retake_the_isles:0 "Erobert die Inseln zurück"
MAN_retake_the_isles_desc:0 "Wir sind nun bereit, Tokio aus den Händen der Barbaren zurückzuerobern, die es gestohlen haben! Für Showa und das Imperium: Kehrt nach Hause zurück!"
MAN_restore_our_rule:0 "Stellen Sie unsere Regel wieder her"
MAN_restore_our_rule_desc:0 "Nachdem wir nun wieder die Kontrolle über Tokio übernommen haben, ist es an der Zeit, die göttliche Herrschaft über das Land wiederherzustellen."
MAN_rebuild_the_nation:0 "Wiederaufbau der Nation"
MAN_rebuild_the_nation_desc:0 "Alle Japaner müssen daran arbeiten, das wieder aufzubauen, was die Kommunisten zerstört haben, für eine bessere Zukunft!"
MAN_the_sun_rises_again:0 "Die Sonne geht wieder auf"
MAN_the_sun_rises_again_desc:0 "Ein neues Japan wird aus dem Blut und den Opfern unserer Soldaten geschmiedet. Ob diese neue Regierung am Ende genauso brutal sein wird, kann nicht einmal der Kaiser sagen. Sicher ist jedoch, dass die Sonne wieder aufgeht."
MAN_under_one_marshal:0 "Unter einem Marschall"
MAN_under_one_marshal_desc:0 "Eine gute Regierung braucht weder Gesetze noch Demokratie. Sie braucht einen wohlwollenden Führer, der seiner Regierungsbevölkerung Ordnung und Unterwerfung bringt."
MAN_chinese_universities:0 "Chinesische Universitäten"
MAN_chinese_universities_desc:0 "Der Westen hat dem chinesischen Volk genug Schaden zugefügt. Schulen und Universitäten in China werden sich an chinesischen Standards und Umgangsformen orientieren."
MAN_centralization_campaign:0 "Zentralisierungskampagne"
MAN_centralization_campaign_desc:0 "Das amerikanische Föderalisierungsmodell wird unsere Regierung nur schwächen. Wir müssen eine starke Zentralisierung durchführen, damit sich kein Kriegsherr oder Rebell erneut von uns losreißen kann."
MAN_confucian_rule:0 "Konfuzianische Herrschaft"
MAN_confucian_rule_desc:0 "Alle Chinesen müssen die traditionellen konfuzianischen Regeln befolgen, um Erleuchtung zu erlangen und dem Chaos im Land ein Ende zu setzen."
MAN_anti_imperialism:0 "Antiimperialismus"
MAN_anti_imperialism_desc:0 "Das Qing-Reich war schwach, gab zahlreiche Gebiete ab und unterzeichnete unzählige unfaire Verträge mit den Nationen Europas. Aber wir, wir lassen uns von niemandem beugen."
MAN_the_persistent_way:0 "Der beharrliche Weg"
MAN_the_persistent_way_desc:0 "Yiguandao (was so viel bedeutet wie „beständiger Weg“) ist eine chinesische Heilssekte, die im späten 19. Jahrhundert in Shandong entstand. In den 30er Jahren verbreitete sich Yiguandao rasch in ganz China unter der Führung von Zhang Tianran, dem 18. Patriarchen der Tao-Linie des Späten Fernen Ostens, und Sun Suzhen, der ersten Matriarchin dieser Linie."
MAN_big_swords_an_red_spears:0 "Große Schwerter und rote Speere"
MAN_big_swords_an_red_spears_desc:0 "Die „Big Swords Society“ und die „Red Spear Society“ entstanden als ländliche Selbstverteidigungsbewegungen in Nordchina. Es handelte sich um lokale Gruppen von Kleinbauern und Pächtern, die sich organisierten, um ihre Dörfer gegen umherziehende Banditen, Kriegsherren, Steuereintreiber und später auch gegen chinesische Kommunisten oder Japaner zu verteidigen. Die Zusammenarbeit mit diesen Milizen wird unsere Kampfkraft gegen die Japaner verbessern."
MAN_militia_training:0 "Milizausbildung"
MAN_militia_training_desc:0 "Es reicht nicht aus, dass die ländlichen Guerillas die ländlichen Gebiete verteidigen. Wenn wir Japan vertreiben wollen, müssen wir mit einer umfassenden Milizausbildung beginnen."
MAN_blood_in_the_mountains:0 "Blut in den Bergen"
MAN_blood_in_the_mountains_desc:0 "Indem wir die japanischen Streitkräfte in die Hügel und Berge der Mandschurei führen, können wir sie leicht ausschalten, sobald sie desorganisiert und geschwächt sind, und so ihren Einfluss in der Region verringern."
MAN_charity_campaigns:0 "Wohltätigkeitskampagnen"
MAN_charity_campaigns_desc:0 "Indem wir Bedürftigen helfen, können wir Unterstützung für unsere Sache gewinnen und gleichzeitig die Lebenssituation in der Region verbessern."
MAN_lanterns_and_fists:0 "Laternen und Fäuste"
MAN_lanterns_and_fists_desc:0 "Der Boxeraufstand brachte zwei antiimperialistische Gruppen nach China: die Boxer oder „Fäuste der Harmonie und Gerechtigkeit“ und die „Roten Laternen“. Wir dürfen nicht vergessen, wie erbittert diese Helden gegen die Unterdrückung durch das Ausland kämpften."
MAN_kick_the_imperialists_out:0 "Werft die Imperialisten raus"
MAN_kick_the_imperialists_out_desc:0 "Es ist an der Zeit, die Fesseln der Unterdrückung abzuwerfen und für unsere alten Freiheiten zu kämpfen. Wir werden die erste Region Chinas sein, die frei von ausländischer Unterdrückung atmet."
MAN_pivot_to_the_past:0 "Schwenk in die Vergangenheit"
MAN_pivot_to_the_past_desc:0 "Nachdem die Qing durch die japanischen Bombenangriffe auf den Königspalast gestorben sind, brauchen wir jemanden, der ihren Platz einnimmt. Das soll die Familie Zhu sein, Nachkommen der Ming-Dynastie. Obwohl einige von ihnen den Kommunisten Mao Zedongs die Treue geschworen zu haben scheinen, glauben wir, dass sie den wahren Weg der Yiguandao erkennen werden, sobald sie wieder auf dem Thron sitzen."
MAN_the_end_of_the_game:0 "Das Ende des Spiels"
MAN_the_end_of_the_game_desc:0 "Nachdem der Machtkampf nun beendet ist, ist es an der Zeit, sich auf die Wiedervereinigung Chinas zu konzentrieren."
MAN_biased_education:0 "Voreingenommene Bildung"
MAN_biased_education_desc:0 "Unsere Schüler werden einen einfachen Zugang zu Bildung haben, aber es wird ihnen nur das beigebracht, was für uns nützlich ist."
MAN_export_our_ideals:0 "Exportieren Sie unsere Idale"
MAN_export_our_ideals_desc:0 "Die anderen Regionen Chinas werden bald das Vergnügen haben, unserer Führung und unseren Ideen zu folgen."
MAN_reclaim_the_ming_legacy:0 "Fordern Sie das Erbe der Ming zurück"
MAN_reclaim_the_ming_legacy_desc:0 "Wir werden in die alte Hauptstadt der Ming-Dynastie zurückkehren, um dann unsere Größe in ganz China zu verbreiten."
MAN_assimilate_outer_manchuria:0 "Assimilation der Äußeren Mandschurei"
MAN_assimilate_outer_manchuria_desc:0 "Wir werden die Äußere Mandschurei wieder eingliedern, nachdem es uns gelungen ist, sie aus der Gewalt der Russen zurückzugewinnen."
MAN_flame_of_the_mother:0 "Flamme der Mutter"
MAN_flame_of_the_mother_desc:0 "Nachdem Zhang Tianran und die Yiguandao nun die vollständige Kontrolle über die Nation erlangt haben, können alle Chinesen ihren Idealen folgen."
MAN_a_benevolent_dynasty:0 "Eine wohlwollende Dynastie"
MAN_a_benevolent_dynasty_desc:0 "Der große Fehler der Qing-Dynastie war ihre Unfähigkeit, die Bedürfnisse ihres Volkes zu verstehen, und ihre mangelnde Bereitschaft, ihm zu helfen. Wir werden nicht dieselben Fehler begehen."
MAN_ying:0 "Ying"
MAN_ying_desc:0 "Negativität, Weiblichkeit, Passivität. Die Menschen in China müssen die Prinzipien des Ying erlernen, um Größe zu erreichen."
MAN_yang:0 "Yang"
MAN_yang_desc:0 "Positivität, Männlichkeit, Initiative. Die Menschen in China müssen die Prinzipien des Yang erlernen, um Großes zu erreichen."
MAN_eternity:0 "Ewigkeit"
MAN_eternity_desc:0 "Der Tod ist nichts anderes als die Errungenschaft der Ewigkeit."
MAN_help_the_people:0 "Helfen Sie den Menschen"
MAN_help_the_people_desc:0 "Indem wir der Bauernschaft Chinas helfen, können wir sie davon überzeugen, dass wir nicht mit den Qing identisch sein werden."
MAN_learn_from_chinas_mistakes:0 "Aus Chinas Fehlern lernen"
MAN_learn_from_chinas_mistakes_desc:0 "Der Autoritarismus hat China schon immer geplagt. Damit wird es nun ein Ende haben."
MAN_land_reform:0 "Bodenreform"
MAN_land_reform_desc:0 "Landwirte bilden die Basis jeder Gesellschaft. Wir müssen eine Landreform einleiten, um die Armut auf dem Land zu senken."
MAN_overthrow_the_zhu:0 "Stürze die Zhu"
MAN_overthrow_the_zhu_desc:0 "Die kommunistischen Milizen, die sich einst den Zhu angeschlossen hatten, um Zhangs Wahnsinn zu bekämpfen, haben die kurzlebige Monarchie nun gestürzt. Xiao Jinguang, Mitglied der KPCh und Ehemann von Zhu Zhongzhi, hat die Macht übernommen, und in der ganzen Region kursieren Gerüchte über eine geplante Vereinigung mit anderen kommunistischen Guerillas."
MAN_peoples_war:0 "Volkskrieg"
MAN_peoples_war_desc:0 "Andere Länder glauben vielleicht, dass Kriege durch Technologie und Feuerkraft gewonnen werden. Wir wissen es besser. Keine Technologie kann einem entschlossenen Volk standhalten, das bereit ist, Opfer zu bringen."
MAN_protect_the_revolution:0 "Schützen Sie die Revolution"
MAN_protect_the_revolution_desc:0 "Wir dürfen nicht zulassen, dass die Konterrevolution auch nur das kleinste Dorf erfasst. Unser Ziel muss es sein, jeden einzelnen Verräter zu finden, bevor er Schaden anrichten kann."
FRA_the_second_spartacus:0 "Moi, Spartacus"
FRA_the_second_spartacus_desc:0 "So wie Spartacus im Dritten Sklavenkrieg gegen das Römische Reich die Sklaven sammelte, werden wir die unterworfenen Franzosen gegen die Deutschen führen. Sie werden nicht durchkommen!"
FRA_contact_de_gaulle:0 "Kontakt de Gaulle"
FRA_contact_de_gaulle_desc:0 "Charles de Gaulle hat es geschafft, eine bedeutende Streitmacht von Freiheitskämpfern gegen die Deutschen zu vereinen. Wir müssen versuchen, uns mit diesen Armeen zu vereinen, um gemeinsam nach Berlin zu marschieren."
FRA_alone_against_all_odds:0 "Allein gegen alle Widrigkeiten"
FRA_alone_against_all_odds_desc:0 "Wir können Charles de Gaulle und seiner Exilregierung nicht trauen. Sie ist nichts weiter als eine britische Marionette, die blind ihren Befehlen folgt. Wir werden das allein schaffen, und wir werden es richtig machen."
FRA_collaborate_with_the_maquis:0 "Zusammenarbeit mit dem Maquis"
FRA_collaborate_with_the_maquis_desc:0 "Wir müssen mit dem Maquis zusammenarbeiten, um größere Chancen gegen die Wehrmacht zu haben."
FRA_unite_iberia:0 "Unite Iberia"
FRA_unite_iberia_desc:0 "Die Vereinigung der Iberischen Halbinsel wird unsere Union stärken und im Kriegsfall unsere westlichen Grenzen sichern. Portugal muss sich jetzt mit uns vereinen, ob es uns gefällt oder nicht."
FRA_retake_rome:0 "Erobern Sie Rom zurück"
FRA_retake_rome_desc:0 "Die italienische Nation wird seit Jahren, ja Jahrzehnten, von Korruption und Inkompetenz geplagt. Wir müssen die Hauptstadt des alten Römischen Reiches von diesen barbarischen Wesen befreien."
FRA_latin_unity:0 "Lateinische Einheit"
FRA_latin_unity_desc:0 "Die germanischen Völker haben Europa zu lange beherrscht. Es ist an der Zeit, unser nationales Geburtsrecht als Nachfolgestaaten des Römischen Reiches zurückzufordern!"
FRA_expand_the_union:0 "Erweitern Sie die Union"
FRA_expand_the_union_desc:0 "Wir dürfen die in Wallonien und Rumänien lebenden Lateinamerikaner nicht vergessen. Sie alle müssen unserer Union beitreten, um erneut die Führungsrolle auf dem Kontinent zu übernehmen."
FRA_split_switzerland:0 "Split Schweiz"
FRA_split_switzerland_desc:0 "Die Schweiz ist eine Nation, die ihre Existenz nicht verdient. Sie ist aus einer widernatürlichen Union zwischen Deutschen, Franzosen und Italienern entstanden und muss geteilt werden."
FRA_dissolve_the_action_francaise:0 "Lösen Sie die Action Française auf"
FRA_dissolve_the_action_francaise_desc:0 "Die Action Française war ein enger Verbündeter von uns, doch nach ihrer Radikalisierung und den gewalttätigen Protesten im Jahr 1934 schadet sie nur unserem Image. Sie muss gehen."
FRA_contact_the_social_party:0 "Kontakt zur Sozialpartei"
FRA_contact_the_social_party_desc:0 "Die Sozialpartei von La Rocque hat einige Mitglieder, die unsere monarchistische Restauration uneingeschränkt unterstützen würden. Wir sollten dieser Partei näherkommen, um die Stabilität unseres Regimes zu verbessern."
FRA_crusade_against_parlamentarism:0 "Kreuzzug gegen den Parlamentarismus"
FRA_crusade_against_parlamentarism_desc:0 "Der Parlamentarismus hat sich aus vielen Gründen als ineffiziente Regierungsform erwiesen. Wir werden in ganz Westeuropa eine antiparlamentaristische Kampagne starten."
FRA_monarchist_entente:0 "Monarchistische Entente"
FRA_monarchist_entente_desc:0 "Die Entente Cordiale ging aus dem Ersten Weltkrieg als Sieger hervor, doch angesichts der nun schwachen britischen Regierung und der blutrünstigen sowjetischen Führung sind wir gezwungen, nach weiteren Verbündeten zu suchen, wenn wir unser eigenes Militärbündnis bilden wollen."
FRA_invite_the_spaniards:0 "Lade die Spanier ein"
FRA_invite_the_spaniards_desc:0 "Die Spanier waren damit beschäftigt, den Aufstieg des Kommunismus in ihrem Heimatland zu verhindern. Jetzt, da sich die Lage beruhigt hat, sollten wir unser Bündnis mit ihnen formalisieren."
FRA_restore_the_brazilian_monarchy:0 "Wiederherstellung der brasilianischen Monarchie"
FRA_restore_the_brazilian_monarchy_desc:0 "Die Instabilität in Brasilien hat einen kritischen Punkt erreicht. Der einzige Weg, sie zu überwinden, besteht darin, das brasilianische Imperium wiederherzustellen."
FRA_reunite_the_two_kingdoms:0 "Vereint die beiden Kronen wieder"
FRA_reunite_the_two_kingdoms_desc:0 "Portugiesen und Brasilianer sind gute Kandidaten für eine Wiedervereinigung. Sie teilen Kultur und Sprache und wären daher gute Verbündete."
FRA_unite_the_two_houses:0 "Vereint die beiden Häuser"
FRA_unite_the_two_houses_desc:0 "Die brasilianische Nation sollte direkt vom Haus Orléans-Braganza kontrolliert werden, auf diese Weise können wir die Zukunft beider Nationen verbessern."
FRA_two_nations_two_crowns:0 "Zwei Nationen, zwei Kronen"
FRA_two_nations_two_crowns_desc:0 "Die Brasilianer sollten unter König Henri, Graf von Paris und Mitglied des Hauses Orléans-Braganza, ein gewisses Maß an Autonomie genießen."
MEX_remember_maximilian:0 "Gedenken an Maximilian"
MEX_remember_maximilian_desc:0 "Ferdinand Maximilian Joseph Maria von Habsburg-Lothringen, in Mexiko Maximiliano I. genannt, war von 1864 bis 1867 der zweite Kaiser Mexikos. Er wurde jedoch von den Männern Benito Juárez&#39; allein aufgrund seiner Monarchie erschossen, obwohl er liberaler und gefügiger war als der skrupellose Diktator. Wir werden den Mexikanern die Augenbinde abnehmen, damit sie erkennen, wer der wahre Bösewicht des 19. Jahrhunderts war."
MEX_reclaim_the_dynastic_titles:0 "Fordern Sie die dynastischen Titel zurück"
MEX_reclaim_the_dynastic_titles_desc:0 "Maria de Iturbide ist die Tochter von Salvador de Iturbide, dem Enkel des ersten Kaisers von Mexiko und Adoptivsohn von Maximilian von Habsburg. Sie wäre ein Mitglied des habsburgischen Königshauses, hätte Maximilian I. nicht auf seine Titel als Erzherzog von Österreich und Prinz von Ungarn und Böhmen verzichtet. Da sie jedoch in eine reiche Familie in Österreich-Ungarn hineingeboren wurde und mit einem Adeligen verheiratet war, ist es ihr möglich, ihre Titel zurückzufordern."
MEX_join_the_central_powers:0 "Schließen Sie sich den Mittelmächten an"
MEX_join_the_central_powers_desc:0 "Die Mittelmächte boten Mexiko an, sich ihnen im Ersten Weltkrieg gegen die USA anzuschließen. Da wir uns jedoch gerade von einem Bürgerkrieg erholten, konnten wir diese Möglichkeit nicht einmal in Erwägung ziehen. Doch nun, da beide Imperien wiedergeboren sind, ist es an der Zeit, ihrem Ruf zu folgen."
MEX_revive_the_empire:0 "Beleben Sie das Imperium wieder"
MEX_revive_the_empire_desc:0 "Wir brauchen Verbündete gegen die Feinde Mexikos, und die alte Heimat von Maria Josepha an der Donau könnte uns dabei hilfreich sein."
MEX_no_more_nightmares:0 "Keine Albträume mehr"
MEX_no_more_nightmares_desc:0 "Der bekannte „Amerikanische Traum“ existierte nur für die Amerikaner selbst. Während sie ihren Reichtum und Luxus genossen, wurden viele Nationen Lateinamerikas von ihren Unternehmen und ständigen Invasionen ausgebeutet, wenn die jeweilige Regierung des angegriffenen Landes sich nicht an den Interessen der USA orientierte. Jetzt ist es an der Zeit, den „Amerikanischen Albtraum“ zu beenden." 
CENTRAL_a_memory:0 "Eine Erinnerung"
CENTRAL_a_memory_desc:0 "Die Föderative Republik Mittelamerika bestand von 1828 bis 1841 und war ein Zusammenschluss der Länder Guatemala, Honduras, El Salvador, Nicaragua und Costa Rica. Doch dieser Zusammenschluss wurde durch Konflikte zwischen Liberalen, Konservativen und Separatisten zerrissen, so dass Mittelamerika zu einer schwachen Region wurde, die von den Amerikanern ausgebeutet wurde."
CENTRAL_a_dream:0 "Ein Traum"
CENTRAL_a_dream_desc:0 "...Aber wenn wir wieder vereint wären, könnten wir sie vielleicht bekämpfen und unser Heimatland vor ihren Kompanien und Invasionen verteidigen ..."
CENTRAL_a_crusade:0 "Ein Kreuzzug"
CENTRAL_a_crusade_desc:0 "...Und deshalb müssen wir uns wieder vereinen, auch wenn die anderen Mitglieder der ehemaligen Union das nicht wollen, denn wenn wir wieder zusammen sind, werden sie erkennen, dass dies der einzige Weg ist, in diesen schwierigen Zeiten zu überleben."
CENTRAL_unidad_centroamericana:0 "Zentralamerikanische Einheit"
CENTRAL_unidad_centroamericana_desc:0 "Jetzt, da wir wieder vereint sind, ist es an der Zeit, unsere Union neu zu organisieren, damit sie unteilbar wird!"
CENTRAL_yes_we_have_bananas:0 "Ja, wir haben Bananen!"
CENTRAL_yes_we_have_bananas_desc:0 "Wenn wir unsere Wirtschaft auf Nahrungsmittelexporte stützen, wird dies ihre Entwicklung fördern. Sobald wir die entsprechenden Mittel haben, werden wir mit der Industrialisierung beginnen."
CENTRAL_sugar_exports:0 "Zuckerexporte"
CENTRAL_sugar_exports_desc:0 "Wir werden die Zuckerproduktion steigern und gleichzeitig alle davon überzeugen, dass dieser Zucker die beste Qualität der Welt hat. Schließlich mag jeder Desserts, und Desserts müssen Zucker enthalten."
CENTRAL_guard_the_seas:0 "Bewache die Meere"
CENTRAL_guard_the_seas_desc:0 "Aufgrund unserer Lage zwischen dem Atlantischen und dem Pazifischen Ozean ist es für unser Land von wesentlicher Bedeutung, über eine schlagkräftige Marine zu verfügen, die beide Ozeane bewacht."
CENTRAL_the_last_state:0 "Der letzte Staat"
CENTRAL_the_last_state_desc:0 "Panama war aufgrund seiner Unterwerfung unter Kolumbien kein Teil der alten Union. Jetzt ist es das nicht mehr, und deshalb ist es an der Zeit, das letzte zentralamerikanische Land in unsere Union zu integrieren."
CENTRAL_liberate_the_north:0 "Befreie den Norden"
CENTRAL_liberate_the_north_desc:0 "Ein großer Teil der Provinz Chiapas sowie Teile von Yucatán gehörten einst zur Republik Mittelamerika, wurden aber im 19. Jahrhundert von den mexikanischen Barbaren geraubt. Doch jetzt, da wir wieder stark sind, ist es an der Zeit, unsere Brüder im Norden zu befreien."
SPR_integrate_ceuta_and_melilla:0 "Integration von Ceuta und Melilla"
SPR_integrate_ceuta_and_melilla_desc:0 "Ceuta und Melilla sind strategische Häfen in Marokko. Wir müssen diese Gebiete in die spanische Nation integrieren."
SPA_reintegrate_the_imperial_pocessions:0 "Reintegrieren Sie die kaiserlichen Besitztümer"
SPA_reintegrate_the_imperial_pocessions_desc:0 "Unsere Besitzungen in Asien und der Karibik sollen wieder in die Verwaltung der spanischen Krone übergehen."
SPA_the_two_suns:0 "Die zwei Sonnen"
SPA_the_two_suns_desc:0 "Die aufgehende und die niemals untergehende Sonne müssen sich gegen die USA und ihren Imperialismus vereinen, bevor es zu spät ist."
PHI_the_philippine_commonwealth:0 "Das philippinische Commonwealth"
PHI_the_philippine_commonwealth_desc:0 "Der Commonwealth der Philippinen ist die Verwaltungsbehörde, die die Philippinen seit 1935 regiert. Er ersetzte die Inselregierung, eine territoriale Regierung der Vereinigten Staaten, und wurde durch den Tydings-McDuffie Act gegründet. Der Commonwealth wurde als Übergangsverwaltung zur Vorbereitung der vollständigen Unabhängigkeit des Landes konzipiert."
PHI_recognize_the_spanish_heritage:0 "Erkennen Sie das spanische Erbe"
PHI_recognize_the_spanish_heritage_desc:0 "Die USA werden die spanische Sprache und Kultur auf den Philippinen niemals auslöschen. Wir müssen diese Aspekte unserer Nation bewahren, koste es, was es wolle."
PHI_promote_tagalog_language:0 "Fördern Sie die Tagalog-Sprache"
PHI_promote_tagalog_language_desc:0 "Die offiziellen Sprachen des Commonwealth sind Englisch und Spanisch, doch auch die Einheimischen verdienen es, in dieser Union vertreten zu sein. Tagalog wird die Grundlage einer Nationalsprache in der Kómonwélt ng Pilipinas! werden."
PHI_destroy_the_spanish_identity:0 "Die spanische Identität auslöschen"
PHI_destroy_the_spanish_identity_desc:0 "Viele hispanophile Anhänger wurden im Philippinisch-Amerikanischen Krieg ausgelöscht, wodurch die ohnehin geringe Zahl spanischsprachiger Menschen noch weiter dezimiert wurde. Nun verblasst ihre Identität immer mehr und wird durch die amerikanische und philippinische ersetzt."
PHI_the_philippine_army:0 "Die philippinische Armee"
PHI_the_philippine_army_desc:0 "Vor der Gründung der Commonwealth-Regierung im Jahr 1935 unternahmen die philippinischen Streitkräfte keinerlei Anstrengungen zur Selbstverteidigung, da die USA die Verantwortung für die Verteidigung der Inseln übernommen hatten. Doch mit dem Aufstieg des Faschismus und der Expansionspolitik in Europa und Asien müssen wir jetzt eine Armee aufstellen."
PHI_american_weapons:0 "Amerikanische Waffen"
PHI_american_weapons_desc:0 "Amerikanische Lieferungen werden zum Aufbau der philippinischen Armee beitragen."
PHI_deal_with_the_japanese:0 "Deal mit den Japanern"
PHI_deal_with_the_japanese_desc:0 "Beim Sakdalista-Aufstand von 1935 wurde japanische Unterstützung versprochen, die jedoch nie erfolgte. Aufgrund des japanischen Expansionismus könnte die aufgehende Sonne dieses Mal jedoch eher bereit sein, uns zu helfen."
PHI_macarthurs_military_mission:0 "MacArthurs Militärmission"
PHI_macarthurs_military_mission_desc:0 "Der designierte Präsident Manuel Luis Quezón überzeugte im Sommer 1935 seinen Freund, General Douglas MacArthur, mit Zustimmung Franklin D. Roosevelts eine nationale Armee aufzustellen. Heute bereiten er und ein Komitee des Army War College Pläne zur Verteidigung des philippinischen Commonwealth vor, bis es seine volle Unabhängigkeit erlangt."
PHI_american_technologies:0 "Amerikanische Technologien"
PHI_american_technologies_desc:0 "Unsere Technologien sind stark veraltet. Mit Hilfe der USA können wir möglicherweise den Rückstand gegenüber den anderen Ländern aufholen."
PHI_ally_the_hukbalahap:0 "Verbünde den Hukbalahap"
PHI_ally_the_hukbalahap_desc:0 "Die Hukbong Bayan Laban sa Hapon, was „Volksarmee gegen die Japaner“ bedeutet, war eine von der Gemeinsamen Front gegründete Guerilla zur Bekämpfung der japanischen Invasoren."
PHI_ceasefire_with_the_moros:0 "Waffenstillstand mit den Moros"
PHI_ceasefire_with_the_moros_desc:0 "Seit der Besetzung des Archipels durch die Spanier vor 300 Jahren haben die Muslime, die von ihnen Moros genannt werden, nicht aufgehört, Selbstmordattentate und Guerillakriege gegen die Besatzer ihres Heimatlandes zu verüben, insbesondere gegen die Juramentados (was auf Spanisch „Vereidigte“ bedeutet), muslimische Schwertkämpfer, die sowohl in den USA als auch auf den Philippinen gefürchtet sind."
PHI_black_army_uprising:0 "Aufstand der Schwarzen Armee"
PHI_black_army_uprising_desc:0 "Die Schwarze Armee ist nicht mit anarchistischen Organisationen zu verwechseln und wurde von Ruperto Kangleon gegründet. Sie ist eine Guerillaorganisation zur Bekämpfung der Japaner und eine der wildesten und gefürchtetsten auf den Philippinen."
PHI_falangist_connections:0 "Falangistische Verbindungen"
PHI_falangist_connections_desc:0 "Viele Filipinos haben Verbindungen zur spanischen Falangistenpartei. Wir könnten sie dazu nutzen, mit den Invasoren der Philippinen zu „kollaborieren“ und sie davon zu überzeugen, einen Teil ihrer Ressourcen für weniger wichtige Zwecke einzusetzen."
PHI_by_force:0 "Gewaltsam"
PHI_by_force_desc:0 "Wir können nicht länger auf leere Versprechungen warten. Unsere Unabhängigkeit wird jetzt kommen!"
PHI_by_reason:0 "Aus gutem Grund"
PHI_by_reason_desc:0 "Die Amerikaner haben uns 1946 die Unabhängigkeit versprochen. Vielleicht werden sie ihr Versprechen dieses Mal einlösen?"
PHI_the_greatest_struggle:0 "Der größte Kampf"
PHI_the_greatest_struggle_desc:0 "Leistet Widerstand! Tretet die Amerikaner, bis sie nach Kalifornien zurückkehren!"
PHI_the_grand_negotiation:0 "Die große Verhandlung"
PHI_the_grand_negotiation_desc:0 "Krieg ist nur das Versagen der Diplomatie. Doch dieses Mal wird die Diplomatie nicht versagen."
PHI_falange_filipina:0 "Falange Filipina"
PHI_falange_filipina_desc:0 "Die Philippinische Falange ist der informelle Name für die Juntas Nacionales Españolas de las Filipinas (auf Spanisch: Spanische Nationalversammlungen der Philippinen) und war eine 1936 gegründete philippinische falangistische politische Partei und ein Zweig der Spanischen Falange."
PHI_regional_agrarian_commissions:0 "Regionale Agrarkommissionen"
PHI_regional_agrarian_commissions_desc:0 "Die ländlichen Gebiete sind durch den Krieg verwüstet. Um sicherzustellen, dass die Bevölkerung nicht verhungert, werden wir ab sofort in jeder Region Agrarkommissionen einrichten. Diese werden die Produktivität des unbeschädigten Ackerlandes maximieren und es uns ermöglichen, die Bevölkerung zu ernähren."
PHI_syndicalize_production:0 "Syndikalisierung der Produktion"
PHI_syndicalize_production_desc:0 "Unsere Bewegung grenzt sich sowohl vom Kapitalismus als auch vom Kommunismus ab. Stattdessen werden wir nationale Syndikate gründen, in denen Arbeitnehmer und Arbeitgeber zusammenarbeiten können, um die Produktivität zum Wohle aller Filipinas zu maximieren."
PHI_mandatory_pre_military_training:0 "Obligatorische vormilitärische Ausbildung"
PHI_mandatory_pre_military_training_desc:0 "Zur Vorbereitung auf den Dienst in der Armee erhalten alle Männer eine obligatorische vormilitärische Ausbildung."
PHI_all_shall_serve:0 "Alle sollen dienen"
PHI_all_shall_serve_desc:0 "Die New Filipinas sind Ausdruck des Willens aller Filipinos, und daher muss es allen gestattet sein, ihre Pflicht zu seiner Verteidigung zu erfüllen. Die Rekrutierungsstandards müssen entsprechend erweitert werden."
PHI_crusade_to_madrid:0 "Kreuzzug nach Madrid"
PHI_crusade_to_madrid_desc:0 "So wie das Königreich Asturien im 8. Jahrhundert allein der muslimischen Bedrohung standhielt, haben wir den Kommunismus überlebt, der Spanien heute heimsucht, und so wie Asturien werden wir eine Reconquista beginnen, um unsere spanischen Brüder zu befreien."
PHI_falangist_exiles:0 "Falangistische Exilanten"
PHI_falangist_exiles_desc:0 "Auch wenn wir unglaublich weit von Spanien entfernt sind, werden wir dank der Solidarität aller faschistischen Nationen Europas und Asiens, die so solidarisch waren, Falangisten im Exil aus Spanien nach Manila zu bringen, besser auf die Rückkehr nach Madrid vorbereitet sein."
PHI_align_with_japan:0 "Mit Japan verbünden"
PHI_align_with_japan_desc:0 "Die Japaner planen, in Asien ein eigenes Imperium zu errichten, und wir sind wahrscheinlich Teil ihrer Eroberungspläne. Wenn wir sie jedoch davon überzeugen, dass wir Verbündete und keine Feinde sind, haben wir möglicherweise bessere Chancen, nach Spanien zurückzukehren."
PHI_revive_the_spanish_sentiment:0 "Beleben Sie das spanische Gefühl wieder"
PHI_revive_the_spanish_sentiment_desc:0 "Jedem Filipino wird die spanische Sprache und Kultur beigebracht, um ihn an seine Treue zu erinnern."
PHI_gather_navy_defectors:0 "Sammeln Sie Navy-Überläufer"
PHI_gather_navy_defectors_desc:0 "Indem wir die Überläufer der Marine ermutigen, nach Manila zu fliehen, können wir unsere alte Heimat zurückgewinnen."
PHI_the_lisboa_concordat:0 "Das Lissabon-Konkordat"
PHI_the_lisboa_concordat_desc:0 "Die iberischen Brüder müssen vereint bleiben, jetzt, da die größte Bedrohung die Kontrolle über Madrid übernommen hat."
PHI_the_second_reconquista:0 "Die zweite Reconquista"
PHI_the_second_reconquista_desc:0 "So wie das Königreich Asturien im 8. Jahrhundert allein der muslimischen Bedrohung standhielt, haben wir den Kommunismus überlebt, der Spanien heute heimsucht, und so wie Asturien werden wir eine Reconquista beginnen, um unsere spanischen Brüder zu befreien."
PHI_rebuild_our_homeland:0 "Bauen Sie unser Heimatland wieder auf"
PHI_rebuild_our_homeland_desc:0 "Die Zerstörungen, die zwei große Kriege in unserem Land angerichtet haben, werden sich nur schwer rückgängig machen lassen, doch jeder Spanier wird daran arbeiten, dieses Ziel zu erreichen."
PHI_rebuild_the_empire:0 "Baue das Imperium wieder auf"
PHI_rebuild_the_empire_desc:0 "Nachdem wir Spanien zurückerobert haben, ist es an der Zeit, den Rest zurückzuerobern."
PHI_our_brothers_in_spain:0 "Unsere Brüder in Spanien"
PHI_our_brothers_in_spain_desc:0 "Nachdem die Nationalisten nun die Kontrolle über Spanien erlangt haben, ist es an der Zeit, Kontakt mit ihnen aufzunehmen, um die Beziehungen zwischen unseren Nationen zu verbessern."
PHI_capitania_general:0 "Generalkapitänin"
PHI_capitania_general_desc:0 "Wir werden uns erneut mit Spanien unter einer Capitania General vereinen, so wie es schon immer hätte sein sollen!"
PHI_woo_the_japanese:0 "Werben Sie um die Japaner"
PHI_woo_the_japanese_desc:0 "Wenn wir die Japaner davon überzeugen, dass wir ihre Unterstützung verdienen, werden wir große Vorteile daraus ziehen, und der größte Vorteil besteht darin, dass wir uns keine Sorgen über eine Invasion machen müssen."
PHI_our_place_in_the_sun:0 "Unser Platz an der Sonne"
PHI_our_place_in_the_sun_desc:0 "Aufgrund der Instabilität in Spanien war man nie bereit, einen Handelshafen in China zu fordern, aber derzeit sind wir ziemlich stabil."
PHI_remember_formosa:0 "Erinnere dich an Formosa"
PHI_remember_formosa_desc:0 "Die Spanier besaßen einst einen Hafen im Norden Formosas, der jedoch vor Jahrhunderten von den Holländern geraubt wurde. Wir werden nicht auf das verzichten, was uns gehört."
PHI_recover_whats_ours:0 "Holen Sie sich zurück, was uns gehört"
PHI_recover_whats_ours_desc:0 "Wir werden alle Gebiete zurückerobern, die unserem Oberherrn in den letzten Jahrhunderten gestohlen wurden. Die Reconquista beginnt jetzt!"
PHI_guard_the_philippine_sea:0 "Bewachen Sie das Philippinische Meer"
PHI_guard_the_philippine_sea_desc:0 "Nur die Filipinos können die Filipinas beschützen."
PHI_second_sakdalista_uprising:0 "Zweiter Sakdalista-Aufstand"
PHI_second_sakdalista_uprising_desc:0 "Die Sakdalistas, eine agrarisch-sozialistische und nationalistische Partei unter Benigno Ramos, hatten Unterstützung von den Japanern versprochen und begannen einen Aufstand gegen die amerikanischen Imperialisten. Doch als die aufgehende Sonne sie im Stich ließ, brach der Aufstand zusammen. Doch dieses Mal wird der Aufstand nicht scheitern."
PHI_j_accuse:0 "Ich beschuldige"
PHI_j_accuse_desc:0 "Der Name der Bewegung leitet sich vom Tagalog-Wort „Sakdal“ ab, was auf Tagalog „anklagen“ bedeutet. Der Name geht auf den offenen Brief „J’accuse“ aus Frankreich zurück, der die korrupte französische Regierung anprangerte. Wir werden ihrem Beispiel folgen und den amerikanischen Imperialismus anprangern, bis er verschwunden ist."
PHI_land_for_the_landless:0 "Land für die Landlosen"
PHI_land_for_the_landless_desc:0 "Fast alle philippinischen Bauern leben praktisch als Sklaven ihrer Grundbesitzer, deshalb werden wir jedem landlosen Bauern auf den Philippinen Land geben!"
PHI_industry_nationalization:0 "Verstaatlichung der Industrie"
PHI_industry_nationalization_desc:0 "Nur der Sakdalista-Staat weiß, was für die Filipinos besser ist."
PHI_our_only_ally:0 "Unser einziger Verbündeter"
PHI_our_only_ally_desc:0 "Obwohl sie uns 1935 verraten haben, sind die Japaner unser einziger möglicher Verbündeter in ganz Asien. Wenn wir in diesen schweren Zeiten überleben wollen, müssen wir ihnen näherkommen."
PHI_learn_from_the_samurai:0 "Lernen Sie von den Samurai"
PHI_learn_from_the_samurai_desc:0 "Wir müssen von der aufgehenden Sonne lernen, um eine Marine aufzubauen, die in der Lage ist, unsere Nation zu verteidigen."
PHI_no_corruption:0 "Keine Korruption"
PHI_no_corruption_desc:0 "Die Arbeit der Politiker wird streng überwacht und jeder korrupte Politiker wird sofort rausgeworfen. Nur dann wird die Korruption auf den Philippinen vollständig ausgerottet."
PHI_honour_the_kkk:0 "Ehre den KKK"
PHI_honour_the_kkk_desc:0 "Nicht zu verwechseln mit dem amerikanischen Ku Klux Klan, dem „Kataas-taasang, Kagalang-galangang Katipunan ng mga Anak ng Bayan“, was in Tagalog „Höchste und Ehrwürdige Vereinigung der Kinder des Volkes“ bedeutet, ist ein Geheimbund, der 1892 mit dem Ziel der philippinischen Unabhängigkeit gegründet wurde. Emilio Aguinaldo und Artemio Ricarte waren Mitglieder dieser Organisation, und ihnen sowie den anderen Mitgliedern gebührt unser Lob."
PHI_form_the_makapili:0 "Bilden Sie den Makapili"
PHI_form_the_makapili_desc:0 "Die „Makabayang Katipunan ng mga Pilipino“, was auf Tagalog „Patriotische Vereinigung der Filipinos“ bedeutet, soll die Miliz der Sakdalista-Partei sein. Dann werden wir noch besser in der Lage sein, unsere Ideale zu verteidigen."
PHI_the_new_philippines:0 "Die neuen Philippinen"
PHI_the_new_philippines_desc:0 "Den Landlosen Land zurückgeben, sich um das Wohl der Arbeiter kümmern, Industrien verstaatlichen, Jugendlichen eine authentische philippinische Ausbildung ermöglichen, eine bürgernahe Justiz aufbauen und die Arbeit der Politiker genau beobachten. Dies wird dazu führen, dass die Bürger keine Verbrechen begehen, weil ein neuer, unabhängiger Lebensstandard entsteht, in dem jeder reich, glücklich und wohlhabend ist."
PHI_five_thousand_people_army:0 "500.000 Mann Armee"
PHI_five_thousand_people_army_desc:0 "Im Jahr 1935 haben wir unserem Volk eine Armee von 500.000 Mann versprochen, und wir werden dieses Versprechen erfüllen."
PHI_native_language_teaching:0 "Muttersprachlicher Unterricht"
PHI_native_language_teaching_desc:0 "Im Jahr 1935 versprachen wir, in jeder Schule des Landes einheimische Dialekte zu unterrichten, und wir werden unsere Versprechen einhalten."
PHI_the_moro_crusade:0 "Der Moro-Kreuzzug"
PHI_the_moro_crusade_desc:0 "Nach der Anarchie auf den Philippinen nach der Revolution gegen die USA sind die Juramentados und die Moros unter der Führung von Jainal Abirin II. mehr als bereit, Ordnung in das Land zu bringen."
PHI_the_enemy_of_our_enemies:0 "Der Feind unserer Feinde"
PHI_the_enemy_of_our_enemies_desc:0 "Wir vertrauen keinem Imperialisten, aber die Japaner scheinen unseren Zielen am nächsten zu sein, auch wenn sie welche sind."
PHI_copy_japanese_designs:0 "Japanische Designs kopieren"
PHI_copy_japanese_designs_desc:0 "Japanische Blaupausen werden uns beim Aufbau unserer eigenen Seestreitkräfte helfen."
PHI_ideological_fanaticism:0 "Ideologischer Fanatismus"
PHI_ideological_fanaticism_desc:0 "Jeder Mensch ist an die Regeln des Islam gebunden."
PHI_pearling_industry:0 "Perlenindustrie"
PHI_pearling_industry_desc:0 "Der Rückgriff auf die Perlenindustrie, wie in den Tagen des alten Sultanats, wird das Wachstum unserer Wirtschaft fördern."
PHI_prepare_for_the_holy_war:0 "Bereite dich auf den Heiligen Krieg vor"
PHI_prepare_for_the_holy_war_desc:0 "Wir müssen unsere muslimischen Brüder im Süden befreien, aber ohne Vorbereitung können wir das nicht tun."
PHI_praise_the_juramentados:0 "Lobt die Juramentados"
PHI_praise_the_juramentados_desc:0 "Die Juramentados müssen von der gesamten Sulu-Bevölkerung für ihren Beitrag zu unserer Unabhängigkeit und bald auch zur Unabhängigkeit Malaysias und Indonesiens gelobt werden."
PHI_from_the_seas:0 "Aus den Meeren"
PHI_from_the_seas_desc:0 "Auch wenn unsere Marine schwach ist, müssen wir sie nutzen, um unsere südlichen Brüder zu befreien."
PHI_from_the_skies:0 "Aus dem Himmel"
PHI_from_the_skies_desc:0 "Die europäischen Mächte rechnen nicht mit einer Invasion ihrer Kolonien aus der Luft."
PHI_unite_the_sultanates:0 "Vereint die Sultanate"
PHI_unite_the_sultanates_desc:0 "Die Völker Malaysias, Indonesiens und der Sulu-Inseln werden zu einer unbesiegbaren Union vereint sein!"
PHI_the_muslim_archipelago:0 "Der muslimische Archipel"
PHI_the_muslim_archipelago_desc:0 "Wir müssen unsere Seestreitkräfte ausbauen, um unsere Truppen perfekt transportieren und beschützen zu können."
PHI_fanatical_warfare:0 "Fanatische Kriegsführung"
PHI_fanatical_warfare_desc:0 "Die japanischen Kamikaze werden allen Sulu ein Beispiel für die Verteidigung ihres Heimatlandes sein."
PHI_fight_for_the_heavens:0 "Kämpfe um den Himmel"
PHI_fight_for_the_heavens_desc:0 "Unser Volk wird kämpfen, um in Ruhm und Ehre zu leben oder in Ehre zu sterben. Was auch immer das Ergebnis sein mag, Allah wird zufrieden sein."
PHI_the_common_front:0 "Die gemeinsame Front"
PHI_the_common_front_desc:0 "Die aus einer Koalition von Kommunisten und Sozialisten bestehende gemeinsame Front zielt darauf ab, die Aufmerksamkeit der philippinischen Bauern zu gewinnen und so ihre Popularität zu steigern."
PHI_follow_the_ccp:0 "Folgen Sie der KPCh"
PHI_follow_the_ccp_desc:0 "Die KPCh ist das richtige Beispiel, dem man folgen sollte, um allen Bürgern der Philippinen zu helfen."
PHI_follow_the_soviet_union:0 "Folgen Sie der UdSSR"
PHI_follow_the_soviet_union_desc:0 "Um allen Bürgern der Philippinen zu helfen, ist die UdSSR das richtige Beispiel."
PHI_united_we_are_strong:0 "Gemeinsam sind wir stark"
PHI_united_we_are_strong_desc:0 "Wir müssen unseren chinesischen Kameraden in ihrem Kampf helfen, damit sie uns helfen können, wenn sie fertig sind."
PHI_peoples_war:0 "Volkskrieg"
PHI_peoples_war_desc:0 "Der von Mao Zedong geschaffene Volkskrieg ist eine Form des Guerillakriegs, der darauf abzielt, gezielte Angriffe auf die Regierungstruppen durchzuführen und gleichzeitig die Unterstützung der Bevölkerung für die Bewegung zu stärken und aufrechtzuerhalten."
PHI_open_the_second_front:0 "Öffnen Sie die zweite Front"
PHI_open_the_second_front_desc:0 "Wir müssen uns darauf vorbereiten, im chinesischen Bürgerkrieg eine neue Front zu eröffnen, um unseren neuen Verbündeten zu helfen."
PHI_learn_from_the_bear:0 "Von den Russen lernen"
PHI_learn_from_the_bear_desc:0 "Wir müssen dem sowjetischen Beispiel folgen, um den Bauern auf den Philippinen zu helfen, aber zunächst sollten wir dem Komitee beitreten."
PHI_on_the_skies:0 "Am Himmel"
PHI_on_the_skies_desc:0 "Derzeit existiert die philippinische Luftwaffe praktisch nicht, dennoch haben wir einen mächtigen Verbündeten, der uns bei diesem Problem gerne helfen wird."
PHI_on_the_seas:0 "Auf den Meeren"
PHI_on_the_seas_desc:0 "Eine Marine zu haben ist äußerst wichtig. Wir müssen mit der Schaffung einer solchen beginnen und dabei alle möglichen Hilfen nutzen, bevor es zu spät ist."
PHI_housing_effort:0 "Wohnungsbaubemühungen"
PHI_housing_effort_desc:0 "Rund 80 Prozent der philippinischen Bauern haben kein eigenes Zuhause. Das soll sich nun ändern."
PHI_land_reform:0 "Bodenreform"
PHI_land_reform_desc:0 "Eine Landreform ist in der philippinischen Gesellschaft dringend erforderlich. Der Missbrauch durch die Landbesitzer muss jetzt ein Ende haben."
PHI_expropiate_the_landlords:0 "Enteignet die Grundbesitzer"
PHI_expropiate_the_landlords_desc:0 "Wer Reichtum erlangt, indem er die Schwachen ausbeutet, ist dessen nicht würdig."
PHI_form_the_hmb:0 "Bilden Sie das HMB"
PHI_form_the_hmb_desc:0 "Wir werden die Hukbalahap in eine neue Armee umwandeln, die „Hukbong Mapagpalaya ng Bayan“ (Volksbefreiungsarmee), die das Volk vor den Bedrohungen durch die Bauern und Filipinos schützen wird."
PHI_rally_the_peasants:0 "Versammelt die Bauern"
PHI_rally_the_peasants_desc:0 "Jeder Filipino wird in der Lage sein, sein Heimatland vor seinen Feinden zu verteidigen!"
PHI_support_the_viet_minh:0 "Unterstützen Sie die Viet Minh"
PHI_support_the_viet_minh_desc:0 "Genau wie wir versuchen die Viet Minh, ihre Oberherren zu stürzen, jedoch ohne Erfolg. Wir müssen ihnen in ihrem Kampf helfen, dann werden wir sicherlich einen neuen Verbündeten in der Region gewinnen."
PHI_break_their_chains:0 "Brechen Sie ihre Ketten"
PHI_break_their_chains_desc:0 "Durch die Entsendung von Guerillaführern in alle unterworfenen Länder Asiens gewinnen wir immer mehr Verbündete. Arbeiter aller Länder, vereinigt euch!"
PHI_press_for_independence:0 "Drücken Sie für die Unabhängigkeit"
PHI_press_for_independence_desc:0 "Wir können nicht länger warten, wir werden jetzt unsere Unabhängigkeit erlangen, ob es den USA gefällt oder nicht."
PHI_a_spanish_government:0 "Eine spanische Regierung"
PHI_a_spanish_government_desc:0 "300 Jahre spanischer Kolonialismus werden auch nach der amerikanischen Besatzung nicht vergessen sein. Wir sind Hispanics und werden es auch bleiben."
PHI_ban_the_falange:0 "Verbot der Falange"
PHI_ban_the_falange_desc:0 "Wir haben gesehen, was die Falange und der Faschismus in Spanien angerichtet haben. Diese Organisation kann hier nicht weiter operieren."
PHI_odyssey_to_madrid:0 "Odyssee nach Madrid"
PHI_odyssey_to_madrid_desc:0 "So wie das Königreich Asturien im 8. Jahrhundert allein der muslimischen Bedrohung standhielt, haben wir den Faschismus überlebt, der Spanien heute heimsucht, und so wie Asturien werden wir eine große Reise zur Befreiung unserer spanischen Brüder antreten."
PHI_the_enemies_of_fascism:0 "Die Feinde des Faschismus"
PHI_the_enemies_of_fascism_desc:0 "Es gibt unzählige Nationen, die sich dem Faschismus widersetzen. Es wird leicht sein, eine von ihnen zu kontaktieren und davon zu überzeugen, uns zu helfen."
PHI_republican_exiles:0 "Republikanische Exilanten"
PHI_republican_exiles_desc:0 "Auch wenn wir unglaublich weit von Spanien entfernt sind, werden wir dank der Solidarität aller demokratischen Nationen Europas und Asiens, die so solidarisch waren, republikanische Exilanten aus Spanien nach Manila zu bringen, besser auf die Rückkehr nach Madrid vorbereitet sein."
PHI_seek_international_recognition:0 "Streben Sie nach internationaler Anerkennung"
PHI_seek_international_recognition_desc:0 "Wenn es uns gelingt, die Welt dazu zu bringen, unseren Anspruch auf Spanien anzuerkennen, werden viele Länder Madrid den Rücken kehren und ihre fragile Wirtschaft schwächen."
PHI_gather_the_survivors:0 "Versammelt die Überlebenden"
PHI_gather_the_survivors_desc:0 "Die Vereinigung derjenigen, denen es gelungen ist, der faschistischen Regierung zu entkommen, wird uns dabei helfen, das Heimatland zurückzuerobern."
PHI_for_the_security_of_iberia:0 "Für die Sicherheit von Iberia"
PHI_for_the_security_of_iberia_desc:0 "Die iberischen Brüder müssen vereint bleiben, jetzt, da die größte Bedrohung die Kontrolle über Madrid übernommen hat."
PHI_pasaremos:0 "Pasaremos"
PHI_pasaremos_desc:0 "So wie das Königreich Asturien im 8. Jahrhundert allein der muslimischen Bedrohung standhielt, haben wir den Faschismus überlebt, der heute Spanien heimsucht, und so wie Asturien werden auch wir bestehen und unser Heimatland zurückerobern."
PHI_rebuild_our_homeland2:0 "Bauen Sie unser Heimatland wieder auf"
PHI_rebuild_our_homeland2_desc:0 "Die Zerstörungen, die zwei große Kriege in unserem Land angerichtet haben, werden sich nur schwer rückgängig machen lassen, doch jeder Spanier wird daran arbeiten, dieses Ziel zu erreichen."
PHI_integrate_ceuta_and_melilla:0 "Integration von Ceuta und Melilla"
PHI_integrate_ceuta_and_melilla_desc:0 "Ceuta und Melilla sind strategische Häfen in Marokko. Wir müssen diese Gebiete in die spanische Nation integrieren."
PHI_western_investiments:0 "Westliche Investitionen"
PHI_western_investiments_desc:0 "Die Suche nach Investitionen in unser Land wird das Wachstum unserer Wirtschaft fördern."
PHI_engineering_advances:0 "Technische Fortschritte"
PHI_engineering_advances_desc:0 "Technische Fortschritte werden dazu beitragen, die Produktion im Land zu verbessern."
PHI_guardia_civil:0 "Guardia Civil"
PHI_guardia_civil_desc:0 "Die Guardia Civil war die Streitmacht der Filipinas, bevor sie von den Amerikanern aufgelöst wurde. Es ist an der Zeit, die Guardia Civil wieder zu gründen."
PHI_all_must_help:0 "Alle müssen helfen"
PHI_all_must_help_desc:0 "Jeder Filipino muss dazu beitragen, sein Heimatland zu schützen, damit es nie wieder bei einer Invasion verloren geht."
PHI_spanish_brotherhood:0 "Spanische Bruderschaft"
PHI_spanish_brotherhood_desc:0 "Unsere Vergangenheit ist unbestreitbar. Wir sollten sie annehmen und unsere Beziehungen zu dem Menschen verbessern, der einst unser einziger Verbündeter war."
PHI_spaniards_united:0 "Spanier vereint"
PHI_spaniards_united_desc:0 "Unseren Brüdern in Madrid Abkommen vorzuschlagen, wird für unsere Nation von großem Nutzen sein."
PHI_legion_hispana:0 "Legion Hispana"
PHI_legion_hispana_desc:0 "Wir werden ein bewaffnetes Korps nach dem Vorbild der Légion Étrangère gründen, das alle hispanischen Völker unter einer gemeinsamen Sache vereint und sie gegenseitig verteidigt."
PHI_reclaim_the_stolen_ones:0 "Fordern Sie zurück, was uns gehörte"
PHI_reclaim_the_stolen_ones_desc:0 "Die pazifischen Inseln gehörten einst zu Spanien, doch das änderte sich mit dem Krieg von 1898. Wir müssen daran arbeiten, diese Inseln wieder in unser Land integrieren zu können."
PHI_deter_our_enemies:0 "Schrecken Sie unsere Feinde ab"
PHI_deter_our_enemies_desc:0 "Wir sind vielleicht nicht in der Lage, unsere gesamte Nation vor unseren Feinden zu verteidigen. Wenn diese jedoch der Meinung sind, dass die Kosten einer Invasion höher sind als die Erträge, die sie uns bringen, können wir möglicherweise den Frieden in unseren Küstengebieten bewahren."
PHI_protect_the_nation:0 "Schützen Sie die Nation"
PHI_protect_the_nation_desc:0 "Jede Küste der Philippinen wird darauf vorbereitet sein, die Eindringlinge abzuwehren."
PHI_join_the_allies:0 "Schließen Sie sich den Verbündeten an"
PHI_join_the_allies_desc:0 "Wir müssen uns den Demokratien der Welt anschließen, um die Kräfte des Totalitarismus zu bekämpfen."
PHI_a_native_government:0 "Eine einheimische Regierung"
PHI_a_native_government_desc:0 "Wir haben genug vom spanischen und amerikanischen Imperialismus. Die Philippinen werden von Filipinos regiert."
PHI_unify_the_filipinos:0 "Nationale Einheit"
PHI_unify_the_filipinos_desc:0 "Ob Nacionalista, Sakdalista, Kommunist oder Nationalsozialist, es spielt keine Rolle, welche philippinische Partei Sie bevorzugen, wir sind alle Filipinos, die anderen Filipinos helfen wollen."
PHI_address_the_greatest_problem:0 "Das größte Problem angehen"
PHI_address_the_greatest_problem_desc:0 "Die größten Probleme der philippinischen Gesellschaft sind die große Armut unter den Bauern und die Notwendigkeit einer Landreform. Wir müssen diese beiden Probleme angehen, wenn wir unserem Volk helfen wollen."
PHI_western_investiments2:0 "Westliche Investitionen"
PHI_western_investiments2_desc:0 "Die Suche nach Investitionen in unser Land wird das Wachstum unserer Wirtschaft fördern."
PHI_arms_industry_expansion:0 "Expansion der Rüstungsindustrie"
PHI_arms_industry_expansion_desc:0 "Die philippinische Rüstungsindustrie muss ausgebaut werden, wenn wir in der Lage sein wollen, unsere Armee zu versorgen."
PHI_a_colony_no_more:0 "Keine Kolonie mehr"
PHI_a_colony_no_more_desc:0 "Wir dürfen die Schrecken der westlichen Besatzung unseres Landes nie vergessen. Jeder Filipino muss für die Bewahrung seiner Unabhängigkeit kämpfen."
PHI_protect_the_homeland:0 "Schützen Sie das Heimatland"
PHI_protect_the_homeland_desc:0 "Wir dürfen die Schrecken der westlichen Besatzung unseres Landes nie vergessen. Jeder Filipino muss für die Bewahrung seiner Unabhängigkeit kämpfen."
PHI_a_united_country:0 "Eine vereinte Nation"
PHI_a_united_country_desc:0 "Die Filipinos werden nun wissen, dass die Verteidigung ihrer Unabhängigkeit wichtiger ist als sinnlose ideologische Kämpfe."
PHI_be_patient:0 "Sei geduldig"
PHI_be_patient_desc:0 "Die USA haben uns 1946 die Unabhängigkeit versprochen. Wir müssen Geduld haben."
PHI_replace_the_guardia_civil:0 "Ersetzen Sie die Guardia Civil"
PHI_replace_the_guardia_civil_desc:0 "Die Guardia Civil en las Filipinas (Zivilgarde auf den Philippinen) war ein Zweig der spanischen kaiserlichen Zivilgarde, der der Capitanía General unterstand und Teil der spanischen Armee war. Sie wurde 1898 von den Amerikanern aufgelöst und soll nun durch die philippinische Polizei ersetzt werden."
PHI_american_fort_building:0 "Amerikanischer Fortbau"
PHI_american_fort_building_desc:0 "Die Amerikaner haben begonnen, Millionen von Dollar in den Bau von Festungen auf den Philippinen zu investieren, um die geringe Größe der philippinischen Streitkräfte auszugleichen. Rund um die Hauptstadt werden derzeit viele Festungen gebaut, und bald werden weitere hinzukommen."
PHI_usaffe:0 "USAFFE"
PHI_usaffe_desc:0 "Die US Army Forces in the Far East, kurz USAFFE, sind eine militärische Formation der US-Armee, deren Ziel es ist, die Philippinen vor ihrer Unabhängigkeit zu schützen. Diese zusätzlichen Divisionen in unserem Land werden uns dabei sehr helfen."
PHI_joint_investigation:0 "Gemeinsame Untersuchung"
PHI_joint_investigation_desc:0 "Die Amerikaner sind für ihre Wissenschaftler bekannt und jede Technologie, die sie erforschen, wird uns bekannt sein."
PHI_american_tank_battalions:0 "Amerikanische Panzerbataillone"
PHI_american_tank_battalions_desc:0 "Amerikanische Panzertruppen treffen auf den Philippinen ein, um das Land vor den Kräften des Faschismus und Kommunismus zu schützen. Diese zusätzlichen Divisionen werden uns dabei sehr helfen, das Land zu schützen."
PHI_lapham_raiders:0 "Lapham Raiders"
PHI_lapham_raiders_desc:0 "Robert Lapham ist Leutnant der US-Armee und hat in den Central Plains der nördlichen Insel Luzon ein Guerillaregiment aufgestellt. Diese Guerillas, bekannt als „Lapham Raiders“, sind gut darin, hinter die feindlichen Linien zu gelangen und in Hügeln und Bergen zu operieren."
PHI_modernize_the_hacienda:0 "Modernisieren Sie die Hacienda"
PHI_modernize_the_hacienda_desc:0 "Das Hacienda-System auf den Philippinen ist ein ständiger Missbrauch der philippinischen Bauern. Wir müssen dieses System reformieren, wenn wir unserem Volk helfen wollen."
PHI_recognize_the_tagalog_language:0 "Fördern Sie die Verwendung von Tagalog"
PHI_recognize_the_tagalog_language_desc:0 "Die offiziellen Sprachen des Commonwealth sind Englisch und Spanisch, doch auch die Einheimischen verdienen es, in dieser Union vertreten zu sein. Tagalog wird die Grundlage einer Nationalsprache in der Kómonwélt ng Pilipinas! werden."
PHI_american_support:0 "Amerikanische Unterstützung"
PHI_american_support_desc:0 "Amerikanische Ressourcen werden für die Kriegsanstrengungen unglaublich hilfreich sein."
PHI_american_concessions:0 "Amerikanische Konzessionen"
PHI_american_concessions_desc:0 "Die Amerikaner haben begonnen, uns finanzielle Zugeständnisse für den Krieg und die Besatzung zu machen. Dies wird uns helfen, unsere Wirtschaft wieder in Gang zu bringen."
PHI_the_most_awaited_day:0 "Der mit größter Spannung erwartete Tag"
PHI_the_most_awaited_day_desc:0 "Endlich wurde uns die Unabhängigkeit zuerkannt und am Horizont zeichnet sich eine bessere Zukunft ab."
PHI_catch_up_with_the_rest:0 "Holen Sie den Rest ein"
PHI_catch_up_with_the_rest_desc:0 "Wir müssen uns bemühen, den Anschluss an den Rest der Welt zu finden, um das Land industrialisieren zu können."
PHI_copper_mines:0 "Kupferminen"
PHI_copper_mines_desc:0 "Die Kupferminen von Mindanao werden zur Produktion von Waffen für unsere Streitkräfte beitragen."
PHI_oil_extraction:0 "Ölförderung"
PHI_oil_extraction_desc:0 "Die Ölvorkommen im Norden der Philippinen werden zur Versorgung unserer Streitkräfte beitragen."
PHI_rubber_production:0 "Gummiproduktion"
PHI_rubber_production_desc:0 "Der Kautschukabbau auf den Inseln wird zur Versorgung unserer Streitkräfte beitragen."
PHI_improve_the_national_infrastructure:0 "Verbesserung der nationalen Infrastruktur"
PHI_improve_the_national_infrastructure_desc:0 "Eine bessere Infrastruktur bedeutet eine bessere Ressourcengewinnung und Mobilität für unsere Armeen."
PHI_fruit_exports:0 "Obstexporte"
PHI_fruit_exports_desc:0 "Der Obstexport wird dazu beitragen, unsere Wirtschaftsleistung zu steigern."
PHI_improve_education:0 "Bildung für alle"
PHI_improve_education_desc:0 "Nur ein kleiner Prozentsatz der Filipinos hat eine angemessene Ausbildung genossen. Die Verbesserung des Zugangs dazu würde unserem Land sehr helfen."
PHI_philippine_universities:0 "Philippinische Universitäten"
PHI_philippine_universities_desc:0 "Wir müssen auf den Philippinen mehr Universitäten bauen, wenn wir die Situation unserer Bevölkerung verbessern wollen."
PHI_officer_training:0 "Offiziersausbildung"
PHI_officer_training_desc:0 "Wir werden unsere Offiziere in andere Länder schicken, um sie auf die Verteidigung der Philippinen vorzubereiten."
PHI_foreign_weapon_designs:0 "Ausländische Waffenentwürfe"
PHI_foreign_weapon_designs_desc:0 "Wir werden andere Nationen bitten, uns ihre Waffenentwürfe zur Verfügung zu stellen, damit wir die Qualität unserer Streitkräfte verbessern können."
PHI_foreign_artillery_designs:0 "Ausländische Waffenentwürfe"
PHI_foreign_artillery_designs_desc:0 "Wir werden andere Nationen bitten, uns ihre Waffenentwürfe zur Verfügung zu stellen, damit wir die Qualität unserer Streitkräfte verbessern können."
PHI_the_aa_strategy:0 "Die AA-Strategie"
PHI_the_aa_strategy_desc:0 "Wir werden nicht in der Lage sein, eine ausreichend starke Luftwaffe aufzubauen, wenn sie benötigt wird, aber wenn wir dem amerikanischen Plan zum Aufbau einer Luftabwehr folgen, können wir dieses Problem möglicherweise lindern."
PHI_protect_the_skies:0 "Schützen Sie den Himmel"
PHI_protect_the_skies_desc:0 "Jedes feindliche Flugzeug wird abgeschossen."
PHI_prepare_for_the_northern_strike:0 "Bereiten Sie sich auf den Nordangriff vor"
PHI_prepare_for_the_northern_strike_desc:0 "Wir werden mit der Befestigung der nördlichen Provinzen beginnen, um sie vor den japanischen Streitkräften zu schützen."
PHI_prepare_for_the_southern_strike:0 "Bereiten Sie sich auf den Angriff des Südens vor"
PHI_prepare_for_the_southern_strike_desc:0 "Wir werden mit der Befestigung der südlichen Provinzen beginnen, um sie vor den imperialistischen Kräften zu schützen."
PHI_modernize_naval_bases:0 "Modernisierung der Marinestützpunkte"
PHI_modernize_naval_bases_desc:0 "Wir müssen die Qualität unserer Häfen verbessern, wenn wir unsere Armeen versorgen wollen."
PHI_the_most_important_thing:0 "Das Wichtigste"
PHI_the_most_important_thing_desc:0 "In einem Land wie unserem ist die Marine eines der wichtigsten Dinge, das nicht überfallen werden darf."
PHI_modern_transports:0 "Moderne Transporte"
PHI_modern_transports_desc:0 "Wir brauchen bessere Marinetransportmittel, wenn unsere Armee die Meere befahren kann."
PHI_philippine_dockyards:0 "Philippinische Werften"
PHI_philippine_dockyards_desc:0 "Wir können uns beim Aufbau unserer eigenen Marine nicht auf andere Nationen verlassen. Wir müssen unsere Werften jetzt erweitern."
PHI_foreign_blue_prints:0 "Ausländische Blaupausen"
PHI_foreign_blue_prints_desc:0 "Wir werden ausländische Blaupausen erwerben, um die bestmöglichen Schiffsdesigns zu erhalten."
PHI_foreign_trainers:0 "Ausländische Trainer"
PHI_foreign_trainers_desc:0 "Wir werden westliche Admirale zur Ausbildung unserer Matrosen und Kapitäne heranziehen, denn ohne Hilfe ist es schwierig, etwas völlig Neues zu lernen."
PHI_fight_them:0 "Bekämpfe sie"
PHI_fight_them_desc:0 "Die Flugzeuge unserer Feinde werden voller Ehrfurcht davonlaufen, nachdem sie von unseren Jägern zerstört wurden."
PHI_bomb_them:0 "Bombardiere sie"
PHI_bomb_them_desc:0 "Unsere Feinde werden ehrfürchtig davonlaufen, nachdem sie von einem Bombenhagel getroffen wurden."
PRC_secure_peasant_support:0 "Unterstützung der Bauern sichern"
PRC_secure_peasant_support_desc:0 "Durch die Durchführung der dringend notwendigen Landreform ist es uns gelungen, die Unterstützung der ländlichen Bevölkerung zu gewinnen. Im Gegensatz dazu ist das Regime von Chiang Kai-Shek aufgrund seiner Korruption immer unbeliebter geworden."
PRC_seize_japanese_equipment:0 "Beschlagnahmt japanische Ausrüstung"
PRC_seize_japanese_equipment_desc:0 "Die Japaner verfügen über jede Menge moderne Ausrüstung, die nur darauf wartet, von unseren Untergrundmilizen in der Mandschurei gestohlen zu werden. Wir müssen den größtmöglichen Nutzen aus diesem Konflikt ziehen."
PRC_suns_dream_achieved:0 "Suns Traum ist wahr geworden!"
PRC_suns_dream_achieved_desc:0 "Nach zwei Jahrzehnten des Kampfes ist es uns endlich gelungen, Sun Yat Sens Traum zu verwirklichen: Demokratie in China!"
PRC_the_new_chinese_economy:0 "Die neue chinesische Wirtschaft"
PRC_the_new_chinese_economy_desc:0 "China wird der Welt ein Beispiel für eine gemischte Wirtschaft sein, die ihren Bürgern helfen will, ohne dabei die Freiheit aller Unternehmen des Landes zu opfern."
PRC_a_happy_ending:0 "Ein Happy End"
PRC_a_happy_ending_desc:0 "Das chinesische Jahrhundert der Demütigung ist endlich zu Ende. Jetzt bleibt den Menschen in China nur noch, in eine bessere Zukunft zu blicken."
PRC_the_great_leap_forward:0 "Der größte Sprung nach vorn"
PRC_the_great_leap_forward_desc:0 "Vorsitzender [PRC.GetLeader] hat den Großen Sprung nach vorn, den zweiten Fünfjahresplan, gestartet, um das Land durch die Gründung von Volkskommunen von einer Agrarwirtschaft in eine kommunistische Gesellschaft umzuwandeln. Manche behaupten, die Nahrungsmittelproduktion reiche nicht aus, um diesen Plan umzusetzen. Doch das sind nur Konterrevolutionäre, die China destabilisieren wollen."
PRC_the_cultural_revolution:0 "Die Kulturrevolution"
PRC_the_cultural_revolution_desc:0 "Konterrevolutionäre behaupten, die Kulturrevolution sei eine gewaltsame Säuberung, deren einziges Ziel darin bestehe, den Personenkult um [PRC.GetLeader] aufrechtzuerhalten. Aber sie lügen. Wir versuchen nur, China vor Rechten und alten Traditionalisten zu retten! Wir schützen die Bauern und Arbeiter unseres Landes!"
PRC_the_laogai:0 "Der Laogai"
PRC_the_laogai_desc:0 "Laogai ist die Abkürzung für Láodòng Gǎizào, was auf Chinesisch Reform durch Arbeit bedeutet. Es handelt sich um ein von der kommunistischen Regierung Yan&#39;ans entwickeltes Strafrechtssystem, das Zwangsarbeit und Zwangsfarmen einsetzt. Jeder, der es wagt, ein Verbrechen wie Mord, Diebstahl oder Kritik an der kommunistischen Partei zu begehen, wird ins Laogai-Gefängnis geschickt. In unserem Land gibt es keine Kriminellen."
PRC_form_the_NRWB:0 "Von den Sowjets lernen"
PRC_form_the_NRWB_desc:0 "Die Sowjetunion konnte ihre Kontrolle über das Land durch die Schaffung des Volkskommissariats für Innere Angelegenheiten (NKWD) deutlich ausweiten. Wir werden eine ähnliche Organisation gründen, um die Revolution vor Konterrevolutionären zu schützen."
PRC_assisted_five_year_plan:0 "Unterstützter Fünfjahresplan"
PRC_assisted_five_year_plan_desc:0 "Da wir uns nun der Sowjetunion angenähert haben, werden sie mehr als bereit sein, die Wirtschaft ihres neuen Verbündeten zu unterstützen."
PRC_the_unending_revolution:0 "Die unendliche Revolution"
PRC_the_unending_revolution_desc:0 "Mao Zedong und Wang Ming haben nichts anderes getan, als sich gegenseitig zu beschuldigen, gegen die KPCh zu sein und „konterrevolutionär“ zu sein. Es ist Zeit, in Yan&#39;an für Ordnung zu sorgen."
PRC_purge_the_opposition:0 "Säubern Sie die Opposition"
PRC_purge_the_opposition_desc:0 "Sozialdemokraten, Maoisten und sogar Stalinisten schmieden lediglich Intrigen gegen den Vorsitzenden Kang Sheng. Sein einziges Ziel ist es, die chinesischen Bauern und Arbeiter vor dem Kapitalismus zu schützen. Und wenn sie alle gegen seine Pläne sind, müssen sie gegen die Revolution sein."
PRC_kill_your_landlord:0 "Töte deinen Vermieter"
PRC_kill_your_landlord_desc:0 "Was hat euer Grundbesitzer für euch getan? Er hat euch versklavt. Er hat euch ausgebeutet. Er hat euch langsam umgebracht. Tötet euren Grundbesitzer jetzt und bringt seinen Kopf in die Kantine. Nur dann werdet ihr den dämonischen Klauen des Kapitalismus entkommen!"
PRC_eyes_on_all_sides:0 "Augen auf allen Seiten"
PRC_eyes_on_all_sides_desc:0 "Haben Sie in Ihrer Gemeinde konterrevolutionäre Aktivitäten beobachtet? Melden Sie diese Ihrem Gemeindekommissariat. In China ist kein Platz für Kapitalisten und Rechte."
PRC_are_you_against_the_revolution:0 "Sind Sie gegen die Revolution?"
PRC_are_you_against_the_revolution_desc:0 "Was tun Sie dann für die Kommunistische Partei? \n\nWie können wir sicher sein, dass Sie nicht auch ein rechter Konterrevolutionär sind? \n\nAlle Arbeiter und Bauern Chinas müssen arbeiten, kämpfen und trainieren, nur dann werden wir in der Lage sein, den Kapitalismus in der Welt zu besiegen."
PRC_every_weapon_works:0 "Jede Waffe funktioniert"
PRC_every_weapon_works_desc:0 "Derzeit mangelt es uns an modernen Gewehren, doch es stehen uns viele andere Waffen zur Verfügung, um die Revolution zu schützen. Egal, ob Pistole, Muskete oder Speer, solange es in China ausgebeutete Bauern und Arbeiter gibt, werden wir siegen."
PRC_cult_of_personality:0 "Personenkult"
PRC_cult_of_personality_desc:0 "Da es in Yan&#39;an nun fast keine Opposition mehr gegen Mao Zedong gibt, wird den Menschen beigebracht, all seinen Befehlen ohne Zögern zu folgen."
PRC_cult_of_personality2:0 "Personenkult"
PRC_cult_of_personality2_desc:0 "Da es in Yan&#39;an nun fast keine Opposition mehr gegen Mao Zedong gibt, wird den Menschen beigebracht, all seinen Befehlen ohne Zögern zu folgen."
PRC_the_new_path_to_communism:0 "Der neue Weg zum Kommunismus"
PRC_the_new_path_to_communism_desc:0 "Wir haben eine neue Form des Kommunismus geschaffen: den Maoismus. Alle Länder, die aufgrund ihrer wirtschaftlichen und industriellen Lage nicht in der Lage sind, Marx‘ Theorie anzuwenden, haben nun die Möglichkeit, den Überzeugungen des Vorsitzenden von Yan’an zu folgen."
PRC_unification_day:0 "Tag der Wiedervereinigung"
PRC_unification_day_desc:0 "Wenn die KPCh und die Kuomintang friedlich wiedervereint werden konnten, gibt es für die Kriegsherren keinen Grund, sich nicht unserer Regierung anzuschließen. Wir werden alle gemeinsam auf dem Weg zu einem besseren China voranschreiten."
POR_claim_galicia:0 "Anspruch auf Galizien"
POR_claim_galicia_desc:0 "Nach der Trennung vom Königreich León beschloss Galicien, bei ihm zu bleiben, um später Teil Kastiliens und schließlich Spaniens zu werden. Die Bevölkerung Galiciens sollte in unser Königreich zurückkehren, damit die Brüder Westiberiens wieder vereint werden können."
POR_modern_bandeirantes:0 "Moderne Bandeirantes"
POR_modern_bandeirantes_desc:0 "Die Bandeirantes (portugiesisch für „Fahnenträger“) waren Sklavenhändler, Entdecker, Abenteurer und Glücksritter im frühen kolonialen Brasilien. Sie sind maßgeblich für Brasiliens große Expansion nach Westen verantwortlich, weit über die Tordesillas-Linie von 1494 hinaus. Wir beginnen mit der Rekrutierung der neuen Generation von Bandeirantes, deren Aufgabe es sein wird, den im Amazonas-Dschungel versteckten Kautschuk zu beschaffen."
POR_european_settlers:0 "Europäische Siedler"
POR_european_settlers_desc:0 "Viele Portugiesen sind bereit, in Brasilien Arbeit oder eine neue Heimat zu suchen. Indem wir ihnen helfen, sich im Amazonasgebiet niederzulassen, können wir die Region kolonisieren."
POR_portuguese_rubber_boom:0 "Portugiesischer Kautschukboom"
POR_portuguese_rubber_boom_desc:0 "Brasilien erlebte im 19. Jahrhundert einen großen Kautschukboom. Jetzt probieren wir, was sie 1879 erlebten."
GRE_remember_macedonia:0 "Erinnern Sie sich an Mazedonien"
GRE_remember_macedonia_desc:0 "Wie kann man sich ein Mazedonien, die Heimat Alexanders des Großen, vorstellen, das nicht dem griechischen Königreich untersteht? Die nördlichen Balkanstaaten müssen die Region ihrem rechtmäßigen Besitzer übergeben, ob es ihnen gefällt oder nicht."
AUS_fire_starhemberg:0 "Feuer Starhemberg"
AUS_fire_starhemberg_desc:0 "Starhemberg und die Heimwehr haben zu viel Einfluss auf die österreichische Regierung. Auch wenn sie sich im Kampf gegen die republikanischen und kommunistischen Milizen sowie die österreichischen Nazis als nützlich erwiesen haben, werden sie zu einem Problem, wenn wir nicht schnell genug gegen sie vorgehen."
AUS_march_on_vienna:0 "Marsch auf Wien"
AUS_march_on_vienna_desc:0 "Schuschnigg hat mit der Entlassung Starhembergs aus der Regierung seine mangelnde Loyalität gegenüber dem österreichischen Volk bewiesen. Wir werden Mussolinis Schritten folgen und diese verräterische Regierung jetzt stürzen."
AUS_the_gentelmen_pact:0 "Der Gentlemen-Pakt"
AUS_the_gentelmen_pact_desc:0 "Zwischen Reichskanzler Schuschnigg und Botschafter Franz von Papen wurde ein Pakt unterzeichnet. Das Dokument enthält das Versprechen beider Staaten, sich jeglicher Einmischung in die inneren Angelegenheiten des jeweils anderen zu enthalten, die Anerkennung der vollständigen Unabhängigkeit Österreichs durch Deutschland und den Wunsch Österreichs, seine Außenpolitik an die des Reichs anzubinden, sowie eine Zusammenarbeit in politischen und wirtschaftlichen Fragen."
AUS_the_second_burgerkrieg:0 "Der zweite Bürgerkrieg"
AUS_the_second_burgerkrieg_desc:0 "Wie schon 1934 ist unser Land von Unruhen und Kämpfen zwischen Armee, Faschisten und Sozialisten betroffen. Wir müssen diese Situation schnell lösen, wenn wir nicht zu einem leichten Ziel für ausländische Interventionen werden wollen."
AUS_the_three_arrows:0 "Die drei Pfeile"
AUS_the_three_arrows_desc:0 "Die drei Pfeile wurden 1932 dank der Plakate der Sozialistischen Partei Deutschlands zum Symbol des Widerstands gegen Monarchismus, Faschismus und Kommunismus. Auch in Österreich wurde das Symbol populär, allerdings mit einer anderen Bedeutung: Widerstand gegen Klerikalismus, Faschismus und Kapitalismus. Nach der Niederlage der Heimwehr ist es an der Zeit, die Bedeutung dieser drei Pfeile zu begreifen und Österreich in sein goldenes Zeitalter zu führen."
AUS_social_catholicism:0 "Österreichischer Sozialismus"
AUS_social_catholicism_desc:0 "Viele österreichische Parteien plädieren für eine interventionistische und sozialistische Politik, von den faschistischen Sozialkatholiken bis zu den marxistischen Kommunisten. Wir müssen die besten politischen Ansätze aller Seiten nutzen, um die österreichische Nation wieder aufbauen zu können."
AUS_socialist_coalition:0 "Sozialistische Koalition"
AUS_socialist_coalition_desc:0 "Wir sollten alle zusammenarbeiten, um eine bessere Nation für unser Volk aufzubauen."
AUS_deter_germany:0 "Deter Deutschland"
AUS_deter_germany_desc:0 "Die Deutschen werden nicht bereit sein, uns anzugreifen, wenn das bedeutet, dass sie erneut mit der Entente im Krieg wären! \n\nStimmt das?"
AUS_joint_oil_exploitation_company:0 "Gemeinsame Ölförderungsgesellschaft"
AUS_joint_oil_exploitation_company:0 "Mit der Aussicht auf mögliche Ölfelder auf unserem Territorium haben wir die Aufmerksamkeit des Auslands auf uns gezogen. Befreundete Mächte sind bestrebt, unsere Ölindustrie mit ihrem technischen Know-how zu unterstützen, und dies wäre eine lukrative Gelegenheit, von ihren Fortschritten zu lernen."
AUS_guard_the_alps:0 "Beschütze die Alpen"
AUS_guard_the_alps_desc:0 "Mit ausländischer Hilfe können wir unseren Himmel möglicherweise vor unseren Feinden schützen."
AUS_radar_building:0 "RADAR-Gebäude"
AUS_radar_building_desc:0 "Der Bau unseres ersten Radars wird unserer Armee und Luftwaffe helfen, mehr über die Position der feindlichen Streitkräfte zu erfahren."
AUS_rebuild_the_schutzbund:0 "Den Schutzbund wieder aufbauen"
AUS_rebuild_the_schutzbund_desc:0 "Der Republikanische Schutzbund war eine österreichische paramilitärische Organisation, die 1923 von der Sozialdemokratischen Partei Österreichs (SDAPÖ) gegründet wurde, um angesichts der zunehmenden politischen Radikalisierung nach dem Ersten Weltkrieg die Macht zu sichern. Im österreichischen Bürgerkrieg wurde er von der Heimwehr besiegt. Nach der Niederlage der Heimwehr ist es nun an der Zeit, mit der Wiedergeburt dieser Kräfte zu beginnen."
AUS_refuge_german_scientists:0 "Zuflucht deutscher Wissenschaftler"
AUS_refuge_german_scientists_desc:0 "Viele Wissenschaftler waren aufgrund der neuen politischen Verhältnisse gezwungen, Deutschland zu verlassen. Wir freuen uns, diesen großen Geistern in unserem Land Zuflucht zu gewähren."
AUS_refuge_italian_scientists:0 "Zuflucht italienischer Wissenschaftler"
AUS_refuge_italian_scientists_desc:0 "Viele Wissenschaftler waren aufgrund der neuen politischen Verhältnisse gezwungen, Italien zu verlassen. Wir freuen uns, diesen großen Geistern in unserem Land Zuflucht zu gewähren."
AUS_expand_the_federal_army:0 "Ausbau der Bundeswehr"
AUS_expand_the_federal_army_desc:0 "Wir müssen die Armee vergrößern, wenn wir unser Land vor denen verteidigen wollen, die es wagen, in es einzudringen."
AUS_reclaim_south_tyrol:0 "Südtirol zurückerobern"
AUS_reclaim_south_tyrol_desc:0 "Südtirol, eine Region, die ausschließlich von österreichischen Deutschen bewohnt wurde, wurde nach dem Ersten Weltkrieg feige von italienischen Truppen besetzt. Wir müssen unsere Brüder im Süden befreien, auch wenn der Krieg der einzige Weg dazu ist."
AUS_a_red_dawn:0 "Eine rote Morgendämmerung"
AUS_a_red_dawn_desc:0 "Das österreichische Volk hat genug von diesem faschistischen Wahnsinn, nur die kommunistische Partei weiß, was das Beste für ihr Volk ist!"
AUS_concessions_to_the_spo:0 "Zugeständnisse an die SPÖ"
AUS_concessions_to_the_spo_desc:0 "Die SPÖ hat uns sehr geholfen, die Heimwehr und die Vaterländische Front zu besiegen. Es wäre völlig unmenschlich, ihnen nicht zumindest einige Sitze in der neuen Regierung zu geben, auch wenn dies die Stalinisten verärgert."
AUS_the_austrian_red_army:0 "Die österreichische Rote Armee"
AUS_the_austrian_red_army_desc:0 "Alle vaterlandsliebenden Patrioten müssen ihre Pflicht zur Verteidigung ihres Heimatlandes erfüllen. Wir werden nach dem Vorbild der Sowjets im Osten eine österreichische Rote Armee bilden, die unsere junge Revolution schützen wird."
AUS_reform_the_schutzbund:0 "Bauen Sie die Roten Brigaden wieder auf"
AUS_reform_the_schutzbund_desc:0 "Die Roten Brigaden waren eine paramilitärische Organisation, ähnlich der faschistischen Heimwehr oder dem sozialdemokratischen Republikanischen Schutzbund. Sie operierten in den ersten Tagen der Republik, um die Milizen zu bekämpfen, die sich der kommunistischen Partei widersetzten. Nach dem Ende der Heimwehr ist es an der Zeit, diese mutige Organisation wieder aufzubauen."
AUS_free_forever:0 "Für immer kostenlos"
AUS_free_forever_desc:0 "Deutschland wird Österreich niemals besiegen, wir werden alle bis zum letzten Mann kämpfen!"
AUS_dismantle_germany:0 "Deutschland demontieren"
AUS_dismantle_germany_desc:0 "Europa wird niemals Frieden finden, solange Deutschland existiert. Die deutsche Nation muss zerstört werden."
AUS_liberate_sudtirol:0 "Befreie Südtirol"
AUS_liberate_sudtirol_desc:0 "Südtirol, eine Region, die ausschließlich von Österreich-Deutschen bewohnt wurde, wurde nach dem Ersten Weltkrieg feige von italienischen Truppen besetzt. Wir müssen unsere Brüder im Süden befreien, selbst wenn der Krieg der einzige Weg dazu ist."
AUS_the_danube_adriatic_union:0 "Die Donau-Adria-Union"
AUS_the_danube_adriatic_union_desc:0 "Alle Balkanstaaten haben Konflikte miteinander, sei es aufgrund territorialer Streitigkeiten oder der nach dem Ersten Weltkrieg unterzeichneten Verträge. Eines haben die Balkanstaaten jedoch gemeinsam: die Angst vor Faschismus und Kommunismus. Während die Sowjets Rumänien und die Türkei aufteilen wollen, streben Deutschland und Italien die Eroberung der Tschechoslowakei und Jugoslawiens an. Wir müssen diese Angst ausnutzen, um all diese Nationen zu vereinen, bevor es zu spät ist."
AUS_invite_czechoslovakia:0 "Tschechoslowakei einladen"
AUS_invite_czechoslovakia_desc:0 "Die Tschechoslowakei hat territoriale Streitigkeiten mit Deutschland, Ungarn und sogar Polen. Sie werden sicherlich bereit sein, sich unserem Bündnis anzuschließen, um ihre Unabhängigkeit zu sichern."
AUS_invite_yugoslavia:0 "Jugoslawien einladen"
AUS_invite_yugoslavia_desc:0 "Jugoslawien hat territoriale Streitigkeiten mit Italien, Ungarn und Bulgarien. Diese Länder werden sicherlich bereit sein, sich unserem Bündnis anzuschließen, um ihre Unabhängigkeit zu sichern."
AUS_invite_turkey:0 "Laden Sie die Türkei ein"
AUS_invite_turkey_desc:0 "Die Türkei hat territoriale Streitigkeiten mit der Sowjetunion, Griechenland und Frankreich. Sie werden sicherlich bereit sein, sich unserem Bündnis anzuschließen, um ihre Unabhängigkeit zu sichern."
AUS_invite_romania:0 "Rumänien einladen"
AUS_invite_romania_desc:0 "Rumänien hat territoriale Streitigkeiten mit der Sowjetunion, Bulgarien und Ungarn. Sie werden sicherlich bereit sein, sich unserem Bündnis anzuschließen, um ihre Unabhängigkeit zu sichern."
AUS_concessions_hungary:0 "Zugeständnisse an Ungarn"
AUS_concessions_hungary_desc:0 "Indem wir die Tschechoslowakei davon überzeugen, einige Gebiete an Ungarn zurückzugeben, können wir uns die Unterstützung der Regentschaft sichern."
AUS_concessions_bulgaria:0 "Zugeständnisse an Bulgarien"
AUS_concessions_bulgaria_desc:0 "Indem wir Rumänien davon überzeugen, einige Gebiete an Bulgarien zurückzugeben, können wir uns die Unterstützung des Zarenreichs sichern."
AUS_condemn_social_democracy:0 "Verurteilen Sie die Sozialdemokratie"
AUS_condemn_social_democracy_desc:0 "Die Stalinisten machten deutlich: Sozialdemokratie ist nichts anderes als Sozialfaschismus. Wir müssen uns mit ihnen auseinandersetzen, auch wenn sie einst auf unserer Seite gegen die Heimwehr standen."
AUS_our_only_option:0 "Unsere einzige Option"
AUS_our_only_option_desc:0 "Auch wenn Alfred Klahr gegen den Stalinismus und die Sowjetunion ist, muss er verstehen, dass sie die einzigen sind, die bereit sind, uns vor den Deutschen und Italienern zu schützen …"
AUS_soviet_austrian_military_academy:0 "Sowjetisch-Österreichische Militärakademie"
AUS_soviet_austrian_military_academy_desc:0 "Unsere Armee ist nichts ohne ihre Führung. Die Sowjets verfügen über weitaus mehr militärische Erfahrung, daher könnte es von Vorteil sein, mit ihnen bei der Ausbildung unserer besten militärischen Köpfe zusammenzuarbeiten. Zu diesem Zweck werden wir eine Militärakademie mit den erfahrensten Ausbildern unserer beiden Nationen gründen."
AUS_a_red_danube:0 "Eine rote Donau"
AUS_a_red_danube_desc:0 "Die Donau wird mit der Kraft der Revolution rot gefärbt! Vorwärts!"
AUS_protect_the_sudeteland_germans:0 "Schützen Sie die Sudetendeutschen"
AUS_protect_the_sudeteland_germans_desc:0 "Wir können nicht zulassen, dass die Sudetendeutschen von ihren Oberherren misshandelt werden. Wir werden sie befreien."
AUS_the_new_austria:0 "Das neue Österreich"
AUS_the_new_austria_desc:0 "Nach dem Sturz Kurt Schuschniggs wurde Starhemberg zum österreichischen Bundeskanzler ernannt. Welche Auswirkungen dies auf die österreichische Situation haben wird, ist derzeit noch unklar, doch er und die Heimwehr erklären, dass dies die Geburt eines neuen Österreichs sei."
AUS_the_kruckenkreuz:0 "Das Krückenkreuz"
AUS_the_kruckenkreuz_desc:0 "Die Vaterländische Front wurde von Diktator Engelbert Dollfuß gegründet, um alle Österreicher unter einer faschistischen Partei zu vereinen, so wie es Adolf Hitler und Mussolini in ihren jeweiligen Ländern taten. Die Partei konnte jedoch nie die Unterstützung der österreichischen NSDAP oder der Sozialdemokraten gewinnen. Dennoch gibt es nach ihrer Niederlage keine Opposition mehr, die Österreichs Aufstieg zu Größe verhindern könnte."
AUS_dollfuss_legacy:0 "Dollfuss&#39; Vermächtnis"
AUS_dollfuss_legacy_desc:0 "Engelbert Dollfuß war ein österreichischer Faschist und amtierte von 1932 bis 1934 als Bundeskanzler. 1933 löste er das Parlament auf und übernahm diktatorische Macht. Im Februar 1934 unterdrückte er während des österreichischen Bürgerkriegs die sozialistische Bewegung und verbot später die österreichische NSDAP. Damit festigte er die Herrschaft des „Austrofaschismus“. Leider wurde dieser Held 1934 im Zuge eines gescheiterten Putschversuchs von Nazi-Agenten ermordet. Wir müssen uns an seine Lehren erinnern, um diese Nation zu retten."
AUS_renounce_the_treaty_of_saint_germain:0 "Verzicht auf den Vertrag von Saint-German-en-Laye"
AUS_renounce_the_treaty_of_saint_germain_desc:0 "Das Unrecht, das unserem Land am Ende des Ersten Weltkriegs aufgezwungen wurde, hat die Wirtschaft unserer einst so großen Nation zerstört und einen großen Teil unserer Bevölkerung dahingerafft. All das wird rückgängig gemacht werden."
AUS_expand_the_heimwehr:0 "Erweitern Sie die Heimwehr"
AUS_expand_the_heimwehr_desc:0 "Alle Österreicher werden bei der Heimwehr eine Menge militärischer und politischer Ausbildung erhalten. Sie werden lernen, wie sie ihre Nation gegen Deutschland verteidigen können und ihren Führer Ernst Starhemberg preisen!"
AUS_execute_the_enemies_of_austria:0 "Hinrichtung der Feinde Österreichs"
AUS_execute_the_enemies_of_austria_desc:0 "Sowohl Nazis als auch Kommunisten wollen unsere Partei und unser Land zerstören. Wir können nicht zulassen, dass diese Leute weiterhin innerhalb unserer Grenzen agieren."
AUS_neues_leben:0 "Neus Leben"
AUS_neues_leben_desc:0 "„Neues Leben“ ist eine kulturelle Organisation, die der deutschen „Kraft durch Freude“ ähnelt. Unseren Leuten wird beigebracht, wie sie ihre Freizeit verbringen und was sie tun müssen, um ihrem Heimatland zu helfen."
AUS_renew_the_rome_protocols:0 "Erneuerung der Römischen Protokolle"
AUS_renew_the_rome_protocols_desc:0 "Angesichts des anhaltenden Revisionismus Deutschlands müssen wir die 1934 ausgearbeiteten und unterzeichneten Römischen Protokolle erneuern. Die Abkommen würden nicht nur dazu dienen, die deutsche und jugoslawische Bedrohung weiter zu isolieren, sondern auch als möglicher Vorläufer eines tatsächlichen Bündnisses."
AUS_alliance_with_italy:0 "Bündnis mit Italien"
AUS_alliance_with_italy_desc:0 "Die ersten Annäherungen an ein Bündnis, die in den Römischen Protokollen gemacht wurden, können nun ausgeweitet werden. Wir werden eine Delegation nach Italien entsenden, um ein verbindliches Abkommen für eine umfassende militärische Zusammenarbeit sowohl in der Defensive als auch in der Offensive zu erörtern."
AUS_protect_czechia:0 "Tschechien schützen"
AUS_protect_czechia_desc:0 "Um Deutschland weiterhin Paroli zu bieten, müssen wir uns seinen offenen Annexionsbestrebungen des Sudetenlandes widersetzen. Wir können Deutschland eine Garantie geben, die der gegenwärtigen Regierung die politische Stärke verleiht, die sie braucht, um sich hoffentlich gegen prodeutsche Elemente zur Wehr zu setzen."
AUS_fate_of_czechoslovakia:0 "Schicksal der Tschechoslowakei"
AUS_fate_of_czechoslovakia_desc:0 "Die Deutschen haben bereits ein Auge auf die Sudetendeutschen und Tschechen geworfen. Wir müssen schnell genug sein, um die Tschechen zu kapitulieren und sie in unsere Nation zu integrieren, damit wir die Sudetendeutschen vor den Nazis schützen können."
AUS_help_the_falangists:0 "Helfen Sie den Falangisten"
AUS_help_the_falangists_desc:0 "Die spanischen Falangisten sind uns sehr ähnlich. Sie schätzen katholische Traditionen, sind strikt gegen den Kommunismus und verfolgen eine interventionistische Wirtschaft. Wir sollten sie in ihrem Kampf bestmöglich unterstützen."
AUS_save_the_carlists:0 "Rettet die Carlisten"
AUS_save_the_carlists_desc:0 "Die Karlisten haben ihre Treue zum Katholizismus bewiesen, genau wie wir. Wir sollten alles tun, was wir können, um sie in ihrem Kampf gegen Kommunismus und Republikanismus zu unterstützen."
AUS_fate_of_yugoslavia:0 "Schicksal Jugoslawiens"
AUS_fate_of_yugoslavia_desc:0 "Der jugoslawische Staat war immer ein künstliches Konstrukt, und die zentrale Autorität beginnt zu bröckeln. Wir müssen eingreifen und die Ordnung wiederherstellen. Die einzige Frage, die sich uns stellt, ist, wie wir dies am besten erreichen können."
AUS_destroy_nazism:0 "Zerstöre den Nationalsozialismus"
AUS_destroy_nazism_desc:0 "Eine Ideologie, die auf Rassenüberlegenheit und Hass gegenüber Brüdern nur wegen ihres Nachnamens basiert, ist abscheulich. Wir sollten die Führung im Kreuzzug übernehmen, um diese abscheuliche Ideologie aus Europa zu verbannen."
AUS_desnazification:0 "Entnazifizierung"
AUS_desnazification_desc:0 "Es ist Zeit, mit der Entnazifizierung Deutschlands zu beginnen. Alle Nazi-Kollaborateure werden vor Gericht gestellt und ein neuer Reichskanzler ernannt. Albert Speer scheint ein geeigneter Kandidat für diesen Posten zu sein, da er erklärte, er sei immer gegen den Nationalsozialismus gewesen, habe sich aber Hitlers Macht nicht widersetzen können. Wie konnte ein so cleverer Mann lügen?"
AUS_anschluss:0 "Anschluss"
AUS_anschluss_desc:0 "Die alten Preußen haben bewiesen, dass sie nicht in der Lage sind, ihre Nation zum Sieg zu führen. Es ist Zeit, beide deutschen Nationen zu vereinen, diesmal jedoch unter der Führung Wiens."
AUS_the_last_step:0 "Der letzte Schritt"
AUS_the_last_step_desc:0 "Nach der Niederlage Deutschlands gibt es keinen Versuch mehr, die Schweizer Nation zu integrieren."
AUS_restore_the_empire:0 "Das Imperium wiederherstellen"
AUS_restore_the_empire_desc:0 "Das Kaiserreich Österreich war der größte Vertreter österreichischer Stabilität und Macht, wurde jedoch nach dem Ersten Weltkrieg von der Entente abgeschafft. Doch nun, da die Entente durch ihre Beschwichtigungspolitik und ihre wirtschaftlichen Probleme geschwächt ist, hat sich das Blatt gewendet. Dies ist die perfekte Gelegenheit, erneut Größe zu erreichen."
AUS_demand_a_referendum:0 "Fordern Sie ein Referendum"
AUS_demand_a_referendum_desc:0 "Die Auflösung Österreich-Ungarns war ein Fehler. Österreich und Ungarn sind gemeinsam stärker, und nur durch die Kombination beider Kräfte kann jedes der beiden Länder zu Größe gelangen. Die Österreicher müssen zu einem Referendum über den Vorschlag einer friedlichen Vereinigung unserer beiden Nationen gezwungen werden."
AUS_take_hungary_by_force:0 "Ungarn mit Gewalt einnehmen"
AUS_take_hungary_by_force_desc:0 "Der erste Schritt zur Wiederherstellung des Ruhms Österreichs besteht in der Wiedereingliederung der ungarischen Länder. Wir können es uns nicht leisten, dass dieser diplomatische Weg scheitert, deshalb müssen wir ihn mit Gewalt erreichen."
AUS_proclaim_the_restoration_of_austria_hungary:0 "Wiederherstellung Österreich-Ungarns"
AUS_proclaim_the_restoration_of_austria_hungary_desc:0 "Mit der Wiedervereinigung unserer beiden Nationen und einem Habsburger auf dem Thron können wir nun feierlich die Wiederherstellung Österreich-Ungarns verkünden und uns um die Rückeroberung unserer rechtmäßigen historischen Provinzen kümmern!"
AUS_protect_czechoslovakia:0 "Schützen Sie die Tschechoslowakei"
AUS_protect_czechoslovakia_desc:0 "Die Tschechoslowakei ist seit ihrer Unabhängigkeit mächtig und fleißig geworden, doch ihre Ländereien werden von ihren Nachbarn gierig beäugt. Wir werden ihnen Schutz vor diesen Bedrohungen bieten, indem wir sie entweder wieder als integralen Bestandteil unseres Reiches willkommen heißen oder ihnen den Status einer Assoziation gewähren."
AUS_claim_transylvania:0 "Anspruch auf Transsilvanien"
AUS_claim_transylvania_desc:0 "Das Gebiet Siebenbürgen wurde uns nach dem letzten Krieg ungerechterweise genommen. Es ist Zeit, es zurückzufordern."
AUS_march_to_the_shore:0 "Marsch zur Küste"
AUS_march_to_the_shore_desc:0 "Eine wahre Großmacht braucht Zugang zu den Meeren. Die Küste der Adria ist unser Geburtsrecht."
AUS_reclaim_venetia:0 "Venetien zurückerobern"
AUS_reclaim_venetia_desc:0 "Der Verrat der Italiener im Ersten Weltkrieg ist nicht vergessen. Es ist an der Zeit, sie in die Schranken zu weisen und das Reich in seine natürlichen Grenzen zurückzuführen."
AUS_claim_galicia:0 "Anspruch auf Galizien"
AUS_claim_galicia_desc:0 "Der Staat Polen ist nichts weiter als ein künstliches Konstrukt. Er kann nach Bedarf geschaffen und wieder abgebaut werden."
AUS_claim_the_bucovina:0 "Beanspruchen Sie die Bukowina"
AUS_claim_the_bucovina_desc:0 "Es ist vielleicht nicht der wirtschaftlich bedeutendste unserer weit verstreuten Besitztümer, aber es ist immer noch ein Teil unseres Imperiums. Und wir werden es zurückfordern."
AUS_claim_silesia:0 "Schlesien zurückerobern"
AUS_claim_silesia_desc:0 "Der Vertrag von Hubertusburg wurde 1763 von Preußen, Österreich und Sachsen unterzeichnet, um den Dritten Schlesischen Krieg zu beenden. Darin wurden wir gezwungen, auf alle Ansprüche auf die Region Schlesien zu verzichten. Da jedoch weder das österreichische Kaiserreich noch Preußen mehr existieren, haben wir keinen Grund, weiterhin an diesen Vertrag gebunden zu sein."
AUS_reorganize_the_state:0 "Den Staat neu organisieren"
AUS_reorganize_the_state_desc:0 "Nachdem wir nun die Kontrolle über unsere alten Gebiete zurückerlangt haben, sollten wir nach einer Möglichkeit suchen, einen weiteren Zusammenbruch unseres Reiches in der Zukunft zu verhindern."
AUS_fulfilling_franzs_dream:0 "Die Erfüllung von Franz‘ Traum"
AUS_fulfilling_franzs_dream_desc:0 "Franz Ferdinand, möge er in Frieden ruhen, plädierte dafür, den ethnischen Gruppen innerhalb des Reiches mehr Autonomie zu gewähren und ihre Anliegen durch die Schaffung eines föderalen Staates nach dem Vorbild der USA, der Vereinigten Staaten von Großösterreich, zu berücksichtigen. Wir werden seinen Traum erfüllen, indem wir diese Reform umsetzen und den Donaubund ins Leben rufen."
AUS_fulfilling_karls_dream:0 "Karls Traum erfüllen"
AUS_fulfilling_karls_dream_desc:0 "Karl I., der Vater Ottos von Habsburgs, beschloss 1918 drastische Reformen. Das Reich wurde zu einem föderalen Staatenbund, dessen Mitglieder volle politische, wirtschaftliche und militärische Autonomie behielten und nur das Staatsoberhaupt teilten. Nach dem Frieden mit der Entente wurden all diese Reformen jedoch wieder aufgehoben. Nun steht Karls Wunsch jedoch nicht mehr im Wege."
AUS_the_second_ausleich:0 "Der zweite Ausgleich"
AUS_the_second_ausleich_desc:0 "Wir brauchen keine Reformen, um die Stabilität unseres Königreichs zu sichern. Was wir wirklich brauchen, ist, die Menschen dazu zu zwingen, uns nicht im Weg zu stehen."
AUS_the_blessed_empire:0 "Das gesegnete Reich"
AUS_the_blessed_empire_desc:0 "Das Heilige Römische Reich muss aus der Asche wiedergeboren werden, um Europa wieder Stabilität zu bringen …"
AUS_the_great_land_reform:0 "Die große Landreform"
AUS_the_great_land_reform_desc:0 "Um die Gleichberechtigung der Menschen in unserer neuen Föderation zu fördern, müssen wir dafür sorgen, dass jeder, unabhängig von seiner ethnischen Zugehörigkeit, Land besitzen oder von einem Grundbesitzer kaufen kann."
AUS_anti_discrimination_laws:0 "Antidiskriminierungsgesetze"
AUS_anti_discrimination_laws_desc:0 "Alle Donauvölker sollen die gleichen Rechte haben und gleich behandelt werden, unabhängig von ihrer ethnischen Zugehörigkeit, Nationalität oder Muttersprache."
AUS_the_guardian_of_the_danube:0 "Der Wächter der Donau"
AUS_the_guardian_of_the_danube_desc:0 "Nachdem wir unserer Föderation Stabilität gebracht haben, ist es an der Zeit, dem Rest des Balkans Frieden zu bringen."
AUS_expand_the_union:0 "Erweitern Sie die Union"
AUS_expand_the_union_desc:0 "Wenn wir Albanien, Bulgarien und Rumänien davon überzeugen, unserer Union beizutreten, können wir die Zahl potenzieller Feinde in der Region verringern. Wir werden versuchen, sie zum Beitritt zu bewegen, indem wir ihnen Gebiete versprechen, die uns oder unseren Untertanen gehören."
AUS_the_danube_economic_union:0 "Die Donau-Wirtschaftsunion"
AUS_the_danube_economic_union_desc:0 "Wir werden mit der Schaffung der Donau-Wirtschaftsunion beginnen. Dieser neue Markt soll den freien Verkehr von Waren, Kapital, Dienstleistungen und Arbeitskräften, bekannt als die „Vier Freiheiten“, gewährleisten. Wir werden außerdem eine Währungsunion schaffen, um die Donaumark zur einzigen gültigen Währung in der Union zu machen."
AUS_multinational_army:0 "Multinationale Armee"
AUS_multinational_army_desc:0 "Wir werden die Rekrutierung unter den Gewerkschaftsmitgliedern ausweiten, damit wir alle unsere Grenzen vor ausländischen Bedrohungen verteidigen können."
AUS_anti_riot_training:0 "Anti-Aufruhr-Training"
AUS_anti_riot_training_desc:0 "Die Schaffung einer paramilitärischen Polizei ist für die Gewährleistung der Stabilität des Imperiums von entscheidender Bedeutung."
AUS_geheime_staatpolizei:0 "Geheime Staatspolizei"
AUS_geheime_staatpolizei_desc:0 "Die Geheime Staatspolizei wurde im September 1786 im Zuge einer umfassenden Reorganisation der österreichischen Polizei unter der Führung von Johann Anton von Pergen gegründet. Ihre Aufgabe war die Spionageabwehr im Inland sowie die Überwachung politischer Umstürzler und der öffentlichen Meinung. Nun ist es an der Zeit, sie neu zu gründen."
AUS_the_kingdom_of_spionage:0 "Das Königreich der Spionage"
AUS_the_kingdom_of_spionage_desc:0 "Die vielen verschiedenen Ethnien in unserem Land sind ein großes Problem. Wenn wir das Glas jedoch als halb voll betrachten, kann die Vielzahl der verschiedenen Sprachen innerhalb unserer Grenzen Spionage und subversiven Aktivitäten nützen …"
AUS_recover_the_south:0 "Den Süden zurückgewinnen"
AUS_recover_the_south_desc:0 "Der Kirchenstaat und die italienischen Nationen müssen sich wieder unserem heiligen Reich anschließen."
AUS_recover_the_west:0 "Den Westen zurückgewinnen"
AUS_recover_the_west_desc:0 "Die Ostfranzosen müssen sich wieder unserem heiligen Reich anschließen."
AUS_recover_the_north:0 "Den Norden zurückgewinnen"
AUS_recover_the_north_desc:0 "Der einzige Schritt zur Wiedervereinigung unseres Reiches besteht nun darin, die Kontrolle über die Benelux-Länder zurückzuerlangen."
AUS_dissolve_the_heimwehr:0 "Die Heimwehr auflösen"
AUS_dissolve_the_heimwehr_desc:0 "Nachdem wir Starhemberg entlassen haben, ist es an der Zeit, die Heimwehr zu verbieten. Nur so kann der Frieden in Österreich wiederhergestellt werden."
AUS_appease_the_nazis:0 "Beschwichtigung der Nazis"
AUS_appease_the_nazis_desc:0 "Wir werden die neue Strategie der Beschwichtigung gegenüber Großbritannien und Frankreich verfolgen, um den Frieden zwischen unserem Land und Deutschland zu wahren. Wir werden die Pressezensur reduzieren, Reisebeschränkungen zwischen unseren Ländern aufheben und Nazi-Gefangene amnestieren, um Deutschland zu zeigen, dass wir nicht gegen sie sind."
#There is no question of ever accepting Nazi representatives in the Austrian cabinet. An absolute abyss separates Austria from Nazism ... We reject uniformity and centralization. ... Christendom is anchored in our very soil, and we know but one God: and that is not the State, or the Nation, or that elusive thing, Race.
AUS_bundeskanzleramt_putsch:0 "Hausarrest Schuschnigg"
AUS_bundeskanzleramt_putsch_desc:0 "Schuschnigg trat aufgrund deutschen Drucks zurück, doch das änderte nichts. Deutsche Truppen strömten nach Österreich und wurden überall von begeisterten und jubelnden Menschenmengen empfangen. Am nächsten Tag wurde Schuschnigg unter Hausarrest gestellt. Eine seiner letzten Reden wird den Menschen immer in Erinnerung bleiben: „Ein absoluter Abgrund trennt Österreich vom Nationalsozialismus. Das Christentum ist in unserer Erde verankert, und wir kennen nur einen Gott: und das ist nicht der Staat, noch die Nation, noch dieses schwer fassbare Ding, die Rasse.“"
AUS_accept_the_inevitable:0 "Akzeptiere das Unvermeidliche"
AUS_accept_the_inevitable_desc:0 "Deutschland wird nicht ruhen, bis Österreich von den Streitkräften des Reichs kontrolliert wird."
AUS_adopt_the_german_rethoric:0 "Übernehmen Sie die deutsche Rhetorik"
AUS_adopt_the_german_rethoric_desc:0 "Wenn wir wollen, dass die Deutschen unsere Autonomie respektieren, müssen wir ihrer Ideologie folgen, auch wenn sie für unser Volk unglaublich abstoßend ist."
AUS_german_high_command:0 "Deutsches Oberkommando"
AUS_german_high_command_desc:0 "Um die Leistungsfähigkeit unserer Armee zu verbessern, werden deutsche Offiziere nach Deutschland eingeladen."
AUS_bring_the_blitz_to_the_danube:0 "Bring den Donner an die Donau"
AUS_bring_the_blitz_to_the_danube_desc:0 "Nachdem unsere Armee nun in der Kunst des Blitzkriegs ausgebildet wurde, ist es an der Zeit, unsere erste Panzerdivision auszubilden."
AUS_german_scientists:0 "Deutsche Wissenschaftler"
AUS_german_scientists_desc:0 "Wir sollten eine Zusammenarbeit mit den Berliner Wissenschaftlern beginnen, um unsere Forschungskapazitäten zu verbessern."
AUS_german_supplies:0 "Deutsche Vorräte"
AUS_german_supplies_desc:0 "Wir werden Deutschland um Nachschub bitten, um unsere Armee zu erweitern."
AUS_the_bohmen_mahren_question:0 "Die Böhmen- und Mähren-Frage"
AUS_the_bohmen_mahren_question_desc:0 "Die Tschechen und Sudetendeutschen waren jahrhundertelang Teil des österreichischen Kaiserreichs. Daher werden wir unseren deutschen Oberherren die Übertragung der Region an das Reichskommissariat Ostmark empfehlen. Schließlich könnten die Bürger Tschechiens die Ostmark als einen alten Herrscher betrachten und nicht als einen Eindringling, wie sie heute Deutschland sehen."
AUS_claim_switzerland:0 "Anspruch Schweiz"
AUS_claim_switzerland_desc:0 "Die Deutschschweizer sollten in die Ostmark integriert werden."
AUS_claim_slovenia:0 "Anspruch auf Slowenien"
AUS_claim_slovenia_desc:0 "Die Slowenen sollten in die Ostmark integriert werden."
AUS_occupy_northern_italy:0 "Besetzen Sie Norditalien"
AUS_occupy_northern_italy_desc:0 "Dies ist unsere Chance, Südtirol von denen zurückzuerobern, die es zu stehlen wagten."
AUS_the_fourth_reich:0 "Das Reich lebt"
AUS_the_fourth_reich_desc:0 "Wir mögen im Bürgerkrieg besiegt worden sein, aber unser Geist ist unzerstörbar. Dank der österreichischen Nazis, die in Österreich die Macht übernahmen, haben wir nun die Macht, unser Heimatland zurückzuerobern, wenn wir dazu bereit sind."
AUS_the_great_march_to_vienna:0 "Der Große Marsch nach Wien"
AUS_the_great_march_to_vienna_desc:0 "Viele SS- und Nazi-Milizen kämpfen noch immer in Deutschland. Wir müssen Kontakt zu ihnen aufnehmen und sie nach Österreich führen, wo sie erneut für ihr Reich kämpfen können."
AUS_the_new_reichskanzler:0 "Der neue Reichskanzler"
AUS_the_new_reichskanzler_desc:0 "Unser mächtiger Führer starb leider während des Bürgerkriegs. Es ist an der Zeit, seinen Lehren unter einem neuen Reichskanzler zu folgen. Doch wer wird er sein?"
AUS_heinrich_himmler:0 "Der Verrückte"
AUS_heinrich_himmler_desc:0 "Heinrich Himmler ist für seine Brutalität und seine Faszination für das Heidentum bekannt und der richtige Mann für die Führung des Reiches."
AUS_reinhard_heydrich:0 "Das eiserne Herz"
AUS_reinhard_heydrich_desc:0 "Reinhard Heydrich ist für seine Brutalität und Strenge bekannt und der richtige Mann für die Führung des Reiches."
AUS_goebbels:0 "Der Propagandameister"
AUS_goebbels_desc:0 "Josef Göbbels ist für sein Geschick in der Propaganda bekannt und der richtige Mann für die Führung des Reiches."
AUS_goering:0 "Der Baron"
AUS_goering_desc:0 "Hermann Göring ist bekannt für seine Karriere als Ass im Ersten Weltkrieg und der richtige Mann für die Führung des Reiches."
AUS_expand_the_ss:0 "Erweitern Sie die SS"
AUS_expand_the_ss_desc:0 "Der Ausbau der SS wird unserer Armee helfen, den bekannten Blitzkrieg zu führen, wenn wir um die Befreiung Berlins kämpfen."
AUS_the_shadow_state:0 "Der Schattenstaat"
AUS_the_shadow_state_desc:0 "Nichts kommt rein, nichts geht raus."
AUS_neo_paganism:0 "Neuheidentum"
AUS_neo_paganism_desc:0 "Kapitalismus, Kommunismus und Juden haben sich immer gegen die deutsche Nation verschworen, aber es gab einen Teufel, der sich versteckte: das Christentum. Die Deutschen werden zu ihren heidnischen Wurzeln zurückkehren, um Größe zu erreichen."
AUS_establish_cult_sites:0 "Kultstätten errichten"
AUS_establish_cult_sites_desc:0 "Im ganzen Land werden Kultstätten errichtet, damit jeder für die wahre Religion beten kann."
AUS_expand_the_einsatzgruppen:0 "Erweiterung der Einsatzgruppen"
AUS_expand_the_einsatzgruppen_desc:0 "Die Einsatzgruppen sind Spezialeinheiten der SS mit dem Ziel, Juden, Zigeuner und politische Gegner hinzurichten. Wir werden sie in die Armee integrieren und ihre Stärke erhöhen, um die Moral unserer Truppen zu stärken und eroberte Gebiete besser unter Kontrolle zu halten."
AUS_expand_the_gestapo:0 "Ausbau der Gestapo"
AUS_expand_the_gestapo_desc:0 "Die Geheime Staatspolizei war die Geheimpolizei des Reiches. Den Putsch der Wehrmacht konnte sie nicht verhindern, doch durch den Ausbau der Geheimpolizei kann dem Reich nun niemand mehr schaden."
AUS_nacht_und_nebel:0 "Unter Nacht und Nebel"
AUS_nacht_und_nebel_desc:0 "Alle politischen Gegner des Reiches verschwinden im Licht des Mondes. Bald werden alle Menschen in Europa die Nacht und den Nebel fürchten."
AUS_the_stab_in_the_back:0 "Der Dolchstoß"
AUS_the_stab_in_the_back_desc:0 "Die deutsche Armee verlor den Ersten Weltkrieg nicht auf dem Schlachtfeld, sondern wurde von der Zivilbevölkerung an der Heimatfront verraten, insbesondere von Juden und revolutionären Sozialisten, die Streiks und Arbeitsunruhen anzettelten. Juden taten es erneut, indem sie die Wehrmacht davon überzeugten, unseren Führer zu putschen, und der Rest ist Geschichte …"
AUS_the_fuhrer_principle:0 "Das Führerprinzip"
AUS_the_fuhrer_principle_desc:0 "1. Führerprinzip \n\nDas Wort des Führers steht über allem geschriebenen Gesetz."
AUS_national_community:0 "Nationale Gemeinschaft"
AUS_national_community_desc:0 "2. Volksgemeinschaft \n\nElitismus abbauen und Menschen über Klassengrenzen hinweg vereinen, um ein nationales Ziel zu erreichen."
AUS_blood_and_soil:0 "Blut und Boden"
AUS_blood_and_soil_desc:0 "3. Blut und Boden \n\nDer Glaube, dass das deutsche Volk nach Osteuropa expandieren und die einheimische slawische und baltische Bevölkerung erobern und verdrängen müsse, sowie die Verehrung der Agrarklasse."
AUS_rebuild_the_luftwaffe:0 "Wiederaufbau der Luftwaffe"
AUS_rebuild_the_luftwaffe_desc:0 "Die Luftwaffe muss wieder aufgebaut werden und die Befreiung Berlins anführen!"
AUS_exploit_the_magyars:0 "Die Magyaren ausbeuten"
AUS_exploit_the_magyars_desc:0 "Die Ungarn sind durch den Vertrag von Trianon unglaublich geschwächt. Sie werden nicht in der Lage sein, schnell genug aufzurüsten, um unsere Invasion abzuwehren."
AUS_subdue_the_south_slavs:0 "Unterwerfe die Südslawen"
AUS_subdue_the_south_slavs_desc:0 "Die Jugoslawen sind schwach und uneinig. Es wird ein Leichtes sein, sie in wenigen Wochen zu besiegen."
AUS_liberate_the_sudeteland:0 "Befreie das Sudetenland"
AUS_liberate_the_sudeteland_desc:0 "Die Tschechoslowakei glaubt, vor Deutschland sicher zu sein, hat jedoch nie mit einer Invasion Österreichs gerechnet. Wir werden die Gelegenheit nutzen, die Deutschen des Sudetenlandes zu befreien, bevor wir Berlin befreien."
AUS_recover_berlin:0 "Recover Berlin"
AUS_recover_berlin_desc:0 "Wir werden mit der Befreiung Berlins von den Kräften des jüdischen Kapitalismus und des jüdischen Bolschewismus beginnen, die es mit Hilfe der Wehrmacht zu stürzen wagten!"
AUS_thousand_years_reich:0 "Tausendjähriges Reich"
AUS_thousand_years_reich_desc:0 "Jetzt, da wir Deutschland befreit haben, wird nichts das Reich davon abhalten können, Europa zu beherrschen! Heil [AUS.GetLeader]! Heil [AUS.GetLeader]! Heil [AUS.GetLeader]!"
AUS_remember_1931:0 "Erinnern Sie sich an 1931"
AUS_remember_1931_desc:0 "Die Wirtschaftskrise von 1931 hat uns viel darüber gelehrt, wie wir unsere Wirtschaft führen sollten. Was dich nicht umbringt, macht dich stärker, nicht wahr?"
AUS_continue_the_interventionist_policy:0 "Fortsetzung der interventionistischen Politik"
AUS_continue_the_interventionist_policy_desc:0 "Die interventionistische Wirtschaft Österreichs hat bewiesen, dass sie große Schwierigkeiten überwinden kann. Diese Politik müssen wir fortsetzen."
AUS_salzburg_tungsten_mines:0 "Salzburger Wolframbergwerke"
AUS_salzburg_tungsten_mines_desc:0 "Die Tungstern-Minen werden unsere Produktion unterstützen."
AUS_innerberg_iron_extraction:0 "Eisengewinnung am Innenberg"
AUS_innerberg_iron_extraction_desc:0 "Eisenminen werden unsere Produktion ankurbeln."
AUS_steyr_coal_excavation:0 "Kohleabbau Steyr"
AUS_innerberg_iron_extraction_desc:0 "Kohlebergwerke werden unsere Produktion mit Energie versorgen."
AUS_agrarian_interventionism:0 "Agrarinterventionismus"
AUS_agrarian_interventionism_desc:0 "Interventionistische Maßnahmen auf dem Land werden uns helfen, die Effizienz unserer Wirtschaft zu verbessern."
AUS_promote_economic_control:0 "Förderung der wirtschaftlichen Kontrolle"
AUS_promote_economic_control_desc:0 "Die interventionistische Wirtschaft Österreichs hat bewiesen, dass sie in der Lage ist, große Schwierigkeiten zu überwinden."
AUS_domestic_arms_industry:0 "Inländische Rüstungsindustrie"
AUS_domestic_arms_industry_desc:0 "Nachdem wir nun wieder mit der Produktion von Infanteriewaffen begonnen haben, ist es an der Zeit, mit dem Bau von Militärfabriken zur Versorgung unserer Armee zu beginnen."
AUS_protect_foreign_investors:0 "Schutz ausländischer Investoren"
AUS_protect_foreign_investors_desc:0 "Unsere Wirtschaft mag kontrolliert werden, aber das bedeutet nicht, dass wir jeden Investor verachten, der uns seine Unterstützung anbietet."
AUS_university_of_vienna:0 "Universität Wien"
AUS_university_of_vienna_decs:0 "Die Universität Wien ist für die Qualität ihrer Studierenden bekannt. Dies wird uns helfen, die besten Technologien für unsere Industrie und Streitkräfte zu erforschen."
AUS_promote_research:0 "Forschung fördern"
AUS_promote_research_desc:0 "Durch die Förderung der Forschung können wir die besten Technologien für unsere Industrie und Streitkräfte erforschen."
AUS_defend_our_independence:0 "Verteidige unsere Unabhängigkeit"
AUS_defend_our_independence_desc:0 "Österreich wird keinem Angreifer zum Opfer fallen, der es wagt, es anzugreifen. Unsere Streitkräfte werden vorbereitet sein, wenn der Tag kommt."
AUS_zehners_reforms:0 "Zehner-Reformen"
AUS_zehners_reforms_desc:0 "Wilhelm Zehner hat unserem Land maßgeblich dabei geholfen, seine Armee zu modernisieren. Wir werden seiner Doktrin folgen, um sie zu einer der diszipliniertesten und schlagkräftigsten Armeen Europas zu machen."
AUS_guarantee_the_geneva_protocols:0 "Garantieren Sie die Genfer Protokolle"
AUS_guarantee_the_geneva_protocols_desc:0 "Der Vertrag von Saint-Germain-en-Laye und die Genfer Protokolle verbieten Deutschland den Anschluss an Österreich. Die neue Regierung hat jedoch ihre Absicht bekundet, uns zu annektieren. Wir müssen die Entente dazu drängen, die Vereinbarungen einzuhalten, bevor es zu spät ist."
AUS_national_weapon_manufacture:0 "Nationale Waffenherstellung"
AUS_national_weapon_manufacture_desc:0 "Unser Land war einst für seine Waffenproduktion bekannt. Jahrzehntelang wurden Pistolen und Gewehre in Wien entwickelt und produziert. Heute wirkt dies wie eine Erinnerung an die Vergangenheit. Das muss sich ändern."
AUS_revise_the_treaty_of_saint_germain:0 "Überarbeitung des Vertrags von Saint-Germain-en-Laye"
AUS_revise_the_treaty_of_saint_germain_desc:0 "Wenn wir unsere Nation verteidigen wollen, müssen wir die Entente bitten, einige Punkte des Vertrags von Saint-Germain-en-Laye aufzuheben. Wir müssen es jetzt tun, sonst wird es zu spät sein."
AUS_take_the_initiative:0 "Ergreifen Sie die Initiative"
AUS_take_the_initiative_desc:0 "Wir müssen unsere Feinde zuerst angreifen, und zwar mit so großer Härte, dass sie sich nicht mehr erholen und nie wieder in die Offensive gehen können."
AUS_model_gebirgsjager:0 "Modell Gebirgsjäger"
AUS_model_gebirgsjager_desc:0 "Unser Gebirgskorps wird für ganz Europa ein Vorbild an Effektivität und Disziplin sein."
AUS_expand_the_mountaineer_corps:0 "Erweitern Sie das Gebirgsjägerkorps"
AUS_expand_the_mountaineer_corps_desc:0 "Um die Alpen effizienter zu schützen, brauchen wir viele Bergsteigerkräfte."
AUS_like_white_foxes:0 "Wie weiße Füchse"
AUS_like_white_foxes_desc:0 "Wie schnelle weiße Füchse in der Arktis sind unsere Bergsteiger bereit, jede Beute anzugreifen, ungeachtet des Schnees und der Kälte auf dem Schlachtfeld."
AUS_wait_for_the_strike:0 "Warten Sie auf den Streik"
AUS_wait_for_the_strike_desc:0 "Wir wären niemals in der Lage, Deutschland oder Italien in einer Offensive zu besiegen. Deshalb müssen wir sie jedes Mal in unsere Befestigungen locken, bis sie wissen, dass sie uns nicht schlagen können."
AUS_extensive_fort_building:0 "Umfangreicher Festungsbau"
AUS_extensive_fort_building_desc:0 "Im Falle einer deutschen oder österreichischen Invasion würden Festungen Tausende von österreichischen Leben retten."
AUS_zehner_line:0 "Zehner-Linie"
AUS_zehner_line_desc:0 "Die Zehnerlinie wird eine Verteidigungsposition mit dem Ziel sein, Oberösterreich im Falle einer deutschen Invasion zu schützen."
AUS_tannenau_line:0 "Tannenau-Linie"
AUS_tannenau_line_desc:0 "Die Tannenau-Linie wird eine Verteidigungsposition mit dem Ziel sein, Tirol im Falle einer italienischen oder deutschen Invasion zu schützen."
AUS_the_alpine_army:0 "Alpenarmee"
AUS_the_alpine_army_desc:0 "Unsere Armee ist nun bestens darauf vorbereitet, in allen Gebirgen Europas zu kämpfen. Wenn der Tag der Verteidigung unserer Nation kommt, werden wir bereit sein."
AUS_domestic_weapon_designs:0 "Inländische Waffendesigns"
AUS_domestic_weapon_designs_desc:0 "Unsere Armee wird mit den besten Waffen ausgestattet, die wir selbst entworfen und hergestellt haben."
AUS_be_realistic:0 "Seien Sie realistisch"
AUS_be_realistic_desc:0 "Unsere Luftwaffe wird niemals mit der deutschen und italienischen konkurrieren können. Wir sollten uns darauf konzentrieren, unser Land auf die Bombenangriffe unserer Feinde vorzubereiten."
AUS_expand_the_luftstreitkrafte:0 "Wiederaufbau der Luftstreitkräfte"
AUS_expand_the_luftstreitkrafte_desc:0 "Die österreichische Luftwaffe muss wieder aufgebaut werden, wenn wir unser Land vor den deutschen und italienischen Bombern verteidigen wollen."
AUS_terrify_the_luftwaffe:0 "Schrecken Sie die Luftwaffe"
AUS_terrify_the_luftwaffe_desc:0 "Die Luftwaffe wird es sich von nun an zweimal überlegen müssen, bevor sie über unser Territorium fliegt."
AUS_clear_skies:0 "Klarer Himmel"
AUS_clear_skies_desc:0"Wir werden versuchen, dem britischen Beispiel zu folgen und unsere Städte unbombbar zu machen. Und wenn uns das nicht gelingt, werden wir zumindest einige Piloten mit in den Abgrund nehmen."
AUS_no_bomb_shall_reach_vienna:0 "Keine Bombe soll Wien erreichen"
AUS_no_bomb_shall_reach_vienna_desc:0 "Unser Himmel wird undurchdringlich, jede Stadt wird über eine Luftabwehrstellung verfügen, um sich zu verteidigen, und jeder Bürger wird wissen, was im Falle eines Bombenangriffs zu tun ist."
AUS_destroy_the_junkers:0 "Zerstöre die Junkers"
AUS_destroy_the_junkers_desc:0 "Da nun jede österreichische Stadt über eine eigene Luftabwehr verfügt, können wir jeden Bomber in unserem Luftraum zerstören."
AUS_against_the_clock:0 "Gegen die Uhr"
AUS_against_the_clock_desc:0 "Das einzige Flugzeug, das jemals von der österreichischen Luftwaffe erforscht wurde, ist ein alter Entwurf aus der Zwischenkriegszeit. Wir müssen jetzt neue Entwürfe entwickeln, bevor feindliche Bomber und Jäger unseren Himmel füllen."
AUS_bring_them_to_hell:0 "Bring sie zur Hölle"
AUS_bring_them_to_hell_desc:0 "Wir werden unsere ersten Bomber erforschen, um dann unsere feindlichen Nationen in die Hölle zu schicken."
AUS_extensive_pilot_training:0 "Umfangreiche Pilotenausbildung"
AUS_extensive_pilot_training_desc:0 "Unsere Piloten werden darauf trainiert, Österreich vor jeder Bedrohung zu verteidigen, der sie ausgesetzt sein könnten."
AUS_defend_our_skies:0 "Verteidige unseren Himmel"
AUS_defend_our_skies_desc:0 "Nachdem wir unsere Fabriken nun an die Flugzeugproduktion gewöhnt haben, können wir den Himmel verteidigen und unseren Feinden Angst und Schrecken einjagen."
AUS_naval_warfare:0 "Seekrieg"
AUS_naval_warfare_desc:0 "Nachdem wir eine Küste zurückgewonnen haben, müssen wir unsere Bemühungen auf den Wiederaufbau einer Flotte konzentrieren, die für eine Großmacht geeignet ist."
AUS_restauration:0 "Wiederherstellung"
AUS_restauration_desc:0 "Wir können keine Zeit mit Experimenten mit neuen und unerprobten Technologien verschwenden. Wir bleiben bei bewährten Designs aus der Zeit des alten Imperiums."
AUS_reform:0 "Reform"
AUS_reform_desc:0 "Es macht wenig Sinn, eine Marine auf der Grundlage veralteter Ideen aufzubauen. Wir haben die Möglichkeit, eine neue Marine von Grund auf aufzubauen, ohne die Altlasten der alten. Wir sollten sie nutzen, um die modernste und leistungsfähigste Marine aufzubauen, die wir uns leisten können."
AUS_capital_ships:0 "Großkampfschiffe"
AUS_capital_ships_desc:0 "Das Herzstück einer Marine ist das Schlachtschiff. Wir müssen die verlorene Zeit aufholen und so schnell wie möglich mit dem Bau neuer Schiffe beginnen."
AUS_destroyer:0 "Zerstörer"
AUS_destroyer_desc:0 "Zerstörer sind ein wichtiger, aber oft übersehener Teil der Flotte. Zusammen mit den geringen Kosten sind sie ein guter Anfang für jedes Marine-Erweiterungsprogramm."
AUS_cruisers:0 "Kreuzer"
AUS_cruisers_desc:0 "Selbst die stärkste Streitmacht ist nutzlos, wenn sie den Feind nicht finden oder sich nicht vor Flugzeugen schützen kann. Durch die Entwicklung neuer leichter und schwerer Kreuzer können wir aus einer Schiffssammlung eine richtige Flotte machen."
AUS_submarines:0 "U-Boote"
AUS_submarines_desc:0 "Im letzten Krieg hätten U-Boote beinahe die mächtigste Marine der Welt besiegt. Wir können als moderne Marine nicht ernst genommen werden, wenn wir keine eigenen U-Boote besitzen."
AUS_carriers:0 "Frachtführer"
AUS_carriers_desc:0 "Das Schlachtschiff ist ein Relikt aus längst vergangenen Zeiten. Die Zukunft der Seekriegsführung liegt im Träger und im Flugzeug. Wir werden an der Spitze dieser Entwicklung stehen."
AUS_von_mises_plan:0 "Von Mises Plan"
AUS_von_mises_plan_desc:0 "Ludwig von Mises ist ein österreichischer Ökonom und eine Inspirationsfigur für Otto von Habsburg. Er ist bekannt für seine Unterstützung des Laissez-faire-Prinzips und des Freihandels und befürwortet eine liberale Wirtschaft. Er ist der Ansicht, dass die kommunistische und sozialistische Wirtschaft aufgrund des Mangels an Geld zur Deckung des Wertes aller Güter zum Untergang verurteilt sei."
YUG_cross_the_borders:0 "Erweitern Sie die OZNA"
YUG_cross_the_borders_desc:0 "Wir können nicht tatenlos zusehen, wie unsere Bauernbrüder von den Regierungen unserer Nachbarn unterdrückt werden. Wir werden die OZNA ausbauen, um Guerillaführer und politische Führer entsenden zu können, die beim Export der Revolution helfen."
YUG_greater_yugoslavia2:0 "Großjugoslawien"
YUG_greater_yugoslavia2_desc:0 "Nachdem in Bulgarien und Albanien nun befreundete Regime eingesetzt wurden, können wir auf eine Vereinigung mit beiden Nationen drängen."
YUG_destroy_the_oppressor:0 "Zerstöre den Unterdrücker"
YUG_destroy_the_oppressor_desc:0 "„Wir sind alle gleich“, sagt der russische Metzger, während er einem Ukrainer den Kopf abschneidet. Die Sowjets haben sich als unfähig erwiesen, die Revolution weltweit zu repräsentieren. Es ist Zeit, den neuen Unterdrücker Moskaus zu vernichten."
YUG_form_slavia:0 "Eine panslawische Nation"
YUG_form_slavia_desc:0 "Die Sowjets haben bewiesen, dass sie nicht in der Lage sind, eine panslawische Nation zu führen. Es ist an der Zeit, dass die Jugoslawen die Zukunft sowohl der Slawen als auch des Kommunismus in die Hand nehmen."
YUG_collaborate_with_the_chetniks:0 "Zusammenarbeit mit den Tschetniks"
YUG_collaborate_with_the_chetniks_desc:0 "Die Tschetniks wurden von Oberst Draža Mihajlović gegründet und sind eine antikommunistische monarchistische Guerilla. Bekannt für ihren Pragmatismus, ihren Antisemitismus und ihren Hass auf den Islam, werden die Tschetniks für das Königreich kämpfen, bis es befreit ist."
YUG_collaborate_with_the_partisans:0 "Zusammenarbeit mit den Partisanen"
YUG_collaborate_with_the_partisans_desc:0 "Die jugoslawischen Partisanen unter der Führung des kroatischen Bürgerkriegsveteranen Josip Broz Tito sind eine kommunistische paramilitärische Organisation. Sie sind bekannt für ihre Unterstützung der Gleichberechtigung der fünf jugoslawischen Ethnien und ihren Widerstand gegen die Monarchie. Sie kämpfen für die südslawischen Völker, bis diese wieder frei sind."
BOL_sort_the_mess:0 "Sortieren Sie das Chaos"
BOL_sort_the_mess_desc:0 "Die Demokratie hat in Bolivien versagt. Die Politiker haben sich als unfähig erwiesen, unser Land zu führen. Daher ist die einzige Möglichkeit, das Land zu retten, die Führung des Militärs!"
BOL_military_socialism2:0 "Militärischer Sozialismus"
BOL_military_socialism2_desc:0 "Militärsozialismus ist die Bezeichnung für die Regierung von David Toro, die auf der Diktatur eines Militärführers mit Unterstützung der Syndikate basiert. Der Militärsozialismus ist auch für seine antiliberale und antidemokratische Ausrichtung bekannt und hat neben dem Militär und den Syndikaten auch Unterstützung von Marxisten und Faschisten gefunden."
BOL_military_socialism:0 "Militärischer Sozialismus"
BOL_military_socialism_desc:0 "Militärsozialismus ist die Bezeichnung für die Regierung von David Toro, die auf der Diktatur eines Militärführers mit Unterstützung der Syndikate basiert. Der Militärsozialismus ist auch für seine antiliberale und antidemokratische Ausrichtung bekannt und hat neben dem Militär und den Syndikaten auch Unterstützung von Marxisten und Faschisten gefunden."
BOL_social_constitutionalism:0 "Sozialer Konstitutionalismus"
BOL_social_constitutionalism_desc:0 "Eine Verfassung muss ihre Arbeiter und Gewerkschaften schützen. Unter David Toro wird die Verfassung reformiert, um diesem Ideal gerecht zu werden."
BOL_promote_syndicalism:0 "Fördern Sie den Syndikalismus"
BOL_promote_syndicalism_desc:0 "Die Förderung der Bildung von Gewerkschaften und die Stärkung der Arbeitnehmerrechte werden auf lange Sicht die Produktion steigern und die Unterstützung der Bevölkerung für unsere Regierung erhöhen."
BOL_the_stab_in_the_back:0 "Der Dolchstoß"
BOL_the_stab_in_the_back_desc:0 "Entweder gewinnt man die Unterstützung des Volkes oder der Oligarchie. David Toro entschied sich für Ersteres, und es scheint, als habe sich diese Entscheidung nicht ausgezahlt. Amerikanische Konzerne und die bolivianischen Oligarchien wollen Toro loswerden, aber sie hätten nichts erreichen können, wenn nicht ein General wie ein Geier das Volk dazu aufgerufen hätte, David Toros Rücktritt und seine Ernennung zum Präsidenten Boliviens zu fordern – was ihm schließlich gelang."
BOL_constitutional_reforms:0 "Verfassungsreformen"
BOL_constitutional_reforms_desc:0 "Es ist an der Zeit, die Arbeit von David Toro fortzusetzen und seine sozialistischen Reformen fortzusetzen."
BOL_banco_central:0 "Verstaatlichung der Zentralbank"
BOL_banco_central_desc:0 "Die vollständige Kontrolle über die Zentralbank wird zur Erholung unserer angeschlagenen Wirtschaft beitragen."
BOL_abolish_slavery:0 "Abschaffung der Sklaverei"
BOL_abolish_slavery_desc:0 "Obwohl theoretisch illegal, ist Sklaverei in Bolivien praktisch immer noch erlaubt. Tausende Einheimische werden gezwungen, ohne Bezahlung für die Besitzer ihres ehemaligen Landes zu arbeiten. Es ist Zeit, diesem Missbrauch ein Ende zu setzen."
BOL_begin_talks_with_paraguay:0 "Beginn der Gespräche mit Paraguay"
BOL_begin_talks_with_paraguay_desc:0 "Wenn wir auf unsere Ansprüche auf den Chaco verzichten, ist Paraguay möglicherweise bereit, uns einige Zugeständnisse zu machen, wie etwa das Recht, den Paraguay-Fluss zu befahren, was uns Zugang zum Atlantik verschaffen würde."
BOL_reclaim_the_chaco:0 "Erinnere dich an den Chaco"
BOL_reclaim_the_chaco_desc:0 "Wir dürfen die Demütigung des Chaco-Krieges nicht vergessen. Wir müssen aus unserer Niederlage lernen, um bereit zu sein, unser rechtmäßiges Territorium zurückzuerobern, wenn die Zeit gekommen ist!"
BOL_a_tale_to_remember:0 "Eine unvergessliche Geschichte"
BOL_a_tale_to_remember_desc:0 "Ob es an seinen sozialistischen Reformen lag, die die Oligarchien verärgerten, an seinen Friedensbemühungen mit Paraguay, die einige Teile des Militärs verärgerten, oder vielleicht einfach an einer versteckten Depression: Germán Busch ist tot in seinem Haus aufgetaucht, mit Blut auf seinem Schreibtisch und einem Revolver in der Hand. Dieses Mysterium wird sicherlich eine unvergessliche Geschichte sein ..."
BOL_hail_the_camba:0 "Heil der Camba"
BOL_hail_the_camba_desc:0 "Der Camba hat dem bolivianischen Volk Gerechtigkeit gebracht, indem er ihm die Rechte und das Land gab, die es verdiente. Jetzt wird er dem bolivianischen Volk Größe bringen, indem er unsere verlorenen Gebiete ein für alle Mal zurückgewinnt! \n\n §gAnmerkung des Übersetzers: Camba bedeutet „Bolivianer mit europäischen Vorfahren“.§! \n\n §RAnmerkung des Übersetzers: Keikaku bedeutet „Plan“.§!"
BOL_recover_the_chaco:0 "Den Chaco zurückholen"
BOL_recover_the_chaco_desc:0 "Jetzt, da wir bereit sind, ist es an der Zeit, den Chaco ein für alle Mal zurückzuerobern."
BOL_a_rising_eagle:0 "Ein aufsteigender Adler"
BOL_a_rising_eagle_desc:0 "Eine einst gedemütigte Nation hat nun begonnen, sich als mächtiger Adler zu erheben!"
BOL_exile_problematic_generals:0 "Verbannen Sie problematische Generäle"
BOL_exile_problematic_generals_desc:0 "Es gibt viele Generäle, die sich unserer derzeitigen Regierung widersetzen. Wir müssen uns um sie kümmern, wenn wir nicht wie 1936 einen Putsch erleben wollen."
BOL_access_to_the_atlantic:0 "Zugang zum Atlantik"
BOL_access_to_the_atlantic_desc:0 "Nachdem wir Paraguay besiegt haben, können sie uns den Zugang zum Atlantik über den Río Paraguay nicht mehr verwehren. Der Zugang zu den Meeren wird unserem Handel und unserer Wirtschaft enorm zugutekommen."
BOL_mining_nationalization:0 "Verstaatlichung des Bergbaus"
BOL_mining_nationalization_desc:0 "Die bolivianischen Ressourcen sollen zum Wohle der Bolivianer eingesetzt werden und nicht, um die Gier europäischer und amerikanischer Unternehmen zu befriedigen."
BOL_deal_with_the_oligarchy:0 "Deal mit der Oligarchie"
BOL_deal_with_the_oligarchy_desc:0 "Die einzige Möglichkeit, die Oligarchie zu zerstören, besteht darin, ihr das Einzige zu entreißen, was ihr Macht verleiht: ihr Land und ihr Geld."
BOL_ally_the_peruvians:0 "Verbünde die Peruaner"
BOL_ally_the_peruvians_desc:0 "Das letzte Mal, dass wir Peru in einem Krieg verbündet haben, war vor etwa 50 Jahren im Salpeterkrieg. Damals war unsere Armee schlecht vorbereitet, und der Krieg endete mit einer katastrophalen Niederlage. Dieses Mal ist unsere Armee auf den Sieg vorbereitet."
BOL_ally_the_argentinians:0 "Verbünde die Argentinier"
BOL_ally_the_argentinians_desc:0 "Als der Salpeterkrieg ausbrach, standen die Argentinier kurz davor, Chile den Krieg zu erklären. Doch als die Chilenen auf ihre Ansprüche auf Patagonien verzichteten, ließen sie sich beschwichtigen. Wir müssen einen Weg finden, sie zu überzeugen, sich uns anzuschließen."
BOL_divide_south_america:0 "Südamerika teilen"
BOL_divide_south_america_desc:0 "Die drei Andenstaaten werden von nun an Südamerika beherrschen. Die Grenzen werden unter unserer mächtigen Führung neu gezogen!"
BOL_the_new_bolivia:0 "Das neue Bolivien"
BOL_the_new_bolivia_desc:0 "Eine Nation, die einst für Gebietsverluste und Kriege bekannt war, ist gestorben und aus ihrer Asche ist das neue Bolivien geboren!"
BOL_a_new_beginning:0 "Ein neuer Anfang"
BOL_a_new_beginning_desc:0 "Die Armee hat Bolivien erneut im Stich gelassen, und nun gibt es keine Politiker mehr, denen sie die Schuld geben kann. Es ist Zeit für einen Neuanfang für die Demokratie in unserem Land."
BOL_restore_faith_on_politicians:0 "Das Vertrauen in die Politiker wiederherstellen"
BOL_restore_faith_on_politicians_desc:0 "Die Armee hat das bolivianische Volk davon überzeugt, dass die Ursache unserer Niederlagen die Schuld der Demokratie und der Führung des Landes sei. Wir werden ihnen die Wahrheit beibringen."
BOL_better_use_of_land:0 "Bessere Landnutzung"
BOL_better_use_of_land_desc:0 "Wir müssen das bolivianische Land besser nutzen, um die Bedürfnisse unserer Bauern und Einheimischen zu befriedigen."
BOL_industrialization_campaign:0 "Industrialisierungskampagne"
BOL_industrialization_campaign_desc:0 "Bolivien wird immer ein Sklave ausländischer Konzerne bleiben, solange unsere Industrie unterentwickelt bleibt. Wir müssen uns auf ihre Verbesserung konzentrieren, bevor es zu spät ist."
BOL_rig_the_elections:0 "Wahlmanipulation"
BOL_rig_the_elections_desc:0 "Die Oligarchien werden alles tun, um den „richtigen“ Kandidaten an die Macht zu bringen. Dieser Kandidat ist Enrique Peñarda, ein General der Armee und Mitglied der bolivianischen Concordancia."
BOL_fascist_victory:0 "Sieg der Falangisten"
BOL_fascist_victory_desc:0 "Was das bolivianische Volk braucht, ist eine starke Regierung, die ihm Gerechtigkeit und Größe bringen kann. Die Falange Socialista wird diesen Wunsch erfüllen."
BOL_public_education_reform:0 "Reform des öffentlichen Bildungswesens"
BOL_public_education_reform_desc:0 "Wir werden das öffentliche Bildungswesen reformieren. Wir werden die Neue Bolivianische Universität gründen, mit der transzendentalen Mission, Generationen darauf vorzubereiten, das Werk des Aufbaus eines großen Vaterlandes zu vollenden."
BOL_industry_nationalization:0 "Verstaatlichung der Industrie"
BOL_industry_nationalization_desc:0 "Jeder Bolivianer hat die Pflicht zu arbeiten und zu produzieren. Arbeit und Produktion müssen der gesamten Gemeinschaft zugutekommen. Wir werden Immobilität und Kapitalflucht sowie die Ausweitung der Finanzmacht der Potentaten bekämpfen und die wichtigsten Produktionsquellen schrittweise verstaatlichen."
BOL_destroy_the_oligarchies:0 "Zerstöre den Oligarchismus"
BOL_destroy_the_oligarchies_desc:0 "Der neue bolivianische Staat hat die Aufgabe, eine harmonische Kontinuität im Schicksal der vergangenen, gegenwärtigen und zukünftigen Generationen herzustellen und dabei soziale Disziplinlosigkeit auszuschließen, die durch zwei politische Faktoren repräsentiert wird: anarchische Desorganisation, die durch die Lockerung des Autoritätsprinzips hervorgerufen wird, und die Inthronisierung oligarchischer oder kaudillistischer Tyranneien."
BOL_native_land_reform:0 "Reform des indigenen Landes"
BOL_native_land_reform_desc:0 "Die Ureinwohner sind die Wurzel unserer Nationalität. Ein Agrarreformplan wird ihnen ihre wirtschaftliche Befreiung und ein Bildungsplan ihre menschliche Würde geben."
BOL_bolivian_fascism:0 "Bolivianischer Faschismus"
BOL_bolivian_fascism_desc:0 "Der bolivianische Faschismus kann sich weder mit dem deutschen noch mit dem italienischen Faschismus messen, nicht einmal mit dem iberischen Falangismus. Die sozialistische Falang ist ihre eigene Ideologie, eine Ideologie, die unserem Heimatland Wohlstand bringen wird."
BOL_organic_work:0 "Organische Arbeit"
BOL_organic_work_desc:0 "Unsere Heimat wird für alle Bolivianer sein, ohne Klassenprivilegien. Jeder Bolivianer wird sich als Teilhaber an der Aufgabe fühlen, eine Heimat zu schaffen und an der Freude und Veredelung, die sie mit sich bringt."
BOL_the_social_empire:0 "Das soziale Imperium"
BOL_the_social_empire_desc:0 "Wir werden die strengste soziale Gerechtigkeit durchsetzen und allen Kindern Boliviens moralisches und wirtschaftliches Wohlergehen sichern. Wir werden die Ausbeutung unserer Reichtumsquellen fördern, die Solidarität mit den Produktionsfaktoren fördern und diese im Sinne des kollektiven Interesses organisieren, um die Ausbeutung des Menschen durch den Menschen und den Klassenkampf unmöglich zu machen."
#BOL_reunite_the_two_brothers
BOL_reunite_the_two_brothers_desc:0 "Das Schicksal von Alto Perú und Bajo Perú muss wieder miteinander verbunden werden, nur dann wird unsere Nation Größe erreichen."
BOL_marxist_victory:0 "Marxistischer Sieg"
BOL_marxist_victory_desc:0 "Was das bolivianische Volk braucht, ist eine gefügige Regierung, die ihm Fortschritt und Wohlstand bringen kann. Die Partido de la Izquierda Revolucionaria wird diesen Wunsch erfüllen."
BOL_university_reforms:0 "Hochschulreformen"
BOL_university_reforms_desc:0 "Die Universitätsreformen werden auf der Grundlage der zahlreichen Schriften von José Antonio Arze durchgeführt."
BOL_erradicate_nazifascism:0 "Den Nazifaschismus ausrotten"
BOL_erradicate_nazifascism_desc:0 "Bolivien kann nicht länger unter der Angst vor faschistischem Terrorismus existieren. Wir werden daran arbeiten, diese abscheulichen Organisationen auszulöschen, bevor sie zu stark werden."
BOL_deal_with_the_oligarchies:0 "Deal mit den Oligarchien"
BOL_deal_with_the_oligarchies_desc:0 "Wir müssen die Oligarchien loswerden, bevor sie unseren sozialistischen Traum zerstören, wie sie es bei David Toro und höchstwahrscheinlich auch bei Germán Busch getan haben."
BOL_land_reform:0 "Bodenreform"
BOL_land_reform_desc:0 "Es wird eine Landreform durchgeführt, um die Oligarchien zu schwächen und den Ureinwohnern ihr rechtmäßiges Land zurückzugeben."
BOL_join_the_comitern:0 "Treten Sie dem Komitee bei"
BOL_join_the_comitern_desc:0 "Auch wenn wir die totalitären Tendenzen der Sowjetunion nicht unterstützen, ist dies die einzige Möglichkeit, die wir haben, um unser Volk und unsere Nation zu schützen."
BOL_safeguard_peace:0 "Den Frieden sichern"
BOL_safeguard_peace_desc:0 "Krieg ist kein Grund zum Stolz. Wir werden uns dafür einsetzen, den Frieden in Südamerika so lange wie möglich zu sichern."
BOL_a_red_velvet_glove:0 "Ein roter Samthandschuh"
BOL_a_red_velvet_glove_desc:0 "Indem wir den Aufstieg des Kommunismus in unseren Nachbarländern unterstützen, können wir die sozialistische Revolution auf friedlichere Weise durchführen, im Gegensatz zu den Sowjets, die dies taten, indem sie Krieg gegen ihre schwächsten Nachbarn führten."
#BOL_unite_the_land_of_the_inca
BOL_unite_the_land_of_the_inca_desc:0 "Peru und Bolivien sind aus demselben Reich, den Tawantinsuyo, hervorgegangen. Wir werden das Land der Inka vereinen und beiden Regionen wieder Wohlstand bringen."
BOL_supress_our_enemies:0 "Volle Kontrolle erlangen"
BOL_supress_our_enemies_desc:0 "Wir dürfen nicht zulassen, dass Faschisten, Kommunisten, Liberale oder mögliche Verräter unter den Mitgliedern der Concordancia die Stabilität unserer Regierung zerstören. Wir müssen diese Kräfte unterdrücken, bevor es zu spät ist."
BOL_strike_breaking:0 "Streikbruch"
BOL_strike_breaking_desc:0 "Die Menschen fordern immer bessere Arbeitsbedingungen und begründen dies mit der sich verschlechternden Wirtschaftslage des Landes. Doch sie verstehen nicht, dass sich die wirtschaftliche Lage des Landes umso mehr verschlechtert, je mehr sie streiken. Die Armee wird sie in die Schranken weisen, bis die richtigen Bedingungen geschaffen sind."
BOL_trade_deals_with_the_usa:0 "Handelsabkommen mit den USA"
BOL_trade_deals_with_the_usa_desc:0 "Indem wir die USA durch faire Handelsabkommen im Zusammenhang mit unserem Wolframabbau näher an uns heranführen, können wir ihr Vertrauen gewinnen und in Zukunft vielleicht eine Gegenleistung erhalten."
BOL_american_military_mission:0 "Amerikanische Militärmission"
BOL_american_military_mission_desc:0 "Nachdem wir nun das Vertrauen der Amerikaner gewonnen haben, sind sie möglicherweise bereit, uns eine Militärmission zu übertragen, um die Fähigkeiten unserer Armee zu verbessern."
BOL_join_the_allies:0 "Schließen Sie sich den Verbündeten an"
BOL_join_the_allies_desc:0 "Es ist Zeit, sich dem Kampf der Amerikaner und ihrer Verbündeten für eine Welt ohne Totalitarismus anzuschließen!"
BOL_overthrow_the_oligarchies:0 "Stürzt die Oligarchien"
BOL_overthrow_the_oligarchies_desc:0 "Die Oligarchien haben das bolivianische Volk jahrzehntelang misshandelt, doch die Regierung von Enrique Peñarda war der Tropfen, der das Fass zum Überlaufen brachte. Die Armee wird erneut die Kontrolle über das Land übernehmen, um es von diesen Plagen zu säubern."
BOL_foreign_planes:0 "Ausländische Flugzeuge"
BOL_foreign_planes_Desc:0 "Der Erwerb von Flugzeugen unserer Verbündeten wird uns dabei helfen, unser Land besser verteidigen zu können."
BOL_collaborate_with_the_standard_oil_company:0 "Zusammenarbeit mit der Standard Oil Company"
BOL_collaborate_with_the_standard_oil_company_desc:0 "Nachdem wir uns nun mit den Amerikanern verbündet haben, können wir möglicherweise einen fairen Deal mit den amerikanischen Ölkonzernen aushandeln, um unsere Förderrate zu verbessern."
BOL_american_railbuilding:0 "Amerikanischer Eisenbahnbau"
BOL_american_railbuilding_desc:0 "Eine bessere Infrastruktur wäre für unser Land eine große Hilfe und es gibt sicherlich ein Land, das daran interessiert ist, uns dabei zu helfen."
BOL_native_representation:0 "Erster Kongress der Eingeborenen"
BOL_native_representation_desc:0 "Die Ureinwohner Boliviens wurden von den Oligarchien ständig misshandelt. Es ist Zeit für Reformen, damit so etwas nie wieder passiert."
BOL_land_redistribution:0 "Landumverteilung"
BOL_land_redistribution_desc:0 "Es wird eine Landreform durchgeführt, um die Oligarchien zu schwächen und den Ureinwohnern ihr rechtmäßiges Land zurückzugeben."
BOL_join_the_axis:0 "Treten Sie der Achse bei"
BOL_join_the_axis_desc:0 "Wir dürfen nicht zulassen, dass unser Land erneut von amerikanischen Konzernen und bolivianischen Großgrundbesitzern versklavt wird. Wir müssen Verbündete finden, die uns in unserem Kampf unterstützen."
BOL_la_paz_counter_coup:0 "Gegenputsch in La Paz"
BOL_la_paz_counter_coup_desc:0 "Die Bolivianer haben immer wieder bewiesen, dass sie nicht in der Lage sind, eine Nation zu führen. Die deutsche Militärmission hat sich bereit erklärt, die Kontrolle über das Land zu übernehmen, bis sich die Lage stabilisiert hat oder bis eine sichere Rückkehr nach Deutschland möglich ist."
BOL_purge_the_military:0 "Säuberung des Militärs"
BOL_purge_the_military_desc:0 "Es gibt viele Generäle und Offiziere, die für unser derzeitiges Regime ein Problem darstellen könnten. Wir werden dafür sorgen, dass sie ihm keinen Schaden zufügen können."
BOL_prussian_ethos:0 "Preußisches Ethos"
BOL_prussian_ethos_desc:0 "Wir werden die Militärbürokratie und die Ausbildung reformieren, die Uniformen werden so verändert, dass sie den deutschen ähneln, und bei allen Militärparaden wird der Stechschritt eingeführt."
BOL_a_german_government:0 "Eine deutsche Regierung"
BOL_a_german_government_desc:0 "Die einstige Übergangsregierung ist zum neuen Status Quo in Bolivien geworden. Deutsche Minister wurden ernannt, und alle hohen Militärposten sind mit Deutschen besetzt. Eine neue Ära des Wohlstands soll in Bolivars Land beginnen."
BOL_suppress_the_natives:0 "Unterdrückt die Eingeborenen"
BOL_suppress_the_natives_desc:0 "Viele Menschen sind gegen unsere derzeitige Regierung, wobei die Einheimischen derzeit das größte Problem darstellen. Sie plündern weiterhin unsere Vorräte und greifen unsere Garnisonen und unsere Bevölkerung an. Deshalb werden sie als das behandelt, was sie sind: Terroristen."
BOL_warlords_of_la_paz:0 "Kriegsherren von La Paz"
BOL_warlords_of_la_paz_desc:0 "Das ehemalige Bolivien ist heute in verschiedene Warlord-Staaten zerfallen, die heute größtenteils von deutschen Generälen und Offizieren kontrolliert werden. Trotz der Spaltung Boliviens weiß jeder der Warlord-Staaten, dass sie durch Zusammenarbeit und Zusammenhalt bessere Chancen gegen jeden haben, der sich für eine Invasion des ehemaligen Bolivarischen Staates entscheidet."
BOL_high_command_reforms:0 "Reformen des Oberkommandos"
BOL_high_command_reforms_desc:0 "Ein autonomeres Oberkommando wird unserer Armee zu mehr Flexibilität verhelfen und ihre Angriffsoperationen beschleunigen."
BOL_invite_german_immigrants:0 "Deutsche Einwanderer einladen"
BOL_invite_german_immigrants_desc:0 "Viele Deutsche müssen aufgrund der neuen Ideologie, die das Land beherrscht, aus ihrer alten Heimat fliehen. Sie werden eingeladen, nach Bolivien zu kommen, wo sie eine neue Heimat finden können."
BOL_the_shore_dilema:0 "Das Shore-Dilemma"
BOL_the_shore_dilema_desc:0 "Solange wir keine Küste haben, sind wir schwächer als unsere Nachbarländer. Wir brauchen Zugang zum Meer, aber die Frage ist: Wie?"
BOL_a_german_vassal:0 "Ein deutscher Vasall"
BOL_a_german_vassal_desc:0 "Nach der Wiederherstellung der Monarchie in Deutschland gibt es keinen Grund, nicht mit diesem neuen Regime zusammenzuarbeiten. Die Zusammenarbeit unserer Nationen wird uns nur Größe bringen!"
BOL_the_new_statthalter:0 "Der neue Statthalter"
BOL_the_new_statthalter_desc:0 "Nachdem die deutsche Herrschaft nun die vollständige Kontrolle über die Region übernommen hat, ist es an der Zeit, den neuen Anführer der kaiserlichen Kolonie zu wählen."
BOL_expand_the_colonial_possessions:0 "Erweitern Sie den Kolonialbesitz"
BOL_expand_the_colonial_possessions_desc:0 "Es gibt viele Regionen Südamerikas, die reich an Ressourcen sind, aber nicht stark genug, um eine deutsche Invasion abzuwehren …"
BOL_free_berlin:0 "Freies Berlin"
BOL_free_berlin_desc:0 "Das Vaterland hat die Herrschaft des Kaisers verraten. Es wird ein großer Kampf sein, aber wir müssen daran arbeiten, es von seinen derzeitigen Unterdrückern zu befreien."
BOL_rebuild_germany:0 "Deutschland wieder aufbauen"
BOL_rebuild_germany_desc:0 "Wir alle müssen daran arbeiten, unser Zuhause wieder aufzubauen und unsere Differenzen für ein höheres Ziel beiseite legen."
BOL_thousand_years_kaiserreich:0 "Tausend Jahre Kaiserreich"
BOL_thousand_years_kaiserreich_desc:0 "Jetzt, da unser Heimatland wiederhergestellt ist, wird es tausend Jahre lang strahlen, tausend Jahre der Freiheit und Größe!"
BOL_claim_bolivars_legacy:0 "Beanspruchen Sie Bolivars Erbe"
BOL_claim_bolivars_legacy_desc:0 "Es war einmal ein venezolanischer Caudillo, der von einem vereinten Südamerika träumte. Bolivien ist nach ihm, Simón Bolívar, benannt, und sein Traum ist die richtige Rechtfertigung für die Sicherung unserer Grenzen und unserer Freiheit …"
BOL_march_north:0 "März Nord"
BOL_march_north_desc:0 "Wir werden uns erneut mit den Regionen Nueva Granada und Alto Peru vereinigen, sei es durch Vernunft oder Gewalt."
BOL_unite_southamerica:0 "Vereint Südamerika"
BOL_unite_southamerica_desc:0 "Die Nationen des Südkegels müssen sich mit der Bolivarischen Republik vereinen, nur dann werden wir stark genug sein, um die Feinde Amerikas zu bekämpfen ..."
BOL_revoke_standard_oil_rights:0 "Widerrufen Sie die Standard-Ölrechte"
BOL_revoke_standard_oil_rights_desc:0 "Der Entzug der Förderrechte der Standard Oil Company wird zur Erholung unserer Wirtschaft beitragen, die Amerikaner sicherlich verärgern, aber ihre Meinung ist derzeit nicht wichtig."
BOL_gold_extraction:0 "Goldgewinnung"
BOL_gold_extraction_desc:0 "Da Gold eines der wertvollsten Mineralien der Welt ist, wird die Goldgewinnung sicherlich zur Erholung unserer Wirtschaft beitragen."
BOL_tin_extraction:0 "Zinngewinnung"
BOL_tin_extraction_desc:0 "Die Zinngewinnung wird zur Erholung unserer Wirtschaft beitragen und die Rüstungsindustrie unseres Landes verbessern."
BOL_rubber_extraction:0 "Kautschukgewinnung"
BOL_rubber_extraction_desc:0 "Die Kautschukgewinnung wird zur Erholung unserer Wirtschaft beitragen und die Rüstungsindustrie unseres Landes verbessern."
BOL_promote_factory_development:0 "Fabrikentwicklung fördern"
BOL_promote_factory_development_desc:0 "Wir müssen die Schaffung neuer Industrien fördern, um die Abhängigkeit unseres Landes von Agrar- und Mineralienexporten zu beenden."
BOL_reopen_universities:0 "Wiedereröffnung der Universitäten"
BOL_reopen_universities_desc:0 "Die Wiedereröffnung geschlossener Universitäten wird unsere Forschungskapazitäten langfristig stärken."
BOL_exiled_intellectuals:0 "Exilierte Intellektuelle"
BOL_exiled_intellectuals_desc:0 "Viele bolivianische Intellektuelle und Politiker wurden in den letzten Jahren ins Exil geschickt. Die Rückholung der weniger problematischen Personen wird unserer Entwicklung sicherlich zugutekommen."
BOL_follow_our_neightbours_example:0 "Folgen Sie dem Beispiel unserer Nachbarn"
BOL_follow_our_neightbours_example_desc:0 "„Industrialisierung durch Importsubstitution“ ist ein Wirtschaftsmodell, das in Lateinamerika nach dem Ersten Weltkrieg eingeführt wurde. Es zielte darauf ab, den Import ausländischer Produkte zu stoppen und den Konsum einheimischer Güter zu fördern. Wir sollten diesem Wirtschaftsmodell folgen."
BOL_promote_exports:0 "Exporte fördern"
BOL_promote_exports_desc:0 "Wir verfügen nicht über die Ressourcen, um genügend Industrie aufzubauen, um unsere Abhängigkeit vom Export zu beenden. Wir sollten unser derzeitiges Wirtschaftsmodell beibehalten."
BOL_regulate_the_mining_sector:0 "Regulierung des Bergbausektors"
BOL_regulate_the_mining_sector_decs:0 "Durch die Regulierung des Bergbausektors wird der Missbrauch durch ausländische Unternehmen gestoppt und die Wirtschaft unseres Landes gefördert."
BOL_local_arm_production:0 "Lokale Waffenproduktion"
BOL_local_arm_production_desc:0 "Wenn wir völlig frei von ausländischem Missbrauch sein wollen, müssen wir in der Lage sein, unsere eigenen Waffen zu bauen."
BOL_free_trade_deals:0 "Freihandelsabkommen"
BOL_free_trade_deals_desc:0 "Der Abschluss von Freihandelsabkommen mit anderen Ländern wird uns dabei helfen, die Erholung unserer Wirtschaft zu erreichen."
BOL_promote_foreign_investiment:0 "Förderung ausländischer Investitionen"
BOL_promote_foreign_investiment_desc:0 "Wir werden Chile nicht allein industrialisieren können, aber glücklicherweise gibt es viele Nationen, die bereit sind, uns bei der Verwirklichung dieses Traums zu helfen."
BOL_form_the_miner_bank:0 "Bilden Sie die Miner Bank"
BOL_form_the_miner_bank_desc:0 "Die Banco Minero de Bolivia ist eine autarke staatliche Einrichtung mit Rechtspersönlichkeit auf unbestimmte Dauer. Sie unterliegt den gesetzlichen Bestimmungen ihrer Gründung, diesem Dekret, dem Allgemeinen Bankengesetz, ihren Statuten und Verordnungen sowie weiteren geltenden ergänzenden Bestimmungen."
BOL_chaco_resource_extraction:0 "Chaco-Ressourcengewinnung"
BOL_chaco_resource_extraction_desc:0 "Wir sollten die wenigen Ressourcen nutzen, die uns im Chaco zur Verfügung stehen."
BOL_chaco_oil_extraction:0 "Chaco-Öl-Extraktion"
BOL_chaco_oil_extraction_desc:0 "Auch wenn es im Chaco nicht viel Öl gibt, sollten wir daran arbeiten, es zu fördern. Das wird sicherlich hilfreich sein."
BOL_open_arm_factories:0 "Open Arm Fabriken"
BOL_open_arm_factories_desc:0 "Die Eröffnung von Waffenfabriken wird zum Ausbau unserer Armee und damit zur Verteidigung unserer Nation beitragen."
BOL_nationalize_the_YPFB:0 "Verstaatlichung der YPFB"
BOL_nationalize_the_YPFB_desc:0 "Yacimientos Petrolíferos Fiscales Bolivianos (Bolivianische Ölfelder) ist ein bolivianisches Staatsunternehmen, das sich der Exploration, Ausbeutung, Raffination, Industrialisierung, Verteilung und Kommerzialisierung von Öl widmet."
BOL_the_humillated_army:0 "Die gedemütigte Armee"
BOL_the_humillated_army_desc:0 "Unsere Armee wurde in allen Kriegen, die sie geführt hat, besiegt. Wir wurden im Krieg gegen die Peru-Bolivianische Konföderation von 1836 besiegt, im Salpeterkrieg von 1879, im Acre-Krieg von 1899, im Chaco-Krieg von 1935 und sogar unser Unabhängigkeitskrieg ging verloren. Unsere Unabhängigkeit erlangten wir erst, als die chilenischen, argentinischen und großkolumbianischen Armeen unser Vaterland befreiten. Von nun an wird dies nur noch eine ferne Erinnerung sein."
BOL_kick_the_germans_out:0 "Werft die Deutschen raus"
BOL_kick_the_germans_out_desc:0 "Die deutsche Militärmission hat sich für die Kriegsbedroher in Südamerika als nutzlos erwiesen. Sie sollen nun nach Deutschland zurückkehren."
BOL_invite_german_officers:0 "Die zweite Militärmission"
BOL_invite_german_officers_desc:0 "Die Niederlage unserer Armee im Chaco-Krieg lag nicht an der Hans-Kundt-Doktrin, wie uns unser Offizierskorps weismachen wollte, sondern an der Inkompetenz einiger Offiziere sowie an der mangelhaften Ausrüstung und Vorbereitung unserer Streitkräfte. Daher sollten wir die deutsche Militärmission ausweiten, um die Leistungsfähigkeit unserer Armee zu verbessern."
BOL_military_research:0 "Militärische Forschung"
BOL_military_research_desc:0 "Wir müssen mehr Wissenschaftler für die Waffenentwicklung einstellen und so unsere Chancen gegenüber anderen Ländern deutlich erhöhen."
BOL_extensive_army_training:0 "Umfangreiche Armeeausbildung"
BOL_extensive_army_training_desc:0 "Unsere Armee muss darauf vorbereitet sein, in jedem Gebiet Südamerikas zu kämpfen, sei es im Chaco, im Amazonasgebiet, in den Anden oder in der Atacama."
BOL_expand_native_conscription:0 "Ausweitung der Wehrpflicht für Eingeborene"
BOL_expand_native_conscription_desc:0 "Wir sollten die Wehrpflicht unter Einheimischen ausweiten, um die Größe unserer Armee zu erhöhen."
BOL_andes_training_facility:0 "Anden-Trainingsanlage"
BOL_andes_training_facility_desc:0 "Wir sollten darauf vorbereitet sein, in den kalten Bergen der Anden zu kämpfen, damit wir uns gegen eine Invasion Chiles oder Perus verteidigen können."
BOL_chaco_training_facility:0 "Chaco-Trainingsanlage"
BOL_chaco_training_facility_desc:0 "Wir sollten darauf vorbereitet sein, in den Trockenwäldern des Chaco zu kämpfen, damit wir uns gegen eine Invasion Paraguays oder Brasiliens verteidigen können."
BOL_follow_the_american_doctrine:0 "Folgen Sie der amerikanischen Doktrin"
BOL_follow_the_american_doctrine_desc:0 "Wenn wir der amerikanischen Doktrin folgen, werden wir in jeder Schlacht weniger Menschenleben verlieren und unsere Offensiven erfolgreicher gestalten können."
BOL_follow_the_new_german_doctrine:0 "Folgen Sie der neuen deutschen Lehre"
BOL_follow_the_new_german_doctrine_desc:0 "Wenn wir der neuen deutschen Doktrin folgen, können wir Schlachten schneller gewinnen und auch feindliches Gebiet schneller besetzen."
BOL_follow_the_old_german_doctrine:0 "Folgen Sie der alten deutschen Lehre"
BOL_follow_the_old_german_doctrine_desc:0 "Wenn wir der alten deutschen Doktrin folgen, können wir unsere Grenzen besser vor feindlichen Angriffen schützen und in jeder Schlacht weniger Menschenleben verlieren."
BOL_follow_a_bolivian_doctrine:0 "Folgen Sie einer bolivianischen Doktrin"
BOL_follow_a_bolivian_doctrine_desc:0 "Wenn wir einer neuen bolivianischen Doktrin folgen, könnten wir besser verstehen, wie sie auf südamerikanischem Terrain funktionieren würde, und wir könnten auch mehr Unterstützung von unserer Bevölkerung bei der Entscheidungsfindung erhalten."
BOL_tank_development:0 "Panzerentwicklung"
BOL_tank_development_desc:0 "Die Panzer haben sich als entscheidender Bestandteil der modernen Kriegsführung erwiesen, wir müssen jetzt mit ihrer Produktion beginnen."
BOL_artillery_development:0 "Artillerieentwicklung"
BOL_artillery_development_desc:0 "Wir werden unsere Unterstützungswaffen verbessern, um bei den Armeen unserer Feinde Ehrfurcht hervorzurufen."
BOL_trench_building:0 "Grabenbau"
BOL_trench_building_desc:0 "Jede Armee muss über ein Pionierkorps verfügen, das Schützengräben und Befestigungen baut, um unser Land besser verteidigen zu können."
BOL_biased_education:0 "Voreingenommene Bildung"
BOL_biased_education_desc:0 "Unsere Kinder werden nie vergessen dürfen, wie Chile uns 1884 unsere Küsten stahl und wie Paraguay 1935 den Chaco stahl. Der bolivianische Irredentismus wird unsere Armeen antreiben."
BOL_modernize_our_equipment:0 "Modernisierung unserer Ausrüstung"
BOL_modernize_our_equipment_desc:0 "Durch die Modernisierung unserer Waffen werden die Fähigkeiten unserer Armee verbessert."
BOL_rebirth_of_a_navy:0 "Geburt einer Marine"
BOL_rebirth_of_a_navy_desc:0 "Als wir nach dem Salpeterkrieg unsere Küste verloren, existierte unsere Marine praktisch nicht mehr. Wir werden diesen Fehler nicht noch einmal begehen. Dieses Mal werden wir eine Marine aufbauen, die Chilenen, Argentinier und Brasilianer in Erstaunen versetzen wird."
BOL_expand_our_airforce:0 "Erweitern Sie unsere Luftwaffe"
BOL_expand_our_airforce_desc:0 "Flugzeuge sind in der modernen Kriegsführung genauso wichtig wie jeder andere Teil der Armee. Wir müssen jetzt mit ihrem Ausbau beginnen, wenn wir in diesen schwierigen Zeiten kampffähig sein wollen."
BOL_investigation_effort:0 "Untersuchungsaufwand"
BOL_investigation_effort_desc:0 "Nachdem wir nun unsere Kontrolle über eine Küste festigen konnten, ist es an der Zeit, mit der Erforschung der neuesten Marinemodelle zu beginnen."
BOL_european_contracts:0 "Europäische Verträge"
BOL_european_contracts_desc:0 "Wir müssen anfangen, neue Marineaufträge zu erhalten, damit wir irgendwann mit dem Bau unserer eigenen Schiffe beginnen können."
BOL_bolivian_dockyards:0 "Bolivianische Werften"
BOL_bolivian_dockyards_desc:0 "Nachdem wir nun unsere ersten Werften gebaut haben, können wir endlich eine Marinepräsenz im Atlantik aufbauen!"
BOL_foreign_naval_trainers:0 "Ausländische Marinetrainer"
BOL_foreign_naval_trainers_desc:0 "Wir werden europäische Admirale zur Ausbildung unserer Matrosen und Kapitäne mitbringen, schließlich ist es schwierig, ohne Hilfe etwas völlig Neues zu lernen."
BOL_air_support:0 "Luftunterstützung"
BOL_air_support_desc:0 "Die Fähigkeit, unsere Feinde aus der Luft zu bombardieren, würde unsere Kriegsanstrengungen erheblich unterstützen. Wir müssen jetzt mit der Erforschung der Luftunterstützung beginnen."
BOL_air_superiority:0 "Luftüberlegenheit"
BOL_air_superiority_desc:0 "Die Fähigkeit, unsere Feinde aus der Luft in Angst und Schrecken zu versetzen, würde uns bei unseren Kriegsanstrengungen enorm helfen. Wir müssen jetzt mit der Erforschung von Kampfflugzeugen beginnen."
BOL_air_base_building:0 "Gebäude des Luftwaffenstützpunkts"
BOL_air_base_building_desc:0 "Flugzeuge können nirgendwo landen, wir müssen jetzt mit dem Bau von Flughäfen beginnen!"
BOL_learn_from_europe:0 "Von Europa lernen"
BOL_learn_from_europe_desc:0 "Um die Leistungsfähigkeit unserer Luftwaffe zu steigern, sollten wir die deutschen und britischen Luftdoktrinen nachahmen."
BOL_prepare_for_the_struggle:0 "Bereite dich auf den Kampf vor"
BOL_prepare_for_the_struggle_desc:0 "Wir werden mit den Vorbereitungen zur Rückeroberung unserer alten Gebiete beginnen. Antofagasta und der Chaco werden wieder uns gehören!"
BOL_recover_bolivias_pride:0 "Boliviens Stolz wiederherstellen"
BOL_recover_bolivias_pride_desc:0 "Unsere Nation wurde seit ihrer Unabhängigkeit ständig gedemütigt, und zwar nicht nur durch verlorene Kriege gegen unsere Nachbarn. Doch jetzt werden wir diese jahrzehntelange Demütigung rächen!"
BOL_reclaim_antofagasta:0 "Erobern Sie Antofagasta zurück"
BOL_reclaim_antofagasta_desc:0 "Nachdem wir nun aus unseren Fehlern der Vergangenheit gelernt haben, werden wir die Küste zurückerobern, die uns die Chilenen im Salpeterkrieg geraubt haben!"
BOL_assimilate_the_northern_chileans:0 "Die Nordchilenen assimilieren"
BOL_assimilate_the_northern_chileans_desc:0 "Wir werden eine Assimilationskampagne in Nordchile starten, damit sie nie wieder daran denken, sich Santiago anzuschließen."
BOL_reclaim_the_chaco2:0 "Erobern Sie den Chaco zurück"
BOL_reclaim_the_chaco2_desc:0 "Nachdem wir nun aus unseren Fehlern der Vergangenheit gelernt haben, werden wir unsere östlichen Gebiete zurückerobern, die uns die Paraguayer im Chaco-Krieg geraubt haben!"
BOL_reclaim_the_bolivian_amazone:0 "Die Rückeroberung des bolivianischen Amazonasgebiets"
BOL_reclaim_the_bolivian_amazone_desc:0 "Wir haben im Laufe der Jahrzehnte einen großen Teil unseres Dschungels an Brasilien verloren. Es ist Zeit, ihn zurückzugewinnen."
CZE_a_west_slavic_union:0 "Westslawische Union"
CZE_a_west_slavic_union_desc:0 "Die Westslawen wurden von den Deutschen und Russen ständig misshandelt. Ihr Territorium wurde durch Eroberungen aufgeteilt oder von rücksichtslosen Gouverneuren assimiliert. Es ist Zeit für Tschechen, Slowaken und Polen, ihre Kräfte gegen die Kriegstreiber aus Moskau und Berlin zu vereinen."
CZE_export_the_revolution:0 "Exportieren Sie die Revolution"
CZE_export_the_revolution_desc:0 "Wir müssen daran arbeiten, die Arbeiter in ganz Osteuropa von den Fesseln des Kapitalismus zu befreien!"
CZE_appeasement:0 "Beschwichtigung"
CZE_appeasement_desc:0 "Wir sind nicht in der Lage, gegen alle zu kämpfen, die Anspruch auf unser Territorium erheben. Die Polen wollen Zaolzie befreien, die Ungarn wollen die Südslowakei zurückerobern, die Deutschen und Österreicher wollen das Sudetenland, und ukrainische Guerillas kämpfen für die Unabhängigkeit Rutheniens. Wir müssen versuchen, diese Nationen so weit wie möglich zu beschwichtigen."
CZE_placate_the_hungarians:0 "Beschwichtigen Sie die Ungarn"
CZE_placate_the_hungarians_desc:0 "Die Rückgabe der von Ungarn mehrheitlich bewohnten Regionen in der Südslowakei könnte [HUN.GetLeader] auf unsere Seite bringen."
CZE_reconcile_with_the_austrians:0 "Versöhnung mit den Österreichern"
CZE_reconcile_with_the_austrians_desc:0 "Wir und die Österreicher mögen viele Differenzen haben, aber in einem sind wir uns einig: Wir dürfen unsere Unabhängigkeit gegenüber Deutschland nicht verlieren. Wir müssen [AUS.GetLeader] dazu drängen, einen Verteidigungspakt mit uns zu schließen, um mehr Möglichkeiten gegen Berlin zu haben."
CZE_contact_warsaw:0 "Kontakt Warschau"
CZE_contact_warsaw_desc:0 "Wir und die Polen mögen viele Meinungsverschiedenheiten haben, aber in einem sind wir uns einig: Wir dürfen unsere Unabhängigkeit gegenüber Deutschland nicht verlieren. Wir müssen [POL.GetLeader] dazu drängen, einen Verteidigungspakt mit uns zu schließen, um mehr Möglichkeiten gegen Berlin zu haben."
CZE_join_oil_exploitation_company:0 "Gemeinsame Ölförderungsgesellschaft"
CZE_join_oil_exploitation_company_desc:0 "Mit der Aussicht auf mögliche Ölfelder auf unserem Territorium haben wir die Aufmerksamkeit des Auslands auf uns gezogen. Befreundete Mächte sind bestrebt, unsere Ölindustrie mit ihrem technischen Know-how zu unterstützen, und dies wäre eine lukrative Gelegenheit, von ihren Fortschritten zu lernen."
CZE_replace_the_defeatist_government:0 "Ersetzen Sie die defätistische Regierung"
CZE_replace_the_defeatist_government_desc:0 "Edvard Beneš hat den Tschechoslowaken gezeigt, dass er nicht bereit ist, gegen die Deutschen um das Sudetenland zu kämpfen. Diese defätistische Regierung muss zum Rücktritt gezwungen werden, für die Unabhängigkeit der Tschechoslowakei!"
CZE_revive_the_monarchist_sentiment:0 "Beleben Sie das monarchistische Gefühl wieder"
CZE_revive_the_monarchist_sentiment_desc:0 "Das tschechoslowakische Volk braucht eine einigende Persönlichkeit, die es gegen die Feinde der Nation führt. Ein Monarch ist der einzige, der dazu in der Lage ist."
CZE_a_king_for_his_people:0 "Der König und sein Volk"
CZE_a_king_for_his_people_desc:0 "Sowohl Maximilian Lobkowicz als auch Vladimir Romanov kandidieren für den tschechoslowakischen Thron. Wer der neue König wird, entscheidet sich heute."
CZE_deter_the_germans:0 "Die Deutschen abschrecken"
CZE_deter_the_germans_desc:0 "Wir sollten die Führung beim Schutz Osteuropas vor den Deutschen und Russen übernehmen und akzeptieren, dass die Briten und Franzosen dies nicht für uns tun werden."
CZE_the_second_front:0 "Die zweite Front"
CZE_the_second_front_desc:0 "Wenn die Front fällt, geht der Kampf weiter. Jeder Tschechoslowake erhält eine Milizgrundausbildung, damit er den Kampf in unseren Wäldern und Hügeln fortsetzen kann, wenn er dazu in der Lage ist."
CZE_lobkowiczs_speech:0 "Lobkowiczs Rede"
CZE_lobkowiczs_speech_desc:0 "Wir haben noch immer eine Heimat, Bürger. Ich erwarte nicht von euch, dass ihr sie verteidigt, denn ich kann euch nicht zwingen, für euer Land zu sterben. Aber ich weiß, dass alle Männer, Frauen und Kinder der Tschechoslowakei ruhig schlafen werden, da sie wissen, dass jeder tschechische Soldat den Angreifern aus Ost und West die Stirn bieten wird. Ob ihr schlafen oder kämpfen wollt, bleibt euch überlassen, aber ich versichere euch, ich werde bis zum Ende Letzterer sein."
CZE_gather_white_exiles:0 "Sammle weiße Verbannte"
CZE_gather_white_exiles_desc:0 "Viele weiße Veteranen des russischen Bürgerkriegs leben verstreut in ganz Europa und wünschen sich, ihre ehemalige Heimat vom Kommunismus befreit zu erleben. Wir werden diese Generäle kontaktieren, damit sie erneut gegen den Kommunismus kämpfen können."
CZE_bulwark_against_bolshevism:0 "Bollwerk gegen den Bolschewismus"
CZE_bulwark_against_bolshevism_desc:0 "Wir werden zur Festung Europas gegen den Bolschewismus und schützen jeden Menschen vor den Schrecken Stalins und Lenins!"
CZE_destroy_lenins_dream:0 "Zerstöre Lenins Traum"
CZE_destroy_lenins_dream_desc:0 "Der Tag ist gekommen, den Kommunismus aus Europa zu vertreiben. Den Tschechoslowaken gelang es hunderte Male, die Sowjets in Sibirien zu besiegen, und nun ist es an der Zeit, es erneut zu tun."
CZE_they_shall_not_pass:0 "Sie werden nicht durchkommen"
CZE_they_shall_not_pass_desc:0 "Weder Deutsche noch Kommunisten werden in der Lage sein, Prag zu erobern, nicht weil ihre Armeen nicht in der Lage wären, unsere Befestigungen zu durchbrechen, sondern weil sie ständig vor unseren Offensiven fliehen würden."
CZE_zapadoslavian_dream:0 "Zapadoslawischer Traum"
CZE_zapadoslavian_dream_desc:0 "Die Westslawen wurden von Deutschen und Russen ständig misshandelt. Ihr Territorium wurde durch Eroberungen aufgeteilt oder von rücksichtslosen Gouverneuren assimiliert. Es ist Zeit für Tschechen, Slowaken und Polen, ihre Kräfte gegen die Kriegstreiber aus Moskau und Berlin zu vereinen."
CZE_germanophobia:0 "Deutschfeindlichkeit"
CZE_germanophobia_desc:0 "Die Deutschen blicken mit sabbernder Schnauze auf das Sudetenland und wünschen uns, dass wir jeden Fehler begehen, um es zu erobern. Dieses Vergnügen werden wir ihnen nicht gönnen."
CZE_anti_communism:0 "Antikommunismus"
CZE_anti_communism_desc:0 "Eines haben wir mit den Deutschen gemeinsam: unsere Opposition gegen den Kommunismus. Es mag unangenehm sein, aber wir müssen daran arbeiten, sie zu verbünden, um die Marxisten Europas zu bekämpfen."
CZE_press_the_rome_protocol:0 "Treten Sie den Römischen Protokollen bei"
CZE_press_the_rome_protocol_desc:0 "Angesichts des anhaltenden deutschen Revisionismus müssen wir uns den Römischen Protokollen anschließen, die 1934 von den Staaten Italien, Österreich und Ungarn ausgearbeitet und unterzeichnet wurden. Die Abkommen dienen dazu, die deutsche Bedrohung weiter zu isolieren und sie zu besiegen."
CZE_focus_on_the_greater_devil:0 "Konzentrieren Sie sich auf den größten Teufel"
CZE_focus_on_the_greater_devil_desc:0 "Wir müssen ein Bündnis mit Deutschland formalisieren. Lieber tot als rot."
CZE_press_for_allied_support:0 "Drängen Sie auf die Unterstützung der Alliierten"
CZE_press_for_allied_support_desc:0 "Die Verbündeten haben uns Unterstützung zugesagt, aber bisher nichts unternommen, um dieses Versprechen einzulösen. Wir werden sie so stark wie möglich drängen."
CZE_negotiate_soviet_support:0 "Verhandeln Sie über sowjetische Unterstützung"
CZE_negotiate_soviet_support_desc:0 "Die Sowjets haben ihre Bereitschaft gezeigt, uns im Falle eines Krieges gegen Deutschland zu unterstützen. Solange sie jedoch keine gemeinsame Grenze mit uns haben, ist dies unwahrscheinlich. Wir sollten versuchen, sie davon zu überzeugen, unsere Unabhängigkeit zu garantieren."
ROM_purge_the_iron_guard:0 "Säubere die Eiserne Garde"
ROM_purge_the_iron_guard_desc:0 "Die Front der Nationalen Erneuerung ist eine rumänische politische Partei, die von König Karl II. als letzter von mehreren Versuchen gegründet wurde, der Popularität der faschistischen und antisemitischen Eisernen Garde entgegenzuwirken, deren Aktivitäten nun ein Ende finden sollen. Nachdem König Karl II. seine Position als Staatschef Rumäniens gefestigt hat, haben Säuberungen gegen mutmaßliche Mitglieder der Eisernen Garde begonnen, und es ist nur eine Frage der Zeit, bis die FRN die einzige Partei im Land ist."
BRA_subordinate_the_state_polices:0 "Untergeordnete staatliche Polizeikräfte"
BRA_subordinate_the_state_polices_desc:0 "Wir müssen die Macht der Bundesstaaten einschränken, um einen weiteren Bürgerkrieg wie den von 1932 zu verhindern. Die Beschlagnahmung der Waffen der Staatspolizei wird uns dabei helfen, dieses Ziel zu erreichen. Denn welche Polizei braucht schon Panzerwagen, Artillerie und Kampfflugzeuge?"
BRA_persecute_the_communists:0 "Verfolgt die Kommunisten"
BRA_persecute_the_communists_desc:0 "Die Kommunisten stellen eine Gefahr für die Sicherheit Brasiliens dar. Sie werden ins Gefängnis geworfen, bis sie diese schreckliche Ideologie aufgeben."
BRA_plan_cohen:0 "Plan Cohen"
BRA_plan_cohen_desc:0 "Wir dürfen nicht zulassen, dass Brasilien erneut in die Instabilität gerät. Wir müssen den Kongress davon überzeugen, dass die Gefahr eines weiteren kommunistischen Putsches wie 1936 besteht."
BRA_estado_novo:0 "Estado Novo"
BRA_estado_novo_desc:0 "Die Opposition gegen Vargas wurde entweder verhaftet oder ins Exil geschickt, die Verfassung von 1934 wurde umgeschrieben, um dem Präsidenten die gesamte Macht über die Nation zu übertragen, und in einer 30-minütigen Radioansprache rief Getúlio Vargas den korporativistischen Estado Novo aus, der von seinem portugiesischen Gegenstück und den faschistischen Regierungen Hitlers und Mussolinis inspiriert war."
BRA_ban_the_aib:0 "Verbot der AIB"
BRA_ban_the_aib_desc:0 "Die Unterstützung der Ação Integralista Brasileira für unsere Regierung war hilfreich, aber sie wie auch jeder andere könnte versuchen, Getúlio zu stürzen. Ihre Partei würde wie jede andere in Brasilien verboten werden."
BRA_centralize_the_nation:0 "Zentralisierung der Nation"
BRA_centralize_the_nation_desc:0 ""
BRA_propaganda_campaign:0 "Propagandakampagne"
BRA_propaganda_campaign_desc:0 ""
BRA_vargas_youth:0 "Vargas Jugend"
BRA_vargas_youth_desc:0 "Nach dem Vorbild Deutschlands und Italiens werden wir ein Programm zur Ausbildung unserer Jugend entwickeln, damit sie darauf vorbereitet ist, den Estado Novo vor jeder Bedrohung zu schützen, ob sie nun von außen kommt oder nicht."
BRA_workers_guardian:0 "Arbeiterwächter"
BRA_workers_guardian_desc:0 "Getúlio Vargas hat bewiesen, dass ihm sein Volk am Herzen liegt, im Gegensatz zu den korrupten Oligarchien, die Brasilien vor 1930 regierten. Wir alle müssen dem Arbeiterwächter zujubeln, für eine bessere Zukunft für unser Volk und unsere Nation!"
BRA_persecute_the_un_brazilians:0 "Verfolgen Sie die Nicht-Brasilianer"
BRA_persecute_the_un_brazilians_desc:0 "Italiener, Deutsche, Japaner und Juden, sie alle sollten sich der brasilianischen Kultur anpassen, um jegliche Art von Aufstand zu verhindern. Ihre Schulen, Zeitungen und Organisationen sollten geschlossen werden, damit sie wahre Brasilianer werden können."
BRA_levante_integralista:0 "Levante Integralista"
BRA_levante_integralista_desc:0 "Integralistische Loyalisten haben versucht, Getúlio Vargas zu ermorden und die Regierung zu stürzen. Glücklicherweise scheiterten sie, und wir haben eine wichtige Lektion gelernt: Wir können keiner anderen Bewegung als dem Estado Novo vertrauen."
BRA_fire_muller:0 "Feuer Müller"
BRA_fire_muller_desc:0 "Filinto Müller, Chef der Geheimpolizei und Kollaborateur der Nazis, muss aus seinem Amt entfernt werden, da unsere Regierung eine Zusammenarbeit mit den Amerikanern anstrebt."
BRA_modernize_the_northern_airports:0 "Modernisierung der nördlichen Flughäfen"
BRA_modernize_the_northern_airports_desc:0 ""
BRA_offer_naval_bases_to_the_USA:0 "Bieten Sie den USA Marinestützpunkte an"
BRA_offer_naval_bases_to_the_USA_desc:0 ""
BRA_join_the_allies:0 "Schließen Sie sich den Verbündeten an"
BRA_join_the_allies_desc:0 ""
BRA_a_cobra_esta_fumando:0 "A Cobra esta Fumando"
BRA_a_cobra_esta_fumando_desc:0 "„Für eine Schlange ist es leichter, Pfeife zu rauchen, als für Brasilien, sich am Krieg in Europa zu beteiligen“, heißt es seit dem Kriegseintritt der Amerikaner. Nun denn, jetzt soll eine Schlange rauchen."
BRA_invite_salgado_into_the_government:0 "Salgado in die Regierung einladen"
BRA_invite_salgado_into_the_government_desc:0 "Plínio Salgado und die Integralisten haben ihre Loyalität gegenüber Getúlio Vargas bewiesen. Um die volle Unterstützung der Integralisten zu sichern, muss er ins Ministerium berufen werden."
BRA_corporate_statism:0 "Unternehmensetatismus"
BRA_corporate_statism_desc:0 ""
BRA_rally_the_european_minorities:0 "Die europäischen Minderheiten versammeln"
BRA_rally_the_european_minorities_desc:0 "Italienische und deutsche Brasilianer werden unserem Staat helfen können, seine Beziehungen zu den faschistischen Nationen Europas zu verbessern"
BRA_modernize_the_naval_corps:0 "Modernisieren Sie die Armada"
BRA_modernize_the_naval_corps_desc:0 ""
BRA_offer_naval_bases_to_the_axis:0 "Bieten Sie den Achsenmächten Marinestützpunkte an"
BRA_offer_naval_bases_to_the_axis_desc:0 ""
BRA_join_the_axis:0 "Treten Sie der Achse bei"
BRA_join_the_axis_desc:0 ""
BRA_a_papagaio_esta_fumando:0 "A Papagaio esta Fumando"
BRA_a_papagaio_esta_fumando_desc:0 "„Für einen Papagei ist es leichter, Pfeife zu rauchen, als für Brasilien, sich am Krieg in Europa zu beteiligen“, heißt es seit dem Kriegseintritt der Amerikaner. Nun denn, jetzt soll ein Papagei rauchen."
BRA_the_calm_after_the_storm:0 "Die Ruhe nach dem Sturm"
BRA_the_calm_after_the_storm_desc:0 "Nachdem die Kommunisten nun erledigt sind, ist es an der Zeit, die bürgerlichen Freiheiten wiederherzustellen und zu unseren demokratischen Lebensweisen zurückzukehren."
BRA_respect_the_1934_constitution:0 "Respektieren Sie die Verfassung von 1934"
BRA_respect_the_1934_constitution_desc:0 ""
BRA_no_more_cafe_com_leite:0 "No More Café com Leite"
BRA_no_more_cafe_com_leite_desc:0 "Café com Leite Politics bezeichnete die Dominanz der brasilianischen Politik von 1889 bis 1930 durch den Landadel von São Paulo (dominiert von der Kaffeeindustrie) und Minas Gerais (dominiert von der Milchwirtschaft), vertreten durch die Paulista Republican Party und die Minas Republican Party. Diese Zeit war bekannt für ihre Korruption und die Macht der Oligarchien, und dank Vargas wird dies nie wieder einen Brasilianer heimsuchen."
BRA_heal_the_scars_of_1932:0 "Heile die Narben von 1932"
BRA_heal_the_scars_of_1932_desc:0 "Die Konstitutionalistische Revolution von 1932, auch Paulista-Krieg oder Brasilianischer Bürgerkrieg genannt, bezeichnet den Aufstand der Bevölkerung des brasilianischen Bundesstaates São Paulo gegen die brasilianische Revolution von 1930, als Getúlio Vargas die Präsidentschaft übernahm. Wir werden diese Narben heilen, damit Brasilien als Nation vorankommen kann."
BRA_lider_do_trabalhador:0 "Líder do Trabalhador"
BRA_lider_do_trabalhador_desc:0 "Getúlio Vargas hat bewiesen, dass ihm sein Volk am Herzen liegt, im Gegensatz zu den korrupten Oligarchien, die Brasilien vor 1930 regierten. Wir alle müssen dem Arbeiterwächter zujubeln, für eine bessere Zukunft für unser Volk und unsere Nation!"
BRA_plan_muller:0 "Plan Müller"
BRA_plan_muller_desc:0 "Wir dürfen nicht zulassen, dass Brasilien erneut in die Instabilität gerät. Wir müssen alle verhaften, deren Ideologie der der Faschisten nahesteht, darunter auch den ehemaligen Chef der Geheimpolizei, Filinto Müller."
BRA_vargas_speech:0 "Vargas&#39; Rede"
BRA_vargas_speech_desc:0 "Chile, Argentinien und Brasilien wetteiferten jahrzehntelang darum, die größte Marine Südamerikas zu besitzen. Jetzt liegen diese Marinen ungenutzt in ihren Heimatländern, während Tausende, nein, Millionen in China und Europa in den Händen des Faschismus und Kommunismus sterben. Darf ich Sie, Brüder Südamerikas, fragen, ob Sie sich uns im Kampf gegen den Totalitarismus anschließen wollen?"
BRA_concern_over_french_guiana:0 "Besorgnis über Französisch-Guayana"
BRA_concern_over_french_guiana_desc:0 ""
BRA_concern_over_dutch_guiana:0 "Besorgnis über Niederländisch-Guayana"
BRA_concern_over_dutch_guiana_desc:0 ""
BRA_concern_over_british_guiana:0 "Besorgnis über Britisch-Guayana"
BRA_concern_over_british_guiana_desc:0 ""
BRA_restore_civil_liberties:0 "Wiederherstellung der bürgerlichen Freiheiten"
BRA_restore_civil_liberties_desc:0 "Seit dem kommunistischen Aufstand von 1935 ist viel Zeit vergangen. Es ist an der Zeit, die bürgerlichen Freiheiten wiederherzustellen und zu unseren demokratischen Wegen zurückzukehren, um Brasilien eine bessere Zukunft zu ermöglichen."
BRA_the_brazilian_caesar:0 "Der brasilianische Cäsar"
BRA_the_brazilian_caesar_desc:0 "So wie Caesar während seiner Diktatur Rom stabilisierte und später von seinem eigenen Volk ermordet wurde, wurde Getúlio Vargas von jenen ermordet, die zu dumm waren, um zu erkennen, wer ihre Nation gerettet hatte …"
BRA_the_great_purge:0 "Die große Säuberung"
BRA_the_great_purge_desc:0 "Wir werden nicht zulassen, dass unser großer Führer erneut von irgendeinem lästigen Linken ermordet wird. Wir werden dafür sorgen, dass es keine Opposition mehr gibt."
BRA_second_prestes_column:0 "Zweite Prestes-Säule"
BRA_second_prestes_column_desc:0 "Die Miguel-Costa-Prestes-Kolumne, meist als Prestes-Kolumne bezeichnet, war eine soziale Rebellenbewegung, die zwischen 1925 und 1927 in Brasilien ausbrach. Die Ideologie des Aufstands war diffus, doch die Hauptursachen waren die allgemeine Unzufriedenheit mit der oligarchischen Republik, die Forderung nach geheimer Wahl und die Verteidigung eines besseren öffentlichen Bildungssystems. Die Rebellen marschierten 25.000 Kilometer durch die brasilianische Provinz, ohne von der Regierung besiegt zu werden. Die zweite Kolonne soll nun beginnen."
BRA_the_knight_of_hope:0 "Der Ritter der Hoffnung"
BRA_the_knight_of_hope_desc:0 "Luís Prestes erhielt während seiner Zeit als Kommandant der Prestes-Kolonne in den späten 20er Jahren den Spitznamen „Ritter der Hoffnung“. Heute führt er die Nation an und wird zum Ritter der Hoffnung des gesamten brasilianischen Volkes."
BRA_protect_the_revolution:0 "Schützen Sie die Revolution"
BRA_protect_the_revolution_desc:0 "Die kommunistische Revolution muss vor jedem Oligarchen und Faschisten geschützt werden, der versucht, sie zu stürzen. Uns wird nicht das gleiche Schicksal wie Getúlio Vargas widerfahren."
BRA_join_the_comitern:0 "Treten Sie dem Komitee bei"
BRA_join_the_comitern_desc:0 ""
BRA_found_the_sao_paulo_forum:0 "Das São Paulo Forum gefunden"
BRA_found_the_sao_paulo_forum_desc:0 ""
BRA_invite_soviet_engineers:0 "Laden Sie sowjetische Ingenieure ein"
BRA_invite_soviet_engineers_desc:0 ""
BRA_soviet_armor_designs:0 "Sowjetische Panzerungsdesigns"
BRA_soviet_armor_designs_desc:0 ""
BRA_URSAL:0 "URSAL"
BRA_URSAL_desc:0 "So wie die Russen die Union der Sozialistischen Sowjetrepubliken gründeten, werden wir die União das Repúblicas Socialistas da América Latina (Union der Sozialistischen Republiken) gründen, um den amerikanischen Imperialismus zu bekämpfen."
BRA_help_the_failed_states:0 "Helfen Sie den gescheiterten Staaten"
BRA_help_the_failed_states_desc:0 ""
BRA_liberate_the_south_cone:0 "Befreie den Südkegel"
BRA_liberate_the_south_cone_desc:0 ""
BRA_liberate_the_andean_nations:0 "Befreit die Andenvölker"
BRA_liberate_the_andean_nations_desc:0 ""
BRA_push_towards_the_darien_gap:0 "Vorstoß in Richtung Darién-Lücke"
BRA_push_towards_the_darien_gap_desc:0 ""
BRA_liberate_the_caribbean:0 "Befreie die Karibik"
BRA_liberate_the_caribbean_desc:0 ""
BRA_the_grand_revolution:0 "Die große Revolution"
BRA_the_grand_revolution_desc:0 ""
BRA_ally_the_integralists:0 "Verbünden Sie die Integralisten"
BRA_ally_the_integralists_desc:0 ""
BRA_assassinate_barroso:0 "Barroso ermorden"
BRA_assassinate_barroso_desc:0 "Gustavo Barroso hat seinen Antisemitismus unzählige Male unter Beweis gestellt. Wir können nicht zulassen, dass ein solcher Mann unsere paramilitärischen Truppen anführt und nicht einmal Teil unserer Regierung ist."
BRA_coup_salgado:0 "Coup Salgado"
BRA_coup_salgado_desc:0 "Plínio Salgado ist ein schwacher Mann, der nicht erkennen kann, dass die Juden schon immer Pläne geschmiedet haben, die Gesellschaft, in der wir leben, zu zerstören. Wir müssen die Camisas Verdes versammeln und ihn absetzen, bevor es zu spät ist."
BRA_protect_the_revolution_2:0 "Schützen Sie die Revolution"
BRA_protect_the_revolution_2_desc:0 "Vargas wurde von Linken ermordet, die Brasilien ins Chaos stürzen wollten, damit ihre Revolution erfolgreich sein konnte. Wir werden so etwas nie wieder zulassen."
BRA_camisas_verdes:0 "Grüne Hemden"
BRA_camisas_verdes_desc:0 "Die Camisas Verdes, ehemals unter der Führung von Gustavo Barroso, sind die paramilitärischen Kräfte der Integralisten. Sie werden uns helfen, das Land vor jeder Bedrohung von außen zu schützen."
BRA_all_equal:0 "Alle gleich"
BRA_all_equal_desc:0 "Der Integralismus wurde als brasilianischer Faschismus konzipiert, der Benito Mussolini imitierte und die Rassenpolitik Hitlers ablehnte. Egal, ob Sie weiß, Mestize, schwarz oder sogar asiatisch sind, Sie sind ein Mensch und Sie sind Brasilianer."
BRA_brazilian_designs:0 "Brasilianische Designs"
BRA_brazilian_designs_desc:0 ""
BRA_the_first_brazilian_plane:0 "Der erste brasilianische Kämpfer"
BRA_the_first_brazilian_plane_desc:0 ""
BRA_latin_american_determination:0 "Lateinamerikanische Entschlossenheit"
BRA_latin_american_determination_desc:0 "Lateinamerika hat genug von den Misshandlungen in Nordamerika und Europa. Es ist Zeit, dem Kontinent echte Freiheit zu bringen."
BRA_anti_racism:0 "Antirassismus"
BRA_anti_racism_desc:0 "Früher oder später werden die Juden ihre Ärmel aufkrempeln. Das wird überall passieren, außer in Deutschland, wo sich die Nation des Problems bewusst ist. Unserer Meinung nach macht Hitler mit seinem antijüdischen Feldzug einen Fehler. Er bekämpft die Juden im Namen des arischen Rassismus. Da der Jude der größte aller Rassisten ist, kann man ihn nicht mit einem anderen Rassismus bekämpfen, sondern nur mit einem Antirassismus. Im Namen christlicher Prinzipien, die die Gleichheit aller Menschen predigen, bekämpfen wir die Menschen, die sich für auserwählt und überlegen erklären.“"
BRA_german_plane_designs:0 "Deutsche Flugzeugentwürfe"
BRA_german_plane_designs_desc:0 ""
BRA_german_military_mission:0 "Deutsche Militärmission"
BRA_german_military_mission_desc:0 ""
BRA_join_the_axis_2:0 "Treten Sie der Achse bei"
BRA_join_the_axis_2_desc:0 ""
BRA_corporativism:0 "Korporativismus"
BRA_corporativism_desc:0 ""
BRA_promote_syndicalism:0 "Fördern Sie den Syndikalismus"
BRA_promote_syndicalism_desc:0 ""
BRA_embrace_our_christian_identity:0 "Unsere christliche Identität annehmen"
BRA_embrace_our_christian_identity_desc:0 ""
BRA_municipalism:0 "Munizipalismus"
BRA_municipalism_desc:0 ""
BRA_ally_the_patrianovists:0 "Verbünden Sie die Patrianovisten"
BRA_ally_the_patrianovists_desc:0 ""
BRA_remember_dom_pedro_ii:0 "Gedenken an Dom Pedro II"
BRA_remember_dom_pedro_ii_desc:0 "Obwohl Pedro II. ein Reich am Rande des Zerfalls erbte, verwandelte er Brasilien in eine aufstrebende internationale Macht. Er respektierte die Bürgerrechte, förderte das Wirtschaftswachstum und behielt die konstitutionelle parlamentarische Monarchie bei. Brasilien ging unter seiner Herrschaft aus drei internationalen Konflikten als Sieger hervor und schaffte die Sklaverei ab. Wir dürfen ihn nicht vergessen."
BRA_the_french_house:0 "Das französische Haus"
BRA_the_french_house_desc:0 "Henri Philippe Pierre Marie d&#39;Orléans, Mitglied des Hauses Orléans-Braganza, ist der richtige Mann, um Brasilien in ein neues Zeitalter des Wohlstands zu führen."
BRA_the_portuguese_house:0 "Das portugiesische Haus"
BRA_the_portuguese_house_desc:0 "Das Mitglied des Orléans-Braganza-Hauses, Pedro Henrique Afonso Felipe Maria Miguel Gabriel Rafael Gonzaga de Orléans e Bragança, ist der richtige Mann, um Brasilien in ein neues Zeitalter des Wohlstands zu führen."
BRA_expand_the_french_military_mission:0 "Erweiterung der französischen Militärmission"
BRA_expand_the_french_military_mission_desc:0 ""
BRA_levante_em_massa:0 "Levante em Massa"
BRA_levante_em_massa_desc:0 "Wenn wir dem französischen „Levée en Masse“ folgen wollen, benötigen wir für jeden neuen Rekruten der Armee ein Gewehr. Wir werden die Produktion so weit wie möglich steigern."
BRA_portuguese_cooperation:0 "Portugiesische Zusammenarbeit"
BRA_portuguese_cooperation_desc:0 ""
BRA_french_cooperation:0 "Französische Zusammenarbeit"
BRA_french_cooperation_desc:0 ""
BRA_latin_entente:0 "Lateinische Entente"
BRA_latin_entente_desc:0 ""
BRA_invite_the_spaniards:0 "Lade die Spanier ein"
BRA_invite_the_spaniards_desc:0 ""
BRA_invite_the_italians:0 "Laden Sie die Italiener ein"
BRA_invite_the_italians_desc:0 ""
BRA_frente_negra_brasileira:0 "Frente Negra Brasileira"
BRA_frente_negra_brasileira_desc:0 ""
BRA_remember_vargas:0 "Gedenken an Getúlio Vargas"
BRA_remember_vargas_desc:0 "Er stürzte die korrupten Oligarchien, führte uns durch Revolutionen und Bürgerkriege, und das alles, um am Ende von einem dummen Extremisten ermordet zu werden ... Wir werden Vargas&#39; Vermächtnis nicht vergessen."
BRA_learnings_of_the_1930_coffee_crash:0 "Erkenntnisse aus dem Kaffee-Crash von 1930"
BRA_learnings_of_the_1930_coffee_crash_desc:0 "Brasilien wurde von der Weltwirtschaftskrise schwer getroffen. Ausländische Investitionen brachen ein, und zwischen 1929 und 1932 sanken die Kaffeeexporte um 50 %, da sie hauptsächlich von den USA abhängig waren, dem Hauptabnehmer brasilianischen Kaffees. Um einen weiteren Preisverfall zu verhindern, begann die Regierung, den Kaffeeproduzenten auf Kredit abzukaufen und die Säcke anschließend ins Meer zu werfen oder zu verbrennen, um den Preisverfall zu verhindern. Wir müssen dafür sorgen, dass so etwas nie wieder passiert."
