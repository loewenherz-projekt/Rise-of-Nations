BRA_the_steel_problem:0 "Das Stahlproblem"
BRA_the_steel_problem_desc:0 "Die Industrialisierung erfordert Stahl und Beton, und beides fehlt uns. Wir brauchen Hilfe, um unsere Wirtschaft wieder in Gang zu bringen. Doch wer soll uns bei diesen Anstrengungen unterstützen?"
BRA_american_loans:0 "Amerikanische Kredite"
BRA_american_loans_desc:0 ""
