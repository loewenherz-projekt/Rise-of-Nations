USA_CW_a_complete_alliance_desc:0 "Verpflichten Sie sich zum Aufbau einer „vollständigen Allianz“ und legen Sie dabei Wert auf starke und umfassende Partnerschaften."
USA_CW_develop_nuclear_capable_weapons:0 "Entwicklung nuklearfähiger Waffen"
USA_CW_develop_nuclear_capable_weapons_desc:0 "Investieren Sie in die Entwicklung nuklearfähiger Waffen und stärken Sie so unsere strategischen Fähigkeiten."
USA_CW_military_industrial_complex:0 "Militärisch-industrieller Komplex"
USA_CW_military_industrial_complex_desc:0 "Entwickeln Sie einen „militärisch-industriellen Komplex“, um unseren Verteidigungsbedarf und unser Wirtschaftswachstum zu unterstützen."
USA_CW_anticommunist_propaganda:0 "Antikommunistische Propaganda"
USA_CW_anticommunist_propaganda_desc:0 "Fördern Sie „antikommunistische Propaganda“, um dem Einfluss kommunistischer Ideologien entgegenzuwirken."
USA_CW_the_military_industrial_complex:0 "Der militärisch-industrielle Komplex"
USA_CW_the_military_industrial_complex_desc:0 "Entwickeln Sie einen „militärisch-industriellen Komplex“, um unseren Verteidigungsbedarf und unser Wirtschaftswachstum zu unterstützen."
USA_CW_central_european_allies:0 "Mitteleuropäische Verbündete"
USA_CW_central_european_allies_desc:0 "Versprechen Sie, eine „Mitteleuropäische Allianz“ zu bilden, um die regionale Zusammenarbeit zu stärken."
USA_CW_invite_greece_to_nato:0 "Laden Sie Griechenland zur NATO ein"
USA_CW_invite_greece_to_nato_desc:0 "Versprechen Sie, Griechenland zur Verbesserung der Sicherheit und Zusammenarbeit in die NATO einzuladen."
USA_CW_crack_down_on_antiwar_activists:0 "Hartes Vorgehen gegen Antikriegsaktivisten"
USA_CW_crack_down_on_antiwar_activists_desc:0 "Leiten Sie ein „hartes Vorgehen gegen Antikriegsaktivisten“ ein, um abweichende Meinungen zu unterdrücken und die Stabilität in Kriegszeiten aufrechtzuerhalten."
USA_CW_recognize_puerto_ricos_constitution:0 "Anerkennung der Verfassung Puerto Ricos"
USA_CW_recognize_puerto_ricos_constitution_desc:0 "Wir geben unsere Absicht bekannt, die Verfassung von Puerto Rico anzuerkennen und ihren Status zu thematisieren."
USA_CW_strike_the_bear:0 "Schlag den Bären"
USA_CW_strike_the_bear_desc:0 "Wir geben unsere Absicht bekannt, „den Bären zu schlagen“, und symbolisieren damit unsere Entschlossenheit, unseren Gegnern die Stirn zu bieten."
USA_CW_develop_nuclear_capable_missiles:0 "Entwicklung nuklearfähiger Raketen"
USA_CW_develop_nuclear_capable_missiles_desc:0 "Investieren Sie in die Entwicklung nuklearfähiger Raketen zur Verbesserung der strategischen Fähigkeiten."
USA_CW_support_the_portuguese:0 "Unterstützen Sie die Portugiesen"
USA_CW_support_the_portuguese_desc:0 "Wir erklären unsere Verpflichtung, die Portugiesen in verschiedenen internationalen Angelegenheiten zu unterstützen."
USA_CW_the_truman_administration:0 "Die Truman-Administration"
USA_CW_the_truman_administration_desc:0 "Befassen Sie sich mit „Die Truman-Regierung“ und ihrer Politik und historischen Bedeutung."
########BBA

 ITAB_italian_highways_bba:0 "Italienische Autobahnen"
 ITAB_italian_highways_bba_desc:0 "Die alten Römer bauten Straßen, um die sie die ganze Welt beneidete. Jetzt glauben die aufstrebenden Deutschen, ihre Autobahnen seien allem, was wir bauen könnten, weit überlegen. Wir werden ihnen das Gegenteil beweisen."
 ITAB_develop_libya:0 "Libyen entwickeln"
 ITAB_develop_libya_desc:0 "Libyen ist unsere nächstgelegene Kolonie und die mit dem größten Potenzial. Bevor wir die Früchte unserer langen und harten Arbeit zur Befriedung der Region ernten können, müssen wir ihre Infrastruktur verbessern."
 ITAB_develop_eritrea:0 "Eritrea entwickeln"
 ITAB_develop_eritrea_desc:0 "Eritrea ist unsere älteste Kolonie auf dem afrikanischen Kontinent und zweifellos eine der wertvollsten. Dank seiner hervorragenden strategischen Lage kann es leicht zu einem Eckpfeiler unseres Kolonialreichs ausgebaut werden."
 ITAB_develop_somaliland:0 "Somaliland entwickeln"
 ITAB_develop_somaliland_desc:0 "Auf den ersten Blick scheint die Region am Horn von Afrika kein großes wirtschaftliches oder strategisches Potenzial zu bieten. Doch mit einigen gut platzierten Investitionen können wir das Gebiet zu einem Sprungbrett für weitere Vorstöße in den Indischen Ozean machen."
 ITAB_regional_development:0 "Regionale Entwicklung"
 ITAB_regional_development_desc:0 "Unsere bisherigen Investitionen in verschiedenen Gebieten des Imperiums haben den Boden für eine deutliche Steigerung der Wirtschaftsleistung in diesen Regionen bereitet. Wir müssen nur ein Wort sagen, und wir können in Kürze die Früchte ernten."
 ITAB_ministry_of_italian_africa:0 "Ministerium für Italienisch-Afrika"
 ITAB_ministry_of_italian_africa_desc:0 "Die verschiedenen Stämme und Völker Afrikas können nicht so behandelt werden, wie wir es mit anderen unterworfenen Völkern tun würden. Die Verwaltung dieser Gebiete erfordert einen anderen Ansatz."
 ITAB_develop_ethiopia:0 "Äthiopien entwickeln"
 ITAB_develop_ethiopia_desc:0 "Die hartnäckigen Äthiopier haben uns lange Zeit herausgefordert und gedemütigt. Jetzt, da sie endlich zur Räson gebracht wurden, können wir ihr Land weiterentwickeln und ihnen zeigen, dass unsere Invasion zu ihrem Besten war."
 ITAB_ethiopian_railways:0 "Äthiopische Eisenbahnen"
 ITAB_ethiopian_railways_desc:0 "Das unterentwickelte äthiopische Eisenbahnnetz bremst die wirtschaftliche Entwicklung der Kolonie. Durch die Entsendung italienischer Experten können wir es schnell auf italienischen Standard bringen und dafür sorgen, dass die Züge überall im Reich stets pünktlich verkehren."
 ITAB_polizia_dell_africa_italiana:0 "Polizia dell&#39;Africa Italiana"
 ITAB_polizia_dell_africa_italiana_desc:0 "Unsere Kolonialpolizei hat sich bisher als leistungsfähige Truppe erwiesen. Mit einigen weiteren Reformen wird sie dafür sorgen können, dass wir aus unseren Kolonien genauso viel herausholen, wie wir hineinstecken."
 ITAB_strengthen_ascari_corps:0 "Stärkung des Ascari-Korps"
 ITAB_strengthen_ascari_corps_desc:0 "Unsere Truppen aus den europäischen Teilen des Reiches haben oft mit dem rauen Klima Afrikas zu kämpfen. Die Einheimischen haben offensichtlich nicht die gleichen Probleme. Wir sollten einige von ihnen anheuern, um unsere Truppen bei Kämpfen in heißen Klimazonen zu unterstützen."
 ITAB_comandante_diavolo:0 "Comandante Diavolo"
 ITAB_comandante_diavolo_desc:0 "Während unserer Eroberung Eritreas und im Krieg in Äthiopien wurden wir oft von der Schnelligkeit und Hartnäckigkeit der einheimischen Reiter geplagt. Nach dem Kampf gegen sie können wir viel gewinnen, wenn wir sie auf unsere Seite ziehen. Ein unternehmungslustiger junger Offizier könnte unser ganz persönlicher „Teufelskommandant“ werden."
 ITAB_prospect_for_oil:1 "Aussicht auf Öl"
 ITAB_prospect_for_oil_desc:1 "Unsere Geologen glauben, dass unter der libyschen Wüste möglicherweise erhebliche Ölreserven schlummern. Wir sollten eine gründliche Untersuchung durchführen, um zu sehen, ob sie Recht haben."
 ITAB_libyan_refineries:0 "Libysche Raffinerien"
 ITAB_libyan_refineries_desc:1 "Da in der libyschen Wüste große Ölvorkommen entdeckt wurden, muss unser nächster Schritt darin bestehen, die Ölraffineriekapazität in der Region zu erhöhen."
 ITAB_libyan_infrastructure_bba:0 "Libysche Infrastruktur"
 ITAB_libyan_infrastructure_bba_desc:0 "Angesichts der Bedeutung Libyens als Operationsbasis in Nordafrika müssen wir uns kontinuierlich um die Verbesserung der Infrastruktur bemühen, um bei Bedarf große Truppenverbände dort einsetzen zu können."
 ITAB_litoranea_balbo:1 "[GetAppropriateLitoraneaBalboName]"
 ITAB_litoranea_balbo_default:0 "Litoranea Balbo"
 ITAB_litoranea_balbo_alt:0 "Litoranea Libica"
 ITAB_litoranea_balbo_desc:0 "Die Straßen in Libyen sind miserabel. Selbst in Küstennähe ist das Straßennetz für ein modernes Land schlicht ungeeignet. Es gibt viel zu tun, um es zu verbessern, unter anderem durch den Bau einer großen Autobahn entlang der Küste."
 ITAB_via_della_vittoria:0 "Via della Vittoria"
 ITAB_via_della_vittoria_desc:0 "Die schlechte Infrastruktur behindert weiterhin unsere Operationen in Nordafrika. Ein verstärkter Einsatz rund um eine einheitliche „Siegesstraße“ könnte die Situation deutlich verbessern und uns ermöglichen, freier an der ägyptischen Grenze zu operieren."
 ITAB_libyan_railway:0 "Libysche Eisenbahn"
 ITAB_libyan_railway_desc:0 "Investitionen in das libysche Straßennetz sind sicherlich wertvoll, für den Transport von Truppen, Ressourcen und Nachschub im großen Maßstab ist jedoch ein modernes Schienennetz unverzichtbar."
 ITAB_steel_industry_in_terni:0 "Stahlindustrie in Terni"
 ITAB_steel_industry_in_terni_desc:0 "Das Stahlwerk Terni bildet seit langem das Rückgrat der italienischen Stahlproduktion. In den kommenden Kriegen werden wir uns noch stärker auf es verlassen müssen. Einige Investitionen, die wir jetzt tätigen, werden sich später zweifellos massiv auszahlen."
 ITAB_power_plants_in_terni:0 "Kraftwerke in Terni"
 ITAB_power_plants_in_terni_desc:0 "Unsere derzeitigen Kraftwerke in Terni reichen nicht aus und müssen erweitert werden, wenn wir die Region zu einem noch größeren Industriezentrum entwickeln wollen."
 ITAB_industria_della_gomma_sintetica:0 "Industria della Gomma Sintetica"
 ITAB_industria_della_gomma_sintetica_desc:0 "Unsere geografische Lage im Herzen des Mittelmeers macht uns besonders anfällig für Blockaden durch feindliche Mächte. Wenn wir unseren rechtmäßigen Platz in der Welt einnehmen wollen, müssen wir in der Lage sein, unsere Industrien ohne ausländische Importe aufrechtzuerhalten."
 ITAB_strengthen_northern_industry:0 "Stärkung der Industrie im Norden"
 ITAB_strengthen_northern_industry_desc:0 "Norditalien ist seit langem das industrielle Zentrum unseres Landes. Die gesamte Region verfügt über hervorragende Voraussetzungen für weiteres Wachstum, und das mit nur geringem Zeit- und Ressourcenaufwand."
 ITAB_modernize_the_mezzogiorno:0 "Modernisierung des Mezzogiorno"
 ITAB_modernize_the_mezzogiorno_desc:0 "Der Süden Italiens war, seit wir ein vereintes Land sind, ein Sorgenkind. Doch mit unserem Wunsch, die dominierende Macht im Mittelmeerraum zu werden, muss all dieses ungenutzte Potenzial mobilisiert werden."
 ITAB_new_industrialization_program:0 "Neues Industrialisierungsprogramm"
 ITAB_new_industrialization_program_desc:0 "Um mit dem Rest der Welt Schritt zu halten, sind ständige Innovationen und Verbesserungen erforderlich. Wir können nicht erwarten, wettbewerbsfähig zu bleiben, wenn wir uns auf unseren Lorbeeren ausruhen. Stattdessen müssen wir ständig nach mehr streben."
 ITAB_railway_innovations:0 "Bahninnovationen"
 ITAB_railway_innovations_desc:0 "Auch im Zeitalter des Automobils ist ein starkes Schienennetz das Rückgrat einer starken Wirtschaft. Der weitere Ausbau der italienischen Eisenbahnen wird uns für zukünftiges Wachstum rüsten."
 ITAB_expand_foggia_farm_fields:0 "Erweitern Sie die Felder der Foggia Farm"
 ITAB_expand_foggia_farm_fields_desc:0 "Die Region Foggia ist seit langem die Kornkammer, die ganz Italien ernährt. Wenn der Krieg beginnt, müssen wir viele Männer, die auf den Feldern arbeiten, zum Militär einziehen. Wir müssen die Landwirtschaft in der Region modernisieren und ausbauen, wenn wir unsere Bevölkerung ernähren wollen."
 ITAB_investments_in_edison:0 "Investitionen in Edison"
 ITAB_investments_in_edison_desc:0 "Italien verfügte über das erste Kraftwerk Europas und war schon immer technologisch führend. Mit einer Investition in die Firma Edison können wir sicherstellen, dass wir auch weiterhin führend bleiben."
 ITAB_expand_national_universities:0 "Nationale Universitäten erweitern"
 ITAB_expand_national_universities_desc:0 "In einer technologisch fortschrittlichen Nation wie der unseren besteht ständiger Bedarf an Ingenieuren. Wir haben festgestellt, dass unsere Universitäten der größte Engpass bei der Ausbildung von genügend neuen Fachkräften sind, um die Wettbewerbsfähigkeit unseres Landes zu erhalten."
 ITAB_fiocchi_munizioni:0 "Fiocchi Munizioni"
 ITAB_fiocchi_munizioni_desc:0 "Fiocchi beliefert unsere Streitkräfte seit langem mit hochwertiger Munition. Eine stetige Munitionsversorgung ist für die kommenden Kriege von entscheidender Bedeutung. Daher sollten wir sicherstellen, dass die Fiocchi-Werke dieser Aufgabe gewachsen sind."
 ITAB_brescia_small_arms_industry:0 "Kleinwaffenindustrie in Brescia"
 ITAB_brescia_small_arms_industry_desc:0 "Italienische Kleinwaffen sind weltweit für ihre hohe Qualität bekannt. Doch wir müssen auch für eine ausreichende Versorgung mit modernsten Waffen sorgen, wenn wir unseren Soldaten die Möglichkeit geben wollen, jeden Feind auf dem Schlachtfeld zu besiegen."
 ITAB_milan_comms_industry:0 "Mailand Kommunikationsindustrie"
 ITAB_milan_comms_industry_desc:0 "Das neue Gebiet der Funkortung und Entfernungsmessung bietet viele Möglichkeiten und wird zweifellos zu einem wichtigen Bereich der Militärtechnologie werden. Wir müssen sicherstellen, dass wir mit den Entwicklungen in diesem Bereich Schritt halten können."
 ITAB_redirect_alfa_romeo_production:0 "Alfa Romeo Produktion umleiten"
 ITAB_redirect_alfa_romeo_production_desc:0 "Italienische Sportwagen gelten seit Jahrzehnten als absolute Spitzentechnologie. Doch angesichts der drohenden Kriegsgefahr muss jeder in Italien seinen Beitrag leisten. Wir können es uns nicht leisten, unnötigen Luxus zu bewahren, und die Maschinen der Alfa Romeo-Werke könnten besser für militärische Zwecke eingesetzt werden."
 ITAB_increase_production:0 "Steigern Sie die Produktion"
 ITAB_increase_production_desc:0 "Industrialisierte Kriegsführung erfordert vor allem eines: Masse. Massen an Granaten, Massen an Gewehren, Massen an Flugzeugen. Am wichtigsten ist es, mehr Material zu haben als der Feind."
 ITAB_keep_specialization:0 "Spezialisierung beibehalten"
 ITAB_keep_specialization_desc:0 "Während der Rest der Welt den Wert von Können, Präzision und Qualität vielleicht vergessen hat, haben wir in Italien dies nicht getan. Unsere Handwerker achten stets auf das kleinste Detail und schaffen das zweifellos beste Exemplar jedes Geräts, an dem sie arbeiten."
 ITAB_thermojet_research:0 "Thermojet-Forschung"
 ITAB_thermojet_research_desc:0 "Unsere Ingenieure sind überzeugt, dass Flugzeuge künftig nicht mehr von Propellern oder Kolbenmotoren angetrieben werden. Stattdessen wird eine neue Technologie Flugzeuge deutlich schneller machen und radikal neue Flugzeugdesigns ermöglichen. Italien muss bei dieser Entwicklung eine Vorreiterrolle einnehmen."
 ITAB_army_primacy_bba:0 "Vorrang der Armee"
 ITAB_army_primacy_bba_desc:0 "Letztendlich wird ein Krieg dadurch gewonnen, dass Soldaten auf feindlichem Boden stationiert werden und dem Feind die Dinge wegnehmen, die er für die Kriegsführung benötigt. Marine und Luftwaffe sind zweifellos nützliche Organisationen, doch es ist das Heer, das den Krieg gewinnen wird."
 ITAB_preserve_army_traditions:0 "Bewahren Sie die Armeetraditionen"
 ITAB_preserve_army_traditions_desc:0 "Heutzutage kursieren viele Ideen zu neuen Methoden der Kriegsführung. Manche davon haben zwar ihre Berechtigung, doch die Grundlage jeder erfolgreichen Armee hat sich seit Cäsars Zeiten nicht geändert: Disziplin, individueller Mut und fähige Führung."
 ITAB_increase_artillery_production:0 "Steigern Sie die Artillerieproduktion"
 ITAB_increase_artillery_production_desc:0 "Der Erste Weltkrieg war in erster Linie ein Artilleriekrieg. Wir müssen davon ausgehen, dass auch der nächste Krieg in erster Linie durch Artillerie geführt wird. Wir dürfen auf diesem Gebiet nicht ins Hintertreffen geraten."
 ITAB_vallo_alpino_del_littorio:0 "Vallo Alpino del Littorio"
 ITAB_vallo_alpino_del_littorio_desc:0 "Unsere Landesgrenzen sind fast vollständig von den Alpen bedeckt. Obwohl diese Berge an sich schon ein gewaltiges Hindernis darstellen, haben wir im letzten Krieg gelernt, dass sie nicht völlig undurchdringlich sind. Der Bau einer Reihe von Befestigungsanlagen wird uns helfen, die Stellung gegen eine feindliche Landinvasion zu halten."
 ITAB_moschettieri_del_duce:1 "[GetAppropriateMoschetieridelDuceName]"
 ITAB_moschettieri_del_duce_default:0 "Moschettieri del Duce"
 ITAB_moschettieri_del_duce_king:0 "Moschettieri del Re"
 ITAB_moschettieri_del_duce_alt:0 "Moschettieri della Republica"
 ITAB_moschettieri_del_duce_pope: "Moschettieri del Santo Padre"
 ITAB_moschettieri_del_duce_desc: "[GetAppropriateMoschetieridelDuceDesc]"
 ITAB_moschettieri_del_duce_desc_default: "The Duce has, for his own protection, a unit of elite marksmen under his command. While the Duce's safety is, of course, of the highest priority, these exemplary soldiers could also be used to train our regular forces better, improving their effectiveness on the field."
 ITAB_moschettieri_del_duce_desc_king: "The King has, for his own protection, a unit of elite marksmen under his command. While the King's safety is, of course, of the highest priority, these exemplary soldiers could also be used to train our regular forces better, improving their effectiveness on the field."
 ITAB_moschettieri_del_duce_desc_pope: "His Holiness has, for his own protection, a unit of elite marksmen under his command. While the safety of the Holy Father is, of course, of the highest priority, these exemplary soldiers could also be used to train our regular forces better, improving their effectiveness on the field."
 ITAB_moschettieri_del_duce_desc_alt: "The Moschettieri della Republica is a unit of elite marksmen that have sworn to protect the Republic against any threat, whether it comes from outside the state or from within it. These exemplary soldiers could also be used to train our regular forces better, improving their effectiveness on the field."
 ITAB_a_bandits_war:0 "Der Krieg eines Banditen"
 ITAB_a_bandits_war_desc:0 "Die alten Methoden der Kriegsführung hätten in den Schützengräben am Isonzo aussterben sollen. Einige unserer alten Generäle glauben immer noch, dass man einen modernen Krieg gewinnen kann, indem man Massen von Soldaten in den Fleischwolf wirft. Wir wissen es jetzt besser: Moderne Kriege werden durch schnelle Manöver und flexible Organisationen gewonnen, die schnell reagieren können. Wir müssen unsere Armee auf diese Art von Krieg vorbereiten."
 ITAB_carica_di_isbuscenskij:0 "Carica di Isbuscenskij"
 ITAB_carica_di_isbuscenskij_desc:0 "Manche behaupten, die Zeiten von Pferd und Reiter auf dem Schlachtfeld seien vorbei. Panzer und Flugzeuge hätten die Rolle der Kavallerie übernommen. Doch sie irren sich – ein Pferd braucht keinen Treibstoff, kein Bodenpersonal und keine Ersatzteile, außer ab und zu ein neues Hufeisen. Das verschafft der Kavallerie selbst auf dem modernen Schlachtfeld einen klaren Vorteil."
 ITAB_army_leaders:0 "Armeeführer"
 ITAB_army_leaders_desc:0 "Unsere Armeen müssen stets von den fähigsten verfügbaren Offizieren geführt werden. Um unseren Vorsprung zu sichern, ist es unerlässlich, einen stetigen Zustrom neuer und kompetenter Offiziere zu gewährleisten."
 ITAB_superesercito:0 "Superesercito"
 ITAB_superesercito_desc:0 "Die Koordinierung einer großen Armee ist kein leichtes Unterfangen. Wir müssen eine Struktur für ein Oberkommando schaffen, das die Streitkräfte im Feld führen und unterstützen kann."
 ITAB_italian_tankettes:1 "Italienische Tanketten"
 ITAB_italian_tankettes_desc:1 "Während andere Länder auf der Suche nach dem Superpanzer, der alle anderen Panzer überflüssig macht, immer größere und schwerere Panzer entwickeln, wissen wir, dass der beste Panzer ein Panzer ist, der tatsächlich im Einsatz ist. Ein Panzer muss schnell genug sein, um rechtzeitig dort zu sein, wo er gebraucht wird, und er braucht eigentlich nur eine Panzerung, die stark genug ist, um Gewehren standzuhalten. Ein solches Fahrzeug wäre billig und schnell zu produzieren."
 ITAB_bersaglieri:0 "Bersaglieri"
 ITAB_bersaglieri_desc:0 "Die Bersaglieri, unsere Elite-Leichtinfanterie, haben sich seit langem im Kampf hervorgetan. Auch wenn die Kriegsführung der Zukunft mechanisiert sein mag, wird die Qualität des einzelnen Soldaten weiterhin der entscheidende Faktor sein."
 ITAB_divisioni_alpine:0 "Divisioni Alpine"
 ITAB_divisioni_alpine_desc:0 "Unsere Erinnerung an den Ersten Weltkrieg wird für immer die brutalen Kämpfe in den Hochalpen beinhalten. Sollten wir unser Land jemals wieder gegen eine ausländische Invasion verteidigen müssen, wird diese mit Sicherheit aus dem Norden kommen und weitere Kämpfe in unwirtlichen Bergen erfordern. Wir brauchen Soldaten, die in der Lage sind, in diesem Gelände effektiv zu kämpfen."
 ITAB_fanti_dell_aria:0 "Fanti dell&#39;Aria"
 ITAB_fanti_dell_aria_desc:0 "Die blutige Pattsituation an der Isonzofront im Ersten Weltkrieg zwang uns zu Frontalangriffen gegen einen gut vorbereiteten Feind. Der einzige Weg zum Durchbruch bestand darin, das Niemandsland zu durchqueren und den feindlichen Schützengraben einzunehmen. Moderne Flugzeuge können Soldatengruppen schnell und weit in den Rücken des Feindes bringen. Durch die Landung mit dem Fallschirm können sie strategische Ziele erreichen und die feindliche Frontlinie destabilisieren."
 ITAB_self_propelled_guns:0 "Selbstfahrende Waffen"
 ITAB_self_propelled_guns_desc:0 "Der Panzer mag die Kriegsführung revolutioniert haben, doch in vielerlei Hinsicht ist die Selbstfahrlafette das wertvollste Fahrzeug auf dem Schlachtfeld. Die Feuerunterstützung durch vergleichsweise billige und einfache Fahrzeuge ist von unschätzbarem Wert, wenn es darum geht, Befestigungen zu durchbrechen oder gegen feindliche Panzer zu kämpfen."
 ITAB_end_fiat_ansaldo_duopoly:0 "Beenden Sie das Fiat-Ansaldo-Duopol"
 ITAB_end_fiat_ansaldo_duopoly_desc:0 "Unser Maschinen- und Fahrzeugbau wurde lange Zeit von zwei Unternehmen dominiert: Fiat und Ansaldo. Obwohl diese beiden Unternehmen absolute Weltklasse-Ingenieursfirmen sind, bremste dies das Wachstum etwas, da keine Konkurrenten auf dem Markt bestehen konnten. Wir müssen dieses Duopol aufbrechen, wenn wir langfristig einen gesunden Maschinenbausektor haben wollen."
 ITAB_modernize_ansaldo_facilities:0 "Modernisierung der Ansaldo-Anlagen"
 ITAB_modernize_ansaldo_facilities_desc:0 "Der wirtschaftliche Abschwung nach dem Ersten Weltkrieg stürzte Ansaldo in finanzielle Schwierigkeiten, die es dem Unternehmen weitgehend unmöglich machten, seine Fabriken angemessen zu modernisieren. Nur sein hoher Status bewahrte das Unternehmen vor dem Bankrott. Wenn Ansaldo weiterhin ein so wichtiger Bestandteil unseres Maschinenbausektors bleiben soll, müssen wir sicherstellen, dass das Unternehmen moderne Maschinen und Techniken einsetzt."
 ITAB_ferrea_mole_ferreo_cuore:0 "Ferrea Mole Ferreo Cuore"
 ITAB_ferrea_mole_ferreo_cuore_desc:0 "Von unserem Panzerkorps wird zweifellos große militärische Heldentaten verlangt werden. Dafür genügt es nicht, nur mit eisernen Rümpfen herumzufahren, sie müssen auch ein Herz aus Eisen haben."
 ITAB_air_innovations_bba:0 "Luftinnovationen"
 ITAB_air_innovations_bba_desc:0 "Der Luftkrieg ist zu einem der entscheidenden Felder der modernen Kriegsführung geworden. Wir dürfen auf diesem wichtigen Gebiet nicht ins Hintertreffen geraten."
 ITAB_citta_dell_aria:0 "Città dell&#39;Aria"
 ITAB_citta_dell_aria_desc:0 "Unsere Forschungsanstrengungen sind seit langem über viele verschiedene Gebiete im ganzen Land verteilt. Das hat die Arbeit ziemlich ineffizient gemacht. Wir sollten unsere Forschungsanstrengungen bündeln und eine „Sky City“ gründen, in der Wissenschaftler und Ingenieure aus vielen verschiedenen Fachrichtungen zusammenarbeiten können, um neue Flugzeuggenerationen zu bauen."
 ITAB_expand_rome_flying_school:0 "Erweitern Sie die Flugschule Rom"
 ITAB_expand_rome_flying_school_desc:0 "Mit der zunehmenden Komplexität moderner Flugzeuge steigt auch das Unfallrisiko bei unzureichender Pilotenausbildung. Wir müssen sicherstellen, dass unsere Flugschulen sowohl hinsichtlich der Ausbildungsqualität mit der technischen Entwicklung Schritt halten als auch mit dem durch die Vergrößerung unseres Militärs bedingten Bedarf an neuen Piloten Schritt halten."
 ITAB_reggianes_exports:0 "Reggianes Exporte"
 ITAB_reggianes_exports_desc:0 "Das Unternehmen Reggiane hat eine Reihe leistungsfähiger Kampfflugzeuge entwickelt, die die Aufmerksamkeit ausländischer Militärs auf sich gezogen haben, die ihre Luftwaffe modernisieren wollen. Sollten wir ihnen den Export ihrer Flugzeuge erlauben, wären die Erfahrungen aus der Anpassung des Basisdesigns an unterschiedliche Spezifikationen zweifellos für unsere eigenen Entwicklungsprojekte von großem Nutzen."
 ITAB_diving_bombers:0 "Sturzkampfbomber"
 ITAB_diving_bombers_desc:0 "Das Thema Luftnahunterstützung hat in militärischen Kreisen erheblich an Bedeutung gewonnen. Flugzeuge werden zwar schon lange zum Bombenabwurf eingesetzt, doch offenbar haben mehrere Länder mit der Entwicklung von Spezialflugzeugen begonnen, die im Sturzflug aus großer Höhe Bomben mit unübertroffener Präzision platzieren können. Unsere Industrie könnte ein solches Flugzeug zweifellos rechtzeitig produzieren, doch es gibt auch andere Länder, die über entsprechende Konstruktionen verfügen."
 ITAB_superaereo:0 "Superaereo"
 ITAB_superaereo_desc:0 "Die Zeiten, in denen kleine Flugzeuggruppen ziellos umherflogen, sind längst vorbei. Ein moderner Lufteinsatz ist in vielerlei Hinsicht ähnlich komplex wie ein landgestütztes Unterfangen. Daher benötigen wir einen spezialisierten Planungsstab, der unsere verschiedenen Staffeln koordiniert, damit sie gemeinsam ihre Missionen erfüllen können."
 ITAB_officers_of_the_service_role:0 "Offiziere der Dienstrolle"
 ITAB_officers_of_the_service_role_desc:0 "Es reicht nicht mehr aus, Offiziere aus der Armee zu holen und ihnen das Fliegen beizubringen. Unsere Luftwaffe braucht einen neuen Offizierstyp, der von der Armee ausgebildet und geformt wurde, anstatt ihn nur zu übernehmen."
 ITAB_standardization:0 "Standardisierung"
 ITAB_standardization_desc:0 "Der Luftkrieg ist, mehr noch als der Krieg zur See und der Krieg an Land, ein Krieg der Industrie gegen die Industrie. Masse, und nur Masse, ist entscheidend. Wir müssen sicherstellen, dass wir so viele Flugzeuge wie möglich produzieren können, auch wenn dies bedeutet, dass es später schwieriger wird, das Design zu ändern."
 ITAB_specialization:0 "Spezialisierung"
 ITAB_specialization_desc:0 "So sehr wir uns auch bemühen, wir werden es nie schaffen, mit den Großmächten in puncto Leistung mitzuhalten. Nur wenn wir bessere Flugzeuge bauen als alle anderen, können wir im Luftkampf mithalten. Jeder von ihnen muss in der Lage sein, einen Kampf zu gewinnen, selbst wenn er drei- oder viermal in der Unterzahl ist."
 ITAB_multirole_aircraft:1 "Mehrzweckflugzeuge"
 ITAB_multirole_aircraft_desc:1 "Durch die Entwicklung von Flugzeugen, die im Kampfeinsatz verschiedene Rollen übernehmen können, können wir die Produktionskosten und die Ausbildungszeit der Besatzung deutlich senken. Wir werden unsere Ingenieure umgehend mit der Entwicklung solcher vielseitigen Flugzeuge beauftragen."
 ITAB_long_range_aircraft:0 "Langstreckenflugzeuge"
 ITAB_long_range_aircraft_desc:1 "Feindliche Stützpunkte, Industrien und Versorgungslinien liegen oft weit hinter der Front. Wir müssen unsere Langstreckenflugzeuge weiterentwickeln und verbessern, damit sie diese lebenswichtigen Ziele erreichen und treffen können."
 ITAB_fighter_designs:0 "Kämpferdesigns"
 ITAB_fighter_designs_desc:1 "Kampfflugzeuge bilden das Rückgrat jeder Luftwaffe. Wir müssen sicherstellen, dass unsere Kampfflugzeuge die Lufthoheit über uns erringen und unsere Bomber auf dem Weg zu ihren Zielen schützen können."
 ITAB_bomber_designs:0 "Bomber-Designs"
 ITAB_bomber_designs_desc:1 "Mit neuen Designs für unsere Bomber wird unsere Luftwaffe in der Lage sein, unsere Streitkräfte zu Land und zu Wasser zu unterstützen und gleichzeitig feindliche Truppen und ihre Versorgungslinien zu bedrohen."
 ITAB_supremacy_in_the_skies:0 "Vorherrschaft am Himmel"
 ITAB_supremacy_in_the_skies_desc:1 "Eine moderne Armee kann ohne die Unterstützung einer schlagkräftigen Luftwaffe nicht erfolgreich operieren. Es ist von größter Bedeutung, dass unser Land über modernste Flugzeuge und Technologie verfügt, um den Himmel zu beherrschen."
 ITAB_naval_power_projection:0 "Projektion der Seemacht"
 ITAB_naval_power_projection_desc:1 "Dem Erbe unserer Vorfahren folgend müssen wir sicherstellen, dass wir über die notwendige Industrie verfügen, um eine beeindruckende Seestreitmacht aufzubauen, die in der Lage ist, die italienische Vorherrschaft im Mittelmeer über jede andere Marine aufrechtzuerhalten."
 ITAB_intensify_torpedo_manufacturing:0 "Intensivierung der Torpedoproduktion"
 ITAB_intensify_torpedo_manufacturing_desc:0 "Italienische Torpedos gehören zu den zuverlässigsten der Welt. Fiume war der Geburtsort des Torpedos, und mit der dortigen Fabrik und dem Werk Silurificio Italiano in Neapel verfügen wir über eine gute Grundlage, um den Einsatz dieser tödlichen Marinewaffe weiter auszuweiten."
 ITAB_expand_naval_facilities:0 "Ausbau der Marineeinrichtungen"
 ITAB_expand_naval_facilities_desc:0 "Eine erstklassige Marine braucht nicht nur eine starke Schlachtflotte, sondern auch die dafür notwendigen Häfen und Werften. Durch Investitionen in unsere Marineinfrastruktur verfügt unsere Marine im Kriegsfall über die benötigten Stützpunkte sowie die Bau- und Reparaturkapazitäten."
 ITAB_oto_naval_guns:0 "OTO-Schiffsgeschütze"
 ITAB_oto_naval_guns_desc:0 "Italien verlässt sich bei der Ausstattung seiner Großkampfschiffe auf die Firmen Ansaldo und Oderi-Terni-Orlando. Durch gezielte Investitionen in ihre Leistungsfähigkeit können wir unsere Schlachtschiffe zum Neid der Welt machen."
 ITAB_improve_overseas_naval_bases:0 "Verbesserung der Marinestützpunkte im Ausland"
 ITAB_improve_overseas_naval_bases_desc:0 "Die Modernisierung der Häfen in unseren Überseegebieten wird unserer Marine eine solide Grundlage für die Verteidigung unseres wachsenden Imperiums und die Bedrohung der Handelsrouten unserer Feinde bieten."
 ITAB_milizia_marittima_di_artiglieria:0 "Milizia Marittima di Artiglieria"
 ITAB_milizia_marittima_di_artiglieria_desc:0 "Italien verfügt über eine ausgedehnte Küste und isolierte Inselhäfen, die anfällig für Invasionen sind. Durch die Reform unserer Milizia Costiera und Investitionen in unsere Küstenverteidigung können wir sicherstellen, dass Eindringlinge einen hohen Preis zahlen."
 ITAB_supermarina:0 "Supermarina"
 ITAB_supermarina_desc:0 "Für den Oberbefehlshaber der Regia Marina sollte ein modernes Operationszentrum eingerichtet werden, um die Operationen unserer Marineformationen im gesamten Mittelmeerraum und darüber hinaus zu koordinieren."
 ITAB_stockpile_fuel:0 "Brennstoffvorrat"
 ITAB_stockpile_fuel_desc:0 "Öl ist das Blut in den Adern unserer Schiffe, ohne das die Flotte handlungsunfähig wäre. Da Italien über keine nennenswerten Ölreserven verfügt, ist es unerlässlich, Öltanks zu bauen und zu füllen, um unsere Streitkräfte auch dann zu versorgen, wenn uns künftige Konflikte von Importen abschneiden."
 ITAB_forza_navale_especiale:0 "Forza Navale Speciale"
 ITAB_forza_navale_especiale_desc:0 "Die Fähigkeit, amphibische Landungen durchzuführen, dürfte sich in jedem Konflikt im Mittelmeer als unschätzbar wertvoll erweisen. Durch die Aufstellung einer für amphibische Operationen ausgebildeten und ausgerüsteten Spezialmarine können wir an jedem Punkt der langen Mittelmeerküste unsere Macht vom Meer aus demonstrieren."
 ITAB_naval_air_coordination:0 "Marine-Luft-Koordination"
 ITAB_naval_air_coordination_desc:0 "Bisher folgte das Oberkommando der Luftwaffe seiner eigenen Doktrin und koordinierte sich nicht gut mit der Marine. Dies schränkte die Fähigkeit der Regia Marina zur effektiven Aufklärung ein. Durch die Entwicklung einer gemeinsamen Marine-Luft-Doktrin und die Optimierung der Kommunikation zwischen Marine- und Lufteinheiten können unsere Schiffe den Feind besser finden und angreifen."
 ITAB_decima_flottiglia_mas:0 "Decima Flottiglia MAS"
 ITAB_decima_flottiglia_mas_desc:0 "Teseo Tesei und Elios Toschi von der Genio Navale haben einen selbstangetriebenen Torpedo entwickelt, mit dem man in feindliche Häfen eindringen kann. Indem wir die Entwicklung dieser und anderer einzigartiger Waffen finanzieren und eine Spezialeinheit in ihrer Verwendung ausbilden, können wir möglicherweise dramatische und unerwartete Siege über unsere Feinde erringen."
 ITAB_incrociatori_leggeri:0 "Incrociatori Leggeri"
 ITAB_incrociatori_leggeri_desc:0 "Schnell und leistungsstark genug, um es mit anderen Leichten Kreuzern aufzunehmen und Zerstörer vor sich herzutreiben, aber auch günstig genug, um in großer Zahl gebaut zu werden. Leichte Kreuzer sind wichtig für den Schutz unserer Seewege und den Kampf gegen feindliche Konvois. Aufbauend auf unseren Erfahrungen mit den Condottieri-, Montecuccoli- und Garibaldi-Klassen können wir eine Kreuzerflotte aufbauen, die die Meere zwischen Europa und Afrika beherrscht."
 ITAB_incrociatori_pesanti:0 "Incrociatori Pesanti"
 ITAB_incrociatori_pesanti_desc:0 "Derzeit fehlt Italien die industrielle Basis, um genügend Schlachtschiffe zu bauen, die überall dort gleichzeitig eingesetzt werden können, wo wir sie brauchen. Durch den Bau leistungsstarker, gut gepanzerter Kreuzer wie unserer Zara-Klasse verfügen wir über die Schiffe, um in mehreren Einsatzgebieten um die Vorherrschaft auf See zu kämpfen."
 ITAB_expand_naval_intelligence:0 "Erweitern Sie den Marine-Geheimdienst"
 ITAB_expand_naval_intelligence_desc:0 "Die italienische Nachrichtenaufklärung musste jahrelang mit einem kleinen Budget auskommen und stützte sich auf die beachtlichen Talente von Giorgio Verità Poeta und Luigi Donini. Doch damit ist nicht alles getan. Indem wir sie mit mehr Personal ausstatten und neue Talente wie Leutnant Eliso Porto anwerben, erhöhen wir unsere Chancen, die Codes unserer Feinde zu knacken und die Standorte ihrer Streitkräfte zu ermitteln."
 ITAB_cooperation_programs:0 "Kooperationsprogramme"
 ITAB_cooperation_programs_desc:0 "Unsere robuste Schiffbau- und Rüstungsindustrie hat in jüngster Zeit Kriegsschiffe für andere Nationen gebaut, beispielsweise die griechischen Zerstörer der Hydra-Klasse, oder bei der Konstruktion mitgewirkt, wie etwa bei der Schiffskonstruktion der UdSSR im Rahmen des Projekts 7. Die Suche nach ähnlichen Möglichkeiten könnte dazu beitragen, unsere industrielle Basis für die bevorstehenden Tests weiterzuentwickeln."
 ITAB_cruiser_submarines:0 "Kreuzer-U-Boote"
 ITAB_cruiser_submarines_desc:0 "Um die Seewege von Feinden außerhalb des Mittelmeers anzugreifen, benötigen wir Langstrecken-U-Boote, die die Ozeane befahren können. Die weitere Unterstützung unseres umfangreichen U-Boot-Programms aus der Nachkriegszeit, das größtenteils auf der Arbeit der Ingenieure Cavallini und Bernardis basiert, wird uns helfen, dieses Ziel zu erreichen."
 ITAB_midget_submarines:0 "Kleinst-U-Boote"
 ITAB_midget_submarines_desc:0 "Die klaren Gewässer des Mittelmeers sind für größere U-Boote gefährlich. Der Bau kleiner, kurzreichweitiger und unauffälliger Boote kann ihre Überlebenschancen im Mittelmeerraum verbessern und uns die nötige Stärke verleihen, um wichtige Engpässe wie den Sizilienkanal zu überwachen."
 ITAB_cacciatorpediniere_di_scorta:0 "Cacciatorpediniere di Scorta"
 ITAB_cacciatorpediniere_di_scorta_desc:0 "Eine der Kernaufgaben der [GetAppropriateRegiaMarinaNsName] ist der Schutz der Seewege zwischen Italien, Nordafrika und unseren Mittelmeerinseln. Durch den Bau kleiner Zerstörer zur U-Boot-Abwehr und eine effektive Ausbildung der Besatzungen können wir den Nachschub unserer Streitkräfte in Übersee besser aufrechterhalten."
 ITAB_ispettorato_dei_mezzi_antisommergibili:0 "Ispettorato dei Mezzi Antisommergibili"
 ITAB_ispettorato_dei_mezzi_antisommergibili_desc:0 "Die Gründung von Mariantisom als Kommando zur U-Boot-Abwehr wird uns die organisatorischen Möglichkeiten bieten, unsere Begleitschiffe besser zu koordinieren und technologische Innovationen voranzutreiben, die uns im Kampf gegen feindliche U-Boote einen Vorteil verschaffen."
 ITAB_navi_da_battaglia:0 "Navi da Battaglia"
 ITAB_navi_da_battaglia_desc:0 "Die Schlachtschiffe der Littorio-Klasse sind schnelle und leistungsstarke Großkampfschiffe. Der Bau weiterer dieser Schiffe und die Verfeinerung unserer Doktrin für einen effektiveren Einsatz dieser Schiffe werden unsere Kampflinie erheblich verbessern."
 ITAB_proper_carriers:0 "Richtige Träger"
 ITAB_proper_carriers_desc:0 "Innovative Designer wie Luigi Gagnotto haben im letzten Jahrzehnt Flottenträgerentwürfe entworfen. Mit diesem Know-how und dem vorhandenen Rumpf des Schnelldampfers Roma (aber mit neuen, leistungsstärkeren Motoren) können wir schneller einen einsatzbereiten Träger bauen, als wenn wir ihn von Grund auf neu bauen würden."
 ITAB_refit_civilian_ships:0 "Umrüstung ziviler Schiffe"
 ITAB_refit_civilian_ships_desc:0 "Obwohl richtige Flottenflugzeugträger weitaus leistungsfähiger sind, müssen wir, wenn wir schnell Träger brauchen, Abstriche machen. Durch die Umrüstung bestehender Passagierschiffe wie Rex und Conte di Savoia können wir unsere Flotte schnell aus der Luft versorgen."
 ITAB_flotta_d_evasione:0 "Flotta d&#39;Evasione"
 ITAB_flotta_d_evasione_desc:0 "Italien hat sich zu lange damit begnügt, seine maritimen Ambitionen auf das Mittelmeer und das Rote Meer zu beschränken. Mit der Gründung einer „Breakout Fleet“ und dem Bau von Schiffen für den Atlantik und den Indischen Ozean können wir unseren Einfluss auf allen Weltmeeren geltend machen."

 ITAB_ethiopian_war_logistics_bba:0 "Äthiopische Kriegslogistik"
 ITAB_ethiopian_war_logistics_bba_desc:0 "Die mangelnden Fortschritte in Äthiopien zeigen deutlich, dass wir den tatsächlichen Bedarf einer modernen Armee unterschätzt haben. Wir müssen uns intensiv darum bemühen, die Straßen und Häfen in unseren ostafrikanischen Gebieten zu verbessern, damit die notwendigen Vorräte an die Front gelangen."
 ITAB_the_abyssinian_fiasco:0 "Das Abessinier-Fiasko"
 ITAB_the_abyssinian_fiasco_desc:0 "Unsere Invasion in Äthiopien hat sich zu einer Katastrophe entwickelt. Wieder einmal sind wir mit dem beschämenden Scheitern einer italienischen Armee konfrontiert, die es nicht geschafft hat, eine äthiopische zu besiegen. Wie unsere Vorfahren in Adua wurden wir geschlagen. Wir können nur erahnen, was eine Niederlage dieses Ausmaßes für die Zukunft des faschistischen Systems in Italien bedeutet."
 ITAB_solid_progress:0 "Solider Fortschritt"
 ITAB_solid_progress_desc:0 "Wir haben in Äthiopien stetige Fortschritte gemacht, ohne unsere Linien zu überdehnen oder unsere Streitkräfte äthiopischen Gegenangriffen auszusetzen. Der Sieg ist zwar noch nicht errungen, aber er ist nur eine Frage der Zeit."
 ITAB_struggle_in_ethiopia:0 "Kampf in Äthiopien"
 ITAB_struggle_in_ethiopia_desc:0 "Unsere Fortschritte in Äthiopien liegen weit hinter dem Zeitplan zurück, aber wir dürfen nicht zulassen, dass uns ein kleiner Rückschlag wie dieser demoralisiert. Die italienischen Waffen und das faschistische System werden sich durchsetzen – koste es, was es wolle."
 ITAB_undermine_the_duce:0 "Den Duce untergraben"
 ITAB_undermine_the_duce_desc:0 "Mussolinis wahnsinniger Wunsch, Äthiopien zu erobern, hat uns erneut an den Rand einer Niederlage geführt. Ein Sieg ist zwar immer noch möglich, aber es muss klar sein, dass dies nicht Mussolinis Sieg sein wird."
 ITAB_conspiracies_in_the_shadows:0 "Verschwörungen im Schatten"
 ITAB_conspiracies_in_the_shadows_desc:0 "In den Machtzentren wird die Unzufriedenheit mit Mussolini immer lauter. Es werden Verschwörungen geschmiedet und Allianzen zwischen Menschen geschlossen, die sonst wenig gemeinsam haben. Die Zeit für Veränderungen rückt näher."
 ITAB_servizio_informazione_militare:1 "Servizio Informazioni Militare"
 ITAB_servizio_informazione_militare_desc:0 "Unser Militär benötigt genaue Informationen, um seine Operationen planen zu können. Dafür brauchen wir eine zentrale Organisation, die diese Informationen sammelt und analysiert und bei Bedarf offensive Maßnahmen gegen ausgewählte Ziele ergreift."
 ITAB_triumph_in_africa_bba:0 "Triumph in Afrika"
 ITAB_triumph_in_africa_bba_desc:0 "Die Schande von Adwa ist getilgt. Rund 40 Jahre nach der Demütigung durch die Äthiopier haben wir endlich Rache genommen. Unsere Streitkräfte haben ihre Fähigkeiten zweifelsfrei unter Beweis gestellt, und die ganze Welt muss nun unsere Macht anerkennen!"
 ITAB_defeat_in_ethiopia_flag:0 "[ITA.GetNameDefCap] wurde in [ETH.GetNameDef] besiegt"
 ITAB_devaluate_the_lire:0 "Abwertung der Lira"
 ITAB_devaluate_the_lire_desc:1 "Der Krieg hat uns viel mehr gekostet, als uns lieb war. Unsere Wirtschaft leidet unter den Nachwirkungen. Die Abwertung unserer Währung wird unsere Produkte auf dem internationalen Markt wettbewerbsfähiger machen, aber das Leben des Durchschnittsitalieners etwas erschweren – ein notwendiges Opfer, das die Italiener gerne bringen."
 ITAB_anglo_italian_agreements:0 "Anglo-italienische Abkommen"
 ITAB_anglo_italian_agreements_desc:0 "Angesichts der neuen Realität in Ostafrika müssen sich die anderen Kolonialmächte mit uns arrangieren. Wir brauchen ihre Erlaubnis zur Durchfahrt durch den Suezkanal, aber sie brauchen uns noch viel mehr. Sollten sie sich weigern, müssen wir uns möglicherweise anderswo nach Unterstützung umsehen."
 ITAB_topple_amhara_rulers:0 "Sturz der Amhara-Herrscher"
 ITAB_topple_amhara_rulers_desc:0 "Äthiopien ist ein viel vielfältigeres und zersplitterteres Land, als die meisten glauben. Es gibt viele Gruppen, die das alte äthiopische Regime nicht unbedingt unterstützen. Mit kleinen Zugeständnissen könnten wir sie leicht auf unsere Seite ziehen und so die Befriedung der Region deutlich erleichtern."
 ITAB_the_new_emperor_of_ethiopia:0 "Der neue Kaiser von Äthiopien"
 ITAB_the_new_emperor_of_ethiopia_desc:0 "Das äthiopische Volk lebt seit Jahrhunderten unter einem Kaiser. Es würde unsere Aufgabe zweifellos wesentlich vereinfachen, wenn wir ihnen einfach einen neuen Kaiser als Nachfolger des alten präsentieren könnten, indem wir unseren König zum neuen Kaiser krönen."
 ITAB_ministero_della_cultura_popolare:0 "Ministero della Cultura Popolare"
 ITAB_ministero_della_cultura_popolare_desc:0 "Unsere Bevölkerung muss jederzeit Zugang zu genauen Informationen haben. Im Krieg können feindliche Akteure leicht Fehlinformationen verbreiten. Dem müssen wir entgegenwirken, indem wir unserer Bevölkerung die tatsächliche Version der Ereignisse vermitteln."
 ITAB_culto_del_duce:0 "Culto del Duce"
 ITAB_culto_del_duce_desc:0 "Benito Mussolini, Eroberer Afrikas und Rächer von Adua, ist zweifellos der bedeutendste italienische Staatsmann seit der Zeit der römischen Kaiser. Er verkörperte den Inbegriff von Männlichkeit und war völlig furchtlos. Wir sollten dafür sorgen, dass jeder Italiener weiß, dass er stets danach streben sollte, Mussolini so ähnlich wie möglich zu werden."
 ITAB_devotion:0 "Hingabe"
 ITAB_devotion_desc:0 "Das italienische Volk steht in großer Schuld bei Mussolini. Durch seine Willenskraft hat er es in jeder Hinsicht verbessert. Es ist ein mutigeres, reicheres und moralisch vollkommeneres Volk. Das Mindeste, was das italienische Volk im Gegenzug tun kann, ist, ihm zu danken und seinen Befehlen zu folgen."
 ITAB_legge_bottai:0 "Legge Bottai"
 ITAB_legge_bottai_desc:0 "Römische Kunst und Kultur bilden die Grundlage der gesamten modernen Kultur Europas. Wir dürfen niemals zulassen, dass diese historischen Schätze durch die Moderne ersetzt werden. Italien muss zwar stets in die Zukunft blicken, darf aber auch seine Vergangenheit nie vergessen."
 ITAB_boost_the_grand_council_of_fascism:0 "Den Großen Rat des Faschismus stärken"
 ITAB_boost_the_grand_council_of_fascism_desc:0 "Benito Mussolini hat viel für Italien getan, aber letzten Endes ist er immer noch nur ein Mensch. Sollte er das Land jemals in die Irre führen, wird der Große Rat des Faschismus da sein, um ihn aufzuhalten."
 ITAB_to_live_as_a_lion:0 "Leben wie ein Löwe"
 ITAB_to_live_as_a_lion_desc:0 "Das italienische Volk ist nicht dazu geschaffen, ein Schaf zu sein. Es ist nicht dazu bestimmt, still in der zweiten Reihe der Geschichte zu sitzen und zu kämpfen. Es ist dazu bestimmt, sein Schicksal selbst in die Hand zu nehmen! Benito Mussolini ist der Mann, der es dazu bringen wird und es daran erinnern wird, dass es besser ist, einen Tag als Löwe zu leben, als hundert Jahre als Schaf."
 ITAB_la_battaglia_del_grano:0 "La Battaglia del Grano"
 ITAB_la_battaglia_del_grano_desc:0 "Ein Land kann nicht als wirklich groß gelten, wenn es von anderen Ländern abhängig ist, um es zu ernähren. Italien muss bei der Grundversorgung mit Nahrungsmitteln unabhängig sein, wenn wir ernst genommen werden wollen. Dafür müssen wir kämpfen, und zwar so hart wie in jeder anderen Schlacht. Nur ein Sieg in der Schlacht um Getreide kann auf einen Sieg im Krieg hoffen."
 ITAB_la_battaglia_per_la_terra:0 "La Battaglia per la Terra"
 ITAB_la_battaglia_per_la_terra_desc:0 "Die Grundlage einer starken faschistischen Gesellschaft ist das Land selbst und die Menschen, die es bearbeiten. Es gibt in Italien noch viele Gebiete, in denen wir durch die Trockenlegung von Sümpfen und die Bewässerung von Ackerland Nutzland gewinnen können."
 ITAB_la_battaglia_per_le_nascite:0 "La Battaglia per le Nascite"
 ITAB_la_battaglia_per_le_nascite_desc:0 "Wenn wir unseren rechtmäßigen Platz in der Welt einnehmen wollen, müssen wir über die militärische Stärke verfügen, ihn mit Gewalt zu erobern. Dafür brauchen wir Soldaten. Es reicht nicht, wenn ein Paar ein oder zwei Kinder hat – bevor wir Kriege gewinnen können, müssen wir die Schlacht der Geburten gewinnen."
 ITAB_strengthen_the_regime:0 "Stärkung des Regimes"
 ITAB_strengthen_the_regime_desc:0 "Der Kampf um wirtschaftliche Unabhängigkeit hat gezeigt, dass der Faschismus keine schwache und sanfte Ideologie ist, wie die liberalen Regime, die ihm vorausgingen. Wir sollten dafür sorgen, dass die Menschen dies nie vergessen."
 ITAB_the_man_of_providence:0 "Der Mann der Vorsehung"
 ITAB_the_man_of_providence_desc:0 "Mussolini war nicht nur zur richtigen Zeit am richtigen Ort. Jeder Schritt wurde wie von Gott gelenkt, um sicherzustellen, dass Mussolini die Zügel Italiens zu diesem Zeitpunkt übernahm."
 ITAB_believe_obey_fight:0 "Glaube, Gehorche, Kämpfe"
 ITAB_believe_obey_fight_desc:0 "Unsere Partei wurde auf einfachen Prinzipien gegründet. Erstens: Um die Macht zu ergreifen, muss man an ihre Möglichkeit glauben. Zweitens: Um die Macht zu ergreifen, muss man den Verantwortlichen gehorchen. Drittens: Um die Macht zu ergreifen, muss man kämpfen. Und die Macht zu ergreifen ist der einzige wahre Zweck jeder politischen Bewegung, die diesen Namen verdient."
 ITAB_banda_carita:0 "Banda Carità"
 ITAB_banda_carITAB_desc:0 "Krieg ist nicht immer eine ruhmreiche Angelegenheit. Während sich die Öffentlichkeit auf die Kämpfe an den Fronten konzentriert, wissen wir, dass die Heimatfront ebenso wichtig ist und dass es ebenso notwendig ist, den Widerstand im Hinterland auszumerzen."
 ITAB_banda_koch:0 "Banda Koch"
 ITAB_banda_koch_desc:0 "Moderne Kriege sind oft eine Angelegenheit ganzer Völker. Das bedeutet, dass die Front nicht mehr der einzige Ort ist, an dem Kämpfe stattfinden. Wir müssen auch bereit sein, unsere Kommunikationswege durch den Einsatz von Kampftruppen zu sichern."
 ITAB_security_militias:0 "Sicherheitsmilizen"
 ITAB_security_militias_desc:0 "Der Einsatz von Fronttruppen zur Sicherung des Hinterlandes ist eine Verschwendung guter Soldaten. Wir sollten spezielle Einheiten zur Sicherung des Hinterlandes bilden, um mehr Soldaten für den Kampf gegen den Feind freizumachen."
 ITAB_battaglioni_d_assalto:0 "Battaglioni d&#39;Assalto"
 ITAB_battaglioni_d_assalto_desc:1 "Unsere Schwarzhemden stehen in der stolzen Tradition der Sturmtruppen des Ersten Weltkriegs. Durch ihre Integration in unsere Armee verleihen wir ihnen im Kampf eine starke Angriffskraft."
 ITAB_strengthen_the_blackshirts:0 "Stärkung der Schwarzhemden"
 ITAB_strengthen_the_blackshirts_desc:0 "Die königliche Armee ist viel zu sehr den Traditionen der alten Regime verhaftet und hat wiederholt einen beunruhigenden Mangel an faschistischem Eifer gezeigt. Es ist klar, dass wir ganze Divisionen aus unseren eigenen, loyalen Schwarzhemden brauchen."
 ITAB_milizia_coloniale:0 "Milizia Coloniale"
 ITAB_milizia_coloniale_desc:1 "Wir müssen unsere faschistischen Milizen, die Schwarzhemden, durch weitere Rekruten aus den Kolonien verstärken und erweitern, die unserem Regime treu ergeben sind. Die Rekrutierung nicht nur unter den italienischen Kolonisten, sondern auch unter der einheimischen Bevölkerung wird es uns ermöglichen, ihre Zahl deutlich zu erhöhen."
 ITAB_towards_a_greater_italy:0 "Auf dem Weg zu einem Großitalien"
 ITAB_towards_a_greater_italy_desc:1 "Der italienische Irredentismus ist die natürliche Folge des Verrats, dem die Entente das italienische Volk nach dem Ersten Weltkrieg ausgesetzt hatte. Italien hätte von Rechts wegen die vollständige Herrschaft über das Mittelmeer, und dafür müssen wir unsere Grenzen erweitern."
 ITAB_heroes_of_the_nation:0 "Helden der Nation"
 ITAB_heroes_of_the_nation_desc:1 "Wir müssen die Verdienste der großen Helden unserer Nation anerkennen und belohnen, dürfen jedoch nicht vergessen, dass ihr Potenzial ohne die weise Führung des Duce völlig vergeudet worden wäre."
 ITAB_capo_supremo:0 "Capo Supremo"
 ITAB_capo_supremo_desc:1 "Es gibt nur eine Person in Italien, die in der Lage ist, unserer großen Nation den Ruhm und die Macht zu bringen, die sie verdient. Die Zeiten der dekadenten Monarchie sind vorbei. Es ist Zeit für unseren energischen Duce, der oberste Führer Italiens zu werden."
 ITAB_bend_the_bars:0 "Biegen Sie die Stangen"
 ITAB_bend_the_bars_desc:1 "Italien befindet sich in einem Gefängnis, das die Briten nach dem Ersten Weltkrieg errichtet haben. Je größer die Bevölkerung und Macht Italiens wird, desto mehr wird es unter dieser Gefangenschaft leiden. Es ist an der Zeit, die Gitterstäbe dieses Gefängnisses zu lockern und die italienische Kontrolle weiter auszuweiten."
 ITAB_subdue_the_sentinels:0 "Bezwinge die Wächter"
 ITAB_subdue_the_sentinels_desc:1 "Der nächste Schritt in Richtung der Freiheit und des Ruhms, die das italienische Volk verdient, besteht darin, die Wächter zu unterwerfen, die uns im Mittelmeer gefangen halten, nämlich Gibraltar und Suez."
 ITAB_a_colonial_empire:0 "Ein Kolonialreich"
 ITAB_a_colonial_empire_desc:1 "Trotz der Bemühungen unserer Feinde und Rivalen ist Italien zu einem mächtigen Kolonialreich geworden. Wir müssen nicht nur sicherstellen, dass wir unsere Territorien optimal nutzen, sondern auch, dass wir die italienische Kontrolle in Afrika weiter ausbauen."
 ITAB_by_blood_alone:0 "Nur durch Blut"
 ITAB_by_blood_alone_desc:1 "Dank der Macht unserer Armee und dem grenzenlosen Fanatismus der italienischen Irredentisten, die unserem Regime treu ergeben sind, wird Italien endlich in die Annalen der Geschichte eingehen, und zwar nicht als bloßer Nebendarsteller, sondern als Hauptprotagonist. \nNur Blut bewegt die Räder der Geschichte!"
 ITAB_masters_of_the_aegean:0 "Meister der Ägäis"
 ITAB_masters_of_the_aegean_desc:1 "Wenn wir das Mittelmeer kontrollieren wollen, müssen wir zunächst Italiens absolute Vorherrschaft über die Ägäis sicherstellen. Damit kontrollieren wir nicht nur den Zugang zum Schwarzen Meer und den größten Teil der Balkanküste, sondern verfügen auch über neue Marinestützpunkte zur Sicherung des Suezkanals."
 ITAB_masters_of_the_mediterranean:0 "Meister des Mittelmeers"
 ITAB_masters_of_the_mediterranean_desc:1 "Die Macht eines Staates ist proportional zu seiner maritimen Lage. Es ist an der Zeit, die totale Kontrolle über das Mittelmeer zu beanspruchen, denn es ist das Recht des italienischen Volkes, dieses antike Meer zu beherrschen, das die Wiege unserer Zivilisation war."

 ITAB_convene_the_grand_council:0 "Einberufung des Großen Rates"
 ITAB_convene_the_grand_council_desc:0 "Wir müssen den Großen Rat des Faschismus einberufen, um zu beraten, was mit Mussolini zu tun ist. Sein jüngster Vorstoß in Äthiopien und seine Weigerung, Macht und Verantwortung zu teilen, haben viele an seinen Führungsqualitäten zweifeln lassen. Er hat seinem Land gute Dienste geleistet und ist das Gesicht des Faschismus, aber es könnte Zeit für eine neue Führung sein …"

 ITAB_foreign_affairs:0 "Auswärtige Angelegenheiten"
 ITAB_foreign_affairs_desc:1 "Jede Großmacht muss klare außenpolitische Ziele festlegen und über talentierte Leute verfügen, die darin geschult sind, ihre Diplomatie so zu gestalten, dass diese Ziele erreicht werden."
 ITAB_balkan_ambition:0 "Balkan-Ambitionen"
 ITAB_balkan_ambition_desc:1 "Es ist an der Zeit, die italienischen Grenzen nach Osten in Richtung Slowenien und vor allem an die dalmatinische Küste auszudehnen. Wir werden das venezianische Kulturerbe Dalmatiens hervorheben und der Welt zeigen, wie die venezianische Regierung in der Vergangenheit nicht nur für die Dalmatiner von Vorteil war, sondern auch von ihnen sehr akzeptiert wurde."
 ITAB_potential_allies_in_the_balkans:0 "Potentielle Verbündete auf dem Balkan"
 ITAB_potential_allies_in_the_balkans_desc:1 "Um den Balkan zu kontrollieren, müssen wir nicht alle Nationen der Region unterwerfen und beherrschen. Es ist an der Zeit, diplomatische Mittel einzusetzen, um nützliche Verbündete auf dem Balkan zu gewinnen und dann den Rest zu unterwerfen."
 ITAB_albanian_occupation:0 "Albanische Besatzung"
 ITAB_albanian_occupation_desc:1 "Albanien ist für unsere Truppen ein leichtes Ziel. Wir werden wahrscheinlich nicht auf großen Widerstand stoßen. Wir müssen der Welt die Macht Italiens zeigen und den Ruhm der Vergangenheit wiederherstellen!"
 ITAB_albanian_oil:0 "Albanisches Öl"
 ITAB_albanian_oil_desc:1 "Es ist an der Zeit, unsere veraltete Ausrüstung für die alte Ölkonzession in Albanien zu ersetzen und sie in eine starke Ölförderungsindustrie umzuwandeln, da wir nun die volle Kontrolle über das Land haben."
 ITAB_support_albanian_irredentism:0 "Unterstützen Sie den albanischen Irredentismus"
 ITAB_support_albanian_irredentism_desc:1 "Wir müssen versuchen, die italienische Herrschaft über Albanien zu legitimieren. Die Unterstützung des albanischen Irredentismus im Kosovo, in Epirus und darüber hinaus wird uns sicherlich erhebliche öffentliche Unterstützung in der lokalen Bevölkerung einbringen und uns die Möglichkeit geben, unseren Einflussbereich weiter auszudehnen."
 ITAB_albanian_fascist_militia:1 "[GetAppropriateAlbanianFascistMilitiaName]"
 ITAB_albanian_fascist_militia_default:0 "Albanische faschistische Miliz"
 ITAB_albanian_fascist_militia_alt:0 "Legaliteti Militia"
 ITAB_albanian_fascist_militia_desc:1 "Wir werden einen neuen Flügel der italienischen Schwarzhemden in Albanien gründen und dabei darauf achten, nicht nur italienische Kolonisten im Land, sondern auch albanische Freiwillige zu rekrutieren."
 ITAB_guarantee_austrian_independence:0 "Garantie der österreichischen Unabhängigkeit"
 ITAB_guarantee_austrian_independence_desc:1 "Wir können eine deutsche Einmischung in Österreich nicht tolerieren, da sie eine große Bedrohung für die italienische Nation und das Kräftegleichgewicht in Europa darstellt. Wir werden die Unabhängigkeit Österreichs garantieren und uns allen diplomatischen Manövern widersetzen, mit denen Deutschland das Land beeinflussen will."
 ITAB_negotiate_italian_claims:0 "Italienische Forderungen verhandeln"
 ITAB_negotiate_italian_claims_desc:1 "Unsere Opposition gegen Deutschland hat uns in eine Machtposition gegenüber den ehemaligen Entente-Staaten gebracht, die verzweifelt einen Bruch zwischen dem italienischen und dem deutschen Regime anstreben. Wir müssen diese Situation zu unserem Vorteil nutzen und die Kolonialbesitzungen zurückfordern, die uns nach dem Ersten Weltkrieg vorenthalten wurden."
 ITAB_peace_with_ethiopia_tt:1 "Nach den Friedensgesprächen mit §Y[ETH.GetNameWithFlag]§!:"
 ITAB_ENG_must_control_necessary_states_tt:0 "§Y[ENG.GetNameWithFlag]§! Kontrolliert nicht die historischen britischen Kolonien am Horn von Afrika und Malta."
 ITAB_FRA_must_control_necessary_states_tt:0 "§Y[FRA.GetNameWithFlag]§! Kontrolliert nicht die historischen französischen Kolonien in Dschibuti und Tunesien."
 ITAB_ratify_the_stresa_front:0 "Ratifizierung der Stresa-Front"
 ITAB_ratify_the_stresa_front_desc:1 "Italien wurden inzwischen territoriale Zugeständnisse gemacht, und so ist es an der Zeit, den Prozess einzuleiten, der Italien und Frankreich in das Militärbündnis „Stresa-Front“ einführen wird."
 ITAB_joint_military_programs:0 "Gemeinsame Militärprogramme"
 ITAB_joint_military_programs_desc:1 "Wir müssen die Zusammenarbeit zwischen Italien und unseren neuen Verbündeten sowohl im militärischen als auch im wissenschaftlichen Bereich fördern, da beide eng miteinander verbunden sind."
 ITAB_italys_destiny:0 "Italiens Schicksal"
 ITAB_italys_destiny_desc:1 "Wir werden die Rolle Italiens in diesem Bündnis festlegen: die der führenden Seemacht im Mittelmeerraum. Der nächste wichtige Schritt zur Erreichung dieses Ziels ist die Sicherung der Vorherrschaft auf dem Balkan."
 ITAB_the_eastern_threat:0 "Die Bedrohung aus dem Osten"
 ITAB_the_eastern_threat_desc:1 "Es ist kein Geheimnis, dass die aufstrebende Sowjetunion nicht nur unsere eigenen Interessen bedroht, sondern auch die aller westlichen Mächte. Wir werden die Expansionsfähigkeit unseres Landes lähmen, indem wir ihm den Zugang zu einer der reichsten Regionen verweigern, zu denen es Zugang hat: dem Schwarzen Meer."
 ITAB_german_military_cooperation:0 "Deutsche Militärzusammenarbeit"
 ITAB_german_military_cooperation_desc:1 "$ITAB_german_military_cooperation_desc$"
 ITAB_sea_wolves_bba:0 "Seewölfe"
 ITAB_sea_wolves_bba_desc:1 "$ITAB_sea_wolves_desc$"
 ITAB_secret_weapons:0 "$Geheimwaffen$"
 ITAB_secret_weapons_desc:0 "$Geheimwaffenbeschreibung$"
 ITAB_treaty_with_germany:0 "Vertrag mit Deutschland"
 ITAB_treaty_with_germany_desc:1 "$ITAB_german_rd_treaty_desc$"
 ITAB_request_control_of_french_territories:0 "Fordern Sie die Kontrolle über französische Gebiete"
 ITAB_request_control_of_french_territories_desc:1 "$ITAB_claims_on_france_desc$"
 ITAB_befriend_japan:0 "Befreunde dich mit Japan"
 ITAB_befriend_japan_desc:1 "$ITAB_japan_friend_desc$"
 ITAB_italian_irredentism:0 "Italienischer Irredentismus"
 ITAB_italian_irredentism_desc:1 "Der italienische Irredentismus ist nach dem Ersten Weltkrieg dank unseres faschistischen Regimes immer aggressiver geworden. Es ist Zeit für Italien, seine natürlichen Grenzen zu erreichen und alle Gebiete zu vereinen, die rechtmäßig dem italienischen Volk gehören!"
 ITAB_war_with_france:0 "Krieg mit [FRA.GetName]"
 ITAB_war_with_france_desc:1 "$ITAB_go_after_france_desc$"
 ITAB_war_with_greece:0 "Krieg mit Griechenland"
 ITAB_war_with_greece_desc:2 "Was für ein mächtiges Imperium werden wir, wenn wir Griechenland nicht einbeziehen? Es sollte ein leichtes Ziel sein ..."
 ITAB_war_with_the_uk:0 "Krieg mit Großbritannien"
 ITAB_war_with_the_uk_desc:1 "$ITAB_anti_uk_war_goals_desc$"
 ITAB_befriend_greece:0 "Befreunde dich mit Griechenland"
 ITAB_befriend_greece_desc:1 "$ITAB_greece_friend_desc$"
 ITAB_claims_on_turkey_bba:0 "Ansprüche an die Türkei"
 ITAB_claims_on_turkey_bba_desc:1 "$ITAB_claims_on_turkey_desc$"
 ITAB_befriend_turkey:0 "Befreunde dich mit der Türkei"
 ITAB_befriend_turkey_desc:1 "$ITAB_turkey_friend_desc$"
 ITAB_corpo_di_truppe_volontarie:0 "Corpo di Truppe Volontarie"
 ITAB_corpo_di_truppe_volontarie_desc:1 "$ITAB_support_nationalist_spain_desc$"
 ITAB_spanish_italian_alliance:0 "Spanisch-Italienische Allianz"
 ITAB_spanish_italian_alliance_desc:1 "$ITAB_spanish_italian_faction_desc$"
 ITAB_demand_balearic_islands_bba:0 "Nachfrage Balearen"
 ITAB_demand_balearic_islands_bba_desc:1 "$ITAB_demand_balearic_islands_desc$"
 ITAB_befriend_portugal:0 "Befreunde dich mit Portugal"
 ITAB_befriend_portugal_desc:1 "$ITAB_portugal_friend_desc$"
 banda_carITAB_tt:0 "Verhindert, dass Deutschland seinen Fokus §Y$GER_assassini_mussolini$§ vollendet!"
 ITAB_demand_ticino:0 "Nachfrage Tessin"
 ITAB_demand_ticino_desc:0 "Die Schweiz ist ein Bergstaat mit vielen verschiedenen Ethnien, darunter auch Italiener, die vor allem in den südlichen Kantonen des Landes, wie beispielsweise dem Tessin, leben. Um einen großen italienischen Staat zu sichern, müssen wir sicherstellen, dass alle unsere Bürger in einem Land leben können."
 ITAB_austrian_guarantees_tt:1 "Sollte Deutschland einen Anschlussversuch unternehmen, hätte Italien die Möglichkeit einzugreifen."
 ITAB_all_eth_initial_states_controlled_tt:0 "Alle ursprünglichen äthiopischen Staaten werden von §Y[ROOT.GetFlag][ROOT.GetNameDef]§! oder einem §Y[ROOT.GetAdjective]-Verbündeten§! kontrolliert."
 ITAB_fronte_militare_clandestino_modifier_tt:0 "Fügen Sie §Y$ITAB_fronte_militare_clandestino_modifier$ (Italien)§! (§Y730§! Tage) hinzu, was Folgendes gewährt: \n $MODIFIER_RESISTANCE_GROWTH_ON_OUR_OCCUPIED_STATES$: §G+10%§! \n $MODIFIER_REQUIRED_GARRISON_FACTOR$: §R+15%§! \n\n"
 ITAB_flotta_d_evasione_admiral_traits_tt:0 "Zwei zufällig ausgewählte Admirale erhalten die Eigenschaft §Y$bold$§!: \n- $MODIFIER_NAVAL_SPEED$: §G+10%§! \n- $MODIFIER_NAVAL_DAMAGE_FACTOR$: §G+5,00%§! \n\n"
 ITAB_heroes_of_the_nation_general_traits_tt:0 "\nDrei zufällig ausgewählte Generäle erhalten die Eigenschaft §Y$war_hero$§!: \n- $MODIFIER_UNIT_LEADER_PROMOTE_COST_FACTOR$: §G-50,0 %§! \n- $MODIFIER_REASSIGNMENT_DURATION_FACTOR$: §R+50,0 %§! \n\n"
 ITAB_mussolini_becomes_field_marshal_tt:0 "$ITAB_benito_mussolini$ wird Feldmarschall."

 ITAB_the_italian_liberation_war:0 "Der italienische Befreiungskrieg"
 ITAB_the_italian_liberation_war_desc:1 "Es ist an der Zeit, sich gegen die Faschisten zu erheben und ihr krankes Regime zu stürzen! Die antifaschistischen Partigiani aus ganz Italien sind bereit, in diesem nationalen Befreiungskrieg zu kämpfen und ihr Leben zu geben!"
 ITAB_fronte_militare_clandestino:0 "Geheime Militärfront"
 ITAB_fronte_militare_clandestino_desc:1 "Wir werden in jeder italienischen Stadt eine geheime Militärorganisation gründen, die den Widerstandszellen angegliedert ist und mit unseren Streitkräften in Verbindung steht, um unsere Militäroperationen und die Partisanenaktionen hinter den Frontlinien zu koordinieren."
 ITAB_corpo_volontari_della_liberta:0 "Corpo Volontari della Libertà"
 ITAB_corpo_volontari_della_liberta_desc:1 "Das Nationale Befreiungskomitee ist entschlossen, unsere militärische Koordinierungsstruktur, das Corpo Volontari della Libertà, zu stärken, um eine größere Anzahl von Partisanen und Streitkräften effizient verwalten und koordinieren zu können."
 ITAB_the_carabinieri:0 "Die Carabinieri"
 ITAB_the_carabinieri_desc:1 "Aufgrund ihrer Rolle beim Sturz des faschistischen Regimes werden die Carabinieri nun von den Faschisten angegriffen, was viele von ihnen dazu veranlasst, sich der italienischen Widerstandsbewegung anzuschließen. Wir sollten diese Einheiten dem italienischen Befreiungskorps unterstellen."
 ITAB_gappisti:0 "Gappisti"
 ITAB_gappisti_desc:1 "Wir werden die Gruppi di Azione Patriottica bilden, kleine Partisaneneinheiten, die hauptsächlich in den Städten operieren, ähnlich der französischen Résistance. Unsere Gappisti werden den Feind hinter der Front hart treffen, die Garnisonen demoralisieren und die Unterstützung der Einheimischen gewinnen."
 ITAB_partisan_republics:0 "Partisanenrepubliken"
 ITAB_partisan_republics_desc:1 "Wir werden die Bildung provisorischer Staatsgebilde in Form von Partisanenrepubliken in den von den Partisanen befreiten Gebieten fördern, um Widerstandskämpfer zu sammeln und den Feind hinter der Front zu beschäftigen."
 ITAB_the_kings_finest:0 "Das Beste des Königs"
 ITAB_the_kings_finest_desc:1 "Wir werden Spezialdivisionen aus Soldaten und Offizieren bilden, die der italienischen Krone treu ergeben sind, und sie zu den Eliteeinheiten unserer Befreiungsarmee ausbilden."
 ITAB_grande_rivolta_rurale:0 "Grande Rivolta Rurale"
 ITAB_grande_rivolta_rurale_desc:1 "Es ist Zeit, dass sich die italienische Bauernschaft unserer Sache anschließt und gegen die faschistischen Unterdrücker zu den Waffen greift. Der Feind wird in ländlichen Gebieten keine Chance mehr haben!"
 ITAB_liberation_or_death:0 "Befreiung oder Tod!"
 ITAB_liberation_or_death_desc:1 "Wir haben hart für die Befreiung des italienischen Volkes von der faschistischen Unterdrückung gekämpft. Wir haben große Verluste erlitten, aber es war nicht umsonst. Jetzt ist es an der Zeit, einen letzten Vorstoß zu unternehmen, um den Faschismus in Italien ein für alle Mal auszurotten!"
 ITAB_independence_rds:0 "Italienische Unabhängigkeit"
 ITAB_independence_rds_desc:1 "Schluss mit der Unterdrückung, der uns unsere angeblichen Verbündeten aussetzen. Die italienische Nation wird von nun an ihr eigenes Schicksal bestimmen. Wenn dafür erneut Blut vergossen werden muss, wird das stolze italienische Volk dazu bereit sein."
 ITAB_the_italian_social_republic:0 "Die Italienische Sozialrepublik"
 ITAB_the_italian_social_republic_desc:1 "Die Royalisten und andere antifaschistische Elemente in Italien haben sich verräterisch gegen unser Regime erhoben. Wir haben unsere Partei zu einer antimonarchistischen Republikanischen Faschistischen Partei reformiert und die Italienische Sozialrepublik gegründet, eine neue Inkarnation des italienischen faschistischen Staates. Wir werden dem feindlichen Angriff widerstehen und unser Land wiedervereinigen!"
 ITAB_guardia_nazionale_repubblicana:0 "Guardia Nazionale Repubblicana"
 ITAB_guardia_nazionale_repubblicana_desc:1 "Angesichts der Rolle, die die Royal Carabinieri beim Sturz des faschistischen Regimes spielten, werden wir diese Streitkräfte umgehend ersetzen. Wir haben bereits einen Plan zur Wiederherstellung der Schwarzhemden und zur Gründung einer Republikanischen Nationalgarde, die polizeiliche und militärische Aufgaben übernehmen soll."
 ITAB_integrate_polizia_dell_africa_italiana:0 "Integrieren Sie die Polizia dell&#39;Africa Italiana"
 ITAB_integrate_polizia_dell_africa_italiana_desc:1 "Wir müssen unsere Kolonialpolizei integrieren, solange diese Einheiten Italien und unserem Regime treu bleiben. Die Partisanen werden zweifellos bald versuchen, diese Truppen in ihre Gewalt zu bringen ..."
 ITAB_anti_partisan_measures:0 "Antiparteiische Maßnahmen"
 ITAB_anti_partisan_measures_desc:1 "Die feindlichen Partisanen sind in letzter Zeit außerordentlich aktiv. Sie bedrängen unsere Reserven und bedrohen unsere Nachschublinien. Wir müssen neue Einheiten einsetzen, die auf die Bekämpfung von Partisanen spezialisiert sind und diese verfluchten Banden in Schach halten."
 ITAB_all_within_the_state:0 "Alles innerhalb des Staates"
 ITAB_all_within_the_state_desc:1 "Um diesen blutigen Krieg zu gewinnen, ist es notwendig, dass jeder seinen Beitrag leistet. Doch es geht nicht nur darum, den Feind direkt zu bekämpfen. Unsere Frontlinien benötigen sowohl eine robuste Industrie und Logistik als auch Soldaten, die sie besetzen."
 ITAB_battaglioni_m:0 "Battaglioni M"
 ITAB_battaglioni_m_desc:1 "Wir brauchen neue Eliteeinheiten, um den feindlichen Angriff einzudämmen. Wir müssen die im Kampf ausgezeichneten Bataillone der Schwarzhemden umgestalten und verstärken und diese Truppen einsetzen, um die schwächsten Punkte unserer Frontlinien zu verstärken und den Feind von dort zurückzudrängen, wo er herkam."
 ITAB_reinforce_the_gustav_line:0 "Verstärken Sie die Gustav-Linie"
 ITAB_reinforce_the_gustav_line_desc:1 "Wir müssen unsere Verteidigungslinien verstärken, um den Vormarsch feindlicher Einheiten zu verhindern. Die Italienische Sozialrepublik darf jetzt nicht ins Wanken geraten!"
 ITAB_the_social_republic_prevails:0 "Die Sozialrepublik siegt!"
 ITAB_the_social_republic_prevails_desc:1 "Wir haben in diesem erbitterten Krieg, der von einer Gruppe manipulativer Verräter begonnen wurde, zu viel Blut vergossen, aber jetzt ist es an der Zeit, ihn zu beenden. Der italienische Staat wird wiedergeboren, stärker denn je!"
 ITAB_independence_rsi:0 "$ITAB_independence_rds$"
 ITAB_independence_rsi_desc:1 "$ITAB_independence_rds_desc$"

