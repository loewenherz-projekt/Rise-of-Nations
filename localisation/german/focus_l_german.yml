BRA_companhia_siderurgica_nacional_desc:0 ""
BRA_found_the_rubber_soldiers:0 "Habe die Gummisoldaten gefunden"
BRA_found_the_rubber_soldiers_desc:0 "Die Welt befindet sich im Krieg, und für moderne Kriege wird Kautschuk benötigt. Wir werden Menschen zum Kautschukabbau im Amazonasgebiet verpflichten und ihnen versprechen, sie nach Kriegsende wie Kriegshelden zu behandeln."
BRA_the_government_call:0 "Der Aufruf der Regierung"
BRA_the_government_call_desc:0 "Um eine Region zu kolonisieren, braucht man sowohl Männer als auch Frauen, aber keine Frau möchte in den Dschungel gehen und dort auf die Rückkehr eines unbekannten Mannes warten, nachdem sie wochenlang Kautschuk abgebaut hat. Deshalb werden wir Prostituierte anwerben, um ihnen ein neues Leben im Amazonasgebiet zu ermöglichen."
BRA_second_rubber_boom:0 "Zweiter Gummiboom"
BRA_second_rubber_boom_desc:0 "Unser erster Kautschukboom dauerte von 1879 bis 1912, wurde jedoch gestoppt, als die Briten unsere Kautschukbäume stahlen und begannen, sie in ihren ostasiatischen Kolonien anzupflanzen. Jetzt sind ihre Kolonien in Gefahr, und wir werden sie gerne wieder beliefern."
BRA_standard_oil_company:0 "Standard Oil Company"
BRA_standard_oil_company_desc:0 ""
BRA_texaco:0 "Texaco"
BRA_texaco_desc:0 ""
BRA_nationalize_the_oil_refineries:0 "Verstaatlichung der Ölraffinerien"
BRA_nationalize_the_oil_refineries_desc:0 ""
BRA_brazilian_universities:0 "Brasilianische Universitäten"
BRA_brazilian_universities_desc:0 ""
BRA_shelter_foreign_scientists:0 "Schutz für ausländische Wissenschaftler"
BRA_shelter_foreign_scientists_desc:0 ""
BRA_unbeatable_army:0 "Die unbesiegbare Armee"
BRA_unbeatable_army_desc:0 "Keine Nation hat es je geschafft, Brasilien zu zerstören, egal wie oft sie es versucht hat. Wir haben Uruguay nach einem langen Krieg gegen Argentinien verloren, aber seitdem kein Territorium verloren, sondern unser Territorium unzählige Male nach Westen ausgedehnt, ohne dass uns jemand entgegentreten konnte. Wir werden für immer das unbesiegbare Land Lateinamerikas bleiben!"
BRA_learnings_of_marshal_rondon:0 "Erkenntnisse von Marschall Rondon"
BRA_learnings_of_marshal_rondon_desc:0 "Marschall Rondon hat viele Jahre im Amazonasgebiet gearbeitet, Kommunikationswege aufgebaut und die Kultur der brasilianischen Ureinwohner kennengelernt. Seine Reisen werden uns helfen, in jedem Dschungel der Welt kampfbereit zu sein."
