JAP_the_manchurian_crisis:0 "Die Mandschurische Krise"
JAP_the_manchurian_crisis_desc:0 "Nordchina war schon immer das Pulverfass Asiens. Aufstände, Rebellionen und Konflikte scheinen an der Tagesordnung zu sein. Derzeit gibt es eine gefährliche Überschneidung der Einflusssphären und Ansprüche zwischen unserer Regierung und Russland. Die russische Regierung, die sich mit Macht in die chinesischen Angelegenheiten einmischen will, hat mit den Chinesen einen Vertrag über den Besitz der Eisenbahnen in der Region geschlossen und damit de facto die Kontrolle über das gesamte Gebiet erlangt. Dies steht in krassem Gegensatz zu unserer Annexion der Region im Jahr 1888, die uns von den europäischen Mächten brutal verwehrt wurde. Wir müssen entschlossen handeln, um diese Krise zu lösen, sonst drohen uns möglicherweise schwerwiegende Folgen."
JAP_protest_russian_deployment:0 "Protest gegen den russischen Truppeneinsatz"
JAP_protest_russian_deployment_desc:0 "Russland beansprucht bereits die Hegenomik über Osteuropa. Wir können nicht zulassen, dass der westliche Imperialismus nach Asien expandiert. Mit einer starken und trotzigen Haltung können wir hoffen, Russlands Interessen zu entziehen und ihm zu zeigen, dass wir nicht nur eine weitere asiatische Kleinmacht sind. Sollten sie darauf beharren, haben wir andere Lösungen im Sinn."
JAP_alliance_with_britain:0 "Bündnis mit Großbritannien"
JAP_alliance_with_britain_desc:0 "Ein Krieg mit Russland innerhalb unseres militärischen Kommandos ist derzeit unvorstellbar. Er birgt das Risiko einer westlichen Intervention und ein ähnliches Schicksal wie China während der Opiumkriege. Indem wir uns mit einer gleichgesinnten westlichen Macht verbünden, die ähnliche Motive für die Positionierung gegen Russland hat, können wir uns im asiatischen Raum völlige Bewegungsfreiheit verschaffen."
JAP_military_intervention:0 "Militärische Intervention"
JAP_military_intervention_desc:0 "Russlands Machtzentrum liegt über 6.000 Kilometer von der Mandschurei entfernt. Wir sind nur ein Sechstel davon entfernt. Wir haben einen klaren Vorteil, aber nur, wenn wir schnell und hart zuschlagen. Wir müssen die Mandschurei zum Ruhm des Kaisers sichern. Tenno Hekai, Banzai!"
JAP_the_unthinkable_victory:0 "Der undenkbare Sieg"
JAP_the_unthinkable_victory_desc:0 "Japan ist die erste asiatische Macht, die eine westliche besiegt hat. Wir haben unser Schicksal in Asien gesichert und ein mächtiges Bündnis mit ihm geschlossen. Wir stehen an der Spitze der asiatischen Hierarchie und können nun einen Sieg erringen, der undenkbar schien!"
JAP_assert_our_dominance:0 "Unsere Dominanz behaupten"
JAP_assert_our_dominance_desc:0 "Nachdem wir die Hegonomie über Nordchina erlangt haben, müssen wir uns nun für eine Aufteilung der einst umkämpften Gebiete entscheiden. Die Mandschurei war zwar schon immer rechtmäßig chinesisches Territorium, doch dieser neue Sieg bietet die Möglichkeit, dem zerfallenden Qing-Reich wertvolles Land abzunehmen."
JAP_repurpose_russian_ports:0 "Umnutzung russischer Häfen"
JAP_repurpose_russian_ports_desc:0 "Port Arthur war für die Russen lediglich ein Hafen, der ihnen Zugang zu warmen Gewässern verschaffte. Für uns ist das kein Problem. Wir können die bestehende Infrastruktur des Hafens umgestalten, um unseren Anforderungen im Schiffsbau und in der Produktion besser gerecht zu werden."
JAP_the_manchurian_question:0 "Die Mandschurische Frage"
JAP_the_manchurian_question_desc:0 "Da die Südmandschurei fest in unserem Einflussbereich liegt, wäre es möglicherweise vorteilhafter, vorübergehend einen chinesischen Marionettenstaat zu errichten, um besser mit chinesischen Banditen und der lokalen Verwaltung fertig zu werden."
JAP_befriend_western_powers:0 "Befreunden Sie sich mit den Westmächten"
JAP_befriend_western_powers_desc:0 "Wir haben uns der Welt von unserer besten Seite gezeigt, und die Reaktion im Ausland ist überrascht, oft aber auch verächtlich. Wenn wir die Arme der Freundschaft und des guten Willens ausstrecken, können wir hoffen, jegliche Gegenreaktion zu verhindern und unsere Bemühungen ungehindert von anderen europäischen Mächten fortsetzen zu können."
JAP_honorable_defeat:0 "Ehrenhafte Niederlage"
JAP_honorable_defeat_desc:0 "Die russische Macht war dem Willen unserer Soldaten zu groß. Auf der Suche nach einem ehrenvollen Frieden haben wir unsere Expansion in der Mandschurei aufgegeben, um unsere Besitzungen in Korea zu behalten. Zum Glück rechnete unser Volk nicht mit einem Sieg. Die Folgen für die Heimat sind nicht gravierend."
JAP_lick_our_wounds:0 "Leck unsere Wunden"
JAP_lick_our_wounds_desc:0 "Wir können es uns nicht leisten, in Zukunft noch einmal eine solche Niederlage zu erleiden oder wie jede andere Nation unter der europäischen Herrschaft zerstückelt zu werden. Eine sofortige Stärkung des Militärs ist erforderlich, und unser Volk muss sich seiner Pflicht gegenüber dem Staat Japan bewusst sein."
JAP_strengthen_japanese_hold_on_korea:0 "Stärkung des japanischen Einflusses auf Korea"
JAP_strengthen_japanese_hold_on_korea_desc:0 "Korea ist unser Einsatzgebiet und derzeit Schauplatz für die Angelegenheiten des asiatischen Festlands. Wir müssen das Land optimal nutzen und sicherstellen, dass unsere Truppen dort die besten Chancen haben, eine Invasion abzuwehren ... oder eine solche zu inszenieren."
JAP_take_a_backseat_in_chinese_affairs:0 "Nehmen Sie in chinesischen Angelegenheiten eine untergeordnete Rolle ein"
JAP_take_a_backseat_in_chinese_affairs_desc:0 "China hat bewiesen, dass weitere Provokationen zum vorzeitigen Untergang unseres Imperiums führen würden. Es lohnt sich – zumindest derzeit – nicht, eine aggressivere Politik gegenüber der Region zu verfolgen. Wir müssen vorerst Frieden und Sicherheit durch gegenseitige Zusammenarbeit gewährleisten."
JAP_fortify_korea:0 "Korea stärken"
JAP_fortify_korea_desc:0 "Trotz unserer jüngsten Niederlage auf dem asiatischen Kriegsschauplatz dürfen unsere ausgedehnten Besitztümer in Korea nicht ins Wanken geraten. Um unsere Besitztümer zu schützen, sind umfangreiche Befestigungen und ein industrieller Ausbau notwendig."
JAP_the_pacific_fleet:0 "Die Pazifikflotte"
JAP_the_pacific_fleet_desc:0 "Unsere Flotte im Pazifik steht potenziell großen Gegnern gegenüber. Wie uns die westlichen Mächte gezeigt haben, ist die Seemacht der Schlüssel zur Vorherrschaft. Dies müssen wir auf unserem Weg zur asiatischen Vorherrschaft erkennen. Obwohl unsere Schiffbaukapazitäten gering sind, können wir sie jederzeit an europäische Mächte auslagern, die bereit sind, uns zu unterstützen."
JAP_combat_russian_heavy_ships:0 "Bekämpfe russische schwere Schiffe"
JAP_combat_russian_heavy_ships_desc:0 "Russland verfügt über eine große Präsenz großer Großkampfschiffe in seinen Pazifikdocks. Wir können ihnen kaum direkt entgegentreten, es sei denn, wir erkennen unsere geistige, willentliche und geistesgegenwärtige Überlegenheit und können uns einen technologischen Vorsprung sichern, da die Flotten Russlands im Vergleich zu modernen Schiffskonstruktionen in den letzten Jahrzehnten deutlich gealtert sind."
JAP_genjo:0 "Genjo"
JAP_genjo_desc:0 "Genjo, der „Status Quo“, ist ein allgegenwärtiges Konzept in der japanischen Politik. Oft wird angenommen, dass man sich durch die Störung der Normalität zu einer Bedrohung macht, zu einem Grashalm, der nur darauf wartet, abgesägt zu werden. Seit der Wiedereinsetzung des Kaisers in die Meiji-Ära haben wir unermesslichen Erfolg und Reichtum erlebt. Um diese Erfolge fortzusetzen, dürfen wir in den kommenden Jahren nicht von unserem Weg abweichen."
JAP_look_elsewhere_for_expansion:0 "Suchen Sie woanders nach Expansion"
JAP_look_elsewhere_for_expansion_desc:0 ""
JAP_continue_industrial_build-up:0 "Fortführung des industriellen Aufbaus"
JAP_continue_industrial_build-up_desc:0 "Japan hat in den vergangenen Jahrzehnten seine industrielle Leistungsfähigkeit enorm gesteigert. Das bedeutet keineswegs, dass wir eine Supermacht sind, aber die Dynamik darf nicht verloren gehen. Aktuelle Pläne für den industriellen Ausbau müssen beschleunigt vorangetrieben werden, wobei insbesondere unsere Bau- und Förderkapazitäten im Vordergrund stehen."
JAP_strengthen_the_home_islands:0 "Stärkung der Heimatinseln"
JAP_strengthen_the_home_islands_desc:0 "Anstatt uns auf Expansion zu konzentrieren, müssen wir unsere Heimatinseln in eine ehrwürdige Festung verwandeln. Eine massive industrielle Sanierung. Das ist keineswegs unmöglich, da der fehlende Expansionsdrang dazu geführt hat, dass viele Ressourcen umgeleitet wurden …"
JAP_concede_our_sphere_of_influence:0 "Unseren Einflussbereich aufgeben"
JAP_concede_our_sphere_of_influence_desc:0 "Angesichts der Grenzen unserer derzeitigen Möglichkeiten haben wir uns entschieden, in bestimmten Bereichen keine Vorherrschaft mehr zu beanspruchen. Diese Entscheidung ermöglicht es uns, unsere Ressourcen und Anstrengungen auf andere Bereiche zu konzentrieren und so die Stabilität und Sicherheit unseres Landes zu gewährleisten. Wir werden es tun."
JAP_continue_the_agression_against_china:0 "Setzen Sie die Aggression gegen China fort"
JAP_continue_the_agression_against_china_desc:0 "Wir behalten unsere aggressive Haltung gegenüber China bei und verfolgen damit unsere strategischen Interessen in der Region. Durch die Fortsetzung unserer Militärkampagnen wollen wir wertvolle Ressourcen und Gebiete sichern, die unsere Position in Ostasien stärken."
JAP_deterrant_policies:0 "Abschreckungspolitik"
JAP_deterrant_policies_desc:0 "Angesichts wachsender regionaler Spannungen müssen wir zum Schutz unserer nationalen Interessen eine Reihe abschreckender Maßnahmen ergreifen. Dazu gehören die Stärkung unserer militärischen Fähigkeiten, der Aufbau strategischer Allianzen und die Entwicklung einer glaubwürdigen Abschreckungsstrategie. Damit signalisieren wir potenziellen Gegnern, dass wir auf jede Aggression gegen uns mit raschen und entschlossenen Maßnahmen reagieren werden."
JAP_intervention_in_china:0 "Intervention in China"
JAP_intervention_in_china_desc:0 "Inmitten des Chaos des Boxeraufstands haben wir beschlossen, in China zu intervenieren, um unsere Interessen zu schützen und die regionale Stabilität zu gewährleisten. Unsere Streitkräfte werden eingesetzt, um die internationale Koalition zu unterstützen und die Ordnung in der Region wiederherzustellen."

JAP_full_intervention:0 "Vollständige Intervention"
JAP_full_intervention_desc:0 "Wir verpflichten uns zu einer umfassenden Intervention in China und nutzen unsere militärische Macht, um den Boxeraufstand rasch niederzuschlagen und die Ordnung wiederherzustellen. Dieses entschlossene Vorgehen zeigt unsere Entschlossenheit, unsere Interessen zu schützen und die Stabilität in der Region zu wahren."

JAP_immediate_military_deployment:0 "Sofortiger Militäreinsatz"
JAP_immediate_military_deployment_desc:0 "Angesichts der Dringlichkeit der Lage werden wir unsere Streitkräfte unverzüglich nach China entsenden, um die internationalen Bemühungen zur Niederschlagung des Boxeraufstands zu unterstützen. Unser rasches Handeln zielt darauf ab, Frieden und Stabilität in der Region wiederherzustellen."

JAP_excuse_civilian_concessions:0 "Entschuldigen Sie zivile Zugeständnisse"
JAP_excuse_civilian_concessions_desc:0 "Um unsere militärische Intervention in China zu rechtfertigen, werden wir die Notwendigkeit anführen, unsere Zivilbevölkerung und unsere Interessen in der Region zu schützen. Dieses diplomatische Manöver ermöglicht es uns, mit Legitimität und moralischer Autorität einzugreifen."

JAP_siege_the_boxer_ports:0 "Belagern Sie die Boxerhäfen"
JAP_siege_the_boxer_ports_desc:0 "Um die Unterstützung des Boxeraufstands zu unterbinden, werden wir die von den Boxern kontrollierten Häfen belagern. Dieser strategische Schritt zielt darauf ab, ihre Streitkräfte zu schwächen und das Ende des Aufstands zu beschleunigen."

JAP_japanese_ports_of_operations:0 "Japanische Betriebshäfen"
JAP_japanese_ports_of_operations_desc:0 "Im Rahmen unserer Interventionsstrategie werden wir japanische Operationshäfen entlang der chinesischen Küste errichten. Diese Häfen werden als logistische Knotenpunkte und Stützpunkte für unsere Militäroperationen in der Region dienen."

JAP_supply_the_western_powers:0 "Versorgung der Westmächte"
JAP_supply_the_western_powers_desc:0 "Zur Unterstützung der internationalen Koalition werden wir die westlichen Mächte mit militärischer Ausrüstung, Truppen und logistischer Unterstützung versorgen. Dies unterstreicht unser Engagement für die Koalitionsbemühungen und stärkt unsere diplomatischen Beziehungen zu den westlichen Nationen."

JAP_limited_intervention:0 "Begrenzte Intervention"
JAP_limited_intervention_desc:0 "Angesichts der Komplexität des Boxeraufstands werden wir uns für eine Strategie begrenzter Intervention entscheiden. Unsere Streitkräfte werden eingesetzt, um unsere Interessen und die der Bürger in China zu schützen und gleichzeitig eine direkte Konfrontation mit den Boxern oder den chinesischen Regierungstruppen zu vermeiden."
JAP_japanese_superiority:0 "Japanische Überlegenheit"
JAP_japanese_superiority_desc:0 "Indem wir die Überlegenheit unserer Nation betonen, fördern wir das Gefühl von Nationalstolz und Einheit in unserem Volk. Diese Ideologie wird als treibende Kraft für unser weiteres Wachstum und unsere Entwicklung dienen."

JAP_divine_authority:0 "Göttliche Autorität"
JAP_divine_authority_desc:0 "Wir werden die göttliche Autorität des Kaisers anerkennen und die traditionellen Werte und Überzeugungen bewahren, die unsere Nation seit Jahrhunderten prägen. Diese Ehrfurcht vor dem Kaiser wird als einigende Kraft für unsere Gesellschaft wirken."

JAP_tool_procurement:0 "Werkzeugbeschaffung"
JAP_tool_procurement_desc:0 "Zur Unterstützung unserer industriellen und militärischen Anstrengungen werden wir der Beschaffung und Entwicklung fortschrittlicher Werkzeuge und Technologien Priorität einräumen. Dies wird unsere Produktivität steigern und unsere Landesverteidigung stärken."

JAP_imperial_universities:0 "Kaiserliche Universitäten"
JAP_imperial_universities_desc:0 "Durch die Gründung imperialer Universitäten fördern wir Bildung und Forschung in Bereichen, die für unsere nationalen Interessen von entscheidender Bedeutung sind. Diese Universitäten dienen als Zentren der Exzellenz und Innovation."

JAP_kokubo:0 "Kokubo"
JAP_kokubo_desc:0 "Inspiriert vom Konzept des Kokutai werden wir uns bemühen, den einzigartigen Charakter und Geist unserer Nation zu bewahren und zu fördern. Diese Ideologie wird unsere Politik und unser Handeln leiten und den anhaltenden Wohlstand und die Stärke unserer Nation sichern."

JAP_futher_the_ultranationalist_sentiment:0 "Die ultranationalistische Stimmung fördern"
JAP_futher_the_ultranationalist_sentiment_desc:0 "Indem wir ultranationalistische Ideale vertreten, werden wir in unserem Volk ein starkes Gefühl nationaler Identität und Nationalstolz fördern. Dies wird unser Streben nach Expansion und Dominanz in Asien beflügeln."

JAP_modern_bushido:0 "Modernes Bushido"
JAP_modern_bushido_desc:0 "Wir werden den Geist des Bushido wiederbeleben und unseren Soldaten und Bürgern einen Verhaltenskodex vermitteln, der auf Loyalität, Ehre und Selbstaufopferung basiert. Dies wird unsere Entschlossenheit und Einheit angesichts der Widrigkeiten stärken."

JAP_further_investments_in_asia:0 "Weitere Investitionen in Asien"
JAP_further_investments_in_asia_desc:0 "Angesichts der strategischen Bedeutung Asiens werden wir unsere Investitionen in der Region erhöhen. Dies stärkt nicht nur unsere wirtschaftlichen Interessen, sondern stärkt auch unseren Einfluss und unsere Macht in Asien."

JAP_officer_coup:0 "Offiziersputsch"
JAP_officer_coup_desc:0 "Als Reaktion auf die wahrgenommenen Schwächen der Regierung werden wir einen Militärputsch unter Führung loyaler Offiziere unterstützen. Dies wird eine starke und entschlossene Führung gewährleisten, die unsere Nation zu Größe führen kann."

JAP_the_young_generals_movement:0 "Die Bewegung der jungen Generäle"
JAP_the_young_generals_movement_desc:0 "Durch die Stärkung junger und ehrgeiziger Generäle fördern wir eine neue Generation militärischer Führungspersönlichkeiten, die sich für die Förderung unserer nationalen Interessen einsetzen. Dies wird unsere militärische Führung und Strategie erneuern."

JAP_national_collectivisation:0 "Nationale Kollektivierung"
JAP_national_collectivisation_desc:0 "Im Streben nach nationaler Einheit und Effizienz werden wir Maßnahmen zur Kollektivierung von Ressourcen und Industrien umsetzen. Dies wird unsere Wirtschaft rationalisieren und sicherstellen, dass die Ressourcen effektiv zum Wohle der Nation eingesetzt werden."

JAP_one_goal_under_the_rising_sun:0 "Ein Ziel unter der aufgehenden Sonne"
JAP_one_goal_under_the_rising_sun_desc:0 "Indem wir unsere Nation unter einem gemeinsamen Ziel vereinen, werden wir unser Volk dazu bringen, unter dem Symbol der aufgehenden Sonne Großes zu erreichen. Diese Zielstrebigkeit wird uns unserem Ziel als führende Macht in Asien näherbringen."

JAP_further_western_influences:0 "Weitere westliche Einflüsse"
JAP_further_western_influences_desc:0 "Wir erkennen die Vorteile westlicher Technologien und Ideen an und werden aktiv versuchen, westliche Einflüsse in unsere Gesellschaft und Wirtschaft zu integrieren. Dies wird unsere Nation modernisieren und unsere Position in der Welt stärken."

JAP_strengthen_the_cabinet:0 "Stärkung des Kabinetts"
JAP_strengthen_the_cabinet_desc:0 "Um eine effektive Regierungsführung zu gewährleisten, werden wir die Autorität und die Fähigkeiten des Kabinetts stärken. Dies wird es uns ermöglichen, mutige Entscheidungen zu treffen und Maßnahmen umzusetzen, die im besten Interesse unseres Landes sind."

JAP_western_military_advisors:0 "Westliche Militärberater"
JAP_western_military_advisors_desc:0 "Da wir die Notwendigkeit einer Modernisierung erkennen, werden wir westliche Militärberater einladen, uns bei der Ausbildung und Reform unserer Streitkräfte zu unterstützen. Ihr Fachwissen wird uns beim Aufbau einer starken und leistungsfähigen Armee helfen."

JAP_patient_reform:0 "Patientenreform"
JAP_patient_reform_desc:0 "Durch schrittweise und behutsame Reformen werden wir unsere Gesellschaft und Wirtschaft modernisieren und gleichzeitig unsere traditionellen Werte bewahren. Dieser ausgewogene Ansatz wird Stabilität und Fortschritt für unser Land sichern."

JAP_contest_the_emperors_authority:0 "Fordere die Autorität des Kaisers heraus"
JAP_contest_the_emperors_authority_desc:0 "Wir stellen die traditionelle Autorität des Kaisers in Frage und setzen uns für eine demokratischere und inklusivere Regierung ein. Dies wird die Bevölkerung stärken und zu einer gerechteren und gleichberechtigteren Gesellschaft führen."

JAP_the_new_government_legislature:0 "Die neue Regierung"
JAP_the_new_government_legislature_desc:0 "Durch die Schaffung eines neuen gesetzgebenden Organs schaffen wir eine repräsentativere und rechenschaftspflichtigere Regierung. Dadurch wird sichergestellt, dass die Stimmen des Volkes bei der Regierungsführung unseres Landes Gehör finden."

JAP_the_one_true_democracy_in_asia:0 "Die einzig wahre Demokratie in Asien"
JAP_the_one_true_democracy_in_asia_desc:0 "Als Leuchtturm der Demokratie in Asien werden wir demokratische Ideale und Institutionen in der Region fördern. Damit werden wir anderen Nationen als Vorbild dienen."

JAP_literacy_drive:0 "Alphabetisierungsaktion"
JAP_literacy_drive_desc:0 "Mit einer landesweiten Alphabetisierungskampagne wollen wir unsere Bevölkerung weiterbilden und sie befähigen, zur Entwicklung unseres Landes beizutragen. Dadurch schaffen wir eine besser informierte und qualifizierte Belegschaft, die unseren Fortschritt und Wohlstand vorantreibt."
JAP_military_academy_expansion:0 "Erweiterung der Militärakademie"
JAP_military_academy_expansion_desc:0 "Durch den Ausbau unserer Militärakademien erhöhen wir die Ausbildungskapazität und -qualität unseres Offizierskorps. So stellen wir sicher, dass unsere militärische Führung gut auf die Herausforderungen moderner Kriegsführung vorbereitet ist."

JAP_purchase_european_aircraft:0 "Kauf europäischer Flugzeuge"
JAP_purchase_european_aircraft_desc:0 "Um unsere Luftwaffe zu modernisieren, werden wir moderne Flugzeuge europäischer Hersteller anschaffen. Dies wird unsere Luftfähigkeiten verbessern und die Luftüberlegenheit in zukünftigen Konflikten sicherstellen."

JAP_first_japanese_flight_school:0 "Erste japanische Flugschule"
JAP_first_japanese_flight_school_desc:0 "Mit der Gründung der ersten japanischen Flugschule werden wir unsere Piloten im Umgang mit modernsten Flugzeugen und Taktiken ausbilden. Dies wird unsere Luftwaffe stärken und ihre Effektivität im Kampf sicherstellen."

JAP_found_the_ijaas:0 "Habe die IJAAS gefunden"
JAP_found_the_ijaas_desc:0 "Mit der Gründung der Kaiserlich Japanischen Luftstreitkräfte (IJAAS) schaffen wir einen spezialisierten Zweig der Streitkräfte, der sich ausschließlich der Luftkriegsführung widmet. Dies wird unsere militärischen Fähigkeiten stärken und unsere Vorherrschaft am Himmel sichern."

JAP_air_doctrinal_studies:0 "Luftdoktrinstudien"
JAP_air_doctrinal_studies_desc:0 "Durch die Untersuchung und Weiterentwicklung von Luftkriegsdoktrinen werden wir unsere Taktiken und Strategien für den Luftkampf verfeinern. Dadurch wird sichergestellt, dass unsere Luftwaffe gut vorbereitet ist, um unsere Bodentruppen in zukünftigen Konflikten zu unterstützen."

JAP_the_imperial_japanese_army_academy:0 "Die Kaiserlich Japanische Armeeakademie"
JAP_the_imperial_japanese_army_academy_desc:0 "Mit der Gründung der Kaiserlich Japanischen Armeeakademie werden wir unsere Offiziere in den neuesten militärischen Taktiken und Strategien ausbilden. Dadurch wird sichergestellt, dass unsere Armee für die moderne Kriegsführung gut gerüstet ist."

JAP_asian-style_army_focus:0 "Fokus auf asiatische Armeen"
JAP_asian-style_army_focus_desc:0 "Beim Aufbau einer Armee nach asiatischem Vorbild werden wir unsere Taktiken und Strategien an die besonderen Herausforderungen der Kriegsführung in der Region anpassen. Dadurch wird sichergestellt, dass unsere Armee in unterschiedlichem Gelände und unter unterschiedlichen Bedingungen effektiv ist."

JAP_jungle_training:0 "Dschungeltraining"
JAP_jungle_training_desc:0 "Durch spezielles Training für den Dschungelkrieg bereiten wir unsere Truppen auf den effektiven Einsatz in dichten tropischen Wäldern vor. Dies wird unsere Fähigkeiten in Regionen verbessern, in denen solches Gelände häufig vorkommt."

JAP_the_will_of_the_samurai:0 "Der Wille des Samurai"
JAP_the_will_of_the_samurai_desc:0 "Wir verkörpern den Geist der Samurai und vermitteln unseren Soldaten einen Ehrenkodex und Disziplin. So stellen wir sicher, dass sie trotz aller Widrigkeiten mit Tapferkeit und Entschlossenheit kämpfen."

JAP_an_army_to_match_the_great_powers:0 "Eine Armee, die den Großmächten ebenbürtig ist"
JAP_an_army_to_match_the_great_powers_desc:0 "Wir werden eine Armee aufbauen, die es mit den Großmächten der Welt aufnehmen kann, und in moderne Waffen, Ausrüstung und Ausbildung investieren. So können wir sicherstellen, dass wir unsere Interessen verteidigen und unsere Macht in der Region ausbauen können."

JAP_expand_the_tokyo_army_academy:0 "Erweiterung der Tokyo Army Academy"
JAP_expand_the_tokyo_army_academy_desc:0 "Durch den Ausbau der Tokyo Army Academy erhöhen wir ihre Kapazitäten zur Ausbildung von Offizieren für unsere wachsende Armee. Dadurch stellen wir sicher, dass wir über ein gut ausgebildetes und fähiges Offizierskorps zur Führung unserer Streitkräfte verfügen."

JAP_purchase_armored_cars:0 "Kaufen Sie gepanzerte Fahrzeuge"
JAP_purchase_armored_cars_desc:0 "Um unsere Bodentruppen zu modernisieren, werden wir Panzerwagen von ausländischen Herstellern kaufen. Dies wird unsere Mobilität und Feuerkraft auf dem Schlachtfeld verbessern und sicherstellen, dass unsere Armee eine beeindruckende Streitmacht bleibt."
JAP_our_place_in_the_pacific:0 "Unser Platz im Pazifik"
JAP_our_place_in_the_pacific_desc:0 "Wir werden unseren Einfluss im Pazifikraum geltend machen, unsere Marinepräsenz ausbauen und unsere strategische Position stärken. Dadurch stellen wir sicher, dass wir als Großmacht im Pazifik anerkannt werden."

JAP_drydock_construction:0 "Trockendockbau"
JAP_drydock_construction_desc:0 "Durch den Bau von Trockendocks für unsere Marineflotte verbessern wir unsere Fähigkeit zur Wartung und Reparatur unserer Schiffe. Dadurch stellen wir sicher, dass unsere Flotte langfristig einsatzfähig und leistungsfähig bleibt."

JAP_french_naval_advisors:0 "Französische Marineberater"
JAP_french_naval_advisors_desc:0 "Mithilfe der Expertise französischer Marineberater werden wir die Ausbildung und Taktik unserer Seestreitkräfte verbessern. Diese Zusammenarbeit wird unsere Marine stärken und unsere Fähigkeiten in der Seekriegsführung verbessern."

JAP_escort_focus:0 "Escort Fokus"
JAP_escort_focus_desc:0 "Indem wir unsere Marinestrategie auf Eskortmissionen ausrichten, werden wir dem Schutz unserer Handelsschiffe und Marinekonvois Priorität einräumen. Dies wird unsere Versorgungslinien sichern und den Ressourcenfluss unseres Landes sicherstellen."

JAP_capital_focus:0 "Kapitalfokus"
JAP_capital_focus_desc:0 "Wir werden unsere Marinebemühungen auf den Schutz unserer Hauptstadt und wichtiger Küstenstädte konzentrieren und unsere Küstenverteidigung und Marinepatrouillen verstärken. Dies wird die Sicherheit unseres Heimatlandes gegen potenzielle Bedrohungen gewährleisten."

JAP_force_projection:0 "Kraftprojektion"
JAP_force_projection_desc:0 "Durch die Verbesserung unserer Marinekapazitäten zur Machtprojektion werden wir eine Flotte aufbauen, die in der Lage ist, Macht über unsere Küsten hinaus zu projizieren. Dies wird es uns ermöglichen, unseren Einfluss geltend zu machen und unsere Interessen in fernen Gewässern zu schützen."
JAP_the_tokugawa_restoration:0 "Die Tokugawa-Restauration"
JAP_the_tokugawa_restoration_desc:0 "Inspiriert von den Idealen des Tokugawa-Shogunats werden wir eine Wiederherstellung unserer Regierung und Gesellschaft in Angriff nehmen. Dies wird unserem Land angesichts der modernen Herausforderungen Stabilität und Wohlstand sichern."

JAP_the_strength_of_the_army:0 "Die Stärke der Armee"
JAP_the_strength_of_the_army_desc:0 "Wir sind uns der Bedeutung einer starken Armee bewusst und werden weiterhin in die Modernisierung und den Ausbau unserer Streitkräfte investieren. So stellen wir sicher, dass unsere Armee auch weiterhin eine beeindruckende Streitmacht bleibt, die unser Land verteidigen kann."

JAP_continue_the_government_reforms:0 "Fortsetzung der Regierungsreformen"
JAP_continue_the_government_reforms_desc:0 "Aufbauend auf den Fortschritten der vergangenen Reformen werden wir unsere Regierung weiter modernisieren und stärken. So stellen wir sicher, dass wir über ein robustes und effizientes System verfügen, das den Herausforderungen der modernen Welt gewachsen ist."

# EVENTS
########### Japan Events Localisation ###########
dnc_japan.1.t:0 "Druck der Marine auf den Kaiser wegen der Mandschurei"
dnc_japan.1.d:0 "Angesichts der wachsenden russischen Ambitionen im japanischen Einflussbereich hat die Marine dem Imperium einen Präventivschlag gegen den Zaren vorgeschlagen, um den Überraschungseffekt gegen die verdammten Russen zu nutzen. Obwohl es zwischen Marine und Armee heftige Auseinandersetzungen gab, liegt die Entscheidung letztlich beim Kaiser selbst. Eine Entscheidung, die die Zukunft des Imperiums maßgeblich beeinflussen könnte, liegt auf seinem Schreibtisch. Letztendlich entschied er …"
dnc_japan.1.a:0 "Erklären Sie sofort den Krieg. Wir müssen zuerst zuschlagen!"
dnc_japan.1.b:0 "Warten Sie auf die Russen. Wenn sie kämpfen wollen, werden wir kämpfen, sonst nicht."
dnc_japan.3.t:0 "Das Russische Reich kapituliert"
dnc_japan.3.d:0 "Nach einer Reihe von Schlachten auf der Halbinsel Liaodong, die zur Vertreibung der russischen Armeen aus der südlichen Mandschurei führten, und der Schlacht von Tsushima, die für die Kaiserlich Russische Marine eine Katastrophe bedeutete, kann der russisch-japanische Krieg endlich ein Ende finden, wenn man die Kapitulation Russlands akzeptiert."
dnc_japan.3.a:0 "Wir haben gewonnen, lasst uns ihre Kapitulation annehmen."
dnc_japan.3.b:0 "Der Krieg ist noch nicht vorbei. Kämpft weiter!"
dnc_japan.4.t:0 "Die Mandschurische Krise"
dnc_japan.4.d:0 "Die Mandschurei wurde uns 1888 einmal verweigert. Jetzt versuchen die Russen, die Region ohne Widerstand zu erobern. China hat sich den russischen Eisenbahnunternehmen gebeugt und den Hafen Arthur lukrativ an sie verpachtet. Die chinesischen Schoßhündchen sind uns egal. Unsere derzeitige Militärführung steht an einem Scheideweg. Einige sind äußerst zögerlich. Allein die russische Pazifikflotte übertrifft unsere Überwasserflotte um ein Vielfaches, und die russischen Bodentruppen in der Mandschurei zählen Hunderttausende. Ein Krieg in diesem Stadium wäre idiotisch.\n\nEinige, darunter auch Meiji selbst, glauben jedoch, dass wir mit der richtigen Positionierung, Planung und dem Geist der Samurai die russischen Barbaren besiegen und mit schnellen Siegen Frieden schaffen können. Darüber hinaus brennt unser Volk auf einen Krieg und erhält überwältigende Unterstützung, um unsere Macht im Feld zu beweisen und uns als wahre Vormacht in Asien zu etablieren, was mit dieser Kriegsgelegenheit durchaus möglich wäre."
dnc_japan.4.a:0 "Die Mandschurei wird uns gehören."
dnc_japan.5.t:0 "Japan erhebt diplomatischen Protest!"
dnc_japan.5.d:0 "Der junge Staat Japan versucht schon seit einiger Zeit, seine eigene asiatische Hegenomie zu errichten. Unsere sich überschneidenden Ansprüche in Nordchina haben uns nie wirklich beunruhigt. Japan scheint jedoch mit der Eskalation der Situation zufrieden zu sein und hat gegen die rechtmäßige Besetzung unserer wichtigen Eisenbahnstrecken in der Region durch unsere Truppen protestiert. Dies könnte sich für uns leicht zu einer gefährlichen Situation entwickeln und möglicherweise einen Krieg in unseren fernöstlichen Besitzungen auslösen. Dies wäre nicht ideal, da unser unvollständiges Infrastrukturnetz und unser unterdurchschnittliches Schienennetz jegliche Kriegsanstrengungen in der Region erheblich behindern würden. Japan verfügt außerdem über eine schlagkräftige Marine, die sogar unserer in Port Arthur Konkurrenz machen könnte."
dnc_japan.5.a:0 "Wir können keinen Krieg riskieren!"
dnc_japan.5.b:0 "Wie wäre es, wenn DU dich entspannst?!"
dnc_japan.6.t:0 "Japanische Zusammenarbeit?"
dnc_japan.6.d:0 "Die japanische Botschaft hat kürzlich einen interessanten diplomatischen Schachzug unternommen. Sie hat sich einem Bündnis angeschlossen, mit der geheimen Absicht, gegen Russland vorzugehen. Die russische Expansion im Osten, so der japanische Botschafter, „bedrohe die japanische Souveränität“ und verstoße eindeutig gegen frühere Verträge mit China. Sollten wir zustimmen, hätte Japan die Möglichkeit, in die russische Expansion einzugreifen – eine potenziell vorteilhafte Situation für uns im europäischen Gleichgewichtsspiel."
dnc_japan.6.a:0 "Unterzeichnen Sie den Vertrag. Die russische Expansion muss gestoppt werden."
dnc_japan.6.b:0 "Wir haben keine Zeit für frivole asiatische Angelegenheiten."
dnc_japan.7.t:0 "Linien im Sand"
dnc_japan.7.d:0 "Da Russland unseren koreanischen Anspruch akzeptiert und sich aus der Mandschurei zurückgezogen hat, können wir nun frei über das Schicksal der Gebiete entscheiden, die wir rechtmäßig beanspruchen. Die Qing-Regierung erwartet von uns, dass wir ihr verlorene Gebiete zurückgeben und lediglich unseren Anspruch in Korea anerkennen. Der schwache und verarmte Qing-Staat würde jedoch wenig tun, um die Annexion von Port Arthur zu verhindern. Darüber hinaus gibt es in China Kooperationswillige, die den Sturz der Qing-Regierung versprechen. Dies könnte eine Chance für eine chinesische Marionette sein."
dnc_japan.7.a:0 "Setzen Sie einfach unsere Herrschaft in Korea durch."
dnc_japan.7.b:0 "Beanspruchen Sie Port Arthur."
dnc_japan.7.c:0 "Annexion der gesamten Region."
dnc_japan.8.t:0 "Japan wünscht sich Nichtangriffspakt"
dnc_japan.8.d:0 "Angesichts der jüngsten Niederlagen scheint die japanische Nation einen sicheren Frieden mit unserem Land anzustreben und verweist auf eine „gefährliche und kostspielige Entwicklung in China“. Japan hat außerdem die Gelegenheit genutzt, seine militärische Präsenz in Korea auszubauen und seine Rüstungsindustrie zu entwickeln. Daher wäre es möglicherweise klug, diesem Plan zu folgen."
dnc_japan.8.a:0 "Wir streben keinen weiteren Krieg mit Japan an."
dnc_japan.8.b:0 "Ein Nichtangriffspakt liegt derzeit nicht in unserem besten Interesse."
dnc_japan.9.t:0 "Die Philippinen suchen Schutz"
dnc_japan.9.d:0 "Nach dem Sieg der Philippinen gegen die Amerikaner hat die philippinische Regierung Schutz vor ausländischen Mächten gesucht und ist zu uns gekommen, um Garantien zu verlangen und uns die Stationierung von Truppen auf philippinischem Territorium zu gestatten."
dnc_japan.9.a:0 "Unser Verbündeter auf den Philippinen"

dnc_japan.10.t:0 "Angriffe des Widerstands in Taiwan"
dnc_japan.10.d:0 "In unserer Kolonie Taiwan haben chinesische und taiwanesische Terroristen und Nationalisten Garnisonen angegriffen und Infrastruktur zerstört. Es ist möglich, dass die chinesische Regierung die Terroristen mit Ausrüstung und Personal unterstützt hat."
dnc_japan.10.a:0 "Schicken Sie Soldaten auf die Insel"




