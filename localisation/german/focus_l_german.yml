SER_support_the_obrenovic:0 "Unterstützen Sie die Obrenović"
SER_support_the_obrenovic_desc:0 "Bekräftigen Sie Ihre Unterstützung für die herrschende Obrenović-Dynastie."
SER_appease_the_public:0 "Beschwichtigen Sie die Öffentlichkeit"
SER_appease_the_public_desc:0 "Gehen Sie auf die Beschwerden und Bedenken der Öffentlichkeit ein, indem Sie politische Zugeständnisse machen."
SER_7_day_censorship:0 "7-tägige Zensur"
SER_7_day_censorship_desc:0 "Führen Sie vorübergehende Zensurmaßnahmen zur nationalen Sicherheit ein."
SER_appoint_newer_ministers:0 "Neue Minister ernennen"
SER_appoint_newer_ministers_desc:0 "Ernennen Sie neue Minister, um die Regierung wiederzubeleben."
SER_arrest_disloyal_generals:0 "Verhaftung illoyaler Generäle"
SER_arrest_disloyal_generals_desc:0 "Gehen Sie gegen illoyale Militäroffiziere vor, die die Stabilität bedrohen."
SER_organize_the_armies:0 "Organisieren Sie die Armeen"
SER_organize_the_armies_desc:0 "Reorganisieren und modernisieren Sie die Streitkräfte, um ihre Einsatzbereitschaft zu erhöhen."
SER_unification_under_obrenovic:0 "Vereinigung unter Obrenović"
SER_unification_under_obrenovic_desc:0 "Förderung der nationalen Einheit unter der Führung der Obrenović-Dynastie."
SER_grant_funds_to_artisans:0 "Zuschussmittel für Handwerker"
SER_grant_funds_to_artisans_desc:0 "Bieten Sie dem Kunsthandwerk finanzielle Unterstützung und Anreize."
SER_dicuss_austrian_investments:0 "Diskutieren Sie österreichische Investitionen"
SER_dicuss_austrian_investments_desc:0 "Gespräche über mögliche österreichische Investitionen in Serbien aufnehmen."
SER_draw_closer_to_vienna:0 "Wien näher kommen"
SER_draw_closer_to_vienna_desc:0 "Stärkung der diplomatischen und wirtschaftlichen Beziehungen zu Wien."
SER_invite_franz_joseph:0 "Franz Joseph einladen"
SER_invite_franz_joseph_desc:0 "Laden Sie Franz Joseph zu einem Besuch in Serbien ein."
SER_ban_democratic_parties:0 "Verbot demokratischer Parteien"
SER_ban_democratic_parties_desc:0 "Ergreifen Sie Maßnahmen zum Verbot demokratischer politischer Parteien."
SER_increase_trade_with_germany:0 "Ausweitung des Handels mit Deutschland"
SER_increase_trade_with_germany_desc:0 "Ausbau der Handelsbeziehungen und der wirtschaftlichen Zusammenarbeit mit Deutschland."
SER_the_brainwash_program:0 "Das Gehirnwäsche-Programm"
SER_the_brainwash_program_desc:0 "Initiieren Sie ein Programm zur Beeinflussung der öffentlichen Meinung durch Medien und Bildung."
SER_central_power_mediation:0 "Vermittlung der Zentralmacht"
SER_central_power_mediation_desc:0 "Erleichterung der Vermittlungsbemühungen zwischen den Mittelmächten zur Gewährleistung regionaler Stabilität."
SER_tyrol_constantinople_railway:0 "Tirol-Konstantinopel-Eisenbahn"
SER_tyrol_constantinople_railway_desc:0 "Planen Sie den Bau einer Eisenbahnstrecke zwischen Tirol und Konstantinopel."
SER_destroy_montenegrin_sovereignty:0 "Zerstören Sie die montenegrinische Souveränität"
SER_destroy_montenegrin_sovereignty_desc:0 "Untergrabung der montenegrinischen Souveränität durch politische und militärische Aktionen."
SER_befriend_bulgaria:0 "Befreunde dich mit Bulgarien"
SER_befriend_bulgaria_desc:0 "Pflegen Sie freundschaftliche Beziehungen und Bündnisse mit Bulgarien."
SER_formalize_central_powers_admission:0 "Formalisierung des Beitritts der Mittelmächte"
SER_formalize_central_powers_admission_desc:0 "Festigung der Aufnahme und Integration Serbiens in das Bündnis der Mittelmächte."
SER_our_first_fleet:0 "Unsere erste Flotte"
SER_our_first_fleet_desc:0 "Legen Sie den Grundstein für die erste Marineflotte Serbiens."
SER_austrian_admirals:0 "Österreichische Admirale"
SER_austrian_admirals_desc:0 "Nutzen Sie die Expertise und Beratung österreichischer Admirale für die Entwicklung der Marine."
SER_german_scientists:0 "Deutsche Wissenschaftler"
SER_german_scientists_desc:0 "Gewinnen Sie deutsche Wissenschaftler, um die technologische Forschung und Innovation voranzutreiben."
KOR_with_independence_club:0 "Mit Independence Club"
KOR_with_independence_club_desc:0 "Der koreanische Unabhängigkeitsclub ist eine treibende Kraft in der Bewegung für nationale Souveränität und Modernisierung. Durch die Ausrichtung auf seine Prinzipien will Korea seine nationale Identität stärken und die Agenda für Selbstbestimmung und Reformen vorantreiben. Dieser Fokus wird die nationale Einheit und die Entschlossenheit zur Unabhängigkeit stärken."
KOR_independence_club:0 "Koreanischer Unabhängigkeitsclub"
KOR_independence_club_desc:0 "Der Korean Independence Club wurde Ende des 19. Jahrhunderts mit dem Ziel gegründet, die Unabhängigkeit und Modernisierung Koreas zu fördern. Er spielte eine entscheidende Rolle bei der Förderung von Reformen und der Abwehr ausländischer Einflüsse in Korea."
KOR_return_of_seojaepil:0 "Rückkehr von Seo Jae-pil"
KOR_return_of_seojaepil_desc:0 "Seo Jae-pil, eine Schlüsselfigur im Kampf um koreanische Unabhängigkeit und Modernisierung, ist aus dem Exil zurückgekehrt. Seine Führungsstärke und Erfahrung sind für unser Land von unschätzbarem Wert. Seine Rückkehr wird die nationale Moral stärken und unsere politischen und sozialen Reformen deutlich voranbringen."

KOR_accept_of_article_vi_act:0 "Annahme des Artikel-VI-Gesetzes"
KOR_accept_of_article_vi_act_desc:0 "Die Verabschiedung des Artikel-VI-Gesetzes markiert einen bedeutenden Schritt in der koreanischen Gesetzgebungsgeschichte. Dieses Gesetz befasst sich mit wichtigen Fragen der Regierungsführung, Transparenz und Bürgerrechte und legt den Grundstein für eine gerechtere und verantwortungsvollere Verwaltung. Seine Umsetzung wird für die Modernisierung Koreas von entscheidender Bedeutung sein."

KOR_construction_of_Hansung_court_begins:0 "Baubeginn des Hansung Court"
KOR_construction_of_Hansung_court_begins_desc:0 "Der Bau des Hansung-Gerichts ist ein Großprojekt und symbolisiert Koreas Engagement für ein modernes Justizsystem. Dieses neue Gericht wird ein Eckpfeiler unserer Bemühungen sein, die Rechtsstaatlichkeit aufrechtzuerhalten und allen Bürgern Gerechtigkeit zu gewährleisten."

KOR_real_democray:0 "Echte Demokratie"
KOR_real_democray_desc:0 "Im Streben nach echter Demokratie führt Korea Reformen durch, um freie und faire Wahlen zu gewährleisten, die bürgerlichen Freiheiten zu stärken und die politische Teilhabe zu fördern. Dieser Fokus wird uns einer wirklich demokratischen Gesellschaft näherbringen, in der die Stimme aller Bürger gehört und respektiert wird."

KOR_conservative_reformed_mixed:0 "Konservative Reformen"
KOR_conservative_reformed_mixed_desc:0 "Korea setzt konservative Reformen um, die unser kulturelles Erbe respektieren und gleichzeitig notwendige Veränderungen ermöglichen. Ziel dieser Reformen ist die Modernisierung unserer Institutionen und die Verbesserung der Lebensqualität aller Koreaner."

KOR_destiny_of_badguys:0 "Schicksal der Opposition"
KOR_destiny_of_badguys_desc:0 "Die oppositionellen Kräfte in Korea spielen in unserer politischen Landschaft eine umstrittene Rolle. Dieser Schwerpunkt wird sich mit ihrem Einfluss befassen und ihre Zukunft bestimmen, sei es durch Integration, Unterdrückung oder andere Mittel. Das Schicksal dieser Gruppen wird den Weg der Nation in die Zukunft prägen."

KOR_second_elections:0 "Zweite Wahlen"
KOR_second_elections_desc:0 "Korea bereitet sich auf die zweite Wahlrunde vor, einen entscheidenden Schritt auf unserem Weg zur Demokratie. Diese Wahlen werden die Widerstandsfähigkeit unserer demokratischen Institutionen und den Willen des Volkes auf die Probe stellen. Die Gewährleistung eines fairen und transparenten Prozesses ist für die Legitimation unserer Regierungsführung von größter Bedeutung."

KOR_set_eight_province:0 "Set Acht Provinzen"
KOR_set_eight_province_desc:0 "Korea führt derzeit eine umfassende Verwaltungsreform durch und legt die Grenzen und Verwaltungsstrukturen der acht Provinzen fest. Ziel dieser Reorganisation ist es, die lokale Verwaltung zu verbessern, die Verwaltungseffizienz zu steigern und eine gerechte Entwicklung im ganzen Land sicherzustellen."

KOR_criminal_acts:0 "Reform der Straftaten"
KOR_criminal_acts_desc:0 "Die Reform des Strafrechtssystems ist für die Aufrechterhaltung von Recht und Ordnung in Korea von entscheidender Bedeutung. Ziel ist es, veraltete Gesetze zu überarbeiten, die Effizienz der Strafverfolgung zu verbessern und eine faire und zügige Rechtsprechung sicherzustellen. Dadurch wird das Vertrauen der Öffentlichkeit in das Rechtssystem gestärkt."

KOR_ministers_change:0 "Ministerwechsel"
KOR_ministers_change_desc:0 "Eine Umbildung im Ministerkabinett ist im Gange und bringt neue Gesichter und Ideen in die Regierung. Ziel dieser Veränderung ist es, unsere Verwaltung zu stärken, aktuelle Herausforderungen effektiver anzugehen und unsere Politik an die sich entwickelnden Bedürfnisse der Nation anzupassen."

KOR_land_reform_continued:0 "Fortgesetzte Landreform"
KOR_land_reform_continued_desc:0 "Korea setzt seine Bemühungen um eine Landreform fort und setzt Maßnahmen zur gerechteren Landverteilung, zur Verbesserung der landwirtschaftlichen Produktivität und zur Sicherung des wirtschaftlichen Wohlstands ländlicher Gemeinden um. Diese Reformen sind entscheidend für die Erreichung sozialer Gerechtigkeit und wirtschaftlicher Stabilität."

KOR_constitution:0 "Ausarbeitung der Verfassung"
KOR_constitution_desc:0 "Korea steht vor der historischen Aufgabe, eine neue Verfassung auszuarbeiten. Dieses grundlegende Dokument wird unsere demokratischen Werte festschreiben, die Struktur unserer Regierung definieren und die Rechte aller Bürger schützen. Die Verfassung wird ein Eckpfeiler für die Zukunft unseres Landes sein."
rajdnc_invite_british_investors:0 "Laden Sie britische Investoren ein"
rajdnc_invite_british_investors_desc:0 "Um die Wirtschaft anzukurbeln, laden wir britische Investoren ein, ihr Kapital in indische Unternehmen zu investieren. Ziel dieser Initiative ist die Modernisierung unserer Industrie und Infrastruktur, die Schaffung von Arbeitsplätzen und die Förderung des Wirtschaftswachstums."

rajdnc_indian_national_congress:0 "Indischer Nationalkongress"
rajdnc_indian_national_congress_desc:0 "Der Indische Nationalkongress ist zu einer zentralen Kraft in der politischen Landschaft unseres Landes geworden. Er tritt für mehr Selbstverwaltung ein und geht auf die Anliegen der indischen Bevölkerung ein. Er versucht, unterschiedliche Gruppen unter dem gemeinsamen Ziel des indischen Nationalismus zu vereinen."

rajdnc_a_free_market:0 "Ein freier Markt"
rajdnc_a_free_market_desc:0 "Wir fördern eine freie Marktwirtschaft und wollen Unternehmertum und Wettbewerb fördern. Durch den Abbau von Regulierungen und Zöllen hoffen wir, eine dynamischere und effizientere Wirtschaft zu schaffen, die allen Teilen der Gesellschaft zugutekommt."

rajdnc_maintian_the_crops:0 "Pflegen Sie die Pflanzen"
rajdnc_maintian_the_crops_desc:0 "Die Landwirtschaft bildet nach wie vor das Rückgrat unserer Wirtschaft. Dieser Schwerpunkt unterstreicht die Bedeutung der Erhaltung und Verbesserung der Ernteerträge durch verbesserte Anbautechniken, Bewässerung und Unterstützung der Landwirte, um Ernährungssicherheit und wirtschaftliche Stabilität zu gewährleisten."

rajdnc_anti_british_stance:0 "Antibritische Haltung"
rajdnc_anti_british_stance_desc:0 "Die wachsende Unzufriedenheit mit der britischen Herrschaft hat zu einer antibritischen Stimmung in der indischen Bevölkerung geführt. Dieser Fokus stellt eine Verschiebung hin zu Widerstand und Opposition dar, die sich für die Rechte und die Unabhängigkeit des indischen Volkes einsetzen."

rajdnc_pro_british_stance:0 "Pro-britische Haltung"
rajdnc_pro_british_stance_desc:0 "Wir behalten unsere pro-britische Haltung bei und versuchen, unsere Beziehungen zum Britischen Empire zu stärken. Dieser Ansatz legt den Schwerpunkt auf Zusammenarbeit und gegenseitigen Nutzen und zielt darauf ab, die britische Unterstützung für wirtschaftliche Entwicklung und Modernisierung zu nutzen."

rajdnc_protest_in_the_streets:0 "Protest auf der Straße"
rajdnc_protest_in_the_streets_desc:0 "Die Unzufriedenheit mit der Kolonialpolitik hat zu weitverbreiteten Protesten geführt. Dieser Fokus verdeutlicht die wachsende Unruhe und die Forderung nach politischen und sozialen Reformen und spiegelt die Stimme der Bevölkerung wider, die nach Veränderung ruft."

india.2:0 "Ein neues Jahrhundert für Indien"
india.2_desc:0 "Zu Beginn des 20. Jahrhunderts steht Indien an einem Wendepunkt. Die Entscheidungen, die wir jetzt treffen, prägen die Zukunft unseres Landes. Dieser Fokus steht für die Chancen und Herausforderungen, die auf unserem Weg nach Fortschritt und Selbstbestimmung vor uns liegen."

rajdnc_improve_the_trade_routes:0 "Verbesserung der Handelsrouten"
rajdnc_improve_the_trade_routes_desc:0 "Die Verbesserung unserer Handelsrouten ist für die Förderung des Handels und die Anbindung Indiens an die Weltmärkte von entscheidender Bedeutung. Ziel ist die Verbesserung unserer Verkehrsinfrastruktur, um den Handel effizienter und wirtschaftlicher zu gestalten."

rajdnc_draw_in_foreign_trade:0 "Unentschieden im Außenhandel"
rajdnc_draw_in_foreign_trade_desc:0 "Durch die Ankurbelung des Außenhandels wollen wir Indien in die Weltwirtschaft integrieren. Die Förderung von Exporten und Importen wird das Wirtschaftswachstum ankurbeln, Arbeitsplätze schaffen und den Zugang zu einem breiteren Angebot an Waren und Dienstleistungen ermöglichen."

rajdnc_invite_foreign_investors:0 "Laden Sie ausländische Investoren ein"
rajdnc_invite_foreign_investors_desc:0 "Über britisches Kapital hinaus öffnen wir unsere Türen für Investoren aus aller Welt. Ziel dieses Schwerpunkts ist es, ausländische Investitionen in verschiedene Wirtschaftssektoren zu locken und so Innovation und Entwicklung zu fördern."

rajdnc_strengthen_the_civilian_industry:0 "Stärkung der zivilen Industrie"
rajdnc_strengthen_the_civilian_industry_desc:0 "Die Stärkung unserer zivilen Industrie ist für unsere wirtschaftliche Unabhängigkeit von entscheidender Bedeutung. Dieser Schwerpunkt wird die Produktionskapazitäten verbessern, lokale Unternehmen unterstützen und die Abhängigkeit von ausländischen Importen verringern."

rajdnc_birth_of_the_tata_steel_works:0 "Geburt der Tata Steel Works"
rajdnc_birth_of_the_tata_steel_works_desc:0 "Die Gründung der Tata Steel Works markiert einen bedeutenden Meilenstein in der Industrialisierung Indiens. Dieser Schwerpunkt würdigt die Geburt einer bedeutenden Industrie, die eine entscheidende Rolle für unsere wirtschaftliche Entwicklung und Modernisierung spielen wird."

rajdnc_economic_reforms:0 "Wirtschaftsreformen"
rajdnc_economic_reforms_desc:0 "Mit umfassenden Wirtschaftsreformen wollen wir unsere Finanzsysteme modernisieren, die Korruption bekämpfen und nachhaltiges Wachstum fördern. Diese Reformen werden zu einer robusteren und widerstandsfähigeren Wirtschaft führen."

rajdnc_clean_out_the_water:0 "Reinigen Sie das Wasser"
rajdnc_clean_out_the_water_desc:0 "Der Zugang zu sauberem Wasser ist für die öffentliche Gesundheit und die Landwirtschaft von entscheidender Bedeutung. Im Mittelpunkt stehen dabei die Reinigung und der Schutz unserer Wasserquellen, die Bekämpfung von Verschmutzungsproblemen und die Verbesserung der Lebensqualität unserer Bürger."

rajdnc_prevent_a_risk_of_famine:0 "Verhindern Sie eine Hungersnot"
rajdnc_prevent_a_risk_of_famine_desc:0 "Hungersnöte stellen weiterhin eine ständige Bedrohung dar. Ziel dieses Schwerpunkts ist die Umsetzung von Maßnahmen zur Vermeidung von Nahrungsmittelknappheit, beispielsweise durch die Verbesserung landwirtschaftlicher Praktiken, den Aufbau von Nahrungsmittelreserven und die Unterstützung gefährdeter Gemeinschaften."

rajdnc_educational_reforms:0 "Bildungsreformen"
rajdnc_educational_reforms_desc:0 "Die Reform unseres Bildungssystems ist für den Fortschritt unseres Landes von entscheidender Bedeutung. Dieser Schwerpunkt wird den Zugang zu Bildung verbessern, die Lehrplanstandards verbessern und in die Lehrerausbildung investieren, um der nächsten Generation eine bessere Zukunft zu sichern."

rajdnc_employ_new_graduates:0 "Stellen Sie neue Absolventen ein"
rajdnc_employ_new_graduates_desc:0 "Die Schaffung von Arbeitsplätzen für Hochschulabsolventen ist für wirtschaftliches Wachstum und soziale Stabilität von entscheidender Bedeutung. Dieser Schwerpunkt fördert Initiativen, die Hochschulabsolventen Beschäftigungsmöglichkeiten bieten und so Innovation und Produktivität fördern."

rajdnc_the_economic_path:0 "Der wirtschaftliche Weg"
rajdnc_the_economic_path_desc:0 "Die Wahl des richtigen wirtschaftlichen Weges ist für Indiens Zukunft von entscheidender Bedeutung. Dieser Fokus stellt einen strategischen Ansatz für die wirtschaftliche Entwicklung dar, der ein Gleichgewicht zwischen industriellem Wachstum, landwirtschaftlicher Nachhaltigkeit und sozialem Wohlstand herstellt."

rajdnc_continue_down_the_agrarian_path:0 "Den Agrarweg weiterverfolgen"
rajdnc_continue_down_the_agrarian_path_desc:0 "Die Landwirtschaft bleibt das Fundament unserer Wirtschaft. Dieser Schwerpunkt wird den Agrarsektor weiterhin unterstützen und weiterentwickeln und so die Ernährungssicherheit, die ländliche Entwicklung und die Lebensgrundlage von Millionen von Landwirten gewährleisten."

rajdnc_a_modernized_industry:0 "Eine modernisierte Industrie"
rajdnc_a_modernized_industry_desc:0 "Die Modernisierung unserer Industrie ist für den wirtschaftlichen Fortschritt von entscheidender Bedeutung. Dieser Schwerpunkt wird die Einführung neuer Technologien vorantreiben, die Produktionskapazitäten verbessern und Indien als wettbewerbsfähigen Akteur auf dem Weltmarkt positionieren."

COL_1900_panama_question:0 "Die Panama-Frage"
COL_1900_panama_question_desc:0 "Die Panama-Frage stellt für Kolumbien eine große Herausforderung dar, da sie die nationale Integrität mit der regionalen Autonomie in Einklang bringen muss. Dieser Schwerpunkt befasst sich mit den komplexen politischen, wirtschaftlichen und sozialen Auswirkungen des Status Panamas innerhalb Kolumbiens."

COL_1900_give_independence:0 "Gewähren Sie Panama die Unabhängigkeit"
COL_1900_give_independence_desc:0 "Die Unabhängigkeit Panamas würde die politische Landschaft Kolumbiens verändern und möglicherweise zu stabileren und kooperativeren Beziehungen führen. Dieser Schwerpunkt untersucht die notwendigen Schritte für einen friedlichen Übergang Panamas zur Selbstverwaltung."

COL_1900_anti_panama_independence:0 "Lehnen Sie die Unabhängigkeit Panamas ab"
COL_1900_anti_panama_independence_desc:0 "Der Widerstand gegen die Unabhängigkeit Panamas zielt darauf ab, die territoriale Integrität und Souveränität Kolumbiens zu wahren. Dieser Schwerpunkt umfasst Maßnahmen zur Stärkung der nationalen Einheit und zur Verhinderung sezessionistischer Bewegungen."

COL_1900_crush_them:0 "Zerschmettere die Rebellion"
COL_1900_crush_them_desc:0 "Der Einsatz militärischer Gewalt zur Niederschlagung der Unabhängigkeitsbewegung Panamas unterstreicht Kolumbiens Entschlossenheit, die nationale Einheit zu bewahren. Dieser Schwerpunkt umfasst Strategien für eine schnelle und entschlossene Reaktion auf einen Aufstand."

COL_support_panama:0 "Unterstützen Sie Panamas Bestrebungen"
COL_support_panama_desc:0 "Die Unterstützung von Panamas Bestrebungen nach größerer Autonomie oder Unabhängigkeit erfordert diplomatisches Engagement und Verhandlungen. Ziel ist eine friedliche Lösung, die Panamas Wünsche respektiert und gleichzeitig die regionale Stabilität bewahrt."

COL_1900_help_panama_economy:0 "Unterstützen Sie die Wirtschaft Panamas"
COL_1900_help_panama_economy_desc:0 "Die Unterstützung der panamaischen Wirtschaft stärkt den Wohlstand der Region und fördert den guten Willen. Dieser Schwerpunkt umfasst Wirtschaftshilfe, Infrastrukturentwicklung und Handelsabkommen, um das Wachstum Panamas und die Integration mit Kolumbien zu fördern."
SPR_continue_election_rigging_focus:0 "Fortsetzung der Wahlfälschung"
SPR_continue_election_rigging_focus_desc:0 "Behalten Sie die Kontrolle über die Wahlergebnisse, indem Sie weiterhin Wahlen manipulieren, die Stabilität des derzeitigen Regimes gewährleisten und verhindern, dass Oppositionsparteien an die Macht kommen."

SPR_guarantee_maria_focus:0 "Garantieren Sie Marías Sicherheit"
SPR_guarantee_maria_focus_desc:0 "Ergreifen Sie Maßnahmen, um die Sicherheit von Königin María zu gewährleisten, ihre Position zu stärken und die Ängste der Loyalisten zu zerstreuen, die sich über mögliche Bedrohungen der Monarchie Sorgen machen."

SPR_rally_the_monarchists_focus:0 "Versammelt die Monarchisten"
SPR_rally_the_monarchists_focus_desc:0 "Vereinen Sie monarchistische Fraktionen, um ihren Einfluss und ihre Unterstützung für die Krone zu stärken und so eine solide Basis für die Bekämpfung republikanischer und liberaler Bewegungen zu schaffen."

SPR_circulate_monarchist_propaganda_focus:0 "Verbreiten Sie monarchistische Propaganda"
SPR_circulate_monarchist_propaganda_focus_desc:0 "Verbreiten Sie Propaganda für die Monarchie, um die öffentliche Meinung zu beeinflussen und die Unterstützung für die königliche Familie und ihre Politik zu stärken."

SPR_march_on_madrid_focus:0 "Marsch auf Madrid"
SPR_march_on_madrid_focus_desc:0 "Organisieren Sie einen großen Marsch auf Madrid, um die Stärke und Einheit der Anhänger der Monarchie zu demonstrieren und ihre Verbundenheit mit der Krone unter Beweis zu stellen."

SPR_down_with_democracy_focus:0 "Nieder mit der Demokratie"
SPR_down_with_democracy_focus_desc:0 "Starten Sie eine Kampagne zur Untergrabung demokratischer Institutionen und fördern Sie eine Rückkehr zur absoluten Monarchie, indem Sie die Demokratie als Quelle der Instabilität und Spaltung darstellen."

SPR_empower_the_monarchy_focus:0 "Stärke die Monarchie"
SPR_empower_the_monarchy_focus_desc:0 "Stärken Sie die Autorität der Monarchie, indem Sie die Macht des Königshauses ausweiten und den Einfluss republikanischer und liberaler Elemente innerhalb der Regierung verringern."

SPR_ban_republican_parties_focus:0 "Verbot republikanischer Parteien"
SPR_ban_republican_parties_focus_desc:0 "Alle republikanischen Parteien sollten verboten werden, um die politische Opposition auszuschalten und die Vorherrschaft der Monarchie zu sichern."

SPR_expand_the_ban_to_liberal_parties_focus:0 "Ausweitung des Verbots auf liberale Parteien"
SPR_expand_the_ban_to_liberal_parties_focus_desc:0 "Das Verbot sollte auf liberale Parteien ausgeweitet werden, um die monarchistische Kontrolle weiter zu festigen und abweichende politische Ideologien zu unterdrücken."

SPR_begin_state_censorship_focus:0 "Beginn der staatlichen Zensur"
SPR_begin_state_censorship_focus_desc:0 "Führen Sie eine strenge staatliche Zensur ein, um den Informationsfluss zu kontrollieren und sicherzustellen, dass nur pro-monarchische Narrative an die Öffentlichkeit gelangen."

SPR_reduce_the_age_to_rule_focus:0 "Reduzieren Sie das Alter, um zu herrschen"
SPR_reduce_the_age_to_rule_focus_desc:0 "Senken Sie das gesetzliche Alter für die Thronbesteigung, um eine mögliche vorzeitige Krönung eines neuen Monarchen vorzubereiten und die Kontinuität der königlichen Linie zu gewährleisten."

SPR_plan_alfonso_coronation_focus:0 "Planen Sie Alfonsos Krönung"
SPR_plan_alfonso_coronation_focus_desc:0 "Organisieren Sie die Krönungszeremonie für Alfonso und stellen Sie sicher, dass es ein großartiges Ereignis wird, das seine Legitimität festigt und breite Unterstützung findet."

SPR_appoint_a_loyal_priest_focus:0 "Ernennen Sie einen loyalen Priester"
SPR_appoint_a_loyal_priest_focus_desc:0 "Wählen Sie einen der Monarchie treuen Priester als wichtigen religiösen Berater aus und nutzen Sie seinen Einfluss, um die moralische und spirituelle Autorität der Krone zu stärken."

SPR_appoint_a_popular_priest_focus:0 "Ernennen Sie einen beliebten Priester"
SPR_appoint_a_popular_priest_focus_desc:0 "Wählen Sie einen weithin respektierten und beliebten Priester, der als Brücke zwischen der Monarchie und der Bevölkerung fungiert und so die Attraktivität und Legitimität der Krone steigert."

SPR_ready_alfonso_focus:0 "Bereit Alfonso"
SPR_ready_alfonso_focus_desc:0 "Bereiten Sie Alfonso auf seine zukünftige Rolle als Monarch vor, indem Sie ihm die notwendige Ausbildung und Schulung geben, um die Nation effektiv zu führen."

SPR_please_the_reactionaries_focus:0 "Bitte die Reaktionäre"
SPR_please_the_reactionaries_focus_desc:0 "Beschwichtigen Sie reaktionäre Fraktionen im Land, indem Sie Maßnahmen ergreifen, die mit ihren konservativen Werten und Interessen im Einklang stehen, und stellen Sie so sicher, dass sie die Monarchie weiterhin unterstützen."

SPR_alfonsos_coronation_focus:0 "Alfonsos Krönung"
SPR_alfonsos_coronation_focus_desc:0 "Feiern Sie die Krönung Alfonsos mit einer großen Zeremonie, die den Beginn seiner Herrschaft markiert und den Platz der Monarchie im Herzen der Nation bekräftigt."

SPR_a_disaster_focus:0 "Eine Katastrophe schlägt zu"
SPR_a_disaster_focus_desc:0 "Reagieren Sie auf eine plötzliche Katastrophe, die die Stabilität der Nation bedroht, und ergreifen Sie Notfallmaßnahmen, um die Monarchie zu schützen und die Ordnung aufrechtzuerhalten."

SPR_propose_free_elections_focus:0 "Schlagen Sie freie Wahlen vor"
SPR_propose_free_elections_focus_desc:0 "Um die Opposition zu beschwichtigen und das Vertrauen der Öffentlichkeit wiederherzustellen, schlagen Sie die Durchführung freier und fairer Wahlen vor, um einen Wandel hin zu einer demokratischeren Regierungsführung zu signalisieren."

SPR_political_thaw_focus:0 "Politisches Tauwetter"
SPR_political_thaw_focus_desc:0 "Leiten Sie eine politische Entspannung ein, um die Spannungen abzubauen und die Versöhnung zwischen den verschiedenen Fraktionen zu fördern und so den Weg für ein integrativeres und stabileres politisches Umfeld zu ebnen."

SPR_change_the_constitution_focus:0 "Ändern Sie die Verfassung"
SPR_change_the_constitution_focus_desc:0 "Schlagen Sie Verfassungsänderungen vor, um je nach politischem Klima und Druck entweder die Monarchie zu stärken oder demokratische Reformen einzuführen."

SPR_prepare_a_coup_focus:0 "Bereiten Sie einen Putsch vor"
SPR_prepare_a_coup_focus_desc:0 "Planen Sie heimlich einen Putsch, um die derzeitige Regierung zu stürzen, mit dem Ziel, ein neues Regime zu etablieren, das den monarchistischen Interessen entgegenkommt."

SPR_contact_political_exiles_focus:0 "Kontakt Political Exiles"
SPR_contact_political_exiles_focus_desc:0 "Bitten Sie politische Exilanten um ihre Unterstützung und Zusammenarbeit und nutzen Sie ihren Einfluss und ihre Netzwerke, um die monarchistische Sache zu stärken."

SPR_win_over_people_focus:0 "Gewinnen Sie die Menschen für sich"
SPR_win_over_people_focus_desc:0 "Starten Sie eine Kampagne, um die Herzen und Köpfe der Bevölkerung zu gewinnen, und nutzen Sie Propaganda, öffentliche Bauvorhaben und Sozialprogramme, um breite Unterstützung für die Monarchie zu gewinnen."

SPR_win_over_military_focus:0 "Gewinnen Sie das Militär"
SPR_win_over_military_focus_desc:0 "Sichern Sie sich die Loyalität des Militärs, indem Sie auf seine Anliegen eingehen, seine Bedingungen verbessern und dafür sorgen, dass es eine unerschütterliche Stütze der Monarchie bleibt."
ROM_the_status_of_the_economy_desc:0 "Analysieren Sie den aktuellen Zustand der rumänischen Wirtschaft und identifizieren Sie Stärken und Schwächen, um eine wirksame Wirtschaftsstrategie für die Zukunft zu formulieren."

ROM_choose_our_approach_desc:0 "Entscheiden Sie sich für den wirtschaftlichen Weg und wägen Sie die Vor- und Nachteile verschiedener Ansätze ab, um nachhaltiges Wachstum und Stabilität zu gewährleisten."

ROM_a_new_approach_desc:0 "Verfolgen Sie eine innovative Wirtschaftsstrategie, die sich auf die Modernisierung von Industrie und Infrastruktur konzentriert, um die wirtschaftliche Entwicklung und Wettbewerbsfähigkeit zu fördern."

ROM_mixed_approach_desc:0 "Setzen Sie eine ausgewogene Wirtschaftsstrategie um, die Elemente sowohl traditioneller als auch moderner Ansätze kombiniert, um umfassendes Wachstum zu gewährleisten."

ROM_the_old_approach_desc:0 "Halten Sie an bewährten Wirtschaftsmethoden fest und legen Sie Wert auf Stabilität und schrittweise Entwicklung statt auf schnelle Modernisierung."

ROM_invest_in_oltenia_desc:0 "Leiten Sie Ressourcen in die Entwicklung Olteniens und fördern Sie die lokale Industrie und Infrastruktur, um das regionale Wachstum anzukurbeln."

ROM_focus_on_light_and_heavy_industry_desc:0 "Priorisieren Sie Investitionen sowohl in der Leicht- als auch in der Schwerindustrie und sorgen Sie so für eine umfassende industrielle Basis, die vielfältige wirtschaftliche Aktivitäten unterstützen kann."

ROM_invest_in_mutenia_desc:0 "Stellen Sie Mittel für die Entwicklung von Mutenia bereit und stärken Sie seine industriellen und landwirtschaftlichen Kapazitäten, um zum nationalen Wohlstand beizutragen."

ROM_expand_the_anina_mine_desc:0 "Erweitern Sie den Betrieb der Anina-Mine und steigern Sie die Kohleproduktion, um industrielle Aktivitäten und den Energiebedarf zu decken."

ROM_increase_the_nera_wood_production_desc:0 "Steigern Sie die Produktion der Nera-Holzindustrie und stellen Sie so eine stetige Versorgung mit Rohstoffen für Bau und Fertigung sicher."

ROM_a_fine_tuned_economy_desc:0 "Schaffen Sie eine fein abgestimmte Wirtschaft, die verschiedene Sektoren ausbalanciert und so Stabilität und Widerstandsfähigkeit gegenüber externen Schocks gewährleistet."

ROM_the_reign_of_carol_i_desc:0 "Denken Sie über die Herrschaft von Karl I. nach, würdigen Sie seine Beiträge zur Nation und ziehen Sie Lehren aus seiner Regierungsführung."

ROM_meet_with_the_pnl_leaders_desc:0 "Nehmen Sie an Gesprächen mit den Führern der Nationalliberalen Partei (PNL) teil und erkunden Sie mögliche Kooperationen und politische Strategien."

ROM_placate_the_rich_desc:0 "Setzen Sie Maßnahmen um, um die wohlhabende Elite zu beschwichtigen, ihre Unterstützung für Regierungsinitiativen zu sichern und politische Stabilität zu gewährleisten."

ROM_talk_to_the_landowners_desc:0 "Führen Sie Gespräche mit einflussreichen Landbesitzern, gehen Sie auf ihre Anliegen ein und gewinnen Sie ihre Unterstützung für Agrarreformen."

ROM_unofficially_endorse_the_pnl_desc:0 "Unterstützen Sie die PNL diskret, stärken Sie ihren politischen Einfluss und stimmen Sie sich mit ihrer Vision für die Zukunft Rumäniens ab."

ROM_campaign_for_the_pnl_desc:0 "Machen Sie aktiv Wahlkampf für die PNL, machen Sie Werbung für ihr Programm und werben Sie für die öffentliche Unterstützung ihrer Politik."

ROM_our_next_leader_desc:0 "Identifizieren und fördern Sie die nächste Führungskraft und sorgen Sie für einen reibungslosen Machtübergang und Kontinuität in der Führung."

ROM_meet_with_the_conservative_leaders_desc:0 "Führen Sie Gespräche mit konservativen Politikern und berücksichtigen Sie dabei ihre Standpunkte und eine mögliche Zusammenarbeit für politische Stabilität."

ROM_support_the_peasants_cause_desc:0 "Setzen Sie sich für die Sache der Bauern ein, treten Sie für ihre Rechte ein und setzen Sie Maßnahmen zur Verbesserung ihrer Lebensbedingungen um."

ROM_promise_conservative_reforms_desc:0 "Versprechen Sie, konservative Reformen einzuführen, traditionelle Werte anzusprechen und sich die Unterstützung konservativer Fraktionen zu sichern."

ROM_unofficially_endorse_the_conservatives_desc:0 "Unterstützen Sie die konservative Partei diskret, stärken Sie so ihr politisches Ansehen und sichern Sie eine stabile Regierungsstruktur."

ROM_support_the_conservatives_desc:0 "Unterstützen Sie die konservative Partei aktiv, machen Sie Werbung für ihr Programm und werben Sie für die öffentliche Unterstützung ihrer Politik."

ROM_a_conservative_romania_desc:0 "Stellen Sie sich ein konservatives Rumänien vor und arbeiten Sie darauf hin, indem Sie traditionelle Werte betonen und schrittweise Reformen zur Stabilität durchführen."

ROM_meet_with_the_social_democrat_leaders_desc:0 "Nehmen Sie an einem Dialog mit sozialdemokratischen Führungspersönlichkeiten teil und erkunden Sie Gemeinsamkeiten und eine mögliche Zusammenarbeit bei sozialen Reformen."

ROM_campaign_against_the_monarchy_desc:0 "Führen Sie eine Kampagne gegen die Monarchie, treten Sie für republikanische Ideale ein und mobilisieren Sie öffentliche Unterstützung für eine demokratischere Regierungsführung."

ROM_promise_a_romanian_republic_desc:0 "Setzen Sie sich für die Gründung einer rumänischen Republik ein und schlagen Sie eine Regierungsvision ohne monarchische Herrschaft vor."

ROM_meet_with_the_underground_leaders_desc:0 "Halten Sie geheime Treffen mit politischen Führern im Untergrund ab, diskutieren Sie Strategien und gewinnen Sie ihre Unterstützung für revolutionäre Aktivitäten."

ROM_placate_the_poor_class_desc:0 "Setzen Sie Maßnahmen um, um das Leid der Armen zu lindern, ihre Unterstützung zu sichern und sozialen Unruhen vorzubeugen."

ROM_a_bright_future_desc:0 "Stellen Sie sich eine strahlende Zukunft für Rumänien vor, in deren Mittelpunkt eine umfassende Entwicklung und die Verbesserung der Lebensqualität aller Bürger stehen."

ROM_prepare_for_the_next_election_desc:0 "Bereiten Sie sich auf die bevorstehenden Wahlen vor, entwickeln Sie Strategien und mobilisieren Sie Ressourcen, um ein positives Ergebnis sicherzustellen."

ROM_control_the_election_desc:0 "Ergreifen Sie Maßnahmen zur Kontrolle des Wahlprozesses und gewährleisten Sie einen vorhersehbaren und stabilen politischen Übergang."

ROM_rig_the_election_desc:0 "Manipulieren Sie die Wahlergebnisse, um den Sieg der bevorzugten Partei zu garantieren und die politische Stabilität aufrechtzuerhalten."

ROM_a_fair_election_desc:0 "Verpflichten Sie sich zur Abhaltung fairer und freier Wahlen und gewährleisten Sie Transparenz und Legitimität im demokratischen Prozess."

ROM_the_1901_election_desc:0 "Konzentrieren Sie sich auf die Wahlen von 1901, entwickeln Sie Strategien und mobilisieren Sie Ressourcen, um ein günstiges Ergebnis für die bevorzugte Partei zu erzielen."

ROM_pnl_victory_desc:0 "Feiern Sie den Wahlsieg der Nationalliberalen Partei (PNL) und den Beginn einer neuen Ära der Regierungsführung im Einklang mit ihrer Vision."

ROM_protect_the_forests_desc:0 "Umsetzung von Maßnahmen zum Schutz der Wälder Rumäniens und Gewährleistung einer nachhaltigen Bewirtschaftung der natürlichen Ressourcen für künftige Generationen."

ROM_reinforce_the_kings_power_desc:0 "Stärkung der Autorität des Königs, Festigung der monarchischen Macht und Gewährleistung einer stabilen und einheitlichen Regierungsführung."

ROM_decrease_tax_rates_for_the_rich_desc:0 "Senken Sie die Steuersätze für die wohlhabende Elite und fördern Sie Investitionen und wirtschaftliche Aktivitäten, die den nationalen Wohlstand steigern."

ROM_focus_on_agricultural_developments_desc:0 "Priorisieren Sie die Entwicklung der Landwirtschaft, steigern Sie die Produktivität und gewährleisten Sie die Ernährungssicherheit des Landes."

ROM_focus_on_forestery_developments_desc:0 "Konzentrieren Sie sich auf die nachhaltige Entwicklung der Forstwirtschaft und sorgen Sie für ein Gleichgewicht zwischen wirtschaftlichem Nutzen und Umweltschutz."

ROM_conservative_victory_desc:0 "Feiern Sie den Wahlsieg der konservativen Partei, der eine neue Ära traditioneller Werte und schrittweiser Reformen einläutet."

ROM_lower_peasant_taxes_desc:0 "Reduzieren Sie die Steuerlast der Bauern, verbessern Sie ihre wirtschaftliche Lage und sichern Sie sich ihre Unterstützung für die Regierung."

ROM_electoral_reform_desc:0 "Schlagen Sie Wahlreformen vor und setzen Sie diese um, um einen inklusiveren und faireren politischen Prozess zu gewährleisten."

ROM_increase_civil_rights_desc:0 "Erweitern Sie die Bürgerrechte der Bürger und fördern Sie Gleichheit und Gerechtigkeit in der rumänischen Gesellschaft."

ROM_universal_male_suffragate_desc:0 "Führen Sie das allgemeine Wahlrecht für Männer ein, damit alle Männer wählen und am demokratischen Prozess teilnehmen können."

ROM_partial_male_suffragate_desc:0 "Einführung eines teilweisen Wahlrechts für Männer, um das Wahlrecht auf einen größeren Teil der männlichen Bevölkerung auszuweiten."

ROM_socialist_victory_desc:0 "Feiern Sie den Wahlsieg der sozialistischen Partei, der eine neue Ära sozialer Reformen und Arbeitnehmerrechte einläutet."

ROM_abolish_the_nobility_desc:0 "Schlagen Sie die Abschaffung des Adels vor, fördern Sie die soziale Gleichheit und beseitigen Sie aristokratische Privilegien."

ROM_equal_rights_for_all_males_desc:0 "Gewährleistung gleicher Rechte für alle Männer und Förderung von Fairness und Gerechtigkeit in der rumänischen Gesellschaft."

ROM_abandon_claims_on_transylvania_desc:0 "Geben Sie Ihre Ansprüche auf Siebenbürgen offiziell auf und konzentrieren Sie sich auf die interne Entwicklung und die Förderung friedlicher Beziehungen zu Ihren Nachbarn."

ROM_abolish_the_monarchy_desc:0 "Schlagen Sie die Abschaffung der Monarchie vor und fordern Sie die Umwandlung Rumäniens in eine Republik mit einer demokratisch gewählten Regierung."

ROM_our_first_president_desc:0 "Wählen Sie den ersten Präsidenten Rumäniens und markieren Sie damit einen historischen Wandel von der Monarchie zur Republik."

ROM_tax_the_wealthy_give_to_the_poor_desc:0 "Führen Sie eine progressive Besteuerung ein und verteilen Sie den Reichtum um, um die Armut zu lindern und die soziale Gerechtigkeit zu fördern."

ROM_the_romanian_armed_forces_desc:0 "Der Schwerpunkt liegt auf der Entwicklung und Modernisierung der rumänischen Streitkräfte, der Gewährleistung der nationalen Sicherheit und der Vorbereitung auf zukünftige Konflikte."

ROM_the_royal_army_desc:0 "Stärken Sie die königliche Armee, verbessern Sie ihre Fähigkeiten und gewährleisten Sie die Loyalität gegenüber der Monarchie."

ROM_solve_the_infighting_desc:0 "Behandeln und lösen Sie interne Konflikte innerhalb des Militärs und sorgen Sie für Einheit und Zusammenhalt innerhalb der Streitkräfte."

ROM_the_old_and_trusted_approach_desc:0 "Übernehmen Sie die alten und bewährten Militärdoktrinen und legen Sie Wert auf traditionelle Strategien und bewährte Taktiken."

ROM_research_new_defensive_structures_desc:0 "Investieren Sie in die Forschung und Entwicklung neuer Verteidigungsstrukturen und verbessern Sie so die Fähigkeit Rumäniens, sein Territorium zu schützen."

ROM_prepare_for_the_next_war_desc:0 "Bereiten Sie sich auf mögliche zukünftige Konflikte vor und stellen Sie sicher, dass die Streitkräfte gut ausgerüstet und ausgebildet sind."

ROM_defensive_line_against_austria_desc:0 "Bauen Sie eine Verteidigungslinie gegen Österreich auf, stärken Sie die Verteidigung Rumäniens im Norden und verhindern Sie eine mögliche Aggression."

ROM_defensive_line_against_russia_desc:0 "Errichten Sie eine Verteidigungslinie gegen Russland, sichern Sie Rumäniens Ostgrenzen und gewährleisten Sie die nationale Sicherheit."

ROM_defensive_line_against_bulgaria_desc:0 "Bauen Sie eine Verteidigungslinie gegen Bulgarien auf, stärken Sie die südliche Verteidigung Rumäniens und schrecken Sie potenzielle Bedrohungen ab."

ROM_the_trenches_are_our_future_desc:0 "Betonen Sie den Bau von Schützengräben und Befestigungen, bereiten Sie sich auf Verteidigungskriege vor und gewährleisten Sie den Schutz des rumänischen Territoriums."

ROM_prepare_backup_positions_desc:0 "Richten Sie zusätzliche Verteidigungspositionen ein und sorgen Sie so für Flexibilität und Widerstandsfähigkeit gegenüber möglichen Vorstößen des Feindes."

ROM_join_the_balkan_coalition_desc:0 "Treten Sie der Balkankoalition bei, stärken Sie Allianzen und verbessern Sie Rumäniens strategische Position in der Region."

ROM_listen_to_the_new_generation_of_commanders_desc:0 "Integrieren Sie die Erkenntnisse und Strategien der neuen Generation militärischer Befehlshaber und sorgen Sie so für eine innovative und effektive militärische Führung."

ROM_prepare_for_a_balkan_war_desc:0 "Bereiten Sie sich auf einen möglichen Konflikt auf dem Balkan vor und stellen Sie sicher, dass die Streitkräfte auf regionale Kriegsführung vorbereitet sind."

ROM_focus_on_the_new_mobile_doctrine_desc:0 "Nehmen Sie die neue mobile Militärdoktrin an, die bei militärischen Operationen auf Geschwindigkeit, Flexibilität und Koordination setzt."

ROM_improve_relations_with_serbia_desc:0 "Verbessern Sie die diplomatischen und militärischen Beziehungen zu Serbien und fördern Sie ein starkes Bündnis und die gegenseitige Zusammenarbeit."

ROM_improve_relations_with_greece_desc:0 "Stärkung der Beziehungen zu Griechenland, Förderung strategischer Partnerschaften und regionaler Stabilität."

ROM_improve_relations_with_the_entente_desc:0 "Bauen Sie engere Beziehungen zu den Entente-Mächten auf und sichern Sie sich die diplomatische und militärische Unterstützung Rumäniens."

ROM_joint_drills_with_the_balkan_nations_desc:0 "Führen Sie gemeinsame Militärübungen mit den Balkanstaaten durch, um die Zusammenarbeit und die Bereitschaft für mögliche Konflikte zu verbessern."

ROM_train_new_recruits_desc:0 "Konzentrieren Sie sich auf die Ausbildung neuer Militärrekruten und sorgen Sie so für einen stetigen Nachschub gut vorbereiteter Soldaten für die Streitkräfte."

ROM_join_the_balkan_pact_desc:0 "Offiziell dem Balkanpakt beitreten, Allianzen festigen und die kollektive Sicherheit in der Region gewährleisten."

ROM_the_1905_election_desc:0 "Konzentrieren Sie sich auf die Wahlen von 1905, entwickeln Sie Strategien und mobilisieren Sie Ressourcen, um ein günstiges Ergebnis für die bevorzugte Partei zu erzielen."

ROM_1905_pnl_victory_desc:0 "Feiern Sie den Sieg der Nationalliberalen Partei (PNL) bei den Wahlen von 1905 und den Beginn einer neuen Ära der Regierungsführung im Einklang mit ihrer Vision."

ROM_support_the_democratic_process_desc:0 "Verpflichten Sie sich, den demokratischen Prozess zu unterstützen, faire und transparente Wahlen sicherzustellen und die politische Stabilität zu fördern."

ROM_new_tractors_for_farmers_desc:0 "Stellen Sie den Landwirten neue Traktoren und Landmaschinen zur Verfügung, steigern Sie die Produktivität und modernisieren Sie die landwirtschaftlichen Praktiken."

ROM_increase_the_defense_budget_desc:0 "Weisen Sie dem Verteidigungshaushalt mehr Mittel zu, um sicherzustellen, dass die Streitkräfte gut ausgerüstet und auf zukünftige Konflikte vorbereitet sind."

ROM_tax_breaks_for_farmers_desc:0 "Gewähren Sie Landwirten Steuererleichterungen, fördern Sie die landwirtschaftliche Entwicklung und verbessern Sie die wirtschaftlichen Bedingungen im ländlichen Raum."

ROM_introduce_conscription_desc:0 "Führen Sie die Wehrpflicht ein, um die Reihen der Streitkräfte zu stärken und so die nationale Sicherheit und Konfliktbereitschaft zu gewährleisten."

ROM_1905_conservative_victory_desc:0 "Feiern Sie den Sieg der konservativen Partei bei den Wahlen von 1905, der eine neue Ära traditioneller Werte und schrittweiser Reformen einläutete."

ROM_deal_with_the_illiteracy_rate_desc:0 "Bekämpfung der hohen Analphabetenrate durch die Umsetzung von Bildungsreformen und Programmen zur Verbesserung der Alphabetisierung der Bevölkerung."

ROM_open_up_soup_kitchens_desc:0 "Richten Sie Suppenküchen ein, um die Armen mit Lebensmitteln zu versorgen, den Hunger zu lindern und das öffentliche Wohlergehen zu verbessern."

ROM_decrease_military_spendings_desc:0 "Reduzieren Sie die Militärausgaben, um die Ressourcen in die soziale und wirtschaftliche Entwicklung umzuverteilen und so den allgemeinen nationalen Wohlstand zu fördern."

ROM_support_greater_romania_desc:0 "Setzen Sie sich für die Vision eines Großrumäniens ein und betonen Sie dabei die nationale Einheit und die Integration aller rumänischsprachigen Gebiete."

ROM_focus_on_internal_affairs_desc:0 "Konzentrieren Sie sich auf innere Angelegenheiten, gehen Sie auf innenpolitische Probleme ein und sorgen Sie für politische Stabilität und Wirtschaftswachstum."

ROM_1905_socialist_victory_desc:0 "Feiern Sie den Sieg der sozialistischen Partei bei den Wahlen von 1905, der eine neue Ära sozialer Reformen und Arbeitnehmerrechte einläutete."

ROM_exile_the_former_king_desc:0 "Den ehemaligen König offiziell ins Exil schicken, um einen klaren Bruch mit der monarchischen Herrschaft sicherzustellen und den Weg für eine republikanische Regierung zu ebnen."

ROM_fight_the_monarchist_movement_desc:0 "Bekämpfen Sie die monarchistische Bewegung, verhindern Sie alle Versuche, die Monarchie wiederherzustellen, und gewährleisten Sie die Stabilität der Republik."

ROM_deal_with_russian_sanctions_desc:0 "Reagieren Sie auf die russischen Sanktionen mit wirtschaftlichen Maßnahmen, um deren Auswirkungen abzumildern und die nationale Widerstandsfähigkeit zu gewährleisten."

ROM_prepare_for_internal_unrest_desc:0 "Bereiten Sie sich auf mögliche innere Unruhen vor und ergreifen Sie Maßnahmen zur Aufrechterhaltung von Ordnung und Stabilität in Zeiten politischer Turbulenzen."

ROM_increase_taxes_desc:0 "Erhöhen Sie die Steuern, um die Staatseinnahmen zu steigern und eine ausreichende Finanzierung öffentlicher Dienste und der nationalen Entwicklung sicherzustellen."

ROM_peasant_revolt_desc:0 "Bekämpfen Sie die Ursachen der Unzufriedenheit der Bauern, um einen Aufstand zu verhindern, und führen Sie Reformen durch, um ihre Lebens- und Arbeitsbedingungen zu verbessern."

ROM_deal_with_the_peasants_desc:0 "Nehmen Sie Kontakt mit der Bauernbevölkerung auf, um ihre Beschwerden zu klären, soziale Stabilität zu gewährleisten und Unruhen vorzubeugen."

ROM_aggresive_approach_desc:0 "Gehen Sie im Umgang mit der Opposition aggressiv vor und wenden Sie gegebenenfalls Gewalt an, um Ordnung und Stabilität aufrechtzuerhalten."

ROM_send_in_the_military_desc:0 "Setzen Sie das Militär ein, um Bedrohungen der nationalen Sicherheit zu begegnen und den Schutz des Staates und seiner Bürger zu gewährleisten."

ROM_impose_martial_law_desc:0 "Setzen Sie das Kriegsrecht ein, um in Krisenzeiten Ordnung und Kontrolle aufrechtzuerhalten und die Stabilität der Nation zu gewährleisten."

ROM_the_bloody_clash_desc:0 "Stellen Sie sich einem gewaltsamen Zusammenstoß zwischen Regierungstruppen und Oppositionsgruppen und ergreifen Sie Maßnahmen zur Wiederherstellung der Ordnung und zur Bekämpfung der Ursachen des Konflikts."

ROM_the_government_resigns_desc:0 "Reagieren Sie auf eine Krise, indem Sie die derzeitige Regierung zum Rücktritt bewegen und so den Weg für eine neue Führung und mögliche Reformen ebnen."

ROM_the_pnl_government_desc:0 "Bilden Sie eine Regierung unter Führung der Nationalliberalen Partei (PNL), die deren Politik und Vision für Rumänien umsetzt."

ROM_the_conservative_government_desc:0 "Bilden Sie eine von der konservativen Partei geführte Regierung, die traditionelle Werte und schrittweise Reformen betont."

ROM_peacefull_approach_desc:0 "Verfolgen Sie einen friedlichen Ansatz zur Lösung von Konflikten und zur Auseinandersetzung mit Opposition und legen Sie Wert auf Dialog und Versöhnung."
USA_mckinleys_inauguration:0 "McKinleys Amtseinführung"
USA_mckinleys_inauguration_desc:0 "Feiern Sie die Amtseinführung von Präsident William McKinley, die den Beginn seiner Amtszeit markiert und die Bühne für seine Politik und Vision für die Nation bereitet."

USA_the_civil_rights_issue:0 "Die Bürgerrechtsfrage"
USA_the_civil_rights_issue_desc:0 "Befassen Sie sich mit der dringenden Frage der Bürgerrechte und konzentrieren Sie sich dabei auf die Förderung von Gleichheit und Gerechtigkeit für alle Bürger, unabhängig von Rasse oder Herkunft."

USA_token_appointment:0 "Token-Termin"
USA_token_appointment_desc:0 "Ernennen Sie symbolisch einen Afroamerikaner in eine herausragende Position und zeigen Sie damit Ihr Engagement für Bürgerrechte und Inklusion."

USA_focus_on_sectionalism:0 "Fokus auf Sektionalismus"
USA_focus_on_sectionalism_desc:0 "Erkennen Sie die anhaltenden regionalen Spaltungen innerhalb der Vereinigten Staaten an und suchen Sie nach Wegen, diese zu überbrücken und die nationale Einheit zu fördern."

USA_promote_american_national_identity:0 "Förderung der amerikanischen Nationalidentität"
USA_promote_american_national_identity_desc:0 "Fördern Sie die Entwicklung einer starken amerikanischen Nationalidentität und stärken Sie den Patriotismus und das Gefühl gemeinsamer Ziele unter den Bürgern."

USA_suppress_regional_sentiments:0 "Regionale Stimmungen unterdrücken"
USA_suppress_regional_sentiments_desc:0 "Ergreifen Sie Maßnahmen, um starke regionale Gefühle zu unterdrücken, die die nationale Einheit bedrohen, und betonen Sie die Bedeutung einer zusammenhängenden nationalen Identität."

USA_focus_on_civil_rights:0 "Fokus auf Bürgerrechte"
USA_focus_on_civil_rights_desc:0 "Priorisieren Sie die Bürgerrechte auf der nationalen Agenda und setzen Sie Maßnahmen um, die allen Bürgern gleiche Behandlung und Chancengleichheit gewährleisten."

USA_enforce_the_14th_amendment:0 "Setzen Sie den 14. Zusatzartikel durch"
USA_enforce_the_14th_amendment_desc:0 "Stellen Sie die strikte Durchsetzung des 14. Zusatzartikels sicher, schützen Sie die Rechte aller Bürger und wahren Sie die Grundsätze der Gleichheit und des ordnungsgemäßen Verfahrens."

USA_attack_jim_crow_laws:0 "Angriff auf die Jim-Crow-Gesetze"
USA_attack_jim_crow_laws_desc:0 "Starten Sie Bemühungen zur Abschaffung der Jim-Crow-Gesetze und arbeiten Sie auf die Beseitigung der Rassentrennung und Diskriminierung im Süden hin."

USA_outlaw_the_kkk:0 "Den KKK verbieten"
USA_outlaw_the_kkk_desc:0 "Ergreifen Sie entschlossene Maßnahmen, um den Ku-Klux-Klan zu verbieten, mit dem Ziel, diese gewalttätige Organisation zu beseitigen und die Rechte der Afroamerikaner zu schützen."

USA_trouble_in_cuba:0 "Ärger in Kuba"
USA_trouble_in_cuba_desc:0 "Befassen Sie sich mit dem anhaltenden Konflikt in Kuba, berücksichtigen Sie die Auswirkungen auf die amerikanischen Interessen und formulieren Sie eine angemessene Antwort."

USA_aid_cuban_rebels:0 "Helfen Sie den kubanischen Rebellen"
USA_aid_cuban_rebels_desc:0 "Unterstützen Sie die kubanischen Rebellen, die für die Unabhängigkeit von der spanischen Herrschaft kämpfen, schließen Sie sich ihrer Sache an und fördern Sie die Freiheit."

USA_anti_imperialist_propaganda:0 "Antiimperialistische Propaganda"
USA_anti_imperialist_propaganda_desc:0 "Bekämpfen Sie proimperialistische Narrative, indem Sie antiimperialistische Propaganda verbreiten und die Bedeutung der Selbstbestimmung und Souveränität aller Nationen betonen."

USA_liberation_of_cuba:0 "Befreiung Kubas"
USA_liberation_of_cuba_desc:0 "Unterstützen Sie die Befreiung Kubas von der spanischen Herrschaft, helfen Sie dem kubanischen Kampf um Unabhängigkeit und fördern Sie demokratische Werte."

USA_strengthen_presence_in_the_philippines:0 "Stärkung der Präsenz auf den Philippinen"
USA_strengthen_presence_in_the_philippines_desc:0 "Erhöhen Sie die amerikanische Militär- und Verwaltungspräsenz auf den Philippinen, um strategische Interessen zu sichern und die Ordnung aufrechtzuerhalten."

USA_self_governance:0 "Selbstverwaltung"
USA_self_governance_desc:0 "Fördern Sie die Selbstverwaltung in den amerikanischen Territorien und arbeiten Sie darauf hin, der lokalen Bevölkerung mehr Autonomie und Vertretung zu gewähren."

USA_support_a_civilian_administration:0 "Unterstützen Sie eine zivile Verwaltung"
USA_support_a_civilian_administration_desc:0 "Fördern Sie die Einrichtung ziviler Verwaltungen in den von den USA kontrollierten Gebieten, um eine demokratische Regierungsführung und lokale Beteiligung zu fördern."

USA_their_own_fate:0 "Ihr eigenes Schicksal"
USA_their_own_fate_desc:0 "Ermöglichen Sie den Gebieten, ihre eigene politische Zukunft durch demokratische Prozesse und Referenden zu bestimmen und unterstützen Sie die Selbstbestimmung."

USA_continue_the_occupation:0 "Setzen Sie die Besetzung fort"
USA_continue_the_occupation_desc:0 "Aufrechterhaltung der amerikanischen Militärbesatzung in Schlüsselgebieten, um Stabilität zu gewährleisten und amerikanische Interessen zu schützen."

USA_exploit_natural_resources:0 "Natürliche Ressourcen ausbeuten"
USA_exploit_natural_resources_desc:0 "Konzentrieren Sie sich auf die Nutzung der natürlichen Ressourcen der amerikanischen Territorien, um das Wirtschaftswachstum anzukurbeln und die amerikanische Industrie mit Rohstoffen zu versorgen."

USA_economic_imperialism:0 "Wirtschaftsimperialismus"
USA_economic_imperialism_desc:0 "Verfolgen Sie eine Politik des wirtschaftlichen Imperialismus und nutzen Sie finanzielle und handelspolitische Einflussmöglichkeiten, um die Wirtschaft anderer Länder zu beeinflussen und zu kontrollieren."

USA_republican_economics:0 "Republikanische Wirtschaftspolitik"
USA_republican_economics_desc:0 "Setzen Sie die Wirtschaftspolitik der Republikaner um, die auf die Förderung des industriellen Wachstums, den Schutz amerikanischer Unternehmen und die Gewährleistung wirtschaftlicher Stabilität abzielt."

USA_the_dingley_act:0 "Der Dingley Act"
USA_the_dingley_act_desc:0 "Verabschiedung des Dingley Tariff Act, der die Zölle auf importierte Waren erhöht, um die amerikanische Industrie zu schützen und die heimische Produktion zu fördern."

USA_continue_tariff_policy:0 "Tarifpolitik fortsetzen"
USA_continue_tariff_policy_desc:0 "Behalten Sie eine Politik hoher Zölle bei, um die amerikanische Industrie vor ausländischer Konkurrenz zu schützen und das Wirtschaftswachstum zu unterstützen."

USA_american_industrial_might:0 "Amerikanische Industriemacht"
USA_american_industrial_might_desc:0 "Heben Sie die industrielle Stärke der Vereinigten Staaten hervor und fördern Sie sie, indem Sie ihre Fertigungskapazitäten und technologischen Fortschritte präsentieren."

USA_center_of_global_manufacturing:0 "Zentrum der globalen Fertigung"
USA_center_of_global_manufacturing_desc:0 "Positionieren Sie die Vereinigten Staaten als Zentrum der globalen Fertigung und legen Sie Wert auf Innovation, Effizienz und Qualität amerikanischer Produkte."

USA_made_in_america:0 "Hergestellt in Amerika"
USA_made_in_america_desc:0 "Fördern Sie die Produktion und den Konsum amerikanischer Waren, stärken Sie den Nationalstolz und unterstützen Sie die heimische Industrie."

USA_on_the_issue_of_currency:0 "Zur Währungsfrage"
USA_on_the_issue_of_currency_desc:0 "Befassen Sie sich mit der umstrittenen Frage der Währungsstandards und diskutieren Sie die Vorteile von Gold, Silber und Bimetallismus bei der Stabilisierung und dem Wachstum der Wirtschaft."

USA_continue_with_gold:0 "Weiter mit Gold"
USA_continue_with_gold_desc:0 "Behalten Sie den Goldstandard als Grundlage der amerikanischen Währung bei und gewährleisten Sie so wirtschaftliche Stabilität und das Vertrauen der Anleger."

USA_support_gold_standard_act:0 "Unterstützen Sie das Gold Standard Act"
USA_support_gold_standard_act_desc:0 "Setzen Sie sich für die Verabschiedung des Gold Standard Act ein, der die Verwendung von Gold als primären Standard für die amerikanische Währung festigt."

USA_advocate_bimetallism:0 "Befürworten Sie den Bimetallismus"
USA_advocate_bimetallism_desc:0 "Fördern Sie die Einführung eines bimetallischen Standards, bei dem sowohl Gold als auch Silber zur Deckung der amerikanischen Währung verwendet werden und die Geldmenge erweitert wird."

USA_reapproachment_with_silver:0 "Wiederannäherung mit Silber"
USA_reapproachment_with_silver_desc:0 "Überdenken Sie die Verwendung von Silber im amerikanischen Währungssystem und streben Sie einen ausgewogenen Ansatz für die Geldpolitik an."

USA_approach_britain_about_silver_mints:0 "Wenden Sie sich wegen Silbermünzen an Großbritannien"
USA_approach_britain_about_silver_mints_desc:0 "Nehmen Sie diplomatische Gespräche mit Großbritannien auf, um die Möglichkeit der Gründung internationaler Silberprägeanstalten zu prüfen."

USA_they_reject_the_proposal:0 "Sie lehnen den Vorschlag ab"
USA_they_reject_the_proposal_desc:0 "Großbritannien lehnt den Vorschlag für internationale Silberprägeanstalten ab und zwingt die Vereinigten Staaten, ihre Währungsstrategie zu überdenken."

USA_stick_to_gold:0 "Bleiben Sie bei Gold"
USA_stick_to_gold_desc:0 "Entscheiden Sie sich dafür, ausschließlich den Goldstandard beizubehalten und betonen Sie die Stabilität und Zuverlässigkeit einer goldgedeckten Währung."

USA_continue_with_our_own_silver:0 "Weiter mit unserem eigenen Silber"
USA_continue_with_our_own_silver_desc:0 "Setzen Sie die inländische Silberprägung fort und unterstützen Sie so ein duales Währungssystem innerhalb der Vereinigten Staaten."

USA_a_stable_currency:0 "Eine stabile Währung"
USA_a_stable_currency_desc:0 "Konzentrieren Sie sich auf die Gewährleistung eines stabilen und robusten Währungssystems und achten Sie auf die ausgewogene Verwendung von Gold und Silber zur Unterstützung des Wirtschaftswachstums."

USA_they_accept_the_proposal:0 "Sie akzeptieren den Vorschlag"
USA_they_accept_the_proposal_desc:0 "Großbritannien stimmt der Gründung internationaler Silberprägeanstalten zu und ebnet damit den Weg für einen bimetallischen Standard und eine internationale Währungskooperation."

USA_international_bimentallism:0 "Internationaler Bimetallismus"
USA_international_bimentallism_desc:0 "Streben Sie einen internationalen Bimetallismus an und arbeiten Sie mit anderen Nationen zusammen, um die Weltwirtschaft durch einen doppelten Währungsstandard zu stabilisieren und zu stärken."
