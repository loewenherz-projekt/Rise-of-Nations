BRA_the_biggest_armada_desc:0 ""
BRA_brazilian_dockyards:0 "Brasilianische Werften"
BRA_brazilian_dockyards_desc:0 "Wir können uns nicht darauf verlassen, dass die europäischen Nationen unsere Marine für immer ausbauen. Wir müssen mit dem Bau unserer eigenen Werften beginnen."
BRA_european_dockyards:0 "Europäische Werften"
BRA_european_dockyards_desc:0 "Unser Land verfügt weder über die Industrie noch über die Fähigkeit, eigene Schiffe zu bauen. Doch es gibt unzählige Nationen in Europa, die bereit wären, dies für uns zu tun. Dies könnte jedoch von unseren Nachbarn als Provokation angesehen werden."
BRA_destroyer_designs:0 "Zerstörer-Designs"
BRA_destroyer_designs_desc:0 "Wir werden unser Bestes tun, um neue Zerstörer zu konstruieren, die mit der Technologie unserer Feinde konkurrieren können."
BRA_cruiser_designs:0 "Cruiser-Designs"
BRA_cruiser_designs_desc:0 "Wir werden unser Bestes tun, um neue Kreuzer zu konstruieren, die mit der Technologie unserer Feinde konkurrieren können."
BRA_battle_ship_designs:0 "Schlachtschiff-Designs"
BRA_battle_ship_designs_decs:0 "Wir werden unser Bestes tun, um neue Schlachtschiffe zu konstruieren, die mit der Technologie unserer Feinde konkurrieren können."
BRA_submarine_designs:0 "U-Boot-Designs"
BRA_submarine_designs_desc:0 "Wir werden unser Bestes tun, um neue U-Boote zu konstruieren, die mit der Technologie unserer Feinde konkurrieren können."
BRA_raiding_fleet:0 "Überfallflotte"
BRA_raiding_fleet_desc:0 ""
BRA_defense_fleet:0 "Verteidigungsflotte"
BRA_defense_fleet_desc:0 ""
BRA_the_brazilian_airforce:0 "Die brasilianische Luftwaffe"
BRA_the_brazilian_airforce_desc:0 "Unsere Luftwaffe hat im Gegensatz zu unserem Heer und unserer Marine nie an Kampfhandlungen oder Kriegen teilgenommen. Das heißt jedoch nicht, dass wir sie vernachlässigen sollten."
BRA_focus_on_agility:0 "Fokus auf Agilität"
BRA_focus_on_agility_desc:0 "Unsere Flugzeuge sollten in der Lage sein, feindliche Flugzeuge nach Belieben zu verfolgen und ihnen auszuweichen."
BRA_focus_on_range:0 "Fokus auf Reichweite"
BRA_focus_on_range_desc:0 "Unsere Flugzeuge sollten unsere riesigen Gebiete problemlos abdecken können, sonst wären sie nicht hilfreich."
BRA_focus_on_coverage:0 "Fokus auf Abdeckung"
BRA_focus_on_coverage_desc:0 "Unsere Bomber sollten in der Lage sein, eine breite Front abzudecken, sonst würden sie ihre einzige Aufgabe nicht erfüllen."
BRA_focus_on_precision:0 "Fokus auf Präzision"
BRA_focus_on_precision_desc:0 "Unsere Bomber sollten in der Lage sein, den feindlichen Truppen präzise und tödliche Schläge zu versetzen, auch wenn dies eine geringere Reichweite bedeutet."
BRA_learn_from_europe_air:0 "Von Europa lernen"
BRA_learn_from_europe_air_desc:0 "Um die Leistungsfähigkeit unserer Luftwaffe zu steigern, sollten wir die deutschen und britischen Luftdoktrinen nachahmen."
BRA_dragoes_do_ar:0 "Dragões do Ar"
BRA_dragoes_do_ar_desc:0 ""
BRA_the_french_guiana_dilema:0 "Das Guayana-Dilemma"
BRA_the_french_guiana_dilema_desc:0 ""
BRA_recover_the_cisplatine_province:0 "Erobern Sie die Cisplatin-Provinz zurück"
BRA_recover_the_cisplatine_province_desc:0 "Nach jahrelangem Krieg mit den Vereinigten Provinzen von Río de la Plata, dem heutigen Argentinien, haben wir die Provinz Cisplatine aufgegeben und der Region unter dem Namen Uruguay ihre Unabhängigkeit gewährt. Unsere Nation ist heute stärker denn je. Wenn die Argentinier es wagen, unser rechtmäßiges Territorium zu verteidigen, werden wir siegen."
VIN_save_aVIN_from_commusm:0 "Rettung von aVIN vor dem Kommunismus"
VIN_save_aVIN_from_commusm_desc:0 "Ergreifen von Maßnahmen zur Verhinderung der Ausbreitung oder des Einflusses des Kommunismus innerhalb einer bestimmten Einheit oder Region."
VIN_investigation_agaVINt_the_clock:0 "Untersuchung der Uhr"
VIN_investigation_agaVINt_the_clock_desc:0 "Durchführen von Anfragen oder Untersuchungen zu einer bestimmten Angelegenheit oder einem bestimmten Phänomen, symbolisiert durch die Metapher einer Uhr."
VIN_the_protector_of_aVIN:0 "Beschützer Vietnams"
VIN_the_protector_of_aVIN_desc:0 "Die Rolle des Beschützers einer bestimmten Entität oder Gruppe übernehmen, was möglicherweise ein umfassenderes Engagement für die Wahrung bestimmter Interessen widerspiegelt."
VIN_becoming_liVINg_buddhas:0 "Lebende Buddhas werden"
VIN_becoming_liVINg_buddhas_desc:0 "Sich auf eine spirituelle oder ideologische Reise begeben, um zur lebendigen Verkörperung bestimmter Prinzipien zu werden, möglicherweise in einem religiösen Kontext."
VIN_support_malayVINn_independence:0 "Unterstützung der malaysischen Unabhängigkeit"
VIN_support_malayVINn_independence_desc:0 "Ausweitung der Hilfe und Unterstützung für die Unabhängigkeit Malayvins, wahrscheinlich als Teil umfassenderer Solidaritätsbemühungen."
VIN_align_VINm:0 "Annäherung an Vietnam"
VIN_align_VINm_desc:0 "Bilden von Vereinbarungen oder Abkommen mit anderen Unternehmen, möglicherweise zum gegenseitigen Nutzen, für strategische Allianzen oder gemeinsame Ziele."
Japan_develop_industry:0 "Industrie entwickeln"
Japan_develop_industry_desc:0 "Wir werden unsere Branche weiterentwickeln"
SOV_surrender_europe_CW:0 "Kapitulation, Europa"
SOV_surrender_europe_CW_desc:0 "Wir haben Europa verloren. Europa ist gefallen, der Kalte Krieg ist vorbei"
USA_surrender_europe_CW:0 "Kapitulation, Europa"
USA_surrender_europe_CW_desc:0 "Der Westen ist gefallen, wir haben Europa verloren. Europa ist gefallen, der Kalte Krieg ist vorbei"
######CW localiaztion
USA_CW_tax_reform_act_of_1969:0 "Steuerreformgesetz von 1969"
USA_CW_tax_reform_act_of_1969_desc:0 "Das Steuerreformgesetz von 1969 zielt darauf ab, unser Steuersystem umzustrukturieren, um unsere wachsenden militärischen Anstrengungen während des Kalten Krieges zu finanzieren und wichtige Sozialprogramme zu unterstützen."
USA_CW_geneva_summit:0 "Genfer Gipfel"
USA_CW_geneva_summit_desc:0 "Nehmen Sie am Genfer Gipfel teil, um diplomatische Gespräche und Verhandlungen mit der Sowjetunion zu führen und sich um eine friedlichere Koexistenz inmitten der Spannungen des Kalten Krieges zu bemühen."
USA_CW_iranian_coup:0 "Iranischer Putsch"
USA_CW_iranian_coup_desc:0 "Unterstützen Sie einen Putsch im Iran, um sich den Zugang zu wertvollen Ressourcen zu sichern und ein freundlich gesinntes Regime im Nahen Osten zu etablieren, einer Region von strategischer Bedeutung während des Kalten Krieges."
USA_CW_ready_for_war:0 "Bereit für den Krieg"
USA_CW_ready_for_war_desc:0 "Bereiten Sie die Nation auf den drohenden Konflikt des Kalten Krieges vor, indem Sie unsere militärische Bereitschaft erhöhen und sicherstellen, dass wir für jede Bedrohung durch die Sowjetunion gerüstet sind."
USA_CW_a_defensive_army:0 "Eine Verteidigungsarmee"
USA_CW_a_defensive_army_desc:0 "Wir müssen unseren militärischen Schwerpunkt auf die Schaffung einer robusten Verteidigungsstreitmacht verlagern, die in der Lage ist, unser Heimatland vor äußeren Angriffen zu schützen – eine entscheidende Strategie während des Kalten Krieges."
USA_CW_america_triumphant:0 "Amerika triumphiert"
USA_CW_america_triumphant_desc:0 "Fördern Sie die Idee der amerikanischen Ausnahmestellung und Überlegenheit und vereinen Sie die Nation im Glauben an unser einzigartiges Schicksal, während wir die Herausforderungen des Kalten Krieges meistern."
USA_CW_finalize_our_borders:0 "Unsere Grenzen festlegen"
USA_CW_finalize_our_borders_desc:0 "Sichern Sie unsere Grenzen, indem Sie die Befestigungen verstärken und die Grenzkontrollen verstärken, um die Integrität unserer Nation während der Unsicherheiten des Kalten Krieges zu schützen."
USA_CW_hegemony:0 "Hegemonie"
USA_CW_hegemony_desc:0 "Wir verfolgen eine Politik der regionalen und globalen Hegemonie und behaupten unsere Dominanz in internationalen Angelegenheiten, einem zentralen Aspekt der Geopolitik des Kalten Krieges."
USA_CW_combat_racism_in_the_housing_industry:0 "Bekämpfung von Rassismus in der Wohnungswirtschaft"
USA_CW_combat_racism_in_the_housing_industry_desc:0 "Arbeiten Sie daran, Rassendiskriminierung im Wohnungssektor zu beseitigen, indem Sie allen Bürgern den gleichen Zugang zu Wohnraum ermöglichen und gleichzeitig Bürgerrechtsfragen aus der Zeit des Kalten Krieges ansprechen."
USA_CW_join_the_soviets:0 "Treten Sie den Sowjets bei"
USA_CW_join_the_soviets_desc:0 "Stellen Sie sich ein überraschendes Bündnis mit der Sowjetunion vor, um gemeinsamen Gegnern entgegenzutreten und die geopolitische Landschaft der Ära des Kalten Krieges neu zu definieren."
USA_CW_the_washingtonwindsor_royal_marriage:0 "Die königliche Hochzeit zwischen Washington und Windsor"
USA_CW_the_washingtonwindsor_royal_marriage_desc:0 "Stärken Sie die Bindungen zur britischen Monarchie, indem Sie eine königliche Hochzeit arrangieren und so eine einzigartige transatlantische Beziehung fördern, die die Politik des Kalten Krieges beeinflussen kann."
USA_CW_white_christian_republic:0 "Weiße Christliche Republik"
USA_CW_white_christian_republic_desc:0 "Verschieben Sie die Identität der Nation in Richtung einer weißen christlichen Republik und betonen Sie inmitten der ideologischen Kämpfe des Kalten Krieges eine besondere kulturelle und religiöse Identität."
USA_CW_power_is_ours:0 "Die Macht liegt bei uns"
USA_CW_power_is_ours_desc:0 "Setzen Sie auf einen machtzentrierten Ansatz, indem Sie die Macht innerhalb der Regierung konsolidieren und die Autorität zentralisieren, um den Herausforderungen des Kalten Krieges zu begegnen."
USA_CW_war_is_coming:0 "Der Krieg kommt"
USA_CW_war_is_coming_desc:0 "Erkennen Sie den bevorstehenden Konflikt des Kalten Krieges und treffen Sie die notwendigen Vorbereitungen, um das Überleben der Nation in dieser Ära hoher Einsätze zu sichern."
USA_CW_intensify_nuclear_research:0 "Intensivierung der Kernforschung"
USA_CW_intensify_nuclear_research_desc:0 "Bereitstellung von Ressourcen zur Intensivierung der nuklearen Forschungsanstrengungen mit dem Ziel, eine nukleare Supermacht zu werden, ein entscheidender Aspekt der Militärstrategie des Kalten Krieges."
USA_CW_expand_industry_in_the_midwest:0 "Industrie im Mittleren Westen ausbauen"
USA_CW_expand_industry_in_the_midwest_desc:0 "Entwickeln Sie die industrielle Basis im Mittleren Westen, stärken Sie unsere Wirtschaftskraft und leisten Sie einen Beitrag zum wirtschaftlichen und technologischen Wettbewerb der Zeit des Kalten Krieges."
USA_CW_one_party_state:0 "Einparteienstaat"
USA_CW_one_party_state_desc:0 "Festigung der politischen Macht durch die Gründung eines Einparteienstaates und Gewährleistung einer einheitlichen Regierung unter unserer Führung – eine Strategie zur Aufrechterhaltung der Kontrolle während des Kalten Krieges."
USA_CW_collectivize_farming:0 "Kollektivierung der Landwirtschaft"
USA_CW_collectivize_farming_desc:0 "Übergang zu einem kollektivierten Landwirtschaftssystem mit dem Ziel einer höheren landwirtschaftlichen Produktivität und Ernährungssicherheit, was während des Kalten Krieges von entscheidender Bedeutung war."
USA_CW_peace_and_safety:0 "Frieden und Sicherheit"
USA_CW_peace_and_safety_desc:0 "Befürworter eines friedlichen Ansatzes in den internationalen Beziehungen und Streben nach Stabilität und Sicherheit inmitten der Spannungen des Kalten Krieges."
USA_CW_imperial_alliance:0 "Imperiale Allianz"
USA_CW_imperial_alliance_desc:0 "Streben Sie Bündnisse mit anderen imperialen Mächten an, um gemeinsam die Vorherrschaft auf der Weltbühne zu behaupten – eine Strategie, um den Supermächten des Kalten Krieges ein Gegengewicht zu geben."
USA_CW_influence_foreign_politics:0 "Einfluss auf die Außenpolitik"
USA_CW_influence_foreign_politics_desc:0 "Nehmen Sie an verdeckten Operationen und diplomatischen Einsätzen teil, um die politische Landschaft in anderen Ländern zu beeinflussen und die Ereignisse während der komplexen Politik des Kalten Krieges zu Ihrem Vorteil zu gestalten."
USA_CW_protect_our_secrets:0 "Schützen Sie unsere Geheimnisse"
USA_CW_protect_our_secrets_desc:0 "Wir müssen unsere Geheimdienst- und Spionageabwehrbemühungen verstärken, um vertrauliche Informationen und technologische Geheimnisse zu schützen, die in der von Spionage geprägten Ära des Kalten Krieges von entscheidender Bedeutung waren."
USA_CW_our_own_path:0 "Unser eigener Weg"
USA_CW_our_own_path_desc:0 "Verfolgen Sie in einer Welt, die von den Machtkämpfen des Kalten Krieges geprägt ist, einen einzigartigen und unabhängigen außenpolitischen Weg, der ausschließlich von unseren nationalen Interessen geleitet wird."
USA_CW_national_demonstrations:0 "Nationale Demonstrationen"
USA_CW_national_demonstrations_desc:0 "Ermutigen Sie zu landesweiten Demonstrationen und Protesten, um die Regierung zu mehr Einfühlungsvermögen in die Bedürfnisse der Bevölkerung zu bewegen – ein Spiegelbild der Bürgerrechts- und Antikriegsbewegungen der Zeit des Kalten Krieges."
USA_CW_form_white_assault_battalions:0 "Bilden Sie weiße Angriffsbataillone"
USA_CW_form_white_assault_battalions_desc:0 "Schaffung paramilitärischer Einheiten aus weißen Nationalisten, die in den turbulenten Zeiten des Kalten Krieges die innere Sicherheit stärken."
USA_CW_rise_of_the_american_nazi_party:0 "Aufstieg der American Nazi Party"
USA_CW_rise_of_the_american_nazi_party_desc:0 "Unterstützen Sie den Aufstieg einer amerikanischen Nazipartei, die die Nation während der ideologischen Kämpfe des Kalten Krieges auf die Seite rechtsextremer Ideologien stellt."
USA_CW_empower_the_unions:0 "Stärkung der Gewerkschaften"
USA_CW_empower_the_unions_desc:0 "Förderung des Wachstums und des Einflusses von Gewerkschaften und Stärkung der Verhandlungsmacht der Arbeitnehmer, ein zentraler Aspekt der Arbeitsbeziehungen während des Kalten Krieges."
USA_CW_crush_the_civil_rights_movement:0 "Zerschlagung der Bürgerrechtsbewegung"
USA_CW_crush_the_civil_rights_movement_desc:0 "Ergreifen Sie extreme Maßnahmen, um die Bürgerrechtsbewegung zu unterdrücken und den Status quo während der turbulenten Bürgerrechtsära des Kalten Krieges zu bewahren."
USA_CW_liberate_the_caucasus:0 "Befreie den Kaukasus"
USA_CW_liberate_the_caucasus_desc:0 "Planen Sie eine Militärkampagne, um den Kaukasus von der sowjetischen Kontrolle zu befreien, Zugang zu wichtigen Ressourcen zu erhalten und den sowjetischen Einfluss während des Kalten Krieges herauszufordern."
USA_CW_the_red_dragon:0 "Der rote Drache"
USA_CW_the_red_dragon_desc:0 "Unterstützen Sie den kommunistischen Aufstand in China mit dem Ziel, das Land in den sozialistischen Kontext zu führen und die Dynamik des Kalten Krieges in Asien zu beeinflussen."
USA_CW_victory:0 "Sieg"
USA_CW_victory_desc:0 "Versammeln Sie die Nation zu einer umfassenden Anstrengung mit dem Ziel, den Sieg zu erringen und unsere Position als globale Supermacht im Wettbewerbsumfeld des Kalten Krieges zu sichern."
USA_CW_invade_china:0 "Invasion in China"
USA_CW_invade_china_desc:0 "Planen Sie eine groß angelegte Invasion Chinas, um die kommunistische Bedrohung zu beseitigen und die Kontrolle über die Region zu erlangen."
USA_CW_join_the_eastern_bloc:0 "Treten Sie dem Ostblock bei"
USA_CW_join_the_eastern_bloc_desc:0 "Erwägen Sie eine Allianz mit den Ostblockstaaten, um dem westlichen Einfluss entgegenzuwirken und sozialistische Ideale zu fördern."
USA_CW_requisition_civilian_resources:0 "Zivile Ressourcen anfordern"
USA_CW_requisition_civilian_resources_desc:0 "Nutzen Sie zivile Ressourcen für die Kriegsanstrengungen und priorisieren Sie dabei die militärische Produktion und die Bedürfnisse des Staates."
USA_CW_the_red_menace:0 "Die rote Bedrohung"
USA_CW_the_red_menace_desc:0 "Starten Sie eine aggressive Propagandakampagne gegen den Kommunismus und stellen Sie ihn als globale Bedrohung dar."
USA_CW_intervention:0 "Intervention"
USA_CW_intervention_desc:0 "In ausländische Konflikte eingreifen, um unsere Interessen zu schützen und den Ausgang zu unseren Gunsten zu gestalten."
USA_CW_reform_congress:0 "Reformkongress"
USA_CW_reform_congress_desc:0 "Leiten Sie eine Reihe von Reformen ein, um die Legislative zu rationalisieren und zu modernisieren und so die Regierungsführung zu verbessern."
USA_CW_leader_of_the_free_world:0 "Anführer der freien Welt"
USA_CW_leader_of_the_free_world_desc:0 "Übernehmen Sie die Rolle des Anführers der freien Welt und fördern Sie Demokratie und Freiheit auf der Weltbühne."
USA_CW_our_place_in_the_world:0 "Unser Platz in der Welt"
USA_CW_our_place_in_the_world_desc:0 "Denken Sie über die Rolle und den Platz unseres Landes in der sich entwickelnden Weltordnung nach und gestalten Sie unsere Außenpolitik entsprechend."
USA_CW_finish_the_nuremberg_trials:0 "Beenden Sie die Nürnberger Prozesse"
USA_CW_finish_the_nuremberg_trials_desc:0 "Die Nürnberger Prozesse sollten abgeschlossen werden, um die Kriegsverbrechen aufzuklären und den Wiederaufbau Europas nach dem Krieg zu erleichtern."
USA_CW_continue_the_marshal_plan:0 "Den Marshallplan fortsetzen"
USA_CW_continue_the_marshal_plan_desc:0 "Verpflichten Sie sich zur Ausweitung und Aufrechterhaltung des Marshallplans und stellen Sie Europa Hilfe für den Wiederaufbau nach dem Krieg zur Verfügung."
USA_CW_the_unthinkable:0 "Das Undenkbare"
USA_CW_the_unthinkable_desc:0 "Erwägen Sie drastische Maßnahmen und Strategien, um mit unerwarteten und beispiellosen globalen Herausforderungen umzugehen."
USA_CW_revolution:0 "Revolution"
USA_CW_revolution_desc:0 "Unterstützen Sie revolutionäre Bewegungen weltweit, die sich für einen politischen Umbruch einsetzen, der unseren Interessen entspricht."
USA_CW_form_battalions:0 "Bataillone bilden"
USA_CW_form_battalions_desc:0 "Stellen Sie spezialisierte Militärbataillone auf, um besonderen strategischen Anforderungen und Herausforderungen gerecht zu werden."
USA_CW_nationalize_industry:0 "Verstaatlichung der Industrie"
USA_CW_nationalize_industry_desc:0 "Übernehmen Sie durch Verstaatlichung die Kontrolle über Schlüsselindustrien, um wirtschaftliche Stabilität und Sicherheit zu gewährleisten."
USA_CW_reach_out_to_china:0 "Erreichen Sie China"
USA_CW_reach_out_to_china_desc:0 "Initiieren Sie diplomatische Bemühungen, um mit China in Kontakt zu treten und streben Sie eine Partnerschaft oder Allianz zum gegenseitigen Nutzen an."
USA_CW_arm_the_workers:0 "Bewaffnen Sie die Arbeiter"
USA_CW_arm_the_workers_desc:0 "Rüsten Sie die Arbeiterklasse aus und mobilisieren Sie sie, um unser Militär zu stärken und die sozialistische Sache zu unterstützen."
USA_CW_use_aid:0 "Nutzen Sie die Hilfe mit Bedacht"
USA_CW_use_aid_desc:0 "Wir müssen die Auslandshilfe effektiv einsetzen, um unsere Ziele zu unterstützen, die Stabilität zu fördern und unseren Einfluss auszuweiten."
USA_CW_from_a_militia_to_a_fighting_force:0 "Von der Miliz zur Kampftruppe"
USA_CW_from_a_militia_to_a_fighting_force_desc:0 "Verwandeln Sie unsere Miliz durch Training, Ausrüstung und Organisation in eine fähige Kampftruppe."
USA_CW_into_the_workforce:0 "In die Belegschaft"
USA_CW_into_the_workforce_desc:0 "Betonen Sie die Entwicklung der Arbeitskräfte und die Beteiligung am Arbeitsmarkt, um die wirtschaftliche Grundlage des Landes zu stärken."
USA_CW_all_hands_on_deck:0 "Alle Mann an Deck"
USA_CW_all_hands_on_deck_desc:0 "Mobilisieren Sie die gesamte Bevölkerung und nutzen Sie alle verfügbaren Ressourcen und Arbeitskräfte für unsere nationalen Ziele."
USA_CW_our_own_four_year_plans:0 "Unsere eigenen Vierjahrespläne"
USA_CW_our_own_four_year_plans_desc:0 "Setzen Sie umfassende Wirtschafts- und Industriepläne um, um langfristiges Wachstum und Entwicklung sicherzustellen."
USA_CW_on_our_own:0 "Auf eigene Faust"
USA_CW_on_our_own_desc:0 "Behaupten Sie Unabhängigkeit von ausländischen Einflüssen und verfolgen Sie eine Politik der Eigenständigkeit und Selbstversorgung."
USA_CW_neutrality:0 "Neutralität"
USA_CW_neutrality_desc:0 "Erklären Sie eine Politik der Neutralität in internationalen Konflikten und vermeiden Sie die Verwicklung in ausländische Kriege."
USA_CW_our_own_bloc:0 "Unser eigener Block"
USA_CW_our_own_bloc_desc:0 "Errichten Sie einen eigenen politischen und militärischen Block als Gegengewicht zu den Weltmächten und behaupten Sie unsere Unabhängigkeit."
USA_CW_invite_communists_in_the_americas:0 "Laden Sie Kommunisten in Amerika ein"
USA_CW_invite_communists_in_the_americas_desc:0 "Um unsere Position zu stärken, laden wir kommunistische Bewegungen in Amerika ein und unterstützen sie."
USA_CW_prepare_invasions:0 "Invasionen vorbereiten"
USA_CW_prepare_invasions_desc:0 "Planen und bereiten Sie militärische Invasionen vor, um strategische Ziele zu sichern und unseren Einfluss auszuweiten."
USA_CW_puppet_mexico:0 "Marionette Mexiko"
USA_CW_puppet_mexico_desc:0 "Üben Sie Kontrolle über Mexiko aus, indem Sie eine Marionettenregierung einsetzen, die unseren Interessen entspricht."
USA_CW_puppet_brazil:0 "Marionette Brasilien"
USA_CW_puppet_brazil_desc:0 "Errichten Sie in Brasilien ein Marionettenregime, das die Kontrolle über diese bedeutende südamerikanische Nation ausübt."
USA_CW_take_a_backseat:0 "Nehmen Sie einen Rücksitz"
USA_CW_take_a_backseat_desc:0 "Ziehen Sie sich aus der vordersten Reihe der internationalen Politik zurück und wählen Sie einen passiveren und vorsichtigeren Ansatz."
USA_CW_rise_in_extremism:0 "Anstieg des Extremismus"
USA_CW_rise_in_extremism_desc:0 "Wir müssen uns mit der wachsenden Welle des Extremismus innerhalb unserer Grenzen auseinandersetzen und versprechen, dass wir radikale Ideologien bekämpfen werden."
USA_CW_empower_the_military:0 "Stärkung des Militärs"
USA_CW_empower_the_military_desc:0 "Geben Sie dem Militär mehr Autorität und Ressourcen und stellen Sie sicher, dass wir über eine starke und leistungsfähige Verteidigungsstreitmacht verfügen."
USA_CW_radicalize_the_workers:0 "Radikalisierung der Arbeiter"
USA_CW_radicalize_the_workers_desc:0 "Fördern Sie die Radikalisierung der Arbeiterklasse und festigen Sie die Vorstellung, dass wir eine Arbeiterrevolution erreichen werden."
USA_CW_seek_foreign_aid:0 "Suchen Sie nach ausländischer Hilfe"
USA_CW_seek_foreign_aid_desc:0 "Wir suchen nach internationaler Unterstützung und Hilfe und zeigen damit, dass wir Hilfe zur Erreichung unserer Ziele annehmen."
USA_CW_reach_out_to_the_ussr:0 "Erreichen Sie die UdSSR"
USA_CW_reach_out_to_the_ussr_desc:0 "Wir nehmen diplomatische Kontakte zur UdSSR auf und signalisieren damit, dass wir eine Zusammenarbeit mit dem Ostblock anstreben."
USA_CW_suspend_elections:0 "Wahlen aussetzen"
USA_CW_suspend_elections_desc:0 "Setzen Sie demokratische Wahlen aus und betonen Sie, dass wir der Stabilität Vorrang vor politischen Übergängen einräumen."
USA_CW_military_research:0 "Militärische Forschung"
USA_CW_military_research_desc:0 "Investieren Sie massiv in die militärische Forschung und stellen Sie sicher, dass wir über modernste Technologien und Taktiken verfügen."
USA_CW_victory_in_the_civil_war:0 "Sieg im Bürgerkrieg"
USA_CW_victory_in_the_civil_war_desc:0 "Erklären Sie, dass wir im anhaltenden Bürgerkrieg um jeden Preis den Sieg erringen werden."
USA_CW_spread_communism_in_the_americas:0 "Verbreitung des Kommunismus in Amerika"
USA_CW_spread_communism_in_the_americas_desc:0 "Verpflichten Sie sich, den Kommunismus in ganz Amerika zu verbreiten, und versprechen Sie, dass wir Veränderungen herbeiführen werden."
USA_CW_finance_revolutionaries:0 "Finanzrevolutionäre"
USA_CW_finance_revolutionaries_desc:0 "Wir unterstützen revolutionäre Bewegungen weltweit finanziell und versichern, dass wir den Wandel finanzieren werden."
USA_CW_deal_with_our_territories:0 "Umgang mit unseren Gebieten"
USA_CW_deal_with_our_territories_desc:0 "Sprechen Sie über die Verwaltung und Zukunft unserer Gebiete und stellen Sie klar, dass wir sie angemessen verwalten werden."
USA_CW_issues_at_home:0 "Probleme zu Hause"
USA_CW_issues_at_home_desc:0 "Bewältigen Sie innenpolitische Probleme und Herausforderungen und stellen Sie sicher, dass wir der Lösung von Problemen innerhalb unserer Grenzen Priorität einräumen."
USA_CW_boycott_minority_businesses:0 "Boykottieren Sie Unternehmen von Minderheiten"
USA_CW_boycott_minority_businesses_desc:0 "Fordern Sie einen Boykott von Unternehmen in Minderheitenbesitz auf und betonen Sie, dass wir diese Unternehmen isolieren werden."
USA_CW_march_on_washington:0 "Marsch auf Washington"
USA_CW_march_on_washington_desc:0 "Organisieren Sie einen Massenmarsch nach Washington, D.C., um zu zeigen, dass wir Veränderung und Gerechtigkeit fordern."
USA_CW_the_government_cedes_power:0 "Die Regierung gibt Macht ab"
USA_CW_the_government_cedes_power_desc:0 "Drängen Sie die Regierung, die Macht an das Volk abzugeben, und bekräftigen Sie, dass wir ein partizipativeres System schaffen werden."
USA_CW_a_fascist_state:0 "Ein faschistischer Staat"
USA_CW_a_fascist_state_desc:0 "Setzen Sie sich für die Umwandlung der Nation in einen faschistischen Staat ein und versprechen Sie, dass wir eine autoritäre Herrschaft durchsetzen werden."
USA_CW_jim_crow_nationwide:0 "Jim Crow bundesweit"
USA_CW_jim_crow_nationwide_desc:0 "Machen Sie sich landesweit für die Jim-Crow-Gesetze stark und behaupten Sie, dass wir die Rassentrennung institutionalisieren werden."
USA_CW_arrest_communists:0 "Kommunisten verhaften"
USA_CW_arrest_communists_desc:0 "Starten Sie eine Kampagne zur Verhaftung und Unterdrückung kommunistischer Elemente und erklären Sie, dass wir diese Bedrohung beseitigen werden."
USA_CW_intensify_segregation:0 "Verstärkte Segregation"
USA_CW_intensify_segregation_desc:0 "Stärkung und Intensivierung der Politik der Rassentrennung, wobei wir betonen, dass wir die ethnischen Gemeinschaften noch weiter trennen werden."
USA_CW_strip_minority_rights:0 "Minderheitenrechte entziehen"
USA_CW_strip_minority_rights_desc:0 "Nehmen Sie Minderheitengruppen ihre Rechte und Privilegien weg und bestätigen Sie damit, dass wir eine von Weißen dominierte Gesellschaft aufrechterhalten werden."
USA_CW_make_christianity_the_official_religion:0 "Machen Sie das Christentum zur offiziellen Religion"
USA_CW_make_christianity_the_official_religion_desc:0 "Fördern Sie die Etablierung des Christentums als offizielle Staatsreligion und bekräftigen Sie, dass wir religiöse Werte hochhalten werden."
USA_CW_republic_in_name_only:0 "Republik nur dem Namen nach"
USA_CW_republic_in_name_only_desc:0 "Wandeln Sie die Nation in eine Republik um, die nur dem Namen nach eine Republik ist, in der die Macht in den Händen einiger weniger konzentriert ist, und stellen Sie sicher, dass wir den Staat kontrollieren."
USA_CW_expand_the_intelligence_sector:0 "Ausbau des Geheimdienstsektors"
USA_CW_expand_the_intelligence_sector_desc:0 "Den Geheimdienst- und Spionagesektor ausbauen und so sicherstellen, dass wir Informationen sammeln und weltweit Einfluss auf Ereignisse nehmen können."
USA_CW_begin_deportations:0 "Beginnen Sie mit den Deportationen"
USA_CW_begin_deportations_desc:0 "Wir leiten Massenabschiebungen bestimmter Gruppen ein und versprechen, dass wir das Land von unerwünschten Personen säubern werden."
USA_CW_prepare_for_war_in_europe:0 "Bereiten Sie sich auf den Krieg in Europa vor"
USA_CW_prepare_for_war_in_europe_desc:0 "Bereiten Sie sich auf ein mögliches militärisches Engagement in Europa vor und machen Sie deutlich, dass wir auf jeden Konflikt vorbereitet sind."
USA_CW_joint_invasion_of_the_soviet_union:0 "Gemeinsame Invasion der Sowjetunion"
USA_CW_joint_invasion_of_the_soviet_union_desc:0 "Planen Sie gemeinsam mit unseren Verbündeten eine Invasion der Sowjetunion und setzen Sie sich für den Untergang des Kommunismus ein."
USA_CW_land_in_france_and_britain:0 "Land in Frankreich und Großbritannien"
USA_CW_land_in_france_and_britain_desc:0 "Bereiten Sie sich auf groß angelegte Landungen in Frankreich und Großbritannien vor und signalisieren Sie damit, dass wir unseren westlichen Verbündeten helfen werden."
USA_CW_build_infrastructure_in_western_europe:0 "Infrastruktur in Westeuropa aufbauen"
USA_CW_build_infrastructure_in_western_europe_desc:0 "Investieren Sie in den Aufbau der Infrastruktur in Westeuropa und bestätigen Sie damit, dass wir unsere Verbündeten unterstützen werden."
USA_CW_withdraw_diplomats_from_nato_countries:0 "Diplomaten aus den NATO-Ländern abziehen"
USA_CW_withdraw_diplomats_from_nato_countries_desc:0 "Rufen Sie unsere Diplomaten aus den NATO-Mitgliedsländern zurück und betonen Sie, dass wir uns aus dem Bündnis zurückziehen werden."
USA_CW_build_up_the_airforce:0 "Bauen Sie die Luftwaffe auf"
USA_CW_build_up_the_airforce_desc:0 "Stärkung und Ausbau der Luftwaffe, um sicherzustellen, dass wir in jedem Konflikt die Luftüberlegenheit behalten."
USA_CW_strengthen_the_navy:0 "Stärkung der Marine"
USA_CW_strengthen_the_navy_desc:0 "Investieren Sie in den Ausbau und die Modernisierung der Marine und bekräftigen Sie, dass wir eine starke Marinepräsenz aufrechterhalten werden."
USA_CW_prepare_the_marines:0 "Bereiten Sie die Marines vor"
USA_CW_prepare_the_marines_desc:0 "Bereiten Sie das United States Marine Corps auf eine entscheidende Rolle in kommenden Konflikten vor und erklären Sie, dass wir es effektiv einsetzen werden."
USA_CW_rearm_japan:0 "Japan wieder aufrüsten"
USA_CW_rearm_japan_desc:0 "Helfen Sie bei der Wiederbewaffnung Japans und zeigen Sie damit, dass wir im Pazifik einen starken Verbündeten haben werden."
USA_CW_dismantle_the_western_powers:0 "Zerschlagung der Westmächte"
USA_CW_dismantle_the_western_powers_desc:0 "Setzen Sie sich für die Zerschlagung der westlichen Kolonialreiche ein und versprechen Sie, dass wir die Entkolonialisierung unterstützen werden."
USA_CW_agreement_with_nato:0 "Abkommen mit der NATO"
USA_CW_agreement_with_nato_desc:0 "Verhandeln Sie ein neues Abkommen mit der NATO und bekräftigen Sie unser Engagement für gegenseitige Verteidigung und Sicherheit."
USA_CW_destroy_communism:0 "Zerstöre den Kommunismus"
USA_CW_destroy_communism_desc:0 "Machen Sie es zu unserer Hauptaufgabe, den Kommunismus weltweit zu zerstören, und versprechen Sie, dass wir nicht ruhen werden, bis er ausgerottet ist."
USA_CW_rapid_militarization:0 "Rasche Militarisierung"
USA_CW_rapid_militarization_desc:0 "Führen Sie ein schnelles Militarisierungsprogramm durch, das zeigt, dass wir in Rekordzeit zu einer militärischen Großmacht werden."
USA_CW_purge_disloyal_generals:0 "Säuberung illoyaler Generäle"
USA_CW_purge_disloyal_generals_desc:0 "Entfernen Sie illoyale oder unzuverlässige Generäle aus unserem Militär und stellen Sie sicher, dass wir über ein loyales Offizierskorps verfügen."
USA_CW_expand_military_industry:0 "Ausbau der Militärindustrie"
USA_CW_expand_military_industry_desc:0 "Erweitern Sie unseren militärisch-industriellen Komplex und stellen Sie sicher, dass wir über die für den Krieg erforderlichen Ressourcen verfügen."
USA_CW_alliance_with_argentina:0 "Bündnis mit Argentinien"
USA_CW_alliance_with_argentina_desc:0 "Bilden Sie eine strategische Allianz mit Argentinien und bekräftigen Sie, dass wir zusammenarbeiten werden, um unsere Ziele zu erreichen."
USA_CW_ally_with_the_ira:0 "Verbünde dich mit der IRA"
USA_CW_ally_with_the_ira_desc:0 "Schmieden Sie ein Bündnis mit der Irisch-Republikanischen Armee und zeigen Sie damit, dass wir ihr Anliegen für die irische Unabhängigkeit unterstützen werden."
USA_CW_find_allies:0 "Finde Verbündete"
USA_CW_find_allies_desc:0 "Wir suchen nach potenziellen Verbündeten und Partnern, um unser Netzwerk gleichgesinnter Nationen zu erweitern und zu zeigen, dass wir unsere Allianzen stärken werden."
USA_CW_join_the_united_nations:0 "Treten Sie den Vereinten Nationen bei"
USA_CW_join_the_united_nations_desc:0 "Beantragen Sie die Mitgliedschaft bei den Vereinten Nationen und bringen Sie damit Ihre Absicht zum Ausdruck, Teil der internationalen Gemeinschaft zu werden."
USA_CW_approach_the_soviet_union:0 "Annäherung an die Sowjetunion"
USA_CW_approach_the_soviet_union_desc:0 "Öffnen Sie diplomatische Kanäle mit der Sowjetunion und zeigen Sie damit, dass wir nach Zusammenarbeit und Verständnis streben."
USA_CW_approach_the_western_powers:0 "Nähern Sie sich den Westmächten"
USA_CW_approach_the_western_powers_desc:0 "Stärken Sie die Beziehungen zu den westlichen Mächten und Demokratien und vermitteln Sie, dass wir eine gemeinsame Front bilden werden."
USA_CW_join_nato:0 "Treten Sie der NATO bei"
USA_CW_join_nato_desc:0 "Beantragen Sie die Mitgliedschaft in der NATO und betonen Sie, dass wir ein vollwertiges Mitglied des Bündnisses werden."
USA_CW_north_american_republic:0 "Nordamerikanische Republik"
USA_CW_north_american_republic_desc:0 "Schlagen Sie die Gründung einer vereinten nordamerikanischen Republik vor und erklären Sie, dass wir für gemeinsame Interessen zusammenarbeiten werden."
USA_CW_american_ingenuity:0 "Amerikanischer Einfallsreichtum"
USA_CW_american_ingenuity_desc:0 "Setzen Sie sich für den amerikanischen Einfallsreichtum und die Innovation ein und versprechen Sie, dass wir beim technologischen Fortschritt führend sein werden."
USA_CW_offer_canada_an_alliance:0 "Bieten Sie Kanada ein Bündnis an"
USA_CW_offer_canada_an_alliance_desc:0 "Machen Sie Kanada ein Bündnisangebot und zeigen Sie damit, dass wir gemeinsam für die Sicherheit Nordamerikas eintreten."
USA_CW_annex_canada:0 "Anhang Kanada"
USA_CW_annex_canada_desc:0 "Streben Sie die Annexion Kanadas durch die Vereinigten Staaten an und versichern Sie, dass wir den nordamerikanischen Kontinent vereinen werden."
USA_CW_demand_the_border_states:0 "Fordern Sie die Grenzstaaten"
USA_CW_demand_the_border_states_desc:0 "Erheben Sie einen Anspruch auf die Grenzstaaten und erklären Sie, dass wir sie in die Vereinigten Staaten integrieren werden."
USA_CW_invade_mexico:0 "Invasion in Mexiko"
USA_CW_invade_mexico_desc:0 "Planen Sie eine militärische Invasion Mexikos und machen Sie deutlich, dass wir die Kontrolle über unseren südlichen Nachbarn übernehmen werden."
USA_CW_socialism_for_whites:0 "Sozialismus für Weiße"
USA_CW_socialism_for_whites_desc:0 "Befürworten Sie einen selektiven Sozialismus, der nur weißen Amerikanern zugute kommt, und betonen Sie, dass wir Minderheiten ausschließen werden."
USA_CW_expand_oil_production:0 "Ölproduktion ausweiten"
USA_CW_expand_oil_production_desc:0 "Investieren Sie in den Ausbau der Ölproduktion und die Sicherung der Energieressourcen, um sicherzustellen, dass wir unseren Energiebedarf decken."
USA_CW_approach_franco:0 "Nähere dich Franco"
USA_CW_approach_franco_desc:0 "Wir müssen Verhandlungen aufnehmen und auf das Regime von Francisco Franco in Spanien zugehen und signalisieren, dass wir mit autoritären Mächten zusammenarbeiten werden."
USA_CW_imperial_ambitions:0 "Imperiale Ambitionen"
USA_CW_imperial_ambitions_desc:0 "Wir bekennen uns zu imperialen Ambitionen und territorialer Expansion und schwören, dass wir ein riesiges amerikanisches Imperium aufbauen werden."
USA_CW_refuse_to_join_the_united_nations:0 "Weigerung, den Vereinten Nationen beizutreten"
USA_CW_refuse_to_join_the_united_nations_desc:0 "Wir lehnen den Beitritt zu den Vereinten Nationen ab und erklären, dass wir nicht Teil dieses internationalen Gremiums werden."
USA_CW_approach_south_american_nations:0 "Annäherung an südamerikanische Nationen"
USA_CW_approach_south_american_nations_desc:0 "Wir nehmen diplomatische Kontakte zu südamerikanischen Ländern auf und zeigen damit, dass wir unseren Einfluss in der Region ausweiten werden."
USA_CW_release_our_nonwhite_territories:0 "Geben Sie unsere nichtweißen Gebiete frei"
USA_CW_release_our_nonwhite_territories_desc:0 "Geben Sie nichtweiße Gebiete unter unserer Kontrolle frei und bekräftigen Sie, dass wir ihnen die Unabhängigkeit gewähren werden."
USA_CW_demand_oaths_of_loyalty:0 "Fordern Sie Treueschwüre"
USA_CW_demand_oaths_of_loyalty_desc:0 "Fordern Sie von Ihren Bürgern Treueschwüre, die zeigen, dass wir strenge Loyalitätsstandards durchsetzen werden."
USA_CW_american_colonialism:0 "Amerikanischer Kolonialismus"
USA_CW_american_colonialism_desc:0 "Wir befürworten eine Politik des amerikanischen Kolonialismus und schwören, dass wir unseren Einfluss und unsere Gebiete im Ausland ausweiten werden."
USA_CW_expansion_no_more:0 "Keine Expansion mehr"
USA_CW_expansion_no_more_desc:0 "Erklären Sie das Ende der territorialen Expansion und versichern Sie, dass wir uns auf die Aufrechterhaltung unserer derzeitigen Grenzen konzentrieren werden."
USA_CW_tax_cuts_for_large_families:0 "Steuererleichterungen für große Familien"
USA_CW_tax_cuts_for_large_families_desc:0 "Setzen Sie Steuersenkungen für große Familien um und versprechen Sie, dass wir Familienwerte und Wachstum unterstützen werden."
USA_CW_economic_boom:0 "Wirtschaftsboom"
USA_CW_economic_boom_desc:0 "Fördern Sie Wirtschaftswachstum und Wohlstand und stellen Sie sicher, dass wir die Nation in Richtung eines Wirtschaftsbooms führen."
USA_CW_alliance_with_spain:0 "Bündnis mit Spanien"
USA_CW_alliance_with_spain_desc:0 "Wir schließen ein Bündnis mit Spanien und signalisieren damit, dass wir mit dem spanischen Regime zusammenarbeiten werden."
USA_CW_form_the_freedom_league:0 "Gründe die Freiheitsliga"
USA_CW_form_the_freedom_league_desc:0 "Bilden Sie eine Koalition von Nationen, die sich der Förderung von Freiheit und Demokratie verschrieben haben, und bekräftigen Sie, dass wir die Freiheitsliga anführen werden."
USA_CW_the_american_military_machine:0 "Die amerikanische Militärmaschinerie"
USA_CW_the_american_military_machine_desc:0 "Investieren Sie in den Aufbau einer beeindruckenden amerikanischen Militärmaschinerie und stellen Sie sicher, dass wir über eine dominante Streitmacht verfügen."
USA_CW_chose_a_side:0 "Wähle eine Seite"
USA_CW_chose_a_side_desc:0 "Treffen Sie eine entscheidende Entscheidung zwischen konkurrierenden Blöcken und verpflichten Sie sich, sich im Kalten Krieg auf eine Seite zu stellen."
USA_CW_join_the_warsaw_pact:0 "Treten Sie dem Warschauer Pakt bei"
USA_CW_join_the_warsaw_pact_desc:0 "Streben Sie eine Mitgliedschaft im Warschauer Pakt an und erklären Sie, dass Sie dem Ostblock beitreten werden."
USA_CW_an_offensive_army:0 "Eine Angriffsarmee"
USA_CW_an_offensive_army_desc:0 "Wandeln Sie das Militär in eine Angriffstruppe um und versprechen Sie, dass wir in Konflikten die Initiative ergreifen werden."
USA_CW_liberate_the_baltic_states:0 "Befreie die baltischen Staaten"
USA_CW_liberate_the_baltic_states_desc:0 "Verpflichten Sie sich zur Befreiung der baltischen Staaten von der sowjetischen Kontrolle und versprechen Sie, dass wir ihre Unabhängigkeit gewährleisten werden."
USA_CW_western_ties:0 "Westernkrawatten"
USA_CW_western_ties_desc:0 "Stärkung der Beziehungen zu den westlichen Demokratien und Bekräftigung unserer Verpflichtung gegenüber der westlichen Welt."
USA_CW_expand_welfare_programs:0 "Sozialprogramme ausbauen"
USA_CW_expand_welfare_programs_desc:0 "Wir erweitern die Sozialprogramme und zeigen damit, dass wir für das Wohlergehen unserer Bürger sorgen."
USA_CW_cellerkefauver_act:0 "Celler-Kefauver-Gesetz"
USA_CW_cellerkefauver_act_desc:0 "Verabschiedung des Celler-Kefauver-Gesetzes zur Regulierung von Monopolen und Kartellmaßnahmen und Verpflichtung zur Gewährleistung eines fairen Wettbewerbs."
USA_CW_invite_ireland_to_nato:0 "Laden Sie Irland zur NATO ein"
USA_CW_invite_ireland_to_nato_desc:0 "Wir laden Irland ein, der NATO beizutreten und signalisieren damit, dass wir das Bündnis erweitern werden."
USA_CW_crack_down_on_corporations:0 "Hartes Durchgreifen gegen Unternehmen"
USA_CW_crack_down_on_corporations_desc:0 "Setzen Sie strengere Vorschriften für Unternehmen um und zeigen Sie damit, dass wir die Macht der Unternehmen einschränken werden."
USA_CW_influence_brazil:0 "Einfluss Brasilien"
USA_CW_influence_brazil_desc:0 "Versuchen Sie, Einfluss auf die brasilianische Politik zu nehmen, indem Sie erklären, dass Sie Ihren Einflussbereich auf Südamerika ausdehnen werden."
USA_CW_empire_of_greater_columbia:0 "Reich von Greater Columbia"
USA_CW_empire_of_greater_columbia_desc:0 "Schlagen Sie die Gründung eines amerikanischen Imperiums namens „Empire of Greater Columbia“ vor und schwören Sie, dass wir Amerika beherrschen werden."
USA_CW_the_foundations_of_an_empire:0 "Die Grundlagen eines Imperiums"
USA_CW_the_foundations_of_an_empire_desc:0 "Legen Sie den Grundstein für ein amerikanisches Imperium und versprechen Sie, dass wir eine globale Supermacht werden."
USA_CW_south_american_interests:0 "Südamerikanische Interessen"
USA_CW_south_american_interests_desc:0 "Unseren Interessen in Südamerika Priorität einräumen und bestätigen, dass wir unseren Einfluss auf dem Kontinent geltend machen werden."
USA_CW_demand_northern_mexico:0 "Nachfrage Nordmexiko"
USA_CW_demand_northern_mexico_desc:0 "Wir erheben einen Gebietsanspruch auf Nordmexiko und erklären, dass wir unsere Grenzen erweitern werden."
USA_CW_offer_canada_annexation:0 "Angebot zur Annexion Kanadas"
USA_CW_offer_canada_annexation_desc:0 "Machen Sie Kanada ein Angebot zur Annexion und signalisieren Sie damit, dass wir den nordamerikanischen Kontinent unter unserer Flagge vereinen werden."
USA_CW_militarist_society:0 "Militaristische Gesellschaft"
USA_CW_militarist_society_desc:0 "Fördern Sie eine militaristische Gesellschaft und versprechen Sie, dass wir dem Militär in allen Aspekten unserer Nation Priorität einräumen."
USA_CW_the_kingdom_of_columbia:0 "Das Königreich Kolumbien"
USA_CW_the_kingdom_of_columbia_desc:0 "Schlagen Sie die Schaffung einer neuen amerikanischen Monarchie vor, die als „Königreich Kolumbien“ bekannt ist, und zeigen Sie damit, dass wir eine königliche Ordnung etablieren werden."
USA_CW_invade_the_north:0 "Erobere den Norden"
USA_CW_invade_the_north_desc:0 "Planen Sie eine Invasion der nördlichen Gebiete und bestätigen Sie, dass wir unsere Kontrolle auf die nördlichen Regionen ausdehnen werden."
USA_CW_pax_americana:0 "Pax Americana"
USA_CW_pax_americana_desc:0 "Fördern Sie die Idee der „Pax Americana“ und stellen Sie sicher, dass wir eine Periode amerikanischer Dominanz und des Friedens etablieren."
USA_CW_invade_the_south:0 "Erobere den Süden"
USA_CW_invade_the_south_desc:0 "Bereiten Sie sich auf eine militärische Invasion der südlichen Gebiete vor und schwören Sie, dass wir die südlichen Regionen kontrollieren werden."
USA_CW_spartan_tradition:0 "Spartanische Tradition"
USA_CW_spartan_tradition_desc:0 "Nehmen Sie die spartanische Tradition an und fördern Sie Strenge und Disziplin in unserer Gesellschaft, indem Sie sich zu strenger Selbstdisziplin verpflichten."
USA_CW_against_the_red_menace:0 "Gegen die Rote Gefahr"
USA_CW_against_the_red_menace_desc:0 "Mobilisieren Sie gegen die „Rote Gefahr“ und schwören Sie, dass wir kommunistischen Ideologien entgegentreten und sie besiegen werden."
USA_CW_propaganda_broadcasts:0 "Propagandasendungen"
USA_CW_propaganda_broadcasts_desc:0 "Investieren Sie in die Verbreitung von Propagandasendungen und stellen Sie sicher, dass wir die Berichterstattung im In- und Ausland kontrollieren."
USA_CW_ready_the_nation:0 "Bereitet die Nation vor"
USA_CW_ready_the_nation_desc:0 "Bereiten Sie die Nation auf jede Bedrohung vor und versprechen Sie, dass wir ständig wachsam und bereit sind, unsere Interessen zu verteidigen."
USA_CW_destroy_the_tide:0 "Zerstöre die Flut"
USA_CW_destroy_the_tide_desc:0 "Setzen Sie sich dafür ein, die Flut des Kommunismus zu zerstören und seine Ausbreitung zu verhindern. Stellen Sie sicher, dass wir seinen Vormarsch aufhalten."
USA_CW_secure_the_american_dream:0 "Sichern Sie sich den amerikanischen Traum"
USA_CW_secure_the_american_dream_desc:0 "Sichern Sie den amerikanischen Traum für alle Bürger und versprechen Sie, dass wir Chancen auf Wohlstand bieten."
USA_CW_military_parades:0 "Militärparaden"
USA_CW_military_parades_desc:0 "Halten Sie große Militärparaden ab, um unsere Stärke und unser Engagement zu demonstrieren und zu bestätigen, dass wir unsere Macht zeigen werden."
USA_CW_prepare_for_conflict:0 "Bereiten Sie sich auf Konflikte vor"
USA_CW_prepare_for_conflict_desc:0 "Bereiten Sie sich auf unvermeidliche Konflikte und Konfrontationen vor und schwören Sie, dass wir bereit sind, uns jeder Herausforderung zu stellen."
USA_CW_purge_the_sympathizers:0 "Säubern Sie die Sympathisanten"
USA_CW_purge_the_sympathizers_desc:0 "Leiten Sie Säuberungen ein, um kommunistische Sympathisanten und Spione aus unserer Gesellschaft zu eliminieren und so unsere Sicherheit zu gewährleisten."
USA_CW_legalize_communism:0 "Legalisiert den Kommunismus"
USA_CW_legalize_communism_desc:0 "Legalisieren Sie den Kommunismus und öffnen Sie einen Raum für sozialistische Bewegungen, um zu signalisieren, dass wir politische Vielfalt zulassen."
USA_CW_the_unthinkable_alliance:0 "Die undenkbare Allianz"
USA_CW_the_unthinkable_alliance_desc:0 "Bilden Sie ein Bündnis mit unwahrscheinlichen Partnern und zeigen Sie damit, dass wir mit Nationen zusammenarbeiten werden, die wir einst als Gegner betrachteten."
USA_CW_reestablish_ties_with_the_church:0 "Stellen Sie die Verbindung zur Kirche wieder her"
USA_CW_reestablish_ties_with_the_church_desc:0 "Stellen Sie die Verbindungen zu religiösen Institutionen wieder her und versprechen Sie, dass wir unsere Verbindung zur Kirche stärken werden."
USA_CW_destroy_the_ideals_of_the_enlightenment:0 "Zerstöre die Ideale der Aufklärung"
USA_CW_destroy_the_ideals_of_the_enlightenment_desc:0 "Wir verurteilen die Ideale der Aufklärung und bekräftigen damit, dass wir die Grundlagen der liberalen Demokratie in Frage stellen werden."
USA_CW_make_alliances:0 "Bilden Sie Allianzen"
USA_CW_make_alliances_desc:0 "Wir streben danach, Bündnisse und Partnerschaften mit Nationen auf der ganzen Welt einzugehen und bekräftigen, dass wir unser Netzwerk an Verbündeten stärken werden."
USA_CW_dismantle_congress:0 "Den Kongress auflösen"
USA_CW_dismantle_congress_desc:0 "Befürworten Sie die Auflösung des Kongresses und erklären Sie, dass wir die Macht zentralisieren werden."
USA_CW_destroy_the_old_america:0 "Zerstöre das alte Amerika"
USA_CW_destroy_the_old_america_desc:0 "Wir machen uns daran, das alte Amerika zu zerstören und schwören, dass wir eine neue Ordnung und Identität schaffen werden."
USA_CW_house_of_washington:0 "Haus Washington"
USA_CW_house_of_washington_desc:0 "Schlagen Sie die Gründung eines „House of Washington“ vor, um das Erbe des Gründervaters der Nation fortzuführen."
USA_CW_undermine_nato:0 "Untergrabung der NATO"
USA_CW_undermine_nato_desc:0 "Untergraben Sie den Zusammenhalt der NATO und signalisieren Sie, dass wir das Bündnis schwächen werden."
USA_CW_gulag_labor:0 "Gulag-Arbeit"
USA_CW_gulag_labor_desc:0 "Errichtung von Zwangsarbeitslagern ähnlich den sowjetischen Gulags und damit Bestätigung, dass wir Arbeit als Kontrollinstrument einsetzen werden."
USA_CW_worker_owned_factories:0 "Arbeitereigene Fabriken"
USA_CW_worker_owned_factories_desc:0 "Setzen Sie sich dafür ein, dass die Arbeiter Fabriken besitzen und kontrollieren, und signalisieren Sie damit, dass wir sozialistische Wirtschaftspraktiken fördern werden."
USA_CW_ban_communism:0 "Verbot des Kommunismus"
USA_CW_ban_communism_desc:0 "Verbot des Kommunismus und sozialistischer Ideologien und klares Zeichen dafür, dass wir derartige Bewegungen unterdrücken werden."
USA_CW_suspend_the_constitution:0 "Die Verfassung außer Kraft setzen"
USA_CW_suspend_the_constitution_desc:0 "Setzen Sie die Verfassung außer Kraft und verhängen Sie den Ausnahmezustand. Dabei erklären Sie, dass wir der Sicherheit Vorrang vor den bürgerlichen Freiheiten einräumen."
USA_CW_the_communist_states_of_america:0 "Die kommunistischen Staaten von Amerika"
USA_CW_the_communist_states_of_america_desc:0 "Fördern Sie die Gründung eines kommunistischen Staates in Amerika und erklären Sie, dass wir die Nation in eine sozialistische Republik umwandeln werden."
USA_CW_the_breadbasket_of_the_world:0 "Die Kornkammer der Welt"
USA_CW_the_breadbasket_of_the_world_desc:0 "Nehmen Sie die Rolle der „Kornkammer der Welt“ an und schwören Sie, dass wir bedürftige Nationen mit Nahrungsmitteln und Ressourcen versorgen werden."
USA_CW_protect_nature:0 "Natur schützen"
USA_CW_protect_nature_desc:0 "Setzen Sie sich für Umweltschutz und Naturschutz ein und versprechen Sie, dass wir die Natur für zukünftige Generationen bewahren werden."
USA_CW_return_to_localized_production:0 "Rückkehr zur lokalen Produktion"
USA_CW_return_to_localized_production_desc:0 "Umstellung auf lokale Produktion und Autarkie, was bestätigt, dass wir der inländischen Fertigung Priorität einräumen."
USA_CW_reconcile_with_the_british_crown:0 "Versöhnung mit der britischen Krone"
USA_CW_reconcile_with_the_british_crown_desc:0 "Streben Sie eine Versöhnung mit der britischen Krone an und zeigen Sie damit, dass wir die historischen Bindungen wiederherstellen werden."
USA_CW_declare_martial_law:0 "Verhängung des Kriegsrechts"
USA_CW_declare_martial_law_desc:0 "Verhängen Sie das Kriegsrecht und verhängen Sie eine Militärherrschaft. Wir versichern Ihnen, dass wir Gewalt anwenden werden, um die Kontrolle aufrechtzuerhalten."
USA_CW_formation_of_the_un:0 "Gründung der UNO"
USA_CW_formation_of_the_un_desc:0 "Schlagen Sie die Gründung einer neuen internationalen Organisation vor und signalisieren Sie damit, dass wir die Vereinten Nationen gründen werden."
USA_CW_fate_of_our_nation:0 "Schicksal unserer Nation"
USA_CW_fate_of_our_nation_desc:0 "Stellen Sie sich der existenziellen Frage nach dem Schicksal unserer Nation und versprechen Sie, dass wir die Zukunft Amerikas bestimmen werden."
USA_CW_military_dictatorship:0 "Militärdiktatur"
USA_CW_military_dictatorship_desc:0 "Errichten Sie eine Militärdiktatur und erklären Sie, dass das Militär die Kontrolle über die Regierung übernehmen wird."
USA_CW_formation_of_the_cia:0 "Gründung der CIA"
USA_CW_formation_of_the_cia_desc:0 "Die Schaffung der Central Intelligence Agency (CIA) signalisiert, dass wir einen mächtigen Geheimdienst aufbauen werden."
USA_CW_monarchy_triumphant:0 "Triumphierende Monarchie"
USA_CW_monarchy_triumphant_desc:0 "Schlagen Sie die Rückkehr der Monarchie vor und erklären Sie, dass unsere Nation wieder von einer königlichen Familie geführt wird."
USA_CW_join_the_western_alliance:0 "Treten Sie der westlichen Allianz bei"
USA_CW_join_the_western_alliance_desc:0 "Streben Sie die Mitgliedschaft in einem westlichen Militärbündnis an und bestätigen Sie damit, dass wir uns mit den westlichen Mächten verbünden werden."
USA_CW_restore_the_empire_of_brazil:0 "Wiederherstellung des brasilianischen Kaiserreichs"
USA_CW_restore_the_empire_of_brazil_desc:0 "Wir setzen uns für die Wiederherstellung des brasilianischen Kaiserreichs ein und versprechen, dass wir eine brasilianische Monarchie unterstützen werden."
USA_CW_military_expansion:0 "Militärische Expansion"
USA_CW_military_expansion_desc:0 "Erweitern Sie die Reichweite und die Fähigkeiten des Militärs und versprechen Sie, dass wir eine beeindruckende Streitmacht aufbauen werden."
USA_CW_world_peace_achieved:0 "Weltfrieden erreicht"
USA_CW_world_peace_achieved_desc:0 "Fördern Sie die Idee, dass der Weltfrieden erreicht wurde, und erklären Sie, dass wir uns auf die globale Stabilität konzentrieren werden."
USA_CW_end_of_the_korean_war:0 "Ende des Koreakrieges"
USA_CW_end_of_the_korean_war_desc:0 "Verkünden Sie das offizielle Ende des Koreakrieges und signalisieren Sie damit, dass wir unsere Truppen nach Hause holen werden."
USA_CW_algerian_war:0 "Algerienkrieg"
USA_CW_algerian_war_desc:0 "Wir greifen in den Algerienkrieg ein und versprechen, dass wir eine Seite in diesem Konflikt unterstützen werden."
USA_CW_african_intervention:0 "Afrikanische Intervention"
USA_CW_african_intervention_desc:0 "Wir greifen in afrikanische Konflikte ein und bestätigen damit unsere Machtdemonstration in Afrika."
USA_CW_portuguese_colonial_war:0 "Portugiesischer Kolonialkrieg"
USA_CW_portuguese_colonial_war_desc:0 "Engagieren Sie sich im portugiesischen Kolonialkrieg und schwören Sie, dass wir eine Seite in diesem Konflikt unterstützen werden."
USA_CW_desegregation:0 "Aufhebung der Rassentrennung"
USA_CW_desegregation_desc:0 "Wir setzen uns für die Aufhebung der Rassentrennung und für Rassengleichheit ein und erklären, dass wir uns für die Beendigung der Rassendiskriminierung einsetzen werden."
USA_CW_communism_triumphant:0 "Der Kommunismus triumphiert"
USA_CW_communism_triumphant_desc:0 "Erkennen Sie den weltweiten Aufstieg des Kommunismus an und signalisieren Sie damit, dass wir uns an die neue Weltordnung anpassen werden."
USA_CW_equality_for_all:0 "Gleichheit für alle"
USA_CW_equality_for_all_desc:0 "Setzen Sie sich für die Gleichberechtigung aller Bürger ein und versprechen Sie, dass wir uns für eine faire und gerechte Gesellschaft einsetzen werden."
USA_CW_there_can_be_only_one:0 "Es kann nur einen geben"
USA_CW_there_can_be_only_one_desc:0 "Akzeptieren Sie die Idee, dass es nur eine dominante Supermacht geben kann, und erklären Sie, dass wir unsere Dominanz behaupten werden."
USA_CW_perfect_our_designs:0 "Perfektionieren Sie unsere Designs"
USA_CW_perfect_our_designs_desc:0 "Wir verpflichten uns, unsere militärischen und technologischen Entwürfe zu perfektionieren und bestätigen, dass wir Innovationen und Verbesserungen einführen werden."
USA_CW_mandatory_military_service:0 "Wehrpflicht"
USA_CW_mandatory_military_service_desc:0 "Wir führen die Wehrpflicht für alle Bürger ein und signalisieren damit, dass wir unsere Streitkräfte stärken werden."
USA_CW_crush_the_communist_pretenders:0 "Zerschmettert die kommunistischen Heuchler"
USA_CW_crush_the_communist_pretenders_desc:0 "Zerschlagen Sie alle kommunistischen Bewegungen oder Parteien und schwören Sie, dass wir alle Anwärter auf unsere Ideologie beseitigen werden."
USA_CW_bastion_of_communism:0 "Bastion des Kommunismus"
USA_CW_bastion_of_communism_desc:0 "Wir etablieren uns als Bastion des Kommunismus und bestätigen, dass wir uns für sozialistische Prinzipien einsetzen."
USA_CW_reaffirm_nato_ties:0 "Bekräftigung der NATO-Verbindungen"
USA_CW_reaffirm_nato_ties_desc:0 "Wir bekräftigen unser Engagement für die NATO und signalisieren damit, dass wir unseren Verpflichtungen gegenüber dem Bündnis nachkommen werden."
USA_CW_the_eisenhower_administration:0 "Die Eisenhower-Regierung"
USA_CW_the_eisenhower_administration_desc:0 "Wir erkennen die Führung der Eisenhower-Regierung an und erklären, dass wir ihre Politik fortsetzen werden."
USA_CW_invite_austria_to_nato:0 "Österreich zur NATO einladen"
USA_CW_invite_austria_to_nato_desc:0 "Österreich zum NATO-Beitritt einladen und damit bestätigen, dass wir das Bündnis erweitern werden."
USA_CW_the_land_of_harps:0 "Das Land der Harfen"
USA_CW_the_land_of_harps_desc:0 "Nehmen Sie das Bild des „Landes der Harfen“ an, das unser Engagement für das musikalische und kulturelle Erbe symbolisiert."
USA_CW_the_pearl_of_anatolia:0 "Die Perle Anatoliens"
USA_CW_the_pearl_of_anatolia_desc:0 "Bezeichnen Sie Amerika als die „Perle Anatoliens“ und bringen Sie damit Ihre Wertschätzung für die anatolische Kultur zum Ausdruck."
USA_CW_man_on_the_moon:0 "Der Mann auf dem Mond"
USA_CW_man_on_the_moon_desc:0 "Setzen Sie sich das Ziel, einen Menschen auf den Mond zu bringen, und schwören Sie, dass wir diese bemerkenswerte Leistung vollbringen werden."
USA_CW_liberate_a_democratic_russia:0 "Befreit ein demokratisches Russland"
USA_CW_liberate_a_democratic_russia_desc:0 "Versprechen Sie, den Aufbau eines demokratischen Russlands zu unterstützen und signalisieren Sie damit, dass wir bei seiner Transformation helfen werden."
USA_CW_form_nasa:0 "Form NASA"
USA_CW_form_nasa_desc:0 "Gründung der National Aeronautics and Space Administration (NASA) zur Bestätigung unseres Engagements für die Weltraumforschung."
USA_CW_allocate_funds:0 "Mittel zuweisen"
USA_CW_allocate_funds_desc:0 "Stellen Sie erhebliche Mittel zur Unterstützung verschiedener nationaler Projekte bereit und stellen Sie sicher, dass wir über die erforderlichen Ressourcen verfügen."
USA_CW_the_land_of_alexander:0 "Das Land Alexanders"
USA_CW_the_land_of_alexander_desc:0 "Begrüßen Sie den Titel „Das Land Alexanders“, um unsere Bewunderung für Alexander den Großen auszudrücken."
USA_CW_invite_sweden_to_nato:0 "Schweden zur NATO einladen"
USA_CW_invite_sweden_to_nato_desc:0 "Wir laden Schweden ein, der NATO beizutreten und signalisieren damit, dass wir das Bündnis erweitern werden."
USA_CW_the_land_of_1000_lakes:0 "Das Land der 1000 Seen"
USA_CW_the_land_of_1000_lakes_desc:0 "Bezeichnen Sie Amerika als das „Land der 1000 Seen“, um die Schönheit unserer Naturlandschaften hervorzuheben."
USA_CW_northern_european_allies:0 "Nordeuropäische Verbündete"
USA_CW_northern_european_allies_desc:0 "Wir pflegen Allianzen mit den nordeuropäischen Ländern und bestätigen damit, dass wir die Beziehungen zu diesen Verbündeten stärken werden."
USA_CW_the_wildcard:0 "Die Wildcard"
USA_CW_the_wildcard_desc:0 "Nehmen Sie die Rolle des „Jokers“ an, der unsere Unberechenbarkeit in internationalen Angelegenheiten anzeigt."
USA_CW_invite_west_germany_to_nato:0 "Westdeutschland zur NATO einladen"
USA_CW_invite_west_germany_to_nato_desc:0 "Wir laden Westdeutschland zum Beitritt zur NATO ein und signalisieren damit, dass wir das Bündnis erweitern werden."
USA_CW_civil_rights_act_of_1964:0 "Bürgerrechtsgesetz von 1964"
USA_CW_civil_rights_act_of_1964_desc:0 "Verabschiedung des Civil Rights Act von 1964, der unser Engagement für die Beendigung der Rassentrennung signalisiert."
USA_CW_form_the_special_research_division:0 "Bilden Sie die Abteilung für Sonderforschung"
USA_CW_form_the_special_research_division_desc:0 "Einrichtung einer Sonderforschungsabteilung zur Förderung von Innovationen in Technologie und Wissenschaft."
USA_CW_invite_spain_to_nato:0 "Spanien zur NATO einladen"
USA_CW_invite_spain_to_nato_desc:0 "Wir laden Spanien ein, der NATO beizutreten und signalisieren damit, dass wir das Bündnis erweitern werden."
USA_CW_peace_corps:0 "Friedenskorps"
USA_CW_peace_corps_desc:0 "Wir gründen das Friedenskorps und verpflichten uns, Freiwillige zur Unterstützung in Entwicklungsländer zu schicken."
USA_CW_invite_greece_to_nato:0 "Laden Sie Griechenland zur NATO ein"
USA_CW_invite_greece_to_nato_desc:0 "Wir laden Griechenland ein, der NATO beizutreten und bestätigen damit, dass wir das Bündnis erweitern werden."
USA_CW_the_johnson_administration:0 "Die Johnson-Administration"
USA_CW_the_johnson_administration_desc:0 "Wir erkennen die Führung der Johnson-Regierung an und erklären, dass wir ihre Politik fortsetzen werden."
USA_CW_northern_bloc:0 "Nordblock"
USA_CW_northern_bloc_desc:0 "Fördern Sie die Idee eines „Nordblocks“ und betonen Sie unsere Partnerschaften mit den nördlichen Nationen."
USA_CW_southern_bloc:0 "Südblock"
USA_CW_southern_bloc_desc:0 "Fördern Sie die Idee eines „Südblocks“ und betonen Sie unsere Partnerschaften mit den südlichen Nationen."
USA_CW_central_bloc:0 "Zentralblock"
USA_CW_develop_nuclear_capable_missles:0 "Entwicklung nuklearfähiger Raketen"
USA_CW_develop_nuclear_capable_missles_desc:0 "Wir werden die Entwicklung nuklearfähiger Raketen vorantreiben und versprechen, dass wir unsere militärischen Fähigkeiten ausbauen werden."
USA_CW_central_bloc_desc:0 "Fördern Sie die Idee eines „Zentralblocks“ und betonen Sie dabei unsere Partnerschaften mit den zentralamerikanischen Nationen."
USA_CW_develop_nuclear_capable_missiles:0 "Entwicklung nuklearfähiger Raketen"
