########### Japan Leader Info Localisation ###########
JAP_HOG_TITLE:0 "Shushō"
JAP_HOS_TITLE:0 "Ten&#39;nō"
JAP_MUTSUHITO_NAME:0 "Mutsuhito"
JAP_HIROBUMI_NAME:0 "Hirobumi Ito"
JAP_YAMAGATA_NAME:0 "Yamagata Aritomo"
MEIJI_LEADER_DESCRIPTION:0 "Mutsuhito ist nur ein Begriff, der auf dem Papier steht und im Ausland gesprochen wird. In Japan ist es Meiji, besser bekannt als Meiji der Große. Als großer Reformer des Landes erlebte Meiji, wie sich ein isoliertes mittelalterliches Land in eine Industriemacht verwandelte, die sich fest an der Spitze der asiatischen Hackordnung etablierte. Jahrhundertelang war der Kaiser jedoch nicht die Person, die Veränderungen herbeiführte oder deren Entstehung ermöglichte. Diese Rolle wurde dem Shogun übertragen. Der Kaiser verfügte weder über die Macht, den Einfluss noch die Armee, um mehr zu tun, als den großen Palast zu verlassen. Meiji befand sich in einer günstigen Lage: Er wurde 1852 geboren, nur ein Jahr bevor Japan von Matthew Perry gezwungen wurde, das Land für Ausländer zu öffnen. Der junge Mutsuhito, eher ein Anstoß der Situation als ein Handeln, erlebte ständige Konflikte, als Japan in einen zerstörerischen Bürgerkrieg versank, in dem Daimyo und lokale Herrscher um die ideologische Vorherrschaft und den Sturz eines stets inkompetenten Shogunats kämpften. Mutsuhito, der nächste Thronfolger, wurde 1867 im Alter von 16 Jahren in der Meiji-Ära auf den Chrysanthementhron erhoben. Nur ein Jahr später proklamierte Meiji die große Restauration, später bekannt als Meiji-Restauration, um die Flickenteppich-Regierung nach dem Sturz des Shogunats wiederherzustellen. Die Macht wurde dem Kaiser zurückgegeben, wobei eine gewählte, verfassungsmäßige Regierung die Rolle der ehemaligen Daimyo übernahm. Die Meiji-Verfassung, die Elemente westlicher Parlamente aufgriff, hat die rasante bürokratische, industrielle, logistische und soziale Entwicklung Japans zu etwas für westliche Nationen Unheimlichem mit einer gut ausgerüsteten Armee begleitet. Da die alltägliche Regierungsführung weitgehend wieder in die Hände des Parlaments fiel, übernahm Meiji wieder die Rolle einer Galionsfigur. An seiner theoretischen Macht, die in der Meiji-Verfassung festgeschrieben ist, besteht jedoch kein Zweifel."
HIROBUMI_LEADER_DESCRIPTION:0 "Hirobumi Ito ist durch und durch Berufspolitiker. Er war der erste, sechste, achte und nun elfte Premierminister Japans und hat bislang sieben Jahre als Premierminister des Landes gedient. Zum Vergleich: Das Amt des Premierministers gibt es erst seit 14 Jahren. Hirobumi wurde 1841 in einen bekannten Samurai-Clan hineingeboren, als Japan noch feudal von Adligen und Kriegern regiert wurde. Als Japan sich der Außenwelt öffnete, war Hirobumi noch ein Junge und faszinierte die europäische Kultur sowie die Beziehung Japans zu seiner Umwelt. Er besuchte die Universität in London und lernte Englisch, aber vor allem die westlichen Verfassungen und Regierungssysteme. Aufgrund seiner hohen Bildung war Hirobumi ein heißer Kandidat für Ministerposten, als 1868 die Meiji-Restauration begann. Im selben Jahr wurde er zum Gouverneur der Präfektur Hyōgo und zum Juniorrat für auswärtige Angelegenheiten ernannt. Hirobumi, der bei jeder Wahl auf dem Stimmzettel stand, drängte trotz seiner damals niedrigen Positionen auf eine eingehendere Auseinandersetzung mit westlichen Systemen sowie auf eine aggressive und starke Außenpolitik. In seinen frühen Jahren besuchte Hirobumi viele Länder, stieg in der frühen Meiji-Regierung auf und wurde schließlich Vorsitzender des Verfassungsbüros, das die offizielle Meiji-Verfassung verfasste. Seine Zeit im Ausland kam ihm zugute, und er nutzte seine Kenntnisse ausländischer Regierungen, insbesondere der deutschen, britischen und französischen, um ein völlig neues Regierungssystem zu entwickeln, mit Meiji als alleinigem Oberhaupt und Herrscher Japans, wie es sich gehört, mit ihm als erstem Premierminister im Jahr 1885. Hirobumi, der ehrgeizig war, erlebte viele Konflikte mit Japan, insbesondere im Hinblick auf den äußerst günstigen Vertrag zwischen Japan und China nach dem Ersten Japanisch-Japanischen Krieg. In Hirobumis vierter Amtszeit wird sich zeigen, ob seine ehrgeizigen und dominanten Pläne erneut Früchte tragen werden."
YAMAGATA_ARITOMO_LEADER_DESCRIPTION:0 "Als prominentes Mitglied des Genro, der herrschenden Elite während der Meiji-Restauration, genießt Yamagata bei seinen Mitmenschen großes Ansehen. Er war eine Schlüsselfigur bei der Niederschlagung des Satsuma-Aufstands und ein überzeugter Anhänger der Meiji-Ära. Sein politisches Engagement und seine daraus resultierenden Verbindungen sicherten ihm einen Platz an der Spitze, als Japan schließlich unter der Meiji-Ära vereint wurde. Yamagatas Samurai-Abstammung half ihm jedoch wenig, da sein Clan unter niedrigem Ansehen und geringem Respekt seitens der anderen Clans litt. Einzig und allein seine politische Positionierung war für ihn von Vorteil. Yamagata war ein frühes Mitglied der Untergrundbewegung zum Sturz des Tokugawa-Shogunats und nutzte daher die kaiserlichen Siege, um sich seinen Platz in politischen Positionen zu sichern. Als einer der ersten japanischen Politiker ausgewählt, ausländische Militärs zu studieren, lernte Yamagata wertvolle Lektionen über Kriegsdoktrin. Er wurde zu dem, was als herrschende Militärelite bekannt wurde. In Japan bekleideten Männer mit hohem militärischen Rang häufig auch hohe politische Positionen, was die Militarisierung der japanischen Gesellschaft weiter vorantrieb. Yamagatas Talent für militärische Angelegenheiten verschaffte ihm eine große Gefolgschaft von Offizieren, und er nutzte diese Gefolgschaft, um in den 1880er und 1890er Jahren viele unterschiedliche und hochrangige politische Positionen einzunehmen. Yamagata hatte Minister-, Parlaments- und Präsidentenämter inne und verfügt außerdem über Erfahrung als Premierminister. Yamagata ist wohl der mächtigste Mann Japans nach Meiji selbst und ihm sind weitere Erfolge vorherbestimmt. Das heißt nicht, dass er keine Rivalen hat, aber sein extremer Respekt, seine Ehre und seine militarisierte Position bedeuten, dass seine Macht relativ sicher ist. Einige argumentieren, dass ein Mann des Militärs an der Spitze Japans das Land auf den Weg des Krieges führen wird. Yamagata vertritt die Ansicht, dass dies einfach die Art Japans sei und das schon seit Hunderten von Jahren."
