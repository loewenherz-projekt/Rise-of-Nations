firestone_debt:0 "Firestone-Schulden" 
firestone_debt_desc:0 "Die Firestone Rubber Company gewährte Liberia einen großen Kredit, um unsere Schulden zu tilgen und einen Hafen für ihr Unternehmen zu bauen. Der Kredit wurde im Gegenzug für die vollständige Verfügungsgewalt über die Staatseinnahmen gewährt, bis der Kredit zurückgezahlt war. Der Kredit verschlingt einen immer größeren Teil der liberianischen Staatseinnahmen."

corruption:0 "Korruption"
corruption_desc:0 "Unsere Regierung ist von Korruption und Inkompetenz geprägt. Wenn Liberia jemals ernsthaft auf der Weltbühne auftreten soll, sind Reformen notwendig."

debt_payments:0 "Schuldenzahlungen"
debt_payments_desc:0 "Liberias Wirtschaft ist voll und ganz darauf ausgerichtet, unsere Schulden abzubauen"

american_aid:0 "Amerikanische Hilfe"
american_aid_desc:0 "Amerika hilft uns wirtschaftlich"

freeport_of_monrovia:0 "Freihafen von Monrovia"
freeport_of_monrovia_desc:0 ""

corruption_2:0 "Politische Instabilität"
corruption_2_desc:0 "Durch die jüngsten Reformen wurden die meisten korrupten Beamten und Aktivitäten eingedämmt, doch die überstürzte Umsetzung neuer Gesetze und Vorschriften hat die Existenz einiger der korruptesten nur noch weiter verfestigt."

political_discourse:0 "Politischer Diskurs"
political_discourse_desc:0 "Wir ermutigen unser Volk derzeit, sich am Dialog zu beteiligen, um die Zukunft Liberias zu bestimmen."

liberian_silvershirts:0 "Liberianische Silberhemden"
liberian_silvershirts_desc:0 "Inspiriert von der Silver Legion of America sind die Liberian Silver Shirts eine paramilitärische Bewegung, die sich Liberia verschrieben hat und sein Volk zu Größe führen möchte."

progeny_of_freedom:0 "Nachkommen der Freiheit"
progeny_of_dreedom_desc:0 "Wir bekennen uns zu unseren Wurzeln in der Heimat der Freiheit und fördern Menschenrechte und Freiheit."

indigenous_migration:0 "Indigene Migration"
indigenous_migration_desc:0 "Tausende einheimische Liberianer wandern auf der Suche nach Arbeit aus dem ländlichen Landesinneren in unsere Küstenstädte ab."

indigenous_integration:0 "Integration der Ureinwohner"
indigenous_integration_desc:0 "Durch die Integrationsgesetzgebung ist der Militärdienst für unsere einheimische Bevölkerung attraktiver geworden."

labor_unions:0 "Stärkung der Gewerkschaften"
labor_unions_desc:0 "Die liberianischen Arbeiter dürfen nicht vergessen werden. Staatlich finanzierte Gewerkschaften werden dafür sorgen, dass ihre Stimmen gehört werden."

indigenous_migration_2:0 "Indigene Umarmung"
indigenous_migration_2_desc:0 "Wir haben unsere indigene Bevölkerung angenommen."

depression_liberia:0 "Große Depression"
depression_liberia_desc:0 "Die Weltwirtschaftskrise hat die liberianische Wirtschaft hart getroffen. Die Firestone Rubber Company hat den Ausbau der Kautschukplantagen eingestellt und die Löhne der Arbeiter halbiert. Da die Kautschukproduktion auf einem historischen Tiefstand ist, liegen Liberias Steuereinnahmen nahe Null. Die Tatsache, dass wir unseren Kredit bei Firestone nicht zurückzahlen können, belastet unser Verhältnis zu Amerika."

indigenous_subduel:0 "Unterwerfung der Ureinwohner"
indigenous_subduel_desc:0 ""

liberian_expeditions:0 "Silbernes Freiwilligenkorps"
liberian_expeditions_desc:0 "Wir haben eine Miliz aus Freiwilligen organisiert, die bereit sind, das Kriegshandwerk im Ausland zu erlernen."

indigenous_subduel_2:0 "Liberianischer Lebensraum"
indigenous_subduel_2_desc:0 ""

german_advisors_l:0 "Deutsche Berater"
german_advisors_l_desc:0 "Deutschland hat Berater nach Liberia geschickt, um bei der Modernisierung unseres Militärs zu helfen"

operation_schlange:0 "Operation Schwarzemamba"
operation_schlange_desc:0 ""

national_rubber_company:0 "Nationale Gummigesellschaft"
national_rubber_company_desc:0 "Die National Rubber Company ist der ganze Stolz der liberianischen Wirtschaft."

