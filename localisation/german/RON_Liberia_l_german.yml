### Dark

 
 #DARK
 DARK_anti_fascist_sentiment:0 "Antifaschistische Stimmung"
 DARK_anti_fascist_sentiment_desc:0 "Dieses Land ist vom Faschismus völlig desillusioniert und will weder mit ihm noch mit seinen Anhängern etwas zu tun haben."
 DARK_spanish_civil_war_support:0 "Spanische Intervention"
 DARK_spanish_civil_war_support_desc:0 "Dieses Land hat ein begründetes Interesse am Ausgang des spanischen Bürgerkriegs und wird alles in seiner Macht Stehende tun, um sicherzustellen, dass die von ihm bevorzugte Seite gewinnt."
 DARK_closed_suez:0 "Geschlossener Suez"
 DARK_closed_suez_desc:0 "Dieses Land hat den Suezkanal geschlossen. Dies hat den Nebeneffekt, dass das Land bei großen Konzernen unbeliebt geworden ist und der Warentransport zwischen dem Pazifik und dem Atlantik erschwert wird."
 DARK_weapons_produced:0 "Umleitung der Waffenproduktion"
 
 #Liberia
 license_tech_difference_speed_factor:0 "PRÜFEN"
 
 has_firestone_def_tt:0 "Hat den Infanteriewaffenhersteller §YFirestone Defense§!"
 
 LIB_home_of_the_free:0 "Land der Freiheit"
 LIB_home_of_the_free_desc:0 "Liberia sieht sich als Bastion der Demokratie und Freiheit in Afrika, als Wiege der Zivilisation, hervorgegangen aus seinem älteren Bruder, den USA. Was auch immer das Land sein mag, seine Werte sind schwer zu kompromittieren, so verlockend manche Möglichkeiten auch erscheinen mögen."
 LIB_hinterland_problems_1:0 "Widerspenstiges Hinterland"
 LIB_hinterland_problems_1_desc:0 "Trotz unserer anhaltenden Bemühungen bleibt das Hinterland unseres Landes weitgehend autonom. Mangelnde Infrastruktur und Entwicklung erschweren die Steuereintreibung und die Kontrolle der vermeintlichen Bürger unseres Landes. Wollen wir diesen Zustand ändern, müssen wir ernsthafte Anstrengungen unternehmen, um das Hinterland zu erweitern und zu entwickeln."
 LIB_hinterland_problems_2:0 "Widerspenstiges Hinterland"
 LIB_hinterland_problems_2_desc:0 "Trotz unserer anhaltenden Bemühungen bleibt das Hinterland unseres Landes weitgehend autonom. Mangelnde Infrastruktur und Entwicklung erschweren die Steuereintreibung und die Kontrolle der vermeintlichen Bürger unseres Landes. Wollen wir diesen Zustand ändern, müssen wir ernsthafte Anstrengungen unternehmen, um das Hinterland zu erweitern und zu entwickeln."
 LIB_hinterland_problems_3:0 "Widerspenstiges Hinterland"
 LIB_hinterland_problems_3_desc:0 "Trotz unserer anhaltenden Bemühungen bleibt das Hinterland unseres Landes weitgehend autonom. Mangelnde Infrastruktur und Entwicklung erschweren die Steuereintreibung und die Kontrolle der vermeintlichen Bürger unseres Landes. Wollen wir diesen Zustand ändern, müssen wir ernsthafte Anstrengungen unternehmen, um das Hinterland zu erweitern und zu entwickeln."
 LIB_government_cooperation:0 "Zusammenarbeit zwischen den Parteien"
 LIB_government_noncooperation:0 "Regierungsverweigerung"
 LIB_greenback_idea:0 "Greenback"
 LIB_greenback_idea_desc:0 "Durch die Einführung des US-Dollars als eigene Währung hat dieses Land seine Fähigkeit, mit ausländischen Märkten umzugehen, durch die Verwendung dieser international anerkannten Währung erheblich verbessert."
 LIB_corrupt_army1:0 "Korrupte Streitkräfte"
 LIB_corrupt_army1_desc:0 "Die Liberianische Grenztruppe ist zu nichts weiter als einer Gruppe von Schlägern geworden, die die lokale Bevölkerung erpressen. Es mangelt ihnen an Disziplin und Zusammenhalt in ihren Einheiten. Diese Probleme werden noch dadurch verschärft, dass wir die Truppen nicht bezahlen und diejenigen, die sich nicht an die Regeln halten, nicht wirksam disziplinieren können."
 LIB_corrupt_army2:0 "Korrupte Streitkräfte"
 LIB_corrupt_army2_desc:0 "Die Liberianische Grenztruppe ist zu nichts weiter als einer Gruppe von Schlägern geworden, die die lokale Bevölkerung erpressen. Es mangelt ihnen an Disziplin und Zusammenhalt in ihren Einheiten. Diese Probleme werden noch dadurch verschärft, dass wir die Truppen nicht bezahlen und diejenigen, die sich nicht an die Regeln halten, nicht wirksam disziplinieren können."
 LIB_corrupt_army3:0 "Korrupte Streitkräfte"
 LIB_corrupt_army3_desc:0 "Die Liberianische Grenztruppe ist zu nichts weiter als einer Gruppe von Schlägern geworden, die die lokale Bevölkerung erpressen. Es mangelt ihnen an Disziplin und Zusammenhalt in ihren Einheiten. Diese Probleme werden noch dadurch verschärft, dass wir die Truppen nicht bezahlen und diejenigen, die sich nicht an die Regeln halten, nicht wirksam disziplinieren können."
 LIB_corrupt_army4:0 "Korrupte Streitkräfte"
 LIB_corrupt_army4_desc:0 "Die Liberianische Grenztruppe ist zu nichts weiter als einer Gruppe von Schlägern geworden, die die lokale Bevölkerung erpressen. Es mangelt ihnen an Disziplin und Zusammenhalt in ihren Einheiten. Diese Probleme werden noch dadurch verschärft, dass wir die Truppen nicht bezahlen und diejenigen, die sich nicht an die Regeln halten, nicht wirksam disziplinieren können."
 LIB_dutch_investment_idea:0 "Niederländische Investitionen"
 LIB_dutch_investment_idea2:0 "Bedeutende niederländische Investition"
 LIB_gold_mining:0 "Gold- und Diamantminen"
 LIB_US_training_idea:0 "Training im amerikanischen Stil"
 LIB_US_officers_idea:0 "Offiziersausbildungsschulen"
 LIB_trained_force:0 "Reformierte Grenztruppe"
 LIB_trained_force_desc:0 "Die Frontier Force ist nicht länger die Plage des Landes, sondern eine moderne, kompetente Streitmacht. Obwohl noch einiges zu tun bleibt, haben wir bereits viel erreicht, um das Vertrauen in unser Militär wiederherzustellen."
 LIB_pay_incentive:0 "Zahlungsanreiz"
 LIB_us_lend_lease:0 "US-amerikanisches Leih- und Pachtprogramm"
 LIB_economic_disaster_1:0 "Wirtschaftliche Katastrophe"
 LIB_economic_disaster_2:0 "Wirtschaftliche Katastrophe"
 LIB_isolation:0 "Diplomatische Isolation"
 LIB_isolation_desc:0 "Durch sein Vorgehen wurde dieses Land diplomatisch isoliert, wenn auch nicht freiwillig."
 LIB_new_owners:0 "Jüngste Landumverteilung"
 LIB_new_owners_desc:0 "Dieses Land hat vor kurzem das Land der ehemals Privilegierten neu verteilt. Wie sich herausstellte, gestaltete sich die effiziente Bewirtschaftung des Landes und der darauf befindlichen Betriebe schwieriger als erwartet."
 LIB_angry_natives_f:0 "Wütende Hinterländer"
 LIB_angry_natives_f_desc:0 "Die Weigerung des Landes, die Eliten zu stürzen, hat viele seiner Anhänger verärgert. Sie müssen nun einen harten Kampf führen, um das Vertrauen wiederherzustellen."
 LIB_angry_natives_c:0 "Wütende Hinterländer"
 LIB_angry_natives_c_desc:0 "Die Weigerung des Landes, die Eliten zu stürzen, hat viele seiner Anhänger verärgert. Sie müssen nun einen harten Kampf führen, um das Vertrauen wiederherzustellen."
 LIB_dual_heads:0 "Doppelte Staatsoberhäupter"
 LIB_dual_heads_desc:0 "Dieses Land hat eine ungewöhnliche Regierungsform mit zwei Staatsoberhäuptern eingeführt, einem gewählten Präsidenten und einem König, der auf Lebenszeit regiert."
 LIB_us_system:0 "Präsidialsystem"
 LIB_us_system_desc:0 "Dieses Land stützt sich auf eine Regierung, die auf der der Vereinigten Staaten basiert, mit einem einzigen gewählten Regierungschef und einer separaten gewählten Legislative."
 LIB_uk_system:0 "Parlamentarisches System"
 LIB_uk_system_desc:0 "Dieses Land stützt sich auf eine parlamentarische Regierung mit einem Premierminister und einer gewählten Legislative."
 LIB_foreign_investment_idea:0 "Ausländische Investitionen"
 LIB_waiting_for_war:0 "Vorbereitung auf den Krieg"
 LIB_waiting_for_war_desc:0 "Aus dem einen oder anderen Grund ist dieses Land davon überzeugt, dass ein Krieg unmittelbar bevorsteht."
 LIB_communist_supply:0 "Guerilla-Kommunisten"
 LIB_communist_supply_desc:0 "Dieses Land führt einen Guerillakrieg und hat seine Bewegungen, einschließlich der Versorgung, im Voraus geplant."
 LIB_african_empire_idea:0 "[LIB_Typ_des_Imperiums]"
 LIB_african_empire_idea_desc:0 "Dieses Land hat sich aus bescheidenen Anfängen in Afrika zu großer Bedeutung entwickelt. Sie werden ihre neu gewonnene Macht mit allen notwendigen Mitteln verteidigen."
 LIB_hegemony_idea:0 "Afrikanische Hegemonie"
 LIB_hegemony_idea_desc:0 "Unter einem Banner vereint, ist ganz Afrika bereit, gegen jeden zurückzuschlagen, der es wagt, ihnen ihre neu gewonnene Freiheit zu nehmen."
 LIB_foreign_training_idea:0 "Ausbildung für ausländische Offiziere"
 LIB_domestic_industry:0 "Investitionen der heimischen Industrie"
 LIB_firestone_reparations:0 "Firestone-Reparaturen"
 LIB_firestone_reparations_desc:0 "Dieses Land zahlt der Firestone Company Entschädigungen für entstandene Schäden."
 LIB_jungle_training_idea:0 "Afrikanischer Vorteil"
 LIB_jungle_training_idea_desc:0 "Das natürliche Klima Afrikas härtet die Menschen ab und bereitet sie auf die extremen Klimabedingungen des Kontinents vor."
 
