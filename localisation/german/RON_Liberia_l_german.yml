 LIB_firestone_company:0 "Firestone"
 LIB_firestone_company_desc:0 "Firestone kam 1926 nach Liberia und brachte einen dringend benötigten Kredit von fünf Millionen Dollar mit. Heute beschäftigt das Unternehmen einen großen Teil unserer Bevölkerung, sodass wir stark von seinem Erfolg abhängig sind. Firestone ist auf Kautschuk spezialisiert und baut ihn aus den in unserem Land gut gedeihenden Kautschukbäumen an, hat aber auch einige Nebeninteressen. Firestone ist auch für einen Großteil der Infrastruktur unseres Hinterlandes verantwortlich, da das Unternehmen seine Plantagen per LKW erreichen musste."
