l_german:
 dislikes_russia_md:0 "Mag Russland nicht"
 dislikes_russia_md_desc:0 "„Dieser Führer hegt Verachtung für Russland und sein Volk.“"
 the_comedian_president:0 "Der Komiker-Präsident"
 the_comedian_president_desc:0 "Er beschritt einen unkonventionellen Weg in die Führungsrolle, oft mit Skepsis oder als Anspielung auf seine mangelnde politische Erfahrung, die auf seine Karriere als Komiker und Schauspieler vor seiner Präsidentschaft zurückzuführen war. Er hat jedoch trotz seines unkonventionellen Hintergrunds seine Fähigkeit unter Beweis gestellt, mit der Öffentlichkeit in Kontakt zu treten und effektiv zu führen."
 the_grey_cardinal:0 "Der graue Kardinal"
 the_grey_cardinal_desc:0 "„Diesen Spitznamen hat er sich aufgrund seiner Fähigkeit verdient, Kontrolle über verschiedene Aspekte der russischen Regierung, der Medien und der Gesellschaft auszuüben, oft auf indirektem Wege. Das liegt daran, dass er eine mächtige und einflussreiche Figur ist, die hinter den Kulissen agiert und oft die Fäden in der russischen Politik und darüber hinaus zieht.“"
 vova:0 "Vova"
 alcoholism_problems:0 "Alkoholismusprobleme"
 alcoholism_problems_desc:0 "§Aufgrund der Alkoholprobleme dieses Führers wird dies als Symbol für das Chaos und die Instabilität des Landes angesehen.§"
