 RON_Formable_Country.135.t:0 "Amerikanische Imperiale Föderation"
 RON_Formable_Country.135.d:0 "Die Imperial Federation war ein Vorschlag des späten 19. und frühen 20. Jahrhunderts, anstelle des bestehenden Britischen Empire eine föderale Union zu gründen. Das Projekt wurde von Unionisten wie Joseph Chamberlain als Alternative zu William Gladstones Vorschlägen für eine Selbstverwaltungsordnung (Home Rule) verfochten. Zu dieser Zeit bestand das Britische Empire aus zahlreichen Kolonien, von denen einige weitgehend selbstverwaltete Dominions waren (Kanada, Neufundland, Australien, Neuseeland, Südafrika), andere nicht (Indien, Westindien, Fidschi). Die Zukunft des Empire blieb ungewiss, da unklar war, was das Endergebnis sein würde, wenn alle Kolonien letztendlich selbstverwaltet würden. Unter anderem wurde befürchtet, dass es sehr schwierig wäre, die britischen Interessen zu wahren, wenn jede Kolonie im Wesentlichen bereits souverän wäre. Die Schaffung einer Imperial Federation wurde daher zu einem beliebten Alternativvorschlag zum Kolonialimperialismus. Der Plan war nie konkret, aber der allgemeine Vorschlag bestand darin, einen einzigen Bundesstaat aus allen Kolonien des Britischen Empire zu gründen. Die Föderation sollte ein gemeinsames Parlament haben und als Superstaat regiert werden. Auf diese Weise konnte die imperiale Einheit gewahrt und gleichzeitig eine demokratische Regierung ermöglicht werden. Die Kolonien würden ihren Einfluss vergrößern, während Großbritannien die Kosten der imperialen Verteidigung teilen könnte. Die besten Eigenschaften großer Staaten könnten mit den besten Eigenschaften kleiner Staaten kombiniert werden. Dies wurde als Methode zur Lösung des Home-Rule-Problems in Irland angesehen, da England, Schottland, Wales und Irland (zusammen mit den anderen Mitgliedern des Old Commonwealth) ihre eigenen Parlamente bekommen würden. Westminster würde ein rein imperiales Gremium werden. Befürworter der Imperial Federation sahen für das Vereinigte Königreich zwei mögliche Zukunftsszenarien: imperiale Union und anhaltende langfristige Bedeutung oder imperiale Auflösung und die Degradierung des Vereinigten Königreichs zu einer Nation zweiter Klasse. Als Antwort auf die Behauptung, die Geographie sei gegen eine Föderation in diesem großen Maßstab, wurde erklärt, dass wissenschaftliche Fortschritte das Problem lösen würden. Edward Ellis Morris erinnerte die Zuhörer seines Vortrags im Jahr 1885 daran, dass es heute genauso einfach sei, von Melbourne aus nach London zu gelangen, wie es zur Zeit der Acts of Union 1707 von den Orkney-Inseln aus gewesen sei oder wie es vor der Errichtung der Pässe über die Rocky Mountains von Kalifornien aus gewesen sei, nach Washington, D.C. zu gelangen."
 RON_Formable_Country.135.a:1 "OK"
