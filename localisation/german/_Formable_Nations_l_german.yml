 RON_Formable_Country.11.t:0 "Kalmar Union"
 RON_Formable_Country.11.d:0 "Die Kalmarer Union war eine Personalunion, die von 1397 bis 1523 die drei Königreiche Dänemark, Schweden (zu denen damals die meisten besiedelten Gebiete Finnlands gehörten) und Norwegen sowie Norwegens überseeische Besitzungen (damals Island, Grönland, die Färöer-Inseln und die Nordinseln) unter einem einzigen Monarchen vereinte. Die Union bestand nicht durchgehend, es gab mehrere kurze Unterbrechungen. Rechtlich blieben die Länder getrennte souveräne Staaten, ihre Innen- und Außenpolitik wurde jedoch von einem gemeinsamen Monarchen geleitet. Ein Hauptmotiv für ihre Gründung war die Verhinderung der deutschen Expansion nach Norden ins Baltikum. Der Hauptgrund für ihr Scheitern war der ständige Kampf zwischen dem Monarchen, der einen starken, einheitlichen Staat wollte, und dem schwedischen und dänischen Adel, der dies nicht wollte. Unterschiedliche Interessen (insbesondere die Unzufriedenheit des schwedischen Adels mit der dominierenden Rolle Dänemarks und Holsteins) führten zu einem Konflikt, der die Union von den 1430er Jahren bis zu ihrem endgültigen Zerfall 1523, als Gustav Wasa zum schwedischen König gewählt wurde, mehrfach behinderte. Norwegen blieb fast drei Jahrhunderte lang Teil des Königreichs Dänemark-Norwegen unter der Oldenburger Dynastie, bis es 1814 aufgelöst wurde. Die darauf folgende lockere Union zwischen Schweden und Norwegen hielt bis 1905, als ein Enkel des amtierenden dänischen Königs zum norwegischen König gewählt wurde. Seine direkten Nachkommen regieren noch heute in Norwegen."
 RON_Formable_Country.11.a:0 "Vereint und loyal!"
