 RON_Formable_Country.108.t:0 "Großdeutschland"
 RON_Formable_Country.108.d:0 "Die „Deutsche Frage“ war eine Debatte im 19. Jahrhundert, insbesondere während der Revolution von 1848, über den besten Weg zur deutschen Vereinigung. Von 1815 bis 1866 gehörten etwa 37 unabhängige deutschsprachige Staaten zum Deutschen Bund. Die Großdeutsche Lösung befürwortete die Vereinigung aller deutschsprachigen Völker in einem Staat und wurde vom Kaiserreich Österreich und seinen Unterstützern vorangetrieben. Die Kleindeutsche Lösung strebte lediglich eine Vereinigung der norddeutschen Staaten an und schloss Österreich nicht ein; dieser Vorschlag wurde vom Königreich Preußen favorisiert. 1938 vollzog Adolf Hitler den von ihm lang ersehnten Anschluss seines Geburtslandes Österreich an Deutschland. In Anlehnung an die „Großdeutsche Lösung“ des 19. Jahrhunderts wurde der erweiterte Staat als Großdeutsches Reich und umgangssprachlich als Großdeutschland bezeichnet. Die Namen waren zunächst informell, aber die Änderung in Großdeutsches Reich wurde 1943 offiziell. Neben Deutschland (Grenzen vor dem Zweiten Weltkrieg), Österreich und Elsass-Lothringen umfasste das Großdeutsche Reich das Großherzogtum Luxemburg, das Sudetenland, Böhmen und Mähren, das Memelgebiet, die von Nazi-Deutschland annektierten polnischen Gebiete, den Freistaat Danzig und die Gebiete des „Generalgouvernements“ (Gebiete Polens unter deutscher Militärbesatzung)."
 RON_Formable_Country.108.a:1 "Aller Guten Dinge Sind Drei"
