 RON_Formable_Country.120.t:0 "Großgriechenland"
 RON_Formable_Country.120.d:0 "Die Megali-Idee war ein irredentistisches Konzept, das das Ziel der Wiederbelebung des Byzantinischen Reiches durch die Gründung eines griechischen Staates zum Ausdruck brachte. Dieser sollte die großen griechischen Bevölkerungsgruppen umfassen, die nach dem Ende des griechischen Unabhängigkeitskrieges (1821–1828) noch immer unter osmanischer Herrschaft standen, sowie alle Regionen, die seit der Antike traditionell den Griechen gehörten (Teile des südlichen Balkans, Kleinasien und Zypern)."
