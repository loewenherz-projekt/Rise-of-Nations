 RON_Formable_Country.137.t:0 "Pazifische Föderation"
 RON_Formable_Country.137.d:0 "Die Asiatisch-Pazifische Wirtschaftsgemeinschaft (APEC) ist ein zwischenstaatliches Forum für 21 Mitgliedsstaaten im pazifischen Raum, das den freien Handel im gesamten asiatisch-pazifischen Raum fördert. Nach dem Erfolg der ASEAN-Serie von Ministerkonferenzen, die Mitte der 1980er Jahre ins Leben gerufen wurde, entstand 1989 die APEC als Reaktion auf die wachsende gegenseitige Abhängigkeit der asiatisch-pazifischen Volkswirtschaften und die Entstehung regionaler Handelsblöcke in anderen Teilen der Welt. Ziel war es, neue Märkte für Agrarprodukte und Rohstoffe außerhalb Europas zu erschließen. Die APEC mit Sitz in Singapur gilt als einer der höchstrangigen multilateralen Blöcke und ältesten Foren im asiatisch-pazifischen Raum und übt einen erheblichen globalen Einfluss aus."
 RON_Formable_Country.137.a:1 "OK"
