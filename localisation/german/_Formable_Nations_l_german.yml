 RON_Formable_Country.89.t:0 "Anglosphäre"
 RON_Formable_Country.89.d:0 "Die Anglosphäre ist eine Gruppe englischsprachiger Nationen, die gemeinsame kulturelle und historische Bindungen zum Vereinigten Königreich haben und heute eine enge politische, diplomatische und militärische Zusammenarbeit pflegen. Die in verschiedenen Quellen erfassten Nationen variieren, doch werden in der Regel nicht alle Länder, in denen Englisch Amtssprache ist, als Anglosphäre betrachtet. Sie ist daher nicht gleichbedeutend mit anglophon, obwohl die üblicherweise erfassten Nationen einst Teil des Britischen Empire waren."
