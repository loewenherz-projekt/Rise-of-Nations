 RON_Formable_Country.117.t:0 "Großchile"
 RON_Formable_Country.117.d:0 "Chilenischer Expansionismus bezeichnet die chilenische Außenpolitik, die darauf abzielt, die territoriale Kontrolle über strategisch wichtige Standorte und wirtschaftliche Ressourcen auszuweiten, um die nationale Sicherheit zu gewährleisten und die Macht in Südamerika zu behaupten. Chiles bedeutende Gebietseroberungen, die sich hauptsächlich im 19. Jahrhundert vollzogen, ebneten den Weg für seinen Aufstieg zu einem der drei mächtigsten und reichsten Staaten Südamerikas im 20. Jahrhundert. Sie prägten zudem Chiles geopolitische und nationale Identität als trikontinentaler Staat und als eines der Länder mit den längsten Küstenlinien der Welt."
