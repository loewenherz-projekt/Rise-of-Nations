 RON_Formable_Country.74.t:0 "Deutsches Kaiserreich"
 RON_Formable_Country.74.d:0 "Das Deutsche Reich, auch Kaiserliches Deutschland genannt, war der deutsche Nationalstaat, der von der deutschen Vereinigung 1871 bis zur Abdankung Kaiser Wilhelms II. im Jahr 1918 existierte. Es wurde 1871 gegründet, als die süddeutschen Staaten mit Ausnahme Österreichs dem Norddeutschen Bund beitraten. Am 1. Januar 1871 trat die neue Verfassung in Kraft, die den Namen des Bundesstaates änderte und den Kaisertitel für Wilhelm I., König von Preußen aus dem Haus Hohenzollern, einführte. Berlin blieb die Hauptstadt und Otto Fürst von Bismarck blieb Kanzler, das Regierungsoberhaupt. Während diese Ereignisse eintraten, waren der von Preußen geführte Norddeutsche Bund und seine süddeutschen Verbündeten noch in den Deutsch-Französischen Krieg verwickelt. Das Deutsche Reich bestand aus 26 Staaten, die meisten davon von Königshäusern regiert. Dazu gehörten vier Königreiche, sechs Großherzogtümer, fünf Herzogtümer (sechs vor 1876), sieben Fürstentümer, drei freie Hansestädte und ein Reichsterritorium. Obwohl Preußen eines von mehreren Königreichen im Reich war, umfasste es etwa zwei Drittel der Bevölkerung und des Territoriums Deutschlands. Die preußische Vorherrschaft war auch verfassungsmäßig verankert. Nach 1850 industrialisierten sich die deutschen Staaten rasch und waren besonders stark in den Bereichen Kohle, Eisen (und später Stahl), Chemie und Eisenbahn. 1871 hatte Deutschland 41 Millionen Einwohner; bis 1913 war diese Zahl auf 68 Millionen angestiegen. Das nun vereinigte Deutschland, 1815 noch ein stark ländlich geprägter Staatenverbund, wurde überwiegend städtisch. Während seiner 47-jährigen Existenz war das Deutsche Reich ein Gigant in Industrie, Technologie und Wissenschaft und erhielt mehr Nobelpreise in Naturwissenschaften als jedes andere Land. Um 1900 war Deutschland die größte Volkswirtschaft Europas und übertraf damit das Vereinigte Königreich. Weltweit war es nach den Vereinigten Staaten die zweitgrößte Volkswirtschaft."
 RON_Formable_Country.74.a:0 "Heil Kaiser, Dir!"
 RON_Formable_News.74.t:0 "Deutsches Kaiserreich"
 RON_Formable_News.74.d:0 "Das Deutsche Reich, auch Kaiserliches Deutschland genannt, war der deutsche Nationalstaat, der von der deutschen Vereinigung 1871 bis zur Abdankung Kaiser Wilhelms II. im Jahr 1918 existierte. Es wurde 1871 gegründet, als die süddeutschen Staaten mit Ausnahme Österreichs dem Norddeutschen Bund beitraten. Am 1. Januar 1871 trat die neue Verfassung in Kraft, die den Namen des Bundesstaates änderte und den Kaisertitel für Wilhelm I., König von Preußen aus dem Haus Hohenzollern, einführte. Berlin blieb die Hauptstadt und Otto Fürst von Bismarck blieb Kanzler, das Regierungsoberhaupt. Während diese Ereignisse eintraten, waren der von Preußen geführte Norddeutsche Bund und seine süddeutschen Verbündeten noch in den Deutsch-Französischen Krieg verwickelt. Das Deutsche Reich bestand aus 26 Staaten, die meisten davon von Königshäusern regiert. Dazu gehörten vier Königreiche, sechs Großherzogtümer, fünf Herzogtümer (sechs vor 1876), sieben Fürstentümer, drei freie Hansestädte und ein Reichsterritorium."
