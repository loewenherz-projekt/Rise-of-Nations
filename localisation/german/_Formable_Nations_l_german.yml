 RON_Formable_Country.90.t:0 "Frankosphäre"
 RON_Formable_Country.90.d:0 "Die Organisation Internationale de la Francophonie (OIF), im englischen Sprachkontext auch Internationale Organisation der Frankophonie genannt, ist eine internationale Organisation, die Länder und Regionen vertritt, in denen Französisch eine Lingua Franca oder Landessprache ist, in denen ein erheblicher Anteil der Bevölkerung frankophon ist oder in denen eine bemerkenswerte Verbindung zur französischen Kultur besteht."
