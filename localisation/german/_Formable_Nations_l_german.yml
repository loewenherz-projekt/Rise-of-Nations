 RON_Formable_Country.107.t:0 "Großösterreich"
 RON_Formable_Country.107.d:0 "Das Erzherzogtum Österreich war ein bedeutendes Fürstentum des Heiligen Römischen Reiches und der Kern der Habsburgermonarchie. Mit seiner Hauptstadt Wien lag das Zentrum des Erzherzogtums an der südöstlichen Peripherie des Reiches. Sein heutiger Name stammt von dem fränkischen Begriff Oustrich – Östliches Königreich. Das Erzherzogtum entwickelte sich aus der bayerischen Markgrafschaft Österreich, die gemäß dem Privilegium Minus von Kaiser Friedrich Barbarossa im Jahr 1156 zum Herzogtum Österreich erhoben wurde. Das Haus Habsburg bestieg 1282 in Wien den österreichischen Thron und 1453 nahm Kaiser Friedrich III., auch Herrscher von Österreich, offiziell den Titel eines Erzherzogs an. Ab dem 15. Jahrhundert waren alle Kaiser des Heiligen Römischen Reiches bis auf einen österreichische Erzherzoge und mit der Übernahme der böhmischen und ungarischen Kronländer im Jahr 1526 wurden die habsburgischen Erbländer zum Zentrum einer europäischen Großmacht."
 RON_Formable_Country.107.a:1 "Alles Erdreich Ist Österreich Untertan"
