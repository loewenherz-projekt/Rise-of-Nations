 RON_Formable_Country.25.t:0 "Balkanföderation"
 RON_Formable_Country.25.d:0 "Die Idee einer Balkanföderation entstand im späten 19. Jahrhundert unter linken politischen Kräften in der Region. Das zentrale Ziel war die Schaffung einer neuen politischen Einheit: einer gemeinsamen föderativen Republik, die die Balkanhalbinsel auf der Grundlage von Internationalismus, Sozialismus, sozialer Solidarität und wirtschaftlicher Gleichheit einen sollte. Die zugrunde liegende Vision bestand darin, dass trotz der Unterschiede zwischen den Balkanvölkern das historische Bedürfnis nach Emanzipation eine gemeinsame Basis für die Vereinigung bildete. Dieses politische Konzept durchlief in seiner Entwicklung drei Phasen. In der ersten Phase wurde die Idee als Reaktion auf den Zusammenbruch des Osmanischen Reiches zu Beginn des 20. Jahrhunderts formuliert. In der zweiten Phase, die hauptsächlich in der Zwischenkriegszeit (1919–1936) stattfand, wurde die Idee einer Balkanföderation von den kommunistischen Parteien des Balkans aufgegriffen. Die dritte Phase ist durch den Konflikt zwischen den kommunistischen Führern des Balkans und Josef Stalin gekennzeichnet, der sich der Idee in der Nachkriegszeit widersetzte."
 RON_Formable_Country.25.a:0 "Gemeinsam sind wir stark!"
 RON_Formable_News.25.t:0 "Balkanföderation"
