 RON_Formable_Country.63.t:0 "Chile-Argentinische Union"
 RON_Formable_Country.63.d:0 "„Wir schreiben Geschichte. Wenn Chile und Argentinien die Einheit erreichen, wie ich hoffe, werden sie den Kern der iberoamerikanischen Einheit bilden. Später könnte es zu einer Union mit anderen Nationen, wie zum Beispiel Brasilien, kommen. Wenn das argentinische Volk auf die Straße gehen muss, um die Union mit Chile zu fordern, wird es dies tun und die privaten Interessen besiegen, die sich ihr widersetzen könnten“, sagte der argentinische Präsident in dem Interview."
 RON_Formable_Country.63.a:0 "Por La Razón O La Fuerza."
