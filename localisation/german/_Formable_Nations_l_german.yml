 RON_Formable_Country.38.t:0 "Nordseereich"
 RON_Formable_Country.38.d:0 "Das Nordseereich, auch bekannt als Anglo-Skandinavisches Reich, war das thalassokratische Reich, das zwischen 1016 und 1035 von Knut dem Großen als König von England, Dänemark, Norwegen und Teilen des heutigen Schweden regiert wurde."
 RON_Formable_Country.38.a:0 "Dieu Et Mon Droit!"
 RON_Formable_News.38.t:0 "Nordseereich"
 RON_Formable_News.38.d:0 "Das Nordseereich, auch bekannt als Anglo-Skandinavisches Reich, war das thalassokratische Gebiet, das zwischen 1016 und 1035 von Knut dem Großen als König über England, Dänemark, Norwegen und Teile des heutigen Schweden regiert wurde."
 RON_Formable_News.38.a:0 "OK"
 
 RON_Formable_Country.39.t:0 "Inkareich"
 RON_Formable_Country.39.d:0 "Das Inkareich, auch bekannt als Inkareich oder Inka-Reich, war das größte Reich im präkolumbianischen Amerika. Seine politische und administrative Struktur gilt nach Ansicht der meisten Gelehrten vor Kolumbus&#39; Ankunft als die am weitesten entwickelte in Amerika. Das administrative, politische und militärische Zentrum des Reiches befand sich in der Stadt Cusco. Die Inka-Zivilisation entstand irgendwann im frühen 13. Jahrhundert im peruanischen Hochland. Ihre letzte Festung wurde 1572 von den Spaniern erobert. Von 1438 bis 1533 gliederten die Inkas große Teile Westsüdamerikas, insbesondere die Anden, unter anderem durch Eroberung und friedliche Assimilation ein. In seiner größten Ausdehnung vereinigte das Reich Peru, Südwest-Ecuador, West- und Südzentralbolivien, Nordwest-Argentinien, große Teile des heutigen Chile und einen kleinen Teil Südwestkolumbiens zu einem Staat, vergleichbar mit den historischen Reichen Eurasiens. Die Amtssprache war Quechua. Im Reich gab es viele lokale Kultformen, die meisten davon betrafen lokale heilige Huacas. Die Inka-Führung förderte jedoch die Sonnenverehrung ihres Sonnengottes Inti und setzte seine Vorherrschaft über andere Kulte wie den der Pachamama durch. Die Inkas betrachteten ihren König, den Sapa Inka, als „Sohn der Sonne“."
 RON_Formable_Country.39.a:0 "Der Sonnengott beschützt!"
 RON_Formable_News.39.t:0 "Inkareich"
 RON_Formable_News.39.d:0 "Das Inkareich, auch bekannt als Inkareich oder Inka-Reich, war das größte Reich im präkolumbianischen Amerika. Seine politische und administrative Struktur gilt nach Ansicht der meisten Gelehrten vor Kolumbus&#39; Ankunft als die am weitesten entwickelte in Amerika. Das administrative, politische und militärische Zentrum des Reiches befand sich in der Stadt Cusco. Die Inka-Zivilisation entstand irgendwann im frühen 13. Jahrhundert im peruanischen Hochland. Ihre letzte Festung wurde 1572 von den Spaniern erobert. Von 1438 bis 1533 integrierten die Inkas große Teile Westsüdamerikas, insbesondere die Anden, unter anderem durch Eroberung und friedliche Assimilation. In seiner größten Ausdehnung vereinigte das Reich Peru, Südwest-Ecuador, West- und Südzentralbolivien, Nordwest-Argentinien, große Teile des heutigen Chile und einen kleinen Teil Südwestkolumbiens zu einem Staat, der mit den historischen Reichen Eurasiens vergleichbar ist. Die Amtssprache war Quechua. Im Reich gab es viele lokale Kultformen, die meisten davon betrafen lokale heilige Huacas. Die Inka-Führung förderte jedoch die Sonnenverehrung ihres Sonnengottes Inti und setzte seine Vorherrschaft über andere Kulte wie den der Pachamama durch. Die Inkas betrachteten ihren König, den Sapa Inka, als „Sohn der Sonne“."
