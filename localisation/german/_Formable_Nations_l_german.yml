 RON_Formable_Country.34.t:0 "Großisrael"
 RON_Formable_Country.34.d:0 "„Großisrael“ ist ein Begriff, der im Laufe der Zeit verschiedene biblische und politische Bedeutungen hatte. Er wird oft irredentistisch verwendet, um die historischen oder gewünschten Grenzen Israels zu bezeichnen. Die heute gängigste Definition des Begriffs ist das Territorium des Staates Israel zusammen mit den palästinensischen Gebieten. Eine frühere, vom revisionistischen Zionismus favorisierte Definition umfasste auch das Gebiet des ehemaligen Emirats Transjordanien."
 RON_Formable_Country.34.a:0 "Auge um Auge"
 RON_Formable_News.34.t:0 "Großisrael"
