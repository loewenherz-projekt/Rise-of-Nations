 RON_Formable_Country.128.t:0 "Unionsstaat"
 RON_Formable_Country.128.d:0 "Der Unionsstaat, auch Unionsstaat Russlands und Weißrusslands genannt, ist eine Organisation aus Russland und Weißrussland, die am 8. Dezember 1999 gegründet wurde. Ursprünglich sollte der Unionsstaat beide Länder vereinen und sollte in seiner geplanten endgültigen Form ähnlich wie Konföderationen oder politische Unionen strukturiert sein. Beide Länder bewahren jedoch derzeit ihre Unabhängigkeit. Der Unionsstaat basiert auf einem früheren internationalen Vertrag zwischen Russland und Weißrussland vom 2. April 1997. Obwohl er nur aus Russland und Weißrussland besteht, ist es anderen Ländern gestattet, dem Unionsstaat beizutreten. Die supranationale Union wird durch den Obersten Staatsrat und andere Leitungsgremien regiert. Der derzeitige Präsident des Obersten Staatsrats der Union ist Alexander Lukaschenko, der dieses Amt seit 2000 innehat."
 RON_Formable_Country.128.a:1 "OK"
