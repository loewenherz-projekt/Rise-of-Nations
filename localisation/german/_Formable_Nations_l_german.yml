 RON_Formable_Country.19.t:0 "Kiewer Rus"
 RON_Formable_Country.19.d:0 "Die Kiewer Rus war ein loser Zusammenschluss ostslawischer und finnischer Völker in Europa, der vom späten 9. bis zur Mitte des 13. Jahrhunderts unter der Herrschaft der warägerischen Rurikiden-Dynastie existierte. Die heutigen Nationen Weißrussland, Russland und die Ukraine beanspruchen die Kiewer Rus als ihren kulturellen Vorfahren, wobei Weißrussland und Russland ihre Namen von ihr ableiten. Ihre größte Ausdehnung erreichte sie Mitte des 11. Jahrhunderts und erstreckte sich vom Weißen Meer im Norden bis zum Schwarzen Meer im Süden und von den Quellgewässern der Weichsel im Westen bis zur Taman-Halbinsel im Osten. Sie vereinte die Mehrheit der ostslawischen Stämme. Der Staat verfiel ab dem späten 11. Jahrhundert und im 12. Jahrhundert und zerfiel in verschiedene rivalisierende Regionalmächte. Wirtschaftliche Faktoren wie der Zusammenbruch der Handelsbeziehungen der Rus zum Byzantinischen Reich infolge des Niedergangs Konstantinopels und der damit verbundenen Einschränkung der Handelsrouten durch ihr Territorium schwächten die Rus zusätzlich. Der Staat fiel schließlich in den 1240er Jahren der mongolischen Invasion zum Opfer."
 RON_Formable_Country.19.a:0 "S Nami Bog!"
