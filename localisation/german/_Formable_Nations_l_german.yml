 RON_Formable_Country.69.t:0 "Russisches Reich"
 RON_Formable_Country.69.d:0 "Das Russische Reich, auch als Kaiserliches Russland oder einfach Russland bekannt, erstreckte sich von 1721 nach dem Ende des Großen Nordischen Krieges bis zur Ausrufung der Republik durch die Provisorische Regierung, die nach der Februarrevolution 1917 die Macht übernahm, über Eurasien und Nordamerika. Als drittgrößtes Reich der Weltgeschichte erstreckte es sich zu seiner größten Ausdehnung über drei Kontinente – Europa, Asien und Nordamerika – und wurde flächenmäßig nur vom Britischen und Mongolischen Reich übertroffen. Der Aufstieg des Russischen Reiches fiel mit dem Niedergang benachbarter rivalisierender Mächte zusammen: der Goldenen Horde, des Schwedischen Reiches, Polen-Litauens, Persiens und des Osmanischen Reiches. In den Jahren 1812–1814 spielte es eine wichtige Rolle bei der Vereitelung von Napoleons Ambitionen auf die Kontrolle Europas und dehnte sich nach Westen und Süden aus."
 RON_Formable_Country.69.a:0 "Gott ist mit uns!"
 RON_Formable_News.69.t:0 "Russisches Reich"
 RON_Formable_News.69.d:0 "Das Russische Reich, auch als Kaiserliches Russland oder einfach Russland bekannt, erstreckte sich von 1721 nach dem Ende des Großen Nordischen Krieges bis zur Ausrufung der Republik durch die Provisorische Regierung, die nach der Februarrevolution 1917 die Macht übernahm, über Eurasien und Nordamerika. Als drittgrößtes Reich der Weltgeschichte, das sich zu seiner größten Ausdehnung über drei Kontinente – Europa, Asien und Nordamerika – erstreckte, wurde das Russische Reich flächenmäßig nur vom Britischen und dem Mongolischen Reich übertroffen. Der Aufstieg des Russischen Reiches fiel mit dem Niedergang benachbarter rivalisierender Mächte zusammen: der Goldenen Horde, des Schwedischen Reiches, Polen-Litauens, Persiens und des Osmanischen Reiches. In den Jahren 1812–1814 spielte es eine wichtige Rolle bei der Vereitelung von Napoleons Ambitionen auf die Kontrolle Europas und expandierte nach Westen und Süden."
 RON_Formable_News.69.a:0 "OK"
 
 RON_Formable_Country.70.t:0 "Alamannien"
 RON_Formable_Country.70.d:0 "Alamannia oder Alemannien war das Gebiet, das von den germanischen Alemannen bewohnt wurde, nachdem diese 213 den römischen Limes durchbrochen hatten. Die Alemannen breiteten sich im 3. Jahrhundert vom Mainbecken aus aus, überfielen römische Provinzen und ließen sich ab dem 4. Jahrhundert am linken Rheinufer nieder. Im 4. bis 5. Jahrhundert von unabhängigen Stammeskönigen regiert, verlor Alamannia im 6. Jahrhundert seine Unabhängigkeit und wurde ein Herzogtum des Fränkischen Reiches. Als sich unter König Konrad I. von Ostfranken (reg. 911–918) das Heilige Römische Reich zu bilden begann, wurde das Gebiet von Alamannia im Jahr 915 zum Herzogtum Schwaben. Im 10. bis 12. Jahrhundert verwendeten Schreiber die Begriffe Suebia und Alamannia oft synonym. Das Gebiet Alemanniens, wie es vom 7. bis 9. Jahrhundert existierte, konzentrierte sich auf den Bodensee und umfasste den Hochrhein, den Schwarzwald und das Elsass beiderseits des Oberrheins, das obere Donaubecken bis zur Mündung des Lech, mit einer unklaren Grenze Richtung Burgund im Südwesten im Becken der Aare (dem Aargau). Raetia Curiensis, obwohl nicht Teil Alemanniens, wurde von alemannischen Grafen regiert und wurde Teil des Herzogtums Schwaben, seit es von Burchard I. (Herzog von Alemannien von 909 bis 911) gegründet wurde. Das Gebiet entspricht dem, was in der Neuzeit noch das Gebiet des alemannischen Deutsch war, d. h. das französische Elsass, das deutsche Baden und Schwaben, die deutschsprachige Schweiz und das österreichische Vorarlberg."
 RON_Formable_Country.70.a:0 "Alles für Alamannia"
