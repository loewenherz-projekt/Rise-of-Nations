 RON_Formable_Country.103.t:0 "Niederländisches Reich"
 RON_Formable_Country.103.d:0 "Das niederländische Kolonialreich umfasste die überseeischen Gebiete und Handelsposten, die von niederländischen Chartergesellschaften – hauptsächlich der Niederländischen Westindien-Kompanie und der Niederländischen Ostindien-Kompanie – und später von der Niederländischen Republik (1581–1795) und ab 1815 vom modernen Königreich der Niederlande kontrolliert und verwaltet wurden. Es war ursprünglich ein handelsbasiertes System, dessen Einfluss hauptsächlich auf Handelsunternehmen und die niederländische Kontrolle der internationalen Seeschifffahrtsrouten durch strategisch platzierte Außenposten und nicht auf expansive territoriale Unternehmungen zurückzuführen war. Nach Spanien und Portugal gehörten die Niederländer zu den ersten Imperiumsgründern Europas."
 RON_Formable_Country.103.a:1 "Eendracht Maakt Macht"
