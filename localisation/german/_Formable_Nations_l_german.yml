 RON_Formable_Country.101.t:0 "Vereinigter Südkegel"
 RON_Formable_Country.101.d:0 "Der Südkegel ist eine geografische und kulturelle Region, die sich aus den südlichsten Gebieten Südamerikas, größtenteils südlich des Wendekreises des Steinbocks, zusammensetzt. Traditionell umfasst er Argentinien, Chile und Uruguay und grenzt im Westen an den Pazifischen Ozean und im Osten an den Atlantischen Ozean. In sozialer, wirtschaftlicher und politischer Hinsicht umfasst der Südkegel Argentinien, Chile und Uruguay und schließt manchmal auch die vier südlichsten Bundesstaaten Brasiliens (Paraná, Rio Grande do Sul, Santa Catarina und São Paulo) ein. In seiner weitesten Definition, die die gemeinsame Geschichte und Geographie berücksichtigt, schließt er auch Paraguay ein, ein weiteres spanischsprachiges Land."
 RON_Formable_Country.101.a:1 "Por La Razón O La Fuerza"
