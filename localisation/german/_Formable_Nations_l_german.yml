 RON_Formable_Country.32.t:0 "Osmanisches Reich"
 RON_Formable_Country.32.d:0 "Das Osmanische Reich, in Westeuropa historisch als Türkisches Reich oder einfach Türkei bekannt, war ein Staat, der zwischen dem 14. und dem frühen 20. Jahrhundert weite Teile Südosteuropas, Westasiens und Nordafrikas kontrollierte. Es wurde Ende des 13. Jahrhunderts im Nordwesten Anatoliens in der Stadt Söğüt (heute Provinz Bilecik) vom oghusischen Stammesführer Osman I. gegründet. Nach 1354 drangen die Osmanen nach Europa ein, und mit der Eroberung des Balkans verwandelte sich der osmanische Beylik in ein transkontinentales Reich. Die Osmanen beendeten das Byzantinische Reich 1453 mit der Eroberung Konstantinopels durch Mehmed den Eroberer. Im 16. und 17. Jahrhundert, auf dem Höhepunkt seiner Macht unter der Herrschaft Süleymans des Prächtigen, war das Osmanische Reich ein multinationales, vielsprachiges Reich, das den größten Teil Südosteuropas, Teile Mitteleuropas, Westasiens, Teile Osteuropas und des Kaukasus, Nordafrikas und des Horns von Afrika kontrollierte. Zu Beginn des 17. Jahrhunderts umfasste das Reich 32 Provinzen und zahlreiche Vasallenstaaten. Einige davon wurden später vom Osmanischen Reich eingemeindet, während anderen im Laufe der Jahrhunderte verschiedene Formen der Autonomie gewährt wurden. Die Niederlage des Reiches und die Besetzung eines Teils seines Territoriums durch die Alliierten nach dem Ersten Weltkrieg hatten seine Teilung und den Verlust seiner Gebiete im Nahen Osten zur Folge, die zwischen Großbritannien und Frankreich aufgeteilt wurden. Der erfolgreiche türkische Unabhängigkeitskrieg gegen die alliierten Besatzer führte zur Entstehung der Republik Türkei im Kernland Anatoliens und zur Abschaffung der osmanischen Monarchie."
 RON_Formable_Country.32.a:0 "Devlet-I Ebed-Müddet!"
 RON_Formable_News.32.t:0 "Osmanisches Reich"
