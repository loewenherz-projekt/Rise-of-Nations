 RON_Formable_Country.141.t:0 "Drittes Römisches Reich"
 RON_Formable_Country.141.d:0 "Moskau, das dritte Rom, ist ein theologisches und politisches Konzept, das besagt, dass Moskau der Nachfolger des Römischen Reiches ist und ein „drittes Rom“ in der Nachfolge des ersten Roms (Rom selbst, Hauptstadt des antiken Roms) und des zweiten Roms (Konstantinopel, Hauptstadt des Oströmischen (Byzantinischen) Reiches) darstellt."
 RON_Formable_Country.141.a:1 "Endlich Pax Russiana"
 RON_Formable_News.141.t:0 "Drittes Römisches Reich"
 RON_Formable_News.141.d:0 "Moskau, das dritte Rom, ist ein theologisches und politisches Konzept, das besagt, dass Moskau der Nachfolger des Römischen Reiches ist und ein „drittes Rom“ in der Nachfolge des ersten Roms (Rom selbst, Hauptstadt des antiken Roms) und des zweiten Roms (Konstantinopel, Hauptstadt des Oströmischen (Byzantinischen) Reiches) darstellt."
 RON_Formable_News.141.a:1 "OK"
 
 RON_Formable_Country.142.t:0 "Anglo-Niederländische Union"
 RON_Formable_Country.142.d:0 "Wilhelm III., auch bekannt als Wilhelm von Oranien, war von Geburt an Prinz von Oranien, ab den 1670er Jahren Statthalter von Holland, Zeeland, Utrecht, Geldern und Overijssel in der Niederländischen Republik und von 1689 bis zu seinem Tod 1702 König von England, Irland und Schottland. Als König von Schottland ist er als Wilhelm II. bekannt. In Irland und Schottland wird er manchmal informell „König Billy“ genannt. Sein Sieg in der Schlacht am Boyne im Jahr 1690 wird von den Unionisten gefeiert, die ihm zu Ehren orangefarbene Fahnen hissen. Er regierte Großbritannien an der Seite seiner Frau und Cousine Königin Maria II. und in der Geschichtsschreibung wird ihre Herrschaft üblicherweise als die von „Wilhelm und Maria“ bezeichnet."
 RON_Formable_Country.142.a:1 "OK"
 RON_Formable_News.142.t:0 "Anglo-Niederländische Union"
 RON_Formable_News.142.d:0 "Wilhelm III., auch bekannt als Wilhelm von Oranien, war von Geburt an Prinz von Oranien, ab den 1670er Jahren Statthalter von Holland, Zeeland, Utrecht, Geldern und Overijssel in der Niederländischen Republik und von 1689 bis zu seinem Tod 1702 König von England, Irland und Schottland. Als König von Schottland ist er als Wilhelm II. bekannt. In Irland und Schottland wird er manchmal informell „König Billy“ genannt. Sein Sieg in der Schlacht am Boyne im Jahr 1690 wird von den Unionisten gefeiert, die ihm zu Ehren orangefarbene Fahnen hissen. Er regierte Großbritannien an der Seite seiner Frau und Cousine Königin Maria II. und in der Geschichtsschreibung wird ihre Herrschaft üblicherweise als die von „Wilhelm und Maria“ bezeichnet."
 RON_Formable_News.142.a:1 "OK"
 
 RON_Formable_Country.143.t:0 "Österreichisch-Spanisches Reich"
 RON_Formable_Country.143.d:0 "Karl V. war von 1519 bis 1556 Kaiser des Heiligen Römischen Reiches und Erzherzog von Österreich, von 1516 bis 1556 König von Spanien und von 1506 bis 1555 als Titularherzog von Burgund Herr der Niederlande. Als Oberhaupt des aufstrebenden Hauses Habsburg in der ersten Hälfte des 16. Jahrhunderts umfasste er in Europa das Heilige Römische Reich, das sich von Deutschland bis Norditalien erstreckte und die österreichischen Erblande und die burgundischen Niederlande direkt beherrschte, sowie das Königreich Spanien mit seinen süditalienischen Besitzungen Neapel, Sizilien und Sardinien. Darüber hinaus überwachte er sowohl die Fortsetzung der langjährigen spanischen als auch die kurzlebige deutsche Kolonialisierung Amerikas. Die Personalunion der europäischen und amerikanischen Gebiete Karls V. war die erste Ansammlung von Reichen, die als „das Reich, in dem die Sonne niemals untergeht“ bezeichnet wurde."
 RON_Formable_Country.143.a:1 "OK"
 RON_Formable_News.143.t:0 "Österreichisch-Spanisches Reich"
 RON_Formable_News.143.d:0 "Karl V. war von 1519 bis 1556 Kaiser des Heiligen Römischen Reiches und Erzherzog von Österreich, von 1516 bis 1556 König von Spanien und von 1506 bis 1555 als Titularherzog von Burgund Herr der Niederlande. Als Oberhaupt des aufstrebenden Hauses Habsburg in der ersten Hälfte des 16. Jahrhunderts umfasste er in Europa das Heilige Römische Reich, das sich von Deutschland bis Norditalien erstreckte und die österreichischen Erblande und die burgundischen Niederlande direkt beherrschte, sowie das Königreich Spanien mit seinen süditalienischen Besitzungen Neapel, Sizilien und Sardinien. Darüber hinaus überwachte er sowohl die Fortsetzung der langjährigen spanischen als auch die kurzlebige deutsche Kolonialisierung Amerikas. Die Personalunion der europäischen und amerikanischen Gebiete Karls V. war die erste Ansammlung von Reichen, die als „das Reich, in dem die Sonne niemals untergeht“ bezeichnet wurde."
 RON_Formable_News.143.a:1 "OK"
 
 RON_Formable_Country.144.t:0 "Französisch-Spanische Union"
 RON_Formable_Country.144.d:0 "Der Pacte de Famille ist eines von drei separaten, aber ähnlichen Bündnissen zwischen den Bourbonenkönigen Frankreichs und Spaniens. Im Rahmen der Beilegung des Spanischen Erbfolgekriegs, der das französische Haus Bourbon auf den spanischen Thron brachte, schlossen Spanien und Frankreich eine Reihe von Abkommen, die die beiden Throne zwar nicht vereinten, aber zu einer Zusammenarbeit auf einer definierten Grundlage führten."
 RON_Formable_Country.144.a:1 "OK"
 RON_Formable_News.144.t:0 "Französisch-Spanische Union"
 RON_Formable_News.144.d:0 "Der Pacte de Famille ist eines von drei separaten, aber ähnlichen Bündnissen zwischen den Bourbonenkönigen Frankreichs und Spaniens. Im Rahmen der Beilegung des Spanischen Erbfolgekriegs, der das französische Haus Bourbon auf den spanischen Thron brachte, schlossen Spanien und Frankreich eine Reihe von Abkommen, die die beiden Throne zwar nicht vereinten, aber zu einer Zusammenarbeit auf einer definierten Grundlage führten."
 RON_Formable_News.144.a:1 "OK"
 
 RON_Formable_Country.145.t:0 "Römisch-Bulgarische Union"
 RON_Formable_Country.145.d:0 "Im 19. und 20. Jahrhundert scheiterten mehrere Vorschläge, Bulgarien und Rumänien zu einem gemeinsamen Staat zu vereinen, sei es in Form einer Föderation, einer Personalunion oder einer Konföderation. Solche Ideen fanden vor allem in Bulgarien Unterstützung, und es gab mehrere Möglichkeiten, sie umzusetzen. Die Vorschläge kamen meist von Bulgaren, doch die führenden Positionen sollten die Rumänen einnehmen. Diese Vorschläge scheiterten letztendlich an kulturellen und politischen Unterschieden zwischen den beiden Völkern und dem Widerstand von Großmächten wie Österreich-Ungarn und insbesondere Russland."
 RON_Formable_Country.145.a:1 "OK"
