 RON_Formable_Country.73.t:0 "Französisches Kaiserreich"
 RON_Formable_Country.73.d:0 "Das Erste Französische Kaiserreich, offiziell das Französische Kaiserreich, war das Reich Napoleon Bonapartes und die dominierende Macht in weiten Teilen Kontinentaleuropas zu Beginn des 19. Jahrhunderts. Obwohl Frankreich bereits seit dem 17. Jahrhundert ein überseeisches Kolonialreich errichtet hatte, blieb der französische Staat unter den Bourbonen ein Königreich und nach der Französischen Revolution eine Republik. Historiker bezeichnen Napoleons Regime als Erstes Kaiserreich, um es vom restaurationistischen Zweiten Kaiserreich (1852–1870) unter seinem Neffen Napoleon III. zu unterscheiden. Am 18. Mai 1804 wurde Napoleon vom französischen Senat der Titel Kaiser der Franzosen (L&#39;Empereur des Français) verliehen und am 2. Dezember 1804 gekrönt, was das Ende des französischen Konsulats und der Ersten Französischen Republik bedeutete. Das französische Kaiserreich erlangte die militärische Vorherrschaft auf dem europäischen Festland durch bemerkenswerte Siege im Dritten Koalitionskrieg gegen Österreich, Preußen, Russland und verbündete Nationen, insbesondere in der Schlacht bei Austerlitz im Jahr 1805. Die französische Dominanz wurde im Vierten Koalitionskrieg in der Schlacht bei Jena und Auerstedt im Jahr 1806 und der Schlacht bei Friedland im Jahr 1807 bekräftigt."
 RON_Formable_Country.73.a:0 "Es lebe der Kaiser!"
