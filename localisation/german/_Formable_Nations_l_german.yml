 RON_Formable_Country.2.t:0 "Afrikanische Union"
 RON_Formable_Country.2.d:0 "Afrika, die Wiege der Menschheit, ist der zweitgrößte Kontinent der Welt und umfasste einst 54 souveräne Staaten. Diese Länder bekämpften sich gegenseitig und hielten die Entwicklung des gesamten Kontinents auf. Doch mit der Vereinigung sind diese dunklen Zeiten vorbei und eine neue, strahlende Zukunft erwartet uns."
 RON_Formable_Country.2.a:0 "Ein vereintes und starkes Afrika"
 RON_Formable_News.2.t:0 "Afrikanische Union"
