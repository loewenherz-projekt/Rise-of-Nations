 RON_Formable_Country.50.t:0 "Peru-Bolivianische Konföderation"
 RON_Formable_Country.50.d:0 "Die Peru-Bolivianische Konföderation war ein kurzlebiger Staat in Südamerika, der zwischen 1836 und 1839 existierte. Das Land war ein loser Staatenbund zwischen den Staaten Peru, aufgeteilt in die Republik Nordperu und die Republik Südperu, und Bolivien mit der Hauptstadt Tacna. Die Gründung der Peru-Bolivianischen Konföderation wurde persönlich von Marschall Andrés de Santa Cruz, dem Präsidenten Boliviens, beeinflusst, der als erstes und einziges Staatsoberhaupt den Titel „Oberster Beschützer“ trug. Die Peru-Bolivianische Konföderation wurde von Anfang an von den Nachbarländern, insbesondere Chile und Argentinien, als potenzielle militärische und wirtschaftliche Bedrohung und wegen ihrer Unterstützung für Dissidenten im Exil abgelehnt. Der Krieg der Konföderation wurde kurz nach ihrer Gründung ausgelöst, als Chile und Argentinien unabhängig voneinander in das Land einmarschierten. Argentinien wurde 1837 besiegt, doch eine vereinte Streitmacht chilenischer und nordperuanischer Dissidenten, bekannt als die Vereinigte Restaurationsarmee, siegte im Januar 1839 in der Schlacht von Yungay. Damit endete die Konföderation de facto, da Peru und Bolivien als unabhängige Staaten wiederhergestellt wurden und Santa Cruz ins Exil floh. Die Peru-Bolivianische Konföderation wurde am 25. August 1839 von General Agustín Gamarra nach seiner Ernennung zum Präsidenten Perus offiziell für aufgelöst erklärt."
 RON_Formable_Country.50.a:0 "Firme Por La Unidad"
 RON_Formable_News.50.t:0 "Peru-Bolivianische Konföderation"
 RON_Formable_News.50.d:0 "Die Peru-Bolivianische Konföderation war ein kurzlebiger Staat in Südamerika, der zwischen 1836 und 1839 existierte. Das Land war ein loser Staatenbund zwischen den Staaten Peru, aufgeteilt in die Republik Nordperu und die Republik Südperu, und Bolivien mit der Hauptstadt Tacna. Die Gründung der Peru-Bolivianischen Konföderation wurde persönlich von Marschall Andrés de Santa Cruz, dem Präsidenten Boliviens, beeinflusst, der als erstes und einziges Staatsoberhaupt den Titel „Oberster Beschützer“ trug. Die Peru-Bolivianische Konföderation wurde von Anfang an von den Nachbarländern, insbesondere Chile und Argentinien, als potenzielle militärische und wirtschaftliche Bedrohung und wegen ihrer Unterstützung für Dissidenten im Exil abgelehnt. Der Krieg der Konföderation wurde kurz nach ihrer Gründung ausgelöst, als Chile und Argentinien unabhängig voneinander in das Land einmarschierten. Argentinien wurde 1837 besiegt, doch eine vereinte Streitmacht chilenischer und nordperuanischer Dissidenten, bekannt als die Vereinigte Restaurationsarmee, siegte im Januar 1839 in der Schlacht von Yungay. Damit endete die Konföderation de facto, da Peru und Bolivien als unabhängige Staaten wiederhergestellt wurden und Santa Cruz ins Exil floh. Die Peru-Bolivianische Konföderation wurde am 25. August 1839 von General Agustín Gamarra nach seiner Ernennung zum Präsidenten Perus offiziell für aufgelöst erklärt."
 RON_Formable_News.50.a:0 "OK"
 
 RON_Formable_Country.51.t:0 "Karibische Union"
 RON_Formable_Country.51.d:0 "Die Vereinigung Karibischer Staaten (ACS) ist ein Staatenbund mit Schwerpunkt im Karibischen Becken. Sie wurde mit dem Ziel gegründet, Konsultation, Zusammenarbeit und konzertiertes Handeln aller karibischen Länder zu fördern. Hauptzweck der ACS ist die Förderung des Handels zwischen den Nationen, die Verbesserung des Transportwesens, die Entwicklung eines nachhaltigen Tourismus und die Ermöglichung umfassenderer und effektiverer Reaktionen auf lokale Naturkatastrophen. Die ACS umfasst 25 Mitgliedsstaaten und sieben assoziierte Mitglieder. Das Gründungsübereinkommen der ACS wurde am 24. Juli 1994 in Cartagena de Indias, Kolumbien, unterzeichnet. Das Sekretariat der Organisation befindet sich in Port of Spain, Trinidad und Tobago."
 RON_Formable_Country.51.a:0 "¡Patria o Muerte, Venceremos!"
