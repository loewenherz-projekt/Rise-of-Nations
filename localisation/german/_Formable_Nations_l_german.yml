 RON_Formable_Country.17.t:0 "Zentralamerikanische Union"
 RON_Formable_Country.17.d:0 "Die Föderative Republik Mittelamerika, im ersten Jahr ihrer Gründung auch Vereinigte Provinzen Mittelamerikas genannt, war ein souveräner Staat in Mittelamerika, der aus den Gebieten des ehemaligen Generalkapitäns von Guatemala in Neuspanien bestand. Sie existierte von 1823 bis 1841 und war eine republikanische Demokratie. Die Republik bestand aus den heutigen mittelamerikanischen Ländern Costa Rica, El Salvador, Guatemala, Honduras und Nicaragua. In den 1830er Jahren kam ein sechster Staat hinzu – Los Altos mit der Hauptstadt Quetzaltenango –, der Teile des heutigen westlichen Hochlands von Guatemala und des Bundesstaates Chiapas im Süden Mexikos umfasste. Kurz nachdem Mittelamerika 1821 seine Unabhängigkeit vom Spanischen Reich erklärt hatte, wurden einige seiner Länder 1822 vom Ersten Mexikanischen Kaiserreich annektiert. 1823 gründete Mittelamerika die Föderative Republik. Von 1838 bis 1840 versank die Föderation in einem Bürgerkrieg, in dem Konservative gegen Liberale kämpften und Separatisten für die Abspaltung kämpften. Diese Fraktionen konnten ihre ideologischen Differenzen nicht überwinden, und die Föderation wurde nach einer Reihe blutiger Konflikte aufgelöst."
 RON_Formable_Country.17.a:0 "Libre Crezca Fecundo"
 RON_Formable_News.17.t:0 "Zentralamerikanische Union"
 RON_Formable_News.17.d:0 "Die Föderative Republik Mittelamerika, im ersten Jahr ihrer Gründung auch Vereinigte Provinzen Mittelamerikas genannt, war ein souveräner Staat in Mittelamerika, der aus den Gebieten des ehemaligen Generalkapitäns von Guatemala in Neuspanien bestand. Sie existierte von 1823 bis 1841 und war eine republikanische Demokratie. Die Republik bestand aus den heutigen mittelamerikanischen Ländern Costa Rica, El Salvador, Guatemala, Honduras und Nicaragua. In den 1830er Jahren kam ein sechster Staat hinzu – Los Altos mit der Hauptstadt Quetzaltenango –, der Teile des heutigen westlichen Hochlands von Guatemala und des Bundesstaates Chiapas im Süden Mexikos umfasste. Kurz nachdem Mittelamerika 1821 seine Unabhängigkeit vom Spanischen Reich erklärt hatte, wurden einige seiner Länder 1822 vom Ersten Mexikanischen Kaiserreich annektiert. 1823 gründete Mittelamerika die Föderative Republik. Von 1838 bis 1840 versank die Föderation in einem Bürgerkrieg, in dem Konservative gegen Liberale kämpften und Separatisten für die Abspaltung kämpften. Diese Fraktionen konnten ihre ideologischen Differenzen nicht überwinden, und die Föderation wurde nach einer Reihe blutiger Konflikte aufgelöst."
