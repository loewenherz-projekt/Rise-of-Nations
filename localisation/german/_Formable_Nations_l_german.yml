 RON_Formable_Country.56.t:0 "Visegrad"
 RON_Formable_Country.56.d:0 "Visegrad, Visegrád oder Vyšehrad – so heißt der neu gegründete Staatenverbund im Herzen Europas: Tschechien, Ungarn, Polen und die Slowakei. Die gemeinsame Geschichte und Kultur dieser Nationen hat sie schon immer vereint. Nun beschlossen ihre Völker, eine Union zu bilden, in der sie alle unter einer Flagge durch die Geschichte gehen."
 RON_Formable_Country.56.a:0 "Společně! Együtt! Razem! Spoločne!"
