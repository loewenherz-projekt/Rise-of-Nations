 RON_Formable_Country.12.t:0 "Arabische Liga"
 RON_Formable_Country.12.d:0 "Die Arabische Liga ist eine regionale Organisation arabischer Staaten in und um Nordafrika, am Horn von Afrika und in Arabien. Sie wurde am 22. März 1945 in Kairo mit sechs Mitgliedern gegründet: Ägypten, Irak, Transjordanien (1949 in Jordanien umbenannt), Libanon, Saudi-Arabien und Syrien. Jemen trat der Liga am 5. Mai 1945 als Mitglied bei. Derzeit hat die Liga 22 Mitglieder, die Teilnahme Syriens ist jedoch seit November 2011 aufgrund staatlicher Repressionen während des syrischen Bürgerkriegs ausgesetzt."
 RON_Formable_Country.12.a:0 "Lā ʾIlāha ʾIllāl–lāh!"
