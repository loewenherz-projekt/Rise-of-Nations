 RON_Formable_Country.45.t:0 "Großjugoslawien"
 RON_Formable_Country.45.d:0 "Großjugoslawien bezeichnet einen Irredentismus, der ein Jugoslawien propagiert, das alle südslawisch besiedelten Gebiete in sich vereint. Dazu gehören die historisch vereinten Gebiete Bosnien und Herzegowina, Kroatien, Mazedonien, Montenegro, Serbien und Slowenien einschließlich des umstrittenen Kosovo. Zudem sollte es mit von Jugoslawen beanspruchten Gebieten zusammengelegt werden, die nicht in den Staat Jugoslawien eingegliedert worden waren, darunter Bulgarien, Westthrakien und Griechisch-Mazedonien sowie in einigen Vorschlägen auch andere Gebiete. Die Regierung des Königreichs Jugoslawien strebte die Vereinigung mit Bulgarien oder dessen Eingliederung in Jugoslawien an. Die Sozialistische Föderative Republik Jugoslawien unter Josip Broz Tito strebte die Schaffung eines integralen Jugoslawiens an, das innerhalb der Grenzen Jugoslawiens Griechisch-Mazedonien und Thrakien, Albanien, Bulgarien und zumindest einen Teil oder das gesamte österreichische Kärnten umfassen sollte. Ab November 1943 hatte sie zudem zeitweise die gesamte italienische Region Friaul-Julisch Venetien für sich beansprucht."
 RON_Formable_Country.45.a:0 "Ein Volk, ein König, ein Land!"
 RON_Formable_News.45.t:0 "Großjugoslawien"
 RON_Formable_News.45.d:0 "Großjugoslawien bezeichnet einen Irredentismus, der ein Jugoslawien propagiert, das alle südslawisch besiedelten Gebiete in sich vereint. Dazu gehören die historisch vereinten Gebiete Bosnien und Herzegowina, Kroatien, Mazedonien, Montenegro, Serbien und Slowenien einschließlich des umstrittenen Kosovo. Die jugoslawischen Staaten beanspruchten Gebiete sollten mit den nicht in Jugoslawien eingegliederten Gebieten zusammengelegt werden, darunter Bulgarien, Westthrakien und Griechisch-Mazedonien sowie in einigen Vorschlägen auch andere Gebiete. Die Regierung des Königreichs Jugoslawien strebte eine Vereinigung mit Bulgarien oder dessen Eingliederung in Jugoslawien an. Die Sozialistische Föderative Republik Jugoslawien unter Josip Broz Tito strebte die Schaffung eines integralen Jugoslawiens an, das innerhalb der Grenzen Jugoslawiens Griechisch-Mazedonien und Thrakien, Albanien, Bulgarien und zumindest einen Teil oder das gesamte österreichische Kärnten umfassen sollte. Ab November 1943 beanspruchte sie zeitweise die gesamte italienische Region Friaul-Julisch Venetien."
 RON_Formable_News.45.a:0 "OK"
 
 RON_Formable_Country.46.t:0 "Abessinien"
 RON_Formable_Country.46.d:0 "Das Äthiopische Reich, auch bekannt als Abessinien, war ein Königreich, das sich über ein geografisches Gebiet in den heutigen Staaten Eritrea und Äthiopien erstreckte. Es begann mit der Gründung der Salomonischen Dynastie ab etwa 1270 und dauerte bis 1974, als die herrschende Salomonische Dynastie durch einen Staatsstreich des Derg gestürzt wurde. Das Gebiet des heutigen Eritrea wurde 1890 von Italien besetzt und wurde zu Italienisch-Eritrea. Nach der britischen Besetzung Ägyptens 1882 waren Äthiopien und Liberia die einzigen beiden afrikanischen Nationen, die während des Wettlaufs um Afrika der europäischen Imperialmächte im späten 19. Jahrhundert unabhängig blieben. Äthiopien blieb unabhängig, nachdem es die Italiener im Ersten Italienisch-Äthiopischen Krieg besiegt hatte. Später, nach dem Zweiten Italienisch-Äthiopischen Krieg, besetzte das Italienische Reich Äthiopien für fünf Jahre und gründete in der Region die Kolonie Italienisch-Ostafrika. Die Italiener wurden später mit Hilfe der britischen Armee vertrieben. Das Land war 1945 eines der Gründungsmitglieder der Vereinten Nationen. 1974 war Äthiopien neben Japan und dem Iran eines von nur drei Ländern weltweit, deren Staatsoberhaupt den Titel eines Kaisers trug."
 RON_Formable_Country.46.a:0 "Dieses Mal kann uns kein Makkaroni-Typ besiegen!"
 RON_Formable_News.46.t:0 "Abessinien"
