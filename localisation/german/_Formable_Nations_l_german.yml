 RON_Formable_Country.62.t:0 "Großfürstentum Litauen"
 RON_Formable_Country.62.d:0 "Das Großfürstentum Litauen war ein europäischer Staat, der vom 13. Jahrhundert bis 1795 existierte, als das Gebiet unter dem Russischen Reich, dem Königreich Preußen und Österreich aufgeteilt wurde. Der Staat wurde von den Litauern gegründet, einem der polytheistischen baltischen Stämme aus Aukštaitija. Das Großfürstentum dehnte sich aus und umfasste weite Teile der ehemaligen Kiewer Rus und anderer slawischer Länder, darunter das heutige Weißrussland und Teile der Ukraine, Polens und Russlands. In seiner größten Ausdehnung im 15. Jahrhundert war es der größte Staat Europas. Es war ein multiethnischer und multikonfessioneller Staat mit einer großen Vielfalt an Sprachen, Religionen und kulturellem Erbe."
 RON_Formable_Country.62.a:0 "Heil dem Großherzogtum!"
