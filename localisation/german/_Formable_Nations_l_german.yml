 RON_Formable_Country.54.t:0 "Maghreb"
 RON_Formable_Country.54.d:0 "Der Maghreb, auch bekannt als Nordwestafrika oder Nordafrika, Großer Arabischer Maghreb oder in manchen Quellen als Berberwelt, Barbary und Berbery, ist eine große Region Nordafrikas, die hauptsächlich aus den Ländern Algerien, Marokko, Tunesien, Libyen und Mauretanien besteht. Er umfasst außerdem die umstrittenen Gebiete der Westsahara (größtenteils von Marokko kontrolliert) und die Städte Melilla und Ceuta (beide von Spanien kontrolliert und von Marokko beansprucht). Im Jahr 2018 hatte die Region über 100 Millionen Einwohner. In der historischen englischen und europäischen Literatur war die Region als Barbary Coast oder Barbary States bekannt, abgeleitet von den einheimischen Berbern. Manchmal wurde sie als das Land des Atlas bezeichnet, abgeleitet vom Atlasgebirge. In den heutigen berbersprachigen Medien und der Literatur ist die Region Teil dessen, was als Tamazgha bekannt ist."
 RON_Formable_Country.54.a:0 "Vom Volk und für das Volk!"
