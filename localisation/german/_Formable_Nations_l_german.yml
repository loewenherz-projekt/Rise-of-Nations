 RON_Formable_Country.68.t:0 "Vereinigtes Königreich von Großbritannien und Irland"
 RON_Formable_Country.68.d:0 "Das Vereinigte Königreich von Großbritannien und Irland wurde durch die Acts of Union 1800 gegründet, die die Königreiche Großbritannien und Irland fusionierten. Das Vereinigte Königreich finanzierte die europäische Koalition, die Frankreich während der Napoleonischen Kriege besiegte, und baute eine große Royal Navy auf, die es dem Britischen Empire ermöglichte, im folgenden Jahrhundert zur führenden Weltmacht aufzusteigen. Der Krimkrieg mit Russland und die Burenkriege waren relativ kleine Ereignisse in einem weitgehend friedlichen Jahrhundert. Die rasche Industrialisierung, die in den Jahrzehnten vor der Staatsgründung begann, hielt bis Mitte des 19. Jahrhunderts an. Die Große Hungersnot in Irland, die durch die Untätigkeit der Regierung Mitte des 19. Jahrhunderts noch verschärft wurde, führte in weiten Teilen Irlands zu einem Bevölkerungszusammenbruch und verstärkte die Forderungen nach einer irischen Landreform."
 RON_Formable_Country.68.a:0 "Gott schütze den König!"
 RON_Formable_News.68.t:0 "Vereinigtes Königreich Großbritannien und Irland"
 RON_Formable_News.68.d:0 "Das Vereinigte Königreich von Großbritannien und Irland wurde durch die Acts of Union 1800 gegründet, die die Königreiche Großbritannien und Irland fusionierten. Das Vereinigte Königreich finanzierte die europäische Koalition, die Frankreich während der Napoleonischen Kriege besiegte, und baute eine große Royal Navy auf, die es dem Britischen Empire ermöglichte, im nächsten Jahrhundert zur führenden Weltmacht aufzusteigen. Der Krimkrieg mit Russland und die Burenkriege waren relativ kleine Ereignisse in einem weitgehend friedlichen Jahrhundert. Die rasche Industrialisierung, die in den Jahrzehnten vor der Staatsgründung begann, hielt bis Mitte des 19. Jahrhunderts an. Die Große Hungersnot in Irland, die durch die Untätigkeit der Regierung Mitte des 19. Jahrhunderts noch verschärft wurde, führte in weiten Teilen Irlands zu einem Bevölkerungszusammenbruch und verstärkten die Forderungen nach einer irischen Landreform."
