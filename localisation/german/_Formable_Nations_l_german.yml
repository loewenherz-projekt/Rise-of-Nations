 RON_Formable_Country.64.t:0 "Assyrisches Reich"
 RON_Formable_Country.64.d:0 "Assyrien, auch Assyrisches Reich genannt, war ein mesopotamisches Königreich und Reich im Alten Orient und der Levante. Es existierte als Staat vielleicht schon vom 25. Jahrhundert v. Chr. (in Form des Stadtstaates Assur) bis zu seinem Zusammenbruch zwischen 612 v. Chr. und 609 v. Chr. – und erstreckte sich über die Zeiträume von der frühen bis zur mittleren Bronzezeit und bis in die späte Eisenzeit. Vom Ende des 7. Jahrhunderts v. Chr. (als der neuassyrische Staat zerfiel) bis zur Mitte des 7. Jahrhunderts n. Chr. überlebte es als geopolitische Einheit und wurde zwischen der Mitte des 2. Jahrhunderts v. Chr. und dem späten 3. Jahrhundert n. Chr. größtenteils von ausländischen Mächten wie dem Partherreich und dem frühen Sassanidenreich beherrscht. In der letzten Hälfte dieser Periode wurde Mesopotamien zu einem wichtigen Zentrum des syrischen Christentums und zum Geburtsort der Kirche des Ostens. Assyrien, ein überwiegend semitischsprachiges Reich, lag am Tigris in Obermesopotamien (dem heutigen Nordirak, Nordostsyrien, Südosttürkei und den nordwestlichen Randgebieten des Iran). Die Assyrer beherrschten in mehreren Perioden mächtige Reiche. Assyrien machte einen beträchtlichen Teil der mesopotamischen „Wiege der Zivilisation“ aus, zu der auch Sumer, das Akkadische Reich und Babylonien gehörten, und erreichte für seine Zeit den Höhepunkt der technologischen, wissenschaftlichen und kulturellen Errungenschaften. Auf seinem Höhepunkt erstreckte sich das Neuassyrische Reich von 911 bis 609 v. Chr. von Zypern und dem östlichen Mittelmeer bis nach Iran und vom heutigen Armenien und Aserbaidschan im Kaukasus bis zur Arabischen Halbinsel, Ägypten und Ostlibyen."
 RON_Formable_Country.64.a:0 "Ein Hoch auf Assyrien!"
