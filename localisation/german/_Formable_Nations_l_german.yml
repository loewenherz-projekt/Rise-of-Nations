 RON_Formable_Country.119.t:0 "Großfrankreich"
 RON_Formable_Country.119.d:0 "Die natürlichen Grenzen Frankreichs sind eine politische und geografische Theorie, die in Frankreich insbesondere während der Französischen Revolution entwickelt wurde. Sie entsprechen den Revolutionären dem Rhein, dem Atlantik und dem Mittelmeer, den Pyrenäen und den Alpen."
