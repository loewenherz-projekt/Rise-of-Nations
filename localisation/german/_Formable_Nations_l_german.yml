 RON_Formable_Country.91.t:0 "Hispanosphäre"
 RON_Formable_Country.91.d:0 "Die Zahl der Hispanophonen weltweit wird auf 480 bis 577 Millionen geschätzt (einschließlich Zweitsprachensprecher). Damit ist Spanisch gemessen an den Muttersprachlern die am zweithäufigsten gesprochene Sprache. Rund 360 Millionen leben in Hispanoamerika und 45 Millionen in Spanien (70 Millionen in Europa). In den Vereinigten Staaten gibt es mehr als 52 Millionen Spanischsprecher. Darüber hinaus gibt es kleinere hispanophone Gruppen in Kanada, Nordmarokko, Äquatorialguinea, der Westsahara, den Philippinen und Brasilien sowie an vielen anderen Orten auf der Welt, insbesondere in anderen Ländern der Europäischen Union, wo Spanisch eine der 24 Amtssprachen ist, und in Australien."
