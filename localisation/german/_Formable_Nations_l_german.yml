 RON_Formable_Country.139.t:0 "Österreichisches Kaiserreich"
 RON_Formable_Country.139.d:0 "Das Kaisertum Österreich war von 1804 bis 1867 eine multinationale Großmacht in Mittel- und Osteuropa, die durch Proklamation aus den Habsburgischen Reichen hervorging. Während seiner Existenz war es nach dem Russischen Reich und dem Vereinigten Königreich die drittbevölkerungsreichste Monarchie Europas. Neben Preußen war es eine der beiden Großmächte des Deutschen Bundes. Geographisch war es nach dem Russischen Reich und dem Ersten Französischen Kaiserreich das drittgrößte Reich Europas (621.538 Quadratkilometer bzw. 239.977 Quadratmeilen)."
 RON_Formable_Country.139.a:1 "Alles Erdreich Ist Österreich Untertan"
