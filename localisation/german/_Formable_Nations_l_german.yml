 RON_Formable_Country.72.t:0 "Französisch-Britische Union"
 RON_Formable_Country.72.d:0 "Die Französisch-Britische Union ist das Konzept einer Union zwischen den beiden unabhängigen souveränen Staaten Großbritannien und Frankreich. Eine solche Union wurde während bestimmter Krisen des 20. Jahrhunderts vorgeschlagen; es gibt einige historische Präzedenzfälle. Im Dezember 1939 wurde Jean Monnet von der französischen Wirtschaftsmission in London Leiter des englisch-französischen Koordinierungskomitees, das die gemeinsame Planung der Kriegswirtschaften beider Länder koordinierte. Der Franzose hoffte auf die Vereinigten Staaten von Europa nach dem Krieg und betrachtete eine englisch-französische politische Union als einen Schritt in Richtung seines Ziels. Er besprach die Idee mit Neville Chamberlain, Winston Churchills Assistent Desmond Morton und anderen britischen Beamten. Im Juni 1940 stand die Regierung des französischen Premierministers Paul Reynaud vor einer drohenden Niederlage in der Schlacht um Frankreich. Im März hatten sie und die Briten vereinbart, dass keines der beiden Länder einen Separatfrieden mit Nazideutschland anstreben würde. Am 15. Juni stimmte das französische Kabinett dafür, Deutschland um die Bedingungen eines Waffenstillstands zu bitten. Reynaud, der den Krieg von Nordafrika aus fortsetzen wollte, war gezwungen, den Vorschlag Churchills Kriegskabinett vorzulegen. Er behauptete, er müsse zurücktreten, wenn die Briten den Vorschlag ablehnten. Die Briten waren gegen eine französische Kapitulation und insbesondere gegen den möglichen Verlust der französischen Marine an die Deutschen und versuchten daher, Reynaud im Amt zu halten. Am 14. Juni verfassten die britischen Diplomaten Robert Vansittart und Morton zusammen mit Monnet und seinem Stellvertreter René Pleven den Entwurf einer „Französisch-Britischen Union“. Sie hofften, dass eine solche Union Reynaud helfen würde, sein Kabinett davon zu überzeugen, den Krieg von Nordafrika aus fortzusetzen. Churchill war jedoch skeptisch, als das britische Kriegskabinett am 15. Juni den Vorschlag und einen ähnlichen Vorschlag von Indienminister Leo Amery besprach. Am Morgen des 16. Juni stimmte das Kriegskabinett dem französischen Waffenstillstandsersuchen unter der Bedingung zu, dass die französische Flotte britische Häfen ansteuerte. Dies enttäuschte Reynaud, der gehofft hatte, eine britische Ablehnung nutzen zu können, um sein Kabinett zur Fortsetzung des Kampfes zu bewegen. Reynauds Unterstützer Charles de Gaulle war jedoch früher am Tag in London eingetroffen, und Monnet erzählte ihm von der geplanten Union. De Gaulle überzeugte Churchill, dass „ein dramatischer Schritt unabdingbar sei, um Reynaud die Unterstützung zu geben, die er brauchte, um seine Regierung im Krieg zu halten“. Der Franzose rief daraufhin Reynaud an und teilte ihm mit, dass der britische Premierminister eine Union ihrer Länder vorgeschlagen habe, eine Idee, die Reynaud sofort unterstützte. De Gaulle, Monnet, Vansittart und Pleven einigten sich rasch auf ein Dokument, das eine gemeinsame Staatsbürgerschaft, Außenhandel, Währung, ein gemeinsames Kriegskabinett und ein gemeinsames Militärkommando proklamierte. Churchill zog die Zustimmung zum Waffenstillstand zurück, und um 15 Uhr trat das Kriegskabinett erneut zusammen, um das Unionsdokument zu beraten. Trotz der Radikalität des Vorschlags erkannten Churchill und die Minister die Notwendigkeit eines dramatischen Schrittes, um die Franzosen zu ermutigen und Reynauds Unterstützung innerhalb seines Kabinetts zu stärken, bevor dieses um 17 Uhr erneut zusammentrat. In der endgültigen „Unionserklärung“, die vom britischen Kriegskabinett verabschiedet wurde, hieß es: „Frankreich und Großbritannien sollen nicht länger zwei Nationen sein, sondern eine französisch-britische Union. Die Verfassung der Union sieht gemeinsame Organe für Verteidigung, Außen-, Finanz- und Wirtschaftspolitik vor. Jeder französische Bürger erhält sofort die britische Staatsbürgerschaft, jeder britische Untertan wird französischer Staatsbürger.“"
 RON_Formable_Country.72.a:0 "Dieu Et Mon Droit"
