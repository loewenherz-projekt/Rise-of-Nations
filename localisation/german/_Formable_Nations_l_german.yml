 RON_Formable_Country.9.t:0 "Heiliges Römisches Reich"
 RON_Formable_Country.9.d:0 "Das Heilige Römische Reich war ein multiethnischer Komplex von Gebieten in West- und Mitteleuropa, der sich im Frühmittelalter entwickelte und bis zu seiner Auflösung im Jahr 1806 während der Napoleonischen Kriege bestand. Das größte Gebiet des Reiches war nach 962 das Königreich Deutschland, obwohl es auch das benachbarte Königreich Böhmen, das Königreich Burgund, das Königreich Italien und zahlreiche andere Gebiete umfasste. Das Reich erreichte nie das Ausmaß der politischen Einheit, das im Westen in Frankreich entstand, sondern entwickelte sich stattdessen zu einer dezentralisierten, begrenzten Wahlmonarchie, die aus Hunderten von Untereinheiten bestand: Königreichen, Fürstentümern, Herzogtümern, Grafschaften, Fürstbistümern, Freien Reichsstädten und anderen Domänen. Die Macht des Kaisers war begrenzt, und während die verschiedenen Fürsten, Herren, Bischöfe und Städte des Reiches Vasallen waren, die dem Kaiser Treue schuldeten, besaßen sie auch Privilegien, die ihnen de facto Unabhängigkeit innerhalb ihrer Gebiete verliehen. Kaiser Franz II. löste das Reich am 6. August 1806 auf, nachdem Kaiser Napoleon I. im Monat zuvor den Rheinbund gegründet hatte."
 RON_Formable_Country.9.a:0 "Heil Sacrum Imperium Romanum!"
 RON_Formable_News.9.t:0 "Heiliges Römisches Reich"
 RON_Formable_News.9.d:0 "Das Heilige Römische Reich war ein multiethnischer Komplex von Gebieten in West- und Mitteleuropa, der sich im Frühmittelalter entwickelte und bis zu seiner Auflösung im Jahr 1806 während der Napoleonischen Kriege bestand. Das größte Gebiet des Reiches war nach 962 das Königreich Deutschland, obwohl es auch das benachbarte Königreich Böhmen, das Königreich Burgund, das Königreich Italien und zahlreiche andere Gebiete umfasste. Das Reich erreichte nie das Ausmaß der politischen Einheit, das im Westen in Frankreich entstand, sondern entwickelte sich stattdessen zu einer dezentralisierten, begrenzten Wahlmonarchie, die aus Hunderten von Untereinheiten bestand: Königreichen, Fürstentümern, Herzogtümern, Grafschaften, Fürstbistümern, Freien Reichsstädten und anderen Domänen."
