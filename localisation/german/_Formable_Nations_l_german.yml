 RON_Formable_Country.96.t:0 "Amerika"
 RON_Formable_Country.96.d:0 "Amerika, auch als Amerika bezeichnet, ist eine Landmasse, die Nord- und Südamerika umfasst. Es nimmt den größten Teil der westlichen Hemisphäre der Erde ein und bildet die Neue Welt. Zusammen mit den dazugehörigen Inseln bedeckt Amerika 8 % der Erdoberfläche und 28,4 % der Landfläche. Die Topographie wird von der Amerikanischen Kordillere dominiert, einer langen Gebirgskette, die sich entlang der gesamten Westküste erstreckt. Die flachere Ostseite Amerikas wird von großen Flussbecken wie dem Amazonas, dem Sankt-Lorenz-Strom-Große-Seen-Becken, dem Mississippi und dem La Plata dominiert. Da sich Amerika von Norden nach Süden über 14.000 km (8.700 Meilen) erstreckt, variieren Klima und Ökologie stark – von der arktischen Tundra Nordkanadas, Grönlands und Alaskas bis zu den tropischen Regenwäldern Mittel- und Südamerikas."
 RON_Formable_Country.96.a:1 "Die wahren USA"
