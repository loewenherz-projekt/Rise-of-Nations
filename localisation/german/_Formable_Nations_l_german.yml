 RON_Formable_Country.33.t:0 "Mongolisches Reich"
 RON_Formable_Country.33.d:0 "Das Mongolische Reich existierte im 13. und 14. Jahrhundert und war das größte zusammenhängende Landreich der Geschichte. Ausgehend von der Mongolei erstreckte sich das Mongolische Reich schließlich von Osteuropa und Teilen Mitteleuropas bis zum Japanischen Meer, im Norden bis nach Sibirien, im Osten und Süden bis zum indischen Subkontinent, nach Indochina und zur iranischen Hochebene und im Westen bis zur Levante und den Karpaten. Das Mongolische Reich entstand aus der Vereinigung mehrerer Nomadenstämme im mongolischen Heimatland unter der Führung von Dschingis Khan, den ein Rat im Jahr 1206 zum Herrscher aller Mongolen ausrief. Unter seiner Herrschaft und der seiner Nachkommen, die Invasionen in alle Richtungen schickten, wuchs das Reich rasch. Das riesige transkontinentale Reich verband den Osten mit dem Westen durch eine erzwungene Pax Mongolica und ermöglichte die Verbreitung und den Austausch von Handel, Technologien, Waren und Ideologien in ganz Eurasien. Das Reich begann aufgrund von Erbfolgekriegen zu spalten. Die Enkel Dschingis Khans stritten darüber, ob die königliche Linie von seinem Sohn und ursprünglichen Erben Ögedei oder von einem seiner anderen Söhne wie Tolui, Tschagatai oder Dschochi abstammen sollte. Die Toluiden setzten sich nach einer blutigen Säuberung der Ögedeiden- und Tschagataiden-Fraktionen durch, doch die Streitigkeiten unter den Nachkommen Toluis hielten an. Ein Hauptgrund für die Spaltung war der Streit darüber, ob das Mongolische Reich ein sesshaftes, kosmopolitisches Reich werden oder seinem nomadischen Steppenleben treu bleiben sollte."
 RON_Formable_Country.33.a:0 "Mongolen sind zum Kämpfen geschaffen!"
 RON_Formable_News.33.t:0 "Mongolisches Reich"
