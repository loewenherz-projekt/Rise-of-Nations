 RON_Formable_Country.55.t:0 "Großraum Kanada"
 RON_Formable_Country.55.d:0 "Kanada liegt im Norden Nordamerikas. Seine zehn Provinzen und drei Territorien erstrecken sich vom Atlantik über den Pazifik bis in den Arktischen Ozean und umfassen insgesamt 9,98 Millionen Quadratkilometer. Damit ist Kanada flächenmäßig das zweitgrößte Land der Welt. Die 8.891 Kilometer lange Südgrenze Kanadas zu den USA ist die längste binationale Landgrenze der Welt. Die Hauptstadt ist Ottawa, die drei größten Metropolregionen sind Toronto, Montreal und Vancouver. Kanada ist insgesamt dünn besiedelt, der Großteil der Landesfläche ist von Wäldern und Tundra geprägt. Die Bevölkerung ist daher stark urbanisiert: Über 80 Prozent der Einwohner leben in Groß- und Mittelstädten, 70 Prozent der Bevölkerung wohnen im Umkreis von 100 Kilometern der Südgrenze. Das Klima in Kanada ist über die gesamte Fläche sehr unterschiedlich und reicht von arktischem Wetter im Norden bis zu heißen Sommern im Süden, mit vier ausgeprägten Jahreszeiten."
 RON_Formable_Country.55.a:0 "A Mari Usque Ad Mare."
