 RON_Formable_Country.43.t:0 "Schwedisches Reich"
 RON_Formable_Country.43.d:0 "Das Schwedische Reich war eine europäische Großmacht, die im 17. und frühen 18. Jahrhundert weite Teile des Baltikums kontrollierte. Als Beginn des Reiches gilt üblicherweise die Herrschaft Gustav Adolfs, der 1611 den Thron bestieg, als Ende der Verlust von Gebieten 1721 infolge des Großen Nordischen Krieges. In den während der Herrschaft des faktischen Adels erworbenen Gebieten wurde die Leibeigenschaft nicht abgeschafft, und auch in Schweden selbst gab es einen Trend zur Gründung entsprechender Güter. Die Große Reduktion von 1680 beendete diese Bemühungen des Adels und verpflichtete ihn, die einst von der Krone erworbenen Güter an den König zurückzugeben. Die Leibeigenschaft blieb jedoch in den im Heiligen Römischen Reich erworbenen Gebieten und in Schwedisch-Estland bestehen, wo die Verträge, durch die die Gebiete erworben wurden, eine konsequente Anwendung der Einheitspolitik verhinderten. Nach den Siegen im Dreißigjährigen Krieg erreichte Schweden im Zweiten Nordischen Krieg den Höhepunkt seiner Großmachtära, als sein Hauptgegner Dänemark 1658 durch den Frieden von Roskilde neutralisiert wurde. Im weiteren Verlauf dieses Krieges sowie im darauffolgenden Schonischen Krieg konnte Schweden sein Reich jedoch nur mit der Unterstützung seines engsten Verbündeten Frankreich aufrechterhalten. Nach anfänglichen schwedischen Siegen sicherten der Frieden von Travendal (1700) und der Frieden von Altranstädt (1706) Schwedens Position für einige Zeit, bevor es nach dem Krieg des Königs in Russland zu einer Katastrophe kam. Der russische Sieg in der Schlacht von Poltawa beendete Schwedens Ostexpansion, und 1718 blieb nur ein stark geschwächtes und weitaus kleineres Gebiet übrig. Die letzten Spuren besetzten Kontinentalgebiets verschwanden während der Napoleonischen Kriege, und Finnland fiel 1809 an Russland."
 RON_Formable_Country.43.a:0 "För Sverige – I Tiden."
