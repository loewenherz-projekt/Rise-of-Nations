 RON_Formable_Country.36.t:0 "Mogulreich"
 RON_Formable_Country.36.d:0 "Das Mogulreich war ein 1526 gegründetes Reich auf dem indischen Subkontinent. Es wurde von der Timuriden-Dynastie mit türkisch-mongolischen Chagatai-Wurzeln aus Zentralasien gegründet und regiert. Die Dynastie behauptete, sowohl von Dschingis Khan (über seinen Sohn Chagatai Khan) als auch von Timur direkt abzustammen und hatte durch Heiratsbündnisse bedeutende indische Rajput- und persische Vorfahren. Die Eltern der ersten beiden Mogulkaiser waren beide zentralasiatischer Abstammung, während die nachfolgenden Kaiser überwiegend persischer und rajputischer Abstammung waren. Die Dynastie war indopersisch geprägt und verband persische Kultur mit lokalen indischen kulturellen Einflüssen, die in ihrer Hofkultur und ihren Verwaltungsgepflogenheiten sichtbar wurden."
 RON_Formable_Country.36.a:0 "Glaube, Einheit, Disziplin!"
