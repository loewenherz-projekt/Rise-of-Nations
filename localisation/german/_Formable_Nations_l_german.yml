 RON_Formable_Country.109.t:0 "Germanischer Bund"
 RON_Formable_Country.109.d:0 "Im 1. Jahrhundert n. Chr. wurde der größte Teil des heutigen germanischsprachigen Europas von Völkern germanischer Sprachen beherrscht. Diese Völker wurden von den Römern Germanen genannt, und das von ihnen beherrschte Gebiet hieß Germanien. In den vorangegangenen Jahrhunderten hatte sich dieses Gebiet durch eine Reihe germanischer Expansionen stark ausgedehnt. Im 1. Jahrhundert n. Chr. erstreckte es sich von der Donau im Süden bis zur Nord- und Ostsee im Norden und vom Rhein im Westen bis über die Weichsel im Osten. Die Bevölkerung dieses Gebiets bestand jedoch nicht ausschließlich aus germanischen Völkern. Moderne Forschungen haben ergeben, dass ein Großteil des Gebiets auch von einer nicht-germanischen indigenen Bevölkerung bewohnt war, die wahrscheinlich eine nicht-germanische indoeuropäische Sprache sprach. Aus diesem Grund verwenden Wissenschaftler für die Region dieser Zeit manchmal den Begriff „germanisch dominiertes Europa“."
 RON_Formable_Country.109.a:1 "Alles für Germania"
