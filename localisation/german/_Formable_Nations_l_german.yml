 RON_Formable_Country.130.t:0 "Großungarn"
 RON_Formable_Country.130.d:0 "Ungarischer Irredentismus oder Großungarn sind irredentistische politische Ideen zur Rückgewinnung von Gebieten des historischen Königreichs Ungarn. Ziel ist es, zumindest die Kontrolle über die von Ungarn bewohnten Gebiete in den Nachbarländern Ungarns zurückzugewinnen. Ungarische Historiker verwendeten den Begriff Großungarn nicht, da „Historisches Ungarn“ die etablierte Bezeichnung für das Königreich Ungarn vor 1920 ist."
