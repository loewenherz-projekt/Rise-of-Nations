 RON_Formable_Country.134.t:0 "Französische Union"
 RON_Formable_Country.134.d:0 "Die Französische Union (1946–1958) war eine politische Einheit, die von der Vierten Französischen Republik geschaffen wurde, um das alte französische Kolonialreich zu ersetzen, umgangssprachlich bekannt als „Französisches Kaiserreich“ (Empire français). Es war das formelle Ende des „indigene“ (indigène) Status der französischen Untertanen in den Kolonialgebieten."
 RON_Formable_Country.134.a:1 "Liberté, Egalité, Fraternité"
