 RON_Formable_Country.6.t:0 "Fränkisches Reich"
 RON_Formable_Country.6.d:0 "Franken, auch Königreich der Franken (lateinisch Regnum Francorum) oder Fränkisches Reich genannt, war das größte nachrömische Barbarenreich in Westeuropa. Es wurde während der Spätantike und des Frühmittelalters von den Franken regiert. Es ist der Vorgänger der modernen Staaten Frankreich und Deutschland. Nach dem Vertrag von Verdun im Jahr 843 wurde Westfranken der Vorgänger Frankreichs und Ostfranken der Vorgänger Deutschlands. Franken war eines der letzten überlebenden germanischen Königreiche aus der Zeit der Völkerwanderung, bevor es 843 geteilt wurde. Die Kerngebiete der Franken innerhalb des ehemaligen Weströmischen Reiches lagen im Norden nahe den Flüssen Rhein und Maas. Nach einer Zeit, in der kleine Königreiche mit den verbliebenen gallo-römischen Institutionen im Süden interagierten, wurde sie zu einem einzigen Königreich vereint, das von Chlodwig I. gegründet wurde, der 496 zum König der Franken gekrönt wurde. Seine Dynastie, die Merowinger-Dynastie, wurde schließlich durch die Karolinger-Dynastie ersetzt. Unter den nahezu ununterbrochenen Feldzügen von Pippin von Herstal, Karl Martell, Pippin dem Jüngeren, Karl dem Großen und Ludwig dem Frommen – Vater, Sohn, Enkel, Urenkel und Ururenkel – wurde die größte Ausdehnung des Frankenreichs im frühen 9. Jahrhundert gesichert, das zu diesem Zeitpunkt als Karolingerreich bezeichnet wurde."
 RON_Formable_Country.6.a:0 "Vires In Unitatis!"
 RON_Formable_News.6.t:0 "Fränkisches Reich"
 RON_Formable_News.6.d:0 "Franken, auch Königreich der Franken (lateinisch Regnum Francorum) oder Fränkisches Reich genannt, war das größte nachrömische Barbarenreich in Westeuropa. Es wurde während der Spätantike und des Frühmittelalters von den Franken regiert. Es ist der Vorgänger der modernen Staaten Frankreich und Deutschland. Nach dem Vertrag von Verdun im Jahr 843 wurde Westfranken der Vorgänger Frankreichs und Ostfranken der Vorgänger Deutschlands. Franken war eines der letzten überlebenden germanischen Königreiche aus der Zeit der Völkerwanderung, bevor es 843 geteilt wurde. Die Kerngebiete der Franken innerhalb des ehemaligen Weströmischen Reiches lagen im Norden nahe den Flüssen Rhein und Maas. Nach einer Zeit, in der kleine Königreiche mit den verbliebenen gallo-römischen Institutionen im Süden interagierten, wurde ein einziges Königreich gegründet, das sie vereinigte. Chlodwig I. wurde 496 zum König der Franken gekrönt. Seine Dynastie, die Merowinger, wurde schließlich durch die Karolinger ersetzt. Unter den nahezu ununterbrochenen Feldzügen von Pippin von Herstal, Karl Martell, Pippin dem Jüngeren, Karl dem Großen und Ludwig dem Frommen – Vater, Sohn, Enkel, Urenkel und Ururenkel – wurde die größte Ausdehnung des Frankenreichs im frühen 9. Jahrhundert gesichert, das zu diesem Zeitpunkt als Karolingerreich bezeichnet wurde."
 RON_Formable_News.6.a:0 "OK"
 
 RON_Formable_Country.7.t:0 "Österreichisch-Ungarisches Reich"
 RON_Formable_Country.7.d:0 "Österreich-Ungarn, oft auch als Österreichisch-Ungarisches Reich oder Doppelmonarchie bezeichnet, war zwischen 1867 und 1918 eine konstitutionelle Monarchie in Mittel- und Osteuropa. Es entstand, als das Kaisertum Österreich eine neue Verfassung annahm, in deren Folge Österreich (Cisleithanien) und Ungarn (Transleithanien) gleichgestellt wurden. Nach dem Ersten Weltkrieg zerfiel es in mehrere neue Staaten. Die Union wurde am 30. März 1867 im Gefolge des Preußisch-Österreichischen Krieges durch den Österreichisch-Ungarischen Ausgleich gegründet. Es bestand aus zwei Monarchien (Österreich und Ungarn) und einer autonomen Region, dem Königreich Kroatien-Slawonien unter der ungarischen Krone, die 1868 den Kroatisch-Ungarischen Ausgleich aushandelte. Es wurde vom Haus Habsburg regiert und stellte die letzte Phase in der verfassungsmäßigen Entwicklung der Habsburgermonarchie dar. Nach den Reformen von 1867 waren Österreich und Ungarn gleichberechtigt. Außen- und Militärangelegenheiten wurden gemeinsam wahrgenommen, alle anderen Regierungsbefugnisse waren jedoch zwischen den jeweiligen Staaten aufgeteilt. Österreich-Ungarn war ein Vielvölkerstaat und damals eine der größten Mächte Europas. Nach dem Russischen Reich war Österreich-Ungarn flächenmäßig das zweitgrößte Land Europas und nach Russland und dem Deutschen Reich das drittgrößte. Das Reich baute nach den USA, Deutschland und Großbritannien die viertgrößte Maschinenbauindustrie der Welt auf. Österreich-Ungarn wurde zudem nach den USA und dem Deutschen Reich zum drittgrößten Hersteller und Exporteur von elektrischen Haushaltsgeräten, elektrischen Industriegeräten und Stromerzeugungsanlagen für Kraftwerke."
 RON_Formable_Country.7.a:0 "Indivisibiliter Ac Inseparabiliter!"
 RON_Formable_News.7.t:0 "Österreichisch-Ungarisches Reich"
 RON_Formable_News.7.d:0 "Österreich-Ungarn, oft auch als Österreichisch-Ungarisches Reich oder Doppelmonarchie bezeichnet, war zwischen 1867 und 1918 eine konstitutionelle Monarchie in Mittel- und Osteuropa. Es entstand, als das Kaisertum Österreich eine neue Verfassung annahm, in deren Folge Österreich (Cisleithanien) und Ungarn (Transleithanien) gleichgestellt wurden. Nach dem Ersten Weltkrieg zerfiel es in mehrere neue Staaten. Die Union wurde am 30. März 1867 im Gefolge des Preußisch-Österreichischen Krieges durch den Österreichisch-Ungarischen Ausgleich gegründet. Es bestand aus zwei Monarchien (Österreich und Ungarn) und einer autonomen Region, dem Königreich Kroatien-Slawonien unter der ungarischen Krone, die 1868 den Kroatisch-Ungarischen Ausgleich aushandelte. Es wurde vom Haus Habsburg regiert und stellte die letzte Phase in der verfassungsmäßigen Entwicklung der Habsburgermonarchie dar."
 RON_Formable_News.7.a:0 "OK"
 
 RON_Formable_Country.8.t:0 "Polnisch-Litauisches Commonwealth"
 RON_Formable_Country.8.d:0 "Die Polnisch-Litauische Union – formal die Krone des Königreichs Polen und des Großfürstentums Litauen und ab 1791 die Polnische Republik – war ein Doppelstaat, eine Konföderation Polens und Litauens, regiert von einem gemeinsamen Monarchen, der sowohl König von Polen als auch Großfürst von Litauen war. Sie war eines der größten und bevölkerungsreichsten Länder Europas des 16. und 17. Jahrhunderts. Die Union wurde im Juli 1569 durch die Lubliner Union gegründet, doch die Krone des Königreichs Polen und das Großfürstentum Litauen bildeten bereits seit 1386 durch die Heirat der polnischen Königin mit dem litauischen Großfürsten eine De-facto-Personalunion. Die Erste und Zweite Teilung Polens 1772 und 1793 verringerten die Größe des Staates erheblich, und die Polnisch-Litauische Union zerfiel nach der Dritten Teilung Polens 1795 als unabhängiger Staat. Die Union wies viele Besonderheiten unter den damaligen Staaten auf. Ihr politisches System war durch eine strikte Kontrolle der monarchischen Macht gekennzeichnet. Diese Kontrollen wurden von einer gesetzgebenden Körperschaft (Sejm) durchgeführt, die vom Adel (Szlachta) kontrolliert wurde. Dieses eigentümliche System war ein Vorläufer moderner Konzepte von Demokratie, konstitutioneller Monarchie und Föderation. Obwohl die beiden Staaten des Commonwealth formal gleichberechtigt waren, war Polen der dominierende Partner in der Union."
 RON_Formable_Country.8.a:0 "Si Deus Nobiscum Quis Contra Nos!"
 RON_Formable_News.8.t:0 "Polnisch-Litauisches Commonwealth"
 RON_Formable_News.8.d:0 "Die Polnisch-Litauische Union – formal die Krone des Königreichs Polen und des Großfürstentums Litauen sowie ab 1791 die Polnische Republik – war ein Doppelstaat, eine Konföderation Polens und Litauens, regiert von einem gemeinsamen Monarchen, der sowohl König von Polen als auch Großfürst von Litauen war. Im 16. und 17. Jahrhundert war sie eines der größten und bevölkerungsreichsten Länder Europas. Die Union wurde im Juli 1569 durch die Lubliner Union gegründet, doch die Krone des Königreichs Polen und das Großfürstentum Litauen bildeten bereits seit 1386 durch die Heirat der polnischen Königin mit dem litauischen Großfürsten eine De-facto-Personalunion. Die Erste und die Zweite Teilung Polens 1772 und 1793 verringerten die Größe des Staates erheblich, und die Polnisch-Litauische Union zerfiel nach der Dritten Teilung Polens 1795 als unabhängiger Staat. Die Union wies viele Besonderheiten unter den damaligen Staaten auf. Ihr politisches System war durch eine strikte Kontrolle der monarchischen Macht gekennzeichnet. Diese Kontrollen wurden von einer gesetzgebenden Körperschaft (Sejm) durchgeführt, die vom Adel (Szlachta) kontrolliert wurde. Dieses eigentümliche System war ein Vorläufer moderner Konzepte von Demokratie, konstitutioneller Monarchie und Föderation. Obwohl die beiden Staaten des Commonwealth formal gleichberechtigt waren, war Polen der dominierende Partner in der Union."
