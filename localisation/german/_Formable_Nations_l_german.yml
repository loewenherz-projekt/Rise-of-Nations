 RON_Formable_Country.31.t:0 "Die Vereinten Nationen"
 RON_Formable_Country.31.d:0 "Die Vereinten Nationen (UN) sind eine zwischenstaatliche Organisation mit der Aufgabe, den Weltfrieden und die internationale Sicherheit zu wahren, freundschaftliche Beziehungen zwischen den Nationen zu pflegen, internationale Zusammenarbeit zu fördern und als Zentrum für die Harmonisierung der Handlungen der Nationen zu fungieren. Der Hauptsitz der UN befindet sich in Manhattan, New York City, und unterliegt der Exterritorialität. Weitere Hauptbüros befinden sich in Genf, Nairobi, Wien und Den Haag. Die Organisation finanziert sich durch vorgeschriebene und freiwillige Beiträge ihrer Mitgliedsstaaten. Zu ihren Zielen gehören die Wahrung des Weltfriedens und der internationalen Sicherheit, der Schutz der Menschenrechte, die Bereitstellung humanitärer Hilfe, die Förderung nachhaltiger Entwicklung und die Wahrung des Völkerrechts. Die UN ist die größte, bekannteste, international am stärksten vertretene und mächtigste zwischenstaatliche Organisation der Welt. Am 24. Oktober 1945, am Ende des Zweiten Weltkriegs, wurde die Organisation mit dem Ziel gegründet, zukünftige Kriege zu verhindern. Bei ihrer Gründung hatte die UN 51 Mitgliedsstaaten; heute sind es 193. Die UN ist die Nachfolgerin des ineffektiven Völkerbundes."
 RON_Formable_Country.31.a:0 "Es ist deine Welt!"
