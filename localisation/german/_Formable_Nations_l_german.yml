 RON_Formable_Country.24.t:0 "Großalbanien"
 RON_Formable_Country.24.d:0 "Großalbanien ist ein irredentistisches Konzept von Gebieten, die von vielen Albanern als nationale Heimat betrachtet werden, basierend auf Behauptungen über die gegenwärtige oder historische Präsenz albanischer Bevölkerung in diesen Gebieten. Neben der bestehenden Republik Albanien umfasst der Begriff Ansprüche auf Regionen in den Nachbarstaaten, darunter Kosovo und das Preševo-Tal in Serbien, Gebiete im Süden Montenegros, Nordwestgriechenlands (die griechischen Regionaleinheiten Thesprotia und Preveza, von Albanern als Chameria bezeichnet, und andere Gebiete, die während des Osmanischen Reiches Teil des Vilâyet Janina waren) und einen Teil West-Nordmazedoniens. Die Vereinigung eines noch größeren Gebiets zu einem einzigen Territorium unter albanischer Autorität war theoretisch von der Liga von Prizren konzipiert worden, einer Organisation des 19. Jahrhunderts, deren Ziel es war, die von Albanern bewohnten Gebiete (und andere Regionen, hauptsächlich aus der Region Mazedonien, Epirus und Montenegro) zu einem einzigen autonomen albanischen Vilâyet innerhalb des Osmanischen Reiches zu vereinen. Das Konzept eines Großalbaniens, also größer als Albanien innerhalb seiner Grenzen von 1913, wurde jedoch erst unter der italienischen und nationalsozialistischen deutschen Besatzung des Balkans während des Zweiten Weltkriegs umgesetzt. Die Idee einer Vereinigung hat ihre Wurzeln im Londoner Vertrag von 1913, als etwa die Hälfte der überwiegend albanischen Gebiete und 40 % der Bevölkerung außerhalb der Grenzen des neuen Landes zurückgelassen wurden, was die Albaner tendenziell als von den Großmächten auferlegte Ungerechtigkeit betrachten."
 RON_Formable_Country.24.a:0 "Ti Shqipëri, Më Jep Nder, Më Jep Emrin Shqipëtar!"
