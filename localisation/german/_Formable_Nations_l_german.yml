 RON_Formable_Country.105.t:0 "Großraum Amerika"
 RON_Formable_Country.105.d:0 "Die „Großen Vereinigten Staaten“ ist nicht mein Begriff. Er stammt aus den Jahren 1898–1899, als die Vereinigten Staaten das spanische Imperium zerschlugen, die Philippinen, Puerto Rico und Guam für sich beanspruchten, Kuba besetzten und die Gelegenheit nutzten, die nichtspanischen Gebiete Hawaii und Amerikanisch-Samoa zu annektieren. Dies war ein intellektuell umwälzendes Ereignis. „Wir haben uns so lange daran gewöhnt, die Vereinigten Staaten als ein ausgedehntes Land zu betrachten, das sich vom Atlantik bis zum Pazifik erstreckt und im Norden von den britischen Besitzungen und im Süden von der Mexikanischen Republik begrenzt wird“, bemerkte der Generalstaatsanwalt, „dass es fast einen Ruck braucht, um uns aus unseren alten Denkgewohnheiten herauszureißen und uns an die Tatsache zu gewöhnen, dass unser Herrschaftsgebiet im Norden bis zum Polarkreis reicht; dass wir die Sandwichinseln besitzen; dass wir den riesigen Philippinen-Archipel besitzen.“"
 RON_Formable_Country.105.a:1 "Auf Gott vertrauen wir"
