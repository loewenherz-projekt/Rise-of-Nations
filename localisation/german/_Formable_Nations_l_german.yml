 RON_Formable_Country.80.t:0 "Wiedervereinigung Deutschlands"
 RON_Formable_Country.80.d:0 "Die deutsche Wiedervereinigung war der Prozess im Jahr 1990, bei dem die Deutsche Demokratische Republik (DDR) Teil der Bundesrepublik Deutschland (BRD) wurde und das wiedervereinigte Deutschland bildete. Gleichzeitig wurde Berlin gemäß Artikel 23 des damaligen Grundgesetzes zu einer Stadt wiedervereinigt. Das Ende des Einigungsprozesses wird offiziell als Deutsche Einheit bezeichnet und am 3. Oktober (Tag der deutschen Einheit) gefeiert. Nach der deutschen Wiedervereinigung wurde Berlin erneut zur Hauptstadt des vereinten Deutschlands ernannt."
 RON_Formable_Country.80.a:0 "Einigkeit und Recht und Freiheit"
