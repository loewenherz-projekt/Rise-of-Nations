 RON_Formable_Country.58.t:0 "Keltische Union"
 RON_Formable_Country.58.d:0 "Der Pankeltizismus, auch Keltizismus oder keltischer Nationalismus genannt, ist eine politische, soziale und kulturelle Bewegung, die sich für Solidarität und Zusammenarbeit zwischen den keltischen Nationen (sowohl den gälischen als auch den brythonischen Zweigen) und den modernen Kelten in Nordwesteuropa einsetzt. Einige pankeltische Organisationen befürworten die Abspaltung der keltischen Nationen vom Vereinigten Königreich und Frankreich und die gemeinsame Gründung eines eigenen Bundesstaates, während andere lediglich eine sehr enge Zusammenarbeit zwischen unabhängigen, souveränen keltischen Nationen in Form des irischen, schottischen, walisischen, bretonischen, kornischen und manxischen Nationalismus befürworten. Wie andere pannationalistische Bewegungen wie der Panslawismus, der Pangermanismus, der Panturanismus, der Panlatinismus und andere entwickelte sich die pankeltische Bewegung aus dem romantischen Nationalismus und ihrer spezifischen Form, der keltischen Renaissance. Die pankeltische Bewegung war im 19. und 20. Jahrhundert (etwa 1838 bis 1939) am stärksten ausgeprägt. Einige frühe pankeltische Kontakte fanden im Rahmen des Gorsedd und des Eisteddfod statt, während der jährliche Keltenkongress 1900 ins Leben gerufen wurde. Seitdem ist die Keltische Liga zum prominenten Aushängeschild des politischen Pankeltismus geworden. Initiativen, die sich eher auf kulturelle keltische Zusammenarbeit als explizit politische konzentrieren, wie etwa Musik-, Kunst- und Literaturfestivals, werden üblicherweise als interkeltisch bezeichnet."
 RON_Formable_Country.58.a:0 "Sechs Nationen, sind wir alle keltisch und frei!"
 RON_Formable_News.58.t:0 "Keltische Union"
 RON_Formable_News.58.d:0 "Der Pankeltizismus, auch Keltizismus oder keltischer Nationalismus genannt, ist eine politische, soziale und kulturelle Bewegung, die sich für Solidarität und Zusammenarbeit zwischen den keltischen Nationen (sowohl den gälischen als auch den brythonischen Zweigen) und den modernen Kelten in Nordwesteuropa einsetzt. Einige pankeltische Organisationen befürworten die Abspaltung der keltischen Nationen vom Vereinigten Königreich und Frankreich und die gemeinsame Gründung eines eigenen Bundesstaates, während andere lediglich eine sehr enge Zusammenarbeit zwischen unabhängigen, souveränen keltischen Nationen in Form des irischen, schottischen, walisischen, bretonischen, kornischen und manxischen Nationalismus befürworten. Wie andere pannationalistische Bewegungen wie der Panslawismus, der Pangermanismus, der Panturanismus, der Panlatinismus und andere entwickelte sich die pankeltische Bewegung aus dem romantischen Nationalismus und ihrer spezifischen Form, der keltischen Renaissance. Die pankeltische Bewegung war im 19. und 20. Jahrhundert (etwa 1838 bis 1939) am stärksten ausgeprägt. Einige frühe pankeltische Kontakte fanden im Rahmen des Gorsedd und des Eisteddfod statt, während der jährliche Keltenkongress 1900 ins Leben gerufen wurde. Seitdem ist die Keltische Liga zum prominenten Aushängeschild des politischen Pankeltismus geworden. Initiativen, die sich eher auf kulturelle keltische Zusammenarbeit als explizit politische konzentrieren, wie etwa Musik-, Kunst- und Literaturfestivals, werden üblicherweise als interkeltisch bezeichnet."
