 RON_Formable_Country.60.t:0 "Großkroatien"
 RON_Formable_Country.60.d:0 "Großkroatien ist ein Begriff, der bestimmte Strömungen des kroatischen Nationalismus beschreibt. Er bezieht sich einerseits auf den territorialen Umfang des kroatischen Volkes und betont die ethnische Zugehörigkeit der außerhalb Kroatiens lebenden Kroaten. Politisch hingegen bezeichnet der Begriff den irredentistischen Glauben an die Gleichwertigkeit des territorialen Umfangs des kroatischen Volkes und des kroatischen Staates."
 RON_Formable_Country.60.a:0 "Lijepa Naša Domovino!"
