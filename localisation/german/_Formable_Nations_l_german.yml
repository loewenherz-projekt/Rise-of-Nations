 RON_Formable_Country.20.t:0 "Byzantinisches Reich"
 RON_Formable_Country.20.d:0 "Das Byzantinische Reich, auch Oströmisches Reich oder Byzanz genannt, war die Fortsetzung des Römischen Reiches in seinen östlichen Provinzen während der Spätantike und des Mittelalters, als seine Hauptstadt Konstantinopel (das heutige Istanbul und ehemals Byzanz) war. Es überlebte die Zersplitterung und den Untergang des Weströmischen Reiches im 5. Jahrhundert n. Chr. und existierte weitere tausend Jahre, bis es 1453 an die Osmanen fiel. Während des größten Teils seiner Existenz war das Reich die mächtigste wirtschaftliche, kulturelle und militärische Macht Europas. Sowohl die Begriffe „Byzantinisches Reich“ als auch „Oströmisches Reich“ sind historiografische Begriffe, die nach dem Ende des Reiches geschaffen wurden. Seine Bürger bezeichneten ihr Reich weiterhin einfach als Römisches Reich (griechisch: Basileia Rhōmaiōn, lateinisch: Imperium Romanum) oder Rumänien (Ῥωμανία) und sich selbst als „Römer“."
 RON_Formable_Country.20.a:0 "Vielen Dank!"
 RON_Formable_News.20.t:0 "Byzantinisches Reich"
 RON_Formable_News.20.d:0 "Das Byzantinische Reich, auch Oströmisches Reich oder Byzanz genannt, war die Fortsetzung des Römischen Reiches in seinen östlichen Provinzen während der Spätantike und des Mittelalters, als seine Hauptstadt Konstantinopel (das heutige Istanbul und ehemals Byzanz) war. Es überlebte die Zersplitterung und den Untergang des Weströmischen Reiches im 5. Jahrhundert n. Chr. und existierte weitere tausend Jahre, bis es 1453 an die Osmanen fiel. Während des größten Teils seiner Existenz war das Reich die mächtigste wirtschaftliche, kulturelle und militärische Macht Europas. Sowohl die Begriffe „Byzantinisches Reich“ als auch „Oströmisches Reich“ sind historiografische Begriffe, die nach dem Ende des Reiches geschaffen wurden. Seine Bürger bezeichneten ihr Reich weiterhin einfach als Römisches Reich (griechisch: Basileia Rhōmaiōn, lateinisch: Imperium Romanum) oder Rumänien (Ῥωμανία) und sich selbst als „Römer“."
 RON_Formable_News.20.a:0 "OK"
 
 RON_Formable_Country.21.t:0 "Bulgarisches Reich"
 RON_Formable_Country.21.d:0 "In der mittelalterlichen Geschichte Europas war Bulgarien als Bulgarisches Reich (bulgarisch Българско царство, Balgarsko tsarstvo) eine wichtige regionale Macht (insbesondere ein Rivale von Byzanz in Südosteuropa). Die beiden bulgarischen Reiche wurden nicht als getrennte Einheiten betrachtet, sondern als ein Staat, der nach einer Zeit byzantinischer Herrschaft wiederhergestellt wurde. Bulgarien ist einer der wenigen historischen Staaten und Nationen, deren Wirtschaft und Gesellschaft nie auf Sklaverei basierten, und Sklaverei spielte nie eine wichtige Rolle in der Entwicklung und dem Wohlstand Bulgariens."
 RON_Formable_Country.21.a:0 "Gott wird siegen!"
 RON_Formable_News.21.t:0 "Bulgarisches Reich"
