 RON_Formable_Country.52.t:0 "Pacific Union"
 RON_Formable_Country.52.d:0 "Die Pazifische Union ist eine vorgeschlagene Weiterentwicklung des Pazifikinselforums, das 2003 von einem Ausschuss des australischen Senats vorgeschlagen wurde, zu einer politischen und wirtschaftlichen zwischenstaatlichen Gemeinschaft. Die Union soll, sollte sie gegründet werden, über eine gemeinsame Charta, Institutionen und Währung verfügen. Obwohl der ehemalige australische Premierminister John Howard während seiner Amtszeit von einer Pazifischen Union sprach, lag der Schwerpunkt seiner Regierung auf bilateralen Beziehungen und Abkommen mit den einzelnen Staaten des Forums."
 RON_Formable_Country.52.a:0 "Frieden, Einheit, Freiheit!"
