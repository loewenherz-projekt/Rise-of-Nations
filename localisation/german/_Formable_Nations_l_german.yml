 RON_Formable_Country.1.t:0 "Großgermanisches Reich"
 RON_Formable_Country.1.d:0 "Das Großgermanische Reich Deutscher Nation ist der offizielle Staatsname des politischen Gebildes, das Nazi-Deutschland während des Zweiten Weltkriegs in Europa zu errichten versuchte. Dieses pangermanische Reich sollte praktisch ganz Germanien in ein enorm erweitertes Reich integrieren. Territorial gesehen umfasste dies das bereits vergrößerte Deutsche Reich selbst (bestehend aus dem eigentlichen Deutschland vor 1938, Österreich, Böhmen, Mähren, Elsass-Lothringen, Eupen-Malmedy, Memel, der Untersteiermark, Oberkrain, Südkärnten und dem deutsch besetzten Polen), die Niederlande, den flämischen Teil Belgiens, Luxemburg, Dänemark, Norwegen, Schweden, Island sowie zumindest die deutschsprachigen Teile der Schweiz und Liechtenstein."
 RON_Formable_Country.1.a:0 "Ein Tausendjähriges Reich!"
