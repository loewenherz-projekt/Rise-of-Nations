 RON_Formable_Country.27.t:0 "Römisches Reich"
 RON_Formable_Country.27.d:0 "Das Römische Reich war die Zeit nach der Römischen Republik in der antiken römischen Zivilisation. Es wurde von Kaisern regiert und verfügte über ausgedehnte Gebiete rund um das Mittelmeer in Europa, Nordafrika, dem Nahen Osten und dem Kaukasus. Von den Verfassungsreformen des Augustus bis zur militärischen Anarchie des 3. Jahrhunderts war das Reich ein von der Stadt Rom aus regiertes Prinzipat (27 v. Chr. – 285 n. Chr.). Das Römische Reich wurde danach von mehreren Kaisern regiert und war in ein Weströmisches Reich mit Sitz in Mailand und später Ravenna und ein Oströmisches Reich mit Sitz in Nikomedia und später Konstantinopel geteilt. Rom blieb die nominelle Hauptstadt beider Teile bis 476 n. Chr., als Odoaker Romulus Augustus nach der Einnahme Ravennas absetzte und der Senat von Rom die Reichsinsignien nach Konstantinopel (altgriechisch Byzanz) schickte. Der Fall des Weströmischen Reiches an die Barbarenkönige und die Hellenisierung des Oströmischen Reiches zum Byzantinischen Reich werden üblicherweise als Zeichen für das Ende des antiken Roms und den Beginn des Mittelalters verwendet."
 RON_Formable_Country.27.a:0 "Senatus Populusque Romanus!"
 RON_Formable_News.27.t:0 "Römisches Reich"
 RON_Formable_News.27.d:0 "Das Römische Reich war die Zeit nach der Römischen Republik in der antiken römischen Zivilisation. Es wurde von Kaisern regiert und verfügte über ausgedehnte Gebiete rund um das Mittelmeer in Europa, Nordafrika, dem Nahen Osten und dem Kaukasus. Von den Verfassungsreformen des Augustus bis zur militärischen Anarchie des 3. Jahrhunderts war das Reich ein von der Stadt Rom aus regiertes Prinzipat (27 v. Chr. – 285 n. Chr.). Das Römische Reich wurde danach von mehreren Kaisern regiert und war in ein Weströmisches Reich mit Sitz in Mailand und später Ravenna und ein Oströmisches Reich mit Sitz in Nikomedia und später Konstantinopel geteilt. Rom blieb die nominelle Hauptstadt beider Teile bis 476 n. Chr., als Odoaker Romulus Augustus nach der Einnahme Ravennas absetzte und der Senat von Rom die Reichsinsignien nach Konstantinopel (altgriechisch Byzanz) schickte. Der Fall des Weströmischen Reiches an die Barbarenkönige und die Hellenisierung des Oströmischen Reiches zum Byzantinischen Reich werden üblicherweise als Zeichen für das Ende des antiken Roms und den Beginn des Mittelalters verwendet."
