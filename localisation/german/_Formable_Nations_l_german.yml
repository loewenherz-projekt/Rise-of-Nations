 RON_Formable_Country.83.t:0 "Wiedervereinigung Großbritanniens"
 RON_Formable_Country.83.d:0 "Im 2. Jahrhundert wurde die römische Britannia als Göttin personifiziert, bewaffnet mit Dreizack und Schild und einem korinthischen Helm. Der Name Britannia überdauerte das Ende der römischen Herrschaft in Britannien im 5. Jahrhundert lange und prägte den Namen der Insel in den meisten europäischen und verschiedenen anderen Sprachen, darunter im englischen „Britannia“ und dem modernen walisischen „Prydain“. Im 9. Jahrhundert wurden die damit verbundenen Begriffe „Bretwalda“ und „brytenwealda ealles ðyses ealonde“ auf einige angelsächsische Könige angewandt, um eine umfassendere Hegemonie in Britannien zu behaupten, und übertriebene Inschriften auf Münzen und Titel in Urkunden enthielten oft den entsprechenden Titel „rex Britanniae“. Nach der Vereinigung Englands wurde jedoch der Titel „rex Angulsaxonum“ („König der Angelsachsen“) verwendet. Nach Jahrhunderten des Rückgangs der Verwendung wurde die lateinische Form während der englischen Renaissance als rhetorische Beschwörung einer britischen Nationalidentität wiederbelebt. Besonders nach den Acts of Union von 1707, die die Königreiche England und Schottland verbanden, wurde die Personifizierung der kriegerischen Britannia als Symbol der britischen Seemacht und Einheit verwendet. Jetzt, nach Jahren der Verzweiflung, ist Britannia wieder vereint!"
 RON_Formable_Country.83.a:0 "Beherrsche Britannia!"
