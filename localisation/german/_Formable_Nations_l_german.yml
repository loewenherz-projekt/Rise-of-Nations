 RON_Formable_Country.86.t:0 "Wiedervereinigung Chinas"
 RON_Formable_Country.86.d:0 "„Großchina“ ist ein umgangssprachlicher Begriff für ein geografisches Gebiet mit wirtschaftlichen und kulturellen Verbindungen, das von ethnischen Han-Chinesen dominiert wird – beispielsweise chinesischsprachiges Fernsehen, Film und Musikunterhaltung. Das genaue Gebiet ist nicht immer eindeutig, umfasst aber in der Regel Festlandchina, Hongkong, Macau und Taiwan. Auch Singapur wird von manchen als Teil der Definition angesehen, obwohl es geografisch nicht so nah an Festlandchina liegt wie die übrigen einbezogenen Länder und auch politisch nie dazugehörte."
