 RON_Formable_Country.28.t:0 "Angevinisches Reich"
 RON_Formable_Country.28.d:0 "Das Anjou-Reich beschreibt die Besitztümer der angevinischen Könige von England, die im 12. und 13. Jahrhundert Ländereien in England und Frankreich besaßen. Die Anjou aus dem Haus Plantagenet herrschten über ein Gebiet, das etwa die Hälfte Frankreichs, ganz England sowie Teile Irlands und Wales umfasste, und übten darüber hinaus Einfluss auf weite Teile der übrigen Britischen Inseln aus. Das Reich wurde von Heinrich II. als König von England, Herzog der Normandie und Graf von Anjou (wovon die Anjou ihren Namen ableiten) sowie als Herzog von Aquitanien durch seine Frau gegründet. Obwohl ihr höchster Titel aus dem Königreich England stammte, hielten die Anjou ihren Hof hauptsächlich in Angers und Chinon in Anjou. Einfluss und Macht des Hauses Anjou brachten es in Konflikt mit den Königen von Frankreich aus dem Haus Capet, denen sie auch ihre französischen Besitztümer schuldeten, was eine Zeit der Rivalität zwischen beiden Dynastien einleitete. Trotz der langen Herrschaft der Anjou wurde Heinrichs Sohn Johann im Englisch-Französischen Krieg (1213–1214) nach der Schlacht von Bouvines von Philipp II. von Frankreich besiegt. Johann verlor die Kontrolle über die meisten seiner kontinentalen Besitzungen, mit Ausnahme der Gascogne im südlichen Aquitanien. Diese Niederlage bereitete den Boden für weitere Konflikte zwischen England und Frankreich, die zum Hundertjährigen Krieg führten."
 RON_Formable_Country.28.a:0 "Wir werden uns rächen!"
 RON_Formable_News.28.t:0 "Angevinisches Reich"
 RON_Formable_News.28.d:0 "Das Anjou-Reich beschreibt die Besitztümer der angevinischen Könige von England, die im 12. und 13. Jahrhundert Ländereien in England und Frankreich besaßen. Die Anjou aus dem Haus Plantagenet herrschten über ein Gebiet, das etwa die Hälfte Frankreichs, ganz England sowie Teile Irlands und Wales umfasste, und übten darüber hinaus Einfluss auf weite Teile der übrigen Britischen Inseln aus. Das Reich wurde von Heinrich II. als König von England, Herzog der Normandie und Graf von Anjou (wovon die Anjou ihren Namen ableiten) sowie als Herzog von Aquitanien durch seine Frau gegründet. Obwohl ihr höchster Titel aus dem Königreich England stammte, hielten die Anjou ihren Hof hauptsächlich in Angers und Chinon in Anjou. Einfluss und Macht des Hauses Anjou brachten es in Konflikt mit den Königen von Frankreich aus dem Haus Capet, denen sie auch ihre französischen Besitztümer schuldeten, was eine Zeit der Rivalität zwischen beiden Dynastien einleitete. Trotz der langen Herrschaft der Anjou wurde Heinrichs Sohn Johann im Englisch-Französischen Krieg (1213–1214) nach der Schlacht von Bouvines von Philipp II. von Frankreich besiegt. Johann verlor die Kontrolle über die meisten seiner kontinentalen Besitzungen, mit Ausnahme der Gascogne im südlichen Aquitanien. Diese Niederlage bereitete den Boden für weitere Konflikte zwischen England und Frankreich, die zum Hundertjährigen Krieg führten."
