 RON_Formable_Country.49.t:0 "Hispaniola"
 RON_Formable_Country.49.d:0 "Die Vereinigung Hispaniolas war die Annexion und Fusion der damals unabhängigen Republik Spanisch-Haiti (ehemals Santo Domingo) mit der Republik Haiti. Sie dauerte 22 Jahre, vom 9. Februar 1822 bis zum 27. Februar 1844. Das Gebiet fungierte als selbstverwaltete Einheit mit dominikanischen Soldaten als Aufseher. Dominikanische Bürger hatten zudem mehr Rechte als die Haitianer, die unter Jean-Pierre Boyers Code Rural standen."
 RON_Formable_Country.49.a:0 "Liberté, Egalité, Fraternité!"
 RON_Formable_News.49.t:0 "Hispaniola"
 RON_Formable_News.49.d:0 "Die Vereinigung Hispaniolas war die Annexion und Fusion der damals unabhängigen Republik Spanisch-Haiti (ehemals Santo Domingo) mit der Republik Haiti. Sie dauerte 22 Jahre, vom 9. Februar 1822 bis zum 27. Februar 1844. Das Gebiet fungierte als selbstverwaltete Einheit mit dominikanischen Soldaten als Aufseher. Dominikanische Bürger hatten zudem mehr Rechte als die Haitianer, die unter Jean-Pierre Boyers Code Rural standen."
