 RON_Formable_Country.75.t:0 "Islamisches Kalifat"
 RON_Formable_Country.75.d:0 "Das Umayyaden-Kalifat war das zweite der vier großen Kalifate, die nach dem Tod Mohammeds errichtet wurden. Das Kalifat wurde von der Umayyaden-Dynastie regiert, die aus Mekka stammte. Der dritte Kalif, Uthman ibn Affan (reg. 644–656), war ein Mitglied des Umayyaden-Clans. Die Familie etablierte eine dynastische, erbliche Herrschaft mit Muawiya ibn Abi Sufyan, dem langjährigen Gouverneur Syriens, der nach dem Ende des Ersten Muslimischen Bürgerkriegs 661 der sechste Kalif wurde. Nach Muawiyas Tod 680 führten Konflikte um die Nachfolge zu einem Zweiten Bürgerkrieg, und die Macht fiel schließlich in die Hände von Marwan I. aus einem anderen Zweig des Clans. Syrien blieb danach die wichtigste Machtbasis der Umayyaden, und Damaskus war ihre Hauptstadt. Die Umayyaden setzten die muslimischen Eroberungen fort und gliederten Transoxanien, Sindh, den Maghreb und die Iberische Halbinsel (Al-Andalus) in die muslimische Welt ein. Zu seinen besten Zeiten umfasste das Umayyaden-Kalifat 11.100.000 km² (4.300.000 Quadratmeilen) und 33 Millionen Menschen, womit es sowohl flächenmäßig als auch gemessen an der Weltbevölkerung eines der größten Reiche der Geschichte war. Die Dynastie wurde schließlich im Jahr 750 durch einen von den Abbasiden angeführten Aufstand gestürzt. Die Überlebenden der Dynastie ließen sich in Córdoba in Form eines Emirats und dann eines Kalifats nieder, das bis 1031 bestand. Die Umayyaden-Kalifen wurden von einigen ihrer muslimischen Untertanen als zu säkular angesehen. Christen, die noch immer die Mehrheit der Bevölkerung des Kalifats stellten, und Juden durften ihre eigene Religion ausüben, mussten aber eine Kopfsteuer (die Dschizya) entrichten, von der Muslime befreit waren. Es gab jedoch eine ausschließlich muslimische Zakat-Steuer, die ausdrücklich für verschiedene Sozialprogramme vorgesehen war."
 RON_Formable_Country.75.a:0 "Allahu Akbar!"
