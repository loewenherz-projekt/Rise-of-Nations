 RON_Formable_Country.5.t:0 "Chinesisches Kaiserreich"
 RON_Formable_Country.5.d:0 "Die frühesten bekannten schriftlichen Aufzeichnungen zur Geschichte Chinas stammen aus der Zeit um 1250 v. Chr., aus der Shang-Dynastie (ca. 1600–1046 v. Chr.), während der Herrschaft von König Wu Ding, der von diesem als einundzwanzigster Shang-König erwähnt wurde. Antike historische Texte wie die Aufzeichnungen des Großen Historikers (ca. 100 v. Chr.) und die Bambusannalen (296 v. Chr.) beschreiben eine Xia-Dynastie (ca. 2070–1600 v. Chr.) vor der Shang-Dynastie. Aus dieser Zeit sind jedoch keine Schriften bekannt, und die Shang-Schriften weisen nicht auf die Existenz der Xia hin. Die Shang herrschten im Tal des Gelben Flusses, das gemeinhin als Wiege der chinesischen Zivilisation gilt. Neolithische Zivilisationen entstanden jedoch in verschiedenen kulturellen Zentren entlang des Gelben Flusses und des Jangtsekiang. Diese Zivilisationen des Gelben Flusses und des Jangtsekiang entstanden Jahrtausende vor der Shang-Dynastie. Mit seiner jahrtausendealten Geschichte ist China eine der ältesten Zivilisationen der Welt und gilt als eine der Wiegen der Zivilisation."
 RON_Formable_Country.5.a:0 "Interessant"
 RON_Formable_News.5.t:0 "Chinesisches Kaiserreich"
