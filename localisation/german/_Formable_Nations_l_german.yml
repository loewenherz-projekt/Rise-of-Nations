 RON_Formable_Country.110.t:0 "Kirchenstaat"
 RON_Formable_Country.110.d:0 "Der Kirchenstaat war eine Reihe von Gebieten auf der italienischen Halbinsel, die vom 8. Jahrhundert bis 1870 unter der direkten Herrschaft des Papstes standen. Er gehörte zu den wichtigsten Staaten Italiens, etwa vom 8. Jahrhundert an, bis das Königreich Piemont-Sardinien die italienische Halbinsel durch Eroberung vereinigte. Der Feldzug endete 1861 praktisch und 1870 endgültig."
