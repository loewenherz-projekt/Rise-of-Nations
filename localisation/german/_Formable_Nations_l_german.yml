 RON_Formable_Country.127.t:0 "Slawische Union"
 RON_Formable_Country.127.d:0 "Der Panslawismus, eine Bewegung, die sich Mitte des 19. Jahrhunderts herauskristallisierte, ist eine politische Ideologie, die sich für die Integrität und Einheit der slawischen Völker einsetzte. Seinen größten Einfluss hatte er auf dem Balkan, wo nicht-slawische Reiche jahrhundertelang über die Südslawen herrschten. Dies waren vor allem das Byzantinische Reich, Österreich-Ungarn (beide waren die meiste Zeit getrennte Einheiten), das Osmanische Reich und Venedig."
 RON_Formable_Country.127.a:1 "OK"
 RON_Formable_News.127.t:0 "Slawische Union"
 RON_Formable_News.127.d:0 "Der Panslawismus, eine Bewegung, die sich Mitte des 19. Jahrhunderts herauskristallisierte, ist eine politische Ideologie, die sich für die Förderung der Integrität und Einheit der slawischen Völker einsetzt. Seinen größten Einfluss hatte er auf dem Balkan, wo nicht-slawische Reiche jahrhundertelang über die Südslawen herrschten. Dies waren vor allem das Byzantinische Reich, Österreich-Ungarn (beide waren die meiste Zeit getrennte Einheiten), das Osmanische Reich und Venedig."
