 RON_Formable_Country.84.t:0 "Wiedervereinigung Koreas"
 RON_Formable_Country.84.d:0 "Südkorea, offiziell Republik Korea (ROK), ist ein Land in Ostasien und bildet den südlichen Teil der koreanischen Halbinsel. Der Name Korea leitet sich von Goguryeo ab, einer Großmacht Ostasiens, die unter Gwanggaeto dem Großen den größten Teil der koreanischen Halbinsel, die Mandschurei, Teile des russischen Fernen Ostens und die Innere Mongolei beherrschte. Die Hauptstadt Seoul ist eine bedeutende Weltstadt, und die Hälfte der 51 Millionen Einwohner Südkoreas lebt in der Hauptstadtregion Seoul, der viertgrößten Metropolregion der Welt."
