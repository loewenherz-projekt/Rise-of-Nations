 RON_Formable_Country.116.t:0 "Großbrasilien"
 RON_Formable_Country.116.d:0 "Das Kaiserreich Brasilien war ein Staat des 19. Jahrhunderts, der im Großen und Ganzen die Gebiete des heutigen Brasilien und (bis 1828) Uruguay umfasste. Seine Regierung war eine repräsentative parlamentarische konstitutionelle Monarchie unter der Herrschaft der Kaiser Dom Pedro I. und seines Sohnes Dom Pedro II. Als Kolonie des Königreichs Portugal wurde Brasilien 1808 zum Sitz des portugiesischen Kolonialreichs, als der portugiesische Prinzregent, der spätere König Dom João VI., vor Napoleons Invasion in Portugal floh und sich und seine Regierung in der brasilianischen Stadt Rio de Janeiro niederließ. João VI. kehrte später nach Portugal zurück und überließ seinem ältesten Sohn und Erben Pedro die Regentschaft im Königreich Brasilien. Am 7. September 1822 erklärte Pedro die Unabhängigkeit Brasiliens und wurde, nachdem er einen erfolgreichen Krieg gegen das Königreich seines Vaters geführt hatte, am 12. Oktober als Pedro I., der erste Kaiser von Brasilien, gefeiert. Das neue Land war riesig, dünn besiedelt und ethnisch vielfältig."
 RON_Formable_Country.116.a:1 "Independência ou Morte!"
 RON_Formable_News.116.t:0 "Großbrasilien"
