 RON_Formable_Country.23.t:0 "Mexikanisches Reich"
 RON_Formable_Country.23.d:0 "Das Mexikanische Kaiserreich war eine kurzlebige Monarchie und der erste unabhängige postkoloniale imperiale Staat Mexikos. Es war die einzige ehemalige Kolonie des Spanischen Kaiserreichs, die nach der Unabhängigkeit eine Monarchie errichtete. Zusammen mit dem Brasilianischen Kaiserreich und den beiden Haitianischen Kaiserreichen war es eines von vier europäischen Imperien in Amerika. Es bestand zwei Jahre, bevor es in eine Bundesrepublik überging. Es existierte von der Unterzeichnung des Vertrags von Córdoba und der Unabhängigkeitserklärung des Mexikanischen Kaiserreichs im September 1821 bis zur Abdankung des Kaisers im März 1823, als die Provisorische Regierung die Macht übernahm und 1824 die Erste Mexikanische Republik ausgerufen wurde. Der erste Monarch des Staates war Agustín de Iturbide, der als August I. von Mexiko regierte."
 RON_Formable_Country.23.a:0 "Unabhängigkeit, Union, Religion!"
 RON_Formable_News.23.t:0 "Mexikanisches Reich"
 RON_Formable_News.23.d:0 "Das Mexikanische Kaiserreich war eine kurzlebige Monarchie und der erste unabhängige postkoloniale imperiale Staat Mexikos. Es war die einzige ehemalige Kolonie des Spanischen Kaiserreichs, die nach der Unabhängigkeit eine Monarchie errichtete. Zusammen mit dem Brasilianischen Kaiserreich und den beiden Haitianischen Kaiserreichen war es eines von vier europäischen Imperien in Amerika. Es bestand zwei Jahre, bevor es in eine Bundesrepublik überging. Es existierte von der Unterzeichnung des Vertrags von Córdoba und der Unabhängigkeitserklärung des Mexikanischen Kaiserreichs im September 1821 bis zur Abdankung des Kaisers im März 1823, als die Provisorische Regierung die Macht übernahm und 1824 die Erste Mexikanische Republik ausgerufen wurde. Der erste Monarch des Staates war Agustín de Iturbide, der als August I. von Mexiko regierte."
