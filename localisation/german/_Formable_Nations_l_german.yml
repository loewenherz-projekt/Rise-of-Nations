 RON_Formable_Country.133.t:0 "Großjapan"
 RON_Formable_Country.133.d:0 "Das Kaiserreich Japan war ein historischer Nationalstaat und eine Großmacht, die von der Meiji-Restauration 1868 bis zur Verabschiedung der Verfassung nach dem Zweiten Weltkrieg 1947 und der anschließenden Gründung des modernen Japan existierte. Es umfasste den japanischen Archipel sowie mehrere Kolonien, Protektorate, Mandatsgebiete und andere Gebiete."
