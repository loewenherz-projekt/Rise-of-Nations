 RON_Formable_Country.53.t:0 "Goldener Kreis"
 RON_Formable_Country.53.d:0 "Der Golden Circle war ein nicht realisierter Vorschlag der Knights of the Golden Circle aus den 1850er Jahren, die Zahl der Sklavenstaaten zu erhöhen. Er sah die Annexion mehrerer Gebiete – Mexiko (das in 25 neue Sklavenstaaten aufgeteilt werden sollte), Mittelamerika, Nordsüdamerika, Kuba und die restliche Karibik – an die Vereinigten Staaten vor, um die Zahl der Sklavenstaaten und damit die Macht der sklavenhaltenden Oberschicht im Süden deutlich zu erhöhen. Nachdem die Dred-Scott-Entscheidung (1857) die Anti-Sklaverei-Bewegung verstärkt hatte, plädierten die Knights of the Golden Circle dafür, dass die Südstaaten der USA in einer eigenen Konföderation austreten und das Gebiet des Golden Circle erobern und annektieren sollten, um die Macht des Südens deutlich zu stärken."
 RON_Formable_Country.53.a:0 "Mögen die Träume endlich wahr werden!"
