 RON_Formable_Country.10.t:0 "Iberische Union"
 RON_Formable_Country.10.d:0 "Die Iberische Union war die dynastische Vereinigung des Königreichs Portugal und der spanischen Krone zwischen 1580 und 1640, durch die die gesamte Iberische Halbinsel sowie spanische und portugiesische Besitzungen in Übersee unter die Herrschaft der spanischen Habsburgerkönige Philipp II., Philipp III. und Philipp IV. kamen. Die Union entstand als Folge der portugiesischen Erbfolgekrise und des darauf folgenden Portugiesischen Erbfolgekriegs und hielt 60 Jahre, bis im portugiesischen Restaurationskrieg das Haus Braganza als neue Herrscherdynastie Portugals etabliert wurde. Der Habsburgerkönig war das einzige Bindeglied zwischen den zahlreichen Königreichen und Territorien, die von sechs separaten Regierungsräten in Kastilien, Aragonien, Portugal, Italien, Flandern und Indien regiert wurden. Die Regierungen, Institutionen und Rechtstraditionen der einzelnen Königreiche blieben unabhängig voneinander. Ausländergesetze (Leyes de extranjeria) legten fest, dass der Staatsangehörige eines Königreichs in allen anderen iberischen Königreichen ein Ausländer war."
 RON_Formable_Country.10.a:0 "Viva Iberia!"
 RON_Formable_News.10.t:0 "Iberische Union"
