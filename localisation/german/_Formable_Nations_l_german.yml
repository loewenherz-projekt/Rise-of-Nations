 RON_Formable_Country.79.t:0 "Wiedervereinigung der Tschechoslowakei"
 RON_Formable_Country.79.d:0 "Die Tschechoslowakei entstand mit der Auflösung Österreich-Ungarns am Ende des Ersten Weltkriegs. 1918 fand in Pittsburgh, Pennsylvania, USA, ein Treffen statt, bei dem der spätere tschechoslowakische Präsident Tomáš Garrigue Masaryk und andere tschechische und slowakische Vertreter das Pittsburgher Abkommen unterzeichneten, das einen gemeinsamen Staat aus zwei gleichberechtigten Nationen, Slowaken und Tschechen, versprach. Bald darauf drängte die Philosophie Edvard Benes auf eine stärkere Einheit und eine einheitliche Nation."
