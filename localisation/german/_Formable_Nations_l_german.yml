 RON_Formable_Country.30.t:0 "Union Südamerikanischer Nationen"
 RON_Formable_Country.30.d:0 "Der Gründungsvertrag der UNASUR wurde am 23. Mai 2008 auf dem dritten Gipfeltreffen der Staats- und Regierungschefs in Brasília (Brasilien) unterzeichnet. Der Sitz der Union wird laut Gründungsvertrag in Quito (Ecuador) sein. Am 1. Dezember 2010 ratifizierte Uruguay als neunter Staat den UNASUR-Vertrag und verlieh der Union damit volle Rechtmäßigkeit. Mit dem Inkrafttreten des Gründungsvertrags am 11. März 2011 erlangte die UNASUR während eines Außenministertreffens in Mitad del Mundo (Ecuador), bei dem der Grundstein für den Sitz des Sekretariats gelegt wurde, Rechtsstatus."
 RON_Formable_Country.30.a:0 "Soy Del Sur!"
 RON_Formable_News.30.t:0 "Union Südamerikanischer Nationen"
