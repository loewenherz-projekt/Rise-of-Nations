 RON_Formable_Country.113.t:0 "Commonwealth der Nationen"
 RON_Formable_Country.113.d:0 "Das Commonwealth of Nations, allgemein kurz Commonwealth genannt, ist ein politischer Zusammenschluss von 54 Mitgliedsstaaten, die fast alle ehemalige Gebiete des Britischen Empires sind. Die wichtigsten Institutionen der Organisation sind das Commonwealth-Sekretariat, das sich auf zwischenstaatliche Aspekte konzentriert, und die Commonwealth Foundation, die sich auf die nichtstaatlichen Beziehungen zwischen den Mitgliedsstaaten konzentriert."
