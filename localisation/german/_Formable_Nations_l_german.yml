 RON_Formable_Country.106.t:0 "Kanadisch-Amerikanische Union"
 RON_Formable_Country.106.d:0 "Seit der Unabhängigkeit der Vereinigten Staaten bis heute haben sich verschiedene Bewegungen in Kanada für die Annexion ganzer oder teilweiser Teile Kanadas durch die USA eingesetzt. Historische Studien konzentrieren sich auf zahlreiche kleinere Bewegungen, die für den Vergleich der kanadischen und amerikanischen Politik hilfreich sind. In den Anfangsjahren der Vereinigten Staaten befürworteten viele amerikanische Politiker eine Invasion und Annexion Kanadas und stimmten der Aufnahme Kanadas in die USA in den Konföderationsartikeln von 1777 sogar vorab zu. Das Scheitern amerikanischer Versuche, dieses Ziel zu erreichen, sowohl im Amerikanischen Unabhängigkeitskrieg als auch im Krieg von 1812, führte in den USA allmählich zum Verzicht auf ernsthafte Annexionsbestrebungen."
 RON_Formable_Country.106.a:1 "A Mari Usque Ad Mare"
