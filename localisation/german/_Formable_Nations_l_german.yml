 RON_Formable_Country.59.t:0 "Alpenverband"
 RON_Formable_Country.59.d:0 "Nach vielen Spaltungen und Wiedervereinigungen erhebt sich der Alpenbund wie ein Phönix aus der Asche. Nach dem Zweiten Weltkrieg beschlossen die Völker der Schweiz, Liechtensteins und Österreichs, eine Föderation zu gründen, die alle ihre Nationen vor äußeren Gefahren schützen sollte. Heute stehen diese Nationen zusammen und vereint."
 RON_Formable_Country.59.a:0 "Unus Pro Omnibus, Omnes Pro Uno!"
