 RON_Formable_Country.111.t:0 "Italienische Vereinigung"
 RON_Formable_Country.111.d:0 "Die italienische Einigung, auch Risorgimento genannt, war die politische und soziale Bewegung des 19. Jahrhunderts, die zur Vereinigung verschiedener Staaten der italienischen Halbinsel zu einem einzigen Staat, dem Königreich Italien, führte. Inspiriert von den Aufständen der 1820er und 1830er Jahre gegen das Ergebnis des Wiener Kongresses, wurde der Einigungsprozess durch die Revolutionen von 1848 beschleunigt und 1871 abgeschlossen, als Rom offiziell zur Hauptstadt des Königreichs Italien ernannt wurde."
