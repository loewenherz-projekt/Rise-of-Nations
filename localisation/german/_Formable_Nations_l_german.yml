 RON_Formable_Country.147.t:0 "Vereinigtes Königreich von Portugal, Brasilien und den Algarven"
 RON_Formable_Country.147.d:0 "Das Vereinigte Königreich von Portugal, Brasilien und den Algarven war eine plurikontinentale Monarchie, die durch die Erhebung der portugiesischen Kolonie Staat Brasilien zum Königreich und die gleichzeitige Vereinigung dieses Königreichs Brasilien mit dem Königreich Portugal und dem Königreich der Algarven entstand und einen einzigen Staat bestehend aus drei Königreichen bildete. Das Vereinigte Königreich von Portugal, Brasilien und den Algarven wurde 1815 nach der Verlegung des portugiesischen Hofes nach Brasilien während der napoleonischen Invasionen in Portugal gegründet und bestand nach der Rückkehr des Hofes nach Europa noch etwa ein Jahr weiter. De facto wurde es 1822 aufgelöst, als Brasilien seine Unabhängigkeit erklärte. Die Auflösung des Vereinigten Königreichs wurde von Portugal akzeptiert und 1825 de jure formalisiert, als Portugal das unabhängige Kaiserreich Brasilien anerkannte."
 RON_Formable_Country.147.a:1 "OK"
 RON_Formable_News.147.t:0 "Vereinigtes Königreich von Portugal, Brasilien und den Algarven"
 RON_Formable_News.147.d:0 "Das Vereinigte Königreich von Portugal, Brasilien und den Algarven war eine plurikontinentale Monarchie, die durch die Erhebung der portugiesischen Kolonie Staat Brasilien zum Königreich und die gleichzeitige Vereinigung dieses Königreichs Brasilien mit dem Königreich Portugal und dem Königreich der Algarven entstand und einen einzigen Staat bestehend aus drei Königreichen bildete. Das Vereinigte Königreich von Portugal, Brasilien und den Algarven wurde 1815 nach der Verlegung des portugiesischen Hofes nach Brasilien während der napoleonischen Invasionen in Portugal gegründet und bestand nach der Rückkehr des Hofes nach Europa noch etwa ein Jahr weiter. De facto wurde es 1822 aufgelöst, als Brasilien seine Unabhängigkeit erklärte. Die Auflösung des Vereinigten Königreichs wurde von Portugal akzeptiert und 1825 de jure formalisiert, als Portugal das unabhängige Kaiserreich Brasilien anerkannte."
 RON_Formable_News.147.a:1 "OK"
 
  
