 RON_Formable_Country.125.t:0 "Großtürkei"
 RON_Formable_Country.125.d:0 "Der Neoosmanismus ist eine imperialistische türkische politische Ideologie, die im weitesten Sinne ein stärkeres politisches Engagement der Republik Türkei in den Regionen fördert, die früher unter der Herrschaft des Osmanischen Reiches standen, jenes Vorgängerstaates, der unter anderem das Gebiet der modernen Türkei umfasste."
