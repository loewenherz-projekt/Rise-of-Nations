 RON_Formable_Country.57.t:0 "Vereinigte Provinzen des Rio de la Plata"
 RON_Formable_Country.57.d:0 "Die Vereinigten Provinzen des Río de la Plata (spanisch: Provincias Unidas del Río de la Plata), früher bekannt als die Vereinigten Provinzen Südamerikas (spanisch: Provincias Unidas de Sudamérica), ein Zusammenschluss von Provinzen in der Region Río de la Plata in Südamerika, gingen aus der Mairevolution 1810 und dem Argentinischen Unabhängigkeitskrieg 1810–1818 hervor. Sie umfassten den größten Teil des ehemaligen Vizekönigreichs der Abhängigkeiten des Río de la Plata und hatten Buenos Aires als Hauptstadt. In der spanischsprachigen Literatur sind sie vor allem als Provincias Unidas del Río de la Plata („Vereinigte Provinzen des Silberflusses“) bekannt, da dies bis zur Verabschiedung der Verfassung von 1826 der gebräuchlichste (manchmal auch der offizielle) Name für das Land war. In der argentinischen Nationalhymne wird der Staat als „die Vereinigten Provinzen des Südens“ bezeichnet. Die argentinische Verfassung erkennt Provincias Unidas del Río de la Plata als einen der offiziellen Namen des Landes an, das in der modernen Gesetzgebung als „Argentinische Nation“ (Nación Argentina) bezeichnet wird."
 RON_Formable_Country.57.a:0 "En Union y Libertad"
 RON_Formable_News.57.t:0 "Vereinigte Provinzen des Rio de la Plata"
 RON_Formable_News.57.d:0 "Die Vereinigten Provinzen des Río de la Plata (spanisch: Provincias Unidas del Río de la Plata), früher bekannt als die Vereinigten Provinzen Südamerikas (spanisch: Provincias Unidas de Sudamérica), ein Zusammenschluss von Provinzen in der Region Río de la Plata in Südamerika, gingen aus der Mairevolution 1810 und dem Argentinischen Unabhängigkeitskrieg 1810–1818 hervor. Sie umfassten den größten Teil des ehemaligen Vizekönigreichs der Abhängigkeiten des Río de la Plata und hatten Buenos Aires als Hauptstadt. In der spanischsprachigen Literatur sind sie vor allem als Provincias Unidas del Río de la Plata („Vereinigte Provinzen des Silberflusses“) bekannt, da dies bis zur Verabschiedung der Verfassung von 1826 der gebräuchlichste (manchmal auch der offizielle) Name für das Land war. In der argentinischen Nationalhymne wird der Staat als „die Vereinigten Provinzen des Südens“ bezeichnet. Die argentinische Verfassung erkennt Provincias Unidas del Río de la Plata als einen der offiziellen Namen des Landes an, das in der modernen Gesetzgebung als „Argentinische Nation“ (Nación Argentina) bezeichnet wird."
