 RON_Formable_Country.13.t:0 "Großmähren"
 RON_Formable_Country.13.d:0 "Großmähren war der erste größere, überwiegend westslawische Staat in Mitteleuropa. Sein Kerngebiet ist die Region des heutigen Mähren im Osten der Tschechischen Republik entlang des Flusses March, der dem Königreich seinen Namen gab. Obwohl die Grenzen dieses Reiches nicht genau bestimmt werden können, kontrollierte es die Kerngebiete Mährens sowie weitere angrenzende Regionen, darunter Böhmen, den größten Teil der Slowakei sowie Teile Sloweniens, Ungarns, Polens und der Ukraine."
