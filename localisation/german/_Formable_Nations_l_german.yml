 RON_Formable_Country.97.t:0 "Österreich-Deutschland"
 RON_Formable_Country.97.d:0 "Die Erfurter Union war ein kurzlebiger Zusammenschluss deutscher Staaten im Rahmen einer Föderation, der vom Königreich Preußen in Erfurt vorgeschlagen wurde. Zu diesem Zweck wurde das Erfurter Unionsparlament, das vom 20. März bis 29. April 1850 im ehemaligen Augustinerkloster in Erfurt tagte, eröffnet. Die Union trat nie in Kraft und wurde in der Olmützer Punktation unter dem immensen Druck des österreichischen Kaiserreichs ernsthaft untergraben."
