 RON_Formable_Country.126.t:0 "Königreich Deutschland"
 RON_Formable_Country.126.d:0 "Das Königreich Deutschland war das überwiegend germanischsprachige ostfränkische Königreich, das 843 durch den Vertrag von Verdun gegründet wurde, insbesondere nachdem die Königswürde 919 von den fränkischen Königen an die sächsische ottonische Dynastie übergegangen war. Der König wurde zunächst von den Herrschern der Stammherzogtümer gewählt, die in der Regel einen ihrer eigenen wählten. Nach 962, als Otto I. zum Kaiser gekrönt wurde, bildete Ostfranken den Großteil des Heiligen Römischen Reiches, zu dem auch das Königreich Italien und nach 1032 das Königreich Burgund gehörten."
 RON_Formable_Country.126.a:1 "Heil Regnum Teutonicum!"
