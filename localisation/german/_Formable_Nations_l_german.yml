 RON_Formable_Country.18.t:0 "Großungarn"
 RON_Formable_Country.18.d:0 "Großungarn ist eine irredentistische und revisionistische politische Idee zur Rückgewinnung von Gebieten des historischen Königreichs Ungarn. Die Idee ist mit dem ungarischen Revisionismus verbunden und zielt darauf ab, zumindest die Kontrolle über die von Ungarn bewohnten Gebiete in Ungarns Nachbarländern zurückzugewinnen. Der Vertrag von Trianon definierte die Grenzen des neuen unabhängigen Ungarns. Verglichen mit den Ansprüchen des Vorkriegskönigreichs hatte das neue Ungarn etwa 72 % weniger Landbesitz und etwa zwei Drittel weniger Einwohner, von denen fast 5 Millionen ungarischer Abstammung waren. Allerdings waren vor dem Ersten Weltkrieg nur 54 % der Einwohner des Vorkriegskönigreichs Ungarn Ungarn. Nach Inkrafttreten des Vertrags neigten die ungarischen Führer dazu, einige seiner Bestimmungen aufzuheben. Dieses politische Ziel erlangte größere Aufmerksamkeit und war bis zum Zweiten Weltkrieg ein ernstes nationales Anliegen. Ungarn gelang es mit Unterstützung der Achsenmächte, im Ersten und Zweiten Wiener Schiedsspruch von 1938 und 1940 vorübergehend einige (vorwiegend ethnisch ungarische) Gebiete des ehemaligen Königreichs zu erobern. Durch militärische Aktionen gelang es Ungarn 1939, die Karpatenruthenien und 1941 (ethnisch gemischt) die Gebiete Bačka, Baranja, Međimurje und Prekmurje zu erobern (ungarische Besetzung jugoslawischer Gebiete). Nach dem Ende des Zweiten Weltkriegs wurden die im Vertrag von Trianon festgelegten Grenzen Ungarns wiederhergestellt, mit Ausnahme dreier ungarischer Dörfer, die der Tschechoslowakei zugeschlagen wurden. Diese Dörfer gehören heute administrativ zu Bratislava."
 RON_Formable_Country.18.a:0 "Königreich Maria, Schutzpatronin Ungarns!"
