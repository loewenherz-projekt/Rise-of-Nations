 RON_Formable_Country.67.t:0 "Eurasische Union"
 RON_Formable_Country.67.d:0 "Es wird behauptet, Eurasien sei entstanden, als die Sowjetunion das restliche Kontinentaleuropa annektierte und ein einheitliches Gemeinwesen schuf, das sich von Portugal bis zur Beringstraße erstreckte. Orwell beschreibt das Gesicht des typischen Eurasiers im Roman häufig als „mongolisch“. Die einzigen Soldaten außer den Ozeaniern, die im Roman vorkommen, sind die Eurasier. Bei der Hinrichtung einer großen Zahl gefangener Soldaten auf dem Siegesplatz werden zwar einige Slawen erwähnt, doch das von der Partei aufrechterhaltene Stereotyp des Eurasiers ist mongoloid, wie O&#39;Briens Diener Martin. Dies impliziert, dass die Partei Rassismus einsetzt, um Sympathie für einen Feind abzuwenden, indem sie gezielt zentralasiatische Truppen vor den Ozeaniern aufmarschieren lässt. Laut Goldsteins Buch ist Eurasiens wichtigste natürliche Verteidigung seine enorme territoriale Ausdehnung, während die herrschende Ideologie Eurasiens als „Neobolschewismus“ bezeichnet wird, eine Variante des ozeanischen „Ingsoz“."
 RON_Formable_Country.67.a:0 "Der große Bruder schaut zu ..."
