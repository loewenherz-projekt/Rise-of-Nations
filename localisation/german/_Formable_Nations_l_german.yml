 RON_Formable_Country.87.t:0 "Großindien"
 RON_Formable_Country.87.d:0 "Großindien oder der indische Kulturraum umfasst viele Länder und Regionen in Süd- und Südostasien, die historisch von der indischen Kultur geprägt wurden. Der Begriff Großindien als Bezeichnung für den indischen Kulturraum wurde in den 1920er Jahren von einem Netzwerk bengalischer Gelehrter populär gemacht. Er ist ein Überbegriff für den indischen Subkontinent und die umliegenden Länder, die kulturell verbunden sind oder in Bereichen wie Schriftsprache und Religion eine bedeutende Sanskritisierung und indischen Einfluss erfahren haben. Diese Länder wurden in unterschiedlichem Maße durch die Übernahme und Einführung kultureller und institutioneller Elemente verändert, die ihren Ursprung in Indien hatten und sich über Handelsrouten anderswo verbreiteten. Seit etwa 500 v. Chr. hatte der expandierende Land- und Seehandel Asiens zu einer anhaltenden sozioökonomischen und kulturellen Stimulierung und Verbreitung hinduistischer und buddhistischer Glaubensvorstellungen in der Kosmologie der Region geführt, insbesondere in Südostasien und Sri Lanka. In Zentralasien war die Vermittlung von Ideen überwiegend religiöser Natur. Die Ausbreitung des Islam veränderte den Verlauf der Geschichte Großindiens erheblich."
 RON_Formable_Country.87.a:1 "Satyameva Jayate"
 RON_Formable_News.87.t:0 "Großindien"
 RON_Formable_News.87.d:0 "Großindien oder der indische Kulturraum umfasst viele Länder und Regionen in Süd- und Südostasien, die historisch von der indischen Kultur geprägt wurden. Der Begriff Großindien als Bezeichnung für den indischen Kulturraum wurde in den 1920er Jahren von einem Netzwerk bengalischer Gelehrter populär gemacht. Er ist ein Überbegriff für den indischen Subkontinent und die umliegenden Länder, die kulturell verbunden sind oder in Bereichen wie Schriftsprache und Religion eine bedeutende Sanskritisierung und indischen Einfluss erfahren haben. Diese Länder wurden in unterschiedlichem Maße durch die Übernahme und Einführung kultureller und institutioneller Elemente verändert, die ihren Ursprung in Indien hatten und sich über Handelsrouten in andere Länder verbreiteten. Seit etwa 500 v. Chr. hatte der expandierende Land- und Seehandel Asiens zu einer anhaltenden sozioökonomischen und kulturellen Stimulierung und Verbreitung hinduistischer und buddhistischer Glaubensvorstellungen in der Kosmologie der Region geführt, insbesondere in Südostasien und Sri Lanka. In Zentralasien war die Vermittlung von Ideen überwiegend religiöser Natur. Die Ausbreitung des Islam veränderte den Verlauf der Geschichte Großindiens erheblich."
