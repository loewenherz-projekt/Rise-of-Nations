 RON_Formable_Country.129.t:0 "Gemeinschaft Unabhängiger Staaten"
 RON_Formable_Country.129.d:0 "Die Gemeinschaft Unabhängiger Staaten (GUS) ist eine regionale zwischenstaatliche Organisation mit neun (ursprünglich zehn) Mitgliedern sowie zwei ehemaligen Sowjetrepubliken in Eurasien. Sie entstand nach dem Zerfall der Sowjetunion im Jahr 1991. Sie umfasst eine Fläche von 20.368.759 km² (7.864.422 Quadratmeilen) und hat eine geschätzte Bevölkerung von 239.796.010 Einwohnern. Die GUS fördert die Zusammenarbeit in wirtschaftlichen, politischen und militärischen Angelegenheiten und verfügt über bestimmte Kompetenzen in Bezug auf die Koordinierung von Handel, Finanzen, Gesetzgebung und Sicherheit. Sie fördert auch die Zusammenarbeit bei der grenzüberschreitenden Kriminalprävention."
