 RON_Formable_News.135.d:0 "Die Imperial Federation war ein Vorschlag des späten 19. und frühen 20. Jahrhunderts, anstelle des bestehenden Britischen Empire eine föderale Union zu gründen. Das Projekt wurde von Unionisten wie Joseph Chamberlain als Alternative zu William Gladstones Vorschlägen für eine Selbstverwaltung propagiert. Zu dieser Zeit bestand das Britische Empire aus zahlreichen Kolonien, von denen einige weitgehend autonome Gebiete waren (Kanada, Neufundland, Australien, Neuseeland, Südafrika), andere nicht (Indien, Westindien, Fidschi). Die Zukunft des Empire blieb ungewiss, da unklar war, was das Endergebnis sein würde, wenn alle Kolonien schließlich selbstverwaltet würden. Unter anderem wäre es sehr schwierig, die britischen Interessen zu wahren, wenn jede Kolonie im Wesentlichen bereits souverän wäre. Die Schaffung einer Imperial Federation wurde daher zu einem beliebten Alternativvorschlag zum Kolonialimperialismus."
