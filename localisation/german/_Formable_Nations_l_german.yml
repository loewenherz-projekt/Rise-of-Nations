 RON_Formable_Country.121.t:0 "Großitalien"
 RON_Formable_Country.121.d:0 "Der italienische Irredentismus war eine nationalistische Bewegung im Italien des späten 19. und frühen 20. Jahrhunderts mit irredentistischen Zielen, die die Vereinigung geografischer Gebiete vorantrieb, in denen als ethnische Italiener und/oder italienischsprachige Personen geltende indigene Völker die Mehrheit oder beträchtliche Minderheit der Bevölkerung bildeten. Zu Beginn förderte die Bewegung die Annexion von Gebieten an Italien, die von einheimischer italienischer Bevölkerung bewohnt waren, nach dem Dritten Italienischen Unabhängigkeitskrieg 1866 aber vom österreichischen Kaiserreich behalten wurden. Dazu gehörten das Trentino, aber auch mehrsprachige und multiethnische Gebiete in der norditalienischen Region der Alpen mit deutscher, italienischer, slowenischer, kroatischer, ladinischer und istrorumänischer Bevölkerung, wie Südtirol, Triest, ein Teil Istriens, Görz und Gradisca sowie ein Teil Dalmatiens. Die Ansprüche wurden später auf die Stadt Fiume auf Korsika, die Insel Malta, die Grafschaft Nizza und die italienische Schweiz ausgeweitet."
 RON_Formable_Country.121.a:1 "Lunga Vita All&#39;Impero Italiano!"
 RON_Formable_News.121.t:0 "Großitalien"
 RON_Formable_News.121.d:0 "Der italienische Irredentismus war eine nationalistische Bewegung im Italien des späten 19. und frühen 20. Jahrhunderts mit irredentistischen Zielen, die die Vereinigung geografischer Gebiete förderte, in denen indigene Völker, die als ethnische Italiener und/oder italienischsprachige Personen galten, die Mehrheit oder eine beträchtliche Minderheit der Bevölkerung bildeten."
 RON_Formable_News.121.a:1 "OK"
 
 RON_Formable_Country.122.t:0 "Großnorwegen"
 RON_Formable_Country.122.d:0 "Das Königreich Norwegen war im Laufe seiner Geschichte von zahlreichen Territorialstreitigkeiten betroffen, vor allem um Inseln und Seegrenzen im Arktischen Meer. Das Alte Königreich Norwegen, das die norwegischen Territorien in seiner größten Ausdehnung umfasste, umfasste Island, die besiedelbaren Gebiete Grönlands, die Färöer und die Nordinseln (heute Teil Schottlands). Da Dänemark in der Kalmarer Union eine hegemoniale Stellung einnahm, galten die Gebiete unter dänischer Souveränität als norwegische Kolonien. Als im Kieler Frieden 1814 Norwegens Territorien von Dänemark an Schweden übertragen wurden, verblieben die Territorien Islands, Grönlands und der Färöer bei Dänemark."
 RON_Formable_Country.122.a:1 "Ja, Vi Elsker Dette Landet"
