 RON_Formable_Country.140.t:0 "Union souveräner Staaten"
 RON_Formable_Country.140.d:0 "Der Neue Unionsvertrag war ein Vertragsentwurf, der den Vertrag zur Gründung der UdSSR von 1922 ersetzen und die Sowjetunion retten und reformieren sollte. Die feierliche Unterzeichnung des Vertrags durch die Russische SFSR war für den 20. August 1991 geplant, wurde jedoch durch den Augustputsch einen Tag zuvor verhindert. Die Vorbereitung dieses Vertrags wurde als Nowo-Ogarjowo-Prozess bezeichnet, benannt nach Nowo-Ogarjowo, einem Regierungssitz, auf dem die Arbeiten an dem Dokument stattfanden und wo der sowjetische Präsident und Generalsekretär der KPdSU, Michail Gorbatschow, mit den Führern der Unionsrepubliken sprach."
 RON_Formable_Country.140.a:1 "OK"
