 RON_Formable_Country.118.t:0 "Großdänemark"
 RON_Formable_Country.118.d:0 "Dänemark ist ein nordisches Land in Nordeuropa. Dänemark, das südlichste der skandinavischen Länder, besteht aus der Halbinsel Jütland und einem Archipel mit 443 benannten Inseln, von denen Seeland, Fünen und Nordjütland die größten sind. Die Inseln zeichnen sich durch flaches, bebaubares Land, sandige Küsten, niedrige Höhen und ein gemäßigtes Klima aus. Dänemark liegt südwestlich von Schweden und südlich von Norwegen und grenzt im Süden an Deutschland. Das Königreich Dänemark ist verfassungsmäßig ein Einheitsstaat, der neben Dänemark die beiden autonomen Gebiete im Nordatlantik umfasst: die Färöer und Grönland. Dänemark hatte im Jahr 2020 eine Gesamtfläche von 42.943 km² (16.580 Quadratmeilen), und die Gesamtfläche einschließlich Grönland und der Färöer beträgt 2.210.579 km² (853.509 Quadratmeilen). Dänemark selbst hat 5,85 Millionen Einwohner (Stand 2021), von denen 800.000 in der Hauptstadt und größten Stadt Kopenhagen leben."
 RON_Formable_Country.118.a:1 "Der Er Et Yndigt Land"
