 RON_Formable_Country.26.t:0 "Polnisch-Ungarische Union"
 RON_Formable_Country.26.d:0 "Die erste Verbindung kam zustande, als der letzte Piastenkönig Polens, Kasimir III., seinen Neffen, den angevinischen König Ludwig I. von Ungarn, durch das Privileg von Ofen zu seinem mutmaßlichen Erben ernannte. Nach dem Tod Kasimirs, der keine legitimen Söhne hinterließ, bestieg Ludwig praktisch ohne Widerstand den polnischen Thron. Ungarn waren in Polen unbeliebt, ebenso wie die polnische Mutter des Königs, die das Königreich regierte. Die Verbindung zerbrach nach Ludwigs Tod im Jahr 1382. Bis zum Ende des Jahrhunderts hatte Ludwig keine Nachkommen mehr. Im Jahr 1440 wurde Wladislaus III. von Polen zum König von Ungarn gewählt. Wladislaus&#39; Tod in einer Schlacht im Jahr 1444 beendete die zweite Verbindung. "
 RON_Formable_Country.26.a:0 "Polak, Węgier – Dwa Bratanki, Lengyel, Magyar – Két Jó Barát!"
 RON_Formable_News.26.t:0 "Polnisch-Ungarische Union"
 RON_Formable_News.26.d:0 "Die erste Verbindung kam zustande, als der letzte Piastenkönig Polens, Kasimir III., seinen Neffen, den angevinischen König Ludwig I. von Ungarn, durch das Privileg von Ofen zu seinem mutmaßlichen Erben ernannte. Nach dem Tod Kasimirs, der keine legitimen Söhne hinterließ, bestieg Ludwig praktisch ohne Widerstand den polnischen Thron. Ungarn waren in Polen unbeliebt, ebenso wie die polnische Mutter des Königs, die das Königreich regierte. Die Verbindung zerbrach nach Ludwigs Tod im Jahr 1382. Bis zum Ende des Jahrhunderts hatte Ludwig keine Nachkommen mehr. Im Jahr 1440 wurde Wladislaus III. von Polen zum König von Ungarn gewählt. Wladislaus&#39; Tod in einer Schlacht im Jahr 1444 beendete die zweite Verbindung. "
