 RON_Formable_News.145.a:1 "OK"
 
 RON_Formable_Country.146.t:0 "Römisch-Ungarische Union"
 RON_Formable_Country.146.d:0 "Die Union Ungarns und Rumäniens umfasst die im 20. Jahrhundert erfolglosen, meist zwischenkriegszeitlichen Versuche, das Königreich bzw. die Republik Ungarn mit dem Königreich Rumänien zu vereinen. Solche Vorschläge waren in den Jahren 1919 und 1920 am aktivsten, obwohl sie schon etwas früher aufgetaucht waren und bis zum Zweiten Weltkrieg andauerten."
 RON_Formable_Country.146.a:1 "OK"
