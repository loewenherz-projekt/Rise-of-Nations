 RON_Formable_Country.42.t:0 "Indochina"
 RON_Formable_Country.42.d:0 "Französisch-Indochina, ab 1887 offiziell Indochinesische Union und ab 1947 Indochinesische Föderation genannt, war ein Zusammenschluss französischer Kolonialgebiete in Südostasien. 1887 wurde ein Zusammenschluss der drei vietnamesischen Regionen Tonkin (Norden), Annam (Mitte) und Cochinchina (Süden) mit Kambodscha gebildet. 1893 kam Laos hinzu und 1898 das gepachtete chinesische Gebiet Guangzhouwan. Die Hauptstadt wurde 1902 von Saigon (in Cochinchina) nach Hanoi (Tonkin) und 1939 nach Da Lat (Annam) verlegt. 1945 wurde sie wieder nach Hanoi verlegt."
 RON_Formable_Country.42.a:0 "Độc lập – Tự do – Hạnh phúc!"
 RON_Formable_News.42.t:0 "Indochina"
