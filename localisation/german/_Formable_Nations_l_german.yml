 RON_Formable_Country.16.t:0 "Vereinigtes Baltisches Herzogtum"
 RON_Formable_Country.16.d:0 "Das Vereinigte Baltische Herzogtum, auch Großherzogtum Livland genannt, war ein von deutschbaltischen Adligen und exilierten russischen Adligen nach der Russischen Revolution und der deutschen Besetzung der Gouvernements Kurland, Livland und Estland des Russischen Reiches vorgeschlagener Staat. Der Vorschlag erfolgte im April 1918, nachdem Estland und Lettland ihre Unabhängigkeit erklärt hatten. Die Idee umfasste die Gebiete in Estland und Lettland und sah die Schaffung eines Herzogtums Kurland und Semgallen sowie eines Herzogtums Estland und Livland vor, das vor dem Ende des Ersten Weltkriegs in Personalunion mit der Krone Preußens unter dem vom Deutschen Reich besetzten Gebiet Ober Ost stehen und die Gebiete des mittelalterlichen Livlands im heutigen Lettland und Estland umfassen sollte."
 RON_Formable_Country.16.a:0 "Hundert Jahre lang!"
 RON_Formable_News.16.t:0 "Vereinigtes Baltisches Herzogtum"
