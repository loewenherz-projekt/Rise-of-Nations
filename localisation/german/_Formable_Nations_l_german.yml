 RON_Formable_Country.92.t:0 "Lusophere"
 RON_Formable_Country.92.d:0 "Die Gemeinschaft portugiesischsprachiger Länder, auch bekannt als Commonwealth der Lusophonen, ist eine internationale Organisation und politische Vereinigung lusophoner Nationen auf vier Kontinenten, in denen Portugiesisch Amtssprache ist. Die CPLP fungiert als privilegiertes, multilaterales Forum für die gegenseitige Zusammenarbeit der Regierungen, Volkswirtschaften, Nichtregierungsorganisationen und Völker der Lusophonen. Die CPLP besteht aus neun Mitgliedsstaaten und 19 assoziierten Beobachtern in Europa, Südamerika, Asien, Afrika und Ozeanien."
