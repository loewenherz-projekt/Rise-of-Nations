 RON_Formable_Country.123.t:0 "Großpreußen"
 RON_Formable_Country.123.d:0 "Preußen war ein historisch bedeutender deutscher Staat, der 1525 mit einem Herzogtum an der Südostküste der Ostsee gegründet wurde. De facto wurde es 1932 durch ein Notdekret aufgelöst, mit dem die Machtbefugnisse der preußischen Regierung an den deutschen Reichskanzler Franz von Papen übertragen wurden. De jure wurde es 1947 durch ein Dekret der Alliierten aufgelöst. Jahrhundertelang herrschte das Haus Hohenzollern über Preußen und konnte dessen Größe mithilfe einer ungewöhnlich gut organisierten und schlagkräftigen Armee erfolgreich ausweiten. Preußen, dessen Hauptstadt zunächst Königsberg und dann, als es 1701 zum Königreich Preußen wurde, Berlin war, prägte die Geschichte Deutschlands entscheidend."
 RON_Formable_Country.123.a:1 "Nobiscum Deus"
