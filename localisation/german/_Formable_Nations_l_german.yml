 RON_Formable_Country.100.t:0 "Großperu"
 RON_Formable_Country.100.d:0 "Peru, offiziell Republik Peru, ist ein Staat im Westen Südamerikas. Es grenzt im Norden an Ecuador und Kolumbien, im Osten an Brasilien, im Südosten an Bolivien, im Süden an Chile und im Süden und Westen an den Pazifischen Ozean. Peru ist ein Land mit enormer Artenvielfalt, dessen Lebensräume von den trockenen Ebenen der Pazifikküste im Westen über die Gipfel der Anden, die sich vom Norden bis zum Südosten des Landes erstrecken, bis hin zum tropischen Regenwald des Amazonasbeckens im Osten mit dem Amazonas reichen. Mit 1,28 Millionen km² ist Peru das 19. größte Land der Welt und das drittgrößte Südamerikas."
 RON_Formable_Country.100.a:1 "Viva El Peru Carajo!"
