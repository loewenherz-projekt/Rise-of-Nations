 RON_Formable_Country.93.t:0 "Großostasiatische Wohlstandssphäre"
 RON_Formable_Country.93.d:0 "Die Großostasiatische Wohlstandssphäre war ein imperialistisches Konzept, das im Japanischen Kaiserreich entwickelt und von 1931 bis 1945 in den von ihm besetzten asiatischen Ländern verbreitet wurde. Sie erstreckte sich über den gesamten asiatisch-pazifischen Raum und förderte die kulturelle und wirtschaftliche Einheit der Ostasiaten, Südostasiaten, Südasiaten und Ozeanier. Sie erklärte außerdem die Absicht, einen autarken Block asiatischer Nationen unter japanischer Führung zu schaffen, der frei von der Herrschaft westlicher Mächte wäre. Die Idee wurde in einer Radioansprache mit dem Titel „Die internationale Lage und Japans Position“ verkündet, die Außenminister Hachirō Arita am 29. Juni 1940 hielt."
 RON_Formable_Country.93.a:1 "Gokajō No Goseimon"
 RON_Formable_News.93.t:0 "Großostasiatische Wohlstandssphäre"
 RON_Formable_News.93.d:0 "Die Großostasiatische Wohlstandssphäre war ein imperialistisches Konzept, das im Japanischen Kaiserreich entwickelt und von 1931 bis 1945 in den von ihm besetzten asiatischen Ländern verbreitet wurde. Sie erstreckte sich über den gesamten asiatisch-pazifischen Raum und förderte die kulturelle und wirtschaftliche Einheit der Ostasiaten, Südostasiaten, Südasiaten und Ozeanier. Sie erklärte außerdem die Absicht, einen autarken Block asiatischer Nationen unter japanischer Führung zu schaffen, der frei von der Herrschaft westlicher Mächte wäre. Die Idee wurde in einer Radioansprache mit dem Titel „Die internationale Lage und Japans Position“ verkündet, die Außenminister Hachirō Arita am 29. Juni 1940 hielt."
