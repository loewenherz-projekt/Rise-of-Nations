 RON_Formable_Country.81.t:0 "Wiedervereinigung der Sowjetunion"
 RON_Formable_Country.81.d:0 "Die Sowjetunion, offiziell Union der Sozialistischen Sowjetrepubliken (UdSSR), war ein sozialistischer Staat in Eurasien, der von 1922 bis 1991 existierte. Nominell ein Zusammenschluss mehrerer nationaler Sowjetrepubliken, waren Regierung und Wirtschaft stark zentralisiert. Das Land war ein Einparteienstaat, regiert von der Kommunistischen Partei mit Moskau als Hauptstadt seiner größten Republik, der Russischen Sozialistischen Föderativen Sowjetrepublik (Russische SFSR). Weitere wichtige städtische Zentren waren Leningrad, Kiew, Minsk, Alma-Ata und Nowosibirsk. Das Land erstreckte sich von Ost nach West über 10.000 Kilometer und elf Zeitzonen sowie von Nord nach Süd über 7.200 Kilometer. Es gab fünf Klimazonen: Tundra, Taiga, Steppe, Wüste und Gebirge."
 RON_Formable_Country.81.a:0 "Proletarier aller Länder, vereinigt euch!"
