 RON_Formable_Country.15.t:0 "Vereinigtes Königreich der Niederlande"
 RON_Formable_Country.15.d:0 "Das Vereinigte Königreich der Niederlande ist der inoffizielle Name des Königreichs der Niederlande, wie es zwischen 1815 und 1839 existierte. Die Vereinigten Niederlande entstanden nach den Napoleonischen Kriegen durch den Zusammenschluss von Gebieten, die zur ehemaligen Niederländischen Republik, den Österreichischen Niederlanden und dem Fürstbistum Lüttich gehört hatten. Das Gemeinwesen war eine konstitutionelle Monarchie unter der Herrschaft von Wilhelm I. aus dem Haus Oranien-Nassau. Mit dem Ausbruch der Belgischen Revolution brach das Gemeinwesen 1830 zusammen. Mit der De-facto-Sezession Belgiens blieben die Niederlande als Rumpfstaat zurück und weigerten sich, die belgische Unabhängigkeit anzuerkennen, bis 1839 der Vertrag von London unterzeichnet wurde, der die Grenze zwischen den beiden Staaten festlegte und Belgiens Unabhängigkeit und Neutralität als Königreich Belgien garantierte. Jetzt, nach langen Jahren und blutigen Kämpfen, sind wir endlich wieder vereint!"
 RON_Formable_Country.15.a:0 "Wir werden es aufrechterhalten!"
 RON_Formable_News.15.t:0 "Vereinigtes Königreich der Niederlande"
 RON_Formable_News.15.d:0 "Das Vereinigte Königreich der Niederlande ist der inoffizielle Name des Königreichs der Niederlande, wie es zwischen 1815 und 1839 existierte. Die Vereinigten Niederlande entstanden nach den Napoleonischen Kriegen durch den Zusammenschluss von Gebieten, die zur ehemaligen Niederländischen Republik, den Österreichischen Niederlanden und dem Fürstbistum Lüttich gehört hatten. Das Gemeinwesen war eine konstitutionelle Monarchie unter der Herrschaft von Wilhelm I. aus dem Haus Oranien-Nassau. Es zerbrach 1830 mit dem Ausbruch der Belgischen Revolution. Mit der De-facto-Sezession Belgiens blieben die Niederlande als Rumpfstaat zurück und weigerten sich, die belgische Unabhängigkeit anzuerkennen, bis 1839 der Vertrag von London unterzeichnet wurde, der die Grenze zwischen den beiden Staaten festlegte und Belgiens Unabhängigkeit und Neutralität als Königreich Belgien garantierte. Jetzt, nach langen Jahren und blutigen Kämpfen, sind wir endlich wieder vereint!"
