 RON_Formable_Country.14.t:0 "Transkaukasien"
 RON_Formable_Country.14.d:0 "Transkaukasisches Albanien ist ein modernes Exonym für ein antikes Land im Ostkaukasus, auf dem Gebiet der heutigen Republik Aserbaidschan (wo sich seine beiden Hauptstädte befanden) und Süddagestan. Sein Endonym ist unbekannt. Der Name Albanien leitet sich vom altgriechischen Namen Ἀλβανία und dem lateinischen Albanía ab. Die Vorsilbe „kaukasisch“ wird lediglich verwendet, um Verwechslungen mit dem modernen Balkanalbanien zu vermeiden, das keine bekannten geografischen oder historischen Verbindungen zu Kaukasisches Albanien hat. Über die Vorgeschichte der Region ist wenig bekannt, einschließlich der Ursprünge von Kaukasisches Albanien als geografisches und/oder ethnolinguistisches Konzept. Im 1. Jahrhundert v. Chr. und 1. Jahrhundert n. Chr. war das Gebiet südlich des Großen Kaukasus und nördlich des Kleinen Kaukasus aufgeteilt zwischen Kaukasisches Albanien im Osten, Kaukasisches Iberien in der Mitte, Kolchis im Westen, Armenien im Südwesten und Atropatene im Südosten. Nach dem Aufstieg des Partherreichs wurden die Könige des kaukasischen Albaniens durch eine Arsakidenfamilie ersetzt, die später im 5. Jahrhundert n. Chr. von einer anderen iranischen Königsfamilie abgelöst wurde: den Mihraniden."
 RON_Formable_Country.14.a:0 "Dzala Ertobashia!"
