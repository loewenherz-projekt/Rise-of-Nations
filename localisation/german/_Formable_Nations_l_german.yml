 RON_Formable_Country.37.t:0 "Persisches Reich"
 RON_Formable_Country.37.d:0 "Das Persische Reich bezeichnet eine Reihe von Kaiserdynastien mit Zentren in Persien/Iran, vom 6. Jahrhundert v. Chr., der Ära des Achämenidenreichs, bis zum 20. Jahrhundert n. Chr., der Ära der Kadscharen-Dynastie. Die erste Dynastie des Persischen Reiches wurde von den Achämeniden geschaffen, die Kyros der Große 550 v. Chr. mit der Eroberung der Meder, Lyder und Babylonier ins Leben rief. Es umfasste weite Teile der Antike, als es von Alexander dem Großen erobert wurde. Persepolis ist die bekannteste historische Stätte im Zusammenhang mit dem Persischen Reich in der Achämenidenzeit und seit 1979 ein UNESCO-Weltkulturerbe. Von 247 v. Chr. bis 224 n. Chr. wurde Persien vom Partherreich regiert, das das hellenistische Seleukidenreich ablöste, und dann vom Sassanidenreich, das bis Mitte des 7. Jahrhunderts herrschte. Das Persische Reich in der Sasanidenzeit wurde durch die arabische Eroberung Persiens im Jahr 651 n. Chr. unterbrochen, die das noch größere islamische Kalifat errichtete, und später durch die mongolische Invasion. Die Hauptreligion des alten Persiens war der einheimische Zoroastrismus, der jedoch nach dem 7. Jahrhundert langsam durch den Islam ersetzt wurde, der im 10. Jahrhundert die Mehrheit erlangte."
 RON_Formable_Country.37.a:0 "Esteqlāl, Āzādi!"
