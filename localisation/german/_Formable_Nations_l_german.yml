 RON_Formable_Country.85.t:0 "Weströmisches Reich"
 RON_Formable_Country.85.d:0 "In der Geschichtsschreibung bezieht sich das Weströmische Reich auf die westlichen Provinzen des Römischen Reiches zu jeder Zeit, in der sie von einem separaten unabhängigen kaiserlichen Gericht verwaltet wurden. Insbesondere wird dieser Begriff verwendet, um den Zeitraum von 395 bis 476 zu beschreiben, in dem es getrennte gleichberechtigte Gerichte gab, die die Regierungsführung des Reiches in den westlichen und östlichen Provinzen aufteilten, mit einer unterschiedlichen kaiserlichen Nachfolge in den getrennten Gerichten. Die Begriffe Weströmisches Reich und Oströmisches Reich sind moderne Beschreibungen, die politische Einheiten beschreiben, die de facto unabhängig waren. Die zeitgenössischen Römer betrachteten das Reich nicht als in zwei getrennte Reiche aufgeteilt, sondern betrachteten es als ein einziges Gemeinwesen, das aus administrativen Gründen von zwei getrennten kaiserlichen Gerichten regiert wurde. Das Weströmische Reich brach 476 zusammen, und der westliche Kaiserhof wurde 480 formell aufgelöst. Der östliche Kaiserhof überlebte bis 1453. Obwohl das Reich zuvor Perioden erlebt hatte, in denen mehr als ein Kaiser gemeinsam regierte, wurde die Ansicht, dass es für einen einzelnen Kaiser unmöglich sei, das gesamte Reich zu regieren, nach den verheerenden Bürgerkriegen und Zerfällen der Krise des dritten Jahrhunderts durch Kaiser Diokletian in Reformen des römischen Rechts institutionalisiert. Er führte 286 das System der Tetrarchie ein, mit zwei getrennten hochrangigen Kaisern mit dem Titel Augustus, einem im Osten und einem im Westen, jeweils mit einem ernannten Cäsar (Juniorkaiser und designierter Nachfolger). Obwohl das tetrarchische System innerhalb weniger Jahre zusammenbrechen würde, würde die administrative Ost-West-Aufteilung in der einen oder anderen Form in den kommenden Jahrhunderten bestehen bleiben. So würde das Weströmische Reich zwischen dem 3. und 5. Jahrhundert in mehreren Perioden zeitweise existieren. Einige Kaiser, wie Konstantin I. und Theodosius I., regierten als einziger Augustus das Römische Reich. Nach dem Tod von Theodosius I. im Jahr 395 teilte er das Reich unter seinen beiden Söhnen auf. Honorius wurde sein Nachfolger im Westen, der von Mediolanum aus regierte, und Arcadius sein Nachfolger im Osten, der von Konstantinopel aus regierte."
 RON_Formable_Country.85.a:0 "Senatus Populusque Romanus!"
 RON_Formable_News.85.t:0 "Weströmisches Reich"
 RON_Formable_News.85.d:0 "In der Geschichtsschreibung bezieht sich das Weströmische Reich auf die westlichen Provinzen des Römischen Reiches zu jeder Zeit, in der sie von einem separaten unabhängigen kaiserlichen Gericht verwaltet wurden. Insbesondere wird dieser Begriff verwendet, um den Zeitraum von 395 bis 476 zu beschreiben, in dem es getrennte gleichberechtigte Gerichte gab, die die Regierungsführung des Reiches in den westlichen und östlichen Provinzen aufteilten, mit einer unterschiedlichen kaiserlichen Nachfolge in den getrennten Gerichten. Die Begriffe Weströmisches Reich und Oströmisches Reich sind moderne Beschreibungen, die politische Einheiten beschreiben, die de facto unabhängig waren. Die zeitgenössischen Römer betrachteten das Reich nicht als in zwei getrennte Reiche aufgeteilt, sondern betrachteten es als ein einziges Gemeinwesen, das aus administrativen Gründen von zwei getrennten kaiserlichen Gerichten regiert wurde. Das Weströmische Reich brach 476 zusammen, und der westliche Kaiserhof wurde 480 formell aufgelöst. Der östliche Kaiserhof überlebte bis 1453. Obwohl das Reich zuvor Perioden erlebt hatte, in denen mehr als ein Kaiser gemeinsam regierte, wurde die Ansicht, dass es für einen einzelnen Kaiser unmöglich sei, das gesamte Reich zu regieren, nach den verheerenden Bürgerkriegen und Zerfällen der Krise des dritten Jahrhunderts durch Kaiser Diokletian in Reformen des römischen Rechts institutionalisiert. Er führte 286 das System der Tetrarchie ein, mit zwei getrennten hochrangigen Kaisern mit dem Titel Augustus, einem im Osten und einem im Westen, jeweils mit einem ernannten Cäsar (Juniorkaiser und designierter Nachfolger). Obwohl das tetrarchische System innerhalb weniger Jahre zusammenbrechen würde, würde die administrative Ost-West-Aufteilung in der einen oder anderen Form in den kommenden Jahrhunderten bestehen bleiben. So würde das Weströmische Reich zwischen dem 3. und 5. Jahrhundert in mehreren Perioden zeitweise existieren. Einige Kaiser, wie Konstantin I. und Theodosius I., regierten als einziger Augustus das Römische Reich. Nach dem Tod von Theodosius I. im Jahr 395 teilte er das Reich unter seinen beiden Söhnen auf. Honorius wurde sein Nachfolger im Westen, der von Mediolanum aus regierte, und Arcadius sein Nachfolger im Osten, der von Konstantinopel aus regierte."
