 RON_Formable_Country.131.t:0 "Großrumänien"
 RON_Formable_Country.131.d:0 "Der Begriff Großrumänien bezeichnet üblicherweise die Grenzen des Königreichs Rumänien in der Zwischenkriegszeit, die nach der Großen Union erreicht wurden. Er steht auch für eine pannationalistische Idee. Das Hauptziel des Konzepts ist die Schaffung eines Nationalstaates, der alle Rumänischsprachigen einschließt. 1920 erreichte der rumänische Staat nach der Eingliederung Siebenbürgens, der Bukowina, Bessarabiens und Teilen des Banats, Crișana und Maramureș seine größte geografische Ausdehnung in Friedenszeiten (295.049 km²). Heute dient das Konzept als Leitprinzip für die Vereinigung Rumäniens und Moldawiens."
 RON_Formable_Country.131.a:1 "Nihil Sine Deo"
