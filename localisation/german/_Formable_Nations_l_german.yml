 RON_Formable_Country.112.t:0 "CANZUK"
 RON_Formable_Country.112.d:0 "CANZUK ist die Abkürzung für ein geplantes Bündnis zwischen Kanada, Australien, Neuseeland und dem Vereinigten Königreich als Teil einer internationalen Organisation oder Konföderation, die in ihrem Umfang der ehemaligen Europäischen Wirtschaftsgemeinschaft ähnelt. Dies beinhaltet verstärkten Handel, außenpolitische und militärische Zusammenarbeit sowie die Mobilität der Bürger zwischen den vier Staaten, die durch die gemeinsame Sprache Englisch verbunden sind. Die Idee wird von der Interessenvertretung CANZUK International propagiert und weitgehend von britischen Konservativen unterstützt. Weitere Unterstützer sind liberale Denkfabriken wie das Adam Smith Institute, die Henry Jackson Society, die Bruges Group und Politiker aus den vier Ländern."
 RON_Formable_Country.112.a:1 "Beherrsche Britannia!"
