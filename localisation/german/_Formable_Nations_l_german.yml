 RON_Formable_Country.4.t:0 "europäische Union"
 RON_Formable_Country.4.d:0 "Die Europäische Union (EU) ist ein politischer und wirtschaftlicher Zusammenschluss von 28 Mitgliedstaaten, die überwiegend in Europa liegen. Sie hat eine Fläche von 4.475.757 km² (1.728.099 Quadratmeilen) und eine geschätzte Bevölkerung von etwa 513 Millionen Menschen. Die EU hat einen Binnenmarkt durch ein standardisiertes Rechtssystem entwickelt, das in allen Mitgliedstaaten nur in den Bereichen gilt, in denen sich die Mitglieder darauf geeinigt haben, geschlossen zu handeln. Die EU-Politik zielt darauf ab, den freien Verkehr von Personen, Waren, Dienstleistungen und Kapital innerhalb des Binnenmarkts zu gewährleisten, Gesetze in den Bereichen Justiz und Inneres zu erlassen und eine gemeinsame Politik in den Bereichen Handel, Landwirtschaft, Fischerei und regionale Entwicklung zu verfolgen. Für Reisen innerhalb des Schengen-Raums wurden die Passkontrollen abgeschafft. Die Währungsunion wurde 1999 gegründet und trat 2002 vollständig in Kraft. Sie besteht aus 19 EU-Mitgliedstaaten, die den Euro als Währung verwenden."
 RON_Formable_Country.4.a:0 "In Varietate Concordia"
