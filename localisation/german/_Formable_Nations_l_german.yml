 RON_Formable_Country.40.t:0 "Großfinnland"
 RON_Formable_Country.40.d:0 "Großfinnland ist eine irredentistische und nationalistische Idee, die die territoriale Expansion Finnlands betonte. Die gängigste Vorstellung von Großfinnland basierte auf natürlichen Grenzen, die die von Finnen und Kareliern bewohnten Gebiete umfassten, vom Weißen Meer bis zum Onegasee und entlang der Flüsse Swir und Newa – oder, bescheidener, der Sestra – bis zum Finnischen Meerbusen. Einige Befürworter schlossen auch die Kola-Halbinsel (als Teil einer natürlichen Grenze), Finnmark (in Norwegen), das Tornetal (in Schweden), Ingermanland (um das heutige Sankt Petersburg) und Estland ein. Die Idee Großfinnlands gewann 1917 schnell an Popularität und Einfluss, verlor jedoch nach dem Zweiten Weltkrieg und dem Fortsetzungskrieg an Unterstützung."
 RON_Formable_Country.40.a:0 "Maamme Suur-Suomi!"
