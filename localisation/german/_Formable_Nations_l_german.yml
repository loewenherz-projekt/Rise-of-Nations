 RON_Formable_Country.3.t:0 "Lateinische Union"
 RON_Formable_Country.3.d:0 "Die Lateinische Union war eine internationale Organisation romanischer Sprachen, die von 1983 bis 2012 als funktionierende Institution existierte. Ihr Ziel war es, das gemeinsame kulturelle Erbe der lateinischen Völker zu schützen, zu vermitteln und zu fördern und die Identitäten der lateinischen und lateinisch beeinflussten Welt zu vereinen. Sie wurde 1954 in Madrid, Spanien, gegründet und ihre Mitgliederzahl stieg von 12 auf 36 Staaten, darunter Länder in Nordamerika, Südamerika, Europa, Afrika und der Asien-Pazifik-Region. Die offiziellen Namen der Lateinischen Union waren: Union Latine auf Französisch, Unione Latina auf Italienisch, União Latina auf Portugiesisch, Uniunea Latină auf Rumänisch, Unión Latina auf Spanisch und Unió Llatina auf Katalanisch. Aufgrund finanzieller Schwierigkeiten gab die Lateinische Union am 26. Januar 2012 die Aussetzung ihrer Aktivitäten, die Auflösung ihres Generalsekretariats (mit Wirkung zum 31. Juli 2012) und die Kündigung aller Mitarbeiter der Organisation bekannt."
 RON_Formable_Country.3.a:0 "Latina-Union!"
