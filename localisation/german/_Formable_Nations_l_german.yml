 RON_Formable_Country.41.t:0 "Turan"
 RON_Formable_Country.41.d:0 "Turan ist eine historische Region in Zentralasien. Der Begriff ist iranischen Ursprungs und kann sich auf eine bestimmte prähistorische menschliche Siedlung, eine historische geografische Region oder eine Kultur beziehen. Die ursprünglichen Turanier waren ein iranischer Stamm aus der avestischen Zeit. In der antiken iranischen Mythologie ist Tūr oder Turaj (Tuzh auf Mittelpersisch) der Sohn des Kaisers Fereydun. Dem Bericht im Schahnameh zufolge wurden die Nomadenstämme, die diese Gebiete bewohnten, von Tūr beherrscht. In diesem Sinne könnten die Turanier Mitglieder zweier iranischer Völker sein, die beide von Fereydun abstammen, aber unterschiedliche geografische Herrschaftsgebiete hatten und oft miteinander im Krieg lagen. Turan bestand somit aus fünf Gebieten: der Region Kopet Dag, dem Atrek-Tal, dem östlichen Elburs-Gebirge, dem Helmand-Tal, Baktrien und Margiana. Eine spätere Verbindung der ursprünglichen Turanier mit Turkvölkern basiert hauptsächlich auf der anschließenden Türkisierung Zentralasiens, einschließlich der oben genannten Gebiete. Laut CE Bosworth gab es jedoch keine kulturelle Beziehung zwischen den alten Turkkulturen und den Turaniern des Schahnameh."
