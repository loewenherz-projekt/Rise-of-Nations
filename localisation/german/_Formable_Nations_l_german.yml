 RON_Formable_Country.82.t:0 "Wiedervereinigung Jugoslawiens"
 RON_Formable_Country.82.d:0 "Jugoslawien war während des größten Teils des 20. Jahrhunderts ein Land in Südost- und Mitteleuropa. Es entstand nach dem Ersten Weltkrieg 1918 unter dem Namen Königreich der Serben, Kroaten und Slowenen durch den Zusammenschluss des provisorischen Staates der Slowenen, Kroaten und Serben (er wurde aus Gebieten der ehemaligen österreichisch-ungarischen Monarchie gebildet) mit dem Königreich Serbien und stellte die erste Union der südslawischen Völker als souveräner Staat dar, nachdem die Region jahrhundertelang Teil des Osmanischen Reiches und Österreich-Ungarns gewesen war. Peter I. von Serbien war sein erster Herrscher. Das Königreich erlangte am 13. Juli 1922 auf der Botschafterkonferenz in Paris internationale Anerkennung. Der offizielle Name des Staates wurde am 3. Oktober 1929 in Königreich Jugoslawien geändert."
 RON_Formable_Country.82.a:0 "Brüderlichkeit und Einheit"
 RON_Formable_News.82.t:0 "Wiedervereinigung Jugoslawiens"
