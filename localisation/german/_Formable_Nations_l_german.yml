 RON_Formable_Country.98.t:0 "Intermarium"
 RON_Formable_Country.98.d:0 "Intermarium war ein geopolitisches Projekt, das von Politikern in Nachfolgestaaten des ehemaligen polnisch-litauischen Commonwealth in mehreren Iterationen konzipiert wurde, von denen einige auch die Einbeziehung anderer Nachbarstaaten vorsahen. Das vorgeschlagene multinationale Gemeinwesen hätte sich über Gebiete zwischen der Ostsee, dem Schwarzen Meer und der Adria erstreckt, daher der Name „Zwischen den Meeren“. Der nach dem Ersten Weltkrieg vom polnischen Führer und ehemaligen politischen Gefangenen des Russischen Reiches, Józef Piłsudski (1867–1935), verfolgte Intermarium-Plan, der eine Föderation mittel- und osteuropäischer Länder vorsah, zielte darauf ab, die baltischen Staaten (Litauen, Lettland, Estland), Finnland, Weißrussland, die Ukraine, Ungarn, Rumänien, Jugoslawien und die Tschechoslowakei für die geplante Föderation zu gewinnen. Der polnische Name Międzymorze wurde ins Lateinische als „Intermarium“ übersetzt."
 RON_Formable_Country.98.a:1 "Za Wolność Naszą I Waszą"
