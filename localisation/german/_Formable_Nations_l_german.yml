 RON_Formable_Country.95.d:0 "Schweden und Norwegen oder Schweden-Norwegen, offiziell die Vereinigten Königreiche von Schweden und Norwegen oder als die Vereinigten Königreiche, war eine Personalunion der einzelnen Königreiche Schweden und Norwegen unter einem gemeinsamen Monarchen und einer gemeinsamen Außenpolitik, die von 1814 bis zu ihrer friedlichen Auflösung im Jahr 1905 dauerte"
