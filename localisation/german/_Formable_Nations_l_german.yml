 RON_Formable_Country.61.t:0 "Großserbien"
 RON_Formable_Country.61.d:0 "Der Begriff Großserbien beschreibt die serbisch-nationalistische und irredentistische Ideologie der Schaffung eines serbischen Staates, der alle für die Serben traditionell wichtigen Gebiete umfassen sollte, darunter auch die von Serben bewohnten Gebiete außerhalb Serbiens. Die Hauptideologie dieser Bewegung (der Panserbismus) bestand ursprünglich darin, alle Serben (oder alle historisch von Serben beherrschten oder bewohnten Gebiete) in einem Staat zu vereinen und dabei, je nach Version, unterschiedliche Gebiete in zahlreichen umliegenden Ländern zu beanspruchen. Die großserbische Ideologie umfasst Ansprüche auf Gebiete im heutigen Kroatien, Bosnien und Herzegowina, Montenegro und der Republik Mazedonien (alle ehemals Teil Jugoslawiens). In einigen historischen Formen umfassen die großserbischen Bestrebungen auch Teile Albaniens, Bulgariens, Ungarns und Rumäniens. Ihre Inspiration rührt von der einstigen Existenz des relativ großen und mächtigen Serbischen Reiches, das im Südosten Europas des 14. Jahrhunderts vor der osmanischen Eroberung des Balkans existierte."
 RON_Formable_Country.61.a:0 "Боже правде!"
 RON_Formable_News.61.t:0 "Großserbien"
