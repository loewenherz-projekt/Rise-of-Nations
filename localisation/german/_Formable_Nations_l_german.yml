 RON_Formable_Country.88.t:0 "Patria Grande"
 RON_Formable_Country.88.d:0 "Die Patria Grande ist das Konzept einer gemeinsamen Heimat oder Gemeinschaft, die ganz Spanisch-Amerika und manchmal auch ganz Lateinamerika und die Karibik umfasst. Der Begriff wird mit politischen Ideen der iberoamerikanischen Integration in Verbindung gebracht, die die Balkanisierung des spanischen Imperiums in Amerika nach den Spanisch-Amerikanischen Unabhängigkeitskriegen ablehnen. Der Begriff kann auch speziell für Projekte der hispanisch-amerikanischen Einheit verwendet werden, die von Simón Bolívar und José de San Martín durchgeführt wurden."
