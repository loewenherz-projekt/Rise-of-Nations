 RON_Formable_Country.94.t:0 "Dänemark-Norwegen"
 RON_Formable_Country.94.d:0 "Dänemark-Norwegen, auch bekannt als Dänisch-Norwegisches Reich, Oldenburgische Monarchie oder Oldenburgische Reiche, war ein frühneuzeitlicher multinationaler und mehrsprachiger Realstaat, bestehend aus dem Königreich Dänemark, dem Königreich Norwegen (einschließlich der norwegischen Überseegebiete Färöer, Island, Grönland und der norwegischen Besitzungen), dem Herzogtum Schleswig und dem Herzogtum Holstein. Der Staat beanspruchte zudem die Souveränität über drei historische Völker: Friesen, Guten und Wenden. Dänemark-Norwegen besaß mehrere Kolonien, nämlich die dänische Goldküste, die Nikobaren, Serampore, Tharangambadi und Dänisch-Westindien."
 RON_Formable_Country.94.a:1 "Intet Uden Gud"
