 RON_Formable_Country.29.t:0 "Mazedonisches Reich"
 RON_Formable_Country.29.d:0 "Makedonien, auch Mazedonien genannt, war ein antikes Königreich am Rande des archaischen und klassischen Griechenlands und später der dominierende Staat des hellenistischen Griechenlands. Das Königreich wurde von der königlichen Dynastie der Argeaden gegründet und zunächst von ihr regiert, auf die die Dynastien der Antipatriden und Antigoniden folgten. Das früheste Königreich, Heimat der antiken Makedonier, hatte seinen Mittelpunkt im nordöstlichen Teil der griechischen Halbinsel und grenzte im Westen an Epirus, im Norden an Paionien, im Osten an Thrakien und im Süden an Thessalien. Vor dem 4. Jahrhundert v. Chr. war Makedonien ein kleines Königreich außerhalb des Gebiets, das von den großen Stadtstaaten Athen, Sparta und Theben beherrscht wurde, und kurzzeitig dem Achämenidenreich Persien untergeordnet. Während der Herrschaft des Argeadenkönigs Philipp II. (359–336 v. Chr.) unterwarf Makedonien das griechische Festland und Thrakien durch Eroberung und Diplomatie. Mit einer reformierten Armee, deren Phalanxen die Sarissa-Pike schwangen, besiegte Philipp II. die alten Mächte Athen und Theben 338 v. Chr. in der Schlacht von Chaironeia. Philipps II. Sohn Alexander der Große, der einen Bund griechischer Staaten anführte, erreichte das Ziel seines Vaters, die Herrschaft über ganz Griechenland zu erlangen, als er Theben nach einem Aufstand der Stadt zerstörte. Während Alexanders anschließendem Eroberungsfeldzug stürzte er das Achämenidenreich und eroberte Gebiete, die sich bis zum Indus erstreckten. Für kurze Zeit war sein Reich das mächtigste der Welt – der endgültige hellenistische Staat, der den Übergang zu einer neuen Periode der antiken griechischen Zivilisation einleitete. Griechische Kunst und Literatur blühten in den neu eroberten Ländern und Fortschritte in Philosophie, Technik und Wissenschaft verbreiteten sich in weiten Teilen der antiken Welt. Von besonderer Bedeutung waren die Beiträge von Aristoteles, Alexanders Lehrer, dessen Schriften zu einem Grundpfeiler der westlichen Philosophie wurden."
 RON_Formable_Country.29.a:0 "Elefthería í Thánatos!"
 RON_Formable_News.29.t:0 "Mazedonisches Reich"
 RON_Formable_News.29.d:0 "Makedonien, auch Mazedonien genannt, war ein antikes Königreich am Rande des archaischen und klassischen Griechenlands und später der dominierende Staat des hellenistischen Griechenlands. Das Königreich wurde von der königlichen Dynastie der Argeaden gegründet und zunächst von ihr regiert, auf die die Dynastien der Antipatriden und Antigoniden folgten. Das früheste Königreich, Heimat der antiken Makedonier, hatte seinen Mittelpunkt im nordöstlichen Teil der griechischen Halbinsel und grenzte im Westen an Epirus, im Norden an Paionien, im Osten an Thrakien und im Süden an Thessalien. Vor dem 4. Jahrhundert v. Chr. war Makedonien ein kleines Königreich außerhalb des Gebiets, das von den großen Stadtstaaten Athen, Sparta und Theben beherrscht wurde, und kurzzeitig dem Achämenidenreich Persien untergeordnet. Während der Herrschaft des Argeadenkönigs Philipp II. (359–336 v. Chr.) unterwarf Makedonien das griechische Festland und Thrakien durch Eroberung und Diplomatie. Mit einer reformierten Armee, deren Phalanxen die Sarissa-Pike schwangen, besiegte Philipp II. die alten Mächte Athen und Theben 338 v. Chr. in der Schlacht von Chaironeia. Philipps II. Sohn Alexander der Große, der einen Bund griechischer Staaten anführte, erreichte das Ziel seines Vaters, die Herrschaft über ganz Griechenland zu erlangen, als er Theben nach einem Aufstand der Stadt zerstörte. Während Alexanders anschließendem Eroberungsfeldzug stürzte er das Achämenidenreich und eroberte Gebiete, die sich bis zum Indus erstreckten. Für kurze Zeit war sein Reich das mächtigste der Welt – der endgültige hellenistische Staat, der den Übergang zu einer neuen Periode der antiken griechischen Zivilisation einleitete. Griechische Kunst und Literatur blühten in den neu eroberten Ländern und Fortschritte in Philosophie, Technik und Wissenschaft verbreiteten sich in weiten Teilen der antiken Welt. Von besonderer Bedeutung waren die Beiträge von Aristoteles, Alexanders Lehrer, dessen Schr