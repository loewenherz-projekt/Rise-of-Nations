 RON_Formable_Country.65.t:0 "Karpatenunion"
 RON_Formable_Country.65.d:0 "Karpatenruthenien, Karpato-Ukraine oder Transkarpatien ist eine historische Region an der Grenze zwischen Mittel- und Osteuropa, die größtenteils in der Oblast Transkarpatien in der Westukraine liegt, mit kleineren Teilen im äußersten Osten der Slowakei (größtenteils in den Regionen Prešov und Košice) und in Polens Lemkowyna. Vor dem Ersten Weltkrieg war der größte Teil dieser Region Teil des Königreichs Ungarn. In der Zwischenkriegszeit war sie Teil der Ersten und Zweiten Tschechoslowakischen Republik. Während des Zweiten Weltkriegs wurde die Region erneut vom Königreich Ungarn annektiert. Nach dem Krieg wurde sie von der UdSSR besetzt und wurde Teil der Sowjetukraine. Es ist eine ethnisch vielfältige Region, die von Russen, Lemken, Ungarn, Ukrainern, Slowaken, Rumänen, Bulgaren und Russen bewohnt wird. Es gibt auch kleine Minderheiten der Huzulen, Juden, Roma, Szekler und Tschenschenen."
 RON_Formable_Country.65.a:0 "Shche Ne Vmerla Ukrayiny Ni Slava, Ni Volya!"
