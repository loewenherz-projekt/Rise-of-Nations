 RON_Formable_Country.124.t:0 "Großspanien"
 RON_Formable_Country.124.d:0 "Ein Spanien, das die gesamte Iberische Halbinsel umfasst, wurde ab dem 19. Jahrhundert zu einem Thema des spanischen Nationalismus. Seine Befürworter idealisierten das historische römische Hispania, als die gesamte Iberische Halbinsel unter derselben Herrschaft vereint war. Das Konzept Spaniens als kulturelle und politische Einheit war Jahrhunderte zuvor mit der Veröffentlichung von Pater Marianas Geschichte Spaniens (1598) entwickelt worden, in der Mariana eine hispanische Identität unterstützte."
