 RON_Formable_Country.22.t:0 "Großkolumbien"
 RON_Formable_Country.22.d:0 "Großkolumbien ist der Name, den Historiker für den Staat verwenden, der von 1819 bis 1831 weite Teile Nordsüdamerikas und des südlichen Mittelamerikas umfasste. Der Staat umfasste die Gebiete des heutigen Kolumbien, Ecuadors, Panamas und Venezuelas sowie Teile Nordperus, Westguyanas und Nordwestbrasiliens. Der Begriff Großkolumbien wird historiographisch verwendet, um ihn von der heutigen Republik Kolumbien zu unterscheiden, die auch der offizielle Name des ehemaligen Staates ist. Zum Zeitpunkt seiner Gründung war Großkolumbien das angesehenste Land in Spanisch-Amerika. John Quincy Adams, der damalige Außenminister und spätere Präsident der Vereinigten Staaten, bezeichnete es als eine der mächtigsten Nationen der Welt. Dieses Prestige, zusammen mit der Person Bolívars, zog die unionistischen Ideen der Unabhängigkeitsbewegungen in Kuba, der Dominikanischen Republik und Puerto Rico an, die einen assoziierten Staat mit der Republik anstrebten."
 RON_Formable_Country.22.a:0 "Freiheit und Ordnung!"
 RON_Formable_News.22.t:0 "Großkolumbien"
 RON_Formable_News.22.d:0 "Großkolumbien ist der Name, den Historiker für den Staat verwenden, der von 1819 bis 1831 weite Teile Nordsüdamerikas und südliches Mittelamerika umfasste. Der Staat umfasste die Gebiete des heutigen Kolumbien, Ecuadors, Panamas und Venezuelas sowie Teile Nordperus, Westguyanas und Nordwestbrasiliens. Der Begriff Großkolumbien wird historiographisch verwendet, um ihn von der heutigen Republik Kolumbien zu unterscheiden, die auch der offizielle Name des ehemaligen Staates ist. Zum Zeitpunkt seiner Gründung war Großkolumbien das angesehenste Land in Spanisch-Amerika. John Quincy Adams, der damalige Außenminister und spätere Präsident der Vereinigten Staaten, bezeichnete es als eine der mächtigsten Nationen der Welt. Dieses Prestige, zusammen mit der Person Bolívars, zog die unionistischen Ideen der Unabhängigkeitsbewegungen in Kuba, der Dominikanischen Republik und Puerto Rico an, die einen assoziierten Staat mit der Republik anstrebten."
