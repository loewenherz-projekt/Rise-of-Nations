 RON_Formable_Country.99.t:0 "Italienisches Reich"
 RON_Formable_Country.99.d:0 "Das italienische Kolonialreich, zwischen 1936 und 1943 als Kaiserreich Italien bekannt, entstand im 19. Jahrhundert in Afrika. 1936 umfasste es die Kolonien, Protektorate, Konzessionen und abhängigen Gebiete des Königreichs Italien. In Afrika umfasste das Kolonialreich die Gebiete des heutigen Libyen, Somalia, Äthiopien und Eritrea. Außerhalb Afrikas besaß Italien die Dodekanes-Inseln vor der Küste der Türkei (nach dem Italienisch-Türkischen Krieg) und eine Konzession im chinesischen Tianjin (nach dem Boxerkrieg). Albanien war von 1917 bis 1920 und von 1925 bis 1939 de facto ein italienisches Protektorat. Dann wurde es überfallen und zu einer Personalunion mit dem Königreich Italien gezwungen. Die faschistische Regierung, die 1922 unter Benito Mussolini an die Macht kam, versuchte, das italienische Reich zu vergrößern und die Ansprüche der italienischen Irredentisten zu befriedigen. Während des Zweiten Weltkriegs zögerte Italien, schloss sich dann aber 1940 Deutschland an. Daraufhin besetzten die Alliierten, insbesondere Großbritannien, zwischen 1940 und 1943 die Kolonien. 1947 verzichtete Italien offiziell auf seine Ansprüche auf seine ehemaligen Kolonien. Lediglich Somalia wurde schließlich bis 1960 in ein UN-Treuhandgebiet unter italienischer Verwaltung umgewandelt."
 RON_Formable_Country.99.a:1 "Lunga Vita All&#39;Impero Italiano!"
