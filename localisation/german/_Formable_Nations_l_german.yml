 RON_Formable_Country.47.t:0 "Nordamerikanische Union"
 RON_Formable_Country.47.d:0 "Die Nordamerikanische Union (NAU) ist ein theoretischer wirtschaftlicher und politischer Kontinentalverband aus Kanada, Mexiko und den Vereinigten Staaten (manchmal werden Grönland und Kuba einbezogen). Das Konzept lehnt sich lose an die Europäische Union an und umfasst gelegentlich eine gemeinsame Währung namens Amero oder Nordamerikanischer Dollar. Eine Union des nordamerikanischen Kontinents, die sich manchmal auf Mittel- und Südamerika erstreckt, ist seit über einem Jahrhundert Gegenstand akademischer Konzepte und hat sich auch in der Science-Fiction zu einem gängigen Motiv entwickelt. Ein Grund für die Schwierigkeiten bei der Umsetzung des Konzepts liegt darin, dass die individuellen Entwicklungen in den einzelnen Regionen einer größeren Union keine Priorität eingeräumt haben. In akademischen, wirtschaftlichen und politischen Kreisen wird seit Jahrzehnten über irgendeine Form einer Union diskutiert oder vorgeschlagen. Regierungsvertreter aller drei Nationen erklären jedoch, dass es keine Pläne zur Gründung einer Nordamerikanischen Union gebe und dass kein entsprechendes Abkommen vorgeschlagen, geschweige denn unterzeichnet worden sei. Die Gründung einer Nordamerikanischen Union war Gegenstand verschiedener Verschwörungstheorien."
 RON_Formable_Country.47.a:0 "Wir vertrauen auf Gott!"
 RON_Formable_News.47.t:0 "Nordamerikanische Union"
 RON_Formable_News.47.d:0 "Die Nordamerikanische Union (NAU) ist ein theoretischer wirtschaftlicher und politischer Kontinentalzusammenschluss aus Kanada, Mexiko und den USA (manchmal auch Grönland und Kuba). Das Konzept lehnt sich lose an die Europäische Union an und umfasst gelegentlich eine gemeinsame Währung namens Amero oder Nordamerikanischer Dollar. Eine Union des nordamerikanischen Kontinents, die sich manchmal auf Mittel- und Südamerika erstreckt, ist seit über einem Jahrhundert Gegenstand wissenschaftlicher Konzepte und hat sich auch in der Science-Fiction zu einem gängigen Topos entwickelt. Ein Grund für die Schwierigkeiten bei der Umsetzung dieses Konzepts liegt darin, dass die Entwicklungen in den einzelnen Regionen einer größeren Union keine Priorität eingeräumt haben. In akademischen, wirtschaftlichen und politischen Kreisen wird seit Jahrzehnten über irgendeine Form der Union diskutiert oder vorgeschlagen."
 RON_Formable_News.47.a:0 "OK"
 
 RON_Formable_Country.48.t:0 "Großägypten"
 RON_Formable_Country.48.d:0 "Ägypten war eine Zivilisation des alten Nordafrikas, die sich entlang des Unterlaufs des Nils im heutigen Ägypten konzentrierte. Die altägyptische Zivilisation folgte dem prähistorischen Ägypten und verschmolz um 3100 v. Chr. (gemäß der konventionellen ägyptischen Chronologie) mit der politischen Vereinigung Ober- und Unterägyptens unter Menes (oft mit Narmer identifiziert). Die Geschichte des alten Ägyptens verlief als eine Reihe stabiler Königreiche, getrennt durch Perioden relativer Instabilität, die als Zwischenzeiten bekannt sind: das Alte Reich der Frühbronzezeit, das Mittlere Reich der Mittleren Bronzezeit und das Neue Reich der Spätbronzezeit."
 RON_Formable_Country.48.a:0 "Amon!"
 RON_Formable_News.48.t:0 "Großägypten"
