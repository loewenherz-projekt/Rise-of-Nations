 RON_Formable_Country.104.t:0 "Großrussland"
 RON_Formable_Country.104.d:0 "Etwa vom 16. bis zum 20. Jahrhundert verfolgte das Russische Reich eine expansionistische Politik. Nur wenige dieser Aktionen hatten irredentistische Begründungen. Ein Beispiel hierfür ist die Eroberung von Teilen des Osmanischen Reiches im Kaukasus, um armenische Christen unter den Schutz des Zaren zu bringen."
 RON_Formable_Country.104.a:1 "Bozhe, Tsarya Khrani!"
