 RON_Formable_Country.44.t:0 "Tibetisches Reich"
 RON_Formable_Country.44.d:0 "Das tibetische Reich existierte vom 7. bis zum 9. Jahrhundert n. Chr., als Tibet zu einem großen und mächtigen Reich vereint wurde, und beherrschte ein Gebiet, das erheblich größer war als das tibetische Plateau und sich über Teile Ostasiens, Zentralasiens und Südasiens erstreckte. Die traditionelle tibetische Geschichte beschreibt die Heldentaten einer langen Reihe von Herrschern. Externe Bestätigungen finden sich ab dem 7. Jahrhundert in chinesischen Geschichtsbüchern. Vom 7. bis zum 9. Jahrhundert herrschte eine Reihe von Kaisern über Tibet. Seit der Zeit des Kaisers Songtsen Gampo wuchs die Macht des Reiches allmählich über ein vielfältiges Terrain. Während der Herrschaft des Kaisers Ralpacan in den ersten Jahren des 9. Jahrhunderts kontrollierte es Gebiete, die sich vom Tarimbecken bis zum Himalaya und Bengalen und vom Pamir bis zu den heutigen chinesischen Provinzen Gansu und Yunnan erstreckten. Die abwechslungsreiche Landschaft des Reiches und die schwierigen Transportmöglichkeiten sowie die neuen Ideen, die durch die Expansion des Reiches Einzug hielten, trugen zur Entstehung von Spannungen und Machtblöcken bei, die oft mit dem Herrscher im Zentrum des Reiches konkurrierten. So gerieten beispielsweise Anhänger der Bön-Religion und der alten Adelsfamilien zunehmend in Konkurrenz zum erst kürzlich eingeführten Buddhismus. In den 840er Jahren brach das Reich in einem Bürgerkrieg zusammen."
 RON_Formable_Country.44.a:0 "In alle Richtungen siegreich."
 RON_Formable_News.44.t:0 "Tibetisches Reich"
