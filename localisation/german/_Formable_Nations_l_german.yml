 RON_Formable_Country.115.t:0 "Großbolivien"
 RON_Formable_Country.115.d:0 "Die Verfassung Boliviens von 2009 besagt, dass das Land ein „unveräußerliches Recht auf das Gebiet hat, das ihm Zugang zum Pazifischen Ozean und seinem Meeresraum verschafft“. Darunter versteht man das Gebiet, das Bolivien und Peru nach dem Salpeterkrieg an Chile abtraten, wodurch Bolivien ein Binnenstaat wurde. Die verlorene Atacama-Region ist ein Dorn im Auge der beiden Länder."
