 mitsubishi_manufacturer:0 "Designer japanischer Marinejäger"
 mitsubishi_manufacturer_desc:0 "Mitsubishi, der Schöpfer der legendären Zero, opfert bei seinen Kampfflugzeugen Schutz für Wendigkeit und beispiellose Reichweite"
