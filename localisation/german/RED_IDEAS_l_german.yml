 yokosuka_manufacturer:0 "Japanischer Agile Carrier CAS Designer "
 yokosuka_manufacturer_desc:0 "Die D4Y von Yokosuka verfügte über die größte Nutzlast aller japanischen CAS-Flugzeuge und behielt dabei bewundernswerte Flugeigenschaften bei. "
