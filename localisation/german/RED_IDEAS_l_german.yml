 bell_manufacturer:0 "US-Abfangjäger-Designer"
 bell_manufacturer_desc:0 "Bells Flugzeuge aus dem Zweiten Weltkrieg, die Cobra und die King Cobra, waren wendige Flugzeuge, die mit einer leistungsstarken 37-mm-Kanone ausgestattet waren"
