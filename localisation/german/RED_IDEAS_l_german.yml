 macchi_elite:0 "Macchi"
 macchi_manufacturer:0 "Italienischer Kampfflugzeug-Designer"
 macchi_elite_desc:0 "Macchis C205 wurde von seinen britischen Gegnern wegen seiner Geschwindigkeit und Wendigkeit geschätzt. Der C205 war jedoch ein schlechter Bodenangriffsflieger."
