 hawker_manufacturer:0 "Britischer Kampfflugzeug-Designer"
 hawker_manufacturer_desc:0 "Hawkers Typhoon und Tempest waren hervorragende Angriffsflugzeuge und konnten es in puncto Geschwindigkeit und Manövrierfähigkeit fast mit ihren Spitfire-Cousins aufnehmen. "
