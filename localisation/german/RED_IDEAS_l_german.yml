 nakajima_manufacturer:0 "Designer eines japanischen Armeekampfflugzeugs"
 nakajima_aircraft_desc:0 "Nakajima entwickelte seine Kampfflugzeuge nach ähnlichen Prinzipien wie Mitsubishi und produzierte auch schnelle Trägerbomber und eine Lizenzvariante der Me-262 (die Kikka). "
