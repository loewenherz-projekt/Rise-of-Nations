 #------------------ Japanese Designers ------------------
 aichi_aircraft:0 "Aichi "
 aichi_manufacturer:0 "Japanischer Marine-CAS-Designer"
 aichi_manufacturer_desc:0 "Die Folgen der präzisen Angriffe von Aichis D3A in Pearl Harbor sprechen für sich. Darüber hinaus war der Torpedobomber B7A in der Spätphase des Krieges zwar ein hervorragendes Design, konnte aber historisch nicht in nennenswerten Stückzahlen produziert werden."
