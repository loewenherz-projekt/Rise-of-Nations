 avro_manufacturer_desc:0 "Avros Bomber wie die Lancaster trugen eine viel größere Nutzlast (einschließlich der Option für eine interne 4000-Pfund-Bombe oder sogar die 22000-Pfund-Grand-Slam!) als ihre amerikanischen Gegenstücke."
