l_german:
 est.1.t:0 "Fall Leningrads"
 est.1.d:0 "Leningrad, die ehemalige Hauptstadt des Russischen Reiches, wurde von estnischen Truppen besetzt. Mit über drei Millionen Einwohnern hat die Stadt doppelt so viele Einwohner wie ganz Estland, doch diese Tatsache hat die estnischen Angreifer offenbar nicht abgeschreckt.\n\nEs wird diskutiert, ob die Stadt in Großestland integriert werden sollte, da verschiedene Soumi-Ugri sprechende Menschen in den Regionen außerhalb der Stadt eine beträchtliche Minderheit bilden. Dies setzt natürlich voraus, dass die Rote Armee die Stadt in einer Gegenoffensive nicht zurückerobern kann."
 est.1.a:0 "Okay"
 est.1.b:0 "Wir sind wirklich ein mächtiges kleines Land!"
 est.2.t:0 "Der Fall von Riga"
 est.2.d:0 "Heute haben estnische Streitkräfte erfolgreich die Stadt Riga besetzt, ein wichtiges strategisches Ziel im Krieg gegen Lettland. \n\nDie im Zentrum des Baltikums gelegene Stadt ist der Schlüssel zur Ostseeroute nach Europa.\n\nIhre Einnahme ermöglicht Estland, den Krieg weiter nach Osteuropa auszudehnen."
 est.2.b:0 "Der Sieg gehört uns!"
 est.2.a:0 "Ein weiteres Land ist seinem Feind zum Opfer gefallen."
 est.3.t:0 "Ist Lettland für unser Land ungeeignet?"
 est.3.d:0 "Da wir das gesamte ehemalige Gebiet Lettlands erobert haben, haben wir nun die Möglichkeit, unser Reich auf nie dagewesene Weise weiter auszudehnen, anstatt ständig dem Weg unserer Vorfahren zu folgen. Wir können möglicherweise alle ehemaligen Länder des Livländischen Ordens zu einer einzigen Nation vereinen!"
 est.3.a:0 "Willkommen zu Hause, Brüder!"
 est.3.b:0 "Es ist zu teuer"
 est.4.t:0 "Einladung aus Estland"
 est.4.d:0 "Angesichts der zunehmenden Spannungen in Europa ruft Estland nun zu einem Verteidigungsbündnis auf. Dies stößt jedoch auf Widerstand. Im Kabinett von [Root.GetLeader] herrscht allgemeiner Konsens darüber, dass sich unser Land problemlos gegen alle äußeren Bedrohungen verteidigen kann. Selbst wenn es im unwahrscheinlichen Fall eines erneuten Weltkriegs zu einem erneuten Ausbruch kommen sollte, sind Estland unsere historischen Freunde. Wir haben ihnen 1918 im Unabhängigkeitskrieg geholfen und werden auch in Zukunft bereit sein, zu helfen."
 est.4.a:0 "Akzeptieren"
 est.4.b:0 "Abfall"
 est.5.t:0 "[From.GetName] sagt JA!"
 est.5.d:0 "Nach sorgfältiger Beratung und Verhandlung teilte uns unser diplomatischer Vertreter in [From.GetName] per Telegramm mit, dass unsere Einladung zur Zusammenarbeit sehr freundlich angenommen wurde. \n\nDie Finnen waren es, die uns in unserem Unabhängigkeitskrieg 1918–1920 gegen die Polschewiki zur Hilfe kamen, und wir waren siegreich. Gemeinsam werden wir uns jedem fremden Land entgegenstellen, das uns bedrohen könnte."
 est.5.a:0 "Es lebe unser Bündnis!"
 est.6.t:0 "Unglück unter Soldaten"
 est.6.d:0 "Die estnischen Streitkräfte hatten Lettland im letzten Krieg erfolgreich erobert. Nachdem wir Litauen den Krieg erklärt und mehrere Schlachten geschlagen haben, steigen die Verluste, und viele unserer Soldaten sind verwundet. Sie sind erschöpft und sehen keinen Sinn mehr darin, gegen ihre Landsleute zu kämpfen. \n\nWir müssen dieses Problem irgendwie lösen und unsere Armee wieder groß machen!"
 est.7.t:0 "Kommunistische Unterstützer"
 est.7.d:0 "Die Sowjetunion wird täglich stärker, und unser Land ist nicht stark genug, um sie zu verteidigen und den Kampf gegen die kommunistischen Anhänger zu bestehen. Wir müssen diese Verräter ein für alle Mal bekämpfen und dürfen nicht zulassen, dass sie einen weiteren Aufstand wie 1924 anzetteln. Der Sozialismus ist und bleibt auch in Zukunft eine große Bedrohung, wenn wir ihn jetzt nicht bekämpfen."
 est.8.t:0 "Nahrungsmittelüberschuss"
 est.8.d:0 "Seit Beginn der Weltwirtschaftskrise im Jahr 1929, als die Industrie und die Landwirtschaft jeweils um 20 bis 45 % zurückgingen, haben wir nun endlich das Niveau von vor 1930 übertroffen. Es wird mehr Milch, Käse, Fleisch und Weizen produziert als verbraucht und unsere Wirtschaft wächst schneller als je zuvor."
 est.9.t:0 "Friedensverhandlungen mit den Sowjets"
 est.9.d:0 "Der Krieg gegen die Sowjetunion verlief für uns bisher gut. Wir haben unsere Unabhängigkeit erfolgreich verteidigt und sogar Leningrad, die ehemalige Hauptstadt des Russischen Reiches, erobert. Der Krieg war verlustreich und hat viele Menschenleben gekostet. Heute hat der estnische Diplomat Ants Piip unsere Regierung kontaktiert und seine Hilfe bei der Kontaktaufnahme mit dem Sowjetregime angeboten, um über ein Ende des Krieges zu verhandeln. Dies ist möglicherweise unsere einzige Hoffnung auf eine friedliche Lösung des Konflikts."
 est.10.t:0 "Estland will den Krieg beenden"
 est.10.d:0 "Der estnische Diplomat Ants Piip hat heute unsere Regierung kontaktiert, in der Hoffnung, den Konflikt zu beenden. Der Krieg mit Estland war eine kostspielige Angelegenheit. Sie fordern die Region Pskow und Luga auf, weitere Feindseligkeiten zu beenden."
 est.11.t:0 "Die Sowjetunion akzeptierte unsere Forderungen"
 est.11.d:0 "Nach sorgfältigen Verhandlungen beschlossen die Sowjets, den Konflikt auf jeden Fall zu beenden und ihre Truppen abzuziehen. Wir erhielten die Kontrolle über die Gebiete rund um den Peipussee."
 est.12.t:0 "Die Sowjetunion lehnte unsere Forderungen ab"
 est.12.d:0 "Nachdem die Sowjetregierung unsere Forderungen gehört hatte, beschloss sie, unseren Vorschlag abzulehnen."
 est.13.t:0 "Gegenangebot der Sowjetunion"
 est.13.d:0 "Nach Erhalt unseres Vorschlags hat die sowjetische Regierung beschlossen, die Gebiete Luga und Pskow nicht abzutreten. Stattdessen will sie den Krieg mit einem weißen Frieden und ohne territoriale Veränderungen beenden."
 est.14.t:0 "Eine Geschichte aus Leningrad"
 est.14.d:0 "Nach dem überwältigenden Sieg der estnischen Streitkräfte, wie ihn die Geschichte noch nie gesehen hat, ist es nun an der Zeit, die letzten Überreste der bolschewistischen Herrschaft in Europa zu zerstören. Leningrad, die Geburtsstätte des Kommunismus, muss beseitigt werden!"
 est.14.a:0 "Lass es uns wagen!"
 est.14.b:0 "Was für ein absurder Vorschlag!"
 est.15.t:0 "Strenger Winter"
 est.15.d:0 "Der Winter ist dieses Jahr früh hereingebrochen und brachte die niedrigste Temperatur Europas seit 100 Jahren mit sich: -43° nordöstlich von Narva. Die bittere Kälte hat die Ausrüstung und die Waffen unserer Armee stark beeinträchtigt. Die 1. Infanterieeinheit unseres Generals Laidoner meldete täglich 200 Fälle mittelschwerer Erfrierungen."
 est.16.t:0 "[From.GetName] fordert [Root.GetAdjective] die Teilnahme an der Nordischen Union"
 est.16.d:0 "Mit der Unterzeichnung eines Freundschaftsvertrags zwischen unseren Nationen hat [From.GetName] [Root.GetName] gebeten, sich ihnen in ihrer [From.GetFactionName] anzuschließen, um gemeinsam gegen die wachsenden Bedrohungen zu kämpfen, die unsere Nationen umgeben. Ob kommunistisch oder faschistisch, [From.GetName] verspricht, für die Interessen von [Root.GetAdjective] einzutreten."
 est.16.a:0 "[Root.GetName] steht mit seinen Brüdern."
 est.16.b:0 "[Root.GetName] kann nur alleine überleben."
 est.17.t:0 "[From.GetName] tritt [Root.GetFactionName] bei!"
 est.17.d:0 "[From.GetLeader] ist sich der Notwendigkeit der Einheit angesichts der Bedrohungen bewusst, die unsere Länder von allen Seiten umgeben, und hat heute der Welt verkündet, dass [From.GetName] zum Wohle unserer gemeinsamen Sicherheit einen Vertrag mit [Root.GetName] geschlossen hat."
 est.17.a:0 "[Root.GetName] und [From.GetName] sind heute Brüder."
 est.18.t:0 "[From.GetName] weigert sich, [Root.GetFactionName] beizutreten"
 est.18.d:0 "In einem törichten Akt vermeintlicher Selbsterhaltung hat [From.GetLeader] heute angekündigt, dass [From.GetName] von jeglichen diplomatischen Maßnahmen Abstand nehmen werde, die als Bedrohung für seine mächtigen Nachbarn angesehen werden könnten. Daher hat es unsere Bitte um einen Beitritt zu [Root.GetFactionName] abgelehnt."
 est.18.a:0 "Die einzige Sicherheit besteht darin, zusammenzuhalten."
 est.19.t:0 "Estland unterstützt den Kommunismus"
 est.19.d:0 "Nach dem gescheiterten Putschversuch der Kommunisten im Jahr 1924 verlor Estlands Ideologie an Popularität. Das Land durchläuft derzeit viele Reformen und orientiert sich an den kommunistischen Idealen. Dies könnte Estland näher an seine große Heimat, die Sowjetunion, heranführen."
 est.20.t:0 "Estland und Finnland geben Allianz bekannt"
 est.20.d:0 "Angesichts der zunehmend autokratischen Politik hat [EST.GetName] angekündigt, dass es an der Zeit sei, Verbündete zu finden, um der Bedrohung durch den globalen Kommunismus entgegenzutreten. Nun scheint [From.GetName] dieser Verbündete zu sein.\n\nHeute Morgen hat [From.GetLeader] angekündigt, dass [Estonia.GetName] und [From.GetName] als Brüder gegen jede mögliche Bedrohung aus dem Ausland zusammenstehen werden."
 est.21.t:0 "[From.GetName] beginnt mit der Kernforschung"
 est.21.d:0 "Nach ersten Tests und Experimenten haben die Politiker von [From.GetName] beschlossen, ihre Bemühungen auf die Erforschung der Nukleartechnologie zu konzentrieren. \n\nNoch befindet sich die Technologie in einem sehr experimentellen und frühen Stadium. Ob sie überhaupt einen praktischen Nutzen hat, ist unklar. Für ein so kleines Land mit über einer Million Einwohnern könnte die Nuklearforschung der Weg sein, mit seinen mächtigen Nachbarn zu konkurrieren."
 est.22.t:0 "Estland beantragt eine nordische Forschungszusammenarbeit"
 est.22.d:0 "Unser baltischer Nachbar hat uns zu einer gemeinsamen nordischen Forschungskooperation eingeladen und argumentiert, dass diese zum Wohle aller skandinavischen Nationen beitragen werde. Die Fortschritte unserer Nachbarn zu nutzen, könnte uns nur nützen. Die Frage ist: Erkennt der Zugang unserer Nachbarn zu unseren Fortschritten auch Nachteile?"
 est.22.a:0 "Mehr technologischer Fortschritt in skandinavischen Händen wäre gut für uns!"
 est.22.b:0 "Eine Forschungszusammenarbeit klingt lohnend. Warum sollten wir ihnen nicht regelmäßig unsere Chemiker zur Verfügung stellen?"
 est.22.c:0 "Unsere technologischen Fortschritte in ausländischen Händen? Klingt ein bisschen zu riskant …"
 est.23.t:0 "[From.GetName] ist der Nordic Research Collaboration beigetreten"
 est.23.d:0 "[From.GetName] hat sich klugerweise für die Teilnahme an unserer Forschungskooperation entschieden."
 est.24.t:0 "[From.GetName] weigert sich, der Nordic Research Collaboration beizutreten"
 est.24.d:0 "[From.GetName] scheint seine Technologie besser zu schützen, als wir erwartet hatten."
 est.24.a:0 "Wir haben mehr von ihnen erwartet"
 est.25.t:0 "Gründung der Nordischen Union"
 est.25.d:0 "Die militärische Führung und die starke öffentliche Unterstützung Schwedens, Finnlands und Estlands haben sich auf ein gemeinsames Verteidigungsbündnis geeinigt. Angesichts der zunehmenden Spannungen in Europa ist es ratsam, sich auf das Schlimmste vorzubereiten. Die Einbeziehung einiger friedlicherer europäischer Nationen dürfte die diplomatische Dynamik aufrechterhalten."
 EST_nordic_research_name:0 "Nordische Forschungszusammenarbeit"
 EST_nordic_research_desc:0 "Die nordischen Länder haben sich in einem Forschungsaustauschabkommen zusammengeschlossen, mit der Absicht, zum gemeinsamen Wohl aller nordischen Länder zu arbeiten."
 est.26.t:0 "Vapsid gewinnt die Wahl"
 est.26.d:0 "Die Liberale Partei von Vapsid ist wiedergewählt worden und hat die Mehrheit der Stimmen erhalten. Seit 1934, als Päts an die Macht kam, war die Partei verboten, aber nach den jüngsten Regierungsereignissen wurde sie nun geändert"
 est.27.t:0 "Finnische Unterstützung anfordern?"
 est.27.d:0 "Estland und die Sowjetunion befinden sich im Krieg. Nach nur wenigen Jahrzehnten Souveränität laufen wir nun Gefahr, erneut von einem unserer Nachbarn unterworfen zu werden. Unsere Nachbarn in Finnland stehen der Sowjetunion aufgrund ihrer Expansionspolitik weiterhin feindselig gegenüber und könnten möglicherweise davon überzeugt werden, Freiwillige und Ausrüstung zu schicken. Finnland hatte bereits 1918-1920 im Krieg gegen die Bolschewiki zu unserer Unabhängigkeit beigetragen, und wir werden unsere Souveränität erneut bis zum bitteren Ende verteidigen!"
 est.28.t:0 "Estland bittet um unsere Hilfe"
 est.28.d:0 "Unser Nachbar Estland hat sich dem Druck der Sowjetunion nicht gebeugt, und die beiden Länder befinden sich nun im Kriegszustand. Obwohl zwischen unseren Ländern kein formelles Bündnis vereinbart wurde, hat die estnische Regierung Finnland gebeten, zur gemeinsamen Verteidigung des Ida-Virumaa-Gebiets beizutragen. Während die Regierung weiterhin uneins darüber ist, welche Schritte wir unternehmen sollten, um Estland zu helfen, ist die öffentliche Unterstützung für die Verteidigung des Landes bemerkenswert. Wie weit sind wir bereit zu gehen, um unsere Nachbarn vor der Aggression aus dem Osten zu schützen?"
 est.29.d:0 "Die finnische Regierung war bereit, unseren Kampf gegen die Sowjetunion zu unterstützen, da sie in unseren Nachbarländern großen Rückhalt genießt. Viele Freiwillige aus den anderen nordischen Ländern haben sich bereit erklärt, sich uns anzuschließen und die Kriegsanstrengungen zu unterstützen. Obwohl weniger als erhofft, ist die Bevölkerung sich der Bedrohung, der wir ausgesetzt sind, zumindest bewusst."
 est.30.t:0 "Die Krise ist vorbei"
 est.30.d:0 "Seit Beginn der Weltwirtschaftskrise 1929, als die Industrie und die Landwirtschaft jeweils um 20 bis 45 Prozent zurückgingen, haben wir nun endlich das Niveau von vor den 1930er Jahren übertroffen. Es ist Zeit, wieder auf die Beine zu kommen!"
 est.31.t:0 "Wirtschaftsreform"
 est.31.d:0 "Nach dem Unabhängigkeitskrieg 1918–1920 war die estnische Wirtschaft in einem sehr schlechten Zustand, da die Kriegsindustrie nicht zu unserer Wirtschaftsstruktur passte und das Land zahlreiche ausländische Kredite aufgenommen hatte.\n\nUm das Wachstum der estnischen Wirtschaft in der Zukunft zu sichern, müssen wir einige unserer wirtschaftlichen und logistischen Probleme lösen."
 est.32.t:0 "Estland fordert unsere Annexion"
 est.32.d:0 "Estland teilte uns per Telegramm mit, dass sie uns unter estnischer Führung vereint sehen wollen. Sollten wir uns weigern, würden sie uns angreifen, haben sie uns gedroht."
 est.33.t:0 "Lettland hat abgenommen"
 est.33.d:0 "Lettland hat uns mitgeteilt, dass es nicht die Absicht hat, sich uns anzuschließen, und bereit ist, sich gegen jede mögliche Aggression zu verteidigen, die seine Unabhängigkeit bedrohen könnte. Lettland hat uns höflich gebeten, unsere Expansionsgedanken aufzugeben und eine friedliche Lösung zu finden."
 est.34.t:0 "Estland wird wegen wachsender Popularität des Faschismus kritisiert"
 est.34.d:0 "Die Politik in unserem System hat den gleichen Weg eingeschlagen wie in Italien. Wir sind jetzt ein echtes faschistisches Regime.\n\nLeider haben die jüngsten Regierungswechsel negative Aufmerksamkeit im Ausland erregt. Schweden und Finnland haben neue Sanktionen verhängt, in der Hoffnung auf eine Rückkehr zur Demokratie."
 est.35.t:0 "Befestigungsbemühungen"
 est.35.d:0 "Um unser Land vor der Aggression unserer östlichen Nachbarn zu schützen, ist es ratsam, auf das Schlimmste vorbereitet zu sein und mit den Vorbereitungen für die Verteidigung unseres Landes gegen jede Bedrohung zu beginnen."
 est.36.t:0 "Lettische Flüchtlinge"
 est.36.d:0 "Unser südliches Nachbarland Lettland hat den sowjetischen Forderungen nachgegeben und ihnen den Bau von Militärstützpunkten in ihrem Land gestattet, was bedeutet, dass Lettland nach 20 Jahren Unabhängigkeit erneut von den Sowjets kontrolliert wird.\n\nDies hat dazu geführt, dass Tausende Letten bei unserer Regierung Zuflucht suchen, um vor möglichen kommunistischen Verfolgungen und Deportationen zu fliehen, die im ganzen Land begonnen haben."
 est.37.t:0 "Neue Investitionsmöglichkeit"
 est.37.d:0 "Der schwedische Geschäftsmann Henrik Oswaldson hat unserem Wirtschaftsminister Ants Piip mitgeteilt, dass er die Gründung eines Glasunternehmens in Võhma plant. Die Eröffnung seines Unternehmens würde neue Arbeitsplätze in der Region schaffen und zur Entwicklung der Industrie unseres Landes beitragen."
 est.38.t:0 "Deutscher König für Estland?"
 est.38.d:0 "Da wir nun eine gute Freundschaft mit Deutschland pflegen, wird uns Friedrich Karl als Staatsoberhaupt angeboten.\n\n Friedrich wurde am 9. Oktober 1918 zum König von Finnland gewählt, verzichtete jedoch am 14. Dezember 1918 nach dem Ende des Ersten Weltkriegs, der auch die Monarchien in Deutschland beendete, auf den Thron. Nach den jüngsten Veränderungen in Europa und der kurz vor dem Zusammenbruch stehenden Demokratie hat uns Deutschland jedoch zum ersten Mal in unserer Geschichte gefragt, ob wir unser Land zum Königreich erklären wollen."
 est.39.t:0 "Die Moskauer Prozesse"
 est.39.d:0 "Die Sowjetunion durchlebte und durchlebt weiterhin große und brutale interne Veränderungen. Viele einflussreiche Persönlichkeiten wurden während der berüchtigten Moskauer Prozesse verurteilt. \n\nDie internationale Presse durfte an den Prozessen teilnehmen. Dabei wurde festgestellt, dass überraschend viele Angeklagte schwere Verbrechen innerhalb der Sowjetunion zugaben. Wurden sie möglicherweise zu diesen Geständnissen gezwungen oder unter Druck gesetzt? Versucht der Generalsekretär, politische Gegner loszuwerden? \n\nNachdem die Nachrichten nach Estland gelangten, spekulierten Medien und Öffentlichkeit über die Geschehnisse und verurteilten die Prozesse oft als ungerecht und verdächtig. Viele unserer politischen Parteien distanzieren sich inzwischen von der Komintern und haben sich gemäßigt. Wie sollen wir mit diesen Berichten aus Moskau umgehen?"
 est.40.t:0 "Die Sowjetunion beanspruchte unser Territorium"
 est.40.d:0 "Unser Diplomat Karl Ristikivi aus der Sowjetunion hat eine sehr wichtige Information zusammengetragen: Nachdem die Sowjets während der Russischen Revolution die gesamten baltischen Staaten, Finnland und Polen verloren hatten, versuchen sie nun, all diese Regionen wieder zu reintegrieren."
 est.41.t:0 "Führer für unsere Nation"
 est.41.d:0 "Nach der erfolgreichen Vereinigung aller baltischen Länder und der Gründung des Baltischen Herzogtums sind wir nun die wahre dominierende Macht dieser Region. Die Länder mögen vereint sein, die Menschen jedoch nicht. Ein starker Staat braucht einen neuen starken Führer, der unser Land zum Wohlstand führen kann."
 est.42.t:0 "Estland fordert unsere Integration"
 est.42.d:0 "Estland hat angekündigt, dass es unsere Länder unter einer einheitlichen Herrschaft vereint sehen möchte. Sollten wir uns weigern, werden sie uns angreifen, haben sie angekündigt."
 est.43.t:0 "Lettland lehnte unser Angebot ab"
 est.43.d:0 "Lettland hat mitgeteilt, dass es nicht die Absicht hat, sich uns anzuschließen und keinen Sinn darin sieht, unsere Länder zu vereinen. Die lettische Armee ist bereit, sich gegen jede mögliche Aggression zu verteidigen, die ihre Unabhängigkeit bedrohen könnte."
 est.44.t:0 "Estland fordert unser Land"
 est.44.d:0 "Estland hat angekündigt, dass es unsere Länder unter einer einheitlichen Herrschaft vereint sehen möchte. Sollten wir uns weigern, werden sie uns angreifen, so wie sie es mit unserem Naber, Lettland, getan haben."
 est.45.t:0 "Litauen hat unsere Forderungen abgelehnt!"
 est.45.d:0 "Wie erwartet hat die litauische Regierung unser Angebot zur friedlichen Integration aller baltischen Staaten abgelehnt.\n\nDies hat nun zu einer Situation geführt, in der wir eingreifen und militärische Gewalt einsetzen sollten, um das Vereinigte Baltische Herzogtum auszurufen!"
 est.46.t:0 "Der Fall Berlins"
 est.46.d:0 "Vielleicht wurde heute der letzte Nagel in den Sarg des Reiches geschlagen, als es estnische Truppen endlich das Dach des Reichstags erreichten. Kurz darauf wurde die estnische blau-schwarz-weiße Flagge gehisst, und die Truppen begannen nun mit der Räumung der letzten Stadtteile von der deutschen Armee. Gefangenenzüge haben bereits ihren Marsch durch die Straßen zu provisorischen Militärlagern in den Vororten angetreten, und estnische Soldaten haben bereits damit begonnen, Suppenküchen und Außenposten in der ganzen Stadt zu errichten, um den langen Weg der Erholung einzuleiten."
 est.47.t:0 "Der Fall Moskaus"
 est.47.d:0 "Die estnische Regierung gab heute bekannt, dass die estnische Armee die russische Hauptstadt nach erbitterten Straßenkämpfen erfolgreich eingenommen hat. Der Großteil der einst stolz als Drittes Rom der Welt bezeichneten Stadt ist heute eine Ruine aus Leichen und Panzerwracks. In den Zeitungen kursieren bereits Bilder von estnischen Soldaten, die die Trikolore über den Überresten des Kremls hissen – dem letzten Hindernis nach den Kämpfen. Obwohl einige Russen in den Innenstädten der Stadt noch Widerstand leisten, haben sich die meisten ergeben. Die Esten haben bereits Kontrollpunkte und Suppenküchen eingerichtet, um die massive humanitäre Krise zu bewältigen, die die Kämpfe hinterlassen haben."
 est.48.t:0 "Der Fall von Kaunas"
 est.48.d:0 "Estland hat die Verteidiger Litauens überwältigt und unter seine Kontrolle gebracht. Kaunas ist an die estnischen Invasoren gefallen, die estnische Armee hat Kaunas von den litauischen Verteidigern erobert.\n\nObwohl die Straßen im Norden des Landes stark verteidigt waren, war Kaunas relativ schutzlos, als die Litauer die Stadt angesichts der Einkesselung durch ausländische Truppen evakuierten.\n\nObwohl die führenden Regierungsbeamten entkommen sind, fällt das Land schnell dem estnischen Vormarsch zum Opfer."

 #focus
 EST_the_four_year_plan:0 "Der Zweijahresplan"
 EST_the_four_year_plan_desc:0 "Unsere Industrie und Landwirtschaft erreichen nicht mehr die Produktion vor der Weltwirtschaftskrise. Beginnen wir mit der Verbesserung dieser Situation, indem wir den Zweijahresplan in die Tat umsetzen."
 EST_tallinn_tartu_highways:0 "Autobahnen Tallinn-Tartu"
 EST_tallinn_tartu_highways_desc:0 "Infrastruktur ist wichtig für den Verkehr. Sie ermöglicht unseren Truppen, schneller voranzukommen und mehr Ausrüstung zu transportieren. Wir müssen es den Deutschen gleichtun und unsere eigene Autobahn bauen."
 EST_develop_our_railroads:0 "Entwickeln Sie unsere Eisenbahnen"
 EST_develop_our_railroads_desc:0 "Unser Eisenbahnnetz ist noch immer recht unterentwickelt. Unsere Truppen können es sich nicht leisten, auf der Durchreise stecken zu bleiben. Wir müssen unsere alten Eisenbahnstrecken reparieren und erweitern."
 EST_build_better_capital:0 "Bauen Sie ein besseres Kapital auf"
 EST_build_better_capital_desc:0 "Die Hauptstadt Tallinn ist voller alter und schlecht aussehender Holzhäuser. Unsere Altstadt hat sich im Laufe der Zeit stark verändert und muss restauriert werden."
 EST_invest_in_the_military:0 "Investieren Sie in das Militär"
 EST_invest_in_the_military_desc:0 "Der Versuch, zivile Fabriken für die Produktion militärischer Ausrüstung umzurüsten, ist ineffizient. Wir sollten uns jetzt auf die Vorbereitung der Rüstungsproduktion konzentrieren."
 EST_more_civilian_factories:0 "Mehr zivile Fabriken"
 EST_more_civilian_factories_desc:0 "In den Städten ist die Arbeitslosigkeit hoch. Der Bau weiterer Fabriken schafft mehr Arbeitsplätze und einen besseren Lebensstandard."
 EST_start_central_industrial_region:0 "Start Industrieregion Mitte"
 EST_start_central_industrial_region_desc:0 "Legen Sie den Grundstein für unsere zentralisierte Rüstungsindustrie."
 EST_the_bombe:0 "Die Bombe"
 EST_the_bombe_desc:0 "Unsere Ingenieure haben eine geniale Maschine entwickelt, die sie „Kryptologische Bombe“ nennen und die die Chiffren unserer Feinde knacken kann. Wir verfügen in unserem Werk in Tartu Park über die nötigen Ressourcen, um sie weiterzuentwickeln."
 EST_protect_against_the_red_army:0 "Schutz vor der Roten Armee"
 EST_protect_against_the_red_army_desc:0 "Durch die Befestigung wichtiger Gebiete machen wir uns weniger verwundbar, sollte es an unseren Küsten und Grenzen erneut zu Kriegen kommen."
 EST_it_is_not_enough:0 "Es ist nicht genug"
 EST_it_is_not_enough_desc:0 "Lassen Sie uns unsere Befestigungsbemühungen maximieren, um sicherzustellen, dass wir nie wieder einer anderen Besatzung zum Opfer fallen."
 EST_command_forest_industry:0 "Kolhoses"
 EST_command_forest_industry_desc:0 "Schicken Sie Menschen in die Kolhose, damit sie für das Gemeinwohl arbeiten."
 EST_tartu_university_studies:0 "Studium an der Universität Tartu"
 EST_tartu_university_studies_desc:0 "Unsere Wissenschaftler leisten hervorragende Arbeit und eröffnen uns neue Möglichkeiten in Forschung und Entwicklung, die wir nutzen sollten. Mit einer hochmodernen technischen Universität im Herzen unseres Landes können wir mehr Forschung betreiben."
 EST_additional_research_slot:0 "Zusätzlicher Forschungsplatz"
 EST_additional_research_slot_desc:0 "Die Jahrhunderte der Besatzung haben den Fortschritt halbiert, aber jetzt, da wir frei sind, können wir mit der modernen Technologie Schritt halten."
 EST_the_defence:0 "Die Verteidigung"
 EST_the_defence_desc:0 "Wenn die Verteidigung unseres Heimatlandes erfolgreich sein soll, müssen noch mutigere Strategien entwickelt werden."
 EST_expand_port_paldiski:0 "Erweiterung des Hafens von Paldiski"
 EST_expand_port_paldiski_desc:0 "Paldiski ist unser wichtigster Zugang zur Ostsee und liegt in der Nähe unserer Hauptstadt und des Finnischen Meerbusens. Wenn wir einen stetigen Zufluss von Ressourcen aus den Meeren sicherstellen wollen, müssen wir diesen Hafen ausbauen."
 EST_spread_democracy:0 "Demokratie verbreiten"
 EST_spread_democracy_desc:0 "Faschismus und Kommunismus stellen eine große Bedrohung für alle friedlichen Bürger dar. Demokratie ist die Grundlage der Zivilisation und wird es auch bleiben. Lasst uns diese Ideologie in unseren Nachbarländern verbreiten."
 EST_help_from_allies:0 "Hilfe von Verbündeten"
 EST_capitalise_our_nation:0 "Industrie kapitalisieren"
 EST_capitalise_our_nation_desc:0 "Die Freiheit des Kaufens und Produzierens steht im Mittelpunkt vieler demokratischer Nationen. Vielleicht ist es an der Zeit, Subtilität und Nachfrage zu akzeptieren."
 EST_prepare_for_war:0 "Bereite dich auf den Krieg vor"
 EST_prepare_for_war_desc:0 "Der Große Unabhängigkeitskrieg war möglicherweise nur der erste seiner Art. Wir müssen uns auf ein sich mit Sicherheit ständig veränderndes Schlachtfeld vorbereiten."
 EST_support_the_left:0 "Arbeiterrevolution"
 EST_support_the_left_desc:0 "Hören Sie die Revolution kommen?! Wer sich der Revolution widersetzt, wird von ihrer Macht erdrückt werden. Der einzige Weg, sie zu überleben, besteht darin, sich ihr anzuschließen!"
 EST_ensv:0 "ENSV"
 EST_ensv_desc:0 "Lasst uns eine Zivilmiliz gründen, um das Heimatland vor Faschismus und Kapitalismus zu schützen."
 EST_create_our_faction:0 "Estland kann in den nordischen Raum"
 EST_create_our_faction_desc:0 "Gründen Sie unsere eigene Fraktion und schützen Sie unsere Interessen im Baltikum."
 EST_march_on_tallinn:0 "Marsch auf Tallinn"
 EST_march_on_tallinn_desc:0 "Die Regierung hört nicht auf die Menschen und ihre klaren Forderungen, Estland müsse den Forderungen ausländischer Schakale untergeordnet werden. Wenn wir genügend Menschen zusammentrommeln und in die Hauptstadt marschieren, werden wir die nutzlosen ausländischen Marionetten los, die derzeit dort leben."
 EST_seek_accommodation_with_germany:0 "Suchen Sie eine Unterkunft in Deutschland"
 EST_seek_accommodation_with_germany_desc:0 "Deutschland, der Anführer der Achsenmächte, ist das stärkste Land Europas. Wir sollten versuchen, uns ihm bei seiner Eroberung der Welt anzuschließen."
 EST_foundation_of_kumu:0 "Gründung von Kumu"
 EST_foundation_of_kumu_desc:0 "Kumu ist ein 1938 gegründetes estnisches Volksmuseum. Lassen Sie uns dieses Gebäude errichten, damit unsere zukünftigen Enkel sehen können, was für großartige Dinge ihre Großväter in der Vergangenheit vollbracht haben."
 EST_invest_in_the_military_II:0 "Investieren Sie in das Militär II"
 EST_invest_in_the_military_II_desc:0 "Unsere Generäle sagen, wir hätten viel Platz für neue Rüstungsfabriken. Es scheint auch willige Investoren zu geben. Lasst uns unsere militärisch-industrielle Kapazität ausbauen."
 EST_more_civilian_factories_II:0 "Mehr zivile Fabriken II"
 EST_more_civilian_factories_II_desc:0 "Durch den weiteren Ausbau unserer Fabriken können wir die Produktion von Waren für den Handel und weitere Bauvorhaben beschleunigen."
 EST_heavy_industry:0 "Schwerindustrie"
 EST_heavy_industry_desc:0 "Unsere Fabriken sollten nicht auf ausländische Materialien angewiesen sein. Durch die Ausweitung unserer Metallproduktion können wir uns von der Abhängigkeit von Importen anderer Länder befreien."
 EST_invite_finland:0 "Finnland einladen"
 EST_invite_finland_desc:0 "Die Beziehungen Estlands zu unseren nördlichen Nachbarn waren schon immer stark. Wir teilen dieselbe Kultur und Sprache. Allein sind wir leichte Beute, aber gemeinsam sind wir eine beachtliche Macht. Denn Einheit macht stark!"
 EST_blueshirts:0 "Blauhemden"
 EST_blueshirts_desc:0 "Die Deutschen hatten ihre Braunhemden, die hervorragend darin waren, die Unterstützung für die NSDAP zu stärken und Feinde des deutschen Staates zu unterdrücken. Wir sollten unsere eigene Verteidigungsarmee um die Verteidigungsarmee herum bilden. Blau passt besser zu unserem nordischen Temperament. Eine solche Organisation wird unserer Armee helfen, indem sie viele willige Rekruten liefert, die ihr Land verteidigen wollen."
 EST_isamaaliit:0 "Isamaalit"
 EST_isamaaliit_desc:0 "Unsere Nation ist vom Krieg geprägt. Von jedem Mann wird seit jeher erwartet, dass er dient. Angesichts der drohenden Kriegsgefahr ist es klar, dass wir diese Streitkräfte einberufen müssen."
 EST_return_of_vapsid:0 "Rückkehr von Vapsid"
 EST_return_of_vapsid_desc:0 "Vapsid war eine politische Organisation, die nach dem Unabhängigkeitskrieg 1920 gegründet wurde, um die Interessen der Soldaten zu schützen. Sie war an der Macht, bis Konstantin Páts Staatsoberhaupt wurde und alle politischen Parteien auflöste. Jetzt ist es an der Zeit, die Organisation wiederherzustellen und Páts zu stürzen!"
 EST_humanite_unite:0 "L&#39;unité de I&#39;humanité"
 EST_humanite_unite_desc:0 "Die fetten Banker und machthungrigen Demagogen festigen ihren blutigen Griff um die Welt. Wenige werden reich und mehr verarmen. Unsere Ideale werden mehr denn je gebraucht! Die Menschheit braucht uns, und wir müssen die Menschheit vereinen!"
 EST_interventionism:0 "Interventionismus"
 EST_interventionism_desc:0 "Obwohl Estland ein kleines Land ist, verfügen wir möglicherweise dennoch über eine beträchtliche Armee, die in den Krieg geschickt werden könnte, wenn wir unsere Heimatfront vernachlässigen."
 EST_revive_the_right_wing:0 "Den rechten Flügel wiederbeleben"
 EST_revive_the_right_wing_desc:0 "Ein starkes Land braucht einen ebenso starken Führer. Diesen feigen Demokraten fehlt die Autorität, unsere stolze Nation zu Größe zu führen. Wir müssen töten oder getötet werden! Es gibt keinen Mittelweg."
 EST_standardization_of_equipment:0 "Standardisieren Sie die Ausrüstung"
 EST_standardization_of_equipment_desc:0 "Durch die Vereinheitlichung der Ausrüstung unserer Soldaten legen wir den Grundstein für einen modernen Versorgungsapparat."
 EST_escort_effort:0 "Eskortaufwand"
 EST_escort_effort_desc:0 "U-Boote stellen eine Gefahr für unsere Handelskonvois dar. Die Entwicklung neuer Zerstörermodelle wird es uns ermöglichen, einen effizienten U-Boot-Krieg zu führen."
 EST_navy_tactics:0 "Marinetaktiken"
 EST_navy_tactics_desc:0 "Indem wir uns auf die Gegentaktiken konzentrieren, die wir brauchen, um unseren wahrscheinlichsten Feinden entgegenzutreten, behalten wir im Kampf die Oberhand."
 EST_destroyer_focus:0 "Zerstörerfokus"
 EST_destroyer_focus_desc:0 "Moderne Schlachtschiffe sind Wunderwerke, aber wir dürfen die entscheidende Rolle des bescheidenen Zerstörers beim Schutz unserer Konvois nicht vernachlässigen"
 EST_army_modernisation:0 "Modernisierung der Armee"
 EST_army_modernisation_desc:0 "Moderne Waffen für moderne Männer!"
 EST_strengthen_the_government:0 "Stärkung der Regierung"
 EST_strengthen_the_government_desc:0 "Wir können es uns nicht leisten, gespalten zu bleiben. Unsere Stärke, Veränderungen herbeizuführen, ist proportional zu unserer Einheit im Parlament und in der Regierung."
 EST_nobody_expects:0 "Niemand erwartet"
 EST_nobody_expects_desc:0 "Wir dürfen die Chance nicht verpassen, als Erste einen Weg zu finden, das Urfeuer der Kernspaltung nutzbar zu machen."
 EST_create_our_own_faction:0 "Unsere eigene Fraktion gründen"
 EST_create_our_own_faction_desc:0 "Während Deutschland derzeit die treibende Kraft des Faschismus in der Welt ist, kann Estland aus eigener Kraft expandieren. Wir müssen uns nicht ihrer Fraktion anschließen und unter ihrem Kommando stehen. Lasst uns unser Schicksal selbst gestalten!"
 EST_study_foreign_tanks:0 "Studieren Sie ausländische Panzer"
 EST_study_foreign_tanks_desc:0 "Diese „Panzer“ werden in den heutigen bewaffneten Konflikten eine zentrale Rolle spielen und wir müssen mit allen erforderlichen Mitteln dafür sorgen, dass wir mit unseren Nachbarn Schritt halten."
 EST_invite_german_experts:0 "Laden Sie deutsche Experten ein"
 EST_invite_german_experts_desc:0 "Wir haben nicht viel Zeit, um unsere eigenen Panzer zu entwickeln. Wir sollten Ingenieure einladen, mit ausländischen Panzern zu arbeiten, um deren Stärken und Schwächen herauszufinden und noch bessere Panzer zu entwickeln."
 EST_build_paldiski_port:0 "Baue den Hafen Paldiski"
 EST_build_paldiski_port_desc:0 "Der Ausbau der Marine sollte eine unserer obersten Prioritäten sein. Setzen Sie alle verfügbaren Ressourcen ein, um weitere Docks an unserem bereits bestehenden Standort „Paldiski“ zu bauen."
 EST_finish_central_industrial_region:0 "Zentrale Industrieregion Finnlands"
 EST_finish_central_industrial_region_desc:0 "Lassen Sie uns unsere zentralisierte Rüstungsindustrie beenden."
 EST_planned_expansion:0 "Geplante Erweiterung"
 EST_planned_expansion_desc:0 "Um unseren heimischen Baumarkt anzukurbeln und unsere industriellen Anstrengungen auszuweiten, können wir der Regierung erlauben, in öffentliche Bauunternehmen zu investieren."
 EST_start_fundraising:0 "Mehr Spenden sammeln"
 EST_start_fundraising_desc:0 "Estlands Kinder wachsen unterernährt auf, da unsere Industriekapazitäten auf die Finanzierung des Krieges ausgerichtet sind. Unsere verbündeten Freunde hinter den Frontlinien leiden jedoch nicht unter einer solchen Katastrophe. Wir müssen sie bitten, einen Teil ihrer Ressourcen zu spenden, damit unser Volk wirklich siegen kann."
 EST_gender_equality:0 "Gleichstellung der Geschlechter"
 EST_gender_equality_desc:0 "Unsere Statistiken besagen, dass Männer, die gleich viel arbeiten wie Frauen, mehr verdienen und bessere Chancen auf bessere Jobs haben. Das ist Unsinn, und wir müssen es ändern. Frauen müssen auch die gleichen Rechte haben!"
 EST_motorized_focus:0 "Motorisierter Fokus"
 EST_motorized_focus_desc:0 "Wenn wir irgendwelche Angriffsoperationen starten wollen, sollten wir zumindest teilweise über eine motorisierte Armee verfügen."
 EST_Livonian_bridgehead_strategy:0 "Livländischer Brückenkopf"
 EST_Livonian_bridgehead_strategy_desc:0 "Sollten sich die Kämpfe gegen uns wenden, müssen wir gemeinsam mit unseren Freunden und Verbündeten Pläne für eine wirksame Umgruppierung und Vergeltung haben."
 EST_kohta_jarve_oil_sources:0 "Kohtla-Järve-Ölquellen"
 EST_kohta_jarve_oil_sources_desc:0 "Wir haben gerade erste Spuren kommerziell nutzbarer Ölfelder in Kohtla-Järve entdeckt. Wissenschaftler gehen davon aus, dass dort so viel Öl lagert, dass unsere Industrie damit Hunderte von Jahren versorgt werden kann! Es ist Zeit, mit den Bohrungen zu beginnen."
 EST_artillery_modernisation:0 "Modernisierung der Artillerie"
 EST_artillery_modernisation_desc:0 "Wir dürfen es nicht versäumen, die für einen effektiven Einsatz unserer Soldatinnen und Soldaten notwendige Unterstützung zu verbessern und zu modernisieren."
 EST_anti_tank_guns:0 "Panzerabwehrkanonen"
 EST_anti_tank_guns_desc:0 "Jeder Feind wird mit Sicherheit Panzer gegen uns einsetzen, insbesondere die Sowjets. Wir müssen darauf vorbereitet sein, ihnen einen herzlichen Empfang zu bereiten."
 EST_air_base_expansion:0 "Erweiterung des Luftwaffenstützpunkts"
 EST_air_base_expansion_desc:0 "Luftwaffenstützpunkte sind für die Luftunterstützung ebenso wichtig wie die Luftunterstützung für die moderne Kriegsführung."
 EST_fighter_modernisation:0 "Modernisierung der Kampfflugzeuge"
 EST_fighter_modernisation_desc:0 "Unsere Kampfflugzeuge sind das Rückgrat jeder Luftwaffe und dürfen nicht überflüssig werden. Wenn sich unsere Luftwaffe verbessert, müssen auch sie verbessert werden."
 EST_air_innovations:0 "Luftinnovationen"
 EST_air_innovations_desc:0 "Im Bereich der Luftstrategie und -taktik gibt es noch viel zu tun."
 EST_heavy_fighter_concept:0 "Konzept eines schweren Jägers"
 EST_heavy_fighter_concept_desc:0 "Sollten wir gezwungen sein, in die Offensive zu gehen, brauchen wir einen neuen Typ von Kämpfer, der lange Zeit innerhalb feindlicher Grenzen operieren kann."
 EST_naval_bomber_experiments:0 "Marinebomber-Experimente"
 EST_naval_bomber_experiments_desc:0 "Die Lufthoheit ist auf See ebenso wichtig wie über Land. Spezialflugzeuge, die für die Seekriegsführung entwickelt wurden, sind ein Mittel, dieses Ziel zu erreichen."
 EST_medium_bomber_focus:0 "Fokus auf mittleren Bomber"
 EST_medium_bomber_focus_desc:0 "Eine Erweiterung der Präzisionsbombenphilosophie, angepasst für eine größere Reichweite zur Verwendung in unterstützenden Rollen."
 EST_light_bomber_focus:0 "Fokus auf leichten Bomber"
 EST_light_bomber_focus_desc:0 "Der Wert des Einsatzes von Sturzkampfbombern zur Luftnahunterstützung sollte nicht unterschätzt werden."
 EST_air_modernisations_programme:0 "Luftmodernisierungsprogramm"
 EST_air_modernisations_programme_desc:0 "Die Flugtheorie ist ebenso wichtig wie die Technologie. Es warten immer noch neue Strategien für unsere Piloten darauf, entdeckt zu werden."
 EST_people_first:0 "Der Mensch im Mittelpunkt"
 EST_people_first_desc:0 "Seit Beginn der Weltwirtschaftskrise 1929, als Industrie und Landwirtschaft jeweils um 20 bis 45 Prozent zurückgingen, haben wir nun endlich das Niveau von vor den 1930er Jahren übertroffen. Es ist Zeit, wieder auf die Beine zu kommen."
 EST_collectivist_propaganda:0 "Kollektivistische Propaganda"
 EST_collectivist_propaganda_desc:0 "Der Weg zum Ruhm ist auf beiden Seiten mit Tod gepflastert, wir müssen die Menschen davon ablenken"
 EST_demand_southern_lands:0 "Fordern Sie südliche Länder"
 EST_demand_southern_lands_desc:0 "Die lettische Regierung ist schwach und dumm. Wir müssen ihr den richtigen Weg weisen, wenn unser Land diese Ära überleben soll."
 EST_special_marine_forces:0 "Spezialeinheiten der Marine"
 EST_special_marine_forces_desc:0 "Lasst uns unsere ersten Marinedivisionen gründen!"
 EST_stay_neutral:0 "Autoritäre Führung"
 EST_stay_neutral_desc:0 "Warum für die Kriege anderer sterben? Wir blieben neutral und verteidigten unser Heimatland erfolgreich gegen Russland. Das hat uns gute Dienste geleistet. Und es wird uns auch weiterhin gute Dienste leisten."
 EST_protect_our_borders:0 "Schützen Sie unsere Grenzen"
 EST_protect_our_borders_desc:0 "Durch den Bau einiger Landfestungen werden wir den Sowjets zeigen, dass wir uns gegen jede Bedrohung von außen verteidigen wollen, nicht nur gegen ihre eigene."
 EST_armed_neutrality:0 "Estnischer Militarismus"
 EST_armed_neutrality_desc:0 "Um unsere Neutralität in diesen feindseligen Zeiten zu wahren, müssen wir zeigen, dass wir nicht kampflos untergehen und immer bereit sind, uns zu verteidigen."
 EST_deterrence:0 "Abschreckung"
 EST_deterrence_desc:0 "Die wachsende Bedrohung durch den europäischen Faschismus macht deutlich, dass Neutralitätserklärungen nicht ausreichen. Wir müssen uns bewaffnen, um unseren Status zu verteidigen."
 EST_reform_government:0 "Reformregierung"
 EST_reform_government_desc:0 "Durch Zusammenarbeit können wir sicherstellen, dass unser Land die vor uns liegenden dunklen Zeiten überstehen kann. Wenn wir erfolgreich sein wollen, müssen wir unsere Regierung von der Ideologie des Faschismus und Kommunismus befreien und diese Parteien in unserem Land verbieten."
 EST_invite_others:0 "Andere einladen"
 EST_invite_others_desc:0 "Dänemark und Norwegen einladen, damit wir eine vollständige Nordische Liga demokratischer Nationen bilden können."
 EST_defence_of_finland:0 "Verteidigung Finnlands"
 EST_defence_of_finland_desc:0 "Um auf eine mögliche sowjetische Invasion vollständig vorbereitet zu sein, müssen wir bereit sein, uns gegen den Bären zu verteidigen."
 EST_expand_technology_sharing:0 "Erweitern Sie den Technologieaustausch"
 EST_expand_technology_sharing_desc:0 "Erweitern Sie unseren Technologieaustausch, indem Sie alle unsere Verbündeten einladen."
 EST_nordic_technology_sharing:0 "Nordischer Technologieaustausch"
 EST_nordic_technology_sharing_desc:0 "Lassen Sie uns unsere Zusammenarbeit mit unseren Verbündeten durch ein Forschungsabkommen weiter ausbauen, damit wir alle davon profitieren können."
 EST_germanmilitaryhelp:0 "Deutsche Militärhilfe"
 EST_germanmilitaryhelp_desc:0 "Wir sollten Deutschland um Expeditionstruppen bitten, um unser Militär zu stärken und unser Bündnis gegen die Sowjetunion zu verteidigen."
 EST_king_for_our_nation:0 "König für unsere Nation"
 EST_king_for_our_nation_desc:0 "Nachdem wir gute Beziehungen zu Deutschland aufgebaut haben, besteht nun die Möglichkeit, die Führung unseres Landes zu wechseln. Ein starker Staat braucht einen starken Führer, und welcher Kandidat wäre dafür besser geeignet als ein deutscher Aristokrat?"
 EST_form_baltic_duchy:0 "Form Baltisches Herzogtum"
 EST_demand_latvia:0 "Lettland integrieren"
 EST_demand_latvia_desc:0 "Die lettische Regierung ist schwach und dumm. Wir müssen ihr den richtigen Weg weisen, wenn wir beide diese Ära überleben wollen."
 EST_demand_lithuania:0 "Litauens Schicksal"
 EST_demand_lithuania_desc:0 "Letzter, letzter Schritt zur baltischen Vereinigung. Litauen sollte sich uns beugen oder annektiert werden."
 
