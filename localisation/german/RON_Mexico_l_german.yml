  sedena:0 "Secretaría de la Defensa Nacional"
  sedena:0 "Nach der Säuberung des Militärs und dem Weggang von Calles haben Sie nun einen Verteidigungsminister ernannt, der Ihre Politik vertritt, nicht die Politik der Callistas."
  
  MEX_DN-I:0 "DN-I"
  MEX_DN-I_desc:0 "DN-1 ist einer von drei realen Plänen für die nationale Sicherheit Mexikos. Sein Inhalt wird alle paar Jahre überarbeitet, und der Inhalt seiner modernen Version ist unbekannt. Er wurde nur einmal aktiviert, und zwar beim Eintritt Mexikos in den Zweiten Weltkrieg."
  
  MEX_DN-I2:0 "DN-I"
  MEX_DN-I2_desc:0 "DN-1 ist einer von drei realen Plänen für die nationale Sicherheit Mexikos. Sein Inhalt wird alle paar Jahre überarbeitet, und der Inhalt seiner modernen Version ist unbekannt. Er wurde nur einmal aktiviert, und zwar beim Eintritt Mexikos in den Zweiten Weltkrieg."
  
  MEX_DN-I3:0 "DN-I"
  MEX_DN-I3_desc:0 "DN-1 ist einer von drei realen Plänen für die nationale Sicherheit Mexikos. Sein Inhalt wird alle paar Jahre überarbeitet, und der Inhalt seiner modernen Version ist unbekannt. Er wurde nur einmal aktiviert, und zwar beim Eintritt Mexikos in den Zweiten Weltkrieg."
  
  MEX_DN-II: "DN-II"
  MEX_DN-II_desc:0 "DN-II ist der zweite der drei Hauptpläne. DN-II ist ein realer Plan für inländische Bedrohungen für Mexiko wie Putsche, Revolutionen und Terrorismus. Der dritte Plan befasst sich mit Naturkatastrophen."
  
  railroad:0 "Ferrocarriles Nacionales de México"
  railroad_desc:0 "Der verstaatlichte Eisenbahnverkehr wurde verstaatlicht, um die Entwicklung der internen Infrastruktur auf der Grundlage des Bedarfs und nicht der Rentabilität zu erzwingen."
  
  chemical:0 "Abteilung für chemische Waffen"
  chemical_desc:0 "Mexiko hatte bereits den Einsatz chemischer Waffen zur Verteidigung gegen eine Invasion in Erwägung gezogen. Dieser Vorschlag wurde jedoch abgelehnt, da die politischen Folgen einen Grund für eine Invasion Mexikos und ein Embargo gegen das Land geboten hätten. Das genaue Gegenteil dessen, was Mexiko wollte, da es den Handel zur Weiterentwicklung seiner Wirtschaft nutzen wollte."
  
  # JUNTA UPDATE 
  
  cardenas2:0 "Lazaro Cardenas"
  cardenas2_desc:0 "Cárdenas trieb während seiner Amtszeit die Idee der Massenmobilisierung voran. Er wollte, dass die mexikanische Arbeiterklasse aufstand und das Militär bei der Verteidigung des Landes unterstützte, indem er die ländlichen Milizen bewaffnete und professionalisierte und die Ejido-Länder militarisierte."
  
  matias2:0 "Matias Ramos Santos"
  
  fierro:0 "Roberto Fierro"
  
  # tech update
  
  abelardo:0 "Abelardo Rodriguez"
  abelardo_desc:0 "Abelardo war ein mexikanischer Wirtschaftsmagnat, General und Interimspräsident. Er gründete 80 Unternehmen und war an insgesamt 120 beteiligt. Er gründete Baja California, einen Militärlieferanten für die Luftfahrt, und die Rodriguez Shipyards in Tijuana."
  
  rodriguez:0 "Rodriguez-Werft"
  rodriguez_desc:0 "Die Rodriguez-Werft in Tijuana gehört dem Wirtschaftsmagnaten und ehemaligen mexikanischen Präsidenten Abelardo Rodriguez. Den wenigen verfügbaren Informationen zufolge konzentrierte man sich auf kleinere Schiffe."
  
