  mexico_minor.2.t:0 "Escobar kehrt nach Mexiko zurück!"
  mexico_minor.2.d:0 "José Gonzalo Escobar, der Anführer des gescheiterten Escobar-Aufstands, ist aus seinem Exil zurückgekehrt und kehrt in seine Heimat Mexiko zurück. Escobar erklärte, er müsse seinem Land in dieser Zeit der Not beistehen. Escobar war der Anführer eines gescheiterten Putsches während des mexikanischen Maximato, bei dem er zunächst in den Bodenkämpfen erfolgreich war und dann von der mexikanischen Luftwaffe vernichtend geschlagen wurde."
  mexico_minor.2.a:0 "Es lebe Mexiko!"
  mexico_minor.2.b:0 "Wer was?"
  
  #MEXICO_minor.3 IS A HIDDEN TRIGGER.
  
  mexico_minor.4.t:0 "Mexiko heißt spanische Intellektuelle willkommen"
  mexico_minor.4.d:0 "[Root.GetLeader] hat angekündigt, Intellektuelle, die vor dem Spanischen Bürgerkrieg fliehen, im mexikanischen Universitätssystem willkommen zu heißen. Ein neuer Campus namens „Das Haus Spaniens“ soll den Intellektuellen die Möglichkeit geben, ihre Arbeit fortzusetzen. Finanziert wurde der Campus von einer Koalition aus Banken, Bundesbehörden und Interessengruppen."
  mexico_minor.4.b:0 "Wirklich eine humanitäre Tat."
  mexico_minor.4.a:0 "Bauen Sie es und sie werden kommen."
  
  mexico_minor.5.t:0 "Caudillo-Zuschüsse"
  mexico_minor.5.d:0 "Die Caudillos fordern Forschungsstipendien zur Modernisierung unseres Militärzweigs. Welche Stipendien sollten wir finanzieren?"
  mexico_minor.5.a:0 "Zuschüsse für Infanterieausrüstung"
  mexico_minor.5.b:0 "Luftfahrtzuschüsse"
  mexico_minor.5.c:0 "Panzerzuschüsse"
  
  mexico_minor.6.t:0 "Danke fürs Spielen!"
  mexico_minor.6.d:0 "Vielen Dank für das Herunterladen von Cuse of Huitzilopochtli! Für die neuesten Hotfixes und neuen Inhalte abonnieren Sie unbedingt das Hauptmod, wenn Sie nur Road to &#39;56 spielen! \n Dieses Mod war eine Herzensangelegenheit und das Ergebnis meiner Unzufriedenheit mit dem völlig unhistorischen Mexiko in Hearts of Iron IV.\n\n Ich habe viele Bücher über mexikanische Geschichte gelesen, um dieses Mod zu erstellen, mehrere mexikanische Dokumentationen durchforstet, alte mexikanische Militärdokumente ausgegraben, ein von der mexikanischen Regierung veröffentlichtes Buch mit den Biografien aller mexikanischen Politiker der letzten fast 100 Jahre durchforstet und große Anstrengungen unternommen, um trotz der Einschränkungen des Spiels selbst so historisch wie möglich zu sein und gleichzeitig Ideen aus dieser Zeit aufzunehmen, um tatsächlich mögliche alternative Geschichten einzubeziehen.\n\n Ich brauche jedoch weiterhin die Hilfe talentierter Künstler, die Sprites für den Technologiebaum dieses Mods erstellen können, sowie von Modellierern. Wenn Sie helfen möchten oder einen Fehler melden möchten, posten Sie ihn bitte in den Mod-Foren.\n\n Danke fürs Lesen! – Murder Mountain"
  mexico_minor.6.a:0 "OK."
  mexico_minor.6.b:0 "Klicken Sie hier für die Mod-Quellen"
  
  mexico_minor.7.t:0 "Besonderer Dank"
  mexico_minor.7.d:0 " Besonderer Dank geht an:\n\n - i_hate_usernames für die freiwillige Bereitstellung der Grafiken für Sonora.\n\n - Francisco Martín Moreno für die fantastische Adlergrafik, die ich einfach als Grundlage für die Titelkarte dieses Mods verwenden musste.\n\n - Das Great War Mod-Team, das mir dabei geholfen hat, mehr Sprites zu erhalten.\n\n - Great Experiment für die Auswahl dieses Mods als mexikanischer Fokusbaum.\n\n - University of Arizona für „The Curse of Huitzilopotchli“, das das Rückgrat dieses Mods bildete und mir den Titel und den Flavour-Text für die gleichnamige Idee lieferte.\n\n"
  mexico_minor.7.a:0 "OK."
  
  mexico_minor.8.t:0 "Quellen"
  mexico_minor.8.d:0 "Der Fluch von Huitzilopochtli: Ursprünge, Verlauf und Erbe der Militärreformen in Mexiko 1920–1946\n\n Die mexikanische Rechte: Das Ende der revolutionären Reformen 1929–1940\n\n Mexiko: Die Entstehung seines politischen Zerfalls (Miguel Alemán Valdés 1936–1952)\n\n Mexiko in den 1940er Jahren: Modernität, Politik und Korruption\n\n Mexikanische politische Biografien, 1935–2009, vierte Ausgabe\n\n La red nazi en Mexico (Dokumentarfilm)\n\n Mexiko zwischen Hitler und Roosevelt: Mexikanische Außenbeziehungen im Zeitalter Lázaro Cárdenas 1934–1940\n\n ARMAS Nr. 482 (Militärzeitschrift)\n\n Der Kommunismus in Mexiko: Eine Studie politischer Frustration\n Entwurzelung der Gemeinschaft: Japanischstämmige Mexikaner, Zweiter Weltkrieg und das US-mexikanische Grenzgebiet\n Geologie und Mineralvorkommen des Boleo-Kupfergebiets Baja California, Mexiko von Victor S. Rocha 1955\n"
  mexico_minor.8.a:0 "Okay, ich verstehe, du hast dir diesen Mist nicht ausgedacht."
  
  
  mexico_article_30.1.t:0 "Englische Diplomaten fordern Festnahme Jenkins"
  
  # regular common knowledge variant
  
  mexico_article_30.2.t:0 "Diplomatischer Zwischenfall"
  mexico_article_30.2.d:0 "Britische Diplomaten sind empört und fordern die Verhaftung von William Jenkins wegen Verstoßes gegen Artikel 30 der Verfassung. Sie werfen ihm Manipulation der mexikanischen Politik vor, indem er sein Medienmonopol nutze, um die Mexikaner gegen Großbritannien aufzubringen. Unseren Quellen zufolge weigert sich Jenkins jedoch lediglich, die meisten antideutschen Filme in Mexiko zu veröffentlichen. Die jüngsten Ereignisse untermauern diesen klugen Schritt. Der zuvor veröffentlichte Film „Der Löwe hat Flügel“, ein Film über den RAF-Angriff auf den Nord-Ostsee-Kanal, löste so viel Ärger aus, dass mexikanische Kinos gezwungen waren, ihn aus dem Programm zu nehmen. Soweit wir wissen, hat William Jenkins nichts ausdrücklich Falsches getan, wenn pro-britische Filme beim mexikanischen Publikum unbeliebt waren. Diese Situation könnte auch dazu genutzt werden, mehr als nur Jenkins oder die Engländer auszuweisen. Wir hätten einen Vorwand, alle Gesetzesbrecher des Landes auszuweisen, um unser Gesicht zu wahren, da wir keiner Partei die Schuld geben würden. Was sollen wir tun?"
  mexico_article_30.2.a:0 "William Jenkins ausweisen"
  mexico_article_30.2.b:0 "Vertreibt die Engländer"
  mexico_article_30.2.c:0 "Alle Gesetzesbrecher ausweisen"
  
  # Intelligence Agency knowledge variant
  
  mexico_article_30.3.t:0 "Geheimdienstbericht: William Jenkins "
  mexico_article_30.3.d:0 "Britische Diplomaten sind empört und fordern die Verhaftung von William Jenkins wegen Verstoßes gegen Artikel 30 der Verfassung. Sie werfen ihm Manipulation der mexikanischen Politik vor, indem er sein Medienmonopol missbraucht, um die Mexikaner gegen Großbritannien aufzubringen. Laut DFS steht Jenkins jedoch in Verbindung mit Maximino Camacho und schützt Jenkins politisch im Austausch für Geschäftsmöglichkeiten. Maximino ist ein bekannter Sympathisant der Achsenmächte und über seinem Bett in seiner Villa in Pueblo soll ein Foto von Mussolini hängen. Es ist offensichtlich, dass Maximino seinen Einfluss auf Jenkins nutzt, um zu verhindern, dass nichtfaschistischer Einfluss in Mexiko Fuß fasst. Pro-britische Filme sind beim mexikanischen Publikum jedoch äußerst unbeliebt und haben in einigen Fällen dazu geführt, dass mexikanische Kinos sie nicht mehr zeigten. Die Entscheidung, pro-britische Filme zuzulassen, würde Großbritannien freuen, nicht jedoch die mexikanischen Kinobesucher. Diese Situation könnte auch dazu genutzt werden, mehr als nur Jenkins oder die Engländer auszuschließen. Wir hätten einen Vorwand, alle Gesetzesbrecher des Landes auszuschließen, um unser Gesicht zu wahren, da wir keiner einzelnen Partei die Schuld geben würden. Was sollten wir tun?"
  mexico_article_30.3.a:0 "William Jenkins ausweisen"
  mexico_article_30.3.b:0 "Vertreibt die Engländer"
  mexico_article_30.3.c:0 "Alle Gesetzesbrecher ausweisen"
  
  # 33-34 are hidden checks to remove influence ideas after you complete the article 30 focus and fired its event.
  
  
  ###################################
  ## SLEEPY LAGOON - PACHUCO UPDATE##
  ###################################

  #Mexico.1 IS A HIDDEN DEBUG TRIGGER THE PLAYER WON'T SEE. DO NOT BOTHER TRANSLATING.
  mexico_zoot_suit.1.t:0 "Lagunenauslöser"
  mexico_zoot_suit.1.d:0 "Wie sehen Sie das?"
  mexico_zoot_suit.1.a:0 "AKTIVIEREN"
  
  mexico_zoot_suit.2.t:0 "Sleepy Lagoon-Morde"
  mexico_zoot_suit.2.d:0 "Sleepy Lagoon, ein beliebter Treffpunkt und Pärchenort für mexikanische Teenager, denen der Zutritt zu öffentlichen Schwimmbädern oft verwehrt wird, ist Schauplatz eines grausamen Mordes: Die Leiche des mexikanischen Staatsbürgers und US-Soldaten José Díaz wurde gefunden. Díaz wurde bewusstlos und betrunken aufgefunden und erlitt ein stumpfes Trauma. Diaz erlag später seinen Verletzungen im Los Angeles General Hospital. Die Polizei durchsuchte die Stadt nach den Tätern und verhaftete den Anführer der 1th Street Gang, Hank Leyvas, seine Freundin Dora Barrios und einen weiteren von 600 vom LAPD festgenommenen Mexikaner. Hank bestreitet jede Verbindung zu dem Mord. In Los Angeles herrschen hohe Spannungen zwischen den Einwohnern von Los Angeles und den Pachucos, auch bekannt als „Zoot Suiters“, und es scheint, dass diese Spannungen nicht so bald beigelegt werden."
  mexico_zoot_suit.2.a:0 "Eine widerliche Tat."
  
  mexico_zoot_suit.3.t:0 "Sleepy Lagoon-Test"
  mexico_zoot_suit.3.d:0 "Der Prozess im Mordfall Sleepy Lagoon hat heute begonnen. Hank und zwei andere plädierten auf nicht schuldig. Hank plädierte, er und seine Freundin seien in dieser Nacht in Sleepy Lagoon von einer Gruppe Männer angegriffen worden. Hank ging davon aus, dass es sich um einen Bandenüberfall handelte, und rief seine Bande nach Sleepy Lagoon, um die Räuber zu finden. Sie fanden eine Party in der Nähe des Tatorts und stellten die Partygäste, da sie annahmen, es handele sich um eine rivalisierende Bande. Es kam zu einer Schlägerei zwischen der Bande und den Partygästen, die etwa 10 Minuten dauerte. Am Morgen wurde die Leiche von Diaz gefunden. Der Bericht des Gerichtsmediziners besagt, dass Diaz&#39; Verletzungen auf einen Autounfall hindeuten. Die Anklage berief sich auf E. Duran Ayres, Leiter des Foreign Relations Bureau des Sheriffbüros von Los Angeles, der erklärte, Mexikaner seien insgesamt blutrünstig und hätten einen biologischen Drang zu töten, der von ihren aztekischen Vorfahren herrühre."
  mexico_zoot_suit.3.a:0 "Das wird nicht gut enden."
  
  mexico_zoot_suit.4.t:0 "Hank verurteilt"
  mexico_zoot_suit.4.d:0 "Der Fall Sleepy Lagoon ist abgeschlossen: Hank und 16 weitere wurden wegen Mordes verurteilt. Die Männer der Bande sollen ins San Quentin Gefängnis kommen, während ihre Freundinnen wegen Beihilfeverdachts in die berüchtigte Ventura School for Girls, eine Besserungsanstalt für kriminelle und sexuell promiskuitive Mädchen, eingewiesen werden sollen. Ventura hat einen äußerst schlechten Ruf, und dort verurteilte Frauen begehen oft Selbstmordversuche, bevor sie dorthin verlegt werden. Berichten zufolge hat ein Mädchen versucht, Sicherheitsnadeln zu verschlucken, um ihrer Strafe zu entgehen."
  mexico_zoot_suit.4.a:0 "Vielleicht legen sich die Spannungen jetzt."
  
  mexico_zoot_suit.5.t:0 "Zoot Suit-Unruhen"
  mexico_zoot_suit.5.d:0 "In Los Angeles eskalierten die Rassenspannungen, als eine Auseinandersetzung zwischen einer Gruppe von Pachucos und US-Soldaten zu Rassenunruhen eskalierte. Tausende US-Soldaten verließen in Scharen ihre Stützpunkte, um an den Unruhen teilzunehmen. Einige Soldaten kamen sogar aus Los Vegas, um in Los Angeles zu randalieren. Soldaten stürmten Bars, Theater und Cafés, um mexikanische Jugendliche, darunter Kinder, herauszuzerren, sie nackt auszuziehen und zu schlagen, während ihre Kleidung verbrannt wurde. Ein kleinerer Mob fiel in das schwarze Viertel Watts ein, doch über das Ausmaß der dort angerichteten Schäden gibt es keine Informationen. Das LAPD weigerte sich, gegen die Unruhen vorzugehen, mit der Begründung: „Nun, wir haben die öffentliche Meinung vertreten. Viele von uns waren im Ersten Weltkrieg, und wir werden uns nicht über Kinder im Militär lustig machen.“ "
  mexico_zoot_suit.5.a:0 "Schrecklich."
  
  mexico_zoot_suit.6.t:0 "Empörung in Mexiko"
  mexico_zoot_suit.6.d:0 "Mexiko ist empört über den Umgang mit den Zoot-Suit-Unruhen. Nationalisten bezeichnen die Angriffe der US-Streitkräfte auf mexikanische Bürger als kriegerischen Akt. Sie fordern ihre Regierung auf, einzuschreiten und diesem dreisten Akt der Aggression den Krieg zu erklären. Auch kommunistische und linksgerichtete Nationalisten unterstützen diese Haltung und sagen, das Geschehene sei unverzeihlich. Die Situation ist außer Kontrolle geraten, und es ist ungewiss, ob sich die mexikanisch-amerikanische Diplomatie jemals wieder erholen wird."
  mexico_zoot_suit.6.a:0 "Die Dinge geraten außer Kontrolle."
  
  mexico_zoot_suit.7.t:0 "Intel: Los Angeles, Kalifornien"
  mexico_zoot_suit.7.d:0 "Wir haben einen Plan ausgeheckt, die mexikanischen Einwanderer, die in die USA einwandern, als Informanten für unseren Geheimdienst einzusetzen. Viele sind der Revolution entkommen, und einige sind sogar beim Militär! Möglicherweise finden wir mexikanische Patrioten, die uns wichtige Informationen weitergeben."
  mexico_zoot_suit.7.a: "See what you can do."
  
  #############################
  ## FACTIONS - JUNTA UPDATE ##
  #############################
  
  mexico_faction.1.t:0 "Allianzeinladung"
  mexico_faction.1.d:0 "Wir haben die Nachricht erhalten, dass Mexiko sich mit uns verbünden möchte. Was sagen wir darauf?"
  mexico_faction.1.a:0 "Ja."
  mexico_faction.1.b:0 "NEIN."
  
  # DFS path to alternate communist factions. DEFUNCT
  
  mexico_communist.1.t:0 "Bericht: Dioniso Encinia"
  mexico_communist.1.d:0 "Die PCM wurde von Anfang an von der Sowjetunion gegründet und finanziert. Dioniso ist eine Marionette der Sowjetunion, und seine Präsenz spaltet die Bevölkerung. Die PCM hat sich aufgrund Dionisos Unsicherheit in viele gegensätzliche kommunistische Parteien aufgespalten und Mitglieder entlassen, die seinen Parteivorsitz gefährden könnten. Dioniso ist völlig abhängig von der sowjetischen Führung und dem Rat seiner viel fähigeren Frau. Ein von der PCM geführtes Mexiko wäre verheerend, da es nicht nur eine Scheinregierung und einen Marionettenstaat schaffen, sondern ihn auch mit einer absichtlich unfähigen Führung besetzen würde. Nach dem gescheiterten, von der Sowjetunion unterstützten Putsch von 1929 und dem Verbot und der Auflösung der PCM in den darauffolgenden Jahren gibt es keine Beziehungen zu den Sowjets. Sie stärken sich jedoch, da die kommunistische Unterstützung in Mexiko stark zunimmt. Wir können den Aufstieg des Kommunismus nicht aufhalten, aber wir können seine Führung stoppen. Das versuchte Attentat..."
  mexico_communist.1.a:0 "Es gelingt ihm, Dioniso zu töten"
  mexico_communist.1.b:0 "Es gelingt ihm nicht, Dioniso zu töten"
  
  # DFS fails to kill dioniso, Mexico overthrown. DEFUNCT
  
  mexico_communist.2.t:0 "Mexikanische Regierung gestürzt"
  mexico_communist.2.d:0 "Die von der Sowjetunion unterstützte PCM nutzte die zunehmende kommunistische Stimmung in der Populärkultur und konnte so erfolgreich an die Macht gelangen. Mexiko ist heute ein Marionettenstaat der Sowjetunion. Amerikanische Diplomaten sind empört über den unverschämten sowjetischen Einfluss vor ihrer Haustür und drohen der mexikanischen Regierung und ihren russischen Unterstützern mit Krieg."
  mexico_communist.2.a:0 "Die Dinge sind außer Kontrolle geraten."
  
  # event to let the Russia player to know WTF happened. DEFUNCT
  
  mexico_communist.3.t:0 "Mexikanische Regierung gestürzt"
  mexico_communist.3.d:0 "Unsere Versuche, unsere Marionette Dioniso Encina in Mexiko an die Macht zu bringen, waren erfolgreich. Die mexikanische Regierung wurde nach jahrelanger Arbeit gestürzt. Wir haben nun einen festen Stand in Amerika, der es uns ermöglicht, unsere Macht nach Lateinamerika auszudehnen und sogar die Vereinigten Staaten anzugreifen."
  mexico_communist.3.a:0 "Fantastische Arbeit!"
  
  #####################
  ## ELECTION UPDATE ##
  #####################
  
  mexico_1940.1.t:0 "PRI-Kandidat"
  mexico_1940.1.d:0 "Die Wahl rückt näher, und wir müssen einen Kandidaten aufstellen, der für die PRI gegen den rechten Flügel kämpft. Derzeit gibt es zwei mögliche Kandidaten. Fransisco Mugica ist linksgerichtet und eher sozialistischen Idealen zugeneigt. Die Wahl Mugicas wäre riskant, wenn sozialistische Ideale wenig Popularität genießen. Manuel Ávila Camacho ist die zentristischere Wahl und genießt bei den Rechten größere Akzeptanz. Die Wahl Camachos würde jedoch jede Hoffnung auf eine Verabschiedung linker Reformen zunichtemachen."
  mexico_1940.1.a:0 "Wählen Sie Fransisco Mugica als Präsidentschaftskandidaten. (Kommunistische Wahl)"
  mexico_1940.1.b:0 "Wählen Sie Manuel Ávila Camacho als Präsidentschaftskandidaten. (Neutrale Wahl)"
  
  mexico_1940.2.t:0 "Rechtsgerichteter Kandidat"
  mexico_1940.2.d:0 "Die Rechte befindet sich derzeit in einem Bürgerkrieg zwischen Juan Andreu Almazán und Joaquín Amaro um die Frage, wer Präsidentschaftskandidat werden soll. Almazán ist eher als Geschäftsmann denn als Militär bekannt und wird vor allem von wohlhabenden Mexikanern unterstützt. Sein Rückhalt unter den arbeitenden Armen ist jedoch miserabel, da er ihnen nichts zu bieten scheint. Almazáns Außenpolitik ist deutlich pro-amerikanisch und entfremdet die mexikanische Durchschnittsbevölkerung zusätzlich. Amaro hingegen ist ein berühmter Militär und genießt den Respekt der Nationalisten. Trotzdem gilt Almazán als unvermeidliche Wahl für die Kandidatur der Rechten, und Amaros Kandidatur verliert aufgrund einer Reihe prominenter Überläufer schnell an Unterstützung für Almazáns Kampagne. Es ist klar, dass Amaro unweigerlich verlieren wird, da Juan von US-Interessen unterstützt wird und die Menschen die Wahl eines Kandidaten, den die USA stürzen würden, für sinnlos halten. Es gibt jedoch Mitglieder der faschistischen Clique in der mexikanischen Politik, die sicherstellen wollen, dass Almazán den Wahltag nicht erlebt. Maximino Ávila Camacho, der Bruder von Manuel Ávila Camacho, hat einen Plan zur Ermordung von Juan Almazán in Plueba ausgeheckt, indem er einen Zugunfall inszeniert."
  mexico_1940.2.a:0 "Juan Almazán kandidiert für das Präsidentenamt. (Demokratische Wahl)"
  mexico_1940.2.b:0 "Juan Almazán stirbt, Amaro kandidiert für das Präsidentenamt. (Faschistische Wahl)"
  
  mexico_1940.3.t:0 "Mexikanischer Präsidentschaftskandidat getötet!"
  mexico_1940.3.d:0 "Juan Almazán, der aussichtsreichste Kandidat für das Amt des Präsidentschaftskandidaten der Rechten, ist bei einer Zugentgleisung in Plueba ums Leben gekommen, wobei alle Insassen starben. Der umstrittene Almazán ist kein Unbekannter in Sachen Attentate, und während seines Präsidentschaftswahlkampfs wurden bereits mehrere Anschläge auf ihn verübt. Seine Anhänger werfen der PRI vor, die Entgleisung inszeniert zu haben. Zuvor war Almazán während seines Aufenthalts im Haus von Fransisco Barbosa von Attentätern angegriffen worden, die Sarapes trugen, hinter denen sich Maschinengewehre verbargen. Sein Wahlkampfteam behauptet, er sei von einer Armee aus 100 Attentätern angegriffen worden und habe davon abgehalten werden müssen, nach draußen zu rennen, um sie zu bekämpfen. Der ehemalige General Alfredo Serratos erklärte jedoch in einem Interview, es seien nur fünf Attentäter gewesen."
  mexico_1940.3.a:0 "Schrecklich."
  
  mexico_1940.4.t:0 "Wahlen in Mexiko"
  mexico_1940.4.d:0 "Die Wahl hat begonnen und die Wahl wird gewonnen von ..."
  mexico_1940.4.a:0 "Fransisco Mugica (kommunistische Wahl)"
  mexico_1940.4.b:0 "Manuel Ávila Camacho (Neutrale Wahl)"
  mexico_1940.4.c:0 "Juan Almazán (Demokratische Wahl)"
  mexico_1940.4.e:0 "Joaquin Amaro (Faschistische Wahl)"
  
  
 # GUNS & equipment
 MEX_infantry_equipment_0:0 "Mondragón M94"
 MEX_infantry_equipment_0_short:0 "Mondragón M94"
 MEX_infantry_equipment_0_desc:0 "Das Mondragón, das Manuel Mondragón vor seinem Exil entwickelte, war das erste halbautomatische Gewehr, das von der Armee eines Landes übernommen wurde. Ausgestattet mit der deutschen 7x57-mm-Mauser-Patrone war es eine der einflussreichsten Waffen seiner Zeit. Es litt jedoch unter einer zu komplizierten Konstruktion und Zuverlässigkeitsproblemen bei Kontakt mit Schlamm. Zudem war es mit minderwertiger Munition nicht leistungsfähig. Aufgrund der mexikanischen Revolution wurden diese Waffen in der Schweiz hergestellt."
 MEX_infantry_equipment_1:0 "Fusil Mexiko"
 MEX_infantry_equipment_1_desc:0 "Das Fusil Mexico war ein auseinanderziehbares Gewehr mit Gleitmechanismus anstelle des traditionellen Zylinderverschlusses. Der automatische Auswurf der Patronen anstelle des manuellen Auswurfs sollte die Feuerrate erhöhen. Das Gewehr ließ sich zur leichteren Reinigung und höheren Zuverlässigkeit in Einzelteile zerlegen, was jedoch zu einem komplexeren Gewehr führte. Das mexikanische Militär lehnte das Gewehr jedoch ab und entschied sich für den Bau lizenzierter Kar 98-Gewehre."
 MEX_infantry_equipment_1_short:0 "Fusil Mexiko"
 MEX_infantry_equipment_2:0 "Mendoza C-34"
 MEX_infantry_equipment_2_short:0 "Mendoza C-34"
 MEX_infantry_equipment_2_desc:0 "Die Mendoza LMG war nach der Mondragón Mexikos bekannteste Waffe. Sie war vor allem für ihre unglaublich günstige Herstellung bekannt und bot gleichzeitig eine Zuverlässigkeit, die mit den teureren LMGs ihrer Zeit mithalten konnte. Die Mendoza konnte außerdem in kürzester Zeit zerlegt und gereinigt werden, war unglaublich leicht und verfügte über die Möglichkeit, von Vollautomatik auf selektives Feuer umzuschalten."
 MEX_infantry_equipment_3:0 "Mendoza RM2"
 MEX_infantry_equipment_3_short:0 "Mendoza RM2"
 MEX_infantry_equipment_3_desc:0 "Die Mendoza LMG war nach der Mondragón Mexikos bekannteste Waffe. Sie war vor allem für ihre unglaublich günstige Herstellung bekannt und bot gleichzeitig eine Zuverlässigkeit, die mit den teureren LMGs ihrer Zeit mithalten konnte. Die Mendoza konnte außerdem in kürzester Zeit zerlegt und gereinigt werden, war unglaublich leicht und verfügte über die Möglichkeit, von Vollautomatik auf selektives Feuer umzuschalten."
 # for '56
 MEX_infantry_equipment_x:0 "Mendoza RM2"
 MEX_infantry_equipment_x_short:0 "RM2"
 MEX_infantry_equipment_x_desc:0 "Das RM2 war die letzte Version des Mendoza-Gewehrs. Es war für die Patrone .30-06 ausgelegt und leichter als das frühere Mendoza C-1934. Da es jedoch nach 1945 entwickelt wurde, weigerte sich Mexiko, es nach dem Ende des Zweiten Weltkriegs einzuführen."
 MEX_infantry_equipment_x_2:0 "Fusil Asalto"
 MEX_infantry_equipment_x_2_short:0 "Fusil Asalto"
 MEX_infantry_equipment_x_2_desc:0 "Das Fusil Asalto war ein unbenannter Prototyp, der von Mendoza entworfen wurde. Es wurde beschrieben, dass es auffallende Ähnlichkeiten mit dem deutschen Fallschirmjägergewehr FG-42 aufwies. Aus unbekannten Gründen wurde es von der mexikanischen Regierung abgelehnt."
 
 # TANK
 MEX_gw_tank_equipment:0 "TNCA Salinas"
 MEX_gw_tank_equipment_short:0 "TNCA Salinas"
 MEX_gw_tank_equipment_desc:0 "Der TNCA Salinas war ein mexikanischer Panzer, der dem berühmten britischen Mark IV aus dem Ersten Weltkrieg nachempfunden war. Seine Kanone stammte ursprünglich von einem mexikanischen Kriegsschiff. Es wurde nur ein einziges Exemplar hergestellt. Er kam nie zu ernsthaften Einsätzen und wurde zur Verteidigung wichtiger Ziele eingesetzt, da das mexikanische Militär befürchtete, dass die Rebellen durch seine Eroberung deutlich mächtiger werden würden."
