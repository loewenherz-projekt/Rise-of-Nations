 # put the tooltips here, so there aren't a billion files.
 tt_calles:0 "Beginnt die Handlung des Calles-Exils."
 tt_militar:0 "Sie können jetzt Ihre eigenen Militärberater ernennen, was verräterischen Ideen im Militär entgegenwirkt."
 tt_cabinet:0 "Man kann zwar seine eigenen Kabinettsmitglieder ernennen, doch die derzeitigen Mitglieder und ihre militärischen Unterstützer werden nicht glücklich sein. Eine Auseinandersetzung mit dem Militär wird zu einem Bürgerkrieg führen, sofern die Mitglieder nicht auf irgendeine Weise entwaffnet oder aus ihren Offizierspositionen entfernt werden."
 tt_oily:0 "Wenn die Spannungen zu gering sind, könnte es zu einem Krieg mit den USA und Großbritannien kommen. Wenn der Zeitpunkt richtig ist, ist es möglicherweise möglich, die USA und Großbritannien gegeneinander auszuspielen."
 tt_sneak: "Unlocks ability to investigate conspiracies, and stop plots to overthrow your government."
 tt_plane:0 "Schaltet Luftfahrtunternehmer frei."
 tt_boat:0 "Schaltet mexikanische Marine-Auftragnehmer frei und ermöglicht die Ernennung eines neuen Marineministers."
 tt_ships:0 "Schaltet die Möglichkeit frei, ausländische Länder mit der Konstruktion von Schiffen zu beauftragen."
 tt_land:0 "Schaltet einen zusätzlichen Gebäudeplatz in allen ländlichen Staaten frei."
 tt_expert:0 "Schaltet einen zusätzlichen Gebäudeplatz in allen städtischen Staaten frei."
 tt_ejido:0 "Schaltet einen zusätzlichen Gebäudeplatz in allen ländlichen Staaten frei."
 tt_PCM:0 "Der Kommunismus erstarkt, doch die von der Sowjetunion kontrollierte PCM-Partei stellt eine erhebliche Bedrohung für die mexikanische Souveränität dar, wenn die Bundespolizei ihr nicht rechtzeitig Einhalt gebietet.\n"
 tt_mexpromotion:0 "Der Präsident von Mexiko gilt aufgrund des Rangsystems als 5-Sterne-General. Aus diesem Grund wird dieser Militärkandidat auf Stufe 5 befördert und erhält Boni basierend auf seiner Geschichte.\n"
 tt_dlc:0 "Dieser Fokus ermöglicht es Spielern, Schiffe zu lizenzieren, wenn sie DEATH ODER DISHONOR NICHT INSTALLIERT HABEN. Wenn Sie diesen DLC besitzen, ist dieser Fokus aus Gründen der Balance deaktiviert."
 tt_mexican_radicals:0 "Wird den gegnerischen politischen Flügel radikalisieren.\n"
 tt_MEX_racial_tensions:0 "Das wird nicht unbemerkt bleiben und zu einer Verschärfung der Rassenspannungen in Amerika führen."
 tt_Placeholder:0 "Dies ist derzeit ein Platzhalter, bis das Spiel fortgeschrittener ist und ich mit diesem Baum das machen kann, was ich möchte.\n"
 # for the backlash mechanics
 tt_30:0 "Wer alle gleichermaßen ausschließt, ohne sie bevorzugt zu behandeln, ermutigt die Synarchisten."
 tt_synarchist:0 "Wird die Konservativen ermutigen und einige Leute in den extrem rechten Flügel treiben."
 tt_commies:0 "Wird den linken Flügel ermutigen und einige Leute in den äußersten linken Flügel treiben."
 
