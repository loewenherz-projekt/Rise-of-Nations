 # ECONOMIC STUFF
 
 MEX_PEMEX_Situation:0 "Das PEMEX-Embargo"
 MEX_PEMEX_Situation_desc:0 "Mexiko hat die Folgen des PEMEX-Embargos nicht einfach hingenommen. Das Land hat Gegenmaßnahmen ergriffen, um das neu verstaatlichte Öl zu nutzen und seine noch junge Ölindustrie zu unterstützen."
 MEX_Stove:0 "Das Herdgesetz"
 MEX_Stove_desc:0 "Mexiko setzte sich im Sinne des Umweltschutzes dafür ein, Holzöfen durch Öfen zu ersetzen, die auf Erdölderivaten wie Kerosin basieren. Dies verlangsamte die Abholzung der Wälder in Mexiko und eröffnete der mexikanischen Ölindustrie einen Binnenmarkt."
 MEX_Charity:0 "Nationalistische Spenden"
 MEX_Charity_desc:0 "Als Mexiko die Verstaatlichung von PEMEX verkündete, spendeten die Mexikaner alles, was sie hatten, um die mit der Verstaatlichung verbundenen Kosten zu decken. Eine besondere Geschichte handelt von Mexikanern, die Gegenstände in einem riesigen Haufen spendeten. Reiche Frauen warfen wertvollen Schmuck hinein, während Rancheros ihr wertvolles Vieh brachten, um es der Republik zu schenken."
 MEX_Black_Market:0 "Sprechen Sie andere Käufer an"
 
 # vice laws
 
 MEX_Vice:0 "Lenocinio-Gesetze"
 MEX_Vice_desc:0 "Prostitution war während Cárdenas’ Herrschaft ein heißes Thema. Als Überbleibsel der Gebäckkriege und Ferdinand Maximilians mexikanischen Kaiserreichs erlangte sie während Porfiro Díaz’ Regime traurige Berühmtheit. Mexikos Frauen erinnern sich noch heute an die Demütigung, als Díaz’ Wirtschaftslage sie in Armut und schließlich in die Prostitution zwang. Familien wurden dadurch auseinandergerissen, und Historiker behaupten, dies sei einer der Hauptgründe dafür gewesen, dass Frauen in der Revolution so hart und in großer Zahl kämpften – aus purem Hass auf Díaz’ Rolle bei der Zerstörung ihres Lebens. Die Gesetze wurden unter Ärzten, Prostituierten, feministischen Gruppen und religiösen Gruppen heiß diskutiert. Außerhalb religiöser Gruppen gab es erhebliche Meinungsverschiedenheiten darüber, welche Haltung sie zur Prostitution einnehmen sollten. Letztendlich wurde das Gesetz aufgehoben, um Porfiro Díaz’ Erbe zu zerstören und die mexikanische Revolution zu bewahren."
 
 MEX_Enforce:0 "Das Gesetz aufrechterhalten"
 MEX_Repeal:0 "Das Gesetz aufheben"
 
 #calles law
 MEX_LAW:0 "Gesetz der Toleranz gegenüber Sekten"
 MEX_LAW_desc:0 "Das Sektentoleranzgesetz, auch als Calles-Gesetz bekannt, war eines der strengsten Gesetze zur Trennung von Kirche und Staat, das jemals erlassen wurde (Artikel 130 der mexikanischen Verfassung). Das Gesetz enthält mehrere Forderungen: \n 1. Religiösen Orden wurde jegliche politische Beteiligung untersagt, andernfalls mussten sie mit hohen Strafen rechnen. \n 2. Ausländern wurde verboten, eine religiöse Tätigkeit auszuüben. \n 3. Priestern jeglicher Art wurde verboten, an Grundschulen zu unterrichten. \n 4. Religionsunterricht wurde an Schulen verboten. \n 5. Kircheneigentum innerhalb des Bundesdistrikts wurde konfisziert.\n Dieses Gesetz löste den Cristero-Krieg aus, da die Zahl der Priester so stark beschränkt wurde, dass 17 Staaten gar keinen Priester hatten. Andere hatten nur einen einzigen Priester, um einen ganzen Staat zu betreuen. Dies führte zu Unruhen und Ineffizienz in den religiösen ländlichen Gebieten Mexikos. Dies war ein heißes Thema bis zu seiner Aufhebung im Jahr 1938." 
 
