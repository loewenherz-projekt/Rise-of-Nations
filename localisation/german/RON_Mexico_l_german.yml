  MEX_almazan:0 "Juan Almazan"
  MEX_almazan_desc:0 "Juan wurde als Geschäftsmann im Generalsgewand beschrieben. Sein Hauptgeschäft war der Militärbau. Sein Unternehmen war in den 1920er Jahren für den Bau des schönsten Militärstützpunkts Mexikos in Monterrery verantwortlich."
  
  Maximino2:0 "Maximino Avila Camacho"
  Maximino2_desc:0 "Maximino war der Caudillo von Puebla, wo er die Telegrafen, die Eisenbahn, die Hauptleitungen und den Großteil der Infrastruktur besaß. Während dieser Zeit setzte Mexiko die Ingenieure seines Militärs ein, um schnell Infrastruktur und andere Gebäude zu errichten, an denen Maximino beteiligt war. Aus diesem Grund war Maximino ein Logistikexperte, der sein Fachwissen über Versorgungsleitungen und seine Erfahrung im Infrastrukturbau in jeden Krieg einbringen konnte."
  
  Maximino3:0 "Maximino Avila Camacho"
  Maximino3_desc:0 "Maximino wurde von mexikanischen Historikern als arrogant, zornig und rachsüchtig beschrieben. Maximino soll diejenigen, die ihm in die Quere kamen, mit extremer Voreingenommenheit verfolgt haben."
  
  MEX_MARC:0 "El Compa Nacho"
  MEX_MARC_desc:0 "El Compa Nacho, mit bürgerlichem Namen Ignacio Morales, war ein Agent der Cardenista- und Alemán-Gruppe und wurde von ihnen mit Sonderaufträgen betraut. Anhänger Almazans beschuldigten Morales, an einem gescheiterten Attentat auf Alamazan beteiligt gewesen zu sein. Quelle: „Political Intelligence and the Creation of Modern Mexico, 1938-1954“, Seite 46."
  
  lopez:0 "Raúl López Sánchez"
  
