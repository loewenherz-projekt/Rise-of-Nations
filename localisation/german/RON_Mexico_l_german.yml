 MEX_jet_fighter_equipment_2_desc:0 "Nach dem Mexikanisch-Guatemaltekischen Krieg (1958–1959) erkannte Mexiko, dass es seine Wachsamkeit vernachlässigt hatte, indem es sich weigerte, seine Luftwaffe zu modernisieren. Dadurch sank die Kampfbereitschaft auf ein gefährliches Niveau, da man davon ausging, nach dem Zweiten Weltkrieg sicher zu sein. Der Krieg war für beide Nationen eine Blamage und zwang Mexiko zum Kauf von De Havilland Vampires und T-33. "
