 MEX_nav_bomber_equipment_1_desc:0 "Die MA-185, entworfen von Mariscraft und mit dem Spitznamen „Minero Mexicano“, war ein mysteriöses Flugzeug, das etwa im Jahr 1939 in den Frachtlisten der mexikanischen Marine auftauchte. Von diesem Flugzeug sind keine Fotos erhalten geblieben, außer dass es sich um ein kleines Fluggerät handelte, das wahrscheinlich zur Ozeanaufklärung und für leichte Bombenangriffe eingesetzt wurde."
