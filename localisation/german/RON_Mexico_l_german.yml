  maximato:0 "Maximato"
  maximato_desc:0 "Die mexikanische Regierung ist durchsetzt mit Anhängern von Plutarco Calles, auch bekannt als „El Jefe Maximo“. Er war von 1924 bis 1928 mexikanischer Präsident. Calles kontrollierte Mexiko durch Stellvertreterpräsidenten und Unterstützer der PRM. Von 1924 bis 1936 war Calles derjenige, der die wahre Macht in Mexiko innehatte. Diese Periode der mexikanischen Geschichte ist als Maximato bekannt."
  
  sexenio:0 "Plan Sexenio Militar"
  sexenio_desc:0 "Vor dem Zweiten Weltkrieg entwickelte Mexiko einen Plan zur schnellen Modernisierung, zum Wiederaufbau und zur Professionalisierung des Militärs. Dieser Plan beinhaltete die Motorisierung, Mechanisierung und Modernisierung der Ausrüstung des Heeres und damit auch der Luftwaffe. Aufgrund der zunehmenden Angst vor Hitler hatte Mexiko jedoch Schwierigkeiten, eine Großmacht zu finden, die ihm die Lizenz für moderne Ausrüstung erteilte."
  
  sexenio2:0 "Plan Sexenio Militar"
  sexenio2_desc:0 "Vor dem Zweiten Weltkrieg entwickelte Mexiko einen Plan zur schnellen Modernisierung, zum Wiederaufbau und zur Professionalisierung des Militärs. Dieser Plan beinhaltete die Motorisierung, Mechanisierung und Modernisierung der Ausrüstung des Heeres und damit auch der Luftwaffe. Aufgrund der zunehmenden Angst vor Hitler hatte Mexiko jedoch Schwierigkeiten, eine Großmacht zu finden, die ihm die Lizenz für moderne Ausrüstung erteilte."
  
  sexenio3:0 "Plan Sexenio Militar"
