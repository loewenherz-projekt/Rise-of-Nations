 # RESOURCES
 
 MEX_Camargo:0 "Erschließung der Bauxitlagerstätte Camargo"
 MEX_Camargo_desc:0 "Die Lagerstätte Camargo wurde in einem USGS-Bericht aus dem Jahr 1957 erwähnt. Darin heißt es, dass die Lagerstätte seit den 1930er Jahren bekannt war, aber erst später ausgebeutet wurde."
 
 MEX_Lucifer:0 "Erschließung der Lucifer-Magnesium- und Magnetitlagerstätte"
 MEX_Lucifer_desc:0 "Die Luficer-Mine, die 1941 eröffnet wurde und sich im Arroyo Del Inferno neben der Boleo-Kupfermine befindet, war eine der produktivsten Eisenminen Mexikos. Diese Mine enthielt auch Pyrit, ein weiteres wichtiges Mineral für die Stahlproduktion in europäischen Ländern ohne natürliche Eisenvorkommen. Diese Mine produzierte praktisch alles, was man zur Stahlproduktion in großen Mengen benötigte. Ihre Jahresproduktion betrug 27.430,85 Tonnen pro Jahr (umgerechnet von britischen Tonnen)."
 # SPY STUFF
 
 MEX_DGIPS:0 "DGIPS-Operationen"
 MEX_DGIPS_desc:0 "Was die DGIPS ist, hängt von Ihrer Frage ab. Für manche sind die DGIPS lediglich Friedenstruppen, die Mexiko vor unsichtbaren Bedrohungen schützen, für andere waren sie eine Bande amerikanisch ausgebildeter Attentäter, die eine politische Agenda verfolgten. Wie so oft liegt die Wahrheit irgendwo dazwischen."
 MEX_Kruger:0 "Verhaftung Hilde Krüger"
 MEX_Kruger_desc:0 "Hilde Krüger war ein deutsches Starlet, das sowohl in Amerika als auch in Mexiko arbeitete. Sie war eng mit der amerikanischen und mexikanischen Elite und insbesondere mit Präsident Avila Camacho verbunden. Als sich der Krieg hinzog, wurde sie zur deutschen Spionin."
 MEX_Curb_Americans:0 "Den amerikanischen Einfluss eindämmen"
 MEX_Synarchist_Baja:0 "Abbau der kanadischen Unterstützung in Baja"
 MEX_False_Flag:0 "Kontakt zu mexikanischen Spionagezellen in den USA"
 
 # MISSIONS
 
 MEX_GEO:0 "Das große Spiel"
 MEX_GEO_desc:0 "Um unsere Interessen zu schützen, müssen wir unsere Macht an Schlüsselstellen rund um den Globus demonstrieren. Die Kontrolle dieser Orte und ihre Entwicklung zur Demonstrierung unserer Macht wäre für uns ein großer Segen."
 
 MEX_ENG_Shield:0 "Vertreibung des britischen Einflusses in der Karibik"
 MEX_ENG_Shield_desc:0 "Das Vereinigte Königreich ist seit fast 20 Jahren ein feindliches Land. Es ist an der Zeit, es von jeglichem möglichen Einfluss in unserer Nähe auszuschließen und eine Pufferzone zu schaffen."
 
 MEX_USA_Shield:0 "Vertreibung des amerikanischen Einflusses aus der Karibik"
 MEX_USA_Shield_desc:0 "Wenn wir mehr als nur eine Regionalmacht werden wollen, dürfen wir den Einfluss der USA in der Karibik nicht zulassen. Wir müssen ihn gewaltsam beseitigen."
 
 MEX_CUB:0 "Kuba gegen die USA aufbringen"
 MEX_CUB_desc:0 "Kuba ist seit dem Spanisch-Amerikanischen Krieg ein Verbündeter und eine Marionette der USA. Wenn wir den Einfluss der USA in der Region abbauen wollen, dürfen wir Kuba keine so engen Beziehungen zu den USA gestatten."
