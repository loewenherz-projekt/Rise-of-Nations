  MEX_literacy:0 "Alphabetisierungsrate von 40 %"
  MEX_literacy_desc:0 "Im Jahr 1936 lag die Alphabetisierungsrate in Mexiko bei etwa 40 %. Der Hauptgrund hierfür war die Bevölkerungsverteilung, die meist auf dem Land lag, während der Zugang zu Bildung vor allem in städtischen Gebieten möglich war."
  
  MEX_literacy2:0 "Sozialistische Bildung"
  MEX_literacy2_desc:0 ""
  
  MEX_literacy3:0 "Geänderter Artikel 3"
  MEX_literacy3_desc:0 ""
  
  MEX_embargo:0 "PEMEX-Embargo"
  MEX_embargo_desc:0 "Das Embargo war ein schwerer Schlag für Mexiko und zerstörte schnell den Moment des Stolzes, als Mexiko das Öl der Briten beschlagnahmte, die Mexikos Gastfreundschaft lange missbraucht hatten. Der Peso verlor an Wert, das exportierte Öl wurde in ausländischen Häfen beschlagnahmt, und das Schlimmste war, dass das Embargo politischen Dissidenten einen Grund gab, zu versuchen, die Regierung zu stürzen."
  
  MEX_small_aviation_industry:0 "Engpass in der Luftfahrtindustrie"
  MEX_small_aviation_industry_desc:0 "In Mexikos Luftfahrtindustrie mangelte es nicht an guten Konstrukteuren. Allerdings fehlte es der Branche an der Fähigkeit, diese Flugzeuge in Massenproduktion herzustellen, da es nicht nur an Maschinen, sondern auch an qualifizierten Ingenieuren mangelte. Das größte Hindernis für Mexiko bei der Entwicklung eigener Flugzeuge war die lange Produktionszeit."
  
  MEX_small_aviation_industry2:0 "Engpass in der Luftfahrtindustrie"
  MEX_small_aviation_industry_desc2:0 "In Mexikos Luftfahrtindustrie mangelte es nicht an guten Konstrukteuren. Allerdings fehlte es der Branche an der Fähigkeit, diese Flugzeuge in Massenproduktion herzustellen, da es nicht nur an Maschinen, sondern auch an qualifizierten Ingenieuren mangelte. Das größte Hindernis für Mexiko bei der Entwicklung eigener Flugzeuge war die lange Produktionszeit."
  
  MEX_idea_expanded_mining_industry:0 "Deutsche Bergbauunternehmen"
  MEX_idea_expanded_mining_industry_desc:0 "Deutschland war unter anderem daran interessiert, in Mexiko Bergbauunternehmen zu gründen, um den starken amerikanischen Einfluss in der Branche einzudämmen."
  
  MEX_cientificos2:0 "Wissenschaftler"

 Mexican_focus:0 "Mexikanischer Nationalfokus" 
 
 Exile_Calles:0 "Exile Calles"
 Exile_Calles_desc:0 "Calles liegt im Streit mit dem derzeitigen Präsidenten Lazaro Cárdenas und hat die konservative Basis gegen Cárdenas aufgebracht, indem er ihn als Kommunisten darstellte, der eine zweite Sowjetunion gründen wolle. Die Spannungen nehmen zu, und seine Basis ist gewalttätig geworden. Mit der zunehmenden Gewalt wurde Calles&#39; ohnehin ruinierter Ruf noch weiter ruiniert, was dazu führte, dass er ohne Protest ins Exil geschickt wurde."
 
 Purge_Corruption:0 "Säubere Callistas"
 Purge_Corruption_desc:0 "Calles befindet sich zwar im amerikanischen Exil, hat aber weiterhin Sympathisanten in der Militärführung, die einen Putsch planen könnten. Um die Freiheit Mexikos zu schützen, müssen wir die Korruption im Militär beseitigen und diese Offiziere aus ihren Ämtern entfernen."
 
 MEX_SEX:0 "Plan Sexenio Militar"
 MEX_SEX_desc:0 "Der Plan Sexenio Militar war ein Plan Mexikos zur Modernisierung seiner Streitkräfte, insbesondere aufgrund der angespannten Beziehungen zu den USA aufgrund der Calles-Propaganda. Die Paranoia und die Waffenhortung der Regierungen weltweit im Vorfeld des Zweiten Weltkriegs führten dazu, dass Mexiko Schwierigkeiten hatte, ein Land zu finden, das bereit war, bei der Modernisierung seiner Streitkräfte zu helfen."

 Fund_La_Heroico_Colegio_Militar:0 "Fund El Colegio Militar"
 Fund_La_Heroico_Colegio_Militar_desc:0 "Derzeit ist unsere Militärdoktrin nicht nur größtenteils unkodifiziert, sondern ein Mischmasch aus britischen, amerikanischen, französischen und spanischen Doktrinen. Wir müssen eine kodifizierte Doktrin entwickeln."
 
 Vive_Pancho_Villa:0 "Willys-Overland verstaatlichen"
 Vive_Pancho_Villa_desc:0 "Mit hohen Subventionen und der kompensierten Verstaatlichung einer amerikanischen Autotochter können wir die Mittel erhalten, um Fahrzeuge nicht nur für das Militär, sondern für ganz Mexiko zu produzieren."
 
 ejercito_de_los_trabajadores:0 "Ejército de los trabajadores"
 ejercito_de_los_trabajadores_desc:0 "Um unser Militär von den parteiischen Verrätern zurückzuerobern, müssen wir die Reihen mit loyalen Mexikanern überschwemmen."
 
 Por_el_Honor_de_Mexico:0 "Por el Honor de Mexico"
 Por_el_Honor_de_Mexico_desc:0 "Unsere Doktrin ist noch unterentwickelt und bedarf weiterer Überarbeitungen."
 
 Rugir_de_el_canon:0 "Rugir del Cañon"
 Rugir_de_el_canon_desc:0 "Um uns umfassend verteidigen zu können, brauchen wir eine Armee der Willigen."
 
 Vive_Mexico:0 "Wiedereinsetzung der TGA-Panzerabteilung"
 Vive_Mexico_desc:0 "Ohne Panzerunterstützung können wir keine vollmoderne Streitmacht sein. Wir müssen die Panzerprojekte der TGA wieder aufnehmen."
 
 Defense_Contracting:0 "Verteidigungsaufträge"
 Defense_Contracting_desc:0 "Frühere Präsidenten haben die Brücken zu wichtigen Rüstungsunternehmen abgebrochen. Wir müssen diese Brücken reparieren und mehr Entwürfe für unsere Bodentruppen fordern."
 
 MEX_AG:0 "Agrarunion"
 MEX_AG_desc:0 "Die Agrarunion war eine Idee, die eine Militarisierung der ländlichen Gebiete Mexikos und die Integration registrierter Milizionäre in die militärische Reserve vorsah, um im Kriegsfall zum Dienst einberufen zu werden. Die mexikanische Regierung schätzte, dass mit dieser Politik etwa drei Millionen Mexikaner in das Reservesystem aufgenommen würden."
 
 Chemical_warfare:0 "Abteilung für chemische Kriegsführung"
 Chemical_warfare_desc:0 "Im Plan Sexenio Militar war für den Fall einer ausländischen Invasion eine Abteilung für chemische Waffen vorgesehen."
 
 SEDENA:0 "SEDENA"
 SEDENA_desc:0 "Wenn wir Macht demonstrieren wollen, müssen wir Druck auf SEDENA ausüben, damit sie uns erlaubt, uns in die Außenpolitik einzumischen."
 
 DN-I:0 "DN-I"
 DN-I_desc:0 "SEDENA hat ein Protokoll zur Landesverteidigung entworfen, das Guerillataktiken, natürliche Abnutzungstaktiken und Verteidigungstaktiken im Kerngebiet umfasst."
 
 DN-II:0 "DN-II"
 DN-II_desc:0 "SEDENA hat DN-II entworfen, einen Plan zum Schutz der mexikanischen Freiheit vor internen Bedrohungen wie Staatsstreichen im In- und Ausland."
 
 reform_fam:0 "Reform FAM"
 reform_fam_desc:0 "Die politische Unterdrückung der Luftwaffe hat dazu geführt, dass unsere Luftwaffe nicht nur an Ausrüstung, sondern auch an qualifizierten Konstrukteuren mangelt. Wir müssen Azacarte, einen Flugzeugkonstrukteur mit zahlreichen nationalen und internationalen Auszeichnungen, zurück in die Armee holen und die TNCA als TGA wieder einsetzen."
 
 Ehectals_wind:0 "Fokus auf Überlegenheit"
 Ehectals_wind_desc:0 "Unsere jüngsten Kriege, insbesondere der Escobar-Aufstand, haben bewiesen, dass Bodentruppen ohne Kampfflugzeuge sinnlos sind. Ohne Kampfflugzeuge würde unsere Luftwaffe angesichts eines ernsthaften Feindes zusammenbrechen."
 
 Bomber_foci:0 "Fokus auf Traditionalismus"
 Bomber_foci_desc:0 "Luftnahunterstützung und zweimotorige taktische Bomber haben in allen unseren jüngsten Konflikten hervorragende Leistungen erbracht. Wir sollten unseren Fokus auf die Bodenunterstützung verdoppeln."
 
 Revise_Air_Doctrine:0 "El Colegio de Aire"
 Revise_Air_Doctrine_desc:0 "Durch die Finanzierung der Luftwaffenakademie können wir sie erweitern, um ein breiteres Spektrum an Taktiken und Doktrinen abzudecken."
 
 MEX_NAV:0 "Escuela de Aviación Naval"
 MEX_NAV_desc:0 "Obwohl Mexiko den ersten Seeangriff durchführte, zeigte sich sein wahrer Wert erst, als deutsche U-Boote begannen, mexikanische Konvois anzugreifen."
 
 SEMAR:0 "SEMAR"
 SEMAR_desc:0 "Wir können unsere Marine nicht länger aufgrund politischer Vetternwirtschaft als zweitrangig betrachten. Wenn wir uns verteidigen wollen, brauchen wir einheimische Entwürfe und einen guten Marineminister."
 
 MEX_FLEX:0 "Hinterhältige Taktiken"
 MEX_FLEX_desc:0 "Wir sollten uns nicht auf eine große Flotte ohne industrielle Kapazität konzentrieren, sondern eine realistischere und intelligentere Marine schaffen."
 
 MEX_STRONK:0 "Überwältigende Kraft"
 MEX_STRONK_desc:0 "Wir sollten den Marinedoktrinen folgen, die es bisher für Frankreich und Großbritannien gab, und auf eine große Marine setzen."
 
 mex_ships:0 "Ausländische Designs"
 mex_ships_desc:0 "Ausländische Designer aus aller Welt haben uns in der Vergangenheit mit neuen Schiffsentwürfen kontaktiert. Es ist an der Zeit, dass wir ihr Angebot annehmen."

 miracle:0 "Mexikanisches Wunder"
 miracle_desc:0 "Das mexikanische Wunder ist die Zeit zwischen 1940 und 1968, in der das mexikanische BIP trotz der globalen Wirtschaftskrise jährlich um 4 % wuchs und die Inflation nur um 3 % anstieg. Innerhalb von 28 Jahren entwickelte sich das Agrarland Mexiko zu einer Industriemacht."
 
 MEX_CAB:0 "Schrank reinigen"
 MEX_CAB_desc:0 "Nachdem wir uns um Calles gekümmert haben, können wir nun von den Kabinettsmitgliedern den Rücktritt verlangen und die sorgfältige Auswahl neuer Mitglieder zulassen."
 
 MEX_EDU:0 "Technische Schulen"
 MEX_EDU_desc:0 ""
 
 MEX_FASC:0 "Seite an Seite mit den Reichen"
 MEX_FASC_desc:0 "Die Porfiristas haben Recht. Mexiko hat sich unter einer Diktatur viel schneller entwickelt und die längste Friedensperiode unserer Geschichte erlebt. Wir müssen die Wahlen absagen, denn wir wissen, was richtig ist."
 
 MEX_COM:0 "Seite mit der linken"
 MEX_COM_desc:0 "Die Kommunisten haben recht. Um Mexikos Probleme zu lösen, müssen wir den Kapitalismus aufgeben, der den Mexikanern unter ausländischen Konzernen so viel Leid zugefügt hat."
 
 MEX_DEM:0 "Seite an Seite mit der Rechten"
 MEX_DEM_desc:0 "Der einzig richtige Weg, Mexikos Probleme zu lösen, ist eine wirklich demokratische Abstimmung. Alles andere wäre eine Wiederholung desselben Fehlers, den Mexiko immer wieder gemacht hat."
 
 MEX_NUE:0 "Reform des PRM"
 MEX_NUE_desc:0 "Die PRM könnte eine Partei werden, die groß genug ist, um die Stimme ganz Mexikos zu sein. Wir sollten die Partei reformieren und Mexiko unter einer einzigen Partei vereinen."
 
 MEX_9:0 "Durchsetzung von Artikel 33"
 MEX_9_desc:0 "Artikel 33 besagt, dass nur mexikanische Bürger Einfluss auf die mexikanische Innenpolitik nehmen dürfen. Derzeit gibt es viele Personen, die dieses Gesetz brechen. Wir sollten es durchsetzen, um unsere politischen Feinde auszuschalten und unser politisches Monopol zu wahren."
 
 electric:0 "Comisión Federal de Electricidad"
 electric_desc:0 "Unsere Energieinfrastruktur muss dringend generalüberholt werden. Wir sollten ein staatliches Elektrizitätsunternehmen gründen, um die Entwicklung direkt voranzutreiben."
 
 perfect_dictatorship:0 "Haltet die Caudillos in Schach"
 perfect_dictatorship_desc:0 "In dieser Zeit legte Cardenas den Grundstein für die Entfernung der Caudillos von der politischen Macht."
 
 oiled:0 "Geölte Diplomatie"
 oiled_desc:0 "Unsere Ölindustrie war auf ausländische Experten angewiesen, die nach der Verstaatlichung das Land verließen, was zu einer geringeren Ölproduktion führte. Wir können unser ungenutztes Potenzial ausländischen Mächten zugänglich machen, die für ihre Kriegsanstrengungen nicht genügend Öl haben. Wir können sie davon überzeugen, Experten zur Optimierung unserer Ölfelder zu schicken und so die Gewinne deutlich zu steigern, ohne dass wir dafür viel investieren müssen."
 
 piaso:0 "Payaso-Diplomaten"
 piaso_desc:0  "Mexikos Diplomaten entwickelten während des Krieges eine Form der Diplomatie, die auf den Vorurteilen und der Inkompetenz ausländischer Diplomaten beruhte. Aufgrund der Stellung Mexikos auf der Weltbühne schickten Großmächte unerfahrene oder voreingenommene Diplomaten. Mexikos Diplomaten überlisteten die ausländischen Diplomaten, indem sie Inkompetenz vortäuschten und den ausländischen Diplomaten dann bei Handelsverhandlungen ausnutzten."
 
 ALALC:0 "Antiimperialismus"
 ALALC_desc:0 "Mexiko plante einen antiimperialistischen Block lateinamerikanischer Länder, der Öl für seinen politischen Einfluss nutzte. Die Idee scheiterte an internen Machtkämpfen, dem Aufstieg Saudi-Arabiens und dem Einbruch der Ölpreise. Der Name ALALC wurde in diesem Mod verwendet, da die Idee alt ist, die Umsetzung erfolgte jedoch erst in den 1960er Jahren."
 
 grand_alliance:0 "Große Allianz"
 grand_alliance_desc:0 "Der mexikanische Geheimdienst wusste, dass die USA und Japan auf Kriegskurs waren, und überlegte, welche Seite er angesichts dieser Tatsache unterstützen sollte. Tatsächlich entschied sich Mexiko gegen Japan und begründete dies mit der mangelnden Fähigkeit Japans, die mexikanische Küste vor US-Marinebombardements zu schützen."
 
 United:0 "Vereinigte Amerika"
 United_desc:0 "Während des Zweiten Weltkriegs trat Mexiko einer Verteidigungskommission mit den USA bei, unter dem Vorwand, dass die USA Mexiko militärische Ausrüstung leihen würden. Mexiko erhielt nur sehr wenig Unterstützung und zerfiel nach dem Zweiten Weltkrieg schnell."
 
 cientificos:0 "Nuevo Scientificos"
 cientificos_desc:0 "Im Laufe der Zeit wurden die Cientificos, die einst Porfiro Diaz berieten, zur Norm, als die Technokraten wieder in die mexikanische Politik eindrangen."
 
 #####################
 ## CAUDILLO UPDATE ##
 #####################
 military_junta:0 "Stehen Sie auf der Seite der Caudillos"
 military_junta_desc:0 "Caudillos waren Mexikos starke Männer, Militäroffiziere, die oft politische Ämter innehatten. In manchen Fällen hatten die Caudillos in ihrem Heimatstaat mehr Macht als die Bundesregierung. Sie nutzten ihre Macht oft, um ihre persönlichen Ideale zu verfolgen, beispielsweise eine rechtsgerichtete Regierung durch Putsche oder Wünsche wie höhere Militärausgaben durch Abstimmungen im Kongress, um ihre Macht auszubauen."
 
 MEX_EJIDO:0 "Landreformen"
 MEX_EJIDO_desc:0 "In den 1930er und 40er Jahren führte Mexiko eine Landreform durch, bei der 45 Millionen Morgen Land neu verteilt wurden. 4 Millionen Morgen dieses Landes befanden sich im Besitz amerikanischer Agrarkonzerne, bevor sie an die Mexikaner zurückverteilt wurden, was zu Konflikten mit den Vereinigten Staaten führte."
 
 MEX_CTM:0 "Konföderation mexikanischer Arbeiter"
 MEX_CTM_desc:0 "Der mexikanische Arbeiterverband (CTM) ist der größte Gewerkschaftsbund Mexikos und bildete einen entscheidenden Wählerblock für die PRI."
 
 #####################
 ## ELECTION UPDATE ##
 #####################
 
 # DFS reverted to their original name.
 MEX_DFS:0 "DGIPS"
 MEX_DFS_desc:0 "Die DGIPS war die innere Sicherheit Mexikos, ähnlich in der Funktion wie das FBI oder die DEA, bevor sie in DFS umbenannt wurde"
 
 # economic policy
 #left wing
 MEX_RAIL:0 "Verstaatlichung der Eisenbahnen"
 MEX_RAIL_desc:0 ""
 
 MEX_revolution:0 "Beende die Revolution!"
 MEX_revolution_desc:0 "Es gab einige, wie beispielsweise Fransisco J. Mugica, die Mexiko auf einen revolutionäreren Weg führen wollten, der schließlich in der Inanspruchnahme der vollen Rechtskraft von Artikel 27 gipfelte."
 
 MEX_poza:0 "Poza Rica Felder"
 MEX_poza_desc:0 "Die Poza-Rica-Felder in Veracruz waren zu dieser Zeit das produktivste und ertragreichste Ölfeld Mexikos. Der Besitz dieses Feldes war der Traum vieler mexikanischer Eliten. Das revolutionäre Ideal bestand jedoch darin, diese wertvolle Ressource zu sozialisieren und zu nutzen, um Mexiko wirtschaftlichen Wohlstand zu bringen."
 
 MEX_industrialization:0 "Mobilisiert das Proletariat"
 MEX_industrialization_desc:0 ""
 
 MEX_urbanization:0 "Revitalisierung der Städte"
 MEX_urbanization_desc:0 ""
 
 MEX_expel_foreigners:0 "Repatriierung"
 MEX_expel_foreigners_desc:0 "Kurz nach der Gründung von PEMEX brach ein Skandal aus, wonach amerikanische Unternehmen Land besaßen, das nach mexikanischem Recht ausdrücklich verboten war. Da der politische Wille zur Durchsetzung des Gesetzes fehlte, wurde nichts dagegen unternommen. In einer Realität, in der Mexiko den Willen hätte, Artikel 27 vollständig umzusetzen, wäre dieser Wille vorhanden."
 
 MEX_expel_foreigners2:0 "Militarisierung"
 MEX_expel_foreigners2_desc:0 "Kurz nach der Gründung von PEMEX brach ein Skandal aus: Amerikanische Unternehmen besaßen Land, das nach mexikanischem Recht ausdrücklich verboten war. Da der politische Wille zur Durchsetzung des Gesetzes fehlte, wurde nichts unternommen. Wäre Mexiko tatsächlich bereit, Artikel 27 vollständig umzusetzen, wäre dieser Wille vorhanden."
 
 MEX_article_27:0 "Artikel 27"
 MEX_article_27_desc:0 "Artikel 27 ist ein umstrittener Abschnitt der mexikanischen Verfassung, der bei seiner Durchsetzung dem Staat das Eigentum an strategischen Ressourcen zuspricht. Dieser Verfassungsartikel war der rechtliche Präzedenzfall für die Gründung von PEMEX."
 
 MEX_socialist_education:0 "Sozialistische Bildung"
 MEX_socialist_education_desc:0 ""
 
 #neutral/democratic
 MEX_segundo:0 "Segundo Plan Sexenal"
 MEX_segundo_desc:0 "Der Sechsjahresplan ist die Wirtschaftspolitik für die Amtszeit eines Präsidenten. In Wirklichkeit ging es dabei darum, den Investoren zu versichern, dass Artikel 27 nie wieder zur Anwendung kommen würde, und das Vertrauen zwischen Mexiko und ausländischen Investoren wiederherzustellen."
 
 MEX_investors:0 "Beruhigen Sie die Anleger"
 MEX_investors_desc:0 "Mexiko verbrachte die nächsten sechs Jahre damit, ausländische Investoren zu beruhigen und Gesetze zum Schutz ausländischer Investitionen zu verabschieden, nachdem es durch die Verstaatlichung von PEMEX zu einem Vertrauensverlust gekommen war."
 
 MEX_ind:0 "Industrielle Investitionen"
 MEX_ind_desc:0 "Im Laufe der 1940er Jahre strömte ausländisches Geld nach Mexiko."
 
 MEX_urb:0 "Der Bundesdistrikt"
 MEX_urb_desc:0 "Im Laufe der Jahre wuchs der Bundesdistrikt zusammen mit vielen anderen städtischen Zentren schnell."
 
 MEX_article_3:0 "Artikel 3 ändern"
 MEX_article_3_desc:0 "Artikel 3 enthielt ursprünglich eine Garantie für sozialistische Bildung. Nach 1940 wurde diese aufgehoben."
 
 MEX_resources:0 "Bergbauzuschüsse"
 MEX_resources_desc:0 ""
 
 MEX_contractors:0 "Militärische Auftragsvergabe"
 MEX_contractors_desc:0 ""
 
 #fascist
 MEX_viking:0 "Viking Fund"
 MEX_viking_desc:0 "Axel Wenner Gren war ein exzentrischer schwedischer Geschäftsmann und galt in den 1930er Jahren als einer der reichsten Männer der Welt. Während des Zweiten Weltkriegs versuchte er, Frieden zu vermitteln, wurde aber von beiden Seiten als Störfaktor angesehen. Als er versuchte, seinen Einfluss auf Mexiko auszuweiten, verärgerte er die Alliierten und landete unter dem Vorwand von Verhandlungen mit den Nazis auf der schwarzen Liste."
 
 MEX_electrolux:0 "Electrolux"
 MEX_electrolux_desc:0 "Electrolux ist ein schwedisches Unternehmen für Unterhaltungselektronik im Besitz von Axel Wenner Gren. Die Expansion seines Unternehmens nach Mexiko hätte das Interesse an einer Erweiterung der Expertenbasis im Bereich Elektrotechnik verstärkt."
 
 MEX_development:0 "Axel Trains"
 MEX_development_desc:0 "Axel Wenner Gren hatte eine Reihe von Infrastrukturprojekten in ganz Lateinamerika geplant, bevor diese von den Alliierten gestoppt wurden."
 
 MEX_ship:0 "Schwedische Investitionen"
 MEX_ship_desc:0 "Sie geben Geld, Sie bekommen Geld. Was kann man daran nicht mögen?"
 
 MEX_mundane:0 "Industrielle Fertigung"
 MEX_mundane_desc:0 ""
 
 MEX_exotic:0 "Elektrofertigung"
 MEX_exotic_desc:0 ""
 
 MEX_export:0 "Ausfuhrkontrollbehörde"
 MEX_export_desc:0 "Axel Wenner Gren hatte die Gründung einer Exportkontrollbehörde in Mexiko geplant, die ihn zum Wirtschaftszaren Mexikos gemacht hätte. Dies war der Tropfen, der das Fass zum Überlaufen brachte und die Alliierten dazu zwang, ihn auf die schwarze Liste zu setzen."
 
 # post 1940 tree
 
 MEX_war:0 "Krieg mit Deutschland"
 MEX_war_desc:0 "Der Angriff deutscher U-Boote auf die SS Potrero del Llano und die SS Faja de Oro führte am 21. Mai 1942 dazu, dass Mexiko auf der Seite der Alliierten in den Krieg eintrat."
 
  MEX_USA:0 "Das Sinclair-Abkommen"
  MEX_USA_desc:0 "Das Sinclair-Abkommen war das erste Abkommen zwischen den Alliierten und Mexiko, das den mexikanischen Besitz an seinem Öl anerkannte. Das Öl sollte an eine Zwischenfirma namens Sinclair verkauft werden, die es dann für die Kriegsanstrengungen liefern würde."
 
 MEX_usa_aviation_oil:0 "Raffinerien für Kraftstoffe mit hoher Oktanzahl"
 
 MEX_usa_airfields:0 "Hemisphärische Verteidigung"
 MEX_usa_airfields_desc:0 "Amerika hatte Mexiko gebeten, ihm Stationierungsrechte und den Bau von Radarstationen in gefährdeten Gebieten an der Westküste zu gewähren."

 MEX_usa_bracero_program:0 "Bracero-Programm"
 MEX_usa_bracero_program_desc:0 "Das Bracero-Programm war ein Programm, das mexikanische Bürger für die Leitung von Farmen, Fabriken und anderen Logistikbereichen zur Unterstützung der Kriegsanstrengungen gewinnen sollte. Diese Arbeiter wurden für ihre Arbeit vertraglich entlohnt. Die Bezahlung war jedoch je nach Beruf lückenhaft, viele erhielten nicht ihren vollen oder überhaupt keinen Lohn. Schätzungsweise 500 Millionen Dollar Schulden stehen den ehemaligen Braceros inklusive Zinsen noch immer offen."
 
 MEX_usa_arms_deal:0 "Amerikanische Lizenzierung"
 MEX_usa_arms_deal_desc:0 "Während des Zweiten Weltkriegs erhielt Mexiko Lizenzen und Leasing für zahlreiche Arten von Ausrüstung, von Flugzeugen über Panzer bis hin zu Schiffen."
 
 MEX_Soviet:0 "Mit Russland verbünden"
 MEX_Soviet_desc:0 "Zwischen Russland und Mexiko herrschte aufgrund der feindseligen sowjetischen Diplomatie praktisch keine diplomatische Beziehung, was bedeutete, dass ich keine Grundlage hatte, um speziell für sie einen Stammbaum zu erstellen."
 
 MEX_AXIS:0 "Treten Sie der Achse bei"
 MEX_AXIS_desc:0 "Was, du erwartest für jeden kleinen Fokus eine witzige Bemerkung? Ich habe mir beim Schreiben dieses Mods ein Karpaltunnelsyndrom zugezogen, also beruhige dich."
 
 MEX_GER:0 "Den Davis-Deal festigen"
 MEX_GER_desc:0 "Der Davis-Deal war ein Vertrag zwischen Mexiko und den Achsenmächten über den Kauf von Öl von einem amerikanischen Zwischenhändler, der das Öl an Italien verkaufte, das es wiederum an Deutschland lieferte. Dieser Deal machte nur 50 % der mexikanischen Gesamtproduktion aus, da Deutschland vertraglich verpflichtet war, Öl von Großbritannien und den USA zu kaufen. Als die deutsche Marine versuchte, überschüssiges Öl von Mexiko zu kaufen, scheiterte sie. Der Deal endete offiziell 1940, als die Royal Navy Italien blockierte."
 
 MEX_german_contracting:0 "Deutsche Megastrukturen"
 MEX_german_contracting_desc:0 "Deutsche Diplomaten verhielten sich im Umgang mit Mexiko oft idealistisch und waren überzeugt, dass der Sieg schnell eintreten und deutsche Geschäfte sich weltweit ausbreiten würden. Deutschland ermöglichte es einheimischen Bauunternehmen, Angebote für den Ausbau der mexikanischen Infrastruktur einzuholen, unabhängig davon, ob sie die Aufträge aufgrund der Kriegsanstrengungen tatsächlich erfüllen konnten."
 
 MEX_german_industry:0 "Deutsche Luftfahrt"
 MEX_german_industry_desc:0 "Deutschland hatte Mexiko ein Abkommen zur Entwicklung seiner aufstrebenden Luftfahrtindustrie angeboten, und Mexiko war von diesem Angebot sehr angetan. Aufgrund der Nähe zu den USA kam dieses Abkommen jedoch nicht zustande. Mexiko nutzte dieses Angebot jedoch in den Verhandlungen, um bessere Konditionen von den USA zu erhalten."
 
 MEX_german_rubber:0 "Von Deutschland finanzierte Kautschukfarmen"
 MEX_german_rubber_desc:0 "Deutschland hatte im Rahmen seines Abkommens die Schaffung eines Kautschukhandels mit Basis im Süden Mexikos ins Auge gefasst."
 
 MEX_german_mines:0 "Gemeinsame Bergbauexpeditionen"
 MEX_german_mines_desc:0 "Deutschland bot Bedingungen für die Gründung deutsch-mexikanischen Bergbauunternehmen in gemeinsamem Besitz an, die den Einfluss der USA im mexikanischen Bergbausektor verringern sollten."
 
 MEX_JAP:0 "Die Salinas Cruz Pipeline"
 MEX_JAP_desc:0 "Japan hatte den Bau einer Pipeline zwischen der Ostküste und Salinas Cruz über den Isthmus von Tehuantepec in Erwägung gezogen. Dieses Megaprojekt wurde jedoch erst später in die Tat umgesetzt."
 
 MEX_japanese_merchant_marine:0 "Mexikanische Handelsmarine"
 MEX_japanese_merchant_marine_desc:0 "Mexiko hatte Japan in seinen Handelsabkommen gebeten, nicht nur beim Aufbau einer effizienten mexikanischen Handelsmarine zu helfen, sondern auch "
 
 MEX_japanese_chemicals:0 "Verbotene Mineralien"
 MEX_japanese_chemicals_desc:0 "Es wurde ein Deal vorgeschlagen, bei dem Mexiko Japan mit einer Vielzahl von Mineralien (die in diesem Spiel nicht abgebildet sind) beliefert, die in der Waffenproduktion verwendet werden und zuvor von den USA geliefert wurden. Die USA hatten im Vorfeld des Zweiten Weltkriegs ein Embargo gegen Japan verhängt und dessen Mineralienlieferungen eingestellt. Dadurch könnte das Embargo vollständig umgangen werden."

 MEX_japanese_machinery:0 "Japanische Importe"
 MEX_japanese_machinery_desc:0 ""
 
 MEX_japanese_investments:0 "Japanische Investitionen"
 MEX_japanese_investments_desc:0 ""
 
 MEX_collective_bargaining:0 "Tarifverhandlungen"
 MEX_collective_bargaining_desc:0 "Durch die Bildung eines Handelsblocks könnten wir die Alliierten dazu zwingen, unsere wirtschaftliche Integrität zu respektieren."
 
 MEX_latinism:0 "Lateinische Zusammenarbeit"
 MEX_latinism_desc:0 ""
 
 MEX_latin_autobahn:0 "Die Panamericana"
 MEX_latin_autobahn_desc:0 "Ideen für eine Superautobahn quer durch Amerika stammen aus dem späten 19. Jahrhundert, als eine Eisenbahnstrecke gebaut wurde, die jedoch nie realisiert wurde. In den 1920er Jahren trat die Idee einer Superautobahn an ihre Stelle. Am 29. Juli 1937 wurde ein Vertrag unterzeichnet, der den Bau der Autobahn vorsah, und in den 1950er Jahren war Mexiko das erste lateinamerikanische Land, das seinen Teil der Autobahn fertigstellte. "
 
 MEX_latin_weaponry:0 "Lateinisches Arsenal"
 MEX_latin_weaponry_desc:0 ""
 
 MEX_latin_research:0 "UNAM-Netzwerk"
 MEX_latin_research_desc:0 "Um dieser grausamen Welt gemeinsam die Stirn zu bieten, müssen wir unser Wissen ebenso teilen wie unsere Waffen."
 
 MEX_Soviet_Protection:0 "Sowjetischer Schutz"
 MEX_Soviet_Protection_desc:0 "Mit der UdSSR auf unserer Seite ist das Embargo praktisch beendet."
 
 MEX_Soviet_Rubber:0 "Kautschukkommunen"
 MEX_Soviet_Rubber_desc:0 "Die Verhandlungen zwischen der UdSSR und Mexiko scheiterten, da die UdSSR über alles, was Mexiko hatte, in viel größeren Mengen verfügte, außer über Kautschuk."
 
 MEX_Soviet_Basing:0 "Sowjetische Stützpunkte"
 MEX_Soviet_Basing_desc:0 "Die Vereinigten Staaten würden einen sowjetischen Verbündeten nicht lange an ihren Grenzen dulden, wir müssen uns selbst schützen."
 
 MEX_Soviet_Power:0 "Sowjetische Wissenschaft"
 MEX_Soviet_Power_desc:0 ""
 
  MEX_Soviet_Weapons:0 "Russische Waffen"
  MEX_Soviet_Weapons_desc:0 ""
 
 MEX_new_world_order:0 "Neue Weltordnung"
 MEX_new_world_order_desc:0 ""
 
 ### 2nd ARMY TREE
 
 MEX_National_Defense:0 "Nationale Verteidigung"
 MEX_National_Defense_desc:0 ""
 
 MEX_Mandatory_Retirement:0 "Gesetz zur obligatorischen Altersvorsorge"
 MEX_Mandatory_Retirement_desc:0 "Ironischerweise zwang Mexiko viele seiner Generäle und hohen Beamten zum Ausscheiden aus dem aktiven Dienst. Dies war ein Versuch, Mexiko zu stabilisieren, indem alte Caudillos entmachtet und gleichzeitig frisches Blut in den Club der alten Männer gebracht wurde, die geistig und körperlich längst ihren Zenit überschritten hatten. Überraschenderweise wurde dieser Schritt allgemein und ohne größere Probleme akzeptiert, sogar von Maximino Avila Camacho."
 
 MEX_Selective_Retirement:0 "Selektiver Ruhestand"
 MEX_Selective_Retirement_desc:0 "Alternativ können wir nur einige Generäle in den Ruhestand versetzen, um einige unserer erfahreneren Männer zu erhalten, aber das würde den paranoiden Caudillos offensichtlich als Machtergreifung erscheinen."
 
 MEX_Static_Defense:0 "Statische Abwehr"
 MEX_Static_Defense_desc:0 ""
 
 MEX_Mexican_Maginot:0 "Projekt: Tepeyollotl"
 MEX_Mexican_Maginot_desc:0 "Die nördlichen Berge bieten eine natürliche Verteidigung gegen Angriffe aus dem Norden. Schmale, gewundene Pfade verwandeln sich regelmäßig in Schlamm und machen jeden Panzer zu einer Belastung. Die weitläufigen Gebirgsketten und die wenigen und kleinen Flugplätze in den Bergen machen Luftangriffe zu einem reinen Ärgernis. Dennoch ist die Natur nicht perfekt. Es ist Zeit, sie zu perfektionieren."
 
 MEX_Eastern_Wall:0 "Monterrey-Verschanzung"
 MEX_Eastern_Wall_desc:0 ""
 
 MEX_Central_Wall:0 "Zentrale Verschanzungen"
 MEX_Central_Wall_desc:0 ""
 
 MEX_Sonora_Wall:0 "Sonora-Verschanzungen"
 MEX_Sonora_Wall_desc:0 ""
 
 MEX_Coastal:0 "Küstenbunker"
 MEX_Coastal_desc:0 "Festungen eignen sich zwar gut für Landinvasionen, der Hauptangriffsvektor Amerikas wird jedoch über unsere Häfen verlaufen."
 
 MEX_Fortify_Ports:0 "Häfen befestigen"
 MEX_Fortify_Ports_desc:0 ""
 
 MEX_NAV_BOMB:0 "Küstenverteidigung aus der Luft"
 MEX_NAV_BOMB_desc:0 ""
 
 MEX_Innovative_ideas:0 "Innovative Ideen"
 MEX_Innovative_ideas_desc:0 ""
 
 MEX_Arm_Militias:0 "Milizen ausbilden"
 MEX_Arm_Militias_desc:0 "Es ist an der Zeit, dass wir die Ausrüstung und Ausbildung des ländlichen Verteidigungskorps verbessern."
 
 MEX_Joan:0 "Weibliche Brigaden der Heiligen Johanna von Orléans"
 MEX_Joan_desc:0 "Die Jeanne-d’Arc-Brigaden waren eine geheime Militärgesellschaft katholischer Frauen während des Cristero-Krieges. Sie stellten Waffen her, versorgten die Cristero-Truppen, kämpften in Schlachten, fungierten als Kundschafter, waren Boten während der Schlachten, druckten Propaganda und fungierten als Spione. Sie schworen strengste Geheimhaltung, sodass nicht einmal ihre Familien von ihrer Mitgliedschaft erfuhren. Sie waren für ihre unglaublich komplexe Logistikkette bekannt."
 
 MEX_Flexibile_Defense:0 "Flexible Verteidigung"
 MEX_Flexibile_Defense_desc:0 ""
 
 MEX_Air_Power:0 "Projekt: Ehecatl"
 MEX_Air_Power_desc:0 "Statische Verteidigung ist gut und schön, solange sie nicht umgangen wird. Flugzeuge bieten eine bessere Verteidigung und decken ein größeres Gebiet ab als eine Festung."
 
 MEX_Mountain:0 "Zentrale Abdeckung"
 MEX_Mountain_desc:0 ""
 
 MEX_Desert:0 "Decken Sie die Sonora Passage ab"
 MEX_Desert_desc:0 ""
 
 MEX_AAD:0 "Ehecatls Schild"
 MEX_AAD_desc:0 ""
 
 MEX_Homefront:0 "Die Heimatfront"
 MEX_Homefront_desc:0 ""
 
 MEX_Open_Borders:0 "Öffnet die Grenzen"
 MEX_Open_Borders_desc:0 ""
 
 MEX_Japanese_Immigration:0 "Japanische Einwanderung"
 MEX_Japanese_Immigration_desc:0 "Japanische Einwanderer waren im Westen Mexikos als Arbeiter weit verbreitet und freundeten sich mit ihren mexikanischen Kollegen an. Während des Zweiten Weltkriegs wurden japanische Einwanderer gezwungen, in die Städte zu ziehen, damit sie nicht bei der Organisation eines synarchistischen Aufstands in den ländlichen Teilen des Landes helfen konnten."
 
 MEX_German_Immigration:0 "Deutsche Einwanderung"
 MEX_German_Immigration_desc:0 "Deutsche Einwanderer waren in Mexiko ein alltäglicher Anblick und nahmen sogar am Cedillo-Aufstand teil."
 
 MEX_Spanish_Immigration:0 "Spanische Flüchtlinge"
 MEX_Spanish_Immigration_desc:0 "Unter den spanischen Flüchtlingen waren nicht nur Intellektuelle, sie stammten aus allen Gesellschaftsschichten und fanden in Mexiko Frieden."
 
 MEX_Quarantine:0 "Einwanderung einschränken"
 MEX_Quarantine_desc:0 ""
 
 MEX_Centralize_Migrants:0 "Migranten unter Quarantäne stellen"
 MEX_Centralize_Migrants_desc:0 "Mexiko siedelte während des Zweiten Weltkriegs Einwanderer aus Ländern, die Mexiko oder den USA feindlich gesinnt waren, in die zentralen Städte um, weil man befürchtete, diese Migranten seien Spione, die den Widerstand schüren sollten."
 
 MEX_Big_Brother:0 "Großer Bruder"
 MEX_Big_Brother_desc:0 "Mexiko hatte Einwanderer aus bestimmten Ländern wie Deutschland und Japan im Auge behalten, um sicherzustellen, dass es sich nicht um Spione handelte, die den Auftrag hatten, Revolutionen anzuzetteln."
 
 MEX_News:0 "Ausländische Propaganda unterdrücken"
 MEX_News_desc:0 "Mexiko ist ausländischer Propaganda nicht fremd. Das Land war ein Tummelplatz für Propagandanetzwerke aller großen Mächte und Fraktionen der Welt, von den Sowjets über die Deutschen bis hin zu den Europäern. Der krasseste Fall war die Franco-Propagandamaschine, die in Mexiko Zwietracht säen sollte. Francisco Franco gab monatlich mehrere Tausend Dollar für Propagandamaßnahmen aus."

 MEX_Green_Revolution:0 "Die Grüne Revolution"
 MEX_Green_Revolution_desc:0 "In dieser Zeit erlebte Mexiko im Zuge der Industrialisierung enorme Veränderungen. Die Landwirtschaft erlebte die sogenannte Grüne Revolution, die Lebensmitteleffizienz stieg rasant an, und Gesundheitsversorgung und Bildung verbesserten sich."
 
 MEX_Saludbridad:0 "Secretaría de Salubridad y Asistencia"
 MEX_Saludbridad_desc:0 "Die Gesundheitsversorgung Mexikos war zu dieser Zeit miserabel, da die Bevölkerung nicht an Orten mit traditioneller Gesundheitsversorgung lebte. Es herrschte ein eklatanter Mangel an Psychiatern; landesweit gab es nur sechs zugelassene Psychiater. Die Zahnärzte außerhalb der städtischen Gebiete, die die Mehrheit stellten, besaßen keinen gültigen Abschluss. Die Landbevölkerung Mexikos wurde oft von betrügerischen Ärzten und Kräuterheilkundlern behandelt, bis im Zweiten Weltkrieg staatliche Programme eingriffen."
 
 MEX_Literacy:0 "Alphabetisierungsprogramme"
 MEX_Literacy_desc:0 ""
 
 MEX_IBEC:0 "Internationale Gesellschaft für Grundwirtschaft"
 MEX_IBEC_desc:0 "Die IBEC wurde nach 1945 von Nelson Rockefeller aus Trotz gegenüber Präsident Harry S. Truman gegründet. Nelson wollte den Lateinamerikanern und insbesondere Truman zeigen, wie man Lateinamerika industrialisiert."
 
 MEX_Gren:0 "Axel Wenner-Gren-Stiftung"
 MEX_Gren_DESC:0 ""
 
 MEX_Economic_Insolation:0 "Handelsprotektionismus"
 MEX_Economic_Insolation_desc:0 ""
 
 MEX_Industrialization:0 "Industrialisieren"
 MEX_Industrialization_desc:0 ""
 
 MEX_Banco:0 "Banco Nacional Cinematográfico"
 MEX_Banco_desc:0 ""
 
 MEX_Muralism:0 "Wandmalerei"
 MEX_Muralism_desc:0 "In dieser Zeit erlebten Wandmalereien und mexikanische Kunst ein goldenes Zeitalter. Wandmalereien scheuten sich nie vor politischen Themen und waren ebenso Propaganda wie Kunst. Wie Diego Rivera sagte: „Alle Kunst ist Propaganda. Der einzige Unterschied ist die Art der Propaganda.“ "
 
 MEX_Radio_Propaganda:0 "Erweitern Sie La Hora Nacional"
 MEX_Radio_Propaganda_desc:0 "Die National Hour war früher ein Radiospot, der jeden Sonntag um 22 Uhr auf allen Radiosendern ausgestrahlt wurde. Die National Hour erlebte viele Variationen und existiert noch heute."
 
 MEX_Comics:0 "Comic-Einheit"
 MEX_Comics_desc:0 "Mexiko hatte 1940 noch eine unterdurchschnittliche Alphabetisierungsrate, und Comics dieser Zeit schlossen diese Lücke, sodass alle an Geschichten teilhaben konnten. Comics in Mexiko waren eine verbindende Kraft, sie führten zu Wettbewerben und verbreiteten bodenständige Geschichten, mit denen sich die Menschen entweder identifizieren konnten oder die sie selbst erlebten."
 
 MEX_colegio:0 "Colegio De Mexico"
 MEX_colegio_desc:0 "Das Haus Spanien entwickelte sich im Laufe der Zeit zu einer beeindruckenden Schule der Soziologie, als spanische Intellektuelle aus Spanien flohen."
 
 MEX_Nuclear:0 "Uranfieber"
 MEX_Nuclear_desc:0 ""
 
 MEX_Computer:0 "Computerinvestitionen"
 MEX_Computer_desc:0 ""
 
 MEX_Sandoval:0 "Sandovals Traum"
 MEX_Sandoval_desc:0 "Manuel Sandoval Vallarta war bis zu seinem Lebensende stets ein Verfechter der Wissenschaft um der Wissenschaft willen."
 
 MEX_The_Purge:0 "Wachablösung"
 MEX_The_Purge_desc:0 ""
 
 MEX_Pacto_De_Honor:0 "Ehrenpakt"
 MEX_Pacto_De_Honor_desc:0 "Maximino Avila Camacho schuf den sogenannten Ehrenpakt, eine Art Schattenregierung aus Menschen und Organisationen, die er unterwanderte oder davon überzeugte, sich seiner Sache anzuschließen. Diese Menschen befanden sich oft in einer schwierigen Lage, und Maximino bot einen Ausweg, beispielsweise für Unternehmen, die durch die Verstaatlichung von PEMEX geschädigt wurden, oder für Unterstützer von Calles, die unter dem Zusammenbruch seiner Macht litten."
 
 MEX_FTP:0 "Untergrabung der Gewerkschaften"
 MEX_FTP_desc:0 "Maximino war ein Experte darin, Gewerkschaften zu unterwandern. In Pluebla zerlegte er Gewerkschaften und reformierte sie zu etwas politisch Nützlichem, um sich den Anschein eines Mannes des Volkes zu geben."
 
 MEX_Caciques:0 "Kontrolliere die Kaziken"
 MEX_Caciques_desc:0 "Maximino war zu seiner Zeit dafür bekannt, jeden zu töten oder zu diskreditieren, der sich nicht an seine Linie hielt. Er setzte sein Militär ein, um Banditenbanden zu zerschlagen und freiberufliche Kaziken, auch bekannt als Caudillos, zu vernichten. Diese Freiberufler kümmerten sich nicht um Ideologie wie die größeren Caudillos und achteten nur auf ihren eigenen Vorteil."
 
 MEX_Renovacion:0 "La Grupo renovación"
 MEX_Renovacion_desc:0 " Die Renovación war eine Gruppe von Parteigängern in der mexikanischen Politik, die mit harter Hand und Verleumdung gegen linke Politiker den Fanatismus der extremen Rechten schürte. Sie waren Anhänger der beiden Avila-Camacho-Brüder und der Joseph McCarthy der mexikanischen Politik."
 
 MEX_Renovacion2:0 "Feudales Mexiko"
 MEX_Renovacion2_desc:0 ""
 
 MEX_Mexico_First:0 "Mexiko zuerst!"
 MEX_Mexico_First_desc:0 ""
 
 MEX_Union_Reform:0 "Gewerkschaftsreform"
 MEX_Union_Reform_desc:0 ""
 
 MEX_Strengthen_Institutions:0 "Institutionen stärken"
 MEX_Strengthen_Institutions_desc:0 ""
 
 MEX_Era:0 "Das Mexiko des Volkes"
 MEX_Era_desc:0 ""
 
 MEX_Era2:0 "Ein neuer Morgen"
 MEX_Era2_desc:0 ""
 
 MEX_Camarilla:0 "La Camarilla"
 MEX_Camarilla_desc:0 "So wie Maximino seinen Ehrenpakt hatte, hatte Aleman seine eigene Organisation, die von Historikern als Camarilla bezeichnet wird. Historisch gesehen ist Camarilla ein Wort, das im Kontext der spanischen Krone verwendet wird, um die Männer hinter dem König zu beschreiben."
 
 MEX_Death:0 "Santa Muertes Gunst"
 MEX_Death_desc:0 ""
 
 MEX_Inquisition:0 "Die politische Inquisition"
 MEX_Inquisition_desc:0 "Miguel Aleman war bekannt dafür, dass er verdächtigerweise eine Bevorzugung des Todes erfuhr. Er war auch dafür verantwortlich, seine Feinde mit völlig legalen Mitteln zu vernichten, etwa indem er Bundesermittler als Inquistoren einsetzte."
 
 MEX_Perfect_Dictatorship:0 "Die perfekte Diktatur"
 MEX_Perfect_Dictatorship_desc:0 "Historisch gesehen siegte die Camarilla, als Miguel Aleman nach Camachos Tod Präsident wurde. Man sagt, dass die 70 Jahre ab diesem Zeitpunkt, in denen die PRI über unübertroffene politische Macht verfügte, die perfekte Diktatur waren."
 
 MEX_Perfect_Dictatorship2:0 "Der Schatten des Todes"
 MEX_Perfect_Dictatorship2_desc:0 ""
 
 MEX_Marias:0 "Islas Marias renovieren"
 MEX_Marias_desc:0 "Islas Marias war einst als Spielplatz des Diktators Porfirio Diaz bekannt. Ein Inselgefängnis, aus dem niemand entkommen konnte. Es befand sich in der Planungsphase vor Alcatraz und wurde mit der modernsten Gefängnisbautechnik seiner Zeit entworfen: dem radialen Design."
 
 MEX_Colegio:0 "El Colegio de México"
 MEX_Colegio_desc:0 ""
 
 MEX_Syndicalist:0 "Eine Union der Gewerkschaften"
 MEX_Syndicalist_desc:0 "Mexikos Kommunismus war schon immer eine einzigartige Form. Im Gegensatz zum sowjetischen Kommunismus war der mexikanische Volkskommunismus eine Variante des Syndikalismus. Gewerkschaften genossen große Bedeutung und einen hohen Stellenwert in der Regierung, um den Willen des Volkes widerzuspiegeln. Mancher Wunschtraum drehte sich um die Idee, die Minen von Ausländern zurückzuerobern und sie den Mexikanern zurückzugeben."
 
 MEX_Unionize:0 "Stärkung der Gewerkschaften"
 MEX_Unionize_desc:0 ""
 
 MEX_Expropriation:0 "Beenden Sie die Enteignungen"
 MEX_Expropriation_desc:0 ""
 
 MEX_Republic:0 "Vereinigte Mexikanische Gewerkschaften"
 MEX_Republic_desc:0 ""
 
 MEX_Republic2:0 "Mexiko den Mexikanern!"
 MEX_Republic2_desc:0 ""
 
 MEX_Strike_ENG:0 "Schlagt das Imperium zu!"
 MEX_Strike_ENG_desc:0 "Mexikos Feindseligkeit gegenüber Großbritannien war kein Geheimnis, seit Großbritannien mexikanische Ölfelder kaufte. In einer perfekten Welt der mexikanischen Eliten würde Großbritannien brutal zerschlagen werden."
 
 MEX_Contain_ENG:0 "Britischen Einfluss eindämmen"
 MEX_Contain_ENG_desc:0 "Solange Großbritannien in der Karibik präsent ist, sind die Interessen Mexikos bedroht. Indem wir die Briten aus der Region vertreiben, können wir unsere eigene Einflusssphäre aufbauen."
 
 MEX_ENG_Grab:0 "Schnappt sie euch bei den Kolonien!"
 MEX_ENG_Grab_desc:0 "Wenn wir auf der Weltbühne bestehen wollen, dürfen wir Großbritannien eine solch unübertroffene Macht nicht zugestehen. Die Einnahme seiner Kolonien würde das Imperium ernsthaft schädigen."
 
 MEX_ZOOT:0 "Intervenieren Sie in den Vereinigten Staaten"
 MEX_ZOOT_desc:0 "Nach den Zoot-Suit-Unruhen und dem Angriff auf Mexikaner durch US-Bürger und Militärangehörige kam es zu großen Protesten der extremen Linken und der extremen Rechten, die ein Eingreifen forderten."

