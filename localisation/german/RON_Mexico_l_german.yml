  mexico_calles.1.t:0 "REBELLEN GREIFTEN DEN ZUG AN!"
  mexico_calles.1.d:0 "Ein Zug zwischen Mexiko-Stadt und Veracruz wurde gestern von Dissidenten überfallen, wobei mehrere mexikanische Politiker der PRM getötet wurden. Der Zug wurde an einer mit Sprengstoff präparierten Brücke überfallen, sodass ein Banditenraub als Motiv für den Angriff ausgeschlossen ist. Beamte fanden den Zug völlig zerstört vor, sodass den Ermittlern kaum Spuren hinterlassen wurden. Es ist nicht bekannt, ob die Explosion die Waggons in Brand setzte oder ob sie von den Angreifern angezündet wurden, um Beweise zu vernichten. Mexiko erlebt eine zunehmende politische Polarisierung, und nun scheinen politische Extremisten zur Gewalt zu greifen."
  mexico_calles.1.a:0 "Tragisch."
  mexico_calles.1.b:0 "Calles wird dafür mit der Zeit bezahlen."
 
  mexico_calles.2.t:0 "Operation: Mi Lucha"
  mexico_calles.2.d:0 "Endlich haben wir einen Grund, Calles zu verhaften. Die öffentliche Unterstützung für seine Verhaftung ist groß. Wenn wir seine Ranch mit Truppen umzingeln, hat er keine Chance mehr, zu fliehen und seine Rebellenkollegen zu warnen. Während er festgehalten wird, können wir die Überreste seiner Basis zerstören und reinen Tisch machen."
  mexico_calles.2.a:0 "Machen Sie seinem ideologischen Kreuzzug ein Ende."
  
  # mexico.3 is a RANDOMIZER for 2 variant events.
  
  mexico_calles.4.t:0 "EHEMALIGER MEXIKANISCHER PRÄSIDENT IM EXIL!"
  mexico_calles.4.d:0 "Der ehemalige Präsident Plutarco Elias Calles und drei seiner Verbündeten wurden auf Befehl von Präsident [MEX.GetLeader] verhaftet. Mexikos Linke werfen Calles vor, er versuche, die Rechte gegen Präsident Cárdenas, den er als Kommunisten bezeichnet, aufzuwiegeln und das Land möglicherweise in einen Bürgerkrieg zu stürzen. Als die mexikanischen Behörden die Ranch stürmten, verhafteten sie Calles, der in seinem Bett lag und eine spanische Übersetzung von Hitlers Buch „Mein Kampf“ las. Anschließend wurde Calles mitten in der Nacht in ein Flugzeug nach Houston, Texas, gezwungen. Calles kam am Morgen an und soll nun auf dem Weg nach San Diego sein, wo er bei seiner Schwester leben wird. Ein Waffenlager, vermutlich zur Versorgung der Rebellen, wurde ebenfalls sichergestellt."
  mexico_calles.4.a:0 "Ich weiß nicht, was in Mexiko los ist, aber im Moment habe ich zu viel Angst, zu fragen."
  mexico_calles.4.b:0 "Sie schicken nicht ihre Besten, Leute."
  mexico_calles.4.c:0 "Calles wurde genauso behandelt wie so viele andere."
  
  mexico_calles.5.t:0 "EHEMALIGER MEXIKANISCHER PRÄSIDENT IM EXIL!"
  mexico_calles.5.d:0 "Der ehemalige Präsident Plutarco Elias Calles und drei seiner Verbündeten wurden auf Befehl von Präsident [MEX.GetLeader] verhaftet. Mexikos Linke werfen Calles vor, er versuche, die Rechte gegen Präsident Cárdenas, den er als Kommunisten bezeichnet, aufzuwiegeln und das Land möglicherweise in einen Bürgerkrieg zu stürzen. Als die mexikanischen Behörden die Ranch stürmten, verhafteten sie Calles, der in seinem Bett lag und eine spanische Übersetzung von Hitlers Buch „Mein Kampf“ las. Anschließend wurde Calles mitten in der Nacht in ein Flugzeug nach Houston, Texas, gezwungen. Calles kam am Morgen an und soll nun auf dem Weg nach San Diego sein, wo er bei seiner Schwester leben wird. Eine Durchsuchung der Ranch ergab keine Auffälligkeiten."
  mexico_calles.5.a:0 "Ich weiß nicht, was in Mexiko los ist, aber im Moment habe ich zu viel Angst, zu fragen."
  mexico_calles.5.b:0 "Sie schicken nicht ihre Besten, Leute."
  mexico_calles.5.c:0 "Calles wurde genauso behandelt wie so viele andere."
  
  mexico_calles.6.t:0 "Ruft zur Rebellion auf!"
  mexico_calles.6.d:0 "Callista-Anhänger haben in Mexiko einen Aufstand begonnen, als Reaktion auf die sogenannte „Sowjetisierung“ Mexikos. Angetrieben von Plutarcos Rhetorik haben seine Anhänger Mexiko in einen weiteren Bürgerkrieg gestürzt. Es bleibt abzuwarten, ob dieser Aufstand die Brutalität der mexikanischen Revolution erreicht, die Mexiko zehn Jahre lang zerriss."
  mexico_calles.6.a:0 "Dios Mio."
  
  ################
  ## PEMEX TREE ##
  ################
  
  mexico_pemex.1.t:0 "Streiks der Ölarbeiter"
  mexico_pemex.1.d:0 "Herr Präsident [Root.GetLeader], die Arbeiter streiken gegen die unfaire Behandlung durch die ausländischen Konzerne, die die Aguila-Ölgesellschaft aufgekauft haben. Sie haben bereits viele unserer Gesetze eklatant gebrochen, und ein Vorgehen gegen sie wird in der mexikanischen Bevölkerung kaum oder gar keine Gegenreaktionen hervorrufen. Am besten wäre es, die Ölgesellschaft gemäß der Verfassung zu verstaatlichen, die uns das Eigentum an allen natürlichen Ressourcen zuspricht. Die Verstaatlichung des Öls würde die Industrialisierung unseres Landes finanzieren, und im Falle eines Krieges würden wir erhebliche Gewinne erzielen."
  mexico_pemex.1.a:0 "Lasst uns ein Machtspiel machen."
  
  mexico_pemex.2.t:0 "MEXIKO VERSTAATIGT ÖLFIRMEN!"
  mexico_pemex.2.d:0 "[MEX.GetLeader] hat die Verstaatlichung mexikanischer Ölkonzerne angekündigt. Die ehemals ausländischen Unternehmen sollen konfisziert und der staatlichen Ölgesellschaft PEMEX unterstellt werden. Dies trifft vor allem britische und niederländische Unternehmen, die von ihren Regierungen einen Krieg fordern. Die USA sind sich weitgehend unschlüssig, ob sie die Verstaatlichung billigen oder verurteilen sollen, da die Präsenz der Unternehmen auf dem mexikanischen Ölmarkt nicht nur vernachlässigbar war, sondern die Verstaatlichung auch ihren Geschäften durch die Ausschaltung ausländischer Konkurrenz zugutekommt."
  mexico_pemex.2.a:0 "Das ist Wahnsinn, Mexiko wird einen Krieg beginnen!"
  mexico_pemex.2.b:0 "Unerhört! Sie wagen es, unser Eigentum zu stehlen?!"
  mexico_pemex.2.c:0 "Jetzt warten wir auf ihre Antwort."
  
  mexico_pemex.3.t:0 "Mexiko verstaatlicht das Öl!"
  mexico_pemex.3.d:0 "Mexiko hat die Verstaatlichung aller Rohstoffvorkommen des Landes angekündigt. Lobbyisten fordern Krieg, doch politisch wird es gerade dann chaotisch, wenn Deutschlands wachsende Macht eine deutlichere Bedrohung darstellt. Sollten wir Krieg führen, hätten wir weniger Arbeitskräfte und Ressourcen, um mit Deutschland fertig zu werden. Das Terrain ist unwegsam, und es wird wahrscheinlich ein langwieriger Krieg. Unsere andere Option wäre, ein Embargo gegen Deutschland zu verhängen und es zur Rückgabe unserer Besitztümer zu zwingen, wenn Mexiko erkennt, dass es nicht über die nötige Expertise verfügt, um ein Ölunternehmen zu führen."
  mexico_pemex.3.a:0 "Krieg erklären"
  mexico_pemex.3.b:0 "Hungern Sie sie aus."
  
  mexico_pemex.4.t:0 "Mexiko verstaatlicht das Öl!"
  mexico_pemex.4.d:0 "Mexiko hat die Verstaatlichung aller Rohstoffvorkommen des Landes angekündigt. Lobbyisten fordern Krieg, doch politisch wird es gerade dann chaotisch, wenn Deutschlands wachsende Macht eine deutlichere Bedrohung darstellt. Sollten wir Krieg führen, hätten wir weniger Arbeitskräfte und Ressourcen, um mit Deutschland fertig zu werden. Das Terrain ist unwegsam, und es wird wahrscheinlich ein langwieriger Krieg. Unsere andere Option wäre, ein Embargo gegen Deutschland zu verhängen und es zur Rückgabe unserer Besitztümer zu zwingen, wenn Mexiko erkennt, dass es nicht über die nötige Expertise verfügt, um ein Ölunternehmen zu führen."
  mexico_pemex.4.c:0 "Krieg erklären"
  mexico_pemex.4.d:0 "Hungern Sie sie aus."
  
  mexico_pemex.5.t:0 "USA verhängen Embargo gegen Mexiko!"
  mexico_pemex.5.d:0 "Präsident [USA.GetLeader] hat angekündigt, dass Mexiko als Reaktion auf die Verstaatlichung amerikanischer Ölkonzerne in Mexiko mit einem Embargo belegt wird. Politische Analysten sehen darin einen Versuch, den staatlichen mexikanischen Ölkonzern PEMEX auszuhungern und Mexiko zur Rückgabe der verstaatlichten Vermögenswerte zu zwingen."
  mexico_pemex.5.a:0 "Mal sehen, ob PEMEX überlebt."
  mexico_pemex.5.b:0 "Sie versuchen, uns auszuhungern."
  
  mexico_pemex.6.t:0 "Großbritannien verhängt ein Embargo gegen Mexiko!"
  mexico_pemex.6.d:0 "[ENG.GetLeader] hat angekündigt, dass Mexiko als Reaktion auf die Verstaatlichung englischer und niederländischer Ölkonzerne mit einem Embargo belegt wird. Politische Analysten sehen darin einen Versuch, den staatlichen mexikanischen Ölkonzern PEMEX auszuhungern und Mexiko zur Rückgabe der verstaatlichten Vermögenswerte zu zwingen."
  mexico_pemex.6.a:0 "Mal sehen, ob PEMEX überlebt." 
  mexico_pemex.6.b:0 "Sie versuchen, uns auszuhungern."
  
  mexico_pemex.7.t:0 "USA erklären Mexiko den Krieg!"
  mexico_pemex.7.d:0 "Präsident [USA.GetLeader] hat Mexiko den Krieg erklärt, weil er sich über die Beschlagnahmung der Ölvorräte amerikanischer Unternehmen empört hat. [USA.GetLeader] erklärte, man müsse die amerikanischen Interessen verteidigen und werde mexikanisches Verhalten gegenüber amerikanischen Unternehmen nicht dulden. [MEX.GetLeader] antwortete, ausländischer Ölbesitz sei nach mexikanischem Recht von vornherein illegal gewesen und jeder künftige Präsident habe das Recht, dieses Gesetz durchzusetzen. [MEX.GetLeader] erklärte außerdem, man werde für den Schutz der Verfassung vor ausländischen Interessen kämpfen."
  mexico_pemex.7.a:0 "Mein Gott."
  mexico_pemex.7.b:0 "Dios Mio."
  
  mexico_pemex.8.t:0 "Großbritannien erklärt Mexiko den Krieg!"
  mexico_pemex.8.d:0 "Großbritannien hat Mexiko wegen der Verstaatlichung von Vermögenswerten im Wert von über 130 Millionen Dollar den Krieg erklärt. [ENG.GetLeader] erklärte: „Egal, ob Amerika für oder gegen uns ist, Großbritannien lässt sich nicht herumschubsen!“ Mexiko befindet sich also in einer schwierigen Lage."
  mexico_pemex.8.a:0 "Mein Gott."
  mexico_pemex.8.b:0 "Dios Mio."
  
  mexico_pemex.9.t:0 "Entschädigung"
  mexico_pemex.9.d:0 "Da wir nun unter einem Embargo stehen und ein Krieg vorübergehend abgewendet werden konnte, wäre es vielleicht an der Zeit, den USA, die Entschädigungen für die betroffenen Unternehmen fordern, 29 Millionen Dollar Reparationszahlungen anzubieten. Dies würde einen Krieg mit den USA vollständig vermeiden und das Embargo aufheben, unseren Haushalt jedoch vorübergehend belasten. Die Ausweitung unserer potenziellen Märkte würde diese Belastung jedoch aufwiegen."
  mexico_pemex.9.a:0 "Sie wollen eine Entschädigung? Ich würde gerne sehen, dass sie es versuchen."
  mexico_pemex.9.b:0 "Zahlen Sie ihnen eine Entschädigung und beenden Sie die Sache."
  
