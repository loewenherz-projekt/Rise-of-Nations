  #########
  
  curse:0 "Der Fluch von Huitzilopochtli"
  curse_desc:0 "Die mexikanische Revolution, der Cristero-Krieg und der Escobar-Aufstand haben die Mexikaner zögern lassen, dem Militär zu vertrauen, geschweige denn, sich ihm anzuschließen. Aufgeklärte Denker sagen, diese Tragödien, wie alle mexikanischen Tragödien, seien vom aztekischen Kriegsgott geschaffen worden, um seinen blutigen Tribut einzufordern, den er einst von den Azteken verlangte."
  
  jenkins:0 "Jenkins-Blockade"
  jenkins_desc:0 "William O. Jenkins besitzt ein Monopol auf die mexikanischen Medien. Sein stiller Partner war Maximino Avila Comacho, ein Sympathisant der Achsenmächte. Dieses Bündnis, von manchen Historikern als Jenkins-Blockade bezeichnet, war einer der Hauptgründe für das klägliche Scheitern des britisch-französischen Versuchs, die isolationistische US-Außenpolitik auszunutzen und Mexiko in eine europäische Einflusssphäre zu drängen."
  
  allied:0 "Alliierte Propaganda"
  allied_desc:0 "Frankreich und Großbritannien versuchen, die mexikanischen Medien mit Propaganda zu versorgen, um den amerikanischen Isolationismus auszunutzen und die amerikanische Einflusssphäre zu destabilisieren. Ihre Bemühungen sind miserabel, und sie werden zunehmend verzweifelter und verursachen diplomatische Unruhen."
  
  porfirismo:0 "Porfirismo"
  porfirismo_desc:0 "Die alten Reichen Mexikos sind größtenteils Porfiristas, die von der Diktatur von Porfiro Diaz profitierten. Sie unterstützen Deutschland aus Trotz gegenüber Großbritannien und vereiteln aktiv die Bemühungen britischer und französischer Propagandisten. Sie nutzen ihre enorme politische Präsenz, um Mexiko in die Arme der Achsenmächte zu treiben."
  
