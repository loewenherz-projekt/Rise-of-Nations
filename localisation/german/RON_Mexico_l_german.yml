  MEX_forbidden_chemicals:0 "Verbotene Mineralien"
  MEX_forbidden_chemicals_desc:0 "Japan hatte ein Abkommen mit Mexiko über den Import von Mineralien für die Waffenproduktion in Erwägung gezogen, nachdem die USA ein Embargo gegen Japan verhängt hatten."
  
  #starting
  MEX_constable_army:0 "Konstabler Armee"
  MEX_constable_army_desc:0 "Mexikos Armee konzentrierte sich lange Zeit auf die interne Polizeiarbeit und verfügte nicht über die nötige interne Struktur, um Bedrohungen von außen wirksam entgegenzutreten. In dieser Zeit stellten die Caudillos eine ernsthafte Bedrohung für den nationalen Frieden dar und zwangen die mexikanische Regierung, das Militär für Ingenieurprojekte einzusetzen. Dies band nicht nur Arbeitskräfte, um die Caudillos an der Entstehung eines Aufstands zu hindern, sondern verbesserte gleichzeitig auch die nationale Infrastruktur."
  #fascist
  MEX_constable_army2:0 "Beschwichtigtes Militär"
