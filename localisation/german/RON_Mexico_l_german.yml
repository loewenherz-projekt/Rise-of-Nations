  ##########
  ##PEOPLE## - MASSIVE UPDATES FROM JUNTA UPDATE
  ##########
  
  # ARMY FIGURES
  
  Joaquin_Amaro:0 "Joaquín Amaro Domínguez"
  Joaquin_Amaro_desc:0 "Amaro, bekannt als „El Indio“, ist vor allem für seine umfassende Umstrukturierung des mexikanischen Militärs nach der Revolution bekannt. Seine Politik baute die zerschlagene Armee wieder auf und brachte zahlreiche organisatorische Neuerungen in die mexikanische Militärstruktur. Seine Reformen wurden sogar von amerikanischen Zeitungen aufgegriffen, die staunten, wie ein einzelner Indianer eine ganze Armee wieder aufbauen konnte. "
  
  Andres_Figueroa:0 "Andrés Figueroa"
  Andres_Figueroa_desc:0 "Der Armeeminister Andres Figeroa wurde von Cárdenas ernannt, um das Militär von potenziellen Verrätern zu säubern und cardenistische Reformen durchzuführen. Im wirklichen Leben starb Andres Figeroa wenige Monate nach seiner Amtseinführung im Jahr 1936 aus unbekannten Gründen."
  
  MEX_pablo_m_valenzuela:0 "Pablo Macías Valenzuela"
  MEX_pablo_m_valenzuela_desc:0 "Valenzuelas Verantwortung während seiner Amtszeit als Verteidigungsminister bestand in der Verteidigung Mexikos, insbesondere seiner Küsten, vor Überraschungsangriffen."
  
  enrique_estrada2:0 "Enrique Estrada"
  enrique_estrada_desc2:0 "Enrique Estrada war Schüler des berühmten Revolutionsgenerals Felipe Angeles, wo er die Kunst der Artillerie erlernte."
  
  MEX_Escobar:0 "José Gonzalo Escobar"
  MEX_Escobar_desc:0 "José Gonzalo Escobar war der Anführer des Escobar-Aufstands, der Callistas von der Macht verdrängen sollte. Sein Aufstand war zunächst mit Bodentruppen erfolgreich, doch die mangelnde Unterstützung der Luftwaffe besiegelte das Scheitern seines Putsches."
  
  matias:0 "Matías Ramos Santos"
  
  urquizo:0 "Fransisco L. Urquizo"
  urquizo_desc:0 "Fransisco L. Urquizo wechselte im Laufe seiner politischen Karriere die Positionen, doch die bedeutendste Position in seiner politischen Karriere in dieser Ära war die des Chefs der Rüstungsindustrie."
  
  manuel:0 "Manuel Ávila Camacho"
  manuel_desc:0 "Manuel Avila Camacho war von 1936 bis 1939 Verteidigungsminister, bevor er im darauffolgenden Jahr zurücktrat, um für das Präsidentenamt zu kandidieren."
  
  jesus:0 "Jesús Agustín Castro Rivera"
  
  cardenas:0 "Lazaro Cardenas"
  cardenas_desc:0 "Nach seiner Amtszeit war Cárdenas aufgrund eines Rechtsrucks in der mexikanischen Politik, der ihn als kommunistische Marionette diffamierte, zu einer umstrittenen Figur geworden. Sein Status als Held der Revolution flößte jedoch sowohl den Mexikanern als auch dem Militär Vertrauen ein."
  
  MEX_candido_aguilar:0 "Candido Aguilar"
  MEX_candido_aguilar_desc:0 "Cándido Aguilar war ein mexikanischer Offizier, der für die Aufdeckung politischer Korruption und die Flucht aus dem Land bekannt wurde. Kurz nach der Verbannung von Plutarco Elias Calles kehrte er zurück und diente als Berater."
  
  # Air Figures
  
  Luis_F_Cubillas:0 "Luis Farell Cubillas"
  Luis_F_Cubillas_desc:0 "Cubillas ist das am meisten verehrte Idol der mexikanischen Luftfahrt und eines der letzten überlebenden Idole. Er flog Einsätze in jedem Konflikt in Mexiko seit der mexikanischen Revolution und seine zahlreichen Auszeichnungen machen ihn zu einem Symbol des Stolzes Mexikos."
  Luis_F_Cubillas2:0 "Luis Farell Cubillas"
  Luis_F_Cubillas_desc2:0 "Cubillas ist das am meisten verehrte Idol der mexikanischen Luftfahrt und eines der letzten überlebenden Idole. Er flog Einsätze in jedem Konflikt in Mexiko seit der mexikanischen Revolution und seine zahlreichen Auszeichnungen machen ihn zu einem Symbol des Stolzes Mexikos."
  
  MEX_Alfonso_Cruz_Rivera:0 "Alfonso Rivera"
  Alfonso_C_Rivera:0 "Alfonso Rivera"
  Alfonso_C_Rivera_desc:0 "Alfonso Cruz Rivera ist einer der letzten verbliebenen mexikanischen Luftwaffenstars. Während Mexikos Beteiligung am Spanischen Bürgerkrieg war er für die nächtliche Versorgung mit Nachschubflügen verantwortlich. In den 1950er Jahren, während des Mexikanisch-Guatemaltekischen Krieges, plante er einen Luftangriff, der die guatemaltekische Luftwaffe vernichtend getroffen hätte, wäre er nicht aufgrund politischer Verhandlungen in letzter Sekunde abgesagt worden."
  Alfonso_C_Rivera2:0 "Alfonso Rivera"
  Alfonso_C_Rivera2_desc:0 "Alfonso Cruz Rivera ist einer der letzten verbliebenen mexikanischen Luftwaffenstars. Während Mexikos Beteiligung am Spanischen Bürgerkrieg war er für die nächtliche Versorgung mit Nachschubflügen verantwortlich. In den 1950er Jahren, während des Mexikanisch-Guatemaltekischen Krieges, plante er einen Luftangriff, der die guatemaltekische Luftwaffe vernichtend getroffen hätte, wäre er nicht aufgrund politischer Verhandlungen in letzter Sekunde abgesagt worden."
  
  Juan_Azcarate:0 "Juan Azcárate"
  Juan_Azcarate_desc:0 "Juan Azcárate war während der Maximato-Ära ein hochdekorierter Luftfahrtingenieur und eine der Luftfahrtlegenden Mexikos. Er war Direktor der TNCA, bevor diese während des Maximato geschlossen wurde. In seiner Autobiografie machte er politische Unterdrückung für die Schließung verantwortlich."
  
  MEX_Alfonso_Tabon:0 "Alfonso Tabon"
  MEX_Alfonso_Tabon_desc:0 "Alfonso Tabon war der Armeeoffizier, der mit der Modernisierung der mexikanischen Luftwaffe beauftragt wurde. Im wirklichen Leben waren seine Versuche vergeblich, da die Paranoia vor dem Zweiten Weltkrieg dazu führte, dass andere Länder zögerten, Flugzeuge und Technologie zu lizenzieren. Die Demontage der mexikanischen Luftfahrtprogramme während des Maximato führte zu einem erheblichen Braindrain für einheimische Entwickler."

  MEX_Juan:0 "Juan Villasana"
  MEX_Juan_desc:0 "Juan Villasana ist ein weiterer hochdekorierter Luftfahrtpionier. Er erfand die Anáhuac-Helix, die in andere lateinamerikanische Länder und nach Japan exportiert wurde. Das Kaiserlich Japanische Luftkorps lobte ihn für seine Erfindung, und er gilt als Begründer der mexikanischen Luftfahrt. Er war auch einer der ersten, der einen Hubschrauber konstruierte, den sogenannten „Villasana-Helikopter“."
  
  MEX_Gustavo_L_Gonzalez:0 "Gustavo L. Gonzalez"
  
  Salinas:0 "Gustavo Adolfo Salinas Camiña"
  Salinas2:0 "Gustavo Adolfo Salinas Camiña"
  Salinas3:0 "Gustavo Adolfo Salinas Camiña"
  Salinas_desc:0 "Der erste Flieger, der einen Seeangriff durchführte. 1943 wurde er mit den Worten zitiert: „Die Bomben, die ich benutzte, waren selbstgebaut und enthielten 52 Dynamitstangen. So primitiv sie auch waren, sie funktionierten einwandfrei. Ich flog damals einen alten Wright-Pusher. Mir kam der Gedanke, dass wir eines Tages Flugzeuge haben würden, deren Tragfähigkeit unsere kühnsten Träume übertraf, und dass das Flugzeug dann als militärische Angriffswaffe von sagenhafter Kraft zum Einsatz kommen würde. Dieser Tag ist gekommen.“ "
  Salinas2_desc:0 "Der erste Flieger, der einen Seeangriff durchführte. 1943 wurde er mit den Worten zitiert: „Die Bomben, die ich benutzte, waren selbstgebaut und enthielten 52 Dynamitstangen. So primitiv sie auch waren, sie funktionierten einwandfrei. Ich flog damals einen alten Wright-Pusher. Mir kam der Gedanke, dass wir eines Tages Flugzeuge haben würden, deren Tragfähigkeit unsere kühnsten Träume übertraf, und dass das Flugzeug dann als militärische Angriffswaffe von sagenhafter Kraft zum Einsatz kommen würde. Dieser Tag ist gekommen.“ "
  Salinas3_desc:0 "Der erste Flieger, der einen Seeangriff durchführte. 1943 wurde er mit den Worten zitiert: „Die Bomben, die ich benutzte, waren selbstgebaut und enthielten 52 Dynamitstangen. So primitiv sie auch waren, sie funktionierten einwandfrei. Ich flog damals einen alten Wright-Pusher. Mir kam der Gedanke, dass wir eines Tages Flugzeuge haben würden, deren Tragfähigkeit unsere kühnsten Träume übertraf, und dass das Flugzeug dann als militärische Angriffswaffe von sagenhafter Kraft zum Einsatz kommen würde. Dieser Tag ist gekommen.“ "

  agustin_olachea2:0 "Agustin Aviles Olachea"
  agustin_olachea2_desc:0 "Agustin Aviles Olachea baute während des Zweiten Weltkriegs Luftfahrtschulen auf und half dabei, die mexikanische Luftwaffe für spätere Generationen zu formalisieren, als die Ära der autodidaktischen revolutionären Luftfahrtidole zu Ende ging."
  
  antonio:0 "Antonio Cardenas Rodriguez"
  antonio_desc:0 "Der entscheidende Moment in Antonios Militärkarriere war die Führung des Geschwaders 201 über den Philippinen in der Schlussphase des Zweiten Weltkriegs."
  
  #POLITICAL FIGURES
  
  Miguel_Comacho:0 "Miguel Ávila Camacho"
  Miguel_Comach_desc:0 "Miguel Ávila Camacho war der Nachfolger von Andres Figeroa im Heeresministerium. Amerikanische Beobachter lobten ihn dafür, dass er die mexikanische Armee endlich professionalisiert und die zerschlagene mexikanische Armee zu einer kleinen, aber disziplinierten Streitmacht umgebaut habe."
  
  Maximino:0 "Maximino Ávila Camacho"
  Maximino_desc:0 "Maximino ist der Bruder von Manuel Avila Comacho. Maximino ist nicht nur als Sympathisant der Achsenmächte bekannt, sondern auch als Geschäftspartner von William Jenkins, der ein Monopol auf die mexikanischen Medien hat und den Einfluss der Alliierten vereitelt. Maximinos Einmischung zerstörte im Alleingang die Propagandaversuche Frankreichs und Großbritanniens."
  
  Mugica:0 " Francisco José Múgica"
  Mugica_desc:0 "Múgica war einer der bekannteren Generäle während der mexikanischen Revolutionen und sollte von Cárdenas anstelle des konservativeren Manuel Ávila Comacho als sein linker Nachfolger ausgewählt werden. Mugicas Kandidatur war nicht durchführbar, da gegen Ende von Lázaros Amtszeit die Unterstützung für seine politischen Ansichten zusammenbrach."

  MEX_PAB:0 "Pablo Quiroga Trevino"
  MEX_PAB_desc:0 "Pablo Quiroga Trevino gilt als einer der engsten Verbündeten von Cárdenas. Er ist verantwortlich für die Durchsetzung der umstrittenen sozialistischen Bildung und für die politische Linie von Cárdenas. Pablo Quiroga war einer der wenigen Minister des ursprünglichen Kabinetts, die auf der Seite von Cárdenas standen."
  
  MEX_SANTA:0 "Miguel G. Santa Ana"
  MEX_SANTA_desc:0 "Miguel G. Santa Ana war im Auftrag von SEDENA, dem mexikanischen Heeres- und Marineministerium, für die Beschaffung von Ausrüstung, Vorräten und anderen Vermögenswerten verantwortlich."
  
  Castillo:0 "Francisco Castillo"
  Castillo_desc:0 "Castillo war vor allem für seine Position als Botschafter im Ausland bekannt, wo er mögliche Handelsabkommen auslotete und allgemein die diplomatischen Beziehungen verbesserte."
  
  agustin_olachea:0 "Agustin Aviles Olachea"
  agustin_olachea_desc:0 "Agustín Olachea war für den Bau aller für die mexikanischen Streitkräfte wichtigen Einrichtungen verantwortlich. Er beaufsichtigte den Bau zahlreicher Militärprojekte, von neuen Luftwaffenstützpunkten bis hin zu neuen Militärakademien in ganz Mexiko."
  
  MEX_plutarco_e_calles_desc:0 "Plutarco Calles, auch bekannt als „El Jefe Maximo“, war von 1924 bis 1928 populistischer Präsident. Anfangs war er ein Mann des Volkes mit großer öffentlicher Unterstützung und ein Held der Revolution. Unglücklicherweise hielt er sich, wie der Diktator Porfiro Diaz, gegen den die Revolution kämpfte, bis 1936 mit Hilfe von Marionettenpräsidenten und Anhängern der PRM an der Macht. Seine Politik driftete mit der Zeit nach rechts, und als seine Politik den Cristero-Krieg mit auslöste, war sein Ruf völlig zerstört. Dieser schlechte Ruf gipfelte 1936 in seiner Verbannung nach San Diego."
  
  padilla:0 "Ezequiel Padilla Peñaloza"
  padilla_desc:0 "Während seiner Regierungszeit ist Padilla vor allem für seine entschiedene pro-amerikanische Haltung bekannt. Padilla war ein so überzeugter Unterstützer der US-Interessen, dass er den USA regelmäßig streng geheime mexikanische Dokumente übergab."
  
  MEX_eduardo_saurez:0 "Eduardo Saurez"
  MEX_eduardo_saurez_desc:0 "Eduardo Saurez war von 1935 bis 1946 mexikanischer Finanzminister."
  
  MEX_rex_applegate:0 "Rex Applegate"
  MEX_rex_applegate_desc:0 "Rex Applegate war ein US-Offizier und Roosevelts persönlicher Leibwächter, der mexikanische Soldaten in Spezialeinsatztaktiken, insbesondere im Nahkampf, ausbilden sollte und noch lange nach dem Krieg als Berater diente."
  
  MEX_Jose_Revueltas:0 "José Revueltas"
  MEX_Jose_Revueltas_desc:0 "José Revueltas war ein umstrittener kommunistischer Autor. Er wurde aus mehreren kommunistischen Parteien ausgeschlossen, weil er deren politische Ansichten offen kritisierte. Bekannt ist er auch für seine Verbindungen zu Gewerkschafts- und Bauernprotesten in den späten 1960er Jahren. Seine Verbreitung von Protestbotschaften führte 1968 zum Massaker von Tlatelolco."
  
  MEX_Maria:0 "María del Refugio García"
  MEX_Maria_desc:0 "María del Refugio García war eine Ikone des mexikanischen Feminismus und bekannt für ihre marxistischen Ansichten. Bekannt wurde sie vor allem durch ihren elftägigen Streik zur Reform diskriminierender Gesetze gegen Frauen, der die Aufmerksamkeit von Präsident Lazaro Cardenas erregte."
  # Navy
  Heriberto:0  "Heriberto Jara Corona"
  Heriberto_desc:0  "Heriberto ist der allererste Marineminister Mexikos. Aufgrund der Zentralisierung des Militärs wurde der Marineminister geschaffen, um die politische Macht des Militärs zu schwächen."
  
  hector:0 "Hector Meixueiro"
  
  # Theorists - JUNTA UPDATE, NEW STUFF HERE.
  
  gustavo:0 "Gustavo Adolfo Salinas Camiña"
  gustavo_desc:0 "Der erste Flieger, der einen Seeangriff durchführte. 1943 wurde er mit den Worten zitiert: „Die Bomben, die ich benutzte, waren selbstgebaut und enthielten 52 Dynamitstangen. So primitiv sie auch waren, sie funktionierten einwandfrei. Ich flog damals einen alten Wright-Pusher. Mir kam der Gedanke, dass wir eines Tages Flugzeuge haben würden, deren Tragfähigkeit unsere kühnsten Träume übertraf, und dass das Flugzeug dann als militärische Angriffswaffe von sagenhafter Kraft zum Einsatz kommen würde. Dieser Tag ist gekommen.“ "
  
  matias2:0 "Matías Ramos"
  
  enrique_estrada:0 "Enrique Estrada"
  enrique_estrada_desc:0 "Enrique Estrada war Schüler des berühmten Revolutionsgenerals Felipe Angeles, wo er die Kunst der Artillerie erlernte."
  
  MEX_Manuel_Sandoval_Vallarta:0 "Manuel Sandoval Vallarta"
  MEX_Manuel_Sandoval_Vallarta_desc:0 "Vallarta war ein mexikanischer Physiker, der sowohl am MIT als auch an der UNAM lehrte. Sein Fachgebiet war die kosmische Strahlung. 1927 erhielt er ein Gugeinheim-Stipendium und verbrachte Aufenthalte an den Universitäten Berlin und Leipzig. Dort lernte er von Einstein, Heiseinberg, Schrödinger und Planck. 1946 entschied er sich, Vollzeit an der UNAM zu bleiben, um dort als Berater für Wissenschaftspolitik zu arbeiten. Vallarta ist insofern einzigartig, als er in den USA Studenten betreute, die später das Manhattan-Projekt abschlossen. Seine Schüler waren Richard Feynman und Julius Stratton. Außerdem war er Kollege des berühmten belgischen Physikers Georges Lemaître bei dessen Forschungen zur kosmischen Strahlung."
  
  
  #############
  ##COMPANIES##
  #############
  
  PEMEX:0 "PEMEX"
  PEMEX_desc:0 "PEMEX ist die verstaatlichte Ölgesellschaft Mexikos. Ihre Gründung löste eine gewaltige Welle geologischer Entdeckungen, sozialer Entwicklungen und wirtschaftlicher Innovationen aus und war die treibende Kraft hinter der Industrialisierung Mexikos."
  
  aguila:0 "Aguila-Öl"
  aguila_desc:0 "Die Sinarquistas, Mexikos Faschisten, waren überzeugte Kapitalisten, die an die mexikanische Kontrolle des mexikanischen Marktes glaubten. Wollte ein ausländisches Unternehmen in den mexikanischen Markt eintreten, musste es dies über einen unabhängigen mexikanischen Vermittler tun. Unter ihrer Führung wäre die ausländische Ölindustrie zwangsweise eingebürgert worden, und falls es PEMEX gegeben hätte, wäre es stückweise an die mexikanische Elite versteigert worden."
  
  CEMEX:0 "CEMEX"
  
  Azcarate:0 "Azcarate SA"
  Azcarate_desc:0 "Nach seinem politischen Exil gründete Azcarate ein kleines Luftfahrtunternehmen, wo er während des Zweiten Weltkriegs in Partnerschaft mit Lockheed Martin Projekte durchführte."
  
  baja:0 "Mariscraft SA"
  baja_desc:0 "Mariscraft war ein unbekanntes mexikanisches Luftfahrtunternehmen, das in Wirklichkeit nur ein Flugzeug produzierte: die MA-260. Die MA-260 galt als mexikanisches Projekt zur Entwicklung eines Langstrecken-Jagdbombers, basierend auf dem Konzept der 8W Zeus."
  
  Mendoza:0 "Productos Mendoza"
  Mendoza_desc:0 "Mendoza ist nach Manuel Mondragon der zweite legendäre mexikanische Waffendesigner. Sie sind auf Maschinengewehre spezialisiert, von schweren Maschinengewehren über Maschinenpistolen bis hin zu vollautomatischen Gewehren."
  
  Obregon: "Alejandro Obregón"
  Obregon_desc:0 "Obregón ist vor allem für die Obregón .45 Pistole bekannt, die das Design der 1911 vereinfachte. Das Innere unterschied sich deutlich von der 1911 und wies viele vereinfachte Teile auf. Dadurch war die Obregón Pistole zuverlässiger und günstiger als die 1911. Obregóns Pistolen gelten als Meisterwerke handwerklicher Qualität."
  
  TGA2:0 "TGA"
  TGA2_desc:0 "Die TNCA, heute TGA, baute nicht nur Flugzeuge. Sie entwickelte auch Panzer mit starkem Panzerungsschutz und großkalibrigen Kanonen. Während des Maximato wurden jedoch sowohl die Flug- als auch die Panzerabteilungen geschlossen."
  
  Grupo_Ramirez:0 "Grupo Ramirez"
  Grupo_Ramirez_desc:0 "Mexikos erstes Automobilunternehmen und Hersteller des Lastwagens Rural Ramirez. Das Unternehmen ist auf günstige, zuverlässige Autos und Motoren spezialisiert."
  
  Grupo_Ramirez2:0 "Grupo Ramirez"
  Grupo_Ramirez2_desc:0 "Mexikos erstes Automobilunternehmen und Hersteller des Lastwagens Rural Ramirez. Das Unternehmen ist auf günstige, zuverlässige Autos und Motoren spezialisiert."
  
  VAM:0 "VAM"
  VAM_desc:0 "Ein staatlich kontrollierter Autohersteller, ursprünglich eine Tochtergesellschaft von American Jeep, die nach einer Übernahme durch die Regierung in ein eigenes Unternehmen umgewandelt wurde."
  
  VAM2:0 "VAM"
  VAM2_desc:0 "Ein staatlich kontrollierter Autohersteller, ursprünglich eine Tochtergesellschaft von American Jeep, die nach einer Übernahme durch die Regierung in ein eigenes Unternehmen umgewandelt wurde."
  
  TELMEX:0 "TELMEX"
  TELMEX_DESC:0 "Telmex ist das mexikanische Telekommunikationsmonopol. Bevor es an private Interessenten verkauft wurde, wurde es von der mexikanischen Regierung aufgekauft, um die mexikanischen Kommunikationsnetze zu erneuern."
  
  MEX_ASTIMAR:0 "ASTIMAR"
  MEX_ASTIMAR_desc:0 "ASTIMAR ist ein staatlich kontrollierter Schiffsbauer. Das Unternehmen ist auf Kanonenboote und Küstenverteidigung spezialisiert."
  
  AHMSA:0 "AHMSA"
  AHMSA_desc:0 "AHMSA ist der größte Eisen- und Kohlebergbaubetrieb Mexikos und zugleich der größte Stahlproduzent. Das Unternehmen ist auf Maschinenteile und Stahlteile für Infrastrukturprojekte wie Brücken spezialisiert."
  
  league:0 "Mexikanische Liga für Radioexperimente"
  league_desc:0 "Die mexikanische Liga für Radioexperimente war eine Gruppe von Wissenschaftlern, darunter einige Wunderkinder, die Innovationen im Bereich der Funkkommunikation hervorbrachten. Sie sind vor allem für die Erfindung der Technologie bekannt, die das Farbfernsehen ermöglichte."
  
  Echevarrieta:0 "Echevarrieta-Werften"
  Echevarrieta_desc:0 "Echevarrieta war eine spanische Werft, die Konvoi-Begleitschiffe nach Mexiko verkaufte."
  
  Odero:0 "Odero-Werften"
  Odero_desc:0 "Odero Shipyards war eine italienische Werft, die für den Bau der stärker gepanzerten Schiffe der mexikanischen Flotte verantwortlich war."
  
  Angel:0 "Engel Lascurian"
  Angel_desc:0 "Angel Lascurian war ein legendärer mexikanischer Flieger und baute das fortschrittlichste und futuristischste Flugzeug aller in Mexiko produzierten Flugzeuge. Zeitschriften für Luftfahrtbegeisterte staunten darüber, wie er mit nur einer einfachen Werkbank ein zweimotoriges Einsitzer-Frachtflugzeug im eigenen Design konstruierte und fertigte. Dieses Flugzeug hieß Aura und wurde von Beobachtern als für ein Flugzeug seiner Größe unnatürlich wendig bezeichnet."
  
  electridad:0 "Comisión Federal de Electricidad"
  electridad_desc:0 "Comisión Federal de Electricidad ist das staatliche Energieunternehmen, das auch für die Entwicklung und den Bau der mexikanischen Kernkraftwerke verantwortlich ist."
  
  yokosuka_naval_arsenal2:0 "Marinearsenal Yokosuka"
  
