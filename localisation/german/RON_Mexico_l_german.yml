 escobar_returns:0 "Escobar kehrte nach Mexiko zurück"
 election_1940:0 "Wahlsaison 1940"
 riot:0 "Es kam zu einem Zoot Suit-Aufstand"
 # the description for the bookmark at the nation select
 MEX_GATHERING_STORM_DESC:0 "Mexiko befindet sich in den letzten Tagen des Maximato, der Periode, in der der ehemalige Präsident Plutarco Elias Calles mithilfe rechtsgerichteter Loyalisten in Politik und Militär die wahre Macht innehatte. Seit 1934 führt Lázaro Cárdenas del Río einen politischen Krieg, um Plutarcos Kontrolle über das Land zu beenden und seine eigenen linken Reformen durchzusetzen. Mexiko steht an einem Scheideweg, während sich die Welt auf einen Krieg vorbereitet. Linke und Rechte kämpfen um die Kontrolle über die Zukunft des Landes und seinen Platz in der kommenden neuen Weltordnung."
 MEX_BLITZKRIEG_DESC:0 "Der Maximato ist beendet und Calles ist weg, doch der Kampf zwischen dem linken und rechten Flügel tobt weiter. Ermutigt durch die wirtschaftlichen Schwierigkeiten, die die PEMEX-Embargos mit sich brachten, polarisierte sich die Rechten und befinden sich nun in einem politischen Bürgerkrieg um den rechten Präsidentschaftskandidaten im nächsten Jahr. Die dominierende PRI steht nun jedoch vor der Wahl, ihre Ideale mit dem gemäßigten Kandidaten Camacho zu kompromittieren oder den linken Kandidaten Mugica zu verstärken."
 
 
 # Biographies
 POLITICS_DIONISIO_ENCINA_DESC:0 "Dionisio galt als polarisierende Figur, und Historiker fanden oft wenig Positives über seine Führung zu berichten. Dionisio war für die Spaltung der größten kommunistischen Partei Mexikos, der PCM, verantwortlich. Er wurde von sowjetischen Agenten unterstützt, die für die Verbreitung des Kommunismus in Mexiko zuständig waren, und handelte nur auf Befehl. Er befürchtete, seine sowjetischen Agenten könnten einen geeigneteren Anführer für die PCM finden. Aus Angst, von ihnen ersetzt zu werden, schloss er jeden aus der PCM aus, der über bessere Führungsqualitäten oder Charisma verfügte. Dadurch mangelte es der PCM an guter Führung und proaktivem Denken."


