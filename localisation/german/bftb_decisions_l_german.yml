 BUL_rearmament:0 "Bulgarische Wiederbewaffnung"
 BUL_rearmament_desc:0 "Nach unserer Niederlage im Ersten Weltkrieg und der Durchsetzung des Neuilly-Vertrags war unsere Armee enormen Einschränkungen unterworfen. Doch nun stehen Europa turbulente Zeiten bevor. Wenn wir die territoriale Integrität Bulgariens und die Freiheit seines Volkes bewahren wollen, müssen wir einen Weg finden, diese Einschränkungen hinter uns zu lassen und mit dem Wiederaufbau unserer Armee zu beginnen."
 BUL_demonstrate_our_policies_of_peace:0 "Demonstrieren Sie unsere Friedenspolitik"
 BUL_demonstrate_our_policies_of_peace_desc:0 "Wenn wir mit der britischen Regierung über unsere militärische Wiederaufrüstung verhandeln wollen, müssen die Territorialstreitigkeiten mit unseren Nachbarn beendet werden."
 BUL_pressure_to_lift_army_restrictions:0 "Druck zur Aufhebung der Armeebeschränkungen"
 BUL_pressure_to_lift_army_restrictions_desc:0 "Wir müssen [ENG.GetNameDef] drücken, um endlich der Aufhebung aller Beschränkungen für unsere Armee zuzustimmen."
 BUL_refuse_army_restrictions:0 "Armeebeschränkungen ablehnen"
 BUL_refuse_army_restrictions_desc:0 "Da wir nun die Unterstützung von [GetBulgarianFactionName] haben, benötigen wir nicht länger die Zustimmung von [ENG.GetNameDef], um mit unserer militärischen Wiederaufrüstung zu beginnen."
 BUL_refuse_army_restrictions_faction_name:0 "der [ROOT.GetFactionName]"
 BUL_refuse_army_restrictions_no_faction:1 "unsere Verbündeten"
 BUL_rearmament_negotiations_ongoing_flag:0 "Verhandelt derzeit über die militärische Wiederaufrüstung"
 BUL_rearmament_main_factors_tt:0 "\nWichtigste Faktoren, die die Entscheidung von [ENG.GetAdjective] beeinflussen: \n§G- Öffentliche Verurteilung der IMRO \n- Gute Beziehungen zu §Y[ENG.GetNameWithFlag]§! \n- Vervollständigung des Schwerpunkts §YVertrag über Ewige Freundschaft§! oder §YAbkommen von Saloniki§! \n- Neigung zur Demokratie \n- Dieselbe Regierung wie §Y[ENG.GetNameWithFlag]§!§! \n§R- Schlechte Beziehungen zu §Y[ENG.GetNameWithFlag]§! \n- Unterstützung der IMRO \n- Ernennung von Bogdan Filov zum Berater oder Staatschef§!"

 BUL_purchase_equipment:0 "Kaufen Sie ausländische Ausrüstung"
 BUL_purchase_equipment_desc:0 "Die [ROOT.GetAdjective]-Industrie ist unterentwickelt und kann moderne Waffen nicht in einem akzeptablen Tempo produzieren. Wir müssen im Ausland nach stärker industrialisierten Ländern suchen, die uns mit der benötigten militärischen Ausrüstung versorgen können."
