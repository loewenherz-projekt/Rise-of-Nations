 form_country_turkish_coastal_required_states_tt:0 "Kontrolliert alle westlichen „türkischen“ Küstenstaaten."
 form_country_dodecanese_required_state_tt:0 "Kontrolliert die §YDodekanes-Inseln§!."
 form_country_cyprus_required_state_tt:0 "Steuert §YCypern§!."
 form_country_turkish_coast_coring_states_tt:0 "Gewinnen Sie Kerne in allen westlichen §Ytürkischen§! Küstenstaaten."
 form_country_cyprus_coring_state_tt:0 "Erhalte Kerne auf §YCyprus§!."
 GRE_move_capital_to_constantinople:0 "Verlegung der Hauptstadt nach Konstantinopel"
 GRE_move_capital_to_constantinople_desc:0 "Konstantinopel, die Hauptstadt der zweiten hellenischen Zivilisation, wurde als „Traum und Hoffnung aller Griechen“ und als die Stadt der Sehnsucht der Welt bezeichnet. Wir können die Hauptstadt unseres Landes in die alte Hauptstadt verlegen, um unsere wiederentdeckte Größe zu demonstrieren."
 move_capital_to_thessaloniki:0 "Verlegung der Hauptstadt nach Thessaloniki"
 move_capital_to_thessaloniki_desc:0 "Athen war die Hauptstadt der ersten hellenischen Zivilisation, Konstantinopel war die Hauptstadt der zweiten hellenischen Zivilisation, aber Thessaloniki – die ewige „Co-Hauptstadt“ der hellenischen Geschichte – wird die neue Hauptstadt der dritten hellenischen Zivilisation sein."
 rename_antalya:0 "Antalya umbenennen"
 rename_gjirokaster:0 "Gjirokastra umbenennen"
 GRE_appoint_aristotle_onassis_as_prime_minister:0 "Ernennung von Aristoteles Onassis zum Premierminister"
 GRE_appoint_aristotle_onassis_as_prime_minister_desc:0 "Aristoteles Onassis hat maßgeblich dazu beigetragen, die venezianischen Träume von der Megali-Idee zu verwirklichen. Als [ROOT.GetAdjective] Bürger, geboren im [339.GetName], ist der junge charismatische Magnat vielleicht der Mann, der uns als Nation vereinen kann."

 form_macedonian_empire_category:0 "Reformieren Sie das mazedonische Reich"
 form_macedonian_empire_category_desc:0 "Manche würden es für verrückt halten, sich an die Tage des Reiches Alexanders des Großen zu erinnern, doch um die Dritte Hellenische Zivilisation wirklich zu festigen, müssen wir vollständig zu der ersten zurückkehren, aus der wir stammen."
 form_macedonian_empire:0 "Ehre das Erbe der Argeaden"
 form_macedonian_empire_desc:2 "Es ist an der Zeit, unsere versammelten Satrapien zu einem zentralisierten Superstaat zusammenzufassen, dessen Vereinigung der Welt zeigen wird, dass Griechenland keine Nation mehr ist, die man verspotten oder einschüchtern kann, sondern ein Imperium, das man fürchten muss."
 form_country_southern_yugoslavia_required_states_tt:0 "Kontrolliert alle §Ybulgarischen§! und §Yalbanischen§! Staaten sowie alle §YYugoslawischen§! Staaten südlich von §YSerbien§!."
 form_country_southern_central_asia_required_states_tt:0 "Steuert §Y[742.GetName]§!, §Y[732.GetName]§! und §Y[405.GetName]§!."
 form_country_british_levant_required_states_tt:0 "Steuert §Y[454.GetName]§!, §Y[455.GetName]§! und §Y[656.GetName]§!"
 form_country_punjab_required_states_tt:0 "Kontrolliert alle §YPakistanischen§!-Staaten."


 TUR_the_constitutional_arrows_category:0 "Gesetz Nr. 3115"
 TUR_the_constitutional_arrows_category_desc:0 "Die sechs Leitprinzipien von [ROOT.GetNameDef] sind in unserer Verfassung verankert, und solange wir sie einhalten, müssen wir daran glauben, dass unsere Nation niemals von innen heraus zerrissen werden wird."
 TUR_republicanism_decision:0 "Republikanismus"
 TUR_republicanism_decision_desc:0 "Dieses Land entstand aus der Asche des gescheiterten osmanischen Sultanats. Heute sind wir keinem Sultan, keinem Kalifen und keinem Gott mehr verpflichtet – wir sind frei und haben für dieses Recht auf Freiheit gelitten."
 TUR_stoked_republicanism_flag:0 "Kürzlich wurden die republikanischen Gefühle angeheizt."
 TUR_secularism_decision:0 "Säkularismus"
 TUR_secularism_decision_desc:0 "Wenn wir zulassen, dass die Dogmen archaischer, im Mittelalter gefangener Glaubensrichtungen unsere Regierungsführung und unsere Lebensweise bestimmen, werden wir nie die Fähigkeiten entwickeln, die nötig sind, um unter den Großmächten der Welt als gleichwertig angesehen zu werden."
 TUR_stoked_secularism_flag:0 "Kürzlich geschürte säkularistische Stimmungen."
 TUR_populism_decision:0 "Populismus"
 TUR_populism_decision_desc:0 "Für jede verantwortungsbewusste Regierung muss das Volk stets die oberste Priorität haben. Darüber gibt es keinen Raum für Debatten."
 TUR_stoked_populism_flag:0 "Kürzlich geschürte populistische Stimmungen."
 TUR_nationalism_decision:0 "Nationalismus"
 TUR_nationalism_decision_desc:0 "Wir haben schon früher für unser Land gekämpft und sind gestorben, und wir müssen alle bereit sein, es erneut zu tun."
 TUR_stoked_nationalism_flag:0 "Kürzlich geschürte nationalistische Gefühle."
 TUR_etatism_decision:0 "Etatismus"
 TUR_etatism_decision_desc:0 "Der Vorteil einer Planwirtschaft liegt darin, dass die Exekutive durch fiskalische Mechanismen einen erheblichen Einfluss auf die Wirtschaftsentwicklung behält. Es läge im nationalen Interesse, diese Mechanismen jetzt zu nutzen."
 TUR_no_longer_has_etatism_tt:0 "Der §YEtatismus§ wird nicht länger aufrechterhalten!"
 TUR_etatism_abolished:0 "Der „YEtatismus“ wurde abgeschafft."
 TUR_reformism_decision:0 "Reformismus"
 TUR_reformism_decision_desc:0 "Unser Volk war schon immer auf dem neuesten Stand – selbst die Osmanen waren dafür bekannt, mit ihren politischen oder sozialen Reformen manchmal die Grenzen zu überschreiten. Die Dynamik des Volkes ist eine unserer größten Qualitäten."
 TUR_stoked_reformism_flag:0 "Kürzlich geschürte reformistische Stimmungen."
 TUR_revolutionism_decision:0 "Revolutionismus"
 TUR_revolutionism_decision_desc:0 "Die Befreiung vom osmanischen Joch und die Gründung des türkischen Nationalstaates waren eine Revolution. Wir haben uns verändert und verändern uns weiterhin, während wir uns durch unsere nationale Metamorphose kämpfen und uns zu dem Volk entwickeln, das wir schon immer werden wollten …"
 TUR_stoked_revolutionism_flag:0 "Kürzlich geschürte revolutionäre Stimmungen."
 TUR_liberalism_decision:0 "Liberalismus"
 TUR_liberalism_decision_desc:0 "Die Freiheit, über die eigene Zukunft zu entscheiden, ist ein Eckpfeiler unserer Träume für die Zukunft dieses Landes. Freier Handel, freie Wahlen, Religionsfreiheit, Chancengleichheit – danach müssen wir ständig streben."
 TUR_stoked_liberalism_flag:0 "Kürzlich wurden liberale Gefühle geschürt."
 TUR_jihad_decision:0 "Dschihad"
 TUR_jihad_decision_desc:0 "Mit Blei und Schwert werden wir den Willen des Allmächtigen durchsetzen und die eigensinnigen Seelen vernichten, die von seinem Weg abgekommen sind."
 TUR_stoked_jihad_flag:0 "Kürzlich wurden extremistische Stimmungen geschürt."
 TUR_fidelity_decision:0 "Treue"
 TUR_fidelity_decision_desc:0 "Loyalität gegenüber dem Sultan und Loyalität gegenüber dem Allmächtigen – das sind die beiden wesentlichen Säulen, vor denen jeder Bürger in Ehrfurcht niederknien sollte."
 TUR_stoked_fidelity_flag:0 "Kürzlich wurden treue Gefühle geweckt."
 TUR_absolutism_decision:0 "Absolutismus"
 TUR_absolutism_decision_desc:0 "Die Herrschaft des Sultans ist absolut; das Osmanische Reich hat sich einst von innen heraus zerrissen, und die Geschichte darf sich nie wiederholen."
 TUR_stoked_absolutism_flag:0 "Kürzlich geschürte monarchistische Gefühle."
 TUR_ultranationalism_decision:0 "Ultranationalismus"
 TUR_ultranationalism_decision_desc:0 "Es genügt nicht, einfach nur bereit zu sein, für sein Land zu sterben; jeder Bürger muss sich mit Leib, Seele und Geist dem Wohl der Nation hingeben."
 TUR_stoked_ultranationalism_flag:0 "Kürzlich geschürte ultranationalistische Stimmungen."
 TUR_socialism_decision:0 "Sozialismus"
 TUR_socialism_decision_desc:0 "Wir haben unsere einstigen Könige gestürzt und müssen nun mit der Arbeiterklasse zusammenarbeiten, um die arroganten Kapitalisten von heute zu stürzen."
 TUR_stoked_socialism_flag:0 "Kürzlich geschürte sozialistische Stimmung."
 TUR_alter_the_royal_laws_of_succession:0 "Ändern Sie die königlichen Erbfolgegesetze"
 TUR_alter_the_royal_laws_of_succession_desc:0 "Ein neues Sultanat bietet eine großartige Gelegenheit, unsere veralteten Erbfolgegesetze zu reformieren. Wir werden die Politik der agnatisch-kognatischen Primogenitur einführen, sodass nur direkte Nachkommen des Sultans erben können."
 TUR_industrial_projects_category:0 "Industrielle Projekte"
 TUR_industrial_projects_category_desc:0 "Angesichts der Tatsache, wie jung die [ROOT.GetAdjective] Nation ist, benötigen junge Industrieprojekte oft staatliche Unterstützung, um vollständig verwirklicht werden zu können."
 TUR_financing_private_enterprise_flag:0 "Finanziert bereits private Unternehmen."
 TUR_open_the_nazilli_callico_factory:0 "Öffnen Sie die Nazilli Calico Fabrik"
 TUR_open_the_nazilli_callico_factory_desc:1 "Es liegt in der Verantwortung der Regierung, potenzielle Industrieprojekte von Fall zu Fall zu bewerten."
 TUR_finance_the_bursa_merinos_factory:0 "Finanzieren Sie die Bursa Merinos Fabrik"
 TUR_finance_the_bursa_merinos_factory_desc:1 "Es liegt in der Verantwortung der Regierung, potenzielle Industrieprojekte von Fall zu Fall zu bewerten."
 TUR_fund_the_gemlik_silk_factory:0 "Finanzieren Sie die Gemlik-Seidenfabrik"
 TUR_fund_the_gemlik_silk_factory_desc:1 "Es liegt in der Verantwortung der Regierung, potenzielle Industrieprojekte von Fall zu Fall zu bewerten."
 TUR_construct_the_zonguldak_coal_refinery:0 "Bau der Kohleraffinerie Zonguldak"
 TUR_construct_the_zonguldak_coal_refinery_desc:1 "Es liegt in der Verantwortung der Regierung, potenzielle Industrieprojekte von Fall zu Fall zu bewerten."
 TUR_modernise_the_general_directorate_of_military_factories:0 "Modernisierung der Generaldirektion der Militärfabriken"
 TUR_modernise_the_general_directorate_of_military_factories_desc:1 "Es liegt in der Verantwortung der Regierung, potenzielle Industrieprojekte von Fall zu Fall zu bewerten."
 TUR_authorise_the_nuri_killigil_factory:0 "Autorisieren Sie die Fabrik Nuri Killigil"
 TUR_authorise_the_nuri_killigil_factory_desc:1 "Es liegt in der Verantwortung der Regierung, potenzielle Industrieprojekte von Fall zu Fall zu bewerten."
 TUR_sponsored_killigil_armaments_flag:0 "Gesponsert von „Killigil Armaments“ durch die Entscheidung „Anayiciler Industrial Projects“."
 TUR_sponsor_the_nuri_demirag_besiktas_aircraft_factory:0 "Sponsern Sie die Flugzeugfabrik Nuri Demirağ Beşiktaş"
 TUR_sponsor_the_nuri_demirag_besiktas_aircraft_factory_desc:1 "Es liegt in der Verantwortung der Regierung, potenzielle Industrieprojekte von Fall zu Fall zu bewerten."
 TUR_invest_in_malatya_cigarette_factory:0 "Investieren Sie in die Zigarettenfabrik Malatya"
 TUR_invest_in_malatya_cigarette_factory_desc:1 "Es liegt in der Verantwortung der Regierung, potenzielle Industrieprojekte von Fall zu Fall zu bewerten."
 TUR_bankroll_the_malatya_clothing_factory:0 "Finanzieren Sie die Bekleidungsfabrik in Malatya"
 TUR_bankroll_the_malatya_clothing_factory_desc:1 "Es liegt in der Verantwortung der Regierung, potenzielle Industrieprojekte von Fall zu Fall zu bewerten."
 TUR_subsidise_the_karabuk_iron_steel_factory:0 "Subventionierung der Karabük-Eisen- und Stahlfabrik"
 TUR_subsidise_the_karabuk_iron_steel_factory_desc:1 "Es liegt in der Verantwortung der Regierung, potenzielle Industrieprojekte von Fall zu Fall zu bewerten."
 TUR_karabuk_iron_steel_factory_modernised_flag:0 "Das „Karabuk-Eisen- und Stahlwerk“ wurde durch die „Sanayiciler“ modernisiert."
 TUR_sponsor_petrol_olfisis_formation:0 "Sponsor der Ausbildung von Petrol Ofisi"
 TUR_sponsor_petrol_olfisis_formation_desc:0 "Auf die Regierung wurde Druck ausgeübt, eine staatliche Organisation zu gründen, die sich ausschließlich mit der Ölförderung und erdölbezogenen Energiefragen befasst."
 TUR_petrol_ofisi_formed:0 "Die Ausbildung von Petrol Ofisi wurde gesponsert.\n"
 TUR_repeal_the_wealth_tax:0 "Abschaffung der Vermögenssteuer"
 TUR_repeal_the_wealth_tax_desc:0 "Diese Steuer für Nichtmuslime ist nicht tragbar und ein Makel in unserer kemalistischen Geschichte. Das Richtige wäre, die Steuer sofort abzuschaffen."
 TUR_repeal_the_faith_tax:0 "Abschaffung der Glaubenssteuer"
 TUR_repeal_the_faith_tax_desc:0 "Diese Steuer auf religiöse Institutionen ist nicht tragbar. Unsere Ziele waren zwar ehrenhaft, aber [ROOT.GetNameDef] ist für eine solch radikale Politik einfach nicht bereit. Die Abschaffung der Steuer wäre die vernünftigste Lösung."
 TUR_abolish_etatism:0 "Etatismus abschaffen"
 TUR_abolish_etatism_desc:0 "Der Etatismus war eine glorreiche Errungenschaft des kemalistischen Systems und ein fruchtbares Experiment, doch leider ist es ein Experiment, das zum Wohle der Allgemeinheit möglicherweise für immer beendet werden muss."
 TUR_absorb_the_tpda:0 "Absorbieren Sie die TPDA"
 TUR_absorb_the_tpda_desc:0 "Die türkische Staatsschuldenverwaltung ist wie ein Tumor mit unserem Industriesektor verwachsen, aber wir können die Organisation als nationalen Prozess wieder integrieren, um die Schuldenverwaltung als Hindernis für unsere weitere Entwicklung zu beseitigen."
 TUR_pay_off_our_debts:0 "Unsere Schulden begleichen"
 TUR_pay_off_our_debts_desc:0 "Das Osmanische Reich hat im Laufe seiner Existenz hohe Schulden angehäuft, und wir haben auch viel Geld für den Wiederaufbau unseres Landes ausgegeben. Derzeit sind wir in einer guten Position, einen Teil dieser Schulden zu tilgen!"
 TUR_discuss_investment_possibilities_with_FROM:0 "Besprechen Sie Investitionsmöglichkeiten mit [FROM.GetNameDef]"
 TUR_discuss_investment_possibilities_with_FROM_desc:0 "In der Vergangenheit bestand die Politik darin, ausländische Investitionen und Einmischungen nach Möglichkeit zu vermeiden. Doch einfache Transaktionen wie Investitionen müssen wir nicht mehr befürchten. Sie werden uns als Gleichgestellte begegnen, und wir könnten dadurch reicher abreisen."
 TUR_investment_in_turkey_pending_flag:0 "[FROM.GetNameDefCap] hat unserem Anlageportfolio zugestimmt, sich jedoch noch nicht dazu verpflichtet."
 TUR_investment_opinion_tt:0 "Je höher die Meinung von §Y[FROM.GetNameDef]§! über uns ist, desto mehr Investitionsmöglichkeiten gibt es.\n"
 ROOT_invest_in_turkish_state_building:1 "Investieren Sie in [FROM.GetAdjective] Staatsaufbau"
 ROOT_invest_in_turkish_state_building_desc:0 "[FROM.GetAdjective] Die kritische Infrastruktur ist in vielen Regionen des Landes unterentwickelt; das ist etwas, was wir ändern können."
 ROOT_invest_in_turkish_state_light_industry:1 "Investieren Sie in die [FROM.GetAdjective] Leichtindustrie"
 ROOT_invest_in_turkish_state_light_industry_desc:0 "[FROM.GetAdjective] Die Leichtindustrie ist in vielen Regionen des Landes unterentwickelt; das ist etwas, was wir ändern können."
 ROOT_invest_in_turkish_state_heavy_industry:1 "Investieren Sie in die Schwerindustrie"
 ROOT_invest_in_turkish_state_heavy_industry_desc:0 "[FROM.GetAdjective] Die Schwerindustrie ist in vielen Regionen des Landes unterentwickelt; das ist etwas, was wir ändern können."
 TUR_investment_pursued:0 "Investitionen angestrebt"
 ROOT_turkish_investment_ai_tt:0 "Je besser unsere §YInvestition§! in §Y[TUR.GetNameDef]§! ist, desto stärker können wir sie an unsere eigenen Interessen binden und sie gleichzeitig unseren Feinden entfremden.\n"
 TUR_kurdish_state_management_category:0 "Kurdische Staatsverwaltung"
 TUR_kurdish_state_management_category_desc:0 "Die Kurdenfrage beschäftigt uns schon seit der Gründung der Republik, obwohl sie sich seitdem sicherlich noch verschärft hat. Zügelloser Nationalismus und zum Scheitern verurteilte Versuche des Nation-Building drohen das Erbe des Unabhängigkeitskrieges zu zerstören, und wir können kein Szenario tolerieren, in dem aus den Überresten unserer eigenen Nation ein freies Kurdistan entsteht."
 TUR_kurdish_state_management_map_category_name:0 "Dies sind die Staaten, in denen kurdische Rebellen leben."
 TUR_agitate_kurdish_state_effect_tt:0 "Die £faction_tur_kurdish §YKurdischen Rebellen§! werden die Intensität ihres Widerstands gegen die Regierung in §Y[TUR_kurdish_state_event_target.GetName]§! erhöhen."
 TUR_pacify_kurdish_state_effect_tt:1 "Die £faction_tur_kurdish §YKurdischen Rebellen§! in §Y[TUR_kurdish_state_event_target.GetName]§! werden befriedet."
 TUR_placate_kurdish_state_effect_tt:0 "Die £faction_tur_kurdish §YKurdischen Rebellen§! in §Y[TUR_kurdish_state_event_target.GetName]§! werden besänftigt."
 TUR_kurdish_modifiers_trigger_tt:0 "Alle £faction_tur_kurdish §YKurdish§!-Staaten sind entweder §Ycores§! oder haben den Modifikator §YSeparatist Fatigue§!."
 TUR_no_current_integration_targets_available_tt:0 "Bevor ein kurdischer Staat gegründet werden kann, muss die Compliance auf mindestens 70 % erhöht und der Widerstand auf mindestens 30 % gesenkt werden."
 TUR_integrate_kurdish_state_effect_tt:0 "Der Staat £faction_tur_kurdish §YKurdish§! verliert seine Statusmodifikatoren und wird zu einem Kern von §Y[TUR.GetNameDef]§!."
 TUR_counter_the_rebels_in_diyarbakir:0 "Kontern Sie die Rebellen in Diyarbakır"
 TUR_counter_the_rebels_in_diyarbakir_desc:0 "Die Rebellen in Diyarbakır sind im Allgemeinen weniger problematisch als anderswo, was wahrscheinlich auf den relativ entwickelten Status Diyarbakırs zurückzuführen ist."
 TUR_counter_the_rebels_in_erzurum:0 "Bekämpfen Sie die Rebellen in Erzurum"
 TUR_counter_the_rebels_in_erzurum_desc:0 "Erzurum ist eine Hochburg kurdischer politischer Aktivitäten und Aktivismus, doch politische Gewalt kommt selten vor. Die Welt verändert sich jedoch in vielerlei Hinsicht..."
 TUR_counter_the_rebels_in_van:0 "Bekämpfe die Rebellen in Van"
 TUR_counter_the_rebels_in_van_desc:0 "Van ist einer unserer östlichsten Bundesstaaten und im Vergleich zu unseren westlichsten Bundesstaaten praktisch in jeder Hinsicht völlig unkenntlich."
 TUR_counter_the_rebels_in_hakkari:0 "Bekämpfe die Rebellen in Hakkâri"
 TUR_counter_the_rebels_in_hakkari_desc:0 "Die Rebellen in Hakkâri sind in der Regel etwas besser organisiert als in den anderen Staaten und aufgrund der vielen Berge und Hügel sind sie deutlich schwerer auszurotten."
 TUR_decision_cost_kurd_rebels:0 "£Befehlsmacht §Y15§!"
 TUR_decision_cost_kurd_rebels_blocked:0 "£Befehlsmacht §R15§!"
 TUR_offer_conscription_exceptions_to_kurdish_groups:0 "£faction_tur_kurdish Bieten Sie kurdischen Gruppen Befreiung von der Wehrpflicht an"
 TUR_offer_conscription_exceptions_to_kurdish_groups_desc:0 "Viele kurdische Gruppen fordern keine vollständige Unabhängigkeit, sondern lediglich die Anerkennung eines gewissen Maßes an Autonomie. Wir können im Namen des Friedens ein gewisses Maß an Autonomie gewähren, indem wir weitreichende Befreiungen von der Wehrpflicht anbieten."
 TUR_integrate_kurdish_state:0 "£faction_tur_kurdish Integration des kurdischen Staates"
 TUR_integrate_kurdish_state_desc:0 "Durch die Zusammenarbeit mit den lokalen Führern können wir sicherstellen, dass die kurdischen Staaten unseres Landes ordnungsgemäß wieder in den nationalen Rahmen unseres Nationalstaates integriert werden."
 TUR_unlock_kurdish_integration_decisions_tt:0 "Schaltet frei: §Y$TUR_integrate_kurdish_state$§! Entscheidungen."
 TUR_integrate_diyarbakir:0 "£faction_tur_kurdish Integriere Diyarbakır"
 TUR_integrate_diyarbakir_desc:0 "$TUR_integrate_kurdish_state_desc$"
 TUR_integrate_hakkari:0 "£faction_tur_kurdish Integriere Hakkâri"
 TUR_integrate_hakkari_desc:0 "$TUR_integrate_kurdish_state_desc$"
 TUR_integrate_tunceli:0 "£faction_tur_kurdish Erzurum integrieren"
 TUR_integrate_tunceli_desc:0 "$TUR_integrate_kurdish_state_desc$"
 TUR_integrate_van:0 "£faction_tur_kurdish Van integrieren"
 TUR_integrate_van_desc:0 "$TUR_integrate_kurdish_state_desc$"
 TUR_kurdish_resistance_escalation_mission:0 "£faction_tur_kurdish Kurdischer Widerstand eskaliert regierungsfeindliche Bemühungen"
 TUR_kurdish_resistance_escalation_mission_desc:0 "Die kurdischen Rebellen verstärken erneut ihre regierungsfeindlichen Bemühungen im Südosten unseres Landes."
 TUR_acted_against_kurd_rebels_recently_flag:0 "Kürzlich die Kurden im Visier"
 TUR_fundamentalist_state_management_category:0 "Fundamentalistische Staatsführung"
 TUR_fundamentalist_state_management_category_desc:0 "Es gibt Menschen in diesem Land, die nicht darauf vorbereitet waren, dass sich die Rolle der Religion in der Nation so abrupt ändert. Diese Menschen brauchen ein sanftes Vorgehen, obwohl wir ihnen nicht erlauben dürfen, unseren Fortschritt aufzuhalten."
 TUR_fundamentalist_state_management_map_category_name:0 "Dies sind die Staaten, die sich den Prinzipien des Kemalismus widersetzen."
 TUR_encourage_avid_fundamentalist_disciples_to_migrate_into_state:1 "£faction_tur_traditionalist Ermutigen Sie begeisterte fundamentalistische Jünger, in anfällige Gemeinschaften zu ziehen"
 TUR_increase_influence_of_fundamentalists_in_state:0 "£faction_tur_traditionalist Erhöhen Sie den Einfluss der Fundamentalisten"
 TUR_increase_influence_of_fundamentalists_in_state_desc:1 "Das Licht des Allmächtigen muss jeden einzelnen Winkel unserer stolzen Nation erreichen."
 TUR_hold_a_march_in_state:0 "£faction_tur_kemalist Halten Sie einen Marsch in einem fundamentalistischen Staat ab"
 TUR_hold_a_march_in_state_desc:0 "Die religiösen Elemente der Vergangenheit in diesem Land werden von der Hingabe unserer unnachgiebigen ideologischen Jünger beeindruckt sein, wenn sie durch die Rebellengemeinden marschieren."
 TUR_acquiesce_to_fundamentalists:0 "£faction_tur_traditionalist Den Fundamentalisten zustimmen"
 TUR_acquiesce_to_fundamentalists_desc:0 "Damit diese Republik überleben kann, muss es Kompromisse geben – selbst wenn das bedeutet, die Verfassung, auf der diese Nation gegründet wurde, zu untergraben."
 TUR_empower_fundamentalists_in_state:0 "£faction_tur_traditionalist Fundamentalisten im Staat stärken"
 TUR_empower_fundamentalists_in_state_desc:1 "Unsere Glaubensbrüder benötigen von der Regierung jede Unterstützung, die sie bekommen können."
 TUR_kemalist_state_management_category:0 "Kemalistische Staatsführung"
 TUR_kemalist_state_management_category_desc:0 "Anhänger des Kemalismus leben eher in den größeren Städten und neigen dazu, ihre politischen Ansichten zu verteidigen, als ob sie eine Lebensweise verteidigen würden."
 TUR_kemalist_state_management_map_category_name:0 "Dies sind die Staaten, die der Ideologie des Kemalismus treu sind."
 TUR_kemalist_loyalty_and_power_update_effect_tt:0 "Die „kemalistischen Offiziere“ müssen als Reaktion auf die Maßnahmen der Regierung ihren Status anpassen."
 TUR_kemalist_influenced_state_effect_tt:0 "Die £faction_tur_kemalist §YKemalisten§! soll die unangefochtene Verwaltung des Staates übernehmen."
 TUR_kemalist_turn_hostile_effect_tt:0 "Die turkemalistische Fraktion wird der Regierung gegenüber feindselig eingestellt sein."
 TUR_counter_influence_of_fundamentalists_in_state:1 "£faction_tur_kemalist leitet konterfundamentalistische Operation ein"
 TUR_embed_kemalist_propagandists_into_state:1 "£faction_tur_kemalist: Kemalistische Propagandisten in den Staat einbetten"
 TUR_embed_kemalist_propagandists_into_state_desc:0 "Wir müssen sehr hart daran arbeiten, sicherzustellen, dass die Ideologie des Kemalismus in den Herzen möglichst vieler Menschen verankert wird, wenn sie auch in Zukunft überleben soll."
 TUR_the_enemy_within:0 "Der Feind im Inneren"
 TUR_the_enemy_within_desc:0 "Unser Land ist politisch, ethnisch und religiös gespalten. Diese Spaltungen drohen die Nation zu zerreißen und ins Chaos zu stürzen. In unserem Land sind ruchlose Mächte am Werk: Wir dürfen nicht zulassen, dass sie über die legitime Regierung von [ROOT.GetNameDef] triumphieren."
 TUR_unaligned_state_management_map_category_name:0 "Dies sind die Staaten, die derzeit noch nicht an der Vereinbarung beteiligt sind."
 TUR_ideological_battleground_state:1 "Ist kein £faction_tur_unaligned §YUnaligned State§!"
 TUR_is_fundamentalist_state_tt:0 "Gilt als £faction_tur_traditionalist §YTraditionalist State§!"
 TUR_is_kemalist_state_tt:0 "Gilt als £faction_tur_kemalist §YKemalist State§!"
 TUR_traditionalist_infiltration_mission:0 "£faction_tur_traditionalist Traditionalistische Infiltrationskrise"
 TUR_traditionalist_infiltration_mission_desc:0 "Es scheint, als würden die religiösen Elemente unserer Gesellschaft erneut versuchen, ihre Anhängerschaft in Gebieten zu festigen, in denen sie nur mäßige Unterstützung genießen."
 TUR_thwarting_traditionalist_infiltration:0 "£faction_tur_kemalist Vereitelung traditionalistischer Infiltrationsversuche"
 TUR_thwarting_traditionalist_infiltration_desc:0 "Wir dürfen nicht zulassen, dass sich diejenigen, die den Säkularismus dieses Landes untergraben wollen, ungehindert im Westen ausbreiten. Es ist unsere Pflicht, ihnen Einhalt zu gebieten."
 TUR_entrench_kemalism_in_state:0 "£faction_tur_kemalist Verankerung des Kemalismus im Staat"
 TUR_entrench_kemalism_in_state_desc:0 "Wir müssen sehr hart daran arbeiten, sicherzustellen, dass die Ideologie des Kemalismus in den Herzen möglichst vieler Menschen verankert wird, wenn sie auch in Zukunft überleben soll."
 TUR_root_out_kemalists_in_state:0 "£faction_tur_traditionalist Die Kemalisten im Staat ausmerzen"
 TUR_root_out_kemalists_in_state_desc:0 "Wir werden der gottlosen kemalistischen Plage, die diese Nation weiterhin heimsucht, Angst einjagen."
 TUR_kemalist_infiltration_mission:0 "£faction_tur_kemalist Kemalistische Infiltrationskrise"
 TUR_kemalist_infiltration_mission_desc:0 "Die Kemalisten sind mit ihrer Absetzung durch die Öffentlichkeit unzufrieden und greifen weiterhin auf ihre alten Tricks zurück. Sie streben nach einem Machtmonopol im Westen; man muss ihnen Einhalt gebieten."
 TUR_hostile_kemalists_influenced_state_effect_tt:1 "Die £faction_tur_kemalist §YKemalist-Verräter§! werden sich in §Y[TUR_kemalist_state_event_target.GetName]§! verschanzen."
 TUR_thwarting_kemalist_infiltration:0 "£faction_tur_traditionalist Vereitelung kemalistischer Infiltrationsversuche"
 TUR_thwarting_kemalist_infiltration_desc:0 "Die Kemalisten davon abzuhalten, ihre Gehässigkeit weiter zu verbreiten, ist mehr als nur eine bürgerliche Verantwortung, es ist eine göttliche Pflicht."
 TUR_reforming_our_armed_forces_category:0 "Reform unserer Streitkräfte"
 TUR_reforming_our_armed_forces_category_desc:0 "Unsere Streitkräfte waren nach dem Unabhängigkeitskrieg am Boden zerstört: Wir mussten alles und noch mehr aufbringen, um unsere Freiheit von den Imperialisten zu erringen. Und obwohl die Militärreform noch eine Weile aufgeschoben werden konnte, entwickelt sich die Welt nun rapide zu einem viel gefährlicheren Ort."
 TUR_modernize_our_tactics:0 "Modernisieren Sie unsere Taktiken"
 TUR_modernize_our_tactics_desc:0 "Viele unserer Soldaten sind Veteranen des Unabhängigkeitskrieges, aber sie erkennen nicht, dass künftige Kriege nicht mit dem Krieg von 1922 vergleichbar sein werden."
 TUR_teach_the_proper_use_of_modern_infrastructure:0 "Den richtigen Umgang mit moderner Infrastruktur vermitteln"
 TUR_teach_the_proper_use_of_modern_infrastructure_desc:0 "Viele unserer Streitkräfte haben sich nur langsam an die Einführung von Eisenbahnwaggons und Straßen angepasst und bestehen darauf, zu Pferd zu reisen."
 TUR_commence_an_overhaul_of_our_training_methods:0 "Beginnen Sie mit der Überarbeitung unserer Trainingsmethoden"
 TUR_commence_an_overhaul_of_our_training_methods_desc:0 "Unsere Lehr- und Unterrichtsmethoden sind wirkungslos. Unsere Veteranen haben durch Erfahrung gelernt, aber unsere neuen Rekruten scheinen kaum Verstand zu haben."
 TUR_streamline_communication_methods_between_ships:0 "Optimieren Sie die Kommunikationsmethoden zwischen Schiffen"
 TUR_streamline_communication_methods_between_ships_desc:0 "Ein Großteil der auf unseren Marineschiffen verwendeten Ausrüstung ist alt, veraltet und unzuverlässig."
 TUR_put_new_safety_regulations_regarding_the_operation_of_aircraft_into_effect:1 "Legalisierung neuer Sicherheitsvorschriften für Flugzeuge"
 TUR_put_new_safety_regulations_regarding_the_operation_of_aircraft_into_effect_desc:0 "Wir waren schon immer stolz darauf, in Europa an der Spitze der Luftfahrtinnovationen zu stehen, doch unsere Piloten haben zu Recht den Ruf, sich wie Einzelgänger zu verhalten."
 TUR_etatism_crisis_1:0 "Steigende Inflation"
 TUR_etatism_crisis_1_desc:0 "Der Versuch, gleichzeitig unser staatliches Wirtschaftsmodell aufrechtzuerhalten und eine Kriegswirtschaft einzuführen, erweist sich als problematisch."
 TUR_etatism_crisis_2:0 "Abwertung der türkischen Lira"
 TUR_etatism_crisis_2_desc:0 "Der Versuch, gleichzeitig unser staatliches Wirtschaftsmodell aufrechtzuerhalten und eine Kriegswirtschaft einzuführen, erweist sich als problematisch."
 TUR_etatism_crisis_3:0 "Verschärfung der Rezession"
 TUR_etatism_crisis_3_desc:0 "Der Versuch, gleichzeitig unser staatliches Wirtschaftsmodell aufrechtzuerhalten und eine Kriegswirtschaft einzuführen, erweist sich als problematisch."
 TUR_etatism_crisis_4:0 "Drohende Depression"
 TUR_etatism_crisis_4_desc:0 "Der Versuch, unser staatliches Wirtschaftsmodell aufrechtzuerhalten und gleichzeitig eine Kriegswirtschaft einzuführen, erweist sich als problematisch. Wenn wir in dieser Hinsicht keine wirklichen Maßnahmen ergreifen, könnten wir unsere gesamte Wirtschaft zerstören."
