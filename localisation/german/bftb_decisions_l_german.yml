 BUL_foreign_agreements:0 "Ausländische Abkommen"
 BUL_foreign_agreements_desc:0 "Wir müssen uns auf den Abschluss vorteilhafter Vereinbarungen mit führenden ausländischen Unternehmen konzentrieren, die bereit sind, Tochtergesellschaften in Bulgarien zu gründen oder in die Entwicklung unserer heimischen Industrie zu investieren."
