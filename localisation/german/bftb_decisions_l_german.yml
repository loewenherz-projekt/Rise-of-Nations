l_german:
 GRE_1936_election_category:0 "Die Wahl von 1936"
 GRE_1936_election_category_desc:0 "Die ersten Wahlen seit Georg II. Rückkehr auf den Thron sollen noch vor Monatsende stattfinden. Georg II. ist entschlossen, sich nicht erneut vom Thron drängen zu lassen und soll bereit sein, alles zu tun, um seine Herrschaft zu sichern. \n\nTeile unserer Armee halten jedoch weiterhin geheime Verbindungen zum Exilanten Eleftherios Venizelos und könnten durch den Einsatz einiger ziemlich ... rigoroser Taktiken freie und faire Wahlen für Griechenland erreichen."
 GRE_the_election_of_1936:0 "Die griechischen Parlamentswahlen von 1936"
 GRE_the_election_of_1936_desc:1 "Die ersten Wahlen seit Georg II. Rückkehr auf den Thron sollen noch vor Monatsende stattfinden. Georg II. ist entschlossen, sich nicht erneut vom Thron drängen zu lassen und ist angeblich bereit, alles zu tun, um seine Herrschaft zu sichern."
 GRE_1936_election_tt:0 "Wenn König Georg II. nicht verhaftet wird, wird er sich in die Wahlen im Januar einmischen und dafür sorgen, dass seine monarchistischen Anhänger ihr Regierungsmandat behalten.\n"
 GRE_put_the_king_under_house_arrest:0 "Stellen Sie den König unter Hausarrest"
 GRE_put_the_king_under_house_arrest_desc:0 "Wenn wir König Georg II. davon abhalten, sich in die demokratischen Prozesse Griechenlands einzumischen, werden die populäreren Venezelisten mit Sicherheit die Wahl gewinnen."
 GRE_1936_arrest_the_king_tt:0 "Der König wird verhaftet und die §YVenezelisten§! werden die Wahl gewinnen.\n"
 GRE_king_arrested:0 "König unter Hausarrest gestellt"
