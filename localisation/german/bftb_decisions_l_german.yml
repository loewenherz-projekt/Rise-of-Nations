 BUL_legalize_faction_prevents_oppression_tt:0 "\n§RDie Umsetzung dieser Entscheidung wird uns daran hindern, diese Fraktion in Zukunft zu unterdrücken, außer um Radikale zu unterdrücken, die das Wohl der Nation bedrohen.§!"
 BUL_ban_media_prevents_cooperation_tt:0 "\n§RDas Abschließen dieser Entscheidung verhindert eine weitere Zusammenarbeit mit dieser Fraktion.§!"
 BUL_unlock_further_decisions_in_the_chain_tt:0 "Schaltet weitere Entscheidungen in der Kette frei."
 BUL_repress_faction_tt:0 "Hält Dissidenten dieser Fraktion davon ab, in naher Zukunft Ärger zu machen."
