 BUL_reduced_communist_oppression_cost_tt:0 "Die Entscheidungskosten zur Unterdrückung der „Broad Socialist“-Fraktion werden halbiert."
 BUL_improved_faction_effects_tt:0 "Erhöhte Auswirkungen auf Fraktionen für alle Entscheidungen zum „Fraktionsmanagement“."
 BUL_reduced_faction_interaction_cooldown_tt:0 "Die Ausführung von Entscheidungen im Rahmen des Fraktionsmanagements wird weniger Zeit in Anspruch nehmen und sie stehen nach ihrer Aktivierung schneller zur Verfügung."
