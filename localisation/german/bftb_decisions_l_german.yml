 GRE_attend_talks_with_the_presidium:0 "Nehmen Sie an Gesprächen mit dem Präsidium teil"
 GRE_attend_talks_with_the_presidium_desc:0 "Wir werden Vertreter unseres Landes zum Präsidium in [FROM.GetNameDefCap] entsenden, um das Potenzial unseres Landes zu erörtern und sie zu einer kleinen Investition in unsere Rüstungsindustrie zu bewegen."
 GRE_host_soviet_bureaucrats_in_greece:0 "Gastgeber [FROM.GetAdjective] Bürokraten in [ROOT.GetNameDef]"
 GRE_host_soviet_bureaucrats_in_greece_desc:0 "Vertreter von [FROM.GetNameDefCap] werden unser Land besichtigen und dann entscheiden, ob sie eine moderate Investition in unsere Rüstungsindustrie tätigen möchten."
 GRE_soviet_influence_tt:0 "Wenn wir uns zu sehr auf die §Y[FROM.GetAdjective]s§! verlassen, könnte das unsere Souveränität gefährden.\n"
 GRE_invest_back_into_neglected_siberian_regions:0 "Investieren Sie zurück in vernachlässigte sibirische Provinzen"
 GRE_invest_back_into_neglected_siberian_regions_desc:0 "Wir werden [FROM.GetNameDefCap] anbieten, in ihre am stärksten vernachlässigten Regionen zu investieren, um als Zeichen der Gegenseitigkeit den Einfluss der [FROM.GetAdjective] auf uns zu verringern."
 GRE_rebuke_soviet_investment:0 "Tadel [FROM.GetAdjective] Investition"
 GRE_soviet_influence_shunned_tt:0 "Die §Y[FROM.GetAdjective]s§! zu meiden, nachdem man ihre Großzügigkeit ausgenutzt hat, könnte zu einem §YKrieg§!! führen."
 GRE_pay_back_debt_to_the_ifc_category:0 "Verwaltung der Schulden gegenüber der IFC"
 GRE_pay_back_debt_to_the_ifc_category_desc:1 "Griechenland leidet seit dem Unabhängigkeitskrieg von 1829 unter Schulden, und der Große Krieg hat unsere Haushaltsprobleme nicht gerade gelindert. Wenn wir unsere Schulden zurückzahlen können, trägt dies sicherlich wesentlich dazu bei, Griechenland ein gewisses Maß an wirtschaftlicher Stabilität zu sichern. Andererseits gibt es bestimmte radikale Bewegungen, die sich sowohl politischen als auch wirtschaftlichen Konventionen widersetzen. Sollten wir uns einer dieser Bewegungen beugen oder einfach zulassen, dass die Welt mit der Zeit auseinanderbricht, könnten sich durchaus drastischere Maßnahmen ergeben...\n\n§YSchulden§! an die §YBriten§!: [ROOT.GetDebtPercentageBritain]\n\n§YSchulden§! an die §YFranzösen§!: [ROOT.GetDebtPercentageFrance] \n\n§YSchulden§! an die §YItaliener§!: [ROOT.GetDebtPercentageItaly] \n\nGesamt §YSchulden§! Bezahlt: [ROOT.GetDebtPercentagePaidTotal]"
