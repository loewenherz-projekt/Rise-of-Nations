 BUL_ff_impending_coup_mission:0 "Drohender Putsch der „Vaterländischen Front“!"
 BUL_ff_impending_coup_mission_desc:0 "Die Führung der „Vaterländischen Front“ bereitet einen Putsch vor."
 BUL_ff_approaching_zveno_mission:0 "§YVaterländische Front§! Nähert sich dem [GetZvenoName]"
 BUL_ff_approaching_zveno_mission_desc:0 "Die §YVaterlandsfront§! appelliert an [GetZvenoName], sich ihrem Putsch anzuschließen."
