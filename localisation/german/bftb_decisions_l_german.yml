 BUL_zveno_name_text:0 "Zveno"
 BUL_bs_name_text:0 "Breite Sozialisten"
 BUL_bzns_name_text:0 "Agrarunion"
 BUL_nsm_name_text:0 "Nationale Sozialbewegung"
 BUL_ZVENO_TOOLTIP:0 "Die £faction_bul_zveno §YZveno§! ist eine nationalistische Organisation, die von Armeeoffizieren gegründet wurde und derzeit von Kimon Georgiev geführt wird. \nDie £faction_bul_zveno §YZveno§! wird Armeeoffiziere dazu aufrufen, ihrer Organisation beizutreten und könnte mit der Zeit sogar versuchen, die Regierung zu stürzen und eine Militärdiktatur zu errichten."
 BUL_BS_TOOLTIP:0 "Die £faction_bul_bs §YBroad Socialists§! sind Sozialdemokraten, die breite Klassenbündnisse unterstützen. \nDie £faction_bul_bs §YBroad Socialists§! haben großen Einfluss unter den Industriearbeitern und Gewerkschaften und rufen zu Generalstreiks auf, wenn diese der Regierung gegenüber illoyal sind."
 BUL_BZNS_TOOLTIP:0 "Die £faction_bul_bzns §YAgrarian Union§! ist eine 1934 verbotene politische Organisation, die sich mit Fragen der Landwirtschaft befasst. \nDie £faction_bul_bzns §YAgrarian Union§! hat großen Einfluss in den ländlichen Regionen des Landes und wird versuchen, bei den Landwirten an Popularität zu gewinnen."
 BUL_NSM_TOOLTIP:0 "Die £faction_bul_nsm §YNationale Soziale Bewegung§! ist eine rechtsextreme Organisation unter der Führung des ehemaligen Zveno-Mitglieds Aleksandar Tsankov. \nDie £faction_bul_nsm §YNationale Soziale Bewegung§! wird versuchen, durch die Organisation von Demonstrationen und Protesten im ganzen Land an Popularität in der Bevölkerung zu gewinnen."
 BUL_LOYALTY_TOOLTIP:0 "§YLoyalty§! repräsentiert den Wunsch der Fraktion, mit der Regierung zu kooperieren. \nJe höher der §YLoyalty§!, desto unwahrscheinlicher ist es, dass eine Fraktion mit der Regierung in Konflikt gerät. \nBevor eine Fraktion in die Regierung integriert werden kann, müssen bestimmte Entscheidungen getroffen werden, um ihre Mitglieder auf die Seite der Regierung zu stellen und ihre §YLoyalty§! auf 100 zu erhöhen."
 BUL_POPULARITY_TOOLTIP:0 "Die Popularität repräsentiert die Unterstützung, die eine Fraktion von bestimmten Teilen der Bevölkerung erhält (seien es Militärs, Arbeiter, Bauern oder Rechtsradikale). \nJe höher die Popularität, desto wahrscheinlicher ist es, dass eine Fraktion mit der Regierung in Konflikt gerät. \nBevor eine Fraktion zerstört wird, müssen bestimmte Entscheidungen getroffen werden, um sie zu schwächen und ihre Popularität auf 0 zu senken."

