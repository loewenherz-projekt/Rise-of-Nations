 GRE_investment_decisions_category:0 "Investitionspläne"
 GRE_investment_decisions_category_desc:0 "Jahrzehntelanges wirtschaftliches Missmanagement durch frühere Regierungen und massiver Missbrauch durch ausländische Mächte haben unserem Land eine starke industrielle Basis entzogen. Die traurige Realität ist, dass wir, um unser volles Potenzial auszuschöpfen, möglicherweise die Hilfe einiger jener Länder in Anspruch nehmen müssen, die uns überhaupt erst in diese Lage gebracht haben."
 GRE_invite_politicians_for_investment_talks_in_capital:0 "Politiker zu Investitionsgesprächen einladen"
 GRE_invite_politicians_for_investment_talks_in_capital_desc:0 "Eine Einladung in unser angesehenes Land, in der wir das enorme Potenzial unserer Bevölkerung und unseres Fertigungssektors unter Beweis stellen können, sollte erhebliche Früchte tragen, wenn wir die richtigen Leute ansprechen!"
 GRE_hold_national_showcase_for_investors_ger:0 "Halten Sie eine nationale Präsentation für [FROM.GetAdjective]-Investoren ab"
 GRE_hold_national_showcase_for_investors_ger_desc:0 "Wir werden hier in der Wiege der westlichen Zivilisation eine große Schau abhalten, in der Hoffnung, Investitionen in unseren verarmten Industriesektor zu locken."
 GRE_exploit_errata_in_schachtplan:0 "Exploit-Errata im Schachtplan"
 GRE_exploit_errata_in_schachtplan_desc:0 "Der Schachtplan ist lediglich ein weiterer krimineller [FROM.GetAdjective] Plan zur Ausplünderung ärmerer europäischer Länder. Es sollte einfach sein, sich ein Szenario auszudenken, in dem die [FROM.GetAdjective]s verpflichtet werden, uns zur Abwechslung und ohne Bedingungen zu helfen."
 GRE_rebuke_german_investment:0 "Tadel [FROM.GetAdjective] Investition"
 GRE_invite_entrepreneurs_for_investment_talks_in_capital:0 "Unternehmer zu Investitionsgesprächen einladen"
 GRE_invite_entrepreneurs_for_investment_talks_in_capital_desc:0 "Eine Einladung in unser angesehenes Land, in der wir das enorme Potenzial unserer Bevölkerung und unseres Fertigungssektors unter Beweis stellen können, sollte erhebliche Früchte tragen, wenn wir die richtigen Leute ansprechen!"
 GRE_hold_national_showcase_for_investors_eng:0 "Halten Sie eine nationale Präsentation für [FROM.GetAdjective]-Investoren ab"
 GRE_hold_national_showcase_for_investors_eng_desc:0 "Wir werden hier in der Wiege der westlichen Zivilisation eine große Schau abhalten, in der Hoffnung, Investitionen in unseren verarmten Industriesektor zu locken."
 GRE_trade_manufactured_ship_parts_for_investment:0 "Tauschen Sie gefertigte Schiffsteile gegen Investitionen ein"
 GRE_trade_manufactured_ship_parts_for_investment_desc:0 "Indem wir den Briten dabei helfen, ihre Royal Navy aufrechtzuerhalten, können wir sicherstellen, dass wir eine viel größere Investition erhalten, als dies unter normalen Umständen der Fall wäre."
 GRE_rebuke_british_investment:0 "Tadel [FROM.GetAdjective] Investition"
 GRE_go_to_paris_to_negotiate_investment_talks:0 "Gehen Sie nach Paris, um Investitionsgespräche zu führen"
 GRE_go_to_paris_to_negotiate_investment_talks_desc:0 "Ein Treffen mit den richtigen Leuten in Paris, bei dem wir das enorme Potenzial unserer Bevölkerung und unseres Fertigungssektors unter Beweis stellen können, könnte unserem Land erhebliche Vorteile bringen."
 GRE_hold_national_showcase_for_investors_fra:0 "Halten Sie eine nationale Präsentation für [FROM.GetAdjective]-Investoren ab"
 GRE_hold_national_showcase_for_investors_fra_desc:0 "„Wir werden hier in der Wiege der westlichen Zivilisation eine große Schau abhalten, in der Hoffnung, Investitionen in unseren verarmten Industriesektor zu locken."
 GRE_bribe_french_trade_unions_to_pressure_government_into_investment:0 "Bestechen Sie Gewerkschaften, um ihre Regierung zu schikanieren"
 GRE_bribe_french_trade_unions_to_pressure_government_into_investment_desc:0 "[FROM.GetNameDef] ist seit geraumer Zeit ein Sklave der Gewerkschaften. Indem wir den Gewerkschaften helfen, durch Erpressung Instabilität zu schaffen, verbessern wir unsere Verhandlungsposition."
