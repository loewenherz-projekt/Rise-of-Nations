 BUL_uranium_concession_agreement:0 "Uran-Konzessionsverträge mit [FROM.GetNameDef]"
 BUL_uranium_concession_agreement_desc:0 "Wir können die Uranvorkommen in unserem Boden nicht optimal nutzen und es wäre nicht nur für uns, sondern auch für unsere [FROM.GetAdjective] Verbündeten vorteilhafter, einen Vertrag zu unterzeichnen, der ihnen im Austausch gegen nützliche Materialien und Produkte für unsere heimische Industrie und Landwirtschaft Ausbeutungsrechte einräumt."

 BUL_negotiate_claims_in_the_balkans:0 "Verhandeln Sie unsere Ansprüche auf dem Balkan"
 BUL_negotiate_claims_in_the_balkans_desc:0 "Bevor wir uns mit einer Großmacht verbünden, müssen wir unsere Gebietsansprüche mit Deutschland aushandeln. Die internationalen Spannungen nehmen zu, und Bulgarien wird nur das Land unterstützen, das den besten territorialen Deal anbietet."
 BUL_demand_our_historical_claims:0 "Fordern Sie unsere historischen Ansprüche"
 BUL_secure_occupation_in_balkan_state:0 "Sichern Sie den Beruf in [FROM.GetName]"
 BUL_secure_occupation_in_balkan_state_desc:0 "Wir müssen unsere Rolle als Friedenshüter auf dem Balkan übernehmen und unseren Verbündeten vorschlagen, uns die administrative Kontrolle über ihre besetzten Gebiete in der Region zu gewähren und ausländische [ROOT.GetFactionName]-Garnisonen zu entlasten, damit sie andere Fronten verstärken können."
 BUL_secure_occupation_in_balkan_state_tt:0 "(Länder mit geringer §YMannstärke§! und §YInfanterieausrüstung§! werden eher zur Annahme bereit sein)"
 BUL_bulgarian_reintegration_campaign:2 "Bulgarische Reintegrationskampagne in [FROM.GetName]"
 bulgarian_territorial_expansion_arranged:0 "Vorher vereinbarte territoriale Erweiterung Bulgariens"
 BUL_bulgarian_territorial_expansion_arranged_tt:0 "Staaten mit §YParrangierter bulgarischer territorialer Expansion§! Der Modifikator wird auf Bulgarien übertragen, sobald ein Verbündeter der Fraktion den Staat kontrolliert und Bulgarien derselben Fraktion wie Deutschland beigetreten ist"

 BUL_align_bulgaria:0 "Align Bulgarien"
 BUL_align_bulgaria_desc:0 "Unsere diplomatischen Beziehungen zu Bulgarien sind seit Jahrzehnten freundschaftlich, und dank unserer Finanzhilfe konnte die bulgarische Regierung ihre erdrückende Schuldenlast bewältigen. Jetzt ist es an der Zeit, Bulgarien zu einer offiziellen Verbündetenschaft zu bewegen."
 BUL_germany_donate_fighters:0 "Spenden Sie Kämpfer für Bulgarien"
 BUL_germany_donate_fighters_desc:0 "Wir werden der kürzlich wiederhergestellten bulgarischen Luftwaffe eine kleine Anzahl Flugzeuge spenden."
 BUL_germany_demand_military_access:0 "Fordern Sie den militärischen Zugang über Bulgarien"
 BUL_germany_demand_military_access_desc:0 "Wir müssen einen militärischen Zugang über Bulgarien fordern, auch wenn sich das Land nicht unserer Offensive auf dem Balkan anschließt, damit unsere Truppen die bulgarische Grenze als Operationsbasis für die Invasion Griechenlands nutzen können."
 BUL_germany_demand_replacement_of_bulgarian_prime_minister:0 "Forderung nach Ablösung des bulgarischen Premierministers"
 BUL_germany_demand_replacement_of_bulgarian_prime_minister_desc:0 "Der bulgarische Premierminister Georgi Kyoseivanov hat sich als inkompetenter Politiker erwiesen. Wir sollten [BUL.GetLeader] vorschlagen, diesen Mann durch jemanden zu ersetzen, der fähiger ist und unseren Idealen näher steht, wie zum Beispiel Bogdan Filov."
 BUL_donate_aircraft_tt:0 "Wenn [BUL.GetNameDef] unsere Spende annimmt, verbessern wir ihre Meinung über uns und erleichtern die Zusammenarbeit zwischen unseren Ländern."

 BUL_the_balkan_federation_dream:0 "Der Traum der Balkanföderation"
 BUL_the_balkan_federation_dream_desc:0 "[ROOT.GetNameDefCap] muss sich für die Bildung einer starken Balkanföderation einsetzen, um den vielen Feinden des Proletariats entgegenzutreten und den Balkanstaaten klarzumachen, dass der einzige Weg, in unserem Kampf zu siegen, darin besteht, Zusammenarbeit und Solidarität zwischen unseren Völkern zu entwickeln, was letztendlich zur Vereinigung des Balkans führen wird …"
 BUL_develop_balkan_federation_project:0 "Balkan Federation Project"
 BUL_develop_balkan_federation_project_desc:0 "Wir müssen Experten aus unterschiedlichen Bereichen wie Wirtschaft, Industrie, Politik und Gesellschaft zusammenbringen, um zu analysieren, warum das Projekt einer Balkanföderation in den 1920er Jahren scheiterte, und ein neues, integratives und verbessertes Projekt entwickeln, in dem alle Balkanstaaten fair und gleich behandelt werden."
 BUL_balkan_federation_propaganda:0 "Propaganda der Balkanföderation"
 BUL_balkan_federation_propaganda_desc:0 "Wir werden in [FROM.GetNameDef] eine große Propagandakampagne organisieren, um die Unterstützung der [FROM.GetAdjective] proletarischen Massen für unser Projekt der Balkanföderation zu gewinnen."
 BUL_destabilize_country:0 "Destabilisieren [FROM.GetNameDef]"
 BUL_destabilize_country_desc:0 "Wir müssen [ROOT.GetAdjective]-Agenten in [FROM.GetNameDef] einschleusen, um lokale Aktivisten zu sammeln, die unser Föderationsprojekt unterstützen, ihnen eine Grundausbildung zu bieten und bewaffnete Partisanengruppen zu bilden, um das Land zu destabilisieren."
 BUL_fight_alongside_country_comrades:0 "Kämpfe an der Seite unserer [FROM.GetAdjective] Kameraden"
 BUL_fight_alongside_country_comrades_desc:0 "Wir müssen den Kampf unserer Kameraden in [FROM.GetNameDef] unterstützen und uns im [FROM.GetAdjective] Bürgerkrieg auf ihre Seite stellen."
 BUL_fight_alongside_country_comrades_join_cw_tt:0 "§Y[ROOT.GetNameWithFlag]§! wird sich §Y[FROM.GetNameWithFlag]§! in ihrem Bürgerkrieg anschließen."
 BUL_balkan_federation_industrial_aid:0 "Industrielle Hilfe für [FROM.GetNameDef]"
 BUL_balkan_federation_industrial_aid_desc:0 "Wir unterstützen derzeit die [FROM.GetAdjective]-Regierung dabei, die defizitäre nationale Industrie von [FROM.GetNameDef] anzukurbeln, bevor sie sich der [ROOT.GetFactionName] anschließt."
 BUL_balkan_federation_economic_aid:0 "Wirtschaftshilfe für [FROM.GetNameDef]"
 BUL_balkan_federation_economic_aid_desc:0 "Wir leisten derzeit finanzielle Hilfe für die Regierung von [FROM.GetAdjective], um einen Zusammenbruch der angeschlagenen Wirtschaft von [FROM.GetNameDef] zu verhindern, bevor sie sich der [ROOT.GetFactionName] anschließt."
 BUL_balkan_federation_military_aid:0 "Militärhilfe für [FROM.GetNameDef]"
 BUL_balkan_federation_military_aid_desc:0 "Wir leisten der [FROM.GetAdjective]-Regierung derzeit militärische Unterstützung bei der Durchführung einer Operation zur Ausrottung mehrerer Dissidentenzellen in verschiedenen ländlichen Städten rund um [FROM.Capital.GetName], bevor sie sich der [ROOT.GetFactionName] anschließen."
 BUL_balkan_federation_project_ready_flag:0 "Das Balkan Federation-Projekt ist fertig."
 BUL_balkan_federation_demand_turkish_territory:0 "Fordern Sie türkische Gebiete"
 BUL_balkan_federation_demand_turkish_territory_desc:0 "Wir werden eine diplomatische Delegation entsenden, um mit [TUR.GetLeader] über die [TUR.GetAdjective] Abtretung seiner Balkangebiete an [BUL.GetNameDef] zu verhandeln."

 BUL_plot_against_boris_dec_cat:0 "Verschwörung gegen Boris"
 BUL_plot_against_boris_dec_cat_desc:0 "[GetPlotAgainstBorisFocusLoc]"
 BUL_brainwash_political_prisoners:0 "Gehirnwäsche politischer Gefangener"
 BUL_brainwash_political_prisoners_desc:0 "Einer unserer politischen Gefangenen wird unter Druck gesetzt und gezwungen, unsere Drecksarbeit zu erledigen, damit im Falle eines Scheiterns unseres Königsmordplans kein Regierungsmitglied mit dem Attentat in Verbindung gebracht werden kann."
 BUL_persuade_faction_members:0 "Überzeuge [GetFactionMembersToPersuade] Mitglieder"
 BUL_persuade_faction_members_desc:0 "Wir werden einem der antizaristischen Regierungsmitglieder eine lächerlich hohe Geldsumme anbieten, damit er die Suche nach einer geeigneten Person zur Durchführung unseres Plans übernimmt."
 BUL_persuade_zveno_members:0 "[GetZvenoName]"
 BUL_persuade_bs_members:0 "[GetBsName]"
 BUL_persuade_bzns_members:0 "[GetBznsName]"
 BUL_persuade_nsm_members:0 "[GetNsmName]"
 BUL_persuade_generic_members:0 "Fraktion"
 BUL_draw_up_a_plan_for_regicide:0 "Erstellen Sie einen Plan für den Königsmord"
 BUL_draw_up_a_plan_for_regicide_desc:0 "Es ist Zeit, die letzten Vorbereitungen zu treffen und zu entscheiden, wann und wo unsere Operation stattfinden wird."
 BUL_seek_foreign_support:0 "Suchen Sie ausländische Unterstützung"
 BUL_seek_foreign_support_desc:0 "Wir müssen um ausländische Unterstützung bitten, die uns nicht nur dabei hilft, die Ermordung des Zaren auf subtile Weise durchzuführen, sondern auch dabei, dem offiziellen Bericht Glaubwürdigkeit zu verleihen, den unsere Regierung erstellt hat, um die Bevölkerung über den Vorfall zu informieren."
 BUL_execute_plan:0 "Plan ausführen"
 BUL_execute_plan_desc:0 "Uns bietet sich die perfekte Gelegenheit zum Handeln. Es ist Zeit, unseren Plan auszuführen! \nRuhe in Frieden, Boris ..."
 BUL_has_repressed_faction_tt:0 "Hat jede interne Fraktion unterdrückt"
 BUL_has_imprisoned_faction_leaders_tt:0 "Hat die Führer jeder internen Fraktion inhaftiert"
 BUL_has_integrated_faction_tt:0 "Hat jede interne Fraktion integriert"
 BUL_seek_foreign_support_variable_reduction_tt:0 "Verkürzt die Zeit, die für die Ermordung von Zar Boris benötigt wird."
 BUL_seek_foreign_support_reduced_stability_penalty_tt:0 "Reduziert den Stabilitätsabzug nach dem Tod des Zaren."
 BUL_assassin_persuaded_flag:0 "Hat einen politischen Gefangenen einer Gehirnwäsche unterzogen oder ein Mitglied einer integrierten internen Fraktion überzeugt"

 BUL_the_fate_of_the_balkans_dec_cat:0 "Das Schicksal des Balkans"
 BUL_the_fate_of_the_balkans_dec_cat_desc:0 "Bulgarien war lange Zeit den Interessen und Launen ausländischer Mächte unterworfen... \nAber die Zeiten haben sich geändert, unser Land ist stärker geworden und [ROOT.GetNameDef] ist nun in der Lage, seine Vorherrschaft auf dem Balkan zu behaupten."
 BUL_fate_of_the_balkans_influence_government:0 "Einfluss [FROM.GetAdjective] Regierung"
 BUL_fate_of_the_balkans_influence_government_desc:0 "Wir werden Kontakt zu [FROM.GetAdjective] Ministern aufnehmen, um die Entscheidungen ihrer Regierung im Einklang mit unseren Interessen zu beeinflussen und sie dazu zu bewegen, die für [ROOT.GetNameDef] günstigste Außenpolitik zu verfolgen, sei es durch Bestechung oder Zwang."
 BUL_fate_of_the_balkans_influence_government_tt:0 "[FROM.GetFlag]§Y[FROM.GetNameDefCap]§! wird in Zukunft eher geneigt sein, sich Bulgarien zu unterwerfen."
 BUL_fate_of_the_balkans_influence_government_autonomy:0 "Pro-bulgarische Propagandakampagne"
 BUL_fate_of_the_balkans_ultimatum:0 "Ultimatum an [FROM.GetNameDef]"
 BUL_fate_of_the_balkans_ultimatum_desc:0 "Wir werden ein Treffen mit der [FROM.GetAdjective]-Regierung organisieren, um sie unter Druck zu setzen, sich der [ROOT.GetFactionName] anzuschließen, im Austausch für [ROOT.GetAdjective]-Schutz. Und wir werden auch klarstellen, dass unsere Regierung eine [FROM.GetAdjective]-Ablehnung nicht auf die leichte Schulter nehmen wird."
 BUL_fate_of_the_balkans_ultimatum_tt:1 "\nFaktoren, die die Akzeptanzbereitschaft von [FROM.GetFlag]§Y[FROM.GetNameDefCap]§! beeinflussen: [ROOT.GetUltimatumOpinion] [ROOT.GetUltimatumStrength] [ROOT.GetUltimatumIdeology] [ROOT.GetUltimatumFaction] [ROOT.GetUltimatumInfluence] [ROOT.GetUltimatumNeighbor] [ROOT.GetUltimatumMajor]"
 BUL_ultimatum_opinion_high:0 "\n- §GHabe hohe Meinung von§! [ROOT.GetFlag]§Y[ROOT.GetNameDefCap]§!"
 BUL_ultimatum_opinion_medium:0 "\n- §YMeinung von§! [ROOT.GetFlag]§Y[ROOT.GetNameDefCap]§!"
 BUL_ultimatum_opinion_low:0 "\n- §RHas geringe Meinung von§! [ROOT.GetFlag]§Y[ROOT.GetNameDefCap]§!"
 BUL_ultimatum_strength_high:0 "\n- §GHoch§! [ROOT.GetFlag]§Y[ROOT.GetAdjective]§! §GMilitäre Stärke§!"
 BUL_ultimatum_strength_medium:0 "\n- [ROOT.GetFlag]§Y[ROOT.GetAdjective] Militärische Stärke§!"
 BUL_ultimatum_strength_low:0 "\n- §RLow§! [ROOT.GetFlag]§Y[ROOT.GetAdjective]§! §RMilitäre Stärke§!"
 BUL_ultimatum_ideology_high:0 "\n- §Gleiche Ideologie§!"
 BUL_ultimatum_ideology_medium:0 "\n- §YKompatible Ideologie§!"
 BUL_ultimatum_ideology_low:0 "\n- §RIs [FROM.GetRulingIdeology]§!"
 BUL_ultimatum_faction_good:0 ""
 BUL_ultimatum_faction_bad:0 "\n- §RIst ein Mitglied von [FROM.GetFactionName]§!"
 BUL_ultimatum_influence_good:0 "\n- §GHast beeinflusst von§! [ROOT.GetFlag]§Y[ROOT.GetNameDefCap]§!"
 BUL_ultimatum_influence_bad:0 ""
 BUL_ultimatum_neighbor_good:0 "\n- §GIs benachbart§! [ROOT.GetFlag]§Y[ROOT.GetNameDefCap]§!"
 BUL_ultimatum_neighbor_bad:0 "\n- §RIs nicht benachbart§! [ROOT.GetFlag]§Y[ROOT.GetNameDefCap]§!"
 BUL_ultimatum_is_not_major:0 ""
 BUL_ultimatum_is_major:0 "\n- §RIs eine Großmacht§!"
 BUL_fate_of_the_balkans_bring_back_state:0 "Bringen Sie [FROM.GetName] zurück"
 BUL_fate_of_the_balkans_bring_back_state_desc:0 "Wir werden eine diplomatische Mission nach [FROM.Controller.GetNameDef] schicken, um die Übertragung von [FROM.GetName] an [ROOT.GetNameDef] zu fordern, dem es rechtmäßig gehört."
 BUL_fate_of_the_balkans_demand_submission:0 "Unterwerfen [FROM.GetNameDef]"
 BUL_fate_of_the_balkans_demand_submission_desc:0 "Eine [ROOT.GetAdjective]-Delegation wird in die [FROM.GetAdjective]-Hauptstadt geschickt, um die Anerkennung von [ROOT.GetNameDef] als Oberherr von [FROM.GetName] zu fordern."
 BUL_fate_of_the_balkans_demand_submission_tt:0 "Wenn sie militärisch stärker sind als [FROM.GetNameDef], erhöht sich die Wahrscheinlichkeit, dass sie sich unserem Willen unterwerfen."
 BUL_dominance_in_the_seas:0 "Dominanz in den Meeren"
 BUL_dominance_in_the_black_sea_mission:0 "Dominanz im Schwarzen Meer"
 BUL_dominance_in_the_black_sea_mission_desc:0 "Wir müssen das Schwarze Meer sichern, indem wir jede mögliche Bedrohung von seinen Küsten entfernen und neue Gebiete erobern, von denen aus wir die Produktion von Kriegsschiffen steigern können, um die bulgarische Vorherrschaft auf diesen Meeren zu sichern."
 BUL_dominance_in_the_aegean_sea_mission:0 "Dominanz in der Ägäis"
 BUL_dominance_in_the_aegean_sea_mission_desc:0 "Wir müssen die Ägäis sichern, jede mögliche Bedrohung von ihren Küsten entfernen und neue Gebiete erobern, um dort die Produktion von Kriegsschiffen zu steigern und so die bulgarische Vorherrschaft auf den Meeren zu sichern."
 BUL_dominance_in_the_adriatic_sea_mission:0 "Dominanz in der Adria"
 BUL_dominance_in_the_adriatic_sea_mission_desc:0 "Wir müssen die Adria sichern, jede mögliche Bedrohung von ihren Küsten entfernen und neue Gebiete erobern, um dort die Produktion von Kriegsschiffen zu steigern und so die bulgarische Vorherrschaft auf den Meeren zu sichern."
 BUL_appoint_tsankov:0 "Ernennung von Aleksandar Zankow zum Premierminister"
 BUL_appoint_tsankov_desc:0 "Es ist Zeit für einen Kurswechsel hin zu einer radikaleren Politik. Alexander Zankow und seine Nationale Soziale Bewegung sind am besten geeignet, das Land zu führen."
 BUL_appoint_georgiev:0 "Ernennung von Kimon Georgiev zum Premierminister"
 BUL_appoint_georgiev_desc:0 "Kimon Georgiev ist zu einer der wichtigsten Persönlichkeiten der Vaterländischen Front geworden. Es ist an der Zeit, seine Verdienste anzuerkennen und ihm den Posten des Premierministers von [ROOT.GetNameDef] anzubieten."
 BUL_balkan_confederation_industrial_investment:0 "Industrielle Investitionen in [FROM.GetNameDef]"
 BUL_balkan_confederation_industrial_investment_desc:0 "Um Einfluss auf die [FROM.GetAdjective]-Regierung zu nehmen, werden wir [BUL.GetAdjective]-Industriemagnaten dazu ermutigen, eine Reihe von Investitionen zu tätigen, die die Entwicklung von [BUL.GetAdjective]-Tochtergesellschaften in [FROM.GetNameDef] ermöglichen und so die nationale Industrie ankurbeln und gleichzeitig unsere eigene Kontrolle darüber verstärken."
 BUL_balkan_confederation_capital_injection:0 "Kapitalspritze in [FROM.GetNameDef]"
 BUL_balkan_confederation_capital_injection_desc:0 "Wir werden in Schwierigkeiten geratene [FROM.GetAdjective] Unternehmen finanziell unterstützen, um den Finanzsektor des Landes zu stabilisieren und die [BUL.GetAdjective] Kontrolle über die [FROM.GetNameDef] Wirtschaft zu erhöhen."
 BUL_balkan_confederation_balkan_summit:0 "Organisieren Sie einen Balkangipfel"
 BUL_balkan_confederation_balkan_summit_desc:0 "Wir werden alle freien Balkanstaaten zu einem Balkangipfel einladen. Diese Veranstaltung wird es uns ermöglichen, unsere Ideen subtil zu verbreiten und den bulgarischen Einfluss in den Nationen der Region zu stärken."
 BUL_balkan_confederation:0 "Balkan-Konföderation"
 BUL_balkan_confederation_desc:0 "[GetABalkanConfederationFocusLoc]"
 BUL_balkan_confederation_ai_tt:0 "§Y[FROM.GetNameWithFlag]§! wird eher geneigt sein, unseren diplomatischen Vorschlägen zuzustimmen."
