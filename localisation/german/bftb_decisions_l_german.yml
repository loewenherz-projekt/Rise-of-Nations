 TUR_the_fading_father_category:0 "Der verblassende Vater"
 TUR_the_fading_father_category_desc:0 "Der Vater der Türken, Mustafa Kemal Atatürk, erkrankt immer häufiger. Wir müssen uns der traurigen Realität stellen, dass der messianische Gründervater unserer Nation möglicherweise nicht mehr erlebt, wie [ROOT.GetNameDef] die aktuelle Krise, mit der die Welt konfrontiert ist, durchsteht. \n\nAtatürks aktueller Gesundheitszustand ist: [ROOT.GetAtaturkHealthBar].\n"
 TUR_ataturk_health_worsening_crisis:0 "Atatürks sich verschlechternder Zustand"
 TUR_ataturk_health_worsening_crisis_desc:0 "Mit zunehmendem Alter werden Mustafa Kemal Atatürks Krankheitsphasen zwangsläufig immer schlimmer. Wie lange dauert es, bis der „Vater der Türken“ so krank wird, dass er sich nicht mehr erholen kann?"
 TUR_seek_treatment_for_ataturk:0 "Suchen Sie eine Behandlung für Atatürk"
 TUR_seek_treatment_for_ataturk_desc:0 "Wenn unser Ghazi die nächsten Jahre überleben soll, ist es wichtig, dass er sich eine Auszeit von der stressigen Aufgabe nimmt, unser Land zu regieren. Wir werden ihn in alle Welt schicken, damit er in den modernsten Sanatorien behandelt wird und in den schönsten Resorts der Welt entspannen kann."
 TUR_worsen_ataturks_health_effect_tt:0 "„Mustafa Kemal Atatürk“ wird aufgrund seines „schlechten Gesundheitszustands“ als Führer weniger effizient sein."
 TUR_retire_ataturk:0 "Atatürk in den Ruhestand schicken"
 TUR_retire_ataturk_desc:0 "Es ist traurig, aber vielleicht wäre es für unseren Ghazi besser, seine letzten Tage im Kreise seiner Familie zu verbringen und den Kontinent nach eigenem Ermessen zu bereisen. Wir können nicht weiterhin selbstsüchtig Anspruch auf sein Leben erheben: Nicht, nachdem er bereits so viel für dieses Land und sein Volk geopfert hat."
 TUR_ataturk_health_poor_tt:0 "Der Gesundheitszustand von „Mustafa Kemal Atatürk“ wird als „schlecht“ eingestuft."
 TUR_ataturk_health_terminal_tt:0 "„Mustafa Kemal Atatürk“ wird aufgrund seines „unheilbaren“ Zustands in Palliativpflege aufgenommen."
 TUR_ataturk_health_stable:0 "§YStable§!"
 TUR_ataturk_health_poor:0 "§YArm§!"
 TUR_ataturk_health_terminal:0 "§RTerminal§!"
 TUR_acquiesce_to_fundamentalists_tt:0 "Dieser und bis zu §Y2§! weitere £faction_tur_traditionalistische §YTraditionalistische Staaten§! werden beginnen, stärker mit der Regierung zu kooperieren."
 
 the_national_oath_category:0 "Der Nationaleid"
 the_national_oath_category_desc:0 "Der Untergang des Osmanischen Reiches war unvermeidlich und notwendig. Als wir 1923 den Vertrag von Lausanne unterzeichnen mussten, verloren wir jedoch mehr, als wir erhofft hatten. Es ist höchste Zeit, dass wir uns zurückholen, was uns gestohlen wurde."
 restore_the_borders_of_1920:0 "Stellt die Grenzen von 1920 wieder her"
 restore_the_borders_of_1920_desc:0 "Mit dieser Proklamation wird der Vertrag von Lausanne endlich aufgehoben und wir sind wirklich vom imperialistischen Joch befreit."

 form_turan_category:0 "Bilden Sie das Turanische Reich"
 form_turan_category_desc:0 "Lange Zeit schien Turan eher eine Fantasie als Realität zu sein, doch jetzt haben wir die Möglichkeit, alle Turkvölker der Welt unter einer Flagge zu vereinen. Wie könnten wir das ablehnen?"
 form_turan:0 "Form Turan"
 form_turan_desc:0 "Mit der Vereinigung Turans wird unser Status als Großmacht der Welt bestätigt. Die Turkvölker werden nie wieder von einer anderen Macht unterdrückt werden."
 form_turan_flag:0 "Hat Turan gebildet"
