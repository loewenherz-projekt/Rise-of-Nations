 BUL_support_imro_militias_tt:0 "Schafft IMRO-Milizdivisionen in vollständig kontrollierten mazedonischen Staaten."
 BUL_support_imro_garrisons_tt:0 "Erhält §Y[?BUL_imro_garrisons_mp_value] Arbeitskräfte§! für jeden mazedonischen Staat unter vollständiger [ROOT.GetAdjective] Kontrolle."
 BUL_support_imro_supply_activists_resistance_tt:0 "Gibt dem Eigentümer des Staates die Möglichkeit, den mazedonischen Widerstand endgültig niederzuschlagen."
 BUL_destroy_imro_divisions_macedonia_foreign_tt:0 "Hat weniger als §Y9 Infanteriedivisionen§! in §YMazedonien§!."
