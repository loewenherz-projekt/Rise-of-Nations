 BUL_ff_approaching_bs_mission_desc:0 "Die §YVaterlandsfront§! appelliert an [GetBsName], sich ihrem Putsch anzuschließen."
 BUL_ff_approaching_bzns_mission:0 "§YVaterländische Front§! nähert sich dem [GetBznsName]"
 BUL_ff_approaching_bzns_mission_desc:0 "Die §YVaterlandsfront§! appelliert an [GetBznsName], sich ihrem Putsch anzuschließen."
 BUL_ff_root_out_sympathizers:0 "Ausmerzung der Sympathisanten der Vaterländischen Front"
 BUL_ff_root_out_sympathizers_desc:0 "Diejenigen, die öffentlich mit der Vaterländischen Front sympathisieren und ihre Ideale unterstützen, müssen gejagt und vor Gericht gestellt werden."
 BUL_ff_massive_arrests:0 "Massenverhaftungen"
 BUL_ff_massive_arrests_desc:0 "Um die Bedrohung durch die Vaterländische Front zu beenden, sind drastischere Maßnahmen erforderlich. Wir werden massive Razzien durchführen und jeden verhaften, der mit der Organisation in Verbindung steht."
 BUL_ff_deal_the_final_blow:0 "Den letzten Schlag ausführen"
 BUL_ff_deal_the_final_blow_desc:1 "Wir haben die Kommunisten entscheidend geschwächt und das Schicksal der Revolution der Vaterländischen Front hängt am seidenen Faden ... Ein Faden, den wir sofort durchschneiden werden!"
 BUL_ff_approaching_faction_timer_effects_tt:0 "Die Fraktion schließt sich der Vaterländischen Front an und zieht der Mission „Bevorstehender Putsch an der Vaterländischen Front“ Tage ab, basierend auf der „Popularität der Fraktion“. Die „Loyalität der Fraktion“ gegenüber der Regierung wird den Effekt leicht reduzieren."
 BUL_ff_approaching_faction_cw_effects_tt:0 "Wenn sich diese Fraktion der Vaterländischen Front anschließt, wird der Aufstand gestärkt."
 BUL_ff_preventive_action_taken_tt:0 "Verringern Sie die Wahrscheinlichkeit eines Putsches der Vaterländischen Front um §G[?BUL.BUL_ff_preventive_actions_base_value]%§!.\nDer Wert ist auf §Y[?BUL.BUL_ff_preventive_actions_cap_value]%§! begrenzt."
 BUL_ff_deal_the_final_blow_tt:0 "Wir werden die Vaterländische Front ein für alle Mal ausrotten!"
