 BUL_internal_factions:0 "Fraktionsverwaltung"
 BUL_internal_factions_desc:1 "Die bulgarische Gesellschaft und Politik ist in zahlreiche Lager gespalten, die entweder die Gunst der Regierung gewinnen oder die Massen gegen sie aufhetzen wollen. Die bulgarische Regierung muss entscheiden, welche dieser Lager ihren Interessen dienen und welche eine Bedrohung darstellen, die zum Wohle der Nation beseitigt werden muss."
