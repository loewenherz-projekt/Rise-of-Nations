 BUL_macedonian_revolutionary_organizations:0 "Mazedonische Revolutionsorganisationen"
 BUL_macedonian_revolutionary_organizations_desc:0 "[GetImroDecisionCategoryDesc]"
 BUL_macedonian_revolutionary_organizations_cooperation_desc:0 "Wir müssen die mazedonische Zusammenarbeit während einer möglichen bulgarischen Besetzung in naher Zukunft anstreben. Die IMRO kann sich als ideales Instrument erweisen, um die bulgarische Stimmung in der Region zu stärken und so langfristig die Annexion Mazedoniens zu erleichtern."
 BUL_macedonian_revolutionary_organizations_hostile_desc:0 "Die IMRO ist schon viel zu lange eine Plage auf dem gesamten Balkan. Wir müssen uns mit den verbleibenden Zellen in Bulgarien auseinandersetzen, ihre Mitglieder, die eher wie Gangster denn wie Revolutionäre aussehen, inhaftieren und ihrer Terrorherrschaft endlich ein Ende setzen."
 BUL_repress_imro_propaganda:0 "Anti-IMRO-Propaganda"
 BUL_repress_imro_propaganda_desc:0 "Wir werden eine nationale Propagandakampagne gegen IMRO durchführen und die Organisation in Reden, Versammlungen und Demonstrationen öffentlich anprangern."
 BUL_repress_imro_persecute_activists:0 "Verfolgung von IMRO-Aktivisten"
 BUL_repress_imro_persecute_activists_desc:0 "Wir werden jeden revolutionären Agitator oder Aktivisten, der innerhalb unserer Grenzen aktiv ist, zur Strecke bringen und vor Gericht stellen."
 BUL_repress_imro_destroy_organization:0 "Zerstöre IMRO-Überreste"
 BUL_repress_imro_destroy_organization_desc:0 "Wir werden eine Militäroperation entlang der mazedonischen Grenze durchführen, um die IMRO ein für alle Mal auszurotten."
 BUL_support_imro_make_contacts:0 "Nehmen Sie Kontakt mit IMRO-Mitgliedern auf"
 BUL_support_imro_make_contacts_desc:0 "Wir werden heimlich Kontakt mit der IMRO aufnehmen und ihre Führung darüber informieren, dass eine Zusammenarbeit zwischen ihrer Organisation und der bulgarischen Regierung für beide Seiten äußerst vorteilhaft wäre."
 BUL_support_imro_supply_activists:0 "Versorgung von IMRO-Aktivisten"
 BUL_support_imro_supply_activists_desc:0 "Wir werden die IMRO mit Waffen versorgen, damit sie in das jugoslawische und griechische Mazedonien eindringen und die Region destabilisieren kann."
 BUL_support_imro_prepare_bulgarian_occupation:0 "Vorbereitung der bulgarischen Besetzung"
 BUL_support_imro_prepare_bulgarian_occupation_desc:0 "Die IMRO muss bulgarische Aktionskomitees organisieren, die im Falle einer bulgarischen Besetzung der Region sofort die lokalen Behörden übernehmen."
 BUL_support_imro_militias:0 "Integration der IMRO-Milizen"
 BUL_support_imro_militias_desc:0 "Wir müssen auf die Erfahrungen der mazedonischen Revolutionäre zurückgreifen und IMRO-Milizdivisionen bilden, die in unserer Armee dienen."
 BUL_support_imro_garrisons:0 "IMRO-Garnisonsaufgaben"
 BUL_support_imro_garrisons_desc:0 "Die Mitglieder der IMRO werden in ihrer eigenen Region bessere Leistungen als Friedenshüter erbringen und daher mit der Besetzung unserer Besatzungszonen in ganz Mazedonien beauftragt werden."
 BUL_macedonian_revolutionary_organizations_foreign:1 "$BUL_mazedonische_revolutionäre_Organisationen$"
 BUL_macedonian_revolutionary_organizations_foreign_desc:0 "Die probulgarische Organisation IMRO, die schon viel zu lange eine Plage auf dem Balkan ist, wird nun von Bulgarien unterstützt und bewaffnet. Ihr Ziel ist es, unser Land zu destabilisieren und bulgarische Stimmungen in der Region zu verbreiten. Wir müssen dieser Organisation und ihrer Terrorherrschaft ein für alle Mal ein Ende setzen."
 BUL_repress_imro_foreign:0 "Verfolgung von IMRO-Aktivisten"
 BUL_repress_imro_foreign_desc:0 "Wir werden jeden revolutionären Agitator oder Aktivisten, der innerhalb unserer Grenzen aktiv ist, zur Strecke bringen und vor Gericht stellen."
 BUL_destroy_imro_foreign:0 "Zerstöre IMRO"
 BUL_destroy_imro_foreign_desc:0 "Wir müssen in ganz Mazedonien eine Militäroperation durchführen, um die IMRO ein für alle Mal auszurotten."
 BUL_destroy_imro_divisions_macedonia_tt:1 "Hat weniger als §Y2 Infanteriedivisionen§! in §YSofia§! entlang der Grenze zum Staat §YMazedonien§!"
 BUL_destroy_imro_divisions_central_macedonia_tt:1 "Verfügt über weniger als §Y4 Infanteriedivisionen§! in §YPlovdiv§! entlang der Grenze zum Staat §YCentralmakedonien§!"
 BUL_destroy_imro_divisions_thrace_tt:1 "Verfügt über weniger als §Y4 Infanteriedivisionen§! in §YPlovdiv§! entlang der Grenze zum Staat §YThrakien§!"
