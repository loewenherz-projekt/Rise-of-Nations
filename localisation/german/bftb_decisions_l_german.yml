 BUL_the_fatherland_front_dec_cat:0 "Die Vaterländische Front"
 BUL_the_fatherland_front_dec_cat_desc:0 "[GetFfDecisionCategoryDesc]"
 BUL_the_fatherland_front_desc_planning:0 "Die Anführer der §YVaterlandsfront§! bereiten einen Putsch vor.\nIrgendwann werden sie die Unterstützung von [GetZvenoName], [GetBsName] und [GetBznsName] suchen.\nWir können verschiedene Maßnahmen ergreifen, um ihre Vorbereitungen zu behindern und ihren Versuch, die Regierung zu stürzen, zu schwächen:\n- Sympathisanten und Anführer der §YVaterlandsfront§! ausfindig machen und verhaften.\n- Alle Fraktionen, denen sie sich nähern, zerstören oder integrieren.\n-Weniger als 1 §YKommunistische Unterstützung§! wird uns erlauben, der §YVaterlandsfront§! den letzten Schlag zu versetzen."
 BUL_the_fatherland_front_desc_coup:0 "Die Anführer der Vaterländischen Front haben den Putsch geplant und warten nun auf den richtigen Moment, um zuzuschlagen.\nWahrscheinlichkeit des Putsches:\nBasis §Y10%§! [GetAtWarFfPercentage] [GetAllyAtWarFfPercentage] [GetSovNeighborFfPercentage] [GetCommunistSovFfPercentage]"
