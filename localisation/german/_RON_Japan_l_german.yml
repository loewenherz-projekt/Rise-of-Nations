 WW2_japan.3.d:0 "Unser Premierminister Kōki Hirota hat sich nach einer Meinungsverschiedenheit mit Kriegsminister Hisaichi Terauchi über eine Rede des Rikken-Seiyūkai-Vertreters Kunimatsu Hamada, in der er die Einmischung des Militärs in die Politik kritisierte, zum Rücktritt entschlossen."
 WW2_japan.3.a:0 "Senjūrō Hayashi wird ihn ersetzen"
