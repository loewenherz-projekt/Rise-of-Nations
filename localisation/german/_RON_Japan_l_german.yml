 JAP_ir_balanced_I0:0 "IR: Ausgewogen"
 JAP_ir_balanced_I0_desc:0 "Die Imperiale Marine und die Imperiale Armee befinden sich in einem erbitterten Konflikt um unsere begrenzten Ressourcen. Wir haben regelmäßige Konferenzen einberufen, um sicherzustellen, dass unsere Ressourcen am richtigen Ort eingesetzt werden. Eine Bevorzugung des einen gegenüber dem anderen wird weitreichende Konsequenzen haben.\n§W---------------§!\nDieser Nationalgeist ist ausgeglichen (§H0§!) §HAusgeglichen§!."
 
