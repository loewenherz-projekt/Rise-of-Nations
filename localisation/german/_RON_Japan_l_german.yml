 ### Nation Elections
 umc_jcd.70.t:0 "Staatliche Neuordnung"
 umc_jcd.70.d:0 "Nach einem blutigen Bürgerkrieg gelingt es den vereinten Kräften japanischer Demokraten und Kommunisten, die vollständige Kontrolle über die Heimatinseln zu erlangen. Doch noch bevor sich der Staub auf den Schlachtfeldern gelegt hat, tauchen neue interne Probleme auf. Sowohl Demokraten als auch Kommunisten versuchen, ihre Vormachtstellung zu sichern.\n\nGlücklicherweise wurde ein gewaltfreies Abkommen erzielt, das nationale Wahlen sichert. Obwohl beide Seiten zweifellos alles daran setzen werden, den Ausgang zu beeinflussen, ist dies mit Sicherheit eine vorteilhaftere Lösung als ein weiterer Bürgerkrieg."
 umc_jcd.70.a:0 "Die Demokratie muss erhalten bleiben."
 umc_jcd.70.b:0 "Der Kommunismus ist der Weg, den Japan einschlagen wird."
 JCD_selected_democracy_flag:0 "Hat im Event „Staatsumstrukturierung“ „Demokratische Regierung“ ausgewählt."
 JCD_selected_communism_flag:0 "Hat im Event „Staatsumstrukturierung“ die Option „Kommunistische Regierung“ ausgewählt."
 
 
