Japan_operation_nekka_desc:0 "Wir werden die Operation Nekka starten, eine Operation, mit der wir unsere Vorherrschaft behaupten und unsere Interessen in der Region durch die Verteidigung der Großen Mauer sichern wollen."

Japan_pacifism_desc:0 "Wir stehen an einem Scheideweg und müssen unsere historischen imperialen Ambitionen sorgfältig mit der wachsenden pazifistischen Stimmung abwägen. In diesem entscheidenden Jahr kommt es zu Spannungen zwischen unseren imperialistischen Bestrebungen und dem weltweiten Ruf nach Frieden. Während wir uns nach außen hin für Pazifismus einsetzen, wirken die Keime unseres vergangenen Militarismus noch immer nach und prägen unsere Zukunft."

Japan_imperialism_desc:0 "Unser Imperialismus umfasst unsere historische Expansionspolitik und unsere Gebietseroberungen im späten 19. und frühen 20. Jahrhundert. In dieser Zeit annektierten wir Korea, Teile Chinas und andere Gebiete, was oft zu Spannungen mit den Nachbarstaaten führte."

Japan_establish_the_special_court_martial_desc:0 "Die Einrichtung des Sonderkriegsgerichts in Japan ist ein wesentlicher Bestandteil unserer Reformen nach dem Zweiten Weltkrieg. Sein Zweck besteht darin, faire Prozesse für Personen zu gewährleisten, denen Kriegsverbrechen vorgeworfen werden. Es spielt eine entscheidende Rolle bei der Aufrechterhaltung von Gerechtigkeit und Rechenschaftspflicht in unserem Land."

Japan_asian_stability_desc:0 "Wir arbeiten aktiv daran, die Stabilität in Asien durch wirtschaftliche Zusammenarbeit, diplomatische Bemühungen und friedenserhaltende Initiativen zu gewährleisten. Unsere Bemühungen zielen darauf ab, zur regionalen Sicherheit und Entwicklung beizutragen."

Japan_no_more_conflicts_desc:0 "Unsere Außenpolitik nach dem Zweiten Weltkrieg konzentriert sich auf die Vermeidung von Konflikten und die Förderung friedlicher Konfliktlösungen. Dieser Ansatz ist von grundlegender Bedeutung für die Wahrung unserer wirtschaftlichen und politischen Stabilität."

Japan_pact_with_the_us_desc:0 "Der Pakt mit den USA, der sogenannte US-Japanische Sicherheitsvertrag, ist ein Eckpfeiler unserer Sicherheit. Er garantiert den US-Militärschutz im Austausch für die Erlaubnis, amerikanische Militärstützpunkte auf unserem Boden zu errichten."

Japan_the_tanggu_truce_desc:0 "Der 1933 unterzeichnete Waffenstillstand von Tanggu markiert das Ende unserer Invasion in der Mandschurei. Er führt jedoch zu unserem Austritt aus dem Völkerbund und verschärft die Spannungen mit der internationalen Gemeinschaft."

Japan_the_tokubetsukeibitai_desc:0 "Die Tokubetsukeibitai oder Kempeitai war unsere Militärpolizei im Zweiten Weltkrieg. Sie war bekannt für ihre rigorose Durchsetzung der japanischen Besatzungspolitik."

Japan_shikan_gakko_jiken_desc:0 "Der Shikan Gakko Jiken, auch bekannt als Vorfall vom 26. Februar, ist ein Schlüsselereignis unserer Geschichte. Dieser erfolgreiche Putschversuch einer Gruppe unserer Militäroffiziere im Jahr 1936 zielte darauf ab, unsere militaristische Politik zu stärken und vermeintliche politische Hindernisse innerhalb unserer Regierung zu beseitigen."

Japan_the_successful_coup_desc:0 "Der erfolgreiche Putsch in Japan, bekannt als Shikan Gakko Jiken, war ein bedeutendes Ereignis während des Zweiten Weltkriegs. Es handelte sich um einen erfolgreichen Militärputsch einer Fraktion unseres Militärs im Jahr 1936 mit dem Ziel, unsere militaristische Politik zu stärken und wahrgenommene politische Hindernisse innerhalb unserer Regierung zu beseitigen."

Japan_crush_the_rebels_desc:0 "Unsere Bemühungen, Rebellen niederzuschlagen, beziehen sich auf verschiedene Konflikte in unserer Geschichte, darunter die Unterdrückung indigener Aufstände in unseren Kolonialgebieten oder interner Rebellionen gegen unsere Regierung."

Japan_complain_about_khalkhyn_desc:0 "Unsere Beschwerden über Chalchyn beziehen sich auf Fragen im Zusammenhang mit unseren Territorialstreitigkeiten mit Russland über die Kurilen, die auf Japanisch früher als Chishima-Inseln bekannt waren."

Japan_chindoihara_agreement_desc:0 "Das 1935 unterzeichnete Chindoihara-Abkommen stellte eine diplomatische Regelung zwischen uns und der Sowjetunion dar. Ziel war es, die Spannungen abzubauen und die Beziehungen im Zusammenhang mit territorialen Streitigkeiten zu verbessern."

Japan_chahar_agreement_desc:0 "Das 1939 unterzeichnete Chahar-Abkommen ermöglichte uns die militärische Zusammenarbeit mit der autonomen Regierung der Inneren Mongolei während des Zweiten Weltkriegs. Es war Teil unserer Expansionsambitionen in Asien."

Japan_nini_roku_jiken_incident_desc:0 "Der Niniroku-Jiken-Zwischenfall, auch bekannt als der Vorfall vom 15. Februar, war ein gescheiterter Putschversuch japanischer Ultranationalisten im Jahr 1936. Ziel war die Beseitigung politischer Persönlichkeiten, die als Hindernis für unseren Militarismus angesehen wurden."

Japan_sign_martial_law_desc:0 "Unsere Unterzeichnung des Kriegsrechts könnte sich auf Fälle während des Krieges beziehen, in denen unsere Regierung das Kriegsrecht verhängte, um die Kontrolle aufrechtzuerhalten und abweichende Meinungen zu unterdrücken."

Japan_alliance_against_communism_desc:0 "Unser Bündnis gegen den Kommunismus bezieht sich wahrscheinlich auf unsere Ausrichtung auf den westlichen Block, insbesondere die Vereinigten Staaten, während des Kalten Krieges, um der Ausbreitung des Kommunismus in Asien entgegenzuwirken."

Japan_developp_industry_desc:0 "Unser Engagement für die Entwicklung unserer Industrie war eine treibende Kraft hinter unserem wirtschaftlichen Erfolg nach dem Zweiten Weltkrieg. Diese Industrialisierung hat uns zu einer globalen Wirtschaftsmacht gemacht."
