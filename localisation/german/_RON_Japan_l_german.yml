 JAP_state_shintoism_I1:0 "Staats-Shintō"
 JAP_state_shintoism_I1_desc:0 "Seit der Meiji-Restauration versuchen wir, die Anbetung in Shinto-Schreinen zu nutzen, um die Loyalität gegenüber dem Kaiser zu fördern und den Aufbau der Nation zu unterstützen. Dies hat es uns ermöglicht, ein Land aufzubauen, das bereit ist, im Namen des Staates große Opfer zu bringen."
 JAP_state_shintoism_I2:0 "Staats-Shintō"
 JAP_state_shintoism_I2_desc:0 "Seit der Meiji-Restauration versuchen wir, die Anbetung in Shinto-Schreinen zu nutzen, um die Loyalität gegenüber dem Kaiser zu fördern und den Aufbau der Nation zu unterstützen. Dies hat es uns ermöglicht, ein Land aufzubauen, das bereit ist, im Namen des Staates große Opfer zu bringen."
