 JAP_ir_convene_imperial_war_conference_dec:0 "Kaiserliche Konferenz"
 JAP_ir_convene_imperial_war_conference_dec_desc:0 "Die Kaiserliche Konferenz, auch „Gozen Kaigi“ genannt, ist eine Konferenz vor dem Kaiser. Sie ist eine außerverfassungsmäßige Konferenz zu außen- und innenpolitischen Angelegenheiten von großer nationaler Bedeutung, die von der Regierung des japanischen Kaiserreichs in Anwesenheit des Kaisers einberufen wird.\n\nHier müssen wir über die Verteilung der Staatsgelder und den Umgang mit den Streitkräften Japans entscheiden. Wir müssen jedoch vorsichtig sein, denn die Beschwichtigung der einen könnte die anderen verärgern."
 
 JAP_ir_maintain_interservice_neutrality_dec:0 "Wahrung der Neutralität zwischen den Dienststellen"
 JAP_ir_maintain_interservice_neutrality_dec_desc:0 "Wir können nicht ewig zwischen unseren beiden Streitkräften balancieren. Sie müssen erkennen, dass wir keine der beiden Truppenteile bevorzugen und dass der Wohlstand des Japanischen Kaiserreichs gleichermaßen von seiner Armee und seiner Marine abhängt."
