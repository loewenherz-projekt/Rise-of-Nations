 umc_jap.309.t:0 "In der Mandschurei bilden sich kommunistische Milizen"
 umc_jap.309.d:0 "Sobald wir die Kontrolle über das zuvor von Japan kontrollierte Mandschurei erlangt hatten, unternahmen wir alle Anstrengungen, um die lokalen Gebiete unter unsere Kontrolle zu bringen. Ohne Erfolg. Zwar gelang es uns, die meisten Großstädte zu besetzen, doch große ländliche Gebiete im Nordosten fielen schnell unter kommunistische Kontrolle, mit Hilfe des bereits etablierten kommunistischen Untergrundwiderstands.\n\nNun werden diese Einheiten zu kommunistischen Milizen reformiert und unter dem Kommando von [PRC.GetName] rasch reorganisiert."
 umc_jap.309.a:0 "Wir müssen bereit sein."
 
 
