 JAP_CHI_ichi_go_sakusen_going_I:0 "Ichi-Gō Sakusen"
 JAP_CHI_ichi_go_sakusen_going_I_desc:0 "Die Operation Ichi-Gō, auch bekannt als „Operation Nummer Eins“, ist die größte japanische Operation in der Militärgeschichte. Die beiden Hauptziele der Ichi-Gō sind die Öffnung einer Landroute nach Französisch-Indochina und die Eroberung von Luftwaffenstützpunkten im Südosten Chinas, von denen aus amerikanische Bomber das japanische Heimatland und die japanische Schifffahrt angriffen."
