 ### CIVIL WAR caused by SURRENDER in CHI
 umc_jap.330.t:0 "Ende eines Imperiums"
 umc_jap.330.d:0 "Nach unserer Niederlage gegen China auf dem Festland wuchs in der japanischen Bevölkerung das Misstrauen gegenüber unserer militaristischen Führung und unseren kriegerischen Ambitionen. Auch auf den Heimatinseln entwickelte sich die Situation entsprechend, wo blutige Proteste und Streiks an der Tagesordnung waren. Bis vor Kurzem jedoch blieb die Kaiserlich Japanische Armee trotzig und unterdrückte jeden Versuch einer Veränderung. Doch nun hat sich sogar der Kaiser selbst zu Reformen verpflichtet und begonnen, unsere Sache zu unterstützen – und wurde dabei schnell von seinen Anhängern unterstützt, während die hartnäckigsten Militaristen dagegen waren. Angesichts dieses Konflikts besteht kein Zweifel daran, dass es bald zu einem umfassenden Bürgerkrieg kommen wird."
 umc_jap.330.a:0 "Wir müssen diesen Militarismus für die Zukunft Japans loswerden."
 
 
 
