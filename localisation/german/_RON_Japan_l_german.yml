 ##### NATIONAL DEFENSE STATE BRANCH
 JAP_extreme_war_production:0 "Extreme Kriegsproduktion"
 JAP_extreme_war_production_desc:0 ""
 JAP_bastion_in_japan:0 "Bastion in Japan"
 JAP_bastion_in_japan_desc:0 "Feinde rücken immer näher an unsere Küsten heran. Wir müssen unsere Heimatinseln befestigen und uns auf künftige Invasionen vorbereiten."
 JAP_to_the_last_man_standing:0 "Bis zum letzten Überlebenden"
 JAP_to_the_last_man_standing_desc:0 "Kapitulation ist keine Option. Bis der letzte Mann steht, werden wir unser Reich verteidigen – aus den Wäldern, aus den Sümpfen, aus den Gebäuden … Jeder gewonnene Meter wird sie Leben kosten. Jeder Eindringling wird einen hohen Blutzoll zahlen müssen."
 
 ##### INDUSTRY BRANCH BRANCH
 JAP_this_will_also_strenghten_zaibatsus_EXPL:0 "Dieser Fokus wird auch die §HZaibatsus§! stärken.\n"
 JAP_develop_zaibatsus_home_island_holdings:0 "Entwickeln Sie die Besitztümer der Zaibatsus-Heimatinsel"
 JAP_develop_zaibatsus_home_island_holdings_EXPL:0 "   Wählen Sie einen der „§HBig Four§!“ aus, um zusätzliche §GBonuspunkte§! zu erhalten.\n"
 JAP_develop_zaibatsus_home_island_holdings_desc:0 "Zaibatsus oder „Finanzclique“ ist ein Industrie- und Finanzkonglomerat, das bedeutende Teile der japanischen Wirtschaft kontrolliert. Es wird von den „Großen Vier“ beherrscht: den Konzernen Sumitomo, Mitsui, Mitsubishi und Yasuda. Um die Industrialisierung Japans voranzutreiben, müssen wir die Zaibatsus-Beteiligungen auf den Heimatinseln ausweiten."
 
 JAP_expand_the_textile_industry:0 "Ausbau der Textilindustrie"
 JAP_expand_the_textile_industry_desc:0 "Im Jahr 1920 war die Textilindustrie der wichtigste Wirtschaftszweig Japans. Japan war vor allem als Hersteller von Woll- und Seidenprodukten, Stoffen, Fächern, Spielzeug und ähnlichen Waren bekannt. Auch heute noch, obwohl andere Branchen einen rasanten Aufschwung erleben, bleibt die Textilindustrie eine der wichtigsten Branchen."
 JAP_increase_automotive_production:0 "Steigerung der Automobilproduktion"
 JAP_increase_automotive_production_desc:0 "Die japanische Automobilproduktion beträgt im Vergleich zur amerikanischen nur zehn Prozent. Das muss sich ändern, wenn wir uns jemals einen umfassenden Krieg mit dem amerikanischen Giganten vorstellen können."
 JAP_ho_ki_mechanized_models:0 "Mechanisierte Ho-Ki-Modelle"
 JAP_ho_ki_mechanized_models_desc:0 ""
 
 ##### KOR BRANCH
 JAP_KOR_korean_colonization_laws:0 "Koreanische Kolonialgesetze"
 JAP_KOR_korean_colonization_laws_desc:0 "Die koreanische Halbinsel steht seit 1905 unter japanischer Herrschaft. Auch wenn die Koreaner mit unserer Herrschaft nicht einverstanden sind, müssen Schritte unternommen werden, um das Gebiet in das imperiale Territorium zu integrieren. Die einzige Religion wird unser Shitoismus sein, der Unterricht wird nur auf Japanisch stattfinden."
 JAP_KOR_hold_the_waves_in_korea:0 "Halten Sie die Wellen in Korea"
 JAP_KOR_hold_the_waves_in_korea_desc:0 "Die Mandschurei ist zu groß, als dass wir einen Großangriff durchführen könnten. Korea verfügt jedoch im Norden über eine gute natürliche Verteidigungslinie. Ein Gebiet, das wir befestigen und so lange wie nötig halten können."
 JAP_KOR_expand_zaibatsus_influence_in_korea:0 "Ausbau des Einflusses der Zaibatsus in Korea"
 JAP_KOR_expand_zaibatsus_influence_in_korea_EXPL:0 "Fügen Sie §G1§! Gebäudeplätze und §H1 Ausgewählte Gebäude§! in drei Staaten in entweder §HNord§! oder §HNüdkorea§! hinzu."
 JAP_KOR_expand_zaibatsus_influence_in_korea_desc:0 "Während das koreanische Territorium langsam in die kaiserliche Domäne integriert wird, versucht Zaibatsu auch, seinen Einfluss auf der koreanischen Halbinsel auszuweiten. Dies wird nicht nur die Integration und Industrialisierung fördern, sondern auch Zaibatsus Gesamtmacht stärken."
 JAP_KOR_one_people_under_the_rising_sun_flag:0 "Ein Volk unter der Flagge der aufgehenden Sonne"
 JAP_KOR_one_people_under_the_rising_sun_flag_desc:0 "Die Integration ist fast abgeschlossen und muss nun nur noch offiziell gemacht werden. Japanische Tradition, Religion und Einfluss haben Korea zu einer zweiten Heimatinsel gemacht."
 JAP_KOR_expand_north_korean_steel_mines:0 "Ausbau der nordkoreanischen Stahlminen"
 JAP_KOR_expand_north_korean_steel_mines_desc:0 "Die nordkoreanischen Stahl- und Wolframminen müssen erweitert werden, um unserer wachsenden Rüstungsindustrie die Möglichkeit zu bieten, in großem Umfang Vorkommen zu fördern."
 JAP_KOR_the_bank_of_chosen:0 "Die Bank der Auserwählten"
 JAP_KOR_the_bank_of_chosen_desc:0 ""
 
 ##### MILITARY INDUSTRY BRANCH
 JAP_expand_military_production_sphere:0 "Erweitern Sie den Bereich der militärischen Produktion"
 JAP_expand_military_production_sphere_desc:0 ""
 JAP_tachikawa_industry_development:0 "Tachikawa\nIndustrieentwicklung"
 JAP_tachikawa_industry_development_desc:0 "Tachikawa ist ein riesiger Militärkonzern, der Waffen und andere wichtige Ausrüstung für die kaiserliche Armee produziert. Um unsere Armee mit der benötigten Ausrüstung zu versorgen, müssen wir die Produktion ausweiten."
 JAP_aichi_kokuki_industry_development:0 "Aichi Kokuki\nIndustrieentwicklung"
 JAP_aichi_kokuki_industry_development_desc:0 ""
 JAP_yokosuka_industry_development:0 "Yokosuka\nIndustrielle Entwicklung"
 JAP_yokosuka_industry_development_EXPL:0 "Fügen Sie §H2§! „Sendai-Klasse“ §HLeichte Kreuzer§! hinzu, die bereit sind, in unsere Produktion aufgenommen zu werden.\n"
 JAP_yokosuka_industry_development_desc:0 ""
 
 JAP_prepare_for_the_oil_shortages:0 "Bereiten Sie sich auf die Ölknappheit vor"
 JAP_prepare_for_the_oil_shortages_desc:0 "Eines fehlt unserem Land: Öl. Deshalb müssen wir unsere Vorräte auffüllen, bevor wir in Zukunft einen Krieg führen."
 JAP_expand_military_research_sector:0 "Ausbau des militärischen Forschungssektors"
 JAP_expand_military_research_sector_desc:0 "Schlachten werden durch den Kampfgeist der Männer, aber auch durch ihre Ausrüstung gewonnen. Unsere Kriegsminister sind sich darin einig, und deshalb werden wir in die militärische Forschungseinrichtung in Nagasaki investieren."
 JAP_ha_nu_ri_tank_designs:0 "Ha-Nu-Ri-Panzerdesigns"
 JAP_ha_nu_ri_tank_designs_desc:0 "Auch wenn China nicht über leistungsfähige Panzer verfügt, ist die Lage bei der Sowjetunion im Norden völlig anders. Ihre Panzer sind unseren weit überlegen. Wir müssen Schritte unternehmen, um unsere eigenen modernen Panzer zu entwickeln, die es mit jeder Panzerung unserer Feinde aufnehmen können."
 JAP_better_resource_processing_technology:0 "Bessere Ressourcenverarbeitungstechnologie"
 JAP_better_resource_processing_technology_desc:0 ""
 JAP_maruzen_oil_refineries_in_minoshima:0 "Maruzen-Ölraffinerien in Minoshima"
 JAP_maruzen_oil_refineries_in_minoshima_desc:0 "Die Maruzen-Ölfelder in Minoshima gehören zu den wenigen Ölvorkommen auf den Heimatinseln. Wir müssen sie ausbeuten und nutzbar machen. Deshalb werden wir dort eine moderne Raffinerie errichten, die die lokalen Vorkommen nutzen und die Heimatinseln mit Treibstoff versorgen kann."
 
 ##### CONTINENTAL SITUATION BRANCH
 JAP_continental_situation:0 "Kontinentale Lage"
 JAP_continental_situation_EXPL:0 "   Verwenden Sie Ihren Puppet-Status in [MEN.GetFlag]§H[MEN.GetName]§!, um einen §HBorder Conflict§! mit [SHX.GetFlag]§H[SHX.GetName]§! über §H[621.GetName]§! zu starten.\n"
 JAP_continental_situation_desc:0 "Die Lage auf den Heimatinseln ist stabil, aber das gilt nicht für unsere Stellung auf dem Kontinent. Wir müssen die Kwantung-Armee in der Mandschurei sowie den Einfluss des Prinzen in der Südmongolei stärken."
 JAP_prepare_for_the_asian_campaign:0 "Bereiten Sie sich auf die Asienkampagne vor"
 JAP_prepare_for_the_asian_campaign_desc:0 "Unsere Marionetten sind schwach und hätten allein gegen unsere kontinentalen Feinde keine Chance. Zunächst müssen wir ihre Bevölkerung rekrutieren und sie mit veralteter Ausrüstung ausstatten."
 JAP_reinforce_the_sino_japanese_border:0 "Verstärkung der chinesisch-japanischen Grenze"
 JAP_reinforce_the_sino_japanese_border_desc:0 ""
 JAP_expand_continental_ports:0 "Ausbau der kontinentalen Häfen"
 JAP_expand_continental_ports_desc:0 ""
 JAP_south_manchuria_railway_company:0 "Südmandschurische Eisenbahngesellschaft"
 JAP_south_manchuria_railway_company_EXPL:0 "\nDurch das Abschließen dieses Fokus wird §MUngeschlossen§! &#39;§HMandschurische Industrieentwicklungsgesellschaft§!&#39; Fokuszweig für [MAN.GetFlag]§H[MAN.GetName]§!.\n"
 JAP_south_manchuria_railway_company_desc:0 "Die Südmandschurei-Eisenbahn (Mantetsu) wurde 1906 gegründet, um die von den Russen übernommenen Eisenbahnen zu betreiben. Anschließend expandierte Mantetsu durch den Bau neuer Strecken für sich selbst und für chinesische Unternehmen. Nach der Gründung des Marionettenstaates Mandschukuo im Jahr 1932 wurde Mantetsu auch mit der Verwaltung der Mandschukuo National Railway betraut."
 JAP_use_foreign_workforce:0 "Ausländische Arbeitskräfte einsetzen"
 JAP_use_foreign_workforce_desc:0 ""
 JAP_expand_koshinetsu_tungsten_mines:0 "Erweitern Sie die Wolframminen von Koshinetsu"
 JAP_expand_koshinetsu_tungsten_mines_desc:0 "Mit erschwinglichen, billigen Arbeitskräften können wir die Stahl- und Wolframmine von Koshinetsu erweitern, um mehr wertvolle Materialien für unsere Kriegsproduktion bereitzustellen."
 JAP_expand_tohoku_steel_mines:0 "Erweitern Sie Tohoku\nStahlminen"
 JAP_expand_tohoku_steel_mines_desc:0 "Mit erschwinglichen, billigen Arbeitskräften können wir das Tohoku-Stahlbergwerk erweitern, um mehr wertvolle Materialien für unsere Kriegsproduktion bereitzustellen."
 JAP_nippon_kaigun_dockyards:0 "Nippon Kaigun Dockyards"
 JAP_nippon_kaigun_dockyards_desc:0 "Mit ausreichender Stahl- und Chromproduktion können wir in den Bau großer Schiffsbaukomplexe investieren. Von dort aus können wir die modernsten und leistungsstärksten Schlachtschiffe und Flugzeugträger bauen."
 
 ##### MAN BRANCH
 JAP_MAN_the_manchurian_project:0 "Das Manchurian-Projekt"
 JAP_MAN_the_manchurian_project_EXPL:0 "Gewinnen Sie §H2§! erfahrene Kwantung-Divisionen.\n"
 JAP_MAN_the_manchurian_project_desc:0 "Unser Marionettenstaat Mandschurei – gegründet 1931 – verfügt über enorme natürliche Ressourcen und Lebensraum. Diese sind uns jedoch wenig nützen, wenn unsere Marionette ihre eigenen innenpolitischen Probleme nicht bewältigen kann. Daher werden wir uns darauf konzentrieren, seine Stabilität zu erhöhen und ihn schließlich darauf vorzubereiten, Teil unseres Imperiums zu werden."
 JAP_MAN_central_bank_of_manchou:0 "Zentralbank von Mandschou"
 JAP_MAN_central_bank_of_manchou_desc:0 ""
 JAP_MAN_expand_the_mukden_arsenal:0 "Erweitern Sie das Mukden-Arsenal"
 JAP_MAN_expand_the_mukden_arsenal_desc:0 ""
 JAP_MAN_showa_steel_works:0 "Shōwa-Stahlwerk"
 JAP_MAN_showa_steel_works_desc:0 ""
 JAP_MAN_reinforce_the_manchu_soviet_border:0 "Verstärkung der mandschurisch-sowjetischen Grenze"
 JAP_MAN_reinforce_the_manchu_soviet_border_desc:0 "Unser mandschurischer Marionettenstaat hat eine lange Grenze mit der Sowjetunion. Ein Land, das uns nicht gerade freundlich gesinnt ist. Wir werden seine Grenzen entlang des Amur befestigen, um auf eine mögliche sowjetische Invasion vorbereitet zu sein."
 JAP_MAN_improve_manchurian_imperial_army:0 "Verbesserung der Mandschurischen Kaiserlichen Armee"
 JAP_MAN_improve_manchurian_imperial_army_desc:0 "Die Kaiserliche Mandschurische Armee ist nur ein leeres Wort. Aber mit unserer Hilfe können wir sie modernisieren und mit unseren modernen Waffen ausstatten. So könnte sie die Sowjets vielleicht sogar allein zurückschlagen, und wir könnten die Kanto-Armee dorthin verlegen, wo sie dringender gebraucht wird."
 JAP_MAN_establish_manchurian_imperial_air_force:0 "Gründung der Mandschurischen Kaiserlichen Luftwaffe"
 JAP_MAN_establish_manchurian_imperial_air_force_desc:0 "Der nächste Schritt zur Stärkung Mandschukuos besteht darin, einige unserer älteren Flugzeuge dorthin zu transferieren und damit die unabhängige Mandschurische Kaiserliche Luftwaffe aufzubauen. Auf diese Weise kann das Land seine Lufthoheit sichern und gleichzeitig eine eigene Flugzeugproduktion im Inland starten."
 
 JAP_MAN_enforce_the_kwantung_leadership:0 "Durchsetzung der Kwantung-Führung"
 JAP_MAN_enforce_the_kwantung_leadership_desc:0 "Wir haben kein Interesse daran, den mandschurischen Traum von Unabhängigkeit zu unterstützen. Daher ist es an der Zeit, dass „Kaiser“ Puyi nur noch als leeres Symbol für unseren persönlichen Gebrauch dient. Die Kwantung-Armee mit Ueda an der Spitze wird Mandschukuo von nun an führen."
 JAP_MAN_kantogun_protects_manchuria:0 "Kantogun schützt die Mandschurei"
 JAP_MAN_kantogun_protects_manchuria_EXPL:0 "Gewinnen Sie §H12§! erfahrene Kwantung-Divisionen in der Mandschurei. Ihre §HVorlage§! wird besser sein, wenn wir die Technologie der §HPanzerabwehrartillerie§! erforscht haben.\n"
 JAP_MAN_kantogun_protects_manchuria_desc:0 "Kantogun, die „Kwantung-Armee“, ist die wichtigste Streitmacht unseres Marionettenregimes in der Mandschurei. Und das wird auch so bleiben. Wir können uns beim Schutz unserer Grenzen gegen ausländische Bedrohungen nicht auf untrainierte und unerfahrene Mandschus und Chinesen verlassen."
 JAP_MAN_path_to_nishinihon:0 "Weg nach Nishinihon"
 JAP_MAN_path_to_nishinihon_EXPL:0 "   Bringen Sie die mandschurische §HPolitische§! und §HEwirtschaftliche Situation§! näher an die japanischen Standards.\n Erhalten Sie §HKern§! in den mandschurischen Gebieten.\n Vollständiger §HAnnex§! und erhalten Sie §HGeneräle§! und §HTruppen§! von [MAN.GetFlag]§H[MAN.GetName]§!.\n"
 JAP_MAN_path_to_nishinihon_desc:0 "Die riesigen Gebiete der Mandschurei, die wir 1931 durch den Mukden-Zwischenfall eroberten, bergen viele Reichtümer und Vorteile, die Japan zugute kommen könnten. Doch diese werden – von kleinen Ausnahmen abgesehen – noch nicht richtig genutzt."
 JAP_MAN_continental_shipbuilding_facilities:0 "Kontinentale Schiffbauanlagen"
 JAP_MAN_continental_shipbuilding_facilities_desc:0 ""
 
 ##### ARMY BRANCH
 JAP_teishin_shudan_special_forces_group:0 "Teishin Shudan\nSpezialeinheitsgruppe"
 JAP_teishin_shudan_special_forces_group_desc:0 ""
 JAP_expand_support_companies:0 "Support-Unternehmen erweitern"
 JAP_expand_support_companies_desc:0 ""
 JAP_bushido_the_way_of_the_warriors:0 "Bushidō, der Weg der Krieger"
 JAP_bushido_the_way_of_the_warriors_desc:0 ""
 
 ##### AIR BRANCH
 JAP_new_nakajima_fighters:0 "Neue Nakajima-Jäger"
 JAP_new_nakajima_fighters_desc:0 "Wir müssen unsere Überlegenheit gegenüber unseren Feinden in allen Bereichen aufrechterhalten, auch in der Luftkriegsführung. Modernisierte Kampfflugzeuge sind hierfür unerlässlich."
 JAP_aichis_range_focused_designs:0 "Aichis\nReichweitenorientierte Designs"
 JAP_aichis_range_focused_designs_desc:0 "Die Entfernungen, die bei der Kriegsführung im Norden oder im Pazifik zurückgelegt werden müssen, sind enorm, und deshalb brauchen wir Modelle, die diese Entfernungen überbrücken können."
 JAP_mitsubishis_agile_designs:0 "Mitsubishis\nAgile Designs"
 JAP_mitsubishis_agile_designs_desc:0 "Reichweite allein nützt uns nichts, wenn unsere Modelle nicht mit dem Feind mithalten können, wenn dieser eintrifft. Wir müssen Fahrzeuge mit überlegener Wendigkeit bauen, damit sie niemals ausmanövriert werden können."
 JAP_the_zero_EXPL:0 "Ermöglicht die Produktion des Trägerjägers „Mitsubishi A6M Zero-sen“."
 JAP_bonbafosu_modernization:0 "Bonbāfōsu-Modernisierung"
 JAP_bonbafosu_modernization_desc:0 "Eine modernisierte taktische Bomberflotte ist der Schlüssel zur Unterstützung unseres Militärs auf dem Schlachtfeld."
 JAP_plan_z_bomber_project:0 "Plan Z Bomberprojekt"
 JAP_plan_z_bomber_project_desc:0 "Um die Industrie im feindlichen Gebiet angreifen zu können, müssen wir unsere Bomberflotte modernisieren. Plan Z dient uns dabei als Leitfaden. Am Ende sollen wir einen Langstreckenbomber entwickeln, der tief in feindliches Gebiet vordringen kann."
 JAP_greater_japanese_empire_air_corps:0 "Luftkorps des Großjapanischen Kaiserreichs"
 JAP_greater_japanese_empire_air_corps_desc:0 ""
 JAP_jet_prototypes_EXPL1:0 "Wir haben Frieden mit [GER.GetFlag]§H[GER.GetName]§! geschlossen und sie haben den Fokus &#39;§HMilitärer Technologiezusammenarbeit§!&#39; abgeschlossen, daher wird dieser Fokus auch die folgenden §GEffects§! haben:\n"
 JAP_jet_prototypes_EXPL2:0 "Wenn wir mit [GER.GetFlag]§H[GER.GetName]§! Frieden geschlossen haben und sie den Fokus &#39;§HMilitärtechnische Zusammenarbeit§!&#39; abgeschlossen haben, wird dieser Fokus auch die folgenden §GEffects§! haben:\n"
 JAP_strengthen_the_divine_wind_EXPL:0 "Ermöglicht die Produktion von §HYokosuka MXY7 Ohka§! Kamikaze Fighter.\n"
 
 JAP_control_the_interservice_rivalry:0 "Kontrolle der Rivalität zwischen den Diensten"
 JAP_control_the_interservice_rivalry_desc:0 "Die Rivalität zwischen unseren Streitkräften gerät außer Kontrolle. Dieses Problem führt nicht nur zu erheblichen Desinformationsproblemen, sondern behindert auch die Planung künftiger Militäroperationen. Dem müssen wir jetzt ein Ende setzen – selbst auf Kosten der Verärgerung hochrangiger Mitglieder unseres Kommandokorps."
 
 ##### NAVY BRANCH
 JAP_yamato_class_battleship:0 "Schlachtschiff der Yamato-Klasse"
 JAP_yamato_class_battleship_EXPL1:0 "Fügen Sie unserer Produktion §H2§! „Yamato-Klasse“ §HSchwere Schlachtschiffe§! hinzu.\n"
 JAP_yamato_class_battleship_EXPL2:0 "[USA.GetFlag]§H[USA.GetName]§! wird nach einiger Zeit §RBenachrichtigt§! über unsere Baupläne und kann bestimmte §RBoni§! sammeln.\n"
 JAP_yamato_class_battleship_desc:0 ""
 JAP_kitami_class_torpedo_cruisers:0 "Kitami-Klasse\nTorpedokreuzer"
 JAP_kitami_class_torpedo_cruisers_desc:0 ""
 JAP_rengo_kantai_maneuvers:0 "Rengō Kantai Manöver"
 JAP_rengo_kantai_maneuvers_desc:0 ""
 
 ##### NANSHIN-RON DOCTRINE BRANCH
 JAP_nanshin_ron_doctrine:0 "Nanshin-ron\nLehre"
 JAP_nanshin_ron_doctrine_EXPL1:0 "Die Doktrin §HNanshin-ron§! wird von der Fraktion §HTōseiha§! vertreten. Sich auf die Seite der Fraktion §HKōdōha§! zu stellen und dieser Doktrin zu folgen, hätte auch die folgenden §REffects§! zur Folge:\n"
 JAP_nanshin_ron_doctrine_EXPL2:0 "Sie haben sich auf die Seite der §HKōdōha§!-Fraktion gestellt, die die §HHokushin-ron§!-Doktrin vertritt. Daher hat die Auswahl dieser Option vor Abschluss von Hokushin-ron folgende §REffects§!:\n"
 JAP_nanshin_ron_doctrine_desc:0 "Die „Südexpansionsdoktrin“ ist eine militärische und politische Doktrin des japanischen Kaiserreichs, die besagt, dass Südostasien und die Pazifikinseln zur Interessensphäre Japans gehören und dass der potenzielle Wert einer wirtschaftlichen und territorialen Expansion in diesen Gebieten für das japanische Kaiserreich größer ist als anderswo."
 
 JAP_expand_the_hosaku_kenkyu_kai:0 "Erweitern Sie den\nHosaku Kenkyu-kai"
 JAP_expand_the_hosaku_kenkyu_kai_desc:0 "„Hosaku Kenkyu-kai“ (Politik gegenüber der Südsee) ist eine Gruppe, die sich mit der Erforschung militärischer und wirtschaftlicher Expansionsstrategien im Süden befasst und auch mit dem Ministerium für Kolonialangelegenheiten (Takumu-sho) zusammenarbeitet, um die militärische Rolle Taiwans und Mikronesiens als vorgeschobene Stützpunkte für eine weitere Expansion im Süden hervorzuheben."

 JAP_move_to_indochina:0 "Umzug nach Indochina"
 JAP_move_to_indochina_desc:0 ""
 
 JAP_f_kikan:0 "F Kikan"
 JAP_f_kikan_desc:0 "Fujiwara Kikan, benannt nach seinem Anführer Major Fujiwara Iwaichi, ist eine militärische Geheimdienstoperation, die vom IGHQ eingerichtet wird. Ihre Aufgabe wird es sein, Kontakt zur indischen Unabhängigkeitsbewegung, den Auslandschinesen und den malaiischen Sultanen aufzunehmen, um Freundschaft und Zusammenarbeit mit Japan zu fördern."
 
