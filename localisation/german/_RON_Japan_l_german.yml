 JCD_pursuit_the_huge_navy:0 "Verfolge die riesige Marine"
 JCD_pursuit_the_huge_navy_desc:0 "Vor dem Bürgerkrieg verfolgte Japan die Idee, die stärkste Marine der Welt aufzubauen. Obwohl sie zuvor als Machtinstrument diente, wird sie auch dem neuen Japan sicherlich von Nutzen sein, selbst wenn sie nur zur Verteidigung eingesetzt werden sollte."
 JCD_shokaku_class_carrier:0 "Träger der Shokaku-Klasse"
 JCD_shokaku_class_carrier_EXPL:0 "Ermöglicht die Produktion von Trägern der §HShokaku-Klasse§!.\n"
 JCD_shokaku_class_carrier_desc:0 "Der Flugzeugträger der Shokaku-Klasse ist ein revolutionäres Design im Trägerbau. Mit 32.105 Tonnen Wasserverdrängung, 257,5 Metern Länge und einer Geschwindigkeit von 34,5 Knoten gilt er als „der wohl beste Flugzeugträger der Welt“. Mit einer Kapazität von über 80 Flugzeugen wird er den Grundstein der japanischen Trägerstreitkräfte bilden."
 JCD_escort_modernization:0 "Moderne Eskortflotte"
 JCD_escort_modernization_desc:0 ""
 JCD_submarine_warfare:0 "U-Boot-Krieg"
 JCD_submarine_warfare_desc:0 ""
 JCD_battlefleet_expansion:0 "Erweitern Sie die Schlachtflotte"
 JCD_battlefleet_expansion_desc:0 ""
 JCD_dockyard_expansion:0 "Zusätzliche Werftanlagen"
 JCD_dockyard_expansion_desc:0 ""
 JCD_new_naval_doctrines:0 "Neue Taktiken für die Seekriegsführung"
 JCD_new_naval_doctrines_desc:0 ""
 JCD_reform_the_production:0 "Umleitung der ehemaligen Schiffsproduktion"
 JCD_reform_the_production_desc:0 "Riesige Marinen gehören der Vergangenheit an. Im neuen Japan ist es nicht mehr angebracht, enorme Summen für riesige Schiffe auszugeben. Stattdessen muss die Produktion in wertvollere Sektoren der japanischen Wirtschaft umgelenkt werden."
 JCD_decommission_older_ships:0 "Außerdienststellung älterer Schiffe"
 JCD_decommission_older_ships_desc:0 "Mit einer Umleitung der Marineproduktion können wir diese Schritte noch weiter vorantreiben und ältere Kriegsschiffe verschrotten, die für uns keinen Nutzen mehr haben. Schlachtschiffe der Fuso-Klasse und Kreuzer der Furutaka-Klasse müssen als Erstes verschrottet werden."
 
 JCD_Path_of_Democracy:0 "Aoi Nihon wa Azuma o Mamoru"
 JCD_Path_of_Democracy_desc:0 "Schluss mit Militarismus. Schluss mit aggressiver Expansion. Von nun an schützt das blaue Japan den Osten. Wir werden zu einem demokratischen Modellstaat, dem andere asiatische Länder als Beispiel folgen können."
 JCD_true_samurais_serves_the_tenno:0 "Wahre Samurai dienen dem Ten&#39;nō"
 JCD_Coerce_Manchukuo_EXPL4:0 "Erhalte §H4§! Samurai §HGenerals§! von [MAN.GetFlag]§H[MAN.GetName]§! zurück."
 JCD_Coerce_Manchukuo_EXPL3:0 "Erhalte §H3§! Samurai §HGenerals§! von [MAN.GetFlag]§H[MAN.GetName]§! zurück."
 JCD_Coerce_Manchukuo_EXPL2:0 "Erhalte §H2§! Samurai §HGenerals§! von [MAN.GetFlag]§H[MAN.GetName]§! zurück."
 JCD_Coerce_Manchukuo_EXPL1:0 "Erhalte §H1§! Samurai §HGeneral§! von [MAN.GetFlag]§H[MAN.GetName]§! zurück."
 JCD_Coerce_Manchukuo_EXPL5:0 "Für jeden Samurai §HGeneral§!, der an [MAN.GetFlag]§H[MAN.GetName]§! gesendet wird:\n"
 JCD_Coerce_Manchukuo_EXPL6:0 "Setzen Sie die Nationalität auf [JAP.GetFlag]§H[JAP.GetName]§!."
 JCD_true_samurais_serves_the_tenno_desc:0 "Zu Beginn des Bürgerkriegs haben wir alle Militaristen und Offiziere, die das alte Regime sicher unterstützt hätten, verstoßen. Doch nun hat die Demokratie gesiegt, und der Kaiser hat seine Herrschaft unter der neuen Verfassung zurückerlangt, da wir unsere Geschichte und die Rolle des Kaisers darin respektieren. Der nächste Schritt besteht darin, alle in der Mandschurei verbliebenen Loyalisten zurückzurufen, um in Zukunft dem wahren Japan zu dienen."

