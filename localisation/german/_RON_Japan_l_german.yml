 ##### POLITICAL ADVISORS
 JAP_tojo_T:0 "Kamisori"
 hideki_tojo_desc:0 "Hideki Tojo, geboren 1884, ist eine der einflussreichsten, nationalistischsten und fähigsten Persönlichkeiten der japanischen Politik. Er diente im Russisch-Japanischen Krieg und kämpfte während des Mukden-Zwischenfalls in der Kanto-Armee, in der er später als Oberbefehlshaber der Kenpeitai diente. \n\nEr erhielt den Spitznamen „Kamisori“ oder „Rasiermesser“, da er als scharfsinniger, juristischer Verstand galt und schnelle Entscheidungen treffen konnte."
