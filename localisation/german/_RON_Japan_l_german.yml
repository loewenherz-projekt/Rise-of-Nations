 ##### KYUICHI TOKUDA
 JCD_tokuda_T1:0 "Kyosanto Gicho"
 JCD_tokuda_T2:0 "Engagierter Kommunist" 
 JCD_tokuda_T3:0 "Antiimperialist"
 JCD_tokuda_T4:0 "Energischer und entschlossener Anführer"
 umc_leader_kyuichi_tokuda_desc:0 "Kyuichi Tokuda wurde 1894 in Okinawa geboren. Nach seinem Abschluss an der Nihon-Universität im Jahr 1920 wurde er Anwalt. Kurz darauf, im Jahr 1922, trat er der Kommunistischen Partei Japans bei und wurde Mitglied ihres Zentralkomitees.\nIm März 1928 wurde er wegen des Verdachts der Verletzung des Friedenserhaltungsgesetzes verhaftet. Stark in Willen und Glaube lehnte er kommunistische Ideen nie ab..\nNun wurde er zusammen mit seinem kommunistischen Mitstreiter Yoshio Shiga auserwählt, Japan in eine neue Ära zu führen. Eine Ära der Modernisierung, in der alte Gewohnheiten der Geschichte angehören müssen, da im neuen roten Japan kein Platz für solch primitives Denken ist."
 
 ##### TETSU KATAYAMA
 JCD_katayama_T1:0 "Nipponkoku no Shusho"
 JCD_katayama_T2:0 "Antimonopolistischer Reformer"
 JCD_katayama_T3:0 "Pazifist"
 JCD_katayama_T4:0 "Traditionelle Opposition"
 umc_leader_tetsu_katayama_desc:0 "Tetsu Katayama wurde am 28. Juli 1887 in Tanabe, Präfektur Wakayama, geboren. Er besuchte die Kaiserliche Universität Tokio und erwarb einen Bachelor-Abschluss in Rechtswissenschaften. Er wuchs im christlichen Glauben auf und war stark vom christlichen Sozialismus Abe Isoos geprägt. Nach seinem Abschluss eröffnete er eine Kanzlei in einem gemieteten Wohnheim des YMCA und arbeitete als Anwalt.\nKatayama wurde Generalsekretär der Sozialdemokratischen Partei, als diese 1926 gegründet wurde. Später, im Jahr 1932, trat er dem Exekutivkomitee der Sozialistischen Massenpartei bei.\nNachdem er die Militaristen unter Kontrolle hatte, wurde er gewählt, um Japan auf eine neue Pilgerreise mit dem edlen Ziel zu führen, einen modernen demokratischen Staat aufzubauen. Sollte dieses Ziel erreicht werden, muss Japans Priorität darin bestehen, anderen asiatischen Nationen zu helfen, die ständig von kommunistischen Aufständen bedroht oder unter imperialistischer Herrschaft unterdrückt sind."
 
