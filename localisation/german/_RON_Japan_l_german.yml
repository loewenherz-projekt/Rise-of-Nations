 umc_jap.310.t:0 "[JAP.GetName] öffnet sich für Friedensverhandlungen"
 umc_jap.310.d:0 "Wir haben die Japaner vom Festland vertrieben und kurz darauf unsere Stellungen befestigt. Kein einziger Japaner durfte mehr unseren Boden betreten. Obwohl uns Marine und Luftwaffe für einen Angriff auf die japanischen Heimatinseln fehlen, gilt das Halten unserer Stellung als ein totaler Sieg unserer Armee.\n\nDie Sicht der japanischen Bevölkerung auf ihre Lage ist jedoch weniger ... erfreulich. Ihre Uhren ticken. Sie haben uns immer als schwächere Nation betrachtet, und nun kann ihr „überlegenes“ Militär unserem nicht mehr standhalten!\n\nVor diesem Hintergrund wurden wir von den japanischen Botschaftern kontaktiert, um die Friedensbedingungen zu besprechen. Und wir werden sie nicht so einfach davonkommen lassen."
 umc_jap.310.a:0 "Sie müssen das asiatische Festland verlassen und Wiedergutmachung für die achtjährige Besatzung leisten."
