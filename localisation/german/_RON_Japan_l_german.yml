 ### Pacific Guardian ###
 ### Indonesia (INS)
 umc_jcd.200.t:0 "[JAP.GetName] fordert die Kontrolle über [INS.GetName] an"
 umc_jcd.200.d:0 "Im Lichte des jüngsten japanischen Bürgerkriegs kam die neue demokratische Regierung an die Macht. Wo wir zuvor nur eine imperialistische Bedrohung erlebten, finden wir nun eine wahre demokratische Bastion des Ostens. Und während sich die Lage auf den japanischen Heimatinseln stabilisiert, deutete ihre Regierung mit [JAP.GetLeader] an der Spitze den Beginn einer kontroversen Debatte an.\n\nIhre Vorschläge deuten auf das Ende unserer Kolonialherrschaft über [INS.GetName] hin. Ihre Absicht ist es, unsere ehemalige Kolonie in einen unabhängigen Staat mit eigener Regierung zu verwandeln. Sie versicherten uns, dass wir alle dort getätigten Investitionen sowie Eigentumsrechte an den lokalen Ressourcen behalten würden.\n\nDiese Gespräche wurden leider öffentlich und sofort von den lokalen Unabhängigkeitsbewegungen ausgenutzt. Mit starken Worten wie „Asien für die Asiaten“ und „Akhir Penindasan Kolonial“, was wörtlich „Beendigung der kolonialen Unterdrückung“ bedeutet, würden diese Bewegungen sicherlich zusätzlichen Ärger verursachen, sollten wir dieses Angebot ablehnen."
 umc_jcd.200.a:0 "Eine Sorge weniger."
 umc_jcd.200.b:0 "Wir werden unser Kolonialreich niemals aufgeben!"
 
 umc_jcd.201.t:0 "[HOL.GetName] gib die Kontrolle über [INS.GetName] ab!"
 umc_jcd.201.d:0 "Nach langen Gesprächen und Verhandlungen hat [HOL.GetLeader] schließlich zugestimmt, uns die Bürde des Schutzes von [INS.GetName] zu übertragen. Obwohl ein großer Teil der lokalen Wirtschaft noch immer von ihrem ehemaligen Oberherrn kontrolliert wird, haben wir nun das Schlüsselwort in der Politik von [INS.GetName]. \n\nUnd mit dieser Macht können wir langsam damit beginnen, den europäischen Einfluss weiter einzuschränken – denn in Asien müssen die Asiaten in der Lage sein, ihre Angelegenheiten selbst zu regeln."
 umc_jcd.201.a:0 "Bei uns sind sie sicherer."
 
 umc_jcd.203.t:0 "[JAP.GetName] verringert unseren Einfluss in [INS.GetName]"
 umc_jcd.203.d:0 "Durch die schnellen Investitionen Japans in die Infrastruktur, Ressourcen und Industrie in [INS.GetName] hat das Land in letzter Zeit eine beherrschende Stellung in der lokalen Wirtschaft erlangt.\n\nAuch wenn unser Wort dort immer noch Gewicht hat, können wir davon ausgehen, dass [JAP.GetLeader] so viele Ressourcen wie möglich aufwenden wird, um unseren lokalen Einfluss weiter zu schwächen."
 umc_jcd.203.a:0 "Wir können nichts dagegen tun."
 
