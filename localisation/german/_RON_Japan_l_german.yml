 umc_jap.161.d:0 "Angesichts unserer führenden Position in Asien hat [INS.GetLeader] zugestimmt, unserer Fraktion beizutreten.\n\nDies sicherte uns den Zugang zu ihrer riesigen Öl- und Gummiproduktion und verschaffte uns einen potentiellen starken verbündeten Staat in Asien, wenn wir bereit sind, in die Entwicklung ihrer Industrie, Infrastruktur und ihrer Streitkräfte zu investieren."
 umc_jap.161.a:0 "Asiaten sind bei uns sicherer."
 
 umc_jap.162.t:0 "[INS.GetName] lehnt unsere Einladung ab"
 umc_jap.162.d:0 ""
 umc_jap.162.a:0 "Wenn sie meinen, dass sie es alleine schaffen."
 umc_jap.162.b:0 "Eine schlechte Wahl."
 
 ### SUPPORT ANTI-BRITISH RESISTANCE
 umc_jap.170.t:0 "[JAP.GetName] unterstützt unseren Kampf gegen die britischen Kolonialisten"
 umc_jap.170.d:0 ""
 umc_jap.170.a:0 "Eine willkommene Hilfe."
 
 ### FORCE THEM TO SURRENDER
 umc_jap.180.t:0 "Eine Zehn fordert Frieden"
 umc_jap.180.d:0 "Da der Krieg im Pazifik nicht zu unseren Gunsten ausgeht, haben die Japaner uns mit der Bitte um eine mögliche Lösung unseres bewaffneten Konflikts kontaktiert.\n\nSie nennen es edelmütig den „Frieden der zehn Forderungen“. Doch daran ist nichts Edles. Es ist demütigend und verabscheuungswürdig. Die Japaner verlangen, dass ihnen jede einzelne Pazifikinsel zufällt und wir versprechen, ihre Expansion in Asien nicht zu behindern. Außerdem sollen unsere Handelsembargos aufgehoben und unsere Rohstoffe zu niedrigeren Preisen an Japan geliefert werden.\n\nAber wie gut läuft dieser Krieg für uns, dass wir uns den Luxus leisten können, dieses Angebot abzulehnen? Einige Kongressabgeordnete argumentieren, dieser Krieg habe uns bereits zu viel gekostet – und wir sollten uns lieber nur auf den amerikanischen Kontinent konzentrieren."
 umc_jap.180.a:0 "Vielleicht ist es für Amerika an der Zeit, sich erneut zu isolieren."
 umc_jap.180.b:0 "Wir müssen Pearl Harbor bewahren und rächen."
 
 umc_jap.181.t:0 "[USA.GetName] akzeptiert die zehn Forderungen des Friedens"
 umc_jap.181.d:0 "Unsere Armee landet auf den ehemaligen amerikanischen Pazifikinseln. Unsere Marine ist überlegen – selbst den besten amerikanischen Schiffen nicht ebenbürtig. Unsere Luftwaffe bedroht sogar die amerikanische Küste. Den USA blieb keine andere Wahl, als die Zehn Forderungen des Friedens zu akzeptieren.\n\nDamit sicherten wir uns unsere führende Position im Pazifik, da wir nun die Mehrheit der Inseln kontrollieren. Wir stellten außerdem sicher, dass unsere zukünftigen Expansionen in Asien nicht auf amerikanische Gegenreaktionen stoßen.\n\nEin wahrer Sieg für das japanische Kaiserreich und ein klares Zeichen unserer Überlegenheit!"
 umc_jap.181.a:0 "Tora, Tora, Tora!"
 
 umc_jap.182.t:0 "[USA.GetName] lehnt die zehn Forderungen des Friedens ab"
 umc_jap.182.d:0 ""
 umc_jap.182.a:0 "Dann müssen wir den Kampf fortsetzen."
 
 ### SIA - ANTI WESTERN COOPERATION
 umc_jap.190.t:0 "Antiwestliche Zusammenarbeit mit Japan"
 umc_jap.190.d:0 ""
 umc_jap.190.a:0 "Asien den Asiaten!"
 umc_jap.190.b:0 "Ohne sie geht es uns besser."
 
 umc_jap.191.t:0 "[SIA.GetName] akzeptiert antiwestliche Zusammenarbeit"
 umc_jap.191.d:0 "Der Generalrat mit seinem Anführer [SIA.GetLeader] hat sich bereit erklärt, unserer Fraktion als Gegengewicht zum westlichen Imperialismus in Asien beizutreten. Dies sichert uns einen hilfreichen Verbündeten im südlichen Teil des Kontinents und stellt eine direkte Bedrohung für die britisch-indische Grenze dar.\n\nDamit die Armee kampfbereit ist, muss sie jedoch mit japanischer Ausrüstung ausgestattet und von japanischen Offizieren zurückgehalten werden. Glücklicherweise sollten die uns nun zur Verfügung stehenden Ressourcen mehr als ausreichen, um dies zu bezahlen."
 umc_jap.191.a:0 "Gemeinsam sind wir stärker."
 
 umc_jap.192.t:0 "[SIA.GetName] lehnt antiwestliche Zusammenarbeit ab"
 umc_jap.192.d:0 ""
 umc_jap.192.a:0 "Feiglinge."
 umc_jap.192.b:0 "Dann werden wir sie zwingen."
 
 ### PATH TO NISHINIHON - EVENTS
 umc_jap.200.t:0 "Persönlichkeit des öffentlichen Lebens lehnt Integration der Mandschurei ab"
 umc_jap.200.d:0 "Während des Integrationsprogramms Mandschukuos wagte es der lokale Geheimdienst, sich öffentlich dagegen auszusprechen. Und damit nicht genug. Einer von ihnen behauptete, Mandschukuo sei lediglich ein Werkzeug Japans, um mehr natürliche Ressourcen und Lebensraum zu gewinnen, und die lokale Bevölkerung werde von der Kanto-Armee kaum unterdrückt. Er zählte zahlreiche japanische Staatsmänner auf, die diese Unterdrückung bereitwillig unterstützten und sogar organisierten.\n\nObwohl er schnell verhaftet und zum Schweigen gebracht wurde, hörten einige Leute seine Worte – und sie werden sie mit Sicherheit wie ein Gift verbreiten, um unseren lokalen Bemühungen zu schaden."
 umc_jap.200.a:0 "Er wird nicht mehr die Gelegenheit haben, das Wort zu ergreifen."
 
 umc_jap.201.t:0 "Angriff des kommunistischen Widerstands in der Mandschurei"
 umc_jap.201.d:0 "Gestern wurden unsere Truppen in der Mandschurei von kommunistischen Guerillas angegriffen. Obwohl der Kampf etwa eine Stunde dauerte und unseren Truppen vor Ort kein nennenswerter Schaden zugefügt wurde, zeigte er, dass wir die gesamte Mandschurei noch nicht vollständig kontrollieren können. Dies gilt insbesondere für die weniger entwickelten Gebiete. Zusätzliche Mittel müssen bereitgestellt werden, um diese Hindernisse schnell zu überwinden und unsere Kontrolle über die lokalen Gebiete zu festigen."
 umc_jap.201.a:0 "Verdammte Kommunisten."
 
 umc_jap.202.t:0 "Antijapanischer Angriff in der Mandschurei"
 umc_jap.202.d:0 "Gestern wurden unsere lokalen Truppen in der Mandschurei von den lokalen antijapanischen Widerstandstruppen angegriffen. Obwohl der Kampf etwa eine Stunde dauerte und unseren lokalen Truppen kein nennenswerter Schaden zugefügt wurde, zeigte er, dass wir noch immer nicht in der Lage sind, die gesamte Mandschurei vollständig zu kontrollieren. Darüber hinaus müssen wir die Loyalität ehemaliger Fengtian-Truppen, die jetzt in der mandschurischen Armee dienen, in Frage stellen, da sie immer noch der Oppositionsseite zugeneigt sein können.\n\nZusätzliche Mittel müssen bereitgestellt werden, um diese Hindernisse schnell zu überwinden und unsere Kontrolle über die lokalen Gebiete zu festigen."
 umc_jap.202.a:0 "Glauben sie, dass die Fenglian-Clique sie besser behandelt hat?"
 
 umc_jap.203.t:0 "Sabotage japanischer Vermögenswerte in der Mandschurei"
 umc_jap.203.d:0 "Der ruhige Abend in der Mandschurei wurde durch eine gewaltige Explosion gestört. Wie sich bald herausstellte, hatte der örtliche Widerstand im örtlichen Industriekomplex Kanto selbstgebaute Bomben gezündet.\n\nEin beschämendes Beispiel für das Versagen der örtlichen Sicherheitskräfte. Schlimmer noch: Wir müssen nun erhebliche Ressourcen aufwenden, um die Fabrik wieder betriebsbereit zu machen."
 umc_jap.203.a:0 "Finde sie, fang sie, häng sie."
 
 umc_jap.204.t:0 "Mandschus protestiert gegen Opiumhandel"
 umc_jap.204.d:0 "Japanische Gendarmen betreiben illegale Bordelle, Opiumhöhlen, Spielhöllen und Drogengeschäfte und konkurrieren mit dem staatlichen Opiummonopol. Viele pflichtbewusste japanische Offiziere protestierten bereits gegen die Zustände, doch Tokio ignorierte sie und brachte sie zum Schweigen.\n\nJetzt, da die Situation schlimmer denn je ist, protestiert die Bevölkerung der Mandschurei: Wenn sie integraler Bestandteil des japanischen Kaiserreichs werden will, müssen diese Drogenmonopole gestoppt und die Verantwortlichen verfolgt werden."
 umc_jap.204.a:0 "Wir müssen kleine Zugeständnisse machen."
 umc_jap.204.b:0 "Alles bleibt genau dort, wo es ist."
 
 umc_jap.205.t:0 "Die lokale mandschurische Bevölkerung assimiliert sich mit den Japanern"
 umc_jap.205.d:0 "Angesichts der Verbesserung der Lebenssituation seit dem Start des Projekts Nishinihon zeigt die lokale Bevölkerung in der Mandschurei eine freundlichere Haltung gegenüber unseren Soldaten und Bürgern. Ein wahrhaft leuchtendes Beispiel für unsere gemeinsame Zukunft."
 umc_jap.205.a:0 "Gute nachbarschaftliche Beziehungen sind unerlässlich."
 
 umc_jap.206.t:0 "Steigender Lebensstandard zieht Einheimische in die Mandschurei"
 umc_jap.206.d:0 "Angesichts der verbesserten Lebenssituation nach dem Start des Nishinihon-Projekts begann die lokale Bevölkerung in der Mandschurei, ihre Unternehmen weiterzuentwickeln. Dies verbessert die lokale Industrielage und zeigt, wie vorteilhaft ein wenig mehr Freiheit sein kann."
 umc_jap.206.a:0 "Wir bringen ihnen die Zivilisation."
 
 umc_jap.207.t:0 "Antijapanische Widerstandsbasis in der Mandschurei entdeckt"
 umc_jap.207.d:0 "Die Bevölkerung der Mandschurei – verärgert und verängstigt durch die kommunistischen Sabotagen in der Region – kontaktierte kürzlich den örtlichen Kenpeitai mit äußerst nützlichen Informationen. Er gab den Standort einer kommunistischen Basis sowie die Namen der Beteiligten bekannt. Auf Befehl von Premierminister Zhang Jinghui wurde umgehend gehandelt und die kommunistische Präsenz in der Region endgültig zerstört. Dies ist ein leuchtendes Beispiel für die sinnvolle Zusammenarbeit zwischen Mandschuren und Japanern. Ein Beispiel für eine gemeinsame Zukunft."
 umc_jap.207.a:0 "Gute Beziehungen zu den Einheimischen zahlen sich letztendlich aus."
 
 umc_jap.208.t:0 "Gründung einer lokalen mandschurischen antikommunistischen Miliz"
 umc_jap.208.d:0 "Da die Einheimischen die kommunistischen Guerillas als größte Bedrohung ansehen, beginnen sie mit der japanischen Kwantung-Armee zusammenzuarbeiten, um diesen Verfall zu bekämpfen. Überall im Land bilden sich mandschurische Milizen, die bereit sind, ihr Heimatland um jeden Preis zu verteidigen."
 umc_jap.208.a:0 "Wir haben ein gemeinsames Ziel."
 JAP_ptn_anti_com_militia_EXPL:0 "Gewinnen Sie §H2§! Milizdivisionen in der Mandschurei.\n"
 
 umc_jap.209.t:0 "Weitere japanische Siedler kamen nach Mandschukuo"
 umc_jap.209.d:0 "Unsere Regierung plant offiziell die Auswanderung von fünf Millionen Japanern nach Mandschukuo zwischen 1936 und 1956. Und dieser Plan wurde in die Tat umgesetzt. Ganze Familien wanderten auf das Festland aus. Laut der Volkszählung von 1936 waren 22 % der japanischen Bevölkerung Mandschukos Beamte und ihre Familien; 18 % arbeiteten für die Südmandschurische Eisenbahngesellschaft; 25 % waren nach Mandschukuo gekommen, um ein Unternehmen zu gründen, und 21 % waren gekommen, um in der Industrie zu arbeiten.\n\nMit seinen glänzenden, modernistischen Bürogebäuden, hochmodernen Verkehrsnetzen wie der berühmten Eisenbahnlinie Asia Express und der modernen Infrastruktur, die überall in Mandschukuo entsteht, ist Japans jüngste Kolonie außerdem ein beliebtes Touristenziel für die japanische Mittelschicht, die das „Schöne neue Reich“ sehen wollte, das auf dem asiatischen Festland entstand."
 umc_jap.209.a:0 "Mehr Japanisch, mehr Stabilität."

 ### MARCO-POLO BRIDGE INCIDENTS - DECISION EVENTS#
 umc_jap.210.t:0 "Sieg an der Marco-Polo-Brücke"
 umc_jap.210.d:0 "Beim Zusammenstoß zwischen unserer kaiserlichen Armee und der nationalistischen chinesischen Armee im Gebiet um die Marco-Polo-Brücke errangen unsere Streitkräfte einen klaren Sieg über die Streitkräfte von [CHI.GetLeader]. Die [CHI.GetAdjective]-Streitkräfte haben sich zurückgezogen, um sich neu zu formieren, und unsere Streitkräfte haben die Kontrolle über [887.GetName] und [608.GetName] übernommen.\n\nDieser Sieg stärkt unsere Moral enorm und wird die Chinesen sicherlich daran erinnern, wer der Anführer Asiens ist."
 umc_jap.210.a:0 "Ein weiterer Teil Chinas fiel in japanische Hände."
 
 umc_jap.211.t:0 "Patt an der Marco-Polo-Brücke"
 umc_jap.211.d:0 ""
 umc_jap.211.a:0 "Das wird die Fähigkeiten unserer Truppen in Frage stellen."
 
 umc_jap.212.t:0 "Niederlage an der Marco-Polo-Brücke"
 umc_jap.212.d:0 "Unsere Truppen, die in der Nähe der Marco-Polo-Brücke kämpften, wurden kürzlich sogar hinter die Grenzen von Hebei zurückgedrängt. Dort wurden sie schließlich neu organisiert und wieder dem Kommando eines höheren Offiziers unterstellt.\n\nEs wurden umgehend Ermittlungen eingeleitet, um die Verantwortlichen für dieses enorme militärische Versagen zu identifizieren."
 umc_jap.212.a:0 "Eine beschämende Zurschaustellung."
 umc_jap.212.b:0 "Dieses ultimative Versagen der Kommandeure muss bestraft werden."
 
 umc_jap.215.t:0 "Sieg an der Marco-Polo-Brücke"
 umc_jap.215.d:0 ""
 umc_jap.215.a:0 "Das sollte ihnen eine Lehre sein."
 
 umc_jap.216.t:0 "Patt an der Marco-Polo-Brücke"
 umc_jap.216.d:0 ""
 umc_jap.216.a:0 "Wir haben unseren Platz verteidigt."
 
 umc_jap.217.t:0 "Niederlage an der Marco-Polo-Brücke"
 umc_jap.217.d:0 "Truppen unter dem Kommando der Generäle der Kaiserlich Japanischen Armee gelang es, uns aus dem umstrittenen Gebiet um die Marco-Polo-Brücke zu vertreiben. Leider wurden unsere Truppen völlig geschwächt und mussten den Rückzug antreten.\n\nDa unsere Grenzen ohne Verteidigung blieben, konnten die IJA-Truppen nicht nur [887.GetName], sondern das gesamte [608.GetName]-Gebiet problemlos besetzen. Dies diente als abschreckendes Beispiel und verdeutlichte die Inkompetenz unserer Armee und Generäle sowie den Willen des Kaiserreichs Japan, weitere Feindseligkeiten gegen unser Land zu führen."
 umc_jap.217.a:0 "Stück für Stück zerstören sie uns."
 umc_jap.217.b:0 "Mobilisieren Sie alle Kräfte und erobern Sie Peking zurück!"
 
 umc_jap.218.t:0 "China mobilisiert"
 umc_jap.218.d:0 "Es ist uns gelungen, die nationalistische Armee aus dem umstrittenen Gebiet um die Marco-Polo-Brücke zu vertreiben. Als Reaktion darauf hat [CHI.GetLeader] seine Truppen mobilisiert, um Peking zurückzuerobern und uns aus China und sogar der Mandschurei zu vertreiben.\n\nEs besteht kein Zweifel, dass die chinesische Armee auf diesen Konflikt nicht vorbereitet ist und unsere Truppen ihre Stellung problemlos halten werden. Und auf Kai-Sheks Befehl wird nun die Kuomintang für ihre aggressiven Aktionen verantwortlich gemacht, die die Lage in Asien destabilisieren. Am Ende könnten wir sogar die vollständige Kontrolle über ganz China übernehmen."
 umc_jap.218.a:0 "Eine Niederlage ist ihnen nicht genug?"
 
 ### FIND A COMMON WAY OUT
 umc_jap.220.t:0 "Mögliches Ende des chinesisch-japanischen Konflikts"
 umc_jap.220.d:0 "Der Krieg in China laugt uns langsam aber sicher aus. Unsere militärischen und industriellen Reserven gehen zur Neige, und der Kaiser ist mit der derzeit unentschiedenen Lage unzufrieden.\n\nDaher wurde auf der Kaiserlichen Konferenz beschlossen, eine Lösung zu finden, um diesen Krieg ohne unnötige Verlängerung zu beenden. Da wir in China fest verankert sind, werden wir [CHI.GetLeader] kontaktieren und unsere Forderungen durchsetzen. Schließlich werden unsere Truppen bald anderswo gebraucht."
 umc_jap.220.a:0 "Stellen Sie nur moderate Forderungen, die schwer abzulehnen sind."
 umc_jap.220.b:0 "Wir werden daraus so viel herausholen, wie wir verdienen."
 umc_jap.220.c:0 "Sie müssen für ihren Widerstand gegen uns angemessen bestraft werden."
 
 umc_jap.221.t:0 "Mögliches Ende des chinesisch-japanischen Konflikts"
 umc_jap.221.d:0 ""
 umc_jap.221.a:0 "Wir müssen uns unterwerfen, um China zu erhalten."
 umc_jap.221.b:0 "Wir werden durchhalten und diesen Kampf zu einem siegreichen Ende führen!"
 
 umc_jap.222.t:0 "[CHI.GetLeader] Akzeptiert das Ende des chinesisch-japanischen Konflikts"
 umc_jap.222.d:0 "Nach langwierigen Verhandlungen gab [CHI.GetLeader] schließlich nach und akzeptierte unsere Forderungen bezüglich der umstrittenen Gebiete des nun besetzten Chinas. Dies markiert das Ende des chinesisch-japanischen Konflikts und verschafft uns die unangefochtene Position der führenden asiatischen Nation.\n\nSobald sich die Nachricht von der Kapitulation der Nationalisten verbreitete, traten sofort neue Probleme auf. Alle Kriegsherren verließen die Vereinigte Front und schlossen sich der Opposition an. Schlimmer noch: Die Kommunisten haben in den letzten Tagen enormen Zuspruch erhalten und werden bald bereit sein, unsere Herrschaft in unseren neu eroberten Gebieten herauszufordern."
 umc_jap.222.a:0 "Sieg. Aber was werden die Konsequenzen sein?"
 
 umc_jap.223.t:0 "Mögliches Ende des chinesisch-japanischen Konflikts"
 umc_jap.223.d:0 ""
 umc_jap.223.a:0 "Wir müssen uns unterwerfen, um China zu erhalten."
 umc_jap.223.b:0 "Wir werden durchhalten und diesen Kampf zu einem siegreichen Ende führen!"
 
 umc_jap.224.t:0 "[CHI.GetLeader] Akzeptiert das Ende des chinesisch-japanischen Konflikts"
 umc_jap.224.d:0 "Nach langwierigen Verhandlungen gab [CHI.GetLeader] schließlich nach und akzeptierte unsere Forderungen bezüglich der umstrittenen Gebiete des nun besetzten Chinas. Dies markiert das Ende des chinesisch-japanischen Konflikts und verschafft uns die unangefochtene Position der führenden asiatischen Nation.\n\nSobald sich die Nachricht von der Kapitulation der Nationalisten verbreitete, traten sofort neue Probleme auf. Alle Kriegsherren verließen die Vereinigte Front und schlossen sich der Opposition an. Schlimmer noch: Die Kommunisten haben in den letzten Tagen enormen Zuspruch erhalten und werden bald bereit sein, unsere Herrschaft in unseren neu eroberten Gebieten herauszufordern."
 umc_jap.224.a:0 "Sieg. Aber was werden die Konsequenzen sein?"
 
 umc_jap.225.t:0 "Mögliches Ende des chinesisch-japanischen Konflikts"
 umc_jap.225.d:0 ""
 umc_jap.225.a:0 "Wir müssen uns unterwerfen, um China zu erhalten."
 umc_jap.225.b:0 "Wir werden durchhalten und diesen Kampf zu einem siegreichen Ende führen!"
 
 umc_jap.226.t:0 "[CHI.GetLeader] Akzeptiert das Ende des chinesisch-japanischen Konflikts"
 umc_jap.226.d:0 "Nach langwierigen Verhandlungen gab [CHI.GetLeader] schließlich nach und akzeptierte unsere Forderungen bezüglich der umstrittenen Gebiete des nun besetzten Chinas. Dies markiert das Ende des chinesisch-japanischen Konflikts und verschafft uns die unangefochtene Position der führenden asiatischen Nation.\n\nSobald sich die Nachricht von der Kapitulation der Nationalisten verbreitete, traten sofort neue Probleme auf. Alle Kriegsherren verließen die Vereinigte Front und schlossen sich der Opposition an. Schlimmer noch: Die Kommunisten haben in den letzten Tagen enormen Zuspruch erhalten und werden bald bereit sein, unsere Herrschaft in unseren neu eroberten Gebieten herauszufordern."
 umc_jap.226.a:0 "Sieg. Aber was werden die Konsequenzen sein?"
 
 umc_jap.227.t:0 "[CHI.GetLeader] lehnt Friedensvorschläge ab"
 umc_jap.227.d:0 "Nach langwierigen Verhandlungen blieb [CHI.GetLeader] standhaft und lehnte unsere Forderungen nach der vollständigen Linie ab. Daher besteht keine Hoffnung mehr, den chinesisch-japanischen Konflikt zu beenden, und unser Krieg geht weiter.\n\nUnsere Truppen haben keine andere Wahl, als den Feind zu besiegen und unser Heimatland vor der Bedrohung aus Asien zu schützen."
 umc_jap.227.a:0 "Unsere Soldaten werden am Ende die Oberhand behalten."
 
 ### ESTABLISH CLOSER ECONOMIC COOPERATION
 umc_jap.230.t:0 "[JAP.GetName] schlägt engere wirtschaftliche Zusammenarbeit vor"
 umc_jap.230.d:0 ""
 umc_jap.230.a:0 "Es wird für uns einen großen Nutzen haben."
 umc_jap.230.b:0 "Wir werden keinen Oberherrn gegen einen anderen eintauschen."
 
 umc_jap.231.t:0 "[FROM.GetName] akzeptiert wirtschaftliche Zusammenarbeit"
 umc_jap.231.d:0 ""
 umc_jap.231.a:0 "Zwei asiatische Tiger arbeiten als Einheit."
 
 umc_jap.232.t:0 "[FROM.GetName] lehnt wirtschaftliche Zusammenarbeit ab"
 umc_jap.232.d:0 ""
 umc_jap.232.a:0 "Und das alles umsonst?"
 
 ### EXPLOIT FOREIGN TRAINING OF IJA GENERALS
 umc_jap.240.t:0 "Nutzung ausländischer Ausbildungsmaßnahmen für IJA-Mitarbeiter"
 umc_jap.240.d:0 "Viele Kommandeure der Dai-Nippon Teikoku Rikugun wurden als Attachés in westliche Länder entsandt, vor allem während des Ersten Weltkrieges und danach. Sie studierten dort militärische Taktiken und Ausrüstung – und sammelten nützliche Informationen, die ihnen zu Hause von großem Nutzen sind."
 umc_jap.240.a:0 "Kanji Ishiwaras Erfahrungen aus seiner Mission in Deutschland werden dabei von Nutzen sein."
 umc_jap.240.b:0 "Masaharu Hommas Kenntnisse über den britischen Generalstab werden uns helfen, vorbereitet zu sein."
 umc_jap.240.c:0 "Von größtem Nutzen für uns werden Korechika Anamis Kenntnisse der französischen Kriegsdoktrin sein."
 umc_jap.240.e:0 "Kenji Doiharas Kenntnisse über die chinesische Kriegsführung werden uns in zukünftigen Konflikten helfen."
 
 ### USE THE ANTI-SOVIETS
 umc_jap.250.t:0 "[JAP.GetName] stärkt die russische faschistische Partei"
 umc_jap.250.d:0 ""
 umc_jap.250.a:0 "Wir müssen sie isolieren."
 umc_jap.250.b:0 "Keine große Sache."
 
 ### GENRIKH SECRET DOCUMENTS
 umc_jap.255.t:0 "Genrikh Lyushkov Übertritt in die Mandschurei"
 umc_jap.255.d:0 "Genrich Samoilowitsch Ljuschkow ist ein sowjetischer Offizier und NKWD-Mitglied. Während der Großen Säuberungen in der Sowjetunion desertierte er mit seiner Familie und versteckte sich in der Mandschurei. Obwohl seine Frau und Tochter gefangen genommen und getötet wurden, gelang ihm die Überquerung der Grenze nach Mandschukuo.\n\nEr führt wertvolle Geheimdokumente über die sowjetische Militärstärke im Fernen Osten mit sich. Er ist der ranghöchste übergelaufene Geheimdienstler und verfügt aufgrund seiner eigenen Beteiligung an der Durchführung der Säuberungen über das größte Insiderwissen über diese Operationen innerhalb der Roten Armee.\n\nSeine Aufnahme würde zweifellos unsere Aufklärungsarbeit in der Region verbessern und unsere Truppen auf die Begegnung mit den sowjetischen Streitkräften vorbereiten. Wie die Sowjets reagieren würden, wenn sie davon erfahren würden, ist jedoch unklar."
 umc_jap.255.a:0 "Er wird hier von großem Nutzen sein."
 JAP_selecting_this_will_unclock_glfei_EXPL:0 "Durch Auswahl dieser Option wird der Fokus von „§HGenrikh Lyushkovs Fernost-Informationen§!“ §MUngesperrt§!.\n"
 umc_jap.255.b:0 "Er kann sich hier niederlassen, wenn er möchte, aber er wird sich nicht in die Angelegenheiten des Staates einmischen."
 umc_jap.255.c:0 "Kein Deal, schick ihn zurück."
 
 umc_jap.256.t:0 "Genrikh Lyushkov Übertritt in die Mandschurei"
 umc_jap.256.d:0 ""
 umc_jap.256.a:0 "Stärkt die Große Säuberung wirklich unsere Nation?"
 
 umc_jap.257.t:0 "[JAP.GetName] Gibt Genrikh Lyushkov zurück"
 umc_jap.257.d:0 ""
 umc_jap.257.a:0 "Er wird gerichtet und bestraft."
 
 ### EXPAND ZAIBATSUS INFLUENCE IN CHINA
 umc_jap.260.t:0 "Zunehmender Einfluss von Zaibatsus"
 umc_jap.260.d:0 ""
 umc_jap.260.a:0 "Wenn die Japaner hier investieren wollen, sicher."
 umc_jap.260.b:0 "Sie können hier von großem Nutzen sein."
 
 ### BUILD UPON A TANGGU TRUCE
 umc_jap.265.t:0 "Erinnerung an den Waffenstillstand der Tanggu"
 umc_jap.265.d:0 "Der Waffenstillstand von Tanggu war ein Waffenstillstand, der am 31. Mai 1933 im Bezirk Tanggu in Tianjin zwischen der Republik China und dem Kaiserreich Japan unterzeichnet wurde. Er beendete formell die japanische Invasion in der Mandschurei, die zwei Jahre zuvor begonnen hatte. Er führte zur faktischen Anerkennung Mandschukuos durch die Kuomintang-Regierung und zur Anerkennung des Verlusts von Rehe. Leider steht die chinesische Öffentlichkeit diesen für Japan so günstigen und für China so demütigenden Bedingungen ablehnend gegenüber."
 umc_jap.265.a:0 "Wir werden dorthin zurückkehren."
 umc_jap.265.b:0 "Die Schuld tragen größtenteils die Kommunisten."
 
 umc_jap.266.t:0 "Schuld am Waffenstillstand in Tanggu"
 umc_jap.266.d:0 "Der Waffenstillstand von Tanggu war ein Waffenstillstand, der am 31. Mai 1933 im Bezirk Tanggu in Tianjin zwischen der Republik China und dem Kaiserreich Japan unterzeichnet wurde. Er beendete formell die japanische Invasion in der Mandschurei, die zwei Jahre zuvor begonnen hatte. Er führte zur faktischen Anerkennung Mandschukuos durch die Kuomintang-Regierung und zur Anerkennung des Verlusts von Rehe. Leider steht die chinesische Öffentlichkeit diesen für Japan so günstigen und für China so demütigenden Bedingungen ablehnend gegenüber. Nun scheint es, als hätten die Japaner eine breite Propagandakampagne gestartet, um die Chinesen an die Schwäche ihrer Regierung zu erinnern – und die Kuomintang reagierte und versucht, uns die Schuld zuzuschieben."
 umc_jap.266.a:0 "Die Kuomintang gibt uns die Schuld, aber die Menschen werden die Lügen irgendwann durchschauen."
 
 ### GET RID OF CHIAN KAI-SHEK 
 umc_jap.270.t:0 "Japanisches Attentat auf Chiang Kai-Shek"
 umc_jap.270.d:0 "Kürzlich unterbreiteten uns die Generäle der Kaiserlich Japanischen Armee ein exklusives Angebot. Sie behaupten, freundschaftliche Beziehungen zu uns seien im besten Interesse von [JAP.GetName]. Doch Chiang Kai-Shek und sein eiserner Wille sind bekanntlich gegen diese Freundschaft. Daher besteht die einzige Möglichkeit für China und Japan, ein gemeinsames Ziel zu erreichen, darin, ihn loszuwerden.\n\nEinige Aspekte unserer Führung unterstützen diese Idee bereits – vielleicht sollten wir sie also zumindest in Erwägung ziehen."
 umc_jap.270.a:0 "Um dieses Problem hier und im Ausland zu lösen, müssen wir den Generalissimus loswerden."
 umc_jap.270.b:0 "Generalissimus ist die größte Hoffnung für ein starkes China."
 
 umc_jap.271.t:0 "China beseitigt Chiang Kai-Shek"
 umc_jap.271.d:0 "Die Kuomintang-Funktionäre erklärten sich bereit, Wang Jingwei zu unterstützen und die Ermordung Chiang Kai-sheks zu arrangieren.\n\nNach einem kurzen Feuergefecht zwischen chinesischen Soldaten und Chiangs persönlicher Garde weigerte er sich, sich zu ergeben und starb bei den Scharmützeln. Die NRA sicherte Wang daraufhin die nötige politische Macht, um der nächste Präsident Chinas zu werden.\n\nDies eröffnet Möglichkeiten für eine Verbesserung der chinesisch-japanischen Beziehungen, da der neue Präsident in der Außenpolitik deutlich flexibler ist. Er stimmt auch zu, dass der westliche Imperialismus für China eine viel größere Bedrohung darstellt als für uns."
 umc_jap.271.a:0 "Alles läuft nach Plan."
 
 umc_jap.272.t:0 "China steht hinter Chiang Kai-Shek"
 umc_jap.272.d:0 ""
 umc_jap.272.a:0 "Unsere Regierung hat daran nichts zu tun und wir werden alle Verantwortlichen bestrafen."
 umc_jap.272.b:0 "Sie wählen dann den feindlichen Weg."
 
