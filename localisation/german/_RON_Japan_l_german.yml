 JAP_militarists_I10:0 "Unkontrollierte Militaristen"
 JAP_militarists_I10_desc:0 "1878 gründete die Kaiserlich Japanische Armee den Generalstab der Kaiserlich Japanischen Armee nach dem Vorbild des preußischen Generalstabs. Dieser ist unabhängig vom japanischen Kriegsministerium und ihm in seinen Befugnissen gleichgestellt oder sogar übergeordnet. Die Kaiserlich Japanische Marine folgte bald darauf mit dem Generalstab der Kaiserlich Japanischen Marine. Diese Generalstäbe sind für die Planung und Durchführung militärischer Operationen verantwortlich und berichten direkt an den Kaiser. Da die Generalstabschefs keine Kabinettsminister sind, berichten sie nicht an den japanischen Premierminister und sind somit völlig unabhängig von jeglicher ziviler Aufsicht oder Kontrolle.\n\nSollte ihr Einfluss unkontrolliert bleiben, könnte dies in Kriegszeiten zu ernsthaften Problemen führen. Wir können unsere Streitkräfte einfach nicht von der Leine lassen.\n§W---------------§!\nDieser Nationalgeist ist ausgeglichen (§R10§!)."
