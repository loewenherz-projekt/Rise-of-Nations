 JCD_Special_Forces_Group:0 "Bilden Sie die Special Forces Group"
 JCD_Special_Forces_Group_desc:0 "Die japanischen Spezialeinheiten, die „Tokushusakusengun“ oder „Delta Force“, werden die Eliteeinheiten unserer neu organisierten Armee sein. Marineinfanteristen, Bergsteiger und Fallschirmjäger – auf höchstem Niveau ausgebildet – werden in der Lage sein, die schwierigsten Operationen mit Leichtigkeit durchzuführen."
 JCD_Training_Camps:0 "Trainingslager"
 JCD_Training_Camps_desc:0 "Um unsere Armeeausbildungsprogramme zu erweitern, müssen wir auf den Heimatinseln spezielle Armeelager errichten."
 JCD_Improve_Infrantry_Guns:0 "Modernisierung der Infanteriewaffen"
 JCD_Improve_Infrantry_Guns_desc:0 ""
 JCD_Improve_Artillery:0 "Artillerie-Innovation"
 JCD_Improve_Artillery_desc:0 ""
 JCD_Red_Guard:0 "Erweitern Sie die Roten Garden"
 JCD_Red_Guard_desc:0 "Angesichts einer kommunistisch dominierten Regierung müssen wir die Roten Brigaden zu einer Eliteeinheit der Roten Garde umbauen. Ihnen beizutreten, wird für unsere Bevölkerung eine Ehre sein – ein leuchtendes Beispiel für ein neues Regime in all seiner Pracht."
 JCD_Use_of_Militarism:0 "Nutzen Sie den japanischen Militarismus"
 JCD_Use_of_Militarism_desc:0 "Was einst die Stärke der Imperialisten war, wird nun als Werkzeug für einen vollständigen Gehorsam und die Würde gegenüber der Volksrepublik Rotjapan wiederverwendet."
