 JAP_hachi_go_sakusen_going_I:0 "Hachi-Gō Sakusen"
 JAP_hachi_go_sakusen_going_I_desc:0 "Operation Ichi-Go, auch Operationsplan Nr. 8 genannt, war ein vom gemeinsamen Operationsbüro des Generalstabs der japanischen Armee und der Kwantung-Armee ausgearbeiteter Plan für die Invasion der östlichen Teile der Sowjetunion. Der Umfang der Operation war enorm: Der Plan sah den Einsatz von 50 Divisionen der IJA vor, die an einer fast 5.000 Kilometer langen Frontlinie kämpfen sollten. Die japanischen Ziele lagen bis zu 1.200 Kilometer tief in sowjetischem Gebiet."
 JAP_hachi_go_sakusen_successful_I:0 "Erfolg von Hachi-Gō"
