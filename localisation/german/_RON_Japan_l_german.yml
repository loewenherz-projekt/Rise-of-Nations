 umc_jap.141.d:0 "Angesichts unserer führenden Position in Asien hat [INS.GetLeader] zugestimmt, unserer Fraktion beizutreten.\n\nDies sichert uns den Zugang zu ihrer riesigen Gummi- und bedeutenden Stahlproduktion und verschafft uns einen potentiellen starken verbündeten Staat in Asien, wenn wir bereit sind, in die Entwicklung ihrer Industrie, Infrastruktur und ihrer Streitkräfte zu investieren."
 umc_jap.141.a:0 "Jetzt sind mehr Asiaten unter einem Dach."
 
