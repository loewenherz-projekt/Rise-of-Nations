 JAP_USA_declare_war_on_the_usa:0 "Den USA den Krieg erklären"
 JAP_USA_declare_war_on_the_usa_desc:0 ""
 JAP_USA_pre_emptive_strike_on_fleet_in_pearl_harbor:0 "Präventivschlag gegen die Flotte in Pearl Harbor"
 JAP_USA_pre_emptive_strike_on_fleet_in_pearl_harbor_EXPL:0 "Wir werden bis zu §HDrei Angriffe§! auf [USA.GetFlag]§H[USA.GetName]§! und ihre Basis in §HPearl Harbor§! starten. Die Angriffe können die folgenden §GEffects§! haben:\n Zerstöre bis zu §H4§! Schlachtschiffe.\n Beschädige die §HInfrastruktur§! und §HNaval Bases§!.\n Erhalte §H12§! erfahrene Divisionen in §HHawaii§!.\n Beeinträchtige die amerikanische §HNaval Capatibilities§! im Pazifik.\nWir werden [USA.GetFlag]§H[USA.GetName]§! §RDeclare the War§!.\n[USA.GetFlag]§H[USA.GetName]§! erhält signifikante §RBoni§! zu ihrer §HKriegsunterstützung§!, §HEinberufungsfaktor§! und §HAngriff§! gegen uns, basierend auf der Anzahl der Angriffe, die wir starten."
 JAP_USA_pre_emptive_strike_on_fleet_in_pearl_harbor_desc:0 ""
 JAP_USA_force_them_to_surrender:0 "Zwingen Sie sie zur Kapitulation"
 JAP_USA_force_them_to_surrender_TRIG:0 "Wir, unsere Verbündeten, kontrollieren jede „Insel“ im Pazifik."
 JAP_USA_force_them_to_surrender_EXPL1:0 "Wenn ihre §HStability§! unter §R35%§! fällt, wird ein §HCivil War§! ausgelöst.\n"
