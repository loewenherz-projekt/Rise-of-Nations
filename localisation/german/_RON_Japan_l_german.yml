 JAP_hirohito_T5:0 "Shōwaishin"
 umc_leader_hirohito_desc:0 "Hirohito wurde am 29. April 1901 geboren. Sein Kindheitstitel war Prinz Michi. Bereits 1912 wurde er offiziell zum Leutnant und Fähnrich in der Armee und der Marine befördert und mit dem Großkordon des Chrysanthemen-Ordens ausgezeichnet. 1914 wurde er zum Leutnant im Heer und Unterleutnant in der Marine befördert, 1916 dann zum Hauptmann und Leutnant. Am 2. November 1916 wurde er offiziell zum Kronprinzen und Thronfolger ernannt.\nNach dem Tod seines Vaters Yoshihito am 25. Dezember 1926 wurde er gemäß der traditionellen Thronfolge der 124. Kaiser von Japan.\nDie erste Phase von Hirohitos Herrschaft verlief vor dem Hintergrund einer Finanzkrise und der zunehmenden militärischen Macht innerhalb der Regierung, die sowohl durch legale als auch durch illegale Mittel gestärkt wurde. Diese Situation eskalierte weiter durch die Ermordung des gemäßigten Premierministers Inukai Tsuyoshi im Jahr 1932, die das Ende der zivilen Kontrolle über das Militär markierte.\nBeginnend mit dem Mukden-Zwischenfall im Jahr 1931 besetzte Japan chinesische Gebiete und errichtete Marionettenregierungen in der Mandschurei und Mengkukuo. Von diesem Moment an werden mit Hirohitos Segen weitere Feindseligkeiten gegenüber asiatischen Nationen vorbereitet – und nur die Zeit wird zeigen, ob es zu einem umfassenden Krieg kommt, da alle bewaffneten Konflikte für den göttlichen Kaiser bloße „Zwischenfälle“ sind."
 
