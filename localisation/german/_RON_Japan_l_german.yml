 ### MAN - SEND THE STUBBORN TO MANCHURIA
 umc_jcd.130.t:0 "Versetzung traditioneller Offiziere in die Mandschurei"
 umc_jcd.130.d:0 "Im Zuge der jüngsten Veränderungen auf den Heimatinseln wurde beschlossen, alle Offiziere, die militaristische Tendenzen zeigen, für mindestens drei Jahre in die Mandschurei zu schicken. Ein unerwarteter Befehl, dem unsere Regierung leider kaum Folge leisten kann – aber wir könnten ihn vielleicht zumindest teilweise ändern.\n\nDa die Lage hier bereits sehr instabil ist, müssen wir uns fragen, ob wir alle Offiziere überhaupt versorgen können, die sicherlich schnell in lokale Politik und Machtkämpfe verwickelt werden. Vielleicht wäre es das Beste, mindestens die Hälfte von ihnen nach Korea zu schicken."
 umc_jcd.130.a:0 "Sie werden nützlich sein, wenn wir uns ihre Loyalität sichern können."
 umc_jcd.130.b:0 "Wir können nicht alle unterbringen. Die Hälfte muss nach Korea geschickt werden."
 JCD_transfer_six_to_KOR_EXPL:0 "Übertragen Sie §H6§! Generäle mit §HSamurai-Linie§! nach [KOR.GetFlag]§H[KOR.GetName]§! und den Rest nach [MAN.GetFlag]§H[MAN.GetName]§!.\n.\n"
 
 umc_jcd.131.t:0 "Traditionelle Offiziere erfolgreich in die Mandschurei versetzt"
 umc_jcd.131.d:0 ""
 umc_jcd.131.a:0 "Ein wichtiger Schritt in Richtung New Japan."
 
 umc_jcd.132.t:0 "Die Mandschurei schickt die Hälfte ihrer Offiziere nach Korea"
 umc_jcd.132.d:0 ""
 umc_jcd.132.a:0 "Solange sie sich nicht auf den Heimatinseln befinden, ist es akzeptabel."
 
