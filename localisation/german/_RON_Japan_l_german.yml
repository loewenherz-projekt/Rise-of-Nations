 umc_jap.292.d:0 ""
 umc_jap.292.a:0 "Ihre Luftwaffe wird keine Chance haben."
 
 ## CHI - JAP SURRENDER
 umc_jap.300.t:0 "[JAP.GetName] öffnet sich für Friedensverhandlungen"
 umc_jap.300.d:0 "Wir haben die Japaner vom Festland vertrieben und kurz darauf unsere Stellungen befestigt. Kein einziger Japaner durfte mehr unseren Boden betreten. Obwohl uns Marine und Luftwaffe für einen Angriff auf die japanischen Heimatinseln fehlen, gilt das Halten unserer Stellung als ein totaler Sieg unserer Armee.\n\nDie Sicht der japanischen Bevölkerung auf ihre Lage ist jedoch weniger ... erfreulich. Ihre Uhren ticken. Sie haben uns immer als schwächere Nation betrachtet, und nun kann ihr „überlegenes“ Militär unserem nicht mehr standhalten!\n\nVor diesem Hintergrund wurden wir von den japanischen Botschaftern kontaktiert, um die Friedensbedingungen zu besprechen. Und wir werden sie nicht so einfach davonkommen lassen."
 umc_jap.300.a:0 "Sie müssen das Festland verlassen und uns für den entstandenen Schaden entschädigen."
 umc_jap.300.b:0 "Sie müssen nicht nur zahlen, sondern uns auch das geben, was sie stark macht."
 umc_jap.300.c:0 "Wir werden bald auf die japanischen Heimatinseln marschieren."
 
