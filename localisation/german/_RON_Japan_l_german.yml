 JAP_USA_use_the_last_reserves:0 "Die letzten Reserven nutzen"
 JAP_USA_use_the_last_reserves_desc:0 "Wir spielen in einem Krieg mit den Vereinigten Staaten auf Zeit. Deshalb müssen wir alles geben, wenn wir erfolgreich sein wollen. Jedes Handelsschiff, jeder einzelne Liter Treibstoff muss eingesetzt werden."
