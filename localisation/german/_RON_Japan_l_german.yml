 JAP_period_of_significant_economic_growth_I3_desc:0 "Die Industrieproduktion wächst seit 1929 stetig. Der Gesamtwert der Schwerindustrie in Japan, der 1931 auf etwa 700 Millionen US-Dollar geschätzt wurde, war bis 1936 auf 3,4 Milliarden US-Dollar gestiegen. Sollten wir diese Rate beibehalten, könnten wir möglicherweise sogar das wirtschaftliche Niveau unserer Rivalen erreichen.\n§W---------------§!\nDieser Nationalgeist wird §REntfernt§!, wenn wir uns im §HKrieg§! befinden oder wenn die §HWeltspannung§! über §H75 %§! liegt."
 
 ##### FOREIGN TRAINING OF IJA GENERALS
 JAP_foreign_training_of_ija_generals_I:0 "Auslandsausbildung von IJA-Generälen"
 JAP_foreign_training_of_ija_generals_I_desc:0 "Viele Kommandeure der Dai-Nippon Teikoku Rikugun wurden als Attachés in westliche Länder entsandt, vor allem während des Ersten Weltkrieges und danach. Sie studierten dort militärische Taktiken und Ausrüstung – und sammelten nützliche Informationen, die ihnen zu Hause von großem Nutzen sind."
