 ### Viet Ming
 umc_jcd.10.t:0 "[JAP.GetName] Unterstützt Viet Minh"
 umc_jcd.10.d:0 ""
 umc_jcd.10.a:0 "Geben Sie der lokalen Regierung die Waffen, die sie zur Niederschlagung des Aufstands braucht!"
 umc_jcd.10.b:0 "Bereiten Sie sich darauf vor, in Indochina gegen sie zu kämpfen!"
 JCD_VIN_civil_war_EXPL:0 "Gewinnen Sie §H14§! Milizdivisionen in Indochina.\n"
 umc_jcd.10.c:0 "Unsere Kolonie ist verloren. Evakuiert unsere Bürger und Investitionen!"
 
 umc_jcd.11.t:0 "Aufstand in Vietnam!"
 umc_jcd.11.d:0 ""
 umc_jcd.11.a:0 "Kämpft, Brüder, vernichtet diese imperialistischen Hunde!"
 
 umc_jcd.12.t:0 "Der Aufstand wurde erfolgreich niedergeschlagen"
 umc_jcd.12.d:0 ""
 umc_jcd.12.a:0 "Sie sollten sich diese Lektion merken."
 
 umc_jcd.13.t:0 "Versuche, den Aufstand niederzuschlagen, scheiterten"
 umc_jcd.13.d:0 ""
 umc_jcd.13.a:0 "Unsere Ressourcen wurden verschwendet."
 
 umc_jcd.14.t:0 "Der Aufstand der Viet Minh wurde niedergeschlagen"
 umc_jcd.14.d:0 ""
 umc_jcd.14.a:0 "Das sind schlechte Nachrichten."
 
 umc_jcd.15.t:0 "Der Krieg in Indochina ist verloren"
 umc_jcd.15.d:0 "Was zunächst als kleiner vietnamesischer Aufstand galt, hat sich mittlerweile zu einer umfassenden Rebellion entwickelt, die ganz Indochina erfasst hat.\n\nUnsere Streitkräfte wurden nun vertrieben und unsere ehemalige Kolonie liegt in den Händen von [VIN.GetLeader]. Da wir unseren einzigen geeigneten Militärstützpunkt für einen Gegenangriff verloren haben, sind viele der Meinung, dass die Beendigung des Krieges und die Anerkennung der Herrschaft von [VIN.GetLeader] über Indochina der beste Weg wäre."
 umc_jcd.15.a:0 "Es werden keine weiteren französischen Leben für ein Stück Land verloren gehen, das uns sowieso nicht gehört."
 umc_jcd.15.b:0 "Verloren? Wir müssen unsere Kolonie um jeden Preis zurückerobern!"
 
 umc_jcd.16.t:0 "[FRA.GetName] Rückzug aus Indochina"
 umc_jcd.16.d:0 "Unseren Vietminh-Verbündeten gelang es, die Franzosen ans Meer zu drängen.\n\nUnmittelbar darauf folgte der Beginn von Friedensgesprächen, die von französischer Seite initiiert wurden. Sie erkannten uneingeschränkt an, dass Indochina nun ein unabhängiger Staat ist und gaben alle Ansprüche auf ihr Territorium auf."
 umc_jcd.16.a:0 "Sieg!"
 
 
