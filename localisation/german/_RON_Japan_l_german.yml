 ##### TRADITION WAYS BRANCH
 JAP_reinforce_traditional_ways:0 "Traditionelle Methoden verstärken"
 JAP_reinforce_traditional_ways_desc:0 ""
 JAP_side_with_the_toseiha_faction:0 "Schließen Sie sich der Tōseiha-Fraktion an"
 JAP_side_with_the_toseiha_faction_EXPL:0 "Die §HTōseiha§!-Fraktion unterstützt die §HNanshin-ron-Doktrin§!. Diesem Weg nicht zu folgen, wird große §RStrapazen§! für unsere §RStabilität§! und §RWarfunterstützung§! zur Folge haben.\n"
 JAP_side_with_the_toseiha_faction_desc:0 "Die Tōseiha, oder „Kontrollfraktion“, ist eine politische Fraktion innerhalb der Kaiserlich Japanischen Armee, die seit den 1920er Jahren aktiv ist. Die Tōseiha, die früher von Generalmajor Tetsuzan Nagata und Hideki Tōjō angeführt wurde, ist eine Gruppe von Offizieren, die vor allem durch ihre Opposition gegen die Kōdōha-Fraktion vereint sind. Die Tōseiha unterstützt die Nanshin-ron-Strategie nachdrücklich."
 JAP_side_with_the_kodoha_faction:0 "Schließen Sie sich der Kōdōha-Fraktion an"
 JAP_side_with_the_kodoha_faction_EXPL:0 "Die §HKōdōha§!-Fraktion unterstützt die §HHokushin-ron-Doktrin§!. Diesem Weg nicht zu folgen, wird große §RStrapazen§! für unsere §RStabilität§! und §RWurfsunterstützung§! zur Folge haben.\n"
 JAP_side_with_the_kodoha_faction_desc:0 "Die Kōdōha oder „Fraktion des Kaiserlichen Weges“ ist eine politische Fraktion in der Kaiserlich Japanischen Armee, die seit den 1920er Jahren aktiv ist und größtenteils von jüngeren Offizieren unterstützt wird. Ihr Ziel ist die Errichtung einer Militärregierung mit dem Kaiser als Herrscher, die totalitäre, militaristische und expansionistische Ideale fördert.\nDie Kōdōha unterstützt die Hokushin-ron-Strategie nachdrücklich."
 JAP_the_question_of_zaibatsus:0 "Die Frage des Zaibatsus"
 JAP_the_question_of_zaibatsus_EXPL1:0 "Wenn wir „§HSich auf die Seite der Tōseiha-Fraktion stellen§!“ abgeschlossen haben, hat dieser Fokus die folgenden §GEffects§!:\n"
 JAP_the_question_of_zaibatsus_EXPL2:0 "Wenn wir „§HSich auf die Seite der Kōdōha-Fraktion stellen§!“ abgeschlossen haben, hat dieser Fokus die folgenden §GEffects§!:\n"
 JAP_the_question_of_zaibatsus_desc:0 "Zaibatsus oder „Finanzclique“ ist ein Industrie- und Finanzkonglomerat, das bedeutende Teile der japanischen Wirtschaft kontrolliert. Es wird von den „Großen Vier“ beherrscht: Sumitomo, Mitsui, Mitsubishi und Yasuda." 
 
 JAP_fukoku_kyohei:0 "Fukoku Kyōhei"
 JAP_fukoku_kyohei_EXPL1:0 "   Wählen Sie einen der vier Generäle, die als Attaché entweder nach [GER.GetFlag]§H[GER.GetName]§!, [ENG.GetFlag]§H[ENG.GetName]§!, [FRA.GetFlag]§H[FRA.GetName]§! oder [CHI.GetFlag]§H[CHI.GetName]§! geschickt wurden. Der ausgewählte General erhält zusätzliche §HLevel§! und §HStats§!.\n Die Auswirkungen von &#39;§HAuslandsausbildung von IJA-Generälen§!&#39; auf den Nationalgeist werden ebenfalls §GImproved§!.\n"
 JAP_fukoku_kyohei_EXPL2:0 "   Bevorzugen Sie entweder die §HArmy§! oder die §HNavy§! und §GStärken§! Sie somit den gewählten Zweig.\n"
 JAP_fukoku_kyohei_desc:0 "„Bereichern Sie das Land, stärken Sie die Streitkräfte.“ Das ist unser Motto und daran werden wir immer festhalten."
 JAP_handle_the_militarists:0 "Bewältigen Sie die Militaristen"
 JAP_handle_the_militarists_EXPL:0 "   Weitere §GVerringerung§! des Niveaus des §HUnkontrollierten Militarismus§! Nationalgeistes.\n"
 JAP_handle_the_militarists_desc:0 ""
 JAP_greater_east_asia_co_prosperity_sphere:0 "Großostasiatische Wohlstandssphäre"
 JAP_greater_east_asia_co_prosperity_sphere_desc:0 ""
 Anti_communist_sphere:0 "Antikommunistische Sphäre"
 JAP_showa_kenkyukai:0 "Shōwa Kenkyūkai"
 JAP_showa_kenkyukai_desc:0 "Die Shōwa Kenkyūkai (Shōwa-Forschungsvereinigung) wurde im Oktober 1930 als informelle Organisation unter der Leitung von Ryūnosuke Gotō gegründet. Ihr ursprüngliches Ziel war die Untersuchung und Bewertung von Problemen mit der Meiji-Verfassung. Die Shōwa Kenkyūkai war eine überzeugte Verfechterin des Panasiatismus und bildete die theoretische Grundlage für die Wohlstandssphäre Großostasien."
 JAP_imperial_rule_assistance_association:0 "Imperial Rule Assistance Association"
 JAP_imperial_rule_assistance_association_EXPL:0 "Alle politischen Parteien, einschließlich der §HTōseiha§!- und §HKōdōha§!-Bewegungen, werden zu einer Partei, der §HImperial Rule Assistance Association§!, zusammengeschlossen, die erhebliche §GBoni§! bietet."
