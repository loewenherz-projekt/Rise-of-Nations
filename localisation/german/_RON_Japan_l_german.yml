 JAP_ir_extended_army_training_dec_EXPL:0 "Füge §G1§! Planungsgeschick und §HInfanterieoffizier§! Eigenschaft zu §H2§! zufälligem General hinzu.\n"
 JAP_ir_extended_army_training_dec_desc:0 "Dai-Nippon Teikoku Rikugun ist eine der mächtigsten Streitkräfte der Welt, doch es gibt noch immer einige, die ihr sogar überlegen sein könnten. Wir müssen zusätzliche Anstrengungen in die weitere Ausbildung unserer Armee und der sie führenden Generäle unternehmen."
 JAP_ir_extended_navy_training_dec:0 "Erweiterte Ausbildung des Marinepersonals"
 JAP_ir_extended_navy_training_dec_EXPL:0 "Füge §G1§! Schadensfertigkeit und §HGunnery Expert§! Eigenschaft zu §H1§! zufälligem Admiral hinzu.\nFüge §G1§! Koordinationsfertigkeit und §HAviation Enthusiast§! Eigenschaft zu §H1§! zufälligem Admiral hinzu.\n"
 JAP_ir_extended_navy_training_dec_desc:0 "Dai-Nippon Teikoku Kaigun verfügt über die modernste Flotte der Welt. Nun müssen wir sicherstellen, dass wir über das nötige Personal verfügen, um sie zu betreiben."
 
 JAP_extended_army_training_FLAG:0 "Erweitertes Landarmee-Training"
 JAP_extended_navy_training_FLAG:0 "Erweiterte Ausbildung des Marinepersonals"
 
 ##### PATH TO NISHINIHON
 JAP_MAN_path_to_nishinihon_cat:0 "Weg nach Nishinihon"
 JAP_MAN_path_to_nishinihon_cat_desc:0 "Die großen Gebiete der Mandschurei, die wir 1931 durch den Mukden-Zwischenfall eroberten, bergen viele Reichtümer und Vorteile, die dem Wohl Japans dienen können. Aber sie werden – abgesehen von kleinen Ausnahmen – noch nicht richtig genutzt.\n\nDie mandschurische §HIntegrationsrate§! liegt bei ([?JAP_MAN_ptn_integration_lvl_VAR|H0]§H%§!)."
 
 JAP_MAN_ptn_integration_lvl_greater_than_50_TRIG:0 "Die „Integrationsrate“ liegt über „50 %“."
 JAP_MAN_ptn_integration_lvl_greater_than_75_TRIG:0 "Die „Integrationsrate“ liegt über „75 %“."
 
 JAP_ptn_increase_two_EXPL:0 "Die §HIntegrationsrate§! wird um (§G2%§!) §GInstiegen§!.\n"
 JAP_ptn_increase_ten_EXPL:0 "Die §HIntegrationsrate§! wird um (§G10%§!) §GInstiegen§!.\n"
 JAP_ptn_increase_up_to_ten_EXPL:0 "Die §HIntegrationsrate§! wird auf bis zu (§G10%§!) §GErhöht§!.\n"
 JAP_ptn_reduce_two_EXPL:0 "Die §HIntegrationsrate§! wird um (§R2%§!) §RReduziert§!.\n"
 
 JAP_ptn_reeducation_campaign_dec_FLAG:0 "Hat die §HReducation Campaign§ abgeschlossen! Entscheidung"
 JAP_ptn_economical_integration_dec_FLAG:0 "Hat die §HVollständige wirtschaftliche Integration§ abgeschlossen! Entscheidung"
 JAP_ptn_japanese_settlers_dec_FLAG:0 "Hat §HSondergesetze für japanische Siedler§ abgeschlossen! Entscheidung"
 
 JAP_ptn_special_stability_measures_dec:0 "Besondere Stabilitätsmaßnahmen"
 JAP_ptn_special_stability_measures_dec_desc:0 "Um die Integration der Mandschurei fortzusetzen, müssen wir zunächst die Stabilität des lokalen Regimes sichern. Da dies keine leichte Aufgabe ist, müssen hierfür zusätzliche Mittel bereitgestellt werden."
 JAP_ptn_use_the_improving_economic_situation_in_japan_dec:0 "Nutzen Sie die Verbesserung der Wirtschaftslage in Japan"
 JAP_ptn_use_the_improving_economic_situation_in_japan_dec_TRIG:0 "Hat Nationalgeist §HParität signifikanten Wirtschaftswachstums§!"
 JAP_ptn_use_the_improving_economic_situation_in_japan_dec_desc:0 "Unsere Wirtschaft auf der Heimatinsel erlebt weiterhin ein rasantes Wachstum. Wir können dies in der Mandschurei zu unserem Vorteil nutzen, was sicherlich zur lokalen Stabilität und Entwicklung beitragen würde."
 
 JAP_ptn_reeducation_campaign_dec:0 "Umerziehungskampagne"
 JAP_ptn_reeducation_campaign_dec_desc:0 "Shintoismus, Nihonjinron, Shodō, Ukiyo-e. Diese Dinge spielen für die ungebildeten Mandschus in der Mandschurei keine Rolle. Wenn wir die Mandschurei jemals als „Westjapan“ betrachten wollen, muss sich diese Ignoranz ändern. Um dies zu erreichen, werden wir eine groß angelegte Umerziehungskampagne starten."
 JAP_ptn_economical_integration_dec:0 "Vollständige wirtschaftliche Integration"
 JAP_ptn_economical_integration_dec_desc:0 "Obwohl der Staatsrat für Allgemeine Angelegenheiten fast die vollständige Kontrolle über die offizielle Wirtschaftspolitik Mandschukos hat, müssen wir noch einen Schritt weiter gehen. Von nun an wird die Wirtschaft Mandschukuos direkt von Tokio aus gesteuert.\n\nWir werden den Prozess dort beginnen, wo Ihr Einfluss am stärksten ist – in Liaontung, der Region, in der sich das Shōwa-Stahlwerk befindet."
 JAP_ptn_japanese_settlers_dec:0 "Sondergesetze für japanische Siedler"
 JAP_ptn_japanese_settlers_dec_desc:0 "Um die Einwanderung der Japaner in die Mandschurei zu fördern, werden wir für alle, die kommen, besondere Gesetze erlassen. Dadurch sichern wir uns dort mehr loyale Menschen, die der einheimischen Bevölkerung als leuchtendes Beispiel dienen können."
 
 JAP_ptn_manchurian_integration_effort_dec:0 "Mandschurische Integrationsbemühungen"
 JAP_ptn_manchurian_integration_effort_dec_EXPL:0 "Während der Zeit der §HIntegration§! kann die Bevölkerung der Mandschurei sich ihr entweder widersetzen oder sie unterstützen, was zu ungewöhnlichen §HEreignissen§! führen kann.\n"
 JAP_ptn_manchurian_integration_effort_dec_desc:0 ""
 JAP_ptn_put_manchurian_commanders_under_kato_army_dec:0 "Unterstellen mandschurischer Kommandeure der Kanto-Armee"
 JAP_ptn_put_manchurian_commanders_under_kato_army_dec_desc:0 ""
 JAP_ptn_proclaim_the_nishinihon_dec:0 "Verkünde das Nishinihon"
 JAP_MAN_ptn_is_under_95_EXPL:0 "Die §HIntegrationsrate§! liegt unter §H95%§!, daher hat diese Entscheidung auch folgende §REffects§!:\n"
 JAP_ptn_proclaim_the_nishinihon_dec_desc:0 "Die Integration ist erfolgreich abgeschlossen. Der Großteil der Bevölkerung fühlt sich unserer Kultur verbunden – sie respektieren den Kaiser und die japanische Lebensweise.\n\nNoch fehlt nur noch die Auflösung des Marionettenstaates Mandschurei und die vollständige Integration seines Teils in das japanische Kaiserreich. Von nun an wird er als Nishinihon bekannt sein."
 
 JAP_state_stuff_dec_cat:0 "Operationen"
 JAP_state_stuff_dec_cat_desc:0 ""
 
 JAP_suiyuan:0 "Grenzkonflikt zwischen Mengu und Shanxi"
 JAP_suiyuan_desc:0 "Solange China zerschlagen ist, können wir unsere mongolische Marionette in Mengkukuo nutzen, um einen kleinen Grenzkonflikt mit dem chinesischen Kriegsherrn in Shanxi zu provozieren. Auch wenn unsere Truppen nicht eingreifen können, da dies weltweite Probleme verursachen würde, können wir die Schuld einfach Prinz Demchugongrub zuschieben."
