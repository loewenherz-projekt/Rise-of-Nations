 ### SOV - JAP SURRENDER
 umc_jap.320.t:0 "[JAP.GetName] öffnet sich für Friedensverhandlungen"
 umc_jap.320.d:0 "In einem schnellen, koordinierten Angriff gelang es uns, die übermächtige japanische Kwantung-Armee innerhalb weniger Wochen zu besiegen und die Japaner vom Festland zu verdrängen. Kurz darauf befestigten wir unsere Stellungen und ließen keinen einzigen Japaner mehr unseren Boden betreten. Obwohl die japanische Marine weiterhin standhaft bleibt und jeden möglichen Weg zu den Heimatinseln schützt, verfügen wir über eine Luftwaffe, die ihre Heimat bis zur Vernichtung bombardieren kann, und sie wissen es. \n\nVor diesem Hintergrund wurden wir von den japanischen Botschaftern kontaktiert, um die Friedensbedingungen zu besprechen. Und wir werden sie nicht so leicht davonkommen lassen."
 umc_jap.320.a:0 "Sie müssen uns das gesamte chinesische Festlandgebiet überlassen."
 umc_jap.320.b:0 "Kapitulation Chinas und Übergabe der Mandschurei an die chinesischen Kommunisten"
 umc_jap.320.c:0 "China zerschlagen und die lokale Industrie übernehmen."
 umc_jap.320.e:0 "Wir werden dieses Problem durch eine vollständige Kapitulation der japanischen Führung lösen."
 
