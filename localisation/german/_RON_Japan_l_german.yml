 ##### CHI WAR BRANCH
 JAP_CHI_build_upon_the_tanggu_truce:0 "Bauen Sie auf dem Waffenstillstand der Tanggu auf"
 JAP_CHI_build_upon_the_tanggu_truce_desc:0 "Der Waffenstillstand von Tanggu war ein Waffenstillstand, der am 31. Mai 1933 im Bezirk Tanggu in Tianjin zwischen der Republik China und dem Kaiserreich Japan unterzeichnet wurde. Er beendete formell die japanische Invasion in der Mandschurei, die zwei Jahre zuvor begonnen hatte. In den Augen der Chinesen ist er eine demütigende Niederlage. Sie haben Recht, und wir werden sie daran erinnern."
 JAP_CHI_expand_the_western_roads:0 "Erweitern Sie die westlichen Straßen"
 JAP_CHI_expand_the_western_roads_desc:0 ""
 JAP_CHI_prepare_the_southern_invasion_plan:0 "Bereiten Sie den Invasionsplan des Südens vor"
 JAP_CHI_prepare_the_southern_invasion_plan_desc:0 "Unsere Invasion in China muss perfekt geplant sein. Armee, Luftwaffe und Marine werden die Angriffe in einem einzigen Großschlag koordinieren, der die chinesische Verteidigung innerhalb weniger Monate zerschmettern wird. Die Leitung übernimmt der Gunji Sangiin, der Oberste Kriegsrat."
 JAP_CHI_expand_mengkukuoan_cavalry_army:0 "Erweitern Sie die Mengkukuoan-Kavalleriearmee"
 JAP_CHI_expand_mengkukuoan_cavalry_army_EXPL:0 "Erhalte §H4§! Kavalleriedivisionen.\n"
 JAP_CHI_expand_mengkukuoan_cavalry_army_desc:0 "Unser Marionettenregime in Chahar und der Äußeren Mongolei nützt uns wenig, wenn es sich nicht selbst verteidigen kann. Glücklicherweise haben die Einheimischen eine lange Tradition der Kriegsführung vom Pferdesattel aus, die wir bestmöglich nutzen werden. Schließlich können sich Lastwagen nicht in die Berge im Süden schleichen."
 JAP_CHI_execute_the_grand_invasion_of_china_plan:0 "Führen Sie den Plan zur großen Invasion Chinas durch"
 JAP_CHI_execute_the_grand_invasion_of_china_plan_desc:0 ""
 
 JAP_CHI_marco_polo_bridge_incident:0 "Vorfall auf der Marco-Polo-Brücke"
 JAP_CHI_marco_polo_bridge_incident_EXPL1:0 "   Unsere Truppen in Ost-Hebei werden einen Grenzkrieg gegen [CHI.GetFlag] beginnen. Der Konflikt wird sich weiter verschärfen.\n Unsere Kontrolle über den Grenzkrieg wird begrenzt sein, abhängig vom Grad des unkontrollierten militaristischen Nationalgeistes.\n"
 JAP_CHI_marco_polo_bridge_incident_EXPL2:0 "[PRC.GetFlag]§H[PRC.GetName]§! wird in der Lage sein, teilweise in den §HGrenzkrieg§! einzugreifen und §RDecrese§! unsere Chance zu verringern, den Konflikt nicht weiter §REskalieren§!.\n"
 JAP_CHI_marco_polo_bridge_incident_desc:0 ""
 JAP_CHI_reorganize_military_advance_in_china:0 "Reorganisieren Sie den militärischen Vormarsch in China"
 JAP_CHI_reorganize_military_advance_in_china_desc:0 ""
 JAP_CHI_find_a_common_way_out:0 "Finden Sie einen gemeinsamen Ausweg"
 JAP_CHI_find_a_common_way_out_EXPL:0 "   Stellen Sie entweder kleine, mittlere oder große §HForderungen§! an [CHI.GetFlag]§H[CHI.GetName]§!, um den Japanisch-Chinesischen Krieg zu beenden.\n\nDies ist ein §MReaktiver Fokus§!. Wenn [CHI.GetFlag]§H[CHI.GetName]§! einen größeren §HSurrender-Forderungsfortschritt§! hat, ist der Umfang der §HForderungen§! §GGrößer§!.\n"
 JAP_CHI_find_a_common_way_out_desc:0 ""
 JAP_CHI_establish_reorganized_government_of_china:0 "Gründung einer neu organisierten Regierung Chinas"
 JAP_CHI_establish_reorganized_government_of_china_EXPL1:0 "Das Regime unter Wang Jingwei wird in [CHI.GetFlag] mit Anjing als Hauptstadt einen Bürgerkrieg entfachen. Jeder von uns kontrollierte Staat in China wird ihnen zufallen.\n"
 JAP_CHI_establish_reorganized_government_of_china_EXPL2:0 "   Übernehmen Sie die direkte Kontrolle über §H[608.GetName]§!, §H[614.GetName]§!, §H[597.GetName]§!, §H[743.GetName]§! und §H[598.GetName]§!.\n Stellen Sie §HEquipment§! für §HWang Jingwei§!s Armee bereit.\n"
 JAP_CHI_establish_reorganized_government_of_china_desc:0 ""
 JAP_CHI_ichi_go_sakusen:0 "Ichi-Gō Sakusen"
 JAP_CHI_ichi_go_sakusen_EXPL:0 "   Um diese Mission erfolgreich abzuschließen, müssen Sie entweder kapitulieren oder alle Küstenstaaten und alle Staaten von [GXC.GetFlag] kontrollieren.\n"
 JAP_CHI_ichi_go_sakusen_desc:0 "Die Operation Ichi-Go, auch bekannt als „Operation Nummer Eins“, ist die größte japanische Operation in der Militärgeschichte. Die beiden Hauptziele der Ichi-Go-Operation sind die Öffnung einer Landroute nach Französisch-Indochina und die Eroberung von Luftwaffenstützpunkten im Südosten Chinas, von denen aus amerikanische Bomber das japanische Heimatland und die japanische Schifffahrt angriffen."
 JAP_CHI_retool_chinese_industry:0 "Umrüstung der chinesischen Industrie"
 JAP_CHI_retool_chinese_industry_EXPL:0 "Entfernen Sie die §H1 Zivilfabrik§! in jedem Küstenstaat in China, in dem sie verfügbar ist.\nFügen Sie in jedem betroffenen Staat einen §G1§! Gebäudeplatz, eine §H1 Militärfabrik§! und eine §H1 Werft§! hinzu."
 JAP_CHI_retool_chinese_industry_desc:0 ""
 JAP_CHI_exploit_chinese_wealth:0 "Den chinesischen Reichtum ausbeuten"
 JAP_CHI_exploit_chinese_wealth_desc:0 ""
 
 ##### HOKUSHIN-RON DOCTRINE BRANCH
 JAP_hokushin_ron_doctrine:0 "Hokushin-ron\nLehre"
 JAP_hokushin_ron_doctrine_EXPL1:0 "Die §HHokushin-ron§!-Doktrin wird von der §HKōdōha§!-Fraktion vertreten. Sich auf die Seite der §HTōseiha§!-Fraktion zu stellen und dieser Doktrin zu folgen, hätte auch die folgenden §REffects§!:\n"
 JAP_hokushin_ron_doctrine_EXPL2:0 "Du hast dich auf die Seite der §HTōseiha§!-Fraktion gestellt, die die §HNanshin-ron§!-Doktrin vertritt. Daher hat die Auswahl dieser Option vor Abschluss von Nanshin-ron folgende §REffects§!:\n"
 JAP_hokushin_ron_doctrine_desc:0 "Die „Doktrin der nördlichen Expansion“ ist eine militärische und politische Doktrin, die besagt, dass die Mandschurei und Sibirien zu den Interessengebieten Japans gehören und dass der potenzielle Wert einer wirtschaftlichen und territorialen Expansion in diesen Gebieten für Japan größer ist als anderswo."
 
 ##### CHI ALLY BRANCH
 JAP_CHI_ishiwaras_east_asian_league_dream:0 "Ishiwaras Traum von der Ostasiatischen Liga"
 JAP_CHI_ishiwaras_east_asian_league_dream_desc:0 ""
 JAP_CHI_concessions_to_china:0 "Zugeständnisse an China"
 JAP_CHI_concessions_to_china_desc:0 "Das Mengjiang-Abkommen, das unseren Marionettenstaat in der Äußeren Mongolei endgültig begründete, verschlechterte unsere Beziehungen zum nationalistischen China erneut, die sich seit 1935 unerwartet verbessert hatten. Obwohl diese Operation einen endgültigen Sieg für unsere Streitkräfte bedeutete, müssen wir unsere Erfolge aufgeben und die Äußere Mongolei den Nationalisten zurückgeben. Das wird uns hoffentlich ihre Zuneigung zurückgewinnen."
 JAP_CHI_get_rid_of_chiang_kai_shek:0 "Werde Chiang Kai-Shek los"
 JAP_CHI_get_rid_of_chiang_kai_shek_EXPL:0 "Wenn ihre §RStability§! unter §R50%§! liegt, hat dieser Fokus auch die folgenden §REffects§!:\n"
 JAP_CHI_get_rid_of_chiang_kai_shek_desc:0 "Die Herrschaft Chiang Kai-sheks kann fast als Diktatur bezeichnet werden, obwohl ihm der flexiblere Wang Jingwei lange Zeit gegenüberstand. Wenn es uns gelingt, die Chinesen davon zu überzeugen, Chiang Kai-shek einen kleinen Unfall zu ermöglichen, könnte Wang sein Amt als Präsident Chinas antreten. Das würde unsere künftige Zusammenarbeit sicherlich erleichtern."
 JAP_CHI_non_aggression_pact_with_china:0 "Nichtangriffspakt mit China"
 JAP_CHI_non_aggression_pact_with_china_desc:0 ""
 JAP_CHI_pact_of_silk:0 "Pakt der Seide"
 JAP_CHI_pact_of_silk_EXPL1:0 "Erhalte §H24§! Milizdivisionen.\n"
 JAP_CHI_pact_of_silk_desc:0 ""
 JAP_CHI_expand_zaibatsus_influence_in_china:0 "Ausbau des Einflusses der Zaibatsus in China"
 JAP_CHI_expand_zaibatsus_influence_in_china_desc:0 ""
 JAP_CHI_sino_japanese_military_mission:0 "Chinesisch-japanische Militärmission"
 JAP_CHI_sino_japanese_military_mission_desc:0 ""
 JAP_CHI_kick_up_chinese_shipbuilding_industry:0 "Chinesische Schiffbauindustrie wird angekurbelt"
 JAP_CHI_kick_up_chinese_shipbuilding_industry_desc:0 "Da wir nun das gleiche Blut wie die Chinesen haben, müssen wir sicherstellen, dass ihre Marine zumindest in der Lage ist, ihre eigenen Küsten zu schützen. Und unsere Erfahrungen auf dem Gebiet der Marine werden uns dabei zweifellos nützlich sein."
 JAP_CHI_embrace_the_unification_campaign:0 "Unterstützen Sie die Vereinigungskampagne"
 JAP_CHI_embrace_the_unification_campaign_desc:0 ""
 
 ##### KANTOKUEN BRANCH
 JAP_prepare_the_kantokuen:0 "Bereiten Sie das Katokuen vor"
 JAP_prepare_the_kantokuen_desc:0 "„Kantokuen“ ist ein Operationsplan des Generalstabs der Kaiserlich Japanischen Armee zur Invasion und Besetzung des fernöstlichen Teils der Sowjetunion. An dem Plan sind sieben japanische Armeen sowie ein Großteil der See- und Luftstreitkräfte des Kaiserreichs beteiligt. Es handelt sich um die größte kombinierte Militäroperation in der japanischen Geschichte und eine der größten aller Zeiten."
 JAP_bases_and_supply_lines_alongside_amur_river:0 "Stützpunkte und Versorgungslinien entlang des Amur"
 JAP_bases_and_supply_lines_alongside_amur_river_desc:0 "Während wir uns auf unseren Vormarsch in den Fernen Osten der Sowjetunion vorbereiten, müssen wir unsere Stützpunkte in den Grenzprovinzen entlang des Amur ausbauen. Eisenbahnen, Straßen, Flughäfen, Krankenhäuser, Munitionslager – alles muss bereit sein für den Moment, wenn wir die Hörner des Krieges blasen."
 JAP_RUS_use_the_anti_soviets:0 "Verwenden Sie die Antisowjets"
 JAP_RUS_use_the_anti_soviets_EXPL:0 "\nDies ist ein §MReaktiver Fokus§!. Wenn wir den Fokus &#39;§HImporkommende kaiserliche Mandschurische Armee verbessern§!&#39; abgeschlossen haben, hat dieser Fokus stattdessen die folgenden §GEffects§!:\n"
 JAP_RUS_use_the_anti_soviets_desc:0 "Es gibt immer noch eine große Zahl von Menschen, die Russland entweder aufgrund der Sowjetrevolution verlassen haben oder dort noch leben, sich aber stillschweigend dem neuen Regime widersetzen. Sie alle können für uns von großem Nutzen sein, wenn wir unsere Operation zur Eroberung des Fernen Ostens starten."
 JAP_RUS_genrikh_lyushkovs_far_east_informations:0 "Genrikh Lyushkovs Fernost-Informationen"
 JAP_RUS_genrikh_lyushkovs_far_east_informations_desc:0 "Genrich Samoilowitsch Ljuschkow ist ein sowjetischer Offizier und NKWD-Mitglied. Angesichts der aktuellen Lage ist er bereit, aus seinem Land zu desertieren und die Grenze in der Mandschurei mit wichtigen Informationen über die sowjetische Armee im Fernen Osten zu überqueren. Sollten wir ihn aufnehmen, könnte uns das einen großen Vorteil verschaffen."
 JAP_RUS_mobilize_the_white_russians:0 "Mobilisieren Sie die Weißrussen"
 JAP_RUS_mobilize_the_white_russians_EXPL1:0 "\nDies ist ein §MReaktiver Fokus§!. Wenn wir den Fokus &#39;§HImporkommende kaiserliche Mandschurische Armee verbessern§!&#39; abgeschlossen haben, hat dieser Fokus stattdessen die folgenden §GEffects§!:\n"
 JAP_RUS_mobilize_the_white_russians_EXPL2:0 "Erhalte §H4§! Asano-Gesamtrussische Divisionen.\n"
 JAP_RUS_mobilize_the_white_russians_desc:0 ""
 JAP_RUS_form_provisional_far_eastern_government:0 "Bilden Sie eine provisorische Regierung im Fernen Osten"
 JAP_RUS_form_provisional_far_eastern_government_EXPL:0 "\nIndem wir diesen Schwerpunkt §Mabschließen§!, erklären wir uns bereit, den §HWeißrussen§! nach unserer erfolgreichen Eroberung von [SOV.GetFlag]§H[SOV.GetName]§! ein gewisses Maß an §HAutonomie§! in ihrem Staat im Fernen Osten zu gewähren."
