 ### PEARL HARBOR
 umc_jap.10.t:0 "Operation KI"
 umc_jap.10.d:0 "Um den Vormarsch in das „Südliche Ressourcengebiet“ zu sichern, begannen die Arbeiten an der Doktrin der „Entscheidungsschlacht“ bereits 1940 unter der Schirmherrschaft von Admiral Isoroku Yamamoto, dem Kommandeur der japanischen Vereinigten Flotte. Der Angriff verfolgt mehrere Hauptziele. Erstens sollen wichtige amerikanische Flotteneinheiten zerstört werden, um die Pazifikflotte daran zu hindern, die japanische Eroberung Niederländisch-Indiens und Malayas zu behindern. Unseren Truppen soll es ermöglicht werden, Südostasien ungehindert zu erobern. Zweitens soll uns wichtige Zeit verschafft werden, um unsere Position zu festigen und unsere Seemacht zu erhöhen, bevor der durch den Vinson-Walsh Act von 1940 genehmigte Schiffsbau jede Chance auf einen Sieg zunichte macht. Drittens werden Schlachtschiffe als Hauptziele ausgewählt, um Amerikas Fähigkeit zur Mobilisierung seiner Streitkräfte im Pazifik zu schwächen. Schließlich wird erwartet, dass der Angriff die amerikanische Moral so untergräbt, dass die US-Regierung ihre Forderungen, die den japanischen Truppen entgegenstehen, fallen lässt. Interessen und würde einen Kompromissfrieden mit Japan anstreben.\n\nDie Basis auf Hawaii wird von mehr als 350 Flugzeugen angegriffen, die von den sechs Flugzeugträgern der „Striking Force“-Gruppe – Akagi, Kaga, Sōryū, Hiryū, Shōkaku und Zuikaku – geliefert werden."
 umc_jap.10.a:0 "Tora Tora Tora!"
 umc_jap.10.b:0 "Wenn ich es mir recht überlege, sind wir nicht vorbereitet."
 
 umc_jap.11.t:0 "Operation KI"
 umc_jap.11.d:0 "Der Angriff auf Pearl Harbor ist in vollem Gange. Zwei amerikanische Schlachtschiffe und zahlreiche Flugzeuge wurden bereits zerstört. Infrastruktur und Bodenanlagen wurden ebenfalls schwer beschädigt.\n\nSollen wir den zweiten Angriff wie geplant durchführen?"
 umc_jap.11.a:0 "Starten Sie den zweiten Angriff!"
 umc_jap.11.b:0 "Wir haben genug Schaden angerichtet."
 
 umc_jap.12.t:0 "Operation KI"
 umc_jap.12.d:0 "Der zweite Angriff auf Pearl Harbor war erfolgreich, doch unsere eigenen Verluste steigen gefährlich an. Das Oberkommando muss nun entscheiden, ob die Umsetzung eines der vorbereiteten Pläne uns im Vergleich zum gewonnenen Vorteil nicht zu viel kosten würde."
 umc_jap.12.a:0 "Starten Sie Gendas dritten Angriffsplan!"
 JAP_pearl_harbor_units_EXPL:0 "Gewinnen Sie §H12§! spezielle Invasionsdivisionen in §HHawaii§!, die gegen US-Truppen um die §HKontrolle§! der Insel kämpfen.\n"
 umc_jap.12.b:0 "Starten Sie Fuchidas dritten Angriffsplan!"
 umc_jap.12.c:0 "Wir haben den Tag gewonnen."
 
 ### ZAI INVESTMENTS IN KOREA
 umc_jap.20.t:0 "Zaibatsus-Investition in Korea"
 umc_jap.20.d:0 "Angesichts unseres wachsenden nationalen Einflusses in Korea haben sich die wichtigsten Vertreter von Zaibatsus zu enormen Wirtschaftsinvestitionen auf der koreanischen Halbinsel entschlossen.\n\nDies wird Ihren festen Zugriff auf ausgewählte Gebiete weiter stärken und uns mehr industrielle Kapazität verschaffen, die in allen zukünftigen Konflikten dringend benötigt wird.\n\nEine letzte Frage bleibt noch ungeklärt: Auf welchen Industriesektor sollten wir uns konzentrieren?"
 umc_jap.20.a:0 "Der Ausbau der zivilen Industrie wird bevorzugt."
 umc_jap.20.b:0 "Alle müssen sich unserer Kriegsproduktion unterwerfen!"
 
 ### SEEK HELP AGAINST SOVIET UNION
 umc_jap.30.t:0 "[JAP.GetName] bittet um Unterstützung gegen [SOV.GetName]"
 umc_jap.30.d:0 "Kaiser [JAP.GetLeader] verkündete kürzlich, dass seine Expansionspläne sich nicht gegen Südchina, sondern gegen Sowjetsibirien richten. Sein Land plant einen Angriff auf seinen nördlichen Nachbarn, doch für einen erfolgreichen Sieg fehlt ihm die nötige militärische Ausrüstung.\n\nDa der Kommunismus weltweit als größte Bedrohung für freie Länder gilt, sollten wir ihm in diesem Konflikt materielle Hilfe anbieten."
 umc_jap.30.a:0 "Besser Japan als [SOV.GetName]."
 umc_jap.30.b:0 "Sie können sich gegenseitig zerstören."
 
 umc_jap.31.t:0 "[FROM.GetName] unterstützt unseren antisowjetischen Kampf"
 umc_jap.31.d:0 "Da [FROM.GetLeader] unseren Feldzug gegen [SOV.GetName] als einen vernünftigen Weg zur Begrenzung des kommunistischen Einflusses betrachtet, hat er sich bereit erklärt, unsere entschlossenen Armeen mit moderner Militärausrüstung auszustatten, um die proletarischen Armeen zu vernichten.\n\nEin wichtiger Schritt auf dem Weg zum siegreichen Ende!"
 umc_jap.31.a:0 "Wir sind fast fertig."

 umc_jap.33.t:0 "[FROM.GetName] unterstützt unseren antisowjetischen Kampf"
 umc_jap.33.d:0 "Da [FROM.GetLeader] unseren Feldzug gegen [SOV.GetName] als einen vernünftigen Weg zur Begrenzung des kommunistischen Einflusses betrachtet, hat er sich bereit erklärt, unsere entschlossenen Armeen mit moderner Militärausrüstung auszustatten, um die proletarischen Armeen zu vernichten.\n\nEin wichtiger Schritt auf dem Weg zum siegreichen Ende!"
 umc_jap.33.a:0 "Wir sind fast fertig."
 
 umc_jap.39.t:0 "[FROM.GetName] lehnt die Unterstützung unseres antisowjetischen Kampfes ab"
 umc_jap.39.d:0 ""
 umc_jap.39.a:0 "Wir brauchen sie nicht."
 
 
 ### PACT OF SILK
 umc_jap.50.t:0 "Pakt der Seide"
 umc_jap.50.d:0 "Nach den japanischen Zugeständnissen, die die Äußere Mongolei wieder unter unsere Kontrolle brachten, haben die offiziellen Gespräche über ein formelles Bündnis begonnen. Obwohl sich Kuomintang und japanische Diplomaten auf die meisten Bedingungen für ein erfolgreiches Bündnis geeinigt haben, bleibt die große Frage um das umstrittene Gebiet der Mandschurei bestehen.\n\nDie Japaner bestehen darauf, dass unsere Regierung das Kaiserreich Mandschukuo anerkennt und dass wir ihr Gebiet nicht länger als rechtmäßiges Gebiet Chinas betrachten dürfen. Aus diesem Grund wird Kaiser Puyi niemals zum Kaiser von China gekrönt werden, und sowohl Japan als auch Mandschukuo werden das chinesische Gebiet anerkennen, selbst das, das sich derzeit unter der Kontrolle der Kriegsherren befindet.\n\nEs steht eine schwierige Entscheidung bevor, da beide Entscheidungen zusätzliche Probleme mit sich bringen, mit denen sich unsere Nation auseinandersetzen muss."
 umc_jap.50.a:0 "Wir müssen mit Japan eine Einheitsfront gegen den westlichen Imperialismus bilden."
 umc_jap.50.b:0 "Es gibt Ungerechtigkeiten, die man einfach nicht übersehen kann."

 umc_jap.51.t:0 "[CHI.GetLeader] Akzeptiert den Pakt der Seide"
 umc_jap.51.d:0 "Nach langwierigen Verhandlungen einigten sich die nationalistischen Führer unter Führung von [CHI.GetLeader] schließlich auf den Seidenpakt.\n\nMit Inkrafttreten des Pakts erkannte die Kuomintang die Mandschurei als legitime Nation an. Im Gegenzug verlor Kaiser Kange seinen Anspruch auf die übrigen chinesischen Gebiete. Darüber hinaus einigten sich unsere beiden Nationen auf spezifische Handels- und Militärabkommen, die zu einer weiteren Entwicklung unserer Nationen führen werden.\n\nAuch wenn dies nicht jeder sieht, ist dies ein wahrer Sieg für uns – nach erheblichen Zugeständnissen beider Seiten stehen die beiden mächtigsten asiatischen Nationen nun vereint da und sind bereit, sich den westlichen Imperialisten entgegenzustellen."
 umc_jap.51.a:0 "Ajia hitonotame no Ajia."

 umc_jap.52.t:0 "[CHI.GetLeader] Lehnt den Seidenpakt ab"
 umc_jap.52.d:0 ""
 umc_jap.52.a:0 "Gemeinsam könnten wir stark sein."
 
 umc_jap.53.t:0 "Erkennung von [CHI.GetName]"
 umc_jap.53.d:0 ""
 umc_jap.53.a:0 "Hurra!"
 
 umc_jap.54.t:0 "[CHI.GetLeader] Verbündet sich mit den Japanern"
 umc_jap.54.d:0 ""
 umc_jap.54.a:0 "Volk, erhebt euch und vertreibt die Eindringlinge!"
 
 ### CONCESSIONS TO CHINA
 umc_jap.60.t:0 "[JAP.GetName] überprüft das He-Umezu-Abkommen erneut"
 umc_jap.60.d:0 "Das He-Umezu-Abkommen verbot uns Parteioperationen in Hebei und beendete damit faktisch unsere Kontrolle über diese Provinz. Später im selben Jahr wurde das Chin-Doihara-Abkommen unterzeichnet, das unsere Regierung aus Chahar entließ. An seiner Stelle wurde der von Japan unterstützte Autonome Rat Ost-Hebei mit Prinz Teh als seinem Führer gegründet.\n\nNachdem die Japaner nun ihre Expansionspolitik gegenüber chinesischen Gebieten gemildert und gestoppt hatten, kontaktierten sie uns mit dem Angebot, ihre Unterstützung für die Äußere Mongolei einzustellen, da sie „wünschen, dass die Mongolei der Verbesserung der chinesisch-japanischen Beziehungen nicht im Wege steht“."
 umc_jap.60.a:0 "Eine unerwartete, aber willkommene Wendung der Ereignisse."
 umc_jap.60.b:0 "Kein Geschenk kann das Unrecht ungeschehen machen."
 
 umc_jap.61.t:0 "[CHI.GetLeader] Akzeptiert unsere Zugeständnisse"
 umc_jap.61.d:0 "[CHI.GetLeader] hat sich bereit erklärt, das He-Umezu-Abkommen zu überarbeiten. Sobald unsere offizielle Unterstützung für den Mengjiang-Rat endete, eroberte die Chinesische Nationalarmee den Staat mit einem Schlag zurück. Nun steht die Äußere Mongolei wieder unter der Herrschaft der Kuomintang.\n\nObwohl diese Aktion mit der Zustimmung des Kaisers erfolgte, könnten einige Menschen auf den Heimatinseln dies als Demonstration unserer Schwäche betrachten. Um das größere Ziel zu erreichen, müssen jedoch kleine Zugeständnisse gemacht werden."
 umc_jap.61.a:0 "Es musste getan werden."
 
 umc_jap.62.t:0 "[CHI.GetLeader] Lehnt unsere Zugeständnisse ab"
 umc_jap.62.d:0 ""
 umc_jap.62.a:0 "Diese Narren."
 
 ### Kodoha / Toseiha
 umc_jap.70:0 "Coup eines jungen Offiziers"
 
 umc_jap.75:0 "Kodoha-Fraktion gesäubert!"
 umc_jap.75.t:0 "Kodoha-Fraktion gesäubert!"
 umc_jap.75.d:0 "Auf dem Höhepunkt des Aizawa-Prozesses wurde die 1. Infanteriedivision von Tokio in die Mandschurei beordert, um die Spannungen im Raum Tokio abzubauen. Dies führte jedoch zu einer weiteren Eskalation der Situation, da die Kōdōha den Zeitpunkt für direkte Aktionen für reif hielten und die 1. Infanteriedivision bei einem Putschversuch unterstützten.\n\nDas Scheitern dieses Februar-Vorfalls führte zur fast vollständigen Säuberung der höchsten Armeepositionen durch Kōdōha-Mitglieder und zum Rücktritt des Kōdōha-Anführers Sadao Araki."
 umc_jap.75.a:0 "Subete ga furui mono ni nokoru."
 

 
 ### Claim the East
 umc_jap.90.t:0 "Japan beansprucht den Osten"
 umc_jap.90.d:0 ""
 umc_jap.90.a:0 "Es ist notwendig."
 JAP_Claim_East_Event_DESC:0 "§H[JAP.GetName]§! wird unsere ehemaligen Gebiete ab §HBratsk§! im Osten sowie die Kontrolle über §HMongolien§! und §HTanu Tuva§! erhalten."
 umc_jap.90.b:0 "Ein Frieden? Die Sowjetmacht wird ihr Territorium zurückerobern!"
 
 umc_jap.91.t:0 "[SOV.GetName] überträgt den Osten"
 umc_jap.91.d:0 ""
 umc_jap.91.a:0 "Unser Sieg ist vollendet!"

 umc_jap.92.t:0 "[SOV.GetName] lehnt unsere Ansprüche ab!"
 umc_jap.92.d:0 ""
 umc_jap.92.a:0 "Dann marschieren wir nach Moskau!"
 
 ### Yamamoto's Visit
 umc_jap.100.t:0 "Inspektion von [634.GetName] durch den Großadmiral"
 umc_jap.100.d:0 "Der Krieg tobt mit aller Macht. Um die Moral der japanischen Soldaten zu stärken und die Lage auf den Inseln zu untersuchen, beschließt Großadmiral Yamamoto, eine Inspektionstour durch den Südpazifik zu unternehmen.\n\nObwohl uns dies große Vorteile bringen könnte, befürchten einige, dass die Reisepläne Yamamotos vom US-Geheimdienst aufgegriffen und entschlüsselt werden könnten."
 umc_jap.100.a:0 "Schicken Sie ihn zur Truppeninspektion. Was kann schon Schlimmstes passieren?"
 JAP_yamamotos_visit_EXPL1:0 "[USA.GetFlag]§H[USA.GetName]§! hat die Möglichkeit, §ROperation Vengeance§! zu starten und Yamamotos Flugzeug abzuschießen!"
 umc_jap.100.b:0 "Wir brauchen ihn woanders."

 umc_jap.101.t:0 "Inspektion erfolgreich"
 umc_jap.101.d:0 "Unsere Funker meldeten, dass Großadmiral Isoroku Yamamoto in seinem modifizierten Bomber G4M1 Modell 11 sicher auf [634.GetName] landen konnte.\n\nSeine Anwesenheit stärkte die Moral unserer Soldaten enorm und unter seiner Aufsicht wurden neue Pläne zur Fortsetzung des Pazifikfeldzugs geschmiedet. Die Mission war erfolgreich."
 umc_jap.101.a:0 "Subarashīdesu!"
 
 umc_jap.102.t:0 "MAGIC gesicherte Nachricht NTF131755"
 umc_jap.102.d:0 "Unser Funkaufklärungsbericht meldete, dass Isoroku Yamamoto, Kommandant der Vereinigten Flotte der Kaiserlich Japanischen Marine, eine Inspektionstour zu den Salomonen und Neuguinea geplant hatte. Er wollte die an der Operation I-Go beteiligten japanischen Luft- und Bodeneinheiten inspizieren. Angesichts dieser jüngsten Nachrichten wurde rasch ein Plan mit dem Titel „Operation Rache“ zusammengestellt.\n\nAchtzehn P-38 sollten für diese Mission abkommandiert werden. Eine Staffel mit vier Maschinen sollte als „Killerflug“ dienen, während die übrigen, darunter zwei Ersatzmaschinen, auf 5.500 m (18.000 Fuß) steigen sollten, um als „Deckung“ für die erwartete Reaktion der in Kahili stationierten japanischen Kampfflugzeuge zu dienen. Der kommandierende Operationsoffizier, Marinemajor Mitchell, erstellte einen Flugplan. Basierend auf dem Reiseplan berechnete er eine Abfangzeit von 09:35 Uhr, um die über Bougainville landenden Bomber 10 Minuten vor der Landung in Balalae zu erreichen. Kapitän Thomas G. Lanphier, Jr. sollte die Mission leiten.\n\nDas ist sicherlich ein mutiger Schritt, aber auf jeden Fall einer, der großen Erfolg bringen und den Verlauf des Pazifikkriegs entscheidend verändern kann."
 umc_jap.102.a:0 "Beginnen Sie die Operation Rache!"
 umc_jap.102.b:0 "Zu viel Risiko für einen Mann."
 
 umc_jap.103.t:0 "Operation Vengeance war erfolgreich"
 umc_jap.103.d:0 "Nach stundenlangem Warten kam endlich die Funknachricht des Kommandanten der South Pacific, William F. Halsey Jr..\n\nEr verkündete zufrieden, dass Operation Vengeance mit einem überragenden Erfolg beendet und Yamamotos Flugzeug abgeschossen worden sei. Er schilderte dies im Detail:\n\nOberleutnant Rex T. Barber griff das erste der beiden japanischen Transportschiffe an, das sich als Yamamotos Flugzeug T1-323 herausstellte. Er feuerte auf das Flugzeug, bis aus dem linken Triebwerk Rauch austrat. Barber wandte sich ab, um das andere Transportschiff anzugreifen, während Yamamotos Flugzeug im Dschungel abstürzte."
 umc_jap.103.a:0 "Dadurch wird die militärische Macht im Pazifik auf unsere Seite rücken."
 
 umc_jap.104.t:0 "Der Großadmiral wurde über [634.GetName] abgeschossen"
 umc_jap.104.d:0 ""
 umc_jap.104.a:0 "Īe!"
 
 umc_jap.105.t:0 "Operation Rache ist gescheitert"
 umc_jap.105.d:0 ""
 umc_jap.105.a:0 "Wir haben es versucht."
 
 
 ### ZAIBATSUS
 umc_jap.110.t:0 "Zaibatsus"
 umc_jap.110.d:0 "Zaibatsu oder „Finanzcliquen“ sind große, familiengeführte vertikale Monopole, die aus einer Holding an der Spitze, einer hundertprozentigen Tochterbank zur Finanzierung und mehreren Industrietöchtern bestehen, die bestimmte Marktsektoren entweder allein oder über mehrere Tochtergesellschaften beherrschen.\nDie „großen Vier“ der Zaibatsu – Sumitomo, Mitsui, Mitsubishi und Yasuda – sind die bedeutendsten Zaibatsu-Gruppen. Sumitomo und Mitsui haben ihre Wurzeln in der Edo-Zeit, während Mitsubishi und Yasuda ihre Ursprünge auf die Meiji-Restauration zurückführen. Von der Meiji-Zeit bis zur Shōwa-Zeit nutzte die Regierung ihre Finanzkraft und ihr Fachwissen für verschiedene Unternehmungen, darunter Steuereintreibung, militärische Beschaffung und Außenhandel.\n\nDie Sumitomo Group wurde um 1615 von Masatomo Sumitomo, einem ehemaligen buddhistischen Mönch, gegründet. Es war vor allem Kupfer, das das Unternehmen berühmt machte. Der Abbau von Erzen, hauptsächlich Kupfer, Stahl und Silber, sowie synthetischer Erze sind bis heute die Hauptaktivitäten von Sumitomo.\n\nDie Mitsui Group wurde 1673 von Mitsui Takatoshi als Filiale eines großen Gofukuya (Kimono-Ladens) in Nihonbashi, einem Bezirk im Herzen von Edo, gegründet. Die Geschäftsgeschichte von Mitsui begann in der Enpō-Ära, was Nengō bedeutet und „anhaltender Reichtum“ bedeutet. Damals erhielten sie die Erlaubnis zum Geldwechsel, eröffneten ihre ersten Banken und expandierten in andere Geschäftsbereiche wie die Zigarettenproduktion, den Bergbau usw..\n\nDie Mitsubishi Group wurde 1870 von Yatarō Iwasaki als Reederei gegründet. 1873 wurde der Name in Mitsubishi Shokai geändert. Das Unternehmen war im Schiffbau sowie im Bergbau und in der Ölindustrie tätig und versorgte damit seine Handelsflotte mit Ressourcen. Im Februar 1921 lud das MICEMC in Nagoya den britischen Sopwith Camel-Konstrukteur Herbert Smith sowie mehrere andere ehemalige Sopwith-Ingenieure ein, beim Aufbau einer Flugzeugproduktionsabteilung zu helfen.\n\nYasuda Zaibatsu wurde vom Unternehmer Yasuda Zenjirō aus dem Yasuda-Clan gegründet. Der Fokus der Yasuda auf das Bankwesen wurde 1913 durch die Fusion von elf von Yasuda kontrollierten Banken zur Yasuda Bank eingeschränkt. Die Bank aus der Fusion war die mit Abstand größte aller Zaibatsu-Banken."
