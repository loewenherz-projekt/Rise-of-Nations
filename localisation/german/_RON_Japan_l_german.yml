 ### Indochina (CAM)
 umc_jcd.220.t:0 "[JAP.GetName] fordert die Kontrolle über Indochina"
 umc_jcd.220.d:0 "Im Lichte des jüngsten japanischen Bürgerkriegs kam die neue demokratische Regierung an die Macht. Wo wir zuvor nur eine imperialistische Bedrohung erlebten, finden wir nun eine wahre demokratische Bastion des Ostens. Und während sich die Lage auf den japanischen Inseln stabilisiert, deutete ihre Regierung mit [JAP.GetLeader] an der Spitze den Beginn einer kontroversen Debatte an.\n\nIhre Vorschläge deuten auf das Ende unserer Kolonialherrschaft über Indochina hin. Ihre Absicht ist es, unsere ehemalige Kolonie in einen unabhängigen Staat mit eigener Regierung zu verwandeln. Sie versicherten uns, dass wir alle dort getätigten Investitionen sowie Eigentumsrechte an den lokalen Ressourcen behalten würden.\n\nDiese Gespräche wurden leider öffentlich und sofort von den lokalen Unabhängigkeitsbewegungen ausgenutzt. Mit starken Worten wie „Asien den Asiaten“ und „Cham dut áp buc Thuoc dia“, was wörtlich „Beendet die koloniale Unterdrückung“ bedeutet, würden diese Bewegungen sicherlich zusätzlichen Ärger verursachen, sollten wir dieses Angebot ablehnen."
 umc_jcd.220.a:0 "Eine Sorge weniger."
 umc_jcd.220.b:0 "Wir werden unser Kolonialreich niemals aufgeben!"
 
 umc_jcd.221.t:0 "[FRA.GetName] gib die Kontrolle über Indochina ab!"
 umc_jcd.221.d:0 "Nach langen Gesprächen und Verhandlungen hat [FRA.GetLeader] schließlich zugestimmt, uns die Verantwortung für den Schutz von [CAM.GetName] zu übertragen. Obwohl ein großer Teil der lokalen Wirtschaft noch immer von ihrem ehemaligen Oberherrn kontrolliert wird, haben wir nun das Schlüsselwort in der Politik von [CAM.GetName]. \n\nUnd mit dieser Macht können wir langsam damit beginnen, den europäischen Einfluss weiter einzuschränken – denn in Asien müssen die Asiaten ihre Angelegenheiten selbst bestimmen können."
 umc_jcd.221.a:0 "Bei uns sind sie sicherer."
 
 umc_jcd.223.t:0 "[JAP.GetName] verringert unseren Einfluss in [CAM.GetName]"
 umc_jcd.223.d:0 "Durch die schnellen Investitionen Japans in Infrastruktur, Ressourcen und Industrie in [CAM.GetName] hat das Land in letzter Zeit eine beherrschende Stellung in der lokalen Wirtschaft erlangt.\n\nAuch wenn unser Wort dort immer noch Gewicht hat, können wir davon ausgehen, dass [JAP.GetLeader] so viele Ressourcen wie möglich aufwenden wird, um unseren lokalen Einfluss weiter zu schwächen."
 umc_jcd.223.a:0 "Wir können nichts dagegen tun."
 
 ### Philippines (PHI)
 umc_jcd.230.t:0 "[JAP.GetName] fordert die Kontrolle über [PHI.GetName] an"
 umc_jcd.230.d:0 "Im Lichte des jüngsten japanischen Bürgerkriegs kam die neue demokratische Regierung an die Macht. Wo wir zuvor nur eine imperialistische Bedrohung erlebten, finden wir nun eine wahre demokratische Bastion des Ostens. Und während sich die Lage auf den japanischen Heimatinseln stabilisiert, deutete ihre Regierung mit [JAP.GetLeader] an der Spitze den Beginn einer kontroversen Debatte an.\n\nIhre Vorschläge deuten auf das Ende unserer Kolonialherrschaft über [PHI.GetName] hin. Ihre Absicht ist es, unsere ehemalige Kolonie in einen unabhängigen Staat mit eigener Regierung zu verwandeln. Sie versicherten uns, dass wir alle dort getätigten Investitionen sowie Eigentumsrechte an den lokalen Ressourcen behalten würden.\n\nDiese Gespräche wurden leider öffentlich und sofort von den lokalen Unabhängigkeitsbewegungen ausgenutzt. Mit starken Worten wie „Asien den Asiaten“ und „Poner fin a la Opresión Colonial“, was wörtlich „Beendet die koloniale Unterdrückung“ bedeutet, würden diese Bewegungen sicherlich zusätzlichen Ärger verursachen, sollten wir dieses Angebot ablehnen."
 umc_jcd.230.a:0 "Eine Sorge weniger."
 umc_jcd.230.b:0 "Wir können uns problemlos um sie kümmern."
 
 umc_jcd.231.t:0 "[USA.GetName] gibt die Kontrolle über [PHI.GetName] ab!"
 umc_jcd.231.d:0 "Nach langen Gesprächen und Verhandlungen hat [USA.GetLeader] schließlich zugestimmt, uns die Verantwortung für den Schutz von [PHI.GetName] zu übertragen. Auch wenn ein großer Teil der lokalen Wirtschaft noch immer von ihrem ehemaligen Oberherrn kontrolliert wird, haben wir nun das Schlüsselwort in der Politik von [PHI.GetName]. \n\nUnd mit dieser Macht können wir langsam damit beginnen, den amerikanischen Einfluss weiter einzuschränken – denn in Asien müssen die Asiaten ihre Angelegenheiten selbst bestimmen können."
 umc_jcd.231.a:0 "Bei uns sind sie sicherer."
 
 umc_jcd.233.t:0 "[JAP.GetName] verringert unseren Einfluss in [PHI.GetName]"
 umc_jcd.233.d:0 "Durch die schnellen Investitionen Japans in Infrastruktur, Ressourcen und Industrie in [PHI.GetName] hat das Land in letzter Zeit eine beherrschende Stellung in der lokalen Wirtschaft erlangt.\n\nAuch wenn unser Wort dort immer noch Gewicht hat, können wir davon ausgehen, dass [JAP.GetLeader] so viele Ressourcen wie möglich aufwenden wird, um unseren lokalen Einfluss weiter zu schwächen."
 umc_jcd.233.a:0 "Wir können nichts dagegen tun."
 
 
 ### UNREST ON THE HOME ISLANDS
 umc_jcd.250.t:0 "Verlorenes Duell gegen die Loyalisten"
 umc_jcd.250.d:0 ""
 umc_jcd.250.a:0 "Wir müssen uns mehr anstrengen."
 
 umc_jcd.251.t:0 "Kampf gegen die Loyalisten gewonnen"
 umc_jcd.251.d:0 ""
 umc_jcd.251.a:0 "Wir müssen vorankommen!"
 
 umc_jcd.252.t:0 "Reformer verhaftet"
 umc_jcd.252.d:0 ""
 umc_jcd.252.a:0 "Es werden andere kommen, die seinen Platz einnehmen."
 
 umc_jcd.253.t:0 "General gibt seinen Kriegergeist auf"
 umc_jcd.253.d:0 ""
 umc_jcd.253.a:0 "Er sieht die glänzende Zukunft, die neue Wege mit sich bringen."
 
 umc_jcd.254.t:0 "General sympathisiert mit den Kommunisten"
 umc_jcd.254.d:0 ""
 umc_jcd.254.a:0 "Mehr Macht für die Kommunisten."
 
 umc_jcd.255.t:0 "Sabotage einer Industrieanlage"
 umc_jcd.255.d:0 ""
 umc_jcd.255.a:0 "Wir müssen vorsichtig sein, bevor es ganz Japan zerstört."
 
 umc_jcd.256.t:0 "Sabotage einer Militärfabrik"
 umc_jcd.256.d:0 ""
 umc_jcd.256.a:0 "Keine Waffen mehr, egal auf welcher Seite."
 
 umc_jcd.257.t:0 "Infrastruktur sabotiert"
 umc_jcd.257.d:0 ""
 umc_jcd.257.a:0 "Die Menschen sind diejenigen, die am meisten leiden."
 
 
