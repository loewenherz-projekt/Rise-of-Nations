 JCD_Path_of_Communism:0 "Sono Hitobito no Akai Nihon"
 JCD_Path_of_Communism_desc:0 "Wir haben uns mit den dreckigen Imperialisten auseinandergesetzt und jetzt ist der richtige Zeitpunkt, gegen die kapitalistischen Zaibatsus vorzugehen. Wer sich uns in den Weg stellt, wird es bald bereuen, denn Japan muss auf völlig neue Weise reformiert werden.\nVon nun an gehört das rote Japan seinem Volk."
 JCD_Research_Program:0 "Akademische Programme erweitern"
 JCD_Research_Program_desc:0 "Intellektuelle und andere nicht-kompetente Persönlichkeiten wurden schon immer unterdrückt, bevor die Rote Hand die Kontrolle über Japan übernahm. Jetzt haben wir die Möglichkeit, die akademischen Programme zu erweitern und die besten Köpfe Japans zu vereinen, damit sie als Einheit arbeiten können."
 
