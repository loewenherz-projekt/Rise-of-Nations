 JAP_ptn_use_the_improving_economic_situation_in_japan_dec_I:0 "Periode erheblichen Wirtschaftswachstums"
 JAP_ptn_use_the_improving_economic_situation_in_japan_dec_I_desc:0 "Die Industrieproduktion wächst seit 1929 stetig. Der Gesamtwert der Schwerindustrie in Japan, der 1931 auf etwa 700 Millionen US-Dollar geschätzt wurde, war bis 1936 auf 3,4 Milliarden US-Dollar gestiegen. Jetzt wird sie auch hier in der Mandschurei genutzt, wo sie zur lokalen Stabilität und allgemeinen Entwicklung beiträgt.\n§W---------------§!\nDieser Nationalgeist wird §REntfernt§!, wenn wir uns im §HKrieg§! befinden oder wenn die §HWeltspannung§! über §H75 %§! steigt."
 JAP_ptn_japanese_integration_I:0 "Japanische Integration"
 JAP_ptn_japanese_integration_I_desc:0 "Unser Land wird vollständig in das japanische Kaiserreich integriert, und alle Hoffnungen auf einen unabhängigen Mandschu-Staat sind verloren. Unser Kaiser ist nur noch eine Marionette, und was noch schlimmer ist: Die Menschen sind sich dessen bewusst. Niemand kann auch nur erahnen, welches Chaos dies verursachen wird.\n§W---------------§!\nDieser Nationalgeist wird ungewöhnliche §HEreignisse§! hervorrufen."
 
 JAP_USA_force_them_to_surrender_I1:0 "Reaktionen auf eine demütigende Niederlage"
 JAP_USA_force_them_to_surrender_I1_desc:0 "Ein Tag, der in Schande leben wird, ist nicht mehr als der Tag bekannt, an dem wir von den Kaiserlich Japanischen Streitkräften in Pearl Harbor angegriffen wurden, sondern als der Tag, an dem wir es nicht rächen konnten. Wie konnte Amerika das zulassen? Wir haben unsere Flotte verloren, wir haben den Pazifik verloren.\nJetzt wird unser Heimatland von Unruhen erschüttert. Radikale Gruppen gewinnen an Macht. Die Erinnerungen an die Niederlage irritieren uns.\n§W---------------§!\nWenn unsere §HStabilität§! unter §R35%§! fällt, wird die am stärksten unterstützte Ideologie einen §RCrivellenkrieg§! beginnen.\n\nDieser Nationalgeist wird §GRemoved§!, wenn unsere §HStabilität§! über §G90%§! liegt."
 
 JAP_imperial_sanctions_I:0 "Kaiserliche Sanktionen"
 JAP_imperial_sanctions_I_desc:0 ""
 
 JAP_CHI_build_upon_the_tanggu_truce_I:0 "Schatten des Tanggu-Waffenstillstands"
 JAP_CHI_build_upon_the_tanggu_truce_I_desc:0 "Der Waffenstillstand von Tanggu war ein Waffenstillstand, der am 31. Mai 1933 im Bezirk Tanggu in Tianjin zwischen der Republik China und dem Kaiserreich Japan unterzeichnet wurde. Er beendete formell die japanische Invasion in der Mandschurei, die zwei Jahre zuvor begonnen hatte. Er führte zur faktischen Anerkennung Mandschukuos durch die Kuomintang-Regierung und zur Anerkennung des Verlusts von Rehe. Leider steht die chinesische Öffentlichkeit diesen für Japan so günstigen und für China so demütigenden Bedingungen ablehnend gegenüber."
 
