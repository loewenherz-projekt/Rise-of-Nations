 ### YAMATO SET SAIL
 umc_jap.120.t:0 "Yamato-gata Senkan"
 umc_jap.120.d:0 "Vorstudien für eine neue Klasse von Schlachtschiffen begannen nach Japans Austritt aus dem Völkerbund und seinem Verzicht auf die Flottenverträge von Washington und London. Zwischen 1934 und 1936 wurden 24 erste Entwürfe vorgelegt. Diese frühen Pläne unterschieden sich stark in Bewaffnung, Antrieb, Ausdauer und Panzerung. Die Hauptbatterien schwankten zwischen 460-mm- (18,1 Zoll) und 406-mm- (16 Zoll) Geschützen, während die Sekundärbewaffnung aus unterschiedlichen Anzahlen von 155-mm- (6,1 Zoll), 127-mm- (5 Zoll) und 25-mm- (1 Zoll) Geschützen bestand. Der Antrieb erfolgte bei den meisten Entwürfen über eine hybride Diesel-Turbinen-Kombination, wobei einer ausschließlich auf Diesel basierte und ein anderer nur Turbinen vorsah. Die Ausdauer der Entwürfe lag bei 18 Knoten (33 km/h), einem Tiefstwert von 6.000 nautischen Meilen (11.000 km; 6.900 Meilen) beim Entwurf A-140-J2 und einem Höchstwert von 9.200 nmi (17.000 km; 10.600 Meilen) bei den Entwürfen A-140A und A-140-B2. Die Panzerung variierte zwischen ausreichendem Schutz vor dem Feuer von 406-mm-Geschützen und ausreichendem Schutz gegen 460-mm-Geschütze.\n\nDie Yamato gilt als Inbegriff kaiserlich-japanischer Schiffsbaukunst. Darüber hinaus verkörpern die Yamato und die Musashi aufgrund ihrer Größe, Geschwindigkeit und Kraft sichtbar Japans Entschlossenheit und Bereitschaft, seine Interessen gegen die westlichen Mächte, insbesondere die Vereinigten Staaten, zu verteidigen."
 umc_jap.120.a:0 "Tennō heika banzai!"
 
 umc_jap.121.t:0 "Konstruktion eines japanischen Superschlachtschiffs"
 umc_jap.121.d:0 ""
 umc_jap.121.a:0 "Es gibt keinen Grund zur Sorge."
 umc_jap.121.b:0 "Wir müssen umgehend genügend Mittel bereitstellen, um mit der Entwicklung der Schlachtschiffe der Iowa-Klasse fortzufahren."
 
 ### MARCO POLO BRIDGE INCIDENT
 umc_jap.130.t:0 "Vorfall auf der Marco-Polo-Brücke"
 umc_jap.130.d:0 "Gestern überquerten unsere in Fengtai stationierten Truppen die Grenze nach Peking, um Militärübungen durchzuführen. Später am selben Tag lieferten sich chinesische Streitkräfte außerhalb der Stadt Wanping gegen 23:00 Uhr ein Feuergefecht mit unseren Einheiten. Trotz ernsthafter Bemühungen, Verhandlungen aufzunehmen und die Spannungen abzubauen, nahmen die Schießereien weiter zu.\n\nHeute Morgen sind beide Armeen bereits vollständig mobilisiert, und Verstärkungen für beide Seiten treffen ein. Es besteht kein Zweifel, dass bald ein Großangriff folgen wird."
 umc_jap.130.a:0 "Drängt die Chinesen zurück nach Peking!"
 
 umc_jap.131.t:0 "Vorfall auf der Lugou-Brücke"
 umc_jap.131.d:0 "Gestern überquerten japanische Truppen aus Fengtai die Grenze nach Peking, um dort Militärübungen abzuhalten. Später am selben Tag lieferten sich unsere Truppen außerhalb der Stadt Wanping gegen 23:00 Uhr einen Schusswechsel mit ihren Einheiten. Trotz ernsthafter Bemühungen, Verhandlungen aufzunehmen und die Spannungen abzubauen, nahmen die Schießereien weiter zu.\n\nHeute Morgen sind beide Armeen bereits vollständig mobilisiert, und Verstärkungen für beide Seiten treffen ein. Es besteht kein Zweifel, dass bald ein Großangriff folgen wird."
 umc_jap.131.a:0 "Drängt die Japaner zurück in die Mandschurei!"
 CHI_marco_polo_bridge_incident_EXPL1:0 "Truppen von [JAP.GetFlag]§H[JAP.GetName]§! in §HOst-Hebei§! werden einen §HGrenzkrieg§! gegen unsere Truppen in §H[608.GetName]§! beginnen. Der Konflikt wird sich weiter §REskalieren§!.\n"
 
 umc_jap.132.t:0 "Vorfall auf der Marco-Polo-Brücke"
 umc_jap.132.d:0 "Gestern überquerten japanische Truppen aus Fengtai die Grenze nach Peking, um dort Militärübungen abzuhalten. Später am selben Tag lieferten sich chinesische nationalistische Truppen vor der Stadt Wanping gegen 23:00 Uhr ein Feuergefecht mit ihnen. Trotz ernsthafter Bemühungen, Verhandlungen aufzunehmen und die Spannungen abzubauen, nahmen die Schießereien weiter zu.\n\nHeute Morgen sind beide Armeen bereits vollständig mobilisiert, und Verstärkungen für beide Seiten treffen ein. Es besteht kein Zweifel, dass bald ein Großangriff folgen wird."
 umc_jap.132.a:0 "Setzen Sie unsere örtlichen Truppen ein, um in der Gegend noch mehr Chaos zu stiften."
 PRC_marco_polo_bridge_incident_EXPL1:0 "Unsere Einheiten werden versuchen, Versuche zur Beendigung des §HBewaffneten Konflikts§! zu verhindern und so die Wahrscheinlichkeit eines umfassenden §HKriegs§! zwischen [JAP.GetFlag]§H[JAP.GetName]§! und [CHI.GetFlag]§H[CHI.GetName]§! zu erhöhen.\n"
 umc_jap.132.b:0 "Im Moment können wir nur still zusehen."
 
 umc_jap.133.t:0 "Zwischenfall auf der Lugou-Brücke eskaliert zu einem umfassenden Krieg"
 umc_jap.133.d:0 "Die seit mehreren Tagen andauernden Kämpfe nahe der Marco-Polo-Brücke hören nicht auf. Japanische Truppen dringen immer tiefer in unser Gebiet vor, nun mit Unterstützung von Lufteinheiten. Es besteht kein Zweifel daran, dass wir uns im Krieg befinden. Es geht um unser gesamtes Überleben. \n\nDas sind jedoch noch nicht die letzten schlechten Nachrichten. Da unsere Nordarmee derzeit weitgehend unkontrolliert ist, wird es einige Zeit dauern, sie wieder zu reorganisieren und eine angemessene Verteidigung aufzubauen."
 umc_jap.133.a:0 "Wir müssen sie um jeden Preis aufhalten!"
 
 umc_jap.135.t:0 "Vorfall auf der Marco-Polo-Brücke eskaliert"
 umc_jap.135.d:0 "Die Kämpfe um die Marco-Polo-Brücke nehmen an Intensität zu. Berichten zufolge handelt es sich nicht nur um einen Zwischenfall, sondern um den Beginn einer groß angelegten Invasion. Unsere Generäle drängen ihre Soldaten immer tiefer in chinesische Gebiete – und ignorieren dabei die Befehle aus Tokio.\n\nEin entschiedener Befehl muss gegeben werden, um diese unkontrollierten Kämpfe zu beenden. Doch selbst dann gibt es keine Garantie dafür, dass er rechtzeitig in Kraft tritt..."
 umc_jap.135.a:0 "Wir gewinnen die Oberhand! Banzai!"
 umc_jap.135.b:0 "Kontrollieren Sie unsere Truppen und beschränken Sie militärische Aktionen nur auf die Lugou-Brücke."
 umc_jap.135.c:0 "Eine Entschuldigung und Bestrafung der Verantwortlichen könnte diese Situation noch lösen."
 
 umc_jap.136.t:0 "Armee ist los, Konflikt geht weiter"
 umc_jap.136.d:0 "Wir haben die Kontrolle über die Divisionen unserer Armee, die nahe der Marco-Polo-Brücke kämpfen, völlig verloren. Generäle und Offiziere handeln auf eigene Faust und dringen tiefer in chinesisches Gebiet vor.\n\nEs gibt jetzt keine andere Option als Krieg."
 umc_jap.136.a:0 "Uns blieben nicht viele Optionen."
 
 umc_jap.137.t:0 "Chinesisch-japanische Verhandlungen"
 umc_jap.137.d:0 ""
 umc_jap.137.a:0 "Darauf sind wir nicht vorbereitet."
 umc_jap.137.b:0 "Halten Sie unsere Stellung um jeden Preis!"
 
 umc_jap.138.t:0 "[CHI.GetName] Akzeptiert Waffenstillstand rund um die Marco-Polo-Brücke"
 umc_jap.138.d:0 "Führende Offiziere der chinesischen Nationalarmee haben einem Waffenstillstand rund um die Marco-Polo-Brücke zugestimmt und damit den bewaffneten Konflikt zwischen unseren Nationen effektiv beendet. Sie haben auch unseren Forderungen zugestimmt, wodurch die Stadt Tianjin unter unsere Kontrolle gelangte und die chinesische Macht in der Region geschwächt wurde.\n\nVon nun an können wir unsere Streitkräfte neu formieren, aus dem bewaffneten Konflikt lernen und zum richtigen Zeitpunkt den großen Invasionsplan Chinas umsetzen."
 umc_jap.138.a:0 "Eine weise Entscheidung."
 
 umc_jap.139.t:0 "[CHI.GetName] lehnt Waffenstillstand rund um die Marco-Polo-Brücke ab"
 umc_jap.139.d:0 ""
 umc_jap.139.a:0 "Drücken Sie den Angriff!"
 
