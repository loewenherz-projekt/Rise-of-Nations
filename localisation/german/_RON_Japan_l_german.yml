 JAP_period_of_significant_economic_growth_I1:0 "Periode erheblichen Wirtschaftswachstums"
 JAP_period_of_significant_economic_growth_I1_desc:0 "Die Industrieproduktion wächst seit 1929 stetig. Der Gesamtwert der Schwerindustrie in Japan, der 1931 auf etwa 700 Millionen US-Dollar geschätzt wurde, war bis 1936 auf 3,4 Milliarden US-Dollar gestiegen. Sollten wir diese Rate beibehalten, könnten wir möglicherweise sogar das wirtschaftliche Niveau unserer Rivalen erreichen.\n§W---------------§!\nDieser Nationalgeist wird §REntfernt§!, wenn wir uns im §HKrieg§! befinden oder wenn die §HWeltspannung§! über §H75 %§! liegt."
 JAP_period_of_significant_economic_growth_I2:0 "Periode bedeutenden Wirtschaftswachstums"
 JAP_period_of_significant_economic_growth_I2_desc:0 "Die Industrieproduktion wächst seit 1929 stetig. Der Gesamtwert der Schwerindustrie in Japan, der 1931 auf etwa 700 Millionen US-Dollar geschätzt wurde, war bis 1936 auf 3,4 Milliarden US-Dollar gestiegen. Sollten wir diese Rate beibehalten, könnten wir möglicherweise sogar das wirtschaftliche Niveau unserer Rivalen erreichen.\n§W---------------§!\nDieser Nationalgeist wird §REntfernt§!, wenn wir uns im §HKrieg§! befinden oder wenn die §HWeltspannung§! über §H75 %§! liegt."
