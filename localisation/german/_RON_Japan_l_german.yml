 umc_jap.111.t:0 "Sumitomo Zaibatsus Entwicklung"
 umc_jap.111.d:0 "Zaibatsu oder „Finanzclique“ sind große, familiengeführte vertikale Monopole, die aus einer Holding an der Spitze, einer hundertprozentigen Tochterbank zur Finanzierung und mehreren Industrietöchtern bestehen, die bestimmte Marktsektoren entweder allein oder über mehrere Tochtergesellschaften beherrschen.\n\nDie Sumitomo Group wurde um 1615 von Masatomo Sumitomo, einem ehemaligen buddhistischen Mönch, gegründet. Vor allem Kupfer machte das Unternehmen berühmt. Der Abbau von Erzen, vor allem Kupfer, Stahl und Silber, sowie synthetische Zweige sind bis heute die Hauptaktivitäten von Sumitomo.\n\nDa wir uns entschieden haben, der Sumitomo Group zusätzliche Mittel für ihre Arbeit zur Verfügung zu stellen, haben ihre Geschäftsaktivitäten in letzter Zeit unsere nationalen natürlichen Ressourcen erheblich weiterentwickelt."
