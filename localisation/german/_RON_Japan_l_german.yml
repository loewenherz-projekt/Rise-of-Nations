 ##### TOSEIHA & KODOHA
 JAP_side_with_the_toseiha_faction_I:0 "Tōseiha-Fraktion"
 JAP_side_with_the_toseiha_faction_I_desc:0 "Die Tōseiha, oder „Kontrollfraktion“, ist eine politische Fraktion in der Kaiserlich Japanischen Armee, die seit den 1920er Jahren aktiv ist. Die Tōseiha, die früher von Generalmajor Tetsuzan Nagata und Hideki Tōjō angeführt wurde, ist eine Gruppe von Offizieren, die vor allem durch ihre Opposition gegen die Kōdōha-Fraktion vereint sind.\n\nDie Tōseiha unterstützt nachdrücklich die Nanshin-ron-Strategie und eine defensivere Expansion in Richtung chinesischer und indonesischer Gebiete."
 JAP_side_with_the_kodoha_faction_I:0 "Kōdōha-Fraktion"
 JAP_side_with_the_kodoha_faction_I_desc:0 "Die Kōdōha oder „Fraktion des Kaiserlichen Weges“ ist eine politische Fraktion in der Kaiserlich Japanischen Armee, die seit den 1920er Jahren aktiv ist und größtenteils von jüngeren Offizieren unterstützt wird. Ihr Ziel ist die Errichtung einer Militärregierung mit dem Kaiser als Herrscher, die totalitäre, militaristische und expansionistische Ideale fördert.\n\nDie Kōdōha unterstützt nachdrücklich die Hokushin-ron-Strategie eines Präventivschlags gegen die Sowjetunion."
 
 JAP_imperial_rule_assistance_association_forming_I:0 "IRAA-Formungsprozess"
 JAP_imperial_rule_assistance_association_forming_I_desc:0 ""
 JAP_imperial_rule_assistance_association_I:0 "Imperial Rule Assistance Association"
 JAP_imperial_rule_assistance_association_I_desc:0 "Die Imperial Rule Assistance Association (Taisei Yokusankai) ist eine japanische Kriegsorganisation, die von Premierminister Fumimaro Konoe gegründet wurde, um die Ziele der Shintaisei-Bewegung zu fördern. Sie entwickelt sich zu einer staatlichen Regierungspartei, deren Ziel es ist, den Separatismus in Politik und Wirtschaft des japanischen Kaiserreichs zu beseitigen und einen totalitären Einparteienstaat zu schaffen, um die Effizienz der gesamten japanischen Kriegsanstrengungen in Asien zu maximieren."
 
