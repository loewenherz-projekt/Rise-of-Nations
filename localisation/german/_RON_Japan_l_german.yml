 JAP_defeat_in_china_I:0 "Niederlage in China"
 JAP_defeat_in_china_I_desc:0 "Wir haben auf dem chinesischen Festland kläglich versagt und wurden zurückgedrängt. Danach gab es keinen anderen Ausweg als eine Kapitulationsvereinbarung, in der wir alle unsere Festlandbesitzungen zurückerhielten.\n\nJetzt ist unsere Nation in internen Kämpfen gefangen, in denen Militaristen den „Betsu no Kōgeki“ – den zweiten Angriff – unterstützen, während unsere Bevölkerung den „Atarashī Apurōchi“ – den neuen Ansatz – fordert. Es besteht kein Zweifel, dass unsere Nation bald vor der größten Bewährungsprobe ihrer Geschichte stehen wird.\n§W---------------§!\nWenn unsere §HStabilität§! unter §R45%§! fällt, wird unsere Regierung wechseln und die §HFaschisten§! werden den §RCrivellenkrieg§! beginnen."
 JAP_CHI_MAN_japanese_reparations_I:0 "Japanische Reparationen"
 JAP_CHI_MAN_japanese_reparations_I_desc:0 ""
 
 JAP_prepare_for_asian_campaign_I:0 "Zwangsrekrutierung in Kwantung" 
 JAP_prepare_for_asian_campaign_I_desc:0 ""
 
 JAP_national_defense_state_I:0 "Kokubō Kokka"
 JAP_national_defense_state_I_desc:0 "Die Idee des „Shintaisei“, der „Neuen Nationalen Struktur“, wurde erstmals von Premierminister Fumimaro Konoe verkündet. Sie verwandelte Japan in einen „Nationalen Verteidigungsstaat“, in dem die Regierung gemäß dem Gesetz zur Nationalen Mobilisierung die absolute Macht über das Vermögen des Landes erhält.\n§W---------------§!\nDieser Nationalgeist wird §REntfernt§!, wenn wir entweder unter den Vorgaben zur §H35%§! Stabilität oder §H35%§! Kriegsunterstützung liegen oder wenn wir das Gesetz zur §HTomaten Mobilisierung§! Wirtschaft nicht haben."
 
 JAP_first_air_fleet_I:0 "Erste Luftflotte"
 JAP_first_air_fleet_I_desc:0 "Die 1. Luftflotte, Daiichi Kōkū Kantai, auch bekannt als Kidō Butai (&quot;Mobile Streitmacht&quot;), ist die Bezeichnung für einen kombinierten Trägerkampfverband, der die meisten Flugzeugträger und Trägerfliegergruppen der Kaiserlich Japanischen Marine umfasst. Sie gehört zu den modernsten und größten Flugzeugträgerflotten der Welt, vielleicht sogar zu den besten von allen.\n§W---------------§!\nDieser Nationalgeist wird §RRemoved§!, wenn wir weniger als §H4 Träger§! haben."
 
