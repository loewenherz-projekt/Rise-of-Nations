 ### NON-AGGRESSION PACT WITH CHINA
 umc_jap.280.t:0 "Nichtangriffspakt mit [JAP.GetName]"
 umc_jap.280.d:0 "Diplomaten – gesegnet mit der Zustimmung von Kaiser [JAP.GetLeader] – traten mit dem Angebot an uns heran, die chinesisch-japanischen Beziehungen zu stabilisieren und zu verbessern. Dem gingen die bereits seit einigen Jahren verbesserten Beziehungen und der japanische Wille voraus, sich eher auf die Expansion nach Norden als nach Osten zu konzentrieren. Ein formeller Nichtangriffspakt zwischen unseren Nationen ist ein ausreichender Anfang. Er wird unsere Nationen einander näherbringen und zukünftige Feindseligkeiten zwischen uns verhindern. Wir müssen jedoch vorsichtig sein, da diese Entscheidung in der chinesischen Bevölkerung nicht beliebt sein wird und die Kommunisten sicherlich versuchen werden, sie zu ihrem Vorteil zu nutzen."
 umc_jap.280.a:0 "Wir brauchen Frieden. Vorerst."
 umc_jap.280.b:0 "Dieser Pakt würde nichts bedeuten."
 
 umc_jap.281.t:0 "[CHI.GetLeader] Akzeptiert Nichtangriffspakt"
 umc_jap.281.d:0 "Nach langwierigen Verhandlungen kam [CHI.GetLeader] schließlich zur Vernunft und stimmte zu, den formellen Nichtangriffspakt zwischen unseren beiden Nationen anzunehmen.\n\nDies ist der erste, aber sehr wichtige Schritt zur Vereinigten Asiatischen Liga, und eine weitere Zusammenarbeit zwischen China und Japan wird sicherlich bald folgen."
 umc_jap.281.a:0 "Gut."
 
 umc_jap.282.t:0 "[CHI.GetLeader] Lehnt Nichtangriffspakt ab"
 umc_jap.282.d:0 ""
 umc_jap.282.a:0 "Was für eine Zeitverschwendung."

 umc_jap.283.t:0 "[CHI.GetLeader] Zusammenarbeit mit den Japanern"
 umc_jap.283.d:0 ""
 umc_jap.283.a:0 "Die Leute werden davon hören."
 
 ### REQUEST INTERNATIONAL WEAPONRY SUPPLY
 umc_jap.290.t:0 "[JAP.GetLeader] bittet um Hilfe gegen [SOV.GetName]"
 umc_jap.290.d:0 "Diplomaten, die von [JAP.GetLeader] entsandt wurden, haben uns kürzlich kontaktiert und uns über die japanischen Angriffspläne gegen die Sowjetunion informiert. Obwohl ihre Marine weit überlegen ist, werden die meisten Kämpfe an Land stattfinden, wo die sowjetische Armee mit ihrer fortschrittlichen Panzerung und Mechanisierung im Vorteil ist.\n\nDaher bitten sie uns um materielle Unterstützung, um diesen Kampf erfolgreich zu beenden. Sie sagen, sie könnten die kommunistische Bedrohung ein für alle Mal ausschalten."
 umc_jap.290.a:0 "Senden Sie eine kleine Menge Infanterieausrüstung."
 umc_jap.290.b:0 "Bilden Sie ein freiwilliges Luftgeschwader, um ihnen in diesem Kampf zu helfen."
 umc_jap.290.c:0 "Sie können diesen Kampf führen ... ohne unsere Hilfe."
 
 umc_jap.291.t:0 "[FROM.GetName] Sendet Infanterieausrüstung"
 umc_jap.291.d:0 ""
 umc_jap.291.a:0 "Mit diesen Waffen werden wir der kommunistischen Bedrohung begegnen."
 
