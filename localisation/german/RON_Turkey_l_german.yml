 TUR_GATHERING_STORM_DESC:0 "Obwohl [TUR.GetName] infolge jahrzehntelanger Kriege sein Reich verlor, fand es mit der Ausrufung der Republik schließlich Frieden und Ruhe. Durch die wirtschaftlichen, sozialen und politischen Revolutionen wandten sich die Türken dem Westen zu und erlebten große Veränderungen und eine fortschreitende Entwicklung. Getreu dem Prinzip „Friede im Inland, Frieden in der Welt“ pflegten sie eine Friedens- und Freundschaftspolitik mit allen Nachbarstaaten und schränkten ihre Militärausgaben ein. Obwohl diese Politik [TUR.GetName] zu einer wertvollen diplomatischen Macht machte, führte sie gleichzeitig dazu, dass die türkische Armee technologisch schwach ausgerüstet wurde. Dennoch ist die türkische Armee nach wie vor eine abschreckende Kraft."
 TUR_BLITZKRIEG_DESC:0 "Obwohl [TUR.GetName] infolge eines jahrzehntelangen Krieges sein Reich verlor, fand es mit der Ausrufung der Republik schließlich Frieden und Ruhe. Durch die wirtschaftlichen, sozialen und politischen Revolutionen wandten sich die Türken dem Westen zu und erlebten große Veränderungen und Entwicklungsfortschritte. Im Bewusstsein des bevorstehenden Krieges hält das Land weiterhin am Prinzip „Frieden im Inland, Frieden in der Welt“ fest. Es ist jedoch klar, dass die Türken keine bedrohliche Politik dulden werden. Obwohl die türkische Armee auf dem Schlachtfeld eine abschreckende Kraft darstellt, ist sie technologisch veraltet und nicht in der Lage, mit der Zeit zu gehen."
 
